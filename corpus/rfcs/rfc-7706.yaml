id: rfc-7706
rfc_number: 7706
title: Decreasing Access Time to Root Servers by Running One on Loopback
authors:
    - name: W. Kumari
    - name: P. Hoffman
date: 2015-11
stream: IETF
area: ops
wg: dnsop
current_status: INFORMATIONAL
