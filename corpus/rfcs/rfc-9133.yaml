id: rfc-9133
rfc_number: 9133
title: Controlling Filtering Rules Using Distributed Denial-of-Service Open Threat Signaling (DOTS) Signal Channel
authors:
    - name: K. Nishizuka
    - name: M. Boucadair
    - name: T. Reddy.K
    - name: T. Nagata
