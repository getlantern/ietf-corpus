id: rfc-8482
rfc_number: 8482
title: Providing Minimal-Sized Responses to DNS Queries That Have QTYPE=ANY
authors:
    - name: J. Abley
    - name: O. Gudmundsson
    - name: M. Majkowski
    - name: E. Hunt
date: 2019-01
