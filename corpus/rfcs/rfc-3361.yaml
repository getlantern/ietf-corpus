abstract: "This document defines a DHCP-for-IPv4 option that contains a list of\r\ndomain names or IPv4 addresses that can be mapped to one or more SIP\r\noutbound proxy servers. This is one of the many methods that a SIP\r\nclient can use to obtain the addresses of such a local SIP server."
