id: rfc-4577
rfc_number: 4577
title: OSPF as the Provider/Customer Edge Protocol for BGP/MPLS IP Virtual Private Networks (VPNs)
authors:
    - name: E. Rosen
    - name: P. Psenak
    - name: P. Pillay-Esnault
