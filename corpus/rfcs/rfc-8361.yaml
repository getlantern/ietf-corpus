title: 'Transparent Interconnection of Lots of Links (TRILL): Centralized Replication for Active-Active Broadcast, Unknown Unicast, and Multicast (BUM) Traffic'
authors:
    - name: W. Hao
    - name: Y. Li
    - name: M. Durrani
    - name: S. Gupta
    - name: A. Qu
date: 2018-04
stream: IETF
