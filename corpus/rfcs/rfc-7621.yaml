id: rfc-7621
rfc_number: 7621
title: A Clarification on the Use of Globally Routable User Agent URIs (GRUUs) in the SIP Event Notification Framework
authors:
    - name: A.B. Roach
date: 2015-08
stream: IETF
area: art
wg: sipcore
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 4
abstract: |-
    Experience since the publication of the most recent SIP Events framework (in July 2012) has shown that there is room for interpretation around the use of Globally Routable User Agent URIs in that specification. This document clarifies the intended behavior.

    This document updates RFC 6665.
