id: rfc-8616
rfc_number: 8616
title: Email Authentication for Internationalized Mail
authors:
    - name: J. Levine
date: 2019-06
stream: IETF
area: art
wg: dmarc
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
