title: Attribute-Value Pairs for Provisioning Customer Equipment Supporting IPv4-Over-IPv6 Transitional Solutions
authors:
    - name: C. Zhou
    - name: T. Taylor
    - name: Q. Sun
    - name: M. Boucadair
