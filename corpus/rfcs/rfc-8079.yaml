id: rfc-8079
rfc_number: 8079
title: Guidelines for End-to-End Support of the RTP Control Protocol (RTCP) in Back-to-Back User Agents (B2BUAs)
authors:
    - name: L. Miniero
    - name: S. Garcia Murillo
    - name: V. Pascual
date: 2017-02
