id: rfc-8858
rfc_number: 8858
title: Indicating Exclusive Support of RTP and RTP Control Protocol (RTCP) Multiplexing Using the Session Description Protocol (SDP)
authors:
    - name: C. Holmberg
date: 2021-01
stream: IETF
area: art
wg: mmusic
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 9
abstract: This document defines a new Session Description Protocol (SDP) media-level attribute, 'rtcp-mux-only', that can be used by an endpoint to indicate exclusive support of RTP and RTP Control Protocol (RTCP) multiplexing.  The document also updates RFC 5761 by clarifying that an offerer can use a mechanism to indicate that it is not able to send and receive RTCP on separate ports.
