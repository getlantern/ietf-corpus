id: rfc-8333
rfc_number: 8333
title: Micro-loop Prevention by Introducing a Local Convergence Delay
authors:
    - name: S. Litkowski
    - name: B. Decraene
    - name: C. Filsfils
    - name: P. Francois
date: 2018-03
stream: IETF
area: rtg
