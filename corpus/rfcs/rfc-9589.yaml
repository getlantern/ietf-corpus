id: rfc-9589
rfc_number: 9589
title: On the Use of the Cryptographic Message Syntax (CMS) Signing-Time Attribute in Resource Public Key Infrastructure (RPKI) Signed Objects
authors:
    - name: J. Snijders
    - name: T. Harrison
date: 2024-05
