id: rfc-7183
rfc_number: 7183
title: Integrity Protection for the Neighborhood Discovery Protocol (NHDP) and Optimized Link State Routing Protocol Version 2 (OLSRv2)
authors:
    - name: U. Herberg
    - name: C. Dearlove
    - name: T. Clausen
