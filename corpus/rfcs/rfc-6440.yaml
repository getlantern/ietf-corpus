title: The EAP Re-authentication Protocol (ERP) Local Domain Name DHCPv6 Option
authors:
    - name: G. Zorn
    - name: Q. Wu
    - name: Y. Wang
date: 2011-12
stream: IETF
area: sec
wg: hokey
