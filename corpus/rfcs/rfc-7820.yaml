id: rfc-7820
rfc_number: 7820
title: UDP Checksum Complement in the One-Way Active Measurement Protocol (OWAMP) and Two-Way Active Measurement Protocol (TWAMP)
authors:
    - name: T. Mizrahi
date: 2016-03
stream: IETF
area: ops
