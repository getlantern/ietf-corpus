abstract: 'The RSA Key Encapsulation Mechanism (RSA-KEM) algorithm is a one-pass (store-and-forward) cryptographic mechanism for an originator to securely send keying material to a recipient using the recipient''s RSA public key.  The RSA-KEM algorithm is specified in Clause 11.5 of ISO/IEC: 18033-2:2006.  This document specifies the conventions for using the RSA-KEM algorithm as a standalone KEM algorithm and the conventions for using the RSA-KEM algorithm with the Cryptographic Message Syntax (CMS) using KEMRecipientInfo as specified in RFC 9629.  This document obsoletes RFC 5990.'
