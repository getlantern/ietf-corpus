title: The Use of RSA/SHA-1 Signatures within Encapsulating Security Payload (ESP) and Authentication Header (AH)
authors:
    - name: B. Weis
date: 2006-01
stream: IETF
area: sec
wg: msec
current_status: PROPOSED STANDARD
