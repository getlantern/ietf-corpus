id: rfc-4638
rfc_number: 4638
title: Accommodating a Maximum Transit Unit/Maximum Receive Unit (MTU/MRU) Greater Than 1492 in the Point-to-Point Protocol over Ethernet (PPPoE)
authors:
    - name: P. Arberg
    - name: D. Kourkouzelis
    - name: M. Duckett
    - name: T. Anschutz
