id: rfc-9752
rfc_number: 9752
title: Conveying Vendor-Specific Information in the Path Computation Element Communication Protocol (PCEP) Extensions for Stateful PCE
authors:
    - name: C. Li
    - name: H. Zheng
    - name: S. Sivabalan
    - name: S. Sidor
