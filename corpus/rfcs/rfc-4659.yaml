title: BGP-MPLS IP Virtual Private Network (VPN) Extension for IPv6 VPN
authors:
    - name: J. De Clercq
    - name: D. Ooms
    - name: M. Carugi
    - name: F. Le Faucheur
date: 2006-09
stream: IETF
