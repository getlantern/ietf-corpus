id: rfc-8559
rfc_number: 8559
title: Dynamic Authorization Proxying in the Remote Authentication Dial-In User Service (RADIUS) Protocol
authors:
    - name: A. DeKok
    - name: J. Korhonen
date: 2019-04
stream: IETF
area: sec
wg: radext
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 21
abstract: RFC 5176 defines Change-of-Authorization (CoA) and Disconnect Message (DM) behavior for RADIUS.  RFC 5176 also suggests that proxying these messages is possible, but it does not provide guidance as to how that is done.  This specification updates RFC 5176 to correct that omission for scenarios where networks use realm-based proxying as defined in RFC 7542.  This specification also updates RFC 5580 to allow the Operator-Name attribute in CoA-Request and Disconnect-Request packets.
