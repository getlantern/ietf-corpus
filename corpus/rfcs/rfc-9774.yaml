id: rfc-9774
rfc_number: 9774
title: Deprecation of AS_SET and AS_CONFED_SET in BGP
authors:
    - name: W. Kumari
    - name: K. Sriram
    - name: L. Hannachi
    - name: J. Haas
date: 2025-05
