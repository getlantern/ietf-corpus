id: rfc-9385
rfc_number: 9385
title: Using GOST Cryptographic Algorithms in the Internet Key Exchange Protocol Version 2 (IKEv2)
authors:
    - name: V. Smyslov
date: 2023-05
stream: INDEPENDENT
current_status: INFORMATIONAL
publication_status: INFORMATIONAL
