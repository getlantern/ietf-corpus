page_count: 6
abstract: This document describes how to include CBOR Web Token (CWT) claims in the header parameters of any CBOR Object Signing and Encryption (COSE) structure.  This functionality helps to facilitate applications that wish to make use of CWT claims in encrypted COSE structures and/or COSE structures featuring detached signatures, while having some of those claims be available before decryption and/or without inspecting the detached payload.  Another use case is using CWT claims with payloads that are not CWT Claims Sets, including payloads that are not CBOR at all.
