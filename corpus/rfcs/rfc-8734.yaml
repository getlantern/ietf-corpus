id: rfc-8734
rfc_number: 8734
title: Elliptic Curve Cryptography (ECC) Brainpool Curves for Transport Layer Security (TLS) Version 1.3
authors:
    - name: L. Bruckert
    - name: J. Merkle
    - name: M. Lochter
date: 2020-02
stream: INDEPENDENT
