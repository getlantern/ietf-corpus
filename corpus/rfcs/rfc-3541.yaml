id: rfc-3541
rfc_number: 3541
title: A Uniform Resource Name (URN) Namespace for the Web3D Consortium (Web3D)
authors:
    - name: A. Walsh
date: 2003-05
stream: INDEPENDENT
current_status: INFORMATIONAL
