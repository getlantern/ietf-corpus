abstract: "Version 2 of the Internet Open Trading Protocol (IOTP) will extend\r\nthe interoperable framework for Internet commerce capabilities of\r\nVersion 1 while replacing the XML messaging and digital signature\r\npart of IOTP v1 with standards based mechanisms. Additional features\r\nare listed and divided into those the will, may, and will not be\r\nincluded."
