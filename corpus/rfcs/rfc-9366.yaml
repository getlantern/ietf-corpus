title: Multiple SIP Reason Header Field Values
authors:
    - name: R. Sparks
date: 2023-03
stream: IETF
area: art
wg: sipcore
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 4
abstract: The SIP Reason header field as defined in RFC 3326 allows only one Reason value per protocol value.  Experience with more recently defined protocols shows it is useful to allow multiple values with the same protocol value.  This document updates RFC 3326 to allow multiple values for an indicated registered protocol when that protocol defines what the presence of multiple values means.
