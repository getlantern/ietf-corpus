title: Selecting Labels for Use with Conventional DNS and Other Resolution Systems in DNS-Based Service Discovery
authors:
    - name: A. Sullivan
date: 2017-09
stream: IETF
area: int
wg: dnssd
current_status: INFORMATIONAL
