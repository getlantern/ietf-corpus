id: rfc-9646
rfc_number: 9646
title: Conveying a Certificate Signing Request (CSR) in a Secure Zero-Touch Provisioning (SZTP) Bootstrapping Request
authors:
    - name: K. Watsen
    - name: R. Housley
    - name: S. Turner
date: 2024-10
stream: IETF
area: ops
wg: netconf
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 32
abstract: This document extends the input to the "get-bootstrapping-data" RPC defined in RFC 8572 to include an optional certificate signing request (CSR), enabling a bootstrapping device to additionally obtain an identity certificate (e.g., a Local Device Identifier (LDevID) from IEEE 802.1AR) as part of the "onboarding information" response provided in the RPC-reply.
