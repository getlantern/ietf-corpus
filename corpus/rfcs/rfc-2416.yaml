id: rfc-2416
rfc_number: 2416
title: When TCP Starts Up With Four Packets Into Only Three Buffers
authors:
    - name: T. Shepard
    - name: C. Partridge
date: 1998-09
stream: IETF
area: tsv
wg: tcpimpl
