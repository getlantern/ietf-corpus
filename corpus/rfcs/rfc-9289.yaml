abstract: This document describes a mechanism that, through the use of opportunistic Transport Layer Security (TLS), enables encryption of Remote Procedure Call (RPC) transactions while they are in transit.  The proposed mechanism interoperates with Open Network Computing (ONC) RPC implementations that do not support it.  This document updates RFC 5531.
