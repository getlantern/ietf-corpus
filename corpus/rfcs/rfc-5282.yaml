id: rfc-5282
rfc_number: 5282
title: Using Authenticated Encryption Algorithms with the Encrypted Payload of the Internet Key Exchange version 2 (IKEv2) Protocol
authors:
    - name: D. Black
    - name: D. McGrew
date: 2008-08
stream: IETF
