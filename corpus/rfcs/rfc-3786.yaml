id: rfc-3786
rfc_number: 3786
title: Extending the Number of Intermediate System to Intermediate System (IS-IS) Link State PDU (LSP) Fragments Beyond the 256 Limit
authors:
    - name: A. Hermelin
    - name: S. Previdi
    - name: M. Shand
