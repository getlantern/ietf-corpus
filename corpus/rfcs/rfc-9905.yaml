id: rfc-9905
rfc_number: 9905
title: Deprecating the Use of SHA-1 in DNSSEC Signature Algorithms
authors:
    - name: W. Hardaker
    - name: W. Kumari
date: 2025-11
stream: IETF
area: ops
wg: dnsop
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 5
abstract: |-
    This document deprecates the use of the RSASHA1 and
    RSASHA1-NSEC3-SHA1 algorithms for the creation of DNS Public Key
    (DNSKEY) and Resource Record Signature (RRSIG) records.

    It updates RFCs 4034 and 5155 as it deprecates the use of these
    algorithms.
