id: rfc-8948
rfc_number: 8948
title: Structured Local Address Plan (SLAP) Quadrant Selection Option for DHCPv6
authors:
    - name: CJ. Bernardos
    - name: A. Mourad
date: 2020-12
stream: IETF
area: int
wg: dhc
