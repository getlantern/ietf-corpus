id: rfc-7619
rfc_number: 7619
title: The NULL Authentication Method in the Internet Key Exchange Protocol Version 2 (IKEv2)
authors:
    - name: V. Smyslov
    - name: P. Wouters
date: 2015-08
stream: IETF
area: sec
wg: ipsecme
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 12
abstract: This document specifies the NULL Authentication method and the ID_NULL Identification Payload ID Type for Internet Key Exchange Protocol version 2 (IKEv2).  This allows two IKE peers to establish single-side authenticated or mutual unauthenticated IKE sessions for those use cases where a peer is unwilling or unable to authenticate or identify itself.  This ensures IKEv2 can be used for Opportunistic Security (also known as Opportunistic Encryption) to defend against Pervasive Monitoring attacks without the need to sacrifice anonymity.
