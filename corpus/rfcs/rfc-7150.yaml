id: rfc-7150
rfc_number: 7150
title: Conveying Vendor-Specific Constraints in the Path Computation Element Communication Protocol
authors:
    - name: F. Zhang
    - name: A. Farrel
date: 2014-03
stream: IETF
area: rtg
wg: pce
