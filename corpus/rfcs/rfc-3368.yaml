id: rfc-3368
rfc_number: 3368
title: The 'go' URI Scheme for the Common Name Resolution Protocol
authors:
    - name: M. Mealling
date: 2002-08
stream: Legacy
current_status: PROPOSED STANDARD
publication_status: PROPOSED STANDARD
page_count: 8
abstract: "This document defines a URI scheme, 'go:' to be used with the Common\r\nName Resolution Protocol.  Specifically it lays out the syntactic\r\ncomponents and how those components are used by URI Resolution to\r\nfind the available transports for a CNRP service.  Care should be\r\ntaken with several of the URI components because, while they may look\r\nlike components found in other URI schemes, they often do not act\r\nlike them.  The 'go' scheme has more in common with the location\r\nindependent 'news' scheme than any other URI scheme."
