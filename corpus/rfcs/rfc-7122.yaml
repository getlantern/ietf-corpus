title: Datagram Convergence Layers for the Delay- and Disruption-Tolerant Networking (DTN) Bundle Protocol and Licklider Transmission Protocol (LTP)
authors:
    - name: H. Kruse
    - name: S. Jero
    - name: S. Ostermann
