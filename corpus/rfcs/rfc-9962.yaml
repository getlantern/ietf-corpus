title: A Decentralized Locator/ID Separation Protocol Mapping System (LISP-Decent)
authors:
    - name: D. Farinacci
    - name: C. Cantrell
date: 2026-05
stream: INDEPENDENT
current_status: INFORMATIONAL
publication_status: INFORMATIONAL
page_count: 15
abstract: |-
    This document describes how the Locator/ID Separation Protocol (LISP)
    Mapping System can be distributed for scale and decentralized for
    management, while maintaining trust among data plane nodes.  This is
    an Informational RFC and should be used by LISP-Decent
    implementations to interoperate with each other.
