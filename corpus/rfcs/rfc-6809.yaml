id: rfc-6809
rfc_number: 6809
title: Mechanism to Indicate Support of Features and Capabilities in the Session Initiation Protocol (SIP)
authors:
    - name: C. Holmberg
    - name: I. Sedlacek
    - name: H. Kaplan
date: 2012-11
stream: IETF
