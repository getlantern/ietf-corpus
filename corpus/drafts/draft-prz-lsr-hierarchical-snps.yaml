title: ISIS Hierarchical SNPs
abstract: |-
    The document presents an optional new type of SNP called a
       Hierarchical SNP (HSNP).  When feasible, it compresses traditional
       CSNP exchanges into a Merkle tree-like structure, which speeds up
       synchronization of large databases and adjacency numbers while
       reducing the load from regular CSNP exchanges during normal
       operation.
