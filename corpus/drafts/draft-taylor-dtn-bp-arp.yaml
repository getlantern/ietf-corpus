id: draft-taylor-dtn-bp-arp
name: draft-taylor-dtn-bp-arp
rev: "00"
title: BP Address Resolution Protocol
abstract: |-
    This document specifies the Bundle Protocol Address Resolution
       Protocol (BP-ARP), a mechanism for discovering the Node ID of a
       Bundle Protocol Agent (BPA) that is reachable at a known Convergence
       Layer (CL) address.  BP-ARP enables a BPA to resolve CL-layer
       adjacency into BP-layer peer relationships, bootstrapping higher-
       level protocols such as SAND.  This document updates RFC 9758 to
       allow externally received bundles destined to the LocalNode
       administrative endpoint for registered administrative record types.
