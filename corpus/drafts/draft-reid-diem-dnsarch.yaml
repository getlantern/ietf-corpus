title: DNS Architecture Considerations for Digital Emblems
abstract: |-
    It is expected that the Domain Name System (DNS) will be used to
       publish and retrieve Digital Emblems.  The objective of this Internet
       Draft is to propose an architecture on how the DNS could be used and
       outline the main challenges that will require work from the diem
       Working Group.  Publication of this document is intended to provoke
       discussion and analysis of how digital emblems can be deployed in the
       DNS.
