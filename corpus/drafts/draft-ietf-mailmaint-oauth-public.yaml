title: OAuth Profile for Open Public Clients
abstract: |-
    This document specifies a profile of the OAuth authorization protocol
       to allow for interoperability between native clients and servers
       using open protocols, such as JMAP, IMAP, SMTP, POP, CalDAV, and
       CardDAV.
