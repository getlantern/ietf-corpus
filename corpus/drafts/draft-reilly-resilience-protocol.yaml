title: 'Reilly Resilience Protocol (RRP): Tamper-Evident Proof of System Resilience'
abstract: |-
    The Reilly Resilience Protocol (RRP) standardizes a verifiable
       method to prove that IT systems, cloud infrastructures, and AI
       pipelines are continuously exercised and resilient.  RRP transforms
       resilience claims into cryptographically signed, tamper-evident
       evidence persisted in immutable storage and batched into a daily
       Merkle root that is publicly time-anchored on public blockchains.
       The protocol outputs an executive Resilience Scorecard backed by
       independently verifiable cryptographic receipts.  RRP composes with
       the Reilly EternaMark (REM) protocol to ensure dual-layer digital
       permanence using both DOI archival and blockchain timestamping.

       This document supersedes draft-reilly-resilience-protocol-00 and
       extends the protocol with a formal evidence schema, compliance
       mapping, a scoring algorithm specification, expanded threat model,
       implementation guidance, and key management requirements.  The
       foundational whitepaper underpinning this work (Reilly Resilience
       Protocol Whitepaper v2) is permanently archived at:
