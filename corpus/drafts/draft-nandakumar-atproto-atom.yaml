title: 'ATOM: AT Protocol Over MoQ Transport'
abstract: |-
    This document specifies how the Authenticated Transfer (AT) Protocol
       can leverage Media over QUIC Transport (MOQT) for efficient data
       synchronization across decentralized social networks.  The AT
       Protocol's firehose event stream and repository synchronization
       mechanisms map naturally to MOQT's publish/subscribe model, enabling
       scalable relay infrastructure, priority-based delivery, and improved
       resilience for large-scale social data distribution.

       This specification addresses the challenges of the current WebSocket-
       based transport and demonstrates how MOQT's relay architecture,
       group-based caching, and multiplexed streams provide significant
       benefits for AT Protocol deployments at scale.
