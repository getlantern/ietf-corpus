title: OAuth Trust Binding Extension (OTBE)
abstract: |-
    This document defines the OAuth Trust Binding Extension (OTBE), a
       mechanism allowing Resource Owners to explicitly authorize which
       Authorization Servers may assert their identity towards Relying
       Parties, mitigating silent impersonation and namespace-based
       identity capture.
