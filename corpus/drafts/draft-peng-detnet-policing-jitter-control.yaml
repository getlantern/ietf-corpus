title: Mechanism to control jitter caused by policing in Detnet
abstract: |-
    This document presents a noble mechanism to eliminate jitter caused
       by policing delay in a network.  It needs to be used in combination
       with a queueing mechanism that provides low jitter for the DetNet
       path, and ultimately provides a low jitter guarantee for the DetNet
       flow.
