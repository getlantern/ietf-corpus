rev: "08"
title: Hewlett Packard Enterprise's Secure Vector Routing (SVR)
abstract: |-
    This document describes Hewlett Packard Enterprise's Secure Vector
       Routing (SVR), an overlay inter-networking protocol that operates at
       the session layer.  SVR conveys end-to-end network requirements that
       cannot be expressed in network-layer headers by carrying application-
       layer cookies in the first packet of a session, eliminating the need
       for tunnel encapsulation and for non-overlapping underlay address
       spaces.  SVR traverses middleboxes and address translators between
       private networks, the IPv4 public Internet, and the IPv6 public
       Internet, and supports SD-WAN, multi-cloud, multicast, and dual-stack
       use cases while improving security at the routing plane.
