title: Framework for Agent Communications Internet Protocol (ACIP) based Agent Aware Networks
abstract: |-
    This document outlines the use case scenario, problems with existing
       solutions and framework for a proposed new protocol solution for (AI)
       Agent to (AI) Agent based communications infrastructure using a new
       protocol tentatively called "Agent Communications Internet Protocol"
       (ACIP).
