rev: "01"
title: Scale-Up Network Header (SUNH)
abstract: |-
    This document specifies the Scale-Up Network Header that is a concise
       and efficient network layer header.  The primary use case is high
       performance networking in limited domains, and in particular in
       scale-up networks for AI where even modest packet overhead packet may
       be detrimental to overall performance.
