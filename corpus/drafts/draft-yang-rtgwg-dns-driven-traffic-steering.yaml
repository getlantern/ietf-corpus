title: DNS driven traffic steering
abstract: |-
    The Internet provides best-effort service, and for users with quality
       assurance requirements, selecting an Internet acceleration service
       provider to gareentee network access quality is a common choice.
       This document proposes a possible mechanism for leveraging DNS to
       automatically steer application’s traffic onto an SRv6 network.
