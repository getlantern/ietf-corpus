title: Cross-Platform Policy Parental Control (X-PPC) for Household Governance
abstract: "This document defines the Cross-Platform Policy Parental Control\r\n   (X-PPC) protocol for consistent policy enforcement across\r\n   heterogeneous household endpoints including Desktop PCs, Mobile\r\n   Devices, Gaming Consoles, Handhelds, and Smart TVs.  X-PPC 1.0.0\r\n   specifies a 3-tier hybrid trust-chain architecture designed to enable\r\n   policy enforcement during periods of network unavailability.  The\r\n   protocol defines interoperable message formats, signature\r\n   requirements, and enforcement semantics that OS and device vendors\r\n   can implement using platform-appropriate mechanisms."
