title: The HiAE Authenticated Encryption Algorithm
abstract: |-
    This document describes HiAE, a high-throughput authenticated
       encryption algorithm designed for next-generation wireless systems
       (6G) and high-speed data transmission applications.

    Discussion Venues

       This note is to be removed before publishing as an RFC.

