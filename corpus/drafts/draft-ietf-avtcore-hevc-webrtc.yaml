id: draft-ietf-avtcore-hevc-webrtc
name: draft-ietf-avtcore-hevc-webrtc
rev: "08"
title: H.265 Profile for WebRTC
abstract: "RFC 7742 defines WebRTC video processing and codec requirements,\r\n   including guidance for endpoints supporting the VP8 and H.264 codecs,\r\n   which are mandatory to implement.  With support for H.265 under\r\n   development in WebRTC browsers, similar guidance is needed for\r\n   browsers considering support for the H.265 codec, whose RTP payload\r\n   format is defined in RFC 7798."
