title: Use of FN-DSA in TLS 1.3
abstract: |-
    NIST is standardizing FN-DSA as a post-quantum NTRU-lattice-based
       digital signature algorithm, which is expected to be published in
       FIPS 206.  This document specifies how FN-DSA can be negotiated for
       authentication in TLS 1.3 via the signature_algorithms and
       signature_algorithms_cert extensions.
