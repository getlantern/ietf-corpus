id: draft-dunbar-agent-attachment
name: draft-dunbar-agent-attachment
rev: "01"
title: Agent Attachment Protocol
abstract: |-
    This document describes the Agent Attachment Protocol (AAP)
       that enables AI agents to establish attachment to an edge
       node and derive communication and attachment-related
       properties. These properties include endpoint identifiers,
       supported communication mechanisms, and attachment context
       information that can be exposed to discovery systems. AAP
       focuses on how agents obtain and maintain attachment state
       and how attachment-derived properties can be represented in a
       consistent and interoperable manner. These properties can be
       used by forwarding functions at edge nodes and by routing or
       control-plane mechanisms to support communication between
       agents.
