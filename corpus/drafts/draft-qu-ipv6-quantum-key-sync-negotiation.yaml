title: Abstract
abstract: "This document provides a mechanism for synchronizing and negotiating quantum\r\nkeys by carrying quantum key information through IPv6 extension headers. The communicating parties\r\nselect the corresponding encryption and decryption keys from the quantum key library based\r\non the negotiation results, thereby achieving quantum-encrypted communication over IPv6\r\nnetwork. Internet-Drafts are draft documents valid for a maximum of six months and may be\r\nupdated, replaced, or obsoleted by other documents at  any time. It is inappropriate to\r\nuse Internet-Drafts as  reference material or to cite them other than as \"work in\r\nprogress.\""
