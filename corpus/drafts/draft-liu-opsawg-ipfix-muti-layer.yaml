name: draft-liu-opsawg-ipfix-muti-layer
rev: "02"
title: Export of Multiple Encapsulation Layer Information in IPFIX
abstract: |-
    This document analyzes the requirements and problems when monitoring
       flows with multi-layer network encapsulations.  This document aims to
       solve this problem by updating RFC7011 and introducing new IPFIX IEs
       for encapsulation layer indication.
