rev: "00"
title: Proof of Stateful Integrity (PSI) for Vulnerable Populations
abstract: |-
    This document specifies the PSI-04 Protocol, a cryptographic
       framework for establishing the Proof of Stateful Integrity (PSI)
       for data involving vulnerable subjects (e.g., Clinical Trial
       participants, NDIS recipients, and Aged Care residents).  The
       protocol mandates a verifiable "Chain of State" that prevents
       post-hoc data manipulation by ensuring the final submission is
       mathematically anchored to the point of inception.  PSI-04 utilizes
       Ed25519 signatures canonicalized via RFC 8785 and verified through
       a 3-node Multi-Party Computation (MPC) consensus mechanism.
