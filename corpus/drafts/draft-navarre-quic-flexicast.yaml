rev: "02"
title: 'Flexicast QUIC: combining unicast and multicast in a single QUIC connection'
abstract: |-
    This document proposes Flexicast QUIC, a simple extension to
       Multipath QUIC that enables a source to send the same information to
       a set of receivers using a combination of unicast paths and IP
       multicast distribution trees.
