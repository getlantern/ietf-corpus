title: The PrivateToken HTTP Authentication Scheme Extensions Parameter
abstract: |-
    This document specifies new parameters for the "PrivateToken" HTTP
       authentication scheme, called extensions.  The purpose of these
       extensions is to negotiate and carry public metadata for Privacy Pass
       protocols.
