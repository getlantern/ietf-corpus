id: draft-ietf-sshm-mlkem-hybrid-kex
name: draft-ietf-sshm-mlkem-hybrid-kex
rev: "10"
title: PQ/T Hybrid Key Exchange with ML-KEM in SSH
abstract: |-
    This document defines Post-Quantum Traditional (PQ/T) Hybrid key
       exchange methods based on the quantum-resistant Module-Lattice-Based
       Key-Encapsulation Mechanism (ML-KEM) standard and traditional
       Elliptic-curve Diffie–Hellman (ECDH) key exchange schemes.  These
       methods are defined for use in the SSH Transport Layer Protocol.
