name: draft-wdh-srv6ops-secservice
rev: "02"
title: ESP Protection for Services over SRv6
abstract: |-
    This document describes a mechanism for protecting selected service
       traffic using IPsec ESP while transporting the traffic over an SRv6
       domain.  The approach enables service payloads to be encrypted prior
       to SRv6 encapsulation, allowing the SRv6 header to remain visible for
       segment-based forwarding within the provider network.  This mechanism
       supports services or applications that require additional
       confidentiality and integrity protection, even when carried over an
       operator-managed SRv6 domain.
