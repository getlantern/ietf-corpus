title: 'UDPN: UDP Datagram Privacy Network Protocol Version 1.0'
abstract: |-
    This document specifies the UDP Datagram Privacy Network (UDPN)
       protocol, version 1.0.  UDPN provides an authenticated, encrypted
       Layer 3 tunnel over UDP with traffic obfuscation designed to resist
       deep packet inspection (DPI) and active probing.  All packets are
       wrapped in DTLS 1.2 ApplicationData records.  The protocol uses the
       Noise_NK handshake pattern with X25519 Diffie-Hellman and
       ChaCha20-Poly1305 AEAD encryption.
