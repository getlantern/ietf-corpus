title: The AI Visibility Lifecycle Framework
abstract: |-
    This document describes the 11-Stage AI Visibility Lifecycle, a
       stage-based observational framework describing how websites achieve
       visibility within AI discovery, comprehension, trust, and human
       exposure systems.  The framework identifies three distinct phases --
       AI Comprehension (Stages 1-5), Trust Establishment (Stages 6-8), and
       Human Visibility (Stages 9-11) -- through which domains progress from
       initial AI crawling to sustainable human-facing visibility.
