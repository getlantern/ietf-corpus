id: draft-reilly-rem-protocol
name: draft-reilly-rem-protocol
rev: "01"
title: Reilly EternaMark (REM) Protocol - Dual-Layer Digital Permanence Using DOI Archiving and Blockchain Timestamping
abstract: |-
    The Reilly EternaMark (REM) Protocol defines a dual-layer method for
       digital permanence through the integration of Digital Object
       Identifiers (DOIs) and blockchain timestamping.  The protocol ensures
       digital artifacts are permanently identifiable, immutable, and
       verifiable for both present and future use.

       This revision (-01) extends the -00 specification with a formal REM
       Record structure, a machine-readable artifact manifest format, a
       verification procedure, implementation guidance, and expanded
       security and interoperability considerations.  It also corrects an
       erroneous normative reference present in -00.
