id: draft-ietf-pim-ipv6-zeroconf-assignment
name: draft-ietf-pim-ipv6-zeroconf-assignment
rev: "10"
title: Zero-Configuration Assignment of IPv6 Multicast Addresses Using mDNS
abstract: |-
    This document describes a zero-configuration protocol for dynamically
       assigning IPv6 multicast addresses that are unique at the link-layer.
       Applications randomly assign multicast group IDs from a specified
       range and prevent collisions by using Multicast DNS (mDNS) to publish
       resource records under a new "eth-addr.arpa" domain.  This protocol
       satisfies all of the criteria listed in draft-ietf-pim-zeroconf-
       mcast-addr-alloc-ps.
