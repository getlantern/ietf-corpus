title: Secure SMTP/TLS SRV Announcement
abstract: |-
    This specification defines a DNS (RFC 1035) SRV (RFC 2782) record
       that announces TLS (RFC 9325) secured SMTP (RFC 5321, RFC 3207),
       optionally including Implicit TLS.
