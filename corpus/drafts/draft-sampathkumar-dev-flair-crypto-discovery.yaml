title: 'FLAIR: Framework for Language-Agnostic Discovery of Cryptographic Elements using Semantic Graphs'
abstract: |-
    This document introduces FLAIR (Framework for Language-Agnostic
       Intermediate Representation), a novel approach to discover
       cryptographic elements in source code.  By detecting encryption
       components present in code, FLAIR addresses critical challenges like
       identifying deprecated and misconfigured implementations across
       diverse programming languages.  Unlike language-specific tools, FLAIR
       employs semantic graphs to represent instances of encryption
       detected, enabling identification of cryptographic algorithm usage,
       associated parameters (keys, nonces, salts), and flag compliance
       status with established encryption standards.  The semantic graph
       approach makes representing cryptographic algorithms and related
       elements independent of the underlying programming language.
