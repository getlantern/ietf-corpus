title: Triageable Evidence Format (TEF)
abstract: |-
    This document defines the Triageable Evidence Format (TEF), a YAML-
       based format for structured vulnerability evidence submission.  TEF
       provides a standard way for security researchers to describe software
       defects so that triage systems, whether human or automated, can
       classify them without ambiguity.

       TEF combines YAML data structure with a Given/When/Then evidence
       model.  Each submission carries structured metadata, one or more
       evidence scenarios with preconditions, triggers, and observed
       outcomes, location data identifying where the defect exists, and
       reproduction artefacts proving its presence.

       TEF is an intake format.  It does not replace vulnerability
       publication formats (CVE, CSAF, OSV) or scan output formats (SARIF).
       It fills the gap between discovery and classification.
