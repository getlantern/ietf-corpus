title: Service Status Resource Format for Web Services
abstract: "This specification defines a standard JSON format for service status\r\n   resources. It provides a machine-readable format for overall service\r\n   health indicators, component-level status information with\r\n   criticality classification, geographic scope identification, and\r\n   structured incident reporting.  This standard enables\r\n   interoperability between status monitoring tools and service\r\n   providers."
