name: draft-ietf-mailmaint-pacc
rev: "02"
title: Automatic Configuration of Email, Calendar, and Contact Server Settings
abstract: |-
    This document specifies an automatic configuration mechanism for
       email, calendar, and contact user agent applications.  Service
       providers publish standardized configuration information that user
       agent applications retrieve and use to simplify server setup
       procedures.
