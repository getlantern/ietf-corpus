id: draft-gco-oauth-delegate-sd-jwt
name: draft-gco-oauth-delegate-sd-jwt
rev: "00"
title: Delegate SD-JWT
abstract: |-
    This document specifies an extension to Selective Disclosure JSON Web
       Tokens to support further delegation from the Holder to a Delegate
       Holder.  This is done by allowing the Key Binding JWT to also be an
       SD-JWT, optionally with its own Key Binding.  This has particular
       applicability to Agentic systems.
