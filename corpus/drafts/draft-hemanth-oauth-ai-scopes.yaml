title: OAuth 2.0 Extension for AI Model Access
abstract: "This document defines an extension to OAuth 2.0 for delegating scoped\r\n   access to AI model APIs.  It introduces a standardized scope syntax,\r\n   resource indicators for AI providers, and token constraints suitable\r\n   for AI workloads including spend limits and model restrictions."
