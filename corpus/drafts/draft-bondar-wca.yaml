id: draft-bondar-wca
name: draft-bondar-wca
rev: "00"
title: 'Warrant Certificate Authorities (WCA): Auditable Data Provenance for AI-Agent Tool-Call Chains'
abstract: |-
    Large Language Model (LLM)-based agent systems increasingly invoke
       external tools and data sources, yet the epistemic provenance of
       consumed data remains architecturally unregulated.  Data crossing
       tool-call boundaries acquires the apparent trustworthiness of the
       interface rather than reflecting the institutional standing of its
       actual source -- a phenomenon termed "semantic laundering."

       This document specifies the Warrant Certificate Authority (WCA): an
       end-to-end cryptographic attestation infrastructure that certifies
       data sources, not data content.  WCA introduces a provenance layer
       satisfying reference monitor properties (complete mediation,
       tamperproofness, verifiability) for all agent-to-tool interactions.
       The architecture draws on the PKI trust model, OS provenance
       paradigms (IMA, CamFlow, LPM), and supply-chain security frameworks
       (SLSA, in-toto).

       This document defines data structures for tool-call attestation,
       warrant certificates, and a trust hierarchy of certificate
       authorities.  It specifies the provenance-layer protocol and
       introduces Warrant Attestation Levels (WAL-0 through WAL-3) as a
       graduated adoption framework analogous to SLSA build levels.
