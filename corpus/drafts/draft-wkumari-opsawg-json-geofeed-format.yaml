id: draft-wkumari-opsawg-json-geofeed-format
name: draft-wkumari-opsawg-json-geofeed-format
rev: "00"
title: A JSON Format for Self-Published IP Geolocation Feeds
abstract: |-
    This document defines a JavaScript Object Notation (JSON) format for
       self-published IP geolocation feeds.  It updates RFC 8805 by
       transitioning from the current comma-separated values (CSV) format to
       a more expressive JSON format, addressing the need for operational
       extensibility.
