title: Digital Identity Certification for Personal Media (DICPM)
abstract: |-
    This document specifies the Digital Identity Certification for
       Personal Media (DICPM), a protocol for cryptographic certification of
       personal media, binding media integrity to identity and consent while
       enabling verifiable licensing terms and revocation.
