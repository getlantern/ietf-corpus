title: TESLA Update for GNSS SBAS Authentication
abstract: |-
    This document updates TESLA [RFC4082] to current cryptographic
       methods leveraging the work done by the International Civil Aviation
       Organization (ICAO) in their Global Navigation Satellite System
       (GNSS) Satellite-based augmentation system (SBAS) authentication
       protocol.  The TESLA updates are to align to this and other current
       best practices.
