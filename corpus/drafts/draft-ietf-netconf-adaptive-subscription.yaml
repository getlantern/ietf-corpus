id: draft-ietf-netconf-adaptive-subscription
name: draft-ietf-netconf-adaptive-subscription
rev: "18"
title: Adaptive Subscription to YANG Notifications
abstract: |-
    This document defines an experimental mechanism and its companion
       YANG data model to enable adaptive subscriptions to YANG
       notifications.  The publisher can dynamically adjust the periodic
       update interval based on the evaluation of pre-configured conditions
       (e.g., thresholds or expressions).  This allows for finer-grained
       telemetry by increasing update frequency when certain criteria are
       met, and reducing it otherwise.
