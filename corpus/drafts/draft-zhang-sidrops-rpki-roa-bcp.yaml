title: Best Current Practice for ROA Issuance Restrictions in RPKI
abstract: |-
    This document specifies best current practices for Resource Public
       Key Infrastructure (RPKI) operators regarding Route Origin
       Authorizations (ROAs).  It RECOMMENDS that a parent Certification
       Authority (CA) void issuing ROAs for Internet number resources
       delegated to a child CA.  RPKI certification authorities(CA software)
       and relying party software are expected to support these practices by
       appropiate warning.
