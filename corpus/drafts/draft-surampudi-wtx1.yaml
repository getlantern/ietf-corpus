title: 'WTX-1: Cross-Domain Context Preservation Protocol'
abstract: "This document defines the WTX-1 (WaiTag Transfer Protocol, version 1)\r\n   for preserving pseudonymous user context across unrelated web domains\r\n   without third-party cookies, browser fingerprinting, login\r\n   requirements, or personal data collection.  The protocol uses\r\n   cryptographically generated pseudonymous identifiers (WaiTags), URL\r\n   hash fragment transport, server-side verification, and DNS-based\r\n   domain authorization to enable privacy-respecting cross-domain\r\n   analytics."
