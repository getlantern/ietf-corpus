abstract: |-
    This document, draft-rehfeld-bot-service-index-08, is superseded by
       three successor Internet-Drafts that together constitute the APIX
       specification suite:

       *  draft-rehfeld-apix-core-00 — Core infrastructure, trust model, and
          Index API

       *  draft-rehfeld-apix-services-00 — Web API and bot service
          registration profile

       *  draft-rehfeld-apix-iot-00 — IoT device service registration
          profile

       Readers are directed to those documents.  This revision exists solely
       to document the supersession and to note two trust model updates that
       diverge from prior revisions.
