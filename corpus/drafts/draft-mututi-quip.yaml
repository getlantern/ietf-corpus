id: draft-mututi-quip
name: draft-mututi-quip
rev: "00"
title: QUIC Identity Protocol
abstract: "This document specifies QUIP (QUIC Identity Protocol), a federated\r\n   application protocol providing portable cryptographic identity,\r\n   verifiable server trust, deterministic state synchronization, and\r\n   built-in accountability.  QUIP runs over QUIC (RFC 9000) and uses a\r\n   strict deterministic CBOR profile (QUIP-CBOR).  Three conformance\r\n   profiles are defined: Basic (messaging), Documents (content\r\n   addressing), and Media (real-time transport).  The protocol enables\r\n   users to own a portable NodeId independent of service providers,\r\n   servers to authenticate via DANE+DNSSEC with deployable fallback\r\n   modes, and peers to detect and throttle misbehavior through signed\r\n   violation receipts propagated via gossip."
