id: draft-ietf-v6ops-nat64-wkp-1918
name: draft-ietf-v6ops-nat64-wkp-1918
rev: "02"
title: NAT64 WKP
abstract: |-
    This document removes the requirement introduced in Section 3.1 of
       RFC6052 that the NAT64 Well-Known Prefix 64:FF9B::/96 MUST NOT be
       used to represent non-global IPv4 addresses, such as those defined in
       [RFC1918] or listed in Section 3 of [RFC5735].  The proposed change
       enables IPv6-only nodes to reach IPv4-only services with non-global
       addresses by leveraging the Well-Known Prefix.
