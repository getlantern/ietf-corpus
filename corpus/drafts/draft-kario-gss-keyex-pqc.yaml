id: draft-kario-gss-keyex-pqc
name: draft-kario-gss-keyex-pqc
rev: "00"
title: GSS-API Key Exchange with hybrid ML-KEM
abstract: |-
    This document specifies additions to RFC4462.  It defines a new key
       exchange methods that use hybrid Post-Quantum Traditional (PQ/T) key
       exchange.  The purpose of this specification is to modernize the
       cryptographic primitives used by Generic Security Service (GSS) key
       exchanges.
