id: draft-jeskey-anml
name: draft-jeskey-anml
rev: "00"
title: Agentic Notation Markup Language (ANML) 1.0
abstract: |-
    ANML (Agentic Notation Markup Language) is a machine-first markup
       language for agent-to-agent and agent-to-service communication over
       the internet.  HTML provides visual interfaces for human consumption;
       ANML describes content, intent, and interaction patterns optimized
       for machine interpretation with minimal computational overhead.

       ANML defines an abstract data model that MAY be serialized as XML
       (application/anml+xml) or JSON (application/anml+json).  Both
       serializations are normative and semantically equivalent.  The XML
       serialization is recommended for human authoring and review; the JSON
       serialization is recommended for programmatic generation and agent-
       pipeline consumption.

       An ANML document defines:

       *  Content: structured, semantic information for machine
          interpretation

       *  Interactions: operations bound to HTTP methods, endpoints, and
          parameters

       *  Knowledge: bidirectional information exchange between services and
          agents

       *  Constraints: disclosure, consent, and authorization rules that
          agents MUST evaluate before sharing data

       *  State: metadata identifying the current phase of a multi-step
          interaction

       *  Persona: advisory behavioral and tonal guidance for agent
          responses

       ANML standardizes these elements to enable deterministic, efficient
       agent interactions with reduced reliance on inference over
       unstructured data.
