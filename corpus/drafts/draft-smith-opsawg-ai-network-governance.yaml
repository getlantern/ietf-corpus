id: draft-smith-opsawg-ai-network-governance
name: draft-smith-opsawg-ai-network-governance
rev: "00"
title: Governance Framework for AI-Mediated Autonomous Network Device Management
abstract: "This document defines a governance framework for systems that use\r\n   artificial intelligence (AI) services, specifically large language\r\n   models (LLMs), to autonomously detect, diagnose, and remediate\r\n   operational anomalies on network devices.  As AI-driven automation\r\n   moves from advisory tooling to closed-loop autonomous operation on\r\n   production infrastructure, the industry lacks a common set of\r\n   principles governing what such systems may and may not do.\r\n\r\n   This framework establishes thirteen governance areas covering\r\n   human authority, harm prevention, management plane protection,\r\n   minimum necessary action, bounded autonomy, transparency,\r\n   reversibility, graceful degradation, escalation, AI-specific\r\n   constraints, startup safety, absolute prohibitions, and review\r\n   processes.  It is intended to serve as a reference architecture\r\n   for implementers building AI-mediated network management systems\r\n   and for operators evaluating the safety properties of such systems."
