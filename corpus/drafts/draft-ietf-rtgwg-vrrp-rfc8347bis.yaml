title: A YANG Data Model for the Virtual Router Redundancy Protocol (VRRP)
abstract: |-
    This document describes a YANG data model for the Virtual Router
       Redundancy Protocol (VRRP).  Both versions 2 and 3 of VRRP are
       covered.

       The VRRP terminology has been updated to conform to inclusive
       language guidelines for IETF technologies.

       This document obsoletes RFC 8347.
