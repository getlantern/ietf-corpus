id: draft-ietf-netconf-http-client-server
name: draft-ietf-netconf-http-client-server
rev: "33"
title: YANG Groupings for HTTP Clients and HTTP Servers
abstract: |-
    This document presents three YANG 1.1 modules as follows.  The "iana-
       http-versions" module defines a YANG "typedef" for HTTP protocol
       versions.  The "ietf-http-client" module defines a YANG "grouping"
       for configuring an HTTP client's ability to communicate with an HTTP
       service endpoint.  The "ietf-http-server" module defines a "grouping"
       for configuring an HTTP server's service endpoints.
