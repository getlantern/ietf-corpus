title: Composite ML-DSA for use in Cryptographic Message Syntax (CMS)
abstract: |-
    Composite ML-DSA defines combinations of ML-DSA with RSA, ECDSA, and
       EdDSA.  This document specifies the conventions for using Composite
       ML-DSA algorithms within the Cryptographic Message Syntax (CMS).
