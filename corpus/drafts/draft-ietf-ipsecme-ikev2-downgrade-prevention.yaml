id: draft-ietf-ipsecme-ikev2-downgrade-prevention
name: draft-ietf-ipsecme-ikev2-downgrade-prevention
rev: "04"
title: Downgrade Prevention for the Internet Key Exchange Protocol Version 2 (IKEv2)
abstract: |-
    This document describes an extension to the Internet Key Exchange
       protocol version 2 (IKEv2) that prevents particular downgrade attacks
       on this protocol by having the peers confirm they have participated
       in the same conversation.

       This document updates RFC 7296.
