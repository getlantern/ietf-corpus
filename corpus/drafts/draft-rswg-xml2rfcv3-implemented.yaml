title: The RFCXML version 3 Vocabulary as Implemented
abstract: |-
    This is a tombstone for a document that described the RFCXML version
       3 vocabulary as it was previously implemented in tools used by the
       RFC Production Center.  There is no intention of publishing this
       Internet Draft as an RFC.  See the introduction for more information
       about this tombstone.
