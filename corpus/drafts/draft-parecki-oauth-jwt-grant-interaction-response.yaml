id: draft-parecki-oauth-jwt-grant-interaction-response
name: draft-parecki-oauth-jwt-grant-interaction-response
rev: "00"
title: JWT Authorization Grant Interaction Response
abstract: |-
    This document defines an extension to the JWT Authorization Grant
       [RFC7523] that enables an authorization server to indicate that user
       interaction is required in order to complete an authorization
       request.  Instead of returning an access token or an error, the
       authorization server returns a URI that the client launches where the
       user can interact with the authorization server, along with a polling
       interval.  The client can then poll for the access token or wait for
       a redirect before retrying the original request.
