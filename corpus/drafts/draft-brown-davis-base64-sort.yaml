id: draft-brown-davis-base64-sort
name: draft-brown-davis-base64-sort
rev: "01"
title: A Sortable Base64 Alphabet
abstract: |-
    This document details a formal specification for a new Base64
       alphabet which follows the US-ASCII ordering and sorts the same as
       binary.  This serves as an alternative variant to Base64 and
       Base64url when lexicographically sortable outputs are required.  The
       alphabet re-uses the Base64url special characters and is designed to
       be compatible with existing Base64 implementations, while providing a
       new option for applications that require sorted output.
