title: Considerations on Authoritative Information for Source Address Validation
abstract: |-
    Source Address Validation (SAV) prevents source address spoofing.
       This document explains that SAVNET relies on authoritative
       information.  It also describes how to handle missing or conflicting
       data.  The guidance minimizes improper blocks and improper permits
       while supporting reliable SAV enforcement.
