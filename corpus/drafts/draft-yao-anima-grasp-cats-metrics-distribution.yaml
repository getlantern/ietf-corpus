title: GRASP Extensions for CATS Metrics Distribution
abstract: |-
    Computing-Aware Traffic Steering (CATS) requires distribution of
       computing metrics across the network to enable efficient traffic
       steering decisions.  The Generic Autonomic Signaling Protocol (GRASP)
       provides a distributed approach for autonomic node discovery, state
       synchronization, and parameter negotiation in Autonomic Networking
       (AN).  This document defines extensions to the GRASP protocol to
       support the distribution of CATS metrics, by specifing the GRASP
       Objective definition for CATS metrics, structured encodings,
       distribution mechanisms tailored for dynamic and distributed network
       scenarios such as edge computing.
