title: Hierarchical ORCHID Management Entity (HOME) Interfaces for Registration & Differential Access Query
abstract: |-
    This document standardizes the interfaces of an ORCHID Management
       Entity (OME) to allow clients to register and query with differential
       access an Overlay Routable Cryptographic Hash Identifier (ORCHID)
       such as a Hierarchial Host Identity Tag (HHIT).  Existing
       technologies such as CBOR/JSON Object Signing & Encryption (COSE/
       JOSE) and Registration Data Access Protocol (RDAP) are selected to
       enable widespread interoperability.
