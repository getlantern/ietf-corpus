id: draft-ietf-mailmaint-unobtrusive-signatures
name: draft-ietf-mailmaint-unobtrusive-signatures
rev: "02"
title: Unobtrusive End-to-End Email Signatures
abstract: |-
    This document deals with end-to-end cryptographically signed email.
       It introduces a structure for signed email that is designed to avoid
       creating any disturbance in legacy email clients.  This "unobtrusive"
       signature structure removes disincentives for signing email.
