title: Vorim Agent Identity Protocol (VAIP)
abstract: |-
    This document defines the Vorim Agent Identity Protocol (VAIP), a
       standard for establishing verifiable cryptographic identity, fine-
       grained permissions, trust scoring, and tamper-evident audit trails
       for autonomous AI agents.

       As AI agents increasingly perform actions autonomously in enterprise
       systems, existing identity protocols designed for human users or
       static services are insufficient.  VAIP addresses this gap by
       providing cryptographic primitives and data structures for issuing,
       verifying, and managing agent identities in multi-tenant
       environments.

       The protocol uses Ed25519 for agent identity, SHA-256 for audit
       integrity, and defines seven hierarchical permission scopes with
       time-bounded grants and rate limiting.
