id: draft-bensley-rpsl-exclude-members
name: draft-bensley-rpsl-exclude-members
rev: "00"
title: Explicitly excluding objects from RPSL sets
abstract: |-
    This document updates [RFC2622] and [RFC4012] by defining the excl-
       members attribute on as-set and route-set classes in the Routing
       Policy Specification Language (RPSL).  The existing RPSL syntax only
       supports the implicit inclusion of everything contained within an as-
       set or route-set.  The newly defined attribute allows operators to
       overcome this limitation of the existing syntax by enabling them to
       explicitly exclude specific members from that implicit inclusion.
