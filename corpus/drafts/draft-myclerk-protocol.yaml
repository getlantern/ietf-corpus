title: 'The MyClerk Protocol: Tiered Security Communication for Distributed Family Systems'
abstract: "This document specifies the MyClerk Protocol, a tiered-security\r\n   communication protocol designed for distributed family orchestration\r\n   systems.  The protocol provides six security tiers ranging from\r\n   1-byte minimal overhead for tunneled messages to 144-byte full\r\n   security for critical operations.  It supports multiple transport\r\n   mechanisms including NATS, Matrix, WebSocket, and direct TCP, while\r\n   maintaining end-to-end encryption using ChaCha20-Poly1305 AEAD with\r\n   hybrid post-quantum key establishment combining ML-KEM-768 and\r\n   X25519.  A classical-only mode (X25519 without ML-KEM) remains\r\n   available for resource-constrained devices and legacy\r\n   interoperability.\r\n\r\n   The protocol is transport-agnostic, federation-capable, and optimized\r\n   for environments ranging from resource-constrained IoT devices to\r\n   full-featured desktop clients."
