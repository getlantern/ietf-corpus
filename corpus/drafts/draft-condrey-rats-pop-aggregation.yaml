title: 'Proof of Process: VDF Proof Aggregation Extension'
abstract: |-
    This document defines optional mechanisms for aggregating Verifiable
       Delay Function (VDF) proofs in Proof of Process Evidence packets.
       Aggregation enables O(1) or O(log n) verification of entire
       checkpoint chains that would otherwise require O(n) sequential VDF
       recomputation.  This extension supports Merkle tree aggregation and
       SNARK-based proof compression for high-volume verification scenarios.
