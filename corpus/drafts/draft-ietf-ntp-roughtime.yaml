title: Roughtime
abstract: |-
    This document describes Roughtime, an experimental protocol that aims
       to achieve two things: secure rough time synchronization even for
       clients without any idea of what time it is, and give clients a
       format for reporting any inconsistencies they observe between
       timeservers.  This document specifies the on-wire protocol required
       for these goals, and discusses aspects of the ecosystem needed for it
       to work.
