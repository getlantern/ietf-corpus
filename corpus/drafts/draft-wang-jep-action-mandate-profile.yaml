title: JEP Action Mandate Profile (JEP-AMP)
abstract: |-
    This document defines the JEP Action Mandate Profile (JEP-AMP), a
       profile of the Judgment Event Protocol (JEP).  JEP-AMP specifies how
       a JEP Delegation event can express a verifiable, bounded, revocable,
       and auditable mandate for an agent, human, organization, workflow, or
       system to perform an action on behalf of a principal.

       JEP-AMP does not redefine JEP-Core event verbs, signature semantics,
       event hash semantics, validation-level semantics, identity systems,
       credential systems, legal liability, regulatory sufficiency, payment
       clearing, or global authorization validity.  JEP-AMP defines the
       minimum interoperable shape of an Action Mandate Descriptor and
       profile-level rules by which relying parties, gateways, verifiers,
       and receipt systems can interpret a JEP Delegation event as a
       candidate action mandate under a stated trust, policy, profile, and
       relying-party context.
