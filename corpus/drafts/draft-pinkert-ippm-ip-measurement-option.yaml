id: draft-pinkert-ippm-ip-measurement-option
name: draft-pinkert-ippm-ip-measurement-option
rev: "03"
title: An IPv4 and IPv6 measurement option (MO) for hybrid flow measurements.
abstract: |-
    This document introduces an internet protocol (IP) measurement option
       (MO) that contains information, normally not available to the
       receiver of IP packets, to perform hybrid network measurements.  In
       particular, measurements that need a sender time stamp and a packet
       order number are then possible directly at the receiver.  The
       information contained in the IP MO can also be used by hosts en-route
       to perform slightly more limited hybrid network measurements.
