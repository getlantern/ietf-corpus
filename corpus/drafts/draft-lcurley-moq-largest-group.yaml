title: MoQ Largest Group Extension
abstract: |-
    This document defines a Largest Group subscription filter type for
       MoQ Transport [moqt].  A subscriber uses this filter to request
       delivery starting from the first object of the publisher's largest
       (most recent) group, ensuring a complete group is received.
