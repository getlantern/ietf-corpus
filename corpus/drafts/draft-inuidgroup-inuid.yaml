title: Internet Unique ID (INUID) Protocol Specification
abstract: |-
    This document specifies the Internet Unique ID (INUID) protocol, a
       128-bit network-layer protocol designed to decouple endpoint identity
       from topological location.  INUID introduces a hierarchical
       addressing model, fixed-size header layout, mandatory cryptographic
       source verification, and explicit support for mobility and
       multihoming without requiring upper-layer session re-establishment.

       INUID is intended to address several persistent weaknesses in
       contemporary internetworking, including inadequate source
       authenticity, unsustainable routing table growth, and the operational
       complexity of legacy transition mechanisms.  The protocol is designed
       for efficient hardware forwarding, strong anti-spoofing guarantees,
       and scalable inter-domain routing behavior.
