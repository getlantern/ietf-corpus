title: Output Schema Based on Cryptographic Bill of Materials (CBoM) for Post-Quantum Cryptography Usage
abstract: |-
    This document defines an output schema for inventorying cryptographic
       assets based on Cryptographic Bill of Materials (CBoM).  It
       highlights key differences between an inventoring schema and CBoM,
       identifies gaps, and proposes a unified schema that can leverage
       existing CycloneDX parameters to create a usable cryptographic asset
       inventory.
