title: A token-aware traffic steering solution for agent service
abstract: |-
    This document proposes a token-aware traffic steering mechanism.  By
       parsing estimated token length, task type, semantic urgency,
       and comprehensively incorporating network link status, model
       capabilities, and compute resource states into routing decisions,
       this mechanism achieves joint optimal scheduling of resources.
