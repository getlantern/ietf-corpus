id: draft-lu-rats-federated-attestation-infrastructure
name: draft-lu-rats-federated-attestation-infrastructure
rev: "00"
title: Federated Infrastructure Layer for Cross-Platform Device and Application Attestation
abstract: |-
    This document defines a federated infrastructure layer for cross-
       platform device and application attestation.

       The proposed architecture extends the Remote ATtestation ProcedureS
       (RATS) architecture [RFC9334] by introducing privacy-preserving
       federation, decentralized endorsement distribution, decentralized
       normalization of attestation claims, and software supply-chain
       provenance integration.

       The architecture enables interoperable attestation across
       heterogeneous operating systems, application ecosystems, and trust
       providers without requiring centralized platform ownership.

       This document defines architectural roles, protocol interactions,
       endorsement distribution semantics, provenance integration models,
       and privacy requirements.
