title: Community considerations on DNS WG structures at IETF
abstract: |-
    There has been an increasing level of discussion within the IETF
       about the best Working Group (WG) structures for handling the wide
       array of DNS work being conducted within the IETF.  Wes Hardaker was
       asked to gather information from the community at large through
       e-mail, hallway discussions, and meetings and create a small team to
       discuss potential structural changes to be shared with the community.
       This document describes the team’s aggregated findings, their derived
       recommendations, and topics where the team did not find sufficient
       commonality within the collected opinions.

       This document is published to retain the record for historic
       reference.
