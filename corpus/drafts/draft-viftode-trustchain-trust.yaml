title: Trust Computation for the TrustChain Bilateral Ledger Protocol
abstract: "This document specifies trust computation, delegation, and key\r\n   succession mechanisms for the TrustChain bilateral ledger protocol\r\n   (draft-pouwelse-trustchain-01).  The base protocol specifies a\r\n   bilateral block structure for recording pairwise interactions but\r\n   explicitly leaves trust computation out of scope.  This document\r\n   fills that gap by defining: (1) a canonical hash computation for\r\n   cross-implementation compatibility, (2) an interaction graph\r\n   constructed from half-block pairs, (3) a maximum network flow\r\n   algorithm (Edmonds-Karp) over the interaction graph for Sybil-\r\n   resistant trust scoring, (4) a composite trust score combining chain\r\n   integrity with network flow, (5) a delegation protocol for transitive\r\n   authority with budget splitting and revocation, and (6) a bilateral\r\n   succession protocol for key rotation."
