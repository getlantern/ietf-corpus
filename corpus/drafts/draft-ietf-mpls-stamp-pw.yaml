id: draft-ietf-mpls-stamp-pw
name: draft-ietf-mpls-stamp-pw
rev: "03"
title: Encapsulation of Simple Two-Way Active Measurement Protocol for LSPs and Pseudowires in MPLS Networks
abstract: |-
    This document describes the procedure for encapsulation of the Simple
       Two-Way Active Measurement Protocol (STAMP) defined in RFC 8762 and
       its optional extensions defined in RFC 8972 in MPLS networks.  Label
       Switched Paths (LSPs) and Pseudowires (PWs) are used in MPLS networks
       for various services including carrying Layer 2 and Layer 3 data
       packets and may optionally carry Control Word (CW).  The procedure is
       also described to encapsulate the STAMP test packets with or without
       using an IP/UDP header for the LSPs and PWs that carry CW.
