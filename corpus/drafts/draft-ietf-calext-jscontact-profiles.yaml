id: draft-ietf-calext-jscontact-profiles
name: draft-ietf-calext-jscontact-profiles
rev: "14"
title: Protocol-Specific Profiles for JSContact
abstract: |-
    This document defines JSContact profiles, an IANA registry for named
       subsets of JSContact elements.  It aims to facilitate using JSContact
       in context of contact data exchange protocols or other use cases, in
       which supporting all JSContact semantics might be inappropriate.
