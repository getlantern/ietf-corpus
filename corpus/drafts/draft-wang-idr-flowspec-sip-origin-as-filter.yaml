title: Source-IP-Origin-AS Filter for BGP Flow Specification
abstract: |-
    This document defines an extension to the Border Gateway Protocol
       (BGP) Flow Specification (FlowSpec) to enable filtering based on the
       Origin Autonomous System (AS) of the source IP address.  This
       extension is particularly useful in mitigating Distributed Denial of
       Service (DDoS) attacks where the source IP addresses are dynamic but
       belong to a specific source AS.
