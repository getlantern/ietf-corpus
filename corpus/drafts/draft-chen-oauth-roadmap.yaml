id: draft-chen-oauth-roadmap
name: draft-chen-oauth-roadmap
rev: "01"
title: A Comprehensive Roadmap for OAuth 2.0 Standards and Drafts
abstract: |-
    The OAuth 2.0 ecosystem has expanded significantly since the
       publication of RFC 6749, resulting in a complex landscape of
       extensions, security best practices (BCPs), and application-specific
       profiles.  This complexity can be daunting for implementers,
       architects, and security auditors.  This document serves as a
       comprehensive roadmap to navigate this landscape.  It categorizes key
       RFCs and active Internet-Drafts into functional areas, explains the
       relationships between them, and provides context on their evolution.
       The goal is to help readers understand the current state-of-the-art,
       select the appropriate specifications for their use cases, and follow
       the latest security best practices, while also offering a glimpse
       into the future directions of the framework.
