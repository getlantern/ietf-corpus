title: Extended Diagnostic Notation (EDN) Use with Transport Layer Security (TLS) Presentation Language (PL) Objects
abstract: |-
    Extended Diagnostic Notation was designed as a superset of JSON to
       represent CBOR instance documents in human-readable format.  This
       document describes how it can be used to represent instances encoded
       using the TLS Presentation Language.
