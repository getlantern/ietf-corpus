title: Security Considerations for Computing-Aware Traffic Steering
abstract: |-
    Computing-Aware Traffic Steering (CATS) inherits potential security
       vulnerabilities from the network, computing nodes as well as
       workflows of CATS.  This document describes various threats and
       security concerns related to CATS and existing approaches to solve
       these threats.
