id: draft-ietf-netconf-yp-transport-capabilities
name: draft-ietf-netconf-yp-transport-capabilities
rev: "06"
title: YANG Notification Transport Capabilities
abstract: |-
    This document specifies a YANG module for YANG notifications
       transport capabilities which augments the notification capabilities
       model.  The module provides YANG notifications transport protocol,
       transport encoding, and transport encryption system capabilities for
       transport-specific notification.  This YANG module can be used by the
       client to learn capability information from the server at runtime or
       at implementation time, by making use of the YANG instance data file
       format.
