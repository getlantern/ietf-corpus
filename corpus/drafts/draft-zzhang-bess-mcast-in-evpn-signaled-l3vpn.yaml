title: Multicast in L3VPNs Signaled by EVPN SAFI
abstract: |-
    RFC9136 specifies an EVPN SAFI Type-5 route that can be used to
       signal L3VPNs.  This document specifies procedures for multicast in
       such an L3VPN.
