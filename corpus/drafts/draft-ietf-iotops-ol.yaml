id: draft-ietf-iotops-ol
name: draft-ietf-iotops-ol
rev: "02"
title: Ownership and licensing statements in YANG
abstract: |-
    This memo provides for an extension to RFC 8520 (Manufacturer Usage
       Description Specification, MUD) that allows MUD file authors to
       specify ownership and licensing of MUD files themselves.  This memo
       updates RFC 8520.  However, it can also be used for purposes outside
       of MUD, and the grouping is structured as such.
