name: draft-li-cats-idn
rev: "00"
title: A Framework of Intelligence Delivery Network (IDN) for Deep Learning Inference
abstract: |-
    The rapid growth of deep learning inference workloads is placing
       increasing pressure on existing Internet and computing
       infrastructures.  To support latency-aware, privacy-enhanced, and
       scalable inference services, this document introduces the concept of
       Intelligence Delivery Network (IDN), in which models with different
       inference capabilities are deployed across geographically distributed
       servers and selected to serve inference requests.  This document
       describes the challenges motivating such networks, presents an
       architectural framework, and defines a common vocabulary for
       discussing the systems.  This document does not specify protocol
       details, which are left to future documents.
