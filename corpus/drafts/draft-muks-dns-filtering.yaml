name: draft-muks-dns-filtering
rev: "05"
title: EDNS options for filtering information
abstract: |-
    This memo documents EDNS options and methods that can be used to
       return information about filtered, blocked, or censored DNS
       responses.  It complements the information provided in EDNS Extended
       DNS Error options [RFC8914].
