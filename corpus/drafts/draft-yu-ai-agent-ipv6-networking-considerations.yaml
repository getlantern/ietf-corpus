title: IPv6 Networking Considerations for AI Agent Communication
abstract: |-
    AI agents are increasingly expected to communicate across platforms,
       organizations, clouds, edge environments, and administrative domains.
       Ongoing work on agent protocols has started to address agent
       description, discovery, authentication, authorization, invocation,
       delegation, and collaboration.  These functions are essential, but
       they generally treat the IP network as a transparent connectivity
       substrate.

       This document discusses IPv6 networking considerations for AI agent
       communication.  It focuses on networking support after an agent has
       been discovered by an application-layer or control-plane mechanism.
       It discusses how stable Agent identifiers can be associated with IPv6
       locators or Agent Gateways, how agent communication requirements can
       be mapped to IPv6 or SRv6 forwarding policies, how limited agent-
       related network context can be carried within controlled deployment
       environments, and how network-layer telemetry can complement
       application-layer audit records.

       This document does not define a new agent discovery protocol, a new
       application-layer agent collaboration protocol, or a new
       authentication or authorization mechanism.  It is intended to be
       complementary to existing and emerging agent discovery, identity,
       authorization, auditing, and collaboration mechanisms.
