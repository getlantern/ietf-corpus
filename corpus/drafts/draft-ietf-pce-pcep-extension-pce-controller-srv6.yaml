id: draft-ietf-pce-pcep-extension-pce-controller-srv6
name: draft-ietf-pce-pcep-extension-pce-controller-srv6
rev: "06"
title: PCE Communication Protocol (PCEP) Extensions for Using the PCE as a Central Controller (PCECC) for Segment Routing over IPv6 (SRv6) Segment Identifier (SID) Allocation and Distribution.
abstract: |-
    The Path Computation Element (PCE) is a core component of Software-
       Defined Networking (SDN) systems.  A PCE-based Central Controller
       (PCECC) can simplify the processing of a distributed control plane by
       blending it with elements of SDN without necessarily completely
       replacing it.

       This document specifies the procedures and Path Computation Element
       Communication Protocol (PCEP) extensions when a PCE-based controller
       is also responsible for configuring the forwarding actions on the
       routers, in addition to computing the paths for packet flows in an
       SRv6 (SR in IPv6) network and telling the edge routers, what
       instructions to attach to packets as they enter the network.  PCECC
       is further enhanced for SRv6 Segment Identifier (SID) allocation and
       distribution.
