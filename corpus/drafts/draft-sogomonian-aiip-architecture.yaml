rev: "04"
title: Architecture for the Artificial Intelligence Internet Protocol
abstract: |-
    This document defines the architectural model for the Artificial
       Intelligence Internet Protocol (AIIP).  AIIP defines a dedicated
       autonomous access plane for execution-capable systems, enabling
       delegated, stateless execution of real-world actions using a resolve-
       invoke-execute-receipt pattern over authenticated transports.

       AIIP is not a discovery, registration, orchestration, or control-
       plane protocol.  It defines the architectural boundary at which
       autonomous execution is recognized and cryptographically verifiable
       through execution receipts.
