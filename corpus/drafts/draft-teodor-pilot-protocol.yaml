title: 'Pilot Protocol: An Overlay Network for Autonomous Agent Communication'
abstract: |-
    This document specifies Pilot Protocol, an overlay network that
       provides autonomous AI agents with virtual addresses, port-based
       service multiplexing, reliable and unreliable transport, NAT
       traversal, encrypted tunnels, and a bilateral trust model.  Pilot
       Protocol operates as a network and transport layer beneath
       application-layer agent protocols such as A2A and MCP.  It
       encapsulates virtual packets in UDP datagrams for transit over the
       existing Internet.  The protocol gives agents first-class network
       citizenship --- stable identities, reachable addresses, and standard
       transport primitives --- independent of their underlying network
       infrastructure.
