title: Considerations for Protective DNS Server Operators
abstract: "Protective DNS is a defense mechanism deployed on recursive resolvers\r\n   to prevent users from accessing malicious domains.  For domain names\r\n   in the blocklist, it rewrites DNS resolution responses to point to\r\n   secure destinations (e.g., safe servers) to prevent users from\r\n   accessing malicious entities.\r\n\r\n   Owing to its effective defenses against common cyber attack\r\n   behaviors—such as command-and-control (C2) communications of\r\n   malware—Protective DNS deployment has surged via various initiatives.\r\n   Not only have renowned DNS service providers adopted this defense,\r\n   but some countries have also launched national-scale deployments.\r\n   Meanwhile, studies analyzing Protective DNS have identified\r\n   implementation diversity.\r\n\r\n   Thus, this document aims to provide specific operational and security\r\n   considerations for Protective DNS.  It is intended primarily for\r\n   entities seeking to deploy Protective DNS for defensive purposes,\r\n   offering deployment and security considerations."
