id: draft-callec-api-advisory
name: draft-callec-api-advisory
rev: "00"
title: A Well-Known URI for API Change Advisories
abstract: |-
    This document defines a well-known URI, /.well-known/api-
       advisory.json, at which API providers MAY publish a machine-readable
       JSON file listing change advisories that affect their API.  The file
       enables automated scanners and API consumers to discover pricing
       changes, deprecations, security advisories, and other relevant events
       without relying on manual monitoring of blogs or mailing lists.
