rev: "05"
title: HTTP Problem Types for Digest Fields
abstract: |-
    This document specifies HTTP problem types that servers can use in
       responses to problems encountered while dealing with a request
       carrying integrity fields and integrity preference fields.  Using an
       HTTP problem type, the server can provide machine-readable error
       details to aid debugging or error reporting.
