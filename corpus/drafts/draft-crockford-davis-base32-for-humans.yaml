title: Base32 for Humans
abstract: |-
    This document details the formal specification of Base32 for Humans;
       an alternate Base32 alphabet which extends the "Handled by Humans"
       text found in Section 3.4 of RFC 4648.  This base features an
       alphabet curated for expressing numbers in a form that can be
       conveniently and accurately transmitted between humans and computer
       systems.
