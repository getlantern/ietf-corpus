id: draft-eip-headers-definitions
name: draft-eip-headers-definitions
rev: "00"
title: Extensible In-band Processing (EIP) Headers Definitions
abstract: |-
    This document discusses the format of EIP protocol elements and the
       transport of EIP in different IPv6-based protocol headers.

       In particular, this document defines the standalone EIP formats for
       the IPv6 Hop-by-Hop Options Header and for the Segment Routing
       Header, and it defines the generic format of EIP Information
       Elements.  Other approaches to transport EIP, including integration
       with the IOAM framework through the Global Opaque Block (GOB), are
       described in separate documents.

       Caveat: this document is still in brainstorming stage, it is
       distributed to stimulate discussion.
