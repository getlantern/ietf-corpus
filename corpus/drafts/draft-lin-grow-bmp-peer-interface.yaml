id: draft-lin-grow-bmp-peer-interface
name: draft-lin-grow-bmp-peer-interface
rev: "01"
title: Extension for BMP Peer Interface
abstract: |-
    This document introduces an option to allow BMP messages with the
       per-peer header to carry interface information for the established
       peer session, especially in order to distinguish BGP peers
       established based on interfaces.
