title: Data Plane Failure Detection Mechanisms for EVPN over SRv6
abstract: |-
    For MPLS EVPN, RFC9489 specifies the mechanisms for detecting data
       plane failures using LSP Ping.  This document proposes a similar
       mechanism to detect data plane failures for EVPN over SRv6.
