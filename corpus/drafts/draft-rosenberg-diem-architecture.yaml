title: Digital Emblems - Architectural Considerations
abstract: |-
    This document explores architectural considerations for digital
       emblems as discussed in the DIEM working group.  It is intended to
       complement the use cases and requirements in [DIEM-REQS] by sketching
       one way to think about how the pieces of a DIEM architecture might
       fit together.  This document does not seek to propose a specific
       architecture.  It instead captures the author's current mental model
       to help inform the requirements process and subsequent architectural
       work.
