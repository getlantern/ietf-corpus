title: JEP Conformance and Test Suite
abstract: |-
    This document defines conformance classes, validation-result structure,
    schema requirements, test-vector categories, reference-validator behavior,
    and implementation testing guidance for the Judgment Event Protocol
    (JEP). It is a companion to draft-wang-jep-judgment-event-protocol-06.

    The purpose of this document is to make JEP implementations testable,
    interoperable, and auditable across languages, platforms, identity
    systems, and deployment profiles.

