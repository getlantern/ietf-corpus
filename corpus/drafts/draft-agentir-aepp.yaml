id: draft-agentir-aepp
name: draft-agentir-aepp
rev: "00"
title: Agent Execution and Payment Protocol (AEPP)
abstract: |-
    This document defines the Agent Execution and Payment Protocol
       (AEPP), a standardized protocol layer for executing AI agents and
       verifying payment for agent tasks on the open internet.  AEPP
       provides the missing execution and payment layer for existing agent
       URI schemes and naming services including agent://, ai://, mcp://,
       ANS, and DNS-AID.  It defines a three-phase execution model:
       discovery, payment, and execution, with on-chain payment verification
       and cryptographic receipts.  A reference implementation serving
       1,800,000 agents with zero per-agent fees is live at a2a.agentir.com.
