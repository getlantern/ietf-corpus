title: Problem Statement for an AI-Session-ID in SIP
abstract: |-
    This document describes a signaling-layer correlation gap in SIP-
       based real-time AI voice systems.  Existing SIP identifiers provide
       dialog and communication-session scope, but they do not define a
       stable application-layer identifier capable of persisting across
       topology changes, multi-dialog call control operations, federated
       interconnects, or distributed processing environments.

       The document analyzes current mechanisms and their limitations, and
       motivates the need for a standardized SIP-carried identifier whose
       semantics are restricted to application-layer correlation and out-of-
       band context retrieval.
