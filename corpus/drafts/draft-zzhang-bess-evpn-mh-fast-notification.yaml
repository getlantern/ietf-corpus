id: draft-zzhang-bess-evpn-mh-fast-notification
name: draft-zzhang-bess-evpn-mh-fast-notification
rev: "00"
title: EVPN Fast Notification and Handling for Multihoming
abstract: |-
    EVPN supports powerful multihoming features, but it depends on the
       timely notification and handling of link going down or coming up on
       multihomed Ethernet Segments, which may not be guaranteed by the
       nature of control plane BGP signaling.  When the handling is delayed,
       traffic duplication or loss may happen.  This document specifies a
       UDP-based notification that can be originated and processed (near)
       instantly, greatly eliminate the potential traffic duplication or
       loss.
