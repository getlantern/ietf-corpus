title: Media over QUIC Transport (MOQT) over QMux
abstract: |-
    This document specifies how Media over QUIC Transport (MOQT) can
       operate over QMux, enabling MOQT applications to function over
       reliable byte-oriented streams such as TCP with TLS.  By utilizing
       QMux as an intermediate layer, MOQT deployments gain the ability to
       fall back to TCP-based transport when UDP is blocked or unreliable,
       while maintaining API compatibility with QUIC-native implementations.
       This document analyzes the benefits and trade-offs of this approach
       and provides implementation guidance for deploying MOQT over QMux.
