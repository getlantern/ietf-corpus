document: rfc-9038
kind: normative-requirement
summary: The unhandled namespace approach MUST be used if there is unhandled namespace information included in a <poll> response. Because poll messages are inserted independent of the client's login services, the server must use <extValue> wrapping for any unhandled object-level or command-response extensions in poll responses.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
