document: rfc-7601
kind: protocol-element
summary: 'DKIM (''dkim'' method) and DomainKeys (''domainkeys'' method) share a common result set: none (not signed), pass (signed and verified), fail (signed but verification failed), policy (signature not acceptable to ADMD), neutral (signature had syntax errors or processing failure), temperror (transient verification error), permerror (unrecoverable verification error).'
section: 2.7.1
topics:
