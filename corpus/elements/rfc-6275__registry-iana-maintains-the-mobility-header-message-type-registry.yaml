summary: IANA maintains the Mobility Header message type registry (MH Type field, 8-bit). Values 0-8 are assigned by this document (BRR, HoTI, CoTI, HoT, CoT, BU, BA, BE, and one additional). New values require IETF Review or IESG Approval.
