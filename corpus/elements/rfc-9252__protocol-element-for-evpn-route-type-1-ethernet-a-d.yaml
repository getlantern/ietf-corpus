document: rfc-9252
kind: protocol-element
summary: For EVPN Route Type 1 (Ethernet A-D per ES) over SRv6 core, the 24-bit ESI Label field of the ESI Label extended community carries the whole or a portion of the Argument part of the SRv6 SID (Transposition Length ≤ 24 ≤ AL) when ESI filtering is used; otherwise set to Implicit NULL (0x000030). The Service SID SHOULD use End.DT2M behavior and signals the Arg.FE2 SID Argument.
section: 6.1.1
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
