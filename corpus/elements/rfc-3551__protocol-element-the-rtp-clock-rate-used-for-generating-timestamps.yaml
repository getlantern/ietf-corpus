document: rfc-3551
kind: protocol-element
summary: The RTP clock rate used for generating timestamps is independent of the number of channels and equals the number of sampling periods per second. For multi-channel audio, information from lower-numbered channels precedes higher-numbered channels within RTP packets, following AIFF-C ordering conventions.
section: "4.1"
topics:
    - rtp
    - realtime
