document: rfc-9107
kind: normative-requirement
summary: To achieve optimal routing between clients of different clusters, all route reflectors must learn all paths eligible for consideration. BGP ADD-PATH (RFC 7911) needs to be deployed between route reflectors to satisfy this requirement.
