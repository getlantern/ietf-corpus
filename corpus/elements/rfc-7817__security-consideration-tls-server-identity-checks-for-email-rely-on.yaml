document: rfc-7817
kind: security-consideration
summary: TLS server identity checks for email rely on trustworthy DNS hostnames as reference identifiers. Such trustworthy names must be either manually entered, explicitly user-confirmed, or derived via a secure service such as DNSSEC-protected SRV records. Future work may integrate DANE (RFC 6698) for stronger binding.
section: "8"
topics:
    - tls
    - email
    - security
    - dns
