document: rfc-2681
kind: protocol-element
summary: Test packet padding MUST be filled with randomized bits to avoid situations where measured delay is artificially lower due to compression techniques along the path. The packet must contain identifying information (e.g., the send timestamp) so that the response can be matched.
section: "2.6"
topics:
    - measurement
