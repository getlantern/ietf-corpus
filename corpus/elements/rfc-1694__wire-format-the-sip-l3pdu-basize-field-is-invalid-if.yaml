document: rfc-1694
kind: wire-format
summary: The SIP L3PDU BAsize field is invalid if its value is less than 32, exceeds 9220 octets without CRC32 or 9224 octets with CRC32, or is not a multiple of 4 octets. The Header Extension Length field must equal 3, and each Header Extension element length must not exceed 12.
section: "4.6"
topics:
