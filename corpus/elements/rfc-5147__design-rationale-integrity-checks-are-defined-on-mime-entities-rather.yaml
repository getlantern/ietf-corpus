document: rfc-5147
kind: design-rationale
summary: Integrity checks are defined on MIME entities rather than on the resource itself because fragment identifiers are evaluated client-side after retrieval. Content-encodings and transfer-encodings must be stripped before computing or verifying integrity check values.
section: "2.3"
extracted_by: claude-sonnet-4-6
