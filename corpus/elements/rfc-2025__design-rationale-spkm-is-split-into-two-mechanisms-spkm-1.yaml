document: rfc-2025
kind: design-rationale
summary: 'SPKM is split into two mechanisms: SPKM-1 uses random numbers for replay detection during context establishment (usable without secure timestamps), while SPKM-2 uses timestamps. This allows deployment in environments where secure time is not available.'
