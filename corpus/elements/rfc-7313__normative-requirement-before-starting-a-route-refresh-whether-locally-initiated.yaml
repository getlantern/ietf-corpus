document: rfc-7313
kind: normative-requirement
summary: Before starting a route refresh (whether locally initiated or in response to a peer request), the speaker MUST send a BoRR message. After completing re-advertisement of the entire Adj-RIB-Out, it MUST send an EoRR message.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
