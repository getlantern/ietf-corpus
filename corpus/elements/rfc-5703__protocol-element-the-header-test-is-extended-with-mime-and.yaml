document: rfc-5703
kind: protocol-element
summary: The 'header' test is extended with ':mime' and ':anychild' tagged arguments. ':mime' enables parsing of MIME header lines; ':anychild' (only valid with ':mime') causes the test to examine all nested MIME body parts rather than just the current part.
section: "4.1"
