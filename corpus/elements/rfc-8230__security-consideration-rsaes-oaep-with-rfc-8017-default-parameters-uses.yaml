document: rfc-8230
kind: security-consideration
summary: RSAES-OAEP with RFC 8017 default parameters uses SHA-1, which is included for interoperability as the most widely implemented OAEP parameter choice. Keys with low private exponent values MUST NOT be used as they are vulnerable to known attacks on the RSA cryptosystem.
section: "6.3"
topics:
    - security
    - crypto
