document: rfc-5749
kind: protocol-element
summary: 'Three KDE scenarios exist based on key type: (1) EAP/AAA server delivers USRK to USR-KH; (2) EAP/AAA server delivers DSRK to DSR-KH; (3) DSR-KH delivers DSUSRK to DSUSR-KH within a domain. Scenarios 2 and 3 can be combined into a single round-trip exchange.'
section: "4.2"
