document: rfc-6738
kind: protocol-element
summary: The IKEv2-SK-Request (IKESKR) command uses Command Code 329 with the 'R' bit set and Application-Id 11. It is sent from the IKEv2 server to the HAAA to initiate IKEv2 with SK authorization, and MUST include IKEv2-Nonces and IKEv2-Identity AVPs.
section: "5.1"
topics:
    - diameter
    - ipsec
