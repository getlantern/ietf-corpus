document: rfc-5222
kind: normative-requirement
summary: LoST over HTTP uses the POST method. HTTP requests MUST include the Cache-Control 'no-cache' directive to prevent stale responses from HTTP caches. All LoST responses, including errors and warnings, are carried in HTTP 2xx responses.
section: "14"
rfc2119_level: MUST
topics:
    - http
    - realtime
