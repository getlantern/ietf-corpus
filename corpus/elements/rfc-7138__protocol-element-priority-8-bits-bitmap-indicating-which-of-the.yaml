document: rfc-7138
kind: protocol-element
summary: 'Priority (8 bits): Bitmap indicating which of the 8 priority levels (0 = highest, 7 = lowest) are advertised in the sub-TLV. A bit MUST be set for each represented priority, and at least one priority MUST be advertised which SHALL be priority 0 unless overridden by local policy.'
section: 4.1.3
topics:
    - routing
