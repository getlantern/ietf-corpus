document: rfc-3658
kind: security-consideration
summary: The DS protocol change requires the same parent-child authentication as RFC 2535, but allows the child greater local control over its KEY RRset. Implementations that do not understand DS will consider all DS-secured zones as unsecure, undermining the chain of trust.
section: "4"
topics:
    - dns
    - security
