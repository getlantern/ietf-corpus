document: rfc-2878
kind: design-rationale
summary: Tinygram Compression is provided because Ethernet-bridged protocols most likely to be bridged over low-speed (64 kbps and below) lines pad PDUs with zero octets to meet the 802.3 minimum frame size, making compression by zero-stripping straightforward and effective for interactive session traffic.
section: "3.3"
