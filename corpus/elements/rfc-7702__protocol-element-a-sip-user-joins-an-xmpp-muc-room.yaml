document: rfc-7702
kind: protocol-element
summary: A SIP user joins an XMPP MUC room by sending a SIP INVITE containing an SDP offer with an MSRP media line, mandatory 'path' and 'chatroom' attributes, and an 'accept-types' attribute specifying support for Message/CPIM. The SIP-to-XMPP gateway then sends a directed XMPP presence stanza to the MUC room.
section: "6.1"
topics:
    - sip
    - realtime
