summary: ESIGN-SHA* SignatureMethods (SHA-1, SHA-224, SHA-256, SHA-384, SHA-512) are defined via URIs http://www.w3.org/2001/04/xmldsig-more#esign-sha*. ESIGN is based on integer factorization and is faster than previous digital signature schemes, suitable for smart cards without special co-processors.
