document: rfc-2289
kind: normative-requirement
summary: All OTP generators MUST calculate the two-bit checksum (sum of bit-pairs, two LSBs encoded as the last two bits of the six-word sequence) and all OTP servers MUST verify this checksum explicitly when decoding six-word format.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
