document: rfc-7309
kind: state-machine
summary: 'Each inter-domain PW operates in one of three states: ACTIVE, STANDBY, or DOWN. Triggers for transitions include: inter-domain PW failure (DOWN → peer assumes ACTIVE), PE node isolation (all local PWs fail → advertise STANDBY), and PE node failure (active PE gone → highest-priority peer assumes ACTIVE).'
section: "5.1"
topics:
    - mpls
