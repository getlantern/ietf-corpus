document: rfc-4815
kind: errata
summary: RFC 3095 did not specify the CRC algorithm for 3-, 7-, and 8-bit CRCs. RFC 4815 clarifies that all three CRC widths are calculated using the algorithm defined in RFC 1662 (PPP in HDLC-like Framing). A Perl reference implementation is provided in Appendix A.
section: "2.1"
topics:
    - rtp
    - ip
