document: rfc-7743
kind: protocol-element
summary: The MTU Exceeded Return Code (value 20) indicates that one or more TLVs were omitted from an Echo Reply or Relayed Echo Reply to avoid exceeding the effective MTU. Omitted TLVs MAY appear in an Errored TLV object with length set to 0; the return sub-code MUST be set to the value that would otherwise have been sent.
section: "3.3"
topics:
    - mpls
