document: rfc-8402
kind: protocol-element
summary: SR-MPLS encodes a segment as an MPLS label and an SR Policy as a stack of labels. The active segment is the top label; upon completion of a segment, the label is popped (NEXT operation), and an incomplete segment performs a SWAP (CONTINUE operation).
