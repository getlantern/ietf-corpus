document: rfc-7952
kind: wire-format
summary: For leaf-list entries in JSON, a sibling array named '@' + leaf-list-name is added; its i-th element is the metadata object for the i-th leaf-list entry, or null if that entry has no annotations. Trailing null values MAY be omitted.
