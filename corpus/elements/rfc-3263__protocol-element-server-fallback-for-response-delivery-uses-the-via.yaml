document: rfc-3263
kind: protocol-element
summary: 'Server fallback for response delivery uses the Via header''s sent-by field: if it contains a numeric IP, send directly; if a domain with port, perform A/AAAA lookup; if a domain without port, perform SRV query using ''_sips'' or ''_sip'' service identifier based on the Via transport value.'
