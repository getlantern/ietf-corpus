document: rfc-9174
kind: wire-format
summary: All post-contact-negotiation TCPCL messages begin with a 1-octet Message Header carrying a Message Type field. Defined types are XFER_SEGMENT (0x01), XFER_ACK (0x02), XFER_REFUSE (0x03), KEEPALIVE (0x04), SESS_TERM (0x05), MSG_REJECT (0x06), and SESS_INIT (0x07).
