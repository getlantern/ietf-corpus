document: rfc-7666
kind: normative-requirement
summary: If a virtual network interface is not represented in the IF-MIB ifTable, vmNetworkIfIndex MUST be zero. On systems implementing HOST-RESOURCES-MIB, vmCpuPhysIndex MUST equal the hrDeviceIndex used in hrProcessorTable.
section: "6.1"
rfc2119_level: MUST
