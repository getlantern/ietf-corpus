document: rfc-9033
kind: design-rationale
summary: A larger MAX_NUM_CELLS value improves cell-usage calculation accuracy and reduces 6P overhead but introduces higher scheduling latency for bursty traffic. MSF intentionally trades latency for energy by scheduling more cells than immediately needed. Setting MAX_NUM_CELLS to at least four times the recent maximum cells used per slotframe is RECOMMENDED.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
