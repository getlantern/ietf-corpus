document: rfc-4642
kind: normative-requirement
summary: Upon receiving a 382 response to STARTTLS, the client MUST start the TLS negotiation before issuing any other NNTP commands. TLS negotiation begins with the first octet following the CRLF of the 382 response.
section: 2.2.2
rfc2119_level: MUST
topics:
    - tls
