document: rfc-3019
kind: protocol-element
summary: mldCacheExpiryTime (TimeTicks, read-only) gives the minimum remaining time before a cache entry is aged out. A value of 0 indicates the entry persists only due to local membership (mldCacheSelf true) and would be removed immediately if the router left the group.
