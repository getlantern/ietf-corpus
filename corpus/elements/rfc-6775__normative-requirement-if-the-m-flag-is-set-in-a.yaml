document: rfc-6775
kind: normative-requirement
summary: If the M flag is set in a received RA, DHCPv6 MUST be used to assign non-EUI-64 addresses. A host MUST join the all-nodes multicast address but need not join the solicited-node multicast address.
section: 5.4.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
