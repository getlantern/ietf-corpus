document: rfc-3339
kind: normative-requirement
summary: Internet protocols MUST generate four-digit years in dates. The use of two-digit years is deprecated and should only be accepted if an incorrect interpretation will not cause a protocol or processing failure.
section: "3"
rfc2119_level: MUST
