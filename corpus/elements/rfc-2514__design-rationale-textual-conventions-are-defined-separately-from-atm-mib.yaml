document: rfc-2514
kind: design-rationale
summary: Textual conventions are defined separately from ATM-MIB (RFC 2515) so that multiple ATM MIB modules can import them from a single authoritative source. This avoids duplication and ensures consistent semantics across all ATM-related MIB modules.
