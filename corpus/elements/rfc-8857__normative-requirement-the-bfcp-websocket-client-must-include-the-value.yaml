document: rfc-8857
kind: normative-requirement
summary: The BFCP WebSocket client MUST include the value 'bfcp' in the Sec-WebSocket-Protocol header field in its handshake request, and the 101 reply from the server MUST contain 'bfcp' in its corresponding Sec-WebSocket-Protocol header field.
section: "4.1"
rfc2119_level: MUST
