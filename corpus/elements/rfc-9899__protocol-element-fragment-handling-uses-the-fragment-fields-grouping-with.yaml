document: rfc-9899
kind: protocol-element
summary: 'Fragment handling uses the ''fragment-fields'' grouping with an ''operator'' leaf (default ''match'') and a ''type'' leaf of type fragment-type (bits: df, isf, ff, lf). Applied separately for IPv4 (''ipv4-fragment'') and IPv6 (''ipv6-fragment'') as containers augmenting the L3 match nodes. The YANG must constraint prevents simultaneous use with RFC 8519 ''flags''.'
section: "3.5"
topics:
    - yang
    - ip
