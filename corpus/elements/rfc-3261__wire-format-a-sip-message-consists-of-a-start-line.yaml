document: rfc-3261
kind: wire-format
summary: 'A SIP message consists of a start-line, zero or more header fields, a mandatory empty CRLF line, and an optional message-body: ''start-line *message-header CRLF [message-body]''. The empty CRLF separator line MUST be present even when the body is absent. SIP is text-based using UTF-8.'
section: "7"
