document: rfc-8870
kind: interoperability-note
summary: EKT MAY be used with DTLS versions prior to 1.3, but pre-1.3 stacks lack built-in ACK message support. Implementations supporting EKT with pre-1.3 DTLS must add explicit affordances for sending ACK in response to EKTKey messages and verifying ACK receipt.
section: 5.2.2
topics:
    - rtp
    - realtime
    - tls
