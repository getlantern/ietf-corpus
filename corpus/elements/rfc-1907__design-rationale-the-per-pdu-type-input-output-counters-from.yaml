document: rfc-1907
kind: design-rationale
summary: The per-PDU-type input/output counters from RFC 1213 (e.g., snmpInGetRequests, snmpOutGetResponses) were made obsolete because SNMPv2 provides richer error information and the counters proved of limited diagnostic value while adding implementation burden.
section: 2.6.3
topics:
    - snmp
