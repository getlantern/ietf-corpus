document: rfc-1289
kind: interoperability-note
summary: This MIB is designed to be used in conjunction with RFC 1155 (SMI), RFC 1213 (MIB-II), and RFC 1157 (SNMP) to provide integrated management of combined TCP/IP and DECnet Phase IV networks from a single IP-based management station. The phiv subtree hangs directly off mib-2, making DECnet objects accessible via standard SNMP operations.
section: "1"
topics:
    - snmp
