document: rfc-4307
kind: security-consideration
summary: Security depends on both the strength of the chosen cryptographic algorithms and the strength of the keys used; algorithms currently identified as MUST or SHOULD implement are not known to be broken but may become compromised in the future, necessitating periodic revision of this document.
