document: rfc-4535
kind: normative-requirement
summary: Compliant GSAKMP implementations MUST support Diffie-Hellman key exchange for two-party key creation. Implementations supporting the optional rekey capability MUST also support retransmission of rekey messages to ensure high availability.
section: "3.2"
rfc2119_level: MUST
