document: rfc-8520
kind: security-consideration
summary: If domain name ownership changes, a new domain owner may serve MUD files that MUD managers consider valid; MUD managers SHOULD cache server certificates and check for domain ownership changes (e.g., via name server or WHOIS changes) when a new certificate is retrieved.
section: "16"
topics:
