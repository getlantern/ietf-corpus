document: rfc-6323
kind: normative-requirement
summary: A sender MUST set the RTT Estimate Option value to 0 if it does not yet have an RTT estimate. RTT estimates of less than 1 microsecond MUST be reported as 1 microsecond.
section: 3.2.1
rfc2119_level: MUST
topics:
    - congestion
