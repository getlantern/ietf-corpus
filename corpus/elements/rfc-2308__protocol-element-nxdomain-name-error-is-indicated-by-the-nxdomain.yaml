document: rfc-2308
kind: protocol-element
summary: 'NXDOMAIN (Name Error) is indicated by the NXDOMAIN RCODE and means the domain referred to by the QNAME does not exist. It is categorised into four types based on authority section contents: Type 1 (SOA + NS), Type 2 (SOA only), Type 3 (empty authority), Type 4 (NS only, no SOA).'
section: "2.1"
