document: rfc-7551
kind: normative-requirement
summary: An ingress node MUST insert an (Extended) ASSOCIATION Object into the Path message of each unidirectional LSP that forms part of an associated bidirectional LSP. If Global Association Source or Extended Association Address is required, an Extended ASSOCIATION Object MUST be used; otherwise an ASSOCIATION Object MAY be used.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
