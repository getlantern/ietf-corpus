document: rfc-2749
kind: design-rationale
summary: Stateless policy objects are designed to be well understood but not necessarily supported by all PEPs; a PEP that lacks support (e.g., no preemption) may silently ignore them. The PDP must account for this and not rely on universal enforcement of stateless objects.
section: "2.4"
topics:
    - qos
    - security
