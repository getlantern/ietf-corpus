document: rfc-7828
kind: interoperability-note
summary: Anycast DNS servers using edns-tcp-keepalive may experience more frequent TCP session disruption due to topology changes, since sessions are longer-lived; TCP multipath (RFC 6824) anchored to a unicast address may mitigate this.
section: "3.6"
topics:
    - dns
    - tcp
    - multipath
