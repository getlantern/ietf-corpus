document: rfc-9642
kind: normative-requirement
summary: Each time a new key is configured, it SHOULD be encrypted by a KEK. Server implementations SHOULD provide an API that simultaneously generates and encrypts a key using a KEK so the cleartext value is never exposed to administrators.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
