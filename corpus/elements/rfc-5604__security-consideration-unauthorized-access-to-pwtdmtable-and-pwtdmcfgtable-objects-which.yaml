document: rfc-5604
kind: security-consideration
summary: Unauthorized access to pwTDMTable and pwTDMCfgTable objects (which contain TDM PW parameters on PE devices) could result in disruption of network traffic. SNMPv3 VACM and USM MUST be used with any SNMPv3 agent implementing this MIB module, and deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED.
section: "9"
rfc2119_level: MUST
topics:
    - snmp
    - security
    - mpls
