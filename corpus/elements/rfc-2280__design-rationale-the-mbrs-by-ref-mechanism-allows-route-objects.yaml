document: rfc-2280
kind: design-rationale
summary: The 'mbrs-by-ref' mechanism allows route objects registered by listed maintainers to implicitly join a route-set via their 'member-of' attribute, enabling distributed set population without modifying the set object itself. The value ANY makes membership open to all maintainers.
section: "5.1"
topics:
    - routing
