document: rfc-7481
kind: normative-requirement
summary: An RDAP service MAY use an HTTP throttling mechanism; if used, the server SHOULD return HTTP 429 (Too Many Requests). A client receiving a 429 SHOULD decrease its query rate and honor the Retry-After header field if present.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - http
    - security
