document: rfc-8294
kind: protocol-element
summary: 'MPLS label types include: mpls-label-special-purpose (identityref based on mpls-label-special-purpose-value identity), mpls-label-general-use (uint32 range 16..1048575 excluding special-purpose values), and mpls-label (union of both). The generalized-label type is a binary type for GMPLS labels whose type is known from context.'
