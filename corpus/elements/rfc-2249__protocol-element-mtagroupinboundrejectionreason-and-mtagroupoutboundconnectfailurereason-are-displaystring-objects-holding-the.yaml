document: rfc-2249
kind: protocol-element
summary: mtaGroupInboundRejectionReason and mtaGroupOutboundConnectFailureReason are DisplayString objects holding the failure reason for the most recent rejected inbound association or failed outbound attempt; an empty string indicates the last attempt succeeded; 'never' is used if no attempt has been made since MTA initialization.
