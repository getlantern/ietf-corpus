document: rfc-7838
kind: normative-requirement
summary: Clients receiving 421 (Misdirected Request) from an alternative service MUST remove the corresponding entry from its alternative service cache for that origin. An Alt-Svc header field in a 421 response MUST be ignored.
section: "6"
rfc2119_level: MUST
topics:
    - http
