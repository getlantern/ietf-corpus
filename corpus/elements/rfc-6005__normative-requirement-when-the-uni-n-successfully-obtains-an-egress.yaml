document: rfc-6005
kind: normative-requirement
summary: When the UNI-N successfully obtains an egress address, the endpoint address field of the SESSION object MUST be set to the obtained address, and the returned address MUST be used in all subsequent messages associated with the Ethernet connection.
section: 2.2.1
rfc2119_level: MUST
