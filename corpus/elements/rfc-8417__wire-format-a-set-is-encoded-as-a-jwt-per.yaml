summary: 'A SET is encoded as a JWT per RFC 7519: a JOSE Header, a base64url-encoded JWT Claims Set, and a JWS signature (possibly empty for unsecured tokens), concatenated with period (''.'') separators. The JOSE Header for a typed SET includes ''typ'':''secevent+jwt''.'
