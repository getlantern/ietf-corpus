document: rfc-8435
kind: wire-format
summary: 'ff_ioerr4 reports I/O errors: ffie_offset (offset4) and ffie_length (length4) identify the byte range, ffie_stateid (stateid4) identifies the state, and ffie_errors (array of device_error4) reports per-device operation and error type. NFSv3 errors must be mapped to NFSv4 status codes.'
section: 9.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
