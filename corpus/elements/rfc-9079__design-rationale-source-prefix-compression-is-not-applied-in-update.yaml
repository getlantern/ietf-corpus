document: rfc-9079
kind: design-rationale
summary: Source prefix compression is not applied in Update TLVs, even though destination prefix compression is permitted for source-specific updates. This simplifies the encoding while relying on the existing destination compression scheme from RFC 8966 Section 4.5.
section: "7.2"
topics:
    - routing
