document: rfc-7618
kind: normative-requirement
summary: If DHCPv4-over-DHCPv6 configuration fails for any reason, the client MUST NOT configure an IPv4 link-local address (from 169.254.0.0/16), preventing fallback to an address space incompatible with the shared-address model.
section: "7.1"
rfc2119_level: MUST NOT
