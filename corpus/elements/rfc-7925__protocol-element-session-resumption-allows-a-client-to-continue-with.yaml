document: rfc-7925
kind: protocol-element
summary: Session resumption allows a client to continue with an earlier established session using a reduced handshake with only symmetric cryptography. The server may omit the cookie exchange during resumption, but clients must still be prepared for it. Clients may send an empty session_id to force a full handshake.
section: "7"
