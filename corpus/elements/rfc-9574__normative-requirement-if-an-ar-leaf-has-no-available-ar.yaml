document: rfc-9574
kind: normative-requirement
summary: If an AR-LEAF has no available AR-REPLICATOR for the BD (all are down, all have withdrawn Replicator-AR routes, or none was ever discovered), the AR-LEAF MUST fall back to regular ingress replication based on the remote Regular-IR Inclusive Multicast Ethernet Tag routes per RFC 7432.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
