document: rfc-7275
kind: protocol-element
summary: The PW-RED Connect TLV (Type=0x0010) is carried in an RG Connect message to establish a Pseudowire Redundancy Application Connection. It contains a Protocol Version (0x0001 for this version) and an A-bit set to 1 when the sender has already received a PW-RED Connect TLV from the recipient.
section: 7.1.1
topics:
