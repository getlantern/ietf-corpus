document: rfc-2851
kind: normative-requirement
summary: The scope identifier (bytes 17-20 of InetAddressIPv6) MUST NOT be present for global IPv6 addresses. For non-global IPv6 addresses (link-local or site-local), the scope identifier MUST always be present.
section: "3"
rfc2119_level: MUST NOT
