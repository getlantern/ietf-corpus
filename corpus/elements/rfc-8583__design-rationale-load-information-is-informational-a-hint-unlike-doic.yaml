document: rfc-8583
kind: design-rationale
summary: Load information is informational ('a hint') unlike DOIC Overload reports which constitute a contract requiring reduction of offered load. A node may use load information for load-balancing, overload prevention, or inferences about future overload, but is not obligated to reduce traffic based on load alone.
section: "4.1"
topics:
    - diameter
