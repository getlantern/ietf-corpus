document: rfc-1139
kind: normative-requirement
summary: If the error report flag is set and an echo-request is discarded, the associated ER PDU is sent to the echo-request source address on the originating machine. If an echo-reply is discarded, the ER PDU is sent to the echo-reply source address (generally the echo-request entity). The echo-request entity and originator are not required to process ER PDUs.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
