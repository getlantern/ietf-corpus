document: rfc-9127
kind: interoperability-note
summary: RFC 5880 and RFC 5881 do not specify whether the Echo function operates continuously or on demand; the mechanism to start/stop it is implementation-specific and should be done by augmentation — either via configuration (for continuous operation) or via RPC (for on-demand). An example is provided in Appendix A.
section: 2.1.2
topics:
    - yang
    - netconf
