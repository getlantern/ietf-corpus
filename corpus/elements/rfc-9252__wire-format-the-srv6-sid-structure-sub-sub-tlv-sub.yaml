document: rfc-9252
kind: wire-format
summary: 'The SRv6 SID Structure Sub-Sub-TLV (Sub-Sub-TLV Type 1, fixed length 6 octets) encodes the lengths in bits of: Locator Block, Locator Node, Function, Argument, Transposition Length (bits shifted into MPLS Label field), and Transposition Offset (bit position of transposed bits). This allows the receiver to reassemble the full SRv6 SID when split-encoding is used.'
section: 3.2.1
topics:
    - bgp
    - routing
    - ip
