document: rfc-2305
kind: security-consideration
summary: Many countries legally require sender disclosure on facsimile messages, but email From addresses are trivial to fake. Offramps SHOULD ensure the G3Fax recipient receives sufficient tracing information, including MAIL FROM, From, Sender, Reply-To, Message-Id, and Received headers.
section: 5.2.4
rfc2119_level: SHOULD
topics:
    - security
    - email
