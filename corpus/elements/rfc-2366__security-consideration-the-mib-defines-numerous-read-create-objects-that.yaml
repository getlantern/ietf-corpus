document: rfc-2366
kind: security-consideration
summary: The MIB defines numerous read-create objects that allow SNMP management stations to create, modify, and delete rows controlling MARS client registration, server configuration, multicast group membership mappings, VC parameters, and MCS registration; appropriate SNMPv2 access control must be applied to prevent unauthorized modification of these objects, which directly affect multicast forwarding behavior.
section: "6"
topics:
    - multicast
    - snmp
    - security
