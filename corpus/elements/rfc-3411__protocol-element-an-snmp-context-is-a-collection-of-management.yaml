document: rfc-3411
kind: protocol-element
summary: An SNMP context is a collection of management information accessible by an SNMP entity. A context is always a subset of a single SNMP entity. To identify a specific item of management information, its contextName, contextEngineID, object type, and instance must all be specified.
section: 3.3.1
topics:
    - snmp
