document: rfc-7146
kind: normative-requirement
summary: AES in CBC mode MUST be implemented as a confidentiality transform; implementations MUST support 128-bit keys and MAY support other key sizes. This replaces the former mandatory requirement for 3DES CBC.
section: "2.2"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
