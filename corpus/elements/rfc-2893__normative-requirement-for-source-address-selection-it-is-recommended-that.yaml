document: rfc-2893
kind: normative-requirement
summary: For source address selection, it is RECOMMENDED that when the destination is IPv4-compatible, the node use the IPv4-compatible source address corresponding to the outgoing IPv4 interface; when the destination is IPv6-native, the node use the IPv6-native address of the outgoing interface. This ensures symmetric traffic paths.
section: "5.5"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
