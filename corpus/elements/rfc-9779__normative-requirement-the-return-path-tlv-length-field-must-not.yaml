document: rfc-9779
kind: normative-requirement
summary: The Return Path TLV Length field MUST NOT be 0 or 1. The Return Path TLV MUST carry only one Return Path Sub-TLV, and the MPLS Label Stack in that Sub-TLV MUST contain at least one MPLS Label.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
