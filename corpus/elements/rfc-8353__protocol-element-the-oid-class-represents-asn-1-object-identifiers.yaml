document: rfc-8353
kind: protocol-element
summary: The Oid class represents ASN.1 Object Identifiers in immutable form, constructable from dot-notation strings (e.g., '1.3.6.1.5.6.2') or DER encoding. Its immutability allows safe sharing across threads. The containedIn method implements gss_test_oid_set_member.
section: "7.7"
