document: rfc-2532
kind: design-rationale
summary: MTA-level message rejection (with RFC 1893 status 5.6.1) is preferred over MDN-based processing failure notification because MTA rejection can occur without sender request and cannot be circumvented by the receiver, unlike MDNs which can be silently ignored.
section: "5.2"
topics:
    - email
