document: rfc-2733
kind: normative-requirement
summary: The FEC packet timestamp MUST be set to the value of the media RTP clock at the instant the FEC packet is transmitted, resulting in monotonically increasing timestamps independent of the FEC scheme.
section: "6.1"
rfc2119_level: MUST
topics:
