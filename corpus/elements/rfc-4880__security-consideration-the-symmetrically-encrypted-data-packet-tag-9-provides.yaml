document: rfc-4880
kind: security-consideration
summary: The Symmetrically Encrypted Data Packet (Tag 9) provides no integrity protection and is vulnerable to modification. Implementations SHOULD use the Sym. Encrypted Integrity Protected Data Packet (Tag 18) with a Modification Detection Code (Tag 19) instead, to detect ciphertext tampering.
section: "14"
topics:
