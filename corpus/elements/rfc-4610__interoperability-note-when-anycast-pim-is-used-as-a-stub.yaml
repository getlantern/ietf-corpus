document: rfc-4610
kind: interoperability-note
summary: When Anycast-PIM is used as a stub domain, MSDP peering may still be needed for advertising internal sources externally and learning external sources. Multiple Anycast-RPs may originate Source-Active (SA) messages for the same internal source; configuration can limit which RPs perform external MSDP peering.
section: "5.1"
topics:
    - multicast
    - routing
