document: rfc-9140
kind: registry
summary: 'IANA creates an ''EAP-NOOB Message Types'' registry with integer values 0–9: Type=0 (error notification), Types 1–3 (common handshake and Initial Exchange), Type=4 (Waiting Exchange), Types 5–6 (Completion Exchange), Types 7–9 (Reconnect Exchange). New entries require Specification Required.'
