document: rfc-2616
kind: wire-format
summary: 'Chunked transfer encoding formats the body as: *(chunk-size [chunk-extension] CRLF chunk-data CRLF) last-chunk trailer CRLF, where chunk-size is a hex string indicating the number of octets in chunk-data and the last-chunk has a zero size. An optional trailer of entity-header fields may follow.'
section: 3.6.1
topics:
