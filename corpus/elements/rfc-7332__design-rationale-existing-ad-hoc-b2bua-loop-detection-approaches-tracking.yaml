document: rfc-7332
kind: design-rationale
summary: Existing ad hoc B2BUA loop-detection approaches—tracking outstanding dialog-forming requests per URI pair, detecting repeated media addressing information, or encoding instance identifiers—are brittle because it is hard to define when a value has been seen 'too many times', and forking and spiraling cause false positives.
