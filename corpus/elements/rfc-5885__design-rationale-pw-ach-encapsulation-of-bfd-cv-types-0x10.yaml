summary: PW-ACH encapsulation of BFD (CV Types 0x10 and 0x20) is preferred over IP/UDP encapsulation in the capability selection priority order because it avoids the overhead of IP/UDP headers while still providing reliable demultiplexing via the Channel Type field.
