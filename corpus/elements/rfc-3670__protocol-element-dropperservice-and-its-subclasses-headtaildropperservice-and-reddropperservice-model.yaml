document: rfc-3670
kind: protocol-element
summary: DropperService and its subclasses—HeadTailDropperService and REDDropperService—model packet dropping. A dropper always plays the PrecedingService role in a NextService association to exactly one QueuingService. HeadTailDropQueueBinding links a dropper's algorithm to one or more monitored queues; the default combining rule is simple addition of queue lengths.
section: "3.10"
topics:
    - qos
    - congestion
