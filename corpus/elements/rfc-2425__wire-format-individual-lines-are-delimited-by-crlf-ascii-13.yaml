document: rfc-2425
kind: wire-format
summary: Individual lines are delimited by CRLF (ASCII 13 followed by ASCII 10). Long logical lines MAY be folded by inserting CRLF followed by a single whitespace character (space or horizontal tab) anywhere between two characters; the CRLF and whitespace are removed during unfolding.
section: 5.8.1
rfc2119_level: MAY
