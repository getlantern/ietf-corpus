document: rfc-7953
kind: state-machine
summary: 'Free-busy calculation proceeds in four steps: (1) mark the entire requested period FREE; (2) for each VAVAILABILITY ordered by PRIORITY low-to-high, mark its covered range BUSY (using BUSYTYPE) unless overridden by a higher-priority component; (3) for each un-ignored VAVAILABILITY, expand AVAILABLE subcomponent recurrences and mark corresponding slots FREE; (4) overlay VEVENT and VFREEBUSY components using normal free-busy processing.'
section: "5"
