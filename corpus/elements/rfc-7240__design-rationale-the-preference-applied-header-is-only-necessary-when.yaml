document: rfc-7240
kind: design-rationale
summary: The Preference-Applied header is only necessary when it is not readily apparent whether a preference was applied, and such ambiguity might impact the client's handling of the response — for example, with return=representation/minimal where examining the payload alone may not reveal whether the preference was honored.
