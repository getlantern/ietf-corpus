document: rfc-5590
kind: protocol-element
summary: The Transport Subsystem is a new modular component added to the RFC 3411 SNMP engine architecture, sitting alongside the Dispatcher, Message Processing Subsystem, Security Subsystem, and Access Control Subsystem. It contains Transport Models (such as UDP, SSH, TLS) that can be 'plugged in' independently. This enables secure transports to be used beneath SNMP without altering other subsystems.
section: "1.3"
topics:
    - snmp
    - security
