document: rfc-4997
kind: normative-requirement
summary: Expressions cannot be used directly as encoding methods because they only define a single attribute whereas a field requires multiple attributes. For example, 'field =:= (x + 20) / 4' is explicitly prohibited; a proper encoding method must be used instead.
section: "4.7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
