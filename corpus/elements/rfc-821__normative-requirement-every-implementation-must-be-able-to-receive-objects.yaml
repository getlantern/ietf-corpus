document: rfc-821
kind: normative-requirement
summary: 'Every implementation must be able to receive objects up to the following minimum maximum sizes: user name 64 chars, domain name 64 chars, path 256 chars, command line 512 chars, reply line 512 chars, text line 1000 chars, recipients buffer 100 recipients. Implementations must not send objects larger than these limits.'
section: 4.5.3
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
