document: rfc-3107
kind: normative-requirement
summary: A BGP speaker may withdraw a previously advertised labeled route by (a) advertising a new route with the same NLRI, or (b) listing the NLRI in the Withdrawn Routes field. The label information in the Withdrawn Routes field should be set to 0x800000.
section: "3"
rfc2119_level: SHOULD
topics:
    - bgp
    - mpls
    - routing
