document: rfc-4268
kind: protocol-element
summary: 'EntityAlarmStatus is a BITS textual convention with bits: unknown(0), underRepair(1), critical(2), major(3), minor(4), warning(5), indeterminate(6). When no bits are set, no active alarms are known and the entity is not under repair. Warning and indeterminate extend beyond the X.731/X.733 base definitions.'
