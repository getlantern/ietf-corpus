document: rfc-1722
kind: interoperability-note
summary: When a Next Hop value specifies a router not directly connected from the receiver's perspective, the receiving router ignores the specified next hop and falls back to using the advertising router as the next hop, preserving correct (if suboptimal) routing behavior.
section: "3.2"
topics:
    - routing
