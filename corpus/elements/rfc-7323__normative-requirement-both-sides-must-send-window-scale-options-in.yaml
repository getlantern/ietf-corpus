document: rfc-7323
kind: normative-requirement
summary: Both sides MUST send Window Scale options in their SYN segments to enable window scaling in either direction. A WSopt appearing in a segment without the SYN bit MUST be ignored.
section: "2.2"
rfc2119_level: MUST
