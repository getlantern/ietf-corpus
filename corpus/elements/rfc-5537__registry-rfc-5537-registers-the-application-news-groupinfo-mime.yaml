document: rfc-5537
kind: registry
summary: RFC 5537 registers the application/news-groupinfo MIME media type with IANA. Its body contains a newsgroup name, description, and moderation status in a backward-compatible format; moderated groups MUST be marked by appending the case-sensitive text ' (Moderated)'.
section: "4.2"
topics:
