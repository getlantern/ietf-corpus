document: rfc-7239
kind: protocol-element
summary: The "host" parameter forwards the original value of the Host header field as received by the proxy. This allows origin servers behind reverse proxies that rewrite the Host header to recover the original host requested by the client.
section: "5.3"
topics:
    - http
