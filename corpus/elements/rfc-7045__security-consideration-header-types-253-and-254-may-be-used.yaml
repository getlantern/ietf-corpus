document: rfc-7045
kind: security-consideration
summary: Header types 253 and 254 may be used for either experimental extension headers or experimental payload types, and there is no generic algorithm by which a firewall can distinguish these two cases. This ambiguity should be considered when deciding the appropriate default action for those header types.
section: "3"
