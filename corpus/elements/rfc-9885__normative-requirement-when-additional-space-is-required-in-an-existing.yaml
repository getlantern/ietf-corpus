document: rfc-9885
kind: normative-requirement
summary: When additional space is required in an existing TLV, as long as there is space remaining in that TLV, information SHOULD NOT be split into multiple TLVs. If there is no space in the current LSP, the TLV SHOULD be moved to a new LSP rather than being split.
section: "8.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
