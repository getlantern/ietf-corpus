document: rfc-8480
kind: protocol-element
summary: In a 2-step 6P Transaction, node A selects the candidate cells and sends them in the 6P Request; node B picks from the list and confirms in a single 6P Response. This mode requires node A to propose at least as many candidate cells as NumCells.
