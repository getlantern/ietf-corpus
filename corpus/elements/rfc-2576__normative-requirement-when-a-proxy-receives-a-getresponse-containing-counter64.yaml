document: rfc-2576
kind: normative-requirement
summary: When a proxy receives a GetResponse containing Counter64 variable bindings that must be forwarded via SNMPv1, the proxy MUST generate an alternate response with noSuchName error-status using the original SNMPv1 request's variable bindings.
section: 4.2.2
rfc2119_level: MUST
topics:
    - snmp
