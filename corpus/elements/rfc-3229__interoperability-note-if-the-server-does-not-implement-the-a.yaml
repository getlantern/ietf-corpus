document: rfc-3229
kind: interoperability-note
summary: If the server does not implement the A-IM header or does not support any of the listed instance-manipulations, it silently generates a normal 200 (OK) response with a full copy of the instance, preserving backward compatibility with unmodified HTTP/1.1 behavior.
