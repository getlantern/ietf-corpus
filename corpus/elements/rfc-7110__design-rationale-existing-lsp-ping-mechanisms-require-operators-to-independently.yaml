document: rfc-7110
kind: design-rationale
summary: Existing LSP ping mechanisms require operators to independently test each direction of a bidirectional LSP, doubling operational workload and requiring out-of-band access to the far-end LSR. This document addresses this by enabling a single LSP ping message exchange to test both directions of a bidirectional LSP simultaneously.
section: "3.1"
topics:
    - mpls
