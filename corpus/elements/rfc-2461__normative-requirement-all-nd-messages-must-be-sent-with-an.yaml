document: rfc-2461
kind: normative-requirement
summary: All ND messages MUST be sent with an IPv6 Hop Limit of 255, and receivers MUST silently discard any ND message received with a Hop Limit other than 255. This prevents off-link nodes from injecting forged ND messages.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
