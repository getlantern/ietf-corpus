document: rfc-3977
kind: normative-requirement
summary: 'The server MUST support pipelining: it MUST NOT discard text received after a command and MUST process commands in the order sent. Commands designated ''MUST NOT be pipelined'' (e.g., MODE READER, initial connection) require the client to await the full response before sending the next command.'
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
