summary: 'bgp4PathAttrASPathSegment is an OCTET STRING (SIZE 2..255) encoding AS path segments as <type(1 octet), length(1 octet), value> triples. Type 1 = AS_SET, type 2 = AS_SEQUENCE; each AS number is stored as two octets: (ASNumber/256, ASNumber & 255).'
