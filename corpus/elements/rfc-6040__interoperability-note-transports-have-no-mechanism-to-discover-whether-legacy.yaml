document: rfc-6040
kind: interoperability-note
summary: Transports have no mechanism to discover whether legacy tunnels on their path support two-severity-level congestion propagation. Schemes requiring two severity levels (e.g., PCN) avoid this open problem by operating within a controlled single-operator domain where all tunnel endpoints can be mandated to comply with this specification.
section: Appendix E
topics:
