kind: design-rationale
summary: 'Error conditions for TE LSPs fall into two categories: fatal errors (disruptive to the TE LSP, termed ''Hard Preemption'') and non-fatal errors (non-disruptive). This distinction governs whether control-plane and data-plane state must be cleared at the detecting node.'
