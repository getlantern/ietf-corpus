document: rfc-9254
kind: design-rationale
summary: SIDs were introduced to allow YANG data models to be implemented on constrained devices and constrained networks (RFC 7228), where the text-string identifiers used by NETCONF and RESTCONF impose unacceptable overhead. The name-based encoding is retained for environments that wish to avoid SID management overhead at the cost of larger message size.
section: "3.2"
topics:
