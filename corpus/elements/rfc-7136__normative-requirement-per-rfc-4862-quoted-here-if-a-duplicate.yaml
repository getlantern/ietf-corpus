document: rfc-7136
kind: normative-requirement
summary: 'Per RFC 4862 (quoted here): if a duplicate link-local address is not formed from a hardware-based interface identifier, IP operation on the interface MAY be continued by creating a new IID. For pseudo-random IID generation methods, the process may simply be repeated.'
section: "4"
rfc2119_level: MAY
topics:
    - ip
