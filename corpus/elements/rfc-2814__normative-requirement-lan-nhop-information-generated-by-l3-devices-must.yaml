document: rfc-2814
kind: normative-requirement
summary: LAN_NHOP information generated by L3 devices MUST include both the IP address (LAN_NHOP_L3) and the corresponding MAC address (LAN_NHOP_L2) for the next L3 hop across the L2 domain, so that L2 device DSBMs can forward PATH messages without requiring ARP capability.
section: 4.2.2.3
rfc2119_level: MUST
topics:
    - qos
    - ip
