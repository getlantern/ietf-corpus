document: rfc-7743
kind: normative-requirement
summary: Upon receiving an Echo Request with the TLV, the receiver MUST update the Source Address of Replying Router to match the source IP address of the reply it will send. Address entries with the K bit set MUST be kept in the stack.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
