document: rfc-8506
kind: security-consideration
summary: Application-level redirects (Final-Unit-Action=REDIRECT) carry a risk of abuse, where a compromised credit-control server could redirect end users to malicious hosts; the redirect address returned in Final-Unit-Indication SHOULD be validated against a configured policy before use.
section: "14.2"
topics:
    - diameter
    - security
