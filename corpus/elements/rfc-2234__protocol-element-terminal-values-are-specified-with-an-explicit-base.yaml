document: rfc-2234
kind: protocol-element
summary: 'Terminal values are specified with an explicit base prefix: ''b'' for binary, ''d'' for decimal, ''x'' for hexadecimal (e.g., %d13 or %x0D for carriage return). Concatenated values use a period separator (e.g., %d13.10 for CRLF).'
section: "2.3"
