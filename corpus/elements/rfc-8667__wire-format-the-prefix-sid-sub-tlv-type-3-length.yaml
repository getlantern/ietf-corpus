document: rfc-8667
kind: wire-format
summary: The Prefix-SID sub-TLV (Type 3, Length 5 or 6) carries the SR IGP-Prefix-SID and is associated to a prefix advertised in TLV-135, TLV-235, TLV-236, TLV-237, or Binding TLVs. It contains a 1-octet Flags field (R, N, P, E, V, L bits), a 1-octet Algorithm field, and a variable-length SID/Index/Label.
section: "2.1"
