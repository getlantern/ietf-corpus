document: rfc-8202
kind: normative-requirement
summary: Once an IIH with no IID-TLV is received on a point-to-point circuit (indicating a non-MI-RTR neighbor), the MI-RTR MUST NOT send IIHs for a non-zero instance. Before receiving any IIH, an MI-RTR MAY send IIHs for a non-zero instance.
section: 3.6.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
