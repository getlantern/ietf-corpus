document: rfc-698
kind: protocol-element
summary: At SU-AI and MIT-AI, bit 8 (octal 200) is defined as the CONTROL bit and bit 9 (octal 400) is defined as the META bit. These bits are passed directly to the user program. CONTROL-META (both bits set) is echoed as 013 014 followed by the 7-bit character.
section: "5"
