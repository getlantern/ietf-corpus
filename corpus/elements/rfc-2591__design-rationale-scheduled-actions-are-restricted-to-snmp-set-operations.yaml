document: rfc-2591
kind: design-rationale
summary: Scheduled actions are restricted to SNMP set operations on local MIB objects only. This design avoids security problems that would arise from delegating access rights to remote SNMP engines, where the scheduler could not enforce the originating principal's access control policy.
section: "3.5"
topics:
    - snmp
    - security
