document: rfc-7420
kind: normative-requirement
summary: When the SyncTimer (pcePcepEntitySyncTimer) expires before all M synchronized path computation requests referenced in an SVEC object have been received, the PCE MUST cancel the whole set of path computation requests and trigger a protocol error. A value of zero means the entity does not use the SyncTimer.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
