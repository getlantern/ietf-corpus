document: rfc-7773
kind: design-rationale
summary: The extension was designed to enable scalable linking between SAML-authenticated identities and X.509 certificates, so that a relying party only needs to trust a list of CAs rather than maintain out-of-band knowledge about each CA's practices. All relationship information between the SAML subject and the certificate subject is embedded in the certificate itself.
section: "1"
topics:
