document: rfc-5268
kind: normative-requirement
summary: If the MN receives an IP address in the NAACK option, it MUST use it and send an FBU using the new CoA. If the address in NAACK is the PCoA itself, the MN MUST NOT send any more FBUs.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
