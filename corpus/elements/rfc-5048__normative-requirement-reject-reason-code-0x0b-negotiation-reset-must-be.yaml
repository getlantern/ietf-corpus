document: rfc-5048
kind: normative-requirement
summary: Reject reason code 0x0b (Negotiation Reset) MUST be considered deprecated and MUST NOT be sent; an implementation receiving it MUST treat it as a negotiation failure terminating the Login Phase and TCP connection.
section: "8.2"
rfc2119_level: MUST NOT
