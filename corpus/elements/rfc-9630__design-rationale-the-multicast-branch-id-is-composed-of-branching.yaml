document: rfc-9630
kind: design-rationale
summary: The Multicast Branch ID is composed of Branching Node ID plus an Interface Index to achieve global uniqueness. A branch fork node assigns one identifier per outgoing branch (e.g., [B,0] for branch to C, [B,1] for branch to D), which remains unchanged until the next branch fork node.
section: "4.1"
topics:
