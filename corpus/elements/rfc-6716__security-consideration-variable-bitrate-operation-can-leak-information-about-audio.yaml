document: rfc-6716
kind: security-consideration
summary: Variable bitrate operation can leak information about audio content through traffic analysis. For sensitive or highly constrained audio (e.g., yes/no prompts), CBR mode SHOULD be used to prevent an observer from inferring content from packet sizes.
section: 2.1.8
rfc2119_level: SHOULD
topics:
    - realtime
    - voip
    - security
    - privacy
