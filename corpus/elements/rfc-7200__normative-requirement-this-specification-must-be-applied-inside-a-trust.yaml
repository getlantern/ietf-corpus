document: rfc-7200
kind: normative-requirement
summary: This specification MUST be applied inside a Trust Domain — a set of SIP entities that agree on security mechanisms, membership determination, SIP compliance, RFC 6665 compliance, and compliance to this specification. Load filtering is only effective if all neighbors participate.
