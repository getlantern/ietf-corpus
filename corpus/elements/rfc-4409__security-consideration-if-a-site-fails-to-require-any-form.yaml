document: rfc-4409
kind: security-consideration
summary: If a site fails to require any form of authorization for message submissions, it allows open use of its resources and name, enabling injection of unsolicited bulk email using its facilities. Sites should configure MSAs to require authentication and MTAs to reject RCPT for non-local users.
section: "9"
topics:
    - email
    - security
