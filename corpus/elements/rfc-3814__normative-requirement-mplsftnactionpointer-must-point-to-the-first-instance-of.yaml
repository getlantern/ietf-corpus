document: rfc-3814
kind: normative-requirement
summary: mplsFTNActionPointer MUST point to the first instance of the first accessible columnar object in the appropriate conceptual row (mplsXCEntry or mplsTunnelEntry). If it contains zeroDotZero, no action will be taken on matching packets until a valid pointer is set.
