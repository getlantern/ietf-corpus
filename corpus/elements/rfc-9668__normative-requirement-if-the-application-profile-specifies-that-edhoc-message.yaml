document: rfc-9668
kind: normative-requirement
summary: If the application profile specifies that EDHOC message_4 shall be sent, the server MUST stop EDHOC processing and consider it failed due to a client error when an EDHOC + OSCORE request is received. EDHOC message_4 is not applicable to the optimized workflow.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
