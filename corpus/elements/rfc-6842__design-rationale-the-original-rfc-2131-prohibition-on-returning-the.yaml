document: rfc-6842
kind: design-rationale
summary: The original RFC 2131 prohibition on returning the 'client identifier' option was made purely to conserve the limited space in the DHCP packet. The benefit of including it now outweighs any small risk that legacy clients might drop packets containing this formerly unexpected option.
section: "2"
topics:
