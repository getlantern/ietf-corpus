document: rfc-1990
kind: normative-requirement
summary: 'Bundle assignment is governed by four scenarios: (1) no auth, no discriminator — all links MUST join one bundle; (2) discriminator, no auth — match MUST join, mismatch MUST establish new bundle; (3) auth, no discriminator — match MUST join, mismatch MUST establish new bundle; (4) both — both must match to join, either mismatch MUST establish new bundle.'
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
