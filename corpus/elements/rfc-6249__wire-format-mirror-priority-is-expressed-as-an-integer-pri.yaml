document: rfc-6249
kind: wire-format
summary: Mirror priority is expressed as an integer 'pri' attribute (1–999999) on Link header entries; lower values indicate higher priority. Mirrors without a 'pri' attribute are treated as having pri=999999 (lowest priority).
section: "3.1"
