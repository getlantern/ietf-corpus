document: rfc-2558
kind: state-machine
summary: 'Loss of Frame (LOF): OOF/SEF defect declared on 4 contiguous errored frame alignment words; terminated on 2 contiguous error-free frames. LOF defect declared when OOF persists ≥3 ms; terminated after 1–3 ms in-frame. LOF failure declared when defect persists 2.5 ±0.5 s; cleared when defect absent 10 ±0.5 s.'
