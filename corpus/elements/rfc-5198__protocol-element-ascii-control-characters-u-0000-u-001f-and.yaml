document: rfc-5198
kind: protocol-element
summary: ASCII control characters U+0000–U+001F and U+007F–U+009F SHOULD generally be avoided; SP (U+0020), CR, LF, and FF (U+000C) are exceptions, though use of all but SP requires care.
