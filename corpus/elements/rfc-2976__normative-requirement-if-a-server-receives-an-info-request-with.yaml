document: rfc-2976
kind: normative-requirement
summary: If a server receives an INFO request with a body it understands but has no knowledge of INFO-associated processing rules for the body, the body MAY be rendered and displayed to the user, and the INFO is responded to with a 200 OK.
section: "2.2"
rfc2119_level: MAY
topics:
    - sip
    - realtime
