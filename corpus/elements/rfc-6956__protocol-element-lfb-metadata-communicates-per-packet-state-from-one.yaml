document: rfc-6956
kind: protocol-element
summary: LFB Metadata communicates per-packet state from one LFB to another within the FE data path but is never sent across the network. As a default provision of RFC 5812, all metadata produced by upstream LFBs passes through all downstream LFBs; only metadata explicitly consumed by an LFB is marked as expected in that LFB's input definition.
section: "5"
topics:
    - routing
