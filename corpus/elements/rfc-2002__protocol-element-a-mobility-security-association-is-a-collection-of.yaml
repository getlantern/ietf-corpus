document: rfc-2002
kind: protocol-element
summary: A Mobility Security Association is a collection of security contexts between a pair of nodes, indexed by SPI and IP address. Each context specifies an authentication algorithm and mode, a shared secret or key pair, and a replay protection style. SPI values 0–255 are reserved and MUST NOT be used.
section: "1.6"
topics:
    - ip
    - security
    - crypto
