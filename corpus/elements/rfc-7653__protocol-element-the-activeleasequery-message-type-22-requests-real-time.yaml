document: rfc-7653
kind: protocol-element
summary: The ACTIVELEASEQUERY message (type 22) requests real-time binding updates. If the requestor includes OPTION_LQ_START_TIME, the server enters a catch-up phase to send historical binding data before streaming live updates; omitting OPTION_LQ_QUERY receives all binding updates.
section: 6.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
