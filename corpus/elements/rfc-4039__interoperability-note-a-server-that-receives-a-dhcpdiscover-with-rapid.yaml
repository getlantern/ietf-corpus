document: rfc-4039
kind: interoperability-note
summary: A server that receives a DHCPDISCOVER with Rapid Commit MAY respond with either a normal DHCPOFFER (falling back to 4-message exchange) or a DHCPACK with Rapid Commit (2-message exchange), based on its configuration policies. Both paths are valid; the client handles either.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
