document: rfc-8171
kind: normative-requirement
summary: All RESPONSE Records answering any particular QUERY Record MUST occur in the same Response Message. If a Pull Directory holds more mappings than fit in one Response Message, it selects which to include and sets the OV (overflow) flag in all RESPONSE Records for that query.
section: 3.2.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
