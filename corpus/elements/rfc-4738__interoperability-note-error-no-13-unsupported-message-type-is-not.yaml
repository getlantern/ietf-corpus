document: rfc-4738
kind: interoperability-note
summary: Error no. 13 ('Unsupported message type') is not defined in RFC 3830. RFC 3830-compliant implementations receiving an unparseable MIKEY RSA-R message MAY return 'an unspecified error occurred' (Error no. 12) as a fallback.
