document: rfc-3788
kind: protocol-element
summary: A TLS session upgrade procedure is defined for SIGTRAN. If an ASP is configured for TLS, it sends a STARTTLS message on stream 0 and starts timer T_TLS as the first adaptation layer message. The peer responds with STARTTLS_ACK (TLS supported) or ERROR (unsupported), or T_TLS expiry terminates the association.
section: "6"
topics:
