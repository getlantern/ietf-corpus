document: rfc-8826
kind: normative-requirement
summary: It MUST be possible for communicating parties to establish a channel secure against both message recovery and message modification, for both data and voice/video traffic. Technology such as SRTP, DTLS, and DTLS-SRTP provides this service.
section: "4.3"
rfc2119_level: MUST
