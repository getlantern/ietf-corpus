document: rfc-2244
kind: normative-requirement
summary: When a SEARCH with MAKECONTEXT NOTIFY is active, after issuing a sequence of ADDTO, REMOVEFROM, or CHANGE notifications, the server MUST issue an untagged MODTIME notification indicating the client has all updates up to and including that modtime.
section: 6.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
