document: rfc-9478
kind: normative-requirement
summary: If different IP ranges can only use different specific Security Labels, these MUST NOT be combined into one Child SA negotiation; each combination must be negotiated in a separate Child SA negotiation.
section: "3.2"
rfc2119_level: MUST NOT
