document: rfc-8854
kind: interoperability-note
summary: Redundant encoding cannot recover certain RTP header fields including the marker bit, CSRC information, and header extensions (per RFC 2198, Section 4); in-band FEC mechanisms also cannot recover any part of the RTP header.
