document: rfc-7925
kind: interoperability-note
summary: Named finite-field DH groups (FFDHE-TLS) are not applicable to this profile since it relies exclusively on ECC-based key exchange (ECDHE). The recommended curve at time of writing is secp256r1 with uncompressed points, following CoAP recommendations.
