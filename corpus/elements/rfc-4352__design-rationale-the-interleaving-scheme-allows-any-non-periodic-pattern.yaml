document: rfc-4352
kind: design-rationale
summary: The interleaving scheme allows any non-periodic pattern with a displacement distance up to 256 frames (up to 3.41 seconds at the highest ISF), in contrast to RFC 3267's AMR-WB format which only supports fixed periodic patterns. This flexibility accommodates streaming scenarios with widely varying jitter.
