document: rfc-8412
kind: normative-requirement
summary: The SWIMA-PV MUST NOT reject a message or respond with a PA-TNC Error due to the data model used to structure records in received attributes, nor if a record fails to comply with a stated format, unless that failure prevents correct parsing of the attribute itself.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
