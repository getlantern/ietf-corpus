summary: Assertion Presentation (A) describes how the federated identity assertion is conveyed across the network — covering protection against information leakage and spoofing. Values include unsigned bearer identifiers (Aa), signed browser-passed assertions (Ab), signed back-channel assertions (Ac), and RP-key-encrypted assertions (Ad).
