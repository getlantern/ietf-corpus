document: rfc-6407
kind: normative-requirement
summary: At the conclusion of a GROUPKEY-PULL exchange, the initiating group member MUST NOT accept any rekey message whose KEK attribute SPI matches and whose sequence number is less than or equal to the one received during the GROUPKEY-PULL exchange.
section: "3.2"
rfc2119_level: MUST NOT
topics:
