document: rfc-3516
kind: normative-requirement
summary: Regardless of internal storage format, the server MUST issue BODYSTRUCTURE responses describing the message as though binary-encoded sections are encoded in a CTE acceptable to the base IMAP4 specification, and FETCH BODY MUST return content in the format described by FETCH BODYSTRUCTURE.
section: "6"
rfc2119_level: MUST
