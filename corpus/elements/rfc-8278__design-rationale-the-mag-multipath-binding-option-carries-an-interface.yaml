document: rfc-8278
kind: design-rationale
summary: The MAG Multipath Binding option carries an Interface Label (If-Label) to identify WAN interface types, allowing both MAG and LMA to consistently mark bindings/tunnels and generate matching application-routing rules (e.g., route HTTP over label '9', fall back to label '11').
section: "4.1"
topics:
