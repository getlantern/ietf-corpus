document: rfc-6396
kind: wire-format
summary: The BGP4MP_MESSAGE subtype encodes a complete BGP message including the 16-octet marker, 2-octet length, and 1-octet type. The message contains 2-octet Peer AS Number, 2-octet Local AS Number, 2-octet Interface Index, 2-octet Address Family, variable Peer IP and Local IP addresses, followed by the full BGP Message.
section: 4.4.2
