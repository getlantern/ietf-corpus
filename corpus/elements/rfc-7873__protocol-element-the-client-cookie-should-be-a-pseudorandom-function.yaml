document: rfc-7873
kind: protocol-element
summary: The Client Cookie SHOULD be a pseudorandom function of the Client IP Address, Server IP Address, and a Client Secret with at least 64 bits of entropy. The selection of the PRF is private to the client, as only the client needs to recognize its own cookies.
section: "4.1"
topics:
    - dns
    - crypto
    - security
