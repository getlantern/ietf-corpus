document: rfc-9779
kind: protocol-element
summary: The MPLS Label Stack Sub-TLV (Type 1) is carried within the Return Path TLV and contains a stack of 32-bit LSEs (20-bit label, 8-bit TTL, 3-bit TC, 1-bit S). It may carry a stack of labels or a Binding SID label of the return SR-MPLS Policy.
section: 6.1.1
topics:
