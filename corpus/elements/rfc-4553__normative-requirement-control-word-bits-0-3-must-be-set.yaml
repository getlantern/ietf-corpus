document: rfc-4553
kind: normative-requirement
summary: Control Word bits 0–3 MUST be set to zero unless they are being used to indicate the start of an Associated Channel Header (ACH) for VCCV monitoring. RSV and FRG bits (6–9) MUST be set to 0 by the PSN-bound IWF and MUST be ignored by the CE-bound IWF.
section: 4.3.1
rfc2119_level: MUST
topics:
