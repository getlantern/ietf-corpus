document: rfc-6884
kind: security-consideration
summary: Since compression is applied end-to-end and the encodings do not exhibit significant non-uniformity, implementations are subject to all security considerations in RFC 3558, RFC 3550, and applicable RTP profiles (e.g., RFC 3551). Variable bit-rate audio security considerations from RFC 6562 also apply.
