document: rfc-7433
kind: design-rationale
summary: A URI parameter approach was rejected because a URI parameter in a Request-URI does not survive proxy retargeting—if the URI is an Address of Record rather than a Contact URI, the parameter is lost. This fails to meet REQ-1, REQ-2, REQ-4, and REQ-14.
section: A.4
