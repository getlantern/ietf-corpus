document: rfc-5066
kind: security-consideration
summary: The EFM-CU-MIB and IF-CAP-STACK-MIB modules contain read-write objects that could be misused to disrupt network operation (e.g., modifying PAF state, target data rates, or profile assignments). Implementations should apply SNMP security mechanisms (authentication, access control) to restrict write access to authorized managers only.
section: "7"
topics:
    - security
