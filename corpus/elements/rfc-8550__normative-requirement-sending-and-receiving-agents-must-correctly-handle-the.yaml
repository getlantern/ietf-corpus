document: rfc-8550
kind: normative-requirement
summary: Sending and receiving agents MUST correctly handle the basicConstraints, keyUsage, authorityKeyIdentifier, subjectKeyIdentifier, and subjectAltName certificate extensions when they appear in end-entity and CA certificates. Certificates issued for S/MIME SHOULD NOT contain any critical extensions other than those listed.
section: "4.4"
rfc2119_level: MUST
topics:
    - email
    - pkix
