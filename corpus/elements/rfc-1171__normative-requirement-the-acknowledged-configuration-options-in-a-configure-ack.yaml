document: rfc-1171
kind: normative-requirement
summary: The acknowledged Configuration Options in a Configure-Ack MUST NOT be reordered or modified in any way. A Configure-Ack with a mismatched Identifier or altered options is invalid and should be silently discarded.
section: 4.4.2
rfc2119_level: MUST NOT
