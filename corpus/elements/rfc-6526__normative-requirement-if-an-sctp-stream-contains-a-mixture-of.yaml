document: rfc-6526
kind: normative-requirement
summary: If an SCTP stream contains a mixture of Data Records defined by Template Records and Options Template Records, the Data Records defined by the Options Template Records SHOULD be sent reliably so that the Collecting Process does not attribute any loss to Options Data Records.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - sctp
