document: rfc-5360
kind: design-rationale
summary: 'A credit-based authorization mechanism is used to prevent amplification attacks: clients must generate bandwidth comparable to what the relay will generate when sending MESSAGE requests. This is enforced by restricting additions to one recipient URI per transaction (one URI per HTTP transaction for XCAP, one contact per REGISTER).'
section: "5.1"
topics:
