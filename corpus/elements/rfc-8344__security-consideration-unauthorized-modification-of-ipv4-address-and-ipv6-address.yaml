document: rfc-8344
kind: security-consideration
summary: Unauthorized modification of 'ipv4/address' and 'ipv6/address' lists can cause a node to ignore legitimate messages or accept messages it would otherwise discard. Filtering or security associations may reduce damage from address spoofing.
