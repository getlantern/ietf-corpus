document: rfc-9961
kind: normative-requirement
summary: To avoid potential Denial-of-Service attacks, it is RECOMMENDED that implementations regulate the LSP ping traffic going to the control plane, and a rate limiter SHOULD be applied to the well-known UDP port allocated for this service.
