document: rfc-1883
kind: normative-requirement
summary: The value 59 in the Next Header field indicates that nothing follows that header. If the IPv6 Payload Length field indicates octets past the end of a header whose Next Header field contains 59, those octets must be ignored and passed on unchanged if the packet is forwarded.
section: "4.7"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
