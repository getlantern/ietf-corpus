document: rfc-8949
kind: interoperability-note
summary: RFC 8949 defines a 'length-first core deterministic encoding' variant that sorts map keys shorter-first, then bytewise lexicographic for equal-length keys—matching the 'Canonical CBOR' ordering from RFC 7049 Section 3.9. Protocols needing RFC 7049 compatibility should adopt this variant explicitly.
section: 4.2.3
topics:
