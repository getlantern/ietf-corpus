document: rfc-5846
kind: normative-requirement
summary: If Proxy Binding Update/Acknowledgement or Binding Update/Acknowledgement messages are sent using UDP encapsulation over IPv4 (per RFC 5844 or RFC 5555), Binding Revocation Messages MUST use the same UDP source/destination port numbers and IPv4 source/destination addresses as the most recently successfully processed PBU or BU message.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
