document: rfc-5404
kind: normative-requirement
summary: If an SDP offer includes the CBR parameter, the answerer MUST send G.719 audio at the constant bitrate if it is within the allowed session bitrate; if the answerer cannot support the stated CBR, this payload type must be refused.
section: 7.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
