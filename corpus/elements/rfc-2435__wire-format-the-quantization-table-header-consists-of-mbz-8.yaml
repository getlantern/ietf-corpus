kind: wire-format
summary: The Quantization Table header consists of MBZ (8 bits), Precision (8 bits), and Length (16 bits), followed by quantization table data. Each table is 64 values in zig-zag order; the Precision field indicates 8-bit (0) or 16-bit (1) coefficients per table.
