document: rfc-8431
kind: normative-requirement
summary: For the 'receive' special nexthop (locally destined traffic such as protocol or OAM packets), all locally destined traffic SHOULD be throttled to avoid a denial-of-service attack on the router's control plane; an optional rate-limiter can be specified.
