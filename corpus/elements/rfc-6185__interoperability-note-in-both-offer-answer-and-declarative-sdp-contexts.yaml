document: rfc-6185
kind: interoperability-note
summary: In both offer/answer and declarative SDP contexts, the profile_idc byte of the H264-RCDO profile-level-id parameter can only take the value 0 (no profile), distinguishing it from standard H.264 profile negotiation.
