document: rfc-8995
kind: normative-requirement
summary: TLS 1.2 or newer is REQUIRED on the pledge side for the BRSKI-EST connection. TLS 1.3 or newer SHOULD be available on both registrar and MASA server interfaces, though TLS 1.2 MAY be used on those interfaces.
section: "5.1"
rfc2119_level: REQUIRED
topics:
