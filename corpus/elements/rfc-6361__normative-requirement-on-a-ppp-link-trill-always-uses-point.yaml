document: rfc-6361
kind: normative-requirement
summary: On a PPP link, TRILL always uses point-to-point (P2P) Hellos; there is no need for TRILL-Hello frames or per-port configuration. The three-way IS-IS handshake using extended circuit IDs is required on point-to-point links such as PPP.
section: "3"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
