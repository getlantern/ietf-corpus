document: rfc-4340
kind: design-rationale
summary: DCCP was designed to give streaming UDP applications little reason not to switch by minimizing header and state overhead. Only minimal functionality is included in the protocol; features like FEC, semi-reliability, and multiple streams are left to layers above DCCP.
