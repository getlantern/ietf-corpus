document: rfc-7891
kind: security-consideration
summary: A malicious downstream node can launch a denial-of-service attack by sending PIM Join packets with invalid addresses in the RPF Vector stack, stopping propagation of Joins to the correct upstream node, or by targeting all Joins to a specific node to overload its forwarding capacity.
