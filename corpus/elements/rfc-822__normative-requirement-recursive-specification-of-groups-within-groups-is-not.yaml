document: rfc-822
kind: normative-requirement
summary: Recursive specification of groups within groups is not permitted. The group construct allows listing individual mailboxes within the colon-semicolon bracket pair, but nesting groups inside groups is disallowed.
section: 6.2.6
rfc2119_level: MUST NOT
topics:
    - email
