document: rfc-3281
kind: normative-requirement
summary: An AC issuer MUST NOT also be a PKC issuer (CA). The AC issuer's PKC MUST NOT have a basicConstraints extension with the cA BOOLEAN set to TRUE, to avoid confusion regarding serial numbers and revocations.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
