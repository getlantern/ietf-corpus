document: rfc-2669
kind: normative-requirement
summary: The last digit of the enterprise-specific trap OID must match docsDevEvId so that SNMPv1-capable NMS systems (which can only filter on enterprise + last-digit) can correlate event type to trap type.
section: 3.2.2
rfc2119_level: MUST
