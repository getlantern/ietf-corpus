document: rfc-2331
kind: security-consideration
summary: ATM Forum security mechanisms (authentication, data integrity, confidentiality/encryption) were not yet standardized at time of publication, preventing authentication of the originator of signalling messages such as connection setup or teardown requests. IP Security (RFC 1825) can be applied to IP datagrams over ATM VCs to compensate for the lack of ATM-layer security.
section: "8"
topics:
