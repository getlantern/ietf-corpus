document: rfc-7179
kind: protocol-element
summary: 'Three critical summary bits (bits 0-2 of the extended header flags word) summarize the presence of critical extensions: CHbHS (bit 0) indicates critical hop-by-hop extensions, CItES (bit 1) indicates critical ingress-to-egress extensions, and CRSVS (bit 2) indicates critical reserved extensions. These bits enable efficient single-check processing by RBridges that need to decide whether to forward or discard a frame.'
section: 2.3.1
topics:
    - routing
