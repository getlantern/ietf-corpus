document: rfc-7432
kind: protocol-element
summary: The Default Gateway Extended Community (Opaque Type 0x03, Sub-Type 0x0d) is advertised with MAC/IP Advertisement routes to identify a PE acting as the inter-subnet default gateway. Receiving PEs MUST create MAC forwarding state that applies IP forwarding to packets destined to that MAC address.
section: "7.8"
topics:
    - bgp
    - routing
    - vpn
