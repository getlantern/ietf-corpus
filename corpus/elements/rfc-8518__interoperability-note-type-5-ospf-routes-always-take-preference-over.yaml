document: rfc-8518
kind: interoperability-note
summary: Type 5 OSPF routes always take preference over type 7, and alternate ASBRs for LFA must be the same route type as the primary ASBR. Among type 7 routes, routes with p-bit and forwarding address set have higher preference; alternate ASBRs must share the same p-bit and forwarding address attributes.
section: 4.2.1.4
topics:
    - routing
