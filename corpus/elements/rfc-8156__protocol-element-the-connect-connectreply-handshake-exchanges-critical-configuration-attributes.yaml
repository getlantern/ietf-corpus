document: rfc-8156
kind: protocol-element
summary: The CONNECT/CONNECTREPLY handshake exchanges critical configuration attributes including OPTION_F_MCLT, OPTION_F_RELATIONSHIP_NAME, OPTION_F_PROTOCOL_VERSION, OPTION_F_MAX_UNACKED_BNDUPD, and OPTION_F_CONNECT_FLAGS (including the FIXED_PD_LENGTH bit). After a successful exchange, the first message sent is a STATE message; receipt of the STATE message establishes communications as 'OK'.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
