document: rfc-9408
kind: protocol-element
summary: The 'peer-sap-id' leaf-list references remote endpoints of an Attachment Circuit — examples include CE identifiers, site identifiers (RFC 8299 Section 6.3), SDP identifiers, or peer ASBR IP addresses. Using identical identifiers on both peers eases correlation between a peer's service request and a local SAP.
section: "5"
