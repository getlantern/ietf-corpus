document: rfc-3479
kind: normative-requirement
summary: Upon TCP restoration, a Label Request MUST be re-issued unless a Label Abort would be re-issued for the same label; a Label Mapping MUST be re-issued unless a Label Withdraw would be re-issued for the same label. All other unacknowledged FT messages MUST be re-issued.
section: 5.5.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
