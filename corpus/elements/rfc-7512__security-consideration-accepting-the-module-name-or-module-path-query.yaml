document: rfc-7512
kind: security-consideration
summary: Accepting the 'module-name' or 'module-path' query attributes potentially allows loading of arbitrary code into the consuming process, as specified in RFC 3986 Section 7.2. Consumers should carefully control whether to accept these attributes.
