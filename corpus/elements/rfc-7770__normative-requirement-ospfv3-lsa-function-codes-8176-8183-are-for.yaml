document: rfc-7770
kind: normative-requirement
summary: OSPFv3 LSA function codes 8176-8183 are for experimental use and MUST NOT be mentioned by RFCs. LSAs with function codes in the vendor private use range 8184-8190 MUST include the Enterprise Code as the first 4 octets following the 20-octet LSA header.
