document: rfc-2497
kind: design-rationale
summary: The default MTU of 9072 octets was chosen because the theoretical maximum of 60480 octets is impractical due to its worst-case transmission time of several seconds over ARCnet. The MTU can be negotiated via Router Advertisement MTU options within the 60480 limit.
