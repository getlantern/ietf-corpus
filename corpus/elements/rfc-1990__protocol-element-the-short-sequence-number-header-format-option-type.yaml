document: rfc-1990
kind: protocol-element
summary: The Short Sequence Number Header Format Option (Type=18, Length=2) advises the peer that the sender wishes to receive fragments with 12-bit sequence numbers. When a peer Configure-Acks this option, it MUST transmit all multilink packets on all bundle links with 12-bit sequence numbers.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
