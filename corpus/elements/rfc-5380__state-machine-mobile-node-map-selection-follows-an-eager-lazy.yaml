document: rfc-5380
kind: state-machine
summary: 'Mobile node MAP selection follows an Eager-Lazy model: the mobile node eagerly registers with any new MAP advertised by the AR, and lazily releases existing bindings only when the MAP option is no longer received, received with lifetime zero, or the existing binding lifetime expires. This provides fallback during MAP failures.'
