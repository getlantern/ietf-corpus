document: rfc-2274
kind: security-consideration
summary: Section 11 recommends that authKeys and privKeys be generated using the password-to-key algorithm (Appendix A.2), that each user have a unique password, and that passwords not be trivially guessable. It also warns that SNMP SET operations using USM are vulnerable to serialization attacks unless snmpSetSerialNo is used in concert.
section: "11.1"
topics:
    - snmp
    - security
