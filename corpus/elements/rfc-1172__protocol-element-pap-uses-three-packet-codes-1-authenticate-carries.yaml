document: rfc-1172
kind: protocol-element
summary: 'PAP uses three packet codes: 1=Authenticate (carries Peer-ID-Length, Peer-ID, Passwd-Length, Password), 2=Authenticate-Ack (carries Msg-Length and optional ASCII Message), 3=Authenticate-Nak (same format as Ack). Protocol type is 0xc023. The Authentication phase ends upon sending or receiving an Authenticate-Ack.'
section: "4"
