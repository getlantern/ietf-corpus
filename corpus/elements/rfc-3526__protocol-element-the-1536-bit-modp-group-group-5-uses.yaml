kind: protocol-element
summary: The 1536-bit MODP Group (Group 5) uses a prime of the form 2^1536 - 2^1472 - 1 + 2^64 * { [2^1406 pi] + 741804 } with generator 2. This group had been used in implementations prior to standardization and is now formally assigned id 5.
