document: rfc-8829
kind: normative-requirement
summary: The JSEP implementation MUST allow the ICE candidate policy to be changed mid-session. During a gathering phase, the implementation MUST NOT expose disallowed candidates to the application, use them for connectivity checks, or reveal them indirectly via other ICE candidate fields such as raddr/rport.
section: 3.5.3
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
