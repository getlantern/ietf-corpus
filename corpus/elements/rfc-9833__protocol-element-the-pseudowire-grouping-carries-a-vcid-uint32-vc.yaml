document: rfc-9833
kind: protocol-element
summary: The 'pseudowire' grouping carries a vcid (uint32 VC identifier) and far-end (union of uint32 or inet:ip-address) per RFC 8077 Section 6.1. The 'vpls' grouping similarly has vcid and a leaf-list far-end. The 'vxlan' grouping carries vni-id (uint32), peer-mode (identityref, default static-mode), and peer-ip-address leaf-list.
section: "4.3"
