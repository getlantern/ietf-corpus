document: rfc-6860
kind: normative-requirement
summary: To hide a transit-only point-to-point network in OSPFv2, the Type 3 stub link MUST be omitted from the router-LSA, leaving only the Type 1 point-to-point link describing the neighboring router.
section: 2.1.2
rfc2119_level: MUST
topics:
    - routing
