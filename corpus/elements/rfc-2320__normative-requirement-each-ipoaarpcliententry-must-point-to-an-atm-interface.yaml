document: rfc-2320
kind: normative-requirement
summary: Each ipoaArpClientEntry MUST point to an ATM interface via its corresponding ipAddrEntry; the ipAddrTable's ipAdEntIfIndex points to an ATM interface's ifIndex as the attachment point for IP into an ATM network.
section: 3.2.1
