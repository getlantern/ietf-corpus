document: rfc-7580
kind: protocol-element
summary: The Connectivity Matrix sub-TLV (Type 14) is a sub-TLV of the Node Attribute TLV defined in RFC 5786. It represents either potential connectivity for asymmetric switches (e.g., ROADMs) or fixed connectivity for asymmetric devices such as multiplexers. One sub-TLV contains one matrix; multiple occurrences are permitted within the Node Attribute TLV.
section: "2.1"
topics:
    - routing
    - mpls
    - registry
