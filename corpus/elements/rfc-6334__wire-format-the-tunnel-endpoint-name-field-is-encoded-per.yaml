document: rfc-6334
kind: wire-format
summary: 'The tunnel-endpoint-name field is encoded per DHCPv6 RFC 3315 Section 8: each DNS label is preceded by a single octet giving its length (max 63 octets), labels repeat until the FQDN is exhausted, and a terminating zero-length label is required. Compression tags are not permitted.'
