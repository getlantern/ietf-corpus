document: rfc-3866
kind: normative-requirement
summary: In the Modify operation, attribute types and language tag options MUST match exactly against values stored in the directory. If stored values have language tag options, those MUST be provided in the modify operation.
section: "2.6"
rfc2119_level: MUST
