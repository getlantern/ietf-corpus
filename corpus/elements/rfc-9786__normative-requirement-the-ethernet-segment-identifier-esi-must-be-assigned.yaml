document: rfc-9786
kind: normative-requirement
summary: The Ethernet Segment Identifier (ESI) MUST be assigned per access interface as described in RFC 7432; the ESI can be auto-derived or manually assigned and the access interface MAY be an L2 or L3 interface.
section: "2.2"
rfc2119_level: MUST
