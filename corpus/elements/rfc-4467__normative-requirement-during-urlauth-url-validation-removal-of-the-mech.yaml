document: rfc-4467
kind: normative-requirement
summary: During URLAUTH URL validation, removal of the ':<mech>:<token>' portion to produce the rump URL MUST be the only operation applied; URL percent escape decoding and case-folding (including to the domain part) MUST NOT occur.
section: "6"
rfc2119_level: MUST NOT
