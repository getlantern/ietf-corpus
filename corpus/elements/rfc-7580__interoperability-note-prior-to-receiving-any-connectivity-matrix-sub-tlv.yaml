document: rfc-7580
kind: interoperability-note
summary: Prior to receiving any Connectivity Matrix sub-TLV, path computation assumes any-port-to-any-port reachability (standard GMPLS assumption). Once a sub-TLV is received, connectivity is known to be restricted. Intermediate states (partial receipt of decomposed matrices) may cause transient path computation errors, which are handled by existing GMPLS mechanisms.
section: "5.2"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
