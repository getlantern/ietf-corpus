document: rfc-5846
kind: state-machine
summary: 'During inter-MAG handover with Handoff Indicator ''Unknown (4)'', the LMA SHOULD proactively send a BRI with Revocation Trigger ''Inter-MAG Handover - Unknown'' to the previous MAG. On successful BRA or de-registration: update BCE as de-registered. On ''Revocation Failed - MN is Attached'': create new BCE. On retransmission exhaustion: also create new BCE.'
section: "8.1"
topics:
    - mobility
