document: rfc-6681
kind: protocol-element
summary: Each Application Data Unit (ADU) in a source block is formatted as Application Data Unit Information (ADUI[i]) consisting of a 1-octet flow identifier F[i], 2-octet length L[i], the ADU payload R[i], and zero-padding P[i] to align to symbol boundaries, then all ADUIs are concatenated to form the source data block.
section: "5"
