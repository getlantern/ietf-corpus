document: rfc-6378
kind: normative-requirement
summary: When the protection domain state changes due to a local input, three PSC messages SHALL be transmitted as quickly as possible. After the three rapid messages, the LER MUST retransmit the most recently transmitted PSC message on a continual basis.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
