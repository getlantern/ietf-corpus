document: rfc-7180
kind: normative-requirement
summary: Distribution tree parent selection is changed from 'j mod p' to '(j-1) mod p' when building tree number j for a node with p possible parents. This change is not backward compatible with RFC 6325; if RBridges disagree, the RPFC will drop most multi-destination frames.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
