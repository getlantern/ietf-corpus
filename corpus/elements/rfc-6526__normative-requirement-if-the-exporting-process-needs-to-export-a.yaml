document: rfc-6526
kind: normative-requirement
summary: If the Exporting Process needs to export a new Template Record but no free SCTP streams are available, it SHOULD attempt to increase the number of outbound SCTP streams per RFC 6525 rather than multiplexing Templates onto existing streams.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - sctp
