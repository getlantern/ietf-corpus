document: rfc-4352
kind: protocol-element
summary: In interleaved mode, RTP timestamp for each frame is derived from the RTP header timestamp plus the sum of (DISi+1)*frame_duration for all preceding frames. The frame duration is determined solely by the ISF value as specified in Table 1. The first frame's DIS1 is ignored; its timestamp equals the RTP header timestamp.
section: 4.3.2.3
topics:
    - rtp
    - realtime
