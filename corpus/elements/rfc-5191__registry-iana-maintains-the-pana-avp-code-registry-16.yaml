document: rfc-5191
kind: registry
summary: IANA maintains the PANA AVP Code registry (16-bit; values 1–9 defined here; further assignments by Designated Expert with Specification Required or Standards Action). PANA also supports vendor-specific AVP namespaces keyed by the IANA Enterprise Number in the Vendor-Id field.
