summary: The Dual-Priority AVP (AVP Code 608) is a grouped AVP consisting of Preemption-Priority and Defending-Priority AVPs, derived from the Signaled Preemption Priority Policy Element of RSVP (RFC 3181). It is used to convey RSVP preemption priority values within Diameter.
