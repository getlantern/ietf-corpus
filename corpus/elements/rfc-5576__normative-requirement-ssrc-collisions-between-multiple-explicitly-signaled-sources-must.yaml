document: rfc-5576
kind: normative-requirement
summary: SSRC collisions between multiple explicitly-signaled sources MUST be acted upon immediately. An endpoint observing a collision between its explicitly signaled source and a non-signaled source MAY delay collision-resolution by 5*1.5*Td.
section: "5"
rfc2119_level: MUST
topics:
