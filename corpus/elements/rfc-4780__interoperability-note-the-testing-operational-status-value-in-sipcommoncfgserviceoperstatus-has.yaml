document: rfc-4780
kind: interoperability-note
summary: The 'testing' operational status value in sipCommonCfgServiceOperStatus has no direct equivalent in the NETWORK-SERVICES-MIB applOperStatus; it maps to 'up' for the applOperStatus. Similarly, 'unknown' has no corresponding applOperStatus value, requiring retention of the last known applOperStatus value.
section: "5.2"
topics:
    - sip
    - snmp
extracted_by: claude-sonnet-4-6
