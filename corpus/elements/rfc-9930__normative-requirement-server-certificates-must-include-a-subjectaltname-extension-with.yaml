document: rfc-9930
kind: normative-requirement
summary: Server certificates MUST include a subjectAltName extension with the dnsName attribute containing a Fully Qualified Domain Name (FQDN) string. Use of SubjectDN CN= for the FQDN is deprecated for TEAP and forbidden by RFC 9525, Section 2.
section: "3.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - tls
