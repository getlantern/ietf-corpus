document: rfc-2065
kind: state-machine
summary: 'A security-aware server categorizes cached data into four states: Authenticated (valid SIG chain to a configured key), Pending (no authenticated SIG but at least one still being verified), Insecure (in or reached via a non-secured zone, can never be authenticated), and Bad (all SIG checks explicitly failed; data is not retained).'
