document: rfc-9744
kind: normative-requirement
summary: Normalized VID lookup is REQUIRED at the disposition PE to forward packets to their proper egress endpoints, because the EVPN label alone is not sufficient for accurate forwarding when a single service tunnel multiplexes ACs across multiple ESs or physical interfaces.
section: "3.2"
rfc2119_level: REQUIRED
topics:
    - vpn
    - routing
