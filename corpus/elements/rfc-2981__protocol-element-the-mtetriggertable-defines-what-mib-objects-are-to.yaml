summary: The mteTriggerTable defines what MIB objects are to be monitored and how, indexed by mteOwner and mteTriggerName. Each entry specifies the object to sample (mteTriggerValueID), sampling type, target tag, context, frequency, and test type (existence, boolean, or threshold).
