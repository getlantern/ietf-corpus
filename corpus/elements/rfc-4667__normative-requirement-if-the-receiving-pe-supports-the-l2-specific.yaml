document: rfc-4667
kind: normative-requirement
summary: If the receiving PE supports the L2-Specific Sublayer specified by the sender, it MUST include that sublayer in its data packets. Otherwise, it MUST reject the connection by sending a CDN.
section: "4.2"
rfc2119_level: MUST
