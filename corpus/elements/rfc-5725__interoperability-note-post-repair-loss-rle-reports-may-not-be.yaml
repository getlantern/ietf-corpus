document: rfc-5725
kind: interoperability-note
summary: Post-repair Loss RLE reports may not be delayed arbitrarily because sequence-number wrapping in the primary source stream can create ambiguity. In case of ambiguity, it is the sender's or monitoring entity's responsibility to determine which packets the report relates to.
section: "1"
topics:
