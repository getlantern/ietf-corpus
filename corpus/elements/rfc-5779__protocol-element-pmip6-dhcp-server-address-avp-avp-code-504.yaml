document: rfc-5779
kind: protocol-element
summary: PMIP6-DHCP-Server-Address AVP (AVP Code 504) is of type Address and carries the IP address of the DHCP server assigned to the MAG for the attached MN. The Address type MUST be IPv4 for DHCPv4 server addresses and MUST be IPv6 for DHCPv6 server addresses.
section: "5.4"
rfc2119_level: MUST
topics:
