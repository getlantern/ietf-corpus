document: rfc-5371
kind: wire-format
summary: 'The JPEG 2000 RTP payload header is 8 bytes: tp (2 bits, scan type), MHF (2 bits, main header flag), mh_id (3 bits, main header ID), T (1 bit, tile field invalidation flag), priority (8 bits), tile number (16 bits), reserved (8 bits), and fragment offset (24 bits).'
