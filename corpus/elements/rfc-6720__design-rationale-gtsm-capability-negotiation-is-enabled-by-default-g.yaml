document: rfc-6720
kind: design-rationale
summary: GTSM capability negotiation is enabled by default (G=1) for Basic Discovery but not for Extended Discovery because Basic Discovery typically corresponds to single-hop LDP peering sessions, while Extended Discovery typically corresponds to multi-hop sessions where GTSM's TTL=255 check would be inappropriate.
section: "3"
topics:
