document: rfc-8473
kind: design-rationale
summary: Clients use different Token Binding key pairs for different servers (rather than a single global key pair) to prevent Token Binding IDs from becoming universal cross-server tracking identifiers, preserving the user's privacy across distinct web origins.
section: "5.1"
topics:
