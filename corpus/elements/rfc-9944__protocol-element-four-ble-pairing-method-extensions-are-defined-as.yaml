document: rfc-9944
kind: protocol-element
summary: 'Four BLE pairing method extensions are defined as nested schemas: pairingNull (no attributes, for devices without pairing), pairingJustWorks (key=null, immutable), pairingPassKey (6-digit integer key matching ^[0-9]{6}$), and pairingOOB (key string from NFC/OOB, randomNumber integer nonce, optional confirmationNumber). Multiple pairing methods may be listed in pairingMethods.'
