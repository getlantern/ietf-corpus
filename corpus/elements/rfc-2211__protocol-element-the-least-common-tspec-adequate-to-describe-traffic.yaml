document: rfc-2211
kind: protocol-element
summary: The Least Common TSpec — adequate to describe traffic from any one of several flows, useful for shared SNMP-created reservations — is computed by taking the largest r, largest b, largest p, smallest m, and largest M across the set. Unlike the merged TSpec, it is not passed upstream to sources.
