document: rfc-1195
kind: normative-requirement
summary: Each IP-capable router MUST include at least one of its IP addresses in its LSPs. Where a single router operates as both Level 1 and Level 2, the same IP address(es) MUST appear in both its Level 1 and Level 2 LSPs.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
