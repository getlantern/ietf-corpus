document: rfc-3550
kind: design-rationale
summary: 'RTP follows the Application Level Framing (ALF) principle: the protocol is deliberately incomplete and intended to be tailored by profile and payload format specifications rather than providing general-purpose option parsing. This allows application-specific optimizations without burdening all implementations with unused complexity.'
