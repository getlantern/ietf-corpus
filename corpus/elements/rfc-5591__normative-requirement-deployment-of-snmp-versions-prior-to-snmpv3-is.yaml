document: rfc-5591
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Instead, SNMPv3 with cryptographic security is RECOMMENDED, and implementers should consider full USM and Transport Security Model support.
