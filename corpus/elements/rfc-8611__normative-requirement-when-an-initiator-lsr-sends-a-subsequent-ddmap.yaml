document: rfc-8611
kind: normative-requirement
summary: When an initiator LSR sends a subsequent DDMAP to a downstream LSR over a particular LAG member link, the Local Interface Index Sub-TLVs MUST be removed and the Multipath Data Sub-TLVs MUST be updated to include just one entry.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
