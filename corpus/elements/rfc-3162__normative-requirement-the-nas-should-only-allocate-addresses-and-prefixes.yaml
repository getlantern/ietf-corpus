document: rfc-3162
kind: normative-requirement
summary: The NAS SHOULD only allocate addresses and prefixes that the client can actually use; for example, no IPv4 address reservation is needed for IPv6-only hosts, and no IPv6 prefix allocation is needed for IPv4-only or 6to4 hosts.
section: "1"
rfc2119_level: SHOULD
