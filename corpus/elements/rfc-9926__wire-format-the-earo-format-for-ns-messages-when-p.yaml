document: rfc-9926
kind: wire-format
summary: 'The EARO format for NS messages when P-Field is 3 repurposes the 8-bit Status byte: the MSB is the F flag and bits 1–7 carry the 7-bit Prefix Length. The remaining fields—Opaque, r/C/P/I/R/T flags, TID (8 bits), Registration Lifetime (16 bits), and variable-length ROVR—are unchanged from RFC 8505.'
section: "7.2"
topics:
