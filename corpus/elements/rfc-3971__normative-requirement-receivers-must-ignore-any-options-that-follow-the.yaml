document: rfc-3971
kind: normative-requirement
summary: Receivers MUST ignore any options that follow the first RSA Signature option (for both signature verification and NDP processing). NS, NA, RA, and Redirect messages without the RSA Signature option MUST be treated as unsecured.
section: 5.2.2
rfc2119_level: MUST
topics:
    - security
    - ip
