document: rfc-2429
kind: design-rationale
summary: Senders may find it advisable to always set UFEP='001' (full picture header) in high packet-loss environments to ensure decoders can always reassemble a complete picture header. Abbreviated headers (UFEP='000') are risky when header contents are not predictable.
section: "3"
topics:
