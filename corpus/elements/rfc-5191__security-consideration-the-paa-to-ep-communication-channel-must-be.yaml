document: rfc-5191
kind: security-consideration
summary: The PAA-to-EP communication channel must be protected for authentication, integrity, and replay prevention, because the PAA provisions per-PaC authorization filters on the EP. The protocol for this channel is outside PANA's scope but its security is a deployment requirement.
section: "11.6"
topics:
    - security
