document: rfc-7176
kind: wire-format
summary: 'The Group Labeled MAC Address sub-TLV (GLMAC-ADDR, GADDR sub-TLV type 4) extends GMAC-ADDR by replacing the 2-byte VLAN ID with a 3-byte fine-grained label field, enabling multicast listener advertisement under fine-grained labels defined in RFC 7172. Length formula: 6 + m + 6*n.'
section: 2.1.4
topics:
    - routing
    - multicast
    - mpls
