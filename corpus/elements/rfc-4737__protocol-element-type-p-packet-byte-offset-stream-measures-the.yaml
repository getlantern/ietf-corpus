document: rfc-4737
kind: protocol-element
summary: Type-P-Packet-Byte-Offset-Stream measures the byte storage a receiver needs to accommodate a reordered packet. ByteOffset(s[i]) is the sum of payload sizes of all packets that arrived before s[i] and have a larger source sequence number than s[i]; these are the packets normally buffered waiting for order to be restored.
section: "4.4"
topics:
