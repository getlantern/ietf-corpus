document: rfc-5371
kind: interoperability-note
summary: Senders wishing to use a non-90kHz rate SHOULD also offer the same stream using a 90kHz timestamp rate with a different RTP payload type, allowing graceful fallback to 90kHz for compatibility with receivers that do not support non-standard rates.
section: "7.1"
topics:
    - rtp
    - realtime
