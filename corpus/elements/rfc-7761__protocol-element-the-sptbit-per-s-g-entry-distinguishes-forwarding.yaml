document: rfc-7761
kind: protocol-element
summary: The SPTbit per (S,G) entry distinguishes forwarding on the Shortest-Path Tree (SPT) from the RP tree. When FALSE, only (*,G) forwarding state is used; when TRUE, both (*,G) and (S,G) state apply. The SPTbit prevents temporary black holes during tree switchover by delaying Prune(S,G,rpt) until upstream (S,G) state is established.
section: 4.2.2
topics:
    - multicast
    - routing
