document: rfc-9645
kind: protocol-element
summary: The client-authentication presence container in tls-server-grouping (feature client-auth-supported) has a YANG must constraint requiring at least one of ca-certs, ee-certs, raw-public-keys, tls12-psks, or tls13-epsks; its absence signals that the server will not request client credentials.
section: "4.3"
topics:
    - tls
    - yang
    - pkix
