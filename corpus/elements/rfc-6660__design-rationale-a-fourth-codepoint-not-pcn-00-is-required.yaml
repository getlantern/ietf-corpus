document: rfc-6660
kind: design-rationale
summary: A fourth codepoint (not-PCN = '00') is required because a DSCP is shared between PCN and non-PCN traffic; nodes need a way to identify packets carrying a PCN-compatible DSCP that are not subject to PCN metering and marking, without ambiguity with the NM state.
section: "4.1"
topics:
    - ecn
    - diffserv
    - qos
