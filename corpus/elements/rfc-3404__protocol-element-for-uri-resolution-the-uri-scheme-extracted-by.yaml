document: rfc-3404
kind: protocol-element
summary: For URI resolution, the URI scheme extracted by the First Well Known Rule is converted to a DNS key by appending '.uri.arpa.' (e.g., 'http.uri.arpa.'). For URN resolution, the namespace id is converted by appending '.urn.arpa.' (e.g., 'foo.urn.arpa.').
section: "4.5"
topics:
