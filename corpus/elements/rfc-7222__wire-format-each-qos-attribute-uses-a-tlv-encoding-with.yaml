document: rfc-7222
kind: wire-format
summary: Each QoS Attribute uses a TLV encoding with Type (8-bit), Length (8-bit, excluding Type and Length fields), and Value (variable). Type 0 and Type 255 are reserved and cannot be used; types 1-11 are defined by this specification; types 12-254 are reserved for future allocation.
section: "4.2"
