document: rfc-9811
kind: protocol-element
summary: CMP over HTTP exclusively uses the POST method for requests, effectively tunneling CMP over HTTP. Other HTTP request methods such as GET are not used because PKI management operations can only be triggered using CMP's PKI messages.
