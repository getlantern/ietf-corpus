document: rfc-4348
kind: normative-requirement
summary: The RTP clock rate in the SDP a=rtpmap attribute MUST be 16000 for VMR-WB. The parameter 'channels', if present, is specified subsequent to the MIME subtype and clock rate in the a=rtpmap attribute.
section: "9.2"
rfc2119_level: MUST
topics:
