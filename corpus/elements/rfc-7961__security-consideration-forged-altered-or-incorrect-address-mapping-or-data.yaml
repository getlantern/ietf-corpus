document: rfc-7961
kind: security-consideration
summary: Forged, altered, or incorrect address mapping or data labeling can lead to packet delivery to the wrong party, violating security policy. The document provides no explicit securing mechanisms beyond simple consistency checks; security must be provided by the transport (e.g., ESADI security or Channel Tunnel security).
