document: rfc-4462
kind: normative-requirement
summary: If the client receives SSH_MSG_KEXGSS_CONTINUE after GSS_Init_sec_context() has already returned GSS_S_COMPLETE, or receives SSH_MSG_KEXGSS_COMPLETE (with boolean TRUE) after GSS_S_COMPLETE, a protocol error has occurred and the key exchange MUST fail.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
