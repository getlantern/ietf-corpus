summary: RFC 6049 registers 13 metrics in the IANA-IPPM-METRICS-REGISTRY-MIB (ianaIppmMetrics 71–83), covering finite one-way delay stream and mean (71–72), composite delay mean and minimum (73–75), packet loss empirical probability (76–77), and PDV refmin stream, mean, variance, skewness, quantile, and NPA (78–83).
