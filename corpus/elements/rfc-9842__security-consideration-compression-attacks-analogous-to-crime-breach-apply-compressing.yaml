document: rfc-9842
kind: security-consideration
summary: 'Compression attacks (analogous to CRIME/BREACH) apply: compressing data from mixed public and private sources with a shared dictionary leaks information about the private data. Both the dictionary and the compressed data can reveal information about each other when an adversary can control parts of the compressed input and observe compressed size.'
section: "9.2"
topics:
