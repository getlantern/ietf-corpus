summary: 'SecurityParameters holds cryptographic configuration including allowedSecurityProtocols, serverCertificate, clientCertificate, pinnedServerCertificate (array of certificate chains), alpn (ALPN values), supportedGroup, ciphersuite, signatureAlgorithm, session cache options, and preSharedKey. It also supports callbacks: TrustVerificationCallback and IdentityChallengeCallback.'
