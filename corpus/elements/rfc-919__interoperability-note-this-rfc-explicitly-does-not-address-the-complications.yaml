document: rfc-919
kind: interoperability-note
summary: This RFC explicitly does not address the complications arising from interactions between subnets and broadcasting; those are treated separately in RFC-922. Implementors deploying broadcasts on subnetted IP networks must consult RFC-922 in addition to this document.
