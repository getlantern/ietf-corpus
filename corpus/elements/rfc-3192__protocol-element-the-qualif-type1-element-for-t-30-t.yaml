document: rfc-3192
kind: protocol-element
summary: 'The qualif-type1 element for T.30/T.33 subaddresses is defined as: qualif-type1 = ''/'' t33-sep ''='' sub-addr, where t33-sep = ''T33S'' and sub-addr = 1*(DIGIT). Its use is OPTIONAL.'
