document: rfc-8707
kind: security-consideration
summary: For multi-tenant servers, to avoid attacks where one tenant uses an access token to illegitimately access resources owned by a different tenant, it is important to use a specific resource URI including any path component that identifies the tenant, allowing audience restrictions to identify the tenant and prevent cross-tenant misuse.
section: "3"
topics:
    - oauth
    - security
