document: rfc-7231
kind: interoperability-note
summary: HTTP allows the transfer of text media with plain CR or LF alone representing a line break when consistent for an entire representation, relaxing MIME's canonical CRLF-only requirement. This flexibility applies only to text within a representation; multipart types and HTTP header fields outside the payload must still use CRLF.
section: 3.1.1.3
topics:
    - http
