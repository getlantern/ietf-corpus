document: rfc-3416
kind: protocol-element
summary: GetBulkRequest-PDU retrieves up to N + (M * R) variable bindings, where N = min(non-repeaters, count of bindings), M = max-repetitions, and R = max(count-of-bindings - N, 0). The first N bindings are GetNext-style; the remaining R bindings are each repeated M times via iterated lexicographic successors.
section: 4.2.3
topics:
    - snmp
