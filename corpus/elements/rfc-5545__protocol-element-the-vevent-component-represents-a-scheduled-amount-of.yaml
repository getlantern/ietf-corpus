document: rfc-5545
kind: protocol-element
summary: The VEVENT component represents a scheduled amount of time on a calendar. It requires DTSTART and either DTEND or DURATION (not both). Optional properties include SUMMARY, DESCRIPTION, LOCATION, ORGANIZER, ATTENDEE, RRULE, RECURRENCE-ID, SEQUENCE, UID, and others. VEVENT MUST contain exactly one DTSTART when specified.
section: 3.6.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
