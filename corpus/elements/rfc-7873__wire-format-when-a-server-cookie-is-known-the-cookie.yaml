document: rfc-7873
kind: wire-format
summary: When a Server Cookie is known, the COOKIE option carries the 8-byte Client Cookie followed by a variable-length Server Cookie of 8 to 32 bytes, making OPTION-LENGTH 16 to 40 inclusive. Valid lengths are therefore 8 and 16–40; any other length is malformed.
