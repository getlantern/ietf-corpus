document: rfc-1483
kind: protocol-element
summary: 'OUI 0x00-80-C2 (802.1 organization) PID values for bridged media types: 0x00-01/0x00-07 (Ethernet/802.3 with/without FCS), 0x00-02/0x00-08 (802.4), 0x00-03/0x00-09 (802.5), 0x00-04/0x00-0A (FDDI), 0x00-05/0x00-0B (802.6), 0x00-0D (Fragments), 0x00-0E (BPDUs). Even-numbered PIDs preserve the original LAN FCS; odd-numbered strip it.'
section: Appendix B
topics:
