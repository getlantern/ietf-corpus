document: rfc-6241
kind: normative-requirement
summary: NETCONF <rpc> requests MUST be processed serially by the managed device. Responses MUST be sent only in the order requests were received, though clients MAY pipeline additional requests before receiving replies.
section: "4.5"
rfc2119_level: MUST
topics:
    - netconf
