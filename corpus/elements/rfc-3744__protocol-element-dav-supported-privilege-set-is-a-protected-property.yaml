document: rfc-3744
kind: protocol-element
summary: DAV:supported-privilege-set is a protected property exposing the tree of privileges defined for a resource. Abstract privileges are flagged with DAV:abstract and MUST NOT be set in an ACE. The tree maps well-known DAV privileges to implementation-specific ones and guides administrative UIs.
section: "5.3"
topics:
    - security
