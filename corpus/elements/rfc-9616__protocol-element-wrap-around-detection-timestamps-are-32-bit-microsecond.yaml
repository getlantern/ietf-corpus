document: rfc-9616
kind: protocol-element
summary: 'Wrap-around detection: timestamps are 32-bit microsecond counters that wrap every ~71 minutes. On node restart the clock origin is arbitrary, so timestamps from before a reboot may appear as large forward jumps or nonsensical values and must be discarded.'
section: "3.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
