document: rfc-8556
kind: normative-requirement
summary: 'In the Leaf A-D route''s PTA when BIER is used: tunnel type MUST be BIER, MPLS Label SHOULD be zero, sub-domain-id MUST match the corresponding value from the matching x-PMSI A-D route''s PTA, BFR-id MUST be set to the egress PE''s BFR-id, and BFR-prefix MUST be set to the egress PE''s BFR-prefix.'
section: "3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
