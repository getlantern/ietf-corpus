document: rfc-3801
kind: normative-requirement
summary: 'The sending system MUST report the time the message was sent in the Date: field, and the time zone MUST be present, represented as a four-digit offset (e.g., -0500). If no timestamp is available from the originating system, the gateway arrival time SHOULD be used.'
section: 4.2.4
rfc2119_level: MUST
topics:
    - email
