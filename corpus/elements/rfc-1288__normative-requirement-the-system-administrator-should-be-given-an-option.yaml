document: rfc-1288
kind: normative-requirement
summary: The system administrator SHOULD be given an option to individually turn on or off RUIP acceptance of {C} (online user list) queries. If {C} processing is turned off, the RUIP MUST return a service refusal message such as 'Finger online user list denied'.
section: 3.2.2
rfc2119_level: MUST
topics:
    - security
