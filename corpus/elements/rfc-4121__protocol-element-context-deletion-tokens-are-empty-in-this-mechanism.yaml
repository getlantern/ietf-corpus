document: rfc-4121
kind: protocol-element
summary: Context deletion tokens are empty in this mechanism. Both peers independently invoke GSS_Delete_sec_context() with a null output_context_token buffer, signaling that no deletion token is emitted or consumed. Implementations should delete locally stored context information.
section: "4.3"
topics:
    - security
