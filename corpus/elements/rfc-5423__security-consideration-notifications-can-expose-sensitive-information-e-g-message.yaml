document: rfc-5423
kind: security-consideration
summary: Notifications can expose sensitive information (e.g., message content, user activity) and produce high traffic volumes. An attacker able to modify notifications could corrupt state between entities, for example by falsifying audit log entries through altered 'user' and 'messageContent' parameters in MessageNew notifications.
section: "7"
topics:
    - email
    - security
