document: rfc-1256
kind: design-rationale
summary: The PreferenceLevel value hex 80000000 allows a router to advertise an address (keeping it alive for black-hole detection timers) while preventing hosts from using it as a general default router. This is distinct from setting Advertise=FALSE, which removes the address entirely.
section: "4.1"
topics:
    - ip
    - routing
