document: rfc-8736
kind: protocol-element
summary: Types 13, 14, and 15 each support 16 subtypes (via the Subtype field in bits 4–7), providing 48 total subtypes for future PIM extensions. The notation 'type.subtype' is used to reference them. The remaining four flag bits (0–3) are reserved for use by each extended type.
