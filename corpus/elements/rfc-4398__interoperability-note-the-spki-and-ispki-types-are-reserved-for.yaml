document: rfc-4398
kind: interoperability-note
summary: The SPKI and ISPKI types are reserved for the SPKI certificate format but their format is not yet specified, pending SPKI documents advancing from experimental status (RFC 2692/2693). Implementations encountering these types cannot currently interpret the certificate portion.
