document: rfc-9103
kind: normative-requirement
summary: Secondary implementations MUST be resilient to receiving padded AXoT responses, including 'empty' AXoT responses that contain only an OPT RR with the EDNS(0) padding option and no DNS resource records. Secondary implementations MUST also be resilient to receiving padded IXoT responses.
section: 7.9.1
rfc2119_level: MUST
topics:
    - dns
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
