document: rfc-3006
kind: normative-requirement
summary: A router that makes use of the compressibility hint for admission control should police the flow using the compressed TSpec (as if it is at the edge of the network), so that any traffic exceeding the compressed TSpec is treated as excess according to intserv rules.
section: "3"
rfc2119_level: SHOULD
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
