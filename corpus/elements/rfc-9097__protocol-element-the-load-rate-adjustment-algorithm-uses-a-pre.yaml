document: rfc-9097
kind: protocol-element
summary: 'The load rate adjustment algorithm uses a pre-built table (R1 through Rn in ascending order). Recommended rate increments are: 1 Mbps steps from 1 Mbps to 1 Gbps; 100 Mbps steps from 1 Gbps to 10 Gbps; 1 Gbps steps above 10 Gbps. Each rate is defined by datagram size ss, burst count cc, and burst interval tt (default 100 microsec).'
section: "8.1"
