document: rfc-5628
kind: design-rationale
summary: In 3GPP IMS, registering one AOR causes implicit registration of associated AORs, each requiring unique GRUUs. The REGISTER response only returns GRUUs for the explicitly registered AOR, so this extension allows the registrar to deliver GRUUs for all implicitly registered AORs via registration event notifications.
section: "1"
topics:
    - sip
    - realtime
