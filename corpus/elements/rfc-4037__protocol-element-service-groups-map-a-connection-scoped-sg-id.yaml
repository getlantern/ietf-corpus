document: rfc-4037
kind: protocol-element
summary: Service groups map a connection-scoped sg-id to an ordered list of adaptation service URIs via Service Group Created (SGC). The callout server must apply the services in order for each transaction that references the group. Service Group Destroyed (SGD) releases the association.
section: "11.3"
