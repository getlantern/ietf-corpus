document: rfc-4368
kind: protocol-element
summary: mplsLcAtmLcAtmVPI specifies the VPI value used for indirectly connected LC-ATM interfaces. For indirect connections the VPI field is not available to MPLS, so the label MUST be encoded entirely within the VCI field per RFC 3035. Default is 0 (used for directly connected interfaces).
