document: rfc-9644
kind: protocol-element
summary: 'Local user authentication in ''client-authentication/users/user'' supports: public-keys (set of SSH public keys for exact-match), hashed-password (ianach:crypt-hash type with read-only last-modified timestamp), hostbased (set of host keys), and none — each gated by its own feature dependent on ''local-users-supported''.'
section: "4.3"
topics:
