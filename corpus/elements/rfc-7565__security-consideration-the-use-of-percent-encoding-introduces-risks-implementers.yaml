document: rfc-7565
kind: security-consideration
summary: The use of percent-encoding introduces risks; implementers are advised to disallow percent-encoded characters or sequences that would result in space, null, control, or otherwise forbidden characters, allow unauthorized access to private data, or lead to other security vulnerabilities.
