document: rfc-6705
kind: design-rationale
summary: No synchronization between MAGs is required before local forwarding begins in Scenario A21 because each MAG initiates LR in only one direction independently. Asymmetric LR (one direction localized, one through LMA) is a valid transient state and avoids packet duplication.
