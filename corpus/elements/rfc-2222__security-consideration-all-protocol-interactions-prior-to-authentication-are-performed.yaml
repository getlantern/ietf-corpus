document: rfc-2222
kind: security-consideration
summary: All protocol interactions prior to authentication are performed in the clear and may be modified. Security-sensitive protocol negotiations should be performed after authentication completes; protocols should be designed to ignore or revalidate pre-authentication negotiations once authentication is complete.
section: "9"
topics:
    - security
