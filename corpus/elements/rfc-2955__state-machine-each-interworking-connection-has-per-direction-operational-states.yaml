document: rfc-2955
kind: state-machine
summary: 'Each interworking connection has per-direction operational states (frAtmIwfConnAtm2FrOperStatus and frAtmIwfConnFr2AtmOperStatus), each taking values up(1) or down(2). The frAtmIwfConnAdminStatus triggers transitions: setting to up(1) requires endpoint AdminStatus/OperStatus to be up first; setting to down(2) requires the ATM endpoint AdminStatus to be down first.'
section: "4.1"
