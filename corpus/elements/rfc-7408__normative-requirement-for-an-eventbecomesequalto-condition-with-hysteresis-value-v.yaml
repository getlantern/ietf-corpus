document: rfc-7408
kind: normative-requirement
summary: For an eventBecomesEqualTo condition with hysteresis value V, after the last notification, a new eventBecomesEqualTo notification MUST be generated only one time once the value has changed by +/- V.
section: "2.4"
rfc2119_level: MUST
