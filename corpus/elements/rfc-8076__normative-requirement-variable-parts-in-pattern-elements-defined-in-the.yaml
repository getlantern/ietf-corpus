document: rfc-8076
kind: normative-requirement
summary: Variable parts in <pattern> elements defined in the overlay configuration document MUST remain syntactically separated from the username part (e.g., by a dedicated delimiter) to prevent collisions with resource names of other users.
section: "5.3"
rfc2119_level: MUST
topics:
