document: rfc-8487
kind: security-consideration
summary: A router providing Mtrace2 MUST support a source-verification mechanism to drop Queries from unauthorized clients and Requests from unauthorized peer routers or addresses beyond a specified administrative boundary. Unauthorized Query/Requests MUST NOT be processed; the router MAY perform rate-limited logging.
section: "9.2"
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
