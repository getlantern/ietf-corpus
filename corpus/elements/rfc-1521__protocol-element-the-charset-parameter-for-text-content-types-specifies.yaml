document: rfc-1521
kind: protocol-element
summary: The 'charset' parameter for text Content-Types specifies the character set of the body. The default is US-ASCII. Defined values at publication are US-ASCII and ISO-8859-1 through ISO-8859-9. The parameter value is NOT case-sensitive. New character set names require IANA registration.
section: 7.1.1
topics:
    - email
