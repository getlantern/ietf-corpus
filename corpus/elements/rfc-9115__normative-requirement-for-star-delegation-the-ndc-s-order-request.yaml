document: rfc-9115
kind: normative-requirement
summary: For STAR delegation, the NDC's order request MUST include a 'delegation' attribute, MUST include all delegated identifiers, MUST NOT contain 'notBefore'/'notAfter', and MUST contain an 'auto-renewal' object with 'allow-certificate-get' set to true.
section: 2.3.2
rfc2119_level: MUST
topics:
