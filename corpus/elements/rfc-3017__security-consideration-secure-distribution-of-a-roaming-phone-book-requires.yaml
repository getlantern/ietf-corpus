document: rfc-3017
kind: security-consideration
summary: Secure distribution of a roaming phone book requires reliable authentication of the issuer and integrity protection of the content. The XML DTD itself provides no security elements; security is assumed to be provided by external mechanisms such as signing the phone book using PGP.
section: "8"
topics:
