document: rfc-7671
kind: wire-format
summary: Server operators SHOULD NOT publish TLSA records using both selector Cert(0) and matching type Full(0), as a single full certificate is generally too large to deliver reliably via DNS over UDP; two full certificates during rollover exacerbate this.
section: 10.1.2
topics:
