kind: protocol-element
summary: The Binding Cache is a conceptual data structure maintained by home agents and correspondent nodes storing bindings (home address to care-of address with remaining lifetime). The Binding Update List is maintained by each mobile node to track all bindings it has or is attempting to establish.
