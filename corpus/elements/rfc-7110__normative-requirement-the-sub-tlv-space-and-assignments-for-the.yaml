document: rfc-7110
kind: normative-requirement
summary: The sub-TLV space and assignments for the Reply Path TLV (Type 21) MUST be the same as for the Target FEC Stack TLV (Type 1). Sub-types for both TLV types MUST be kept the same; any new sub-type added to Type 1 MUST apply to Type 21 as well.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
    - registry
