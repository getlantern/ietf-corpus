document: rfc-2126
kind: wire-format
summary: 'The TPKT packet header consists of four fields: version (8 bits, value 3), reserved (8 bits, value 0), packet length (16 bits, total length of the entire TPKT including header), followed by the variable-length ISO 8073 TPDU. This encapsulation delimits TPDU boundaries over the TCP octet stream.'
section: "4.3"
