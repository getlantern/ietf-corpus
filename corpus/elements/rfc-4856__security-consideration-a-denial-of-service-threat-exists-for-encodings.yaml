document: rfc-4856
kind: security-consideration
summary: A denial-of-service threat exists for encodings using compression with non-uniform receiver-end computational load; an attacker can inject pathological datagrams that are complex to decode. None of the encodings registered here has an expansion factor greater than about 20.
