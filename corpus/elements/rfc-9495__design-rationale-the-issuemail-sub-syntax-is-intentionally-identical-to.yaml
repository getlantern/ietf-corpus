document: rfc-9495
kind: design-rationale
summary: The "issuemail" sub-syntax is intentionally identical to that of the "issue" and "issuewild" Property Tags from RFC 8659. This design choice minimizes implementation complexity by reusing existing parser logic, and allows parameters (e.g., account identifiers) to be defined by individual CAs to further restrict issuance.
section: "3"
topics:
