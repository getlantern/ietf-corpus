document: rfc-5072
kind: normative-requirement
summary: IPV6CP packets received before PPP reaches the network-layer protocol phase should be silently discarded. Implementations should be prepared to wait for Authentication and Link Quality Determination before timing out.
section: "3"
rfc2119_level: SHOULD
topics:
