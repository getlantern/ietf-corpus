kind: registry
summary: 'Status codes range 0–255; 0–191 require Standards Action for new assignments; 192–255 are reserved for private/local use. Initial assignments: SSH_PUBLICKEY_SUCCESS (0), SSH_PUBLICKEY_ACCESS_DENIED (1), SSH_PUBLICKEY_STORAGE_EXCEEDED (2), SSH_PUBLICKEY_VERSION_NOT_SUPPORTED (3), SSH_PUBLICKEY_KEY_NOT_FOUND (4), SSH_PUBLICKEY_KEY_NOT_SUPPORTED (5), SSH_PUBLICKEY_KEY_ALREADY_PRESENT (6), SSH_PUBLICKEY_GENERAL_FAILURE (7), SSH_PUBLICKEY_REQUEST_NOT_SUPPORTED (8), SSH_PUBLICKEY_ATTRIBUTE_NOT_SUPPORTED (9).'
section: "6.6"
