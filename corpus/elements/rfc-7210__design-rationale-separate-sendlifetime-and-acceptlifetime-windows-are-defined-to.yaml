document: rfc-7210
kind: design-rationale
summary: Separate SendLifetime and AcceptLifetime windows are defined to support orderly key rollover with overlapping valid periods. Operators should configure SendLifetimeStart several hours after AcceptLifeTimeStart to guarantee overlap and address clock-skew issues.
