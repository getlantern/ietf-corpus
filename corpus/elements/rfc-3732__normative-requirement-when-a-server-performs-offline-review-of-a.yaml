document: rfc-3732
kind: normative-requirement
summary: When a server performs offline review of a transform command, it MUST return response code 1001, MUST reflect the pending status on the object, and MUST notify the client when offline processing is completed.
section: 3.2.6
rfc2119_level: MUST
