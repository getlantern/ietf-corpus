document: rfc-6887
kind: protocol-element
summary: 'All PCP address fields are fixed-size 128 bits. IPv4 addresses are encoded as IPv4-mapped IPv6 addresses (::ffff:0:0/96): 80 zero bits, 16 one bits, 32-bit IPv4 address. When checking for IPv4-mapped addresses, all 96 prefix bits MUST be checked. The all-zeros IPv4 address is expressed as ::ffff:0:0.'
section: "5"
topics:
