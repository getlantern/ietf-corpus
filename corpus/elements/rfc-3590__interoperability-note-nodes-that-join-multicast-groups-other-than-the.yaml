document: rfc-3590
kind: interoperability-note
summary: 'Nodes that join multicast groups other than the link-local solicited-node group prior to obtaining a link-local address may experience a temporary black hole if RFC 2710 implementations discard their Reports sent with :: source; this resolves once the node acquires a valid link-local address.'
