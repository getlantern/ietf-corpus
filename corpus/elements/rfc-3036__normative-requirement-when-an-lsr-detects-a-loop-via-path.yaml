document: rfc-3036
kind: normative-requirement
summary: When an LSR detects a loop via Path Vector or Hop Count TLV in a Label Mapping message, it MUST stop using the label for forwarding, drop the Label Mapping message, and signal Loop Detected status to the source of the message.
section: 2.8.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
