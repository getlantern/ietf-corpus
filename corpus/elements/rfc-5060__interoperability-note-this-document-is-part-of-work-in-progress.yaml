document: rfc-5060
kind: interoperability-note
summary: This document is part of work in progress to obsolete RFC 2934 but does not yet do so. Where the two documents overlap, this MIB module (RFC 5060) is to be preferred. RFC 2934 defined an experimental MIB; this document's module does not support PIM-SM v1 and does not depend on the IPv4 Multicast Routing MIB (RFC 2932).
