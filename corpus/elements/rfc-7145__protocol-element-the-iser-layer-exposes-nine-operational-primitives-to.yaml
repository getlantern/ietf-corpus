document: rfc-7145
kind: protocol-element
summary: 'The iSER layer exposes nine Operational Primitives to the iSCSI layer: Send_Control, Put_Data, Get_Data, Allocate_Connection_Resources, Deallocate_Connection_Resources, Enable_Datamover, Connection_Terminate, Notice_Key_Values, and Deallocate_Task_Resources. Each invocation is qualified with a Connection_Handle.'
section: "3.1"
