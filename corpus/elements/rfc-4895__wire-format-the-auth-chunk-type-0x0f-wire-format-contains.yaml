document: rfc-4895
kind: wire-format
summary: 'The AUTH chunk (type 0x0F) wire format contains: 1-byte Type (0x0F), 1-byte Flags (must be zero), 2-byte Length (HMAC length + 8), 2-byte Shared Key Identifier, 2-byte HMAC Identifier, variable-length HMAC field, and 0-3 bytes zero padding for 32-bit alignment.'
