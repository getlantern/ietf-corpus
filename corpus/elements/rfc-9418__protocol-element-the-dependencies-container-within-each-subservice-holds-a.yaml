document: rfc-9418
kind: protocol-element
summary: 'The `dependencies` container within each subservice holds a list of dependency references (leafrefs to `type` and `id`), each with an optional `dependency-type` identityref. Two standard dependency types are defined: `impacting` (the dependency''s status directly affects the dependent''s health) and `informational` (symptoms may be relevant for diagnosis but do not affect health score).'
section: "3.2"
topics:
    - yang
    - netconf
