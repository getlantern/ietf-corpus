document: rfc-8395
kind: protocol-element
summary: Two new Control Flags bits (T and R) are defined in the Layer2 Info Extended Community to signal flow label capability. T=1 indicates the PE can send PW packets with a flow label; R=1 indicates the PE can receive PW packets with a flow label.
