document: rfc-7796
kind: wire-format
summary: 'The BGP E-Tree Extended Community (type 0x80, sub-type 0x0b) is 8 octets: a 2-octet type field, two 2-octet fields each carrying a 4-bit MBZ and a 12-bit VLAN ID (Root then Leaf), and a 2-octet field with 14 reserved bits plus a P bit (leaf-only) and V bit (VLAN mapping capability).'
section: "6.2"
