document: rfc-927
kind: protocol-element
summary: 'Two negotiation orderings both produce successful UUID authentication: (Case 1) server sends DO TUID first, user replies WILL TUID then sends subnegotiation; (Case 2) user sends WILL TUID first, server replies DO TUID, then user sends subnegotiation. Both result in the UUID being delivered.'
