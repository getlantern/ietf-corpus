document: rfc-9560
kind: normative-requirement
summary: An RDAP server MUST provide information about its capabilities and supported OPs in the 'help' query response in the 'farv1_openidcConfiguration' data structure, and MUST support at least one method of OP discovery. The server MUST set either 'sessionClientSupported' or 'tokenClientSupported' to true.
section: 3.1.4.1
rfc2119_level: MUST
topics:
    - oauth
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
