document: rfc-7802
kind: design-rationale
summary: This document obsoletes RFC 4402 and changes the PRF+ counter to start at 0 instead of 1. RFC 4402 specified starting at 1, but multiple implementations already used 0, making the original specification non-interoperable with deployed code.
section: "1"
topics:
    - crypto
    - security
