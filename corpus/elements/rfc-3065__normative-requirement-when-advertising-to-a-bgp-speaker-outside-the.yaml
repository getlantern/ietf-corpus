document: rfc-3065
kind: normative-requirement
summary: When advertising to a BGP speaker outside the confederation, the advertising speaker SHALL strip all leading AS_CONFED_SEQUENCE and AS_CONFED_SET segments from the AS_PATH before prepending its own Confederation ID in an AS_SEQUENCE segment.
section: "6.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
