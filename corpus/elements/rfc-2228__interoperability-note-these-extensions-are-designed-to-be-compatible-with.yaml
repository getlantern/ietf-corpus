document: rfc-2228
kind: interoperability-note
summary: These extensions are designed to be compatible with RFC 959 (STD 9). Servers that do not recognize the AUTH command will respond with 500 (unrecognized command), consistent with the large deployed base of non-security-aware FTP servers. Servers that recognize but do not implement the extensions should respond with 502.
section: "3"
topics:
