document: rfc-6243
kind: protocol-element
summary: The 'explicit' basic mode MUST consider any data node that is not explicitly set by a client to be default data. Explicitly-set nodes are reported even if they contain the schema default value; server-set default nodes are not reported.
section: "2.3"
