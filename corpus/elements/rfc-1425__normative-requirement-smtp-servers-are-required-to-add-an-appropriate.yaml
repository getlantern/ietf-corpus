document: rfc-1425
kind: normative-requirement
summary: 'SMTP servers are required to add an appropriate Received: header field to all messages they receive. A ''with ESMTP'' clause SHOULD be added when any SMTP service extensions are used. ''ESMTP'' is added to the list of standard protocol names registered with IANA.'
section: "7"
rfc2119_level: SHOULD
