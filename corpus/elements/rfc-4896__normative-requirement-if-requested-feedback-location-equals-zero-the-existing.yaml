document: rfc-4896
kind: normative-requirement
summary: If requested_feedback_location equals zero, the existing feedback data SHOULD be left untouched and returned in subsequent messages. If requested_feedback_location is non-zero but the Q flag is zero (no feedback item present), the existing feedback data SHOULD be overwritten to 'no feedback data'.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
