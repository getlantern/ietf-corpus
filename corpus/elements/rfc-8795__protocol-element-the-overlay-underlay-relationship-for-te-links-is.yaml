summary: The overlay/underlay relationship for TE links is modeled via the 'underlay' container, which captures primary-path, backup-path (indexed list), protection-type, tunnel-termination-points (source and destination), and tunnels. This functionality is gated behind the 'te-topology-hierarchy' feature.
