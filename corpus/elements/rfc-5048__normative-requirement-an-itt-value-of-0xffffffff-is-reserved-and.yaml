document: rfc-5048
kind: normative-requirement
summary: An ITT value of 0xffffffff is reserved and MUST NOT be assigned for a task by the initiator; it may only appear in target-initiated NOP-In PDUs and initiator responses to those PDUs.
section: "7.1"
rfc2119_level: MUST NOT
