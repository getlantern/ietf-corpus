document: rfc-1274
kind: interoperability-note
summary: Requests to modify an existing object class by changing its mandatory attribute types are refused; a new object class is created instead and the original is scheduled for expiry. Only additions of optional attributes are accommodated in-place, and implementations are expected to be resilient to such additive changes.
section: "4"
topics:
