document: rfc-5189
kind: design-rationale
summary: Policy rule group state is not independently maintained by the middlebox; instead it is implicitly derived from the aggregate state of all member policy rules. A group ceases to exist once all its member rules have expired. This was chosen to avoid redundant state management.
section: 2.1.3
topics:
    - nat
