document: rfc-7482
kind: interoperability-note
summary: RDAP query results may include associated records (such as IDN variants) beyond exact matches, filtered by server privacy and data-release policies. Client identity and authorization may determine the breadth of returned data, meaning different clients may receive different response sets for the same query.
section: "4.2"
topics:
    - dns
    - registry
    - privacy
