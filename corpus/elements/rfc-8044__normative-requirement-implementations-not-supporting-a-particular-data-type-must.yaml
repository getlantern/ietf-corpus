document: rfc-8044
kind: normative-requirement
summary: Implementations not supporting a particular data type MUST treat attributes of that data type as being of data type 'string'. It is RECOMMENDED that such attributes be treated as 'invalid attributes' as defined in RFC 6929 Section 2.8.
section: "2.2"
rfc2119_level: MUST
