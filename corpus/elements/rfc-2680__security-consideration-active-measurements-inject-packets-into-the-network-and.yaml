document: rfc-2680
kind: security-consideration
summary: Active measurements inject packets into the network and can skew results or cause congestion and denial of service if too much traffic is injected. Additionally, routers recognizing measurement traffic and treating it differently, or attackers injecting artificial measurement traffic to artificially lower observed loss rates, are threats to measurement integrity.
section: "5"
topics:
    - measurement
    - security
