document: rfc-8265
kind: normative-requirement
summary: SASL mechanisms that follow this document's recommendations MUST specify whether and when case mapping is applied to authentication identifiers. Implementations SHOULD delay case mapping to the last possible moment (e.g., username lookup or comparison) to retain information for as long as possible.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
