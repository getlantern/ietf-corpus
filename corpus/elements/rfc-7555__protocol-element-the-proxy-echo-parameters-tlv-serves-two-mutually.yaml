document: rfc-7555
kind: protocol-element
summary: 'The Proxy Echo Parameters TLV serves two mutually exclusive operating modes: (1) controlling attributes for composing and sending an MPLS Echo Request (no reply information is returned), or (2) querying the Proxy LSR for FEC information via Proxy Flags (which suppresses Echo Request sending). The Proxy Flags field selects the mode.'
section: "5.1"
topics:
