document: rfc-6667
kind: design-rationale
summary: The Typed Wildcard FEC approach provides a more generalized solution than the existing 'Group ID' field (PWid) and 'PW Grouping ID TLV' (Generalized PWid) mechanisms because it additionally enables Typed Wildcard Label Request messages and allows Label TLVs to further constrain the wildcard to FECs bound to a specific label.
