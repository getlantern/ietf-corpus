document: rfc-9369
kind: normative-requirement
summary: If the server sends a Retry packet during compatible negotiation, it MUST use the original version. The client MUST NOT use a different version in the subsequent Initial packet containing the Retry token.
section: "4.1"
rfc2119_level: MUST
topics:
