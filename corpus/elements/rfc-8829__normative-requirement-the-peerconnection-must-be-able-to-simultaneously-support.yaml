document: rfc-8829
kind: normative-requirement
summary: The PeerConnection MUST be able to simultaneously support use of both the current and pending local descriptions (e.g., codecs from either description) from the time it enters have-local-offer until setRemoteDescription is called with a final answer or rollback.
section: 4.1.11
rfc2119_level: MUST
topics:
