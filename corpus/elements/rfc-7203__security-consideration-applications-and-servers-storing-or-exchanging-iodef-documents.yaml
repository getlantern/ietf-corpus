document: rfc-7203
kind: security-consideration
summary: Applications and servers storing or exchanging IODEF documents with SCI extensions are targets for attacks. It is RECOMMENDED they be properly secured, have minimal services enabled, and maintain access controls and monitoring.
section: "6.3"
topics:
