document: rfc-9174
kind: normative-requirement
summary: All TCPCL end-entity certificates SHALL conform to RFC 5280 and SHALL be version 3; entities SHALL reject version 1 and version 2 end-entity certificates. Unless prohibited by CA policy, a TCPCL end-entity certificate SHALL contain a NODE-ID (subjectAltName otherName of type id-on-bundleEID) authenticating the peer's node ID.
section: 4.4.2
rfc2119_level: SHALL
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
