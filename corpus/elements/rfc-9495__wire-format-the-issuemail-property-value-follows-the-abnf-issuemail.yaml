document: rfc-9495
kind: wire-format
summary: 'The "issuemail" Property Value follows the ABNF: issuemail-value = *WSP [issuer-domain-name *WSP] [";" *WSP [parameters *WSP]], where issuer-domain-name is one or more LDH labels separated by dots, and parameters is a semicolon-separated list of tag=value pairs. This syntax is identical to that of the "issue" and "issuewild" Property Tags defined in RFC 8659.'
section: "3"
topics:
    - dns
    - pkix
