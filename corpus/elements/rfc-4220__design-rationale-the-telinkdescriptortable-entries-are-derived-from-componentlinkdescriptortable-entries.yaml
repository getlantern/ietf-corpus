kind: design-rationale
summary: The teLinkDescriptorTable entries are derived from componentLinkDescriptorTable entries, and teLinkBandwidthTable values are aggregations of componentLinkBandwidthTable values. This layered derivation model allows TE link properties to be automatically consistent with their constituent component links.
