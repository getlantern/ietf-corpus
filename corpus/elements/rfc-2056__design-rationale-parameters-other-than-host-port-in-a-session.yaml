document: rfc-2056
kind: design-rationale
summary: Parameters other than host/port in a Session URL (when no docid is present) are treated as 'hints' rather than strict requirements. Various clients may treat them as requirements, preferences, or ignore them — this flexibility accommodates different client implementations without mandating interactive behavior.
section: "3"
