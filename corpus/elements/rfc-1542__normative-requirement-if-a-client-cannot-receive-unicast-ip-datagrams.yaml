document: rfc-1542
kind: normative-requirement
summary: If a client cannot receive unicast IP datagrams before knowing its IP address, it SHOULD set the BROADCAST flag to 1 in BOOTREQUEST messages. Clients able to receive unicast replies SHOULD NOT set the BROADCAST flag (SHOULD clear it to 0).
section: 3.1.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
