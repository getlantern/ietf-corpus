document: rfc-4022
kind: protocol-element
summary: The tcpConnectionTable provides IP-version-neutral access to status information for all active TCP connections, indexed by local/remote address type, address, and port. Each row is transient and ceases to exist when the connection transitions to the CLOSED state.
