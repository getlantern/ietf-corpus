document: rfc-2710
kind: design-rationale
summary: 'Report suppression is used to reduce link traffic: if a node receives another node''s Report for the same multicast address while its own timer is running, it stops its timer and does not send its own Report. This is a deliberate trade-off between reliability and bandwidth efficiency.'
