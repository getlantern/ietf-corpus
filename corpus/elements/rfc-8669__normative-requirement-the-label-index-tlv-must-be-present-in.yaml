document: rfc-8669
kind: normative-requirement
summary: The Label-Index TLV MUST be present in the BGP Prefix-SID attribute when attached to IPv4/IPv6 Labeled Unicast prefixes. A BGP Prefix-SID attribute received without a Label-Index TLV MUST be considered invalid by the receiving speaker.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
