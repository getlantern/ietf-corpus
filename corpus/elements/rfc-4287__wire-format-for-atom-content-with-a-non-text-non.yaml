document: rfc-4287
kind: wire-format
summary: For atom:content with a non-text, non-XML MIME type, the content MUST be valid Base64 encoding (RFC 3548 section 3). Lines are separated by a single newline (U+000A); leading/trailing whitespace within the element is permitted.
section: 4.1.3.3
rfc2119_level: MUST
