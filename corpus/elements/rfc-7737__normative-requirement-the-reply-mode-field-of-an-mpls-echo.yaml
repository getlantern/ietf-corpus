document: rfc-7737
kind: normative-requirement
summary: The Reply Mode field of an MPLS echo request MUST be set to a valid value even when the Reply Mode Order TLV is included. The initiator SHOULD set it to the value most likely to be available, in case the responder does not understand the TLV.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
