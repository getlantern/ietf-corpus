document: rfc-9753
kind: security-consideration
summary: The P and I flag extensions for stateful PCEP do not introduce new security concerns on their own; the security considerations of RFC 5440, RFC 8231, and RFC 8281 continue to apply. It is RECOMMENDED that these extensions be activated only on authenticated and encrypted sessions using TLS (RFC 8253) per RFC 9325 best practices.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
