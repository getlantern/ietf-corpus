document: rfc-5444
kind: protocol-element
summary: 'Three distinct TLV kinds exist: Packet TLVs (carried in the Packet Header TLV Block), Message TLVs (carried in the per-message TLV Block before any Address Blocks), and Address Block TLVs (carried in the TLV Block following an Address Block). Index fields in Address Block TLVs select which subset of addresses the TLV applies to.'
section: 5.4.1
topics:
    - routing
