document: rfc-6063
kind: normative-requirement
summary: Computation of the server's key confirmation MAC MUST include a hash of all DSKPP messages sent during the transaction; re-transmitted messages are removed, the remaining sequence is concatenated and hashed with SHA-256 per FIPS 180.
section: 3.4.3
rfc2119_level: MUST
topics:
    - crypto
    - security
