document: rfc-7711
kind: normative-requirement
summary: The document retrieved from a reference document's 'url' MUST NOT itself be a reference document (i.e., must not contain a 'url' member instead of a 'fingerprints' member), in order to prevent circular delegations.
section: "3.2"
rfc2119_level: MUST
