document: rfc-4865
kind: normative-requirement
summary: An SMTP client using HOLDFOR MUST ensure the future-release-interval does not exceed the max-future-release-interval advertised by the MSA; a client using HOLDUNTIL MUST ensure the future-release-date-time is not later than the max-future-release-date-time advertised.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
