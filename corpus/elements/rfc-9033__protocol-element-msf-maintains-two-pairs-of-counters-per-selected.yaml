document: rfc-9033
kind: protocol-element
summary: 'MSF maintains two pairs of counters per selected parent: NumCellsElapsed (counts elapsed negotiated cells, incremented by 1 per elapsed cell regardless of use) and NumCellsUsed (counts cells where a frame was sent or a valid frame received). Both are initialized to 0 at boot.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
