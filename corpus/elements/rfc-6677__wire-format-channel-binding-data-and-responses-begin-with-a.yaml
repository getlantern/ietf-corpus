document: rfc-6677
kind: wire-format
summary: 'Channel-binding data and responses begin with a one-byte Code field, followed by one or more groups of: a two-octet Length (network byte order, not including NSID and length octets), a one-octet NSID (namespace identifier), and NS-Specific data. The format allows multiple namespaces to be concatenated in a single message.'
section: "5.3"
topics:
    - security
