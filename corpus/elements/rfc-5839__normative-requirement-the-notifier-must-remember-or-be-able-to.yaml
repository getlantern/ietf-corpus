document: rfc-5839
kind: normative-requirement
summary: The notifier MUST remember (or be able to recalculate) the entity-tag of an entity as long as the version of the entity is current. The notifier MAY remember the entity-tag longer for implementing journaled state differentials.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
