document: rfc-4740
kind: interoperability-note
summary: 'Section 12 defines gateway procedures for translating between RADIUS clients and Diameter servers (Section 12.1) and between Diameter clients and RADIUS servers (Section 12.2), but Section 12.3 notes known limitations: several Diameter SIP AVPs have no RADIUS equivalents, so complete feature parity is not achievable through a gateway.'
