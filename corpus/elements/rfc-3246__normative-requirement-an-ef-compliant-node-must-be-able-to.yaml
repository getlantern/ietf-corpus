document: rfc-3246
kind: normative-requirement
summary: An EF-compliant node MUST be able to be characterized by the range of possible R values it can support on each interface while conforming to the aggregate equations, and the value of E_a that can be met. E_a MAY be specified as a worst-case value for all R or as a function of R.
section: "2.2"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
