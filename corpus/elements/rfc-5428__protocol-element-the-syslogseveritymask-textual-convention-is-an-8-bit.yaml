document: rfc-5428
kind: protocol-element
summary: The SyslogSeverityMask textual convention is an 8-bit mask representing syslog severity levels (emerg=0, alert=1, crit=2, err=3, warning=4, notice=5, info=6, debug=7) as defined in RFC 5424. It is used to selectively enable or disable event reporting by severity level within an event class.
section: "6"
topics:
    - snmp
    - syslog
