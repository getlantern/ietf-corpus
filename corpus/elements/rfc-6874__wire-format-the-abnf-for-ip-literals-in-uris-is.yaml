document: rfc-6874
kind: wire-format
summary: 'The ABNF for IP literals in URIs is extended with three rules: IP-literal = "[" ( IPv6address / IPv6addrz / IPvFuture ) "]"; ZoneID = 1*( unreserved / pct-encoded ); IPv6addrz = IPv6address "%25" ZoneID. The literal "%" separator from RFC 4007 is percent-encoded as "%25" to comply with RFC 3986 URI syntax.'
section: "2"
topics:
