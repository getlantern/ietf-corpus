document: rfc-9753
kind: protocol-element
summary: The I (Ignore) flag in the PCUpd message allows a PCE to indicate to a PCC whether an optional object was processed. The PCE MAY include the ignored optional object and set the I flag to indicate it was ignored; when the I flag is cleared, the optional object was processed.
section: 3.3.1
topics:
    - routing
    - mpls
