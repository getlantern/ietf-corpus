document: rfc-6347
kind: protocol-element
summary: The ClientHello message is extended with an opaque cookie<0..2^8-1> field. On the first ClientHello the cookie field is empty (zero length); on subsequent ClientHellos it carries the cookie received from the server's HelloVerifyRequest.
section: 4.2.1
topics:
    - tls
    - security
