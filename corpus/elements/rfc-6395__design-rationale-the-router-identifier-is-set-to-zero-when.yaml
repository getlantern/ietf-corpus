document: rfc-6395
kind: design-rationale
summary: The Router Identifier is set to zero when only the Local Interface Identifier is needed (e.g., for PIM over Reliable Transport / PORT, where a Router Identifier is not required). This avoids mandating a router-wide unique identifier in simple use cases.
section: "1"
topics:
    - multicast
    - routing
