document: rfc-4695
kind: wire-format
summary: The MIDI command section begins with a variable-length header containing flags B, J, Z, P and a LEN field. If B=0, the header is 1 octet and LEN is 4 bits (max MIDI list of 15 octets); if B=1, the header is 2 octets and LEN is 12 bits (max 4095 octets), encoded big-endian.
section: "3"
