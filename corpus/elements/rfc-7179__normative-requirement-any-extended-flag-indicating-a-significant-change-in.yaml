document: rfc-7179
kind: normative-requirement
summary: Any extended flag indicating a significant change in the structure or interpretation of later frame parts that, if ignored, could cause a failure of service or security policy violation MUST be a critical extension. If such a flag affects fields that transit RBridges examine, it MUST be a hop-by-hop critical extended flag.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
