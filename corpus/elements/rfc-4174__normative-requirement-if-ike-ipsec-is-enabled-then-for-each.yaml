document: rfc-4174
kind: normative-requirement
summary: If IKE/IPSec is enabled, then for each bit pair <Main Mode, Aggressive Mode> and <Transport Mode, Tunnel Mode>, one of the two bits MUST be set to 1 and the other MUST be set to 0.
