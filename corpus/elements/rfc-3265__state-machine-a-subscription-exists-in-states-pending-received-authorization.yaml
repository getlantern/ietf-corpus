document: rfc-3265
kind: state-machine
summary: 'A subscription exists in states: pending (received, authorization not yet determined), active (accepted and authorized), or terminated (no longer active). Transitions are driven by Subscription-State values in NOTIFY messages; reason codes (deactivated, probation, rejected, timeout, giveup, noresource) govern re-subscription behavior upon termination.'
section: 3.2.4
topics:
    - sip
    - realtime
