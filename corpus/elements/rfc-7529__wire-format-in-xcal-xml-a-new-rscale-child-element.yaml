summary: In xCal (XML), a new <rscale> child element of <recur> carries the RSCALE value as a string with case preserved, and a new <skip> child element carries OMIT, BACKWARD, or FORWARD. The <bymonth> element is redefined to accept either a numeric or string value to support the 'L' leap-month suffix.
