document: rfc-3996
kind: interoperability-note
summary: Proxy servers may delay Event Notifications or cause timeouts during Event Wait Mode; clients MUST be prepared to re-issue Get-Notifications when timeouts occur. If a Notification Recipient fails to receive a response, it can re-request the same Event Notifications (subject to Event Life expiry).
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
