document: rfc-4721
kind: normative-requirement
summary: If the mobile node has no security association with the foreign agent, it MUST include the Mobile-AAA Authentication extension when it includes the Mobile-Foreign Challenge extension, and SHOULD include the NAI extension to enable the foreign agent to use available verification infrastructure.
section: "3.1"
rfc2119_level: MUST
topics:
