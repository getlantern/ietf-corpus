document: rfc-7213
kind: security-consideration
summary: An attacker could disrupt communications by injecting false Source MAC Address or MFS values in GAP advertisements. This is mitigated by the cryptographic authentication mechanisms described in RFC 7212. Physical security of links is recommended to prevent disclosure of TLV contents.
section: "6"
topics:
    - mpls
    - security
    - crypto
