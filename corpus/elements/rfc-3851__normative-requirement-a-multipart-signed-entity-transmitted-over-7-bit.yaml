document: rfc-3851
kind: normative-requirement
summary: A multipart/signed entity transmitted over 7-bit SMTP infrastructure MUST have transfer encoding applied so it is represented as 7-bit text. MIME entities that are already 7-bit need no encoding; 8-bit and binary data MUST use quoted-printable or base64.
section: 3.1.3
rfc2119_level: MUST
topics:
    - email
    - crypto
