document: rfc-1659
kind: interoperability-note
summary: The RS-232-like MIB requires conformance groups ifGeneralGroup and ifFixedLengthGroup from the Interface MIB; the value of ifSpeed must equal rs232PortOutSpeed. The MIB applies to ifType values rs232(33), v35(45), and possibly others.
section: "3.1"
topics:
