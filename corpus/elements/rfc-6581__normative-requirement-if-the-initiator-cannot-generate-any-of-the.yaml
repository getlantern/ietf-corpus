document: rfc-6581
kind: normative-requirement
summary: If the initiator cannot generate any of the responder-supported RTR indications, it MUST send a TERM message (Layer 2, Error Type 0, Error Code 7) and terminate the connection. For any other local catastrophic error lacking a specific code, Error Code 5 MUST be used.
section: "9.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
