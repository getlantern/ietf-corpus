document: rfc-6396
kind: design-rationale
summary: 'The TABLE_DUMP_V2 Type was introduced to overcome two key limitations of TABLE_DUMP: lack of 4-byte AS number support and inability to have different AFIs for peer IP and prefix. It also improves space efficiency by using a shared PEER_INDEX_TABLE and allowing multiple RIB entries per NLRI in a single MRT record.'
section: "4.3"
topics:
