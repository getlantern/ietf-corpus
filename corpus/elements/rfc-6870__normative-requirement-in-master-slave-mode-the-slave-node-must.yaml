document: rfc-6870
kind: normative-requirement
summary: In master/slave mode, the slave node MUST stop forwarding over the previously active PW when the received status bit transitions from active to standby, and MUST start forwarding user traffic when the received status bit transitions from standby to active for a given PW.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
