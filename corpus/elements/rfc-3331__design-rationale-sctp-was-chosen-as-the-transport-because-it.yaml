document: rfc-3331
kind: design-rationale
summary: SCTP was chosen as the transport because it provides explicit packet-oriented delivery, multi-stream sequenced delivery, multi-homing for network-level fault tolerance, resistance to flooding and masquerade attacks, and data segmentation. TCP is permitted as an alternative only in scenarios where redundancy is not required or is provided below the transport layer.
section: 1.3.1
topics:
    - realtime
    - sctp
