document: rfc-7507
kind: security-consideration
summary: TLS_FALLBACK_SCSV cannot protect application data sent by clients using TLS False Start, since that data is sent before the server's alert can be received. Implementors using False Start must consult its own security considerations.
section: "4"
topics:
