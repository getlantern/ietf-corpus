document: rfc-2421
kind: design-rationale
summary: Voice mail platforms typically limit mailbox IDs to 16 or fewer numeric digits, cannot display text, act as combined MTA/store/UA with no relay, and cannot store full RFC 822 header semantics. These constraints drove the VPIM profile's numeric addressing, mandatory ADPCM encoding, and simplified header handling.
section: "2.1"
topics:
