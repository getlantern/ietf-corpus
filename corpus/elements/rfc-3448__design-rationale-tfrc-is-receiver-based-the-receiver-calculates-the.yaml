document: rfc-3448
kind: design-rationale
summary: 'TFRC is receiver-based: the receiver calculates the loss event rate and feeds it back to the sender. This suits servers handling many concurrent connections by offloading computation to clients, and is also better suited as a building block for multicast congestion control.'
section: "1"
topics:
