document: rfc-2445
kind: wire-format
summary: 'A content line has the ABNF form: name *('';'' param) '':'' value CRLF, where CRLF is US-ASCII decimal 13 followed by decimal 10. All property names, parameter names, enumerated values, and parameter values are case-insensitive; all other property values are case-sensitive.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
