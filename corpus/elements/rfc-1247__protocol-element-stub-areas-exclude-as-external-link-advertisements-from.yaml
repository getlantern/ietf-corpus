document: rfc-1247
kind: protocol-element
summary: Stub areas exclude AS external link advertisements from flooding, reducing database size and memory requirements for internal routers. Routing to AS external destinations within stub areas is based on a default summary route advertised by area border routers.
section: "3.6"
topics:
    - routing
