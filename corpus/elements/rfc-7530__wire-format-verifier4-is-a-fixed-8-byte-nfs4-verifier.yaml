document: rfc-7530
kind: wire-format
summary: verifier4 is a fixed 8-byte (NFS4_VERIFIER_SIZE=8) opaque field generated by the client and used in COMMIT, CREATE, OPEN, READDIR, and WRITE operations. The server uses it to detect client restarts and distinguish new requests from retransmissions.
