document: rfc-8277
kind: interoperability-note
summary: A BGP speaker MAY convert a received SAFI-4 route to a SAFI-1 route for propagation to peers where SAFI-4 is not enabled, but whether this is done is a matter of local policy. These differences in behavior between implementations may result in unexpected behavior or lack of interoperability.
section: "5"
rfc2119_level: MAY
topics:
    - bgp
    - mpls
