document: rfc-9785
kind: normative-requirement
summary: If a PE or Ethernet Segment comes back and the PE advertises a DF election algorithm different from the one configured in the rest of the PEs, all PEs in the Ethernet Segment MUST fall back to the default DF algorithm.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
