document: rfc-1247
kind: protocol-element
summary: OSPF supports two types of external metrics. Type 1 external metrics are comparable to internal link state metrics (total cost = internal + external). Type 2 external metrics are always greater than any internal path cost. When both types are present, Type 1 always takes precedence.
section: "2.2"
topics:
    - routing
