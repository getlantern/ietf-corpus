document: rfc-4553
kind: normative-requirement
summary: When the L bit is set indicating an attachment circuit fault, the CE-bound IWF MUST play out an appropriate amount of filler data regardless of payload size. Once the fault is rectified, the L bit MUST be cleared by the PSN-bound IWF.
section: 4.3.1
rfc2119_level: MUST
topics:
    - realtime
