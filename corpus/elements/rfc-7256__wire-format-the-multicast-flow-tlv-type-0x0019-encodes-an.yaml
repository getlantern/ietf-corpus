document: rfc-7256
kind: wire-format
summary: The Multicast-Flow TLV (Type 0x0019) encodes an 8-bit Flow Type, an 8-bit Address Family, a 16-bit Reserved field, a variable-length Multicast Group Address, and (for SSM flows) a variable-length Source Address; IPv6 SSM example shows TLV Length=36 with 16-byte addresses.
section: "5.12"
topics:
