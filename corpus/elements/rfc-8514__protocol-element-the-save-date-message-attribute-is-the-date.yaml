document: rfc-8514
kind: protocol-element
summary: The save date message attribute is the date and time at which a message was saved in the mailbox it currently resides in. It is always set to the moment of delivery to the mailbox, regardless of the delivery mechanism (APPEND, COPY, or MOVE), and cannot be set arbitrarily.
section: "3"
