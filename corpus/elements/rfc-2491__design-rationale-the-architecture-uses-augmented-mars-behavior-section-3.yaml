document: rfc-2491
kind: design-rationale
summary: The architecture uses augmented MARS behavior (section 3.1.1) rather than MARS 'as is' because the sparse Solicited Node multicast address space causes excessive short-lived pt-mpt VCs in connection-oriented NBMA environments. Aggregating ND traffic via the MARS reduces VC consumption at the cost of the original sparseness benefit.
section: B.1
topics:
