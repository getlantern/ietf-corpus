document: rfc-9429
kind: normative-requirement
summary: All session descriptions handled by JSEP implementations, both local and remote, MUST indicate support for ICE (RFC 8445). Implementations MUST properly handle remote endpoints using ICE-lite and MUST properly handle remote endpoints using the older RFC 5245 version of ICE.
section: 5.1.1
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
