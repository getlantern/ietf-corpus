document: rfc-5651
kind: normative-requirement
summary: A congestion control building block that uses the CCI field within the LCT header MUST be used by any protocol instantiation using LCT. The congestion control MUST be applied to the LCT session as an entity, over the aggregate traffic of all LCT channels in the session.
section: "7"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
