document: rfc-9615
kind: normative-requirement
summary: 'The parental agent MUST abort the bootstrapping procedure on any error, including: the child already being securely delegated or having only in-domain nameservers; retrieval failure from any authoritative nameserver; DNSSEC validation failure or unauthenticated data (AD bit not set) for any signaling record; or inconsistent RRsets across direct and signaling queries.'
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
