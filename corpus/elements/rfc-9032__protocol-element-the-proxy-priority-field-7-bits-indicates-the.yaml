document: rfc-9032
kind: protocol-element
summary: The proxy priority field (7 bits) indicates the sender's willingness to act as a Join Proxy per RFC 9031. Values range from 0x00 (most willing) to 0x7e (least willing); 0x7f means never consider this node as a viable Join Proxy.
