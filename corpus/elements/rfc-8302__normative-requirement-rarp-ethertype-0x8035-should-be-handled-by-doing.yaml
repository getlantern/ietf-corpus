document: rfc-8302
kind: normative-requirement
summary: RARP (Ethertype 0x8035) SHOULD be handled by doing a local cache or directory server lookup on the target hardware (MAC) address to find a mapping to the desired protocol (IP) address, analogously to generic ARP request/response handling.
