document: rfc-2737
kind: protocol-element
summary: The entPhysicalContainsTable exposes container/containee relationships directly, indexed by (entPhysicalIndex, entPhysicalChildIndex), enabling an NMS to quickly discover all children of a given physical entity. It also captures double-wide module containment that cannot be represented in entPhysicalTable alone.
