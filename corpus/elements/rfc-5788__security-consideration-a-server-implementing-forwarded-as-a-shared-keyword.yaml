document: rfc-5788
kind: security-consideration
summary: A server implementing $Forwarded as a shared keyword may disclose that a confidential message was forwarded. Similarly, servers implementing $SubmitPending or $Submitted as shared keywords may disclose that a confidential message is scheduled to be or is actively being sent.
section: 3.4.2
topics:
    - email
    - security
    - privacy
