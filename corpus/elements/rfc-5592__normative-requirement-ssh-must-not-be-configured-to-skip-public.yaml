document: rfc-5592
kind: normative-requirement
summary: SSH MUST NOT be configured to skip public-key verification for use with the SSH Transport Model, as doing so leaves data confidentiality and integrity protection of dubious value when an attacker can insert himself between client and server.
section: "9.1"
rfc2119_level: MUST NOT
