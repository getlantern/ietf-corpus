document: rfc-5810
kind: normative-requirement
summary: For AdminDisable state transition, the FE MUST stop packet forwarding. During the AdminDisable state, the FE MUST NOT process packets unless the CE sets FEState back to OperEnable.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
