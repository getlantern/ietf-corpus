document: rfc-4372
kind: normative-requirement
summary: RADIUS entities other than the home RADIUS server MUST treat the CUI content as an opaque token and SHOULD NOT perform operations on its content other than a binary equality comparison between two CUI instances.
section: "2.2"
rfc2119_level: MUST
topics:
