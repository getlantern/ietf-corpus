document: rfc-5845
kind: normative-requirement
summary: If the LMA receives a handoff-triggered Binding Lifetime Extension PBU without the GRE Key option for a BCE using GRE keys and GRE encapsulation, and policy requires GRE, the LMA MUST reject the PBU with status GRE_KEY_OPTION_REQUIRED; otherwise the LMA SHOULD accept and MUST respond without the GRE Key option.
section: 3.3.2
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
