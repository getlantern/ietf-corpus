document: rfc-6015
kind: normative-requirement
summary: This payload format MUST only be used in legacy applications where the RFC 3550 compliance limitations (inherited from SMPTE 2022-1) are known not to impact any system components or other RTP elements. Whenever possible, RFC 5109 or newer fully compliant formats MUST be used.
section: "1.4"
rfc2119_level: MUST
topics:
