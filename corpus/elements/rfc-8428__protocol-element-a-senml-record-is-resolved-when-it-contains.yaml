document: rfc-8428
kind: protocol-element
summary: A SenML Record is 'resolved' when it contains no base fields (labels starting with 'b', except Base Version under certain conditions) and no relative times. Resolved Records must be in chronological order and have all applicable base values applied. This normalized form is used for big-data applications and format conversion.
