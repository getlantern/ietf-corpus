document: rfc-6809
kind: normative-requirement
summary: The feature-capability indicator specification MUST define the syntax and semantics of any values for the indicator in accordance with the ABNF in Section 6.3.2, and MUST define whether the indicator has a default value. It is strongly RECOMMENDED to not re-use values already defined for another indicator unless the semantics are identical.
section: 5.3.3
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
