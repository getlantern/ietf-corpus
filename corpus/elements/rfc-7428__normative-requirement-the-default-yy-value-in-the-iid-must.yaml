document: rfc-7428
kind: normative-requirement
summary: The default YY value in the IID MUST be zero. A node MAY use non-zero YY values to instantiate multiple IPv6 interfaces. The YY value MUST be ignored when computing the NodeID (XX) from an IID.
section: "4"
rfc2119_level: MUST
topics:
    - ip
