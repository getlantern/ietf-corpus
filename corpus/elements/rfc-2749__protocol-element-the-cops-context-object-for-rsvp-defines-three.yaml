document: rfc-2749
kind: protocol-element
summary: 'The COPS Context Object for RSVP defines three R-Type flags: Incoming-Message (PEP received an RSVP message), Resource-Allocation (PEP about to commit local resources, applies to Resv only and represents merged reservations), and Outgoing-Message (PEP about to forward an RSVP message). The M-Type field uses values identical to the ''msg type'' field in the RSVP header.'
section: "2.2"
topics:
    - qos
