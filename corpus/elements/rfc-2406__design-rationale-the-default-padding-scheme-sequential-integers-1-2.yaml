document: rfc-2406
kind: design-rationale
summary: The default padding scheme (sequential integers 1, 2, 3, ...) was chosen for its relative simplicity, ease of implementation in hardware, and because it offers limited protection against 'cut and paste' attacks in the absence of other integrity measures when the receiver checks padding values upon decryption.
