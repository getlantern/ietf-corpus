document: rfc-8984
kind: privacy-consideration
summary: The privacy property allows owners to mark objects 'private' (only timing metadata shared) or 'secret' (hidden entirely when calendar is shared). When privacy is 'private', only a defined subset of properties (start, duration, uid, freeBusyStatus, etc.) MAY be shared; all others MUST NOT be.
section: 4.4.3
rfc2119_level: MUST NOT
topics:
    - privacy
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
