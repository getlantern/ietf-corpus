document: rfc-2262
kind: normative-requirement
summary: If an incoming message cannot be parsed to determine the SNMP version, snmpInASNParseErrs MUST be incremented and the message discarded. If the version is not supported, snmpInBadVersions MUST be incremented and the message discarded.
section: 4.2.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
