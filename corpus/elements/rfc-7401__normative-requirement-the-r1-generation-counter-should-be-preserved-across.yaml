document: rfc-7401
kind: normative-requirement
summary: The R1 generation counter SHOULD be preserved across system reboots and BEX invocations. The counter MUST be incremented at least as often as every time old R1s cease to be valid, and SHOULD never be decremented to prevent replay of higher-numbered R1s.
section: 4.1.4
rfc2119_level: MUST
topics:
    - security
    - ip
