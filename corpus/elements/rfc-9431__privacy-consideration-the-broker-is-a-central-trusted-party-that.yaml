document: rfc-9431
kind: privacy-consideration
summary: The Broker is a central trusted party that can read all PUBLISH payloads; the mechanisms in this document do not protect PUBLISH packet contents or Topic Names from the Broker. End-to-end payload confidentiality requires additional mechanisms such as the ACE Pub-Sub Profile.
section: "9"
