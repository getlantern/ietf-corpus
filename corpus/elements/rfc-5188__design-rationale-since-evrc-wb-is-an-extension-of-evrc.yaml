document: rfc-5188
kind: design-rationale
summary: Since EVRC-WB is an extension of EVRC-B, offerers SHOULD announce EVRC-B support alongside EVRC-WB as the preferred codec. This allows interoperability with answerers that support only EVRC-B, providing graceful fallback in negotiation.
