document: rfc-4286
kind: normative-requirement
summary: AdvertisementInterval MUST be no less than 4 seconds and no greater than 180 seconds (default 20 seconds). AdvertisementJitter MUST be an integer no less than 0 and no greater than AdvertisementInterval, and MUST be at least 0.025 * AdvertisementInterval.
section: 3.1.1
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
