document: rfc-2308
kind: interoperability-note
summary: A cached negative answer SHOULD include an implicit referral (NS records in the authority section) so that the resolver can locate an authoritative source. NXDOMAIN Types 1 and 4, and NODATA Type 1, provide this implicit referral.
