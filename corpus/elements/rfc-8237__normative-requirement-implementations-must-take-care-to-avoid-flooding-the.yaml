document: rfc-8237
kind: normative-requirement
summary: Implementations MUST take care to avoid flooding the remote PE with a large number of PW status messages at once when a session is terminated; if the session ended for administrative reasons and communication is still possible, the PE SHOULD pace transmission.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
