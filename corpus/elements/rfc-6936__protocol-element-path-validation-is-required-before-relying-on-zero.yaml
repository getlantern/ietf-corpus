document: rfc-6936
kind: protocol-element
summary: 'Path validation is required before relying on zero UDP checksum: a sender must probe the path, because middleboxes conforming to RFC 2460 will discard zero-checksum datagrams. A bidirectional path does not necessarily support zero checksum in both directions, and path characteristics may change, requiring periodic re-validation.'
section: "3.3"
topics:
    - udp
    - ip
