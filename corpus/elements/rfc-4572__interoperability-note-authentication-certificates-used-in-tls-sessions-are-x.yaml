document: rfc-4572
kind: interoperability-note
summary: Authentication certificates used in TLS sessions are X.509 certificates as profiled by RFC 3279, RFC 3280, and RFC 4055. Certificate identity matching follows the matching rules of RFC 3280; if multiple identities of a given type exist in the certificate, a match in any one is acceptable.
section: "5"
topics:
