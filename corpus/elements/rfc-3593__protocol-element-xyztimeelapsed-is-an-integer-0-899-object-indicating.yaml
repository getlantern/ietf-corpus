document: rfc-3593
kind: protocol-element
summary: xyzTimeElapsed is an INTEGER (0..899) object indicating the number of seconds elapsed since the beginning of the current measurement period. If the current interval exceeds the maximum due to clock adjustment, the agent returns the maximum value.
