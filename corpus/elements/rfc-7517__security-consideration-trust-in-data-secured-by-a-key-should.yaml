document: rfc-7517
kind: security-consideration
summary: Trust in data secured by a key should not exceed the trustworthiness of the method by which the key was obtained and the entity asserting the key association. Applications typically bind attributes to JWKs via PKIX certificates in "x5c" or via JWT claims referencing the JWK.
section: "9.1"
topics:
    - jose
    - security
    - pkix
