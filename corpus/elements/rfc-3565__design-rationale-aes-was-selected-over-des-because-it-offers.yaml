document: rfc-3565
kind: design-rationale
summary: AES was selected over DES because it offers superior security, performance, efficiency, ease of implementation, and flexibility. Rijndael performs consistently well across hardware and software environments, has low memory requirements suited for constrained devices, and its operations are among the easiest to defend against power and timing attacks.
