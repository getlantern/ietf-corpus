document: rfc-7049
kind: design-rationale
summary: The additional information codepoint space (values 28–30) is intentionally not managed by an IANA registry; allocations require updating this specification. Values 28 and 29 are provisionally reserved for 128-bit and 256-bit quantities, and value 30 is the only one available for general allocation.
section: "5.2"
topics:
