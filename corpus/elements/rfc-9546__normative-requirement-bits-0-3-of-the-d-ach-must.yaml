document: rfc-9546
kind: normative-requirement
summary: Bits 0–3 of the d-ACH MUST be set to 0b0001. This distinguishes the packet from an IP packet (per RFC 4928) and from a DetNet data packet (per RFC 8964).
section: "3.1"
