document: rfc-6035
kind: normative-requirement
summary: MOS-LQ and MOS-CQ values from RFC 3611 MUST be converted by dividing the reported value by 10 if it is ≤50. If the RFC 3611 reported value is 127 (unavailable), the MOS-xQ parameter MUST be omitted from the vq-rtcpxr event.
section: 4.6.2.11.9
rfc2119_level: MUST
topics:
    - sip
    - voip
    - rtp
