document: rfc-5053
kind: design-rationale
summary: The symbol alignment parameter Al (recommended value 4) ensures sub-symbols are always a multiple of Al bytes, enabling XOR encoding and decoding operations to be performed 4 or more bytes at a time on typical processors, significantly improving throughput.
section: "4.2"
