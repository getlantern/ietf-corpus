document: rfc-4474
kind: design-rationale
summary: End-user certificates are neither practical nor affordable for SIP devices, so the mechanism delegates identity signing to an intermediary authentication service (typically a proxy server) that holds the domain's private key. This avoids requiring each phone, PC, laptop, or PDA to manage its own certificate and synchronize keying material across multiple devices.
