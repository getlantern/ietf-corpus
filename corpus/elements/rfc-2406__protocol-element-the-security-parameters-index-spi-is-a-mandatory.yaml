document: rfc-2406
kind: protocol-element
summary: The Security Parameters Index (SPI) is a mandatory 32-bit value that, combined with the destination IP address and security protocol (ESP), uniquely identifies the Security Association for the datagram. SPI values 1-255 are reserved by IANA; SPI value zero is reserved for local implementation-specific use.
section: "2.1"
topics:
