document: rfc-6454
kind: design-rationale
summary: 'URI is not necessarily same-origin with itself: for example, a data URI is not same-origin with itself because data URIs do not use a server-based naming authority and therefore have globally unique identifiers as origins, meaning the algorithm may produce different values on repeated invocations.'
