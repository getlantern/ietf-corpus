document: rfc-5521
kind: design-rationale
summary: The SRLG subobject's Attribute field SHOULD be set to 2 (SRLG interpretation) and SHOULD be ignored on receipt, because an SRLG subobject is unambiguously an SRLG — the Attribute field is structurally present for consistency with other subobjects but carries no useful information for the SRLG type.
