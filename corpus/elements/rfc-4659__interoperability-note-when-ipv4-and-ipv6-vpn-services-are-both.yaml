document: rfc-4659
kind: interoperability-note
summary: When IPv4 and IPv6 VPN services are both supported over an IPv4 core, the same single set of MP-BGP peering relationships and the same single PE-PE tunnel mesh MAY be used for both, reducing operational complexity.
section: "1"
rfc2119_level: MAY
