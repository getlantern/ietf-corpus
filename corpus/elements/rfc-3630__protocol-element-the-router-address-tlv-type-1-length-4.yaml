document: rfc-3630
kind: protocol-element
summary: The Router Address TLV (type 1, length 4, value is a 4-octet IP address) specifies a stable, always-reachable IP address of the advertising router, typically a loopback. It must appear in exactly one TE LSA originated by a router.
section: 2.4.1
topics:
