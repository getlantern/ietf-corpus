summary: The Interface-ful IP-VRF-to-IP-VRF with unnumbered SBD IRB model (Section 4.4.3) omits IP addresses on SBD IRBs; RT-5 carries GW IP = 0 and the EVPN Router's MAC Extended Community with the SBD IRB MAC as the Overlay Index, resolved recursively to a MAC-only RT-2.
