document: rfc-1847
kind: design-rationale
summary: In multipart/signed the control information is in the second body part, while in multipart/encrypted the control information is in the first body part. This asymmetry reflects that decryption requires the key/control data before the encrypted payload can be processed.
section: "2"
topics:
