document: rfc-7533
kind: normative-requirement
summary: FedFsNsdbName MUST NOT contain a network address (IPv4 or IPv6); it must use a fully qualified domain name. This preserves the immutability of FSNs, which include the NSDB name as an attribute.
section: "4"
rfc2119_level: MUST
topics:
    - dns
