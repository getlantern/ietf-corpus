document: rfc-1407
kind: protocol-element
summary: 'The DS3/E3 Current table (dsx3CurrentTable) holds 11 Gauge counters for the ongoing 15-minute interval: PESs, PSESs, SEFSs, UASs, LCVs, PCVs, LESs, CCVs, CESs, and CSESs. The Interval table (dsx3IntervalTable) mirrors these for each of up to 96 prior intervals, indexed by line and interval number (1=most recent, 96=oldest).'
section: 4.1.2
topics:
