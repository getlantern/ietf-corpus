document: rfc-7953
kind: protocol-element
summary: 'Time-range filtering for VAVAILABILITY in CalDAV queries uses overlap conditions based on the presence of DTSTART, DTEND, and DURATION: e.g., if both DTSTART and DTEND are present the overlap condition is (start < DTEND AND end > DTSTART); if neither DTSTART nor DTEND is present the condition is always TRUE (unbounded component).'
section: 7.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
