document: rfc-5065
kind: normative-requirement
summary: It is an error for a BGP speaker to receive an UPDATE from a confederation peer not in the same Member-AS where AS_CONFED_SEQUENCE is not the first segment; such messages SHALL be treated as having a malformed AS_PATH.
section: "5"
rfc2119_level: REQUIRED
topics:
    - bgp
    - routing
