document: rfc-9173
kind: wire-format
summary: The BCB-AES-GCM Initialization Vector parameter (Parm Id 1) is a CBOR byte string. Its length prior to CBOR encoding MUST be between 8 and 16 bytes; 12 bytes SHOULD be used unless policy requires otherwise. The IV MUST NOT be reused with the same encryption key.
section: 4.3.1
rfc2119_level: MUST
topics:
    - crypto
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
