document: rfc-8315
kind: state-machine
summary: 'Authentication check (Section 3.5): For each supported <c-key> element, hash its c-key-string using the element''s scheme; compare the result to each c-lock element with the same scheme in the original article. If any c-lock-string matches the hash, authentication passes and processing stops. If no match is found after all c-key elements are processed, authentication fails.'
section: "3.5"
topics:
    - security
