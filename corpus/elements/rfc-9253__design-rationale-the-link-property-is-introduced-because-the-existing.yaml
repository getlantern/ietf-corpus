document: rfc-9253
kind: design-rationale
summary: The LINK property is introduced because the existing ATTACH property is purpose-built for managed attachments (with size, filename, server-side stripping) and clients treat attachments as integral message content. A separate LINK property allows typed, discoverable external references without conflating them with attachments.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
