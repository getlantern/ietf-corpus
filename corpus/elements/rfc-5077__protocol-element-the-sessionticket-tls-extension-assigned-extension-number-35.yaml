document: rfc-5077
kind: protocol-element
summary: The SessionTicket TLS extension (assigned extension number 35) is used by the client to signal support for stateless session resumption and to present a previously obtained ticket. An empty extension indicates the client is prepared to receive a new ticket; a non-empty extension carries a ticket to resume a session.
section: "3.2"
topics:
    - tls
    - security
