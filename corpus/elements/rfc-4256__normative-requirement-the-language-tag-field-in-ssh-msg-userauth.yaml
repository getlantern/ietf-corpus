document: rfc-4256
kind: normative-requirement
summary: The language tag field in SSH_MSG_USERAUTH_REQUEST and SSH_MSG_USERAUTH_INFO_REQUEST is deprecated and SHOULD be the empty string; the server SHOULD instead select language based on tags communicated during key exchange.
