summary: 'G723 frame type is indicated by the two least significant bits of the first octet: 00=6.3 kb/s (24 octets), 01=5.3 kb/s (20 octets), 10=SID frame (4 octets), 11=reserved. Frames of different sizes may be freely intermixed.'
