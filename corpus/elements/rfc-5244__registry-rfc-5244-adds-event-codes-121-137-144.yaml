document: rfc-5244
kind: registry
summary: RFC 5244 adds event codes 121–137, 144–159, 174–175, 176–205, and 206–211 to the Audio/Telephone-Event Event Code Registry established by RFC 4733. These codes cover MF tones, ABCD signalling states, continuity tones, metering pulse, trunk unavailable, R2 MFC forward/backward signals, and A/AB-bit signalling states.
