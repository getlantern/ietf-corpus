document: rfc-8370
kind: normative-requirement
summary: The RI-RSVP functionality MUST NOT be activated with a peer that does not indicate support for it. If deactivated, the implementation MUST fall back to the traditional smaller refresh interval per RFC 2205.
section: "3.2"
rfc2119_level: MUST
topics:
