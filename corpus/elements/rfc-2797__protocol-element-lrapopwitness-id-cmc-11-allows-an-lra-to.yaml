document: rfc-2797
kind: protocol-element
summary: LraPOPWitness (id-cmc 11) allows an LRA to inform the CA that it has performed out-of-band POP verification on behalf of listed certificate requests. If the CA does not allow LRA POP verification, it returns POPFAILURE and MUST NOT start its own challenge-response to re-verify POP.
section: "5.8"
topics:
    - pkix
    - security
