document: rfc-3367
kind: normative-requirement
summary: A Service object is uniquely identified through the serviceuri tag, which MUST be included. A Service MUST have at least one Server that responds on the default CNRP port so that a client can obtain the initial Service object.
section: 4.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
