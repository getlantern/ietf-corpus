document: rfc-9571
kind: protocol-element
summary: Data Service Packet Delay Measurement uses a different SFL type (e.g., SFL=D) to mark a subset of packets for both loss and delay instrumentation concurrently with loss-only batches. An SFL marked for delay is synonymous with the loss-batch SFL and the underlying FEC, so a marked packet is accumulated into the loss batch, into delay statistics, and forwarded normally.
section: "5"
topics:
