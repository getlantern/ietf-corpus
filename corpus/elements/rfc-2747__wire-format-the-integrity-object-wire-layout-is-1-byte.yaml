summary: 'The INTEGRITY object wire layout is: 1-byte Flags, 1-byte reserved (zero), 6-byte Key Identifier (48-bit unsigned), 8-byte Sequence Number (64-bit unsigned, monotonically increasing), followed by the Keyed Message Digest (16 bytes for HMAC-MD5, must be a multiple of 4 octets).'
