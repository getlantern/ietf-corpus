document: rfc-3253
kind: normative-requirement
summary: An XML element in the DAV namespace MUST NOT be used in the request or response body of a versioning method unless that XML element is explicitly defined in an IETF RFC. This prevents proprietary extensions from polluting the DAV namespace.
section: "1.5"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
