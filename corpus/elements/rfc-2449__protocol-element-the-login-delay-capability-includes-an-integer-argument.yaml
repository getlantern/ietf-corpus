document: rfc-2449
kind: protocol-element
summary: The LOGIN-DELAY capability includes an integer argument specifying the minimum seconds required between successive logins. Optionally followed by the token 'USER' in AUTHENTICATION state to indicate the value may be more accurate after authentication.
