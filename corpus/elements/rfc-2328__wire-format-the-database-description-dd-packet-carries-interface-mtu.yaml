kind: wire-format
summary: The Database Description (DD) packet carries Interface MTU (2 bytes), Options (1 byte), a flags byte (I/M/MS bits), DD sequence number (4 bytes), and a variable list of LSA headers. The I-bit signals the first packet; MS-bit indicates master role.
