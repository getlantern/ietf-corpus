document: rfc-7888
kind: protocol-element
summary: The non-synchronizing literal is an alternate form of IMAP literal distinguished by a plus ('+') between the octet count and the closing brace ('}'), e.g., {11+}. It may only appear in client-to-server communication; the server does not generate a command continuation request in response.
