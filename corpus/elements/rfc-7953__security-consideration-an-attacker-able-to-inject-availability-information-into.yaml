document: rfc-7953
kind: security-consideration
summary: An attacker able to inject availability information into a calendar user's data could cause the user to always appear busy or free at inappropriate times. Calendar systems MUST ensure that availability information can only be modified by authorized users.
section: "8"
topics:
    - security
