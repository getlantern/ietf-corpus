document: rfc-9769
kind: normative-requirement
summary: 'A server MUST NOT respond in interleaved mode unless: (1) the request does not have a receive timestamp equal to the transmit timestamp, and (2) the request''s origin timestamp matches a saved local receive timestamp from a previous request.'
section: "2"
rfc2119_level: MUST NOT
