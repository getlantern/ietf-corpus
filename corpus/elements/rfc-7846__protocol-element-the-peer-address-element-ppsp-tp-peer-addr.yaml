document: rfc-7846
kind: protocol-element
summary: The peer address element (ppsp_tp_peer_addr_t) includes ip_address (address_type + address), port, priority, type ('HOST'|'REFLEXIVE'|'PROXY'), and optional connection ('wireless'|'wired'), asn, and peer_protocol fields. IPv4 addresses follow RFC 3986 Section 3.2.2; IPv6 addresses follow RFC 5952 Section 4.
section: 3.2.4
topics:
