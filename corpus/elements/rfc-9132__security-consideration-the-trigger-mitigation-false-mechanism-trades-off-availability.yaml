document: rfc-9132
kind: security-consideration
summary: 'The ''trigger-mitigation=false'' mechanism trades off availability against abuse: a DOTS client can preinstall broad mitigation scopes that activate on signal channel loss, which an attacker could exploit by deliberately severing the signal channel. Implementations should restrict preconfigured mitigation scopes to the minimum necessary.'
section: "11"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
