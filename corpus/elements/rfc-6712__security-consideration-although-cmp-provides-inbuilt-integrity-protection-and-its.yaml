document: rfc-6712
kind: security-consideration
summary: Although CMP provides inbuilt integrity protection and its unencrypted messages do not directly endanger PKI security, eavesdroppers may gather confidential technical or business-critical information. Users should consider HTTP over TLS (RFC 2818) or IPsec VPNs (RFC 4301) to protect confidentiality.
section: "5"
topics:
