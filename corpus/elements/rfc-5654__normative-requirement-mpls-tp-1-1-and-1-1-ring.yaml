document: rfc-5654
kind: normative-requirement
summary: MPLS-TP 1+1 and 1:1 ring protection MUST support switching time within 50ms from fault detection in a 16-node ring with less than 1200 km of fiber. The switching time MUST be independent of the number of LSPs crossing the ring.
section: 2.5.6.1
rfc2119_level: MUST
topics:
