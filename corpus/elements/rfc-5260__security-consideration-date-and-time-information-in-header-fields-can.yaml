document: rfc-5260
kind: security-consideration
summary: 'Date and time information in header fields can be easily forged. The Date: field is inserted by the sender and may be altered at any point, while the uppermost Received: field is inserted by the local mail system and is harder for the sender or an intermediary to falsify.'
section: "7"
topics:
