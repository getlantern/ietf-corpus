document: rfc-1331
kind: normative-requirement
summary: The Restart timer MUST be configurable, but MAY default to 3 seconds. Max-Terminate MUST be configurable (default 2). Max-Configure MUST be configurable (default 10). Max-Failure MUST be configurable (default 10); when exceeded, further Configure-Naks are converted to Configure-Rejects.
section: "5.7"
rfc2119_level: MUST
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
