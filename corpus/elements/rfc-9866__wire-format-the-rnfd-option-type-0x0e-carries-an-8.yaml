document: rfc-9866
kind: wire-format
summary: The RNFD Option (Type=0x0E) carries an 8-bit Option Length (MUST be even; 0 indicates RNFD disabled) followed by two equal-length octet-aligned bit arrays PosCFRC and NegCFRC. Each array's actual bit length is the largest prime less than (Option Length / 2) * 8; unused bits MUST be zero.
section: "4.2"
topics:
    - routing
