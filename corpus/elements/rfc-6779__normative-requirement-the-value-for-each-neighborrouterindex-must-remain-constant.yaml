document: rfc-6779
kind: normative-requirement
summary: The value for each NeighborRouterIndex MUST remain constant at least from one re-initialization of the network management agent to the next, except if an application is deleted and re-created. A NeighborRouterIndex value MUST NOT be reused until the next agent restart.
section: "7"
rfc2119_level: MUST
topics:
    - snmp
