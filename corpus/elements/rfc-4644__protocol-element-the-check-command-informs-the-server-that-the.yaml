document: rfc-4644
kind: protocol-element
summary: 'The CHECK command informs the server that the client has an article with the specified message-id and queries whether the server wants it. Responses: 238 (send it), 431 (retry later), 438 (not wanted); message-id is echoed in all responses.'
section: "2.4"
