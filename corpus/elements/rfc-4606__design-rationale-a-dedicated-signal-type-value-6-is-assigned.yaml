document: rfc-4606
kind: design-rationale
summary: A dedicated signal type (value 6) is assigned to SONET STS-3c SPE rather than encoding it as contiguous concatenation of three STS-1 SPEs. This is done explicitly to provide easy interworking between SONET and SDH signaling, since VC-4 in SDH has a direct equivalent.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
