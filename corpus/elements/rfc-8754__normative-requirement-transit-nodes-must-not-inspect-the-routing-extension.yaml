document: rfc-8754
kind: normative-requirement
summary: Transit nodes MUST NOT inspect the Routing Extension Header (and therefore the SRH) and MUST forward the packet toward the Destination Address according to the IPv6 routing table, as only the node corresponding to the DA is allowed to inspect the routing header.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
