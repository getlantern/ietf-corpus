document: rfc-5785
kind: security-consideration
summary: Applications using well-known URIs must consider exposure of sensitive data, denial-of-service attacks, server and client authentication, DNS rebinding attacks, and attacks where limited server access grants the ability to affect how well-known URIs are served.
