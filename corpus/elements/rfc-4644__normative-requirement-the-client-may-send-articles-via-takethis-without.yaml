document: rfc-4644
kind: normative-requirement
summary: The client MAY send articles via TAKETHIS without first querying with CHECK, but SHOULD NOT do so for every article unless explicitly configured by the site administrator based on out-of-band information.
section: "2.1"
rfc2119_level: SHOULD NOT
