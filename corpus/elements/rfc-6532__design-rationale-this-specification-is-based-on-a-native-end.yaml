document: rfc-6532
kind: design-rationale
summary: This specification is based on a native, end-to-end UTF-8 model requiring an 8-bit-clean transport environment. Support for carriage across legacy 7-bit infrastructure and processing by 7-bit receivers is explicitly out of scope and requires separate mechanisms.
