document: rfc-9171
kind: protocol-element
summary: 'A Bundle Status Report is a CBOR array of 4 elements (non-fragment subject bundle) or 6 elements (fragment subject bundle). The first element is a CBOR array of at least four bundle status items covering: received, forwarded, delivered, and deleted status assertions, each optionally including a DTN timestamp.'
section: 6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
