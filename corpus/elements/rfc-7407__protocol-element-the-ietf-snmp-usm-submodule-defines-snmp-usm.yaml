document: rfc-7407
kind: protocol-element
summary: The ietf-snmp-usm submodule defines /snmp/usm with a 'local' user list and a 'remote' list keyed by engine-id. Each user entry has optional 'auth' presence container (protocol choice md5|sha, each with a hex-string key) and optional 'priv' presence container (protocol choice des|aes, each with a hex-string key).
