document: rfc-2853
kind: wire-format
summary: Exported GSSName (NT_EXPORT_NAME) is a contiguous byte array with a header containing an OID identifying the authenticating mechanism, followed by a trailer whose syntax is mechanism-defined, as specified in RFC 2743. This form is suitable for direct byte-by-byte comparison in ACL checks.
section: "4.13"
extracted_by: claude-sonnet-4-6
