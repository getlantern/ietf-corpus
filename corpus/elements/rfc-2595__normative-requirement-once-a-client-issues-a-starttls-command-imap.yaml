document: rfc-2595
kind: normative-requirement
summary: Once a client issues a STARTTLS command (IMAP), it MUST NOT issue further commands until a server response is seen and the TLS negotiation is complete. The STARTTLS command is only valid in non-authenticated state.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - tls
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
