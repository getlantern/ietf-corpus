document: rfc-9208
kind: protocol-element
summary: The GETQUOTAROOT command takes a mailbox name and returns the list of quota roots for the mailbox in an untagged QUOTAROOT response, plus a QUOTA response for each listed quota root. The mailbox name need not reference an existing mailbox.
section: 4.1.2
topics:
