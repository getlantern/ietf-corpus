document: rfc-7782
kind: design-rationale
summary: Option B stores multiple MAC attachments in ESADI link-state databases (software), while the hardware MAC table retains only one entry per MAC address. This design avoids requiring new hardware fast-path support, enabling incremental deployment across existing TRILL infrastructure.
