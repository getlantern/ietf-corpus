document: rfc-2873
kind: design-rationale
summary: The proposed modification resolves the TCP/DiffServ conflict by having TCP ignore precedence entirely, trading away a rarely-used and weakly protective security feature (precedence-based reset) to eliminate a serious DoS vulnerability and restore interoperability in DiffServ networks.
