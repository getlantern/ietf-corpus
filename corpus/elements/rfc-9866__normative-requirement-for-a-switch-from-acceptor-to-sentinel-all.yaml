document: rfc-9866
kind: normative-requirement
summary: 'For a switch from Acceptor to Sentinel, all four conditions MUST hold simultaneously: LORS is UP; saturated(PositiveCFRC) is FALSE; a neighbor entry for the DODAG root exists in RPL''s DODAG parent set; and the neighbor is reachable via its link-local IPv6 address.'
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
