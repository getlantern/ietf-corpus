document: rfc-6130
kind: normative-requirement
summary: HELLO message jitter SHOULD be used as described in RFC 5148 on data link layers subject to collision-based packet loss. Two successive HELLO messages on the same MANET interface MUST be separated by at least HELLO_MIN_INTERVAL.
section: 11.2.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
