document: rfc-2157
kind: protocol-element
summary: The Wanted-X400-Conversion RFC 822 header lets a MIME sender specify an explicit conversion target (bp14/bp15/ftbp/ia5) and optionally the X.400 object identifier or 'tunnel'. When used in a multipart, the 'from mime-type' parameter selects which body part type the conversion applies to, including nested messages.
section: "4.1"
