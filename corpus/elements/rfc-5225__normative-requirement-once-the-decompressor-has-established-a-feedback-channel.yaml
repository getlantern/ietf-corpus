document: rfc-5225
kind: normative-requirement
summary: Once the decompressor has established a feedback channel for a specific context (CID), it is REQUIRED to continue sending feedback for the lifetime of that context (until an IR packet associates the CID to a different profile), in order to send error recovery requests and optional acknowledgments.
section: "6.2"
rfc2119_level: REQUIRED
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
