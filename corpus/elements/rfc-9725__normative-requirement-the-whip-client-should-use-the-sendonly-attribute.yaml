document: rfc-9725
kind: normative-requirement
summary: The WHIP client SHOULD use the 'sendonly' attribute in the SDP offer (MAY use 'sendrecv'); the 'inactive' and 'recvonly' attributes MUST NOT be used. The WHIP endpoint MUST use the 'recvonly' attribute in the SDP answer, enforcing unidirectional media ingestion.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
