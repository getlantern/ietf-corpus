document: rfc-4426
kind: normative-requirement
summary: For M:N span protection, if the slave detects a failure of a working link it MUST inform the master using a failure indication message. Additionally, affected LSPs MUST be switched to a protection link, with bandwidth for that link adjusted accordingly.
section: "2.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
