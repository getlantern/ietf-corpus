document: rfc-4342
kind: normative-requirement
summary: ECN Nonce Echo information MUST be returned by the receiver using the Loss Intervals option. Any Ack Vector options MUST include the ECN Nonce Sum. The sender MAY maintain a per-packet nonce table to probabilistically verify receiver feedback.
section: "7"
rfc2119_level: MUST
topics:
    - congestion
    - ecn
    - security
