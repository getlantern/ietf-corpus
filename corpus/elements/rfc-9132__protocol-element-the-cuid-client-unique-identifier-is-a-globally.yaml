document: rfc-9132
kind: protocol-element
summary: The 'cuid' (Client Unique Identifier) is a globally unique, stable Uri-Path parameter generated by the DOTS client, ideally by SHA-256-hashing the SPKI of the client's X.509 certificate (or raw public key or PSK identity), truncating to 16 bytes, and base64url-encoding the result (22 characters) with trailing '=' removed.
