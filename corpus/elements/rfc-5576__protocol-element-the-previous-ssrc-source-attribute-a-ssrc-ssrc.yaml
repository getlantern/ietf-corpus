document: rfc-5576
kind: protocol-element
summary: The 'previous-ssrc' source attribute (a=ssrc:<ssrc-id> previous-ssrc:<ssrc-id> ...) associates a media source with previous SSRC identifiers used after a collision-induced SSRC change. It lists one or more old SSRC IDs and MUST be present only once per source.
section: "6.2"
topics:
    - rtp
    - realtime
