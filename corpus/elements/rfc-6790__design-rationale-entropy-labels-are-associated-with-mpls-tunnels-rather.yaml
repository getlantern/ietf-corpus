document: rfc-6790
kind: design-rationale
summary: Entropy labels are associated with MPLS tunnels rather than MPLS applications because there are few tunneling protocols but many and growing applications, reducing churn; tunnel label processing is simpler than application label processing; and per-tunnel association simplifies hierarchy handling such as LDP-over-RSVP-TE and Carrier's Carrier VPNs.
