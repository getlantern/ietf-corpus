document: rfc-9050
kind: normative-requirement
summary: An LSP-IDENTIFIERS TLV MUST be included for PCECC LSPs; it uniquely identifies the LSP in the network. The PLSP-ID in combination with the source in the LSP-IDENTIFIERS TLV MUST be unique.
section: 5.5.1
rfc2119_level: MUST
topics:
