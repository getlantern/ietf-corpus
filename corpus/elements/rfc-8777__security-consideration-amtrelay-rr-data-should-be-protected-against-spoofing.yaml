document: rfc-8777
kind: security-consideration
summary: AMTRELAY RR data SHOULD be protected against spoofing via DNSSEC end-to-end validation or a secure DNS transport (DNS over TLS, DNS over HTTPS, TSIG, SIG(0), etc.). A maliciously crafted AMTRELAY record could cause Denial of Service or redirect receivers to attacker-controlled multicast traffic.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
