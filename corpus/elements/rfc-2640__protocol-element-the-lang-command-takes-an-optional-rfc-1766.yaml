summary: The LANG command takes an optional RFC 1766 language tag parameter (Primary-tag *("-" Sub-tag), each component 1–8 ALPHA). Responses are 200 on success, 500/502 for unrecognized/unimplemented, 501 for bad syntax, and 504 for unsupported language parameter.
