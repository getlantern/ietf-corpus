document: rfc-5497
kind: protocol-element
summary: The VALIDITY_TIME Message TLV defines the duration for which information in the message is valid after receipt. Its value MAY vary with hop count, which is appropriate because nodes farther from the originator receive updates less frequently and must treat them as valid for longer.
section: "7.2"
topics:
    - routing
