document: rfc-7473
kind: interoperability-note
summary: In an mLDP-only session, disabling Prefix-LSPs suppresses IP Prefix FEC label bindings but IP address bindings (ADDRESS messages) continue to be advertised, which is required for correct mLDP upstream LSR selection. Operators deploying mLDP-only sessions should be aware that ADDRESS message exchange is not suppressed by this capability.
section: "6.4"
topics:
    - routing
    - mpls
