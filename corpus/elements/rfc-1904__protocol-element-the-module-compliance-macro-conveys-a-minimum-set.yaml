document: rfc-1904
kind: protocol-element
summary: The MODULE-COMPLIANCE macro conveys a minimum set of implementation requirements for one or more MIB modules. It uses MANDATORY-GROUPS for unconditionally required groups, GROUP for conditionally mandatory or optional groups, and OBJECT for per-object refinements.
