document: rfc-6868
kind: design-rationale
summary: The \-escaping mechanism used for property values was rejected for parameter values because escaping a double-quote with a sequence containing a double-quote (e.g., \") causes existing parsers to misparse the parameter boundary, making it backwards-incompatible.
section: A
