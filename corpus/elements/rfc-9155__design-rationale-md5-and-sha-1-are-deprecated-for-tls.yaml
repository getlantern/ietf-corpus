document: rfc-9155
kind: design-rationale
summary: 'MD5 and SHA-1 are deprecated for TLS 1.2 digital signatures because collision attacks against both algorithms have been proven practical: NIST disallowed SHA-1 for digital signatures after 2013, transcript collision attacks on TLS were identified in 2016, and full SHA-1 collisions were demonstrated in 2017 by Google and CWI Amsterdam.'
