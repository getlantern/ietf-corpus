document: rfc-7171
kind: normative-requirement
summary: The security requirements in Section 5 MUST be implemented in any product claiming PT-EAP compliance. If security mechanisms may be deactivated by policy, an implementation SHOULD offer an interface to query how a message will be protected so higher-layer NEA protocols can factor this into their decisions.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
