document: rfc-2138
kind: protocol-element
summary: The Framed-IP-Address attribute (Type 8) uses the special value 0xFFFFFFFF to indicate the NAS should allow the user to negotiate an address, and 0xFFFFFFFE to indicate the NAS should assign one from a pool; other values are the literal IP address to assign.
