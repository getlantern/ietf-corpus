document: rfc-7730
kind: normative-requirement
summary: When a TAL contains multiple URIs and the connection to the preferred URI fails, or the retrieved CA certificate public key does not match the TAL public key, the RP SHOULD retrieve the CA certificate from the next URI according to local preference ranking.
section: "3"
rfc2119_level: SHOULD
topics:
