document: rfc-6231
kind: security-consideration
summary: The package carries dialog content including media URIs and DTMF collection results; unauthorized access could expose sensitive user input (e.g., PINs). Implementations MUST adhere to the security considerations of RFC 6230 and MUST support HTTPS to protect media resource access.
section: "7"
topics:
