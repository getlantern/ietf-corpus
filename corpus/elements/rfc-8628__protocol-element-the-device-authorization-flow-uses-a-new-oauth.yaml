document: rfc-8628
kind: protocol-element
summary: The device authorization flow uses a new OAuth endpoint — the device authorization endpoint — separate from the standard authorization endpoint. The device client POSTs to this endpoint to obtain a device code, user code, and verification URI, then displays the user code and URI to the user while polling the token endpoint.
section: "3"
topics:
