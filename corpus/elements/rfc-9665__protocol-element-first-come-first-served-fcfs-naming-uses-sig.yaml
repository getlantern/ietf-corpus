document: rfc-9665
kind: protocol-element
summary: First Come, First Served (FCFS) Naming uses SIG(0) (RFC 2931) to let a requester claim and defend a name. A KEY RR containing the public key is included in every Host Description and Service Description Instruction; the update is signed with the corresponding private key. No other requester can update a name unless it possesses the same private key.
section: 3.2.4.1
topics:
    - dns
    - security
    - crypto
