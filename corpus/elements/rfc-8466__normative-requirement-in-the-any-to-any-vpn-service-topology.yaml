document: rfc-8466
kind: normative-requirement
summary: In the any-to-any VPN service topology, all sites MUST have the same role ('any-to-any-role'). In Hub-and-Spoke and Hub-and-Spoke-Disjoint topologies, sites MUST be assigned either a Hub role or a Spoke role.
section: "5.4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
