document: rfc-7350
kind: normative-requirement
summary: A TURN server using DTLS MUST implement the denial-of-service countermeasure described in Section 4.2.1 of RFC 6347. TCP allocations MUST NOT be obtained using a DTLS association between client and server.
section: "4.6"
rfc2119_level: MUST
topics:
    - tls
    - security
    - nat
