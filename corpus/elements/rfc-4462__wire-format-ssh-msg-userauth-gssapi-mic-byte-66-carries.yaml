document: rfc-4462
kind: wire-format
summary: 'SSH_MSG_USERAUTH_GSSAPI_MIC (byte 66) carries a single string MIC field obtained by calling GSS_GetMIC() over: session identifier (string), SSH_MSG_USERAUTH_REQUEST (byte), user name, service, and ''gssapi-with-mic''. This message MUST be sent only after GSS_S_COMPLETE with integ_avail set.'
section: "3.5"
rfc2119_level: MUST
topics:
    - security
