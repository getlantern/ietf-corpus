document: rfc-2615
kind: security-consideration
summary: Without payload scrambling (as in RFC 1619), malicious users could generate bit patterns causing SONET/SDH-layer low-transition-density synchronization problems, emulation of the SDH set-reset scrambler pattern, and replication of the STM-N frame alignment word. The X^43+1 scrambler was introduced to address these threats.
section: "6"
topics:
    - security
