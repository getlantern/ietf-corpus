document: rfc-9176
kind: security-consideration
summary: 'Endpoint identification and authentication: the RD must ensure that a registrant is authorized to use the claimed endpoint name and sector, both at registration and for subsequent operations on the registration resource. CTs may carry credentials scoped to one or a range of endpoint names.'
section: "8.2"
