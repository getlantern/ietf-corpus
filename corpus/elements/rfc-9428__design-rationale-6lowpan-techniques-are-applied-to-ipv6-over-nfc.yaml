document: rfc-9428
kind: design-rationale
summary: 6LoWPAN techniques are applied to IPv6 over NFC because NFC shares characteristics with IEEE 802.15.4 networks — low power consumption, constrained devices, and limited overhead budgets — making existing 6LoWPAN compression, address autoconfiguration, and Neighbor Discovery optimizations directly applicable.
