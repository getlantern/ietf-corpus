document: rfc-7162
kind: normative-requirement
summary: Servers supporting QRESYNC MUST implement and advertise the ENABLE extension. A client making use of QRESYNC MUST issue 'ENABLE QRESYNC' once authenticated. The server MUST return a tagged BAD if the QRESYNC SELECT parameter or VANISHED UID FETCH modifier is used without a prior successful ENABLE QRESYNC.
section: 3.2.3
rfc2119_level: MUST
topics:
    - email
