document: rfc-6855
kind: normative-requirement
summary: Mailbox names MUST comply with the Net-Unicode Definition (RFC 5198, Section 2) and MUST NOT contain control characters (U+0000–U+001F, U+0080–U+009F), a delete character (U+007F), a line separator (U+2028), or a paragraph separator (U+2029).
section: "3"
rfc2119_level: MUST NOT
