document: rfc-4483
kind: security-consideration
summary: The UAS SHOULD NOT implicitly trust the object referred to by a URI simply because it trusts the UAC that sent it; the UAS must establish its own trust relationship with the URI provider. This document does not advocate transitive trust.
section: "7"
topics:
