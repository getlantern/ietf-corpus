document: rfc-5603
kind: design-rationale
summary: The pwEnetPwInstance index value MAY be set to the VLAN field value when the VLAN is known at row creation time, for better readability and backward compatibility with older versions of the MIB. Otherwise, value 1 SHOULD be used for the first row so management applications know how to access it.
