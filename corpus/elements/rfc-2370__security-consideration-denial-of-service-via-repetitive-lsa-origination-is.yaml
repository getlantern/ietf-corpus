document: rfc-2370
kind: security-consideration
summary: Denial-of-service via repetitive LSA origination is mitigated by OSPF's MinLSInterval (5 seconds minimum between new instances of any particular LSA) and MinLSArrival (1 second minimum acceptance rate during flooding). These limits apply equally to Opaque LSAs.
section: "6.0"
topics:
    - routing
    - security
