document: rfc-8047
kind: normative-requirement
summary: Hosts MUST NOT announce broadcast or multicast addresses in LOCATOR_SETs. Link-local addresses MUST NOT be announced to a peer unless that peer is known to be on the same link.
section: "5.1"
rfc2119_level: MUST NOT
