summary: 'The Null Service SENDER_TSPEC is a 3-word structure: Word 1 has service number 6 and length 2; Word 2 has Parameter ID 128 (Null Service TSpec), flags 0, and length 1; Word 3 carries the Maximum Packet Size (M) as a 32-bit integer. Only the M parameter is defined; no token-bucket parameters are included.'
