document: rfc-8323
kind: protocol-element
summary: The Release message (code 7.04) signals an orderly shutdown request, leaving the peer to close the connection. It may carry the Alternative-Address Option (string, 1–255 bytes, repeatable) and Hold-Off Option (uint, 0–3 bytes) to redirect or throttle reconnections.
