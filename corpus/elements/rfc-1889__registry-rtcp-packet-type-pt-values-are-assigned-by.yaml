document: rfc-1889
kind: registry
summary: 'RTCP packet type (PT) values are assigned by IANA: SR=200, RR=201, SDES=202, BYE=203, APP=204. Implementations may ignore incoming RTCP packets with unknown PT values; additional packet types may be registered with IANA.'
