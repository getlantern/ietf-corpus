document: rfc-8622
kind: protocol-element
summary: The Lower-Effort Per-Hop Behavior (LE PHB) is a Differentiated Services PHB where packets have lower forwarding precedence than all other PHBs, including the default (Best-Effort) PHB. In congestion, LE-marked traffic SHOULD be dropped before any default PHB traffic and may be starved completely. It is analogous to a background process priority in an operating system.
section: "4"
topics:
