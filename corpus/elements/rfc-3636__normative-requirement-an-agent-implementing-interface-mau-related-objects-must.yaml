document: rfc-3636
kind: normative-requirement
summary: An agent implementing interface-MAU related objects MUST also implement the relevant groups of the ifCompliance3 MODULE-COMPLIANCE statement of the Interfaces MIB. The value of ifMauIfIndex must equal the ifIndex used to instantiate the connected interface.
section: 3.4.1
rfc2119_level: MUST
