document: rfc-4754
kind: normative-requirement
summary: When ECDSA-256, ECDSA-384, or ECDSA-521 is used as the digital signature in IKE or IKEv2, the signature payload SHALL contain an encoding of the computed signature consisting of the concatenation of the pair of integers r and s.
