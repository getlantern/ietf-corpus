document: rfc-6763
kind: protocol-element
summary: 'Domain Enumeration uses five reserved PTR query names under a given domain: ''b._dns-sd._udp'', ''db._dns-sd._udp'', ''r._dns-sd._udp'', ''dr._dns-sd._udp'', and ''lb._dns-sd._udp''. These yield recommended browsing domains, default browsing domain, registration domains, default registration domain, and automatic browsing domain(s), respectively.'
