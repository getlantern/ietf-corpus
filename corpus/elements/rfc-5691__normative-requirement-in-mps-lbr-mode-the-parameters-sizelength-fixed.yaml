document: rfc-5691
kind: normative-requirement
summary: In MPS-lbr mode, the parameters sizeLength (fixed value 6), indexLength (fixed value 2), and indexDeltaLength (fixed value 2) MUST be present with those fixed values. The parameter maxDisplacement MUST be present when interleaving. The fixed AU duration MUST be signaled by the constantDuration parameter.
section: 4.2.1
rfc2119_level: MUST
topics:
