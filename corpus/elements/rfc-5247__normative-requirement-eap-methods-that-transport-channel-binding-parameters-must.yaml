document: rfc-5247
kind: normative-requirement
summary: EAP methods that transport channel binding parameters MUST treat this data as opaque octets to avoid introducing media dependencies. Channel binding parameters are only interpreted by the lower layer, not by the EAP method.
section: "1.4"
rfc2119_level: MUST
topics:
    - security
