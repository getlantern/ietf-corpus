document: rfc-8563
kind: normative-requirement
summary: A multipoint Poll MUST NOT be sent more often than the regular multipoint BFD Control packet. The Detection Time MUST be greater than the round-trip time of BFD Control packets from the head to the tail and back.
section: "6.9"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
