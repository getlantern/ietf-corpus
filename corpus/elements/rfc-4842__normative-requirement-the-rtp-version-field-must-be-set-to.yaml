document: rfc-4842
kind: normative-requirement
summary: The RTP Version field MUST be set to 2; P, X, CC, and M bits MUST be set to 0 by the sender. The RTP Timestamp clock MUST be 19.44 MHz based on a local reference. The CEP receiver MUST sequence packets according to the CEP header Sequence Number and MAY verify correct sequencing using the RTP Sequence Number.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
