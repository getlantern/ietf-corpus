document: rfc-3640
kind: interoperability-note
summary: This payload format can be configured to be nearly identical to RFC 3016 (MPEG-4 video). Receivers compliant with this specification SHOULD be able to decode RFC 3016 payloads, and it is strongly RECOMMENDED that implementations be able to ignore 'in band' video decoder configuration packets found in RFC 3016 streams.
section: "2.13"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
