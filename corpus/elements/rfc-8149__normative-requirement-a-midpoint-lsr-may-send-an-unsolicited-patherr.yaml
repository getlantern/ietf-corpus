document: rfc-8149
kind: normative-requirement
summary: A midpoint LSR MAY send an unsolicited PathErr with Notify error code and 'Preferable P2MP-TE Tree Exists' sub-code to the ingress node. The LSR SHOULD consider how frequently it sends such PathErrs, accounting for potential message loss and the possibility that the ingress may choose not to reoptimize.
section: "4.1"
rfc2119_level: MAY
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
