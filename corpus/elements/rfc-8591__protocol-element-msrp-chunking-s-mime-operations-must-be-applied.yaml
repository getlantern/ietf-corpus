document: rfc-8591
kind: protocol-element
summary: 'MSRP chunking: S/MIME operations must be applied to the entire message before chunking. Intermediaries may reorder or resize chunks; scanning for MSRP end-lines occurs per chunk after S/MIME operations are applied.'
