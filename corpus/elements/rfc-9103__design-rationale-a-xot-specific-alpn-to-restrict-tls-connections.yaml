document: rfc-9103
kind: design-rationale
summary: 'A XoT-specific ALPN (to restrict TLS connections to SOA and XFR queries only) was proposed in an earlier draft but rejected. Reasons: additional code complexity and the fact that XoT and ADoT both use DNS wire format and should share the ''dot'' ALPN token.'
