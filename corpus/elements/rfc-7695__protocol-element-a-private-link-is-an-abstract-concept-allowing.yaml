document: rfc-7695
kind: protocol-element
summary: A Private Link is an abstract concept allowing Nodes to make assignments for private use or delegation (e.g., each DHCPv6-PD requesting router may be treated as a distinct Private Link). A Shared Link is a multi-access or point-to-point link requiring actual prefix assignment.
