document: rfc-4175
kind: normative-requirement
summary: For progressive scan video, packets MUST NOT include data from multiple frames, and all packets belonging to the same frame MUST have the same timestamp. For interlaced video, the same constraints apply per field.
section: "4.1"
rfc2119_level: MUST NOT
topics:
