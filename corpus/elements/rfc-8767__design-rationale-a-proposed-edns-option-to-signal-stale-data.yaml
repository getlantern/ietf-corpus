document: rfc-8767
kind: design-rationale
summary: A proposed EDNS option to signal stale data usage was rejected as providing too little perceived value relative to implementation burden. An opt-in EDNS option was also rejected because serve-stale is intended to improve DNS resiliency universally without requiring client participation.
section: "9"
topics:
