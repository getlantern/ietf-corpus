summary: 'The pwMplsTable contains MPLS-specific parameters for each PW when pwPsnType is mpls(1). It is indexed by pwIndex and is automatically created by the agent. Key fields include pwMplsMplsType (BITS: mplsTe, mplsNonTe, pwOnly), pwMplsExpBitsMode, pwMplsExpBits, pwMplsTtl, pwMplsLocalLdpID, pwMplsLocalLdpEntityIndex, pwMplsPeerLdpID, and pwMplsStorageType.'
