document: rfc-8800
kind: interoperability-note
summary: The DISJOINTNESS-STATUS TLV (Type=47) shares the same bit layout as the DISJOINTNESS-CONFIGURATION TLV but carries different semantics (achieved vs. desired disjointness). Any new flag defined for DISJOINTNESS-CONFIGURATION automatically defines a corresponding flag at the same bit position in DISJOINTNESS-STATUS; the status semantics MUST be specified in the same document that defines the configuration flag.
section: "5.2"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
