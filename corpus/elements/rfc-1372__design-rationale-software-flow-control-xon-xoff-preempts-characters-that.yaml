document: rfc-1372
kind: design-rationale
summary: Software flow control (XON/XOFF) preempts characters that host software may need as normal input — editors in particular commonly use Ctrl-S and Ctrl-Q — requiring a mechanism for the host to disable flow control at the telnet client.
section: "4"
