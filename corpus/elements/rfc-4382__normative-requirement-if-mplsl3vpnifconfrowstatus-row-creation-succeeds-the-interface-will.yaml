document: rfc-4382
kind: normative-requirement
summary: If mplsL3VpnIfConfRowStatus row creation succeeds the interface will have been associated with the specified VRF; otherwise the agent MUST not allow the association. When a row is in active(1) state, only mplsL3VpnIfConfStorageType and mplsL3VpnIfConfRowStatus may be modified.
