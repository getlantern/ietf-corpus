document: rfc-3733
kind: protocol-element
summary: 'The <contact:disclose> element allows clients to declare per-field disclosure exceptions to the server''s announced data collection policy. Its required boolean ''flag'' attribute indicates allow (1/true) or deny (0/false), and child elements identify affected fields: name, org, addr (each with int/loc type), voice, fax, and email.'
section: "2.9"
topics:
    - privacy
