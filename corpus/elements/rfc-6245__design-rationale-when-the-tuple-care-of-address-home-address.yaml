document: rfc-6245
kind: design-rationale
summary: When the tuple <Care-of Address, Home Address, Home Agent Address> is identical across multiple subscriber sessions (e.g., in multi-VPN home networks with overlapping home addresses), IP-in-IP tunneling cannot distinguish individual sessions. GRE keying solves this by providing a per-session demultiplexing value exchanged during registration.
section: "1"
topics:
    - mobility
    - vpn
