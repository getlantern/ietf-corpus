document: rfc-2667
kind: protocol-element
summary: tunnelConfigStatus uses the SMIv2 RowStatus convention to create and delete tunnel rows. Creating a row causes the agent to assign an ifIndex and instantiate corresponding rows in ifTable and tunnelIfTable; deleting a row removes all three corresponding entries.
