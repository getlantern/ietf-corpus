document: rfc-8984
kind: normative-requirement
summary: When splitting a recurring event for a 'this and future' change, the original object MUST be truncated to end before the split, a 'next' relation MUST be set on the original's relatedTo for the new object's UID, and a 'first' relation for the series' first UID MUST be set on the new object.
section: 4.1.3
rfc2119_level: MUST
topics:
