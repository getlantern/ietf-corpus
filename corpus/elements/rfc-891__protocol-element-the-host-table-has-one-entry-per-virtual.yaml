document: rfc-891
kind: protocol-element
summary: 'The Host Table has one entry per virtual host indexed by host ID, containing: Name (RAD50), Port ID (net-output process for shortest path), Delay (roundtrip in ms), Offset (logical clock difference in ms), Local Leader (outgoing packet construction), Update Timestamp, and TTL (seconds until host declared down). All fields except Name are updated by the HELLO routing process.'
section: "2.1"
topics:
