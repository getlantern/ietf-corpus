document: rfc-9204
kind: normative-requirement
summary: After the decoder finishes decoding a field section encoded using representations containing dynamic table references, it MUST emit a Section Acknowledgment instruction. The encoder interprets each such instruction as acknowledging the earliest unacknowledged field section with dynamic table references on the given stream.
section: 2.2.2.1
rfc2119_level: MUST
topics:
    - http
