document: rfc-5535
kind: security-consideration
summary: HBAs do not prevent man-in-the-middle (MITM) attacks. An on-path attacker can modify the CGA Parameter Data Structure and change the prefix set, but must also change the interface identifiers of all addresses accordingly; otherwise, verification will fail.
section: "11.1"
topics:
    - security
    - ip
