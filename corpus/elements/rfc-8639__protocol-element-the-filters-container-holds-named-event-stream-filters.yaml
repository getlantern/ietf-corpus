document: rfc-8639
kind: protocol-element
summary: The 'filters' container holds named event stream filters that persist beyond a single subscription's lifecycle, supporting subtree (RFC 6241) and XPath filter specifications. Predefined filters may be referenced by multiple subscriptions via 'stream-filter-ref', enabling filter reuse without repetition.
