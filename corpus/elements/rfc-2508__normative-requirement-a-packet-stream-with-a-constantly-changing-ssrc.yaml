document: rfc-2508
kind: normative-requirement
summary: A packet stream with a constantly changing SSRC field SHOULD be entered in the negative cache to avoid consuming all available session contexts. The negative cache is indexed by source/destination IP address and UDP port pairs, not the SSRC field.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
