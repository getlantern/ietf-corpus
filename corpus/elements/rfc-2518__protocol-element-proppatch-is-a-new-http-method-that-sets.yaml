document: rfc-2518
kind: protocol-element
summary: PROPPATCH is a new HTTP method that sets and/or removes properties defined on the resource identified by the Request-URI using a propertyupdate XML element in the request body. It returns a 207 Multi-Status response and executes instructions atomically.
