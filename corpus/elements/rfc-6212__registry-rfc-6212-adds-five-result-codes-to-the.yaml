document: rfc-6212
kind: registry
summary: 'RFC 6212 adds five result codes to the IANA ''Email Authentication Result Names'' registry for use with the ''vbr'' method: none, pass, fail, temperror, and permerror. These reuse existing code tokens from RFC 5451 but associate them with the new ''vbr'' method.'
