document: rfc-5760
kind: interoperability-note
summary: In the Distribution Source Feedback Summary Model, Media Senders MUST be able to process RSI packets to determine group size and their RTCP bandwidth share, unlike the Simple Feedback Model where standard RFC 3550 RTCP processing suffices. The configuration of the RTCP SSM session in SDP MUST specify which processing the Distribution Source will apply to each RTCP packet type.
section: "7.5"
topics:
    - rtp
    - realtime
