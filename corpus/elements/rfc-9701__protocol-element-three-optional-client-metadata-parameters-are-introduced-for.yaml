summary: 'Three optional client metadata parameters are introduced for RS registration: ''introspection_signed_response_alg'' (JWS algorithm, default RS256), ''introspection_encrypted_response_alg'' (JWE key encryption algorithm, default no encryption), and ''introspection_encrypted_response_enc'' (JWE content encryption algorithm, default A128CBC-HS256 when encryption is used).'
