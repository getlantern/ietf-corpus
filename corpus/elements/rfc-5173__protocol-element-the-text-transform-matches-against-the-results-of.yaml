document: rfc-5173
kind: protocol-element
summary: The :text transform matches against the results of an implementation's best effort at extracting UTF-8 encoded text from a message. All text extracted from a given non-container MIME part MUST be in the same string. In simple implementations, :text MAY be treated the same as :content "text".
section: "5.3"
topics:
    - email
