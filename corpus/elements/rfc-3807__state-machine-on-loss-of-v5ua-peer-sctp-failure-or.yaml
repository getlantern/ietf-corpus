document: rfc-3807
kind: state-machine
summary: 'On loss of V5UA peer (SCTP failure or lost heartbeat): the ASP treats all links on the SG as NON-OPERATIONAL, continuously attempts to re-establish the SCTP connection, and upon re-establishment sends Link Status Start Reporting for all active V5 interface links. If re-established before the V5UA layer is notified, communication proceeds as usual with no additional action.'
section: "5.2"
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
