document: rfc-5046
kind: normative-requirement
summary: After the connection transitions to iSER-assisted mode, the first iSER Message sent by the initiator MUST be the iSER Hello Message, and the target MUST return the iSER HelloReply Message as its first iSER Message.
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
