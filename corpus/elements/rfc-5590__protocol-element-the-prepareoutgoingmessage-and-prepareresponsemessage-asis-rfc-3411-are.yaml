document: rfc-5590
kind: protocol-element
summary: The prepareOutgoingMessage and prepareResponseMessage ASIs (RFC 3411) are extended with a new OUT parameter tmStateReference, passed from the Message Processing Subsystem to the Dispatcher and then to the Transport Subsystem. The generateRequestMsg and generateResponseMsg ASIs (RFC 3411) gain new IN parameters transportDomain and transportAddress, and a new OUT parameter tmStateReference.
section: "6.2"
topics:
    - snmp
