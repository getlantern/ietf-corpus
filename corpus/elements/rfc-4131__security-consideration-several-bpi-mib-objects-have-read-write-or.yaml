document: rfc-4131
kind: security-consideration
summary: Several BPI+ MIB objects have read-write or read-create access, including objects that invalidate authorization keys, set TEK lifetimes, and control certificate trust policies; unauthorized write access to these objects could allow an attacker to disrupt BPI+ security or deny service to cable modems.
section: "7"
topics:
