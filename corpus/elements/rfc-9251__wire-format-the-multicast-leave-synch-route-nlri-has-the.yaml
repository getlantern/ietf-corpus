document: rfc-9251
kind: wire-format
summary: The Multicast Leave Synch Route NLRI has the same structure as the Membership Report Synch Route but appends a Reserved field (4 octets) and Maximum Response Time (1 octet) before the Flags octet. The Reserved, Maximum Response Time, and Flags fields are excluded from BGP route key processing.
section: "9.3"
topics:
    - multicast
    - routing
