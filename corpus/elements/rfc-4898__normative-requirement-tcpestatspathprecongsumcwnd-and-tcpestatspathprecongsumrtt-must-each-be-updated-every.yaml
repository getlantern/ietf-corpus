document: rfc-4898
kind: normative-requirement
summary: tcpEStatsPathPreCongSumCwnd and tcpEStatsPathPreCongSumRTT MUST each be updated every time tcpEStatsPerfCongSignals is incremented, so that their change divided by the change in CongSignals yields the average window and RTT just prior to a congestion signal.
section: "4"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
