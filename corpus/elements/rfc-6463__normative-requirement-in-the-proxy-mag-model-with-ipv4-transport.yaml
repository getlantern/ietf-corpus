document: rfc-6463
kind: normative-requirement
summary: In the proxy-MAG model with IPv4 transport (RFC 5844), the rfLMA MUST include the Alternate IPv4 Care-of Address (A4CoA) option in PBU' containing the IPv4 Proxy Care-of Address of the original MAG; the r2LMA uses this address for tunnel setup and BCE creation.
section: 5.3.2
rfc2119_level: MUST
