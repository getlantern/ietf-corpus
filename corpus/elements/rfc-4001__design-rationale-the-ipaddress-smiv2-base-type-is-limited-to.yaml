document: rfc-4001
kind: design-rationale
summary: The IpAddress SMIv2 base type is limited to 4-byte IPv4 addresses, making it incompatible with IPv6. This MIB module introduces InetAddressType/InetAddress textual convention pairs to provide a generic, extensible representation of Internet network layer addresses that works across IP versions.
section: "1"
topics:
