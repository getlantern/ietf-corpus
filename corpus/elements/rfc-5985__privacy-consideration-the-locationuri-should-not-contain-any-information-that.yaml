document: rfc-5985
kind: privacy-consideration
summary: The 'locationURI' SHOULD NOT contain any information that could identify the Device or Target. It is RECOMMENDED that the locationURI contain a public LIS address and an anonymous identifier such as an unlinked pseudonym. Devices SHOULD treat locationURIs as Location Objects and transmit them only over encrypted channels to authorized entities.
section: 6.5.1
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
