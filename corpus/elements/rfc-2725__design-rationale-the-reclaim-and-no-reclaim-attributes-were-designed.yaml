document: rfc-2725
kind: design-rationale
summary: The reclaim and no-reclaim attributes were designed to remain policy-neutral regarding address lending disputes. They allow either outcome—ISP retaining reclaim rights or customer having full control—without the registry taking sides, while still enabling court-order compliance in a distributed registry environment.
section: C.2
topics:
