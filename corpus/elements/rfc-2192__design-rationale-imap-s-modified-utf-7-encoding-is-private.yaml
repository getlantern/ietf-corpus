document: rfc-2192
kind: design-rationale
summary: IMAP's modified UTF-7 encoding is private to IMAP and not easily interpreted by URL display programs, motivating the requirement to convert mailbox names to hex-encoded UTF-8 in URLs. Appendix A provides sample C code performing this conversion via the UTF-16 intermediate representation.
section: "9"
