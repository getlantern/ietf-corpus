summary: 'When the PW CW is not in use and multiple CC types are advertised, the following precedence applies for CC type selection: (1) Type 4: GAL VCCV Control Channel, (2) Type 2: MPLS Router Alert Label, (3) Type 3: MPLS PW Label with TTL == 1.'
