document: rfc-4150
kind: protocol-element
summary: The tpmAggrReportTable stores completed transport performance studies, indexed by control entry, report sequence number, application, transaction-metric pair, network-layer protocol, server address, and client ID. Statistical columns cover N, SumX, Maximum, Minimum, SumSq, SumIX, and SumIXSq, each with a ZeroBasedCounter32 base, an overflow counter, and a ZeroBasedCounter64 high-capacity variant.
