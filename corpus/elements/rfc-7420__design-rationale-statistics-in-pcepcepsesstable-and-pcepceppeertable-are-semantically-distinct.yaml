document: rfc-7420
kind: design-rationale
summary: 'Statistics in pcePcepSessTable and pcePcepPeerTable are semantically distinct: pcePcepSessTable tracks only the current session, while pcePcepPeerTable aggregates across all sessions to that peer over time. This dual-level design supports both real-time session debugging and historical trend analysis.'
