document: rfc-4522
kind: protocol-element
summary: The binary option is an attribute option indicated by the string 'binary' (case insensitive) in an attribute description. It specifies that the associated attribute values or assertion values are encoded according to BER as used by X.500 directories, rather than the normal LDAP-specific encoding.
