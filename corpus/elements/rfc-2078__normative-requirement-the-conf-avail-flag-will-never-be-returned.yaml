document: rfc-2078
kind: normative-requirement
summary: The conf_avail flag will never be returned TRUE unless the integ_avail flag is also returned TRUE. Callers desiring per-message security services must check these flags at context establishment time.
section: 1.2.2
rfc2119_level: MUST
topics:
