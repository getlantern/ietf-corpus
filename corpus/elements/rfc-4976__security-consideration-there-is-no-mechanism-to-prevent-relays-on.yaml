document: rfc-4976
kind: security-consideration
summary: There is no mechanism to prevent relays on the path from inserting forged messages, modifying message contents, or copying them to third parties. Clients can use S/MIME encryption for content confidentiality and S/MIME signatures to detect relay manipulation.
section: "9.4"
topics:
