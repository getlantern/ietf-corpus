document: rfc-8188
kind: normative-requirement
summary: To preserve a 2^-40 probability of IND-CPA security, the total plaintext enciphered with a key derived from the same IKM and salt MUST be less than 2^44.5 blocks of 16 octets (approximately 398 terabytes for record sizes that are multiples of 16 octets).
section: "4.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
