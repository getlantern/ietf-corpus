document: rfc-4842
kind: protocol-element
summary: Dynamic Bandwidth Allocation (DBA) is an OPTIONAL mechanism that suppresses transmission of the SPE/VT fragment payload when AIS-P/V or SPE/VT Unequipped conditions are detected. Implementations supporting DBA MUST include a per-channel mechanism to disable it for interoperability with non-DBA implementations. The packet transmission rate during DBA must remain equivalent to normal operation.
section: "11.1"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
