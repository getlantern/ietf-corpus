document: rfc-927
kind: security-consideration
summary: Target hosts may accept or decline the TUID-based authentication at their option; there is no obligation to trust a TAC's assertion of user identity. The option relies entirely on mutual consent between cooperating hosts and provides no cryptographic verification of the UUID or the authenticating host's identity.
section: "4"
topics:
    - security
