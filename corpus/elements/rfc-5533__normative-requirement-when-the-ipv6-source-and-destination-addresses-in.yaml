document: rfc-5533
kind: normative-requirement
summary: When the IPv6 source and destination addresses in a packet's header do not match the ULID pair, the ULID Pair option MUST be included in I1, I2, or I2bis messages. This occurs notably during context recovery when a different locator pair is used to transport the context-establishment exchange.
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
