document: rfc-6135
kind: interoperability-note
summary: Some UAs detect NAT presence by comparing the IP address in the SIP Via sent-by parameter with the received parameter in the 200 OK response to REGISTER. This method fails when a SIP proxy sits between the UA and the NAT.
section: 4.2.2
topics:
    - nat
    - sip
