document: rfc-3431
kind: protocol-element
summary: The COUNT match type determines the number of specified entities in the message and performs a relational comparison of that count against values in the test expression. For address tests it counts recipients, for envelope tests it counts envelope parts, and for header tests it counts field instances.
section: "4.2"
