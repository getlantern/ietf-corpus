document: rfc-7198
kind: security-consideration
summary: In-network duplication middleboxes can act as denial-of-service amplifiers if an attacker can cause attack traffic to be duplicated. Middleboxes providing duplication must authenticate traffic as being from a legitimate source (e.g., using SRTP), requiring the middlebox to be part of the security context with access to keying material via session setup signaling.
section: "8"
topics:
    - rtp
    - realtime
    - security
    - crypto
