summary: 'cast5CBC is considered advisable as the mandatory SPKM-3 encryption algorithm: it is a 128-bit cipher, the basis for the cast6CBC algorithm evaluated by NIST as having ''high security margin'' with no major or minor security gaps, though smart-card implementation vulnerabilities apply to many algorithms and LIPKEY is not targeted at smart-card environments.'
