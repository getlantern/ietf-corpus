document: rfc-8618
kind: privacy-consideration
summary: 'C-DNS captures client IP addresses and query names, which are personal data in many jurisdictions. The format provides mechanisms to address this: IP address prefix storage (truncating client addresses), storage-flags to signal anonymization or sampling, and the ''anonymization-method'' field to document the technique used. Operators should consider omitting or anonymizing client address fields at capture time rather than post-processing.'
section: "14"
topics:
