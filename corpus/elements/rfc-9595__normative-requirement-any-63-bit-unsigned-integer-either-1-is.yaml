document: rfc-9595
kind: normative-requirement
summary: Any 63-bit unsigned integer either (1) is unassigned as a SID or (2) immutably maps to EXACTLY one YANG name. Only the transition from unassigned to that immutable mapping is defined (Objective 1, MUST).
section: "2.1"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - registry
