summary: 'The BGP Decision Process operates in three phases: Phase 1 calculates degree of preference for each route in Adj-RIBs-In, Phase 2 selects the best route to each destination for the Loc-RIB (with tie-breaking rules), and Phase 3 disseminates selected routes to peers via Adj-RIBs-Out.'
