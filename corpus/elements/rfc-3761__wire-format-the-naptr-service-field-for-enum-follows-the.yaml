document: rfc-3761
kind: wire-format
summary: 'The NAPTR service field for ENUM follows the form: ''E2U'' followed by one or more ''+''-prefixed enumservices. Each enumservice has a type (1-32 alphanumeric chars) and optional subtypes separated by '':''. Example: ''E2U+sip'' or ''E2U+sip:tel''.'
