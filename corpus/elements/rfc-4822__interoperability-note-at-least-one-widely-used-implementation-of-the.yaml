document: rfc-4822
kind: interoperability-note
summary: At least one widely-used implementation of the prior specification (RFC 2082) violates the requirement to use Key-ID and interface to select a Security Association (instead trying all keys), creating a denial-of-service vulnerability; conforming implementations MUST NOT do this.
section: "3.2"
topics:
    - routing
    - security
