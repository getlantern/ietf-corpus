document: rfc-2038
kind: design-rationale
summary: 'Two distinct payload formats are defined: one for MPEG System/Transport/Program Streams (Section 2) to maximize interoperability with MPEG System environments including TIU/RIU end-systems, and one for MPEG Elementary Streams (Section 3) to maximize compatibility with the Internet architecture and other RTP-encapsulated media. The choice avoids forcing MPEG System overhead on pure internet end-systems.'
