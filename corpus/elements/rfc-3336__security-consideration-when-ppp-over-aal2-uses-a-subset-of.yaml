document: rfc-3336
kind: security-consideration
summary: When PPP over AAL2 uses a subset of CIDs on a virtual connection, an endpoint cannot assume that PPP session authentication and security mechanisms also protect the non-PPP-encapsulated CIDs running on the same virtual connection.
section: "9"
topics:
    - security
