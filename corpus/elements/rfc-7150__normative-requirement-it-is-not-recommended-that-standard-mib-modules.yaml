document: rfc-7150
kind: normative-requirement
summary: It is NOT RECOMMENDED that standard MIB modules be extended to include detailed information about the content of the Vendor Information object or TLV; however, MIB modules MAY be extended to report the use of these constructs and the Enterprise Numbers they contain.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - routing
