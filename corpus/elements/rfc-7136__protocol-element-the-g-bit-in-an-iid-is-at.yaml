document: rfc-7136
kind: protocol-element
summary: The 'g' bit in an IID is at position 7 (position 71 in the full IPv6 address). It derives from the IEEE 'i/g' (group) bit in a MAC address and its value is preserved unchanged. After IID formation, this bit has no reliable meaning.
section: "1"
topics:
