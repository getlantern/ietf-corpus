document: rfc-7233
kind: normative-requirement
summary: Recipients MUST anticipate potentially large decimal numerals in first-byte-pos, last-byte-pos, and suffix-length and prevent parsing errors due to integer conversion overflows, since there is no predefined limit to the length of a payload.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - security
