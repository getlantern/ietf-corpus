document: rfc-4514
kind: security-consideration
summary: Distinguished Names frequently contain sensitive descriptive information about people, organizations, or devices (full names, email addresses, physical location). Privacy laws in many countries prohibit disclosure of certain such information. Administrators are encouraged to use DIT structural rules, access controls, and authentication/data security services to restrict sensitive attributes in naming.
section: "5.1"
topics:
    - ldap
    - privacy
    - security
