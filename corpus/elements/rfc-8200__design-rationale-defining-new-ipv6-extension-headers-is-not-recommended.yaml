document: rfc-8200
kind: design-rationale
summary: Defining new IPv6 extension headers is not recommended; the Destination Options header should be used instead for optional destination information, as it provides better handling and backward compatibility. New hop-by-hop options are also discouraged because nodes may be configured to ignore or drop packets containing the Hop-by-Hop Options header.
section: "4.8"
topics:
    - ip
