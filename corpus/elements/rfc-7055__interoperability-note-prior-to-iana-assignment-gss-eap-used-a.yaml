summary: Prior to IANA assignment, GSS-EAP used a vendor-specific RADIUS attribute (VSA enterprise ID 25622) with sub-attributes 128–131 for the same four acceptor name components now assigned standard attribute values 164–167. Older implementations may send the VSA form.
