document: rfc-6344
kind: normative-requirement
summary: VCAT-layer calls and related LSPs MUST follow the procedures defined in RFC 4974, with the addition of a CALL_ATTRIBUTES object containing the VCAT TLV. A call MUST NOT contain members used in more than one VCG.
section: "5.3"
rfc2119_level: MUST
topics:
