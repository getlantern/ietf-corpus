document: rfc-5946
kind: design-rationale
summary: The PathErr-upstream-for-failure-notification approach is borrowed from RFC 3209 (RSVP-TE), where it was introduced to allow MPLS TE LSRs to notify the TE Tunnel head-end of LSP establishment failure. This reuse avoids defining a new mechanism for the same conceptual purpose.
section: "3.1"
topics:
