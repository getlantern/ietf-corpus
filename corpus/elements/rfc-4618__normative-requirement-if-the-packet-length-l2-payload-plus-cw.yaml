document: rfc-4618
kind: normative-requirement
summary: If the packet length (L2 payload plus CW length) is less than 64 bytes, the Length field MUST be set to the packet's length; otherwise the Length field MUST be set to zero. If padding was added in transit and the CW is used, the egress PE MUST remove padding before forwarding.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
