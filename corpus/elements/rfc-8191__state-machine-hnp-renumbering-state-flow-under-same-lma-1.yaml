document: rfc-8191
kind: state-machine
summary: 'HNP renumbering state flow under same LMA: (1) LMA allocates new HNP; (2) LMA sends UPN to MAG; (3) MAG sends RA or DHCP to MN; (4) MN deletes old HoA and configures new HoA; (5) MAG updates bindings and routing; (6) MAG sends UPA to LMA; (7) LMA updates routing and binding to replace old HNP.'
