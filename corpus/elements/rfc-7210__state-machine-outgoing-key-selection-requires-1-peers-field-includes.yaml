document: rfc-7210
kind: state-machine
summary: 'Outgoing key selection requires: (1) Peers field includes the peer H, (2) Protocol field matches P, (3) Interfaces field includes I or ''all'' if interface is specified, (4) Direction is ''out'' or ''both'', and (5) SendLifetimeStart <= current time <= SendLifeTimeEnd. When multiple valid keys exist, the one with the most recent SendLifetimeStart is preferred to support rollover.'
section: "3"
