document: rfc-7473
kind: wire-format
summary: 'Each SAC Element is a single octet: the high-order D-bit (1=disable, 0=enable), a 3-bit App field (1=IPv4 Prefix-LSPs, 2=IPv6 Prefix-LSPs, 3=FEC 128 P2P-PW, 4=FEC 129 P2P-PW), and 4 unused bits that MUST be zero on transmit and ignored on receipt.'
