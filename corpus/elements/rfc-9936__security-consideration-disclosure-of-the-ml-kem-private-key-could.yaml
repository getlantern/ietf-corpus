document: rfc-9936
kind: security-consideration
summary: Disclosure of the ML-KEM private key could compromise all messages protected with that key. Disclosure of ephemeral keys (key-encryption key, content-encryption key, content-authenticated-encryption key) compromises associated encrypted or authenticated content.
