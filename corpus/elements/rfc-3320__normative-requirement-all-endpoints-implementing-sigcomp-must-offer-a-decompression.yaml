document: rfc-3320
kind: normative-requirement
summary: All endpoints implementing SigComp MUST offer a decompression_memory_size of at least 2048 bytes and MUST offer a minimum of 16 cycles_per_bit. Endpoints MAY offer additional resources, which can be advertised via the SigComp feedback mechanism.
section: 3.3.1
rfc2119_level: MUST
topics:
