document: rfc-7463
kind: interoperability-note
summary: A UA supporting dialog events but not shared appearances will simply ignore <appearance> elements in NOTIFYs. However, it may attempt to join or replace dialogs marked exclusive; the proxy or UA must actively reject such requests or the unintended join/takeover will succeed.
section: "9.3"
topics:
    - sip
    - realtime
