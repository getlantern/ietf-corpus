document: rfc-2226
kind: interoperability-note
summary: Diskless boot (bootp) clients must use 255.255.255.255 in MARS because they do not know their subnet; the bootp server must also respond using 255.255.255.255 since it cannot send a directed or subnet-directed broadcast to a client without a known IP address.
section: "3"
topics:
