document: rfc-6710
kind: protocol-element
summary: The MT-PRIORITY SMTP extension adds an optional MT-PRIORITY parameter to the MAIL FROM command, taking a decimal integer value from -9 to 9 inclusive, where higher numbers mean higher priority. The EHLO keyword is 'MT-PRIORITY' with an optional Priority Assignment Policy name parameter.
