document: rfc-1425
kind: registry
summary: 'The IANA maintains a registry of standard SMTP service extensions. Each registered extension must be defined by a standards-track RFC specifying: the extension name, EHLO keyword, keyword parameters, any additional SMTP verbs, any new MAIL FROM/RCPT TO parameters, and behavioral impact. Initial entries include SEND, SOML, SAML, EXPN, HELP, and TURN (all from RFC 821 optional commands).'
section: "5"
