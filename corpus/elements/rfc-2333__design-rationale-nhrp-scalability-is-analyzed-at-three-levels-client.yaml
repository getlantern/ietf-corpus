summary: 'NHRP scalability is analyzed at three levels: Client level (bounded by NIC processing and memory, especially for connection-oriented NBMA such as ATM with many SVCCs), LIS level (bounded by number of address mappings, addressable via SCSP for NHS synchronization), and Domain level (bounded by the scalability of the underlying routing protocol).'
