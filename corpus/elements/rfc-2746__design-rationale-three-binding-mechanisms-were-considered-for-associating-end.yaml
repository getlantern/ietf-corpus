document: rfc-2746
kind: design-rationale
summary: Three binding mechanisms were considered for associating end-to-end sessions with tunnel sessions. Option 2—a new SESSION_ASSOC object attached to end-to-end PATH messages—was chosen over a new RSVP message type (Option 1) and UDP-encapsulating PATH messages (Option 3) because it is simpler and allows Rexit to pass on end-to-end PATHs transparently if it does not support tunneling.
section: "2.3"
topics:
