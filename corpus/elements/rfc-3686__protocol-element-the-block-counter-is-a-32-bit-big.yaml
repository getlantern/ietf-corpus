document: rfc-3686
kind: protocol-element
summary: The block counter is a 32-bit big-endian integer starting at one. This construction permits each packet to consist of up to (2^32)-1 blocks (68,719,476,720 octets), sufficient to handle any IPv6 jumbogram.
