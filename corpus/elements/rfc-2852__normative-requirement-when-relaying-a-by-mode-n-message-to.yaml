document: rfc-2852
kind: normative-requirement
summary: When relaying a by-mode 'N' message to a non-Deliver-By server supporting DSN, if no NOTIFY parameter was supplied 'NOTIFY=FAILURE,DELAY' SHOULD be requested; if NOTIFY was specified and is not 'NEVER', 'DELAY' SHOULD be added if not already present.
section: 4.1.4.2
rfc2119_level: SHOULD
topics:
    - email
