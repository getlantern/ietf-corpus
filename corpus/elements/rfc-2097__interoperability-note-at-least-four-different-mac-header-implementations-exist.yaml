document: rfc-2097
kind: interoperability-note
summary: At least four different MAC header implementations exist for NBF packets (802.3 Ethernet, 802.5 Token-Ring, DIX Ethernet, FDDI). The IEEE-MAC-Address-Required option is provided so implementations that need MAC addresses for routing or bridging can negotiate their inclusion; implementations such as NetBIOS gateways may not require any MAC address fields.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
