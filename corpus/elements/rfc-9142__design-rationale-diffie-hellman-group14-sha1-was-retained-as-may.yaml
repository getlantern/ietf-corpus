document: rfc-9142
kind: design-rationale
summary: diffie-hellman-group14-sha1 was retained as MAY rather than immediately disallowed to accommodate legacy small hardware IoT devices with insufficient compute and memory to use larger MODP groups before session timeout. The expectation is that it will be deprecated or disallowed in the future.
section: "3.4"
topics:
    - crypto
    - security
