document: rfc-8936
kind: normative-requirement
summary: The SET Recipient MUST acknowledge receipt to the SET Transmitter, and SHOULD do so in a timely fashion. The SET Recipient SHALL NOT use the event acknowledgement mechanism to report event errors other than those relating to the parsing and validation of the SET.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - http
