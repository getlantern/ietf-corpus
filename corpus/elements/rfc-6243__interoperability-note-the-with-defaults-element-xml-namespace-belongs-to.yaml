document: rfc-6243
kind: interoperability-note
summary: The <with-defaults> element XML namespace belongs to the ietf-netconf-with-defaults YANG module, not to the namespace of <get>, <get-config>, or <copy-config>. A server implementing the module MUST also advertise a YANG module capability URI per RFC 6020 rules.
section: "4.3"
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
