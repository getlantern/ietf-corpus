document: rfc-7678
kind: normative-requirement
summary: Within ASM-mPrefix64 and SSM-mPrefix64 AVPs, the AddressType field of IP-Address MUST have value 2 (IPv6), the conveyed prefix MUST belong to the correct multicast range, and unused bits beyond the prefix MUST be set to zeroes by the sender.
section: 3.3.1
rfc2119_level: MUST
topics:
    - diameter
    - v6ops
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
