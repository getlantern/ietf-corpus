document: rfc-8202
kind: wire-format
summary: The IID-TLV has Type=7, Length=2-254. The Value field begins with a 2-octet IID (0-65535), followed by zero or more 2-octet Supported ITID fields. A single IID-TLV supports advertisement of up to 126 ITIDs.
