document: rfc-7580
kind: design-rationale
summary: Static information sub-TLVs (e.g., Connectivity Matrix, Port Label Restrictions) should be separated from dynamic information sub-TLVs and advertised in separate OSPF-TE LSAs. This avoids unnecessary updates of static information when only dynamic information changes, improving routing scalability.
section: "4"
topics:
