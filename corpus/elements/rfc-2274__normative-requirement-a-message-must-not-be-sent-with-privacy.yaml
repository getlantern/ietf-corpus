document: rfc-2274
kind: normative-requirement
summary: A message MUST NOT be sent with privacy (confidentiality) protection unless both an authentication protocol and a privacy protocol are configured for the user. Privacy without authentication is disallowed.
section: 1.4.3
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
