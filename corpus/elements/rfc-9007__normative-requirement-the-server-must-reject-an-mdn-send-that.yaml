document: rfc-9007
kind: normative-requirement
summary: The server MUST reject an MDN/send that does not result in setting the '$mdnsent' keyword; it MUST check that 'onSuccessUpdateEmail' is correctly set to update this keyword. This ensures the client explicitly tracks which messages have had MDNs sent.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
