document: rfc-5740
kind: registry
summary: 'NORM Header Extension Types registry: values 0–127 are variable-length extensions (requiring ''hel'' field); values 128–255 are fixed-length (one 32-bit word). EXT_FTI is assigned het=64. New assignments in ranges 0–63 and 128–191 require IETF Consensus; ranges 64–127 and 192–255 require Specification Required.'
section: 8.1.1
topics:
