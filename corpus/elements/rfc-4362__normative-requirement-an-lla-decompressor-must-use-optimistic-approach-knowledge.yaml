document: rfc-4362
kind: normative-requirement
summary: An LLA decompressor MUST use optimistic approach knowledge to detect possible context loss events; if context loss is suspected it MUST invalidate the context and not forward any packets until the context has been re-synchronized.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
