document: rfc-3585
kind: protocol-element
summary: 'SARule is a concrete but non-instantiable base class for IKERule and IPsecRule. It carries the LimitNegotiation property (unsigned 16-bit integer: 1=initiator-only, 2=responder-only, 3=both) to constrain whether a rule applies to new phase 1 or phase 2 negotiations; the property is ignored during SA refresh when the selector matches an existing SA.'
section: "4.1"
topics:
    - ipsec
    - security
