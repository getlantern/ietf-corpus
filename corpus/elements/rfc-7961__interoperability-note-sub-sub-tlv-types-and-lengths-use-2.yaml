document: rfc-7961
kind: interoperability-note
summary: Sub-sub-TLV types and lengths use 2-byte fields when the enclosing IA APPsub-TLV is in an extended LSP TLV, but only 1-byte fields are usable in non-extended (traditional ISO-10589) LSPs. Types greater than 255 cannot be used in the non-extended context.
