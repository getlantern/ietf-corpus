document: rfc-3811
kind: wire-format
summary: TeHopAddress has SYNTAX OCTET STRING (SIZE (0..32)) and must always be interpreted in the context of an associated TeHopAddressType object. Attempts to set it to a value inconsistent with its TeHopAddressType must fail with an inconsistentValue error.
