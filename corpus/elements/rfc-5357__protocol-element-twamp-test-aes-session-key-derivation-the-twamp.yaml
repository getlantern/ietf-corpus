document: rfc-5357
kind: protocol-element
summary: 'TWAMP-Test AES Session-key derivation: the TWAMP-Control AES Session-key is encrypted with the 16-octet SID as the key using single-block AES-ECB encryption. The TWAMP-Test HMAC Session-key is derived by encrypting the TWAMP-Control HMAC Session-key using AES-CBC (two-block, IV=0) with the SID as the key.'
section: 4.2.1
topics:
