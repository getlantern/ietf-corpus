document: rfc-8871
kind: normative-requirement
summary: Upon receipt of a new EKT Key, the endpoint MUST create a new SRTP master key and prepare to send that key inside a FullEKTField using the new EKT Key. Endpoints MUST also be prepared to decrypt EKT Tags using the new key immediately.
section: 4.5.2
rfc2119_level: MUST
topics:
    - crypto
    - realtime
    - rtp
