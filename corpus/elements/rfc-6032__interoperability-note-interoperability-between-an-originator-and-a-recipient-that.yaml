document: rfc-6032
kind: interoperability-note
summary: Interoperability between an originator and a recipient that do not support the same innermost content type (e.g., originator produces AsymmetricKeyPackage while recipient expects SymmetricKeyPackage) is not addressed by this specification; originators are expected to be aware of recipient capabilities, but the capability exchange mechanism is out of scope.
section: "2"
topics:
    - crypto
    - security
