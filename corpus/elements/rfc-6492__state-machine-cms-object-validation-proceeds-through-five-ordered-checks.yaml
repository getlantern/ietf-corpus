document: rfc-6492
kind: state-machine
summary: 'CMS object validation proceeds through five ordered checks: (1) well-formedness of the signed object syntax, (2) signature verification using the EE certificate public key, (3) valid certification path from trust anchor to EE certificate, (4) EE certificate not revoked per the embedded CRL, and (5) signing-time is monotonically non-decreasing relative to prior valid messages from the same originator.'
section: 3.1.2
topics:
