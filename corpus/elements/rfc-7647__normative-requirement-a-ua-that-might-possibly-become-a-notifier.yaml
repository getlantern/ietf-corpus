document: rfc-7647
kind: normative-requirement
summary: A UA that might possibly become a notifier (e.g., by accepting a REFER that creates a subscription) needs to include a GRUU in the Contact header field of dialog-forming and target-refresh methods such as INVITE, per RFC 7621.
section: "3"
rfc2119_level: MUST
topics:
    - sip
