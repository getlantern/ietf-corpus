document: rfc-4202
kind: normative-requirement
summary: 'Both ends of a TE link MUST use the same method for carrying label information. The label type is determined by the switching capability pair: [PSC,PSC] uses shim header labels, [TDM,TDM] uses TDM time slots, [LSC,LSC] uses lambda labels, [FSC,FSC] uses port labels; mixed pairs such as [PSC,TDM] use TDM time slots and [PSC,LSC] or [TDM,LSC] use lambda labels.'
section: 2.4.7
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
