document: rfc-1212
kind: design-rationale
summary: As a rule of thumb, a conceptual row should contain no more than approximately 20 objects so that all columnar objects fit in a single PDU. Objects should be grouped by access pattern (statistics vs. parameters, common vs. rare) rather than splitting a managed object class across many tables to emulate OSI optional-object flexibility.
section: "5.1"
topics:
