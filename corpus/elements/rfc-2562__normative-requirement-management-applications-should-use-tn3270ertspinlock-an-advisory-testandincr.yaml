document: rfc-2562
kind: normative-requirement
summary: Management applications SHOULD use tn3270eRtSpinLock (an advisory TestAndIncr lock) to serialize creation or alteration of tn3270eRtCollCtlTable entries. Agents MUST implement this object but SHALL NOT enforce its use by management applications.
section: "4.4"
rfc2119_level: MUST
