document: rfc-5790
kind: interoperability-note
summary: When Group Compatibility Mode is IGMPv2, an LW-IGMPv3 router treats an IGMPv2 Report as TO_EX({}) and an IGMPv2 Leave as TO_IN({}). When Group Compatibility Mode is IGMPv1, both IGMPv1 and IGMPv2 Reports are translated to TO_EX({}).
section: 6.2.2
topics:
    - multicast
    - routing
