document: rfc-9475
kind: normative-requirement
summary: Hash algorithm identifiers in the "msgi" claim MUST use only lowercase letters and MUST NOT contain hyphen characters. The character immediately following the algorithm string MUST be a hyphen ("-", ASCII 45).
section: "3.2"
rfc2119_level: MUST
