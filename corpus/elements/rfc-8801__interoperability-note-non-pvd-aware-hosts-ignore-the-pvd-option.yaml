document: rfc-8801
kind: interoperability-note
summary: Non-PvD-aware hosts ignore the PvD Option (Type 21) and all RA options it contains per RFC 4861 Section 4.2, ensuring backward compatibility. This allows mixed-mode networks with both PvD-aware and non-PvD-aware hosts to coexist without disruption.
section: "3.3"
topics:
