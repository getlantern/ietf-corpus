document: rfc-6415
kind: normative-requirement
summary: The client obtains the host-meta document by sending an HTTP or HTTPS GET request to '/.well-known/host-meta' using default ports (80 for HTTP, 443 for HTTPS). The scope and meaning of host-meta documents obtained via other protocols or ports is undefined.
section: "2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
