document: rfc-9147
kind: wire-format
summary: 'DTLSHandshake adds three fields to the TLS Handshake structure: uint16 message_seq (ordering), uint24 fragment_offset, and uint24 fragment_length (fragmentation support). These three fields are excluded from the transcript hash computation in DTLS 1.3, a change from DTLS 1.2.'
