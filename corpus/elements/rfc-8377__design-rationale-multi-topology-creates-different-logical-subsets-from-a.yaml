document: rfc-8377
kind: design-rationale
summary: Multi-topology creates different logical subsets from a single physical TRILL campus, constraining TRILL Data packets to specific switches and links. This differs from Data Labels (VLANs/FGLs), which create virtual end-station topologies but allow packets to traverse any physical path regardless of label.
