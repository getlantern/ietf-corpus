document: rfc-3491
kind: security-consideration
summary: Unicode and ISO/IEC 10646 contain many visually similar characters. Stringprep (and thus Nameprep) does not map similar-looking characters together or prohibit characters solely because they resemble others, as doing so would require extensive context such as font information.
section: "9"
topics:
