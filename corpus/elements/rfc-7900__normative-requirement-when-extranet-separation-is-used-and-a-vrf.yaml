document: rfc-7900
kind: normative-requirement
summary: When extranet separation is used and a VRF exports UMH-eligible routes for both extranet and non-extranet C-sources, the UMH-eligible routes for extranet C-sources MUST contain the extranet RD in their NLRIs.
section: 4.1.1
rfc2119_level: MUST
