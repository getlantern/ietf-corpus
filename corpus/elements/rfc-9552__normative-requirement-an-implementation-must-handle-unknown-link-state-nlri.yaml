document: rfc-9552
kind: normative-requirement
summary: An implementation MUST handle unknown Link-State NLRI types as opaque objects and MUST preserve and propagate them. This deviates from RFC 7606 Section 5.4 paragraph 2 to allow seamless introduction of new NLRI types without upgrading all propagators.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - interoperability-note
