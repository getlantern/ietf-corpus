document: rfc-2366
kind: normative-requirement
summary: When a marsClientTable, marsTable, or marsMcsTable row is deleted, it is recommended that the agent or SNMP management station also delete any stale rows in associated tables (e.g., marsClientVcTable, marsVcTable) that reference the deleted row.
