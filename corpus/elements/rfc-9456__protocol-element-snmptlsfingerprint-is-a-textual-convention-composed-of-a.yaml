document: rfc-9456
kind: protocol-element
summary: SnmpTLSFingerprint is a textual convention composed of a one-octet hashing algorithm identifier (taken from the IANA 'SNMP-TLSTM HashAlgorithms' registry) followed by the fingerprint value. It is an OCTET STRING of SIZE 0..255, where zero-length is allowed for optional use in tables.
