document: rfc-854
kind: protocol-element
summary: 'Sub-negotiation allows richer parameter exchange after basic DO/WILL agreement: SB (code 250) introduces the sub-negotiation data, and SE (code 240) terminates it. Sub-negotiation MUST NOT begin until a prior DO/WILL exchange has confirmed mutual understanding of the option.'
