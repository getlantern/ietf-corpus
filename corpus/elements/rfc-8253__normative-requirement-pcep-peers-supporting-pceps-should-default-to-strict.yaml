document: rfc-8253
kind: normative-requirement
summary: PCEP peers supporting PCEPS SHOULD default to strict TLS configuration (not allowing non-TLS PCEP sessions). Implementations MAY allow operator override, but SHOULD trigger a security warning when the override is executed.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - tls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
