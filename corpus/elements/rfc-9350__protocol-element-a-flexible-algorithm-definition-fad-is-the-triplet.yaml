document: rfc-9350
kind: protocol-element
summary: A Flexible Algorithm Definition (FAD) is the triplet of (a) calculation-type, (b) metric-type, and (c) a set of constraints. The Flex-Algorithm is a numeric identifier in the range 128-255 associated via configuration with the FAD; the mapping between a Flex-Algorithm value and its meaning is operator-defined.
