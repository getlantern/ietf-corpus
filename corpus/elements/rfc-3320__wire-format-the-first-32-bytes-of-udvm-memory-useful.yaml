document: rfc-3320
kind: wire-format
summary: 'The first 32 bytes of UDVM memory (Useful Values) are initialized at startup: 0–1 = UDVM_memory_size, 2–3 = cycles_per_bit, 4–5 = SigComp_version, 6–7 = partial_state_ID_length, 8–9 = state_length, 10–31 = reserved (zero in version 0x01).'
