document: rfc-3776
kind: normative-requirement
summary: When IPsec protects return routability or payload packets, the mobile node MUST set the source address of outgoing tunnel packets to its current primary care-of address, switching immediately after sending a Binding Update registering a new address.
section: "4.3"
rfc2119_level: MUST
topics:
