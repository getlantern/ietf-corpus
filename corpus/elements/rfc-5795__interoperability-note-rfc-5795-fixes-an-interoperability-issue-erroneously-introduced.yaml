document: rfc-5795
kind: interoperability-note
summary: 'RFC 5795 fixes an interoperability issue erroneously introduced in RFC 4995: the Size field in ROHC feedback now correctly indicates the total size of the FEEDBACK data field and the CID field combined, consistent with RFC 3095. Implementations based on RFC 5795 and RFC 3095 are compatible and interoperable; RFC 4995 implementations using the incorrect Size interpretation are not.'
section: "1"
topics:
