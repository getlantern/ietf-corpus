document: rfc-2622
kind: normative-requirement
summary: 'The mbrs-by-ref attribute controls indirect set membership: if present with specific maintainer names, only objects maintained by those maintainers that reference the set via member-of are included; if ANY, any referencing object is a member; if absent, only directly listed members in the members attribute are in the set.'
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
