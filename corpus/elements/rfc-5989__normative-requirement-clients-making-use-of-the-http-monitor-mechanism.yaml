document: rfc-5989
kind: normative-requirement
summary: Clients making use of the http-monitor mechanism MUST support the HTTP Link header field. Clients that support HTML SHOULD support the HTML <link/> element; those supporting Atom SHOULD support Atom <atom:link/> elements.
section: "3"
rfc2119_level: MUST
topics:
