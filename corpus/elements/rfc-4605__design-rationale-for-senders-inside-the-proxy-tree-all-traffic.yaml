document: rfc-4605
kind: design-rationale
summary: For senders inside the proxy tree, all traffic is forwarded towards the root, and upstream PIM-SM routers must be configured to Register-encapsulate new sources as if they were directly connected, since IGMP/MLD proxying provides no mechanism to advertise internal prefixes upstream.
section: "3.2"
topics:
    - multicast
