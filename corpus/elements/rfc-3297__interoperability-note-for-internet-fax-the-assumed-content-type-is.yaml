document: rfc-3297
kind: interoperability-note
summary: For Internet fax, the assumed content-type is image/tiff and all devices must support TIFF profile S. However, it is RECOMMENDED that Internet fax devices explicitly state their capabilities (including type='image/tiff' and baseline TIFF) in MDN responses rather than assuming the peer is also an Internet fax device.
section: "7"
