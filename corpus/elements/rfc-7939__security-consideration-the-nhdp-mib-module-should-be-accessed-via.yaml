document: rfc-7939
kind: security-consideration
summary: The NHDP-MIB module SHOULD be accessed via SNMPv3 with authentication and privacy (authPriv security level) to prevent eavesdropping on management traffic and unauthorized configuration changes. Implementations MUST support the SNMP security model defined in RFC 3411.
section: "8"
topics:
    - security
    - routing
