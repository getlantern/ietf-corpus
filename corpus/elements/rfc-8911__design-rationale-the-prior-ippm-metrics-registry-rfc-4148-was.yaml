document: rfc-8911
kind: design-rationale
summary: The prior IPPM Metrics Registry (RFC 4148) was obsoleted because it was insufficiently detailed to uniquely identify metrics — too much variability was possible in characterizing a metric exactly — and had very few users. The new registry imposes stricter registration criteria and a group of Performance Metrics Experts to prevent the same outcome.
section: "6"
topics:
