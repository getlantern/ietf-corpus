document: rfc-4419
kind: security-consideration
summary: The least significant bit of the private exponent can be recovered when the modulus is a safe prime (Menezes et al.). This is not a practical concern if the private exponent is sufficiently large; Waldvogel and Massey show that random exponents chosen from {0,...,p-2} have key entropy less than 2 bits below the maximum.
