document: rfc-8871
kind: normative-requirement
summary: The generated SRTP master salt for E2E encryption MUST be replaced with the salt value provided by the Key Distributor via the EKTKey message, because every endpoint in the conference uses the same SRTP master salt.
section: 4.5.1
rfc2119_level: MUST
