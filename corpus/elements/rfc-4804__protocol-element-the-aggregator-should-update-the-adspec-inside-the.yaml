document: rfc-4804
kind: protocol-element
summary: The Aggregator SHOULD update the ADSPEC inside the E2E Path message before forwarding to reflect the impact of the MPLS TE cloud on achievable QoS; this may be based on configured information, TE topology database, tunnel path, or RSVP-TE signaling data.
