document: rfc-1694
kind: wire-format
summary: The Header Extension Carrier Selection element must appear second in the Header Extension with Type=1, Length equal to 4, 6, or 8, and Value containing four BCD-encoded decimal digits specifying the Carrier Identification Code (CIC). A missing, mispositioned, or invalid-CIC element is counted as an error.
section: "4.6"
