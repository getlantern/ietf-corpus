document: rfc-2308
kind: normative-requirement
summary: A resolver MAY cache a server failure (SERVFAIL) response, but if it does so it MUST NOT cache it for longer than five minutes, and it MUST be cached against the specific query tuple <query name, type, class, server IP address>.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - dns
