document: rfc-6285
kind: security-consideration
summary: Because RAMS unicast bursts carry the same Reference Information (including potential encryption keys) as the multicast stream, the unicast session requires at least equivalent security protection as the multicast session. Implementations should ensure SRTP or equivalent confidentiality and integrity protections are applied to both the unicast burst RTP session and RTCP signaling messages.
section: "10"
topics:
    - security
    - rtp
    - crypto
