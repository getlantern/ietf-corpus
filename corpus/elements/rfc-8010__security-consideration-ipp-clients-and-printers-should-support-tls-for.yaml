document: rfc-8010
kind: security-consideration
summary: IPP Clients and Printers SHOULD support TLS for Server Authentication and Operation Privacy. Basic Authentication MAY be supported only over secure channels (HTTPS); IPP Clients and Printers SHOULD NOT support Basic Authentication over insecure channels.
section: 8.1.2
rfc2119_level: SHOULD
