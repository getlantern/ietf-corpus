document: rfc-4931
kind: normative-requirement
summary: A domain object MUST always have at least one status value. A client MUST NOT alter status values set by the server. When a pending action completes, the corresponding pending* status MUST be removed and all involved clients MUST be notified via a service message.
section: "2.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
