document: rfc-3894
kind: design-rationale
summary: 'The extension is motivated by the difficulty of generating Sieve code that correctly expresses "copy" semantics without it: such code grows unwieldy because it must track the state that the implicit "keep" would have had. The ":copy" parameter allows direct expression of copy semantics.'
