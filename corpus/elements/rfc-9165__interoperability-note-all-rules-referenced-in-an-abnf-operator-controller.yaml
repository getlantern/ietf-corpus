document: rfc-9165
kind: interoperability-note
summary: All rules referenced in an ABNF operator controller string must be defined within that string — there is no implicit import of core ABNF rules from RFC 5234 or other rule sets. Composition of shared rules must be done explicitly via .cat or .det.
section: "3"
topics:
