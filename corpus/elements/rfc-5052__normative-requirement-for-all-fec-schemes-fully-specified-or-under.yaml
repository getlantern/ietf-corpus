document: rfc-5052
kind: normative-requirement
summary: For all FEC schemes (Fully-Specified or Under-Specified), the type, semantics, and an encoding format for the FEC Payload ID and FEC Object Transmission Information MUST be defined, and a value for the FEC Encoding ID MUST be reserved and associated with these definitions.
section: "6.1"
rfc2119_level: MUST
topics:
