document: rfc-4051
kind: protocol-element
summary: 'RSA-MD5 SignatureMethod (URI: http://www.w3.org/2001/04/xmldsig-more#rsa-md5) uses PKCS#1 v1.5 padding. The SignatureValue is base64-encoded and the padded structure is: 01 | FF* | 00 | ASN.1 prefix | MD5 hash.'
