document: rfc-5798
kind: design-rationale
summary: IPv4 and IPv6 virtual router instances are independent domains within a VRRP router; the same VRID number may be reused for both address families on the same LAN because they are treated as two separate virtual routers. This avoids cross-family interference.
section: "3"
topics:
