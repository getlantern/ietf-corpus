summary: The AS number pool is expanded from 0–65535 (2-octet) to 0–4294967295 (4-octet) under the IANA 'Autonomous System Numbers' registry. Capability Code 65 is assigned for Four-octet AS Number Capability. AS4_PATH is assigned type code 17, AS4_AGGREGATOR type code 18, and AS_TRANS is assigned AS number 23456.
