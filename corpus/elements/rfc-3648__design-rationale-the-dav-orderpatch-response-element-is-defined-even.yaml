document: rfc-3648
kind: design-rationale
summary: The DAV:orderpatch-response element is defined even though this document defines no child elements for it. This ensures interoperability between future extensions that do define elements for the ORDERPATCH response body, allowing extensibility without breaking existing clients.
section: "7"
topics:
