document: rfc-3162
kind: protocol-element
summary: Login-IPv6-Host (Type 98) indicates the system to connect the user to when Login-Service is included. The all-ones value (0xFFFF...FFFF) means the NAS SHOULD allow the user to select a host; the zero value means the NAS SHOULD select a host.
