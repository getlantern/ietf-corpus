document: rfc-9154
kind: normative-requirement
summary: The losing registrar MUST NOT store the authorization information, and the gaining registrar MUST only store it as a transient value during the transfer process; it MUST NOT be stored after the transfer process ends.
section: "4.3"
rfc2119_level: MUST NOT
topics:
