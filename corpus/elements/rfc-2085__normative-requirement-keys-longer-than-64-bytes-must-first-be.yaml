document: rfc-2085
kind: normative-requirement
summary: Keys longer than 64 bytes MUST first be hashed using MD5; the resulting hash is then used to calculate the authentication data. This applies both to AH key setup and during the HMAC-MD5 computation.
section: "1.2"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
