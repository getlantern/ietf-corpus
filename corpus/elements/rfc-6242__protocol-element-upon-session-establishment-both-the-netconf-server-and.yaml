document: rfc-6242
kind: protocol-element
summary: Upon session establishment, both the NETCONF server and client send an XML <hello> element listing capabilities. The server's <hello> includes a <session-id>; both sides may send simultaneously. The <hello> exchange determines which framing mechanism is used for the remainder of the session.
section: "3.1"
topics:
    - netconf
