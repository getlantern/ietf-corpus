document: rfc-1629
kind: design-rationale
summary: Subscriber routing domains should obtain NSAP prefixes from their direct service provider rather than from independent administrative authorities such as GSA or ANSI. Provider-assigned prefixes allow the provider to advertise a single aggregated prefix to other providers, avoiding per-subscriber routing table entries at every other provider worldwide.
section: 5.3.1
topics:
    - routing
