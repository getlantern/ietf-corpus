document: rfc-5655
kind: protocol-element
summary: An IPFIX File is a serialized sequence of IPFIX Messages stored to a filesystem. A typical file begins with one IPFIX Message containing Options Template Sets and Template Sets, followed by one or more messages containing Data Sets with the actual flow records.
