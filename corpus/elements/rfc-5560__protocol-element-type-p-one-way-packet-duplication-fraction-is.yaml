document: rfc-5560
kind: protocol-element
summary: Type-P-one-way-packet-duplication-fraction is a statistic giving the fraction of additional packets that arrived in a stream, computed as (sum of arrival counts / number of non-lost packets) - 1, expressible as a percentage. It is equivalent to ITU-T Y.1540 IPDR.
section: "5.1"
topics:
    - measurement
