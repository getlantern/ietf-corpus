document: rfc-9290
kind: security-consideration
summary: All security and privacy considerations from RFC 7807 Section 5 apply in full, including care when defining new detail entries and when generating a Concise Problem Details data item not to leak sensitive information. Entities storing or forwarding data items must consider whether doing so transfers sensitive information outside the context where access was acceptable.
section: "5"
topics:
    - security
    - privacy
