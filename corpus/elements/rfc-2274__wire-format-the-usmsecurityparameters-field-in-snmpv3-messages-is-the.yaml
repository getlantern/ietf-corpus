document: rfc-2274
kind: wire-format
summary: 'The UsmSecurityParameters field in SNMPv3 messages is the BER serialization of an ASN.1 SEQUENCE with six fields: msgAuthoritativeEngineID (OCTET STRING), msgAuthoritativeEngineBoots (INTEGER 0..2147483647), msgAuthoritativeEngineTime (INTEGER 0..2147483647), msgUserName (OCTET STRING SIZE 1..32), msgAuthenticationParameters (OCTET STRING), and msgPrivacyParameters (OCTET STRING). This structure is encoded as the msgSecurityParameters field value.'
section: "2.4"
