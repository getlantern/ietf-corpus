document: rfc-8968
kind: normative-requirement
summary: 'Nodes use mutual authentication: clients MUST authenticate servers and servers MUST authenticate clients. Implementations MUST support authenticating peers against a local store of credentials. If either node fails to authenticate its peer, it MUST abort the DTLS handshake.'
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
