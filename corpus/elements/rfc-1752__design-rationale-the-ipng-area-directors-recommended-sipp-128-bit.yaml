document: rfc-1752
kind: design-rationale
summary: The IPng Area Directors recommended SIPP (128-bit version, 'Simple Internet Protocol Plus') as the basis for IPng after evaluating CATNIP, SIPP, and TUBA. CATNIP was incomplete; TUBA's CLNP ownership was disputed; SIPP's revised 128-bit proposal resolved the prior concerns about 64-bit addressing and the fatally flawed IPAE transition plan.
