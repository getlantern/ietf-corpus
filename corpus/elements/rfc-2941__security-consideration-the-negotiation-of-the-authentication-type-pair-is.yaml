document: rfc-2941
kind: security-consideration
summary: The negotiation of the authentication type pair is not integrity-protected, allowing an active attacker to force selection of the weakest mutually acceptable authentication mechanism (e.g., downgrade from a strong to a 40-bit mechanism). Implementations should only accept mechanisms they trust as secure.
section: "9"
topics:
    - security
    - crypto
