document: rfc-8723
kind: wire-format
summary: 'The OHB Config octet has the bit layout R R R R B M P Q: P indicates PT is present, Q indicates SEQ is present, M indicates the marker bit is present, B carries the original marker bit value, and R bits are reserved. The masked value C & 0x0C MUST NOT be 0x80 when M=0.'
