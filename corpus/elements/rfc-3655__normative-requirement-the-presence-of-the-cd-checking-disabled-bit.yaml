document: rfc-3655
kind: normative-requirement
summary: The presence of the CD (Checking Disabled) bit in a query does not affect the setting of the AD bit; if CD is set, the server will not perform checking but SHOULD still set AD if data has already been cryptographically verified or complies with local policy.
section: "2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
