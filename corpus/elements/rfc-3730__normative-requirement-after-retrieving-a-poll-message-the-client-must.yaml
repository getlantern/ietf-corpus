document: rfc-3730
kind: normative-requirement
summary: After retrieving a <poll> message, the client MUST acknowledge it with op='ack'; the server MUST dequeue the message and decrement the counter after receiving acknowledgement. Service messages MUST be created for all clients affected by an action, including both parties in a transfer.
section: 2.9.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
