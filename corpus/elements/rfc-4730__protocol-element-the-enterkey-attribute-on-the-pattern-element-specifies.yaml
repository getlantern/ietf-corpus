document: rfc-4730
kind: protocol-element
summary: The 'enterkey' attribute on the <pattern> element specifies a key sequence (e.g., '#') that immediately terminates pattern matching. If the user presses the enterkey after a partial match, KPML reports status code 402 (User Terminated without Match). The enterkey is a string and may be a multi-key sequence such as '**'.
section: "3.3"
topics:
    - sip
    - realtime
