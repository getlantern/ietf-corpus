document: rfc-5575
kind: security-consideration
summary: The security model depends on restricting flow specifications to match corresponding unicast routing paths; when this constraint holds, the security properties are equivalent to BGP unicast routing. A neighboring AS that advertises flow specs without corresponding unicast routing could cause denial-of-service by filtering legitimate traffic.
section: "10"
topics:
    - security
    - bgp
    - routing
