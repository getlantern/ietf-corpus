document: rfc-3898
kind: protocol-element
summary: OPTION_NISP_DOMAIN_NAME (option code 30) is used by the DHCPv6 server to convey the client's NIS+ domain name. The nisp-domain-name field is variable length and encoded per DHCPv6 domain name representation rules.
