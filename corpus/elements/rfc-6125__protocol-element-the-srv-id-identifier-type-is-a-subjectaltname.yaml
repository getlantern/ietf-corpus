document: rfc-6125
kind: protocol-element
summary: The SRV-ID identifier type is a subjectAltName entry of type otherName with name form SRVName (per RFC 4985). It encodes both an application service type (e.g., 'imaps') and a DNS domain name (e.g., 'example.net'), making it restricted to a single application service type. It can represent either a direct or indirect (DNS-SRV-derived) name.
section: "2.1"
topics:
