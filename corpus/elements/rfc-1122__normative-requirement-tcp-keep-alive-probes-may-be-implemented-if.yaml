document: rfc-1122
kind: normative-requirement
summary: TCP keep-alive probes MAY be implemented; if present, they MUST be configurable per connection, MUST default to off, and the probe interval MUST default to no less than two hours. Keep-alive probes MUST NOT be sent with data.
section: 4.2.3.6
rfc2119_level: MAY
topics:
    - tcp
