document: rfc-9161
kind: security-consideration
summary: Proxy ARP/ND flood reduction protects 'slow path' software processors in routers and Tenant Systems in large BDs from being overwhelmed by ARP/ND traffic. Suppression of unknown ARP Requests and NS messages (Section 3.6) provides additional protection against requests targeting non-existing hosts.
