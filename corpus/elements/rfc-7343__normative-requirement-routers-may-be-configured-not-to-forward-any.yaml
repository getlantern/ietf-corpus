document: rfc-7343
kind: normative-requirement
summary: Routers MAY be configured not to forward any packets containing an ORCHID as a source or destination address. If the destination is an ORCHID but the source is a valid unicast address, routers MAY be configured to generate an ICMP Destination Unreachable, Administratively Prohibited message.
section: "3"
rfc2119_level: MAY
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
