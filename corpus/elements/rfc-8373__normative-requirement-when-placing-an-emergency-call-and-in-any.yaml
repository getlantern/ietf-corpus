document: rfc-8373
kind: normative-requirement
summary: When placing an emergency call, and in any other case where language cannot be inferred from context, each OFFERed media stream primarily intended for human language communication SHOULD specify the 'hlang-send' and/or 'hlang-recv' attributes for the intended interactive direction(s).
section: "5.1"
rfc2119_level: SHOULD
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
