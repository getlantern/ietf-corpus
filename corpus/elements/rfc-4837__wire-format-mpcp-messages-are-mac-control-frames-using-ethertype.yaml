document: rfc-4837
kind: wire-format
summary: MPCP messages are MAC Control frames using Ethertype 0x8808 and are not forwarded beyond the MAC. Each MPCP message carries a timestamp (set by the OLT, synchronized network-wide) used for TDM scheduling and RTT measurement.
section: 2.2.6
