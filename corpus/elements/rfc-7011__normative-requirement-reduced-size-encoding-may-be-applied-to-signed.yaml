document: rfc-7011
kind: normative-requirement
summary: Reduced-size encoding MAY be applied to signed, unsigned, and float integer types, allowing export with fewer octets than the information model maximum. The signed/unsigned property MUST be preserved, and only leading zeroes may be dropped. Reduced-size encoding MUST NOT be applied to types with internal structure or restricted ranges (e.g., ipv4Address, dateTimeMicroseconds, dateTimeMilliseconds).
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
