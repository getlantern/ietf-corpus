document: rfc-9568
kind: normative-requirement
summary: A receiver SHOULD verify that the Max Advertise Interval in received VRRP packets matches the locally configured Advertisement_Interval for the VRID. Mismatched intervals can cause instability; failures SHOULD be logged with rate-limiting.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
