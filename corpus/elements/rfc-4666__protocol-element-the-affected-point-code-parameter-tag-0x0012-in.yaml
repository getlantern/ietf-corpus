document: rfc-4666
kind: protocol-element
summary: The Affected Point Code parameter (Tag 0x0012) in SSNM messages encodes a list of destination point codes as 32-bit fields each consisting of an 8-bit Mask followed by a 24-bit Point Code value. Point Codes less than 24 bits (e.g., ITU 14-bit) are left-padded to the 24-bit boundary. The Mask field enables aggregate addressing of multiple Point Codes.
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
