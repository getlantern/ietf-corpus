document: rfc-2381
kind: protocol-element
summary: 'The GS worst-case delay formula is: delay <= b_r/R + C_TOT/R + D_TOT + MPL. C and D are Adspec parameters accumulated by addition along the path; MPL includes propagation delay; b_r/R accounts for source bursts; R is the receiver-requested service rate.'
section: "3.3"
