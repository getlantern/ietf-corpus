document: rfc-6773
kind: interoperability-note
summary: DCCP-UDP supports the syntax of partial checksums and negotiation of the Minimum Checksum Coverage feature, but the UDP checksum always covers the entire DCCP datagram and the DCCP checksum is ignored. Applications enabling partial checksums will receive a service functionally identical to full DCCP checksum coverage.
section: 3.3.1
topics:
    - nat
    - udp
