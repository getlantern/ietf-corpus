document: rfc-2097
kind: wire-format
summary: The Multicast-Filtering Configuration Option has Type (1 octet, value 3), Length (1 octet, value 5), Multicast-Forward-Period (2 octets, 16-bit unsigned, max 60 seconds, 0 = no limit, 0xFFFF = unknown), and Priority (1 octet, 0 = directed packets have priority, 1 = multicast packets have priority).
