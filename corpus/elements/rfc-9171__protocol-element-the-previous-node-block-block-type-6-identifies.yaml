document: rfc-9171
kind: protocol-element
summary: The Previous Node Block (block type 6) identifies the node that most recently forwarded the bundle. If the local node is the source, the bundle MUST NOT contain a Previous Node Block. Otherwise, the bundle SHOULD contain exactly one. During forwarding, an existing Previous Node Block MUST be removed and, if configured, a new one inserted with the forwarding node's ID.
section: 4.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
