document: rfc-3471
kind: design-rationale
summary: Bidirectional LSPs are introduced because establishing two independent unidirectional LSPs for non-PSC technologies doubles control overhead, increases setup latency to one round-trip plus one transit delay, risks resource contention, and complicates SONET/SDH protection switching that relies on bidirectional hop-by-hop paths.
