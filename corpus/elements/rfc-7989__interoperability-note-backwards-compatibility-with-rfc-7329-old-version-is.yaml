document: rfc-7989
kind: interoperability-note
summary: 'Backwards compatibility with RFC 7329 (''old'' version) is determined by the presence or absence of the ''remote-uuid'' parameter: a request with a ''remote-uuid'' comes from a standard (new) implementation; one without it comes from a pre-standard (old) implementation and MUST be handled by preserving UUID order throughout the dialog.'
section: "11"
topics:
