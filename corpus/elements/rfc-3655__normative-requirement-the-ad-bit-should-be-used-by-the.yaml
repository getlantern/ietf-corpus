document: rfc-3655
kind: normative-requirement
summary: The AD bit SHOULD be used by the local resolver if and only if it has been explicitly configured to trust the remote resolver; it SHOULD be ignored when the recursive name server is not trusted.
section: "1.1"
rfc2119_level: SHOULD
topics:
    - dns
    - security
