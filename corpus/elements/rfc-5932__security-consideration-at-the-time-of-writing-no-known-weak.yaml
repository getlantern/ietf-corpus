summary: At the time of writing, no known weak keys exist for Camellia and no security problems have been found, as evaluated by NESSIE, CRYPTREC, and independent cryptanalysis research. Security issues in TLS more broadly are discussed in RFC 5246 Appendices D, E, and F.
