document: rfc-8800
kind: wire-format
summary: The DISJOINTNESS-STATUS TLV (Type=47) uses the same format as the DISJOINTNESS-CONFIGURATION TLV. The L, N, and S flags indicate whether the computed paths meet the respective disjointness criterion. The T flag has no meaning in the STATUS TLV and MUST NOT be set on sending and MUST be ignored on receipt.
section: "5.2"
topics:
    - routing
    - mpls
