document: rfc-2125
kind: security-consideration
summary: RFC 2125 explicitly states that security issues are not discussed in this memo. BAP/BACP define no authentication, integrity protection, or confidentiality for bandwidth control messages, leaving them vulnerable to spoofing on shared media.
section: Security Considerations
