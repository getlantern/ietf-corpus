document: rfc-9360
kind: interoperability-note
summary: The 'x5bag' and 'x5chain' header parameters may be placed in either the protected or unprotected header bucket since their contents are treated as untrusted input regardless. Placing them in the unprotected header allows intermediaries to add or remove certificates.
section: "2"
topics:
