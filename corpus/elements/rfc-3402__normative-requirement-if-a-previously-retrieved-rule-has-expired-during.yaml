document: rfc-3402
kind: normative-requirement
summary: If a previously retrieved Rule has expired during algorithm execution, the application MUST start over at Step 1. Any attempt to optimize by reusing previous keys and Rules must ensure no previously retrieved Rule has expired.
section: "3.3"
rfc2119_level: MUST
