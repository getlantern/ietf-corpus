document: rfc-8513
kind: protocol-element
summary: The 'v6-v4-dscp-preservation' leaf (type boolean) instructs the AFTR or B4 to copy DSCP values between IPv4 and IPv6 headers during encapsulation/decapsulation, implementing the uniform DSCP model recommended in RFC 6908 Section 2.10.
