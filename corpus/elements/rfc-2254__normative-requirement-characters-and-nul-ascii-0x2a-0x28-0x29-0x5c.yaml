document: rfc-2254
kind: normative-requirement
summary: Characters *, (, ), \, and NUL (ASCII 0x2a, 0x28, 0x29, 0x5c, 0x00) MUST be encoded as a backslash '\' followed by the two hexadecimal digits representing the character's ASCII value when they appear in a filter value.
