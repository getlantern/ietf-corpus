document: rfc-4695
kind: normative-requirement
summary: A receiver MUST process the first received packet in a stream as if it were a packet that ends a loss event. Upon exiting a session, a receiver MUST ensure that the rendered MIDI performance does not end with indefinite artifacts.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
