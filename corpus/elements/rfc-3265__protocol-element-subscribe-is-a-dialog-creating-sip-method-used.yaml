document: rfc-3265
kind: protocol-element
summary: SUBSCRIBE is a dialog-creating SIP method used to request current state and state updates from a remote node. Subscriptions expire and must be refreshed via subsequent SUBSCRIBE messages on the same dialog; a SUBSCRIBE with Expires of 0 constitutes an unsubscribe and also triggers a state fetch.
section: "3.1"
topics:
    - sip
    - realtime
