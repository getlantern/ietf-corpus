document: rfc-4361
kind: interoperability-note
summary: Multi-stage network booting (e.g., PXE loader followed by OS DHCP client) may present different client identifiers at each stage, causing the DHCPv4 server to allocate separate IP addresses. Boot loaders should request short leases and send DHCPRELEASE before handing off.
section: "7"
