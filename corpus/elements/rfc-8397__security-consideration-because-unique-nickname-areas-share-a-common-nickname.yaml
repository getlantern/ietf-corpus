document: rfc-8397
kind: security-consideration
summary: Because unique nickname areas share a common nickname space, border RBridges must leak nickname information between levels, meaning nickname-related events or attacks in one area can affect other areas—unlike pure IS-IS multilevel where link-state flooding is automatically confined.
