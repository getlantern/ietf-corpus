document: rfc-5444
kind: design-rationale
summary: Address aggregation via Head:Mid:Tail decomposition was chosen because MANETs typically run over limited-capacity wireless links and are less tolerant of wasted octets; aggregating addresses with common prefixes or suffixes (e.g., IPv6 interface identifiers) significantly reduces per-packet overhead.
section: "3"
topics:
    - routing
