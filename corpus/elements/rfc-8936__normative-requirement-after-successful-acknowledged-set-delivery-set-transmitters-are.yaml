document: rfc-8936
kind: normative-requirement
summary: After successful (acknowledged) SET delivery, SET Transmitters are not required to retain or record SETs for retransmission. Once a SET is acknowledged, the SET Recipient SHALL be responsible for retention, if needed.
section: "2"
rfc2119_level: SHALL
topics:
