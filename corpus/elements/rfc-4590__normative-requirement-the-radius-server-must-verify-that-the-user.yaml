document: rfc-4590
kind: normative-requirement
summary: The RADIUS server MUST verify that the user identified by User-Name is authorized to access the protection space and, if SIP-AOR is present, authorized to use the URI in SIP-AOR. Either failure MUST result in an Access-Reject.
section: 2.2.2
rfc2119_level: MUST
topics:
    - radius
    - security
    - sip
