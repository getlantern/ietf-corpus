document: rfc-9390
kind: wire-format
summary: The Session-Group-Capability-Vector AVP (AVP Code 675) is of type Unsigned32 and contains a 32-bit capability flag field. The single defined flag BASE_SESSION_GROUP_CAPABILITY (0x00000001) indicates support for session grouping and group operations per this specification.
