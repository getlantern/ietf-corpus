document: rfc-4077
kind: protocol-element
summary: The 'PC of failed instruction' is a 2-byte field encoded in network (big-endian) byte order, containing the UDVM program counter value at the time of failure. If failure occurred before the UDVM began executing any code, this field is set to 0.
section: "3.1"
extracted_by: claude-sonnet-4-6
