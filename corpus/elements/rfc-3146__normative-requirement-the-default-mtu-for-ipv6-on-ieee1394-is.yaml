document: rfc-3146
kind: normative-requirement
summary: The default MTU for IPv6 on IEEE1394 is 1500 octets. If a Router Advertisement MTU option specifies a value larger than 1500 (or larger than a manually configured value), it MAY be logged but MUST otherwise be ignored.
section: "4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
