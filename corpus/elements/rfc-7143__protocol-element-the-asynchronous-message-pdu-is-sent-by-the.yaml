document: rfc-7143
kind: protocol-element
summary: 'The Asynchronous Message PDU is sent by the target to notify the initiator of events without a corresponding request. The AsyncEvent field specifies event type: SCSI Async Event (0), Request Logout (1), Drop Connection (2), Drop All Connections (3), Negotiate Parameters (4), and vendor-specific (240–255). AsyncVCode provides a vendor-specific code for vendor events.'
section: "11.9"
topics:
