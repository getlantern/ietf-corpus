document: rfc-7611
kind: interoperability-note
summary: ACCEPT_OWN applies to VPN routes with a SAFI of 128 (and analogous constructs). In address families where the source VRF cannot be identified by Route Distinguisher inspection, the community must be discarded rather than acted upon.
