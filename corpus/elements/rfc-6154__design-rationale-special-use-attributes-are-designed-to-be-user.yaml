document: rfc-6154
kind: design-rationale
summary: Special-use attributes are designed to be user-specific rather than mailbox-specific. A mailbox shared between users Adam and Barb would not automatically serve as both users' \Sent mailbox; each user independently designates which mailbox carries a given special use for them.
section: "2"
topics:
