document: rfc-8480
kind: wire-format
summary: 'All 6P messages share a common 4-octet header: Version (4 bits), Type/T (2 bits), Reserved/R (2 bits), Code (8 bits), SFID (8 bits), and SeqNum (8 bits), carried little-endian inside an 802.15.4 Payload IE with Group ID set to the IETF IE value.'
section: 3.2.2
