document: rfc-7477
kind: protocol-element
summary: The SOA Serial field in the CSYNC record is a 32-bit copy of the child zone's SOA serial number. When the soaminimum flag is set, parental agents MUST NOT act on data from zones with a SOA serial less than this value; if the flag is unset, the field MUST be ignored.
section: 2.1.1.1
topics:
    - dns
