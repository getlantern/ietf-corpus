document: rfc-4253
kind: design-rationale
summary: SSH maintains its own group identifier space logically distinct from Oakley and IKE. The name 'diffie-hellman-group1-sha1' uses 'group1' despite specifying Oakley Group 2. Implementations should treat these names as opaque identifiers and not assume any relationship to IKE groups.
section: "6.5"
topics:
    - security
    - crypto
