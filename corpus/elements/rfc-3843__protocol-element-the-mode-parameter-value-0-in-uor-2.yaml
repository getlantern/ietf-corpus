document: rfc-3843
kind: protocol-element
summary: The Mode parameter value 0 in UOR-2, IR, and IR-DYN packets is redefined for profile 0x0004 to mean 'Cancel Mode Transition' (C), allowing the compressor to decline a mode transition requested by the decompressor, rather than the mode-0 meaning used in RFC 3095.
section: "3.4"
topics:
    - ip
