document: rfc-3922
kind: normative-requirement
summary: If an XMPP <priority/> element has a negative value, the gateway MUST NOT map it to a PIDF priority attribute. When mapping, XMPP priority 0 SHOULD map to PIDF priority='0' and XMPP priority 127 SHOULD map to PIDF priority='1', with intermediate values mapped uniquely.
section: 5.1.7
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
