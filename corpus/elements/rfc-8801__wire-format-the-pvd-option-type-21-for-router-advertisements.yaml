document: rfc-8801
kind: wire-format
summary: 'The PvD Option (Type 21) for Router Advertisements contains: Type (8 bits), Length (8 bits in units of 8 octets), H/L/R flags (1 bit each), Reserved (9 bits), Delay (4 bits), Sequence Number (16 bits), PvD ID FQDN encoded in DNS format (RFC 1035 Section 3.1), padding to next 8-octet boundary, an optional RA message header (16 octets when R-flag set), and zero or more encapsulated RA options.'
section: "3.1"
topics:
