document: rfc-9374
kind: design-rationale
summary: HHITs provide statistical uniqueness through second-preimage resistance combined with a mandatory registration process, which together enforce global uniqueness. This contrasts with UUIDs or X.509 subject names, where the same identifier can legitimately appear in multiple certificate authorities with no mechanism to enforce uniqueness of ownership.
section: "1.1"
topics:
