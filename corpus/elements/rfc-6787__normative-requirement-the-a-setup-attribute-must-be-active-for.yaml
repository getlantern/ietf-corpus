document: rfc-6787
kind: normative-requirement
summary: The a=setup attribute MUST be 'active' for the SDP offer from the client and MUST be 'passive' for the answer from the MRCPv2 server, per RFC 4145 for TCP and RFC 4572 for TLS. The a=connection attribute MUST have value 'new' on the very first control 'm=' line offer.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
