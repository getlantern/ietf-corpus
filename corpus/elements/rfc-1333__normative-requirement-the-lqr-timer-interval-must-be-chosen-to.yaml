document: rfc-1333
kind: normative-requirement
summary: The LQR timer interval MUST be chosen to be long enough for a good smoothing effect on the data, while short enough to ensure fast enough response to complete failure. The maximum interval SHOULD be chosen to minimally interfere with active traffic.
section: "2.9"
rfc2119_level: MUST
