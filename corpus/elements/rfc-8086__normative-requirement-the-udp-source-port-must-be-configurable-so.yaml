document: rfc-8086
kind: normative-requirement
summary: The UDP source port MUST be configurable so that a single value can be set for all traffic within the tunnel, disabling entropy. When a single value is set, a random ephemeral port SHOULD be selected to minimize vulnerability to off-path attacks.
section: 2.1.1
rfc2119_level: MUST
topics:
    - udp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
