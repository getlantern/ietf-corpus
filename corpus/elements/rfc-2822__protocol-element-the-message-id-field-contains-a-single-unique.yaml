document: rfc-2822
kind: protocol-element
summary: The 'Message-ID:' field contains a single unique message identifier with syntax `"<" id-left "@" id-right ">"`. Every message SHOULD have a 'Message-ID:' field. Subsequent revisions of a message must receive new message identifiers.
section: 3.6.4
