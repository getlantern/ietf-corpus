document: rfc-6463
kind: normative-requirement
summary: The rfLMA MUST only assign a MAG to an r2LMA with which it knows the MAG has an existing SA or can establish one dynamically; the rfLMA MUST NOT assign the MAG to an r2LMA lacking a prior agreement and trust relationship, and MUST NOT change the transport IP address family during the assignment.
section: "5.3"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
