document: rfc-4467
kind: wire-format
summary: The full URLAUTH URL grammar requires 'imap://' followed by enc-user, optional iauth, '@', hostport, '/', imessagepart, and iurlauth. The iurlauth component is composed as iurlauth-rump ':' mechanism ':' enc-urlauth, where enc-urlauth is at least 32 hex digits.
