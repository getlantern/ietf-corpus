document: rfc-5988
kind: interoperability-note
summary: In HTML4, the combination of 'alternate' and 'stylesheet' relation types in the same link has special meaning and should be serialised in a Link header as a single rel value with both types (e.g., rel="alternate stylesheet") to preserve this relationship.
section: A
topics:
    - http
