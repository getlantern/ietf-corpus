document: rfc-8139
kind: wire-format
summary: 'The AppointmentList APPsub-TLV (type 18) encodes a list of individual VLAN appointments: 2-byte Appointee Nickname followed by k entries of 2 bytes each (4-bit RESV + 12-bit VLAN ID). Length = 2 + 2*k; corrupt (odd Length) APPsub-TLVs MUST be ignored.'
section: "10.3"
topics:
