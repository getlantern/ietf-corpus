document: rfc-5230
kind: normative-requirement
summary: 'Implementations MUST convert the :subject string to RFC 2047 encoded words if and only if non-ASCII characters are present, and MUST generate an appropriate default subject (e.g., "Auto: " followed by the original subject) when no :subject parameter is supplied.'
section: "4.3"
rfc2119_level: MUST
