document: rfc-5267
kind: design-rationale
summary: UPDATE notifies about all changes to the full matching set regardless of other return options (e.g., MIN, MAX, PARTIAL); this simplifies the server contract at the cost of clients potentially receiving notifications for messages outside their current window of interest.
section: "4.3"
topics:
    - email
