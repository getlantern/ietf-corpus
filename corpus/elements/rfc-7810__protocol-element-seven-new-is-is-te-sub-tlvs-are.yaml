document: rfc-7810
kind: protocol-element
summary: 'Seven new IS-IS TE sub-TLVs are defined for distributing network-performance information: Unidirectional Link Delay (33), Min/Max Unidirectional Link Delay (34), Unidirectional Delay Variation (35), Unidirectional Link Loss (36), Unidirectional Residual Bandwidth (37), Unidirectional Available Bandwidth (38), and Unidirectional Utilized Bandwidth (39). These are registered in the ''Sub-TLVs for TLVs 22, 23, 141, 222, and 223'' registry.'
