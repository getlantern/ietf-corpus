document: rfc-4001
kind: wire-format
summary: InetAddressDNS represents a DNS domain name as an OCTET STRING of SIZE (1..255). The name SHOULD be fully qualified whenever possible, and the DESCRIPTION clause of objects using this convention MUST fully describe how and when names are resolved to IP addresses.
section: "3"
topics:
