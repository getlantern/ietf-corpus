document: rfc-1288
kind: wire-format
summary: The Finger query is a single line conforming to {Q1} ::= [{W}|{W}{S}{U}]{C} for direct queries, or {Q2} ::= [{W}{S}][{U}]{H}{C} for forwarded queries, where {U} is a username, {H} is @hostname (recursive), {W} is /W, {S} is one or more spaces, and {C} is CRLF.
section: "2.3"
