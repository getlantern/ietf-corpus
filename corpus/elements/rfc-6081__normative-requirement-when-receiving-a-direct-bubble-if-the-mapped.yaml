document: rfc-6081
kind: normative-requirement
summary: When receiving a direct bubble, if the mapped address/port does not match the address embedded in the source Teredo IPv6 address but the bubble contains a Nonce Trailer whose nonce matches the Nonce Sent field for that peer, the direct bubble MUST be accepted. Otherwise it MUST be dropped.
section: 5.2.4.4
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
