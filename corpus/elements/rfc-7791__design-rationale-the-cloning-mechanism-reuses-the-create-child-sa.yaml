document: rfc-7791
kind: design-rationale
summary: The cloning mechanism reuses the CREATE_CHILD_SA/IKE SA rekey exchange with an additional CLONE_IKE_SA notification rather than introducing a new exchange type. This minimizes changes to existing IKEv2 implementations.
