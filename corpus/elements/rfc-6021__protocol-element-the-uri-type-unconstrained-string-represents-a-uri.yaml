document: rfc-6021
kind: protocol-element
summary: The uri type (unconstrained string) represents a URI per STD 66 (RFC 3986). Objects using this type MUST be in US-ASCII encoding and MUST be normalized per RFC 3986 sections 6.2.1, 6.2.2.1, and 6.2.2.2. A zero-length URI is not valid and may represent 'URI absent'.
section: "4"
