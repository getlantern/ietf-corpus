document: rfc-8572
kind: normative-requirement
summary: Implementations MUST limit the maximum number of recursive redirects; the limit SHOULD be no more than ten. Redirect information can only redirect devices to bootstrap servers, so each redirect re-enters the processing algorithm with a bootstrap server as the source.
section: "5.3"
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
