document: rfc-8227
kind: normative-requirement
summary: When multiple Manual Switch (MS) RPS requests exist simultaneously addressing different links and no higher-priority request is on the ring, no switch SHOULD be executed and existing switches MUST be dropped. LP, FS, SF, and FS+SF pairs are allowed to coexist; multiple EXER requests MUST also be allowed to coexist.
section: 5.2.3.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
