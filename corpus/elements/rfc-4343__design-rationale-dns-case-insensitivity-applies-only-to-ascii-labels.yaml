document: rfc-4343
kind: design-rationale
summary: DNS case insensitivity applies only to ASCII labels (label type 0x0). Extended label types such as the BINARY type defined in RFC 2673 are not subject to ASCII case insensitivity conventions, because those conventions are specific to ASCII labels.
section: "3.2"
topics:
    - dns
