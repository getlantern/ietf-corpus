document: rfc-5888
kind: normative-requirement
summary: A SIP entity that receives an offer with an 'a=group' line with semantics it does not understand MUST return an answer without the 'group' line, but 'mid' lines MUST still be present. A SIP entity that understands the semantics MUST return an answer containing an 'a=group' line with the same semantics.
section: "9.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
