document: rfc-7580
kind: interoperability-note
summary: Existing management tools and MIB modules (RFC 6825) do not yet handle the additional TE parameters defined in this document. Augmentation of the MIB or development of a YANG module in TEAS would be needed to read or exchange the new connectivity matrix and port label restriction information.
