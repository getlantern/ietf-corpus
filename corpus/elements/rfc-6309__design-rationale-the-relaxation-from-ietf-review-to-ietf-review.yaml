document: rfc-6309
kind: design-rationale
summary: The relaxation from 'IETF Review' to 'IETF Review or IESG Approval' was motivated by scenarios where allocations under special circumstances are warranted and by recognition that 'IETF Review' was unnecessarily strict for some namespaces. IESG Approval allows consideration of requests (e.g., experimental extensions) without requiring full IETF consensus.
