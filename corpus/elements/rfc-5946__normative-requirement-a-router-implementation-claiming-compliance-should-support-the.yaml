document: rfc-5946
kind: normative-requirement
summary: A router implementation claiming compliance SHOULD support the dynamic discovery of downstream RSVP functionality method defined in Section 4.1. When generating a proxy Resv message upstream, a supporting Receiver Proxy MUST forward the Path message downstream instead of terminating it.
section: "4.1"
rfc2119_level: SHOULD
topics:
