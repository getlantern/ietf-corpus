document: rfc-5092
kind: protocol-element
summary: 'URLAUTH access identifiers: ''submit+<userid>'' restricts use to an authorized message submission entity acting on behalf of that userid; ''user+<userid>'' restricts to IMAP sessions logged in as that userid; ''authuser'' restricts to any authenticated non-anonymous user; ''anonymous'' permits any session including anonymous.'
section: 6.1.2
topics:
    - email
    - security
