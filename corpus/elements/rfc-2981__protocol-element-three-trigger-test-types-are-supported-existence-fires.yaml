document: rfc-2981
kind: protocol-element
summary: 'Three trigger test types are supported: ''existence'' fires when the monitored object appears, vanishes, or changes value; ''boolean'' fires when a comparison test against a configured value is true; ''threshold'' fires when sampled values cross rising or falling thresholds. These are specified as a BITS field in mteTriggerTest.'
