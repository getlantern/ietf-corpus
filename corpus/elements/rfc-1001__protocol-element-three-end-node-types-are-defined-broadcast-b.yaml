document: rfc-1001
kind: protocol-element
summary: 'Three end-node types are defined: Broadcast (B) nodes use UDP broadcast and TCP for name and datagram operations; Point-to-point (P) nodes use only directed UDP and TCP, relying on NBNS and NBDD servers; Mixed mode (M) nodes combine B and P behaviors, broadcasting first then falling back to NBNS.'
