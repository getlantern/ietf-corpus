document: rfc-4331
kind: normative-requirement
summary: For resources with no enforced quota or unlimited storage, the server MAY omit DAV:quota-available-bytes (returning 404 in Multi-Status), though the specification RECOMMENDS returning an appropriate value such as available disk space.
section: "3"
rfc2119_level: MAY
