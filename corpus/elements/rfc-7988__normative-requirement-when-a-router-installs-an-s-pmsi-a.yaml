document: rfc-7988
kind: normative-requirement
summary: When a router installs an S-PMSI A-D route after the corresponding Leaf A-D route is already installed and the Leaf A-D route's RT still identifies that router, it MUST apply the same procedures it would have followed had the S-PMSI A-D route been installed first. Implementers MUST NOT assume events occur in the expected order.
section: "9"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
