document: rfc-7856
kind: interoperability-note
summary: tunnelIfAddressType in the IP Tunnel MIB is identical to swmEncapsIIPDstType in the Softwire Mesh MIB. When swmEncapsEIPDstType is IPv6 and swmEncapsIIPDstType is IPv4, the tunnel is IPv6-over-IPv4; when reversed, it is IPv4-over-IPv6.
section: "5.2"
topics:
    - snmp
    - vpn
    - ip
