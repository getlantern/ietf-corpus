document: rfc-2241
kind: design-rationale
summary: NDS tree names and context strings are encoded using UTF-8 rather than a fixed encoding to support the full 16-bit Unicode character set used by NDS, while keeping compatibility with ASCII-only implementations that can use the ASCII text as-is.
