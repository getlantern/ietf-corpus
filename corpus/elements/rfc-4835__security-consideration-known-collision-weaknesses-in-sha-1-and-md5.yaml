document: rfc-4835
kind: security-consideration
summary: Known collision weaknesses in SHA-1 and MD5 do not affect their use within HMAC constructions (HMAC-SHA1-96 and HMAC-MD5-96), but implementations should track cryptographic developments as these algorithms may be further weakened.
