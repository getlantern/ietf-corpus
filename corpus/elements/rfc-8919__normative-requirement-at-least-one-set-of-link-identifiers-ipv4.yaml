document: rfc-8919
kind: normative-requirement
summary: At least one set of link identifiers (IPv4, IPv6, or Link Local/Remote) MUST be present in the Application-Specific SRLG TLV. Multiple occurrences of the same identifier type MUST NOT be present. TLVs not meeting this requirement MUST be ignored.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
