document: rfc-2617
kind: normative-requirement
summary: The cnonce directive MUST be specified in the Authorization header if a qop directive was sent by the server, and MUST NOT be specified if the server did not send a qop directive. Likewise, nonce-count (nc) MUST be present if and only if qop is present.
section: 3.2.2
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
