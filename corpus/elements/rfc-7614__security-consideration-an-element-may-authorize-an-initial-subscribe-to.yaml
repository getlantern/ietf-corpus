document: rfc-7614
kind: security-consideration
summary: 'An element may authorize an initial SUBSCRIBE to ''refer'' event state based solely on the Request-URI matching an existing Refer-Events-At URI. Because URI possession is often the only authorization requirement, the URI must be hard to guess and protected against eavesdropping (e.g., transmitted over TLS/DTLS or using a sips: URI).'
section: "8"
topics:
    - sip
    - realtime
    - security
