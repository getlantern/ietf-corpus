document: rfc-9495
kind: interoperability-note
summary: A domain that publishes only "issue" or "issuewild" CAA records but no "issuemail" records imposes no restriction on the issuance of email-certifying certificates. Implementors must not infer email issuance restrictions from non-issuemail properties.
section: "4"
topics:
