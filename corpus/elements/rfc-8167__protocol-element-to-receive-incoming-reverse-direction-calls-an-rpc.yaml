document: rfc-8167
kind: protocol-element
summary: To receive incoming reverse-direction Calls, an RPC-over-RDMA client endpoint posts enough additional Receive buffers to match its advertised reverse-direction credit value, plus one per outstanding forward-direction RPC. On reconnect, it re-posts buffers for retransmitted forward Calls and for reverse-direction Calls.
section: 4.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
