document: rfc-3636
kind: interoperability-note
summary: When managing a 10GBASE-W PHY, the ifMauIfIndex value equals the ifIndex of the topmost layer interface (ethernetCsmacd(6)), and the WIS layer is represented separately in ifTable/ifStackTable/ifInvStackTable per the layering model in RFC 3637.
