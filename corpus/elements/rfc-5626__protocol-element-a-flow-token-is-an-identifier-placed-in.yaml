document: rfc-5626
kind: protocol-element
summary: A Flow Token is an identifier placed in the user portion of a SIP URI (typically in the Path header) by the first edge proxy that uniquely identifies a transport-layer flow. It allows the edge proxy to map future requests back to the correct flow and provides indirect authentication via the registrar.
section: "2.1"
topics:
    - sip
    - nat
