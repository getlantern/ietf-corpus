document: rfc-3843
kind: design-rationale
summary: The mode transition cancellation mechanism (Mode=0 meaning 'Cancel') was introduced because RFC 3095 compels the compressor to honor all mode transition requests from the decompressor. For IP-only streams, it was deemed useful to allow the compressor to decline such requests and keep the current compression mode.
section: "3.4"
topics:
    - ip
