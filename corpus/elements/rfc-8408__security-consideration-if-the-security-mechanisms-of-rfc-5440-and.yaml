document: rfc-8408
kind: security-consideration
summary: If the security mechanisms of RFC 5440 and RFC 8281 are not used, a TCP man-in-the-middle attacker could inject error messages into the PCEP session to force the use of a specific PST, potentially enabling subsequent exploitation of weaknesses in that PST.
