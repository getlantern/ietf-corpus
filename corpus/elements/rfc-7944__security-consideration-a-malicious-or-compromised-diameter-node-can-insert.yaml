document: rfc-7944
kind: security-consideration
summary: A malicious or compromised Diameter node can insert artificially high DRMP priority values to gain preferential treatment (reduced throttling probability) or low values to degrade another node's service. Because Diameter lacks end-to-end integrity protection, any agent in the path can modify or insert DRMP AVPs.
section: "12.1"
topics:
    - diameter
    - security
