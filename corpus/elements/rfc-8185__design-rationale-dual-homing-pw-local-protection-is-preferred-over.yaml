document: rfc-8185
kind: design-rationale
summary: Dual-homing PW local protection is preferred over end-to-end PW switchover for AC failures in mobile backhaul networks because massive PW switchover in response to AC failures at the mobile core site can cause congestion by diverting traffic away from network planners' preferred paths. Local switchover keeps the working PW unchanged while only switching at the dual-homing PE side.
section: "1"
topics:
