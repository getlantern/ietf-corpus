document: rfc-3648
kind: protocol-element
summary: ORDERPATCH is a new HTTP method used to change the ordering semantics of a collection (via a DAV:ordering-type element), change the order of collection members (via DAV:order-member elements), or both. The request body MUST be a DAV:orderpatch XML element. On partial failure the server MUST return 207 Multi-Status.
section: "7"
topics:
