document: rfc-9801
kind: state-machine
summary: 'The DEG (Degradation) state is entered when the packet loss rate (PLR) exceeds a configurable SD threshold for a configurable number of consecutive 1-second intervals (default: PLR ≥ 15%, 7 consecutive intervals). ES-PLE, SES-PLE, and UAS-PLE performance counters are updated accordingly; UAS-PLE counting begins after 10 consecutive SES-PLEs by default.'
section: 7.2.2
