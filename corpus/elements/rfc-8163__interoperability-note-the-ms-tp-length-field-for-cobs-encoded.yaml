document: rfc-8163
kind: interoperability-note
summary: The MS/TP Length field for COBS-encoded frames indicates the size of the Encoded Data field in octets plus three; this adjustment is specifically required so that legacy MS/TP devices interpret the length as invalid and correctly ignore COBS-encoded frames.
section: "1.3"
topics:
