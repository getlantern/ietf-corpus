document: rfc-4931
kind: normative-requirement
summary: Domain name syntax MUST conform to RFC 952 as updated by RFC 1123. The trailing dot required when names are stored in a DNS zone is implicit and MUST NOT be provided when exchanging host and domain names via EPP.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
