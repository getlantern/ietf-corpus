document: rfc-4104
kind: security-consideration
summary: Section 6 addresses security considerations for PCELS. Because policy information stored in LDAP controls network behavior, unauthorized access or modification could compromise network security. Implementations should apply LDAP access control mechanisms and consider the security considerations of RFC 3703 (PCLS) and RFC 2829/2830 (LDAP authentication).
section: "6"
topics:
    - security
    - ldap
