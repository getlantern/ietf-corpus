document: rfc-8692
kind: security-consideration
summary: A 4096-bit RSA modulus is recommended for SHAKE256 rather than the theoretically required 15360-bit modulus for 256 bits of security, as the latter is impractical for today's technology. Key sizes should be chosen in line with SHAKE output length per NIST SP 800-78-4 and SP 800-107 guidance.
