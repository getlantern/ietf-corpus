document: rfc-9530
kind: security-consideration
summary: Algorithm agility does not prevent downgrade or substitution attacks on the hashing algorithm. Integrity fields provide no mitigation for such attacks; endpoints can defend by restricting supported algorithms to stronger ones and protecting field values with TLS and/or digital signatures.
section: "6.6"
topics:
