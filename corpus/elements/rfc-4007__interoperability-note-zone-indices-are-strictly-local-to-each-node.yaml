document: rfc-4007
kind: interoperability-note
summary: Zone indices are strictly local to each node. Two nodes attached to the same link will generally assign different zone index values to that link. Therefore, '<address>%<zone_id>' textual representations must never be sent on the wire or exchanged between nodes unless all receiving nodes agree on the index-to-zone mapping.
