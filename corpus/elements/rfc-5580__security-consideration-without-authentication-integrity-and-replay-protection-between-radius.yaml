document: rfc-5580
kind: security-consideration
summary: Without authentication, integrity, and replay protection between RADIUS entities, adversaries can spoof and modify transmitted location attributes. The Message-Authenticator (80) attribute can integrity-protect the entire Access-Request packet when IPsec is unavailable; RADIUS over IPsec (RFC 3579) is the preferred mechanism.
section: "7.1"
topics:
    - radius
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
