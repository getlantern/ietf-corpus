document: rfc-2403
kind: security-consideration
summary: The security of HMAC-MD5-96 is based primarily on the strength of HMAC and secondarily on MD5. MD5 has been shown to be less collision-resistant than originally thought; however, HMAC does not depend on strong collision resistance, and at the time of writing no practical cryptographic attacks against HMAC-MD5-96 were known.
section: "5"
topics:
