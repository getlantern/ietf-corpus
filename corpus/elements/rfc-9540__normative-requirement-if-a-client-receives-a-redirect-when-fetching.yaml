document: rfc-9540
kind: normative-requirement
summary: If a client receives a redirect when fetching the key configuration from the well-known Gateway Resource, it MUST NOT communicate the redirected gateway URI to the relay as the gateway location, to prevent the gateway from encoding client-identifying values in the URI.
section: "5"
rfc2119_level: MUST NOT
topics:
    - http
    - privacy
    - security
