document: rfc-3336
kind: wire-format
summary: CRC-16 is computed using generator polynomial G(x) = x^16 + x^12 + x^5 + 1, identical to Q.921 FCS. The ones complement of the CRC remainder is appended to each PPP frame, covering the Protocol ID and Information fields.
section: 6.2.1
