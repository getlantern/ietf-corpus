document: rfc-5246
kind: protocol-element
summary: Alert messages carry AlertLevel (warning=1 or fatal=2) and AlertDescription (a defined enum including close_notify, bad_record_mac, handshake_failure, certificate_*, protocol_version, etc.). Fatal alerts cause immediate connection termination and session invalidation.
