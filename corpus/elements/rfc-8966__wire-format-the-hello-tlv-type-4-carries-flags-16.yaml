document: rfc-8966
kind: wire-format
summary: The Hello TLV (Type=4) carries Flags (16-bit, U bit at 0x8000 distinguishes Unicast from Multicast Hello), Seqno (16-bit, the per-interface or per-neighbour counter), and Interval (16-bit centiseconds; 0 means unscheduled). The seqno counter MUST be incremented with every Hello sent.
section: 4.6.5
topics:
    - routing
