document: rfc-7056
kind: protocol-element
summary: 'SAML attributes carried in GSS-API names are named with three parts separated by spaces: (1) a URN indicating the context (federated or otherwise), (2) the URI indicating the format of the SAML attribute name (NameFormat), and (3) the SAML attribute name itself. The format URI is not optional.'
section: "3"
