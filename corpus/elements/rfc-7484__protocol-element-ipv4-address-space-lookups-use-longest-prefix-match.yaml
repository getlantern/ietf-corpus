document: rfc-7484
kind: protocol-element
summary: IPv4 address space lookups use longest prefix match against CIDR [RFC 4632] entries in the Bootstrap Registry for IPv4 Address Space. Addresses are converted to binary form and compared bit-by-bit up to the prefix length, mirroring routing longest-match semantics.
section: "5.1"
topics:
    - ip
