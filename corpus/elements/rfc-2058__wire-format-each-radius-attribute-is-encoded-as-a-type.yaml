kind: wire-format
summary: 'Each RADIUS Attribute is encoded as a Type-Length-Value triple: Type (1 octet), Length (1 octet, includes Type and Length fields), and Value (0 or more octets). Value data types are string (0-253 octets), address (32-bit), integer (32-bit), and time (32-bit seconds since epoch).'
