document: rfc-8973
kind: security-consideration
summary: For DNS-SD, DNSSEC SHOULD be used where authenticity of information is important, and secure DNS updates (RFC 2136, RFC 3007) SHOULD generally be used to control which clients can update DNS records. DNS over TLS (DoT) or DNS over HTTPS (DoH) can prevent eavesdropping on DNS messages.
section: "8.3"
rfc2119_level: SHOULD
topics:
    - security
    - dns
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
