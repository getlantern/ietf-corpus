document: rfc-5107
kind: interoperability-note
summary: If a DHCP server does not understand this suboption, it will ignore it and insert its own interface address in the Server Identifier option, causing RENEW DHCPREQUESTs to bypass the relay. Administrators should confirm that the target server supports the suboption before deploying it.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
