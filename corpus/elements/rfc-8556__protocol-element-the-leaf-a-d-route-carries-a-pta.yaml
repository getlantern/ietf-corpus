document: rfc-8556
kind: protocol-element
summary: The Leaf A-D route carries a PTA that communicates the egress PE's (BFER's) BFR-prefix and sub-domain-id back to the ingress PE (BFIR), enabling the BFIR to construct the BIER BitString for forwarding. The BFR-prefix in the Leaf A-D route PTA need not match any other IP address in the route.
section: "3"
topics:
    - multicast
    - routing
