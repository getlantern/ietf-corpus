document: rfc-5533
kind: normative-requirement
summary: The Responder Validator option MUST be included in every R1 message. It MUST also be included in I2 and I2bis messages, generated by copying the Responder Validator received in the preceding R1 or R1bis, enabling the responder to confirm that the I2/I2bis parameters match those in the original I1.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
