summary: 'Address mapping between XMPP JIDs and im:/pres: URIs must handle character set differences: ''&'', '''''', and ''/'' are allowed in im:/pres: URIs but not XMPP addresses, while many UTF-8 characters are allowed in XMPP but not in im:/pres: URIs.'
