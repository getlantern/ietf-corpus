document: rfc-2515
kind: protocol-element
summary: atmVpCrossConnectTable and atmVcCrossConnectTable represent PVC cross-connections in ATM switches and networks. VPL entries in the same VPC share the same atmVplCrossConnectIdentifier, and the cross-connect is indexed by that value in atmVpCrossConnectTable. SVC and Soft PVC cross-connects are handled in a separate ATM2-MIB.
section: "4.5"
