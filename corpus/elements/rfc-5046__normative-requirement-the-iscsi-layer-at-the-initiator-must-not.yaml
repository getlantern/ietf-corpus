document: rfc-5046
kind: normative-requirement
summary: The iSCSI layer at the initiator MUST NOT issue SNACKs for PDUs when operating in iSER-assisted mode, since the RDMA-based data transfer model does not support the SNACK retransmission mechanism.
section: "3.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
