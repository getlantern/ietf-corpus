document: rfc-3565
kind: normative-requirement
summary: The EnvelopedData encryptedContentInfo contentEncryptionAlgorithm field MUST specify a symmetric encryption algorithm. Implementations MUST support content encryption with AES, but implementations MAY support other algorithms as well.
section: "2.1"
rfc2119_level: MUST
topics:
