document: rfc-8029
kind: wire-format
summary: TLVs use a 4-octet header consisting of a 2-octet Type and a 2-octet Length (length of Value field in octets); the Value field is zero-padded to a 4-octet boundary. TLVs may nest sub-TLVs, which must also be 4-octet aligned with independent types.
