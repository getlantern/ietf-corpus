document: rfc-3168
kind: normative-requirement
summary: Upon receipt of a CE packet, an ECN-Capable transport MUST invoke a congestion control response essentially equivalent to its response to a single dropped packet (e.g., TCP halves its congestion window).
section: "5"
rfc2119_level: MUST
topics:
    - ecn
    - congestion
    - tcp
