document: rfc-8791
kind: design-rationale
summary: YANG data structures share the same identifier namespace as defined in RFC 7950 Section 6.2.1, meaning a 'structure'-defined structure cannot share a name with sibling nodes from regular YANG data definition statements or other 'structure' statements in the same module.
