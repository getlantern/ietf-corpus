document: rfc-3945
kind: normative-requirement
summary: 'A circuit (LSP) can be established only between, or through, interfaces of the same switching capability type. LSPs that span different interface types require nesting: a PSC LSP may be nested into an L2SC LSP, which may be nested into a TDM LSP, and so on up to FSC.'
section: "1.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
