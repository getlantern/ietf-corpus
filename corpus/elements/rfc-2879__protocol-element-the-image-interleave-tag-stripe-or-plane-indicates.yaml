document: rfc-2879
kind: protocol-element
summary: The 'image-interleave' tag (Stripe or Plane) indicates color plane interleaving for JBIG images. Plane interleave requires buffering an entire page, placing significant memory demands on sending or receiving systems.
section: "3.7"
