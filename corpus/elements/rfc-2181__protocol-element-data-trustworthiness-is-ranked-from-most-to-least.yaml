document: rfc-2181
kind: protocol-element
summary: 'Data trustworthiness is ranked from most to least: primary zone file data, zone transfer data, authoritative answer section data, authority section of authoritative answer, glue from primary or transfer, non-authoritative answer section data, and additional information from any answer. Additional data and non-authoritative authority section data must not be returned as answers to queries.'
section: 5.4.1
