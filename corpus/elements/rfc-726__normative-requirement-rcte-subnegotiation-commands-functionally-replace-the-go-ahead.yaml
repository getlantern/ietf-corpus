document: rfc-726
kind: normative-requirement
summary: RCTE subnegotiation commands functionally replace the Go-Ahead (IAC GA) Telnet feature and the Echo (IAC ECHO) Telnet option. While RCTE is in use, the Suppress Go-Ahead option should be in force and the Echo option should not be in force.
section: "2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
