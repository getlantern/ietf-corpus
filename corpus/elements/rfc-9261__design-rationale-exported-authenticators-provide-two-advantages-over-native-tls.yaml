document: rfc-9261
kind: design-rationale
summary: 'Exported Authenticators provide two advantages over native TLS authentication: (1) endpoints authoritative for multiple identities can authenticate each over a single connection without a combined certificate, and (2) endpoints can authenticate spontaneously after connection establishment in response to higher-layer protocol events.'
section: "1"
topics:
