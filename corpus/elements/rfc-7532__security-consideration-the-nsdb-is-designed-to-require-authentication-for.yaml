document: rfc-7532
kind: security-consideration
summary: The NSDB is designed to require authentication for write operations while allowing unauthenticated read access. TLS is referenced as the mechanism for authenticating NsdbName in NSDB connections, and administrators performing Section 5.1 operations SHOULD authenticate via a privileged LDAP DN.
section: "6"
topics:
