document: rfc-6823
kind: normative-requirement
summary: If the S bit is set, the GENINFO TLV MUST be flooded across the entire routing domain. If the S bit is not set, the TLV MUST NOT be leaked between levels. The S bit MUST NOT be altered during TLV leaking.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
