document: rfc-5998
kind: privacy-consideration
summary: 'IKEv2 provides initiator identity confidentiality against passive attackers but not active attackers, and EAP-only does not improve this. Responder identity confidentiality is also weakened: without public-key responder auth, protection depends entirely on whether the chosen EAP method reveals the server identity first.'
section: "6.5"
topics:
    - ipsec
    - vpn
    - privacy
