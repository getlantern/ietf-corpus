document: rfc-5445
kind: protocol-element
summary: The Small Block Systematic FEC Scheme (FEC Encoding ID 129) is an Under-Specified FEC Scheme for systematic codes where each source block is at most 65535 source symbols. A dedicated FEC Encoding ID is used rather than ID 128 to enable inclusion of Source Block Length in the Payload ID for low-overhead dynamic block length variation.
section: "5"
