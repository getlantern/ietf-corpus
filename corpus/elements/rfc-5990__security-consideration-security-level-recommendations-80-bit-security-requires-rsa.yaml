document: rfc-5990
kind: security-consideration
summary: 'Security level recommendations: 80-bit security requires RSA key at least 1024 bits and SHA-1 or above; 112-bit security requires at least 2048 bits and SHA-224 or above; 128-bit security requires at least 3072 bits and SHA-256 or above. AES or Camellia Key Wrap may be used at all three levels.'
section: "3"
topics:
