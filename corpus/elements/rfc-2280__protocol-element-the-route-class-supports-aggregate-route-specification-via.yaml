document: rfc-2280
kind: protocol-element
summary: 'The route class supports aggregate route specification via attributes: ''components'' (filter defining component routes and source protocol), ''aggr-bndry'' (AS set defining aggregation boundary), ''aggr-mtd'' (aggregation method: INBOUND or outbound with optional AS set), ''export-comps'' (filter for re-exporting components), and ''holes'' (list of excluded prefixes).'
section: "8.1"
