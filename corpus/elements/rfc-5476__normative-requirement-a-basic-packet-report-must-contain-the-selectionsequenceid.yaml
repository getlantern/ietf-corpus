document: rfc-5476
kind: normative-requirement
summary: A Basic Packet Report MUST contain the selectionSequenceId Information Element and some number of contiguous bytes from the start of the packet (or start of payload) using one of the defined packet-section Information Elements. If a digest function is in the Selection Sequence, the digestHashValue MUST also be included.
section: 6.4.1
rfc2119_level: MUST
topics:
    - measurement
