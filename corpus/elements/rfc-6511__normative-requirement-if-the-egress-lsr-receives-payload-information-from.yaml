document: rfc-6511
kind: normative-requirement
summary: If the egress LSR receives payload information from OOB mapping, it MUST ignore the L3PID (Layer 3 Protocol ID) in the Label Request Object (RFC 3209), as the OOB mapping supersedes the in-band payload information.
