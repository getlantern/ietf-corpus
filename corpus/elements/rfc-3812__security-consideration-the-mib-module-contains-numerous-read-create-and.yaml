document: rfc-3812
kind: security-consideration
summary: The MIB module contains numerous read-create and read-write objects (tunnel parameters, hop lists, resource allocations) that could be exploited to misconfigure or disrupt MPLS tunnel operations. SNMP implementations MUST use protocols offering message authentication and integrity, and SHOULD employ encryption, to protect writable objects from unauthorized modification.
section: "12"
topics:
    - mpls
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
