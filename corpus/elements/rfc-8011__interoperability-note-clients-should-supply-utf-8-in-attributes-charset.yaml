document: rfc-8011
kind: interoperability-note
summary: Clients SHOULD supply 'utf-8' in 'attributes-charset' to maximize interoperability with IPP objects, even when the Client natively uses US-ASCII or ISO-8859-1. The Client must then perform charset conversion or filter characters in the response it cannot present. If both sides share another common charset, they MAY use it to avoid conversion overhead or data loss.
section: 4.1.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
