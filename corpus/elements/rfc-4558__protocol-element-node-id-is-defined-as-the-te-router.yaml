document: rfc-4558
kind: protocol-element
summary: Node-ID is defined as the TE Router ID advertised in the Router Address TLV for OSPF and Traffic Engineering Router ID TLV for ISIS. For IPv6, Node-ID refers to Router_IPv6_Address for OSPFv3 and IPv6 TE Router_ID for IS-IS.
