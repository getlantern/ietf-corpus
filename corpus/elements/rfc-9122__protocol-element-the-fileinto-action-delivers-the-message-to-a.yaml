document: rfc-9122
kind: protocol-element
summary: 'The `fileinto` action delivers the message to a specified mailbox and cancels the implicit keep; use of the `:copy` argument suppresses cancellation of the implicit keep. It supports capabilities: fileinto, copy, imap4flags, mailbox, mailboxid, special-use.'
section: "2.2"
topics:
