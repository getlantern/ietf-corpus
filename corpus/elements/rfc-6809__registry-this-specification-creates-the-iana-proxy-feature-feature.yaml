document: rfc-6809
kind: registry
summary: This specification creates the IANA 'Proxy-Feature Feature-Capability Indicator Trees' sub-registry under 'Session Initiation Protocol (SIP) Parameters'. Feature-capability indicators are organized by leading facet into trees. New trees require 'Standards Action' per RFC 5226.
