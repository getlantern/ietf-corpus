document: rfc-5946
kind: security-consideration
summary: The Notify message used in Section 3.2 can be sent non-hop-by-hop, precluding standard RSVP hop-by-hop integrity. Where the same level of security as RFC 2747 is desired, IPsec-based integrity and authentication (RFC 4302 or RFC 4303) can be used, or non-hop-by-hop Notify messages can be disabled.
section: "5.1"
topics:
    - security
    - qos
