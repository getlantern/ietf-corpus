document: rfc-8661
kind: protocol-element
summary: LDP-to-SR interworking stitches an LDP LSP from the LDP domain to the SR/LDP boundary node, and the SR node segment from the boundary to the SR destination. No additional signaling or state is required for the LDP-to-SR direction; the SR node with LDP neighbors creates LDP bindings for each Prefix-SID learned.
section: "3.1"
topics:
    - mpls
    - routing
