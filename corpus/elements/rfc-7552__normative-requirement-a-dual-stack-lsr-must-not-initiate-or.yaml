document: rfc-7552
kind: normative-requirement
summary: A Dual-stack LSR MUST NOT initiate or accept a TCP connection for a new LDP session if it already has an LDPoIPv4 or LDPoIPv6 session for the same LDP Identifier established with the remote LSR, ensuring only one transport connection exists regardless of Hello adjacencies.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
