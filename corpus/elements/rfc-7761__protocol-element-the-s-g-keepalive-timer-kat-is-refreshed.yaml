document: rfc-7761
kind: protocol-element
summary: The (S,G) Keepalive Timer (KAT) is refreshed by data forwarded using (S,G) state and keeps (S,G) state alive in the absence of explicit (S,G) Joins. It is set to Keepalive_Period on receipt of a packet from a directly connected source or when traffic arrives on the RPF interface with an active (S,G) join.
section: 4.1.3
topics:
    - multicast
    - routing
