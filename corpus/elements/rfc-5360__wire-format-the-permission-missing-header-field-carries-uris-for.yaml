document: rfc-5360
kind: wire-format
summary: 'The Permission-Missing header field carries URIs for which a relay had no permissions. Its BNF is: Permission-Missing = ''Permission-Missing'' HCOLON per-miss-spec *( COMMA per-miss-spec ); per-miss-spec = ( name-addr / addr-spec ) *( SEMI generic-param ).'
