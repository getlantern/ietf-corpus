document: rfc-7854
kind: protocol-element
summary: The Peer Down Notification carries a 1-byte Reason code (1=local closed with NOTIFICATION PDU, 2=local closed with FSM event code, 3=remote closed with NOTIFICATION PDU, 4=remote closed without notification, 5=peer de-configured) and optional data. A Peer Down implicitly withdraws all routes for that peer.
section: "4.9"
