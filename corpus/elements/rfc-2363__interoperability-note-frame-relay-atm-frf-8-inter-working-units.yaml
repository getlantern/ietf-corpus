document: rfc-2363
kind: interoperability-note
summary: Frame Relay/ATM FRF.8 inter-working units are exempted from the requirement to support VC-multiplexed PPP, allowing them to remain compliant with FRF.8 when the PPP over FUNI endpoint is inter-operating with an RFC 1973 endpoint.
