document: rfc-4213
kind: normative-requirement
summary: When using the static tunnel MTU, the Don't Fragment (DF) bit MUST NOT be set in the encapsulating IPv4 header, meaning the encapsulator will not receive ICMPv4 'packet too big' messages for its encapsulated packets.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
