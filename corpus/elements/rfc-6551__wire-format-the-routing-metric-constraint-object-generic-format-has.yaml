summary: The Routing Metric/Constraint Object Generic Format has an 8-bit Routing-MC-Type, a 16-bit Res Flags field containing P/C/O/R flag bits, a 3-bit A field (aggregation type), a 4-bit Prec field (precedence), and an 8-bit Length field defining the object body length in bytes.
