document: rfc-1534
kind: normative-requirement
summary: When a DHCP server returns an automatic address to a BOOTP client, it MUST assign an infinite lease duration, since the BOOTP client is unaware of DHCP lease mechanics. Such addresses cannot be automatically reassigned by the server.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
