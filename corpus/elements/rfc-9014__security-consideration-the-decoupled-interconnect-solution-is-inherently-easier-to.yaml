document: rfc-9014
kind: security-consideration
summary: The decoupled interconnect solution is inherently easier to protect since each GW has a single logical link to one WAN PE; in the integrated solution, the GW has logical links to all WAN PEs for the tenant. In either model, proper control and data plane policies must be applied on the GWs to protect the DC from potential WAN-originated attacks.
section: "5"
topics:
    - security
    - routing
