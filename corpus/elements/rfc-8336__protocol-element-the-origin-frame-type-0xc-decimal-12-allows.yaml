document: rfc-8336
kind: protocol-element
summary: The ORIGIN frame (type 0xc, decimal 12) allows a server to indicate what origins the client should consider as members of the Origin Set for the connection. It contains zero or more Origin-Entry fields and defines no flags, though future updates MAY define flags.
section: "2.1"
topics:
