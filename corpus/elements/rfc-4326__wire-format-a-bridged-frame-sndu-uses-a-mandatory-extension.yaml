document: rfc-4326
kind: wire-format
summary: A Bridged Frame SNDU uses a Mandatory Extension Header (Type=0x0001) and carries a 6-byte MAC destination address, 6-byte MAC source address, 2-byte EtherType/LLC-Length, bridged MAC frame contents, and CRC-32. The NPA address field may be present (D=0) or absent (D=1).
section: "5.2"
