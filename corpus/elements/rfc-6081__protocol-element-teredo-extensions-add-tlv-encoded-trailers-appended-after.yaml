document: rfc-6081
kind: protocol-element
summary: 'Teredo extensions add TLV-encoded trailers appended after the IPv6 packet in a UDP datagram. Each trailer has a 1-byte Type, 1-byte Length, and variable Value field. The highest-order two bits of the Type field specify the action when the type is unrecognized: ''01'' means discard the packet; ''00'', ''10'', ''11'' mean skip.'
section: "4.1"
