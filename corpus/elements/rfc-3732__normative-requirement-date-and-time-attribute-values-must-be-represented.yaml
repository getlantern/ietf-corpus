document: rfc-3732
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar, and MUST use the extended date-time form with upper case 'T' and 'Z' characters as defined in RFC 3339. Time zone offset identifiers MUST NOT be used with EPP.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
