document: rfc-2244
kind: protocol-element
summary: The dataset namespace is a slash-separated hierarchy whose first component is the dataset class (must have a vendor prefix or be standards-track), second component is 'site', 'group', 'host', or 'user', and '~' abbreviates the current user's path. '/byowner/' provides an alternate view by owner.
section: "4.1"
