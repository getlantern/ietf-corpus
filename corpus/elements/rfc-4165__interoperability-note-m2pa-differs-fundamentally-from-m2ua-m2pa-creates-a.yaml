document: rfc-4165
kind: interoperability-note
summary: 'M2PA differs fundamentally from M2UA: M2PA creates a true SS7 link between IPSPs (each with a point code, full MTP3, and local MTP3/MTP2 processing), while M2UA backhaults MTP3/MTP2 primitives to a remote MGC and the SG has no point code or MTP3. Users must understand these differences when choosing between protocols.'
section: "1.9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
