document: rfc-7184
kind: protocol-element
summary: olsrv2LibOrigSetTable records all originator addresses recently used by this router. Each entry (Originator Tuple) is indexed by {IpAddrType, IpAddr} and contains an expiry timestamp (olsrv2LibOrigSetExpireTime) derived as current sysUpTime + O_HOLD_TIME.
