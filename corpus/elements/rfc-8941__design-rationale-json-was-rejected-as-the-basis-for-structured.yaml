document: rfc-8941
kind: design-rationale
summary: JSON was rejected as the basis for Structured Fields because it has unresolved specification issues around large numbers and duplicate object keys, uses Unicode strings by default (causing interoperability issues), and allows unlimited nesting depth. Because JSON is so broadly adopted, it is not feasible to impose the additional constraints needed for HTTP header use across all implementations.
section: A.1
topics:
    - http
    - json
