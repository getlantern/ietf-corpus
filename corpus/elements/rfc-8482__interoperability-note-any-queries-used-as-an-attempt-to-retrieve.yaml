document: rfc-8482
kind: interoperability-note
summary: ANY queries used as an attempt to retrieve all RRsets (e.g., MX, A, AAAA for a mail domain) in a single query may not work as expected with implementations following this document. Implementers relying on ANY for this purpose SHOULD include a fallback mechanism.
section: "2"
topics:
    - dns
