document: rfc-6796
kind: normative-requirement
summary: The UA MUST create a <local-host-port> element per stream using the port from the 'm=' line and address from the 'c=' line of the local session description. The UA SHOULD create a <remote-host-port> element from the remote session description if available.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
