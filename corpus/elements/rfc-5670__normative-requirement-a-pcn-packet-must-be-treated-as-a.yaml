document: rfc-5670
kind: normative-requirement
summary: A PCN-packet MUST be treated as a metered-packet by the threshold-meter and excess-traffic-meter functions. A competing-non-PCN-packet MAY also be treated as a metered-packet.
section: "1.1"
rfc2119_level: MUST
topics:
