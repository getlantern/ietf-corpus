document: rfc-7684
kind: security-consideration
summary: Implementations must detect malformed TLV and sub-TLV permutations and ensure they do not provide a vulnerability for attackers to crash the OSPFv2 router or routing process. Parsing must guard against TLVs overrunning their enclosing structures.
