document: rfc-3996
kind: normative-requirement
summary: If the Notification Recipient did not request Event Wait Mode, the Printer MUST immediately return all held Event Notifications and MUST return the 'notify-get-interval' operation attribute indicating when the client SHOULD repeat the Get-Notifications request.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
