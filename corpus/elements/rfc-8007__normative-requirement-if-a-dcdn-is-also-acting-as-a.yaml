document: rfc-8007
kind: normative-requirement
summary: If a dCDN is also acting as a uCDN in a cascade, it MUST forward CI/T Commands to any affected downstream CDNs. If any dCDN reports 'processed', intermediate CDNs MUST NOT report 'complete' and MUST also report 'processed'.
section: "2.3"
rfc2119_level: MUST
topics:
    - http
