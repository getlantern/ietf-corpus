document: rfc-5988
kind: normative-requirement
summary: When an anchor parameter is present, consuming implementations MUST NOT process the link without applying it. They may choose to ignore such links entirely, but partial processing (ignoring the anchor) is forbidden.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - http
