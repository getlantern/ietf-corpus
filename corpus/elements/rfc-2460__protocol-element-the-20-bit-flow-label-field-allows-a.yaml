document: rfc-2460
kind: protocol-element
summary: The 20-bit Flow Label field allows a source to label packet sequences requiring special handling (e.g., QoS or real-time service). A flow is uniquely identified by (source address, non-zero flow label); non-flow packets carry a flow label of zero.
