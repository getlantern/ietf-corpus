document: rfc-8288
kind: security-consideration
summary: Link header fields using the 'anchor' parameter cannot be trusted since they are assertions by a third party that could be incorrect or malicious. Applications can mitigate this by discarding such links unless a relationship between the resources is established (e.g., they share the same authority).
section: "5"
topics:
    - security
    - http
