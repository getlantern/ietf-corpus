document: rfc-2355
kind: protocol-element
summary: 'The DATA-TYPE field (1 byte) specifies message interpretation: 0x00=3270-DATA, 0x01=SCS-DATA, 0x02=RESPONSE, 0x03=BIND-IMAGE, 0x04=UNBIND, 0x05=NVT-DATA, 0x06=REQUEST (no data portion), 0x07=SSCP-LU-DATA, 0x08=PRINT-EOJ (server-only, printer sessions only).'
section: 8.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
