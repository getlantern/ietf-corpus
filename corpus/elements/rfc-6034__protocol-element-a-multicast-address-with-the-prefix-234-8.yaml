document: rfc-6034
kind: protocol-element
summary: A multicast address with the prefix 234/8 indicates a Unicast-Based Multicast (UBM) address. The remaining 24 bits embed the organization's unicast prefix (bits 8 through N) followed by a Group ID (bits N+1 through 31).
