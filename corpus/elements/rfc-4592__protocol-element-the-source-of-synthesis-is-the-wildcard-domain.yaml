document: rfc-4592
kind: protocol-element
summary: The 'source of synthesis' is the wildcard domain name of the form '<asterisk label>.<closest encloser>' — the wildcard immediately descending from the closest encloser. It need not own any RRSets (it may be an empty non-terminal), and if it does not exist at all there is no wildcard synthesis.
section: 3.3.1
