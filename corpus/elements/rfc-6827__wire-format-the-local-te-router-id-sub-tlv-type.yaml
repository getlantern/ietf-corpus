document: rfc-6827
kind: wire-format
summary: The Local TE Router ID sub-TLV (Type 5, Length 4) is a sub-TLV of the OSPFv2 TE LSA Node Attribute TLV. Its Value field contains a single 4-octet Local TE Router Identifier that associates advertised reachability prefixes with a specific transport node.
