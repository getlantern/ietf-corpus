document: rfc-4934
kind: normative-requirement
summary: A server SHOULD impose a time limit for a client to issue a well-formed EPP command, and SHOULD end the EPP session and close the TCP connection if a well-formed command is not received within that limit.
section: "3"
rfc2119_level: SHOULD
topics:
    - tcp
