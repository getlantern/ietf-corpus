document: rfc-7808
kind: normative-requirement
summary: The well-known URI "/.well-known/timezone" MUST be present on the server; the server MUST redirect HTTP requests for it to the actual context path; the server MUST NOT locate the service endpoint at the well-known URI itself.
section: 4.2.1.3
rfc2119_level: MUST
topics:
    - http
