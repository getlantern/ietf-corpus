document: rfc-7450
kind: protocol-element
summary: 'AMT uses anycast addressing for relay discovery: relays advertise a route to a shared anycast prefix, and gateways send Relay Discovery messages to the anycast Relay Discovery Address. The responding relay returns its unicast address in a Relay Advertisement, and gateways use that unicast address for all subsequent messages.'
section: 4.1.4
topics:
    - multicast
    - ip
