document: rfc-5340
kind: normative-requirement
summary: In OSPFv3, neighboring routers on all link types (broadcast, NBMA, point-to-point, point-to-multipoint) are always identified solely by their OSPF Router ID. The Router ID 0.0.0.0 is reserved and SHOULD NOT be used.
section: "2.11"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
