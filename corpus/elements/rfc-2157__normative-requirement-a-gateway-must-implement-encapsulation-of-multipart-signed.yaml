document: rfc-2157
kind: normative-requirement
summary: A gateway MUST implement encapsulation of multipart/signed using HARPOON, because the signature is computed on the encoded body part and HARPOON is the only encapsulation that preserves the content-transfer-encoding.
section: "7.3"
rfc2119_level: MUST
