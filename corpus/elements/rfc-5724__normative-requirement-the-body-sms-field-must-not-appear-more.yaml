document: rfc-5724
kind: normative-requirement
summary: The 'body' sms-field MUST NOT appear more than once in an 'sms' URI. It consists of percent-encoded UTF-8 characters, and implementations MUST convert the body characters to a suitable SMS character encoding (e.g., 7-bit SMS or UCS-2) before sending.
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
