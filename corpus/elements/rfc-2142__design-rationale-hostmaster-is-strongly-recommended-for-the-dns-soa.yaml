document: rfc-2142
kind: design-rationale
summary: HOSTMASTER is strongly recommended for the DNS SOA zone administrator mailbox for simplicity and regularity; the SOA field must be a simple word without metacharacters, and a mail alias should be used on relevant mail exchangers to route zone administration mail to the appropriate destination.
