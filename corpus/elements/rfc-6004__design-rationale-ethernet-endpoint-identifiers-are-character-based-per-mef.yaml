document: rfc-6004
kind: design-rationale
summary: Ethernet endpoint identifiers are character-based (per MEF/G.8011) rather than IP-address-based (the GMPLS norm). The document bridges this by reusing RFC 4974's long Call ID mechanism — carrying the Ethernet endpoint identifier in CALL_ATTRIBUTES while SENDER_TEMPLATE and SESSION carry IP addresses and a short Call ID.
section: "2.1"
topics:
    - mpls
