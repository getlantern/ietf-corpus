document: rfc-1377
kind: protocol-element
summary: OSI Network Layer protocols are discriminated by the Network Layer Protocol Identifier (NLPID), which is the first octet of each NPDU as defined in ISO/TR 9577. This allows multiple OSI protocols to share a common data link without a discriminator below the network layer.
section: "1.1"
topics:
