document: rfc-5688
kind: interoperability-note
summary: The sip.app-subtype tag indicates only streaming media types a UA can support, not the functionality of the UA itself or MIME types it can send/receive in SIP messages or emails. To indicate support for SIP request bodies of a given type, the 'type' media feature tag from RFC 3840 must be used instead.
section: "3"
topics:
    - sip
    - realtime
