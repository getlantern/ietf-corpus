document: rfc-3220
kind: registry
summary: 'IANA registries created or updated: (1) Mobile IP Message Types (Type 1 = Registration Request, Type 3 = Registration Reply); (2) Extensions to RFC 1256 Router Advertisement (Type 0 = One-byte Padding, Type 16 = Mobility Agent Advertisement, Type 19 = Prefix-Lengths); (3) Extensions to Mobile IP Registration Messages (Type 32 = Mobile-Home Auth, Type 33 = Mobile-Foreign Auth, Type 34 = Foreign-Home Auth); (4) Code Values for Registration Reply (0–1 success, 64–88 FA denial, 128–136 HA denial).'
