document: rfc-8623
kind: normative-requirement
summary: The P2MP-LSP-IDENTIFIERS TLV MUST be included in the LSP object in a PCRpt message for P2MP TE LSPs. If the N bit is set but the TLV is absent, the PCE MUST respond with a PCErr carrying error-type 6 and error-value 14 and close the PCEP session.
section: 7.1.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
