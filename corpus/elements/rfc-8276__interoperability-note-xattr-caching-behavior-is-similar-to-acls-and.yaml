document: rfc-8276
kind: interoperability-note
summary: 'Xattr caching behavior is similar to ACLs and other file attributes: clients may use the change attribute to revalidate cached xattrs, or rely on a held delegation. Write-back caching is not supported; all modifications must be sent to the server synchronously.'
section: "8.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
