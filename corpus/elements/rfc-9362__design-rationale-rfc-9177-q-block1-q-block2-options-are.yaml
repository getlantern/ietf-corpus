document: rfc-9362
kind: design-rationale
summary: 'RFC 9177 Q-Block1/Q-Block2 options are chosen over standard Block1/Block2 because they provide additional properties tailored for DOTS: they support asymmetric packet loss scenarios, enable non-confirmable transmission, and allow application-specific mechanisms (e.g., DOTS heartbeats) to assess peer liveness rather than relying on CoAP CON/ACK.'
section: "1"
topics:
