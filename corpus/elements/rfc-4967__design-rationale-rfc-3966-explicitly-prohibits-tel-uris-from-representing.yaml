document: rfc-4967
kind: design-rationale
summary: RFC 3966 explicitly prohibits 'tel' URIs from representing dial strings, and the existing 'user=phone' SIP URI parameter caused confusion about whether it could encode dial strings. This gap left no standardized way to transmit dial strings from phones lacking internal translation mechanisms to intermediaries that perform digit-map translation.
section: "1"
topics:
    - sip
    - voip
