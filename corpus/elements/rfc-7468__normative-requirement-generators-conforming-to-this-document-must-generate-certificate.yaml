document: rfc-7468
kind: normative-requirement
summary: Generators conforming to this document MUST generate 'CERTIFICATE' labels and MUST NOT generate 'X509 CERTIFICATE' or 'X.509 CERTIFICATE' labels. Parsers SHOULD NOT treat those legacy labels as equivalent to 'CERTIFICATE'.
