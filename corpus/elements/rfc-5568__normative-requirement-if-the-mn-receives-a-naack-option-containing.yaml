document: rfc-5568
kind: normative-requirement
summary: If the MN receives a NAACK option containing an IP address, it MUST use that address and send an FBU using it. If the address in NAACK is PCoA itself, the MN MUST NOT send any more FBUs.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
