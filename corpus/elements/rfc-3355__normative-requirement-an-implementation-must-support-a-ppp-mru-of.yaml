document: rfc-3355
kind: normative-requirement
summary: An implementation MUST support a PPP MRU of at least 1500 bytes. It is RECOMMENDED that an implementation support an IP packet of at least 9180 bytes in the PPP PDU.
section: "3.1"
rfc2119_level: MUST
