document: rfc-3479
kind: normative-requirement
summary: If a label is a Sequence Numbered FT Label, all LDP messages affecting that label MUST carry the FT Protection TLV. On an FT session with the S bit set, the FT Protection TLV MUST be present on all Address and Address Withdraw messages.
section: 5.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
