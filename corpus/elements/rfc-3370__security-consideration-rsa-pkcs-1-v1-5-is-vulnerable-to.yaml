document: rfc-3370
kind: security-consideration
summary: 'RSA (PKCS #1 v1.5) is vulnerable to adaptive chosen ciphertext attacks requiring access to a decryption oracle for hundreds of thousands of ciphertexts. The attack is more feasible for interactive request-response environments than for store-and-forward S/MIME. OAEP (PKCS #1 v2.0) or RFC 3218 countermeasures are recommended.'
section: "9"
topics:
