document: rfc-7473
kind: interoperability-note
summary: When dynamically disabling Prefix-LSPs on an established session, the withdrawing peer MAY use a single Prefix FEC Typed Wildcard Label Withdraw message (RFC 5918) to efficiently withdraw all previously advertised bindings, provided the peer supports the Typed Wildcard FEC capability.
