document: rfc-7981
kind: protocol-element
summary: 'The S bit (0x01) in the Flags field controls flooding scope: set means the TLV MUST be flooded across the entire routing domain; clear means the TLV MUST NOT be leaked between IS-IS levels. This bit MUST NOT be altered during leaking.'
