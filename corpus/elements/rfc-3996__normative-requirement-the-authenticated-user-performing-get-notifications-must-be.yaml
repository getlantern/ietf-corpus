document: rfc-3996
kind: normative-requirement
summary: The authenticated user performing Get-Notifications MUST be (1) the owner of each identified Subscription Object, (2) an operator or administrator of the Printer, or (3) otherwise authorized by the Printer's security policy; otherwise the Printer MUST reject the operation with 'client-error-forbidden', 'client-error-not-authenticated', or 'client-error-not-authorized'.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
