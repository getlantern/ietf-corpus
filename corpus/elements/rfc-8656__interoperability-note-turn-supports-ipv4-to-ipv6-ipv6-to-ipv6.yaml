document: rfc-8656
kind: interoperability-note
summary: TURN supports IPv4-to-IPv6, IPv6-to-IPv6, and IPv6-to-IPv4 packet translation at the relay. If a server performing IPv4-to-IPv6 translation cannot access the DF bit state in the IPv4 header, it MUST reject Allocate requests that include a DONT-FRAGMENT attribute.
section: "13"
topics:
