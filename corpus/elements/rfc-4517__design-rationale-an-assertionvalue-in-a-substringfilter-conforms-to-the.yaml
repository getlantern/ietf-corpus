document: rfc-4517
kind: design-rationale
summary: An AssertionValue in a SubstringFilter conforms to the assertion syntax of the equality matching rule for the attribute type, not the substrings matching rule. Conceptually, the entire SubstringFilter is converted into an assertion value of the substrings matching rule prior to applying the rule.
section: "4.1"
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
