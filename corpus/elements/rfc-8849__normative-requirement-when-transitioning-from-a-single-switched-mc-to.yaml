document: rfc-8849
kind: normative-requirement
summary: When transitioning from a single switched MC to a composed stream of multiple MCs in the same MCC, the media provider MUST send the special value '-' (single-dash) as the captureID RTP header extension and RTCP CaptureID SDES item to indicate no applicable value.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
