document: rfc-6767
kind: design-rationale
summary: 'The G.Bond/Ethernet management is split across two MIB modules: GBOND-MIB for objects common to all G.Bond technologies (bonding management, port/channel configuration, G.hs discovery, initialization) and G9982-MIB for Ethernet-specific objects. This separation avoids duplicating common bonding objects across technology-specific MIBs.'
section: "4.2"
topics:
