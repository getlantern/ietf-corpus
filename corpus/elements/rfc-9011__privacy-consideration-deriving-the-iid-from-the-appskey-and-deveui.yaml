document: rfc-9011
kind: privacy-consideration
summary: Deriving the IID from the AppSKey and DevEUI ensures no correlation between the hardware identifier (DevEUI) and the IID. The IID changes with each LoRaWAN session join, mitigating location tracking and long-term correlation attacks.
section: "5.3"
topics:
