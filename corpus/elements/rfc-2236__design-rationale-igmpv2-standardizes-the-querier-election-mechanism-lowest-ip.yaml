document: rfc-2236
kind: design-rationale
summary: IGMPv2 standardizes the querier election mechanism (lowest IP address wins) because IGMPv1 left it to multicast routing protocols, which used different mechanisms and could result in more than one querier per network. This required adding an administratively-configured IGMPv1 compatibility mode to IGMPv2 routers.
section: "13"
topics:
    - multicast
