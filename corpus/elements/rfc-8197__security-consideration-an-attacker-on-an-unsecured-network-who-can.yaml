document: rfc-8197
kind: security-consideration
summary: An attacker on an unsecured network who can spoof SIP responses for a significant number of call recipients may manipulate call-filtering algorithms to block legitimate calls. Use of TLS to protect signaling mitigates this risk.
section: "6"
topics:
    - sip
    - security
    - tls
