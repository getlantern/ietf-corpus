document: rfc-5733
kind: normative-requirement
summary: The <contact:authInfo> element MUST NOT be provided in an <info> response if the querying client is not the current sponsoring client. Similarly, <contact:upID> and <contact:upDate> MUST NOT be present if the contact has never been modified; <contact:trDate> MUST NOT be provided if the contact has never been transferred.
section: 3.1.2
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
