document: rfc-1442
kind: protocol-element
summary: The MODULE-IDENTITY macro provides contact and revision history for an information module, requiring LAST-UPDATED, ORGANIZATION, CONTACT-INFO, and DESCRIPTION clauses. Its value is an OBJECT IDENTIFIER that can be used to authoritatively reference the information module.
