summary: The edns-key-tag EDNS(0) option encodes a 16-bit OPTION-CODE (value 14), a 16-bit OPTION-LENGTH equal to 2 times the number of Key Tag values, and one or more 16-bit KEY-TAG fields listing the Key Tags of trust anchors or KSKs used for validation.
