document: rfc-7550
kind: normative-requirement
summary: Section 18.1.2 of RFC 3315 required a client to MUST initiate a Confirm when it may have moved to a new link; RFC 7550 relaxes this to SHOULD, because a client may have determined link movement via other techniques (e.g., RFC 6059). A client with delegated prefixes MUST still send a Rebind instead.
section: "4.5"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
