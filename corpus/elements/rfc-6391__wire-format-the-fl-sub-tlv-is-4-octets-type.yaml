document: rfc-6391
kind: wire-format
summary: 'The FL Sub-TLV is 4 octets: type field FL=0x17 (8 bits), Length=4 (8 bits), T bit (1 bit, request to send flow labels), R bit (1 bit, ability to receive flow labels), and Reserved (14 bits). Reserved bits MUST be zero on transmit and MUST be ignored on receive.'
section: "4.1"
topics:
