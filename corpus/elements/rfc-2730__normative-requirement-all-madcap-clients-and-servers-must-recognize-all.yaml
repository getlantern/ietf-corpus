document: rfc-2730
kind: normative-requirement
summary: All MADCAP clients and servers MUST recognize all options defined in this document. Unrecognized options MUST be ignored and the rest of the message processed normally. A MADCAP client MUST NOT include more than one option with the same option type in a single message.
section: 2.1.5
rfc2119_level: MUST
topics:
    - multicast
