document: rfc-3339
kind: wire-format
summary: time-offset = "Z" / time-numoffset, where time-numoffset = ("+" / "-") time-hour ":" time-minute. The "Z" suffix denotes a UTC offset of 00:00; numeric offsets represent local time minus UTC.
