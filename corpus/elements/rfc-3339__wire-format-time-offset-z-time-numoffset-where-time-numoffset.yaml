document: rfc-3339
kind: wire-format
summary: time-offset = "Z" / time-numoffset, where time-numoffset = ("+" / "-") time-hour ":" time-minute. Numeric offsets represent the difference between local time and UTC; an offset of "-00:00" signals that UTC is known but local offset is unknown.
