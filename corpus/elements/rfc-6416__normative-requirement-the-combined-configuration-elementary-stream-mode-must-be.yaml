document: rfc-6416
kind: normative-requirement
summary: The Combined Configuration/Elementary stream mode MUST be used for MPEG-4 Visual so that configuration information is carried to the same RTP port as the elementary stream. If out-of-band configuration is needed (e.g., SIP, RTSP), the optional parameter 'config' MUST be used.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
