document: rfc-7953
kind: protocol-element
summary: The VAVAILABILITY component is a new iCalendar component that groups available-time subcomponents over a specific time range. Time covered by VAVAILABILITY is busy by default (using the BUSYTYPE value, defaulting to BUSY-UNAVAILABLE), except for periods marked free by enclosed AVAILABLE subcomponents.
section: "3.1"
