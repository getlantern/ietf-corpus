document: rfc-9492
kind: protocol-element
summary: 'The Standard Application Identifier Bit Mask (SABM) defines bits for: Bit 0 (R-bit) for RSVP-TE, Bit 1 (S-bit) for SR Policy (data plane independent), and Bit 2 (F-bit) for Loop-Free Alternate (includes all LFA types). Bit assignments are managed via the ''Link Attribute Application Identifiers'' registry defined in RFC 9479.'
section: "5"
topics:
