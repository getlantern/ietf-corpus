document: rfc-3331
kind: normative-requirement
summary: Mandatory parameters MUST be placed before optional parameters in a message. Parameter total length (Tag+Length+Value) MUST be a multiple of 4 bytes; a sender MUST NOT pad with more than 3 bytes; the receiver MUST ignore padding bytes.
section: 3.1.6
rfc2119_level: MUST
topics:
