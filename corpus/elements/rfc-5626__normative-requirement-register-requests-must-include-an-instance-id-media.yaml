document: rfc-5626
kind: normative-requirement
summary: REGISTER requests MUST include an instance-id media feature tag. A UAC conforming to this specification MUST include a 'reg-id' parameter in the Contact header field that is distinct from other reg-id parameters used in other registrations with the same '+sip.instance' and AOR.
section: 4.2.1
rfc2119_level: MUST
topics:
    - sip
