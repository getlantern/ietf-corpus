document: rfc-7420
kind: security-consideration
summary: The PCEP MIB exposes sensitive operational data including session state, peer addresses, timer values, and traffic statistics. SNMPv3 with authentication and privacy (authPriv security level) is strongly recommended to prevent unauthorized read access and to protect counter data from being observed by eavesdroppers who could use it for traffic analysis.
section: "5"
topics:
    - security
    - routing
    - snmp
