document: rfc-9899
kind: design-rationale
summary: RFC 8519 does not support a rate-limit action; it only allows accept, drop, or reject. A new 'rate-limit' leaf (decimal64, bytes per second) was added as an augmentation to actions, valid only when the forwarding action is 'accept'.
section: A.6
