document: rfc-6387
kind: protocol-element
summary: UPSTREAM_ADSPEC object (class number 122, form 0bbbbbbb) is optionally carried in Resv messages and conveys available resource information for upstream traffic. Its format mirrors the ADSPEC object (C-Num 13) and MAY be updated or added at transit nodes.
