document: rfc-7083
kind: normative-requirement
summary: A client MUST ignore any Advertise message that includes a Status Code option with NoAddrsAvail, except that it MUST process an included SOL_MAX_RT option and MUST process an included INF_MAX_RT option. This updates RFC 3315 Section 17.1.3.
section: "6"
rfc2119_level: MUST
