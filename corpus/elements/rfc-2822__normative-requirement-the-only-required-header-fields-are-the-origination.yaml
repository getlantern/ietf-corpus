document: rfc-2822
kind: normative-requirement
summary: The only required header fields are the origination date field ('Date:') and the originator address field(s) ('From:'). All other header fields are syntactically optional. Header fields SHOULD NOT be reordered during transport or transformation.
section: "3.6"
rfc2119_level: REQUIRED
