document: rfc-3931
kind: protocol-element
summary: The Cookie is an optional variable-length field (maximum 64 bits) in the session header that provides an additional check that a received data message is associated with the correct session. Random Cookie values are selected and exchanged as Assigned Cookie AVPs during session creation.
