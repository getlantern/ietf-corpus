document: rfc-1531
kind: design-rationale
summary: Lease times are represented as relative rather than absolute times because clients and servers may not have synchronized clocks. To compensate for clock drift, a server may return a shorter lease to the client than it commits to its own database.
section: "3.3"
topics:
