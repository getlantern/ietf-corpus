document: rfc-8834
kind: design-rationale
summary: RTP/SAVPF is required because the RTCP-based feedback extensions (RFC 4585) provide an improved RTCP timer model allowing more flexible, event-driven RTCP transmission essential for congestion signaling and media events, while SRTP provides encryption, integrity, replay protection, and limited source authentication.
