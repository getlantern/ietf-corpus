document: rfc-2518
kind: design-rationale
summary: XML was chosen for encoding WebDAV method parameters because it supports rich schema definitions, multiple character sets, and is self-describing — allowing older clients to ignore unknown extensions without breaking. Parameters with unbounded length or human-readable content go in XML bodies; short machine-readable parameters go in HTTP headers.
section: "1"
topics:
