document: rfc-3140
kind: protocol-element
summary: The eight Class Selector Codepoints of the form 'xxx000' (RFC 2474) can be encoded as Case 1 PHBIDs; codepoint 000000 signals the Default PHB, while the remaining seven may be used to signal PHBs according to the recipient network's local mapping, including IP Precedence mappings in non-diffserv domains.
