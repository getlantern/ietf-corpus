document: rfc-3034
kind: wire-format
summary: 'The ''Frame Relay Label'' LDP TLV is a 32-bit object containing: a Reserved field, a 2-bit Len field (0=10-bit, 2=23-bit DLCI), and a 23-bit DLCI value right-justified with preceding bits set to zero. It carries a specific Frame Relay label value in LDP label binding messages.'
