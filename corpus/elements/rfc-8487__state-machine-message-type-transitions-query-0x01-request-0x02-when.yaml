kind: state-machine
summary: 'Message type transitions: Query (0x01) → Request (0x02) when LHR receives a Query and begins forwarding upstream; Request (0x02) → Reply (0x03) when FHR or RP receives a Request destined to itself, or when an intermediate router encounters a terminal condition (NO_ROUTE, WRONG_IF, REACHED_RP, hop limit reached, NO_SPACE).'
