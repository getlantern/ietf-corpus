document: rfc-5555
kind: protocol-element
summary: The IPv4 Home Address Option (Type 29) is carried in the mobility header of the binding update. It contains a 6-bit Prefix-len field, a P flag (mobile network prefix request), a Reserved field, and a 32-bit IPv4 home address. The value 0.0.0.0 requests dynamic address allocation from the home agent.
section: 3.1.1
topics:
    - mobility
    - ip
    - v6ops
