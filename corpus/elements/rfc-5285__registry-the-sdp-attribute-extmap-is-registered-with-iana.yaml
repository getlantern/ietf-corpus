document: rfc-5285
kind: registry
summary: The SDP attribute 'extmap' is registered with IANA per RFC 4566. It is applicable at both session and media level, is not subject to the charset attribute, and defines the mapping from extension numbers used in packet headers to extension names registered in the RTP Compact Header Extensions registry.
section: "9.2"
topics:
