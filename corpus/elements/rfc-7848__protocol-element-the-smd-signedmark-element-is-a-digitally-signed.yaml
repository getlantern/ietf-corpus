document: rfc-7848
kind: protocol-element
summary: 'The <smd:signedMark> element is a digitally signed XML document using XML Signature. It includes a required ''id'' attribute of type XSD ID, and child elements: <smd:id>, <smd:issuerInfo>, <smd:notBefore>, <smd:notAfter>, <mark:mark>, and a <Signature> element.'
