document: rfc-9594
kind: normative-requirement
summary: The exchange between the Client and AS MUST be secured as specified by the transport profile of ACE used between the Client and KDC. The joining node MUST have a secure communication association established with the KDC before joining a group, and all subsequent communications with the KDC MUST occur in accordance with that transport profile.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - oauth
