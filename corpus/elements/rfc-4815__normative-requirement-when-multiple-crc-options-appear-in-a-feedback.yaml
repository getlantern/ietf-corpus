document: rfc-4815
kind: normative-requirement
summary: When multiple CRC options appear in a feedback packet, all such options MUST be identical (they are computed over the same header); the compressor MUST discard the feedback packet if any CRC options differ.
section: "8.6"
rfc2119_level: MUST
topics:
    - rtp
