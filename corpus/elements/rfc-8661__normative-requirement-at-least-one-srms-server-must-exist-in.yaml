document: rfc-8661
kind: normative-requirement
summary: At least one SRMS server MUST exist in a routing domain to advertise Prefix-SIDs on behalf of non-SR nodes, thereby allowing non-LDP routers to send and receive labeled traffic from LDP-only routers.
section: "3.2"
rfc2119_level: MUST
topics:
