document: rfc-5392
kind: interoperability-note
summary: Legacy routers receiving an advertisement for an inter-AS TE link will ignore it because the Link Type carries an unknown value, but will continue to flood the LSA. They will not attempt to use the information as if it were an intra-AS TE link.
