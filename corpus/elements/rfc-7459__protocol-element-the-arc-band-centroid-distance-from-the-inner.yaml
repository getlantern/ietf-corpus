document: rfc-7459
kind: protocol-element
summary: 'The Arc-Band centroid distance from the inner arc starting point is: d = 4 * sin(o/2) * (R^2 + R*r + r^2) / (3*o*(R + r)), along the bisecting angle a + o/2, where r is inner radius, R is outer radius, a is start angle, and o is opening angle.'
