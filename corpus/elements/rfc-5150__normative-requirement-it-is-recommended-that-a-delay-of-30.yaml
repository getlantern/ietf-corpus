document: rfc-5150
kind: normative-requirement
summary: It is RECOMMENDED that a delay of 30 seconds be introduced before tearing down a dynamically created S-LSP after e2e LSP teardown is complete, to reduce simultaneous generation of RSVP errors and teardown messages due to multiple events.
section: 5.1.5
rfc2119_level: RECOMMENDED
topics:
