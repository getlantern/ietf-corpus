document: rfc-2609
kind: design-rationale
summary: 'Attribute identifiers are restricted to URL-unreserved characters because services may display prominent attributes directly in their service: URL registrations. Translation of attribute identifiers is explicitly prohibited because they can be embedded in URLs or program code, analogous to variable identifiers.'
section: 3.2.6.1
