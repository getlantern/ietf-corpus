document: rfc-1341
kind: registry
summary: IANA serves as the central registry for MIME Content-Type/subtype values, character set names, access-type values, and Content-Transfer-Encoding names. New standard subtypes must be documented, registered with, and approved by IANA; private extensions must use the 'X-' prefix. All Content-Transfer-Encoding namespace not beginning with 'X-' is explicitly reserved to IANA.
section: Appendix F
topics:
