document: rfc-6872
kind: privacy-consideration
summary: SIP CLF fields such as IP addresses and URIs contain potentially sensitive information. Before transferring log files across administrative domains, operators should anonymize or obfuscate sensitive fields; a specification for interoperable privacy-friendly SIP CLF exchange is identified as further study.
