document: rfc-3815
kind: interoperability-note
summary: The MplsAtmVcIdentifier TEXTUAL-CONVENTION (defined in MPLS-TC-STD-MIB, RFC 3811) restricts VCI values to be greater than 31, implementing the constraint from RFC 3035 for ATM label switching. This differs from the base LDP Specification.
