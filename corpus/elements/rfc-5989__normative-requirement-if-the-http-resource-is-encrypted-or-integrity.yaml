document: rfc-5989
kind: normative-requirement
summary: If the HTTP resource is encrypted or integrity-protected in transit (e.g., via HTTPS), then the SIP means of subscribing MUST also have appropriate encryption or integrity protection applied, such as SIPS URI or S/MIME bodies.
