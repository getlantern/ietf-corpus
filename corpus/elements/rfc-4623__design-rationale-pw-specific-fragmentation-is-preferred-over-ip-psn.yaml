document: rfc-4623
kind: design-rationale
summary: PW-specific fragmentation is preferred over IP PSN fragmentation at scale because it allows per-PW buffer assignment, leverages PW sequencing, and can be selectively enabled per-PW rather than applying to all IP traffic at a node.
