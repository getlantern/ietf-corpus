document: rfc-3392
kind: interoperability-note
summary: A speaker detects that its peer does not support capabilities advertisement when it receives a NOTIFICATION with Error Subcode Unsupported Optional Parameter in response to an OPEN carrying the Capabilities Optional Parameter. The speaker should then fall back to connecting without the parameter.
