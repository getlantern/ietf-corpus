summary: The multihoming bit (M) in the Smart-MAC APPsub-TLV was introduced to solve MAC flip-flopping when a Smart Endnode uses active-active load balancing across two edge RBridges with different nicknames. Remote RBridges retain both (MAC, label, RB1) and (MAC, label, RB2) entries simultaneously when M=1.
