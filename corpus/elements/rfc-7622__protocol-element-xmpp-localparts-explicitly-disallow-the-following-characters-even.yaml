document: rfc-7622
kind: protocol-element
summary: 'XMPP localparts explicitly disallow the following characters even though they are permitted by the PRECIS IdentifierClass: U+0022 (QUOTATION MARK), U+0026 (AMPERSAND), U+0027 (APOSTROPHE), U+002F (SOLIDUS), U+003A (COLON), U+003C (LESS-THAN SIGN), U+003E (GREATER-THAN SIGN), and U+0040 (COMMERCIAL AT).'
