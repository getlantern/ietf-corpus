document: rfc-2457
kind: protocol-element
summary: The hbnIsInTable is a sparse extension to appnIsInTable for HPR Extended Border Node sessions with back-to-back RTP connections. It provides hbnIsInRtpNceId (NCE ID toward SLU, SIZE 1..8 octets) and hbnIsInRtpTcid (TCID toward SLU, SIZE 8 octets) for the second RTP connection.
