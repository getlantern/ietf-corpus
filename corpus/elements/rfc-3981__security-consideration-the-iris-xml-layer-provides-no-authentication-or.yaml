document: rfc-3981
kind: security-consideration
summary: The IRIS XML layer provides no authentication or privacy facilities of its own; it relies entirely on the application-transport layer for these capabilities. Application-transports must explicitly define their security mechanisms as required by the transport mapping checklist.
section: "11"
