document: rfc-7145
kind: normative-requirement
summary: When RDMAExtensions is negotiated to 'Yes', HeaderDigest and DataDigest MUST be negotiated to 'None' on all iSCSI/iSER connections in that session, because RCaP provides error detection at least as good as a 32-bit CRC for all iSER Messages.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
