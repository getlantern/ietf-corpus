document: rfc-8045
kind: wire-format
summary: IP-Port-Type TLV (TLV-Type 1, Length 6 octets) carries the IANA IP transport protocol number as unsigned8 right-justified in a 32-bit integer; unused bits MUST be set to zero. Identifies the specific transport protocol (TCP, UDP, SCTP, DCCP) to which the parent attribute applies.
section: 3.2.1
topics:
