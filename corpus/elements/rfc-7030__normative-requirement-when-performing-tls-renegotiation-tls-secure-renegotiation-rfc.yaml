document: rfc-7030
kind: normative-requirement
summary: When performing TLS renegotiation, TLS secure_renegotiation (RFC 5746) MUST be used. Clients SHOULD link identity and POP by embedding tls-unique information in the certification request; if tls-unique information is included by the client, the server MUST verify it.
section: "3.5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
