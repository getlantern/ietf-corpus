document: rfc-9779
kind: wire-format
summary: The Return Path TLV format consists of a 1-byte Type (=5), 1-byte Length (equal to Sub-TLV length plus Reserved field in bytes, MUST NOT be 0 or 1), a 2-byte Reserved field, followed by the Return Path Sub-TLV.
