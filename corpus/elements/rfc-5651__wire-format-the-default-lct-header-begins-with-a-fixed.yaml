document: rfc-5651
kind: wire-format
summary: 'The default LCT header begins with a fixed first 32-bit word containing: V (4 bits, version), C (2 bits, CCI length flag), PSI (2 bits, protocol-specific), S (1 bit, TSI length flag), O (2 bits, TOI length flag), H (1 bit, half-word flag), Res (2 bits, reserved), A (1 bit, Close Session), B (1 bit, Close Object), HDR_LEN (8 bits, header length in 32-bit words), CP (8 bits, Codepoint). Variable-length CCI, TSI, and TOI fields follow.'
section: "5.1"
topics:
    - multicast
