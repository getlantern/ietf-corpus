document: rfc-5996
kind: normative-requirement
summary: All IKEv2 implementations MUST be able to send, receive, and process IKE messages up to 1280 octets long, and SHOULD support up to 3000 octets. All IKE messages sent on UDP port 4500 MUST begin with four zero bytes so receivers can distinguish them from IKE traffic on port 500.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
