document: rfc-6910
kind: protocol-element
summary: 'The callee''s monitor signals CC availability by inserting a Call-Info header field with ''purpose=call-completion'' into appropriate non-100 provisional and final responses to the initial INVITE. The required format is: Call-Info: monitor-URI;purpose=call-completion;m=XX, where the ''m'' parameter conveys the failure mode.'
section: "7.1"
topics:
    - sip
