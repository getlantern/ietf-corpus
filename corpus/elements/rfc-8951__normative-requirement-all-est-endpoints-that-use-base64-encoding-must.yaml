document: rfc-8951
kind: normative-requirement
summary: All EST endpoints that use base64 encoding MUST format their POST request bodies and payload responses as base64 per RFC 4648, with input produced via DER (X.690). This format applies regardless of any Content-Transfer-Encoding header; any value in such a header MUST be ignored.
section: "3"
rfc2119_level: MUST
topics:
    - http
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
