document: rfc-3828
kind: protocol-element
summary: The Checksum Coverage field is a 16-bit value specifying the number of octets from the beginning of the UDP-Lite header that are covered by the checksum. A value of zero indicates the entire packet is covered; values 1–7 are invalid and MUST cause the packet to be discarded.
section: "3.1"
topics:
    - udp
