summary: 'The PSC packet is encapsulated in a G-ACh header followed by a 32-bit PSC payload word containing: Ver (2 bits), Request (4 bits), PT (2 bits), R (1 bit), Reserved1 (7 bits), FPath (8 bits), Path (8 bits); a second 32-bit word holds TLV Length (16 bits) and Reserved2 (16 bits); optional TLVs follow.'
