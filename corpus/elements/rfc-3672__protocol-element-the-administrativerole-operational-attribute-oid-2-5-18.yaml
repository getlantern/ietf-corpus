document: rfc-3672
kind: protocol-element
summary: The administrativeRole operational attribute (OID 2.5.18.5) identifies the administrative roles associated with an administrative point entry. It uses objectIdentifierMatch equality and directoryOperation usage. It also regulates which subentry classes may be subordinate to an administrative entry.
