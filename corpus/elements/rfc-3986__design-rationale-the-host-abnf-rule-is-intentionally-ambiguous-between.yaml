document: rfc-3986
kind: design-rationale
summary: 'The host ABNF rule is intentionally ambiguous between IPv4address and reg-name; disambiguation uses a "first-match-wins" rule: if the host matches IPv4address, it is treated as an IPv4 literal rather than a registered name. This avoids introducing a more complex grammar.'
section: 3.2.2
topics:
    - ip
