document: rfc-1731
kind: design-rationale
summary: The protection mechanism negotiation uses a bit-mask in a single octet, allowing the server to advertise multiple supported mechanisms simultaneously and the client to select one. This design enables extensible capability advertisement within the authentication exchange itself.
