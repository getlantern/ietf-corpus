document: rfc-9103
kind: privacy-consideration
summary: 'DNS zone contents are privacy-sensitive: they may include personal information embedded in hostnames, location references, inter-organizational relationships, and all endpoint IP addresses including private IPv6 addresses. Full zone exposure facilitates reconnaissance and attack targeting, and there may be regulatory reasons requiring confidentiality, motivating encrypted zone transfers.'
section: "1"
topics:
    - dns
    - privacy
