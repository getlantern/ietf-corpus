document: rfc-5537
kind: protocol-element
summary: 'The cancel control message (Control header value ''cancel <msg-id>'') requests that the identified article be removed. The Supersedes header field in an ordinary article has a similar effect: relaying and serving agents SHOULD cancel the superseded article if they choose to honor it.'
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
