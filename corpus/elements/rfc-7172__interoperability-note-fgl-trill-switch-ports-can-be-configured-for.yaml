document: rfc-7172
kind: interoperability-note
summary: FGL TRILL switch ports can be configured for FGL or VL, with VL as the default. An unconfigured FGL TRILL switch port reports untagged frames as VLAN 1, matching base protocol behavior. Outer.VLAN on Ethernet links can only be a C-VLAN tag regardless of FGL configuration.
