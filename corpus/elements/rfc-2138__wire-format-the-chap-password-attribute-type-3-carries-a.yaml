document: rfc-2138
kind: wire-format
summary: The CHAP-Password attribute (Type 3) carries a 1-octet CHAP Identifier followed by a 16-octet CHAP Response string; total attribute Length is fixed at 19. The CHAP challenge is taken from the CHAP-Challenge attribute (Type 60) if present, otherwise from the Request Authenticator.
