document: rfc-2532
kind: design-rationale
summary: Delivery and processing confirmation are handled by two separate mechanisms (DSN and MDN) because in Internet Mail, delivery to the mailbox and rendering/printing may be separated in both time and location, unlike synchronous GSTN fax where T.30 provides a single per-page acknowledgment.
