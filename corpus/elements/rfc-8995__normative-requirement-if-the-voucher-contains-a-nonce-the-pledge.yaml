document: rfc-8995
kind: normative-requirement
summary: If the voucher contains a nonce, the pledge MUST confirm the nonce matches the original pledge voucher-request nonce. This ensures the voucher is fresh and bound to this particular bootstrapping attempt.
section: 2.6.1
rfc2119_level: MUST
