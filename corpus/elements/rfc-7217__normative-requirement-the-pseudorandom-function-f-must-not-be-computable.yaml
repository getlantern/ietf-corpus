document: rfc-7217
kind: normative-requirement
summary: The pseudorandom function F() MUST NOT be computable from the outside (without knowledge of the secret key) and MUST be difficult to reverse. F() SHOULD produce an output of at least 64 bits; SHA-1 and SHA-256 are acceptable options; MD5 is explicitly unacceptable.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - ip
    - security
