kind: registry
summary: The 'rpki-rtr-error' IANA registry maps error codes to descriptions (0=Corrupt Data, 1=Internal Error, 2=No Data Available, 3=Invalid Request, 4=Unsupported Protocol Version, 5=Unsupported PDU Type, 6=Withdrawal of Unknown Record, 7=Duplicate Announcement Received). Version 1 adds code 8 (Unexpected Protocol Version).
