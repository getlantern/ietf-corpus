document: rfc-7139
kind: normative-requirement
summary: The OTN-TDM FLOWSPEC object received in a Resv message SHOULD be identical to the OTN-TDM SENDER_TSPEC in the corresponding Path message. If they do not match, a ResvErr with 'Traffic Control Error/Bad Flowspec value' MUST be generated.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
