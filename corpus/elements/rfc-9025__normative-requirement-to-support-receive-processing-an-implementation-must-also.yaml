document: rfc-9025
kind: normative-requirement
summary: To support receive processing, an implementation MUST also support provisioning of received UDP and IP header information. The provisioned information MUST be used to identify incoming app flows based on the combination of S-Label and incoming encapsulation header information.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - ip
