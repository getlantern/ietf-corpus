document: rfc-7256
kind: interoperability-note
summary: This document updates RFC 6320 by assigning capability type 3 to the NAS-initiated multicast replication capability and by changing the starting point for IANA result code allocation by IETF Consensus from 0x100 to 0x64, affecting the ANCP result code registry.
section: "1"
topics:
