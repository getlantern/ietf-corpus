document: rfc-7345
kind: wire-format
summary: UDPTL is carried directly in DTLS record layer 'application_data' packets. No framing or multiplexing indicator is added within the DTLS payload, requiring out-of-band (SDP) negotiation to establish a dedicated DTLS association for UDPTL.
