document: rfc-6347
kind: interoperability-note
summary: DTLS records do not contain association identifiers; applications must multiplex associations themselves (typically using host/port for UDP). When carried over transports with their own sequence numbers (e.g., DCCP), both DTLS and transport sequence numbers will be present simultaneously.
section: 4.1.1
topics:
    - tls
    - udp
