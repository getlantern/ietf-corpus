document: rfc-4383
kind: normative-requirement
summary: When a disclosed TESLA key is available for a buffered packet, TESLA verification MUST succeed for the packet to be used; if verification fails, the packet MUST be discarded and the event SHOULD be logged. If the TESLA safety condition does not hold (packet is 'unsafe'), it is RECOMMENDED to discard the packet.
section: 4.4.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
