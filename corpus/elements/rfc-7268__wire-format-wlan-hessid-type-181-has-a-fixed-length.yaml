summary: WLAN-HESSID (Type 181) has a fixed Length of 19 (Type + Length + 17-octet String). The String encodes a MAC address in uppercase ASCII with octets separated by '-', identifying the Homogeneous Extended Service Set for use with subscription service provider network identification.
