document: rfc-5451
kind: protocol-element
summary: The authserv-id is a dot-atom uniquely identifying the authenticating service within an ADMD. It SHOULD be the DNS domain name of the ADMD. Its uniqueness MUST be guaranteed by the ADMD that generates it.
