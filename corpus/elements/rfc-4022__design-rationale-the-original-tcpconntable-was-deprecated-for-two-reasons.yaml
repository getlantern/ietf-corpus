document: rfc-4022
kind: design-rationale
summary: 'The original tcpConnTable was deprecated for two reasons: (1) it supports only IPv4, whereas the IETF now mandates IP-version-neutral MIBs using InetAddressType/InetAddress; (2) it mixes listening endpoints with active connections, which have different management access patterns, so splitting into tcpConnectionTable and tcpListenerTable enables addition of endpoint-specific objects.'
section: 2.1.1
topics:
    - tcp
    - snmp
