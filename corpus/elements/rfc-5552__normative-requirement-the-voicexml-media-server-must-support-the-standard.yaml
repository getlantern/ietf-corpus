document: rfc-5552
kind: normative-requirement
summary: The VoiceXML Media Server MUST support the standard SDP offer/answer mechanism of RFC 3264. If no SDP offer is present in the INVITE, the server will make an offer in the 200 OK response listing its supported codecs.
section: "3.1"
rfc2119_level: MUST
topics:
