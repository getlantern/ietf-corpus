document: rfc-6334
kind: interoperability-note
summary: A DHCPv6 server will not reply with an AFTR-Name option unless the client has explicitly included OPTION_AFTR_NAME in its Option Request option (OPTION_ORO), following the standard RFC 3315 Section 17.2.2 negotiation mechanism.
