document: rfc-5792
kind: normative-requirement
summary: All PA-TNC attribute TLVs within a single PA-TNC message MUST pertain to the same implementation of the component. Posture Collectors reporting multiple implementations of the same component type MUST send separate PA-TNC messages for each implementation.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
