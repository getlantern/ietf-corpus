document: rfc-8928
kind: normative-requirement
summary: The 6LR MUST store the information associated with a Crypto-ID on the first NS exchange in a fashion that the CIPO parameters can be retrieved from the Crypto-ID alone. A valid registration MUST NOT be altered until a challenge is complete.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
    - security
