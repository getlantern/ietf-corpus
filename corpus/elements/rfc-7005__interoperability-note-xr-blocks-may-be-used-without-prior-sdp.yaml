document: rfc-7005
kind: interoperability-note
summary: XR blocks MAY be used without prior SDP signaling, per RFC 3611 Section 5. Implementations must therefore be prepared to receive DJB Metrics Blocks even when no SDP negotiation has taken place.
section: "5.2"
