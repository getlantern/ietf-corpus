document: rfc-9611
kind: security-consideration
summary: The optional Resource Identifier in SA_RESOURCE_INFO SHOULD NOT be an identifier that reveals hardware information (e.g., raw CPU number), as it could allow an attacker to deduce which CPU handles which packets and optimize brute-force attacks against the system.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - vpn
    - security
    - privacy
