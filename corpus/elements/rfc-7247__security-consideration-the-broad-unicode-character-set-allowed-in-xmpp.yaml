document: rfc-7247
kind: security-consideration
summary: 'The broad Unicode character set allowed in XMPP addresses introduces the risk of user confusion from visually similar (''confusable'') characters in identifiers. The PRECIS framework and Unicode Technical Standard #39 describe these issues and provide guidance.'
