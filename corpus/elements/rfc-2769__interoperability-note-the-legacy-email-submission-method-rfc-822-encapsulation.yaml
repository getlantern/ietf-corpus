document: rfc-2769
kind: interoperability-note
summary: The legacy email submission method (RFC-822 encapsulation, optionally PGP-signed) must continue to be supported for backward compatibility with existing RIPE tools; the preferred socket-based submission with transaction-submit-begin/end delimiters is a new addition.
