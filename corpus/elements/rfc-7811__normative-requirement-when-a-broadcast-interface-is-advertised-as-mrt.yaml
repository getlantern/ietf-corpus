document: rfc-7811
kind: normative-requirement
summary: When a broadcast interface is advertised as MRT-ineligible, the pseudonode representing that entire broadcast network MUST NOT be included in the MRT Island, effectively excluding all broadcast interfaces on that network.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - routing
