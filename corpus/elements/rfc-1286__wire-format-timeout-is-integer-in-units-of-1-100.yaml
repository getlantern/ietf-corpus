document: rfc-1286
kind: wire-format
summary: Timeout is INTEGER in units of 1/100 seconds used for all STP timer objects in this MIB. Conversion to BPDU units (1/256 s) uses floor((n*256)/100); reverse conversion uses ceiling((b*100)/256). Multiplication must precede division to avoid distortion.
