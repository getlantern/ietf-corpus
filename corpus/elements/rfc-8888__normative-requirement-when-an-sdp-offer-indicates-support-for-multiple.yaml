document: rfc-8888
kind: normative-requirement
summary: When an SDP offer indicates support for multiple congestion control feedback mechanisms with substantially the same semantics, the answering party SHOULD include only one in its answer, and SHOULD choose the same mechanism in subsequent answers where possible.
section: "6"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
