document: rfc-4342
kind: wire-format
summary: The Receive Rate option (Type=194, Len=6) carries a 4-byte field indicating the rate in bytes per second at which the receiver has received data since its last acknowledgement. It MUST be sent on all required acknowledgements and MUST NOT be sent on DCCP-Data packets.
section: "8.3"
topics:
    - congestion
