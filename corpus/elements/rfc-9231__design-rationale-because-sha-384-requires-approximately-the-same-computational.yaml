document: rfc-9231
kind: design-rationale
summary: Because SHA-384 requires approximately the same computational effort as SHA-512, RSA-SHA512 is suggested over RSA-SHA384 where possible. Similarly, RSA-SHA256 is suggested over RSA-SHA224 for the same efficiency reason.
section: 2.3.3
