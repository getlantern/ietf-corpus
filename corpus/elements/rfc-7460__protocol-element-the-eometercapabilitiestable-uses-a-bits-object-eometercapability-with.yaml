document: rfc-7460
kind: protocol-element
summary: The eoMeterCapabilitiesTable uses a BITS object (eoMeterCapability) with bits for none(0), powermetering(1), energymetering(2), and powerattributes(3) to advertise which MIB groups an agent supports. This allows NMS applications to discover available tables without a trial-and-error walk.
section: 5.1.1
topics:
