document: rfc-5537
kind: protocol-element
summary: 'The Original-Sender header field preserves the Sender header field from a message received by an incoming gateway. Its ABNF is: Original-Sender-header = ''Original-Sender'' '':'' SP mailbox, where mailbox is as defined in RFC 5322.'
section: 3.10.3
