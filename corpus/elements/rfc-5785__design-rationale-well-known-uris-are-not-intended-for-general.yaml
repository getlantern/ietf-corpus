document: rfc-5785
kind: design-rationale
summary: Well-known URIs are not intended for general information retrieval or establishing large URI namespaces, but specifically to facilitate discovery of site-wide policy or metadata when other mechanisms (HTTP headers, WebDAV PROPFIND) are impractical due to latency or deployment overhead.
section: "1.1"
topics:
    - http
