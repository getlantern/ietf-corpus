document: rfc-7239
kind: registry
summary: IANA created the "HTTP Forwarded Parameters" registry with IETF Review as the registration procedure. Initial entries are "by", "for", "host", and "proto". New parameters and values MUST conform to the forwarded-pair ABNF, and their security and privacy implications must be thoroughly documented.
