document: rfc-6389
kind: normative-requirement
summary: An LDP LSR MUST NOT distribute the Upstream-Assigned Label TLV to a neighboring LSR, and MUST NOT send the Upstream-Assigned Label Request TLV to a neighboring LSR, if that neighbor has not previously advertised the Upstream Label Assignment Capability in its LDP Initialization messages.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
