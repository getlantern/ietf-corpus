document: rfc-7243
kind: protocol-element
summary: The Bytes Discarded Report Block (BT=26) reports the number of RTP payload bytes discarded from the de-jitter buffer, either as an interval or cumulative metric. It is a 3-word (12-byte) XR block containing BT, Interval flag (I), Early bit (E), Reserved, Block length, SSRC, and bytes discarded count.
