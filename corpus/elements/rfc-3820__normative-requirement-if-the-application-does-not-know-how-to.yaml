document: rfc-3820
kind: normative-requirement
summary: If the application does not know how to parse any policy in the proxy policy chain, it MUST NOT use the subject distinguished name of any certificate in the chain prior to the certificate containing the unrecognized policy for authorization decisions.
section: "4.2"
rfc2119_level: MUST NOT
topics:
