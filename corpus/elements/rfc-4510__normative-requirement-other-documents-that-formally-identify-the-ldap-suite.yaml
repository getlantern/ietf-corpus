document: rfc-4510
kind: normative-requirement
summary: Other documents that formally identify the LDAP suite SHOULD do so by a normative reference to RFC 4510 (this document), rather than to individual component RFCs. The terms 'LDAP' and 'LDAPv3' informally refer to the protocol specified by this technical specification.
section: "1"
rfc2119_level: SHOULD
