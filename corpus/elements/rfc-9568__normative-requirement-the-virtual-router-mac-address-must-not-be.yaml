document: rfc-9568
kind: normative-requirement
summary: The Virtual Router MAC address MUST NOT be used for the Net_Iface parameter in IPv6 Interface Identifier derivation algorithms (RFC 7217, RFC 8981), as it would generate non-unique interface identifiers across multiple routers sharing the same Virtual Router MAC.
section: "7.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
