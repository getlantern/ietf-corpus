document: rfc-7873
kind: protocol-element
summary: The Server Cookie SHOULD consist of or include a 64-bit-or-larger pseudorandom function of the request source IP address, a Server Secret (at least 64 bits entropy), and the Client Cookie. Inclusion of the Client Cookie distinguishes multiple clients sharing the same NAT-translated IP address.
section: "4.2"
topics:
    - dns
    - crypto
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
