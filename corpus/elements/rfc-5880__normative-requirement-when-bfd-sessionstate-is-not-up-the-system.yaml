document: rfc-5880
kind: normative-requirement
summary: When bfd.SessionState is not Up, the system MUST set bfd.DesiredMinTxInterval to at least one second (1,000,000 microseconds) to keep bandwidth consumed by non-Up sessions negligible. When the Echo function is active, bfd.RequiredMinRxInterval SHOULD likewise be set to at least one second.
section: 6.8.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
