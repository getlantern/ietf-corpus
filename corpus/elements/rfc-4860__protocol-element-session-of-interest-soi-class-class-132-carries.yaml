document: rfc-4860
kind: protocol-element
summary: SESSION-OF-INTEREST (SOI) Class (Class=132) carries a copy of a GENERIC-AGGREGATE SESSION object inside E2E RSVP messages. GENERIC-AGG-IP4-SOI (C-Type=1) and GENERIC-AGG-IP6-SOI (C-Type=2) embed the full SESSION object of the aggregate reservation associated with an E2E reservation. It is not a replacement for the SESSION object.
section: "2.2"
