document: rfc-5389
kind: wire-format
summary: 'The 14-bit message type field interleaves a 12-bit method (M11–M0) and 2-bit class (C1–C0). Class encodings: 0b00=request, 0b01=indication, 0b10=success response, 0b11=error response. A Binding request encodes to 0x0001; a Binding success response to 0x0101.'
