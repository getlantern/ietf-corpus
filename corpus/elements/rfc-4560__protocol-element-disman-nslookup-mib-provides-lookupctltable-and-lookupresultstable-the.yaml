document: rfc-4560
kind: protocol-element
summary: 'DISMAN-NSLOOKUP-MIB provides lookupCtlTable and lookupResultsTable. The value of lookupCtlTargetAddressType determines the lookup direction: dns(16) triggers forward lookup (name to address), while ipv4(1) or ipv6(2) triggers reverse lookup (address to name).'
section: "3.3"
topics:
