document: rfc-5650
kind: protocol-element
summary: 'Performance monitoring counters are maintained at three levels: whole-line (full/failed initializations), xTU-unit level (LOS seconds, ES, SES, FEC seconds, UAS), and bearer-channel level (CRC coding violations, corrected FEC blocks). Each level has current, 15-minute history (up to 96 buckets), and 1-day history (up to 30 buckets) counters.'
section: 2.7.1
topics:
