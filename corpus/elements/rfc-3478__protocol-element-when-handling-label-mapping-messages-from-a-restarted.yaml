document: rfc-3478
kind: protocol-element
summary: When handling Label Mapping messages from a restarted neighbor, the LSR treats stale LIB entries as if received over the new session. If the received binding matches a stale entry exactly, the stale mark is cleared. If the label differs from the stale entry, the LIB is updated with the new label.
section: "3.3"
topics:
    - mpls
    - routing
