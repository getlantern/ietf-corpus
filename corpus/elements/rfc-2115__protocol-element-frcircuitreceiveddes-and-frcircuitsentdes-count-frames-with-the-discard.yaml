document: rfc-2115
kind: protocol-element
summary: frCircuitReceivedDEs and frCircuitSentDEs count frames with the Discard Eligibility (DE) bit set, indicating frames eligible for discard during congestion. frCircuitSentDEs counts frames where the local DTE sets DE to indicate excess burst data that should be dropped preferentially.
section: "6.2"
topics:
    - congestion
