document: rfc-9967
kind: normative-requirement
summary: SCIM Events MUST use the 'sub_id' claim defined by RFC 9493 to identify the subject of events. The 'sub_id' claim MUST be contained within the main JWT claims body and MUST NOT be located within an event payload within the 'events' claim.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - json
