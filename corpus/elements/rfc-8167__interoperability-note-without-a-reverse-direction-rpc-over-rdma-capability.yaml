document: rfc-8167
kind: interoperability-note
summary: Without a reverse-direction RPC-over-RDMA capability, NFS version 4.1 clients must open an independent TCP socket for the backchannel. With bidirectional RPC-over-RDMA, forechannel and backchannel can share a single transport connection, simplifying connection management and improving scalability.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
