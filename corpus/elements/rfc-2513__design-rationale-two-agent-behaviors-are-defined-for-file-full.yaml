document: rfc-2513
kind: design-rationale
summary: 'Two agent behaviors are defined for file-full events: ''swapOnCommand'' lets the management application control swap timing (risks data discard) while ''swapOnFull'' has the agent automatically begin a new suffixed file version (risks needing extra storage). Neither is mandated; agents advertise their mode via acctngAgentMode.'
section: "3.1"
