document: rfc-6856
kind: security-consideration
summary: The 'LANG *' command may reveal a user's existence and preferred language to an active attacker if the active language changes in response to USER, PASS, or APOP commands before credentials are validated. Servers are strongly advised to implement a configuration option to prevent this exposure.
section: "7"
topics:
    - email
    - security
    - privacy
