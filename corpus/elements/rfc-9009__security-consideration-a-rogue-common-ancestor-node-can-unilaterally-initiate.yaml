document: rfc-9009
kind: security-consideration
summary: A rogue common ancestor node can unilaterally initiate DCO-based route invalidation for any target in its routing table, since it already possesses the required state (Target Address and Path Sequence). This is mitigated by RPL's credential-based network membership but remains a risk in non-secure RPL deployments.
section: "6"
topics:
    - routing
    - security
