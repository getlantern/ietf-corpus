document: rfc-4419
kind: security-consideration
summary: Only safe primes (p = 2q + 1, q prime) must be used as moduli, because they allow selection of a generator whose subgroup order does not factor into small primes, preventing subgroup confinement attacks. Van Oorschot and Wiener show that short private exponents are safe specifically with safe primes.
