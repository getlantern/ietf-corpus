document: rfc-7145
kind: protocol-element
summary: 'Login/Text key RDMAExtensions (Section 6.3): a boolean key negotiated to enable iSER-assisted mode. It MUST be offered in the first available Login Request/Response PDU in the LoginOperationalNegotiation stage and is a session-wide leading-connection-only key.'
section: "6.3"
