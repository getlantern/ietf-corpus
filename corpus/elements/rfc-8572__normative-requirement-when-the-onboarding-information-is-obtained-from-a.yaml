document: rfc-8572
kind: normative-requirement
summary: When the onboarding information is obtained from a trusted bootstrap server, the device MUST send a 'bootstrap-initiated' progress report and MUST send a terminating progress report ('boot-image-installed-rebooting', 'bootstrap-complete', or an error-specific report). When obtained from an untrusted bootstrap server, the device MUST NOT send any progress reports.
section: "5.6"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
