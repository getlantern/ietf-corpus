document: rfc-3565
kind: normative-requirement
summary: For AES key wrap OIDs, the parameters field MUST be absent. Implementations MUST support the CEK and KEK having the same length. If different lengths are supported, the KEK MUST be of equal or greater length than the CEK.
section: 2.3.2
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
