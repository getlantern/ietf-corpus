document: rfc-8405
kind: protocol-element
summary: LEARN_TIMER is started once when the first IGP event is received in QUIET state and set to TIME_TO_LEARN_INTERVAL. Its expiration transitions the FSM from SHORT_WAIT to LONG_WAIT; it is deactivated if HOLDDOWN_TIMER expires while in SHORT_WAIT.
section: "5.3"
topics:
    - routing
