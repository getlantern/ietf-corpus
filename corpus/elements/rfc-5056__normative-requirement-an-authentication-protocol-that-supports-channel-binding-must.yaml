document: rfc-5056
kind: normative-requirement
summary: An authentication protocol that supports channel binding MUST provide an input slot in its API for a handle to the channel or its channel bindings. If the protocol does not support channel binding but provides at least integrity protection, the application MUST use that integrity protection to exchange channel bindings or cryptographic hashes thereof.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
