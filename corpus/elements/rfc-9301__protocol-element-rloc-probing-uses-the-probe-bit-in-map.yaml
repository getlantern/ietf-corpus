document: rfc-9301
kind: protocol-element
summary: RLOC-Probing uses the probe-bit in Map-Request/Map-Reply to test path reachability of individual Locators. Probes are sent on a jittered timer directly to the RLOC address (not via the Mapping System) and are not encapsulated in ECMs. The ETR returns a Map-Reply with the probe-bit set and SHOULD include current mapping data.
section: "7.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
