document: rfc-5686
kind: protocol-element
summary: UEMCLIP defines four operational modes (0, 1, 3, 4); Modes 2 and 5 are reserved for future 32-kHz sampling extensions. Mode 0 is narrowband 64 kbit/s; Mode 1 is wideband 80 kbit/s; Mode 3 is narrowband enhanced 80 kbit/s; Mode 4 is wideband full 96 kbit/s.
