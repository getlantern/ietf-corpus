document: rfc-1333
kind: normative-requirement
summary: When the incoming link is good but outgoing is very bad, LQRs SHOULD be sent at a faster rate. When a LQR does not arrive within the expected time or received LQRs indicate the link is truly bad, at least one additional LQR SHOULD be sent.
section: "2.9"
rfc2119_level: SHOULD
topics:
    - tcp
