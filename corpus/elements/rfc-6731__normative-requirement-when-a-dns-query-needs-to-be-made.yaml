document: rfc-6731
kind: normative-requirement
summary: When a DNS query needs to be made, the resolver MUST give highest preference to RDNSSes explicitly known to serve a matching domain or network, and MUST take into account differences in trust levels of received RDNSS selection information.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
