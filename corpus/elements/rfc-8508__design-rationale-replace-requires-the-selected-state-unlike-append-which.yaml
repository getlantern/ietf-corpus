document: rfc-8508
kind: design-rationale
summary: REPLACE requires the selected state (unlike APPEND, which is valid in the authenticated state) because it operates on message sequence numbers. The UID variant likewise does not support use from the authenticated state, following the convention for UID commands in RFC 3501 Section 6.4.8.
section: "3.5"
