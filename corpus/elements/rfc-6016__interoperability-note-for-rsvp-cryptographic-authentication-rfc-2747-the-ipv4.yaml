document: rfc-6016
kind: interoperability-note
summary: For RSVP cryptographic authentication (RFC 2747), the IPv4 address field of any received VPN-IPv4 RSVP_HOP object MUST be used as the source address for identifying the security association. Challenge and Response messages MUST be forwarded using the same MPLS label lookup as other RSVP messages.
section: "7.2"
rfc2119_level: MUST
topics:
    - qos
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
