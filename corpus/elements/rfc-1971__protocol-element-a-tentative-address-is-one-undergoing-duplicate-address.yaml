document: rfc-1971
kind: protocol-element
summary: A tentative address is one undergoing Duplicate Address Detection. An interface must accept Neighbor Solicitation and Advertisement messages targeting a tentative address but silently discard all other packets addressed to it. A tentative address is not considered assigned to the interface.
section: "5.4"
topics:
