document: rfc-5089
kind: wire-format
summary: The PCE-DOMAIN sub-TLV (Type 3, variable length) encodes one octet domain-type (1=Area ID, 2=AS Number) followed by a variable-length IS-IS area ID or a 32-bit AS number. When a 2-octet AS number is used, the first two octets of the AS Number field MUST be set to 0.
section: "4.3"
topics:
    - routing
