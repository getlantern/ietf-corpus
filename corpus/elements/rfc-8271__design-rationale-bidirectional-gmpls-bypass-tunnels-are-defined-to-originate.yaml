document: rfc-8271
kind: design-rationale
summary: Bidirectional GMPLS bypass tunnels are defined to originate on the downstream PLR (not the upstream PLR) because the downstream PLR has the local policy information about provisioned bypass tunnels and always initiates the bypass tunnel assignment. The upstream PLR simply reflects the assignment in the reverse direction.
section: "4.1"
topics:
    - mpls
    - routing
