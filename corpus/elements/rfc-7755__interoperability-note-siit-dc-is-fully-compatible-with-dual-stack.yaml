document: rfc-7755
kind: interoperability-note
summary: 'SIIT-DC is fully compatible with dual-stack infrastructure, enabling incremental migration: designate the existing native IPv6 address as the IPv6 Service Address, assign a corresponding IPv4 Service Address, update the ''IN A'' DNS record to point to the new IPv4 Service Address, and reclaim the old native IPv4 address once all traffic has migrated.'
