document: rfc-6611
kind: protocol-element
summary: 'MIPv6 bootstrapping requires the mobile node to obtain three pieces of information: the Home Address (HoA), the home agent address, and the cryptographic materials for establishing an IPsec security association with the home agent. Cryptographic materials must be established before initiating the registration process.'
