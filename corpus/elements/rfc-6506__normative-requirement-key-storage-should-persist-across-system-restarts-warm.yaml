document: rfc-6506
kind: normative-requirement
summary: Key storage SHOULD persist across system restarts (warm or cold). If the last key on an interface expires, the router SHOULD send a 'last Authentication Key expiration' notification and treat the key as having infinite lifetime rather than reverting to an unauthenticated state.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
