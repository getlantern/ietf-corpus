summary: 'Candidate Racing encompasses three sub-types: Protocol Option Racing (attempting multiple Protocol Stacks differing in protocol composition or options), Path Racing (attempting stacks across different available paths, each performing separate DNS resolution), and Remote Endpoint Racing (attempting stacks differing by resolved Remote Endpoint Identifier such as a specific IP address).'
