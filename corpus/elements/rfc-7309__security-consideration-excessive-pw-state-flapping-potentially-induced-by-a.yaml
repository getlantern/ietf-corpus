document: rfc-7309
kind: security-consideration
summary: Excessive PW state flapping—potentially induced by a malicious peer PE implementation—can cause excessive ICCP message exchanges, creating a denial-of-service risk. Implementations SHOULD provide mechanisms for control-plane policing to mitigate such attacks.
section: "7"
rfc2119_level: SHOULD
topics:
