document: rfc-9177
kind: normative-requirement
summary: To indicate support for Q-Block2 responses, the CoAP client MUST include the Q-Block2 option in a GET/FETCH or the Q-Block1 option in a PUT/POST so the server knows to use Q-Block2 for large response bodies instead of falling back to Block2.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
