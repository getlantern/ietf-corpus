document: rfc-5151
kind: normative-requirement
summary: If the ingress node of an inter-domain TE LSP has specified restrictions on signaling methods via the Path message, the domain border node MUST adhere to those restrictions. If no allowed signaling method is available, the domain border node MUST send a PathErr.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
