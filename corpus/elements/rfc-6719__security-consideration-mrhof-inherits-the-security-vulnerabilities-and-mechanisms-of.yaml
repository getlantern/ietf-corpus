document: rfc-6719
kind: security-consideration
summary: MRHOF inherits the security vulnerabilities and mechanisms of RPL (RFC 6550). It does not introduce new flows or messages, but depends on RPL protocol elements whose compromise could cause misrouting. Deployments are RECOMMENDED to use RPL security mechanisms if routing information might be modified or spoofed.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
