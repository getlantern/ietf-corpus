document: rfc-9294
kind: normative-requirement
summary: Maximum Link Bandwidth MUST be encoded only in the top-level BGP-LS Maximum Link Bandwidth TLV (1089) and MUST NOT be advertised within the BGP-LS ASLA TLV, even though RFC 8919 allows it in IS-IS ASLA sub-TLV.
section: "4"
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
