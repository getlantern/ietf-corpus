document: rfc-7639
kind: wire-format
summary: The ALPN header field syntax is defined as `ALPN = 1#protocol-id` where `protocol-id = token`. Octets not allowed in tokens MUST be percent-encoded per RFC 3986 Section 2.1, and the percent character '%' (hex 25) MUST itself be percent-encoded.
section: "2.2"
topics:
    - http
