document: rfc-7977
kind: design-rationale
summary: MSRP WebSocket Clients use a random token followed by the ".invalid" TLD (RFC 2606) in the hostpart of their From-Path URI because the JavaScript WebSocket API in browsers cannot discover the local transport address used for the WebSocket connection.
