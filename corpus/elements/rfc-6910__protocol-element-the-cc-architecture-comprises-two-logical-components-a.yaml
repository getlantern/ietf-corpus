document: rfc-6910
kind: protocol-element
summary: 'The CC architecture comprises two logical components: a ''caller''s agent'' on the originating side and a ''callee''s monitor'' on the terminating side. These may be integrated into UAs, implemented as independent end-systems, or provided by centralized application servers, and either endpoint may support both roles independently.'
