document: rfc-4283
kind: privacy-consideration
summary: The MN-NAI option reveals the home affiliation of a user, potentially assisting attackers in determining user identity, targeting specific victims, or probing the username space. Mitigations include link-layer encryption, IPsec, or use of privacy NAIs and temporary pseudonyms as identifiers.
section: "4.2"
topics:
