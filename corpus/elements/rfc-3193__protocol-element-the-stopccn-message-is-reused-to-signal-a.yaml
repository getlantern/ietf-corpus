document: rfc-3193
kind: protocol-element
summary: 'The StopCCN message is reused to signal a responder IP address change: Result Code MUST be 2 (General Error), Error Code MUST be 7 (Try Another), and the error message field carries the ASCII-encoded new IP address in dotted-decimal (IPv4) or RFC 2373 (IPv6) format.'
section: 4.2.3
