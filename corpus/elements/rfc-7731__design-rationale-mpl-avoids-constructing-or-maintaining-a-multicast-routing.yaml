document: rfc-7731
kind: design-rationale
summary: 'MPL avoids constructing or maintaining a multicast routing topology because topology maintenance in LLNs is prohibitively expensive: devices may only afford one or a few neighbor routes, and maintaining a connected dominating set for multicast requires two-hop topology information whose cost grows polynomially with network density.'
section: "1"
