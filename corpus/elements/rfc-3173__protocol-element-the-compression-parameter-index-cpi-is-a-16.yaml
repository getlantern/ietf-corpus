document: rfc-3173
kind: protocol-element
summary: 'The Compression Parameter Index (CPI) is a 16-bit field: values 0-63 are well-known algorithms for manual setup; 64-255 reserved; 256-61439 negotiated between nodes; 61440-65535 for private use. The outbound IPComp header MUST use the CPI chosen by the decompressing node.'
section: "3.3"
topics:
