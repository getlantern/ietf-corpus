document: rfc-7981
kind: design-rationale
summary: The stale-TLV prohibition (MUST NOT use TLV from unreachable originator) prevents routers in remote areas from acting on outdated capability information when an area partitions, since there is no reliable way to choose between conflicting copies from different L1/L2 border routers.
section: "3"
topics:
    - routing
