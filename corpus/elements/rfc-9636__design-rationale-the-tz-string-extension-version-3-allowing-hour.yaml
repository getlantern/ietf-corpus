document: rfc-9636
kind: design-rationale
summary: The TZ string extension (version 3+) allowing hour values from -167 to 167 was added to support time zones like parts of Western Australia that observe DST with transitions occurring on the day before the official date — POSIX's unsigned 0-24 range cannot represent the required negative hour values.
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
