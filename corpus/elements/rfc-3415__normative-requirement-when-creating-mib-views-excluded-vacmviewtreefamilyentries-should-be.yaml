document: rfc-3415
kind: normative-requirement
summary: When creating MIB views, 'excluded' vacmViewTreeFamilyEntries SHOULD be created first and then 'included' entries. When deleting, 'included' entries SHOULD be deleted first and then 'excluded' entries, to avoid temporarily granting unwanted access during transitions.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
