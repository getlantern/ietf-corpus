document: rfc-4308
kind: normative-requirement
summary: In VPN-A, if the initiator includes a new Diffie-Hellman key during rekeying, it MUST be of type 1024-bit MODP, and the responder MUST also include a Diffie-Hellman key of type 1024-bit MODP.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
