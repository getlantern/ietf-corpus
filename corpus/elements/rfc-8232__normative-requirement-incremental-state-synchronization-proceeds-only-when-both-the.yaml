document: rfc-8232
kind: normative-requirement
summary: Incremental State Synchronization proceeds only when both the D bit (DELTA-LSP-SYNC-CAPABILITY) and S bit (INCLUDE-DB-VERSION) are set to 1 by both PCC and PCE. Other combinations of D and S flags result in full LSP-DB synchronization.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
