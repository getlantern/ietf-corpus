document: rfc-2290
kind: protocol-element
summary: The Mobile-IPv4 Configuration Option for IPCP has Type=4 and carries the mobile node's home IP address. It is used alongside the IP-Address option to negotiate appropriate Mobile IP behavior during the IPCP phase of PPP.
