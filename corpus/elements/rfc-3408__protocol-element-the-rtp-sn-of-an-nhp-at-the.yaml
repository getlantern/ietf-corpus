document: rfc-3408
kind: protocol-element
summary: The RTP SN of an NHP at the decompressor is determined as SN_Ref_D + Offset_D, where SN_Ref_D is the RTP SN of the last update packet received and Offset_D is the sequence number offset between the NHP and that last update packet.
