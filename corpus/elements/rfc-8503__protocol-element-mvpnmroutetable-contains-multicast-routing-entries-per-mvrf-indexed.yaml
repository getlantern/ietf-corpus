document: rfc-8503
kind: protocol-element
summary: mvpnMrouteTable contains multicast routing entries per MVRF indexed by (VRF name, group address/prefix, source address/prefix). Columns include upstream neighbor, incoming interface, expiry time, routing/forwarding protocol, octet/packet counters (Counter64), TTL-dropped counters, a PMSI pointer, and local/remote replication counts.
