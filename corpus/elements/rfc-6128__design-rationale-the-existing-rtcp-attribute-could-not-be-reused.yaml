document: rfc-6128
kind: design-rationale
summary: The existing 'rtcp' attribute could not be reused to specify the SSM session's RTCP port because it was already used for the Feedback Target address and port, creating potential ambiguity. A new attribute 'multicast-rtcp' was introduced to remove the unnecessary restriction imposed by the +1 rule.
section: "1"
topics:
    - rtp
    - multicast
    - realtime
