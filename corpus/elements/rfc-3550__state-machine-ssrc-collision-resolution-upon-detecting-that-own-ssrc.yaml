document: rfc-3550
kind: state-machine
summary: 'SSRC collision resolution: upon detecting that own SSRC is in use by a different source transport address, the participant sends RTCP BYE for the old SSRC (unless it has not yet sent data) and selects a new SSRC. Loop detection uses the same mechanism: receiving own RTP packets from an unexpected address signals a forwarding loop.'
section: "8.2"
topics:
    - rtp
    - realtime
