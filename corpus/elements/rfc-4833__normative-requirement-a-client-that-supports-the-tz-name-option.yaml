document: rfc-4833
kind: normative-requirement
summary: A client that supports the TZ Name option SHOULD prefer the TZ Name option over the POSIX string if it recognizes the returned TZ Name. If the client does not recognize the TZ Name, it MUST ignore this option.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
