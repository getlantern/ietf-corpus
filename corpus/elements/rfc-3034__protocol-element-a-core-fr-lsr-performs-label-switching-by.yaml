document: rfc-3034
kind: protocol-element
summary: A core FR-LSR performs label switching by looking up the incoming DLCI in its DLCI Information Base and replacing it with the corresponding output DLCI, then forwarding on the outgoing interface — identical in mechanism to conventional Frame Relay VC switching. EXP, S, and TTL fields in the top label stack entry remain significant; the label value itself is carried in the DLCI.
section: "5.6"
topics:
