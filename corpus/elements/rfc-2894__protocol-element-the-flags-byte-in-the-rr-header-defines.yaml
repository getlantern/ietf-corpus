document: rfc-2894
kind: protocol-element
summary: 'The Flags byte in the RR Header defines five bits: T (Test — simulate only, no actual reconfiguration), R (Result requested — router MUST send Result), A (All interfaces — include administratively shut down interfaces), S (Site-specific — restrict to same site as receiving interface), and P (Processed previously — set in Result for duplicate commands).'
section: "3.1"
topics:
