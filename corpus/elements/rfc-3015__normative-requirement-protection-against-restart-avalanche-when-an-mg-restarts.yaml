document: rfc-3015
kind: normative-requirement
summary: 'Protection against restart avalanche: when an MG restarts and must register with an MGC, it SHOULD delay its ServiceChange(Boot) by a random interval to prevent simultaneous flooding of the MGC by many MGs restarting concurrently.'
section: "9.2"
rfc2119_level: SHOULD
topics:
    - realtime
