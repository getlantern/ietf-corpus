document: rfc-9892
kind: normative-requirement
summary: A router MUST ensure each DS Field value is listed only once across the whole Traffic Classification Data Item (not just per Sub-Data Item). Duplicates MUST cause the Data Item to be treated as an error.
section: 2.2.1
rfc2119_level: MUST
topics:
