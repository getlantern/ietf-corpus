document: rfc-4204
kind: protocol-element
summary: The BeginVerify message initiates link connectivity verification, carrying the count of data links to verify, VerifyInterval, supported encoding and transport mechanisms, data rate, and optionally a wavelength identifier. The BeginVerifyAck response includes a node-unique 32-bit Verify_Id used to correlate all subsequent verification messages.
section: "5"
