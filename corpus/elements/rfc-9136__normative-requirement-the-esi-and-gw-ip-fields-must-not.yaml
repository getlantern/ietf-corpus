document: rfc-9136
kind: normative-requirement
summary: The ESI and GW IP fields MUST NOT both be non-zero at the same time. A route containing a non-zero GW IP and a non-zero ESI simultaneously SHOULD be treated as withdraw.
section: "3.2"
rfc2119_level: MUST NOT
topics:
