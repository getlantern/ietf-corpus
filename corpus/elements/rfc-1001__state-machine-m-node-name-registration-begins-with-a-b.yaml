document: rfc-1001
kind: state-machine
summary: M node name registration begins with a B-node-style broadcast; any NEGATIVE NAME REGISTRATION RESPONSE terminates the attempt. If no negative response is received, the M node continues with P-node registration via the NBNS. Both phases must succeed for the name to be acquired.
section: 15.2.3
topics:
    - udp
    - tcp
