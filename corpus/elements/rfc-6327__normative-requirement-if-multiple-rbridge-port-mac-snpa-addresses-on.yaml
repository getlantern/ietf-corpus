document: rfc-6327
kind: normative-requirement
summary: If multiple RBridge port MAC (SNPA) addresses on a link are the same, all but one of such ports MUST be put in the Suspended state and do not participate in the link except to monitor whether they should remain suspended.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
