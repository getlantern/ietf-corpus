document: rfc-2051
kind: protocol-element
summary: appcCnosResponsible controls which LU (source or target) is responsible for selecting and deactivating sessions when a CHANGE_SESSION_LIMIT or RESET_SESSION_LIMIT reduces the session limit. The target LU may negotiate 'target' back to 'source', but the source LU cannot negotiate 'source' to 'target'.
