summary: 'KEYMAT for Camellia-CCM is key-length plus 3 octets: 19 octets (128-bit key + 3-octet salt), 27 octets (192-bit key + 3-octet salt), or 35 octets (256-bit key + 3-octet salt). The trailing 3 octets serve as the salt value in the counter block.'
