document: rfc-6388
kind: protocol-element
summary: The LDP MP MBB Capability Parameter (type 0x050A) is advertised to indicate an LSR can handle MBB LSPs. If an LSR has not advertised MBB capability, its LDP peers MUST NOT send messages including MBB parameters.
section: "8.3"
topics:
