document: rfc-8200
kind: privacy-consideration
summary: IPv6 addresses of nodes are more visible on the Internet than IPv4 addresses because address translation technology use is reduced. This makes it easier to distinguish endpoints, creating additional privacy issues. See RFC 7721 for security and privacy considerations for IPv6 address generation mechanisms.
section: "10"
topics:
    - ip
    - privacy
