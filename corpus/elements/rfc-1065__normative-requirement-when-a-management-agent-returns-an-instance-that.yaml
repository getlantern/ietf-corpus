document: rfc-1065
kind: normative-requirement
summary: When a management agent returns an instance that is a superset of the expected object type (due to multi-version support), a manager should ignore additional information beyond the expected definition. However, control actions must fail if the instance syntax does not match the expected type.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
