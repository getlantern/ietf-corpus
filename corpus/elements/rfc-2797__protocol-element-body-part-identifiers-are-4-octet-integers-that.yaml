document: rfc-2797
kind: protocol-element
summary: Body Part Identifiers are 4-octet integers that uniquely identify each element within a single PKIData or PKIResponse object. The value zero is reserved to designate the current PKIData object; duplicate IDs within a single object MUST result in a badRequest error.
section: "3.4"
topics:
