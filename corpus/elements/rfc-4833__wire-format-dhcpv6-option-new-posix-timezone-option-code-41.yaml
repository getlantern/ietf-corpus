document: rfc-4833
kind: wire-format
summary: DHCPv6 OPTION_NEW_POSIX_TIMEZONE (option-code 41) encodes a TZ POSIX string. The 16-bit option-code field is 41, followed by a 16-bit option-length giving the number of octets, followed by the TZ POSIX string.
