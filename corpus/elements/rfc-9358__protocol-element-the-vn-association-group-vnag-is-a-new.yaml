document: rfc-9358
kind: protocol-element
summary: The VN Association Group (VNAG) is a new association group that binds a set of LSPs to a Virtual Network (VN). It reuses the generic ASSOCIATION object from RFC 8697 with a new Association Type value of 7 ('VN Association'). The VNAG Identifier is handled identically to the generic Association Identifier defined in RFC 8697.
section: "3"
topics:
