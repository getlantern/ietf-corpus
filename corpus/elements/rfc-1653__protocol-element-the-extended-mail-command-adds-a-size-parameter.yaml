document: rfc-1653
kind: protocol-element
summary: The extended MAIL command adds a SIZE parameter after the sender address. The value is a decimal representation of the declared message size in octets, including headers, body, and CR-LF sequences, but excluding the DATA terminating dot or doubled quoting dots. Only one SIZE parameter may appear in a single MAIL command.
