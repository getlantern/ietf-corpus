document: rfc-7176
kind: wire-format
summary: The Nickname sub-TLV (NICKNAME, sub-TLV type 6) carries one or more 5-byte nickname records, each with a 1-byte Nickname.Pri (hold priority), 2-byte Tree Root Priority, and 2-byte Nickname value, as specified in RFC 6325 Section 3.7.
