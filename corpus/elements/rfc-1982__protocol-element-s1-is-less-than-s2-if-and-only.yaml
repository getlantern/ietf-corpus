document: rfc-1982
kind: protocol-element
summary: s1 is less than s2 if and only if (i1 < i2 and i2 - i1 < 2^(SERIAL_BITS-1)) or (i1 > i2 and i1 - i2 > 2^(SERIAL_BITS-1)), where i1, i2 are the unbounded integer equivalents of s1, s2.
