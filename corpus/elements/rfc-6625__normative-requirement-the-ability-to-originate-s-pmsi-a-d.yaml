document: rfc-6625
kind: normative-requirement
summary: The ability to originate S-PMSI A-D routes with a particular kind of wildcard is OPTIONAL. However, if a PE has the ability to originate such routes, it MUST have the ability to interpret and correctly process S-PMSI A-D routes with that kind of wildcard.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
