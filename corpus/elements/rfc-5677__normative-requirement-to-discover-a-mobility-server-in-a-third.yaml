document: rfc-5677
kind: normative-requirement
summary: To discover a Mobility Server in a third-party remote network (Scenario S3), the MN MUST use the DNS-based MoS discovery method described in RFC 5679 and MUST first learn the domain name of the network containing the desired MoS.
section: "5.3"
rfc2119_level: MUST
