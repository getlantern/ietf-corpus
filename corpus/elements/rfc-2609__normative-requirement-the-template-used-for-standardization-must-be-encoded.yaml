document: rfc-2609
kind: normative-requirement
summary: The template used for standardization MUST be encoded in the 0x00–0x7F subrange of UTF-8 (ASCII) and be in English. All characters outside the ASCII range MUST be escaped using '\' HEXDIG HEXDIG syntax.
section: "3.1"
rfc2119_level: MUST
