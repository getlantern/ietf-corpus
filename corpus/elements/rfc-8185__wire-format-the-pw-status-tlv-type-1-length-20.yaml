summary: 'The PW Status TLV (Type=1, Length=20 bytes) contains: Destination Dual-Homing PE Node_ID (32-bit), Source Dual-Homing PE Node_ID (32-bit), DNI-PW ID (32-bit), Flags (32-bit, P bit indicates working/protection role), and Service PW Status (32-bit, F bit for Signal Fail, D bit for Signal Degrade).'
