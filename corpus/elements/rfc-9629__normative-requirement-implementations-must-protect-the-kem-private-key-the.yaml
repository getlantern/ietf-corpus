document: rfc-9629
kind: normative-requirement
summary: Implementations MUST protect the KEM private key, the KEK, and the CEK (or CAEK). Compromise of the KEM private key may result in disclosure of all contents protected with that key; compromise of the KEK, CEK, or CAEK affects only a single message.
section: "7"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
