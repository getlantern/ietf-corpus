document: rfc-8480
kind: design-rationale
summary: The SeqNum is implemented as a lollipop counter (rolls 0xFF→0x01, not 0xFF→0x00) specifically so that a value of 0x00 is reserved as an unambiguous signal of a node reset or CLEAR. This allows a neighbor to distinguish a freshly-reset node from normal counter progression and detect schedule inconsistency without additional signaling.
section: 3.4.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
