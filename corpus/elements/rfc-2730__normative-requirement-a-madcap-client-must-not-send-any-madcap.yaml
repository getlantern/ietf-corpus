document: rfc-2730
kind: normative-requirement
summary: A MADCAP client MUST NOT send any MADCAP message to the MADCAP Server Multicast Address associated with the global scope. Clients SHOULD restrict multicast messages to the IPv4 Local Scope address (or SCOP 3 for IPv6) unless otherwise configured.
section: "2.11"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
