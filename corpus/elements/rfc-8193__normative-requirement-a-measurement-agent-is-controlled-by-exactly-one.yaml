document: rfc-8193
kind: normative-requirement
summary: A Measurement Agent is controlled by exactly one Controller at a time. If the MA-ID is not provided during preconfiguration, it MUST be provided by the Controller during the Configuration phase.
section: "4.2"
rfc2119_level: MUST
