document: rfc-4626
kind: security-consideration
summary: 'Several read-write MIB objects are sensitive: t11FspfMinLsArrival, t11FspfMinLsInterval, t11FspfIfHelloInterval, t11FspfIfDeadInterval, and t11FspfIfRetransmitInterval can alter FSPF responsiveness; t11FspfAdminStatus and t11FspfIfAdminStatus can disable dynamic routing; t11FspfIfLinkCostFactor can alter link selection; t11FspfSetToDefault can nullify configuration.'
section: "9"
topics:
    - security
    - routing
    - snmp
