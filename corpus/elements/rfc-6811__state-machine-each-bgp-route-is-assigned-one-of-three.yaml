document: rfc-6811
kind: state-machine
summary: 'Each BGP route is assigned one of three validation states: NotFound (no VRP covers the route prefix), Valid (at least one VRP matches the route prefix), or Invalid (at least one VRP covers the route prefix but none matches). The state is computed per the lookup procedure and is a local property of the route.'
