document: rfc-4606
kind: normative-requirement
summary: Intermediate and egress nodes MUST verify support for the requested Signal Type, RCC, NCC, NVC, and Multiplier. If unsupported, the receiver node MUST generate a PathErr 'Traffic Control Error/Service unsupported' (RSVP-TE) or NOTIFICATION 'Resource Unavailable' (CR-LDP) message.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
