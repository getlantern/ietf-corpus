document: rfc-3517
kind: normative-requirement
summary: Upon an RTO, the sender SHOULD expunge SACK information (per RFC 2018) since the receiver may have reneged, but SHOULD still use SACK information that arrives during the subsequent slow-start recovery phase to guide retransmissions.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
