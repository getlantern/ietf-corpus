document: rfc-4491
kind: normative-requirement
summary: To convert a GOST signature octet string to a bit string for use in certificates and CRLs, the most significant bit of the first octet SHALL become the first bit of the bit string, continuing through the least significant bit of the last octet.
section: 2.2.1
rfc2119_level: SHALL
topics:
    - crypto
    - pkix
