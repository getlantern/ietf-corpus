document: rfc-9363
kind: wire-format
summary: Target Value entries use a tv-struct with an index (uint16) and value (binary). For equal and MSB operators, a single element at index 0 is used; for match-mapping, multiple consecutive entries starting at index 0 are used, and the highest index determines residue index bit-width.
section: "4.7"
