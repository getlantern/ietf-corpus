document: rfc-3501
kind: protocol-element
summary: Unique Identifier (UID) is a 32-bit value assigned to each message. Combined with UIDVALIDITY, it forms a 64-bit identifier that MUST NOT refer to any other message in the mailbox or any subsequent mailbox with the same name forever. UIDs are assigned in strictly ascending order.
section: 2.3.1.1
topics:
    - email
