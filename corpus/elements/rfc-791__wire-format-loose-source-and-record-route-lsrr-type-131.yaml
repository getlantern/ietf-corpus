document: rfc-791
kind: wire-format
summary: Loose Source and Record Route (LSRR, Type=131) and Strict Source and Record Route (SSRR, Type=137) options contain a length octet, a pointer to the next address to process, and a series of 32-bit internet addresses. The current destination is replaced by the next route address at each hop and the recorded address written in its place.
section: "3.1"
topics:
