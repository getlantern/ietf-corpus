document: rfc-7459
kind: design-rationale
summary: The term 'accuracy' is deliberately treated as qualitative only. Assigning a number to 'accuracy' or using it as a synonym for uncertainty conflates a quantitative measure with a qualitative descriptor, which leads to incorrect usage. Uncertainty (quantitative) and accuracy (qualitative) serve distinct purposes.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
