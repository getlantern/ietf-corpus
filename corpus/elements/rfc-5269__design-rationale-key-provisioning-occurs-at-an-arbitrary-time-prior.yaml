document: rfc-5269
kind: design-rationale
summary: Key provisioning occurs at an arbitrary time prior to handover, relieving performance overhead on the handover process itself. The CGA from the provisioning exchange names the handover key, so the previous care-of CGA in the FBU acts as the key identifier.
section: "1"
topics:
    - mobility
    - security
