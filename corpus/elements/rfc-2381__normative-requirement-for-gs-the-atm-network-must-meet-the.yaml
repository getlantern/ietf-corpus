document: rfc-2381
kind: normative-requirement
summary: For GS, the ATM network MUST meet the delay performance advertised through Adspec parameters MPL, C, and D. Both service break bits MUST be set if reservations are honored but sufficient resources to avoid congestion loss are not allocated.
