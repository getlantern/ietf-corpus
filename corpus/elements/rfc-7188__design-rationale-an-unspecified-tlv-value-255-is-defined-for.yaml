document: rfc-7188
kind: design-rationale
summary: An UNSPECIFIED TLV value (255) is defined for LOCAL_IF, LINK_STATUS, and OTHER_NEIGHB to enable more efficient multivalue Address Block TLVs and simplify implementations; its interpretation is identical to the address not being associated with a TLV of that type.
