document: rfc-9766
kind: wire-format
summary: 'The LAYOUT_WCC4args structure encodes three fields: lowa_stateid (stateid4), lowa_type (layouttype4), and lowa_body (variable-length opaque). The stateid and current filehandle identify the layout; lowa_type indicates how to interpret lowa_body; lowa_body carries the layout-type-specific data file attributes.'
