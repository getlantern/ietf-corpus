document: rfc-1938
kind: normative-requirement
summary: 'To resolve ambiguity between six-word and hex encodings, all implementations MUST use the following scheme: if a six-word encoded OTP is valid, accept it; otherwise if it can be interpreted as hexadecimal and that decoding is valid, accept it.'
section: "6.0"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
