document: rfc-5555
kind: normative-requirement
summary: After accepting a binding update that includes an IPv4 home address option, the home agent MUST include the IPv4 address acknowledgement option in the binding acknowledgement; if absent, the mobile node MUST assume the home agent does not support the IPv4 home address option and SHOULD NOT include it in future binding updates to that home agent.
section: 2.3.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
