document: rfc-5872
kind: design-rationale
summary: IANA rules for PANA are relaxed to add IESG Approval as an additional allocation path alongside existing mechanisms. This enables the IESG to consider allocation requests (e.g., for experimental protocol extensions from reserved bits) that do not fulfill the default rule, provided sufficient bits remain and the PANA community concurs.
