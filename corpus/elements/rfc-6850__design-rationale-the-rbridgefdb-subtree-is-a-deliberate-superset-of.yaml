document: rfc-6850
kind: design-rationale
summary: The rbridgeFdb subtree is a deliberate superset of the BRIDGE-MIB and Q-BRIDGE-MIB FDB subtrees, adding the egress nickname and ESADI-source status fields needed for TRILL forwarding that have no equivalent in 802.1D/Q management.
