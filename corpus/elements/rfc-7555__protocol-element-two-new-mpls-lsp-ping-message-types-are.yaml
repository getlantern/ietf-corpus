document: rfc-7555
kind: protocol-element
summary: 'Two new MPLS LSP Ping message types are defined: Type 3 (MPLS Proxy Ping Request) and Type 4 (MPLS Proxy Ping Reply). They use the existing RFC 4379 packet format. Proxy Ping messages use UDP destination port 3503.'
