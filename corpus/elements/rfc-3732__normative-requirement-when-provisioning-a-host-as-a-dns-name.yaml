document: rfc-3732
kind: normative-requirement
summary: When provisioning a host as a DNS name server, IP addresses SHOULD be required only as needed to generate DNS glue records. A server MAY reject IP addresses not allocated for public use by IANA.
section: "2.5"
rfc2119_level: SHOULD
topics:
