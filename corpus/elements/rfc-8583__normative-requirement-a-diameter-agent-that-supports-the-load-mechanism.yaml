document: rfc-8583
kind: normative-requirement
summary: A Diameter Agent that supports the Load mechanism MUST include a peer-load report in sufficient answer messages to ensure all users of the load information receive timely updates, and MUST include its own DiameterIdentity in the SourceID AVP with Load-Type of PEER.
section: 6.1.2
rfc2119_level: MUST
topics:
    - diameter
