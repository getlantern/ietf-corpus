document: rfc-2212
kind: normative-requirement
summary: If the sum of per-element C or D values exceeds (2^32)-1, the end-to-end error term MUST be set to (2^32)-1. Individual elements may advertise C up to 2^28 bytes and D up to 2^28 microseconds.
section: Exported Information
rfc2119_level: MUST
topics:
    - qos
