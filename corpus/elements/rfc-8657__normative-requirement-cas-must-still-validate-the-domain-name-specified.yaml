document: rfc-8657
kind: normative-requirement
summary: CAs MUST still validate the domain name specified in an "issue" or "issuewild" record as described in RFC 8659, even when "accounturi" is present. The "accounturi" parameter does not replace domain name validation.
section: "3"
rfc2119_level: MUST
topics:
