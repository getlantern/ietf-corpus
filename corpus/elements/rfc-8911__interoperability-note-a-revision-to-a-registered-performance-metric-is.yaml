document: rfc-8911
kind: interoperability-note
summary: A revision to a Registered Performance Metric is backward compatible if it corrects only editorial errors, resolves usage-blocking ambiguities, adds missing information without changing meaning, harmonizes with a corrected external reference, or fills in a new non-applicable column. The Name's RFCXXXXsecY portion SHALL remain unchanged for backward-compatible revisions.
section: "8.2"
topics:
