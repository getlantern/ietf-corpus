document: rfc-2271
kind: security-consideration
summary: Denial-of-service and traffic analysis attacks are explicitly out of scope for Security Models in this architecture. DoS attacks are often indistinguishable from normal network failures that a viable management protocol must tolerate; traffic patterns are predictable, so protection against traffic analysis provides little practical advantage.
section: "1.4"
topics:
    - snmp
    - security
