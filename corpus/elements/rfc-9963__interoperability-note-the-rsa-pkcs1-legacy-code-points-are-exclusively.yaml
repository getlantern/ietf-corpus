document: rfc-9963
kind: interoperability-note
summary: The rsa_pkcs1_*_legacy code points are exclusively defined for client CertificateVerify; servers that wish to advertise support for RSASSA-PKCS1-v1_5 in certificates should use the existing rsa_pkcs1_* constants from RFC 8446, not these new ones.
