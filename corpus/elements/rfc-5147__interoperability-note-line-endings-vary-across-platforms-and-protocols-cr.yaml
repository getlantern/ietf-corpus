document: rfc-5147
kind: interoperability-note
summary: 'Line endings vary across platforms and protocols: CR+LF (Internet/Windows), LF (Unix), CR (classic MacOS), NEL, and CR+NEL are all possible. Implementations must handle the conventions of their deployment context, and all SHOULD support CR+LF.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
