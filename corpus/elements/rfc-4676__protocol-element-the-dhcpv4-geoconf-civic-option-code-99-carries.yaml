document: rfc-4676
kind: protocol-element
summary: The DHCPv4 GEOCONF_CIVIC option (code 99) carries civic location information. It begins with a 1-octet option code (99), 1-octet length N (minimum 3), a 1-octet 'what' field, a 2-octet ISO 3166 country code, followed by variable-length civic address elements.
