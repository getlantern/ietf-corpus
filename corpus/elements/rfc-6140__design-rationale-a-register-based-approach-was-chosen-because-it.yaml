document: rfc-6140
kind: design-rationale
summary: A REGISTER-based approach was chosen because it has seen significant deployment momentum in SIP-PBX environments, particularly for E.164-addressed systems needing to avoid DNS entries or static IP addresses. This document standardizes an approach already in widespread use rather than introducing a wholly new mechanism.
