document: rfc-1368
kind: protocol-element
summary: 'Three traps are defined: rptrHealth (sent when rptrOperStatus changes, must include rptrOperStatus), rptrGroupChange (sent when a group is added or removed, includes rptrGroupIndex), and rptrResetEvent (sent on completion of a management-triggered repeater reset, includes rptrOperStatus).'
