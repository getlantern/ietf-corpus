document: rfc-7694
kind: design-rationale
summary: Content codings can be used in request messages, but discoverability was not on par with response messages. This specification solves that by reusing the existing 'Accept-Encoding' header in responses, avoiding a new header, and also updates the 415 status code definition to recommend inclusion of the field.
section: "1"
topics:
    - http
