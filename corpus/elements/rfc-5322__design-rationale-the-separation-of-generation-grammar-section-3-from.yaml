document: rfc-5322
kind: design-rationale
summary: 'The separation of ''generation'' grammar (section 3) from ''interpretation'' grammar (sections 3+4) reflects a deliberate design: obsolete syntax forms are non-interoperable or cause significant problems for recipients, so implementations must be able to read them for backward compatibility but must not produce them in new messages.'
section: "4"
