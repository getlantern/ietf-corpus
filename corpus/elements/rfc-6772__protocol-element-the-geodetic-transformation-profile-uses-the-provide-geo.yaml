document: rfc-6772
kind: protocol-element
summary: The geodetic-transformation profile uses the <provide-geo> element with a 'radius' attribute (integer, in meters). The six-step algorithm maps a measured location M to one of four grid landmarks (SW, SE, NW, NE) and returns a circle of the specified radius centered on that landmark, ensuring consistent obfuscation while the Target remains in the same grid cell.
section: 6.5.2
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
