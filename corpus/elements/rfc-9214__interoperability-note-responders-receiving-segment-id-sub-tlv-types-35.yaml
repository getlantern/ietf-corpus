document: rfc-9214
kind: interoperability-note
summary: Responders receiving Segment ID sub-TLV Types 35 or 36 with protocol value 1 (OSPF) MAY treat it as 'Any IGP Protocol' (value 0) to maintain compatibility with legacy implementations that incorrectly used value 1 to indicate OSPFv3.
