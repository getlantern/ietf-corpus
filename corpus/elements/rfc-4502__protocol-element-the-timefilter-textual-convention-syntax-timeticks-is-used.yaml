document: rfc-4502
kind: protocol-element
summary: The TimeFilter textual convention (SYNTAX TimeTicks) is used as the first INDEX component in time-filtered tables. An agent returns a conceptual entry only if any column within it has changed since the sysUpTime value given as the TimeFilter index, enabling incremental polling.
