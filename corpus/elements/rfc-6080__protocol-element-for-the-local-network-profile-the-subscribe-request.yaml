document: rfc-6080
kind: protocol-element
summary: For the local-network profile, the SUBSCRIBE Request-URI MUST have no user part and MUST set the host to '_sipuaconfig' dot-concatenated with the local network domain (e.g., sip:_sipuaconfig.airport.example.net). The From field is set to the user AoR if configured, otherwise 'anonymous@anonymous.invalid'.
section: 5.1.4.1
topics:
    - sip
