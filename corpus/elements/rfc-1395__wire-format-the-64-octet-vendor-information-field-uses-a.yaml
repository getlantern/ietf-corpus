document: rfc-1395
kind: wire-format
summary: The 64-octet vendor information field uses a free-format, length-tagged sub-field encoding. Each variable-length sub-field consists of one tag octet, one length octet, and length octets of data; lengths are exclusive of tag and length octets; all multi-byte quantities are in network byte order.
section: BOOTP Vendor Information Format
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
