document: rfc-4213
kind: normative-requirement
summary: The decapsulator MUST support an IPv6 MRU of at least the maximum of 1500 bytes and the largest IPv6 interface MTU on the decapsulator, and MUST be capable of reassembling an IPv4 packet up to the same size threshold.
section: "3.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
