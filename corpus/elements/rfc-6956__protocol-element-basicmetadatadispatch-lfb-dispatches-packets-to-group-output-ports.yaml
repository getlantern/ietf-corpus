document: rfc-6956
kind: protocol-element
summary: BasicMetadataDispatch LFB dispatches packets to group output ports based on a metadata value lookup in a metadata dispatch table (MetadataDispatchTableType). GenericScheduler LFB abstracts queue scheduling, currently supporting Round Robin (RR) discipline, and exposes a QueueStatsTable for per-queue depth monitoring in packets and bytes.
section: "5.5"
