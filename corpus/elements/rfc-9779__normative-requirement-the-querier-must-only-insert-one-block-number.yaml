document: rfc-9779
kind: normative-requirement
summary: The querier MUST only insert one Block Number TLV in the query message; the responder that supports this TLV MUST only insert one Block Number TLV in the response message and MUST return the first Block Number TLV from the query, ignoring others. The R flag MUST be clear in the query and set in the response.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
