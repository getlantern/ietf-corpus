document: rfc-5858
kind: design-rationale
summary: 'The ROHC channel parameters LARGE_CIDS and FEEDBACK_FOR are omitted from the SPD because they are set implicitly: LARGE_CIDS derives directly from MAX_CID, and FEEDBACK_FOR is always the reverse-direction SA. Including them explicitly would be redundant.'
section: "3.1"
topics:
    - ipsec
    - vpn
