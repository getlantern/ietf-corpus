document: rfc-7303
kind: normative-requirement
summary: When a new media type is introduced for an XML-based format, the name SHOULD end with '+xml' unless generic XML processing is in some way inappropriate. Only media subtypes that represent XML MIME entities are allowed to register with a '+xml' suffix.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
