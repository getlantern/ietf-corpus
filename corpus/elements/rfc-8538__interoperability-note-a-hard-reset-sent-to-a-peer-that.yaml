document: rfc-8538
kind: interoperability-note
summary: A Hard Reset sent to a peer that has not advertised the 'N' bit will still result in a session reset per RFC 4271 and RFC 4724, since any NOTIFICATION causes a reset; the only negative effect is the peer cannot properly log the encapsulated error information.
