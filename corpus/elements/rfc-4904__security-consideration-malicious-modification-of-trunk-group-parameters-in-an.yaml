document: rfc-4904
kind: security-consideration
summary: Malicious modification of trunk group parameters in an R-URI could cause a gateway to prefer one trunk over another, enabling attacks such as receiving free service via toll-free trunks or disrupting traffic flow. Modification of Contact header trunk groups could cause routing intermediaries to incorrectly associate a call with a different source.
section: "8"
topics:
    - sip
    - security
    - voip
