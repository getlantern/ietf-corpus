document: rfc-8801
kind: normative-requirement
summary: When a host retrieves stateful DHCPv6 assignments, they MUST be associated with the PvD received with RAs having the M-flag set and including a matching Prefix Information Option (PIO), where matching means the PIO prefix includes the DHCPv6 assignment.
section: 3.4.1
rfc2119_level: MUST
topics:
    - ip
