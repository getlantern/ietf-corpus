document: rfc-6714
kind: security-consideration
summary: MSRP endpoints using name-based authentication (certificate bound to hostname/SIP AOR and verified against a trusted CA or RFC 6072) can detect an unauthorized TLS B2BUA middlebox. It is RECOMMENDED to use such mechanisms that do not rely on trusted signaling.
section: "7.6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
