document: rfc-9770
kind: normative-requirement
summary: A requester SHOULD NOT rely solely on diff query requests to detect revoked tokens, because series items may be dropped from the update collection (bounded at MAX_N). A requester SHOULD also regularly send full query requests per an application policy.
section: "11"
rfc2119_level: SHOULD
topics:
    - security
