document: rfc-9393
kind: normative-requirement
summary: The location item within filesystem-item MUST be either an absolute path, a path relative to the parent directory item, or a path relative to the CoSWID tag location if no parent is defined. It MUST NOT include the file's name, which is provided separately by fs-name.
section: 2.9.2
rfc2119_level: MUST
topics:
    - cbor
