document: rfc-4204
kind: normative-requirement
summary: A LinkSummaryAck or LinkSummaryNack MUST be sent in response to every LinkSummary message. If a LinkSummaryNack includes negotiable parameters, acceptable values for those parameters MUST be included.
section: "4"
rfc2119_level: MUST
