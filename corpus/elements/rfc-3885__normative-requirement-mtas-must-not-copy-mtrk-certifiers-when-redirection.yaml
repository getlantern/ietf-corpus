document: rfc-3885
kind: normative-requirement
summary: MTAs MUST NOT copy MTRK certifiers when redirection results in more than one recipient. An MTA MAY designate one primary recipient for tracking; other addresses MUST NOT receive tracking certifiers. MTAs MUST NOT forward MTRK certifiers during mailing list expansion.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
