document: rfc-2749
kind: protocol-element
summary: 'Replacement Data allows the PDP to replace RSVP objects by C-Num: an object of a given C-Num replaces ALL instances of that C-Num in the RSVP message; an empty replacement (length 4) removes all instances without adding anything. PEPs are required to support replacement of POLICY_DATA, ERROR_SPEC, and FLOWSPEC; replacement of other objects is optional.'
section: "2.4"
topics:
    - qos
