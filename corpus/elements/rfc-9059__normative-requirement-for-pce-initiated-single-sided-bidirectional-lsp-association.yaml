document: rfc-9059
kind: normative-requirement
summary: For PCE-initiated Single-Sided Bidirectional LSP Association, the PCE MUST send a PCInitiate message to the originating endpoint node with both forward and reverse LSPs. For Double-Sided, the PCE MUST send PCInitiate to both endpoint nodes with their respective forward LSPs.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
