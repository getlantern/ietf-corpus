document: rfc-7143
kind: protocol-element
summary: 'iSCSI supports three name formats: IQN (iqn.YYYY-MM.reversed-domain:optional-string), EUI-64 (eui. followed by 16 hexadecimal digits), and NAA (naa. followed by NAA identifier hex digits). Names are globally unique node identifiers, case-insensitive, encoded in UTF-8, and up to 223 bytes in length; they are independent of network address.'
section: 4.2.7
