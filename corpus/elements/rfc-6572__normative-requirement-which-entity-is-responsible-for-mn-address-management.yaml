document: rfc-6572
kind: normative-requirement
summary: Which entity is responsible for MN address management (LMA vs. HAAA) is deployment-specific and MUST be pre-agreed on a per-deployment basis; the PMIP6-*-HN-Prefix and PMIP6-*-IPv4-HoA attributes carry zeroes when delegating to the HAAA and the assigned addresses when the LMA is informing the HAAA.
section: "6.1"
rfc2119_level: MUST
topics:
    - mobility
    - radius
