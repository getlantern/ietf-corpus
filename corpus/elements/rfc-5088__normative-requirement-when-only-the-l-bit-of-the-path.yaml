document: rfc-5088
kind: normative-requirement
summary: When only the L bit of the PATH-SCOPE sub-TLV is set (intra-area only PCE), the flooding scope MUST be area local, requiring use of OSPFv2 type 10 or OSPFv3 Router Information LSA with S1 set and S2 clear.
section: "5"
rfc2119_level: MUST
topics:
    - routing
