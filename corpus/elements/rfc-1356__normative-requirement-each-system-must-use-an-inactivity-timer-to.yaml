document: rfc-1356
kind: normative-requirement
summary: Each system MUST use an inactivity timer to clear idle virtual circuits. The timer SHOULD be configurable (with 'infinite' acceptable when explicitly set); a reasonable IP default is 90 seconds.
section: "3.9"
rfc2119_level: MUST
topics:
    - ip
