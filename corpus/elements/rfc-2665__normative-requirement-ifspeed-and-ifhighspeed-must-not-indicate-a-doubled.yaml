document: rfc-2665
kind: normative-requirement
summary: ifSpeed and ifHighSpeed MUST NOT indicate a doubled value when operating in full-duplex mode; they MUST indicate the correct line speed regardless of the current duplex mode. Before auto-negotiation completes, these objects SHOULD reflect the maximum speed supported by the interface.
section: 3.2.7
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
