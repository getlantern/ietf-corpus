document: rfc-9815
kind: wire-format
summary: The BGP-LS Attribute Sequence Number TLV (type 1181) encodes a mandatory 8-octet (64-bit) strictly increasing sequence number, with the high-order 32 bits serving as a boot/wrap count and the low-order 32 bits as the per-NLRI counter.
