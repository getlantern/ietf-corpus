document: rfc-8666
kind: normative-requirement
summary: An SR Mapping Server MUST use the OSPFv3 Extended Prefix Range TLVs when advertising SIDs for prefixes, and the NU-bit MUST be set in the PrefixOptions of the LSA used for such advertisement to prevent it from contributing to prefix reachability.
section: "8.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
