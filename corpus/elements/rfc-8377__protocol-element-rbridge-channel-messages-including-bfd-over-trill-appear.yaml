document: rfc-8377
kind: protocol-element
summary: RBridge Channel messages (including BFD over TRILL) appear to transit TRILL switches like normal multi-destination TRILL Data packets and therefore have a topology. They are generally sent in topology zero when used for network management to avoid topology constraints.
section: "5.3"
topics:
