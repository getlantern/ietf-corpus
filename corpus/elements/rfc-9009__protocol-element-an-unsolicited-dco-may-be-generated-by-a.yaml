document: rfc-9009
kind: protocol-element
summary: An unsolicited DCO may be generated by a 6LR to proactively clean up entries on route expiry or when a full routing table requires eviction. An unsolicited DCO intended to discard all state regardless of Path Sequence MUST use a Path Sequence value of 240.
section: "4.5"
topics:
    - routing
