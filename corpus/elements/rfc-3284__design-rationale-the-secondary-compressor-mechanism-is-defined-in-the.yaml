document: rfc-3284
kind: design-rationale
summary: The secondary compressor mechanism is defined in the format but its specific compressor formats are intentionally left open. The authors found the basic Vcdiff format adequate for most differencing use cases and recommend keeping the format stable so secondary compressors can be defined later without breaking the core format.
section: "9"
