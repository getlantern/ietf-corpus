document: rfc-4291
kind: interoperability-note
summary: The IPv4-Compatible IPv6 address (::d.d.d.d with 80+16 leading zero bits) is deprecated because current IPv6 transition mechanisms no longer use it; new or updated implementations are not required to support this address type.
