document: rfc-4207
kind: protocol-element
summary: The Verify Transport Mechanism field is 16 bits in length and defines the transport options for LMP Test Messages when the encoding is SONET/SDH. Defined values include DCCS (0x0002), DCCL (0x0004), J0-trace (0x0008), J1-trace (0x0040), and J2-trace (0x0080). Multiple bits may be set in BeginVerify but only one bit may be set in BeginVerifyAck.
section: "3.1"
topics:
    - routing
    - mpls
