document: rfc-3825
kind: interoperability-note
summary: The WGS 84 datum (Datum=1) is three-dimensional and therefore inherently includes both horizontal and vertical references. For other datums, both horizontal and vertical references must be explicitly specified in the IANA codepoint record.
