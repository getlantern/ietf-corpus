document: rfc-8930
kind: normative-requirement
summary: Since the Datagram_Tag is uniquely associated with the source link-layer address, the forwarding node MUST assign a new Datagram_Tag from its own namespace for the next hop and rewrite the fragment header of each fragment with that Datagram_Tag.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - routing
