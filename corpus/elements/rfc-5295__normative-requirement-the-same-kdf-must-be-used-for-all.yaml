document: rfc-5295
kind: normative-requirement
summary: The same KDF MUST be used for all key derivations for a given EMSK. If no KDF is specified, the default KDF (PRF+ based on HMAC-SHA-256) MUST be used. If the initial authenticated key exchange specifies a KDF, it MUST override the default.
section: 3.1.1
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
