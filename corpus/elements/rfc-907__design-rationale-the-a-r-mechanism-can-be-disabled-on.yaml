document: rfc-907
kind: design-rationale
summary: The A/R mechanism can be disabled on a per-link basis (via Restart Complete) or per-message (message number = 0) to operate in a pure discard mode when A/R overhead is unattractive. The Unnumbered Response message provides critical out-of-band feedback even when A/R is fully disabled.
section: "5"
topics:
    - congestion
