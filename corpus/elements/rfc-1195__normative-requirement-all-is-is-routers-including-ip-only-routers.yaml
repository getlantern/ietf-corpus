document: rfc-1195
kind: normative-requirement
summary: All IS-IS routers, including IP-only routers, MUST be able to receive IS-IS packets using the normal OSI encapsulation for each link type, since IS-IS packets are encapsulated as OSI packets.
section: "4.1"
rfc2119_level: MUST
topics:
