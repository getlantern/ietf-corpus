document: rfc-9524
kind: security-consideration
summary: 'The ICMPv6 Parameter Problem Code 2 exception (for unknown mandatory options) creates a potential DoS vector: an attacker can send packets with a spoofed source address, a Replication-SID as DA, and an extension header with an unknown mandatory option type, causing a flood of ICMPv6 responses to overwhelm the spoofed source. Future extensions adding new extension headers must account for this.'
section: "4"
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
