document: rfc-6849
kind: normative-requirement
summary: A device performing rtp-media-loopback MUST transmit all received media back to the sender unless congestion feedback or lower-layer constraints prevent it. The media is treated as if it were to be played (e.g., PLC may be applied).
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
