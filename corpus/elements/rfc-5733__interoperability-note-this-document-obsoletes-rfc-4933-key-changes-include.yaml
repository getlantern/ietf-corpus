document: rfc-5733
kind: interoperability-note
summary: 'This document obsoletes RFC 4933. Key changes include: removal of pendingRenew status (since no <renew> mapping is defined), addition of the 2305 response code for delete failures due to associations, addition of the 2201 response code for unauthorized transform attempts, and updated normative references (RFC 5322 replacing RFC 0822, RFC 5730 replacing RFC 4930).'
section: Appendix A
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
