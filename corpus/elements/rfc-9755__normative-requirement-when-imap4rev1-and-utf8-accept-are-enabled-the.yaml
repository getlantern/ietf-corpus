document: rfc-9755
kind: normative-requirement
summary: When IMAP4rev1 and UTF8=ACCEPT are enabled, the server MAY treat message/global like message/rfc822 for body structure, or MAY treat it as per RFC 3501. Clients MUST accept both cases. When IMAP4rev2 and UTF8=ACCEPT are in use, the server MUST behave as described in RFC 9051.
section: "6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
