document: rfc-3911
kind: normative-requirement
summary: If the Join header matches an active dialog, the UA MUST verify that the initiator of the new INVITE is authorized to join the matched dialog, using standard SIP authentication mechanisms (Digest or S/MIME).
section: "4"
rfc2119_level: MUST
topics:
