document: rfc-5686
kind: normative-requirement
summary: SDP offer-answer procedures MUST follow RFC 3264. An answerer MUST answer back mode number(s) as a subset of what was offered; the offerer MUST NOT send in modes it did not offer. Unknown fmtp parameters MUST be ignored and MUST be deleted from the answer.
section: 6.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
