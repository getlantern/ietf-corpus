document: rfc-3873
kind: normative-requirement
summary: It is NOT possible to create rows in any table (sctpAssocTable, sctpAssocLocalAddrTable, sctpAssocRemAddrTable, and reverse lookup tables) using SNMP. It is NOT possible to delete rows in any table using SNMP except via deleteTCB(9) in sctpAssocTable.
section: 3.1.3
rfc2119_level: MUST NOT
topics:
    - sctp
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
