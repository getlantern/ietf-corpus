document: rfc-6958
kind: interoperability-note
summary: The method used to distinguish between bursts and gaps MAY be equivalent to but not identical to the method in RFC 3611. The method should produce the same result as RFC 3611 for burst packet loss conditions but may differ for time-varying jitter conditions.
section: "1.1"
topics:
    - rtp
    - realtime
