document: rfc-2932
kind: protocol-element
summary: ipMRouteInterfaceTtl is a read-write Integer32 (0..255) TTL threshold; any IP multicast datagram with a TTL less than this value will not be forwarded out the interface. A default value of 0 means all multicast packets are forwarded.
section: "4"
topics:
