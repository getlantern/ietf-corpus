document: rfc-1595
kind: protocol-element
summary: 'Severely Errored Second (SES) thresholds are rate-dependent: Section SES uses BER threshold ≈1.5×10⁻⁷ (x=9 CVs for OC-1); Line SES uses ≈2×10⁻⁷ (x=12 for OC-1); VT1.5 SES uses x=4 at ≈2×10⁻⁶. Exact x values for OC-1 through OC-48 and VT1.5 through VT6 are tabulated in section 3.6.'
