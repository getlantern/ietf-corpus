document: rfc-9624
kind: normative-requirement
summary: A PTA specifying BIER attached to an IMET, S-PMSI A-D, or per-region I-PMSI A-D route MUST NOT be distributed beyond the boundaries of a BIER domain; all receiving routers must be in the same BIER domain as the originator.
section: "2"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
