document: rfc-4204
kind: protocol-element
summary: The LMP Hello message contains TxSeqNum (sequence number of the sent Hello) and RcvSeqNum (last Hello sequence number received from the adjacent node). This fast keep-alive mechanism allows each node to verify its peer is receiving its transmissions and detects control channel failures.
