document: rfc-5580
kind: design-rationale
summary: Location-specific attribute content is intentionally treated as opaque data by the RADIUS server itself; a separate location-server component is responsible for receiving, processing, and distributing location information with proper access control. This separation avoids requiring RADIUS servers to implement GEOPRIV logic.
section: "4"
topics:
    - radius
    - privacy
