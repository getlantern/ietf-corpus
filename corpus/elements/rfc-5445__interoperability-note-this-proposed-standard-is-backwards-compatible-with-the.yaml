document: rfc-5445
kind: interoperability-note
summary: This Proposed Standard is backwards compatible with the Experimental FEC Schemes defined in RFC 3452 and RFC 3695. All integer fields are encoded in network byte order. This document obsoletes RFC 3695 and assumes responsibility for the FEC Scheme portions of RFC 3452 not already absorbed by RFC 5052.
