document: rfc-4538
kind: design-rationale
summary: 'Target-Dialog differs from In-Reply-To: In-Reply-To references a past call attempt for human UI threading, while Target-Dialog references a currently active dialog for machine-driven authorization. In-Reply-To implies cause-and-effect; Target-Dialog only implies awareness for authorization purposes.'
section: "9"
topics:
