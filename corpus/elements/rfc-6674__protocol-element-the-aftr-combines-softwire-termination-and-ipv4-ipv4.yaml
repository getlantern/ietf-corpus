document: rfc-6674
kind: protocol-element
summary: The AFTR combines softwire termination and IPv4-IPv4 NAT. NAT bindings may be assigned autonomously from a local address pool, configured per-binding via a remote NAT control protocol, or derived from the CID (e.g., mapping a 32-bit CID 1:1 to a public IPv4 address).
