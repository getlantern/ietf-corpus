document: rfc-3606
kind: wire-format
summary: VPL and VCL cell counters track total cells and CLP=0 cells; CLP=1 cells are derived by subtraction (total minus CLP=0). Additionally, tagged output cells (CLP=1 cells produced by traffic policing) are counted separately. Valid cells include user and OAM cells but exclude physical-layer idle and unassigned cells.
section: 3.1.9
topics:
    - realtime
