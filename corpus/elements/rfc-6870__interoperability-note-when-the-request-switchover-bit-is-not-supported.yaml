document: rfc-6870
kind: interoperability-note
summary: When the Request Switchover bit is not supported by the receiving PE, it will be silently ignored, making the feature backward compatible. Coordination of PW switchover requires both sending and receiving PEs to support the Request Switchover bit.
section: "6.3"
topics:
