document: rfc-9420
kind: normative-requirement
summary: Whenever a new credential is introduced to the group (via KeyPackage, GroupInfo, Add, Update, or Commit with UpdatePath), it MUST be validated with the Authentication Service. When replacing a credential, the AS MUST also verify that the new presented identifiers are valid successors to the old ones.
section: 5.3.1
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
