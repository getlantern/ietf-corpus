document: rfc-1759
kind: protocol-element
summary: The Interpreter Group (prtInterpreterTable) has one entry per interpreter, covering both Page Description Language (PDL) interpreters and Control Language interpreters. Each entry reports interpreter type, default character sets for input/output, and feedback (ISO two-character language and country codes).
