document: rfc-1055
kind: design-rationale
summary: 'SLIP has no type field, so only one protocol can run over a SLIP connection. This is identified as a deficiency: two multi-protocol hosts (e.g., running both TCP/IP and DECnet) cannot share a single SLIP serial line between different protocol stacks.'
section: DEFICIENCIES
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
