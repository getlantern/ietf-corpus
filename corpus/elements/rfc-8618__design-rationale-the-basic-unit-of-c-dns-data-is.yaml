document: rfc-8618
kind: design-rationale
summary: The basic unit of C-DNS data is a combined DNS Query and its associated Response (a Q/R data item). This design was chosen because a Query and Response represent the basic client interaction, and combining them reduces storage requirements due to data commonality between the two messages.
section: "4"
topics:
