document: rfc-5628
kind: security-consideration
summary: Temporary GRUUs are intended to prevent correlation of a caller's identity. An adversary may attempt to confirm a conjectured caller's identity by sending a SUBSCRIBE to the registration event package to obtain their temporary GRUUs. It is recommended that the authorization policy restrict temporary GRUU delivery to subscribers who are authorized to register to the AOR.
section: "11"
topics:
    - sip
    - security
    - privacy
extracted_by: claude-sonnet-4-6
