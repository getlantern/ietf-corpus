document: rfc-2640
kind: interoperability-note
summary: Clients SHOULD anticipate 500 or 502 responses to the LANG command from older or non-compliant servers that do not implement it. A 501 response indicates syntactically incorrect argument; 504 indicates an unsupported but syntactically valid language tag.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
