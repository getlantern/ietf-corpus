document: rfc-7551
kind: protocol-element
summary: REVERSE_LSP subobjects can include SENDER_TSPEC, ERO, SESSION_ATTRIBUTE, ADMIN_STATUS, LSP_REQUIRED_ATTRIBUTES, and PROTECTION Objects. These override default values that the egress node would otherwise copy from the forward LSP's Path message when creating the reverse LSP.
