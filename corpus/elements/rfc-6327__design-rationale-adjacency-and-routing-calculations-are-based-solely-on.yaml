document: rfc-6327
kind: design-rationale
summary: Adjacency and routing calculations are based solely on connectivity in the link's Designated VLAN because bridged LANs between RBridges may partition VLANs; using the Designated VLAN (dictated by the DRB) ensures a consistent, loop-safe topology view across all RBridges on the link.
section: "2.1"
