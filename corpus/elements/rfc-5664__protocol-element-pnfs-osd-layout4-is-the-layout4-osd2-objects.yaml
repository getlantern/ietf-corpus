document: rfc-5664
kind: protocol-element
summary: pnfs_osd_layout4 is the LAYOUT4_OSD2_OBJECTS opaque body, containing a pnfs_osd_data_map4 (olo_map), an index into the full component array (olo_comps_index), and an array of object credentials (olo_components). The server MAY return a partial component array sufficient for the layout's data range.
section: "5.2"
