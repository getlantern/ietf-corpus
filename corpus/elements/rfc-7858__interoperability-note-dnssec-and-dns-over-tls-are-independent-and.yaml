document: rfc-7858
kind: interoperability-note
summary: 'DNSSEC and DNS over TLS are independent and fully compatible protocols solving different problems: DNSSEC provides response integrity, while DNS over TLS provides query/response privacy. Use of one does not diminish the need or usefulness of the other.'
section: "8"
topics:
    - dns
    - tls
    - security
