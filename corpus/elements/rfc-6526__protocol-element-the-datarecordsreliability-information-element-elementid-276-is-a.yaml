document: rfc-6526
kind: protocol-element
summary: The dataRecordsReliability Information Element (ElementId 276) is a boolean (1 octet, 1=True, 2=False) that reports whether the Exporting Process MUST send Data Records associated with the scoped element reliably (True) or MAY send them unreliably (False) within the SCTP stream.
