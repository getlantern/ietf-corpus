document: rfc-8705
kind: protocol-element
summary: 'Five client registration metadata parameters are defined for the PKI method: tls_client_auth_subject_dn (RFC 4514 string of expected subject DN), tls_client_auth_san_dns (dNSName SAN), tls_client_auth_san_uri (uniformResourceIdentifier SAN), tls_client_auth_san_ip (IPv4 dotted-decimal or IPv6 colon-hex iPAddress SAN), and tls_client_auth_san_email (rfc822Name SAN).'
section: 2.1.2
