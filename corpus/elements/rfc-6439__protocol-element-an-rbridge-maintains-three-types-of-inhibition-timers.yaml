document: rfc-6439
kind: protocol-element
summary: 'An RBridge maintains three types of inhibition timers per link where it can offer end station service: a DRB inhibition timer, a root change inhibition timer, and up to 4,094 per-VLAN inhibition timers (one per legal VLAN ID). All timers are denominated in seconds.'
section: "3"
topics:
