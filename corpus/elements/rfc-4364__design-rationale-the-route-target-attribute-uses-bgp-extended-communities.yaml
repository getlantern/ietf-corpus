document: rfc-4364
kind: design-rationale
summary: The Route Target attribute uses BGP Extended Communities rather than the BGP Communities attribute because BGP Communities provide only a 2-byte numbering space, which is insufficient for globally unique SP-administered identifiers. The Extended Communities format mirrors the type/administrator/assigned-number structure used for RDs.
section: 4.3.1
topics:
    - bgp
    - vpn
