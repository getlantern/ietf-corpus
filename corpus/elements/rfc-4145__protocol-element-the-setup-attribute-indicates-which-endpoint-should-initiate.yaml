document: rfc-4145
kind: protocol-element
summary: 'The ''setup'' attribute indicates which endpoint should initiate the TCP connection (send the initial SYN). It takes one of four values: ''active'' (initiates), ''passive'' (accepts), ''actpass'' (willing to do either), or ''holdconn'' (connection not to be established).'
