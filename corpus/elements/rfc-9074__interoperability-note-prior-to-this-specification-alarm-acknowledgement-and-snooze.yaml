document: rfc-9074
kind: interoperability-note
summary: Prior to this specification, alarm acknowledgement and snooze behavior were implemented using custom X- properties specific to each client, leading to poor interoperability. This document standardizes these behaviors to enable cross-client and client-server interoperability in CalDAV environments.
section: "1"
