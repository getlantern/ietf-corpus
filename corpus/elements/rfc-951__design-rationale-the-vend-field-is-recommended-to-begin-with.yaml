document: rfc-951
kind: design-rationale
summary: The 'vend' field is recommended to begin with a 4-byte magic number so servers can identify what kind of vendor-specific information is present. Different magic numbers may be used for bootrequest versus bootreply to allow clients to take special action with reply data.
section: "7.1"
topics:
    - ip
