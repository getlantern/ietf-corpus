document: rfc-7552
kind: design-rationale
summary: IPv4-mapped IPv6 addresses are prohibited in LDP address and label databases because the 6MAN and V6OPS working groups reached consensus against promoting them in routing tables, and RFC 4038 Section 4.2 recommends they never appear on the wire.
