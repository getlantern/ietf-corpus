document: rfc-7774
kind: normative-requirement
summary: Parameter updates SHOULD NOT occur too frequently; a reasonable update rate is once per expected information refresh interval (T1 per RFC 3315 or information refresh time per RFC 4242) to keep Trickle timers synchronized across nodes.
section: "2.6"
rfc2119_level: RECOMMENDED
topics:
    - routing
