document: rfc-9562
kind: normative-requirement
summary: Implementations SHOULD utilize a cryptographically secure pseudorandom number generator (CSPRNG) for UUID random data. CSPRNG state MUST be properly reseeded upon state changes such as process forks to ensure correct operation.
section: "6.9"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
