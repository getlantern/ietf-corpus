document: rfc-9989
kind: normative-requirement
summary: Unknown tags in a DMARC Policy Record MUST be ignored. Syntax errors in the remainder of the record MUST be discarded in favor of default values or ignored outright. This allows forward-compatible extension without requiring a new 'v' tag value.
section: "4.8"
rfc2119_level: MUST
topics:
