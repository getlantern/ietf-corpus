document: rfc-9863
kind: normative-requirement
summary: When a PCEP speaker determines inconsistency in the color associated with LSPs belonging to the same Path Protection Association Group, it MUST reject the offending message and send a PCErr with Error-Type=19 and Error-value=32 (Inconsistent color).
section: "2"
rfc2119_level: MUST
topics:
    - routing
