document: rfc-3080
kind: wire-format
summary: Every payload octet on a channel has an associated sequence number starting at 0 when the channel is created. Sequence number arithmetic is performed modulo 2^32 (range 0..4294967295). The expected seqno for the next frame equals (seqno + size) mod 4294967296.
section: 2.2.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
