document: rfc-2019
kind: normative-requirement
summary: IPv6 packets shall be sent in asynchronous FDDI frames using unrestricted tokens. Nodes should also be able to receive synchronous frames and asynchronous frames sent using restricted tokens.
section: Frame Format
rfc2119_level: SHOULD
topics:
    - ip
