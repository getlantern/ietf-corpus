document: rfc-1661
kind: normative-requirement
summary: Upon reception of an Echo-Request in the LCP Opened state, an Echo-Reply MUST be transmitted. Echo-Request and Echo-Reply packets MUST only be sent in the LCP Opened state.
section: "5.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
