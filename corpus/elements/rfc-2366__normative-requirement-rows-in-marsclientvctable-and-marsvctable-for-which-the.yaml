document: rfc-2366
kind: normative-requirement
summary: Rows in marsClientVcTable and marsVcTable for which the VC type is 'svc(2)' cannot be modified or deleted; an SNMP management station must set the row to 'notInService' before modifying non-timer objects in other row types.
