document: rfc-5438
kind: normative-requirement
summary: An intermediary MUST NOT add an Original-To header field if one already exists, and MUST NOT change this header field value if it is already present. If the intermediary changes the CPIM To header field value, it MUST insert an Original-To header field.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - sip
