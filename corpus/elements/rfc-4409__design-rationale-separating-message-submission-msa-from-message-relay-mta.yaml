document: rfc-4409
kind: design-rationale
summary: Separating message submission (MSA) from message relay (MTA) allows each service to operate under its own security and policy rules. This separation makes it easier to implement authenticated submission, detect client misconfigurations, and prevent open relay abuse, without requiring MTAs to change their relay behavior.
section: "1"
topics:
    - email
    - security
