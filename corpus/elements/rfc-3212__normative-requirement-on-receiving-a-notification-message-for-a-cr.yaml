document: rfc-3212
kind: normative-requirement
summary: On receiving a Notification Message for a CR-LSP, an LSR SHOULD release any reserved resources. When propagating a Notification upstream from a downstream LSR in response to a Label Request, the local LSR MUST propagate it per LDP procedures with the F bit set.
section: 4.3.2.3
rfc2119_level: MUST
topics:
    - mpls
