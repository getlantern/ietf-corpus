document: rfc-5250
kind: normative-requirement
summary: A neighbor is opaque-capable if and only if it sets the O-bit in the Options field of its Database Description packets. The O-bit SHOULD NOT be set and MUST be ignored when received in packets other than Database Description packets, to avoid interoperability issues.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
