document: rfc-3056
kind: normative-requirement
summary: 'A site with both 6to4 and native IPv6 interfaces that is unwilling to act as a relay MUST NOT advertise any 2002:: prefix into the native IPv6 domain and MUST NOT advertise any native IPv6 prefixes or a default IPv6 route into the 6to4 domain.'
section: 5.2.3
rfc2119_level: MUST NOT
topics:
