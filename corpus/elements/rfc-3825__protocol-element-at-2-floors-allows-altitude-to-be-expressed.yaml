document: rfc-3825
kind: protocol-element
summary: AT=2 (Floors) allows altitude to be expressed as a building floor number, using a 2s-complement fixed-point value. Floor 0.0 represents ground level at the main entrance; sub-floors use non-integer values (e.g., 1.1 for a mezzanine); below-grade floors use negative values.
section: "2.1"
