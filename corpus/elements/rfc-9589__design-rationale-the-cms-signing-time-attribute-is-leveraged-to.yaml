document: rfc-9589
kind: design-rationale
summary: The CMS signing-time attribute is leveraged to align file mod-times across RRDP and rsync, enabling rsync's default file comparison logic (mod-time + file size) to skip re-transferring files already fetched via RRDP, reducing bandwidth, disk I/O, and CPU usage.
