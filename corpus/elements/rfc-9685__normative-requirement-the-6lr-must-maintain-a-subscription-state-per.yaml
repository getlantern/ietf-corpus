document: rfc-9685
kind: normative-requirement
summary: The 6LR MUST maintain a subscription state per tuple (IPv6 address, ROVR) for both anycast and multicast types of addresses. The 6LBR MUST likewise maintain a subscription state per tuple (IPv6 address, ROVR) for both address types.
section: "7.3"
rfc2119_level: MUST
topics:
