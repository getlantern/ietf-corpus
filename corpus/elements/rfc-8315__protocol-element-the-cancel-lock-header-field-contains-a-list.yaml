document: rfc-8315
kind: protocol-element
summary: The Cancel-Lock header field contains a list of one or more <c-lock> elements, each consisting of a hash algorithm scheme name and a Base64-encoded hash value computed as Base64(hash(Base64(K))). It is placed in an original article to enable future authentication of cancellation or supersede requests. Each header field MUST NOT occur more than once in an article.
section: "2.1"
topics:
    - security
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
