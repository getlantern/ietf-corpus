document: rfc-7044
kind: protocol-element
summary: The History-Info header field captures the Request-URIs as a SIP request is retargeted, preserving routing history that would otherwise be lost. Each entry (hi-entry) contains a mandatory hi-targeted-to-uri (the Request-URI at that hop) and a mandatory hi-index (chronological ordering reflecting forking and retargeting).
