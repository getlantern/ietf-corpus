document: rfc-1724
kind: protocol-element
summary: rip2IfStatAddress is a read-only IpAddress index for rip2IfStatTable. For unnumbered interfaces, it uses the pseudo-address 0.0.0.N where N (least significant 24 bits) is the ifIndex of the relevant IP interface in network byte order.
