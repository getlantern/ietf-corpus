document: rfc-7700
kind: normative-requirement
summary: An entity performing comparison MUST prepare each string per Section 2.2 and apply the Additional Mapping Rule, Case Mapping Rule, Normalization Rule, and Directionality Rule in that order. Two strings are equivalent if and only if they are an exact octet-for-octet match.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
