document: rfc-3460
kind: protocol-element
summary: IpHeadersFilter is a device-level filter class (subclass of FilterEntryBase) specifying IP header fields in a single instance. Properties include HdrIpVersion, HdrSrcAddress, HdrSrcAddressEndOfRange, HdrSrcMask, HdrDestAddress, HdrDestMask, HdrProtocolID, HdrSrcPortStart/End, HdrDestPortStart/End, HdrDSCP, and HdrFlowLabel.
