document: rfc-3745
kind: security-consideration
summary: JPEG 2000's extensible structure means future metadata fields could theoretically induce recipient actions and present security risks, but no such capability is defined in the current specification. Encryption, signing, and authentication can use mechanisms defined in ISO/IEC 15444-8 (JPSEC).
section: "3"
topics:
    - security
    - crypto
