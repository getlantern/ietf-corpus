document: rfc-8577
kind: design-rationale
summary: No additional routing protocol extensions are required to support bandwidth admission control, LSP priorities, preemption, and auto-bandwidth on the shared MPLS forwarding plane. These RSVP-TE control-plane features operate unchanged; only the forwarding-plane state is reduced.
