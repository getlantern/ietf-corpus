document: rfc-9965
kind: design-rationale
summary: Each registry entry implicitly defines a 'v.' sub-realm (e.g., 'v.tls.eap.arpa') allowing vendors and SDOs to self-allocate identifiers under their own DNS domain without a registry request (e.g., 'example.com.v.tls.eap.arpa'). This avoids proliferating registry entries for experimental and vendor-specific uses.
section: "3.2"
topics:
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
