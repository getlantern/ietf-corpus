document: rfc-5819
kind: normative-requirement
summary: If an attempted STATUS for a listed mailbox fails because the mailbox cannot be selected (e.g., due to ACL rights or a race condition), the STATUS response MUST NOT be returned and the LIST response MUST include the \NoSelect attribute.
section: "2"
rfc2119_level: MUST NOT
topics:
    - email
