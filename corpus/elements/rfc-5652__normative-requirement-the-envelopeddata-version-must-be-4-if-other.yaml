document: rfc-5652
kind: normative-requirement
summary: The EnvelopedData version MUST be 4 if 'other' certificate/CRL types appear in originatorInfo; version 3 if ACv2 certificates, pwri, or ori are present; version 0 if originatorInfo absent, unprotectedAttrs absent, and all RecipientInfos are version 0; otherwise version 2.
section: "6.1"
rfc2119_level: MUST
topics:
