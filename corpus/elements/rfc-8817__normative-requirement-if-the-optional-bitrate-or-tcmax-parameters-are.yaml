document: rfc-8817
kind: normative-requirement
summary: If the optional 'bitrate' or 'tcmax' parameters are present, they MUST be included in the SDP 'a=fmtp' attribute as semicolon-separated parameter=value pairs. When 'tcmax' is absent, a default value of 35 is used.
