document: rfc-6119
kind: normative-requirement
summary: There MUST NOT be more than one IPv6 SRLG TLV for a given link. The IPv6 SRLG TLV (type 139) MUST NOT be used when the SRLG TLV (type 138) can be used instead. If both are received for the same link, the receiver MUST apply the SRLG TLV and ignore the IPv6 SRLG TLV.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
