document: rfc-8129
kind: security-consideration
summary: KDC implementations MUST use AD-CAMMAC verifiers as described in RFC 7751 to ensure that AD-AUTHENTICATION-INDICATOR elements are not modified by an attacker. AD-CAMMAC supersedes AD-KDC-ISSUED and allows both application services and the KDC to verify the authenticity of the contained authorization data.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
