document: rfc-9198
kind: security-consideration
summary: ICMP does not provide cryptographic protection for requested/returned data, exposing risks when processing untrusted data; these are limitations of the underlying protocols. Active measurement techniques greatly reduce exposure of sensitive user-traffic information compared to passive monitoring; the LMAP Framework (RFC 7594) covers relevant privacy considerations.
section: "7"
topics:
    - security
    - privacy
    - measurement
