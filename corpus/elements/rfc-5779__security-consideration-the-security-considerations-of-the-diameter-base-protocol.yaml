document: rfc-5779
kind: security-consideration
summary: The security considerations of the Diameter Base protocol (RFC 3588), Diameter EAP application (RFC 4072), Diameter NASREQ application (RFC 4005), and Diameter Mobile IPv6 bootstrapping (RFC 5447) all apply. Diameter messages between the LMA and the Diameter server may traverse AAA brokers or Diameter agents, and security depends on the trustworthiness of these intermediaries.
section: "10"
topics:
