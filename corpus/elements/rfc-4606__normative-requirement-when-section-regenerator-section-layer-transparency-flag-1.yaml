document: rfc-4606
kind: normative-requirement
summary: When Section/Regenerator Section layer transparency (Flag 1) is used, all other Transparency flags MUST be ignored. This is because full Section transparency implies the entire frame is delivered unmodified.
section: "2.1"
rfc2119_level: MUST
