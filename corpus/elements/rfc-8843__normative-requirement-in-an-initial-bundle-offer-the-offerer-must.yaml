document: rfc-8843
kind: normative-requirement
summary: In an initial BUNDLE offer, the offerer MUST assign a unique address:port to each bundled 'm=' section (excluding bundle-only sections), pick a suggested offerer-tagged 'm=' section, include an 'a=group:BUNDLE' attribute, and list the identification-tag of each bundled 'm=' section in that attribute.
section: "7.2"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
