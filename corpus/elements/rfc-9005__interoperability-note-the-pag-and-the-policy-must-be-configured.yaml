document: rfc-9005
kind: interoperability-note
summary: The PAG and the policy MUST be configured on the PCEP peers as per operator-configured association procedures (RFC 8697). The Policy Association Type is operator-configured, meaning the association is created manually on both PCEP peers before LSP membership can be conveyed via PCEP.
