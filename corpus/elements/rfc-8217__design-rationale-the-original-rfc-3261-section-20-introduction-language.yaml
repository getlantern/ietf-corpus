document: rfc-8217
kind: design-rationale
summary: The original RFC 3261 Section 20 introduction language ('The Contact, From, and To header fields...') was ambiguous because it could be read as applying only to those three fields, necessitating a generic restatement that explicitly covers all header fields using the name-addr / addr-spec alternative.
