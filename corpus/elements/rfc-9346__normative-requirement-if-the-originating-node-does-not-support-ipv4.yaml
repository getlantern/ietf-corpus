document: rfc-9346
kind: normative-requirement
summary: If the originating node does not support IPv4, the reserved value 0.0.0.0 MUST be used in the Router ID field of TLV 141, and the IPv6 Router ID sub-TLV MUST be present. Inter-AS Reachability Information TLVs with Router ID 0.0.0.0 and no IPv6 Local ASBR Identifier sub-TLV MUST be ignored.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
