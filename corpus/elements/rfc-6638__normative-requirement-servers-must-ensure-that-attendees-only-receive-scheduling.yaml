document: rfc-6638
kind: normative-requirement
summary: Servers MUST ensure that Attendees only receive scheduling message content for recurrence instances in which they are explicitly listed as an Attendee. When an Attendee is excluded from an instance, that exclusion is communicated via an EXDATE in the master component rather than inclusion of the overridden instance.
section: 3.2.6
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
