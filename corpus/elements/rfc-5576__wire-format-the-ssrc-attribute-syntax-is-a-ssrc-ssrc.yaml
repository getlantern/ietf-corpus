document: rfc-5576
kind: wire-format
summary: 'The ''ssrc'' attribute syntax is: a=ssrc:<ssrc-id> <attribute> or a=ssrc:<ssrc-id> <attribute>:<value>. The ssrc-id is a 32-bit unsigned integer (0..2^32-1) in decimal. The ABNF is: ssrc-attr = ''ssrc:'' ssrc-id SP attribute.'
section: "10"
