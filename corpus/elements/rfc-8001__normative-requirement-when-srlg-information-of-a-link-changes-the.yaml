document: rfc-8001
kind: normative-requirement
summary: When SRLG information of a link changes, the procedures defined in Section 4.4.3 of RFC 3209 MUST be used to refresh the SRLG information for each affected LSP, if local node policy dictates that the change be communicated to other nodes.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
