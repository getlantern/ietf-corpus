document: rfc-2662
kind: normative-requirement
summary: Counters are NOT reset when an ATU-C or ATU-R is reinitialized; they are only reset when the agent itself is reset or reinitialized, or under specific request outside the scope of this MIB.
section: "5.3"
rfc2119_level: MUST NOT
