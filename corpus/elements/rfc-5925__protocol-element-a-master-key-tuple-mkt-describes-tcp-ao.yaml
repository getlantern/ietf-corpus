document: rfc-5925
kind: protocol-element
summary: 'A Master Key Tuple (MKT) describes TCP-AO properties for one or more connections. It includes: TCP connection identifier (socket pair, possibly wildcarded), a TCP option flag controlling whether options other than TCP-AO are included in MAC computation, SendID and RecvID (each 0–255), a master key byte sequence, a Key Derivation Function (KDF), and a MAC algorithm.'
section: "3.1"
topics:
    - tcp
    - security
    - crypto
