kind: protocol-element
summary: 'Two textual conventions are defined for internationalized strings using UTF-8 (RFC 2044): Utf8String (OCTET STRING, SIZE 0..255, DISPLAY-HINT ''255a'') and LongUtf8String (OCTET STRING, SIZE 0..1024, DISPLAY-HINT ''1024a''). For 7-bit US-ASCII content these are encoding-transparent.'
