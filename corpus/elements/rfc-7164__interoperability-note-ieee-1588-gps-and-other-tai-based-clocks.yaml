document: rfc-7164
kind: interoperability-note
summary: IEEE 1588, GPS, and other TAI-based clocks do not include leap seconds and require no special accommodation for RTP. NTP and OS clocks using UTC are leap-second-bearing and require the accommodations described in this document.
section: "5"
topics:
