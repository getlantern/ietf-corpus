document: rfc-9570
kind: security-consideration
summary: RFC 6398 identifies security vulnerabilities associated with the RAO in non-controlled environments (e.g., inter-domain OAM over the public Internet). Removing the RAO from LSP ping eliminates these risks; using ::1/128 as the IPv6 destination strengthens security due to its standardized and well-defined behavior.
section: "7"
topics:
