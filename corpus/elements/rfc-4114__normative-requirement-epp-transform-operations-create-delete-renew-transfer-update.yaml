document: rfc-4114
kind: normative-requirement
summary: EPP transform operations (create, delete, renew, transfer, update) on E.164 domain objects MUST be restricted to the sponsoring client as authenticated per RFC 3730 sections 2.9.1.1 and 7. Any attempt by a non-sponsoring client MUST be rejected with an EPP authorization error.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
