document: rfc-9249
kind: security-consideration
summary: The mandatory-to-implement secure transport for NETCONF access is SSH (RFC 6242) and for RESTCONF is TLS (RFC 8446). NACM (RFC 8341) must be used to restrict access; 'nacm:default-deny-all' is applied to authentication key material to prevent key retrieval after configuration.
section: "11"
topics:
    - yang
    - ntp
    - security
    - netconf
