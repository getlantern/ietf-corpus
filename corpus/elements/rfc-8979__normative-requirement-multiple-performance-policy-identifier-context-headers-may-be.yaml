document: rfc-8979
kind: normative-requirement
summary: Multiple Performance Policy Identifier Context Headers MAY be present in the NSH, each carrying an opaque value for a distinct policy. When conflicting policies are detected, the default behavior is to discard the packet and send a notification alarm to a Control Element.
section: "4"
rfc2119_level: MAY
topics:
