document: rfc-5190
kind: protocol-element
summary: 'The midcomResourceTable augments midcomRuleTable with information about middlebox resources allocated per policy rule: NAT binding identifiers (midcomRscNatInternalAddrBindId, midcomRscNatExternalAddrBindId), NAT session identifiers (midcomRscNatSessionId1/2), and firewall rule identifier (midcomRscFirewallRuleId). Entries are only valid when midcomRuleOperStatus is reserved(7) or enabled(8). Resource identifiers may reference NAT-MIB (RFC 4008) or be vendor-proprietary.'
section: 5.3.1
topics:
    - snmp
    - nat
