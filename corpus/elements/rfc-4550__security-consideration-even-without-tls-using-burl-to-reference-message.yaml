document: rfc-4550
kind: security-consideration
summary: 'Even without TLS, using BURL to reference message text does not worsen security compared to direct submission: without BURL an eavesdropper gets the full message text, while with BURL access depends on the URL form used (some restrict use to authorized submission servers or specific users).'
