document: rfc-3559
kind: state-machine
summary: 'The mallocRequestState object defines four states for an allocation request: allocated(1) — one or more address entries exist in mallocAddressTable; offered(2) — addresses tentatively offered to client but not committed (e.g., via MADCAP OFFER); waiting(3) — allocation blocked while server acquires more space; trying(4) — allocation in progress but no addresses yet offered.'
section: "4"
topics:
    - multicast
