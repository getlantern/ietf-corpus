document: rfc-9635
kind: design-rationale
summary: 'GNAP is a stateful protocol by design: the grant request moves through defined states (Processing, Pending, Approved, Finalized) managed by the AS. Stateless AS deployments must implement secure, deterministic state management without relying on client software to track state, since clients are not trusted to maintain authoritative grant state.'
section: "1.5"
topics:
    - oauth
    - security
