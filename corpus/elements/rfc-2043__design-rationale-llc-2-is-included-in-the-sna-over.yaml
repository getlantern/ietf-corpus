document: rfc-2043
kind: design-rationale
summary: LLC(2) is included in the SNA over LLC 802.2 frame format to provide link-level error recovery, performed by the routers at each end of the PPP link. This preserves SNA's traditional reliance on LLC for reliable delivery at the link layer.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
