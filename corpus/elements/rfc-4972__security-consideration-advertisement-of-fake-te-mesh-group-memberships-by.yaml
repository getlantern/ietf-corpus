document: rfc-4972
kind: security-consideration
summary: Advertisement of fake TE Mesh Group memberships by a misconfigured or malicious LSR does not have major network impact because a TE LSP can only be established if the same mesh-group membership is configured on both the head-end and tail-end LSRs. Thus fake advertisements cannot amplify DoS attacks beyond overloading the IGP.
section: "8"
topics:
