document: rfc-9368
kind: normative-requirement
summary: If a client receives Version Information where the server's Chosen Version was not in the client's Available Versions, or if the client reacted to a Version Negotiation packet and the server's Version Information is missing, the client MUST close the connection with a version negotiation error.
section: "4"
rfc2119_level: MUST
topics:
    - quic
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
