summary: 'The SIPREC metadata model defines eight classes: Recording Session (RS), Communication Session Group (CS-Group), Communication Session (CS), CS-RS Association, Participant, Participant-CS Association, Media Stream, and Participant-Stream Association. These classes and their associations describe all recorded session metadata as viewed by the SRS.'
