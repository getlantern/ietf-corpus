document: rfc-4866
kind: wire-format
summary: The Permanent Home Keygen Token option is included in Binding Acknowledgment messages and carries the correspondent node's RSA-encrypted 64-bit permanent home keygen token in its Permanent Home Keygen Token field. It MUST appear before the Care-of Test option when both are present.
section: "5.3"
topics:
