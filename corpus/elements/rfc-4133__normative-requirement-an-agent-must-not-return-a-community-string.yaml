document: rfc-4133
kind: normative-requirement
summary: An agent MUST NOT return a community string in entLogicalCommunity that allows more privileges than the community string used to access the object. Agents implementing SNMPv3 access SHOULD use entLogicalContextEngineID and entLogicalContextName instead; entLogicalCommunity is deprecated.
section: "3"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
