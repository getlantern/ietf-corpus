document: rfc-6048
kind: design-rationale
summary: The '%s' template mechanism in LIST MODERATORS changes newsgroup periods to dashes when constructing submission addresses. Two groups differing only by a period vs. dash in their names would collide; therefore '%s' patterns MUST NOT be used for such pairs, requiring explicit entries instead.
section: 2.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
