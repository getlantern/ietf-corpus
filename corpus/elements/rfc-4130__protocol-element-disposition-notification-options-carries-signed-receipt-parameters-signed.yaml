document: rfc-4130
kind: protocol-element
summary: 'Disposition-notification-options carries signed receipt parameters: ''signed-receipt-protocol'' (e.g., pkcs7-signature) and ''signed-receipt-micalg'' (ordered list of preferred MIC algorithms, sha1 or md5). Both parameters are REQUIRED when requesting a signed receipt; they use importance=''optional'' so UAs that cannot sign still return an unsigned MDN.'
section: "7.3"
topics:
    - http
    - email
    - crypto
