document: rfc-2625
kind: interoperability-note
summary: InARP (optional) enables a node to discover the IP address of another node after performing PLOGI, given only its WW_PN and Port_ID. InARP uses the same 28-byte ARP packet format with different Op Codes and requires no broadcast since the target's Port_ID is already known.
