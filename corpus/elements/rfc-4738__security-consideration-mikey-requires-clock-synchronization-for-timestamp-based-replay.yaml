document: rfc-4738
kind: security-consideration
summary: MIKEY requires clock synchronization for timestamp-based replay protection. A secure network clock synchronization protocol SHOULD be used, such as ISO/IEC 18014 or secure NTP.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - security
    - realtime
    - ntp
