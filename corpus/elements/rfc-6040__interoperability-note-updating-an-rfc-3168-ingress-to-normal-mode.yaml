document: rfc-6040
kind: interoperability-note
summary: 'Updating an RFC 3168 ingress to normal mode (copying rather than resetting CE) is ''black-box backward compatible'': any tunnel egress (RFC 4301, any RFC 3168 mode, RFC 2481, RFC 2401, RFC 2003) will produce identical output packets because all variants have always propagated CE through the inner header. CE markings are visible inside the tunnel but output packets are unchanged.'
section: "6.3"
topics:
    - ecn
    - ip
