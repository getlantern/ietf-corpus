summary: 'Router-LSAs encode each router link as a 12-byte structure: Link ID (4 bytes), Link Data (4 bytes), Type (1 byte, values 1=point-to-point, 2=transit network, 3=stub network, 4=virtual link), TOS count (1 byte), metric (2 bytes).'
