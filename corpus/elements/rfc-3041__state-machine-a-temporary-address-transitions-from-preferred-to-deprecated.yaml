document: rfc-3041
kind: state-machine
summary: A temporary address transitions from preferred to deprecated when its Preferred Lifetime expires. On deprecation, a new temporary address is generated (unless the deprecation was triggered by a Prefix Information Option with zero Preferred Lifetime). Deprecated addresses may continue to be used for established connections but must not be used to initiate new connections.
section: "3.4"
topics:
    - ip
