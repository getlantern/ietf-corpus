document: rfc-9652
kind: protocol-element
summary: To determine the URI for a given variable under 'var-base', the value is used as a base URI in reference resolution (per RFC 3986). If the resulting URI is still relative, the link context is used as a further base URI per the Web Linking specification.
section: "2.1"
