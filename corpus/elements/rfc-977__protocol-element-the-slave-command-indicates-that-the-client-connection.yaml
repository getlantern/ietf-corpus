document: rfc-977
kind: protocol-element
summary: The SLAVE command indicates that the client connection is from a subsidiary server rather than a user. Servers may use this to prioritize slave connections or to preferentially retain them when shedding load. Every server must recognize and acknowledge the SLAVE command even if it gives no special treatment.
section: "3.12"
topics:
    - tcp
