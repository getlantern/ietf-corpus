document: rfc-5228
kind: interoperability-note
summary: 'Capability strings are case-sensitive: ''foo'' and ''FOO'' are different capabilities. Extensions that share a common prefix MUST register that prefix ending in ''-'' (e.g., ''comparator-'') and the prefix MUST NOT overlap any existing registrations.'
