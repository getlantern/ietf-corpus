document: rfc-9589
kind: interoperability-note
summary: RPs can use rsync's --compare-dest=DIR option to avoid re-downloading files already available from a synthesized RRDP filesystem hierarchy, using the directory of previously fetched and validated RPKI data in its original DER-encoded form to ensure file size matches.
section: "2.2"
topics:
    - security
    - pkix
