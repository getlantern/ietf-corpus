document: rfc-8940
kind: protocol-element
summary: 'PEAP Session-Id (EAP Type Code 0x19) is defined as: Session-Id = 0x19 || client.random || server.random, consistent with the EAP-TLS definition in RFC 5216 Section 2.3. This definition applies identically for both full authentication and fast reconnect.'
