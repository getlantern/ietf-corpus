document: rfc-4941
kind: design-rationale
summary: By default, the same randomized interface identifier is used across all prefixes on an interface to minimize the number of solicited-node multicast groups a node must join, avoiding potential promiscuous-mode requirements. Nodes highly concerned about privacy MAY use different identifiers per prefix.
section: "3"
topics:
    - privacy
    - ip
    - multicast
