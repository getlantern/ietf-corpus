document: rfc-8929
kind: protocol-element
summary: A Routing Proxy provides IPv6 ND proxy functions for Global and Unique Local Addresses between LLN and backbone, but not for link-local addresses. It advertises its own link-layer address as the TLLA in proxied NAs and routes at Layer 3 between federated links, providing full link-layer isolation of LLN devices from the backbone.
section: "7"
