document: rfc-4939
kind: interoperability-note
summary: The isnsDdPortalMemberTable supports explicit portal-to-DD assignment, which is preferred only when specific portals are needed for a DD. For iSCSI in general, the Portal Group Object (isnsRegPgTable) should be used for portal-to-node mapping across all discovery domains.
section: 3.3.4.3
topics:
    - snmp
