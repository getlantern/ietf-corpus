document: rfc-2737
kind: normative-requirement
summary: An agent must not generate more than one entConfigChange notification-event within a given five-second throttling period. Additional configuration changes during the window must be suppressed, with one event sent at the end of the period if any changes occurred.
section: "3"
rfc2119_level: MUST NOT
topics:
