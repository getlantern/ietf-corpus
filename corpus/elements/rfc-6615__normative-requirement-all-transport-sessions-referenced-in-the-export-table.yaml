document: rfc-6615
kind: normative-requirement
summary: All Transport Sessions referenced in the Export Table MUST have an ipfixTransportSessionDeviceMode value of exporting(1). If an Exporter does not use Transport Session grouping, the single session in each group MUST have member type primary(1).
section: "5.4"
rfc2119_level: MUST
