document: rfc-9066
kind: security-consideration
summary: Call Home DOTS agents may interact with on-path address sharing functions (NAT, CGN) to retrieve internal/external IP address mappings identifying an attack source. Blocking access to or manipulating mapping information will complicate DDoS mitigation close to the attack source.
section: "8"
topics:
