document: rfc-5089
kind: normative-requirement
summary: A change in the state of a PCE (activate, deactivate, or parameter change) MUST result in a corresponding change in the PCED sub-TLV information advertised by an IS-IS router in its LSP. However, a change in PCED sub-TLV information MUST NOT trigger any SPF computation at a receiving router.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
