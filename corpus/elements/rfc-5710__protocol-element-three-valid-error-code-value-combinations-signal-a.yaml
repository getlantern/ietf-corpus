document: rfc-5710
kind: protocol-element
summary: 'Three valid error code/value combinations signal a reroute request: (1) ''Notify/Local node maintenance required'' for node reroute with backwards compatibility, (2) ''Notify/Local link maintenance required'' for interface reroute with backwards compatibility, and (3) ''Reroute/<any Reroute error value>'' for future use.'
section: "2.1"
topics:
