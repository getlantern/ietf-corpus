document: rfc-4668
kind: protocol-element
summary: radiusAuthClientExtMalformedAccessResponses (Counter32) counts packets with invalid length received from a server. Bad authenticators, invalid Message-Authenticator attributes, and unknown types are explicitly excluded from this counter and tracked separately in radiusAuthClientExtBadAuthenticators and radiusAuthClientExtUnknownTypes.
