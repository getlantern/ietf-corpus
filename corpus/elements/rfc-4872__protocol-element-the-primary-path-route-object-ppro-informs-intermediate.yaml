document: rfc-4872
kind: protocol-element
summary: The PRIMARY_PATH_ROUTE object (PPRO) informs intermediate nodes along a secondary protecting LSP's path about the link and node resources used by the associated primary protected LSP. It is derived from the EXPLICIT ROUTE and/or RECORD ROUTE objects of the primary working LSP and enables recovery resource sharing in shared-mesh scenarios.
section: "15"
topics:
