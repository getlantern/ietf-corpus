document: rfc-8748
kind: interoperability-note
summary: Servers implementing this extension SHOULD support older versions in parallel during a migration period and allow clients to select their preferred version via the <svcExtension> element of the <login> command. When responding to commands that include extension elements, the server SHOULD include only extension elements matching the version present in the command.
section: "2"
topics:
