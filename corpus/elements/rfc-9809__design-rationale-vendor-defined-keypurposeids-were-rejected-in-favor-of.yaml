document: rfc-9809
kind: design-rationale
summary: Vendor-defined KeyPurposeIds were rejected in favor of standardized identifiers because vendor-specific OIDs used outside their vendor-controlled environment or in critical EKU extensions lead to interoperability issues; standard KeyPurposeIds ensure interoperability across various vendors and industries.
