document: rfc-6388
kind: security-consideration
summary: mLDP inherits the base LDP security considerations from RFC 5036. The protocol provides no authorization mechanism for controlling which LSRs may join a given MP LSP; if such authorization is desirable, additional mechanisms outside the scope of this document are needed. Authorization policies cannot be implemented solely at the root node because the root does not learn the identities of all leaf nodes.
section: "10"
topics:
    - mpls
    - routing
    - security
