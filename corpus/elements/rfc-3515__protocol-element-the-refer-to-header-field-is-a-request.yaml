document: rfc-3515
kind: protocol-element
summary: 'The Refer-To header field is a request-header that appears only in REFER requests. Its syntax is: Refer-To = (''Refer-To'' / ''r'') HCOLON ( name-addr / addr-spec ) *(SEMI generic-param). It provides a URL to reference and may be encrypted as part of end-to-end encryption.'
section: "2.1"
topics:
    - sip
    - realtime
