document: rfc-7307
kind: normative-requirement
summary: The U-bit in the Multi-Topology Capability TLV MUST be 1 so that the TLV will be silently ignored by a recipient if it is unknown. The F-bit MUST be 0 per LDP Capabilities (RFC 5561).
section: 3.5.1
rfc2119_level: MUST
topics:
