summary: 't11ZsServerMergeControlSetting governs how a new switch may join the Fabric: ''allow'' (default) permits joining if Zoning Databases can be merged; ''restrict'' requires the joining switch''s Zoning Database to be identical to the Fabric''s Zoning Database.'
