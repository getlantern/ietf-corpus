document: rfc-9256
kind: protocol-element
summary: When a BGP route has multiple Color Extended communities each with a valid SR Policy, the BGP process selects the SR Policy for the Color Extended community with the highest numerical value. When the highest-color SR Policy is inactive, the next highest color is considered.
section: 8.4.1
topics:
    - routing
    - bgp
