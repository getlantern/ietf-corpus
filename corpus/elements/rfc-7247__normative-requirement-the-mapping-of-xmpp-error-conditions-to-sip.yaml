document: rfc-7247
kind: normative-requirement
summary: The mapping of XMPP error conditions to SIP response codes SHOULD follow the table in Section 7.1, which maps, e.g., <bad-request/> to 400, <not-authorized/> to 401, <item-not-found/> to 404 or 604, <internal-server-error/> to 500, and <recipient-unavailable/> to 480 or 600.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
