document: rfc-5653
kind: protocol-element
summary: GSSName represents principal identities; a single internal GSSName may contain multiple mechanism-specific primitive names. Mechanism names (MNs) returned by GSSContext.getSrcName()/getTargName() contain exactly one primitive name and may be byte-compared after export via NT_EXPORT_NAME.
section: "6.2"
topics:
    - security
