document: rfc-7509
kind: protocol-element
summary: The Post-Repair Loss Count Metrics Report Block (BT=33) reports the number of primary source RTP packets still lost after applying loss-repair mechanisms (e.g., FEC, retransmission) and the number fully repaired, over a sequence number range defined by begin_seq and end_seq. It complements the RFC 5725 post-repair RLE XR block with more concise reporting.
section: "3"
topics:
