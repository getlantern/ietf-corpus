document: rfc-9033
kind: interoperability-note
summary: For interoperability, Appendix A specifies SAX hash function parameters h0=0, l_bit=0, r_bit=1, with slotframe length as T and the node's 8-byte EUI-64 as the input string. Other h0/l_bit/r_bit values may be broadcast in EB frames or preconfigured, but the reference values in Appendix A MUST be used for interoperability.
section: A
