summary: 'When SupplementalData is exchanged, the message flow is: ClientHello (with extensions) → ServerHello (with extensions) + SupplementalData* + Certificate* + ServerKeyExchange* + CertificateRequest* + ServerHelloDone → SupplementalData* + Certificate* + ClientKeyExchange + CertificateVerify* + [ChangeCipherSpec] + Finished → [ChangeCipherSpec] + Finished → Application Data. The asterisk (*) indicates optional or situation-dependent messages.'
