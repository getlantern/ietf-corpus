document: rfc-9756
kind: normative-requirement
summary: Experiments using experimental PCEP Error-Type codepoints (252-255) are not intended to be used in general deployments. Due care MUST be taken to ensure that two experiments using the same codepoints are not run in the same environment.
section: "1"
rfc2119_level: MUST
topics:
