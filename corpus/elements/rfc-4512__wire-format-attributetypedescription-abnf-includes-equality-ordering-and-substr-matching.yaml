summary: AttributeTypeDescription ABNF includes EQUALITY, ORDERING, and SUBSTR matching rule OIDs, a SYNTAX noidlen field with optional suggested upper bound in curly braces (e.g., '1.3.6.4.1.1466.0{64}'), SINGLE-VALUE, COLLECTIVE, NO-USER-MODIFICATION, and USAGE flags. NO-USER-MODIFICATION requires an operational usage.
