document: rfc-6147
kind: normative-requirement
summary: Each Pref64::/n prefix length MUST be less than or equal to 96 bits. DNS64 MUST support and MUST use as its default the IPv6-address-generation algorithm defined in Section 2 of RFC 6052. If no Pref64::/n is configured, DNS64 MUST use the Well-Known Prefix 64:ff9b::/96.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
