document: rfc-3546
kind: security-consideration
summary: Implementations MUST ensure no buffer overflow occurs from the length fields in server_name. The document does not address security risks from internationalized hostname spoofing; certificates SHOULD NOT be issued for internationalized hostnames without spoofing mitigation procedures.
section: "6.1"
topics:
