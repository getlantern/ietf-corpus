document: rfc-4660
kind: design-rationale
summary: It is RECOMMENDED that notifiers ignore (rather than reject) parts of a filter requesting unauthorized content, because subscribers may not know what they are authorized to see and will inadvertently request unauthorized items. Polite blocking (delivering bogus info and then filtering) is offered as an alternative.
section: 5.3.1
topics:
    - sip
    - realtime
    - security
