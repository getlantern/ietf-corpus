document: rfc-2955
kind: protocol-element
summary: frAtmIwfConnectionTable contains one row per FR/ATM interworking cross-connection, indexed by frAtmIwfConnIndex, frAtmIwfConnAtmPort, frAtmIwfConnVpi, frAtmIwfConnVci, frAtmIwfConnFrPort, and frAtmIwfConnDlci. Point-to-point connections occupy a single row; point-to-multipoint connections occupy multiple rows sharing the same frAtmIwfConnIndex.
