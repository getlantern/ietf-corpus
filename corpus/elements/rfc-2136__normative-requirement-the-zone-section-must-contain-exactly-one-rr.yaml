document: rfc-2136
kind: normative-requirement
summary: The Zone Section must contain exactly one RR with ZTYPE=SOA; otherwise the server signals FORMERR. If the named zone is not one of the server's authority zones, the server signals NOTAUTH.
section: 3.1.1
rfc2119_level: MUST
topics:
