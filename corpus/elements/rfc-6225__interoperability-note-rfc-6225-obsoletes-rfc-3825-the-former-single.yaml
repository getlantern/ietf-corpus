document: rfc-6225
kind: interoperability-note
summary: RFC 6225 obsoletes RFC 3825. The former single Datum field has been split into Ver, Res, and Datum sub-fields in the new GeoLoc options. DHCPv4 clients MAY still support the legacy GeoConf Option 123 originally defined in RFC 3825 for backward compatibility.
section: 2.2.3.1
topics:
    - ip
