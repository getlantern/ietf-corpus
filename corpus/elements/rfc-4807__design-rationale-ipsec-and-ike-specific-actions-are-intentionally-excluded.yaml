document: rfc-4807
kind: design-rationale
summary: IPsec- and IKE-specific actions are intentionally excluded from this base MIB and defined in companion documents (IPsec-ACTION and IKE-ACTION MIBs). This makes the base SPD MIB a general-purpose, extensible policy engine; companion action MIBs may impose additional constraints on objects in this MIB.
section: "5"
topics:
