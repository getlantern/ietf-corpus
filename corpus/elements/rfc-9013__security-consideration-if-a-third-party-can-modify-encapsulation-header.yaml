document: rfc-9013
kind: security-consideration
summary: If a third party can modify encapsulation header information, tunnel type selection, or per-payload tunnel selection, user data packets may be misrouted, misdelivered, or dropped. However, since an OSPF routing domain is typically a well-controlled single-administrative-domain network, this risk is considered low.
section: "8"
topics:
    - routing
    - security
