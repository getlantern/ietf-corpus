document: rfc-1847
kind: wire-format
summary: In multipart/encrypted, the second body part containing encrypted data is always labeled application/octet-stream. The encrypted content itself is a nested MIME body part whose true Content-Type is described in the control information of the first body part, not in its own MIME headers.
section: "2.2"
topics:
    - email
    - crypto
