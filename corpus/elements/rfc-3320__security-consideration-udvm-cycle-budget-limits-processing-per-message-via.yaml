document: rfc-3320
kind: security-consideration
summary: 'UDVM cycle budget limits processing per message via: maximum_UDVM_cycles = (8 × n + 1000) × cycles_per_bit, where n is message size in bytes. This prevents denial-of-service through computationally expensive decompression algorithms.'
section: "8.6"
topics:
    - security
