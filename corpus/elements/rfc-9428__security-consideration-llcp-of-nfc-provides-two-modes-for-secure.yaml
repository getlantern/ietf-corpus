document: rfc-9428
kind: security-consideration
summary: 'LLCP of NFC provides two modes for secure data transfer: ad hoc mode (no prior knowledge of partner, vulnerable to on-path attacks) and authenticated mode (uses a shared secret and Bonding Identifier established during initial bonding to protect against on-path attacks). Encryption uses a session key derived from the shared secret per NFC Authentication Protocol NAP-1.0.'
section: "7"
topics:
    - security
    - crypto
