document: rfc-7603
kind: protocol-element
summary: 'Three types of energy measurement are defined: energy input to a device, energy supplied by a device to other devices, and net (resultant) energy consumed (the difference between input and supplied). This distinction is required because energy objects may both consume and provide energy.'
section: "1.3"
