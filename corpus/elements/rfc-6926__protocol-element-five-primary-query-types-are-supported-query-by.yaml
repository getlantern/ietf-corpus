document: rfc-6926
kind: protocol-element
summary: 'Five primary query types are supported: Query by MAC address (chaddr/htype/hlen), Query by Client-identifier option, Query by Remote ID sub-option, Query by Relay-ID sub-option (RFC 6925), and Query for All Configured IP Addresses (signaled by absence of any other primary query).'
section: "7.2"
