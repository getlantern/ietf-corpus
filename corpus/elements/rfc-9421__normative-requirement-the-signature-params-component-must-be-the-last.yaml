document: rfc-9421
kind: normative-requirement
summary: The @signature-params component MUST be the last line of every signature base and its identifier MUST NOT appear in the covered components set for any signature. This ensures every signature always covers its own metadata, preventing metadata substitution attacks.
section: "2.3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
