document: rfc-4233
kind: design-rationale
summary: The Heartbeat message is optional and recommended only when IUA runs over a transport other than SCTP, because SCTP already has its own heartbeat mechanism. This avoids redundant keepalive overhead on native SCTP deployments.
section: 3.3.2.9
topics:
