summary: The 'l2-termination-point-attributes' grouping provides per-termination-point L2 attributes including interface-name, mac-address, port-number list, unnumbered-id list, encapsulation-type (identityref), outer/inner VLAN tags and TPIDs (feature-guarded), lag (boolean, default false), member-link-tp list (only when lag=true), and a VXLAN sub-container with vni-id.
