document: rfc-5929
kind: design-rationale
summary: '''tls-server-end-point'' uses a hash of the server certificate rather than the certificate itself because some implementations need to track channel binding in kernel-mode memory, which is often at a premium. The hash produces manageably small channel binding data.'
