document: rfc-6864
kind: normative-requirement
summary: IPv4 datagrams whose DF=1 MUST NOT be fragmented. IPv4 datagram transit devices MUST NOT clear the DF bit. DF=1 prevents fragmenting atomic datagrams and prevents further fragmenting received fragments.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ip
