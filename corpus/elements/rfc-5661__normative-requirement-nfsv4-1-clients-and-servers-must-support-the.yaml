document: rfc-5661
kind: normative-requirement
summary: NFSv4.1 clients and servers MUST support the Kerberos V5 security mechanism via RPCSEC_GSS/GSS-API. A QOP of zero is used, deferring algorithm selection to the mechanism's configuration; implementors are expected to track evolution of Kerberos V5 algorithm requirements.
section: 2.2.1.1.1.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
