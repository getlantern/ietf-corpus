document: rfc-5333
kind: privacy-consideration
summary: Calendaring URIs are often already guessable independently of ENUM, and calendar data typically requires cryptographic credentials before access is granted. Public ENUM record availability is therefore unlikely to meaningfully expose an otherwise protected calendaring resource.
section: "4"
topics:
    - privacy
    - dns
