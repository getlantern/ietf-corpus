document: rfc-7119
kind: protocol-element
summary: The Template Mapping is a data structure maintained by an IPFIX Mediator that maps received (Options) Template Records to exported (Options) Template Records, scoped by Transport Session and Observation Domain ID on both incoming and outgoing sides, including metadata that affects Template semantics such as flowKeyIndicator.
