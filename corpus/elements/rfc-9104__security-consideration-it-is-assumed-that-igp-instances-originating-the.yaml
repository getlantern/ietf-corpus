summary: It is assumed that IGP instances originating the EAG TLV will support required security mechanisms for OSPF (RFC 7474, RFC 4552, RFC 7166) and IS-IS (RFC 5304) to prevent security issues when propagating the Sub-TLVs into BGP-LS.
