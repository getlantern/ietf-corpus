document: rfc-3307
kind: design-rationale
summary: Permanent group IDs (range 0x40000000–0x7FFFFFFF) differ from permanent multicast addresses in that they offer a global service identifier reusable across multiple servers and scopes. For example, a single group ID for NTP allows clients to locate NTP servers regardless of the upper 96 bits of the address.
section: "4.2"
topics:
    - multicast
    - ip
