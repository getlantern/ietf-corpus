document: rfc-8435
kind: normative-requirement
summary: There MUST be exactly as many elements in ffds_fh_vers as there are in ffda_versions. For loose coupling with NFSv4 storage, the server MUST set ffds_stateid to the anonymous stateid since no global stateid model exists.
section: "5.1"
rfc2119_level: MUST
