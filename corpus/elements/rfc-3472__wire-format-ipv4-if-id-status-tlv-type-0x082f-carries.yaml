document: rfc-3472
kind: wire-format
summary: IPv4 IF_ID Status TLV (type 0x082f) carries IPv4 Next/Previous Hop Address (32 bits), Status Code (32 bits), and sub-TLVs to indicate an error associated with a specific interface. IPv6 IF_ID Status TLV (type 0x0830) uses a 128-bit IPv6 Error Node Address.
section: 8.2.1
topics:
    - routing
