document: rfc-2601
kind: normative-requirement
summary: The ATMARP client must attempt to utilize the primary ATMARP server (lowest index value) before utilizing a secondary ATMARP server. Administrators must ensure that listed ATMARP servers are synchronized.
section: "4"
rfc2119_level: MUST
