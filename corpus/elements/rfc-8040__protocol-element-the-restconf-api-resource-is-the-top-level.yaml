document: rfc-8040
kind: protocol-element
summary: 'The RESTCONF API resource is the top-level resource at {+restconf} with media type ''application/yang-data+xml'' or ''application/yang-data+json''. It contains three child resources: ''data'' (all data resources), ''operations'' (RPC operations), and ''yang-library-version'' (mandatory leaf identifying the ietf-yang-library revision date).'
section: "3.3"
topics:
    - netconf
    - yang
    - http
    - json
