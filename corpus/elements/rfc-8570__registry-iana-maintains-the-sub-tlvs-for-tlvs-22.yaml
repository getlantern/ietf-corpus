summary: 'IANA maintains the ''Sub-TLVs for TLVs 22, 23, 141, 222, and 223'' registry. This document registers seven new sub-TLVs: types 33 (Unidirectional Link Delay), 34 (Min/Max Unidirectional Link Delay), 35 (Unidirectional Delay Variation), 36 (Unidirectional Link Loss), 37 (Unidirectional Residual Bandwidth), 38 (Unidirectional Available Bandwidth), and 39 (Unidirectional Utilized Bandwidth).'
