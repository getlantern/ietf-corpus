document: rfc-3023
kind: protocol-element
summary: The '+xml' suffix convention is a naming standard for MIME media types that represent XML MIME entities but are not labeled as text/xml or application/xml. Applications may match XML MIME entities by comparing the subtype to the pattern '*/*+xml', enabling generic XML processing across diverse document types.
section: "7"
