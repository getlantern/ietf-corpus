document: rfc-5662
kind: wire-format
summary: 'The nfsv4_1_file_layout4 structure encodes the files-layout body: a 16-byte deviceid4 (nfl_deviceid), a nfl_util4 flags/stripe-unit word, a first-stripe index, a pattern offset, and a variable-length list of file handles (nfl_fh_list). The companion nfsv4_1_file_layout_ds_addr4 encodes stripe indices and a multipath data-server address list.'
