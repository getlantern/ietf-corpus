document: rfc-3863
kind: normative-requirement
summary: The value of the <contact> element's 'priority' attribute MUST be a decimal number between 0 and 1 inclusive with at most 3 digits after the decimal point. If the priority value is out of range, applications SHOULD ignore it and process as if the attribute were absent.
section: 4.1.5
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
