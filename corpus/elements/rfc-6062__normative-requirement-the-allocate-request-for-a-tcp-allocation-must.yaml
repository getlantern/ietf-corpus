document: rfc-6062
kind: normative-requirement
summary: The Allocate request for a TCP allocation MUST contain a REQUESTED-TRANSPORT attribute with value 6 (TCP), and MUST NOT include DONT-FRAGMENT, RESERVATION-TOKEN, or EVEN-PORT attributes, as those features are UDP-specific.
section: "4.1"
rfc2119_level: MUST
topics:
    - nat
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
