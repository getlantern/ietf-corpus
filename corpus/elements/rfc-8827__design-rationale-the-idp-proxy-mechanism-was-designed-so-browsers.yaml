document: rfc-8827
kind: design-rationale
summary: The IdP proxy mechanism was designed so browsers need only know how to load the IdP's JavaScript from a deterministic well-known URI and call a generic API, without implementing any particular identity protocol. This allows a single browser to support any number of identity protocols including those that didn't exist when the browser was written.
section: "7.2"
topics:
    - webrtc
    - security
    - oauth
