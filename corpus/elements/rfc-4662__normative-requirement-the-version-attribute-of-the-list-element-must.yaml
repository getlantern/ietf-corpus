document: rfc-4662
kind: normative-requirement
summary: The 'version' attribute of the <list> element MUST be 0 for the first NOTIFY message sent within a subscription, and MUST increase by exactly one for each subsequent NOTIFY sent within that subscription.
section: "5.2"
