document: rfc-3024
kind: protocol-element
summary: The 'T' bit is added to the Registration Request packet. When set, the mobile node asks its home agent to accept a reverse tunnel from the care-of address; if using a foreign agent care-of address, the FA is asked to reverse-tunnel packets.
section: "3.2"
topics:
