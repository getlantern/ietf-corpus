document: rfc-4604
kind: normative-requirement
summary: A router SHOULD ignore all IGMPv1/v2 and MLDv1 reports for addresses in the source-specific range and specifically SHOULD NOT use them to establish IP forwarding state (MODIFICATION to IGMPv3/MLDv2).
section: "3.5"
rfc2119_level: SHOULD NOT
topics:
    - multicast
