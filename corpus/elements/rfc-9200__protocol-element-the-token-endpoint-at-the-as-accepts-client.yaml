document: rfc-9200
kind: protocol-element
summary: 'The token endpoint at the AS accepts client POST requests; grant_type defaults to ''client_credentials'' if absent. The AS responds with Access Information: access_token, ace_profile, expires_in, and PoP key material (cnf / rs_cnf from RFC 9201). The default endpoint path SHOULD be ''/token''.'
section: "5.8"
topics:
    - oauth
    - cbor
