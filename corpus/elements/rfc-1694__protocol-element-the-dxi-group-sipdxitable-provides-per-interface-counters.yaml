document: rfc-1694
kind: protocol-element
summary: 'The DXI group (sipDxiTable) provides per-interface counters: sipDxiCrc (CRC16 or CRC32 type in use), sipDxiOutDiscards (congestion-caused discards), sipDxiInErrors (checksum/size/format errors), sipDxiInAborts (abort flag sequences), sipDxiInTestFrames and sipDxiOutTestFrames (Heart Beat Poll frames), and sipDxiHbpNoAcks (HBP no-acknowledge timeouts).'
section: "4.7"
topics:
    - snmp
