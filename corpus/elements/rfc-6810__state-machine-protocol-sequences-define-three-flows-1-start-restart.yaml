document: rfc-6810
kind: state-machine
summary: 'Protocol sequences define three flows: (1) Start/Restart: Reset Query → Cache Response → zero or more IPvX Prefix PDUs → End of Data; (2) Typical Exchange: optional Notify → Serial Query → Cache Response → IPvX Prefixes → End of Data; (3) No Incremental Update: Serial Query → Cache Reset → Reset Query → full data sequence.'
