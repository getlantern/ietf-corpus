document: rfc-2417
kind: normative-requirement
summary: A row in marsClientVcTable (and other tables with RowStatus) cannot be set to 'active' until all corresponding columns are appropriately configured. SVC-type VC rows (marsClientVcType = 'svc') cannot be modified or deleted via SNMP.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
