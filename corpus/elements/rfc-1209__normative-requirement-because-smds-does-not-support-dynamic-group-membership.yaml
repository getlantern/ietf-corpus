document: rfc-1209
kind: normative-requirement
summary: Because SMDS does not support dynamic group membership, all multicast IP addresses in a LIS are mapped to smds$lis-ga, and filtering of multicast packets MUST be performed in the destination host.
section: IP Multicast Support
rfc2119_level: MUST
topics:
    - ip
    - multicast
