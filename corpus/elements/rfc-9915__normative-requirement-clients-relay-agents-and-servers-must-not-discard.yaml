document: rfc-9915
kind: normative-requirement
summary: Clients, relay agents, and servers MUST NOT discard messages containing unknown options; such options MUST be ignored as if not present. A client or server MUST discard any received DHCP message with an unknown message type.
section: "16"
rfc2119_level: MUST NOT
