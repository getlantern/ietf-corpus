document: rfc-6388
kind: design-rationale
summary: mLDP builds P2MP and MP2MP LSPs in a receiver-initiated manner without interacting with any multicast tree construction protocol. The leaf nodes initiate setup toward the root by sending Label Mapping messages upstream hop-by-hop following unicast routing, making the solution self-contained within LDP.
