document: rfc-2244
kind: normative-requirement
summary: To access any entry, a client must have 'r' rights on the 'entry' attribute. Implementations MUST NOT reveal the existence of an entry for which the client lacks 'r' rights, even via error messages.
section: "3.5"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
