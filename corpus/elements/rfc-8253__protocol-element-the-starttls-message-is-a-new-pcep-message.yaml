document: rfc-8253
kind: protocol-element
summary: The StartTLS message is a new PCEP message (Message-Type 13) sent by both PCC and PCE to initiate TLS negotiation before any other PCEP message exchange, including the Open message. It replaces the Open message as the first PCEP message in a PCEPS session.
section: "3.2"
