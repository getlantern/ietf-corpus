document: rfc-7461
kind: privacy-consideration
summary: Energy and power monitoring can reveal sensitive information about individuals' activities and habits. Implementors should use appropriate privacy protections as discussed in RFC 6988 Section 9; monitoring of individuals and homes should only occur with proper authorization.
