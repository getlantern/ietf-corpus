document: rfc-5670
kind: normative-requirement
summary: A PCN-node MUST implement a threshold-meter equivalent to a token bucket with configured rate PCN-threshold-rate and bucket size BS_tm. If the token fill F_tm falls below a configured threshold depth, the meter signals that the packet is to be threshold-marked.
section: "2.3"
rfc2119_level: MUST
topics:
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
