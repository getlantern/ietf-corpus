document: rfc-7614
kind: design-rationale
summary: When the REFER forks, only one final response returns to the UA. If the UA must track all locations that accepted the REFER, using the 'explicitsub' extension is inappropriate; the UA should instead send REFER within an existing dialog or use the Target-Dialog mechanism to ensure single-location acceptance.
section: "4.1"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
