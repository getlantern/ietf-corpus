document: rfc-3168
kind: protocol-element
summary: An ECN-setup SYN packet has both ECE and CWR flags set and indicates the sender is willing to participate in ECN as both sender and receiver. An ECN-setup SYN-ACK has only ECE set (not CWR).
section: 6.1.1
topics:
