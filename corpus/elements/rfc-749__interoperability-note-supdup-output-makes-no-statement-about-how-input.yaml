document: rfc-749
kind: interoperability-note
summary: SUPDUP-OUTPUT makes no statement about how input is handled; NVT input is used by default. The user-to-server screen management commands defined in RFC 734 are NOT implicitly activated by IAC WILL SUPDUP-OUTPUT.
