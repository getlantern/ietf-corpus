document: rfc-8105
kind: normative-requirement
summary: The 6LBR MUST set the 'on-link' (L) flag to zero in the Prefix Information Option, causing 6LNs to always send packets to the 6LBR including when the destination is another 6LN on the same prefix.
section: 3.2.1
rfc2119_level: MUST
topics:
