document: rfc-9125
kind: design-rationale
summary: BGP peerings between gateways and ASBRs are not discovered automatically but always arise from explicit configuration. This is intentional and consistent with standard BGP operation, ensuring that the auto-discovery mechanism for gateways within a site does not weaken the security model of inter-AS BGP sessions.
section: "8"
topics:
    - bgp
    - routing
    - security
