document: rfc-5846
kind: protocol-element
summary: The Global (G) bit set in BRI/BRA indicates termination of all Per-Peer mobility bindings or multiple bindings sharing a common identifier. When G is set, the Revocation Trigger MUST use a Global Revocation Trigger value (128–249); the LMA must verify the requesting MAG is authorized before processing such a message.
section: "5.1"
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
