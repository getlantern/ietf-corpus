document: rfc-8103
kind: normative-requirement
summary: Within the scope of any content-authenticated-encryption key, the nonce value MUST be unique. That is, the set of nonce values used with any given key MUST NOT contain any duplicate values.
section: "3"
rfc2119_level: MUST
