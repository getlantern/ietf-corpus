document: rfc-2632
kind: normative-requirement
summary: 'The email address SHOULD be in the subjectAltName extension and SHOULD NOT be in the subject distinguished name. Receiving agents MUST recognize email addresses in both the subjectAltName field and the Distinguished Name PKCS #9 emailAddress attribute.'
section: "3"
rfc2119_level: MUST
topics:
