document: rfc-1490
kind: wire-format
summary: Bridged frames use NLPID 0x80 (SNAP), OUI 0x00-80-C2, and a two-octet PID that identifies both the MAC frame type (802.3/802.4/802.5/FDDI/802.6) and whether the original LAN FCS is preserved. PIDs 0x00-01 through 0x00-04 preserve FCS; 0x00-07 through 0x00-0B do not.
section: "4.2"
extracted_by: claude-sonnet-4-6
