document: rfc-7770
kind: protocol-element
summary: 'The flooding scope of the RI LSA is determined by LSA type: OSPFv2 uses type 9 (link-scoped), 10 (area-scoped), or 11 (AS-scoped) Opaque LSAs; OSPFv3 uses the S1/S2 bits. If AS-wide scope is used, area-scoped LSAs must also be advertised into attached NSSA areas.'
section: "2.7"
topics:
    - routing
