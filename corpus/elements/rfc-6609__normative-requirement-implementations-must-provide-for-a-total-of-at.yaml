document: rfc-6609
kind: normative-requirement
summary: Implementations MUST provide for a total of at least three levels of nested scripts including the top-level script. An error MUST be generated either at upload or execution time if any nesting limit is exceeded, and an implicit 'keep' action MUST be executed to prevent message loss.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
