document: rfc-9154
kind: interoperability-note
summary: During Transition Phase 2, the registry must support comparison of a passed authorization information value against either a hashed or an encrypted stored value, requiring that stored values be self-identifying as to their form. This dual-mode support is needed until all existing encrypted values are converted to hashed form.
section: "6.2"
topics:
    - security
    - crypto
