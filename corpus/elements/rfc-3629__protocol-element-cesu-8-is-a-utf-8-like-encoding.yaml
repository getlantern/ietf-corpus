document: rfc-3629
kind: protocol-element
summary: CESU-8 is a UTF-8-like encoding that encodes UTF-16 code unit values (16-bit quantities) rather than Unicode code points, producing different results for characters above U+FFFF. CESU-8 encodings of characters above U+FFFF are NOT valid UTF-8 and are not intended for Internet use.
section: "3"
