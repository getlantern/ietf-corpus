document: rfc-4527
kind: protocol-element
summary: The Post-Read request control is identified by OID 1.3.6.1.1.13.2. Its controlValue is a BER-encoded AttributeSelection and it is appropriate for addRequest, modifyRequest, and modDNRequest messages. The corresponding response control returns a BER-encoded SearchResultEntry.
