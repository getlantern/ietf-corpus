document: rfc-8412
kind: protocol-element
summary: 'Subscription mechanism: allows a SWIMA-PV to register with a SWIMA-PC for continuous or periodic push of inventory or event data. Subscriptions can be established, managed (including targeted subscriptions limited to specific Software Identifiers), and terminated; the SWIMA-PC fulfills subscriptions by sending SWIMA Response attributes.'
section: "3.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
