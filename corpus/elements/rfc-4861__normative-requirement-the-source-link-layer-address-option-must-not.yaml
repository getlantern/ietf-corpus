document: rfc-4861
kind: normative-requirement
summary: The Source Link-Layer Address option MUST NOT be included in a Neighbor Solicitation when the IPv6 source address is the unspecified address. On link layers with addresses, it MUST be included in multicast solicitations and SHOULD be included in unicast solicitations.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
