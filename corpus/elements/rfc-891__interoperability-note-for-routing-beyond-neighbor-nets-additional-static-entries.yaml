document: rfc-891
kind: interoperability-note
summary: For routing beyond neighbor nets, additional static entries can be configured in the Net Table, including a wildcard default-gateway entry. For ARPANET routing, a selected local-net host runs a GGP/EGP Gateway process that dynamically maintains the Net Table as part of GGP/EGP protocol interactions with other gateways.
