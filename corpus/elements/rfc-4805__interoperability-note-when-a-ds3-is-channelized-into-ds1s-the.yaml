document: rfc-4805
kind: interoperability-note
summary: When a DS3 is channelized into DS1s, the dsx3Channelization object in the DS3 MIB (RFC 3896) must be set to enabledDs1; the DS1 MIB dsx1ChanMappingTable then provides per-channel mapping. When E3/E1 channelization is used, the number of DS0s per E1 varies with framing (31 for plain E1, 30 with multiframing).
section: 3.2.3
topics:
