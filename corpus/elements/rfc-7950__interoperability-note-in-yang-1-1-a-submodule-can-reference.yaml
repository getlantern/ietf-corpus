document: rfc-7950
kind: interoperability-note
summary: In YANG 1.1, a submodule can reference all definitions in all submodules of the same module without an explicit 'include' statement. For backward compatibility with YANG 1, submodule 'include' of sibling submodules is still permitted (MAY) but no longer required.
section: "5.1"
topics:
    - yang
