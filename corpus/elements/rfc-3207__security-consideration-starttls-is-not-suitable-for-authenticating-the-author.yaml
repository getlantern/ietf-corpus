document: rfc-3207
kind: security-consideration
summary: STARTTLS is not suitable for authenticating the author of an email message unless every hop in the delivery chain, including submission to the first SMTP server, is authenticated. SMTP-AUTH and MIME security multiparts are alternatives for message-level authentication.
section: "6"
topics:
