document: rfc-9603
kind: design-rationale
summary: It is recommended that SRv6 MSD information not be included in the SRv6-PCE-CAPABILITY sub-TLV in deployments where the PCE can obtain it via IGP/BGP-LS as topology information, since the sub-TLV reflects only the local PCC's capabilities while path computation requires per-hop MSD across all nodes.
section: 4.1.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
