document: rfc-5857
kind: normative-requirement
summary: Keys for the ROHC integrity algorithm (one per direction) are derived from the IKEv2 KEYMAT, treating ROHC as an IPsec protocol. When a ROHC-enabled CHILD_SA is rekeyed, the integrity algorithm key MUST also be rekeyed.
section: 3.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
