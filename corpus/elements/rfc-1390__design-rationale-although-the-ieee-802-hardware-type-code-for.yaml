document: rfc-1390
kind: design-rationale
summary: Although the IEEE 802 hardware type code for ARP is 6 and FDDI is an 802 network, ARP uses hardware type 1 (Ethernet) to avoid interoperability problems when bridging to Ethernet networks. Using differing type codes would break ARP through translational bridges.
section: Address Resolution
topics:
