document: rfc-1483
kind: normative-requirement
summary: For VC-based bridged protocols, the presence or absence of the trailing LAN FCS SHALL be identified implicitly by the VC (since the PID field is absent); PDUs with LAN FCS and PDUs without LAN FCS are considered different protocols and must be carried on separate VCs.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
