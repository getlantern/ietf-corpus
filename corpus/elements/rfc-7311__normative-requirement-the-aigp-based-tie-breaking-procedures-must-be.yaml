document: rfc-7311
kind: normative-requirement
summary: The AIGP-based tie-breaking procedures MUST be executed BEFORE any of the standard BGP tie-breaking procedures in RFC 4271 Section 9.1.2.2. Routes without an AIGP TLV are removed from consideration when any routes have an AIGP TLV.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
