document: rfc-4023
kind: protocol-element
summary: The encapsulating LSR (tunnel head) must know both the IP address of the decapsulating LSR (tunnel tail) and that the tunnel tail supports the particular encapsulation. This knowledge may be conveyed by manual configuration or a discovery/setup protocol; the means are outside the scope of this document.
section: "1"
topics:
