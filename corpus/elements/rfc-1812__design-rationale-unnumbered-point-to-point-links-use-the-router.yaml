document: rfc-1812
kind: design-rationale
summary: Unnumbered point-to-point links use the router's 'router-id' (one of its assigned IP addresses) as a proxy address for the unnumbered interface, rather than the 'virtual router' model. This avoids complex inter-router coordination and allows mixed-vendor environments while conserving IP address space.
section: 2.2.7
topics:
    - ip
    - routing
