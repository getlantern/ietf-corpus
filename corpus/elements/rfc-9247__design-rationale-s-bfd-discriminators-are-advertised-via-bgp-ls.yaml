document: rfc-9247
kind: design-rationale
summary: S-BFD Discriminators are advertised via BGP-LS because IS-IS and OSPF extensions only distribute discriminators within a single IGP area/level or domain. BGP-LS enables collection and distribution across IGP domains and across multiple Autonomous Systems within an administrative domain, supporting end-to-end S-BFD monitoring for service paths that span IGP boundaries.
section: "1"
topics:
