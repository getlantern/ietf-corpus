document: rfc-3284
kind: protocol-element
summary: 'COPY addresses are encoded using one of several modes: VCD_SELF (0) encodes the raw address as an integer; VCD_HERE (1) encodes ''here - addr''; near modes [2, s_near+1] encode ''addr - near[m-2]''; same modes [s_near+2, s_near+s_same+1] encode a single byte b such that addr == same[(m-(s_near+2))*256+b].'
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
