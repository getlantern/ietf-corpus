document: rfc-4303
kind: security-consideration
summary: If the key used to compute an ICV is manually distributed, a compliant implementation SHOULD NOT provide anti-replay service, because correct anti-replay requires maintaining the sequence number counter across reboots with no automated recovery on counter overflow.
section: "5"
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
