document: rfc-7145
kind: interoperability-note
summary: An iSER-enabled node is not required to initiate RDMAExtensions key exchange if it prefers Traditional iSCSI mode. If both peers fail to negotiate RDMAExtensions='Yes' on the leading connection, some RCaP implementations (e.g., InfiniBand) may require the existing connection to be torn down and a new one established in TCP-capable mode (e.g., IPoIB).
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
