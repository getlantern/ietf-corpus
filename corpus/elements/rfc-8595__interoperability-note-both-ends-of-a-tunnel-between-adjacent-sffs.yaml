document: rfc-8595
kind: interoperability-note
summary: Both ends of a tunnel between adjacent SFFs must know the tunnel is used for SFC and must agree on the form of NSH representation (MPLS encoding vs. NSH). The MPLS encoding of the logical NSH may be used even when the inter-SFF tunnel is not itself an MPLS tunnel.
section: "3"
topics:
    - mpls
