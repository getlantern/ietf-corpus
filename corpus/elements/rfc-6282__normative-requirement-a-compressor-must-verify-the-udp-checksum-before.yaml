document: rfc-6282
kind: normative-requirement
summary: A compressor MUST verify the UDP checksum before eliding it and MUST ensure the additional integrity check is in place before doing so; if verification fails, the compressor MUST drop the packet.
section: 4.3.2
rfc2119_level: MUST
topics:
    - udp
    - security
