document: rfc-9132
kind: protocol-element
summary: The heartbeat mechanism uses CoAP GET/POST on the '/hb' path to keep the DOTS signal channel active. If a DOTS agent does not receive a response to 'missing-hb-allowed' consecutive heartbeats, the DOTS signal channel session is considered lost, which may trigger preconfigured mitigations.
section: "4.7"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
