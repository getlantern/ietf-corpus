document: rfc-1928
kind: interoperability-note
summary: When the server is multi-homed, the BND.ADDR returned in a CONNECT reply may differ from the IP address the client uses to reach the SOCKS server. Clients must use the BND.ADDR and BND.PORT from the reply, not the server's known address.
section: "6"
topics:
    - security
