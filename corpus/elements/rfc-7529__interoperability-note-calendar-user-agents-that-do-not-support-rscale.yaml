document: rfc-7529
kind: interoperability-note
summary: 'Calendar user agents that do not support RSCALE may: (1) reject the entire iCalendar object, (2) reject only the components with the unrecognized RSCALE (and associated overridden components sharing the same UID), or (3) treat the component as non-recurring. Option (2) is recommended as least disruptive.'
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
