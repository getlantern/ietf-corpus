document: rfc-8775
kind: normative-requirement
summary: When a router stops acting as the GDR for a group, it MUST set the Assert metric preference to maximum (0x7fffffff) and the Assert metric to one less than maximum (0xfffffffe) to minimize packet loss during GDR transitions.
section: "5.7"
rfc2119_level: MUST
topics:
    - multicast
    - realtime
