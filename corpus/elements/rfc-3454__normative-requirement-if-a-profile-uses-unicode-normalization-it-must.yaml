document: rfc-3454
kind: normative-requirement
summary: If a profile uses Unicode normalization, it MUST use normalization form KC (NFKC), not form C. A profile that specifies normalization MUST use the normalization tables associated with the version of Unicode specified for that profile.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
