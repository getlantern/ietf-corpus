document: rfc-7780
kind: normative-requirement
summary: TRILL switches MUST support E-L1FS PDUs (RFC 7356) and MUST include a Scope Flooding Support TLV in all TRILL Hellos indicating E-L1FS and any other FS-LSP scopes they support. E-L1FS support MUST also be advertised via the 'E' capability bit (bit 4) in the TRILL-VER sub-TLV.
section: "8.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
