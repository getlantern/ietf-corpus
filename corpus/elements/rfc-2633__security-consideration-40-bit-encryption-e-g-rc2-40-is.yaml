document: rfc-2633
kind: security-consideration
summary: 40-bit encryption (e.g., RC2/40) is considered weak and offers little security over plaintext. Sending and receiving agents should inform users of the relative cryptographic strength of messages, and weak encryption should never be used unless the only alternative is no encryption.
section: "5"
topics:
