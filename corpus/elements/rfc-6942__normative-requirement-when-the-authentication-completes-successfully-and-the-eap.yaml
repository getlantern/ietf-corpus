document: rfc-6942
kind: normative-requirement
summary: When the authentication completes successfully and the EAP method has generated an EMSK, the home EAP server MUST derive the rRK as specified in RFC 6696 using the saved ERP realm name and include it in a Key AVP with Key-Type set to rRK.
section: "5.1"
rfc2119_level: MUST
topics:
