document: rfc-7361
kind: normative-requirement
summary: The positive MAC flush message (flush-all-but-mine) from RFC 4762 MUST always be handled for Backbone MACs (B-MACs) in cases where core nodes change or fail. The optimized procedures in this document augment but do not replace RFC 4762 for those cases.
