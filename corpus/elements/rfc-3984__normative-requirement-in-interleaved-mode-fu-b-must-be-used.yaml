document: rfc-3984
kind: normative-requirement
summary: In interleaved mode, FU-B MUST be used for the first fragmentation unit of a fragmented NAL unit; FU-B MUST NOT be used in any other case. All subsequent fragments of that NAL unit MUST use FU-A.
section: "5.8"
rfc2119_level: MUST
topics:
