document: rfc-7866
kind: normative-requirement
summary: When each UA in a CS traversal (e.g., B2BUA or conference focus) is aware that the CS is being recorded, it MUST propagate the recording indication via the 'a=record' attribute to all other parties in the CS.
section: 7.3.1
rfc2119_level: MUST
topics:
