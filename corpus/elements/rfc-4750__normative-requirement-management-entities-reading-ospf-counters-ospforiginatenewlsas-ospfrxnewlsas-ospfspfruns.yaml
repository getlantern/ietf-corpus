document: rfc-4750
kind: normative-requirement
summary: Management entities reading OSPF counters (ospfOriginateNewLsas, ospfRxNewLsas, ospfSpfRuns, ospfIfEvents, ospfNbrEvents, etc.) SHOULD check ospfDiscontinuityTime to detect events (such as OSPF process restarts) that would invalidate their understanding of counter values.
section: "1.4"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
