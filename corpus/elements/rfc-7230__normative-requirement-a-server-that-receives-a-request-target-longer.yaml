document: rfc-7230
kind: normative-requirement
summary: A server that receives a request-target longer than any URI it wishes to parse MUST respond with 414 (URI Too Long). All HTTP senders and recipients are RECOMMENDED to support request-line lengths of at least 8000 octets.
section: 3.1.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
