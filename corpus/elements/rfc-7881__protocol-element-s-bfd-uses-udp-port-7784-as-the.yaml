document: rfc-7881
kind: protocol-element
summary: S-BFD uses UDP port 7784 as the well-known destination port for S-BFD Control packets sent from SBFDInitiator to SBFDReflector. The SBFDReflector listens on this port; the SBFDInitiator uses it as the destination. The source port must not be 7784 and must remain constant across all packets in a given SBFDInitiator session.
section: "2"
topics:
