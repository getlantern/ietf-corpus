document: rfc-9374
kind: protocol-element
summary: DETs can be stored in DNS either as FQDNs (e.g., "RAA.HDA.20010030.hhit.arpa.") or as standard IPv6 reverse lookups under ip6.arpa. The HDA SHOULD provide DNS service for its zone. The DNS entry can also serve as a DET revocation service by returning a revocation record instead of the HI RR.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - registry
