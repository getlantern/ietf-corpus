document: rfc-8783
kind: normative-requirement
summary: The 'target-prefix' list in alias creation MUST NOT include broadcast, loopback, or multicast addresses. DOTS servers MUST validate that supplied prefixes are within the scope of the DOTS client domain; FQDN-resolved addresses are subject to the same validation.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - ip
