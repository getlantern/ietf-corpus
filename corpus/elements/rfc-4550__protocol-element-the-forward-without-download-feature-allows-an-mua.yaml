document: rfc-4550
kind: protocol-element
summary: The 'forward without download' feature allows an MUA to compose and forward email incorporating content from an IMAP server without downloading it to the client, using URLAUTH tokens and either CATENATE (server-side assembly) or BURL+BDAT (submission-side assembly).
