document: rfc-2369
kind: normative-requirement
summary: 'Client applications MUST follow three parsing guidelines: ignore fields not starting with ''<'' (unless noted otherwise); ignore characters after a closing bracket unless a comma follows; and ignore the remainder of a field if a sub-item is not an angle-bracket enclosed URL.'
section: "2"
rfc2119_level: MUST
topics:
