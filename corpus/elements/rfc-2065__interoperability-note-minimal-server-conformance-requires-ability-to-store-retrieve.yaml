document: rfc-2065
kind: interoperability-note
summary: Minimal server conformance requires ability to store, retrieve, and zone-transfer SIG, KEY, and NXT RRs; any secondary, caching, or other server for a secure zone MUST be at least minimally compliant. Full compliance additionally requires reading these RRs in zone files, generating SIG/NXT RRs, proper automatic inclusion in responses, CNAME suppression, CD/AD bit handling, and proper delegation point NXT handling.
section: "8.1"
topics:
    - dns
    - security
