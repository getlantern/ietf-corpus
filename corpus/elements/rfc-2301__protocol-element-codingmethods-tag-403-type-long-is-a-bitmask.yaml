document: rfc-2301
kind: protocol-element
summary: 'CodingMethods (tag 403, type LONG) is a bitmask indicating which compression methods are used in the file: bit 1=MH (T.4), bit 2=MR (T.4), bit 3=MMR (T.6), bit 4=JBIG (T.82/T.85), bit 5=Baseline JPEG (T.81), bit 6=JBIG color (T.82/T.43). Bits 7–31 are reserved.'
section: 2.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
