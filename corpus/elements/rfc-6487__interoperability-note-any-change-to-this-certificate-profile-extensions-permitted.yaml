document: rfc-6487
kind: interoperability-note
summary: Any change to this certificate profile—extensions, permitted attributes, optional fields, or encodings—is not backward compatible; relying parties are required to reject non-conforming certificates. A formal 3-phase transition procedure (capability, coexistence, cutover) must be followed for all profile updates, coordinated across all CAs and RPs.
