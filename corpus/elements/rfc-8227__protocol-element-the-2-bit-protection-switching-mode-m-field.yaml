document: rfc-8227
kind: protocol-element
summary: 'The 2-bit Protection-Switching Mode (M) field in the RPS PDU indicates the mode used by the sending node: 00=Reserved, 01=Wrapping, 10=Short-Wrapping, 11=Steering. This field allows ring nodes to verify all members use the same protection-switching mechanism.'
section: 5.2.2
topics:
    - mpls
    - routing
