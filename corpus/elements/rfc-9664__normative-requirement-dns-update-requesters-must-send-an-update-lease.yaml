document: rfc-9664
kind: normative-requirement
summary: DNS Update Requesters MUST send an Update Lease option with any DNS Update that updates RRs not intended to be present indefinitely. The Update Lease option SHOULD specify a lease duration of no shorter than 1800 seconds (30 minutes).
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
