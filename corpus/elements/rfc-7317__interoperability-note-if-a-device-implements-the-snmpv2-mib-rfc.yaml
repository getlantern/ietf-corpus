document: rfc-7317
kind: interoperability-note
summary: If a device implements the SNMPv2-MIB (RFC 3418), implementations MAY map /system/contact to sysContact and /system/location to sysLocation; size and character-set differences between the YANG leaves and the MIB objects must be handled by an implementation-specific mechanism.
