document: rfc-5089
kind: interoperability-note
summary: An IS-IS router not supporting the PCED sub-TLV will silently ignore it as specified in RFC 4971, introducing no interoperability issues. The PCED sub-TLV is defined entirely within the existing Router Capability TLV framework.
