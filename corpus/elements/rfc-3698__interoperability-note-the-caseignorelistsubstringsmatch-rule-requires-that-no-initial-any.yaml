document: rfc-3698
kind: interoperability-note
summary: The caseIgnoreListSubstringsMatch rule requires that no initial, any, or final component of the asserted SubstringsAssertion value matches a substring that spans more than one stored DirectoryString component of the list, constraining interoperability with implementations that naively concatenate and match.
section: "2.5"
