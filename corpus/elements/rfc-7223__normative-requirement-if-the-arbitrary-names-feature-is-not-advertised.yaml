document: rfc-7223
kind: normative-requirement
summary: If the 'arbitrary-names' feature is not advertised, the names of user-controlled interfaces MUST match the device's naming scheme. A client cannot assume arbitrary naming is supported.
section: "3.1"
rfc2119_level: MUST
topics:
