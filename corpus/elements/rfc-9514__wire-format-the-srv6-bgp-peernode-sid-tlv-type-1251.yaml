document: rfc-9514
kind: wire-format
summary: The SRv6 BGP PeerNode SID TLV (Type 1251, Length 12) encodes a 1-octet Flags (B/S/P bits), 1-octet Weight, 2-octet Reserved, 4-octet Peer AS Number, and 4-octet Peer BGP Identifier (Router-ID). It carries EPE PeerNode and PeerSet SID context.
