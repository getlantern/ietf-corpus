document: rfc-7601
kind: registry
summary: The 'Email Authentication Methods' registry records method names, their ptypes, properties, values, status (active/deprecated), and version. New entries require Expert Review. No two entries may share the same method, ptype, and property combination. RFC 7601 updates the registry to add an 'auth'/'smtp'/'auth' entry and deprecate 'dkim-adsp' and 'domainkeys' entries.
section: "6.2"
topics:
    - email
    - registry
