document: rfc-9725
kind: normative-requirement
summary: Protocol extensions supported by WHIP sessions MUST be advertised via Link header fields in the '201 Created' response. Each extension MUST register a unique URN starting with 'urn:ietf:params:whip:ext'. WHIP clients MUST ignore unknown 'rel' values; sessions MUST NOT require any extension.
section: "4.9"
rfc2119_level: MUST
topics:
    - webrtc
    - http
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
