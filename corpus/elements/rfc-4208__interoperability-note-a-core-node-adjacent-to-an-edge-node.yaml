document: rfc-4208
kind: interoperability-note
summary: A core-node adjacent to an edge-node MAY map between teardown using ResvTear/PathTear and PathErr with Path_State_Removed. A core-node receiving a ResvTear from its downstream neighbor MAY respond with a PathTear and send a PathErr with Path_State_Removed further upstream.
section: "6.2"
topics:
    - mpls
