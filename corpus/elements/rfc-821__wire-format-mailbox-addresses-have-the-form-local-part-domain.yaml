document: rfc-821
kind: wire-format
summary: 'Mailbox addresses have the form <local-part>@<domain> where local-part is a dot-string or quoted-string. Forward-paths and reverse-paths are enclosed in angle brackets and may include an optional source-route prefix of the form @host1,@host2: before the mailbox.'
section: 4.1.2
topics:
    - email
