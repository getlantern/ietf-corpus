document: rfc-4292
kind: protocol-element
summary: 'inetCidrRouteType enumerates route types: other(1), reject(2) — discards traffic and returns ICMP notification, local(3) — next hop is the final destination, remote(4) — next hop is not the final destination, blackhole(5) — silently discards traffic. Routes not resulting in forwarding or rejection should not be displayed.'
section: "5"
topics:
