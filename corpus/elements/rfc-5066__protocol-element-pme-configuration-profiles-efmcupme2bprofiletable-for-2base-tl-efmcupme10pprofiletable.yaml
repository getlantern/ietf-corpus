document: rfc-5066
kind: protocol-element
summary: PME configuration profiles (efmCuPme2BProfileTable for 2BASE-TL, efmCuPme10PProfileTable for 10PASS-TS) allow shared provisioning across multiple PMEs. There are 12 predefined profiles for 2BASE-TL and 22 for 10PASS-TS per 802.3ah, plus two additional best-effort profiles for 2BASE-TL. Per-PME profile (efmCuPmeAdminProfile) overrides the port-level profile (efmCuAdminProfile).
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
