document: rfc-7866
kind: protocol-element
summary: The 'a=recordpref' SDP attribute allows a CS participant to express a recording preference at the session or media level. Values are 'on', 'off', 'pause', and 'nopreference'. The SRC is not required to honor the preference but MUST report any resulting state change via 'a=record'.
section: 7.3.2
topics:
    - sip
    - realtime
