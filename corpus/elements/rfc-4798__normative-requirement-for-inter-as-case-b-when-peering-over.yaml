document: rfc-4798
kind: normative-requirement
summary: For inter-AS case (b), when peering over IPv6 the exchange of labeled IPv6 routes MUST be per RFC 2545 and RFC 3107; when peering over IPv4, the ASBR's IPv4 address MUST be encoded as an IPv4-mapped IPv6 address in the BGP Next Hop field.
section: "4"
rfc2119_level: MUST
topics:
