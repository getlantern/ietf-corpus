document: rfc-7708
kind: wire-format
summary: 'The Type 4 VCCV packet encapsulation consists of a PW LSE, followed by a GAL LSE, followed by a Generic Associated Channel Header (4 bytes: 0x1 nibble, Version, Reserved, Channel Type), followed by the VCCV Message Body. The structure is identical whether or not FAT is in use.'
