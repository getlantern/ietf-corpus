document: rfc-9437
kind: protocol-element
summary: The I-bit (xTR-ID bit) is a new bit at position 11 in the LISP Map-Request header. When set to 1 it indicates that 128-bit xTR-ID and 64-bit Site-ID fields are appended after the final EID-Record in the Map-Request.
