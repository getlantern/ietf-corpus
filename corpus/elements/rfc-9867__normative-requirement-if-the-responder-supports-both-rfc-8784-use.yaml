document: rfc-9867
kind: normative-requirement
summary: If the responder supports both RFC 8784 (USE_PPK) and this specification (USE_PPK_INT) and is configured to use PPKs, it MUST return either a USE_PPK_INT or a USE_PPK notification in the IKE_SA_INIT response, but not both.
section: "3.1"
rfc2119_level: MUST
