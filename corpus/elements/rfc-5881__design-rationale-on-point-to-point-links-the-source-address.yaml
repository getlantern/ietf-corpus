document: rfc-5881
kind: design-rationale
summary: On point-to-point links, the source address is explicitly excluded from session identification to allow it to change (e.g., interface renumbering). The TTL=255 check or use of authentication provides assurance that packets genuinely come from the immediate neighbor, making source-address-based identity redundant.
section: "6"
topics:
    - routing
