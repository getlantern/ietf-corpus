document: rfc-6980
kind: interoperability-note
summary: With 2048-bit keys as required by RFC 6494, Certification Path Advertisement packets range from 1127 to 1238 bytes, which is below the minimum IPv6 MTU of 1280 bytes. However, if 4096-bit keys become required in the future, a larger MTU or protocol changes may be needed to carry CPA without fragmentation.
section: Appendix A
topics:
    - ip
    - pkix
    - crypto
