document: rfc-4088
kind: design-rationale
summary: 'The preference ordering for URI formats (no suffix > ''+'' > ''.*'') reflects precision: an OID without a suffix precisely designates one instance, while ''+'' and ''.*'' designate instances that may change or include multiple values.'
