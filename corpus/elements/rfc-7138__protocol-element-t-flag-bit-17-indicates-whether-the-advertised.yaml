document: rfc-7138
kind: protocol-element
summary: T flag (bit 17) indicates whether the advertised Signal Type can be terminated; S flag (bit 18) indicates whether it can be switched. Both MUST be set or cleared appropriately; a value of 0 in both T and S MUST NOT be used.
