document: rfc-6396
kind: normative-requirement
summary: The TABLE_DUMP Type MUST be superseded by TABLE_DUMP_V2 when 4-byte Peer AS numbers are needed or when the AFI of the peer IP differs from the AFI of the Prefix field. The AS_PATH attribute in TABLE_DUMP MUST only consist of 2-byte AS numbers.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
