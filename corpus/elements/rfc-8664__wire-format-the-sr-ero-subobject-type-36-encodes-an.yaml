kind: wire-format
summary: 'The SR-ERO subobject (Type=36) encodes an SR path segment. Fields include: L-Flag (loose hop), NT (NAI type, 4 bits), Flags (F/S/C/M bits), optional 4-octet SID, and optional variable-length NAI. Length MUST be at least 8 and a multiple of 4.'
