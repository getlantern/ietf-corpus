document: rfc-5922
kind: interoperability-note
summary: Unlike RFC 2818 (HTTP over TLS), which allows wildcard dNSName values such as '*.example.com', this document explicitly prohibits wildcard matching in certificates for SIP domains; '*.example.com' matches only '*.example.com' and not 'foo.example.com'.
section: "7.2"
topics:
    - sip
    - pkix
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
