document: rfc-8827
kind: normative-requirement
summary: Implementations MUST obtain explicit user consent prior to providing access to the camera and/or microphone. Implementations MUST refuse all permissions grants for HTTP origins, as HTTP origins cannot be securely established against network attackers.
section: "6.2"
rfc2119_level: MUST
topics:
    - webrtc
    - security
    - privacy
