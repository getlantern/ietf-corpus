document: rfc-7838
kind: normative-requirement
summary: An ALTSVC frame on stream 0 with empty Origin information is invalid and MUST be ignored. An ALTSVC frame on a stream other than stream 0 containing non-empty Origin information is invalid and MUST be ignored. A device acting as a server MUST ignore ALTSVC frames.
section: "4"
rfc2119_level: MUST
topics:
    - http
