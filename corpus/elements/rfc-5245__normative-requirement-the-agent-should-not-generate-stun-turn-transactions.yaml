document: rfc-5245
kind: normative-requirement
summary: The agent SHOULD NOT generate STUN/TURN transactions during candidate gathering more frequently than one every Ta milliseconds, where Ta is computed based on the number of candidates and streams. This pacing prevents network congestion from parallel check storms.
section: 4.1.1.2
rfc2119_level: SHOULD NOT
topics:
    - nat
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
