document: rfc-3986
kind: security-consideration
summary: Some platforms interpret non-standard IP address formats such as octal, hexadecimal, or fewer than four dotted parts, which can resolve to addresses not obvious from the text. Only the strict dotted-decimal four-octet form is valid per this grammar; other forms may be used to bypass access controls or safeguards.
section: "7.4"
topics:
    - security
    - ip
