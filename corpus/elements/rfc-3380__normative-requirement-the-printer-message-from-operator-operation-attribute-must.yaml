document: rfc-3380
kind: normative-requirement
summary: The 'printer-message-from-operator' operation attribute MUST NOT be supported as an operation attribute for the Set-Printer-Attributes operation; to set the Printer Description attribute of the same name via Set-Printer-Attributes, the client must supply it explicitly in Group 2.
section: "5.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
