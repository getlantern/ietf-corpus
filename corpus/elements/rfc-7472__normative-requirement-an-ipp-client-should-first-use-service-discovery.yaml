document: rfc-7472
kind: normative-requirement
summary: An IPP Client SHOULD first use service discovery or directory protocols or send an IPP Get-Printer-Attributes operation to read 'printer-uri-supported', 'uri-authentication-supported', and 'uri-security-supported' attributes before connecting, to discover required authentication and security mechanisms.
section: 6.2.4
rfc2119_level: SHOULD
topics:
    - security
