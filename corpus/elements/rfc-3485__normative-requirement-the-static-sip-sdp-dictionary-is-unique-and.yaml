document: rfc-3485
kind: normative-requirement
summary: The static SIP/SDP dictionary is unique and MUST be available in all SigComp implementations for SIP/SDP. It is defined once and stays as-is forever, eliminating problems of updating, upgrading, and negotiating which dictionary version is supported at the remote end.
section: "2"
rfc2119_level: MUST
topics:
    - sip
