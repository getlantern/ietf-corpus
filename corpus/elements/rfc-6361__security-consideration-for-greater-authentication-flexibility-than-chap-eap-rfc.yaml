document: rfc-6361
kind: security-consideration
summary: For greater authentication flexibility than CHAP, EAP (RFC 3748) is a good alternative. For confidentiality and integrity of all PPP link packets, the PPP Encryption Control Protocol (ECP, RFC 1968) can be used. When PPP runs over tunneling protocols such as L2TP, tunnel security protocols may also be available.
section: "4"
topics:
