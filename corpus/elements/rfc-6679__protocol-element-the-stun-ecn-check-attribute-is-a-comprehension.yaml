document: rfc-6679
kind: protocol-element
summary: The STUN ECN-CHECK attribute is a comprehension-optional STUN attribute used in ICE-based ECN verification. It is sent in an ECT-marked STUN request and echoed back in the response with the received ECN field value, allowing path ECN capability verification before media transmission.
section: 7.2.2
topics:
    - rtp
    - ecn
    - congestion
