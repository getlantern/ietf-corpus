document: rfc-2056
kind: normative-requirement
summary: If element set name (esn) is specified, it SHOULD be used either in the Search request for small- and/or medium-set-element-set-names or in a Present request following a Search. If not specified, the choice is left to the client.
section: "4"
rfc2119_level: SHOULD
