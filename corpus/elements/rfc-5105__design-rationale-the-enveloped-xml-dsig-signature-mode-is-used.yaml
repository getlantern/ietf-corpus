document: rfc-5105
kind: design-rationale
summary: The 'enveloped' XML-DSIG signature mode is used to make the digital signature an integral part of the token so it travels with the token through intermediaries (e.g., Registrars) who may relay the token without any role in asserting the right-to-use.
