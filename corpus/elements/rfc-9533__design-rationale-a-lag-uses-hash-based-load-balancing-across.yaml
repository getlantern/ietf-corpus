document: rfc-9533
kind: design-rationale
summary: A LAG uses hash-based load balancing across member links, but link delay may vary between members due to different transport paths. To support low-latency service for time-sensitive traffic, per-link performance measurement is needed to enable explicit traffic steering based on delay and loss metrics.
section: "1"
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
