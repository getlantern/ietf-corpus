document: rfc-3878
kind: state-machine
summary: 'Five ARC states are defined: alm (reporting allowed), nalm (reporting off indefinitely), nalmQI (reporting off until problem-free), nalmQICD (countdown substate of nalmQI after problem-free qualification), and nalmTI (reporting off for a specified time interval). The alm state is implicit; a row is deleted from the arc table when a resource enters alm state.'
