document: rfc-7352
kind: normative-requirement
summary: If a site's maximum expiration limit is exceeded by the ':seconds' argument, the maximum value MUST be silently substituted; exceeding the limit MUST NOT produce an error. If ':seconds' is zero, the 'duplicate' test MUST yield 'false' unconditionally.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
