document: rfc-7391
kind: registry
summary: 'Two new TLV types are registered in the IANA ForCES ''TLV Types'' sub-registry: TABLERANGE-TLV (0x0117) and EXTENDEDRESULT-TLV (0x0118). A new ''EXTENDEDRESULT-TLV Result Values'' sub-registry is created with 0x00-0xFF mirrored from RESULT-TLV, 0x100-0x200 reserved for private use, and 0x21-0xFE / 0x201-0xFFFFFFFF as Unassigned (Specification Required).'
section: "4"
