document: rfc-4998
kind: protocol-element
summary: ArchiveTimeStampChain is SEQUENCE OF ArchiveTimeStamp; ArchiveTimeStampSequence is SEQUENCE OF ArchiveTimeStampChain. The chain captures Timestamp Renewal (same hash algorithm, covers prior timestamp); the sequence captures Hash-Tree Renewal (new chain started, covers data objects and all prior chains).
