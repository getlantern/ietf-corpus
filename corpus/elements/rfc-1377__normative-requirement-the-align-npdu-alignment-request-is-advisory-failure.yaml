document: rfc-1377
kind: normative-requirement
summary: The Align-NPDU alignment request is advisory; failure to agree on an alignment MUST NOT prevent the OSINLCP from reaching the Opened state. All receivers MUST be capable of accepting packets with any alignment.
section: "3.1"
rfc2119_level: MUST NOT
