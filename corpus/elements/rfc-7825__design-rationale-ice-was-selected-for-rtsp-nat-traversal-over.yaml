document: rfc-7825
kind: design-rationale
summary: 'ICE was selected for RTSP NAT traversal over alternatives (evaluated in RFC 7604) for two main reasons: it supports RTSP servers that are themselves behind NATs, and it mitigates the security threat of using RTSP servers as DDoS amplification tools by requiring a connectivity check before media is delivered.'
section: "1"
topics:
