document: rfc-4875
kind: normative-requirement
summary: A P2MP LSP MUST have consistent attributes across all portions of the tree per RFC 4461. Each Path message for the same P2MP LSP MUST carry identical signaling attributes except for S2L sub-LSP descriptors, the Sub-Group identifier, and per-message/hop objects (INTEGRITY, MESSAGE_ID, RSVP_HOP).
section: 5.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
