document: rfc-2769
kind: security-consideration
summary: Signing routing registry objects alone is insufficient for security; authorization checks must be repeated as transactions are flooded because objects used for authorization may change after insertion, making traceback to epoch prohibitively expensive and gameable by exceeding search depth.
section: "1"
topics:
    - security
    - routing
