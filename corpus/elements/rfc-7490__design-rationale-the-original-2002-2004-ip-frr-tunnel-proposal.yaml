document: rfc-7490
kind: design-rationale
summary: The original 2002/2004 IP-FRR tunnel proposal targeted 100% coverage and included mechanisms beyond remote LFA, making it computationally intensive and not pursued as a WG item. Remote LFA is positioned as a simpler second step after local LFA, accepting less-than-100% coverage in exchange for tractable complexity.
section: "11"
