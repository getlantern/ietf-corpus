document: rfc-7265
kind: design-rationale
summary: jCal is designed so that round-tripping — converting an iCalendar instance to jCal and back — preserves all semantic meaning, including all components, properties, and property parameters. Ordering of elements and case of property/parameter names need not be preserved, but semantic data must be.
