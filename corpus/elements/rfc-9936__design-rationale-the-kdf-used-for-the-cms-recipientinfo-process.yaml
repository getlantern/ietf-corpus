document: rfc-9936
kind: design-rationale
summary: The KDF used for the CMS RecipientInfo process MAY be different from the KDF used internally within the ML-KEM algorithm itself. This separation is explicit in the KEMRecipientInfo design, allowing independent KDF agility at the CMS layer.
