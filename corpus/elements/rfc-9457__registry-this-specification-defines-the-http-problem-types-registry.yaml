document: rfc-9457
kind: registry
summary: This specification defines the 'HTTP Problem Types' registry for common, widely used problem type URIs. The policy is Specification Required per RFC 8126. Vendor-specific, application-specific, and deployment-specific values cannot be registered. Registrations MAY use the prefix 'https://iana.org/assignments/http-problem-types#' for the type URI.
section: "4.2"
topics:
