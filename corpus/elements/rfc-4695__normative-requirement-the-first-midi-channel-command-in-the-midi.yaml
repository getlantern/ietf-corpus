document: rfc-4695
kind: normative-requirement
summary: The first MIDI channel command in the MIDI list MUST include a status octet. Running status (as defined in MIDI) MAY be used for all subsequent channel commands. All System commands in the MIDI list MUST include a status octet.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
