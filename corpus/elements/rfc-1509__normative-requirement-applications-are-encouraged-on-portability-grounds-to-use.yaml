document: rfc-1509
kind: normative-requirement
summary: Applications are encouraged on portability grounds to use the generic GSSAPI routines wherever possible and to accept the default security mechanism (GSS_C_NULL_OID) rather than requesting a specific mechanism. Callers are likewise encouraged to accept the default quality of protection (GSS_C_QOP_DEFAULT) offered by the chosen mechanism.
section: "2"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
