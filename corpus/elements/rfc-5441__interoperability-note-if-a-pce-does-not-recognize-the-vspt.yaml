document: rfc-5441
kind: interoperability-note
summary: If a PCE does not recognize the VSPT flag of the RP object, it sends PCErr with Error-Type=4 (Not supported object), Error-value=4 (Unsupported parameter) per RFC 5440. The RP object included should contain the whole bit flag field with all bits after the unsupported parameter set to zero.
section: "9"
topics:
