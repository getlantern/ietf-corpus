document: rfc-6788
kind: normative-requirement
summary: If the AN has an IPv6 address it MUST use it as the Source Address of the outer IPv6 datagram; otherwise it MUST copy the source address from the received RS into the outer header's Source Address field.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
