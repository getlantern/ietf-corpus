document: rfc-8282
kind: normative-requirement
summary: When the I flag is clear (zero) in a PCRep, the path returned MUST NOT be an inter-layer path. If the I flag is clear, the T flag has no meaning and MUST be ignored.
section: "3.1"
rfc2119_level: MUST NOT
