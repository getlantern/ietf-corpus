document: rfc-3551
kind: protocol-element
summary: The RTP/AVP profile reserves payload type numbers 96-127 exclusively for dynamic assignment. Applications SHOULD first use values in this range for dynamic payload types; those needing more than 32 dynamic types MAY use codes below 96, preferring unassigned numbers.
section: "3"
