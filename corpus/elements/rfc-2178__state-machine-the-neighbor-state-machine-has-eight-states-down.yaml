document: rfc-2178
kind: state-machine
summary: 'The neighbor state machine has eight states: Down, Attempt, Init, 2-Way, ExStart, Exchange, Loading, and Full. A neighbor reaches Full when database synchronization is complete; adjacency is only formed with neighbors that should be adjacent (DR/BDR on broadcast networks, all on point-to-point).'
section: "10.3"
topics:
