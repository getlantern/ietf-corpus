document: rfc-1514
kind: wire-format
summary: hrPrinterDetectedErrorState is an OCTET STRING bitmask where bit 0 (MSB of first byte) = lowPaper, bit 1 = noPaper, bit 2 = lowToner, bit 3 = noToner, bit 4 = doorOpen, bit 5 = jammed, bit 6 = offline, bit 7 = serviceRequested; a set bit indicates the condition is detected.
