document: rfc-5550
kind: normative-requirement
summary: Lemonade Message Stores MUST support LITERAL+ (saves a round trip per non-synchronizing literal) and SASL-IR (saves a round trip during authentication, potentially pipelining the entire auth sequence). Servers MUST also support IMAP over TLS.
section: "5.8"
rfc2119_level: MUST
topics:
    - email
    - tls
