document: rfc-9061
kind: interoperability-note
summary: Only the Encapsulating Security Payload (ESP, RFC 4303) is supported as the IPsec protocol; Authentication Header (AH) is not supported. The ipsec-protocol-params typedef is defined as an enumeration with only 'esp', but noted as extensible in the future.
section: 5.1.2
topics:
    - ipsec
    - security
