document: rfc-9877
kind: security-consideration
summary: Security considerations from Sections 6 and 9 of RFC 9632 apply equally in the RDAP context, including the requirement for HTTPS URLs and the option for RPKI signatures on geofeed files. No new security considerations beyond those in RFC 7481 and RFC 9560 are introduced.
