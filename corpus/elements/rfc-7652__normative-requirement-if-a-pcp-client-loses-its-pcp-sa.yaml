document: rfc-7652
kind: normative-requirement
summary: If a PCP client loses its PCP SA and sends a common PCP request, the server rejects it with AUTHENTICATION_REQUIRED. The client MUST authenticate with the server and, after successful EAP, retry the request with an AUTHENTICATION_TAG option.
section: "3.2"
rfc2119_level: MUST
topics:
    - pcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
