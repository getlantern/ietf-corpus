document: rfc-4130
kind: state-machine
summary: 'AS2 MDNs exist in two modes: synchronous (returned in the HTTP response on the same TCP connection as the original POST) and asynchronous (sent on a separate HTTP, HTTPS, or SMTP connection). When asynchronous MDN is requested, the HTTP response MUST be sent back before the MDN is processed and sent on the separate connection.'
section: "7.2"
topics:
    - http
    - email
