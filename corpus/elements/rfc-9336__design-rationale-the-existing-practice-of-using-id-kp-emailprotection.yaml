document: rfc-9336
kind: design-rationale
summary: The existing practice of using id-kp-emailProtection or id-kp-codeSigning for Document Signing is problematic because technical or policy changes to those ecosystems can cause unexpected behaviors or decreased cryptographic agility in the Document-Signing ecosystem. A dedicated KeyPurposeId avoids this coupling.
section: "1"
topics:
