document: rfc-7373
kind: normative-requirement
summary: Strings containing characters reserved in the Enclosing Context (control characters, markup, quotes) MUST be escaped or quoted per the Enclosing Context rules; nonrepresentable Unicode characters MUST also use the context's escaping facility.
