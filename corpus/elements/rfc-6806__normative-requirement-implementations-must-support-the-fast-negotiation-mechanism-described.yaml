document: rfc-6806
kind: normative-requirement
summary: Implementations MUST support the FAST negotiation mechanism described in Section 11. Clients conforming to this specification MUST send PA-REQ-ENC-PA-REP (149) padata in all AS requests, and KDCs MUST always set the enc-pa-rep (15) ticket flag in all issued tickets.
section: "11"
rfc2119_level: MUST
topics:
    - security
