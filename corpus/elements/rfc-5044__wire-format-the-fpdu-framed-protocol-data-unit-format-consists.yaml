document: rfc-5044
kind: wire-format
summary: The FPDU (Framed Protocol Data Unit) format consists of a 16-bit ULPDU_Length field, the ULPDU payload, 0–3 octets of PAD (set to zero, ignored on receive except for CRC), and a 32-bit CRC field. The total FPDU length is always an integral multiple of four octets.
section: "4.1"
