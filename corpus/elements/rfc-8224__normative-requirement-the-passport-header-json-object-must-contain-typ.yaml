document: rfc-8224
kind: normative-requirement
summary: 'The PASSporT header JSON object MUST contain: ''typ'' set to ''passport'', ''alg'' mirroring the Identity header alg parameter (defaulting to ''ES256''), and ''x5u'' equivalent to the URI in the ''info'' parameter. If a PASSporT extension is in use, ''ppt'' MUST be present and mirror the Identity header ''ppt'' parameter.'
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - security
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
