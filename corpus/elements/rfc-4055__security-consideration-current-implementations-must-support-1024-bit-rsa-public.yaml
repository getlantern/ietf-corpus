document: rfc-4055
kind: security-consideration
summary: Current implementations MUST support 1024-bit RSA public keys (approximately 80-bit security). Before the end of 2007, implementations SHOULD support at least 2048-bit RSA keys and SHOULD support SHA-256, to provide adequate protection through 2010.
section: "8"
topics:
