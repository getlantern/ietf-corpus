document: rfc-9056
kind: security-consideration
summary: DetNet flows are identified on a per-flow basis, which may provide Controller Plane attackers with additional information about data flows compared to Controller Planes that do not include per-flow identification. This is an inherent property of DetNet and should be assessed when evaluating DetNet suitability for a given use case.
section: "7"
topics:
    - security
    - mpls
    - routing
