document: rfc-4836
kind: design-rationale
summary: 'Three IEEE 802.3 managed objects were intentionally excluded from the MAU-MIB: aIdleErrorCount (only useful for 100BaseT2, which is not widely implemented) and the auto-negotiation selector ability attributes (aAutoNegLocalSelectorAbility, aAutoNegAdvertisedSelectorAbility, aAutoNegReceivedSelectorAbility), which are only needed for isoethernet (802.9a) support not covered by this MIB.'
section: "3.4"
topics:
