document: rfc-9346
kind: normative-requirement
summary: Routers or PCEs capable of processing inter-AS TE link advertisements SHOULD NOT use such links to compute paths that exit an AS to a remote ASBR and then immediately re-enter the AS through another TE link, except as the result of specific policy configurations.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
