document: rfc-5685
kind: state-machine
summary: 'Active-session gateway-initiated redirect flow: (1) Gateway sends INFORMATIONAL with REDIRECT (no nonce); (2) Client sends empty INFORMATIONAL response; (3) Client SHOULD delete existing SAs with old gateway via INFORMATIONAL with DELETE; (4) Client establishes new SAs with new gateway.'
