document: rfc-4165
kind: normative-requirement
summary: Because M2PA uses 24-bit sequence numbers vs. MTP2's 7-bit, the MTP3 Changeover procedure MUST use the Extended Changeover Order (XCO) and Extended Changeover Acknowledgement (XCA) messages from Q.2210/T1.111. The BSNT Confirmation and Retrieval Request and FSNC primitives MUST also use the larger sequence numbers.
section: 1.6.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
