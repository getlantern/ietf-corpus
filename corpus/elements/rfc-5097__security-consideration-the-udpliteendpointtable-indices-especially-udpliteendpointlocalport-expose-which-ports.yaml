document: rfc-5097
kind: security-consideration
summary: The udpliteEndpointTable indices (especially udpliteEndpointLocalPort) expose which ports are open on a machine, enabling an attacker to identify attack vectors without running a port scanner. Access to these objects should be controlled and encrypted via SNMPv3.
section: "4"
topics:
