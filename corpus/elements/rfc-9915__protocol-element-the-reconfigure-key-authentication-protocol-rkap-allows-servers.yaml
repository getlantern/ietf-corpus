document: rfc-9915
kind: protocol-element
summary: The Reconfigure Key Authentication Protocol (RKAP) allows servers to authenticate Reconfigure messages to clients using a key established during initial message exchange. Reconfigure messages MUST be authenticated; unauthenticated Reconfigure messages MUST be discarded.
