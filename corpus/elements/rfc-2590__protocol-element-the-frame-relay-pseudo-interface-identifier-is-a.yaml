summary: 'The Frame Relay pseudo-interface identifier is a 64-bit value composed of three fields: a 2-bit EUI bits field (U/L=0, I/G=0), a 38-bit Mid field providing uniqueness, and a 24-bit DLCI field holding the 10-, 17-, or 23-bit DLCI zero-padded to 24 bits.'
