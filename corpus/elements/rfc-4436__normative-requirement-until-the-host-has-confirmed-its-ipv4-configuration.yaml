document: rfc-4436
kind: normative-requirement
summary: Until the host has confirmed its IPv4 configuration via the reachability test, it SHOULD NOT respond to ARP Requests and SHOULD NOT broadcast ARP Requests containing its address in ar$spa, to avoid address conflicts especially when moving between private networks.
section: 2.1.1
rfc2119_level: SHOULD NOT
topics:
    - ip
    - security
