document: rfc-7734
kind: design-rationale
summary: The B-VID (backbone VLAN ID, which determines multipathing in SPBM) is kept local to each SPBM domain and is removed from frames carried over the IP/MPLS network. This allows each SPBM island to have a unique multipathing configuration without topological dependencies between islands.
section: "3"
topics:
    - routing
