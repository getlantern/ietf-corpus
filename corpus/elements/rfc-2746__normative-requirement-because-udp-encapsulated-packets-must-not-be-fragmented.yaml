kind: normative-requirement
summary: Because UDP-encapsulated packets MUST NOT be fragmented, tunnel entry routers must support tunnel MTU discovery as defined in RFC 2003 Section 5.1, or alternatively use the Path MTU Discovery mechanism from RFC 2210.
