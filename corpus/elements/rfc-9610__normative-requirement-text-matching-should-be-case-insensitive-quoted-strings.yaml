document: rfc-9610
kind: normative-requirement
summary: Text matching SHOULD be case-insensitive. Quoted strings SHOULD be treated as phrase searches. Outside phrases, whitespace SHOULD divide separate tokens that MUST all be present. Tokens MAY be matched on a whole-word basis using stemming.
