document: rfc-8931
kind: normative-requirement
summary: 'Fragments MUST be sent in round-robin fashion: the sender MUST send all fragments for a first time before retrying any lost fragment, and lost fragments MUST be retried in sequence, oldest first. This enables the receiver to acknowledge delayed fragments before they are retried.'
section: "6"
rfc2119_level: MUST
topics:
    - ip
