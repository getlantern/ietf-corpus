document: rfc-3065
kind: normative-requirement
summary: When advertising to a BGP speaker in a neighboring Member-AS within the confederation, the speaker SHALL prepend its own AS number to an existing AS_CONFED_SEQUENCE, or prepend a new AS_CONFED_SEQUENCE segment if the first segment is not of that type.
section: "6.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
