document: rfc-8579
kind: design-rationale
summary: The extension restricts special-use mailbox lookup to the user's personal namespace to avoid searching the entire mail storage (preventing undue system load) and to prevent security issues where messages could be unexpectedly or maliciously filed into shared mailboxes with special-use attributes.
section: "7"
topics:
    - email
    - security
