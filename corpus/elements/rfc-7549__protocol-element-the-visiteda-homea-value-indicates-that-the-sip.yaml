document: rfc-7549
kind: protocol-element
summary: The 'visiteda-homea' value indicates that the SIP entity responsible for the host part represents the end of a traffic leg between the originating visited network and the originating home network; in 3GPP, this is between the UE and home S-CSCF or P-CSCF to home S-CSCF.
