document: rfc-7894
kind: design-rationale
summary: 'The PKCS #9 challengePassword attribute has been overloaded by multiple protocol uses (certificate revocation, OTP authentication, EST identity linking), with the correct interpretation depending on context rather than OID definition. This ambiguity became a limitation when EST needed multiple simultaneous uses of the attribute, motivating the definition of three distinct, unambiguous replacement attributes.'
section: "1"
topics:
