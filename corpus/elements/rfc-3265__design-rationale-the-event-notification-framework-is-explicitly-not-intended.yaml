document: rfc-3265
kind: design-rationale
summary: The event notification framework is explicitly NOT intended as a general-purpose infrastructure for all event subscription and notification. It is scoped to SIP-specific use cases; high-frequency events (more than ~once per second) and unrelated domains (e.g., network management) are out of scope.
section: "1"
topics:
