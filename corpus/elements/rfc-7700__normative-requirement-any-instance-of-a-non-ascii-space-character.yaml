document: rfc-7700
kind: normative-requirement
summary: Any instance of a non-ASCII space character (any Unicode code point with general category 'Zs', except U+0020) MUST be mapped to the ASCII space character U+0020 during the Additional Mapping Rule.
section: "2.1"
rfc2119_level: MUST
