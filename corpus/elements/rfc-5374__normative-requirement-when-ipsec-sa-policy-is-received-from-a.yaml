document: rfc-5374
kind: normative-requirement
summary: When IPsec SA policy is received from a GCKS, each data flow MUST be compared to authorized data flows in the GPAD entry. Policy not matching a data flow is discarded and the reason SHOULD be recorded in the audit log.
section: 4.1.3.5
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
    - security
