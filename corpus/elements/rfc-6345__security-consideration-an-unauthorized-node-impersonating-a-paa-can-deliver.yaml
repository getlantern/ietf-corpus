document: rfc-6345
kind: security-consideration
summary: An unauthorized node impersonating a PAA can deliver spoofed relayed PANA messages to the PaC via the PRE. While harm is limited by EAP/PANA design, processing bogus packets can impose computational load on the PaC.
section: "6"
