document: rfc-8188
kind: normative-requirement
summary: If the same input-keying material is reused, the salt parameter MUST be unique each time to ensure the content-encryption key is not reused. An implementation SHOULD generate a random salt for every message.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
