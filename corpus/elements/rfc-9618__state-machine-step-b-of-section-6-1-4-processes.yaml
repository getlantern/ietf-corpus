summary: 'Step (b) of Section 6.1.4 processes policy mappings: (1) if policy_mapping > 0 and ID-P has a node at depth i, update its expected_policy_set to the subjectDomainPolicy values; (2) if policy_mapping > 0 and no node for ID-P but anyPolicy node exists, generate a child; (3) if policy_mapping == 0, delete the ID-P node and prune childless ancestors.'
