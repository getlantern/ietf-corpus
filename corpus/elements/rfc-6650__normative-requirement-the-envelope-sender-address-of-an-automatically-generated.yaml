document: rfc-6650
kind: normative-requirement
summary: The envelope sender address of an automatically generated report MUST be chosen to avoid amplification attacks and to ensure no feedback reports will be issued in response; the MAIL FROM command SHOULD use the NULL reverse-path ('MAIL FROM:<>').
section: "6"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
