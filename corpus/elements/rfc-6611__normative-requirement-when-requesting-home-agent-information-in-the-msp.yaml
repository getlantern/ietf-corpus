document: rfc-6611
kind: normative-requirement
summary: 'When requesting home agent information in the MSP, the mobile node''s DHCPv6 Information-request SHALL include: the Option Code for the Visited Home Network Information option (RFC 6610) in OPTION_ORO, a Client Home Network ID FQDN option identifying the MSP, and OPTION_CLIENTID.'
section: 4.2.1
rfc2119_level: REQUIRED
