document: rfc-6435
kind: design-rationale
summary: This document updates RFC 6371 Sections 7.1.1 and 7.1.2 because the RFC 6371 framework assumed the Lock Instruct message independently enables locking and requires a response. The mechanism defined here requires Lock commands to be sent by management to both ends of the path, so the LI message does not require a response.
section: "1.1"
topics:
    - mpls
