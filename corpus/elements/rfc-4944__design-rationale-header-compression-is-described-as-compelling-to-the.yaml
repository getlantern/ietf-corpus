document: rfc-4944
kind: design-rationale
summary: 'Header compression is described as ''compelling to the point of almost being unavoidable'': without it, only 33 octets remain for application data after the IPv6 header (40 bytes) and UDP header (8 bytes) are accounted for in a single 802.15.4 frame. Most applications are expected to use header compression.'
section: "4"
