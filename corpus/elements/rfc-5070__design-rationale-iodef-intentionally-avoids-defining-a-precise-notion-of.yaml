document: rfc-5070
kind: design-rationale
summary: IODEF intentionally avoids defining a precise notion of 'incident', adopting a broad understanding flexible enough for most operators. The design goal is a framework for commonly exchanged information with ample extensibility, not exhaustive incident description, because the security analysis domain is not fully standardized.
section: "1.3"
topics:
    - security
