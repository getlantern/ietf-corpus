document: rfc-7931
kind: protocol-element
summary: The clientid4 is a 64-bit shorthand identifier assigned by the server after a successful SETCLIENTID/SETCLIENTID_CONFIRM sequence. It becomes invalid upon server reboot (NFS4ERR_STALE_CLIENTID), lease expiration (NFS4ERR_EXPIRED), administrative revocation (NFS4ERR_ADMIN_REVOKED), migration of all associated state (NFS4ERR_STALE_CLIENTID), or merger with another lease (NFS4ERR_STALE_CLIENTID). In migration cases, stateids remain valid on the destination while the source clientid4 becomes invalid.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
