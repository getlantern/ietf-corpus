document: rfc-5147
kind: protocol-element
summary: 'A position is a zero-length fragment pointing between characters or lines, not a character or line itself. Positions are zero-indexed: position zero is before the first character/line; a MIME entity with n characters has n+1 distinct character positions.'
section: 2.1.1
