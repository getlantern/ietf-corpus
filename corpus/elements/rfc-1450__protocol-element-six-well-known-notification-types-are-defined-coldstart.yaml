document: rfc-1450
kind: protocol-element
summary: 'Six well-known NOTIFICATION-TYPEs are defined: coldStart (agent reinitializing, configuration may change), warmStart (agent reinitializing, configuration unchanged), linkDown (link failure, varbind: ifIndex), linkUp (link restored, varbind: ifIndex), authenticationFailure (improperly authenticated message received), and egpNeighborLoss (EGP neighbor marked down, varbind: egpNeighAddr).'
