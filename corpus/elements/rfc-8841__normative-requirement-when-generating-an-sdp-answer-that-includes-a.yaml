document: rfc-8841
kind: normative-requirement
summary: When generating an SDP answer that includes a new SCTP port value in the offer, the answerer MUST also use a new SCTP port value. If the offer contains a zero SCTP port or the answerer rejects the association, the answerer MUST use a zero SCTP port value in the answer.
section: "10.3"
rfc2119_level: MUST
topics:
    - sctp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
