document: rfc-3471
kind: protocol-element
summary: Explicit Label Control introduces a Label ERO subobject/ER Hop that allows an LSP initiator to specify the exact label to use on a link. It contains an L bit (MUST be 0), a U bit (0 for downstream label, 1 for upstream label on bidirectional LSPs), and a variable-length Label field identical to the Generalized Label format.
section: "6.1"
topics:
    - mpls
    - routing
