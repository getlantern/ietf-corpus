document: rfc-4698
kind: protocol-element
summary: 'The <findNetworksByAddress> query searches for networks by IP address or address range, using a <specificity> element with values: ''exact-match'', ''all-less-specific'', ''one-level-less-specific'', ''all-more-specific'', or ''one-level-more-specific''. An optional ''allowEquivalences'' attribute (default false) controls whether exact-match networks are included.'
section: 3.1.4
topics:
    - ip
    - registry
