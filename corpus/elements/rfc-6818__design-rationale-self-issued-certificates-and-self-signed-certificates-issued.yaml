document: rfc-6818
kind: design-rationale
summary: Self-issued certificates and self-signed certificates issued by entities other than CAs are explicitly placed outside the scope of RFC 5280, consistent with X.509 (11/2008) Section 3.4.61. A web server generating a self-signed certificate to identify itself, and relying-party use of such certificates, are both out of scope.
section: "2"
topics:
    - pkix
