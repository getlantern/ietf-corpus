document: rfc-5295
kind: normative-requirement
summary: Derivation of USRKs MUST be coordinated so that two separate cryptographic usages do not derive the same key. Derivation of DSRKs MUST be coordinated so that two separate key management domains do not derive the same key.
section: "2"
rfc2119_level: MUST
topics:
