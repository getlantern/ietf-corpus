document: rfc-3074
kind: security-consideration
summary: The algorithm itself provides no security and does not impact existing security. If HBA contents are transmitted over the network during server configuration, that message MUST be secured against tampering, since a modified HBA could result in denial of service for some or all clients.
section: "7"
topics:
    - security
