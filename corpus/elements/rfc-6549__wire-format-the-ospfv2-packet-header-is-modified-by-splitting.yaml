document: rfc-6549
kind: wire-format
summary: 'The OSPFv2 packet header is modified by splitting the 16-bit Authentication Type field into two 8-bit fields: a new Instance ID field (bits 8–15 of the original AuType word, after the Checksum) and a reduced 8-bit AuType field. All other header fields (Version, Type, Packet length, Router ID, Area ID, Checksum, Authentication) remain unchanged.'
section: "2"
