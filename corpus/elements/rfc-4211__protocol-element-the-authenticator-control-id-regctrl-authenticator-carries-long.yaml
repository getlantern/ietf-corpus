document: rfc-4211
kind: protocol-element
summary: The authenticator control (id-regCtrl-authenticator) carries long-term non-cryptographic identity information (e.g., mother's maiden name, knowledge-based answers) encoded as UTF8String. Unlike regToken, it may be used for both initial and subsequent certification requests.
