document: rfc-2211
kind: wire-format
summary: 'The TSpec is encoded as three IEEE single-precision floating-point values followed by two 32-bit integers in network byte order: r (bucket rate), b (bucket size), p (peak rate), m (minimum policed unit, integer bytes), M (maximum packet size, integer bytes). For r and b only non-negative finite IEEE values are valid; for p, positive infinity (exponent all-ones, sign and mantissa all-zeroes) is also permitted.'
