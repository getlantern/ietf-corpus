document: rfc-9754
kind: normative-requirement
summary: When the server receives a SETATTR with fattr4_time_deleg_access or fattr4_time_deleg_modify, it MUST either accept those changes and derive the change time, or reject them with NFS4ERR_DELAY.
section: "5"
rfc2119_level: MUST
