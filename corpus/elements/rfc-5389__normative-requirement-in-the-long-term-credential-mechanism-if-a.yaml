document: rfc-5389
kind: normative-requirement
summary: In the long-term credential mechanism, if a request lacks MESSAGE-INTEGRITY the server MUST respond with error 401 including REALM and NONCE. If the NONCE is stale, the server MUST respond with error 438 (Stale Nonce) including a new NONCE and REALM.
section: 10.2.2
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
