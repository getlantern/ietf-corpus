document: rfc-3744
kind: state-machine
summary: ACL evaluation iterates ordered ACEs until all required privileges are granted (access allowed) or a deny ACE is encountered for a not-yet-granted privilege (access denied). Evaluation halts as soon as the outcome is determined; failure to grant all required privileges also results in denial.
section: "6"
