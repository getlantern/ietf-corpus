document: rfc-7356
kind: normative-requirement
summary: 'When IS-IS is deployed for Layer 3 routing, FS-LSP #0 with domain scope MUST include at least one of: IPv4 Traffic Engineering Router ID (TLV 134) or IPv6 Traffic Engineering Router ID (TLV 140), enabling receivers to determine reachability to the originating IS across area boundaries.'
section: "10"
rfc2119_level: MUST
topics:
    - routing
