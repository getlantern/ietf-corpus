document: rfc-5036
kind: security-consideration
summary: LDP sessions are vulnerable to TCP segment spoofing, particularly TCP resets. The TCP MD5 Signature Option (RFC 2385) is specified as the protection mechanism; an attacker must both guess TCP sequence numbers and obtain the shared password to succeed.
section: "5.1"
topics:
    - mpls
    - routing
    - security
