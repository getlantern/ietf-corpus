document: rfc-6929
kind: normative-requirement
summary: RADIUS clients MUST NOT send improperly defined attributes that conflict with the Reserved Attribute Type space (241–246). For replies, clients MUST interpret these attributes as Extended Attributes, not as vendor-proprietary definitions.
section: "5.1"
rfc2119_level: MUST NOT
