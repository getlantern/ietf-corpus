document: rfc-8967
kind: normative-requirement
summary: A neighbour table entry MUST NOT be created before the MAC test has passed successfully, to avoid memory exhaustion attacks. The MAC of a packet MUST NOT be computed for each MAC TLV, but only once per configured key.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
