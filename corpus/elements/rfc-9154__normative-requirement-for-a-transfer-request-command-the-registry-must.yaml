document: rfc-9154
kind: normative-requirement
summary: For a <transfer> request command, the registry MUST allow a non-empty authorization information value to authorize a transfer. Upon successful completion of the transfer, the registry MUST automatically unset the authorization information. The losing registrar MUST be informed of a successful transfer request using an EPP <poll> message.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
