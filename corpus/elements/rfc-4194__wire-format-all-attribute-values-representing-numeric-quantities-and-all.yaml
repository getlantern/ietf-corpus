document: rfc-4194
kind: wire-format
summary: All attribute values representing numeric quantities and all block data content MUST be in hexadecimal notation. The 'checksum' field is a 160-bit (20-byte) SHA-1 digest encoded as 40 hex digits and MUST NOT omit leading zeros. All numeric values are in big-endian format.
