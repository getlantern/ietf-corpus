document: rfc-1583
kind: protocol-element
summary: OSPF areas group contiguous networks and routers, each running a separate copy of the link-state algorithm with its own topological database. Area border routers summarize area topology for distribution to the backbone, hiding internal area detail from the rest of the AS.
