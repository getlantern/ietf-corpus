document: rfc-5549
kind: protocol-element
summary: The Extended Next Hop Encoding capability (Capability Code 5) is a new BGP capability advertised via RFC5492 that allows peers to declare support for advertising NLRI of a given AFI/SAFI with a next hop belonging to a different address family, expressed as triples of <NLRI AFI, NLRI SAFI, Nexthop AFI>.
section: "4"
