document: rfc-7003
kind: normative-requirement
summary: When a 24-bit measured value exceeds 0xFFFFFD, the value 0xFFFFFE MUST be reported to indicate an over-range measurement; when the measurement is unavailable, 0xFFFFFF MUST be reported.
