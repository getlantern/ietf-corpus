document: rfc-1323
kind: normative-requirement
summary: RST segments should NOT carry timestamps and should be accepted regardless of their timestamp value. Old duplicate RSTs are exceedingly unlikely, and their connection-cleanup function must take precedence over timestamp validation.
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
    - tcp
