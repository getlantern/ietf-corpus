document: rfc-9252
kind: security-consideration
summary: Misconfiguration of BGP filtering may expose SRv6 Service SIDs to external peers; however, exploitation is mitigated by SRv6 data plane security (infrastructure ACLs, SRH HMAC TLV per RFC 8754) which prevents unauthorized packet injection into the SR domain and protects against service theft in VPN scenarios.
section: "9.2"
topics:
    - security
    - bgp
    - ip
