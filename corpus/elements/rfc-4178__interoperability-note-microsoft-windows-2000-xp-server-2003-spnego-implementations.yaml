document: rfc-4178
kind: interoperability-note
summary: Microsoft Windows 2000/XP/Server 2003 SPNEGO implementations do not produce or process mechlistMIC tokens and may use the incorrect OID 1.2.840.48018.1.2.2 to identify Kerberos V5 instead of the correct OID 1.2.840.113554.1.2.2. If at least one peer implements RFC 4178, the negotiation is protected despite legacy peer behavior.
section: Appendix C
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
