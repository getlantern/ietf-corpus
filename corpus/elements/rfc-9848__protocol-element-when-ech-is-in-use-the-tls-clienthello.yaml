document: rfc-9848
kind: protocol-element
summary: When ECH is in use, the TLS ClientHello is divided into an unencrypted "outer" and an encrypted "inner" ClientHello. SVCB parameters such as ALPN identifiers and SNI apply only to the inner ClientHello, which is used for establishing a connection to the service.
section: "5.2"
topics:
    - tls
    - dns
