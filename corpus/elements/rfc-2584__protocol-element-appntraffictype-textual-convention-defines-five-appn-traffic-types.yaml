summary: 'AppnTrafficType textual convention defines five APPN traffic types: low(1), medium(2), high(3), network(4), and llcAndFnRoutedNlp(5). The first four correspond to APPN transmission priorities; the fifth covers LLC commands and function-routed NLPs.'
