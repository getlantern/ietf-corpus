document: rfc-4790
kind: protocol-element
summary: Wildcard selection of collations uses '*' characters that match zero or more collation-chars. Wildcard characters MUST NOT be adjacent. The collation-order form uses an optional '+' or '-' prefix to specify ordering direction, where '-' inverts the ordering result.
section: "3.2"
