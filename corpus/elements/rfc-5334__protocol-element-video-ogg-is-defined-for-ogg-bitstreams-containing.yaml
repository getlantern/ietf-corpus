document: rfc-5334
kind: protocol-element
summary: video/ogg is defined for Ogg bitstreams containing visual, audio, timed text, or any other material requiring a visual interface. It uses file extension .ogv and Macintosh type code OggV. Implementations SHOULD support multiplexed bitstreams.
section: "10.2"
