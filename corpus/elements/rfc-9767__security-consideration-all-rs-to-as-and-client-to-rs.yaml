document: rfc-9767
kind: security-consideration
summary: All RS-to-AS and client-to-RS requests over untrusted networks MUST be made over TLS as per BCP 195 to prevent manipulation and interception. This applies to all requests in the RS-facing API.
section: "6.1"
topics:
    - security
    - tls
    - oauth
