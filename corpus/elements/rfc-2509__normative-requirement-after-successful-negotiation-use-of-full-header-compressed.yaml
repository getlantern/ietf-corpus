document: rfc-2509
kind: normative-requirement
summary: After successful negotiation, use of FULL_HEADER, COMPRESSED_TCP, COMPRESSED_TCP_NODELTA, and COMPRESSED_NON_TCP is enabled regardless of the presence of an RTP-Compression suboption; COMPRESSED_RTP, COMPRESSED_UDP, and CONTEXT_STATE require the suboption.
