document: rfc-5491
kind: normative-requirement
summary: The length between adjacent polygon vertices SHOULD be restricted to a maximum of 130 km to avoid significant errors from geodesic interpolation. A connecting line SHALL NOT cross another connecting line of the same polygon.
section: "5.1"
rfc2119_level: SHOULD
