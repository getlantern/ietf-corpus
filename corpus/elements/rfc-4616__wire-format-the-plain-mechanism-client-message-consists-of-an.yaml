summary: 'The PLAIN mechanism client message consists of an optional authzid, a NUL (U+0000) delimiter, the authcid, another NUL delimiter, and the passwd — all UTF-8 encoded Unicode strings. ABNF: message = [authzid] UTF8NUL authcid UTF8NUL passwd.'
