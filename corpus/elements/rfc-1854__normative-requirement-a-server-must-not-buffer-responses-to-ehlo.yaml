document: rfc-1854
kind: normative-requirement
summary: A server MUST NOT buffer responses to EHLO, DATA, VRFY, EXPN, TURN, QUIT, NOOP, or unrecognized commands. It MUST send all pending responses immediately whenever the local TCP input buffer is emptied.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - email
    - tcp
