document: rfc-1730
kind: normative-requirement
summary: Any command not defined in this specification or a standards-track revision MUST use the 'X' prefix (e.g., XFOO). Any untagged responses issued by experimental commands MUST also be X-prefixed; servers MUST NOT send such responses unless the client first issued the associated experimental command.
section: 6.5.1
rfc2119_level: MUST
topics:
    - email
