document: rfc-7729
kind: interoperability-note
summary: Only one instance of the SM LFB class may exist per physical FE; however, in hierarchical virtual FE software, multiple SM LFB instances are permitted—one per virtual FE—making the LFB library applicable to both physical and virtual FE deployments.
