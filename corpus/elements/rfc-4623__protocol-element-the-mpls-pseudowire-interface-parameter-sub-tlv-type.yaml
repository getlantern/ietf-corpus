document: rfc-4623
kind: protocol-element
summary: The MPLS Pseudowire Interface Parameter Sub-TLV type 0x09 (length 4), the Fragmentation Indicator, signals that the receiver is able to reassemble fragments when the control word is in use. Its presence does not obligate the sender to use fragmentation.
