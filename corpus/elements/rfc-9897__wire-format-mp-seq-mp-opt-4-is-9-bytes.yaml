document: rfc-9897
kind: wire-format
summary: 'MP_SEQ (MP_OPT=4) is 9 bytes: Type=46, Length=9, MP_OPT=4, followed by a 48-bit multipath sequence number providing end-to-end datagram sequencing for the MP-DCCP connection. The IDSN SHOULD be set randomly.'
