document: rfc-7380
kind: design-rationale
summary: The block reports only ETSI TR 101 290 first- and second-priority indicators (basic and continuous monitoring), excluding third-priority indicators which are application-dependent and do not apply to all MPEG2 implementations. This scoping keeps the block focused on universally applicable decodability metrics.
