document: rfc-8047
kind: normative-requirement
summary: A host SHOULD consistently use the same source interface and address when sending to a particular destination IP address and SPI, because path is often determined by source address and differing paths can cause anti-replay window violations.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - mobility
    - ipsec
