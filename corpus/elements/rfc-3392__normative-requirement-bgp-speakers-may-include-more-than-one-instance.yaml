document: rfc-3392
kind: normative-requirement
summary: BGP speakers MAY include more than one instance of a capability (same Capability Code) with non-zero Capability Length but different Capability Value. Processing of such multiple instances MUST be described in the document that introduces the new capability.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
