document: rfc-8685
kind: design-rationale
summary: Domain diversity (paths avoiding common transit domains) is motivated not only by fate-sharing avoidance but also by security, geopolitical, and commercial policy reasons. MCTD and the SVEC O-bit allow minimizing shared domains when full diversity is unachievable.
