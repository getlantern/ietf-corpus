document: rfc-2294
kind: protocol-element
summary: mHSDomainDefinedAttribute is an object class (subclass of top) that must contain both mHSDomainDefinedAttributeType and mHSDomainDefinedAttributeValue, each a single-valued subtype of name. The pair forms a multi-valued RDN so that standard attribute syntaxes can be used.
