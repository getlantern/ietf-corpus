document: rfc-3946
kind: design-rationale
summary: When requesting STS-Nc SPE with N divisible by 3, the specification mandates using STS-3c_SPE as the Elementary Signal with NCC=N/3, prohibiting direct expression of STS-3*X-via-STS-1 contiguous concatenation. This encoding choice facilitates SONET/SDH interworking by aligning with SDH's VC-4-Nc notation.
section: "2.1"
topics:
    - mpls
    - routing
