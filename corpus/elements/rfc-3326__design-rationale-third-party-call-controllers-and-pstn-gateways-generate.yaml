document: rfc-3326
kind: design-rationale
summary: Third party call controllers and PSTN gateways generate SIP requests in response to events from other dialogs or non-SIP protocols; the Reason header allows the receiving client to know what triggered the SIP request, enabling better service logic and UI behavior.
