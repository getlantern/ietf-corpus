document: rfc-1043
kind: wire-format
summary: 'ENABLE-FUNCTION-KEYS (opcode 44) carries a variable-length <key-map> byte string where each byte encodes four 2-bit pairs. Each pair represents one function key: 0=disabled, 1=enabled (return FUNCTION-KEY only), 2=enabled (return screen data plus FUNCTION-KEY), 3=undefined. Keys beyond the map are disabled.'
section: "2"
topics:
