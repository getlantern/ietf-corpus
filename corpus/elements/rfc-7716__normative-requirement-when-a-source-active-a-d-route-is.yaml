document: rfc-7716
kind: normative-requirement
summary: When a Source Active A-D route is distributed and does not carry a VRF Route Import EC, the BGP speaker distributing the route MUST NOT change the route's Next Hop field. If the route does carry the VRF Route Import EC, the BGP speaker MAY change the Next Hop to itself.
section: 2.8.1
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
