document: rfc-9762
kind: normative-requirement
summary: For each interface, the client MUST keep a list of every prefix received from a PIO with the P flag set that currently has a non-zero preferred lifetime. When a prefix's preferred lifetime becomes zero, it MUST be removed from the list.
section: "7.1"
rfc2119_level: MUST
topics:
