document: rfc-2238
kind: security-consideration
summary: Read-only objects in the HPR MIB expose network topology, configuration, and performance data. Some enterprises treat this as a sensitive corporate asset and may wish to restrict SNMP access to most MIB objects, even though no passwords or user data are exposed.
section: "8"
topics:
