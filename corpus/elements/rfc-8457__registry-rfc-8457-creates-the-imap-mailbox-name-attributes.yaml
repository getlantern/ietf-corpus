document: rfc-8457
kind: registry
summary: RFC 8457 creates the "IMAP Mailbox Name Attributes" registry under the IMAP registry group. Registration policy is IETF Review for IETF consensus documents or Expert Review for other submissions; attributes are registered without the leading backslash and treated as case-insensitive US-ASCII.
section: "6.2"
