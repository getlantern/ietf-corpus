document: rfc-4544
kind: design-rationale
summary: The 3-in-10 notification throttle was chosen because one notification every three seconds is frequent enough for operational awareness, but allowing a short burst of two or three simultaneous notifications avoids suppressing distinct concurrent events. Three in ten seconds is the identified happy medium.
