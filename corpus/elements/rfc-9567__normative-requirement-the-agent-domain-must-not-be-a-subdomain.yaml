document: rfc-9567
kind: normative-requirement
summary: The agent domain MUST NOT be a subdomain of the domain it is reporting on; for example, if the authoritative server hosts foo.example, its agent domain MUST NOT end in foo.example.
section: "8.1"
rfc2119_level: MUST NOT
