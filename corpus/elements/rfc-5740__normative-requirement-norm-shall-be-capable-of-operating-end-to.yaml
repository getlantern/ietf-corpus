document: rfc-5740
kind: normative-requirement
summary: NORM SHALL be capable of operating end-to-end with no assistance from intermediate systems beyond basic IP multicast group management, routing, and forwarding. It SHALL also operate in asymmetric topologies (e.g., SSM) where only unicast return paths are available from receivers to senders.
section: "1.4"
rfc2119_level: SHALL
topics:
    - multicast
    - ip
