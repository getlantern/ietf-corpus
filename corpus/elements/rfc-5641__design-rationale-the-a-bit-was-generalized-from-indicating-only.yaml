document: rfc-5641
kind: design-rationale
summary: The (A) bit was generalized from indicating only local AC state to indicating the status of the entire local pseudowire endpoint (AC plus PSN-facing termination) to align L2TPv3 with the finer-grained fault direction signaling already available in MPLS-based pseudowires via LDP (RFC 4446, RFC 4447).
section: "1"
topics:
    - routing
    - mpls
