document: rfc-9753
kind: design-rationale
summary: The relaxation mechanism is motivated by scenarios where a PCC wants to indicate that a constraint (e.g., a METRIC object with Bound flag set for Path Delay Variation) can be relaxed by the PCE if no conforming path exists. Marking objects as optional allows the PCE to compute a best-effort path without a hard failure.
