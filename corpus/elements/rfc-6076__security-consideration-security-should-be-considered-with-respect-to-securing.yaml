document: rfc-6076
kind: security-consideration
summary: Security should be considered with respect to securing the data used as input to the metric calculations. All other security aspects should follow RFC 3261. Metric data can reveal customer usage patterns, so privacy must be addressed in data collection, transport, and storage.
section: "7"
topics:
    - realtime
    - voip
    - security
    - privacy
