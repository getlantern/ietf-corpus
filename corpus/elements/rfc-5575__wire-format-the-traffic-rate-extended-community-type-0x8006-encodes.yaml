document: rfc-5575
kind: wire-format
summary: The traffic-rate extended community (type 0x8006) encodes a 2-octet AS number (informational only) followed by a 4-octet IEEE 754 floating-point rate in bytes per second. A rate of 0 causes all matching traffic to be discarded. This community is non-transitive across AS boundaries.
