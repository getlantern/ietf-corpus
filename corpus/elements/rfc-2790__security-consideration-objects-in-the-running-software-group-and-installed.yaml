document: rfc-2790
kind: security-consideration
summary: Objects in the Running Software Group and Installed Software Group expose the OS version, application names, and versions, which could assist an attacker in identifying exploitable software bugs; GET access to these objects should be controlled and values may warrant encryption in transit.
