document: rfc-2273
kind: protocol-element
summary: The snmpTargetAddrTable (OID snmpTargetObjects 2) stores transport endpoint information for management targets. Each entry (indexed by snmpTargetAddrName) contains snmpTargetAddrTDomain, snmpTargetAddrTAddress, snmpTargetAddrTimeout (default 1500), snmpTargetAddrRetryCount (default 3), snmpTargetAddrTagList, snmpTargetAddrParams, snmpTargetAddrStorageType, and snmpTargetAddrRowStatus.
