document: rfc-9339
kind: protocol-element
summary: The OSPF Reverse Metric (RM) mechanism uses LLS TLVs in Hello packets to allow a router to signal to its neighbor(s) the metric value that neighbor should advertise for the link back towards the signaling router. This enables a router to influence inbound traffic without requiring configuration changes on the neighbor.
section: "3"
topics:
    - routing
    - realtime
