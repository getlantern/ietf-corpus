document: rfc-9466
kind: security-consideration
summary: A single misconfigured or malicious router emitting forged PIM Hello messages can inhibit assert packing operations for the entire subnet, since the mechanism requires all routers to announce support. Authentication per RFC 7761 Sections 6.2/6.3 can protect against forged message attacks.
section: "6"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
