document: rfc-2355
kind: wire-format
summary: 'The RESPONSE message data portion consists of exactly 1 byte encoding the processing result: for POSITIVE-RESPONSE, 0x00 (Device End); for NEGATIVE-RESPONSE, 0x00 (Command Reject), 0x01 (Intervention Required), 0x02 (Operation Check), 0x03 (Component Disconnected).'
section: 10.4.1
extracted_by: claude-sonnet-4-6
