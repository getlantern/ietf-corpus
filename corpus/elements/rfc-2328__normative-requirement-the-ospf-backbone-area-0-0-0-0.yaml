document: rfc-2328
kind: normative-requirement
summary: The OSPF backbone (Area 0.0.0.0) must be contiguous and must contain all area border routers. If physical contiguity is not possible, backbone connectivity must be established through virtual links.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
