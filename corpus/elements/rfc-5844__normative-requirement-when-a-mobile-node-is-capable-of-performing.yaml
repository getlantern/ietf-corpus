document: rfc-5844
kind: normative-requirement
summary: When a mobile node is capable of performing a handoff between interfaces, a DHCP Client-identifier value MUST be used that is not tied to any physical interface and MUST be generated per RFC 4361 to ensure it is stable and unique across the PMIPv6 domain.
section: "3.4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
