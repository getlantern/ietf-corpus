document: rfc-9140
kind: protocol-element
summary: Peers initially use the reserved generic NAI 'noob@eap-noob.arpa' to signal EAP-NOOB support to the server and enable AAA routing. The server MAY assign a custom NAI via the NewNAI field in Initial or Reconnect Exchange requests (Type=2 and Type=7). NAI values MUST follow RFC 7542 utf8-username syntax.
section: 3.3.1
topics:
    - security
