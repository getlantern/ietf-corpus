document: rfc-7541
kind: protocol-element
summary: The dynamic table is a per-context FIFO list of header fields maintained by both encoder and decoder, with the newest entry at the lowest index. It is initially empty, grows as header blocks are processed, and is bounded by a maximum size set by the protocol.
