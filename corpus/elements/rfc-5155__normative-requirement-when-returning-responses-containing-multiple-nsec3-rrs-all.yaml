document: rfc-5155
kind: normative-requirement
summary: When returning responses containing multiple NSEC3 RRs, all NSEC3 RRs MUST use the same hash algorithm, iteration, and salt values. The Flags field value MUST be either zero or one.
section: "7.2"
rfc2119_level: MUST
