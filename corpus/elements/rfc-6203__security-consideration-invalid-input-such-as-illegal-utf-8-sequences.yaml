document: rfc-6203
kind: security-consideration
summary: Invalid input such as illegal UTF-8 sequences in message data fed to a UTF-8-expecting search engine may cause failures. Servers should validate input and replace illegal sequences, e.g., with the Unicode replacement character U+FFFD.
section: "8"
