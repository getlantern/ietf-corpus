document: rfc-7658
kind: design-rationale
summary: 'The NATV2-MIB (RFC 7659) was designed to address all five deficiencies of NAT-MIB: excessive writability, configuration parameter exposure, interface coupling, ill-defined service type categories, and non-standard protocol numbers. Section 3.2 notes additional new features in NATV2-MIB not present in NAT-MIB.'
section: "3.2"
topics:
