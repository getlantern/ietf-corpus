document: rfc-5601
kind: protocol-element
summary: pwIndexMappingTable provides reverse lookup from the unique tuple [pwType, pwID, pwPeerAddrType, pwPeerAddr] to pwIndex. An entry MUST be created for every PW where pwOwner equals pwIdFecSignaling and pwID is non-zero; not applicable for manual or generalized-FEC PWs.
