document: rfc-9427
kind: normative-requirement
summary: For TEAP and EAP-FAST with TLS 1.3, if a client certificate is accepted, the EAP peer MUST proceed with additional Phase 2 authentication; if there is no Phase 2 data, the EAP server MUST reject the session. Authenticating via client certificate alone in Phase 1 is forbidden.
section: 2.2.1
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
