document: rfc-8827
kind: normative-requirement
summary: Implementations MUST support SRTP, DTLS, DTLS-SRTP, and SCTP over DTLS. All media channels MUST be secured via SRTP and SRTCP. Media traffic MUST NOT be sent over plain (unencrypted) RTP or RTCP; implementations MUST NOT negotiate cipher suites with NULL encryption modes.
section: "6.5"
rfc2119_level: MUST
topics:
    - webrtc
    - security
    - crypto
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
