document: rfc-5865
kind: design-rationale
summary: When two traffic classes carry the same type of application with the same jitter requirements, giving one priority over the other does not benefit the higher-priority traffic and may harm the lower-priority traffic. In such cases, separate policers with a common queue is the superior approach.
section: "2.1"
topics:
    - diffserv
    - qos
