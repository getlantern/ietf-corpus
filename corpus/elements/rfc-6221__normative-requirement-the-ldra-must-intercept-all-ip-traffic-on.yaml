document: rfc-6221
kind: normative-requirement
summary: The LDRA MUST intercept all IP traffic on the network-facing interface with a link-local scoped source address, link-local scoped destination address, UDP protocol, and destination port 547, and MUST only forward Relay-Reply messages; all other DHCP message types MUST be silently discarded.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
    - udp
