summary: 'RBridge Channel messages are transmitted as TRILL Data frames, identified by the All-Egress-RBridges multicast Inner.MacDA combined with the RBridge-Channel Ethertype. The frame structure is: Link Header, TRILL Header, Inner Ethernet Header, RBridge Channel Header, Protocol-Specific Payload, Link Trailer.'
