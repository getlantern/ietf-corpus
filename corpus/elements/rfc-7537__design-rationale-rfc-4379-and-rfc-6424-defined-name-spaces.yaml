document: rfc-7537
kind: design-rationale
summary: RFC 4379 and RFC 6424 defined name spaces for MPLS LSP Ping but did not create corresponding IANA registries for DS Flags, Multipath Types, Pad TLVs, and Interface and Label Stack Address Types. This document creates those registries to enable further code point allocations needed by in-progress work such as entropy label ping and LAG multipath support.
section: "1"
topics:
    - mpls
    - registry
