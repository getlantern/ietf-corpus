document: rfc-3807
kind: normative-requirement
summary: On receiving a Link Status Stop Reporting message, the SG MUST NOT respond in any way, SHALL immediately stop reporting link status, SHALL take L2 down on the link, and SHALL assume the link to be out of service. This message SHALL be sent on interface deactivation for all links.
section: "4.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
