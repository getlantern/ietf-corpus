document: rfc-8038
kind: design-rationale
summary: 'IPFIX is used as a push mechanism instead of SNMP polling to avoid synchronization problems: SNMP data retrieved separately from Data Records cannot be temporally correlated, and the time lag between IPFIX counters and SNMP counters can be significant when polled by a generic NMS.'
