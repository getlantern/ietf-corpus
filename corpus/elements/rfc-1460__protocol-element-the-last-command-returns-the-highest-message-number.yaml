document: rfc-1460
kind: protocol-element
summary: The LAST command returns the highest message number accessed (via RETR or DELE) in the current or prior sessions. Returns 0 if no message has ever been accessed. Clients can infer that messages numbered higher than this response have not yet been retrieved.
