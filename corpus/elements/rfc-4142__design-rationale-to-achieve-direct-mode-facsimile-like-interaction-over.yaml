document: rfc-4142
kind: design-rationale
summary: To achieve direct-mode facsimile-like interaction over email, the originating MTA must contact the receiver's MTA directly (not via outbound intermediaries), and the target MTAs must have DNS A records without MX records, enabling ESMTP CONNEG-based capability exchange before transmission.
section: A
topics:
    - email
    - dns
