document: rfc-2303
kind: protocol-element
summary: The mta-I-pstn (the e-mail address of the I-pstn device) is the Right Hand Side of the address (domain part after '@'). For SMTP it MUST conform to RFC 821 domain specifications; for message headers it MUST conform to RFC 822 and RFC 1123.
