document: rfc-6728
kind: protocol-element
summary: 'The ExportingProcess class supports three export modes: "parallel" (all destinations receive every record), "loadBalancing" (device-specific policy), and "fallback" (ordered primary/secondary/tertiary failover). Default is "parallel". The order of Destination objects is significant only in fallback mode.'
section: "4.4"
