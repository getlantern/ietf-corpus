document: rfc-7453
kind: design-rationale
summary: The string 'MPLS-TP' was intentionally omitted from the four new MIB module names (MPLS-TE-EXT-STD-MIB, MPLS-TC-EXT-STD-MIB, MPLS-ID-STD-MIB, MPLS-LSR-EXT-STD-MIB) because the modules extend MPLS MIB objects in a way that supports both MPLS-TP and other MPLS networks, not MPLS-TP exclusively.
section: "1"
topics:
