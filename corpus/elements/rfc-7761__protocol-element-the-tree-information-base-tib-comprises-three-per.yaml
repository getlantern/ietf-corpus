document: rfc-7761
kind: protocol-element
summary: 'The Tree Information Base (TIB) comprises three per-router state categories: (*,G) for the RP shared tree, (S,G) for source-specific shortest-path trees, and (S,G,rpt) for source-specific prune state on the RP tree. All forwarding decisions, Join/Prune generation, and Assert processing are defined in terms of the TIB.'
section: "4.1"
topics:
