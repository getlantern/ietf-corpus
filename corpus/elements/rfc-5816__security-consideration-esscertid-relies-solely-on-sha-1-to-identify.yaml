document: rfc-5816
kind: security-consideration
summary: ESSCertID relies solely on SHA-1 to identify the certificate used to verify a time-stamp signature. ESSCertIDv2 enables implementers to comply with policies that require phasing out all uses of SHA-1 by permitting any hash algorithm for certificate identification.
section: "3"
topics:
    - security
    - crypto
    - pkix
