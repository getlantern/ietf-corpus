document: rfc-2911
kind: protocol-element
summary: 'IPP defines two primary object types: Printer and Job. A Printer object encapsulates output device functions, spooling, scheduling, and device management. A Job object models a print job containing one or more documents with associated job-template and job-description attributes.'
