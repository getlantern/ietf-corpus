document: rfc-2591
kind: protocol-element
summary: 'schedDay uses a 62-bit BITS field with two complementary numbering schemes: bits d1(0)–d31(30) count forward from the first day of the month, and bits r1(31)–r31(61) count in reverse from the last day, enabling expressions such as ''last day of month'' (r1) without knowing the month length.'
