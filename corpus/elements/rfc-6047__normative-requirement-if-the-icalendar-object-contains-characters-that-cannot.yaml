document: rfc-6047
kind: normative-requirement
summary: If the iCalendar object contains characters that cannot be represented in US-ASCII, a 'charset' MIME parameter MUST be present with the value 'UTF-8', since the iCalendar default is UTF-8 but the text/* MIME default is US-ASCII.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
