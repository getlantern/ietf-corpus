document: rfc-6698
kind: protocol-element
summary: The Selector field (1 octet) specifies which part of the TLS certificate is matched against the association data. Value 0 = full certificate (DER-encoded binary structure per RFC 5280); value 1 = SubjectPublicKeyInfo (DER-encoded per RFC 5280).
