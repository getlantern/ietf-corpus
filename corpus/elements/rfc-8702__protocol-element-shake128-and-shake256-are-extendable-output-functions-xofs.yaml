document: rfc-8702
kind: protocol-element
summary: 'SHAKE128 and SHAKE256 are extendable-output functions (XOFs) used in CMS with fixed output lengths: d=256 bits (32 bytes) for SHAKE128 and d=512 bits (64 bytes) for SHAKE256. SHAKE128 provides min(d/2,128) collision resistance and min(d,128) second-preimage resistance; SHAKE256 provides min(d/2,256) and min(d,256) bits respectively.'
