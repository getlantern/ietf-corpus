document: rfc-9350
kind: protocol-element
summary: The IS-IS and OSPF Flexible Algorithm Definition Flags (FADF) sub-TLV (Type 4) carries a variable-length Flags field. The M-flag (bit 0) mandates use of the Flex-Algorithm-specific prefix metric for inter-area and external prefix calculations; it is explicitly not applicable to prefixes advertised as SRv6 locators.
section: "6.4"
topics:
    - routing
