document: rfc-6364
kind: protocol-element
summary: 'The ''repair-window'' SDP attribute (media-level) specifies the size of the FEC repair window in either milliseconds (''ms'') or microseconds (''us''). Its ABNF syntax is: "a=repair-window:" window-size unit, where window-size is a 32-bit non-negative integer.'
section: "4.6"
topics:
