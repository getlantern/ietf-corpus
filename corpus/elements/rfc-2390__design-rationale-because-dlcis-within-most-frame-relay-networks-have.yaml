document: rfc-2390
kind: design-rationale
summary: Because DLCIs within most Frame Relay networks have only local significance, a station does not have a specific DLCI assigned to itself. The Frame Relay network modifies the DLCI in the frame header as the packet traverses the network, so the receiving station uses the header DLCI as the sender's hardware address.
section: "7.2"
topics:
