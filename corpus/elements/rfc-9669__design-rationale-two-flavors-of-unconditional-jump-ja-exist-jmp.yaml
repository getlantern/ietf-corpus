document: rfc-9669
kind: design-rationale
summary: 'Two flavors of unconditional jump (JA) exist: JMP class uses the 16-bit ''offset'' field, while JMP32 class uses the 32-bit ''imm'' field. This allows conditional jumps beyond 16 bits to be implemented as a short conditional jump plus a 32-bit unconditional JMP32.'
section: "4.3"
