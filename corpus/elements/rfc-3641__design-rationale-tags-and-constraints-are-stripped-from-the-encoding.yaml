document: rfc-3641
kind: design-rationale
summary: 'Tags and constraints are stripped from the encoding: a value of a tagged or constrained type is encoded as if the tag or constraint were absent. This simplifies the human-readable output by removing metadata that is only meaningful in binary encodings.'
section: "3.1"
