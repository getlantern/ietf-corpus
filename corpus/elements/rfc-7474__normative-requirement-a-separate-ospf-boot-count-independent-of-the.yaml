document: rfc-7474
kind: normative-requirement
summary: A separate OSPF boot count (independent of the SNMPv3 snmpEngineBoots variable) is RECOMMENDED, because it decouples OSPF reinitialization from SNMP reinitialization and can also be incremented in the rare event the lower-order 32-bit counter wraps.
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - security
