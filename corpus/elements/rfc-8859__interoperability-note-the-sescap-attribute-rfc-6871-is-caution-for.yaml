document: rfc-8859
kind: interoperability-note
summary: The sescap attribute (RFC 6871) is CAUTION for multiplexing because it requires unique configuration numbers across the entire SDP, whereas RFC 5939 scopes them within a single media description. Using identical configuration numbers across bundled media descriptions is the standard way to indicate compatible configurations in a bundle.
section: "5.33"
topics:
