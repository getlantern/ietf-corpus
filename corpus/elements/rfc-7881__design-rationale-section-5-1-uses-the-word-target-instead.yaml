document: rfc-7881
kind: design-rationale
summary: Section 5.1 uses the word 'target' instead of 'remote entity' to accommodate S-BFD usage via TTL expiry, where an SBFDInitiator can set the Your Discriminator and TTL fields to test continuity toward a target but have the packet expire at a transit node. This is consistent with existing OAM packet-processing exceptions.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
