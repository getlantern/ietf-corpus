document: rfc-7622
kind: design-rationale
summary: Servers are not responsible for enforcing address format rules in protocol elements intended for communication among other entities (e.g., within stanza payloads being routed), only when directly handling or routing based on those elements. For peer-to-peer extensions like Jingle, the client entities themselves SHOULD enforce the rules.
section: "4"
topics:
