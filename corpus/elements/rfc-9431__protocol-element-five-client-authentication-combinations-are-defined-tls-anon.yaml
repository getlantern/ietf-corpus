document: rfc-9431
kind: protocol-element
summary: 'Five client authentication combinations are defined: TLS:Anon,MQTT:None (public topics only); TLS:Anon,MQTT:ace (token in CONNECT); TLS:Known(RPK/PSK),MQTT:none (token pre-uploaded or in PSK identity); and TLS:Known(RPK/PSK),MQTT:ace (SHOULD NOT be used as it overwrites TLS permissions).'
section: 2.2.1
topics:
