document: rfc-5779
kind: interoperability-note
summary: The MN identity used on the MAG-to-HAAA interface and in the User-Name AVP MAY be entirely related to the network access authentication, and therefore not suitable for use as the MN-ID mobility option value in subsequent PBU/PBA messages.
