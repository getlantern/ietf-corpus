document: rfc-9048
kind: protocol-element
summary: 'AT_MAC in EAP-AKA'' uses HMAC-SHA-256-128: the full 32-byte HMAC-SHA-256 output is truncated to the first 16 bytes, yielding a 16-byte MAC. EAP-AKA uses HMAC-SHA-1 instead.'
