document: rfc-2543
kind: protocol-element
summary: The CSeq header contains a sequence number and the method name. Requests in the same call leg MUST have monotonically increasing CSeq numbers. The ACK and CANCEL for an INVITE share the same CSeq number as the INVITE but use their own method token.
section: "6.17"
topics:
    - sip
    - realtime
