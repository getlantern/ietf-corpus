document: rfc-9552
kind: protocol-element
summary: Link Descriptor TLVs uniquely identify a link among parallel links between anchor routers. A link is represented as two half-links (two Link NLRIs, one per endpoint). A link is not considered complete unless both half-link NLRIs are present, analogous to IGP two-way connectivity checks.
section: 5.2.2
topics:
    - bgp
    - routing
