document: rfc-7012
kind: registry
summary: The IANA 'IPFIX Information Elements' registry (IP Flow Information Export Entities) is the normative reference for IPFIX IEs. It uses Expert Review (by IE-DOCTORS appointed by IESG) for additions, revisions, and deprecations. The registry stores at minimum the fields defined in the IE Specification Template (Section 2.1).
