document: rfc-2511
kind: design-rationale
summary: The indirect POP method for key encipherment issues the resulting certificate encrypted for the end entity, so that only the intended recipient can use it. This allows a CA to issue a certificate that can only be used by the entity that actually possesses the private key.
section: "4.2"
topics:
    - pkix
    - crypto
