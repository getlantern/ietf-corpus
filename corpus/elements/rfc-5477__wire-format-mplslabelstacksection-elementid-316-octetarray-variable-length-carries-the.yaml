kind: wire-format
summary: mplsLabelStackSection (ElementId 316, octetArray, variable length) carries the first n octets of the MPLS label stack; mplsPayloadPacketSection (ElementId 317, octetArray) carries the first n octets of the MPLS payload following the label stack. Both MUST NOT be padded.
