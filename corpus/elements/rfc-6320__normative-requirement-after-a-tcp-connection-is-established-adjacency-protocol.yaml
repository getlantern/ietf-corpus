document: rfc-6320
kind: normative-requirement
summary: After a TCP connection is established, adjacency protocol messages MUST be exchanged as specified before any other ANCP messages are sent. ANCP messages other than adjacency protocol messages MUST NOT be sent until the adjacency protocol has achieved synchronization (ESTAB state).
section: "3.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
