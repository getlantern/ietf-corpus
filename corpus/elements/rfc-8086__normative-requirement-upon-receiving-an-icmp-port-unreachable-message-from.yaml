document: rfc-8086
kind: normative-requirement
summary: Upon receiving an ICMP 'port unreachable' message from a peer that does not support GRE-in-UDP, the node MUST NOT continue to use GRE-in-UDP encapsulation toward that peer without management intervention.
section: "9"
rfc2119_level: MUST NOT
