document: rfc-7867
kind: wire-format
summary: FFSC (Fraction of Frames Subject to Concealment) is an 8-bit fixed-point field representing the fraction of frames to which concealment was applied. Value 0 means no concealed frames; 0xFF means all frames in the interval were concealed.
