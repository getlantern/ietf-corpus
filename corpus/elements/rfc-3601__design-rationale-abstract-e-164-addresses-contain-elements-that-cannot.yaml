document: rfc-3601
kind: design-rationale
summary: Abstract E.164 addresses contain elements that cannot be dialled and therefore cannot be fully converted into a Dial Sequence or fully represented using phone-string notation. This is why the specification defines separate global-phone (diallable subset) and local-phone types rather than mapping all E.164 forms directly.
section: "1"
