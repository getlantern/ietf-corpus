document: rfc-6994
kind: design-rationale
summary: ExIDs combine properties of IANA FCFS-registered values with magic numbers to be robust to squatters who either fail to register or deliberately use others' codepoints. A purely conventional IANA FCFS registry was deemed insufficient given the observed reality of unauthorized codepoint reuse.
section: "6"
topics:
