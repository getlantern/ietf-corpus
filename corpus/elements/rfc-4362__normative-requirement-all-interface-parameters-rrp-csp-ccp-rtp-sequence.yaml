document: rfc-4362
kind: normative-requirement
summary: All interface parameters (RRP, CSP, CCP, RTP Sequence Number, and segmentation flags), except NHP, MUST always be delivered from the compressor to the assisting layer. The RTP SN MUST be delivered for each packet.
section: 4.2.1
rfc2119_level: MUST
