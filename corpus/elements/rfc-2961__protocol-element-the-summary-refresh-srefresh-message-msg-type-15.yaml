document: rfc-2961
kind: protocol-element
summary: The Summary Refresh (Srefresh) message (Msg Type 15) refreshes RSVP Path and Resv state by listing Message_Identifier tokens instead of transmitting full Path/Resv messages. The receiver matches each identifier to installed state and updates it as if a standard refresh had arrived; unmatched identifiers elicit a NACK.
