document: rfc-9420
kind: protocol-element
summary: 'The ratchet tree is a perfect binary tree whose leaves represent group members and whose internal nodes hold HPKE public keys. It enforces the tree invariant: the private key for a node is known only to members whose leaves are descendants of that node.'
