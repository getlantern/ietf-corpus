document: rfc-4683
kind: normative-requirement
summary: When a PKCS#10 certificate request is used, the SIM alternative name MUST be placed in the subjectAltName extension. If the CA verifies SII before issuance, the SIM value in the request MUST be conveyed in EPEPSI form.
section: "4.6"
rfc2119_level: MUST
topics:
