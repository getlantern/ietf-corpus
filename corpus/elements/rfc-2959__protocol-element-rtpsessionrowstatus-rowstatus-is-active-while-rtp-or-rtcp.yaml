document: rfc-2959
kind: protocol-element
summary: rtpSessionRowStatus (RowStatus) is 'active' while RTP or RTCP messages are being sent or received. A newly-created row must have all read-create objects initialized before becoming active; rows in 'notReady' or 'notInService' state may be removed after 5 minutes.
