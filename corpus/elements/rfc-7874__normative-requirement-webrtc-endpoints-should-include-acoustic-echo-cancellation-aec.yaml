document: rfc-7874
kind: normative-requirement
summary: WebRTC endpoints SHOULD include acoustic echo cancellation (AEC) or another form of echo control. Endpoint AECs SHOULD be robust to ADC/DAC clock differences (e.g., webcam capture with separate soundcard playback), unless hardware guarantees a shared clock.
section: "5"
rfc2119_level: SHOULD
topics:
    - webrtc
    - realtime
    - voip
