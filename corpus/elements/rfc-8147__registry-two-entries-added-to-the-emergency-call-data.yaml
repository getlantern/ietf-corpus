document: rfc-8147
kind: registry
summary: 'Two entries added to the ''Emergency Call Data Types'' registry (originally established by RFC 7852): ''eCall.MSD'' and ''Control'', both with Data About value ''The Call''. These registry entries allow SIP intermediaries to identify data blocks by the ''purpose'' parameter in Call-Info header fields.'
section: "14.5"
