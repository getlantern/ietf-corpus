document: rfc-4551
kind: protocol-element
summary: The CONDSTORE parameter to SELECT and EXAMINE instructs the server to include MODSEQ fetch response data items in all subsequent unsolicited FETCH responses for that session, closing the race window between the server sending HIGHESTMODSEQ and the client issuing its first CONDSTORE-enabling command.
section: "3.7"
