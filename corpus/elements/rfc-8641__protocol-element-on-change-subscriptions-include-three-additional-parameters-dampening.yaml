document: rfc-8641
kind: protocol-element
summary: 'On-change subscriptions include three additional parameters: dampening-period (minimum interval between successive updates for the same subscription), change-type (restricts which types of changes—create, delete, insert, move, replace—trigger updates), and sync-on-start (whether a full push-update is sent at subscription start to establish a reference frame).'
section: "3.1"
topics:
