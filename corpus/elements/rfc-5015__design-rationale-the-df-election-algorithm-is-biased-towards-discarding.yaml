document: rfc-5015
kind: design-rationale
summary: 'The DF election algorithm is biased towards discarding DF information and suspending forwarding during periods of ambiguity. This is deliberate: the forwarding rules in Section 3.3 can produce loops if multiple routers simultaneously believe they are the DF, so safety is prioritized over continuity.'
section: 3.5.1
topics:
    - multicast
    - routing
