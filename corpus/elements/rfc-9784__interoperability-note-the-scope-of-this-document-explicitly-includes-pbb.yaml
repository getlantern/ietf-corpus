document: rfc-9784
kind: interoperability-note
summary: The scope of this document explicitly includes PBB-EVPN (RFC 7623), EVPN over MPLS (RFC 7432), and EVPN over IP (RFC 8365), but excludes EVPN over SRv6 (RFC 9252). The extension of vES to support All-Active multihoming in MPLS/IP access networks is also explicitly out of scope.
section: "1"
topics:
