document: rfc-1196
kind: security-consideration
summary: 'Finger client programs SHOULD by default filter all unprintable data, passing only printable 7-bit ASCII (32–126), tabs (ASCII 9), and CRLFs, to protect users against terminal escape code injection and similar attacks. Two optional modes SHOULD be provided: one allowing characters below ASCII 32 and one allowing characters above ASCII 126.'
section: "3.3"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
