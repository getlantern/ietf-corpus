document: rfc-4250
kind: protocol-element
summary: 'The PRIVATE USE range for Channel Connection Failure reason codes (0xFE000000–0xFFFFFFFF) is split: 0xFE000000–0xFEFFFFFF is for locally assigned channels (if the server understands the channel type but fails to open it, it SHOULD respond with a value from this sub-range); 0xFF000000–0xFFFFFFFF is reserved for experimentation with no interoperability guarantee.'
section: 4.3.4
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
