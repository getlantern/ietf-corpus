document: rfc-2821
kind: design-rationale
summary: EHLO was introduced as a superset of HELO to enable the service extension model without breaking existing implementations. HELO is retained as a required fallback to ensure interoperability with older systems. The extension model was deliberately designed so that each extension must be separately negotiated, preserving SMTP's simplicity and ubiquity.
section: 2.2.1
topics:
