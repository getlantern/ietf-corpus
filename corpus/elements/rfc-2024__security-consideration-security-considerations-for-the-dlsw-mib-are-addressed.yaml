document: rfc-2024
kind: security-consideration
summary: Security considerations for the DLSw MIB are addressed in Section 6.0 of the document. Read-write and read-create objects in this MIB (such as dlswNodeStatus, dlswTConnConfigTable, and dlswTConnOperState) can cause significant operational disruption if accessed by unauthorized parties, including disconnecting all circuits and transport connections.
section: "6.0"
topics:
    - snmp
    - security
