document: rfc-4361
kind: design-rationale
summary: RFC 2131 permits servers to fall back to chaddr when no client identifier option is present, inheriting all the instability problems of link-layer addresses. This document requires clients to always send a client identifier.
section: "4.4"
topics:
    - ip
