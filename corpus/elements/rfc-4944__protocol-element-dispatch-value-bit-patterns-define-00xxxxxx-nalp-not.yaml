document: rfc-4944
kind: protocol-element
summary: 'Dispatch value bit patterns define: 00xxxxxx = NALP (not a LoWPAN frame, discard); 01 000001 = IPv6 (uncompressed); 01 000010 = LOWPAN_HC1 (compressed IPv6); 01 010000 = LOWPAN_BC0 (broadcast); 01 111111 = ESC (additional dispatch byte follows); 10 xxxxxx = MESH; 11 000xxx = FRAG1; 11 100xxx = FRAGN.'
section: "5.1"
topics:
