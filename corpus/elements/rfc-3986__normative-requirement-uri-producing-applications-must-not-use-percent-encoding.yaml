document: rfc-3986
kind: normative-requirement
summary: URI producing applications MUST NOT use percent-encoding in the host component unless it is used to represent a UTF-8 character sequence. Non-ASCII registered names must first be encoded as UTF-8 octets before percent-encoding.
section: 3.2.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
