document: rfc-3986
kind: normative-requirement
summary: URI producing applications must not use percent-encoding in host unless it represents a UTF-8 character sequence. Non-ASCII internationalized domain names intended for DNS resolution must be transformed to IDNA encoding prior to name lookup.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - dns
