document: rfc-4103
kind: protocol-element
summary: The text/t140 RTP payload format carries T.140 text conversation data in a dedicated RTP session. Each RTP packet contains exactly one T140block (a block of UTF-8 encoded T.140 data) with no additional framing or payload-specific headers beyond the standard RTP header.
section: "3.2"
topics:
