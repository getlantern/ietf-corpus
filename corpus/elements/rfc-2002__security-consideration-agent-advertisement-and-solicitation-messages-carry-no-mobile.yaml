document: rfc-2002
kind: security-consideration
summary: Agent Advertisement and Solicitation messages carry no Mobile IP authentication; they MAY optionally be protected by the IP Authentication Header. The lack of mandatory authentication for discovery messages is an acknowledged limitation.
