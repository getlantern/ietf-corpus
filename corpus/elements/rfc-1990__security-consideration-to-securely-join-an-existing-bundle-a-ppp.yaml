document: rfc-1990
kind: security-consideration
summary: To securely join an existing bundle, a PPP authentication protocol must be used to obtain authenticated peer information. Without authentication, a hostile peer can join an existing bundle by presenting a falsified Endpoint Discriminator option.
section: 5.1.3
topics:
    - security
