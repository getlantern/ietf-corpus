document: rfc-1042
kind: normative-requirement
summary: All 802.5 implementations are required to understand ARP/IP frames with no RIF (local ring) and frames with an empty RIF. Implementations supporting multi-ring source routing must store non-empty RIFs for future transmissions; others should gracefully ignore frames with non-empty RIFs.
section: For IEEE 802.5
rfc2119_level: REQUIRED
topics:
    - ip
