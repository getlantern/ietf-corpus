document: rfc-5230
kind: normative-requirement
summary: Implementations MUST maintain a list of addresses to which vacation MUST NOT send replies (e.g., MAILER-DAEMON, LISTSERV, majordomo, addresses ending in "-request" or beginning with "owner-"). The exact contents are implementation-defined.
section: "4.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
