document: rfc-4631
kind: interoperability-note
summary: The association between data-bearing links and their TE links is stored in ifStackTable (RFC 2863), not within the LMP MIB itself. The protection role (primary or secondary) for data-bearing links is defined in componentLinkTable of TE-LINK-STD-MIB (RFC 4220).
