document: rfc-6854
kind: protocol-element
summary: 'The ''From:'' field is redefined to accept either ''mailbox-list'' or ''address-list'' syntax: ''from = "From:" (mailbox-list / address-list) CRLF''. This allows group syntax, including empty groups, in addition to the previously required mailbox-list.'
section: "2.1"
topics:
