document: rfc-3275
kind: interoperability-note
summary: Applications using Canonical XML with Comments (section 6.5.1) or minimal canonicalization alternatives will not interoperate with applications that do not support the specified algorithm. Non-required canonicalization algorithms may also introduce security issues in entity and comment processing.
section: 4.3.1
topics:
