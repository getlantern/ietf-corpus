document: rfc-3559
kind: design-rationale
summary: IANAscopeSource and IANAmallocRangeSource textual conventions are defined in a separate IANA-MALLOC-MIB module rather than inline in this document so that IANA can add new values without requiring a new version of RFC 3559. This pattern decouples the protocol MIB lifecycle from the enumeration lifecycle.
section: "5"
topics:
    - multicast
    - registry
