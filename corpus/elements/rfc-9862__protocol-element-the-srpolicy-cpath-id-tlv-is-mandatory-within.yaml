document: rfc-9862
kind: protocol-element
summary: The SRPOLICY-CPATH-ID TLV is mandatory within the SRPA object; the SRPOLICY-POL-NAME (Type 56), SRPOLICY-CPATH-NAME (Type 58), and SRPOLICY-CPATH-PREFERENCE (Type 59) TLVs are optional. Only one instance of each TLV type may be processed; duplicates MUST be silently ignored.
