document: rfc-4560
kind: protocol-element
summary: 'pingImplementationTypeDomains defines four registered OID-based implementation types: pingIcmpEcho, pingUdpEcho (port 7), pingSnmpQuery, and pingTcpConnectionAttempt. Additional types SHOULD be registered under enterprise-specific subtrees, not under pingImplementationTypeDomains.'
