document: rfc-4343
kind: interoperability-note
summary: When name compression (indirect labels) is used to optimize output, the case-insensitive comparison is used to determine if names match for pointer reuse. This means name compression may destroy the case that was originally preserved on input, as only one capitalization of a shared name tail is stored.
section: "4.1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
