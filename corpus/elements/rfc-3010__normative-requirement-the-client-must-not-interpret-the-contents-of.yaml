document: rfc-3010
kind: normative-requirement
summary: The client MUST NOT interpret the contents of filehandles beyond byte-by-byte equality comparison. If two filehandles from the same server are equal, they MUST refer to the same file.
section: 4.2.1
rfc2119_level: MUST NOT
