document: rfc-9133
kind: security-consideration
summary: This specification restricts the signal channel extension to activation/deactivation of existing filters only; creation of new filtering rules remains solely the responsibility of the DOTS data channel (RFC 8783). DOTS client domains should pre-provision filters before attacks so they are available for on-demand activation.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
