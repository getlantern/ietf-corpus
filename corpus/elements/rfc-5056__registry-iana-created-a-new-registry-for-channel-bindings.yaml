document: rfc-5056
kind: registry
summary: IANA created a new registry for channel bindings specifications. The registry ensures uniqueness of channel binding name prefixes and provides a definitive reference to technical specifications. Names may be any string of US-ASCII alphanumeric characters, period ('.'), and dash ('-'). Registration requires expert review per BCP 26.
section: "7"
