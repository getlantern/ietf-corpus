document: rfc-5919
kind: normative-requirement
summary: The U-bit and F-bit in the Unrecognized Notification Capability TLV MUST be 1 and 0, respectively, as required by the LDP Capabilities specification (RFC 5561), and the S-bit MUST be 1 to indicate the capability is being advertised.
