document: rfc-3431
kind: interoperability-note
summary: The Header COUNT test counts the total number of field instances, not individual addresses within fields. Thus, testing ["to", "cc"] with COUNT on an RFC 2822 compliant message will always return at most 2, since each field may appear at most once.
section: "4.2"
topics:
    - email
