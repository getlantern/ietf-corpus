document: rfc-1831
kind: design-rationale
summary: AUTH_SHORT is provided so that servers can issue a compact shorthand credential in the reply verifier, allowing clients to reduce network bandwidth and server CPU cycles on subsequent calls in place of the full AUTH_SYS credential.
section: A
