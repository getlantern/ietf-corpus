document: rfc-8972
kind: security-consideration
summary: The CoS TLV allows testing DSCP mapping across domain boundaries; operators must verify permitted CoS values in the Session-Reflector's domain. Implementations of Session-Reflector SHOULD enforce local policy to confirm whether the DSCP1 value from the Session-Sender can be applied.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - diffserv
    - qos
