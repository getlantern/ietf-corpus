document: rfc-6917
kind: protocol-element
summary: The <subscription> element (child of <mrbrequest>) manages subscription sessions. It carries mandatory attributes 'id' (unique session token), 'seqnumber' (monotonically increasing command counter), and 'action' (create/update/remove). Optional children <expires>, <minfrequency>, and <maxfrequency> are advisory; the Media Server MAY modify them and MUST report changes in its <mrbresponse>.
section: 5.1.3.1
topics:
    - sip
    - realtime
