document: rfc-2597
kind: normative-requirement
summary: Within an AF class, a DS node MUST NOT forward an IP packet with smaller probability if it has drop precedence p than if it has drop precedence q when p < q, ensuring lower drop precedence packets are preferentially forwarded.
section: "2"
rfc2119_level: MUST NOT
topics:
