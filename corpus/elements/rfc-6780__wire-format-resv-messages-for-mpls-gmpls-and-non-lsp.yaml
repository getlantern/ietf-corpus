kind: wire-format
summary: 'Resv messages for MPLS, GMPLS, and non-LSP sessions include ASSOCIATION object(s) after SCOPE and before POLICY_DATA, with the format: Common Header, INTEGRITY (opt), SESSION, RSVP_HOP, TIME_VALUES, RESV_CONFIRM (opt), SCOPE (opt), ASSOCIATION (0+), POLICY_DATA (0+), STYLE, flow descriptor list.'
