document: rfc-1406
kind: protocol-element
summary: The dsx1FracTable maps DS1 channels to logical interfaces. dsx1FracIfIndex specifies the ifIndex of the interface using each channel (0 if unmanaged). For North American DS1, channels 1-24 are valid; for G.704 (E1), channels 1-31 correspond directly to time-slots 1-31. Channel assignments are indexed by DS1 interface and channel number.
section: 4.3.1
