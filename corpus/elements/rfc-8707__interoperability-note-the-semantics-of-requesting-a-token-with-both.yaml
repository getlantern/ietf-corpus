document: rfc-8707
kind: interoperability-note
summary: The semantics of requesting a token with both 'resource' and 'scope' parameters are that the client is asking for a token with the requested scope that is usable at all the requested target services — effectively the cartesian product of all scopes at all target services.
section: "2.2"
topics:
    - oauth
