document: rfc-5497
kind: design-rationale
summary: INTERVAL_TIME and VALIDITY_TIME IANA assignments are defined in this document (rather than individually by each MANET protocol) to avoid interdependencies between unrelated MANET protocols and to prevent exhausting TLV Type spaces with duplicate assignments for structurally identical data.
