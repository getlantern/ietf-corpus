document: rfc-7176
kind: normative-requirement
summary: An LSP number zero MUST NOT be originated larger than 1470 bytes, but a larger LSP number zero that is successfully received MUST be processed and forwarded normally, ensuring compatibility across implementations with different buffer sizes.
section: "4.4"
rfc2119_level: MUST
topics:
