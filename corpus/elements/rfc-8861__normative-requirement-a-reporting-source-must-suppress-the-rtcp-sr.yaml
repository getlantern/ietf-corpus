document: rfc-8861
kind: normative-requirement
summary: A reporting source MUST suppress the RTCP SR/RR reports that relate to other members of the Reporting Group and only report on remote SSRCs. Non-reporting sources MUST suppress their reception quality reports entirely.
section: "3.1"
rfc2119_level: MUST
topics:
