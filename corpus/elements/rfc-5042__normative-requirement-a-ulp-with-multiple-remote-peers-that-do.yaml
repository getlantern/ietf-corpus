document: rfc-5042
kind: normative-requirement
summary: A ULP with multiple Remote Peers that do not share Partial Mutual Trust MUST NOT grant write access to the same buffer through different STags; a buffer should be exposed to only one untrusted Remote Peer at a time.
section: 6.3.6
rfc2119_level: MUST NOT
topics:
    - security
