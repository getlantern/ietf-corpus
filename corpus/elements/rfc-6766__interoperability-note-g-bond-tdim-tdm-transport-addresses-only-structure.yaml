document: rfc-6766
kind: interoperability-note
summary: G.Bond/TDIM TDM transport addresses only structure-agnostic TDM streams; it disregards structure imposed by standard TDM framing (G.704). Implementations mapping structured TDM services must handle framing above the TDIM layer.
