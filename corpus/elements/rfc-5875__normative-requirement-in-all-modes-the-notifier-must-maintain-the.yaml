document: rfc-5875
kind: normative-requirement
summary: In all modes, the notifier MUST maintain the chronological order of XCAP changes. If several changes to a given resource are presented in a single notification, the chronological update order MUST be preserved in the XML document order of the notification body.
section: "4.7"
rfc2119_level: MUST
topics:
    - sip
    - http
