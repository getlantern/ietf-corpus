document: rfc-9524
kind: normative-requirement
summary: If a root node encodes a context-SID in an SRH with an optional HMAC SRH TLV (RFC 8754), it MUST set the 'D' bit as defined in RFC 8754 Section 2.1.2, because the Replication-SID is not part of the segment list in the SRH.
section: 2.2.1.1
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
