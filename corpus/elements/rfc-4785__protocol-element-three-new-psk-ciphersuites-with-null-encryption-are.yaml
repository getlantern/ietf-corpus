summary: 'Three new PSK ciphersuites with NULL encryption are defined: TLS_PSK_WITH_NULL_SHA (PSK key exchange, NULL cipher, SHA hash), TLS_DHE_PSK_WITH_NULL_SHA (DHE_PSK key exchange, NULL cipher, SHA hash), and TLS_RSA_PSK_WITH_NULL_SHA (RSA_PSK key exchange, NULL cipher, SHA hash). These augment RFC 4279 by adding authentication and integrity without confidentiality.'
