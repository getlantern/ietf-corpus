document: rfc-9752
kind: security-consideration
summary: The use of vendor-specific information may provide a covert channel that could be misused by PCEP speaker implementations or malicious software. Operators monitoring PCEP sessions can detect use of vendor-specific information and inspect it; robust integrity, authentication, and authorization for software installation are recommended mitigations.
section: "6"
topics:
