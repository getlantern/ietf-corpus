document: rfc-9218
kind: normative-requirement
summary: Unknown priority parameters MUST be ignored. New priority parameters SHOULD NOT change the interpretation of urgency or incremental in a way that is not backwards-compatible, so that endpoints that do not recognize them can safely continue using the base eight urgency levels.
section: "4"
rfc2119_level: MUST
topics:
    - http
