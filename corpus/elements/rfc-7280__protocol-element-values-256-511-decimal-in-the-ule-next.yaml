document: rfc-7280
kind: protocol-element
summary: Values 256-511 decimal in the ULE Next-Header registry identify Optional Extension Headers. Each entry MUST define the need for the Optional Extension and the intended use. The registered value corresponds to the 16-bit Type value for an Optional Extension Header with H-LEN equal to 1.
section: "3.1"
rfc2119_level: MUST
topics:
    - registry
