document: rfc-1172
kind: normative-requirement
summary: PPP implementations MUST accept both single-octet and double-octet Protocol fields and MUST NOT distinguish between them, even after PFC negotiation. Compressed Protocol fields MAY NOT be transmitted unless the peer has sent a Configure-Ack with this option.
section: "2.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
