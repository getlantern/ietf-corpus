document: rfc-2178
kind: security-consideration
summary: All OSPF routing exchanges must be authenticated to prevent unauthorized routers from injecting false routing information. Simple password (Type 1) authentication is vulnerable to passive eavesdropping since the password appears in cleartext; cryptographic (Type 2, MD5) authentication is strongly preferred for production deployments.
section: Security Considerations
topics:
    - routing
    - security
