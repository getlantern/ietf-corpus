document: rfc-7150
kind: design-rationale
summary: The mechanism uses an IANA-assigned Enterprise Number to identify the organization responsible for interpreting the vendor-specific content, rather than a PCEP-specific registry, allowing arbitrary vendor differentiation without exhausting a shared codepoint space. Vendors are encouraged to document and eventually standardize widely useful extensions.
