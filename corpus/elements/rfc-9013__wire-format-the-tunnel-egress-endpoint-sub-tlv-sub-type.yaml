document: rfc-9013
kind: wire-format
summary: The Tunnel Egress Endpoint Sub-TLV (sub-type 3) contains a 2-octet Address Family subfield and a variable-length Address subfield. For IPv4, the Address MUST be a /32 prefix and Length MUST be 6; for IPv6, the Address MUST be a /128 prefix and Length MUST be 18 (0x12). IPv6 link-local addresses are not valid.
section: "5.3"
topics:
    - routing
    - ip
