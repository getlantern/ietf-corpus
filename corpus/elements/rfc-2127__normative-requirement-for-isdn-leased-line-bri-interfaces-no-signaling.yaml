document: rfc-2127
kind: normative-requirement
summary: For ISDN leased-line BRI interfaces (no signaling channel available), isdnBasicRateSignalMode of isdnBasicRateTable must be set to inactive(2); for Primary Rate leased lines, dsx1SignalMode in the DS1/E1 MIB must be set to none(1).
