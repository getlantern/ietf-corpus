document: rfc-7783
kind: protocol-element
summary: A virtual RBridge is a purely conceptual RBridge representing an active-active edge group, assigned a unique nickname within the TRILL campus. Each edge RBridge (RB1 to RBk) advertises the virtual RBridge nickname (RBv) using the Nickname sub-TLV (6) along with its own regular nicknames. Virtual RBridges are ignored when determining distribution tree roots.
section: "4.2"
topics:
    - routing
    - multicast
