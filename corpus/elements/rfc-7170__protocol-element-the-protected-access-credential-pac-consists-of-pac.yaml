document: rfc-7170
kind: protocol-element
summary: 'The Protected Access Credential (PAC) consists of: PAC-Key (a minimum 48-octet pre-shared key used as the TLS master secret), PAC-Opaque (a variable-length server-interpreted ticket derived from RFC 5077 SessionTicket semantics), and optional PAC-Info (authority identity and lifetime metadata). The PAC-Opaque may be presented in the clear but must not reveal useful information to attackers.'
section: 3.2.2
topics:
    - tls
    - security
    - crypto
