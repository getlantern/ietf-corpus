document: rfc-8587
kind: protocol-element
summary: The fs_locations attribute allows specification of file system locations where data corresponding to a given file system may be accessed, representing instances as a server address target together with a path within the single-server namespace. Individual entries can express trunkable addresses, replica locations, migration targets, or pure referrals.
section: "5.1"
topics:
