summary: 'The mteEventTable defines event actions via mteEventActions (a BITS field): ''notification'' sends SNMP Traps/Informs per the SNMP Notification MIB configuration; ''set'' performs an SNMP Set on the object defined in mteEventSetTable. Both can be selected simultaneously.'
