document: rfc-8801
kind: normative-requirement
summary: A router MAY send RAs containing one PvD Option but MUST NOT include more than one PvD Option in each RA. The PvD Option MUST NOT contain further PvD Options. To provide multiple Explicit PvDs, a router MUST send multiple RAs.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
