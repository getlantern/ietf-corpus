document: rfc-9598
kind: normative-requirement
summary: rfc822Name name constraints with a Local-part SHOULD NOT be used, because RFC 9549 deprecates rfc822Name name constraints that represent a particular mailbox, allowing only forms that represent all addresses at a host or all mailboxes in a domain.
section: "6"
rfc2119_level: SHOULD NOT
