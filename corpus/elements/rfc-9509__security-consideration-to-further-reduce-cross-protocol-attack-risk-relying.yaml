document: rfc-9509
kind: security-consideration
summary: To further reduce cross-protocol attack risk, relying parties MAY prohibit specific combinations of KeyPurposeIds using the Excluded KeyPurposeId and Permitted KeyPurposeId mechanism defined in RFC 9336. Examples of excluded identifiers include anyExtendedKeyUsage or a certificate with no EKU extension at all.
section: "6"
topics:
