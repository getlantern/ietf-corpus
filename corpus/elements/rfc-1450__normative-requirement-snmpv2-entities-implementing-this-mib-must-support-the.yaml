document: rfc-1450
kind: normative-requirement
summary: 'SNMPv2 entities implementing this MIB must support the mandatory groups: system (from RFC1213-MIB), snmpStatsGroup, snmpORGroup, snmpTrapGroup, and snmpSetGroup. The snmpV1Group is mandatory only for entities that also implement SNMPv1.'
section: 3.6.1
rfc2119_level: MUST
