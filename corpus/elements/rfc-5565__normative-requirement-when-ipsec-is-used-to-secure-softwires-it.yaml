document: rfc-5565
kind: normative-requirement
summary: When IPsec is used to secure softwires, it MUST provide authentication and integrity. Implementations MUST support ESP with null encryption (RFC 4303) or AH (RFC 4302); ESP with encryption MAY be supported.
section: "13.3"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - vpn
