document: rfc-9494
kind: protocol-element
summary: 'The Flags field in each LLGR Capability tuple contains a single defined bit at position 0: the F bit (Preservation of state). When set to 1, it indicates that forwarding/routing state for routes of the given AFI/SAFI has been preserved during the previous BGP restart. Bits 1–7 are reserved and MUST be zero.'
section: "3.1"
topics:
    - bgp
    - routing
