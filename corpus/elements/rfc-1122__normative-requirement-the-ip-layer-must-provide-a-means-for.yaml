document: rfc-1122
kind: normative-requirement
summary: The IP layer MUST provide a means for the transport layer to set the TOS field of every outgoing datagram (default all-zero). The IP layer SHOULD pass received TOS values up to the transport layer. The RFC-795 link-layer TOS mappings SHOULD NOT be implemented.
section: 3.2.1.6
rfc2119_level: MUST
topics:
    - ip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
