document: rfc-4555
kind: normative-requirement
summary: Implementations that support both this specification and NAT Traversal MUST change to port 4500 if the correspondent also supports both, even if no NAT was detected between them. This avoids needing to change ports later if a NAT is detected on some other path.
section: "3.3"
rfc2119_level: MUST
topics:
    - ipsec
    - nat
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
