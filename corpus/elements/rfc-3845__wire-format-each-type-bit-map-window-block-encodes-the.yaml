document: rfc-3845
kind: wire-format
summary: Each Type Bit Map window block encodes the low-order 8 bits of the 16-bit RR type space. Window blocks are ordered by increasing window number; each bitmap bit in network bit order represents an RR type, with bit 1 of window 0 corresponding to RR type 1 (A).
