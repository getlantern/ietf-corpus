document: rfc-9671
kind: normative-requirement
summary: If a mail message contains calendar data in multiple MIME parts, the action MUST verify that the calendar data in each part are semantically equivalent. If the data is semantically different, the action MUST NOT process the message; otherwise it MUST only process one representation.
section: "4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
