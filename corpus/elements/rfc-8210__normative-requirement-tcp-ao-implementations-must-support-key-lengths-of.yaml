document: rfc-8210
kind: normative-requirement
summary: TCP-AO implementations MUST support key lengths of at least 80 printable ASCII bytes and hexadecimal sequences of at least 32 characters (128 bits). MAC lengths of at least 96 bits MUST be supported. The cryptographic algorithms specified in RFC 5926 MUST be supported.
section: "9.4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
    - tcp
