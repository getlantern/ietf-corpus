document: rfc-9456
kind: registry
summary: 'IANA created a new registry ''SNMP-TLSTM HashAlgorithms'' within the SMI Numbers group (OID 1.3.6.1.2.1.198.4). It has fields: Value (0-255), Description, Recommended, and References. Policy is Expert Review. Initial values mirror the TLS HashAlgorithm registry (none=0, md5=1, sha1=2, sha224=3, sha256=4, sha384=5, sha512=6, Reserved=7, Intrinsic=8).'
