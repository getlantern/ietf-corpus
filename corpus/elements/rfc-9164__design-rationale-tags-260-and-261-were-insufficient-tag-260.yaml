document: rfc-9164
kind: design-rationale
summary: 'Tags 260 and 261 were insufficient: tag 260 distinguishes IPv6, IPv4, and MAC addresses only by byte-string length, making it impossible to drop trailing zeros in encodings, and tag 261 was not documented well enough for use. Tags 54 and 52 were introduced to explicitly signal IPv6 vs. IPv4 by tag number.'
section: "1"
topics:
