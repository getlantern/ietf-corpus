document: rfc-7900
kind: normative-requirement
summary: Route Reflectors and ASBRs MUST NOT add or remove the Extranet Source Extended Community from VPN-IP routes; its value MUST NOT be changed. When a PE advertises IP routes to a CE (non-option (a) interconnect), those routes MUST NOT carry the Extranet Source Extended Community.
section: 4.4.2
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
