document: rfc-4315
kind: design-rationale
summary: RFC 2359 implied a server must always return COPYUID/APPENDUID data, suggesting arbitrary data should be returned when persistent UIDs are unsupported. RFC 4315 adds UIDNOTSTICKY to explicitly signal non-persistent UID stores and exempts such mailboxes from returning COPYUID/APPENDUID.
section: "9"
topics:
