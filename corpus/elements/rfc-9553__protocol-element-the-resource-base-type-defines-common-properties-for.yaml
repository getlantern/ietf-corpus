document: rfc-9553
kind: protocol-element
summary: 'The Resource base type defines common properties for URI-identified resources: @type (must be a concrete subtype name, not ''Resource''), kind, uri (mandatory URI per RFC 3986), mediaType, contexts, pref, and label. Concrete subtypes include CryptoKey, Calendar, Directory, Link, and Media.'
section: 1.4.4
