document: rfc-9068
kind: normative-requirement
summary: JWT access tokens MUST include the 'application/at+jwt' media type in the 'typ' header parameter. The 'typ' value used SHOULD be 'at+jwt' (omitting the 'application/' prefix per RFC 7515 Section 4.1.9).
section: "2.1"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
