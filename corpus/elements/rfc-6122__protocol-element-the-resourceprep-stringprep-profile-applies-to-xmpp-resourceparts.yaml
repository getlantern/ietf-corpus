document: rfc-6122
kind: protocol-element
summary: The Resourceprep stringprep profile applies to XMPP resourceparts. It uses Unicode 3.2, maps via stringprep Table B.1 only (not B.2, unlike Nodeprep), normalizes to Unicode NFC-KC, and prohibits stringprep Tables C.1.2 through C.9 (but not C.1.1, allowing space characters).
section: B
