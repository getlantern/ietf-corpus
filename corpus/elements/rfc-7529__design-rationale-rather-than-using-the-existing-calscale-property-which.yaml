document: rfc-7529
kind: design-rationale
summary: Rather than using the existing CALSCALE property (which applies globally to all components), this specification keeps CALSCALE=GREGORIAN and adds RSCALE per-RRULE. This allows mixing events from different calendar systems in the same iCalendar object and avoids conflicts with VTIMEZONE components that inherently use Gregorian dates.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
