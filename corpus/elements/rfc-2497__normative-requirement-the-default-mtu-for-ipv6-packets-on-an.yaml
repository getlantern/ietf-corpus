document: rfc-2497
kind: normative-requirement
summary: The default MTU for IPv6 packets on an ARCnet network is 9072 octets. All ARCnet implementations on a given network should agree on this or a smaller value, as the theoretical maximum of 60480 octets has an impractical worst-case transmission time.
section: "3"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
