document: rfc-7233
kind: wire-format
summary: Byte ranges are expressed as 'bytes=byte-range-set', where each element is either a byte-range-spec ('first-byte-pos "-" [last-byte-pos]') or a suffix-byte-range-spec ('"-" suffix-length'). Byte offsets are zero-based and inclusive on both ends.
