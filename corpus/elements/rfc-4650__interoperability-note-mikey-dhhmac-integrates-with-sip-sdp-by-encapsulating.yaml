document: rfc-4650
kind: interoperability-note
summary: MIKEY-DHHMAC integrates with SIP/SDP by encapsulating MIKEY messages in SDP containers within the SDP offer/answer handshake (RFC 4567), and with H.323 by transport in H.225.0 fast start call signaling (SETUP and CallProceeding-to-CONNECT messages). For full-duplex H.323, two parallel DHHMAC runs are encapsulated in a single SETUP.
section: "2.1"
topics:
    - realtime
    - sip
