document: rfc-5669
kind: design-rationale
summary: SEED is a 128-bit symmetric block cipher with a 128-bit key developed by KISA in 1998, featuring a 16-round Feistel structure. It was designed to increase memory storage efficiency and key generation simplicity without degrading security, making it suitable for resource-constrained environments such as mobile devices and smart cards.
