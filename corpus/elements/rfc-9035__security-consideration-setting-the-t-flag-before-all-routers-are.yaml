document: rfc-9035
kind: security-consideration
summary: Setting the 'T' flag before all routers are upgraded may cause packet loss. The 'T' bit receives the same protection as the rest of the DODAG Configuration option; corrupting it is one of many attacks possible if an attacker can inject a corrupted configuration option into the network.
section: "7"
topics:
    - security
    - routing
