document: rfc-2218
kind: interoperability-note
summary: The IWPS schema is independent of any specific directory access protocol (WHOIS++, LDAP, DAP, etc.). Any technology deploying a White Pages service must publish a companion document specifying how the general IWPS attributes are expressed in that technology's schema.
section: "5.0"
topics:
    - ldap
