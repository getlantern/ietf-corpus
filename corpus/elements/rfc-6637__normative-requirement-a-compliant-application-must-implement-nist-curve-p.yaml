document: rfc-6637
kind: normative-requirement
summary: A compliant application MUST implement NIST curve P-256, SHOULD implement P-521, and MAY implement P-384. It MUST implement SHA2-256 and AES-128, SHOULD implement SHA2-384, SHA2-512, and AES-256.
section: "12.1"
rfc2119_level: MUST
topics:
