document: rfc-5661
kind: normative-requirement
summary: A server that determines a client holds no associated state (sessions, opens, locks, delegations, layouts, wants) MAY unilaterally release the client ID. If it does, it MUST ensure the client receives the appropriate error so it uses EXCHANGE_ID/CREATE_SESSION to establish a new client ID.
section: 2.4.2
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
