document: rfc-6578
kind: normative-requirement
summary: A member MUST be reported as removed if its mapping under the target collection has been removed and has not been remapped. If a member was added and then removed between two sync requests, it MUST be reported as removed.
section: 3.5.2
rfc2119_level: MUST
topics:
    - http
