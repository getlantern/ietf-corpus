document: rfc-4174
kind: wire-format
summary: 'The iSNS DHCP option (Code=83) carries: a Length field, a 16-bit iSNS Functions field, a 16-bit DD Access field, a 16-bit Administrative Flags field, a 32-bit iSNS Server Security Bitmap, and one or more 4-octet IPv4 addresses for primary, heartbeat, and secondary iSNS servers. All fields are in big-endian network byte order.'
