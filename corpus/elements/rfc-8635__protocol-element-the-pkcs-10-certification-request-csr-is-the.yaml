document: rfc-8635
kind: protocol-element
summary: The PKCS#10 certification request (CSR) is the primary artifact exchanged between the router/operator and the CA. It does not include the AS number or BGP Identifier; these must be transmitted separately by the operator when sending the CSR to the CA.
