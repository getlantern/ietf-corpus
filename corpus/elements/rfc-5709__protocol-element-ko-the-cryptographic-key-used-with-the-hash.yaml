document: rfc-5709
kind: protocol-element
summary: 'Ko (the cryptographic key used with the hash) is always L octets long: if K equals L octets, Ko = K; if K is longer than L, Ko = H(K); if K is shorter than L, Ko = K zero-padded to L octets.'
