document: rfc-1315
kind: protocol-element
summary: frDLCIStatusChange is an enterprise trap (enterprise frame-relay, trap number 1) carrying frCircuitIfIndex, frCircuitDlci, and frCircuitState. It fires when a virtual circuit is created, invalidated, or transitions between active and inactive states, serving as the Frame Relay analogue to the SNMP Link Up/Link Down traps.
section: "4"
topics:
