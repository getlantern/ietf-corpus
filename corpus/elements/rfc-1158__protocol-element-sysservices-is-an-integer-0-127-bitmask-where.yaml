document: rfc-1158
kind: protocol-element
summary: 'sysServices is an INTEGER (0..127) bitmask where bit L-1 is set if the entity performs transactions at OSI layer L: physical=1, datalink=2, internet=4, end-to-end=8, applications=64. A host offering application services has value 72 (2^3 + 2^6).'
