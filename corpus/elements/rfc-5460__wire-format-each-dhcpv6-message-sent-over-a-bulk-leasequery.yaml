document: rfc-5460
kind: wire-format
summary: Each DHCPv6 message sent over a Bulk Leasequery TCP connection is prefixed with a 2-octet message-size field in network byte order, followed by the standard DHCPv6 message (msg-type, transaction-id, options). The message-size field contains the count of octets in the following message.
section: "5.1"
topics:
