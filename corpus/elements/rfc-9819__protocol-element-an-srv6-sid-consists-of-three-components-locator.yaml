document: rfc-9819
kind: protocol-element
summary: 'An SRv6 SID consists of three components: Locator (LOC), Function (FUNC), and Argument (ARG). For SRv6 Endpoint Behaviors that support arguments, the SID may be signaled in two parts: the LOC:FUNC portion via one advertisement and the ARG value via a separate advertisement or mechanism. The source node is responsible for combining them into the complete LOC:FUNC:ARG SID used in the data plane.'
section: "2"
