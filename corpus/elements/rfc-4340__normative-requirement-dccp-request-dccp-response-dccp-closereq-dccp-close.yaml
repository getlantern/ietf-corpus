document: rfc-4340
kind: normative-requirement
summary: DCCP-Request, DCCP-Response, DCCP-CloseReq, DCCP-Close, DCCP-Reset, DCCP-Sync, and DCCP-SyncAck packets MUST set X to one (48-bit sequence numbers); endpoints MUST ignore any such packets received with X set to zero.
