document: rfc-1247
kind: normative-requirement
summary: Routing protocol packets should always be sent with the IP TOS field set to 0 and their IP precedence field set to Internetwork Control (per RFC 791). Routing packets should receive preferential treatment over data packets when being sent and received.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
