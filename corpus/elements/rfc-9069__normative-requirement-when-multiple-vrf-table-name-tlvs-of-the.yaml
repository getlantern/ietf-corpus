document: rfc-9069
kind: normative-requirement
summary: When multiple VRF/Table Name TLVs of the same type are included in the same message, their ordering MUST be preserved when reported. A BMP receiver should append multiple TLVs of the same type to a set to support alternate or additional names.
section: 5.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
