document: rfc-6482
kind: security-consideration
summary: The integrity of a ROA MUST be established. ROAs use the RPKI signed object format (RFC 6488) with CMS signed message structure, inheriting all security considerations from both. The ROA signer's right to authorize an AS is established through the address space and AS number PKI (RFC 6480).
section: "5"
rfc2119_level: MUST
topics:
    - security
    - routing
    - pkix
    - crypto
