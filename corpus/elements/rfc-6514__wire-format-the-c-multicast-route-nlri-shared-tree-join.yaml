document: rfc-6514
kind: wire-format
summary: The C-Multicast Route NLRI (Shared Tree Join and Source Tree Join) carries an 8-octet RD, 4-octet Source AS, 1-octet Multicast Source Length, variable Multicast Source, 1-octet Multicast Group Length, and variable Multicast Group. For Shared Tree Join, Multicast Source contains the C-RP address; for Source Tree Join, the C-S address.
section: "4.6"
topics:
