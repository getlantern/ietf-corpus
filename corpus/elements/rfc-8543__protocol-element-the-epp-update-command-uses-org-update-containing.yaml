document: rfc-8543
kind: protocol-element
summary: The EPP <update> command uses <org:update> containing the organization id, optional <org:add> and <org:rem> elements (for contacts, roles, and statuses), and an optional <org:chg> element (for parentId, postalInfo, voice, fax, email, url). At least one of add, rem, or chg MUST be provided unless an update extension is present.
section: 4.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
