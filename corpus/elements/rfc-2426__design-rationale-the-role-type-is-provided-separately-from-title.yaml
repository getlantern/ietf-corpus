document: rfc-2426
kind: design-rationale
summary: 'The ROLE type is provided separately from TITLE to avoid confusion: ROLE captures business category or occupation (based on X.520 Business Category), while TITLE captures job title or functional position (based on X.520 Title). Conflating them would lead to incorrect usage.'
section: 3.5.2
