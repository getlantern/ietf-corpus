document: rfc-3339
kind: protocol-element
summary: Leap seconds are represented by setting time-second to "60" (e.g., 1990-12-31T23:59:60Z). A leap second occurs simultaneously in all time zones; in non-Z zones the leap second point is shifted by the zone offset.
section: "5.7"
