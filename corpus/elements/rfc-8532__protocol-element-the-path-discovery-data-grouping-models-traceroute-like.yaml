document: rfc-8532
kind: protocol-element
summary: 'The ''path-discovery-data'' grouping models traceroute-like output: src-test-point and dest-test-point (using tp-address-ni), sequence-number (uint64, default 0), hop-cnt (uint8, default 0), packet/error/delay/jitter statistics, a path-verification container, and a ''path-trace-info-list'' with per-hop data including timestamp, ingress/egress interface names, queue-depth (uint32), transit-delay (uint32 nanoseconds), and app-meta-data (uint64).'
section: "3.6"
topics:
