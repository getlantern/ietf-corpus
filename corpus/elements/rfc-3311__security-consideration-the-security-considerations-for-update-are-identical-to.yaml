document: rfc-3311
kind: security-consideration
summary: The security considerations for UPDATE are identical to those for re-INVITE. UPDATE MUST be integrity protected and authenticated as coming from the same source as the entity on the other end of the dialog; RFC 3261 mechanisms apply.
