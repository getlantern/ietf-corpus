document: rfc-8692
kind: normative-requirement
summary: 'The parameters for all four algorithm identifiers (id-RSASSA-PSS-SHAKE128, id-RSASSA-PSS-SHAKE256, id-ecdsa-with-shake128, id-ecdsa-with-shake256) MUST be absent. The AlgorithmIdentifier SHALL be a SEQUENCE of one component: the OID.'
section: "3"
rfc2119_level: MUST
