document: rfc-2019
kind: normative-requirement
summary: The address token for an FDDI interface for stateless autoconfiguration is the interface's built-in 48-bit IEEE 802 address in canonical bit order. A manually or software-set MAC address should not be used as the address token.
section: Stateless Autoconfiguration and Link-Local Addresses
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
