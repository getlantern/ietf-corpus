document: rfc-5663
kind: wire-format
summary: 'The pnfs_block_layoutupdate4 structure is the block-layout-specific LAYOUTCOMMIT argument, containing blu_commit_list: an array of pnfs_block_extent4 entries covering file regions previously in PNFS_BLOCK_INVALID_DATA state that have been written. All extents MUST have bex_state set to PNFS_BLOCK_READ_WRITE_DATA; bex_storage_offset is unused.'
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
