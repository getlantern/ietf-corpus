document: rfc-1755
kind: normative-requirement
summary: LLC/SNAP encapsulation MUST be implemented by all endstations as the default encapsulation per RFC 1577, and MUST be signaled in the B-LLI IE. Only LLC is indicated in the B-LLI; it is the LLC layer's responsibility to inspect the encapsulation header of subsequent packets.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
