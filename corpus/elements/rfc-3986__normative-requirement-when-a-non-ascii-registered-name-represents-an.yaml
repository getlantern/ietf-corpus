document: rfc-3986
kind: normative-requirement
summary: When a non-ASCII registered name represents an internationalized domain name intended for DNS resolution, the name MUST be transformed to the IDNA encoding (RFC 3490) prior to name lookup. URI producers SHOULD provide such names in IDNA encoding rather than percent-encoding to maximize interoperability with legacy resolvers.
section: 3.2.2
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
