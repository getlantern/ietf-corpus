document: rfc-4250
kind: protocol-element
summary: A local name extension mechanism uses the format 'name@domainname', where the part following '@' MUST be a valid, fully qualified internet domain name controlled by the defining party. IANA does not register or control names containing '@'. Names MUST have only a single '@' sign and MUST NOT exceed 64 characters.
section: 4.6.1
topics:
    - registry
    - security
