document: rfc-2470
kind: normative-requirement
summary: In the absence of any other information, an implementation should use a default MTU of 1500 octets. This size offers compatibility with all common 802.5 defaults and with Ethernet LANs in environments using transparent bridging.
section: "2"
rfc2119_level: SHOULD
topics:
