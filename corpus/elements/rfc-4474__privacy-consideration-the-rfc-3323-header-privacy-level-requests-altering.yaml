document: rfc-4474
kind: privacy-consideration
summary: The RFC 3323 'header' privacy level requests altering the Contact header, but Contact is protected by the Identity signature. Privacy services therefore cannot be applied after authentication services without causing an integrity violation.
section: "12"
topics:
    - sip
    - privacy
    - security
