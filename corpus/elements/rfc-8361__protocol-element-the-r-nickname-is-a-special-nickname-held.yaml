document: rfc-8361
kind: protocol-element
summary: The R-nickname is a special nickname held by a centralized replication node used as the egress nickname in the unicast TRILL header for BUM traffic. It differentiates centralized replication unicast TRILL encapsulation from normal unicast TRILL encapsulation. A centralized node may hold multiple R-nicknames to support load-balancing.
section: "3"
topics:
    - routing
