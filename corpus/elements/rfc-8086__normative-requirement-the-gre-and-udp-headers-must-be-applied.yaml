document: rfc-8086
kind: normative-requirement
summary: The GRE and UDP headers MUST be applied and removed as a pair at the encapsulation and decapsulation points. This specification does not support applying or removing either header at a node other than the UDP tunnel ingress or egress.
section: "3.3"
rfc2119_level: MUST
topics:
    - udp
