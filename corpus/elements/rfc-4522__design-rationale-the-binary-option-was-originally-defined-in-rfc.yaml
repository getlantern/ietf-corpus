document: rfc-4522
kind: design-rationale
summary: The binary option was originally defined in RFC 2251 but was removed from the revised LDAP technical specification (RFC 4510) due to implementation inconsistencies. RFC 4522 reintroduces it only for attribute syntaxes that specifically require it (e.g., certificate syntax), without attempting to resolve the known inconsistencies from the original definition.
section: "1"
topics:
    - ldap
