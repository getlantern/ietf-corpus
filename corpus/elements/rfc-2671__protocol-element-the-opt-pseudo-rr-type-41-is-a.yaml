document: rfc-2671
kind: protocol-element
summary: The OPT pseudo-RR (type 41) is a special resource record that can appear in the additional data section of a DNS request or response. It is not a real DNS record — it carries per-transaction transport metadata and is never cached, forwarded, or stored in zone files.
section: "4.1"
topics:
    - dns
