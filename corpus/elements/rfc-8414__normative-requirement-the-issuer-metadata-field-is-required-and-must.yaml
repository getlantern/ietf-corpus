document: rfc-8414
kind: normative-requirement
summary: The 'issuer' metadata field is REQUIRED and must be a URL using the 'https' scheme with no query or fragment components. The 'response_types_supported' field is also REQUIRED as a JSON array of OAuth 2.0 response_type values.
