document: rfc-5990
kind: normative-requirement
summary: If a recipient wishes to restrict a public key to RSA-KEM use only, the certificate MUST identify the public key using id-rsa-kem. When id-rsa-kem appears in SubjectPublicKeyInfo.algorithm, the parameters field SHALL be omitted, making the AlgorithmIdentifier a SEQUENCE of one component.
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
