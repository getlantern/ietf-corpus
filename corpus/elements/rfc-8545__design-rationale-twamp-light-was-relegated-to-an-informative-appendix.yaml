summary: TWAMP Light was relegated to an informative appendix in RFC 5357 because it lacked specifications for negotiating which variant of TWAMP would be used (raised by Lars Eggert AD review) and lacked mandatory-to-implement security features — specifically, the key for authenticated/encrypted modes depended on the TWAMP-Control session key (raised by Tim Polk ballot discuss).
