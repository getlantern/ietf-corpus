document: rfc-8030
kind: design-rationale
summary: Consolidating all real-time events into a single push service session reduces unnecessary radio usage on mobile devices; uncoordinated use of persistent connections from multiple apps incurs duplicated keep-alive overhead that dominates over the infrequent actual events.
