document: rfc-3846
kind: protocol-element
summary: The NAI Carrying Extension (type 136, skippable) may be used in Mobile IP Registration Request and Reply messages, and in Mobile IP Agent Advertisements. It carries identity information in the form of a Network Access Identifier (NAI) and uses a sub-type field to distinguish the specific kind of NAI being carried.
