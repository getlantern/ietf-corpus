document: rfc-9790
kind: protocol-element
summary: A Post-Stack Header (PSH) is a field between the label stack and the embedded packet containing information of interest to egress or transit LSRs. Examples include pseudowire control words (RFC 4385), DetNet control words (RFC 8964), associated channel headers (RFC 5586, RFC 9546), BIER headers (RFC 8296), and NSH (RFC 8300). Any MPLS packet not carrying plain IPv4 or IPv6 contains a PSH.
section: "1.2"
topics:
    - mpls
