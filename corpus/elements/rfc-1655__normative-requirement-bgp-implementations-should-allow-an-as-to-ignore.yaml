document: rfc-1655
kind: normative-requirement
summary: BGP implementations should allow an AS to ignore routes containing certain AS's in the AS_PATH attribute, implemented by assigning 'infinity' as the weight for such AS's; route selection must ignore routes with weight equal to infinity.
section: "7"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
