document: rfc-8040
kind: normative-requirement
summary: If a leaf or leaf-list is missing from the configuration and a YANG-defined default exists, the server MUST use the YANG-defined default. When a GET targets such an uninstantiated leaf or leaf-list, the server MUST return the default value, ignoring its 'basic-mode' setting.
section: 3.5.4
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
