document: rfc-9196
kind: security-consideration
summary: NETCONF access to capability data MUST use SSH (RFC 6242) as the mandatory-to-implement secure transport; RESTCONF MUST use HTTPS with TLS (RFC 8446). NACM (RFC 8341) provides access control to restrict which users can read capability data.
section: "6"
topics:
    - yang
    - netconf
    - security
