document: rfc-2846
kind: normative-requirement
summary: When multiple subaddresses are present for the same global-phone, the use of multiple pstn-email elements is REQUIRED. The UA MAY accept multiple subaddress elements, but MUST generate multiple pstn-mbox elements when submitting the message to the MTA.
section: "4"
rfc2119_level: REQUIRED
topics:
    - email
