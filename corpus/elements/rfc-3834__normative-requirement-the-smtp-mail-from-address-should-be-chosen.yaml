document: rfc-3834
kind: normative-requirement
summary: The SMTP MAIL FROM address SHOULD be chosen to make mail loops unlikely; a MAIL FROM of <> MAY be used. The NOTIFY=NEVER parameter of the RCPT command is RECOMMENDED if the SMTP server supports DSN.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - email
