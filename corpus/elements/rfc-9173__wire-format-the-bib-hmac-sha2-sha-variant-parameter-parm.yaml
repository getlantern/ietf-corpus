document: rfc-9173
kind: wire-format
summary: The BIB-HMAC-SHA2 SHA Variant parameter (Parm Id 1) is a CBOR unsigned integer. Valid values are 5 (HMAC 256/256), 6 (HMAC 384/384), and 7 (HMAC 512/512), matching RFC 8152 Table 7. Default is 6 when not provided.
