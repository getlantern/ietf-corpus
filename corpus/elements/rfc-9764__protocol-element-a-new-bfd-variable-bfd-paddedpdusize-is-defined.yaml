document: rfc-9764
kind: protocol-element
summary: 'A new BFD variable bfd.PaddedPduSize is defined: the BFD transport protocol payload size (in bytes) is increased to this value. The minimum size MUST NOT be smaller than 24 or 26 bytes as permitted by BFD procedure. The contents of the additional payload MUST be zero.'
section: "3"
topics:
    - routing
    - security
