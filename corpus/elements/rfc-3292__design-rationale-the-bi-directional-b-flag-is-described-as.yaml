document: rfc-3292
kind: design-rationale
summary: 'The Bi-directional B flag is described as a pure convenience: it is equivalent to two Add Branch messages in opposite directions and is provided only to reduce control traffic. All subsequent operations on the two resulting unidirectional connections MUST be performed separately, and there is no bi-directional delete command.'
section: "4.2"
topics:
    - mpls
