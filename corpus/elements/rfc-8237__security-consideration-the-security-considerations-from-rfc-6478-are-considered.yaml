document: rfc-8237
kind: security-consideration
summary: The security considerations from RFC 6478 are considered adequate because the operating environment is nearly identical. Since this protocol is deployed between two adjacent PEs on a physical link, misdirecting or injecting traffic requires compromising the PW transport link itself.
section: "7"
