document: rfc-5189
kind: design-rationale
summary: The PRR transaction exists to handle scenarios—such as SIP-signaled calls—where an application needs to know the NAT-allocated external address before it has enough information to issue a full PER request. Without PRR, such applications could not convey the external address in their signaling prior to enabling the data flow.
section: 2.3.1
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
