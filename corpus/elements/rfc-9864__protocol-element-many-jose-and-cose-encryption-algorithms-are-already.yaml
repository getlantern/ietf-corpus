document: rfc-9864
kind: protocol-element
summary: 'Many JOSE and COSE encryption algorithms are already fully specified: all symmetric encryption algorithms (e.g., A128GCM), all key-wrapping algorithms (e.g., A128KW), AES-GCM key wrapping, ''dir''/''direct'', COSE direct+HKDF algorithms, and JOSE PBES2 key encryption algorithms. These do not require replacements.'
