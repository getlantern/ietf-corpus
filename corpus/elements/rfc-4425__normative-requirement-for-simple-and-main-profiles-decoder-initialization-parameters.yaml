document: rfc-4425
kind: normative-requirement
summary: For Simple and Main profiles, decoder initialization parameters MUST be conveyed out-of-band. When this RTP payload format is used with SDP, the decoder initialization parameters MUST be signaled in SDP using the media type parameters specified in section 6.1.
