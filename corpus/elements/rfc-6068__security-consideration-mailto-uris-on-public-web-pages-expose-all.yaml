document: rfc-6068
kind: security-consideration
summary: '''mailto'' URIs on public web pages expose all included mail addresses (including bcc hfvalues) to harvesting. Addresses in a "bcc" hfvalue are still publicly visible in the URI even though not sent to ''to'' recipients.'
section: "7"
topics:
