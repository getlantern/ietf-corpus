document: rfc-8497
kind: security-consideration
summary: A 'log me' marker may cause SIP entities to log the full SIP header and body of requests and responses, creating a risk that logged data is exposed to unauthorized parties. Administrators MUST remove the marker at network boundaries where no inter-operator agreement exists.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
