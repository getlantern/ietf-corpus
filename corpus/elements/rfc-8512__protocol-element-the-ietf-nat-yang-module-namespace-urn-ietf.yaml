document: rfc-8512
kind: protocol-element
summary: The ietf-nat YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-nat, prefix nat, revision 2019-01-10) provides a data model covering NAT44, NAPT, NAT64, CLAT, SIIT, EAM, NPTv6, and Destination NAT. Translation modes are gated by YANG feature statements so only relevant data nodes are instantiated per device.
