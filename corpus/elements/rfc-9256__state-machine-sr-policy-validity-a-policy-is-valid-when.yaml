document: rfc-9256
kind: state-machine
summary: 'SR Policy validity: a policy is valid when it has at least one valid candidate path. Upon transition to invalid state, the SR Policy and its BSID are removed from the forwarding plane and all steered traffic falls back to classic forwarding. The Drop-upon-Invalid behavior optionally keeps the policy in the forwarding plane with a drop action instead.'
section: "8.1"
topics:
    - routing
    - mpls
