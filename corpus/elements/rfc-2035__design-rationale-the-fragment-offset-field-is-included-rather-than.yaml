document: rfc-2035
kind: design-rationale
summary: The Fragment Offset field is included (rather than relying solely on RTP sequence numbers and marker bit) to enable efficient single-copy reassembly with misordered packets, and to detect a lost final packet (marker bit) from the previous frame.
