document: rfc-7773
kind: security-consideration
summary: A relying party must understand the certificate policy under which the CA operates to determine whether a given certificate's authentication context provides a level of assurance higher than the minimum. Absent this understanding, the relying party must assume the lowest assurance level.
section: "4"
