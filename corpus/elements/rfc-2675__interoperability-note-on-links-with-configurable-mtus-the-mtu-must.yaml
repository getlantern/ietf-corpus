document: rfc-2675
kind: interoperability-note
summary: On links with configurable MTUs, the MTU must not be configured to a value greater than 65,575 octets if nodes attached to that link do not support the Jumbo Payload option and it cannot be guaranteed that jumbograms will not be sent to those nodes.
