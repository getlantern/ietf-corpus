document: rfc-5760
kind: normative-requirement
summary: A Distribution Source MUST NOT report jitter distribution values for at least 2 reporting intervals after a payload type change occurs, because timestamp units are payload-type specific and jitter comparisons across payload types are not meaningful.
section: 7.1.5
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
