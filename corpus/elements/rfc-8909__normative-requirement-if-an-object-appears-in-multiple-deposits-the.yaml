document: rfc-8909
kind: normative-requirement
summary: If an object appears in multiple deposits, the registry data from the deposit with the latest Timeline Watermark SHOULD be used. An object SHOULD NOT exist multiple times in either <contents> or <deletes> within a single deposit.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - registry
