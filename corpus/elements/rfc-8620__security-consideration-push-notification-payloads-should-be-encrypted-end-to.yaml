document: rfc-8620
kind: security-consideration
summary: Push notification payloads SHOULD be encrypted end-to-end using Web Push encryption (RFC 8291 / RFC 8188) via the 'keys' property of PushSubscription, since the JMAP server cannot guarantee the confidentiality of the push delivery channel to the client.
section: "8.7"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
