document: rfc-5496
kind: design-rationale
summary: The restriction on sending Vector Attributes to Assert-winner neighbors exists because the Assert winner may not know the path to the Vector. In the worst case, the Assert winner's route to the Vector exits on the same interface where the Assert was won, which would make the RPF interface point back to that interface and result in an empty outgoing interface list.
section: 3.3.3
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
