document: rfc-2787
kind: protocol-element
summary: vrrpOperPrimaryIpAddr specifies which of a multi-address interface's IP addresses becomes vrrpOperMasterIpAddr upon backup-to-master transition. If set to 0.0.0.0 (default), the numerically lowest IP address is selected.
