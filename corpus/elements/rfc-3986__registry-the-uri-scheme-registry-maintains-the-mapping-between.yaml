document: rfc-3986
kind: registry
summary: The URI scheme registry maintains the mapping between scheme names and their specifications. Registration of new URI schemes is defined by BCP35; advice for scheme designers is in RFC 2718. This document does not itself create or update the registry but delegates all scheme-specific syntax to individual scheme specifications.
section: "3.1"
topics:
    - http
    - registry
