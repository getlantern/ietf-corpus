document: rfc-4314
kind: interoperability-note
summary: Negative rights (identifiers starting with '-') allow removal of rights from a specific identifier even if granted via another ACL entry. Server implementations are not required to support negative right identifiers, and DELETEACL does not affect negative right entries.
