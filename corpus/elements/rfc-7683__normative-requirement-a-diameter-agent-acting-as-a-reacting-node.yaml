document: rfc-7683
kind: normative-requirement
summary: A Diameter Agent acting as a reacting node for a non-supporting endpoint MUST insert the OC-Supported-Features AVP into forwarded requests that do not already contain one, and MUST have visibility to all traffic destined for a non-supporting host before acting as its reporting node.
section: 5.1.3
rfc2119_level: MUST
topics:
