document: rfc-1885
kind: normative-requirement
summary: When sending an ICMPv6 message in response to a unicast packet sent to one of the node's addresses, the source address of the reply MUST be that same address. For responses to multicast or anycast packets, the source address MUST be a unicast address on the interface that received the packet.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
