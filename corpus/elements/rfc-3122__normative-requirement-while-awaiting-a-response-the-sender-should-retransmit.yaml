document: rfc-3122
kind: normative-requirement
summary: While awaiting a response, the sender SHOULD retransmit IND Solicitation messages approximately every RetransTimer interval. Retransmissions MUST be rate-limited to at most one solicitation per neighbor every RetransTimer.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
