document: rfc-2431
kind: registry
summary: The 4-bit Type field in the BT.656 RTP payload header defines up to 16 encoding types, of which 4 are currently assigned and 12 are reserved. New type assignments require IANA review by a Designated Expert; applications must include requestor information, rationale, standards references, and any security implications.
