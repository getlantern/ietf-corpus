document: rfc-2932
kind: security-consideration
summary: Unauthorized SET access to the write-able objects in this MIB (such as multicast boundary configuration) could cause denial of service or enable wider distribution of packets intended only for local delivery. SNMPv1 alone provides no access control, making it an insecure environment for managing these objects.
section: "6"
topics:
    - security
    - multicast
    - snmp
