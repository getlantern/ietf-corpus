document: rfc-7519
kind: protocol-element
summary: The "nbf" (not before) claim identifies the time before which the JWT MUST NOT be accepted. Its value MUST be a NumericDate. Implementers MAY allow a small clock-skew leeway. Use is OPTIONAL.
section: 4.1.5
topics:
