document: rfc-4070
kind: design-rationale
summary: The MIB is structured as an optional extension to RFC 3728 (VDSL-LINE-MIB) rather than a standalone MIB, separating line-code-independent (TC layer) objects from MCM-specific (PMD layer) objects to allow agents that do not support MCM to remain compliant.
