document: rfc-7700
kind: normative-requirement
summary: An entity preparing a nickname string MUST ensure the string consists only of Unicode code points conforming to the PRECIS FreeformClass (RFC 7564) and MUST ensure the string is encoded as UTF-8 (RFC 3629).
section: "2.2"
rfc2119_level: MUST
