document: rfc-7267
kind: normative-requirement
summary: PSN tunnel failures MUST be handled by PSN mechanisms such as MPLS fast reroute. A T-PE receiving an unsolicited Label Release with a failure code MUST throttle PW setup retry attempts using exponential backoff.
section: "5.1"
rfc2119_level: MUST
topics:
