document: rfc-8628
kind: protocol-element
summary: 'The device authorization response is a JSON object (HTTP 200) containing: ''device_code'' (REQUIRED), ''user_code'' (REQUIRED), ''verification_uri'' (REQUIRED, short and memorable), ''verification_uri_complete'' (OPTIONAL, includes user_code for non-textual transmission), ''expires_in'' (REQUIRED, lifetime in seconds), and ''interval'' (OPTIONAL, minimum polling interval in seconds).'
section: "3.2"
