document: rfc-9391
kind: protocol-element
summary: The RuleID field size for SCHC over NB-IoT may range from 2 bits (4 rules) to 8 bits (256 rules); the maximum 256-rule limit is considered reasonable even for devices acting as NATs, and the size may be negotiated dynamically before context delivery.
