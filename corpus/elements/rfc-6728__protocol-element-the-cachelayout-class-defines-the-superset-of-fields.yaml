document: rfc-6728
kind: protocol-element
summary: The CacheLayout class defines the superset of fields in Packet Reports or Flow Records via one or more CacheField objects. Each CacheField specifies an Information Element by ieId or ieName plus ieEnterpriseNumber (default 0 for IANA-registered IEs), an optional ieLength (65535 for variable-length), and an optional isFlowKey flag unavailable on ImmediateCache.
