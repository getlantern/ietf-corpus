document: rfc-2961
kind: normative-requirement
summary: The Message_Identifier MUST be unique per generator IP address. For trigger messages the Message_Identifier MUST exceed every previously used value with the same Epoch. The Epoch value MUST NOT be changed except on node or RSVP agent restart.
section: "4.2"
rfc2119_level: MUST
topics:
    - qos
