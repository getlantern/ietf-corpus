document: rfc-8635
kind: security-consideration
summary: Operators must track certificate expiry times and renew certificates at least one week before the notAfter date. Multiple operators should be notified as expiry approaches to prevent a single operator's forgetfulness from affecting the organization's BGPsec operation.
section: 10.1, Appendix B
topics:
    - bgp
    - pkix
    - security
