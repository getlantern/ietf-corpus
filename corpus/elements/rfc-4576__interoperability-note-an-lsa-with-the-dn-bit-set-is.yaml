document: rfc-4576
kind: interoperability-note
summary: An LSA with the DN bit set is still put in the topological database, aged, flooded, and otherwise handled normally — the DN bit has no effect on LSA handling other than excluding the LSA from the OSPF route calculation on PE routers.
