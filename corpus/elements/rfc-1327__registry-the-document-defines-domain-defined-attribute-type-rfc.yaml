document: rfc-1327
kind: registry
summary: The document defines Domain Defined Attribute type 'RFC-822' to be registered at IANA as an accepted DDA type for encoding RFC 822 addresses within X.400 O/R Addresses. Additional continuation DDA keywords RFC822C1, RFC822C2, and RFC822C3 extend the encoding for addresses up to 512 characters.
