document: rfc-8054
kind: normative-requirement
summary: When compression is active and either the client or server receives invalid or corrupted compressed data, the receiving end immediately closes the connection, in response to which the sending end will do the same.
section: 2.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
