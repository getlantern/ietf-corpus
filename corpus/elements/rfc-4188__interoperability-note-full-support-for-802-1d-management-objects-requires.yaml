summary: Full support for 802.1D management objects requires that SNMPv2-MIB objects sysDescr and sysUpTime, and IF-MIB objects ifIndex, ifType, ifDescr, ifPhysAddress, and ifLastChange are implemented alongside the BRIDGE-MIB.
