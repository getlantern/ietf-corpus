document: rfc-2043
kind: normative-requirement
summary: For SNACP, only Codes 1 through 7 (Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, and Code-Reject) are used. Other Codes should be treated as unrecognized and should result in Code-Rejects.
section: "2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
