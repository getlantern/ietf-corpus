document: rfc-6989
kind: interoperability-note
summary: Existing IKEv2/ECDH implementations that do not reuse DH keys may optionally adopt the EC public key validity tests as sanity checks to prevent the implementation from having to handle inputs it was not designed for, without being required to do so.
