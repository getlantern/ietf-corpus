document: rfc-9173
kind: normative-requirement
summary: A constant-time comparison function SHOULD be used for comparing authentication tags during BIB-HMAC-SHA2 keyed hash verification to prevent timing side-channel attacks where an attacker could guess HMAC tags by observing verifier behavior.
section: "3.6"
rfc2119_level: SHOULD
