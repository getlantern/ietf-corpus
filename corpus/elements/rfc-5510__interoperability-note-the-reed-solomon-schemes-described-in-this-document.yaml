document: rfc-5510
kind: interoperability-note
summary: The Reed-Solomon schemes described in this document are designed to be compatible with the implementation from Luigi Rizzo (RS-codec). The generator matrix construction using a Vandermonde matrix in systematic form matches the Rizzo codec, enabling interoperability with widely deployed existing implementations.
