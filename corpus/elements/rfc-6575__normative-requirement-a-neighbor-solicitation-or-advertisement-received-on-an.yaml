document: rfc-6575
kind: normative-requirement
summary: A Neighbor Solicitation or Advertisement received on an AC from a local CE MUST be forwarded over the pseudowire unmodified. When received over the PW, if a source link-layer address option is present, the PE MUST remove it before forwarding to the local CE.
section: 4.3.3
rfc2119_level: MUST
topics:
    - vpn
    - ip
