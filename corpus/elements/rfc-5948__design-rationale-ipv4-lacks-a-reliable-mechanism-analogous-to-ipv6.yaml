document: rfc-5948
kind: design-rationale
summary: IPv4 lacks a reliable mechanism analogous to IPv6 Neighbor Discovery MTU options for advertising link MTU to hosts. Legacy IPv4 clients do not determine link MTU before sending packets, and DHCP servers only provide MTU information when explicitly requested, making MTU misconfiguration a significant practical concern.
section: "4.3"
topics:
    - ip
