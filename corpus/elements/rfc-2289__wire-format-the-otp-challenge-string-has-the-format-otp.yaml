document: rfc-2289
kind: wire-format
summary: The OTP challenge string has the format 'otp-<alg> <seq> <seed>' where alg is one of 'md4', 'md5', or 'sha1'; seq is the sequence integer; and seed is 1–16 alphanumeric characters. Tokens are separated by whitespace and the string is terminated by a space or newline.
