document: rfc-6076
kind: design-rationale
summary: Authentication duration (including external authentication methods such as SIP Digest) is intentionally included in all metric measurements because of its inherent impact on the protocol and on subsequent SIP dialogs. This means metrics reflect real-world performance including authentication overhead.
section: "5.3"
topics:
    - realtime
    - voip
    - measurement
