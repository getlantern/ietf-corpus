document: rfc-7003
kind: normative-requirement
summary: Receivers MUST verify that the Measurement Information Block is received in the same compound RTCP packet as the Burst/Gap Discard Metrics Block. If not, the metrics block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
