document: rfc-4623
kind: protocol-element
summary: The MRU (Maximum Receive Unit) AVP, attribute number 94, advertises the maximum size in octets of a fragmented or complete PW frame including L2TP encapsulation but excluding the PSN header. It does not by itself imply reassembly support.
section: "5.3"
