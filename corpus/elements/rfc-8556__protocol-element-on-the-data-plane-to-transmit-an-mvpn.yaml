document: rfc-8556
kind: protocol-element
summary: On the data plane, to transmit an MVPN packet via BIER, the ingress PE (BFIR) pushes the upstream-assigned MPLS label from the matching x-PMSI A-D route's PTA onto the packet's label stack, then encapsulates the packet in a BIER header, forwarding per RFC 8279 and RFC 8296 procedures.
section: "4.1"
topics:
    - multicast
    - mpls
    - routing
