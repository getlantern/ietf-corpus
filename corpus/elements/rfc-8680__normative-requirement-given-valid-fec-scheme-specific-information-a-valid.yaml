document: rfc-8680
kind: normative-requirement
summary: Given valid FEC-Scheme-Specific Information, a valid Repair FEC Payload ID, a valid packet payload size, and a valid encoding window, the FEC scheme specification MUST uniquely define the values of the encoding symbol(s) to be included in the repair packet payload with that Repair FEC Payload ID.
section: "5.3"
rfc2119_level: MUST
topics:
