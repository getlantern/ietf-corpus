document: rfc-8288
kind: normative-requirement
summary: When extension relation types are compared, they MUST be compared as strings in a case-insensitive fashion, character by character. Clients SHOULD NOT automatically access the URI of an extension relation type to avoid overburdening its server.
section: 2.1.2
rfc2119_level: MUST
topics:
    - http
