document: rfc-3478
kind: design-rationale
summary: 'The mechanism makes minimalistic assumptions: only the actual MPLS forwarding state (incoming label to outgoing label/next-hop mappings) must be preserved across restart; no LDP-related state needs to be preserved. This is the minimum required not to perturb LSPs traversing a restarting LSR.'
