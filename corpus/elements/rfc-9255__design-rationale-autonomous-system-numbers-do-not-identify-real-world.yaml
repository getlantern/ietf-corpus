document: rfc-9255
kind: design-rationale
summary: Autonomous System Numbers do not identify real-world entities — they are identifiers used only for loop detection in routing and have no inherent semantics beyond uniqueness. Using AS numbers as identity anchors is therefore meaningless.
section: "3"
topics:
