document: rfc-8881
kind: security-consideration
summary: The security strength of NFSv4.1 deployments depends on the underlying Kerberos V5 infrastructure. The cryptographic algorithms of Kerberos V5 are not directly selectable by client or server, requiring deployers to perform due diligence to ensure acceptable security for their environment.
section: 2.2.1.1.1.2.1.1
topics:
