document: rfc-3513
kind: wire-format
summary: The preferred text representation of an IPv6 address is x:x:x:x:x:x:x:x, where each x is a hexadecimal value of a 16-bit piece. Leading zeros in each field may be omitted, but at least one numeral must appear per field. The '::' notation may appear once to compress one or more groups of 16 zero bits.
section: "2.2"
topics:
    - ip
    - v6ops
