document: rfc-7580
kind: normative-requirement
summary: When new sub-TLVs or their encodings are malformed, the proper action is to log the problem and ignore just the malformed sub-TLVs in GMPLS path computations, rather than ignoring the entire LSA.
section: "5.2"
rfc2119_level: SHOULD
topics:
