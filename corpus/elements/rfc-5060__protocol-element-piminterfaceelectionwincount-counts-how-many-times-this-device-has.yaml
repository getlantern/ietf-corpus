document: rfc-5060
kind: protocol-element
summary: pimInterfaceElectionWinCount counts how many times this device has been elected DR or DF on any interface. Notably, the counter is not incremented for elections until after the first periodic Hello is sent on the interface, to avoid inflating counts during initial neighbor discovery.
section: "5"
topics:
