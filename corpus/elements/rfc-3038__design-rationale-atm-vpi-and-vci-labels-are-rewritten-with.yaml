document: rfc-3038
kind: design-rationale
summary: ATM VPI and VCI labels are rewritten with new values at every switch node through which a VC passes and cannot provide end-to-end identification of a VC. The VCID concept was introduced so that LDP mapping messages can carry a stable VC identifier that has the same value at both ends of the VC.
