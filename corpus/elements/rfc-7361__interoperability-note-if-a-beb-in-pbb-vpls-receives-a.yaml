document: rfc-7361
kind: interoperability-note
summary: If a BEB in PBB-VPLS receives a MAC Flush Parameters TLV it does not understand, undesirable MAC flushing may result. The U-bit and F-bit are both set to 1 so that intermediate devices unaware of the TLV propagate it transparently rather than dropping it.
section: 5.2.2
topics:
    - mpls
