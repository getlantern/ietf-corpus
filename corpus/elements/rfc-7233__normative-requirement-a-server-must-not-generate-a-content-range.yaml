document: rfc-7233
kind: normative-requirement
summary: A server MUST NOT generate a Content-Range header field in the HTTP header section of a multiple-part 206 response (it must appear in each part instead), and MUST NOT generate a multipart response to a request for a single range.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - http
