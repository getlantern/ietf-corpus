document: rfc-9946
kind: security-consideration
summary: Requests with an invalid authDigest SHOULD fail silently (no response) to prevent enumeration; exceptions are permitted only for operator troubleshooting. Fixed-rate testing, which bypasses congestion control, is restricted to intra-domain operator use to prevent traffic starvation on shared paths.
section: "11"
topics:
