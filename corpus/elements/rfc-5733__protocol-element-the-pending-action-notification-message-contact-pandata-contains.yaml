summary: 'The pending-action notification message <contact:panData> contains: <contact:id> with a boolean ''paResult'' attribute (approved=true, denied=false), <contact:paTRID> with the original transaction IDs (client TRID is optional), and <contact:paDate> with the review completion timestamp.'
