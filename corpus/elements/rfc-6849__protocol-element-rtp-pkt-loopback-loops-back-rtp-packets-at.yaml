document: rfc-6849
kind: protocol-element
summary: '''rtp-pkt-loopback'' loops back RTP packets at a point before the encoder/decoder in the receive direction; encoding-related functions such as PLC MUST NOT be applied. Packets are returned with a new payload type using either the encapsulated or direct loopback format defined in Section 7.'
section: "4.1"
topics:
    - rtp
    - realtime
