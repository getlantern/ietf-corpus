document: rfc-5198
kind: interoperability-note
summary: Applications typically rely on OS or language library functions for Unicode conversion and normalization; there may be no plausible way for an application to know which Unicode version or normalization procedure it is using, nor to guarantee consistency between the two.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
