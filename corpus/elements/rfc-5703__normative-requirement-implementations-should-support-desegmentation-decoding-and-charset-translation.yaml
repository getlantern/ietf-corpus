document: rfc-5703
kind: normative-requirement
summary: Implementations SHOULD support desegmentation, decoding, and charset translation of parameter values encoded per RFC 2231 as part of the ':mime' header test. Implementations MAY also decode RFC 2047-encoded words in parameter values.
