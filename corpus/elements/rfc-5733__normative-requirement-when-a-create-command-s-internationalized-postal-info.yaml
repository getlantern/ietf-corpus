document: rfc-5733
kind: normative-requirement
summary: When a <create> command's internationalized postal info form (type='int') is provided, element content MUST be represented in a subset of UTF-8 that can be represented in the 7-bit US-ASCII character set. The localized form (type='loc') MAY use unrestricted UTF-8.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
