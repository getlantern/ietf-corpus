document: rfc-8654
kind: normative-requirement
summary: If a message cannot be reduced to fit within 4,096 octets for a non-capable neighbor, it must not be sent, and if the NLRI was previously advertised to that peer, it must be withdrawn from service (RFC 4271, Sections 9.2 and 9.1.3).
