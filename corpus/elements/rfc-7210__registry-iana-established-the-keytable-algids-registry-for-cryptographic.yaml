document: rfc-7210
kind: registry
summary: 'IANA established the ''KeyTable AlgIDs'' registry for cryptographic algorithm identifiers. Assignments are on a First Come First Served basis. Initial entries are: ''AES-128-CMAC'' (RFC 4493), ''AES-128-CMAC-96'' (truncated to 96 bits, RFC 5926), and ''HMAC-SHA-1-96'' (HMAC SHA-1 truncated to 96 bits, RFC 2104).'
section: "8.3"
topics:
