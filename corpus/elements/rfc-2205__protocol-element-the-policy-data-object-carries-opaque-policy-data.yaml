document: rfc-2205
kind: protocol-element
summary: The POLICY_DATA object carries opaque policy data (credentials, account numbers, limits, quotas) for policy control modules to decide whether a reservation is administratively permitted. It may appear in Path, Resv, PathErr, or ResvErr messages; merging policy data is the responsibility of the policy control mechanism, not RSVP.
section: "2.7"
topics:
    - qos
    - realtime
    - security
