document: rfc-6793
kind: protocol-element
summary: AS4_PATH is a new optional transitive BGP path attribute (type code 17) with the same semantics and encoding as AS_PATH, but carrying four-octet AS numbers. It is used to propagate four-octet AS path information across OLD BGP speakers that do not support the extension.
section: "3"
topics:
