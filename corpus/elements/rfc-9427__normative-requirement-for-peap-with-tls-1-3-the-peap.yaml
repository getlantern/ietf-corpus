document: rfc-9427
kind: normative-requirement
summary: For PEAP with TLS 1.3, the PEAP Tunnel Key (TK) MUST NOT be derived using the TLS-PRF-128 method defined in [PEAP-TK]; instead, TK MUST be derived from Key_Material as defined in Section 2.1 of this document.
section: "2.5"
rfc2119_level: MUST NOT
