document: rfc-1220
kind: protocol-element
summary: LAN Frame Checksum Preservation carries the original LAN FCS calculated by the source station end-to-end across the PPP link. The FCS Present flag in the frame header signals its presence; its absence indicates the trailing four octets of LAN FCS were stripped.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
