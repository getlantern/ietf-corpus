document: rfc-4682
kind: design-rationale
summary: S-MTAs implement a dedicated Secure Software Download mechanism (using Code Verification Certificates, modeled after DOCSIS) because they are separated from the cable modem by a non-DOCSIS interface. E-MTAs have their software upgraded directly by the embedded DOCSIS Cable Modem and therefore do not need this mechanism.
section: "3.6"
topics:
    - snmp
    - diameter
    - security
