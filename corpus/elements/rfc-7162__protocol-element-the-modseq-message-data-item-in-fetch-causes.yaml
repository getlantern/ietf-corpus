document: rfc-7162
kind: protocol-element
summary: The MODSEQ message data item in FETCH causes the server to return per-message mod-sequence values in responses. Once requested, the server includes MODSEQ in all subsequent unsolicited FETCH responses for CONDSTORE-aware clients, covering changes from conditional STOREs and external agents.
section: 3.1.4.2
topics:
    - email
