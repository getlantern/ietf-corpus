document: rfc-749
kind: normative-requirement
summary: No byte in a SUPDUP-OUTPUT subnegotiation block may have the value 255 (decimal), since 255 is the IAC escape byte in TELNET and would be misinterpreted.
section: "5"
rfc2119_level: MUST
