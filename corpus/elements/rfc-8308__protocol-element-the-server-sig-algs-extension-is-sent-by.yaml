document: rfc-8308
kind: protocol-element
summary: The 'server-sig-algs' extension is sent by the server as a name-list of public key algorithms accepted for 'publickey' user authentication. The server MUST enumerate all algorithms it might accept; a client receiving this extension can avoid trial-and-error algorithm selection and associated authentication penalties.
section: "3.1"
topics:
    - security
    - crypto
