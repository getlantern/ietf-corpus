document: rfc-1883
kind: wire-format
summary: 'The Type 0 Routing header (Next Header value 43) contains: Next Header (8-bit), Hdr Ext Len (8-bit, equals twice the address count, max 46), Routing Type=0 (8-bit), Segments Left (8-bit, max 23), Reserved (8-bit), Strict/Loose Bit Map (24-bit, bit i=1 means strict neighbor hop), and Address[1..n] (each 128-bit).'
