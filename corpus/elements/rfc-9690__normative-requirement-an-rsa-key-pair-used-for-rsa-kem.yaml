document: rfc-9690
kind: normative-requirement
summary: An RSA key pair used for RSA-KEM SHOULD NOT also be used for digital signatures, and SHOULD NOT be used with other key establishment schemes, data encryption, or more than one set of underlying algorithm components.
section: "3"
rfc2119_level: SHOULD NOT
