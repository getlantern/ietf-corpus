document: rfc-2596
kind: interoperability-note
summary: 'X.500(1997) uses a different mechanism called ''contexts'' for language tags. Key differences: X.500 allows a language-coded value to match a directory value without a language code; LDAP references RFC 1766 allowing IANA registration; LDAP prohibits language codes in DNs; and X.500 has subschema administration for associating language codes with attribute types.'
section: "4"
topics:
