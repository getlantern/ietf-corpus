document: rfc-2222
kind: wire-format
summary: 'In GSSAPI, the server''s security negotiation token (after GSS_S_COMPLETE) contains 4 octets: octet 1 is the supported security layer bitmask, octets 2-4 are the maximum output_token size in network byte order. The client''s response has the same structure followed by the authorization identity string.'
