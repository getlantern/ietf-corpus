document: rfc-2532
kind: normative-requirement
summary: A recipient MUST NOT generate an unsolicited MDN to indicate successful processing. It MAY generate an unsolicited MDN to indicate processing failure, subject to the RFC 2298 requirement that MDN generation must always be disableable.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
    - email
