document: rfc-2472
kind: normative-requirement
summary: The Interface Identifier of IPv6 unicast addresses on a PPP interface SHOULD be negotiated in the IPV6CP phase; if no valid identifier is successfully negotiated, recovery procedures are unspecified (one approach is manual configuration).
section: "5"
rfc2119_level: SHOULD
