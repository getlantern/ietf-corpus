document: rfc-7408
kind: normative-requirement
summary: The eventBecomesEqualTo event condition MUST be triggered only when the value of the targeted component becomes equal to the event condition value. Implementations MUST NOT generate subsequent events while the targeted component's value remains equal to the condition value.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
