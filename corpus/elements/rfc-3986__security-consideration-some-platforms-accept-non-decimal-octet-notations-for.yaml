document: rfc-3986
kind: security-consideration
summary: Some platforms accept non-decimal octet notations for IPv4 addresses (octal, hexadecimal). A URI constructed with such a form may be used to bypass access controls or security checks that compare the host string textually. Only dotted-decimal notation of four decimal octets is allowed by the grammar.
section: "7.4"
topics:
    - security
    - ip
