document: rfc-8278
kind: wire-format
summary: 'The MAG Multipath Binding option is 8 octets (excluding Type and Length fields) with fields: Type (8-bit, value 63), Length (8-bit), If-ATT (8-bit access technology type), If-Label (8-bit interface label), Binding ID (8-bit, values 1-254), Bulk Re-registration Flag B (1-bit), Registration Overwrite Flag O (1-bit), and Reserved (22-bit, must be zero).'
section: "4.1"
topics:
    - multipath
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
