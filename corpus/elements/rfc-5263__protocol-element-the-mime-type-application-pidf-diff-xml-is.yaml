document: rfc-5263
kind: protocol-element
summary: The MIME type 'application/pidf-diff+xml' is used for partial presence notifications. Documents using this type carry either a <pidf-full> root element (full state) or a <pidf-diff> root element (incremental changes), along with a mandatory 'version' attribute.
