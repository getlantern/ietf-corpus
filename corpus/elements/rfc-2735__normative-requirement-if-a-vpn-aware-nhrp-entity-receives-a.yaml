document: rfc-2735
kind: normative-requirement
summary: If a VPN-aware NHRP entity receives a packet for a VPN it does not support, it SHOULD send back an NHRP error indication with error code 17 (VPN not supported), but MAY silently drop the packet to avoid certain security issues.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
