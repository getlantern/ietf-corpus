document: rfc-7484
kind: security-consideration
summary: By directing RDAP clients to authoritative servers via IANA-maintained registries, the bootstrap method helps ensure users receive RDAP data from authoritative sources rather than rogue ones. The registries can be accessed via TLS for additional transport security, and the overall security properties are the same as those of the RDAP protocols themselves (see RFC 7481).
section: "11"
topics:
    - security
    - tls
