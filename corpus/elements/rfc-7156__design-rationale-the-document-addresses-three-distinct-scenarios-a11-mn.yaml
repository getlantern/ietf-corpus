document: rfc-7156
kind: design-rationale
summary: 'The document addresses three distinct scenarios: A11 (MN and CN on same MAG, same LMA), A12 (MN and CN on same MAG, different LMAs), and A21 (MN and CN on different MAGs, same LMA), each requiring different authorization flows. This scoping is based on the problem statement in RFC 6279.'
