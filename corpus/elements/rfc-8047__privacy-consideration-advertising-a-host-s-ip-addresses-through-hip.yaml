document: rfc-8047
kind: privacy-consideration
summary: Advertising a host's IP addresses through HIP multihoming extensions may reveal its location even when the administrator intends to conceal it via VPN or virtual interfaces. Similar issues arise in WebRTC. Implementations SHOULD allow administrators to block exposure of selected addresses.
section: "6"
topics:
    - privacy
    - mobility
    - vpn
