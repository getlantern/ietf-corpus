document: rfc-7852
kind: protocol-element
summary: <DataProviderReference> is mandatory in every block. Its value has the same syntax as an RFC 5322 msg-id (world-unique) but without enclosing angle brackets, and it associates all blocks contributed by a single provider as a unit.
