document: rfc-7618
kind: normative-requirement
summary: The client MUST implement a function ensuring that only the allocated Layer 4 ports of the shared IPv4 address are used for sourcing new connections or accepting inbound connections; it MUST NOT accept inbound connections on ports outside the allocated restricted port set.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
    - nat
