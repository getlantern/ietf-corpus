document: rfc-9972
kind: security-consideration
summary: This document does not add new security considerations beyond those in RFC 7854 (Section 11), RFC 8671 (Section 8), and RFC 9069 (Section 7). Monitored devices SHOULD be configured to implement rate-limited reporting of new Gauges to avoid control plane resource exhaustion.
section: "7"
rfc2119_level: SHOULD
