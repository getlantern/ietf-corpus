document: rfc-9801
kind: security-consideration
summary: Random initialization of sequence numbers in both the control word and the RTP header makes known-plaintext attacks more difficult. Misconnection detection using randomly chosen SSRC and/or PT values in the RTP header increases resilience to misconfiguration and some denial-of-service attacks.
