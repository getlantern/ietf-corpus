document: rfc-7581
kind: security-consideration
summary: This document defines protocol-independent encodings and does not itself introduce security issues. However, protocol documents that embed these encodings must address risks of inspection, interception, modification, or spoofing of WSON information; a general GMPLS security framework is provided in RFC 5920.
section: "5"
topics:
    - security
    - mpls
    - routing
