document: rfc-4422
kind: interoperability-note
summary: Where a mechanism specifies the client sends data first and the protocol provides an optional initial response field in the authentication request, using that field eliminates one round-trip. Protocols MUST define how an empty initial response is distinguished from an absent initial response to support this optimization correctly.
section: "3"
topics:
    - security
