document: rfc-8995
kind: normative-requirement
summary: The subject field DN encoding in the client TLS certificate MUST include the 'serialNumber' attribute with the device's unique serial number. Registrars SHOULD be configurable on a per-manufacturer basis to look for serial-number equivalents in other certificate fields.
section: "5.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
