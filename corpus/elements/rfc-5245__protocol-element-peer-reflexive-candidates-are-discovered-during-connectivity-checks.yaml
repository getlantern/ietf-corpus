document: rfc-5245
kind: protocol-element
summary: Peer reflexive candidates are discovered during connectivity checks when the STUN Binding response's XOR-MAPPED-ADDRESS differs from all known candidates. They represent NAT bindings created for the STUN check itself and are added to the valid list for further nomination consideration.
