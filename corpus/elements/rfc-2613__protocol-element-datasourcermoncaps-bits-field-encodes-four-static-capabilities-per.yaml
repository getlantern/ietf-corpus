document: rfc-2613
kind: protocol-element
summary: 'dataSourceRmonCaps BITS field encodes four static capabilities per data source: countErrFrames(0), countAllGoodFrames(1), countAnyRmonTables(2), and babyGiantsCountAsGood(3). The babyGiantsCountAsGood bit indicates whether the agent distinguishes VLAN-tagged frames up to 1522 octets from true giants.'
