document: rfc-4018
kind: wire-format
summary: 'The iSCSI target service URL path has the form: hostport ''/'' iscsi-name [''/'' identity], where hostport is a DNS hostname or IPv4/IPv6 address with optional port, iscsi-name is the iSCSI target name, and identity is an optional opaque string for multi-identity access control.'
