document: rfc-8260
kind: normative-requirement
summary: If user message interleaving support has been negotiated, I-DATA chunks MUST be used for all user messages and DATA chunks MUST NOT be used. If not negotiated, DATA chunks MUST be used and I-DATA chunks MUST NOT be used.
section: 2.2.1
rfc2119_level: MUST
