summary: 'The three new methods (FETCH, PATCH, iPATCH) align with existing CoAP methods by matching their idempotence and safety attributes: FETCH mirrors GET (safe+idempotent, code 0.05), PATCH mirrors POST (neither, code 0.06), and iPATCH mirrors PUT (idempotent, code 0.07).'
