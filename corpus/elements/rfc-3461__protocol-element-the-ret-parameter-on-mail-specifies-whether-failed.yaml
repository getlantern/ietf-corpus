document: rfc-3461
kind: protocol-element
summary: The RET parameter on MAIL specifies whether failed DSNs should return FULL (entire message) or HDRS (headers only). If omitted, the MTA MAY return either. For DSNs with no delivery failures, only headers should be returned regardless.
section: "4.3"
topics:
    - email
