document: rfc-4802
kind: registry
summary: 'The IANA-GMPLS-TC-MIB module defines and maintains four textual conventions used by GMPLS MIBs: IANAGmplsLSPEncodingTypeTC (LSP encoding types), IANAGmplsSwitchingTypeTC (switching capability types), IANAGmplsGeneralizedPidTC (generalized payload identifiers), and IANAGmplsAdminStatusInformationTC (administrative status flags). IANA is requested to maintain these registries.'
section: 11.2.1
