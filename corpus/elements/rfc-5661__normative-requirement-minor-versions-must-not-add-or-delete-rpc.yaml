document: rfc-5661
kind: normative-requirement
summary: Minor versions must not add or delete RPC procedures, must not modify existing operation argument/result structures, must not delete operations or attributes. A client MUST NOT use a stateid, filehandle, or similar object from a COMPOUND with minor version X in a COMPOUND with minor version Y where X ≠ Y.
section: "2.7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
