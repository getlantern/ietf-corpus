document: rfc-8534
kind: normative-requirement
summary: If a received Leaf A-D route's PTA specifies Ingress Replication with a non-zero MPLS label, the ingress node MUST use that label when sending packets of the identified flow to the egress PE.
section: "6"
rfc2119_level: MUST
topics:
