document: rfc-2668
kind: protocol-element
summary: ifMauAutoNegTable contains configuration and status for the auto-negotiation function on interface MAUs. Key objects include ifMauAutoNegAdminStatus (enable/disable), ifMauAutoNegRemoteSignaling (FLP Burst detection), ifMauAutoNegConfig (configuring/complete/disabled/parallelDetectFail), ifMauAutoNegRestart, and BITS-based capability objects.
