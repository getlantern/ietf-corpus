document: rfc-9059
kind: normative-requirement
summary: For Single-Sided Bidirectional LSP Association, the same RSVP-TE tunnel MUST contain both the forward and reverse LSPs on the originating node (albeit with reversed endpoint nodes). Tunnel mismatch results in PCErr Error-Type=26, Error-value=15.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
