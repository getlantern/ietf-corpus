document: rfc-7246
kind: security-consideration
summary: The same security considerations apply as for the base LDP specification (RFC 5036) and base mLDP specification (RFC 6388). Operators MUST configure packet filters to ensure this mechanism does not cause non-global-scoped IPv6 multicast packets to be tunneled outside of their intended scope.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - security
