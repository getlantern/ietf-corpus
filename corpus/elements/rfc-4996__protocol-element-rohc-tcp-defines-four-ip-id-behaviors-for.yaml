document: rfc-4996
kind: protocol-element
summary: 'ROHC-TCP defines four IP-ID behaviors for the IPv4 Identification field: sequential in network byte order (NBO), sequential byte-swapped, random (RND), and constant zero. The compressor monitors the IP-ID across packets to identify the best-matching behavior and selects encoding methods accordingly.'
