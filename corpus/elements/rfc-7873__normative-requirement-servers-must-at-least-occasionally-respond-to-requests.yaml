document: rfc-7873
kind: normative-requirement
summary: Servers MUST, at least occasionally, respond to requests containing only a Client Cookie (no Server Cookie) so that a client can bootstrap to the secure state with a recognized Server Cookie. A server need not maintain per-client state to achieve this.
section: 5.2.3
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
