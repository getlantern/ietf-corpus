document: rfc-7407
kind: protocol-element
summary: 'The ietf-snmp module is organized as a top-level module that includes eleven submodules: ietf-snmp-common, ietf-snmp-engine, ietf-snmp-target, ietf-snmp-notification, ietf-snmp-proxy, ietf-snmp-community, ietf-snmp-usm, ietf-snmp-tsm, ietf-snmp-vacm, ietf-snmp-tls, and ietf-snmp-ssh. All submodules share a single namespace (urn:ietf:params:xml:ns:yang:ietf-snmp) and contribute configuration nodes under the top-level /snmp container.'
section: "2"
topics:
