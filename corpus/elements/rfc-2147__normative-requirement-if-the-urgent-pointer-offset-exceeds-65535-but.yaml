document: rfc-2147
kind: normative-requirement
summary: 'If the Urgent Pointer offset exceeds 65535 but is less than the TCP data length, the TCP packet MUST be split: the first piece ends before the urgent data with Urgent field set to 65535, and the second piece carries the urgent data with the Urgent field set normally.'
section: "3.2"
rfc2119_level: MUST
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
