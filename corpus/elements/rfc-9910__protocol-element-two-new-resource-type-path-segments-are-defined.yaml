document: rfc-9910
kind: protocol-element
summary: 'Two new resource type path segments are defined for basic search: ''ips'' for IP network searches and ''autnums'' for autonomous system number searches. Search patterns support exact match or trailing wildcard using ''*'' (ASCII 0x2A) as defined in RFC 9082 Section 4.1.'
section: "2.1"
