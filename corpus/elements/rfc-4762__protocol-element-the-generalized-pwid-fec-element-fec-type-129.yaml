document: rfc-4762
kind: protocol-element
summary: The Generalized PWid FEC Element (FEC type 129) from RFC 4447 is used for VPLS signaling. The AGI (Attachment Group Identifier) field identifies the VPLS instance; TAII and SAII are null because the PW mesh terminates on MAC learning tables rather than individual attachment circuits.
section: 6.1.1
topics:
