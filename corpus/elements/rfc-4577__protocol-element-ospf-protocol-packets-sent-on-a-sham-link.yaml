document: rfc-4577
kind: protocol-element
summary: OSPF protocol packets sent on a sham link MUST use the Sham Link Endpoint Address as IP source and destination, travel over the VPN backbone via MPLS, and are recognized only when arriving as an MPLS packet delivered to the local sham link endpoint address with matching source and destination addresses.
section: 4.2.7.3
topics:
    - routing
    - mpls
