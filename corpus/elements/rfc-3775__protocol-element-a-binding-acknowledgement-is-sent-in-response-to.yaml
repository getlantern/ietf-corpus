document: rfc-3775
kind: protocol-element
summary: A Binding Acknowledgement is sent in response to a Binding Update when an acknowledgement was requested, the update was sent to a home agent, or an error occurred. It echoes the sequence number and includes a MAC computed over Kbm to authenticate the response.
