summary: Temporary allocations from the 'MPLS Multi-Topology Identifiers' registry are made for MRT-Red MT-ID, MRT-Blue MT-ID, and Rainbow MRT MPLS MT-ID for the Default MRT Profile. New MRT profiles must allocate new unique values from this registry for their MRT-Red and MRT-Blue MT-IDs.
