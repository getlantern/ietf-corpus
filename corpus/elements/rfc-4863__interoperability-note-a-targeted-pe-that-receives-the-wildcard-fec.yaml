document: rfc-4863
kind: interoperability-note
summary: A targeted PE that receives the wildcard FEC first performs the normal AGI and TAII validation procedures; if it holds a non-wildcard PW Type configuration for the identified attachment, it treats the incoming Label Mapping as if it had specified that configured PW Type. The wildcard is never echoed back as the resolved type.
section: "3.2"
topics:
    - mpls
