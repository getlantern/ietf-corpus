document: rfc-4805
kind: protocol-element
summary: 'dsx1LineCoding is a read-write enumeration specifying zero code suppression: dsx1JBZS (forces pulse in bit 8, limits to 1.344 Mbps), dsx1B8ZS (bipolar violation pattern replaces 8 zeros), dsx1HDB3 (E1 links), dsx1ZBTSI (ANSI clear channels), dsx1AMI (no suppression, higher layer must ensure pulse density), dsx1B6ZS (replaces 6 zeros, used for DS2).'
