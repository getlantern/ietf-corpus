document: rfc-9251
kind: normative-requirement
summary: If an ASBR is configured to perform RT-rewriting of EVI RTs in EVPN routes, it MUST also be configured to perform RT-rewriting of the corresponding EVI-RT extended communities in IGMP Join Synch and IGMP Leave Synch routes.
section: "9.6"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
