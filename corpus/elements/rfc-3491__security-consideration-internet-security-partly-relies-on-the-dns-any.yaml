document: rfc-3491
kind: security-consideration
summary: Internet security partly relies on the DNS; any change to DNS characteristics can change the security of much of the Internet. A user entering a single internationalized name must not be connectable to different servers based on different interpretations of that name.
section: "9"
topics:
    - dns
    - security
