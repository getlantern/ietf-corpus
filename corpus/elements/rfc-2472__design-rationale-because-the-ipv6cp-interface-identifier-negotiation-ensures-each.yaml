document: rfc-2472
kind: design-rationale
summary: Because the IPV6CP Interface-Identifier negotiation ensures each end has a unique identifier, duplicate address detection (DAD) as part of IPv6 Stateless Autoconfiguration is redundant and its transmit count should default to zero on PPP links.
