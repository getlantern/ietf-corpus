document: rfc-3039
kind: design-rationale
summary: The profile defines a general syntax independent of local legal requirements, intentionally not defining the specific semantics of Qualified Certificates. Laws and corporate policies are expected to define semantics; the profile only specifies what information goes in the certificate, not what it means.
