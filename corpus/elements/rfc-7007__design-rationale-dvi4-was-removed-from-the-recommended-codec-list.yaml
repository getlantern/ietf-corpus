document: rfc-7007
kind: design-rationale
summary: DVI4 was removed from the recommended codec list because in practice many RTP deployments do not support it, and there is little reason to use it when much more modern codecs are available. The original RFC 3551 requirement to support both PCMU and DVI4 no longer reflects real-world usage.
section: "1"
topics:
