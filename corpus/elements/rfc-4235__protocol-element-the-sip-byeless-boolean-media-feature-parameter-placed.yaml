document: rfc-4235
kind: protocol-element
summary: The 'sip.byeless' boolean media feature parameter, placed in the SIP Contact header with a '+' prefix, indicates that the UA is incapable of autonomously terminating a session (e.g., announcement services, recording services, or human call centers configured to never send BYE).
section: "5.1"
topics:
