document: rfc-8748
kind: normative-requirement
summary: If a server implements the registry grace period extension (RFC 3915), it MUST specify the 'grace-period' attribute for all relevant <fee:fee> elements. If the 'refundable' attribute is omitted, clients SHOULD NOT make any assumptions about refundability.
section: 3.4.2
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
