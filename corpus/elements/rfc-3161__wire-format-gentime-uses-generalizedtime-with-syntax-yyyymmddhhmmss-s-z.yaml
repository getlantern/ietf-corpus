document: rfc-3161
kind: wire-format
summary: genTime uses GeneralizedTime with syntax YYYYMMDDhhmmss[.s...]Z. The encoding MUST terminate with 'Z', MUST include seconds, trailing fractional zeros MUST be omitted, and midnight is represented as YYYYMMDD000000Z of the following day.
section: 2.4.2
