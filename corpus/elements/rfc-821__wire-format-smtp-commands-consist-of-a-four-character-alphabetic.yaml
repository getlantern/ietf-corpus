document: rfc-821
kind: wire-format
summary: SMTP commands consist of a four-character alphabetic command code (case-insensitive), optionally followed by one or more spaces and an argument field, terminated by <CRLF> (CR=ASCII 13, LF=ASCII 10). The argument field is variable length.
