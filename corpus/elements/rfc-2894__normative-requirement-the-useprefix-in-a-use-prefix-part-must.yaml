document: rfc-2894
kind: normative-requirement
summary: The UsePrefix in a Use-Prefix Part MUST NOT have the form of a multicast or link-local address. Any New Prefix with a forbidden format (multicast, unspecified, loopback) MUST be discarded; if R is set, the F flag MUST be set in the corresponding Match Report.
section: 3.2.1.2
rfc2119_level: MUST
topics:
