document: rfc-8402
kind: security-consideration
summary: For SRv6, domain boundary routers MUST filter external traffic destined to addresses within the SRGB or SRLB of the trusted domain. Violations of the trust model can result in malicious looping, evasion of access controls, and hiding the source of DoS attacks.
section: "8.2"
rfc2119_level: MUST
topics:
    - security
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
