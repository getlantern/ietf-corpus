document: rfc-8030
kind: normative-requirement
summary: A push service MUST return a 404 (Not Found) status code if an application server attempts to send a push message to an expired push message subscription. Expiry of a subscription set MUST also expire all push message subscriptions in the set.
section: "7.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
