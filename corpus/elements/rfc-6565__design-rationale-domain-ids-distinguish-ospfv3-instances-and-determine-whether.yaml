document: rfc-6565
kind: design-rationale
summary: Domain IDs distinguish OSPFv3 instances and determine whether an incoming VPN-IPv6 route is inter-area or external. Two Domain IDs match if all 8 bytes are identical, or both are NULL; a route with no Domain ID attribute is treated as NULL.
section: 4.1.2
topics:
    - routing
    - mpls
    - vpn
