document: rfc-6501
kind: protocol-element
summary: The <floor-information> element contains <conference-ID> (mapping 1:1 to the XCON-URI and to the BFCP 32-bit conference identifier), <allow-floor-events>, <floor-request-handling> (block or confirm), and <conference-floor-policy>. Absence of this element from a document indicates the conference has no floor.
section: "4.5"
topics:
    - realtime
