document: rfc-1256
kind: normative-requirement
summary: 'A router MUST silently discard any received Router Solicitation that fails validity: IP source must be 0 or a neighboring address, ICMP checksum must be valid, Code must be 0, and ICMP length (derived from IP length) must be 8 or more octets.'
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
    - security
