document: rfc-5227
kind: security-consideration
summary: If a host selects a new address in response to an ARP conflict (option (a) in Section 2.4), this potentially makes it easier for malicious attackers on the same link to hijack TCP connections by forcing address reconfiguration. Actively resetting existing connections before abandoning an address mitigates this risk.
section: "5"
topics:
