document: rfc-2944
kind: design-rationale
summary: SRP-SHA1 generates a 40-byte session key, allowing implementations to use different keys for incoming and outgoing traffic to increase encrypted session security. It is recommended that Telnet ENCRYPT take advantage of these longer session keys.
section: "3"
topics:
