document: rfc-9594
kind: protocol-element
summary: The 'sign_info' parameter is exchanged between the Client and /authz-info endpoint. In a Token Transfer Request it is the CBOR simple value null (0xf6); in the Token Transfer Response it is a CBOR array of 'sign_info_entry' elements, each associating one or more group names with their signature algorithm, algorithm parameters, key parameters, and authentication credential format.
section: 3.3.1
topics:
    - crypto
    - security
    - cbor
