document: rfc-7753
kind: normative-requirement
summary: PCP clients MUST ensure that port-set mapping requests do not inadvertently overlap with each other, for example by arbitrating requests through a central PCP client process or by acquiring internal ports from the OS before requesting PCP mappings.
section: "6.3"
rfc2119_level: MUST
topics:
