document: rfc-9627
kind: protocol-element
summary: The LRR is identified by RTCP PT=PSFB and FMT=10. The C flag indicates whether Current Temporal-layer ID (CTID) and Current Layer ID (CLID) are present; if C=0, the sender requests refresh of all layers up to and including the target layer.
section: "3.1"
