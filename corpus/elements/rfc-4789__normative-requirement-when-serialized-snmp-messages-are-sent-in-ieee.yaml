document: rfc-4789
kind: normative-requirement
summary: When serialized SNMP messages are sent in IEEE 802.3 frames (and other IEEE 802 MAC frame types that can natively represent Ethernet type values), an Ethernet type field value of 33100 (hexadecimal 814C) MUST be used as the link layer protocol identifier.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
