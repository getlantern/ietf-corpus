document: rfc-1327
kind: protocol-element
summary: A globally defined set of domain-to-O/R-Address mappings is required by all gateways for correct routing. The exchange format for this information is defined in Appendix F, covering Domain->O/R Address, O/R Address->Domain, and Domain->O/R Address of Gateway tables. Administrative equivalence between mapped namespace portions must be maintained.
section: 4.3.1
