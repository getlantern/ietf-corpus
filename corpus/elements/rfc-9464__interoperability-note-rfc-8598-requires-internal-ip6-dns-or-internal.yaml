document: rfc-9464
kind: interoperability-note
summary: RFC 8598 requires INTERNAL_IP6_DNS or INTERNAL_IP4_DNS to be present when INTERNAL_DNS_DOMAIN is included; this specification relaxes that constraint — if ENCDNS_IP* attributes are supplied, responders may include INTERNAL_DNS_DOMAIN even without INTERNAL_IP*_DNS attributes.
section: "4"
topics:
