document: rfc-1522
kind: interoperability-note
summary: 'The design explicitly accommodates known deficiencies in deployed mail software: programs that delete some header fields, rearrange To/Cc addresses, reorder header fields vertically, or wrap headers at different column positions than the original. Encoded-words are designed to survive these transformations intact.'
