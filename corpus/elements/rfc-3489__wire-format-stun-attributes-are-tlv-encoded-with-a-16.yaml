document: rfc-3489
kind: wire-format
summary: STUN attributes are TLV-encoded with a 16-bit Type, 16-bit Length (value length in bytes), and variable-length Value. Attributes with type <= 0x7fff are mandatory to understand; those > 0x7fff are optional and may be ignored.
section: "11.2"
