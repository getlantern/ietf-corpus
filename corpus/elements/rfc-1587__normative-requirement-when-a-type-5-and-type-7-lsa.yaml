document: rfc-1587
kind: normative-requirement
summary: 'When a type-5 and type-7 LSA have the same type and equal distance, tie-breaking priority (highest to lowest) is: (a) any type-5 LSA, (b) a type-7 LSA with P-bit set and non-zero forwarding address, (c) any other type-7 LSA.'
section: "3.5"
rfc2119_level: SHOULD
topics:
    - routing
