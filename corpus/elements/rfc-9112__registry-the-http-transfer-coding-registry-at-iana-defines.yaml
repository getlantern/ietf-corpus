document: rfc-9112
kind: registry
summary: The "HTTP Transfer Coding Registry" at IANA defines the namespace for transfer coding names. Registrations require IETF Review, must include Name, Description, and specification pointer. Transfer coding names MUST NOT overlap with content coding names unless the transformation is identical.
section: "7.3"
topics:
