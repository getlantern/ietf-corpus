document: rfc-2273
kind: state-machine
summary: 'For Inform PDU notifications, the notification originator enters a retry loop: send Inform → wait for response within timeout → if response received, mark acknowledged and delete cached info; if timeout or report received, retry using cached management target info. States are: Pending, Acknowledged (success), and Failed (retry count exceeded).'
section: "3.3"
topics:
    - snmp
