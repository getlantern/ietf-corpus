document: rfc-7532
kind: wire-format
summary: The fedfsFsnTTL attribute (OID 1.3.6.1.4.1.31103.1.11) MUST be encoded as an Integer syntax value in the range [0, 4294967295]. It is single-valued and specifies the time-to-live in seconds of a cached FSN and its child FSL records.
section: 4.2.1.3
topics:
    - ldap
