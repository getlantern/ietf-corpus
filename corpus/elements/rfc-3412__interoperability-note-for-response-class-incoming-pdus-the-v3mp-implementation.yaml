document: rfc-3412
kind: interoperability-note
summary: For Response Class incoming PDUs, the v3MP implementation may retain cached information about the outstanding request even when securityModel or securityLevel values differ from the cached ones, in anticipation that the received Response Class PDU might be illegitimate rather than a legitimate superseding response.
section: "7.2"
topics:
    - snmp
