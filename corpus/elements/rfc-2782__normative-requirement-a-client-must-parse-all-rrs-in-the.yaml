document: rfc-2782
kind: normative-requirement
summary: A client MUST parse all RRs in the SRV reply. If the Additional Data section is missing address records for any SRV target the client may need to connect to, the client MUST perform a separate DNS lookup for those address records.
section: Usage rules
rfc2119_level: MUST
topics:
    - dns
