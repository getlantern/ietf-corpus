document: rfc-8196
kind: normative-requirement
summary: IS-IS autoconfiguration instances MUST be configured as level-1 only. Interfaces MUST be autoconfigured to the type corresponding to their Layer 2 capability (e.g., Ethernet as broadcast, PPP as point-to-point).
section: "3.1"
rfc2119_level: MUST
