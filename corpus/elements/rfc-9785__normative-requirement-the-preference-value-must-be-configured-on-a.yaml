document: rfc-9785
kind: normative-requirement
summary: The Preference value MUST be configured on a per-Ethernet-Segment basis and is normally configured from the management plane. The preference value MAY also be dynamically changed based on local policies reacting to events such as port bandwidth changes.
section: "4.1"
rfc2119_level: MUST
topics:
