summary: MEP reachability parameters (ESP-MAC DA, ESP-MAC SA, ESP-VID) for PBB-TE connections are derived directly from the GMPLS Ethernet Labels (UPSTREAM_LABEL and Label objects) rather than being carried explicitly in OAM TLVs, avoiding redundant signaling of information already present in the LSP setup.
