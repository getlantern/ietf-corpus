summary: 'IANA created the ''DS Flags'' registry within the MPLS LSP Ping Parameters registry. Registration policy is Standards Action. Initial assignments include bit 7 (N: Treat as Non-IP Packet) and bit 6 (I: Interface and Label Stack Object Request), both from RFC 4379; bits 5-0 are Unassigned.'
