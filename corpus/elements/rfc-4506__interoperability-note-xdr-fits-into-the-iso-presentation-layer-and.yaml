document: rfc-4506
kind: interoperability-note
summary: XDR fits into the ISO presentation layer and is analogous in purpose to X.409 (ASN.1), but differs in using implicit rather than explicit typing. Protocols such as ONC RPC and NFS use XDR for data formatting.
