document: rfc-6211
kind: normative-requirement
summary: The algorithm protection attribute MUST be placed as a signed attribute or an authenticated attribute. It MUST NOT be placed as an unsigned attribute, unauthenticated attribute, or unprotected attribute, as it provides no security in those locations.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
