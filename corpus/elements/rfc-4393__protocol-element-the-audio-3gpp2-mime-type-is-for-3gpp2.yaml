document: rfc-4393
kind: protocol-element
summary: The audio/3gpp2 MIME type is for 3GPP2 files containing audio but no visual presentation (neither video nor timed text). The optional Codecs parameter (per RFC 4281) enumerates the codecs present.
section: "3.1"
