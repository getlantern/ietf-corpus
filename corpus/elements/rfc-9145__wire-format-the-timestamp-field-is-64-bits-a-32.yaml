document: rfc-9145
kind: wire-format
summary: 'The Timestamp field is 64 bits: a 32-bit Seconds field (integer seconds since Unix epoch 1970-01-01T00:00 UTC) and a 32-bit Fraction field (units of 2^(-32) seconds ≈ 233 picoseconds). The format wraps around every 2^32 seconds (~136 years); the next wraparound occurs in 2106.'
section: "6"
topics:
