document: rfc-4785
kind: security-consideration
summary: Special care should be taken to protect shared PSK values and limit their exposure over time. Ciphersuites defined here provide no confidentiality, so sensitive information such as passwords MUST NOT be sent over connections protected by these ciphersuites.
section: "4"
rfc2119_level: SHOULD
