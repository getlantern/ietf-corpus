document: rfc-5795
kind: errata
summary: 'RFC 4995 erroneously redefined the Size field in ROHC feedback to mean the size of the FEEDBACK data only (excluding the CID field), diverging from RFC 3095. RFC 5795 corrects this: the Size field indicates the total size of the FEEDBACK data field and the CID field combined, restoring interoperability.'
section: 5.2.4.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
