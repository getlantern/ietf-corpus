document: rfc-4314
kind: protocol-element
summary: The SETACL command changes the ACL on a specified mailbox. The third argument is a string with an optional '+' (add rights) or '-' (remove rights) prefix followed by zero or more rights characters. Without a prefix, the rights replace existing rights for the identifier.
section: "3.1"
topics:
