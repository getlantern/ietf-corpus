document: rfc-7648
kind: normative-requirement
summary: A PCP proxy MUST NOT copy the upstream PCP server's Epoch Time into its downstream PCP replies; each PCP server has its own independent Epoch Time so it can communicate its own state loss to clients.
section: "3"
rfc2119_level: MUST NOT
topics:
    - pcp
    - nat
