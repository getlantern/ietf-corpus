document: rfc-7970
kind: security-consideration
summary: The restriction attribute conveys disclosure guidelines but provides no technical enforcement. Recipients are trusted to honor the sender's disclosure intent. IODEF documents containing sensitive data MUST be protected using transport-layer or message-level confidentiality and integrity mechanisms.
section: "9.1"
topics:
    - security
