document: rfc-9552
kind: security-consideration
summary: BGP-LS distributes detailed topology and TE information to external entities, which may include sensitive operational data such as link capacities, SRLGs, and node roles. Operators MUST apply BGP policy to control what information is exported, and SHOULD restrict BGP-LS sessions to trusted peers using BGP authentication mechanisms.
section: "10"
topics:
    - bgp
    - routing
    - security
