document: rfc-3019
kind: protocol-element
summary: mldInterfaceQuerier (InetAddressIPv6, SIZE 16) is a read-only object containing the IPv6 address of the MLD Querier on the subnet attached to the interface. It is accompanied by mldInterfaceQuerierUpTime and mldInterfaceQuerierExpiryTime for querier state tracking.
section: "3"
topics:
