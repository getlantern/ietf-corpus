document: rfc-8842
kind: security-consideration
summary: This specification does not modify the security considerations of DTLS or the SDP offer/answer mechanism. The 'tls-id' attribute cannot by itself correlate an SDP offer/answer exchange with a TLS connection setup, so no new security considerations are introduced for that correlation. Certificate fingerprint verification per RFC 8122 remains the authentication mechanism.
section: "10"
topics:
    - security
    - realtime
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
