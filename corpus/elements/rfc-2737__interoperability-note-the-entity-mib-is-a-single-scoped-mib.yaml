document: rfc-2737
kind: interoperability-note
summary: The Entity MIB is a single-scoped MIB. In environments where an agent represents the MIB in different naming scopes, single-scoped objects may be returned across all naming scopes and not just the default. Isolation of single-scoped objects is implementation-specific.
section: "2.8"
topics:
    - snmp
