document: rfc-7888
kind: normative-requirement
summary: If a LITERAL- server responds to an APPEND command with a tagged BAD due to an oversized non-synchronizing literal, the BAD response MUST contain the TOOBIG response code (RFC 4469). If responding with an untagged BYE, it SHOULD include the TOOBIG response code.
section: "5"
rfc2119_level: MUST
topics:
