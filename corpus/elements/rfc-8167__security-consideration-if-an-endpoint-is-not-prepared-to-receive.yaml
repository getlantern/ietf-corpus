document: rfc-8167
kind: security-consideration
summary: If an endpoint is not prepared to receive reverse-direction messages, loss of the RDMA connection may result. A sender that continues to send reverse-direction messages after every transport reconnect to an unprepared endpoint could cause a denial-of-service condition.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
