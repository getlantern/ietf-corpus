document: rfc-7428
kind: normative-requirement
summary: An expired CID and its associated prefix MUST NOT be reset; they must be retained in receive-only mode. If a sleeping node uses an expired CID, the ABR MUST return an RA with fresh context information to the originator.
section: 4.4.2.2
rfc2119_level: MUST
topics:
    - ip
