document: rfc-7199
kind: normative-requirement
summary: If a DELETE request is authorized, the Location Server MUST delete the policy referenced by the URI and disallow access to the governed location URIs until a new policy document is installed via PUT.
section: "3.1"
rfc2119_level: MUST
topics:
