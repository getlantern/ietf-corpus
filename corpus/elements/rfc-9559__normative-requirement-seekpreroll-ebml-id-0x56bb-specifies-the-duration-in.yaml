document: rfc-9559
kind: normative-requirement
summary: SeekPreRoll (EBML ID 0x56BB) specifies the duration in nanoseconds of data a decoder MUST decode after a discontinuity before its output is valid. This timestamp MUST be accounted for by the player during seeking for codecs requiring priming (e.g., Opus).
section: 5.1.4.1.26
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
