document: rfc-4436
kind: interoperability-note
summary: If a router ignores unicast ARP Requests, DNAv4 will always produce false negatives for that link, making it impossible to detect re-attachment; network operators who desire the performance improvement must upgrade their routers to respond to unicast ARP.
section: "1.1"
topics:
    - ip
