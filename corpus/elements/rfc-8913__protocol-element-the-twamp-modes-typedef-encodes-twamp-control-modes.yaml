document: rfc-8913
kind: protocol-element
summary: 'The ''twamp-modes'' typedef encodes TWAMP-Control modes as a bitmask with eight named bit positions: unauthenticated (0), authenticated (1), encrypted (2), unauth-test-encrypt-control (3), individual-session-control (4), reflect-octets (5), symmetrical-size (6), and IKEv2Derived (7).'
