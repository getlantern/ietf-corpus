document: rfc-4997
kind: protocol-element
summary: An encoding method may define multiple COMPRESSED formats for a single UNCOMPRESSED format. The compressor selects any combination where no binding fails; a discriminator field (control field with compressed_value) uniquely identifies the chosen format to the decompressor.
section: 4.12.3.2
