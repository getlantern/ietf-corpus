document: rfc-8435
kind: protocol-element
summary: 'CB_RECALL_ANY is extended with flexible file layout mask flags: PNFS_FF_RCA4_TYPE_MASK_READ (value 16) and PNFS_FF_RCA4_TYPE_MASK_RW (value 17), allowing the metadata server to selectively recall read-only or read-write layouts and specify how many the client may keep via craa_layouts_to_keep.'
section: "13.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
