document: rfc-9521
kind: normative-requirement
summary: 'In the Geneve header for BFD with Ethernet payload: the O bit MUST be set to 1 (control message), the C bit MUST be set to 0 (no critical option), and the Protocol Type field MUST be set to 0x6558 (Ethernet frame).'
section: "4"
rfc2119_level: MUST
topics:
    - routing
