document: rfc-4681
kind: normative-requirement
summary: The domain_name field in UpnDomainHint is an IDN-unaware domain name slot; domain names containing non-ASCII characters MUST be processed per RFC 3490 (IDNA) before being stored in this field.
section: "6"
rfc2119_level: MUST
topics:
