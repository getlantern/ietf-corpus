document: rfc-954
kind: protocol-element
summary: Prefixing a host or organization name with '*' (e.g., '*SRI-NIC') requests the complete membership list or all authorized users of that host. The RFC warns this may take a long time for large groups.
section: COMMAND LINES AND REPLIES
