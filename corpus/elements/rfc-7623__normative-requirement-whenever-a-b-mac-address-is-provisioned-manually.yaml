document: rfc-7623
kind: normative-requirement
summary: Whenever a B-MAC address is provisioned (manually or automatically), the PE MUST transmit a MAC Advertisement route for that B-MAC address with a downstream-assigned MPLS label that uniquely identifies the address on the advertising PE.
section: 6.2.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
