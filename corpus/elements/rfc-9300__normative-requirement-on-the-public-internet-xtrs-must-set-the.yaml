document: rfc-9300
kind: normative-requirement
summary: On the public Internet, xTRs MUST set the N-, L-, E-, and V-bits in the LISP header to zero, MUST NOT use Locator-Status-Bits or Echo-Nonce for RLOC reachability (relying solely on control plane methods), and MUST NOT use gleaning to update EID-to-RLOC mappings.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
