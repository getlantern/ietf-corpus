document: rfc-6012
kind: normative-requirement
summary: If DTLS renegotiation is allowed, the specification in RFC 5746 MUST be followed, and the implementation MUST ensure the connection retains adequate security and that certificate identities do not change during renegotiation.
section: "9.1"
rfc2119_level: MUST
