document: rfc-5936
kind: normative-requirement
summary: An AXFR response transferring zone contents MUST begin with the SOA resource record of the zone in the first message, and MUST conclude with the same SOA record in the last message. Intermediate messages MUST NOT contain the SOA resource record.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
