document: rfc-9126
kind: privacy-consideration
summary: PAR improves privacy by passing authorization request data directly between client and authorization server over a secure connection in the HTTP request body, rather than in the URL query string that passes through the user agent in the clear and may leak to web server logs or referrer headers.
