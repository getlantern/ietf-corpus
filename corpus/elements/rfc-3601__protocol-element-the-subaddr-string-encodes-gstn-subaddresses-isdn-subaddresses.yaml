document: rfc-3601
kind: protocol-element
summary: The subaddr-string encodes GSTN subaddresses (ISDN subaddresses and T.33 fax subaddresses) using phone-string. Specific services may restrict the allowed phone-string elements (e.g., ISDN restricts to DIGIT/written-sep; T.33 restricts to DIGIT only).
section: "4"
