document: rfc-7105
kind: protocol-element
summary: 802.11 WiFi measurements are conveyed in a 'wifi' element containing one or more 'ap' elements (mandatory 'bssid'; optional 'ssid', 'channel', 'type', 'band', 'flightTime', 'apSignal', 'deviceSignal') and an optional 'nicType'. The 'rcpi' signal strength value SHOULD be in dBm; if not, the 'dBm' attribute MUST be set to 'false'.
section: "5.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
