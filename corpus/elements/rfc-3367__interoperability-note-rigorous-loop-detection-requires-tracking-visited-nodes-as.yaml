document: rfc-3367
kind: interoperability-note
summary: Rigorous loop detection requires tracking visited nodes as (serviceuri, dataseturi) pairs. Servers that do not support datasets send status 3.1.3 (marking the entire service as visited for all datasets); servers that support only one dataset at a time send 3.1.4 (marking only the first serviceuri/dataseturi pair as visited).
section: 4.2.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
