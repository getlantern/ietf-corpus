document: rfc-8306
kind: security-consideration
summary: Policy control for P2MP path computation requests may be enforced via IP access lists that explicitly define which PCCs are permitted to send P2MP requests to the PCE. PCEP operates over TCP, so PCE and PCC implementations must also be protected against TCP-level denial-of-service attacks.
section: "5"
topics:
