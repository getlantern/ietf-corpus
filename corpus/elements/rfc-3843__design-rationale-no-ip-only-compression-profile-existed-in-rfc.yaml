document: rfc-3843
kind: design-rationale
summary: No IP-only compression profile existed in RFC 3095, which only defined profiles for IP/UDP/RTP, IP/ESP, IP/UDP, and uncompressed streams. The uncompressed profile could tunnel arbitrary packets but provided no header compression, creating a gap for IP-only traffic that this document fills.
section: "1"
topics:
