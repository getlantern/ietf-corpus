document: rfc-5710
kind: design-rationale
summary: The 'Reroute' error code is introduced specifically to allow future definition of reroute-application-specific error values (e.g., for soft-preemption, graceful shutdown), while the existing 'Notify' error codes are retained for backwards compatibility with nodes that do not support the new code.
