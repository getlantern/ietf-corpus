document: rfc-8295
kind: protocol-element
summary: The /tamp path component (HTTP GET) distributes TAMP (RFC 5934) packages—Status Query, Trust Anchor Update, Apex Trust Anchor Update, Community Update, Sequence Number Adjust—to manage trust anchor databases on clients. The /tamp/return path (HTTP POST) returns TAMP responses, confirms, and errors with RFC 5934 MIME types.
