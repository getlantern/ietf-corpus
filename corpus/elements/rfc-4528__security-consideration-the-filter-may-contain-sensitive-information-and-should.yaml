document: rfc-4528
kind: security-consideration
summary: The filter may contain sensitive information and should be appropriately protected (e.g., via TLS). The assertion mechanism can be used to probe directory content, so it SHOULD be subject to appropriate access controls. Complex assertions may consume significant server resources, so administrative controls SHOULD also be applied.
section: "4"
rfc2119_level: SHOULD
topics:
    - ldap
    - security
