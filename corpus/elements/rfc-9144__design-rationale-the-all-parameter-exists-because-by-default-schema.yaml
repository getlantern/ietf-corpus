document: rfc-9144
kind: design-rationale
summary: The 'all' parameter exists because, by default, schema nodes that can appear in only one of the two datastores (e.g., config:false nodes absent from a configuration datastore) are prefiltered out, allowing clients to focus on true instance-data mismatches without complex filter constructs.
