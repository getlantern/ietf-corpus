document: rfc-4867
kind: interoperability-note
summary: For GSM interoperability, encoders SHOULD only perform codec mode changes to neighboring modes and in multiples of 40 ms (two frame-blocks), but decoders SHOULD accept mode changes at any time. The mode-change-period and mode-change-capability parameters in SDP signal these constraints.
section: "4.5"
topics:
    - rtp
    - realtime
