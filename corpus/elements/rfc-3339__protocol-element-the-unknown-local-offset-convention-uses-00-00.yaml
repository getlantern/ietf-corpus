document: rfc-3339
kind: protocol-element
summary: The unknown local offset convention uses '-00:00' to indicate that UTC is known but the offset to local time is not. This is semantically distinct from '+00:00' or 'Z', which imply UTC is the preferred reference point.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
