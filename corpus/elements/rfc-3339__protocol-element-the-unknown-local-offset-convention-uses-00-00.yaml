document: rfc-3339
kind: protocol-element
summary: The unknown local offset convention uses "-00:00" to indicate that the UTC time is known but the local offset is unknown. This differs semantically from "+00:00" or "Z", which imply UTC is the preferred reference point.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
