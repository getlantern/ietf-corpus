document: rfc-2069
kind: protocol-element
summary: Proxy authentication uses Proxy-Authenticate (carrying digest-challenge) and Proxy-Authorization (carrying digest-response) with the same structure as server authentication. A client that receives both WWW-Authenticate and Proxy-Authenticate challenges must respond with both Authorization and Proxy-Authorization headers, typically with different credentials.
section: "2.5"
topics:
    - http
    - security
