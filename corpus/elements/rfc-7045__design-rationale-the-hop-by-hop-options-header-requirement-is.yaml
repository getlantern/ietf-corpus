document: rfc-7045
kind: design-rationale
summary: 'The Hop-by-Hop Options header requirement is updated to reflect operational reality: high-performance routers often ignore it or process it on a slow path. Designers planning to use hop-by-hop options need to be aware that processing is not guaranteed at intermediate nodes.'
section: "2.2"
topics:
