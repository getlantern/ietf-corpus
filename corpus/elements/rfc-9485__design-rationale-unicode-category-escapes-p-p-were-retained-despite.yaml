document: rfc-9485
kind: design-rationale
summary: Unicode category escapes (\p{}/\P{}) were retained despite the challenge they pose for constrained environments because they are widely available in modern regexp libraries, and translating them to character-class matches would itself require access to the same Unicode tables.
