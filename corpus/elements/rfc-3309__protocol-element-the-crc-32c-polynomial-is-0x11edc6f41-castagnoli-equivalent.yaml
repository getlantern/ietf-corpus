document: rfc-3309
kind: protocol-element
summary: The CRC-32c polynomial is 0x11EDC6F41 (Castagnoli), equivalent to x^32+x^28+x^27+x^26+x^25+x^23+x^22+x^20+x^19+x^18+x^14+x^13+x^11+x^10+x^9+x^8+x^6+x^0. The CRC is computed using a reflected (mirrored) bit ordering where bytes are taken most-significant first but bits within each byte are taken least-significant first.
section: "2.1"
topics:
    - sctp
