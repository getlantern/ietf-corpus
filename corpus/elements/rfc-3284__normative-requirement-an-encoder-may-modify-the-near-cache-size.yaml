document: rfc-3284
kind: normative-requirement
summary: An encoder MAY modify the near cache size (s_near) and same cache size (s_same) from their defaults, but then MUST encode the new values in the delta file (via the application-defined code table mechanism) so the decoder can properly initialize its caches.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
