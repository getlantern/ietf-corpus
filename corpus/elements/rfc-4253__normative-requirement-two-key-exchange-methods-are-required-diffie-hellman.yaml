document: rfc-4253
kind: normative-requirement
summary: 'Two key exchange methods are REQUIRED: diffie-hellman-group1-sha1 (Oakley Group 2, 1024-bit MODP) and diffie-hellman-group14-sha1 (Oakley Group 14, 2048-bit MODP). Both MUST be supported for interoperability.'
section: "6.5"
rfc2119_level: REQUIRED
