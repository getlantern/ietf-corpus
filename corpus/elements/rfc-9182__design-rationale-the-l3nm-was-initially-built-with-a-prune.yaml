document: rfc-9182
kind: design-rationale
summary: The L3NM was initially built with a 'prune and extend' approach from RFC 8299 (L3SM) but is not defined as an augmentation of L3SM because a specific structure is required to meet network-oriented L3 needs; this design also ensures a service provider may deploy the L3NM without exposing or using the L3SM.
section: "1"
topics:
