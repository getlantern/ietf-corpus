document: rfc-7441
kind: design-rationale
summary: The new mLDP route type codepoints are assigned so that the high-order two bits are 0x01 and the low-order six bits match the corresponding Generic/PIM route type codepoints from RFC 6514. This pairing scheme allows implementations to correlate mLDP and PIM variants of the same route type.
section: "3"
topics:
