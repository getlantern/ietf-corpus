document: rfc-6854
kind: design-rationale
summary: 'Group syntax was previously forbidden in ''From:'' and ''Sender:'' because those fields required usable reply addresses. The change is motivated by two new use cases: automated systems that cannot handle replies (needing an empty group to signal no-reply), and internationalized email addresses that older clients cannot reply to but can still display using the group label.'
section: "1"
topics:
    - email
