document: rfc-4932
kind: normative-requirement
summary: A host name object SHOULD NOT be deleted if it is associated with any other object (e.g., a domain object). Deleting a host with existing associations can cause DNS resolution failure for domain objects referencing the deleted host.
section: 3.2.2
rfc2119_level: SHOULD NOT
topics:
    - dns
    - registry
