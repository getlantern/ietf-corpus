document: rfc-8642
kind: design-rationale
summary: RFC 1997 did not prescribe fully how well-known communities may be manipulated by operator policies, leading to divergent implementations. This document exists to document those differences and prevent further divergence rather than mandate a single unified behavior, because changing existing implementations would be operationally disruptive.
section: "1"
topics:
    - bgp
    - routing
