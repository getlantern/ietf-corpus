document: rfc-8591
kind: interoperability-note
summary: Intermediaries that insert IMDN notification requests or other metadata into end-to-end signed messages will cause signature validation to fail. Systems using S/MIME with IMDN must account for this incompatibility.
section: "9.2"
topics:
    - sip
    - security
