document: rfc-7909
kind: security-consideration
summary: A maintainer may include attributes in the signature that reference resources not covered by the resource certificate used to sign — potentially asserting use of resources the maintainer is not authorized for. Verifiers should be aware this authorization gap exists.
section: "6"
topics:
    - routing
    - security
