document: rfc-8435
kind: state-machine
summary: 'Loosely coupled locking model: OPENs, byte-range locks, delegations, TEST_STATEID, and FREE_STATEID are all handled locally by the MDS using anonymous stateids for storage device I/O. Mandatory byte-range locking cannot be supported. In case of stateid revocation, the MDS prevents client access and may use fencing.'
section: 2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
