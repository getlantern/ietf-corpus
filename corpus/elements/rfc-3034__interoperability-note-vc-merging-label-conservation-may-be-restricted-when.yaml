document: rfc-3034
kind: interoperability-note
summary: VC merging (label conservation) may be restricted when Frame Relay fragmentation is in use, because fragments of distinct frames must not be interleaved on the outgoing DLCI. Merging is only safe if the fragmenting FR-LSR guarantees in-sequence, non-interleaved transmission of all fragments of a given frame.
section: "7.2"
topics:
    - mpls
