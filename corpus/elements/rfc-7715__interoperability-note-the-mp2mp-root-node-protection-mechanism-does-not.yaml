document: rfc-7715
kind: interoperability-note
summary: The MP2MP root node protection mechanism does not replace Root Node Redundancy (RNR) procedures from RFC 6388 Section 7. Node protection restores traffic for existing MP2MP LSPs after node failure, but a new root node must eventually be elected to allow creation of new MP2MP LSPs.
section: "2.2"
topics:
    - mpls
    - routing
