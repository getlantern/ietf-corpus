document: rfc-1864
kind: security-consideration
summary: Content-MD5 provides a data integrity service that protects against accidental modification in transit from sender to recipient. It does not provide a secure integrity service; Privacy Enhanced Mail (PEM) is conjectured to protect data from all modifications, including intentional ones.
section: "4"
topics:
