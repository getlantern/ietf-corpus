document: rfc-8581
kind: interoperability-note
summary: The reacting node's requirement to ignore peer reports whose SourceID does not match the sending peer's DiameterIdentity is specifically designed to handle cases where peer reports are erroneously or maliciously inserted by non-supporting intermediate nodes.
