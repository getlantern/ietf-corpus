document: rfc-5919
kind: interoperability-note
summary: There is no guarantee that an LDP speaker will receive or send an End-of-LIB Notification even if the Unrecognized Notification capability has been advertised by both peers, as supporting the capability does not mandate sending or processing End-of-LIB. The EOL timer handles this gap.
section: "4.1"
topics:
