document: rfc-9630
kind: design-rationale
summary: Two Extension-Flag bits (N and I) are required to signal the Multicast Branch ID field rather than one, because RFC 9326 specifies that each extension flag indicates the presence of only a 4-octet optional data field, whereas the Multicast Branch ID requires 8 octets.
section: "4.1"
topics:
    - multicast
    - measurement
