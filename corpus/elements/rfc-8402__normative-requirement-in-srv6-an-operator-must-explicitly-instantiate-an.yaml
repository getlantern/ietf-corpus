document: rfc-8402
kind: normative-requirement
summary: In SRv6, an operator MUST explicitly instantiate an SRv6 SID; IPv6 node addresses are not SRv6 SIDs by default. A node advertising address R as a segment MUST maintain a FIB entry with Incoming Active Segment = R, Ingress Operation = NEXT, Egress interface = NULL.
section: 3.1.3
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
