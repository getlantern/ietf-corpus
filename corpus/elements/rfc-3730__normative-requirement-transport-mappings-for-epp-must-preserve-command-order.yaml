document: rfc-3730
kind: normative-requirement
summary: Transport mappings for EPP MUST preserve command order, address session/connection relationships, preserve statefulness, frame data units, ensure reliability, use congestion-avoiding transports (TCP or SCTP, or SMTP/BEEP with overload considerations), and explicitly allow or prohibit pipelining.
section: "2.1"
rfc2119_level: MUST
topics:
    - tcp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
