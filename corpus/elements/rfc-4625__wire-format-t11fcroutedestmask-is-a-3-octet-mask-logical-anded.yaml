document: rfc-4625
kind: wire-format
summary: t11FcRouteDestMask is a 3-octet mask logical-ANDed with a destination FC Address ID before comparison. Allowed values are 255.255.255, 255.255.0, or 255.0.0; FSPF-generated routes always use 255.0.0 (Domain_ID level). The zero-length value equals 0.0.0.
