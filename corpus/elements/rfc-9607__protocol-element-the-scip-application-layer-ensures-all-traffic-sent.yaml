document: rfc-9607
kind: protocol-element
summary: The SCIP application layer ensures all traffic sent to the RTP layer does not exceed MTU size. The receiving SCIP RTP layer handles packet identification, ordering, and reassembly; error detection and retransmission are handled at the SCIP application layer when required.
