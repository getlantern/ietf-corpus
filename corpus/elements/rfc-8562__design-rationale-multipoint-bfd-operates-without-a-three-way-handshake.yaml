document: rfc-8562
kind: design-rationale
summary: Multipoint BFD operates without a three-way handshake because the many-to-one nature of multipoint paths makes session establishment and teardown handshakes neither possible nor appropriate. Tails may discover the head dynamically from received BFD packets alone.
section: "5.6"
topics:
    - routing
    - multicast
