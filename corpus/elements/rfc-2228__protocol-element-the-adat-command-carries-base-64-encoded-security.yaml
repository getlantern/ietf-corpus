document: rfc-2228
kind: protocol-element
summary: The ADAT command carries base 64 encoded security data enabling an arbitrary multi-round security protocol exchange. The server replies 235 when the exchange completes successfully (optionally including 'ADAT=base64data' in reply text), 335 when more data is needed, or 501/535/503 on errors.
