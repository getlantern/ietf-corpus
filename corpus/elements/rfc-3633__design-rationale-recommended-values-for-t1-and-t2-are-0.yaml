document: rfc-3633
kind: design-rationale
summary: Recommended values for T1 and T2 are 0.5 and 0.8 times the shortest preferred lifetime of the prefixes in the IA_PD, respectively. This allows the requesting router to extend lifetimes before they expire even if the delegating router is unavailable for a short period. If renewal timing should be left to the requesting router's discretion, the delegating router sets T1 and T2 to 0.
section: "9"
