document: rfc-6552
kind: normative-requirement
summary: An implementation MAY allow configuration of a maximum stretch_of_rank, which MUST be less than or equal to MAXIMUM_RANK_STRETCH (5). If none is configured, a value of 0 is assumed and the step_of_rank is not stretched.
section: "7.1"
rfc2119_level: MUST
topics:
