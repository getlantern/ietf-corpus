document: rfc-6633
kind: security-consideration
summary: ICMP Source Quench messages can be leveraged for 'blind throughput-reduction' attacks against TCP and similar protocols, as documented in RFC 5927. Silently ignoring all Source Quench messages, as mandated by this document, eliminates this attack vector.
section: "8"
topics:
    - security
    - tcp
    - ip
