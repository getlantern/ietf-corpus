document: rfc-6327
kind: normative-requirement
summary: Although MTU testing is optional, it is mandatory for an RBridge to respond to an MTU-probe PDU with an MTU-ack PDU. MTU testing is only performed in the Designated VLAN.
section: "5"
rfc2119_level: REQUIRED
