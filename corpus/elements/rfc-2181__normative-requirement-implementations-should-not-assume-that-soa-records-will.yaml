document: rfc-2181
kind: normative-requirement
summary: Implementations should not assume that SOA records will have a TTL of zero, nor are they required to send SOA records with a TTL of zero. The RFC1035 suggestion that SOA TTL should always be zero to prevent caching is not to be followed.
section: "7.2"
rfc2119_level: SHOULD NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
