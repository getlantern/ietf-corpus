document: rfc-5084
kind: security-consideration
summary: Implementations must randomly generate content-authenticated-encryption keys using a cryptographically strong PRNG. Weak PRNGs allow an attacker to reproduce the key generation environment and search a small key space rather than brute-forcing the full space. RFC 4086 guidance applies.
section: "4"
topics:
    - crypto
    - security
