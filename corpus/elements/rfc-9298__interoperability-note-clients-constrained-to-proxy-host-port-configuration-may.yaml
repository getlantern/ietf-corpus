document: rfc-9298
kind: interoperability-note
summary: Clients constrained to proxy host:port configuration MAY use the default template 'https://$PROXY_HOST:$PROXY_PORT/.well-known/masque/udp/{target_host}/{target_port}/'. UDP proxy deployments SHOULD offer service at this location to interoperate with such clients.
section: "2"
topics:
