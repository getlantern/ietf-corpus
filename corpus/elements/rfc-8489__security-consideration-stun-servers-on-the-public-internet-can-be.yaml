document: rfc-8489
kind: security-consideration
summary: 'STUN servers on the public Internet can be abused to launch amplification DDoS attacks (Attack I): an attacker spoofs the source address of Binding requests so that STUN responses are directed at a victim. The long-term credential mechanism mitigates this by requiring authentication before responses are sent.'
section: 16.2.1
topics:
    - nat
    - security
