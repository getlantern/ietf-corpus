document: rfc-3230
kind: wire-format
summary: 'An instance digest is encoded as: digest-algorithm ''='' <encoded digest output>, where the encoding format is defined per algorithm (e.g., base64 for MD5 and SHA, decimal ASCII for UNIXsum/UNIXcksum). Examples: ''MD5=HUXZLQLMuI/KZ5KDcJPcOA=='' and ''UNIXsum=30637''.'
section: "4.2"
topics:
