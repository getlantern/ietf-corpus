document: rfc-6352
kind: wire-format
summary: 'CARDDAV:address-data XML element carries vCard data in REPORT responses and specifies partial retrieval in requests. Attributes: content-type (default ''text/vcard'') and version (default ''3.0''). Child CARDDAV:prop elements with ''name'' and optional ''novalue'' attributes select individual vCard properties.'
section: "10.4"
