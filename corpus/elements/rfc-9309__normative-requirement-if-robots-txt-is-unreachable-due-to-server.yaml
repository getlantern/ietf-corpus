document: rfc-9309
kind: normative-requirement
summary: If robots.txt is unreachable due to server or network errors (e.g., HTTP 500-599), the crawler MUST assume complete disallow. If undefined for a reasonably long period (e.g., 30 days), crawlers MAY assume unavailability or continue using a cached copy.
section: 2.3.1.4
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
