document: rfc-4582
kind: wire-format
summary: The PRIORITY attribute (type 4, OctetString16 format) carries a 3-bit Prio field with values 0 (Lowest) through 4 (Highest); the default when the attribute is absent is 2 (Normal). Receivers MUST treat values greater than 4 as if the value were 4.
section: 5.2.4
topics:
