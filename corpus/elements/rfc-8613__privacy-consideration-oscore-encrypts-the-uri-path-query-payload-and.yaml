document: rfc-8613
kind: privacy-consideration
summary: OSCORE encrypts the URI path, query, payload, and most options, but leaves the IP addresses, CoAP Token, and Outer options (Uri-Host, Uri-Port) visible to observers. An on-path attacker can perform traffic analysis based on message timing, size, and frequency even though content is encrypted.
section: "12.8"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
