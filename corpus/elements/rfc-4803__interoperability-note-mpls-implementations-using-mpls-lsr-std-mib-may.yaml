document: rfc-4803
kind: interoperability-note
summary: MPLS implementations using MPLS-LSR-STD-MIB may reference labels held in GMPLS-LABEL-STD-MIB via label pointer objects (such as mplsInSegmentLabelPtr) without implementing GMPLS-LSR-STD-MIB. This allows incremental adoption of the GMPLS label table by purely MPLS deployments.
section: "1.1"
topics:
    - mpls
