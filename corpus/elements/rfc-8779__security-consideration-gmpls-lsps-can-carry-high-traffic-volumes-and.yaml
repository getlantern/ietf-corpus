document: rfc-8779
kind: security-consideration
summary: GMPLS LSPs can carry high traffic volumes and form critical infrastructure; the PCE plays a key role in resource usage and physical path determination. PCE and PCC SHOULD use TLS (RFC 8253) for authentication, message integrity, replay protection, and confidentiality. PCC SHOULD have policies to validate that returned paths satisfy the provided constraints.
section: "6"
topics:
    - security
    - routing
    - tls
