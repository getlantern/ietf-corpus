document: rfc-4856
kind: design-rationale
summary: The encoding considerations field was updated from requiring RTP transport to instead warning that types are 'framed binary data'; RTP transport dependency is now expressed under 'restrictions on usage'. This reflects the revised registration procedures in RFC 4288 and RFC 4855.
