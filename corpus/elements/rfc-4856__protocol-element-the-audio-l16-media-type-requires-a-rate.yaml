document: rfc-4856
kind: protocol-element
summary: The audio/L16 media type requires a 'rate' parameter; for non-RTP transport, permissible values are 8000, 11025, 16000, 22050, 24000, 32000, 44100, and 48000 samples/second. For RTP transport, other values are permissible but the aforementioned values are RECOMMENDED.
section: 2.1.15
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
