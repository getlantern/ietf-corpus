document: rfc-3284
kind: normative-requirement
summary: If VCD_DECOMPRESS was set in the header and any of VCD_DATACOMP, VCD_INSTCOMP, or VCD_ADDRCOMP bits are set in Delta_Indicator, those sections MUST be decompressed using the specified secondary compressor before decoding the delta instructions.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
