document: rfc-7001
kind: security-consideration
summary: Verifiers performing 'iprev' DNS lookups must guard against DNS-based denial-of-service attacks by bounding the number of PTR and A/AAAA queries, as described in Section 5.5 of RFC 4408. Unbounded queries can be induced by crafted PTR records.
section: "7.4"
topics:
    - dns
    - email
    - security
