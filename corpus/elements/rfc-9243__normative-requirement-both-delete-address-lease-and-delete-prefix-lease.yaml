document: rfc-9243
kind: normative-requirement
summary: Both delete-address-lease and delete-prefix-lease RPCs carry the nacm:default-deny-all extension, meaning access to these operations is denied by default and must be explicitly granted via NETCONF Access Control Model (NACM, RFC 8341) rules.
section: "4.2"
rfc2119_level: MUST
topics:
