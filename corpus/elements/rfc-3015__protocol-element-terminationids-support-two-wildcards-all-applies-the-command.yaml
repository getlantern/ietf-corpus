document: rfc-3015
kind: protocol-element
summary: 'TerminationIDs support two wildcards: ALL (applies the command to every matching Termination, with responses optionally merged via UNION suppressing duplicates) and CHOOSE (instructs the MG to select any qualifying Termination within a partially specified ID, e.g., any circuit in a trunk group).'
