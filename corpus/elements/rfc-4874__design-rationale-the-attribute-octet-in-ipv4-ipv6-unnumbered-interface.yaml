document: rfc-4874
kind: design-rationale
summary: The Attribute octet in IPv4/IPv6/Unnumbered Interface subobjects was introduced to allow a single interface address to express exclusion of the interface only (0), the whole node (1), or all SRLGs associated with that interface (2). This avoids needing separate subobjects for each exclusion granularity.
section: "3.1"
topics:
    - mpls
    - routing
