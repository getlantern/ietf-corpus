document: rfc-2815
kind: protocol-element
summary: 'The IEEE 802.1Q user_priority field carries a traffic class indicator within data frames. It takes values 0–7, with Table 1 providing the default mapping: 0 = Best Effort, 1 = less than Best Effort, 2–3 = reserved, 4 = Delay Sensitive (no bound), 5 = Delay Sensitive (100 ms), 6 = Delay Sensitive (10 ms), 7 = Network Control.'
section: "3.2"
