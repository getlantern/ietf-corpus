document: rfc-6672
kind: normative-requirement
summary: Resource records MUST NOT exist at any subdomain of the owner of a DNAME RR. A server MAY refuse to load a zone that has data at a subdomain of a DNAME RR owner.
section: "2.4"
rfc2119_level: MUST NOT
