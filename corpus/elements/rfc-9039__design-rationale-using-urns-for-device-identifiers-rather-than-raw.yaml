document: rfc-9039
kind: design-rationale
summary: Using URNs for device identifiers rather than raw octet strings (e.g., 4-byte binary MAC addresses) is preferred because URNs are universally recognized and self-describing, avoiding the need to agree on interpretation. The extra bytes consumed are justified by the flexibility and interoperability gained.
section: "1"
extracted_by: claude-sonnet-4-6
