document: rfc-7216
kind: protocol-element
summary: LIS discovery using IP addresses and reverse DNS provides alternative domain names as input to the DDDS process when DHCP-based discovery fails. A Device collects its IP addresses, converts them to reverse DNS names in the '.in-addr.arpa.' or '.ip6.arpa.' tree, performs DDDS queries, and shortens names iteratively to find a LIS.
section: "4"
topics:
