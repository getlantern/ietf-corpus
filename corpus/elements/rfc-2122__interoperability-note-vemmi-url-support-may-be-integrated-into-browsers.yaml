document: rfc-2122
kind: interoperability-note
summary: VEMMI URL support may be integrated into browsers via the WWW_RegisterProtocol API or an associated plug-in. The application/vemmi MIME type in the HTTP Accept header can be used to detect VEMMI browser support server-side.
