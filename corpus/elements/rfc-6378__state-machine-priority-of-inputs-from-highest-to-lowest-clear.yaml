document: rfc-6378
kind: state-machine
summary: 'Priority of inputs from highest to lowest: Clear, Lockout of protection, Forced Switch, Signal Fail on protection, Signal Fail on working, Signal Degrade on working, Clear Signal Fail/Degrade, Manual Switch, WTR Expires, No Request. Remote messages are assigned priority just below the analogous local input.'
