document: rfc-8669
kind: protocol-element
summary: The BGP Prefix-SID attribute is an optional, transitive BGP path attribute assigned type code 40. It is encoded as a set of TLVs, each starting with a 1-octet type and 2-octet length, and may be attached to Multiprotocol BGP IPv4/IPv6 Labeled Unicast prefixes.
