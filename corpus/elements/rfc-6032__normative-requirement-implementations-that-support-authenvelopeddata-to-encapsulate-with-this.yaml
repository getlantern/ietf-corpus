document: rfc-6032
kind: normative-requirement
summary: Implementations that support AuthEnvelopedData to encapsulate with this content type MUST support an EncryptedKeyPackage that encapsulates either a SymmetricKeyPackage or an AsymmetricKeyPackage directly (without an intervening SignedData).
section: "2"
rfc2119_level: MUST
topics:
