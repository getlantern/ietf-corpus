document: rfc-8277
kind: design-rationale
summary: The 'Advertising Multiple Routes to a Destination' feature from RFC 3107 (Capability Code 4) is removed because it was never implemented as specified. RFC 7911 (ADD-PATH) provides the same functionality and is the preferred mechanism; Capability Code 4 is now deprecated.
