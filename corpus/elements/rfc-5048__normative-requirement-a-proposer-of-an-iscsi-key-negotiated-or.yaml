document: rfc-5048
kind: normative-requirement
summary: A proposer of an iSCSI key (negotiated or declarative) in a text key exchange MUST be able to properly handle a NotUnderstood response. A NotUnderstood answer on any RFC 3720 key MUST be considered a protocol error.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
