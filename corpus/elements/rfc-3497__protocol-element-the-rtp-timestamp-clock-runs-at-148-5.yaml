document: rfc-3497
kind: protocol-element
summary: The RTP timestamp clock runs at 148.5 MHz (or 148.5/1.001 MHz), providing a unique timestamp for each 10-bit word in the SMPTE 292M stream. This allows the receiver to reconstruct stream timing without knowledge of the specific source format (e.g., SMPTE 274M or 296M). The 32-bit timestamp wraps around in approximately 21 seconds.
section: "5.1"
topics:
