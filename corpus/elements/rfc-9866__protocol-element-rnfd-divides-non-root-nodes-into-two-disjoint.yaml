document: rfc-9866
kind: protocol-element
summary: 'RNFD divides non-root nodes into two disjoint roles per DODAG Version: Sentinels (DODAG root''s neighbors that actively monitor the root''s link status) and Acceptors (all other nodes that collect and propagate Sentinel observations). The DODAG root is always an Acceptor and MUST NOT switch roles.'
section: "3"
