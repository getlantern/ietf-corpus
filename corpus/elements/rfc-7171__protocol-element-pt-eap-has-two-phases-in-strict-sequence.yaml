document: rfc-7171
kind: protocol-element
summary: 'PT-EAP has two phases in strict sequence: a negotiation phase (initiated by the NEA Server''s Start message) and a data transport phase (where PB-TNC batches are exchanged, always beginning with the NEA Client sending first). The data transport phase always ends with an EAP Response from the NEA Client.'
section: "3.1"
topics:
    - security
