document: rfc-7247
kind: interoperability-note
summary: RFC 6120 binds XMPP exclusively to TCP, so a SIP-to-XMPP gateway must support TCP. By contrast, RFC 3261 allows either TCP or UDP for SIP, and a deployment may support only UDP; therefore an XMPP-to-SIP gateway may need to use either TCP or UDP.
section: "5"
topics:
