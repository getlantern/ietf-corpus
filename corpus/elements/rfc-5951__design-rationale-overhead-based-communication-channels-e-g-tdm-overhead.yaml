document: rfc-5951
kind: design-rationale
summary: Overhead-based Communication Channels (e.g., TDM overhead bytes) are explicitly not available in MPLS-TP because there are no overhead bytes in MPLS-TP transport connections, making this CCh realization type inapplicable to the MPLS-TP environment.
