document: rfc-3524
kind: normative-requirement
summary: It is STRONGLY RECOMMENDED that integrity protection be applied to SDP session descriptions to prevent tampering with SRF group lines. For SIP-transported SDP, S/MIME is the natural choice for end-to-end integrity protection. Other applications MAY use a different form of integrity protection.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
