document: rfc-8083
kind: normative-requirement
summary: Implementations without RTCP that claim to support RTP SHOULD NOT be used on networks that might be subject to congestion unless equivalent non-RTCP feedback mechanisms for congestion reporting and circuit breaker conditions are defined.
