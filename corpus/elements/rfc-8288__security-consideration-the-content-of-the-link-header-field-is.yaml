document: rfc-8288
kind: security-consideration
summary: The content of the Link header field is not secure, private, or integrity-guaranteed. TLS with HTTP is currently the only end-to-end way to provide these properties. Applications ought to consider attack vectors from automatically following or trusting links in HTTP header fields.
section: "5"
topics:
    - security
    - http
    - tls
