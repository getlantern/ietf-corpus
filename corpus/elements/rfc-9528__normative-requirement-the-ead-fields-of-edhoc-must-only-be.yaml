document: rfc-9528
kind: normative-requirement
summary: 'The EAD fields of EDHOC MUST only be used with registered EAD items from the EDHOC External Authorization Data Registry. The compact encoding for ID_CRED_x containing only a ''kid'' parameter MUST be applied if and only if ID_CRED_x = {4: kid_x} and ID_CRED_x appears in PLAINTEXT_y.'
section: "3.8"
rfc2119_level: MUST
topics:
    - cbor
    - registry
