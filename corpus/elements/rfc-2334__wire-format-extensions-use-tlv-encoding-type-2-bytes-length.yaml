document: rfc-2334
kind: wire-format
summary: 'Extensions use TLV encoding: Type (2 bytes), Length (2 bytes, value only), Value (variable). The extensions block is terminated by End-of-Extensions with Type=0, Length=0. Each extension type may appear at most once per packet; an LS MUST NOT reorder extensions.'
section: B.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
