document: rfc-8870
kind: normative-requirement
summary: EKT MUST NOT be used in conjunction with SRTP's MKI (Master Key Identifier) or with SRTP's <From, To> fields. Senders MUST NOT include the MKI when using EKT. Receivers SHOULD simply ignore any MKI field received if EKT is in use.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
