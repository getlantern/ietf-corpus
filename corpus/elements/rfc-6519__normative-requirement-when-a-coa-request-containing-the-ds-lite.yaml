document: rfc-6519
kind: normative-requirement
summary: When a CoA Request containing the DS-Lite-Tunnel-Name attribute is received, the NAS MUST send a DHCPv6 Reconfigure message to the B4 so that it initiates a Renew/Reply or Information-Request/Reply to retrieve the updated AFTR name.
section: "4.1"
rfc2119_level: MUST
topics:
    - radius
    - v6ops
