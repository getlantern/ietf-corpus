document: rfc-2589
kind: protocol-element
summary: A dynamic entry is an LDAP directory entry with a time-to-live (TTL) that decrements automatically. If not refreshed before the TTL expires, the entry disappears from the directory as if deleted by an LDAP delete operation.
section: "3.1"
topics:
    - ldap
