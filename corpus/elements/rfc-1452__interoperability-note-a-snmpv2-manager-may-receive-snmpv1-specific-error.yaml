document: rfc-1452
kind: interoperability-note
summary: A SNMPv2 manager may receive SNMPv1-specific error-status values (noSuchName, badValue, readOnly) via a proxy agent. The SNMPv2 manager must be capable of correctly interpreting these values even though a native SNMPv2 entity would never generate them.
section: 3.1.2
topics:
    - snmp
