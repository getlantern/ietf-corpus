document: rfc-8973
kind: normative-requirement
summary: When the DHCPv6 client receives both OPTION_V6_DOTS_RI and OPTION_V6_DOTS_ADDRESS, the name in OPTION_V6_DOTS_RI MUST NOT be passed to an underlying resolution library; the addresses from OPTION_V6_DOTS_ADDRESS are used directly, and the name is used solely as a PKIX reference identifier for authentication.
section: 5.1.3
rfc2119_level: MUST NOT
topics:
    - dns
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
