document: rfc-2205
kind: design-rationale
summary: 'Reservations downstream of an Admission Control failure are retained rather than deleted for three reasons: the receiver may want partial-path QoS; removing them would impair RSVP''s recovery from transient route flaps; and intermittent teardown/restore cycles would degrade user experience.'
section: "2.5"
