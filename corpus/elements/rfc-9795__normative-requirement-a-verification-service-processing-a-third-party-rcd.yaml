document: rfc-9795
kind: normative-requirement
summary: A verification service processing a third-party "rcd" PASSporT MUST confirm that the calling party number in the "orig" claim matches the actual calling party number of the received call, and that the "iat" field falls within an acceptable date interval.
section: "10.2"
rfc2119_level: MUST
