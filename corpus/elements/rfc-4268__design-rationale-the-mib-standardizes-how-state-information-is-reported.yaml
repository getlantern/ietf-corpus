document: rfc-4268
kind: design-rationale
summary: The MIB standardizes how state information is reported rather than attempting to standardize the behaviors and characteristics of various physical classes, because real-world products within the same physical class vary substantially. Guidance is provided for cases where a physical class instance cannot support part or all of a particular state.
section: "2.4"
topics:
