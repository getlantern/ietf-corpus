document: rfc-8560
kind: normative-requirement
summary: C-MAC addresses learned over local Attachment Circuits by an EVPN PE MUST be injected into the corresponding MAC-VRF and MUST be advertised in the control plane using BGP EVPN routes. This distinguishes AC-learned MACs from PW-learned MACs in the integration model.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
