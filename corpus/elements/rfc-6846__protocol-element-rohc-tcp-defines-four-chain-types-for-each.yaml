document: rfc-6846
kind: protocol-element
summary: 'ROHC-TCP defines four chain types for each compressed header: static chain (IR packets only), dynamic chain (IR and IR-DYN), replicate chain (IR-CR only), and irregular chain (CO packets only). Each chain groups header fields by characteristic—static, dynamic, replicable, or irregular—and is assembled by appending one item per header in order of appearance.'
section: "6.2"
topics:
    - tcp
    - ip
