document: rfc-7571
kind: design-rationale
summary: The loopback mechanism uses RFC7570 ERO Hop Attributes subobjects to address loopback requests to a specific intermediate node, enabling on-demand OAM targeting without requiring new RSVP-TE object types. This complements RFC7487's proactive OAM configuration.
section: "3.2"
topics:
