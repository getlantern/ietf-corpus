document: rfc-1448
kind: design-rationale
summary: SNMPv2 requires only an unreliable datagram service, with every message entirely and independently contained in a single transport datagram. The preferred transport mapping is UDP. Retransmission of unanswered requests is left to the discretion of the requesting application, which must act responsibly regarding frequency and duration.
section: "2.4"
topics:
    - snmp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
