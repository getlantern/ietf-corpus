document: rfc-3025
kind: protocol-element
summary: 'Four new error codes are defined: ERROR-FA-1 (100) and ERROR-FA-2 (101) for Foreign Agent rejection due to unsupported Vendor-ID or Vendor-CVSE-Type in CVSE from MN or HA respectively; ERROR-HA-1 (140) and ERROR-HA-2 (141) for Home Agent rejection due to unsupported Vendor-ID or Vendor-CVSE-Type in CVSE from MN or FA respectively.'
