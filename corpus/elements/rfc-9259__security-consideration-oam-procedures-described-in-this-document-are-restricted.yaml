document: rfc-9259
kind: security-consideration
summary: OAM procedures described in this document are restricted to an SR domain. O-flag manipulation (like SID manipulation) is not considered a threat within the SR domain; procedures for securing an SR domain are defined in Sections 5.1 and 7 of RFC 8754.
