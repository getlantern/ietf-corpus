document: rfc-5213
kind: design-rationale
summary: PMIPv6 is built on top of Mobile IPv6 to reuse home agent functionality and well-tested signaling message formats, enabling a common home agent to serve both host-based MIPv6 and network-based PMIPv6 mobile nodes without requiring a separate new anchor infrastructure.
