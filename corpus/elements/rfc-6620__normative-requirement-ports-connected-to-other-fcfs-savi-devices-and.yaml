document: rfc-6620
kind: normative-requirement
summary: Ports connected to other FCFS SAVI devices and ports connected to routers MUST be configured as Trusted Ports. Ports connected to hosts SHOULD be configured as Validating Ports; untrusted hosts MUST be on Validating Ports.
