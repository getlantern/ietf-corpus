document: rfc-9179
kind: design-rationale
summary: A separate 'Geodetic System Values' registry was created rather than reusing the 'geo' URI 'crs' Parameter Values registry from RFC 5870 because that registry has a very strict modification policy by design. This module requires broader scope (non-Earth bodies, alternate systems) and easier modification to avoid proliferation issues.
section: "6.1"
topics:
