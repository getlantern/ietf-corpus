document: rfc-4750
kind: normative-requirement
summary: ospfIfHelloInterval must be the same for all routers attached to a common network; the default is 10 seconds. Similarly, ospfIfRtrDeadInterval must be the same for all routers on a common network; the default is 40 seconds (four times the Hello interval).
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
