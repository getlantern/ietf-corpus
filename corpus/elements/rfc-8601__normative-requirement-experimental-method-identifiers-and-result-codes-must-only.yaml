document: rfc-8601
kind: normative-requirement
summary: Experimental method identifiers and result codes MUST only be used within ADMDs that have explicitly consented to use them. Any MTA, MUA, or downstream filter for production use SHOULD ignore or delete any Authentication-Results header field containing an experimental (unknown) method identifier.
section: 2.7.6
rfc2119_level: MUST
topics:
    - email
