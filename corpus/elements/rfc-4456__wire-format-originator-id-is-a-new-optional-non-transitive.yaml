document: rfc-4456
kind: wire-format
summary: ORIGINATOR_ID is a new optional, non-transitive BGP path attribute with Type code 9. It is 4 bytes long and carries the BGP Identifier of the originator of the route in the local AS, created by the RR when reflecting a route.
