document: rfc-5438
kind: design-rationale
summary: Display notification indicates the start of rendering (including audio/video) rather than confirmed user reading, because there is no positive acknowledgement from the user. Therefore, the protocol explicitly cannot be used as a certified proof of reading.
section: "5.3"
topics:
    - realtime
    - sip
