document: rfc-9129
kind: protocol-element
summary: 'Area type is expressed via identityref with base ''area-type'': normal-area, stub-area (derived from stub-nssa-area), and nssa-area (derived from stub-nssa-area, per RFC 3101). The ''summary'' leaf controls inter-area summary LSA generation and ''default-cost'' sets the default metric for stub/NSSA areas.'
section: "2.6"
topics:
