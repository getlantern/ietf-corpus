document: rfc-8275
kind: design-rationale
summary: Linux local filesystems already ignore the umask whenever a newly created file inherits ACEs from its parent directory. The NFSv4 extension mirrors this established local-filesystem behavior to achieve equivalent semantics over NFS.
section: "1"
