document: rfc-951
kind: protocol-element
summary: 'When ciaddr is zero (client does not know its IP), the server delivering a bootreply has two options: (a) manually inject an ARP cache entry mapping chaddr to yiaddr and unicast the reply, or (b) broadcast the reply on the appropriate interface.'
