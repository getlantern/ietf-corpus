document: rfc-8873
kind: design-rationale
summary: The 'msrp-cema' DCSA-embedded attribute is mandated because the 'path' attribute is not used for routing MSRP messages over data channels — the data channel itself is established by SDP offer/answer (RFC 8864), making MSRP CEMA-like behavior the operative model rather than legacy MSRP relay-based routing.
section: "4.4"
topics:
