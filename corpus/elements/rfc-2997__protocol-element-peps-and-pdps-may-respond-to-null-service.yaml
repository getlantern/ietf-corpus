document: rfc-2997
kind: protocol-element
summary: PEPs and PDPs may respond to Null Service PATH messages by returning an RSVP RESV message containing a DCLASS object, which instructs the sender to mark packets on the corresponding flow with a specific DSCP or set of DSCPs. This allows policy agents to steer traffic to the appropriate diffserv behavior aggregate.
section: "2"
topics:
    - diffserv
    - qos
