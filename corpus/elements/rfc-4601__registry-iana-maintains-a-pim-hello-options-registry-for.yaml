document: rfc-4601
kind: registry
summary: IANA maintains a PIM Hello Options registry for TLV option types in PIM Hello messages. Defined options include Holdtime (type 1), LAN Prune Delay (type 2), DR Priority (type 19), Generation ID (type 20), and Address List (type 24). New option types require IANA assignment.
