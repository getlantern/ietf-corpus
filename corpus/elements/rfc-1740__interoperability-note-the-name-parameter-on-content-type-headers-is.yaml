document: rfc-1740
kind: interoperability-note
summary: The NAME parameter on Content-Type headers is restricted to seven-bit US-ASCII characters per RFC-1521's definition of 'value', which means non-ASCII Macintosh filenames cannot be faithfully represented in the parameter.
