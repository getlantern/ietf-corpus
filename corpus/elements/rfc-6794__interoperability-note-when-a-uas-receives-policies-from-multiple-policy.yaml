document: rfc-6794
kind: interoperability-note
summary: When a UAS receives policies from multiple policy servers and one returns a data element (as defined by RFC 6796) indicating information-sharing is required, the UAS MUST contact all policy servers a second time after the first round to allow cross-server coordination (e.g., when two servers each insert a media intermediary requiring each other's IP/port).
section: 4.5.2
topics:
    - sip
extracted_by: claude-sonnet-4-6
