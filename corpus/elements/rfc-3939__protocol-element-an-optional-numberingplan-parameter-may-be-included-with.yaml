document: rfc-3939
kind: protocol-element
summary: 'An optional NumberingPlan parameter MAY be included with the Caller-ID field. Three defined semantics are: ''unknown'' (default when absent), ''local'' (meaningful only within the sending voice mail system''s domain), and ''e164'' (ITU-T E.164 international numbering). The ''x-'' prefix may indicate enterprise or service-specific plans.'
section: "3.3"
topics:
    - email
    - registry
