document: rfc-6415
kind: registry
summary: RFC 6415 registers the 'lrdd' link relation type in the Link Relation Type Registry (RFC 5988). It refers to a Link-based Resource Descriptor Document providing further information about the link's context. LRDD resources MUST have an 'application/xrd+xml' representation and MAY have others.
section: "6.3"
topics:
