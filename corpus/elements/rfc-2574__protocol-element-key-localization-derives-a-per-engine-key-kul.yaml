document: rfc-2574
kind: protocol-element
summary: Key localization derives a per-engine key Kul from a master key Ku by computing H(Ku || snmpEngineID || Ku), where H is the authentication hash (MD5 or SHA). This ensures a user's secret is different at each authoritative SNMP engine even if the same password is used network-wide.
section: "2.6"
topics:
    - snmp
    - security
    - crypto
