document: rfc-9953
kind: security-consideration
summary: A DoC client must be aware that the DoC server may communicate unprotected (e.g., DNS over UDP) with upstream DNS infrastructure. DoC only guarantees confidentiality and integrity between parties sharing a security context; DNSSEC (BCP237) can provide record integrity upstream.
section: "7"
topics:
    - dns
    - security
    - privacy
