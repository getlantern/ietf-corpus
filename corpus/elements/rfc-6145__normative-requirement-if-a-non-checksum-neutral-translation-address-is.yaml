document: rfc-6145
kind: normative-requirement
summary: If a non-checksum-neutral translation address is used, ICMPv6 messages MUST have their ICMPv4 checksum updated. In the IPv6-to-IPv4 direction, translators MUST recalculate checksums for TCP, UDP, and ICMP.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
