document: rfc-6630
kind: protocol-element
summary: 'The pre-established Master Session Key (pMSK) is derived from the pRK as: pMSK = KDF(pRK, ''EAP Early-Authentication Master Session Key@ietf.org'' | ''\0'' | SEQ | length). SEQ is the 16-bit sequence number from the ERP/AAK message and makes each pMSK unique per CAP.'
section: "4.1"
