document: rfc-4005
kind: wire-format
summary: 'The Framed-Route AVP (AVP Code 22) encodes routes as UTF8String: ''destination-prefix[/length] gateway metric(s)'', e.g., ''192.168.1.0/24 192.168.1.1 1''. Gateway ''0.0.0.0'' means the user''s IP address should be used.'
