document: rfc-5844
kind: normative-requirement
summary: If a Proxy Binding Update contains an IPv4 Home Address Request option but no Home Network Prefix option, the LMA MUST NOT reject the request solely for missing the Home Network Prefix option; at least one of these two options MUST be present.
section: 3.1.2.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
