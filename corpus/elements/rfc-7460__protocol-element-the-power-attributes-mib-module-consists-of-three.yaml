document: rfc-7460
kind: protocol-element
summary: 'The POWER-ATTRIBUTES-MIB module consists of three tables for AC power quality: eoACPwrAttributesTable (single-phase aggregate measurements including voltage, current, frequency, active/reactive/apparent power, power factor, and THD), eoACPwrAttributesDelPhaseTable (DEL three-phase per-phase voltage), and eoACPwrAttributesWyePhaseTable (WYE three-phase per-phase measurements). Aligned with IEC 61850 7-2.'
section: 5.1.2
