document: rfc-2002
kind: security-consideration
summary: All registration messages must be authenticated using the Mobile-Home Authentication Extension to prevent remote redirection attacks. The protocol is vulnerable if authentication keys are compromised, as an attacker could redirect datagrams or deny service to a mobile node.
section: "5.2"
topics:
    - ip
    - security
