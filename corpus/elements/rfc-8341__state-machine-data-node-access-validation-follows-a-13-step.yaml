summary: 'Data node access validation follows a 13-step ordered procedure: check enable-nacm off, check recovery session, resolve groups, match rule-lists and rules, apply matching rule action, apply nacm:default-deny-all and nacm:default-deny-write annotations, then fall through to read-default, write-default, or exec-default depending on the operation type.'
