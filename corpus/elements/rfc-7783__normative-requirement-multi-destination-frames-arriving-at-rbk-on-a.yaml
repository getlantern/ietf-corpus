document: rfc-7783
kind: normative-requirement
summary: Multi-destination frames arriving at RBk on a tree where RBk has announced affinity of RBv MUST be forwarded to CE members of RBv in the frame's VLAN; frames arriving on a tree where RBk has NOT announced affinity of RBv MUST NOT be forwarded to CE members of RBv.
section: "5.5"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
