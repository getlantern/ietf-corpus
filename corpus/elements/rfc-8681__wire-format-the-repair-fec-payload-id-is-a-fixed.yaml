kind: wire-format
summary: 'The Repair FEC Payload ID is a fixed 64-bit header in network byte order: 16-bit Repair_Key (PRNG seed for the first repair symbol), 4-bit DT (density threshold), 12-bit NSS (number of source symbols in encoding window), and 32-bit FSS_ESI (ESI of the first source symbol in the encoding window).'
