document: rfc-7940
kind: wire-format
summary: 'The ''count'' attribute on match operators specifies repetition: ''n'' for exact count, ''n+'' for at least n, ''n:m'' for a range. Absent ''count'' means exactly once. Greedy matching is used as in regular expressions.'
section: 6.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
