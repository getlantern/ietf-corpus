document: rfc-5814
kind: interoperability-note
summary: For ingress-initiated LSP graceful release, clock synchronization between ingress and egress is required (T1 at ingress, T2 at egress). For egress-initiated graceful release, synchronization is not required because both timestamps are taken at the egress node.
section: "8.6"
topics:
