document: rfc-1654
kind: normative-requirement
summary: 'When advertising a route to an external BGP speaker, the advertising speaker shall prepend its own AS number to the AS_PATH: if the first segment is AS_SEQUENCE it prepends to that segment; if AS_SET, it prepends a new AS_SEQUENCE segment containing its own AS.'
section: 5.1.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
