summary: 'This document defines six OIDs in the ASN.1 module CMSAesRsaesOaep: three for AES-CBC content encryption (id-aes128-CBC, id-aes192-CBC, id-aes256-CBC) and three for AES key wrap (id-aes128-wrap, id-aes192-wrap, id-aes256-wrap), all under the NIST aes arc.'
