document: rfc-7761
kind: wire-format
summary: 'PIM Hello messages use a TLV option format. Defined options include: DR Priority (32-bit unsigned), Generation Identifier/GenID (32-bit random), LAN Prune Delay (T bit + 15-bit Propagation_Delay + 16-bit Override_Interval), and Address List. If the Holdtime option is absent, Default_Hello_Holdtime is used for the Neighbor Liveness Timer.'
section: 4.9.2
topics:
    - multicast
    - routing
