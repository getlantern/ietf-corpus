document: rfc-7428
kind: privacy-consideration
summary: DHCPv6 decouples the IPv6 address from the link-layer address and can provide enhanced privacy via short lease periods and fresh address assignments, but non-link-layer-derived IIDs cannot be compressed, increase datagram size, and require more frequent CID updates that can drain battery life on sleeping nodes.
section: "7"
topics:
    - privacy
    - ip
