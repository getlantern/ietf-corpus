document: rfc-9593
kind: protocol-element
summary: The responder sends SUPPORTED_AUTH_METHODS in the IKE_SA_INIT response; the initiator sends it in the IKE_AUTH request. If the notification fits, it is sent in IKE_SA_INIT; if too large, the responder may send an empty notification in IKE_SA_INIT to signal that the actual list will follow in an IKE_INTERMEDIATE exchange.
section: "3.1"
topics:
    - ipsec
    - security
