document: rfc-5886
kind: normative-requirement
summary: The monitoring-id-number MUST start at a non-zero value and MUST be incremented each time a new monitoring request is sent to a PCE. If no reply is received and the PCC resends, the same monitoring-id-number MUST be used; a different one MUST be used for distinct requests.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
