document: rfc-7978
kind: normative-requirement
summary: Local policies SHOULD generally be strict and only accept payload types that are required, and then only with adequate security for the particular circumstances. The processing of decapsulated extended RBridge Channel payloads is explicitly identified as a place where implementations SHOULD NOT be liberal in what they accept.
section: "7"
rfc2119_level: SHOULD
topics:
    - routing
    - security
