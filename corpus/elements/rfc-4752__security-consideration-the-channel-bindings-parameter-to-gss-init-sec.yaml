document: rfc-4752
kind: security-consideration
summary: The channel bindings parameter to GSS_Init_sec_context and GSS_Accept_sec_context is required to be NULL, disallowing GSS-API channel bindings. This is a known limitation; channel binding support is deferred to a future GSS-API family of SASL mechanisms.
section: "5"
topics:
    - security
    - crypto
