document: rfc-2257
kind: protocol-element
summary: 'The agentx-Close-PDU (h.type=2) terminates a session; either side may send it. The c.reason field takes values: reasonOther(1), reasonParseError(2), reasonProtocolError(3), reasonTimeouts(4), reasonShutdown(5), or reasonByManager(6). reasonByManager may only be used by the master agent in response to an SNMP Set.'
section: 6.2.2
topics:
    - snmp
