document: rfc-8880
kind: interoperability-note
summary: Without a formal mandate for special treatment, DNS64 gateways performed unnecessary run-time queries to the authoritative 'arpa' name servers for values already known by specification (two fixed A records), generating unnecessary load and introducing latency and failure modes when those servers were slow or unresponsive.
section: "3.2"
topics:
    - dns
    - nat
    - v6ops
