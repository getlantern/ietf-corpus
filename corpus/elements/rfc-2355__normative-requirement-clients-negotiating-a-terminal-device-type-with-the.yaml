document: rfc-2355
kind: normative-requirement
summary: Clients negotiating a terminal device-type with the '-E' suffix, the DYNAMIC type, or any printer device-type must be able to accept and respond to both Read Partition Query (Type 02) and all forms of Read Partition Query List (Type 03).
section: "12"
rfc2119_level: MUST
