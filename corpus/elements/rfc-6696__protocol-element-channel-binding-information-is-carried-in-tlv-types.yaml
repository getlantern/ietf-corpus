document: rfc-6696
kind: protocol-element
summary: 'Channel binding information is carried in TLV types 128–191 within ERP messages. Pre-defined attributes are: Called-Station-Id (128), Calling-Station-Id (129), NAS-Identifier (130), NAS-IP-Address (131), NAS-IPv6-Address (132). If the local ER server requires channel binding but the peer omitted it, the server SHALL send the CB attributes for peer verification.'
section: "5.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
