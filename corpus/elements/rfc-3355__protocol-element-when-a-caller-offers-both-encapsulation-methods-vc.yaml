document: rfc-3355
kind: protocol-element
summary: When a caller offers both encapsulation methods (VC-multiplexed and LLC encapsulated) in the SVC SETUP message, two B-LLI IEs SHALL be encoded within a Broadband Repeat Indicator IE in order of the sender's preference. The called peer SHALL respond with exactly one B-LLI IE in the Connect message.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
