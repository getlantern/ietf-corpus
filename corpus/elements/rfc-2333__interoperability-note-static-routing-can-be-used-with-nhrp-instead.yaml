document: rfc-2333
kind: interoperability-note
summary: Static routing can be used with NHRP instead of dynamic routing, in which case only the routers included in manually defined static paths need to be NHRP aware. However, static routing does not scale and can result in persistently suboptimal routes and negative failure modes if the destination is off the NBMA network.
section: "5"
topics:
