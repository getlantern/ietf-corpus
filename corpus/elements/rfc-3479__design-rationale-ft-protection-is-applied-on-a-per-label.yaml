document: rfc-3479
kind: design-rationale
summary: FT protection is applied on a per-label basis rather than globally, allowing implementations to protect only high-priority LSPs. The A bit in the FT Session TLV allows a peer to mandate that all labels on the session be treated as Sequence Numbered FT Labels, enabling an optimization hint without requiring protocol renegotiation.
section: "4"
topics:
    - mpls
    - routing
