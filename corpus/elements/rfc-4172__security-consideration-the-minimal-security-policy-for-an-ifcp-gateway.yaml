document: rfc-4172
kind: security-consideration
summary: The minimal security policy for an iFCP gateway requires all iFCP sessions to remote gateways and all iSNS communications to be protected by IPsec. The iSNS server is the distribution point for gateway security policies (Section 10.5), making its availability and integrity critical to the security of the entire iFCP fabric.
section: "10.6"
topics:
    - security
    - ipsec
    - ip
