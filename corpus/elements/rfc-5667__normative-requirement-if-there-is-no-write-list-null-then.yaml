document: rfc-5667
kind: normative-requirement
summary: If there is no Write list (null), then any READ or READLINK operations in the NFSv4 COMPOUND MUST return their data inline. The NFSv4.0 client MUST ensure results will fit within its receive buffers to avoid RDMA transport errors.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
