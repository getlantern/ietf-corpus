document: rfc-7643
kind: protocol-element
summary: 'Multi-valued attributes are JSON arrays whose elements may be primitives or complex objects. The predefined sub-attributes for multi-valued complex elements are: ''type'' (label), ''primary'' (Boolean), ''display'' (human-readable name, immutable), ''value'' (significant value), and ''$ref'' (reference URI, OPTIONAL).'
