document: rfc-2069
kind: protocol-element
summary: The stale flag in WWW-Authenticate signals that the previous request failed because the nonce was stale, not because the credentials were wrong. When stale=TRUE, the client may retry with a freshly computed digest without reprompting the user for credentials.
section: 2.1.1
topics:
    - http
    - security
