document: rfc-4129
kind: wire-format
summary: The DLC Status parameter (Tag 0x12) for a T1 interface covers up to 46 DLCs with D23 marked Not Applicable (timeslot 23 reserved for signaling). For DASS 2 over T1, only 23 DLCs exist (no virtuals). The message length is 12 for a DASS 2 DLC Status message.
section: "2.4"
