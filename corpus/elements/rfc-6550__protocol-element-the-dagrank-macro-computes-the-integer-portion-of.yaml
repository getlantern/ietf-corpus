document: rfc-6550
kind: protocol-element
summary: The DAGRank() macro computes the integer portion of Rank as floor(rank / MinHopRankIncrease). MinHopRankIncrease is provisioned by the DODAG root and governs a trade-off between hop cost precision and the maximum number of hops a DODAG can support.
