document: rfc-8227
kind: design-rationale
summary: Ring tunnel labels are downstream-assigned (as defined in RFC 3031) and can be configured statically, provisioned by a controller, or distributed dynamically via a control protocol. The control plane for label distribution is explicitly outside the scope of this document, allowing MSRP to be agnostic to the provisioning method.
section: 4.1.2
topics:
