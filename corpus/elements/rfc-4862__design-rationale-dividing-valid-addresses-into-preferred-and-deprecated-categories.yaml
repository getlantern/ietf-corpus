document: rfc-4862
kind: design-rationale
summary: Dividing valid addresses into preferred and deprecated categories gives upper layers advance warning that an address may soon become invalid, allowing applications to migrate to a new preferred address before the old one expires. This supports graceful site renumbering without breaking existing TCP connections.
section: "4.1"
topics:
