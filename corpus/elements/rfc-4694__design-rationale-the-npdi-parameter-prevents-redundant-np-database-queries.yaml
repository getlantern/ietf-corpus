document: rfc-4694
kind: design-rationale
summary: The "npdi" parameter prevents redundant NP database queries as a signaling message traverses multiple network nodes, analogous to the SS7 PNTI bit. It also helps prevent routing loops when "tel" URI re-writing occurs.
