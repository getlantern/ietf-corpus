document: rfc-8414
kind: normative-requirement
summary: Claims with zero elements MUST be omitted from the metadata response. A successful metadata response MUST use the 200 OK HTTP status code and return a JSON object using the 'application/json' content type.
section: "3.2"
rfc2119_level: MUST
