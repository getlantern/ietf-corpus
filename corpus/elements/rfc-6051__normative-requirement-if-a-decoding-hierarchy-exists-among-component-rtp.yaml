document: rfc-6051
kind: normative-requirement
summary: If a decoding hierarchy exists among component RTP flows in a layered, multi-description, or multi-view session, it MUST be signalled out of band, for example using RFC 5583 when SDP signalling is used.
section: "4.2"
rfc2119_level: MUST
