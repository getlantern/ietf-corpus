document: rfc-8676
kind: protocol-element
summary: 'The binding-table-versioning container on the BR binding instance records a version number (uint64) and activation timestamp (yang:date-and-time) to support forensic identification per RFC 7422: the timestamp is used as a key to find the appropriate binding table active when an abuse event occurred.'
