document: rfc-8666
kind: protocol-element
summary: In an intra-area context, an OSPFv3 router MAY advertise Prefix-SIDs for any prefix it advertises reachability for. The SR Mapping Server may advertise Prefix-SIDs for remote prefixes using either area flooding scope (E-Intra-Area-Prefix-LSA) or AS flooding scope (E-AS-External-LSA).
section: "8.1"
topics:
    - mpls
    - routing
