document: rfc-5676
kind: security-consideration
summary: The content objects (facility, severity, timestamp, hostname, app-name, procid, msgid, SD params, message body) carry SYSLOG message content; an attacker with SNMP GET or NOTIFY access can exploit this information. SNMP access control rules enforcing consistent security policy are therefore desirable.
section: "10"
topics:
    - syslog
    - snmp
    - security
