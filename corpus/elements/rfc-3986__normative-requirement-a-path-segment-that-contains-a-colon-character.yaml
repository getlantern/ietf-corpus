document: rfc-3986
kind: normative-requirement
summary: A path segment that contains a colon character (e.g., "this:that") MUST NOT be used as the first segment of a relative-path reference, as it would be mistaken for a scheme name; such a segment must be preceded by a dot-segment (e.g., "./this:that").
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
