document: rfc-4572
kind: interoperability-note
summary: Media sessions using the TCP/TLS protocol identifier follow all procedures defined in RFC 4145, including the 'setup' and 'connection' SDP attributes. RFC 4572 extends RFC 4145 by adding TLS-specific requirements on top of the base connection-oriented media transport framework.
