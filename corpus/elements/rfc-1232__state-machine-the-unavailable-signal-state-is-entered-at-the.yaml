document: rfc-1232
kind: state-machine
summary: The Unavailable Signal State is entered at the onset of 10 consecutive Severely Errored Seconds and cleared at the onset of 10 consecutive non-SES seconds. Seconds counted as Unavailable Seconds may not also be counted as Errored or Severely Errored Seconds; the initial 10 transition seconds are included in UAS counts but the 10 exit seconds are not.
section: "4.3"
