document: rfc-8667
kind: normative-requirement
summary: In the SID/Label Binding TLV, if the S-Flag is not set, the TLV MUST NOT be leaked between levels and the S-Flag MUST NOT be altered during TLV leaking. The D-Flag MUST be set when the TLV is leaked from Level-2 to Level-1; TLVs with D-Flag set MUST NOT be leaked from Level-1 to Level-2, preventing looping.
section: 2.4.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
