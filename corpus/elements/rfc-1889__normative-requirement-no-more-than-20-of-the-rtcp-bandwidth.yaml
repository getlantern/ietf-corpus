document: rfc-1889
kind: normative-requirement
summary: No more than 20% of the RTCP bandwidth allocated to a single participant should be used to carry additional SDES information beyond CNAME, as excess SDES slows the rate of reception reports and CNAME transmission, impairing protocol performance.
section: 6.2.2
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
