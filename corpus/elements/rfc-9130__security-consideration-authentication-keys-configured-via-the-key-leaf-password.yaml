document: rfc-9130
kind: security-consideration
summary: Authentication keys configured via the 'key' leaf (password case) are stored as cleartext strings in the datastore. Operators should use the key-chain approach (RFC 8177) where possible, as key-chain implementations may provide encrypted storage. Exposure of authentication keys would allow an attacker to inject forged IS-IS PDUs.
section: "7"
topics:
    - yang
    - routing
    - security
    - crypto
