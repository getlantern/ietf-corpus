document: rfc-7146
kind: normative-requirement
summary: When DH groups are used, a DH group of at least 2048 bits SHOULD be offered in all proposals to create IPsec SAs for both IKEv1 and IKEv2; use of 1024-bit DH groups is NOT RECOMMENDED.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - security
