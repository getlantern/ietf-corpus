document: rfc-9008
kind: normative-requirement
summary: If the RPI 0x23 enable flag in the DODAG Configuration option is received with value 1, implementations MUST set the RPL Option Type to 0x23 when originating new packets. If the flag is zero (default), implementations remain compatible with RFC 6553 and originate with 0x63.
section: 4.1.3
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
