document: rfc-4171
kind: interoperability-note
summary: SNMP OIDs are limited to 128 sub-identifiers, but iSCSI Names and FC identifiers can exceed 128 characters; iSNS therefore provides persistent integer index attributes as secondary SNMP-accessible keys, and 'next available index' attributes so SNMP clients can request valid OIDs for creating new objects.
section: "2.10"
topics:
    - snmp
