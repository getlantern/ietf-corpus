document: rfc-4032
kind: normative-requirement
summary: Each precondition type MUST define any extra actions UAs should perform or refrain from performing when session establishment is suspended, including specifying whether media streams may send and receive packets during suspension. The QoS-specific rule prohibiting RTP/RTCP during suspension applies only to QoS preconditions, not universally.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
