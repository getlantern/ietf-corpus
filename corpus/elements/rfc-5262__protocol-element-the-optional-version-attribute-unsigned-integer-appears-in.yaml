document: rfc-5262
kind: protocol-element
summary: The optional 'version' attribute (unsigned integer) appears in both <pidf-full> and <pidf-diff> elements. It is incremented by one with each successive document update and is maintained as a single counter across both document types, enabling ordered delivery and loss detection.
