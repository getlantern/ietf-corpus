document: rfc-7579
kind: protocol-element
summary: The Connectivity Matrix Field represents how input ports are connected to output ports for network elements, encoding either switch (reconfigurable) or fixed connectivity as a list of input/output link set pairs. It is uniquely identified by the advertising node and may be partitioned into sub-matrices, each with a distinct MatrixID, to limit size and enable incremental updates.
section: "2.1"
topics:
