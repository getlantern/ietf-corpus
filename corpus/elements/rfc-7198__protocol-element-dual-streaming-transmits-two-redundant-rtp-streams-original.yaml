document: rfc-7198
kind: protocol-element
summary: Dual streaming transmits two redundant RTP streams (original plus its duplicate) of the same content, each with a unique SSRC, so that either stream alone can support playback. All redundant streams are transmitted in the same RTP session when using temporal redundancy.
