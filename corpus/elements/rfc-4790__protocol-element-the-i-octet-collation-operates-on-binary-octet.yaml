document: rfc-4790
kind: protocol-element
summary: The i;octet collation operates on binary octet strings using unsigned byte comparison (equivalent to C's memcmp). It never returns 'undefined', supports equality, substring, and ordering, and MUST NOT be used unless explicitly allowed by the protocol.
