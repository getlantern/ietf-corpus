document: rfc-7235
kind: protocol-element
summary: The Proxy-Authorization header field allows the client to identify itself to a proxy. Unlike Authorization, it applies only to the next inbound proxy that demanded authentication using Proxy-Authenticate, and is consumed by the first inbound proxy expecting credentials. A proxy MAY relay credentials to the next proxy.
section: "4.4"
topics:
    - http
