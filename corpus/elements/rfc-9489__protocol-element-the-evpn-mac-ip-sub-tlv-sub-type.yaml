document: rfc-9489
kind: protocol-element
summary: The EVPN MAC/IP sub-TLV (sub-type 42) identifies the target MAC, MAC/IP binding for ARP/ND, or IP address for an EVI under test at an egress PE. Fields include Route Distinguisher (8 octets), Ethernet Tag ID (4 octets), Ethernet Segment Identifier (10 octets), MAC Addr Len, MAC Address (6 octets), IP Addr Len, and optional IP Address (0, 4, or 16 octets).
section: "4.1"
topics:
    - mpls
    - routing
