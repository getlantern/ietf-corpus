document: rfc-7873
kind: normative-requirement
summary: To avoid rollover synchronization and predictability, it is RECOMMENDED that pseudorandom jitter in the range of plus-zero to minus-at-least-40% be applied to the scheduled rollover time of a COOKIE secret.
section: "7.1"
rfc2119_level: RECOMMENDED
