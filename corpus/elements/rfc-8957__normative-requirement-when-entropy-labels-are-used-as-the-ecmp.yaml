document: rfc-8957
kind: normative-requirement
summary: When entropy labels are used as the ECMP solution for SFLs, the intervening MPLS network MUST NOT load balance on any packet field other than the entropy label — stricter than the base RFC 6790 requirement.
section: "5"
rfc2119_level: MUST NOT
