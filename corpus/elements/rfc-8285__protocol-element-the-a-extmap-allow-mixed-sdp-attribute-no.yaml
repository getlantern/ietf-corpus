document: rfc-8285
kind: protocol-element
summary: The 'a=extmap-allow-mixed' SDP attribute (no value) signals that a participant supports receiving mixed one-byte and two-byte header extensions in the same RTP stream. A participant proposing this mode SHALL itself support reception of mixed extensions.
