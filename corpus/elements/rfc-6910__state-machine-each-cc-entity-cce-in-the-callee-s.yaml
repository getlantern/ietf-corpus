document: rfc-6910
kind: state-machine
summary: 'Each CC Entity (CCE) in the callee''s monitor queue has two orthogonal states: availability state (''available'' when PIDF is ''open'', ''unavailable'' when ''closed'') and recall state (''queued'' on creation, changed to ''ready'' when selected for CC recall). A CCE is eligible for recall only when availability=''available'' and its ''m'' value indicates an available callee.'
