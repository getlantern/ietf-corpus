document: rfc-6876
kind: design-rationale
summary: TLV-based encoding was chosen to match the PA-TNC and PB-TNC protocols, enabling a common message-parsing code path and simplified debugging tools. TLV encoding also provides a space-efficient representation suitable for lower-powered or battery-constrained devices.
