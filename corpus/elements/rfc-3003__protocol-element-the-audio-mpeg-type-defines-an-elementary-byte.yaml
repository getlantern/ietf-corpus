document: rfc-3003
kind: protocol-element
summary: The audio/mpeg type defines an elementary byte stream containing MPEG frames per MPEG-1 and MPEG-2 standards, possibly interspersed with non-MPEG data. Non-MPEG data is data without MPEG synchronization or otherwise not decompressible without error.
section: "1"
