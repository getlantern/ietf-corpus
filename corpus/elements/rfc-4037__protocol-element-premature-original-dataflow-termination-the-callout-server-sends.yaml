document: rfc-4037
kind: protocol-element
summary: 'Premature original dataflow termination: the callout server sends Want Stop Receiving Data (DWSR); the OPES processor responds by sending Application Message End (AME) with result 206 (partial), halting original data delivery. The adapted dataflow continues unaffected.'
section: "8.1"
