document: rfc-1662
kind: wire-format
summary: The FCS field defaults to 16 bits (two octets), transmitted least significant octet first. A 32-bit (four octet) FCS is also defined and may be negotiated via LCP Extensions. The FCS is calculated over the Address, Control, Protocol, Information, and Padding fields.
section: "3.1"
