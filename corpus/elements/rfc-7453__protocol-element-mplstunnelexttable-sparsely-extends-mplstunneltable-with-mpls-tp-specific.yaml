kind: protocol-element
summary: mplsTunnelExtTable sparsely extends mplsTunnelTable with MPLS-TP-specific attributes, including mplsTunnelExtOppositeDirTnlPtr (RowPointer to the reverse-direction tunnel entry), mplsTunnelExtIngressLSRLocalIdValid, and mplsTunnelExtEgressLSRLocalIdValid flags indicating whether the LSR IDs are local identifiers rather than IP addresses.
