document: rfc-6940
kind: design-rationale
summary: RELOAD uses a single protocol for both peers and clients to simplify implementation for devices that may act in either role and to allow clients to inject messages directly into the overlay using the same security mechanisms. Clients are not first-class entities from a peer's perspective, localizing routing and storage complexity to nodes that opt into full peer participation.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
