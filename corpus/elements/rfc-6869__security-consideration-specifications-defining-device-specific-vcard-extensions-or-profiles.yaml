document: rfc-6869
kind: security-consideration
summary: Specifications defining device-specific vCard extensions or profiles must consider the increased risk introduced by exposing device details in publicly accessible repositories, as registration of KIND:device itself does not introduce security considerations beyond those in RFC 6350.
