document: rfc-2817
kind: protocol-element
summary: 'The ''TLS/1.0'' Upgrade token is defined as the identifier for the TLS protocol in the HTTP Upgrade header field. A client includes ''Upgrade: TLS/1.0'' and ''Connection: Upgrade'' in a request to signal its desire to switch to TLS.'
