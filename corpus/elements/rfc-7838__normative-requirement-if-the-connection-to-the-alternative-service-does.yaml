document: rfc-7838
kind: normative-requirement
summary: If the connection to the alternative service does not negotiate the expected protocol (e.g., ALPN fails to negotiate h2, or an Upgrade request to h2c is not accepted), the connection to the alternative service MUST be considered to have failed.
section: "2.4"
rfc2119_level: MUST
topics:
