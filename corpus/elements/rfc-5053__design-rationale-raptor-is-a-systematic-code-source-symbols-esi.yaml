document: rfc-5053
kind: design-rationale
summary: 'Raptor is a systematic code: source symbols (ESI 0 to K-1) are transmitted unmodified alongside repair symbols, so receivers that receive all K source symbols need no decoding computation. This minimises complexity in the common low-loss case.'
