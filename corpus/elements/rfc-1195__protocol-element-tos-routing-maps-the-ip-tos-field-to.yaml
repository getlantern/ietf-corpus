document: rfc-1195
kind: protocol-element
summary: 'TOS routing maps the IP TOS field to IS-IS QOS metrics: low delay (bit 3 set) uses the delay metric; high reliability (bit 5 set) uses the reliability metric; all other combinations use the default (throughput) metric. IP has no cost TOS; the minimum cost metric has no IP mapping.'
section: "3.5"
topics:
    - routing
    - ip
    - qos
