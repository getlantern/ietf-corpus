document: rfc-5779
kind: protocol-element
summary: MIP6-Home-Link-Prefix AVP (AVP Code 125) carries the MN-HNP. The low 64 bits of the prefix MUST be all zeroes. An all-zeroes value (0::0) in an LMA-to-HAAA request indicates that the LMA is delegating MN-HNP assignment to the HAAA.
section: "5.3"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
