document: rfc-7223
kind: normative-requirement
summary: If a client tries to create configuration for a system-controlled interface not present in '/interfaces-state/interface', the server MAY reject the request if it does not support pre-provisioning or if the name can never exist; in that case, a NETCONF server MUST reply with an rpc-error with error-tag 'invalid-value'.
section: "5"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
