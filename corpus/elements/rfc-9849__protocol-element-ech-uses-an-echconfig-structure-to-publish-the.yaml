document: rfc-9849
kind: protocol-element
summary: ECH uses an ECHConfig structure to publish the server's HPKE public key and associated metadata. The structure includes a version (0xfe0d), a HpkeKeyConfig (config_id, kem_id, public_key, cipher_suites), maximum_name_length, public_name (the client-facing server's DNS name), and an extensions list.
section: "4"
