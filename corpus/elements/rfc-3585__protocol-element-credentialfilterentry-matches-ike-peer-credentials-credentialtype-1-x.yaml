document: rfc-3585
kind: protocol-element
summary: 'CredentialFilterEntry matches IKE peer credentials (CredentialType: 1=X.509, 2=Kerberos) during phase 1. MatchFieldName names a certificate attribute (e.g., ''subjectName'', ''issuerName'', ''subjectAltName''); MatchFieldValue supports ''*'' wildcards on character boundaries. DistinguishedName values are stored as ordinary strings but must be DER-encoded at runtime before comparison.'
section: "5.3"
topics:
    - ipsec
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
