document: rfc-9219
kind: security-consideration
summary: Constant recalculation of S/MIME signature status can result in a denial-of-service condition. It is RECOMMENDED that servers cache results of signature verification for up to 24 hours.
section: "6"
rfc2119_level: RECOMMENDED
