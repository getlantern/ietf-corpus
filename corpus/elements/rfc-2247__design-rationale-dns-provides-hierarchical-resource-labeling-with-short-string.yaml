document: rfc-2247
kind: design-rationale
summary: DNS provides hierarchical resource labeling with short string components, while LDAP distinguished names differ by requiring explicit attribute type indicators for each component. This document bridges the two by defining an algorithmic mapping from DNS names to LDAP DNs, automatically providing enterprises a distinguished name for each Internet domain name they hold.
section: "2"
topics:
    - ldap
    - dns
