document: rfc-4936
kind: protocol-element
summary: A Zone Server operates in either Basic mode (compatible with FC-GS-4) or Enhanced mode (requiring all Fabric switches to support it). The t11ZsServerOperationMode object controls the mode; the default is Basic. Enhanced mode requires a Fabric lock before any write to the Zoning Database.
section: "5.5"
topics:
    - routing
