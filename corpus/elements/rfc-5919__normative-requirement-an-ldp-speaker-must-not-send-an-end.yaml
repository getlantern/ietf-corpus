document: rfc-5919
kind: normative-requirement
summary: An LDP speaker MUST NOT send an End-of-LIB Notification to a peer unless that peer has advertised the Unrecognized Notification capability during session establishment. This applies to peers discovered via both basic and extended discovery mechanisms.
section: "4"
rfc2119_level: MUST NOT
topics:
