document: rfc-8178
kind: design-rationale
summary: Extension documents may optionally define a new NFSv4 attribute that signals whether a feature is present and supported, as an alternative to probing via error codes. Since it is easy to test attribute support via the supported_attrs attribute, this can simplify client capability discovery when a feature involves multiple protocol elements.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
