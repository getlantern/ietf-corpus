document: rfc-2687
kind: protocol-element
summary: Class numbers 0-6 map directly from the 3-bit class field and support suspend/resume. When class field equals 7, the 3-bit sequence field distinguishes class numbers 7-14 (non-suspendable, for high-priority flows such as compressed voice). In the extended format, class field 7 can address classes 7-1030 using the 10-bit sequence field.
