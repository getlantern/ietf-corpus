document: rfc-5970
kind: protocol-element
summary: OPTION_CLIENT_ARCH_TYPE (option code 61) carries a list of 16-bit architecture type identifiers representing the pre-boot runtime environments supported by the client, listed in descending order of preference. It provides DHCPv6 parity with the DHCPv4 option defined in RFC 4578 Section 2.1.
section: "3.3"
topics:
    - realtime
