document: rfc-7260
kind: normative-requirement
summary: When adjusting OAM parameters, the receiving side SHOULD NOT update requested parameters to an extent that provides lower performance (e.g., lower frequency of monitoring packets) than what had previously been in place, to avoid an extensive negotiation phase.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - mpls
