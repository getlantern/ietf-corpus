document: rfc-7035
kind: normative-requirement
summary: At least 3 points MUST be included in a polygon shape. For interoperability with existing systems, an encoding SHOULD include 15 or fewer points unless the recipient is known to support larger numbers.
section: 4.9.4
rfc2119_level: MUST
