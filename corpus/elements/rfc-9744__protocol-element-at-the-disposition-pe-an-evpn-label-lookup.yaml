document: rfc-9744
kind: protocol-element
summary: At the disposition PE, an EVPN label lookup identifies a VID-VRF (VPN Routing and Forwarding for normalized VID lookup), and a subsequent lookup of the normalized VID within that table identifies the appropriate egress endpoint or interface. Tag manipulation from normalized to local VID SHOULD occur as part of this lookup or at the egress interface.
section: "3"
topics:
    - vpn
    - routing
