document: rfc-3592
kind: protocol-element
summary: Performance statistics are maintained in paired current/interval table groups for each layer (Section, Line, Far-End Line, Path, Far-End Path, VT, Far-End VT). Current tables use PerfCurrentCount for the active 15-minute window; interval tables use PerfIntervalCount indexed 1-96 (interval 1 = most recent) plus a TruthValue ValidData flag per interval.
section: "4.2"
topics:
    - snmp
