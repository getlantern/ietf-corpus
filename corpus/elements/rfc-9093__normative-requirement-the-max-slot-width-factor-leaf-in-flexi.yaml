document: rfc-9093
kind: normative-requirement
summary: The max-slot-width-factor leaf in flexi-grid-label-range-info MUST be greater than or equal to the min-slot-width-factor; if not specified, it defaults to equal min-slot-width-factor. Violation triggers a YANG must-constraint error.
section: "3"
rfc2119_level: MUST
topics:
