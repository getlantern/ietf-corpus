document: rfc-3168
kind: interoperability-note
summary: The limited-functionality IP tunnel option (not-ECT in outer header) provides backward compatibility with simple tunnels that discard the outer header; without one of the two ECN options, congestion marked by routers inside the tunnel is silently lost at egress.
section: "9.1"
topics:
    - ecn
    - ip
    - ipsec
