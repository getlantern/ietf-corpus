document: rfc-1812
kind: normative-requirement
summary: The MTU of each logical interface MUST be configurable within the range of legal MTUs for that interface. A router MUST NOT allow an MTU to be set that would permit frames larger than allowed by the link-layer protocol, but SHOULD be willing to receive packets up to the maximum link-layer frame size.
section: 3.3.4
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
