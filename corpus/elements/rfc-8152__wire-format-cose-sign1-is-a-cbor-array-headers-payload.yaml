document: rfc-8152
kind: wire-format
summary: 'COSE_Sign1 is a CBOR array [Headers, payload: bstr/nil, signature: bstr] for single-signer messages. CBOR tag 18 marks a tagged COSE_Sign1. It cannot be converted to/from COSE_Sign because the signature computation includes the structure context string.'
section: "4.2"
