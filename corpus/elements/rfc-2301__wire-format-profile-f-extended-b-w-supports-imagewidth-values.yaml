summary: Profile F (extended B&W) supports ImageWidth values 1728/2048/2432 (A4/Letter), 2592/3072/3648 (B4), 3456/4096/4864 (A3), with XResolution in {200,204,300,400,408} and YResolution in {98,100,196,200,300,391,400} pixels/inch. Not all combinations are legal; valid pairs are tabulated against paper size.
