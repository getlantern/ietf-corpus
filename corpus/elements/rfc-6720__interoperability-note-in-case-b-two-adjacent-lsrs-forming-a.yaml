document: rfc-6720
kind: interoperability-note
summary: In case (b) — two adjacent LSRs forming a multi-hop LDP peering session via Basic Discovery due to IP routing configuration — GTSM is enabled by default and enforced, which will prohibit the LDP peering session from being established. The implementation SHOULD provide a per-peer configuration option to override.
section: "3"
topics:
    - mpls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
