document: rfc-8399
kind: normative-requirement
summary: A name constraint for Internet mail addresses MAY specify all addresses at a particular host or all mailboxes in a domain, but MAY NOT specify a particular mailbox. This removes the previously allowed per-mailbox constraint.
section: "2.2"
rfc2119_level: MAY
topics:
    - pkix
    - email
