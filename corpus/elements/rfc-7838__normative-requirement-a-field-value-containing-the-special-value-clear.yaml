document: rfc-7838
kind: normative-requirement
summary: A field value containing the special value 'clear' indicates that the origin requests all alternatives for that origin to be invalidated, including those specified in the same response. Unknown Alt-Svc parameters MUST be ignored and alt-values containing them MUST be processed as if the unknown parameter was not present.
section: "3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
