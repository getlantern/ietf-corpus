document: rfc-4650
kind: security-consideration
summary: Non-repudiation is explicitly not provided by DHHMAC, as it is not a requirement in the target environment. Authorization is also not explicitly provided by the protocol but is facilitated locally by the fact that possession of the pre-shared key implies a pre-established trust relationship.
section: "5.6"
