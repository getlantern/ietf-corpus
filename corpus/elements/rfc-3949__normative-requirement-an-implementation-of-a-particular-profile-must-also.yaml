document: rfc-3949
kind: normative-requirement
summary: An implementation of a particular profile MUST also implement all profiles on the path connecting it to the root node (Profile S). For example, implementing Profile M requires implementing Profiles C and S.
section: "1"
rfc2119_level: MUST
