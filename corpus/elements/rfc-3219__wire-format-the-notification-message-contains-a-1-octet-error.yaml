document: rfc-3219
kind: wire-format
summary: The NOTIFICATION message contains a 1-octet Error Code (1=Message Header Error, 2=OPEN Error, 3=UPDATE Error, 4=Hold Timer Expired, 5=FSM Error, 6=Cease), a 1-octet Error Subcode, and variable Data. Minimum length is 5 octets; the transport connection is closed immediately after sending.
