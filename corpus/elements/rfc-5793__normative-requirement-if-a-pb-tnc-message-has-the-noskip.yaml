document: rfc-5793
kind: normative-requirement
summary: If a PB-TNC message has the NOSKIP flag set and a recipient cannot or will not process it, the recipient MUST NOT act on any part of the batch and MUST respond with a fatal Unsupported Mandatory Message error in a CLOSE batch. Recipients MAY scan all messages before acting on any to detect unsupported NOSKIP messages early.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
