document: rfc-8500
kind: protocol-element
summary: The Traffic Engineering Metric sub-TLV (Type 18) is an optional sub-TLV of the Reverse Metric TLV containing a 24-bit unsigned integer TE metric offset. If it appears more than once, the entire Reverse Metric TLV MUST be ignored.
