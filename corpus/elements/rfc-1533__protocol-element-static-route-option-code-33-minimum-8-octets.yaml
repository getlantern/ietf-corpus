document: rfc-1533
kind: protocol-element
summary: Static Route option (code 33, minimum 8 octets, multiple of 8) specifies a list of static routes as destination/router IP address pairs. The default route (0.0.0.0) is illegal as a destination. Multiple routes to the same destination are listed in descending priority order.
section: "5.8"
topics:
