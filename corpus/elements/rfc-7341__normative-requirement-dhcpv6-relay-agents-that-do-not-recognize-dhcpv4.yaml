document: rfc-7341
kind: normative-requirement
summary: DHCPv6 relay agents that do not recognize DHCPv4-query MUST forward the unknown message as described in RFC 7283. Relay agents that do recognize it MAY forward DHCPV4-QUERY to a separately configured DHCP 4o6 server address.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
