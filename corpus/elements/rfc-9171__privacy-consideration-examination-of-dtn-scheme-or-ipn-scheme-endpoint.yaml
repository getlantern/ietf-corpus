document: rfc-9171
kind: privacy-consideration
summary: Examination of dtn-scheme or ipn-scheme endpoint IDs in transit can support traffic analysis. Where traffic analysis is a plausible threat, bundles should be conveyed by secure convergence-layer protocols that do not expose endpoint IDs.
section: 4.2.5.1.1
topics:
    - privacy
    - security
