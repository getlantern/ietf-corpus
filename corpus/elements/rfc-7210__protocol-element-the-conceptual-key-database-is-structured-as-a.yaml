document: rfc-7210
kind: protocol-element
summary: The conceptual key database is structured as a table where each row represents a single long-lived symmetric cryptographic key. Columns include AdminKeyName, LocalKeyName, PeerKeyName, Peers, Interfaces, Protocol, ProtocolSpecificInfo, KDF, AlgID, Key, Direction, and lifetime fields. Normally each key should have only one row.
