document: rfc-4033
kind: protocol-element
summary: An Authentication Chain is an alternating sequence of DNSKEY RRsets and DS RRsets, each link vouching for the next. The typical form is DNSKEY->[DS->DNSKEY]*->RRset, anchored at a configured trust anchor and terminating at the signed zone data.
