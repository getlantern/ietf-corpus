document: rfc-5268
kind: security-consideration
summary: Access routers (PAR and NAR) exchanging HI/HAck messages MUST have a pre-established security association (e.g., via IKEv2). The inter-AR security association allows the NAR to trust the PAR's attestation about the MN, enabling it to create forwarding state on the MN's behalf.
section: "10"
topics:
    - mobility
    - security
    - ipsec
