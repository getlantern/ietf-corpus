document: rfc-3854
kind: interoperability-note
summary: If CMS objects are sent as parts of an RFC 822 message, a standard MIXER gateway will likely encapsulate the message in a format not usable by X.400 recipients. Gateway services for relay between X.400 and SMTP environments are out of scope.
