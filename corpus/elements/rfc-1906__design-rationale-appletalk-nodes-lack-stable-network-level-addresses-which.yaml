document: rfc-1906
kind: design-rationale
summary: AppleTalk nodes lack stable network-level addresses (which can change at every reboot), so SNMPv2 over DDP identifies nodes by NBP name rather than address. All nodes implementing this mapping are therefore required to respond to NBP lookups and confirms.
section: "5.3"
topics:
    - snmp
