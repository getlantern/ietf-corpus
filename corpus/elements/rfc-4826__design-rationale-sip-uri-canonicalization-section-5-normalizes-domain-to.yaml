document: rfc-4826
kind: design-rationale
summary: SIP URI canonicalization (Section 5) normalizes domain to lowercase, removes unnecessary percent-encoding, reorders URI parameters lexically, and discards header parameters. This ensures that functionally equivalent SIP URIs produce the same string under case-sensitive comparison, enabling reliable XCAP element selection.
section: "5"
topics:
