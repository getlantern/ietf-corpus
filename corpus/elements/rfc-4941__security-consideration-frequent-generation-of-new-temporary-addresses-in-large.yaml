document: rfc-4941
kind: security-consideration
summary: Frequent generation of new temporary addresses in large networks may make it difficult for ingress filtering mechanisms to distinguish legitimately changing temporary addresses from spoofed in-prefix source addresses. Per-address access control at network egress points is suggested as a mitigation.
section: "7"
topics:
    - security
    - ip
    - privacy
