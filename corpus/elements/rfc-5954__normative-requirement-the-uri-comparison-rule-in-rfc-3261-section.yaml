document: rfc-5954
kind: normative-requirement
summary: 'The URI comparison rule in RFC 3261 Section 19.1.4 MUST be modified: if the host component contains a textual representation of an IP address, the host components are considered to match if the different textual representations yield the same binary IP address.'
section: "4.2"
rfc2119_level: MUST
topics:
