document: rfc-6551
kind: protocol-element
summary: The Throughput object (type 4) carries one or more 4-byte sub-objects each encoding throughput as a 32-bit unsigned integer in bytes per second. The object MUST comprise at least one sub-object, and the first sub-object MUST be the most recently estimated actual throughput.
section: "4.1"
topics:
    - routing
