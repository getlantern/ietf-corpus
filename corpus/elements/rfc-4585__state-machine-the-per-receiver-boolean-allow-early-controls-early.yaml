document: rfc-4585
kind: state-machine
summary: The per-receiver Boolean allow_early controls Early RTCP eligibility. It is initialized to TRUE; set to FALSE immediately after transmitting an Early RTCP packet; and reset to TRUE when the next Regular RTCP transmission point (tn) is reached, regardless of whether that Regular packet is sent or suppressed due to T_rr_interval.
section: 3.5.2
topics:
