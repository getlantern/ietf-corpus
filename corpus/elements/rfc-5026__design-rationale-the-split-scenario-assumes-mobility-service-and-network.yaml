document: rfc-5026
kind: design-rationale
summary: The split scenario assumes mobility service and network access are authorized by different entities (MSA != ASA). This separation allows, for example, an enterprise to offer Mobile IPv6 service to a user accessing the Internet via a personal WiFi hotspot account, independent of the enterprise account.
section: "3"
topics:
