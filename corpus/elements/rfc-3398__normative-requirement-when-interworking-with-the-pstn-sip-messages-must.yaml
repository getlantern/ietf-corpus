document: rfc-3398
kind: normative-requirement
summary: When interworking with the PSTN, SIP messages MUST be sent reliably end-to-end, as PSTN interworking relies on provisional responses for control of the media channel and timing of call events. One application-layer provisional reliability mechanism is described in RFC 3262.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
