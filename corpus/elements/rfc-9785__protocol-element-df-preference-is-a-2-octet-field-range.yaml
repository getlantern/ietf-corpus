document: rfc-9785
kind: protocol-element
summary: DF Preference is a 2-octet field (range 0–65535) indicating a PE's preference to become the Designated Forwarder. A numerically higher value is preferred under Highest-Preference Algorithm (Alg 2) and a lower value under Lowest-Preference Algorithm (Alg 3). The field is only meaningful for Alg 2 and Alg 3.
