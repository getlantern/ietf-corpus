document: rfc-3927
kind: normative-requirement
summary: If the number of address conflicts exceeds MAX_CONFLICTS (10), the host MUST limit its probing rate to no more than one new address per RATE_LIMIT_INTERVAL (60 seconds) to prevent catastrophic ARP storms caused by a rogue host answering all ARP probes.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
