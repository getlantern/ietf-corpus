document: rfc-8247
kind: design-rationale
summary: IoT devices prefer AES-CCM and AES-XCBC over SHA-based algorithms to minimize code footprint and enable hardware crypto reuse; IEEE 802.15.4 mandates AES-CCM at the link layer, making AES-CCM the natural IKEv2 choice for those devices.
section: "4"
topics:
