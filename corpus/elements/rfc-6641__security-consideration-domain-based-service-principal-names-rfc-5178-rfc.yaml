document: rfc-6641
kind: security-consideration
summary: Domain-based service principal names (RFC 5178, RFC 5179) SHOULD be used so that authentication verifies {nfs, domainname, host.fqdn} rather than merely {nfs, host.fqdn}, binding the server's identity to the organization's domain name obtained from the SRV lookup.
section: "6"
topics:
