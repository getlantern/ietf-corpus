document: rfc-907
kind: wire-format
summary: 'The A/R word is 16 bits: bit 15 = 0 (acceptance) or 1 (refusal); bits 8–14 = refusal code (17 codes defined, including priority not accepted, SIMP congestion, destination dead, nonexistent stream ID, message too long); bits 0–7 = A/R message number (never zero, since zero disables A/R for that message).'
