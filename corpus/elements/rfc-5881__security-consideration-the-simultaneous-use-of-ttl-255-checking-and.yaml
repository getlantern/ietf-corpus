document: rfc-5881
kind: security-consideration
summary: The simultaneous use of TTL=255 checking and BFD authentication provides a low-overhead mechanism for discarding unauthorized packets, which may be useful in implementations where cryptographic checksum processing is susceptible to denial-of-service attacks. The use or non-use of this combined mechanism does not impact interoperability.
section: "9"
topics:
