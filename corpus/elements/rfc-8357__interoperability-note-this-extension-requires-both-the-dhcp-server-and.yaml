document: rfc-8357
kind: interoperability-note
summary: This extension requires both the DHCP server and relay agents to be upgraded; deploying only upgraded relay agents without an upgraded DHCP server means the server cannot communicate back to the relay on the non-standard port. The recommended deployment order is to upgrade the server first.
section: "5.3"
topics:
    - udp
