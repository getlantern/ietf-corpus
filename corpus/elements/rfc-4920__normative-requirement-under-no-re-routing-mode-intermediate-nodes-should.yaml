document: rfc-4920
kind: normative-requirement
summary: Under No Re-routing mode, intermediate nodes SHOULD NOT attempt re-routing after failure; nodes detecting failures MUST report an error and MAY supply crankback information. This is the default and backwards compatible option.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
