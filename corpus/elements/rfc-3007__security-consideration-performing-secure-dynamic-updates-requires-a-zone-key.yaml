document: rfc-3007
kind: security-consideration
summary: Performing secure dynamic updates requires a zone key and possibly other cryptographic secret material to be held on an online, network-connected host (typically a name server). Compromise of this host exposes DNS data to masquerade attacks on both zones served by and delegated from that machine.
section: "5"
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
