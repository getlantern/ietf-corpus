document: rfc-6205
kind: interoperability-note
summary: RFC 6205 updates RFC 3471. The existing RFC 3471 wavelength label definition (locally significant between neighbors only) is extended by this document to define a standardized format usable across multi-vendor, multi-domain LSC networks compliant with ITU-T DWDM and CWDM grids.
