document: rfc-9545
kind: security-consideration
summary: When a PSID is used in nested sub-path scenarios (Section 3.4) without BSIDs, the PSID must be distributed in a trusted domain under the considerations defined in Section 8.1 of RFC 8402, since an ingress node that is not the path's own ingress may impose it.
section: "4"
topics:
