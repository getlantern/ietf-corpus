document: rfc-1908
kind: normative-requirement
summary: When a proxy agent converts a SNMPv2 GetBulkRequest-PDU to SNMPv1, it must set the non-repeaters and max-repetitions fields to zero and change the PDU tag to GetNextRequest-PDU. GetRequest-PDU, GetNextRequest-PDU, and SetRequest-PDU are passed unaltered.
section: 3.1.1
rfc2119_level: MUST
topics:
    - snmp
