document: rfc-8002
kind: normative-requirement
summary: CERT parameters MUST be placed in ascending order within a HIP control packet according to their CERT group field. A HIP packet MUST NOT contain more than one incomplete CERT group that continues in the next HIP control packet.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - pkix
