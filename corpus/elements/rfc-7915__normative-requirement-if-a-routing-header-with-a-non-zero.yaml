document: rfc-7915
kind: normative-requirement
summary: If a Routing header with a non-zero Segments Left field is present in an IPv6 packet, the packet MUST NOT be translated; an ICMPv6 'parameter problem/erroneous header field encountered' (Type 4, Code 0) error message with the Pointer field indicating the first byte of the Segments Left field SHOULD be returned to the sender.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
