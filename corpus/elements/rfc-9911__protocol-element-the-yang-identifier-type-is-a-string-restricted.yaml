document: rfc-9911
kind: protocol-element
summary: The yang-identifier type is a string restricted to identifiers starting with a letter or underscore, followed by letters, digits, underscores, hyphens, or dots (per YANG 1.1 Section 14 of RFC 7950). The RFC 6991 restriction excluding identifiers beginning with 'xml' (required by YANG 1.0) has been removed, though it still applies in YANG 1 contexts.
section: "3"
topics:
