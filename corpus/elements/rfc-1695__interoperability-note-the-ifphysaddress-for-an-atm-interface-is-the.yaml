document: rfc-1695
kind: interoperability-note
summary: The ifPhysAddress for an ATM interface is the ATM address that would be used as the Called Party Address IE for connections terminating at or routed through this interface; for interfaces without signalling support, it is the address that would be used if signalling were supported, or a zero-length string if none exists.
section: 6.2.1
topics:
    - snmp
