document: rfc-9695
kind: design-rationale
summary: The 'haptics' top-level type is justified by haptics being standardized as a first-order track type in ISOBMFF (ISO/IEC 14496-12, 7th Edition, January 2022) at the same level as audio and video, and by widespread commercial deployment across smartphones, game controllers, and XR devices.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
