document: rfc-4945
kind: normative-requirement
summary: All implementations MUST be especially careful to verify the truthfulness of ID payload contents by verifying they correspond to keying material demonstrably held by the peer. Failure to do so may result in use of an inappropriate or insecure policy.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
    - security
