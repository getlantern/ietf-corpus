document: rfc-8486
kind: normative-requirement
summary: A demuxer encountering a channel mapping family value it does not recognize SHOULD NOT attempt to decode the packets and SHOULD NOT use any information except the first 19 octets of the ID header packet and the comment header. This updates RFC 7845 Section 5.1.1.4.
section: "5.2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
