document: rfc-1188
kind: normative-requirement
summary: When an XID or TEST command is received with a DSAP of SNAP SAP (170), Null SAP (0), or Global SAP (255), an appropriate response must be returned. Stations must be able to transmit XID and TEST responses though not necessarily commands.
section: IEEE 802.2 Details
rfc2119_level: MUST
topics:
