document: rfc-9568
kind: protocol-element
summary: The Priority field (8-bit unsigned integer) determines Active Router election. The IP address owner MUST use priority 255; Backup Routers use values 1-254 (default 100); priority 0 signals the Active Router is relinquishing responsibility, triggering immediate Backup promotion without waiting for Active_Down_Interval.
section: 5.2.4
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
