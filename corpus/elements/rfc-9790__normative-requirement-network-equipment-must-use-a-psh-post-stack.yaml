document: rfc-9790
kind: normative-requirement
summary: Network equipment MUST use a PSH (Post-Stack Header) with a PFN value that is neither 0x4 nor 0x6 in all cases where the MPLS payload is neither an IPv4 nor an IPv6 packet. This requirement replaces the older RFC 4928 text restricting PFN values to 0x0 and 0x1 for in-order delivery.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
