document: rfc-9565
kind: design-rationale
summary: 'Requiring export of all TCP control bits, including unassigned ones, enhances network observability: operators can identify packets with unassigned flags set and detect applications that have not yet been upgraded to reflect changes introduced by documents like RFC 8311.'
