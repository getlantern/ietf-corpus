document: rfc-3202
kind: design-rationale
summary: Scheduled outage time (ExcludedTime) required for Virtual Connection Availability and Mean Time Between Service Outages calculations is deliberately omitted from the MIB. It often relates to specific dates and moving maintenance windows that devices cannot track reliably, so it is maintained by network management software instead.
section: 3.6.11
topics:
    - measurement
    - qos
