document: rfc-9788
kind: normative-requirement
summary: An MUA MUST have a default HCP that offers confidentiality for the Subject Header Field at least. A conformant MUA not altered by local policy MUST NOT use hcp_no_confidentiality by default.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
    - privacy
    - security
