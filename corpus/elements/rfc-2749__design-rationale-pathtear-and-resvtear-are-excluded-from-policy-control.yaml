document: rfc-2749
kind: design-rationale
summary: 'PathTear and ResvTear are excluded from policy control based on two assumptions: MD5 authentication verifies the Tear originates from the same node that sent the reservation, and receiving a Tear is functionally equivalent to that node simply withholding refreshes for the reservation.'
