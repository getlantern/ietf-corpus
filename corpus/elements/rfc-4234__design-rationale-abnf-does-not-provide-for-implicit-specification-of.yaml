document: rfc-4234
kind: design-rationale
summary: ABNF does not provide for implicit specification of linear white space in concatenation, unlike historical Internet specifications that allowed it freely around delimiters. Grammars requiring such white space must specify it explicitly, typically in 'core' rules used across higher-level rules.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
