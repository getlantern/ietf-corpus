document: rfc-3828
kind: design-rationale
summary: UDP-Lite was designed because existing transport protocols prevented error-tolerant applications (e.g., voice/video codecs) from benefiting from link-layer partial error delivery. IPv4 UDP allowed checksum disabling but IPv6 mandated full coverage; UDP-Lite provides a middle ground covering at least the header.
