document: rfc-4323
kind: design-rationale
summary: 'The Admitted QoS Parameter Set was introduced to support IP telephony call setup: bandwidth can be reserved (admitted) while a remote phone rings for up to four minutes without being actively consumed, so cable network resources are held but not wasted during the pre-answer interval.'
