document: rfc-8469
kind: interoperability-note
summary: Where the Ethernet PW CW cannot be used, ECMP effects can be disabled by carrying the PW over a traffic-engineered path such as RSVP-TE (RFC 3209) that does not subject the payload to load balancing, though such paths may still experience link-bundle load balancing.
