document: rfc-1990
kind: normative-requirement
summary: If a system receives a Configure-Nak or Configure-Reject of the Endpoint Discriminator option, it MUST remove it from any additional Configure-Request. The system MUST NOT generate a Configure-Nak of this option if it was not present in the peer's Configure-Request.
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
