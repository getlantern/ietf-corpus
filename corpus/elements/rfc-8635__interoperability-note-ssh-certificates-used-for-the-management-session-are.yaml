document: rfc-8635
kind: interoperability-note
summary: SSH certificates used for the management session are distinct from BGPsec router certificates. SSH session certificates should also provide at least 128-bit security equivalent to the BGPsec keys; x509v3-ecdsa-sha2-nistp256 is suggested for SSH authentication.
section: Appendix A
topics:
    - bgp
    - pkix
    - security
