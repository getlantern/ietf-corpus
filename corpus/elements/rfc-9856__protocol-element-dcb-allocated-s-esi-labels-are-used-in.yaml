document: rfc-9856
kind: protocol-element
summary: DCB-allocated S-ESI labels are used in the Hot Standby solution. An ESI label is considered a DCB label if either the ESI-DCB-flag is set in the ESI Label Extended Community or the label is signaled by a PE that has advertised a DCB-allocated PMSI label.
section: "5.2"
topics:
