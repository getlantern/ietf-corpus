document: rfc-5107
kind: normative-requirement
summary: When a DHCPREQUEST contains a Server Identifier Override suboption, the server should compare the address in the suboption against the Server Identifier option; if they match, the server should accept the DHCPREQUEST regardless of whether the Server Identifier matches a DHCP server interface address.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
