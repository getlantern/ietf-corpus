document: rfc-3986
kind: wire-format
summary: 'The generic URI structure is: URI = scheme ":" hier-part [ "?" query ] [ "#" fragment ], where hier-part may begin with "//" authority followed by a path, or may be a path alone. Scheme and path are always present (path may be empty); authority, query, and fragment are optional.'
