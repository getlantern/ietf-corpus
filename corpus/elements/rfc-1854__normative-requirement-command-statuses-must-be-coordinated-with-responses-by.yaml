document: rfc-1854
kind: normative-requirement
summary: Command statuses MUST be coordinated with responses by counting each separate response and correlating that count with the number of commands issued. Multiline responses MUST be supported. Matching responses to commands based on error code value or associated text is expressly forbidden.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
