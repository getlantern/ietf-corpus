document: rfc-6170
kind: security-consideration
summary: A CA with bad intentions or weak security procedures could include false, conflicting, or malicious graphical information in a certificate image — e.g., visual content contradicting text-based attributes, or image data exploiting vulnerabilities in rendering libraries. Relying parties must carefully select trusted CAs and use up-to-date software libraries.
section: "6"
topics:
