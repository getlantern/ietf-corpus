document: rfc-9820
kind: design-rationale
summary: HATEOAS resource management — creating a new CoAP resource per EAP step and deleting the prior one — was chosen to provide ordering guarantees required by EAP without adding new CoAP options. Each '2.01 Created' response with a new Location-Path signals state advancement, leveraging standard CoAP mechanisms.
