document: rfc-8206
kind: protocol-element
summary: Origin Validation during AS migration requires creating new ROAs for the replacing ASN for all prefixes authorized under the old ASN, since AS replacement changes the origin AS visible to downstream peers. Multiple ROAs authorizing different ASNs for the same prefix are permissible per RFC 6480.
section: "3.1"
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
