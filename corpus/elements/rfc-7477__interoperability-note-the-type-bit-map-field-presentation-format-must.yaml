document: rfc-7477
kind: interoperability-note
summary: The Type Bit Map field presentation format must use the TYPE representation from RFC 3597 Section 5 when the mnemonic is not known. Implementations supporting presentation format parsing SHOULD be able to read and understand these TYPE representations.
