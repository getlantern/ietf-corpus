document: rfc-7217
kind: design-rationale
summary: The method is designed as an alternative—not a replacement—for temporary addresses (RFC 4941). Even when temporary addresses are in use, this method adds value by mitigating host-tracking vectors and address-scanning that temporary addresses do not address (e.g., patterns in the stable address used for server functions).
section: "3"
