document: rfc-2280
kind: protocol-element
summary: The route-set class defines a named set of address prefixes (name must start with 'rs-'). Membership is specified via the 'members' attribute (explicit prefixes or other route-set names with optional range operators) and/or the 'mbrs-by-ref' attribute (indirect membership via maintainer authorization).
