document: rfc-4762
kind: design-rationale
summary: Service-delimiting encapsulation (e.g., a VLAN tag identifying the customer's VPLS instance) is stripped at ingress and may be re-inserted at egress, keeping the frame traversing the VPLS a 'normalized' customer Ethernet frame. These are local PE actions that do not need to be signaled between PEs.
section: "7.1"
topics:
    - mpls
