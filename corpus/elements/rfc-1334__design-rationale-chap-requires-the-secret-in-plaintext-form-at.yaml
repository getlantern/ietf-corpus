document: rfc-1334
kind: design-rationale
summary: CHAP requires the secret in plaintext form at each end, but to avoid transmitting the secret over other network links, the RFC recommends examining challenge and response values at a central server rather than each network access server, or sending the secret in reversibly encrypted form.
section: "3"
topics:
