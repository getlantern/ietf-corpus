document: rfc-9855
kind: protocol-element
summary: P-space P(R, X) is the set of routers reachable from R using pre-convergence shortest paths without any path transiting through resource X. Extended P-space P'(R, X) is the union of P-spaces of neighbors of R that are reachable without using X.
section: "2.1"
topics:
