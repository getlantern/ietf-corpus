summary: 'A COSE_Key is a CBOR map with required field ''kty'' (label 1) and optional fields: ''kid'' (2, bstr), ''alg'' (3, tstr/int), ''key_ops'' (4, array), and ''Base IV'' (5, bstr). A COSE_KeySet is a CBOR array of one or more COSE_Key objects and MUST contain at least one element.'
