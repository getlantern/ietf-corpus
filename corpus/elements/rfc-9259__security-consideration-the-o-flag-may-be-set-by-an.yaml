document: rfc-9259
kind: security-consideration
summary: The O-flag may be set by an attacking node within the SR domain to mount a denial-of-service attack on the OAM process at a segment endpoint. Correct implementation of rate limiting (Section 2.1.1) mitigates this attack. SRH flags including the O-flag are also protected by the HMAC TLV as defined in Section 2.1.2.1 of RFC 8754.
section: "3"
topics:
    - security
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
