document: rfc-8986
kind: registry
summary: IANA allocated value 143 for 'Ethernet' in the 'Assigned Internet Protocol Numbers' registry. This value in the Next Header field of an IPv6 header or extension header indicates the payload is an Ethernet frame per IEEE 802.3-2018.
