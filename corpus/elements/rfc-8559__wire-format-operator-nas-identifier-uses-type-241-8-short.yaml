summary: Operator-NAS-Identifier uses Type 241.8 (short extended space), Length 4–35 octets, data type 'string' as defined in RFC 8044 Section 3.5. Implementations MUST handle 1–32 octets of data; creators MUST NOT produce more than 64 octets. The value is an opaque token interpretable only by the visited network.
