document: rfc-8839
kind: registry
summary: 'RFC 8839 updates the IANA SDP Attributes registry with eight ICE-related attributes: ''candidate'' (media-level, Mux: TRANSPORT), ''remote-candidates'' (media-level, TRANSPORT), ''ice-lite'' (session-level, NORMAL), ''ice-mismatch'' (media-level, NORMAL), ''ice-pwd'' (session/media, TRANSPORT), ''ice-ufrag'' (session/media, TRANSPORT), ''ice-options'' (session-level, NORMAL), and ''ice-pacing'' (session-level, NORMAL).'
section: "10.1"
