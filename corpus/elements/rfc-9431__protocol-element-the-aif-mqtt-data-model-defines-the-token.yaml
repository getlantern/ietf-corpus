document: rfc-9431
kind: protocol-element
summary: The AIF-MQTT data model defines the token scope as an array of [mqtt-topic-filter, mqtt-permissions] pairs, where mqtt-permissions is an array of "pub" and/or "sub" strings. For JWTs the scope is a base64url-encoded JSON array; for CWTs it is CBOR.
section: "2.3"
topics:
