document: rfc-3565
kind: protocol-element
summary: 'AES in CBC mode is defined for three key sizes: 128, 192, and 256 bits, identified by OIDs id-aes128-CBC, id-aes192-CBC, and id-aes256-CBC respectively. The AlgorithmIdentifier parameters field MUST be present and MUST contain a 16-byte AES-IV.'
