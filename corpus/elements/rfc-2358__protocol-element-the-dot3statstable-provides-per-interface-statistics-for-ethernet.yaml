summary: The dot3StatsTable provides per-interface statistics for ethernet-like interfaces, indexed by dot3StatsIndex (which maps 1:1 to ifIndex). It contains 15 Counter32 objects covering alignment errors, FCS errors, collision types, carrier sense errors, frame-too-long errors, and symbol errors.
