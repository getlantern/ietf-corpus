document: rfc-7402
kind: security-consideration
summary: The initial keying material is generated via the HIP Diffie-Hellman base exchange. Rekeying forces new Diffie-Hellman keying material generation via UPDATE messages. The UPDATE message exchange is protected using existing HIP association keys (HMAC and signature).
