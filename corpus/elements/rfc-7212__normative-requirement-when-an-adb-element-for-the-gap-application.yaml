document: rfc-7212
kind: normative-requirement
summary: When an ADB element for the GAP application (Application ID 0x0000) is present in a GAP message, it MUST precede other elements. Application 0x0000 GAP messages MUST be processed in the order received.
section: "4"
rfc2119_level: MUST
