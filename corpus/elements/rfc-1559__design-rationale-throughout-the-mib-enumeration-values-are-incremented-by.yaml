document: rfc-1559
kind: design-rationale
summary: Throughout the MIB, enumeration values are incremented by one relative to the native DECnet (NICE protocol) coded values. This is required because the Internet SMI (RFC 1155) does not permit enumerated integers with the value zero, and DECnet natively encodes several states as zero.
