summary: CHOICE values are encoded as IdentifiedChoiceValue (identifier ":" Value) unless the CHOICE type has been declared a ChoiceOfStrings type, in which case ChoiceOfStringsValue (a plain StringValue) MAY be used. DirectoryString is declared a ChoiceOfStrings type by this document.
