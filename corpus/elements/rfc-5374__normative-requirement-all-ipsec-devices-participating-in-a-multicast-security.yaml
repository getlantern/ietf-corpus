document: rfc-5374
kind: normative-requirement
summary: All IPsec devices participating in a multicast Security Association MUST share a common set of cryptographic transform and protocol-handling capabilities (homogeneous group). Support for heterogeneous composite groups is deferred to future standardization.
section: "1.1"
rfc2119_level: MUST
topics:
