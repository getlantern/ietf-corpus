document: rfc-8217
kind: design-rationale
summary: RFC 3261 originally expressed the name-addr constraint as prose copied into each individual header field definition, which caused it to be missed for the To header field and omitted from extension header field specifications; this document replaces the per-field prose with a single generic constraint.
