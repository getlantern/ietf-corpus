document: rfc-4103
kind: protocol-element
summary: A T140block contains one or more T.140 code elements, UTF-8 encoded per T.140 and ISO 10646. Each block MUST contain an integral number of UTF-8 encoded characters, and any composite character sequence (CCS) SHOULD be placed within one block.
