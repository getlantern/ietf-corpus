document: rfc-8955
kind: registry
summary: 'IANA maintains registries for Extended Community Flow Specification Actions sub-types: 0x06 (traffic-rate-bytes), 0x0c (traffic-rate-packets), 0x07 (traffic-action), 0x08 (rt-redirect in three format variants), and 0x09 (traffic-remarking/marking). A separate ''Traffic Action Fields'' registry covers bits 47 (Terminal Action) and 46 (Sample) of the traffic-action community.'
