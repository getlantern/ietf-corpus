document: rfc-3995
kind: security-consideration
summary: 'Subscription Objects expose the system to security threats including: unauthorized clients creating subscriptions that generate traffic to third parties (amplification/DoS), clients subscribing to events they are not authorized to observe (information disclosure), and passive traffic analysis when notify-subscription-id is assigned sequentially allowing enumeration of all active subscriptions.'
section: "25"
topics:
    - security
