document: rfc-3670
kind: protocol-element
summary: ClassifierService groups ClassifierElement instances; each ClassifierElement references a FilterList via ClassifierElementUsesFilterList and identifies the next conditioning service via NextServiceAfterClassifierElement. A ClassifierService that aggregates other ClassifierService instances must not itself reference a FilterList.
section: "3.9"
