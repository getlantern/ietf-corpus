document: rfc-3984
kind: normative-requirement
summary: A 90 kHz clock rate MUST be used for the RTP timestamp. For NAL units without their own timing properties (e.g., parameter sets and SEI NAL units), the RTP timestamp is set to the timestamp of the primary coded picture of the access unit in which the NAL unit is included.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
