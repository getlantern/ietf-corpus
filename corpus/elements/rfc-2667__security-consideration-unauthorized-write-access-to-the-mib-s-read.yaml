document: rfc-2667
kind: security-consideration
summary: Unauthorized write access to the MIB's read-write and read-create objects (e.g., tunnel creation/deletion/modification) could cause denial of service or unauthorized tunnel manipulation. SNMPv1 is an insecure environment, and SET operations without proper protection can negatively affect network operations.
