document: rfc-2518
kind: normative-requirement
summary: All resources MUST recognize the opaquelocktoken scheme and, at minimum, recognize that the lock token does not refer to an outstanding lock on the resource. Any DAV compliant resource that supports LOCK MUST support both the supportedlock and lockdiscovery properties.
section: "6.4"
rfc2119_level: MUST
topics:
    - http
