document: rfc-3768
kind: wire-format
summary: 'The VRRP packet consists of a fixed header followed by variable IP addresses and authentication data: 4-bit Version, 4-bit Type, 8-bit VRID, 8-bit Priority, 8-bit Count IP Addrs, 8-bit Auth Type, 8-bit Adver Int, 16-bit Checksum, then n×32-bit IP addresses, and two 32-bit Authentication Data words.'
