document: rfc-4287
kind: normative-requirement
summary: atom:entry elements that contain no atom:content MUST contain at least one atom:link with rel='alternate'. atom:entry MUST contain an atom:summary when atom:content has a 'src' attribute or when the content type is Base64-encoded binary (non-text, non-XML MIME type).
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
