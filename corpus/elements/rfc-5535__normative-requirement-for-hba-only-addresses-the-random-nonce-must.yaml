document: rfc-5535
kind: normative-requirement
summary: For HBA-only addresses, the random nonce MUST be encoded as a public key as defined in RFC 3972, specifically as a DER-encoded ASN.1 SubjectPublicKeyInfo structure with algorithm identifier rsaEncryption (1.2.840.113549.1.1.1) and formatted using the RSAPublicKey type. The random nonce length is 384 bits.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
