document: rfc-7621
kind: interoperability-note
summary: This document updates RFC 6665 to clarify GRUU handling requirements, replacing the original normative paragraph in Section 4.5.1 of RFC 6665. Implementations of RFC 6665 that did not apply the GRUU requirement to INVITE-created dialogs are non-conformant with this clarification.
