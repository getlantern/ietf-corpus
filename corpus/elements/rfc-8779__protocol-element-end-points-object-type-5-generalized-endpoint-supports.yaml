document: rfc-8779
kind: protocol-element
summary: END-POINTS object type 5 (Generalized Endpoint) supports unnumbered interfaces, label restrictions, and P2MP endpoints in GMPLS networks. It contains an 8-bit Endpoint Type field (0=P2P, 1-4=P2MP leaf types, 5-244=Unassigned, 245-255=Experimental) followed by TLVs.
section: 2.5.1
topics:
