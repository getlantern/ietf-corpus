document: rfc-8247
kind: normative-requirement
summary: RSA keys of length smaller than 2048 bits SHOULD NOT be used. RSA with 2048-bit keys MUST be supported; 3072 and 4096-bit keys SHOULD be supported.
section: 3.1.1
rfc2119_level: SHOULD NOT
