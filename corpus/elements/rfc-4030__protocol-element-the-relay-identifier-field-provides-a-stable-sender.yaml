document: rfc-4030
kind: protocol-element
summary: The Relay Identifier field provides a stable sender identity for relay agents that do not set giaddr. Servers use giaddr preferentially, then Relay ID if giaddr is unset, for associating per-sender state such as Key ID and replay-detection counters.
section: "6"
topics:
