document: rfc-7313
kind: normative-requirement
summary: When a BGP speaker receives a BoRR message, it MUST mark all routes for the given <AFI, SAFI> from that peer as stale. Subsequent route advertisements from the peer replace corresponding stale routes.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
