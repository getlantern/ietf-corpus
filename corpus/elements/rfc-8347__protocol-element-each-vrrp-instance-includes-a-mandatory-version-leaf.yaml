kind: protocol-element
summary: Each vrrp-instance includes a mandatory 'version' leaf (identityref base vrrp-version) selecting either vrrp-v2 or vrrp-v3. IPv6 instances MUST use vrrp-v3; a YANG 'must' constraint enforces this.
