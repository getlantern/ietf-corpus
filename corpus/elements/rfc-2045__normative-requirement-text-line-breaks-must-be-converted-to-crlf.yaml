document: rfc-2045
kind: normative-requirement
summary: Text line breaks must be converted to CRLF sequences before base64 encoding when encoding text that has not been converted to canonical form. This may be done directly by the encoder rather than as a separate canonicalization step.
section: "6.8"
rfc2119_level: MUST
topics:
    - email
