document: rfc-3775
kind: wire-format
summary: The Home Test Init message (MH Type 1) contains a 16-bit Reserved field followed by a 64-bit Home Init Cookie (random value). The Care-of Test Init message (MH Type 2) has the same layout with a 64-bit Care-of Init Cookie. Header Len is 1 when no mobility options are present.
section: 6.1.3
topics:
