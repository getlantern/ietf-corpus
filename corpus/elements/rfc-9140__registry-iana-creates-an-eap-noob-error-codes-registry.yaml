document: rfc-9140
kind: registry
summary: 'IANA creates an ''EAP-NOOB Error Codes'' registry with ranges: 1xxx (invalid messages, e.g., 1001 invalid NAI, 1002 unparseable JSON, 1005 invalid ECDHE key), 2xxx (state/peer errors, e.g., 2001 unwanted peer, 2002 state mismatch, 2003 unrecognized NoobId), 3xxx (negotiation failures), 4xxx (cryptographic verification failures, e.g., 4001 incorrect MAC).'
section: "5.3"
