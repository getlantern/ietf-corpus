document: rfc-5263
kind: security-consideration
summary: Partial notifications can reveal information about which aspects of a presentity's presence are changing, making it easier for an eavesdropper to infer behavior patterns. However, this is no worse than baseline PIDF, where the same information is visible in full documents.
