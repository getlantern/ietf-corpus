document: rfc-7309
kind: normative-requirement
summary: When a PE receives advertisements from the active PE in the same RG indicating all inter-domain PW status has changed to DOWN/STANDBY, and it has the highest priority after the advertising PE, it SHOULD advertise active state for all its associated inter-domain PWs.
section: 5.1.1
rfc2119_level: SHOULD
topics:
    - mpls
