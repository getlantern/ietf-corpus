document: rfc-5603
kind: security-consideration
summary: Even read access to pwEnetTable configuration (PW service layout, VLAN mappings) may be undesirable. Implementers should control GET and NOTIFY access and consider encrypting MIB values in transit via SNMPv3 cryptographic mechanisms.
