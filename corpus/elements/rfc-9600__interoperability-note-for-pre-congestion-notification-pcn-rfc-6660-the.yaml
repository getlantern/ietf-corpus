document: rfc-9600
kind: interoperability-note
summary: For Pre-Congestion Notification (PCN, RFC 6660), the CCE flag maps to the Excess-Traffic-Marked (ETM) codepoint and ECT(1) in TRILL-ECN maps to the Threshold-Marked (ThM) codepoint; no changes to ingress or egress behavior are required to support PCN alongside classic ECN.
section: "4.1"
topics:
