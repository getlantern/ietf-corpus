document: rfc-1444
kind: normative-requirement
summary: Under no circumstances shall a SNMPv2 entity return a value for objects which it does not implement — it must always return the appropriate exception or error (e.g., noSuchObject) as described in the protocol specification.
section: "3"
rfc2119_level: MUST NOT
topics:
