document: rfc-4724
kind: normative-requirement
summary: Once the session is re-established, if the Forwarding State bit for a specific AFI/SAFI is not set, if the AFI/SAFI is absent from the new Graceful Restart Capability, or if no Graceful Restart Capability is received at all, the Receiving Speaker MUST immediately remove all stale routes for that address family.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
