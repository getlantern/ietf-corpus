document: rfc-7136
kind: protocol-element
summary: The IPv6 Interface Identifier (IID) is a 64-bit field appended to a prefix to form a unicast IPv6 address. It is required to be 64 bits long for all unicast addresses except those starting with binary 000. If derived from an IEEE MAC-layer address, it must be constructed in Modified EUI-64 format.
