document: rfc-8860
kind: normative-requirement
summary: An SSRC in an RTP session MUST NOT change its media type during its lifetime. It can change between different formats of the same media type (e.g., audio codecs), but cannot switch from audio to video.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - webrtc
