document: rfc-7716
kind: security-consideration
summary: BGP routes for GTM carry IP multicast group addresses that are only valid within a certain scope. If a BGP route containing a group address is distributed outside the boundaries where that group address is meaningful, unauthorized distribution of multicast data flows may occur.
section: "4"
topics:
    - security
    - bgp
    - routing
    - multicast
