summary: Each dsmonAggProfileEntry maps one DSCP value (Dscp TC, 0–63, encoded as integer) to a DsmonCounterAggGroupIndex (Integer32, 0-based). The profile table always has exactly 64 such entries per profile, indexed by (dsmonAggControlIndex, dsmonAggProfileDSCP).
