document: rfc-8741
kind: protocol-element
summary: A new 'LSP Control Request' flag (bit 30), called the C flag, is introduced in the SRP object's Flags field. A PCE sets this flag to 1 in a PCUpd message to indicate it wishes to gain control of LSPs identified by the PLSP-ID in the associated LSP object.
section: "3"
topics:
