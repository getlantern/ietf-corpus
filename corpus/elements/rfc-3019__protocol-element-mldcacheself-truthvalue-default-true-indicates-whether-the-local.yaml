document: rfc-3019
kind: protocol-element
summary: mldCacheSelf (TruthValue, default true) indicates whether the local system is itself a member of the multicast group on this interface. A cache entry with mldCacheSelf true and mldCacheExpiryTime 0 exists solely because of local membership.
section: "3"
topics:
