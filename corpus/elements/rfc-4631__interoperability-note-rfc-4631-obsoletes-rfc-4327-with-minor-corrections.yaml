document: rfc-4631
kind: interoperability-note
summary: 'RFC 4631 obsoletes RFC 4327 with minor corrections: TruthValue descriptions are fixed so that true is consistently 1 and false is consistently 2 throughout all object descriptions, and punctuation is added to REFERENCE clauses. Implementations of RFC 4327 may have ambiguous TruthValue interpretations.'
