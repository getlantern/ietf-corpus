document: rfc-4271
kind: normative-requirement
summary: LOCAL_PREF SHALL be included in all UPDATE messages sent to internal peers. A BGP speaker MUST NOT include LOCAL_PREF in UPDATE messages sent to external peers (except in BGP Confederations); if received from an external peer it MUST be ignored.
section: 5.1.5
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
