document: rfc-6184
kind: normative-requirement
summary: In single NAL unit mode (packetization-mode=0 or absent), only single NAL unit packets MAY be used; STAPs, MTAPs, and FUs MUST NOT be used. All receivers MUST support this mode. Transmission order MUST comply with NAL unit decoding order.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
