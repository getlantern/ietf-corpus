document: rfc-5786
kind: wire-format
summary: 'The Node IPv4 Local Address sub-TLV (type 1) encodes one or more local IPv4 addresses as a sequence of <Prefix Length, Prefix> tuples: Prefix Length is 1 byte (max 32), and Prefix is 4 bytes zero-padded. The sub-TLV length is the sum of all n IPv4 address encoding lengths in octets.'
section: "4.1"
topics:
    - routing
    - ip
