document: rfc-6005
kind: protocol-element
summary: The UNI address resolution procedure uses a Notify message (per RFC4974) with a CALL_ATTRIBUTES object containing the Endpoint ID TLV (defined in RFC6004), with the SESSION object tunnel endpoint address set to zero, to request IP address resolution from the first core node.
