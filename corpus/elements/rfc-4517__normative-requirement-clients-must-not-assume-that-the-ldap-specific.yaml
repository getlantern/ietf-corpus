document: rfc-4517
kind: normative-requirement
summary: Clients MUST NOT assume that the LDAP-specific encoding of a value of an unrecognized syntax is a human-readable character string. There are cases (e.g., the JPEG syntax) when it is not reasonable to produce a human-readable representation.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ldap
