document: rfc-7840
kind: protocol-element
summary: The <routingInformation> element is returned in the HELD <locationResponse> when the LIS has routing information for the device's location. It contains a <service> element identified by a serviceUri URN, with one or more <dest> URIs representing PSAP or gateway destinations.
