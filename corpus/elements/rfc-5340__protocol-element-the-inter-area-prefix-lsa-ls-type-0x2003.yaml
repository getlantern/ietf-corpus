document: rfc-5340
kind: protocol-element
summary: The Inter-Area-Prefix-LSA (LS type 0x2003, formerly type-3 summary-LSA) has area flooding scope and describes an IPv6 prefix external to the area but internal to the AS. The Link State ID carries no addressing semantics and merely distinguishes multiple LSAs from the same ABR. Link-local addresses MUST never be advertised in this LSA type.
section: 4.4.3.4
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
