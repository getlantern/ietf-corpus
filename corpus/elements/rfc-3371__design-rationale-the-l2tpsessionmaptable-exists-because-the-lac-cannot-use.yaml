document: rfc-3371
kind: design-rationale
summary: The l2tpSessionMapTable exists because the LAC cannot use ifStackTable to express the binding between a physical PPP-terminating interface and the L2TP tunnel session carrying that PPP link. The explicit mapping table compensates for this architectural limitation.
