document: rfc-9873
kind: protocol-element
summary: The <addlEmail:email> element carries an OPTIONAL boolean 'primary' attribute (default false). When true, it indicates the extension email should be treated as the primary contact address. The 'primary' attribute MUST NOT be present when the element is empty.
