document: rfc-8775
kind: security-consideration
summary: Security of the DRLB Hello Options relies entirely on the security of PIM Hello messages (RFC 7761). A subverted DR could omit or add GDR Candidates or advertise an unsupported algorithm, disrupting load balancing—analogous to existing DR subversion attacks that manipulate DR priority.
section: "8"
topics:
    - security
    - multicast
