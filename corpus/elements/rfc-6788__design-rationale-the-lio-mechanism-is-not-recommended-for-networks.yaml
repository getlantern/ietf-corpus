document: rfc-6788
kind: design-rationale
summary: The LIO mechanism is NOT RECOMMENDED for networks that require automatic notification when a subscriber is no longer active, because there is no indication in this protocol when a subscriber becomes inactive and prefixes must be reclaimed manually.
