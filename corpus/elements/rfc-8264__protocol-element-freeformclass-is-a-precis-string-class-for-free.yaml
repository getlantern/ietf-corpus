document: rfc-8264
kind: protocol-element
summary: FreeformClass is a PRECIS string class for free-form strings such as passwords and display nicknames. In addition to LetterDigits and ASCII7, it allows Spaces, Symbols, Punctuation, HasCompat, and OtherLetterDigits code points. It still disallows OldHangulJamo, Controls, and PrecisIgnorableProperties. Expressiveness is prioritized over safety.
section: "4.3"
topics:
    - security
