document: rfc-9429
kind: normative-requirement
summary: During ICE candidate policy enforcement, the JSEP implementation MUST NOT expose disallowed candidates to the application, use them for connectivity checks, or indirectly expose them via raddr/rport attributes of other candidates. The implementation MUST allow the policy to be changed mid-session.
section: 3.5.3
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
