document: rfc-6925
kind: interoperability-note
summary: The Relay-ID sub-option is carried within the DHCPv4 Relay Agent Information option (RFC 3046). DHCP servers that recognize the Relay Agent Information option echo it back in replies, enabling end-to-end Relay-ID visibility.
section: "1"
