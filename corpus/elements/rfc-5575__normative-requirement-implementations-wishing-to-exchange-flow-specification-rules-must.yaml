document: rfc-5575
kind: normative-requirement
summary: Implementations wishing to exchange flow specification rules MUST use BGP's Capability Advertisement facility to exchange the Multiprotocol Extension Capability Code (Code 1) as defined in RFC 4760. The (AFI, SAFI) pair carried in that capability MUST match the one used to identify the specific flow-spec application.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
