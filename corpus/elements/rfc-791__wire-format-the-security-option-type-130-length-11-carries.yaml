document: rfc-791
kind: wire-format
summary: The Security option (Type=130, Length=11) carries a 16-bit Security classification field (16 levels including Unclassified, Confidential, Secret, Top Secret), a 16-bit Compartments field, a 16-bit Handling Restrictions field, and a 24-bit Transmission Control Code (TCC) for DoD closed user group segregation. Must be copied on fragmentation.
