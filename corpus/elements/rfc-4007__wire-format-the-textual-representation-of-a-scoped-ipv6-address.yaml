document: rfc-4007
kind: wire-format
summary: The textual representation of a scoped IPv6 address is '<address>%<zone_id>' where <address> is a standard IPv6 address literal, '%' is a single-character delimiter, and <zone_id> is a string (typically a non-negative decimal integer or an interface name). When combined with a prefix length, the format is '<address>%<zone_id>/<prefix-length>'. The format is not defined for URLs due to conflict with URI percent-encoding.
section: "11"
topics:
