document: rfc-3501
kind: protocol-element
summary: 'System flags are predefined message flags beginning with ''\'': \Seen, \Answered, \Flagged, \Deleted, \Draft, and \Recent. \Recent is a session-only flag set for messages newly arrived in the first session to be notified; it cannot be altered by the client.'
