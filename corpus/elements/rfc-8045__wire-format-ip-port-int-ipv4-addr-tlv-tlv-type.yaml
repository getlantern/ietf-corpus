document: rfc-8045
kind: wire-format
summary: IP-Port-Int-IPv4-Addr TLV (TLV-Type 4, Length 6 octets) carries IPFIX IE 8 (sourceIPv4Address) — the internal IPv4 address before NAT. It MUST be present in IP-Port-Forwarding-Map (241.7.4) when the internal realm is IPv4.
section: 3.2.4
topics:
