document: rfc-4704
kind: normative-requirement
summary: A client MUST only include the Client FQDN option in SOLICIT, REQUEST, RENEW, or REBIND messages. A client that sends the Client FQDN option MUST also include the option in the Option Request option if it expects the server to include the Client FQDN option in responses.
section: "5"
rfc2119_level: MUST
topics:
    - dns
