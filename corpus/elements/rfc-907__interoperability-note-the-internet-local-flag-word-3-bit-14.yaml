document: rfc-907
kind: interoperability-note
summary: The Internet/Local flag (word 3, bit 14) indicates whether the data portion contains a standard DoD Internet (IP) header. Setup messages may include an optional IP header between the datagram header and the setup header; the service host replies in the same format (Internet requests get Internet replies). Internet notification messages are not supported.
section: "3"
topics:
    - ip
