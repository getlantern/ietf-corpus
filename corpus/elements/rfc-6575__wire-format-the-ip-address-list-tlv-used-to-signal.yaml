document: rfc-6575
kind: wire-format
summary: The IP Address List TLV used to signal CE IPv4 addresses in the LDP Label Mapping message has a Length of 6 (2-byte Address Family field set to 1 for IPv4, and 4-byte Addresses field containing a single IPv4 address). An all-zeros address indicates the PE has not yet learned the CE IPv4 address.
section: "5.2"
topics:
