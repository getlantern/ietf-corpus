document: rfc-3339
kind: normative-requirement
summary: Systems configured with a local time, unaware of the corresponding UTC offset, and dependent on time synchronization with other Internet systems MUST use a mechanism that ensures correct synchronization with UTC (e.g., NTP).
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
