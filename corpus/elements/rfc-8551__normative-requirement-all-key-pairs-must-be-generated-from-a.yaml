document: rfc-8551
kind: normative-requirement
summary: All key pairs MUST be generated from a good source of non-deterministic random input (RFC 4086), and the private key MUST be protected in a secure fashion. An S/MIME agent MUST NOT generate RSA asymmetric keys less than 2048 bits.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - email
    - crypto
    - security
