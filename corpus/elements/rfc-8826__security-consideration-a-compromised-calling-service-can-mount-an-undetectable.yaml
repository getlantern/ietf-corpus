document: rfc-8826
kind: security-consideration
summary: A compromised calling service can mount an undetectable MITM attack by telling Alice she is calling Bob and Bob he is calling Alice while acting as a calling bridge. Preventing this requires positive authentication of the remote endpoint via explicit out-of-band key verification or a third-party identity service as described in RFC 8827.
section: 4.3.2
topics:
    - webrtc
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
