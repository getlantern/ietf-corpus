document: rfc-2051
kind: protocol-element
summary: 'appcLuPairAdminSessSec specifies session-level security for incoming BIND requests: ''required'' means the BIND must carry session-level verification; ''accepted'' means it may carry verification and it will be checked; ''notAllowed'' means the BIND must not carry session-level verification.'
