document: rfc-3047
kind: security-consideration
summary: Receivers may be overloaded by excessive packet volume (desired or not). Network-layer authentication can filter undesired sources, though its processing cost may itself be prohibitive; future IGMP and multicast routing extensions may allow source pruning.
section: "6"
topics:
