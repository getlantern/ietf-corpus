document: rfc-4842
kind: security-consideration
summary: CEP encapsulation is subject to all general security considerations of PWE3-ARCH. The security of the transported CEP service is only as good as the security of the PSN, which may be less rigorous than native TDM due to inherent differences between circuit-switched and packet-switched networks. Although RTP may be optionally used, SRTP mechanisms are not a substitute for securing the PW and underlying MPLS network.
section: "14"
topics:
    - security
    - mpls
    - realtime
