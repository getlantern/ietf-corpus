document: rfc-9111
kind: normative-requirement
summary: A cache MUST write through requests with unsafe methods (PUT, POST, DELETE, etc.) to the origin server; a cache MUST NOT generate a reply to such a request before having forwarded the request and received a corresponding response.
section: "4"
rfc2119_level: MUST
topics:
    - http
