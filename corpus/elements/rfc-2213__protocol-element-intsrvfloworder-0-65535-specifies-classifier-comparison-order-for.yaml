document: rfc-2213
kind: protocol-element
summary: intSrvFlowOrder (0..65535) specifies classifier comparison order for ambiguous flows. The row with intSrvFlowOrder=0 is tried first; comparisons proceed in increasing order. Non-serial classifier implementations must emulate this behavior.
section: "3.3"
topics:
