document: rfc-6582
kind: normative-requirement
summary: For the first partial ACK that arrives during fast recovery, reset the retransmit timer. This prevents the retransmit timer from expiring unnecessarily while more losses are being recovered.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - tcp
    - congestion
