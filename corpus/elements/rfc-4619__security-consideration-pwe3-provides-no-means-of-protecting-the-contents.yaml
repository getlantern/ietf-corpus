document: rfc-4619
kind: security-consideration
summary: PWE3 provides no means of protecting the contents or delivery of PW packets on behalf of the native service. Security must be leveraged from the MPLS Tunnel Layer. A more detailed discussion is given in RFC3985, RFC4447, and RFC3916.
section: "10"
topics:
