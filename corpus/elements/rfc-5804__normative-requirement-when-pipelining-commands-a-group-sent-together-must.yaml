document: rfc-5804
kind: normative-requirement
summary: When pipelining commands, a group sent together MUST NOT include an AUTHENTICATE, STARTTLS, or HAVESPACE command anywhere but as the last command in the list (with a narrow exception for single-round-trip SASL mechanisms that do not negotiate a security layer).
section: "2"
rfc2119_level: MUST NOT
topics:
    - email
