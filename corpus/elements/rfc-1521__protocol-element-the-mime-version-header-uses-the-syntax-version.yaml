document: rfc-1521
kind: protocol-element
summary: The MIME-Version header uses the syntax 'version := "MIME-Version" ":" 1*DIGIT "." 1*DIGIT'. It is required at the top level of a message but not for each body part of a multipart entity; it is required for embedded headers of a message/body only if the embedded message itself claims to be MIME-conformant.
section: "3"
