summary: 'rgss2_bind_chan_MIC_in_res encodes three fields: rbcmr_seq_num (unsigned int matching the RPCSEC_GSS credential seq_num), rbcmr_bind_chan_hash (one-way hash of the channel bindings including prefix), and rbcmr_res (copy of rbcvr_res). This structure is the input to GSS_GetMIC for the reply verifier''s rbcvr_mic field.'
