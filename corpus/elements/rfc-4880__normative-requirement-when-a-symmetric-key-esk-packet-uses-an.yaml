document: rfc-4880
kind: normative-requirement
summary: When a Symmetric-Key ESK packet uses an encrypted session key, the S2K specifier MUST use a salt value (Salted or Iterated-Salted S2K), because an all-zero IV is used for the session key decryption.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
