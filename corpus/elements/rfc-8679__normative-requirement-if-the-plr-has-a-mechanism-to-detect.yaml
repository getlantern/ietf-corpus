document: rfc-8679
kind: normative-requirement
summary: If the PLR has a mechanism to detect and differentiate a link failure from an egress node failure, it SHOULD set up both link protection and egress node protection and trigger only the appropriate one per failure type.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
