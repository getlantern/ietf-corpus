document: rfc-5654
kind: normative-requirement
summary: Mechanisms and capabilities MUST be able to interoperate with existing IETF MPLS (RFC 3031) and IETF PWE3 (RFC 3985) control and data planes where appropriate. Data-plane interoperability MUST NOT require a gateway function.
