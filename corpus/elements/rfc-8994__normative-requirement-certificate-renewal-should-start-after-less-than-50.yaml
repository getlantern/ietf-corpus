document: rfc-8994
kind: normative-requirement
summary: Certificate renewal SHOULD start after less than 50% of the domain certificate lifetime has elapsed, providing ample time for operators to investigate renewal failures and supporting nodes that operate disconnected from the CA for extended periods.
