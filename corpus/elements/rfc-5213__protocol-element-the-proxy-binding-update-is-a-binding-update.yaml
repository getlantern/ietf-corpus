document: rfc-5213
kind: protocol-element
summary: The Proxy Binding Update is a Binding Update message (from MIPv6) with the (P) flag set to 1. It is sent from the MAG to the LMA's LMAA address and MUST carry the Mobile Node Identifier, Home Network Prefix, Handoff Indicator, and Access Technology Type options.
section: "8.1"
