document: rfc-9643
kind: protocol-element
summary: 'The ''ietf-tcp-client'' module defines features: ''local-binding-supported'' (configurable local address/port), ''tcp-client-keepalives'' (keepalives configurable for clients), ''proxy-connect'' (proxy support), ''socks4-supported'', ''socks4a-supported'', ''socks5-supported'' (requires proxy-connect), ''socks5-gss-api'', and ''socks5-username-password'' (each requiring socks5-supported).'
