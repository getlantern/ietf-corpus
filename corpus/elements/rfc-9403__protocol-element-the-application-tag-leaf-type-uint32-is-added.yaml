document: rfc-9403
kind: protocol-element
summary: The 'application-tag' leaf (type uint32) is added to RIB routes as an additional opaque tag for application-specific semantics or policy different from the standard 'tag'. Unlike 'tag', it is not automatically advertised in OSPF AS-External LSAs.
