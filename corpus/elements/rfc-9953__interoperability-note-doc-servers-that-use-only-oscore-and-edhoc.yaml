document: rfc-9953
kind: interoperability-note
summary: DoC servers that use only OSCORE and EDHOC for security cannot be discovered using SVCB RR or DNR mechanisms, since those require an ALPN ID ("coap" for TLS, "co" for DTLS). Specifying an alternate discovery mechanism for OSCORE-only servers is out of scope.
section: "3.2"
topics:
    - dns
    - security
