document: rfc-6854
kind: interoperability-note
summary: Some RFC 5322-conformant implementations may not be prepared to handle group syntax in 'From:' and 'Sender:' because such syntax was previously forbidden. However, address field parsers are required to understand group syntax, so misbehavior is considered unlikely in practice.
section: "5"
