document: rfc-6956
kind: protocol-element
summary: EtherClassifier LFB classifies Ethernet frames by performing VLAN input table lookups (mapping incoming port ID + VLAN ID to a LogicalPortID) and Ethernet dispatch table lookups (mapping LogicalPortID + EtherType to a group output port index). Unmatched packets produce a ClassifyNoMatching ExceptionID.
section: 5.1.3
topics:
    - routing
