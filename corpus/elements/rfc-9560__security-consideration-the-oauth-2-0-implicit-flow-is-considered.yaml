document: rfc-9560
kind: security-consideration
summary: The OAuth 2.0 Implicit Flow is considered insecure and MUST NOT be used. TLS practices per RFC 9325 MUST be followed. RDAP server operators must develop policies to ensure that personally identifiable information in userClaims is disclosed only to authorized clients.
section: "10"
topics:
