document: rfc-8528
kind: protocol-element
summary: 'The ''ietf-yang-schema-mount'' module defines a read-only ''/schema-mounts'' container that holds: a ''namespace'' list (mapping XPath prefixes to URIs) and a ''mount-point'' list (keyed by module and label) that specifies the mounted schema for each mount point via either ''inline'' or ''shared-schema'' alternatives.'
section: "3.2"
