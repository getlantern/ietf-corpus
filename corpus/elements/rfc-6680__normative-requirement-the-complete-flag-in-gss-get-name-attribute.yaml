document: rfc-6680
kind: normative-requirement
summary: The 'complete' flag in GSS_Get_name_attribute() and GSS_Set_name_attribute() SHOULD NOT be used in federated cases where several peers may hold some of the attributes about a name, as it may be highly dangerous in that context.
section: "7.5"
rfc2119_level: SHOULD NOT
topics:
    - security
