document: rfc-5754
kind: protocol-element
summary: DSA MAY be used with SHA-224 (id-dsa-with-sha224) and SHA-256 (id-dsa-with-sha256) only. DSA is not specified with SHA-384 or SHA-512 because the maximum DSA modulus length p (L) is 3072 bits, which provides insufficient cryptographic strength to pair with those larger digests.
section: "3.1"
topics:
    - crypto
