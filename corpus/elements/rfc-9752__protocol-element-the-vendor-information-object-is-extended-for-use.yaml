document: rfc-9752
kind: protocol-element
summary: The Vendor Information object is extended for use in the PCInitiate (Path Computation LSP Initiate) message sent by a PCE to a PCC to trigger LSP instantiation or deletion. It can be included in PCE-initiated-lsp-instantiation to convey proprietary or vendor-specific information.
