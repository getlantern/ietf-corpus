document: rfc-7363
kind: normative-requirement
summary: When self-tuning is used, the finger table size MUST be set to max(ceiling(log2(N)), 16) using the estimated network size N. The successor list MUST be set to at most ceiling(log2(N)), and the predecessor list MUST be set to ceiling(log2(N)).
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
