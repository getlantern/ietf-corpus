document: rfc-7680
kind: security-consideration
summary: 'There are two types of security concerns: harm caused by measurements (active probing injecting traffic that can cause congestion) and harm to measurements (routers giving measurement traffic special priority, or attackers injecting artificial traffic to artificially lower the measured loss ratio). Authentication techniques such as digital signatures may guard against injected traffic attacks.'
