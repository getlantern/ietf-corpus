document: rfc-2298
kind: protocol-element
summary: The Disposition-Notification-To header requests that the receiving UA issue a message disposition notification. Its value is one or more RFC 822 mailboxes. Recipients' UAs are always free to silently ignore this request.
section: "2.1"
