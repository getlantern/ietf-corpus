document: rfc-5701
kind: protocol-element
summary: The IPv6 Address Specific Extended Community Attribute is a transitive, optional BGP attribute consisting of a set of IPv6 Address Specific extended communities. All routes carrying this attribute belong to the communities listed in it, and it supports multiple sub-types.
