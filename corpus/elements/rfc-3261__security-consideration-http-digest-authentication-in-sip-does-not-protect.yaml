document: rfc-3261
kind: security-consideration
summary: HTTP Digest authentication in SIP does not protect message bodies or most header fields, does not provide mutual authentication unless auth-int QOP is used, and does not prevent man-in-the-middle attacks against the initial challenge. TLS or S/MIME must be used in conjunction with Digest for stronger security guarantees.
section: 26.4.1
topics:
    - sip
    - security
    - crypto
