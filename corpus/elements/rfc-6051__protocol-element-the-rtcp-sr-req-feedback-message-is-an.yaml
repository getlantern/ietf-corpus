document: rfc-6051
kind: protocol-element
summary: The RTCP-SR-REQ feedback message is an RTP/AVPF transport layer feedback message with FMT=5 and PT=RTPFB (205). Its FCI part MUST be empty and the length field MUST equal 2. The SSRC of packet sender identifies the member unable to synchronise; the SSRC of media source identifies the sender whose SR is needed.
section: "3.2"
topics:
    - rtp
    - realtime
