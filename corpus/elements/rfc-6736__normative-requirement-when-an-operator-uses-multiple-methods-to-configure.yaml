document: rfc-6736
kind: normative-requirement
summary: When an operator uses multiple methods to configure a NAT device (CLI, SNMP, NETCONF, PCP, or DNCA), the operator MUST ensure configurations from different methods do not conflict, and the NAT device MUST allow the operator to configure a conflict-resolution policy specifying which mechanism takes precedence.
section: "1"
rfc2119_level: MUST
topics:
    - nat
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
