document: rfc-8255
kind: design-rationale
summary: 'The multilingual preface exists solely for backward compatibility: non-conforming clients are expected (per RFC 2046 Sections 5.1.3 and 5.1.7) to treat an unknown multipart subtype as ''multipart/mixed'' and display all parts sequentially or as attachments, so the preface helps recipients of such clients understand the message structure.'
section: "3.1"
topics:
    - email
