document: rfc-5652
kind: normative-requirement
summary: An implementation conforming to this specification MUST implement ContentInfo and MUST implement the data, signed-data, and enveloped-data content types. The other content types (digested-data, encrypted-data, authenticated-data) MAY be implemented.
section: "2"
rfc2119_level: MUST
