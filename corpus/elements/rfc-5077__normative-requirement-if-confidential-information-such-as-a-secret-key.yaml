document: rfc-5077
kind: normative-requirement
summary: If confidential information such as a secret key is transferred to the client in an alternate distribution scheme, it MUST be done using secure communication. The ticket MUST have its integrity and confidentiality protected with strong cryptographic techniques.
section: "5.7"
rfc2119_level: MUST
topics:
