document: rfc-9468
kind: security-consideration
summary: With unsolicited BFD there is a potential risk of excessive resource usage from unexpected remote systems. Mitigations include restricting to specific interfaces, applying subnet/host policies, and deploying only in environments without anonymous participation (e.g., IXPs with business relationships).
section: "6.1"
topics:
    - security
