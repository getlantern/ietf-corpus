document: rfc-2046
kind: normative-requirement
summary: The canonical form of any MIME 'text' subtype MUST always represent a line break as a CRLF sequence. Similarly, any occurrence of CRLF in MIME 'text' MUST represent a line break. Use of CR and LF outside of line break sequences is forbidden.
section: 4.1.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
