document: rfc-5460
kind: normative-requirement
summary: Servers that implement Bulk Leasequery and also permit UDP queries MUST NOT accept Bulk Leasequery query-types (QUERY_BY_RELAY_ID, QUERY_BY_LINK_ADDRESS, QUERY_BY_REMOTE_ID) in UDP Leasequery messages, and MUST respond with a NotAllowed error status code.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
