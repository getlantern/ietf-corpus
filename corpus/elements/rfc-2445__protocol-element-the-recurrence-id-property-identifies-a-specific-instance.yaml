document: rfc-2445
kind: protocol-element
summary: The RECURRENCE-ID property identifies a specific instance of a recurring event, to-do, or journal for the purpose of modifying or deleting that instance. The RANGE parameter (THISANDPRIOR or THISANDFUTURE) extends the modification to a contiguous range of instances.
section: 4.8.4.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
