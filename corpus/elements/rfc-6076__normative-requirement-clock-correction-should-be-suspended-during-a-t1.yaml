document: rfc-6076
kind: normative-requirement
summary: Clock correction SHOULD be suspended during a t1 to t4 measurement interval unless the +/- 1 ms time interval accuracy requirement can still be met. Alternatively, a measurement SHOULD NOT be performed during clock correction unless the accuracy requirement is met.
section: "3"
rfc2119_level: SHOULD
topics:
    - realtime
    - measurement
