document: rfc-2163
kind: protocol-element
summary: 'A new X.400 O/R name space is defined in DNS by placing a reserved label ''X42D'' under each national ISO two-letter country code top-level domain (e.g., X42D.it, X42D.de). Under X42D the hierarchy follows X.400 structure: ADMD, PRMD, O, OU. This anchors X.400 ''table1'' and ''gate1'' mapping entries in the DNS.'
section: "3"
topics:
