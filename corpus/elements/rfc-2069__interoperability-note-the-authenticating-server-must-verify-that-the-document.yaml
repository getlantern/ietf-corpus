document: rfc-2069
kind: interoperability-note
summary: The authenticating server must verify that the document identified by the uri parameter in the Authorization header is the same as the document actually served, since an intermediate proxy may have altered the original Request-URI. A mismatch should cause the server to reject the request.
section: 2.1.2
topics:
    - http
    - security
