document: rfc-5596
kind: normative-requirement
summary: The Service Code field in a DCCP-Listen packet MUST correspond to a Service Code the server is actually offering for a connection identified by the same source IP address and source port. The specific Service Code must be communicated out-of-band from client to server prior to sending DCCP-Listen.
section: 2.2.1
rfc2119_level: MUST
topics:
    - nat
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
