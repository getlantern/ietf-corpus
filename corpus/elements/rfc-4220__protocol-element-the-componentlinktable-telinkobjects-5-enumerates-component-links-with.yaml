document: rfc-4220
kind: protocol-element
summary: The componentLinkTable (teLinkObjects 5) enumerates component links with their maximum reservable bandwidth, preferred protection role (primary/secondary), and current protection status. Any ifEntry interface type defined for TE link interworking (ATM, Frame Relay, Ethernet, etc.) may serve as a component link.
