document: rfc-6674
kind: normative-requirement
summary: When creating an IPv4-to-IPv4 NAT binding for a packet received over the softwire, the AFTR SHOULD associate the CID with that NAT binding and SHOULD use the combination of CID and SWID as the unique identifier in the binding entry.
section: "4"
rfc2119_level: SHOULD
topics:
