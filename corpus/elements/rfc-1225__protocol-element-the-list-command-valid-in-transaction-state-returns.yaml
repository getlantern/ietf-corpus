document: rfc-1225
kind: protocol-element
summary: The LIST command, valid in TRANSACTION state, returns a 'scan listing' for one or all non-deleted messages. Each scan listing MUST begin with the message-id followed by the message size in octets. With no argument, the response is multi-line, one scan listing per message.
section: The TRANSACTION State
topics:
    - email
