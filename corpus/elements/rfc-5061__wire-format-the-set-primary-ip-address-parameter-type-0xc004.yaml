document: rfc-5061
kind: wire-format
summary: The Set Primary IP Address parameter (type 0xC004) contains a 32-bit ASCONF-Request Correlation ID and an IPv4 or IPv6 Address Parameter TLV; it may appear in ASCONF, INIT, or INIT-ACK chunks. If the address is 0.0.0.0 or ::0, the receiver MAY mark the packet source address as primary.
section: 4.2.4
topics:
    - sctp
    - multipath
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
