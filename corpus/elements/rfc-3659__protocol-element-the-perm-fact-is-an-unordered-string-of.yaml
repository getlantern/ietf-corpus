document: rfc-3659
kind: protocol-element
summary: 'The ''perm'' fact is an unordered string of up to 10 case-independent letters indicating FTP permissions for the current user: a=APPE, c=create-in-dir, d=delete, e=CWD-enter, f=rename-from, l=list, m=MKD, p=purge-dir-contents, r=RETR, w=STOR.'
section: 7.5.5
