document: rfc-4724
kind: design-rationale
summary: To restrict graceful restart to planned restarts only (as opposed to all restarts including power failures), an implementation can set the Forwarding State bit to 1 after a planned restart and to 0 otherwise. This is presented as one approach; other mechanisms are out of scope.
section: "4.1"
topics:
    - bgp
    - routing
