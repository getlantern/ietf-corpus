document: rfc-5961
kind: protocol-element
summary: MAX.SND.WND is a new TCP state variable defined as the largest receive window ever advertised by the remote peer on this connection. It is used to bound the acceptable ACK range for incoming data segments and may be scaled when the window scaling option (RFC 1323) is in use.
section: "5.2"
topics:
    - tcp
