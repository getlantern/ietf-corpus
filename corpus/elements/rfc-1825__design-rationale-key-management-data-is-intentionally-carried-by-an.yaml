document: rfc-1825
kind: design-rationale
summary: Key management data is intentionally carried by an upper-layer protocol (UDP, TCP) rather than within the IP layer, providing clear separation of mechanism and allowing new key management methods to be substituted without modifying AH or ESP implementations.
