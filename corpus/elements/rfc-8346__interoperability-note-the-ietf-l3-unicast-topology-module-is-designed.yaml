kind: interoperability-note
summary: The 'ietf-l3-unicast-topology' module is designed for NMDA-compliant implementations (RFC 8342). A companion module 'ietf-l3-unicast-topology-state' is provided in Appendix A for implementations that do not support NMDA; this state module augments the -state variants of the base modules and contains only read-only data nodes.
