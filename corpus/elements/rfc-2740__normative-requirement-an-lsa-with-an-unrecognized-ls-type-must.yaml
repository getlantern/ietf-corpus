document: rfc-2740
kind: normative-requirement
summary: An LSA with an unrecognized LS type MUST NOT be flooded into or throughout a stub area unless both (a) its flooding scope is area or link-local AND (b) its U-bit is 0. This prevents unrecognized LSAs from inflating stub area link-state databases beyond router capacity.
section: "2.10"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
