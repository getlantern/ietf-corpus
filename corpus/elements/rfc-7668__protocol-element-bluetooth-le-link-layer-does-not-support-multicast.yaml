document: rfc-7668
kind: protocol-element
summary: Bluetooth LE Link Layer does not support multicast. The 6LBR must replicate multicast packets and unicast them individually to each interested 6LN. 6LNs transmitting multicast packets unicast them to the 6LBR.
section: 3.2.5
topics:
