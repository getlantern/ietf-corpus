document: rfc-5182
kind: normative-requirement
summary: When a message listed in the search result variable is EXPUNGEd, it MUST be automatically removed from the list. If the server stores the list as message numbers, it MUST automatically adjust them when notifying the client about expunged messages.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
