document: rfc-8249
kind: normative-requirement
summary: Upward resizing of Sz SHOULD be dampened. When an upward resizing event is detected, it is RECOMMENDED that a timer (LSPresizeTime, default 300 seconds) be set, during which all subsequent upward resizing is ignored.
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
