document: rfc-3161
kind: normative-requirement
summary: If a nonce is included in TimeStampReq, the same nonce value MUST be included in the response; otherwise the response SHALL be rejected. The nonce should be a large random number (e.g., 64-bit integer) generated only once by the client.
section: 2.4.1
rfc2119_level: MUST
topics:
    - pkix
    - security
