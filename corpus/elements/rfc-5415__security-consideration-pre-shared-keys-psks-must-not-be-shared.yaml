document: rfc-5415
kind: security-consideration
summary: Pre-shared keys (PSKs) MUST NOT be shared among multiple WTPs; compromise of one WTP would expose all WTPs using the same PSK. Certificate-based mutual authentication is preferred for deployments requiring strong security guarantees.
section: "12.6"
topics:
    - security
    - tls
    - crypto
