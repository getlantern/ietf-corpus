document: rfc-3987
kind: normative-requirement
summary: Bidirectional IRIs MUST be rendered using the Unicode Bidirectional Algorithm [UNIV4][UNI9], specifically as if preceded by U+202A (LEFT-TO-RIGHT EMBEDDING) and followed by U+202C (POP DIRECTIONAL FORMATTING), unless the display is identical without the embedding.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
