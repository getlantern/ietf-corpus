document: rfc-8587
kind: interoperability-note
summary: If a single file system location entry designates multiple server IP addresses that correspond to different servers, this normally indicates misconfiguration. The client should avoid using such entries when alternatives are available; if unavoidable, it should pick one IP address and not use others not directed to the same server.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
