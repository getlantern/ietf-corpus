document: rfc-9670
kind: protocol-element
summary: A ShareNotification object records when the user's permissions on a shared object change. Properties include id, created (UTCDate), changedBy (Entity with name/email/principalId), objectType, objectAccountId, objectId, oldRights, newRights, and name. Only the server may create ShareNotifications.
