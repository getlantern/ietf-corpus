document: rfc-9695
kind: protocol-element
summary: 'The ''haptics/hmpg'' subtype is a streamable binary haptic effect coding (ISO/IEC 23090-31) for efficient coding of temporal and spatial haptic effects. Effects may target specific body parts and reference a device description. Encoding: binary. File extension: .hmpg.'
section: 4.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
