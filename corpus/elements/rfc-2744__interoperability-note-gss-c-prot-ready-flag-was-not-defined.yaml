document: rfc-2744
kind: interoperability-note
summary: GSS_C_PROT_READY_FLAG was not defined in Version 1 of the GSS-API. Applications should not rely on implementations setting this flag in the final ret_flags; instead they should use per-message services after successful context establishment guided by GSS_C_INTEG_FLAG and GSS_C_CONF_FLAG.
section: "5.1"
topics:
    - security
