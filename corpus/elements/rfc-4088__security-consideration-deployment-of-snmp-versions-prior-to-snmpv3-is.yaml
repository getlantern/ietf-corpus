document: rfc-4088
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. It is RECOMMENDED to deploy SNMPv3 with cryptographic security (authentication and privacy) enabled, and to configure access controls appropriately.
