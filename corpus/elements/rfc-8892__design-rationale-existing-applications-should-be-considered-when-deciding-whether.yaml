document: rfc-8892
kind: design-rationale
summary: Existing applications should be considered when deciding whether to reuse an existing ifType/tunnelType or define a new one. Different Ethernet flavors were originally registered with distinct values but were later deprecated in favor of ethernetCsmacd(6) because functional similarity made separate values problematic.
