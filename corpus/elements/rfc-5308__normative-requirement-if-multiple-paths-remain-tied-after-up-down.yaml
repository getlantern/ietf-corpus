document: rfc-5308
kind: normative-requirement
summary: If multiple paths remain tied after up/down and metric comparison, they SHOULD be considered for equal-cost multi-path (ECMP) routing if the router supports it; otherwise the router may select any one.
section: "5"
rfc2119_level: SHOULD
