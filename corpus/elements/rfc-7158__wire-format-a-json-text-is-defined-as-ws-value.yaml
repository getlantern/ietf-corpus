document: rfc-7158
kind: wire-format
summary: 'A JSON text is defined as ''ws value ws''. The six structural characters are: begin-array (%x5B ''[''), begin-object (%x7B ''{''), end-array (%x5D '']''), end-object (%x7D ''}''), name-separator (%x3A '':''), and value-separator (%x2C '',''). Insignificant whitespace (space, tab, line feed, carriage return) is allowed before or after any structural character.'
section: "2"
