document: rfc-1694
kind: protocol-element
summary: sipDS1PLCPSEFSs and sipDS3PLCPSEFSs are Counter32 objects counting Severely Errored Framing Seconds (one-second intervals with one or more SEF events). A SEF event is declared on errors in both A1 and A2 framing octets, or two consecutive invalid/nonsequential Path Overhead Identifier octets.
section: "4.3"
