document: rfc-5590
kind: design-rationale
summary: The separation of authentication and authorization (securityModel, securityName, securityLevel passed as model-independent parameters) was a deliberate RFC 3411 design decision to support authentication protocols lacking authorization capabilities and to support authorization schemes (like VACM) that do not perform their own authentication. The Transport Subsystem preserves this separation.
section: 3.2.4
topics:
    - snmp
    - security
