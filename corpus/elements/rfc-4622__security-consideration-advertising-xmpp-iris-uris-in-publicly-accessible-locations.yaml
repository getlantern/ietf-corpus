document: rfc-4622
kind: security-consideration
summary: Advertising XMPP IRIs/URIs in publicly accessible locations may enable harvesting of XMPP addresses from authority and path components, facilitating unsolicited bulk communications. Care should be taken in balancing open information exchange against unwanted communications.
section: "5.4"
topics:
    - security
    - privacy
