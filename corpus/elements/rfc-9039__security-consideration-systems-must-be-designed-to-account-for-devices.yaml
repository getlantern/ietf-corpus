document: rfc-9039
kind: security-consideration
summary: Systems must be designed to account for devices reporting incorrect identifiers (accidentally or maliciously) and for manipulation of identifiers in communications. Integrity protection, trusted devices, and management practices can mitigate these risks. Do not assume DEV URNs are hard to guess.
section: "6.2"
topics:
    - security
