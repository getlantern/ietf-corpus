document: rfc-8800
kind: security-consideration
summary: The ASSOCIATION object carrying DAG information reveals the grouping relationships between LSPs, which could allow an adversary eavesdropping on the PCEP session to infer network topology. Securing the PCEP session using TLS (RFC 8253), as per BCP 195 (RFC 7525), is RECOMMENDED.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
    - tls
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
