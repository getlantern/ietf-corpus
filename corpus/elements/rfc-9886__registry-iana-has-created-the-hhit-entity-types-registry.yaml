summary: 'IANA has created the HHIT Entity Types registry under the ''Drone Remote ID Protocol'' registry group, using First Come First Served policy. Initial values include: 0 (Not Defined), 1 (DIME), 5 (Apex), 9 (RAA), 13 (HDA), 16 (UA), 17 (GCS), 18 (UAS), 19 (RID Module), 20-27 covering Pilot, Operator, DSS, USS, SP, DP, SDSP, and Crowd Sourced RID Finder.'
