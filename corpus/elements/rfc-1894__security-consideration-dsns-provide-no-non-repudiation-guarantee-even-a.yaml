document: rfc-1894
kind: security-consideration
summary: DSNs provide no non-repudiation guarantee. Even a "failed" DSN cannot be relied upon as proof that a message was not received, due to SMTP race conditions (duplicate delivery when a connection drops after DATA completion) and active forgery possibilities.
section: "4.3"
topics:
    - email
    - security
