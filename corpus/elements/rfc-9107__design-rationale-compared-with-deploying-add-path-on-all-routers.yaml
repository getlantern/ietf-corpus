document: rfc-9107
kind: design-rationale
summary: Compared with deploying ADD-PATH on all routers, BGP ORR reduces the amount of state that needs to be pushed to the edge of the network in order to perform hot potato routing, while enabling hot potato routing even when route reflection has moved out of the forwarding plane.
