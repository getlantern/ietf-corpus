document: rfc-8591
kind: normative-requirement
summary: Clients MUST ensure that a text/html content type in an S/MIME body is a complete HTML document, and MUST treat each encrypted or signed piece of a MIME message as being from different origins. This mitigates the EFAIL attack.
section: "12"
rfc2119_level: MUST
topics:
    - security
