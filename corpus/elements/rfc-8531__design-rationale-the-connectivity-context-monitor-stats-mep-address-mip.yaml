document: rfc-8531
kind: design-rationale
summary: The 'connectivity-context', 'monitor-stats', 'mep-address', 'mip-address', and 'defect-message' groupings are all defined as choice/case constructs with a null default case. This pattern provides stable augmentation anchor points without forcing technology-specific data into the base model, enabling independent evolution of technology modules.
