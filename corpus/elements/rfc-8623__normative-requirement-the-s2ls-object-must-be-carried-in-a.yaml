document: rfc-8623
kind: normative-requirement
summary: The S2LS object MUST be carried in a PCRpt message along with the END-POINTS object when the N (P2MP) flag is set in the LSP object. If the S2LS object is missing, the receiving PCE MUST send a PCErr with Error-type=6 and Error-value=13 ('S2LS object missing').
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
