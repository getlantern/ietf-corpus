document: rfc-4931
kind: design-rationale
summary: The <renew> command requires a <domain:curExpDate> element containing the current expiry date. This ensures that repeated <renew> commands do not result in multiple unanticipated successful renewals, protecting against accidental double-renewal.
section: 3.2.3
topics:
    - dns
