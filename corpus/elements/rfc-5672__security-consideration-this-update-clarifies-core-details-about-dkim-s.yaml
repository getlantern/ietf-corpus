document: rfc-5672
kind: security-consideration
summary: This Update clarifies core details about DKIM's payload, affecting interoperability, semantic characterization, and expectations for identifiers carried with a DKIM signature. Clarification is likely to limit misinterpretation of DKIM's semantics and thereby improve DKIM's security characteristics, since DKIM is fundamentally a security protocol.
