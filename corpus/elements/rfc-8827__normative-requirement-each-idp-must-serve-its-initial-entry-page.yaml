document: rfc-8827
kind: normative-requirement
summary: 'Each IdP MUST serve its initial entry page from a well-known URI constructed as: https://<authority>/.well-known/idp-proxy/<protocol>. An IdP MUST be loaded using HTTPS. The separator characters ''/'' and ''\'' MUST NOT be permitted in the protocol field. The IdP MAY redirect but MUST retain the ''https:'' scheme.'
section: "7.5"
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
