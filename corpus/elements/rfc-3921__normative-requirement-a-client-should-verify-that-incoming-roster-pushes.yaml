document: rfc-3921
kind: normative-requirement
summary: 'A client SHOULD verify that incoming roster pushes originate from a trusted source: the stanza MUST either have no ''from'' attribute (implicitly from the server) or a ''from'' matching the user''s bare or full JID; otherwise the client SHOULD ignore the roster push.'
section: "7.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
