document: rfc-3032
kind: normative-requirement
summary: If a packet cannot be forwarded and either its network layer protocol cannot be identified or there are no protocol-dependent rules for handling the error, the packet MUST be silently discarded.
section: "2.2"
rfc2119_level: MUST
