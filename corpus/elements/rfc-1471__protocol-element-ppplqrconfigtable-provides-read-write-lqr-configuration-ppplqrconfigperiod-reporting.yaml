document: rfc-1471
kind: protocol-element
summary: 'pppLqrConfigTable provides read-write LQR configuration: pppLqrConfigPeriod (reporting period in hundredths of a second, default 0) and pppLqrConfigStatus (enabled/disabled, default enabled). Setting pppLqrConfigStatus to disabled invalidates the entry; agents may or may not remove it.'
