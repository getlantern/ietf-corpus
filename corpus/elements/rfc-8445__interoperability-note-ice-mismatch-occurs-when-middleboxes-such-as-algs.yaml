document: rfc-8445
kind: interoperability-note
summary: ICE mismatch occurs when middleboxes such as ALGs alter signaling (e.g., rewrite IP addresses in SDP), breaking candidate exchange. Each ICE usage specification must define whether the protocol is vulnerable to ICE mismatch, how to detect it, and what actions to take.
section: "5.4"
topics:
