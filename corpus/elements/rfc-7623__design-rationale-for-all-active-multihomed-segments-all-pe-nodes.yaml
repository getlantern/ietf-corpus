document: rfc-7623
kind: design-rationale
summary: For All-Active multihomed segments, all PE nodes in a redundancy group MUST share the same B-MAC address per site; otherwise remote PEs oscillate between B-MAC addresses as load balancing on the CE selects different uplinks.
