document: rfc-4204
kind: design-rationale
summary: The Verify_Id scoping mechanism was designed to allow parallel link verification across different link bundles or LMP sessions. The Verify_Id is node-unique and MUST NOT overlap any currently active Verify_Id, enabling the remote node to unambiguously correlate Test messages from concurrent verification procedures.
section: "5"
topics:
    - routing
