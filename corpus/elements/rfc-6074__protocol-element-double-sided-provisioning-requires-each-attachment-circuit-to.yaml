document: rfc-6074
kind: protocol-element
summary: Double-sided provisioning requires each Attachment Circuit to be configured with a local name, a remote PE address, and a remote name. The local name is sent as the SAII, the remote name as the TAII, and the AGI is null. If local and remote names are equal, the PWid FEC element may be used instead of the Generalized ID FEC element.
section: 3.1.1.1
topics:
    - mpls
    - vpn
