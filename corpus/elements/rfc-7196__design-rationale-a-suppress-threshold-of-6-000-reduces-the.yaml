kind: design-rationale
summary: A suppress threshold of 6,000 reduces the BGP update rate by 19% compared to no RFD, while damping 90% fewer prefixes than the default 2,000 threshold. This demonstrates that a higher threshold effectively targets chronic flappers while sparing normally converging prefixes.
