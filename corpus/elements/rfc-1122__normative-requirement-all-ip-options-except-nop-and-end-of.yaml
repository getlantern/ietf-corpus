document: rfc-1122
kind: normative-requirement
summary: All IP options except NOP and END-OF-LIST received in datagrams MUST be passed to the transport layer. Both the IP and transport layers MUST interpret options they understand and silently ignore the others. There MUST be a means for the transport layer to specify IP options to be included in transmitted datagrams.
section: 3.2.1.8
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
