document: rfc-2576
kind: normative-requirement
summary: The community string used in an outgoing SNMPv1 response MUST be the same as the community string from the original request; the original community string MUST be present in the stateReference of the original request.
section: 5.2.2
rfc2119_level: MUST
topics:
