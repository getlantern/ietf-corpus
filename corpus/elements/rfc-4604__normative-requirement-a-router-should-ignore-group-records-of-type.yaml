document: rfc-4604
kind: normative-requirement
summary: A router SHOULD ignore group records of type MODE_IS_EXCLUDE or CHANGE_TO_EXCLUDE_MODE if they refer to an SSM destination address (MODIFICATION), and MUST process any other group records within the same report.
section: "3.1"
rfc2119_level: MUST
topics:
