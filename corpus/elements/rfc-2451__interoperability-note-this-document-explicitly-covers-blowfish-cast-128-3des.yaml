document: rfc-2451
kind: interoperability-note
summary: This document explicitly covers Blowfish, CAST-128, 3DES, IDEA, and RC5 but states any block cipher MAY be used with ESP in CBC mode, provided all variables (mode, key size, weak keys, block size, rounds) are clearly defined.
