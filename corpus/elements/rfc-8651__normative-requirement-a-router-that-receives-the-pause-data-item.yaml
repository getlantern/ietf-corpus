document: rfc-8651
kind: normative-requirement
summary: A router that receives the Pause Data Item MUST cease sending the identified traffic to the modem. If a Pause Data Item contains a Queue Index value other than 255 or an index not established via Session Initialization/Update, the router MUST terminate the session with a Status Data Item indicating "Invalid Data".
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
