document: rfc-7766
kind: normative-requirement
summary: If a DNS server finds that a DNS client has closed a TCP session before all pending responses have been sent, then the server MUST NOT attempt to send those responses. The server MAY cache those responses.
section: 6.2.4
rfc2119_level: MUST NOT
topics:
    - dns
    - tcp
