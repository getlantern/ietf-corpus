summary: 'SLC defines 18 function codes split into two groups. Telnet-mapped functions (sent as Telnet equivalents): SLC_SYNCH (1), SLC_BRK (2), SLC_IP (3), SLC_AO (4), SLC_AYT (5), SLC_EOR (6), SLC_ABORT (7), SLC_EOF (8), SLC_SUSP (9). Locally processed functions: SLC_EC (10), SLC_EL (11), SLC_EW (12), SLC_RP (13), SLC_LNEXT (14), SLC_XON (15), SLC_XOFF (16), SLC_FORW1 (17), SLC_FORW2 (18).'
