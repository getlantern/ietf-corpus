document: rfc-5630
kind: security-consideration
summary: All SIPS security guarantees rely on every proxy and B2BUA on the path being compliant. Noncompliant intermediaries can silently downgrade or forge SIPS behavior; therefore SIPS must not be presented to users as an indication of end-to-end security.
section: "8"
topics:
