document: rfc-5846
kind: normative-requirement
summary: When the LMA sends a BRI for PMIPv6, it MUST set the P bit, MUST include the MN-ID option with the mobile node's NAI, and MUST use the proxy care-of address as the IPv6 destination. If IPsec is used and the mag_address differs from the proxy CoA, an Alternate Care-of Address option MUST be included.
section: "8.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
