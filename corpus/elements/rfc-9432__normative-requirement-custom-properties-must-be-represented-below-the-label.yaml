document: rfc-9432
kind: normative-requirement
summary: Custom properties MUST be represented below the label 'ext' (e.g., '<property-prefix>.ext.$CATZ' for global or '<property-prefix>.ext.<unique-N>.zones.$CATZ' for member-scoped). Implementations SHOULD namespace their custom properties to reduce clash risk with other implementations.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
