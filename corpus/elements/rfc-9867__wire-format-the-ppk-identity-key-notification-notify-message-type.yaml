document: rfc-9867
kind: wire-format
summary: The PPK_IDENTITY_KEY notification (Notify Message Type 16446) carries a variable-length PPK_ID field followed by an 8-octet PPK Confirmation field. The PPK Confirmation is the first 8 octets of prf(PPK, Ni | Nr | SPIi | SPIr) for IKE_INTERMEDIATE, or prf(PPK, Ni | SPIi | SPIr) for CREATE_CHILD_SA.
section: "3.1"
