document: rfc-2651
kind: normative-requirement
summary: 'Index object aggregation is only permitted when: (a) all objects to be aggregated cover exactly the same set of protocols per their Base-URI schemes, (b) the aggregating server supports every protocol in those Base-URIs, and (c) the index type specification explicitly defines the aggregation operation.'
section: 3.2.3
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
