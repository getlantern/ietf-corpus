document: rfc-5475
kind: security-consideration
summary: Without a private hash parameter, an attacker knowing the Hash Function can precompute which packets will be selected regardless of hash strength. Even if the selection range is private, the attacker can construct arbitrarily large sets of packets with common selection properties.
section: 6.2.3.1
topics:
