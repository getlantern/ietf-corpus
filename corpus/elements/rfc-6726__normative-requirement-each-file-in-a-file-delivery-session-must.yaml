document: rfc-6726
kind: normative-requirement
summary: Each file in a file delivery session MUST be associated with a TOI value greater than 0, scoped by the source IP address and TSI. An object received with an unmapped non-zero TOI SHOULD in general be ignored by a FLUTE receiver.
section: "3.1"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
