document: rfc-2421
kind: normative-requirement
summary: VPIM delivery status notification messages MUST be sent to the originator when any form of non-delivery occurs. Notifications MUST be contained in a multipart/report container and SHOULD include a spoken audio error message.
section: "4.7"
rfc2119_level: MUST
topics:
