document: rfc-9290
kind: registry
summary: RFC 9290 creates the 'Standard Problem Detail Keys' subregistry in the CoRE Parameters registry. Registration procedure is Specification Required. Keys are negative integers; initial entries are -1 (title) through -8 (unprocessed-coap-option). Names must match [a-z][-a-z0-9]*.
