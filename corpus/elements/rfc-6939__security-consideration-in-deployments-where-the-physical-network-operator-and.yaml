document: rfc-6939
kind: security-consideration
summary: In deployments where the physical network operator and the connectivity provider are administratively separate, the Client Link-Layer Address option may reveal client identity information to a party that would not otherwise have it. IPsec is strongly recommended to provide confidentiality for relay-agent-to-server messages, especially over open networks.
section: "9"
topics:
    - security
    - privacy
    - ip
