document: rfc-2205
kind: interoperability-note
summary: RSVP supports both IPv4 and IPv6. IPv6's variable-length Internet-layer headers increase the difficulty and cost of packet classification for QoS; efficient classification of IPv6 data packets could use the Flow Label field, but the details were left for future specification at the time of publication.
section: "1.2"
topics:
    - qos
    - realtime
    - ip
