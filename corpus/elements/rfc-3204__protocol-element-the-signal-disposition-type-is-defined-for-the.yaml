document: rfc-3204
kind: protocol-element
summary: The 'signal' disposition-type is defined for the Content-Disposition header to indicate that a MIME body part contains supplemental signaling information associated with the session but does not describe the session itself. This is the default disposition-type for both ISUP and QSIG body parts.
section: "3.1"
