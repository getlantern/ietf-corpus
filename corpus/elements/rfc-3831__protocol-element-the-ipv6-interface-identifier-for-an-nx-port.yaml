document: rfc-3831
kind: protocol-element
summary: The IPv6 Interface Identifier for an Nx_Port is derived from the EUI-64 address mapped from the N_Port_Name, with the Universal/Local bit complemented. Formats 0x1, 0x2, and 0x5 produce locally-scoped identifiers; EUI-64 mapped formats (0xC-0xF) produce globally-scoped identifiers.
section: "6.1"
topics:
