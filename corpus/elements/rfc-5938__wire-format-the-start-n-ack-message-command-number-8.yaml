document: rfc-5938
kind: wire-format
summary: 'The Start-N-Ack message (Command Number 8) contains: 1-octet command number, 1-octet Accept field, 2 octets MBZ, 8 octets MBZ, 4-octet Number of Sessions, one or more 16-octet SID fields, and a 16-octet HMAC terminator. All SIDs with the same Accept code may be acknowledged in a single Start-N-Ack message.'
section: "3.3"
