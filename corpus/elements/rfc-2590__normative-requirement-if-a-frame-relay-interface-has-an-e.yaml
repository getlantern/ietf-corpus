document: rfc-2590
kind: normative-requirement
summary: If a Frame Relay interface has an E.164 or X.121 number or an NSAP address, the 'Mid' field MUST be filled with the value derived from it (BCD or binary, truncated to 38 bits), rather than using locally administered numbers.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
