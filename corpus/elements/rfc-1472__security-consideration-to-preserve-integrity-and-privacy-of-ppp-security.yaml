document: rfc-1472
kind: security-consideration
summary: To preserve integrity and privacy of PPP security features, implementations MUST allow access to this MIB only via SNMPv2 with privacy enhancement. Access via SNMPv1 or SNMPv2 without privacy is described as 'very dangerous' and may compromise PPP service security.
section: "6"
topics:
    - snmp
    - security
