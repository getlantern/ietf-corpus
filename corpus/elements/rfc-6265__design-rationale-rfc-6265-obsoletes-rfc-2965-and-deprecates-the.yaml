document: rfc-6265
kind: design-rationale
summary: RFC 6265 obsoletes RFC 2965 and deprecates the Cookie2 and Set-Cookie2 header fields, because none of the prior specifications (Netscape cookie spec, RFC 2109, RFC 2965) accurately described how cookies are actually used on the Internet. The goal is to codify existing practice rather than introduce new syntax or semantics.
section: "1"
topics:
