document: rfc-8691
kind: interoperability-note
summary: IPv6 Neighbor Discovery requires reflexive (bidirectional) and transitive properties for DAD and AR; an IPv6 subnet can be mapped on an OCB network only if all nodes share a single physical broadcast domain. Extension to NBMA multi-OCB-link subnets is out of scope.
section: "4.6"
topics:
    - ip
    - mobility
