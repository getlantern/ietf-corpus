document: rfc-7256
kind: protocol-element
summary: The Multicast Replication Control message (Message Type 144) is sent by the NAS to the AN with one or more Command TLVs directing the AN to add or delete multicast flows on a target access port; each Command TLV embeds a Command Code, Accounting field, and Multicast-Flow TLV.
section: "4.3"
