document: rfc-5565
kind: protocol-element
summary: When the core supports mLDP, each E-IP SSM (S,G) tree can be mapped one-to-one onto a P2MP LSP rooted at the upstream AFBR. The original (S,G) is algorithmically encoded into the mLDP FEC identifier and must be standardized.
