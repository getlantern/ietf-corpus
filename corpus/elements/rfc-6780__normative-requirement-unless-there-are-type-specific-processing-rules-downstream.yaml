document: rfc-6780
kind: normative-requirement
summary: Unless there are type-specific processing rules, downstream nodes MUST forward all ASSOCIATION objects received in a Path message in any corresponding outgoing Path messages without modification. This MUST also be followed for unknown Association Type field values.
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
