document: rfc-7881
kind: normative-requirement
summary: A received S-BFD Control packet MUST be demultiplexed using the destination UDP port field, following the procedure in RFC 7880 Section 7.1. If the port is 7784, the packet MUST be looked up to locate a corresponding SBFDReflector session based on the Your Discriminator field.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
