document: rfc-2364
kind: design-rationale
summary: PPP uses AAL5 as a framing mechanism rather than ISO 3309 HDLC because ATM networks configured with point-to-point connections provide a packet delivery service with error detection, making AAL5 a natural framing layer for PPP without needing HDLC's byte-stuffing overhead.
