document: rfc-8895
kind: interoperability-note
summary: 'JSON merge patch is superior to JSON patch for cost maps, endpoint costs, and endpoint properties because it is more space-efficient and simpler to apply. For network maps, the choice is less clear: JSON patch handles prefix-level array changes efficiently but requires clients to retain array indexes they would not otherwise need.'
section: "9.1"
topics:
    - http
    - json
