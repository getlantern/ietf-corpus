document: rfc-4625
kind: interoperability-note
summary: The MIB imports fcmInstanceIndex and fcmSwitchIndex from FC-MGMT-MIB (RFC 4044) and T11FabricIndex from T11-TC-MIB (RFC 4439); implementations must support those base MIBs. It complements—but does not replace—the FSPF-specific MIB in RFC 4626.
