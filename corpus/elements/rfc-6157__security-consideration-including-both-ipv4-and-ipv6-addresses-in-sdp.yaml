document: rfc-6157
kind: security-consideration
summary: Including both IPv4 and IPv6 addresses in SDP makes a UAC more susceptible to denial-of-service attacks targeting multiple network interfaces simultaneously. UACs should protect the confidentiality and integrity of SIP messages (e.g., via the SIPS URI scheme or S/MIME as described in RFC 3261 Sections 26.2.2 and 23).
section: "6"
topics:
    - sip
    - security
    - v6ops
