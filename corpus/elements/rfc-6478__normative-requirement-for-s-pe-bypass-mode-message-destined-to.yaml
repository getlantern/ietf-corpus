document: rfc-6478
kind: normative-requirement
summary: For S-PE bypass mode (message destined to the egress T-PE), a T-PE MUST set the PW label TTL to a value sufficient to reach the corresponding T-PE (greater than 1, per local policy). If the control word is not in use, the GAL label MUST also be placed below the PW label with TTL set to 1.
section: 5.4.2
rfc2119_level: MUST
topics:
    - mpls
