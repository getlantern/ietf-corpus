document: rfc-1209
kind: interoperability-note
summary: SMDS does not support the JoinLocalGroup/LeaveLocalGroup dynamic subscription interface required by RFC 1112 IP multicasting, making standard IP multicast procedures incompatible with SMDS. The broadcast-media fallback method from RFC 1112 is used instead.
section: IP Multicast Support
topics:
    - ip
    - multicast
