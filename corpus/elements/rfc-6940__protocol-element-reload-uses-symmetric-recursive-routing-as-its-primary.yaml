document: rfc-6940
kind: protocol-element
summary: 'RELOAD uses symmetric recursive routing as its primary routing mechanism: requests traverse the overlay hop-by-hop toward the destination, and responses follow the same path back. Each intermediate peer appends its identity to the Via List, which is inverted to form the response Destination List.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
