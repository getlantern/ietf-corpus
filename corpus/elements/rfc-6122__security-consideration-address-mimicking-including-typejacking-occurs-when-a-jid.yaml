document: rfc-6122
kind: security-consideration
summary: Address mimicking (including 'typejacking') occurs when a JID appears visually identical to another, exploiting Unicode confusable characters. Stringprep technologies do not map similar-looking characters together, so XMPP localparts and resourceparts can contain confusables, enabling phishing-like attacks.
section: 4.3.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
