summary: 'P-node add-name procedure: sends NAME REGISTRATION REQUEST unicast to NBNS; on POSITIVE response, name is registered; on END-NODE CHALLENGE response, P-node must challenge the current owner via unicast NAME QUERY; on WACK, extends wait timer using TTL from WACK response.'
