document: rfc-3601
kind: protocol-element
summary: The tonewait element is represented by the character "w" (case insensitive) and SHOULD be interpreted as a pause that lasts until the calling party hears a dial tone or another indication that more characters may be processed; an off-hook indication MAY also serve as such an indication.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
