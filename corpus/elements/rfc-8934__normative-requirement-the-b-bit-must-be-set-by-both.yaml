document: rfc-8934
kind: normative-requirement
summary: The B bit MUST be set by both PCEP peers in order to support LSP scheduling for path computation. Both the PD bit and the B bit MUST be set to 1 by both PCEP peers in order to support periodical LSP scheduling.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
