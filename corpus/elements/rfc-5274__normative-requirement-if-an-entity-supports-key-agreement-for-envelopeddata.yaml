document: rfc-5274
kind: normative-requirement
summary: If an entity supports key agreement for EnvelopedData, it MUST support Diffie-Hellman. If an entity supports PasswordRecipientInfo, it MUST support PBKDF2 for key derivation and MUST support AES key wrap as the key encryption algorithm.
section: "4.1"
rfc2119_level: MUST
topics:
