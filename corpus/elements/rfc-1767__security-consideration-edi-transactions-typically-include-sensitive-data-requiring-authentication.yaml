document: rfc-1767
kind: security-consideration
summary: EDI transactions typically include sensitive data requiring authentication, data integrity, privacy, access control, and non-repudiation. This specification permits transmission of such data via Internet mail and MIME but does not itself provide any of these security services; they must be added externally.
section: "7"
topics:
    - security
    - email
