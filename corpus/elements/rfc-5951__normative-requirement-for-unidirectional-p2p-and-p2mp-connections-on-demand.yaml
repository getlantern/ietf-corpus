document: rfc-5951
kind: normative-requirement
summary: For unidirectional P2P and P2MP connections, on-demand delay measurement is REQUIRED. For co-routed bidirectional P2P, on-demand one-way and two-way delay measurement is REQUIRED. For associated bidirectional P2P, on-demand one-way delay measurement is REQUIRED.
section: 7.2.2
rfc2119_level: REQUIRED
