document: rfc-3657
kind: normative-requirement
summary: Implementations MUST support the CEK and KEK having the same length. If different lengths are supported, the KEK MUST be of equal or greater length than the CEK.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
