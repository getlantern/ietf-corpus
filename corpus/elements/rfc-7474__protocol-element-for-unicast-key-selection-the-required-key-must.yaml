document: rfc-7474
kind: protocol-element
summary: For unicast key selection, the required key must have a Peers field matching the area ID (or 'all'), a Direction of 'out' or 'both', and an Interfaces field matching the outgoing interface. When multiple keys match, the key with the most recent SendLifetimeStart is preferred to facilitate graceful key rollover. For virtual links, the Peers field must encode both the transit area ID and the virtual endpoint's router ID.
section: "4.1"
topics:
    - routing
    - security
