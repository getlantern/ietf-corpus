document: rfc-9441
kind: state-machine
summary: 'Fragmentation concludes at the sender when: integrity checking confirms correct reassembly and this is conveyed back to sender (C=1 ACK received for last window), too many retransmission attempts have been made (Attempts >= MAX_ACK_REQUESTS), or the receiver determines transmission has been inactive too long (Inactivity Timer expiry triggers Receiver-Abort).'
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
