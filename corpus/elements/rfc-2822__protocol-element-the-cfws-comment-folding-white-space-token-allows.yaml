document: rfc-2822
kind: protocol-element
summary: The CFWS (comment / folding white space) token allows comments enclosed in parentheses and folding white space to appear between many structured header field tokens. Comments may nest and may contain quoted-pairs. CFWS MUST NOT produce a folded line consisting entirely of WSP.
section: 3.2.3
topics:
