document: rfc-6407
kind: protocol-element
summary: The Sequence Number (SEQ) payload carries a monotonically increasing counter associated with the KEK, providing anti-replay state for GROUPKEY-PUSH messages. The counter resets to 1 when a new KEK attribute is introduced; the first GROUPKEY-PULL distributes the current sequence number (zero if no rekeys have occurred).
section: "3.2"
topics:
    - ipsec
    - security
