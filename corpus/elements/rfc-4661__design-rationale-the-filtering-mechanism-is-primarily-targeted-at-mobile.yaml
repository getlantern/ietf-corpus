document: rfc-4661
kind: design-rationale
summary: The filtering mechanism is primarily targeted at mobile wireless devices characterized by high latency, low bandwidth, low processing capability, and limited battery power. Filtering at the event source reduces the amount of information transmitted to the device, though implementers must consider the computational burden placed on the notifier.
