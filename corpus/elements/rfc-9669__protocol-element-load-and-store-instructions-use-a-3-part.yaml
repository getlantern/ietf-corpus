document: rfc-9669
kind: protocol-element
summary: 'Load and store instructions use a 3-part opcode: ''mode'' (3 bits: IMM=0, ABS=1, IND=2, MEM=3, MEMSX=4, ATOMIC=6) and ''sz'' (2 bits: W=0 for 4 bytes, H=1 for 2 bytes, B=2 for 1 byte, DW=3 for 8 bytes). Instructions using DW belong to the base64 conformance group.'
section: "5"
