document: rfc-3768
kind: protocol-element
summary: The virtual router MAC address format is 00-00-5E-00-01-{VRID} in IEEE 802 48-bit format (internet standard bit-order), where the first three octets are the IANA OUI, 00-01 designates the VRRP block, and VRID (1–255) identifies the virtual router.
section: "7.3"
