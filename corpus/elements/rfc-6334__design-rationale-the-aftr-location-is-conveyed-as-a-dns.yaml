document: rfc-6334
kind: design-rationale
summary: The AFTR location is conveyed as a DNS FQDN rather than a raw IPv6 address so that the presence of the option itself signals the B4 to initiate DS-Lite service. Using a DNS name also decouples the B4 configuration from direct AFTR address changes and allows operator flexibility in AFTR selection.
section: "1"
topics:
    - v6ops
    - dns
