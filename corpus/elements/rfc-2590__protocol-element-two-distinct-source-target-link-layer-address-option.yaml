summary: 'Two distinct Source/Target Link-layer Address option formats are defined for use in Neighbor Discovery and Inverse Neighbor Discovery messages on Frame Relay: the ''DLCI Format'' (used on already-established VCs) and the ''Frame Relay Address Format'' (used to establish new SVCs via E.164, X.121, or NSAP).'
