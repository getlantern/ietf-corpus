document: rfc-1248
kind: design-rationale
summary: In the absence of a standard SNMP security architecture, implementations are explicitly permitted to implement read-write MIB objects as read-only and provide an alternative management interface for their modification, since the MIB is designed for protocol management not just monitoring.
