document: rfc-1407
kind: state-machine
summary: DS3 interface unavailability is declared at the onset of 10 contiguous PSESs or a failure condition (whichever is earlier). Once unavailable, the interface returns to available at the onset of 10 contiguous seconds with no PSESs; if a failure is also present with clearing time >10 seconds, availability resumes at whichever occurs later.
section: 3.3.2
topics:
