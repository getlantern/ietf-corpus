document: rfc-5793
kind: security-consideration
summary: 'PB-TNC relies entirely on the underlying Posture Transport (PT) protocol for security services: mutual authentication of endpoints, confidentiality and integrity of batches, and replay attack prevention. The threat model identifies risks of endpoint impersonation, data interception, tampering, and replay. PB-TNC has no independent security mechanisms and is only as secure as the PT layer beneath it.'
section: "5"
topics:
    - security
