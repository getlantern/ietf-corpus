document: rfc-4951
kind: protocol-element
summary: The Failover Session Response (FSR) control message (Vendor ID 0, Attribute Type 22) is sent in response to an FSQ message. It MUST contain Message Type and Failover Session State AVPs; one FSR may respond to multiple FSQs, or multiple FSRs may respond to one FSQ. The M-bit on the Message Type AVP MUST be set to 0.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
