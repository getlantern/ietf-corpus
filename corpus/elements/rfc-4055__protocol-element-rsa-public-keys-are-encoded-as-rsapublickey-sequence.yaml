document: rfc-4055
kind: protocol-element
summary: RSA public keys are encoded as RSAPublicKey ::= SEQUENCE { modulus INTEGER, publicExponent INTEGER }, carried as a DER-encoded value in the subjectPublicKey BIT STRING within SubjectPublicKeyInfo. This encoding is used regardless of which algorithm OID (rsaEncryption, id-RSASSA-PSS, or id-RSAES-OAEP) appears in the algorithm field.
section: "1.2"
topics:
