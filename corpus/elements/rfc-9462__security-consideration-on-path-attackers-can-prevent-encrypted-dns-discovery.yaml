document: rfc-9462
kind: security-consideration
summary: On-path attackers can prevent encrypted DNS discovery by dropping SVCB queries or responses. Clients cannot reliably distinguish between a resolver with no Designated Resolver and an active attack; periodically re-sending SVCB queries limits the impact.
section: "7"
topics:
