document: rfc-9314
kind: state-machine
summary: 'The ''state'' typedef enumerates four BFD session states as defined in RFC 5880: adminDown (0), down (1), init (2), and up (3). Both local-state and remote-state are exposed in ''session-running'' operational state. Transitions trigger notifications carrying the new state, diagnostic code, and timestamp.'
section: "2.11"
