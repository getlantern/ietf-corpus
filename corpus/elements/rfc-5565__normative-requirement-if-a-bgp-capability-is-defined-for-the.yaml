document: rfc-5565
kind: normative-requirement
summary: If a BGP capability is defined for the case where an E-IP NLRI has an I-IP next hop (as required for cross-family encoding such as RFC 5549), all AFBRs in a given transit core MUST advertise that capability.
section: "5"
rfc2119_level: MUST
