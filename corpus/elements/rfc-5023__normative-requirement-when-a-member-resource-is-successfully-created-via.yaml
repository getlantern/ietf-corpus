document: rfc-5023
kind: normative-requirement
summary: When a Member Resource is successfully created via POST, the server MUST return a 201 status code and MUST include the Member Entry URI in a Location header. The server SHOULD also return a response body containing the Atom Entry Document representing the newly created Resource.
section: "9.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
