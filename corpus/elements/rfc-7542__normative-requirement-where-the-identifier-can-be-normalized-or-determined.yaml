document: rfc-7542
kind: normative-requirement
summary: Where the identifier can be normalized or determined to be in normal form, that normal form MUST be used as the NAI. In all other circumstances, the user identifier MUST NOT be treated as an NAI. AAA systems MUST NOT fail authentication simply because the user identifier is not an NAI.
section: 2.6.1
rfc2119_level: MUST
