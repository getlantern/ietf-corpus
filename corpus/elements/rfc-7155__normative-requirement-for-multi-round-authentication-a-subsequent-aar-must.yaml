document: rfc-7155
kind: normative-requirement
summary: For multi-round authentication, a subsequent AAR MUST include any State AVPs that were present in the prior AAA message; the server MUST set Result-Code to DIAMETER_MULTI_ROUND_AUTH to signal continuation.
