document: rfc-8964
kind: design-rationale
summary: The d-CW was designed so that zero (0) is a valid sequence number, which simplifies implementation. This explicitly differs from RFC 4448, where a sequence number of zero is used to indicate that the sequence number check algorithm is not used.
