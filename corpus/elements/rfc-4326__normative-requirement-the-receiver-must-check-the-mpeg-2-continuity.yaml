document: rfc-4326
kind: normative-requirement
summary: The Receiver MUST check the MPEG-2 Continuity Counter; duplicate TS Packets (same counter value) MUST be silently discarded. A counter discontinuity MUST cause discard of any partially received SNDU and entry into Idle State.
section: "7.3"
rfc2119_level: MUST
topics:
    - ip
