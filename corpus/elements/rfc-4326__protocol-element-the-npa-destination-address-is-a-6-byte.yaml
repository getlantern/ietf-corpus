document: rfc-4326
kind: protocol-element
summary: The NPA Destination Address is a 6-byte field used to identify individual or group Receivers in the MPEG-2 network. The all-zeros value MUST NOT be used; the LSB of the first byte signals multicast; 0xFF:FF:FF:FF:FF:FF is the link broadcast address.
section: "4.5"
topics:
    - ip
    - multicast
