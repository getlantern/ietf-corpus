document: rfc-2915
kind: design-rationale
summary: Regular expressions were chosen for the Regexp field because of their compactness-to-expressivity ratio, allowing a great deal of information to be encoded in a relatively small DNS packet. True sed(1) and Perl-style expressions were rejected due to internationalization requirements and backref limitations.
section: "1"
