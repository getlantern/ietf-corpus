document: rfc-7402
kind: state-machine
summary: During rekeying, a host MUST NOT generate new UPDATEs while it has an outstanding ESP SA update request (unless restarting). A system transitions from using old SAs to new SAs after receiving both an ACK for its UPDATE and the peer's corresponding UPDATE parameters.
section: "6.8"
topics:
    - ipsec
