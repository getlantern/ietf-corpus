document: rfc-3986
kind: design-rationale
summary: The fragment identifier is separated from the rest of the URI before any dereference and is processed solely by the user agent, independent of the URI scheme. This prevents information providers from denying reference authors the right to selectively identify portions of a resource.
section: "3.5"
topics:
    - http
