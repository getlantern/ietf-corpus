document: rfc-7989
kind: protocol-element
summary: 'The Session-ID header field conveys a session identifier comprising two UUIDs: a ''local-uuid'' representing the transmitting endpoint and a ''remote-uuid'' (carried in the ''remote'' parameter) representing the peer. The header is a single-instance header and replaces the definition introduced in RFC 7329.'
section: "5"
topics:
