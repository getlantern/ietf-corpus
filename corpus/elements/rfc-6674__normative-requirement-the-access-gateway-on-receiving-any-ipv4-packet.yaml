document: rfc-6674
kind: normative-requirement
summary: The access gateway, on receiving any IPv4 packet from an access device, SHOULD look up the CID for that access device and embed it in the softwire encapsulation (e.g., in the GRE Key field) when tunneling toward the AFTR.
section: "4"
rfc2119_level: SHOULD
topics:
