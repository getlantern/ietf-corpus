document: rfc-6690
kind: normative-requirement
summary: Implementations MUST be prepared to accept large values for the 'sz' attribute, as there is no defined upper limit. One strategy is to convert any value larger than a reasonable size limit to a special 'Big' value.
section: "3.3"
rfc2119_level: MUST
