document: rfc-9272
kind: design-rationale
summary: When a BAR value specifies a BIER-specific algorithm (e.g., Steiner tree), that algorithm takes precedence over the IPA's routing algorithm (e.g., SPF). This allows BIER to use multicast-optimized algorithms distinct from unicast SPF.
section: "4"
topics:
