document: rfc-5886
kind: normative-requirement
summary: The MONITORING object MUST be present in PCMonReq and PCMonRep messages. If missing, the receiving PCE MUST send a PCErr message with Error-type=6 (Mandatory Object missing) and Error-value=4.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
