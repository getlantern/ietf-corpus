document: rfc-6290
kind: normative-requirement
summary: If the QCD_TOKEN verifies successfully in an unprotected message, the receiver MUST silently discard the IKE SA and all associated child SAs. If the token cannot be validated, a response MUST NOT be sent.
section: "4.5"
rfc2119_level: MUST
