document: rfc-8846
kind: security-consideration
summary: Integrity attacks on CLUE data model information can mislead both the Media Consumer and Media Provider in interpreting offered and desired media streams, invalidating telepresence session setup; integrity and authentication assurance is delegated to the CLUE protocol (RFC 8847) and CLUE data channel (RFC 8850).
