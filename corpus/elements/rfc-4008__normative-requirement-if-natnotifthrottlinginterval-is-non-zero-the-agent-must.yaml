document: rfc-4008
kind: normative-requirement
summary: If natNotifThrottlingInterval is non-zero, the agent MUST NOT generate more than one natPacketDiscard notification-event in the indicated period. If set to zero, no natPacketDiscard notifications are transmitted. The default value is 0 (disabled); the suggested default when enabled is 60 seconds.
section: "5"
rfc2119_level: MUST NOT
topics:
    - nat
    - snmp
