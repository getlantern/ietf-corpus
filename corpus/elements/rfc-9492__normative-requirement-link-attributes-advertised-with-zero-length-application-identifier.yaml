document: rfc-9492
kind: normative-requirement
summary: Link attributes advertised with zero-length Application Identifier Bit Masks MUST be used by standard and/or user-defined applications when no link attribute advertisements with a non-zero-length matching Application Identifier Bit are present. Otherwise, such advertisements MUST NOT be used.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
