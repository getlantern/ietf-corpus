document: rfc-6603
kind: design-rationale
summary: A delegating router may include the OPTION_PD_EXCLUDE option code in an OPTION_ORO inside a Reconfigure message to signal to the requesting router that it should re-request the exclusion option. This allows a delegating router to retroactively indicate support for prefix exclusion after an initial exchange that predated the feature.
section: "4.1"
topics:
    - ip
    - v6ops
