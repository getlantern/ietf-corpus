document: rfc-3996
kind: normative-requirement
summary: Each Event Notification Attributes Group in the Get-Notifications response MUST contain all attributes specified in RFC 3995 section 9.1, including notify-subscription-id, notify-printer-uri, notify-subscribed-event, printer-up-time, notify-sequence-number, notify-charset, notify-natural-language, notify-user-data, and notify-text.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
