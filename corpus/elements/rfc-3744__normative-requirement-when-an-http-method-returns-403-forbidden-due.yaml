document: rfc-3744
kind: normative-requirement
summary: When an HTTP method returns 403 Forbidden due to insufficient privileges, the response body MUST contain a DAV:error element enclosing a DAV:need-privileges element, which contains DAV:resource elements identifying which resource lacked which specific privilege.
section: 7.1.1
rfc2119_level: MUST
topics:
    - security
    - http
