document: rfc-8007
kind: privacy-consideration
summary: The CI/T protocol carries no end-user information but does carry commercially sensitive data (content URLs, catalog change signals via invalidate/purge). Mutually authenticated TLS provides confidentiality in transit, and the dCDN MUST ensure CI/T data for a uCDN is only exposed to authenticated clients of that uCDN.
section: "8.3"
topics:
    - privacy
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
