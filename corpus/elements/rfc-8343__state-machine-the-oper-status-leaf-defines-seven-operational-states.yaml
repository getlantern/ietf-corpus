document: rfc-8343
kind: state-machine
summary: 'The ''oper-status'' leaf defines seven operational states: up (passing packets), down (not passing packets), testing (test mode, no operational traffic), unknown (status indeterminate), dormant (waiting for external event), not-present (hardware component missing), and lower-layer-down (down due to lower-layer interface state).'
