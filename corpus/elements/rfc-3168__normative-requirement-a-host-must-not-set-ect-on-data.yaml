document: rfc-3168
kind: normative-requirement
summary: A host MUST NOT set ECT on data packets unless both sides have exchanged ECN-setup SYN/SYN-ACK packets. A host MUST NOT set ECT on SYN or SYN-ACK packets.
section: 6.1.1
rfc2119_level: MUST NOT
