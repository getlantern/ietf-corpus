document: rfc-7159
kind: protocol-element
summary: 'JSON defines six structural characters: begin-array ''['' (%x5B), end-array '']'' (%x5D), begin-object ''{'' (%x7B), end-object ''}'' (%x7D), name-separator '':'' (%x3A), and value-separator '','' (%x2C). Insignificant whitespace (space, tab, line feed, carriage return) is allowed before or after any of these.'
