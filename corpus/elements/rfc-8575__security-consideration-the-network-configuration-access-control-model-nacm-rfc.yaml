document: rfc-8575
kind: security-consideration
summary: The Network Configuration Access Control Model (NACM, RFC 8341) must be used to restrict write access to the sensitive PTP data nodes (/ptp/instance-list, /ptp/transparent-clock-default-ds, /ptp/transparent-clock-port-ds-list). Unauthorized write operations can cause clock loss, accuracy degradation, or complete synchronization network failure.
section: "4"
topics:
    - security
    - yang
    - netconf
    - ntp
