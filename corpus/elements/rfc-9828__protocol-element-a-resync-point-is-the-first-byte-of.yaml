document: rfc-9828
kind: protocol-element
summary: A resync point is the first byte of JPEG 2000 packet header data for a precinct where PID < 2^24. Resync points allow a receiver to begin processing a codestream even if earlier RTP packets were lost, corrupted, or discarded by an intermediate system. Resync points cannot be signaled when the codestream has more than one tile.
section: "7.3"
topics:
    - rtp
    - realtime
