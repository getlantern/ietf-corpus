document: rfc-7770
kind: wire-format
summary: RI LSA TLVs use a Type (16-bit) / Length (16-bit) / Value format identical to the TE Extensions to OSPF. TLVs are padded to 4-octet alignment; padding is not included in the Length field. Unrecognized TLV types are ignored.
section: "2.3"
topics:
