document: rfc-9140
kind: security-consideration
summary: EAP-NOOB authentication relies on the OOB channel being secure against eavesdropping and modification. The ECDHE exchange establishes keys over an insecure network, and the Hoob fingerprint sent via OOB authenticates the entire Initial Exchange to the OOB receiver, binding the key exchange to the correct participants.
section: "6.1"
topics:
    - security
    - crypto
