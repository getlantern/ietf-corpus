document: rfc-1738
kind: wire-format
summary: Percent-encoding encodes an octet as the character '%' followed by exactly two uppercase or lowercase hexadecimal digits representing the octet's value (e.g., '%2F' for '/'). This is the sole mechanism for encoding arbitrary octets in a URL.
section: "2.2"
topics:
