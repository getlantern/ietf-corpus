document: rfc-1542
kind: protocol-element
summary: The BROADCAST (B) flag is the most significant bit of the 'flags' field. When set to 1 by a client, it signals that servers and relay agents should broadcast the BOOTREPLY rather than attempt unicast delivery to a client that may not yet be able to receive unicast datagrams.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
