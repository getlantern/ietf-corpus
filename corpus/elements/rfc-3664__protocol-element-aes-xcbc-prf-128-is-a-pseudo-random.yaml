document: rfc-3664
kind: protocol-element
summary: AES-XCBC-PRF-128 is a pseudo-random function for IKE derived from AES-XCBC-MAC-96 (RFC 3566). It produces a 128-bit output rather than the 96-bit MAC output, making it suitable as a long-lived PRF for IKE key derivation.
