document: rfc-4006
kind: design-rationale
summary: 'Two credit authorization models are defined: reservation-based (session-based, multiple interrogations) and direct debiting (one-time event, single transaction). The reservation model supports ongoing services where total cost is unknown upfront; direct debiting suits discrete transactions. This duality accommodates both prepaid data/voice sessions and one-shot purchases such as content downloads.'
