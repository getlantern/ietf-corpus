document: rfc-1757
kind: design-rationale
summary: OwnerString objects afford resource contention resolution only among cooperating managers; they provide no access control against uncooperative parties, because SNMP access control depends solely on MIB view membership and never on object values or the values of related objects.
section: "2.2"
topics:
    - snmp
    - security
