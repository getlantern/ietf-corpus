document: rfc-8232
kind: normative-requirement
summary: For PCE-triggered resynchronization of a single LSP, the PCC MUST respond with a PCRpt with the LSP state, SYNC=0, and MUST include the SRP-ID-number of the triggering PCUpd. If the LSP is not found, the PCC MUST also set the R (remove) flag in the LSP object.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
