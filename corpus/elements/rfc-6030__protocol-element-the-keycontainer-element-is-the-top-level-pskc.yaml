summary: The <KeyContainer> element is the top-level PSKC document element, carrying one or more <KeyPackage> elements along with optional <EncryptionKey>, <MACMethod>, <Signature>, and <Extensions> child elements. It requires a mandatory 'Version' attribute and an optional 'Id' attribute for unique container identification.
