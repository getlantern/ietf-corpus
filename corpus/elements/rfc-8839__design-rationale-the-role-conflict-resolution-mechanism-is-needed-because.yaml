document: rfc-8839
kind: design-rationale
summary: The role-conflict resolution mechanism is needed because in third-party call control flows (e.g., RFC 3725 flow III variant), both agents receive offerless INVITEs and respond with offers, causing both to believe they are the controlling agent. The tie-breaking procedures in RFC 8445 resolve this.
section: Appendix C
topics:
