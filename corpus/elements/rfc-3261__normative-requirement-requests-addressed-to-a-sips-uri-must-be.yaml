document: rfc-3261
kind: normative-requirement
summary: Requests addressed to a SIPS URI MUST be sent over TLS, guaranteeing encrypted transport from caller to the callee's domain. From there, the callee's domain is responsible for securing the final hop per its own policy.
section: 26.2.2
rfc2119_level: MUST
topics:
    - sip
    - tls
    - security
