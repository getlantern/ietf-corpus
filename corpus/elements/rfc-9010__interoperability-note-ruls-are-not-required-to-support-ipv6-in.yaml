document: rfc-9010
kind: interoperability-note
summary: RULs are not required to support IPv6-in-IPv6 decapsulation; the IPv6-in-IPv6 tunnel from the root is terminated at the parent 6LR, which decapsulates and forwards the inner packet to the RUL. This is consistent with RFC 8504 basic IPv6 host requirements.
section: "5.2"
topics:
    - routing
    - ip
