document: rfc-7293
kind: protocol-element
summary: 'Continuous ownership is defined as: an address has been under continuous ownership since a given date-time if any message sent to it since that date-time would have been delivered exclusively to the same owner. Suspended or disabled addresses may satisfy this test provided no mail was delivered to a different owner. The only valid answers are ''yes'', ''no'', and ''unknown''.'
section: "9"
topics:
