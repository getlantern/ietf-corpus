document: rfc-7512
kind: interoperability-note
summary: 'The ''module-name'' attribute SHOULD contain only the module name without system-specific affixes (e.g., no ''.so'', ''.DLL'' suffix, no ''lib'' prefix) to improve portability of PKCS #11 URIs across different operating systems.'
section: "2.4"
topics:
