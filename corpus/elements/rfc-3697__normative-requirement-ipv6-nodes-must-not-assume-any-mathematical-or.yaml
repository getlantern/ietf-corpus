document: rfc-3697
kind: normative-requirement
summary: IPv6 nodes MUST NOT assume any mathematical or other properties of the Flow Label values assigned by source nodes. Router performance SHOULD NOT be dependent on the distribution of Flow Label values, and Flow Label bits alone make poor material for a hash key.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ip
