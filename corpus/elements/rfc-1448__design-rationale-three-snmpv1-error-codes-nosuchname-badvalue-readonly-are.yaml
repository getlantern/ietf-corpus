document: rfc-1448
kind: design-rationale
summary: Three SNMPv1 error codes (noSuchName, badValue, readOnly) are retained in the SNMPv2 error-status enumeration solely for proxy compatibility, allowing SNMPv2 managers to handle responses forwarded through SNMPv1 proxies without failure.
