document: rfc-9147
kind: wire-format
summary: The DTLSCiphertext unified header begins with a fixed-bits byte (top 3 bits = 001, plus C/S/L/E flag bits), followed by an optional variable-length Connection ID, an 8- or 16-bit sequence number (S bit selects width), and an optional 16-bit length field (L bit). The low 2 bits (E) carry the low-order epoch bits.
