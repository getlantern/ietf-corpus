document: rfc-4279
kind: interoperability-note
summary: RSA_PSK ciphersuites can be used with unvalidated self-signed certificates, providing similar dictionary-attack protection to DHE_PSK without requiring a PKI. The ciphersuites themselves do not specify certificate contents or validation procedure.
