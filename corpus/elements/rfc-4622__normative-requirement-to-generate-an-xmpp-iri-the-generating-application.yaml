document: rfc-4622
kind: normative-requirement
summary: To generate an XMPP IRI, the generating application MUST first ensure the XMPP address conforms to XMPP-CORE rules including STRINGPREP, then concatenate the scheme, optional authority, node, domain, optional resource, optional query, and optional fragment in order.
section: 2.7.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
