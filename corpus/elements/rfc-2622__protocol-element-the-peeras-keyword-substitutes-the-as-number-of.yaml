document: rfc-2622
kind: protocol-element
summary: 'The PeerAS keyword substitutes the AS number of the peer AS in filters and actions, enabling a single policy expression to apply to a set of peers. For example, ''import: from AS-FOO accept PeerAS'' imports each member AS''s own routes and is equivalent to a separate per-AS import expression for each member.'
section: "5.4"
topics:
    - routing
    - bgp
