document: rfc-5533
kind: protocol-element
summary: A ULID-pair context is the state the shim maintains between a pair of upper-layer identifiers, identified by a pair of Context Tags (one per direction) plus an optional Forked Instance Identifier. It tracks the current locator pair and the peer's locator set.
