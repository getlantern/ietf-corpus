document: rfc-9635
kind: normative-requirement
summary: All Subject Identifiers in the sub_ids array of a subject information request MUST identify the same subject. If sub_ids is omitted, the AS SHOULD assume requests are about the current user and SHOULD require direct interaction or proof of presence before releasing information.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
