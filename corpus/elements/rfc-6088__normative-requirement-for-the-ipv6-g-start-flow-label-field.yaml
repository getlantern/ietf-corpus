document: rfc-6088
kind: normative-requirement
summary: For the IPv6 (G)Start Flow Label field, the sender MUST prefix the 24-bit flow label value with 8 bits of '0' before inserting it into the 32-bit field. The receiver SHOULD ignore the first 8 bits before using the value in comparisons.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
