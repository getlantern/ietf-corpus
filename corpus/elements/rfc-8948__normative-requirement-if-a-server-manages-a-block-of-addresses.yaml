document: rfc-8948
kind: normative-requirement
summary: If a server manages a block of addresses belonging to a requested quadrant, the addresses being offered MUST belong to a requested quadrant. This applies both in direct client-server and relay-mediated scenarios.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
