document: rfc-5334
kind: interoperability-note
summary: The use of Ogg Skeleton extension has been confirmed to not cause interoperability issues with existing implementations. The .ogg and .spx extensions for audio/ogg deliberately omit Skeleton requirements for backward compatibility with existing implementations.
section: "8"
