document: rfc-3192
kind: security-consideration
summary: Since e-mail routing relies on DNS, a successful DNS attack could cause messages to be diverted via compromised MTAs or gateways. Attack vectors include DNS server compromise, counterfeit DNS responses, and incorrect additional information in unrelated query responses.
section: "6"
topics:
