document: rfc-8787
kind: protocol-element
summary: The 'loc-src' parameter is a new geoloc-param parameter added to the locationValue defined in RFC 6442 that identifies the hostname of the SIP intermediary adding the locationValue to the Geolocation header field. Only a fully qualified host name is valid; IP addresses are not supported.
section: "4"
topics:
