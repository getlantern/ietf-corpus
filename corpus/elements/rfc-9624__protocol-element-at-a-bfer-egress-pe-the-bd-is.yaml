document: rfc-9624
kind: protocol-element
summary: At a BFER egress PE, the BD is determined from the upstream-assigned MPLS label (EVPN-MPLS) or VNI/VSID (EVPN-VXLAN/NVGRE/GENEVE), after which standard EVPN forwarding per RFC 7432 or RFC 8365 proceeds. For EVPN-MPLS, an inner label following the BIER header is treated as the upstream-assigned ESI label for split-horizon.
section: 4.2.1
topics:
    - multicast
    - routing
    - mpls
