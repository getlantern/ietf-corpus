document: rfc-8265
kind: design-rationale
summary: Two username profiles (UsernameCaseMapped and UsernameCasePreserved) are defined to accommodate both case-insensitive and case-sensitive deployments. Case mapping is generally preferred to avoid false accepts during authentication, but case preservation may be needed for backward compatibility with deployed infrastructure.
section: "3.2"
topics:
    - security
