document: rfc-9085
kind: wire-format
summary: 'The Adjacency SID TLV (Type 1099) has variable length (7 or 8 octets): 1-octet Flags, 1-octet Weight, 2-octet Reserved (MUST be 0), and a variable SID/Index/Label field. Flags and SID fields are interpreted per the Protocol-ID (IS-IS, OSPFv2, or OSPFv3).'
section: 2.2.1
