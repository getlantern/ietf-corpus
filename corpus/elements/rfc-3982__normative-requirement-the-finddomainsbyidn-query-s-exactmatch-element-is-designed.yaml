document: rfc-3982
kind: normative-requirement
summary: The <findDomainsByIDN> query's <exactMatch> element is designed to contain IDNs (not ACE labels) and MUST match only against equivalent IDNs according to the notion of equivalence defined in RFC 3490. This query returns the union of the desired domain and any associated variants.
section: 3.1.4
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
