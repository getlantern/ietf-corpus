document: rfc-3841
kind: normative-requirement
summary: Header fields Accept-Contact, Reject-Contact, and Request-Disposition included in an ACK for a non-2xx final response, or in a CANCEL request, MUST be equal to the values in the original request being acknowledged or cancelled, to ensure proper operation through stateless proxies.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
