document: rfc-3670
kind: security-consideration
summary: Security considerations are addressed in Section 7. Because this information model describes QoS mechanisms that directly configure device datapaths (treated as a direct memory map into the device), unauthorized access to or modification of model instances could allow an attacker to alter traffic conditioning, degrade service quality, or cause denial of service by reconfiguring classifiers, meters, droppers, queues, or schedulers.
section: "7"
topics:
    - qos
    - security
