document: rfc-8077
kind: interoperability-note
summary: If neither PE includes the PW Status TLV in the initial Label Mapping, or if one PE does not support it, both PEs fall back to the label withdraw method for signaling PW status changes. A PE that cannot support the label withdraw method MUST send a Label Release with 'Label Withdraw PW Status Method Not Supported'.
section: 6.3.3
topics:
    - mpls
