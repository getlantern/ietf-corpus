document: rfc-9758
kind: interoperability-note
summary: ipn EIDs with non-default Allocator Identifiers MUST NOT be used with BPv6, and the Allocator Identifier prefix MUST be omitted from any textual representation used with BPv6. BPv6 has no concept of LocalNode EIDs and will treat such EIDs as routable.
section: "7.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
