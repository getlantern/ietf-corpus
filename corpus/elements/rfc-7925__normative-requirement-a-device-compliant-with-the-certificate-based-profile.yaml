document: rfc-7925
kind: normative-requirement
summary: A device compliant with the certificate-based profile MUST implement TLS_ECDHE_ECDSA_WITH_AES_128_CCM_8 and follow all guidance in Section 4.4. Support for the 'cached_info' extension (RFC 7924) is REQUIRED to reduce handshake overhead from repeated certificate transmission.
section: "4.4"
rfc2119_level: MUST
topics:
