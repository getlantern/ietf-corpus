document: rfc-4206
kind: design-rationale
summary: FAs are introduced to improve GMPLS scalability by aggregating LSPs into a hierarchy. Other LSRs can use FAs for path computation and nest their LSPs into the FA-LSP using the label stack construct, reducing the number of LSPs visible at the top level.
