document: rfc-9747
kind: normative-requirement
summary: The transmission interval for Unaffiliated BFD Echo packets when in the Up state MUST be provisioned on the local device. The 'Detect Mult' field MUST be set to a value provisioned on device A for the maximum allowable number of consecutively lost packets.
section: "2"
rfc2119_level: MUST
topics:
    - routing
