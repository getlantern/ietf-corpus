document: rfc-3195
kind: registry
summary: 'IANA registers two BEEP profiles for syslog: http://iana.org/beep/SYSLOG/RAW and http://iana.org/beep/SYSLOG/COOKED. The RAW profile carries no piggybacked channel-creation data; the COOKED profile may carry an ''iam'' element during channel creation.'
section: "9.1"
