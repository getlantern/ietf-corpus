document: rfc-2032
kind: protocol-element
summary: 'Three packet-loss mitigation strategies are described: (1) use only INTRA-frame coding with MB conditional replenishment; (2) adjust INTRA refresh rate based on observed loss (H.261 mandates INTRA refresh at least every 132 transmissions per MB); (3) send FIR/NACK after loss detection to trigger full or partial INTRA refresh.'
