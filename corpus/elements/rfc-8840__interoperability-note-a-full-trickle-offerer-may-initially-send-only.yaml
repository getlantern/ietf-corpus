document: rfc-8840
kind: interoperability-note
summary: A Full Trickle Offerer may initially send only RTP candidates (component 1) assuming RTCP multiplexing is supported, and only start gathering RTCP candidates (component 2) after receiving an Answer indicating the Answerer does not support RTCP multiplexing.
