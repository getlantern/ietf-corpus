document: rfc-9082
kind: normative-requirement
summary: Servers MUST return an HTTP 501 (Not Implemented) response to inform clients of unsupported query types. Server implementations are free to support only a subset of query features depending on local requirements.
section: "1"
rfc2119_level: MUST
