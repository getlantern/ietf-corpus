document: rfc-7268
kind: wire-format
summary: 'WLAN-Venue-Info (Type 182), WLAN-Pairwise-Cipher (Type 186), WLAN-Group-Cipher (Type 187), WLAN-AKM-Suite (Type 188), and WLAN-Group-Mgmt-Cipher (Type 189) all use a 6-octet format (Type + Length + 4-octet Value). For cipher/AKM suites the 4-byte Value uses IEEE 802.11 Suite Selector format: 3-octet OUI followed by 1-octet Suite Type.'
section: "2.14"
