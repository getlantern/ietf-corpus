document: rfc-2617
kind: normative-requirement
summary: A user agent MUST choose to use the strongest auth-scheme it understands from the set of challenges offered by the server in a WWW-Authenticate header, and request credentials from the user based upon that challenge.
section: "1.2"
rfc2119_level: MUST
topics:
    - http
    - security
