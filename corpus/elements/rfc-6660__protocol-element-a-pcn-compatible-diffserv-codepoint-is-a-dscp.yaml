document: rfc-6660
kind: protocol-element
summary: A PCN-compatible Diffserv codepoint is a DSCP configured on PCN-nodes to indicate that the ECN field carries PCN-markings rather than RFC 3168 markings. Outside the PCN-domain, the same DSCP has no PCN-specific meaning; suitable DSCPs include those for Telephony (EF), Real-time interactive (CS4), Broadcast Video (CS3), Multimedia Conferencing (AF4), and VOICE-ADMIT.
section: "2.1"
topics:
    - ecn
    - diffserv
    - qos
