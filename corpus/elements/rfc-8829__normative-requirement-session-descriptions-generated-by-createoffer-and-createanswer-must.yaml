document: rfc-8829
kind: normative-requirement
summary: Session descriptions generated by createOffer and createAnswer MUST be immediately usable by setLocalDescription. createOffer SHOULD return an offer reflecting the current state of the system so that setLocalDescription will succeed when acquiring needed resources.
section: 4.1.8
rfc2119_level: MUST
topics:
