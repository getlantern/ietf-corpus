document: rfc-3982
kind: protocol-element
summary: The <languageNotSupported> error code MAY be returned when a client passes a language tag not supported by the server. When returned, the server MUST enumerate the unsupported languages from the query via one or more <unsupportedLanguage> child elements.
section: 3.3.2
topics:
    - dns
    - registry
