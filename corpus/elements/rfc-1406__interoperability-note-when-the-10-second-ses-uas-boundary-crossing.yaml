document: rfc-1406
kind: interoperability-note
summary: When the 10-second SES/UAS boundary-crossing condition spans a 900-second (15-minute) statistics window boundary, successive GETs of dsx1IntervalSESs and dsx1IntervalUASs will return differing values if the first GET occurs during the first few seconds of the new window. This is an unavoidable side-effect of the selected managed objects.
section: 3.3.3
topics:
    - snmp
