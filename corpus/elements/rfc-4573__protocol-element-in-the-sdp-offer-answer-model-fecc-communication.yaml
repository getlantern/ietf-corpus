document: rfc-4573
kind: protocol-element
summary: In the SDP Offer/Answer model, FECC communication is uni-directional for camera control but H.224 is bi-directional and can be used to negotiate capabilities (e.g., number of cameras). The offerer uses 'sendonly' if its camera cannot be remotely controlled and capability negotiation is not needed; otherwise 'sendrecv' is offered.
section: "5.1"
topics:
    - realtime
    - rtp
