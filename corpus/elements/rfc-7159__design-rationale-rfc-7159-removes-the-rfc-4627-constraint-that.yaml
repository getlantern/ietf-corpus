document: rfc-7159
kind: design-rationale
summary: RFC 7159 removes the RFC 4627 constraint that a JSON text must be an object or array, allowing any JSON value as a top-level JSON text. This change aligns with ECMAScript and ECMA-404 specifications and reflects widespread implementation practice.
section: "1.3"
topics:
    - json
