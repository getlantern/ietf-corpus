document: rfc-6644
kind: normative-requirement
summary: DHCPv6 clients that support Reconfigure-Rebind MUST implement the Reconfigure Key authentication protocol as described in RFC 3315 Section 21.5. Other authentication mechanisms such as Secure DHCPv6 (CGA-based) may optionally be implemented.
