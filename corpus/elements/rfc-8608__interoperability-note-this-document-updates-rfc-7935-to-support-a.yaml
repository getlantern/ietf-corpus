document: rfc-8608
kind: interoperability-note
summary: This document updates RFC 7935 to support a different algorithm for BGPsec certificate requests, a different Subject Public Key Info format for BGPsec certificates, and different signature formats — all differentiated from other RPKI certificates by the BGPsec Extended Key Usage OID defined in RFC 8209.
section: "1"
topics:
