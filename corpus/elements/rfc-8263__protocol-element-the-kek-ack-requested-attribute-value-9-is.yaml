document: rfc-8263
kind: protocol-element
summary: The KEK_ACK_REQUESTED attribute (value 9) is a Basic attribute added to the SA KEK Payload Values - KEK Attributes. When included in SA KEK policy, it signals that the GCKS requests the GM to return a GROUPKEY-PUSH Acknowledgement Message.
