document: rfc-8081
kind: security-consideration
summary: TrueType hint instructions represent executable code interpreted by the font rasterizer for glyph alignment. A maliciously designed font could cause undue resource consumption (memory or CPU cycles). Most font interpreters cannot be completely protected from malicious fonts without undue performance penalties.
section: "3"
topics:
    - security
