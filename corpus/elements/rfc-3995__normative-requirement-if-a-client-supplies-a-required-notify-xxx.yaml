document: rfc-3995
kind: normative-requirement
summary: If a client supplies a required 'notify-xxx' attribute whose value is unsupported, the Printer MUST NOT create the Subscription Object. If a required 'notify-xxx' attribute is absent from the request, the Printer MUST reject the Subscription Creation Operation with 'client-error-bad-request' and return no Subscription Attributes Groups.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
