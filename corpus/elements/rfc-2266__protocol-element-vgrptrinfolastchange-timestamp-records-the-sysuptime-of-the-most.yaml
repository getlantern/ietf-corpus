document: rfc-2266
kind: protocol-element
summary: 'vgRptrInfoLastChange (TimeStamp) records the sysUpTime of the most recent significant event for a repeater: agent restart, repeater creation, vgRptrInfoOperStatus change, port membership change, or counter discontinuity. Management stations should use this object to detect counter discontinuities in the associated monitor tables.'
