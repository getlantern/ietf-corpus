document: rfc-7265
kind: normative-requirement
summary: When converting from jCal to iCalendar, JSON escaping MUST be unescaped first, then iCalendar escaping (per RFC 5545 and RFC 6868) MUST be applied, and long lines SHOULD be folded per RFC 5545 Section 3.1. Non-binary value types MUST NOT be base64 encoded.
section: "4"
rfc2119_level: MUST
topics:
    - json
