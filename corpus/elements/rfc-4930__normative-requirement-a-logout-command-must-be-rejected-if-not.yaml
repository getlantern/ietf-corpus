document: rfc-4930
kind: normative-requirement
summary: A <logout> command MUST be rejected if not preceded by a successful <login>. When processed successfully, the server MUST respond with result code 1500 and MUST end the current session.
section: 2.9.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
