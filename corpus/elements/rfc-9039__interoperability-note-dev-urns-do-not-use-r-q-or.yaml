document: rfc-9039
kind: interoperability-note
summary: DEV URNs do not use r-, q-, or f-components as defined in RFC 8141. Percent-encoding is not desirable in DEV URNs due to SenML Name field rules (RFC 8428 Section 4.5.1), though this document does not deviate from general URN syntax.
