document: rfc-7864
kind: design-rationale
summary: When all MN interfaces share a common prefix set, no inter-LMA/MAG signaling is required for flow movement because each MAG already has full routing knowledge for all prefixes; FMI signaling is only needed when different prefix sets are assigned per interface and a flow must be forwarded via a MAG that does not anchor the relevant prefix.
section: 3.2.1
topics:
    - mobility
