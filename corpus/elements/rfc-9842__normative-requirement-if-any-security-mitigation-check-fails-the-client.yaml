document: rfc-9842
kind: normative-requirement
summary: If any security mitigation check fails, the client MUST drop the response and return an error. The URL Pattern for dictionary matching is guaranteed to be for the same origin as the dictionary, preventing cross-origin dictionary influence.
section: "9.3"
rfc2119_level: MUST
topics:
    - http
    - security
