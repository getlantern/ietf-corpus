document: rfc-7896
kind: design-rationale
summary: RFC 5440's original IRO specification was ambiguous about ordering and declared the L bit meaningless, leading to divergent implementations. This document was created to establish a standard representation and L bit semantics to ensure interoperability among PCEP implementations.
section: "1"
