document: rfc-8139
kind: security-consideration
summary: E-L1CS FS-LSPs are IS-IS PDUs and are securable by adding Authentication TLVs (RFC 5310) in the same manner as TRILL Hellos or other IS-IS PDUs. This document does not change the base TRILL security model described in RFC 6325 Section 6.
