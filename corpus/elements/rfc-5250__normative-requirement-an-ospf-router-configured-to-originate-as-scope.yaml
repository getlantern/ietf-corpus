document: rfc-5250
kind: normative-requirement
summary: An OSPF router configured to originate AS-scope (type-11) Opaque LSAs MUST advertise itself as an ASBR and MUST follow requirements for setting the Options field E-bit in OSPF LSA headers, enabling routers in remote areas to track LSA originator reachability via type-4 Summary LSAs.
section: "5"
rfc2119_level: MUST
topics:
    - routing
