document: rfc-4945
kind: normative-requirement
summary: Implementations MUST be able to validate certificates using RSA-with-SHA1 and RSA-with-MD5 signature algorithms, and SHOULD be able to use sha256WithRSAEncryption (PKCS#1 v1.5) as soon as possible given known weaknesses in MD5 and SHA-1 against hash collisions.
section: "5.3"
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
