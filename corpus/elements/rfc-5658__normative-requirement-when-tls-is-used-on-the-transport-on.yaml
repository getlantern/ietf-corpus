document: rfc-5658
kind: normative-requirement
summary: When TLS is used on the transport on either side of the proxy, the URI placed in the Record-Route header field MUST encode a next-hop that will be reached using TLS — either via a SIPS URI or via a URI constructed such that RFC 3263 resolution selects TLS.
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
