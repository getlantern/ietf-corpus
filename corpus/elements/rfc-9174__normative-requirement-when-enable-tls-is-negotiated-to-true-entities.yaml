document: rfc-9174
kind: normative-requirement
summary: When Enable TLS is negotiated to true, entities SHALL begin a TLS 1.3 handshake (RFC 8446) before any other TCPCL messages. Any TCPCL entity SHALL follow all recommended practices in BCP 195 (RFC 7525). The passive entity SHALL request a client-side certificate; the active entity SHALL supply a certificate chain.
section: 4.4.3
rfc2119_level: SHALL
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
