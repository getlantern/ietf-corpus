document: rfc-1970
kind: normative-requirement
summary: The Source Address of a Router Advertisement MUST be the link-local address assigned to the sending interface. Similarly, the Source Address of a Redirect message MUST be the link-local address assigned to the interface from which the message is sent.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
