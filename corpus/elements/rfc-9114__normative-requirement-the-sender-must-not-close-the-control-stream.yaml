document: rfc-9114
kind: normative-requirement
summary: The sender MUST NOT close the control stream, and the receiver MUST NOT request that the sender close the control stream. If either control stream is closed at any point, this MUST be treated as a connection error of type H3_CLOSED_CRITICAL_STREAM.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
    - http
    - quic
