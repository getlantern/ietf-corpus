document: rfc-8371
kind: interoperability-note
summary: The MN identifier option defined in RFC 4283 previously specified only the MN NAI type; this document extends the option to support additional identifier types used in telecommunications standards (IMSI, P-TMSI, GUTI) and IEEE addressing (EUI-48, EUI-64), enabling interoperability with 3GPP and IEEE-based systems.
section: "1"
topics:
