document: rfc-1531
kind: protocol-element
summary: The 'client identifier' option provides an explicit, decoupled client identity to the server, which may be a hardware address or another type (e.g., DNS name); new identifier types are registered with IANA. If absent, the server MUST use 'chaddr' to identify the client.
section: "2"
