document: rfc-9686
kind: privacy-consideration
summary: With MLD snooping enabled, an attacker joining the All_DHCP_Relay_Agents_and_Servers multicast group (ff02::1:2) can still observe address registration messages, but this is no worse than existing DHCPv6 exposure. Layer 2 isolation (blocking peer-to-peer on-link communication) mitigates this threat.
section: "7"
topics:
