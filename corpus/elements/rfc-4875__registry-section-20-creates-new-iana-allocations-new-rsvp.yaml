document: rfc-4875
kind: registry
summary: 'Section 20 creates new IANA allocations: new RSVP Class Numbers (section 20.1) including Class 50 for S2L_SUB_LSP; new C-Types (section 20.2) for P2MP SESSION (C-Types 13/14), P2MP SENDER_TEMPLATE (C-Types 13/14), and P2MP FILTER_SPEC (C-Types 13/14); new PathErr error values (section 20.3) for ''Unable to Branch'' and ''Unsupported LSP Integrity''; and a new LSP Attributes Flag bit (section 20.4) for LSP integrity.'
