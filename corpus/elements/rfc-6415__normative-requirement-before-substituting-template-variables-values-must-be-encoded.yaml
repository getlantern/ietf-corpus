document: rfc-6415
kind: normative-requirement
summary: Before substituting template variables, values MUST be encoded using UTF-8, and any character other than unreserved (per RFC 3986) MUST be percent-encoded. Protocols MUST NOT change the meaning of the 'uri' variable.
section: 3.1.1.1
rfc2119_level: MUST
