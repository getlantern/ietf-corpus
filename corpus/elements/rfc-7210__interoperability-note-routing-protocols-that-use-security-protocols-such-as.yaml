document: rfc-7210
kind: interoperability-note
summary: Routing protocols that use security protocols such as TCP-AO may need to supply keys to databases specific to those security protocols as entries in this conceptual database are manipulated. Specifications mapping routing protocols onto this database must describe how the Security Policy Database is updated as rows are added or removed.
section: "3"
topics:
