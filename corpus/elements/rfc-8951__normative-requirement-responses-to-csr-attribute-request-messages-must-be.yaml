document: rfc-8951
kind: normative-requirement
summary: Responses to CSR attribute request messages MUST be encoded as content-type application/csrattrs and base64 encoded per RFC 4648. The ASN.1 structure is CsrAttrs ::= SEQUENCE SIZE (0..MAX) OF AttrOrOID.
section: "4"
rfc2119_level: MUST
