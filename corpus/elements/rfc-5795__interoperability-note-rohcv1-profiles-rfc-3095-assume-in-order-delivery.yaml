document: rfc-5795
kind: interoperability-note
summary: ROHCv1 profiles (RFC 3095) assume in-order delivery between compressor and decompressor; ROHCv2 profiles (RFC 5225) are designed to tolerate out-of-order delivery. Both handle reordering before the compression point.
