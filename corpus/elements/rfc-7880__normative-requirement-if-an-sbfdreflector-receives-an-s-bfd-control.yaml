document: rfc-7880
kind: normative-requirement
summary: If an SBFDReflector receives an S-BFD Control packet with the Demand (D) bit cleared, the packet MUST be discarded. This prevents the infinite reflection loop described in Appendix A.
section: 7.2.3
rfc2119_level: MUST
topics:
    - realtime
    - security
