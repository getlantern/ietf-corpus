document: rfc-3812
kind: state-machine
summary: 'mplsTunnelOperStatus defines seven operational states: up(1), down(2), testing(3), unknown(4), dormant(5), notPresent(6) when a component is missing, and lowerLayerDown(7) when down due to a lower-layer interface. mplsTunnelAdminStatus controls desired state with up(1), down(2), or testing(3). mplsTunnelStateTransitions counts the number of OperStatus changes.'
