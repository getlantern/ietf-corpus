document: rfc-6925
kind: security-consideration
summary: In factory-floor deployments, an incorrect Relay-ID could cause devices to be misconfigured in ways that produce incorrect results, cause physical damage, or create hazardous conditions for workers. Administrators must use dependable techniques (e.g., hardware tokens physically attached to the installation location) to prevent misconfiguration in such environments.
section: "6.2"
topics:
    - security
