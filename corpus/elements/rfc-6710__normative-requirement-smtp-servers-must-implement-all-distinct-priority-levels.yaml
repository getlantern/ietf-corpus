document: rfc-6710
kind: normative-requirement
summary: SMTP servers MUST implement all distinct priority levels specified in their Priority Assignment Policy. Unsupported priority values are rounded up to the next higher supported level (or to the highest supported priority if above all supported values).
section: "5"
rfc2119_level: MUST
topics:
