document: rfc-9432
kind: normative-requirement
summary: When a member zone is removed from a catalog, a consumer MUST NOT remove the zone if it was not originally configured from that specific catalog. The zone and all associated state (zone data, DNSSEC keys) MUST be removed only when the zone was initially added from the same catalog.
section: "5.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
