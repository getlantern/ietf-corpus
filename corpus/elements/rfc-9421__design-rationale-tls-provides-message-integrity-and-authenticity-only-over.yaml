document: rfc-9421
kind: design-rationale
summary: TLS provides message integrity and authenticity only over a single TLS connection. When paths include TLS-terminating gateways or TLS inspection appliances, TLS cannot guarantee end-to-end integrity between client and application. HTTP Message Signatures address this by providing application-layer signatures detached from transport.
section: "1"
topics:
    - http
    - security
    - tls
