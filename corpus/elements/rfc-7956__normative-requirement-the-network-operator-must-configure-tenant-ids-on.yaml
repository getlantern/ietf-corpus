document: rfc-7956
kind: normative-requirement
summary: The network operator MUST configure Tenant IDs on each edge RBridge for each routing domain consistently so that the same ID always refers to the same tenant; inconsistent configuration would cause traffic to be delivered to the wrong tenant.
section: "5"
rfc2119_level: MUST
