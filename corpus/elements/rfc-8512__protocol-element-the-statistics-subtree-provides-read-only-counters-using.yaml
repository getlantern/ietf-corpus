document: rfc-8512
kind: protocol-element
summary: The statistics subtree provides read-only counters using yang:zero-based-counter64 for traffic (sent/received/dropped packets and bytes, with separate dropped-address-limit, dropped-port-limit, and dropped-subscriber-limit counters), yang:gauge32 for mapping statistics (total active subscribers, address mappings, port mappings per-protocol), and yang:gauge32 gauge values for per-pool address and port allocation/free counts.
section: "2.12"
topics:
