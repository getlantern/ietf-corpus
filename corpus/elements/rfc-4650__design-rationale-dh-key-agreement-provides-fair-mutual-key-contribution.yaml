document: rfc-4650
kind: design-rationale
summary: 'DH key agreement provides fair mutual key contribution: both parties contribute to TGK = g^(xi*xr), unlike MIKEY-PS and MIKEY-PK where the initiator alone generates the session key. This reduces risk from weak key generation by a single untrusted party.'
section: "5.3"
