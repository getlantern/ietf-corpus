document: rfc-9074
kind: wire-format
summary: 'The PROXIMITY property is defined by the notation: ''proximity = "PROXIMITY" *proximityparam ":" proximityvalue CRLF'', where proximityvalue is one of ARRIVE, DEPART, CONNECT, DISCONNECT, iana-token, or x-name.'
