document: rfc-4997
kind: protocol-element
summary: The compressed_value(len, val) encoding method encodes control fields that have no counterpart in the uncompressed header (ULENGTH=0). CLENGTH is bound to 'len' and CVALUE to 'val'. A binary string literal in single quotes ('01101') is shorthand for compressed_value(5, 13) and is the standard way to specify discriminator fields.
section: 4.11.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
