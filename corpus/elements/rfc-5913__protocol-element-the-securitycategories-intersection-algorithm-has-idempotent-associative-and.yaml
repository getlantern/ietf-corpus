document: rfc-5913
kind: protocol-element
summary: 'The securityCategories intersection algorithm has idempotent, associative, and commutative properties. It computes an intersection of two SETs by: first adding elements with identical type OID and value in both sets; then for known type OIDs performing type-specific intersection; unknown type OIDs are excluded from the intersection result.'
