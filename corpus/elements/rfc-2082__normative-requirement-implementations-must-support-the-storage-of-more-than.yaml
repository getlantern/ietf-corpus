document: rfc-2082
kind: normative-requirement
summary: Implementations MUST support the storage of more than one key at the same time per interface, MUST associate a specific lifetime (date/time first valid and date/time no longer valid) and a key identifier with each key, and MUST support manual key distribution via operator console.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
