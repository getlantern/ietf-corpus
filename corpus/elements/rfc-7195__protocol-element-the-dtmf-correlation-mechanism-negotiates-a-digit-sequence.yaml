document: rfc-7195
kind: protocol-element
summary: The DTMF correlation mechanism negotiates a digit sequence (0-9, A-D, '#', '*', up to 32 digits) in the 'dtmf' subfield of 'cs-correlation'. After the circuit-switched bearer is established, the active party sends those DTMF tones; the passive party compares received digits to the negotiated value.
section: 5.2.3.4
topics:
    - realtime
    - voip
