document: rfc-6083
kind: interoperability-note
summary: The DTLS/SCTP method requires that the SCTP implementation supports optional fragmentation of SCTP user messages (RFC 4960) and the SCTP authentication extension (RFC 4895). Both features are mandatory prerequisites for this protocol.
section: "1.1"
topics:
