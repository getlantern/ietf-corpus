document: rfc-9008
kind: normative-requirement
summary: An RH3 or RPL Option can only be removed by an intermediate router if it is placed in an encapsulating IPv6 header that is addressed to that intermediate router; when doing so, the entire encapsulating header must be removed.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - routing
