document: rfc-1243
kind: normative-requirement
summary: If the semantics of a group is applicable to an implementation, then it must implement all objects in that group. For example, a managed agent must implement the KIP group if and only if it implements the KIP protocol.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
