document: rfc-5465
kind: normative-requirement
summary: If a mailbox name does not refer to an existing mailbox, or refers to a mailbox the client cannot LIST, the server MUST ignore it. This prevents disclosure of confidential information to clients lacking 'l' (lookup) rights.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
