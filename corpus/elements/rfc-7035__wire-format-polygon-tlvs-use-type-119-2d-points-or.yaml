document: rfc-7035
kind: wire-format
summary: Polygon TLVs use type 119 (2D points) or 120 (3D points); Prism uses type 121 with an optional Height field prepended. The number of points is inferred from the TLV length. Unlike GML, the first and last points are not duplicated in the TLV representation.
section: 4.9.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
