document: rfc-2822
kind: design-rationale
summary: The period character ('.') is allowed in obs-phrase (and thus display names) but not in the normative phrase production, because permitting it creates ambiguity between display names and addr-spec in parsing. It is included in the obsolete syntax because it is already widely used in names (e.g., initials) and must be correctly interpreted.
section: "4.1"
topics:
