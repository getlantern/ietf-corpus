document: rfc-6989
kind: design-rationale
summary: 'For MODP groups with small subgroups, the NIST SP 800-56A requirement to perform the subgroup test (r^q = 1 mod p) influenced the design: implementations needing NIST conformance must implement this test anyway, so the RFC offers it as a first option alongside the key-non-reuse option for implementations not subject to NIST requirements.'
section: "2.2"
topics:
    - ipsec
    - crypto
