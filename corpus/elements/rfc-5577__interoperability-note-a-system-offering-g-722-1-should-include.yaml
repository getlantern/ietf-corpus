document: rfc-5577
kind: interoperability-note
summary: A system offering G.722.1 SHOULD include a payload type with a 16 kHz clock rate for backward interoperability with RFC 3047 terminals that do not support the 32 kHz sample rate. Terminals SHOULD offer a media type at 16 kHz to interoperate with such terminals.
section: "5.1"
topics:
    - rtp
    - realtime
