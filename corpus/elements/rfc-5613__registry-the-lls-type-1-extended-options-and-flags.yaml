document: rfc-5613
kind: registry
summary: 'The ''LLS Type 1 Extended Options and Flags'' sub-registry (renamed from ''LLS Type 1 Extended Options'') tracks bit assignments in the EOF-TLV. Currently assigned: bit 0x00000001 (LSDB Resynchronization, RFC 4811) and bit 0x00000002 (Restart Signal RS-bit, RFC 4812). Future allocations require Designated Expert review.'
