document: rfc-8913
kind: normative-requirement
summary: The secret-key SHOULD contain at least 128 bits of entropy. The derived key length (dkLen) MUST be 16 octets for the AES Session-key used for encryption and 32 octets for the HMAC-SHA1 Session-key used for authentication, per Section 6.10 of RFC 4656.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
