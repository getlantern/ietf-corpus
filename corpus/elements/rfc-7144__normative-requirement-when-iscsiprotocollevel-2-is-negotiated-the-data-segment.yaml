document: rfc-7144
kind: normative-requirement
summary: When iSCSIProtocolLevel=2 is negotiated, the Data Segment of a SCSI Response PDU MAY contain sense data regardless of the Status field value, not only when Status is CHECK CONDITION (0x02).
section: 5.2.2
