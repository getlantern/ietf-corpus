document: rfc-7022
kind: protocol-element
summary: The RTCP CNAME is a persistent transport-level identifier for an RTP endpoint. Unlike the SSRC, which may change on collision or restart, the RTCP CNAME is meant to remain unchanged so that endpoints can be uniquely identified and their RTP media streams associated.
section: "1"
