document: rfc-7889
kind: security-consideration
summary: The APPENDLIMIT extension provides only an optimization hint for cooperative clients and does not introduce new security concerns. It does not protect against abusive clients intentionally consuming server resources; servers must still disconnect or restrict such clients independently.
