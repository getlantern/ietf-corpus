document: rfc-2274
kind: interoperability-note
summary: A non-authoritative engine that receives a Trap or Report intended for a different non-authoritative engine may accept it (updating timeliness state), but any Response or Report without a matching outstanding Request will be discarded by the Message Processing Model, not USM. This cross-engine replay of Traps is considered acceptable, not a threat.
section: 1.5.2
topics:
    - snmp
    - security
