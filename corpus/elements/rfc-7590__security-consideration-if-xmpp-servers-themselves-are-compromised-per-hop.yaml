document: rfc-7590
kind: security-consideration
summary: If XMPP servers themselves are compromised, per-hop TLS encryption does not protect communications; even end-to-end payload encryption would leave addressing and roster data exposed. The document's recommendations assume servers and clients have not been subject to widespread compromise.
