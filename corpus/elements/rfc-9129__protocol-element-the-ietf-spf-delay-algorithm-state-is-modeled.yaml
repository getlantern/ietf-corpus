summary: The IETF SPF delay algorithm state is modeled under 'spf-control/ietf-spf-delay' with configurable parameters (initial-delay, short-delay, long-delay, hold-down, time-to-learn) and read-only operational state (current-state, remaining-time-to-learn, remaining-hold-down, last-event-received, next-spf-time, last-spf-time), conforming to RFC 8405.
