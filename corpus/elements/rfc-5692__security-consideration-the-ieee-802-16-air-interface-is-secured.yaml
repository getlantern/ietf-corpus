document: rfc-5692
kind: security-consideration
summary: The IEEE 802.16 air interface is secured by a Traffic Encryption Key (TEK) generated upon successful mutual authentication between SS and BS, providing admission control and ciphering. The bridged Ethernet model remains vulnerable to malicious reconfiguration of the bridge address table during the learning process; IEEE 802.1AE link security can mitigate this.
