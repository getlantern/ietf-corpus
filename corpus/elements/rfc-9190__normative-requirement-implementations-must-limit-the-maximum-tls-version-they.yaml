document: rfc-9190
kind: normative-requirement
summary: Implementations MUST limit the maximum TLS version they use to 1.3, unless later versions are explicitly enabled by the administrator, because new TLS versions could introduce incompatibilities or security issues if not carefully integrated with the EAP state machine.
section: "1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
