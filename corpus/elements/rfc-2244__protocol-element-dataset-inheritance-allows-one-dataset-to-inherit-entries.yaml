document: rfc-2244
kind: protocol-element
summary: Dataset inheritance allows one dataset to inherit entries and attributes from a base dataset, with the 'dataset.inherit' attribute in the '' entry specifying the base. An overridden attribute can be reset to the inherited value by storing DEFAULT. Servers MUST support at least two levels of inheritance.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
