document: rfc-5845
kind: normative-requirement
summary: When the MAG determines GRE encapsulation and GRE key exchange are required, the MAG MUST include the GRE Key option in the initial Proxy Binding Update, carrying the downlink GRE key in the GRE Key Identifier field.
section: 3.3.1
rfc2119_level: MUST
