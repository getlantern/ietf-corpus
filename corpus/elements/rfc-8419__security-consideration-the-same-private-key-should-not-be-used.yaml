document: rfc-8419
kind: security-consideration
summary: The same private key SHOULD NOT be used with more than one set of EdDSA parameters, as doing so may leak information about the key to an attacker, even though no concrete attack is known for PureEdDSA/HashEdDSA reuse.
section: "5"
rfc2119_level: SHOULD NOT
topics:
