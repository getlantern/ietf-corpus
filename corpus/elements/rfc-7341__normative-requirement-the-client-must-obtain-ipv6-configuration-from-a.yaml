document: rfc-7341
kind: normative-requirement
summary: The client MUST obtain IPv6 configuration from a DHCPv6 server before using DHCPv4 over DHCPv6, and MUST request the DHCP 4o6 Server Address option in every Solicit, Request, Renew, Rebind, and Information-request message.
section: "9"
rfc2119_level: MUST
