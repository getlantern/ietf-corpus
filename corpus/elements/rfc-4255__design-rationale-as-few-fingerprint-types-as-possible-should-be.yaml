document: rfc-4255
kind: design-rationale
summary: As few fingerprint types as possible should be reserved; the only reason to add new fingerprint type values is to increase security. This minimizes unnecessary algorithm proliferation while preserving a path for future cryptographic upgrades.
section: 3.1.2
