document: rfc-5536
kind: normative-requirement
summary: Implementations MUST NOT generate a Message-ID where the only difference from another Message-ID is the case of characters in the id-right part, because some software performs case-insensitive matching while others do case-sensitive matching on id-right.
section: 3.1.3
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
