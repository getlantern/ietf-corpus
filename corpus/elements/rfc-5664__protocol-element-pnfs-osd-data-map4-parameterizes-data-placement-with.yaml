document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_data_map4 parameterizes data placement with: odm_num_comps (number of component objects), odm_stripe_unit (bytes per stripe unit), odm_group_width and odm_group_depth (nested striping parameters, both MUST be zero if no nesting), odm_mirror_cnt (replication count, MUST be 0 if no mirroring), and odm_raid_algorithm.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
