document: rfc-9352
kind: design-rationale
summary: The SRv6 SID Structure sub-sub-TLV is defined for informational purposes (validation of SID allocation schemes by controllers via BGP-LS, and provisioning of filtering rules at SR domain boundaries) rather than for use in packet forwarding, to keep the forwarding plane independent of control-plane SID structure encoding.
