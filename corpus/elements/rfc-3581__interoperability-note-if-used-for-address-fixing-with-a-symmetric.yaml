document: rfc-3581
kind: interoperability-note
summary: If used for address fixing with a symmetric NAT, a client can only receive requests from the specific server it sent the request to, not from other servers in a cluster. Additionally, the server must send requests from the same address and port on which it received the registration, behavior not mandated by RFC 3261.
section: "9.3"
topics:
    - sip
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
