document: rfc-9655
kind: interoperability-note
summary: When the egress node does not support the Egress TLV extensions, egress validation is skipped and Best-return-code is set to 3 ('Replying router is an egress for the FEC at stack-depth <RSC>') with Best-rtn-subcode set to stack-depth, following the baseline Nil FEC behavior from RFC 8029.
section: "5"
topics:
