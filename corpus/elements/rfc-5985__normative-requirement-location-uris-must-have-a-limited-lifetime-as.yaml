document: rfc-5985
kind: normative-requirement
summary: Location URIs MUST have a limited lifetime as reflected by the value of the 'expires' element. The LIS and network SHOULD be configured so that when the LIS detects a change resulting in it no longer being able to determine the location of the Device, all Location URIs for that Device SHOULD be invalidated.
section: "9.3"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
