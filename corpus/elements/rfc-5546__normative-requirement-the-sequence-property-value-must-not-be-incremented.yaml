document: rfc-5546
kind: normative-requirement
summary: The SEQUENCE property value MUST NOT be incremented when using REPLY, REFRESH, COUNTER, DECLINECOUNTER, or when sending a delegation REQUEST. SEQUENCE MUST be incremented each time the Organizer uses the ADD or CANCEL methods.
section: 2.1.4
rfc2119_level: MUST NOT
topics:
    - email
