document: rfc-6295
kind: normative-requirement
summary: A receiver MUST detect each RTP sequence number break. If due to packet loss, the receiver MUST repair all indefinite artifacts in the rendered MIDI performance. A receiver MUST treat the first received packet as ending a loss event, and upon exiting a session MUST ensure no indefinite artifacts remain.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
