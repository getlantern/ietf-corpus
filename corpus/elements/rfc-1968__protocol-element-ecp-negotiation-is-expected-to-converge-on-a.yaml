document: rfc-1968
kind: protocol-element
summary: ECP negotiation is expected to converge on a single mutually agreeable encryption algorithm per direction, or none. A different algorithm may be negotiated in each direction. Configuration Options indicate algorithms the receiver is willing to use to decrypt data.
