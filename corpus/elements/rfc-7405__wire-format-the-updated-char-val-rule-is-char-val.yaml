document: rfc-7405
kind: wire-format
summary: 'The updated ''char-val'' rule is: char-val = case-insensitive-string / case-sensitive-string; case-insensitive-string = ["%i"] quoted-string; case-sensitive-string = "%s" quoted-string; quoted-string = DQUOTE *(%x20-21 / %x23-7E) DQUOTE. This replaces the char-val rule in Section 4 of RFC 5234.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
