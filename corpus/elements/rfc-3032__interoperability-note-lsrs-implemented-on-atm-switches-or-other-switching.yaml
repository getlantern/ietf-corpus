document: rfc-3032
kind: interoperability-note
summary: LSRs implemented on ATM switches or other switching devices may use different encoding for the top one or two label stack entries (e.g., using ATM VPI/VCI as a label). The encoding specified in this document MUST be used for any further entries below those top entries.
section: "1"
topics:
