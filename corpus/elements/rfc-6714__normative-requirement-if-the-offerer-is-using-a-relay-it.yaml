document: rfc-6714
kind: normative-requirement
summary: If the offerer is using a relay, it MUST include the relay's address in the SDP c/m-line (not its own address) and MUST include an SDP 'setup:actpass' attribute in the MSRP media description of the SDP offer.
section: "4.2"
rfc2119_level: MUST
topics:
    - realtime
    - sip
