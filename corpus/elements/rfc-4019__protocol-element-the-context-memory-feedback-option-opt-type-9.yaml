document: rfc-4019
kind: protocol-element
summary: The CONTEXT_MEMORY feedback option (Opt Type=9, Opt Len=0, 1 octet total) informs the compressor that the decompressor lacks sufficient memory for the current compressed context structure. The compressor SHOULD respond by reducing memory requirements or stopping compression.
section: "5.7"
