document: rfc-3986
kind: interoperability-note
summary: A non-strict parser may ignore a scheme in a reference when it matches the base URI's scheme, treating the reference as relative. This is a loophole from RFC 1630 that should be avoided but is permitted for backward compatibility.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
