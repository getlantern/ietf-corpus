document: rfc-5282
kind: interoperability-note
summary: The IKEv2 ENCR Transform Identifiers for AES GCM and AES CCM (14–16, 18–20) were previously allocated by IANA for ESP; this document extends their use to IKEv2 without requiring new IANA allocations. Each AEAD_* algorithm in Section 10.3 corresponds exactly to a specific ENCR Identifier + Key Length Attribute combination.
section: "10.3"
topics:
    - ipsec
    - crypto
    - registry
