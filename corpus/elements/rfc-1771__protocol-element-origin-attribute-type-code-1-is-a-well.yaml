document: rfc-1771
kind: protocol-element
summary: 'ORIGIN attribute (Type Code 1) is a well-known mandatory 1-octet attribute: 0=IGP (interior to originating AS), 1=EGP (learned via EGP), 2=INCOMPLETE (learned by other means). Generated by the originating AS and included in all UPDATE messages that propagate the route.'
section: 5.1.1
topics:
