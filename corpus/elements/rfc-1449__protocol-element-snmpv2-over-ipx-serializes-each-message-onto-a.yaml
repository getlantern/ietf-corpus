document: rfc-1449
kind: protocol-element
summary: SNMPv2 over IPX serializes each message onto a single IPX datagram using IPX packet type 4 (Packet Exchange). Agents should listen on IPX socket 36879 (0x900F); notification sinks on socket 36880 (0x9010).
