document: rfc-2165
kind: normative-requirement
summary: A Directory Agent MUST decline to register a service with an unsupported scope and return SCOPE_NOT_SUPPORTED; an unscoped DA MUST NOT reject registrations based on scope and MUST accept all Service Registrations.
section: "9"
rfc2119_level: MUST
