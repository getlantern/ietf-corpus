document: rfc-7033
kind: protocol-element
summary: 'The JSON Resource Descriptor (JRD) is a JSON object containing four top-level members: ''subject'' (string URI), ''aliases'' (array of URI strings), ''properties'' (URI-keyed name/value pairs), and ''links'' (array of link relation objects). All members except ''subject'' are OPTIONAL.'
