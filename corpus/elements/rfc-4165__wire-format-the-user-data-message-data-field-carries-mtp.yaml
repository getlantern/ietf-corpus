document: rfc-4165
kind: wire-format
summary: 'The User Data message Data field carries MTP MSU fields: PRI (2 bits, bits 7–6 of first octet), spare (6 bits), SIO, and SIF, transmitted in MTP3 byte order. The field SHALL NOT include Flag, BSN, BIB, FSN, FIB, LI, or CK from the MTP MSU, and M2PA SHALL NOT add padding.'
section: 2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
