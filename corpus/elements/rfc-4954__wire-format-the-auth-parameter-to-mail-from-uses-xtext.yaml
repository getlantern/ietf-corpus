summary: 'The AUTH parameter to MAIL FROM uses xtext encoding: xchar is US-ASCII excluding ''+'', ''='', SP, and CTL; hexchar is ''+'' followed by two hex digits. The decoded xtext value MUST be either a <mailbox> or the two characters ''<>''.'
