document: rfc-8706
kind: state-machine
summary: 'Running Router state table: states are Running and ADJ-suppressed. Events include RX PR (set Planned Restart State, send PA), RX RR (maintain adjacency state, send RA, set SRM/send CSNP, set Restart Mode), RX SA (suppress IS neighbor TLV, goto ADJ-suppressed), and RX SA-clear (unsuppress TLV, return to Running).'
