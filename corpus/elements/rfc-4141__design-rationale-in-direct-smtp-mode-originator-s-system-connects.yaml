document: rfc-4141
kind: design-rationale
summary: In direct SMTP mode (originator's system connects directly to recipient's system), CONPERM is unnecessary because the SMTP client already has the originator's permission and the SMTP server directly knows the recipient's capabilities; only CONNEG is needed.
