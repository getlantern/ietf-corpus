document: rfc-7070
kind: security-consideration
summary: Both clients and servers of reputation systems must be resistant to malformed messages, deliberate or otherwise. Malformations can be used to confound identification of the party responsible for content under evaluation, potentially enabling delivery of dangerous content.
section: "9.2"
topics:
    - security
