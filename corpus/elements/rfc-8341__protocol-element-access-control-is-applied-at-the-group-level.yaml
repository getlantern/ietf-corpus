document: rfc-8341
kind: protocol-element
summary: Access control is applied at the group level, not per individual user. A group contains zero or more members identified by username strings; one user may belong to multiple groups. Group membership can come from local configuration or from the transport layer (e.g., RADIUS) when enable-external-groups is true.
section: 3.3.2
topics:
    - netconf
    - security
    - radius
