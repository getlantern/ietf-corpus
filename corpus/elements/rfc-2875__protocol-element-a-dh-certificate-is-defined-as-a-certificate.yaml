document: rfc-2875
kind: protocol-element
summary: A 'DH certificate' is defined as a certificate whose SubjectPublicKey is a DH public value, signed with any signature algorithm (e.g., RSA or DSA). This is the certificate from which the recipient's DH public key and group parameters are obtained.
