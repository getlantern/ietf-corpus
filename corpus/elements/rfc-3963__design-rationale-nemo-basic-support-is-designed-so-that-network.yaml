document: rfc-3963
kind: design-rationale
summary: NEMO Basic Support is designed so that network mobility is completely transparent to nodes inside the Mobile Network. Nodes in the Mobile Network treat it as a normal IPv6 access network and run standard Mobile IPv6 if they support mobility. This avoids requiring mobility support in every node attached to the mobile network.
section: "1"
topics:
    - mobility
    - ip
