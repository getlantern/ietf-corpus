document: rfc-4524
kind: interoperability-note
summary: 'The ''mail'' attribute uses caseIgnoreIA5Match, which differs from normal Mailbox comparison rules: the assertion (mail=joe@example.com) will match ''JOE@example.com'', and two mailboxes differing only in local-part case cannot both be stored as they are considered equal.'
section: "2.16"
topics:
    - ldap
    - email
