document: rfc-6532
kind: security-consideration
summary: The security impact of UTF-8 headers on email signature systems (DKIM, S/MIME, OpenPGP) is discussed in Section 14 of RFC 6530. Certificates for users with both non-ASCII and ASCII mailbox addresses may carry both as identities, which is supported by PKIX and OpenPGP but may introduce user-interface issues.
section: "4"
topics:
    - email
    - security
    - crypto
    - pkix
