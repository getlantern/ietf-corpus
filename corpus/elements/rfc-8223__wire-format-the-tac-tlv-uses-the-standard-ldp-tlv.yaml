document: rfc-8223
kind: wire-format
summary: The TAC TLV uses the standard LDP TLV encoding with U-bit set to 1, a 16-bit TLV Code Point (0x050F), and a Length field. The Capability Data contains zero or more TAEs, each a 32-bit field with a 16-bit TA-Id and a 1-bit E-bit (Enable) followed by reserved bits.
section: "2.1"
