document: rfc-1582
kind: security-consideration
summary: The circuit manager SHOULD only accept incoming calls from a well-defined list of known next-hop routers (identified by physical address). This prevents unauthorized routers from injecting routing information via spurious circuit establishment.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - routing
