document: rfc-9128
kind: security-consideration
summary: The YANG modules define data nodes that are writable/creatable/deletable; unauthorized access could disrupt PIM operation. Implementations must enforce access control via NETCONF or RESTCONF as specified in RFC 8341 to restrict write operations to authorized administrators.
section: "7"
topics:
    - security
    - yang
    - multicast
    - netconf
