document: rfc-4553
kind: normative-requirement
summary: The payload of each lost SAToP packet MUST be replaced with replacement data. By default, all SAToP implementations MUST support generation of the 'all ones' pattern as the replacement data. Before a PW is set up and after a PW is torn down, the IWF MUST play out the 'all ones' pattern to its TDM attachment circuit.
section: 6.2.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
