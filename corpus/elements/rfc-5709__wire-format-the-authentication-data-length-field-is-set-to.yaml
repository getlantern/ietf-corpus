document: rfc-5709
kind: wire-format
summary: The Authentication Data Length field is set to the length in bytes of the cryptographic hash output. For HMAC-SHA-1 it is 20 bytes, SHA-256 is 32 bytes, SHA-384 is 48 bytes, and SHA-512 is 64 bytes. The Authentication Trailer is appended to the OSPF packet and is not counted in the OSPF packet's own Length field but is included in the IP Length field.
section: "3.1"
topics:
    - routing
    - crypto
