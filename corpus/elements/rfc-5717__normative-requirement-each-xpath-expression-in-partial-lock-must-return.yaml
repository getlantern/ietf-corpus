document: rfc-5717
kind: normative-requirement
summary: Each XPath expression in <partial-lock> MUST return a node set, and at least one of the node sets MUST be non-empty. If all select expressions return an empty node set, the error-tag is 'operation-failed' with error-app-tag 'no-matches'.
section: 2.4.1
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
