document: rfc-6724
kind: design-rationale
summary: Rule 5.5 (prefer addresses from a prefix advertised by the next-hop) was added to improve connectivity in the presence of BCP 38 ingress filtering. It is optional because the IPv6 conceptual host model does not require tracking which next-hops advertised which prefixes.
