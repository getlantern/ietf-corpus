document: rfc-9824
kind: protocol-element
summary: NXNAME is a synthetic Meta-TYPE with value 128, allocated in the DNS RR TYPEs registry. It is placed in the NSEC Type Bit Maps field (in addition to RRSIG and NSEC) to signal that the owner name does not exist. For NSEC3, it is the sole entry in the Type Bit Maps field for nonexistent names.
section: "2"
topics:
