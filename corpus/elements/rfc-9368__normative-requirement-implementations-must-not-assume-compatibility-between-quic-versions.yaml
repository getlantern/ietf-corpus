document: rfc-9368
kind: normative-requirement
summary: Implementations MUST NOT assume compatibility between QUIC versions unless it is explicitly specified in a defining document. When a new version is defined, it is assumed incompatible with all others unless stated otherwise.
section: "2.2"
rfc2119_level: MUST NOT
