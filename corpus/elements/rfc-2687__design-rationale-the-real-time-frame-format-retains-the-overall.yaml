document: rfc-2687
kind: design-rationale
summary: The real-time frame format retains the overall HDLC-based frame structure so that existing synchronous HDLC chips and async-to-sync converters can operate on the link without modification, prioritizing compatibility over the additional design alternatives that would be available for async-only operation.
