document: rfc-6186
kind: design-rationale
summary: The specification was motivated by the poor user experience of requiring users to manually enter FQDNs and port numbers for email services. By using SRV records, an MUA need only prompt for the user's email address, from which the domain portion is extracted to perform SRV lookups, enabling fully automatic service configuration.
section: "1"
topics:
    - email
    - dns
