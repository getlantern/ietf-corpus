document: rfc-5815
kind: normative-requirement
summary: If an Observation Point is not specified for a Metering Process cache, ipfixMeteringProcessObservationPointGroupRef MUST be zero. Similarly, the special value 0 MUST NOT be used as an ipfixObservationPointGroupId within the Observation Point table itself.
section: "5.5"
rfc2119_level: MUST
topics:
