document: rfc-6232
kind: interoperability-note
summary: Legacy systems strictly conforming to RFC 5304 or RFC 5310 will discard purges carrying the new POI TLV when authentication is in use, because the additional TLV changes the authenticated content. A coordinated domain-wide upgrade is required before deployment.
section: "5"
topics:
