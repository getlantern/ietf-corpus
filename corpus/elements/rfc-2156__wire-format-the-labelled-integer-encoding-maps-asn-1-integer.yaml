document: rfc-2156
kind: wire-format
summary: The labelled-integer encoding maps ASN.1 INTEGER or ENUMERATED to ASCII as an optional text label followed by the decimal integer in parentheses (e.g., 'important(2)'). The variant labelled-integer-2 reverses the order for use in DSNs. Only the numeric part is used when mapping back to ASN.1.
section: 3.3.6
