document: rfc-8434
kind: normative-requirement
summary: Any disagreement between the metadata server and a storage device over attribute values such as modify time, the change attribute, and EOF position MUST be of limited duration with clear resolution means. A LAYOUTCOMMIT requires that changes in attributes resulting from operations on the storage device be reflected in the metadata server by the completion of the operation.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
