document: rfc-6146
kind: normative-requirement
summary: Port allocation SHOULD preserve the port range (Well-Known 0–1023 vs. 1024–65535) and SHOULD preserve port parity (odd/even) per RFC 4787 REQ-3. If no port is available in the same range, the NAT64 MAY assign a port from another range.
section: 3.5.1.1
rfc2119_level: SHOULD
topics:
    - nat
    - udp
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
