document: rfc-9341
kind: interoperability-note
summary: NTP (RFC 5905) or IEEE 1588 PTP may be used for timestamp formats and clock synchronization depending on required precision. The Alternate-Marking Method depends on an underlying time synchronization protocol for both delay measurement validity and block boundary alignment.
