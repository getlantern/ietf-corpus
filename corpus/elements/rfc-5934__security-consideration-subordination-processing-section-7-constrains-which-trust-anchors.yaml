document: rfc-5934
kind: security-consideration
summary: Subordination processing (Section 7) constrains which trust anchors may authorize which operations, preventing a less-privileged management trust anchor from granting itself or others capabilities beyond what it was delegated. Trust anchor stores must enforce these constraints on every add, remove, and change operation.
section: "7"
topics:
    - security
    - pkix
