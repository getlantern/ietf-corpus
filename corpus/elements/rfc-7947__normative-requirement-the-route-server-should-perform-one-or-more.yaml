document: rfc-7947
kind: normative-requirement
summary: The route server SHOULD perform one or more BGP Decision Processes to select routes for subsequent advertisement to its clients, and SHOULD forward UPDATE messages from its Loc-RIB or Loc-RIBs to clients as determined by local policy.
section: "2.1"
rfc2119_level: SHOULD
