document: rfc-8255
kind: design-rationale
summary: '''multipart/multilingual'' has similar semantics to ''multipart/alternative'' but differs fundamentally in selection logic: instead of choosing by part ordering and Content-Type, the client chooses by matching the Content-Language field against the user''s language preferences. This makes language-based dispatch explicit and machine-readable.'
