document: rfc-9255
kind: protocol-element
summary: Route Origin Authorizations (ROAs) and ASPA records are the intended outputs of RPKI signing operations, scoped strictly to routing-related assertions about INRs. Schemes like Resource Tagged Attestations and Signed Checklists must extract keys from CAs to attempt identity-adjacent uses.
section: "2"
topics:
