document: rfc-3268
kind: security-consideration
summary: 'Ephemeral Diffie-Hellman ciphersuites provide forward secrecy. To maximize their benefit: ephemeral keys should be used only once (no significant efficiency gain from reuse in TLS), destroyed securely when no longer needed, and generated by an RNG that does not reveal past output even when its internal state is compromised.'
section: Security Considerations
topics:
    - tls
    - crypto
    - security
