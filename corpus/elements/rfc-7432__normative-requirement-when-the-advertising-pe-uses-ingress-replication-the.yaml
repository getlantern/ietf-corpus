document: rfc-7432
kind: normative-requirement
summary: When the advertising PE uses ingress replication, the ESI label MUST be downstream assigned; when using P2MP MPLS LSPs, the ESI label MUST be upstream assigned. Penultimate hop popping MUST be disabled on P2MP LSPs used in the EVPN MPLS transport.
section: 8.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
