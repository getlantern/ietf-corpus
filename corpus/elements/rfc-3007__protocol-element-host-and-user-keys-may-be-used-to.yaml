document: rfc-3007
kind: protocol-element
summary: Host and user keys MAY be used to generate SIG(0) records to authenticate updates and MAY be used in the TKEY process to generate TSIG shared secrets, but no SIG records generated by non-zone keys will be used in DNSSEC validation unless local policy dictates.
section: "1.4"
topics:
