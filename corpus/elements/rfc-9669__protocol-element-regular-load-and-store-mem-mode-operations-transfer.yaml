document: rfc-9669
kind: protocol-element
summary: Regular load and store (MEM mode) operations transfer data between a register and a memory address computed as base register plus signed offset. STX stores from register, ST stores immediate, and LDX loads as unsigned. Sign-extension loads (MEMSX mode) load signed 8-, 16-, or 32-bit values and sign-extend to the register width.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
