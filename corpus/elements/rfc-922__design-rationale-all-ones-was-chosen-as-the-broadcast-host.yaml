document: rfc-922
kind: design-rationale
summary: All-ones was chosen as the broadcast host number because it is unlikely to be assigned to a real host, and the local network layer can always map any IP address to a data link broadcast address, making the specific choice somewhat arbitrary. First proposed in IEN-212.
