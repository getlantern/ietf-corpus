document: rfc-5147
kind: normative-requirement
summary: All implementations SHOULD support the Internet-wide CR+LF line ending convention and MAY support additional conventions such as bare LF (Unix), bare CR (classic MacOS), NEL, or CR+NEL.
section: "4.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
