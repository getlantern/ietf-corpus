document: rfc-7465
kind: security-consideration
summary: RC4 has long-known cryptographic weaknesses. Recent cryptanalysis (AlFardan et al., USENIX Security 2013) exploits biases in the RC4 keystream to recover repeatedly encrypted plaintexts, requiring approximately 2^26 sessions or 13×2^30 encryptions — on the verge of practical exploitability.
