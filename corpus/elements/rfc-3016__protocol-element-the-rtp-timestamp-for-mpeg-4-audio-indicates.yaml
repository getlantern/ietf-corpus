document: rfc-3016
kind: protocol-element
summary: The RTP timestamp for MPEG-4 Audio indicates the sampling instance of the first audio frame in the packet; the default clock rate is 90 kHz unless overridden out-of-band, with other rates allowed only if equal to the audio sampling rate.
