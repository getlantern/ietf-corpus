document: rfc-8308
kind: normative-requirement
summary: Applications implementing this mechanism MUST add either 'ext-info-s' (server) or 'ext-info-c' (client) to the kex_algorithms field in the SSH_MSG_KEXINIT message sent during the first key exchange.
section: "2.1"
rfc2119_level: MUST
topics:
