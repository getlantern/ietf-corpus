document: rfc-7695
kind: normative-requirement
summary: When creating a new assignment (case 1 of subroutine), the selected prefix MUST be included in or equal to the Delegated Prefix and MUST NOT include or be included in any Advertised Prefix. The Apply Timer is set to (2 * Flooding Delay).
section: "4.1"
rfc2119_level: MUST
topics:
