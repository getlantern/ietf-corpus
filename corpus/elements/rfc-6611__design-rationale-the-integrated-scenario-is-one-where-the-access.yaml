document: rfc-6611
kind: design-rationale
summary: The integrated scenario is one where the Access Service Authorizer (ASA) and the Mobility Service Authorizer (MSA) are the same entity, enabling MIPv6 bootstrapping to occur at the time of network access authentication. This contrasts with the split scenario (RFC 5026) where they are different entities.
