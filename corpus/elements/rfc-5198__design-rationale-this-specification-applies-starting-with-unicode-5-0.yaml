document: rfc-5198
kind: design-rationale
summary: This specification applies starting with Unicode 5.0 and not to any version that changes UTF-8 encoding or NFC stability. Freezing on an older version (like Stringprep's 3.2) was rejected because library-based application implementations make version linkages nearly meaningless in practice.
section: "4"
