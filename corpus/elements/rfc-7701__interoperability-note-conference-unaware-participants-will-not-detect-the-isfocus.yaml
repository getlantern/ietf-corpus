document: rfc-7701
kind: interoperability-note
summary: Conference-unaware participants will not detect the 'isfocus' feature tag and cannot apply the additional mechanisms defined in this document. The MSRP switch must track which participants do not support private messaging or nicknames (via the chatroom SDP attribute) to avoid misdelivery.
section: "5.2"
topics:
