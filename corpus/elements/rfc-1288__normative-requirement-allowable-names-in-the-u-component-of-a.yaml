document: rfc-1288
kind: normative-requirement
summary: Allowable names in the {U} component of a query MUST include 'user names' or 'login names' as defined by the system. The system administrator SHOULD be allowed to choose whether ambiguous name lookups return all possible matching users.
section: 2.5.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
