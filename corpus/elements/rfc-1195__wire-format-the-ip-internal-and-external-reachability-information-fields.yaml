document: rfc-1195
kind: wire-format
summary: The IP Internal and External Reachability Information fields encode reachable destinations as [IP address, subnet mask, metric] tuples. The default metric is always present; delay, expense, and error TOS metrics are optional. Metric values in level 2 LSPs are capped at 63.
