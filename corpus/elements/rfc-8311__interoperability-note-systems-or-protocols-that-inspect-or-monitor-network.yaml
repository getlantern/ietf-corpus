document: rfc-8311
kind: interoperability-note
summary: Systems or protocols that inspect or monitor network traffic SHOULD be prepared to encounter ECN usage on packets and traffic that currently do not use ECN, specifically TCP control packets and retransmissions, as these may appear in ECN experiments enabled by this memo.
section: "2.2"
topics:
    - ecn
    - tcp
    - congestion
