document: rfc-3262
kind: normative-requirement
summary: A reliable provisional response MUST contain a Require header field with the option tag 100rel, and MUST include an RSeq header field. The first RSeq value in a transaction MUST be between 1 and 2**31 - 1, and it is RECOMMENDED to be chosen uniformly in this range.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
