document: rfc-3502
kind: normative-requirement
summary: If the append is unsuccessful for any reason (including cancellation), the mailbox MUST be restored to its state before the APPEND attempt; no partial appending is permitted. The server MAY return an error before processing all the message arguments.
section: 6.3.11
rfc2119_level: MUST
topics:
    - email
