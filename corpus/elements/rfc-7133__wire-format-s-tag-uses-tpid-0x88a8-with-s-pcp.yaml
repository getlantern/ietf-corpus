summary: S-TAG uses TPID=0x88a8 with S-PCP (3 bits), DEI (1 bit), and S-VID (12 bits); C-TAG uses TPID=0x8100 with C-PCP (3 bits), DEI (1 bit), and C-VID (12 bits); B-TAG uses TPID=0x88a8 with the same sub-field layout as S-TAG (B-PCP, B-DEI, B-VID).
