document: rfc-5901
kind: protocol-element
summary: PhraudReport is an XML extension element embedded within IODEF Incident.EventData.AdditionalData (dtype='xml') that encodes phishing and fraud event data. It requires FraudType and Version attributes plus at least one LureSource and OriginatingSensor child element; all other sub-elements are optional.
section: "5.1"
topics:
