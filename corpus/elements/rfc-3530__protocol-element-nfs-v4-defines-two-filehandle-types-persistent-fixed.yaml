document: rfc-3530
kind: protocol-element
summary: 'NFS v4 defines two filehandle types: persistent (fixed value for the lifetime of the filesystem object) and volatile (may expire at points determined by the server). The mandatory fh_expire_type attribute bitmask communicates expiry semantics via flags: FH4_PERSISTENT, FH4_VOLATILE_ANY, FH4_NOEXPIRE_WITH_OPEN, FH4_VOL_MIGRATION, and FH4_VOL_RENAME.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
