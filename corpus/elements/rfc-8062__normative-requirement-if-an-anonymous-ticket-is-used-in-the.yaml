document: rfc-8062
kind: normative-requirement
summary: If an anonymous ticket is used in the PA-TGS-REQ of a TGS request, the anonymous KDC option SHOULD be set. The TGS MUST NOT reveal the client's identity in authorization data of the returned anonymous ticket.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
