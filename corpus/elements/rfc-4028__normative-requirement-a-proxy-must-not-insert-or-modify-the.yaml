document: rfc-4028
kind: normative-requirement
summary: A proxy MUST NOT insert or modify the value of the 'refresher' parameter in the Session-Expires header field in a request. It also MUST NOT set the Session-Expires value lower than the Min-SE value in the request.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
