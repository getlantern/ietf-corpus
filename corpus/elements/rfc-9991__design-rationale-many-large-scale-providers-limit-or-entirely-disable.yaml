document: rfc-9991
kind: design-rationale
summary: Many large-scale providers limit or entirely disable failure report generation, preferring aggregate reports that provide statistical visibility without exposing sensitive message content. This document acknowledges that privacy concerns have led operators to restrict failure reporting and recommends limiting its use to targeted diagnostic activities with minimization techniques.
