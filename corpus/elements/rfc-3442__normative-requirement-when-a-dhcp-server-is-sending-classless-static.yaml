document: rfc-3442
kind: normative-requirement
summary: When a DHCP server is sending Classless Static Routes to a client that also requested the Router or Static Routes options, the server SHOULD NOT include the Router or Static Routes options in its reply.
section: DHCP Server Administrator Responsibilities
rfc2119_level: SHOULD NOT
