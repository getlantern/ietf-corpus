document: rfc-2846
kind: wire-format
summary: The recipient-name is encoded as "/ATTN=" pers-name, where pers-name = [ givenname "." ] [ initials "." ] surname. The surname follows ITU F.401 printablestring; givenname allows digits, alpha, SP, and special characters.
