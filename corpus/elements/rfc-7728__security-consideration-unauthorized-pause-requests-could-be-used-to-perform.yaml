document: rfc-7728
kind: security-consideration
summary: Unauthorized PAUSE requests could be used to perform denial-of-service attacks by halting legitimate RTP streams. The specification inherits the security framework of AVPF (RFC 4585) and CCM (RFC 5104); SRTP/SRTCP (RFC 3711) SHOULD be used to provide authentication and integrity protection for PAUSE-RESUME messages to prevent such attacks.
section: "12"
topics:
    - rtp
    - realtime
    - security
