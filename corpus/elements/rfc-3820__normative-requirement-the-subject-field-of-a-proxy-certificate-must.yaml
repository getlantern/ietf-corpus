document: rfc-3820
kind: normative-requirement
summary: The subject field of a Proxy Certificate MUST be the issuer field (i.e., the subject of the Proxy Issuer) appended with a single Common Name component. The CN value SHOULD be unique to each Proxy Certificate bearer amongst all Proxy Certificates with the same issuer.
section: "3.4"
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
