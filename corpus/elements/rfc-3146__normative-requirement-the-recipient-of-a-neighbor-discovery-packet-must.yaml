document: rfc-3146
kind: normative-requirement
summary: The recipient of a Neighbor Discovery packet MUST ignore it unless the most significant ten bits of the source_ID are equal to either 0x3FF or the most significant ten bits of the recipient's NODE_IDS register.
section: "8"
rfc2119_level: MUST
topics:
    - ip
    - security
