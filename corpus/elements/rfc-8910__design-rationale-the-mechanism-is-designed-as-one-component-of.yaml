document: rfc-8910
kind: design-rationale
summary: The mechanism is designed as one component of a standardized approach; captive portals still need to implement interception techniques for legacy clients, and clients still need to perform probing. The DHCP/RA mechanism provides a more reliable and performant detection path and is the preferred mechanism going forward.
