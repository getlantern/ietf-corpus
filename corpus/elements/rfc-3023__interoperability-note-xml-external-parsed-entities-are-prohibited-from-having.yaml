document: rfc-3023
kind: interoperability-note
summary: XML external parsed entities are prohibited from having standalone document declarations or DTDs, so XML documents cannot be reliably used as external parsed entities and vice versa. Identifying them with distinct content types (text/xml-external-parsed-entity, application/xml-external-parsed-entity) enhances interoperability.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
