document: rfc-4012
kind: protocol-element
summary: <mp-peering> identifies the AS and optionally the router using IPv4 or IPv6 addresses, inet-rtr names, or rtr-set names, combined with AND, OR, and EXCEPT operators. It extends the original <peering> concept to support IPv6 router expressions.
section: 2.5.1
topics:
    - routing
    - ip
