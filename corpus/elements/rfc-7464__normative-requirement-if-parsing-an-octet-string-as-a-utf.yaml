document: rfc-7464
kind: normative-requirement
summary: If parsing an octet string as a UTF-8-encoded JSON text fails, the parser SHOULD nonetheless continue parsing the remainder of the sequence. The parser can report such failures to applications, which might then choose to terminate parsing.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - json
