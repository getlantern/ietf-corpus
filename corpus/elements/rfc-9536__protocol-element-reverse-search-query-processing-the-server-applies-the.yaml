summary: 'Reverse search query processing: the server applies the property mapping to each candidate object to generate a list of values, then checks whether the search pattern matches one or more values (exact match or partial string per RFC 9082 Section 4.1). Objects are included only if they satisfy all predicates, including multiple predicates on the same property.'
