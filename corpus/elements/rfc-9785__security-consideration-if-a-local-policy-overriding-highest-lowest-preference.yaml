document: rfc-9785
kind: security-consideration
summary: If a local policy overriding Highest-/Lowest-Preference is inconsistent across PEs in the Ethernet Segment for a given Ethernet Tag, packet drops or packet duplication may occur for that tag. Operators must ensure consistent local policy deployment.
