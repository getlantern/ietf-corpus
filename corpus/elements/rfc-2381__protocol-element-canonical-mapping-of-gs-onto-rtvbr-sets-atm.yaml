summary: Canonical mapping of GS onto rtVBR sets ATM traffic descriptor parameters as PCR=p_r (receiver peak rate), SCR=R (RSpec allocated rate), MBS=b_r (receiver bucket depth). Variations are permitted based on edge device buffering and economic tradeoffs.
