document: rfc-2243
kind: normative-requirement
summary: Extension set identifiers and extension type identifiers named with the prefix 'x-' are reserved for private use. Implementations that do not recognize a particular 'x-' extension MUST ignore it. All remaining extension namespace is reserved to IANA.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
    - registry
