document: rfc-3966
kind: normative-requirement
summary: Reserved characters '+', ';', '=', and '?' used as delimiters in a tel URI MUST NOT be percent-encoded. These characters MUST be percent-encoded if they appear in tel URI parameter values.
section: "3"
rfc2119_level: MUST NOT
