document: rfc-2622
kind: protocol-element
summary: The mntner class specifies authentication required to create, delete, and update RPSL objects. Its auth attribute supports schemes NONE, MAIL-FROM (regex on email addresses), CRYPT-PW (UNIX crypt password), and PGP-KEY (reference to key-certif object). If multiple auth attributes are present, satisfying any one grants authorization.
section: "3.1"
topics:
    - routing
    - security
