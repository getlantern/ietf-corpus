document: rfc-7035
kind: registry
summary: This document creates the 'Relative Location Parameters' registry (RLtype codes) under IETF Review policy, sharing a page with the 'Civic Address Types (CAtypes)' registry. Initial assignments include type codes 111, 113–127, 129–131 for reference, shapes, dynamic elements, and map metadata. Codes 0–40 and 128 are reserved to prevent collisions with CAtypes.
section: "8.1"
