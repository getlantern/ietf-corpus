document: rfc-8667
kind: normative-requirement
summary: 'V-Flag and L-Flag combinations are constrained: both set to 0 means the SID/Index/Label is a 4-octet global index; both set to 1 means a 3-octet local label (20 rightmost bits). All other combinations are invalid and any SID advertisement with an invalid V-Flag/L-Flag setting MUST be ignored.'
section: 2.1.1.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
