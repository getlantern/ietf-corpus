document: rfc-2462
kind: security-consideration
summary: Prefix advertisements with very short Valid Lifetimes from unauthenticated sources can cause premature expiry of node addresses. The 2-hour minimum lifetime clamping rule (section 5.5.3) mitigates this attack; authenticated advertisements via IPsec bypass the restriction.
section: 5.5.3
topics:
    - ip
    - security
    - v6ops
