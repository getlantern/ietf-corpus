document: rfc-6823
kind: normative-requirement
summary: Nested APPsub-TLVs (additional sub-TLV levels within application-specific information) MUST be encoded with a one-octet Type field, a one-octet Length field, and zero or more octets of Value — the same encoding as regular sub-TLVs.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
