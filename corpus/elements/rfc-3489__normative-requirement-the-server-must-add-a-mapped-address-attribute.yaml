document: rfc-3489
kind: normative-requirement
summary: The server MUST add a MAPPED-ADDRESS attribute to every Binding Response, set to the source IP address and port observed in the Binding Request. SOURCE-ADDRESS and CHANGED-ADDRESS attributes MUST also be added.
section: "8.1"
rfc2119_level: MUST
topics:
    - nat
    - udp
