document: rfc-5764
kind: normative-requirement
summary: The SRTP implementation MUST ensure all SSRC values for RTP sources originating from the same device over the same channel are distinct, to avoid the 'two-time pad' problem described in RFC 3711 Section 9.1.
section: "3"
rfc2119_level: MUST
topics:
