document: rfc-7630
kind: normative-requirement
summary: If secret keys are derived from passwords, derivation SHOULD be performed using the password-to-key algorithm from RFC 3414 Appendix A.1 with MD5 replaced by the SHA-2 hash function H of the chosen protocol. The password is expanded to 1,048,576 octets, hashed, then the digest is concatenated with snmpEngineID and rehashed.
section: "9.3"
rfc2119_level: SHOULD
topics:
    - snmp
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
