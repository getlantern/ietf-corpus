document: rfc-4171
kind: normative-requirement
summary: The iSNS server implementation MUST provide an administrative control interface for settings (ESI threshold, DD/DDS modification policy, authorized Control Nodes) that cannot be configured via iSNSP. Specified default values MUST be used in the absence of administrator-provided settings.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
