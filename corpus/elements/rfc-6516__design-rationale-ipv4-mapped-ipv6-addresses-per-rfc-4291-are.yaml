document: rfc-6516
kind: design-rationale
summary: IPv4-mapped IPv6 addresses (per RFC 4291) are used as the IPv6 source address for both S-PMSI Join UDP datagrams and IPv6 PIM control messages. This approach allows IPv6 customer signaling to traverse an IPv4 provider infrastructure without requiring dual-stack P-tunnels, maintaining a single PIM instance for P-tunnel construction.
section: "3.2"
topics:
    - multicast
    - vpn
    - ip
