kind: state-machine
summary: 'Basic path validation: initiator sends path_challenge with unpredictable cookie to the new address and starts timer T; responder echoes the cookie in a path_response; on receipt of matching path_response the initiator updates the peer address binding. If T expires, the binding is not updated.'
