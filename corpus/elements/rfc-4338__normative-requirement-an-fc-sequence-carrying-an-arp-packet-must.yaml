document: rfc-4338
kind: normative-requirement
summary: An FC Sequence carrying an ARP packet MUST be mapped to a single FC frame that MUST include the FC Network_Header and the LLC/SNAP header. Other FC Optional Headers (besides ESP_Header) MUST NOT be used in an FC frame carrying an ARP packet.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
