document: rfc-5854
kind: design-rationale
summary: The Metalink format was designed to address failures in traditional HTTP mirror redirects, which convey only a single server referral with no fallback. By encoding multiple URIs, cryptographic hashes, and digital signatures in a machine-readable document, clients can transparently retry mirrors and verify integrity, improving reliability for large downloads.
section: "1"
topics:
