summary: 'Tag type is determined by first-match rules: (1) Primary — corpus, patch, supplemental all false; (2) Supplemental — supplemental is true; (3) Corpus — corpus is true; (4) Patch — patch is true. A tag with both corpus and patch true resolves as a corpus tag.'
