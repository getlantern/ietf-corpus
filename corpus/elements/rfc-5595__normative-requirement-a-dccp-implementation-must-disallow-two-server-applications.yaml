document: rfc-5595
kind: normative-requirement
summary: A DCCP implementation MUST disallow two server applications from using the same Service Code bound to the same server port simultaneously, since there would be no way to direct a new connection to the correct application.
section: "3.3"
rfc2119_level: MUST
topics:
    - congestion
