summary: After the provisioning cycle, the MTA MUST ensure pktcSigDevToneTable is fully populated for each possible index, using reasonable defaults for rows not defined via MTA Configuration. For each tone type defined there, the MTA MUST populate at least one entry in pktcSigDevMultiFreqToneTable.
