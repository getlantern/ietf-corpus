document: rfc-8776
kind: interoperability-note
summary: The 'admin-groups' typedef is a union of classic 'admin-group' (hex-string length 1..11, 32-bit per RFC 3630/5305) and 'extended-admin-group' (unbounded hex-string per RFC 7308), providing backward compatibility so modules consuming this type can handle both classic and extended administrative group encodings.
