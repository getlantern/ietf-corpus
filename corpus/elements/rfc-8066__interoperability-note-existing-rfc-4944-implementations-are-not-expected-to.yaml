document: rfc-8066
kind: interoperability-note
summary: Existing RFC 4944 implementations are not expected to be capable of processing ESC extension data octets as defined in this document. Such implementations will likely drop the packet or ignore the ESC dispatch octets when encountering an unknown EET.
