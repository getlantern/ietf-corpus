document: rfc-5814
kind: protocol-element
summary: Single Unidirectional LSP Setup Delay is defined as the elapsed time from when ingress node ID0 sends the first bit of a Path message at wire-time T to when it receives the last bit of the corresponding Resv message at wire-time T+dT. The value is either a real number of milliseconds or 'undefined' when no Resv is received within the timeout.
section: "4"
topics:
