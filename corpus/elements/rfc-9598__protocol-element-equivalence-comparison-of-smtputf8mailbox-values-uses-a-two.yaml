document: rfc-9598
kind: protocol-element
summary: 'Equivalence comparison of SmtpUTF8Mailbox values uses a two-step process: (1) domain part comparison using LDH label encoding after converting U-labels to A-labels and lowercasing, and (2) Local-part comparison in UTF-8 form without any transformation. Two SmtpUTF8Mailbox values are equivalent if there is an exact octet-for-octet match after setup.'
section: "5"
topics:
