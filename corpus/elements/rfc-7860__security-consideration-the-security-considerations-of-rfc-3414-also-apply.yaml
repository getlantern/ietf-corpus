document: rfc-7860
kind: security-consideration
summary: The security considerations of RFC 3414 also apply to the HMAC-SHA-2 authentication protocols. Additionally, usmUserTable access controls from RFC 3414 Section 11.5 should be applied to the SNMP-USM-HMAC-SHA2-MIB.
