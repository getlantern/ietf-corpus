document: rfc-5011
kind: protocol-element
summary: The add hold-down time is 30 days or the expiration time of the original TTL of the first trust point DNSKEY RRSet containing the new key, whichever is greater. This ensures at least two validated DNSKEY RRSets containing the new key are seen before acceptance.
section: 2.4.1
topics:
    - dns
    - security
