document: rfc-1827
kind: design-rationale
summary: The receiver is advised not to immediately notify the sender of an SA failure because of the strong potential for easy-to-exploit denial of service attacks. Silent discard with local logging is preferred over ICMP error responses.
section: "4.1"
topics:
