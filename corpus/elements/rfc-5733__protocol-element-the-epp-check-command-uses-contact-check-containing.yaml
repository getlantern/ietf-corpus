document: rfc-5733
kind: protocol-element
summary: The EPP <check> command uses <contact:check> containing one or more <contact:id> elements. The response returns <contact:chkData> with <contact:cd> elements, each containing a <contact:id> with a boolean 'avail' attribute indicating whether the identifier can be provisioned.
section: 3.1.1
