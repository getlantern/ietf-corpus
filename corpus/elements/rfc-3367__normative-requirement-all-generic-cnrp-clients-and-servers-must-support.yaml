document: rfc-3367
kind: normative-requirement
summary: All generic CNRP clients and servers MUST support the HTTP transport on the default CNRP port of 1096. Special-purpose CNRP applications that never need HTTP bootstrapping MUST define how to find the appropriate server/port/protocol.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
