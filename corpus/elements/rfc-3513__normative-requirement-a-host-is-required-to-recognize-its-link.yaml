document: rfc-3513
kind: normative-requirement
summary: 'A host is required to recognize: its link-local address per interface, all configured unicast and anycast addresses, the loopback address, All-Nodes multicast addresses, Solicited-Node multicast addresses for each unicast/anycast address, and all other joined multicast group addresses. Routers additionally recognize Subnet-Router anycast, other configured anycast, and All-Routers multicast addresses.'
section: "2.8"
rfc2119_level: REQUIRED
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
