document: rfc-9800
kind: interoperability-note
summary: This document updates RFC 8754 by allowing each entry in the SRH Segment List to be either an IPv6 address (as in RFC 8754) or a REPLACE-CSID container in packed format. The IPv6 Destination Address field always remains a valid SRv6 SID conforming to RFC 9602; packed-format CSID containers never appear directly in the Destination Address.
section: "4.2"
topics:
    - routing
    - ip
