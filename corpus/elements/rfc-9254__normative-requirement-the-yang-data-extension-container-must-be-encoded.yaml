document: rfc-9254
kind: normative-requirement
summary: The yang-data extension container MUST be encoded using the same rules as YANG container-like instances (Section 4.2). When using SIDs, the outer CBOR map key is the SID of the yang-data extension container; when using names, the key is the namespace-qualified name.
section: "5"
rfc2119_level: MUST
topics:
    - yang
    - cbor
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
