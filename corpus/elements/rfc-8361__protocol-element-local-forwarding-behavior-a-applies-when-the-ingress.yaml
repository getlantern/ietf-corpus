document: rfc-8361
kind: protocol-element
summary: 'Local forwarding behavior A applies when the ingress RBridge is not the centralized node: (1) replicate to active-active group ports with the same pseudo-nickname as the incoming port; (2) do not replicate to active-active group ports with other pseudo-nicknames; (3) do not replicate to non-edge-group ports.'
