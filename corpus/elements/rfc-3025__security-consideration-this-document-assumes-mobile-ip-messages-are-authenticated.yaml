document: rfc-3025
kind: security-consideration
summary: This document assumes Mobile IP messages are authenticated using methods defined by the Mobile IP protocol and imposes no additional security requirements. The vendor-specific extensions are expected to be protected by the corresponding Mobile IP authenticators.
