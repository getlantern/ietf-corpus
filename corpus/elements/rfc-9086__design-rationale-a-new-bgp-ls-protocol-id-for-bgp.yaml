document: rfc-9086
kind: design-rationale
summary: A new BGP-LS Protocol-ID for BGP was introduced to allow separation and differentiation between BGP-LS NLRIs carrying BGP peering information and those carrying IGP link-state information defined in RFC 7752, enabling clean co-existence of both information types.
