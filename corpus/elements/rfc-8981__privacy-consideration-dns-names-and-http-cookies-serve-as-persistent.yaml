document: rfc-8981
kind: privacy-consideration
summary: DNS names and HTTP cookies serve as persistent identifiers that remain constant even when addresses change; changing addresses alone is insufficient to protect privacy when these identifiers are in use, because correlating activity via the DNS name or cookie remains trivial.
section: "2.1"
topics:
    - ip
    - privacy
    - dns
    - http
