document: rfc-4855
kind: design-rationale
summary: Media type registrations for RTP payload formats defined in RFC 3551 were removed from this document and assembled into a separate companion RFC 4856, leaving out those intended to be registered in revisions of their own payload format specification RFCs. This avoids duplication and keeps each registration close to its normative specification.
