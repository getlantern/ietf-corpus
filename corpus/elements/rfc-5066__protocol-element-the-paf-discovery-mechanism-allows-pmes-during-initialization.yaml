document: rfc-5066
kind: protocol-element
summary: The PAF Discovery mechanism allows PMEs during initialization to exchange 6-octet discovery codes to detect copper misconnections and enable automatic PME-to-PCS assignment. It requires PAF support and uses a Set-if-Clear atomic write to efmCuPAFRemoteDiscoveryCode and subsequent read to confirm remote device association.
section: 3.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
