document: rfc-4426
kind: normative-requirement
summary: Each node on the working or protection path of an LSP MUST have knowledge of the LSP identifier. At end-point nodes, the working and protection paths MUST be associated, and the association information MUST remain until the LSP is explicitly de-provisioned.
section: 3.2.2
rfc2119_level: MUST
topics:
    - mpls
