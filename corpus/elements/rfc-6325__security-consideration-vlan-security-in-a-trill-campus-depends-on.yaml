document: rfc-6325
kind: security-consideration
summary: VLAN security in a TRILL campus depends on correct appointed-forwarder operation; misconfiguration can allow frames to cross VLAN boundaries. The ESADI protocol supports cryptographic authentication of MAC address advertisements via IS-IS authentication (RFC 5304, RFC 5310), and end-node enrollment can be secured via 802.1X EAP methods.
section: "6.1"
topics:
    - security
    - routing
