document: rfc-7012
kind: security-consideration
summary: The IPFIX information model does not directly introduce security issues, but Information Elements (e.g., header field values) may constitute sensitive information for privacy or business reasons. Exporting header field values may enable attacks by the receiver that would otherwise require direct observation of traffic along the data path.
section: "8"
topics:
    - security
    - measurement
    - privacy
