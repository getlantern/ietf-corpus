document: rfc-6864
kind: interoperability-note
summary: IPv6 unfragmented datagrams carry no ID field at all; diagnostic tools and duplicate-detection mechanisms that rely on the IPv4 ID field are already non-functional for IPv6 and must be updated to use IPv6-compatible methods such as hash-based duplicate detection (RFC 6621).
section: "5.1"
topics:
    - ip
