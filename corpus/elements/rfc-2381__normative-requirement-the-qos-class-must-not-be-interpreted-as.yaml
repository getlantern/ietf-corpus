document: rfc-2381
kind: normative-requirement
summary: The QoS Class MUST NOT be interpreted as a way to add real-time behavior to an inherently non-real-time service. The QoS Class follows the ATM service category, not the IP service, to avoid unsupported combinations.
section: "2.6"
rfc2119_level: MUST NOT
topics:
