document: rfc-8768
kind: normative-requirement
summary: A CoAP proxy that understands the Hop-Limit option MUST NOT use a stored 5.08 (Hop Limit Reached) error response unless the Hop-Limit value in the presented request is smaller than or equal to the value in the request used to obtain the stored response.
section: "3"
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
