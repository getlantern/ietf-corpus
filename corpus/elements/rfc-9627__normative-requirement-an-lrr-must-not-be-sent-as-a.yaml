document: rfc-9627
kind: normative-requirement
summary: An LRR MUST NOT be sent as a reaction to picture losses due to packet loss or corruption; a PLI (Picture Loss Indication) is RECOMMENDED instead. LRR SHOULD be used only when there is an explicit change in decoder behavior.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
