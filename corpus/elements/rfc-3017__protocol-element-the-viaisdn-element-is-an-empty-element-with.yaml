document: rfc-3017
kind: protocol-element
summary: 'The viaISDN element is an empty element with an optional ''type'' attribute specifying ISDN protocol: V110L (19.2k), V110H (38.4k), V120L (56k), V120H (64k), X75 (64k), or HDLC (64k per RFC 1618). Multiple instances may appear. Additional values may be registered by IANA.'
section: 6.1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
