document: rfc-2847
kind: normative-requirement
summary: If the SPKM-3 initiator cannot calculate req-integrity due to lacking the target's certificate, it MUST use NULL-MAC in the REQ-TOKEN algId field, producing a zero-length bit string in the Integrity field.
section: 2.4.1.1
rfc2119_level: MUST
topics:
    - crypto
    - security
