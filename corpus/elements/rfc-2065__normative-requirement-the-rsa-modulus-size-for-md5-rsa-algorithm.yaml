document: rfc-2065
kind: normative-requirement
summary: The RSA modulus size for MD5/RSA (algorithm 1) SHALL be not less than 512 bits and not more than 2552 bits. The modulus n and exponent e SHOULD be chosen such that the public exponent is small. Leading zero bytes are not permitted in the signature.
section: 4.1.2
rfc2119_level: SHOULD
topics:
    - dns
    - crypto
