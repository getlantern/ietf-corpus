document: rfc-7343
kind: design-rationale
summary: ORCHIDv2 introduces a new 28-bit prefix (2001:20::/28) instead of reusing the RFC 4843 experimental prefix because the updated format (adding the OGA ID field) is not backward compatible with ORCHIDv1, and the old prefix was returned to IANA in March 2014.
