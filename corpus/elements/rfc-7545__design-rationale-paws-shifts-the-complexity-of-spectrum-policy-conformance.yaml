document: rfc-7545
kind: design-rationale
summary: PAWS shifts the complexity of spectrum-policy conformance out of the device and into the database. This simplifies regulatory updates (changes are limited to a handful of databases rather than numerous devices) and opens the door for innovations such as incorporating location, time, user priority, and micro-auction parameters.
