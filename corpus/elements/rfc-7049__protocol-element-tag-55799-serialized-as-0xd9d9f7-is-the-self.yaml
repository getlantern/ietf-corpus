document: rfc-7049
kind: protocol-element
summary: Tag 55799 (serialized as 0xd9d9f7) is the self-describe CBOR tag. It imparts no additional semantics but serves as a magic number to identify CBOR data when out-of-band context is unavailable; the byte sequence does not appear at the start of any valid Unicode text.
section: 2.4.5
topics:
    - cbor
