document: rfc-6726
kind: normative-requirement
summary: A FLUTE session consistent with this specification MUST use FLUTE version 2, and all packets MUST set the FLUTE version field to '2' in the EXT_FDT Header Extension. The session MUST also use ALC version 1 and LCT version 1.
section: "3.1"
rfc2119_level: MUST
topics:
    - multicast
