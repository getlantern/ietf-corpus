document: rfc-4997
kind: interoperability-note
summary: The scope of ROHC-FN is limited to specifying the relationship between compressed and uncompressed formats. To form a complete ROHC profile specification, the control logic for profile behaviour — including context management, feedback messages, and robustness principles — must be defined by other means outside the formal notation.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
