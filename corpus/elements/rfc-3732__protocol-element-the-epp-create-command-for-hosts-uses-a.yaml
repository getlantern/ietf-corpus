document: rfc-3732
kind: protocol-element
summary: The EPP <create> command for hosts uses a <host:create> element containing a required <host:name> and zero or more <host:addr> elements. Each <host:addr> MAY carry an 'ip' attribute with value 'v4' (default) or 'v6'.
section: 3.2.1
topics:
