document: rfc-3281
kind: security-consideration
summary: Implementers MUST ensure only attributes that the issuer is trusted to issue are used in authorization decisions; other attributes MUST be ignored. Since AAControls is optional, AC verifiers MUST receive trusted-issuer information by other means (e.g., configuration), especially when trusting more than one AC issuer.
section: "8"
topics:
