document: rfc-9904
kind: design-rationale
summary: This document moves the canonical source of DNSSEC algorithm implementation requirements and usage guidance from RFC 8624 to the IANA DNSSEC algorithm registries, modeled after the TLS Cipher Suites registry approach. This allows the list of requirements to be updated and referenced without requiring a new RFC for each change.
section: "1"
topics:
    - dns
    - registry
    - security
