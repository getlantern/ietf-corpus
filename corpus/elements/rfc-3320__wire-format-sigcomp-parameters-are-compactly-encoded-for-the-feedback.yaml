summary: 'SigComp parameters are compactly encoded for the feedback mechanism: cycles_per_bit uses 2 bits (00=16, 01=32, 10=64, 11=128); decompression_memory_size and state_memory_size each use 3 bits (000=0 bytes up to 111=131072 bytes, with 000 invalid for decompression_memory_size).'
