document: rfc-7746
kind: design-rationale
summary: LSP Self-ping is intentionally not a general-purpose OAM mechanism. Its primary design constraint is minimal impact on egress LSR performance, trading off the ability to detect incorrect forwarding state for extremely low overhead during large-scale convergence events.
