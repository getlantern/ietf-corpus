document: rfc-7813
kind: normative-requirement
summary: If a PCE is not part of the IS-IS domain, then the PCE MUST be associated with a PCA that is part of the IS-IS domain, and the PCE or its PCA MUST establish IS-IS adjacency to receive all LSPs.
section: "4"
rfc2119_level: MUST
topics:
    - routing
