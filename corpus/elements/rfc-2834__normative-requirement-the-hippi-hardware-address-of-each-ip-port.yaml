document: rfc-2834
kind: normative-requirement
summary: The HIPPI hardware address of each IP port MUST contain the port's Switch Address. The address SHOULD also contain a non-zero ULA; if there is no ULA then that field MUST be zero.
section: "4.2"
rfc2119_level: MUST
topics:
