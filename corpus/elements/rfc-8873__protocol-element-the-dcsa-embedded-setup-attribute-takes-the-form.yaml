document: rfc-8873
kind: protocol-element
summary: The DCSA-embedded 'setup' attribute takes the form 'a=dcsa:x setup:<role>' where x is the data channel's SCTP stream identifier, explicitly binding the active/passive role negotiation to a specific MSRP session over a specific data channel. It has no relationship with DTLS connection establishment roles.
section: "4.5"
