document: rfc-8591
kind: protocol-element
summary: UAs advertise S/MIME support by indicating capability to receive application/pkcs7-mime in SIP Accept headers or MSRP SDP accept-types. A UA can advertise all smime-types with no parameters, or specific smime-types with appropriate parameters.
