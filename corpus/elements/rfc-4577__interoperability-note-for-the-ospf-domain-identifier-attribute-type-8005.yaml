document: rfc-4577
kind: interoperability-note
summary: For the OSPF Domain Identifier attribute, type 8005 MUST be treated as equivalent to type 0005 for backward compatibility. For OSPF Route Type, type 8000 SHOULD be accepted and treated as type 0306. For OSPF Router ID, type 8001 SHOULD be accepted and treated as type 0107.
