document: rfc-9224
kind: protocol-element
summary: 'Authoritative RDAP servers for IP addresses are found via longest prefix match: addresses are converted to binary and the binary strings are compared up to the prefix length, exactly as in packet forwarding. This allows hierarchical delegation where a covering prefix and more-specific prefixes point to different RDAP servers.'
