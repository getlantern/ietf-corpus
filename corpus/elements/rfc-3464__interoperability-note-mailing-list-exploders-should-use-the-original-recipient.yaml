document: rfc-3464
kind: interoperability-note
summary: Mailing list exploders should use the Original-Recipient field (if available) to match subscriber addresses in DSNs, because Final-Recipient may have been rewritten by forwarding or aliasing. A subscriber should not be removed from a list based on any single failure DSN; persistent failure over time is the recommended criterion.
section: Appendix C
topics:
