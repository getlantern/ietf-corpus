document: rfc-4712
kind: security-consideration
summary: Anonymous TLS establishes server authentication and confidentiality/replay protection but offers no protection against man-in-the-middle attacks during session establishment or spoofing by unauthorized clients; mutual certificate-based authentication is required when such threats are present.
section: 2.2.1.6
topics:
    - tls
    - security
    - realtime
