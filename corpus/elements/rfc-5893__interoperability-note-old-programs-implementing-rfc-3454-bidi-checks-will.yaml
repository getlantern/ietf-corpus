document: rfc-5893
kind: interoperability-note
summary: Old programs implementing RFC 3454 Bidi checks will refuse some newly allowed labels (those ending in NSM) or fall back to displaying them in A-label form. Programs that examine the last character to determine directionality may display newly allowed labels incorrectly.
section: "7.1"
