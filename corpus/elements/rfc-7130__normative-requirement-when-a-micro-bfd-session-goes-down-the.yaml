document: rfc-7130
kind: normative-requirement
summary: When a micro-BFD session goes down, the corresponding member link MUST be taken out of the LAG load-balancing table(s). Implementations with separate IPv4 and IPv6 tables MAY remove the link only from the table matching the failing session's address family.
section: "5"
rfc2119_level: MUST
topics:
    - ip
