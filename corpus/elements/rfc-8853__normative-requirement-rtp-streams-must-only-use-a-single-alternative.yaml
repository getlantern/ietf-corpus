document: rfc-8853
kind: normative-requirement
summary: RTP streams MUST only use a single alternative rid-id at a time (based on RTP timestamps) but MAY change format (and rid-id) on a per-RTP packet basis, corresponding to the existing SDP offer/answer behavior for multiple formats on an 'm=' line.
section: "5.5"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
