document: rfc-7389
kind: protocol-element
summary: The LMA User-Plane Address (LMA-UPA) is a new per-session IP address on the LMA used exclusively for sending and receiving user-plane traffic from the MAG, distinct from the LMA Control-Plane Address (LMA-CPA) used for PMIPv6 signaling.
