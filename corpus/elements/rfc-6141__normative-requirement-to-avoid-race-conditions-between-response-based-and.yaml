document: rfc-6141
kind: normative-requirement
summary: To avoid race conditions between response-based and request-based target refreshes, if the protocol permits a UA to use a target-refresh request at the point it wishes to refresh its local target, the UA MUST use a target-refresh request rather than a response for the refresh.
section: "4.8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
