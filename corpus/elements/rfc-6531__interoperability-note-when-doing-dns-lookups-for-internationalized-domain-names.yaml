document: rfc-6531
kind: interoperability-note
summary: When doing DNS lookups for internationalized domain names, the SMTPUTF8-aware client or server MUST either use a Unicode-aware DNS library or transform the domain to A-label form. U-label form is SHOULD-level preferred in trace fields when SMTPUTF8 is active.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
