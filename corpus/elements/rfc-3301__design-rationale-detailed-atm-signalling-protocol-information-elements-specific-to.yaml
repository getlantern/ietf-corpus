document: rfc-3301
kind: design-rationale
summary: Detailed ATM signalling protocol information elements (specific to SVC establishment) are explicitly not negotiated over the L2TP tunnel; instead, flexible AVPs describe ATM connection characteristics. This avoids coupling L2TP to specific ATM signalling protocol variants.
section: "2.2"
