document: rfc-8984
kind: interoperability-note
summary: For iCalendar compatibility, implementations MUST be able to receive and persist uid values of at least 255 octets. The prodId property SHOULD NOT be used to alter interpretation of a JSCalendar object beyond defined semantics, as this practice causes long-term interoperability problems.
section: 4.1.2
topics:
    - json
