document: rfc-6913
kind: normative-requirement
summary: A calling UA SHOULD NOT require the 'sip.fax' media type (as opposed to expressing a preference), as doing so could result in call failure if no fax-capable UAs are registered or if SIP network elements do not support RFC 3840/3841 processing.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - voip
