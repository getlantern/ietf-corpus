document: rfc-7572
kind: normative-requirement
summary: The XMPP-to-SIP gateway MUST map the bare JID (localpart@domainpart) of the XMPP sender to the SIP From header and include the resourcepart of the full JID as the GRUU portion of the SIP URI.
section: "4"
rfc2119_level: MUST
topics:
