document: rfc-7263
kind: protocol-element
summary: A new state-keeping flag IGNORE-STATE-KEEPING (0x08) is defined in the ForwardingOption structure. When set, any intermediate peer (non-destination) SHOULD forward the message with the full Via List and SHOULD NOT maintain any internal state, since DRR responses will not follow the reverse path.
section: 5.2.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
