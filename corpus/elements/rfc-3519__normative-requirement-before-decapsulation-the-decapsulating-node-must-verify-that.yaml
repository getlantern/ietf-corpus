document: rfc-3519
kind: normative-requirement
summary: Before decapsulation, the decapsulating node MUST verify that the outer IP addresses and UDP port numbers exactly match the values used for the tunnel, except for 'half bound' tunnels (Section 4.11) where the source UDP port may differ.
section: "4.3"
rfc2119_level: MUST
