document: rfc-8693
kind: normative-requirement
summary: The value of the 'resource' parameter MUST be an absolute URI per RFC 3986 Section 4.3, MAY include a query component, and MUST NOT include a fragment component. Multiple 'resource' parameters may be used to indicate multiple target resources.
section: "2.1"
rfc2119_level: MUST
topics:
