document: rfc-4556
kind: security-consideration
summary: The client MUST verify that the KDC certificate's issuing CA is authorized to issue KDC certificates for the target realm; failure to do so means the binding between the KDC certificate and the target realm's KDC is not established, enabling impersonation.
section: "4"
topics:
    - security
    - pkix
