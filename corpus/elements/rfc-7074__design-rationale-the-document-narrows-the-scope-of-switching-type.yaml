document: rfc-7074
kind: design-rationale
summary: The document narrows the scope of Switching Type values to serve solely as identifiers for per-technology SCSI field formats, rather than as indicators of hierarchy levels within a switching technology. This resolves inconsistency introduced by ad hoc additions like EVPL and 802_1 PBB-TE.
section: "1"
topics:
