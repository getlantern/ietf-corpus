document: rfc-5560
kind: protocol-element
summary: Type-P-one-way-packet-arrival-count is a singleton metric whose value is a positive integer indicating the number of uncorrupted and identical copies received by dst in the interval [T, T+T0] for a packet sent by src at time T. If the packet is lost or does not arrive in the interval, the metric is undefined.
section: "2"
