document: rfc-9335
kind: protocol-element
summary: Implementations may create an intermediate representation for AEAD ciphers by swapping the extension header and CSRC identifiers to make the AAD and plaintext contiguous in memory; this intermediate form is only for internal use and MUST NOT be sent on the wire.
section: "6.2"
topics:
