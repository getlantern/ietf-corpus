document: rfc-7904
kind: security-consideration
summary: AOR hijacking is possible if the overlay liberally accepts registrations for unrelated domain names. Mitigation includes restricting admissible namespaces in the overlay, additional enrollment service verification, and callers querying DNS or alternate overlays to detect bogus registrations.
section: 8.2.3
topics:
    - sip
    - realtime
    - security
