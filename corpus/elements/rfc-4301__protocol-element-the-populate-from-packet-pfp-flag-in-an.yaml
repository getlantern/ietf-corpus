document: rfc-4301
kind: protocol-element
summary: 'The ''populate from packet'' (PFP) flag in an SPD-S entry controls SA selector granularity: if set for selector X, the new SA takes its value for X from the triggering packet; otherwise it takes the (potentially broader) range from the SPD entry. This allows fine- or coarse-grained SA creation from the same policy entry.'
section: 4.4.1
topics:
    - ipsec
    - security
