document: rfc-1471
kind: design-rationale
summary: 'Object selection for this MIB applied four explicit criteria: require objects essential for fault or configuration management (excluding debug-only objects), consider evidence of current use, limit total object count, and exclude objects derivable from other MIBs. This reflects IAB directives toward minimal MIBs.'
