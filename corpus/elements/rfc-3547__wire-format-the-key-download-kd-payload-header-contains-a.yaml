document: rfc-3547
kind: wire-format
summary: The Key Download (KD) Payload header contains a 2-octet Number of Key Packets field, followed by Key Packets each with a 1-octet KD Type (TEK=1, KEK=2, LKH=3), 1-octet RESERVED, 2-octet KD Length, 1-octet SPI Size, variable SPI, and variable Key Packet Attributes.
