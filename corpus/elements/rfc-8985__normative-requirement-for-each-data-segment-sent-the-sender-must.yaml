document: rfc-8985
kind: normative-requirement
summary: For each data segment sent, the sender MUST store its most recent transmission time with a timestamp whose granularity is finer than 1/4 of the connection's minimum RTT. Microsecond resolution is suitable for intra-datacenter traffic; millisecond or finer for the Internet.
section: "4"
rfc2119_level: MUST
topics:
    - tcp
