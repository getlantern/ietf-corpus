document: rfc-6275
kind: protocol-element
summary: 'The Mobility Header is a new IPv6 extension header (Next Header value 135) used for all Mobile IPv6 signaling. It carries eight message types: Binding Refresh Request, Home Test Init, Care-of Test Init, Home Test, Care-of Test, Binding Update, Binding Acknowledgement, and Binding Error.'
