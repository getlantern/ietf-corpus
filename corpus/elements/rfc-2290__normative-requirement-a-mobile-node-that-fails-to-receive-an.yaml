document: rfc-2290
kind: normative-requirement
summary: A mobile node that fails to receive an Agent Advertisement within the Lifetime advertised by its current foreign agent MUST assume that it has lost contact with that foreign agent and SHOULD immediately register with any newly advertising foreign agent.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
