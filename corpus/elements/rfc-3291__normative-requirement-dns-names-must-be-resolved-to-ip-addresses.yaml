document: rfc-3291
kind: normative-requirement
summary: DNS names MUST be resolved to IP addresses when communication with the named host is required. The DESCRIPTION clause of objects that may have DNS name values SHOULD precisely define how and when name-to-address resolution (and reverse lookup) is performed.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
