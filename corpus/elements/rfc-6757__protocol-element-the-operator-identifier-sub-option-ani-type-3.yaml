document: rfc-6757
kind: protocol-element
summary: The Operator-Identifier sub-option (ANI Type=3) carries the identity of the access network operator via an 8-bit Op-ID Type field followed by up to 253 octets of Operator-Identifier. Op-ID Type 1 encodes a variable-length Private Enterprise Number (PEN); Op-ID Type 2 encodes a DNS realm name in US-ASCII.
section: 3.1.3
topics:
