document: rfc-6729
kind: security-consideration
summary: Use of state trace information can reveal hints about local policy that was in effect at the time of message handling, potentially exposing administrative or filtering policies to external observers. Further discussion is referenced in Section 7.6 of RFC 5321.
section: "7"
topics:
    - email
    - security
    - privacy
