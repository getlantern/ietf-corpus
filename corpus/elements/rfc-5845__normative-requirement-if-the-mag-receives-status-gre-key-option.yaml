document: rfc-5845
kind: normative-requirement
summary: If the MAG receives status GRE_KEY_OPTION_NOT_REQUIRED in a successful PBA, the MAG MUST consider GRE encapsulation and GRE keys not required for the session and MUST NOT include the GRE Key option in any subsequent PBU for that mobility session.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
