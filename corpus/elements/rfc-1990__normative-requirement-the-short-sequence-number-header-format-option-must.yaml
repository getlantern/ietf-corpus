document: rfc-1990
kind: normative-requirement
summary: The Short Sequence Number Header Format option MUST be negotiated when the bundle is instantiated if 12-bit sequence numbers are desired, and MUST be explicitly included in every LCP Configure-Request when a system intends to add a link to a bundle already using 12-bit sequence numbers.
section: 5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
