document: rfc-9747
kind: wire-format
summary: 'The Unaffiliated BFD Echo packet reuses the BFD Control packet format from RFC 5880. Key field values: My Discriminator set to provisioned local discriminator; Your Discriminator initially 0 then mirrored from loopback; Desired Min TX Interval and Required Min RX Interval set to a specific value (suggested 1,000,000 microseconds); Required Min Echo RX Interval set to a specific value (suggested 0); Detect Mult set to provisioned detection multiplier.'
