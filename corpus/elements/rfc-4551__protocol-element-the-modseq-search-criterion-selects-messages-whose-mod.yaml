kind: protocol-element
summary: The MODSEQ search criterion selects messages whose mod-sequence is equal to or greater than the specified value. An optional entry-name (e.g., `"/flags/\\draft"`) and entry-type-req (`priv`, `shared`, or `all`) may be specified to narrow the search to a particular metadata item type.
