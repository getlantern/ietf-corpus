document: rfc-8703
kind: normative-requirement
summary: To use this extension, both DLEP peers MUST announce support by including value 3 ('Link Identifiers') in the Extension Data Item during session initialization. If a modem requires the extension but the router does not advertise support, the modem MUST NOT include a Link Identifier Data Item in any DLEP Message.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
