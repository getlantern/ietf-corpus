document: rfc-9826
kind: interoperability-note
summary: TLS 1.2 (RFC 5246) remains in common use for PCEP and can still be enabled via the 'tls12' YANG feature even though it is marked with status 'deprecated' in RFC 9645. RFC 9645 recommends TLS 1.3 only; early data (0-RTT) is disallowed when using TLS 1.3 with PCEP.
section: "7.1"
topics:
    - tls
    - routing
    - security
