document: rfc-3886
kind: design-rationale
summary: The distinction between 'expanded' and 'delivered' action values exists because some deliveries cause list expansion without the MTA's knowledge (e.g., delivery to a program that causes expansion). If the MTA cannot ensure list expansion will occur, it should use 'delivered'.
section: 3.3.3
topics:
    - email
