document: rfc-5444
kind: wire-format
summary: The packet header (<pkt-header>) consists of a 4-bit <version> field (value 0 for this spec), a 4-bit <pkt-flags> field, an optional 16-bit <pkt-seq-num> (present when phasseqnum flag is set), and an optional <tlv-block> (present when phastlv flag is set). Network byte order is used throughout.
section: "5.1"
topics:
    - routing
