document: rfc-2855
kind: security-consideration
summary: DHCP provides no authentication or security mechanisms. A malicious 1394 client can falsify its EUI-64 identifier and masquerade as another client, since EUI-64 values in the 'client identifier' option are self-reported and unverified.
