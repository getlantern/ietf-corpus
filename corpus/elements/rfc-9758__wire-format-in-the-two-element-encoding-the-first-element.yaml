document: rfc-9758
kind: wire-format
summary: In the two-element encoding, the first element is a packed 64-bit FQNN where the most-significant 32 bits are the Allocator Identifier and the least-significant 32 bits are the Node Number; the second element is the Service Number. This encoding is backwards compatible with RFC 9171.
section: 6.1.1
topics:
    - cbor
