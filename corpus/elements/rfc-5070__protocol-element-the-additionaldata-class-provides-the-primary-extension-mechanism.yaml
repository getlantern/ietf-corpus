document: rfc-5070
kind: protocol-element
summary: The AdditionalData class provides the primary extension mechanism for information not represented elsewhere. It supports typed atomic values (integer, string, byte, packet, XML, CSV, Windows registry, etc.) via the 'dtype' attribute and can encapsulate entire XML documents conforming to other schemas such as IDMEF.
