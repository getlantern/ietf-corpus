document: rfc-7230
kind: protocol-element
summary: The https URI scheme is identical to http except the default TCP port is 443 and the user agent MUST ensure end-to-end strong encryption via TLS before sending the first request. http and https resources sharing the same authority are distinct namespaces.
section: 2.7.2
topics:
