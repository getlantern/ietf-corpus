document: rfc-8500
kind: interoperability-note
summary: The Reverse Metric TLV is applicable to Multi-topology IS-IS (M-ISIS, RFC 5120). On point-to-point links, a received Metric value must be added to the Default Metric for all topologies in all Extended IS Reachability TLVs, ensuring consistent metric adjustment across all MT instances.
section: "3.2"
topics:
    - routing
