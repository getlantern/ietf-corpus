document: rfc-5848
kind: interoperability-note
summary: Multiple signers MAY coexist on a single host, each with its own keys and Signature Groups. Each signer must use a unique combination of APP-NAME and PROCID. The triple (HOSTNAME, APP-NAME, PROCID) uniquely identifies originators of syslog-sign messages across the network, provided signers use unique HOSTNAMEs.
section: "1"
topics:
    - syslog
