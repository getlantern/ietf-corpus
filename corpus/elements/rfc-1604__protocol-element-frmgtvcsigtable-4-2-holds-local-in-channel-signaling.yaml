kind: protocol-element
summary: frMgtVCSigTable (4.2) holds Local In-Channel Signaling parameters and error counters per logical port. User-side parameters include N391 (full-status polling cycle, default 6), N392 (error threshold, default 3), N393 (monitored events, default 4), and T391 (link integrity timer, range 5–30 s, default 10). Network-side parameters mirror these plus LMI-specific nN4 (fixed at 5) and nT3 (default 20 s).
