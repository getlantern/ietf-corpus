document: rfc-2751
kind: design-rationale
summary: The 'Force error on heterogeneous merge' strategy assumes heterogeneous merges are rare and too complicated to handle, so they are prohibited. However, it is susceptible to denial of service when a single receiver with incompatible QoS can block all others.
section: 5.1.3
topics:
    - qos
