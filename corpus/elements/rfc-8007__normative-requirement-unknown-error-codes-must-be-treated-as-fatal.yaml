document: rfc-8007
kind: normative-requirement
summary: Unknown Error Codes MUST be treated as fatal errors, and the request MUST NOT be automatically retried without modification. All Error Codes MUST be registered in the IANA 'CDNI CI/T Error Codes' registry.
section: 5.2.7
rfc2119_level: MUST
