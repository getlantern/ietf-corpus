document: rfc-8279
kind: normative-requirement
summary: When a BFER also forwards copies of the packet within the BIER domain, the bit representing the BFER's own BFR-id MUST be clear in all forwarded copies. This prevents duplicate delivery.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
