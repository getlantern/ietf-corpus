document: rfc-7606
kind: normative-requirement
summary: If the Length of Next Hop Network Address field of MP_REACH_NLRI is inconsistent with what is expected for the given AFI/SAFI (and any extensions in use), the attribute is malformed and the session reset or AFI/SAFI disable approach MUST be used, because the NLRI cannot be reliably located.
section: "7.11"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
