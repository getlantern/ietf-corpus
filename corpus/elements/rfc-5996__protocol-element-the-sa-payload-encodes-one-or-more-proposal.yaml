document: rfc-5996
kind: protocol-element
summary: The SA payload encodes one or more Proposal substructures, each identifying a protocol (IKE=1, AH=2, ESP=3), an SPI, and one or more Transform substructures specifying algorithm types and IDs. The initiator may list multiple proposals in mix-and-match fashion; the responder selects exactly one complete proposal.
section: "3.3"
