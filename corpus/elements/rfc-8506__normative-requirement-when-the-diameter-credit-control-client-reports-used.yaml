document: rfc-8506
kind: normative-requirement
summary: When the Diameter Credit-Control client reports used units and a tariff change has occurred, it MUST separately itemize units used before and after the tariff change; units that straddle the boundary and cannot be distinguished MUST be itemized in a third category.
section: 5.1.1
rfc2119_level: MUST
topics:
