document: rfc-8185
kind: security-consideration
summary: The DHC message is carried in the G-ACh, which is essentially connection-oriented, so injection or modification of control messages requires subversion of a transit node. Such subversion is generally hard in connection-oriented MPLS networks and impossible to protect against at the protocol level; management-level techniques are more appropriate.
section: "6"
topics:
    - mpls
    - security
