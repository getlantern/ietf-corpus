document: rfc-4483
kind: design-rationale
summary: The text/uri-list MIME type was considered but rejected because it lacked the ability to specify per-URI attributes such as version information or MIME type of referenced content. RFC 2017's extension to message/external-body was chosen as a more capable replacement.
section: "1"
topics:
