document: rfc-9193
kind: protocol-element
summary: The 'bct' (Base Content-Format) field provides a default value for the 'ct' field within its range, covering the Record containing it and all subsequent Records up to (but not including) the next 'bct' field or end of Pack. Resolution adds 'ct' to all Records in range that carry 'vd' but lack 'ct'.
