document: rfc-5219
kind: protocol-element
summary: An ADU frame consists of the 4-byte MPEG header (with high-order 11 bits optionally replaced by an Interleaving Sequence Number), an optional 2-byte CRC, the 'side info' structure, and the complete encoded audio data for the ADU spanning from the current frame's main_data_begin back-pointer to the next frame's back-pointer.
section: "4.1"
