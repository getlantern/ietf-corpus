document: rfc-7143
kind: interoperability-note
summary: RFC 7143 removes SPKM authentication (present in RFC 3720) entirely and deprecates SLP-based discovery (implementations SHOULD NOT rely on it). The X# prefix for new public extension keys, Y# for new digest extensions, and Z# for new authentication method extensions are all prohibited for new registrations to avoid fragmentation of the key namespace.
section: "2.3"
topics:
    - tcp
    - security
