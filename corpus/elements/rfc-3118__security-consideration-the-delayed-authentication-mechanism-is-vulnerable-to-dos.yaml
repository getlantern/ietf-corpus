document: rfc-3118
kind: security-consideration
summary: The delayed authentication mechanism is vulnerable to DoS attacks through flooding with unauthenticated DHCPDISCOVER messages (exhausting addresses or server CPU) and also through flooding with authenticated messages (requiring key computation for each). Redundancy is the best mitigation.
section: "9.1"
topics:
    - security
