document: rfc-8966
kind: protocol-element
summary: The neighbour table is indexed by (interface, address) pairs and stores Hello reception histories for both Multicast and Unicast Hellos, the txcost from the most recent IHU, expected incoming seqnos, and associated timers. Neighbourship is a relationship between interfaces, not between nodes, so two multi-interface nodes may have multiple independent neighbourship relationships.
section: 3.2.4
topics:
    - routing
