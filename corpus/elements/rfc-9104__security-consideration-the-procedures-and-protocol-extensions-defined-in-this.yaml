document: rfc-9104
kind: security-consideration
summary: The procedures and protocol extensions defined in this document do not affect the BGP security model. Any syntactic error in the new Attribute TLV would result in the BGP-LS Attribute being discarded per RFC 7752. The advertisement of EAG link attribute information presents no significant additional risk beyond existing link attribute information already supported in RFC 7752.
section: "5"
topics:
