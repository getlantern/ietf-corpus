document: rfc-3175
kind: normative-requirement
summary: When an E2E reservation is removed (via PathTear, ResvTear, timeout, or error), the aggregating and deaggregating routers MUST remove the corresponding FLOWSPEC and SENDER_TSPEC contributions from the aggregate reservation accounting.
