document: rfc-3598
kind: protocol-element
summary: The ':user' argument specifies the sub-part of the local-part to the left of the separator character (e.g., 'ken' in 'ken+sieve@example.org'). If no separator exists, ':user' specifies the entire local-part, equivalent to ':localpart'.
