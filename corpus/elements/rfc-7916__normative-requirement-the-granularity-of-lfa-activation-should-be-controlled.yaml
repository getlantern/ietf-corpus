document: rfc-7916
kind: normative-requirement
summary: The granularity of LFA activation SHOULD be controlled as alternate next hops consume memory in the forwarding plane. Supported activation granularities SHOULD include per routing context, per interface, per protocol instance/topology/area, and per prefix.
section: "6.1"
rfc2119_level: SHOULD
