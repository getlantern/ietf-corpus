document: rfc-6738
kind: normative-requirement
summary: When applications define their own SK-generation algorithm, it is strongly RECOMMENDED that nonces Ni and Nr be used in the computation, and RECOMMENDED that IDi be used. IDr SHOULD NOT be used because a mismatch between IDr asserted by the peer and IDr returned by the responder would result in different SKs being generated.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - diameter
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
