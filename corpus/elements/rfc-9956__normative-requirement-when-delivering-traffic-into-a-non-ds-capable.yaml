document: rfc-9956
kind: normative-requirement
summary: When delivering traffic into a non-DS-capable domain, network equipment SHOULD by default re-mark NQB traffic to DSCP 0 (Default) and SHOULD support the ability to change or disable this re-marking. Alternatively, a traffic protection or policing function MAY be used; if traffic protection is used, it MUST re-mark or discard offending traffic to DSCP 0.
section: 6.4.1
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
