summary: 'IANA has registered three entries in the YANG Module Names registry (RFC 7950): `ietf-service-assurance` (prefix `sain`), `ietf-service-assurance-device` (prefix `sain-device`), and `ietf-service-assurance-interface` (prefix `sain-interface`), all referencing RFC 9418. These modules are not maintained by IANA.'
