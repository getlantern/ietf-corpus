document: rfc-8689
kind: design-rationale
summary: 'REQUIRETLS uses two complementary mechanisms: an SMTP service extension (requiring end-to-end REQUIRETLS support across all relay hops) and a message header field (which can transit MTAs that do not support REQUIRETLS). This split allows both strict enforcement and best-effort delivery use cases.'
