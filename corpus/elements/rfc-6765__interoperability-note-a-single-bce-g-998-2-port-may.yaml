document: rfc-6765
kind: interoperability-note
summary: A single-BCE G.998.2 port MAY operate in bonding bypass mode (bonding scheme 'none') to interoperate with non-G.998 DSL equipment. Enabling any bonding scheme via gBondPortConfAdminScheme on a single-BCE port activates fragmentation and reassembly even on that single-BCE port.
section: 4.1.2
topics:
    - snmp
