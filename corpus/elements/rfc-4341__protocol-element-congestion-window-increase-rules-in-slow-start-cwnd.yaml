document: rfc-4341
kind: protocol-element
summary: 'Congestion window increase rules: in slow-start (cwnd < ssthresh), cwnd increases by one packet per two newly acknowledged State-0 packets, up to Ack Ratio/2 per ack; in congestion avoidance (cwnd >= ssthresh), cwnd increases by one packet per window of data acknowledged without loss or marks. cwnd is initialized to at most four packets per RFC 3390.'
section: "5"
topics:
    - congestion
    - udp
    - tcp
