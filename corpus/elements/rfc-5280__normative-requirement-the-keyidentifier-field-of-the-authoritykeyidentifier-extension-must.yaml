document: rfc-5280
kind: normative-requirement
summary: The keyIdentifier field of the authorityKeyIdentifier extension MUST be included in all certificates generated by conforming CAs, with the sole exception of self-signed certificates. This extension MUST be marked non-critical.
section: 4.2.1.1
rfc2119_level: MUST
