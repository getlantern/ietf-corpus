document: rfc-5605
kind: protocol-element
summary: The pwAtmCfgTimeoutMode object (notApplicable/disabled/enabled) determines whether a packet may be transmitted to the PSN based on timeout expiration while collecting cells for concatenation. The actual timeout handling is implementation-specific and may be changed at any time with consideration for traffic interruption.
