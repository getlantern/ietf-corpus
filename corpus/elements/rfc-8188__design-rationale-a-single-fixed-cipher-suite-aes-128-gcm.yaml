document: rfc-8188
kind: design-rationale
summary: A single fixed cipher suite (AES-128-GCM) is used rather than negotiable ciphers. Cipher agility is achieved by defining a new content-coding scheme for each algorithm, ensuring that only the HTTP Accept-Encoding header field is needed to negotiate encryption.
section: "2"
topics:
