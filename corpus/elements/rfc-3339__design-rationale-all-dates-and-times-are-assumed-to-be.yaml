document: rfc-3339
kind: design-rationale
summary: All dates and times are assumed to be in the current era (0000AD–9999AD) and all expressed times have a stated UTC offset. This deliberately avoids the complexity of scheduling applications where the local-to-UTC mapping may depend on unknowable future political decisions.
