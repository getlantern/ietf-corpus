document: rfc-5189
kind: protocol-element
summary: 'Address tuples A0–A3 define the four communication endpoints used in policy rules: A0 is the internal endpoint, A1 is the middlebox inside address, A2 is the middlebox outside address, and A3 is the external endpoint. For a firewall A2=A0 and A1=A3; for traditional NAT A2≠A0 but A1=A3; for twice-NAT both A1 and A2 are assigned by the NAT.'
section: 2.3.5
topics:
    - nat
