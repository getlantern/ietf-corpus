document: rfc-6677
kind: interoperability-note
summary: Channel bindings via the secure association protocol (rather than within the EAP method) can work even with EAP Re-authentication Protocol (ERP, RFC 5296), where previously established EAP keying material is used without executing any EAP method during re-authentication. This approach requires changes to NASes and secure association protocols but avoids the need to update EAP methods.
section: "4.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
