document: rfc-8543
kind: normative-requirement
summary: An organization object MUST NOT be deleted if it is associated with other known objects. A server MUST notify clients of existing object relationships by sending a 2305 error response code when a delete fails due to existing associations.
section: 4.2.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
