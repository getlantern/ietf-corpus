document: rfc-7182
kind: normative-requirement
summary: If a message contains one or more TIMESTAMP TLVs and one or more ICV TLVs, the TIMESTAMP TLVs (as well as any other Message TLVs) MUST be added to the message before the ICV TLVs.
section: "9.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
