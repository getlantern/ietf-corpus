document: rfc-5142
kind: state-machine
summary: Upon receiving a Home Agent Switch message, the mobile node transitions from 'using current home agent' to 'acquiring new home agent'. The trigger is receipt of a valid (IPsec-authenticated) Home Agent Switch message. The node deletes its current home binding (Binding Update) and optionally delays if a Binding Refresh Advice option is present.
section: "6.1"
topics:
    - mobility
