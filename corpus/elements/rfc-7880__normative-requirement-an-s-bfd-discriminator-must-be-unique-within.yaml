document: rfc-7880
kind: normative-requirement
summary: An S-BFD Discriminator MUST be unique within an administrative domain. Duplicate values can cause S-BFD Control packets to falsely terminate on the wrong node, resulting in spurious reflector responses.
section: "4.1"
rfc2119_level: MUST
topics:
