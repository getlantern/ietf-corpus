document: rfc-4659
kind: normative-requirement
summary: In order for two PEs to exchange labeled IPv6 VPN NLRIs, they MUST use BGP Capabilities Negotiation (capability code 1, multiprotocol BGP) with AFI=2 and SAFI=128 to confirm both sides can properly process such NLRIs.
section: "3.4"
rfc2119_level: MUST
topics:
