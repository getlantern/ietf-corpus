document: rfc-5265
kind: design-rationale
summary: 'Traffic is not encrypted when the mobile node is inside the enterprise network because: (1) IPsec consumes power and CPU on devices that handle large internal traffic volumes; (2) interactive authentication (e.g., SecurID) imposes usability friction; (3) existing home agents do not typically incorporate IPsec; and (4) users would need separate credentials for both VPN devices and home agents.'
section: 3.6.3
topics:
    - vpn
    - ipsec
    - security
    - mobility
