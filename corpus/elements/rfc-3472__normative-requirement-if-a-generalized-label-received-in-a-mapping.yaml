document: rfc-3472
kind: normative-requirement
summary: If a Generalized Label received in a MAPPING message is unacceptable, the recipient MUST generate a NOTIFICATION with a 'Routing problem/MPLS label allocation failure' indication. The NOTIFICATION MAY include an Acceptable Label Set.
section: 2.2.1
rfc2119_level: MUST
topics:
    - routing
