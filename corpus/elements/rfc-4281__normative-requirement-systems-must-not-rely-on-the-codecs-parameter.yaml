document: rfc-4281
kind: normative-requirement
summary: Systems MUST NOT rely on the Codecs parameter being complete in 'depth'; although it must report all four-character codes used in all tracks (breadth), a server implemented before hierarchical rules for a given code were written will not know what sub-elements to include.
section: "3"
rfc2119_level: MUST NOT
topics:
    - realtime
