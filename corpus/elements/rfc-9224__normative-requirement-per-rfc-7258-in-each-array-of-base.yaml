document: rfc-9224
kind: normative-requirement
summary: Per RFC 7258, in each array of base RDAP URLs, the secure versions of the transport protocol SHOULD be preferred and tried first; if both HTTPS and HTTP URLs are present, the client SHOULD try HTTPS first.
