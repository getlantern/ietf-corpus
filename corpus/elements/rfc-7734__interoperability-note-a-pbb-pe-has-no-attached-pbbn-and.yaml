document: rfc-7734
kind: interoperability-note
summary: A PBB PE has no attached PBBN and no concept of B-VID, so no frame processing for B-VID is required. However, it must interpret SPBM-encoded multicast DAs as PBB-encoded, treating only the I-SID encoded in the lower 24 bits as relevant.
section: "4.7"
topics:
    - routing
    - multicast
