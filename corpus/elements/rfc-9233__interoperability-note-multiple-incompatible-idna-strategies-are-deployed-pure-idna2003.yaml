document: rfc-9233
kind: interoperability-note
summary: 'Multiple incompatible IDNA strategies are deployed: pure IDNA2003 (tied to Unicode 3.2), various updated IDNA2003 variants, IDNA2003/2008 hybrids for post-3.2 code points, UTS#46 mixes, and pure IDNA2008. Applications implementing different profiles may not interoperate.'
