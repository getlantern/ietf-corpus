document: rfc-2470
kind: design-rationale
summary: The U/L bit in the EUI-64-derived Interface Identifier is complemented so that a globally unique (universally administered) address, which has U/L=0 in IEEE 802 convention, becomes U/L=1 in the IPv6 Interface Identifier convention for global uniqueness. This aligns Token Ring with the IPv6 addressing architecture.
section: "4"
