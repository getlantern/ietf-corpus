document: rfc-2918
kind: normative-requirement
summary: Upon receiving a valid ROUTE-REFRESH message, the BGP speaker SHALL re-advertise to that peer the Adj-RIB-Out for the <AFI, SAFI> carried in the message, based on its outbound route filtering policy.
section: "4"
rfc2119_level: MUST
