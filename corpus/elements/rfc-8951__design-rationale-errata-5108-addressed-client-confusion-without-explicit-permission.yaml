document: rfc-8951
kind: design-rationale
summary: 'Errata 5108 addressed client confusion: without explicit permission to use ''text/plain'', a client might not recognize that an error response with text/plain content-type was actually an error. The clarification allows servers to explicitly signal errors via content-type.'
