document: rfc-3108
kind: normative-requirement
summary: Media attribute lines MUST NOT contradict each other or other SDP lines; inconsistencies are not to be ignored and SHOULD be flagged as errors. Repeated media attribute lines may carry additional information but SHOULD NOT be inconsistent with each other.
section: "5.6"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
