document: rfc-1908
kind: design-rationale
summary: Object groups defined in SNMPv1 MIB modules may be referenced by the INCLUDES clause of AGENT-CAPABILITIES; all leaf objects subordinate to the referenced subtree with STATUS 'mandatory' are implicitly included. This method is acknowledged as ambiguous when different revisions of a MIB have different mandatory objects under the same subtree.
section: "2.4"
topics:
