document: rfc-2595
kind: interoperability-note
summary: Servers advertising LOGINDISABLED will fail to interoperate with many existing compliant IMAP clients and will be unable to prevent those clients from disclosing the user's password. LOGINDISABLED has no impact against active attacks as a man-in-the-middle attacker can remove this capability.
section: "3.2"
topics:
    - tls
    - security
