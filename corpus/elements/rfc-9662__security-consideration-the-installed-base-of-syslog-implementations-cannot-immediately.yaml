document: rfc-9662
kind: security-consideration
summary: The installed base of syslog implementations cannot immediately migrate from deprecated cipher suites and DTLS 1.0. This document allows TLS_RSA_WITH_AES_128_CBC_SHA as a transitional measure; administrators must evaluate whether to permit it until devices are updated to support TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256.
section: "8"
topics:
