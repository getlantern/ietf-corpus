document: rfc-6006
kind: protocol-element
summary: Bit 24 of the NO-PATH-VECTOR TLV is defined to indicate a P2MP reachability problem. When set, the PCE optionally specifies the unreachable destinations using the UNREACH-DESTINATION object.
