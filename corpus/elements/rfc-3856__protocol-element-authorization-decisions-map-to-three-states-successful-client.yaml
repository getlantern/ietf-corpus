document: rfc-3856
kind: protocol-element
summary: 'Authorization decisions map to three states: successful (client is authorized to receive some presence state), rejected (client will never receive any presence state), and pending (authorization not yet determined). Response codes 200, 403/603, and 202 correspond to these states respectively.'
