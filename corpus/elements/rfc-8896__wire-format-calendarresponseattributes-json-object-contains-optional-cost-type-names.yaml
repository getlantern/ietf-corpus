document: rfc-8896
kind: wire-format
summary: 'CalendarResponseAttributes JSON object contains: optional ''cost-type-names'' (array of JSONString, required when multiple cost types), ''calendar-start-time'' (JSONString in IMF-fixdate format), ''time-interval-size'' (JSONNumber), ''number-of-intervals'' (JSONNumber), and optional ''repeated'' (JSONNumber integer >= 1). It is conveyed in the ''calendar-response-attributes'' ''meta'' member of FCM and ECS responses.'
