document: rfc-5561
kind: normative-requirement
summary: An LDP speaker MUST NOT include the Dynamic Capability Announcement Parameter in Capability messages sent to peers. Once enabled during session initialization, the Dynamic Capability Announcement capability cannot be disabled; the S-bit is always 1 for this TLV.
section: "9"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
