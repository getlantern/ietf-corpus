document: rfc-1452
kind: normative-requirement
summary: When a proxy agent receives a GetResponse-PDU from a SNMPv1 agent, it must pass it unaltered to the SNMPv2 manager, including any SNMPv1-only error-status values (noSuchName, badValue, readOnly) which must not be changed by the proxy.
section: 3.1.2
rfc2119_level: MUST
topics:
    - snmp
