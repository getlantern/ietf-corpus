document: rfc-4252
kind: security-consideration
summary: The authentication protocol assumes it runs over a secure transport layer that has already authenticated the server, established an encrypted channel, and computed a unique session identifier. The transport layer provides forward secrecy for password authentication and other methods relying on secret data.
section: "11"
topics:
