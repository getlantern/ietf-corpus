document: rfc-2289
kind: interoperability-note
summary: Words in an alternate dictionary MUST NOT overlap the standard dictionary words and MUST NOT be comprised solely of the letters A–F (to avoid ambiguity with hexadecimal). This allows the server to distinguish encoding type without knowing which alternate dictionary was used.
section: "6"
topics:
