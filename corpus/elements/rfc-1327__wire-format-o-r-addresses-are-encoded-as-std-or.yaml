document: rfc-1327
kind: wire-format
summary: 'O/R Addresses are encoded as std-or-address: ''1*( "/" attribute "=" value ) "/"'', using ''/'' and ''='' as delimiters with ''$'' as a quoting character for literal ''/'' or ''='' in values. Attribute keys include C, ADMD, PRMD, O, OU, S, G, I, GQ, CN, DD; encodings are P (PrintableString), N (NumericString), P/T (teletex-and-or-ps), I (labelled-integer), or X (presentation-address).'
section: "4.2"
topics:
    - email
