document: rfc-3292
kind: design-rationale
summary: Label stacking is supported with no set depth limit to accommodate MPLS hierarchical labelling; a stacked label is treated as a single atomic extended label for all switch operations so that add, move, and delete apply to the full stack simultaneously.
