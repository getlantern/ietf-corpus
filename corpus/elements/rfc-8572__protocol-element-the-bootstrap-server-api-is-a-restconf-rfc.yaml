document: rfc-8572
kind: protocol-element
summary: 'The bootstrap server API is a RESTCONF (RFC 8040) server exposing exactly two RPCs: ''get-bootstrapping-data'' (returns conveyed-information, owner-certificate, and ownership-voucher leaves) and ''report-progress'' (receives device progress events). The authenticated RESTCONF username isolates execution per device.'
