document: rfc-4577
kind: normative-requirement
summary: If the OSPF domain has any area 0 routers other than PE routers, at least one of those MUST be a CE router and MUST have an area 0 link (possibly virtual) to at least one PE router, ensuring inter-area and AS-external routes can be exchanged.
section: 4.2.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
