document: rfc-8474
kind: normative-requirement
summary: The server MAY assign the same EMAILID as an existing message upon APPEND if it detects that the new message has exactly identical content. EMAILID only identifies immutable content; messages with the same EMAILID may have different keywords.
section: "5.1"
rfc2119_level: MAY
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
