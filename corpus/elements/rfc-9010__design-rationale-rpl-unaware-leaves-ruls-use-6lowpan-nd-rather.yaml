document: rfc-9010
kind: design-rationale
summary: 'RPL-Unaware Leaves (RULs) use 6LoWPAN ND rather than RPL as the host-to-router interface to limit the attack surface: a RUL cannot perform RPL insider attacks, and address ownership can be protected for all nodes including RULs. Energy or code-space constraints may also prevent RUL participation in RPL.'
section: "1"
