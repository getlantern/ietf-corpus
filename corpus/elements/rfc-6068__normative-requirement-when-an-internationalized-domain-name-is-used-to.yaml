document: rfc-6068
kind: normative-requirement
summary: When an internationalized domain name is used to compose a message, it MUST be transformed to IDNA encoding (RFC 5891). URI producers SHOULD provide domain names in IDNA encoding rather than percent-encoded to maximize interoperability with legacy 'mailto' URI interpreters.
section: "2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
