document: rfc-2959
kind: security-consideration
summary: SDES items such as CNAME exposed in rtpSenderCNAME and rtpRcvrCNAME may reveal system configuration; enterprises should restrict SNMP access to these objects based on their security policy, as they can provide an attacker with information about a system's services.
