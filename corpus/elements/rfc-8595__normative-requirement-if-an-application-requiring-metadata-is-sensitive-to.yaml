document: rfc-8595
kind: normative-requirement
summary: If an application requiring metadata is sensitive to potential loss or attack from in-band metadata distribution, it SHOULD NOT use in-band metadata distribution but SHOULD rely on control-plane or management-plane mechanisms that include confirmation of delivery.
