document: rfc-3412
kind: wire-format
summary: The SNMPv3Message is an ASN.1 SEQUENCE containing msgVersion (INTEGER 0..2147483647), msgGlobalData (HeaderData SEQUENCE), msgSecurityParameters (OCTET STRING), and msgData (ScopedPduData CHOICE). The msgVersion field is in the same position as in SNMPv1 and SNMPv2c to allow version recognition.
