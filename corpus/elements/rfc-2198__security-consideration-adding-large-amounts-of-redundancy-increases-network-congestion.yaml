document: rfc-2198
kind: security-consideration
summary: Adding large amounts of redundancy increases network congestion and therefore packet loss, worsening the very problem redundancy was meant to solve; at its worst this can constitute a denial-of-service attack. Application designers should keep redundancy bandwidth low.
section: "6"
