document: rfc-7296
kind: interoperability-note
summary: IKEv1 has no 'higher-version capable' flag, so an active attacker can force two IKEv2-capable nodes into speaking IKEv1. Implementations that negotiate down to v1 when both peers support v2 SHOULD log the downgrade event.
section: "2.5"
topics:
    - ipsec
    - vpn
