document: rfc-9530
kind: wire-format
summary: 'Want-Content-Digest and Want-Repr-Digest are Structured Fields Dictionaries where each member key is an Algorithm Key and the value is a Structured Fields Integer between 0 and 10 inclusive, encoding relative algorithm preference. Example: ''Want-Repr-Digest: sha-512=3, sha-256=10, unixsum=0''.'
