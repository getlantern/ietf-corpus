document: rfc-8006
kind: design-rationale
summary: The metadata object model decomposes CDNI Metadata into separately addressable objects connected via Link URI references rather than always embedding sub-objects. This enables a single GenericMetadata object to be fetched once and referenced by multiple hosts and URI paths, minimizing duplication.
section: "3"
topics:
