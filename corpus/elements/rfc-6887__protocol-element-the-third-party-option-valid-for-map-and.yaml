document: rfc-6887
kind: protocol-element
summary: The THIRD_PARTY option (valid for MAP and PEER) allows a PCP client to request mappings specifying a different internal IP address than its own source address, enabling proxy management of mappings for devices that do not implement PCP. The PCP server must enforce additional security measures before honoring THIRD_PARTY requests.
section: "13.1"
topics:
    - nat
    - security
