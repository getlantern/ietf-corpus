document: rfc-6688
kind: design-rationale
summary: SAN access control mechanisms (LUN mapping/masking) are quasi-static and configured once; using them to gate pNFS device access dynamically (e.g., per reboot) is undesirable and potentially problematic. A different, lightweight mechanism is therefore needed for routine client operations.
section: "1"
topics:
    - security
