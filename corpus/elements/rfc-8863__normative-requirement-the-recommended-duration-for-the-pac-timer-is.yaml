document: rfc-8863
kind: normative-requirement
summary: The RECOMMENDED duration for the PAC timer is equal to the agent's connectivity check transaction timeout including all retransmissions. With default RTO and Rc values this amounts to 39.5 seconds as defined in RFC 5389 Section 7.2.1.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - webrtc
    - realtime
