document: rfc-8484
kind: privacy-consideration
summary: DoH's use of HTTPS port 443 and the ability to mix DoH traffic with other HTTPS traffic on the same connection deters unprivileged on-path devices from interfering with DNS operations and makes DNS traffic analysis more difficult.
