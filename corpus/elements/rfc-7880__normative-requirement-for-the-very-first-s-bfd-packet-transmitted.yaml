document: rfc-7880
kind: normative-requirement
summary: For the very first S-BFD packet transmitted by an SBFDInitiator, the implementation MUST NOT expect a response S-BFD packet to arrive before a time equal to the sum of the initiator-to-responder and responder-to-initiator latencies.
section: 7.3.3
rfc2119_level: MUST
topics:
    - realtime
