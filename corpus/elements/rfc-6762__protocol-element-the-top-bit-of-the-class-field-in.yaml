document: rfc-6762
kind: protocol-element
summary: The top bit of the class field in a DNS question is defined as the 'unicast-response bit'. When set, the question is a 'QU' question indicating the querier will accept unicast replies; without this bit set it is a 'QM' question requesting multicast responses.
section: "5.4"
topics:
    - dns
    - zeroconf
