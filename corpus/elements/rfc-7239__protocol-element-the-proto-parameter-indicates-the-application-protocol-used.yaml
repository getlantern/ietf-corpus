document: rfc-7239
kind: protocol-element
summary: The "proto" parameter indicates the application protocol used for the incoming request (e.g., "http" or "https"). Its value must conform to a URI scheme name registered with IANA, enabling origin servers behind TLS-offloading reverse proxies to generate correct URLs.
section: "5.4"
