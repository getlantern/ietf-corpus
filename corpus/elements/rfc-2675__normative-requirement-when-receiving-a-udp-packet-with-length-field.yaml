document: rfc-2675
kind: normative-requirement
summary: When receiving a UDP packet with Length field of zero but no Jumbo Payload option present, the receiver must use the IPv6 Payload Length field in place of the Jumbo Payload Length field to calculate the actual UDP length.
section: "4"
rfc2119_level: MUST
topics:
    - udp
    - ip
