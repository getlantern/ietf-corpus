document: rfc-7380
kind: protocol-element
summary: PAT_error_count is a 16-bit unsigned count of PAT errors in the reported sequence interval. A PAT error occurs when PID 0x0000 does not appear at least every 0.5 seconds, does not contain table_id 0x00, or has a non-zero Scrambling_control_field. Value 0xFFFF indicates measurement unavailable.
section: "3"
topics:
