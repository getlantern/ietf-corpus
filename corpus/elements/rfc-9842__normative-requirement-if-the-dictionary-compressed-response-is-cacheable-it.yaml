document: rfc-9842
kind: normative-requirement
summary: 'If the dictionary-compressed response is cacheable, it MUST include a ''Vary'' header (e.g., ''Vary: accept-encoding, available-dictionary'') to prevent caches from serving dictionary-compressed resources to clients that do not support them or that have different dictionaries.'
section: "6.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
