document: rfc-4396
kind: interoperability-note
summary: This payload format is designed to interoperate with RFC 3640 (RTP Payload Format for Transport of MPEG-4 Elementary Streams). The unit structure (common header + TYPE-specific header + payload) maps directly to RFC 3640 Access Units, enabling shared transport infrastructure for MPEG-4 and 3GPP timed text.
