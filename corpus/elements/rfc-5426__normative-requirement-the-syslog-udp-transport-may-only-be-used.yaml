document: rfc-5426
kind: normative-requirement
summary: The syslog UDP transport MAY only be used as an alternative to TLS transport in managed networks where the network path has been explicitly provisioned for UDP syslog traffic via traffic engineering mechanisms such as rate limiting or capacity reservations. In all other environments, the TLS transport SHOULD be used.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - syslog
    - udp
    - tls
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
