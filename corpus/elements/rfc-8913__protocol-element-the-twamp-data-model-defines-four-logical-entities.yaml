summary: 'The TWAMP data model defines four logical entities: Control-Client, Server, Session-Sender, and Session-Reflector. These map to the TWAMP logical model in RFC 5357, with TWAMP-Control between Control-Client and Server and TWAMP-Test between Session-Sender and Session-Reflector.'
