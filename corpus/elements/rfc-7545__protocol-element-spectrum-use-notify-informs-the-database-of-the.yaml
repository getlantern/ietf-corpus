document: rfc-7545
kind: protocol-element
summary: SPECTRUM_USE_NOTIFY informs the Database of the spectrum the device intends to use (not a permission request). Required fields are deviceDesc and spectra (list of Spectrum elements with resolutionBwHz and power profiles). When made on behalf of a Slave Device, masterDeviceLocation is REQUIRED. The Database MUST acknowledge with SPECTRUM_USE_RESP.
section: 4.5.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
