document: rfc-8852
kind: normative-requirement
summary: The RTP header extension's size needs to be taken into account when encoding media to avoid MTU issues, and the set of header extensions must be padded to the next 32-bit boundary per RFC 8285.
section: "3.3"
rfc2119_level: MUST
topics:
