document: rfc-4871
kind: wire-format
summary: 'The DNS key record at selector._domainkey.domain uses a tag=value format. Key tags include v= (''DKIM1'', must be first), p= (base64 public key; empty means revoked), k= (key type, default ''rsa''), h= (acceptable hash algorithms), g= (Local-part granularity with wildcard), s= (service type), and t= (flags: ''y'' for testing mode, ''s'' for strict domain match).'
section: 3.6.1
topics:
    - email
    - dns
    - crypto
