document: rfc-6555
kind: design-rationale
summary: Single shared hostnames for IPv4 and IPv6 are required (rather than separate namespaces like 'ipv6.example.com') to avoid namespace fragmentation that would reduce the ability for users to share hostnames and complicate printed material.
