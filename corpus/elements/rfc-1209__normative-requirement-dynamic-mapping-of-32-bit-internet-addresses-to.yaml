document: rfc-1209
kind: normative-requirement
summary: Dynamic mapping of 32-bit Internet addresses to SMDS addresses SHALL be performed via ARP. Each host MUST know its own Internet address and SMDS address and MUST use ARP to map Internet addresses to SMDS addresses when needed.
section: Address Resolution
rfc2119_level: MUST
topics:
    - ip
    - dns
