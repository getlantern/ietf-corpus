document: rfc-7780
kind: errata
summary: RFC 6325 Section 4.5.1 incorrectly describes least-cost paths as 'from N to R'; the correct text is 'from R to N' (Err3508). All RBridges must use cost directed away from the tree root for consistent tree construction.
section: "3.5"
topics:
    - routing
