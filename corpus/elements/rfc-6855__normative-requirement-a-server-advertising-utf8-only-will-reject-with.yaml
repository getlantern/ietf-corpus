document: rfc-6855
kind: normative-requirement
summary: A server advertising "UTF8=ONLY" will reject with a "NO [CANNOT]" response any command that might require UTF-8 support and is not preceded by an "ENABLE UTF8=ACCEPT" command. Clients MUST use "ENABLE UTF8=ACCEPT" before using such a server.
section: "6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
