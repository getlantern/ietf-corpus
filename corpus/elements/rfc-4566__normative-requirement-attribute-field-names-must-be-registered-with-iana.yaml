document: rfc-4566
kind: normative-requirement
summary: Attribute field names MUST be registered with IANA because conflicting attributes under the same name are a serious protocol fragmentation problem. New registrations require a specification meeting the "Specification Required" policy.
section: "5.13"
rfc2119_level: MUST
topics:
