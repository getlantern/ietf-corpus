document: rfc-2821
kind: normative-requirement
summary: SMTP commands and message data are transmitted in lines terminated by <CRLF> (CR hex 0D followed immediately by LF hex 0A). Implementations MUST NOT recognize or generate any other character sequence as a line terminator. Clients MUST NOT transmit bare CR or LF except as part of <CRLF>.
section: 2.3.7
rfc2119_level: MUST NOT
topics:
    - email
