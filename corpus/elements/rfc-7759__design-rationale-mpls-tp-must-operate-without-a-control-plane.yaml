document: rfc-7759
kind: design-rationale
summary: MPLS-TP must operate without a control plane (per RFC 5654), so OAM configuration must be achievable via NMS, LSP Ping, or signaling protocol extensions. This document specifies the LSP Ping path as a complement to RSVP-TE (RFC 7487) and NMS-based approaches, enabling transport-profile deployments without requiring a control plane.
