document: rfc-9479
kind: security-consideration
summary: Tampering with ASLA advertisements can affect all applications using them, including TE as discussed in RFC 8570. Because ASLA advertisements scope impact to specific applications, the blast radius of tampering is limited compared to unscoped legacy advertisements. Deployments with potential attackers SHOULD use the stronger authentication mechanisms defined in RFC 5304 and RFC 5310.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
