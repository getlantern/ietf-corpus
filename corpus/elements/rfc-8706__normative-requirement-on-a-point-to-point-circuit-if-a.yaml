document: rfc-8706
kind: normative-requirement
summary: On a Point-to-Point circuit, if a non-restart-capable neighbor is detected (IIH without Restart TLV received) and the three-way adjacency state is UP with matching Extended Local Circuit ID, the restarting router MUST force adjacency reinitialization by setting local Adjacency Three-Way State to DOWN and sending a normal IIH to guarantee SRMflag setting.
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
