document: rfc-2842
kind: protocol-element
summary: The Capabilities Optional Parameter (Parameter Type 2) is used by a BGP speaker to convey to its BGP peer the list of capabilities supported by the speaker. It contains one or more triples of <Capability Code, Capability Length, Capability Value>.
