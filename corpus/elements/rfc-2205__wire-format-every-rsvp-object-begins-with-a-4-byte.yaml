document: rfc-2205
kind: wire-format
summary: 'Every RSVP object begins with a 4-byte header: Length (16 bits, total object length in bytes, must be a multiple of 4 and at least 4), Class-Num (8 bits, identifies object class), C-Type (8 bits, unique within Class-Num). Maximum object content is 65528 bytes.'
