document: rfc-2851
kind: normative-requirement
summary: The IMPLIED keyword MUST NOT be used for an object of type InetAddress in an INDEX clause. Instance sub-identifiers take the form T.N.O1.O2...On, where T is the InetAddressType value, N is the octet count, and O1...On are the address octets.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - snmp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
