document: rfc-6407
kind: normative-requirement
summary: The KEK_ALGORITHM and SIG_ALGORITHM attributes MUST be included in every SA KEK payload; all others are OPTIONAL. The KEK_MANAGEMENT_ALGORITHM attribute MUST NOT be included in a GROUPKEY-PULL message and MUST be ignored if present.
section: "5.3"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
