document: rfc-1364
kind: protocol-element
summary: OSPF cost and BGP INTER-AS METRIC are mapped during route redistribution. OSPF cost is a two-level metric while BGP INTER-AS METRIC is an optional non-transitive attribute; the default mapping sets INTER-AS METRIC=1.
