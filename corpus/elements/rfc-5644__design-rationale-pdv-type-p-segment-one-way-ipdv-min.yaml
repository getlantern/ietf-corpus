document: rfc-5644
kind: design-rationale
summary: PDV (Type-P-Segment-One-way-ipdv-min-Stream) is less sensitive to inter-packet interval variations than IPDV metrics because it reflects a wide range of spacings in any single distribution, making segment PDV results comparable to source-is-Ha measurements.
