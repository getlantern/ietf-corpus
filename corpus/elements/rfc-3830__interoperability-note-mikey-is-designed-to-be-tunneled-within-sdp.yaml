document: rfc-3830
kind: interoperability-note
summary: MIKEY is designed to be tunneled within SDP, SIP, and RTSP session establishment. MIKEY itself does not carry destination network addresses or ports; implementations SHOULD support Data SA lookup using destination address and port (obtained from SIP or RTSP) together with SSRC.
section: "4.4"
topics:
    - realtime
    - sip
    - crypto
