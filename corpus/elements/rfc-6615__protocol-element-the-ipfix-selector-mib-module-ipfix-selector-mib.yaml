summary: The IPFIX SELECTOR MIB module (IPFIX-SELECTOR-MIB) defines standardized filtering and sampling functions under the ipfixSelectorFunctions subtree (OID 1.3.6.1.2.1.194.1.1). Each function subtree SHOULD contain an availability flag (TruthValue) and, if parameterized, a parameter table.
