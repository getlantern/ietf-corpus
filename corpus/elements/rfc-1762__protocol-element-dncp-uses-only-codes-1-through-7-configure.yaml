document: rfc-1762
kind: protocol-element
summary: 'DNCP uses only Codes 1 through 7: Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, and Code-Reject. Other Codes are treated as unrecognized and result in Code-Rejects.'
