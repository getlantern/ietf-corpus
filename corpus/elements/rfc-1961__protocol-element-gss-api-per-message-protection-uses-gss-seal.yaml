document: rfc-1961
kind: protocol-element
summary: GSS-API per-message protection uses gss_seal()/gss_wrap() for encapsulation and gss_unseal()/gss_unwrap() for de-encapsulation. The protection level subnegotiation token encapsulates a single octet with conf_req set to FALSE.
section: "4.4"
