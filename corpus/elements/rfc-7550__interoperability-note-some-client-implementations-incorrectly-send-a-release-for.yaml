document: rfc-7550
kind: interoperability-note
summary: Some client implementations incorrectly send a Release for all bindings after sending a Decline for a conflicting address. This document clarifies that a Decline event for one IA MUST NOT trigger Release of unrelated IAs that remain valid.
section: "4.6"
topics:
    - ip
    - v6ops
