document: rfc-7634
kind: protocol-element
summary: AEAD_CHACHA20_POLY1305 is used for ESP and IKEv2 with a 256-bit encryption key, a 96-bit nonce formed by prepending a 32-bit Salt to a 64-bit IV, and an initial block counter of 1. The 128-bit Poly1305 tag is used as the Integrity Check Value.
section: "2"
