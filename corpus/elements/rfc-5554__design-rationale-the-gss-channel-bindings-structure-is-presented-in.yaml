summary: The GSS-CHANNEL-BINDINGS structure is presented in pseudo-ASN.1 but no standard encoding is mandated because this structure is part of an abstract API, not a protocol defining bits on the wire; each GSS-API mechanism encodes the contents in a mechanism-specific way.
