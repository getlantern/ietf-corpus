document: rfc-2478
kind: protocol-element
summary: GSS_Set_neg_mechs() is an additional API that allows callers to restrict the set of security mechanisms available for negotiation on a given credential handle. The ordering of mechanisms in mech_set implies a relative preference for the target.
section: A.1
