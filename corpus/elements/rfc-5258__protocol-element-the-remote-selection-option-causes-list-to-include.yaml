document: rfc-5258
kind: protocol-element
summary: The REMOTE selection option causes LIST to include remote mailboxes as well as local ones, replacing the RLIST command and, combined with SUBSCRIBED, the RLSUB command. It has no corresponding return option because it expands rather than restricts the set of returned mailboxes.
section: "3.1"
topics:
    - email
