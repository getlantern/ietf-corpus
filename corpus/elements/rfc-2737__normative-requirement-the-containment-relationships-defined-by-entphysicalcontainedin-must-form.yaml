document: rfc-2737
kind: normative-requirement
summary: The containment relationships defined by entPhysicalContainedIn must form a strict hierarchy; recursion is not allowed. For double-wide modules contained by more than one physical entity, the object should identify the containing entity with the lowest entPhysicalIndex value.
section: "3"
rfc2119_level: MUST
