document: rfc-9301
kind: normative-requirement
summary: In the inner UDP header of an ECM, port number 4341 MUST NOT be assigned to either the source or destination port. Both inner and outer UDP checksums MUST be non-zero.
section: "5.8"
rfc2119_level: MUST NOT
