document: rfc-4043
kind: protocol-element
summary: When assigner is present and identifierValue is absent, the serialNumber from the deepest relevant RDN is used as identifierValue and the identifier is globally unique. Two such identifiers match if their assigner fields match and the serialNumber attributes match using caseIgnoreMatch.
