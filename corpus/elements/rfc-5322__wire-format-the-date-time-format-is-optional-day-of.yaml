summary: 'The date-time format is: optional day-of-week followed by comma, then 1–2 digit day, 3-letter month name, 4-digit year, 2-digit hour, colon, 2-digit minute, optional colon and 2-digit second, and a numeric zone offset of the form (+/-)hhmm.'
