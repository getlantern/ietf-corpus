document: rfc-3565
kind: normative-requirement
summary: For PasswordRecipientInfo, the RecipientInfo PasswordRecipientInfo CHOICE MUST be used when a password-derived KEK wraps the AES CEK. The keyEncryptionAlgorithm algorithm field MUST be one of the AES wrap OIDs and the parameters field MUST be absent.
section: "2.5"
rfc2119_level: MUST
topics:
    - crypto
    - security
