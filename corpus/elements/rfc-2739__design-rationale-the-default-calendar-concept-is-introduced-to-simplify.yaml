document: rfc-2739
kind: design-rationale
summary: The 'default' calendar concept is introduced to simplify multi-calendar scenarios. A user designates one calendar (possibly an aggregation of all others) as the default that other users should consult, identified by the PREF parameter on the relevant vCard property.
