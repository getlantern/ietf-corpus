document: rfc-1559
kind: protocol-element
summary: NSP retransmission behavior is tunable via phivEndRetransmitFactor (max restarts of retransmit timer before Session Control disconnects the link), phivEndDelayFact (multiplier for round-trip delay estimate), phivEndDelayWeight (exponential smoothing weight for RTT), and phivEndInactivityTimer (idle-link check interval in seconds).
