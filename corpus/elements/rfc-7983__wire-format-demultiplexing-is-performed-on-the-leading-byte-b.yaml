document: rfc-7983
kind: wire-format
summary: Demultiplexing is performed on the leading byte (B) of the UDP datagram. STUN uses B in [0..3], ZRTP uses B in [16..19], DTLS uses B in [20..63], TURN Channel uses B in [64..79], and RTP/RTCP uses B in [128..191].
