document: rfc-1514
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed in this memo, providing no access control guidance for the read-write objects (hrSystemDate, hrSystemInitialLoadDevice, hrSystemInitialLoadParameters, hrStorageSize, hrSWRunStatus, hrFSLastFullBackupDate, hrFSLastPartialBackupDate) that could be exploited to alter host configuration.
