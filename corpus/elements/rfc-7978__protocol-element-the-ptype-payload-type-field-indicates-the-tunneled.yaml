document: rfc-7978
kind: protocol-element
summary: 'The PType (Payload Type) field indicates the tunneled data format. Defined values are: 0 (Reserved), 1 (Null — no user data), 2 (Ethertyped Payload — payload begins with an Ethertype), 3 (Ethernet Frame — encapsulated Ethernet frame without FCS), 4–14 (Unassigned), 15 (Reserved).'
