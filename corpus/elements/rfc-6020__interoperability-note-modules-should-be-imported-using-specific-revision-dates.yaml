document: rfc-6020
kind: interoperability-note
summary: Modules should be imported using specific revision dates via the 'revision-date' substatement. Without a revision-date, it is undefined from which revision definitions are taken, which can cause inconsistencies between implementations. When an author publishes a new module revision, importers must explicitly update their import statement to accept the changes.
section: 5.1.1
topics:
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
