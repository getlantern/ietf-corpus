document: rfc-5416
kind: design-rationale
summary: In Split MAC, the AC handles Distribution Service, Integration Service, 802.11 Association/Disassociation/Reassociation, 802.1X/EAP, RSNA Key Management, and QoS classification, while the WTP handles Beacon generation, Probe Responses, Power Management/Packet Buffering, and real-time scheduling/queuing. This design centralizes policy enforcement and AAA at the AC while keeping time-critical, latency-sensitive functions at the WTP to reduce cost pressure.
section: 2.2.1
topics:
    - security
