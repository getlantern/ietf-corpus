document: rfc-7737
kind: design-rationale
summary: 'Reply Mode value 1 (Do not reply) is explicitly prohibited in the Reply Mode Order TLV because including it would defeat the purpose of the TLV: the initiator always needs a reply to determine which return path was chosen.'
