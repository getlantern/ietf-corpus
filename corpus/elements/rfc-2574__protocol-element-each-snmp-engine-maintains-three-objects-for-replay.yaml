document: rfc-2574
kind: protocol-element
summary: 'Each SNMP engine maintains three objects for replay protection: snmpEngineID (unique engine identifier), snmpEngineBoots (reboot count since snmpEngineID was last configured), and snmpEngineTime (seconds since snmpEngineBoots was last incremented). The authoritative engine must store snmpEngineID and snmpEngineBoots in non-volatile storage.'
section: "2.2"
topics:
    - snmp
    - security
