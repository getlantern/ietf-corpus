document: rfc-3676
kind: security-consideration
summary: Using Format=Flowed with digitally signed or encrypted messages may cause interoperability problems or security vulnerabilities, because flowed text may be altered (line breaks and trailing spaces added or removed) between composition and transmission or between reception and display, changing the text seen by cryptographic processors.
section: "4.6"
topics:
    - email
    - security
    - crypto
