document: rfc-7438
kind: normative-requirement
summary: When the Ingress LSR receives an in-band signaling Opaque Value TLV with a wildcard group address, it examines its IP multicast routing table for all streams whose source address matches the TLV's source subfield; all such streams SHOULD be forwarded down the identified MP-LSP.
section: "6"
rfc2119_level: SHOULD
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
