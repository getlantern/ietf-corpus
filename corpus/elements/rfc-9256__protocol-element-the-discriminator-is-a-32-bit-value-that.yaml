document: rfc-9256
kind: protocol-element
summary: The Discriminator is a 32-bit value that uniquely identifies a candidate path within the context of an SR Policy from a specific Protocol-Origin. For BGP SR Policy, the BGP distinguisher is used; for PCEP and configuration, the default value is 0.
