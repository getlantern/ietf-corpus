document: rfc-9600
kind: protocol-element
summary: 'The TRILL-ECN field encodes four codepoints: Not-ECT (00), ECT(1) (01), ECT(0) (10), and NCCE (Non-Critical Congestion Experienced, 11). The first three match the IP ECN field codepoints; NCCE is named distinctly from CE to reflect its non-critical (ingress-to-egress) semantics.'
section: "2"
topics:
