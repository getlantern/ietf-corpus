document: rfc-3443
kind: protocol-element
summary: 'For IP packets, iTTL is the TTL of the incoming IP packet. For MPLS Push/Swap/PHP operations, iTTL is the TTL of the topmost incoming label. For Pop (tunnel termination), iTTL depends on tunnel type: Pipe Model uses the exposed header TTL, Uniform Model uses the TTL of the popped label.'
section: "3.4"
topics:
    - mpls
