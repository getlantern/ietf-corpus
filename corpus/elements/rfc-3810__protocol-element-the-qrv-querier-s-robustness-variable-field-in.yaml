document: rfc-3810
kind: protocol-element
summary: The QRV (Querier's Robustness Variable) field in a Query carries the Querier's Robustness Variable value (capped at 7; set to 0 if it exceeds 7). Non-querier routers adopt the QRV value from the most recently received Query as their own Robustness Variable, falling back to the default if QRV was zero.
section: 5.1.8
topics:
    - multicast
    - ip
