document: rfc-7523
kind: design-rationale
summary: The JWT profile is intentionally similar, though not identical, to the SAML 2.0 profile for OAuth 2.0 (RFC 7522). Differences arise where JWT structure and semantics differ from SAML Assertions — for example, JWTs have no direct equivalent to SAML's <SubjectConfirmation> or <AuthnStatement> elements.
