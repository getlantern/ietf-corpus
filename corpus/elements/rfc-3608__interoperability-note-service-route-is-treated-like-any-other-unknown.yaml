document: rfc-3608
kind: interoperability-note
summary: 'Service-Route is treated like any other unknown header field by intermediate proxies: they forward it toward the destination. Proxies should not assume they will be traversed by future requests in a dialog simply because they appear in the Service-Route header field.'
section: "6.2"
topics:
    - sip
    - realtime
