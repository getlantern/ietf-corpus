document: rfc-3687
kind: protocol-element
summary: presentMatch (OID 1.2.36.79672281.1.13.5) evaluates to TRUE if and only if the component reference identifies one or more component values, regardless of their content. Its assertion syntax is NULL. When used in an extensibleMatch filter it behaves like the "present" filter case.
section: 3.2.2.2
topics:
