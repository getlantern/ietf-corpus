document: rfc-5373
kind: wire-format
summary: The ABNF syntax defines Answer-Mode and Priv-Answer-Mode as header-name HCOLON answer-mode-value *(SEMI answer-mode-param), where answer-mode-value is 'Manual' / 'Auto' / token and answer-mode-param is 'require' / generic-param. Header field names and values are compared case-insensitively.
