document: rfc-2018
kind: normative-requirement
summary: SACK options SHOULD be included in all ACKs which do not ACK the highest sequence number in the data receiver's queue. The receiver SHOULD send an ACK for every valid segment containing new data, and each such ACK SHOULD bear a SACK option.
section: "4"
rfc2119_level: SHOULD
topics:
    - tcp
