document: rfc-3220
kind: interoperability-note
summary: On a given subnet, either all mobility agents MUST include the Prefix-Lengths Extension in their Agent Advertisements or all MUST NOT; mixing is prohibited because it breaks move-detection Algorithm 2, which requires both the current and new agent to include the extension for a valid prefix comparison.
section: "2.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
