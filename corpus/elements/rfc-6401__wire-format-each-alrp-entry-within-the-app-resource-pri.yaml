summary: 'Each ALRP entry within the APP_RESOURCE_PRI element is 4 bytes: ALRP Namespace (16 bits, unsigned, referencing the Resource Priority Namespaces IANA registry), Reserved (8 bits, set to zero), and ALRP Value (8 bits, unsigned, referencing the Resource-Priority Priority-Value IANA registry).'
