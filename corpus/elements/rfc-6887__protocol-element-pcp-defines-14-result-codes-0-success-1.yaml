document: rfc-6887
kind: protocol-element
summary: 'PCP defines 14 result codes: 0 SUCCESS, 1 UNSUPP_VERSION, 2 NOT_AUTHORIZED, 3 MALFORMED_REQUEST, 4 UNSUPP_OPCODE, 5 UNSUPP_OPTION, 6 MALFORMED_OPTION, 7 NETWORK_FAILURE (short lifetime), 8 NO_RESOURCES (short lifetime), 9 UNSUPP_PROTOCOL, 10 USER_EX_QUOTA (short lifetime), 11 CANNOT_PROVIDE_EXTERNAL, 12 ADDRESS_MISMATCH, 13 EXCESSIVE_REMOTE_PEERS. Long-lifetime errors SHOULD use 30-minute lifetime; short-lifetime errors SHOULD use 30-second lifetime.'
section: "7.4"
topics:
