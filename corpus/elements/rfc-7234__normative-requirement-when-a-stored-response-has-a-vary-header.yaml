document: rfc-7234
kind: normative-requirement
summary: When a stored response has a Vary header field, a cache MUST NOT use it unless all selecting header fields nominated by Vary match in both the original and presented request, after allowed normalizations. A Vary field-value of '*' always fails to match.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
