document: rfc-9708
kind: protocol-element
summary: 'The LM-OTS algorithm has five parameters: n (hash output length in bytes), H (preimage-resistant hash function), w (Winternitz coefficient width: 1, 2, 4, or 8 bits), p (number of n-byte elements in the signature), and ls (left-shift bits for the checksum). Values of p and ls are derived from n and w per RFC 8554 Appendix B.'
section: "2.3"
topics:
    - crypto
