document: rfc-3019
kind: security-consideration
summary: Unauthorized SET operations on the write-able MIB objects (e.g., query interval, robustness, cache status) could cause a denial of service by disrupting MLD operation. Support of SET operations in a non-secure environment without proper protection has a negative effect on network operations.
section: Security Considerations
topics:
    - security
    - multicast
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
