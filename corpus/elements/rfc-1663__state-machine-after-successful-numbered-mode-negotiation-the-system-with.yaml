document: rfc-1663
kind: state-machine
summary: After successful Numbered-Mode negotiation, the system with the numerically smaller Magic-Number sends SABM or SABM(E); the peer responds with UA. If either frame is lost, the exchange may be retried using Restart Timer and counter values. Authentication, LQD, and NCP Configuration follow.
section: "5"
