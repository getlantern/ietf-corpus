document: rfc-9516
kind: protocol-element
summary: The SFC Consistency Verification Request (CVReq, Echo Type=3) and Consistency Verification Reply (CVRep, Echo Type=4) enable SFP path consistency verification. Every SFF receiving a CVReq MUST collect information about traversed SFs and send a CVRep to the ingress SFF over IP, and MUST forward the CVReq to the next downstream SFF.
section: "6.6"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
