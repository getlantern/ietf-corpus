document: rfc-7623
kind: protocol-element
summary: The Inclusive Multicast Ethernet Tag route is used for per-I-SID multicast pruning and auto-discovery of PEs participating in a given I-SID. The Ethernet Tag field is set with the I-SID value; this BGP-based pruning supersedes MMRP and works with any LSP type (P2P, MP2P, P2MP, MP2MP).
section: "5.3"
topics:
    - mpls
    - routing
    - multicast
