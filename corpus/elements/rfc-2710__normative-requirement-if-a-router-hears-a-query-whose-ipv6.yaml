document: rfc-2710
kind: normative-requirement
summary: If a router hears a Query whose IPv6 Source Address is numerically less than its own selected address for that link, it MUST become a Non-Querier on that link. There is normally only one Querier per link and all routers start up as Querier.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
