summary: Type-P-One-way-Bi-Packet-Loss is the fundamental singleton metric, defined as a Loss Pair (l1, l2) where each of l1 and l2 is binary (0 = received, 1 = lost), capturing the four possible outcomes for a pair of packets sent from Src to Dst at wire-times T1 and T2.
