document: rfc-8150
kind: protocol-element
summary: The MplsLpsFpathPath textual convention encodes the FPath and Path fields of PSC control packets as a 2-octet OCTET STRING (DISPLAY-HINT '1x:'). FPath (first octet) indicates whether the anomaly is on the working (1) or protection (0) path; Path (second octet) indicates whether the protection path is transporting user data (1) or not (0). Values 2-255 are reserved for future extensions.
section: "5.1"
topics:
    - mpls
    - snmp
