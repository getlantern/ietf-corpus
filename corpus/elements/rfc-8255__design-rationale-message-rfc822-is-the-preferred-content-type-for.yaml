document: rfc-8255
kind: design-rationale
summary: '''message/rfc822'' is the preferred Content-Type for individual language parts (over a flat content type) specifically to provide good rendering support in non-conforming clients that will display all parts; ''message/global'' is permitted as an alternative as its support grows.'
