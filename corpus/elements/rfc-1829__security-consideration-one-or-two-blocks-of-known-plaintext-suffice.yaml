document: rfc-1829
kind: security-consideration
summary: One or two blocks of known plaintext suffice to recover a DES key. Because IP datagrams typically begin with known and/or guessable header text, frequent key changes will not protect against known-plaintext attacks.
section: Security Considerations
topics:
