document: rfc-7555
kind: registry
summary: IANA created the 'Next Hop Address Type Registry' with Standards Action allocation. Types 1-4 (IPv4/IPv6 Numbered/Unnumbered) are carried over from RFC 4379 DSMAP; Types 6-7 (IPv4/IPv6 Protocol Adj, no interface field) are new. A coordination note requires that any code point assigned here without a counterpart in the Downstream Address Mapping Registry must be marked Reserved in that registry.
section: "7.4"
topics:
