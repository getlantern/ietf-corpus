document: rfc-3986
kind: wire-format
summary: 'The scheme component begins with a letter followed by any combination of letters, digits, plus, period, or hyphen. ABNF: scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). Canonical form is lowercase.'
