document: rfc-3986
kind: wire-format
summary: 'The scheme component begins with a letter followed by any combination of letters, digits, plus, period, or hyphen: scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). Schemes are case-insensitive but canonical form is lowercase.'
