document: rfc-6009
kind: protocol-element
summary: The ':zone' tagged argument for the envelope test specifies a time zone offset string in the format (+/-)4DIGIT (agreeing with RFC 5322 format, not ISO 8601). It only affects the 'bytimeabsolute' envelope-part; if omitted, local time zone is used.
