document: rfc-1654
kind: design-rationale
summary: 'BGP enforces the ''hop-by-hop'' routing paradigm: a speaker advertises only routes it itself uses. This means policies requiring source routing (e.g., directing traffic through a specific third AS) cannot be expressed in BGP.'
section: "2"
topics:
