document: rfc-9251
kind: normative-requirement
summary: Each IGMP Membership Report Synch and Leave Synch route MUST carry exactly one EVI-RT EC and exactly one ES-Import RT. If a received Synch route has no EVI-RT EC or more than one EVI-RT EC, the PE MUST apply the 'treat-as-withdraw' procedure per RFC 7606.
section: "9.5"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
