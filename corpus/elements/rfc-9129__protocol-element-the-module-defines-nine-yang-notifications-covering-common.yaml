document: rfc-9129
kind: protocol-element
summary: 'The module defines nine YANG notifications covering common OSPF MIB traps: if-state-change, if-config-error, nbr-state-change, nbr-restart-helper-status-change, if-rx-bad-packet, lsdb-approaching-overflow, lsdb-overflow, nssa-translator-status-change, and restart-status-change. Each notification identifies the affected interface type (regular, virtual-link, or sham-link).'
section: "2.8"
topics:
