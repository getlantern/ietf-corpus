document: rfc-7679
kind: interoperability-note
summary: If a packet is duplicated along the path so that multiple non-corrupt copies arrive at the destination, the packet is counted as received and the first copy to arrive determines the one-way delay. If a fragmented packet is not reassembled, it is deemed lost.
section: "3.5"
topics:
