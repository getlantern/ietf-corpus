document: rfc-7655
kind: normative-requirement
summary: If VAD is employed with G.711.0, the Marker bit (M) MUST be set in the first packet of a talkspurt (the first packet after a silence period), consistent with G.711 RTP VAD rules in RFC 3551.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
