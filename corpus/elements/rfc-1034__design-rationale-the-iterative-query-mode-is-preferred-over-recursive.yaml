document: rfc-1034
kind: design-rationale
summary: The iterative query mode is preferred over recursive mode for datagram-based access because it avoids burdening name servers with unbounded work and allows clients to make use of referral information for future queries. Recursive mode is supported as an option for simple clients that cannot follow referrals.
section: "2.3"
topics:
    - dns
