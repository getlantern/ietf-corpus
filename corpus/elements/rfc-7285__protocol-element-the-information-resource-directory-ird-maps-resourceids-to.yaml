document: rfc-7285
kind: protocol-element
summary: The Information Resource Directory (IRD) maps ResourceIDs to IRDResourceEntry objects, each containing a URI, media-type, optional 'accepts' (POST input media type), optional 'capabilities', and optional 'uses' (list of dependent resource IDs). ALTO clients traverse IRDs recursively to discover all available resources.
