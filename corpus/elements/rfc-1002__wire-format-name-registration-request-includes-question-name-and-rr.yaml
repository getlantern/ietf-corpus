document: rfc-1002
kind: wire-format
summary: Name Registration Request includes QUESTION_NAME and RR_NAME (same name); OPCODE=5 (registration), RD=1, ARCOUNT=1. The RR_NAME must use label string pointers to QUESTION_NAME to keep the datagram under 576 bytes. RDLENGTH is 0x0006 covering NB_FLAGS (2 bytes) and NB_ADDRESS (4 bytes).
section: 4.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
