document: rfc-2740
kind: protocol-element
summary: 'Seven LSA types are defined: Router-LSA (0x2001, area scope), Network-LSA (0x2002, area scope), Inter-Area-Prefix-LSA (0x2003, area scope), Inter-Area-Router-LSA (0x2004, area scope), AS-external-LSA (0x4005, AS scope), Link-LSA (0x0008, link-local scope), and Intra-Area-Prefix-LSA (0x2009, area scope). The names of IPv4 type-3 and type-4 summary-LSAs have been changed to Inter-Area-Prefix-LSA and Inter-Area-Router-LSA respectively.'
section: "3.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
