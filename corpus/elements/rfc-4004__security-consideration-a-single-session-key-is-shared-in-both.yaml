document: rfc-4004
kind: security-consideration
summary: A single session key is shared in both directions for each MSA pair (e.g., the same key is used for MN-FA and FA-MN authentication extensions), even though SPIs may differ per direction. The security implications of this symmetric key distribution model are acknowledged by the specification.
section: "1.2"
topics:
