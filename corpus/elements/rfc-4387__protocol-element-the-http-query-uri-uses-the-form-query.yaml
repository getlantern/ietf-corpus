summary: 'The HTTP query URI uses the form: query = attribute ''='' value, where the attribute is a certificate or key identifier type and the value specifies one or more certificates or public keys to be returned. Additional attribute/value pairs separated by ''&'' may specify further actions; stores SHOULD ignore unrecognized pairs.'
