document: rfc-2279
kind: security-consideration
summary: Overlong encodings — representing a character using more octets than the minimum required — are illegal in UTF-8 and must be rejected by compliant decoders. Permitting them while simultaneously enforcing character-level restrictions creates exploitable inconsistencies that an attacker can leverage.
section: "6"
topics:
    - security
