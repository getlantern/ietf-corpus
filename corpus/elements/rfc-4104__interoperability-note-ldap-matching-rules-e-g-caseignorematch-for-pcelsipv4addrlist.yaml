document: rfc-4104
kind: interoperability-note
summary: LDAP matching rules (e.g., caseIgnoreMatch for pcelsIPv4AddrList) may not cover all application-level semantic equivalences. Implementers MUST NOT rely solely on LDAP syntaxes and matching rules for ensuring consistency with this specification; application-level equivalence checking is required.
section: "5"
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
