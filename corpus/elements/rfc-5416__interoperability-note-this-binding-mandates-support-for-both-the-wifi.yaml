document: rfc-5416
kind: interoperability-note
summary: This binding mandates support for both the WiFi Alliance WPA and WMM specifications, which are widely deployed interim pseudo-standards. Implementations must include the WPA and WMM Information Elements in Add WLAN messages. New IEEE 802.11 specifications (802.11n, 802.11r, 802.11v) are explicitly not supported and must be addressed through a separate CAPWAP binding or an update to this document.
section: "1"
topics:
    - security
