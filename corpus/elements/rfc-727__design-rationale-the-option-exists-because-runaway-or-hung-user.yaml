document: rfc-727
kind: design-rationale
summary: The option exists because runaway or hung user processes cannot always be interrupted by normal means, and many hosts 'detach' rather than log out a process on connection close to protect against accidental disconnects. This leaves hung jobs loading the system when the user has given up completely.
section: "4"
