document: rfc-1994
kind: normative-requirement
summary: If the Response Value matches the expected value, the implementation MUST transmit a Success packet (Code=3). If it does not match, it MUST transmit a Failure packet (Code=4) and SHOULD take action to terminate the link.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
