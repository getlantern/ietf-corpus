document: rfc-8929
kind: normative-requirement
summary: The Registering Node MUST refrain from using multicast NS(Lookup) when the destination is not known as on-link, e.g., when the PIO L flag is not set. In that case, the Registering Node sends packets directly to its 6LR instead of multicasting.
section: "10"
rfc2119_level: MUST
topics:
    - ip
