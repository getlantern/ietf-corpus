document: rfc-5946
kind: normative-requirement
summary: When the Notify method is used, it is RECOMMENDED that the RSVP Receiver Proxy also issue a sender notification via a PathErr message to maximize the chances the notification reaches the sender even if some routers do not support Notify.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - qos
    - realtime
