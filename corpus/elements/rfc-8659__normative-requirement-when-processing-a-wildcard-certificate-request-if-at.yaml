document: rfc-8659
kind: normative-requirement
summary: When processing a wildcard certificate request, if at least one issuewild Property is specified in the Relevant RRset, each issue Property MUST be ignored. Issuewild takes precedence over issue specifically and exclusively for wildcard domain name requests.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - pkix
