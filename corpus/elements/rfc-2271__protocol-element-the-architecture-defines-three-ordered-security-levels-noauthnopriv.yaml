kind: protocol-element
summary: 'The architecture defines three ordered security levels: noAuthNoPriv (no authentication, no privacy), authNoPriv (authentication without privacy), and authPriv (authentication with privacy), where noAuthNoPriv < authNoPriv < authPriv. Every message carries an associated securityLevel.'
