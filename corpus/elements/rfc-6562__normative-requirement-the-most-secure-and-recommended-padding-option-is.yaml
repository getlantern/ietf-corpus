document: rfc-6562
kind: normative-requirement
summary: The most secure and RECOMMENDED padding option is to pad all packets throughout the call to the same constant size. Padding to the next multiple of 16 octets has been shown to achieve good results in practice.
section: "5"
rfc2119_level: RECOMMENDED
