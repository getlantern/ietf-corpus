document: rfc-3339
kind: interoperability-note
summary: Programs using 2-digit years may produce 3-digit years for years after 1999 (e.g., subtracting 1900 without digit-count checks) or non-numeric decade characters. Robust implementations should handle these broken representations by adding 1900 to 3-digit years.
section: "3"
