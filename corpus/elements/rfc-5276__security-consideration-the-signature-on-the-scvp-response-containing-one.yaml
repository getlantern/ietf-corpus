document: rfc-5276
kind: security-consideration
summary: The signature on the SCVP response containing one or more ERS structures must be verified using a public key trusted by the relying party. The SCVP server's signature protects trust anchors conveyed in the response that are used to verify interior layers of an ERS structure.
section: "6"
topics:
    - security
    - pkix
    - crypto
