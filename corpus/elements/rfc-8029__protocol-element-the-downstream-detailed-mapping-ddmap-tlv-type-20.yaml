document: rfc-8029
kind: protocol-element
summary: 'The Downstream Detailed Mapping (DDMAP) TLV (type 20) carries: 2-octet MTU, 1-octet Address Type (IPv4/IPv6 numbered/unnumbered), 1-octet DS Flags (I=request Interface and Label Stack object; N=treat as non-IP packet), 4- or 16-octet Downstream Address, 4- or 16-octet Downstream Interface Address, Return Code, Return Subcode, and a list of sub-TLVs. It replaces the deprecated DSMAP TLV.'
section: "3.4"
topics:
    - mpls
