document: rfc-3320
kind: security-consideration
summary: State access is protected by requiring the requester to supply a state_identifier that is a cryptographic hash of the state item itself. The minimum_access_length (6–20 bytes) provides a configurable lower bound on the identifier prefix that must be presented, preventing brute-force guessing.
section: "6.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
