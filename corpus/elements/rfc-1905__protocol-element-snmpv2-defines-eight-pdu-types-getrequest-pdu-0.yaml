kind: protocol-element
summary: 'SNMPv2 defines eight PDU types: GetRequest-PDU [0], GetNextRequest-PDU [1], Response-PDU [2], SetRequest-PDU [3], GetBulkRequest-PDU [5], InformRequest-PDU [6], SNMPv2-Trap-PDU [7], and Report-PDU [8]. Tag [4] is obsolete. GetBulkRequest uses BulkPDU structure; all others use the common PDU structure.'
