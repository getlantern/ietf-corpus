document: rfc-3813
kind: protocol-element
summary: mplsInSegmentMapTable provides a reverse lookup from (interface, label) pair to the mplsInSegmentIndex, enabling managers to trace LSPs hop-by-hop by following the in-segment to out-segment at each LSR. Implementors must be aware that if mplsInSegmentMapLabelPtrIndex OID has more than 111 sub-identifiers, column OIDs exceed 128 sub-identifiers and cannot be accessed via SNMPv1, SNMPv2c, or SNMPv3.
section: "5.9"
topics:
