document: rfc-7033
kind: security-consideration
summary: WebFinger servers face abuse potential including email address harvesting for spam, user profiling, and phishing. Rate-limiting by IP address is RECOMMENDED to mitigate harvesting, though mandatory strategies are not prescribed because the appropriate choice depends on context.
