document: rfc-5445
kind: wire-format
summary: 'The FEC Payload ID for the Small Block Systematic FEC Scheme is 96 bits: a 32-bit Source Block Number, a 16-bit Source Block Length (in source symbols), and a 16-bit Encoding Symbol ID. Embedding Source Block Length in each packet enables receivers to track dynamically varying block sizes without out-of-band signaling.'
section: 5.2.1
topics:
    - multicast
