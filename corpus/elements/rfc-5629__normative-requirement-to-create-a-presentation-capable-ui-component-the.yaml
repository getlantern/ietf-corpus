document: rfc-5629
kind: normative-requirement
summary: To create a presentation-capable UI component, the REFER request MUST be sent to the GRUU advertised by the UA in the Contact header field, and MUST contain a Target-Dialog header field identifying the associated dialog along with a Require header field with the 'tdialog' option tag.
section: 8.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
