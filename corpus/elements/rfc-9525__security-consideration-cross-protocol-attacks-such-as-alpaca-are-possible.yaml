document: rfc-9525
kind: security-consideration
summary: Cross-protocol attacks (such as ALPACA) are possible when two different protocol services share the same certificate. This can be addressed by using restricted identifiers (SRV-ID or URI-ID) that scope the certificate to a specific application service type, or by deploying services so they do not share certificates.
section: "2"
topics:
