document: rfc-8064
kind: privacy-consideration
summary: Stable link-layer addresses embedded in IPv6 IIDs allow observers to correlate a node's activity across networks and track its location over time. Reusing identifiers with their own semantics across different contexts is detrimental to privacy, as documented in RFC 7721.
section: "1"
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
