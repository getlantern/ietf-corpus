document: rfc-8285
kind: normative-requirement
summary: If an extension is marked 'sendonly' and the answerer desires to receive it, the extension MUST be marked 'recvonly' in the SDP answer. An answerer with no desire to receive the extension SHOULD remove it from the answer.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
