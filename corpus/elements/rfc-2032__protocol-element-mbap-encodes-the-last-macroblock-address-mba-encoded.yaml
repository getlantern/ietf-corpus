document: rfc-2032
kind: protocol-element
summary: MBAP encodes the last macroblock address (MBA) encoded in the previous packet, ranging 1–32 biased by -1 to fit 5 bits. For example, MBAP=0 means the MBA predictor value is 1. Set to 0 if the packet begins with a GOB header.
section: "4.1"
