document: rfc-6869
kind: design-rationale
summary: The value "device" was chosen instead of the broader "thing" category (considered during RFC 6473 development) by splitting "thing" into software applications and hardware devices; RFC 6473 defined "application" while this document defines "device" for network-connected hardware.
section: "1"
