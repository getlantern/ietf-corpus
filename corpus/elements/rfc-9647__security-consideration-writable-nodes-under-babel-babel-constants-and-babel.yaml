document: rfc-9647
kind: security-consideration
summary: Writable nodes under 'babel', 'babel/constants', and 'babel/interfaces' can disrupt network operations if misconfigured without proper access control. Enabling packet logging without controlling access to log files gives attackers detailed network topology knowledge.
