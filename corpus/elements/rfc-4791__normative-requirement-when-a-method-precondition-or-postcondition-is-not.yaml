document: rfc-4791
kind: normative-requirement
summary: When a method precondition or postcondition is not satisfied, the response status MUST be 403 (Forbidden) or 409 (Conflict), and the appropriate XML element MUST be returned as the child of a top-level DAV:error element in the response body.
section: "1.3"
rfc2119_level: MUST
topics:
    - http
