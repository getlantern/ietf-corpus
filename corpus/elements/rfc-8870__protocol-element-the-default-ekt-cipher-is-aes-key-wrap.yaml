document: rfc-8870
kind: protocol-element
summary: The default EKT Cipher is AES Key Wrap with Padding (RFC 5649). AESKW128 (L=16 bytes) MUST be implemented; AESKW256 (L=32 bytes) MAY be implemented. Both have T=2^48 as the maximum encryption count.
