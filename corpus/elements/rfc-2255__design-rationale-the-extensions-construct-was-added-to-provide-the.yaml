document: rfc-2255
kind: design-rationale
summary: The extensions construct was added to provide the LDAP URL with an extensibility mechanism so that future documents can extend URL capabilities, for example to support new LDAPv3 extensions as they are defined. The critical/non-critical distinction allows graceful degradation when a client does not understand an extension.
section: "3"
topics:
    - ldap
