document: rfc-7684
kind: normative-requirement
summary: When multiple Extended Prefix Opaque LSAs or Extended Link Opaque LSAs from the same router include the same prefix or link, receivers use the TLV from the LSA with the smallest Opaque ID. Re-origination in ascending Opaque ID order is RECOMMENDED to minimize disruption.
section: "2.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
