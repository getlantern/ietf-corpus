document: rfc-2910
kind: design-rationale
summary: The target URI is encoded twice — once as the HTTP Request-URI and once as an IPP operation attribute — to maintain a consistent set of rules for mapping application/ipp to possibly many communication layers, even where URLs are not used as the addressing mechanism in the transport layer.
section: "4.1"
topics:
    - http
