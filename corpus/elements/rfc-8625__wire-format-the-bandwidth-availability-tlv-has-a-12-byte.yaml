summary: 'The Bandwidth Availability TLV has a 12-byte format: Type (2 octets, value 4), Length (2 octets, value 0x0C), Index (1 octet), Reserved (3 octets), and Availability (4 octets, IEEE 754 32-bit floating-point). Total length is fixed at 12 bytes.'
