document: rfc-1364
kind: normative-requirement
summary: When an ASBR advertising an OSPF route to external BGP neighbors learns that the route has become unreachable, the ASBR must immediately propagate this information to the external BGP neighbors.
section: "2.1"
rfc2119_level: MUST
topics:
