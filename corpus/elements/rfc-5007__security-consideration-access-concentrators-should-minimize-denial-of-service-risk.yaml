document: rfc-5007
kind: security-consideration
summary: Access concentrators SHOULD minimize denial-of-service risk to DHCPv6 servers by employing negative caching (cache failed queries) and address restrictions (don't query for addresses outside attached broadband networks). Rate limiting by relay agents, network elements, or servers is also recommended.
section: "5"
topics:
    - security
