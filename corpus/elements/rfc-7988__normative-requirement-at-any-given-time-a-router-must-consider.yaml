document: rfc-7988
kind: normative-requirement
summary: At any given time, a router MUST consider itself to have only a single parent node on a given IR P-tunnel and MUST discard traffic that arrives on that P-tunnel from a different parent node.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
