document: rfc-5070
kind: protocol-element
summary: The Assessment class characterizes the impact of an incident. At least one of Impact (technical), TimeImpact (downtime/labor), or MonetaryImpact (financial loss) MUST be present. An optional Confidence class conveys the analytical validity of the assessment as a categorical or numeric value.
section: "3.10"
topics:
