document: rfc-3995
kind: protocol-element
summary: A Subscription Object holds Subscription Template Attributes (supplied by the client) and Subscription Description Attributes (supplied by the Printer at creation time). It specifies the Notification Recipient, Delivery Method, Subscribed Events, and information to include in Event Notifications.
