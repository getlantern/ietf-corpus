document: rfc-1889
kind: normative-requirement
summary: Each medium in a multimedia session should be carried in a separate RTP session with its own destination transport address; it is not intended that different media be carried in a single RTP session and demultiplexed by payload type or SSRC fields.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
