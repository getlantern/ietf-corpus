document: rfc-2301
kind: normative-requirement
summary: Each MMR (T.6, Compression=4) encoded strip MUST include an end-of-facsimile-block (EOFB) code at the end. The T6Options field must be present with value 0; uncompressed mode is not allowed for FAX.
section: 4.2.2
rfc2119_level: MUST
