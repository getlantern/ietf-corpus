document: rfc-6731
kind: interoperability-note
summary: DNS cache entries for private namespaces can become obsolete when a network interface is closed or when a new parallel interface alters RDNSS preferences; implementations SHOULD manage per-interface caches or flush stale cache entries on interface change events.
section: "4.8"
topics:
    - dns
