document: rfc-1350
kind: normative-requirement
summary: Each non-terminal DATA packet must be acknowledged by an ACK packet before the next packet can be sent (lock-step acknowledgment). A data packet of less than 512 bytes signals transfer termination.
section: "2"
rfc2119_level: MUST
topics:
