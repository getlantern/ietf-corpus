document: rfc-9341
kind: design-rationale
summary: The Alternate-Marking Method is classified as Hybrid Type I per RFC 7799 because the change in value of marking bits occurs at domain edges, which formally constitutes a modification of the stream of interest, even though no new packets are injected. This distinction from pure Passive measurement motivates the controlled-domain restriction.
section: "1"
topics:
    - measurement
