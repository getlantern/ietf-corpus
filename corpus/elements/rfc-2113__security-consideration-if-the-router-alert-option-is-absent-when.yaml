document: rfc-2113
kind: security-consideration
summary: If the Router Alert option is absent when it should be set, the protocol relying on it (e.g., RSVP or IGMPv2) will be adversely affected because those protocols depend on the option to trigger router interception.
section: "4.0"
topics:
