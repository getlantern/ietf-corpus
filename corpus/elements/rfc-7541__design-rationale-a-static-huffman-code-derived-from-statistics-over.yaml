document: rfc-7541
kind: design-rationale
summary: A static Huffman code derived from statistics over a large sample of HTTP headers is used rather than an adaptive code. This avoids the shared-context security risks of adaptive compression (as exploited by CRIME) while still providing useful compression gains.
section: Appendix B
topics:
    - http
    - security
