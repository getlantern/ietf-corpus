document: rfc-8838
kind: protocol-element
summary: An Empty Checklist is a checklist that initially contains no candidate pairs because they will be incrementally added as candidates are trickled. Unlike regular ICE where all pairs are known at checklist creation, Trickle ICE places every checklist in the Running state immediately, even if empty.
