document: rfc-9664
kind: design-rationale
summary: The 3000 ms (3-second) random delay for initial Registration Requests was chosen to spread load meaningfully when many devices renew simultaneously (e.g., after power failure), without causing user-perceptible discovery delays. At 100 devices with even distribution, this yields one renewal every 30 ms.
section: "4.2"
