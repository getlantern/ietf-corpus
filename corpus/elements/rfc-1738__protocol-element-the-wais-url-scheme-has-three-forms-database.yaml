document: rfc-1738
kind: protocol-element
summary: 'The WAIS URL scheme has three forms: database (`wais://.../db`), search (`wais://.../db?query`), and document (`wais://.../db/wtype/wpath`). Default port is 210. The `<wtype>` field is included so that clients can retrieve documents without additional server queries for type information.'
section: "3.9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
