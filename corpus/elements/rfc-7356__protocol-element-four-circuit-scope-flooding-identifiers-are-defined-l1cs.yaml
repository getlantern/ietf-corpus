document: rfc-7356
kind: protocol-element
summary: 'Four circuit scope flooding identifiers are defined: L1CS (scope 1, standard TLVs), L2CS (scope 2, standard TLVs), E-L1CS (scope 64, extended TLVs), and E-L2CS (scope 65, extended TLVs). All use the FS LSP ID Extended format. The FS-LSDB is specific to both the scope and the individual circuit.'
