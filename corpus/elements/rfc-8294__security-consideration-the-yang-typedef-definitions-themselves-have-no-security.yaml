document: rfc-8294
kind: security-consideration
summary: The YANG typedef definitions themselves have no security or privacy impact on the Internet. However, the usage of these types in concrete YANG modules might have security implications, and the security considerations of YANG 1.1 (RFC 7950) apply to this document.
