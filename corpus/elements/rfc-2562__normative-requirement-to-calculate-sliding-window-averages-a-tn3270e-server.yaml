document: rfc-2562
kind: normative-requirement
summary: To calculate sliding-window averages, a TN3270E server MUST maintain internal per-sample-period counters (T, TotalRts, TotalIpRts) and sliding counters (AvgCountTrans, TotalRtsSliding, TotalIpRtsSliding), updating them at each sample period end using the specified exponential-decay formula.
section: 3.5.1
rfc2119_level: MUST
