document: rfc-4950
kind: design-rationale
summary: ICMP messages generated by an LSR contain no information about the MPLS label stack that encapsulated the original datagram, yet the LSR forwarded the datagram based on that label stack. This omission motivated the extension object defined in this memo, enabling TRACEROUTE to reflect the MPLS encapsulation status at each hop.
