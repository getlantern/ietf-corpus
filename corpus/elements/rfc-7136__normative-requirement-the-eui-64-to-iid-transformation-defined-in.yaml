document: rfc-7136
kind: normative-requirement
summary: The EUI-64 to IID transformation defined in RFC 4291 MUST be used for all cases where an IPv6 IID is derived from an IEEE MAC or EUI-64 address. With any other form of link-layer address, an equivalent transformation SHOULD be used.
section: "5"
rfc2119_level: MUST
topics:
    - ip
