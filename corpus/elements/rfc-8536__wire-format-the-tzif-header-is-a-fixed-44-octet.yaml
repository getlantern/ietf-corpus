document: rfc-8536
kind: wire-format
summary: 'The TZif header is a fixed 44-octet structure beginning with the 4-octet ASCII magic ''TZif'' (0x54 0x5A 0x69 0x66), followed by a 1-octet version field, 15 reserved octets, and six 4-octet unsigned integer count fields: isutcnt, isstdcnt, leapcnt, timecnt, typecnt, and charcnt.'
