document: rfc-1604
kind: normative-requirement
summary: To create a PVC, frPVCEndptRowStatus MUST be initially set to 'createAndWait'. While in that state the manager sets columnar objects and retrieves error diagnostics. The object may not be set to 'active' unless frPVCEndptInMaxFrameSize, InBc, InBe, InCIR, OutMaxFrameSize, OutBc, OutBe, and OutCIR are all present.
section: "4.3"
rfc2119_level: MUST
topics:
    - snmp
