document: rfc-6339
kind: interoperability-note
summary: GSS_Decapsulate_token() returns GSS_S_DEFECTIVE_TOKEN when the encapsulated token fails consistency checks such as an OID mismatch between the token header and the expected token_oid, or ASN.1 DER length field errors, distinguishing these from generic failures.
