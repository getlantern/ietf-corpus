document: rfc-6015
kind: normative-requirement
summary: When source packets being XOR'd have unequal lengths, each shorter packet MUST be padded to the length of the longest packet by appending zero octets at the end before computing the FEC bit string.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
