document: rfc-6223
kind: design-rationale
summary: The specification explicitly does not forbid sending double-CRLF keep-alives to an entity even without negotiation, because many SIP entities already do so. However, the "keep" parameter remains necessary so the adjacent entity knows keep-alives are supported and does not fall back to short registration refresh intervals to maintain NAT bindings.
section: "4.1"
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
