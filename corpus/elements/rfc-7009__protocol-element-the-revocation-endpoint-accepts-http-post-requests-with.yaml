document: rfc-7009
kind: protocol-element
summary: The revocation endpoint accepts HTTP POST requests with an 'application/x-www-form-urlencoded' body containing a REQUIRED 'token' parameter and an OPTIONAL 'token_type_hint' parameter. Client authentication credentials are also included as described in RFC 6749 Section 2.3.
