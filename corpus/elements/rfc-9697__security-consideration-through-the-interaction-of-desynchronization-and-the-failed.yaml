document: rfc-9697
kind: security-consideration
summary: Through the interaction of desynchronization and the failed-fetch mechanism in RFC 9286 Section 6.6, Relying Parties could spuriously omit Validated Payloads or continue to emit Validated Payloads that the Certification Authority intended to withdraw, directly degrading BGP prefix origin validation (RFC 6811) and ASPA-based path verification.
section: "6"
topics:
    - routing
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
