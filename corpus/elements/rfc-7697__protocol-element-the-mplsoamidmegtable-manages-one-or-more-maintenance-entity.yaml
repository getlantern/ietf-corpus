summary: The mplsOamIdMegTable manages one or more Maintenance Entity Groups (MEGs), each defining a set of Maintenance Entities (MEs) that apply to the same transport path. Entries support both IP-compatible and ICC-based operator types for MPLS Tunnels, LSPs, Pseudowires, and Sections.
