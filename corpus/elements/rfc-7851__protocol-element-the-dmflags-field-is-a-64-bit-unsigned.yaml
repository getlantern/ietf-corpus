document: rfc-7851
kind: protocol-element
summary: The dMFlags field is a 64-bit unsigned integer where each bit requests a specific diagnostic kind. Bits 0 and 63 are reserved; all zeros means nothing requested; all ones means everything requested. Defined base diagnostics include STATUS_INFO, ROUTING_TABLE_SIZE, PROCESS_POWER, UPSTREAM_BANDWIDTH, DOWNSTREAM_BANDWIDTH, SOFTWARE_VERSION, MACHINE_UPTIME, APP_UPTIME, MEMORY_FOOTPRINT, DATASIZE_STORED, INSTANCES_STORED, MESSAGES_SENT_RCVD, EWMA_BYTES_SENT, EWMA_BYTES_RCVD, UNDERLAY_HOP, and BATTERY_STATUS.
section: "5.3"
topics:
    - measurement
