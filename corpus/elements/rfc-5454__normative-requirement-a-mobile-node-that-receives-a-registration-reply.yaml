document: rfc-5454
kind: normative-requirement
summary: A mobile node that receives a registration reply without any IPv6 prefix reply extensions (in response to a request containing IPv6 prefix request extensions) MUST assume the home agent does not support these extensions and SHOULD continue operating per MIPv4 (RFC 3344).
section: "3.5"
rfc2119_level: MUST
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
