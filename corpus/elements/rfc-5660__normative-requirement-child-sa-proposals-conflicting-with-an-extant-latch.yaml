document: rfc-5660
kind: normative-requirement
summary: Child SA proposals conflicting with an extant latch whose traffic selectors can be narrowed SHOULD be narrowed; where narrowing is impossible, the key manager MUST break the connection latch and inform the ULP prior to accepting the conflicting SAs.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
