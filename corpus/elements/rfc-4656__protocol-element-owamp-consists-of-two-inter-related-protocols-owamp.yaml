document: rfc-4656
kind: protocol-element
summary: 'OWAMP consists of two inter-related protocols: OWAMP-Control (layered over TCP, port 861) for initiating, controlling, and fetching measurement session results, and OWAMP-Test (layered over UDP) for exchanging singleton measurement packets. Both support unauthenticated, authenticated, and encrypted modes; all OWAMP-Test sessions inherit the mode of their controlling OWAMP-Control session.'
