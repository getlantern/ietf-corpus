document: rfc-2622
kind: protocol-element
summary: The filter-set class (name prefix 'fltr-') defines a named policy filter as a logical expression using AND, OR, NOT operators over address prefix sets, route-set names, AS-path regular expressions, or rp-attributes defined in the dictionary. Routing policy attribute filters are evaluated before AND/OR/NOT operators.
section: "5.4"
topics:
