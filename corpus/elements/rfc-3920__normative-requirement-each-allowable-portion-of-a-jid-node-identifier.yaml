document: rfc-3920
kind: normative-requirement
summary: Each allowable portion of a JID (node identifier, domain identifier, resource identifier) MUST NOT be more than 1023 bytes in length, yielding a maximum total JID size of 3071 bytes including the '@' and '/' separator characters.
section: "3.1"
rfc2119_level: MUST NOT
