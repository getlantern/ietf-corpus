document: rfc-5626
kind: security-consideration
summary: A UA that makes an anonymous request or has other privacy concerns MAY omit the 'sip.instance' media feature tag from its Contact header field, since the instance-id provides a persistent, globally unique identifier that can be used to track the UA across registrations.
section: "4.1"
topics:
    - sip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
