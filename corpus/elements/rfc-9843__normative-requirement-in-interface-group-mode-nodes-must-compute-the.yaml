document: rfc-9843
kind: normative-requirement
summary: In Interface Group Mode, nodes MUST compute the aggregate bandwidth of all parallel adjacencies between a pair of nodes based on IGP link advertisements, MUST derive the metric based on the aggregate bandwidth, and MUST apply the resulting metric to each of the parallel adjacencies.
section: 4.1.1.2
rfc2119_level: MUST
topics:
    - routing
