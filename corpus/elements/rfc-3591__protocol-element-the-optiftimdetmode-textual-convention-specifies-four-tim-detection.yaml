document: rfc-3591
kind: protocol-element
summary: 'The OptIfTIMDetMode textual convention specifies four TIM detection modes: off(1) — no checking; dapi(2) — check DAPI only; sapi(3) — check SAPI only; both(4) — check both SAPI and DAPI. Default value for OTSn is off(1).'
