document: rfc-891
kind: wire-format
summary: 'Ethernet links use the frame: Dest Addr (48 bits) | Srce Addr (48 bits) | Type (16 bits) | Data | CRC (32 bits). The Type field is 0x0800 for IP datagrams or 0x0806 for ARP datagrams. ARP is used to map between Ethernet and Internet addresses. The Internet datagram is placed in the Data field.'
section: A.7
topics:
