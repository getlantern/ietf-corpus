document: rfc-8795
kind: protocol-element
summary: A TE inter-layer lock describes adaptation relationships between client and server layers, associating M client-layer LTPs and N server-layer TTPs within which data arriving at any client-layer LTP can be adapted onto any server-layer TTP. It is identified by a unique inter-layer lock ID across all TE topologies from the same provider.
section: "3.10"
topics:
