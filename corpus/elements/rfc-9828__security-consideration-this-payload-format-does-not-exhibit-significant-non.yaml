document: rfc-9828
kind: security-consideration
summary: This payload format does not exhibit significant non-uniformity in receiver-side computational complexity for RTP packet processing and contains no active content, so it is unlikely to pose a denial-of-service threat from pathological data. Applications SHOULD use one or more appropriate strong security mechanisms (e.g., SRTP) as per RFC 7201.
section: "13"
topics:
    - security
    - rtp
    - realtime
