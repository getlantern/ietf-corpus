document: rfc-4932
kind: wire-format
summary: The <host:addr> element encodes an IP address as a string (3–45 characters) with an 'ip' attribute whose value is 'v4' (default) or 'v6'. The <host:status> element has a required 's' attribute for the status value and an optional 'lang' attribute defaulting to 'en'.
