document: rfc-7077
kind: normative-requirement
summary: If the LMA does not receive a UPA for a UPN with the (A) flag set, the LMA MUST retransmit the message with the same Sequence Number and contents, (D) flag set to 1, with a minimum delay of MIN_DELAY_BETWEEN_UPDATE_NOTIFICATION_REPLAY (default 1000ms) and up to MAX_UPDATE_NOTIFICATION_RETRANSMIT_COUNT (default 1) retransmissions.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
