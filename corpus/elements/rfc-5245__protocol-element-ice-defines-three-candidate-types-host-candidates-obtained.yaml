document: rfc-5245
kind: protocol-element
summary: 'ICE defines three candidate types: host candidates (obtained from local interfaces), server reflexive candidates (public-side NAT bindings discovered via STUN/TURN), and relayed candidates (allocated from a TURN server). Each candidate is a transport address (IP + port + protocol) with associated properties: type, priority, foundation, component ID, and base.'
section: "2.1"
topics:
