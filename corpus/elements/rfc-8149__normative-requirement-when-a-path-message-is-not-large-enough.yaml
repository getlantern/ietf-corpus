document: rfc-8149
kind: normative-requirement
summary: When a Path message is not large enough to fit all S2L sub-LSPs and semantic fragmentation is needed, an LSR MUST add the S2L_SUB_LSP_FRAG object for each fragment in the S2L sub-LSP descriptor.
