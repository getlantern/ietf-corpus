summary: 'IS-IS extensions required for FGL include: (1) a method for a TRILL switch to announce itself as FGL-safe in its LSP, (2) the Interested Labels and Spanning Tree Roots (INT-LABEL) sub-TLV analogous to the Interested VLANs sub-TLV, and (3) GLMAC-ADDR, GLIP-ADDR, and GLIPV6-ADDR sub-TLVs specifying FGL-based group addresses.'
