document: rfc-3691
kind: protocol-element
summary: The UNSELECT command frees server resources associated with the selected mailbox and returns the server to the authenticated state. It performs the same actions as CLOSE, except that no messages are permanently removed from the currently selected mailbox. It takes no arguments and produces no specific responses beyond the tagged OK or BAD result.
