document: rfc-4538
kind: interoperability-note
summary: The Target-Dialog header field is allowed in requests (R) for INVITE, SUBSCRIBE, and REFER methods; it is not applicable to ACK, BYE, CANCEL, OPTIONS, REGISTER, PUBLISH, PRACK, UPDATE, NOTIFY, INFO, or MESSAGE.
