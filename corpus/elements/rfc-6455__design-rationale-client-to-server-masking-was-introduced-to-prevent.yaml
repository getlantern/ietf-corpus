document: rfc-6455
kind: design-rationale
summary: Client-to-server masking was introduced to prevent cache-poisoning attacks where a malicious script causes a browser to send crafted bytes through an intermediary proxy. By requiring an unpredictable masking key, the attacker cannot control the exact byte sequence on the wire, preventing the intermediary from misinterpreting the payload as an HTTP response.
section: "10.3"
topics:
    - websocket
    - security
