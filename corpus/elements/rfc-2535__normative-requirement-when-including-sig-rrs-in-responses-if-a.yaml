document: rfc-2535
kind: normative-requirement
summary: When including SIG RRs in responses, if a SIG covers an RR in the answer section but space is insufficient to include it, the response MUST be considered truncated (with the exception that truncation MUST NOT be declared solely because a SIG for an additional-information RR did not fit).
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
