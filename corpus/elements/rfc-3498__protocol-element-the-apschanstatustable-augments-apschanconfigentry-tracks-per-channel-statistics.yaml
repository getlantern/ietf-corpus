document: rfc-3498
kind: protocol-element
summary: 'The apsChanStatusTable (augments apsChanConfigEntry) tracks per-channel statistics: apsChanStatusSignalDegrades (BER exceeds apsConfigSdBerThreshold), apsChanStatusSignalFailures (loss of signal/frame, AIS-L, or BER exceeds apsConfigSfBerThreshold), apsChanStatusSwitchovers, apsChanStatusLastSwitchover, and apsChanStatusSwitchoverSeconds (cumulative Protection Switching Duration, only valid when revertive switching is enabled).'
