document: rfc-7900
kind: protocol-element
summary: The Extranet Source Extended Community is a new Transitive Opaque Extended Community. When a CE attaches it to a BGP route (AFI/SAFI 1/1, 1/2, 1/4, 2/1, 2/2, or 2/4), it signals to the PE that the route represents an extranet C-source and should be exported to other VPNs per the procedures of Sections 4.1–4.3.
section: 4.4.1
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
