document: rfc-7482
kind: interoperability-note
summary: A server receiving a domain query with a mixture of A-labels and U-labels MAY convert all U-labels to A-labels and perform IDNA processing for exact-match lookup, though the response may not match the original input form; alternatively the server MAY refuse to process the query.
section: 3.1.3
topics:
    - dns
    - http
