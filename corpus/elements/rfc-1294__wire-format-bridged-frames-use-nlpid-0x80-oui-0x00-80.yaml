document: rfc-1294
kind: wire-format
summary: Bridged frames use NLPID=0x80, OUI=0x00-80-C2, and a 2-octet PID that identifies both the MAC media type and whether the original LAN FCS is preserved. PIDs 0x00-01 through 0x00-05 include FCS; 0x00-07 through 0x00-0B omit it; 0x00-0E identifies BPDUs.
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
