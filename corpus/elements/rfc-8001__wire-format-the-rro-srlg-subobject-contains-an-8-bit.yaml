document: rfc-8001
kind: wire-format
summary: The RRO SRLG Subobject contains an 8-bit Type field, an 8-bit Length field (total octets including Type and Length), a 1-bit Direction bit (D-bit), a 15-bit Reserved field, and one or more 4-octet SRLG ID fields. The D-bit distinguishes upstream (set) from downstream (unset) SRLGs.
section: "4.2"
topics:
