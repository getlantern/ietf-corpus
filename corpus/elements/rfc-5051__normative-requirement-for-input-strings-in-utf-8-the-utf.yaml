document: rfc-5051
kind: normative-requirement
summary: For input strings in UTF-8, the UTF-8 sequence MUST be valid according to the rules of RFC 3629; overlong UTF-8 sequences are invalid. If an invalid sequence occurs, conversion ceases, partial results are discarded, and the original string is used unchanged with the i;octet comparator.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
