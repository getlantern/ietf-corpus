document: rfc-9336
kind: protocol-element
summary: This document defines the KeyPurposeId id-kp-documentSigning (OID 1.3.6.1.5.5.7.3.36) for use in the Extended Key Usage extension of X.509 certificates. It indicates that the public key has been certified for cryptographic operations on contents consumed by people in printable or displayable form.
