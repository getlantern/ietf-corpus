document: rfc-2920
kind: normative-requirement
summary: Clients MUST NOT confuse responses to multiple commands with multiline responses. Each command requires one or more lines of response, with the last line not containing a dash between the response code and the response string.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - email
