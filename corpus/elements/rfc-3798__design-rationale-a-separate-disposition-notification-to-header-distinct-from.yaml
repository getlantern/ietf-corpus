document: rfc-3798
kind: design-rationale
summary: A separate Disposition-Notification-To header (distinct from the message From) is provided to allow a third party to receive MDNs, supporting delegation and automated processing scenarios. This richer functionality than most foreign mail systems requires special gateway handling when the notification address differs from the sender.
section: "8.3"
topics:
    - email
