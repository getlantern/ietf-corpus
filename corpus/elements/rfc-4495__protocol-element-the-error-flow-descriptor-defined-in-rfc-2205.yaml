document: rfc-4495
kind: protocol-element
summary: The error flow descriptor (defined in RFC 2205 and RFC 2210) is used in partial failure scenarios to carry a flowspec indicating the highest average and peak rates the preempting router can accept in the next RESV message. The deaggregator must reduce its reservation to at or below that value.
section: "5.2"
topics:
    - qos
    - realtime
