document: rfc-6004
kind: wire-format
summary: The L2 Control Protocol (L2CP) TLV has Type=3 and Length=8, containing a 4-bit Ingress L2CP (IL2CP) field, a 4-bit Egress L2CP (EL2CP) field, and 24 reserved bits. It is carried within RFC 6003 traffic parameters in FLOWSPEC and TSPEC objects.
