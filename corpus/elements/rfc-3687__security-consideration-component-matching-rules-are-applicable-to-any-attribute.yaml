document: rfc-3687
kind: security-consideration
summary: Component matching rules are applicable to any attribute syntax, so their support in a directory server may allow searching of attributes that were previously unsearchable due to a lack of applicable matching rules. Such attribute types ought to be protected with appropriate access controls. The document notes that a generic interoperable access control mechanism for LDAP/X.500 had not yet been developed at time of publication.
section: "8"
topics:
    - ldap
    - security
