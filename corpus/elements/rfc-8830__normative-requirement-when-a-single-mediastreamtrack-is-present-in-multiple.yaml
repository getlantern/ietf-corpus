document: rfc-8830
kind: normative-requirement
summary: When a single MediaStreamTrack is present in multiple MediaStreams, there may be multiple 'msid' attributes in a single media description. In this case, the value of 'msid-appdata' MUST be identical for all occurrences.
section: "2"
rfc2119_level: MUST
topics:
