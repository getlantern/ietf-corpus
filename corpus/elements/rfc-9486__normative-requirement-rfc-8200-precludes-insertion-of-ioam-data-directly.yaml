document: rfc-9486
kind: normative-requirement
summary: RFC 8200 precludes insertion of IOAM data directly into the original IPv6 header of in-flight packets. IOAM deployments that encapsulate/decapsulate on transit nodes (not hosts) MUST add an additional IPv6 header to carry IOAM data.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
