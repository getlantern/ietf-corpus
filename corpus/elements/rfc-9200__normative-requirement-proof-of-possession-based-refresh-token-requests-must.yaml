document: rfc-9200
kind: normative-requirement
summary: Proof-of-possession-based refresh token requests MUST NOT request different proof-of-possession keys or different audiences. Refresh tokens can only obtain access tokens bound to the same PoP key and audience as the initial token request.
section: 5.8.1
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
