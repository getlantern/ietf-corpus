document: rfc-8205
kind: state-machine
summary: 'BGPsec UPDATE validation produces one of two states: ''Valid'' or ''Not Valid''. A Signature_Block is ''Valid'' if all its Signature Segments pass cryptographic verification. The UPDATE message is deemed ''Valid'' if at least one Signature_Block is marked ''Valid''; otherwise it is ''Not Valid''.'
section: "5.2"
topics:
    - bgp
    - routing
    - security
    - crypto
