document: rfc-8949
kind: wire-format
summary: Decimal fractions (tag 4) and bigfloats (tag 5) encode as a two-element array [exponent, mantissa]; tag 4 value is m*(10^e), tag 5 value is m*(2^e). The exponent MUST be encoded as major type 0 or 1; the mantissa may also be a bignum.
section: 3.4.4
rfc2119_level: MUST
