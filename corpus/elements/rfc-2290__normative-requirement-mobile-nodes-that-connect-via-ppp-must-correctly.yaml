document: rfc-2290
kind: normative-requirement
summary: Mobile nodes that connect via PPP MUST correctly implement PPP's IPCP and MUST be prepared to renegotiate IPCP at any time, including renegotiating the IP-Address and Mobile-IPv4 options, because movement will likely change the PPP peer.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
