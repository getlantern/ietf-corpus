document: rfc-7516
kind: normative-requirement
summary: Even if a JWE can be successfully decrypted, unless the algorithms used are acceptable to the application, it SHOULD consider the JWE to be invalid. Algorithm acceptability is an application-level decision.
section: "5.2"
rfc2119_level: SHOULD
