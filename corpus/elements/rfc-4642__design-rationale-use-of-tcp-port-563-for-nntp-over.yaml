document: rfc-4642
kind: design-rationale
summary: Use of TCP port 563 for NNTP-over-TLS (where TLS negotiation begins immediately upon connection) is discouraged in favor of STARTTLS on the standard NNTP port, for the reasons documented in RFC 2595 Section 7 regarding dedicated 'secure' ports.
section: "1"
topics:
    - tls
