document: rfc-5101
kind: security-consideration
summary: IPFIX Collectors are vulnerable to DoS attacks via flooding of IPFIX messages and injection of spoofed messages that distort Sequence Numbers or corrupt Template mappings. Protection requires network-level provisioning, rate limiting, and authenticated transport sessions.
section: "11.4"
topics:
