document: rfc-9628
kind: wire-format
summary: Layer indices occupy one octet (flexible mode) or two octets (non-flexible mode). The octet encodes TID (3 bits, temporal-layer ID), U (1 bit, switching up point), SID (3 bits, spatial-layer ID), and D (1 bit, inter-layer dependency used). Non-flexible mode adds an 8-bit TL0PICIDX field.
section: "4.2"
topics:
