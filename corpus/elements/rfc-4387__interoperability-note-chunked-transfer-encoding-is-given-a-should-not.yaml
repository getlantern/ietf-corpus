document: rfc-4387
kind: interoperability-note
summary: Chunked transfer encoding is given a SHOULD NOT rather than MUST NOT because many versions of Apache web server use it unnecessarily; clients that choose not to support chunked encoding may encounter problems with Apache-based HTTP certificate stores.
