document: rfc-2284
kind: protocol-element
summary: The Generic Token Card type (6) supports token card devices requiring user input. The Request contains an ASCII text message; the Response contains the token card information needed for authentication. Both Request and Response Type-Data lengths are derived from the EAP Length field and MUST NOT be null-terminated.
section: "3.6"
topics:
    - security
