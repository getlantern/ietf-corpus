document: rfc-8640
kind: normative-requirement
summary: A solution MUST reply with <rpc-error> containing error-tag 'operation-not-supported' if an 'establish-subscription' request is received on a NETCONF session where an RFC 5277 <create-subscription> has already successfully created a subscription.
section: "3"
rfc2119_level: MUST
topics:
