document: rfc-8434
kind: normative-requirement
summary: The metadata server MUST be able to service the client's I/O requests if the client directs them to the metadata server instead of to the storage device, including retrieving data from constituent storage devices and presenting it to the client. Even after granting a layout, clients MAY still send I/O requests to the metadata server.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
