document: rfc-5908
kind: wire-format
summary: The NTP_SUBOPTION_MC_ADDR suboption (code 2) carries the IPv6 multicast group address used by NTP on the local network. It has a fixed suboption-len of 16 bytes containing the 128-bit multicast IPv6 address.
section: "4.2"
topics:
