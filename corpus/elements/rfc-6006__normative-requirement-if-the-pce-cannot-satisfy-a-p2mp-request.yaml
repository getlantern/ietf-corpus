document: rfc-6006
kind: normative-requirement
summary: If the PCE cannot satisfy a P2MP request due to insufficient memory, it MUST send a PCErr with Error-Type=16, Error-Value=1 and cancel the request. Error-Type=16 covers all P2MP capability errors.
section: "3.15"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
