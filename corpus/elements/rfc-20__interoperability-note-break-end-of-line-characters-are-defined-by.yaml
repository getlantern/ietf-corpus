document: rfc-20
kind: interoperability-note
summary: Break (end-of-line) characters are defined by the receiving remote host, not by a global standard; SRI uses period (ASCII 2/14) while UCLA uses carriage return (0/13). Implementations must negotiate or be configured for the remote host's convention.
