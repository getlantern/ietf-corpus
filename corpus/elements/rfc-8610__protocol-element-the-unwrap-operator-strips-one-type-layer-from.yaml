document: rfc-8610
kind: protocol-element
summary: The unwrap operator '~' strips one type layer from a named map, array, or tag type, exposing the underlying group (for maps/arrays) or inner type (for tags). This allows re-use of named definitions inline without introducing extra nesting, analogous to inheritance.
section: "3.7"
topics:
