document: rfc-9000
kind: normative-requirement
summary: Connection IDs MUST NOT contain any information that an external observer can use to correlate them with other connection IDs for the same connection; the same connection ID MUST NOT be issued more than once on the same connection.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - quic
    - privacy
