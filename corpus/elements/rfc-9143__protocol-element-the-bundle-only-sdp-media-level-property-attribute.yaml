document: rfc-9143
kind: protocol-element
summary: The 'bundle-only' SDP media-level property attribute signals that the associated 'm=' section must be accepted only if kept within the BUNDLE group. It is defined exclusively for bundled 'm=' sections with a zero port value; if received in a non-bundled 'm=' section, it MUST be discarded.
