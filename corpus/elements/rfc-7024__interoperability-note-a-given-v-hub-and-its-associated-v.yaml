document: rfc-7024
kind: interoperability-note
summary: A given V-hub and its associated V-spoke(s) MUST be in the same Autonomous System. When VPN VRFs span multiple ASes, V-hubs may be spread across ASes, but the hub-spoke pairing is intra-AS only.
section: "1"
topics:
