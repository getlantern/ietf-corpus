document: rfc-5066
kind: protocol-element
summary: 'efmCuPortStatusTable provides live (non-persistent) per-PCS status: a BITS fault status object (efmCuFltStatus covering noPeer, peerPowerLoss, pmeSubTypeMismatch, lowRate), port side (subscriber/-R or office/-O), number of aggregated PMEs, and a suite of PAF fragment error counters (InErrors, InSmallFragments, InLargeFragments, InBadFragments, InLostFragments, InLostStarts, InLostEnds, InOverflows).'
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
