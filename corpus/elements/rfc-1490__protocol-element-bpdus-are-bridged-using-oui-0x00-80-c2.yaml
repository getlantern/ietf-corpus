document: rfc-1490
kind: protocol-element
summary: BPDUs are bridged using OUI 0x00-80-C2 and PID 0x00-0E, identifying them as Bridge Protocol Data Units as defined by IEEE 802.1(d) or 802.1(g). The BPDU frame does not carry a preserved LAN FCS field.
section: "4.2"
