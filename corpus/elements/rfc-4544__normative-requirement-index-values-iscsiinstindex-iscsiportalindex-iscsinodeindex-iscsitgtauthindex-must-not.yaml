document: rfc-4544
kind: normative-requirement
summary: Index values (iscsiInstIndex, iscsiPortalIndex, iscsiNodeIndex, iscsiTgtAuthIndex) must not be modified or reused by an agent unless a reboot has occurred. Agents should attempt to keep these values persistent across reboots.
section: "7"
rfc2119_level: SHOULD
