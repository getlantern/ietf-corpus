document: rfc-5090
kind: design-rationale
summary: The existing RADIUS User-Password and CHAP attributes cannot carry HTTP Digest credentials because the RADIUS client does not receive a cleartext password from the HTTP-style client, and the CHAP algorithm is incompatible with HTTP Digest.
section: "1.3"
topics:
