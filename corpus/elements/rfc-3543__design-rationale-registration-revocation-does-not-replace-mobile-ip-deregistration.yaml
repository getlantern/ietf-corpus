document: rfc-3543
kind: design-rationale
summary: 'Registration revocation does not replace Mobile IP deregistration because the purposes are fundamentally different: deregistration is used by the mobile node to inform its home agent that it has roamed home, while revocation is used between mobility agents to signal termination of bindings.'
section: "1"
topics:
    - mobility
