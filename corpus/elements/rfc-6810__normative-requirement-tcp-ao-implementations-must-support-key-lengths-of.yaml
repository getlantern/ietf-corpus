document: rfc-6810
kind: normative-requirement
summary: TCP-AO implementations MUST support key lengths of at least 80 printable ASCII bytes and hexadecimal sequences of at least 32 characters. MAC lengths of at least 96 bits MUST be supported per RFC 5925 Section 5.1. The cryptographic algorithms described in RFC 5926 MUST be supported.
section: "7.4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
    - tcp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
