document: rfc-3931
kind: normative-requirement
summary: 'An implementation MUST implement at least one of the specified methods for managing MTU mismatches: controlling source MTU via ICMP, configuring sufficient path MTU, fragmenting IP packets before L2TP encapsulation, or fragmenting the resulting L2TP/IP packet.'
section: 4.1.4
rfc2119_level: MUST
