document: rfc-7598
kind: protocol-element
summary: OPTION_S46_CONT_MAPE (code 94) is the MAP-E container option grouping all rules and port parameters for a MAP-E domain. It MUST contain at least one OPTION_S46_RULE and at least one OPTION_S46_BR option.
