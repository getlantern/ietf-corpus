document: rfc-2334
kind: normative-requirement
summary: If an LS receives a CSU whose Receiver ID is neither the LS's LSID nor all-0xFFs, the CSU MUST be discarded and ignored, because the LS may be a leaf on a point-to-multipoint connection.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
