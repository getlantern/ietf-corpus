document: rfc-4730
kind: protocol-element
summary: 'KPML defines three subscription types via the ''persist'' attribute on the <pattern> element: ''one-shot'' (terminates after first match), ''persist'' (continuous-notify, remains active and fires on every match), and ''single-notify'' (fires once then waits for a new subscription request before firing again, enabling lock-step digit collection).'
section: "3.1"
topics:
    - sip
    - realtime
