document: rfc-6754
kind: normative-requirement
summary: A router supporting this specification SHOULD NOT send ECMP Redirects on interfaces in an ECMP bundle if any neighbor in that bundle does not advertise the ECMP Redirect Hello Option; however, it SHOULD still process received ECMP Redirects on those interfaces.
section: "5.4"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
