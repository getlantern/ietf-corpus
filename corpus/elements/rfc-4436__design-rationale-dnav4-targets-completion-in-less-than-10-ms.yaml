document: rfc-4436
kind: design-rationale
summary: DNAv4 targets completion in less than 10 ms for effective low-latency handoffs. An IPv4 ARP packet on Ethernet is just 42 octets including the Ethernet header, making unsuccessful trials inexpensive, so the best strategy is to try all candidate configurations rather than apply heuristics.
section: "1.1"
