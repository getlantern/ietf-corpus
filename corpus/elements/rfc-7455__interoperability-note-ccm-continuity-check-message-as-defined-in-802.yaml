document: rfc-7455
kind: interoperability-note
summary: CCM (Continuity Check Message) as defined in 802.1Q can be used in TRILL without modification because the MAID (48 bytes) and MEP-ID (2 bytes) fields are technology-independent; TRILL-specific information is carried via optional TLVs appended to the standard CCM format.
section: "7"
