document: rfc-5891
kind: design-rationale
summary: IDNA does not require any changes to DNS servers, resolvers, or DNS protocol elements because the ASCII name service provided by the existing DNS is sufficient. A-labels serve as the DNS-compatible representation of internationalized labels.
