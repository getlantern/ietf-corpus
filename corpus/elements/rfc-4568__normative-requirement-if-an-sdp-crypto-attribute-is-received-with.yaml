document: rfc-4568
kind: normative-requirement
summary: If an SDP crypto attribute is received with an unknown session parameter that is not prefixed with '-', that crypto attribute MUST be considered invalid. New session parameters prefixed with '-' are optional and MAY be ignored.
section: 6.3.7
rfc2119_level: MUST
topics:
    - realtime
    - security
