document: rfc-5640
kind: wire-format
summary: The Load-Balancing Block sub-TLV has sub-TLV type 5, a fixed 2-octet length field, and a 2-octet value field encoding the block size in bits. The block is determined by extracting the initial 'block size' bits from the encapsulation header's load-balancing field (e.g., L2TPv3 Session ID or GRE Key).
section: "2"
topics:
