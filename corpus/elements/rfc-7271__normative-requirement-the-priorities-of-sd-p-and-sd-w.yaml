document: rfc-7271
kind: normative-requirement
summary: The priorities of SD-P and SD-W SHALL be equal. Once a switch has been completed due to SD on one path, it will not be overridden by SD on the other path (first-come, first-served), avoiding protection switching that cannot improve signal quality.
section: "7.3"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
