document: rfc-5222
kind: design-rationale
summary: Two mandatory baseline location profiles (geodetic-2d and civic) are defined rather than a single universal profile because civic and geodetic location information are fundamentally different in nature; mixing them in a single request would require separate requests anyway, and the two-profile baseline ensures all conformant implementations share common ground.
