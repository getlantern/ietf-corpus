document: rfc-1172
kind: protocol-element
summary: 'Successful negotiation of the Authentication-Type option inserts an Authentication phase into LCP: after the Link Quality Determination phase and before Network Layer Protocol Configuration Negotiation. Advancement to the next phase MUST NOT occur until the peer is successfully authenticated.'
section: "2.3"
topics:
    - security
