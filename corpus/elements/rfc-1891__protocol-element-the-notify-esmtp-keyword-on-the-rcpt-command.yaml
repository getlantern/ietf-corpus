document: rfc-1891
kind: protocol-element
summary: The NOTIFY esmtp-keyword on the RCPT command specifies DSN generation conditions. Its value is either 'NEVER' (alone) or a comma-separated list of 'SUCCESS', 'FAILURE', and/or 'DELAY' (case-insensitive). Absence of NOTIFY may be treated as NOTIFY=FAILURE or NOTIFY=FAILURE,DELAY.
section: "5.1"
topics:
