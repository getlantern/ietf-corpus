document: rfc-4242
kind: protocol-element
summary: IRT_MINIMUM is defined as 600 seconds and sets a floor on the refresh time a client will use, even if the server sends a smaller value. This protects against attacks using artificially short refresh times.
section: "3.1"
topics:
    - ip
    - v6ops
    - security
