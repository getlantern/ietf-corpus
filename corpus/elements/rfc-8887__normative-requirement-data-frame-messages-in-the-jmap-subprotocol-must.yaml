document: rfc-8887
kind: normative-requirement
summary: Data frame messages in the JMAP subprotocol MUST be text frames containing UTF-8 encoded data. Fragmented WebSocket messages (split over multiple text frames) MUST be coalesced prior to parsing them as JSON objects.
section: "4.3"
rfc2119_level: MUST
topics:
    - websocket
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
