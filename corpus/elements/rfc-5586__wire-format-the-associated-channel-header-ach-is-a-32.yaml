document: rfc-5586
kind: wire-format
summary: The Associated Channel Header (ACH) is a 32-bit header with the first nibble fixed to 0001b, a Version field set to 0, an 8-bit Reserved field (bits 8-15, MUST be zero), and a 16-bit Channel Type field (bits 16-31) in network byte order.
section: "2.1"
