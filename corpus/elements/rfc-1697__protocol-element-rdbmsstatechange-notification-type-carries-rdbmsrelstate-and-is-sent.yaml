document: rfc-1697
kind: protocol-element
summary: rdbmsStateChange NOTIFICATION-TYPE carries rdbmsRelState and is sent when a database/server relationship transitions to a less accessible state. Both active(2) and available(3) are considered fully accessible; the trap includes the new, less accessible state.
