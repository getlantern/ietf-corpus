document: rfc-2806
kind: normative-requirement
summary: All phone numbers SHOULD always be written in international form (beginning with '+', country code, then national significant number per E.123/E.164) unless there is a specific reason to use local form. International numbers have the property of being unambiguous everywhere when the user-agent is correctly configured.
section: 2.5.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
