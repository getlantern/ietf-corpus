document: rfc-8285
kind: security-consideration
summary: Extension usage is negotiated using SDP Offer/Answer, so integrity protection and end-to-end authentication MUST be implemented per RFC 3264 to prevent extension-usage blocking. Integrity protection SHOULD be used to prevent DoS attacks such as modification of header extensions.
section: "9"
rfc2119_level: MUST
topics:
    - rtp
    - security
    - realtime
