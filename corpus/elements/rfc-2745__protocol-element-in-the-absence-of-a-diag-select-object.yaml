document: rfc-2745
kind: protocol-element
summary: In the absence of a DIAG_SELECT object, each node appends a default DIAG_RESPONSE containing SENDER_TSPEC, FILTER_SPEC, FLOWSPEC, and STYLE objects. Reservation-state objects (FLOWSPEC, FILTER_SPEC, STYLE) are omitted if no reservation state exists for the session.
