document: rfc-9291
kind: protocol-element
summary: The 'vpws-service-instance' container (present only for VPWS-EVPN VPN type) configures local and remote VPWS Service Instance (VSI) identifiers per RFC 8214. Each VSI can be directly assigned (uint32) or auto-assigned from a named pool or fully automatically; auto-assigned values are available as read-only leaves.
