document: rfc-5306
kind: protocol-element
summary: A new Restart TLV (Type 211) is defined for inclusion in IS-IS Hello (IIH) PDUs. It carries three flag bits (RR, RA, SA), a 2-octet Remaining Time field, and an optional Restarting Neighbor System ID field. Routers supporting this capability MUST include this TLV in all IIHs.
section: "3.2"
topics:
    - routing
