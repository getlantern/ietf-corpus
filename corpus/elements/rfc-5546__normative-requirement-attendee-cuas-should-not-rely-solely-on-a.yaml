document: rfc-5546
kind: normative-requirement
summary: Attendee CUAs SHOULD NOT rely solely on a change in SEQUENCE number as a means of detecting a significant change. Instead, CUAs SHOULD compare the old and new versions of calendar components directly and determine the exact nature of changes before deciding whether to notify the user.
section: 2.1.4
rfc2119_level: SHOULD NOT
topics:
    - email
