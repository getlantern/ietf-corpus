document: rfc-4610
kind: design-rationale
summary: Anycast-RP has traditionally required MSDP for source discovery across RPs. This specification extends the PIM Register mechanism to replicate Register messages among Anycast-RP set members, eliminating the MSDP dependency for intra-domain Anycast-RP.
section: "1"
topics:
    - multicast
    - routing
