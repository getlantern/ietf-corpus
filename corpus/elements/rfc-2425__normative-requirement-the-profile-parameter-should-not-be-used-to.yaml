document: rfc-2425
kind: normative-requirement
summary: The 'profile' parameter SHOULD NOT be used to exclude or require particular pieces of information unless a profile definition specifically calls for this behavior. Unless specifically forbidden by a profile, a text/directory content type can contain arbitrary attribute/value pairs.
section: "5.4"
rfc2119_level: SHOULD NOT
