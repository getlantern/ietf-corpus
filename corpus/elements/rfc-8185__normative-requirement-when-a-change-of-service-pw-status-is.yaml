document: rfc-8185
kind: normative-requirement
summary: When a change of service PW status is detected, the dual-homing PE MUST reflect it in the PW Status TLV and send it to the other dual-homing PE as quickly as possible using three consecutive DHC messages. After the three rapid messages, it MUST send the most recently transmitted status periodically on a continual basis.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
