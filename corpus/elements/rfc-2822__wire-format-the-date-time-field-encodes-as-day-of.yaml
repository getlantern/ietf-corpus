document: rfc-2822
kind: wire-format
summary: The date-time field encodes as `[ day-of-week "," ] day month year FWS time FWS zone`, where zone is `("+" / "-") 4DIGIT` representing UTC offset in hours and minutes (e.g., +0530). The form "+0000" SHOULD indicate UTC.
