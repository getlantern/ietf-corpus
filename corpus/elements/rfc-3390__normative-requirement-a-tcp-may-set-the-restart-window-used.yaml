document: rfc-3390
kind: normative-requirement
summary: A TCP MAY set the restart window (used after a long idle period) to the minimum of the initial window value and the current cwnd; using a larger restart window MUST NOT increase the size of cwnd.
section: "1"
rfc2119_level: MAY
topics:
    - tcp
    - congestion
