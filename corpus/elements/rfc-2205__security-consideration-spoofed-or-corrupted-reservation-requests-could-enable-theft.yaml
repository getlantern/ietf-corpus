document: rfc-2205
kind: security-consideration
summary: Spoofed or corrupted reservation requests could enable theft of service or denial of service by locking up network resources. RSVP protects against such attacks with hop-by-hop INTEGRITY objects using a keyed cryptographic digest (shared secret between RSVP neighbors) as specified in [Baker96]; until key management infrastructure is available, manual key configuration is required.
section: "2.8"
topics:
    - security
    - qos
    - crypto
