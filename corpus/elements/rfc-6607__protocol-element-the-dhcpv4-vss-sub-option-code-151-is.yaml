document: rfc-6607
kind: protocol-element
summary: The DHCPv4 VSS sub-option (code 151) is carried inside the Relay Agent Information option (RFC 3046) and conveys VSS information from a relay agent to a DHCPv4 server. It shares the same Type-and-VSS-information payload format as the DHCPv4 option. Minimum length is 1 octet.
section: "3.2"
topics:
