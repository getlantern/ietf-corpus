document: rfc-8353
kind: protocol-element
summary: GSS Status Codes are static integer constants in GSSException ranging from BAD_BINDINGS (1) to NAME_NOT_MN (18) for fatal generic errors, plus DUPLICATE_TOKEN (19), OLD_TOKEN (20), UNSEQ_TOKEN (21), and GAP_TOKEN (22) which are fatal only during context establishment and supplementary during per-message calls.
