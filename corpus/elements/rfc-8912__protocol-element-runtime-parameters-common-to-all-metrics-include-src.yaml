document: rfc-8912
kind: protocol-element
summary: 'Runtime Parameters common to all metrics include: Src (IP address of source host, IPv4 or IPv6 format per RFC 6991), Dst (IP address of destination host), T0 (measurement interval start time in RFC 3339 date-time UTC format; when all-zeros, Tf is interpreted as duration), and Tf (measurement interval end time in RFC 3339 date-time UTC format).'
