document: rfc-9186
kind: normative-requirement
summary: The MultipointHead MUST set the TTL or Hop Limit to 255 when transmitting BFD Control packets, and received BFD Control packets demultiplexed to the session MUST be discarded if TTL or Hop Limit is not equal to 255.
section: "2.3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
