document: rfc-9555
kind: design-rationale
summary: The vCard GENDER property has no direct IANA-registered JSContact counterpart; implementors should use the Card's speakToAs property or the new RFC 9554 GRAMGENDER/PRONOUNS properties instead, and may preserve GENDER verbatim via vCardProps. This reflects the richer grammatical-gender model in JSContact.
section: 2.5.3
topics:
    - json
