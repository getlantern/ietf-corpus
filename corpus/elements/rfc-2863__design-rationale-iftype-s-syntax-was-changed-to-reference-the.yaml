document: rfc-2863
kind: design-rationale
summary: ifType's syntax was changed to reference the IANAifType textual convention defined in a separate document so that new interface type values can be assigned by IANA without requiring re-issue of the IF-MIB. Previously, adding enumerated values necessitated a full MIB revision, which historically occurred only every several years.
section: 3.1.10
