document: rfc-4467
kind: protocol-element
summary: The INTERNAL authorization mechanism uses a server-chosen token generation algorithm (HMAC-SHA1 recommended at time of writing) and does not involve disclosure of the mailbox access key to the client. The server SHOULD incorporate a means of identifying the token generation algorithm within the token to allow future algorithm changes.
section: 2.4.1
topics:
    - email
    - security
    - crypto
