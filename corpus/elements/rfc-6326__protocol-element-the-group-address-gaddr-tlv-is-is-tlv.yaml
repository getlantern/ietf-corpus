document: rfc-6326
kind: protocol-element
summary: The Group Address (GADDR) TLV, IS-IS TLV type 142, is carried only in LSP PDUs and contains sub-TLVs advertising multicast group listeners. Its sub-TLVs form a new sub-TLV series distinct from other IS-IS sub-TLV sequences.
