document: rfc-7700
kind: normative-requirement
summary: After enforcement, the entity MUST ensure that the resulting nickname is not zero bytes in length. This check is performed after applying rules because an initially non-empty internationalized string may canonicalize to zero length.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
