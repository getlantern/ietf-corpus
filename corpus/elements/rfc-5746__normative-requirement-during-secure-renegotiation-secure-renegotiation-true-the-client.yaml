document: rfc-5746
kind: normative-requirement
summary: During secure renegotiation (secure_renegotiation=TRUE), the client MUST include `renegotiation_info` with the saved `client_verify_data` in the ClientHello, MUST NOT include the SCSV, and MUST verify that the ServerHello's `renegotiated_connection` field equals the concatenation of `client_verify_data` and `server_verify_data`. Failure on any check MUST cause handshake abort.
section: "3.5"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
