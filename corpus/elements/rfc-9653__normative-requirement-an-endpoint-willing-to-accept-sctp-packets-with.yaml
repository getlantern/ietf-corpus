document: rfc-9653
kind: normative-requirement
summary: An endpoint willing to accept SCTP packets with an incorrect checksum of zero MUST include the Zero Checksum Acceptable Chunk Parameter indicating the alternate error detection method in the INIT or INIT ACK chunk it sends.
section: "5.1"
rfc2119_level: MUST
topics:
    - sctp
