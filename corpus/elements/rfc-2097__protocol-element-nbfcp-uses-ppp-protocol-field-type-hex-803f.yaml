document: rfc-2097
kind: protocol-element
summary: NBFCP uses PPP protocol field type hex 803F for control packets. NBF datagrams are encapsulated with protocol field type hex 003F. Only LCP codes 1 through 7 are used; other codes should result in Code-Rejects.
