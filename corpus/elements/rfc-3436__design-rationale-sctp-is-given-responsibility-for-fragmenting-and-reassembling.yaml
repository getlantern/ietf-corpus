document: rfc-3436
kind: design-rationale
summary: SCTP is given responsibility for fragmenting and reassembling TLS records to avoid IP-level fragmentation, eliminating the need for TLS to be aware of the MTU. This leverages SCTP's existing fragmentation capability.
section: "3.2"
