document: rfc-9625
kind: normative-requirement
summary: Under OISM, IMET routes for a particular BD are distributed to all PEs attached to the Tenant Domain, not just those attached to that BD. SMET routes are originated per-Tenant-Domain (for the SBD) rather than per-BD, carrying the SBD-RT so every ingress PE learns the interest of every egress PE.
section: 1.5.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
