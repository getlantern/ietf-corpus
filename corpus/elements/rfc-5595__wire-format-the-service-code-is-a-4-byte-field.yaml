document: rfc-5595
kind: wire-format
summary: 'The Service Code is a 4-byte field represented in one of three forms: a decimal number (canonical), a 4-character ASCII string, or an 8-digit hexadecimal number. All IANA-assigned Service Codes must be representable using a subset of the ASCII character set.'
