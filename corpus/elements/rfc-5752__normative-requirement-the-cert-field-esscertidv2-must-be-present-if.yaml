document: rfc-5752
kind: normative-requirement
summary: The cert field (ESSCertIDv2) MUST be present if the bodyHashAlg and signAlg fields in the multiple-signatures attributes of two SignerInfo objects are identical, so that the certificate can disambiguate which SignerInfo is being referenced.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
