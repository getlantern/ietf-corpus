document: rfc-9026
kind: normative-requirement
summary: An Upstream PE MUST be removed from the UMH candidate list for a given (C-S,C-G) if the P-tunnel (I-PMSI or S-PMSI) is leaf-triggered (PIM, mLDP) but the upstream one-hop branch from P to PE cannot be built.
section: 3.1.4
rfc2119_level: MUST
