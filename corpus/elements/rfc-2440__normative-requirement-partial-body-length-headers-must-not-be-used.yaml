document: rfc-2440
kind: normative-requirement
summary: Partial Body Length headers MUST NOT be used for packet types other than literal, compressed, or encrypted data packets. The first partial body length MUST be at least 512 octets. The last length header in any packet MUST NOT be a Partial Body Length header.
section: 4.2.3
rfc2119_level: MUST NOT
topics:
    - security
