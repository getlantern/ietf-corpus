document: rfc-9198
kind: interoperability-note
summary: ICMP-based active methods are not intended to yield accurate, reproducible estimations of the Round-Trip Delay that UDP or TCP packets will experience, because the reverse ICMP path may differ and the ICMP response includes an unknown Host processing-time contribution.
