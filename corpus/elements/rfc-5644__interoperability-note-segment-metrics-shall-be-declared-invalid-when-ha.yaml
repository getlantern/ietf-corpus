document: rfc-5644
kind: interoperability-note
summary: Segment metrics SHALL be declared invalid when Ha or Hb disappears from the path or when their ordering changes due to routing changes; for packet loss, the metric is also invalid when Lk.a=1 but Lk.b=0 (packet unseen at Ha but seen at Hb).
section: 6.1.5
topics:
    - measurement
    - routing
