document: rfc-8666
kind: normative-requirement
summary: When NP-Flag is not set, any upstream neighbor MUST pop the Prefix-SID (penultimate hop popping). When NP-Flag is set and E-Flag is clear, the upstream neighbor MUST keep the Prefix-SID on top of the stack. When both NP-Flag and E-Flag are set, the upstream neighbor MUST replace the Prefix-SID with an Explicit NULL label.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
