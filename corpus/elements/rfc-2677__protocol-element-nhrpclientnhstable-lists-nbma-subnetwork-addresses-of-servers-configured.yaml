document: rfc-2677
kind: protocol-element
summary: nhrpClientNhsTable lists NBMA subnetwork addresses of servers configured for use by a client. By default the agent adds an entry corresponding to the client's default router. nhrpClientNhsInUse (read-only TruthValue) indicates whether an NHS is currently in use.
