document: rfc-7440
kind: security-consideration
summary: TFTP includes no login or access control mechanisms. Care must be taken when using TFTP for file transfers where authentication, access control, confidentiality, or integrity checking are needed, as those services must be supplied above or below the TFTP layer. TFTP file transfers are NOT RECOMMENDED where inherent protocol limitations could raise insurmountable liability concerns.
section: "7"
topics:
    - security
    - realtime
