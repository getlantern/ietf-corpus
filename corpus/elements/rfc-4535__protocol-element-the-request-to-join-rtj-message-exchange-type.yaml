document: rfc-4535
kind: protocol-element
summary: The Request to Join (RTJ) message (exchange type 8) is sent from a potential GM to the GC/KS to request group admission. It contains a Key Creation payload for KEK determination, a Nonce_I for freshness, an optional Mechanism Choices notification, an optional Cookie notification, and the GM's signature with optional certificates.
section: 5.2.1.1
topics:
