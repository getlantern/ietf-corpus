document: rfc-1288
kind: security-consideration
summary: Finger implementations SHOULD be tested against various forms of attack, and an RUIP SHOULD protect itself against malformed inputs. Finger was one avenue exploited by the Morris worm and sits at the security perimeter of a host alongside Telnet, FTP, and SMTP.
section: "3.1"
topics:
