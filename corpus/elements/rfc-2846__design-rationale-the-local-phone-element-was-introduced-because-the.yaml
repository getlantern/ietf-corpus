document: rfc-2846
kind: design-rationale
summary: The local-phone element was introduced because the global-phone (E.164 "+" prefix) numbering scheme does not cover all GSTN dialing scenarios, particularly local or national calls requiring exit codes, long-distance carrier access codes, or access passwords that precede the actual phone number.
