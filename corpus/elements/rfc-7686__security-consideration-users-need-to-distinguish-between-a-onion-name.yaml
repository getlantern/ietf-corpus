document: rfc-7686
kind: security-consideration
summary: Users need to distinguish between a .onion name accessed directly via Tor-capable software versus .onion subdomains of other top-level domains (e.g., the difference between example.onion and example.onion.tld), as the latter do not provide Tor's security properties.
