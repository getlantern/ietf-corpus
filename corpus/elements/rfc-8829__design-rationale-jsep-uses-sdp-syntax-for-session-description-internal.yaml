document: rfc-8829
kind: design-rationale
summary: JSEP uses SDP syntax for session description internal representation despite its poor fit for JavaScript manipulation, because SDP is widely accepted and continually updated with new features. SDP is encapsulated in a SessionDescription object to allow future adoption of alternative encodings (e.g., JSON) without API changes.
section: "3.3"
