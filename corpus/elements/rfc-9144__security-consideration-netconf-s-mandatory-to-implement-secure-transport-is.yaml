document: rfc-9144
kind: security-consideration
summary: NETCONF's mandatory-to-implement secure transport is SSH (RFC 6242); RESTCONF's mandatory-to-implement secure transport is TLS (RFC 8446). All access to the ietf-nmda-compare module MUST occur over these secure transports.
