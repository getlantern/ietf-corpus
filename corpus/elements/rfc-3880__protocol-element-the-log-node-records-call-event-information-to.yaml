document: rfc-3880
kind: protocol-element
summary: The 'log' node records call event information to non-volatile storage identified by an optional logical 'name'. The log name MUST NOT be mapped directly to a filesystem path. A correctly operating server SHOULD NOT allow log operations to fail.
