document: rfc-4701
kind: security-consideration
summary: The DHCID record uses a one-way SHA-256 hash to obscure client identity information. The FQDN is included in the hash computation to prevent tracking a client across multiple domain names by matching hash values.
section: "6"
topics:
    - security
    - dns
    - privacy
