document: rfc-3459
kind: normative-requirement
summary: If the value of the Handling field is OPTIONAL, the content gateway MUST NOT generate a delivery notification. If REQUIRED and a notification was requested, the content gateway MUST generate a notification for the whole message on failure.
section: "5"
rfc2119_level: MUST NOT
