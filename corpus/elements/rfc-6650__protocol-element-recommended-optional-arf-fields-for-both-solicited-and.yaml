summary: 'Recommended optional ARF fields for both solicited and unsolicited reports include: Original-Mail-From (envelope sender), Arrival-Date (receipt timestamp), Source-IP (sending IP address), and Original-Rcpt-To (original recipient). These fields aid automated processing and investigation.'
