document: rfc-2131
kind: normative-requirement
summary: Servers SHOULD probe a newly allocated address (e.g., with ICMP Echo Request) before offering it, and clients SHOULD probe the received address (e.g., with ARP) before using it, to avoid duplicate address assignment.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
