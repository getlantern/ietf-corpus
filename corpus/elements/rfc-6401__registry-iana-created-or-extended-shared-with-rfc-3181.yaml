document: rfc-6401
kind: registry
summary: 'IANA created (or extended, shared with RFC 3181) a Merge Strategy registry for the Merge Strategy field in Admission Priority and Preemption Priority Policy Elements. Values: 0=Reserved, 1=Take priority of highest QoS, 2=Take highest priority, 3=Force Error on heterogeneous merge. Range 0–127 is IETF Review, 128–240 First Come First Served, 241–255 Private Use.'
