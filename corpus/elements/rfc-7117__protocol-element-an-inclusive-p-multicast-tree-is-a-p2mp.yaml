document: rfc-7117
kind: protocol-element
summary: An Inclusive P-multicast tree is a P2MP tree in the SP network that carries all multicast traffic from a specified set of VPLS sites on a given PE, regardless of whether traffic is IP-encapsulated. An Aggregate Inclusive tree carries traffic from more than one VPLS instance on the same tree.
section: "3.1"
topics:
    - mpls
    - multicast
