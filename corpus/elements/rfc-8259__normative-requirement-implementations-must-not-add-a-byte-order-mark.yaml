document: rfc-8259
kind: normative-requirement
summary: Implementations MUST NOT add a byte order mark (U+FEFF) to the beginning of a network-transmitted JSON text. Parsers MAY ignore a BOM rather than treating it as an error.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - json
