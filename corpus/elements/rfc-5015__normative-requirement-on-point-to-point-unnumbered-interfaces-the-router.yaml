document: rfc-5015
kind: normative-requirement
summary: On point-to-point unnumbered interfaces, the router's address SHOULD be the source address chosen for its Hello packet. Additionally, BIDIR-PIM RECOMMENDS accepting PIM messages with a destination address of all zeros on point-to-point links to accommodate unnumbered interfaces.
section: 3.4.1
rfc2119_level: RECOMMENDED
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
