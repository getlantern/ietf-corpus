document: rfc-5761
kind: normative-requirement
summary: When multiplexing RTP and RTCP on a single port, RTP payload type values in the range 64-95 MUST NOT be used. Dynamic RTP payload types SHOULD be chosen in the range 96-127 where possible.
section: "4"
rfc2119_level: MUST NOT
