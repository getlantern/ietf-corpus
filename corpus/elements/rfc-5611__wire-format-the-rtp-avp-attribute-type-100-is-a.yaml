document: rfc-5611
kind: wire-format
summary: The RTP AVP (Attribute Type 100) is a 16-byte AVP carried in ICRQ/OCRQ/ICRP/OCRP messages. It encodes a D bit (timestamping mode), a 7-bit PT (payload type), a C bit (RTP/CW ordering), a 16-bit Timestamp Clock Frequency (in units of 8 KHz), and a 32-bit SSRC field.
section: "2.2"
