document: rfc-4108
kind: normative-requirement
summary: One or more trust anchors MUST be installed in non-volatile memory prior to deployment using a secure process. Each trust anchor MUST consist of a public key signature algorithm, an associated public key, and a public key identifier.
section: 1.2.4
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
