document: rfc-5661
kind: interoperability-note
summary: NFSv4.1 is a separate protocol from NFSv4.0 with no dependencies on it; this document neither updates nor obsoletes RFC 3530. Both minor versions can be used simultaneously on the same network between the same client and server.
section: "1.1"
