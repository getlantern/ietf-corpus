document: rfc-5944
kind: wire-format
summary: 'Mobility Agent Advertisement Extension (Type=16) appended to ICMP Router Advertisement: 8-bit Type, 8-bit Length (6+4*N), 16-bit Sequence Number, 16-bit Registration Lifetime, 16-bit flags (R/B/H/F/M/G/r/T/U/X/I/reserved), followed by N×32-bit Care-of Addresses. At least one care-of address MUST be included when the ''F'' bit is set.'
section: 2.1.1
topics:
    - mobility
    - ip
