summary: The ietf-rift YANG module augments the /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol path from ietf-routing (RFC 8349), conditioned on the routing protocol type being derived from 'rift:rift'. RIFT instances are declared as a keyed list with a unique string 'name', supporting multiple instances per device.
