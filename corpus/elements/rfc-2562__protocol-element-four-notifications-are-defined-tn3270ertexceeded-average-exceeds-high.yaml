document: rfc-2562
kind: protocol-element
summary: 'Four notifications are defined: tn3270eRtExceeded (average exceeds high threshold with statistical significance), tn3270eRtOkay (average falls below low threshold after an exceeded event), tn3270eRtCollStart (collection entry created), and tn3270eRtCollEnd (collection entry deleted or TCP session terminated). All require traps(5) bit set.'
section: "4.3"
