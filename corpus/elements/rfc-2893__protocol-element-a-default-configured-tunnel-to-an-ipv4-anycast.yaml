document: rfc-2893
kind: protocol-element
summary: A default configured tunnel to an IPv4 anycast address allows multiple border routers to advertise reachability to the same IPv4 address, providing redundancy. IPv4 routing delivers traffic to the closest router; care is needed to prevent different IPv4 fragments from arriving at different routers for reassembly.
section: "4.2"
topics:
    - ip
    - v6ops
