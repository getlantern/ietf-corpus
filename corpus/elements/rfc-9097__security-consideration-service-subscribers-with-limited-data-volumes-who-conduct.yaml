document: rfc-9097
kind: security-consideration
summary: Service subscribers with limited data volumes who conduct extensive capacity testing may trigger Service Provider data controls. Testing with Service Provider measurement hosts SHOULD be limited in frequency and overall test traffic volume (range of I values SHOULD be limited).
section: "10"
topics:
