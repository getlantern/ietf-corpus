document: rfc-5692
kind: normative-requirement
summary: Ethernet frames that are broadcast or multicast SHOULD be replicated and carried via unicast transport connections on the IEEE 802.16 access link, since IEEE 802.16 does not define native broadcast and multicast for Ethernet frames.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - multicast
    - ip
