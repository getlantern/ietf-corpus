document: rfc-2141
kind: wire-format
summary: Excluded characters (octets 1–32, `\`, `"`, `&`, `<`, `>`, `[`, `]`, `^`, `` ` ``, `{`, `|`, `}`, `~`, octets 127–255, and null) are explicitly outside the URN character set and MUST be percent-encoded if used. Octet 0 must NEVER appear in any form.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
