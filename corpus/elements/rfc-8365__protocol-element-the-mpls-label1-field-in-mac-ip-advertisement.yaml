document: rfc-8365
kind: protocol-element
summary: The MPLS Label1 field in MAC/IP Advertisement routes, the MPLS label field in Ethernet A-D per EVI routes, and the MPLS label field in the PMSI Tunnel attribute of IMET routes are used to carry the VNI. The entire 24-bit field is used to encode the VNI value for both local and global VNIs.
section: 5.1.3
topics:
