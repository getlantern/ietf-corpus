document: rfc-4875
kind: design-rationale
summary: The solution deliberately avoids requiring a multicast routing protocol in the SP core; instead it relies solely on RSVP-TE for P2MP LSP setup. This allows traffic-engineered multicast trees with explicit resource reservation while remaining decoupled from IP multicast routing.
