summary: Credentials are constructed by concatenating the user-id, a colon (":"), and the password to form 'user-pass', encoding it as an octet sequence, then Base64-encoding the result (RFC 4648 Section 4) to produce a US-ASCII token68 value placed in the Authorization header field.
