document: rfc-9097
kind: normative-requirement
summary: The number of sub-intervals with duration dt MUST be set to a natural number m such that T+I = T + m*dt, and all sub-intervals MUST be of equal duration. Non-overlapping consecutive intervals are the RECOMMENDED implementation.
section: "5.3"
rfc2119_level: MUST
topics:
    - measurement
