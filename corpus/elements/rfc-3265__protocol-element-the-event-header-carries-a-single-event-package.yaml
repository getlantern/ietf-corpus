document: rfc-3265
kind: protocol-element
summary: The 'Event' header carries a single event package name token and an optional 'id' parameter that identifies a specific subscription within a dialog. The event-type portion is compared byte-by-byte; an 'id' parameter never matches an 'Event' header without one.
