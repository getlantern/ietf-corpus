document: rfc-2848
kind: normative-requirement
summary: A SUBSCRIBE request MUST NOT include any sub-parts other than the session description, even if sub-parts were present in the original INVITE. A server MUST ignore whatever sub-parts are included within a SUBSCRIBE request, with the sole exception of the enclosed session description.
section: 3.5.3.1
rfc2119_level: MUST NOT
topics:
    - realtime
    - sip
