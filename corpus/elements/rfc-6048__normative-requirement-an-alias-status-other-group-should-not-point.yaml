document: rfc-6048
kind: normative-requirement
summary: An alias (status '=other.group') SHOULD NOT point to a moderated newsgroup, since articles arriving from peers for the alias are accepted and filed without moderation, effectively bypassing the moderation process.
section: "3.1"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
