document: rfc-4344
kind: wire-format
summary: In SDCTR mode, to encrypt packet P=P1||P2||...||Pn, the encryptor encrypts counter value <X> with the block cipher to obtain block B1, then XORs B1 with P1 to produce ciphertext block C1, incrementing X for each subsequent block. The counter X is not included in the ciphertext.
