document: rfc-9133
kind: normative-requirement
summary: It is RECOMMENDED for a DOTS client to subscribe to asynchronous notifications of attack mitigation status (RFC 9132 Section 4.4.2.1). If not, the polling mechanism in RFC 9132 Section 4.4.2.2 must be followed.
section: 3.2.1
rfc2119_level: RECOMMENDED
topics:
