document: rfc-5015
kind: security-consideration
summary: IPsec transport mode with the Authentication Header (AH) is the recommended method to authenticate BIDIR-PIM messages and prevent forged-message attacks. The specification in PIM-SM [RFC 4601] for authenticating link-local messages applies to all BIDIR-PIM messages as well.
section: "5.3"
topics:
    - security
    - multicast
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
