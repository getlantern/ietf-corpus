document: rfc-9338
kind: normative-requirement
summary: The target structure of the countersignature must have all of its cryptographic functions finalized before computing the countersignature. The ToBeSigned value is produced by encoding the Countersign_structure to a byte string using deterministic CBOR encoding.
section: "3.3"
rfc2119_level: MUST
topics:
    - cbor
    - crypto
