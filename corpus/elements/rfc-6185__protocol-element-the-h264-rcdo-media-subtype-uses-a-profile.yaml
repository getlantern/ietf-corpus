kind: protocol-element
summary: The H264-RCDO media subtype uses a profile-level-id where profile_idc is always 0 (no profile) and only constraint_set0_flag is 1 in the profile-iop byte, reflecting RCDO's compliance with Baseline profile constraints while being distinct from any named profile.
