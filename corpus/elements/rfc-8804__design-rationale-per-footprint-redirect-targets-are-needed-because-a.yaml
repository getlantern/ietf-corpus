document: rfc-8804
kind: design-rationale
summary: 'Per-footprint redirect targets are needed because a dCDN spread across multiple geographies cannot rely solely on Geo DNS: clients using third-party DNS resolvers make client location detection impossible for the redirector, and Geo DNS granularity may be too coarse for application requirements.'
section: "2"
topics:
    - dns
