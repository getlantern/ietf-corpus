document: rfc-6164
kind: normative-requirement
summary: Addresses in which the rightmost 64 bits are assigned the highest 128 values (ffff:ffff:ffff:ff7f through ffff:ffff:ffff:ffff) SHOULD NOT be used as unicast addresses, to avoid colliding with reserved subnet anycast addresses per RFC 2526.
section: "6"
rfc2119_level: SHOULD NOT
topics:
