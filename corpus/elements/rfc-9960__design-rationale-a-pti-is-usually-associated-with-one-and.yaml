document: rfc-9960
kind: design-rationale
summary: 'A PTI is usually associated with one and only one multipoint service at Leaf nodes because it is not always feasible to separate transport and service context with efficient replication in the core: multipoint services may have differing endpoint sets and downstream allocation of service context cannot be encoded in replicated packets.'
section: "4.1"
topics:
