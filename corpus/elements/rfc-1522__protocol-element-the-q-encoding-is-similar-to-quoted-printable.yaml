document: rfc-1522
kind: protocol-element
summary: The 'Q' encoding is similar to Quoted-Printable from RFC 1521. Any 8-bit value may be represented as '=' followed by two uppercase hexadecimal digits; the underscore '_' always represents hexadecimal 20 (SPACE), regardless of SPACE's code position in the character set in use.
