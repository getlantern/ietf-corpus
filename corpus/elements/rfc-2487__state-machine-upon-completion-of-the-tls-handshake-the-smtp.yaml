document: rfc-2487
kind: state-machine
summary: Upon completion of the TLS handshake, the SMTP protocol is reset to initial state (equivalent to after a 220 service ready greeting). The server MUST discard pre-TLS client knowledge and the client MUST discard pre-TLS server knowledge.
