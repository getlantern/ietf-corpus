document: rfc-8853
kind: normative-requirement
summary: An answerer that understands simulcast and wants to support it SHALL reverse directionality of the direction parameters ('send' becomes 'recv' and vice versa). The answerer MUST NOT add alternative rid-ids in the 'send' direction that were not present in the offer's receive direction, and MUST NOT add simulcast streams not present in the offer.
section: 5.3.2
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
