document: rfc-2511
kind: design-rationale
summary: POP is mandated because many non-PKIX operational protocols (e.g., various email protocols) do not explicitly verify the binding between an end entity and a private key. Until such protocols become ubiquitous, certificates cannot be assumed meaningful unless the CA/RA has verified possession.
section: "4"
topics:
