document: rfc-8944
kind: protocol-element
summary: The 'ietf-l2-topology' YANG module augments the generic 'ietf-network' and 'ietf-network-topology' modules (RFC 8345) with L2-specific attributes for networks, nodes, links, and termination points. A new network type 'l2-topology' is introduced as a presence container under 'network-types' to identify L2 topology instances.
