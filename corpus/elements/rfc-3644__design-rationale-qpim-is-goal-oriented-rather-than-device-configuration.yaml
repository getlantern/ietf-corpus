document: rfc-3644
kind: design-rationale
summary: 'QPIM is goal-oriented rather than device-configuration-oriented: the policy writer specifies desired network behavior (e.g., minimum bandwidth for a class), and PDPs or PEPs fill in device-specific details such as queue lengths using their defaults. This separates specification from implementation.'
section: 1.2.1.3
topics:
