document: rfc-9357
kind: interoperability-note
summary: An implementation that does not understand or support the LSP-EXTENDED-FLAG TLV MUST ignore the TLV, as per RFC 5440. Future documents defining bits in the TLV are expected to define error handling for cases where the TLV is missing when it MUST be present.
section: "5"
topics:
