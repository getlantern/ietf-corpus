document: rfc-8983
kind: design-rationale
summary: The existing INTERNAL_ADDRESS_FAILURE error type in RFC 7296 Section 3.15.4 is a catch-all that does not allow an initiator to determine why a given address family was not assigned or whether it should retry with another address family. This gap motivated the introduction of IP4_ALLOWED and IP6_ALLOWED notification status types.
section: "3"
topics:
