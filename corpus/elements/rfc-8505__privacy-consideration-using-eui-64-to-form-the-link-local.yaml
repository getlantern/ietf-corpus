document: rfc-8505
kind: privacy-consideration
summary: Using EUI-64 to form the Link-Local Address Interface Identifier is discouraged because it prevents the use of SEND, CGAs, and other address privacy techniques. Implementations SHOULD follow RFC 8064 and use the RFC 7217 mechanism for generating semantically opaque Interface Identifiers.
section: "8"
topics:
    - privacy
    - ip
    - v6ops
