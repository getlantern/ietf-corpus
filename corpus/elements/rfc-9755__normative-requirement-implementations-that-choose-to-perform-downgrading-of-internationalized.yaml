document: rfc-9755
kind: normative-requirement
summary: Implementations that choose to perform downgrading of internationalized messages for legacy clients SHOULD use one of the standardized algorithms in RFC 6857 (Post-Delivery Message Downgrading) or RFC 6858 (Simplified POP and IMAP Downgrading).
section: "8"
rfc2119_level: SHOULD
