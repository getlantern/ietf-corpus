document: rfc-9080
kind: normative-requirement
summary: If an HNCP node receives a DHCPv4 lease with an IPv4 address and wins the election for NAT gateway, it MUST act as a NAT gateway and MUST announce a nonspecific IPv4 default route over Babel.
