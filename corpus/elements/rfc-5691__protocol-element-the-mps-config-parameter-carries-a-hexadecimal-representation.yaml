document: rfc-5691
kind: protocol-element
summary: The MPS-config parameter carries a hexadecimal representation of the AudioSpecificConfig (ASC) for MPEG Surround, mapped MSB-first. The AOT in this ASC SHALL have value 30, and the SSC inside the ASC MUST have sacPayloadEmbedding set to 1 (for embedded mode).
section: "5.1"
topics:
