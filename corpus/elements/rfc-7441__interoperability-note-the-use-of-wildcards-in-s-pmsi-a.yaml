document: rfc-7441
kind: interoperability-note
summary: The use of wildcards in S-PMSI A-D route NLRIs (as specified in RFC 6625) is defined only for PIM-based customer multicast. Wildcard support when the customer uses mLDP is explicitly out of scope for this document.
