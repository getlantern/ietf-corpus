document: rfc-6010
kind: normative-requirement
summary: In TAMP subordination processing, for each Trust Anchor Update, the constraints of the TAMP message signer MUST be greater than or equal to the constraints of the trust anchor in the update; if they exceed the signer's constraints, the update MUST be rejected.
section: "5"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
