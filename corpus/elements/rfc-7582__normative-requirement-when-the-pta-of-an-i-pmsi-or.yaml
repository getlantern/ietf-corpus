document: rfc-7582
kind: normative-requirement
summary: When the PTA of an I-PMSI or S-PMSI A-D route identifies a BIDIR-PIM tunnel, the originator SHOULD NOT include a PE Distinguisher Labels attribute; if one is present, it MUST be ignored in the data plane and MUST be treated by BGP as an unsupported optional transitive attribute.
section: 3.1.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
