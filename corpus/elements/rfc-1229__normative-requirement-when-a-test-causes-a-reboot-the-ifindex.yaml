document: rfc-1229
kind: normative-requirement
summary: When a test causes a reboot, the ifIndex value assigned to the interface must remain unchanged after the reboot. An agent must reject any test for which it cannot make at least the minimum result information available upon completion.
section: "4.2"
rfc2119_level: MUST
topics:
    - snmp
