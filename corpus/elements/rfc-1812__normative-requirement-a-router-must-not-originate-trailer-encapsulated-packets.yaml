document: rfc-1812
kind: normative-requirement
summary: A router MUST NOT originate trailer-encapsulated packets without first verifying that the immediate destination is willing to accept them, and SHOULD NOT agree to originate such packets. Routers MAY receive and forward trailer-encapsulated Ethernet packets.
section: 3.3.1
rfc2119_level: MUST NOT
topics:
    - ip
