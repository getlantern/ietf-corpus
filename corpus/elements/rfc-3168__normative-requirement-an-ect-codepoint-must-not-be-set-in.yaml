document: rfc-3168
kind: normative-requirement
summary: An ECT codepoint MUST NOT be set in a packet unless the loss of that packet would be detected by the end nodes and interpreted as an indication of congestion. Specifically, 'pure' ACK packets MUST NOT indicate ECN-Capability.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - ecn
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
