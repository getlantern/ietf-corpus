document: rfc-6909
kind: normative-requirement
summary: If the LMA is configured to support IPv4 traffic offload and the PBU includes the IPv4 Traffic Offload Selector option, the LMA MUST enable offload support for that session and the PBA MUST include the IPv4 Traffic Offload Selector option.
section: "3.3"
rfc2119_level: MUST
topics:
    - pcp
    - nat
    - mobility
