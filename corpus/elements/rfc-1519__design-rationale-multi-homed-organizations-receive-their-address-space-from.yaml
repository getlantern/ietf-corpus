document: rfc-1519
kind: design-rationale
summary: Multi-homed organizations receive their address space from a provider but cannot be aggregated because each of their service providers must explicitly advertise them. The routing cost for multi-homed sites under CIDR is therefore similar to the pre-CIDR status quo.
section: "2.1"
topics:
