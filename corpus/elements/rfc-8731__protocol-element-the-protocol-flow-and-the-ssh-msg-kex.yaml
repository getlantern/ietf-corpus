summary: The protocol flow and the SSH_MSG_KEX_ECDH_INIT and SSH_MSG_KEX_ECDH_REPLY messages and the structure of the exchange hash are identical to Section 4 of RFC 5656. The derived shared secret is 32 bytes for "curve25519-sha256" and 56 bytes for "curve448-sha512".
