document: rfc-1604
kind: normative-requirement
summary: frPVCConnectRowStatus MUST be initially set to 'createAndWait'. In that state the agent verifies that the In-parameters of one PVC endpoint equal the Out-parameters of the other endpoint. The agent then supplies the frPVCEndptConnectIdentifier value for the associated endpoint rows.
section: "4.4"
rfc2119_level: MUST
topics:
    - snmp
