document: rfc-5258
kind: normative-requirement
summary: When multiple selection options are specified, the server MUST return information about mailbox names that satisfy every selection option, unless a particular option prescribes special rules (such as RECURSIVEMATCH).
section: "3"
rfc2119_level: MUST
