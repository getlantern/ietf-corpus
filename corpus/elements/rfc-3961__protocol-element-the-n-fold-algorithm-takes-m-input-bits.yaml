document: rfc-3961
kind: protocol-element
summary: The n-fold algorithm takes m input bits and produces n output bits with equal contribution from each input bit by replicating the input to the LCM of n and m bits (rotating right 13 positions before each repetition) and adding successive n-bit chunks using 1's-complement addition. The Constant passed to DR must not be larger than the cipher block size c.
section: "5.1"
