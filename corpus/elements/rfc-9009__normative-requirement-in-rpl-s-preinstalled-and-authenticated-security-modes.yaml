document: rfc-9009
kind: normative-requirement
summary: In RPL's Preinstalled and Authenticated security modes, secure versions of DCO and DCO-ACK messages MUST be used. Secure DCO/DCO-ACK follow the RFC 6550 secure message format wrapping the DCO/DCO-ACK base objects.
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - security
