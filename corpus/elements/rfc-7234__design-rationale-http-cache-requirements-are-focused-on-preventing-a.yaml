document: rfc-7234
kind: design-rationale
summary: HTTP cache requirements are focused on preventing a cache from storing non-reusable responses or reusing stored responses inappropriately, rather than mandating that caches always store and reuse particular responses. Caching is entirely OPTIONAL but reuse is assumed to be the default when no requirement or local configuration prevents it.
section: "2"
topics:
