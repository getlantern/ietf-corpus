document: rfc-7373
kind: protocol-element
summary: Unsigned integer types (unsigned8/16/32/64) may be represented as unprefixed decimal, '0x'-prefixed hexadecimal, or '0b'-prefixed binary strings; leading zeroes are allowed and do not imply octal. For codepoint-semantic IEs, the codepoint name string MAY be used instead.
