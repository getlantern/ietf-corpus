document: rfc-5227
kind: protocol-element
summary: An 'ARP Announcement' is an ARP Request broadcast identical to an ARP Probe except both sender and target IP address fields contain the host's newly selected IPv4 address. It conveys the stronger statement 'This is the address I am now using.'
section: "1.1"
