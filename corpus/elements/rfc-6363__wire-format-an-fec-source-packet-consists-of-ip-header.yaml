document: rfc-6363
kind: wire-format
summary: 'An FEC Source Packet consists of: IP Header, Transport Header, Application Data Unit, and an optional Explicit Source FEC Payload ID field appended at the end. The Explicit Source FEC Payload ID is placed last so that ROHC header compression can still be applied to the inner protocol headers.'
section: "5.3"
