document: rfc-1653
kind: normative-requirement
summary: A successful 250 reply to the extended MAIL command is not an absolute guarantee that the message transfer will succeed. Clients must still be prepared to handle 452 and 552 reply codes after the DATA command or after message transfer.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
