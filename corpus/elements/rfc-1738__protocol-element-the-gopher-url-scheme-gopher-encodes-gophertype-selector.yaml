document: rfc-1738
kind: protocol-element
summary: The Gopher URL scheme (`gopher://`) encodes gophertype, selector, optional search string, and optional Gopher+ string in the path, with tab characters encoded as '%09'. Default port is 70. Gopher+ extensions use a second '%09'-delimited field.
