document: rfc-8422
kind: protocol-element
summary: 'Three ECC-based key exchange algorithms are defined: ECDHE_ECDSA (ephemeral ECDH with ECDSA or EdDSA signatures), ECDHE_RSA (ephemeral ECDH with RSA signatures), and ECDH_anon (anonymous ephemeral ECDH, no signatures). All use ephemeral ECDH to compute the TLS premaster secret and provide forward secrecy when ephemeral keys are freshly generated and destroyed after use.'
