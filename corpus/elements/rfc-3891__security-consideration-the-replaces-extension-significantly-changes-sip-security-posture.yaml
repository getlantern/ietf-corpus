document: rfc-3891
kind: security-consideration
summary: 'The Replaces extension significantly changes SIP security posture: an eavesdropper who learns Call-ID, To, and From headers of a dialog can now use the Replaces header to disconnect or replace participants, unlike in baseline SIP where Digest or end-to-end integrity would protect against this. Proper authentication and authorization of replacement requests is therefore critical.'
section: "8"
topics:
    - sip
    - realtime
    - security
