document: rfc-1549
kind: design-rationale
summary: The physical layer MAY be decoupled from the data link layer, hiding transient physical transport details. This enables mobility in cellular radio networks where an implementation may treat an entire zone as a single link across multiple cell frequencies, but the link SHOULD re-establish its configuration when switched to a different administration.
section: "2"
extracted_by: claude-sonnet-4-6
