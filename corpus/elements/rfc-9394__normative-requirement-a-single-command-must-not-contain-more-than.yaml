document: rfc-9394
kind: normative-requirement
summary: A single command MUST NOT contain more than one PARTIAL or ALL search return option; that is, either one PARTIAL, one ALL, or neither PARTIAL nor ALL is allowed in the same SEARCH command.
section: "3.1"
rfc2119_level: MUST NOT
