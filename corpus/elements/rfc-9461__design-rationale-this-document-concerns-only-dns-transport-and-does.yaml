document: rfc-9461
kind: design-rationale
summary: This document concerns only DNS transport and does not affect the construction or interpretation of DNS messages. It does not indicate whether a service is a recursive or authoritative server — clients must determine intended use from context. Not all transports will be applicable in all contexts, and implementors are not obligated to implement all defined transports.
section: "6"
topics:
