document: rfc-4069
kind: normative-requirement
summary: The objects in this extension MIB MUST NOT be used for VDSL lines using Multiple Carrier Modulation (MCM) line coding. If an object in this extension MIB is referenced by a line which does not use SCM, it has no effect on the operation of that line.
section: "4"
rfc2119_level: MUST NOT
topics:
    - snmp
