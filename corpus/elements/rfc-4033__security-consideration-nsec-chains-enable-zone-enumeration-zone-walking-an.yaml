document: rfc-4033
kind: security-consideration
summary: 'NSEC chains enable zone enumeration (''zone walking''): an attacker can query NSEC RRs in sequence to obtain all names in a signed zone, potentially mapping network hosts or resources. This is a direct consequence of the authenticated denial of existence mechanism.'
section: "12"
topics:
    - dns
    - security
    - privacy
