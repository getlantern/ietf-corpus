document: rfc-8348
kind: design-rationale
summary: The model is designed to be NMDA-compliant (RFC 8342), allowing configuration and operational state to be represented in separate datastores. A temporary 'ietf-hardware-state' module (all nodes config false) is provided for implementations that do not yet support NMDA, rather than making NMDA mandatory.
