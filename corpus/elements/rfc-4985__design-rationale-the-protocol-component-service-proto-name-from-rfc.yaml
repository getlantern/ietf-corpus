document: rfc-4985
kind: design-rationale
summary: The protocol component (_Service._Proto.Name from RFC 2782 SRV RR) is intentionally omitted from SRVName. This allows one certificate with a single SRVName to cover multiple protocol alternatives, and significantly simplifies name constraints processing rules.
