document: rfc-8613
kind: protocol-element
summary: OSCORE classifies CoAP message fields into Class E (encrypted and integrity protected, transported in the COSE ciphertext), Class I (integrity protected only, included in AAD), and Class U (unprotected, visible to proxies). There are currently no Class I options defined; all unknown options default to Class E.
