document: rfc-5222
kind: interoperability-note
summary: If a client sends location information conformant to a non-baseline profile, it MUST also include location information conformant to one of the two baseline profiles in the same request; otherwise a server that does not support the non-baseline profile cannot understand the request.
section: "12.1"
topics:
    - realtime
