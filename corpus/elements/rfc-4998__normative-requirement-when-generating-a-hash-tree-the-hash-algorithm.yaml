document: rfc-4998
kind: normative-requirement
summary: When generating a hash tree, the hash algorithm in the timestamp request MUST be the same as the hash algorithm of the hash tree, or the digestAlgorithm field of the ArchiveTimeStamp MUST be present to specify the hash tree algorithm.
