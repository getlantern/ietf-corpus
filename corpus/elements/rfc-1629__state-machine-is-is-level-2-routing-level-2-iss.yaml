document: rfc-1629
kind: state-machine
summary: 'IS-IS Level 2 routing: Level 2 ISs distribute area addresses throughout the Level 2 subdomain and compute next-hop forwarding using longest-matching address prefix, preferring internal routes over external routes. A Level 2 IS accepts any other Level 2 IS as a neighbor regardless of area address; links with non-overlapping area addresses are treated as Level 2 only.'
