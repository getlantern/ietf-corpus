document: rfc-9684
kind: interoperability-note
summary: TPM 1.2 defaults to TPM_ALG_SHA1 for PCR hashing, while TPM 2.0 defaults to TPM_ALG_SHA256. SHA1 is marked as deprecated due to insufficient cryptographic protection in the ietf-tcg-algs module, though it is retained for legacy TPM 1.2 compatibility.
section: 2.1.2.2
