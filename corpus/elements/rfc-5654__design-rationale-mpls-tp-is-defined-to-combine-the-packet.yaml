document: rfc-5654
kind: design-rationale
summary: MPLS-TP is defined to combine the packet experience of MPLS with the operational experience and practices of existing transport networks (SONET/SDH, OTN). The goal is to deliver carrier-grade reliability, deterministic resource control, and operational simplicity for packet-based transport services while minimizing CAPEX and OPEX.
