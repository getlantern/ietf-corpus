document: rfc-5703
kind: interoperability-note
summary: The ':anychild' tagged argument may only appear when ':mime' is also present; its presence without ':mime' is an error. Without ':mime' and ':anychild', the extended 'header', 'address', and 'exists' tests behave identically to their RFC 5228 definitions.
section: "4.1"
