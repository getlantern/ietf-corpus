document: rfc-9885
kind: normative-requirement
summary: 'Implementations that support disablement of MP-TLVs MUST log two occurrences: (1) receipt of an MP-TLV when their use is disabled, and (2) when local LSP generation requires MP-TLVs but their generation is disabled.'
section: "8.1"
rfc2119_level: MUST
topics:
    - routing
