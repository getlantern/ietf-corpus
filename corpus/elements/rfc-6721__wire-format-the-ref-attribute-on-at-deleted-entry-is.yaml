document: rfc-6721
kind: wire-format
summary: The 'ref' attribute on at:deleted-entry is an atomUri carrying the atom:id value of the removed entry. The 'when' attribute is an RFC 3339 date-time string; 'T' MUST be uppercase to separate date and time, and 'Z' MUST appear when no numeric time zone offset is present.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
