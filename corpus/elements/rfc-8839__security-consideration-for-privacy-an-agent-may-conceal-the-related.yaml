document: rfc-8839
kind: security-consideration
summary: For privacy, an agent MAY conceal the related address and port in a candidate by setting the address to '0.0.0.0' (IPv4) or '::' (IPv6) and the port to '9', rather than revealing the true base address.
section: "9.1"
