document: rfc-8380
kind: interoperability-note
summary: When a TRILL-encapsulated packet reaches an ingress RBridge, that RBridge performs normal TRILL processing and forwards the pre-encapsulated packet to the RBridge specified by the egress nickname field, with no special handling required for TRILL-EN-originated packets.
