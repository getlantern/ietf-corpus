document: rfc-8888
kind: protocol-element
summary: SDP signaling for the congestion control feedback mechanism uses a new "ack" parameter "ccfb" for the "a=rtcp-fb:" attribute. The canonical SDP attribute is "a=rtcp-fb:* ack ccfb". When used with SDP BUNDLE, the attribute has multiplexing category IDENTICAL-PER-PT.
section: "6"
topics:
    - rtp
    - congestion
    - realtime
