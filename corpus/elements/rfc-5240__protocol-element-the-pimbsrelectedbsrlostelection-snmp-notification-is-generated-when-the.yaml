document: rfc-5240
kind: protocol-element
summary: The pimBsrElectedBSRLostElection SNMP notification is generated when the current E-BSR loses election to a new C-BSR, i.e., when pimBsrCandidateBSRElectedBSR transitions to FALSE. It carries the outgoing E-BSR's address type, address, and priority.
