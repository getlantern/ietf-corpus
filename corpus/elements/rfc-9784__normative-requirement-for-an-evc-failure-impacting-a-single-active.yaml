document: rfc-9784
kind: normative-requirement
summary: For an EVC failure impacting a Single-Active vES in PBB-EVPN, the B-MAC/I-SID route C-MAC flushing mechanism from RFC 9541 SHOULD be used to limit flushing to only the impacted I-SID(s). When an EVC carries multiple VLANs each with its own broadcast domain, a separate B-MAC/I-SID route must be advertised per VLAN.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
