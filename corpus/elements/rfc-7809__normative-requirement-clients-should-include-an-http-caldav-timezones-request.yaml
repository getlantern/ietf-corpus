document: rfc-7809
kind: normative-requirement
summary: Clients SHOULD include an HTTP 'CalDAV-Timezones' request header field with value 'F' to ensure the CalDAV server does not include VTIMEZONE components in returned iCalendar data for time zones available from advertised distribution servers.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
