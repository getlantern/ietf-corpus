document: rfc-9931
kind: protocol-element
summary: 'HTTP/1.1 provides two mechanisms for protocol transitions on an existing connection: the Upgrade header field (RFC 9110, Section 7.8), which results in a 101 Switching Protocols response on acceptance, and the CONNECT method (RFC 9110, Section 9.3.6), which establishes a TCP tunnel and results in a 2xx response on acceptance. Both may be rejected by the server.'
