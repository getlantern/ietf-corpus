document: rfc-4873
kind: wire-format
summary: The modified PROTECTION object (class 37, C-Type 2) adds an In-Place (I) bit indicating segment recovery is already in place, a Required (R) bit indicating failure to establish protection should fail the protected LSP, and a 6-bit Seg.Flags field with values identical to LSP Flags from RFC 4872.
section: "6.1"
topics:
    - routing
    - mpls
