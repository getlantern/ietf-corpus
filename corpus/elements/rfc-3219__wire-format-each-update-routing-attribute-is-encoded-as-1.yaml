document: rfc-3219
kind: wire-format
summary: 'Each UPDATE routing attribute is encoded as: 1-octet Attribute Flags, 1-octet Attribute Type Code, 2-octet Attribute Length, and variable Attribute Value. Attributes MUST appear in ascending order of Attribute Type Code; an attribute MUST NOT appear more than once per UPDATE message.'
