document: rfc-2069
kind: security-consideration
summary: An attacker can remove or alter the digest field in Authentication-info, preventing the client from using it to detect response-entity modification. Sensitive applications may wish to require the digest field to be present and valid.
section: "3.3"
topics:
    - http
    - security
