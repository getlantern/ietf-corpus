document: rfc-9922
kind: protocol-element
summary: The 'period-of-time' grouping represents a time period using either (start, end) or (start, duration) format. If neither period-end nor duration is specified, the period lasts forever. A duration of 0 or period-end equal to period-start creates a one-shot schedule.
section: 3.3.2
