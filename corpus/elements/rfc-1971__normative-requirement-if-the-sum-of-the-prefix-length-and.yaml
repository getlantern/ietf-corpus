document: rfc-1971
kind: normative-requirement
summary: If the sum of the prefix length and interface token length from a Prefix Information option does not equal 128 bits, the option MUST be ignored. An implementation MAY log a system management error.
section: 5.5.3
rfc2119_level: MUST
