document: rfc-5934
kind: design-rationale
summary: DER is required for all TAMP structures, not just digitally signed ones, to reduce the number of implementation options and simplify TAMP processors. Standard CMS practice would only require DER for signed structures, but TAMP deliberately tightens this constraint.
section: "1.4"
topics:
