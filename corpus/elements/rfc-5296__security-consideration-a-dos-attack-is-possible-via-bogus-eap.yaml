document: rfc-5296
kind: security-consideration
summary: 'A DoS attack is possible via bogus EAP-Initiate/Re-auth messages: an attacker can trigger the server to issue an EAP-Finish/Re-auth failure, which may cause link-layer connections to be terminated. To prevent this, an ERP failure MUST NOT result in deletion of any authorization state established by a prior full EAP exchange.'
section: "8"
topics:
    - security
