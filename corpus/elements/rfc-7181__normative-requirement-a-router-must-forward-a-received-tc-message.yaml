document: rfc-7181
kind: normative-requirement
summary: 'A router MUST forward a received TC message on all OLSRv2 interfaces if and only if: the message did not originate at this router, has not been previously forwarded, is received for the first time on this interface, and was received from a flooding MPR selector.'
section: "14.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
