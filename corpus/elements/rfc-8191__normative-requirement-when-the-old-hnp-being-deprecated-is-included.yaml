document: rfc-8191
kind: normative-requirement
summary: When the old HNP being deprecated is included in an unauthenticated RA from the MAG, the Valid Lifetime SHOULD be set to 2 hours (Preferred Lifetime set to 0) per RFC 4862, which ignores lifetimes less than 2 hours in unauthenticated RAs.
section: "7"
rfc2119_level: SHOULD
