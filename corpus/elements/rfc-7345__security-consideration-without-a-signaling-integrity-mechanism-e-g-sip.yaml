document: rfc-7345
kind: security-consideration
summary: Without a signaling integrity mechanism (e.g., SIP Identity per RFC 4474, or S/MIME), security is limited to defense against passive eavesdropping only. An active attacker controlling both signaling and the media plane can mount a man-in-the-middle attack (R-SIG-MEDIA threat).
section: "6"
topics:
    - tls
    - security
    - sip
