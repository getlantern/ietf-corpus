document: rfc-3986
kind: registry
summary: IANA maintains the registry of URI schemes; the process for registering new URI schemes is defined by BCP35. This specification establishes the generic syntax that all scheme-specific syntaxes must satisfy, and the URI scheme registry maps scheme names to their defining specifications.
