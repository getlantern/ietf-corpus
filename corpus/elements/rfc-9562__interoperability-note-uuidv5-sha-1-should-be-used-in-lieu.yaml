document: rfc-9562
kind: interoperability-note
summary: UUIDv5 (SHA-1) SHOULD be used in lieu of UUIDv3 (MD5) wherever possible due to MD5 security weaknesses. Name-based UUIDs using SHA-256 or newer hash algorithms MUST NOT use UUIDv5 and MUST be placed within the UUIDv8 space.
section: "5.3"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
