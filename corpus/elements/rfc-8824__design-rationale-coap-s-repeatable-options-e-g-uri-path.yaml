document: rfc-8824
kind: design-rationale
summary: CoAP's repeatable options (e.g., Uri-Path) can appear multiple times in a single header. SCHC uses the Field Position (FP) to identify each instance within a Rule, removing the ambiguity that would otherwise exist in the Matching Operator evaluation.
section: "3.1"
