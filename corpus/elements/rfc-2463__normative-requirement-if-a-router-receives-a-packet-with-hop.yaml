document: rfc-2463
kind: normative-requirement
summary: If a router receives a packet with Hop Limit of zero, or decrements Hop Limit to zero, it MUST discard the packet and send an ICMPv6 Time Exceeded message (Code 0) to the source.
section: "3.3"
rfc2119_level: MUST
topics:
