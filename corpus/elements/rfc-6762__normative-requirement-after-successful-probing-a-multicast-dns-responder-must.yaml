document: rfc-6762
kind: normative-requirement
summary: After successful probing, a Multicast DNS responder MUST send at least two unsolicited Multicast DNS response announcements one second apart. Unique records are placed in the Answer Section with the cache-flush bit (MSB of rrclass) set to one.
section: "8.3"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
