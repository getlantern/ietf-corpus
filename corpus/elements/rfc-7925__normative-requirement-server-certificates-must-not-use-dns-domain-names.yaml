document: rfc-7925
kind: normative-requirement
summary: Server certificates MUST NOT use DNS domain names in the CN field and must instead use the subjectAltName attribute. Certificates MUST NOT contain wildcard characters and MUST NOT contain multiple names (e.g., more than one dNSName field).
section: 4.4.1
rfc2119_level: MUST NOT
topics:
    - tls
    - pkix
    - security
