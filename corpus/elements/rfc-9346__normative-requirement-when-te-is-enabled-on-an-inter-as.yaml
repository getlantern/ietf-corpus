document: rfc-9346
kind: normative-requirement
summary: When TE is enabled on an inter-AS link and the link is up, the ASBR SHOULD advertise this link. When the link is down or TE is disabled, the ASBR SHOULD withdraw the advertisement. When TE parameters change, the ASBR SHOULD re-advertise but MUST take precautions against excessive re-advertisements.
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
