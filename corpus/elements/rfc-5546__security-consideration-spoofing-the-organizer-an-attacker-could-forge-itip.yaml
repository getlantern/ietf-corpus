document: rfc-5546
kind: security-consideration
summary: 'Spoofing the Organizer: an attacker could forge iTIP messages purporting to come from the Organizer to cancel events, change times, or remove Attendees. Implementations SHOULD use S/MIME, OpenPGP, or equivalent to authenticate the originator of iTIP messages.'
section: 6.1.1, 6.2.1
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
