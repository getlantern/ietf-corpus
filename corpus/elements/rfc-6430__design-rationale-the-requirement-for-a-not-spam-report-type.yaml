document: rfc-6430
kind: design-rationale
summary: The requirement for a not-spam report type originated from the Open Mobile Alliance (OMA) Spam Report Requirement Document. Existing anti-spam systems already use non-standard "not spam" feedback, mixing reports with other data and algorithms rather than treating any single report as authoritative.
section: "1.1"
topics:
