document: rfc-2250
kind: protocol-element
summary: For MPEG-1 payloads, a lost Picture_Header is reconstructed from the P, TR, FBV, BFC, FFV, and FFC fields present in the next received packet plus stream-dependent defaults. For MPEG-2, the T-bit MPEG-2 header extension supplies the additional parameters required.
