document: rfc-6762
kind: wire-format
summary: Multicast DNS uses UDP port 5353 for both queries and responses. The IPv4 link-local multicast group address is 224.0.0.251 and the IPv6 equivalent is FF02::FB. Messages use the standard DNS message format with no new opcodes or response codes.
