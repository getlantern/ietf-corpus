summary: The AUTH_TLS STARTTLS probe is a NULL RPC procedure call where the credential opaque data length MUST be zero, the verifier is AUTH_NONE with length zero, and the server's reply verifier body is exactly 8 bytes encoding the ASCII string 'STARTTLS' as a fixed-length opaque field.
