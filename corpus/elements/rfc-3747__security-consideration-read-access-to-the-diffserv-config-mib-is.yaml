document: rfc-3747
kind: security-consideration
summary: Read access to the DIFFSERV-CONFIG-MIB is generally not sensitive since it only reveals that templates exist; the operational managed objects are in the DIFFSERV-MIB. However, diffServConfigDescr and diffServConfigOwner may warrant access control in sensitive environments.
