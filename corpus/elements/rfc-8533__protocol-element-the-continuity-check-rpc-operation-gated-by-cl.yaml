document: rfc-8533
kind: protocol-element
summary: The `continuity-check` RPC operation (gated by `cl-oam:continuity-check` feature) sends a Ping-like probe to a destination test point and returns a `response-info` container plus the `continuity-check-data` grouping from RFC 8532. It accepts `count`, `ttl`, and `packet-size` input parameters.
