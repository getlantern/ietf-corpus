document: rfc-8873
kind: design-rationale
summary: This document updates RFC 4975 by permitting the 'msrps' URI scheme when the underlying connection is protected with DTLS (not just TLS), since MSRP over data channels uses DTLS provided by the WebRTC stack rather than TLS over TCP.
