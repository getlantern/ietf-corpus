document: rfc-3927
kind: normative-requirement
summary: All ARP packets (replies as well as requests) that contain a Link-Local 'sender IP address' MUST be sent using link-layer broadcast instead of link-layer unicast. This enables timely duplicate address detection, particularly when previously separated network segments are joined.
section: "2.5"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
