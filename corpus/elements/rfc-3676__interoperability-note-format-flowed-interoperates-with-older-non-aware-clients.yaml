document: rfc-3676
kind: interoperability-note
summary: Format=Flowed interoperates with older (non-aware) clients because flowed lines are valid Text/Plain. Non-aware clients display them with trailing whitespace visible but otherwise readable; space-stuffing produces a leading space on certain lines, which is considered a minor cosmetic issue.
section: "5"
topics:
