document: rfc-3403
kind: normative-requirement
summary: When falling back to previously retrieved sets of Rules, the application MUST ensure that none of the records it is relying on have expired (per their DNS TTL). If even a single record has expired, the application is required to start over at the beginning of the algorithm.
section: "3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
