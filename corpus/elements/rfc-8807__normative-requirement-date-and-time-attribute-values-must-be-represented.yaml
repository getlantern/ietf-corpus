document: rfc-8807
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar, using the extended date-time form with upper case "T" and "Z" characters as defined in the XML Schema specification.
section: "3.3"
rfc2119_level: MUST
