document: rfc-8311
kind: design-rationale
summary: With ECN now widely deployed, extending ECN to TCP SYNs and retransmissions (ECN++) would allow congestion signaling in connection setup and recovery phases, but RFC 3168 explicitly prohibited this. Allowing it only under an Experimental RFC ensures IETF oversight while removing the blanket prohibition.
section: "4.3"
topics:
    - ecn
    - tcp
    - congestion
