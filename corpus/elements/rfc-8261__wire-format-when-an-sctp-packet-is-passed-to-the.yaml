document: rfc-8261
kind: wire-format
summary: When an SCTP packet is passed to the DTLS layer, the entire SCTP common header followed by all SCTP chunks is carried as the DTLS application-layer protocol payload. On receipt, the DTLS layer extracts that payload and passes it up to SCTP unchanged.
