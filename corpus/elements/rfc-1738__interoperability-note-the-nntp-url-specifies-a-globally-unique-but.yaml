document: rfc-1738
kind: interoperability-note
summary: 'The nntp: URL specifies a globally unique but locally inaccessible location because most NNTP servers are configured for local-client-only access. The news: form is therefore preferred for identifying news articles in a location-independent way.'
section: "3.7"
topics:
