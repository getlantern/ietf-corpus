document: rfc-2326
kind: normative-requirement
summary: Systems implementing RTSP MUST support carrying RTSP over TCP and MAY support UDP. The default port for the RTSP server is 554 for both UDP and TCP.
section: "9.2"
rfc2119_level: MUST
