document: rfc-9244
kind: protocol-element
summary: The 'total-pipe-capacity' structure conveys the maximum incoming traffic volume for each ingress interconnection link of the DOTS client domain, keyed by 'link-id' (RFC 8345) and 'unit'. Clients MAY signal per-link or aggregate capacity; setting 'capacity' to 0 removes a link (but all-zero capacity requests are rejected with 4.00).
section: "7.2"
topics:
    - security
    - yang
