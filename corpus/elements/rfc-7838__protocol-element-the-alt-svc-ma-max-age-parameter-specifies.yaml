document: rfc-7838
kind: protocol-element
summary: The Alt-Svc 'ma' (max-age) parameter specifies the freshness lifetime in delta-seconds. When not present, the default freshness lifetime is 24 hours. The 'persist' parameter with value '1' hints that the alternative service should survive network configuration changes.
