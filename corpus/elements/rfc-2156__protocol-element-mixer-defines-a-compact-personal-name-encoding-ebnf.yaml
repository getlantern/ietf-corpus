summary: MIXER defines a compact personal name encoding (EBNF.encoded-pn) of the form 'Given.I.Surname' (e.g., 'Marshall.Rose', 'M.T.Rose', 'Marshall.M.T.Rose'), enabling reversible mapping of MTS.PersonalName components for common cases without generational qualifiers.
