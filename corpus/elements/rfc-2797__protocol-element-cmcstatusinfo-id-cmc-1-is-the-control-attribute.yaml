document: rfc-2797
kind: protocol-element
summary: CMCStatusInfo (id-cmc 1) is the control attribute used in Full PKI Responses to convey success, failure, pending, noSupport, or confirmRequired status. It includes a bodyList referencing the affected body parts, an optional statusString, and an otherInfo choice of CMCFailInfo or PendInfo (with pendToken and pendTime).
section: "5.1"
topics:
