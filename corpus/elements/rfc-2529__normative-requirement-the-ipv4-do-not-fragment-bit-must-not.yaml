document: rfc-2529
kind: normative-requirement
summary: The IPv4 'do not fragment' bit MUST NOT be set in the encapsulating IPv4 header. This allows intermediate IPv4 subnets to fragment oversized packets rather than dropping them.
section: "2"
rfc2119_level: MUST NOT
topics:
