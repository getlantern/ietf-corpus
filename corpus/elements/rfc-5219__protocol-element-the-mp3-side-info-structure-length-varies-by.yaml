document: rfc-5219
kind: protocol-element
summary: 'The MP3 ''side info'' structure length varies by MPEG version and channel mode: 32 bytes for MPEG-1 stereo, 17 bytes for MPEG-1 mono or MPEG-2 stereo, and 9 bytes for MPEG-2 mono. The ''main_data_begin'' field within this structure is the back-pointer (in bytes) to the start of the ADU.'
