document: rfc-5775
kind: normative-requirement
summary: If more than one object is carried in a session, the Transmission Object Identifier (TOI) MUST be used in the LCT header to identify which packets are associated with which objects. The TOI for each object is REQUIRED to be unique within a session.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
