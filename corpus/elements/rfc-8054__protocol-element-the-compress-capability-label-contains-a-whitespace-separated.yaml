document: rfc-8054
kind: protocol-element
summary: The COMPRESS capability label contains a whitespace-separated list of available compression algorithms. Algorithm names are case-sensitive strings of 1 to 20 characters consisting of uppercase letters, digits, hyphens, and/or underscores (e.g., 'DEFLATE').
