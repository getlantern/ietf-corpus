document: rfc-5178
kind: design-rationale
summary: Domain-based names were introduced to allow GSS-API clients to authorize servers discovered via insecure methods (e.g., DNS SRV records without DNSSEC) without needing to secure the discovery method itself or add an extra authorization protocol. A server either has valid credentials for the domain-based name or it does not.
section: "1"
topics:
    - security
    - dns
