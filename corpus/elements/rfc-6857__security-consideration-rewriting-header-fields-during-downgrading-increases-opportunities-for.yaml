document: rfc-6857
kind: security-consideration
summary: Rewriting header fields during downgrading increases opportunities for undetected spoofing by malicious senders. Downgraded-* header fields are not inspected by traditional MUAs and may be less trustworthy than standard header fields; they could have been inserted with malicious content unrelated to the original header fields.
section: "5"
topics:
    - email
    - security
