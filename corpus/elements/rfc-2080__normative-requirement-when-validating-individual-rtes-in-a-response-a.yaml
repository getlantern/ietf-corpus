document: rfc-2080
kind: normative-requirement
summary: When validating individual RTEs in a Response, a destination that is a multicast prefix or a link-local address is invalid and the entry must be ignored. The prefix length must be 0–128 inclusive and the metric must be 1–16 inclusive.
section: 2.4.2
rfc2119_level: MUST
topics:
    - routing
    - ip
