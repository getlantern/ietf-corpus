document: rfc-6052
kind: normative-requirement
summary: The suffix bits (remaining bits after prefix and embedded IPv4 address) are reserved for future extensions and SHOULD be set to zero. Translators receiving IPv4-embedded IPv6 addresses where suffix bits are not zero SHOULD ignore those bits and proceed as if they were zero.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
