document: rfc-5177
kind: normative-requirement
summary: For every Mobile Network Prefix extension in a Registration Request, the Home Agent MUST perform a check against the Prefix Table. If the table does not contain at least one entry pairing the Home Address to that Mobile Network Prefix, the check fails.
section: "6.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
