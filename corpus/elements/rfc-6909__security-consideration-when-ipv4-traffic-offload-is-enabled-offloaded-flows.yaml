document: rfc-6909
kind: security-consideration
summary: When IPv4 traffic offload is enabled, offloaded flows typically get NAT translated, introducing NAT-related vulnerabilities documented in RFC 2663. Additionally, offloaded traffic bypasses home network firewall protections, exposing the mobile node to access network security risks.
section: "6"
topics:
    - security
    - nat
    - mobility
