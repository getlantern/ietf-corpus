document: rfc-4191
kind: normative-requirement
summary: If a Type C host finds no routes matching a destination (no default and no more-specific routes), it SHOULD discard the packet and report a Destination Unreachable/No Route To Destination error to the upper layer.
section: "3.2"
rfc2119_level: SHOULD
