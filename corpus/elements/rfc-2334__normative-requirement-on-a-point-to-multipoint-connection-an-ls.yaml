document: rfc-2334
kind: normative-requirement
summary: On a point-to-multipoint connection, an LS MUST send only a single Hello message to all leaf DCSs, including all non-stalled DCSIDs in the Receiver ID list rather than sending per-DCS hellos.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
