document: rfc-4292
kind: protocol-element
summary: inetCidrRouteStatus (RowStatus, read-create) controls row installation and removal. A row entry cannot be modified when its status is active(1). The full compliance statement restricts write syntax to active(1), notInService(2), createAndGo(4), and destroy(6); createAndWait is not required.
