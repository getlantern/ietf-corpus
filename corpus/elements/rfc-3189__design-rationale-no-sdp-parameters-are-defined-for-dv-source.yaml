document: rfc-3189
kind: design-rationale
summary: No SDP parameters are defined for DV 'source' and 'source control' pack attributes (aspect ratio, audio channels, etc.) because describing all combinations would require very large SDP descriptions. Instead, these attributes are carried in-band in VAUX/AAUX DIF blocks.
section: "2.2"
