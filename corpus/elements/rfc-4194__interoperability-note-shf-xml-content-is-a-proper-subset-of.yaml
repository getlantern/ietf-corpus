document: rfc-4194
kind: interoperability-note
summary: SHF XML content is a proper subset of XML 1.0. Only the five predefined general entity references and numeric entity references are permitted; no other entity references may appear. The XML declaration and DOCTYPE declaration are optional (XML fragments are valid SHF).
