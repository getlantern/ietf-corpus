document: rfc-1738
kind: protocol-element
summary: The Prospero URL scheme (`prospero://<host>:<port>/<hsoname>;<field>=<value>`) designates resources via the Prospero Directory Service. Default port is 1525. The hsoname is opaque to clients; semicolons within it must be encoded. Optional field/value pairs separated by ';' identify specific versions or attributes.
section: "3.11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
