document: rfc-4415
kind: design-rationale
summary: The subtype 'tel' is defined separately from the 'voice' type because the subsystem required to initiate the call (a dialer) is distinct from the teleservice itself. This mirrors the ENUM design principle that subtypes identify the protocol/subsystem used to reach the endpoint.
section: "1"
topics:
