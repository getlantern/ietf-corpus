document: rfc-5331
kind: design-rationale
summary: RFC 3031 restricts MPLS to downstream-assigned labels, where the downstream LSR decides the label binding and informs the upstream LSR. This document extends the architecture to allow upstream-assigned labels, where the upstream LSR makes the binding decision and advertises it downstream.
section: "1"
topics:
    - mpls
    - routing
