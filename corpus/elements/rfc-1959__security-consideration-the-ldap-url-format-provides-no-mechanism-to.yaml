document: rfc-1959
kind: security-consideration
summary: The LDAP URL format provides no mechanism to specify credentials for resolving the URL; therefore, such requests are expected to be unauthenticated. The security implications of resolving an LDAP URL are the same as those of resolving any LDAP query, as described in RFC 1777.
section: "4"
topics:
    - ldap
    - security
