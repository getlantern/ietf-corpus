document: rfc-8104
kind: wire-format
summary: The Egress Protection Capability TLV has code point 0x0974, U-bit=1 (silently ignore if unknown), F-bit=0. It carries an S-bit (advertise/withdraw), Reserved byte, and a variable-length Capability Data field containing one or more IPv4/v6 context identifiers identifying the {primary PE, protector} pairs for which the sender is the protector.
section: "6.1"
topics:
    - mpls
    - routing
