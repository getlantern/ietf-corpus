document: rfc-6310
kind: normative-requirement
summary: For TDM PW receive defect state entry, PE1 MUST commence AIS insertion into the TDM AC and MUST set the R bit in all PW packets sent back to PE2. On exit, PE1 MUST cease AIS insertion and MUST clear the R bit. A structure-aware PE1 MUST commence RDI insertion into the AC on entry to PW transmit defect state.
section: 9.3.1
rfc2119_level: MUST
topics:
    - mpls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
