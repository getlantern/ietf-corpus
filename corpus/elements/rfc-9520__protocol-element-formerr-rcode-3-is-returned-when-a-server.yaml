document: rfc-9520
kind: protocol-element
summary: FORMERR (RCODE=3) is returned when a server cannot interpret the query; most commonly associated with EDNS(0) processing problems. Some recursive clients retry without EDNS(0) upon receiving FORMERR; resolution failures from FORMERR are rare.
section: "2.7"
topics:
