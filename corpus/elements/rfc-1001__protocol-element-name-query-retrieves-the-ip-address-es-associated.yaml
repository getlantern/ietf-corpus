document: rfc-1001
kind: protocol-element
summary: Name query retrieves the IP address(es) associated with a NetBIOS name. B nodes broadcast a NAME QUERY REQUEST; P nodes query the NBNS directly; M nodes broadcast first and, if unsuccessful, query the NBNS. All node types use the same packet formats for queries and responses.
