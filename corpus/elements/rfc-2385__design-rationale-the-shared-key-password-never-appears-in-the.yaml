document: rfc-2385
kind: design-rationale
summary: The shared key/password never appears in the connection stream; its form is left deliberately unspecified and may be connection-specific. It could even change during the lifetime of a connection if both ends are synchronized, though changing passwords can cause retransmission problems in some TCP implementations.
section: "2.0"
topics:
    - tcp
    - bgp
    - crypto
    - security
