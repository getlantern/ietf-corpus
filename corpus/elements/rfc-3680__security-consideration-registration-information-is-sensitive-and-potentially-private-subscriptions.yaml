document: rfc-3680
kind: security-consideration
summary: Registration information is sensitive and potentially private. Subscriptions SHOULD be authenticated and authorized per local policy. Notifications SHOULD be sent with confidentiality, message integrity, and subscriber identity verification, e.g., using SIPS URLs or S/MIME-protected bodies.
