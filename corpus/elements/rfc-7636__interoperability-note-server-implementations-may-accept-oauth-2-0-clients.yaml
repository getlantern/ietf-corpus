document: rfc-7636
kind: interoperability-note
summary: Server implementations MAY accept OAuth 2.0 clients that do not implement PKCE, reverting to standard OAuth 2.0 behavior when code_verifier is absent. Clients implementing PKCE SHOULD send the additional parameters to all servers regardless of whether the server supports PKCE.
section: "5"
topics:
    - oauth
