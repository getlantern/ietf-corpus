document: rfc-1294
kind: protocol-element
summary: Because DLCIs have only local significance, ARP source and target hardware addresses in Frame Relay packets are initially unknown. The receiving station must extract the correct Q.922 address from the Frame Relay header and substitute it into the source hardware address field of the ARP packet.
section: "10"
