document: rfc-9762
kind: protocol-element
summary: The P flag (DHCPv6-PD Preferred Flag) is a 1-bit flag in the Prefix Information Option (PIO) of IPv6 Router Advertisements, located at bit position 3 (after the R flag). When set, it indicates the network prefers clients use DHCPv6 prefix delegation (RFC 9663) instead of SLAAC or individual DHCPv6 address assignment.
section: "5"
