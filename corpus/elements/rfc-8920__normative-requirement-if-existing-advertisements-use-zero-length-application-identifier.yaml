document: rfc-8920
kind: normative-requirement
summary: If existing advertisements use zero-length Application Identifier Bit Masks and a new application is introduced that should not use those advertisements, existing advertisements MUST be re-advertised with an explicit set of applications specified before the new application is introduced.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
