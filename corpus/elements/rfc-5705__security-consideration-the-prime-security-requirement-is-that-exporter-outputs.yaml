document: rfc-5705
kind: security-consideration
summary: 'The prime security requirement is that exporter outputs be independent: after a TLS session, an adversary given outputs for chosen (label, context value) pairs must be unable to distinguish exporter output for any other pair from a random value. An attacker without the master secret must not distinguish valid exporter outputs from random values.'
