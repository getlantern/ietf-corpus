document: rfc-2581
kind: normative-requirement
summary: During congestion avoidance, cwnd MUST NOT be increased by more than the larger of either 1 full-sized segment per RTT or the value computed using equation 2 (cwnd += SMSS*SMSS/cwnd).
section: "3.1"
rfc2119_level: MUST NOT
topics:
