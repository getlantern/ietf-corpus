document: rfc-9678
kind: normative-requirement
summary: The Peer MUST fail authentication if it receives an AT_KDF_FS list containing duplicate values, except when the duplication arises legitimately from a Peer-requested KDF change (in which case the selected alternative appears twice at the head of the list).
section: "6.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
