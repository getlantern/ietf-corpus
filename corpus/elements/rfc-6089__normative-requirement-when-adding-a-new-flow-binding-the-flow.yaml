document: rfc-6089
kind: normative-requirement
summary: When adding a new flow binding, the flow identification mobility option MUST include exactly one traffic selector sub-option with a non-zero TS Format value, and exactly one binding reference sub-option associating the flow with one or more registered BIDs.
section: 5.2.2.1
rfc2119_level: MUST
topics:
