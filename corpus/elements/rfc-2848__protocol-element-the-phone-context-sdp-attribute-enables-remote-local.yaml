document: rfc-2848
kind: protocol-element
summary: 'The ''phone-context'' SDP attribute enables remote local dialling by specifying the network prefix context within which a local phone number should be interpreted. It takes the form ''a=phone-context: <intl-network-prefix | local-network-prefix | private-prefix>''.'
section: 3.4.3.1
topics:
    - realtime
    - sip
