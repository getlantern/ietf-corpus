document: rfc-5445
kind: wire-format
summary: 'The FEC Payload ID for the Compact No-Code FEC Scheme is 32 bits: a 16-bit unsigned Source Block Number (SBN) followed by a 16-bit unsigned Encoding Symbol ID (ESID). SBN identifies which source block the encoding symbol originates from; ESID identifies the specific encoding symbol within that block.'
section: 3.2.1
topics:
    - multicast
