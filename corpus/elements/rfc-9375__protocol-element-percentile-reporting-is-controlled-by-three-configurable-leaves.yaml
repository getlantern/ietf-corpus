document: rfc-9375
kind: protocol-element
summary: 'Percentile reporting is controlled by three configurable leaves: ''low-percentile'' (default 10.000), ''intermediate-percentile'' (default 50.000), and ''high-percentile'' (default 95.000), each typed as decimal64 with 3 fraction digits in range 0..100. Setting a percentile to 0.000 disables reporting of that percentile; setting all three to 0.000 suppresses all percentile reporting and reports only peak/min values.'
section: "4.4"
topics:
