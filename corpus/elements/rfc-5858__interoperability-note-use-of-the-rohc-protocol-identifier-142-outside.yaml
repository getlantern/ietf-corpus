document: rfc-5858
kind: interoperability-note
summary: Use of the 'ROHC' protocol identifier (142) outside the context of the Next Header field of IPsec security protocol headers is not currently defined. Future uses would require specification of the logical compression channel and investigation of associated security considerations.
section: "4.1"
topics:
