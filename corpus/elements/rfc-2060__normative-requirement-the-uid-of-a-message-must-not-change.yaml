document: rfc-2060
kind: normative-requirement
summary: The UID of a message MUST NOT change during the session, and SHOULD NOT change between sessions. If UIDs cannot be preserved across sessions, each subsequent session MUST have a new UIDVALIDITY larger than any previously used.
section: 2.3.1.1
rfc2119_level: MUST NOT
topics:
    - email
