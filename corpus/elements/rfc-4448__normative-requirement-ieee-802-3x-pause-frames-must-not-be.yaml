document: rfc-4448
kind: normative-requirement
summary: IEEE 802.3x PAUSE frames MUST NOT be carried across the PW. PAUSE frames received on a local Ethernet port SHOULD cause the PE device to buffer or discard further Ethernet frames for that port until the PAUSE condition is cleared.
section: 4.4.5
rfc2119_level: MUST NOT
