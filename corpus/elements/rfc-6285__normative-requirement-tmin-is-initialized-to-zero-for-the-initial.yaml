document: rfc-6285
kind: normative-requirement
summary: Tmin is initialized to zero for the initial RAMS-R message, overriding the RFC 4585 rule that mandates Tmin=1.0 second in multiparty sessions. For subsequent RAMS messages (e.g., updated requests), the normal RFC 4585 timing rules still apply.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
