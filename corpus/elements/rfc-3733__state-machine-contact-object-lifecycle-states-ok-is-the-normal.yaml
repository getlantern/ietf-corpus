document: rfc-3733
kind: state-machine
summary: 'Contact object lifecycle states: ''ok'' is the normal state (set/removed by server); client/server prohibit flags (clientDeleteProhibited, etc.) block corresponding operations; transform commands transition to pendingCreate/pendingDelete/pendingTransfer/pendingUpdate; on action completion the pending state is removed. ''linked'' may be combined with any state; ''ok'' may only be combined with ''linked''.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
