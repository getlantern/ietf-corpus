document: rfc-5942
kind: normative-requirement
summary: The assignment of an IPv6 address — whether through SLAAC, DHCPv6, or manual configuration — MUST NOT implicitly cause a prefix derived from that address to be treated as on-link and added to the Prefix List. A host considers a prefix on-link only through explicit means.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
