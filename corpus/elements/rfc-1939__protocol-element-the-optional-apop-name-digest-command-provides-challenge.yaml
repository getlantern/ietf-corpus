document: rfc-1939
kind: protocol-element
summary: The optional APOP name digest command provides challenge-response authentication. The server includes an RFC 822 msg-id timestamp in its banner greeting, which MUST differ every session. The client computes MD5(timestamp + shared_secret) and sends the 16-octet result as lowercase hexadecimal.
section: "7"
