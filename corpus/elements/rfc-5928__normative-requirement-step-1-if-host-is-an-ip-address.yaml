document: rfc-5928
kind: normative-requirement
summary: 'Step 1: If <host> is an IP address and <port> is undefined, the default port for the ''turn'' (if <secure>=false) or ''turns'' (if <secure>=true) SRV service declared in RFC 5766 MUST be used. If the client cannot reach the server on any supported transport, the resolution MUST stop with an error.'
section: "3"
rfc2119_level: MUST
topics:
    - nat
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
