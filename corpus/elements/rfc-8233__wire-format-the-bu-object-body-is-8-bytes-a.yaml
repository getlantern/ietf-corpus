document: rfc-8233
kind: wire-format
summary: 'The BU object body is 8 bytes: a 24-bit Reserved field (MUST be zero on transmission, ignored on receipt), an 8-bit Type field (1=LBU, 2=LRBU), and a 32-bit Bandwidth Utilization field encoded as a percentage in IEEE 754 floating point format. Object-Class=35, Object-Type=1.'
