document: rfc-2349
kind: protocol-element
summary: In a Read Request, the client specifies tsize value '0'; the server returns the actual file size in octets in the OACK. In a Write Request, the client specifies the actual file size, which the server echoes back in the OACK.
section: Transfer Size Option Specification
