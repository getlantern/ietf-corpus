document: rfc-8302
kind: interoperability-note
summary: SEND (Secure Neighbor Discovery, RFC 3971) messages cannot be optimized by this mechanism because RBridges do not have cryptographic keys needed to construct SEND messages. RBridges only construct ARP, RARP, or insecure ND messages; they are transparent to SEND messages in terms of response generation.
section: "4.1"
topics:
    - routing
    - security
