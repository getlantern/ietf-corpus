summary: The module augments '/rt:routing/rt:ribs/rt:rib/rt:routes/rt:route' with 'mpls-enabled' (boolean, default false) and 'mpls-local-label' (present only when mpls-enabled is true). For native MPLS RIB routes, 'destination-prefix' (leafref to mpls-local-label) and 'route-context' (string) are also added.
