kind: protocol-element
summary: rptrOperStatus (rptrRptrInfo 2) is a read-only INTEGER with values other(1), ok(2), rptrFailure(3), groupFailure(4), portFailure(5), generalFailure(6). When multiple failure types exist, the highest-priority failure is reported in the listed order.
