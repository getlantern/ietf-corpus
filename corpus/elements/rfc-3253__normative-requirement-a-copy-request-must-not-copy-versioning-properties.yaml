document: rfc-3253
kind: normative-requirement
summary: A COPY request MUST NOT copy versioning properties to the new resource; instead those properties MUST have the default initial values they would have if the resource had been created by a non-versioning method such as PUT or MKCOL.
section: "3.14"
rfc2119_level: MUST NOT
topics:
