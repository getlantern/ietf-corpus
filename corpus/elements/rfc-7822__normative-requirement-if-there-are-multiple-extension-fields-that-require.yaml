document: rfc-7822
kind: normative-requirement
summary: If there are multiple extension fields that require a MAC, they MUST all require the use of the same algorithm and MAC length. An NTP packet MUST NOT be sent with two or more extension fields requiring a MAC with different algorithms.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ntp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
