document: rfc-3986
kind: design-rationale
summary: Fragment identifiers are handled client-side by the user agent rather than by the server or scheme to prevent information providers from denying reference authors the right to refer selectively to parts of a resource. Fragment identifier semantics cannot be redefined by scheme specifications because fragment identification is orthogonal to scheme definition.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
