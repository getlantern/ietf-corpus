document: rfc-4684
kind: design-rationale
summary: MP-BGP UPDATE messages were chosen to propagate RT membership information rather than extending the existing extended-community ORF encoding. This reuses BGP's existing machinery for loop-free dissemination—including route reflection, confederations, and inter-AS loop detection—both within and across autonomous systems.
section: "1"
topics:
