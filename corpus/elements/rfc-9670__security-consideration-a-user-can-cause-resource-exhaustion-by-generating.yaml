document: rfc-9670
kind: security-consideration
summary: A user can cause resource exhaustion by generating many ShareNotifications through frequent changes to sharing status. Servers should coalesce notifications, limit stored notifications per user, and rate-limit sharing permission changes; deletion upon reaching limits is discouraged as it can silently hide changes from the user.
section: "6.3"
topics:
    - security
    - json
