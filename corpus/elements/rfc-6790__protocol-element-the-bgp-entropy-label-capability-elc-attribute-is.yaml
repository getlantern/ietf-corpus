document: rfc-6790
kind: protocol-element
summary: The BGP Entropy Label Capability (ELC) attribute is an optional, transitive BGP path attribute with type code 28. Its presence in a BGP UPDATE indicates that the advertising speaker can process entropy labels as egress LSR for all routes in that NLRI.
