document: rfc-5611
kind: protocol-element
summary: 'The SP bits in the TDM PW AVP define CESoPSN signaling packet support: ''01'' for a TDM data PW expecting signaling in a separate PW, ''10'' for a signaling-only PW, ''11'' for a combined data-and-signaling PW, and ''00'' for SAToP or CESoPSN without separate signaling.'
