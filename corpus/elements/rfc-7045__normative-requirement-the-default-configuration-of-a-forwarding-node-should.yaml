document: rfc-7045
kind: normative-requirement
summary: The default configuration of a forwarding node SHOULD allow all standard extension headers. Experimental IPv6 extension headers SHOULD be treated in the same way as standard extension headers, but the default configuration MAY drop experimental extension headers.
section: "2.1"
rfc2119_level: SHOULD
