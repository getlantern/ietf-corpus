document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_errno4 defines seven OSD I/O error codes for LAYOUTRETURN reporting: EIO (device failure/media error), NOT_FOUND (missing object), NO_SPACE, BAD_CRED (expired or revoked capability), NO_ACCESS (capability lacks permission), UNREACHABLE (communication failure), and RESOURCE (client-side local failure—MUST guarantee OSD command was never dispatched).'
section: "8.1"
topics:
    - security
