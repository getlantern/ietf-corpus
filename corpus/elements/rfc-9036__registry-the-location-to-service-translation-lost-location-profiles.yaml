document: rfc-9036
kind: registry
summary: The 'Location-to-Service Translation (LoST) Location Profiles' IANA registry, originally established by RFC 5222 with a Standards Action policy, is updated by this document to Specification Required. This allows SDOs other than the IETF (such as NENA) to add new location profile values.
section: "4"
