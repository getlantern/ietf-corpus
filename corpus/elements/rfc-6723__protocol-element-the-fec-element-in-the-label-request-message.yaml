document: rfc-6723
kind: protocol-element
summary: The FEC element in the Label Request message must be the local PE's own PW FEC element. In response, the peer PE sends a Label Mapping with its own local PW FEC element. The Label Request message format and procedure are as specified in RFC 5036.
section: "4"
topics:
