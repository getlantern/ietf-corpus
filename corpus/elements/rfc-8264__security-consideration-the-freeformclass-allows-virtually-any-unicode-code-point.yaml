document: rfc-8264
kind: security-consideration
summary: The FreeformClass allows virtually any Unicode code point, making it expressive but hazardous. Protocol designers are warned it contains code points they may not understand; they should prefer profiling the IdentifierClass, or if they must use FreeformClass restrict it as tightly as possible. Defining superclasses of PRECIS string classes is explicitly prohibited.
section: "12.3"
topics:
    - security
