document: rfc-4429
kind: interoperability-note
summary: Optimistic DAD is designed to be fully interoperable with Standard Nodes (compliant with RFC 2461 and RFC 2462). Once an Optimistic Address completes DAD it behaves identically to a normal address; interoperation issues only arise during the Optimistic phase itself, and the protocol ensures Standard Nodes' Neighbor Caches are not corrupted.
section: "4.3"
topics:
    - ip
    - v6ops
