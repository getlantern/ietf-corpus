document: rfc-5536
kind: security-consideration
summary: If a malicious agent can predict the message identifier of a forthcoming article, it can preempt that article by posting its own article with the same Message-ID to prevent the target from propagating. Therefore, agents generating message identifiers SHOULD ensure they are unpredictable.
section: "5"
topics:
    - security
