document: rfc-6284
kind: normative-requirement
summary: The client MUST use the same RTCP CNAME in both the multicast and unicast sessions, and the CNAME MUST be unique per RFC 6222, so the server can correlate receiver reports across sessions.
section: "3.2"
rfc2119_level: MUST
topics:
