document: rfc-5384
kind: protocol-element
summary: When a new Join is received for a given tree, the set of attributes in the new Join entirely replaces the prior attribute set — no prior attribute information is retained. There is no incremental update mechanism; absent attributes are considered withdrawn.
section: 3.3.4
topics:
    - multicast
