document: rfc-9668
kind: protocol-element
summary: EDHOC connection identifiers C_I and C_R serve directly as the OSCORE Sender/Recipient IDs. C_R is the OSCORE Sender ID of the client and is transported in the 'kid' field of the OSCORE option; in the EDHOC + OSCORE request, it simultaneously serves as both the OSCORE kid and the EDHOC connection identifier C_R for session lookup.
section: "4"
topics:
