document: rfc-3122
kind: design-rationale
summary: The Source Address List in a Solicitation is explicitly allowed to be incomplete if all IPv6 addresses do not fit in a single message, but the Target Address List in an Advertisement should be complete (potentially spanning multiple Advertisement messages). This asymmetry reflects that the advertiser has full knowledge of its own addresses.
section: "3.1"
topics:
    - ip
