document: rfc-7899
kind: normative-requirement
summary: A PE implementing MVPN damping procedures MUST damp Leaf A-D routes in the same manner as C-multicast routes, and MUST damp activity related to removing itself from a P-tunnel, to protect the provider network from excessive P-tunnel state changes.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
    - vpn
    - routing
    - mpls
