document: rfc-4211
kind: protocol-element
summary: The pkiArchiveOptions control (id-regCtrl-pkiArchiveOptions) enables key escrow by conveying the private key (encryptedPrivKey via EnvelopedData), key generation parameters (keyGenParameters), or a flag requesting CA-generated key archival (archiveRemGenPrivKey). The EncryptedValue choice is deprecated; envelopedData MUST be used.
section: "6.4"
topics:
