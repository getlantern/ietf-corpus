document: rfc-4997
kind: protocol-element
summary: 'Each field in ROHC-FN has four attributes: UVALUE (uncompressed numerical value), ULENGTH (uncompressed length in bits), CVALUE (compressed numerical value), and CLENGTH (compressed length in bits). Attributes are undefined until bound; conflicting bindings cause the enclosing format to fail.'
