document: rfc-7712
kind: protocol-element
summary: 'A DNA prooftype is a mechanism for proving an association between a domain name and an XML stream. It must define: (1) the nature of the server''s proof, (2) matching rules for comparing the client''s verification material against the proof, (3) how the client obtains verification material, and (4) whether the mechanism depends on secure DNS.'
section: "7"
