document: rfc-3462
kind: security-consideration
summary: Automated use of report types without authentication enables forgery of negative reports, creating opportunity for denial-of-service attacks when reports drive automated maintenance of directories or mailing lists. Forging positive reports may cause senders to incorrectly believe a message was delivered.
section: "3"
topics:
    - email
    - security
