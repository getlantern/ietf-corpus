document: rfc-3597
kind: interoperability-note
summary: Because equality comparison for unknown RR types is bitwise and case-sensitive for embedded domain names, it is possible to have multiple RRs of the same owner name differing only in the character case of embedded domain names in new RR types — similar to the existing possibility with TXT records.
