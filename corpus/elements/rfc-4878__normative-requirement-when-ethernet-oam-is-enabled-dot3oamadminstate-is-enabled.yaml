document: rfc-4878
kind: normative-requirement
summary: When Ethernet OAM is enabled (dot3OamAdminState is enabled) but the interface is operating in half-duplex mode, dot3OamOperStatus returns nonOperHalfDuplex(10), because Ethernet OAM is not designed to work over half-duplex interfaces.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
