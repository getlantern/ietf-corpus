document: rfc-9748
kind: design-rationale
summary: RFC 5906 defined 30 Autokey extension field types but split the Field Type into four subfields (only for Autokey) and did not formally define registry columns, leading to inconsistencies. RFC 9748 provides formal column definitions and a complete corrected table to resolve the ambiguity.
section: "2.2"
topics:
    - ntp
    - registry
