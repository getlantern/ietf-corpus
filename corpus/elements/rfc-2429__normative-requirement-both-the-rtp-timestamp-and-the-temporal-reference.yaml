document: rfc-2429
kind: normative-requirement
summary: Both the RTP timestamp and the temporal reference (TR) in the H.263 picture header are required to carry the same relative timing information. The time increment between each coded H.263+ picture should be an integer multiple of (cd*cf)/20 using the 90 kHz clock.
section: "2.1"
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
