document: rfc-5663
kind: normative-requirement
summary: Extents MUST be aligned to 512-byte boundaries; writable extents MUST be aligned to the NFSv4 server's file-system block size (available as the layout_blksize attribute). Readable extents SHOULD be aligned to the server block size, but 512-byte alignment is acceptable for legacy file systems with fragments.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
