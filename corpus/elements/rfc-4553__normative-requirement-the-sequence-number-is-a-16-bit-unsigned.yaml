document: rfc-4553
kind: normative-requirement
summary: The sequence number is a 16-bit unsigned circular value whose initial value SHOULD be random (unpredictable), and it MUST be incremented with each SAToP data packet sent in the specific PW. Generation MUST follow the rules of RFC 3550 Section 5.1 for RTP sequence numbers.
section: 4.3.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
