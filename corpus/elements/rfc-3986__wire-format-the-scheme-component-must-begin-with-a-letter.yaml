document: rfc-3986
kind: wire-format
summary: 'The scheme component must begin with a letter and may be followed by letters, digits, plus ("+"), period ("."), or hyphen ("-"): scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). Schemes are case-insensitive but the canonical form is lowercase.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
