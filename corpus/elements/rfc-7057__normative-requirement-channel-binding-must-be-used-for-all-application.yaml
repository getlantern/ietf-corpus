document: rfc-7057
kind: normative-requirement
summary: Channel binding MUST be used for all application authentication. The EAP server MUST require that either the correct EAP lower-layer attribute or another attribute indicating the purpose of the authentication be present in the channel binding data.
section: "2"
rfc2119_level: MUST
