document: rfc-9110
kind: normative-requirement
summary: All senders and recipients SHOULD support, at a minimum, URIs with lengths of 8000 octets in protocol elements. A recipient MUST be able to parse and process protocol element lengths at least as long as the values it generates for those same elements in other messages.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
