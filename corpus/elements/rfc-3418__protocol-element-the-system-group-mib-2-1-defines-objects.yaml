summary: 'The system group (mib-2 1) defines objects common to all managed systems: sysDescr (DisplayString, read-only textual description), sysObjectID (OID identifying the device type), sysUpTime (TimeTicks since last re-initialization), sysContact, sysName, and sysLocation (read-write DisplayStrings up to 255 octets).'
