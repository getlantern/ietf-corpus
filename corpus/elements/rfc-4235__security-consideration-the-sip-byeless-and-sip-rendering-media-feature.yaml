document: rfc-4235
kind: security-consideration
summary: The sip.byeless and sip.rendering media feature tags can influence application behavior (e.g., cause premature call termination) and may reveal private information. Applications using these tags SHOULD provide integrity protection, and protocols conveying them SHOULD provide authenticity guarantees.
section: 8.4.1
topics:
    - sip
    - security
