document: rfc-7634
kind: protocol-element
summary: 'For IKEv2, 36 octets of KEYMAT are requested for each of SK_ei and SK_er (first 32 = key, last 4 = salt); no octets are requested for SK_ai or SK_ar. The 64-bit IV is included explicitly in the Encrypted Payload. The AAD is 32 octets: 28-octet IKEv2 header plus 4-octet encrypted payload header.'
section: "3"
