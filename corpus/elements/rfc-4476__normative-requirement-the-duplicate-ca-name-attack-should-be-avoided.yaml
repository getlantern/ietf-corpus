document: rfc-4476
kind: normative-requirement
summary: The duplicate-CA-name attack SHOULD be avoided by properly managing and configuring the PKI so that no two CAs share the same name, or alternatively by tying ACs to PKCs using the publicKeyCert type in the ObjectDigestInfo field.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
