document: rfc-8595
kind: normative-requirement
summary: When changing metadata for a specific MPI, it is RECOMMENDED that a new MPI be used to install a new entry in the metadata table and packets be marked with the equivalent new MLI, to avoid out-of-date metadata being applied during the transition.
section: 12.2.1
rfc2119_level: RECOMMENDED
topics:
    - mpls
