document: rfc-7981
kind: normative-requirement
summary: If the originating node does not support IPv4, the reserved value 0.0.0.0 MUST be used in the Router ID field, and the IPv6 TE Router ID sub-TLV (RFC 5316) MUST be present. TLVs with Router ID 0.0.0.0 lacking the IPv6 sub-TLV MUST NOT be used.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
