document: rfc-5059
kind: state-machine
summary: 'A Candidate-BSR operates a per-scope-zone state machine with three states: Candidate-BSR (C-BSR, another router is preferred), Pending-BSR (P-BSR, no preferred BSR exists but this router is not yet elected — prevents thrashing), and Elected-BSR (E-BSR, this router is the active BSR). Transitions are triggered by receiving preferred/non-preferred BSMs and Bootstrap Timer expiry.'
section: 3.1.1
topics:
    - multicast
    - routing
