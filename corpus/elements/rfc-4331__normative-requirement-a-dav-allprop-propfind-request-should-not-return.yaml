document: rfc-4331
kind: normative-requirement
summary: A <DAV:allprop> PROPFIND request SHOULD NOT return DAV:quota-available-bytes or DAV:quota-used-bytes. However, these property names MUST be returned in a <DAV:propname> request for a resource that supports the properties, except when limits are infinite.
section: "2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
