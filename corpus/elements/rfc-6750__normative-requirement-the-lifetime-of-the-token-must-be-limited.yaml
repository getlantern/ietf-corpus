document: rfc-6750
kind: normative-requirement
summary: The lifetime of the token MUST be limited to mitigate token capture and replay; a validity time field inside the protected part of the token is one means of achieving this. Confidentiality protection of all exchanges MUST be applied.
section: "5.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
