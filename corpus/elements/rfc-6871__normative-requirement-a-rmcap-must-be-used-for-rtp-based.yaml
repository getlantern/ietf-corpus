document: rfc-6871
kind: normative-requirement
summary: '''a=rmcap'' MUST be used for RTP-based media formats, whereas ''a=omcap'' MUST be used for non-RTP-based (other) media formats. Media capability numbers are shared between the two attributes and MUST be unique across the entire SDP session.'
section: 3.3.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
