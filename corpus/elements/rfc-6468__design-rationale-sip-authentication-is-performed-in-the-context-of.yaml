document: rfc-6468
kind: design-rationale
summary: SIP authentication is performed in the context of the Sieve engine (not the end user) to avoid the security risk of the Sieve engine having access to end-user SIP authentication credentials. The engine may use server-wide credentials or per-user credentials for auditing.
section: "2.2"
topics:
    - sip
    - security
    - realtime
