document: rfc-3267
kind: interoperability-note
summary: AMR and AMR-WB are always distinct payload types in RTP. The extra comfort noise frame types native to GSM-EFR, IS-641, and PDC-EFR (included in the AMR frame type table) MUST NOT be used in this payload format because the standardized AMR codec only implements the general AMR SID frame type.
section: 4.3.2
topics:
    - rtp
    - realtime
    - voip
