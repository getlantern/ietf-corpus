document: rfc-2515
kind: protocol-element
summary: atmTrafficFrameDiscard (TruthValue, default true) requests the network to treat connection data as frames (e.g., AAL5 CPCS-PDUs) rather than individual cells, enabling whole-frame discard during congestion instead of dropping scattered cells from many frames.
