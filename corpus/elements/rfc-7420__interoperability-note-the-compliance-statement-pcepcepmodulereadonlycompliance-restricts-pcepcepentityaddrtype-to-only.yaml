document: rfc-7420
kind: interoperability-note
summary: The compliance statement (pcePcepModuleReadOnlyCompliance) restricts pcePcepEntityAddrType to only unknown(0), ipv4(1), and ipv6(2). The corresponding restriction on pcePcepPeerAddrType is intentionally omitted from the formal MODULE-COMPLIANCE due to an SMIv2 limitation that disallows restricting index objects in scope, though the same restriction is intended.
section: "4.1"
topics:
    - routing
    - snmp
