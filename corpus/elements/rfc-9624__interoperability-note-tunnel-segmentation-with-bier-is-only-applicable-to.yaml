document: rfc-9624
kind: interoperability-note
summary: Tunnel segmentation with BIER is only applicable to EVPN-MPLS, not to EVPN-VXLAN/NVGRE/GENEVE. Additionally, the LIR-pF flag cannot be used with tunnel segmentation (same restriction as MVPN).
section: 2.2.2.2
topics:
    - multicast
    - routing
    - mpls
