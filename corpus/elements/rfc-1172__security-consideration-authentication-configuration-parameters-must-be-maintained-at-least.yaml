document: rfc-1172
kind: security-consideration
summary: Authentication configuration parameters MUST be maintained at least per-interface to prevent an attacker from negotiating a weaker authentication protocol or no authentication at all. Downgrade attacks are an explicit threat model for this option.
section: "2.3"
topics:
    - security
