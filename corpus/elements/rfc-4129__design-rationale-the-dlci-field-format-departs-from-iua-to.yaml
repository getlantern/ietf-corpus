document: rfc-4129
kind: design-rationale
summary: The DLCI field format departs from IUA to conform with the DPNSS specification (ND1301:2001/03 / BTNR 188), which defines a different channel-numbering and virtual-channel model than ISDN. DASS 2 uses only 32 DLCs (no virtual channels), constraining the channel number range to 0–31.
section: "2.2"
