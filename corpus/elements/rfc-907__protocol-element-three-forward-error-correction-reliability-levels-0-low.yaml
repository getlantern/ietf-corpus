document: rfc-907
kind: protocol-element
summary: Three forward-error-correction reliability levels (0=low, 1=medium, 2=high) are available to the host via bits 6–7 of datagram word 3. The Reliability Length field (bits 0–5) allows the host to transmit a leading portion of user data (e.g., IP and TCP headers) at maximum reliability while the remainder uses the specified level.
section: "3"
topics:
