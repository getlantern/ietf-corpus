document: rfc-4872
kind: design-rationale
summary: LSP Protection Type values are given end-to-end significance but processed hop-by-hop. This design allows easier implementation of reversion signaling and enables transparent delivery of protected services, since intermediate nodes need not interpret the Protection Type semantics — only the S and P bits matter locally.
section: 4.2.2
topics:
    - mpls
    - routing
