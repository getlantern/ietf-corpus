document: rfc-9448
kind: security-consideration
summary: The TNAuthList Authority Token carries credentials scoped to represent telephone numbers, number blocks, or an entire SPC. Its creation, transport, and any storage MUST follow the strictest security best practices, including encrypted transport, to prevent misuse by bad actors for telephone number impersonation.
section: "10"
rfc2119_level: MUST
topics:
    - security
    - acme
    - voip
