document: rfc-3903
kind: protocol-element
summary: The SIP-If-Match header field carries an entity-tag in PUBLISH requests to condition the operation on a specific previously published event state. It is used for refresh, modify, and remove operations; initial publications must not include it.
section: 11.3.2
topics:
