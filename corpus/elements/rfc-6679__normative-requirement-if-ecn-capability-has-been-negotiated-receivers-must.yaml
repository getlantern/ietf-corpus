document: rfc-6679
kind: normative-requirement
summary: If ECN capability has been negotiated, receivers MUST listen for ECT or ECN-CE marked RTP packets and generate RTCP ECN feedback packets. Reception of ECN-CE-marked packets MUST result in additional early or immediate ECN feedback packets being sent unless no timely feedback is required.
section: 7.2.1
rfc2119_level: MUST
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
