document: rfc-5027
kind: design-rationale
summary: Using an optional security precondition combined with the SIP "Supported" header and option tag "precondition" (rather than mandatory with "Require") avoids the Heterogeneous Error Response Forking Problem (HERFP) that arises because mandatory preconditions require SIP UAs to support preconditions or reject the request.
section: "3"
topics:
