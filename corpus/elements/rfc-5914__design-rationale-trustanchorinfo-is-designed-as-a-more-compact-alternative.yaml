document: rfc-5914
kind: design-rationale
summary: TrustAnchorInfo is designed as a more compact alternative to X.509 certificates for exchanging trust anchor information. It also provides a means of associating additional or alternative constraints with certificates without breaking the signature on the certificate itself.
