document: rfc-8042
kind: interoperability-note
summary: Backward compatibility is enforced by requiring all routers in an area with two-part metric networks to advertise capability bit 6. Routers that do not set this bit cause all other routers to fall back to ignoring network-to-router costs in SPF.
section: "3.7"
topics:
    - routing
