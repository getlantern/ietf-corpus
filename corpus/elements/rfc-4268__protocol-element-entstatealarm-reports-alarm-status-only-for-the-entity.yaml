document: rfc-4268
kind: protocol-element
summary: entStateAlarm reports alarm status only for the entity itself, not for child components within its containment hierarchy. 'unknown' means alarm state cannot be reported; 'indeterminate' means alarms exist but their severity is unknown — these two values are semantically distinct.
