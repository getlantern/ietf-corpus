document: rfc-8587
kind: normative-requirement
summary: Servers that provide information about trunkable network paths are REQUIRED to place file system location entries representing addresses usable with the current server or a migration target before those associated with replicas, enabling clients to cease scanning early.
section: 5.2.6
rfc2119_level: REQUIRED
