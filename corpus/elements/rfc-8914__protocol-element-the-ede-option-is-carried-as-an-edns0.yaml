document: rfc-8914
kind: protocol-element
summary: The EDE option is carried as an EDNS0 option (RFC 6891) and can be included in any DNS response (SERVFAIL, NXDOMAIN, REFUSED, NOERROR, etc.) to a query that includes an OPT pseudo-RR. Senders MAY include more than one EDE option per message.
section: "2"
