document: rfc-2046
kind: wire-format
summary: The multipart boundary parameter consists of 1 to 70 characters from the set of bchars (alphanumeric plus "'()+_,-./:=?") and space, but must NOT end with whitespace. The dash-boundary is '--' followed by the boundary value. The close-delimiter appends '--' after the final boundary.
section: 5.1.1
