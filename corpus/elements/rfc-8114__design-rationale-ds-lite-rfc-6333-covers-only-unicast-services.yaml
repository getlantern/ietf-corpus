document: rfc-8114
kind: design-rationale
summary: DS-Lite (RFC 6333) covers only unicast services; without multicast extension, AFTR devices become replication points for downstream multicast traffic, sending multicast data over a unicast infrastructure and consuming downstream bandwidth. The solution extends DS-Lite to use IPv6 multicast distribution trees, preserving native multicast efficiency.
section: "1"
topics:
    - multicast
    - v6ops
    - ip
