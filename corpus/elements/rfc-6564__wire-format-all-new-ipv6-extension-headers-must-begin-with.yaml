document: rfc-6564
kind: wire-format
summary: All new IPv6 extension headers must begin with an 8-bit Next Header selector (same values as IPv4 Protocol field) followed by an 8-bit Hdr Ext Len field (length in 8-octet units, not including the first 8 octets), followed by variable-length Header Specific Data.
