document: rfc-2369
kind: design-rationale
summary: Multiple separate header fields were chosen over a single field to avoid inventing a new meta-syntax, to keep individual field size manageable (single-field multi-command content risks modification by servers in transit), and to allow clients and list managers to implement only a needed subset independently.
section: A.1
