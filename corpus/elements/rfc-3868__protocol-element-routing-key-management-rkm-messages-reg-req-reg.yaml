document: rfc-3868
kind: protocol-element
summary: Routing Key Management (RKM) messages (REG REQ, REG RSP, DEREG REQ, DEREG RSP) support dynamic registration and deregistration of Routing Keys between an ASP and its SGP, as an alternative to static provisioning via MIB or external database.
