document: rfc-8710
kind: wire-format
summary: The application/multipart-core representation is encoded as a CBOR array with an even number of elements. Even-indexed elements are unsigned integers specifying the Content-Format ID; odd-indexed elements are byte strings containing the representation or null if the optional part is absent.
