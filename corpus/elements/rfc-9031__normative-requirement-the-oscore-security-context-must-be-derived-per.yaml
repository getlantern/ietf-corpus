document: rfc-9031
kind: normative-requirement
summary: 'The OSCORE security context MUST be derived per RFC 8613 Section 3: Master Secret MUST be the PSK, Master Salt MUST be the empty byte string, ID Context MUST be the pledge identifier, pledge Sender ID MUST be the empty byte string, and JRC Recipient ID MUST be 0x4a5243 (''JRC'' in ASCII).'
section: "7.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
