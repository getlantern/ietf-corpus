document: rfc-7565
kind: design-rationale
summary: The 'acct' URI scheme was created to generically identify a user's account at a service provider without specifying a particular application protocol. Existing schemes like 'mailto' and 'http' are tied to specific services, and not all providers offer email or web interfaces, so a protocol-agnostic identifier was needed.
section: "3"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
