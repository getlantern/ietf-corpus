document: rfc-6111
kind: design-rationale
summary: This document was created because RFC 4120 did not reserve Kerberos names with special meanings, leading protocol designers to use obscure names to avoid collision. Even a registry cannot prevent deployed implementations from accidentally reusing names, which could grant unintended access.
section: "1"
topics:
    - security
