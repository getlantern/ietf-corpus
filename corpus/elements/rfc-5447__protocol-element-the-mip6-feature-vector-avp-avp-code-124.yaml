document: rfc-5447
kind: protocol-element
summary: 'The MIP6-Feature-Vector AVP (AVP Code 124) is of type Unsigned64 and carries a 64-bit flags field indicating supported capabilities of the NAS/ASP. It is used bidirectionally: the NAS advertises capabilities to the Diameter server, and the server echoes back which are authorized.'
section: 4.2.5
topics:
    - diameter
    - mobility
