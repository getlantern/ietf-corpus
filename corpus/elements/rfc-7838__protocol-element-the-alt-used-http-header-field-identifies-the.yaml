document: rfc-7838
kind: protocol-element
summary: 'The Alt-Used HTTP header field identifies the alternative service in use in requests, using the syntax: Alt-Used = uri-host [ ":" port ]. It is intended to allow alternative services to detect loops, differentiate traffic for load balancing, and identify intended traffic destinations.'
