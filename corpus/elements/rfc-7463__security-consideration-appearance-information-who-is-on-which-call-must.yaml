document: rfc-7463
kind: security-consideration
summary: Appearance information (who is on which call) must not be leaked outside the group. A UA may deliberately omit dialog identifiers (Call-ID, to-tag, from-tag) from publications to prevent other UAs from constructing Join or Replaces headers, providing a mechanism beyond the <exclusive> hint.
section: 5.2.2
topics:
    - security
    - privacy
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
