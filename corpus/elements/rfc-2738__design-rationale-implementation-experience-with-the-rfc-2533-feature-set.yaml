document: rfc-2738
kind: design-rationale
summary: Implementation experience with the RFC 2533 feature set matching rules has suggested a revised algorithm with more useful simplification rules. Apart from the corrected rule, the RFC 2533 algorithm has been implemented and shown to work as intended, but results are not always in the most convenient form; a revised algorithm is planned for future publication.
section: "3"
