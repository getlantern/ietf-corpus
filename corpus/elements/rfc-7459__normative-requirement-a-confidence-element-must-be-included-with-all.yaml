document: rfc-7459
kind: normative-requirement
summary: A confidence element MUST be included with all location information that includes uncertainty (i.e., all forms other than a Point). If confidence is not known, the special value 'unknown' MUST be used.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
