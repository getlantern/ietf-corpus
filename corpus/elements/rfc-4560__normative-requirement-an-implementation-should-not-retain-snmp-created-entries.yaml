document: rfc-4560
kind: normative-requirement
summary: An implementation SHOULD NOT retain SNMP-created entries in the lookupResultsTable across reIPLs (Initial Program Loads) of its agent, since management applications need to see consistent behavior with respect to persistence of table entries.
