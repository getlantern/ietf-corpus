document: rfc-3544
kind: normative-requirement
summary: TCP_SPACE MUST be at least 0 and at most 255. NON_TCP_SPACE MUST be at least 0 and at most 65535. A value of 0 in either field implies one context (not zero contexts, absent suboption 3).
section: "2.1"
rfc2119_level: MUST
