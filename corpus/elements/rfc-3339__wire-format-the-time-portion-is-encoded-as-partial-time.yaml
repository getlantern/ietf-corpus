document: rfc-3339
kind: wire-format
summary: The time portion is encoded as partial-time = time-hour ':' time-minute ':' time-second [time-secfrac], where time-hour is 2DIGIT (00-23), time-minute is 2DIGIT (00-59), time-second is 2DIGIT (00-60 allowing for leap second), and time-secfrac is '.' followed by one or more digits.
section: "5.6"
