document: rfc-7825
kind: normative-requirement
summary: The RTSP client SHALL gather candidates for UDP transport per ICE §4.1.1 and for TCP-based candidates per ICE-TCP §5 for each media stream supporting ICE. Each media stream SHALL have its own unique combination of ICE candidates and ICE-ufrag in the SETUP request.
section: "6.2"
rfc2119_level: SHALL
topics:
    - nat
    - realtime
