document: rfc-5723
kind: interoperability-note
summary: Child SAs, internal IP addresses, other Configuration Payload information, MOBIKE additional addresses, and peer Vendor IDs are not resumed; they must be re-established in the new exchange. New IKEv2 extensions not covered by the state table SHOULD specify how they interact with session resumption.
section: "5"
topics:
