document: rfc-4334
kind: security-consideration
summary: In practice, SSID disclosure via certificates is of little concern because other WLAN management messages already include the SSID, so masking the SSID in AP beacons only forces an attacker to eavesdrop on management messages instead. Placing the SSID in the certificate does not worsen the security posture.
section: "5"
topics:
