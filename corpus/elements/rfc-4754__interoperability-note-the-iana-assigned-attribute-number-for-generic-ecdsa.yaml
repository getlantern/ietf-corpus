document: rfc-4754
kind: interoperability-note
summary: The IANA-assigned attribute number for generic ECDSA in IKE is 8, but the IKEv2 authentication method registry did not originally include ECDSA. This document resolves the gap by introducing three specific named methods (ECDSA-256, ECDSA-384, ECDSA-521) added to both registries.
section: "4"
topics:
