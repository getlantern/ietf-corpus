document: rfc-2006
kind: security-consideration
summary: The Mobile IP MIB affords network operators the ability to configure and control Mobile IP links; read-write and read-create objects (such as mipEnable, security association parameters, and advertisement configuration) should be protected using SNMPv2 security mechanisms to prevent unauthorized modification.
