document: rfc-9669
kind: security-consideration
summary: BPF execution environments should only run trusted and verified BPF programs, using sandboxing and privilege level separation to limit security impact. BPF verifiers (e.g., Linux kernel verifier, PREVAIL) enforce termination, safe memory access, API contract adherence, and absence of undefined-behavior instructions, often providing stronger assurance than general OS code.
section: "6"
topics:
    - security
