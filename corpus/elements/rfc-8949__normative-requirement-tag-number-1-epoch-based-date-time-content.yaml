document: rfc-8949
kind: normative-requirement
summary: Tag number 1 (epoch-based date/time) content MUST be an unsigned or negative integer (major types 0 or 1) or a floating-point number (major type 7 with additional info 25, 26, or 27); other contained types are invalid. Applications requiring times after early 2106 cannot omit 64-bit integer support.
section: 3.4.2
rfc2119_level: MUST
topics:
    - cbor
