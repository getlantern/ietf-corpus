document: rfc-7032
kind: security-consideration
summary: 'LDP DoD''s request-driven nature is an inherent security property: unsolicited label mappings are not accepted by upstream LSRs, limiting unauthorized label injection. ABR LSRs act as MPLS network gateways controlling FEC access. With static routing, compromised ANs cannot influence ABR routing decisions; with access IGP, FEC stealing is topologically constrained and detectable via session loss.'
section: "7.1"
topics:
    - security
    - mpls
