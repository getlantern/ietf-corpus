document: rfc-6652
kind: design-rationale
summary: No standardized method existed for ADMDs using SPF to receive notifications when messages arrive via unauthorized routes. While SPF record lookups could be tracked via specially crafted DNS records and servers, this document provides a standardized, ARF-based mechanism as a cleaner alternative.
section: "3"
topics:
    - email
