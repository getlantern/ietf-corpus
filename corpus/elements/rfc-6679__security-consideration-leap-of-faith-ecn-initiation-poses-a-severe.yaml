document: rfc-6679
kind: security-consideration
summary: 'Leap-of-faith ECN initiation poses a severe risk: if a middlebox discards ECN-marked packets, all media could be lost. Even when ECN-reverting middleboxes are present, congestion responsiveness is impaired since applications fall back to packet loss as the only congestion signal, potentially increasing congestion.'
section: 7.2.3
topics:
    - security
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
