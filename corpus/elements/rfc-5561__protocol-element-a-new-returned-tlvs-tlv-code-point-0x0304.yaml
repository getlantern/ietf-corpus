document: rfc-5561
kind: protocol-element
summary: A new 'Returned TLVs' TLV (code point 0x0304) is defined and MAY be carried as an Optional Parameter in a Notification message. When the Status Code is Unsupported Capability, the Notification MUST include a Returned TLVs TLV containing only the Capability Parameters for unsupported capabilities.
section: "8"
topics:
