summary: The MIB retains the same OBJECT IDENTIFIER values as MIB-II for the original ifTable objects and preserves BER ('on the wire') encodings unchanged, so existing agents conforming to MIB-II and the ifExtensions MIB (RFC 1229) generally require no rewrite.
