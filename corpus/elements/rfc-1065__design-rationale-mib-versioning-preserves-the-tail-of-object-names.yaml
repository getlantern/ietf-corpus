document: rfc-1065
kind: design-rationale
summary: MIB versioning preserves the 'tail' of object names (the portion after { mgmt version-number }) across versions, so multi-version implementations can share a common tail-space rather than maintaining entirely separate name trees. This design makes simultaneous support for multiple MIB versions vastly simpler.
section: "5"
