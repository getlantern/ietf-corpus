document: rfc-9639
kind: interoperability-note
summary: FLAC can be mapped into Ogg, Matroska, and ISO Base Media File Format (MP4) containers. Each container mapping is defined separately in Section 10. The streamable subset is not required for containerized FLAC since containers handle seeking and framing.
section: "10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
