document: rfc-8108
kind: normative-requirement
summary: For all profiles (RTP/AVP, RTP/SAVP, RTP/AVPF, RTP/SAVPF), the SSRC timeout interval SHALL be 5*Td, where Td for timeout purposes SHALL be calculated using Tmin = 5 seconds, not the reduced minimal interval. This updates RFC 4585 Section 3.5.4.
section: 7.1.4
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
