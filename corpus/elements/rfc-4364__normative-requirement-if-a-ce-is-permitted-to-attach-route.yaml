document: rfc-4364
kind: normative-requirement
summary: If a CE is permitted to attach Route Targets to its routes, the PE MUST filter out all routes carrying RTs the customer is not authorized to use. If the CE attaches unauthorized RTs, the PE MUST remove them before converting the route to a VPN-IPv4 route.
section: 4.3.1
rfc2119_level: MUST
topics:
    - bgp
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
