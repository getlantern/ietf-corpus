document: rfc-2049
kind: normative-requirement
summary: Conforming user agents must be able to distinguish encoded-words from 'text', 'ctext', or 'word' tokens wherever they appear in message headers, and MUST support both the 'B' (base64) and 'Q' (quoted-printable) encodings for any character set they support.
section: "2"
rfc2119_level: MUST
