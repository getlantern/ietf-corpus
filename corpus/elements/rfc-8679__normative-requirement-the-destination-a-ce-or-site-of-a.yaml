document: rfc-8679
kind: normative-requirement
summary: The destination (a CE or site) of a service MUST be dual-homed or have dual paths to an MPLS network via two MPLS edge routers — one the egress router, the other a backup egress router — for egress protection to be applicable.
section: "1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
