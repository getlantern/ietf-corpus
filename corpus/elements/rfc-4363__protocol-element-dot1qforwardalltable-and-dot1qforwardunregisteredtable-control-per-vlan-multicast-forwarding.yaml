document: rfc-4363
kind: protocol-element
summary: 'dot1qForwardAllTable and dot1qForwardUnregisteredTable control per-VLAN multicast forwarding: ForwardAllPorts (all multicast forwarded), ForwardAllStaticPorts (statically configured), ForwardAllForbiddenPorts (forbidden), and the equivalent for unregistered addresses. Both tables are indexed by dot1qFdbId and group address.'
