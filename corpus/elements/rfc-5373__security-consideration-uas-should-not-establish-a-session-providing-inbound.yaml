document: rfc-5373
kind: security-consideration
summary: UAs SHOULD NOT establish a session providing inbound media without explicit user acceptance where the requesting user is unknown or unauthorized. This is intended to prevent unsolicited media playout ('SPAM broadcast' / 'whoopee-cushion') attacks.
section: "7.4"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - security
    - realtime
