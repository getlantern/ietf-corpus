document: rfc-7876
kind: normative-requirement
summary: If an out-of-band Response is requested but the URO is missing, the Query SHOULD be dropped for unidirectional LSPs. For bidirectional LSPs, the Response SHOULD have its Control Code set to 0x1C ('Error - Invalid Message') and be sent over the reverse LSP; the malformed request SHOULD be reported to the operator.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - mpls
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
