document: rfc-5286
kind: normative-requirement
summary: Loop-free alternates should not be used in the OSPF backbone area if virtual links are configured (unless a full mesh of virtual links exists among transit area ABRs), for inter-area routes in areas with more than one alternate ABR, or for AS External routes in specific multi-area ASBR configurations that allow area transiting.
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - ip
