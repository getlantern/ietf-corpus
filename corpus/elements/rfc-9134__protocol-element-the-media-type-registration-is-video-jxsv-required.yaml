document: rfc-9134
kind: protocol-element
summary: 'The media type registration is video/jxsv. Required parameters are ''rate'' (SHALL be 90000) and ''packetmode'' (SHALL equal the K-bit value: 0 for codestream, 1 for slice). Optional parameters include transmode, profile, level, sublevel, depth, width, height, exactframerate, interlace, segmented, sampling, colorimetry, TCS, and RANGE.'
section: "7.1"
