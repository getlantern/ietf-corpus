document: rfc-4055
kind: normative-requirement
summary: If the keyUsage extension is present in an end-entity certificate conveying an RSA public key with id-RSASSA-PSS, the extension MUST contain nonRepudiation and/or digitalSignature. For a CA certificate with id-RSASSA-PSS, it MUST contain one or more of nonRepudiation, digitalSignature, keyCertSign, or cRLSign.
section: "1.2"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
