summary: 'Single-precision floating-point (float) is 32 bits encoded per IEEE 754: 1-bit sign (S), 8-bit biased exponent (E, bias=127), and 23-bit mantissa fraction (F), transmitted big-endian. NaN is system-dependent and must not be interpreted as anything other than NaN.'
