document: rfc-3309
kind: wire-format
summary: The bit-ordering convention for CRC-32c in SCTP maps bytes most-significant first, but within each byte bits are taken least-significant first (reflected/mirrored ordering). The CRC remainder register is initialized with all 1s and the final result is complemented.
section: "2.1"
topics:
    - sctp
