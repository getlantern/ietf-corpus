document: rfc-9352
kind: protocol-element
summary: The Maximum Segments Left MSD Type (SRH Max SL, value 41) signals the maximum value of the Segments Left field in the SRH of a received packet before applying the associated Endpoint behavior. If no value is advertised, the supported value is 0.
