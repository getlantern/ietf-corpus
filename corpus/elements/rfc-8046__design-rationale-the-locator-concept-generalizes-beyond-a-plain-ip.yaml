document: rfc-8046
kind: design-rationale
summary: The locator concept generalizes beyond a plain IP address to include an ESP SPI (Locator Type 1) because in multihoming contexts certain IP addresses must be paired with specific SPIs to avoid violating the ESP anti-replay window. Plain IP addresses alone are insufficient to unambiguously describe packet handling below HIP when multiple SAs are in use.
section: 3.1.1
topics:
    - ip
    - ipsec
    - mobility
