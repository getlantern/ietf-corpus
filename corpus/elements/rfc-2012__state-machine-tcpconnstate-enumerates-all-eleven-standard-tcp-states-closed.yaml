document: rfc-2012
kind: state-machine
summary: tcpConnState enumerates all eleven standard TCP states—closed(1), listen(2), synSent(3), synReceived(4), established(5), finWait1(6), finWait2(7), closeWait(8), lastAck(9), closing(10), timeWait(11)—plus the management action deleteTCB(12) which forces immediate connection termination.
