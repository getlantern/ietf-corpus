document: rfc-5048
kind: interoperability-note
summary: 'When a FastAbort-capable target has mixed sessions (some RFC 3720, some FastAbort) sharing affected tasks, different rules apply: for RFC 3720 issuing sessions with FastAbort third-party sessions, the target SHOULD send AsyncEvent=5 on the third-party connections; the reverse case forbids sending AsyncEvent=5.'
section: 4.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
