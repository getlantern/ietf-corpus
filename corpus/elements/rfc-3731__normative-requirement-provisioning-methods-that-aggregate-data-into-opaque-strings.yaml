document: rfc-3731
kind: normative-requirement
summary: Provisioning methods that aggregate data into opaque strings SHOULD NOT be used because they impose additional parsing, interpretation, and validation requirements on protocol processors; discrete data elements by type are preferred.
section: "2.7"
rfc2119_level: SHOULD NOT
