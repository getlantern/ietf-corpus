document: rfc-2793
kind: design-rationale
summary: A 1000 Hz RTP clock was chosen because text is entered at low rates (a few characters per second) and the timestamp only needs to encode approximate entry time rather than sample-accurate durations; redundancy increases channel load minimally since packet overhead dominates payload size.
