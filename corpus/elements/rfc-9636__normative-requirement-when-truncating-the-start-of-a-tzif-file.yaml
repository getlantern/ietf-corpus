document: rfc-9636
kind: normative-requirement
summary: When truncating the start of a TZif file, the service MUST supply a first version 2+ transition at the truncation start point, and time type 0 MUST be a placeholder indicating unspecified local time to unambiguously signal truncation.
section: "6.1"
rfc2119_level: MUST
