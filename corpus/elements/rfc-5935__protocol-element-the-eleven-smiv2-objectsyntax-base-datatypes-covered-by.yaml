summary: 'The eleven SMIv2 ObjectSyntax base datatypes covered by this XSD mapping are: INTEGER, Integer32, Unsigned32, Gauge32, Counter32, TimeTicks, Counter64, OCTET STRING, Opaque, IpAddress, and OBJECT IDENTIFIER. The BITS construct is treated as a Textual Convention, not a base datatype.'
