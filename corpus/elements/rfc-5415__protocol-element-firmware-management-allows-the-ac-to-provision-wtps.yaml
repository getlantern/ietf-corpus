document: rfc-5415
kind: protocol-element
summary: Firmware Management allows the AC to provision WTPs with updated images. When the Join Response Image Identifier differs from the WTP's running image and the image is not cached locally, the WTP enters Image Data state and exchanges Image Data Request/Response messages to download the firmware before rebooting.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
