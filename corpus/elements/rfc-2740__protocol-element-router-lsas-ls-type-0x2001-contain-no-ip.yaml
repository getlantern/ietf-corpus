document: rfc-2740
kind: protocol-element
summary: Router-LSAs (LS type 0x2001) contain no IP addresses; topology is expressed as 16-byte link descriptions with fields Type, Metric, Interface ID, Neighbor Interface ID, and Neighbor Router ID. A router may originate multiple Router-LSAs per area (distinguished by Link State ID); SPF calculation MUST concatenate all Router-LSAs from a given router.
section: 3.4.3.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
