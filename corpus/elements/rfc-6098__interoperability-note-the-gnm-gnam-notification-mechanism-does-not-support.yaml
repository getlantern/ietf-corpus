document: rfc-6098
kind: interoperability-note
summary: The GNM/GNAM notification mechanism does not support the case of co-located Care-of Address mode with registration through a Foreign Agent (i.e., when the 'R' bit is set in the FA's advertisement messages). Only FA-CoA registration through an FA and direct co-located CoA registration to the HA are supported topologies.
section: 3.2.1.2
topics:
    - mobility
    - ip
