document: rfc-9183
kind: protocol-element
summary: 'L2-to-L1 ingress nickname replacement: when a TRILL Data packet from another L1 area arrives, the border RBridge MAY select one area nickname of the ingress area using a pseudorandom algorithm (per RFC 7357 Section 5.3) to enable per-flow load balancing of return unicast traffic.'
section: "4.1"
topics:
    - routing
