document: rfc-7648
kind: security-consideration
summary: A received request carrying an unknown Opcode or option SHOULD be dropped (or the non-mandatory unknown option removed) if it is not compatible with security controls provisioned to the PCP proxy, to prevent forwarding messages with hidden untranslated addresses.
section: "4"
rfc2119_level: SHOULD
topics:
