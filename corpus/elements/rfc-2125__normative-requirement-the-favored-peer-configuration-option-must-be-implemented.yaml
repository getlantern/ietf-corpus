document: rfc-2125
kind: normative-requirement
summary: The Favored-Peer Configuration Option MUST be implemented. A Magic-Number of zero is illegal and MUST always be Nak'd. If it is unclear which peer initiated the connection (e.g., on a leased line), a random number MUST be used.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
