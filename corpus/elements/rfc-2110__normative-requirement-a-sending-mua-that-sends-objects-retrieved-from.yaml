document: rfc-2110
kind: normative-requirement
summary: A sending MUA that sends objects retrieved from the WWW SHOULD maintain their WWW URIs and SHOULD NOT transform these URIs into another form before transmitting. This enables receiving MUAs to verify MICs and check documents against their WWW counterparts.
section: "7"
rfc2119_level: SHOULD
topics:
    - email
    - http
