document: rfc-6793
kind: security-consideration
summary: Inconsistency between the AS_PATH attribute and the AS4_PATH attribute can cause loss of AS path information and potential routing loops, particularly when routes carrying AS4_PATH are aggregated by an OLD BGP speaker. This inconsistency could be exploited by an attacker to induce routing loops.
section: "10"
topics:
    - bgp
    - routing
    - security
