document: rfc-9776
kind: normative-requirement
summary: SSM-aware routers SHOULD ignore records with multicast addresses in the SSM range if the record type is MODE_IS_EXCLUDE or CHANGE_TO_EXCLUDE_MODE, and SHOULD ignore IGMPv1/IGMPv2 reports for SSM addresses. SSM-aware hosts SHOULD NOT send MODE_IS_EXCLUDE or CHANGE_TO_EXCLUDE_MODE records for SSM addresses.
section: "6.4"
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
