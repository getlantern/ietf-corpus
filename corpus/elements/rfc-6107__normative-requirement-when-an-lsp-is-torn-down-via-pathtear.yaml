document: rfc-6107
kind: normative-requirement
summary: When an LSP is torn down via PathTear or PathErr with Path_State_Removed set, the ingress and egress SHOULD withdraw any link advertisement the LSP created. The advertisement MAY be retained as a virtual link in another layer network per policy.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
