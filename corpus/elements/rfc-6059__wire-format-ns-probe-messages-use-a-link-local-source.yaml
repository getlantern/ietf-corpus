document: rfc-6059
kind: wire-format
summary: NS probe messages use a link-local source address, the router's link-local address as both IPv6 destination and ND Target Address, Hop Limit 255, and the router's MAC address as the link-layer destination. The probing node SHOULD include the source link-layer address option.
section: 5.6.1
topics:
