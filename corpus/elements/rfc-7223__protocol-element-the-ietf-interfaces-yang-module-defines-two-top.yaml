document: rfc-7223
kind: protocol-element
summary: 'The ''ietf-interfaces'' YANG module defines two top-level containers: ''/interfaces'' (config true) holding the list of configured interfaces keyed by name, and ''/interfaces-state'' (config false) holding the operational state of all interfaces including counters. Interface-type-specific models are expected to augment these lists.'
section: "3"
topics:
