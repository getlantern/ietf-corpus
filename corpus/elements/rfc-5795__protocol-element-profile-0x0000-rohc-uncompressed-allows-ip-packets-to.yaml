document: rfc-5795
kind: protocol-element
summary: Profile 0x0000 (ROHC UNCOMPRESSED) allows IP packets to be sent without compression, using only CID overhead. It supports IR packets (with optional embedded IP packet) and Normal packets (raw IP with CID prefix); the only feedback defined is ACK via FEEDBACK-1 with a zero octet.
section: "5.4"
topics:
    - routing
    - ip
