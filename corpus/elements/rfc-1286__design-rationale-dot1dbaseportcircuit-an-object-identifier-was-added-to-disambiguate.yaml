summary: dot1dBasePortCircuit (an OBJECT IDENTIFIER) was added to disambiguate ports that share the same dot1dBasePortIfIndex value, e.g., multiple ports each corresponding to one X.25 virtual circuit on a single interface. Ports with a unique ifIndex set this to {0 0}.
