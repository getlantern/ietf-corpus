summary: Security protection attributes include GSS_C_MA_INTEG_PROT (arc 17) for per-message integrity, GSS_C_MA_CONF_PROT (arc 18) for confidentiality, GSS_C_MA_MIC (arc 19) for MIC tokens, GSS_C_MA_WRAP (arc 20) for WRAP tokens, GSS_C_MA_REPLAY_DET (arc 22) for replay detection, and GSS_C_MA_OOS_DET (arc 23) for out-of-sequence detection.
