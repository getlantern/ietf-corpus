document: rfc-5213
kind: normative-requirement
summary: Upon accepting a de-registration PBU (lifetime=0), the LMA MUST wait MinDelayBeforeBCEDelete time before deleting the BCE to allow a new MAG time to register. During the wait, the LMA SHOULD drop the mobile node's data traffic.
section: 5.3.5
rfc2119_level: MUST
topics:
    - mobility
