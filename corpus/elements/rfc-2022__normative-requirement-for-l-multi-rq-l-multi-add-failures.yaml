document: rfc-2022
kind: normative-requirement
summary: For L_MULTI_RQ/L_MULTI_ADD failures with UNI cause codes 49, 51, 37, or 41 (resource/QoS unavailable or temporary failure), the request MUST be retried after a random delay of 5–10 seconds, doubling on each subsequent failure. For other failure causes the ATM address is dropped from the group membership set. The VC MAY be considered 'up' before all failed L_MULTI_ADDs have been re-issued.
section: 5.1.3
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
