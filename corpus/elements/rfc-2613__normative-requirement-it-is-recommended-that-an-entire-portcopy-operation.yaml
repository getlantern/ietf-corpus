document: rfc-2613
kind: normative-requirement
summary: It is RECOMMENDED that an entire portCopy operation be configured in a single SetRequest PDU if possible, because rows are activated one at a time based on rowStatus, which can lead to unpredictable results in N:1 and N:M modes when multiple PDUs are used.
section: "3.5"
rfc2119_level: RECOMMENDED
topics:
    - snmp
