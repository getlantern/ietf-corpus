document: rfc-3339
kind: design-rationale
summary: Alphabetic time zone abbreviations (e.g., 'EST', 'PST') were found to cause poor interoperability in practice; RFC 2822 mandated numeric offsets as a result, and this profile follows that precedent.
section: "4.2"
