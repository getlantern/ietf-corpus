document: rfc-6230
kind: security-consideration
summary: A TLS server conformant to this specification MUST request a client certificate to enable mutual authentication, following RFC 5922 Section 7.4. When a TLS client connects, server authentication follows RFC 5922 Section 7.3 using the server's X.509 certificate.
section: "12.2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
