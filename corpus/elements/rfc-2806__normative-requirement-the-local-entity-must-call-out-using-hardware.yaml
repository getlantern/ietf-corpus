document: rfc-2806
kind: normative-requirement
summary: The local entity MUST call out using hardware compatible with the modem-params capability, or request the network to provide such a service. If recommended-params conflict with modem-params, the local entity MUST ignore recommended-params. New modem capability tokens MUST always be documented in an RFC.
section: 2.5.9
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
