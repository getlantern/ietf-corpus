document: rfc-2393
kind: protocol-element
summary: The Compression Parameter Index (CPI) is a 16-bit field identifying the compression algorithm. Values 0-63 are well-known algorithms for manual setup; 64-255 are reserved; 256-61439 are negotiated; 61440-65535 are for private use.
