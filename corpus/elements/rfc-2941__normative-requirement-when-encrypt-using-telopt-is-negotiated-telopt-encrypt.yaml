document: rfc-2941
kind: normative-requirement
summary: When ENCRYPT_USING_TELOPT is negotiated, TELOPT ENCRYPT MUST be negotiated in both directions immediately after authentication completes, and this MUST occur before credentials forwarding, other telnet option negotiations, or any user data is transmitted.
section: "2"
rfc2119_level: MUST
topics:
