kind: protocol-element
summary: 'A DV frame is divided into DIF sequences composed of 80-byte DIF blocks. Each DIF block carries a 3-byte ID header specifying its type and position. Five DIF block types are defined: DIF sequence header, Subcode, VAUX, Audio, and Video.'
