document: rfc-8150
kind: normative-requirement
summary: Implementations claiming compliance to SNMPv3 MUST include full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm. Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; instead SNMPv3 with cryptographic security is RECOMMENDED.
section: "9"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
