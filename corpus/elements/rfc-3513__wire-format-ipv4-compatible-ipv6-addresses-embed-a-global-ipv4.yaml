document: rfc-3513
kind: wire-format
summary: 'IPv4-compatible IPv6 addresses embed a global IPv4 address in the low-order 32 bits, with 80 zero bits and 16 zero bits preceding it (format: 0000...0000 | 0000 | IPv4-address). IPv4-mapped IPv6 addresses have the same layout but use 0xFFFF as the 16-bit field, representing IPv4 node addresses as IPv6.'
section: 2.5.5
topics:
