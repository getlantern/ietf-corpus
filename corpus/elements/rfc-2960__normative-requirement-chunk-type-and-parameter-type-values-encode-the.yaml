document: rfc-2960
kind: normative-requirement
summary: 'Chunk Type and Parameter Type values encode the required action for unrecognized types in their highest-order two bits: 00=discard packet, 01=discard and report error, 10=skip, 11=skip and report error. Implementations MUST honor this encoding.'
section: "3.2"
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
