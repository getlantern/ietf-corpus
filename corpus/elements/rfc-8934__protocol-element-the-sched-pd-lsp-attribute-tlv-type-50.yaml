document: rfc-8934
kind: protocol-element
summary: The SCHED-PD-LSP-ATTRIBUTE TLV (Type 50) is an optional TLV within the LSP object for periodical LSP scheduling. It has a fixed length of 20 octets and extends SCHED-LSP-ATTRIBUTE with Opt (4-bit repeat option), NR (12-bit number of repeats), Reserved (8 bits), and Repeat-time-length (32-bit, seconds).
section: 5.2.2
topics:
    - routing
    - mpls
