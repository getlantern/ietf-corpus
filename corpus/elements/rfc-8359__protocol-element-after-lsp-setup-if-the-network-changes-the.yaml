document: rfc-8359
kind: protocol-element
summary: After LSP setup, if the network changes the wavelength, the ingress client retunes its laser when it receives a changed label in a modified Resv LABEL object, and the egress client retunes when it receives a changed label in the UPSTREAM_LABEL/LABEL_SET of a modified Path message.
section: "4.2"
topics:
