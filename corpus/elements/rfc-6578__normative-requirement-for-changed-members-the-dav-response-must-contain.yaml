document: rfc-6578
kind: normative-requirement
summary: For changed members, the DAV:response MUST contain at least one DAV:propstat element and MUST NOT contain any DAV:status element. For removed members, the DAV:response MUST contain one DAV:status set to '404 Not Found' and MUST NOT contain any DAV:propstat element.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
