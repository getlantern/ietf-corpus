document: rfc-2671
kind: wire-format
summary: 'The OPT RR fixed part reuses standard RR fields with new semantics: NAME is empty (root domain); TYPE is 41 (OPT); CLASS carries the sender''s maximum UDP payload size (u_int16_t); TTL carries the extended RCODE and flags (u_int32_t); RDLEN and RDATA carry zero or more option {code, length, data} tuples.'
