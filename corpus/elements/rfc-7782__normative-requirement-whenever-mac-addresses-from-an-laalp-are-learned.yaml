document: rfc-7782
kind: normative-requirement
summary: Whenever MAC addresses from an LAALP are learned through ingress or configuration, the originating AAE member RBridge MUST advertise those MAC addresses using the MAC-Reachability TLV via the ESADI protocol, enclosed in the AA-LAALP-GROUP-MAC APPsub-TLV.
section: 4.1.3
rfc2119_level: MUST
topics:
