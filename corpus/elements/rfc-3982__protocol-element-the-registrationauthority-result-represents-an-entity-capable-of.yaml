document: rfc-3982
kind: protocol-element
summary: The <registrationAuthority> result represents an entity capable of registering domains. It contains a <serviceInstance> referencing its IRIS service identification, an <organizationName>, role type elements (<registry>, <registrar>, or <other>), and <domain> elements listing the domains for which it may register sub-domains.
