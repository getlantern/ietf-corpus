document: rfc-6325
kind: interoperability-note
summary: RBridge ports are layered on top of IEEE 802.1Q-2005 port facilities and are compatible with 802.1D/802.1Q customer bridges, allowing incremental deployment. RBridges do not use the spanning tree protocol and do not block ports, but they terminate the spanning tree at their ports and handle BPDUs locally.
section: "2.6"
topics:
    - routing
