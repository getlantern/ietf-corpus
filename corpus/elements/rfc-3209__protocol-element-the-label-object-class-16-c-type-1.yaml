document: rfc-3209
kind: protocol-element
summary: The LABEL object (class 16, C-Type 1) carries a single 32-bit MPLS label in Resv messages, binding a label to an LSP tunnel sender. Generic MPLS and FR labels are encoded right-aligned; ATM labels place VPI right-justified in bits 0–15 and VCI right-justified in bits 16–31.
section: "4.1"
topics:
