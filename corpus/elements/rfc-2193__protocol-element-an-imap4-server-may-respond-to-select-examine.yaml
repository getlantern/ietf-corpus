document: rfc-2193
kind: protocol-element
summary: An IMAP4 server MAY respond to SELECT, EXAMINE, DELETE, SUBSCRIBE, UNSUBSCRIBE, STATUS, or APPEND with one or more IMAP mailbox referrals to indicate the mailbox is hosted on a remote server.
