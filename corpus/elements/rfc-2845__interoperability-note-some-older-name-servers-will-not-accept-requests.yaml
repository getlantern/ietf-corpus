document: rfc-2845
kind: interoperability-note
summary: Some older name servers will not accept requests with a non-empty additional data section. Clients SHOULD only attempt signed transactions with servers known to support TSIG and share a secret key, avoiding compatibility failures with legacy implementations.
section: "4.1"
topics:
