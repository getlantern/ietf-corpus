document: rfc-2508
kind: wire-format
summary: 'The CONTEXT_STATE packet begins with a 1-byte type code (1 for 8-bit CID, 2 for 16-bit CID), followed by a 1-byte context count, then a list of blocks each containing: the session context ID (8 or 16 bits), a byte with the I (invalid) flag and 4-bit sequence number, and a byte with a 6-bit generation number.'
