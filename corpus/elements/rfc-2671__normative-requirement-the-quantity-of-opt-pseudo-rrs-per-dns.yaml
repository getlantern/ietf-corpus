document: rfc-2671
kind: normative-requirement
summary: The quantity of OPT pseudo-RRs per DNS message SHALL be either zero or one. OPT RRs shall never be cached, forwarded, or stored in or loaded from master files.
section: "4.1"
rfc2119_level: MUST NOT
