document: rfc-1001
kind: state-machine
summary: 'P node name registration differs by NBNS type: a non-secured NBNS returns an END-NODE CHALLENGE REGISTRATION RESPONSE delegating conflict resolution to the registrant; a secured NBNS challenges prior holders itself and returns POSITIVE or NEGATIVE NAME REGISTRATION RESPONSE directly. A WACK may be issued while challenges are pending.'
section: 15.2.2
topics:
