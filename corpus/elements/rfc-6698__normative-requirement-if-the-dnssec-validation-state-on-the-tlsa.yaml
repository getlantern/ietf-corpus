document: rfc-6698
kind: normative-requirement
summary: If the DNSSEC validation state on the TLSA RRSet response is bogus, this MUST cause TLS not to be started or, if TLS negotiation is already in progress, MUST cause the connection to be aborted.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
