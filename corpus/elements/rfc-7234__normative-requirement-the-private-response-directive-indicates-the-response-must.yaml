document: rfc-7234
kind: normative-requirement
summary: The private response directive indicates the response MUST NOT be stored by a shared cache. An optional field-name argument limits this to specific header fields, allowing the rest of the response to be cached by shared caches. The 'private' label controls storage location only, not the confidentiality of message content.
section: 5.2.2.6
rfc2119_level: MUST NOT
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
