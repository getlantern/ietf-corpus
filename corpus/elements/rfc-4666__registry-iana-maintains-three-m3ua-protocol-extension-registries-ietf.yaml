document: rfc-4666
kind: registry
summary: 'IANA maintains three M3UA protocol extension registries: IETF-Defined Message Classes (values 10–127 reserved, 128–255 for extensions), IETF-Defined Message Types per class (values 2–127 reserved, 128–255 for extensions), and IETF-Defined Parameter Tags (0x0214 to 0xfffe reserved; 0xffff for extensions). An RFC is required to assign any IETF-reserved values.'
section: "7.3"
