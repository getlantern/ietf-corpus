document: rfc-2445
kind: protocol-element
summary: The UID property provides a globally unique identifier for a calendar component and MUST be present in VEVENT, VTODO, and VJOURNAL components. Together with SEQUENCE and ORGANIZER, it identifies all revisions of a particular calendar entity.
section: 4.8.4.7
