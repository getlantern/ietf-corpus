document: rfc-8173
kind: design-rationale
summary: The MIB module is read-only and not intended to provide the ability to configure PTP clocks. Since PTP clocks are often embedded in network elements such as routers, switches, and gateways, configuration is generally provided via the network element's own configuration interface.
section: "1"
topics:
