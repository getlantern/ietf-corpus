document: rfc-3573
kind: protocol-element
summary: The Modem-Status (MDMST) control message is a new L2TP control message (Attribute Type 17, Vendor ID 0) used by the LAC to notify the LNS when the client modem on-hold status changes. It requires the Message Type and Modem On-Hold Status AVPs.
