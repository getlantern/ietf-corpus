document: rfc-9398
kind: design-rationale
summary: IGMP Proxies and MLD Proxies are placed in separate schema branches rather than a combined branch. This allows independent optional support for IPv4 and IPv6, models minor behavioral differences more cleanly, and is consistent with other YANG models like RFC 8652 that use separate branches per address family.
section: "2.3"
topics:
    - yang
    - multicast
