document: rfc-5890
kind: design-rationale
summary: Character ordering in labels is defined strictly by wire order—equivalent to left-to-right for LTR scripts and right-to-left for RTL scripts—to eliminate ambiguity about which character is 'first' in labels that mix reading directions.
