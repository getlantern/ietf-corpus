document: rfc-2849
kind: normative-requirement
summary: If the criticality of a control is 'true', the implementation MUST either include the control or MUST NOT send the operation to a remote server. Implementations MAY ignore controls that cannot be honored.
section: Notes on LDIF Syntax
rfc2119_level: MUST
topics:
