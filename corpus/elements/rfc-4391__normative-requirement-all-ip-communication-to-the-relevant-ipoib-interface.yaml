document: rfc-4391
kind: normative-requirement
summary: All IP communication to the relevant IPoIB interface MUST be directed to the QPN included in the link-layer address. ARP reply packets in IPv4 subnets are also directed to this same QPN.
section: 9.1.1
rfc2119_level: MUST
topics:
