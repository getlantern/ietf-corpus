document: rfc-9143
kind: wire-format
summary: The RTP SDES header extension for MID can be encoded with either the 1-byte or 2-byte header format (RFC 7941). The payload is the identification-tag in UTF-8 (not zero-terminated), and the set of header extensions must be padded to the next 32-bit boundary using zero bytes.
section: "15.2"
