document: rfc-6761
kind: protocol-element
summary: 'The ''Domain Name Reservation Considerations'' framework defines seven stakeholder categories that every special-use domain specification must address: (1) Users, (2) Application Software, (3) Name Resolution APIs/Libraries, (4) Caching DNS Servers, (5) Authoritative DNS Servers, (6) DNS Server Operators, and (7) DNS Registries/Registrars.'
section: "5"
