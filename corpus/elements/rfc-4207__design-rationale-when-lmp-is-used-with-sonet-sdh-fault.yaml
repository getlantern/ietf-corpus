document: rfc-4207
kind: design-rationale
summary: When LMP is used with SONET/SDH, fault management procedures (one of LMP's four main procedures) may not be needed because existing SONET/SDH mechanisms can provide the equivalent functionality. This document therefore focuses on the link verification and trace correlation procedures specific to SONET/SDH.
section: "1"
topics:
