document: rfc-8323
kind: protocol-element
summary: The Abort message (code 7.05) signals an immediate unrecoverable connection error. The sender shuts down immediately after sending. A diagnostic payload SHOULD be included. The Bad-CSM-Option (uint, 0–2 bytes) identifies the offending CSM option number.
section: "5.6"
topics:
