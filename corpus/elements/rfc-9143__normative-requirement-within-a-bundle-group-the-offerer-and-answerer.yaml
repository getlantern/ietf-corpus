document: rfc-9143
kind: normative-requirement
summary: Within a BUNDLE group, the offerer and answerer MUST enable RTP/RTCP multiplexing (RFC 5761) for RTP-based bundled media, and MUST support the SDP 'rtcp-mux-only' attribute (RFC 8858). Once negotiated, it is not possible to disable RTP/RTCP multiplexing within a BUNDLE group.
section: "9.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
