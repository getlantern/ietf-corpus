document: rfc-7235
kind: protocol-element
summary: The 401 (Unauthorized) status code indicates the request lacks valid authentication credentials for the target resource. If the request included credentials, 401 indicates those credentials were refused. The user agent MAY repeat the request with a new or replaced Authorization header field.
section: "3.1"
topics:
    - http
    - security
