document: rfc-7349
kind: protocol-element
summary: 'An LDP Security Association (SA) is identified by a 32-bit SA ID and contains: the authentication algorithm, the authentication key, and four time parameters (KeyStartAccept, KeyStartGenerate, KeyStopGenerate, KeyStopAccept) that govern key rollover windows. The authentication algorithm and key are never sent on the wire.'
section: "2.2"
