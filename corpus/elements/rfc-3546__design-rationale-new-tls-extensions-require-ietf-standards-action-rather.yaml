document: rfc-3546
kind: design-rationale
summary: New TLS extensions require IETF Standards Action rather than simple IANA allocation because subtle interactions between new and existing TLS features can significantly reduce overall security — extension fields feed into Finished message hashes, and active attackers can manipulate unauthenticated handshake messages.
section: "5"
topics:
    - tls
    - security
    - registry
