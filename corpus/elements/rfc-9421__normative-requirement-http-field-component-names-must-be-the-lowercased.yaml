document: rfc-9421
kind: normative-requirement
summary: HTTP field component names MUST be the lowercased form of the field name. Multiple field values for the same field MUST be combined into a single value by concatenating with a single comma and space separator. All non-ASCII field values MUST be encoded to ASCII before inclusion in the signature base.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
