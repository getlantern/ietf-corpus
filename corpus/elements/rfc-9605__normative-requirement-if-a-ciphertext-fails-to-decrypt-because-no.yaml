document: rfc-9605
kind: normative-requirement
summary: If a ciphertext fails to decrypt because no key is available for the KID in the SFrame header, the client MAY buffer the ciphertext and retry once a key with that KID is received.
section: 4.4.4
rfc2119_level: MAY
