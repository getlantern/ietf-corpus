document: rfc-6710
kind: protocol-element
summary: 'The STANAG4406 Priority Assignment Policy maps 6 MT-PRIORITY values to military precedence names: -4=Deferred, -2=Routine, 0=Priority, 2=Immediate, 4=Flash, 6=Override. Internally, servers may round to the next supported level but must relay the original value.'
section: Appendix A
