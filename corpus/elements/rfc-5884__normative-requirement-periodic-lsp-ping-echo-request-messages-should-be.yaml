document: rfc-5884
kind: normative-requirement
summary: Periodic LSP Ping Echo request messages SHOULD be sent by the ingress LSR to the egress LSR along the same data path as the LSP, to periodically verify the control plane against the data plane. The rate of these messages SHOULD be significantly less than the rate of BFD Control packets.
section: "4"
rfc2119_level: SHOULD
topics:
    - mpls
