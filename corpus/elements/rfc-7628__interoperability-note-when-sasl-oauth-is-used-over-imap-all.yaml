document: rfc-7628
kind: interoperability-note
summary: When SASL OAuth is used over IMAP, all client response and server challenge payloads MUST be base64 encoded as required by IMAP (RFC 3501); the dummy error-completion response 'AQ==' is the base64 encoding of the ASCII value 0x01.
