document: rfc-6119
kind: normative-requirement
summary: Reserved bits in the IPv6 SRLG TLV flags field MUST be set to zero by the sender. A router receiving an IPv6 SRLG TLV with non-zero values for bits it does not understand MUST ignore the TLV (but flood it unchanged).
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
