document: rfc-3339
kind: interoperability-note
summary: Broken two-digit-year software may produce three-digit years (e.g., year 2000 as "100") or non-numeric decade characters. Robust implementations may add 1900 to three-digit years and should detect and interpret non-numeric decades appropriately.
section: "3"
