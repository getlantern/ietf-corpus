document: rfc-2461
kind: normative-requirement
summary: The Solicited (S) flag in a Neighbor Advertisement MUST NOT be set in multicast advertisements or in unsolicited unicast advertisements. The Router (R) flag indicates the sender is a router and is used by NUD to detect a router that transitions to a host.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
