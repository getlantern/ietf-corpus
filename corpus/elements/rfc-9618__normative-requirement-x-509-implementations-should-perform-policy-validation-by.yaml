document: rfc-9618
kind: normative-requirement
summary: X.509 implementations SHOULD perform policy validation by building a policy graph following the procedure described in Section 5 rather than the policy tree defined in RFC 5280. This replacement computes the same valid policies but avoids exponential resource consumption.
section: "4"
rfc2119_level: SHOULD
topics:
