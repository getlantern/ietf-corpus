document: rfc-5537
kind: registry
summary: RFC 5537 registers the application/news-transmission MIME media type with IANA. It encapsulates a complete proto-article or relayed article for injection, relay, or moderation, with an optional usage parameter ('moderate', 'inject', or 'relay'). Article batches are not permitted.
section: "4.1"
