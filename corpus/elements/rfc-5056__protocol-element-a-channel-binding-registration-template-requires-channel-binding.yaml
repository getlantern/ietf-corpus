document: rfc-5056
kind: protocol-element
summary: 'A channel binding registration template requires: channel binding unique prefix (name), type (unique or end-point), channel type (e.g., TLS, IPsec, SSH), published specification (recommended), whether the binding is secret, description, intended usage (COMMON/LIMITED USE/OBSOLETE), contact information, and owner/change controller. Registrations may not be deleted but may be marked OBSOLETE.'
section: "7.1"
topics:
    - registry
    - security
