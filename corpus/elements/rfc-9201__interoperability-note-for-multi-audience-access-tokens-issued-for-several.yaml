document: rfc-9201
kind: interoperability-note
summary: For multi-audience access tokens (issued for several RSs), rs_cnf MUST NOT be used; a different endpoint for acquiring RS authentication keys should be specified in such cases, though the specification of that endpoint is out of scope for this document.
