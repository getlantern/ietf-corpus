document: rfc-7716
kind: security-consideration
summary: MCAST-VPN routes, path attributes (VRF Route Import EC, Source AS EC, Route Target EC) were designed for VPN-only contexts. If these leak into the wider network in a GTM deployment, multicast data flows may be distributed in an unintended and/or unauthorized manner.
section: "4"
topics:
    - security
    - bgp
    - routing
    - multicast
