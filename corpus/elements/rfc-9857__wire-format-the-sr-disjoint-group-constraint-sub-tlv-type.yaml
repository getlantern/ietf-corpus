summary: The SR Disjoint Group Constraint sub-TLV (Type 1211) encodes Request Flags (1 octet with S, N, L, F, I bits for requested disjointness level), Status Flags (1 octet with S, N, L, F, I, X bits for achieved disjointness), Reserved (2 octets), and a Disjoint Group Identifier (4 octets, or the full PCEP ASSOCIATION Object when PCEP is used).
