document: rfc-9788
kind: normative-requirement
summary: When composing a message with end-to-end cryptographic protections, an MUA SHOULD apply Header Protection. The hp parameter MUST be added only to the Content-Type at the root of the Cryptographic Payload, and its value MUST reflect whether the envelope contains an encrypting layer.
section: "5"
rfc2119_level: SHOULD
topics:
    - email
    - security
    - crypto
