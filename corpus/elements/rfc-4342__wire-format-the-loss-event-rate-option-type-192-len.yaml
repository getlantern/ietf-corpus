document: rfc-4342
kind: wire-format
summary: The Loss Event Rate option (Type=192, Len=6) carries a 4-byte value indicating the inverse of the loss event rate (rounded up) in data packets per loss interval. When no losses have occurred, the value is set to 2^32 - 1 (all ones). MUST NOT be sent on DCCP-Data packets.
section: "8.5"
topics:
    - congestion
extracted_by: claude-sonnet-4-6
