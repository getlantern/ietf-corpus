document: rfc-2022
kind: wire-format
summary: MARS_REQUEST (mar$op=1) carries the multicast group address in mar$tpa with null target hardware address (mar$thtl and mar$tstl both zero). In IPv4 environments mar$pro=0x800 and mar$tpln MUST be 4; source fields MUST carry the issuing client's ATM number and subaddress. MARS_NAK is the MARS_REQUEST returned with mar$op=6, all other fields unchanged.
section: 5.1.2
topics:
    - multicast
    - ip
