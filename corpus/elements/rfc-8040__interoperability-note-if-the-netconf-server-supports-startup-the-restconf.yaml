document: rfc-8040
kind: interoperability-note
summary: If the NETCONF server supports :startup, the RESTCONF server MUST automatically update the non-volatile startup configuration datastore after any successful RESTCONF edit to the running datastore. This ensures persistence across device reboots.
section: "1.4"
rfc2119_level: MUST
topics:
    - netconf
    - yang
