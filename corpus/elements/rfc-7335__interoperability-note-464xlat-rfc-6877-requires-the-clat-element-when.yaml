document: rfc-7335
kind: interoperability-note
summary: 464XLAT (RFC 6877) requires the CLAT element—when embedded in a host such as a smartphone or CPE—to have an IPv4 address configured for the host network stack and for applications to bind IPv4 sockets, driving the same need for a reserved non-routed IPv4 prefix as DS-Lite.
