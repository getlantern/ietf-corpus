document: rfc-6931
kind: protocol-element
summary: SEED block encryption ('xmldsig-more#seed128-cbc') is a 128-bit block cipher with 128-bit keys used in CBC mode with a 128-bit IV prepended and result base64-encoded. SEED key wrap ('xmldsig-more#kw-seed128') follows RFC 3394 Section 2.2.1 with 'AES' replaced by 'SEED'; implementation is optional.
section: 2.6.5
topics:
