document: rfc-6463
kind: state-machine
summary: 'Co-located rfLMA/r2LMA model: on receiving a PBU with Redirect-Capability destined to the rfLMA (anycast/loopback) address, the co-located LMA creates a BCE in an r2LMA role, then sends a PBA sourced from the rfLMA address containing the Redirect option with the r2LMA unicast address. PBUs arriving directly at the r2LMA unicast address are processed per RFC 5213 with no Redirect option in the response.'
section: 5.3.1
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
