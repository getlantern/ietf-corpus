document: rfc-3947
kind: normative-requirement
summary: 'The Vendor ID payload for NAT-Traversal support MUST be sent in the first two messages of Phase 1 if supported, and MUST be received by both sides for the NAT-Traversal probe to continue. The payload content is the MD5 hash of the string ''RFC 3947'' (hex: 4a131c81070358455c5728f20e95452f).'
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - nat
