document: rfc-7170
kind: interoperability-note
summary: EAP implementations compliant with this specification MUST support TLV exchanges and correct mandatory/optional TLV processing. A NAK TLV MUST NOT be sent in response to a message containing a Result TLV; instead, a failure Result TLV accompanied by an Error TLV of Unexpected TLVs Exchanged should be used.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
