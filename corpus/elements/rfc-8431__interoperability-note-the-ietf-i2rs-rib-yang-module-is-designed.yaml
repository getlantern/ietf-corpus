document: rfc-8431
kind: interoperability-note
summary: The ietf-i2rs-rib YANG module is designed to align with the I2RS RIB information model defined in RFC 8430; implementations must satisfy the RIB use cases from [I2RS-REQS]. The YANG model is a concrete data representation of the abstract RFC 8430 information model.
