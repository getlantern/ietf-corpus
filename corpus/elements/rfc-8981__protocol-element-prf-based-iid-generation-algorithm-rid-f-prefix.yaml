document: rfc-8981
kind: protocol-element
summary: 'PRF-based IID generation algorithm: RID = F(Prefix, Net_Iface, Network_ID, Time, DAD_Counter, secret_key), where the IID is taken from the least-significant bits of RID. BLAKE3 or HMAC-SHA-256 are suggested for F(); HMAC-MD5 is explicitly unacceptable.'
section: 3.3.2
topics:
