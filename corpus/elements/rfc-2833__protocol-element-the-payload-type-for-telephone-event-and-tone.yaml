document: rfc-2833
kind: protocol-element
summary: The payload type for telephone-event and tone has no static RTP payload type number; it MUST be assigned dynamically and out-of-band. The default clock frequency is 8000 Hz but may be redefined when assigning the dynamic payload type.
section: "3.3"
