document: rfc-6401
kind: protocol-element
summary: The Admission Priority Policy Element (P-Type=0x05) is a 12-byte policy element carried inside RSVP POLICY_DATA objects. It contains a Merge Strategy field (8 bits), an Error Code field (8 bits), and an Admission Priority field (8 bits, unsigned) indicating access priority to network bandwidth for session establishment.
section: "5.1"
topics:
