document: rfc-4880
kind: wire-format
summary: A packet header begins with a Packet Tag octet where bit 7 is always 1, bit 6 distinguishes new (1) from old (0) format. Old format encodes the tag in bits 5-2 and the length-type in bits 1-0; new format encodes the tag in bits 5-0.
section: "4.2"
