document: rfc-4512
kind: design-rationale
summary: 'Attribute description hierarchies allow access to the DIB with varying degrees of granularity: searching with a general attribute description (e.g., ''name'') evaluates specialized subtypes (e.g., ''cn'') as well. However, for user modification purposes, all descriptions in a hierarchy are treated as distinct and unrelated.'
section: 2.5.3
topics:
