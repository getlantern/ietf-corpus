document: rfc-2564
kind: normative-requirement
summary: Service instance identifier values (applSrvIndex) must be constant for the lifetime of the service instance; re-use of values should be avoided, and no two concurrent service instances in a system shall share the same index value. The value zero is excluded.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
