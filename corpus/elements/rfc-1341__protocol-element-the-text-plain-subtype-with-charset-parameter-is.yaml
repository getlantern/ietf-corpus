document: rfc-1341
kind: protocol-element
summary: The 'text/plain' subtype with 'charset' parameter is the default Internet mail body type, representing unformatted text. The charset parameter default is US-ASCII and is case-insensitive. Defined charset values include US-ASCII and ISO-8859-1 through ISO-8859-9.
section: 7.1.1
