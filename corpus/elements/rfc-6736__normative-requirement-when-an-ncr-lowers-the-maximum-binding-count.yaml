document: rfc-6736
kind: normative-requirement
summary: When an NCR lowers the maximum binding count below the current number of active bindings, the NAT device SHOULD refrain from immediately enforcing the new limit by removing existing bindings; instead, it should disallow new bindings until the active count falls below the new maximum.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - nat
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
