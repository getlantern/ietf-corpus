document: rfc-4273
kind: security-consideration
summary: Improper SNMP write access to bgpPeerAdminStatus (stopping a peer) can cause significant disruption of connectivity to portions of the Internet reachable via that BGP peer. Write access must be protected with adequate authentication.
section: "5"
topics:
