kind: protocol-element
summary: 'Base URI precedence is established in four layers (highest to lowest): (1) base URI embedded in content, (2) base URI of the encapsulating entity, (3) URI used to retrieve the representation (last URI after redirects), (4) application-defined default base URI.'
