document: rfc-1195
kind: design-rationale
summary: IP addresses are intentionally decoupled from IS-IS area structure and OSI addressing, because dual routers are often installed into environments with pre-assigned IP addresses and the limited IP address space constrains what can be assigned. Hierarchical summarization is encouraged but not required.
section: "1.3"
topics:
