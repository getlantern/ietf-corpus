document: rfc-5373
kind: design-rationale
summary: The specification deliberately excludes 'Alerting Mode' (how the UAS notifies its user of an incoming request) and addresses only 'Answering Mode' (whether user interaction is required before accepting). This distinction was debated in the working group and kept scope narrow to avoid conflating two separate concerns.
section: "1"
topics:
