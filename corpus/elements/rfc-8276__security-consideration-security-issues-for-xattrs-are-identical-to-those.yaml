document: rfc-8276
kind: security-consideration
summary: Security issues for xattrs are identical to those for file data and named attributes. The additions to NFSv4 for xattr support do not alter the base NFSv4 security considerations, since xattrs are application data with no system-interpreted semantics.
section: "9"
topics:
