document: rfc-6450
kind: security-consideration
summary: Servers MUST implement default per-client rate limiting to prevent this protocol from being used in denial-of-service attacks. A leaky bucket algorithm is suggested to allow short bursts while maintaining a long-term average at or below Default-Server-Rate-Limit.
section: "8"
topics:
    - security
    - multicast
