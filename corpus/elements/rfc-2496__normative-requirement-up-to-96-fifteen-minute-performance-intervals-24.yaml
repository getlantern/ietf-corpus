document: rfc-2496
kind: normative-requirement
summary: Up to 96 fifteen-minute performance intervals (24 hours) are retained by an agent. Fewer than 96 will be available if the agent was restarted within the last 24 hours, in which case dsx3ValidIntervals reflects the number of complete intervals available.
section: 2.4.2
rfc2119_level: MUST
topics:
