summary: 'The Event MIB (DISMAN-EVENT-MIB) is organized into four sections: triggers, objects, events, and notifications. Triggers define conditions that lead to events; events may cause notifications or set MIB objects; the objects table lists supplemental objects to attach to notifications.'
