document: rfc-9843
kind: protocol-element
summary: The Flex-Algorithm Exclude Minimum Bandwidth (FAEMB) constraint is advertised in an FAD sub-TLV. A link is pruned from the Flex-Algorithm topology if its advertised Maximum Link Bandwidth is below the minimum bandwidth value in the FAEMB sub-TLV. Links without any Maximum Link Bandwidth advertisement are not excluded.
section: "3"
topics:
