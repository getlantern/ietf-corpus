document: rfc-8291
kind: security-consideration
summary: HTTP header fields are not protected by the content encoding scheme; a user agent MUST consider HTTP header fields to have come from the push service and MUST NOT rely on them for secure processing of push messages.
section: "7"
rfc2119_level: MUST
topics:
