document: rfc-7172
kind: design-rationale
summary: Serial TRILL unicast is specified as an alternative to distribution trees for multi-destination FGL packets. Unicast SHOULD be used when only one egress FGL switch is relevant, as it follows least-cost paths with ECMP traffic spreading, whereas distribution trees are constrained to a single path per tree.
section: A
topics:
    - routing
