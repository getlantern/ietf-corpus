document: rfc-4007
kind: normative-requirement
summary: An implementation SHOULD support at least non-negative decimal integers as <zone_id>. An implementation MAY support other non-null strings (such as interface names) as <zone_id>, but these must not conflict with the '%' delimiter character; precise format and semantics are implementation dependent.
section: "11.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
