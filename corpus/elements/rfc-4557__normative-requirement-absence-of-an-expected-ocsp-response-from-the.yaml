document: rfc-4557
kind: normative-requirement
summary: Absence of an expected OCSP response from the KDC for the KDC's certificates SHOULD be treated as an error by the client, unless it is configured otherwise. There is no integrity protection for empty or missing OCSP responses.
section: "3"
rfc2119_level: SHOULD
topics:
