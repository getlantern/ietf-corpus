document: rfc-8048
kind: protocol-element
summary: 'An XMPP presence probe is translated to a SIP SUBSCRIBE request with Expires: 0 in a new dialog. Conversely, a SIP SUBSCRIBE with Expires: 0 is translated to an XMPP <presence/> stanza of type ''probe'' if the gateway does not already have presence information about the contact.'
section: "7"
topics:
