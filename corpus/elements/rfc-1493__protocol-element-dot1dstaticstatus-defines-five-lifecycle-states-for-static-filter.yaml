document: rfc-1493
kind: protocol-element
summary: 'dot1dStaticStatus defines five lifecycle states for static filter entries: other(1), invalid(2) which removes the entry when written, permanent(3) which survives bridge resets, deleteOnReset(4), and deleteOnTimeout(5). The default is permanent(3).'
