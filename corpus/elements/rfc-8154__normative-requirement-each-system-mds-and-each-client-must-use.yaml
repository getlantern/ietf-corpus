document: rfc-8154
kind: normative-requirement
summary: Each system (MDS and each client) MUST use a unique persistent reservation key generated by the MDS. The MDS MUST generate a key for itself before exporting a volume and a key for each client that accesses SCSI layout volumes.
section: 2.4.10.1
rfc2119_level: MUST
topics:
    - security
