document: rfc-1184
kind: protocol-element
summary: 'The SLC suboption defines 30 special-character function codes (SLC_SYNCH through SLC_EEOL). Functions fall into two groups: those mapped to Telnet equivalents (SLC_SYNCH, SLC_BRK, SLC_IP, SLC_AO, SLC_AYT, SLC_EOR, SLC_ABORT, SLC_EOF, SLC_SUSP) and those processed locally (SLC_EC, SLC_EL, SLC_EW, SLC_RP, SLC_LNEXT, SLC_XON, SLC_XOFF, SLC_FORW1, SLC_FORW2, and cursor-motion characters added in RFC 1184).'
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
