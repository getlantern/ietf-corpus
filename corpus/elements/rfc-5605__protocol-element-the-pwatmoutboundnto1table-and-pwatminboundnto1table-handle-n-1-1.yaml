document: rfc-5605
kind: protocol-element
summary: The pwAtmOutboundNto1Table and pwAtmInboundNto1Table handle N:1, 1:1, and transparent cell mode ATM PWs. Up to N entries can be created per pwIndex for atmCellNto1Vcc(9) or atmCellNto1Vpc(10). The table includes MappedVpi and MappedVci objects representing egress-generated VPI/VCI values, valid for Nto1 and 1to1 types; other types return 0xFFFF.
