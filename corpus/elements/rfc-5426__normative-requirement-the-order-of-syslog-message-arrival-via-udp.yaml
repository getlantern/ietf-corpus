document: rfc-5426
kind: normative-requirement
summary: The order of syslog message arrival via UDP SHOULD NOT be used as an authoritative guide in establishing an absolute or relative sequence of events on the syslog sender hosts, because UDP does not guarantee delivery order.
section: "4.4"
rfc2119_level: SHOULD NOT
topics:
    - syslog
    - udp
