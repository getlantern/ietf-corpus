document: rfc-5531
kind: state-machine
summary: 'Basic call-reply state: client sends CALL with xid and blocks; server receives, processes, and sends REPLY with matching xid; client matches reply to call via xid and resumes. Server may cache xid to provide execute-at-most-once semantics on retransmissions.'
