document: rfc-9867
kind: design-rationale
summary: The main disadvantage of this approach versus RFC 8784 is the mandatory additional round trip of the IKE_INTERMEDIATE exchange. However, if IKE_INTERMEDIATE is already required for another purpose (e.g., RFC 9370 additional key exchanges), PPK payloads can be piggybacked at no extra cost.
section: A
