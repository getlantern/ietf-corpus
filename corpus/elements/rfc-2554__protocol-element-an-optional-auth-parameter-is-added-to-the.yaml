document: rfc-2554
kind: protocol-element
summary: An optional AUTH parameter is added to the MAIL FROM command (AUTH=addr-spec or AUTH=<>), encoded as xtext, communicating the authenticated identity of the original message submitter. This extends the maximum MAIL FROM line length by 500 characters.
