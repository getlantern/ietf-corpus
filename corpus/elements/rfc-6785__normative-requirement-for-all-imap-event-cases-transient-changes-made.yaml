document: rfc-6785
kind: normative-requirement
summary: For all IMAP event cases, transient changes made to a message by Sieve actions MUST NOT be retained for any 'keep' action, because IMAP messages are immutable. The original message, without changes, is kept.
section: "3.1"
rfc2119_level: MUST NOT
topics:
