document: rfc-4327
kind: protocol-element
summary: lmpDataLinkTable associates data-bearing links (indexed by ifIndex) with their TE links. Each entry records address type and IP address for both local and remote ends, plus a remote interface identifier (lmpDataLinkRemoteIfId). The data-bearing link type is auto-populated by the node.
