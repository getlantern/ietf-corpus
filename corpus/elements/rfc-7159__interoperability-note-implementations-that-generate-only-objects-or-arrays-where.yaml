document: rfc-7159
kind: interoperability-note
summary: Implementations that generate only objects or arrays where a JSON text is called for will be interoperable in the sense that all implementations will accept these as conforming JSON texts, even though RFC 7159 now permits any value as a JSON text.
section: "2"
topics:
