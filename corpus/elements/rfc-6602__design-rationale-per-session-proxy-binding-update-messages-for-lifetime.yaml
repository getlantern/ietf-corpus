document: rfc-6602
kind: design-rationale
summary: Per-session Proxy Binding Update messages for lifetime extension generate excessive signaling traffic as the number of mobility sessions grows. A bulk binding update mechanism using group identifiers allows a single PBU to refresh the lifetime of an entire group of sessions, reducing both processing and bandwidth overhead.
section: "3.1"
topics:
    - mobility
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
