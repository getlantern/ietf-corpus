document: rfc-5944
kind: security-consideration
summary: The home address of a mobile node is visible in the IP source address of packets the mobile node sends, revealing its identity and home network regardless of current location. Observers on any network the mobile node visits can track its persistent identity.
section: "5.5"
topics:
    - mobility
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
