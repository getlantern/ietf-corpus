summary: 'The Full INTRA-frame Request (FIR) RTCP control packet is 8 bytes: V=2 (2 bits), P (1 bit), MBZ (5 bits), PT=RTCP_FIR=192 (8 bits), length (16 bits), SSRC (32 bits). It requests the encoder to force the next frame to be fully INTRA-coded.'
