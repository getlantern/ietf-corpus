document: rfc-6401
kind: design-rationale
summary: 'Two separate policy elements are defined rather than one: APP_RESOURCE_PRI carries application-level semantics for PDPs at policy boundaries, while ADMISSION_PRI is deliberately simple, stateless, and lightweight so it can be processed by LPDPs and enforced at every RSVP hop, including hops with no understanding of application-level resource priority.'
