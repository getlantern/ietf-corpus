document: rfc-6946
kind: security-consideration
summary: Many implementations fail to perform the validation checks on received ICMPv6 error messages recommended in RFC 4443 Section 5.2. For connectionless transport protocols encapsulated in IPv6, such validation may be virtually impossible, making the forged-PTB attack vector particularly difficult to mitigate at the ICMPv6 layer.
section: "3"
topics:
    - security
    - ip
