document: rfc-9186
kind: normative-requirement
summary: If the tail detects a MultipointHead failure (per RFC 8562), it MUST delete the corresponding neighbor state and follow RFC 7761 procedures for DR and additional neighbor state deletion after the neighbor timeout expires.
section: "2.1"
rfc2119_level: MUST
topics:
