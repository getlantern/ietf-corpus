document: rfc-8489
kind: wire-format
summary: 'The STUN Message Type field is 14 bits, decomposed into a 12-bit method (M11–M0) and a 2-bit class (C1–C0): 0b00=request, 0b01=indication, 0b10=success response, 0b11=error response. The Binding method is encoded as 0b000000000001; a Binding request is 0x0001 and a Binding success response is 0x0101.'
