document: rfc-1237
kind: normative-requirement
summary: Zero-homed routing domains (internally networked organizations with no public internet connection) must use globally unique NSAP addresses. Even across private links, the connected RD must be able to unambiguously distinguish the zero-homed domain's NSAPs from all other NSAPs it routes to.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
