document: rfc-3464
kind: design-rationale
summary: 'Both the Action field and the Status field are retained because they convey complementary information: a ''4.x.x'' (temporary failure) status code can appear with either ''delayed'' or ''failed'' action values depending on whether the MTA is still retrying. The fields are not redundant.'
section: 2.3.3
