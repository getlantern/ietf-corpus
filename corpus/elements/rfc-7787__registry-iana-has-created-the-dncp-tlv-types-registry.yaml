summary: 'IANA has created the ''DNCP TLV Types'' registry under ''Distributed Node Consensus Protocol (DNCP)'' with registration procedure Standards Action. Initial assignments: 0 (Reserved), 1 (Request network state), 2 (Request node state), 3 (Node endpoint), 4 (Network state), 5 (Node state), 8 (Peer), 9 (Keep-alive interval), 10 (Trust-Verdict); 11–31 and 512–767 unassigned; 32–511 reserved for per-profile use; 768–1023 private use; 1024–65535 reserved.'
