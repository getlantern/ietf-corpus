document: rfc-3007
kind: normative-requirement
summary: If the updated zone is secured, the RRset affected by an update operation MUST, at the completion of the update, be signed in accordance with the zone's signing policy, requiring zone keys whose private components MUST be online.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
