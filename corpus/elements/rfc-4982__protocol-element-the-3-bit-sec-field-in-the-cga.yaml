document: rfc-4982
kind: protocol-element
summary: The 3-bit Sec field in the CGA interface identifier encodes both brute-force attack protection level and the hash algorithm used. Sec=000 means SHA-1 with 0 hash2 bits forced to zero; Sec=001 means SHA-1 with 16 hash2 bits forced to zero; Sec=010 means SHA-1 with 32 hash2 bits forced to zero. Other Sec values may designate alternative hash functions per the CGA SEC registry.
section: "4.1"
topics:
