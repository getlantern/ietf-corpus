document: rfc-7678
kind: protocol-element
summary: The Border-Router-Name AVP (code 633) is of type OctetString and carries the FQDN of a DS-Lite AFTR, lw4o6 border router, or MAP-E border relay. FQDN encoding MUST follow RFC 1035/1123/2181 syntax in ASCII; A-labels (RFC 5891) must be used for internationalized domain names.
section: "3.2"
topics:
