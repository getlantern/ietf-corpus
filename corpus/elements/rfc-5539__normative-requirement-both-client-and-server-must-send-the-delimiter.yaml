document: rfc-5539
kind: normative-requirement
summary: Both client and server MUST send the delimiter sequence ']]>]]>' after each XML document in the NETCONF exchange, and implementations MUST ensure this sequence never appears within a NETCONF message itself.
section: "2.1"
rfc2119_level: MUST
