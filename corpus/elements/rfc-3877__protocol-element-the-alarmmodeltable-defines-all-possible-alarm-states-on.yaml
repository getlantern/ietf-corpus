kind: protocol-element
summary: The alarmModelTable defines all possible alarm states on a system, indexed by alarmListName, alarmModelIndex, and alarmModelState. Each entry specifies the associated NotificationId, varbind index/value for state discrimination, description, resource prefix, and a pointer to model-specific extensions.
