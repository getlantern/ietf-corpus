document: rfc-6720
kind: normative-requirement
summary: When both peers have exchanged G=1 in LDP Link Hello, the LSR MUST check incoming unicast packets' TTL or Hop Count to be 255 for the particular LDP/TCP peering session, and process further as per RFC 5082.
