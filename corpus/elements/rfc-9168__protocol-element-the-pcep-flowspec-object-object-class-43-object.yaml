document: rfc-9168
kind: protocol-element
summary: The PCEP FLOWSPEC object (Object-Class 43, Object-Type 1) is OPTIONAL and MAY appear zero, one, or more times in PCReq, PCRep, PCErr, PCInitiate, PCRpt, and PCUpd messages. Each instance specifies a separate traffic flow and MAY carry a Flow Filter TLV.
