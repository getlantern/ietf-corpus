document: rfc-854
kind: normative-requirement
summary: In the data stream, a bare carriage return MUST be encoded as the two-byte sequence CR NUL (13, 0); the sequence CR LF (13, 10) MUST be treated as a single new-line and used only when both carriage return and line feed are intended. A lone CR byte MUST be avoided in other contexts to allow rational disambiguation.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
