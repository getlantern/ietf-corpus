document: rfc-4819
kind: design-rationale
summary: The Public Key Subsystem is designed for extreme simplicity in implementation and is not intended as a PKIX replacement. It provides an implementation-independent mechanism to configure SSH public keys, allowing client software to take on the burden of key distribution that SSH itself does not define.
section: "1"
topics:
