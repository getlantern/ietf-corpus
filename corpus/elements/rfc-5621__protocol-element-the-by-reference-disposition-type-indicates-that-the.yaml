document: rfc-5621
kind: protocol-element
summary: The 'by-reference' disposition type indicates that the body part must be handled according to a reference located elsewhere in the same SIP message. It prevents a UA that missed a reference from attempting to process the body part by disposition type alone.
section: "9.4"
