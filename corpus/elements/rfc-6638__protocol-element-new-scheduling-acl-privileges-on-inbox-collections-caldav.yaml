document: rfc-6638
kind: protocol-element
summary: 'New scheduling ACL privileges on Inbox collections: CALDAV:schedule-deliver (aggregate), CALDAV:schedule-deliver-invite (controls Organizer request delivery), CALDAV:schedule-deliver-reply (controls Attendee reply delivery), and CALDAV:schedule-query-freebusy (controls freebusy queries). Corresponding Outbox privileges mirror these for send-side control.'
