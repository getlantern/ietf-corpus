document: rfc-3448
kind: protocol-element
summary: On feedback timer expiration, if data packets have been received, the receiver calculates the average loss event rate and X_recv over the previous R_m seconds, sends a feedback packet, and restarts the feedback timer for R_m seconds. If no data was received, the timer is restarted without sending feedback.
section: "6.2"
topics:
    - congestion
