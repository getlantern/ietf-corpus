document: rfc-7277
kind: design-rationale
summary: IPv4 supports both prefix-length and dotted-quad netmask representation (the latter gated by the 'ipv4-non-contiguous-netmasks' feature) to accommodate devices that support non-contiguous subnet masks, while IPv6 only supports prefix-length since non-contiguous masks are not defined for IPv6.
