document: rfc-9989
kind: design-rationale
summary: The 'pct' tag (present in RFC 7489 to allow gradual rollout of policy enforcement by applying the policy to only a percentage of failing messages) was removed in this document. Its use created unpredictable behavior and is replaced by the 't' tag, which signals test mode and applies a policy one level below the published policy to all failing messages.
section: "4.7"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
