document: rfc-8038
kind: interoperability-note
summary: Exporting a value of a MIB object defined in a particular MIB module does not imply that the SNMP process on the device supports that MIB module; the Metering or Exporting Process may capture or create data that matches the MIB object definition without running SNMP.
section: "5"
topics:
    - snmp
