document: rfc-2283
kind: design-rationale
summary: 'BGP-4 has only three IPv4-specific components: NEXT_HOP (IPv4 address), AGGREGATOR (contains IPv4 address), and NLRI (IPv4 prefixes). To support multiple network layer protocols, only two additions are needed: associating a network layer protocol with next hop information, and associating a network layer protocol with NLRI.'
