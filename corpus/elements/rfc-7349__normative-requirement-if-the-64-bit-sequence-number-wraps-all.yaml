document: rfc-7349
kind: normative-requirement
summary: If the 64-bit sequence number wraps, all keys—independent of key distribution mechanism—MUST be reset to avoid replay attacks. After key reset, the higher-order sequence number can be reset to 0 and saved to non-volatile storage.
section: "2.4"
rfc2119_level: MUST
topics:
    - mpls
    - security
    - crypto
