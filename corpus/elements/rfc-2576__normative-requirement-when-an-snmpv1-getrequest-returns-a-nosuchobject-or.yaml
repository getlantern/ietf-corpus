document: rfc-2576
kind: normative-requirement
summary: When an SNMPv1 GetRequest returns a noSuchObject or noSuchInstance exception from SNMPv2 MIB access, the error-status SHALL be set to noSuchName, the error-index set to the offending variable binding, and the original request's variable binding list returned.
section: 4.1.2.2.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
