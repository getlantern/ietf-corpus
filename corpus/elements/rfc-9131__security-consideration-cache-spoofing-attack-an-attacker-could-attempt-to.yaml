document: rfc-9131
kind: security-consideration
summary: 'Cache spoofing attack: an attacker could attempt to install a NC entry for a victim''s IPv6 address with the attacker''s link-layer address. However, this document only modifies router behavior when no existing NC entry exists; existing entries are not overridden, so no new vectors are introduced for overriding existing cache entries.'
