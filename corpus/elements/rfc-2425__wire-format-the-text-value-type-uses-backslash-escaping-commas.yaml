document: rfc-2425
kind: wire-format
summary: 'The ''text'' value type uses backslash escaping: commas and backslashes must be escaped as ''\,'' and ''\\''; a formatted line break within a text value MUST be represented as ''\n'' or ''\N'' (backslash followed by ''n'' or ''N'').'
section: 5.8.4
rfc2119_level: MUST
