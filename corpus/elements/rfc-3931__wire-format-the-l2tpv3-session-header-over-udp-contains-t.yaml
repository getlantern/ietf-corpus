document: rfc-3931
kind: wire-format
summary: 'The L2TPv3 session header over UDP contains: T bit (MUST be 0 for data), reserved x bits, 4-bit Ver field (MUST be 3), 16-bit Reserved field, 32-bit Session ID, and optional Cookie up to 64 bits. The Ver field must be checked before interpreting other bits to distinguish L2TPv2 from L2TPv3.'
section: 4.1.2.1
topics:
    - vpn
    - udp
