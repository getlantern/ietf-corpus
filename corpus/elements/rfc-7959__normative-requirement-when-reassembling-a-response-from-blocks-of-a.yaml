document: rfc-7959
kind: normative-requirement
summary: When reassembling a response from blocks of a dynamically changing resource, if an ETag Option is available, the client MUST compare ETag Options across blocks. Mismatched ETags indicate the representation changed mid-transfer.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
