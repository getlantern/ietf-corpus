document: rfc-3315
kind: normative-requirement
summary: A server MUST discard any Solicit, Confirm, Rebind, or Information-request message it receives with a unicast destination address, since these message types must be sent to the multicast address to be valid.
section: "15"
rfc2119_level: MUST
