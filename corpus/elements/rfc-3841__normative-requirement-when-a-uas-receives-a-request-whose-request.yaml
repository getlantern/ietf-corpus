document: rfc-3841
kind: normative-requirement
summary: When a UAS receives a request whose request-URI corresponds to one of its registered contacts, it SHOULD apply the preference and capability matching behavior described in Section 7.2 as if it were a proxy, allowing caller preferences to be honored even if the proxy doesn't support the extension.
section: "6"
rfc2119_level: SHOULD
