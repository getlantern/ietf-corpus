summary: 'The SCSI MIB extends but does not replace the Host Resources MIB (RFC 2790): scsiInstSoftwareIndex links a SCSI instance to an hrSWInstalledTable row, and the hrSWInstalledGroup should be used for any installed SCSI software package information not covered by this MIB.'
