document: rfc-4387
kind: normative-requirement
summary: The query value in the URI MUST be encoded using the form-urlencoded media type. Queries containing base64-encoded values with characters outside 'a'-'z', 'A'-'Z', '0'-'9', '+', and '/' MUST be rejected.
section: "2"
rfc2119_level: MUST
topics:
