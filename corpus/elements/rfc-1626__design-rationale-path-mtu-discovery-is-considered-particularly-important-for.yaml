kind: design-rationale
summary: Path MTU Discovery is considered particularly important for ATM because ATM's default MTU differs significantly from older subnet technologies such as Ethernet and FDDI, making it essential for routers and hosts to avoid unnecessary fragmentation across heterogeneous networks.
