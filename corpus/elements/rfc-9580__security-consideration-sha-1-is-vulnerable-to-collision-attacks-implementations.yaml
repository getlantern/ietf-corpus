document: rfc-9580
kind: security-consideration
summary: SHA-1 is vulnerable to collision attacks; implementations should apply collision-detection techniques when verifying SHA-1-based signatures. OpenPGP version 6 salted signatures mitigate chosen-prefix collision attacks for new signatures.
section: "13.1"
topics:
