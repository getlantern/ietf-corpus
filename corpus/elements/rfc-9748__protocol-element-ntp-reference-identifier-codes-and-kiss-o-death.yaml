document: rfc-9748
kind: protocol-element
summary: NTP Reference Identifier Codes and Kiss-o'-Death Codes are encoded as a four-byte value, right-padded with all-bits-zero. Each non-padding byte must be an ASCII uppercase letter or digit (0x41–0x5A, 0x30–0x39). Entries starting with 0x58 ('X') are reserved for Private or Experimental Use.
section: "4.1"
topics:
