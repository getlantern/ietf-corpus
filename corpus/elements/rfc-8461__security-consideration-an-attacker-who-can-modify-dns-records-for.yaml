document: rfc-8461
kind: security-consideration
summary: An attacker who can modify DNS records for a recipient domain can advertise a malicious long-lived MTA-STS Policy with MX constraints that validate attacker-controlled hosts, causing senders to cache the malicious policy and refuse delivery after the victim regains control of DNS. The victim can mitigate this by publishing an updated policy at any time.
section: "10.3"
topics:
    - email
    - tls
    - dns
    - security
