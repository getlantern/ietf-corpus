document: rfc-5447
kind: protocol-element
summary: The MIP-Home-Agent-Address AVP (AVP Code 334, from RFC 4004) is of type Address and contains the IPv6 or IPv4 address of the MIPv6 home agent. It may carry both IPv6 and IPv4 addresses to support Dual Stack Mobile IPv6 deployments.
