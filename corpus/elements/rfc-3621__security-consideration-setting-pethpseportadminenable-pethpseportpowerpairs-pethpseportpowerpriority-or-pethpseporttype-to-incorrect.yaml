document: rfc-3621
kind: security-consideration
summary: Setting pethPsePortAdminEnable, pethPsePortPowerPairs, pethPsePortPowerPriority, or pethPsePortType to incorrect values can result in improper PSE operation, including failure of a Powered Device to receive power. Unauthorized SET operations in a non-secure environment pose a direct risk to network-powered equipment.
