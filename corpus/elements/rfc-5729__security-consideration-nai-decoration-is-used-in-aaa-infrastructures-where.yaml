document: rfc-5729
kind: security-consideration
summary: NAI decoration is used in AAA infrastructures where Diameter messages traverse NAS-to-server paths via AAA brokers or proxies. The security of the end-to-end AAA communication relies on the security properties of all intermediate brokers and proxies.
