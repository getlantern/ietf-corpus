document: rfc-3788
kind: normative-requirement
summary: For peer-to-peer SIGTRAN sessions using IPsec, IPsec policy SHOULD be set to require IPsec protection for inbound connections and to initiate IPsec protection for outbound connections, accomplished via inbound and outbound filter policy.
