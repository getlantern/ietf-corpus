document: rfc-9784
kind: protocol-element
summary: 'A virtual ESI (vESI) is the per-vES identifier that replaces the physical ESI in all EVPN control-plane operations: ES routes, Ethernet A-D per ES routes, aliasing, and mass-withdraw operations are all advertised using the vESI instead of a physical ESI. Each vES must carry its own unique vESI.'
section: "3.4"
topics:
    - mpls
    - routing
    - bgp
