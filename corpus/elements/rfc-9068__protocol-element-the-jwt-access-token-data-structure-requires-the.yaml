summary: 'The JWT access token data structure requires the following REQUIRED claims: ''iss'' (issuer), ''exp'' (expiration), ''aud'' (audience), ''sub'' (subject), ''client_id'' (as per RFC 8693 Section 4.3), ''iat'' (issued at), and ''jti'' (JWT ID).'
