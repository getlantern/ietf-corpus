document: rfc-2878
kind: normative-requirement
summary: By default, an implementation MUST either support the IEEE 802.1D spanning tree or support no spanning tree protocol at all. An implementation supporting no spanning tree MUST silently discard received 802.1D BPDUs and MUST silently discard or respond with LCP Protocol-Reject to other BPDU types.
section: "5.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
