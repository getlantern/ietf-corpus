document: rfc-5763
kind: design-rationale
summary: Certificates used in DTLS are treated purely as carriers for public keys and may be completely self-signed and self-generated on demand. This eliminates the need for a global PKI and makes deployment practical for arbitrary Internet endpoints with no prior relationships.
section: "1"
topics:
    - tls
    - pkix
    - crypto
    - security
