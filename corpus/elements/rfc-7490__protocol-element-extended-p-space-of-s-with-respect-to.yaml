document: rfc-7490
kind: protocol-element
summary: Extended P-space of S with respect to link S-E is the union of the P-spaces of each of S's neighbors (excluding E) with respect to that link. A router P is in extended P-space if D_opt(N,P) < D_opt(N,S) + D_opt(S,P) for some neighbor N. Extended P-space allows S to reach potential repair tunnel endpoints unreachable via plain P-space.
section: "2"
topics:
