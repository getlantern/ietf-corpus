summary: iSER Hello Message header (Section 9.3, Figure 4) and iSER HelloReply header (Section 9.4, Figure 5) carry the iSER protocol version range and RDMA queue depth parameters (iSER-IRD in Hello; iSER-ORD in HelloReply) used for connection-level RDMA resource negotiation.
