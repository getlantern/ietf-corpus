document: rfc-1277
kind: design-rationale
summary: The new Telex-AFI network address format is explicitly not appropriate for use where CONS or CLNS is used to provide COTS or CLTS; X.121 AFI handles international X.25 cases without PID or CUDF, and the new format covers only the remaining cases.
