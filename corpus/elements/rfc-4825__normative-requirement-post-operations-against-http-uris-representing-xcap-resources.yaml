document: rfc-4825
kind: normative-requirement
summary: POST operations against HTTP URIs representing XCAP resources are not defined. XCAP resources are not processing scripts; an XCAP server MUST return an appropriate error for POST requests directed at XCAP resources.
section: "8.1"
rfc2119_level: MUST
