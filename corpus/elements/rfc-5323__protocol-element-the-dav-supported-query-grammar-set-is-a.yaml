document: rfc-5323
kind: protocol-element
summary: The DAV:supported-query-grammar-set is a protected WebDAV live property required for servers supporting RFC 3253 or RFC 3744. It identifies XML-based query grammars supported by the search arbiter resource, represented as a list of DAV:supported-query-grammar elements each containing a grammar element.
section: "3.3"
