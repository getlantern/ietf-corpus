document: rfc-8784
kind: normative-requirement
summary: If using PPKs for communication with the responder is optional for the initiator, the initiator MUST include a NO_PPK_AUTH notification carrying authentication data computed using SK_pi' (without PPK) in the IKE_AUTH request.
