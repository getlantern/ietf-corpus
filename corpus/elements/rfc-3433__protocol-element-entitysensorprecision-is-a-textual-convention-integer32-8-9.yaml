document: rfc-3433
kind: protocol-element
summary: EntitySensorPrecision is a textual convention (Integer32, -8..9) where positive values (1-9) indicate decimal places in the fractional part of a fixed-point sensor value, negative values (-8 to -1) indicate number of accurate digits, and zero indicates the value is not fixed-point.
