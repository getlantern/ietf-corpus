document: rfc-9133
kind: protocol-element
summary: '''activation-type'' is an optional sub-attribute of ''acl-list'' that overrides the existing activation-type installed via the data channel. Valid values are ''deactivate'', ''immediate'', and ''activate-when-mitigating''; both ''immediate'' and ''activate-when-mitigating'' take effect immediately when processed by the DOTS server.'
section: 3.2.1
topics:
