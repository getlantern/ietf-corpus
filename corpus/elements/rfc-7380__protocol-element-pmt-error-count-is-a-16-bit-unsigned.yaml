document: rfc-7380
kind: protocol-element
summary: PMT_error_count is a 16-bit unsigned count of PMT errors. A PMT error occurs when a packet with table_id 0x02 does not appear at least every 0.5 seconds on the PAT-referenced PID, or has a non-zero Scrambling_control_field. Value 0xFFFF indicates measurement unavailable.
section: "3"
topics:
