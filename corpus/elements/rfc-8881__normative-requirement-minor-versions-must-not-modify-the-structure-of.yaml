document: rfc-8881
kind: normative-requirement
summary: Minor versions MUST NOT modify the structure of existing operations' arguments or results, MUST NOT delete operations or attributes, and MUST NOT modify existing attribute structures. New operations must be added rather than modifying existing structures.
section: "2.7"
rfc2119_level: MUST NOT
