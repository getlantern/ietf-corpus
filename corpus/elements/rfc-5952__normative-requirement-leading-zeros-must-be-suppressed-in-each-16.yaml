document: rfc-5952
kind: normative-requirement
summary: Leading zeros MUST be suppressed in each 16-bit field. For example, 2001:0db8::0001 is not acceptable and must be represented as 2001:db8::1. A single 16-bit 0000 field MUST be represented as 0.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
