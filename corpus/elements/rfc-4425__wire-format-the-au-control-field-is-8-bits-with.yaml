document: rfc-4425
kind: wire-format
summary: 'The AU Control field is 8 bits with the following sub-fields: FRAG (2 bits, fragmentation state: 0=middle, 1=first, 2=last, 3=complete), RA (1 bit, random access point), SL (1 bit, sequence layer counter toggled on new headers), LP (1 bit, AUP Len present), PT (1 bit, PTS Delta present), DT (1 bit, DTS Delta present), R (1 bit, reserved, MUST be 0).'
section: "5.3"
topics:
    - rtp
    - realtime
