document: rfc-9154
kind: normative-requirement
summary: For an <update> command, the registry MUST allow the setting and unsetting of the authorization information. When the TTL expires, the sponsoring registrar MUST cancel the transfer by unsetting the authorization information value.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
