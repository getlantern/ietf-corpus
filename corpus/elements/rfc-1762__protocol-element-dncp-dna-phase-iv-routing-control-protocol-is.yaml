document: rfc-1762
kind: protocol-element
summary: DNCP (DNA Phase IV Routing Control Protocol) is the NCP responsible for configuring, enabling, and disabling DNA Phase IV Routing on both ends of a PPP link. It uses the same packet exchange mechanism as LCP and is identified by PPP Protocol field value hex 8027.
