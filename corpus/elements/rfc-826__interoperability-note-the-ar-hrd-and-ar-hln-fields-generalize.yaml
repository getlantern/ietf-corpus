document: rfc-826
kind: interoperability-note
summary: The ar$hrd and ar$hln fields generalize ARP beyond 10Mbit Ethernet to other hardware types such as Packet Radio Networks. For 10Mbit Ethernet the pair <ar$hrd, ar$hln> = <1, 6>. For other hardware the ar$pro field may no longer correspond to the Ethernet type field but must still identify the protocol being resolved.
section: Generalization
topics:
    - ip
