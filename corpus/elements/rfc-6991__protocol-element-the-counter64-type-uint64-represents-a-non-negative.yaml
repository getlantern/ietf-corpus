document: rfc-6991
kind: protocol-element
summary: The counter64 type (uint64) represents a non-negative integer that monotonically increases to 2^64-1 then wraps to zero. Like counter32, it has no defined initial value and should not be used for configuration schema nodes. Equivalent to SMIv2 Counter64.
