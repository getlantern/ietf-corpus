document: rfc-5740
kind: wire-format
summary: The EXT_FTI header extension (het=64) provides FEC Object Transmission Information in-band. Its general portion contains a 48-bit 'object_size' field, followed by FEC-scheme-specific content; for fec_id=129 (small block systematic codes), this adds 'fec_instance_id' (16-bit), 'segment_size' (16-bit), 'fec_max_block_len' (16-bit), and 'fec_num_parity' (16-bit).
section: 4.2.1
topics:
    - multicast
    - udp
