document: rfc-8895
kind: normative-requirement
summary: An ALTO client MUST NOT use a dependent resource (e.g., a cost map) after its dependency (e.g., the network map) has changed but before the dependent resource's corresponding update has been received and applied.
section: "9.2"
rfc2119_level: MUST
topics:
    - http
