document: rfc-4805
kind: design-rationale
summary: Degraded Minutes (DM) objects (dsx1CurrentDMs, dsx1IntervalDMs, dsx1TotalDMs) were deprecated in RFC 4805 following their removal from ITU performance standards. They remain in the MIB with STATUS deprecated for backward compatibility with RFC 3895 implementations.
