document: rfc-6615
kind: normative-requirement
summary: At least one of ipfixObservationPointPhysicalEntity or ipfixObservationPointPhysicalInterface MUST exist for a valid Observation Point entry. If both are provided, they MUST reference the same physical interface; if one cannot be specified, it MUST be set to 0.
section: "5.6"
rfc2119_level: MUST
topics:
