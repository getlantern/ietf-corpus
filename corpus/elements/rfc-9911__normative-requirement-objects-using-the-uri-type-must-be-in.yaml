document: rfc-9911
kind: normative-requirement
summary: Objects using the uri type MUST be in ASCII encoding and MUST be normalized as described in RFC 3986 Sections 6.2.1, 6.2.2.1, and 6.2.2.2, with case-insensitive characters set to lowercase (except percent-encoded hex digits, which are normalized to uppercase).
section: "4"
rfc2119_level: MUST
