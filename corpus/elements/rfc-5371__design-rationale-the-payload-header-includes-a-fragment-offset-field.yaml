document: rfc-5371
kind: design-rationale
summary: The payload header includes a fragment offset field to support scalable video delivery using multiple RTP sessions, where the offset from the first byte of the same frame allows layered video delivery even when a packet is the first received in a session but does not start at offset 0.
section: "4.2"
topics:
