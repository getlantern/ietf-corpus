document: rfc-4360
kind: security-consideration
summary: The Extended Communities Attribute has similar security implications as the BGP Communities attribute (RFC 1997). An operator relying on BGP-carried information must have a transitive trust relationship back to the source; this document does not specify mechanisms for establishing such trust.
section: "8"
topics:
    - bgp
    - routing
    - security
