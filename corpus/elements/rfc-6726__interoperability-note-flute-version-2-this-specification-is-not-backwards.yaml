document: rfc-6726
kind: interoperability-note
summary: FLUTE version 2 (this specification) is not backwards compatible with FLUTE version 1 defined in RFC 3926. Receivers encountering multiple FLUTE sessions on a channel MUST determine the version from the EXT_FDT header's V field combined with the (source IP address, TSI) pair.
section: "3.1"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
