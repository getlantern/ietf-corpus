document: rfc-6942
kind: protocol-element
summary: The ERP-RK-Request AVP (AVP Code 618) is a Grouped AVP used by the ER server to indicate its willingness to act as the ER server for a particular session. It contains a mandatory ERP-Realm AVP and has the 'M' and 'V' bits cleared.
