document: rfc-2925
kind: protocol-element
summary: 'pingResultsTable stores per-test aggregate statistics: minimum, maximum, and average RTT (milliseconds), probe response count, sent probe count, RTT sum-of-squares (for standard deviation), and DateAndTime of last good probe. An entry is created when the test starts and removed when its pingCtlEntry is deleted.'
