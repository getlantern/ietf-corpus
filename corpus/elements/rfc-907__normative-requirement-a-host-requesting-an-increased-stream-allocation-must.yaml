document: rfc-907
kind: normative-requirement
summary: A host requesting an increased stream allocation must not transmit at the new parameters without first receiving a Reply Code of 4 (stream changed). A host requesting a reduced allocation should decrease its sending rate immediately without waiting for the reply.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - congestion
