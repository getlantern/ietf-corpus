document: rfc-6345
kind: normative-requirement
summary: A PRY message MUST NOT be retransmitted by the PRE or the PAA. Retransmission is handled by the PaC or PAA at the PANA layer, resulting in a new PRY carrying the same Relayed-Message AVP.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
