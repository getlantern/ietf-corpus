summary: 'Each STUN attribute is TLV-encoded: 16-bit type, 16-bit length (value bytes before padding), variable-length value padded to a 32-bit boundary. Attributes with type 0x0000–0x7FFF are comprehension-required; 0x8000–0xFFFF are comprehension-optional.'
