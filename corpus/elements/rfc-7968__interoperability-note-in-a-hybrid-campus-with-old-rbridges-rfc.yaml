document: rfc-7968
kind: interoperability-note
summary: In a hybrid campus with old RBridges (RFC 6325 only) and new RBridges, the multicast forwarding table benefit is reduced. The worst case is where new RBridges' interested VLANs are a subset of old RBridges' interested VLANs, yielding no table size reduction for entries related to old RBridges.
section: "4"
topics:
