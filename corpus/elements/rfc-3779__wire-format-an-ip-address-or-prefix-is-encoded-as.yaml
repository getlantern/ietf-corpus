document: rfc-3779
kind: wire-format
summary: An IP address or prefix is encoded as a DER-encoded ASN.1 BIT STRING. The initial octet specifies the number of unused bits in the last value octet; unused bits MUST be set to zero. An IPv4 address uses 32 bits (4 subsequent octets); an IPv6 address uses 128 bits (16 subsequent octets); a prefix uses only the constant most-significant bits.
section: 2.1.1
topics:
    - pkix
    - ip
