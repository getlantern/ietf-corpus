document: rfc-6388
kind: normative-requirement
summary: If the Address Family is IPv4, the Address Length MUST be 4; if IPv6, the Address Length MUST be 16. If the Address Length doesn't match the defined length for the Address Family, the receiver SHOULD abort processing and send an 'Unknown FEC' Notification to its LDP peer.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
