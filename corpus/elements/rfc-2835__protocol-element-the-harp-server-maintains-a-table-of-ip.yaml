document: rfc-2835
kind: protocol-element
summary: 'The HARP server maintains a table of <IP address(es), ULA> mappings with timestamps. It handles five cases of incoming InHARP_REQUEST entries: linked existing, unlinked existing, IP moved to new HW, new IP alias on existing HW, and fresh entry; each case has defined create/delete/link actions.'
section: "5.4"
