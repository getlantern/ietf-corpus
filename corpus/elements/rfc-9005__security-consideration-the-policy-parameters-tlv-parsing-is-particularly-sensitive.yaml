document: rfc-9005
kind: security-consideration
summary: The POLICY-PARAMETERS-TLV parsing is particularly sensitive since it is opaque to PCEP and can carry data with many different internal formats. Using a wrong decoder could produce garbage results; using standard and well-known policy formats is advised to mitigate this risk.
section: "6"
