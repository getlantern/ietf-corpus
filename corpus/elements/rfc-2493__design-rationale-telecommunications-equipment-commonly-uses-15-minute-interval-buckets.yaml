document: rfc-2493
kind: design-rationale
summary: Telecommunications equipment commonly uses 15-minute interval buckets for performance history (aligned to ANSI T1.231 wall-clock boundaries), rather than continuous counters polled by the manager. This memo standardizes TCs for that pattern rather than comparing strategies.
section: "2"
