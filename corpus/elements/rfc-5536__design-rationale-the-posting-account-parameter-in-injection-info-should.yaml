document: rfc-5536
kind: design-rationale
summary: The posting-account parameter in Injection-Info SHOULD be given in a form opaque to other sites to limit personal data exposure, yet two messages from the same source SHOULD have the same value and different sources SHOULD have differing values, balancing privacy against the need for rate limiting and abuse detection.
section: 3.2.8
topics:
    - privacy
    - security
