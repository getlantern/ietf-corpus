document: rfc-2595
kind: design-rationale
summary: 'Separate ''imaps'' and ''pop3s'' ports (use of SSL on dedicated ports) are discouraged in favor of STARTTLS/STLS. Problems with separate ports include: separate URL schemes that intrude on the UI, a false binary ''secure vs. not secure'' model that misleads users and firewall admins, and limited port number space.'
section: "7"
topics:
    - tls
    - security
