document: rfc-5571
kind: normative-requirement
summary: IPv4 traffic SHOULD NOT traverse an IPv6-over-IPv4 Softwire; similarly, IPv6 traffic SHOULD NOT traverse an IPv4-over-IPv6 Softwire. The Softwire carries only the address family that is being transitioned.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
