document: rfc-3711
kind: normative-requirement
summary: Interoperable SRTP implementations MUST use the SRTP key derivation to generate session keys, regardless of the encryption or message authentication transform employed. At least one initial key derivation SHALL be performed before the first packet.
section: 4.3.1
rfc2119_level: MUST
topics:
