document: rfc-2946
kind: protocol-element
summary: IAC SB ENCRYPT START keyid IAC SE signals that all subsequent data in the stream will be encrypted. The keyid field is variable length, encoded most-significant-byte first, must be at least one byte long, and value zero is reserved for the default encryption key. Only WILL ENCRYPT side may send START.
section: "2"
topics:
