document: rfc-2136
kind: normative-requirement
summary: SOA SERIAL changes from an update must be in a positive direction per RFC 1982 modulo 2**32 arithmetic. Attempts to replace an SOA with a lower or equal SERIAL are silently ignored by the primary master server.
section: "3.6"
rfc2119_level: MUST
topics:
    - dns
