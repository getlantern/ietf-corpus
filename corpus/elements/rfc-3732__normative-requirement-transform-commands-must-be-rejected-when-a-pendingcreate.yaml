document: rfc-3732
kind: normative-requirement
summary: Transform commands MUST be rejected when a pendingCreate, pendingDelete, pendingTransfer, or pendingUpdate status is set. When the requested action has been completed, the pending status value MUST be removed and all involved clients MUST be notified via a service message.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
