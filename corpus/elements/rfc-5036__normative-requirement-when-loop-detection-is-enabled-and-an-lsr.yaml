document: rfc-5036
kind: normative-requirement
summary: When Loop Detection is enabled and an LSR detects a loop (Path Vector contains its LSR Id, or Hop Count exceeds maximum), it MUST send a Loop Detected Notification to the source of the Label Request and drop the message.
section: 2.8.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
