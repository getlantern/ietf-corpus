document: rfc-9598
kind: design-rationale
summary: SmtpUTF8Mailbox is only used when the Local-part contains non-ASCII characters, with rfc822Name required for ASCII Local-parts, to maintain compatibility with legacy software that supports rfc822Name but not SmtpUTF8Mailbox.
