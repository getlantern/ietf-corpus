document: rfc-7783
kind: normative-requirement
summary: Remote RBridges MUST honor the Affinity sub-TLV from the RBridge with the highest priority to be a tree root (using System ID as tiebreaker) and MUST ignore conflicting Affinity sub-TLV entries from lower-priority RBridges.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - multicast
