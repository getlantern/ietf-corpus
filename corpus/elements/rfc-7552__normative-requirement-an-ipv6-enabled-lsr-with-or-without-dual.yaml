document: rfc-7552
kind: normative-requirement
summary: An IPv6-enabled LSR (with or without dual-stacking) MUST use a 32-bit (unsigned non-zero integer) LSR Id. For a given address family, an LSR MUST advertise the same transport address in all Hellos that advertise the same label space. The same LDP Identifier (LSR Id and label space id) MUST be used for both IPv4 and IPv6 address families.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
