document: rfc-8533
kind: normative-requirement
summary: The lowest NETCONF layer MUST use a secure transport, and the mandatory-to-implement secure transport is SSH (RFC 6242). For RESTCONF, the mandatory-to-implement secure transport is TLS (RFC 8446 — TLS 1.3).
section: "5"
rfc2119_level: MUST
topics:
