document: rfc-7542
kind: design-rationale
summary: The NAI format is defined as protocol-independent so that a single standard identifier can be reused across AAA and non-AAA protocols. Multiple incompatible identifier formats increase cost, complexity, and allow attackers to make contradictory identity claims without detection.
section: "1.3"
