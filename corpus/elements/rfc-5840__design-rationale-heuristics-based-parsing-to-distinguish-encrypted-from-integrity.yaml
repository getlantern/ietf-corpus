document: rfc-5840
kind: design-rationale
summary: Heuristics-based parsing to distinguish encrypted from integrity-only ESP is expensive, requires numerous protocol-specific rules, and is not robust when encrypted packet fields resemble protocol heuristics. WESP replaces this with a deterministic, single-bit indicator that works for both stateful and stateless devices (ACLs, NetFlow exporters).
section: "1"
topics:
    - ipsec
