document: rfc-9617
kind: protocol-element
summary: 'The ''ietf-ioam'' YANG module organizes IOAM configuration as a list of profiles under the top-level ''ioam'' container. Each profile associates with one flow and contains sub-profiles for up to five IOAM option types: incremental tracing, pre-allocated tracing, direct export, proof of transit, and edge-to-edge.'
section: "3.1"
topics:
    - yang
    - netconf
    - measurement
