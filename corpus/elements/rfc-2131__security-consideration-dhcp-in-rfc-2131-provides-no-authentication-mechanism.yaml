document: rfc-2131
kind: security-consideration
summary: DHCP in RFC 2131 provides no authentication mechanism for DHCP messages, making it vulnerable to unauthorized servers sending bogus replies, malicious clients impersonating legitimate ones, and resource exhaustion attacks that deplete the address pool. The protocol relies entirely on physical network security.
section: "7"
topics:
    - security
    - ip
