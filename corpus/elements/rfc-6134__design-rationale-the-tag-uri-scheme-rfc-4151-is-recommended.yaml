document: rfc-6134
kind: design-rationale
summary: The "tag" URI scheme (RFC 4151) is recommended for opaque, user-friendly list identifiers because generic LDAP URI syntax is too complex for end users. An implementation can use a fixed tag URI prefix and hide backend complexity, e.g., mapping a simple tag to an LDAP query behind a web interface.
section: "2.5"
topics:
    - email
    - ldap
