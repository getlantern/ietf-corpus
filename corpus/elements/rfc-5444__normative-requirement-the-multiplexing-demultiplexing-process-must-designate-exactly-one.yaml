document: rfc-5444
kind: normative-requirement
summary: The multiplexing/demultiplexing process MUST designate exactly one protocol as the 'owner' of each Message Type; incoming messages MUST be either silently discarded or delivered to the owner protocol instance, and SHOULD NOT be delivered to any other protocol instance.
section: Appendix A
rfc2119_level: MUST
topics:
    - routing
