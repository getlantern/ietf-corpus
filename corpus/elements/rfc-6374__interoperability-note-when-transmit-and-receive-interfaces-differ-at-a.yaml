document: rfc-6374
kind: interoperability-note
summary: When transmit and receive interfaces differ at a node, the DM protocol requires that the timestamp formats used by the receiving interface (reading the query) and the transmitting interface (writing the response) agree. Additionally, if different clocks are associated with transmit and receive processing, they must be synchronized for two-way delay computation.
section: 2.9.6
topics:
    - mpls
    - measurement
