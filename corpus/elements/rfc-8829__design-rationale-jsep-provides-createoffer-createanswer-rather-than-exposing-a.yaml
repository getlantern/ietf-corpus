document: rfc-8829
kind: design-rationale
summary: JSEP provides createOffer/createAnswer rather than exposing a getCapabilities API because requiring applications to correctly generate session descriptions from raw capabilities would force use of a higher-level library even for simple examples, negating JSEP's goal of simplicity.
