document: rfc-1626
kind: normative-requirement
summary: If either endpoint receives CPCS-SDUs exceeding the negotiated MTU size, it may use IP fragmentation or may clear the call with cause 'AAL Parameters cannot be supported'; the error should be noted by ATM network management.
section: Switched Virtual Circuits
