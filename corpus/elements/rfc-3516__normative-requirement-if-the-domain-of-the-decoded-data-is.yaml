document: rfc-3516
kind: normative-requirement
summary: If the domain of the decoded data is "8bit" and the data does not contain the NUL octet, the server SHOULD return the data in a <string> instead of a <literal8>, allowing the client to determine NUL presence without scanning the data stream.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - email
