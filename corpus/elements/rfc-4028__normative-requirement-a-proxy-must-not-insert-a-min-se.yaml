document: rfc-4028
kind: normative-requirement
summary: A proxy MUST NOT insert a Min-SE header field or modify an existing one in a proxied request if that request contains a Supported header field with value 'timer'. This protects against denial-of-service attacks.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - security
    - realtime
