document: rfc-2883
kind: protocol-element
summary: 'A false (unnecessary) retransmit due to severe reordering is detectable via D-SACK: a D-SACK block whose sequence space is lower than the cumulative ACK and identical to a previously retransmitted segment indicates significant reordering triggered an unnecessary Fast Retransmit.'
section: "5.2"
topics:
