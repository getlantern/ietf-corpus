document: rfc-1793
kind: interoperability-note
summary: For Point-to-MultiPoint interfaces, Hello suppression is negotiated independently on each component point-to-point link. Negotiation may succeed on some component links and fail on others; this is acceptable. Failed links continue sending periodic Hellos.
section: "3.5"
topics:
    - routing
