summary: For ES 202 212, the 4-bit CRC and 2-bit PC-CRC in the FP MUST be calculated using the formula (including bit-order rules) defined in Section 7.2.4 of ES 202 212, and each FP MUST be padded with 4 zeros to the MSB 4 bits of the last octet.
