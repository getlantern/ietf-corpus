document: rfc-2535
kind: wire-format
summary: 'KEY RR RDATA: 16-bit flags field (authentication/confidentiality use bits, name type bits, signatory bits), 8-bit protocol octet, 8-bit algorithm octet, followed by variable-length public key material. If the ''no key'' flag (bits 0 and 1 both set) is present, the RR ends after the algorithm octet.'
section: "3.1"
topics:
