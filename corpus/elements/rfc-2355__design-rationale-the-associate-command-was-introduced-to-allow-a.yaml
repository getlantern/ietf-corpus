document: rfc-2355
kind: design-rationale
summary: The ASSOCIATE command was introduced to allow a client to request the printer device that is paired with a terminal, without needing prior knowledge of the printer's device-name, supporting host applications that derive the print destination from the terminal's LU name.
section: 7.1.3
