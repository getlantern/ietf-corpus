document: rfc-6428
kind: interoperability-note
summary: Implementations may interoperate with legacy equipment by implementing RFC 5884 (BFD for MPLS LSPs) and RFC 5085 (VCCV for PWs) in addition to the procedures in this memo. When BFD control packets use IP encapsulation per RFC 5884, IP header fields are set as defined therein.
section: "3.1"
topics:
    - mpls
