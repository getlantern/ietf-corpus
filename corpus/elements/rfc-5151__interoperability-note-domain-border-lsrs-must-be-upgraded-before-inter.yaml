document: rfc-5151
kind: interoperability-note
summary: Domain border LSRs must be upgraded before inter-domain TE LSPs are allowed across a domain border due to the need to establish policy, administrative, and security controls. Legacy domain border LSRs need not be considered since they will block inter-domain LSPs.
