document: rfc-9293
kind: interoperability-note
summary: When an interface has a variable effective MTU (e.g., due to header compression schemes like ROHC that occasionally must transmit full headers), TCP implementations SHOULD advertise an MSS based on the smallest effective MTU of the interface (SHLD-6) to avoid retransmission interference during compressor resynchronization.
section: 3.7.3
topics:
    - tcp
