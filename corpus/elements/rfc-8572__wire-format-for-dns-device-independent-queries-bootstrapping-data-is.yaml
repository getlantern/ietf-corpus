document: rfc-8572
kind: wire-format
summary: For DNS device-independent queries, bootstrapping data is encoded as SRV records under '_sztp._tcp', where each SRV record encodes priority, weight, port, and target hostname of a bootstrap server, effectively representing unsigned redirect information without support for signed data or trust anchor certificates.
section: 4.2.3
topics:
