document: rfc-7811
kind: interoperability-note
summary: Parallel links between the same pair of nodes with the same metric are treated as equal by Interface_Compare (returning A_EQUAL_TO_B). The algorithm guarantees that all such parallel links receive the same direction in the final GADAG regardless of which one is explored first during DFS.
section: "5.1"
topics:
    - routing
