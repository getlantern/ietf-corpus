document: rfc-2111
kind: normative-requirement
summary: When a single message contains several body parts with the same Content-ID (e.g., within multipart/alternate), conforming implementations are required to use the rules of the containing MIME entity to select the body part to which the Content-ID refers.
section: "2"
rfc2119_level: REQUIRED
