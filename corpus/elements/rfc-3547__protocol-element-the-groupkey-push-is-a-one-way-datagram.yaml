summary: The GROUPKEY-PUSH is a one-way datagram sent from the GCKS (or delegate) to group members to replace a Re-key SA KEK/KEK array and/or create new Data-security SAs; it is protected by the group Re-key SA KEK and authenticated by a SIG payload.
