document: rfc-6603
kind: normative-requirement
summary: If a Release message from a requesting router contains a 'new' excluded prefix in any OPTION_PD_EXCLUDE option (one for which the delegating router has no existing binding), the delegating router MUST send a Reply message with Status Code set to NoBinding for that IA_PD option.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
