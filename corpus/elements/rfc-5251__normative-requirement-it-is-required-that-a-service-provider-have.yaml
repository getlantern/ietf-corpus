document: rfc-5251
kind: normative-requirement
summary: It is REQUIRED that a service provider have a single addressing realm spanning all PE devices involved in providing the L1VPN service (the service provider addressing realm). It is further REQUIRED that each L1VPN customer have its own addressing realm; customer realms MAY overlap with each other and with the service provider realm.
section: "3.1"
rfc2119_level: REQUIRED
topics:
    - vpn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
