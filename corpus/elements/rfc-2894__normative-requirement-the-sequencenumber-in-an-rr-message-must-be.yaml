document: rfc-2894
kind: normative-requirement
summary: The SequenceNumber in an RR message MUST be non-decreasing between Sequence Number Resets. The highest sequence number found in a valid message MUST be recorded in non-volatile storage (the Recorded Sequence Number).
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
