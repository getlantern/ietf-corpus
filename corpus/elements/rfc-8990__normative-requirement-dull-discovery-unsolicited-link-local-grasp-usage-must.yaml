document: rfc-8990
kind: normative-requirement
summary: DULL (Discovery Unsolicited Link-Local) GRASP usage MUST be limited to link-local operations on a single interface and MUST be confined to a separate insecure instance of GRASP with its own copy of all data structures. Initiators MAY send Discovery or Flood Synchronization multicasts with loop count of 1; other unsolicited message types MUST NOT be sent.
section: 2.5.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
