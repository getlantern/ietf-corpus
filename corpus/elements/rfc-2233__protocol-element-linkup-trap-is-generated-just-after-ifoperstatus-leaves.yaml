document: rfc-2233
kind: protocol-element
summary: LinkUp trap is generated just after ifOperStatus leaves the down state; linkDown trap is generated just before ifOperStatus enters the down state. Transitions to/from the notPresent state never generate linkUp/linkDown traps. Agents SHOULD rate-limit trap generation during interface 'flapping'.
section: 3.1.15
topics:
    - snmp
