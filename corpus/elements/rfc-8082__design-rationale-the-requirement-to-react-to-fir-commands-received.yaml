document: rfc-8082
kind: design-rationale
summary: The requirement to react to FIR commands received on enhancement-layer RTCP streams (not just the base layer) is retained for robustness and backward compatibility. While the normative preference is to send FIR targeting the base layer, the receiver must handle FIR on any layer to interoperate with legacy implementations.
section: "4"
topics:
