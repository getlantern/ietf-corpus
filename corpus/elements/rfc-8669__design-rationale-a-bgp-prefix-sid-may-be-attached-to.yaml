document: rfc-8669
kind: design-rationale
summary: A BGP Prefix-SID MAY be attached to a BGP prefix, meaning each prefix is advertised individually. This reduces the ability to pack BGP advertisements when sharing common attributes, a deliberate trade-off for per-prefix SID assignment.
section: "1"
topics:
    - bgp
    - routing
