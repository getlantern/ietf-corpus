document: rfc-9183
kind: interoperability-note
summary: RBridges that do not support E-L1FS or E-L2FS cannot serve as area border RBridges but may appear within an L1 area as non-area-border RBridges. The extended TLVs defined in Section 5 must be used only in E-L1FS/E-L2FS PDUs.
