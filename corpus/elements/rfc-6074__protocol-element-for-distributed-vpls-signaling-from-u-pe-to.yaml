document: rfc-6074
kind: protocol-element
summary: For Distributed VPLS signaling from U-PE to N-PE, the AGI is set to the VPN-id, the SAII is set to the PW number, and the TAII is null. For N-PE-to-U-PE signaling, the SAII is null and the TAII is set to the PW number relative to that VPLS and U-PE.
section: 3.5.1
topics:
    - mpls
    - vpn
