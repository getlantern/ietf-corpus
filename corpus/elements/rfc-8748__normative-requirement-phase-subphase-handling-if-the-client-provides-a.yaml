document: rfc-8748
kind: normative-requirement
summary: 'Phase/subphase handling: if the client provides a supported phase/subphase combination, the server MUST return fee data for that combination. If ambiguous (no attributes, multiple active phases), the server MUST respond with 2003 ''Required parameter missing''. Unsupported phase or subphase values MUST result in a 2004 ''Parameter value range error''. A subphase without a phase MUST also return 2003.'
section: "3.8"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
