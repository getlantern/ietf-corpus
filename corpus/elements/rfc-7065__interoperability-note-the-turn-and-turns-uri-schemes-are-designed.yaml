document: rfc-7065
kind: interoperability-note
summary: The "turn" and "turns" URI schemes are designed to provision the four components (secure flag, host, port, transport) required by the RFC 5928 TURN Resolution Mechanism without modification. Applications using these URIs must pass the components directly to that algorithm.
section: "3.1"
topics:
    - nat
    - webrtc
