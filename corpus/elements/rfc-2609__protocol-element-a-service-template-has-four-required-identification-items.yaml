document: rfc-2609
kind: protocol-element
summary: 'A service template has four required identification items: template-type (service type name and optional naming authority), template-version (major.minor version number), template-description (human-readable text), and template-url-syntax (ABNF for the url-path production). These are followed by zero or more attribute definitions, each terminated by a blank line.'
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
