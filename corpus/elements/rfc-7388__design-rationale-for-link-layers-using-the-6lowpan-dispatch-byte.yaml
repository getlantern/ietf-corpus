document: rfc-7388
kind: design-rationale
summary: For link layers using the 6LoWPAN dispatch byte, only datagrams with dispatch byte matching 01xxxxxx, 10xxxxxx, or 11xxxxxx are counted as 6LoWPAN datagrams. Datagrams with pattern 00xxxxxx (NALP) are explicitly excluded from all counters.
