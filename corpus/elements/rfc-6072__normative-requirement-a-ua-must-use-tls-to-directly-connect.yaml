document: rfc-6072
kind: normative-requirement
summary: A UA MUST use TLS to directly connect to the credential service and MUST NOT connect through an intermediate proxy. The TLS certificate presented must match the expected server name to prevent man-in-the-middle attacks.
section: "7.5"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - security
