document: rfc-8010
kind: design-rationale
summary: TLS support is SHOULD rather than MUST because previous versions of the specification did not require it, so backward compatibility prevents mandating it for IPP/1.1. Implementors are nonetheless strongly encouraged to include TLS support because printing often involves sensitive information and pervasive network monitoring is a real threat (RFC 7258).
section: 8.1.2
topics:
    - http
    - security
    - tls
