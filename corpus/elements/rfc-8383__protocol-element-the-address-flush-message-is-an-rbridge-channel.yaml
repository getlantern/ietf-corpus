document: rfc-8383
kind: protocol-element
summary: The Address Flush message is an RBridge Channel protocol message used to explicitly request other TRILL switches to flush certain MAC reachability learned through decapsulation of TRILL Data packets. It supplements TRILL automatic address forgetting (RFC 6325 Section 4.8.3) and assists in achieving more rapid convergence after topology or configuration changes.
