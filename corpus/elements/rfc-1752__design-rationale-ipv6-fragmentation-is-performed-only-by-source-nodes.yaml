document: rfc-1752
kind: design-rationale
summary: IPv6 fragmentation is performed only by source nodes, not intermediate routers. This is a deliberate departure from IPv4 that improves router performance by eliminating the need for routers to handle fragment reassembly or fragmentation of in-transit packets.
section: 12.2.4
topics:
    - ip
