document: rfc-1490
kind: protocol-element
summary: 'Frame Relay bridges support two virtual port models: (1) LAN view, combining all VCs into a single virtual bridge port requiring dynamic MAC address-to-DLCI learning and artificial flooding; (2) point-to-point view, treating each VC as a separate bridge port. The extended Spanning Tree Algorithm (IEEE 802.1g) is required when more than one virtual port exists within a remote bridge group.'
section: "10"
extracted_by: claude-sonnet-4-6
