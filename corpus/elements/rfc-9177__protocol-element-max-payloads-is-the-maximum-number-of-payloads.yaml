document: rfc-9177
kind: protocol-element
summary: MAX_PAYLOADS is the maximum number of payloads that can be transmitted at any one time (default 10). Both CoAP endpoints MUST have the same value and it MAY be negotiated via a higher-level protocol. MAX_PAYLOADS_SET is the corresponding set of block numbers whose block number divided by MAX_PAYLOADS yields the same integer result.
section: "7.2"
topics:
    - congestion
