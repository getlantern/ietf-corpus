document: rfc-5858
kind: security-consideration
summary: 'ROHCoIPsec may increase susceptibility to traffic flow analysis: an attacker monitoring encrypted packet sizes may detect new flows from patterns such as a burst of long packets followed by many short packets. ROHC padding can randomize packet sizes to mitigate this, at the cost of compression efficiency.'
section: "5"
topics:
    - security
    - privacy
    - ipsec
