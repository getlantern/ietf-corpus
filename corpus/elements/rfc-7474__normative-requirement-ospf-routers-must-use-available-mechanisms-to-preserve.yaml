document: rfc-7474
kind: normative-requirement
summary: OSPF routers MUST use available mechanisms to preserve the strictly increasing property of the sequence number for the deployed life of the router, including cold restarts. This is achieved by incrementing the boot count in non-volatile storage each time prior sequence number state is lost.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
