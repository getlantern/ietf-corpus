document: rfc-7356
kind: normative-requirement
summary: On point-to-point circuits, when a new adjacency reaches the UP state, FS-CSNPs for all supported scopes MUST be sent and the SRM bit MUST be set for all FS-LSPs associated with the supported scopes, ensuring FS-LSDB synchronization from the start.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
