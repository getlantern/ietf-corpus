document: rfc-1294
kind: wire-format
summary: Routed frames for protocols without an assigned NLPID use NLPID=0x80, OUI=0x00-00-00, and a 2-octet EtherType. Protocols with an assigned NLPID (e.g., IP at 0xCC, CLNP at 0x81) omit the SNAP header, saving 48 bits.
section: "7.1"
