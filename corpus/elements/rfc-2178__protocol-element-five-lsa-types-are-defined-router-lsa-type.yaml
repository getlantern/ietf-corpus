document: rfc-2178
kind: protocol-element
summary: 'Five LSA types are defined: Router-LSA (Type 1, originated by every router describing its links), Network-LSA (Type 2, originated by the Designated Router), Summary-LSA (Types 3 and 4, originated by area border routers), and AS-external-LSA (Type 5, originated by AS boundary routers for external routes).'
section: 12.1.3
