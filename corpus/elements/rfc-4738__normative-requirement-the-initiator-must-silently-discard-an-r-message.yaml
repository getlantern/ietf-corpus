document: rfc-4738
kind: normative-requirement
summary: The Initiator MUST silently discard an R_MESSAGE that contains a RAND payload if the I_MESSAGE contained a RAND payload. Similarly, if I_MESSAGE did not contain RAND, an R_MESSAGE without RAND MUST be silently discarded.
section: "3.7"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
