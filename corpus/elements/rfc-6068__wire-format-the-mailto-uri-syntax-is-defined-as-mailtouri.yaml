document: rfc-6068
kind: wire-format
summary: 'The ''mailto'' URI syntax is defined as: mailtoURI = "mailto:" [ to ] [ hfields ], where to is one or more comma-separated addr-spec values, and hfields are key=value pairs separated by ''&'' and introduced by ''?''. The addr-spec is local-part "@" domain, with local-part being dot-atom-text or quoted-string.'
section: "2"
