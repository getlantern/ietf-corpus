document: rfc-3551
kind: normative-requirement
summary: RTP packets SHALL contain a whole number of audio frames, with frames inserted in age order so the oldest frame (played first) appears immediately after the RTP header. The RTP timestamp reflects the first sample of the first frame.
section: "4.4"
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
