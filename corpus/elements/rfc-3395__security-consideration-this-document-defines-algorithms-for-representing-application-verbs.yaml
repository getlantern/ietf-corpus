document: rfc-3395
kind: security-consideration
summary: This document defines algorithms for representing application verbs in RMON Protocol Identifiers and does not itself introduce new security risks. However, MIB collections using verb-level Protocol Identifiers may expose which application protocol verbs are in use on a network, requiring additional protection considerations by MIB designers.
section: "10"
topics:
    - security
    - snmp
