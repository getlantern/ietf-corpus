document: rfc-3034
kind: protocol-element
summary: An egress FR-LSR pops the label stack. If the popped label is the last, the network layer protocol must be inferred from the label value (since null encapsulation carries no explicit protocol field). If it is not the last label, the previous top-level MPLS TTL is propagated to the new top entry.
section: "5.7"
topics:
