document: rfc-4970
kind: protocol-element
summary: The OSPF Router Information (RI) LSA is a new LSA type for advertising optional router capabilities. In OSPFv2 it uses Opaque LSA type 4 with Opaque ID 0; in OSPFv3 it uses LSA function code 12. It can be advertised at link, area, or AS flooding scope.
