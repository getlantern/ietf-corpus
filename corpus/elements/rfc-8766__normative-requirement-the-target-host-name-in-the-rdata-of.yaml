document: rfc-8766
kind: normative-requirement
summary: The target host name in the RDATA of an NS record MUST NOT reference a name that falls within any zone delegated to a Discovery Proxy, to avoid inadvertent conflict with Multicast DNS host names owned by devices on the local link.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
