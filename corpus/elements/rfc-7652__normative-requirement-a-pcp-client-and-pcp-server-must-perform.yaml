document: rfc-7652
kind: normative-requirement
summary: A PCP client and PCP server MUST perform a key-generating EAP method. Specifically, implementations MUST support EAP-TTLS (RFC 5281) and SHOULD support TEAP (RFC 7170).
section: 3.1.3
rfc2119_level: MUST
topics:
