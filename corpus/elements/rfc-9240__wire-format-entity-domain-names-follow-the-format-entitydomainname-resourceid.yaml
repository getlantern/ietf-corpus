document: rfc-9240
kind: wire-format
summary: 'Entity domain names follow the format: EntityDomainName ::= [ [ ResourceID ] ''.'' ] EntityDomainType. Resource-specific names use ''resourceID.domainType'' (e.g., ''netmap1.pid''), resource-agnostic names are the domain type alone (e.g., ''ipv4''), and self-defined names use ''.domainType''. The ''.'' separator is prohibited within EntityDomainType.'
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
