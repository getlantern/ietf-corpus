document: rfc-8259
kind: interoperability-note
summary: Numbers representable as IEEE 754 binary64 (double precision) integers in the range [-(2**53)+1, (2**53)-1] are interoperable — all implementations will agree exactly on their numeric values. Numbers outside this range or with extreme precision may cause interoperability problems.
