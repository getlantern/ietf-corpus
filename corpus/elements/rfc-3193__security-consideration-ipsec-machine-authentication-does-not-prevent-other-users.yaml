document: rfc-3193
kind: security-consideration
summary: IPsec machine authentication does not prevent other users on a multi-user machine from using the L2TP tunnel, since only the machine identity is verified per-packet. User-level IPsec authentication or strict tunnel isolation is needed to enforce per-user traffic segregation.
section: 5.1.1
topics:
    - ipsec
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
