document: rfc-2821
kind: normative-requirement
summary: Only resolvable fully-qualified domain names (FQDNs) are permitted when domain names are used in SMTP. Local nicknames or unqualified names MUST NOT be used. The domain name in EHLO MUST be either a primary host name (resolving to an A RR) or an address literal.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
