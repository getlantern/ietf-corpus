document: rfc-7638
kind: security-consideration
summary: JWK Thumbprint values uniquely identify a key only if a single unambiguous JWK representation is defined and used; implementations must validate correct key representation (e.g., canonical base64url encoding) or different thumbprints may result for the same effective key.
