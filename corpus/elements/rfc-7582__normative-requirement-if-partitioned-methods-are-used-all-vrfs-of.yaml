document: rfc-7582
kind: normative-requirement
summary: If Partitioned Methods are used, all VRFs of a single MVPN MUST all use the Flat Partitioned Method or all use the Hierarchical Partitioned Method; mixing the two variants within one MVPN is not allowed.
