document: rfc-9024
kind: protocol-element
summary: DetNet edge nodes (T-PE) sit at the boundary of the DetNet domain and are responsible for mapping non-DetNet-aware L2 TSN traffic to DetNet services, as well as imposing and disposing the required DetNet encapsulation. They function similarly to PW T-PE nodes using MPLS-TE LSPs.
