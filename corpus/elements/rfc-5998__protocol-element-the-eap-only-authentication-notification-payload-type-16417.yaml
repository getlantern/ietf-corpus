document: rfc-5998
kind: protocol-element
summary: The EAP_ONLY_AUTHENTICATION notification payload (type 16417) is sent by the initiator in message 3 (first IKE_AUTH request) to signal that it does not wish to use public-key-based responder authentication. The Protocol ID and SPI size fields are set to zero, and there is no additional data.
