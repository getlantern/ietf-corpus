document: rfc-7459
kind: normative-requirement
summary: If a PIDF-LO does not include the confidence element, the confidence of the location estimate is 95%, as defined in RFC 5491. This default ensures consistent interoperability with systems unaware of the confidence element.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
