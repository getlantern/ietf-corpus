kind: protocol-element
summary: The LFBLoad component (ID 2) is a write-only variable-size table of LCRowtype entries; adding a row instructs the FE to load a new LFB class, and removing a row unloads it, thereby altering the SupportedLFBs capabilities of the FEObject LFB.
