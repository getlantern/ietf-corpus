document: rfc-8618
kind: wire-format
summary: 'StorageHints is a map of four mandatory unsigned integers encoding which optional fields are omitted: ''query-response-hints'' (18 bits, covering time-offset through response-additional-sections), ''query-response-signature-hints'' (17 bits), ''rr-hints'' (2 bits for ttl and rdata-index), and ''other-data-hints'' (2 bits for malformed-messages and address-event-counts). An unset bit means that field is omitted.'
section: 7.3.1.1.1.1
topics:
