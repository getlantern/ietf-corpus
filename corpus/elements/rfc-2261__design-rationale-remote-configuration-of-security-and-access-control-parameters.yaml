document: rfc-2261
kind: design-rationale
summary: Remote configuration of security and access control parameters is a design requirement because the Security and Access Control Subsystems introduce a large set of configuration parameters, including secrets that must be changed frequently. Without remote configuration capability, deployment in large operational environments would be impractical.
section: "1.5"
topics:
    - snmp
    - security
