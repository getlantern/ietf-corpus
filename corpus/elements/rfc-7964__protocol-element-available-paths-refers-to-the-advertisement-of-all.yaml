document: rfc-7964
kind: protocol-element
summary: '''Available Paths'' refers to the advertisement of all available paths for an address prefix by a route reflector or confederation ASBR. This approach yields the same routing information and consistency as a full IBGP mesh and eliminates MED-induced oscillations entirely.'
