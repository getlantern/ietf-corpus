document: rfc-9616
kind: security-consideration
summary: Broadcasting a reasonably accurate local clock value in Hello and IHU TLVs may make a node more susceptible to timing attacks. An attacker with access to accurate timestamps could potentially determine the physical location of a node.
section: "8"
topics:
    - security
    - routing
