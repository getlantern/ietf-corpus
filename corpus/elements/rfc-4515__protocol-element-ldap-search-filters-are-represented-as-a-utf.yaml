summary: LDAP search filters are represented as a UTF-8 encoded Unicode string using prefix notation with parenthesized expressions. The grammar supports and (&), or (|), not (!), equality, substring, presence, approximate match, greater-or-equal, less-or-equal, and extensible match filter types.
