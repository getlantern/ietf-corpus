document: rfc-5778
kind: normative-requirement
summary: When the MIP6-Auth-Mode AVP is set to MIP6_AUTH_MN_AAA, the Auth-Request-Type AVP MUST be set to AUTHORIZE_AUTHENTICATE. If the Diameter server does not support the proposed mode, it MUST fail authentication and MUST set Result-Code to DIAMETER_ERROR_MIP6_AUTH_MODE.
section: "6.20"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
