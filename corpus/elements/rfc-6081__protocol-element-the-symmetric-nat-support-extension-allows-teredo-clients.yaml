document: rfc-6081
kind: protocol-element
summary: The Symmetric NAT Support Extension allows Teredo clients behind symmetric NATs to obtain a Teredo IPv6 address and communicate with peers behind cone or address-restricted NATs, overriding RFC 4380's guidance to go offline when a symmetric NAT is detected.
