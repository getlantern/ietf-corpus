document: rfc-8658
kind: normative-requirement
summary: The Softwire46-Multicast Attribute MUST include ASM-Prefix64 or SSM-Prefix64 (or both). U-Prefix64 MUST be present when SSM-Prefix64 is present; U-Prefix64 MAY be present when only ASM-Prefix64 is present.
