document: rfc-3344
kind: normative-requirement
summary: After booting, an agent MUST use sequence number 0 for its first Agent Advertisement; each subsequent advertisement MUST use the next higher value, except that sequence number 0xffff MUST be followed by 256 (not 0), allowing mobile nodes to distinguish reboot resets from rollover.
section: 2.3.2
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
