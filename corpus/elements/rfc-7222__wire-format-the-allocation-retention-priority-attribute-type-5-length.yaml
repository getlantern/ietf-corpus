document: rfc-7222
kind: wire-format
summary: 'The Allocation-Retention-Priority attribute (Type 5, Length 2) packs Priority-Level (PL, 4-bit, values 1-15 where 1 is highest priority), Preemption-Capability (PC, 2-bit: Enabled=0/Disabled=1), and Preemption-Vulnerability (PV, 2-bit: Enabled=0/Disabled=1) into the last 8 bits preceded by an 8-bit Reserved field.'
