document: rfc-8994
kind: security-consideration
summary: The ACP provides hop-by-hop authentication, integrity protection, and confidentiality for all ACP traffic independently of the data plane. Even if the data plane is compromised or misconfigured, ACP connectivity and its security guarantees are maintained as long as a physical path exists between ACP nodes and their certificates remain valid.
