document: rfc-3588
kind: state-machine
summary: 'The Accounting Session State Machine (Section 8.2) has states: Idle, Pending-S, Pending-E, Pending-B, Open, and Pending-I. Transitions are driven by application accounting events (START, INTERIM, STOP, EVENT), ACR/ACA exchanges, timer expirations, and success or failure responses from the accounting server.'
section: "8.2"
