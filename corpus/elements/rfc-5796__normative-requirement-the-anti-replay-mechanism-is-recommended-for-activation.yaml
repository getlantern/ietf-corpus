document: rfc-5796
kind: normative-requirement
summary: The anti-replay mechanism is RECOMMENDED for activation only when SAs are assigned using automated key management. If manual key management is used, anti-replay SHOULD NOT be activated. If a router restarts, the sequence-number counter MUST be correctly maintained across reboots until the key is replaced.
section: "12"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
