document: rfc-3545
kind: normative-requirement
summary: When compression is done over a lossy link with long round trip delay, the compressor MAY choose to always send absolute values and never delta values using COMPRESSED_UDP packets with F=1 and any of S, T, I as necessary.
section: "2.1"
rfc2119_level: MAY
topics:
