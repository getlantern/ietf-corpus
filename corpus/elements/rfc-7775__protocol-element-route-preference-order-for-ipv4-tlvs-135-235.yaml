document: rfc-7775
kind: protocol-element
summary: 'Route preference order for IPv4 (TLVs 135/235): (1) L1 intra-area and L1 external; (2) L2 intra-area, L2 external, L1->L2 inter-area, L2->L2 inter-area; (3) L2->L1 inter-area and L1->L1 inter-area. All types within the same preference level are treated equally.'
section: "3.3"
topics:
    - routing
    - ip
