document: rfc-3578
kind: normative-requirement
summary: A media stream corresponding to a response to an INVITE with a greater number of digits should be given more priority than media streams from responses with fewer digits, as the more-digit response is more likely to be semantically relevant to the caller.
section: "3.3"
rfc2119_level: SHOULD
topics:
