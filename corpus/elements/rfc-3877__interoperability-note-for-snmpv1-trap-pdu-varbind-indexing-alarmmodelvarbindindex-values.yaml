document: rfc-3877
kind: interoperability-note
summary: For SNMPv1 Trap-PDU varbind indexing, alarmModelVarbindIndex values must be adjusted by two relative to the trap's SMI definition because the InformRequest-PDU and SNMPv2-Trap-PDU prepend sysUpTime.0 and snmpTrapOID.0 as obligatory varbinds. RFC 3584 section 3.1 rules are used to synthesise these values for SNMPv1 traps.
section: "3.6"
topics:
    - snmp
