document: rfc-1116
kind: design-rationale
summary: Linemode reduces network traffic to a few packets per command line instead of per character, benefiting long-delay networks with local response time and reducing costs on per-packet-charged networks. Supercomputers that handle single-character input poorly benefit from offloading character processing to the client.
section: "4"
