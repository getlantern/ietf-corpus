document: rfc-4236
kind: normative-requirement
summary: Unless explicitly configured to do otherwise, an OPES processor MUST offer all non-auxiliary original parts in Negotiation Offer (NO) messages. This prevents security flaws from selectively adapting only certain message types.
section: 3.2.1
rfc2119_level: MUST
topics:
