document: rfc-9097
kind: protocol-element
summary: 'The feedback timer FT (default 50 msec) controls how frequently the Receiver sends status feedback to the Sender. Recommended default thresholds: 10 sequence errors, 30 msec low delay threshold, 90 msec upper delay threshold. The feedback message timeout defaults to L*FT with L=20 (1 second); load packet timeout defaults to 1 second.'
