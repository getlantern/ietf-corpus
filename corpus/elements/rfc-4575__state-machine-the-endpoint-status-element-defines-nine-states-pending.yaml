document: rfc-4575
kind: state-machine
summary: 'The <endpoint> <status> element defines nine states: pending, dialing-out, dialing-in, alerting, on-hold, connected, muted-via-focus, disconnecting, disconnected. Transitions are driven by call signaling events (INVITE, BYE, 486, moderator action, etc.).'
section: 5.7.3
topics:
