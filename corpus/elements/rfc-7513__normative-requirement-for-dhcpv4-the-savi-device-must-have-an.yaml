document: rfc-7513
kind: normative-requirement
summary: For DHCPv4, the SAVI device MUST have an IPv4 address. For DHCPv6, the SAVI device MUST have a link-local address, and when the DHCPv6 server is not on the same link, MUST also have an IPv6 address of at least the same scope as the server.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
