document: rfc-7670
kind: wire-format
summary: For ECDSA keys, the SubjectPublicKeyInfo BIT STRING begins with 0x00 (no unused bits) followed by 0x04 (uncompressed point format per RFC 5480), then the X and Y coordinates. The full SubjectPublicKeyInfo includes OIDs for id-ecPublicKey and the named curve.
