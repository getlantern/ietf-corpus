document: rfc-5840
kind: normative-requirement
summary: The Padding Present (P) bit MUST be used with IPv6 to preserve 8-octet alignment. This padding MUST NOT be used with IPv4, as 4-octet IPv4 alignment is already satisfied without it.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - ip
