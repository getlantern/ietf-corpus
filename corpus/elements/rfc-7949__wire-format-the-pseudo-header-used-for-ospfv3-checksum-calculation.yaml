document: rfc-7949
kind: wire-format
summary: 'The pseudo-header used for OSPFv3 checksum calculation over IPv4 contains: 32-bit IPv4 source address, 32-bit IPv4 destination address, 8-bit zero pad, 8-bit Protocol field (89), and 16-bit OSPFv3 packet length from the OSPFv3 header. This format mirrors the UDP pseudo-header defined in RFC 768.'
section: "3.3"
topics:
    - routing
    - ip
