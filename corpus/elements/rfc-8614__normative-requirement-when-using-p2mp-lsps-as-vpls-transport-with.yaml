document: rfc-8614
kind: normative-requirement
summary: 'When using P2MP LSPs as VPLS transport with mixed CW support, a source PE that supports CW MUST set up two different P2MP LSPs: one transporting CW-marked frames to PEs that advertised C-bit=1, and another transporting frames without CW to PEs that advertised C-bit=0.'
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
