document: rfc-8964
kind: normative-requirement
summary: Changes to an LSP supporting DetNet MUST be loop-free. A transient forwarding loop would cause replicated packets to amplify the loop, and while TTL in the S-Label would eventually terminate packets, the latency impact on DetNet applications would be severe.
section: "4.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
