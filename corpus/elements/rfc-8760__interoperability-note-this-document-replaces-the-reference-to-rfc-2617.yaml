document: rfc-8760
kind: interoperability-note
summary: This document replaces the reference to RFC 2617 (obsolete) in RFC 3261 with RFC 7616 for Digest Access Authentication, while maintaining backward compatibility. The HTTP Digest rules apply to SIP with 'HTTP/1.1' replaced by 'SIP/2.0' and several SIP-specific modifications.
section: "2.6"
