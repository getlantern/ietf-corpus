document: rfc-3850
kind: normative-requirement
summary: 'The email address SHOULD be in the subjectAltName extension and SHOULD NOT be in the subject distinguished name. Receiving agents MUST recognize email addresses in both the subjectAltName field and in the PKCS #9 emailAddress attribute, which MUST be encoded as IA5String.'
section: "3"
rfc2119_level: MUST
topics:
    - email
    - pkix
