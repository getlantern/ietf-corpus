document: rfc-9930
kind: normative-requirement
summary: Peers implementing TEAP MUST NOT accept a cleartext EAP Success or Failure packet prior to the peer and server reaching synchronized protected result indication. The received cleartext EAP Success or Failure MUST match the status conveyed in the protected Result TLV.
section: 3.6.6
rfc2119_level: MUST NOT
topics:
    - security
