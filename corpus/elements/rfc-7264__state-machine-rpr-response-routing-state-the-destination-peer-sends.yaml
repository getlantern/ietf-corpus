document: rfc-7264
kind: state-machine
summary: 'RPR response routing state: the destination peer sends the response directly to the relay peer''s IpAddressPort; the relay peer receives the response, readjusts the destination_list, and forwards to the sending peer via the existing connection. If RPR fails or times out, the state transitions to SRR fallback.'
