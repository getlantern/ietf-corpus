document: rfc-7981
kind: normative-requirement
summary: Wherever possible, an implementation SHOULD advertise updates to an IS-IS Router CAPABILITY TLV in the same LSP fragment as the advertisement it replaces. Where not possible, the two affected LSP fragments should be flooded as an atomic action.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
