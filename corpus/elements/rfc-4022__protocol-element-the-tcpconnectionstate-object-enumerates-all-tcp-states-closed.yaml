summary: The tcpConnectionState object enumerates all TCP states (closed, listen, synSent, synReceived, established, finWait1, finWait2, closeWait, lastAck, closing, timeWait, deleteTCB) and is read-write; the only writable value is deleteTCB(12), which immediately terminates the connection.
