document: rfc-6876
kind: wire-format
summary: 'Every PT-TLS message begins with a 16-byte header: Reserved (8 bits), Message Type Vendor ID (24 bits, SMI PEN), Message Type (32 bits), Message Length (32 bits, total including header, minimum 16), and Message Identifier (32 bits, monotonically increasing per sender). The Message Value field follows and carries the payload (e.g., a PB-TNC batch).'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
