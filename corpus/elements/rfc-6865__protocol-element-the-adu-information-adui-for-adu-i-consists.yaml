document: rfc-6865
kind: protocol-element
summary: The ADU Information (ADUI) for ADU i consists of a 1-byte Flow ID (F[i]), a 2-byte Length field (L[i]) in network byte order, the ADU payload, and zero padding (Pad[i]) to align to exactly E bytes. Each ADUI is exactly one source symbol; the F[i], L[i], and Pad[i] fields are never transmitted over the network.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
