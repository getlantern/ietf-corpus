document: rfc-6059
kind: normative-requirement
summary: When a RA creates or modifies an SDAT entry and the RA is protected by SEND, the S-Flag MUST be set to 1 in the corresponding SDAT entries. The host MUST add an SDAT entry for each address configured from autoconfigurable prefixes in the RA, each pre-existing address from those prefixes, and each DHCPv6 address known to be operable.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
