document: rfc-9722
kind: normative-requirement
summary: When multiple concurrent DF elections occur (multiple recovering PEs each advertising an SCT), all PEs SHALL execute only a single DF election at the service carving time corresponding to the largest (latest) received SCT timestamp value.
section: "3.1"
rfc2119_level: SHALL
topics:
    - routing
    - mpls
