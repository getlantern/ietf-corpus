document: rfc-3296
kind: design-rationale
summary: Knowledge information (referral objects) was introduced to generalize server-linking beyond the X.500 use case, enabling arbitrary LDAP directories to link services together without requiring a full X.500 DSA topology. Other forms of knowledge information (e.g., superior references, replication) are left to future documents.
