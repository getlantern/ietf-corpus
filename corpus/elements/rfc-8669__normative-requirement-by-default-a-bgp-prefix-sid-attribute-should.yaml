document: rfc-8669
kind: normative-requirement
summary: By default, a BGP Prefix-SID attribute SHOULD NOT be attached to a prefix and advertised; BGP Prefix-SID advertisement SHOULD require explicit operator enablement. Propagation to other ASes MUST be explicitly configured.
