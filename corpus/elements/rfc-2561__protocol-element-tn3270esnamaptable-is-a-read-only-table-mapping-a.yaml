document: rfc-2561
kind: protocol-element
summary: tn3270eSnaMapTable is a read-only table mapping a secondary LU's SSCP-supplied SNA network name to its local name at the TN3270E server. Entries are created on receipt of an ACTLU request and deleted when the SLU is deactivated.
section: 3.3.1
extracted_by: claude-sonnet-4-6
