document: rfc-5265
kind: normative-requirement
summary: The MN MUST NOT skip the VPN (IPsec) layer for security reasons when in access modes 'cvc' or 'fvc', even though the MN could in principle use triangular routing to bypass the inner MIPv4 layer.
section: "2.3"
rfc2119_level: MUST NOT
topics:
