summary: 'Four message types are defined: Echo Request (type 81 / ASCII ''Q''), Echo Reply (type 65 / ASCII ''A''), Init (type 73 / ASCII ''I''), and Server Response (type 83 / ASCII ''S''). Message types 254–255 are reserved for experimental use; types 0–253 require IANA registration.'
