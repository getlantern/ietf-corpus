document: rfc-9528
kind: registry
summary: IANA created the EDHOC Cipher Suites Registry with integer labels for predefined suites (0–6, 24–25), each specifying AEAD, hash, MAC length, key exchange, signature, and application algorithms. Private suites use labels -24, -23, -22, -21.
