document: rfc-5428
kind: protocol-element
summary: The pktcEventClassTable allows MTA manufacturers to group management events into named categories (event classes) with a common enable/disable status and severity mask. Any event associated with an event class MUST also appear in pktcEventTable, and entries persist across resets and reboots.
