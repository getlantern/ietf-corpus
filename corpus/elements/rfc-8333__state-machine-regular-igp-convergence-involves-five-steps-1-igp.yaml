document: rfc-8333
kind: state-machine
summary: 'Regular IGP convergence involves five steps: (1) IGP notified of up/down event, (2) reaction postponed for LSP_GEN_TIMER ms, (3) upon expiry LSP/LSA is updated and flooded, (4) SPF scheduled with SPF_DELAY, (5) upon SPF_DELAY expiry SPF is computed and RIB/FIB updated.'
section: "5.2"
