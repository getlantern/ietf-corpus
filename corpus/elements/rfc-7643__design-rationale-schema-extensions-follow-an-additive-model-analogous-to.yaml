document: rfc-7643
kind: design-rationale
summary: Schema extensions follow an additive model analogous to LDAP auxiliary object classes, with no inheritance. This means each schema extension URI in 'schemas' adds attributes without overriding the base schema, avoiding the complexity of an inheritance hierarchy.
