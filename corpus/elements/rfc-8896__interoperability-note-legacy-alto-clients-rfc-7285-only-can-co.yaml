document: rfc-8896
kind: interoperability-note
summary: 'Legacy ALTO Clients (RFC 7285 only) can co-exist with Calendar-aware Servers because: unknown fields in JSON objects MUST be ignored per RFC 7285 Section 8.3.7, and Calendar resources require POST, so a legacy Client using GET on a full cost map will never receive Calendar arrays it cannot interpret.'
section: 3.3.2
topics:
    - http
    - json
