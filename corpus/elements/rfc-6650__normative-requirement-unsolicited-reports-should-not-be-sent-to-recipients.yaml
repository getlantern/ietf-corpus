document: rfc-6650
kind: normative-requirement
summary: Unsolicited reports SHOULD NOT be sent to recipients that are uninvolved or only peripherally involved; they should go to parties both responsible for the messages and able to act on them.
section: "5.3"
rfc2119_level: SHOULD NOT
