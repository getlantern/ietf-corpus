document: rfc-8206
kind: protocol-element
summary: 'The double-signing technique: each routing update exchanged with an eBGP neighbor still using the old ASN is signed twice — once with the ASN to be hidden (pCount=0) and once with the ASN that will remain visible (pCount=1). This simulates an internal BGP hop between the two ASNs without requiring an actual eBGP session.'
section: "5"
topics:
