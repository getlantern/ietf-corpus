document: rfc-7555
kind: normative-requirement
summary: An MPLS Proxy Ping Request MUST contain a Proxy Echo Parameters TLV. The Destination IP Address in that TLV MUST be from the range 127/8 for IPv4 or ::ffff:7f00:0/104 for IPv6.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
