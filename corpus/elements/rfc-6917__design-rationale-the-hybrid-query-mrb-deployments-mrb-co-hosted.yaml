document: rfc-6917
kind: design-rationale
summary: The Hybrid Query MRB deployments (MRB co-hosted on an AS or on a single MS) are explicitly supported to accommodate environments where a dedicated MRB entity is operationally undesirable. When co-hosted on the MS, the topology suits a single MS acting as a front-end for a cluster, with the Publish interface collapsing internally.
section: 4.1.1
topics:
