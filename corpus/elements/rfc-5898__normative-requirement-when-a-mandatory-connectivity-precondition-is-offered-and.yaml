document: rfc-5898
kind: normative-requirement
summary: When a mandatory connectivity precondition is offered and the answerer cannot satisfy it (e.g., no parameters enable connectivity verification without media cut-through), the offer MUST be rejected as per RFC 3312.
section: "3.5"
rfc2119_level: MUST
topics:
