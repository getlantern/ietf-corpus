document: rfc-4704
kind: security-consideration
summary: Proper conflict resolution is critical; implementers MUST consider how name conflicts will be prevented, either through security tokens restricting which updaters may modify a given name, address-based FQDN assignment, or a name conflict resolution technique per RFC 4703.
