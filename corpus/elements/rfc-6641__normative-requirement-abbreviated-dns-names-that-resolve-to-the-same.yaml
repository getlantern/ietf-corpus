document: rfc-6641
kind: normative-requirement
summary: Abbreviated DNS names that resolve to the same SRV RRs as their fully qualified counterparts SHOULD be represented in the client's namespace cache as symbolic links pointing to the fully qualified name, so that getcwd()-style paths remain universally usable.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - dns
