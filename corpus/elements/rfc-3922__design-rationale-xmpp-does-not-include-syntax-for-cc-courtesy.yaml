document: rfc-3922
kind: design-rationale
summary: XMPP does not include syntax for 'cc' (courtesy copy), 'DateTime', or 'Subject' headers found in 'Message/CPIM' objects. Rather than inventing XMPP extensions, the gateway is instructed to SHOULD NOT pass these headers through, reflecting the deliberate scoping of this memo to core protocol elements only.
section: 4.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
