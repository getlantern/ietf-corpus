document: rfc-8049
kind: normative-requirement
summary: If a parameter is configured at both the site level and the site-network-access level, the access-level parameter MUST override the site-level parameter. This inheritance rule applies to routing, service, and security parameters.
section: 6.3.2.3
rfc2119_level: MUST
