summary: 'The IANA Registration Template is an XML chunk containing elements: <class>, <type>, <subtype>, <urischeme> (one per URI scheme), <functionalspec>, <security>, <usage>, <registrationdocs>, <requesters>, and optionally <additionalinfo>. A separate template is required per Subtype.'
