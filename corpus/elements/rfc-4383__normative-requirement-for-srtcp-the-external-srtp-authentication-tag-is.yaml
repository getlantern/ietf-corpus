document: rfc-4383
kind: normative-requirement
summary: For SRTCP, the external SRTP authentication tag is MANDATORY when TESLA is used (the E-bit, SRTCP index, and authentication tag are mandatory in SRTCP). The TESLA authentication extension SHALL be inserted before the MKI and authentication tag in the SRTCP packet.
section: "4.5"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
    - security
