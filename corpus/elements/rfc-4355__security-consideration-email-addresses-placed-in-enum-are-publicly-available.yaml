document: rfc-4355
kind: security-consideration
summary: Email addresses placed in ENUM are publicly available to all DNS inquirers. Subscribers should be made aware that ENUM records are open to the public, and that email addresses may allow inference of private data such as first and last name.
section: "6"
topics:
