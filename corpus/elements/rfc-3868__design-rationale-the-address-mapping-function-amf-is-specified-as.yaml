document: rfc-3868
kind: design-rationale
summary: The Address Mapping Function (AMF) is specified as implementation-dependent (local tables, DNS, LDAP, etc.) rather than mandated, because address resolution mechanisms vary widely across deployments and standardizing one mechanism would unnecessarily constrain implementations.
section: "1.5"
topics:
    - dns
    - ldap
