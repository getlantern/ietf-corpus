document: rfc-2243
kind: normative-requirement
summary: Upon successful re-initialization, a server MUST store the new OTP as the last successful OTP received, and the sequence number in the next challenge MUST be one less than the sequence number specified in the new-params field.
section: "4.2"
rfc2119_level: MUST
