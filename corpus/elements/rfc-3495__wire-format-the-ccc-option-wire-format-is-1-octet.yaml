document: rfc-3495
kind: wire-format
summary: 'The CCC option wire format is: 1-octet code (122), 1-octet length, followed by N octets of sub-option content. Sub-options are themselves TLV-encoded: 1-octet sub-option code, 1-octet length, followed by sub-option data.'
