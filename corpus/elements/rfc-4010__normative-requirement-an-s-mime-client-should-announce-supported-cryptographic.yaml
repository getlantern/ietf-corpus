document: rfc-4010
kind: normative-requirement
summary: An S/MIME client SHOULD announce supported cryptographic functions via the SMIMECapabilities attribute, which MUST be signed by the client. OIDs SHOULD be logically separated by functional category and MUST be ordered by preference.
