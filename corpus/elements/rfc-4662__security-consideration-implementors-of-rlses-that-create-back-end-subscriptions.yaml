document: rfc-4662
kind: security-consideration
summary: Implementors of RLSes that create back-end subscriptions MUST implement safeguards to prevent circular list nesting from creating an infinite loop of subscriptions. Applying filters to back-end subscriptions is one effective mitigation approach.
section: "7.4"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
