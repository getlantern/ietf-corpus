document: rfc-7761
kind: state-machine
summary: The downstream per-interface (*,G) Join/Prune state machine has states NoInfo (NI), Join (J), and Prune-Pending (PP). Receiving a Join moves NI or PP to J; receiving a Prune while in J moves to PP, starting the Prune-Pending Timer; if no Join override arrives before the timer expires, the state moves to NI.
section: 4.5.1
topics:
    - multicast
    - routing
