document: rfc-3591
kind: protocol-element
summary: For the OTSn/OMSn layer, ifOperStatus is set to notPresent(6) if a component is missing; otherwise it is set to down(2) if either optIfOTSnCurrentStatus or optIfOMSnCurrentStatus indicates any defect. The value lowerLayerDown(7) is not used since there is no lower layer interface for OTS.
section: "2.2"
topics:
