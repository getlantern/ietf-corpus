document: rfc-8075
kind: normative-requirement
summary: CoAP diagnostic payloads SHOULD be copied into the HTTP response body with Content-Type 'text/plain;charset=utf-8'. They MUST NOT be copied into the HTTP reason-phrase, as they may contain CR-LF characters incompatible with HTTP reason-phrase syntax.
section: "6.6"
rfc2119_level: SHOULD
topics:
    - http
