document: rfc-2829
kind: normative-requirement
summary: Implementations providing password-based authenticated access MUST support authentication using the DIGEST-MD5 SASL mechanism. This provides client authentication with protection against passive eavesdropping attacks but does not protect against active intermediary attacks.
section: "4"
rfc2119_level: MUST
topics:
    - ldap
    - security
