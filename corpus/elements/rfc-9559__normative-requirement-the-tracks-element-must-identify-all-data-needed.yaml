document: rfc-9559
kind: normative-requirement
summary: The Tracks element MUST identify all data needed by each codec to decode the track. CodecID MUST be present for all tracks as the primary codec identifier. Additional codec initialization data is carried in CodecPrivate.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
