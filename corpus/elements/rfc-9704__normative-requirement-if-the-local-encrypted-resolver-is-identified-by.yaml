document: rfc-9704
kind: normative-requirement
summary: If the local encrypted resolver is identified by name (e.g., using DNR), that identifying name MUST be the name used in any corresponding authorization claim; otherwise the resolver MUST present a validatable certificate with a matching subjectAltName.
section: "5"
rfc2119_level: MUST
