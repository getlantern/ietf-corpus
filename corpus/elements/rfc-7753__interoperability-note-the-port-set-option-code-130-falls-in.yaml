document: rfc-7753
kind: interoperability-note
summary: The PORT_SET option code 130 falls in the 'optional to process' range (128–191). A PCP server that does not support PORT_SET will silently ignore the option and process the request as a plain single-port MAP request, ensuring backward compatibility.
