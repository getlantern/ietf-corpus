document: rfc-9842
kind: design-rationale
summary: The 'Available-Dictionary' header carries only a single hash for the best matching dictionary rather than advertising all available dictionaries. This limits request header overhead and simplifies server-side selection logic while preserving the client's ability to choose the most relevant match.
section: "2.2"
topics:
    - http
