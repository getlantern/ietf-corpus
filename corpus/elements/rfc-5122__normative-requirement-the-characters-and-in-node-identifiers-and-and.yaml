document: rfc-5122
kind: normative-requirement
summary: The characters "#" and "?" in node identifiers, and "/", "?", "#", "@", and space in resource identifiers, MUST be percent-encoded when transforming an XMPP address into an XMPP IRI because these characters serve as delimiters in IRI syntax.
section: 2.7.2
rfc2119_level: MUST
topics:
    - realtime
