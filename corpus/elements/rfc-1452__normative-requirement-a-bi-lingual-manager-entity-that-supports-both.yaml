document: rfc-1452
kind: normative-requirement
summary: A bi-lingual manager entity that supports both SNMPv1 and SNMPv2 must consult a local database to select the correct protocol when contacting an agent, and must map operations as if acting as a proxy agent to provide transparency to management applications.
