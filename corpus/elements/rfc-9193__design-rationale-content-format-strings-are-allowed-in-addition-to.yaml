document: rfc-9193
kind: design-rationale
summary: Content-Format-Strings are allowed in addition to CoAP Content-Format numbers because some Internet media types and their content coding/parameter combinations do not have assigned CoAP Content-Format numbers. This avoids requiring CoAP registry coverage as a prerequisite.
