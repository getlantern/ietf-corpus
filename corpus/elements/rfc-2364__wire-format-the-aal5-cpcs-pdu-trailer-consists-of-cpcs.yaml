summary: The AAL5 CPCS-PDU trailer consists of CPCS-UU (1 octet), CPI (1 octet), Length (2 octets indicating payload length up to 65535 octets), and CRC (4 octets protecting the entire CPCS-PDU). A PAD field of 0–47 octets aligns the PDU to ATM cell boundaries.
