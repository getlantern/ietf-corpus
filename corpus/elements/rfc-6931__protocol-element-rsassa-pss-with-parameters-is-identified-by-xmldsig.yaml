document: rfc-6931
kind: protocol-element
summary: RSASSA-PSS with parameters is identified by 'xmldsig-more#rsa-pss' and 'xmldsig-more#MGF1'. It takes DigestMethod, MaskGenerationFunction, SaltLength, and TrailerField as explicit XML parameters via the RSAPSSParams schema element in the SignatureMethod content.
