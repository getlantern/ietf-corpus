document: rfc-7155
kind: wire-format
summary: 'The QoSFilterRule is an OctetString-derived format using US-ASCII with the syntax: ''action dir proto from src to dst [options]''; actions are ''tag'' (set DSCP) or ''meter'' (assured forwarding). First matched rule wins; unmatched packets are treated as best effort.'
