document: rfc-5577
kind: normative-requirement
summary: All G.722.1 frames within a single RTP packet MUST be of the same length and sampled at the same clock rate, with the same bit rate (octets per frame). Frames MUST NOT be split between RTP packets.
section: "3.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
