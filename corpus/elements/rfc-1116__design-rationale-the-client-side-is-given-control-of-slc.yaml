document: rfc-1116
kind: design-rationale
summary: 'The client side is given control of SLC special character settings because the user''s view is always through the local terminal: local special characters should apply. A full-featured client exports its settings; a thin client (e.g., terminal server) imports from the server via SLC 0 SLC_DEFAULT 0.'
