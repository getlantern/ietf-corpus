document: rfc-6132
kind: security-consideration
summary: A large burst of messages arriving simultaneously and processed by presence-testing Sieve scripts could put unexpectedly heavy load on a shared presence server. Implementations might consider providing options for rate limiting or caching presence tests across Sieve script instances, while respecting access controls.
section: "4"
topics:
    - security
    - email
