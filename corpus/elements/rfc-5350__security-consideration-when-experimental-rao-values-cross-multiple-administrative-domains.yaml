document: rfc-5350
kind: security-consideration
summary: When experimental RAO values cross multiple administrative domains, experimenters must assume that the same values may be used simultaneously by other experiments, creating a risk of interference. Network administrators within a single domain should ensure consistent use of each experimental value to avoid intra-domain interference.
section: "4"
topics:
