document: rfc-9048
kind: normative-requirement
summary: SUPI MUST NOT be communicated in EAP-AKA' messages when authenticating to a 5G network; its use is only internal (as key derivation input). When SUCI is used in EAP-AKA', its format MUST be as specified in 3GPP TS 23.003 Section 28.7.3.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
