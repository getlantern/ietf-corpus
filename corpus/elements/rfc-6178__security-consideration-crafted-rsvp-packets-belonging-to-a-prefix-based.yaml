document: rfc-6178
kind: security-consideration
summary: Crafted RSVP packets belonging to a prefix-based FEC that bypass MPLS encapsulation can allow an attacker to build RSVP soft-states on downstream LSRs, leading to theft of service or DoS caused by locking up LSR resources.
