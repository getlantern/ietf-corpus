document: rfc-2865
kind: wire-format
summary: The RADIUS packet format consists of a 1-octet Code, 1-octet Identifier, 2-octet Length, 16-octet Authenticator, and variable-length Attributes field. The minimum packet length is 20 and maximum is 4096 octets. One RADIUS packet is encapsulated per UDP datagram on destination port 1812.
section: "3"
topics:
