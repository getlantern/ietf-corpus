document: rfc-7121
kind: protocol-element
summary: The FE Protocol Object (FEPO) LFB carries HA parameters including CEID (current master CE), BackupCEs (table of backup CEs), FEHI (FE Heartbeat Interval), CEHDI (CE Heartbeat Dead Interval), CEFailoverPolicy, and CEFTI (CE Failover Timeout Interval). These components govern CE failure detection and failover behavior.
