document: rfc-7513
kind: design-rationale
summary: 'The SAVI perimeter is designed primarily for scalability: each SAVI device only establishes bindings for directly or indirectly attached clients and only validates source addresses on traffic from those clients, rather than checking all traffic passing through the network.'
