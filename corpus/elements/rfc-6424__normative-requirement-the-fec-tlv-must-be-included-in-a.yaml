document: rfc-6424
kind: normative-requirement
summary: The FEC TLV MUST be included in a FEC Stack Change sub-TLV when the operation type is PUSH; it MAY be included when the operation type is POP. A Nil FEC MAY be associated with a PUSH operation to hide FEC details.
section: 3.3.1.3
rfc2119_level: MUST
topics:
    - mpls
