document: rfc-5155
kind: protocol-element
summary: 'The Closest Encloser Proof consists of up to two NSEC3 RRs: one that matches the closest (provable) encloser of QNAME, and one that covers the ''next closer'' name. Together they prove that the closest encloser exists and that QNAME (and all intermediate ancestors) does not.'
section: 7.2.1
topics:
    - dns
    - security
