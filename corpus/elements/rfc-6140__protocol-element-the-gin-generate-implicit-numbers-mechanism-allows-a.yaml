document: rfc-6140
kind: protocol-element
summary: The GIN (Generate Implicit Numbers) mechanism allows a SIP-PBX to register with an SSP for multiple phone-number AORs using a single REGISTER request containing a specially formatted Contact URI with the 'bnc' (bulk number contact) parameter. The registrar expands this single registration into one AOR-to-Contact mapping per assigned E.164 number.
section: "4"
topics:
    - sip
    - realtime
