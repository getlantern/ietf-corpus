document: rfc-3747
kind: normative-requirement
summary: It is RECOMMENDED that all entries comprising the configuration started by diffServConfigStart follow the same StorageType as the diffServConfigEntry row. Mismatched storage types can cause configuration divergence after agent reboots, and the management application should verify the correct configuration after a reboot.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - diffserv
    - snmp
