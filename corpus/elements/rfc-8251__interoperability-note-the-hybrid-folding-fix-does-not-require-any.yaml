document: rfc-8251
kind: interoperability-note
summary: The hybrid folding fix does not require any special encoder behavior; a decoder implementing the fix will produce better output regardless of how the bitstream was encoded. There is no way for an encoder using the old behavior to achieve better quality than the updated decoder.
section: "9"
extracted_by: claude-sonnet-4-6
