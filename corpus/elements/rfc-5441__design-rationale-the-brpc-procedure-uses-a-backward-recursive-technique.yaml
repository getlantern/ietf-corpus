document: rfc-5441
kind: design-rationale
summary: The BRPC procedure uses a backward-recursive technique where computation starts at the destination domain and propagates upstream, building a Virtual Shortest Path Tree (VSPT). This guarantees finding the globally optimal constrained inter-domain TE LSP, unlike per-domain forward computation which cannot guarantee optimality.
