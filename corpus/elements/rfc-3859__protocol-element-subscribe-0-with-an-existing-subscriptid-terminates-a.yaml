document: rfc-3859
kind: protocol-element
summary: SUBSCRIBE 0 with an existing SubscriptID terminates a subscription (there is no independent UNSUBSCRIBE operation). SUBSCRIBE 0 with a new SubscriptID performs a one-time fetch of presence information (there is no independent FETCH operation). In both cases a notify is generated and may be discarded by the watcher.
section: 3.4.3
topics:
    - realtime
    - sip
