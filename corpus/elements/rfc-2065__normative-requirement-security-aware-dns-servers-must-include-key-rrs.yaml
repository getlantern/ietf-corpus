document: rfc-2065
kind: normative-requirement
summary: 'Security aware DNS servers MUST include KEY RRs as additional information in responses: zone key KEY RR(s) MUST be included on NS RR retrieval, and end entity KEY RR(s) MUST be included on A or AAAA RR retrieval, if space is available. If the zone KEY RR does not fit, the retrieval must be considered truncated.'
section: "3.7"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
