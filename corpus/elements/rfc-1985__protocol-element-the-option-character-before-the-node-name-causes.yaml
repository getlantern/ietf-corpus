document: rfc-1985
kind: protocol-element
summary: 'The ''#'' option character before the node name causes the parameter to be interpreted as a queue name rather than a domain name, enabling flush of implementation-specific queues (e.g., ETRN #uucp). The set of valid queue names is entirely a local matter and not discoverable by the client.'
section: "5.3"
topics:
    - email
