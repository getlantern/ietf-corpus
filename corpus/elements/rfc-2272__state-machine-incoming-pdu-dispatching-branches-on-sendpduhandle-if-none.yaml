document: rfc-2272
kind: state-machine
summary: 'Incoming PDU dispatching branches on sendPduHandle: if <none>, the PDU is a request or notification and is dispatched to a registered application via processPdu; if not <none>, the PDU is a response, matched to an outstanding request via sendPduHandle, and forwarded via processResponsePdu.'
