document: rfc-9668
kind: normative-requirement
summary: The Responder MUST choose a C_R that is not used in any current EDHOC session as its connection identifier, not equal to C_I from the current session, and not the Recipient ID in a current OSCORE Security Context where the ID Context is not present. C_R SHOULD NOT be the Recipient ID of any current OSCORE Security Context.
section: 4.1.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
