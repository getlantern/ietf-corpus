document: rfc-3925
kind: design-rationale
summary: 'Existing DHCPv4 options 60 and 43 are ambiguous when a client represents multiple vendors: option 43 carries no vendor identifier of its own, and RFC 3396 concatenation means multiple instances of the same option lose independence. New options with IANA Enterprise Numbers remove this ambiguity.'
section: "1"
topics:
