document: rfc-5642
kind: normative-requirement
summary: If a router is advertising any AS-scope LSA (other than Dynamic Hostname TLV RI LSA), it SHOULD advertise Dynamic Hostname TLV RI LSA in AS scope; otherwise it SHOULD advertise in area scope. ASBRs SHOULD send AS-scope; ABRs and internal routers SHOULD send area-scope.
section: 3.1.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
