document: rfc-9289
kind: normative-requirement
summary: Implementations MUST NOT negotiate TLS versions prior to 1.3 (for both TLS and DTLS). Support for mandatory-to-implement cipher suites for the negotiated TLS version is REQUIRED, and cipher suites MUST provide both confidentiality and integrity protection.
section: "5"
rfc2119_level: MUST NOT
topics:
    - tls
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
