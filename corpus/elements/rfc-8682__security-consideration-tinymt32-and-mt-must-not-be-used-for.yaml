document: rfc-8682
kind: security-consideration
summary: TinyMT32 and MT MUST NOT be used for cryptographic applications. The authors do not believe this specification generates specific security risks per se, but the non-cryptographic nature of the PRNG is an absolute constraint.
section: "3"
topics:
