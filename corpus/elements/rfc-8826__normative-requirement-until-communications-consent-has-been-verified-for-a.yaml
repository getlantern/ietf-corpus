document: rfc-8826
kind: normative-requirement
summary: Until communications consent has been verified for a given endpoint, traffic other than the consent handshake MUST NOT be sent to that endpoint. This prevents using the browser as an attack platform against machines behind firewalls or NAT that would not otherwise be accessible.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
    - nat
