document: rfc-8796
kind: normative-requirement
summary: For Summary FRR-capable LSPs assigned to the same bypass tunnel, a common RSVP_HOP and SENDER_TEMPLATE MUST be used post-failure. The PLR MUST signal non-Summary FRR-capable LSPs over the bypass tunnel before signaling the Summary FRR-capable LSPs.
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
