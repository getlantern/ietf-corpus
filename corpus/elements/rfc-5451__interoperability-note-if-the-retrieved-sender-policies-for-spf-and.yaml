document: rfc-5451
kind: interoperability-note
summary: If the retrieved sender policies for SPF and Sender-ID do not contain explicit provisions for authenticating the local-part of an address, the 'pvalue' reported with results for these mechanisms SHOULD NOT include the local-part, since it was not actually authenticated.
section: 2.4.2
topics:
    - email
    - security
