document: rfc-5041
kind: design-rationale
summary: The Tagged Buffer Model allows a non-zero initial TO and re-use of the same STag across multiple consecutive ULP Messages, enabling ULPs such as RDMAP to implement their own segmentation and reassembly within a large advertised buffer without requiring DDP to recover ULP Message boundaries.
section: "5.2"
topics:
