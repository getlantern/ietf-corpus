document: rfc-6345
kind: interoperability-note
summary: PaC discovery of the PRE uses the standard PAA discovery mechanism defined in RFC 5192. PREs are assumed to be statically configured with PAA IP addresses; dynamic PAA discovery for PREs is out of scope.
