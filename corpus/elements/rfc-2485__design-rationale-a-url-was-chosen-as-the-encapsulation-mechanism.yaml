document: rfc-2485
kind: design-rationale
summary: A URL was chosen as the encapsulation mechanism for UAP server location because many UAP servers are implemented as components within legacy HTTP/SSL servers, and a URL naturally captures IP address, port, and path information. Existing Option 72 (WWW servers) was inadequate because it only stores IP addresses without port or path.
section: Introduction
