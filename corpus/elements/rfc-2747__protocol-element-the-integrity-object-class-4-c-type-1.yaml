document: rfc-2747
kind: protocol-element
summary: The INTEGRITY object (Class=4, C-Type=1) carries hop-by-hop authentication data in every secured RSVP message. It contains an 8-bit Flags field, a 48-bit Key Identifier, a 64-bit Sequence Number, and a variable-length Keyed Message Digest (multiple of 4 octets; 16 bytes for HMAC-MD5).
section: "2.1"
topics:
