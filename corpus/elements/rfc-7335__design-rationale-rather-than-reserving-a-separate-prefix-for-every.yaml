document: rfc-7335
kind: design-rationale
summary: Rather than reserving a separate prefix for every IPv6 transition solution (such as 464XLAT) that needs a non-routed IPv4 prefix, RFC 7335 generalizes the existing DS-Lite reservation (192.0.0.0/29) to cover all such cases, avoiding address space fragmentation.
section: "4"
