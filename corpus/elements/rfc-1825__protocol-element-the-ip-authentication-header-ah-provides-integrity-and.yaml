document: rfc-1825
kind: protocol-element
summary: The IP Authentication Header (AH) provides integrity and authentication without confidentiality to IP datagrams. It computes a cryptographic function over the IP datagram using a secret key; mutable fields like TTL/Hop Limit are excluded from the computation. The default algorithm is keyed MD5.
section: "3.1"
topics:
    - ipsec
    - security
    - ip
    - crypto
