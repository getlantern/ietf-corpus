document: rfc-9359
kind: normative-requirement
summary: A list of IOAM Capabilities Objects MUST be included in the IOAM Capabilities Response Container of the echo reply unless the sender encounters an error (e.g., no matched Namespace-ID). The same type of object MAY appear more than once, only if listed with a different Namespace-ID.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
