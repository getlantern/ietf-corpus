document: rfc-8322
kind: normative-requirement
summary: The child atom:category elements in an app:collection's app:categories element MUST be the same set of atom:category elements used in the Atom Feed referenced by the collection's href attribute, ensuring category metadata is discoverable in both resources.
section: 5.1.2
rfc2119_level: MUST
topics:
