document: rfc-1812
kind: normative-requirement
summary: Routers MUST NOT forward datagrams with source or destination addresses that are 'martian' — addresses that are clearly invalid in context, such as loopback (127.0.0.0/8), limited broadcast (255.255.255.255), or Class E (240.0.0.0/4) used as source addresses.
section: 5.3.7
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
