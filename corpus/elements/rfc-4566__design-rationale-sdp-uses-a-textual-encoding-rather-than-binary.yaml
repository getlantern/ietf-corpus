document: rfc-4566
kind: design-rationale
summary: SDP uses a textual encoding (rather than binary formats such as ASN.1 or XDR) to enhance portability and enable use with a variety of transports and text-based toolkits. The encoding is deliberately compact because session descriptions may be size-limited, and the strict field ordering aids rapid error detection and discarding of malformed or undecryptable announcements.
