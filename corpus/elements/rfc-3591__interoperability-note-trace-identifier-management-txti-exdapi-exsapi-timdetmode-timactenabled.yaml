document: rfc-3591
kind: interoperability-note
summary: Trace identifier management (TxTI, ExDAPI, ExSAPI, TIMDetMode, TIMActEnabled) does NOT apply to reduced-capability systems (optIfOTMnReduced = true) or at IrDI interfaces (optIfOTMnInterfaceType field 1 = 'IrDI'). At IrDI interfaces, TCM activation is also limited by the optIfOTMnTcmMax threshold.
section: "4"
