document: rfc-3970
kind: security-consideration
summary: Read access to teTunnelTable, tePathTable, and tePathHopTable reveals tunnel endpoints, traffic volumes, and path routes, which providers may consider proprietary. It is important to control GET and NOTIFY access and to encrypt object values when transmitting via SNMP.
