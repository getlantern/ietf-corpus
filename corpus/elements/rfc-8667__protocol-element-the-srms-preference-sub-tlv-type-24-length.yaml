document: rfc-8667
kind: protocol-element
summary: The SRMS Preference sub-TLV (Type 24, Length 1) carries an unsigned 8-bit preference value used to break ties between multiple SRMS sources during SID selection as defined in RFC 8661. At most one SRMS Preference sub-TLV MUST be advertised per router.
section: "3.4"
topics:
