document: rfc-4916
kind: normative-requirement
summary: If a UA receives a mid-dialog request in which the From header field URI differs from the previous request on that dialog and the UA sends a 2xx response, the UA MUST update the remote URI for the dialog. If any other final response is sent, the UA MUST NOT update the remote URI.
section: 4.4.2
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
