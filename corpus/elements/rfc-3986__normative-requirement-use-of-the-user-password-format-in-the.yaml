document: rfc-3986
kind: normative-requirement
summary: Use of the "user:password" format in the userinfo field is deprecated. Applications SHOULD NOT render as clear text any data after the first colon in userinfo unless the data after the colon is empty, and SHOULD reject storage of such data in unencrypted form.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
