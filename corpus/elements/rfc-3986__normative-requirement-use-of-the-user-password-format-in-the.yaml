document: rfc-3986
kind: normative-requirement
summary: Use of the "user:password" format in the userinfo field is deprecated. Applications SHOULD NOT render as clear text any data after the first colon in a userinfo subcomponent unless the data after the colon is the empty string, and SHOULD reject storage of such data in unencrypted form.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
