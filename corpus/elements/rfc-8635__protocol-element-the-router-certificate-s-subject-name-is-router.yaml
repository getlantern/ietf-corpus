document: rfc-8635
kind: protocol-element
summary: The router certificate's subject name is 'ROUTER-' followed by the AS number, and the serial number is the 32-bit BGP Identifier. These fields are not contained in the PKCS#10 and must be communicated by the operator to the CA separately.
