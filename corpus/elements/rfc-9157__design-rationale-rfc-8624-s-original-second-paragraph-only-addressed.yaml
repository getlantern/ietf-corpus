document: rfc-9157
kind: design-rationale
summary: RFC 8624's original second paragraph only addressed mandatory-to-implement algorithms and algorithms too weak to recommend, leaving a gap for non-standards-track algorithms. RFC 9157 updates RFC 8624 to explicitly cover all DNSKEY and DS algorithms defined in non-standards-track RFCs, ensuring consistent guidance across the registry.
section: "3"
topics:
    - dns
    - security
