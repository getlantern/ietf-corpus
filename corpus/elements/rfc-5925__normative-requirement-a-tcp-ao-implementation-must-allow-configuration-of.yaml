document: rfc-5925
kind: normative-requirement
summary: A TCP-AO implementation MUST allow configuration of behavior for segments with TCP-AO that do not match any MKT; the initial default SHOULD be to silently accept such connections. Silent discard events SHOULD be signaled as warnings; both warnings MUST be accessible via the STATUS interface.
section: "7.3"
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
