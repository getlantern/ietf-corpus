document: rfc-5258
kind: normative-requirement
summary: A server MUST respond to options it does not recognize with a BAD response. The client SHOULD NOT specify any option more than once; if it does, the server MUST act as if the option was received only once.
section: "3"
rfc2119_level: MUST
topics:
    - email
