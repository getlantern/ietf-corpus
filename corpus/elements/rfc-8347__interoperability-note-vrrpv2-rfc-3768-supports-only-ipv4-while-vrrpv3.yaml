document: rfc-8347
kind: interoperability-note
summary: VRRPv2 (RFC 3768) supports only IPv4, while VRRPv3 (RFC 5798) supports both IPv4 and IPv6. The YANG model enforces this by constraining the IPv6 vrrp-instance list to version vrrp-v3 and providing a version-specific advertise-interval choice for IPv4.
section: "1"
topics:
