document: rfc-9251
kind: normative-requirement
summary: If all version flags in a received EVPN SMET route are reset (no version flag set), this is an error because the PE should have received a BGP route withdraw; the PE MUST treat it as a BGP error and apply the 'treat-as-withdraw' procedure per RFC 7606.
section: 4.1.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
