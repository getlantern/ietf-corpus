document: rfc-7981
kind: interoperability-note
summary: Routers not supporting the IS-IS Router CAPABILITY TLV must silently ignore it. Partial support of sub-TLVs is permitted; unsupported sub-TLVs are ignored while supported ones are processed. The impact of partial support on advertised capabilities is outside the scope of this document.
section: "4"
topics:
    - routing
