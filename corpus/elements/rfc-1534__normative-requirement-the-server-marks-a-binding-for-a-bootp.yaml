document: rfc-1534
kind: normative-requirement
summary: The server marks a binding for a BOOTP client as BOUND after sending the BOOTP BOOTREPLY, because a non-DHCP client will not send a DHCPREQUEST message nor expect a DHCPACK message.
section: "2"
rfc2119_level: MUST
