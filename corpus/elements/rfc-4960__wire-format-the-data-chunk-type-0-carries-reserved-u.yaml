document: rfc-4960
kind: wire-format
summary: 'The DATA chunk (Type=0) carries: Reserved/U/B/E flags (8 bits), Length (16 bits), TSN (32 bits), Stream Identifier (16 bits), Stream Sequence Number (16 bits), Payload Protocol Identifier (32 bits, opaque to SCTP), and variable-length User Data. The U bit marks unordered delivery; B and E bits delimit fragment boundaries.'
section: 3.3.1
topics:
