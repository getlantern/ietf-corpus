document: rfc-9611
kind: normative-requirement
summary: Implementations supporting per-CPU SAs SHOULD extend their local SPD selector and on-demand negotiation triggers to include a CPU or queue identifier in packet trigger (e.g., SADB_ACQUIRE) messages. Implementing per-CPU packet trigger messages is RECOMMENDED.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - ipsec
    - vpn
