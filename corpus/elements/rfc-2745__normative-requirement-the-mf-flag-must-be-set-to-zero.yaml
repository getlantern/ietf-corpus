document: rfc-2745
kind: normative-requirement
summary: The MF flag MUST be set to zero in all DREQ messages. It MUST be set to one in all DREP packets carrying partial results returned by intermediate nodes due to the MTU limit. When the ending node converts a DREQ to a DREP, the MF flag must remain zero.
section: "3.3"
rfc2119_level: MUST
topics:
    - qos
