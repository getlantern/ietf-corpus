document: rfc-4032
kind: protocol-element
summary: Desired status may be renegotiated when a stream moves to a new transport address. A UA may upgrade desired status (optional to mandatory) in an offer or answer, but may only downgrade (mandatory to optional) in an offer, not in an answer.
section: "4.2"
