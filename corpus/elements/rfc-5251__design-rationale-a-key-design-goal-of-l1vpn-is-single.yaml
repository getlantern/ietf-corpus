document: rfc-5251
kind: design-rationale
summary: 'A key design goal of L1VPN is ''single-ended provisioning'': adding a new port to a given L1VPN requires configuration changes only on the PE that has that port. Another goal is that CE devices can establish/terminate LSPs without involving any configuration changes in service provider devices.'
