document: rfc-1532
kind: normative-requirement
summary: Hosts or routers supporting a BOOTP relay agent MUST accept for local delivery BOOTREQUEST messages whose IP source address is 0.0.0.0, overriding the normal 'Martian address filtering' rule. Legal IP source addresses MUST also be accepted.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
