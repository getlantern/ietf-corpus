document: rfc-9704
kind: protocol-element
summary: 'An ''authorization claim'' is an abstract structure comprising: the ADN of a local encrypted resolver, the DNS name of the authorizing parent zone, a set of claimed subdomains (or ''*'' for the entire parent zone), a ZONEMD Hash Algorithm, and a high-entropy salt of up to 255 octets.'
section: "5"
