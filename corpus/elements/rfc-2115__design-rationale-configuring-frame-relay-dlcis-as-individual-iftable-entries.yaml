document: rfc-2115
kind: design-rationale
summary: Configuring Frame Relay DLCIs as individual ifTable entries is explicitly not recommended and not directly supported by this MIB, because demand circuits make it impossible to pre-create individual ifEntries. The frCircuitLogicalIfIndex mechanism is provided instead for associating higher-layer protocols with subsets of DLCIs.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
