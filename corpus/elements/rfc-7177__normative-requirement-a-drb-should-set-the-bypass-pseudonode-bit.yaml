document: rfc-7177
kind: normative-requirement
summary: A DRB SHOULD set the bypass pseudonode bit in its TRILL LAN Hellos if it has not seen at least two simultaneous adjacencies in the Report state since it last rebooted or was reset by network management, thereby avoiding unnecessary pseudonode LSPs on effectively point-to-point links.
section: "7"
rfc2119_level: SHOULD
topics:
    - routing
