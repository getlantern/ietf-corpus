document: rfc-7521
kind: protocol-element
summary: When using assertions for client authentication, the request MUST include 'client_assertion_type' (REQUIRED, an absolute URI) and 'client_assertion' (REQUIRED, the assertion value). The 'client_id' is OPTIONAL but, if present, MUST identify the same client as identified by the assertion's Subject.
section: "4.2"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
