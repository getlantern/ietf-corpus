document: rfc-5602
kind: normative-requirement
summary: SNMPv3 VACM and USM MUST be used with any v3 agent that implements this MIB module. Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security is RECOMMENDED instead.
