document: rfc-7162
kind: protocol-element
summary: The MODSEQ search criterion matches messages whose modification sequence is equal to or greater than a specified value. Optionally, the client may specify an entry-name (e.g., '/flags/\\Seen') and entry-type ('shared', 'priv', or 'all') to narrow the scope to a particular metadata item type.
