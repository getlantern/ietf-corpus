document: rfc-6062
kind: normative-requirement
summary: The server MUST reject a TCP Allocate request with 400 (Bad Request) if the client connection transport is not TCP or TLS, or if the request contains DONT-FRAGMENT, EVEN-PORT, or RESERVATION-TOKEN attributes.
section: "5.1"
rfc2119_level: MUST
topics:
