kind: design-rationale
summary: Dynamic-Offset was chosen as 32 so that all future CoAP methods that are registered (method codes 1–21 are practically usable in JSON per RFC 7493) can be represented both as direct and Dynamic-X variants without overlap with non-dynamic method bits.
