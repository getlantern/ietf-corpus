document: rfc-2988
kind: design-rationale
summary: A large minimum RTO of 1 second is required because research suggests it is needed to keep TCP conservative and avoid spurious retransmissions; coarse-grain clocks traditionally impose this lower bound, and the spec acknowledges future research may justify a smaller minimum.
