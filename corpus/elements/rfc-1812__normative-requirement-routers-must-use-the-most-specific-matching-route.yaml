document: rfc-1812
kind: normative-requirement
summary: Routers MUST use the most specific matching route (longest matching network prefix) when forwarding traffic. This is the fundamental forwarding rule under CIDR, where route prefixes may exhibit subset relationships.
section: 2.2.5.2
rfc2119_level: MUST
topics:
