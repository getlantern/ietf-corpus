document: rfc-1973
kind: normative-requirement
summary: PPP implementations MUST be configurable to limit the size of LCP packets sent to 259 octets (leaving room for the NLPID and Protocol fields) until LCP negotiation is complete, to accommodate Frame Relay switches only capable of 262-octet frames.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
