document: rfc-3390
kind: protocol-element
summary: 'TCP uses slow start in three distinct contexts: (1) initial window for new connections, (2) restart window after a long idle period, and (3) loss window after a retransmit timeout. This RFC modifies only the initial window.'
section: "1"
