document: rfc-2453
kind: protocol-element
summary: A single RIP Response message may contain between 1 and 25 Route Entries (RTEs). When authentication is present the limit drops to 24 RTEs. There is no defined upper limit on the number of datagrams comprising a complete routing table response.
section: "3.6"
