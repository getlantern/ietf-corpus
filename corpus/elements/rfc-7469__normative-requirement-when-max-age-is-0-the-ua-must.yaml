document: rfc-7469
kind: normative-requirement
summary: When max-age is 0, the UA MUST remove its cached Pinning Policy for a Known Pinned Host, or MUST NOT note the host if not yet known. This provides a way for operators to de-pin a host.
section: 2.3.1
rfc2119_level: MUST
topics:
