document: rfc-4104
kind: protocol-element
summary: pcelsSimpleConditionAuxClass is an auxiliary class derived from pcimConditionAuxClass implementing a value-matching condition for a variable. It references its variable and value via pcelsVariableDN and pcelsValueDN, or by direct auxiliary attachment to the same entry.
