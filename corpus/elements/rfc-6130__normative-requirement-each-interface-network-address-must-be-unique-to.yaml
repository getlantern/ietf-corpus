document: rfc-6130
kind: normative-requirement
summary: Each interface network address MUST be unique to the router and MUST NOT be used by any other router. If the address represents a prefix range, that entire range MUST NOT overlap with any other router's interface address ranges.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
