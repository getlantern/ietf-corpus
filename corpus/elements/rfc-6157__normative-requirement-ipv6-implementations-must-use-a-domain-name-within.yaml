document: rfc-6157
kind: normative-requirement
summary: IPv6 implementations MUST use a domain name within the .invalid DNS top-level domain (rather than the IPv6 unspecified address ::) when they need to specify the IPv6 equivalent of the IPv4 unspecified address (0.0.0.0) in an SDP offer. This updates RFC 3264.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - v6ops
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
