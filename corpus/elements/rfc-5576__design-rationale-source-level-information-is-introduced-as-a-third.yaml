document: rfc-5576
kind: design-rationale
summary: Source-level information is introduced as a third level below session-level and media-level SDP information. The 'ssrc' attribute acts as a meta-attribute mapping source-level attributes to specific SSRC identifiers, enabling per-source description without changing the SDP core syntax.
