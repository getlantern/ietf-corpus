document: rfc-9071
kind: design-rationale
summary: The 330 ms maximum transmission interval was chosen (rather than 300 ms) because many text sources transmit at 300 ms during continuous typing; reception of new text from a source triggers combined transmission of new text plus unsent redundancy, so the 330 ms interval only applies when the user stops typing.
