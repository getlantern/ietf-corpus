document: rfc-8208
kind: normative-requirement
summary: The signature algorithm used in BGPsec MUST be ECDSA with curve P-256. This applies to BGPsec routers requesting certificates, generating BGPsec UPDATE messages, and verifying BGPsec UPDATE messages.
section: "2"
rfc2119_level: MUST
topics:
