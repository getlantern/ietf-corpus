document: rfc-5089
kind: wire-format
summary: The PCE-CAP-FLAGS sub-TLV (Type 5, LENGTH a multiple of 4) contains an array of 32-bit flags numbered from the most significant bit as bit zero, where each bit represents one PCE capability. The capability bit registry is shared with OSPF and managed by IANA per RFC 5088.
section: "4.5"
topics:
