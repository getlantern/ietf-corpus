document: rfc-4425
kind: design-rationale
summary: Repeating the sequence layer header improves robustness against RTP packet loss. When doing so, it is RECOMMENDED to reduce the number of leaky bucket parameters in the sequence and entry-point headers to one (section 4.5) to minimize the overhead of such repetition.
