document: rfc-6230
kind: protocol-element
summary: 'Table 1 defines header field applicability per method: ''Control-Package'' is mandatory in CONTROL requests; ''Seq'', ''Status'', and ''Timeout'' are mandatory in REPORT requests; ''Dialog-ID'' and ''Packages'' are mandatory in SYNC requests. ''Content-Length'' and ''Content-Type'' are optional in CONTROL and REPORT; ''Supported'' and ''Keep-Alive'' are optional in SYNC responses/requests respectively.'
section: "9.1"
