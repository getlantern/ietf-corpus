document: rfc-7049
kind: protocol-element
summary: A decimal fraction (tag 4) or bigfloat (tag 5) is a two-element array [exponent e, mantissa m]. Decimal fractions compute m*(10**e); bigfloats compute m*(2**e). The exponent MUST be major type 0 or 1; the mantissa may be a bignum.
section: 2.4.3
