document: rfc-7759
kind: interoperability-note
summary: If both the G-ACh (G) and IP/UDP (U) encapsulation capability bits are set in the BFD Configuration sub-TLV, configuration gives precedence to the G bit. If the egress LSR supports neither encapsulation format, an 'OAM Problem/Unsupported BFD Encapsulation format' error MUST be generated.
section: 2.2.1
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
