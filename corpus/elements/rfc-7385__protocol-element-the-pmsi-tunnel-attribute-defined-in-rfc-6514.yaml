document: rfc-7385
kind: protocol-element
summary: 'The PMSI Tunnel attribute (defined in RFC 6514) uses a single octet field to specify the tunnel type. Initial assigned values are: 0x00 (no tunnel information present), 0x01 (RSVP-TE P2MP LSP), 0x02 (mLDP P2MP LSP), 0x03 (PIM-SSM Tree), 0x04 (PIM-SM Tree), 0x05 (BIDIR-PIM Tree), 0x06 (Ingress Replication), 0x07 (mLDP MP2MP LSP).'
section: "3"
topics:
    - mpls
    - bgp
    - multicast
