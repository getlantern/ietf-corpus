document: rfc-2440
kind: privacy-consideration
summary: The Literal Data Packet (Tag 11) supports a special file name '_CONSOLE', indicating the data is 'for your eyes only' and should be handled with extra care, such as avoiding writing the data to disk. This is a convention for marking unusually sensitive message content.
section: "5.9"
topics:
