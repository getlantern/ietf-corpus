document: rfc-9855
kind: protocol-element
summary: For SRv6, Adjacency SIDs are typically globally routed, so there is no need to precede an Adjacency SID with a Prefix-SID, resulting in a likely shorter RL compared to SR-MPLS. Transit node protection adds an SRv6 SID list per RFC 8986 head-end behaviors; Segment Endpoint nodes execute endpoint processing first, then apply transit protection.
section: "7.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
