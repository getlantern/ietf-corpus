document: rfc-8360
kind: protocol-element
summary: 'Two new path-validation state variables are introduced: VRS-IP (Verified Resource Set for IP addresses) and VRS-AS (Verified Resource Set for AS numbers). Both are initialized to the trust anchor''s IP Address Delegation and AS Identifier Delegation values, respectively, and are updated at each step by intersecting with the child certificate''s declared resources.'
section: 4.2.4.4
