document: rfc-2417
kind: design-rationale
summary: The backup MARS list received from the MARS via MARS_REDIRECT_MAP has higher preference than addresses manually configured into the client. When a MARS_REDIRECT_MAP is received, those addresses are inserted at the top of the backup list.
