document: rfc-7833
kind: privacy-consideration
summary: Attributes released by an IdP — even generic affiliation attributes shared across many clients — can enable client re-identification or cross-session and cross-RP linkage. The profiles do not provide a client-facing mechanism to express release preferences; such preferences must be expressed out of band.
section: "9"
topics:
    - privacy
    - security
