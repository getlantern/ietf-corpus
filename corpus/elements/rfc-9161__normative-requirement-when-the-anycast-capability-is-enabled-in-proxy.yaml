document: rfc-9161
kind: normative-requirement
summary: When the anycast capability is enabled in Proxy ND, the number of allowed entries for the same IP address MUST be limited by the operator to prevent DoS attacks that attempt to fill the Proxy ND table.
section: "6"
rfc2119_level: MUST
topics:
