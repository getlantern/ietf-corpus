document: rfc-7155
kind: interoperability-note
summary: RFC 7155 obsoletes RFC 4005 and is NOT backward compatible with it. All RADIUS/Diameter protocol interaction material has been removed, and the ACR/ACA command format now explicitly requires Acct-Application-Id and excludes Vendor-Specific-Application-Id.
section: "1.1"
topics:
    - diameter
    - radius
