document: rfc-2665
kind: interoperability-note
summary: 'The ifMtu for Ethernet-like interfaces is 1500 octets as seen by the MAC client. When using IEEE 802.2 LLC, higher layers see a different MTU: LLC type 1 clients see 1497 octets and protocols running over SNAP see 1492 octets.'
section: 3.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
