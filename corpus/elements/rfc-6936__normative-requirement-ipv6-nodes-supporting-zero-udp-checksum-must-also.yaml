document: rfc-6936
kind: normative-requirement
summary: IPv6 nodes supporting zero UDP checksum MUST also accept reception of datagrams with a calculated (non-zero) checksum on all ports configured for zero-checksum reception, and MUST apply the RFC 2460 reception method when the checksum field is not zero.
section: "4"
rfc2119_level: MUST
topics:
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
