document: rfc-2740
kind: design-rationale
summary: OSPF for IPv6 runs on a per-link basis rather than per-IP-subnet because IPv6 allows multiple subnets on a single link and two nodes may communicate directly without a common IPv6 prefix. The term 'link' replaces 'subnet' and 'network' throughout the protocol.
section: "2.1"
topics:
    - routing
    - ip
