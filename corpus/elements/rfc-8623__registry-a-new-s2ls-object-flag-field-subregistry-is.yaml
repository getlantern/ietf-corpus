document: rfc-8623
kind: registry
summary: A new 'S2LS Object Flag Field' subregistry is created within the PCEP Numbers registry to manage the 32-bit flag field of the S2LS object. New values are assigned by Standards Action. Bits 29-31 are defined as Operational (3 bits); bits 0-28 are unassigned.
