document: rfc-6682
kind: design-rationale
summary: Raptor and RaptorQ are block-based fountain codes that can generate an arbitrary number of repair packets from any source block. The original source symbols can be recovered with very high probability from any set of symbols only slightly greater in number than the original, making them efficient for real-time multimedia FEC.
section: "3"
topics:
