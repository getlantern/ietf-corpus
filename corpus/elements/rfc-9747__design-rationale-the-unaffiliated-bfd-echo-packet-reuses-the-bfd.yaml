document: rfc-9747
kind: design-rationale
summary: The Unaffiliated BFD Echo packet reuses the BFD Control packet format rather than defining a new format. RFC 5880 states Echo packet contents are a local matter; this document defines that 'local matter' by specifying BFD Control packet fields and their required values.
