document: rfc-8038
kind: normative-requirement
summary: If exporting a MIB OID value that is not in the default SNMP context, the mibContextEngineID and mibContextName fields MUST be included in the MIB Field Options Template and associated Data Records, or in the same Template as the mibObjectValue field.
section: "5.6"
rfc2119_level: MUST
topics:
    - snmp
