document: rfc-6118
kind: normative-requirement
summary: For the voice:tel Enumservice, the 'tel:' URI value SHOULD be fully qualified using the global phone number form of RFC 3966. A local phone number SHOULD NOT be used unless the zone controller is certain it is unambiguously distinguishable by all clients that can access the record.
section: "4.29"
rfc2119_level: SHOULD
topics:
    - dns
    - voip
