document: rfc-6660
kind: normative-requirement
summary: If any pre-RFC6040 tunnel decapsulator exists within a PCN-domain, every PCN-node in that domain MUST be configured so that it never sets the ThM codepoint; PCN-interior-nodes MUST solely use the Excess-traffic-marking function.
section: "4.3"
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
