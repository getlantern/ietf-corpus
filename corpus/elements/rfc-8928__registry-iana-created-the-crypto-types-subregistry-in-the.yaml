document: rfc-8928
kind: registry
summary: IANA created the 'Crypto-Types' subregistry in the ICMPv6 Parameters registry, indexed 0–255. Each entry specifies elliptic curve, hash function, signature algorithm, representation conventions, public key size, and signature size. Values 0 (ECDSA256), 1 (Ed25519), and 2 (ECDSA25519) are defined. New values require 'Specification Required' or 'IESG Approval'.
section: "8.2"
