document: rfc-7519
kind: protocol-element
summary: The "typ" (type) Header Parameter declares the media type of the complete JWT, intended to disambiguate among different object types in an application data structure. It is RECOMMENDED that its value be "JWT" spelled in uppercase for compatibility with legacy implementations. Processing is performed by the application, not the JWT implementation.
section: "5.1"
topics:
    - jose
