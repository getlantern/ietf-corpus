document: rfc-6728
kind: protocol-element
summary: 'The Cache class has four subtypes with distinct expiration semantics: ImmediateCache (one Packet Report per arriving packet), TimeoutCache (flow expires on active or idle timeout), NaturalCache (timeout or natural termination such as TCP FIN/RST), and PermanentCache (flows never expire; periodically exported at exportInterval). Each subtype aggregates a CacheLayout.'
section: "4.3"
topics:
