document: rfc-5643
kind: protocol-element
summary: ospfv3ExtAreaLsdbLimit is a persistent read-write Integer32 (-1 to 0x7FFFFFFF) bounding the number of non-default AS-external-LSAs in the LSDB. A value of -1 means no limit. The router enters Overflow state at the limit and will not hold more than the configured maximum.
section: "5"
topics:
    - routing
    - snmp
