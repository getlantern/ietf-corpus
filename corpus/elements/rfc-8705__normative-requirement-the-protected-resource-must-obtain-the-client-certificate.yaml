document: rfc-8705
kind: normative-requirement
summary: The protected resource MUST obtain the client certificate from its TLS implementation layer and MUST verify it matches the certificate associated with the access token; a mismatch MUST result in HTTP 401 with 'invalid_token' error.
section: "3"
rfc2119_level: MUST
