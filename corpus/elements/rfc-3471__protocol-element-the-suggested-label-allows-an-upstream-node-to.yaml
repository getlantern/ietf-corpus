document: rfc-3471
kind: protocol-element
summary: The Suggested Label allows an upstream node to communicate its label preference to a downstream node before the downstream node selects and communicates a label upstream. Its format is identical to a Generalized Label. The upstream node may begin configuring its hardware with the suggested label to reduce setup latency, but MUST NOT transmit data on the suggested label until the downstream node confirms it.
section: "3.4"
topics:
    - mpls
    - routing
