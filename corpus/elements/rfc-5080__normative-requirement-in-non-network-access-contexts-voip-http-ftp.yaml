document: rfc-5080
kind: normative-requirement
summary: In non-network-access contexts (VoIP, HTTP, FTP, OS login), an Access-Reject sent to a RADIUS client MUST be interpreted as a rejection of the request for service, and the RADIUS client MUST NOT offer that service to the user. Where a NAS offers independent services, RADIUS sessions for those services MUST be treated as independent.
section: 2.6.2
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
