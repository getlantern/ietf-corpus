document: rfc-1448
kind: normative-requirement
summary: All components of a PDU, including those whose values are ignored by the receiving entity, MUST have valid ASN.1 syntax and encoding. The unSpecified value is defined for use as the value portion of bindings in request PDUs where the value is not relevant.
section: "4.2"
rfc2119_level: MUST
topics:
    - snmp
