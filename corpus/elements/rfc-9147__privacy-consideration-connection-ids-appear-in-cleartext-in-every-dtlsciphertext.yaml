document: rfc-9147
kind: privacy-consideration
summary: Connection IDs appear in cleartext in every DTLSCiphertext record and can be used to correlate traffic across network path changes (e.g., NAT rebinding), enabling device tracking across network transitions. Implementations should weigh this privacy cost against the operational benefits of CIDs.
section: "11"
topics:
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
