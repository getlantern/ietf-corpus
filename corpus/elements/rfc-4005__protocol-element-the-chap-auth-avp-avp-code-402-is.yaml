document: rfc-4005
kind: protocol-element
summary: The CHAP-Auth AVP (AVP Code 402) is a Grouped AVP containing CHAP-Algorithm (mandatory), CHAP-Ident (mandatory), and optionally CHAP-Response. If CHAP-Auth is present, the CHAP-Challenge AVP MUST also be present.
