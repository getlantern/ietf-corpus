document: rfc-3640
kind: normative-requirement
summary: The DTS-flag field MUST be present in each AU-header if the DTS-delta field length is signaled as greater than zero, and MUST have the same value for all fragments of an Access Unit. The DTS-delta field MUST also have the same value for all fragments of an AU.
section: 3.2.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
