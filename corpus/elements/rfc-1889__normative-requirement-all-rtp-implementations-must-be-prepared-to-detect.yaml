document: rfc-1889
kind: normative-requirement
summary: All RTP implementations must be prepared to detect and resolve SSRC identifier collisions. If a source changes its source transport address, it must also choose a new SSRC identifier to avoid being interpreted as a looped source.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
