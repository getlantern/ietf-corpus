document: rfc-8005
kind: design-rationale
summary: The DNS is used for name-to-HI translation because most applications already rely on DNS for name-to-IP translation prior to communication. Defining a HIP RR allows the resolver to additionally perform name-to-HI lookup and construct the HI-to-IP mapping internal to the HIP layer, without disrupting existing ULPs.
section: "1"
topics:
    - dns
    - security
