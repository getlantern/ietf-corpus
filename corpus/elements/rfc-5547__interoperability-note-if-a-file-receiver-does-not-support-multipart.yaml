document: rfc-5547
kind: interoperability-note
summary: If a file receiver does not support multipart MIME bodies and rejects an SDP offer containing a 'file-icon' body part, it is RECOMMENDED that the file sender retry by removing the icon and sending a plain SDP body to improve backwards compatibility.
section: "8.8"
topics:
    - realtime
    - email
