document: rfc-5035
kind: security-consideration
summary: The attributes must be placed in locations protected by the signature; placing them in unsigned or unauthenticated locations provides no additional security. The document addresses certificate substitution attacks where an attacker replaces the unprotected issuer/serial number field to point to a different certificate with the same public key.
