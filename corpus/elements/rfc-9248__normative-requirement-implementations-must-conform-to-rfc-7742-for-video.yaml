document: rfc-9248
kind: normative-requirement
summary: 'Implementations MUST conform to RFC 7742 for video, with the following exception: only H.264 is Mandatory to Implement; VP8 support is OPTIONAL at both device and provider levels. VP8 is optional because backwards compatibility with older devices that do not support VP8 is desirable.'
section: "6.3"
rfc2119_level: MUST
