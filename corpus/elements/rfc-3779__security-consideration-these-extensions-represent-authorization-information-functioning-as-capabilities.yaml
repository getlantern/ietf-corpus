document: rfc-3779
kind: security-consideration
summary: 'These extensions represent authorization information functioning as capabilities: the certificate asserts that the holder of the private key is authorized to use the IP addresses or AS identifiers in the extension. As a result, the Subject field is largely irrelevant for security purposes, contrary to common PKI conventions.'
section: "4"
