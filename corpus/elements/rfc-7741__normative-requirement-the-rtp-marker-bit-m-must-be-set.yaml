document: rfc-7741
kind: normative-requirement
summary: The RTP marker bit (M) MUST be set for the very last packet of each encoded VP8 frame, enabling a decoder to finish decoding without waiting for the next packet to confirm frame completion.
section: "4.1"
rfc2119_level: MUST
topics:
