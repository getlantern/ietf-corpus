document: rfc-7683
kind: normative-requirement
summary: A reporting node MUST NOT send overload reports of a type not advertised as supported by the reacting node. It SHOULD explicitly signal the end of overload by sending an OLR with OC-Validity-Duration set to zero, and SHOULD decrease requested abatement gradually to avoid traffic oscillations.
section: 5.2.3
rfc2119_level: MUST NOT
topics:
    - diameter
    - radius
