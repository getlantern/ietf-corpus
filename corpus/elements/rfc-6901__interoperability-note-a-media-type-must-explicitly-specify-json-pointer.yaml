document: rfc-6901
kind: interoperability-note
summary: A media type must explicitly specify JSON Pointer as its fragment identifier syntax (typically in its registration per RFC 6838). The fragment identifier syntax for application/json is not JSON Pointer; adoption is opt-in per media type.
section: "6"
topics:
