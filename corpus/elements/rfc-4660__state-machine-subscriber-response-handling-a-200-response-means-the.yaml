kind: state-machine
summary: 'Subscriber response handling: a ''200'' response means the subscription and filter are accepted; a ''202'' means the subscription is understood but filter acceptance is pending (MAY arrive in a subsequent NOTIFY); a ''415'' means the MIME type was not understood; a ''488'' means the filter content was not accepted.'
