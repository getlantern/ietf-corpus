document: rfc-6552
kind: interoperability-note
summary: RPL requires the use of a common Objective Function by all nodes in a network. Because RPL includes no default OF or metric container, implementations lacking a common OF cannot interoperate; OF0 (OCP 0) is defined to serve as that common baseline.
section: "1"
topics:
    - routing
