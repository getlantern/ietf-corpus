document: rfc-3807
kind: protocol-element
summary: V5UA is an extension of the IUA protocol (RFC 3057) for backhauling V5.2 signaling over IP using SCTP between a Signaling Gateway (SG) and a Media Gateway Controller (MGC). It transports V5.2 Layer 3 messages across an IP network while V5 Layer 1/2 remains on the SG and V5 Layer 3 protocols (Link Control, Control, BCC, PSTN, Protection) reside on the MGC.
section: "1"
topics:
    - sctp
    - security
