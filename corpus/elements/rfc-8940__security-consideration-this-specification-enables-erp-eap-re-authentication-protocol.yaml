document: rfc-8940
kind: security-consideration
summary: This specification enables ERP (EAP Re-authentication Protocol) key hierarchy establishment using fast reconnect with EAP-SIM and EAP-AKA by providing the previously missing Session-Id derivation for the fast reconnect case. The updates do not modify the security considerations of RFC 5247.
