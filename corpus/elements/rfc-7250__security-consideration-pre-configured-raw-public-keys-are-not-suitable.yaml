document: rfc-7250
kind: security-consideration
summary: Pre-configured raw public keys are not suitable for a generic Web-based e-commerce environment but are appropriate for constrained smart-object deployments (e.g., CoAP/DTLS sensors) where device firmware and server endpoint are under close administrative control. The chosen out-of-band validation mechanism must be assessed before deployment.
