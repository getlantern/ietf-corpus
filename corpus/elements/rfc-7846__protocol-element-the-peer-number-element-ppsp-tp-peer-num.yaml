document: rfc-7846
kind: protocol-element
summary: 'The peer number element (ppsp_tp_peer_num_t) is an optional scope selector in CONNECT and FIND requests specifying peer_count (maximum peers to return, should be less than 30) and optional filter attributes: ability_nat (''NO_NAT''|''STUN''|''TURN''), concurrent_links, online_time (seconds), and upload_bandwidth (Kbps).'
