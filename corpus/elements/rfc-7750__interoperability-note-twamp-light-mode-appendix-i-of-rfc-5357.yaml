document: rfc-7750
kind: interoperability-note
summary: TWAMP Light mode (Appendix I of RFC 5357) does not explicitly state how the Type-P Descriptor is synchronized between Session-Sender and Session-Reflector; this extension assumes that both sides are configured by some means (e.g., CLI) to use the same DSCP value and to support DSCP and ECN Monitoring.
