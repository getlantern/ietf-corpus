document: rfc-5001
kind: design-rationale
summary: 'The NSID payload is defined as an opaque byte string because no single format satisfies all operators: using a real name, real IP, hash, probabilistically unique ID, signed blob, or arbitrary string each has distinct tradeoffs in privacy, debuggability, and operational complexity. Leaving the choice to implementors and operators accommodates all use cases.'
section: "3.1"
topics:
    - dns
