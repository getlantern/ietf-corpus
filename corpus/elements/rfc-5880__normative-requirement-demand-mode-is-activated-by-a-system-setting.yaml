document: rfc-5880
kind: normative-requirement
summary: Demand mode is activated by a system setting the Demand (D) bit; the receiving system ceases periodic BFD Control transmission. The Demand (D) bit MUST NOT be set unless bfd.DemandMode is 1, bfd.SessionState is Up, and bfd.RemoteSessionState is Up. A Poll Sequence MUST be initiated whenever the Demand bit value changes.
section: "6.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
