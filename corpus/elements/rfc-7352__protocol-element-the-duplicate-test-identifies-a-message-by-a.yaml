document: rfc-7352
kind: protocol-element
summary: The 'duplicate' test identifies a message by a unique ID and evaluates to 'true' if that ID was seen in a previous Sieve execution, 'false' otherwise. As a side effect, the unique ID is added to an internal duplicate-tracking list after the Sieve execution finishes successfully.
