document: rfc-6733
kind: protocol-element
summary: 'Two SCTP payload protocol identifiers (PPIDs) are allocated for Diameter: PPID 46 for Diameter messages in cleartext SCTP DATA chunks, and PPID 47 for Diameter messages in DTLS/SCTP-protected DATA chunks. Diameter agents SHOULD use these dedicated PPIDs instead of the unspecified identifier (value 0) to allow distinguishing encrypted from unencrypted Diameter traffic.'
section: 2.1.1
topics:
    - diameter
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
