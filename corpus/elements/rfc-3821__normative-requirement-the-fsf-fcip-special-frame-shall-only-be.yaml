document: rfc-3821
kind: normative-requirement
summary: The FSF (FCIP Special Frame) SHALL only be sent as the first bytes transmitted in each direction on a newly formed TCP Connection, and only one FSF SHALL be transmitted in each direction. After that, all FCIP Frames SHALL have the SF bit set to 0.
section: 5.6.1
rfc2119_level: REQUIRED
topics:
    - tcp
