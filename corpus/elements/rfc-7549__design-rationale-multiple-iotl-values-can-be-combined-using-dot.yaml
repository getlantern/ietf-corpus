document: rfc-7549
kind: design-rationale
summary: Multiple 'iotl' values can be combined using dot notation in a single parameter (e.g., 'iotl=homea-homeb.visiteda-homea'), allowing a single SIP URI to indicate that the entity represents the end of multiple traffic legs simultaneously.
