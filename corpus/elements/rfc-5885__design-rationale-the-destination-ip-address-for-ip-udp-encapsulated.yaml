document: rfc-5885
kind: design-rationale
summary: The destination IP address for IP/UDP-encapsulated BFD is chosen from the 127/8 or IPv6 equivalent range (loopback) to prevent forwarding of these packets beyond the immediate VCCV hop, as explained in RFC 4379 Section 2.1.
