document: rfc-9914
kind: protocol-element
summary: A Projected DAO (P-DAO) is a DAO message used by the RPL Root (acting on behalf of a PCE) to install a Projected Route (P-Route) in the RPL domain. It extends the existing DAO base object and may carry either a Storing Mode or Non-Storing Mode Via Information Option, plus one or more RPL Target Options identifying reachable destinations.
section: 4.1.1
topics:
    - routing
