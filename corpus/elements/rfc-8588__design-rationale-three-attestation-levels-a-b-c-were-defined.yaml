document: rfc-8588
kind: design-rationale
summary: Three attestation levels (A, B, C) were defined to bridge the transition period where the telephone network contains both VoIP and TDM/SS7 traffic. Gateway attestation (C) accommodates calls from gateways that do not support PASSporT or STI, enabling incremental deployment.
