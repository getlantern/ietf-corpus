document: rfc-6059
kind: normative-requirement
summary: For each router in the candidate router set (SDAT entries associated with at least one valid address), the host MUST send a unicast Neighbor Solicitation to the router's link-local address and MUST set the link-layer destination to the MAC address stored in the SDAT. The host MUST NOT send unicast NS to a router not associated with any valid address in the SDAT.
section: 5.5.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
