document: rfc-4033
kind: state-machine
summary: 'A validating resolver assigns one of four states to a DNS response: Secure (trust anchor, chain of trust, all signatures verified), Insecure (chain of trust with proven absence of DS at some delegation), Bogus (secure delegation exists but response fails validation), or Indeterminate (no applicable trust anchor).'
section: "5"
topics:
