document: rfc-9398
kind: protocol-element
summary: 'The YANG module ''ietf-igmp-mld-proxy'' defines two optional features: ''igmp-proxy'' for IGMP Proxy protocol support (IPv4) and ''mld-proxy'' for MLD Proxy protocol support (IPv6). Either or both features may be implemented independently.'
