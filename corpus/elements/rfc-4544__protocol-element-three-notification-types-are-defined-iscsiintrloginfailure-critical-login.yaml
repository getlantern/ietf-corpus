kind: protocol-element
summary: 'Three NOTIFICATION-TYPEs are defined: iscsiIntrLoginFailure (critical login failure detected by an initiator), iscsiTgtLoginFailure (critical login failure detected by a target), and iscsiInstSessionFailure (session terminated due to abnormal connection or digest failure). Critical failures include authentication, authorization, and negotiation failures.'
