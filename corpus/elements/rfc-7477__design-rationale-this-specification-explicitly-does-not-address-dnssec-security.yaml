document: rfc-7477
kind: design-rationale
summary: This specification explicitly does not address DNSSEC security record synchronization (DS, DNSKEY) and does not cover bootstrapping of the initial DNSSEC-secured environment. These concerns are delegated to the complementary RFC 7344, which maintains security delegation information.
section: "1"
topics:
