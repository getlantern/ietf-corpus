document: rfc-6478
kind: protocol-element
summary: When a dynamic (LDP-controlled) PW segment adjacent to an S-PE has its label withdrawn, the S-PE sets the PW status code '0x00000001 - Pseudowire Not Forwarding' on the static PW segment. The S-PE withdraws its own LDP label only if it is not provisioned.
section: "6.2"
topics:
