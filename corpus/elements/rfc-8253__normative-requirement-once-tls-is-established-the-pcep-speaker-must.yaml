document: rfc-8253
kind: normative-requirement
summary: Once TLS is established, the PCEP speaker MUST start the OpenWait timer per RFC 5440; if no Open message is received before it expires, the speaker sends PCErr and releases the TCP/TLS connection.
section: "3.4"
rfc2119_level: MUST
topics:
    - tls
    - routing
