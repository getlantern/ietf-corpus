document: rfc-4585
kind: interoperability-note
summary: 'AVP and AVPF entities can coexist in the same RTP session without disrupting each other''s core operation. If AVP entities may be present, T_rr_interval SHOULD be set to five seconds: if it is too large, AVPF entities may time out AVP members that legitimately follow the five-second rule; if T_rr is too small, AVPF entities may also time out AVP members prematurely.'
section: "5"
topics:
