document: rfc-5717
kind: normative-requirement
summary: A <partial-lock> operation MUST fail if any NETCONF session owns the global lock on the running datastore, if any part of the area to be protected is already locked by another session, if the requesting user is not authenticated, or if access control denies it.
section: 2.4.1
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
