document: rfc-9008
kind: design-rationale
summary: A DODAG Configuration option flag (bit 3) is used to signal the new RPI Option Type value network-wide rather than mandating an immediate cutover. This avoids a disruptive flag-day transition (analogous to the ARPANET IPv3-to-IPv4 cutover) by allowing nodes to learn which Option Type is in use before originating traffic.
section: 4.1.3
topics:
    - ip
    - routing
