document: rfc-3268
kind: design-rationale
summary: AES ciphersuites are added to TLS because RC2, RC4, and IDEA are subject to intellectual property claims (trademarks, trade secrets, or patents), triple DES is inefficient, and the DHE forward-secrecy ciphersuites previously only supported triple DES and weak export variants.
