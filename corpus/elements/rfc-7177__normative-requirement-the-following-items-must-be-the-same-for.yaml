document: rfc-7177
kind: normative-requirement
summary: 'The following items MUST be the same for all TRILL Hellos issued by an RBridge on a particular Ethernet port, regardless of the VLAN in which the Hello is sent: Source MAC address, priority to be the DRB, Desired Designated VLAN, Port ID, and (if included) BFD-Enabled TLV and PORT-TRILL-VER sub-TLV.'
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
