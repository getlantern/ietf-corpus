document: rfc-5730
kind: design-rationale
summary: EPP was designed for use in a layered protocol environment because it is intended for diverse operating environments where transport and security requirements vary greatly. Bindings to specific transport and security protocols are outside the scope of the base EPP specification.
section: "1"
topics:
