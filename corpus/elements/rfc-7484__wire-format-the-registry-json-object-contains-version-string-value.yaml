document: rfc-7484
kind: wire-format
summary: 'The registry JSON object contains: ''version'' (STRING, value ''1.0''), ''publication'' (STRING, RFC 3339 format), optional ''description'' (STRING), and ''services'' (ARRAY of service arrays). Each service is a 2-element ARRAY: an entry-list ARRAY of STRING scope values and a service-uri-list ARRAY of STRING base URLs.'
