document: rfc-6956
kind: normative-requirement
summary: Any LFB element defined for counting purposes MUST be specified to monotonically increase until it reaches the maximum value of its unsigned integer type, at which point it wraps around and starts increasing again from zero. How counter discontinuities (due to wrapping or resets) are handled is an implementation issue.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
