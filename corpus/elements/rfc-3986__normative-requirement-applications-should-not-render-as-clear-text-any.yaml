document: rfc-3986
kind: normative-requirement
summary: Applications SHOULD NOT render as clear text any data after the first colon in a userinfo subcomponent unless the data after the colon is empty. Applications MAY ignore or reject such data and SHOULD reject storage of such data in unencrypted form. The "user:password" format in userinfo is deprecated.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
