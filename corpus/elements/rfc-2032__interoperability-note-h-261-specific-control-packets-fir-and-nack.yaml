document: rfc-2032
kind: interoperability-note
summary: H.261-specific control packets (FIR and NACK) may only be used when no RTP mixers or translators intervene in the path from encoder to decoder, because the unicast reverse-channel mechanism relies on the encoder's network-level source address being visible to the decoder.
section: "5.1"
topics:
