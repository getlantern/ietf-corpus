document: rfc-7291
kind: security-consideration
summary: The security considerations of RFC 2131 (DHCPv4) and RFC 3315 (DHCPv6) apply. The PCP server DHCP option is applicable under PCP's simple threat model (RFC 6887 Section 18.1); applicability under the advanced threat model is outside the scope of this document.
