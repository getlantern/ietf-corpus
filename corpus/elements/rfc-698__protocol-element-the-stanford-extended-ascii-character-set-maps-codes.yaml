document: rfc-698
kind: protocol-element
summary: The Stanford Extended ASCII character set maps codes 000–177 to a specific graphic character set including Greek letters, logical symbols, and mathematical operators. Codes 040–135 and 140–174 are identical to standard ASCII. Several codes (011, 012, 013, 014, 015, 177) have 'hidden' alternate graphic interpretations used by typesetting programs.
