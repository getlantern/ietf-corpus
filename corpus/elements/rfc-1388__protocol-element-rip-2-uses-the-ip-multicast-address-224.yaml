document: rfc-1388
kind: protocol-element
summary: RIP-2 uses the IP multicast address 224.0.0.9 for periodic broadcasts to reduce unnecessary load on hosts not listening to RIP-2. IGMP is not required since these are inter-router messages that are not forwarded.
section: "3.6"
topics:
