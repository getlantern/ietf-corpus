document: rfc-7579
kind: normative-requirement
summary: Each sub-matrix of the Connectivity Matrix MUST be identified by a different MatrixID that represents a unique combination of {src port, src label, dst port, dst label}; no two matrices may share the same such tuple.
section: "2.1"
rfc2119_level: MUST
topics:
