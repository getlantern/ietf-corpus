document: rfc-9482
kind: security-consideration
summary: A CoAP-to-HTTP proxy can mitigate DoS, replay, and resource-exhaustion attacks by validating ASN.1 syntax and PKIMessage protection before forwarding to PKI entities; however, the proxy itself may be vulnerable to resource-exhaustion and should use short discard timers and per-client rate limiting.
section: "4"
topics:
    - pkix
    - security
