document: rfc-3472
kind: normative-requirement
summary: When a REQUEST containing an Upstream Label is received and the label is not acceptable, the receiver MUST issue a NOTIFICATION with 'Routing problem/Unacceptable label value'. An intermediate node that cannot allocate a label or internal resources MUST issue a NOTIFICATION with 'Routing problem/Label allocation failure'.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
