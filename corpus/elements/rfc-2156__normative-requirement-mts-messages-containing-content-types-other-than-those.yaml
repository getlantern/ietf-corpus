document: rfc-2156
kind: normative-requirement
summary: MTS Messages containing Content Types other than those defined by the IPMS shall be rejected at the gateway if no other gatewaying procedure is defined. The gateway shall not map non-IPMS content types.
section: 1.5.3
rfc2119_level: MUST
