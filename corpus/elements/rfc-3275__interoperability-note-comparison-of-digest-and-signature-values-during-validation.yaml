document: rfc-3275
kind: interoperability-note
summary: Comparison of digest and signature values during validation MUST be over the numeric or decoded octet sequence, not the encoded string, because different implementations may produce different base64 encodings (e.g., accidental whitespace differences) of the same underlying value.
section: "3.2"
topics:
    - security
    - crypto
