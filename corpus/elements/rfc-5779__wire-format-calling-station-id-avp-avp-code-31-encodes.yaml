document: rfc-5779
kind: wire-format
summary: Calling-Station-Id AVP (AVP Code 31) encodes the MN link-layer identifier in ASCII format, upper case only, with octet values separated by a hyphen (e.g., '00-23-32-C9-79-38'). This encoding matches MAC address encoding in RFC 3580 Section 3.21.
