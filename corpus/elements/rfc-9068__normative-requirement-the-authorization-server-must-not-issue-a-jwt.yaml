document: rfc-9068
kind: normative-requirement
summary: The authorization server MUST NOT issue a JWT access token if the authorization granted by the token would be ambiguous. If scope strings in a request refer to different default resource indicator values, the AS SHOULD reject the request with 'invalid_scope'.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
