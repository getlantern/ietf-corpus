document: rfc-5380
kind: protocol-element
summary: MAP discovery is performed via Router Advertisements containing MAP options. ARs are manually configured with MAP option information. A mobile node receiving a MAP option with a changed MAP address MUST act on the change by sending binding updates to its HA and correspondent nodes.
