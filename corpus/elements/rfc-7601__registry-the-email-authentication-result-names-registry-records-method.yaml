document: rfc-7601
kind: registry
summary: The 'Email Authentication Result Names' registry records method-code pairs and their specifications/status. New entries require Expert Review; no two entries may share the same method and code. RFC 7601 updates all 'dkim', 'domainkeys', 'spf', 'sender-id', 'auth', and 'iprev' specification references and deprecates 'dkim-adsp' and 'domainkeys' entries.
section: "6.5"
topics:
