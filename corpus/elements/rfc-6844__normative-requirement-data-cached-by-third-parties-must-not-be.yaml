document: rfc-6844
kind: normative-requirement
summary: Data cached by third parties MUST NOT be relied on for CAA record lookups but MAY be used to support additional anti-spoofing or anti-suppression controls. Where DNSSEC is not deployed, all portions of the DNS lookup SHOULD be performed against the authoritative name server.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
