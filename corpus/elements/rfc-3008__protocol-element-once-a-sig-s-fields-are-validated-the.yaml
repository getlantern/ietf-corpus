document: rfc-3008
kind: protocol-element
summary: Once a SIG's fields are validated, the resolver locates a KEY matching the signer name, key tag, and algorithm. If no matching KEY is found, the SIG is considered immaterial. If multiple KEYs are found, all are checked since the actual signing key cannot be determined prior to signature verification.
section: "3"
topics:
