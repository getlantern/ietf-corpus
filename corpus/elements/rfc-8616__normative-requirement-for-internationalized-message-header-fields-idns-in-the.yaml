document: rfc-8616
kind: normative-requirement
summary: For internationalized message header fields, IDNs in the d=, i=, and s= tags of a DKIM-Signature header field SHOULD be represented as U-labels to provide improved consistency with other header fields. A-labels remain valid to allow transition from older software.
section: "5"
rfc2119_level: SHOULD
topics:
