document: rfc-7024
kind: protocol-element
summary: On a V-spoke, the set of Eligible Upstream Multicast Hop (UMH) routes consists of all unicast VPN-IP routes received by the V-spoke, including VPN-IP default routes from its V-hub(s) and optionally routes from peer V-spokes, using SAFI 128 (MPLS-labeled VPN) or SAFI 129 (Multicast for BGP/MPLS IP VPNs).
section: "7.2"
topics:
    - mpls
    - bgp
    - vpn
    - multicast
