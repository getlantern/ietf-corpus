document: rfc-4571
kind: protocol-element
summary: The SDP <proto> token value 'TCP/RTP/AVP' is defined to signal an RTP/AVP stream that uses the framing method over TCP. For any other RTP profile xyz, the token MUST be 'TCP/RTP/xyz'.
