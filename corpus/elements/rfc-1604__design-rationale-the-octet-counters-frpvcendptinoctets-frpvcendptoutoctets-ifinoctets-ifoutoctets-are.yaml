document: rfc-1604
kind: design-rationale
summary: The octet counters (frPVCEndptInOctets, frPVCEndptOutOctets, ifInOctets, ifOutOctets) are defined to count only from the beginning of the Frame Relay header field to the end of user data, excluding physical-layer framing. Networks unable to count octets exactly are permitted to provide an approximation.
section: "4.3"
topics:
    - snmp
