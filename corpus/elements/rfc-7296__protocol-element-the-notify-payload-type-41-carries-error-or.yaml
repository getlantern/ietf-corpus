document: rfc-7296
kind: protocol-element
summary: 'The Notify Payload (type 41) carries error or status notifications with fields: Protocol ID (1 octet), SPI Size (1 octet), Notify Message Type (2 octets), SPI (variable), and Notification Data (variable). Error types include UNSUPPORTED_CRITICAL_PAYLOAD (1), INVALID_KE_PAYLOAD (17), AUTHENTICATION_FAILED (24), and NO_PROPOSAL_CHOSEN (14).'
