document: rfc-7119
kind: wire-format
summary: The IPFIX Message Header exported by an IPFIX Mediator contains Version (16-bit), Length (16-bit), Export Time (32-bit, seconds since UNIX epoch), Sequence Number (32-bit, modulo 2^32), and Observation Domain ID (32-bit). The format is identical to RFC 7011 but Export Time and Observation Domain ID may be handled differently at Mediators.
section: "3"
topics:
