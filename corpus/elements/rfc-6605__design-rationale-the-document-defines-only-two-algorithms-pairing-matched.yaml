document: rfc-6605
kind: design-rationale
summary: The document defines only two algorithms pairing matched key and hash sizes (P-256 with SHA-256, P-384 with SHA-384) to prevent an attacker from exploiting the weaker half of a mismatched algorithm pair, such as RSA-2048 with SHA-256 where the signing strength is significantly weaker than the hash strength.
