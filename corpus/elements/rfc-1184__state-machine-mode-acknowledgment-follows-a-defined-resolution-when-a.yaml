document: rfc-1184
kind: state-machine
summary: 'MODE acknowledgment follows a defined resolution: when a MODE command with MODE_ACK is received and the mode differs from the current mode, the client ignores the new mode while the server switches to it. No response is ever generated to a MODE command with MODE_ACK set, ensuring both sides converge to the same mode.'
section: "2.2"
