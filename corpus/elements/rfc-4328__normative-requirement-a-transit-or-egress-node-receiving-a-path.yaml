document: rfc-4328
kind: normative-requirement
summary: A transit or egress node receiving a Path message containing a GENERALIZED_LABEL_REQUEST object MUST generate a PathErr message with a 'Routing problem/Unsupported Encoding' indication if the requested LSP Encoding Type cannot be supported on the corresponding incoming interface.
section: 3.1.1
rfc2119_level: MUST
topics:
