document: rfc-2125
kind: normative-requirement
summary: An implementation MUST set a retransmit timer when sending any BAP Request or Indication packet and MUST retransmit with the same Identifier on expiry. BAP packets SHOULD be given priority over other data packets to ensure prompt link addition and removal.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
