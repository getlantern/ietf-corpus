document: rfc-9929
kind: normative-requirement
summary: Even if the reasons for unreachability persist, UPA advertisements SHOULD be withdrawn after a sufficient time for the UPA to be flooded network-wide and acted upon. Implementations SHOULD provide a configuration option to specify the UPA lifetime at the originating ABR or ASBR.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
