document: rfc-7214
kind: registry
summary: 'Five registries were moved from the MPLS OAM Parameters Registry (IANA-MPLS-OAM) into the new G-ACh Parameters registry: MPLS Fault OAM Message Type, MPLS Fault OAM Flag, MPLS Fault OAM TLV (all RFC 6427), MPLS PSC Request, and MPLS PSC TLV (both RFC 6378). The MPLS OAM registry itself was subsequently removed as all its sub-registries had been relocated.'
section: "2.3"
topics:
