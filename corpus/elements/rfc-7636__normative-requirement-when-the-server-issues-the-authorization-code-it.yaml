document: rfc-7636
kind: normative-requirement
summary: When the server issues the authorization code, it MUST associate the code_challenge and code_challenge_method values with the authorization code so they can be verified later. The server MUST NOT include the code_challenge value in client requests in a form that other entities can extract.
section: "4.4"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
