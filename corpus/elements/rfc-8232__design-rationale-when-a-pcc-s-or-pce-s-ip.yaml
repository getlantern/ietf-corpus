document: rfc-8232
kind: design-rationale
summary: When a PCC's or PCE's IP address changes during PCEP session re-establishment (e.g., line card change or VNF migration), the SPEAKER-ENTITY-ID TLV is used to recognize a previously connected peer, enabling state synchronization optimizations to be applied to the re-established session.
section: 3.2.1
topics:
    - routing
    - mpls
