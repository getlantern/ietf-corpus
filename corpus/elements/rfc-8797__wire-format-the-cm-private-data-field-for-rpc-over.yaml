document: rfc-8797
kind: wire-format
summary: 'The CM Private Data field for RPC-over-RDMA version 1 is exactly 8 octets: a 32-bit Format Identifier, an 8-bit Version, a 7-bit Reserved field, a 1-bit R flag, an 8-bit Send Size, and an 8-bit Receive Size, all in network byte order.'
