document: rfc-8588
kind: interoperability-note
summary: The use of 'shaken' PASSporT type and the 'attest' and 'origid' claims for SIP is formally defined in ATIS-1000074 using the SIP Identity header field from RFC 8224. RFC 8588 specifies only the JWT claim definitions, deferring SIP-layer usage rules to ATIS-1000074.
