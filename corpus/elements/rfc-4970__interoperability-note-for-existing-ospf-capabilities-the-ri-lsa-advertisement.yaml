document: rfc-4970
kind: interoperability-note
summary: For existing OSPF capabilities, the RI LSA advertisement is used primarily for informational purposes due to backward-compatibility constraints. Only future OSPF features may use the RI LSA as the sole mechanism for advertisement and discovery.
