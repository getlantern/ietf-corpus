summary: 'The ''truststore-grouping'' grouping defines two subtrees: ''certificate-bags'' (enabled by the ''certificates'' feature) and ''public-key-bags'' (enabled by the ''public-keys'' feature). Each bag has a name, optional description, and a list of named certificate or public key entries.'
