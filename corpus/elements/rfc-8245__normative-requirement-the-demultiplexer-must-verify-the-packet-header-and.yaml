document: rfc-8245
kind: normative-requirement
summary: The demultiplexer MUST verify the Packet Header and message organization, MUST send each message to its owning protocol or discard it if the Message Type is unrecognized, and MUST make available the Packet Header and source/destination addresses to the protocol.
section: 4.4.2
rfc2119_level: MUST
topics:
