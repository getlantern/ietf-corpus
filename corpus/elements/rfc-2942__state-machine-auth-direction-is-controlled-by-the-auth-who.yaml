document: rfc-2942
kind: state-machine
summary: 'Auth direction is controlled by the AUTH_WHO bit: if AUTH_CLIENT_TO_SERVER, client sends AUTH and server responds with ACCEPT or REJECT (plus RESPONSE if mutual); if AUTH_SERVER_TO_CLIENT, server sends AUTH and client responds. In mutual mode, RESPONSE precedes ACCEPT from whichever side responds.'
