document: rfc-3190
kind: protocol-element
summary: 'An ''emphasis'' parameter is defined to signal analog preemphasis applied before sampling. It may be conveyed as a MIME optional parameter or via SDP a=fmtp line. Only one value is defined: ''50-15'' indicating 50/15 microsecond CD-type preemphasis.'
