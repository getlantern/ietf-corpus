document: rfc-1808
kind: interoperability-note
summary: RFC 1738 specifies that '?' is allowed in ftp or file path segments and ';' is allowed within http path segments without defined semantics. These are believed to be errors; this document defines ';' within http paths as introducing <params> per the generic-RL syntax, and '?' in ftp/file paths is not supported in practice.
section: "2.3"
topics:
    - http
