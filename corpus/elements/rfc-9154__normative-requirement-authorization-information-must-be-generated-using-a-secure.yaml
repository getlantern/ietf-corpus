document: rfc-9154
kind: normative-requirement
summary: Authorization information MUST be generated using a secure random value. Implementations SHOULD use at least 128 bits of entropy; with printable ASCII (94 chars) this yields a minimum length of 20 characters, and with alphanumeric (36 chars) a minimum length of 25 characters.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
