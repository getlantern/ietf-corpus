kind: protocol-element
summary: 'The encryption algorithm profile mandates definition of: protocol key format, specific key structure, required checksum mechanism, key-generation seed length, string-to-key, random-to-key, and key-derivation functions, string-to-key parameter format, cipher state and initial cipher state, encrypt, decrypt, and pseudo-random functions. All operations must be defined as mathematical functions with no implicit inputs.'
