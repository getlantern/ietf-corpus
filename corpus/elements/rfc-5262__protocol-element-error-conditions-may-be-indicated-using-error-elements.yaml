document: rfc-5262
kind: protocol-element
summary: Error conditions MAY be indicated using error elements defined in RFC 5261. Incorrect content in 'version' or 'entity' attributes MAY be signaled using the <invalid-attribute-value> error element. No additional error elements are defined by this document.
