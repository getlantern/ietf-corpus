document: rfc-8482
kind: normative-requirement
summary: A DNS initiator MAY suppress future queries with QTYPE=ANY for a QNAME when its local cache contains a matching HINFO resource record with the CPU field set as described in Section 4. Alternatively, the initiator MAY respond to such queries from its local cache in the usual way.
section: "5"
rfc2119_level: MAY
topics:
    - dns
