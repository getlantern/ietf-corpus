document: rfc-5490
kind: security-consideration
summary: A temporary failure to retrieve annotations may alter the result of Sieve processing. Implementations SHOULD treat such failures the same way they treat a temporary failure to retrieve the Sieve script itself (e.g., assume the script doesn't exist or delay delivery).
section: "5"
rfc2119_level: SHOULD
topics:
    - email
    - security
