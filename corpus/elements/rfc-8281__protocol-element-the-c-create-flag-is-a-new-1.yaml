document: rfc-8281
kind: protocol-element
summary: The C (Create) flag is a new 1-bit flag (bit 4) added to the LSP object. Set to 1 in PCRpt messages to indicate that the LSP was created via a PCInitiate message; it MUST remain set for the duration of the LSP's existence.
section: 5.3.1
topics:
    - routing
    - mpls
