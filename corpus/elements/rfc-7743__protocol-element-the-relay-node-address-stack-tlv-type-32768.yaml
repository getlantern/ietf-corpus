document: rfc-7743
kind: protocol-element
summary: The Relay Node Address Stack TLV (Type 32768, assigned from the 32768–49161 optional range) carries the ordered list of relay node IP addresses plus the initiator source port, the replying router source address, and a Destination Address Offset indicating the current next-hop relay. It is optional but MUST be present whenever the relay mechanism is in use.
section: "3.2"
topics:
