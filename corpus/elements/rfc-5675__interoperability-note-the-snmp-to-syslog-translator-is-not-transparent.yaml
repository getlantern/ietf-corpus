document: rfc-5675
kind: interoperability-note
summary: 'The SNMP-to-SYSLOG translator is not transparent to a SYSLOG collector: the SYSLOG message header is filled with parameters specific to the translator system (hostname, timestamp, etc.), not the original SNMP notification originator.'
