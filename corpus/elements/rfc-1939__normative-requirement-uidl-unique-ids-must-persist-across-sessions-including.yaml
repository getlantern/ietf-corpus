document: rfc-1939
kind: normative-requirement
summary: UIDL unique-ids must persist across sessions, including sessions that ended without entering the UPDATE state. The server should never reuse a unique-id in a given maildrop for as long as the associated message entity exists.
section: "7"
rfc2119_level: REQUIRED
topics:
    - email
