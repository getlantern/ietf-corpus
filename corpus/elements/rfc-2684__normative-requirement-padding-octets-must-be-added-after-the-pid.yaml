document: rfc-2684
kind: normative-requirement
summary: Padding octets MUST be added after the PID field to align the bridged PDU's data field to a four-octet boundary. The MAC address bit ordering MUST match what it would be on the originating LAN or MAN (canonical for Ethernet, 802.5/FDDI format for 802.5).
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
