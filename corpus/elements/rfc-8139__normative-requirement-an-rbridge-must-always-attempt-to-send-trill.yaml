document: rfc-8139
kind: normative-requirement
summary: An RBridge MUST always attempt to send TRILL Hellos in the Designated VLAN. Optional Hello reduction to fewer VLANs is only safe if all adjacencies on the link (excluding Down-state) indicate support for the self-appointment and VLANs-Appointed mechanisms.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
