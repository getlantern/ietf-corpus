document: rfc-4585
kind: normative-requirement
summary: When 'rtcp-fb' attributes are present in a session description, receivers MUST ignore attributes whose semantics they do not fully understand and MUST NOT use FB message types not listed in the 'rtcp-fb' attribute lines. RTP senders MUST silently discard all received FB messages they do not understand.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
