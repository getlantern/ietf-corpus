summary: When hprIpAppnPortTOSPrecedence, hprIpLsTOSPrecedence, or hprIpCnTOSPrecedence is changed via a Set operation, the new TOS Precedence setting takes effect immediately rather than waiting for reinitialization of the port or APPN node.
