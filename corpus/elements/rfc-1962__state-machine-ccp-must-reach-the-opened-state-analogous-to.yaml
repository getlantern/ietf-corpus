document: rfc-1962
kind: state-machine
summary: CCP must reach the Opened state (analogous to LCP Opened) before compressed datagrams can be sent. The trigger to enter Opened state is completion of Configure-Request/Configure-Ack exchange. A decompression failure triggers transition to sending Reset-Request until Reset-Ack received, then returns to normal operation.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
