document: rfc-4314
kind: security-consideration
summary: An implementation MUST ensure that ACL commands themselves do not reveal information about mailboxes with restricted ACLs. For example, GETACL on a mailbox the user cannot LIST must return the same error as if the mailbox did not exist.
section: "6"
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
