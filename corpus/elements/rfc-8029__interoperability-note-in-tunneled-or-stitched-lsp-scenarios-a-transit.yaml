document: rfc-8029
kind: interoperability-note
summary: In tunneled or stitched LSP scenarios, a transit node running only RSVP (not LDP) cannot validate an LDP FEC carried in the echo request; the MPLS echo request must carry sufficient information for any transit node to perform FEC validation and detect misrouted echo requests.
section: "2"
topics:
