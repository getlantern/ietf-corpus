document: rfc-3428
kind: normative-requirement
summary: A UAS receiving a MESSAGE request SHOULD respond with a final response immediately. A 2xx response to a MESSAGE request MUST NOT contain a body, and a UAS MUST NOT insert a Contact header field into a 2xx response.
section: "7"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
