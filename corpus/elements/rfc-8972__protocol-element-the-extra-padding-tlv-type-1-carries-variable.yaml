document: rfc-8972
kind: protocol-element
summary: The Extra Padding TLV (Type 1) carries variable-length pseudorandom or zero-filled padding, RECOMMENDED for performing STAMP tests with packets larger than the base STAMP packet (44 octets unauthenticated, 112 octets authenticated). It MAY appear more than once.
