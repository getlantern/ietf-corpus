document: rfc-9742
kind: protocol-element
summary: The 'facility-override' leaf on remote destinations allows overriding the facility value in messages delivered to a remote server, using an identityref based on syslog-facility. The 'source-interface' leaf (gated by remote-source-interface feature) sets the outbound interface for remote syslog messages.
section: "4.1"
topics:
