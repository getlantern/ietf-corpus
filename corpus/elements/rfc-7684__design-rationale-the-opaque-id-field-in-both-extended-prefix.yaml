document: rfc-7684
kind: design-rationale
summary: The Opaque ID field in both Extended Prefix and Extended Link LSAs has no semantic significance beyond differentiating multiple LSAs from the same router; lowest Opaque ID wins when duplicates exist, providing a deterministic tie-breaking rule without requiring semantic encoding.
