document: rfc-9859
kind: design-rationale
summary: NOTIFY(CDS) is defined to represent any child-side DS-related change (covering both CDS and CDNSKEY records) because the child DNS operator generally is unaware of whether the parent consumes CDS or CDNSKEY, and that preference may change over time. Publishing both record types is advisable.
section: "4"
topics:
