document: rfc-8948
kind: protocol-element
summary: The QUAD option (OPTION_SLAP_QUAD, code 140) is a new DHCPv6 option that allows a DHCPv6 client or relay to indicate preferred SLAP quadrants for MAC address allocation. It carries one or more (quadrant, preference) pairs and MUST be encapsulated either in the IA_LL-options field of an IA_LL option or in a Relay-forward message.
section: "4.1"
topics:
