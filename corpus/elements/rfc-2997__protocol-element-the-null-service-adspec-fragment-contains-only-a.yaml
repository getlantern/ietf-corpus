document: rfc-2997
kind: protocol-element
summary: The Null Service ADSPEC fragment contains only a header word with service number 6, a break-bit field, and a length field of 0 (no additional words beyond the header). Network nodes may supply general parameters (bandwidth, latency) using unknown values from RFC 2216 if meaningful values cannot be generated.
section: "3.1"
topics:
