document: rfc-5655
kind: design-rationale
summary: XML was rejected for flow storage because its start/end-tag overhead and plaintext value encoding are severely inefficient for high-volume, repetitive flow records (millions to billions per hour). XML parsers are also complex and resource-intensive compared to the simple linear parsers possible for binary flow formats.
