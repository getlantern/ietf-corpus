document: rfc-3335
kind: protocol-element
summary: 'MDN disposition fields defined for Internet EDI include disposition-mode values (automatic-action, manual-action, MDN-sent-automatically, MDN-sent-manually), disposition-type values (processed, failed), and disposition-modifier values (error, warning) with specific EDI error codes: decryption-failed, authentication-failed, integrity-check-failed, unexpected-processing-error.'
section: "5.3"
