document: rfc-3479
kind: wire-format
summary: 'The FT Session TLV (type 0x0503, U=1, F=0, length=12) contains: a 16-bit FT Flags field, 16-bit Reserved, a 32-bit FT Reconnection Timeout in milliseconds (0 = preserve indefinitely), and a 32-bit Recovery Time in milliseconds (meaningful only when the L bit is set).'
