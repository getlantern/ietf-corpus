document: rfc-2543
kind: design-rationale
summary: SIP is text-based using ISO 10646 in UTF-8 encoding to allow easy implementation in languages like Java, Tcl, and Perl, easy debugging, and flexibility. Since SIP initiates multimedia sessions rather than delivering media, the overhead of text encoding is not considered significant.
section: 1.5.3
topics:
