document: rfc-7198
kind: design-rationale
summary: SRTP encryption does not affect stream de-duplication middleboxes because RTP headers (including SSRC and sequence number fields needed for duplicate identification) are sent in the clear, allowing middleboxes to perform de-duplication without requiring decryption keys.
