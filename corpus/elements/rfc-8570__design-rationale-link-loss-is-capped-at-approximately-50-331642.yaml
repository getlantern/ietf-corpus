document: rfc-8570
kind: design-rationale
summary: Link Loss is capped at approximately 50.331642% (2^24 − 2 units of 0.000003%) because precision is considered more important on high-speed links than the ability to advertise loss rates above this threshold, and links with over 50% loss are effectively unusable.
