document: rfc-3733
kind: protocol-element
summary: The <contact:update> command accepts a contact id and at least one of <contact:add> (status values to add), <contact:rem> (status values to remove), or <contact:chg> (postal info, voice, fax, email, authInfo, disclose to change). A successful response carries no <resData> element.
section: 3.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
