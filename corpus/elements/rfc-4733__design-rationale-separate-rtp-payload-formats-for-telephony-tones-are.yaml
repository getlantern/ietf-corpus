document: rfc-4733
kind: design-rationale
summary: Separate RTP payload formats for telephony tones are defined because low-rate voice codecs cannot reproduce tone signals accurately enough for automatic recognition, and properties such as phase reversals in the ANSam tone do not survive speech coding. Separate formats also permit higher redundancy at a low bit rate.
section: "1.2"
topics:
