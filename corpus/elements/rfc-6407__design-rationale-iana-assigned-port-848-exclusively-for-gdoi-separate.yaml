document: rfc-6407
kind: design-rationale
summary: IANA assigned port 848 exclusively for GDOI, separate from IKE's port 500, so that an implementation may use completely separate ISAKMP stacks to service GDOI and IKE. NAT traversal support MAY move GROUPKEY-PULL processing to port 4500.
section: "2.2"
topics:
    - ipsec
