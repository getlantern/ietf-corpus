document: rfc-7727
kind: protocol-element
summary: The STP Topology Changed Instances TLV (Type=0x2007) reports the list of CIST/MSTI InstanceIDs whose topologies have changed per TCN messages. Each InstanceID is padded to a 16-bit boundary with 4 reserved bits (R=0) in the high nibble.
