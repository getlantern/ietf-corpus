document: rfc-3928
kind: normative-requirement
summary: If the client initiates termination via LDAP Cancel, the server MUST set resultCode to 'canceled' and the cookie MUST be set in the Sync Done control, allowing the client to resume later from that point.
section: 4.4.2
rfc2119_level: MUST
topics:
