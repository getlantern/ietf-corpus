document: rfc-5026
kind: protocol-element
summary: The MIP6_HOME_PREFIX attribute is carried in IKEv2 Configuration Payload messages to convey the home link prefix from which the Mobile Node auto-configures its Home Address. The Mobile Node includes it in CFG_REQUEST with Length=0; the Home Agent returns it in CFG_REPLY with Length=21 and the full prefix information.
section: "8.2"
topics:
    - mobility
    - ipsec
