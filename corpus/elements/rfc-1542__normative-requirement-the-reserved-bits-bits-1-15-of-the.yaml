document: rfc-1542
kind: normative-requirement
summary: The reserved bits (bits 1–15) of the 'flags' field MUST be set to zero by clients in all BOOTREQUEST messages. Servers and relay agents MUST ignore these reserved bits.
section: "2.2"
rfc2119_level: MUST
