document: rfc-5804
kind: normative-requirement
summary: A server MUST check submitted scripts for validity (grammar compliance and supported extensions) on PUTSCRIPT; any script that fails MUST NOT be stored, and the NO response MUST include a human-readable error message with the line number of the first error.
section: "2.6"
rfc2119_level: MUST
