document: rfc-5085
kind: normative-requirement
summary: If no VCCV capability is signaled, the peer MUST assume the peer has no VCCV capability. The receiving PE MUST NOT send any VCCV control channel traffic to a peer that has not indicated VCCV support.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
