summary: 'CR-LDP TLV Type Name Space: subdivides RFC 3036 LDP TLV space in range 0x0800-0x08FF, allocated through IETF Consensus. Initial assignments: ER-TLV (0x0800), IPv4 ER-Hop (0x0801), IPv6 ER-Hop (0x0802), AS Number ER-Hop (0x0803), LSP-ID ER-Hop (0x0804), Traffic Parameters (0x0810), Preemption (0x0820), LSPID (0x0821), Resource Class (0x0822), Route Pinning (0x0823).'
