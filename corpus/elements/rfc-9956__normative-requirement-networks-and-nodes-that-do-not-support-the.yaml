document: rfc-9956
kind: normative-requirement
summary: Networks and nodes that do not support the NQB PHB are RECOMMENDED to treat traffic marked with the NQB DSCP the same as Default DSCP traffic, and SHOULD NOT re-mark NQB-marked packets with a different DSCP, so that downstream hops can still provide NQB PHB treatment.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
