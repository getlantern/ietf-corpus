document: rfc-9847
kind: interoperability-note
summary: This document updates RFC 8447. Registries that already had a 'Comment' or 'Note' column, or were orphaned by TLS 1.3, are excluded from the 'Comment' column additions. Existing 'Y' and 'N' entries in the 'Recommended' column are preserved; only the new 'D' entries and the governance rules are changed.
