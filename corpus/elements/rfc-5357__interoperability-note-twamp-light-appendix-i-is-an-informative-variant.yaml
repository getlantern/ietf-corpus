document: rfc-5357
kind: interoperability-note
summary: TWAMP Light (Appendix I) is an informative variant where the Session-Reflector operates without TWAMP-Control, configured by non-standard means. If the Reflector lacks session state, it MUST copy the received Sequence Number into the Sequence Number field of the reflected packet rather than maintaining an independent counter.
section: Appendix I
topics:
