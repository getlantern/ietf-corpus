document: rfc-3758
kind: normative-requirement
summary: If the decision to abandon a chunk is made and the chunk would have been marked for retransmission (e.g., by T3-Timeout or Fast Retransmit), the appropriate congestion adjustment MUST be made as specified in RFC 2960.
section: "3.5"
rfc2119_level: MUST
topics:
