document: rfc-5261
kind: design-rationale
summary: The XPath id() function MAY be used in selectors to identify unique elements, but requires either a schema-declared ID-typed attribute or an xml:id attribute. Implementations that do not support id() report <unsupported-id-function> or <unsupported-xml-id> errors rather than silently failing.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
