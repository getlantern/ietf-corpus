document: rfc-3265
kind: interoperability-note
summary: Due to forking, a SUBSCRIBE may be accepted by multiple nodes; subscribers MUST be prepared to receive NOTIFY requests with 'From' tags differing from the 'To' tag in the SUBSCRIBE 200-class response. Each dialog resulting from a fork represents a different destination and is handled independently.
section: 3.3.3
topics:
    - sip
    - realtime
