document: rfc-9636
kind: normative-requirement
summary: The typecnt field MUST NOT be zero, even in files with non-empty TZ strings but no transitions, because many TZif readers reject files with zero time types. The charcnt field also MUST NOT be zero.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
