document: rfc-8191
kind: normative-requirement
summary: When HNP renumbering occurs, the LMA MUST notify the MAG about the new HNP, and the MAG MUST announce the new HNP to the attached MN via Router Advertisement or DHCP. Both the LMA and MAG MUST update routing states for the HNP and related addresses.
section: "3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - v6ops
