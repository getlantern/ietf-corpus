document: rfc-9660
kind: normative-requirement
summary: The VERSION value for the SOA-SERIAL type MUST be a copy of the unsigned 32-bit SERIAL field of the SOA RR as defined in RFC 1035 Section 3.3.13. If a zone does not use SOA SERIAL for versioning, the name server SHOULD NOT include a ZONEVERSION option with type SOA-SERIAL.
section: "4"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
