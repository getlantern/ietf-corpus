document: rfc-1368
kind: protocol-element
summary: rptrPortOperStatus reports port status as operational(1), notOperational(2), or notPresent(3). A port is operational(1) even when auto-partitioned; setting rptrPortAdminStatus to disabled(2) is expected to transition the port to notOperational(2) soon after.
section: "4.2"
