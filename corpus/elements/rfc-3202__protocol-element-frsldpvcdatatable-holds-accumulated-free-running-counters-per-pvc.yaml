document: rfc-3202
kind: protocol-element
summary: 'frsldPvcDataTable holds accumulated free-running counters per PVC: frames and octets offered/delivered within CIR and in excess of CIR (both 32-bit Counter32 and 64-bit Counter64 variants), plus UnavailableTime (TimeTicks) and Unavailables (Counter32). It shares the same index as frsldPvcCtrlTable.'
