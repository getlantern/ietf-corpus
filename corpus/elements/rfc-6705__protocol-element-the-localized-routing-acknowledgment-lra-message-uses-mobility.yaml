document: rfc-6705
kind: protocol-element
summary: The Localized Routing Acknowledgment (LRA) message uses Mobility Header type 18. It carries a Sequence Number copied from the LRI, a 'U' unsolicited flag, an 8-bit Status code (0 = success, 128 = Not Allowed, 129 = MN Not Attached), a Lifetime, and Mobility Options with MN-ID/HNP tuples.
section: "10.2"
topics:
    - mobility
