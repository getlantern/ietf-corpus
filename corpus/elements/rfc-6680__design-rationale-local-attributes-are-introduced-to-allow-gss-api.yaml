document: rfc-6680
kind: design-rationale
summary: Local attributes are introduced to allow GSS-API implementations to consolidate policy knowledge (e.g., which certification authorities are trusted for PKINIT) and re-encode mechanism-specific attributes into a single canonical form. This trades interoperability for usability by requiring knowledge of the local implementation but reduces per-application policy logic.
section: "5"
topics:
    - security
