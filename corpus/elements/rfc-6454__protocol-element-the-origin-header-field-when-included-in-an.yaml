document: rfc-6454
kind: protocol-element
summary: The Origin header field, when included in an HTTP request, indicates the origin(s) that caused the user agent to issue the request, as defined by the API that triggered the request. Multiple origins may be listed if multiple origins contributed to causing the request (e.g., through redirects).
section: "7.2"
topics:
    - http
    - security
