document: rfc-6753
kind: normative-requirement
summary: TLS MUST be used for dereferencing location URIs unless confidentiality and integrity are provided by some other mechanism. Location Recipients MUST authenticate the host identity using the domain name in the location URI per Section 3.1 of RFC 2818.
section: "6"
rfc2119_level: MUST
topics:
    - tls
    - security
