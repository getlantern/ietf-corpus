document: rfc-9768
kind: wire-format
summary: 'AccECN0 Option (Kind=172, Length=11): three consecutive 24-bit fields in network byte order — EE0B (24 LSBs of r.e0b), ECEB (24 LSBs of r.ceb), EE1B (24 LSBs of r.e1b). Unchanged tail fields may be omitted; the Length field indicates which fields are present (minimum Length=3 for just EE0B).'
section: 3.2.3
