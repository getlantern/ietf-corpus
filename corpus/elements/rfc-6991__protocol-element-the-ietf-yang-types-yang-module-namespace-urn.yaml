document: rfc-6991
kind: protocol-element
summary: The ietf-yang-types YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-yang-types) defines a collection of generally useful derived YANG data types including counters, gauges, identifiers, date-time, address, and string types. This module obsoletes RFC 6021 and adds yang-identifier, hex-string, uuid, and dotted-quad in the 2013-07-15 revision.
section: "3"
