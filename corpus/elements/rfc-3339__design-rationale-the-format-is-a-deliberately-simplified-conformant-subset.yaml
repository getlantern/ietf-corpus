document: rfc-3339
kind: design-rationale
summary: The format is a deliberately simplified conformant subset of ISO 8601 extended format, making most fields and punctuation mandatory. The full ISO 8601 grammar was deemed too complex for Internet protocol use; only fractional seconds remain optional.
