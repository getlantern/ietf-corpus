document: rfc-5150
kind: normative-requirement
summary: If an egress node of the S-LSP recognizes the 'LSP stitching desired' bit but cannot support the requested stitching behavior, it MUST send back a PathErr message with error code 'Routing Problem' (24) and error value 'Stitching unsupported' (30).
section: 5.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
