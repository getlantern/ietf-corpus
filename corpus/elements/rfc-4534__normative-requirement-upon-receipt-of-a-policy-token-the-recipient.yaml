document: rfc-4534
kind: normative-requirement
summary: 'Upon receipt of a policy token, the recipient MUST verify: (1) the Group Owner identity matches the expected entity; (2) the signing-time is more recent than any previously received token for that group; (3) the CMS signature validates per RFC 3852; and (4) the specified mechanisms are supported and comply with local policy.'
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
