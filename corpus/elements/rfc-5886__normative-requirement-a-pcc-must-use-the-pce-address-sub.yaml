document: rfc-5886
kind: normative-requirement
summary: A PCC MUST use the PCE-ADDRESS sub-TLV address (advertised via IGP discovery per RFC5088/RFC5089) in PCReq and PCMonReq messages; a PCE MUST also use this address in PCRep and PCMonRep messages.
section: "4.3"
rfc2119_level: MUST
