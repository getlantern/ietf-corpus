document: rfc-5601
kind: protocol-element
summary: 'pwRemoteStatusCapable (INTEGER: notApplicable/notYetKnown/remoteCapable/remoteNotCapable) indicates whether the remote node can advertise PW status notifications. It SHOULD report notApplicable for manually configured PWs or when the local node cannot accept status notification objects.'
