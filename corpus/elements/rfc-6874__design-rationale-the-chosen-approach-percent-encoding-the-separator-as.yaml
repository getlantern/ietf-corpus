document: rfc-6874
kind: design-rationale
summary: The chosen approach — percent-encoding the "%" separator as "%25" to form IPv6addrz — was selected over five alternatives including leaving the problem unsolved, using a bare "%", using an alternative separator like "-", using IPvFuture syntax, because it is consistent with general URI syntax (RFC 3986) while allowing browser use.
