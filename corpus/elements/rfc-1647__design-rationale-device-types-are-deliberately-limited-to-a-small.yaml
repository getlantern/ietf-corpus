document: rfc-1647
kind: design-rationale
summary: 'Device-types are deliberately limited to a small set of logical names (IBM-3278-x, IBM-3287-1) rather than a comprehensive list of physical IBM hardware models. This simplifies negotiation and decouples capability discovery from device naming: actual extended data stream capabilities are determined via the Read Partition Query / Query Reply mechanism, not by the device-type string.'
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
