document: rfc-3959
kind: design-rationale
summary: Application servers need a means to perform an offer/answer exchange with the UAC that is independent from the offer/answer exchange between both UAs, because the UAC may have applied end-to-end encryption or included key management information in the original offer that the application server is not supposed to use.
section: "3"
topics:
    - sip
    - realtime
    - security
