document: rfc-4338
kind: normative-requirement
summary: An FC Information Unit containing an IPv6 or IPv4 packet MUST carry the FC Network_Header (16 octets) and the LLC/SNAP header (8 octets). To support the minimum IPv6 MTU of 1280 octets, an Nx_Port MUST be able to transmit and receive an FC-4 Information Unit at least 1304 octets long.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
