document: rfc-7697
kind: protocol-element
summary: mplsOamIdMeServicePointer is a RowPointer in the ME table that references the actual transport path entry (mplsTunnelEntry for tunnel/lsp/section types, or pwEntry for pseudowire type). Placing it in the ME table rather than the MEG table enables point-to-multipoint support where each ME leaf points to a different branch.
