document: rfc-8005
kind: normative-requirement
summary: A HIP end-node implementation SHOULD NOT authenticate its HIP peers based solely on a HIT retrieved from the DNS, but rather SHOULD use HI-based authentication, due to the potential for hash collision attacks.
section: "8.2"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
    - crypto
