document: rfc-9251
kind: normative-requirement
summary: A PE that supports IGMP and/or MLD Proxy on a given BD MUST attach the Multicast Flags Extended Community to its IMET route advertisement for that BD and MUST set the corresponding IGMP and/or MLD Proxy Support flags to 1. Absence of this community indicates no IGMP/MLD Proxy support.
section: "9.4"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
