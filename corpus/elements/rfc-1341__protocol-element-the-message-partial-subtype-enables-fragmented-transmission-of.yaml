document: rfc-1341
kind: protocol-element
summary: The 'message/partial' subtype enables fragmented transmission of large message bodies. It requires 'id', 'number', and 'total' parameters identifying the fragment group, sequence position, and total count; fragments must be reassembled in 'number' order before the body is presented.
section: 7.3.2
