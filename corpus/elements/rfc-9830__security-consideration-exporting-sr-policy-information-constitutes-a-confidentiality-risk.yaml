document: rfc-9830
kind: security-consideration
summary: Exporting SR Policy information constitutes a confidentiality risk by revealing endpoint/node addresses, SR SIDs, and deployed SR Policies. Operators are responsible for ensuring only trusted nodes (routers and controller applications) within the SR domain are configured to receive SR Policy BGP updates.
section: "7"
topics:
