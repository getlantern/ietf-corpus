document: rfc-1413
kind: protocol-element
summary: The special OS type 'OTHER' indicates the identifier is an unformatted printable string not conforming to normal user-identifier constraints, such as an encrypted audit token or real-name/phone-number data. 'OTHER' should be used whenever the identifier does not uniquely identify the connection owner in a directly usable form.
