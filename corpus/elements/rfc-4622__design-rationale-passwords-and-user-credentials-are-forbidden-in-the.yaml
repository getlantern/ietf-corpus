document: rfc-4622
kind: design-rationale
summary: Passwords and user credentials are forbidden in the authority component of XMPP IRIs/URIs because XMPP authentication occurs via SASL, which supports the ANONYMOUS mechanism and does not require embedding credentials in URIs.
section: "5.4"
topics:
    - security
