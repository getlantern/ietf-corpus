document: rfc-8660
kind: protocol-element
summary: A local segment MAY be allocated from the SRLB (Segment Routing Local Block) or from any unused label not in the special-purpose range. The SRLB consists of local labels reserved by the node for certain local segments, with the same structural rules as the SRGB.
section: "2.3"
topics:
