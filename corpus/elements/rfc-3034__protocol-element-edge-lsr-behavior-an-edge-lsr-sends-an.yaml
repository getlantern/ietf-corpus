document: rfc-3034
kind: protocol-element
summary: 'Edge LSR behavior: an edge LSR sends an LDP request to the downstream FR-LSR for a label binding; upon receiving the LDP mapping (which may include a hop count object), it stores the label as outgoing in the LIB and may begin MPLS forwarding. When it receives an LDP request from a FR-LSR, it is acting as egress: it allocates a label and returns a mapping with hop count set to 1.'
section: "7.1"
topics:
    - mpls
