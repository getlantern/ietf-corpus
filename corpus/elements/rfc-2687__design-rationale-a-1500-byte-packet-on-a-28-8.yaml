document: rfc-2687
kind: design-rationale
summary: A 1500-byte packet on a 28.8 kbit/s modem link occupies the link for about 400 ms, causing worst-case round-trip delays on the order of a second, which is unacceptable for real-time conversation. A suspend/resume encapsulation allows higher-priority real-time packets to preempt long packets mid-transmission.
section: "1"
topics:
