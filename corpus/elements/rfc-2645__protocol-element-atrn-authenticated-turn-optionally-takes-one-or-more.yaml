document: rfc-2645
kind: protocol-element
summary: 'ATRN (Authenticated TURN) optionally takes one or more comma-separated domains as parameters. An ATRN with no domains is equivalent to requesting all domains the customer is authorized for. ABNF: atrn = ''ATRN'' [SP domain *('','' domain)].'
section: 5.2.1
topics:
    - email
