document: rfc-2605
kind: security-consideration
summary: SNMPv1 provides no security controls; even on an IPsec-secured network, SNMPv1 cannot restrict which principals can GET MIB objects. SNMPv3 is recommended as the management protocol for this MIB.
section: Security Considerations
topics:
