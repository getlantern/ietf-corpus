document: rfc-6510
kind: normative-requirement
summary: LSP_ATTRIBUTES and LSP_REQUIRED_ATTRIBUTES objects MAY be carried in a Path message. LSRs MUST be prepared to receive these objects in any order in any position within a Path message.
