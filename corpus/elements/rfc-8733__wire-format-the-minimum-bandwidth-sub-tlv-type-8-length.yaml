document: rfc-8733
kind: wire-format
summary: The Minimum-Bandwidth Sub-TLV (Type=8, Length=4) and Maximum-Bandwidth Sub-TLV (Type=9, Length=4) each carry a 4-octet IEEE 754 bandwidth value in bytes per second. Minimum-Bandwidth defaults to 0; Maximum-Bandwidth has no default. The LSP bandwidth cannot be adjusted outside these bounds.
section: 5.2.4
topics:
