document: rfc-5837
kind: wire-format
summary: 'The C-Type byte encodes both the interface role (bits 0-1: 0=incoming, 1=sub-IP incoming, 2=outgoing, 3=next-hop) and presence flags for optional fields (bit 4=ifIndex, bit 5=IP Address Sub-Object, bit 6=Interface Name Sub-Object, bit 7=MTU). Bits 2-3 are reserved and MUST be set to 0.'
section: "4.1"
topics:
