document: rfc-5860
kind: normative-requirement
summary: The use of any OAM function MUST be optional, and it MUST be possible to select the set of OAM functions to use on any PW, LSP, or Section. Unless otherwise stated, OAM functionalities MUST NOT rely on user traffic.
section: "2.2"
rfc2119_level: MUST
