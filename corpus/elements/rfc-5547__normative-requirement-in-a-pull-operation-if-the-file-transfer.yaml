document: rfc-5547
kind: normative-requirement
summary: In a pull operation, if the 'file-transfer-id' value has been previously used within the session, the file sender MUST NOT alert the user and MUST NOT start a new transfer of the file.
section: 8.3.2
rfc2119_level: MUST NOT
