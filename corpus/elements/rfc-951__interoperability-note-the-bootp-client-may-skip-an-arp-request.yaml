document: rfc-951
kind: interoperability-note
summary: The BOOTP client may skip an ARP request for the server/gateway during the TFTP phase by using the hardware source address from the BOOTP reply's link-layer encapsulation. This should be treated as an optimization only, since second-phase-only boots (TFTP with pre-known addresses) must still be supported independently.
section: "5"
topics:
