document: rfc-5608
kind: normative-requirement
summary: RADIUS servers compliant to this specification MUST use RADIUS service provisioning attributes to specify SNMP access over a secure transport, and MAY use 'hint' attributes from the Access-Request when determining what service to provision.
section: "2.3"
rfc2119_level: MUST
topics:
