document: rfc-3814
kind: protocol-element
summary: 'The MPLS-FTN-STD-MIB consists of three tables: mplsFTNTable (defines FEC-to-NHLFE matching rules and actions), mplsFTNMapTable (activates rules on specific interfaces), and mplsFTNPerfTable (provides per-interface performance counters for active rules). This MIB resides on any LSR performing FEC-to-NHLFE mapping at ingress.'
section: "5"
