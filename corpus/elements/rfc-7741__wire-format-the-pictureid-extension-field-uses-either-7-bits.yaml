document: rfc-7741
kind: wire-format
summary: The PictureID extension field uses either 7 bits (M=0) or 15 bits (M=1) to carry a running frame index. The M bit in the first octet of the PictureID field signals which size is in use; receivers MUST NOT assume the size stays constant through the session.
section: "4.2"
