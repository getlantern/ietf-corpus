document: rfc-7964
kind: normative-requirement
summary: For a particular <AFI, SAFI>, a route reflector MUST include that <AFI, SAFI> with the 'Send/Receive' field set to 2 (send multiple paths) or 3 (send/receive multiple paths) in the ADD-PATH Capability advertised to an IBGP peer.
section: "5.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
