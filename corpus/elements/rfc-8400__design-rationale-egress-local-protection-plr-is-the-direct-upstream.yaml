document: rfc-8400
kind: design-rationale
summary: Egress local protection (PLR is the direct upstream node of the egress) provides faster failure detection than ingress-based protection because the PLR is closer to the failed egress node, allowing it to detect and react to egress failure more quickly and reliably than a multi-hop BFD session from the ingress.
section: "6.1"
topics:
    - routing
    - mpls
