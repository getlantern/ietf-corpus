document: rfc-8249
kind: normative-requirement
summary: When an RBridge joins and its originatingL1LSPBufferSize is smaller than the current Sz, any LSP greater than the reduced Sz MUST be split and/or LSP contents MUST be otherwise redistributed so that no LSP exceeds the new Sz.
section: "4"
rfc2119_level: MUST
topics:
    - routing
