document: rfc-9549
kind: normative-requirement
summary: When evaluating name constraints for DNS names, conforming implementations MUST perform a case-insensitive exact match on a label-by-label basis; any DNS name formed by adding labels to the left of the constraint domain is considered within the indicated subtree.
section: "2.3"
rfc2119_level: MUST
topics:
