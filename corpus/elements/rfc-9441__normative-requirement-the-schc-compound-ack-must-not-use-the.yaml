document: rfc-9441
kind: normative-requirement
summary: The SCHC Compound ACK MUST NOT use the Compressed Bitmap format for intermediate windows/bitmaps; intermediate bitmap fields MUST be of size WINDOW_SIZE. The SCHC Compound ACK MAY use a Compressed Bitmap format only for the last bitmap, and its optional usage MUST be specified by the technology-specific SCHC Profile.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
