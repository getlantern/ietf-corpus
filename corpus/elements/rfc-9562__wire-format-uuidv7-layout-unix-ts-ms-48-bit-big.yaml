summary: 'UUIDv7 layout: unix_ts_ms (48-bit big-endian unsigned milliseconds since Unix Epoch, bits 0-47), ver=0b0111 (4-bit, bits 48-51), rand_a (12-bit random or counter, bits 52-63), var=0b10 (2-bit, bits 64-65), rand_b (62-bit random or counter, bits 66-127). UUIDv7 is valid until year 10889 AD.'
