document: rfc-1334
kind: design-rationale
summary: CHAP's use of an incrementally changing Identifier and variable Challenge Value provides protection against playback attacks; repeated re-challenges during Network-Layer phase limit the window of exposure to any single attack, with the authenticator in control of challenge frequency.
