document: rfc-9887
kind: normative-requirement
summary: Implementations MUST support the TLS SNI extension (RFC 6066 Section 3). TLS TACACS+ clients MUST support configuring the server's domain name for inclusion in the SNI 'server_name' extension of the client hello.
section: 3.4.2
rfc2119_level: MUST
topics:
