document: rfc-7162
kind: normative-requirement
summary: When messages fail the UNCHANGEDSINCE test, the server MUST return a MODIFIED response code listing the failed message numbers or UIDs. An untagged FETCH response including the MODSEQ data item MUST be sent for each message on which the operation succeeded, even if .SILENT was specified.
section: 3.1.3
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
