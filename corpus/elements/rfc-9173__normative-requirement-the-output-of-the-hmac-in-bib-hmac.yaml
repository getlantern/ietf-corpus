document: rfc-9173
kind: normative-requirement
summary: 'The output of the HMAC in BIB-HMAC-SHA2 MUST be equal to the size of the SHA-2 hashing function used: 256 bits for SHA-256, 384 bits for SHA-384, and 512 bits for SHA-512.'
section: "3.1"
rfc2119_level: MUST
