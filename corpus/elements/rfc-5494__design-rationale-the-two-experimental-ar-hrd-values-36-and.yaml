document: rfc-5494
kind: design-rationale
summary: The two experimental ar$hrd values (36 and 256) were purposely chosen to straddle the 255 boundary so implementers can test both 1-octet and 2-octet code paths. The differing least/most significant octets also aid in distinguishing endianness issues.
