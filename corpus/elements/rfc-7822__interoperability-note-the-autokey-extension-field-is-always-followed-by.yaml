document: rfc-7822
kind: interoperability-note
summary: The Autokey extension field is always followed by a MAC; Section 10 of RFC 5906 specifies parsing rules for distinguishing extension fields from MACs in that context. This document clarifies that other extension fields do not require a trailing MAC.
section: "1"
