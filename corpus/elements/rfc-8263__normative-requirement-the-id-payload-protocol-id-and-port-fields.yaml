document: rfc-8263
kind: normative-requirement
summary: The ID payload Protocol ID and Port fields MUST be set to 0. The IP address in the ID payload MUST match the source IP address used for the GM's most recent GROUPKEY-PULL exchange. Supported ID Types are ID_IPV4_ADDR, ID_IPV6_ADDR, or ID_OID.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
