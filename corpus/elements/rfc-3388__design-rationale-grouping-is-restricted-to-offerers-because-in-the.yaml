document: rfc-3388
kind: design-rationale
summary: Grouping is restricted to offerers because in the SIP two-way SDP exchange model, an answerer that requested grouping would have no way to know whether the offerer accepted it. An answerer wishing to group media SHOULD issue a subsequent offer (e.g., re-INVITE).
section: "8.2"
topics:
    - realtime
    - sip
