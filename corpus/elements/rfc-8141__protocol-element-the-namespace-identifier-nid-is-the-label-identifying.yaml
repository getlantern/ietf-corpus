document: rfc-8141
kind: protocol-element
summary: 'The Namespace Identifier (NID) is the label identifying a URN namespace. NIDs are case insensitive ("ISBN" and "isbn" are equivalent), restricted to ASCII, and 2–32 characters long following the ABNF: NID = (alphanum) 0*30(ldh) (alphanum), where ldh = alphanum / "-".'
section: "2.1"
