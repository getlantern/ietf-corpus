document: rfc-8495
kind: normative-requirement
summary: For the EPP <create> command, the command MUST contain a child <allocationToken:allocationToken> element for the client to be authorized to create and allocate the object. If the token does not apply, the server MUST return EPP error 2201.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
