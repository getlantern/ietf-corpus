document: rfc-8660
kind: protocol-element
summary: The NEXT operation pops the topmost MPLS label; the action before and/or after popping depends on the instruction associated with the active SID. For an Adj-SID, after popping, the packet is sent out the physical or virtual interface toward the next hop corresponding to the Adj-SID.
section: 2.7.3
topics:
    - mpls
    - routing
