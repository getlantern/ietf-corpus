document: rfc-6470
kind: security-consideration
summary: The netconf-capability-change notification exposes which capability URIs were added, deleted, or modified. An attacker who understands specific capability URI strings (e.g., a packet-capture monitoring capability) could use this to identify attack vectors or eavesdropping opportunities on the device.
section: "4"
topics:
    - netconf
    - security
