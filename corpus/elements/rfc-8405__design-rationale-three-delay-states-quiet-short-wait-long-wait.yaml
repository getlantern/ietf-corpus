document: rfc-8405
kind: design-rationale
summary: Three delay states (QUIET, SHORT_WAIT, LONG_WAIT) are defined to distinguish a single isolated failure (QUIET→SHORT_WAIT, fast response), a multi-event single-component failure (SHORT_WAIT, moderate delay), and sustained instability (LONG_WAIT, long delay for resource conservation). This tiered approach balances convergence speed with stability.
