document: rfc-9067
kind: wire-format
summary: 'The metric-modification-type enumeration governs set-metric behavior: ''set-metric'' replaces the metric, ''add-metric'' adds (clamping at 0xffffffff on overflow), and ''subtract-metric'' subtracts (clamping at 0 on underflow). The metric value is uint32.'
