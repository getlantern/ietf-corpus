document: rfc-8826
kind: normative-requirement
summary: The WebRTC system MUST NOT provide any APIs to extract long-term keying material or to directly access stored traffic keys. Such APIs would allow an attacker who subsequently compromised the calling service to recover traffic keys and decrypt recorded calls.
section: 4.3.1
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
