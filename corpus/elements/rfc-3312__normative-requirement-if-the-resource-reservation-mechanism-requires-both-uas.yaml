document: rfc-3312
kind: normative-requirement
summary: If the resource reservation mechanism requires both UAs, the answerer SHOULD start reservation after sending the answer and the offerer SHOULD start after receiving the answer. Both user agents MUST keep their local status tables up to date using local information throughout the session.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - sip
    - qos
