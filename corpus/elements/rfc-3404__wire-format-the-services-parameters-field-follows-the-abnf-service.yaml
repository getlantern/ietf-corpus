document: rfc-3404
kind: wire-format
summary: 'The Services Parameters field follows the ABNF: service_field = [ [protocol] *("+" rs)], where protocol and rs are each limited to 32 characters and must start with an alphabetic character. An optional protocol specification is followed by zero or more resolution services, each preceded by ''+''.'
