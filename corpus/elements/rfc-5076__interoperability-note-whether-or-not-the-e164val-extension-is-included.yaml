document: rfc-5076
kind: interoperability-note
summary: Whether or not the e164val extension is included in an EPP request or response depends on local registry policy. A registry may require it for `<create>`, `<update>`, and `<info>` commands but not support it for `<transfer>` and `<renew>` commands; this policy determination is outside the scope of this document.
