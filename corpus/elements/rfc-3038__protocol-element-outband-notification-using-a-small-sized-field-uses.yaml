document: rfc-3038
kind: protocol-element
summary: Outband notification using a small-sized field uses the 7-bit BLLI (Broadband Low Layer Information) user-specific field in ATM Forum UNI 3.1/4.0 SETUP messages as a temporary identifier during VCID notification when no field large enough to carry a full VCID is available.
