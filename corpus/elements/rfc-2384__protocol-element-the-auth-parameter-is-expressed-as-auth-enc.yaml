document: rfc-2384
kind: protocol-element
summary: The auth parameter is expressed as ";AUTH=<enc-auth-type>" appended to the user name. If the mechanism name is not preceded by "+", it is a SASL mechanism; if preceded by "+", it is APOP or an extension mechanism.
