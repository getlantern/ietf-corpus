document: rfc-2961
kind: protocol-element
summary: The Ack message (Msg Type 13) carries one or more MESSAGE_ID_ACK or MESSAGE_ID_NACK objects and MUST NOT contain MESSAGE_ID objects. It is addressed to the unicast address of the node that generated the message being acknowledged, found in the RSVP_HOP object for Path/Resv or in the IP source address for other messages.
section: "4.4"
topics:
    - qos
