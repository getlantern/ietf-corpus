document: rfc-1158
kind: wire-format
summary: All MIB-II objects are described in ASN.1 and encoded on the wire using the Basic Encoding Rules (BER) of ASN.1, subject to additional constraints imposed by SNMP (RFC 1157). Object type syntax must resolve to instances of ObjectSyntax defined in the SMI (RFC 1155); the SMI restricts the ASN.1 constructs that may be used.
section: "4"
topics:
