document: rfc-9742
kind: protocol-element
summary: TLS transport configuration reuses the ietf-tls-client grouping from RFC 9645, supporting client identity (X.509 certificate, raw public key, TLS 1.2 PSK, TLS 1.3 EPSK), server authentication (CA certs, end-entity certs, raw public keys, PSKs), hello parameters (TLS version range, cipher suites), and keepalives.
