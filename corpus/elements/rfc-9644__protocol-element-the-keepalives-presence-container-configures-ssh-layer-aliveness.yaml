document: rfc-9644
kind: protocol-element
summary: The 'keepalives' presence container configures SSH-layer aliveness probing using SSH_MSG_GLOBAL_REQUEST, with leaf max-wait (uint16, default 30 seconds) and max-attempts (uint8, default 3); an unresponsive peer is dropped after approximately max-wait * max-attempts seconds.
