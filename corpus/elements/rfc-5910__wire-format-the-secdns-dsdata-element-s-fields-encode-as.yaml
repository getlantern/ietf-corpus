document: rfc-5910
kind: wire-format
summary: 'The <secDNS:dsData> element''s fields encode as: <secDNS:keyTag> as unsignedShort (16-bit), <secDNS:alg> as unsignedByte (8-bit algorithm number), <secDNS:digestType> as unsignedByte (8-bit digest algorithm identifier), and <secDNS:digest> as hexBinary. Together these four fields are guaranteed to uniquely identify a DS record.'
section: "4.1"
topics:
    - dns
    - security
