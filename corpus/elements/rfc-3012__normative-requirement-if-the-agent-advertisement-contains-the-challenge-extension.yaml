document: rfc-3012
kind: normative-requirement
summary: If the Agent Advertisement contains the Challenge extension and the mobile node has no security association with the Foreign Agent, it MUST include the Challenge value in a MN-FA Challenge extension in the Registration Request.
section: "3.1"
rfc2119_level: MUST
