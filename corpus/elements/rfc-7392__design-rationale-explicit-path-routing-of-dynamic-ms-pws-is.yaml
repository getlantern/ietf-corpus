document: rfc-7392
kind: design-rationale
summary: Explicit path routing of dynamic MS-PWs is introduced to support 1:1 protection with diverse primary and backup paths through distinct Switching Provider Edges (S-PEs), avoiding single points of failure at the PW level. It also enables controlled (strict or loose) signaling for special MS-PWs and network resource management.
section: "1"
topics:
    - mpls
