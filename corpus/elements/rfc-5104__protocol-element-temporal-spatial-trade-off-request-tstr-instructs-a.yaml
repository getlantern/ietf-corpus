document: rfc-5104
kind: protocol-element
summary: 'Temporal-Spatial Trade-off Request (TSTR) instructs a video encoder to adjust its trade-off between temporal and spatial resolution. Index values 0–31 indicate monotonically increasing preference for higher frame rate: 0 = highest spatial quality at low frame rate, 31 = highest frame rate at potentially low spatial quality.'
