document: rfc-2572
kind: security-consideration
summary: For incoming Response Class PDUs, if the securityModel, securityName, securityLevel, contextEngineID, or contextName values differ from the cached values for the outstanding request, the message is discarded. An implementation may optionally retain cached state to handle the case where the response might be illegitimate.
section: "7.2"
topics:
    - snmp
    - security
