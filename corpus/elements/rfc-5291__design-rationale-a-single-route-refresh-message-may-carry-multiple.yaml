document: rfc-5291
kind: design-rationale
summary: A single ROUTE-REFRESH message may carry multiple ORF entries in one or more ORFs provided all entries share the same AFI/SAFI. A speaker can distinguish an ORF-carrying ROUTE-REFRESH from a plain one by inspecting the BGP message header's Length field.
