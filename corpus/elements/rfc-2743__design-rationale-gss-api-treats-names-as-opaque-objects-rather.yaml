document: rfc-2743
kind: design-rationale
summary: GSS-API treats names as opaque objects rather than prescribing naming structures, supporting implementability atop a range of underlying security mechanisms that process names in different forms. Generalized name translation services are explicitly outside GSS-API scope; local conversion functions are anticipated.
section: 1.1.5
topics:
    - security
