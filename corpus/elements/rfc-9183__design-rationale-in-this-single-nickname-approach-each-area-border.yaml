document: rfc-9183
kind: design-rationale
summary: In this single-nickname approach, each area border RBridge uses its own nickname in both L1 and L2 — no separate nicknames are assigned to represent L1 areas. An L1 area is instead identified by the set of all border RBridge nicknames attached to it, which scales better than unique-nickname solutions while remaining simpler than full aggregated-nickname approaches.
section: "1"
topics:
