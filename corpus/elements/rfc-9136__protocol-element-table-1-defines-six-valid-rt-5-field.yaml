summary: 'Table 1 defines six valid RT-5 field combinations: non-zero ESI (zero GW IP) implies ESI Overlay Index; zero ESI with non-zero GW IP implies GW IP Overlay Index; zero ESI and GW IP with non-zero MAC and zero Label implies MAC Overlay Index; zero ESI and GW IP with non-zero Label implies no Overlay Index (interface-less model).'
