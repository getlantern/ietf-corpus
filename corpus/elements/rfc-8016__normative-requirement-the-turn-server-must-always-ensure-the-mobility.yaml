document: rfc-8016
kind: normative-requirement
summary: The TURN server MUST always ensure the mobility ticket is authenticated and encrypted using strong cryptographic algorithms, and the ticket MUST be constructed to have strong entropy so nothing can be gleaned by examining it alone.
section: "5"
rfc2119_level: MUST
