document: rfc-2646
kind: protocol-element
summary: Space-stuffing adds a single leading space to any line that starts with '>', a space, or 'From ' when the message is generated. On reception, if the first character of a line is a space, it is logically deleted before the flowed test.
section: "4.4"
topics:
    - email
