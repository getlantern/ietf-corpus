document: rfc-9754
kind: normative-requirement
summary: A change in the access time MUST NOT advance the change time (time_metadata). A change in modify time may advance the change time; if modify time is greater than change time and before current time, change time is adjusted to modify time, not to current time.
section: "5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
