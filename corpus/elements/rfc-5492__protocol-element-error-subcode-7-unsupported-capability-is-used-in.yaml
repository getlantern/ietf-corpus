document: rfc-5492
kind: protocol-element
summary: Error Subcode 7, Unsupported Capability, is used in a NOTIFICATION message when a BGP speaker determines that its peer lacks a required capability without which the peering cannot proceed. The Data field lists all offending capabilities.
