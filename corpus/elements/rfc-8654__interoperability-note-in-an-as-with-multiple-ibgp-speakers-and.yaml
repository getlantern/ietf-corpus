document: rfc-8654
kind: interoperability-note
summary: In an AS with multiple iBGP speakers and external neighbors, a consistent internal view requires all iBGP speakers to advertise the BGP Extended Message Capability; if not, the operator should consider whether to advertise the capability to external peers.
