document: rfc-2165
kind: interoperability-note
summary: When multicast is unavailable, SAs SHOULD and DAs MUST listen for broadcast Service Location messages on port 427. Multi-subnet broadcast environments require statically or DHCP-configured DA addresses since dynamic discovery via broadcast is not feasible across subnets.
section: 3.6.1
topics:
    - multicast
