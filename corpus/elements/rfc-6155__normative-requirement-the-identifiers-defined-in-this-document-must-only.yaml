document: rfc-6155
kind: normative-requirement
summary: The identifiers defined in this document MUST only be used where that identifier is the basis for location determination; a LIS MUST NOT allow alternative identifiers merely for convenience if doing so could cause the identifier to refer to a different Device.
section: "2.1"
rfc2119_level: MUST
topics:
