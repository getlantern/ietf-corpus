document: rfc-9174
kind: wire-format
summary: 'The Contact Header is a 6-octet structure: a 4-octet magic field containing ''dtn!'' (0x64 0x74 0x6E 0x21), a 1-octet Version field (value 4 for TCPCLv4), and a 1-octet Flags field where bit 0x01 is the CAN_TLS flag. Reserved flag bits SHALL be set to 0 by the sender and SHALL be ignored by the receiver.'
section: "4.2"
topics:
    - tls
    - security
