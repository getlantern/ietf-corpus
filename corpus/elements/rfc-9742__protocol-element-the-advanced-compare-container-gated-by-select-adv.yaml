summary: The 'advanced-compare' container (gated by select-adv-compare feature) extends severity filtering with a 'compare' leaf (equals or equals-or-higher, default equals-or-higher) and an 'action' leaf (log, block, or stop). It is not applicable when severity is 'all' or 'none'.
