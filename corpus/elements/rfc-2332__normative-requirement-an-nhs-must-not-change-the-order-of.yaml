document: rfc-2332
kind: normative-requirement
summary: An NHS MUST NOT change the order of extensions in an NHRP packet. If a transit NHS encounters an unrecognized extension with the Compulsory bit set, it MUST NOT cache the packet's information and MUST NOT identify itself as an egress router; it may only act as a forwarding agent.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - ip
