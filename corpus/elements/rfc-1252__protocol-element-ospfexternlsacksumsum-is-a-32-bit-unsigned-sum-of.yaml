document: rfc-1252
kind: protocol-element
summary: ospfExternLSACksumSum is a 32-bit unsigned sum of LS checksums for all AS external (type 5) LSAs in the link-state database; ospfAreaLSACksumSum is the analogous sum per area excluding type-5 LSAs. Both sums can detect database changes and compare databases between two routers.
section: "5.1"
topics:
    - snmp
    - routing
