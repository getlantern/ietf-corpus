document: rfc-5276
kind: design-rationale
summary: Separating preservation of certification path information from preservation of data enables long-term archive (LTA) servers to store archived data objects more efficiently; complete verification information need not be stored with each archived data object, and verifiers can reuse the same certification path to verify multiple archived data objects of similar vintage.
section: "1"
topics:
