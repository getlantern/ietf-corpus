document: rfc-1665
kind: normative-requirement
summary: The Agent automatically deletes rows with RowStatus equal to 'notReady (3)' if they remain in that state for more than a default period of 5 minutes. Additionally, all 'notReady' rows are removed upon the next SNA services initialization.
section: "4"
rfc2119_level: MUST
topics:
