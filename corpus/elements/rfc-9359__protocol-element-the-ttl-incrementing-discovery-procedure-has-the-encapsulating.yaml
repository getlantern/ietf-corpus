document: rfc-9359
kind: protocol-element
summary: The TTL-incrementing discovery procedure has the encapsulating node send echo requests starting with TTL=1, then TTL=2, incrementing by 1 each time until an echo reply is received from the IOAM decapsulating node (identified by the Edge-to-Edge Capabilities Object or End-of-Domain Object). This progressively reaches all nodes along the transport path.
section: "4"
