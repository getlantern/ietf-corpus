document: rfc-8665
kind: interoperability-note
summary: The SR-Algorithm TLV and SID/Label Range TLV semantics are applicable to both OSPFv2 and OSPFv3; the OSPFv3-specific extensions are defined separately in RFC 8666. The IPv6 data plane is out of scope for this document, which only applies to OSPFv2 and the IPv4 address family.
section: "3"
topics:
