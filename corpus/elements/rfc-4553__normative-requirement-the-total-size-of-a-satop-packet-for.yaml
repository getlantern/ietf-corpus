document: rfc-4553
kind: normative-requirement
summary: The total size of a SAToP packet for a specific PW MUST NOT exceed the path MTU between the pair of PEs terminating that PW. SAToP implementations using an IPv4 PSN MUST mark the IPv4 datagrams they generate as Don't Fragment.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
