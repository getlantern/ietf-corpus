document: rfc-9621
kind: design-rationale
summary: Racing (borrowing terminology from Happy Eyeballs, RFC 8305) is built into the Transport Services Implementation rather than requiring each application to implement it separately. This enables simultaneous, synchronous, serial, or hybrid attempts across Candidate Paths and Protocol Stacks to select the most optimal combination.
section: 4.2.2
topics:
    - multipath
    - dns
