document: rfc-3962
kind: protocol-element
summary: The initial vector carried forward from one encryption to the next is the next-to-last block of the encryption output (the encrypted form of the last plaintext block). When decrypting, the next-to-last block of the ciphertext is used as the next IV. If only one block is available, that single block is carried out instead.
section: "5"
topics:
    - crypto
    - security
