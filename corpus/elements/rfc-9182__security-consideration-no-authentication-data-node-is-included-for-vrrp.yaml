document: rfc-9182
kind: security-consideration
summary: No authentication data node is included for VRRP because RFC 5798 §9 defines no VRRP authentication mechanism; deployments relying on VRRP for PE-CE gateway redundancy should be aware that VRRP protocol traffic cannot be authenticated through the L3NM.
section: 7.6.3.6
topics:
    - security
