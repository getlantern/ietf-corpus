document: rfc-8412
kind: normative-requirement
summary: A SWIMA-PC MUST completely support all requirements of this specification for every source of software inventory it uses; a potential source that cannot support some required functionality (e.g., change-event monitoring) MUST NOT be used at all, even if it could provide partial information.
section: "3.1"
rfc2119_level: MUST
topics:
