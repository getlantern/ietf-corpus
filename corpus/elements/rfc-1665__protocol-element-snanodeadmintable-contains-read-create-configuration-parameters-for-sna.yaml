kind: protocol-element
summary: snaNodeAdminTable contains read-create configuration parameters for SNA Nodes (PU types 1.0, 2.0, 2.1). It includes snaNodeAdminState (desired state), snaNodeAdminRowStatus (row lifecycle), node type, XID format, block number, ID number, enabling method, LU termination default, max LUs, host description, and stop method.
