document: rfc-1757
kind: normative-requirement
summary: Wherever possible, the agent should validate row parameter objects when each individual object is set, rather than deferring all validation until entryStatus is set to valid. Deferred validation makes it impossible for the management station to identify which parameter caused a badValue error.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
