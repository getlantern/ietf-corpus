kind: protocol-element
summary: 'Two profile table types are defined: adslLineConfProfileTable for configuration parameters and adslLineAlarmConfProfileTable for alarm thresholds. Profiles are referenced by name (SnmpAdminString, 1..32 chars) from adslLineTable via adslLineConfProfile and adslLineAlarmConfProfile.'
