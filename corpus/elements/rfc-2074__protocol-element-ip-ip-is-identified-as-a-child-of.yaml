summary: IP (ip) is identified as a child of ether2 (0x0800), llc (0x06), snap (0x0800), and also as ip-in-ip (ip protocol 4) and ip-in-ip with encapsulation (ip protocol 94). IP children are selected by the 1-octet Protocol field, encoded as [0.0.0.a].
