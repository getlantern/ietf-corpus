document: rfc-7219
kind: protocol-element
summary: The SEND SAVI Prefix List stores link prefixes learned from Prefix Information options (L-bit set) in RADV messages arriving on Trusted ports, or configured manually. Manually configured entries use lifetime 0xffffffff (infinity). The list is not port-specific.
