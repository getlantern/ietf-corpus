document: rfc-9788
kind: protocol-element
summary: hcp_shy is a more privacy-preserving HCP that builds on hcp_baseline and additionally strips display names from From/To/Cc addresses (leaving only addr-spec) and normalizes the Date Header Field to UTC, reducing metadata leakage without affecting routing.
