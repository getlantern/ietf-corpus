document: rfc-2095
kind: interoperability-note
summary: CRAM-MD5 is intended as an improvement over APOP for POP3 use (RFC 1734) and as an addition to IMAP4 authentication (RFC 1731). The base64 encoding of challenges and responses is part of the IMAP4 AUTHENTICATE command framing, not part of the CRAM specification itself.
section: "2"
