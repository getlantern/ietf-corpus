document: rfc-4356
kind: interoperability-note
summary: VPIM 'Sensitivity:' header (values 'personal' or 'private') is not an MMS feature. Messages with this header MUST NOT be forwarded to an MMS system; on conversion Internet-to-MMS, a negative DSN with extended status code 5.6.0 MUST be generated. MMS systems do not support the Privacy header field described by VPIM.
section: 2.1.3.3
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
