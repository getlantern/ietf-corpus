document: rfc-4293
kind: interoperability-note
summary: 'When updating an IPv4-only RFC 2011 implementation: ipForwarding, ipDefaultTTL, and ipReasmTimeout are unchanged; most counter objects move to ipSystemStatsTable with new indexes; ipAddrTable converts to the substantially different ipAddressTable; ipNetToMediaTable moves to ipNetToPhysicalTable; two new required tables are ipv4InterfaceTable and ipDefaultRouterTable.'
section: "4.1"
topics:
