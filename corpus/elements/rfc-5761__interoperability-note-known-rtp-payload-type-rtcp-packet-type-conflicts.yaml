document: rfc-5761
kind: interoperability-note
summary: 'Known RTP payload type / RTCP packet type conflicts exist: PT 64-65 conflict with obsolete RTCP FIR/NACK; PT 72-76 conflict with RTCP SR, RR, SDES, BYE, APP; PT 77-78 conflict with RTCP RTPFB and PSFB; PT 79 conflicts with RTCP XR; PT 80 conflicts with RSI packets. These ranges are blocked for use when multiplexing.'
section: "4"
topics:
