document: rfc-4941
kind: normative-requirement
summary: 'Temporary address lifetime values MUST be derived from the corresponding prefix: Valid Lifetime is the lower of the prefix''s Valid Lifetime or TEMP_VALID_LIFETIME; Preferred Lifetime is the lower of the prefix''s Preferred Lifetime or (TEMP_PREFERRED_LIFETIME - DESYNC_FACTOR). An implementation MUST NOT create a temporary address with a zero Preferred Lifetime.'
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
