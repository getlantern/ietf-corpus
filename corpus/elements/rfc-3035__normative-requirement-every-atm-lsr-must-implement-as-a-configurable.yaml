document: rfc-3035
kind: normative-requirement
summary: Every ATM-LSR MUST implement, as a configurable option, the Loop Detection via Path Vectors (LDPV) procedure. If an LSR receives a label binding request whose path vector object contains its own address, it MUST act as it would if the hop count exceeded MAXHOP.
section: "11"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
