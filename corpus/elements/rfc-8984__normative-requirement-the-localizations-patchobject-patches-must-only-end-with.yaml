document: rfc-8984
kind: normative-requirement
summary: The localizations PatchObject patches MUST only end with suffixes 'title', 'description', or 'name'. A patch MUST NOT have the prefix 'recurrenceOverrides'; localization of overrides must be a patch inside the override's own localizations property.
section: 4.6.1
rfc2119_level: MUST
