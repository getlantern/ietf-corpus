document: rfc-3382
kind: normative-requirement
summary: The beginning of a collection MUST use a value tag of 'begCollection' (0x34); the end of a collection MUST use a value tag of 'endCollection' (0x37). The Printer MAY ignore the value of the begCollection and its length MAY be 0.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
