document: rfc-5804
kind: registry
summary: IANA created a ManageSieve Response Codes registry. New response codes MUST be specified in a Standards-Track or IESG-approved Experimental RFC. Initial entries are AUTH-TOO-WEAK, ENCRYPT-NEEDED, QUOTA, QUOTA/MAXSCRIPTS, QUOTA/MAXSIZE, REFERRAL, SASL, TRANSITION-NEEDED, TRYLATER, ACTIVE, NONEXISTENT, ALREADYEXISTS, TAG, and WARNINGS.
