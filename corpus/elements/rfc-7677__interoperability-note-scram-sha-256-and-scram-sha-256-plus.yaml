summary: SCRAM-SHA-256 and SCRAM-SHA-256-PLUS follow the same message flow and field structure as SCRAM-SHA-1/SCRAM-SHA-1-PLUS (RFC 5802); implementations differ only in the substitution of SHA-256 for SHA-1 in HMAC() and H().
