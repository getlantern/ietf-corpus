document: rfc-3484
kind: protocol-element
summary: 'The source address selection algorithm applies eight ordered pair-wise comparison rules to the candidate set: (1) prefer same address, (2) prefer appropriate scope, (3) avoid deprecated, (4) prefer home addresses, (5) prefer outgoing interface, (6) prefer matching label, (7) prefer public over temporary, (8) use longest matching prefix.'
