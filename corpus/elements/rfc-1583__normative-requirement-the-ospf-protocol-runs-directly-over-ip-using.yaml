document: rfc-1583
kind: normative-requirement
summary: The OSPF protocol runs directly over IP using protocol number 89. OSPF provides no explicit fragmentation/reassembly support; IP fragmentation/reassembly is used when necessary, but should be avoided whenever possible by splitting large packets.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
