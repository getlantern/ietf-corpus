document: rfc-9776
kind: normative-requirement
summary: A system MUST accept and process any Query whose IP Destination Address field contains any of the addresses (unicast or multicast) assigned to the interface on which the Query arrives, not just the expected multicast destination.
section: 4.1.12
rfc2119_level: MUST
topics:
    - multicast
