document: rfc-4880
kind: protocol-element
summary: 'The One-Pass Signature packet (Tag 4) precedes signed data and contains: version (1 octet, currently 3), signature type, hash algorithm, public-key algorithm, signing Key ID (8 octets), and a nesting flag. Multiple one-pass signatures bracket the message data such that Signature packets appear in reverse order.'
section: "5.4"
topics:
