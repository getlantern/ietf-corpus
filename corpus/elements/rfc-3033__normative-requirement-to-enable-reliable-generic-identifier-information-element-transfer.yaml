document: rfc-3033
kind: normative-requirement
summary: To enable reliable Generic Identifier information element transfer, when the calling party sends a SETUP or ADD PARTY message with up to three Generic Identifier IEs, the CONNECT or ADD PARTY ACK returned by the called party must contain at least one Generic Identifier IE.
section: 4.1.1
rfc2119_level: MUST
topics:
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
