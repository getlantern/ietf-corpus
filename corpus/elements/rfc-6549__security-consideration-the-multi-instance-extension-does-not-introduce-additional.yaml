document: rfc-6549
kind: security-consideration
summary: The multi-instance extension does not introduce additional security considerations beyond those already present in OSPFv2 (RFC 2328). The reduction of the AuType header field to 8 bits is considered reasonable given that only three OSPFv2 authentication types have been standardized.
section: "7"
topics:
