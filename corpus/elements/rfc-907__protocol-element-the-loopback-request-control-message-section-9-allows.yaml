document: rfc-907
kind: protocol-element
summary: 'The Loopback Request control message (Section 9) allows a host or SIMP to detect looped messages by comparing the loopback bit (word 0 bit 14): 0 means sent by host, 1 means sent by SIMP. If an arriving message has the loopback bit equal to the receiver''s outgoing value, the message has been looped.'
section: "9"
extracted_by: claude-sonnet-4-6
