document: rfc-2835
kind: normative-requirement
summary: If a HARP client receives a message with an unknown operation code (ar$op), it MUST gracefully discard the message and continue normal operation. The client is NOT REQUIRED to return any message to the sender.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
