document: rfc-8185
kind: design-rationale
summary: The coordination information is sent on the DNI-PW over G-ACh rather than a separate out-of-band channel because the DNI-PW is already required between dual-homing PEs for traffic forwarding during protection switching, reusing the same path for control keeps the mechanism self-contained.
