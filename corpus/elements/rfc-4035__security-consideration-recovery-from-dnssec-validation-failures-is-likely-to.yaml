document: rfc-4035
kind: security-consideration
summary: Recovery from DNSSEC validation failures is likely to be specific to particular applications, and the facilities DNSSEC provides for stub resolvers may prove inadequate. Operators of security-aware recursive name servers must carefully choose local validation policy to avoid accidentally denying service to the clients they support.
section: "7"
topics:
    - dns
    - security
