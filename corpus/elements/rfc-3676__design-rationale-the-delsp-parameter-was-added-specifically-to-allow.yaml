document: rfc-3676
kind: design-rationale
summary: The DelSp parameter was added specifically to allow Format=Flowed to be used with languages and coded character sets in which ASCII spaces are rare or absent (e.g., certain Asian languages). Without DelSp=yes, inserting soft line breaks as SP CRLF would leave an extra space in the decoded text.
section: Appendix A
