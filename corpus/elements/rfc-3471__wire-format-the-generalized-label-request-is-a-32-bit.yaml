document: rfc-3471
kind: wire-format
summary: 'The Generalized Label Request is a 32-bit field: bits 0-7 are LSP Encoding Type, bits 8-15 are Switching Type, and bits 16-31 are G-PID. LSP Encoding Type values range from 1 (Packet) to 11 (FiberChannel); Switching Type values include PSC-1 through PSC-4 (1-4), L2SC (51), TDM (100), LSC (150), and FSC (200).'
section: 3.1.1
