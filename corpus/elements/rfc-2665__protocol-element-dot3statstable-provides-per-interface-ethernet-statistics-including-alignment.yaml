document: rfc-2665
kind: protocol-element
summary: dot3StatsTable provides per-interface Ethernet statistics including alignment errors, FCS errors, single/multiple collision frames, SQE test errors, deferred transmissions, late/excessive collisions, internal MAC transmit/receive errors, carrier sense errors, frame-too-longs, symbol errors, and duplex status. Indexed by dot3StatsIndex (same value as ifIndex).
