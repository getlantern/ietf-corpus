document: rfc-7339
kind: security-consideration
summary: An attacker able to modify traffic on a link can forge overload indications (by altering Via header "oc" values) to cause a DoS on a target SIP server by tricking upstream clients into dropping all traffic to it, or suppress legitimate overload signals to force traffic into an already overloaded server.
section: "11"
topics:
    - sip
    - security
    - realtime
