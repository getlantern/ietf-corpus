document: rfc-8141
kind: normative-requirement
summary: A formal URN namespace NID MUST NOT be an already-registered NID, MUST NOT start with 'urn-', MUST be more than two characters long, MUST NOT start with two letters followed by a hyphen (reserved for ISO alpha-2 country codes), and MUST NOT start with 'X-'.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - registry
