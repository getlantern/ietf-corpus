document: rfc-3312
kind: interoperability-note
summary: SIP provides no mechanism to refuse an offer arriving in a 1xx or 2xx response to an INVITE. If such an offer is unacceptable, the UAC MUST form a valid answer and then immediately send a CANCEL (for initial INVITE) or BYE (for re-INVITE).
section: "8"
topics:
