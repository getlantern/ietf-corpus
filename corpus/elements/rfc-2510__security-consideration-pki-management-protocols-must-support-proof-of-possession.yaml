document: rfc-2510
kind: security-consideration
summary: PKI management protocols must support proof of possession of private keys to prevent attacks where an end entity obtains a certificate for a key it does not control. This is critical because many operational protocols rely solely on the CA/RA having verified this binding.
section: "2.3"
topics:
    - pkix
    - security
