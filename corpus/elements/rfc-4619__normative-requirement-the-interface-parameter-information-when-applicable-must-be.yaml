document: rfc-4619
kind: normative-requirement
summary: The interface parameter information, when applicable, MUST be used to validate that the PEs and ingress/egress ports have the necessary capabilities to interoperate. The Frame Relay Header Length Sub-TLV (0x08) is OPTIONAL and indicates the FR header length (2, 3, or 4 octets); default is 2.
section: 7.9.1
rfc2119_level: MUST
topics:
    - mpls
