document: rfc-4301
kind: protocol-element
summary: Path MTU handling requires that IPsec respect the DF bit per SPD policy (copy, clear, or set) and that PMTU discovery information propagate appropriately. PMTU values associated with an SA are subject to aging to recover from stale low-MTU information.
