document: rfc-9990
kind: normative-requirement
summary: 'The aggregate data MUST be an XML file that SHOULD be GZIP-compressed. The media type MUST be ''application/gzip'' if compressed or ''text/xml'' otherwise. The attachment filename MUST follow the ABNF: receiver ''!'' policy-domain ''!'' begin-timestamp ''!'' end-timestamp [''!'' unique-id] ''.'' extension, where extension is ''xml'' or ''xml.gz''.'
section: 3.5.2
rfc2119_level: MUST
topics:
    - email
