document: rfc-2082
kind: design-rationale
summary: Integrated key management protocol techniques were deliberately omitted from this specification. Key management protocols have a history of subtle flaws discovered long after publication; decoupling key management avoids forcing changes to all RIP-2 implementations should such a flaw be discovered. The Key-ID field serves as a hook for a future standard key management protocol.
section: "4.1"
topics:
    - routing
    - security
    - crypto
