document: rfc-7301
kind: interoperability-note
summary: The ALPN extension establishes properties of the connection only, not the session. When session resumption or session tickets (RFC 5077) are used, the previous contents of the ALPN extension are irrelevant; only the values in the new handshake messages are considered.
section: "3.1"
topics:
    - tls
