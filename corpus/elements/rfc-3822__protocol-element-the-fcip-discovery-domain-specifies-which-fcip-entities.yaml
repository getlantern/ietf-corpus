document: rfc-3822
kind: protocol-element
summary: The FCIP Discovery Domain specifies which FCIP Entities are allowed to discover each other within the bounds of an SLPv2 scope. An entity may belong to multiple discovery domains, expressed as a comma-separated list in the fcip-discovery-domain attribute.
section: 4.1.1
