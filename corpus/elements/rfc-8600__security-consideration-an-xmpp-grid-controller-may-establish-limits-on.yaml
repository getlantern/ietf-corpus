document: rfc-8600
kind: security-consideration
summary: An XMPP-Grid Controller MAY establish limits on search or subscription result sizes, and Platforms SHOULD use XEP-0059 to bound result sets, to mitigate resource-exhaustion denial-of-service attacks from overly broad queries.
