document: rfc-2242
kind: protocol-element
summary: DHCP option 63 carries NetWare/IP information (all NetWare/IP data except the domain name) as a set of sub-options. The option code is 63, maximum length is 255, and each sub-option contains a one-byte code, one-byte length, and optional value field.
section: "3"
