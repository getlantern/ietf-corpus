document: rfc-6714
kind: design-rationale
summary: SDP end-to-end integrity protection (e.g., SIP Identity) is incompatible with CEMA because CEMA requires middleboxes to modify the SDP c/m-line address. Until a mechanism for signing only a subset of SDP is available, endpoints using fingerprint-based authentication must accept that any signaling proxy could replace fingerprints.
section: "7.1"
topics:
    - security
    - tls
    - realtime
    - sip
