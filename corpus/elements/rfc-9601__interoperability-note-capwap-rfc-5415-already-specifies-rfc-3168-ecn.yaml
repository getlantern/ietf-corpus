document: rfc-9601
kind: interoperability-note
summary: CAPWAP (RFC 5415) already specifies RFC 3168 ECN propagation and ECN capability negotiation and interworks with RFC 6040 without modification. LISP (RFC 9300) made RFC 3168 ECN procedures mandatory from the start and is backwards compatible with RFC 6040 updates. Geneve (RFC 8926) already refers to RFC 6040 for ECN encapsulation.
section: "6"
topics:
