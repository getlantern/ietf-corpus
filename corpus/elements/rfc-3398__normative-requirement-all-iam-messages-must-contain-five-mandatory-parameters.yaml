document: rfc-3398
kind: normative-requirement
summary: 'All IAM messages MUST contain five mandatory parameters at minimum: Called Party Number (CPN), Nature of Connection Indicator (NCI), Forward Call Indicators (FCI), Calling Party''s Category (CPC), and Transmission Medium Requirement (TMR) or User Service Information (USI). Gateways MUST be provisioned with default values for mandatory ISUP parameters that cannot be derived from SIP translation.'
section: 7.2.1.1
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
