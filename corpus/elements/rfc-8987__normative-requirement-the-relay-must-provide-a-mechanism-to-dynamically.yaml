document: rfc-8987
kind: normative-requirement
summary: The relay MUST provide a mechanism to dynamically update ingress filters to permit traffic from delegated prefixes and block packets with invalid source prefixes, implementing BCP38 anti-spoofing; the filter entry MUST use the same prefix length as given in the IA_PD.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
