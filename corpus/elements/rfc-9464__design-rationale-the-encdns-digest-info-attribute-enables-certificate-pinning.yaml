document: rfc-9464
kind: design-rationale
summary: The ENCDNS_DIGEST_INFO attribute enables certificate pinning via SPKI hash without requiring the VPN client to be provisioned with a private CA root certificate; the encrypted DNS resolver can obtain a domain-validated certificate from a public CA, and the IKEv2 channel provides a trusted delivery path for the SPKI hash.
section: "1"
topics:
