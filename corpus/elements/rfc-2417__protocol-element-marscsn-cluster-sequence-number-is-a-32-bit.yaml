document: rfc-2417
kind: protocol-element
summary: marsCsn (Cluster Sequence Number) is a 32-bit counter incremented by the MARS on every ClusterControlVC transmission. Cluster members use the CSN to detect message loss on ClusterControlVC and monitor membership changes. marsSsn serves the same role for ServerControlVC and MCS tracking.
