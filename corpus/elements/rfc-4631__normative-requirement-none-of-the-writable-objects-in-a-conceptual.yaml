document: rfc-4631
kind: normative-requirement
summary: None of the writable objects in a conceptual row can be changed if RowStatus is active(1); all read-create objects must have valid and consistent values before a row can be activated. This constraint applies uniformly to lmpNbrTable, lmpControlChannelTable, lmpTeLinkTable, lmpLinkVerificationTable, and lmpDataLinkTable.
section: "9"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
