document: rfc-8428
kind: wire-format
summary: EXI SenML encodes the XML Schema structure into binary using strict schema mode by default; non-strict MAY be used to preserve extensions. The EXI schemaId 'a' identifies the RFC 8428 schema. Byte-aligned EXI mode is noted as feasible for constrained sensors that hard-code the encoding.
