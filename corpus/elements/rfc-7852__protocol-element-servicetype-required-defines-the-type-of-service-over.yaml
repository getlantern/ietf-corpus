summary: '<ServiceType> (Required) defines the type of service over which the call is placed. Initial registry values include: wireless, coin, one-way, temp, MLTS-hosted, MLTS-local, sensor-unattended, sensor-attended, POTS, OTT, digital, OPX, and relay. More than one value MAY be returned.'
