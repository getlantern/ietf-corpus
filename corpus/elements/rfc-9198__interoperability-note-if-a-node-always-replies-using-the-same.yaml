document: rfc-9198
kind: interoperability-note
summary: If a Node always replies using the same network address regardless of arrival interface, multiple parallel links between that Node and its neighbor cannot be detected by traceroute-style active methods. Implementing RFC 5837 ICMP extensions for interface identification enables parallel link detection.
section: "3.6"
topics:
