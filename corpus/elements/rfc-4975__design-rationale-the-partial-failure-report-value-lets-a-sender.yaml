document: rfc-4975
kind: design-rationale
summary: The 'partial' Failure-Report value lets a sender opt out of the hop-by-hop timer-based acknowledgment needed for 'yes' reporting, while still allowing non-timeout errors (policy violations, ICMP errors) to be reported — a compromise between no reporting and full reporting.
section: "5.3"
topics:
    - realtime
