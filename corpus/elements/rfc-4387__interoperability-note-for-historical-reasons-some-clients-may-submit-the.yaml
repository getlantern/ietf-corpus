document: rfc-4387
kind: interoperability-note
summary: For historical reasons, some clients may submit the URI attribute name as 'email' rather than 'uri' (reflecting legacy use for S/MIME certificate lookup). Servers may choose to accept 'email' as an alias for 'uri', though this is not required.
section: 2.5.1
topics:
