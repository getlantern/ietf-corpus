document: rfc-3448
kind: normative-requirement
summary: When a data packet arrives that increases p (loss event rate), the receiver MUST immediately trigger the feedback timer expiration procedure, causing prompt feedback to the sender. If p does not increase, no immediate action is required.
section: "6.1"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
