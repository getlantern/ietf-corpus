document: rfc-9662
kind: interoperability-note
summary: RFC 8996 (BCP 195) deprecates DTLS 1.0, which was the mandatory-to-implement transport per RFC 6012; this document therefore mandates DTLS 1.2 as the new minimum, breaking backward compatibility with DTLS 1.0-only implementations.
