document: rfc-4954
kind: normative-requirement
summary: Client and server SHOULD use the SASLprep profile of the StringPrep algorithm to prepare authorization identity strings for transmission or comparison. If preparation fails or results in an empty string (unless originally transmitted empty), the server MUST fail authentication.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
    - security
