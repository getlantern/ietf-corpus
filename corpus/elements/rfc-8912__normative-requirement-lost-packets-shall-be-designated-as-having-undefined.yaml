document: rfc-8912
kind: normative-requirement
summary: Lost packets SHALL be designated as having undefined delay and counted for the loss metric (RTLoss, OWLoss, or RLDNS). Packets not arriving within the Tmax waiting time are declared lost.
section: 4.3.1
rfc2119_level: SHOULD
topics:
