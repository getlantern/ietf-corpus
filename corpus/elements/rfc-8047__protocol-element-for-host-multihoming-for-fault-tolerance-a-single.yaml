document: rfc-8047
kind: protocol-element
summary: For host multihoming for fault tolerance, a single SA pair is used for all addresses. The multihomed host creates a LOCATOR_SET including the existing address and SPI as a Type 1 Locator and the new address as a Type 0 Locator, sent in an UPDATE with SEQ, acknowledged by the peer.
section: 4.2.3
topics:
    - mobility
    - ipsec
