document: rfc-4518
kind: design-rationale
summary: The X.500 substrings rule requires that insignificant space treatment apply to assertion and attribute values as whole strings, not individually to substrings. This means an assertion value matches any attribute value differing only by inclusion or removal of insignificant spaces, which drives the two-space normalization design.
section: Appendix B
