document: rfc-7110
kind: protocol-element
summary: 'The Reply Path TLV Flags field defines two bits: A (Alternative path) forces the egress LSR to select a non-default return path (useful to diagnose reverse path problems), and B (Bidirectional) requires the return path to follow the reverse direction of the tested bidirectional LSP. When either bit is set, specific reply path sub-TLVs SHOULD be ignored.'
section: "4.2"
topics:
    - mpls
