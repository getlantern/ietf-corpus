document: rfc-8279
kind: normative-requirement
summary: Every BIER encapsulation specification MUST define a default BitStringLength. Every BFIR MUST be capable of using that default as its Imposition BitStringLength, and every BFR/BFER MUST be capable of using it as a Disposition BitStringLength. A BFR that can use a given BitStringLength as an Imposition BitStringLength MUST also support it as a Disposition BitStringLength.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
