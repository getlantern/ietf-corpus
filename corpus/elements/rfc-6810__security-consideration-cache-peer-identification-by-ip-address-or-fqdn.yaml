document: rfc-6810
kind: security-consideration
summary: Cache peer identification by IP address or FQDN is vulnerable to DNS or address spoofing attacks that could make the correct cache unreachable; however, no session would be established since authorization keys would not match. Consistent trust anchors must be distributed to all caches out-of-band.
section: "11"
topics:
    - routing
    - bgp
    - security
    - dns
