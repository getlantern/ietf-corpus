document: rfc-9990
kind: normative-requirement
summary: The Mail Receiver MUST evaluate the provided reporting URIs in the order given. An attempt MUST be made to deliver an aggregate report to every remaining valid URI, up to the Receiver's limits on supported URIs; malformed URIs SHOULD be ignored.
section: "3.5"
rfc2119_level: MUST
topics:
    - email
