document: rfc-7541
kind: wire-format
summary: Literal header field never-indexed starts with the '0001' 4-bit pattern. The representation is identical in structure to 'without indexing' but signals that intermediaries MUST use this same representation when re-encoding, preventing compression of sensitive values.
section: 6.2.3
topics:
