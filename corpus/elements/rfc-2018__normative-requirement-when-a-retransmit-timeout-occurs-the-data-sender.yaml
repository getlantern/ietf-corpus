document: rfc-2018
kind: normative-requirement
summary: When a retransmit timeout occurs, the data sender MUST ignore prior SACK information in determining which data to retransmit, because the data receiver is allowed to discard SACKed data.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
