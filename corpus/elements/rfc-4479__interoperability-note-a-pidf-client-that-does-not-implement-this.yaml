document: rfc-4479
kind: interoperability-note
summary: A PIDF client that does not implement this specification will silently ignore the <device> and <person> elements because they reside in a different namespace. The <tuple>-based service encoding is intentionally aligned with RFC 2778 and RFC 3863 semantics, ensuring backward compatibility with older implementations.
