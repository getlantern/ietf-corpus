document: rfc-7136
kind: registry
summary: The 'Reserved IPv6 Interface Identifiers' registry (RFC 5453) requires Standards Action for any new reserved IID value. This document adds a note to that registry warning that full deployment of a new reserved IID would require updates to IID generation code in every deployed IPv6 stack.
