document: rfc-7782
kind: security-consideration
summary: Because currently deployed LAALPs are proprietary, security over AAE group membership and internal management is proprietary. In environments without IS-IS authentication (RFC 5304/RFC 5310), a rogue RBridge that joins an AAE group can control approximately 1/N of outgoing traffic and a similar share of incoming unicast traffic, disrupting end-station service.
section: "7"
topics:
    - security
    - routing
