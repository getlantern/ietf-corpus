summary: 'GDOI defines new ISAKMP payload type values: SA KEK (SAK)=15, SA TEK (SAT)=16, Key Download (KD)=17, Sequence Number (SEQ)=18, Group Associated Policy (GAP)=22. The GDOI DOI value is 2. Exchange Type 32 is GROUPKEY-PULL; Exchange Type 33 is GROUPKEY-PUSH. UDP port 848 is assigned for GDOI.'
