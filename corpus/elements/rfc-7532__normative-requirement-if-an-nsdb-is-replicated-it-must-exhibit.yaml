document: rfc-7532
kind: normative-requirement
summary: If an NSDB is replicated, it MUST exhibit loose, converging consistency as defined in RFC 3254. The mechanism for achieving this is outside the scope of this document; many LDAP implementations support replication features that MAY be used.
section: "2.9"
rfc2119_level: MUST
topics:
    - ldap
