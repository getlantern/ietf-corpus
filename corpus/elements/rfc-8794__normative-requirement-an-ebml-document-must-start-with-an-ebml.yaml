document: rfc-8794
kind: normative-requirement
summary: An EBML Document MUST start with an EBML Header and MUST NOT contain any data outside EBML Elements. The EBML Header of an EBMLVersion 1 Document MUST only contain Elements defined in RFC 8794.
section: "8.1"
rfc2119_level: MUST
