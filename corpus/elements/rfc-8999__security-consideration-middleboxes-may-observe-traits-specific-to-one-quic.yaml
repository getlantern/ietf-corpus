document: rfc-8999
kind: security-consideration
summary: Middleboxes may observe traits specific to one QUIC version and incorrectly assume those same semantics apply when other versions exhibit similar traits. QUIC version 1 made efforts to eliminate or obscure some observable traits, but many remain, and different versions may behave differently.
section: "7"
topics:
    - quic
    - security
