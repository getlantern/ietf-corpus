document: rfc-8405
kind: normative-requirement
summary: When IGP events arrive while SPF_TIMER is already running, no new SPF_TIMER is started (only HOLDDOWN_TIMER is reset). The SPF_TIMER started by the first event in a state continues unmodified.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
