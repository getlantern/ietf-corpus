document: rfc-5374
kind: state-machine
summary: 'Re-key rollover uses two timer parameters: Activation Time Delay (ATD) delays activation of new ''leading edge'' SAs until all members have received the Re-Key Event, and Deactivation Time Delay (DTD) governs when the old ''trailing edge'' SA is deleted. States are: pending (new SA distributed, not yet active), active (leading edge transmitting), and expired (trailing edge deleted after DTD).'
section: 4.2.1
topics:
    - ipsec
    - multicast
