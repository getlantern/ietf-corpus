document: rfc-8183
kind: interoperability-note
summary: The parent's child_handle in the <parent_response/> need not match the child's suggested child_handle. When they differ, the parent's value governs, because the parent dictates the names used in the provisioning protocol (sender/recipient fields in RFC 6492).
section: 5.2.2
topics:
    - pkix
