document: rfc-6019
kind: interoperability-note
summary: BinaryTime cannot represent time values prior to January 1, 1970, which limits backward compatibility with historical timestamps. Implementations requiring pre-1970 dates must use UTCTime or GeneralizedTime.
section: "2"
topics:
