document: rfc-6873
kind: protocol-element
summary: Server-Txn is the server transaction identifier, which may reuse the topmost branch-id of the incoming request (with or without the magic cookie) or be a locally unique string. It is used to correlate ACKs and CANCELs to an INVITE and to track forking.
section: "4.2"
topics:
