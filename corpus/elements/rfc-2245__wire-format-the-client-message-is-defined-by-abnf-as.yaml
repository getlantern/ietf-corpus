document: rfc-2245
kind: wire-format
summary: 'The client message is defined by ABNF as: message = [email / token], where token = 1*255TCHAR and TCHAR = %x20-3F / %x41-7E (any printable US-ASCII except ''@''). The email form follows addr-spec from RFC 822 with no free insertion of linear-white-space.'
section: "2"
