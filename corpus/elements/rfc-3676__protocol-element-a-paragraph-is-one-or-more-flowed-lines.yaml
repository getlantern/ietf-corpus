document: rfc-3676
kind: protocol-element
summary: A paragraph is one or more flowed lines followed by one fixed line, where all lines must be either all unquoted or all quoted with the same quote depth. A series of flowed lines constitutes a logical unit eligible to be wrapped and joined for display.
