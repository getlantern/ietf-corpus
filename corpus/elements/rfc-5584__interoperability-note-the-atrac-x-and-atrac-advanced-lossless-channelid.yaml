document: rfc-5584
kind: interoperability-note
summary: The ATRAC-X and ATRAC Advanced Lossless channelID speaker mapping differs from the channel ordering defined in RFC 3551. When channelID=0 (undefined layout), the channel mapping from RFC 3551 Section 4.1 may be used as a fallback.
