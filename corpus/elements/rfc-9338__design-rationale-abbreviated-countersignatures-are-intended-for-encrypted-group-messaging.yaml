document: rfc-9338
kind: design-rationale
summary: Abbreviated countersignatures are intended for encrypted group messaging where identification of the message originator is required but minimizing countersignature size is important. They carry no protected attributes; all parameters come from the outer encryption/MAC context.
section: "3.2"
