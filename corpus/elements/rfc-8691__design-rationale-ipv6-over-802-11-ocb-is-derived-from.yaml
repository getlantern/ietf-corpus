document: rfc-8691
kind: design-rationale
summary: IPv6 over 802.11-OCB is derived from IPv6 over Ethernet (RFC 2464) with minimal stack changes, because the 802.11-OCB MAC layer presents practically the same interface to IP as 802.11a/b/g/n and 802.3. Device drivers MAY implement Ethernet framing internally and perform 802.3-to-802.11 frame translation to minimize code changes.
section: "1"
topics:
    - ip
