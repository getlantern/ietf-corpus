document: rfc-7680
kind: design-rationale
summary: The loss threshold Tmax is intentionally left somewhat vague in definition, representing a value so large that any value in [Tmax-delta, Tmax+delta] is an equivalent threshold. Enforcing a specific constant waiting time on stored delay singletons is also compliant, allowing results to serve multiple reporting audiences.
