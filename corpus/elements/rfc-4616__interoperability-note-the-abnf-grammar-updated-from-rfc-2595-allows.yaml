document: rfc-4616
kind: interoperability-note
summary: The ABNF grammar (updated from RFC 2595) allows LINE FEED (U+000A) and CARRIAGE RETURN (U+000D) in authzid, authcid, and passwd productions, but whether they may actually be used depends on applicable string preparation rules; for passwd and authcid, control characters are prohibited.
section: A
