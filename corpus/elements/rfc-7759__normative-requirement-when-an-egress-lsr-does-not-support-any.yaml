document: rfc-7759
kind: normative-requirement
summary: When an egress LSR does not support any requested OAM mode, it MUST set the return code to report the first unsupported mode, and SHOULD NOT process remaining OAM Configuration TLVs and sub-TLVs listed in that Echo Request.
section: "3"
rfc2119_level: MUST
topics:
