document: rfc-9737
kind: normative-requirement
summary: The MDS MUST NOT resilver a file if there are clients with outstanding write intents, and MUST also track the need to resilver so that if the MDS restarts during the grace period it can restart file recovery or start resilvering appropriately.
section: "2.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
