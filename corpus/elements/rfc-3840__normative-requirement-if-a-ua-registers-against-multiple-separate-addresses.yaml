document: rfc-3840
kind: normative-requirement
summary: If a UA registers against multiple separate addresses-of-record and the contacts have different capabilities, the UA MUST use different URIs in each registration to allow unique determination of the feature set associated with an incoming request URI.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
