document: rfc-8876
kind: design-rationale
summary: Sensors may generate large data payloads, but including large amounts of data (tens of kilobytes) in a SIP MESSAGE is inadvisable because SIP entities are usually not equipped to handle very large messages. By-reference delivery via HTTPS avoids this limitation.
section: "7"
topics:
    - sip
    - realtime
