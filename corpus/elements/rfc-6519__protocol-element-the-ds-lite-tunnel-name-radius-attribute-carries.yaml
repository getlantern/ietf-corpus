document: rfc-6519
kind: protocol-element
summary: The DS-Lite-Tunnel-Name RADIUS attribute carries an FQDN identifying the AFTR to which the B4 client should establish a DS-Lite tunnel. It is used between the RADIUS server and the NAS; the NAS then populates DHCPv6 OPTION_AFTR_NAME with this value.
section: "4.1"
topics:
