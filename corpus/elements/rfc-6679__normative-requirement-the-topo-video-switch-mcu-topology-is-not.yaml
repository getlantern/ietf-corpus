document: rfc-6679
kind: normative-requirement
summary: The Topo-Video-switch-MCU topology is NOT RECOMMENDED for new implementations and SHALL NOT be used with ECN, since a video-switching MCU drops packets based on voice activity rather than congestion, breaking ECN negotiation and feedback.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - ecn
    - congestion
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
