document: rfc-1654
kind: normative-requirement
summary: LOCAL_PREF shall be included in all UPDATE messages sent to internal BGP peers but shall not be included in UPDATE messages sent to external BGP speakers. If received from an external peer, LOCAL_PREF shall be ignored.
section: 5.1.5
rfc2119_level: MUST
topics:
    - bgp
    - routing
