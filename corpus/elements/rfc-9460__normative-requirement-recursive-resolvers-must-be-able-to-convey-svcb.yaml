document: rfc-9460
kind: normative-requirement
summary: Recursive resolvers MUST be able to convey SVCB records with unrecognized SvcParamKeys, treating the SvcParams as opaque if needed. When responding to a DNSSEC OK query, DNSSEC-capable resolvers MUST accompany each Additional section RRset with the same DNSSEC records they would send in the Answer.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
