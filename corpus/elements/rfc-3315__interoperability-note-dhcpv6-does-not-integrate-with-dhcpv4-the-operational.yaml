document: rfc-3315
kind: interoperability-note
summary: DHCPv6 does not integrate with DHCPv4; the operational models are sufficiently different that integration is explicitly out of scope for RFC 3315. A separate extension document would be required if DHCPv6 were to carry IPv4 addresses or DHCPv4 configuration parameters.
section: "1"
topics:
