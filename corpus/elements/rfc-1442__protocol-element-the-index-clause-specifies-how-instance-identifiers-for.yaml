document: rfc-1442
kind: protocol-element
summary: 'The INDEX clause specifies how instance-identifiers for columnar objects are formed: integer-valued (1 sub-identifier), fixed/IMPLIED string (n sub-identifiers), variable-length string (n+1), OID-valued (n+1), IpAddress (4), and NsapAddress (n). The IMPLIED keyword may appear at most once, on the rightmost variable-length object.'
section: "7.7"
