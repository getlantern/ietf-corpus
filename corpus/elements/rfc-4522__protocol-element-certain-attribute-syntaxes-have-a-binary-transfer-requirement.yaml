document: rfc-4522
kind: protocol-element
summary: 'Certain attribute syntaxes have a ''binary transfer requirement'': they are defined without an LDAP-specific encoding and must be transferred in BER-encoded form. Certificate, certificate list, certificate pair, and supported algorithm syntaxes (RFC 4523) are canonical examples and additionally require that the exact BER encoding be preserved.'
