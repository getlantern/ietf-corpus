kind: protocol-element
summary: 'The import attribute syntax is: ''from <peering> [action <action>] ... accept <filter>''. A peering can be specified as an AS number with optional router IP addresses (''from AS2 7.7.7.2 at 7.7.7.1'') or as AS-expressions and router-expressions using AND, OR, NOT.'
