document: rfc-8984
kind: normative-requirement
summary: Vendor-specific property names MUST be prefixed by a domain name controlled by the vendor followed by a colon (e.g., 'example.com:customprop'). Vendor-specific enum values MUST follow the same domain-prefixed pattern. This prevents collision with IANA-registered names.
section: "3.3"
rfc2119_level: MUST
topics:
    - json
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
