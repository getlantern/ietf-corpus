document: rfc-7005
kind: design-rationale
summary: De-jitter buffer metrics are restricted to sampled-only reporting (I=01) because they represent instantaneous buffer state rather than quantities that accumulate meaningfully over an interval. Interval (I=10) and cumulative (I=11) modes are explicitly prohibited.
