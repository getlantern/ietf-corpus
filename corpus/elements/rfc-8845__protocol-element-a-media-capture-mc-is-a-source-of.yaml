document: rfc-8845
kind: protocol-element
summary: A Media Capture (MC) is a source of Media from one or more Capture Devices or constructed from other Media Streams. Each MC is of a single Media type, has an Advertisement-unique identity, exactly one set of spatial information, and can be the source of at most one Capture Encoding.
section: "7.1"
topics:
    - realtime
    - webrtc
