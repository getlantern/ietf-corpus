kind: protocol-element
summary: mvpnGenericTable is indexed by mplsL3VpnVrfName and stores per-MVPN attributes including last action type (createdMvrf, deletedMvrf, modifiedMvrfIpmsiConfig, modifiedMvrfSpmsiConfig), C-multicast route protocol (PIM or BGP), UMH selection method, and customer site type. Each row corresponds to one MVPN instance on the PE.
