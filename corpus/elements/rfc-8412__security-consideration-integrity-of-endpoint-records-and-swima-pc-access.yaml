document: rfc-8412
kind: security-consideration
summary: Integrity of endpoint records and SWIMA-PC access permissions must be protected. An attacker with access to the Software Inventory Evidence Collection can manipulate what is reported. SWIMA-PCs should operate with the minimum permissions necessary to access relevant data sources and record fields should be sanitized.
section: "8.3"
topics:
    - security
