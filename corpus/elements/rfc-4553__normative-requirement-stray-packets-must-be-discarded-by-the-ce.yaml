document: rfc-4553
kind: normative-requirement
summary: Stray packets MUST be discarded by the CE-bound IWF, and their detection MUST NOT affect mechanisms for detection of packet loss. Malformed in-order packets MUST be discarded and replacement data generated as with lost packets.
section: "6.3"
rfc2119_level: MUST
