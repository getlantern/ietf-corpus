document: rfc-4422
kind: normative-requirement
summary: Where multiple successful SASL negotiations are permitted, multiple SASL security layers MUST NOT be simultaneously in effect; a newly negotiated security layer replaces the previous one, and if no layer is selected the original remains.
section: "3.8"
rfc2119_level: MUST
topics:
    - security
