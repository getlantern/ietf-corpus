document: rfc-6320
kind: security-consideration
summary: 'ANCP mandates TCP/IPsec+IKEv2/IP as its transport, with IPsec providing peer authentication and message integrity and confidentiality protection. This requirement stems from RFC 5713 security requirements: unauthenticated ANCP messages could allow an attacker to spoof DSL line attributes, alter QoS configurations, or disrupt subscriber connectivity.'
section: "11"
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
