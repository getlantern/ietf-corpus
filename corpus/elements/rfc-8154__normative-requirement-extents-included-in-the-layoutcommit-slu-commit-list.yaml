document: rfc-8154
kind: normative-requirement
summary: Extents included in the LAYOUTCOMMIT slu_commit_list MUST be aligned to the server's file system block granularity and have a size that is a multiple of that granularity. The extents in the commit list MUST be disjoint and MUST be sorted by sr_file_offset.
section: 2.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
