document: rfc-6602
kind: normative-requirement
summary: Upon accepting a bulk binding update, the LMA MUST send a PBA with Status 0, include the Mobile Node Group Identifier option (sub-type 1) with the identifier copied from the request, and set the Lifetime to the allocated lifetime for all sessions in the group.
section: 5.2.3
rfc2119_level: MUST
topics:
    - mobility
