document: rfc-2633
kind: interoperability-note
summary: A proper S/MIME implementation MUST use the MIME types and MUST NOT rely on file extensions for identification, though file extensions (.p7m, .p7s, .p7c) are provided as a convenience for gateway environments that strip MIME type information.
