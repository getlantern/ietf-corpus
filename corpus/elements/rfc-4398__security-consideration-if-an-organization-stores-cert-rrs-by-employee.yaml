document: rfc-4398
kind: security-consideration
summary: If an organization stores CERT RRs by employee owner name and DNSSEC with NSEC is in use, an attacker can enumerate all employees by walking the zone. This is analogous to publicly exposing an enterprise phone directory and is generally undesirable.
section: "7"
topics:
    - dns
    - security
    - privacy
