document: rfc-7978
kind: wire-format
summary: 'Synthetic 48-bit MAC addresses for non-Ethernet TRILL ports are constructed as: 0xFEFF (2 bytes) | Nickname of the TRILL switch (2 bytes) | Port ID assigned by the TRILL switch (2 bytes). The resulting address has the Local bit set and the Group bit clear.'
