document: rfc-4501
kind: protocol-element
summary: Character encoding in DNS URIs follows RFC 3986. The dnsname field is treated as an internationalized domain name (IDN) unaware domain name slot. The '.' character serves as the DNS label separator, and any literal '.' within a label must be escaped using the RFC 1035 mechanism (e.g., '%5c.') since backslash must itself be percent-encoded in URIs.
section: "3"
topics:
