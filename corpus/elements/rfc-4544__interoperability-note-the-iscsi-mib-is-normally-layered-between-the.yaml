document: rfc-4544
kind: interoperability-note
summary: The iSCSI MIB is normally layered between the SCSI MIB (RFC 4455) and the TCP MIB (RFC 4022), and uses the IPS Identity Authentication MIB (RFC 4545) for initiator and target authorization entries. Cross-MIB navigation is enabled via RowPointer attributes in each direction.
