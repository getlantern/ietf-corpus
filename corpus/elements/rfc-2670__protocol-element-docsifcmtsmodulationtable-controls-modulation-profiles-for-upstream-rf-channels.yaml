document: rfc-2670
kind: protocol-element
summary: docsIfCmtsModulationTable controls modulation profiles for upstream RF channels at the CMTS. Each row specifies an interval usage code and associated modulation parameters, allowing the CMTS operator to configure per-channel modulation profiles referenced by docsIfUpChannelModulationProfile.
