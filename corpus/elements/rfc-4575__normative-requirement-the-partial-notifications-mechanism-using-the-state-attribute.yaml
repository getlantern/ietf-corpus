document: rfc-4575
kind: normative-requirement
summary: 'The partial notifications mechanism using the ''state'' attribute MUST be supported by all subscribing clients. The ''state'' attribute of a child element MUST be consistent with its parent''s ''state'': if parent is "full", all children MUST be "full".'
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
