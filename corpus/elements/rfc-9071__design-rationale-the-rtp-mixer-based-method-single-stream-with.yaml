document: rfc-9071
kind: design-rationale
summary: The RTP-mixer-based method (single stream with CSRC source identification) was chosen over multiple-RTP-streams-per-source because many existing RTP implementations lack support for multiple streams in the same session, making broad deployment of the multi-stream approach impractical.
