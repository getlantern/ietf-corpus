document: rfc-3161
kind: normative-requirement
summary: The TSA MUST sign each time-stamp token using a key generated exclusively for that purpose. The corresponding certificate MUST contain only one instance of the extended key usage extension with id-kp-timeStamping, and this extension MUST be critical.
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
