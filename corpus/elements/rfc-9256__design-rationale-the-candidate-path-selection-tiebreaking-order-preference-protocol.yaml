document: rfc-9256
kind: design-rationale
summary: The candidate path selection tiebreaking order (Preference → Protocol-Origin → Originator → Discriminator) is designed to allow operators to override protocol defaults via Preference, establish default cross-protocol preferences via Protocol-Origin, support redundant controllers deterministically via Originator, and ensure deterministic final selection via Discriminator regardless of signaling order.
section: "2.9"
topics:
    - routing
    - mpls
