document: rfc-8638
kind: interoperability-note
summary: The I-IP transit core is treated as SSM-only, meaning it does not process (S,G,rpt) messages. Downstream AFBRs must use the encapsulated unicast inter-AFBR signaling mechanism rather than standard PIM to propagate (S,G,rpt) pruning to upstream AFBRs.
section: "6.4"
topics:
    - multicast
    - ip
    - v6ops
