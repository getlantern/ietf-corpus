document: rfc-4582
kind: design-rationale
summary: BFCP uses a binary (TLV) encoding rather than a text encoding to achieve small message sizes in low-bandwidth environments. Delay-sensitive messages (FloorRequest, FloorRelease, FloorRequestStatus, ChairAction) are designed to remain compact, and future extensions are expected not to increase their size significantly.
