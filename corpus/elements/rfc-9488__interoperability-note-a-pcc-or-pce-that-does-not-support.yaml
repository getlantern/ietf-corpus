document: rfc-9488
kind: interoperability-note
summary: A PCC or PCE that does not support this document ignores the E flag and treats it as 0 in PCRpt and PCUpd messages per RFC 5440 (PCC-initiated LSPs) or RFC 8281 (PCE-initiated LSPs). A legacy PCE will therefore not enforce the protection constraint even if the PCC sets E=1.
section: "5.1"
topics:
    - routing
