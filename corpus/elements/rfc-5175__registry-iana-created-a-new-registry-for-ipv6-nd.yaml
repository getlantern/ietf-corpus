document: rfc-5175
kind: registry
summary: IANA created a new registry for IPv6 ND Router Advertisement flags under icmpv6-parameters, consolidating existing RA header flags (bits 0–7 from RFC4861, RFC3775, RFC4191, RFC4389) and EFO bits (8–53 available for assignment, 54–55 reserved for private experimentation). New assignments require standards action or IESG approval.
