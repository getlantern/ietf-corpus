document: rfc-3620
kind: security-consideration
summary: The TUNNEL profile should be configured with care because it allows bidirectional contact between machines separated by a firewall. It is reasonable to strictly limit the hosts and services a proxy is allowed to contact, and to restrict use to authorized users identified by a SASL profile.
section: "7"
topics:
    - security
    - nat
