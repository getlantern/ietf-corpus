document: rfc-8689
kind: design-rationale
summary: Mediators (mailing lists, Sieve filters, vacation responders) should apply REQUIRETLS requirements from incoming messages to reoriginated messages where feasible. User-side mediators typically lack SMTP-level detail and may be unaware of REQUIRETLS tags; recipients expecting sensitive traffic should avoid user-side mediators.
section: "6"
topics:
    - email
    - tls
