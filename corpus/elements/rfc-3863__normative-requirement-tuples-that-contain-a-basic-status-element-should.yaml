document: rfc-3863
kind: normative-requirement
summary: Tuples that contain a <basic> status element SHOULD contain a <contact> address. If the 'priority' attribute is omitted on <contact>, applications MUST assign the contact address the lowest priority.
section: 4.1.2
rfc2119_level: SHOULD
