summary: 'IANA SFMT Values for RAMS Messages Registry: defines sub-feedback message types within the RAMS FMT (6) space. Initial assignments are RAMS-R (SFMT=1), RAMS-I (SFMT=2), and RAMS-T (SFMT=3). Values 4–254 require IETF Review; value 0 and 255 are reserved.'
