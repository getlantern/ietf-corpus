document: rfc-2138
kind: normative-requirement
summary: The Identifier field MUST be changed whenever the Attributes field content changes and whenever a valid reply has been received for a previous request. For retransmissions the Identifier MUST remain unchanged, and the Request Authenticator MUST be changed each time a new Identifier is used.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
