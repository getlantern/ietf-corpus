document: rfc-3090
kind: normative-requirement
summary: A locally secured zone's apex KEY RR set MUST be signed by a private key, and either the public companion MUST be pre-configured in all resolvers of interest, or the public companion MUST be a zone signing KEY RR authorized to provide validation as recognized by those resolvers (allowing trusted third-party validation).
section: 2.2.b
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
