document: rfc-8986
kind: protocol-element
summary: End.DT2M (Decapsulation and L2 Table Flooding) uses the argument Arg.FE2, which provides a local mapping to an ESI for split-horizon filtering. It floods the exposed Ethernet frame on all L2 OIFs in table T, excluding those associated with Arg.FE2, enabling EVPN BUM and E-Tree use cases.
section: "4.12"
topics:
