document: rfc-1184
kind: normative-requirement
summary: The client side SHOULD NEVER negotiate WILL ECHO. Echo behavior is controlled by the server negotiating WILL ECHO or WONT ECHO per RFC 857; when the server has negotiated WILL ECHO, the client must not locally echo user input.
section: "2.2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
