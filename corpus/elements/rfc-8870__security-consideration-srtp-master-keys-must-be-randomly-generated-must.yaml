document: rfc-8870
kind: security-consideration
summary: SRTP master keys MUST be randomly generated, MUST NOT be reused for any other purpose, and MUST NOT be derived from other SRTP master keys. The key length of the EKT Cipher MUST be at least as long as the SRTP cipher and the DTLS-SRTP ciphers.
section: "6"
