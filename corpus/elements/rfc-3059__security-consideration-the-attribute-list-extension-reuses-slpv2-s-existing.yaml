document: rfc-3059
kind: security-consideration
summary: The Attribute List Extension reuses SLPv2's existing authentication mechanism for attribute lists, allowing UAs to verify a digital signature over the attributes. The extension is no less secure than SLPv2 without the extension, as the same authenticator format used in Attribute Reply and Service Registration messages is used here.
section: "5"
topics:
