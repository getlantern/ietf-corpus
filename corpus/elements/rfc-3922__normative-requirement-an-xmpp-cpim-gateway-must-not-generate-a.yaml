document: rfc-3922
kind: normative-requirement
summary: An XMPP-CPIM gateway MUST NOT generate a PIDF document with zero <tuple/> children when receiving a presence stanza from an XMPP entity; all PIDF documents communicated to a non-XMPP service MUST contain at least one <tuple/> element.
section: 6.3.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
