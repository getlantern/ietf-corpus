document: rfc-3621
kind: design-rationale
summary: The MIB uses a Group/Port two-level index scheme (pethPsePortGroupIndex, pethPsePortIndex) to support modular numbering, allowing implementors to represent field-replaceable units as groups of ports. This mirrors the IEEE 802.3 management standard's recommended entity hierarchy.
