document: rfc-7401
kind: protocol-element
summary: 'The HIP puzzle mechanism enables the Responder to delay state creation until receiving a valid I2. The Responder verifies puzzle solutions with a single hash computation and can reject invalid ones before creating state, performing public-key verification, or computing DH. Difficulty #K is adjustable based on trust level and load.'
section: 4.1.1
topics:
