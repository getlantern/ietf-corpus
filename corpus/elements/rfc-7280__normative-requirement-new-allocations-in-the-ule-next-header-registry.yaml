document: rfc-7280
kind: normative-requirement
summary: New allocations in the ULE Next-Header registry are to be assigned by IANA using the 'Specification Required' policy as defined in RFC 5226. Applications must include a reference to a permanent and readily available public specification; an IETF Standards Track RFC satisfies this requirement, but other specifications are also permitted.
section: "3"
rfc2119_level: REQUIRED
topics:
    - registry
