document: rfc-4568
kind: security-consideration
summary: The encapsulating application protocol (e.g., SIP) MUST provide strong message authentication, payload encryption, and effective replay protection for SDP messages containing security descriptions. Failure to encrypt an SDP message containing an inline SRTP master key renders SRTP encryption useless in practically all circumstances.
section: "8"
topics:
    - security
    - realtime
    - sip
