document: rfc-1327
kind: protocol-element
summary: The gateway model specifies that RFC 822 messages always map into an X.400 IPM (covering MTA, MTS, and IPMS services). Going X.400 to RFC 822, a message may be derived from a Report, an IPN, or an IPM. Probes are serviced by the gateway directly; MTS Messages with non-IPMS content types must be rejected.
section: 1.5.3
topics:
    - email
