document: rfc-8639
kind: protocol-element
summary: The 'modify-subscription' RPC changes the filter and/or stop-time of an existing dynamic subscription. If accepted on a currently suspended subscription, the subscription immediately returns to 'active'. If rejected, the subscription is left unchanged; error hints MAY be returned in a 'modify-subscription-stream-error-info' yang-data container.
section: 2.4.3
topics:
    - yang
    - netconf
