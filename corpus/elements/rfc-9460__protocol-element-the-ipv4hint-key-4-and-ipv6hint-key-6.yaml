document: rfc-9460
kind: protocol-element
summary: 'The ''ipv4hint'' (key 4) and ''ipv6hint'' (key 6) SvcParamKeys provide IP address hints. Wire format: a sequence of 4-byte IPv4 or 16-byte IPv6 addresses in network byte order; an empty list is invalid. Clients SHOULD ignore hints when A/AAAA records for TargetName are locally available.'
section: "7.3"
topics:
    - dns
    - ip
