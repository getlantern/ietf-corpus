document: rfc-9580
kind: interoperability-note
summary: EdDSALegacy (the Ed25519/Ed448 encoding inherited from RFC 4880/6637) is deprecated and MUST NOT be used in version 6 or later Signature or Key packets. New implementations should use the native Ed25519 (algorithm ID 27) and Ed448 (algorithm ID 28) types defined in this document.
section: 5.2.3.3
topics:
    - crypto
