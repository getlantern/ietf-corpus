document: rfc-9785
kind: normative-requirement
summary: When a local policy overrides the Highest-Preference or Lowest-Preference Algorithm for a range of Ethernet Tags, that local policy MUST be consistent across all PEs in the Ethernet Segment. Inconsistency may cause packet drops or packet duplication.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
