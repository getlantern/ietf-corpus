document: rfc-2271
kind: design-rationale
summary: Remote configuration of security and access control parameters is explicitly required because the Security Subsystem demands frequent rotation of secrets across potentially many SNMP entities; purely local configuration would be operationally undeployable at scale.
section: "1.5"
topics:
