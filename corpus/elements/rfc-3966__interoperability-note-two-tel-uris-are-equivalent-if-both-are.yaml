document: rfc-3966
kind: interoperability-note
summary: Two tel URIs are equivalent if both are the same type (global or local), their digits are equal after removing visual separators, all mandatory and defined parameters match (case-insensitively), and neither contains a parameter name absent from the other. URI comparisons are case-insensitive, and parameter names/values SHOULD use lower-case.
section: "4"
topics:
    - sip
    - realtime
    - voip
