document: rfc-8434
kind: normative-requirement
summary: The metadata server MUST be able to fence off a client's access to the data file on a storage device. When the metadata server revokes the layout, the client's access MUST be terminated at the storage devices; the client then has an opportunity to reacquire the layout and perform security checks under the newly current access permissions.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
