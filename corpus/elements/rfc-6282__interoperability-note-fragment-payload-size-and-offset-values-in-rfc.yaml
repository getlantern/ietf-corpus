document: rfc-6282
kind: interoperability-note
summary: Fragment payload size and offset values in RFC 4944 fragmentation are defined relative to the IPv6 datagram before compression, so all fragments beyond the first must carry their respective uncompressed IPv6 datagram portions; this document does not change that requirement.
