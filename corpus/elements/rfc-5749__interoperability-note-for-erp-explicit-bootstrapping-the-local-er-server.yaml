document: rfc-5749
kind: interoperability-note
summary: For ERP explicit bootstrapping, the local ER server includes a KDE-Request in the AAA message carrying the peer's EAP-Initiate (bootstrapping flag on), and the home AAA server responds with a KDE-Response in the AAA message carrying EAP-Finish (bootstrapping flag set). A AAA User-Name attribute serves as the PID.
