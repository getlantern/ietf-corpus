summary: 'The Backoff message appends to the common header: Offering Address (Encoded-Unicast), Offering Metric Preference (32 bits), Offering Metric (32 bits), and Interval (16 bits, in milliseconds) specifying how long routers with worse metrics must hold their offers.'
