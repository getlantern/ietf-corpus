document: rfc-1252
kind: design-rationale
summary: In the absence of a standard SNMP security architecture it is acceptable for implementations to treat the numerous read-write objects in this MIB as read-only and provide an alternative (non-SNMP) interface for modification, because the MIB is designed for SNMP management rather than mere monitoring.
section: "4.3"
topics:
    - snmp
    - security
