document: rfc-8077
kind: security-consideration
summary: An incoming LDP session request MUST NOT be accepted unless its IP source address is known to be from an eligible LDP peer, configured explicitly or discovered via a trusted auto-discovery protocol. Without this restriction, arbitrary remote Attachment Circuits could be connected.
section: "9.2"
topics:
    - security
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
