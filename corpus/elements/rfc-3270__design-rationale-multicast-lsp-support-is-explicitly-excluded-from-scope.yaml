document: rfc-3270
kind: design-rationale
summary: Multicast LSP support is explicitly excluded from scope; only unicast LSPs are specified. This allows the document to focus on well-understood unicast Diff-Serv semantics without resolving the additional complexity of replication points and per-replica PHB determination in multicast trees.
section: "1"
topics:
