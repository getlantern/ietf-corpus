document: rfc-7383
kind: normative-requirement
summary: In the first IKE Fragment message (Fragment Number = 1), the Next Payload field MUST be set to the payload type of the first inner payload. In all subsequent fragments, it MUST be set to zero.
section: "2.5"
rfc2119_level: MUST
topics:
