document: rfc-3339
kind: design-rationale
summary: The '-00:00' unknown offset convention was adopted (mirroring RFC 2822) to distinguish 'UTC is known, local offset is unknown' from '+00:00' or 'Z', which both imply UTC is the authoritative reference for the given time.
