document: rfc-7589
kind: security-consideration
summary: NETCONF configuration and state data may include sensitive information such as usernames or security keys, requiring strong encryption for data privacy. The security considerations of both TLS (RFC 5246) and NETCONF (RFC 6241) apply.
section: "9"
topics:
    - netconf
    - tls
    - security
    - privacy
