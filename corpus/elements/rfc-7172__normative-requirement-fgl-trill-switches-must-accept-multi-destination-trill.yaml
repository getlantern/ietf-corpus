document: rfc-7172
kind: normative-requirement
summary: FGL TRILL switches MUST accept multi-destination TRILL Data packets sent to them as TRILL unicast packets (M bit = 0). They locally egress such packets if appropriate, but MUST NOT forward them to other TRILL switches.
section: "4.3"
rfc2119_level: MUST
