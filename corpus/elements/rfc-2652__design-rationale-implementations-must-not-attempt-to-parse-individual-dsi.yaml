document: rfc-2652
kind: design-rationale
summary: Implementations must not attempt to parse individual DSI integers unless prepared to handle arbitrary-length integers; treating a DSI as anything other than an opaque US-ASCII string is not recommended. This avoids integer overflow issues on resource-constrained machines.
section: 2.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
