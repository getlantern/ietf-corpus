document: rfc-6435
kind: interoperability-note
summary: This document updates RFC 6371 Sections 7.1.1 and 7.1.2. The LI mechanism defined here diverges from the RFC 6371 framework by not requiring a response to the Lock Instruct message and by relying on management-plane coordination to both ends rather than independent LI-triggered locking.
section: "1.1"
topics:
