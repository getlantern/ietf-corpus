document: rfc-8997
kind: normative-requirement
summary: It is RECOMMENDED that new users be required to use TLS version 1.2 or greater from the start. However, an MSP may find it necessary to make exceptions to accommodate some legacy systems that support only earlier versions of TLS or only cleartext.
section: "3"
rfc2119_level: RECOMMENDED
