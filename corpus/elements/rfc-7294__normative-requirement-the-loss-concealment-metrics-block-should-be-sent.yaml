document: rfc-7294
kind: normative-requirement
summary: The Loss Concealment Metrics Block SHOULD be sent in the same compound RTCP packet as the Measurement Information Block. If the measurement period is not received in the same compound RTCP packet as this metrics block, this metrics block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
