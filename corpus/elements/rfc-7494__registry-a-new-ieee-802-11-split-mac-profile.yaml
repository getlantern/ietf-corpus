document: rfc-7494
kind: registry
summary: A new 'IEEE 802.11 Split MAC Profile' subregistry is created under the 'Control And Provisioning of Wireless Access Points (CAPWAP) Parameters' registry. The 8-bit namespace defines Profile 0 (Split MAC with WTP encryption) and Profile 1 (Split MAC with AC encryption); values 2-255 require Expert Review per RFC 5226.
