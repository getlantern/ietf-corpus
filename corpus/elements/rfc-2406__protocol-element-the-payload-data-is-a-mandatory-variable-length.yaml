document: rfc-2406
kind: protocol-element
summary: The Payload Data is a mandatory variable-length field containing data described by the Next Header field. If the encryption algorithm requires cryptographic synchronization data such as an IV, this data MAY be carried explicitly in the Payload field; any such algorithm MUST specify the length, structure, and location of this data in an RFC.
section: "2.3"
topics:
    - ipsec
    - security
    - crypto
