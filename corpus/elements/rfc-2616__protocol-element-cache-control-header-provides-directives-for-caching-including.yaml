document: rfc-2616
kind: protocol-element
summary: 'Cache-Control header provides directives for caching including: no-cache, no-store, max-age, s-maxage, must-revalidate, proxy-revalidate, public, private, no-transform. Cache freshness is determined by explicit expiration (Expires/max-age) or heuristic expiration based on Last-Modified.'
section: "14.9"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
