document: rfc-7648
kind: protocol-element
summary: A PCP proxy MAY handle multiple PCP servers simultaneously, each with its own epoch value. PCP clients are unaware of multiple servers; the proxy follows RFC 7488 PCP Server Selection and contacts all configured servers in parallel.
section: "3.6"
topics:
