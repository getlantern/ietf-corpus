document: rfc-8079
kind: security-consideration
summary: 'Improper management of RTCP Feedback messages (e.g., REMB) can produce attack-like effects: a B2BUA that drops or corrupts bandwidth availability feedback may cause the sender to flood a bandwidth-constrained receiver with data it cannot process, resulting in a de facto Denial-of-Service condition.'
section: "5"
topics:
    - rtp
    - realtime
    - security
    - congestion
