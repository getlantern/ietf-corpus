document: rfc-2460
kind: design-rationale
summary: The IPv4 'Time to Live' field was renamed 'Hop Limit' in IPv6 because IPv6 nodes are not required to enforce maximum packet lifetime based on time, only hop count. IPv4 implementations almost universally decremented TTL only per hop anyway.
section: "8.2"
