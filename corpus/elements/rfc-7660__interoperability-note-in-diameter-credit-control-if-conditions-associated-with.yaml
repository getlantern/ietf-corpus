document: rfc-7660
kind: interoperability-note
summary: In Diameter Credit Control, if conditions associated with Excess-Treatment or Congestion-Treatment have occurred, Diameter Clients may autonomously send Credit-Control Requests (CCRs) during the Service Delivery session as interim events, including Flow-Count and Packet-Count AVPs.
