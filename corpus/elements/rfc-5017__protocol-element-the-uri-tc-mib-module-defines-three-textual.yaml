summary: 'The URI-TC-MIB module defines three textual conventions for representing URIs in MIB modules: ''Uri'' (unrestricted length), ''Uri255'' (0..255 octets), and ''Uri1024'' (0..1024 octets), all based on OCTET STRING syntax with DISPLAY-HINT indicating ASCII representation.'
