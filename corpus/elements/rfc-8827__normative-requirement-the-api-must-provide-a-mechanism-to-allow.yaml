document: rfc-8827
kind: normative-requirement
summary: The API MUST provide a mechanism to allow JS to suppress ICE negotiation until the user decides to answer a call. The API MUST provide a mechanism for the calling application JS to indicate that only TURN candidates are to be used, and MUST also permit suppression of the related address field.
section: "6.4"
rfc2119_level: MUST
topics:
    - webrtc
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
