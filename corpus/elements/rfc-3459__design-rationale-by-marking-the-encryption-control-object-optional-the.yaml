document: rfc-3459
kind: design-rationale
summary: By marking the encryption control object OPTIONAL, the sending user explicitly grants permission for the gateway to decrypt and forward cleartext. Because the default is REQUIRED, a sending UA that takes no explicit action causes gateways to assume end-to-end encryption is required.
section: "7"
topics:
