document: rfc-8191
kind: protocol-element
summary: When HNP renumbering is caused by LMA switchover, the MAG initiates binding registration to the MN's new LMA per RFC 5213; the new HNP is delivered by the new LMA during the new binding procedure, and the MAG withdraws the old HNP and announces the new one to the MN.
section: "3"
topics:
