document: rfc-6463
kind: interoperability-note
summary: In the separate rfLMA/r2LMA model the r2LMA can be any RFC 5213- or RFC 5844-compliant LMA with no knowledge of this specification when IPv6 transport is used; for IPv4 transport the r2LMA MUST also implement the Alternate IPv4 Care-of Address option defined in Section 4.4.
