document: rfc-1201
kind: wire-format
summary: ARCNET short frames are always 256 octets long and hold 0 to 249 octets of client data. They contain a source byte, destination byte, offset byte, unused padding, a protocol ID byte, a 1-byte split flag, a 2-byte sequence number, and client data.
