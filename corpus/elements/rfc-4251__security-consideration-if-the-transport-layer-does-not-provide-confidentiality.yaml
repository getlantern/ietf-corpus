document: rfc-4251
kind: security-consideration
summary: If the transport layer does not provide confidentiality, authentication methods that rely on secret data SHOULD be disabled. If strong integrity protection is absent, password-change requests SHOULD be disabled to prevent undetected modification or denial of service.
section: 9.4.1
rfc2119_level: SHOULD
topics:
    - security
