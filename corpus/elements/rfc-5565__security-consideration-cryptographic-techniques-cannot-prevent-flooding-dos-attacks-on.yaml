document: rfc-5565
kind: security-consideration
summary: Cryptographic techniques cannot prevent flooding/DoS attacks on tunnel receiving endpoints; applying crypto to spoofed packets increases processing cost and trades one attack vector for another. Non-cryptographic ingress filtering or address segregation is recommended within a single domain.
section: "13.1"
topics:
    - security
    - vpn
    - ip
