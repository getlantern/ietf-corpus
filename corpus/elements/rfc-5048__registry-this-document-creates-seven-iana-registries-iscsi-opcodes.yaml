document: rfc-5048
kind: registry
summary: 'This document creates seven IANA registries: iSCSI Opcodes (1-octet values, Standards Action + Expert Review), iSCSI Login/Text Keys (UTF-8 key names, Standards Action), iSCSI Asynchronous Events (1-octet, Standards Action), iSCSI TMF Codes (7-bit, Standards Action), iSCSI Login Response Status Codes (Status-Class + Status-Detail, Standards Action), iSCSI Reject Reason Codes (1-octet, Standards Action), and iSER Opcodes (4-bit, Standards Action).'
section: "11.1"
topics:
