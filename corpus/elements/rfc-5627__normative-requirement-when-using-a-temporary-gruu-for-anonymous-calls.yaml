document: rfc-5627
kind: normative-requirement
summary: When using a temporary GRUU for anonymous calls per RFC 3323, a UA MUST NOT use a temporary GRUU learned in a REGISTER response whose Call-ID differs from the most recent REGISTER request for the same AOR, instance ID, and reg-id.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
