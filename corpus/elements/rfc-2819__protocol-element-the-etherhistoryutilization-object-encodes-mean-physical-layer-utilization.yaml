document: rfc-2819
kind: protocol-element
summary: 'The etherHistoryUtilization object encodes mean physical-layer utilization during a sampling interval in hundredths of a percent (Integer32, 0..10000). The recommended formula is: Utilization = [Pkts*(9.6+6.4) + Octets*0.8] / (Interval*10000).'
