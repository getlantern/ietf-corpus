document: rfc-8169
kind: interoperability-note
summary: RTM is defined only for RSVP-TE signaled LSPs (RFC 3209) where the explicit path can be either specified or determined during signaling. Use of RTM over LDP-instantiated LSPs is explicitly outside the scope of this document.
