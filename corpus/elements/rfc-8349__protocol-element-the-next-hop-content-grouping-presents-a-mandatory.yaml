document: rfc-8349
kind: protocol-element
summary: 'The ''next-hop-content'' grouping presents a mandatory choice among three cases: ''simple-next-hop'' (outgoing-interface plus augmented next-hop address), ''special-next-hop'', and ''next-hop-list'' (container with a keyed list of next hops for ECMP). Address-family modules MUST augment simple-next-hop and next-hop-list with address-family-specific next-hop-address leaves.'
