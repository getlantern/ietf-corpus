document: rfc-5177
kind: interoperability-note
summary: Foreign Agent Care-of Address mode is supported using 'legacy' Foreign Agents compliant with RFC 3344 without any changes, but requires double encapsulation and has no optimization. An extension document (NEMOv4-FA) addresses optimization for this mode.
