document: rfc-4755
kind: security-consideration
summary: An impostor may return a false set of flags to an IPoIB interface, causing unnecessary connection attempts and delay or disruption in IPoIB communication. Similarly, wrong or spurious QPN values provided during address resolution broadcast/multicast can cause disruption.
section: "8"
topics:
