document: rfc-9390
kind: normative-requirement
summary: When a group command request identifies multiple groups and a session has been assigned to more than one of those groups, the receiver MUST process the associated command only once per session to avoid duplicate operations.
section: 4.4.2
rfc2119_level: MUST
topics:
    - diameter
