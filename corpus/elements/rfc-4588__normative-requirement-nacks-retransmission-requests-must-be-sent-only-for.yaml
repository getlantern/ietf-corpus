document: rfc-4588
kind: normative-requirement
summary: NACKs (retransmission requests) MUST be sent only for the original RTP stream, not for the retransmission stream, because the receiver cannot determine the original sequence number or estimate the timestamp for a packet lost in the retransmission stream.
section: "6.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
