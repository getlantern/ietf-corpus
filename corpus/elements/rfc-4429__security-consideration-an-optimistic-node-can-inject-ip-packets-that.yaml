document: rfc-4429
kind: security-consideration
summary: An Optimistic Node can inject IP packets that appear to originate from an address it does not yet legitimately own, effectively spoofing the legitimate holder. This may cause errors or operational problems at the receiving end, though upper-layer protocols are generally expected to handle such duplicate or misdirected packets robustly.
section: "5"
topics:
