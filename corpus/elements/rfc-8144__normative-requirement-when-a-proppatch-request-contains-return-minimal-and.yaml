document: rfc-8144
kind: normative-requirement
summary: When a PROPPATCH request contains 'return=minimal' and all instructions are processed successfully, the server SHOULD return 204 (No Content) or 200 (OK) with zero-length body rather than a 207 Multi-Status response.
