document: rfc-7356
kind: protocol-element
summary: Each supported flooding scope maintains an independent FS-LSDB and a corresponding instance of the Update Process. Flooding of FS-LSPs, FS-CSNPs, and FS-PSNPs is limited to circuits participating in the given scope; consistent scope support on a circuit by all attached routers is required.
section: "4"
topics:
