document: rfc-9459
kind: normative-requirement
summary: COSE libraries that support AES-CTR or AES-CBC and accept Additional Authenticated Data (AAD) as input MUST return an error if one of these non-AEAD algorithms is selected, to prevent callers from expecting AAD protection that cannot be provided.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - cbor
    - security
