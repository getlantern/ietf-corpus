document: rfc-9154
kind: design-rationale
summary: The original EPP lifecycle stores long-lived encrypted (not hashed) passwords, presenting a significant latent risk of password compromise inconsistent with current best practices. The new model avoids long-term password storage entirely, requiring only hashed (non-retrievable) storage and limiting the authorization information to the period when a transfer is actively in process.
section: "1"
topics:
