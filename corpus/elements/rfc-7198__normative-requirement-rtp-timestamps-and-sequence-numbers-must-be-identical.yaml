document: rfc-7198
kind: normative-requirement
summary: RTP timestamps and sequence numbers MUST be identical in the main and duplicate streams. This makes timeline synchronization via RTCP Sender Reports trivial, since the two timelines are already aligned.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
