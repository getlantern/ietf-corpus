document: rfc-7743
kind: normative-requirement
summary: 'During traceroute, the initiator SHOULD copy the Relay Node Address Stack TLV from the received Echo Reply into each subsequent Echo Request. The TLV MUST NOT be modified except: a NIL entry without the K bit MAY be removed; a NIL entry with the K bit MUST be removed only if the initiator decides to continue despite the implied warning.'
section: "4.6"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
