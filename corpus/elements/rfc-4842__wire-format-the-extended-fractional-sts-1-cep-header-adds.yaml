document: rfc-4842
kind: wire-format
summary: 'The Extended Fractional STS-1 CEP Header adds a third 32-bit word to the basic CEP header: 4 reserved zero bits followed by a 28-bit Equipped Bit Mask (EBM). The EBM encodes 7 VTGs (4 bits each), where bit semantics depend on VT type: all 4 bits for VT1.5, first 3 bits for VT2, first 2 bits for VT3, and the rightmost bit for VT6.'
section: 11.2.1.1
