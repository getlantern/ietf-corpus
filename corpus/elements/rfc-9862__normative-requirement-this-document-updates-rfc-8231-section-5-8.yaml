document: rfc-9862
kind: normative-requirement
summary: This document updates RFC 8231 Section 5.8.2 to make PCReq/PCRep messages optional for SR Policy LSPs. When a PCC wants to delegate an SR Policy LSP, it MAY send PCRpt directly without first sending PCReq and waiting for PCRep.
section: "5.3"
rfc2119_level: MAY
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
