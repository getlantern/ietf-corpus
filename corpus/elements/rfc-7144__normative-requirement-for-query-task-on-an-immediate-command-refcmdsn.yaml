document: rfc-7144
kind: normative-requirement
summary: For QUERY TASK on an immediate command, RefCmdSN MUST equal the CmdSN of the Task Management request itself; for a non-immediate command, RefCmdSN MUST be set to the CmdSN of the task identified by the Referenced Task Tag field.
section: 6.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
