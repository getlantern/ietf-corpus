document: rfc-4005
kind: interoperability-note
summary: Diameter authorization-only requests (no authentication information) cannot be easily translated to RADIUS by a gateway because no equivalent RADIUS capability exists. Adding synthetic authentication to enable translation introduces significant security vulnerabilities.
section: "2"
topics:
    - diameter
    - radius
    - security
