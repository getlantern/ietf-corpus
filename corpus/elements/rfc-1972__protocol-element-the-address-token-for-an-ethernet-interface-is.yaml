document: rfc-1972
kind: protocol-element
summary: The address token for an Ethernet interface is the interface's built-in 48-bit IEEE 802 address, in canonical bit order with octets in the same order as they appear in an Ethernet frame header. The individual/group bit is in the first octet and the OUI is in the first three octets.
section: Stateless Autoconfiguration and Link-Local Addresses
topics:
    - ip
