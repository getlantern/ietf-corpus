document: rfc-4676
kind: protocol-element
summary: CAtype 30 (PCN, postal community name) and CAtype 31 (post office box) allow construction of a postal address. If a P.O. Box is present, street address components (CAtypes 34, PRD, POD, STS, HNO, HNS) are replaced with the P.O. Box element when constructing a postal address.
section: "4"
