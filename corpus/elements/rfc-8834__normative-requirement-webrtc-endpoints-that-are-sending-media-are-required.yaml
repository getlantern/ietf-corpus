document: rfc-8834
kind: normative-requirement
summary: WebRTC endpoints that are sending media are REQUIRED to implement support for TMMBR (Temporary Maximum Media Stream Bit Rate Request) messages and MUST follow bandwidth limitations set by a received TMMBR message for their SSRC.
