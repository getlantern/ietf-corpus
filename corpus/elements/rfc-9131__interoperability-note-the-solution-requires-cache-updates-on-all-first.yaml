document: rfc-9131
kind: interoperability-note
summary: The solution requires cache updates on ALL first-hop routers in topologies with first-hop redundancy, since traffic may be asymmetric. Sending gratuitous NAs to ff02::2 addresses this by reaching all routers on the segment simultaneously.
section: "3"
topics:
