document: rfc-2396
kind: normative-requirement
summary: It is the responsibility of the distributor(s) of a document containing relative URIs to ensure that the base URI for that document can be established. Relative URI cannot be used reliably when the document's base URI is not well-defined.
section: 5.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
