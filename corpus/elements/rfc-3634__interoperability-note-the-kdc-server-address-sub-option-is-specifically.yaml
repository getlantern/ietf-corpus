document: rfc-3634
kind: interoperability-note
summary: The KDC Server Address sub-option is specifically designed as a sub-option of the CCC DHCP option (RFC 3495) and is intended for CableLabs CableHome-compliant residential gateways using Kerberos for SNMPv3 authentication between the Portal Service element and the cable operator's SNMP entity.
section: "1"
