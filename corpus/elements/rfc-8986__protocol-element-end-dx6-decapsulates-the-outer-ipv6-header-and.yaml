document: rfc-8986
kind: protocol-element
summary: End.DX6 decapsulates the outer IPv6 header and forwards the exposed IPv6 packet to the associated L3 adjacency J. End.DX4 similarly decapsulates and forwards the exposed IPv4 packet. These are the per-CE VPN label equivalents in SRv6.
section: "4.4"
topics:
