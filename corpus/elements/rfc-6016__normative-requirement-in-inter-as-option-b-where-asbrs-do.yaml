document: rfc-6016
kind: normative-requirement
summary: In Inter-AS Option B where ASBRs do not perform admission control, the use of the VPN-IPv4 RSVP_HOP object is REQUIRED so that adjacent PEs can send RSVP messages directly to each other via MPLS encapsulation, bypassing stateless ASBRs.
section: 5.2.2
rfc2119_level: REQUIRED
topics:
