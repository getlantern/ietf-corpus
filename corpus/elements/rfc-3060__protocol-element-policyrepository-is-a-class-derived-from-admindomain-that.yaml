document: rfc-3060
kind: protocol-element
summary: PolicyRepository is a class derived from AdminDomain that stores reusable policy conditions and actions. It supports recursive containment via the PolicyRepositoryInPolicyRepository association and is linked to conditions and actions via PolicyConditionInPolicyRepository and PolicyActionInPolicyRepository.
