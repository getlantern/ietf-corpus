document: rfc-4874
kind: normative-requirement
summary: 'A node that supports the XRO but not a particular subobject or subobject attribute MUST ignore that specific subobject rather than failing. Examples: only prefix-32 of IPv4 prefix may be supported, or the Attribute field may not be recognized.'
section: "3.2"
rfc2119_level: MUST
