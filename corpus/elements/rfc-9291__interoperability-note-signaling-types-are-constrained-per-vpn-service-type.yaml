document: rfc-9291
kind: interoperability-note
summary: 'Signaling types are constrained per VPN service type: VPLS and VPWS support l2tp-signaling, ldp-signaling, and bgp-signaling (l2vpn-bgp), while VPWS-EVPN, PBB-EVPN, MPLS-EVPN, and VXLAN-EVPN exclusively use bgp-signaling (evpn-bgp). Mixing incompatible signaling types with VPN types is not permitted per Table 1.'
section: "7.3"
topics:
    - yang
    - vpn
    - bgp
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
