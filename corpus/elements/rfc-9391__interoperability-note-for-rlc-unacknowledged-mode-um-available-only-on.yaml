kind: interoperability-note
summary: For RLC Unacknowledged Mode (UM), available only on terminals compatible with 3GPP Release 15, reliability mechanisms are disabled and only MAC HARQ provides reliability, limiting DoNAS overhead but capping segmentation support at 1600 bytes.
