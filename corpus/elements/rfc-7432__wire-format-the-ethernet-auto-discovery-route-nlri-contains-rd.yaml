document: rfc-7432
kind: wire-format
summary: 'The Ethernet Auto-discovery Route NLRI contains: RD (8 octets), ESI (10 octets), Ethernet Tag ID (4 octets), MPLS Label (3 octets). For BGP route key processing, only the ESI and Ethernet Tag ID are part of the prefix; the MPLS Label is a route attribute.'
