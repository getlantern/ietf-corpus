document: rfc-1158
kind: protocol-element
summary: ipRoutingTable (ipRouteEntry) includes ipRouteMask (IpAddress, new in MIB-II), the mask to be ANDed with a destination address before route comparison. Agents without arbitrary subnet mask support must derive the mask from the address class (255.0.0.0 for class-A, 255.255.0.0 for class-B, 255.255.255.0 for class-C).
section: 5.4.2
topics:
