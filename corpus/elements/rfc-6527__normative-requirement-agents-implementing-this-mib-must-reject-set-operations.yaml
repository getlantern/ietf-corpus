document: rfc-6527
kind: normative-requirement
summary: Agents implementing this MIB MUST reject SET operations that attempt to write priority values of 0 or 255 to vrrpv3OperationsPriority. For example, an SNMP agent would return 'badValue(3)' for such attempts.
