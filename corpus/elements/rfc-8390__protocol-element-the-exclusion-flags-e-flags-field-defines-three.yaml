document: rfc-8390
kind: protocol-element
summary: 'The Exclusion Flags (E-Flags) field defines three flags: 0x01 SRLG exclusion (SRLG disjoint path required), 0x02 Node exclusion (node diverse path required), and 0x04 Link exclusion (link diverse path required). Flag 0x08 is reserved and MUST be set to zero on transmission and MUST be ignored on receipt.'
section: "2.1"
topics:
    - mpls
    - routing
