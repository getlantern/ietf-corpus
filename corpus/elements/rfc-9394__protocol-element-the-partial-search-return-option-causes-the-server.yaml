document: rfc-9394
kind: protocol-element
summary: The PARTIAL SEARCH return option causes the server to provide in an ESEARCH response a subset of results denoted by the sequence range given as a mandatory argument. The first result (lowest matching UID) is 1, so "PARTIAL 1:500" returns the first 500 results and "PARTIAL 501:1000" the second 500.
section: "3.1"
topics:
