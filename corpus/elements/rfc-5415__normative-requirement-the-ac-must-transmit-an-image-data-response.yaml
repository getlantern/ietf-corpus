document: rfc-5415
kind: normative-requirement
summary: The AC MUST transmit an Image Data Response message to the WTP when the WTP sends an Image Data Request, including a portion of the firmware. The AC starts the DataCheckTimer when it receives the Change State Event Request in the Data Check state.
section: "9.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
