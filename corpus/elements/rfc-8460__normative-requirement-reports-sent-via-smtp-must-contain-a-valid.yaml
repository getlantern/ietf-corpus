document: rfc-8460
kind: normative-requirement
summary: Reports sent via SMTP MUST contain a valid DKIM signature by the reporting domain, and reports lacking such a signature MUST be ignored by the recipient. DKIM signatures MUST NOT use the 'l=' attribute to limit body length.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - security
