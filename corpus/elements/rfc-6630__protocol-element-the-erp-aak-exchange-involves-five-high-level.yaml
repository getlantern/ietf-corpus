summary: 'The ERP/AAK exchange involves five high-level steps: (a) optional EAP-Initiate/Re-auth-Start from SAP with CAP identities, (b) EAP-Initiate/Re-auth with E flag from peer, (c) AAA encapsulation to EA server, (d) CA authorization and key derivation, (e) pMSK transport to CAP via AAA, (f/g) EAP-Finish/Re-auth with E flag returned to peer.'
