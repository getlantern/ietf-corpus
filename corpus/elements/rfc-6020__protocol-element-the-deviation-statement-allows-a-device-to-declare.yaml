document: rfc-6020
kind: protocol-element
summary: The deviation statement allows a device to declare specific ways it diverges from a module's contract (e.g., a reduced max-elements). Deviations are announced in the NETCONF <hello> via the 'deviations' parameter referencing a module that enumerates the deviations.
section: 7.18.3
topics:
