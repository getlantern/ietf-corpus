document: rfc-7275
kind: protocol-element
summary: ICCP reuses existing fault detection mechanisms—Bidirectional Forwarding Detection (BFD, RFC 5880) or IP Reachability Monitoring via IGP/BGP—rather than defining its own keep-alive, to notify client applications of remote PE failure or isolation. Loss of the LDP session alone is explicitly not a reliable indicator of remote PE failure.
section: "5"
topics:
    - mpls
    - security
