document: rfc-9103
kind: design-rationale
summary: Opportunistic TLS is explicitly deemed not useful for XoT because it offers no defense against active attacks such as an on-path attacker. XoT requires at minimum Strict TLS so the secondary can cryptographically authenticate the primary before sending zone transfer requests.
section: 9.3.1
topics:
    - tls
    - dns
    - security
