document: rfc-6329
kind: wire-format
summary: 'SPBM multicast DA is a 6-byte Ethernet address: M=1 (multicast bit), L=1 (local bit), TYP=00 (2 bits), 20-bit SPSourceID, and 24-bit I-SID occupying the lower three bytes. SPSourceID=0 indicates dynamic allocation not yet completed.'
