kind: wire-format
summary: 'BGP message header is 19 octets: a 16-octet Marker (all ones for OPEN or when no authentication is used; otherwise computed per authentication mechanism), a 2-octet unsigned Length (19–4096), and a 1-octet Type (1=OPEN, 2=UPDATE, 3=NOTIFICATION, 4=KEEPALIVE).'
