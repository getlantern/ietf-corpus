document: rfc-3931
kind: protocol-element
summary: The Control Connection ID is a 32-bit field with local significance only; each LCCE assigns its own identifier from its own number space. The Control Connection ID in each message is that of the intended recipient, not the sender; non-zero values are exchanged as Assigned Control Connection ID AVPs during setup.
section: 3.2.1
topics:
