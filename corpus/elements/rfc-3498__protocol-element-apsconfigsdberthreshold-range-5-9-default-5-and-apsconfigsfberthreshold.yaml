document: rfc-3498
kind: protocol-element
summary: apsConfigSdBerThreshold (range 5–9, default 5) and apsConfigSfBerThreshold (range 3–5, default 3) define Signal Degrade and Signal Failure BER thresholds respectively. The negated value is used as the exponent of 10; e.g., value 5 means BER threshold of 10^-5. Both may be modified while the group is active.
