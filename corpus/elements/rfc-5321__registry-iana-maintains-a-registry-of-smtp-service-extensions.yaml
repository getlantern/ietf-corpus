document: rfc-5321
kind: registry
summary: IANA maintains a registry of SMTP service extensions, each identified by an EHLO keyword value. Every registered extension must be defined in a Standards-Track or IESG-approved Experimental document. EHLO keywords beginning with 'X' are reserved for local bilateral use and MUST NOT be registered.
section: 2.2.2
topics:
