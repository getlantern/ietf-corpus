document: rfc-4769
kind: protocol-element
summary: The 'pstn' Enumservice type indicates PSTN routing data, including number portability data, non-ported telephone number data (individually or in number blocks), and other PSTN-oriented data associated with E.164 telephone numbers. It provides routing for numbers only routable via the traditional PSTN.
