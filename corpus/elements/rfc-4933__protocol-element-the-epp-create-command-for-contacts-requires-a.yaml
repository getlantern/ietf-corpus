document: rfc-4933
kind: protocol-element
summary: The EPP <create> command for contacts requires a <contact:create> element with id, one or two postalInfo elements, optional voice/fax, email, authInfo, and optional disclose. The response <contact:creData> returns the id and crDate.
section: 3.2.1
