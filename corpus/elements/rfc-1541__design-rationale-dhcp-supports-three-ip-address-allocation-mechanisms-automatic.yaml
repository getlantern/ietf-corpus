document: rfc-1541
kind: design-rationale
summary: 'DHCP supports three IP address allocation mechanisms: automatic (permanent assignment), dynamic (time-limited lease enabling reuse), and manual (administrator-assigned, DHCP used only for delivery). Dynamic allocation is the only mechanism allowing automatic reuse of addresses no longer needed.'
section: "1"
