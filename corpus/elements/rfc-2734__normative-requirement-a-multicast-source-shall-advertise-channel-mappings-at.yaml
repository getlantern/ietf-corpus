document: rfc-2734
kind: normative-requirement
summary: A multicast source SHALL advertise channel mappings at least every ten seconds; except when relinquishing ownership, the expiration time in each advertisement SHALL be at least 60 seconds in the future from the time of transmission.
section: "9.5"
rfc2119_level: MUST
topics:
    - ip
    - multicast
