document: rfc-9182
kind: protocol-element
summary: BGP CE-PE configuration covers 'peer-as', 'local-as', 'multihop', 'as-override', 'allow-own-as', 'prepend-global-as', 'send-default-route', 'site-of-origin' (Route Origin Extended Community for loop prevention per RFC 4364 §7), 'bgp-max-prefix' with 'violate-action' and 'restart-timer', 'bgp-timers' (hold-time and keepalive), and 'authentication'.
