document: rfc-1112
kind: design-rationale
summary: 'A host remains a member of the all-hosts group at all times (not just while in other groups) for three reasons: it is simpler, IGMP query overhead is negligible, and the all-hosts address may serve routing-oriented purposes such as gateway advertisement and local address resolution.'
section: "7.2"
