document: rfc-4954
kind: wire-format
summary: BASE64 encoding uses the standard alphabet (ALPHA / DIGIT / '+' / '/'), is case-sensitive, and terminates with either two base64-chars followed by '==' or three base64-chars followed by '='. A zero-length initial response MUST be transmitted as the single character '='.
