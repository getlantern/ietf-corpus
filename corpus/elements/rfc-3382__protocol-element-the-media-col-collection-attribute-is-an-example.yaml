document: rfc-3382
kind: protocol-element
summary: The 'media-col (collection)' attribute is an example collection that enables a client to select media by properties (color, size) rather than name. It contains member attributes 'media-color (type3 keyword | name(MAX))' (optional for client, MUST be supported by Printer) and 'media-size (collection)' (MUST for both client and Printer).
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
