document: rfc-7618
kind: security-consideration
summary: A malicious user could exhaust available addresses and port sets by requesting a large number of shared IPv4 leases (DoS). Mitigation is to implement per-customer-site allocation policies limiting the number of simultaneously active IPv4 leases.
section: "10"
