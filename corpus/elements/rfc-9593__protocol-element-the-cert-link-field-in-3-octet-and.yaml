document: rfc-9593
kind: protocol-element
summary: The Cert Link field in 3-octet and multi-octet announcements contains a non-zero value N to indicate that the announced method is intended only for the N-th trust anchor from the CERTREQ payload(s). If zero, the method may be used with any CA. If no CERTREQ was received, the field MUST be ignored and treated as zero.
section: 3.2.2
topics:
    - ipsec
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
