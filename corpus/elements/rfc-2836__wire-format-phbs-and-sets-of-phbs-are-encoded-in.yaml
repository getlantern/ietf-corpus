summary: 'PHBs and sets of PHBs are encoded in an unsigned 16-bit binary field. Case 1 (standards-defined PHBs): the recommended DSCP value is placed left-justified in bits 0–5, bits 6–13 set to zero, bit 14 is 0 for a single PHB or 1 for a set of PHBs, bit 15 is 0.'
