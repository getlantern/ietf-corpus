document: rfc-8435
kind: security-consideration
summary: 'For loosely coupled storage, security is equivalent to AUTH_SYS: physical security, encrypted communications, or other measures are RECOMMENDED to protect MDS-to-storage communication from eavesdropping and man-in-the-middle attacks. The model cannot protect against malicious clients.'
