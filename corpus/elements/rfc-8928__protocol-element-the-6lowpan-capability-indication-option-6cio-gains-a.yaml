document: rfc-8928
kind: protocol-element
summary: The 6LoWPAN Capability Indication Option (6CIO) gains a new 1-bit 'A' flag (bit 9) to indicate AP-ND is globally activated in the network. It is set by the 6LBR and propagated unchanged by 6LRs, and SHOULD be turned on only after all 6LRs are upgraded.
section: "4.5"
topics:
