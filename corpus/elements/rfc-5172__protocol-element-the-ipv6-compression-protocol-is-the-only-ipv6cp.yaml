document: rfc-5172
kind: protocol-element
summary: The IPv6-Compression-Protocol is the only IPV6CP Configuration Option defined in this document. It has Type field value 2 and provides a way to negotiate the use of a specific IPv6 packet compression protocol. It is used to indicate the ability to receive compressed packets.
