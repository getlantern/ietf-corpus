document: rfc-1043
kind: wire-format
summary: MOVE-CURSOR (opcode 5) carries two 8-bit unsigned integers <x><y> specifying character position (0 to M-1) and line position (0 to N-1) on the DET screen. HOME-CURSOR (opcode 12) is equivalent to MOVE-CURSOR with x=0, y=0 and carries no parameters.
