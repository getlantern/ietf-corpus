document: rfc-7733
kind: design-rationale
summary: Multipath routing (at least two independent paths) is necessary even for one-hop neighbors because empirical measurements show that even line-of-sight neighbors in the clear region experience temporary reception failures lasting minutes, causing communication deadlines of 200 ms to be exceeded.
section: Appendix B
