document: rfc-2572
kind: normative-requirement
summary: The reportableFlag MUST always be zero when the message contains a PDU from the Unconfirmed Class (Report, Response, or unacknowledged Notification). It MUST always be one for Confirmed Class PDUs (request-type or Inform PDUs).
section: "6.4"
rfc2119_level: MUST
topics:
