document: rfc-9370
kind: security-consideration
summary: This extension focuses on preventing passive "harvest-and-decrypt" attacks (recording ciphertext today, decrypting with future quantum computers) via hybrid key exchange. Active attacks using quantum computers are not fully addressed because authentication remains classical; post-quantum digital signatures are needed to address that threat.
section: "4"
topics:
