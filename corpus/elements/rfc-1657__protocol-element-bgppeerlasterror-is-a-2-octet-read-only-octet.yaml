document: rfc-1657
kind: protocol-element
summary: bgpPeerLastError is a 2-octet read-only OCTET STRING where the first byte contains the BGP error code and the second byte contains the subcode of the last error seen on this peer connection. A value of zero indicates no error has occurred.
