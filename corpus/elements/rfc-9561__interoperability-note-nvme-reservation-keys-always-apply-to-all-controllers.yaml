document: rfc-9561
kind: interoperability-note
summary: NVMe reservation keys always apply to all controllers used by a host (identified by NVMe Host Identifier), analogous to the SCSI ALL_TG_PT bit. Unlike SCSI where ALL_TG_PT support is inconsistent and unreliable, this behavior is always supported in NVMe Reservations.
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
