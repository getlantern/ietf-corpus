document: rfc-6187
kind: design-rationale
summary: 'x509v3-rsa2048-sha256 was introduced as a new format (with no non-certificate SSH counterpart) to provide an RSA-based algorithm meeting NIST SP-800-131 recommendations: modulus ≥ 2048 bits and SHA-256, which are acceptable indefinitely, whereas RSA with < 2048 bits or SHA-1 was deprecated after 2010.'
section: "3.3"
topics:
