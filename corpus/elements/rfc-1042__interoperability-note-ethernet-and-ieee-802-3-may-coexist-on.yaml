document: rfc-1042
kind: interoperability-note
summary: Ethernet and IEEE 802.3 may coexist on the same physical cable using different link protocols. Link-level broadcasts only reach hosts using the same link protocol. If mixed environments are necessary, an IP gateway should be used as if there are two distinct networks.
section: Interoperation with Ethernet
topics:
    - ip
