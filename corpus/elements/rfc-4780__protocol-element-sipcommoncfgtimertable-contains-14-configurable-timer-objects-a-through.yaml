document: rfc-4780
kind: protocol-element
summary: sipCommonCfgTimerTable contains 14 configurable timer objects (A through K, T1, T2, T4) applicable to SIP user agents and stateful proxy servers. Timer T1 is the RTT estimate (default 500ms), T2 the maximum retransmit interval (default 4000ms), and T4 the maximum message network duration (default 5000ms).
section: "7.2"
