document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement congestion control by discarding excess packets when queues are full. Routers SHOULD implement fair queuing to avoid starvation and SHOULD NOT drop packets in a way that systematically disadvantages any particular source or protocol.
section: 5.3.6
rfc2119_level: MUST
topics:
    - ip
    - congestion
    - qos
