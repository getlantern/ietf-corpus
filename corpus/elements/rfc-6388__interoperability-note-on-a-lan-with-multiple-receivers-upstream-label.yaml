document: rfc-6388
kind: interoperability-note
summary: 'On a LAN with multiple receivers, upstream label allocation (RFC 5331/6389) SHOULD be used to optimize bandwidth and reduce replication overhead. Packets use a two-label stack: the upstream LSR''s context label as the top label and the LSP label as the second label.'
