document: rfc-1826
kind: normative-requirement
summary: Implementations claiming conformance MUST fully implement the Authentication Header, MUST support manual key distribution, MUST comply with the IP Security Architecture (RFC 1825), and MUST support keyed MD5 as described in RFC 1828.
