document: rfc-5705
kind: registry
summary: IANA created a 'TLS Exporter Label' registry. Initial entries include 'client finished', 'server finished', 'master secret', 'key expansion' (all from RFC 5246, reserved), 'client EAP encryption' (RFC 5216), 'ttls keying material', and 'ttls challenge' (RFC 5281). Future values use the Specification Required policy.
