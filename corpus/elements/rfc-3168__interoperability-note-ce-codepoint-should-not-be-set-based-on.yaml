document: rfc-3168
kind: interoperability-note
summary: CE codepoint should not be set based on instantaneous queue size; it SHOULD be based on average queue size (e.g., RED). ATM/Frame Relay congestion bits are too noisy a signal and SHOULD NOT be directly mapped to CE without an average-queue-based filter.
section: "5.1"
topics:
    - ecn
    - congestion
    - qos
