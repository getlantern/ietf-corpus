document: rfc-7724
kind: normative-requirement
summary: Only one DHCPACTIVELEASEQUERY is allowed on any one TCP connection at a time; parallel DHCPACTIVELEASEQUERY requests on the same TCP connection are not allowed. Parallel Active and Bulk Leasequery requests MUST use different connections.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
