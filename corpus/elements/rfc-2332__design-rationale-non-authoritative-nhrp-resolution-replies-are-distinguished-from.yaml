document: rfc-2332
kind: design-rationale
summary: Non-authoritative NHRP Resolution Replies are distinguished from authoritative replies so that if a communication attempt based on non-authoritative (cached) information fails, the source station can request authoritative information. A transit NHS gains non-authoritative entries by promiscuously listening to non-Registration NHRP packets.
section: "2.2"
