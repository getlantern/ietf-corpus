document: rfc-2333
kind: interoperability-note
summary: At the NHRP Domain level, if an NHRP Request reaches a router that does not implement NHRP, it will be silently discarded. Short-cuts cannot be established through such routers; connectivity falls back to hop-by-hop routing. For robust operation, virtually all routers within a logical NBMA network should be NHRP aware when dynamic routing is used.
section: "5"
topics:
