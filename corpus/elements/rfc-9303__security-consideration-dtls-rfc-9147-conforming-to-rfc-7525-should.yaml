document: rfc-9303
kind: security-consideration
summary: DTLS (RFC 9147, conforming to RFC 7525) SHOULD be used for all communication between ITR, Map-Resolver, Map-Server, and ETR to provide privacy and prevent eavesdropping, tampering, or message forgery unless the OTK is encrypted via a pre-shared secret.
