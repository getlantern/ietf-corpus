document: rfc-4120
kind: security-consideration
summary: KRB_ERROR messages are not encrypted and not integrity-protected. Clients cannot detect replays, fabrications, or modifications of error messages; a solution to this is deferred to a future version of the protocol.
section: "3.1"
topics:
    - security
