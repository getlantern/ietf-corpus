document: rfc-7740
kind: normative-requirement
summary: This document removes the RFC 6514 requirement that a PE or ASBR take no action on a Leaf A-D route unless it carries an IP-address-specific Route Target identifying that PE/ASBR, when the route key of the Leaf A-D route identifies a (C-*,C-*-BIDIR) or (C-*,C-G-BIDIR) S-PMSI.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
