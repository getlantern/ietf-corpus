summary: 'RFC 3036 defines five IANA name spaces for LDP: Message Type Name Space (section 4.1), TLV Type Name Space (section 4.2), FEC Type Name Space (section 4.3), Status Code Name Space (section 4.4), and Experiment ID Name Space (section 4.5). Each specifies allocation policies for standard, vendor-private, and experimental ranges.'
