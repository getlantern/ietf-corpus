document: rfc-9345
kind: security-consideration
summary: An attacker who compromises a delegated credential's private key cannot create new delegated credentials but can impersonate the compromised party in new TLS connections until the credential expires. Access control mechanisms SHOULD be used to protect the DC private key, including file system controls, physical security, or hardware security modules.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
