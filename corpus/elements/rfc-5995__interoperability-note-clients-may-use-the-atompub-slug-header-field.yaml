document: rfc-5995
kind: interoperability-note
summary: Clients MAY use the AtomPub 'Slug' header field to suggest a portion of the new resource's URI when POSTing to the Add-Member URI. Servers should process it exactly as defined by AtomPub (RFC 5023 Section 9.7), but are free to ignore the suggestion.
section: "3.3"
topics:
