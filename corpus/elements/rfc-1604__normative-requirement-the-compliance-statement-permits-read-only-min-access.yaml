document: rfc-1604
kind: normative-requirement
summary: The compliance statement permits read-only MIN-ACCESS for all read-create objects in frPVCEndptTable and frPVCConnectTable, meaning write access to PVC provisioning objects is OPTIONAL. Implementations that do not support PVC create/modify/delete via SNMP satisfy compliance by supporting only active(1) for RowStatus.
section: "6"
rfc2119_level: OPTIONAL
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
