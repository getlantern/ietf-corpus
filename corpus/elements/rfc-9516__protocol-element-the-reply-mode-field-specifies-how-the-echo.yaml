document: rfc-9516
kind: protocol-element
summary: 'The Reply Mode field specifies how the Echo Reply should be returned: 1=Do Not Reply, 2=Reply via IPv4/IPv6 UDP Packet, 4=Reply via Specified Path, 5=Reply via IPv4/IPv6 UDP Packet with data integrity protection (using MAC Context Header per RFC 9145), 7=Reply via Specified Path with data integrity protection.'
section: "6.3"
topics:
