document: rfc-1334
kind: normative-requirement
summary: The CHAP Challenge Value MUST be changed each time a Challenge is sent. The Challenge Value SHOULD satisfy uniqueness and unpredictability criteria; each value SHOULD exhibit global and temporal uniqueness.
