document: rfc-3315
kind: state-machine
summary: 'Normal 4-message exchange: client SOLICITs to multicast, servers ADVERTISE; client chooses preferred server by preference value and sends REQUEST; server confirms with REPLY. A 2-message shortcut (SOLICIT with Rapid Commit → REPLY) is available when the server is configured for it and the client includes a Rapid Commit option.'
