document: rfc-4314
kind: normative-requirement
summary: The server MUST include a READ-ONLY response code in the tagged OK response to a SELECT command if none of the rights 'i', 'e', and 'shared flag rights' is granted to the current user. The server SHOULD include READ-WRITE if at least one of these rights is granted.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
