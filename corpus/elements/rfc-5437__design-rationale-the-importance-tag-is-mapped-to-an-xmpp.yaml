document: rfc-5437
kind: design-rationale
summary: The ':importance' tag is mapped to an XMPP SHIM 'Urgency' header rather than having mandatory behavior, because the tag has no special meaning for XMPP notifications and implementations may choose to handle it differently or include it in the message body instead.
