document: rfc-4443
kind: security-consideration
summary: 'The Parameter Problem exception for multicast traffic (rule e.3 exception 2) can be exploited: a malicious node near a multicast source can spoof multicast packets with unknown mandatory destination options, causing many destination nodes to flood ICMP error messages back to the multicast source. Securing multicast traffic is the only mitigation.'
section: "5.2"
topics:
    - ip
    - security
    - multicast
