document: rfc-2817
kind: registry
summary: This document establishes the HTTP Upgrade Token Registry, defining the namespace for product tokens used in the Upgrade HTTP header field. Registrations are on a First Come First Served basis; each token must name a responsible party and point of contact. Once registered, a token stays registered forever. This document registers 'TLS/1.0'.
section: "7.2"
topics:
    - http
    - tls
    - registry
