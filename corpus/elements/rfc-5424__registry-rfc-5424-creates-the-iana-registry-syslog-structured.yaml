document: rfc-5424
kind: registry
summary: RFC 5424 creates the IANA registry 'syslog Structured Data ID Values' for SD-IDs and their associated PARAM-NAMEs. New entries require IETF Review. Initial entries include 'timeQuality', 'origin', and 'meta' SD-IDs with their respective PARAM-NAMEs. Names containing '@' are locally extensible and not IANA-controlled.
section: "9.2"
topics:
