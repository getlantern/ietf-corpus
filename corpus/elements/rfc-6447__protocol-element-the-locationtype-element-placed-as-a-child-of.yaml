document: rfc-6447
kind: protocol-element
summary: 'The <locationType> element, placed as a child of <what>, specifies the location information types requested by the subscriber: ''any'', ''geodetic'', or ''civic''. The optional ''exact'' attribute (default false) controls whether the notifier MUST return only the requested type or may substitute alternatives.'
section: "3.5"
topics:
    - sip
    - realtime
