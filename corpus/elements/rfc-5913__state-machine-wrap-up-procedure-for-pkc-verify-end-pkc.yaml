summary: 'Wrap-up procedure for PKC: verify end PKC has at most one Clearance attribute (else fail with ''multiple instances''); if absent, effective-clearance is empty and exit success; otherwise set effective-clearance to the Clearance attribute and perform the Wrap Up Clearance procedure (Section 4.1.1.5.1) to intersect with permitted-clearances.'
