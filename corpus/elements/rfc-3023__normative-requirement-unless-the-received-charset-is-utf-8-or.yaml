document: rfc-3023
kind: normative-requirement
summary: Unless the received charset is UTF-8 or UTF-16, a recipient that strips the MIME header and stores the XML entity persistently SHOULD also persistently store the charset information, perhaps by embedding a correct XML encoding declaration within the entity.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
