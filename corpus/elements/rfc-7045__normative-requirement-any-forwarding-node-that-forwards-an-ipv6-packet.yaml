document: rfc-7045
kind: normative-requirement
summary: Any forwarding node that forwards an IPv6 packet for any reason SHOULD do so regardless of any extension headers present, as required by RFC 2460. This applies to all types of forwarding nodes including routers, firewalls, load balancers, and other middleboxes.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
