document: rfc-8797
kind: design-rationale
summary: The Size fields encode inline threshold values in units of 1 kilo-octet above the 1024-octet minimum, fitting the full range 1024–262144 octets into 8 bits. This avoids the need for larger fields while covering all practically relevant buffer sizes.
section: "4.2"
