document: rfc-6956
kind: protocol-element
summary: VlanInputTableEntryType maps an incoming physical port ID (uint32) and VLAN ID (uint16, range 0–4095) to a LogicalPortID (uint32), allowing EtherClassifier to assign logical port identities to packets based on their ingress port and VLAN tag. This decouples L2 logical port assignment from physical port identity.
section: 4.1.2
topics:
    - routing
