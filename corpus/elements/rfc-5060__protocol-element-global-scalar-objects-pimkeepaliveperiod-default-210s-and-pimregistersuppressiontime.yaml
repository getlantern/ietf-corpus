document: rfc-5060
kind: protocol-element
summary: Global scalar objects pimKeepalivePeriod (default 210s) and pimRegisterSuppressionTime (default 60s) configure device-wide PIM-SM timer values corresponding to Keepalive_Period and Register_Suppression_Time from RFC 4601 section 4.11. Their storage type is governed by pimDeviceConfigStorageType (default nonVolatile).
