document: rfc-6721
kind: design-rationale
summary: The at:deleted-entry element is explicitly advisory in nature; it may be ignored by Atom Processors. Its presence does not guarantee that the referenced entry will be unavailable, since aggregators that previously processed an entry may not reprocess the feed to observe the deletion signal.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
