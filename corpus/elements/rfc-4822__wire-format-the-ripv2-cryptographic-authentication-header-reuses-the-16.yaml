document: rfc-4822
kind: wire-format
summary: 'The RIPv2 cryptographic authentication header reuses the 16-octet authentication password field to carry: a 16-bit RIPv2 Packet Length offset, an 8-bit Key ID, an 8-bit Authentication Data Length, a 32-bit non-decreasing Sequence Number, and two reserved zero words. Authentication Type is set to 0x0003. The authentication trailer follows the main packet body.'
section: "2.1"
topics:
    - routing
    - crypto
    - security
