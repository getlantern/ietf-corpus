document: rfc-3573
kind: protocol-element
summary: The Modem On-Hold Capable AVP (Attribute Type 53) is sent by an LNS in SCCRQ or SCCRP to indicate it can receive MDMST control messages. It has no Attribute Value field, M-bit MUST be 0, and Length is 6.
