document: rfc-7232
kind: normative-requirement
summary: A recipient MUST ignore If-Modified-Since if the request contains an If-None-Match header field, as If-None-Match is a more accurate replacement. A recipient MUST also ignore If-Modified-Since if the field-value is not a valid HTTP-date or if the request method is neither GET nor HEAD.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
