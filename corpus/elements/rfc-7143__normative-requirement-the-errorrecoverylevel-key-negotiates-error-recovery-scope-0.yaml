document: rfc-7143
kind: normative-requirement
summary: 'The ErrorRecoveryLevel key negotiates error recovery scope: 0 = session-level recovery only, 1 = digest and within-connection recovery, 2 = connection recovery and task reassignment. The effective level is the minimum of the values proposed by initiator and target. Initiators MUST NOT use capabilities exceeding the negotiated level.'
section: "13.20"
rfc2119_level: MUST NOT
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
