document: rfc-5172
kind: protocol-element
summary: The IPv6-Compression-Protocol field values are always the same as the PPP Data Link Layer Protocol field values for the same compression protocol. Assigned values include 0061 for IP Header Compression and 0003 for Robust Header Compression (ROHC).
