document: rfc-3554
kind: normative-requirement
summary: The Next Payload field in any ID included inside an ID_LIST MUST be ignored by the Responder. The Protocol ID and Port fields of the enclosing ID_LIST Payload must be set to zero by the Initiator and MUST be ignored by the Responder.
section: "3"
rfc2119_level: MUST
topics:
    - sctp
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
