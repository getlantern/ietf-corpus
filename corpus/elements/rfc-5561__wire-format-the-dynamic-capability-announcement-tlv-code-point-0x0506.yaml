document: rfc-5561
kind: wire-format
summary: 'The Dynamic Capability Announcement TLV (code point 0x0506) has a fixed format: U-bit=1, F-bit=0, type=0x0506, Length=1, and a single octet with S-bit=1 and 7 reserved bits. It carries no Capability Data, hence Length MUST be 1.'
section: "9"
