document: rfc-6350
kind: normative-requirement
summary: A COMMA character in a value MUST be escaped with a BACKSLASH. A SEMICOLON in a field of a compound property MUST be escaped with a BACKSLASH. BACKSLASH characters in values MUST be escaped with a BACKSLASH. NEWLINE characters MUST be encoded as \n or \N.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
