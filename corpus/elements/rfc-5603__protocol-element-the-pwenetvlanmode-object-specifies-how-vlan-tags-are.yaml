document: rfc-5603
kind: protocol-element
summary: 'The pwEnetVlanMode object specifies how VLAN tags are handled between the CE-bound port and the PW encapsulation. Defined values are: other(0), portBased(1), noChange(2), changeVlan(3), addVlan(4), removeVlan(5). The default is noChange(2).'
