document: rfc-9656
kind: protocol-element
summary: The mw-link container augments TE link attributes and uses a mandatory choice (mw-link-option) to classify each link as either a microwave-radio-link (containing rlt-mode) or a microwave-carrier (containing carrier-specific attributes such as tx-frequency, channel-separation, actual-rx-frequency, actual-tx-cm, actual-snir, and actual-transmitted-level).
