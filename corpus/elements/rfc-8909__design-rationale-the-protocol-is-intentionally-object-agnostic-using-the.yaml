kind: design-rationale
summary: The protocol is intentionally object-agnostic, using the XML Schema 'substitutionGroup' attribute to allow abstract elements (<content>, <delete>) to be overloaded by concrete object-specific elements, enabling any registry type to reuse the same escrow envelope.
