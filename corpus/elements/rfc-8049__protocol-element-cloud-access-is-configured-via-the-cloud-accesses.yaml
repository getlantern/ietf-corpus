document: rfc-8049
kind: protocol-element
summary: Cloud access is configured via the 'cloud-accesses' container under vpn-service, identified by a cloud-identifier string. It supports NAT44 address translation (with optional customer-provided IPv4 address) and per-site authorization filters. A private cloud may instead be addressed through NNI configuration.
