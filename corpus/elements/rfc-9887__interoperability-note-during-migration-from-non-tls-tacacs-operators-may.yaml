document: rfc-9887
kind: interoperability-note
summary: During migration from non-TLS TACACS+, operators may need to support both TLS and non-TLS servers simultaneously. This migration phase is considered insecure until fully completed; the period where any client is configured with both server types should be minimized.
section: "6.1"
topics:
