document: rfc-5760
kind: security-consideration
summary: The Distribution Source Feedback Summary Model gives the Distribution Source substantial authority over receiver behavior by controlling reported group size and RTCP bandwidth allocations. A compromised or spoofed Distribution Source can suppress receiver feedback, misreport session quality, or redirect unicast RTCP traffic, making RTCP-level authentication critical for deployments.
