document: rfc-6590
kind: normative-requirement
summary: If transformation output can contain bytes that are not printable ASCII, or characters inappropriate to replace the private data directly, the output MUST be encoded with base64 (per RFC 4648 Section 4) or a similar translation before substitution.
section: "3"
rfc2119_level: SHOULD
topics:
