document: rfc-2575
kind: design-rationale
summary: The vacmAccessTable uses a context prefix match (exact or prefix) rather than requiring an exact context name, enabling a single access entry to grant rights across a set of contexts sharing a common name prefix. This allows simple wildcarding without a full pattern-matching mechanism.
