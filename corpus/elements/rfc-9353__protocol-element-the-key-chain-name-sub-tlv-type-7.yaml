document: rfc-9353
kind: protocol-element
summary: The KEY-CHAIN-NAME sub-TLV (Type=7) carries a variable-length UTF-8 key chain name (1 to 255 octets) to identify the key chain for TCP-AO. It MAY be present in the PCED sub-TLV when the TCP-AO capability flag bit is set.
section: "3.3"
topics:
    - security
    - routing
