document: rfc-9901
kind: normative-requirement
summary: The digest over a Disclosure MUST be computed over the US-ASCII bytes of the base64url-encoded Disclosure string (not the decoded bytes). The resulting bytes MUST then be base64url-encoded.
section: 4.2.3
rfc2119_level: MUST
