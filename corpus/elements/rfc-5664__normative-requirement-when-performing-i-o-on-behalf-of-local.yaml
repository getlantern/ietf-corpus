document: rfc-5664
kind: normative-requirement
summary: When performing I/O on behalf of local users, the pNFS client MUST authenticate and authorize each user by issuing OPEN and ACCESS calls to the metadata server before using OSD capabilities, analogous to NFSv4 data delegations.
