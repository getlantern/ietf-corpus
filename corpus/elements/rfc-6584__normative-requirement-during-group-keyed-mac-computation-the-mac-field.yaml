document: rfc-6584
kind: normative-requirement
summary: During Group-keyed MAC computation the MAC field MUST be set to 0; if the receiver's recomputed MAC check fails the packet MUST be immediately dropped. The truncated output length n_m MUST be less than or equal to the key length.
section: 5.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
