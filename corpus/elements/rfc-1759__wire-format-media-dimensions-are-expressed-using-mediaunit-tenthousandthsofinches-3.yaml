summary: Media dimensions are expressed using MediaUnit (tenThousandthsOfInches=3 or micrometers=4) and CapacityUnit (tenThousandthsOfInches=3, micrometers=4, sheets=8, feet=16, meters=17). These are type-1 enumerations requiring an RFC for new values.
