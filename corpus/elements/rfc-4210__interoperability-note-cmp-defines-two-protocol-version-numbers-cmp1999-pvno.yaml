summary: 'CMP defines two protocol version numbers: cmp1999 (pvno=1) for RFC 2510 implementations and cmp2000 (pvno=2) for this specification. Section 7 specifies handling rules for clients talking to RFC 2510 servers and for servers receiving cmp1999 PKIMessages to ensure backward compatibility.'
