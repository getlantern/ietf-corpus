document: rfc-5566
kind: wire-format
summary: 'The IPsec Tunnel Authenticator sub-TLV encodes: Authenticator Type (2 octets), followed by Value (variable, length = sub-TLV length minus 2). For authenticator type 1 (SHA-1 hash of public key, per RFC 4306 Section 3.7), the Value field is exactly 20 octets.'
