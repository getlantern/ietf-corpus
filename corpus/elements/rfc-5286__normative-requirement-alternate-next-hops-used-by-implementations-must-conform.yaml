document: rfc-5286
kind: normative-requirement
summary: 'Alternate next-hops used by implementations MUST conform to the basic loop-free condition: Distance_opt(N, D) < Distance_opt(N, S) + Distance_opt(S, D). This guarantees that forwarding traffic to an LFA will not result in a loop after a link failure.'
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
