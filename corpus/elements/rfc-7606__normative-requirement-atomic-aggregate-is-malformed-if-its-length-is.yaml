document: rfc-7606
kind: normative-requirement
summary: ATOMIC_AGGREGATE is malformed if its length is not 0; an UPDATE with a malformed ATOMIC_AGGREGATE SHALL use attribute discard. AGGREGATOR is malformed if its length is not 6 (without 4-octet AS capability) or not 8 (with 4-octet AS capability on both sides); malformed AGGREGATOR SHALL use attribute discard.
section: "7.6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
