document: rfc-6107
kind: protocol-element
summary: The Target IGP Identification TLV (Type 1) carries a 32-bit IGP Instance Identifier to tell the egress which IGP instance to use for advertising the new TE link. The reserved value 0xffffffff means 'same IGP instance as used for the traversed TE links'. Absent TLV implies the same default.
section: "3.2"
topics:
    - mpls
    - routing
