document: rfc-7133
kind: interoperability-note
summary: B-TAG (Backbone VLAN Tag) reuses existing dot1qVlanId and dot1qPriority IEs because its structure and semantics are identical to C-TAG and S-TAG. New IEs are required only for I-TAG, whose structure is fundamentally different.
