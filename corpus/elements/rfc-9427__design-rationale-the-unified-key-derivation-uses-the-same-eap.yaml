document: rfc-9427
kind: design-rationale
summary: The unified key derivation uses the same EAP-TLS exporter labels for all TLS-based EAP types, changing only the Type parameter to make derivation method-specific. This eliminates the need for different labels per EAP type as was done in earlier specifications.
section: "2.1"
topics:
    - tls
    - crypto
    - security
