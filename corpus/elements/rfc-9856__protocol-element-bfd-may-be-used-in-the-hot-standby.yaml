document: rfc-9856
kind: protocol-element
summary: BFD MAY be used in the Hot Standby solution to monitor multipoint tunnels carrying SFG packets from redundant G-sources. The BGP-BFD Attribute is advertised alongside S-PMSI A-D or IMET routes, and multipoint BFD sessions are bootstrapped per RFC 9780.
section: "5.3"
topics:
    - routing
    - multicast
