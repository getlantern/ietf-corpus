document: rfc-9262
kind: interoperability-note
summary: 'Forward_routed() adjacencies enable incremental BIER-TE deployment: only nodes requiring replication or path steering must support BIER-TE. Non-BIER-TE-capable intermediate routers are traversed transparently via unicast tunneling (MPLS label stack or IP/GRE), and forward_routed() adjacencies also allow leveraging routing underlay FRR and ECMP towards the next BIER-TE-capable BFR.'
section: 5.1.8.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
