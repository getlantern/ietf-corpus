document: rfc-6530
kind: normative-requirement
summary: When email local parts are internationalized, they SHOULD be accompanied by arrangements for the message headers to be in fully internationalized form. That form SHOULD use UTF-8 rather than ASCII as the base character set for header field contents.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - email
