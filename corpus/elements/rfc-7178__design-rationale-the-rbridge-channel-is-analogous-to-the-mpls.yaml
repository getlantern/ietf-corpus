document: rfc-7178
kind: design-rationale
summary: The RBridge Channel is analogous to the MPLS Generic Associated Channel (RFC 5586), but instead of a special MPLS label, it uses a special multicast Inner.MacDA (All-Egress-RBridges) and inner Ethertype to indicate a channel message, fitting naturally into the TRILL Data frame model.
