document: rfc-5511
kind: protocol-element
summary: 'RBNF operator precedence from highest (tightest binding) to lowest: objects/constructs, repetition, grouping/optional, concatenation, alternative. Concatenation therefore binds tighter than the alternative operator, which is the principal source of misinterpretation in existing RFCs.'
