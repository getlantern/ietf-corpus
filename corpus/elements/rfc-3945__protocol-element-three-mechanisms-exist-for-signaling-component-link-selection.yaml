document: rfc-3945
kind: protocol-element
summary: 'Three mechanisms exist for signaling component link selection within a bundled link: (1) Implicit Indication via a per-component dedicated signaling channel, (2) Explicit Indication by Numbered Interface ID using the IF_ID RSVP_HOP object or IF_ID TLV carrying an IPv4/IPv6 address, and (3) Explicit Indication by Unnumbered Interface ID using a 32-bit Interface Identifier in the same object/TLV.'
section: "4.3"
topics:
    - routing
