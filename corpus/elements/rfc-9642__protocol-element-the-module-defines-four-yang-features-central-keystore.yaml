summary: 'The module defines four YANG features: ''central-keystore-supported'' (server supports the top-level keystore container), ''inline-definitions-supported'' (server supports locally defined keys), ''asymmetric-keys'' (server implements /keystore/asymmetric-keys), and ''symmetric-keys'' (server implements /keystore/symmetric-keys).'
