document: rfc-4035
kind: normative-requirement
summary: 'A security-aware resolver MUST support the signature verification mechanisms described in Section 5 and SHOULD apply them to every received response except when: the CD bit was set in the query, the application instructed no validation, or local policy disables validation. Wildcard owner name verification MUST be supported.'
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
