document: rfc-5802
kind: security-consideration
summary: Without a strong security layer (e.g., TLS with confidentiality), a passive eavesdropper can gather sufficient information to mount an offline dictionary or brute-force attack to recover the user's password. The iteration count and external encryption layer are the primary mitigations.
