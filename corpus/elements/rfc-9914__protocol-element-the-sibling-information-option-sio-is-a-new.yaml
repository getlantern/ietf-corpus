document: rfc-9914
kind: protocol-element
summary: The Sibling Information Option (SIO) is a new RPL Control Message Option that allows RPL nodes to advertise sibling relationships (lateral links not used in the main DODAG) to the Root. This enriches the Root's topological awareness, enabling the PCE to compute additional paths that traverse sibling links.
section: "5.4"
topics:
    - routing
