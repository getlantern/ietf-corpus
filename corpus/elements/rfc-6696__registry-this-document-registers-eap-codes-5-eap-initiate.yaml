document: rfc-6696
kind: registry
summary: This document registers EAP codes 5 (EAP-Initiate) and 6 (EAP-Finish) in the EAP Code registry, and registers two USRK Key Labels ('EAP Re-authentication Root Key@ietf.org' and 'Re-authentication Integrity Key@ietf.org') in the USRK Key Labels name space per RFC 5295 policy. Channel binding TLV types 128–132 are assigned, with types 128–191 reserved for channel binding under IETF Review.
section: "9"
