document: rfc-7030
kind: normative-requirement
summary: When using certificate-less mutual authentication in TLS for enrollment, the cipher suite MUST be resistant to dictionary attack and MUST be based on a zero-knowledge protocol. TLS-SRP cipher suites (those with _SRP_ in the name per RFC 5054) are suitable.
section: 3.3.3
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
