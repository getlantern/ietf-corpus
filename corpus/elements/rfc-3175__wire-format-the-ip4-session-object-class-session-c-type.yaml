document: rfc-3175
kind: wire-format
summary: The IP4 SESSION object (Class = SESSION, C-Type = RSVP-AGGREGATE-IP4 = 9) contains a 4-byte IPv4 session address followed by a Flags byte and a 6-bit DSCP field in the second word. The DSCP distinguishes multiple aggregate sessions toward the same destination.
