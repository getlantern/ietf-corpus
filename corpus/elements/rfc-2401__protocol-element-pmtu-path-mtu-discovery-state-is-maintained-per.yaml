document: rfc-2401
kind: protocol-element
summary: PMTU (Path MTU Discovery) state is maintained per SA in the SAD. An SA entry stores observed path MTU and aging variables; the DF bit handling and PMTU propagation are separate considerations for tunnel-mode IPsec to avoid blackholing when inner packets exceed the path MTU.
section: 6.1.2
topics:
