document: rfc-7197
kind: security-consideration
summary: An attacker or software misconfiguration could signal a large number of duplicated streams using this attribute, causing a denial-of-service. Applications should impose hard limits on both the number of duplicate streams and the total delay introduced, regardless of what the SDP specifies.
section: "5"
topics:
    - security
    - realtime
