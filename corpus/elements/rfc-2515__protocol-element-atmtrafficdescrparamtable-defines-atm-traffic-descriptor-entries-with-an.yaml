document: rfc-2515
kind: protocol-element
summary: atmTrafficDescrParamTable defines ATM traffic descriptor entries with an OID type, up to five Integer32 parameters, a service category (AtmServiceCategory), and a frame-discard flag. VPL and VCL entries reference rows in this table by AtmTrafficDescrParamIndex for both receive and transmit directions.
