document: rfc-735
kind: normative-requirement
summary: Expanded replacement strings are NOT subject to reinterpretation, preventing recursive macro definitions. Telnet commands may be included in replacement strings but must be either totally contained within the macro or begin within it and terminate outside; they may not begin outside and continue inside.
section: "5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
