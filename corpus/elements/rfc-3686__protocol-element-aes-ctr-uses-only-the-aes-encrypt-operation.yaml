document: rfc-3686
kind: protocol-element
summary: AES-CTR uses only the AES encrypt operation for both encryption and decryption, making implementations smaller. The final plaintext block may be less than 128 bits; the key stream is truncated to match its length.
section: "2.1"
topics:
