document: rfc-9456
kind: interoperability-note
summary: This document is compatible with (D)TLS 1.2 and is intended to be compatible with future versions of SNMP and (D)TLS. The updated SnmpTLSFingerprint textual convention reuses the existing RFC 6353 structure but references the new SNMP-TLSTM HashAlgorithms registry instead of the now-frozen TLS HashAlgorithm registry.
section: "1"
topics:
