document: rfc-6887
kind: interoperability-note
summary: PCP version 2 supersedes NAT-PMP (RFC 6886). During version negotiation, if the server returns UNSUPP_VERSION with version number 0, this indicates a NAT-PMP server; a PCP client MAY fall back to the NAT-PMP protocol as described in Appendix A. PCP clients always start negotiation at version 2 and step downward.
section: "9"
topics:
