document: rfc-5839
kind: design-rationale
summary: The Subscription-State header field is explicitly excluded from the entity definition, so changes to subscription state alone (e.g., active to terminated) do not force a new entity-tag, preserving the ability to suppress bodies while still reporting subscription state changes.
