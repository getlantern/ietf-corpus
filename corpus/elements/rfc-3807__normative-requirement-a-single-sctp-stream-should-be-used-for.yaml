document: rfc-3807
kind: normative-requirement
summary: A single SCTP stream SHOULD be used for BCC, Link Control, Control, and PSTN protocols together on a specific C-channel. A separate SCTP stream SHOULD be used for the Protection protocol per C-channel. One stream SHOULD carry all ISDN user ports on a C-channel. One stream SHOULD NOT carry data of more than one C-channel. One additional stream SHOULD carry all MPH (link-related) messages.
section: "3"
rfc2119_level: SHOULD
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
