document: rfc-2298
kind: normative-requirement
summary: The MDN MUST be addressed (in both header and transport envelope) to the address(es) in the Disposition-Notification-To header of the original message. The From field MUST contain the address of the person for whom the MDN is issued.
section: "3"
rfc2119_level: MUST
topics:
    - email
