document: rfc-5888
kind: normative-requirement
summary: If media streams using several different codecs have to be sent to the same IP address and port, the traditional SDP syntax of listing several codecs in the same 'm' line MUST be used. FID MUST NOT be used to group 'm' lines with the same IP address/port; two 'm' lines grouped using FID MUST differ in their transport addresses.
section: 8.5.3
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
