document: rfc-5760
kind: normative-requirement
summary: Every RSI packet MUST contain either a Group and Average Packet Size sub-report or an RTCP Bandwidth sub-report. In the Feedback Summary Model, the Distribution Source MUST append an RSI header and sub-reports to all RRs it generates, and compound packets MUST begin with an RR and contain at least an SDES/CNAME.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
