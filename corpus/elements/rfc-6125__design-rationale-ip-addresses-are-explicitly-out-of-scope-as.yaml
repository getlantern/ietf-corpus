document: rfc-6125
kind: design-rationale
summary: IP addresses are explicitly out of scope as service identifiers because they are unreliable (NAT, mobility, multiple interfaces, private internets, host grouping behind single IPs), constitute less than 1% of issued certificates, and are much harder for users to work with than DNS domain names.
section: 1.7.2
