document: rfc-5340
kind: protocol-element
summary: The Intra-Area-Prefix-LSA (LS type 0x2009) has area flooding scope and carries all IPv6 prefix information that in OSPFv2 was embedded in router-LSAs and network-LSAs. It references either a network-LSA (for transit link prefixes) or a router-LSA (for stub network/router prefixes) via Referenced LS Type, Referenced Link State ID, and Referenced Advertising Router fields.
section: 4.4.3.9
topics:
    - routing
    - ip
