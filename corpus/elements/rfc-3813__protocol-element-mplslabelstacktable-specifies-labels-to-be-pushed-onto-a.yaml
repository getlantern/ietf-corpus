document: rfc-3813
kind: protocol-element
summary: mplsLabelStackTable specifies labels to be pushed onto a packet beneath the top label. It is indexed by mplsLabelStackIndex and mplsLabelStackLabelIndex, where a smaller LabelIndex value refers to a label higher in the stack (popped earlier at a downstream LSR). Entries are referred to from mplsXCTable via mplsXCLabelStackIndex.
section: "5.8"
topics:
