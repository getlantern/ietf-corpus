document: rfc-6787
kind: state-machine
summary: The Speech Synthesizer resource defines a state machine (Section 8.1) driven by methods including SPEAK, STOP, PAUSE, RESUME, BARGE-IN-OCCURRED, and CONTROL, with states transitioning based on whether a SPEAK request is PENDING, IN-PROGRESS (speaking), paused, or COMPLETE (via SPEAK-COMPLETE event).
section: "8.1"
topics:
    - realtime
