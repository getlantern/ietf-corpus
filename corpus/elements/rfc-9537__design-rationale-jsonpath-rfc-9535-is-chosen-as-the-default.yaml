document: rfc-9537
kind: design-rationale
summary: JSONPath (RFC 9535) is chosen as the default expression language because RDAP responses are JSON documents and JSONPath provides a standardized way to reference arbitrary JSON fields both before and after redaction, without requiring prior knowledge of the response structure.
