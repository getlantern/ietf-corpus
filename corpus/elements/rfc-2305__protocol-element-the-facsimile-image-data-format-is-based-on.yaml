document: rfc-2305
kind: protocol-element
summary: The facsimile image data format is based on the minimum set of TIFF for Facsimile (the S profile, RFC 2301), carried in a MIME object using the image/TIFF sub-type (RFC 2302). This is the mandatory content type for IFax simple mode.
