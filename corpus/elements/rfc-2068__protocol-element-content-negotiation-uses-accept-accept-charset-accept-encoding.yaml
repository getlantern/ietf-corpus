kind: protocol-element
summary: Content negotiation uses Accept, Accept-Charset, Accept-Encoding, and Accept-Language request headers with quality values (0.0–1.0) for server-driven negotiation. The Vary response header lists the request fields that were used to select the response, enabling correct caching.
