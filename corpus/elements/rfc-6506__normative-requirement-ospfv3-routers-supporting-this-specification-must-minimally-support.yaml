document: rfc-6506
kind: normative-requirement
summary: OSPFv3 routers supporting this specification MUST minimally support examining the L-bit in OSPFv3 Options and using the LLS data block length to locate the Authentication Trailer. It is RECOMMENDED that such routers fully support OSPFv3 Link-Local Signaling per RFC 5613.
section: "4.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
