document: rfc-735
kind: normative-requirement
summary: Within any Telnet command sequence beginning with IAC, macro replacement may NOT take place. Characters in such sequences are to be interpreted only as their normal values. This includes the entire extent of a Telnet subnegotiation (IAC SB through IAC SE).
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
