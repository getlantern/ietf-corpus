document: rfc-6265
kind: normative-requirement
summary: User agents SHOULD sort cookies in the Cookie header with longer-path cookies first; among equal-path cookies, earlier creation-time first. This order is advisory but reflects common practice that some servers have historically depended on.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - http
