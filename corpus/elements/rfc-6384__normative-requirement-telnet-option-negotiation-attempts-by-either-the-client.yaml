document: rfc-6384
kind: normative-requirement
summary: Telnet option negotiation attempts by either the client or the server, except for those allowed by RFC 1123, MUST be refused by the FTP ALG without relaying those attempts. For the purpose of Telnet option negotiation, an FTP ALG MUST follow the behavior of an FTP server as specified in RFC 1123 Section 4.1.2.12.
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
