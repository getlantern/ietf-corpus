summary: 'The minimum configuration set for DetNet MPLS over UDP/IP includes: A-Labels, S-Labels, and F-Labels mapped to UDP/IP flows; IPv4 or IPv6 source and destination addresses; DSCP field in IPv4 ToS or IPv6 Traffic Class; UDP Source Port; UDP Destination Port; and whether to use the UDP checksum.'
