document: rfc-7074
kind: wire-format
summary: The GMPLS signaling generalized label request object contains an 8-bit LSP Encoding Type, an 8-bit Switching Type, and a 16-bit G-PID field. The Switching Type maps to one of the values advertised for the corresponding link in the routing Switching Capability Descriptor.
