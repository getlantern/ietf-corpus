document: rfc-9073
kind: protocol-element
summary: The PARTICIPANT component provides information about a participant in a VEVENT, VTODO, VJOURNAL, or VFREEBUSY component. PARTICIPANT-TYPE and UID are required; CALENDAR-ADDRESS, GEO, STYLED-DESCRIPTION, STRUCTURED-DATA, and nested VLOCATION/VRESOURCE sub-components are optional.
section: "7.1"
