document: rfc-2058
kind: normative-requirement
summary: The Identifier field MUST be changed whenever the content of the Attributes field changes and whenever a valid reply has been received for a previous request. For retransmissions, the Identifier MUST remain unchanged. The Request Authenticator MUST also be changed each time a new Identifier is used.
section: "4.1"
rfc2119_level: MUST
topics:
    - radius
    - security
