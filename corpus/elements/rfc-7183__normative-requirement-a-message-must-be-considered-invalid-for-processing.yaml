document: rfc-7183
kind: normative-requirement
summary: 'A message MUST be considered invalid for processing if: it lacks exactly one TIMESTAMP TLV of the selected version, lacks exactly one ICV TLV using the selected algorithm and key identifier, or if validation of either the TIMESTAMP TLV or the ICV TLV fails.'
section: "6.3"
rfc2119_level: MUST
topics:
    - security
    - routing
