document: rfc-6442
kind: design-rationale
summary: Location-by-reference (a URI the recipient dereferences) is preferred over location-by-value when confidentiality from intermediaries is required (per RFC 5606 Section 3.3.2), because it permits access control per recipient without requiring the sender to anticipate all recipients in advance.
section: "6"
topics:
    - realtime
    - privacy
