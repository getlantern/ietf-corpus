document: rfc-7119
kind: normative-requirement
summary: If an IPFIX Mediator receives Options Template Records from multiple Exporters with the same Information Elements in the Scope fields but ordered differently, it MUST consider those Template Records as semantically different, because scope field ordering affects composite scope semantics.
section: 4.1.1
rfc2119_level: MUST
topics:
    - measurement
