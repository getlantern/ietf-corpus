document: rfc-4750
kind: normative-requirement
summary: Management stations SHOULD include as many columnar read-write objects as possible in a Set-Request when creating a conceptual row. Agents should accept Set-Requests with as few objects as needed, consistent with the Robustness Principle ('be liberal in what you accept, conservative in what you send', RFC 791).
section: "1.2"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
