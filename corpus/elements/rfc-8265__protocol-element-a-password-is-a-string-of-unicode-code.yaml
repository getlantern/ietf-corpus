document: rfc-8265
kind: protocol-element
summary: A password is a string of Unicode code points conformant to the OpaqueString profile of the PRECIS FreeformClass, expressed in a standard Unicode Encoding Form such as UTF-8. Unlike usernames, passwords may include spaces, symbols, and a wider range of characters.
section: "4.1"
topics:
