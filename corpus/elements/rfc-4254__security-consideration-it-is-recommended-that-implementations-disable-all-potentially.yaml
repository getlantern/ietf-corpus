document: rfc-4254
kind: security-consideration
summary: It is RECOMMENDED that implementations disable all potentially dangerous features—agent forwarding, X11 forwarding, and TCP/IP forwarding—if the host key has changed without notice or explanation, as this may indicate a man-in-the-middle attack.
section: "11"
rfc2119_level: RECOMMENDED
