document: rfc-4750
kind: protocol-element
summary: The ospfIfTable (OID ospf 7) describes each OSPF interface, carrying fields for IP address, area ID, interface type (broadcast/nbma/pointToPoint/pointToMultipoint), admin status, router priority, transit delay, retransmission interval, Hello interval, dead interval, poll interval, state, designated router IP and Router ID, backup DR, event counter, authentication key, authentication type, and link-local LSA statistics.
