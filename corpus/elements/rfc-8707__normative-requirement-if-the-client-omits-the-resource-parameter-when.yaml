document: rfc-8707
kind: normative-requirement
summary: If the client omits the 'resource' parameter when requesting authorization, the authorization server MAY process the request with no specific resource or using a predefined default resource value, or MAY require clients to specify resources and fail requests that omit the parameter with an 'invalid_target' error.
section: "2.1"
rfc2119_level: MAY
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
