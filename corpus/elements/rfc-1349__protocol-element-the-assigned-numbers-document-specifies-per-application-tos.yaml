document: rfc-1349
kind: protocol-element
summary: 'The Assigned Numbers document specifies per-application TOS values: TELNET/FTP-Control/TFTP/SMTP-Command use 1000 (minimize delay); FTP-Data/SMTP-Data/DNS-ZoneTransfer use 0100 (maximize throughput); NNTP uses 0001 (minimize cost); IGP/SNMP use 0010 (maximize reliability); DNS-UDP-Query uses 1000; EGP/BOOTP use 0000.'
section: A.2
topics:
