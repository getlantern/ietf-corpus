document: rfc-4727
kind: security-consideration
summary: Security analyzers (firewalls, IDS) rely on unambiguous field interpretations; unrecognized experimental values may cause them to drop traffic (loss of connectivity) or forward it unchecked (loss of security). Assigning known experimental values allows analyzers to take a defined action.
section: "9"
