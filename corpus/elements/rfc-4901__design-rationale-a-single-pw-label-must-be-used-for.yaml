document: rfc-4901
kind: design-rationale
summary: A single PW label MUST be used for many HC flows (hundreds or thousands) rather than assigning a different PW label per flow. This avoids the complex mechanism for PW label assignment and freeing after flow termination; CID assignment within HC protocols already handles per-flow demultiplexing.
section: "4"
