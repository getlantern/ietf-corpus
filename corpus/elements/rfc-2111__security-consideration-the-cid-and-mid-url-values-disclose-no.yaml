document: rfc-2111
kind: security-consideration
summary: The cid and mid URL values disclose no more about the originator's environment than the corresponding Message-ID and Content-ID header values. Where confidentiality is a concern, originators using mid and cid URLs must take the same precautions already required for Message-ID and Content-ID in email.
section: "3"
topics:
    - security
    - email
    - privacy
