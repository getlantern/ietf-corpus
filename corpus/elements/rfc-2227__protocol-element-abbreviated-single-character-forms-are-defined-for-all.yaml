document: rfc-2227
kind: protocol-element
summary: 'Abbreviated single-character forms are defined for all Meter directives: ''w'' (will-report-and-limit), ''x'' (wont-report), ''y'' (wont-limit), ''c=N/N'' (count), ''u=N'' (max-uses), ''r=N'' (max-reuses), ''d'' (do-report), ''e'' (dont-report), ''t=N'' (timeout), ''n'' (wont-ask). All implementations MUST support both forms and SHOULD use abbreviated forms.'
section: "5.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
