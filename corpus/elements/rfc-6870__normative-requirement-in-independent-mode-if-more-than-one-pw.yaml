document: rfc-6870
kind: normative-requirement
summary: In independent mode, if more than one PW qualifies for the active state, each PW endpoint MUST implement a common default mechanism to choose the PW for forwarding, using lowest PWid value (for PWid FEC) or lowest AGI::SAII::TAII unsigned integer (for Generalized PWid FEC).
section: "5.1"
rfc2119_level: MUST
