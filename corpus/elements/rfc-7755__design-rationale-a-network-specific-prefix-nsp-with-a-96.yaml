document: rfc-7755
kind: design-rationale
summary: A Network-Specific Prefix (NSP) with a /96 prefix length is recommended over the Well-Known Prefix (64:ff9b::/96). A /96 NSP allows IPv4 addresses to be embedded in familiar dotted-quad notation within IPv6 text representations, simplifying ACL authoring. NSP also supports multi-instance deployments and inter-domain routing of the translation prefix.
section: "4.4"
topics:
