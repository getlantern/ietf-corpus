document: rfc-2138
kind: normative-requirement
summary: A NAS MUST treat unknown or unsupported Service-Type values (Type 6) as though an Access-Reject had been received. Service-Type values in an Access-Request are only hints that the server is not required to honor.
section: "5.6"
rfc2119_level: MUST
topics:
    - security
