document: rfc-3812
kind: protocol-element
summary: mplsTunnelARHopTable records the actual hops traversed by a tunnel as reported by the MPLS signaling protocol after setup. Support is optional since not all signaling protocols record the actual route; all columns are read-only and contents may change during re-routing.
