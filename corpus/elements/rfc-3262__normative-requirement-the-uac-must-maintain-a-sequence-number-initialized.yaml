document: rfc-3262
kind: normative-requirement
summary: The UAC MUST maintain a sequence number initialized to the RSeq in the first reliable provisional response. If a subsequent reliable provisional response has an RSeq not exactly one higher, it MUST NOT be acknowledged with a PRACK and MUST NOT be processed further.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
