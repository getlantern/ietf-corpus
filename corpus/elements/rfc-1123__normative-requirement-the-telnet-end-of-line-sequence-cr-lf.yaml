document: rfc-1123
kind: normative-requirement
summary: The Telnet end-of-line sequence CR LF MUST be used for non-interactive data (e.g., server output or Telnet incorporated into another protocol). An ASCII server MUST treat both CR LF and CR NUL equivalently as end-of-line on input. A User Telnet MUST be able to send CR LF, CR NUL, and LF.
section: 3.3.1
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
