document: rfc-2930
kind: interoperability-note
summary: The CLASS field in a TKEY RR is ignored and SHOULD be set to 255 (ANY) to maximize compatibility. The TTL field is also ignored. Older DNS implementations must not cache TKEY RRs, hence the requirement for TTL=0.
section: "2"
topics:
