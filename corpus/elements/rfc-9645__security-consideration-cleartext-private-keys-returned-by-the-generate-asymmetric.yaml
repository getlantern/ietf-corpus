document: rfc-9645
kind: security-consideration
summary: Cleartext private keys returned by the generate-asymmetric-key-pair RPC or configured inline in key definitions introduce exposure risk; the encrypted and hidden private-key-encoding options (leveraging RFC 9642 keystore) are the safer alternatives. Configured cipher suites must be compatible with the private key algorithm in use.
section: "5.2"
topics:
    - tls
    - yang
    - security
    - crypto
