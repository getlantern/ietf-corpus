document: rfc-5393
kind: normative-requirement
summary: All proxied requests MUST contain a single Max-Breadth header field value. SIP proxies MUST NOT allow the Outgoing Max-Breadth to exceed the Incoming Max-Breadth in a given response context.
section: 5.3.3
rfc2119_level: MUST NOT
topics:
    - sip
    - security
