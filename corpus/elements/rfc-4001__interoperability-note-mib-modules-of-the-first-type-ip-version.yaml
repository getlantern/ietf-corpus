document: rfc-4001
kind: interoperability-note
summary: MIB modules of the first type (IP-version-neutral management information currently using IPv4-specific constructs) SHOULD provide new tables using these textual conventions with status 'current', while old IPv4-specific tables SHOULD be changed to 'deprecated'. Multiple parallel tables for different IP versions is strongly discouraged.
