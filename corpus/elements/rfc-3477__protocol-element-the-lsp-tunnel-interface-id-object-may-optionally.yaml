document: rfc-3477
kind: protocol-element
summary: The LSP_TUNNEL_INTERFACE_ID object may optionally appear in a Path message (called 'Forward Interface ID') or a Resv message (called 'Reverse Interface ID'). It is used to communicate the identifier allocated to a Forwarding Adjacency between head-end and tail-end LSRs.
section: "3.1"
topics:
