document: rfc-6154
kind: protocol-element
summary: If a server supports both this extension and the METADATA extension (RFC 5464), the special-use attributes for a mailbox SHOULD be tied to the metadata entry '/private/specialuse'. The value is either NIL or a space-separated list of special-use attributes as they appear in LIST responses.
section: "4"
topics:
