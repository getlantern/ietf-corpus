document: rfc-3581
kind: design-rationale
summary: A long-term solution should allow a client to explicitly request receiving incoming requests on the same connection over which the outgoing request was sent, without needing to specify its own address. The solution must also handle server clusters and must not increase network load.
section: "9.4"
topics:
