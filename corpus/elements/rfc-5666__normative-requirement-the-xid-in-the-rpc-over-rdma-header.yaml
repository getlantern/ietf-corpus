document: rfc-5666
kind: normative-requirement
summary: The XID in the RPC-over-RDMA header MUST be the same as the XID in the RPC header. A header of type RDMA_MSG or RDMA_MSGP MUST be followed by the RPC call or reply body beginning with the XID.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
