document: rfc-9406
kind: design-rationale
summary: HyStart++ drops the Inter-Packet Arrival algorithm from the original HyStart and relies solely on the Delay Increase algorithm, because the Inter-Packet Arrival algorithm performs poorly in practice due to ACK compression and fails to detect congestion early.
