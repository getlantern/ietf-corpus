document: rfc-4235
kind: security-consideration
summary: 'Subscriptions to dialog state reveal sensitive information (who is calling whom, call state). All implementations MUST support digest authentication; end-to-end S/MIME MAY be used to protect notification bodies; implementations SHOULD support SIP over TLS and the sips: scheme.'
