document: rfc-3697
kind: wire-format
summary: The Flow Label is a 20-bit field in the IPv6 main header at a fixed position. It is used in combination with the fixed-position Source Address and Destination Address fields to form a 3-tuple flow identifier, enabling classification without parsing extension headers or upper-layer fields.
