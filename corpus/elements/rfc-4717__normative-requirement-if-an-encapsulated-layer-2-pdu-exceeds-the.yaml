document: rfc-4717
kind: normative-requirement
summary: If an encapsulated layer 2 PDU exceeds the tunnel MTU, the ingress router MUST drop it; if the payload exceeds the destination layer 2 interface MTU, the egress router MUST drop it.
section: "5.2"
