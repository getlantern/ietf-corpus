document: rfc-9559
kind: interoperability-note
summary: The legacy Language element uses a 3-character ISO 639-2 bibliographic code and MUST be ignored when the LanguageBCP47 element (RFC 5646 tag) is present in the same TrackEntry. Implementations should prefer LanguageBCP47 (minver=4) for new content.
section: 5.1.4.1.19
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
