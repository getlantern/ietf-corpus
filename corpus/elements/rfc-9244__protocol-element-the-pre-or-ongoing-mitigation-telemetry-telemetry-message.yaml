document: rfc-9244
kind: protocol-element
summary: 'The pre-or-ongoing-mitigation telemetry ''telemetry'' message type (path ''/tm'') carries: target identification, total-traffic (with percentiles and current value), total-attack-traffic, total-attack-connection-protocol, and attack-detail. Each entry is keyed by vendor-id and attack-id and can be correlated to mitigation requests via ''mid-list''.'
section: "8.1"
