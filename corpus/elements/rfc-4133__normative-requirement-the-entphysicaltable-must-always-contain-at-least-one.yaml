document: rfc-4133
kind: normative-requirement
summary: The entPhysicalTable must always contain at least one row for an 'overall' physical entity. For an agent representing a fully-modular device, the top-level entry should have entPhysicalClass 'chassis(3)'; for a module-only agent, it should be 'module(9)'.
section: 2.12.1
rfc2119_level: MUST
topics:
    - snmp
