document: rfc-7662
kind: privacy-consideration
summary: Introspection responses may contain privacy-sensitive information such as user identifiers. To minimize exposure, user identifiers SHOULD be transmitted as opaque service-specific strings, and the server MAY return different identifiers to different protected resources.
section: "5"
topics:
