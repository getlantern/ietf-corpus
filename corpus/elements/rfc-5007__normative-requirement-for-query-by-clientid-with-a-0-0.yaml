document: rfc-5007
kind: normative-requirement
summary: For QUERY_BY_CLIENTID with a 0::0 link-address, the server MUST search all links. If the client is on multiple links, the server MUST return OPTION_LQ_CLIENT_LINK and MUST NOT return any client data in OPTION_CLIENT_DATA.
section: 4.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
