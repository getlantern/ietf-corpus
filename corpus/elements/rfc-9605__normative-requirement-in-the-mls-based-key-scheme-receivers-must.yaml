document: rfc-9605
kind: normative-requirement
summary: In the MLS-based key scheme, receivers MUST remove an old epoch when a new epoch with the same low-order E bits is introduced, preventing unbounded key accumulation during epoch rollover.
section: "5.2"
rfc2119_level: MUST
