document: rfc-1253
kind: design-rationale
summary: The default TOS-0 metric is defined as 10^8/ifSpeed, yielding values such as 1 for >=100 Mbps, 10 for Ethernet, 65 for T1, and 10416 for 9.6 kbps; this makes metrics a measure of bit duration and produces unambiguous, technology-neutral values without manual configuration.
section: "5.8"
topics:
