document: rfc-1766
kind: normative-requirement
summary: Applications should always treat language tags as a single token; the division into main tag and subtags is an administrative mechanism, not a navigation aid. There is no guaranteed mutual comprehensibility between languages whose tags share a common prefix.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
