document: rfc-4220
kind: protocol-element
summary: The teLinkTable (teLinkObjects 1) represents TE links including bundled links, indexed by ifIndex. Each entry requires a corresponding ifEntry with ifType teLink(200); destroying the ifEntry also destroys the teLinkEntry. Key fields include address type, local/remote IP, metric, protection type, working priority, resource class, and incoming/outgoing interface identifiers.
section: "6.1"
topics:
