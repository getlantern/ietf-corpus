document: rfc-2115
kind: protocol-element
summary: frTrapState enables or disables frDLCIStatusChange trap generation (enabled(1)/disabled(2), default disabled). frTrapMaxRate specifies the minimum milliseconds between trap emissions (0..3600000, default 0 meaning no minimum); implementations may drop or queue traps if events occur faster than this rate.
section: "6.4"
topics:
    - snmp
