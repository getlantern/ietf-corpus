document: rfc-8114
kind: protocol-element
summary: uPrefix64 is a /96 IPv6 unicast prefix provisioned to both mAFTR and mB4, used to construct IPv4-embedded IPv6 unicast source addresses from IPv4 source addresses per RFC 6052. It may be the Well-Known Prefix (64:ff9b::/96) or a Network-Specific Prefix.
