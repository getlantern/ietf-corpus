document: rfc-6361
kind: security-consideration
summary: IS-IS authentication mechanisms (RFC 5304, RFC 5310) prevent fabrication of link-state control messages at the TRILL IS-IS layer. PPP CHAP (RFC 1994) is RECOMMENDED when a PPP layer authentication mechanism is needed to protect link establishment and identify a known peer.
section: "4"
rfc2119_level: RECOMMENDED
topics:
