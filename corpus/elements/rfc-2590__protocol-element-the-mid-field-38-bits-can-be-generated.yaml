summary: 'The ''Mid'' field (38 bits) can be generated via two mechanisms: (b.1) merging a 6-bit random number, a 16-bit Frame Relay Node Identifier, and a 16-bit Frame Relay Link Identifier; or (b.2) truncating the BCD-encoded E.164/X.121 number or binary NSAP address to 38 bits.'
