document: rfc-8317
kind: state-machine
summary: 'In PBB-EVPN BUM egress filtering: when a MAC/IP Advertisement route arrives indicating a Leaf B-MAC and the local ES is Leaf, the B-MAC is added to the egress filter (block) list. When a subsequent route indicates the B-MAC changed from Leaf to Root and the local ES is Leaf, the B-MAC is removed from the filter list (unblock).'
section: "5.2"
topics:
    - routing
    - mpls
    - multicast
