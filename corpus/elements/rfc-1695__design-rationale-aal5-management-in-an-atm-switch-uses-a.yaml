document: rfc-1695
kind: design-rationale
summary: AAL5 management in an ATM switch uses a proprietary virtual internal interface (ifType=53) rather than exposing the UNI-facing interface directly, so that per-entity performance statistics can be reported via the standard ifTable without conflating them with ATM cell layer statistics.
