document: rfc-8345
kind: protocol-element
summary: The `network-types` container serves purely as an augmentation target; technology-specific modules insert presence containers beneath it to indicate the network type(s). A network may simultaneously represent multiple types, which is why a container (not a case construct or leaf-list) is used.
section: "4.1"
