document: rfc-2740
kind: design-rationale
summary: The OSPFv2 behavior of discarding unknown LSA types is not supported because it causes problems when the Designated Router supports fewer capabilities than other routers on the link. The U-bit mechanism allows unknown LSA types to propagate without disrupting routers that do not recognize them.
section: "2.9"
topics:
    - routing
