summary: 'Three RPCSEC_GSSv3 structured privilege assertions govern inter-server copy: copy_from_auth (user authorizes source to permit destination to copy), copy_to_auth (user authorizes destination to set up the copy), and copy_confirm_auth (destination confirms authorization to source before data transfer begins).'
