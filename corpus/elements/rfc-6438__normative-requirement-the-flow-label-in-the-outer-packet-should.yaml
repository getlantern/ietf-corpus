document: rfc-6438
kind: normative-requirement
summary: The flow label in the outer packet SHOULD be set by the sending TEP to a 20-bit value in accordance with RFC 6437. The same flow label value MUST be used for all packets in a single user flow, as determined by the IP header fields of the inner packet.
section: "3"
rfc2119_level: MUST
topics:
    - ip
