document: rfc-9870
kind: protocol-element
summary: RFC 9868 reserves Kind=127 (EXP) for SAFE experimental options and Kind=254 (UEXP) for UNSAFE experimental options. Both use 16-bit Experiment Identifiers (ExIDs) to differentiate concurrent experimental option uses; ExIDs are expected to be registered with IANA.
