document: rfc-9476
kind: security-consideration
summary: Because names in the .alt pseudo-TLD are explicitly outside the DNS context, no DNS-related security properties (DNSSEC, etc.) can be relied upon; security must come entirely from the non-DNS resolution system being used.
section: "5"
topics:
