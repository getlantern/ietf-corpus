document: rfc-5934
kind: normative-requirement
summary: Trust anchor update operations listed in a TAMPUpdate MUST be processed in the order they appear, but each update is processed independently. Even if one or more updates fail, the remaining updates MUST be processed. Each update MUST satisfy the subordination checks described in Section 7.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
