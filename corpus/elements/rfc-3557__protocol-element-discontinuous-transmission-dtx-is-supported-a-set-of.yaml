document: rfc-3557
kind: protocol-element
summary: 'Discontinuous Transmission (DTX) is supported: a set of DSR frames coding an unbroken speech segment is called a transmission segment. The end of a segment is determined when consecutive non-speech frames exceed a hangover time threshold (typically 1.5 seconds).'
