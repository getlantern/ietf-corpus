document: rfc-7941
kind: protocol-element
summary: The SDES item RTP header extension uses the RFC 5285 general header extension mechanism, where the ID field maps to both the type of header extension and the type of SDES item. The mapping is established in signaling via a URN identifying the header extension and SDES item type.
