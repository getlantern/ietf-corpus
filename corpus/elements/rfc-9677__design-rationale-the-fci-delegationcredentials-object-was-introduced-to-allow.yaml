document: rfc-9677
kind: design-rationale
summary: The FCI.DelegationCredentials object was introduced to allow the uCDN to supply the appropriate number of delegated credentials to the dCDN, since different dCDN deployments may have varying numbers of endpoints requiring credentials. The dCDN has flexibility to deploy one credential across multiple servers or unique credentials per server.
section: "3.2"
topics:
    - tls
    - security
