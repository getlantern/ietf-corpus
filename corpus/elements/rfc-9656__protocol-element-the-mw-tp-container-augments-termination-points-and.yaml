document: rfc-9656
kind: protocol-element
summary: The mw-tp container augments termination points and uses a choice (mw-tp-option) to classify each termination point as either a microwave-rltp (Radio Link Termination Point, corresponding to an RLT interface per RFC 8561) or a microwave-ctp (Carrier Termination Point, corresponding to a CT interface per RFC 8561).
