document: rfc-4133
kind: protocol-element
summary: The entConfigChange notification is generated when entLastChangeTime changes, allowing an NMS to trigger table maintenance polls. The agent SHOULD NOT generate more than one notification-event per five-second throttling period; changes within the throttling period are suppressed until the period expires.
section: "3"
