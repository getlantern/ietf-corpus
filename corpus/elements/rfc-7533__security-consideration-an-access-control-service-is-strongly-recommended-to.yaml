document: rfc-7533
kind: security-consideration
summary: An Access Control Service is strongly RECOMMENDED to restrict access to the FedFS administration configuration data, preventing namespace corruption and protecting NSDB communication parameters. When TLS trust anchors are provisioned via FEDFS_SET_NSDB_PARAMS, RPCSEC_GSS with data integrity SHOULD be used and access restricted to domain administrators.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
