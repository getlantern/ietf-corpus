document: rfc-5733
kind: protocol-element
summary: 'The EPP <info> response element <contact:infData> returns the full contact state: id, roid, one or more status values, up to two postalInfo elements (int/loc), optional voice and fax, email, sponsoring client ID, creator ID and date, last update ID and date (absent if never modified), last transfer date (absent if never transferred), authInfo (only to the sponsoring client), and optional disclose element.'
section: 3.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
