document: rfc-4802
kind: protocol-element
summary: 'The gmplsTunnelLinkProtection bitmask specifies required link protection for an LSP, with six defined bits: extraTraffic(0), unprotected(1), shared(2), dedicatedOneToOne(3), dedicatedOnePlusOne(4), and enhanced(5). A zero value indicates any protection type is acceptable. Only meaningful when gmplsTunnelLSPEncoding is not ''tunnelLspNotGmpls''.'
section: "8"
topics:
