document: rfc-5019
kind: security-consideration
summary: Because nonce use is optional, stale OCSP responses could be replayed to show a certificate as 'good' when it has been revoked. Clients MUST have access to an accurate time source and ensure responses are sufficiently fresh. Clients with inaccurate clocks may reject fresh responses or accept expired ones.
section: "7.1"
topics:
    - pkix
    - security
