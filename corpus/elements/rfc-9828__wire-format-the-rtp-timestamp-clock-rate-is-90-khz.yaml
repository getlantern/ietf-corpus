document: rfc-9828
kind: wire-format
summary: The RTP timestamp clock rate is 90 kHz. For interlaced frames, Field 2's timestamp MUST be offset from Field 1 by half the instantaneous frame period. For progressive segmented frames, both segments MUST carry the same timestamp. All RTP packets of a given image MUST share the same timestamp.
section: "5.2"
topics:
    - rtp
    - realtime
