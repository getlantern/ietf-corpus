document: rfc-9776
kind: normative-requirement
summary: A State-Change Report triggered by an interface state change is retransmitted [Robustness Variable] - 1 additional times at random intervals within (0, [Unsolicited Report Interval]) to cover the possibility of the report being missed by one or more multicast routers.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - multicast
