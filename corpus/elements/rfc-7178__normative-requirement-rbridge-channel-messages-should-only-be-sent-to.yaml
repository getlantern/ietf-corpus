document: rfc-7178
kind: normative-requirement
summary: RBridge Channel messages SHOULD only be sent to RBridges that advertise support for the channel protocol involved as described in Section 5. Protocol 1 (RBridge Channel Error) MUST be implemented as part of the RBridge Channel feature.
section: "5"
rfc2119_level: MUST
