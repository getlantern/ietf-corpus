document: rfc-7230
kind: protocol-element
summary: The http URI scheme identifies resources by authority (host + optional TCP port), hierarchical path, and optional query. The default TCP port is 80. A sender MUST NOT generate an http URI with an empty host identifier.
section: 2.7.1
topics:
