document: rfc-9140
kind: normative-requirement
summary: A peer that has not received an OOB message SHOULD wait at least the server-specified SleepTime (seconds) before initiating EAP again with the same server. If the server has not sent any SleepTime, the peer MUST wait for the application-specified minimum SleepTimeDefault.
section: 3.2.5
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
