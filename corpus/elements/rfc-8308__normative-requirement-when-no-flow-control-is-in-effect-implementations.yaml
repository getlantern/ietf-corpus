document: rfc-8308
kind: normative-requirement
summary: When 'no-flow-control' is in effect, implementations MUST refuse to open more than one simultaneous channel. Nevertheless, server implementations SHOULD support clients opening more than one non-simultaneous channel.
section: "3.3"
rfc2119_level: MUST
