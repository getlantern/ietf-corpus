document: rfc-3971
kind: protocol-element
summary: The Certification Path Solicitation (CPS) is a new ICMPv6 message (Type 148) sent by hosts to prompt routers to supply a certification path. It includes a non-zero randomly generated 16-bit Identifier and a Component field (65535 = request all certificates).
