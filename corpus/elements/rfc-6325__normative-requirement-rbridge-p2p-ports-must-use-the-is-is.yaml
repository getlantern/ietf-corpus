document: rfc-6325
kind: normative-requirement
summary: RBridge P2P ports MUST use the IS-IS three-way handshake (RFC 5303) so that extended circuit IDs are associated with the link for tie-breaking during distribution tree computation. P2P ports MUST NOT provide any end-station (native frame) service.
section: 4.2.4.1
rfc2119_level: MUST
topics:
    - routing
