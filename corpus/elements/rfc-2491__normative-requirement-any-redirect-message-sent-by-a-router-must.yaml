document: rfc-2491
kind: normative-requirement
summary: Any Redirect message sent by a router MUST conform to all rules in RFC 2461 [7]. If the shortcut target is the destination host, the ICMP Target Address MUST equal the ICMP Destination Address. If the target is an egress router, the ICMP Target Address MUST be a link-local address unique to the NBMA cloud.
section: 3.2.3
rfc2119_level: MUST
topics:
    - ip
    - v6ops
