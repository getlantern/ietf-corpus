document: rfc-2239
kind: protocol-element
summary: 'ifMauAutoNegCapability and ifMauAutoNegCapAdvertised encode auto-negotiation technology abilities as bitmasks (powers of 2 assigned per capability type: bits 10-11 for 10BASE-T HD/FD, bits 14-20 for 100BASE variants). Capabilities in ifMauAutoNegCapAdvertised that are absent from ifMauAutoNegCapability cannot be enabled.'
