document: rfc-1890
kind: normative-requirement
summary: An RTP source emits a single RTP payload type at any given time; the interleaving of several RTP payload types in a single RTP session is not allowed. Multiple RTP sessions may be used in parallel to send multiple media.
section: "6"
rfc2119_level: MUST NOT
topics:
