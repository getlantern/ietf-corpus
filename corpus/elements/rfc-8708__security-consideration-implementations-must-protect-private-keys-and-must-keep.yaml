document: rfc-8708
kind: security-consideration
summary: Implementations MUST protect private keys and MUST keep track of which leaf nodes in the tree have been used. Loss of integrity of leaf-tracking data can cause a one-time key to be used more than once, which breaks the one-time signature security guarantee.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
