document: rfc-5792
kind: normative-requirement
summary: If an attribute with the NOSKIP flag set (bit 0 = 1) is not supported by the recipient, the recipient MUST NOT process any part of the PA-TNC message and SHOULD respond with an Attribute Type Not Supported error. Recipients of multi-attribute messages may need to pre-scan all attributes before acting on any.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
