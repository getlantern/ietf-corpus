document: rfc-4930
kind: protocol-element
summary: An EPP response contains one or more <result> elements (each with a 'code' attribute, <msg> element, optional <value> and <extValue> error details), an optional <msgQ> element for queued messages, an optional <resData> element for object-specific response data, and a <trID> element containing <clTRID> and <svTRID>.
section: "2.6"
