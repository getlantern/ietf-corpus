document: rfc-8223
kind: normative-requirement
summary: If a receiver LSR receives the same TA-Id in more than one TAE, it MUST process the first element and ignore duplicates. If it receives an unknown TA-Id, it MUST silently ignore that TAE and continue processing the rest of the TLV.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
