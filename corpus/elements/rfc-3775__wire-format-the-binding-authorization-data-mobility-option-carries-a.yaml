document: rfc-3775
kind: wire-format
summary: The Binding Authorization Data mobility option carries a MAC computed as First(96, HMAC_SHA1(Kbm, care-of_address|correspondent|MH_data)). The Nonce Indices option carries home and care-of nonce indices allowing the correspondent node to recompute Kbm without storing per-mobile state.
