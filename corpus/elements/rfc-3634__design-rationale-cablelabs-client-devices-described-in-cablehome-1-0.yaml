document: rfc-3634
kind: design-rationale
summary: CableLabs client devices described in CableHome 1.0/1.1 cannot perform DNS lookup of the Kerberos Realm name to find KDC addresses (unlike devices in RFC 3495), necessitating an explicit DHCP sub-option to deliver the KDC server address directly.
section: "1"
