document: rfc-3925
kind: protocol-element
summary: OPTION_V-I_VENDOR_CLASS (option code 124) allows a DHCP client to unambiguously identify one or more vendors by embedding 32-bit IANA Enterprise Numbers, each followed by a data-len and opaque vendor-class-data. Multiple vendor entries may appear within a single option.
section: "3"
topics:
