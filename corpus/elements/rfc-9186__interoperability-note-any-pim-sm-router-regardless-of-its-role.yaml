document: rfc-9186
kind: interoperability-note
summary: Any PIM-SM router, regardless of its role, MAY become the head of a P2MP BFD session. Operators should carefully select routers configured as head to control the volume of BFD Control traffic on shared media segments.
section: "2.1"
topics:
    - multicast
    - routing
