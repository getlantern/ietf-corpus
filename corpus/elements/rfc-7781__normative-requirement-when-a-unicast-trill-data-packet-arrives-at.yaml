document: rfc-7781
kind: normative-requirement
summary: When a unicast TRILL Data packet arrives at a member RBridge with the pseudo-nickname as egress nickname and the destination MAC is not locally reachable, the RBridge SHOULD re-encapsulate the packet with the destination member RBridge's regular nickname as the new egress nickname (tunnel forwarding) to reach the correct member.
section: 6.2.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
