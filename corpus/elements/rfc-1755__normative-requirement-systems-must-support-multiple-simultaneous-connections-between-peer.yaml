document: rfc-1755
kind: normative-requirement
summary: Systems MUST support multiple simultaneous connections between peer systems. Algorithms to prevent call collision such as those in ISO/IEC 8473 section 8.4.3.5 MUST NOT be implemented, as opening multiple connections is specifically permitted.
section: "3.3"
rfc2119_level: MUST NOT
