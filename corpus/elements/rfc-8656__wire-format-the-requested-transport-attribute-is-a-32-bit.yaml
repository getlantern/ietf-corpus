document: rfc-8656
kind: wire-format
summary: 'The REQUESTED-TRANSPORT attribute is a 32-bit field: the first 8 bits specify the IANA protocol number for the desired server-to-peer transport (17 for UDP), and the remaining 24 bits are RFFU and MUST be zero. This attribute is mandatory in Allocate requests.'
section: "18.8"
topics:
