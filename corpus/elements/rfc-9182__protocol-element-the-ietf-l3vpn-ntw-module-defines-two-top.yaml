document: rfc-9182
kind: protocol-element
summary: 'The ''ietf-l3vpn-ntw'' module defines two top-level containers under ''l3vpn-ntw'': ''vpn-profiles'' for provider-maintained common profiles and ''vpn-services'' (a list keyed by ''vpn-id'') that nests ''vpn-nodes'', which in turn contain ''vpn-network-accesses'', forming a hierarchical network-centric model of L3VPN services.'
