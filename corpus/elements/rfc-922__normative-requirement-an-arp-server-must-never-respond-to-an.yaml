document: rfc-922
kind: normative-requirement
summary: An ARP server must never respond to an ARP request whose target address is a broadcast address. Honoring such a request would indicate the querying host does not recognize the broadcast address, and responding would almost certainly cause a forwarding loop, potentially generating T^N spurious rebroadcasts for N confused hosts with TTL T.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
