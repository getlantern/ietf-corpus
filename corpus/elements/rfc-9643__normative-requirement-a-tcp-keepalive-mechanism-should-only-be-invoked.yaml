document: rfc-9643
kind: normative-requirement
summary: A TCP keepalive mechanism SHOULD only be invoked in server applications that might otherwise hang indefinitely and consume resources unnecessarily if a client crashes or aborts a connection during a network failure.
section: 2.1.5
rfc2119_level: SHOULD
