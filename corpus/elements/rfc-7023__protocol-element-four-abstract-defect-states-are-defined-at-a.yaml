document: rfc-7023
kind: protocol-element
summary: 'Four abstract defect states are defined at a PE: PW receive defect (impacts receiving traffic from the far-end PE), PW transmit defect (impacts sending traffic toward the far-end CE), AC receive defect (impacts receiving traffic from the local CE), and AC transmit defect (impacts sending traffic to the local CE). Arrows indicate the direction of user traffic impacted by each defect.'
section: "2.2"
topics:
