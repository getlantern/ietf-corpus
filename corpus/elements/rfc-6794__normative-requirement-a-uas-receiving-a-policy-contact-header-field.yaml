document: rfc-6794
kind: normative-requirement
summary: A UAS receiving a Policy-Contact header field MUST contact one URI from each group of alternative URIs (same 'alt-uri' value) and MUST contact all non-alternative URIs, in the top-to-bottom order listed. If an unacceptable policy is received, the UAS MUST reject with 488.
section: 4.4.3
rfc2119_level: MUST
topics:
    - sip
