document: rfc-4012
kind: normative-requirement
summary: 'When a route6 object is added, the submission must satisfy two authentication criteria: it must match authentication in the aut-num object AND in either a route6 object or, if none found, an inet6num object.'
section: "5.1"
rfc2119_level: MUST
