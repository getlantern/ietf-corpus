document: rfc-6806
kind: design-rationale
summary: The realm organization model uses a KDC-side trusted name service rather than client-side DNS lookups to resolve principals to realms, eliminating reliance on insecure DNS queries (which RFC 4120 prohibits) and the administrative burden of maintaining per-client host-to-realm mapping tables.
section: "4"
topics:
