document: rfc-8213
kind: normative-requirement
summary: For DHCPv6, relay and server implementations MUST support IPsec encryption of relay-to-relay and relay-to-server communication. For DHCPv4, relay and server implementations MUST support IPsec encryption of relay-to-server communication.
