summary: 'Protocol-Origin is an 8-bit value indicating the mechanism used to signal or provision the candidate path. Recommended default values are: PCEP=10, BGP SR Policy=20, Via Configuration=30; lower numeric value indicates lower preference as a tiebreaker.'
