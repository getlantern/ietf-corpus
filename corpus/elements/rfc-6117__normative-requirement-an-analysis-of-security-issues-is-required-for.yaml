document: rfc-6117
kind: normative-requirement
summary: An analysis of security issues is REQUIRED for all registered Enumservices. All known security risks MUST be identified; a statement of 'no security issues' must not be confused with 'issues have not been assessed'.
section: "3.3"
rfc2119_level: REQUIRED
topics:
