document: rfc-9580
kind: design-rationale
summary: 'Version 6 signatures add a mandatory random salt to the hash input to prevent chosen-prefix collision attacks: an attacker who can craft a SHA-x collision would also need to predict or control the salt, making collision-based signature forgeries impractical.'
section: "13.2"
topics:
