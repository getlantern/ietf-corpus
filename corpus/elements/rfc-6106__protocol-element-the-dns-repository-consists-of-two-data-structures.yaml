summary: 'The DNS Repository consists of two data structures maintained by the host: a DNS Server List (RDNSS addresses with Expiration-times) and a DNS Search List (DNSSL domain names with Expiration-times). These parallel the Neighbor Cache and Destination Cache used by Neighbor Discovery.'
