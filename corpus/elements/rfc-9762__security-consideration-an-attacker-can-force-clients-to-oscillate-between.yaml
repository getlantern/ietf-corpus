document: rfc-9762
kind: security-consideration
summary: An attacker can force clients to oscillate between DHCPv6-PD and SLAAC by alternately sending PIOs with and without the P flag, causing repeated REBIND requests that increase load on DHCPv6 infrastructure. RFC 8415 Section 14.1 rate-limiting requirements partially mitigate this.
section: "10"
topics:
    - security
    - ip
    - v6ops
