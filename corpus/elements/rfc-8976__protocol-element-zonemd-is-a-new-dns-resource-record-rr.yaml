document: rfc-8976
kind: protocol-element
summary: 'ZONEMD is a new DNS Resource Record (RR type 63) that conveys a cryptographic message digest of zone data at the zone apex. Its RDATA consists of four fields: Serial (32-bit), Scheme (8-bit), Hash Algorithm (8-bit), and Digest (variable-length). The RR is class independent.'
