document: rfc-8213
kind: privacy-consideration
summary: By using IPsec with encryption, potentially sensitive client message data and relay-included information — such as the DHCPv4 Relay Agent Information option (82), vendor-specific options, and Access-Network-Identifier options — are protected from pervasive monitoring and other attacks.
