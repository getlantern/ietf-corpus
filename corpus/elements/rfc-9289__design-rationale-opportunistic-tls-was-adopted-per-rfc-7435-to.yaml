document: rfc-9289
kind: design-rationale
summary: Opportunistic TLS was adopted (per RFC 7435) to enable gradual rollout alongside non-TLS implementations. The design explicitly acknowledges that upper-layer protocols for sensitive data SHOULD mandate stricter policies (required encryption and mutual authentication) rather than relying solely on opportunistic operation.
section: "1"
topics:
    - tls
    - security
