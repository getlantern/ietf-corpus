document: rfc-6580
kind: security-consideration
summary: This document raises no new security issues because it only creates and populates IANA registries. However, experimental code points (RDMAP OpCode 0xF and SCTP Function Code 0xFFFF) may have harmful side effects and must not be deployed across networks the experimenter does not entirely control; guidance in RFC 3692 must be followed.
section: "2"
topics:
    - security
    - registry
