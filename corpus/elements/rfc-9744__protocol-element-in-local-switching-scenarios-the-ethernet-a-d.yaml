document: rfc-9744
kind: protocol-element
summary: In Local Switching scenarios, the Ethernet A-D per-EVI route must be advertised with the MPLS label associated with either the destination AC or the destination ES, rather than the VID-VRF label, to avoid forwarding ambiguity when the same normalized VID is reachable via two different ESs.
section: 3.3.1
topics:
    - vpn
    - bgp
    - routing
