document: rfc-7011
kind: security-consideration
summary: IPFIX deployments SHOULD use TLS for TCP transport and DTLS for UDP and SCTP transport to protect the confidentiality and integrity of exported flow data. Without such protection, IPFIX traffic is susceptible to eavesdropping, modification, and injection of false flow data.
section: "11.1"
topics:
    - tls
    - security
    - measurement
