document: rfc-5401
kind: normative-requirement
summary: For general Internet operation, K=4 is RECOMMENDED for T_maxBackoff with multicast NACK delivery, and K=6 is RECOMMENDED for unicast NACK delivery, where T_maxBackoff = K * GRTT. Alternate values may be used to trade off buffer utilization, delivery latency, and group size scalability.
section: 3.2.2
rfc2119_level: RECOMMENDED
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
