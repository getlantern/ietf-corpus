document: rfc-6225
kind: design-rationale
summary: Uncertainty is represented as a rectangular prism (independent per-axis values) rather than a more complex shape, because each of the three axes can be assigned an uncertainty value independently. Conversion from PIDF-LO to the GeoLoc uncertainty encoding increases uncertainty by less than a factor of 2 per dimension.
