document: rfc-2141
kind: normative-requirement
summary: Additional lexical equivalences defined by a namespace MUST be documented as part of namespace registration, MUST only eliminate false negatives from the standard procedure, and MUST NEVER declare two URNs inequivalent when the standard procedure declares them equivalent.
section: "5"
rfc2119_level: MUST
