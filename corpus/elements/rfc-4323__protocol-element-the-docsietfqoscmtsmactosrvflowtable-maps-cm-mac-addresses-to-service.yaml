document: rfc-4323
kind: protocol-element
summary: The docsIetfQosCmtsMacToSrvFlowTable maps CM MAC addresses to Service Flow IDs on the CMTS, enabling external applications to collect aggregate statistics for all flows belonging to a given CM. Downstream multicast Service Flows are excluded because they are not associated with a single CM.
section: 2.2.11
