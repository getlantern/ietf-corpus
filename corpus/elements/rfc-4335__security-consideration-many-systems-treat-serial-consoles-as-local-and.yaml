document: rfc-4335
kind: security-consideration
summary: Many systems treat serial consoles as local and secured and interpret a BREAK signal as an instruction to halt the OS or enter privileged configuration modes. SSH access to BREAK-enabled ports MUST be limited to users with appropriate privileges, or BREAK support MAY be made configurable per-port or per-server.
section: "4"
topics:
    - security
