document: rfc-1368
kind: design-rationale
summary: The group-level monitor counters (rptrMonitorGroupTotalFrames, TotalOctets, TotalErrors) are acknowledged as redundant summations of per-port data, but are included explicitly because polling a single aggregated counter provides considerable optimization of network management traffic over retrieving all individual port counters.
section: "4.3"
