document: rfc-4501
kind: normative-requirement
summary: A client MAY check that it understands the dnsclassval and dnstypeval before sending a query, to ensure it can interpret the response. A proxy treating the response as opaque data would not need to perform such a check.
section: "3"
rfc2119_level: MAY
