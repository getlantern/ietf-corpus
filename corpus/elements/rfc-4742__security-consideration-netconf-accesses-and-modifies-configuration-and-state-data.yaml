document: rfc-4742
kind: security-consideration
summary: NETCONF accesses and modifies configuration and state data, which may include sensitive information such as usernames or security keys; access must be limited to authorized users and systems, and NETCONF should only be used over channels providing strong encryption.
section: "6"
topics:
