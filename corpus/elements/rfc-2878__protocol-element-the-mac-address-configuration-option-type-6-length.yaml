document: rfc-2878
kind: protocol-element
summary: The MAC-Address Configuration Option (Type 6, Length 8) allows a bridge to announce its 6-octet MAC address or request one be assigned (by sending all-zeros). A Configure-Nak MUST specify a valid physical address with multicast bit (M) zero.
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
