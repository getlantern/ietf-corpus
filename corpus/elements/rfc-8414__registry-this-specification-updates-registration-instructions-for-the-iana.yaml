document: rfc-8414
kind: registry
summary: This specification updates registration instructions for the IANA 'OAuth Access Token Types' and 'OAuth Token Endpoint Authentication Methods' registries to require that Designated Experts reject registration requests in one registry for values already occurring in the other, keeping them mutually exclusive.
section: "7.2"
topics:
