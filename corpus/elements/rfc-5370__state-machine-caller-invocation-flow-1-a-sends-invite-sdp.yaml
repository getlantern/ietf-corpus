document: rfc-5370
kind: state-machine
summary: 'Caller invocation flow: (1) A sends INVITE+SDP+URI-list to T; (2) T sends 183 Session Progress to A; (3) T sends new INVITE to B; (4) B replies 200 OK; (5) T sends ACK to B; (6) T sends 200 OK to A; (7) A sends ACK to T; media flows A-T and T-B.'
