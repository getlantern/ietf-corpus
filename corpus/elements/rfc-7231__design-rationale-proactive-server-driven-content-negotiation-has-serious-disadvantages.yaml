document: rfc-7231
kind: design-rationale
summary: 'Proactive (server-driven) content negotiation has serious disadvantages: the server cannot accurately determine what is best for the user, sending capabilities in every request is inefficient and a privacy risk, it complicates server implementations, and it limits cacheability of responses.'
section: 3.4.1
topics:
    - http
    - privacy
