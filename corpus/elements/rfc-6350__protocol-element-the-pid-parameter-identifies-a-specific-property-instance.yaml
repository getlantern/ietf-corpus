document: rfc-6350
kind: protocol-element
summary: The PID parameter identifies a specific property instance among multiple instances, analogous to UID on a per-property basis. Its value is a single positive integer or a pair of positive integers separated by a dot. Each distinct PID source identifier in a vCard MUST have an associated CLIENTPIDMAP property.
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
