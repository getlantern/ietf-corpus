document: rfc-8859
kind: normative-requirement
summary: For TRANSPORT category attributes, the software MUST pick the value associated with the "m=" line whose information is used for setting up the underlying transport (per RFC 8843, the first MID in the BUNDLE group line). Attributes in this category include ice-pwd, ice-ufrag, candidate, fingerprint, crypto, setup, connection, and zrtp-hash.
section: "4.5"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - webrtc
    - nat
