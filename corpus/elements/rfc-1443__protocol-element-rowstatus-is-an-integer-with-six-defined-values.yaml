document: rfc-1443
kind: protocol-element
summary: 'RowStatus is an INTEGER with six defined values: active(1), notInService(2), notReady(3) — which are readable states — and createAndGo(4), createAndWait(5), destroy(6) — which are write-only action values. It is used as the SYNTAX of the status column for conceptual row management.'
