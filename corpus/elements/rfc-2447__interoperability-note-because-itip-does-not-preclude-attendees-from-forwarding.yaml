document: rfc-2447
kind: interoperability-note
summary: Because iTIP does not preclude Attendees from forwarding VEVENTs or VTODOs, the RFC-822 Sender value may not equal the Organizer's address, and the Organizer or Attendee cannot be reliably inferred from the Sender or Reply-To headers of an iMIP message.
section: "2.3"
