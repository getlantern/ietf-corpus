document: rfc-5322
kind: design-rationale
summary: Implementations SHOULD use the full name-addr form (display name in the phrase before angle-bracket addr-spec) rather than the legacy form where the name appeared as a comment after the bare addr-spec. Comments in address fields generally SHOULD NOT be used as some legacy implementations interpret them in conflicting ways.
section: "3.4"
topics:
    - email
