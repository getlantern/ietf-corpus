document: rfc-6680
kind: design-rationale
summary: Name attribute values are made available in canonical network encodings (rather than language- or platform-specific types) to facilitate construction of portable Access Control Lists. A separate display function (GSS_Display_name_ext) is provided for applications needing local representations.
