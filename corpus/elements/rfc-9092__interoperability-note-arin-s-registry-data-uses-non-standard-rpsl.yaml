document: rfc-9092
kind: interoperability-note
summary: 'ARIN''s registry data uses non-standard RPSL attribute names: ''NetRange'' instead of ''inetnum'' and ''Comment'' instead of ''remarks''; consumers must map these when accessing ARIN data via FTP, WHOIS, RDAP, or other means.'
