document: rfc-4433
kind: normative-requirement
summary: While dynamic HA assignment is in progress and the MN has not successfully anchored at a home agent, the MN MUST set the Home Agent field in the Registration Request to ALL-ZERO-ONE-ADDR (either 255.255.255.255 or 0.0.0.0).
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
