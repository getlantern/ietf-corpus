document: rfc-5122
kind: design-rationale
summary: XMPP identifiers are registered primarily as URIs rather than IRIs because there is no freestanding registry of IRI schemes; the IANA recognizes only URI schemes. The document defines IRI syntax in addition to URI syntax to enable internationalization.
