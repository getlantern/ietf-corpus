document: rfc-9572
kind: normative-requirement
summary: When an ASBR re-advertises an Inter-AS A-D route for EVPNs, the PTA MUST specify the tunnel for the segment. If and only if the ASBR needs to know the leaves to establish the tunnel, the ASBR MUST set the L flag to 1 in the PTA and MUST be (auto-)configured with an import RT for Leaf A-D routes.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
