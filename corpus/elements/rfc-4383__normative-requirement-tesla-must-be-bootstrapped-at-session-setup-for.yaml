document: rfc-4383
kind: normative-requirement
summary: TESLA MUST be bootstrapped at session setup for parameter exchange and initial key commitment; a digital signature algorithm is RECOMMENDED for this bootstrapping. Time synchronization to bound clock drift D_t is also required out-of-band before the session begins.
section: "5"
rfc2119_level: MUST
