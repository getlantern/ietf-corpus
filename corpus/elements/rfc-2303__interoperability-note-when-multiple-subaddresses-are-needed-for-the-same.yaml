document: rfc-2303
kind: interoperability-note
summary: When multiple subaddresses are needed for the same global-phone, multiple pstn-email elements MUST be used. The UA may accept multiple subaddress elements but MUST generate multiple pstn-mbox elements when passing the message to the MTA.
section: "4.1"
topics:
    - email
