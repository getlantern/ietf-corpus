document: rfc-8920
kind: normative-requirement
summary: New applications that future documents define to use ASLA advertisements MUST NOT make use of RSVP-TE LSA advertisements (OSPFv2 TE Opaque LSA or OSPFv3 Intra-Area-TE-LSA), simplifying deployment by eliminating multiple advertisement paths.
section: "12.1"
rfc2119_level: MUST NOT
