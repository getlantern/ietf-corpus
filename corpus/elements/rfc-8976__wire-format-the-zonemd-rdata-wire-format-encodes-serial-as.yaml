document: rfc-8976
kind: wire-format
summary: The ZONEMD RDATA wire format encodes Serial as a 32-bit unsigned integer in network byte order, followed by Scheme (8-bit), Hash Algorithm (8-bit), and Digest (variable-length octet sequence). Total fixed overhead before the digest is 6 octets.
