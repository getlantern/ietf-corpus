document: rfc-7543
kind: normative-requirement
summary: When the ROUTE-REFRESH message includes only CP-ORF entries, the BGP speaker MUST re-advertise routes affected by those CP-ORF entries. It is RECOMMENDED not to re-advertise routes unaffected by the CP-ORF entries.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
