document: rfc-7737
kind: interoperability-note
summary: If an initiator that sent an echo request with 'Reply via Specified Path' (value=5) and no Reply Path TLV receives back a 'Malformed echo request received' return code, it SHOULD assume the responder does not support the relaxed semantics defined in this document.
