document: rfc-4422
kind: design-rationale
summary: The authorization identity string is defined as a Unicode string (not an octet string as implied by RFC 2222) to allow unambiguous internationalized identity transfer. The NUL character is prohibited to avoid ambiguity in C-string implementations and decoding.
section: B
topics:
