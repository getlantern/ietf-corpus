document: rfc-9911
kind: protocol-element
summary: The counter32 type (uint32 base) and counter64 type (uint64 base) represent monotonically increasing non-negative integers that wrap around to zero upon reaching their maximum values (2^32-1 and 2^64-1 respectively). Counters have no defined initial value; discontinuities must be indicated by a companion schema node.
