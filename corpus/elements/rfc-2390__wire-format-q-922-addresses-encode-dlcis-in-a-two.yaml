document: rfc-2390
kind: wire-format
summary: 'Q.922 addresses encode DLCIs in a two-byte format: high-order DLCI bits plus C/R and EA in the first byte, lower DLCI bits plus FECN, BECN, DE, and EA in the second byte. For InARP, FECN, BECN, C/R, and DE bits are assumed to be zero.'
section: "7.2"
