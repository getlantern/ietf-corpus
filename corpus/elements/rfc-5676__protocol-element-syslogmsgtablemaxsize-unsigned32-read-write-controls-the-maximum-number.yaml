document: rfc-5676
kind: protocol-element
summary: syslogMsgTableMaxSize (Unsigned32, read-write) controls the maximum number of SYSLOG messages held in syslogMsgTable; a value of 0 means no fixed limit. Its value SHOULD be kept in nonvolatile memory.
