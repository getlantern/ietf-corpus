document: rfc-4629
kind: normative-requirement
summary: For packets starting at the location of a Picture Start Code, PLEN shall be zero unless the picture header in the bitstream is incomplete (UFEP='000') AND the attached additional picture header is complete (UFEP='001').
section: 6.1.1
rfc2119_level: SHALL
