document: rfc-7260
kind: state-machine
summary: 'OAM parameter adjustment sequence: (1) re-signal LSP with ''OAM Alarms Enabled'' cleared and updated OAM Configuration TLV; (2) initiator suppresses alarms while keeping OAM running; (3) receiver disables alarms, updates parameters, replies with Resv; (4) initiator updates after Resv; (5) subsequent Path/Resv exchange re-enables alarms.'
section: "3.2"
