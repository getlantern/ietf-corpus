document: rfc-8266
kind: design-rationale
summary: NFKC normalization is chosen because it is more aggressive than other normalization forms, performing both canonical and compatibility decomposition before recomposing, thereby increasing the number of code points that would match (e.g., ROMAN NUMERAL FOUR U+2163 matches 'IV').
