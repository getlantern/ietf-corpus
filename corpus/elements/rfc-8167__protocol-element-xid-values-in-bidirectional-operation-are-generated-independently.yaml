document: rfc-8167
kind: protocol-element
summary: XID values in bidirectional operation are generated independently on each host. A forward-direction Requester MAY use the same XID value simultaneously as a reverse-direction Requester on the same connection; such concurrent requests represent distinct ONC RPC transactions.
section: 2.4.1
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
