document: rfc-8139
kind: normative-requirement
summary: A TRILL switch that is shutting down a port soon SHOULD reduce its Holding Time on that port so that adjacent RBridges not supporting the Port-Shutdown message will notice the shutdown more rapidly.
section: "6.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
