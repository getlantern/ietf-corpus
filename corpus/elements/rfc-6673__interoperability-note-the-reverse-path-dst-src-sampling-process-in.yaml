document: rfc-6673
kind: interoperability-note
summary: The reverse-path (Dst->Src) sampling process in a round-trip measurement is conditional on successful delivery to Dst; when appreciable forward-path loss or delay variation occurs, the reverse-path sample is significantly distorted, making one-way reverse-path performance assessment invalid.
section: "7"
topics:
    - measurement
