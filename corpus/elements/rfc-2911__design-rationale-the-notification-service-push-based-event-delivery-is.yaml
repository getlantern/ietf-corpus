document: rfc-2911
kind: design-rationale
summary: The notification service (push-based event delivery) is explicitly out of scope for IPP/1.1. Clients must poll using Get-Printer-Attributes, Get-Jobs, and Get-Job-Attributes. This simplification keeps IPP/1.1 focused on core end-user printing functionality, deferring notification to a separate future extension.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
