summary: Non-ambiguous addresses (the replacement direction, e.g., Unique Local IPv6 Unicast Addresses) solve most developer pain by eliminating the need to manage site identifiers, allowing applications to treat addresses like regular global addresses and leaving interface selection to the stack.
