document: rfc-5949
kind: normative-requirement
summary: The PMAG and NMAG MUST use the same tunneling mechanism for data traffic tunneled between them. The encapsulation mode SHOULD be configurable, and the default is to match the encapsulation used on the PMIPv6 LMA-MAG tunnel.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
