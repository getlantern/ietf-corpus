document: rfc-4861
kind: protocol-element
summary: Neighbor Solicitation (ICMPv6 Type 135) is sent to determine a neighbor's link-layer address or to verify reachability. It contains a 128-bit Target Address (MUST NOT be multicast) and optionally a Source Link-Layer Address option; it is multicast to the solicited-node address for resolution or unicast for NUD probing.
section: "4.3"
topics:
