document: rfc-4319
kind: normative-requirement
summary: When interval data is suspect or known to be invalid, the agent MUST NOT report the interval. If the current 15-minute event bucket is determined to be invalid, notifications based upon its value MUST NOT be generated. This results in holes in interval tables.
section: "2.6"
rfc2119_level: MUST NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
