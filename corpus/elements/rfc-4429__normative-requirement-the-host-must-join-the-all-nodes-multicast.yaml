document: rfc-4429
kind: normative-requirement
summary: The host MUST join the all-nodes multicast address and the solicited-node multicast address of the Tentative address, and SHOULD NOT delay before sending Neighbor Solicitation messages, eliminating the RetransTimer delay that is the primary motivation for Optimistic DAD.
section: "3.3"
rfc2119_level: MUST
topics:
