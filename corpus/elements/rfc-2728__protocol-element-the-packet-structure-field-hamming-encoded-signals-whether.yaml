document: rfc-2728
kind: protocol-element
summary: 'The Packet Structure field (Hamming encoded) signals whether the data block is full or contains filler (bit 1), and the FEC suffix length (bits 6–7): D0 = data packet no filler, 8C = data packet with filler, A1 = FEC packet. Filler data is indicated by 0x15 followed by 0xEA bytes.'
section: "3.2"
extracted_by: claude-sonnet-4-6
