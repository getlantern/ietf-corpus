document: rfc-3046
kind: normative-requirement
summary: The Relay Agent Information option echoed by a server MUST be removed by either the relay agent or the trusted downstream network element which added it when forwarding a server-to-client response back to the client.
section: "2.1"
rfc2119_level: MUST
