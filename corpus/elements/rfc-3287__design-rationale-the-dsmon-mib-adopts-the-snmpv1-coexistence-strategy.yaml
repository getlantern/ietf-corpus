document: rfc-3287
kind: design-rationale
summary: 'The DSMON MIB adopts the SNMPv1 coexistence strategy: wherever a 64-bit Counter64 is provided, a 32-bit ZeroBasedCounter32 and a 32-bit overflow counter are also provided, ensuring compatibility with SNMPv1 managers that cannot handle Counter64.'
