document: rfc-1034
kind: protocol-element
summary: Standard queries specify QNAME, QTYPE (16-bit, superset of defined types including AXFR for zone transfer, MAILB, and * for all types), and QCLASS (16-bit, including * for all classes). A QCLASS=* query can never yield an authoritative response because a server may not know all classes.
section: 3.7.1
topics:
    - dns
