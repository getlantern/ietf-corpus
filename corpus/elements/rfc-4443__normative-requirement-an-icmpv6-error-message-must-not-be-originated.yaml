document: rfc-4443
kind: normative-requirement
summary: 'An ICMPv6 error message MUST NOT be originated in response to: another ICMPv6 error message, an ICMPv6 redirect message, a packet destined to an IPv6 multicast address (with two exceptions), a link-layer multicast or broadcast, or a packet whose source address does not uniquely identify a single node.'
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
