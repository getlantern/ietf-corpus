document: rfc-6829
kind: protocol-element
summary: The FEC 129 Pseudowire IPv6 sub-TLV (type 25) carries Sender's and Remote PE IPv6 addresses (16 octets each), PW Type, and variable-length AGI, SAII, and TAII fields. The minimum fixed portion is 40 octets; padding to a 4-octet boundary is required but not included in the Length field.
section: "3.2"
