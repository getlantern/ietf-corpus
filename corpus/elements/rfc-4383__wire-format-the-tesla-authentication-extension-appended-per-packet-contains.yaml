document: rfc-4383
kind: wire-format
summary: 'The TESLA authentication extension appended per-packet contains three mandatory fields: a 32-bit time interval identifier i, a variable-length Disclosed Key (K_(i-d)), and a variable-length TESLA MAC. Field lengths for Disclosed Key and TESLA MAC are established by the SRTP cryptographic context parameters.'
section: "4.1"
