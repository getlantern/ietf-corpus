document: rfc-8415
kind: normative-requirement
summary: A Relay-forward message MUST include a Relay Message option encapsulating the client or nested relay message. Relay agents MUST increment the hop-count field before forwarding and MUST discard messages whose hop-count reaches or exceeds HOP_COUNT_LIMIT (8).
section: "9.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
