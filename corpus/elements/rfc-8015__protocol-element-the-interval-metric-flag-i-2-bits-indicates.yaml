document: rfc-8015
kind: protocol-element
summary: The Interval Metric flag (I, 2 bits) indicates whether metrics are Interval Duration (I=10) — applying to the most recent measurement interval — or Cumulative Duration (I=11) — applying to the full accumulation period. Sampled metrics (I=01) and I=00 are not permitted for this block.
section: "3.2"
