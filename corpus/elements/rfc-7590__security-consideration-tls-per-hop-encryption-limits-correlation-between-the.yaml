document: rfc-7590
kind: security-consideration
summary: TLS per-hop encryption limits correlation between the XMPP application layer and the underlying network/transport layers, and because XMPP has only one hop between servers, encrypting all hops (client-to-server, server-to-server, server-to-client) helps limit metadata leakage.
