document: rfc-3472
kind: interoperability-note
summary: Bandwidth encodings for GMPLS are carried in the existing CR-LDP Traffic Parameters TLV using its Peak and Committed Data Rate fields, with values defined in RFC 3471. Other bandwidth or service-related parameters in the TLV are ignored by GMPLS nodes and carried transparently.
section: 2.1.2
topics:
    - routing
