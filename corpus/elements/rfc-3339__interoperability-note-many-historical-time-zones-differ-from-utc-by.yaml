document: rfc-3339
kind: interoperability-note
summary: Many historical time zones differ from UTC by a non-integral number of minutes (e.g., Netherlands was +00:19:32.13 before 1937). Since the format only represents offsets in integral minutes, applications must convert such historical timestamps to the closest representable UTC offset.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
