document: rfc-3339
kind: interoperability-note
summary: Many historical time zones differ from UTC by a non-integral number of minutes (e.g., Netherlands was +00:19:32.13). Since the format only supports HH:MM offsets, applications must convert such historical timestamps to the nearest representable UTC offset.
section: "4.2"
