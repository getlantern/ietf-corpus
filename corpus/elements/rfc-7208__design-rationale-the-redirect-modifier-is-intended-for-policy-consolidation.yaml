document: rfc-7208
kind: design-rationale
summary: The 'redirect' modifier is intended for policy consolidation within a single ADMD (all domain variants share one record), while 'include' is intended for crossing administrative boundaries. Using 'redirect' across administrative domains is unreliable because the referenced record may use local-part-dependent mechanisms that do not apply to the original sender.
section: "6.1"
topics:
    - email
extracted_by: claude-sonnet-4-6
