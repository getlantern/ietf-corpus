document: rfc-4826
kind: normative-requirement
summary: The URI in the 'uri' attribute of the <service> element MUST be unique across all <service> elements in any document on a particular server, spanning all XCAP roots. If the URI already exists, the server MUST reject the request with a 409.
section: 4.4.5
rfc2119_level: MUST
topics:
    - sip
    - registry
