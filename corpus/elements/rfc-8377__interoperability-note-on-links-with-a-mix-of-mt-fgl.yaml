document: rfc-8377
kind: interoperability-note
summary: On links with a mix of MT, FGL, or VL TRILL switches, the Special VLANs and Flags, Enabled-VLANs, Appointed Forwarders, and VLANs Appointed sub-TLVs MUST occur only in MT Port Capability TLVs with a zero MT-ID, since VL and FGL TRILL switches do not understand topologies.
section: "4"
rfc2119_level: MUST
