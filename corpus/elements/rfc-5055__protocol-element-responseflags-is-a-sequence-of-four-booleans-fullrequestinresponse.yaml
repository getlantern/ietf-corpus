document: rfc-5055
kind: protocol-element
summary: 'ResponseFlags is a SEQUENCE of four BOOLEANs: fullRequestInResponse [0] DEFAULT FALSE (include full request in response for archival), responseValidationPolByRef [1] DEFAULT TRUE (policy by reference vs. by value), protectResponse [2] DEFAULT TRUE (require digital signature or MAC on response), and cachedResponse [3] DEFAULT TRUE (accept cached responses). If all defaults apply, the item MUST be omitted.'
section: 3.2.5
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
