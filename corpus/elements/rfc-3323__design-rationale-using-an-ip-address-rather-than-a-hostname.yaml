document: rfc-3323
kind: design-rationale
summary: 'Using an IP address rather than a hostname in Contact/Via URIs is not recommended for privacy: reverse-resolving such addresses is generally trivial, and substituting an IP address could introduce complications for NAT/firewall traversal and DNS-dependent services.'
section: 4.1.1.3
topics:
    - sip
    - privacy
    - nat
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
