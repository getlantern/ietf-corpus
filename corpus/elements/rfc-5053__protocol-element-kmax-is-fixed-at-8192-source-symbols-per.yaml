document: rfc-5053
kind: protocol-element
summary: Kmax is fixed at 8192 source symbols per source block. The number of pre-coding symbols is L = K+S+H, where S is the smallest prime >= ceil(0.01*K)+X (X the smallest integer with X*(X-1)>=2*K), and H is the smallest integer with choose(H, ceil(H/2)) >= K+S.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
