document: rfc-6749
kind: security-consideration
summary: An attacker may manipulate the redirection URI in an authorization code request to cause the authorization server to deliver the code to an attacker-controlled endpoint. Authorization servers MUST require pre-registration of complete redirect URIs and perform strict URI matching per RFC 3986 Section 6.
section: "10.6"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
