document: rfc-7860
kind: normative-requirement
summary: The user's secret key used when calculating a digest MUST be 28 octets for SHA-224, 32 octets for SHA-256, 48 octets for SHA-384, and 64 octets for SHA-512, each derived with the corresponding hash function.
