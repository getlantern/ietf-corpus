document: rfc-4761
kind: normative-requirement
summary: Any VPLS implementation that uses MPLS-in-IP or MPLS-in-GRE tunneling MUST implement IPsec as specified in RFC 4023. If IPsec is not used, the implementation MUST allow egress PEs to validate the IP source address of tunneled packets against a list of valid tunnel head addresses.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - ipsec
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
