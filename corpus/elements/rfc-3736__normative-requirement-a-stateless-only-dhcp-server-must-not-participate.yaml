document: rfc-3736
kind: normative-requirement
summary: A stateless-only DHCP server must not participate in any stateful address configuration message exchanges. If other DHCP servers are configured to provide stateful address assignment, one of those servers will provide address assignment.
section: "6"
rfc2119_level: MUST NOT
topics:
