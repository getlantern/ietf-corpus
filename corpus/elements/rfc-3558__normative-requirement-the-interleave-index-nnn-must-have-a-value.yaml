document: rfc-3558
kind: normative-requirement
summary: The Interleave Index (NNN) MUST have a value less than or equal to LLL. Packets with NNN greater than LLL are invalid and SHOULD be ignored by the receiver.
section: "4.1"
rfc2119_level: MUST
