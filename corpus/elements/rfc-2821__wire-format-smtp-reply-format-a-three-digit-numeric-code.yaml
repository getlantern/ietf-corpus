document: rfc-2821
kind: wire-format
summary: 'SMTP reply format: a three-digit numeric code followed by a space (or hyphen for multiline continuations) and a text string, terminated by <CRLF>. The first digit indicates success (2), intermediate (3), transient failure (4), or permanent failure (5). Reply code 354 signals start of data; 250 signals general success.'
section: "4.2"
topics:
