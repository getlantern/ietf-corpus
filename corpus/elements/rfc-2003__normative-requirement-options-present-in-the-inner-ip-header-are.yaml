document: rfc-2003
kind: normative-requirement
summary: Options present in the inner IP header are in general NOT copied to the outer IP header; however, new options specific to the tunnel path MAY be added, and inner header security options MAY affect the choice of security options for the outer header.
section: "3.1"
rfc2119_level: MAY
topics:
    - ip
    - security
