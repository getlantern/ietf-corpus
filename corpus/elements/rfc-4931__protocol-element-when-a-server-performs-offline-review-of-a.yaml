document: rfc-4931
kind: protocol-element
summary: When a server performs offline review of a transform command, it MUST return response code 1001 and set the appropriate pending* status on the object. Upon completion the server MUST notify all involved clients via a service message (or out-of-band mechanism) and remove the pending* status.
section: "3.3"
topics:
    - dns
