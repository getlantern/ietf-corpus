document: rfc-9177
kind: design-rationale
summary: 'Q-Block options were introduced to fill a gap in RFC 7959: block-wise transfers using Non-confirmable messages where an entire body can be sent without requiring intermediate acknowledgments. The primary target is DDoS mitigation signaling (DOTS, RFC 9132) where ''flooded pipe'' conditions make CON-based lock-stepping impractical.'
section: "1"
topics:
