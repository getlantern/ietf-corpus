document: rfc-8514
kind: normative-requirement
summary: Once calculated, the save date attribute MUST NOT change as long as the message is contained within the same mailbox. Copying or moving the message to another mailbox always results in a new save date in the destination; the source copy's save date remains unaffected.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
