document: rfc-3982
kind: normative-requirement
summary: In <findDomainsByContact>, if <baseDomain> is present it MUST restrict results to domains underneath the specified domain. The <contactHandle> or a contactSearchGroup element must be used to constrain the search.
section: 3.1.2
rfc2119_level: MUST
topics:
    - dns
    - registry
