document: rfc-6513
kind: security-consideration
summary: Section 13 addresses security for MVPN. The integrity of VPN traffic isolation depends on the security of BGP-based auto-discovery and C-multicast routing; a compromised PE could inject false Intra-AS I-PMSI A-D routes or C-multicast routes, violating MVPN isolation boundaries. Standard BGP security mechanisms from RFC 4364 apply.
section: "13"
topics:
    - security
    - mpls
    - bgp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
