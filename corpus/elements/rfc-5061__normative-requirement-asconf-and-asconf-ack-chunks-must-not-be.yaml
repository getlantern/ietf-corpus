document: rfc-5061
kind: normative-requirement
summary: ASCONF and ASCONF-ACK chunks MUST NOT be sent in any SCTP state other than ESTABLISHED, SHUTDOWN-PENDING, SHUTDOWN-RECEIVED, and SHUTDOWN-SENT. An ASCONF or ASCONF-ACK SHOULD NOT exceed the PMTU.
section: 5.1.1
rfc2119_level: MUST NOT
