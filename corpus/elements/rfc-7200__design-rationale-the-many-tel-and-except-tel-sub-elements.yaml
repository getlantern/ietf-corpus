document: rfc-7200
kind: design-rationale
summary: The <many-tel> and <except-tel> sub-elements were introduced rather than reusing or redefining the "domain" attribute in RFC 4745's <many>/<except> elements, because adding attributes to those elements is not permitted and redefining "domain" would create backward-compatibility issues.
section: 5.3.1
topics:
    - sip
    - realtime
