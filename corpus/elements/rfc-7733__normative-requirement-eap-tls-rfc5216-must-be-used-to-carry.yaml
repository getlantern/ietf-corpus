document: rfc-7733
kind: normative-requirement
summary: EAP-TLS [RFC5216] MUST be used to carry TLS records for the authentication protocol, and EAP [RFC3748] MUST be used to provide mutual authentication mechanisms. PANA [RFC5191] and a PANA relay [RFC6345] MUST be used for multi-hop EAP transport.
section: 4.1.8.2.1
rfc2119_level: MUST
