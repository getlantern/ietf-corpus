document: rfc-6107
kind: protocol-element
summary: The LSP_TUNNEL_INTERFACE_ID object (C-NUM 193) is extended with three new C-Types (2, 3, 4) to support IPv4 numbered, IPv6 numbered, and unnumbered links respectively, each carrying an Actions field and optional TLVs to indicate how the resulting TE link is to be used and advertised.
