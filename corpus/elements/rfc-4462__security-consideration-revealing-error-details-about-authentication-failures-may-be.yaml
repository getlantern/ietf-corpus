document: rfc-4462
kind: security-consideration
summary: Revealing error details about authentication failures may be unacceptable under site security policy. Implementations SHOULD provide a means to suppress SSH_MSG_USERAUTH_GSSAPI_ERROR, SSH_MSG_USERAUTH_GSSAPI_ERRTOK, SSH_MSG_KEXGSS_ERROR, and GSS error tokens in SSH_MSG_KEXGSS_CONTINUE messages as a matter of configurable policy.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
