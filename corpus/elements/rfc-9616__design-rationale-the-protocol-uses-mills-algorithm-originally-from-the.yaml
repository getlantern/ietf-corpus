document: rfc-9616
kind: design-rationale
summary: 'The protocol uses Mills'' algorithm (originally from the HELLO routing protocol, later used in NTP) for RTT estimation because it does not require synchronized clocks—it only ever computes differences of timestamps from a single clock—and requires minimal state: just two timestamps per neighbour.'
