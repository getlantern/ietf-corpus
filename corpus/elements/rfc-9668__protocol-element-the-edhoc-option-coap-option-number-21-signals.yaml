document: rfc-9668
kind: protocol-element
summary: The EDHOC option (CoAP option number 21) signals that a request payload combines EDHOC message_3 and OSCORE-protected data. It is Critical, Safe-to-Forward, part of the Cache-Key, MUST occur at most once, and MUST be empty (length 0). It is Class U for OSCORE and intended only for CoAP requests.
section: "3.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
