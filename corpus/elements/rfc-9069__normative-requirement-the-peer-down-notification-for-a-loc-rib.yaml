document: rfc-9069
kind: normative-requirement
summary: The Peer Down notification for a Loc-RIB peer MUST use reason code 6 ('Local system closed, TLV data follows'). The VRF/Table Name TLV MUST be included in the Peer Down if it was present in the Peer Up.
section: "5.3"
rfc2119_level: MUST
topics:
