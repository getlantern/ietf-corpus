document: rfc-7877
kind: normative-requirement
summary: Delete operations in SPPF MUST be atomic. When an object is deleted, all cross-references to it (e.g., Destination Group membership, SED Group associations, related SED Group Offers) must be automatically removed by the SPPF implementation.
section: "7.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
