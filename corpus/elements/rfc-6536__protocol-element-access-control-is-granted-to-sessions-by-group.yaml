document: rfc-6536
kind: protocol-element
summary: Access control is granted to sessions by group membership, not directly to individual users. The groups container maps usernames to named groups; a user may belong to multiple groups. Transport-layer-reported group names (e.g., from RADIUS) may optionally supplement locally configured groups.
section: 3.3.1
topics:
    - netconf
    - security
