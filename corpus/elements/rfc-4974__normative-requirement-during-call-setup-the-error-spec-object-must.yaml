document: rfc-4974
kind: normative-requirement
summary: During Call setup the ERROR_SPEC object MUST carry Error Code zero ('Confirmation'). At least one session MUST be listed in the notify session list. Message IDs MUST be used during Call setup to ensure reliable delivery.
section: "6.2"
rfc2119_level: MUST
