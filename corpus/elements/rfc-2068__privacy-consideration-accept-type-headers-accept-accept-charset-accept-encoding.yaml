document: rfc-2068
kind: privacy-consideration
summary: Accept-type headers (Accept, Accept-Charset, Accept-Encoding, Accept-Language) reveal information about the user's software configuration and preferences that may be used for fingerprinting or tracking. Sending broad accept headers can inadvertently expose user identity.
section: "15.7"
topics:
    - http
    - privacy
