document: rfc-6120
kind: normative-requirement
summary: On reconnection, an entity SHOULD use an unpredictable delay between 0 and 60 seconds before reconnecting and SHOULD apply truncated binary exponential backoff on subsequent attempts. TLS session resumption is RECOMMENDED when reconnecting.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - tcp
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
