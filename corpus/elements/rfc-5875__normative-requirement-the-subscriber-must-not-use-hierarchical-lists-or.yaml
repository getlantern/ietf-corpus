document: rfc-5875
kind: normative-requirement
summary: The subscriber MUST NOT use hierarchical lists or <entry-ref> references in the SUBSCRIBE body. If the subscription body contains elements or attributes the notifier does not understand, the notifier MUST ignore them.
section: "4.4"
rfc2119_level: MUST NOT
