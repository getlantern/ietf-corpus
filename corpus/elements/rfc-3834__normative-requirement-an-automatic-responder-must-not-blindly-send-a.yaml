document: rfc-3834
kind: normative-requirement
summary: An automatic responder MUST NOT blindly send a response for every message received. Reasons include loop prevention, avoiding spam amplification, and thwarting denial-of-service attacks.
section: "2"
rfc2119_level: MUST NOT
topics:
    - email
    - security
