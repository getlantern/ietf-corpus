document: rfc-5101
kind: interoperability-note
summary: If the Collecting Process receives a Template Record with an already-received and non-withdrawn Template ID on the same SCTP association and Observation Domain, it MUST shut down the association. Receiving a Withdrawal for an unknown Template ID is also a fatal error requiring association reset.
section: "9"
topics:
