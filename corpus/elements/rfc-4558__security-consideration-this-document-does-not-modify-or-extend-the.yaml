document: rfc-4558
kind: security-consideration
summary: This document does not modify or extend the RSVP Hello messages exchange between immediate RSVP neighbors, so it does not introduce new security considerations. RSVP message security is described in RFC 2747, which provides Hello message integrity and authentication of the Node-ID ownership.
