document: rfc-5051
kind: protocol-element
summary: 'Step (2)(a): if a codepoint has a titlecase property in UnicodeData.txt (normally the same as uppercase), it is converted to the titlecase codepoints. Step (2)(b): if the resulting codepoint has a decomposition property of any type, it is recursively decomposed until no further decomposition is possible (effectively NFKD).'
section: "2"
