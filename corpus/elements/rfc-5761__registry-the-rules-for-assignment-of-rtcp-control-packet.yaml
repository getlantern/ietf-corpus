document: rfc-5761
kind: registry
summary: 'The rules for assignment of RTCP Control Packet Types in the RTP Parameters registry are updated: IANA should assign values from 200-223 first, then 194-199, then 1-191 and 224-254. Values 0 and 255 are avoided to improve validity checking against random packets.'
