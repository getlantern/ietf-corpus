document: rfc-5604
kind: normative-requirement
summary: An agent with TDM capability MUST support at least 4 fifteen-minute intervals (default 32, maximum 96). For daily intervals, the minimum is 1 (default 1, maximum 30). Performance parameters continue to be collected when the interface is down.
section: "6.3"
rfc2119_level: MUST
