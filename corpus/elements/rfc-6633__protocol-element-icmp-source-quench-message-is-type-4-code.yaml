document: rfc-6633
kind: protocol-element
summary: ICMP Source Quench message is type 4, code 0, originally intended as a congestion signal from routers to hosts. RFC 1122 had required hosts to react by slowing transmission and entering TCP slow-start. This document deprecates both generation and reaction.
section: "2"
