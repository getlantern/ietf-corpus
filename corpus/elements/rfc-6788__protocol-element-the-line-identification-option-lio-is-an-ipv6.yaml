document: rfc-6788
kind: protocol-element
summary: The Line-Identification Option (LIO) is an IPv6 destination option carried in tunneled IPv6 datagrams encapsulating Router Solicitation and Router Advertisement messages. It conveys a subscriber-agent circuit identifier from the Access Node to the Edge Router, enabling per-subscriber-line identification in N:1 VLAN deployments.
section: "7"
topics:
