document: rfc-7438
kind: protocol-element
summary: RFC 7438 extends the mLDP in-band signaling Opaque Value TLVs defined in RFC 6826 and RFC 7246 (Transit IPv4 Source, Transit IPv6 Source, Transit VPNv4 Source, Transit VPNv6 Source) to allow wildcard values in the IP source address subfield, the IP group address subfield, or both. This enables a single MP-LSP to carry traffic from a set of IP multicast trees or from a PIM shared tree.
section: "3"
topics:
    - mpls
    - multicast
