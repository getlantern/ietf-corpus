document: rfc-4805
kind: protocol-element
summary: dsx1Channelization is a read-write object with values disabled(1), enabledDs0(2), and enabledDs1(3). Setting enabledDs0 causes the agent to create 24 DS0 ifTable entries per DS1; enabledDs1 creates DS1 entries within a DS2 (4 DS1s per DS2). Resetting to disabled destroys the created ifTable entries.
section: "4"
