document: rfc-1734
kind: design-rationale
summary: The server is not required to support any particular authentication mechanism, nor are authentication mechanisms required to support any protection mechanisms. This allows flexible deployment where servers may support only a subset of mechanisms, with USER/PASS or APOP serving as a last resort fallback.
section: "2"
topics:
    - security
