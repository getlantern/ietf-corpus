document: rfc-5238
kind: protocol-element
summary: A DTLS connection is carried by a DCCP connection. The life of a DTLS over DCCP connection is completely contained within the life of the underlying DCCP connection; multiple DTLS connections can be resumed from the same DTLS session, each over its own DCCP connection.
section: "3.4"
topics:
    - tls
    - congestion
