document: rfc-5228
kind: security-consideration
summary: Sieve scripts MUST be protected from unauthorized modification to preserve mail system integrity. An attacker who can modify a script can cause mail to be discarded, rejected, or forwarded to an unauthorized recipient. Scripts SHOULD also be protected from unauthorized retrieval as they may expose private information such as mailbox names.
section: "10"
topics:
    - email
    - security
