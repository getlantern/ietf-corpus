document: rfc-5698
kind: design-rationale
summary: Parameter constraints use Min/Max integer ranges rather than exact values to allow flexible expression of security floors. An exact value is expressed by setting Min equal to Max; a wildcard extension point is included for future algorithms whose constraints cannot be expressed as integer ranges.
section: "3.10"
topics:
    - crypto
    - security
