document: rfc-8813
kind: interoperability-note
summary: This document updates RFC 5480 Section 3 by appending explicit prohibition of keyEncipherment and dataEncipherment key usage bits for certificates using id-ecPublicKey, id-ecDH, or id-ecMQV algorithm identifiers, clarifying behavior previously left unspecified.
