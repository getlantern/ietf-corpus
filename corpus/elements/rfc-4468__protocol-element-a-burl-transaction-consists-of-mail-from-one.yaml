document: rfc-4468
kind: protocol-element
summary: A BURL transaction consists of MAIL FROM, one or more RCPT TO commands, and a BURL command with the 'LAST' tag containing an IMAP URL pointing to a fully formed message. If no valid RCPT TO is supplied, BURL fails without resolving the URL.
section: "3.2"
topics:
