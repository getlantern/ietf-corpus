document: rfc-8808
kind: design-rationale
summary: Any cryptographic keys that are part of the factory-installed image (such as an IDevID certificate per BRSKI) are retained after factory-reset, while dynamically generated keys and certificates are deleted. This distinguishes between manufacturer-provisioned identity material and operator-provisioned configuration.
section: "2"
topics:
