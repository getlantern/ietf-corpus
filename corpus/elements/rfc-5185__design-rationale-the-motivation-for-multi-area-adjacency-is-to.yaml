document: rfc-5185
kind: design-rationale
summary: The motivation for multi-area adjacency is to allow a high-speed link between ABRs to be preferred as an intra-area path in multiple areas. Without this extension, OSPF always prefers intra-area paths, so traffic is routed over lower-speed links rather than the backbone link that physically connects two areas.
section: "1.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
