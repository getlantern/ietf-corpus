document: rfc-8253
kind: security-consideration
summary: Ciphersuites providing only integrity without encryption SHOULD NOT be used by default; administrators MAY allow them after explicitly weighing the risk of internal data leakage, as noted in RFC 6952's analysis of PCEP confidentiality requirements.
