document: rfc-4607
kind: interoperability-note
summary: For IPv6 SSM, allocation should occur within FF3x::/96 but systems should treat all of FF3x::/32 as SSM addresses to maintain compatibility with possible future uses of the network prefix field where a non-zero prefix might be allowed.
section: "1"
topics:
    - multicast
    - ip
