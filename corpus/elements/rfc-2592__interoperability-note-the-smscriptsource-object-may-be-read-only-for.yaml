document: rfc-2592
kind: interoperability-note
summary: The smScriptSource object may be read-only for implementations that do not support downloading script code from a URL; the compliance statement explicitly permits MIN-ACCESS read-only for this object. This allows purely built-in or push-only implementations to be fully compliant.
