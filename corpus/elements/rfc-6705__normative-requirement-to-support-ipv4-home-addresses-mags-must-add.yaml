document: rfc-6705
kind: normative-requirement
summary: To support IPv4 Home Addresses, MAGs MUST add IPv4 HoAs into their LREs and MUST support IPv4 packet encapsulation per RFC 5844. LR signaling messages MUST include an IPv4 HoA option when IPv4 addresses are involved.
section: "9"
rfc2119_level: MUST
topics:
