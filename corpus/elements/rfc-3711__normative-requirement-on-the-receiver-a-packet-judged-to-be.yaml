document: rfc-3711
kind: normative-requirement
summary: On the receiver, a packet judged to be replayed MUST be discarded and the event SHOULD be logged. If authentication verification yields AUTHENTICATION FAILURE, the packet MUST also be discarded and the event SHOULD be logged.
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - security
