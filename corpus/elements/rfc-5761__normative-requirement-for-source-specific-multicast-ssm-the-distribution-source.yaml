document: rfc-5761
kind: normative-requirement
summary: For Source-Specific Multicast (SSM), the distribution source MAY multiplex RTP and RTCP onto a single port on the forward SSM path, though doing so may hinder third-party monitoring in the simple feedback model. Multiplexing between media sender and distribution source follows unicast or ASM rules depending on connection type.
section: "5.3"
rfc2119_level: MAY
topics:
    - rtp
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
