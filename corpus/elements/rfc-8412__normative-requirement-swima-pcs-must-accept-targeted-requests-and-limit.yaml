document: rfc-8412
kind: normative-requirement
summary: SWIMA-PCs MUST accept targeted requests and limit their response to records matching the specified Software Identifier(s). Both SWIMA-PCs and SWIMA-PVs MUST support targeted requests for event records.
section: "3.5"
rfc2119_level: MUST
