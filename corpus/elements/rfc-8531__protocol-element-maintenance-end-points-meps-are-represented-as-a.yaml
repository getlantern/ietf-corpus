document: rfc-8531
kind: protocol-element
summary: 'Maintenance End Points (MEPs) are represented as a list within each MA, keyed by ''mep-name'' (string). Each MEP has ''mep-id'' (choice: integer int32 by default), ''mep-id-format'' (identityref), ''mep-address'' (choice: mac-address or ip-address, defaulting to ip-address), ''cos-id'', ''cc-enable'', and a ''session'' list.'
