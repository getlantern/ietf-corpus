document: rfc-9935
kind: interoperability-note
summary: ML-KEM certificates can only be used as end-entity identity certificates in TLS and would require significant protocol updates (e.g., KEM-TLS). They are not directly usable as TLS server certificates under current TLS 1.3.
section: "1.1"
topics:
    - tls
    - pkix
    - crypto
