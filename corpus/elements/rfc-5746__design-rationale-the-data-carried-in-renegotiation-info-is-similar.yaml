document: rfc-5746
kind: design-rationale
summary: The data carried in `renegotiation_info` is similar to but intentionally distinct from the `tls-unique` and `tls-unique-for-telnet` channel binding values. This extension is explicitly not a general-purpose RFC 5056 channel binding facility and should not be treated as one.
section: "1"
topics:
    - tls
    - security
