document: rfc-2038
kind: design-rationale
summary: The packetizer should periodically inject the Video_Sequence_Header into the network stream (preceded by end-of-stream indicator) to allow channel switching and arbitrary join points for decoding a continuously relayed MPEG bit-stream, even when the source file contains the header only at the start.
section: "3.1"
topics:
