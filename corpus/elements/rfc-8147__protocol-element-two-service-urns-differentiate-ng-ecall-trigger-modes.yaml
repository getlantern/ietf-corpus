summary: 'Two service URNs differentiate NG-eCall trigger modes: urn:service:sos.ecall.automatic (crash/incident-triggered) and urn:service:sos.ecall.manual (occupant-triggered). A test URN urn:service:test.sos.ecall is also defined for non-emergency test calls.'
