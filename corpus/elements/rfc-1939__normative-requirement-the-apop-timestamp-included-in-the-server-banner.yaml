document: rfc-1939
kind: normative-requirement
summary: The APOP timestamp included in the server banner greeting MUST be syntactically a valid RFC 822 msg-id and MUST be different each time the POP3 server issues a banner greeting, providing replay protection.
section: "7"
rfc2119_level: MUST
