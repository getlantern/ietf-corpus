document: rfc-8688
kind: normative-requirement
summary: The JOSE header of the JWS MUST include the typ, alg, and x5u parameters. The typ parameter MUST have the value 'vcard+json', and x5u MUST be a URI that resolves to the public key certificate corresponding to the signing key.
section: 3.2.1
rfc2119_level: MUST
topics:
    - sip
    - jose
    - crypto
