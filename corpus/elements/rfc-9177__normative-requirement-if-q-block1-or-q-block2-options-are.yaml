document: rfc-9177
kind: normative-requirement
summary: If Q-Block1 or Q-Block2 options are included as OSCORE Inner options, the Block1 or Block2 options MUST NOT also be included as Inner options, and there MUST NOT be a mix of Q-Block and Block Outer options. Messages violating this MUST be rejected with 4.02 (Bad Option).
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
