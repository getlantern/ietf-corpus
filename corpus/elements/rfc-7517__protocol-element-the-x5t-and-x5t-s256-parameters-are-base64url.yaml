document: rfc-7517
kind: protocol-element
summary: The "x5t" and "x5t#S256" parameters are base64url-encoded SHA-1 and SHA-256 thumbprints (digests) of the DER encoding of an X.509 certificate, respectively. The key in the referenced certificate MUST match the public key represented by other JWK members.
