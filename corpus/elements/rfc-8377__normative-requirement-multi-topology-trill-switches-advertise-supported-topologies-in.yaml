document: rfc-8377
kind: normative-requirement
summary: Multi-topology TRILL switches advertise supported topologies in MT TLVs in every TRILL Hello sent out a port, except they MUST handle topology zero (which is optional to list). A link is usable for non-zero topology T only if all ports on the link advertise topology T support.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
