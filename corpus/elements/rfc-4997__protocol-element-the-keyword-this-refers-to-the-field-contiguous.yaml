document: rfc-4997
kind: protocol-element
summary: The keyword THIS refers to the field (contiguous group of bits) that the current encoding method is encoding, giving access to its attributes such as THIS.ULENGTH. It is particularly useful in crc encoding to calculate a CRC over all bits in the header being encoded.
section: "4.6"
