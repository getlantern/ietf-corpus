document: rfc-4149
kind: normative-requirement
summary: When sspmSourceProfilePacketFillType is 'url', sspmSourceProfilePacketFillValue must contain a dereferenceable URL of type 'http:', 'https:', or 'ftp:' only. If the URL cannot be retrieved when sspmSourceStatus becomes active, the row status is set to 'notReady' and the set fails with 'inconsistentValue'.
section: "7"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
