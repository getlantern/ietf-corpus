kind: interoperability-note
summary: The YANG data model defined in this document conforms to the Network Management Datastore Architecture (NMDA) defined in RFC 8342. Its structure and usage are intentionally comparable to the Layer 3 VPN service model (L3SM) defined in RFC 8299.
