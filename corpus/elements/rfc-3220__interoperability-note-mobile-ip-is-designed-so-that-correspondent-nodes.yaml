document: rfc-3220
kind: interoperability-note
summary: Mobile IP is designed so that correspondent nodes and non-Mobile-IP routers require no protocol changes; only mobile nodes, home agents, and foreign agents need the new logic. Datagrams from the mobile node are delivered via standard IP routing and do not necessarily pass through the home agent.
section: "1.1"
topics:
    - mobility
    - ip
    - routing
