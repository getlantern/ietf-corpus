document: rfc-9801
kind: normative-requirement
summary: When using a 16-bit sequence number space, the RTP sequence number MUST equal the PLE control word sequence number. The control word sequence number MUST be generated per RFC 3550 Section 5.1 rules and MUST be incremented with every PLE packet sent.
section: 5.2.1
rfc2119_level: MUST
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
