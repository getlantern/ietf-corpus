summary: 'IANA allocated the AT-bit (0x000400) in the ''OSPFv3 Options (24 bits)'' registry. IANA created the ''OSPFv3 Authentication Trailer Options'' registry containing the ''OSPFv3 Authentication Types'' sub-registry: value 0 is Reserved, value 1 is HMAC Cryptographic Authentication, values 2-65535 are Unassigned. Registration procedure: Standards Action.'
