document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST allow for the construction of gateways to other SCSI transports including parallel SCSI and SCSI FCP. These are true application protocol gateways, not mere packet forwarders, sharing only the SCSI-3 command set layer.
section: "6.2"
rfc2119_level: MUST
topics:
