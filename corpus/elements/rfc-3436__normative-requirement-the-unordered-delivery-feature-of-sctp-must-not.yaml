document: rfc-3436
kind: normative-requirement
summary: The 'unordered delivery' feature of SCTP MUST NOT be used on streams used for TLS-based user data transmission, because TLS requires the underlying transport to deliver TLS records in strict sequence.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - tls
    - sctp
