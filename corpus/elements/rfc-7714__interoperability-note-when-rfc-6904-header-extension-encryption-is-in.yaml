document: rfc-7714
kind: interoperability-note
summary: When RFC 6904 header extension encryption is in use, both encrypted and unencrypted header extensions are treated by the AEAD algorithm as Associated Data. The AEAD algorithm provides integrity and authentication for header extensions but does not provide additional privacy beyond any RFC 6904 encryption already applied.
section: "8.3"
topics:
    - rtp
    - realtime
    - crypto
