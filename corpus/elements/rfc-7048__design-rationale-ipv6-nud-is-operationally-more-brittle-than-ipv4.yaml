document: rfc-7048
kind: design-rationale
summary: IPv6 NUD is operationally more brittle than IPv4 ARP because RFC 4861 constants (MAX_MULTICAST_SOLICIT, MAX_UNICAST_SOLICIT, RETRANS_TIMER) became conformance test requirements, whereas ARP imposes no mandatory retransmission time limit, allowing implementors to choose more robust behavior.
