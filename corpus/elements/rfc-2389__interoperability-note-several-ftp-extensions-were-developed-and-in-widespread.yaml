document: rfc-2389
kind: interoperability-note
summary: Several FTP extensions were developed and in widespread use prior to the adoption of FEAT. An error response to FEAT does not necessarily mean those pre-existing extensions are unsupported; user-PIs should test for such extensions individually when FEAT returns an error.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
