document: rfc-6241
kind: protocol-element
summary: 'The <rpc-error> element reports processing errors and contains: error-type (transport/rpc/protocol/application), error-tag (error condition string), error-severity (error/warning), optional error-app-tag, error-path (XPath expression), error-message (human-readable), and error-info (protocol/data-model detail).'
