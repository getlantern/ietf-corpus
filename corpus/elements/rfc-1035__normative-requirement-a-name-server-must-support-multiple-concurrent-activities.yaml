document: rfc-1035
kind: normative-requirement
summary: A name server must support multiple concurrent activities and must not block UDP query service while waiting for TCP data (zone refresh or recursive queries). Identical requests from the same client may be treated as duplicates.
section: 6.1.1
rfc2119_level: MUST
topics:
    - dns
