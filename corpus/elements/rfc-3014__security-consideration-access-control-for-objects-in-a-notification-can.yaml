document: rfc-3014
kind: security-consideration
summary: Access control for objects in a Notification can only be checked where the Notification is created, making it feasible only for locally-generated Notifications when security credentials are available. For remotely-generated Notifications, only overall log access control applies.
section: 2.1.2
topics:
    - snmp
    - security
