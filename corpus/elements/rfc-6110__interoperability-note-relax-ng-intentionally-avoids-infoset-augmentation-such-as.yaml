document: rfc-6110
kind: interoperability-note
summary: RELAX NG intentionally avoids infoset augmentation such as defining default values, delegating that task to DSRL. This architectural constraint of the DSDL framework is the reason the mapping requires three coordinated schema outputs (RELAX NG, Schematron, DSRL) rather than a single unified schema.
