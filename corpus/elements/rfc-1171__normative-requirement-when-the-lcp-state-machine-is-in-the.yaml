document: rfc-1171
kind: normative-requirement
summary: When the LCP state machine is in the Open state and a frame with an unknown Protocol is received, that error MUST be reported back by transmitting a Protocol-Reject (Code=8). Protocol-Reject packets may only be sent in the LCP Open state; those received in any other state should be discarded.
section: 4.4.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
