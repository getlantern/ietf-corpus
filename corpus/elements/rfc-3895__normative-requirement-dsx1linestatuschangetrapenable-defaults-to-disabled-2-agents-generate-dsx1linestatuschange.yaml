document: rfc-3895
kind: normative-requirement
summary: dsx1LineStatusChangeTrapEnable defaults to disabled(2). Agents generate dsx1LineStatusChange traps only when explicitly enabled per-interface. The dsx1LineIndex object SHOULD be made equal to ifIndex to allow proper use of ifStackTable.
section: "3"
rfc2119_level: SHOULD
