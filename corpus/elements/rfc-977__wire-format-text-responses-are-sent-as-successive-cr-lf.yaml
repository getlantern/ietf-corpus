document: rfc-977
kind: wire-format
summary: Text responses are sent as successive CR-LF-terminated lines, ended by a single period (.) on a line by itself followed by CR-LF. Lines in the original text beginning with a period have that period doubled during transmission (dot-stuffing).
section: 2.4.1
