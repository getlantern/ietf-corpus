document: rfc-5331
kind: protocol-element
summary: A Context-Specific Label Space is a label space that an LSR maintains in addition to the per-platform label space. Labels are looked up in a context-specific label space when the context of a received packet determines this is required; upstream-assigned labels are always looked up in a context-specific label space.
section: "3"
topics:
