summary: 'Attribute Flags occupy 1 octet with five defined bits: Well-Known (bit 0), Transitive (bit 1), Dependent (bit 2), Partial (bit 3), and Link-state Encapsulation (bit 4, valid only on ReachableRoutes and WithdrawnRoutes). These control forwarding of unrecognized attributes.'
