document: rfc-4495
kind: protocol-element
summary: For individual reservation flow reduction, the router sends a ResvErr downstream with the ERR_PARTIAL_PREEMPT subcode. The requesting endpoint uses this to negotiate a lower bandwidth (e.g., via SIP codec renegotiation) and then both endpoints re-issue PATH and RESV with the new lower bandwidth.
section: "5.3"
topics:
    - qos
    - realtime
    - sip
