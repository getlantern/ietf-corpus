document: rfc-7788
kind: normative-requirement
summary: An HNCP router using auto-detection on an interface MUST run the appropriately configured DHCP clients as long as the interface without a fixed category is active and SHOULD wait for a reasonable time period (5 seconds default) before treating a newly activated or previously external interface as internal.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
