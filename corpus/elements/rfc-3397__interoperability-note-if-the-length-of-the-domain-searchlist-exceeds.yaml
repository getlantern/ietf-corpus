document: rfc-3397
kind: interoperability-note
summary: If the length of the domain searchlist exceeds the maximum permissible within a single option (255 octets), then multiple Domain Search Options MAY be used as described in RFC 3396 (Encoding Long Options in DHCPv4). The client must concatenate all such options before interpreting them.
section: "2"
topics:
    - dns
