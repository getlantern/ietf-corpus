document: rfc-6439
kind: protocol-element
summary: 'An Appointed Forwarder for VLAN-x is inhibited on a link if any of three timers is unexpired: the DRB inhibition timer, the root change inhibition timer, or the VLAN-x inhibition timer. Inhibition is per-VLAN; a forwarder may be inhibited for some VLANs but not others.'
section: "4"
topics:
    - routing
