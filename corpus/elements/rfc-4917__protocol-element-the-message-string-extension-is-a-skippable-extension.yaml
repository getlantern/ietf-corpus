document: rfc-4917
kind: protocol-element
summary: The Message String Extension is a skippable extension conforming to the Short Extension format for Mobile IPv4, identified by Type 145. It carries a human-readable text string intended for the user of the Mobile Node, and can be added by the Home Agent or Foreign Agent to Registration Reply or Registration Revocation messages.
