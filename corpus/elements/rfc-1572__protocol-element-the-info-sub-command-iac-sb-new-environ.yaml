document: rfc-1572
kind: protocol-element
summary: The INFO sub-command (IAC SB NEW-ENVIRON INFO type...[VALUE...] IAC SE) propagates changes to environment variables and may be generated spontaneously. It is identical to IS except it is not used for initial information exchange; the SEND/IS sequence handles that.
section: "2"
