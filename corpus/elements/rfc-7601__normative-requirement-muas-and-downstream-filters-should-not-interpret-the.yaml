document: rfc-7601
kind: normative-requirement
summary: MUAs and downstream filters SHOULD NOT interpret the Authentication-Results header field unless specifically configured to do so by the user or administrator, and SHOULD NOT interpret it unless the authserv-id appears to be one used within their own ADMD. Interpretation should not be on by default.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
