document: rfc-7377
kind: protocol-element
summary: 'Source options use the ''filter-mailboxes'' specifier from RFC 5465, with two modifications: ''selected-delayed'' is forbidden, and a new ''subtree-one'' specifier is added that searches the named mailbox plus all selectable direct children (one hierarchy level down), unlike ''subtree'' which descends indefinitely.'
section: "2.2"
topics:
    - email
