document: rfc-1220
kind: normative-requirement
summary: A bridge configured to inhibit BPDU exchange on a link must silently discard any BPDU received from its neighbor, to preserve the separation of Spanning Tree domains.
section: "3.4"
rfc2119_level: MUST
