document: rfc-3592
kind: normative-requirement
summary: For SONET/SDH Medium/Section/Line interfaces, ifOperStatus MUST assume the value down(2) if sonetSectionCurrentStatus or sonetLineCurrentStatus has any value other than sonetSectionNoDefect(1) and sonetLineNoDefect(1) respectively. ifLinkUpDownTrapEnable default is enabled(1).
