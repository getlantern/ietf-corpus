document: rfc-8425
kind: protocol-element
summary: 'The Prefix Information Option (PIO) in IPv6 Neighbor Discovery Router Advertisement messages contains an 8-bit flag field. Currently defined flags are: L (On-link Flag, bit 0), A (Autonomous Address Configuration Flag, bit 1), R (Router Address Flag, bit 2), and Reserved1 (bits 3-7).'
