document: rfc-8655
kind: interoperability-note
summary: If DetNet-unaware intermediate nodes or subnets exist along a path, extra buffering must be allocated at the first downstream DetNet transit node to absorb the induced latency variations. This may increase worst-case latency and jitter for the flow.
section: 4.3.3
topics:
    - routing
    - qos
