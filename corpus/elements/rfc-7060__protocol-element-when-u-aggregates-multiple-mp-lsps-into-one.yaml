document: rfc-7060
kind: protocol-element
summary: When U aggregates multiple MP-LSPs into one multicast tunnel (e.g., <R1,X1> to D1,D2 and <R2,X2> to D2,D3), leaf nodes not on a given MP-LSP will receive but discard its packets because the upstream-assigned label is unrecognized at those nodes.
