document: rfc-5575
kind: security-consideration
summary: Enabling distributed firewall-like capabilities in routers without centralized management can make failures harder to diagnose. Configurations such as allowing TCP but not ICMP, or permitting only certain packet-length ranges between a pair of addresses, may create confusing behavior and should be used with care.
section: "10"
topics:
    - security
    - bgp
    - routing
