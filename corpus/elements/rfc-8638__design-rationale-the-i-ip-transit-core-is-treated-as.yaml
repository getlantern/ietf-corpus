document: rfc-8638
kind: design-rationale
summary: The I-IP transit core is treated as SSM-only to minimize complexity. This reduces the source address translation rules to two scenarios (E-IP SSM and E-IP ASM) rather than handling all combinations of ASM/SSM across both address families.
section: "5.3"
topics:
