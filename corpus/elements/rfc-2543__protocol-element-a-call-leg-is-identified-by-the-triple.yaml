document: rfc-2543
kind: protocol-element
summary: A call leg is identified by the triple of Call-ID, To, and From header fields. A SIP transaction is identified by the CSeq sequence number within a single call leg. The ACK has the same CSeq as its INVITE but constitutes a separate transaction.
section: "1.3"
