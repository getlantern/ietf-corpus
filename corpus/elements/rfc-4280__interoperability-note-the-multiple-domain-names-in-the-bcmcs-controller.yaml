document: rfc-4280
kind: interoperability-note
summary: The multiple domain names in the BCMCS Controller Domain Name List option SHOULD be used to construct SRV lookups as specified in the BCMCS specification, rather than querying for different A records. The client can try any or all of the domain names.
section: "4.1"
topics:
    - dns
    - multicast
