document: rfc-3880
kind: protocol-element
summary: The 'time-switch' node makes decisions based on iCalendar COS recurrence rules. It supports 'dtstart', 'dtend'/'duration', 'freq' (secondly through yearly), 'interval', 'until', 'count', and all byxxx parameters. Consecutive recurrence intervals MUST NOT overlap.
