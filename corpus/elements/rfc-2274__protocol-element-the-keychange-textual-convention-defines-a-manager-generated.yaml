document: rfc-2274
kind: protocol-element
summary: The KeyChange textual convention defines a manager-generated random+delta OCTET STRING that allows secure remote key updates without requiring privacy protection. The delta is computed by XORing hash-chained values with the new key, using the existing key as the hash seed.
