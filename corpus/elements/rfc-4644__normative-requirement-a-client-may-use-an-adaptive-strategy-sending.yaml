document: rfc-4644
kind: normative-requirement
summary: A client MAY use an adaptive strategy sending TAKETHIS without CHECK if most articles are accepted (over 95% might be a reasonable threshold), and SHOULD switch back to using CHECK if the acceptance rate falls much below the threshold.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
