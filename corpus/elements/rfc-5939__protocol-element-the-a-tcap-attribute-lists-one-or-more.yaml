document: rfc-5939
kind: protocol-element
summary: The 'a=tcap' attribute lists one or more transport protocol names (e.g., 'RTP/SAVP') as numbered transport capabilities. Multiple protocols may be packed into a single 'a=tcap' line, with the first assigned trpr-cap-num and each subsequent one numbered sequentially. At most one 'a=tcap' is permitted at session level and one per media description.
section: 3.4.2
topics:
    - realtime
