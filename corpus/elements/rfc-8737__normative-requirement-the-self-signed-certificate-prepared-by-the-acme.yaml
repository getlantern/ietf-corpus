document: rfc-8737
kind: normative-requirement
summary: The self-signed certificate prepared by the ACME client MUST contain an acmeIdentifier extension and a subjectAlternativeName extension. The subjectAlternativeName extension MUST contain a single dNSName entry equal to the domain being validated.
section: "3"
rfc2119_level: MUST
topics:
