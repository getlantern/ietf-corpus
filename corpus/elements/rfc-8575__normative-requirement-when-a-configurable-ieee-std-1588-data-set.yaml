document: rfc-8575
kind: normative-requirement
summary: When a configurable IEEE Std 1588 data set member needs to be treated as read-only in a YANG implementation, an implementation SHOULD return a warning on write or use the YANG deviation mechanism as described in RFC 7950 Section 7.20.3.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
