document: rfc-3602
kind: security-consideration
summary: Random IV values are necessary to prevent probable plaintext cryptanalysis. Using a counter or low-Hamming-distance source for IVs allows an attacker to exploit similarities between ciphertext blocks across packets.
section: "6"
