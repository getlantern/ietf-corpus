document: rfc-9248
kind: protocol-element
summary: The RUE Provider Selection service returns a ProviderList JSON object containing an array of providers, each with a human-readable 'name' and a 'providerEntryPoint' string (starting with a domain). IANA maintains a registry mapping country codes to list entry point URIs from which the full provider list is obtained.
section: "9.1"
