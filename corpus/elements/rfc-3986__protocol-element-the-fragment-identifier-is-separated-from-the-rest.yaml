document: rfc-3986
kind: protocol-element
summary: The fragment identifier is separated from the rest of the URI by "#" and is processed solely by the user agent; it is not sent to the origin server. Fragment semantics are defined by the media type of the retrieved representation, not by the URI scheme.
section: "3.5"
topics:
    - http
