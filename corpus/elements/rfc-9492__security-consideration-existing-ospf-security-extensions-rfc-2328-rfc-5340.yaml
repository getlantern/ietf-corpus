document: rfc-9492
kind: security-consideration
summary: Existing OSPF security extensions (RFC 2328, RFC 5340, RFC 8362) apply. In deployments where potential attackers have access to one or more OSPF networks, stronger authentication mechanisms (RFC 5709, RFC 7474, RFC 4552, or RFC 7166) SHOULD be used.
section: "13"
rfc2119_level: SHOULD
topics:
