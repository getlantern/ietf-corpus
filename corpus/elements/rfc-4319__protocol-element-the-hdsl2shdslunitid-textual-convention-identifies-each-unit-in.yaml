summary: 'The Hdsl2ShdslUnitId textual convention identifies each unit in an HDSL2/SHDSL span using EOC addressing: xtuC(1) for the CO terminal unit, xtuR(2) for the CPE terminal unit, and xru1(3) through xru8(10) for up to eight regenerators numbered from the CO side.'
