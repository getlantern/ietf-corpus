document: rfc-3729
kind: protocol-element
summary: apmAppDirTable is the central directory of applications monitored by the agent, indexed by AppLocalIndex and ResponsivenessType. It is read-write (no add/delete via SNMP) and carries six per-application histogram bucket boundaries (apmAppDirResponsivenessBoundary1–6) plus an on/off config flag.
