document: rfc-3464
kind: security-consideration
summary: DSNs may be forged as easily as ordinary Internet email. Threats include falsified delivery or non-delivery notifications, falsified Final-Recipient or Remote-MTA addresses, falsified relay notifications for dead-ended messages, and unsolicited DSNs. Automated systems should take precautions against denial-of-service via forged DSNs.
section: "4.1"
topics:
    - email
    - security
