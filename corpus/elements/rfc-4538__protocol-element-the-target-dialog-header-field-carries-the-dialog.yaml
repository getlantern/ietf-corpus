document: rfc-4538
kind: protocol-element
summary: The Target-Dialog header field carries the dialog identifiers (Call-ID, local-tag, remote-tag) of an existing SIP dialog. It is used in dialog-creating requests sent outside of any existing dialog to prove the sender's awareness of that dialog for authorization purposes.
