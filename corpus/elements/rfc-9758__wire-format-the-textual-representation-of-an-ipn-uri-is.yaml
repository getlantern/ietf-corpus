document: rfc-9758
kind: wire-format
summary: The textual representation of an ipn URI is 'ipn:[<allocator-identifier>.]<node-number>.<service-number>'. Leading zeros MUST be omitted; the allocator-identifier and preceding '.' MAY be omitted when zero. The '!' shorthand SHOULD replace 4294967295 for LocalNode URIs. ABNF grammar is normatively specified.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
