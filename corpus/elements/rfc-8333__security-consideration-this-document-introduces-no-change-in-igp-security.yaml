document: rfc-8333
kind: security-consideration
summary: This document introduces no change in IGP security. The local delay does not increase attack vectors because an attacker can only trigger this mechanism if they already have the ability to disable or enable an IGP link, in which case they could already cause instability and traffic loss without this mechanism.
section: "12"
topics:
