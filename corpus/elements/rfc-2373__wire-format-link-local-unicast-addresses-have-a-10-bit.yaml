document: rfc-2373
kind: wire-format
summary: Link-Local unicast addresses have a 10-bit prefix of 1111111010 (FE80::/10), followed by 54 zero bits and a 64-bit interface ID. Site-Local addresses use prefix 1111111011 (FEC0::/10), with 38 zero bits, a 16-bit subnet ID, and a 64-bit interface ID.
