document: rfc-5985
kind: normative-requirement
summary: The Device MUST first discover the URI for the LIS for sending the HELD protocol requests. The URI for the LIS SHOULD be obtained from an authorized and authenticated entity, and the type of URI provided by LIS discovery is RECOMMENDED to be an HTTPS URI.
section: "4"
rfc2119_level: MUST
topics:
    - http
    - security
