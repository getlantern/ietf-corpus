document: rfc-3981
kind: protocol-element
summary: 'The IRIS URI has the general syntax: iris:<registry>/<resolution>/<authority>/<class>/<name>. All components use UTF-8 encoded with ''application/x-www-form-urlencoded''. An IRIS URI MUST NOT be a relative URI. When entity-class and entity-name are absent, defaults ''iris'' and ''id'' are implied.'
section: "7.1"
topics:
    - registry
    - dns
