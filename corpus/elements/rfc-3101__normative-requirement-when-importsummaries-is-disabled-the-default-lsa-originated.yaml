document: rfc-3101
kind: normative-requirement
summary: When ImportSummaries is disabled, the default LSA originated by an NSSA border router into the NSSA MUST be a Type-3 summary-LSA (not a Type-7 LSA), to protect the NSSA from routing intra-AS traffic out of the AS via a Type-7 default LSA from an internal router.
section: "2.7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
