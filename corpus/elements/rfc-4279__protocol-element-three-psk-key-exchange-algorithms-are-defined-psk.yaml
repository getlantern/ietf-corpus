document: rfc-4279
kind: protocol-element
summary: 'Three PSK key exchange algorithms are defined: PSK (symmetric-only), DHE_PSK (PSK-authenticated Diffie-Hellman), and RSA_PSK (RSA server authentication plus PSK client authentication). These yield 12 new ciphersuites combining the three key exchange algorithms with RC4_128, 3DES_EDE_CBC, AES_128_CBC, and AES_256_CBC.'
