document: rfc-4703
kind: state-machine
summary: 'Adding A/AAAA RRs proceeds through three states: (1) attempt initial update asserting FQDN does not exist; if YXDOMAIN, (2) attempt update asserting FQDN exists with matching DHCID RR; if NXRRSET, (3) choose another FQDN or terminate with failure.'
