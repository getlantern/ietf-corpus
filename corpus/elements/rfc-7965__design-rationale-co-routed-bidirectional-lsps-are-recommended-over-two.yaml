document: rfc-7965
kind: design-rationale
summary: Co-routed bidirectional LSPs are RECOMMENDED over two unidirectional LSPs with the same route because the latter cannot guarantee route consistency over time, particularly when Fast ReRoute (FRR) is deployed and link/node failure may cause the two LSPs to diverge.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
