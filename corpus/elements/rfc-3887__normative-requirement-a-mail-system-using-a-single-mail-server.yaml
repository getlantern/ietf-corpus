document: rfc-3887
kind: normative-requirement
summary: A mail system using a single mail server host but wanting tracking queries on a different machine MUST have an SRV MTQP record pointing at that different machine. The tracking service MUST be able to handle queries for all messages accepted by the mail system.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
