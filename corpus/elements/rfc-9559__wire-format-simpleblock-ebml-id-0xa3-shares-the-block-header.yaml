document: rfc-9559
kind: wire-format
summary: SimpleBlock (EBML ID 0xA3) shares the Block header structure but adds Keyframe and Discardable flags in the Flags byte. It omits the BlockGroup wrapper and is used to minimize overhead when no per-block metadata is needed.
section: "10.2"
