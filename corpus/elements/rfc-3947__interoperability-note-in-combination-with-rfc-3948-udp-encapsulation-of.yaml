document: rfc-3947
kind: interoperability-note
summary: In combination with RFC 3948 (UDP Encapsulation of IPsec Packets), RFC 3947 represents an 'unconditionally compliant' solution to the requirements defined by RFC 3715 (IPsec-NAT Compatibility Requirements). Implementations must also support RFC 3948's non-ESP marker for demultiplexing IKE and ESP traffic on port 4500.
section: "1"
topics:
    - ipsec
    - vpn
    - nat
