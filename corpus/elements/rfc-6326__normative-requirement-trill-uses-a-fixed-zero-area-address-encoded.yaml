document: rfc-6326
kind: normative-requirement
summary: TRILL uses a fixed zero Area Address encoded as a 4-byte Area Address TLV (type 1). The Protocols Supported TLV (type 129) including NLPID 0xC0 MUST appear in TRILL IIH PDUs and LSP number zero PDUs.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
