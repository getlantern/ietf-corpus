document: rfc-5072
kind: normative-requirement
summary: For PPP links with IPV6CP interface-identifier negotiation enabled, where prefixes are exclusive to the link and the access router does not autoconfigure addresses from those prefixes, it is RECOMMENDED that DupAddrDetectTransmits be set to zero, making DAD unnecessary.
section: "5"
rfc2119_level: RECOMMENDED
topics:
