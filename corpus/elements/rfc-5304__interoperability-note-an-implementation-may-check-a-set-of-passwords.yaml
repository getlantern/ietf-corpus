document: rfc-5304
kind: interoperability-note
summary: An implementation MAY check a set of passwords when verifying the Authentication Value, providing a mechanism for incrementally changing passwords in a network. An implementation that does not implement HMAC-MD5 authentication MAY accept a PDU that contains the HMAC-MD5 Authentication Type.
section: "2"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
