document: rfc-9571
kind: design-rationale
summary: For multipoint-to-point LSPs, MPLS contains no source address, so SFLs provide a source-specific batch identifier enabling per-source packet loss measurement. Without SFLs, distinguishing packet batches from different sources on an MP2P LSP would be impossible.
section: "1"
topics:
