document: rfc-4590
kind: protocol-element
summary: 'SIP-AOR (type 122): identifies the SIP or tel URI (including parameters) whose use must be authorized. The RADIUS server uses this to enforce that a user cannot register or misuse a SIP-AOR allocated to a different user. Used only in Access-Request packets.'
