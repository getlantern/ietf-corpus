document: rfc-3498
kind: protocol-element
summary: apsConfigWaitToRestore specifies the Wait-to-Restore period in seconds (range 0–720, default 300). After a condition requiring automatic protection switching is cleared, this period must elapse before reversion to the working line, to avoid rapid switch oscillations. GR-253-CORE specifies a 5–12 minute range; G.783 also permits shorter intervals.
section: "4"
