document: rfc-7510
kind: normative-requirement
summary: For IPv4, the UDP checksum is RECOMMENDED to be set to zero for performance or implementation reasons, since the IPv4 header already includes a checksum and UDP checksum use is optional, unless checksum protection of VPN labels is important.
