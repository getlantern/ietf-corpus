document: rfc-6975
kind: protocol-element
summary: 'Three new EDNS0 options are defined for clients to signal algorithm support: DAU (DNSSEC Algorithm Understood, option code 5), DHU (DS Hash Understood, option code 6), and N3U (NSEC3 Hash Understood, option code 7). Each option is carried in the OPT meta-RR and is OPTIONAL to implement and use.'
