document: rfc-5944
kind: normative-requirement
summary: Registration messages between a mobile node and its home agent MUST be authenticated with an authorization-enabling extension (e.g., the Mobile-Home Authentication Extension). At least one such extension MUST be present in all Registration Requests and all Registration Replies generated by the home agent.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
