document: rfc-8268
kind: normative-requirement
summary: DH Public Key values MUST be checked so that both 1 < e < p-1 and 1 < f < p-1 are true. Values not within these bounds MUST NOT be sent or accepted by either side; if either condition is violated, the key exchange fails.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
    - security
