document: rfc-1483
kind: wire-format
summary: 'AAL5 CPCS-PDU consists of: Payload (up to 65535 octets), PAD (0–47 octets to align to ATM cell boundary), CPCS-UU (1 octet), CPI (1 octet), Length (2 octets), and CRC (4 octets). The trailer is always 8 octets, right-justified in the last 48-octet ATM cell.'
