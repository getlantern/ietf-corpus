document: rfc-2396
kind: protocol-element
summary: The authority component takes the form server | reg_name, is preceded by '//', and is terminated by the next '/', '?', or end of URI. The server form is [ [ userinfo '@' ] hostport ] where userinfo may carry authentication information.
section: "3.2"
