document: rfc-4036
kind: interoperability-note
summary: The compliance statements in this version of the MIB require support only for IPv4 addresses (InetAddressType ipv4(1), InetAddress SIZE(4)) because DOCSIS 1.0, 1.1, and 2.0 are not IPv6-capable. Future IPv6 support will require new compliance statements rather than changes to the MIB objects themselves.
section: 3.1.2
topics:
    - snmp
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
