document: rfc-7949
kind: interoperability-note
summary: An OSPFv3 packet encapsulated in a 20-octet IPv4 header is shorter than one encapsulated in an IPv6 header; therefore the IPv6 link MTU is always sufficient for the IPv4-encapsulated form. If the link MTU is nonetheless insufficient, OSPFv3 may rely on IPv4 fragmentation and reassembly per RFC 791.
section: "3"
topics:
    - routing
    - ip
