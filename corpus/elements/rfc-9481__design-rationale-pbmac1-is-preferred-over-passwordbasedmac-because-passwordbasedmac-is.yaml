document: rfc-9481
kind: design-rationale
summary: PBMAC1 is preferred over PasswordBasedMac because PasswordBasedMac is essentially PBKDF1 (not recommended for new applications by FIPS and standards bodies), whereas PBMAC1 uses PBKDF2 which has an improved iterated hashing construct and removes the key-size limitation tied to the underlying hash function output length.
