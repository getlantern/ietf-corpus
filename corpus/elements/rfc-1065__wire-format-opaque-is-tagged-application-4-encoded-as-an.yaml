document: rfc-1065
kind: wire-format
summary: Opaque is tagged APPLICATION 4, encoded as an IMPLICIT OCTET STRING that double-wraps an arbitrary ASN.1 value encoded using BER. Non-ASN.1 encodings are also permitted via the ASN.1 EXTERNAL type inside the wrapper.
section: 3.2.3.6
