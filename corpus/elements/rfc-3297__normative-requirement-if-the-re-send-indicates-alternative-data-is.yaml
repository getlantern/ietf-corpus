document: rfc-3297
kind: normative-requirement
summary: If the re-send indicates alternative data is no longer available (Alternative-not-available) and the receiver has discarded the original data, the receiver SHOULD display the failure message or construct a loss notification, then send an MDN with disposition 'deleted'.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - email
