document: rfc-8610
kind: protocol-element
summary: The '.size' control restricts byte or text strings to an exact byte length, or restricts unsigned integers to a maximum byte-width representation (e.g., 'uint .size 3' is equivalent to '0...16777216'). It is not a representation constraint; a smaller encoding is still valid.
section: 3.8.1
topics:
