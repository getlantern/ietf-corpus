document: rfc-8360
kind: interoperability-note
summary: Relying Party tools that do not implement the amended profile will reject certificates using the new OIDs. Therefore, RP tools MUST be updated before CAs begin issuing certificates with the new OIDs to avoid inadvertent route-origin validation failures.
