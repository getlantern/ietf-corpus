document: rfc-4563
kind: design-rationale
summary: MBMS uses a three-level key hierarchy (MUK → MSK → MTK) to enable frequent traffic key updates. The cost of redistributing decryption keys to non-subscribers via unicast must exceed the cost of purchasing them, making re-keying economically viable as a content protection mechanism.
section: "2"
topics:
    - crypto
    - security
