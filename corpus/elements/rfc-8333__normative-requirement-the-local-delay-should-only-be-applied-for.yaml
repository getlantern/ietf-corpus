document: rfc-8333
kind: normative-requirement
summary: The local delay SHOULD only be applied for non-urgent convergence, such as administrative deactivation (maintenance) or when traffic is protected by FRR, because delaying local convergence increases the window of reduced routing efficiency.
section: "5.4"
rfc2119_level: SHOULD
