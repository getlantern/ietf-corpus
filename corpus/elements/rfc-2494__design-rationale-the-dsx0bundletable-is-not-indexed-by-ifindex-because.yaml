document: rfc-2494
kind: design-rationale
summary: The dsx0BundleTable is not indexed by ifIndex because the manager must choose the index for row creation while the agent must be free to select ifIndex values independently. This separation of concerns necessitates dsx0BundleIndex as a distinct manager-chosen key.
