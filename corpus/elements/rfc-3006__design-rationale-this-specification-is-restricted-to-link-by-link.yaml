document: rfc-3006
kind: design-rationale
summary: This specification is restricted to link-by-link compression (e.g., header compression) and explicitly excludes transcoding or audio silence detection, which would affect bandwidth at all downstream nodes and would require modifying the sender TSpec in transit. The sender TSpec on the wire is never modified.
section: "1"
topics:
