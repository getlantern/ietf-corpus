document: rfc-3857
kind: normative-requirement
summary: To avoid infinite recursion of authorization policy, it is RECOMMENDED that only user A be allowed to subscribe to foo.winfo.winfo for user A, and that servers do not authorize subscriptions to foo.winfo.winfo.winfo or deeper by default.
section: "4.6"
rfc2119_level: RECOMMENDED
