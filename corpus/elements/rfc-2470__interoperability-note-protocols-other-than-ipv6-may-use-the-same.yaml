document: rfc-2470
kind: interoperability-note
summary: Protocols other than IPv6 may use the same Token Ring functional addresses mapped from IPv6 multicast addresses, so not all Token Ring frames destined to these functional addresses are guaranteed to be IPv6 datagrams.
