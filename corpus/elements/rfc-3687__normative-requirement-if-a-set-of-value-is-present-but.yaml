document: rfc-3687
kind: normative-requirement
summary: If a SET OF value is present but empty, a presentMatch on the SET OF component SHALL return TRUE and the notional count SHALL be regarded as present and equal to zero. An absent SET OF value is distinct from an empty one.
section: 3.2.2.2
