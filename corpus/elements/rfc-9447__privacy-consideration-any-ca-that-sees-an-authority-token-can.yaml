document: rfc-9447
kind: privacy-consideration
summary: Any CA that sees an Authority Token can learn information about all resources a client can claim. Where this incurs a privacy risk, Authority Token scopes should be limited to only the resources attested by the requested ACME certificate rather than the full entitlement.
section: "7"
topics:
    - acme
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
