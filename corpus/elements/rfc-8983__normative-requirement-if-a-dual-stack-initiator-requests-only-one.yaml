document: rfc-8983
kind: normative-requirement
summary: If a dual-stack initiator requests only one address family but receives only a notification for the opposite family (e.g., requests IPv6 but receives only IP4_ALLOWED), the initiator MUST send a request for the address family indicated as allowed.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
