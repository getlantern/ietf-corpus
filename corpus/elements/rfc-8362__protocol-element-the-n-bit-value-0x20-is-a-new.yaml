document: rfc-8362
kind: protocol-element
summary: The N-bit (value 0x20) is a new prefix option defined at bit position 5 of the PrefixOptions field. It identifies a host address (PrefixLength=128 for IPv6, 32 for IPv4) that is the router's own address, distinguishing it from anycast addresses that might also have the LA-bit set. It is propagated by ABRs in Inter-Area-Prefix-LSAs and by NSSA ABRs in E-AS-External-LSAs.
section: 3.1.1
topics:
    - routing
