document: rfc-2421
kind: interoperability-note
summary: When ESMTP DSN support is unavailable at a relay hop (SMTP downgrade), the downgrading system MUST send a delivery notification to the originator indicating the message left an ESMTP host and was forwarded unreliably via SMTP.
section: "5.5"
