document: rfc-4141
kind: security-consideration
summary: Content conversion by unspecified intermediaries carries significant risk of malicious or damaging transformations. Although CONPERM/CONNEG do not introduce new intermediary capabilities, they may encourage more exploration of conversion potential and increase misbehavior risk. RFC 3238 is cited for broader discussion.
section: "10"
topics:
