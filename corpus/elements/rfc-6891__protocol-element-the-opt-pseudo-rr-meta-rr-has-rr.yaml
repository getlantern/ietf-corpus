document: rfc-6891
kind: protocol-element
summary: The OPT pseudo-RR (meta-RR) has RR type 41 and MAY be added to the additional data section of a DNS request. It carries no DNS data but conveys control information (extended RCODE, flags, payload size, and options) scoped to a single transaction.
section: 6.1.1
topics:
    - dns
    - snmp
