document: rfc-5627
kind: normative-requirement
summary: When a UA compliant to this specification generates a REGISTER request, it MUST include the Supported header field with 'gruu' as one of the option tags, and for each contact for which it desires a GRUU, MUST include a '+sip.instance' media feature tag as a UA characteristic.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
