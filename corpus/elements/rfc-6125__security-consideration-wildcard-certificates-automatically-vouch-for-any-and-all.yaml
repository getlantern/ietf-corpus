document: rfc-6125
kind: security-consideration
summary: Wildcard certificates automatically vouch for any and all hostnames within their domain, posing the risk of vouching for rogue or buggy hosts. Specifications for existing application technologies are inconsistent about allowable wildcard character placement, which can lead to exploitable differences in identity-checking behavior among client implementations.
section: "7.2"
topics:
    - tls
    - pkix
    - security
