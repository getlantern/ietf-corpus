document: rfc-7217
kind: normative-requirement
summary: The secret_key SHOULD be at least 128 bits and MUST be initialized to a pseudo-random number (per RFC 4086) when the OS is installed or the IPv6 stack is first bootstrapped. Access to the secret_key should be constrained (e.g., require superuser privileges) and it must not be used for any other purpose.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
