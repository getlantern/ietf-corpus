document: rfc-3852
kind: protocol-element
summary: 'ContentInfo is the top-level CMS wrapper, an ASN.1 SEQUENCE containing a contentType OID and an associated content field. It encapsulates one of six defined content types: data, signed-data, enveloped-data, digested-data, encrypted-data, or authenticated-data.'
