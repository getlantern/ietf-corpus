document: rfc-1964
kind: protocol-element
summary: The Host-Based Service Name Form (OID ...generic(1) service_name(4), symbolic GSS_C_NT_HOSTBASED_SERVICE) takes the form 'service@hostname'. The hostname is canonicalized via DNS to its fully-qualified domain name in lowercase; the hostname element may be omitted, defaulting to the local host's canonicalized name.
section: 2.1.2
topics:
    - security
    - dns
