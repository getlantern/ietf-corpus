kind: protocol-element
summary: The fedfsNfsFsl LDAP object class (OID 1.3.6.1.4.1.31103.1.1004) is a structural subclass of fedfsFsl and represents an NFS fileset location. Its REQUIRED attributes include fedfsNfsURI, fedfsNfsCurrency, fedfsNfsGenFlagWritable/Going/Split, fedfsNfsTransFlagRdma, six class fields, read/write rank/order fields, fedfsNfsVarSub, and fedfsNfsValidFor.
