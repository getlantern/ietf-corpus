document: rfc-9301
kind: security-consideration
summary: LISP-SEC (RFC 9303) MUST be deployed when LISP operates over the public Internet to address threats cataloged in RFC 7835, including spoofing, mapping system compromise, and man-in-the-middle attacks on EID-to-RLOC mappings.
