document: rfc-3585
kind: protocol-element
summary: IKERule associates SAConditions and SAActions for IKE phase 1 negotiations. It adds IdentityContexts (string array), where multiple array entries are ORed, and within a single entry multiple context names are ANDed using '&&' syntax in alphabetical UCS-2 order, enabling selection of the appropriate IKE identity per VPN context.
section: "4.2"
topics:
    - ipsec
    - security
