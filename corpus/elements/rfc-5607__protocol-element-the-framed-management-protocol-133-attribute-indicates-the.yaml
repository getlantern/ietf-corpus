document: rfc-5607
kind: protocol-element
summary: The Framed-Management-Protocol (133) Attribute indicates the application-layer management protocol to be used for Framed Management access. It MAY be used in both Access-Request and Access-Accept packets and is used in conjunction with Service-Type value Framed-Management (18).
