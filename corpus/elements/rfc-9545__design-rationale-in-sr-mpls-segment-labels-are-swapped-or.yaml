document: rfc-9545
kind: design-rationale
summary: In SR-MPLS, segment labels are swapped or popped as a packet transits the network, leaving no label or only the last label at the egress node. This makes it impossible for the egress to determine which SR path the packet traversed, motivating the PSID as a persistent path identifier.
section: "1"
topics:
