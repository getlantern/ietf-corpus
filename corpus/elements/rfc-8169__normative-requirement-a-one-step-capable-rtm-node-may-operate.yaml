document: rfc-8169
kind: normative-requirement
summary: A one-step-capable RTM node MAY operate in either one-step or two-step mode, but it MUST NOT update both the Scratch Pad of the event message and the Scratch Pad of the associated follow-up message.
section: "2.1"
rfc2119_level: MUST NOT
topics:
