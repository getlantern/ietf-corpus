document: rfc-5910
kind: security-consideration
summary: Man-in-the-middle attacks are possible since an EPP client may act as an agent for a zone administrator sending delegation information to be signed by the server. Acceptance of a false key can cause the child and parent zones to be inconsistent, yielding untrustworthy DNS query responses or breaking the secure delegation entirely.
section: "9"
topics:
    - dns
    - security
