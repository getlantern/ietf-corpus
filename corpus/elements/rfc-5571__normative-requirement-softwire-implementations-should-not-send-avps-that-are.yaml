document: rfc-5571
kind: normative-requirement
summary: Softwire implementations SHOULD NOT send AVPs that are not relevant to Softwires, but SHOULD ignore them when received. This simplifies building Softwire applications on top of existing L2TPv2 implementations.
section: 5.1.1.3
rfc2119_level: SHOULD NOT
