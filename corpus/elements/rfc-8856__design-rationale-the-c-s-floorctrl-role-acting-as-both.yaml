document: rfc-8856
kind: design-rationale
summary: The 'c-s' floorctrl role (acting as both client and server simultaneously) was removed because it was underspecified in RFC 4583 and implemented inconsistently — many implementations treated it as equivalent to 'c-only s-only'. The new specification drops it from generation but requires accepting it for backward compatibility.
section: "5.1"
topics:
    - realtime
    - webrtc
