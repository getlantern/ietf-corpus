summary: 'RTCP packets contain multiple fields measured in clock-rate units, including: RTP timestamp in SR packets, interarrival jitter in RR packets, min/max/mean/dev_jitter in XR Summary Blocks (RFC 3611), interarrival jitter in IJ packets (RFC 5450), RTP timestamp in SMPTETC packets (RFC 5484), and jitter fields in RSI blocks (RFC 5760).'
