document: rfc-2726
kind: normative-requirement
summary: At creation or modification of a key-cert object, the database software verifies that the certificate in the certif attribute belongs to the PGP key ID specified in the key-cert attribute; the operation is refused if these two IDs do not match.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
