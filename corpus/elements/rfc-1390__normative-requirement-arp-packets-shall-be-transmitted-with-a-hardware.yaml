document: rfc-1390
kind: normative-requirement
summary: ARP packets shall be transmitted with a hardware type code of 1 (Ethernet) and shall be accepted only with a hardware type code of 1. The IEEE 802 hardware type code of 6 must not be used or accepted.
section: Address Resolution
rfc2119_level: MUST
topics:
    - ip
