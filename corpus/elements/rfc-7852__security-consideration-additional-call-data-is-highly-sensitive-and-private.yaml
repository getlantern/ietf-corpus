document: rfc-7852
kind: security-consideration
summary: Additional call data is highly sensitive and private. By-reference transmission requires HTTPS/TLS. Unauthorized access must be prevented; the document notes that service providers typically protect this data carefully and disclosing it in an emergency call is a trade-off to protect the caller's greater interest.
