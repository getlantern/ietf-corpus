document: rfc-4191
kind: normative-requirement
summary: When a host avoids a non-reachable preferred router X and uses router Y instead, the host SHOULD probe router X's reachability by sending a single Neighbor Solicitation. Such probes MUST be rate-limited to no more than one per minute per router.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
