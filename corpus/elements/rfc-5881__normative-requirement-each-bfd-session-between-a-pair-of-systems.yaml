document: rfc-5881
kind: normative-requirement
summary: Each BFD session between a pair of systems MUST traverse a separate network-layer path in both directions. This is required for correct demultiplexing and to avoid multiple sessions protecting the same path.
section: "2"
rfc2119_level: MUST
topics:
    - routing
