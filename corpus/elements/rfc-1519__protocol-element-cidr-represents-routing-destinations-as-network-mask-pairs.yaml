document: rfc-1519
kind: protocol-element
summary: 'CIDR represents routing destinations as (network, mask) pairs rather than classful A/B/C network numbers. Routing decisions are made by longest-prefix match: among all (network, mask) pairs matching a destination, the one with the longest mask is selected.'
