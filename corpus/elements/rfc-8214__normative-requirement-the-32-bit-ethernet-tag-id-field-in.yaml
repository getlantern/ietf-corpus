document: rfc-8214
kind: normative-requirement
summary: The 32-bit Ethernet Tag ID field in the per-EVI Ethernet A-D route MUST be set to the VPWS service instance identifier; a 24-bit value MAY be used and MUST then be right-aligned within the 32-bit field.
