document: rfc-7714
kind: normative-requirement
summary: The AEAD message authentication mechanism MUST be the primary authentication mechanism for AEAD SRTP/SRTCP. Additional SRTP/SRTCP authentication mechanisms SHOULD NOT be used with any AEAD algorithm, and the optional SRTP/SRTCP authentication tags are NOT RECOMMENDED.
section: "7.1"
rfc2119_level: MUST
topics:
