document: rfc-6454
kind: security-consideration
summary: The security properties of the same-origin policy depend on the IDNA algorithm employed by the user agent. Migrating between IDNA2003 and IDNA2008 may redraw security boundaries, potentially combining two mutually distrusting entities into the same origin.
section: "8.4"
topics:
    - security
    - dns
