document: rfc-5476
kind: normative-requirement
summary: For Hash-based Filtering on IPv4, the input to the Hash Function MUST include IP identification, flags, fragment offset, source IP address, destination IP address, and a configurable number of bytes from the IP payload. Minimum configuration ranges MUST support 8–32 bytes and offsets 0–64.
section: 6.5.2.6
rfc2119_level: MUST
topics:
    - measurement
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
