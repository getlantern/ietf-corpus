document: rfc-6570
kind: interoperability-note
summary: Variable matching (using a template in reverse to extract variable values from a formed URI) only works reliably when template expressions are delimited by the beginning/end of the URI or by characters that cannot be part of the expansion. In general, regular expression languages are better suited for variable matching.
section: "1.4"
topics:
    - http
