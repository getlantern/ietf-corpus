document: rfc-3891
kind: normative-requirement
summary: If the Replaces header field matches a dialog which has already terminated, the UA SHOULD decline the request with a 603 Declined response, to prevent a race-condition where the UA alerts for an unwanted replacement call.
section: "3"
rfc2119_level: SHOULD
