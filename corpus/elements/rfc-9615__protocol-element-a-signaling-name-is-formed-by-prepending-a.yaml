document: rfc-9615
kind: protocol-element
summary: A signaling name is formed by prepending a signaling type label (e.g., '_dsboot' for DNSSEC bootstrapping) and the child zone name (without the root label) to the signaling domain. For example, bootstrapping 'example.co.uk' via 'ns1.example.net' produces '_dsboot.example.co.uk._signal.ns1.example.net'.
section: "3.2"
topics:
    - dns
    - security
