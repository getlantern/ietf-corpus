document: rfc-9658
kind: interoperability-note
summary: The MT extensions for MP FEC do not require any modifications to the End-of-LIB procedures from RFC 5919; those procedures apply as-is to MT MP FEC elements. An MT mLDP speaker MAY signal convergence per sub-topology using the MT Typed Wildcard MP FEC Element.
section: "5.2"
topics:
