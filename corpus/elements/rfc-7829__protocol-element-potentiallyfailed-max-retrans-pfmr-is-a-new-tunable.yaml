document: rfc-7829
kind: protocol-element
summary: PotentiallyFailed.Max.Retrans (PFMR) is a new tunable sender-side parameter that defines the error counter threshold at which a destination address is classified as PF. The RECOMMENDED value is 0, meaning the PF state is entered on the first timeout. PFMR MUST be less than PMR for the PF state to be reachable before inactive.
section: "3.2"
topics:
    - sctp
    - multipath
