document: rfc-3648
kind: protocol-element
summary: The ordered-collections compliance class is a new WebDAV compliance class advertised in the DAV header of OPTIONS responses. Only a collection or null resource may include it. Including it signals that the resource's internal member URIs can be ordered, and implies the ORDERPATCH method is supported.
section: "10"
