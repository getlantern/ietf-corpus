document: rfc-5536
kind: protocol-element
summary: 'The Injection-Info header field contains structured parameters added by the injecting news server: posting-host (FQDN/IP of origin), posting-account (opaque source identifier), logging-data (session reference), and mail-complaints-to (abuse address). Non-standard attributes MUST begin with ''x-''.'
section: 3.2.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
