document: rfc-9008
kind: normative-requirement
summary: The two high-order bits of the new RPI Option Type MUST be set to '00', and the third (chg) bit remains '1' to indicate mutable data en route; the rightmost five bits remain 0x03 (00011), giving a hex value of 0x23.
section: "4.2"
rfc2119_level: MUST
topics:
