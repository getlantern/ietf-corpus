document: rfc-9607
kind: design-rationale
summary: 'The document takes the same approach as Clearmode (RFC 4040): rather than defining specific RTP payload content, packet size, or packet intervals, it enables endpoints to signal SCIP support and provides a transparent channel for SCIP communication. Codec-specific negotiation happens within SCIP control messages after RTP session establishment.'
