document: rfc-2402
kind: interoperability-note
summary: Use of the IPv4 Router Alert option (classified immutable) is potentially incompatible with IPsec/AH because routers processing the option may modify the packet. This would require each router on the path to be a member of a multicast-SA defined by the SPI, which requires multicast SA support not currently available.
section: A1
topics:
    - ipsec
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
