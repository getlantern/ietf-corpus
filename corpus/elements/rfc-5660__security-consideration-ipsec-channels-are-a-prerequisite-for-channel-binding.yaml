document: rfc-5660
kind: security-consideration
summary: IPsec channels are a prerequisite for channel binding (RFC 5056) to IPsec, but the channel bindings specification for IPsec channels is explicitly out of scope for this document. Without IPsec APIs, connection latching provides only marginal security benefits over traditional IPsec.
section: "6.4"
topics:
    - ipsec
    - security
