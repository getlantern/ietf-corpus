document: rfc-5324
kind: normative-requirement
summary: FCAP requires entities to support at least four Root Certificates against which received certificates can be validated. Support for certificate chains containing more than one certificate is optional. Entities must be able to access a Certificate Revocation List (CRL) for each configured Root Certificate if one is available from the CA; certificates on the CRL are considered invalid.
section: "4.6"
rfc2119_level: REQUIRED
topics:
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
