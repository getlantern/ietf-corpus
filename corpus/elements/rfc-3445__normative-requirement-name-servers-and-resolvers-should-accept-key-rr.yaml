document: rfc-3445
kind: normative-requirement
summary: Name servers and resolvers SHOULD accept KEY RR sets that contain KEY RRs with a protocol octet value other than 3, to avoid invalidating associated SIG records or creating caching consistency problems with out-of-date zones.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
