document: rfc-8156
kind: wire-format
summary: 'All failover messages share a common fixed-size header followed by variable-length options: msg-type (1 octet), transaction-id (3 octets), sent-time (4 octets, unsigned 32-bit, seconds since 2000-01-01 UTC modulo 2^32), and options (variable). All values are in network byte order.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
