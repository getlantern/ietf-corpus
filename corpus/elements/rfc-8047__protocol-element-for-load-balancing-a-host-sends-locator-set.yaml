document: rfc-8047
kind: protocol-element
summary: For load balancing, a host sends LOCATOR_SET with ESP_INFO in an UPDATE to create new SA pairs. A new SA is requested by setting OLD SPI to zero and NEW SPI to the newly created incoming SPI, with a Type 1 Locator associating the new address with the new SPI.
section: 4.2.4
topics:
    - mobility
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
