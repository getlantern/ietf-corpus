document: rfc-2131
kind: normative-requirement
summary: 'If the options extend into the ''sname'' and ''file'' fields (option overload), the ''option overload'' option MUST appear in the ''options'' field. Options MUST be interpreted in order: ''options'' field first, then ''file'' field, then ''sname'' field.'
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
