document: rfc-5951
kind: normative-requirement
summary: Every MPLS-TP NE MUST connect to an Operations System (OS). The connection MAY be direct or indirect via another MPLS-TP NE. When connected indirectly, an MCC MUST be supported between the NE and the NE(s) providing the connection to the OS.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - yang
