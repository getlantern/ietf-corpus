document: rfc-4975
kind: protocol-element
summary: MSRP URIs use the 'msrp' scheme (plaintext TCP) or 'msrps' scheme (TLS-protected TCP). URIs are ephemeral, session-scoped, and encoded entirely in US-ASCII. The transport parameter MUST be 'tcp' for TCP connections.
section: "6"
topics:
