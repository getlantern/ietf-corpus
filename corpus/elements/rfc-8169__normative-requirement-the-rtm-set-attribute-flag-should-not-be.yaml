document: rfc-8169
kind: normative-requirement
summary: The RTM_SET Attribute Flag SHOULD NOT be set in the LSP_REQUIRED_ATTRIBUTES object unless it is known that all nodes recognize the RTM attribute, because an unrecognizing node would reject the Path message entirely.
section: "4.4"
rfc2119_level: SHOULD NOT
topics:
    - routing
