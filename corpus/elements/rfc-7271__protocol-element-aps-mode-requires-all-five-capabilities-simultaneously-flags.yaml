summary: 'APS mode requires all five capabilities simultaneously (Flags=0xF8000000). It introduces: SF-P higher priority than FS, SFc highest local priority, extended non-revertive behavior, MS-W command, SD protection switching, and EXER command. The full priority order and state machine are defined in Sections 10 and 11.'
