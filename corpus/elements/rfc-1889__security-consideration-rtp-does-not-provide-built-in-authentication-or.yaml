document: rfc-1889
kind: security-consideration
summary: RTP does not provide built-in authentication or message integrity; applications requiring these properties must use lower-layer or external mechanisms. The random initial sequence number reduces known-plaintext attack risk against stream encryption even when only a relay encrypts the packets.
section: "9.2"
topics:
    - rtp
    - security
    - realtime
