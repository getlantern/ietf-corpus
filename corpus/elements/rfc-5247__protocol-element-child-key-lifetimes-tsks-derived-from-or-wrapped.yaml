document: rfc-5247
kind: protocol-element
summary: Child key lifetimes (TSKs derived from or wrapped by EAP keying material) cannot exceed the parent MSK/EMSK lifetime. Compromise of exported EAP keying material implies compromise of TSKs derived from it; when EAP keying material is considered stale, EAP re-authentication SHOULD be initiated and all child keys SHOULD be replaced.
section: "3.3"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
