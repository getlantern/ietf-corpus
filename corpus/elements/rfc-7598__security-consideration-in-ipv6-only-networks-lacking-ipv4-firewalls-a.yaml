kind: security-consideration
summary: In IPv6-only networks lacking IPv4 firewalls, a device supporting MAP could be tricked via malicious DHCPv6 into enabling its IPv4 stack and directing traffic to an attacker, exposing it to previously infeasible IPv4 attack vectors.
