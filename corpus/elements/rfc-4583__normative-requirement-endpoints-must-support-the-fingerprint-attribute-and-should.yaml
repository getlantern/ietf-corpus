document: rfc-4583
kind: normative-requirement
summary: Endpoints MUST support the 'fingerprint' attribute and SHOULD include it in their session descriptions. Unless a 'fingerprint' attribute is included, the TLS certificate MUST be directly signed by or validated via a path to the other party's trust anchors.
section: "8"
rfc2119_level: MUST
topics:
