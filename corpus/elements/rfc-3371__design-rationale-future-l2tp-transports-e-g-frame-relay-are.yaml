document: rfc-3371
kind: design-rationale
summary: Future L2TP transports (e.g., Frame Relay) are expected to create their own branch under l2tpTransports rather than extending the UDP/IP objects. This forward-compatible OID structure isolates transport-specific state and statistics from the transport-independent tunnel objects.
section: "4.0"
topics:
