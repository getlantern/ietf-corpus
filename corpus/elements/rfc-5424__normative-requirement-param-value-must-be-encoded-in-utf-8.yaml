document: rfc-5424
kind: normative-requirement
summary: PARAM-VALUE MUST be encoded in UTF-8. An originator MUST encode in the 'shortest form' and a collector or relay MUST NOT interpret messages in the 'non-shortest form', per UNICODE TR36. The syslog application MUST NOT fail if control characters are present in PARAM-VALUE.
section: 6.3.3
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
