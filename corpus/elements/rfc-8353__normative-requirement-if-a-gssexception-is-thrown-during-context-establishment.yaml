document: rfc-8353
kind: normative-requirement
summary: If a GSSException is thrown during context establishment, the context negotiation has failed and the GSSContext object MUST be abandoned. If thrown in a per-message call, the context MAY remain useful.
section: "5.12"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
