document: rfc-822
kind: normative-requirement
summary: If the 'From' field is not defaulted to a single authenticated machine address of the actual sender, the 'Sender' field MUST be present. The 'Sender' field MUST be present if it is NOT the same as the 'From' field.
section: 4.4.1
rfc2119_level: MUST
topics:
