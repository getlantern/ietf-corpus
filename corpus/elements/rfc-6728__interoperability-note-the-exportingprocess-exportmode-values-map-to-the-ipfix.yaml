document: rfc-6728
kind: interoperability-note
summary: 'The ExportingProcess exportMode values map to the IPFIX MIB ipfixExportMemberType object: "parallel" → parallel(3), "loadBalancing" → loadBalancing(4), "fallback" → primary(1) for the first destination and secondary(2) for remaining ones. The IPFIX MIB defines no value for tertiary or further fallback destinations.'
section: "4.4"
topics:
