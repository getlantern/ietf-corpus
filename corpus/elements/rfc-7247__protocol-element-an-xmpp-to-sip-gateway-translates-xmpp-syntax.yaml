document: rfc-7247
kind: protocol-element
summary: An XMPP-to-SIP gateway translates XMPP syntax and semantics on behalf of an XMPP server (together forming an 'XMPP service'), while a SIP-to-XMPP gateway translates SIP syntax and semantics on behalf of a SIP server (together forming a 'SIP service'). These two logical functions may reside in the same physical entity.
