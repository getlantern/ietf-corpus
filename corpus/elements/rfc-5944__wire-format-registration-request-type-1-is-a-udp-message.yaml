document: rfc-5944
kind: wire-format
summary: 'Registration Request (Type=1) is a UDP message to port 434 containing: 8-bit Type, 8-bit flags (S/B/D/M/G/r/T/x), 16-bit Lifetime, 32-bit Home Address, 32-bit Home Agent, 32-bit Care-of Address, 64-bit Identification, followed by one or more Extensions including a mandatory authorization-enabling extension.'
