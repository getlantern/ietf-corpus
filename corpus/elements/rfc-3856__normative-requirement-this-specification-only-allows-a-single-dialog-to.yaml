document: rfc-3856
kind: normative-requirement
summary: This specification only allows a single dialog to be constructed as a result of emitting an initial SUBSCRIBE request, ensuring that only a single PA generates notifications for a particular subscription to a particular presentity. If aggregation is needed, it MUST be done in a PA representing the presentity.
section: "6.9"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
