document: rfc-4996
kind: normative-requirement
summary: Until a decompressor feedback channel is established, the compressor SHOULD periodically move to a lower compression state and send IR and/or IR-DYN packets to prevent desynchronization. Once the feedback channel is established, the compressor MAY stop performing periodic refreshes.
section: 5.2.1.2
rfc2119_level: SHOULD
topics:
    - tcp
