document: rfc-7978
kind: protocol-element
summary: Key derivation from IS-IS CRYPTO_AUTH material uses HKDF-Expand-SHA256(IS-IS-key, "Extended Channel" | 0x0S, L), where 0x0S is a single byte with the SType in the lower nibble. This derived material is used instead of raw IS-IS keys for both IS-IS CRYPTO_AUTH-Based and Composite security types.
section: "4.1"
topics:
