document: rfc-4383
kind: normative-requirement
summary: To avoid the boundary condition where a key-disclosure packet for the final data packets is lost, null packets SHOULD be sent for d intervals of duration T_int after the stream ceases. The rate of null packets SHOULD match the average rate of the session media stream.
section: "5"
rfc2119_level: SHOULD
topics:
