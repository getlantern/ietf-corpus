document: rfc-1730
kind: wire-format
summary: A literal string is encoded as '{<count>}CRLF' followed by exactly the specified number of octets. For client-to-server literals, the client MUST wait for a '+' command continuation response before sending the octet data (even for zero-length literals).
section: "4.3"
