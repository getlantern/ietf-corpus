document: rfc-5232
kind: interoperability-note
summary: The imap4flags extension can be used with or without the 'variables' extension (RFC 5229). When 'variables' is not required, the explicit variable name parameter is prohibited; when it is required, explicit variable names may be used in all flag manipulation actions and tests.
