document: rfc-3998
kind: protocol-element
summary: 'Ten new Printer administrative operations are defined with Operation-Id assignments: Enable-Printer (0x22), Disable-Printer (0x23), Pause-Printer-After-Current-Job (0x24), Hold-New-Jobs (0x25), Release-Held-New-Jobs (0x26), Deactivate-Printer (0x27), Activate-Printer (0x28), Restart-Printer (0x29), Shutdown-Printer (0x2A), and Startup-Printer (0x2B).'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
