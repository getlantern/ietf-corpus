document: rfc-6323
kind: normative-requirement
summary: When the Send RTT Estimate Feature is enabled, the receiver MUST use the RTT Estimate Option value in all places requiring an RTT. If the receiver encounters an invalid RTT Estimate Option, it MUST reset the connection with Reset Code 5 ('Option Error'), setting Data 1..3 to the first 3 bytes of the offending option.
section: "3.3"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
