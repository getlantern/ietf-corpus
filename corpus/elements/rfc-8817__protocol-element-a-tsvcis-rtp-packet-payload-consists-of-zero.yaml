document: rfc-8817
kind: protocol-element
summary: A TSVCIS RTP packet payload consists of zero or more consecutive TSVCIS coder frames (each pairing MELPe 2400 data with TSVCIS augmented data), oldest frame first, optionally followed by zero or one MELPe comfort noise frame. An empty packet (no frames) MAY be sent periodically to indicate connectivity.
section: "3.3"
topics:
