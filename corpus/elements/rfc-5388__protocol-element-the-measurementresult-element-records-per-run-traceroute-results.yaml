summary: 'The ''MeasurementResult'' element records per-run traceroute results and contains: TestName, ResultsStartDateAndTime, ResultsIpTgtAddrType, ResultsIpTgtAddr, ProbeResults, and ResultsEndDateAndTime. Each ''ProbeResults'' holds 1–255 ''hop'' elements, each containing 1–10 ''probe'' elements.'
