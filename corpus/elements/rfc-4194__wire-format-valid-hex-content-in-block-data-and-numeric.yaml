document: rfc-4194
kind: wire-format
summary: 'Valid hex content in block data and numeric attributes is defined as: whitespace (0x20, 0x09, 0x0C, 0x0D, 0x0A) interspersed with hexadecimal digits [0-9A-Fa-f]. Whitespace has no semantic meaning and may be removed. The number of hex digits inside a block must be even because word_size is in whole bytes.'
