document: rfc-9686
kind: interoperability-note
summary: 'The registration mechanism is designed to support progressive rollout: once a client detects registration support on a link it continues registering even if subsequent DHCPv6 messages lack OPTION_ADDR_REG_ENABLE, preventing oscillation in mixed deployments where some servers support registration and others do not.'
section: "4.4"
