document: rfc-9725
kind: normative-requirement
summary: Once a WHIP session is established, consent freshness per RFC 7675 SHALL be used to detect non-graceful disconnection. To explicitly terminate a session, the WHIP client MUST send an HTTP DELETE to the WHIP session URL from the Location header of the initial POST.
section: "4.2"
rfc2119_level: MUST
topics:
    - webrtc
    - http
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
