document: rfc-6763
kind: design-rationale
summary: The 'txtvers' key is recommended as the first key/value pair in TXT records to enable backwards compatibility. Authors should increment this version only when an incompatible change is unavoidable; otherwise, new capabilities are added by defining new keys that older clients silently ignore.
section: "6.7"
topics:
    - dns
    - zeroconf
