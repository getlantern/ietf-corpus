document: rfc-4379
kind: normative-requirement
summary: 'An MPLS echo request is delivered to the control plane when triggered by: Router Alert option, IP TTL expiration, MPLS TTL expiration, MPLS Router Alert label, or destination address in the 127/8 range. The control plane further identifies it by UDP destination port 3503.'
section: "4.4"
rfc2119_level: REQUIRED
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
