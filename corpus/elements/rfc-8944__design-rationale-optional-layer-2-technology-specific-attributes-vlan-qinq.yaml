document: rfc-8944
kind: design-rationale
summary: Optional Layer 2 technology-specific attributes (VLAN, QinQ, VXLAN) are gated behind YANG features rather than always present, reflecting that these attributes may be useful to expose to services/applications but are not universally applicable. This avoids bloating the base model.
