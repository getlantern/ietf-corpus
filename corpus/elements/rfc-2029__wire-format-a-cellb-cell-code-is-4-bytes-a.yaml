document: rfc-2029
kind: wire-format
summary: 'A CellB cell code is 4 bytes: a 15-bit 4x4 bitmask (MSB always 0) followed by an 8-bit U/V chrominance index and an 8-bit Y/Y luminance index. Each bit in the bitmask selects one of two luminance values for the corresponding pixel.'
