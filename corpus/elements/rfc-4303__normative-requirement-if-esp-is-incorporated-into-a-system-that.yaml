document: rfc-4303
kind: normative-requirement
summary: 'If ESP is incorporated into a system that supports auditing, the ESP implementation MUST also support auditing and MUST allow an administrator to enable or disable it. Auditable events include: no valid SA, IP fragment offered, sequence number overflow attempt, anti-replay check failure, and integrity check failure.'
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
