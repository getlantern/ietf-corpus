summary: 'UNI point-to-point signaling messages are: SETUP, CALL PROCEEDING, CONNECT, CONNECT ACKNOWLEDGE (call setup) and RELEASE, RELEASE COMPLETE (call release). The network indicates the newly allocated VPCI/VCI in its first response to SETUP (either CALL PROCEEDING or CONNECT).'
