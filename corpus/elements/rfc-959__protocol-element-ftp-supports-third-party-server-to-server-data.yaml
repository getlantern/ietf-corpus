document: rfc-959
kind: protocol-element
summary: 'FTP supports third-party (server-to-server) data transfer: the user-PI establishes control connections to two server-PIs and arranges a direct data connection between them via PORT and transfer commands. Control information flows through the user but data passes directly between the two servers.'
section: "2.3"
topics:
