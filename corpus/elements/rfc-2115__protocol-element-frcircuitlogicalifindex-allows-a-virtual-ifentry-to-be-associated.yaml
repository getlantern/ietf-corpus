document: rfc-2115
kind: protocol-element
summary: frCircuitLogicalIfIndex allows a virtual ifEntry to be associated with a DLC or set of DLCs for higher-layer protocol binding (e.g., PPP/Frame Relay, IP addressing). It normally equals frDlcmiIfIndex but differs when a subset of VCs needs its own logical interface with an appropriate ifType.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
