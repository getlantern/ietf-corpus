document: rfc-2155
kind: wire-format
summary: AppnTgEffectiveCapacity encodes TG bandwidth as a 1-byte OCTET STRING using the same floating-point encoding as cv47 byte 7, in units of 300 bits per second. It is an administratively assigned value derived from link bandwidth and maximum load factor.
