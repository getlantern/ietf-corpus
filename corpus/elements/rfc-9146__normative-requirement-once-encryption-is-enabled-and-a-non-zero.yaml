document: rfc-9146
kind: normative-requirement
summary: Once encryption is enabled and a non-zero-length CID has been negotiated for a given direction, the sender MUST use the DTLSCiphertext record format with content type tls12_cid. Plaintext payloads never use the CID record format.
section: "3"
rfc2119_level: MUST
topics:
    - tls
