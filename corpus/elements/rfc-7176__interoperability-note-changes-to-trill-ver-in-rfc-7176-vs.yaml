document: rfc-7176
kind: interoperability-note
summary: 'Changes to TRILL-VER in RFC 7176 vs RFC 6326 are backward compatible: RFC 6326-conformant implementations only supported version zero with no optional capabilities, which is exactly what absence of the sub-TLV implies. An RFC 7176 implementation receiving an RFC 6326 TRILL-VER not in LSP zero will correctly infer version zero with no extended flag support.'
section: "7"
topics:
