document: rfc-7862
kind: normative-requirement
summary: In a pNFS environment, ALLOCATE and DEALLOCATE are sent to the metadata server, which coordinates changes across storage devices. Both operations MUST either fully succeed or fully fail; partial success across devices is not permitted.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
