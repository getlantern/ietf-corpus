document: rfc-8536
kind: protocol-element
summary: Local time for timestamps before the first transition is specified by time type 0. Local time after the last transition is specified by the TZ string in the footer if present and nonempty; otherwise it is unspecified. If there are no transitions, time type 0 applies unless a TZ string is present.
section: "3.2"
topics:
