document: rfc-7230
kind: normative-requirement
summary: A recipient MUST parse an HTTP message as a sequence of octets in an encoding that is a superset of US-ASCII. Parsing as Unicode characters without regard for encoding creates security vulnerabilities from invalid multibyte sequences containing LF.
section: "3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
