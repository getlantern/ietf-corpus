document: rfc-1662
kind: normative-requirement
summary: Synchronous PPP implementations MUST always respond to the Async-Control-Character-Map Configuration Option with LCP Configure-Ack to enable asynchronous-to-synchronous conversion, even though the synchronous side will not perform ACCM mapping itself.
