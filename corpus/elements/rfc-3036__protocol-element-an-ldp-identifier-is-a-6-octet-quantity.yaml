document: rfc-3036
kind: protocol-element
summary: 'An LDP Identifier is a 6-octet quantity identifying an LSR label space: the first 4 octets are a globally unique LSR Id (typically the 32-bit router ID), and the last 2 octets identify a specific label space within the LSR. Platform-wide label spaces always have the last two octets set to zero.'
section: 2.2.2
topics:
    - mpls
    - routing
