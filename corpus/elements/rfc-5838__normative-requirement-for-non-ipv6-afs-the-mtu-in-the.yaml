document: rfc-5838
kind: normative-requirement
summary: For non-IPv6 AFs, the MTU in the Database Description packet MUST always contain the MTU corresponding to the advertised address family (e.g., the IPv4 MTU when the instance corresponds to an IPv4 AF). Both the AF MTU and the IPv6 MTU used for OSPFv3 packet sizing MUST be considered.
section: "2.7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
