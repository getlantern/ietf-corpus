document: rfc-5190
kind: design-rationale
summary: To avoid confusion between MIDCOM's use of 'agent' (the trusted third party) and SNMP's use of 'agent' (the server), this document renames the MIDCOM agent to 'MIDCOM client'. The SNMP manager corresponds to the MIDCOM client, and the SNMP agent corresponds to the MIDCOM middlebox/server.
section: "3.1"
topics:
    - snmp
