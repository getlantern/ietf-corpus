document: rfc-8750
kind: design-rationale
summary: The IIV transforms are defined for ESP only and cannot be used in IKEv2 because IKEv2 messages lack a unique per-message value suitable for IV generation; the IKEv2 Message-ID can repeat due to extensions RFC 6311 and RFC 7383.
