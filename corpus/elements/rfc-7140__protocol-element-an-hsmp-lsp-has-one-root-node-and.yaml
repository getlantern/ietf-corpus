document: rfc-7140
kind: protocol-element
summary: An HSMP LSP has one root node and one or more leaf nodes. The downstream path is identical to a P2MP LSP (root to all leaves), while the upstream path carries traffic from any leaf node to the root only, following the reverse of the downstream path. Direct leaf-to-leaf communication is not permitted.
section: "1"
topics:
    - mpls
    - routing
