document: rfc-7981
kind: protocol-element
summary: The D bit (0x02) in the Flags field is a down-bit for loop prevention. It MUST be set when the TLV is leaked from Level 2 to Level 1, and TLVs with D bit set MUST NOT be leaked from Level 1 to Level 2.
section: "2"
