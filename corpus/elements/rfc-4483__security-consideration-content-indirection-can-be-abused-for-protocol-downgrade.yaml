document: rfc-4483
kind: security-consideration
summary: Content indirection can be abused for protocol downgrade attacks (e.g., forcing HTTP Basic Auth), denial-of-service via excessive resource consumption, port-scanning of internal resources, and disclosure of sensitive information such as internal usernames or geolocation. These threats can be mitigated by careful screening of URIs and use of integrity/confidentiality protection.
section: "7"
topics:
