document: rfc-7296
kind: normative-requirement
summary: All IKEv2 implementations MUST be able to send, receive, and process IKE messages up to 1280 octets long, and SHOULD be able to handle messages up to 3000 octets. Implementations MAY shorten messages by omitting certificates or crypto suite proposals to stay within limits.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
