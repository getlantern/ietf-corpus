summary: 'The iscsiTgtPortalAttributesTable holds target-specific portal attributes: iscsiTgtPortalPort (TCP listen port, 1–65535) and iscsiTgtPortalTag (portal group aggregation tag, 1–65535). Portals sharing the same tag may aggregate connections within a single multi-connection iSCSI session.'
