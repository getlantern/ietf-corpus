summary: 'The PCC converts SR-ERO to an MPLS label stack plus next hop: SID index values are converted per RFC 8660; NAI-only subobjects are resolved via the SR-DB; MPLS label subobjects are used directly. The first subobject maps to the topmost label (last-in-first-out stack ordering).'
