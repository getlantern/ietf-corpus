document: rfc-1752
kind: security-consideration
summary: IPv6 includes packet-level authentication via the Authentication Header and confidentiality via the Privacy Header at the internetwork layer. However, both security features rely on the presence of a yet-to-be-defined key management system, which was identified as an open issue at the time of this recommendation.
section: "22"
topics:
    - ip
    - security
    - crypto
