document: rfc-1521
kind: normative-requirement
summary: Mail-sending software must always use the lowest common denominator character set. If a body contains only US-ASCII characters, it MUST be labeled US-ASCII, not a superset like ISO-8859-1. National variations of ISO 646 are NOT ASCII and their use in Internet mail is explicitly discouraged.
section: 7.1.1
rfc2119_level: MUST
topics:
    - email
