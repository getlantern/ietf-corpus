document: rfc-4848
kind: protocol-element
summary: 'Flag semantics: ''S'' means the output is an FQDN for which SRV records exist; ''A'' means the output is a domain name for address lookup; ''U'' means the output is a URI to be resolved for service access. An empty flag means the next lookup is for another NAPTR record.'
section: "4.4"
topics:
