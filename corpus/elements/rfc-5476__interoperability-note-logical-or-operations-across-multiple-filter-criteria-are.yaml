document: rfc-5476
kind: interoperability-note
summary: Logical OR operations across multiple filter criteria are not supported in the PSAMP Property Match Filtering specification; multiple Information Elements in the same Options Template Record represent a logical AND. Implementations needing OR semantics cannot rely on the basic PSAMP filtering mechanism.
section: 6.5.2.5
topics:
    - measurement
