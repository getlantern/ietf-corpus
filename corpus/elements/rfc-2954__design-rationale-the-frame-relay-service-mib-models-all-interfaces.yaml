document: rfc-2954
kind: design-rationale
summary: The Frame Relay Service MIB models all interfaces and PVCs delivered by a frame relay service within a single virtual SNMP system, regardless of the physical topology. This allows comprehensive customer network management from a single agent endpoint, with internal device communication mechanisms left implementation-specific.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
