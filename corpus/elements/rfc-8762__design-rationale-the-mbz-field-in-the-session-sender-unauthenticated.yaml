document: rfc-8762
kind: design-rationale
summary: The MBZ field in the Session-Sender unauthenticated packet is sized at 30 octets to match the size of the base reflected packet, implementing the symmetrical size behavior from RFC 6038 without requiring per-session size negotiation.
