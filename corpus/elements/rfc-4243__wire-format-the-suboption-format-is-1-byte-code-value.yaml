document: rfc-4243
kind: wire-format
summary: 'The suboption format is: 1-byte Code (value 9), 1-byte Length (minimum 4), followed by one or more repetitions of: 4-byte Enterprise Number (network byte order), 1-byte DataLenN, and opaque SuboptionData of DataLenN bytes. The Length field includes the first Enterprise Number.'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
