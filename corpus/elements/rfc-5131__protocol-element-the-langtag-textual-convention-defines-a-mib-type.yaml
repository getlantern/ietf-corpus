document: rfc-5131
kind: protocol-element
summary: The LangTag TEXTUAL-CONVENTION defines a MIB type for representing BCP 47 language tags. It uses OCTET STRING syntax with SIZE (0 | 2..63), allowing lowercase characters only, and is intended to be imported by other MIB modules rather than having each define its own representation.
