document: rfc-4592
kind: normative-requirement
summary: Labels such as 'the*' and '**' are not asterisk labels. No label value other than 0x01 0x2a constitutes an asterisk label, so names beginning with any other label are never wildcard domain names.
section: 2.1.2
rfc2119_level: MUST NOT
topics:
    - dns
