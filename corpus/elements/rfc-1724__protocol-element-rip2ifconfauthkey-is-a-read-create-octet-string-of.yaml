document: rfc-1724
kind: protocol-element
summary: rip2IfConfAuthKey is a read-create OCTET STRING of size 0..16 holding the authentication key. Strings shorter than 16 octets are left-justified and right-padded with null bytes. Reading this object always returns a zero-length string to prevent authentication bypass.
section: "4.2"
topics:
