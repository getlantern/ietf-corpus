document: rfc-9454
kind: protocol-element
summary: In RFC 5340 (OSPFv3), the 'master/slave' terminology used in the Database Description process is replaced by 'Leader/Follower'. The 'Master/Slave (MS) bit' in the Database Description packet is renamed the 'Leader (L) bit'. Protocol operation is unchanged.
