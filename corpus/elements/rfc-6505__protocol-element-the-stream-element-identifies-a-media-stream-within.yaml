document: rfc-6505
kind: protocol-element
summary: The <stream> element identifies a media stream within <join>, <modifyjoin>, and <unjoin> requests. It carries mandatory 'media' (MIME type name, e.g., "audio" or "video"), optional 'label' (SDP label), and optional 'direction' ("sendrecv", "sendonly", "recvonly", or "inactive", defaulting to "sendrecv") attributes.
section: 4.2.2.5
