document: rfc-5537
kind: normative-requirement
summary: The References header field of a followup MUST be constructed by appending the parent article's Message-ID to the parent's References content. If trimming is required to stay under 998 characters, the first message identifier and the last two MUST NOT be removed.
section: 3.4.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
