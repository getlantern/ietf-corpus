document: rfc-5163
kind: interoperability-note
summary: When TS Packets are transported via TS-Concat across ULE/GSE, each PID value SHOULD uniquely identify a Stream within the TS Multiplex. A receiver must independently demultiplex each TS Stream and associate SI table information with the correct Stream to avoid conflicts with native TS Packets.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
