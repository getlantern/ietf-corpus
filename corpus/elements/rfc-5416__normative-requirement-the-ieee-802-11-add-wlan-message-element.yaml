document: rfc-5416
kind: normative-requirement
summary: 'The IEEE 802.11 Add WLAN message element MUST be accompanied by IEEE 802.11 Information Element message elements containing: Power Constraint IE, EDCA Parameter Set IE, QoS Capability IE, WPA IE, RSN IE, and WMM IE. Additionally, the SSID field MUST NOT exceed 32 octets.'
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
