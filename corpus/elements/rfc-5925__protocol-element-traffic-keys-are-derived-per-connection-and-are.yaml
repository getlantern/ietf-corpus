document: rfc-5925
kind: protocol-element
summary: 'Traffic keys are derived per-connection and are directional. A single MKT yields up to four traffic keys: Send_SYN_traffic_key, Receive_SYN_traffic_key, Send_other_traffic_key, and Receive_other_traffic_key. The KDF context includes source/destination IP addresses, ports, and both ISNs (destination ISN set to zero for SYN segments).'
section: "3.2"
topics:
    - tcp
    - security
    - crypto
