document: rfc-2159
kind: design-rationale
summary: 'T.30 and X.400 use opposite bit numbering schemes within an octet: X.400 counts bits from MSB down to LSB, while T.30 uses the opposite. This explains why the same parameter maps to different bit numbers in each system.'
