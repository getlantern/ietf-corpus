document: rfc-3411
kind: registry
summary: IANA maintains a registry of SnmpEngineID format values (the first octet of an snmpEngineID when the high bit is set to 1) that indicate the format of the remaining octets. Formats include IPv4 address, IPv6 address, MAC address, text, octets, and enterprise-specific formats.
