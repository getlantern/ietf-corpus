document: rfc-5936
kind: normative-requirement
summary: The AXFR query header MUST have QR=0 (Query), OPCODE=0 (Standard Query), RCODE=0 (No error), QDCOUNT=1, ANCOUNT=0, NSCOUNT=0. The Z bit MUST be set to 0 by the client. The server MUST reply using the same message ID as the query.
section: 2.1.1
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
