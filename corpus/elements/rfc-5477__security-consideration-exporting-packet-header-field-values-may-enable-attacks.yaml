document: rfc-5477
kind: security-consideration
summary: Exporting packet header field values may enable attacks by the receiver that would otherwise require direct on-path observation. The underlying export protocol MUST therefore apply appropriate procedures to guarantee integrity and confidentiality of exported information; such procedures are defined in the IPFIX protocol document (RFC 5101).
section: "9"
topics:
    - security
    - measurement
