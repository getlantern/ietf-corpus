document: rfc-4436
kind: normative-requirement
summary: The host SHOULD use the addresses of local routers (preferably default gateways) as test nodes. In order to ensure configuration validity, the host SHOULD only configure routes for which the next hop address passes the reachability test; other routes SHOULD be re-learned.
section: "2"
rfc2119_level: SHOULD
topics:
    - ip
