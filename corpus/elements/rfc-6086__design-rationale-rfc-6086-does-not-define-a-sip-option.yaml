document: rfc-6086
kind: design-rationale
summary: RFC 6086 does not define a SIP option-tag for the Info Package mechanism as a whole. This avoids requiring a Require/Supported header field exchange for the base mechanism; instead, presence of the Recv-Info header field serves as the capability indicator. Individual Info Package specifications may define their own option-tags.
section: 5.2.2
topics:
    - sip
    - realtime
