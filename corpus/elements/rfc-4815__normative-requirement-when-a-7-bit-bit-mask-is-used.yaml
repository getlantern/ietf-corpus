document: rfc-4815
kind: normative-requirement
summary: When a 7-bit bit mask is used in list compression and the reference list has more than seven items, the decompressor MUST NOT modify items with an index not covered by the 7-bit mask; only items within the first seven positions may be changed.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - ip
