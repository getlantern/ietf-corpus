document: rfc-1548
kind: normative-requirement
summary: All LCP Link Configuration, Link Termination, and Code-Reject packets (codes 1–7) MUST always be sent as if no Configuration Options were enabled, using default ACCM and no address/control/protocol field compression. This ensures LCP packets remain recognizable even when one end mistakenly believes the link is open.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
