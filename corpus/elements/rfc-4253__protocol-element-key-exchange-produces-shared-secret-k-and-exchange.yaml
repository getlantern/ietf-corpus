document: rfc-4253
kind: protocol-element
summary: Key exchange produces shared secret K and exchange hash H. Six derived keys are computed as HASH(K || H || letter || session_id) for letters A-F, covering IVs and encryption/integrity keys for both directions. The session identifier is H from the first key exchange and never changes.
section: "7.2"
topics:
    - security
    - crypto
