document: rfc-3591
kind: protocol-element
summary: 'optIfOTMnTable describes the OTM structure per interface: optIfOTMnOrder (1..900 max wavelengths), optIfOTMnReduced (full vs. reduced functionality), optIfOTMnBitRates (supported rates bitmap), optIfOTMnInterfaceType (IrDI or IaDI with optional free-form text), optIfOTMnTcmMax (0..6, default 3), and optIfOTMnOpticalReach (intraOffice through ultraLongHaul).'
