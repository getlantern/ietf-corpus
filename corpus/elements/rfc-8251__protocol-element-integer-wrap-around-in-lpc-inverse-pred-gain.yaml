document: rfc-8251
kind: protocol-element
summary: Integer wrap-around in LPC_inverse_pred_gain_QA() (silk/LPC_inv_pred_gain.c) when computing AR coefficients could produce values exceeding 32-bit range, which is undefined behavior in C. The fix detects 64-bit overflow and treats the corresponding filter as unstable, returning 0.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
