document: rfc-8693
kind: interoperability-note
summary: The token exchange grant type is layered on top of OAuth 2.0's existing extension grant mechanism (RFC 6749 Section 4.5) and token endpoint, meaning existing OAuth infrastructure can support token exchange with minimal changes. The 'audience' and 'resource' parameters may be used together to indicate multiple target services with a mix of logical names and resource URIs.
section: 2.1.1
topics:
    - oauth
