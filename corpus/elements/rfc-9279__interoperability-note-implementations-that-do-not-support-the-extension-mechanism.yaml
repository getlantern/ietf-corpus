document: rfc-9279
kind: interoperability-note
summary: Implementations that do not support the extension mechanism will ignore it as specified in RFC 3376 and RFC 3810. This extension mechanism applies only to IGMPv3 and MLDv2; it does not apply when hosts or routers send older version messages.
section: "6"
topics:
