document: rfc-8500
kind: design-rationale
summary: The metric value in the Reverse Metric TLV is defined as an offset (delta) to be added to the existing configured metric rather than an absolute value. This preserves existing operator provisioning and allows incremental adjustment without overwriting local configuration.
section: "1.5"
topics:
