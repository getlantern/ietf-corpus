document: rfc-2720
kind: security-consideration
summary: Port scan attacks (sending packets to a large number of address:port pairs) can flood the meter's flow table, triggering flood mode and potentially causing denial of service for legitimate flow measurement. Implementers should consider how to handle such flooding attacks on metering interfaces.
section: "5.2"
topics:
    - snmp
    - measurement
    - security
