document: rfc-3460
kind: security-consideration
summary: Section 11 addresses security considerations for PCIMe. As a policy information model, unauthorized modification or spoofing of policy data could cause misconfiguration of enforcement points; the document references RFC 3060's security considerations and notes that data-model-level security depends on the transport and access-control mechanisms of the protocol carrying the model.
section: "11"
topics:
    - security
