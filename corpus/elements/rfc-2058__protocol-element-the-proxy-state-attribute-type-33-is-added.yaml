document: rfc-2058
kind: protocol-element
summary: The Proxy-State attribute (Type 33) is added by a proxy server when forwarding an Access-Request and MUST be returned unmodified in the Accept/Reject/Challenge response. The proxy MUST remove it before forwarding the response to the originating NAS, and MUST re-sign the packet because the Response Authenticator covers the full packet contents.
section: "5.33"
topics:
    - radius
    - security
