document: rfc-5150
kind: normative-requirement
summary: The ingress node stitching an e2e TE LSP to an S-LSP MUST ignore the Label object received in the Resv for the e2e TE LSP over the S-LSP hop. Recipients of Label/Upstream Label in the stitching case MUST NOT process these labels.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
