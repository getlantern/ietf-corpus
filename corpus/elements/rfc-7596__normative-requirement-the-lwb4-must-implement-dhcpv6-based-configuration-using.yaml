document: rfc-7596
kind: normative-requirement
summary: The lwB4 MUST implement DHCPv6-based configuration using OPTION_S46_CONT_LW as described in RFC 7598; the softwire lifetime is bound to the DHCPv6 lease lifetime. If stateful IPv4 configuration or additional IPv4 options are required, DHCP 4o6 (RFC 7341) MUST be used.
section: "5.1"
rfc2119_level: MUST
topics:
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
