document: rfc-7471
kind: normative-requirement
summary: Implementations SHOULD provide configurable accelerated advertisement thresholds per sub-TLV so that if a measured parameter falls outside configured bounds or the difference from the last advertised value exceeds a configured threshold, the advertisement is made immediately.
