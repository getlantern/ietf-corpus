document: rfc-9503
kind: security-consideration
summary: 'The STAMP extensions may be used for potential address spoofing: a Session-Sender may specify a Return Path IP Address different from the Session-Sender address. The Session-Reflector MAY drop the test packet when it cannot determine whether the Return Path IP Address is local to the Session-Sender, and operators may provision the Return Path IP Address in an access control list.'
section: "6"
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
