document: rfc-3910
kind: normative-requirement
summary: 'Forking of SUBSCRIBE requests is prohibited for both event packages. The normal SIP DNS lookup and routing rules should result in a target set with exactly one element: the notifier.'
section: 5.3.10
rfc2119_level: MUST
