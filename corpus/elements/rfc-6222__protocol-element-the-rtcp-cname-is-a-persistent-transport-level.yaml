document: rfc-6222
kind: protocol-element
summary: The RTCP CNAME is a persistent transport-level identifier for an RTP endpoint, distinct from the SSRC (which may change on collision or restart). CNAMEs are opaque strings to remote peers, enabling synchronization across related RTP streams and long-term endpoint identification.
