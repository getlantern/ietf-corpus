document: rfc-9478
kind: normative-requirement
summary: A zero-length Security Label MUST NOT be used. If a received TS payload contains a TS_SECLABEL with a zero-length Security Label, that TS payload MUST be ignored. A zero-length Security Label MUST NOT be interpreted as a wildcard.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
