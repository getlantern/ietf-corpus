document: rfc-4436
kind: security-consideration
summary: 'DNAv4 inherits ARP''s lack of security: an attacker on the network can spoof a reachability test response, causing the host to falsely conclude it is attached to a known network. Similarly, a rogue DHCPv4 server can convince a host it is on a particular network.'
