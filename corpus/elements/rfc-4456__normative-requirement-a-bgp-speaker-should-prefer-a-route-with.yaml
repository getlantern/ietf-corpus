document: rfc-4456
kind: normative-requirement
summary: A BGP speaker SHOULD prefer a route with the shorter CLUSTER_LIST length when performing tie-breaking between Steps f) and g) of the Decision Process. A route without a CLUSTER_LIST attribute is treated as having length zero.
