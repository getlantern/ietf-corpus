document: rfc-1902
kind: wire-format
summary: The BITS construct encodes a named-bit enumeration as an OCTET STRING; bit positions are assigned contiguous non-negative values starting at zero, and only enumerated bits may appear in a value. MIB designers should avoid exceeding 128 bits due to implementation and interoperability limitations.
section: 7.1.4
