document: rfc-1989
kind: normative-requirement
summary: A Reporting-Period value of zero MUST be Nak'd by the peer with an appropriate non-zero value when that peer has sent or will send a Configure-Request containing the Quality-Protocol Configuration Option with a zero Reporting-Period.
section: "2.5"
rfc2119_level: MUST
