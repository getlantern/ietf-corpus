document: rfc-8944
kind: interoperability-note
summary: For non-NMDA-compliant implementations, a companion module 'ietf-l2-topology-state' mirrors 'ietf-l2-topology' but augments 'ietf-network-state' and 'ietf-network-topology-state' with read-only (config false) data nodes. Implementations supporting NMDA SHOULD NOT support this companion module.
section: Appendix A
