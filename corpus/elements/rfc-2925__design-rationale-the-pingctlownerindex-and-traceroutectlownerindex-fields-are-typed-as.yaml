document: rfc-2925
kind: design-rationale
summary: The pingCtlOwnerIndex and traceRouteCtlOwnerIndex fields are typed as SnmpAdminString so they can be mapped trivially to an SNMPv3 VACM securityName or groupName, enabling per-user row-level access control without separate per-user tables.
