document: rfc-2748
kind: design-rationale
summary: The protocol is designed to be extensible via self-identifying objects (C-Num/C-Type) so that diverse client-specific information can be supported without modifying the base COPS protocol. New client-types are expected to have corresponding usage documents specifying their interaction with the protocol.
