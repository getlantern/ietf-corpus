document: rfc-9647
kind: design-rationale
summary: 'A Babel router can auto-detect wired (eth0) vs. wireless (wlan0) interface parameters: wired defaults to two-out-of-three metric algorithm and split-horizon true, while wireless defaults to etx and split-horizon false. Tunnel interfaces require explicit configuration. This allows minimal YANG configuration for common cases.'
section: "2.3"
topics:
