document: rfc-2961
kind: normative-requirement
summary: When a receiver does not support the MESSAGE_ID class (Class 23, form 0bbbbbbb), it returns an 'Unknown Object Class' error per RFC 2205. The generator MUST re-send the original message without the MESSAGE_ID object upon receiving such an error.
section: "4.8"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
