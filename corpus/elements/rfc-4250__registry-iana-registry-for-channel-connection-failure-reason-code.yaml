summary: 'IANA registry for Channel Connection Failure ''reason code'' (uint32) used in SSH_MSG_CHANNEL_OPEN_FAILURE. Initial assignments: SSH_OPEN_ADMINISTRATIVELY_PROHIBITED (1), SSH_OPEN_CONNECT_FAILED (2), SSH_OPEN_UNKNOWN_CHANNEL_TYPE (3), SSH_OPEN_RESOURCE_SHORTAGE (4). New values 0x00000005–0xFDFFFFFF require IETF CONSENSUS.'
