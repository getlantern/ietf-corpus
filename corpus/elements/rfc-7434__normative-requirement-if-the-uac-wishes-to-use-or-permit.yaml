document: rfc-7434
kind: normative-requirement
summary: If the UAC wishes to use or permit sending of UUI data at any point in the dialog, it MUST include a User-to-User header field in the INVITE request for that dialog, even when there is no data other than the protocol discriminator octet to send at that time. The UAC SHOULD set the 'purpose' parameter to 'isdn-uui'.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
