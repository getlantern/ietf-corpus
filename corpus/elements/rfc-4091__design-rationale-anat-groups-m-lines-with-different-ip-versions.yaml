document: rfc-4091
kind: design-rationale
summary: ANAT groups 'm' lines with different IP versions at the 'm' level rather than the 'a=' level (as ICE does) to keep IPv6 syntax free from ICE parameters used for legacy IPv4 NATs, yielding syntax closer to vanilla SDP where IPv6 addresses appear in their own 'm' line.
section: "1.1"
topics:
    - ip
    - v6ops
    - nat
    - realtime
