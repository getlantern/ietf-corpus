document: rfc-9560
kind: protocol-element
summary: Token exchange (RFC 8693) is available when the RP receives an access token whose 'aud' claim does not include the RP's client_id — for example when the client is acting as a proxy. The RP may exchange the token with the OP to obtain a new token with a corrected 'aud' claim.
section: "6.4"
topics:
    - oauth
    - jose
