document: rfc-6062
kind: wire-format
summary: The CONNECTION-ID attribute (0x002a) is a 32-bit unsigned integer that uniquely identifies a peer data connection. It is included in Connect success responses, ConnectionAttempt indications, and echoed in ConnectionBind requests.
