document: rfc-8412
kind: wire-format
summary: 'SWIMA defines nine attribute types layered on PA-TNC (RFC 5792): SWIMA Request, Software Identifier Inventory, Software Identifier Events, Software Inventory, Software Events, Subscription Status Request/Response, Source Metadata Request/Response, and PA-TNC Error extensions. All numeric fields are encoded in network (big-endian) byte order.'
section: "5.2"
