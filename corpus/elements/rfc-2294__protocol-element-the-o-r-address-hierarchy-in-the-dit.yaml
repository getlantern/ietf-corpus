document: rfc-2294
kind: protocol-element
summary: 'The O/R Address hierarchy in the DIT is represented by eleven object classes ordered in Table 1: mHSCountry (mandatory), aDMD (mandatory), pRMD, mHSX121, mHSNumericUserIdentifier, mHSOrganization, mHSOrganizationalUnit, mHSPerson, mHSNamedObject, mHSTerminalID, and mHSDomainDefinedAttribute. A given object class defined higher in the table will always be higher in the DIT than one defined lower.'
