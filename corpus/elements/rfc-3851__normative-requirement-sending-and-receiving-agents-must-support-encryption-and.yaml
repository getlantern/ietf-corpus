document: rfc-3851
kind: normative-requirement
summary: Sending and receiving agents MUST support encryption and decryption with DES EDE3 CBC (tripleDES). AES at 128-, 192-, and 256-bit key sizes SHOULD be supported. Receiving agents SHOULD support RC2/40 for backward compatibility.
section: "2.7"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
