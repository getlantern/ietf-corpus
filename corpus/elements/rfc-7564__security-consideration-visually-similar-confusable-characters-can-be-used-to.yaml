document: rfc-7564
kind: security-consideration
summary: Visually similar (confusable) characters can be used to impersonate identifiers—e.g., Cherokee block characters resembling ASCII 'STPETER'. PRECIS does not prohibit confusables because there is no comprehensive technical solution; application protocols are strongly encouraged to define script-restriction policies and warn users about mixed-script strings.
section: "12.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
