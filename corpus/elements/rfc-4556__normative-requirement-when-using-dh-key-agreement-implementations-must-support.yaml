document: rfc-4556
kind: normative-requirement
summary: When using DH key agreement, implementations MUST support Oakley 1024-bit MODP group 2 (RFC 2412) and 2048-bit MODP group 14 (RFC 3526), and SHOULD support 4096-bit MODP group 16. DH exponents should have at least twice as many bits as the symmetric keys derived from them.
section: 3.2.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
