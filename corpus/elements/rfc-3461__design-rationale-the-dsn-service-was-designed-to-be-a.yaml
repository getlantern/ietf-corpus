document: rfc-3461
kind: design-rationale
summary: The DSN service was designed to be (a) reliable—DSN requests are honored or an error is returned, (b) unambiguous—success and failure are mutually exclusive, (c) stable—failed DSN delivery never triggers additional DSNs, (d) information-preserving through forwarding and gatewaying, and (e) interoperable with non-SMTP environments.
section: "1"
