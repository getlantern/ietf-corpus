document: rfc-6754
kind: protocol-element
summary: The PIM ECMP Redirect Hello Option (Type=32, Length=0) is advertised in PIM Hello messages to signal support for ECMP Redirect. A router sends ECMP Redirects on an interface only when all neighbors on that interface have advertised this option.
section: 5.5.1
topics:
    - multicast
    - routing
