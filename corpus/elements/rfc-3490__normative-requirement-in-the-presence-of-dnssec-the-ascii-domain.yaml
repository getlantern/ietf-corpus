document: rfc-3490
kind: normative-requirement
summary: In the presence of DNSSEC, the ASCII domain name (ACE form) is the name that MUST be signed in the zone and MUST be validated against; DNSSEC authenticates the ASCII form, not the Unicode form.
section: "6.5"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
