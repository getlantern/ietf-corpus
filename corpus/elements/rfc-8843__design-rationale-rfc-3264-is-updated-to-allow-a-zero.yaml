document: rfc-8843
kind: design-rationale
summary: RFC 3264 is updated to allow a zero port value in an offer or answer without necessarily indicating that the media stream is disabled or rejected; an extension mechanism (such as BUNDLE's 'bundle-only' attribute) may assign different semantics to a zero port. This was necessary to permit bundle-only 'm=' sections to coexist with the existing port-zero = rejected convention.
section: "13"
topics:
