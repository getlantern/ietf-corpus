document: rfc-3896
kind: normative-requirement
summary: Only the ifGeneralInformationGroup needs to be supported for the DS3 layer in the ifTable. The ifType value for DS3 is ds3(30), ifSpeed is 44736000 for DS3 and 34368000 for E3, and ifPhysAddress carries the Circuit Identifier value.
section: "2.1"
rfc2119_level: MUST
