document: rfc-7184
kind: normative-requirement
summary: If a network manager attempts to set olsrv2AdminStatus to 'enabled' when no interface on the device has NHDP enabled, the device MUST fail the SNMP set with inconsistentValue. If all NHDP-enabled interfaces are subsequently disabled or removed, olsrv2AdminStatus MUST be set to 'disabled'.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
