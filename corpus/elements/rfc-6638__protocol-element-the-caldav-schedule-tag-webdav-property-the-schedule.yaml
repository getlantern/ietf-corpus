document: rfc-6638
kind: protocol-element
summary: The CALDAV:schedule-tag WebDAV property, the Schedule-Tag HTTP response header, and the If-Schedule-Tag-Match HTTP request header form a conflict-avoidance mechanism. The schedule-tag value is intentionally NOT changed when a resource is updated solely as a result of processing an Attendee reply (an 'inconsequential' change), letting clients detect and merge such changes safely.
section: 3.2.10
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
