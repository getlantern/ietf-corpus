document: rfc-2037
kind: protocol-element
summary: entLastChangeTime (entityGeneral group) records the value of sysUpTime at the time any conceptual row is created or deleted in the five Entity MIB tables, or when any of 12 listed object instances change value. It serves as a change-detection timestamp for NMS polling.
