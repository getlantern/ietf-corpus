document: rfc-6065
kind: interoperability-note
summary: Although motivated by RADIUS and the SSH Transport Model, the mechanism MAY be used with any AAA service and transport model that provides session establishment/termination indications, an authenticated securityName, and a group-name equivalent to the RADIUS Management-Policy-Id Attribute.
section: "4.2"
topics:
