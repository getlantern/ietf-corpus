document: rfc-9249
kind: design-rationale
summary: Hexadecimal key strings are preferred over ASCII keystrings because hexadecimal affords greater key entropy with the same number of internal key-string octets and discourages use of well-known words or numbers. ASCII keystrings are gated behind the 'deprecated' feature.
