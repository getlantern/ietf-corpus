document: rfc-8198
kind: design-rationale
summary: Aggressive negative caching was first proposed in RFC 5074 (DNSSEC Lookaside Validation) to efficiently find covering NSEC records. This document generalizes the technique to all DNSSEC-validating resolvers to reduce latency, resource utilization, and privacy leakage.
section: "1"
topics:
    - dns
    - privacy
