document: rfc-4822
kind: normative-requirement
summary: When the last RIPv2 Security Association of an interface expires, the router MUST send a notification to the network manager and SHOULD treat that last Security Association as having an infinite lifetime until replaced or deleted.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - security
