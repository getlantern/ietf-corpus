document: rfc-5010
kind: security-consideration
summary: The Flags Suboption depends on a trusted relationship between the DHCP relay agent and the server (per RFC 3046 Section 5). A perimeter defense blocking relay-agent options from untrusted sources can prevent fraudulent options, but the RFC 4030 authentication suboption SHOULD also be deployed for deeper defense.
section: "6"
topics:
    - security
