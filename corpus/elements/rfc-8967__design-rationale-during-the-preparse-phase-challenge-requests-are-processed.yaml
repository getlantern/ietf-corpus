document: rfc-8967
kind: design-rationale
summary: During the preparse phase, Challenge Requests are processed and challenges are scheduled before the (Index, PC) pair is verified. This simplifies implementation but relies on rate limiting to avoid amplified challenge flooding in response to replayed packets.
