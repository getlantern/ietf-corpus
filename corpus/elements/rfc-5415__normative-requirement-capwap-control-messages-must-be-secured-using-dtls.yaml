document: rfc-5415
kind: normative-requirement
summary: CAPWAP Control messages MUST be secured using DTLS. The WTP initiates DTLS session establishment toward the selected AC; the AC listens passively via DTLSListen. DTLS protection of data messages is optional.
section: "2"
rfc2119_level: MUST
topics:
