document: rfc-8829
kind: protocol-element
summary: RtpTransceivers have a 1:1 mapping with m= sections and contain an RtpSender and RtpReceiver. A transceiver is associated with an m= section when its MID property is non-null. Transceivers can be created explicitly by the application or implicitly when setRemoteDescription adds new m= sections.
section: 3.4.1
topics:
