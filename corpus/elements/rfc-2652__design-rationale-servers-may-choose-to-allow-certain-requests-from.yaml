document: rfc-2652
kind: design-rationale
summary: Servers may choose to allow certain requests from anonymous peers, especially when the request cannot cause permanent damage. Answering anonymous poll requests encourages index builders to discover the server's resources. The explicit security policy for incoming requests is outside the scope of the specification.
section: "4.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
