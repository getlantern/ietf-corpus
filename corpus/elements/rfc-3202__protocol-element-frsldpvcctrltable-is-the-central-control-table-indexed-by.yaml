document: rfc-3202
kind: protocol-element
summary: frsldPvcCtrlTable is the central control table indexed by {ifIndex, frsldPvcCtrlDlci, frsldPvcCtrlTransmitRP, frsldPvcCtrlReceiveRP}. It holds per-PVC configuration including the measurement domain (transmit and receive reference points), delay probe parameters (packet frequency, frame size, delay type, timeout), and purge controls.
