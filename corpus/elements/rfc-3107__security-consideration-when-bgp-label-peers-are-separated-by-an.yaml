document: rfc-3107
kind: security-consideration
summary: When BGP label peers are separated by an MPLS network rather than a direct point-to-point link, an LSR processing a labeled packet cannot determine which LSR imposed the top label and thus cannot verify whether that LSR is entitled to use it, making direct label-spoofing prevention infeasible.
section: "7"
topics:
    - bgp
    - mpls
    - security
