document: rfc-3994
kind: design-rationale
summary: Presence events and extensions (e.g., PIDF) were considered but rejected because they require explicit periodic subscriptions (more overhead) and are harder to target for page-mode delivery. An in-band message-based mechanism is also easier to translate across heterogeneous IM systems.
section: "1"
topics:
