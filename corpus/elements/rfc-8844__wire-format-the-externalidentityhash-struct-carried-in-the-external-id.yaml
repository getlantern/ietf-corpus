document: rfc-8844
kind: wire-format
summary: The 'ExternalIdentityHash' struct carried in the 'external_id_hash' TLS extension contains a single field 'binding_hash' of type opaque with length 0..32. A length of 0 indicates support without an identity binding; a length of 32 carries a SHA-256 hash of the identity assertion.
section: "3.2"
