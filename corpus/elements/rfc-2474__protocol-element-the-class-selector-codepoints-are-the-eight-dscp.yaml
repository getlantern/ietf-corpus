document: rfc-2474
kind: protocol-element
summary: The Class Selector Codepoints are the eight DSCP values of the form 'xxx000' (where x is 0 or 1). PHBs mapped to by these codepoints must satisfy Class Selector PHB Requirements in addition to the Default PHB requirement for codepoint '000000'.
