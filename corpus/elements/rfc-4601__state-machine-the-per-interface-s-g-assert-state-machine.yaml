document: rfc-4601
kind: state-machine
summary: 'The per-interface (S,G) Assert state machine has three states: NoInfo, ''I won Assert'' (W), and ''I lost Assert'' (L). The winner is chosen by preferring the router with (S,G) forwarding state, then lowest metric preference, then lowest metric, then highest IP address. The Assert Timer (AT) governs state expiry.'
section: 4.6.1
topics:
    - multicast
    - routing
