document: rfc-2164
kind: protocol-element
summary: The omittedORAddressComponent object class (subclass of top) must contain the oRAddressComponentType attribute (subtype of objectIdentifier), identifying via OID an X.400 OR address component that is absent in the mapping. This mechanism is restricted to the X.400-to-RFC-822 subtree and the at-associated-or-address attribute.
section: "2"
topics:
