document: rfc-6282
kind: protocol-element
summary: Stateful address compression (SAC=1 or DAC=1) derives addresses from a shared context identified by a 4-bit Context Identifier (0–15). Context 0 is the default when CID=0. The context used for source and destination addresses may differ.
