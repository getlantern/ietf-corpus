document: rfc-8537
kind: normative-requirement
summary: For node protection bypass tunnels, after restoring co-routing, the upstream PLR node SHOULD start sending RSVP Path messages and traffic for the reverse LSP over the original link when it receives unmodified RSVP Path messages for the protected forward LSP over it.
section: 4.1.3
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
