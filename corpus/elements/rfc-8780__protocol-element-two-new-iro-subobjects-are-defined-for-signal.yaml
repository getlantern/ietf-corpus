document: rfc-8780
kind: protocol-element
summary: Two new IRO subobjects are defined for signal processing inclusion (Types 8 and 9), mirroring the XRO subobjects except the X bit is replaced by the L bit per RFC 3209. These allow PCC/PCE to mandate specific signal processing types along the computed path.
