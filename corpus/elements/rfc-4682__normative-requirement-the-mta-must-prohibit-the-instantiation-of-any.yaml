document: rfc-4682
kind: normative-requirement
summary: The MTA MUST prohibit the instantiation of any two rows with identical Kerberos realm names in pktcMtaDevRealmTable, and MUST perform all Kerberos realm name search operations using the uppercase ASCII representation. The uppercase Kerberos realm name MUST be used by both Manager and MTA.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
    - diameter
    - security
