document: rfc-6310
kind: design-rationale
summary: 'Two OAM modes are defined: ''single emulated OAM loop'' mode, where a single end-to-end NS OAM loop is emulated by transparently passing NS OAM messages over the PW, and ''coupled OAM loops'' mode, where three OAM loops are joined at the AC/PW PE boundaries and NS OAM is never carried over the PW. The choice reflects whether a homogeneous end-to-end NS OAM loop or independent per-segment OAM is more appropriate for the service type.'
