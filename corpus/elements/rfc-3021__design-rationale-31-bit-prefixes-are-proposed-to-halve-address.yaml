document: rfc-3021
kind: design-rationale
summary: 31-bit prefixes are proposed to halve address consumption on point-to-point links from four addresses (two host, one network, one broadcast) to two. A network with 500 point-to-point links saves 1000 addresses — equivalent to four class C spaces.
