document: rfc-4755
kind: normative-requirement
summary: The node MUST keep a record of IB connections it is participating in. A node MAY attempt another connection to a remote peer using the same Service-ID as an existing connection; the receiver MAY drop such a request.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
