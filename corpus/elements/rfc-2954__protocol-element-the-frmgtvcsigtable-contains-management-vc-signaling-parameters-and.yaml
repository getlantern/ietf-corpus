document: rfc-2954
kind: protocol-element
summary: The frMgtVCSigTable contains Management VC Signaling Parameters and Errors, indexed by ifIndex. It covers user-side and network-side timer/counter parameters (N391, N392, N393, T391, T392, nN4, nT3), link reliability error counters, protocol error counters, and channel-inactive event counters for each UNI/NNI logical port.
