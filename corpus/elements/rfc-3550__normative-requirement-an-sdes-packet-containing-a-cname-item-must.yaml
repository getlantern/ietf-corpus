document: rfc-3550
kind: normative-requirement
summary: An SDES packet containing a CNAME item MUST be included in every compound RTCP packet, except when the compound packet is split for partial encryption. This is required so new receivers quickly learn the canonical name of each source.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
