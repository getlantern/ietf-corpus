document: rfc-9866
kind: normative-requirement
summary: A Sentinel having LORS UP MUST set its LORS to SUSPECTED DOWN or LOCALLY DOWN upon concluding there may be problems with the DODAG root link. Additionally, any node MUST switch directly to LOCALLY DOWN if the DODAG root is removed from RPL's DODAG parent set or becomes unreachable via its link-local address.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
