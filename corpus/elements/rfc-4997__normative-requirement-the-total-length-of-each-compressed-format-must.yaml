document: rfc-4997
kind: normative-requirement
summary: The total length of each compressed format must always be defined, and the CLENGTH of every field in a compressed format must be defined such that there is an unambiguous mapping from the compressed bit string to the listed fields.
section: 4.12.1.2
rfc2119_level: MUST
