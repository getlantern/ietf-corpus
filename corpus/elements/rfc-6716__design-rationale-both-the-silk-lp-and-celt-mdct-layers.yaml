document: rfc-6716
kind: design-rationale
summary: Both the SILK (LP) and CELT (MDCT) layers share the same entropy coder, eliminating wasted padding bits between them. In Hybrid mode this allows the MDCT layer to consume all bits left unused by the LP layer, making CBR operation straightforward.
