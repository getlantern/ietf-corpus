document: rfc-8530
kind: design-rationale
summary: Interface assignment is performed at the host level via bind-lne-name augmenting ietf-interfaces; to assign an interface to both an LNE and a Network Instance (NI), it is first assigned to the LNE, and then within that LNE's interface model it is assigned to an NI using RFC 8529 mechanisms.
section: "2"
topics:
    - yang
    - netconf
    - routing
