document: rfc-1390
kind: normative-requirement
summary: Host implementations must not send datagrams longer than 576 octets unless they have explicit knowledge that the destination is prepared to accept them. Hosts should be prepared to accept packets as large as the MTU. The TCP MSS option may be used to communicate size preferences.
section: MAC Layer Details
rfc2119_level: MUST NOT
topics:
    - ip
    - tcp
