document: rfc-6527
kind: security-consideration
summary: The read-create objects vrrpv3OperationsPriority, vrrpv3OperationsPrimaryIpAddr, vrrpv3OperationsAdvInterval, vrrpv3OperationsPreemptMode, vrrpv3OperationsAcceptMode, vrrpv3OperationsRowStatus, and vrrpv3AssociatedIpAddrRowStatus can adversely affect virtual router operation if manipulated by unauthorized parties, e.g., causing incorrect master elections, IP address misassignment, advertisement flooding, or disabling virtual routers entirely.
