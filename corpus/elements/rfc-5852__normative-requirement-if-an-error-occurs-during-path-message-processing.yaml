document: rfc-5852
kind: normative-requirement
summary: If an error occurs during Path message processing, the detecting node MUST respond with a PathErr message and MUST abort the Handover procedure. Associated DP resources MUST NOT be impacted.
section: 4.2.1.1
rfc2119_level: MUST
topics:
