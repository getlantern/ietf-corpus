document: rfc-4220
kind: interoperability-note
summary: For unnumbered TE links, teLinkAddressType is set to unknown(0), teLinkLocalIpAddr and teLinkRemoteIpAddr are zero-length strings, and the teLinkOutgoingIfId/teLinkIncomingIfId objects carry the unnumbered interface identifiers. For numbered links, InetAddress size is 4 (IPv4) or 16 (IPv6) octets.
