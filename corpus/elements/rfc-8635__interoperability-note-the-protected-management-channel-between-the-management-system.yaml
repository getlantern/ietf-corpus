document: rfc-8635
kind: interoperability-note
summary: The protected management channel between the management system and router is assumed to be SSH-protected CLI, though NETCONF may also be used. Encryption, integrity, and key-exchange algorithms used SHOULD be of equal or greater strength (128-bit) than the BGPsec keys they protect; minimum recommended algorithms include AES-128, hmac-sha2-256, ecdsa-sha2-nistp256, and ecdh-sha2-nistp256.
section: 3, Appendix A
topics:
    - bgp
    - security
    - pkix
