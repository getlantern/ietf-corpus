document: rfc-8011
kind: normative-requirement
summary: Printers SHOULD support IPP Job Template attributes and values that correspond to features the physical device is capable of performing. If a Printer is not physically capable of a feature (e.g., stapling), the corresponding value (e.g., 'staple') MUST NOT appear in the 'xxx-supported' attribute.
section: 2.3.11
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
