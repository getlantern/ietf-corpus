document: rfc-9396
kind: protocol-element
summary: For JWT-based access tokens, the AS is RECOMMENDED to add the `authorization_details` object as a top-level JWT claim, filtered to the specific audience (RS). This enables the RS to enforce the authorized details without introspection.
section: "9.1"
