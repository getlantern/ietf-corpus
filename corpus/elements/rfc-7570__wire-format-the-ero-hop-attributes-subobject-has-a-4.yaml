document: rfc-7570
kind: wire-format
summary: The ERO Hop Attributes subobject has a 4-byte header with L (1 bit), Type (7 bits, value 35), Length (8 bits), Reserved (15 bits, must be zero), and R (1 bit), followed by variable-length Hop Attributes TLVs. The maximum TLV payload size is 250 bytes due to ERO subobject size limits.
