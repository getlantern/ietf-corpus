document: rfc-3339
kind: interoperability-note
summary: An offset of '-00:00' indicates that UTC is known but the local offset is unknown, which is semantically distinct from 'Z' or '+00:00', which imply UTC is the preferred reference point for the specified time.
section: "4.3"
