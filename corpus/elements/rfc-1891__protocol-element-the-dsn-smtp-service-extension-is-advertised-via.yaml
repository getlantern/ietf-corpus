document: rfc-1891
kind: protocol-element
summary: The DSN SMTP service extension is advertised via the EHLO keyword 'DSN' with no allowed parameters. An SMTP client wishing to request delivery status notifications must check for this keyword in the EHLO response before using extension parameters.
