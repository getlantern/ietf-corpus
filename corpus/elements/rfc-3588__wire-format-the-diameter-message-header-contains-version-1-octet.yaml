document: rfc-3588
kind: wire-format
summary: 'The Diameter message header contains: Version (1 octet, MUST be 1), Message Length (3 octets, total message size), Command Flags (1 octet: R/P/E/T bits plus 4 reserved), Command-Code (3 octets), Application-ID (4 octets), Hop-by-Hop Identifier (4 octets, unsigned), and End-to-End Identifier (4 octets, unsigned). All fields transmitted in network byte order.'
section: "3"
