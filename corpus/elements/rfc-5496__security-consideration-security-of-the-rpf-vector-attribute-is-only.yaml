document: rfc-5496
kind: security-consideration
summary: Security of the RPF Vector Attribute is only guaranteed by the security of the PIM packet itself; therefore, the security considerations for PIM Join packets as described in PIM-SM (RFC 4601) apply. No additional security mechanisms are defined.
section: "6"
topics:
