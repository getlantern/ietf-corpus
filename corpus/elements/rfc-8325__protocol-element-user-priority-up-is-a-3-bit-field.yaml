document: rfc-8325
kind: protocol-element
summary: 'User Priority (UP) is a 3-bit field in the IEEE 802.11 QoS Control frame header supporting eight values (0–7). Pairs of UP values map non-configurably to four Access Categories: AC_VO (UP 6,7), AC_VI (UP 4,5), AC_BE (UP 0,3), AC_BK (UP 1,2).'
section: 6.2.1
