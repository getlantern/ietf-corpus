document: rfc-5393
kind: design-rationale
summary: The loop-detection requirements make the favorable trade of exponential message growth for work that is at worst O(m*n) as a message crosses n proxies where m is the number of forking proxies. This is order N(N+1)/2 inspections in the worst case across all proxies.
