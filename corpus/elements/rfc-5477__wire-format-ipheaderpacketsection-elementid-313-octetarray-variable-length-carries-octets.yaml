document: rfc-5477
kind: wire-format
summary: ipHeaderPacketSection (ElementId 313, octetArray, variable length) carries octets from the start of the IP header of a sampled packet. The data MUST NOT be padded. With sufficient length it may include payload bytes, subject to RFC 2804 wiretapping policy.
section: 8.5.1
rfc2119_level: MUST NOT
topics:
