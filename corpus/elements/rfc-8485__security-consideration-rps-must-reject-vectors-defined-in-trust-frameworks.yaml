document: rfc-8485
kind: security-consideration
summary: RPs must reject vectors defined in trust frameworks they do not understand. Different trust frameworks can apply different interpretations to the same component value, so processing a vector in the wrong context could lead to mistakenly accepting or rejecting a request.
section: "8"
