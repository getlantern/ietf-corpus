document: rfc-2894
kind: design-rationale
summary: The SegmentNumber field allows a renumbering operation too large for a single packet to be split across multiple RR Command messages with the same SequenceNumber. Unlike the SequenceNumber, SegmentNumber imposes no ordering on processing — if ordering is needed, use SequenceNumbers or PCO order within a single message.
section: "1"
