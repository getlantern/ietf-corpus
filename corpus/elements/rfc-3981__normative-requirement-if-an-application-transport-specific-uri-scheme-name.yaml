document: rfc-3981
kind: normative-requirement
summary: If an application transport specific URI scheme name is present it SHOULD be used if possible. Otherwise, the default application transport specified by IRIS-BEEP MUST be used. Clients MAY use a preferred transport if the resolution process allows it.
section: "7.2"
rfc2119_level: MUST
