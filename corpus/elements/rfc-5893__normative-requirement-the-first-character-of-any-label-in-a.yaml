document: rfc-5893
kind: normative-requirement
summary: The first character of any label in a Bidi domain name MUST have Bidi property L, R, or AL. If R or AL, the label is RTL; if L, the label is LTR.
section: "2"
rfc2119_level: MUST
topics:
