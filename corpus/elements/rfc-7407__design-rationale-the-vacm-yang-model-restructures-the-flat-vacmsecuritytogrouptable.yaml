kind: design-rationale
summary: The VACM YANG model restructures the flat vacmSecurityToGroupTable and vacmAccessTable into a hierarchical group → member/access nesting, and collapses vacmViewTreeFamilyTable into per-view include/exclude leaf-lists. This is described as a more compact and readable representation than the equivalent MIB flat tables.
