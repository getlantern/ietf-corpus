document: rfc-2578
kind: protocol-element
summary: 'The INDEX clause encodes instance sub-identifiers as follows: integers map to one sub-id; fixed or IMPLIED variable strings encode n octets as n sub-ids; non-IMPLIED variable strings prepend a length sub-id; IpAddress uses 4 sub-ids; OBJECT IDENTIFIERs similarly use n or n+1 sub-ids.'
