document: rfc-3891
kind: normative-requirement
summary: If no match is found for the Replaces header, the UAS rejects the INVITE with a 481 Call/Transaction Does Not Exist response. Likewise, if the Replaces header field matches a dialog not created with an INVITE, the UAS MUST reject the request with a 481 response.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
