document: rfc-4356
kind: protocol-element
summary: 'Table 1 defines the complete mapping between MMS information elements (X-Mms-* headers), SMTP envelope elements, and RFC 2822 header fields. Key mappings include: Message-ID ↔ Message-ID, recipients ↔ RCPT TO / To:/Cc:, sender ↔ MAIL FROM / From:, expiry ↔ DELIVER-BY, delivery report request ↔ DSN, priority ↔ Importance:, and read reply ↔ Disposition-Notification-To:.'
section: 2.1.3.1
