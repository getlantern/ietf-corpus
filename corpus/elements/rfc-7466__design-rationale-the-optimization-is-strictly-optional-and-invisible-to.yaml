document: rfc-7466
kind: design-rationale
summary: The optimization is strictly optional and invisible to other protocols (e.g., OLSRv2) if the implementation conceals 2-Hop Tuples with N2_lost=true from higher-layer protocols. However, because some OLSRv2 implementations are not modularly separated from NHDP, the direct impact on RFC 7181 is also specified.
