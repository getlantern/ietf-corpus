document: rfc-1209
kind: wire-format
summary: The LLC/SNAP header is 8 octets total. DSAP and SSAP are each set to 0xAA (decimal 170, the global SAP for SNAP). The Ctrl field is 0x03 (Type 1 Unnumbered Information). The 24-bit Org Code is 0x000000. The 16-bit EtherType is 0x0800 for IP or 0x0806 for ARP.
section: Packet Format
