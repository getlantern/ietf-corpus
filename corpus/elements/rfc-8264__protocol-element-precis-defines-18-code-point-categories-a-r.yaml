document: rfc-8264
kind: protocol-element
summary: 'PRECIS defines 18 code point categories (A–R). Categories A–J are inherited from IDNA2008 (RFC 5892): LetterDigits, Unstable, IgnorableProperties, IgnorableBlocks, LDH, Exceptions, BackwardCompatible, JoinControl, OldHangulJamo, Unassigned. Categories K–R are PRECIS-specific: ASCII7, Controls, PrecisIgnorableProperties, Spaces, Symbols, Punctuation, HasCompat, OtherLetterDigits.'
