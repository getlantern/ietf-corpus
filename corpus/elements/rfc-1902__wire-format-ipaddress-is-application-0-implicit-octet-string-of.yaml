kind: wire-format
summary: IpAddress is [APPLICATION 0] IMPLICIT OCTET STRING of exactly 4 octets in network byte order, representing a 32-bit IPv4 address. It is a tagged type for historical reasons; new address representations should use textual conventions rather than this type.
