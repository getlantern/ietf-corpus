document: rfc-2814
kind: normative-requirement
summary: When a DSBM client or SBM forwards a PATH message onto a managed segment, it MUST address it to the DSBMLogicalAddress (224.0.0.16). The DSBM MUST forward PATH messages on managed segments using the AllSBMAddress (224.0.0.17).
section: 4.2.2.1
rfc2119_level: MUST
topics:
    - qos
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
