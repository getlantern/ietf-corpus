document: rfc-7888
kind: normative-requirement
summary: Non-synchronizing literals may only be used with servers that advertise LITERAL+ or LITERAL- capability. If neither is advertised, the client can only use synchronizing literals.
section: "3"
rfc2119_level: MAY
