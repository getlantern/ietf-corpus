document: rfc-4380
kind: normative-requirement
summary: Teredo-capable nodes MUST NOT behave as Teredo clients if they already have IPv6 connectivity through any other means. Nodes with a global IPv4 address SHOULD obtain connectivity through 6to4 rather than Teredo.
section: "5.5"
rfc2119_level: MUST NOT
