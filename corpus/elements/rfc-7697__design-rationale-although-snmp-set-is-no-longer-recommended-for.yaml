document: rfc-7697
kind: design-rationale
summary: Although SNMP SET is no longer recommended for configuring MPLS networks (as noted since RFC 3812), objects in this MIB are specified with MAX-ACCESS of read-write or read-create to maintain consistency with the base RFC 3812 MIB tables. The example in Section 6 illustrates how MIB values would be returned in the specified circumstances having been configured by alternative means.
section: "1"
topics:
    - mpls
    - snmp
