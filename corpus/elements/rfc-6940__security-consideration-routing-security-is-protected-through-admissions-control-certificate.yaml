document: rfc-6940
kind: security-consideration
summary: Routing security is protected through admissions control (certificate-based enrollment limits who can join), peer identification and authentication (TLS/DTLS with mutual auth on every connection), and protection against routing loops and DoS amplification. Residual attacks from compromised insiders that hold valid certificates cannot be fully prevented.
section: "13.6"
topics:
    - security
    - tls
