document: rfc-3398
kind: interoperability-note
summary: When the 'interworking encountered' bit is set in the FCI of the IAM, ISUP networks may suppress certain features including ISDN cause codes in failure conditions (instead sending ACMs followed by audible in-band announcements). Setting this indicator can significantly limit the efficiency and transparency of SIP-ISUP translation.
section: 7.2.1.1
topics:
    - voip
    - realtime
