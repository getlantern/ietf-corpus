document: rfc-5995
kind: normative-requirement
summary: A PROPFIND/allprop request SHOULD NOT return the DAV:add-member property. Servers MUST implement DAV:supported-live-property-set (RFC 3253 Section 3.1.4) and report DAV:add-member as a supported live property.
section: 3.2.1
rfc2119_level: MUST
topics:
    - http
