document: rfc-4710
kind: design-rationale
summary: RDSs use a PUSH (asynchronous) mechanism rather than a poll/response model because RDS firmware runs on low-powered embedded devices not in the data-forwarding path; the application determines PDU content appropriate for its context and sends reports to RRCs without solicitation.
