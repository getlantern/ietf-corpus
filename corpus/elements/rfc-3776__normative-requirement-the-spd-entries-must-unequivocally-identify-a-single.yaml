document: rfc-3776
kind: normative-requirement
summary: The SPD entries MUST unequivocally identify a single security association (manual keying) or single IKE phase 1 credentials (dynamic keying) for protecting Binding Updates between any given home address and home agent, to prevent a mobile node from impersonating another mobile node sharing the same home agent.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
