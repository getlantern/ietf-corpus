document: rfc-2949
kind: normative-requirement
summary: If encryption is not enabled when a OFB64_IV command is received, the encryption machine must be re-initialized after the next START command using the keyid from that START and the IV from the OFB64_IV command.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
