document: rfc-9594
kind: protocol-element
summary: Error responses from the KDC that convey error-specific information MUST use Content-Format 'application/concise-problem-details+cbor' and MUST include the Custom Problem Detail entry 'ace-groupcomm-error', which is a CBOR map with a single 'error-id' field (key 0, value int) drawn from the ACE Groupcomm Errors registry.
section: 4.1.2
topics:
    - security
    - cbor
extracted_by: claude-sonnet-4-6
