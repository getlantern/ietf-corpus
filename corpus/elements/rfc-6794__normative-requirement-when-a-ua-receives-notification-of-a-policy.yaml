document: rfc-6794
kind: normative-requirement
summary: When a UA receives notification of a policy change, it MUST apply the updated policies to the current session or MUST terminate the session. If the policy update modifies the session description, the UA must renegotiate with its peer (e.g., via re-INVITE or UPDATE).
section: 4.5.3
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
