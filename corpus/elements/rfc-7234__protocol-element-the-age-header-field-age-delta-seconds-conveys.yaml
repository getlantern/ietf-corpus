document: rfc-7234
kind: protocol-element
summary: The Age header field (Age = delta-seconds) conveys the sender's estimate of seconds since the response was generated or validated at the origin server. Its presence implies the response was not freshly generated by the origin for this request. An HTTP/1.0 cache not implementing Age may omit it.
section: "5.1"
topics:
    - http
