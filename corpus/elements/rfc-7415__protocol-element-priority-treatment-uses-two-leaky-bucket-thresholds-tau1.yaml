document: rfc-7415
kind: protocol-element
summary: 'Priority treatment uses two leaky bucket thresholds TAU1 and TAU2 (TAU1 < TAU2): all requests admitted when counter <= TAU1; only higher-priority requests admitted when TAU1 < counter <= TAU2; all requests rejected when counter >= TAU2. Recommended values are TAU0=0, TAU1=TAU2/2, TAU2=10*T.'
section: 3.5.2
topics:
