kind: protocol-element
summary: 'The ''acl-ip-header-fields'' grouping defines common IPv4/IPv6 match fields: dscp (inet:dscp), ecn (uint8, range 0..3), length (uint16), ttl (uint8), and protocol (uint8). These fields are reused in both ipv4 and ipv6 match containers.'
