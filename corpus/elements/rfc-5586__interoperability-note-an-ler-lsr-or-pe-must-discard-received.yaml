document: rfc-5586
kind: interoperability-note
summary: An LER, LSR, or PE MUST discard received associated channel packets on which all MPLS/PW labels have been popped if it cannot process the indicated Channel Type, has not agreed to process it, the packet is on a locally-disabled Experimental Channel Type, the first nibble is not 0001b (when GAL-indicated), or the ACH version is unrecognized.
section: "5"
topics:
