document: rfc-1001
kind: wire-format
summary: First-level encoding maps each 4-bit half-octet of the 16-byte NetBIOS name into one byte by adding ASCII 'A' (0x41), producing a 32-byte uppercase string from the set {A–P}. The NetBIOS scope identifier is appended after a dot, forming a valid DNS domain name.
section: "14.1"
topics:
    - dns
