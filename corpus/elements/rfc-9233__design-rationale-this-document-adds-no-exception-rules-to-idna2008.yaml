document: rfc-9233
kind: design-rationale
summary: This document adds no exception rules to IDNA2008 for any Unicode changes between 6.0.0 and 12.0.0. The IETF concluded that the derived property value changes identified do not require exceptions as defined in RFC 5892, Section 2.6, given deployment considerations.
