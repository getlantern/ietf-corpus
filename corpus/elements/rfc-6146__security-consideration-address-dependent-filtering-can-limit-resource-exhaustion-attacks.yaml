document: rfc-6146
kind: security-consideration
summary: Address-Dependent Filtering can limit resource exhaustion attacks by ensuring the NAT64 only forwards IPv4 packets from an address to which the IPv6 host has previously sent packets. Administrators can also apply general IPv6 ingress filtering to control which IPv6 hosts can create NAT64 state.
section: "5.2"
topics:
    - nat
    - security
    - v6ops
