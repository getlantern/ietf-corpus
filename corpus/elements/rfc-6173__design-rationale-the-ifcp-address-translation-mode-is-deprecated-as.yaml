document: rfc-6173
kind: design-rationale
summary: The iFCP address translation mode is deprecated as of RFC 6172. This MIB revision obsoletes RFC 4369 specifically to reflect that deprecation, with the new compliance statement (ifcpGatewayComplianceNoTranslation) requiring only addressTransparent(1) mode.
