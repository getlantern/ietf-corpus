document: rfc-7755
kind: protocol-element
summary: An Explicit Address Mapping (EAM) is a bidirectional coupling between an IPv4 Service Address and an IPv6 Service Address configured on a BR or ER. When translating, the BR/ER rewrites address fields according to a matching EAM; the algorithm is specified in RFC 7757.
section: "2"
topics:
    - ip
    - v6ops
    - nat
