document: rfc-6990
kind: protocol-element
summary: TS_sync_loss_count is a 32-bit count of TS_sync_loss errors in the reported sequence number interval. A TS_sync_loss error occurs when there are two or more consecutive incorrect sync bytes within the MPEG-2 TS (ETSI Section 5.2.1).
