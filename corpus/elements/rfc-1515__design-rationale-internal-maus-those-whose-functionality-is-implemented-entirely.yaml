document: rfc-1515
kind: design-rationale
summary: Internal MAUs (those whose functionality is implemented entirely within a device) may or may not be managed. If they are managed, their objects should appear in the appropriate MIB group (dot3RpMauBasicGroup or dot3IfMauBasicGroup), rather than in a separate group, maintaining a uniform management model.
section: "3.4"
