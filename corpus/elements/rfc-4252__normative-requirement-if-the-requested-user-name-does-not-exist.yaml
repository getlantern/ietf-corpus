document: rfc-4252
kind: normative-requirement
summary: If the requested 'user name' does not exist, the authentication request MUST NOT be accepted. The server MAY send a bogus list of acceptable authentication method names to avoid disclosing information on which accounts exist.
section: "5"
rfc2119_level: MUST NOT
topics:
