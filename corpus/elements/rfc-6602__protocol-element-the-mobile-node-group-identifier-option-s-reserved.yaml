document: rfc-6602
kind: protocol-element
summary: The Mobile Node Group Identifier option's Reserved field (8 bits) MUST be initialized to 0 by the sender and MUST be ignored by the receiver. The group identifier value of 0 is reserved and SHOULD NOT be used; value 1 (ALL-SESSIONS) represents all sessions between a given MAG and LMA.
section: "4.3"
topics:
    - mobility
