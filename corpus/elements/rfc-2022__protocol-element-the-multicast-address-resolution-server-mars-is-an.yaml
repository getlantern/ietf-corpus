document: rfc-2022
kind: protocol-element
summary: The Multicast Address Resolution Server (MARS) is an extended analog of the RFC 1577 ARP Server that maintains {layer 3 multicast group address, ATM.1, ATM.2, ..., ATM.n} mappings and distributes group membership updates to cluster members over a point-to-multipoint ClusterControlVC. It supports both VC mesh and Multicast Server (MCS) forwarding models on a per-group basis.
section: "1.1"
topics:
