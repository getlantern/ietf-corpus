document: rfc-5886
kind: design-rationale
summary: General and specific monitoring request types are distinguished because general requests collect PCE-wide aggregate metrics (e.g., average CPU load), while specific requests are tied to a particular TE LSP path computation, requiring distinct object semantics (e.g., Current-processing-time only meaningful for specific requests).
