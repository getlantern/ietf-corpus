document: rfc-1368
kind: protocol-element
summary: rptrNonDisruptTest is a read-write object; setting it to selfTest(2) triggers a non-disruptive agent-specific self-test that does not change repeater state, inject packets, prevent packet relay, or interfere with management. After the test, health information is updated and an rptrHealth trap is sent.
section: "4.2"
topics:
    - snmp
