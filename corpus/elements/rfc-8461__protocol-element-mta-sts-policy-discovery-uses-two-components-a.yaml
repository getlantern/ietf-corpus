document: rfc-8461
kind: protocol-element
summary: 'MTA-STS policy discovery uses two components: a DNS TXT record at ''_mta-sts.<domain>'' (e.g., ''_mta-sts.example.com'') containing version and policy ID fields, and an HTTPS-hosted policy file at ''https://mta-sts.<domain>/.well-known/mta-sts.txt''. The TXT record allows senders to detect policy presence and check for updates without fetching the full policy.'
section: "3"
