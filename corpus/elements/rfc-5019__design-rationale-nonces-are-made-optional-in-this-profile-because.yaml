document: rfc-5019
kind: design-rationale
summary: Nonces are made optional in this profile because pre-produced responses cannot incorporate per-request nonces, which is essential for high-volume scalability. Time-based freshness validation is used instead, requiring both clients and responders to have accurate time sources.
