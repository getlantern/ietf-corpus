document: rfc-2646
kind: normative-requirement
summary: 'A generating agent SHOULD: (1) ensure all lines are 79 characters or fewer; (2) trim spaces before user-inserted hard line breaks; (3) space-stuff lines starting with a space, ''From '', or ''>''.'
