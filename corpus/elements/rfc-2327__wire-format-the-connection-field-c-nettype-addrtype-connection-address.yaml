document: rfc-2327
kind: wire-format
summary: The connection field 'c=<nettype> <addrtype> <connection-address>' specifies the destination address. For IP4 multicast, a TTL value is appended with '/' (e.g., '224.2.1.1/127'). Layered encodings using multiple contiguous multicast groups extend this to '<base-address>/<ttl>/<number-of-addresses>' (e.g., '224.2.1.1/127/3').
section: "6"
topics:
    - realtime
    - multicast
    - ip
