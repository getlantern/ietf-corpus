document: rfc-1531
kind: design-rationale
summary: DHCP reuses the BOOTP message format to capture BOOTP relay agent behavior without modification, eliminating the need for a DHCP server on each physical network segment and enabling interoperability with existing BOOTP clients without changes to their initialization software.
