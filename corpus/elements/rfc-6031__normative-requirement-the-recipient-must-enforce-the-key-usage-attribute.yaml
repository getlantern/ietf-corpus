kind: normative-requirement
summary: The recipient MUST enforce the Key Usage attribute constraints; permitted values include OTP, CR, Encrypt, Integrity, Verify, Unlock, Decrypt, KeyWrap, Unwrap, Derive, and Generate, each restricting key use to a single purpose.
