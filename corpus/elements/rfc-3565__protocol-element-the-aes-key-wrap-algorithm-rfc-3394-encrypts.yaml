document: rfc-3565
kind: protocol-element
summary: The AES key wrap algorithm (RFC 3394) encrypts one AES key in another AES key, producing output 64 bits longer than the input CEK as a checksum, using 6*n AES encryption/decryption operations where n is the number of 64-bit blocks in the CEK.
section: 2.3.2
topics:
