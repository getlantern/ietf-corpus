summary: 'For IEEE 1901.1 with 12-bit short addresses, the header compression SAM/DAM mode ''10'' is modified: 16 bits are carried inline representing 0000:00ff:fe00:0XXX, where the first 4 bits of the 16-bit inline value are zero and 0XXX encodes the 12-bit short address.'
