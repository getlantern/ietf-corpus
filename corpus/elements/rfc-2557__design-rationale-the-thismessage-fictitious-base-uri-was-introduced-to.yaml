document: rfc-2557
kind: design-rationale
summary: The 'thismessage:/' fictitious base URI was introduced to provide a uniform mechanism for comparing relative URIs that cannot be resolved to a real absolute URI; all such URIs resolve to the same artificial base, making octet-by-octet comparison possible without live retrieval.
