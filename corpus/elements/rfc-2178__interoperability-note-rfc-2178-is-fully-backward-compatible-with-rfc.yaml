document: rfc-2178
kind: interoperability-note
summary: RFC 2178 is fully backward-compatible with RFC 1583; all differences are backward-compatible in nature and implementations of both documents will interoperate. Key additions include cryptographic authentication, Point-to-MultiPoint interface, overlapping area ranges, and the MinLSArrival constant.
