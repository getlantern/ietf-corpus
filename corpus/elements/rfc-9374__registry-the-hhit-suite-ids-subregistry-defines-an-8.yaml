document: rfc-9374
kind: registry
summary: 'The HHIT Suite IDs subregistry defines an 8-bit value space: RESERVED (0), RSA,DSA/SHA-256 (1), ECDSA/SHA-384 (2), ECDSA_LOW/SHA-1 (3), EdDSA/cSHAKE128 (5), HDA Private Use 1 (254), HDA Private Use 2 (255). Values 1–31 MUST be replicated as HIT Suite IDs.'
