document: rfc-2215
kind: normative-requirement
summary: A correct and valid value of PATH_MTU MUST be provided by all IS-aware network elements. A service module MAY specify a smaller MTU via a service-specific override but MUST NOT specify a value larger than the global PATH_MTU.
section: "3.5"
rfc2119_level: MUST
topics:
    - qos
    - ip
