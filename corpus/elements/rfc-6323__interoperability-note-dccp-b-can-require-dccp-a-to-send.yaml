document: rfc-6323
kind: interoperability-note
summary: DCCP B can require DCCP A to send RTT Estimate options by sending 'Mandatory Change R(Send RTT Estimate, 1)'; DCCP A will reset the connection if it does not understand this feature. This enables end-to-end negotiation of the sender RTT extension.
section: 3.2.2
topics:
    - congestion
