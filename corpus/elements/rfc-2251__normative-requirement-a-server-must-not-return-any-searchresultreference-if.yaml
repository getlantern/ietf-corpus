document: rfc-2251
kind: normative-requirement
summary: A server MUST NOT return any SearchResultReference if it has not located the baseObject; in that case it returns SearchResultDone with resultCode referral. To complete a distributed search, the client MUST issue a new search operation for each SearchResultReference returned.
section: 4.5.3
rfc2119_level: MUST NOT
topics:
    - ldap
