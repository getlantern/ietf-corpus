document: rfc-7178
kind: normative-requirement
summary: Outgoing RBridge Channel messages SHOULD be rate-limited to prevent aggressive connectivity verification or other applications consuming excessive bandwidth or causing denial-of-service. Connectivity-checking applications such as BFD SHOULD be rate-limited to below 5% of the bitrate of the associated link.
section: "6"
rfc2119_level: SHOULD
topics:
    - routing
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
