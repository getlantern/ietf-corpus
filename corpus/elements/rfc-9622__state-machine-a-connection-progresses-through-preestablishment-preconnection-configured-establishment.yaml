document: rfc-9622
kind: state-machine
summary: 'A Connection progresses through: preestablishment (Preconnection configured) → establishment (Initiate/Listen/Rendezvous called, Ready or EstablishmentError fired) → data transfer (Send/Receive events) → termination (Close or Abort, then Closed event). Ordering of operations and events is defined in Section 11.'
section: "11"
