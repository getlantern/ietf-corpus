document: rfc-3860
kind: interoperability-note
summary: End-to-end security properties (confidentiality, integrity) across CPIM gateways are only achievable if all participating IM protocols support the common MSGFMT format; gateways cannot themselves provide end-to-end security for content they relay opaquely.
section: "3.3"
topics:
    - realtime
    - security
