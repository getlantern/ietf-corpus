document: rfc-8221
kind: design-rationale
summary: Algorithm deprecation is expected to be gradual (MUST → MUST- or SHOULD, not directly to MUST NOT) unless there are strong security reasons, to allow implementations time to update while remaining interoperable. New mandatory algorithms are introduced at SHOULD before MUST.
section: "1.2"
topics:
