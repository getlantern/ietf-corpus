document: rfc-4930
kind: normative-requirement
summary: A <login> command MUST be sent to a server before any other EPP command to establish an ongoing session. A <login> command MUST be rejected if received within the bounds of an existing session.
section: 2.9.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
