document: rfc-1905
kind: protocol-element
summary: The request-id field is an Integer32 used to correlate requests with responses and to identify duplicated messages in unreliable datagram transport. Using the same request-id on retransmission allows either the original or retransmitted response to satisfy the request.
section: "4.1"
