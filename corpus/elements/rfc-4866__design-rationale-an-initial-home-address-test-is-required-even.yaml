document: rfc-4866
kind: design-rationale
summary: An initial home address test is required even with CGA-based ownership proofs to prevent subnet-prefix spoofing attacks, where a malicious node generates a CGA using a victim network's prefix and tricks a correspondent node into flooding that prefix. This test need not be repeated on subsequent handoffs.
section: "3.4"
topics:
    - security
    - mobility
