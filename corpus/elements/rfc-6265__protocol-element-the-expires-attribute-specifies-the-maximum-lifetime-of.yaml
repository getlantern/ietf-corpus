document: rfc-6265
kind: protocol-element
summary: The Expires attribute specifies the maximum lifetime of a cookie as an RFC 1123-format date-time. User agents are not required to retain the cookie until that date; they may evict it earlier due to memory pressure or privacy concerns. Servers SHOULD use four-digit years to avoid two-digit year interpretation differences.
section: 4.1.2.1
topics:
    - http
