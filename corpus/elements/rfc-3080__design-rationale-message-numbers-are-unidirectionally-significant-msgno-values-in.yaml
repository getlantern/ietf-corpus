document: rfc-3080
kind: design-rationale
summary: 'Message numbers are unidirectionally-significant: msgno values in MSG messages from the initiating peer are independent of those from the listening peer. This reflects BEEP''s peer-to-peer nature where both sides can concurrently send MSG messages on the same channel number.'
section: "2.7"
