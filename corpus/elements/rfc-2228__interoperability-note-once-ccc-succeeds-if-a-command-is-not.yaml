document: rfc-2228
kind: interoperability-note
summary: Once CCC succeeds, if a command is not protected, its reply MUST also not be protected, to support interoperability with clients that do not support protection after CCC has been issued. Replies should use the same level of protection as the command that produced them.
section: "3"
topics:
    - security
