document: rfc-6311
kind: normative-requirement
summary: For SAs using counter mode ciphers (CTR or GCM), the initial vector MUST NOT be repeated; in load-sharing cases, implementations MUST ensure no IV is ever reused across cluster members.
section: "3.4"
rfc2119_level: MUST NOT
