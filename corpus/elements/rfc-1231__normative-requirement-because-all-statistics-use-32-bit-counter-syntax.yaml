document: rfc-1231
kind: normative-requirement
summary: Because all statistics use 32-bit Counter syntax but hardware may maintain 16-bit counters, the agent MUST read hardware counters frequently enough to prevent loss of significance in order to maintain accurate 32-bit software counters.
section: "5"
rfc2119_level: MUST
