document: rfc-1717
kind: normative-requirement
summary: 'Bundle-joining decision tree: (1) no auth, no discriminator — all new links MUST join one bundle; (2) discriminator match → MUST join matching bundle, mismatch → MUST establish new bundle; (3) auth match → MUST join, mismatch → MUST establish new; (4) discriminator and auth — both match → MUST join, either mismatches → MUST establish new bundle.'
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
