document: rfc-3242
kind: wire-format
summary: The Context Check Packet (CCP) has a one-octet type identifier (0xFB = 11111011) followed by a second octet containing a C-flag (bit 0) and a 7-bit CRC field. C=1 indicates a valid CRC calculated over the original uncompressed header per RFC 3095 section 5.9.2; C=0 means the CRC field is unused. CCP does not update context.
section: 4.1.3
topics:
    - rtp
    - ip
    - udp
