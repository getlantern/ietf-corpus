document: rfc-3173
kind: normative-requirement
summary: If the total size of a compressed payload and the IPComp header is not smaller than the size of the original payload, the IP datagram MUST be sent in the original non-compressed form with no IPComp header added.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
