document: rfc-9854
kind: normative-requirement
summary: When TargNode receives an RREQ-DIO with S=0 (asymmetric route), TargNode MUST build a DODAG in the RREP-Instance rooted at itself and transmit the RREP-DIO to the all-AODV-RPL-nodes multicast group to discover the return path independently.
section: 6.3.2
rfc2119_level: MUST
topics:
    - routing
