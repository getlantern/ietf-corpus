document: rfc-5654
kind: normative-requirement
summary: MPLS-TP MUST support 1+1 protection (bidirectional and unidirectional for P2P, unidirectional for P2MP) and 1:n protection (including 1:1). Protection-switching MUST NOT cause user data to enter an uncontrolled loop.
section: 2.5.1.1
rfc2119_level: MUST
topics:
    - mpls
