document: rfc-7110
kind: design-rationale
summary: Generic RSVP Tunnel sub-TLVs (IPv4, IPv6, Static) are defined instead of requiring a specific LSP FEC so that LSP ping can verify control-plane/data-plane consistency without being disrupted by LSP identifier changes during Make-Before-Break (MBB) operations, allowing operators to specify a tunnel rather than a particular LSP.
section: "4.3"
topics:
    - mpls
