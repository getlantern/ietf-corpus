document: rfc-3986
kind: normative-requirement
summary: URI producers and normalizers should decode percent-encoded octets in the unreserved character ranges (ALPHA, DIGIT, "-", ".", "_", "~") and should use uppercase hex digits for all percent-encodings that are retained.
section: 6.2.2
rfc2119_level: SHOULD
