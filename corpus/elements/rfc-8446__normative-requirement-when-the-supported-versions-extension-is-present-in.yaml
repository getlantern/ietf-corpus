document: rfc-8446
kind: normative-requirement
summary: When the 'supported_versions' extension is present in ClientHello, servers MUST NOT use ClientHello.legacy_version for version negotiation and MUST use only the extension to determine client preferences; servers MUST only select a version listed in that extension.
section: 4.2.1
rfc2119_level: MUST NOT
