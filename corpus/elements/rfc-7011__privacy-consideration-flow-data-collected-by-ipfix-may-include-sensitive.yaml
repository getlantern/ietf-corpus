document: rfc-7011
kind: privacy-consideration
summary: Flow data collected by IPFIX may include sensitive information such as IP addresses, port numbers, and communication patterns that can reveal details about users' activities. Operators MUST consider access control, data minimization, and retention policies to protect end-user privacy when deploying IPFIX collectors.
section: "11.8"
rfc2119_level: MUST
topics:
    - privacy
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
