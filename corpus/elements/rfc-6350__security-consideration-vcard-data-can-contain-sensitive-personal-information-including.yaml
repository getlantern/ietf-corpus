document: rfc-6350
kind: security-consideration
summary: vCard data can contain sensitive personal information including names, addresses, phone numbers, email addresses, photographs, and cryptographic keys. Implementations must consider access control and privacy when storing, transmitting, or publishing vCard data. The SOURCE property can expose the location of directory services, and the KEY property can carry authentication credentials.
section: "9"
topics:
    - security
    - privacy
