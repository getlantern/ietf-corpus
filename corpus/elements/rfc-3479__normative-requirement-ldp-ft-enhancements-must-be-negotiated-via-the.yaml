document: rfc-3479
kind: normative-requirement
summary: LDP FT enhancements MUST be negotiated via the FT Session TLV on LDP Initialization messages. If either peer omits the TLV or the S/C bits do not match, the LDP FT enhancements MUST NOT be used. Use of FT enhancements without prior negotiation MUST be treated as a serious protocol error causing session termination.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
