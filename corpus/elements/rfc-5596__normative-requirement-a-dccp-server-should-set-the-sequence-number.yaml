document: rfc-5596
kind: normative-requirement
summary: A DCCP server SHOULD set the Sequence Number field of a DCCP-Listen packet to 0. A DCCP client MUST ignore the Sequence Number field. Middleboxes MUST NOT interpret sequence numbers in DCCP-Listen packets.
section: 2.2.1
rfc2119_level: MUST
topics:
    - nat
    - congestion
