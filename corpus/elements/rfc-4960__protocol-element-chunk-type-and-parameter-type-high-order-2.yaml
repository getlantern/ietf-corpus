document: rfc-4960
kind: protocol-element
summary: 'Chunk Type and Parameter Type high-order 2 bits encode unrecognized-type handling: 00=stop and discard, 01=stop/discard/report unrecognized, 10=skip and continue, 11=skip/continue/report in ERROR. This enables forward-compatible protocol extension without association failure.'
