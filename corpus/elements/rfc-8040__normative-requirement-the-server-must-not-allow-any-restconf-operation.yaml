document: rfc-8040
kind: normative-requirement
summary: The server MUST NOT allow any RESTCONF operation for resources that the client is not authorized to access. RESTCONF is compatible with NACM (RFC 6536); the server maps resource paths to YANG instance identifiers to apply NACM access control rules.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - netconf
    - yang
