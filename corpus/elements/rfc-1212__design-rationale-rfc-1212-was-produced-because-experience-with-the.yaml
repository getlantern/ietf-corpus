document: rfc-1212
kind: design-rationale
summary: 'RFC 1212 was produced because experience with the SMI experimental subtree showed that MIB descriptions contained redundant information: a textual OBJECT section and an ASN.1 OBJECT-TYPE macro section covered the same ground. The concise format merges both into a single OBJECT-TYPE macro invocation, reducing editing errors and improving clarity.'
