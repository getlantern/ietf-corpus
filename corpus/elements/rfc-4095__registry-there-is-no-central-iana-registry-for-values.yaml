document: rfc-4095
kind: registry
summary: There is no central IANA registry for values in the NAPTR 'SERVICE' field. However, IANA maintains an Application Service Tag Registry for S-NAPTR (RFC 3958), and IANA is advised that the 'no-solicit' value for the SERVICE field is in use per this document and should not be used in that registry for other applications.
