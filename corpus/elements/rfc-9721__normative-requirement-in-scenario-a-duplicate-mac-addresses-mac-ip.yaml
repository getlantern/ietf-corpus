document: rfc-9721
kind: normative-requirement
summary: In Scenario A (duplicate MAC addresses), MAC-IP routes with the same MAC address as a duplicate MAC route do not require separate duplicate detection and MUST inherit the duplicate property from the MAC route. If a MAC route is marked as duplicate, all associated MAC-IP routes MUST also be treated as duplicates.
section: "8.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
