document: rfc-8497
kind: interoperability-note
summary: A SIP proxy as defined in RFC 3261 cannot detect or handle 'log me' marking errors and will simply forward any 'log me' marker it receives. Only supporting UAs or B2BUAs can detect and handle marking errors.
section: "5.3"
topics:
