document: rfc-9914
kind: normative-requirement
summary: The RPL Packet Information (RPI) option is amended so that the RPLInstanceID field in packets forwarded along a Track carries the Local RPLInstanceID of the Track, allowing intermediate nodes to apply the correct Track RIB for forwarding decisions.
section: 4.1.6
topics:
    - routing
