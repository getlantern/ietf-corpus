document: rfc-9594
kind: normative-requirement
summary: The proof-of-possession access token in the Authorization Response MUST contain a confirmation claim, an expiration time claim, and a scope claim specifying the groups and roles the Client is authorized to access. The scope claim encoding must match the scope format negotiated with the AS.
section: "3.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
