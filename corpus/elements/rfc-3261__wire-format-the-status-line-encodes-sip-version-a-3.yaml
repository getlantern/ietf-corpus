document: rfc-3261
kind: wire-format
summary: 'The Status-Line encodes SIP-Version, a 3-digit Status-Code, and Reason-Phrase separated by single SP characters, terminated by CRLF: ''SIP-Version SP Status-Code SP Reason-Phrase CRLF''. Status-Code classes 1xx through 6xx indicate provisional, success, redirection, client error, server error, and global failure.'
section: "7.2"
topics:
