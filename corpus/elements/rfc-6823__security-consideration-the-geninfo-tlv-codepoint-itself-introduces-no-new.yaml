document: rfc-6823
kind: security-consideration
summary: The GENINFO TLV codepoint itself introduces no new security issues for IS-IS. However, information advertised by specific applications MAY introduce new security issues, and each application's public specification MUST discuss those issues. Use of IS-IS cryptographic authentication per RFC 5304 or RFC 5310 is recommended where appropriate.
section: "8"
topics:
    - routing
    - security
