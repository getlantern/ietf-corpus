document: rfc-5455
kind: interoperability-note
summary: To ensure coherent DS-TE operation, a PCE and PCC should share a common understanding of DS-TE Class-Types and TE-classes. If a path computation request crosses an Autonomous System boundary, these should have global significance in all domains, though enforcement of this is outside the scope of this document.
