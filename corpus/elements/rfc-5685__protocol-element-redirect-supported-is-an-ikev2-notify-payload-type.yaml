document: rfc-5685
kind: protocol-element
summary: REDIRECT_SUPPORTED is an IKEv2 Notify payload (type 16406) included in the initial IKE_SA_INIT request by the initiator to signal willingness to be redirected. It carries no notification data beyond the standard Notify header; Protocol ID and SPI Size are both set to 0.
section: "9.1"
