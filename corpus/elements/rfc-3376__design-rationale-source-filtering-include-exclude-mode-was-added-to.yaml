document: rfc-3376
kind: design-rationale
summary: Source filtering (INCLUDE/EXCLUDE mode) was added to IGMPv3 primarily to enable Source-Specific Multicast (SSM), where receivers specify both the group and the desired sources, allowing routing protocols to avoid delivering traffic from undesired sources to networks without interested receivers.
section: "1"
topics:
    - multicast
