document: rfc-7858
kind: normative-requirement
summary: Implementations of the out-of-band key-pinned privacy profile MUST support SHA-256 (RFC 6234) hashing of the DER-encoded ASN.1 SPKI of an X.509 certificate, and MUST support representation of the fingerprint as a base64-encoded string (RFC 4648).
section: "4.2"
rfc2119_level: MUST
topics:
