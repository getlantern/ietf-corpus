document: rfc-4436
kind: normative-requirement
summary: If the reachability test is successful, the host SHOULD continue to use the operable routable IPv4 address associated with the confirmed network without re-acquiring it. Once a valid reachability test response is received, validation is complete and additional responses SHOULD be discarded.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
