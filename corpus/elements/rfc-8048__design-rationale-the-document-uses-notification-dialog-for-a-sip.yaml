document: rfc-8048
kind: design-rationale
summary: 'The document uses ''notification dialog'' for a SIP subscription and ''presence authorization'' for an XMPP subscription to prevent confusion, since both SIP and XMPP use the term ''subscription'' but with different meanings: SIP subscriptions are short-lived notification sessions, while XMPP subscriptions are long-lived presence authorizations.'
section: "1"
topics:
