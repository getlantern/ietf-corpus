document: rfc-7462
kind: security-consideration
summary: Providing specific alert indications (e.g., call-waiting or call-forwarding) can reveal the dialog state of the source UA or services initiated at its end. Such provision SHALL always require authorization on behalf of the user of the source UA, typically through configured policy.
