document: rfc-8685
kind: security-consideration
summary: H-PCE inherits PCEP security considerations from RFC 5440 and may use TCP-AO or TLS (RFC 8253, RFC 8446). Multi-domain operation involves cross-domain information exchange, creating confidentiality risks especially when child domains belong to different commercial entities; path-keys (RFC 5520) can be used to preserve topology confidentiality.
section: "8"
topics:
    - routing
    - mpls
    - security
    - tls
