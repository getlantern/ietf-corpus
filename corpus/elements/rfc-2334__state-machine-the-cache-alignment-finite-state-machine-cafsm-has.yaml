document: rfc-2334
kind: state-machine
summary: 'The Cache Alignment Finite State Machine (CAFSM) has five states: Down, Master/Slave Negotiation, Cache Summarize, Update Cache, and Aligned. It is coupled to the HFSM per DCS per PID/SGID: when the HFSM reaches Bidirectional, the CAFSM moves to Master/Slave Negotiation; any HFSM departure from Bidirectional forces the CAFSM back to Down. The Aligned state enables normal CSU flooding.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
