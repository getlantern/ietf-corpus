document: rfc-5761
kind: normative-requirement
summary: To request RTP/RTCP multiplexing, the initial SDP offer MUST include the 'a=rtcp-mux' attribute at the media level. If the answer does not contain 'a=rtcp-mux', the offerer MUST NOT multiplex RTP and RTCP on a single port.
section: 5.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
