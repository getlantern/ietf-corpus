document: rfc-3961
kind: protocol-element
summary: des-cbc-crc (etype 1) uses DES-CBC with the key itself as the initialization vector and a modified 4-octet CRC-32. The modification from standard CRC-32 omits the sum with the all-ones polynomial times x**k and does not ones-complement the final remainder; bit ordering within octets is LSB-first.
section: 6.2.3
topics:
    - crypto
