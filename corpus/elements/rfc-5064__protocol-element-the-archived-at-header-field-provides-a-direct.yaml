document: rfc-5064
kind: protocol-element
summary: The Archived-At header field provides a direct link to the archived form of an individual email message. The field body consists of a URI enclosed in angle brackets ('<', '>'), where the URI points to an archived version of the message.
section: "2.1"
topics:
