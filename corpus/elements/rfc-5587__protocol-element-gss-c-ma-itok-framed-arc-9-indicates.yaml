document: rfc-5587
kind: protocol-element
summary: GSS_C_MA_ITOK_FRAMED (arc 9) indicates that a mechanism's initial context tokens are properly framed per Section 3.1 of RFC 2743. GSS_C_MA_AUTH_INIT (arc 10) and GSS_C_MA_AUTH_TARG (arc 11) indicate support for initiator-to-acceptor and acceptor-to-initiator authentication respectively.
section: "3.2"
topics:
