document: rfc-5591
kind: design-rationale
summary: With secure transports, authentication, integrity, timeliness, and decryption occur in the Transport Model before ASN.1 decoding, reversing the order used by USM where the Security Model processes security after the Message Processing Model decodes the header. This difference reflects where security context is available in each architecture.
section: Appendix B
topics:
