document: rfc-6325
kind: normative-requirement
summary: When two RBridges claim the same nickname, the RBridge with the numerically higher IS-IS ID (or, on a tie in priority, higher IS-IS System ID) retains the nickname, and the other MUST select a new nickname. Reserved values 0x0000 and 0xFFC0–0xFFFF MUST NOT be selected or configured.
section: 3.7.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
