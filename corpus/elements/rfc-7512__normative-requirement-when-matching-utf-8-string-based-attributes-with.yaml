document: rfc-7512
kind: normative-requirement
summary: When matching UTF-8 string-based attributes with characters outside US-ASCII, it is RECOMMENDED to normalize all UTF-8 strings using Normalization Form C (NFC) before string comparison; otherwise false negatives or false positives may result.
section: "2.5"
rfc2119_level: RECOMMENDED
