document: rfc-1195
kind: protocol-element
summary: The Inter-Domain Routing Protocol Information field in Level 2 LSPs (not in pseudonode LSPs) allows border routers to exchange external routing information. Each occurrence includes a 'type' field identifying the inter-domain protocol; initial type values are defined in Annex A.
