document: rfc-4090
kind: normative-requirement
summary: For backup path computation via CSPF, the backup LSP MUST NOT traverse the downstream node/link whose failure is being protected against, and the destination MUST be the tail-end (for detour LSPs) or the address of the MP (for bypass tunnels).
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
