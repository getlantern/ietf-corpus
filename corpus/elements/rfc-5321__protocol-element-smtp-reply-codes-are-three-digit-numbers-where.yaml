document: rfc-5321
kind: protocol-element
summary: 'SMTP reply codes are three-digit numbers where the first digit indicates severity: 2yz = positive completion, 3yz = positive intermediate, 4yz = transient negative completion (retry possible), 5yz = permanent negative completion. Key codes include 220 (greeting), 250 (OK), 354 (start mail input), 421 (service unavailable), 550 (mailbox unavailable).'
