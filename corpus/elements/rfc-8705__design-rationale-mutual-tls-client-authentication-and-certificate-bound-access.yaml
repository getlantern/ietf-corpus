document: rfc-8705
kind: design-rationale
summary: Mutual-TLS client authentication and certificate-bound access tokens are explicitly specified as distinct, complementary mechanisms that do not need to be deployed or used together. This decoupling allows certificate binding at the resource server to serve purely as proof-of-possession, independent of how the client authenticated to the authorization server.
section: "1"
topics:
    - oauth
    - tls
    - security
