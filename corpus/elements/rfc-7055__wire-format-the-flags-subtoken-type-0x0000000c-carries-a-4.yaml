document: rfc-7055
kind: wire-format
summary: The Flags subtoken (type 0x0000000C) carries a 4-octet network-byte-order integer. The only defined flag is GSS_C_MUTUAL_FLAG (0x2). Acceptors MUST ignore flag octets beyond 4 and MUST ignore undefined flag bits; initiators MUST send undefined bits as zero.
section: 5.6.1
topics:
    - security
