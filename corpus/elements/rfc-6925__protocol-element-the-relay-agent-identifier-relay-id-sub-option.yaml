document: rfc-6925
kind: protocol-element
summary: The Relay Agent Identifier (Relay-ID) sub-option is a new sub-option for the DHCPv4 Relay Agent Information option (RFC 3046) that carries a sequence of octets uniquely identifying the relay agent within its administrative domain. The value is normally administratively configured in the relay agent.
section: "1"
topics:
