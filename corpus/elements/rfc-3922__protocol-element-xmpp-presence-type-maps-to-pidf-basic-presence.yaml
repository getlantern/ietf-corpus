document: rfc-3922
kind: protocol-element
summary: 'XMPP presence type maps to PIDF basic presence status: absence of a ''type'' attribute maps to PIDF OPEN, and ''type=unavailable'' maps to PIDF CLOSED. All other XMPP presence types (subscribe, unsubscribe, etc.) manage subscriptions and are handled separately in Section 6.'
section: 5.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
