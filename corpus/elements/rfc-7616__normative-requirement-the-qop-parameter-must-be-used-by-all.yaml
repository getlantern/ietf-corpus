document: rfc-7616
kind: normative-requirement
summary: The qop parameter MUST be used by all implementations. The server lists supported quality-of-protection values ("auth", "auth-int") in WWW-Authenticate, and the client selects one for the Authorization field. Unrecognized options MUST be ignored.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
