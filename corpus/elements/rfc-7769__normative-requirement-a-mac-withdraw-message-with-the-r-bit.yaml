document: rfc-7769
kind: normative-requirement
summary: A MAC withdraw message with the R-bit set MUST be processed by resetting the send and receive sequence numbers first, before performing the rest of MAC withdraw message processing. The ACK is sent with the R-bit cleared.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
