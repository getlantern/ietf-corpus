document: rfc-3686
kind: security-consideration
summary: Precomputation attacks limit the theoretical strength of AES-CTR to 2^(n/2) bits where n is the key length. The unpredictable nonce in the counter block significantly increases the table size an attacker must compute, making longer keys the best countermeasure.
section: "7"
topics:
