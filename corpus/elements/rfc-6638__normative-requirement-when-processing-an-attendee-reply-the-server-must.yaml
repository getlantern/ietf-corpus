document: rfc-6638
kind: normative-requirement
summary: When processing an Attendee reply, the server MUST update the PARTSTAT of each matching ATTENDEE property in the Organizer's scheduling object resource and MUST set or add the SCHEDULE-STATUS parameter to the reply's REQUEST-STATUS value (defaulting to '2.0' if absent).
section: "4.2"
rfc2119_level: MUST
topics:
    - http
