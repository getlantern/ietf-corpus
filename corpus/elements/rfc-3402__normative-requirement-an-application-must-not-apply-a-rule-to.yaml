document: rfc-3402
kind: normative-requirement
summary: An Application MUST NOT apply a Rule to the output of a previous Rule. All Rewrite Rules for all Applications must ALWAYS apply to the exact same Application Unique String that the algorithm started with.
section: "3"
rfc2119_level: MUST NOT
