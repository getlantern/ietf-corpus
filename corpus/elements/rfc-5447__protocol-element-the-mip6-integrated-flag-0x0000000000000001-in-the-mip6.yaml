document: rfc-5447
kind: protocol-element
summary: The MIP6_INTEGRATED flag (0x0000000000000001) in the MIP6-Feature-Vector AVP indicates support for the Mobile IPv6 integrated scenario bootstrapping. When set by the NAS it signals NAS capability; when set by the Diameter server it confirms authorization.
section: 4.2.5
topics:
