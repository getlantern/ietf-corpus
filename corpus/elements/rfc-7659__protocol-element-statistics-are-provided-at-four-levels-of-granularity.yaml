summary: 'Statistics are provided at four levels of granularity: per NAT instance, per protocol, per address pool, and per subscriber, where applicable. Each counter is cumulative from the associated last-discontinuity-time timestamp. Table 1 in Section 3.1.4 specifies which statistics are available at each granularity level.'
