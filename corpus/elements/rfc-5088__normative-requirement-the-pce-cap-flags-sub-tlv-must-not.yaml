document: rfc-5088
kind: normative-requirement
summary: The PCE-CAP-FLAGS sub-TLV MUST NOT be present more than once in the PCED TLV. If it appears more than once, only the first occurrence is processed and any others MUST be ignored.
section: "4.5"
rfc2119_level: MUST NOT
