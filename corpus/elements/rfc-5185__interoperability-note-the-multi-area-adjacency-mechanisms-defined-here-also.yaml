document: rfc-5185
kind: interoperability-note
summary: The multi-area adjacency mechanisms defined here also apply to OSPFv3. A multi-area adjacency is advertised as a point-to-point link in the router-LSA, but the type 3 link change from Section 2.7 does not apply to OSPFv3 because OSPFv3 router-LSA links are independent of addressing semantics. No prefixes for the multi-area adjacency are advertised in the intra-area-prefix-LSA.
section: "4"
topics:
