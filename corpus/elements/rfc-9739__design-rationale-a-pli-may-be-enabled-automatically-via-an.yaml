document: rfc-9739
kind: design-rationale
summary: A PLI may be enabled automatically via an underlying mechanism on a logical interface—for example, in a BIER domain a logical interface can connect two or more BIER edge routers, avoiding the need for manual PLI configuration on each such interface.
