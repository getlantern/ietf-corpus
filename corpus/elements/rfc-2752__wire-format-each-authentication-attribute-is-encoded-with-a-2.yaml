document: rfc-2752
kind: wire-format
summary: 'Each authentication attribute is encoded with a 2-octet Length (actual length including header, not counting padding), a 1-octet A-Type, a 1-octet SubType, and a variable-length Value field. A-Types defined: POLICY_LOCATOR (1), CREDENTIAL (2), DIGITAL_SIGNATURE (3), POLICY_ERROR_OBJECT (4).'
