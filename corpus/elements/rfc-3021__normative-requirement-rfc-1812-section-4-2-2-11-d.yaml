document: rfc-3021
kind: normative-requirement
summary: 'RFC 1812 Section 4.2.2.11(d) update: the directed broadcast {<Network-prefix>, -1} MUST NOT be used as a source address except on 31-bit point-to-point link endpoints. A router MAY originate or receive directed broadcasts, but reception MUST be disabled by default.'
section: "3.3"
rfc2119_level: MUST NOT
