document: rfc-8979
kind: interoperability-note
summary: The default behavior of intermediary NSH-aware nodes is to preserve both Subscriber Identifier and Performance Policy Identifier Context Headers and pass them to next-hop NSH-aware nodes, but local policy may override this to strip a Context Header after processing.
