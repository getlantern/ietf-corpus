document: rfc-3805
kind: normative-requirement
summary: The agent SHALL return all character strings in coded character sets where code positions 0–127 (decimal) are US-ASCII. Control codes (positions 0–31 and 127) SHALL NOT be used unless specifically required in an object DESCRIPTION clause.
section: 2.2.1.1
rfc2119_level: MUST
