document: rfc-7363
kind: protocol-element
summary: Overlay size N is estimated by computing the average inter-peer distance d between successive peers from the most distant predecessor to the most distant successor, then N = 2^numBitsInNodeId / d. This estimate is accurate within 15% of the real network size.
