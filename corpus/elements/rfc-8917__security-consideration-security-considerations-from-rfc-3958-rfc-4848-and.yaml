document: rfc-8917
kind: security-consideration
summary: Security considerations from RFC 3958, RFC 4848, and RFC 5222 all apply. No additional security concerns are introduced by adding the new tag. Separation of services via distinct tags allows allocation of different resource levels (server capacity, attack mitigation, bandwidth) to mapping vs. validation services.
section: "5"
topics:
