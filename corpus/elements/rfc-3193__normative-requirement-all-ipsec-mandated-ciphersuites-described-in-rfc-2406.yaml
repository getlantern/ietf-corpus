document: rfc-3193
kind: normative-requirement
summary: All IPsec-mandated ciphersuites (described in RFC 2406 and RFC 2402), including NULL encryption, MUST be supported. Implementations MUST also implement replay protection mechanisms of IPsec.
section: "2.1"
rfc2119_level: MUST
