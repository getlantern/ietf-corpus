document: rfc-2960
kind: normative-requirement
summary: The Initiate Tag in INIT and INIT ACK MUST NOT be 0; if a received INIT or INIT ACK carries an Initiate Tag of 0, the receiver MUST treat it as an error and close the association by transmitting an ABORT.
section: 3.3.2
rfc2119_level: MUST NOT
topics:
    - sctp
