document: rfc-2613
kind: design-rationale
summary: The SMON MIB extends RMON's dataSource concept to include VLANs and physical entities because existing RMON and RMON2 standards do not account for characteristics unique to switched environments, such as non-broadcast traffic, logical VLAN segmentation, and packet prioritization.
section: "2.2"
topics:
    - snmp
