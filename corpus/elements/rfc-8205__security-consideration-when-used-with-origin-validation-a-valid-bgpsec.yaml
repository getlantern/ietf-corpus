document: rfc-8205
kind: security-consideration
summary: 'When used with origin validation, a valid BGPsec UPDATE provides two guarantees: (1) the origin AS is authorized by the IP address space holder to originate the prefix, and (2) each AS on the path intentionally chose to propagate the route advertisement to the next AS. BGPsec does not guarantee that data packets flow along the indicated path.'
section: "8.1"
topics:
    - bgp
    - routing
    - security
    - crypto
