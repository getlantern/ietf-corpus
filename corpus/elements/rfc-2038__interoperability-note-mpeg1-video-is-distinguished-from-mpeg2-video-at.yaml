document: rfc-2038
kind: interoperability-note
summary: 'MPEG1 Video is distinguished from MPEG2 Video at the video sequence header: MPEG2 Video has sequence_header() followed by sequence_extension(). The MPEG2 profile and level are determined by the profile_and_level_indicator field of sequence_extension(). MPEG1 Audio is distinguished from MPEG2 Audio via the ancillary_data() header.'
section: "3.1"
topics:
