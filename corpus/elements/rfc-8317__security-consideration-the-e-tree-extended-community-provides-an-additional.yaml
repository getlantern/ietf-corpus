document: rfc-8317
kind: security-consideration
summary: The E-Tree extended community provides an additional security function by allowing network operators to designate ACs as Root or Leaf, preventing any traffic exchange among Leaf sites through ingress filtering for known unicast and egress filtering for BUM traffic. The operator SHOULD configure the AC role before activating the AC to avoid unintended leaf-to-leaf communication.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - routing
    - mpls
