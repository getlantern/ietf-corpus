document: rfc-2573
kind: protocol-element
summary: 'Two error counters track context problems: snmpUnknownContexts (Counter32) counts packets dropped because the context was unknown to the SNMP entity; snmpUnavailableContexts (Counter32) counts packets dropped because the context was known but currently unavailable. Determining context unavailability is implementation-specific.'
