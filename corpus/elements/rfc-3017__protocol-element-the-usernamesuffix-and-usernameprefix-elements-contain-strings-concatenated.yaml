document: rfc-3017
kind: protocol-element
summary: The userNameSuffix and userNamePrefix elements contain strings concatenated to a base username when dialing (e.g., suffix '@bigco.com' yields 'userA@bigco.com'; prefix 'BIGCO/' yields 'BIGCO/userB'). Both may be applied simultaneously to the same base username.
section: 6.2.10
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
