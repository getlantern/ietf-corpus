document: rfc-4551
kind: protocol-element
summary: 'The CHANGEDSINCE FETCH modifier restricts the FETCH result to only those messages whose mod-sequence is greater than the specified value. It implicitly adds the MODSEQ message data item to the response: `FETCH <set> (<data-items>) (CHANGEDSINCE <mod-sequence>)`.'
section: 3.3.1
topics:
