document: rfc-5451
kind: normative-requirement
summary: Extension method identifiers and result codes not beginning with 'x-' MUST be registered with IANA and published in an RFC. Implementations MUST use the 'x-' prefix for new methods until registered. Experimental methods MUST only be used within ADMDs that have explicitly consented to use them.
section: 2.5.2
rfc2119_level: MUST
topics:
