document: rfc-3545
kind: security-consideration
summary: A malfunctioning or malicious compressor could cause the decompressor to reconstitute packets that do not match originals but have valid IP/UDP/RTP headers and possibly valid UDP checksums. End-to-end authentication and integrity mechanisms are needed to detect such corruption.
section: "4"
topics:
