document: rfc-9061
kind: normative-requirement
summary: In the IKE-less case, the I2NSF Controller MUST take care of the rekeying process. When an IPsec SA soft lifetime is about to expire, the controller MUST create a new IPsec SA and MAY remove the old one (e.g., when the old SA lifetime has not been defined).
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
