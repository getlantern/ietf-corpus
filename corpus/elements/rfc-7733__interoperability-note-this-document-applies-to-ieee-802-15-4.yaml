document: rfc-7733
kind: interoperability-note
summary: This document applies to IEEE 802.15.4 and G.9959 Layer 2 technologies adapted to IPv6 via RFC 4944 and RFC 7428 respectively. Other Layer 2 technologies are relevant provided there is no frame size issue and link-layer acknowledgements are available.
