document: rfc-9309
kind: wire-format
summary: 'The robots.txt file uses an ABNF-defined format: groups start with ''user-agent'' lines (product-token), followed by ''allow''/''disallow'' rule lines with path patterns. Lines are terminated by optional whitespace and optional comment preceded by ''#'', then NL (%x0D / %x0A / %x0D.0A).'
