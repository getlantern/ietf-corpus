document: rfc-9766
kind: protocol-element
summary: LAYOUT_WCC errors are a subset of existing NFSv4 errors defined in RFC 8881 Section 15.1; the operation introduces no new error codes. The MDS may ignore the entire operation or apply a partial payload upon error.
