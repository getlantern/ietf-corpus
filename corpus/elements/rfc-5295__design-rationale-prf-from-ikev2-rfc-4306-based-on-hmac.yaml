document: rfc-5295
kind: design-rationale
summary: PRF+ from IKEv2 (RFC 4306) based on HMAC-SHA-256 was chosen as the default KDF for its simplicity and efficiency compared to mechanisms used in TLS (RFC 4346). The motivation for PRF+ design is described in the SIGMA paper by Krawczyk.
