document: rfc-7266
kind: design-rationale
summary: 'Two distinct segment types (single-channel per SSRC and multi-channel per SSRC) are defined to handle two deployment models: separate RTP streams per media channel (identified by SSRC) versus multi-channel audio multiplexed into one RTP stream. The segment type bit (S) allows both to coexist in the same block structure, though they cannot be mixed within a single block.'
