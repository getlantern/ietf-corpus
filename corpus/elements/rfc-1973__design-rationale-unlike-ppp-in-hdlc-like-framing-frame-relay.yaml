document: rfc-1973
kind: design-rationale
summary: Unlike PPP in HDLC-like framing, Frame Relay framing does not align the Information field on a 32-bit boundary; alignment occurs only when the NLPID is removed and the Protocol field is compressed to a single octet, motivating Protocol-Field-Compression negotiation.
