document: rfc-1269
kind: protocol-element
summary: bgpPeerLastError (bgpPeerEntry 14) is a read-only OCTET STRING of SIZE(2). The first byte contains the BGP error code and the second byte contains the subcode of the last error seen on this connection; the field is zero if no error has occurred.
section: "5"
topics:
