document: rfc-4491
kind: wire-format
summary: 'The GOST R 34.10-2001 signature value is a 64-octet string: the first 32 octets contain the big-endian representation of s, and the second 32 octets contain the big-endian representation of r. The same octet-string-to-bit-string conversion process as GOST R 34.10-94 MUST be used for certificates and CRLs.'
section: 2.2.2
topics:
