document: rfc-9514
kind: normative-requirement
summary: For SRv6 EPE or Direct Protocol-ID SIDs, the Algorithm value in the SRv6 Endpoint Behavior TLV MUST be 0 unless an algorithm is locally associated with the SRv6 Locator from which the SID is allocated.
