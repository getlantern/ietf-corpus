document: rfc-9624
kind: protocol-element
summary: 'For EVPN-MPLS with BIER, ESI label split-horizon procedures apply using two upstream-assigned labels: one identifying the BD (from the PTA) and one identifying the Ethernet Segment. The BFIR-id in the BIER header identifies the ingress PE that assigned these labels.'
