document: rfc-6809
kind: security-consideration
summary: Feature-capability indicators can reveal application deployment details or identify elements with exploitable implementation weaknesses. Unlike media feature tags (RFC 3840), they do not expose end-user equipment capabilities, but they may expose sensitive SIP infrastructure information.
section: "9"
topics:
