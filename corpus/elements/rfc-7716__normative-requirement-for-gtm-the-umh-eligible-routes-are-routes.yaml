document: rfc-7716
kind: normative-requirement
summary: For GTM, the UMH-eligible routes are routes of SAFI 1, SAFI 4, or SAFI 2. If the global table has imported SAFI 2 routes, those are the UMH-eligible routes; otherwise SAFI 1 or SAFI 4 routes are used. The Upstream RD is always considered to be zero and is NOT determined from the Selected UMH Route.
section: "2.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
