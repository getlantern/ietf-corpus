document: rfc-6854
kind: design-rationale
summary: Although the updated syntax allows named groups with non-empty address lists, the document recommends against general use and classifies group syntax in originator fields as 'Limited Use' per RFC 2026. The concern is that many email procedures and software assume 'From:' and 'Sender:' addresses are replyable and suitable for filtering, and groups can disrupt these uses.
section: "3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
