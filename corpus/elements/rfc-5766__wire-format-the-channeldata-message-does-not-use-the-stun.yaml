document: rfc-5766
kind: wire-format
summary: 'The ChannelData message does not use the STUN header. Its format is: 16-bit channel number, 16-bit data length (in bytes), followed by the data payload. This 4-byte header replaces the 36-byte overhead of Send/Data indications.'
section: "11.4"
