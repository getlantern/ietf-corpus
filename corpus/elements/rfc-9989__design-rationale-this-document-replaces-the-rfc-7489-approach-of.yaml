document: rfc-9989
kind: design-rationale
summary: This document replaces the RFC 7489 approach of using a Public Suffix List (PSL) to determine Organizational Domains with a 'DNS Tree Walk' that discovers Organizational Domain boundaries from DMARC Policy Records themselves via the 'psd' tag. This eliminates reliance on an external, unauthenticated list and allows large organizations with decentralized DNS management to declare their own Organizational Domain boundaries.
section: "4.10"
topics:
    - email
    - dns
