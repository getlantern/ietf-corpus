document: rfc-7550
kind: normative-requirement
summary: A client SHOULD NOT send a Release message for non-conflicting bindings merely because it sent a Decline for a conflicting address. The client SHOULD retain non-conflicting bindings and treat the failed binding as simply unobtained when sending subsequent Renew/Rebind messages.
section: "4.6"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
