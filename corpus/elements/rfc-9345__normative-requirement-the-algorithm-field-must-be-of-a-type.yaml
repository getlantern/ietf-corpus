kind: normative-requirement
summary: The algorithm field MUST be of a type advertised by the client in the 'signature_algorithms' extension, and dc_cert_verify_algorithm MUST be of a type advertised in the SignatureSchemeList; clients that receive non-valid delegated credentials MUST terminate the connection with an 'illegal_parameter' alert.
