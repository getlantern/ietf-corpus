document: rfc-3986
kind: normative-requirement
summary: Implementations MUST NOT percent-encode or decode the same string more than once, as decoding an already-decoded string might lead to misinterpreting a percent data octet as the beginning of a percent-encoding.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - security
