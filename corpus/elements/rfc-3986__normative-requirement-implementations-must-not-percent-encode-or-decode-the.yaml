document: rfc-3986
kind: normative-requirement
summary: Implementations must not percent-encode or decode the same string more than once; re-decoding an already decoded string may misinterpret a literal percent data octet as the beginning of a percent-encoding.
section: "2.4"
rfc2119_level: MUST NOT
