document: rfc-3986
kind: normative-requirement
summary: Implementations must not percent-encode or decode the same string more than once; decoding an already-decoded string might cause a percent data octet to be misinterpreted as the start of a percent-encoding, or vice versa when re-encoding an already-encoded string.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
