document: rfc-3986
kind: normative-requirement
summary: Implementations MUST NOT percent-encode or decode the same string more than once, as decoding an already-decoded string may cause a percent data octet to be misinterpreted as the beginning of a percent-encoding, or vice versa.
section: "2.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
