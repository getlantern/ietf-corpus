document: rfc-3986
kind: normative-requirement
summary: Implementations MUST NOT percent-encode or decode the same string more than once. Decoding an already-decoded string may cause a literal "%" data octet to be misinterpreted as the start of a percent-encoding, and vice versa.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
