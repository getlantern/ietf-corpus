document: rfc-3986
kind: normative-requirement
summary: Implementations must not percent-encode or decode the same string more than once. Decoding an already-decoded string may cause a percent data octet to be misinterpreted as the start of a percent-encoding.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - security
