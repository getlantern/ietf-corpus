document: rfc-9617
kind: protocol-element
summary: The 'admin-config' container holds a single boolean 'enabled' leaf (default false) that gates all IOAM profile configuration. It MUST be set to 'true' before anything in the /ioam/profiles/profile subtree can be edited; if 'false', any configuration in place is not used.
section: "3.1"
topics:
