document: rfc-2110
kind: normative-requirement
summary: 'The type parameter of the ''Content-Type: Multipart/related'' header MUST be the same as the Content-Type of the root body part. If the root is not the first body part, its Content-ID MUST be given in a start parameter to the multipart/related Content-Type header.'
section: "7"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
