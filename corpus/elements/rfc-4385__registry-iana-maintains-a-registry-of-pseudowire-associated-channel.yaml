document: rfc-4385
kind: registry
summary: IANA maintains a registry of 'Pseudowire Associated Channel Types' (16-bit values) assigned using the 'IETF Consensus' policy. The value 0x21 indicates the Associated Channel carries an IPv4 packet; 0x57 indicates an IPv6 packet.
