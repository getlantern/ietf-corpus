document: rfc-2878
kind: normative-requirement
summary: 'Bridge protocols and GARP protocol data units MUST be recognized by checking IEEE-assigned destination addresses: 01-80-c2-00-00-00 (STP Bridge Group Address), 01-80-c2-00-00-10 (Bridge Management Group), 01-80-c2-00-00-20 (GMRP), and 01-80-c2-00-00-21 (GVRP).'
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
