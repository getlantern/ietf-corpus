document: rfc-9624
kind: protocol-element
summary: For an inclusive PMSI, the set of BFERs is all originators of IMET routes for the BD. For a selective PMSI, BFERs are originators of matching SMET routes. SMET routes do not carry a PTA; the ingress PE uses the upstream-assigned label from its own IMET route.
section: 2.2.1
topics:
    - multicast
    - routing
