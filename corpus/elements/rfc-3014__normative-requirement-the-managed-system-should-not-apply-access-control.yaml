document: rfc-3014
kind: normative-requirement
summary: The managed system SHOULD NOT apply access control when adding remotely-generated Notifications into either a named log or the default null-named log; security SHOULD be left to overall access control for the log itself.
section: 2.1.2
rfc2119_level: SHOULD NOT
topics:
    - snmp
    - security
