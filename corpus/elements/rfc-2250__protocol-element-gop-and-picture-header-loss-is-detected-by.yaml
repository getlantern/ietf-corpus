document: rfc-2250
kind: protocol-element
summary: GOP and Picture_Header loss is detected by comparing the TR field against receiver-maintained ref_pic_temp and dep_pic_temp counters. A mismatch signals a lost header; a null GOP header can be reconstructed using a null time_code, the previous closed_gop flag, and broken_link=1.
section: Appendix 1
topics:
