document: rfc-8405
kind: protocol-element
summary: HOLDDOWN_INTERVAL is the period of IGP quiet required before the FSM returns to QUIET state, recommended at 10000 ms (default). It MUST be configured longer than TIME_TO_LEARN_INTERVAL.
