document: rfc-9537
kind: protocol-element
summary: 'The "method" member specifies one of four redaction methods: "removal" (field removed from response), "emptyValue" (field set to empty/null), "partialValue" (portion of value removed), or "replacementValue" (field replaced with different value). Default is "removal" when not provided.'
section: "4.2"
