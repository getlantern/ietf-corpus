document: rfc-8941
kind: normative-requirement
summary: For serialization, implementations MAY vary from the specified algorithm so long as the output is still correctly handled by the parsing algorithm. This allows flexibility in serializers while requiring strict conformance in parsers.
section: "1.2"
rfc2119_level: MAY
