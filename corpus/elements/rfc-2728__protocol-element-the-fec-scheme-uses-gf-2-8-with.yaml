document: rfc-2728
kind: protocol-element
summary: The FEC scheme uses GF(2^8) with primitive element alpha=0x1D (00011101) and organizes a serial stream into 364-byte bundles of 14 data packets (26 bytes each) plus 2 FEC-only packets, forming a 16×28 array with horizontal and vertical codewords. It corrects single-byte errors and single- or double-byte erasures.
section: "3.3"
