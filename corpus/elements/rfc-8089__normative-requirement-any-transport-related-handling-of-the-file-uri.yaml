document: rfc-8089
kind: normative-requirement
summary: Any transport-related handling of the file URI scheme MUST retain the case of the path as given. Mapping to or from a case-insensitive form is solely the responsibility of the implementation processing the file URI on behalf of the referenced file system.
section: "2"
rfc2119_level: MUST
topics:
    - interoperability-note
