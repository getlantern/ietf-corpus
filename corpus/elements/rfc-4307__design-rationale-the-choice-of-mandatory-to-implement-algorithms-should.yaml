document: rfc-4307
kind: design-rationale
summary: The choice of mandatory-to-implement algorithms should be conservative to minimize the likelihood of compromise, while also considering performance for environments where it is a concern. Algorithms marked SHOULD+ are pre-identified as likely future mandatory algorithms so implementations can adopt them proactively.
