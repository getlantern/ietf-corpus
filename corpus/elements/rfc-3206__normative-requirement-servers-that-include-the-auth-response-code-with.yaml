document: rfc-3206
kind: normative-requirement
summary: Servers that include the AUTH response code with any authentication failure SHOULD support the CAPA command and SHOULD include the AUTH-RESP-CODE capability in the CAPA response, to assure clients that only AUTH-coded errors are credential-related.
section: "5"
rfc2119_level: SHOULD
