document: rfc-6682
kind: normative-requirement
summary: When the P parameter is not present in an offer/answer exchange, the receiver MUST use FEC Payload ID Format A. In an answer that selects an offer where P was omitted, P MUST either be omitted or included with value 'A'.
section: "8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
