document: rfc-8266
kind: interoperability-note
summary: Applying the Nickname profile rules is not an idempotent procedure for all code points; for example, applying toLowerCase then NFKC to U+03D4 (GREEK UPSILON WITH DIARESIS AND HOOK SYMBOL) requires two passes to reach a stable output.
section: "2.1"
