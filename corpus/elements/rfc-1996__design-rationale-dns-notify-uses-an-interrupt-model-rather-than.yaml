document: rfc-1996
kind: design-rationale
summary: DNS NOTIFY uses an interrupt model rather than a poll model to reduce zone propagation delay. Long SOA refresh intervals reduce master server load but cause incoherence among authority servers; NOTIFY signals slaves immediately when the zone changes.
section: "1"
topics:
