document: rfc-9934
kind: design-rationale
summary: A standard PEM file format for ECH key pairs was created because TLS servers can be built with different TLS libraries. Having a common format — analogous to what RFC 7468 provides for other structures — enables interoperability between key managers and TLS server implementations.
section: "1"
topics:
    - tls
    - privacy
