document: rfc-2851
kind: normative-requirement
summary: The InetAddressType and InetAddress objects SHOULD NOT be subtyped in object type definitions. Subtyping binds the MIB module to specific address formats, which may cause serious problems if new address formats need to be introduced.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - snmp
    - ip
