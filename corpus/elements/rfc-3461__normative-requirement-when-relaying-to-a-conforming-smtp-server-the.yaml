document: rfc-3461
kind: normative-requirement
summary: When relaying to a conforming SMTP server, the ENVID, RET, NOTIFY, and ORCPT parameters MUST be propagated unchanged with their original esmtp-values. If a parameter was absent on receipt, it MUST NOT be added when relaying. An ORCPT parameter MUST NOT have its alphabetic characters case-changed.
section: 5.2.1
rfc2119_level: MUST
topics:
    - email
