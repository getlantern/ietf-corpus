document: rfc-4319
kind: interoperability-note
summary: RFC 4319 obsoletes RFC 3276, extending support from G.shdsl to G.shdsl.bis. Key additions are a 3rd and 4th wire pair, payload-only rate objects, tip/ring reversal indication, wire pair activation state, and relaxed rate constraints (now only bounded by Unsigned32).
