document: rfc-8489
kind: security-consideration
summary: Outside attackers can spoof STUN error responses to abort in-progress transactions, or inject forged STUN responses. The MESSAGE-INTEGRITY and MESSAGE-INTEGRITY-SHA256 attributes provide HMAC protection against such attacks; without authentication, STUN is vulnerable to on-path injection.
section: 16.1.1
topics:
    - nat
    - security
