document: rfc-3986
kind: normative-requirement
summary: Data that would conflict with a reserved character's delimiter role must be percent-encoded before the URI is formed. A reserved character found in a component with no known delimiting role must be interpreted as the data octet for that character's US-ASCII encoding.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
