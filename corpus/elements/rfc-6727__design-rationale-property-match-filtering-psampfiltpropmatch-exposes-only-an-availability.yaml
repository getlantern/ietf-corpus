document: rfc-6727
kind: design-rationale
summary: Property match filtering (psampFiltPropMatch) exposes only an availability object and no parameter table, because as stated in RFC 5477 Section 8.2.1, there are no agreed-upon parameters for this function and they cannot be retrieved via the PSAMP MIB module.
