document: rfc-4234
kind: protocol-element
summary: Core rule ALPHA is defined as %x41-5A / %x61-7A (A-Z / a-z). DIGIT is %x30-39 (0-9). HEXDIG is DIGIT / 'A' / 'B' / 'C' / 'D' / 'E' / 'F'. These are uppercase-named basic terminal rules used throughout Internet specifications.
section: B.1
