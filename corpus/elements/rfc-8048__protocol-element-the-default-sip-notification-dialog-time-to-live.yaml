document: rfc-8048
kind: protocol-element
summary: The default SIP notification dialog time-to-live is 3600 seconds (per RFC 3856 Section 6.4), so SIP notification dialogs must be explicitly refreshed to last as long as the contact's presence session. XMPP notification sessions are handled automatically by the user's server based on presence state.
section: "5.1"
topics:
    - sip
    - realtime
