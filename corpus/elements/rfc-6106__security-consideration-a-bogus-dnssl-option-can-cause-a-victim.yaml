document: rfc-6106
kind: security-consideration
summary: A bogus DNSSL option can cause a victim host to send DNS queries for non-FQDNs to an attacker-controlled server. DNS resolvers SHOULD apply mitigations from RFC 1535, RFC 1536, and RFC 3646 to reduce this exposure.
section: "7.2"
topics:
    - dns
    - security
    - ip
    - v6ops
