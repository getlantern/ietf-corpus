document: rfc-6811
kind: normative-requirement
summary: The validation state of a Route MUST be set to reflect the result of the lookup. If validation is not performed on a Route, the implementation SHOULD initialize the validation state of such a route to 'NotFound'.
section: "2"
rfc2119_level: MUST
topics:
