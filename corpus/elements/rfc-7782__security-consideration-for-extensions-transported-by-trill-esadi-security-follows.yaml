document: rfc-7782
kind: security-consideration
summary: For extensions transported by TRILL ESADI, security follows RFC 7357. For extensions not transported by ESADI, RBridges MAY be configured to include IS-IS Authentication TLV (10) in IS-IS PDUs to authenticate using IS-IS security mechanisms (RFC 5304, RFC 5310).
