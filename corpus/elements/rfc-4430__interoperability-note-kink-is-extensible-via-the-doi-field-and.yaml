document: rfc-4430
kind: interoperability-note
summary: KINK is extensible via the DOI field and Quick Mode version numbers in KINK_ISAKMP. New DOIs (e.g., GDOI) can reuse KINK as a secure transport; the QM major.minor version 1.0 under one DOI is independent of version 1.0 under another DOI. KINK implementations MUST reject unsupported ISAKMP versions with KINK_BADQMVERS and SHOULD be able to revert to version 1.0.
section: "12"
topics:
    - ipsec
    - security
    - registry
