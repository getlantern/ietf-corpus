document: rfc-5689
kind: protocol-element
summary: The extended MKCOL request carries an XML request body whose root element is DAV:mkcol. The Content-Type request header MUST be set to 'text/xml' or 'application/xml'. XML bodies with any other root element are reserved for future use.
