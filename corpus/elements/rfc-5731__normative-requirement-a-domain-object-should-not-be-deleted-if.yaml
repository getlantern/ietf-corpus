document: rfc-5731
kind: normative-requirement
summary: A domain object SHOULD NOT be deleted if subordinate host objects are associated with it. A server SHOULD notify clients of existing object relationships by returning a 2305 error response code when a <delete> is attempted and fails due to these relationships.
section: 3.2.2
rfc2119_level: SHOULD NOT
topics:
    - dns
