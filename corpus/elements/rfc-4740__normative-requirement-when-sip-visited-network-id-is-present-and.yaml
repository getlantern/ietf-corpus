document: rfc-4740
kind: normative-requirement
summary: When SIP-Visited-Network-Id is present and the SIP-User-Authorization-Type is REGISTRATION or REGISTRATION&CAPABILITIES, the Diameter server SHOULD verify roaming authorization; if the user is not allowed to roam into that network, it MUST set Result-Code to DIAMETER_ERROR_ROAMING_NOT_ALLOWED.
section: "8.2"
rfc2119_level: MUST
topics:
    - sip
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
