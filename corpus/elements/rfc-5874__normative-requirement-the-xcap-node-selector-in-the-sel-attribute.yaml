document: rfc-5874
kind: normative-requirement
summary: The XCAP Node Selector in the 'sel' attribute of <element> MUST always locate a unique node. When the located element content cannot be presented (e.g., payload too large), the <element> element MUST NOT have any child nodes.
section: "3"
rfc2119_level: MUST
topics:
