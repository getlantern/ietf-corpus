document: rfc-7461
kind: security-consideration
summary: Unauthorized changes to writable MIB objects such as eoDomainName, eoRoleDescription, eoKeywords, eoImportance, eoRelationID, and eoRelationship MAY disrupt power and energy collection and predefined network policies. SET operations without proper protection in non-secure environments open devices to attack.
