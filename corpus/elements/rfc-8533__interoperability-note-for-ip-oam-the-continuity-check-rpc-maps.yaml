document: rfc-8533
kind: interoperability-note
summary: For IP OAM, the `continuity-check` RPC maps to IP Ping (ICMP Echo, RFC 792 / RFC 4443) and the `path-discovery` RPC maps to IP Traceroute. For MPLS, it maps to LSP Ping (RFC 8029). Each technology extension MUST augment the base RPCs with its own required parameters.
