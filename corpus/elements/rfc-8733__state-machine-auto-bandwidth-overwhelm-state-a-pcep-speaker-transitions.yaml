document: rfc-8733
kind: state-machine
summary: 'Auto-bandwidth overwhelm state: a PCEP speaker transitions from Normal to Overwhelmed upon sending PCNtf Notification-value=1; it returns to Normal by sending PCNtf Notification-value=2 (or after the OVERLOADED-DURATION TLV period expires). While overwhelmed, incoming auto-bandwidth messages are discarded.'
