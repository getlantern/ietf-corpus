document: rfc-3648
kind: interoperability-note
summary: This specification does not mandate a specific implementation of MOVE operations within the same parent collection. Servers may implement MOVE as a simple rename (preserving position) or as remove-then-add (appending to end). Clients that need to preserve position during rename must explicitly read and re-set the Position header.
section: "6.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
