document: rfc-3108
kind: wire-format
summary: The VPI field is 8 or 12 bits; the VCI field is 16 bits; the CID (Channel Identifier) field is 8 bits. The VPCI is a 16-bit field that retains its value across VP crossconnects. The VCCI is a 16-bit field that retains its value across VC crossconnects. All may be expressed in decimal or hex (with '0x' prefix for hex).
section: 5.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
