document: rfc-6370
kind: normative-requirement
summary: IP-compatible MEG_IDs for MPLS-TP LSPs are the corresponding LSP_IDs, but the A1/Z9 ordering MUST be used. Similarly, PW MEG_IDs are the PW_Path_IDs and the A1/Z9 ordering MUST be used.
section: 7.1.2
rfc2119_level: MUST
