document: rfc-9437
kind: design-rationale
summary: PubSub enables border routers to dynamically learn and withdraw LISP EID-Prefixes for redistribution into non-LISP routing domains without requiring an additional routing protocol (e.g., BGP) on the Map-Server or static configuration, addressing a scalability and operational complexity problem observed in production deployments.
