document: rfc-3017
kind: design-rationale
summary: 'Because XML DTDs lack strong typing beyond #PCDATA, the specification introduces XML NOTATIONs (FQDN, IPADR, B64JPG, B64GIF) as advisory type annotations on element ''value'' attributes, providing machine-readable hints about expected content format without enforcing validation.'
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
