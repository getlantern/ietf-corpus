document: rfc-7434
kind: interoperability-note
summary: The value 'isdn-interwork' for the 'purpose' parameter was used in predecessor documents and is implemented by some vendors. Implementations may find it useful to parse and interpret 'isdn-interwork' the same way as 'isdn-uui' when receiving messages, for interoperability with those implementations.
section: "8"
topics:
