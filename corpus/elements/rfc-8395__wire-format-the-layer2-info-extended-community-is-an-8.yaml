summary: 'The Layer2 Info Extended Community is an 8-octet structure containing: Extended Community type (2 octets), Encaps Type (1 octet), Control Flags (1 octet), Layer-2 MTU (2 octets), and Reserved (2 octets). The Control Flags field is an 8-bit vector where bits 0-5 (Z) MUST be zero, and bits T, R, C, S are defined.'
