document: rfc-749
kind: normative-requirement
summary: If the user TELNET process agrees to support SUPDUP-OUTPUT, it must immediately follow IAC DO SUPDUP-OUTPUT with a terminal parameter subnegotiation block (type 1). This block encodes the RFC 734 terminal parameters as six-bit bytes, one per eight-bit TELNET data byte.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
