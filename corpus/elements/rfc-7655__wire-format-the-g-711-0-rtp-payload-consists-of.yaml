document: rfc-7655
kind: wire-format
summary: The G.711.0 RTP payload consists of one or more concatenated G.711.0 frames followed by zero or more 0x00 padding octets. Each G.711.0 frame is self-describing; its first 'Prefix Code' octet encodes the count of source G.711 symbols (0, 40, 80, 160, 240, or 320).
