document: rfc-3854
kind: design-rationale
summary: The outer MIME wrapper is omitted for X.400 transport but used for SMTP transport because gateway systems bridging X.400 and SMTP are expected to apply or remove the outer wrapper as appropriate, and the wrapper is outside the security wrappers.
