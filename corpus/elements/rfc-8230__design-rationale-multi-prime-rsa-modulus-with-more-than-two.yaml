document: rfc-8230
kind: design-rationale
summary: Multi-prime RSA (modulus with more than two prime factors) is supported because it provides lower computational cost for decryption and signature primitives. The 'other' field and associated r_i/d_i/t_i parameters exist to encode the additional prime factors.
