document: rfc-9646
kind: security-consideration
summary: 'When generating a new key for a CSR, the fresh public key serves as an implicit nonce enabling replay attack detection: the signed certificate returned by the SZTP-server will contain the client''s fresh public key, confirming the response is not replayed. When reusing an IDevID key, replay detection is not guaranteed.'
section: 4.1.3
topics:
    - security
    - crypto
    - pkix
