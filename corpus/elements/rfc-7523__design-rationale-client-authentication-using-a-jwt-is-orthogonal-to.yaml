document: rfc-7523
kind: design-rationale
summary: Client authentication using a JWT is orthogonal to and separable from using a JWT as an authorization grant; they can be used in combination or separately. JWT authorization grants may be used with or without client authentication, and the supported client authentication types are policy decisions at the authorization server's discretion.
section: "1"
topics:
    - oauth
    - jose
