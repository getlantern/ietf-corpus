document: rfc-6727
kind: interoperability-note
summary: The PSAMP MIB is defined as an extension of both the IPFIX-MIB and the IPFIX-SELECTOR-MIB (RFC 6615). Selector function parameter set indices are shared with the ipfixSelectionProcessTable in the IPFIX-MIB, which references them by OID.
