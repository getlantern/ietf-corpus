document: rfc-3720
kind: normative-requirement
summary: On any connection, the iSCSI initiator MUST send commands in increasing order of CmdSN, except for commands retransmitted due to digest error recovery and connection recovery. iSCSI initiators and targets MUST support the command numbering scheme.
section: 3.2.2.1
rfc2119_level: MUST
topics:
    - tcp
