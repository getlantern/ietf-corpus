document: rfc-9528
kind: wire-format
summary: message_2 is a single CBOR bstr field G_Y_CIPHERTEXT_2, which is the concatenation of G_Y (Responder's ephemeral public key) and CIPHERTEXT_2. CIPHERTEXT_2 is PLAINTEXT_2 XOR KEYSTREAM_2, where PLAINTEXT_2 = (C_R, ID_CRED_R, Signature_or_MAC_2, optional EAD_2).
