document: rfc-4741
kind: normative-requirement
summary: Resources requested from the server for a particular connection MUST be automatically released when the connection closes, enabling failure recovery; for example, locks held by a terminated session are automatically freed.
section: "2.1"
rfc2119_level: MUST
topics:
    - netconf
