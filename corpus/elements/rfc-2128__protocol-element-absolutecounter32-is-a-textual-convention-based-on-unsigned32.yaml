document: rfc-2128
kind: protocol-element
summary: AbsoluteCounter32 is a textual convention based on Unsigned32 that starts at zero, never decreases, never wraps, and locks at 4,294,967,295 on overflow. It is used for historical counters where wrap-around is not expected.
