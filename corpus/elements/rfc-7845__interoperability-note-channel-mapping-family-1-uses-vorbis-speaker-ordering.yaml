summary: 'Channel Mapping Family 1 uses Vorbis speaker ordering (e.g., for 7.1: FL, FC, FR, SL, SR, RL, RR, LFE), which differs from WAVE and FLAC multichannel ordering; correct output requires channel permutation when converting between formats.'
