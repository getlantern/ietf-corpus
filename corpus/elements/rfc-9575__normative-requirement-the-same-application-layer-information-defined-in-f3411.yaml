document: rfc-9575
kind: normative-requirement
summary: The same application-layer information defined in F3411 MUST be transmitted over all physical-layer interfaces performing RID, because Observer transports may be limited. If an Observer can support multiple transports, it should use the latest data regardless of transport.
section: 3.2.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
