document: rfc-6010
kind: security-consideration
summary: Multiple certification paths may exist for a given certificate and each can yield different CCC processing results, including different default attributes. Compromise of a trust anchor private key permits unauthorized parties to generate signed messages accepted by all applications trusting that anchor (e.g., forged firmware packages).
section: "6"
topics:
    - pkix
    - crypto
    - security
