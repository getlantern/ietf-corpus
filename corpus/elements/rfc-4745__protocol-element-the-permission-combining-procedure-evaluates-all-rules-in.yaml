document: rfc-4745
kind: protocol-element
summary: 'The permission-combining procedure evaluates all rules in the rule set; matching rules are those where all conditions evaluate to TRUE. Permissions across matching rules are combined per type: boolean permissions yield TRUE if any matching rule is TRUE; integer/real/datetime permissions yield the maximum; set permissions yield the union. A missing (NULL) permission value assumes the lowest value for its type.'
section: "10.2"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
