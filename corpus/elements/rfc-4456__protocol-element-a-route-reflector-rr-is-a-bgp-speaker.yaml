document: rfc-4456
kind: protocol-element
summary: 'A Route Reflector (RR) is a BGP speaker that advertises IBGP-learned routes to other IBGP peers. An RR divides its internal peers into two groups: Client peers (which need not be fully meshed among themselves) and Non-Client peers (which must be fully meshed). An RR together with its client peers forms a cluster.'
section: "5"
