document: rfc-8858
kind: interoperability-note
summary: When using ICE with exclusive RTP/RTCP multiplexing, the offerer MUST NOT include 'a=candidate:' lines for RTCP and MUST NOT provide a fallback port for RTCP using the 'a=rtcp:' line. This updates RFC 5761 Section 5.1.3.
section: "5.3"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
