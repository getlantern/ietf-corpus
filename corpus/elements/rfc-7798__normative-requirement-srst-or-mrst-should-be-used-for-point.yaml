document: rfc-7798
kind: normative-requirement
summary: SRST or MRST SHOULD be used for point-to-point unicast scenarios, whereas MRMT SHOULD be used for point-to-multipoint multicast scenarios where different receivers require different operation points of the same HEVC bitstream.
section: "4.3"
rfc2119_level: SHOULD
topics:
