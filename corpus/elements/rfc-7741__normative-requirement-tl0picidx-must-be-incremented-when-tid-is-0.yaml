document: rfc-7741
kind: normative-requirement
summary: TL0PICIDX MUST be incremented when TID is 0 (base layer frames), and MUST wrap to 0 after reaching 255. It is RECOMMENDED that TID be used whenever TL0PICIDX is used.
section: "4.2"
rfc2119_level: MUST
topics:
