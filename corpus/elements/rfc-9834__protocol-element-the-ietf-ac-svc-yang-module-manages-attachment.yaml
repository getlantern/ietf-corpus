document: rfc-9834
kind: protocol-element
summary: The 'ietf-ac-svc' YANG module manages attachment circuits as a service, covering L2 connection, IP addressing, routing protocols (static, BGP, OSPF, IS-IS, RIP, VRRP), OAM/BFD, security, and service profiles. The PE-to-AC mapping is intentionally hidden from this service model and maintained internally by network controllers.
section: "5.2"
topics:
