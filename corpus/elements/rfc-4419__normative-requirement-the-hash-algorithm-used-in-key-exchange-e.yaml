document: rfc-4419
kind: normative-requirement
summary: The hash algorithm used in key exchange (e.g., SHA-256 for diffie-hellman-group-exchange-sha256) must also be used in the key derivation pseudo-random function (PRF), as required by RFC 4253's 'Output from Key Exchange' section.
section: "4.2"
rfc2119_level: REQUIRED
topics:
