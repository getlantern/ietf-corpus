document: rfc-1997
kind: normative-requirement
summary: All routes received carrying a COMMUNITIES attribute containing NO_EXPORT_SUBCONFED (0xFFFFFF03) MUST NOT be advertised to external BGP peers, including peers in other member ASes inside a BGP confederation.
section: Well-known Communities
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
