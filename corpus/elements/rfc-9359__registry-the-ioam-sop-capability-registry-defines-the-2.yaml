summary: 'The IOAM SoP Capability registry defines the 2-bit SoP field in the IOAM Proof of Transit Capabilities Object. Initial entry: 0b00 = ''64-bit PktID and 64-bit Cumulative data''. Values 0b01-0b11 are available for assignment via IETF Review (RFC 8126).'
