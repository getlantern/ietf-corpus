document: rfc-8434
kind: design-rationale
summary: The SCSI layout type (RFC 8154) extends the block layout type specifically to remedy its lack of a mechanism for fencing individual clients via the control protocol (the SCSI storage protocol). This is an example of a Standards Track control protocol that meets the control communication requirements for an existing layout type, effectively making it a tightly coupled model.
section: "3"
topics:
    - security
