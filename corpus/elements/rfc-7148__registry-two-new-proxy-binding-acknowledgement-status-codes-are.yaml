summary: 'Two new Proxy Binding Acknowledgement status codes are defined: NOT_AUTHORIZED_FOR_DELEGATED_MNP (177) meaning the MR is not authorized for DMNP, and REQUESTED_DMNP_IN_USE (178) meaning the requested DMNP is already allocated. Both are allocated from the same number space as RFC 6275.'
