document: rfc-8660
kind: design-rationale
summary: SR-MPLS requires no change to the MPLS forwarding plane because Segment IDs (SIDs) are instantiated as MPLS labels and the SR header is instantiated as a stack of MPLS labels. The existing MPLS architecture (RFC 3031) accommodates SR without modification.
section: "2"
topics:
