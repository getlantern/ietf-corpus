document: rfc-8866
kind: interoperability-note
summary: The 'a=cat:' and 'a=keywds:' attributes are declared obsolete and SHOULD NOT be used; they SHOULD be ignored if received. The 'control' and 'data' media types from RFC 2327 have been removed from this specification.
