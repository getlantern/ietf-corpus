document: rfc-4682
kind: normative-requirement
summary: In non-secure provisioning modes, pktcMtaDevProvSolicitedKeyTimeout, pktcMtaDevProvUnsolicitedKeyMaxTimeout, pktcMtaDevProvUnsolicitedKeyNomTimeout, and pktcMtaDevProvUnsolicitedKeyMaxRetries MUST return zero in response to SNMP GET operations, and MUST return 'inconsistentValue' for SET operations.
