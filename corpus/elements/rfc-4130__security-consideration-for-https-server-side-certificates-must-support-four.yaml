document: rfc-4130
kind: security-consideration
summary: 'For HTTPS, server-side certificates MUST support four types: with URL in CN, without URL in CN, self-signed, and CA-certified. The complete certification chain MUST be included and all verifications MUST chain to root or an accepted trust anchor.'
section: "9.2"
