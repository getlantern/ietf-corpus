document: rfc-9502
kind: normative-requirement
summary: When a prefix advertisement is received in any LSA advertising algorithm 0 reachability and in an OSPFv2 (or OSPFv3) IP Algorithm Prefix Reachability Sub-TLV, only the algorithm 0 reachability MUST be used, and all occurrences of the IP Algorithm Prefix Reachability Sub-TLV MUST be ignored.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
