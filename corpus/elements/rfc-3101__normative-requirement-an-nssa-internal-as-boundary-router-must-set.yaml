document: rfc-3101
kind: normative-requirement
summary: An NSSA internal AS boundary router MUST set the P-bit in Type-7 LSAs whose networks it wants advertised into the OSPF domain's full transit topology, and those LSAs must have a valid non-zero forwarding address.
section: "2.4"
rfc2119_level: MUST
topics:
