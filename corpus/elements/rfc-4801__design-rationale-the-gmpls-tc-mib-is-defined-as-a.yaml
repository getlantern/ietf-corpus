document: rfc-4801
kind: design-rationale
summary: The GMPLS TC MIB is defined as a supplement to RFC 3811 (MPLS TC MIB) rather than a replacement. RFC 3811 can continue to be used alone in networks that support only MPLS, while GMPLS-specific networks import both.
