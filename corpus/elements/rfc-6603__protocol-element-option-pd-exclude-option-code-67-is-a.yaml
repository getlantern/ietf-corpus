document: rfc-6603
kind: protocol-element
summary: OPTION_PD_EXCLUDE (option code 67) is a new DHCPv6 option that identifies exactly one prefix excluded from a delegated prefix set. It is embedded in the IAprefix-options field of OPTION_IAPREFIX and there can be at most one OPTION_PD_EXCLUDE per OPTION_IAPREFIX.
section: "4.1"
topics:
    - ip
    - v6ops
