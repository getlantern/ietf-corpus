document: rfc-4970
kind: wire-format
summary: Each TLV in the RI LSA body has a 16-bit Type field, a 16-bit Length field (value portion in octets, excluding padding), and a variable-length Value field. TLVs are padded to 4-octet alignment; unrecognized types are ignored.
