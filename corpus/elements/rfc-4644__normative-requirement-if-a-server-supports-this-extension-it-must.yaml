document: rfc-4644
kind: normative-requirement
summary: If a server supports this extension, it MUST return a 203 response to MODE STREAM (or 501 if an argument is given). The MODE STREAM command MUST NOT affect server state in any way.
section: 2.3.2
rfc2119_level: MUST
