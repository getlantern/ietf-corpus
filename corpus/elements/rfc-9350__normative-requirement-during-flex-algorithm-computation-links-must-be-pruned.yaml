document: rfc-9350
kind: normative-requirement
summary: 'During Flex-Algorithm computation, links MUST be pruned in this order: (1) any color matching the Exclude Admin Group rule, (2) any SRLG matching the Exclude SRLG rule, (3) no color matching the Include-Any Admin Group rule, (4) not all colors set for the Include-All Admin Group rule, (5) required non-IGP metric not advertised for the link (a metric of 0 MUST NOT be assumed).'
section: "13"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
