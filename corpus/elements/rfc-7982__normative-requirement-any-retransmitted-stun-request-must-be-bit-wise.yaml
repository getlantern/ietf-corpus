document: rfc-7982
kind: normative-requirement
summary: Any retransmitted STUN request MUST be bit-wise identical to the previous request except for the values in the TRANSACTION_TRANSMIT_COUNTER attribute. This changes the STUN retransmission rule from RFC 5389 Section 6 for idempotent packets.
section: "3.1"
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
