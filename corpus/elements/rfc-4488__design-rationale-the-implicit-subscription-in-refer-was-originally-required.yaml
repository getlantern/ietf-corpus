document: rfc-4488
kind: design-rationale
summary: 'The implicit subscription in REFER was originally required to handle forking: it allows the REFER-Issuer to observe multiple dialogs that may be established from a forked REFER. Where the REFER-Issuer explicitly prevents forking, this requirement is unnecessary.'
section: "3"
topics:
