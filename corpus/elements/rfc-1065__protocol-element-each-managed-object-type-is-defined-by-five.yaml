summary: 'Each managed object type is defined by five fields: OBJECT (textual OBJECT DESCRIPTOR plus OBJECT IDENTIFIER), Syntax (ASN.1 abstract data structure), Definition (textual semantics), Access (read-only, read-write, write-only, or not-accessible), and Status (mandatory, optional, or obsolete).'
