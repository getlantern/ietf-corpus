document: rfc-7755
kind: protocol-element
summary: The SIIT-DC Edge Relay (ER) is an optional device or logical function that provides seemingly native IPv4 connectivity to IPv4-only applications or nodes deep inside the IPv6 IDC. It reverses the BR's translations before packets reach NAT-incompatible or IPv4-dependent components.
