document: rfc-3381
kind: interoperability-note
summary: Implementations should use the 'unknown' out-of-band value (RFC 2911 section 4.1) rather than the -2 sentinel used in some PWG MIBs (RFC 2707) when reporting unknown progress values, to maintain compatibility with the IPP attribute model.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
