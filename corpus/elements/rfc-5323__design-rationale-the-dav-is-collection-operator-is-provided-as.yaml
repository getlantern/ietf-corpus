document: rfc-5323
kind: design-rationale
summary: The DAV:is-collection operator is provided as a specific shortcut for testing whether a resource's DAV:resourcetype contains DAV:collection, instead of defining generic structure queries. Generic structure queries were considered too powerful to standardize at that time.
