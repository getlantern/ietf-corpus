document: rfc-5230
kind: normative-requirement
summary: If the Sieve variables extension is used, vacation action arguments MUST NOT have undergone variable expansion before being used in response tracking identity computation, so that a single vacation statement with a variable subject does not generate a unique response per incoming message.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - email
