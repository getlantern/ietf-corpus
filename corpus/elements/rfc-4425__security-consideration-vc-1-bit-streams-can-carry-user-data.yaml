document: rfc-4425
kind: security-consideration
summary: VC-1 bit streams can carry user-data (e.g., closed captions, content metadata) that could potentially include programmatic content such as scripts. Senders SHOULD ensure user-data is compliant with the SMPTE specification, and receivers SHOULD prevent malfunction from non-compliant user-data.
section: "7"
topics:
