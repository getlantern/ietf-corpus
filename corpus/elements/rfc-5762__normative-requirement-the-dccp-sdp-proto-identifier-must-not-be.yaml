document: rfc-5762
kind: normative-requirement
summary: The 'DCCP' SDP proto identifier MUST NOT be used to signal RTP sessions running over DCCP; those sessions MUST use a protocol identifier of the form 'DCCP/RTP/...'.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
