document: rfc-6514
kind: interoperability-note
summary: When the PMSI Tunnel Tunnel Type is PIM-SM or BIDIR-PIM, the P-Multicast Group SHOULD be the same address for all Intra-AS I-PMSI A-D routes for the same MVPN within a given AS. For PIM-SSM, RFC 4607 allows each PE to allocate the group locally without coordination with other PEs on the same MVPN.
section: "5"
topics:
