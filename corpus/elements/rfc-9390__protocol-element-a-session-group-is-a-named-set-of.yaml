document: rfc-9390
kind: protocol-element
summary: A session group is a named set of Diameter sessions to which commands can be applied in bulk. Sessions can belong to multiple groups simultaneously, and group membership is a session state that must be maintained by each Diameter node. Either the client or server may create, modify, or delete groups subject to ownership and permission rules.
section: "3.1"
topics:
    - diameter
