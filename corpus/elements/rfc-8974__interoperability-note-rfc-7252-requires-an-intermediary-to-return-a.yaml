document: rfc-8974
kind: interoperability-note
summary: RFC 7252 requires an intermediary to return a 5.04 (Gateway Timeout) if it cannot get a response within a timeout, but a stateless intermediary that does not retain client information cannot satisfy this requirement.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
