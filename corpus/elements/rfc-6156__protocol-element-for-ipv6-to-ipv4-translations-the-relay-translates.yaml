document: rfc-6156
kind: protocol-element
summary: For IPv6-to-IPv4 translations, the relay translates Type of Service, Time to Live, and Fragmentation per RFC 6145. When outgoing size exceeds MTU, the relay generates an ICMPv6 Packet Too Big error. The DONT-FRAGMENT attribute MUST be ignored.
section: "8.3"
topics:
    - nat
    - ip
    - v6ops
