document: rfc-6786
kind: normative-requirement
summary: The Encryption-Encap AVP SHALL only be used if the EAP method generates cryptographic keys (specifically the MSK). It may be used starting from the very first PANA message carrying a Result-Code AVP set to PANA_Success.
