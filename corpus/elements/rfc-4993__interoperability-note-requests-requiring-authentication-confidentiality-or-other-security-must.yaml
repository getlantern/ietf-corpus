document: rfc-4993
kind: interoperability-note
summary: Requests requiring authentication, confidentiality, or other security MUST use a different transfer protocol; IRIS-XPC (RFC 4992) is RECOMMENDED. If a request exceeds the maximum packet size even when compressed, or yields a size error, IRIS-XPC is likewise RECOMMENDED.
section: "4"
topics:
    - security
