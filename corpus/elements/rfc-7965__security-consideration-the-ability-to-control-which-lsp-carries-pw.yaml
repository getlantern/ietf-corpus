document: rfc-7965
kind: security-consideration
summary: The ability to control which LSP carries PW traffic is a potential security risk for denial of service and traffic interception. It is RECOMMENDED that PEs not accept LSPs identified in the PSN Tunnel Binding TLV unless the LSP endpoints match the PW or PW segment endpoints, and that PEs implement LDP security mechanisms from RFC 5036 and RFC 5920.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
