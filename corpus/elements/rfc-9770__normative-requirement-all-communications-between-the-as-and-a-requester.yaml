document: rfc-9770
kind: normative-requirement
summary: All communications between the AS and a requester at the TRL endpoint MUST be encrypted, integrity-protected, and replay-protected. Responses from the AS MUST be bound to their corresponding requests. The AS MUST prevent access to the TRL endpoint by entities other than registered devices and authorized administrators.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
