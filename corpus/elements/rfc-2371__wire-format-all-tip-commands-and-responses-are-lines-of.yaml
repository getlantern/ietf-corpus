document: rfc-2371
kind: wire-format
summary: All TIP commands and responses are lines of ASCII text using only octets 32–126 inclusive, terminated by CR (0x0D) or LF (0x0A). Words within a line are separated by one or more space octets. The first word identifies the command or response type in upper-case letters only.
