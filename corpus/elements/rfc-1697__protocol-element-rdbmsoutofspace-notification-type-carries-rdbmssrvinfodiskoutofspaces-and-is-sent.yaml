document: rfc-1697
kind: protocol-element
summary: rdbmsOutOfSpace NOTIFICATION-TYPE carries rdbmsSrvInfoDiskOutOfSpaces and is sent when a managed server cannot allocate disk space for a managed database. Neither trap is part of a conformance group and neither is required for compliance.
