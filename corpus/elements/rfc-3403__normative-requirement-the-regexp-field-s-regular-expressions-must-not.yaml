document: rfc-3403
kind: normative-requirement
summary: The REGEXP field's regular expressions MUST NOT be used cumulatively; they MUST only be applied to the original string held by the client, never to a domain name produced by a previous NAPTR rewrite.
section: "4.1"
rfc2119_level: MUST NOT
