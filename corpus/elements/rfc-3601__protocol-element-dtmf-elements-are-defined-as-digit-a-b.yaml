document: rfc-3601
kind: protocol-element
summary: DTMF elements are defined as DIGIT / "#" / "*" / "A" / "B" / "C" / "D". These apply only to DTMF operations and are NOT used for alphabetic characters mapped to digits on phone keypads in some countries.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
