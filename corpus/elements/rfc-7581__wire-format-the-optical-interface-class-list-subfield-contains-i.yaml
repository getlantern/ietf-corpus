document: rfc-7581
kind: wire-format
summary: The Optical Interface Class List Subfield contains I/O flags (indicating whether the list applies to input, output, or both) and an Optical Interface Classes structure. A 1-bit Standard flag (S) distinguishes ITU application codes (S=1, OI Code Points 1–4) from non-ITU codes (S=0). Each Optical Interface Class entry is 64 bits.
section: "4.1"
