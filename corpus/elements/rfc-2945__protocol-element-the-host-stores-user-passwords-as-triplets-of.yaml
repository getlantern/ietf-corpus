document: rfc-2945
kind: protocol-element
summary: The host stores user passwords as triplets of the form { <username>, <password verifier>, <salt> }. The verifier is computed as v = g^x % N where x = SHA(<salt> | SHA(<username> | ':' | <raw password>)). This ensures the host never stores the raw password.
section: "3"
topics:
    - crypto
    - security
