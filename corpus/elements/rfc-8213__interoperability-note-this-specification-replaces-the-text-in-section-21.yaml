document: rfc-8213
kind: interoperability-note
summary: This specification replaces the text in Section 21.1 of RFC 3315 (DHCPv6) when followed. RFC 3315 stated IPsec should be used but did not require encryption; this document upgrades that to a MUST with encryption required.
