document: rfc-3253
kind: state-machine
summary: 'A version-controlled resource transitions between checked-in (has DAV:checked-in, no DAV:checked-out) and checked-out (has DAV:checked-out, no DAV:checked-in) states. Triggers: CHECKOUT moves checked-in → checked-out; CHECKIN or UNCHECKOUT moves checked-out → checked-in.'
section: "1.3"
topics:
