document: rfc-9107
kind: interoperability-note
summary: BGP ORR can be deployed in both hop-by-hop forwarding networks and end-to-end tunneled environments. To avoid routing loops in networks with multiple route reflectors using hop-by-hop forwarding without encapsulation, the network topology must be carefully considered when designing a route reflection topology.
section: "4"
topics:
