document: rfc-919
kind: normative-requirement
summary: A host's IP receiving layer must compare incoming destination addresses against all possible broadcast addresses for that host, in addition to its own unicast addresses. Without this modification, broadcast datagrams would be incorrectly discarded.
section: "5"
rfc2119_level: MUST
topics:
    - ip
