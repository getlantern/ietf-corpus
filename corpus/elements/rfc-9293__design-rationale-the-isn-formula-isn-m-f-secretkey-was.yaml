document: rfc-9293
kind: design-rationale
summary: The ISN formula ISN = M + F(..., secretkey) was chosen to combine a monotonically increasing timer (preventing sequence number reuse within an MSL for the same connection incarnation) with a per-connection cryptographic PRF (preventing off-path attackers from predicting ISNs). Without the PRF component, an attacker observing one connection's ISN could guess ISNs for other connections.
section: 3.4.1
topics:
    - tcp
    - security
