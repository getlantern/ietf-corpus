document: rfc-5886
kind: normative-requirement
summary: For general monitoring requests, the Current-processing-time field of the PROC-TIME object MUST be cleared; when the E (Estimated) bit is set, Min/Max/Average/Variance-processing-time MUST be set to 0x00000000.
