summary: 'The Extended IP Reachability TLV (type 135) encodes each prefix entry as: 4-octet metric, 1-octet control (1 bit up/down, 1 bit sub-TLV presence, 6 bits prefix length), 0-4 octets of IPv4 prefix (minimal encoding by significant bits), and optional sub-TLVs preceded by a 1-octet length field.'
