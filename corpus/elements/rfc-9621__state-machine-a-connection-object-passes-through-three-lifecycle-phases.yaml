document: rfc-9621
kind: state-machine
summary: 'A Connection object passes through three lifecycle phases: Preestablishment (configuring Preconnection with Endpoint Identifiers, Properties, Security Parameters), Established (sending/receiving Messages, receiving events such as Connection Ready and Path Properties Changed), and Termination (Close for graceful end or Abort for immediate drop). Establishment is triggered by Initiate, Listen, or Rendezvous actions.'
section: "4.1"
topics:
