document: rfc-4872
kind: interoperability-note
summary: The PRIMARY_PATH_ROUTE object MAY only be used when all GMPLS nodes along the path support it. Its Class-Num (0bbbbbbb form) ensures non-supporting nodes return a PathErr 'Unknown Object Class' rather than silently passing it, making its deployment scope explicitly negotiated.
section: "15.3"
topics:
