document: rfc-5465
kind: wire-format
summary: The OLDNAME extended LIST data item is defined as 'OLDNAME SP "(" mailbox ")"' and is returned in a LIST response when a mailbox is renamed, conveying the previous mailbox name. The \NoAccess name attribute is added to mbx-list-oflag.
