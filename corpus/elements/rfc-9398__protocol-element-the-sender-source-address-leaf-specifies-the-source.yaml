document: rfc-9398
kind: protocol-element
summary: The sender-source-address leaf specifies the source address used in IGMP/MLD membership report and leave messages sent by the proxy. For IGMP it is inet:ipv4-address-no-zone; for MLD it is inet:ipv6-address-no-zone.
