document: rfc-7159
kind: wire-format
summary: A JSON string is delimited by quotation marks (0x22). Characters that must be escaped include quotation mark, reverse solidus, and control characters U+0000–U+001F. Non-BMP characters are encoded as 12-character UTF-16 surrogate pair escape sequences (e.g., `\uD834\uDD1E`).
