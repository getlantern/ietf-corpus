document: rfc-5056
kind: normative-requirement
summary: Applications that desire confidentiality protection MUST use application-layer session protection services for confidentiality when the bound channel does not provide it. The integrity of a secure channel MUST NOT be weakened should its channel bindings be revealed to an attacker; i.e., the construction MUST NOT leak secret information about the channel.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
