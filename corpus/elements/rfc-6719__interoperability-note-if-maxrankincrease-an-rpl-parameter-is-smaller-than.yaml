document: rfc-6719
kind: interoperability-note
summary: If MaxRankIncrease (an RPL parameter) is smaller than PARENT_SWITCH_THRESHOLD (an MRHOF parameter), a node may enter a state where its preferred parent causes a Rank increase exceeding MaxRankIncrease but MRHOF does not switch parents, potentially causing the node to leave the routing topology.
section: "6.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
