document: rfc-2459
kind: protocol-element
summary: 'The Key Usage extension (OID id-ce 15) defines the intended purpose of the key as a BIT STRING with named bits: digitalSignature (0), nonRepudiation (1), keyEncipherment (2), dataEncipherment (3), keyAgreement (4), keyCertSign (5), cRLSign (6), encipherOnly (7), decipherOnly (8). When used, this extension SHOULD be marked critical.'
section: 4.2.1.3
topics:
