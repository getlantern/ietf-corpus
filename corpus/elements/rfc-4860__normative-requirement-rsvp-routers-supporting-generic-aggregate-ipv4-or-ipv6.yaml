document: rfc-4860
kind: normative-requirement
summary: RSVP routers supporting generic aggregate IPv4 or IPv6 reservations MUST support the GENERIC-AGGREGATE-IP4 SESSION or GENERIC-AGGREGATE-IP6 SESSION object, respectively. Routers supporting aggregation MUST support GENERIC-AGG-IP4-SOI or GENERIC-AGG-IP6-SOI accordingly.
section: "2"
rfc2119_level: MUST
