document: rfc-6570
kind: interoperability-note
summary: 'URI Templates are not URIs: they do not identify a resource, are not parsed as URIs, and SHOULD NOT be used where a URI is expected unless the template will be expanded prior to use. Distinct field, element, or attribute names should differentiate protocol elements carrying a URI Template from those expecting a URI reference.'
section: "1.4"
topics:
    - http
