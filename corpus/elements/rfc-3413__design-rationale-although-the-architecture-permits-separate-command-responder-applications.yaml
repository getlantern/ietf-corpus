document: rfc-3413
kind: design-rationale
summary: Although the architecture permits separate command responder applications to register for different PDU types on the same engine, only a single command responder should be registered at any given time because multiple registrations for the same contextEngineID and pduType are explicitly denied.
section: "3.2"
