document: rfc-9465
kind: interoperability-note
summary: The PIM Packed Null-Register packet format should be enabled only if it is supported by all routers in the Anycast-RP set (RFC 4610). This applies equally to PIM Anycast RP deployments using MSDP (RFC 3446).
section: "6.1"
topics:
    - multicast
    - routing
