document: rfc-8066
kind: design-rationale
summary: NALP dispatch codes only provide an escape method for non-6LoWPAN payloads when they appear as the initial octet of a LoWPAN encapsulation. ESC dispatch types are orthogonal to NALP octets since ESC is part of the 6LoWPAN extended dispatch space.
section: "3.4"
topics:
