document: rfc-2266
kind: state-machine
summary: 'vgRptrPortOperStatus defines three states: inactive(2) during initialization or link warning; training(3) when Training_Up is received on a local port or Training_Down on a cascade port; active(1) after 24 consecutive good FCS packets are exchanged and configuration bits are acceptable. A disabled port always reports inactive(2).'
