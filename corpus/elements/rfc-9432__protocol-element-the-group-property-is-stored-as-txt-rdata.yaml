document: rfc-9432
kind: protocol-element
summary: The group property is stored as TXT RDATA directly below the member node. Its value is opaque and interpreted solely by agreement between producer and consumer(s). A member zone may carry multiple group values; consumers MUST ignore group values they do not understand.
section: 4.3.2
topics:
    - dns
