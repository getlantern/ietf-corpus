summary: 'The Connectionless Data Response (CLDR) message reports errors in a received CLDT when the return-on-error option is set. Mandatory parameters: Routing Context, SCCP Cause, Source Address, Destination Address. Covers SCCP UDTS, XUDTS, and LUDTS messages.'
