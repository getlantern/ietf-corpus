document: rfc-1184
kind: design-rationale
summary: The client side is given control over special character settings rather than having each side use its own defaults independently. This ensures the user's local special characters govern the session. A full-featured client exports its characters; a terminal server without local defaults imports the server's characters.
section: "5.5"
