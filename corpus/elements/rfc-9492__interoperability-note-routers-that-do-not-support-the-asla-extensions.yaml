document: rfc-9492
kind: interoperability-note
summary: Routers that do not support the ASLA extensions will only process legacy RSVP-TE advertisements and may incorrectly infer RSVP-TE is enabled on links where only non-RSVP-TE application attributes are being advertised. Migration requires sending both legacy and application-specific advertisements simultaneously before cutover.
section: 12.3.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
