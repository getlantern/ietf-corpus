document: rfc-4668
kind: protocol-element
summary: radiusAuthClientCounterDiscontinuity (TimeTicks, UNITS centiseconds) records the time since the last discontinuity in the RADIUS client counters, such as a reinitialization of the RADIUS Client module. All Counter32 objects in radiusAuthServerExtTable reference this object to allow management applications to detect and account for counter resets.
section: "7"
topics:
