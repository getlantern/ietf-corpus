document: rfc-4605
kind: normative-requirement
summary: The proxy device MUST NOT perform the router portion of IGMP/MLD on its upstream interface. It performs the router portion only on downstream interfaces and the host portion on the upstream interface.
section: "3"
rfc2119_level: MUST NOT
topics:
    - multicast
