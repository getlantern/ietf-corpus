document: rfc-7964
kind: normative-requirement
summary: For a particular <AFI, SAFI>, a confederation ASBR MUST include that <AFI, SAFI> with the 'Send/Receive' field set to 2 or 3 in the ADD-PATH Capability advertised to both IBGP peers and confederation-external peers.
section: "5.2"
rfc2119_level: MUST
