document: rfc-8362
kind: normative-requirement
summary: Documents defining future TLVs or sub-TLVs for Extended LSAs MUST specify whether partial deployment is supported, and MUST provide backward-compatibility and deployment procedures accordingly. All future TLVs or sub-TLVs must be optional at the top level.
section: "6.3"
rfc2119_level: MUST
