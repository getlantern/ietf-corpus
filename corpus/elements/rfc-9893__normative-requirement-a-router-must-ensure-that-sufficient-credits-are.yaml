document: rfc-9893
kind: normative-requirement
summary: A router MUST ensure that sufficient credits are available in the associated credit window for the current data packet before sending that data packet to the modem. The count of octets includes MAC overhead (framing, header, and trailer).
section: "2.1"
rfc2119_level: MUST
topics:
    - qos
    - congestion
