document: rfc-1905
kind: normative-requirement
summary: If non-repeaters or max-repetitions values in a GetBulkRequest-PDU are less than zero, they MUST be treated as zero. The response may contain fewer bindings than requested if size constraints are exceeded, all repetitions are endOfMibView, or processing time is excessive (with at least one repetition completed).
section: 4.2.3
rfc2119_level: MUST
topics:
    - snmp
