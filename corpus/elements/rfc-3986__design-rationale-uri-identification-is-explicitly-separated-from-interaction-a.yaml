document: rfc-3986
kind: design-rationale
summary: 'URI identification is explicitly separated from interaction: a URI only identifies a resource; access is neither guaranteed nor implied by the presence of a URI. Operations on resources are defined by protocols that use URIs, not by the URI syntax itself.'
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
