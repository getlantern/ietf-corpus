document: rfc-3320
kind: protocol-element
summary: The SigComp feedback mechanism allows a compressor to piggyback a feedback request onto a message; the remote UDVM forwards the data via the state handler to the appropriate peer compressor, which returns it piggybacked on a subsequent SigComp message.
section: "3.2"
