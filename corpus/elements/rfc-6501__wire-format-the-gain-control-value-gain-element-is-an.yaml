document: rfc-6501
kind: wire-format
summary: The gain control value (<gain> element) is an integer typed as xsd:int with minInclusive='-127' and maxInclusive='127', representing audio amplification applied to a media output stream. The time-type used for scheduling offsets is xsd:dateTime with pattern '.+T.+Z.*' (UTC required).
