document: rfc-3477
kind: protocol-element
summary: An Unnumbered Interface ID subobject belongs to an abstract node if that node's Router ID matches the subobject's Router ID field and the node has an unnumbered link or Forwarding Adjacency whose local identifier equals the subobject's Interface ID. ERO processing then follows RFC 3209 section 4.3.4.1.
section: "4.2"
topics:
    - mpls
    - routing
