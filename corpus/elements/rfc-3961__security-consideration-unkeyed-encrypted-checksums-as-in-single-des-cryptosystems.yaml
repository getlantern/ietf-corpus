document: rfc-3961
kind: security-consideration
summary: 'Unkeyed encrypted checksums (as in single-DES cryptosystems from RFC 1510) allow cut-and-paste attacks and are vulnerable to chosen-plaintext attacks: an attacker with access to an encryption oracle can encrypt the required unkeyed checksum with chosen plaintext, enabling forgery and cross-protocol attacks from Kerberos v4 to v5.'
section: "10"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
