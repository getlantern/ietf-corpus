document: rfc-7260
kind: interoperability-note
summary: An egress LSR not supporting these extensions silently ignores the new LSP attribute flags and OAM Configuration TLV per RFC 5420. An ingress LSR can detect this by noting the absence of the OAM Configuration TLV in the Resv message, and SHOULD tear down the LSP or re-signal without OAM configuration.
section: "3.1"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
