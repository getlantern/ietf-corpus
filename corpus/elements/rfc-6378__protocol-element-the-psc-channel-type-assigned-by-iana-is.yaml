document: rfc-6378
kind: protocol-element
summary: The PSC channel type assigned by IANA is PSC-CT=0x0024, carried in the G-ACh as specified by RFC 5586. There is a single channel type for all PSC messages; the actual message function is identified by the Request field of the ACH payload.
