document: rfc-2616
kind: normative-requirement
summary: Whenever a transfer-coding is applied to a message-body, the set MUST include 'chunked' unless the message is terminated by closing the connection. 'chunked' MUST be the last transfer-coding applied and MUST NOT be applied more than once to a message-body.
section: "3.6"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
