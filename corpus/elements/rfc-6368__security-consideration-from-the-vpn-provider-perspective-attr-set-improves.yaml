document: rfc-6368
kind: security-consideration
summary: From the VPN provider perspective, ATTR_SET improves security by enforcing separation between CE-advertised BGP attributes and provider network attributes. Without this mechanism, a CE can inject extended communities or other attributes with provider-network semantics unless explicitly filtered by PE configuration.
section: "9"
topics:
    - bgp
    - vpn
    - security
