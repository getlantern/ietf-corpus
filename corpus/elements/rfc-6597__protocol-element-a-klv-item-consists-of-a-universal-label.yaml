document: rfc-6597
kind: protocol-element
summary: A KLV item consists of a Universal Label Key (fixed-length 16-byte SMPTE-administered Universal Label), a Length field, and a Value field, as defined in SMPTE ST 336. The Key identifies the data, the Length specifies the data length, and the Value is the data itself.
