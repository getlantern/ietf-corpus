document: rfc-2035
kind: protocol-element
summary: For types 4/5, the TSPEC field in each packet carries RCOUNT (restart interval counter starting at 0) for the first packet of an interval, 254 for interior packets, and 255 for the final packet. This enables a receiver to identify and independently decode complete restart intervals.
section: "4.1"
