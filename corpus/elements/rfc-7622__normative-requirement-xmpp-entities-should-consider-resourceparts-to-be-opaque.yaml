document: rfc-7622
kind: normative-requirement
summary: XMPP entities SHOULD consider resourceparts to be opaque strings and SHOULD NOT impute meaning to any given resourcepart; the '/' separator does not imply hierarchical addressing, and '@' in a resourcepart does not denote a localpart.
