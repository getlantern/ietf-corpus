document: rfc-2126
kind: normative-requirement
summary: It is strongly recommended that the CC TPDU always explicitly specify the maximum TPDU size value, because the default maximum TPDU size of 65531 octets violates the ISO Transport negotiation rule that the CC TPDU cannot propose a size greater than the CR TPDU.
section: "6.4"
rfc2119_level: RECOMMENDED
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
