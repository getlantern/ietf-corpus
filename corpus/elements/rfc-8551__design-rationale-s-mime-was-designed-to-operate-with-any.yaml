document: rfc-8551
kind: design-rationale
summary: S/MIME was designed to operate with any MIME transport (HTTP, SIP, etc.), not just email. The object-based approach — wrapping CMS content types in MIME — allows secure messages to be exchanged across mixed-transport systems and by automated agents that may only send or only receive.
section: "1"
topics:
