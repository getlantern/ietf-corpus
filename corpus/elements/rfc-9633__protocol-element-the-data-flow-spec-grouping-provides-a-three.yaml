summary: 'The ''data-flow-spec'' grouping provides a three-way choice of App-flow type: ''tsn-app-flow'' (L2 header via l2-header: src/dst MAC, ethertype, VLAN ID, PCP), ''ip-app-flow'' (IP 6-tuple via ip-flow-id), or ''mpls-app-flow'' (MPLS label stack with context or platform label-space choice).'
