document: rfc-4124
kind: normative-requirement
summary: A DS-TE LSR that does advertise BCs MUST use the new 'Bandwidth Constraints' sub-TLV in addition to the existing Maximum Reservable Bandwidth sub-TLV. Advertising BCs is optional (MAY), but when done the new sub-TLV is required.
section: "5.1"
rfc2119_level: MUST
topics:
