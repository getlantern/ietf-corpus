document: rfc-5996
kind: security-consideration
summary: 'Traffic Selector authorization must be enforced: a security gateway MUST NOT permit an initiator to claim Traffic Selectors broader than those its authenticated identity is authorized to protect. Failure allows a compromised peer to intercept or inject traffic for IP addresses it does not own.'
section: "5.1"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
