document: rfc-4918
kind: security-consideration
summary: 'Processing XML from untrusted sources creates risks: XML entity expansion attacks can cause denial of service. Servers MAY reject questionable well-formed XML requests, e.g., those with excessive entity references, with 400 Bad Request.'
