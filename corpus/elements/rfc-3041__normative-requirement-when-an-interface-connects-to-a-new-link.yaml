document: rfc-3041
kind: normative-requirement
summary: When an interface connects to a new link, a new randomized interface identifier should be generated immediately along with a new set of temporary addresses. This ensures different randomized identifiers are used on different links, preventing correlation of addresses across link changes.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
