document: rfc-2032
kind: interoperability-note
summary: Support of H.261-specific control packets (FIR/NACK) by the H.261 sender is optional. Early experiments showed that their use can have very negative effects when the number of sites is large; they should be used with caution and, in practice (e.g., IVS), only in point-to-point or small (<10 participant) sessions.
section: "5.1"
topics:
