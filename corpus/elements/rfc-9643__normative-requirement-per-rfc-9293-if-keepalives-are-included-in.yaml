document: rfc-9643
kind: normative-requirement
summary: Per RFC 9293, if keepalives are included in a TCP implementation, the application MUST be able to turn them on or off for each TCP connection, and keepalives MUST default to off. The 'keepalives' presence container in the YANG model aligns to this requirement.
section: 2.1.5
rfc2119_level: MUST
topics:
    - tcp
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
