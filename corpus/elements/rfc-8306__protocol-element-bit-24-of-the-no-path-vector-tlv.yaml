document: rfc-8306
kind: protocol-element
summary: Bit 24 of the NO-PATH-VECTOR TLV (carried in the NO-PATH object) is defined as 'P2MP Reachability Problem'; when set it indicates that all or a subset of P2MP destinations are unreachable. The PCE may optionally enumerate unreachable destinations in an UNREACH-DESTINATION object.
section: "3.16"
topics:
