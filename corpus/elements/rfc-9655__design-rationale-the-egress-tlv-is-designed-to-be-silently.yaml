document: rfc-9655
kind: design-rationale
summary: The Egress TLV is designed to be silently droppable by transit nodes that do not recognize it, allowing the headend to continue sending echo requests with the TLV until the egress node processes it. This allows egress validation without requiring upgrades to intermediate transit nodes.
section: "2"
