document: rfc-8254
kind: registry
summary: IANA maintains the Uniform Resource Names (URN) Namespaces registry. This document directs IANA to update the ISBN and ISSN namespace entries to reflect new RFC 8141-compliant templates, and instructs IANA to maintain a registry whose contents may reflect both old-style and new-style templates simultaneously.
section: "6"
