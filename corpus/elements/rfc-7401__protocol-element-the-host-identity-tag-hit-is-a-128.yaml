document: rfc-7401
kind: protocol-element
summary: The Host Identity Tag (HIT) is a 128-bit self-certifying hash of the Host Identity, structured as an ORCHID with an IANA-assigned IPv6 prefix, a 4-bit OGA field encoding the HIT Suite ID, and a 96-bit truncated hash. Its fixed length matches an IPv6 address, enabling use in fixed-size API and protocol fields.
section: "3.1"
topics:
