document: rfc-5838
kind: normative-requirement
summary: If the IPv6 and IPv4 MTUs differ, the M6-bit MUST be set for non-IPv6 address families. An OSPFv3 router SHOULD NOT set the M6-bit if its IPv6 MTU and address-family-specific MTU are the same.
section: "2.7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
