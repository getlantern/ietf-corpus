kind: security-consideration
summary: 'G.711.0 has no known denial-of-service vulnerability from decoding: the decompression algorithm has a finite worst-case path (no infinite loops), and internal buffer reads are bounded to at most 321 octets per decode request, preventing buffer overruns from malformed payloads.'
