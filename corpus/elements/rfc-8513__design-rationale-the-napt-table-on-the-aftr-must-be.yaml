document: rfc-8513
kind: design-rationale
summary: The NAPT table on the AFTR must be extended with the source IPv6 address of incoming packets (b4-ipv6-address) because multiple B4 elements may use overlapping private IPv4 address spaces; the IPv6 source address is the only field that uniquely disambiguates subscribers.
