document: rfc-8231
kind: normative-requirement
summary: A PCC MUST send each LSP State Report to each stateful PCE connected to it. Once an LSP is up, the PCC MUST send a PCRpt indicating status 'Up'; if the LSP cannot be set up, the PCC MUST send a PCRpt indicating 'Down' with the failure cause.
section: 5.8.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
