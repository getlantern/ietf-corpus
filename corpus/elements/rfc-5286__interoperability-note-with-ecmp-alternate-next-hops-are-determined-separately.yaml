document: rfc-5286
kind: interoperability-note
summary: With ECMP, alternate next-hops are determined separately for each primary next-hop. Other primary next-hops are not guaranteed to provide protection against all failure scenarios of concern; for example, two ECMP next-hops over the same link cannot protect each other against link failure.
section: "3.4"
topics:
