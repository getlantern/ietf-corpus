document: rfc-5302
kind: protocol-element
summary: L1->L2 inter-area routes are advertised in L2 LSPs in TLV 128 with the up/down bit set to zero and internal metric-type; they are indistinguishable from L2 intra-area routes. L2->L1 inter-area routes are advertised in L1 LSPs in TLV 128 with the up/down bit set to one.
section: "3.1"
topics:
    - routing
