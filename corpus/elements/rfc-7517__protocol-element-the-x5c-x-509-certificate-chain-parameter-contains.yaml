document: rfc-7517
kind: protocol-element
summary: The "x5c" (X.509 certificate chain) parameter contains a JSON array of base64-encoded (not base64url) DER-encoded PKIX certificates. The first certificate MUST contain the key value, followed optionally by the issuing chain; the key in the first certificate MUST match the JWK's public key.
section: "4.7"
topics:
    - jose
    - pkix
    - crypto
