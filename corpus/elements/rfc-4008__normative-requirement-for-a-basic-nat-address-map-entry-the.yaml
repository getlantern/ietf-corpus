document: rfc-4008
kind: normative-requirement
summary: For a Basic NAT address map entry, the port objects natAddrMapLocalPortFrom, natAddrMapLocalPortTo, natAddrMapGlobalPortFrom, and natAddrMapGlobalPortTo MUST all be zero. Non-zero port values are only valid for NAPT entries.
