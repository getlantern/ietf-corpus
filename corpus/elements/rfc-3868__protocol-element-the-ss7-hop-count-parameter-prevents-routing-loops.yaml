document: rfc-3868
kind: protocol-element
summary: The SS7 Hop Count parameter prevents routing loops in relay scenarios. The originating node sets the counter to a maximum value (≤15); each relay node decrements it. When the counter reaches zero, return or refusal procedures are invoked with reason 'Hop counter violation'.
section: 1.5.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
