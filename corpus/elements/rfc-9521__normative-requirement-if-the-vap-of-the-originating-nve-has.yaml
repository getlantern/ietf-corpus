document: rfc-9521
kind: normative-requirement
summary: If the VAP of the originating NVE has no IP address, then the Source IP MUST be 0.0.0.0 for IPv4 or ::/128 for IPv6; if the terminating NVE VAP has no IP address, Destination IP MUST be 127.0.0.1 for IPv4 or ::1/128 for IPv6.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
