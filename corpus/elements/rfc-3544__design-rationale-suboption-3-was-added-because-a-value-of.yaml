document: rfc-3544
kind: design-rationale
summary: Suboption 3 was added because a value of 0 in TCP_SPACE or NON_TCP_SPACE in RFC 2509 actually meant one context rather than zero, making it impossible to negotiate disabling TCP-only or non-TCP-only compression.
