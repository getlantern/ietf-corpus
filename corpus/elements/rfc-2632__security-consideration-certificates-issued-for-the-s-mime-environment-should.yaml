document: rfc-2632
kind: security-consideration
summary: Certificates issued for the S/MIME environment SHOULD NOT contain critical extensions other than Basic Constraints, Key Usage, authorityKeyID, subjectKeyID, and subjectAltNames; other extensions SHOULD be marked non-critical to avoid processing failures.
