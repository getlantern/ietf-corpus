document: rfc-7487
kind: normative-requirement
summary: Intermediate nodes SHOULD NOT process or modify any OAM Configuration TLVs but simply forward them to the end node. The sole exception is the MPLS OAM FMS Sub-TLV, which MUST be examined even by intermediate nodes that support these extensions.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - mpls
