document: rfc-9495
kind: normative-requirement
summary: The input domain to the CAA discovery algorithm SHALL be the domain "part" (per RFC 5322) of the email address being certified. If that domain is an Internationalized Domain Name containing U-Labels, all U-Labels MUST be converted to their A-Label representation (per RFC 5891) before discovery.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
