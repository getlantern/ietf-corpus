document: rfc-5946
kind: protocol-element
summary: 'Error Code 36: Unrecoverable Receiver Proxy Error is used in PathErr ERROR_SPEC when the Receiver Proxy receives a ResvErr with any error code other than 1 or 2. The 16-bit Error Value field encodes the original error code in the low 8 bits when the high 8 bits are set to 0x01.'
section: 3.1.2
topics:
