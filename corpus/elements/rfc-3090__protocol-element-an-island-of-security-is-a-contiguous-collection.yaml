document: rfc-3090
kind: protocol-element
summary: An 'island of security' is a contiguous collection of secured zones at or below a zone whose public key is pre-configured in resolvers. It is bounded at the bottom by delegations to unsecured zones. Resolvers not pre-configured for the island's root key will see it as unsecured.
section: "1.2"
topics:
    - dns
    - security
