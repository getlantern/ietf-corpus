document: rfc-7212
kind: protocol-element
summary: The G-ACh Advertisement Protocol (GAP) operates by having a configured endpoint transmit GAP messages over the G-ACh associated with an MPLS LSP, pseudowire, or section. Messages carry a collection of TLV objects organized per-application, identified by Application IDs from an IANA registry.
section: "2"
topics:
