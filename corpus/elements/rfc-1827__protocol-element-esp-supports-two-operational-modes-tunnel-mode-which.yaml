document: rfc-1827
kind: protocol-element
summary: 'ESP supports two operational modes: Tunnel-mode, which encapsulates an entire IP datagram inside ESP within a new cleartext IP header; and Transport-mode, which encapsulates only the transport-layer frame (e.g., TCP, UDP, ICMP) and inserts the ESP header immediately before the transport-layer header.'
