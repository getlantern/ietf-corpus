document: rfc-9393
kind: protocol-element
summary: The concise-swid-tag map is the root CBOR structure for a CoSWID tag. It contains required fields tag-id (index 0), software-name (index 1), entity (index 2), and tag-version (index 12), plus optional fields including corpus, patch, supplemental, software-version, version-scheme, link, payload, and evidence.
