document: rfc-4348
kind: protocol-element
summary: The CMR (Codec Mode Request) field is a 4-bit value in the payload header indicating the desired VMR-WB operating mode for the encoder at the receiver. CMR=15 means no preference; CMR values 7–14 are reserved. The mode request remains valid until overridden by a new CMR.
section: 6.3.2
topics:
