document: rfc-6793
kind: design-rationale
summary: The 'attribute discard' approach was chosen for malformed AS4_PATH and AS4_AGGREGATOR attributes rather than treating them as hard errors, because two-octet AS numbers dominate during the transition period and the AS_PATH attribute carried by OLD speakers remains the authoritative path source.
