document: rfc-7552
kind: normative-requirement
summary: A Dual-stack LSR MUST convey the same transport connection preference (TR field value) in all link and targeted Hellos that advertise the same label space to the same peer and/or on the same interface, ensuring consistent active/passive role determination across multiple Hello adjacencies.
section: 6.1.1
rfc2119_level: MUST
