document: rfc-8560
kind: design-rationale
summary: All logic for seamless integration between (PBB-)EVPN and (PBB-)VPLS resides on the EVPN PEs, not the VPLS PEs. This allows VPLS PEs to remain unchanged — no software or hardware upgrade required — enabling brownfield deployment of EVPN into existing VPLS networks.
