document: rfc-1516
kind: protocol-element
summary: rptrMonitorPortTotalErrors (rptrMonitorPortEntry 15) is a Counter summing FCSErrors, AlignmentErrors, FrameTooLongs, ShortEvents, LateEvents, VeryLongEvents, and DataRateMismatches for a port. It is explicitly redundant but included to optimize management traffic by avoiding retrieval of seven individual counters.
section: "3.3"
