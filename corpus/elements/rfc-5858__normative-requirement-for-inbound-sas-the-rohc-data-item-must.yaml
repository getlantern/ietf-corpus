document: rfc-5858
kind: normative-requirement
summary: For inbound SAs, the ROHC Data Item MUST specify decompressor channel parameters; for outbound SAs it MUST specify compressor channel parameters. The ROHC Data Item for both directions MUST include the integrity algorithm, its key, and ICV length.
section: "3.2"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
