document: rfc-9443
kind: interoperability-note
summary: The multiplexing scheme described in this document is compatible with QUIC version 2 (RFC 9369) but is not compatible with QUIC bit greasing (RFC 9287). Implementations wishing to use port multiplexing must refrain from advertising or using the grease_quic_bit transport parameter.
section: "1"
topics:
