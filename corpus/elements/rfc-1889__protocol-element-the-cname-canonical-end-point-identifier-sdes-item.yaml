document: rfc-1889
kind: protocol-element
summary: The CNAME (canonical end-point identifier) SDES item provides a persistent binding to an RTP participant that remains constant across SSRC changes due to conflicts or restarts. It should be unique per session and fixed across all RTP sessions belonging to the same multimedia conference participant.
section: 6.4.1
topics:
    - rtp
    - realtime
