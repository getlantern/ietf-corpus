document: rfc-8330
kind: normative-requirement
summary: The Availability SCSI-TLV MUST NOT be sent in ISCDs with Switching Capability field values that have not been defined to support it; non-supporting nodes would interpret such an ISCD/LSA as malformed.
section: "4.2"
rfc2119_level: MUST NOT
