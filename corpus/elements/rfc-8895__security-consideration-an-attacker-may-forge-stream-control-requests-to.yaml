document: rfc-8895
kind: security-consideration
summary: An attacker may forge stream control requests to disrupt other clients' update streams. The server SHOULD use HTTPS to protect the control URI in transit and SHOULD assign sufficiently random control URIs to resist guessing, and SHOULD detect repeated failed attempts.
section: "10.3"
topics:
    - security
    - http
