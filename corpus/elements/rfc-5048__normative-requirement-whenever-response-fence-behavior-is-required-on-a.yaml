document: rfc-5048
kind: normative-requirement
summary: Whenever Response Fence behavior is required on a multi-connection session, the target MUST wait for acknowledgement of all unacknowledged StatSNs on each connection before sending the fenced response, and MUST hold all new responses for the I_T_L nexus until the fence is cleared.
section: 3.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
