document: rfc-8534
kind: normative-requirement
summary: When an egress node supports LIR-pF and has a flow for which the match for tracking has LIR-pF set, it MUST originate a Leaf A-D route whose NLRI identifies that specific flow. A single wildcard S-PMSI A-D route may trigger multiple Leaf A-D routes, one per matched flow.
section: "5.2"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
