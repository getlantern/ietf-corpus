document: rfc-3892
kind: protocol-element
summary: The Referred-By token is an Authenticated Identity Body (AIB) as defined in RFC 3893, carried as a MIME body part identified by a Content-ID. It MUST contain copies of the Refer-To, Referred-By, and Date header fields from the REFER request, S/MIME signed and optionally encrypted.
