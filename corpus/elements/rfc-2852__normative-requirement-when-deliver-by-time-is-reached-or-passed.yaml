document: rfc-2852
kind: normative-requirement
summary: When deliver-by-time is reached or passed and by-mode is 'N', delivery attempts should continue per site policy, and the server or MTA MUST issue a 'delayed' DSN with status 4.4.7 for each applicable recipient.
