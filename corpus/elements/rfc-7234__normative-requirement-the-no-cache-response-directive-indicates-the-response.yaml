document: rfc-7234
kind: normative-requirement
summary: The no-cache response directive indicates the response MUST NOT be used to satisfy a subsequent request without successful validation on the origin server. An optional field-name argument allows suppression of specific header fields only, while permitting caching of the remainder; however, this qualified form is not widely implemented.
section: 5.2.2.2
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
