document: rfc-6526
kind: normative-requirement
summary: A Template ID MAY be reused on the same SCTP stream immediately after the Template Withdrawal Message is sent (Template Reuse Delay of 0), because in-order delivery guarantees the withdrawal arrives before the new Template definition.
section: "4.4"
rfc2119_level: MAY
topics:
    - sctp
