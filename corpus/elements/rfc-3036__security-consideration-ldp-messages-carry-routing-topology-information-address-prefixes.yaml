document: rfc-3036
kind: security-consideration
summary: LDP messages carry routing topology information (address prefixes and label bindings). An eavesdropper on an LDP session can learn the network topology. LDP provides no confidentiality mechanism; operators requiring privacy must use external means such as link-layer encryption.
section: "5.2"
topics:
    - mpls
    - routing
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
