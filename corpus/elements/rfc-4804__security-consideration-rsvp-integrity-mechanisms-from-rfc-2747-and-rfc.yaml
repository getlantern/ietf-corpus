document: rfc-4804
kind: security-consideration
summary: RSVP integrity mechanisms from RFC 2747 and RFC 3097 can be applied hop-by-hop to protect E2E RSVP messages transiting the MPLS region, using a pre-shared secret between the Aggregator and Deaggregator, which act as RSVP neighbors for E2E flows.
