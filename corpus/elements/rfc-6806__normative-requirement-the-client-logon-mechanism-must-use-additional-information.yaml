document: rfc-6806
kind: normative-requirement
summary: The client logon mechanism MUST use additional information such as the client realm and/or authorization attributes from the service ticket presented to the workstation when mapping logon credentials to a local account, rather than trusting the client name in the AS response.
section: "13"
rfc2119_level: MUST
topics:
