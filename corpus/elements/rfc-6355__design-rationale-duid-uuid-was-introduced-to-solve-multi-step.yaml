document: rfc-6355
kind: design-rationale
summary: 'DUID-UUID was introduced to solve multi-step network boot scenarios where existing DUID types (DUID-LLT, DUID-LL, DUID-EN) are inadequate: DUID-LLT and DUID-LL may vary across boot stages on multi-interface devices, and DUID-EN usage would be proprietary. UUIDs embedded in system firmware are stable across all boot stages.'
section: "2"
topics:
