document: rfc-2507
kind: wire-format
summary: 'The COMPRESSED_NON_TCP header with 8-bit CID is: 1 octet CID, 1 octet ''0|D|Generation'' (6-bit generation), optional 1-octet data (if D=1), then RANDOM fields. The 16-bit CID variant reorders to: MSB of CID, ''1|D|Generation'', LSB of CID, optional data, then RANDOM fields.'
