document: rfc-9261
kind: protocol-element
summary: 'The CertificateVerify signature is computed over: 64 octets of value 0x20, the ASCII context string ''Exported Authenticator'' (non-NUL-terminated), a single 0x00 separator octet, and Hash(Handshake Context || authenticator request || Certificate). This structure mirrors TLS 1.3''s signing input to leverage existing security analysis.'
section: 5.2.2
topics:
    - tls
    - crypto
    - security
