document: rfc-3744
kind: security-consideration
summary: The DAV:read-acl privilege exposes the full ACL including all principal URLs, enabling enumeration of users and groups. The DAV:current-user-privilege-set privilege, while less sensitive, reveals the effective permission set of the requesting user and can aid in privilege escalation attempts.
section: "12.2"
topics:
    - security
    - privacy
