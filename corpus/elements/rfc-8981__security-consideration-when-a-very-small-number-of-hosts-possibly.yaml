document: rfc-8981
kind: security-consideration
summary: When a very small number of hosts (possibly only one) share a prefix for an extended period, changing only the IID provides little privacy benefit because the prefix portion of the address acts as a constant identifier. The mechanism is most effective when the prefix is used by a large number of hosts or changes frequently.
section: "8"
topics:
    - ip
    - privacy
    - security
