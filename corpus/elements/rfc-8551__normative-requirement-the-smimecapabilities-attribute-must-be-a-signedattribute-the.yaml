document: rfc-8551
kind: normative-requirement
summary: The SMIMECapabilities attribute MUST be a SignedAttribute, the SignerInfo SignedAttributes MUST contain a single instance of it, and it MUST contain only a single AttributeValue. A signature detected as violating these requirements SHOULD be treated as failing.
section: 2.5.2
rfc2119_level: MUST
