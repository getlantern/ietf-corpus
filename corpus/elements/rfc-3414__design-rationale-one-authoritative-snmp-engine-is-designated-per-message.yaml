document: rfc-3414
kind: design-rationale
summary: 'One authoritative SNMP engine is designated per message exchange to anchor replay protection: the receiver is authoritative for Confirmed Class PDUs (requests expecting a response), and the sender is authoritative for Unconfirmed Class PDUs (traps/notifications). This avoids requiring all parties to maintain synchronized clocks.'
section: 1.5.1
topics:
    - snmp
    - security
