summary: mvpnSpmsiTable stores S-PMSI-specific information indexed by VRF name, C-multicast group address/prefix, and C-multicast source address/prefix. Each row includes a RowPointer (mvpnSpmsiPmsiPointer) linking to the corresponding generic PMSI entry in mvpnPmsiTable.
