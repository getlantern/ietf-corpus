document: rfc-9350
kind: normative-requirement
summary: Application-specific link attributes used in Flex-Algorithm calculation MUST use ASLA advertisements (RFC 8919 / RFC 8920). A new Application Identifier bit (bit 3, the X-bit) in the SABM indicates that an ASLA advertisement is associated with Flex-Algorithm. Receivers MUST accept both Administrative Group and Extended Administrative Group TLVs.
section: "12"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
