document: rfc-1356
kind: normative-requirement
summary: Every system MUST be able to receive and transmit PDUs up to at least 1600 octets. The default transmit MTU for IP SHOULD be 1500 and MUST be configurable in at least the range 576 to 1600, enabling interoperability with both RFC 877 and this specification.
section: "3.6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
