document: rfc-7862
kind: wire-format
summary: 'The netloc4 union is XDR-encoded as a discriminant (netloc_type4 enum, 4 bytes) followed by the selected arm: utf8str_cis nl_name for NL4_NAME, utf8str_cis nl_url for NL4_URL, or netaddr4 nl_addr for NL4_NETADDR. NL4_NAME values MUST be UTF-8.'
