document: rfc-5049
kind: normative-requirement
summary: The minimum state_memory_size (SMS) for SIP/SigComp is 2048 bytes per compartment, increased from the ANY/SigComp minimum of 0 bytes. An endpoint MAY offer different SMS values for different compartments as long as the value is not less than 2048 bytes.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
