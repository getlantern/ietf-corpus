document: rfc-2065
kind: protocol-element
summary: 'Two new DNS header bits are defined: AD (Authentic Data, bit 10) set in responses to indicate the server has verified the data, and CD (Checking Disabled, bit 11) set in queries to indicate the resolver accepts non-verified data. Both bits are zero in old servers and resolvers, ensuring backward compatibility.'
section: "6.1"
topics:
    - dns
    - security
