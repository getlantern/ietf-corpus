document: rfc-7529
kind: protocol-element
summary: Leap months are identified by appending the suffix 'L' to the regular month number. For example, '5L' denotes a leap month following the 5th regular month of the year. This notation is used in BYMONTH element values within RRULE.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
