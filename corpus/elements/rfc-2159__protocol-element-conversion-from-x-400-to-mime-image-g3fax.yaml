document: rfc-2159
kind: protocol-element
summary: 'Conversion from X.400 to MIME image/g3fax: (1) trailing EOL markers on each bitstring are removed, bit order is changed so highest bit of first byte is first G3Fax bit, and bitstring is padded to byte boundary; (2) six consecutive EOL markers are appended to each bitstring; (3) padded bitstrings are concatenated.'
