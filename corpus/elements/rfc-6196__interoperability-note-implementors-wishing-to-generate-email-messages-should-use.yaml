document: rfc-6196
kind: interoperability-note
summary: 'Implementors wishing to generate email messages should use the mailto: URI scheme (RFC 6068) instead. For referencing messages on IMAP, POP, or web mailstores, the imap: (RFC 5092), pop: (RFC 2384), or http: (RFC 2616) URI schemes are the appropriate alternatives.'
section: "1"
topics:
