document: rfc-3643
kind: normative-requirement
summary: Reserved Flags bits SHALL be set to zero on send. Changes in the usage of reserved Flags bits MUST be identified by changes in the Version field. Encapsulating protocols MUST NOT use reserved Flags bits in any fashion other than described in this specification.
section: "3.1"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
