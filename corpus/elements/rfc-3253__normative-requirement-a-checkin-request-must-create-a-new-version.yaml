document: rfc-3253
kind: normative-requirement
summary: A CHECKIN request MUST create a new version with a distinct new URL that MUST NOT ever identify any other resource. The URL for the new version MUST be returned in a Location response header. The content, dead properties, DAV:resourcetype, and DAV:predecessor-set MUST be copied from the checked-out resource.
section: "4.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
