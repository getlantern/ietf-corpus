document: rfc-6917
kind: normative-requirement
summary: The first <subscription> MUST contain a non-zero 'seqnumber', and each subsequent subscription MUST contain a strictly higher 'seqnumber'. A lower or equal seqnumber MUST cause the Media Server to reply with status code 405 (Wrong sequence number).
section: 5.1.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
