document: rfc-907
kind: protocol-element
summary: 'Setup layer exchanges use a 3-way handshake: (1) host sends Request to service host (logical address 0), (2) service host returns Reply, (3) host returns Reply Acknowledgment. SIMP-initiated notifications use a 2-way exchange. Each request and notification is assigned a unique ID to allow multiple outstanding operations.'
section: "6"
