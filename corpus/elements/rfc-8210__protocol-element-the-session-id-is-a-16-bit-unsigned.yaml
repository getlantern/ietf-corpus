document: rfc-8210
kind: protocol-element
summary: The Session ID is a 16-bit unsigned integer generated by the cache server at startup to uniquely identify the cache instance and bind it to the sequence of Serial Numbers it generates. It allows routers to restart a failed session knowing that their Serial Numbers are commensurate with those of the cache.
section: "2"
topics:
    - routing
    - bgp
