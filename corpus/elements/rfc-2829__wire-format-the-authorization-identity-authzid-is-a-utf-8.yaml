document: rfc-2829
kind: wire-format
summary: 'The authorization identity (authzId) is a UTF-8 string carried in the SASL credentials field of the LDAP Bind request and response. It has two forms: dnAuthzId = ''dn:'' followed by a DN with syntax from RFC 2253, and uAuthzId = ''u:'' followed by an unspecified UTF-8 userid string.'
section: "9"
topics:
