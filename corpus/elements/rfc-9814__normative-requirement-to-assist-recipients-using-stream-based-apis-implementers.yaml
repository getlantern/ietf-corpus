document: rfc-9814
kind: normative-requirement
summary: To assist recipients using stream-based APIs, implementers SHOULD include signed attributes within any SignerInfo that uses SLH-DSA, allowing the recipient to avoid buffering the full signed content in memory. When signed attributes are present, they MUST contain content-type and message-digest attributes and SHOULD contain a CMSAlgorithmProtection attribute.
section: "6"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
