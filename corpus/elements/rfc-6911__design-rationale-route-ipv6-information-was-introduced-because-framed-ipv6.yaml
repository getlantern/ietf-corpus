document: rfc-6911
kind: design-rationale
summary: Route-IPv6-Information was introduced because Framed-IPv6-Prefix cannot convey more-specific routes and Framed-IPv6-Route does not result in the route being announced in a Router Advertisement; a new Attribute was needed to provision NAS RA route announcements via RFC 4191.
