document: rfc-7293
kind: security-consideration
summary: It is RECOMMENDED to have a substantial period of time between successive mailbox owners during which the mailbox accepts no mail, giving message generators an opportunity to detect that the previous owner is no longer at that address before a new owner takes over.
section: "13.4"
rfc2119_level: RECOMMENDED
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
