document: rfc-5494
kind: design-rationale
summary: ARP-only uses without a foreseeable reason to use the same value in BOOTP/DHCPv4 should favor 2-octet values, while values intended for BOOTP/DHCPv4 compatibility should use 1-octet values, because those protocols carry ar$hrd in an 8-bit field.
