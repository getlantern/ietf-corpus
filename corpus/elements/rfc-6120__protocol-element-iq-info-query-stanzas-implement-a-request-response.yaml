document: rfc-6120
kind: protocol-element
summary: IQ (Info/Query) stanzas implement a request-response mechanism using a required 'type' attribute of 'get', 'set', 'result', or 'error', and a required 'id' attribute that links a result or error to the originating get or set. A server MUST reply to each get or set it receives with either a result or error having the same 'id' value.
section: 8.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
