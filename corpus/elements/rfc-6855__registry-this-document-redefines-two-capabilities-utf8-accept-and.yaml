summary: This document redefines two capabilities ("UTF8=ACCEPT" and "UTF8=ONLY") in the "IMAP 4 Capabilities" registry, referencing RFC 6855. Three capabilities from the experimental predecessor RFC 5738 — "UTF8=ALL", "UTF8=APPEND", and "UTF8=USER" — are now marked OBSOLETE.
