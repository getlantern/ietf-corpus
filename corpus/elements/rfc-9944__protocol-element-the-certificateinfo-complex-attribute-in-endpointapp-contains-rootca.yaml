document: rfc-9944
kind: protocol-element
summary: The certificateInfo complex attribute in EndpointApp contains rootCA (base64-encoded trust anchor certificate, optional) and subjectName (distinguished name or dnsName from subjectAlternateName per RFC 5280). It is used for X.509-based client authentication in place of clientToken.
