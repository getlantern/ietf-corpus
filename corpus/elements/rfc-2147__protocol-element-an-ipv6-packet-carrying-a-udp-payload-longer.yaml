document: rfc-2147
kind: protocol-element
summary: An IPv6 packet carrying a UDP payload longer than 65535 bytes necessarily carries a Jumbo Payload option in a Hop-by-Hop Options header. The Jumbo Payload length field contains the length of the IP packet excluding the IPv6 header, and the IPv6 header length field is set to zero.
section: "2"
topics:
    - udp
    - ip
