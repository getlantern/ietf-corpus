document: rfc-5322
kind: normative-requirement
summary: When resent fields are used, the 'Resent-From:' and 'Resent-Date:' fields MUST be sent. 'Resent-Message-ID:' SHOULD be sent. Resent fields MUST NOT be used in the normal processing of replies or other automatic actions on messages.
section: 3.6.6
rfc2119_level: MUST
topics:
    - email
