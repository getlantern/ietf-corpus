kind: registry
summary: IANA maintains the 'Certification Authority Restriction Flags' and 'Certification Authority Restriction Properties' registries. This document (RFC 8659) replaces RFC 6844 as the reference for both registries and updates the CAA TYPE entry in the 'Resource Record (RR) TYPEs' subregistry of the 'Domain Name System (DNS) Parameters' registry.
