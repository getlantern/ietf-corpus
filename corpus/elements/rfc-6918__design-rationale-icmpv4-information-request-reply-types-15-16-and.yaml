document: rfc-6918
kind: design-rationale
summary: ICMPv4 Information Request/Reply (Types 15/16) and Address Mask Request/Reply (Types 17/18) are deprecated because DHCP has fully superseded their host-configuration role. Maintaining these types in active registries creates unnecessary ambiguity without providing any functional benefit.
section: "2.2"
topics:
    - ip
