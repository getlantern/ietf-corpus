document: rfc-3768
kind: normative-requirement
summary: On receipt, a VRRP router MUST verify IP TTL=255, VRRP version=2, packet completeness, checksum, VRID configuration, and that Auth Type matches local configuration; any failure MUST cause the packet to be discarded.
section: "7.1"
rfc2119_level: MUST
topics:
