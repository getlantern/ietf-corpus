document: rfc-1968
kind: protocol-element
summary: ECP uses codes 1–7 (Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, Code-Reject) and optionally code 14 (Reset-Request) and code 15 (Reset-Ack). Other codes must be treated as unrecognised and result in Code-Rejects.
