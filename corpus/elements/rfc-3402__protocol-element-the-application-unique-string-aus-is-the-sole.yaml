document: rfc-3402
kind: protocol-element
summary: The Application Unique String (AUS) is the sole input to DDDS rewrite rules. It must have regular lexical structure implying a unique delegation path, and no application may treat a rule's output key as a new AUS for subsequent rules (to avoid sendmail-style fragile rewrites).
section: "4"
topics:
