document: rfc-1209
kind: design-rationale
summary: The LIS model intentionally routes inter-LIS traffic through a router even when a direct SMDS path exists between the endpoints. This avoids scalability issues with address resolution and routing update propagation that would arise in large public SMDS interconnection scenarios.
section: Logical IP Subnetwork Configuration
