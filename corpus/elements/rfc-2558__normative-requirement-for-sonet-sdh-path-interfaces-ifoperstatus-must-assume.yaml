kind: normative-requirement
summary: For SONET/SDH Path interfaces, ifOperStatus must assume the value down(2) if sonetPathCurrentStatus has any value other than sonetPathNoDefect(1). ifConnectorPresent must be set to false(2) and ifLinkUpDownTrapEnable defaults to disabled(2).
