document: rfc-4745
kind: protocol-element
summary: The <sphere> condition element matches a rule only when the PT is currently in the named state (e.g., 'work', 'home', 'meeting'). The 'value' attribute MAY contain multiple whitespace-separated tokens combined with logical OR. Sphere state may be conveyed by manual configuration or a protocol such as RPID.
section: "7.3"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
