document: rfc-5545
kind: normative-requirement
summary: Property parameter values that contain a COLON, SEMICOLON, or COMMA character MUST be placed in quoted-string text. Property parameter values MUST NOT contain the DQUOTE character except as delimiters.
section: "3.2"
rfc2119_level: MUST
