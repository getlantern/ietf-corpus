document: rfc-9478
kind: design-rationale
summary: The Security Label contents are intentionally opaque to the IKE implementation. The IKE implementation may have no knowledge of the label's meaning other than recognizing it as a type and opaque value to pass to the SPD, allowing MAC policy enforcement to remain in the OS/policy layer rather than the IKE layer.
section: "2.2"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
