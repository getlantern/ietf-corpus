document: rfc-6347
kind: normative-requirement
summary: DTLS servers SHOULD perform a cookie exchange whenever a new handshake is being performed. Clients MUST be prepared to do a cookie exchange with every handshake. The server MAY skip the exchange when resuming a session or when amplification is not a threat.
section: 4.2.1
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
