document: rfc-8912
kind: protocol-element
summary: All delay output values are expressed in units of seconds as a positive decimal64 with fraction digits=9 (1.0 ns resolution), with lossless conversion to/from the 64-bit NTP timestamp per RFC 5905. Loss ratio is expressed as decimal64 with fraction digits=9 in units of lost-to-total packets times 100%.
