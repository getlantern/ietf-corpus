document: rfc-9883
kind: normative-requirement
summary: The subject in the signature certificate SHOULD be the same as the subject name in the certificate request. If they differ, the certificate policy MUST describe how the CA determines the two subject names identify the same entity; if the CA cannot make that determination, it MUST reject the request.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
