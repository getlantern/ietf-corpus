document: rfc-5910
kind: normative-requirement
summary: When an <info> command is processed successfully, the EPP <extension> element SHOULD contain a child <secDNS:infData> element if the domain object has data associated with this extension and based on server policy. The element contains either <secDNS:dsData> or <secDNS:keyData> elements, but not both.
section: 5.1.2
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
