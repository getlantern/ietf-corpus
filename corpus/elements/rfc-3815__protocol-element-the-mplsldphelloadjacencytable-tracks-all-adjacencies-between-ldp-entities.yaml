document: rfc-3815
kind: protocol-element
summary: The mplsLdpHelloAdjacencyTable tracks all adjacencies between LDP entities and peers, indexed by entity LDP ID, entity index, peer LDP ID, and adjacency index. Each entry records hold time remaining (65535 = infinite), negotiated hold time, and adjacency type (link or targeted). A session with zero Hello Adjacencies should be removed.
section: 3.5.7
topics:
