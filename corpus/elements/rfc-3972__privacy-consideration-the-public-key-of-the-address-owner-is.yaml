document: rfc-3972
kind: privacy-consideration
summary: The public key of the address owner is revealed in signed SEND messages. A node that requires pseudonymity toward local-link neighbors must generate both a new address and a new public key, though link-layer address reuse typically already identifies the node uniquely.
section: "7.3"
topics:
