summary: docsDevFilterLLCTable holds inbound LLC-layer filters applied to frames arriving from RF MAC or CPE interfaces, matching on Ethertype or 802.2 DSAP. The default action for unmatched L2 frames is controlled by docsDevFilterLLCUnmatchedAction (discard or accept).
