document: rfc-1508
kind: normative-requirement
summary: It is highly recommended that mech_types supporting replay detection and sequencing features allow them to be activated selectively on initiator request, since these features may interfere with certain applications' intended communications paradigms and are likely resource-intensive.
section: 1.2.3
rfc2119_level: RECOMMENDED
topics:
