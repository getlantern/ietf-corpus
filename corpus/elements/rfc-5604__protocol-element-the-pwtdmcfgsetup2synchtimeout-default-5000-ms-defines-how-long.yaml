document: rfc-5604
kind: protocol-element
summary: The pwTDMCfgSetUp2SynchTimeOut (default 5000 ms) defines how long the host waits before declaring PW down if insufficient consecutive packets are received after administrative status change to up. PW 'down' notifications MUST NOT be sent before this timer expires after an administrative change.
section: "8"
rfc2119_level: MUST NOT
topics:
