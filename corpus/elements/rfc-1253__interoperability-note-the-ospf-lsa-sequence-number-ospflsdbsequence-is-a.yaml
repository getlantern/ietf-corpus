document: rfc-1253
kind: interoperability-note
summary: The OSPF LSA sequence number (ospfLsdbSequence) is a signed 32-bit integer starting at 0x80000001 (-0x7FFFFFFF) and incrementing to 0x7FFFFFFF; implementations reading this via SNMP will observe very negative values for typical, recently originated LSAs.
section: "5.4"
topics:
    - snmp
    - routing
