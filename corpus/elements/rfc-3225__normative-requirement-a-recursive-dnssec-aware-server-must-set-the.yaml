document: rfc-3225
kind: normative-requirement
summary: A recursive DNSSEC-aware server MUST set the DO bit on its recursive requests regardless of the DO bit status of the initiating resolver request, ensuring upstream servers return DNSSEC RRs for the recursive server's cache.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - security
