document: rfc-5482
kind: protocol-element
summary: UTO option exchange is not a binding negotiation. Transmission of a UTO option is a suggestion that the other end consider adapting its user timeout; adaptation only occurs if both ENABLED and CHANGEABLE are true on the receiving side.
section: "3"
