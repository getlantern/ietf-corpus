document: rfc-9990
kind: normative-requirement
summary: If DMARC alignment fails and the applied disposition does not match the domain's configured policy, the 'reason' element MUST be included in policy_evaluated. The 'spf' and 'dkim' fields MUST reflect the DMARC-evaluated values, not any receiver-overridden values.
section: 3.1.1.9
rfc2119_level: MUST
topics:
