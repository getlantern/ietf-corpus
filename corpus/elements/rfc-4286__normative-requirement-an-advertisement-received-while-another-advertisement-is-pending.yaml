document: rfc-4286
kind: normative-requirement
summary: An Advertisement received while another Advertisement is pending in response to a Solicitation MUST cause that pending Solicitation to be ignored. Changes in the Query Interval or Robustness Variable MUST NOT trigger a new Advertisement, but the new values MUST be used in all future messages.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
