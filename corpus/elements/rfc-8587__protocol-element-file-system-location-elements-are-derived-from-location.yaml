document: rfc-8587
kind: protocol-element
summary: File system location elements are derived from location entries. When an entry specifies a hostname, the client resolves it to produce one location element per resulting network address. Each element consists of a file system location address and an fs_name indicating the file system's location within the server's pseudo-fs.
section: "5.1"
topics:
    - dns
