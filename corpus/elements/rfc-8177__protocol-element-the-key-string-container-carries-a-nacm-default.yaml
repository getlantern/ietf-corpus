document: rfc-8177
kind: protocol-element
summary: 'The key-string container carries a NACM default-deny-all annotation and supports two styles: ASCII ''keystring'' (type string) or, via the hex-key-string feature, ''hexadecimal-string'' (type yang:hex-string). The hexadecimal form is required when AES Key Wrap encryption is in use.'
