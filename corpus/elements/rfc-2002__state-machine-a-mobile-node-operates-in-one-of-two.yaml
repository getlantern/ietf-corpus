document: rfc-2002
kind: state-machine
summary: 'A mobile node operates in one of two states: (1) at-home — no mobility services active, deregisters with home agent upon return; (2) away-from-home — registers care-of address with home agent, re-registers on move detection or lifetime expiry, deregisters (Lifetime=0) when returning home. Transitions are triggered by Agent Advertisement receipt, Lifetime expiry, or sequence number anomalies indicating agent reboot.'
section: "2.4"
topics:
