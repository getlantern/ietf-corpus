document: rfc-8896
kind: interoperability-note
summary: RFC 8259 (used by ALTO Calendars) mandates UTF-8 encoding and replaces RFC 7159 (used by base ALTO RFC 7285). Implementations using UTF-16 or UTF-32 will not interoperate with Calendar-aware peers without switching encoding.
