document: rfc-1740
kind: normative-requirement
summary: For AppleDouble, the NAME parameter is recommended on the Content-Type header of both the header part (application/applefile) and the data fork part. If no appropriate Content-Type exists for the data fork, it should be sent as application/octet-stream.
section: "4"
rfc2119_level: SHOULD
topics:
