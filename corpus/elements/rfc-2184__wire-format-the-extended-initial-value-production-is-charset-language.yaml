document: rfc-2184
kind: wire-format
summary: 'The `extended-initial-value` production is: `[charset] "''" [language] "''" extended-other-values`, where `extended-other-values` is zero or more `ext-octet` or `attribute-char` tokens. An `ext-octet` is `"%"` followed by exactly two hexadecimal digits.'
