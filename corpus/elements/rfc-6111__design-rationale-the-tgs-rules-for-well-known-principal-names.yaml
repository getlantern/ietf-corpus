document: rfc-6111
kind: design-rationale
summary: 'The TGS rules for well-known principal names (MAY reject for client, SHOULD reject for server) are intentionally asymmetric to allow incremental updates and ease migration: a well-known client principal accepted in one realm should permit cross-realm TGTs to function even when not all realms in the cross-realm path have been updated.'
section: "3.1"
topics:
    - security
