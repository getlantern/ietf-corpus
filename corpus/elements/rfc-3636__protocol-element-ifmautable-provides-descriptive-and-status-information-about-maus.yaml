document: rfc-3636
kind: protocol-element
summary: ifMauTable provides descriptive and status information about MAUs attached to interfaces. Entries are indexed by ifMauIfIndex and ifMauIndex, and include type, status, media availability, jabber, false carriers (32- and 64-bit), type list bits, default type, and auto-negotiation support flag.
