document: rfc-7301
kind: normative-requirement
summary: The protocol identified in the ServerHello ALPN extension SHALL be definitive for the connection until renegotiated. The server SHALL NOT respond with a selected protocol and subsequently use a different protocol for application data exchange.
section: "3.2"
rfc2119_level: MUST NOT
topics:
