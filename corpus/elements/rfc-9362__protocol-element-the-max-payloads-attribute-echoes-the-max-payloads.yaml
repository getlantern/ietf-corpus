document: rfc-9362
kind: protocol-element
summary: The 'max-payloads' attribute echoes the MAX_PAYLOADS parameter from RFC 9177, representing the maximum number of payloads that can be transmitted at any one time. It is optional, encoded as uint16, with a default value of 10, and maps to CBOR key 32776.
