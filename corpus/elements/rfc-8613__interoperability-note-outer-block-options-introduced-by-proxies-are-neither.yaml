document: rfc-8613
kind: interoperability-note
summary: Outer Block options introduced by proxies are neither encrypted nor integrity protected, allowing a malicious proxy to inject block fragments indefinitely. Inner Block options (applied before OSCORE processing) provide end-to-end integrity for each segment, which is the preferred mechanism for constrained environments.
section: 4.1.3.4.2
topics:
    - security
