document: rfc-4781
kind: security-consideration
summary: 'An intruder may impersonate a BGP peer to force TCP connection failure and reconnection with the Forwarding State (F) bit set to 0, causing all labels received from the peer to be released. Countermeasure: use BGP session authentication such as TCP MD5 (RFC 2385).'
section: "8"
topics:
