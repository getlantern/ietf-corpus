document: rfc-4436
kind: wire-format
summary: The reachability test sends a unicast ARP Request where ar$tpa is set to the test node's IPv4 address, ar$spa is the host's candidate IPv4 address, ar$sha is the host's MAC address, ar$tha is set to 0, and the Ethernet destination is the test node's MAC address. An IPv4 ARP packet on Ethernet is 42 octets including the Ethernet header.
section: 2.1.1
topics:
    - ip
