document: rfc-8651
kind: protocol-element
summary: Queue Parameter Sub-Data Items describe individual logical queues, each identified by a Queue Index, a 24-bit Queue Size Qn (scaled by the parent's Scale field), a Num DSCPs Qn count, and a sequence of 8-bit DS Field values. Queue index 255 is reserved and MUST NOT appear in this field.
section: 3.1.1
topics:
