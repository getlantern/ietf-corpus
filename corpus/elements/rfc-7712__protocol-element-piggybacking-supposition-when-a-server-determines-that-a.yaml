document: rfc-7712
kind: protocol-element
summary: 'Piggybacking supposition: when a server determines that a sub-domain (e.g., rooms.a.example) resolves to an already-connected IP/port and the existing PKIX certificate is also valid for that sub-domain, it can add the additional domain pair to the existing stream using <db:result> without opening a new connection.'
section: 4.4.2
topics:
    - security
