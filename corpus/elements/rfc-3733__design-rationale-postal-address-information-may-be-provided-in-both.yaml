document: rfc-3733
kind: design-rationale
summary: Postal address information may be provided in both an 'int' (internationalized, ASCII-subset UTF-8) and a 'loc' (localized, unrestricted UTF-8) form. This dual representation is provided so entities can supply a broadly readable ASCII form alongside a locally optimized native-script form.
section: "5"
