document: rfc-3640
kind: wire-format
summary: The AU Header Section begins with a 2-octet AU-headers-length field specifying the length in bits of the immediately following AU-headers, excluding padding bits. If the AU-header is configured empty, the AU-headers-length field SHALL NOT be present. Up to 7 zero-padding bits are appended to achieve octet-alignment.
section: 3.2.1
topics:
