document: rfc-2745
kind: protocol-element
summary: 'Two new RSVP message types are introduced: DREQ (Diagnostic Request, Type=8) and DREP (Diagnostic Reply, Type=9). A DREQ travels hop-by-hop from the LAST-HOP node toward the sender, collecting per-hop RSVP state; the ending node converts it to a DREP and returns the completed response to the requester.'
section: "2"
