document: rfc-4454
kind: normative-requirement
summary: Each LCCE MUST be able to uniquely identify itself in SCCRQ and SCCRP messages via a globally unique value, by default advertised via the structured Router ID AVP; the unstructured Hostname AVP MAY also be used.
