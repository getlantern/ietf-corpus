document: rfc-3886
kind: design-rationale
summary: Message tracking is intended as a 'last resort' mechanism. DSNs and MDNs provide primary delivery status; only if no response is received from either would Message Tracking be used, keeping tracking requests rare and reducing privacy exposure.
section: "2"
topics:
