document: rfc-3931
kind: design-rationale
summary: L2TPv3 transitions from 16-bit Session ID and Tunnel ID (L2TPv2) to a 32-bit Session ID and Control Connection ID, separates all PPP-specific constructs into a companion document, and extends tunnel authentication to cover the entire control message rather than just selected fields. These changes improve modularity and protocol security.
section: "1.1"
topics:
    - vpn
