document: rfc-4815
kind: normative-requirement
summary: After ROHC channel negotiation, the agreed PROFILES parameter MUST NOT include more than one variant of any given profile. Since only the 8 LSB bits of a 16-bit profile identifier appear in compressed headers, the compressor and decompressor must have agreed unambiguously on which variant to use.
section: "9"
rfc2119_level: MUST NOT
topics:
    - rtp
    - ip
