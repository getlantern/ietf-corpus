document: rfc-8638
kind: design-rationale
summary: The document focuses exclusively on the IPv4-over-IPv6 scenario (E-IP=IPv4, I-IP=IPv6) due to lack of real-world use cases for the IPv6-over-IPv4 direction. The larger IPv6 group address space enables a one-to-one algorithmic mapping between E-IP and I-IP multicast trees, simplifying AFBR operations.
section: "4"
topics:
