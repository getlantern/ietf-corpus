summary: 'Four new SIP URI parameters are registered in the ''SIP/SIPS URI Parameters'' subregistry: pn-provider, pn-param, pn-prid, and pn-purr. The 555 response code is registered in the ''Response Codes'' subregistry. Four feature-capability indicators (sip.pns, sip.vapid, sip.pnsreg, sip.pnspurr) and one media feature tag (sip.pnsreg) are registered in the SIP Parameters registry.'
