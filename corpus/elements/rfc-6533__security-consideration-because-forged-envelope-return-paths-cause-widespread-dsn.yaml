document: rfc-6533
kind: security-consideration
summary: Because forged envelope return paths cause widespread DSN blowback that erodes trust in delivery notifications, correlation of notifications with sent messages (short-term via Message-ID, long-term via cryptographic signatures) has become critical for email reliability.
