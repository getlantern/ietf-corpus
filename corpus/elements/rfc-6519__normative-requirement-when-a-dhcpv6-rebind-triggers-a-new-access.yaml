document: rfc-6519
kind: normative-requirement
summary: When a DHCPv6 Rebind triggers a new Access-Request and the returned AFTR tunnel name differs from the currently used one, the NAS MUST force the B4 to re-establish the tunnel using the new AFTR name.
section: "4.1"
rfc2119_level: MUST
topics:
