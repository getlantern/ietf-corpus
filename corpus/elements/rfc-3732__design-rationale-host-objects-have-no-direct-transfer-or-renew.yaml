document: rfc-3732
kind: design-rationale
summary: Host objects have no direct transfer or renew semantics; transfers occur implicitly when the superordinate domain object is transferred. This preserves the subordinate relationship between host and domain objects and avoids orphaning glue records.
section: "1.1"
topics:
