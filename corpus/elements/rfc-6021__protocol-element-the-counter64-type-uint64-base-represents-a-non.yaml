document: rfc-6021
kind: protocol-element
summary: The counter64 type (uint64 base) represents a non-negative integer that monotonically increases to 2^64-1 (18446744073709551615) then wraps to zero. Semantically equivalent to SMIv2 Counter64; same discontinuity tracking requirements as counter32 apply.
