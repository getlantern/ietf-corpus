document: rfc-8028
kind: normative-requirement
summary: A PIO with both L and A flags cleared SHOULD be sent to inform hosts that they should use the advertising router as the first hop for packets with source addresses in the PIO prefix. This extends Section 6.2.3 of RFC 4861.
section: "2.1"
rfc2119_level: SHOULD
topics:
