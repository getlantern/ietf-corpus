summary: Tree selection can be extended beyond Data Labels to per-Data-Label multicast groups via the Tree and Groups APPsub-TLV, allowing, for example, multicast group 1 in VLAN 10 to be assigned to tree 1 and group 2 in VLAN 10 to tree 2 for finer-grained load sharing.
