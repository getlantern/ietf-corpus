document: rfc-7684
kind: wire-format
summary: Each TLV within an Extended Prefix or Extended Link Opaque LSA has a 2-octet Type field, a 2-octet Length field (value portion only, excluding padding), and a variable-length Value field padded to 4-octet alignment with zeros. A TLV with no value has Length 0.
