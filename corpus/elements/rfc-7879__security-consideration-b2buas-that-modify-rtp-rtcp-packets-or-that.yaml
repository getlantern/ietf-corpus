document: rfc-7879
kind: security-consideration
summary: B2BUAs that modify RTP/RTCP packets, or that alter SIP headers or SDP fields protected by the identity signature, are incompatible with end-to-end DTLS-SRTP and fall outside the scope of this document. The B2BUA behaviors described here do not affect the security or integrity of a DTLS-SRTP session or the data exchanged over it.
section: "7"
topics:
    - security
    - tls
    - rtp
    - sip
