document: rfc-4712
kind: security-consideration
summary: RAQMON implementations MUST provide authentication (verifying report origin), data confidentiality, message integrity, and replay protection. TLS over TCP is the specified mechanism, providing these via its handshake and negotiated ciphersuite.
