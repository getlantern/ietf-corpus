document: rfc-9388
kind: normative-requirement
summary: A 'footprintunion' MUST NOT list any 'footprintunion' as a value. This syntactic restriction avoids implementation complexity; a union of unions is semantically equivalent to a single union, so no capability is lost.
section: "2.2"
rfc2119_level: MUST NOT
