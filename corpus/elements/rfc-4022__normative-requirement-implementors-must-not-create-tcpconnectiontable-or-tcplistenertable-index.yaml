document: rfc-4022
kind: normative-requirement
summary: Implementors MUST NOT create tcpConnectionTable or tcpListenerTable index entries that result in OIDs with more than 128 subidentifiers, as such entries cannot be accessed via SNMPv1, SNMPv2c, or SNMPv3.
section: "3"
rfc2119_level: MUST NOT
topics:
