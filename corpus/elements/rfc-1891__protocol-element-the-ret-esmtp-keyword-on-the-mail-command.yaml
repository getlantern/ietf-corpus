document: rfc-1891
kind: protocol-element
summary: The RET esmtp-keyword on the MAIL command specifies whether DSNs for delivery failure should include the full message ('FULL') or only the message headers ('HDRS'). If omitted, the MTA MAY return either; success-only DSNs should always return only headers.
section: "5.3"
topics:
