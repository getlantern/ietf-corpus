document: rfc-6551
kind: design-rationale
summary: When multiple Routing Metric objects share the same DAG Metric Container, the Prec (Precedence) field (0=highest) governs their use as tiebreakers in path selection. If several aggregated metrics bear the same Prec value, behavior is implementation-dependent.
