document: rfc-4178
kind: security-consideration
summary: Where multiple mechanisms share similar context token syntax and an OID in a pseudo-ASN.1/DER wrapper that is not integrity-protected, downgrade attacks may be possible between mechanism variants. SPNEGO does not defeat such attacks. All communicating peers are also exposed to denial-of-service threats.
section: "7"
topics:
    - security
