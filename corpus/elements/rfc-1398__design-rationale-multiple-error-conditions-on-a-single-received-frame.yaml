document: rfc-1398
kind: design-rationale
summary: Multiple error conditions on a single received frame are counted exclusively according to the first error status presented to the LLC, following the conventions of IEEE 802.3 Layer Management. This prevents double-counting across error counters.
section: "4.1"
topics:
    - snmp
