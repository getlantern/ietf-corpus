document: rfc-3472
kind: normative-requirement
summary: When a Label ER-Hop has U=0, its label value MUST be copied into a new Label Set TLV included in the outgoing REQUEST. When U=1, the label MUST be copied into a new Upstream Label TLV included in the outgoing REQUEST. Label ER-Hops are removed from the ER after processing.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
