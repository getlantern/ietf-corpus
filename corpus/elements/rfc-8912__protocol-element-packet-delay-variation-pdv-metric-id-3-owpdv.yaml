document: rfc-8912
kind: protocol-element
summary: 'Packet Delay Variation (PDV) metric (ID 3: OWPDV_Active_IP-UDP-Periodic_RFC8912sec5_Seconds_95Percentile) uses the PDV form from RFC 5481 Section 4.2, where singleton PDV for packet i is referenced as PDV(i) and measured against the minimum delay observed on the periodic stream. Output is the 95th percentile of the one-way PDV distribution.'
section: "5"
