document: rfc-8881
kind: protocol-element
summary: SECINFO and SECINFO_NO_NAME operations allow the client to determine, on a per-filehandle basis, the security tuple (flavor, GSS-API mechanism OID, QOP, RPCSEC_GSS service) required for access. SECINFO_NO_NAME additionally supports upward traversal via SECINFO_STYLE4_PARENT.
section: 2.6.2
topics:
    - security
