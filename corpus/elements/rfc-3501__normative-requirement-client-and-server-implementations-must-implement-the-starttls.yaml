document: rfc-3501
kind: normative-requirement
summary: Client and server implementations MUST implement the STARTTLS, LOGINDISABLED, and AUTH=PLAIN capabilities. The server MUST send a single untagged CAPABILITY response including 'IMAP4rev1' before the tagged OK response to the CAPABILITY command.
section: 6.1.1
rfc2119_level: MUST
topics:
