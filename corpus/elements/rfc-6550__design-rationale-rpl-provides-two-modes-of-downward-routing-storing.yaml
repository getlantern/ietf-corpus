document: rfc-6550
kind: design-rationale
summary: RPL provides two modes of downward routing — Storing (fully stateful, intermediate nodes maintain routing tables) and Non-Storing (fully source-routed from the root) — to span the range of LLN device memory capacities. No implementation is expected to support both simultaneously, and hybrid modes are out of scope.
section: "3.3"
topics:
    - routing
    - ip
