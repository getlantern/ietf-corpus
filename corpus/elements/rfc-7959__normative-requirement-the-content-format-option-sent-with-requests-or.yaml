document: rfc-7959
kind: normative-requirement
summary: The Content-Format Option sent with requests or responses MUST reflect the Content-Format of the entire body. If blocks of a request arrive at a server with mismatching Content-Format Options, the server MUST NOT assemble them into a single request.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
