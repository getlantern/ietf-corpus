document: rfc-8487
kind: design-rationale
summary: Unlike Mtrace version 1, which used IGMP messages, all Mtrace2 messages are UDP-based. This change was made to support both IPv4 and IPv6 under a single protocol with similar syntax, and to avoid IGMP's IPv4-only scope.
section: "1"
topics:
    - multicast
    - udp
