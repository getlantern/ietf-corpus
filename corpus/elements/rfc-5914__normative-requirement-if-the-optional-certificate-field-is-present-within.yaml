document: rfc-5914
kind: normative-requirement
summary: If the optional certificate field is present within CertPathControls, the subject name in the certificate MUST exactly match taName, the public key MUST exactly match pubKey, and the subjectKeyIdentifier extension (if present) MUST exactly match keyId.
