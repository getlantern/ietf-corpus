document: rfc-2159
kind: interoperability-note
summary: The ISO P2 profile (1995) mandates support for reception of two-dimensional and fine-resolution G3 fax if g3-facsimile is supported at all. Fine resolution, unlimited length, and B4 length are easy for access units to support; B4 width is nearly impossible and A3 width is hard.
