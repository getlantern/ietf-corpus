document: rfc-9156
kind: design-rationale
summary: RFC 9156 relaxes the RFC 7816 recommendation to use NS QTYPE for hiding the original QTYPE. Using NS QTYPE provides no added value over other QTYPEs because the parent side of a delegation will respond with a referral regardless of the QTYPE.
section: "2.1"
topics:
    - dns
