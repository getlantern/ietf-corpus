document: rfc-9254
kind: normative-requirement
summary: A list or subset of a list MUST be encoded using a CBOR array data item (major type 4), even when it has a single entry. Each list entry within the array is encoded as a CBOR map using container-like encoding rules.
section: "4.4"
rfc2119_level: MUST
topics:
