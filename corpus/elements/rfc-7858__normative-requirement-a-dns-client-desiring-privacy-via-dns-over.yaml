document: rfc-7858
kind: normative-requirement
summary: A DNS client desiring privacy via DNS over TLS MUST establish a TCP connection to port 853, unless mutual agreement exists to use another port. That alternative port MUST NOT be port 53.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
