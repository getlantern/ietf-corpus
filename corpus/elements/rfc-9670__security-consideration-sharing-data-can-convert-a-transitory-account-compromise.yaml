document: rfc-9670
kind: security-consideration
summary: Sharing data can convert a transitory account compromise into a persistent one by setting up sharing with an attacker-controlled Principal. Mitigations include requiring additional authorization for configuring sharing or sending out-of-band notifications whenever a new permission is added.
section: "6.2"
topics:
    - security
    - json
