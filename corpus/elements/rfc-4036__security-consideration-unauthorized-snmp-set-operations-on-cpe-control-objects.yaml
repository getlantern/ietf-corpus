document: rfc-4036
kind: security-consideration
summary: Unauthorized SNMP SET operations on CPE control objects (docsSubMgtCpeControlActive, docsSubMgtCpeControlMaxCpeIp, docsSubMgtCpeControlLearnable, docsSubMgtCpeControlReset, and their defaults) would enable IP address spoofing by bypassing or relaxing CPE address enforcement.
