document: rfc-5648
kind: design-rationale
summary: A mobile node MAY change its BID value at any time according to administrative policy, for instance to protect privacy. However, implementations must carefully assign BIDs to keep the same BID for the same binding even when binding status changes.
section: "2"
topics:
    - mobility
    - ip
    - privacy
