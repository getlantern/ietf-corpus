document: rfc-7183
kind: normative-requirement
summary: An implementation of RFC 6130 and RFC 7181 MAY use more than one ICV TLV in a message, but multiple ICV TLVs MUST each use different keys or a different algorithm to calculate the ICV.
section: "4"
rfc2119_level: MUST NOT
topics:
