document: rfc-4319
kind: normative-requirement
summary: Implementations MUST provide a default profile named 'DEFVAL' for each profile type. Before lines are explicitly configured, 'DEFVAL' is automatically used. HDSL2 lines MUST reference the 'DEFVAL' span profile since span configuration profiles only apply to SHDSL.
section: "2.7"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
