document: rfc-4590
kind: interoperability-note
summary: Digest-Qop is optional in RADIUS to preserve backward compatibility with RFC 2069 minimal implementations. If Digest-Algorithm is absent, MD5 is assumed. A companion Diameter document defines equivalent Digest Authentication support for Diameter and addresses RADIUS/Diameter interoperability.
section: "3.8"
topics:
    - radius
    - diameter
