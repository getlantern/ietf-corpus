document: rfc-5323
kind: normative-requirement
summary: The server MUST process a text/xml or application/xml request body, and MAY process request bodies in other formats. If a body is present, it MUST be either a DAV:searchrequest or a DAV:query-schema-discovery XML element.
section: 2.2.2
rfc2119_level: MUST
topics:
    - http
