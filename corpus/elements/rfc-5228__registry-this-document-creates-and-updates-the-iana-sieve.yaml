document: rfc-5228
kind: registry
summary: 'This document creates and updates the IANA Sieve Extensions registry. Vendor-controlled names beginning with ''vnd.'' may be registered first-come, first-served. Names not beginning with ''vnd.'' require a standards-track or IESG-approved experimental RFC. Initial registrations: encoded-character, fileinto, envelope, comparator-* (prefix).'
section: "6.2"
