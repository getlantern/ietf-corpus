document: rfc-7240
kind: normative-requirement
summary: The Prefer header field is end-to-end and MUST be forwarded by a proxy if the request is forwarded, unless Prefer is explicitly identified as hop-by-hop using the Connection header field.
section: "2"
rfc2119_level: MUST
