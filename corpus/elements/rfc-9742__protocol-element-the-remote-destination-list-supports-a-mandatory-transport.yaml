document: rfc-9742
kind: protocol-element
summary: The remote 'destination' list supports a mandatory transport choice between UDP (RFC 5426, default port 514) and TLS (RFC 5425, default port 6514). Multiple destinations can be configured, but all sessions under a destination must use the same transport.
