document: rfc-8246
kind: security-consideration
summary: 'The immutable mechanism acts as a form of soft pinning and creates a vector for amplification of cache corruption incidents, including cache-poisoning attacks. Three mitigations are recommended: restricting to authenticated (HTTPS) contexts, honoring force-reload, and ignoring immutable for responses without a reliable size signal.'
section: "3"
topics:
    - http
    - security
