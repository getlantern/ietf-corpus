document: rfc-5922
kind: protocol-element
summary: For virtual SIP servers hosting multiple domains, a single certificate can contain multiple SIP domain identities by including distinct values in the subjectAltName extension. Clients authenticate by matching the AUS domain against the set of identities extracted per Section 7.1.
