document: rfc-5286
kind: protocol-element
summary: The LFA selection algorithm iterates candidate next-hops H_h for each primary next-hop P_i, tracking cand_type (NONE/LOOP-FREE/PRIMARY), cand_link-protect, cand_node-protect, and cand_srlg-protect. Candidates failing the loop-free inequality or link cost checks are skipped; the best candidate replaces the running alternate based on protection level, SRLG coverage, and distance tie-breakers.
