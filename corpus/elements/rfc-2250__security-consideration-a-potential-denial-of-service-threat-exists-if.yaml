document: rfc-2250
kind: security-consideration
summary: A potential denial-of-service threat exists if decoders have non-uniform computational load; an attacker could inject pathological datagrams to overload receivers. The MPEG encoding used here does not exhibit significant non-uniformity, mitigating this risk.
