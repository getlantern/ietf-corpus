document: rfc-9172
kind: security-consideration
summary: Replay and message injection attacks are mitigated by cipher suite capabilities in BCBs and by signing bundle primary block fields (timestamp, lifetime, Bundle Age block) with a BIB. Anti-replay mechanisms such as nonces and session identifiers MAY be included as security context parameters.
section: 8.2.4
topics:
    - security
    - crypto
