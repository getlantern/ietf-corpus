document: rfc-7710
kind: interoperability-note
summary: The IPv4 DHCP maximum option length of 255 bytes imposes a practical URI length ceiling; URIs exceeding 255 bytes should not be used even in IPv6 DHCP or RA contexts to preserve cross-transport parity when a single portal serves both address families.
section: "2"
topics:
