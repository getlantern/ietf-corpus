document: rfc-3981
kind: protocol-element
summary: Relay bags allow a server to relay opaque information to a referent server via the client. Bags are generated by the queried server, passed as opaque data to the client, and included in subsequent requests to referent servers via the 'bagRef' (IDREF) attribute on entity references and search continuations.
section: "4.4"
topics:
    - registry
