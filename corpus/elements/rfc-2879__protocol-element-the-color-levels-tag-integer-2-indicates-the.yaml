document: rfc-2879
kind: protocol-element
summary: 'The ''color-levels'' tag (Integer, >=2) indicates the number of distinct pixel color values. The ''color-space'' tag identifies the color model: Device-RGB, Device-CMY, Device-CMYK (device-dependent), or CIELAB (calibrated per ITU T.42). Additional CIELAB tags specify illuminant, per-component depth, and color gamut.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
