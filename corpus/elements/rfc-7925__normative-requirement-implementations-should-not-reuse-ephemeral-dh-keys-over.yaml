document: rfc-7925
kind: normative-requirement
summary: Implementations SHOULD NOT reuse ephemeral DH keys over multiple protocol exchanges. Reuse of ephemeral keys partially defeats perfect forward secrecy and increases the damage extent of a long-term key compromise.
section: "9"
rfc2119_level: SHOULD NOT
topics:
