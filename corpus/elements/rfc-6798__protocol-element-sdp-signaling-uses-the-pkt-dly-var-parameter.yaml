document: rfc-6798
kind: protocol-element
summary: SDP signaling uses the 'pkt-dly-var' parameter appended to the 'rtcp-xr' attribute, with optional sub-parameters pdvtype (pdv=0 or pdv=1), nspec for negative PDV threshold or percentile, and pspec for positive PDV threshold or percentile. XR blocks MAY be used without prior SDP signaling.
