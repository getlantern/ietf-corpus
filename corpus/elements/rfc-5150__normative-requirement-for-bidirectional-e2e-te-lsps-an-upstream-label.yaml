document: rfc-5150
kind: normative-requirement
summary: For bidirectional e2e TE LSPs, an Upstream Label MUST be signaled in the Path message over the S-LSP hop; however, since there is no forwarding adjacency, the label value is meaningless and the egress node MUST ignore the Upstream Label in the Path message over the S-LSP hop.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
