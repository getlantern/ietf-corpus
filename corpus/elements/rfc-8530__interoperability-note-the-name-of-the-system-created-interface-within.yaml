document: rfc-8530
kind: interoperability-note
summary: The name of the system-created interface within the LNE is a local matter and may be identical or completely different from the name used in the host device context; implementations may rename assigned interfaces (e.g., host 'Ethernet0/1' becomes LNE 'eth1').
section: "3.1"
topics:
