document: rfc-6901
kind: protocol-element
summary: A JSON Pointer can be represented as a URI fragment identifier by encoding it into UTF-8 octets and then percent-encoding any characters not allowed by the fragment rule in RFC 3986. The empty fragment '#' refers to the whole document.
