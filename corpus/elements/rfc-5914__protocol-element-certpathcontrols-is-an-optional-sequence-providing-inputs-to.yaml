document: rfc-5914
kind: protocol-element
summary: CertPathControls is an optional SEQUENCE providing inputs to the X.509 certification path validation algorithm (RFC 5280 Section 6). It contains taName (Name), optional certificate (Certificate), policySet (CertificatePolicies), policyFlags (CertPolicyFlags), nameConstr (NameConstraints), and pathLenConstraint (INTEGER). When absent, the trust anchor cannot validate X.509 certificate signatures.
section: "2.5"
topics:
    - pkix
    - crypto
    - security
