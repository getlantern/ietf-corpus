summary: 'The Request-URI parameters are formally defined as: dialog-param=''voicexml='' vxml-url, maxage-param=''maxage='' 1*DIGIT, maxstale-param=''maxstale='' 1*DIGIT, method-param=''method='' (''get''/''post''), postbody-param=''postbody='' token, ccxml-param=''ccxml='' json-value, aai-param=''aai='' json-value. Special characters in dialog-param, postbody-param, ccxml-param, and aai-param values MUST be URL-encoded.'
