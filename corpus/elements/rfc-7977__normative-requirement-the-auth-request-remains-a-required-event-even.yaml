document: rfc-7977
kind: normative-requirement
summary: The AUTH request remains a required event even when authentication occurs at the WebSocket connection level, because the "Use-Path:" header needed to create an SDP offer is returned in the 200 OK response to the AUTH request.
section: 5.3.1
rfc2119_level: REQUIRED
