document: rfc-1854
kind: normative-requirement
summary: If nonblocking operation is not supported, client SMTP implementations MUST check the TCP window size and ensure each group of commands fits entirely within the window (usually 4K octets). Failure to do so can lead to deadlock conditions.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - tcp
