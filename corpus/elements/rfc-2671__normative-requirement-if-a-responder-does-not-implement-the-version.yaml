document: rfc-2671
kind: normative-requirement
summary: If a responder does not implement the VERSION level of a request, it MUST answer with RCODE=BADVERS (extended RCODE 16). All responses must be limited in format to the VERSION level of the request, but the VERSION field of each response reflects the responder's highest implemented level.
section: "4.6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
