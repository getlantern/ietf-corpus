document: rfc-8796
kind: design-rationale
summary: The PLR assigns protected LSPs sharing the same outgoing protected interface, the same bypass tunnel, and the same tunnel sender address to the same Bypass_Group_Identifier. This minimizes the number of bypass tunnel Summary FRR groups and optimizes signaling volume between PLR and MP after FRR.
