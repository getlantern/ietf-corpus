document: rfc-5922
kind: normative-requirement
summary: If and only if the subjectAltName does not appear in the certificate, the implementation MAY examine the CN field of the Subject. Accepting a DNS name from the CN is allowed only for backward compatibility.
section: "7.1"
rfc2119_level: MAY
