document: rfc-7591
kind: registry
summary: 'This specification establishes the ''OAuth Dynamic Client Registration Metadata'' registry with Specification Required policy. Initial entries include: redirect_uris, token_endpoint_auth_method, grant_types, response_types, client_name, client_uri, logo_uri, scope, contacts, tos_uri, policy_uri, jwks_uri, jwks, software_id, software_version, client_id, client_secret, client_id_issued_at, and client_secret_expires_at.'
