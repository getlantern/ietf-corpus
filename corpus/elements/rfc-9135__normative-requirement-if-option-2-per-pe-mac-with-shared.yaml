document: rfc-9135
kind: normative-requirement
summary: If option 2 (per-PE MAC with shared anycast IP) is used for IRB interface addressing, then the IRB interface MAC address MUST be the one used in the initial ARP reply or ND Neighbor Advertisement for that TS.
section: "4.1"
rfc2119_level: MUST
