document: rfc-3230
kind: normative-requirement
summary: A digest-algorithm in Want-Digest is acceptable if and only if it is listed with a non-zero qvalue. The sender's preferred algorithm is the one with the highest qvalue when multiple acceptable algorithms are given.
section: 4.3.1
rfc2119_level: MUST
topics:
    - http
