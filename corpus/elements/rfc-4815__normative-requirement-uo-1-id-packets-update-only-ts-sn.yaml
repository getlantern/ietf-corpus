document: rfc-4815
kind: normative-requirement
summary: UO-1-ID packets update only TS, SN, IP-ID, and sequence numbers of IP extension headers; other extension field values do not update the context. The decompressor MUST still update its translation table whenever an (Index, item) pair is received, even in UO-1-ID packets.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - ip
