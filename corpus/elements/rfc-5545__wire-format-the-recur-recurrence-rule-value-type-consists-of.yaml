document: rfc-5545
kind: wire-format
summary: The RECUR (recurrence rule) value type consists of NAME=VALUE parts separated by semicolons. The FREQ part (SECONDLY/MINUTELY/HOURLY/DAILY/WEEKLY/MONTHLY/YEARLY) is REQUIRED and MUST NOT occur more than once. UNTIL and COUNT are OPTIONAL but MUST NOT both be present. For backward compatibility, FREQ MUST be the first rule part specified.
section: 3.3.10
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
