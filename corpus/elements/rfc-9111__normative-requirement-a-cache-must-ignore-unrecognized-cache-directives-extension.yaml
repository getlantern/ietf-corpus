document: rfc-9111
kind: normative-requirement
summary: A cache MUST ignore unrecognized cache directives. Extension directives are designed as modifiers paired with a base directive, so caches that do not recognize the extension fall back to the behavior of the base directive, preserving backward compatibility.
section: 5.2.3
rfc2119_level: MUST
topics:
    - http
