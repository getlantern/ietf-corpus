document: rfc-9588
kind: normative-requirement
summary: Implementations MUST NOT use the shared group element K directly for any cryptographic operation. The SPAKE result must be used only via the K'[n] key derivation defined in Section 7.
section: "7"
rfc2119_level: MUST NOT
