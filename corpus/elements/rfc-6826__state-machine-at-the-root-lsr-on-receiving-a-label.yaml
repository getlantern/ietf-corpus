document: rfc-6826
kind: state-machine
summary: 'At the root LSR: on receiving a label mapping whose FEC contains a recognized transit opaque value, the multicast source and group are extracted and the downstream LDP neighbor is added to the olist of the (S,G) or (*,G) state (creating state if absent). On receiving a label withdraw, the downstream LDP neighbor is removed from the olist. Normal PIM processing follows in both cases.'
section: "2"
topics:
