document: rfc-1158
kind: state-machine
summary: ifAdminStatus (desired state, read-write) and ifOperStatus (current operational state, read-only) each take values up(1), down(2), or testing(3). The testing state indicates no operational packets can be passed. ifLastChange records the sysUpTime at which ifOperStatus last changed.
