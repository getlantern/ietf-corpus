document: rfc-5717
kind: interoperability-note
summary: If a node in the scope of a partial lock is deleted by the session owning the lock, it is removed from the lock scope, allowing other sessions to recreate it. If all nodes in scope are deleted, the lock persists but with an empty scope.
section: 2.4.1
topics:
    - netconf
    - yang
