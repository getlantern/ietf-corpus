document: rfc-6074
kind: protocol-element
summary: 'In Distributed VPLS, U-PEs have only a single signaling connection to their N-PE. Each U-PE-to-U-PE PW is composed of three spliced segments: U-PE-to-N-PE (U-PW), N-PE-to-N-PE (N-PW), and N-PE-to-U-PE (U-PW). N-PEs perform PW switching to stitch segments together.'
section: "3.5"
topics:
