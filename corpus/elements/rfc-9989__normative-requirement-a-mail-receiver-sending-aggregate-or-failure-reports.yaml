document: rfc-9989
kind: normative-requirement
summary: A Mail Receiver sending aggregate or failure reports MUST implement support for a 'mailto:' URI (i.e., ability to send reports via email). If the 'rua' tag is absent, Mail Receivers MUST NOT generate aggregate reports; if 'ruf' is absent, MUST NOT generate failure reports. URIs using unsupported schemes MUST be ignored.
section: "4.7"
rfc2119_level: MUST
topics:
    - email
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
