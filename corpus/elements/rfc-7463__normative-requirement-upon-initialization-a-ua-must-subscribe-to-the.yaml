document: rfc-7463
kind: normative-requirement
summary: Upon initialization, a UA MUST subscribe to the dialog event package of the AOR and refresh the subscription per RFC 6665. If the SUBSCRIBE fails, the feature is inactive for that AOR. The UA MAY retry at intervals no shorter than four hours.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
