document: rfc-2971
kind: protocol-element
summary: The ID response is an untagged server reply containing a field/value parameter list describing the server implementation. A server MUST send a tagged ID response to an ID command, but MAY send NIL in place of the list.
section: "3.2"
rfc2119_level: MUST
