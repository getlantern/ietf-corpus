document: rfc-4856
kind: protocol-element
summary: The audio/DVI4 media type requires a 'rate' parameter specifying the RTP timestamp clock rate equal to the sampling rate (typical value 8000 Hz). Optional parameters are 'ptime' and 'maxptime' as defined in RFC 4566 (SDP).
