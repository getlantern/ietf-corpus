kind: registry
summary: 'This document registers five XML namespace names with IANA: ''urn:ietf:params:xml:ns:xmpp-tls'', ''urn:ietf:params:xml:ns:xmpp-sasl'', ''urn:ietf:params:xml:ns:xmpp-streams'', ''urn:ietf:params:xml:ns:xmpp-bind'', and ''urn:ietf:params:xml:ns:xmpp-stanzas''. It also registers the GSSAPI service name ''xmpp'' and confirms TCP port 5222 (xmpp-client) and port 5269 (xmpp-server).'
