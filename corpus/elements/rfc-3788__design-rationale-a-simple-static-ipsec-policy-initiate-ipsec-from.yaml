document: rfc-3788
kind: design-rationale
summary: A simple static IPsec policy ('initiate IPsec from me to any, destination port P' outbound; 'require IPsec from any to me, destination port P' inbound) is recommended for peer-to-peer use because it avoids per-peer policy configuration and does not require dynamic policy modification when new SIGTRAN sessions are created.
section: "8"
topics:
