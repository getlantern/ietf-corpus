document: rfc-4429
kind: normative-requirement
summary: Optimistic DAD SHOULD only be used when the implementation is aware that the address is based on a most-likely-unique interface identifier, such as one derived from a hardware address (RFC 2464), generated randomly (RFC 3041), produced by a well-distributed hash (RFC 3972), or assigned by DHCPv6. Optimistic DAD SHOULD NOT be used for manually entered addresses.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
