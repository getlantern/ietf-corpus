document: rfc-8336
kind: normative-requirement
summary: Once an Origin Set is initialized, clients MUST NOT consider a connection authoritative for an origin not present in the Origin Set, and SHOULD use the connection for all requests to origins in the Origin Set for which the connection is authoritative.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - http
