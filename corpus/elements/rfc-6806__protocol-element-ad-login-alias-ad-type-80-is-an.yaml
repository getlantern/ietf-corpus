document: rfc-6806
kind: protocol-element
summary: AD-LOGIN-ALIAS (ad-type 80) is an authorization data element wrapped in AD-KDC-ISSUED that lists one or more aliases for a principal. It is included in initial credentials and copied into additional credentials to permit authorization decisions based on aliases and support user-to-user exchanges.
section: "6"
topics:
