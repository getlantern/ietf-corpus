document: rfc-7731
kind: normative-requirement
summary: If PROACTIVE_FORWARDING is TRUE, the MPL Forwarder MUST initialize and start a Trickle timer for each accepted MPL Data Message. If CONTROL_MESSAGE_TIMER_EXPIRATIONS is non-zero and the MPL Control Message Trickle timer is not running, the forwarder MUST initialize and start it; if already running, MUST reset it.
section: "9.3"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
