document: rfc-4582
kind: normative-requirement
summary: If a BFCP entity receives data from TCP that cannot be parsed, it MUST close the TCP connection, and the connection SHOULD be reestablished. If a TCP connection times out while delivering a BFCP message, the connection SHOULD be reestablished.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
    - tcp
