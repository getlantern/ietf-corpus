document: rfc-3292
kind: normative-requirement
summary: 'When issuing a failure response the switch MUST choose the most specific applicable failure code according to the precedence: Invalid Message > General Message Failure > Specific Message Failure > Connection Failures > VP Connection Failures > Multicast Failures > QoS Failures > General Failures > Warnings.'
section: 3.1.4
rfc2119_level: MUST
