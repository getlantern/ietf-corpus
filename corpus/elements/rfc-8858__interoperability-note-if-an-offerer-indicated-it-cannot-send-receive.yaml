document: rfc-8858
kind: interoperability-note
summary: If an offerer indicated it cannot send/receive RTCP on a separate port (via 'rtcp-mux-only') and the answer does not contain 'rtcp-mux', the offerer MUST disable the associated media streams rather than fall back to separate ports, updating RFC 5761 Section 5.1.1.
section: "5.2"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
