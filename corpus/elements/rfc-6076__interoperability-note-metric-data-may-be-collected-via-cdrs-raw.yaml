document: rfc-6076
kind: interoperability-note
summary: Metric data may be collected via CDRs, raw signaling from proxies or UAs, SNMP/SIP MIB modules (RFC 4780), or via event packages using SUBSCRIBE (RFC 3265). If individual elements use different sample sizes, reported metrics for the same event may differ significantly.
section: "5.5"
topics:
