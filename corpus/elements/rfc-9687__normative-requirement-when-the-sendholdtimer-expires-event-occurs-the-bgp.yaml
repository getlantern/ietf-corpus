document: rfc-9687
kind: normative-requirement
summary: When the SendHoldTimer_Expires event occurs, the BGP connection MUST be closed. A NOTIFICATION message with the 'Send Hold Timer Expired' Error Code MAY be sent if doing so will not delay closing the connection.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
