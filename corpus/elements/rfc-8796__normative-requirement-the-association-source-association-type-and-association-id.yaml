document: rfc-8796
kind: normative-requirement
summary: The Association Source, Association Type, and Association ID in the B-SFRR-Ready Extended ASSOCIATION object MUST be set as defined in RFC 4872. The Association Source is set to an address of the PLR node, and the Global Association Source MUST be set per RFC 6780.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
