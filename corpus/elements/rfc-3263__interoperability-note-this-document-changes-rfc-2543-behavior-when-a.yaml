document: rfc-3263
kind: interoperability-note
summary: 'This document changes RFC 2543 behavior: when a TARGET has an explicit port (even port 5060), A or AAAA records are now used rather than SRV records. Previously, SRV records were used for explicit port 5060.'
section: "4.2"
topics:
