document: rfc-8839
kind: normative-requirement
summary: To restart ICE, an agent MUST change both the 'ice-pwd' and the 'ice-ufrag' for the data stream in an offer. Implementations MUST NOT use setting the connection address to '0.0.0.0'/'::'  for call hold; instead MUST use 'inactive' and 'sendonly'.
section: 4.4.1.1.1
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
