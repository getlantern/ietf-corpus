document: rfc-8926
kind: design-rationale
summary: Geneve is a pure data-plane tunnel format specification that does not mandate any control plane. This was a deliberate choice because control planes are diverse in fundamental ways and standardization offers less value there; decoupling the data format from the control plane simultaneously promotes a shared data format while reducing obsolescence risk from future control plane evolution.
section: "2.1"
topics:
    - routing
