document: rfc-1123
kind: normative-requirement
summary: Data returned by NLST MUST contain only a simple list of legal pathnames usable directly as arguments to subsequent transfer commands. LIST and NLST SHOULD use implied TYPE AN (or TYPE EN for EBCDIC).
section: 4.1.2.7
rfc2119_level: MUST
