document: rfc-3814
kind: protocol-element
summary: 'mplsFTNPerfTable provides per-interface, per-FTN-entry high-capacity counters: mplsFTNPerfMatchedPackets (Counter64) and mplsFTNPerfMatchedOctets (Counter64), plus mplsFTNPerfDiscontinuityTime (TimeStamp) recording the most recent counter discontinuity. Entries exist only for FTN rules that are actively mapped to at least one interface.'
