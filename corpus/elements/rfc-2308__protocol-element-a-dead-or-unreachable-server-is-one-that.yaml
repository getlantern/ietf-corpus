document: rfc-2308
kind: protocol-element
summary: A dead or unreachable server is one that fails to respond within 120 seconds or for which a transport-layer indication (ICMP unreachable, TCP reset) was received. The indication can be cached for up to 5 minutes.
section: "7.2"
