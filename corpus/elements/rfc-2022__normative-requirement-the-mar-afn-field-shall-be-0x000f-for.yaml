document: rfc-2022
kind: normative-requirement
summary: The mar$afn field SHALL be 0x000F for all MARS messages defined in this document. Where a protocol has an assigned number in the mar$pro.type space (excluding 0x80), the short form MUST be used when transmitting MARS messages.
section: 4.3.1
rfc2119_level: MUST
topics:
