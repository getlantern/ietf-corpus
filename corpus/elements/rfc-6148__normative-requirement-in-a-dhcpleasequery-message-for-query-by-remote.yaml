document: rfc-6148
kind: normative-requirement
summary: 'In a DHCPLEASEQUERY message for query by Remote ID: the ciaddr field MUST be set to zero, the values of htype, hlen, and chaddr MUST be set to zero, and the Client Identifier option (option 61) MUST NOT appear in the packet.'
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
