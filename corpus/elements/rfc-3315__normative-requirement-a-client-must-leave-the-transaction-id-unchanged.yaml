document: rfc-3315
kind: normative-requirement
summary: A client MUST leave the transaction ID unchanged in retransmissions of a message. The client SHOULD generate a random, hard-to-predict transaction ID for each new message to reduce vulnerability to spoofing by off-path attackers.
section: "15.1"
rfc2119_level: MUST
topics:
    - ip
    - security
