document: rfc-7037
kind: design-rationale
summary: When the centralized DHCPv6 server is not co-located with the RADIUS server, there is no shared user database, so a new mechanism (OPTION_RADIUS) is needed for the DHCPv6 relay agent to transfer RADIUS authorization attributes to the DHCPv6 server. This document addresses that gap for ISP broadband deployments.
