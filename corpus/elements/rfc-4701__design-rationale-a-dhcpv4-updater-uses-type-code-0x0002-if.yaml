document: rfc-4701
kind: design-rationale
summary: A DHCPv4 updater uses type code 0x0002 if a Client Identifier option is present and encoded per RFC 4361 (DUID-based), 0x0001 if a Client Identifier option is present (non-DUID), and 0x0000 if no Client Identifier option is present. A DHCPv6 updater always uses 0x0002.
section: "3.5"
topics:
    - dns
