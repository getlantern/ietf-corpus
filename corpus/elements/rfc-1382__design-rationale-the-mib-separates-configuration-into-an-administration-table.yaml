document: rfc-1382
kind: design-rationale
summary: The MIB separates configuration into an Administration table (read-write) and an Operational table (read-only). The admin table holds values set by the administrator; the oper table reflects values actually in use. This allows inspection of running state independently of pending configuration.
section: "3.4"
topics:
    - snmp
