document: rfc-9034
kind: normative-requirement
summary: The originating node MUST ensure that (DT_abs - OT_abs) < 2^N * (1 - SAFETY_FACTOR), where N is the number of integer-part bits and SAFETY_FACTOR = 20%, so that intermediate nodes can reliably detect deadline expiration using modular arithmetic.
section: "5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
