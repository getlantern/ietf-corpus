document: rfc-2597
kind: security-consideration
summary: To protect against denial of service attacks, a provider DS domain SHOULD limit traffic entering the domain to subscribed profiles. The provider SHOULD also allow the customer DS domain to specify how link resources are allocated to AF packets to protect customer-facing links from DoS.
section: "8"
rfc2119_level: SHOULD
topics:
    - diffserv
    - security
