document: rfc-3852
kind: protocol-element
summary: KeyAgreeRecipientInfo uses a sender-recipient pairwise key to encrypt the content-encryption key. It contains version (always 3), originator (OriginatorIdentifierOrKey — three alternatives including an anonymous originatorKey), optional ukm (UserKeyingMaterial OCTET STRING), keyEncryptionAlgorithm, and recipientEncryptedKeys.
section: 6.2.2
topics:
