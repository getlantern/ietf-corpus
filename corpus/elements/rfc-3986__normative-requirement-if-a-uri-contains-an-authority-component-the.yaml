document: rfc-3986
kind: normative-requirement
summary: If a URI contains an authority component, the path MUST either be empty or begin with a slash ("/"). If a URI does not contain an authority component, the path MUST NOT begin with two slash characters ("//").
section: "3.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
