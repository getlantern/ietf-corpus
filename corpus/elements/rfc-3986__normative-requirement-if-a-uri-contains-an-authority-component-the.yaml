document: rfc-3986
kind: normative-requirement
summary: If a URI contains an authority component, the path must either be empty or begin with "/". If no authority is present, the path cannot begin with "//". These constraints disambiguate the five ABNF path rules.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
