summary: 'Five OSPF packet types are defined: Hello (Type 1) for neighbor discovery/maintenance, Database Description (Type 2) for database summaries, Link State Request (Type 3), Link State Update (Type 4), and Link State Acknowledgment (Type 5). All share a common 24-byte OSPF header.'
