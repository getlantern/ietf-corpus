document: rfc-7110
kind: normative-requirement
summary: When sending an echo reply along a specified return path, a Reply Path TLV that identifies the return path MUST be carried, and the Reply Path return code SHOULD be set to the relevant code reflecting how the egress processed the Reply Path TLV and selected the return path.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
