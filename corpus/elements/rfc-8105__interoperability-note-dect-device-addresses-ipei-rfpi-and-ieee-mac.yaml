document: rfc-8105
kind: interoperability-note
summary: DECT device addresses (IPEI, RFPI) and IEEE MAC-48 addresses belong to different address spaces, so IIDs derived from DECT addresses via the RFC 4291 Appendix A procedure cannot be considered globally unique within the IEEE address space.
