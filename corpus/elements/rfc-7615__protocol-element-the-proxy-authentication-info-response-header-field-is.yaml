document: rfc-7615
kind: protocol-element
summary: 'The Proxy-Authentication-Info response header field is equivalent to Authentication-Info but applies to proxy authentication; its semantics are defined by the scheme indicated in the Proxy-Authorization header field of the corresponding request. Its ABNF is `Proxy-Authentication-Info = #auth-param`.'
section: "4"
