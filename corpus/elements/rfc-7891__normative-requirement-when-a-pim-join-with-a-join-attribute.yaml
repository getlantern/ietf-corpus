document: rfc-7891
kind: normative-requirement
summary: When a PIM Join with a Join Attribute list is received from a downstream neighbor, the router MUST verify that the order in which RPF Vector types appear matches what is stored for reaching the source or RP. Once the types match, the content MUST be compared per RFC 5384 Section 3.3.3.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
