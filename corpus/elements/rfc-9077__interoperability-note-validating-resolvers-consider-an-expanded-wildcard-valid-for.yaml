document: rfc-9077
kind: interoperability-note
summary: Validating resolvers consider an expanded wildcard valid for the wildcard's TTL, capped by the TTLs of the NSEC or NSEC3 proof. Reducing NSEC/NSEC3 TTLs per this document may shorten the effective lifetime of wildcard responses.
section: "4.1"
topics:
    - dns
