document: rfc-6749
kind: protocol-element
summary: 'OAuth defines two client types: confidential clients (capable of maintaining credential confidentiality, e.g., server-side web apps) and public clients (incapable, e.g., browser-based or native apps). The authorization server SHOULD NOT make assumptions about client type.'
section: "2.1"
topics:
    - oauth
    - security
