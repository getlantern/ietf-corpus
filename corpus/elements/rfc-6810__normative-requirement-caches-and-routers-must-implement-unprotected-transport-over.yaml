document: rfc-6810
kind: normative-requirement
summary: Caches and routers MUST implement unprotected transport over TCP using port rpki-rtr (323). If unprotected TCP is the transport, the cache and routers MUST be on the same trusted and controlled network.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
    - tcp
