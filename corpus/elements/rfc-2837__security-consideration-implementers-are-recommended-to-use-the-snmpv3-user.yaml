document: rfc-2837
kind: security-consideration
summary: Implementers are recommended to use the SNMPv3 User-based Security Model (RFC 2574) and the View-based Access Control Model (RFC 2575) to restrict GET/SET access to legitimate principals. Customer/user configuration of the SNMP entity is required to enforce per-object access rights.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - security
    - snmp
