document: rfc-7678
kind: interoperability-note
summary: The B4 interface IPv4 address for DS-Lite (valid range 192.0.0.2–192.0.0.7, default 192.0.0.2) is not provisioned via AAA in this framework because it is problematic when multiple B4 instances share a device; it is determined by implementation-dependent or static means.
section: "2.1"
