document: rfc-9420
kind: state-machine
summary: 'A group advances through a linear sequence of epochs, each initiated by a Commit message. States are: active epoch (members hold epoch_secret), transitioning (Commit sent/received, proposals applied, tree updated), and new epoch (fresh entropy derived, removed members excluded). Epochs are irreversible.'
