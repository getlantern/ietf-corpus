document: rfc-5985
kind: normative-requirement
summary: A HELD request is carried in the body of an HTTP POST request. The Device MUST include a Host header, and LIS and Device MUST provide 'application/held+xml' in the HTTP Content-Type and Accept header fields.
section: "8"
rfc2119_level: MUST
