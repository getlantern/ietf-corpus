document: rfc-8010
kind: interoperability-note
summary: When a Printer returns job-printer-uri or job-uri attributes, it SHOULD return the same URI scheme ('ipp' or 'ipps') that the Client supplied in the request target operation attributes, rather than the scheme used when the Job was originally created.
section: "9.2"
topics:
