document: rfc-8686
kind: interoperability-note
summary: The procedure is compatible with BCP 20 (RFC 2317) classless in-addr.arpa delegation for IPv4 prefixes shorter than /24. ISPs may publish NAPTR records at the /24 level even when BCP 20 delegations or no delegations are in use.
