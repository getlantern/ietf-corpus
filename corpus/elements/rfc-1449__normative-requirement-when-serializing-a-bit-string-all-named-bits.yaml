document: rfc-1449
kind: normative-requirement
summary: When serializing a BIT STRING, all named-bits must be transferred regardless of their truth-value; if the number of named-bits is not an integral multiple of eight, zero-valued padding bits must be appended to reach the next octet boundary.
section: "8"
rfc2119_level: MUST
