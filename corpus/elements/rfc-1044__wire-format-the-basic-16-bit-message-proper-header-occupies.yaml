document: rfc-1044
kind: wire-format
summary: 'The basic (16-bit) Message Proper header occupies bytes 0–9: byte 0 carries Trunks to Try (two 4-bit trunk masks) and Message Flags (A/D, BST, EXC bits); bytes 2–3 carry the Access Code; bytes 4–5 carry the 8-bit physical TO adapter address and port; bytes 6–7 carry the FROM adapter address and port; bytes 8–9 carry the Message Type.'
section: BASIC (16-BIT ADDRESS) MESSAGE PROPER HEADER
