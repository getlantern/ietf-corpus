document: rfc-5686
kind: normative-requirement
summary: For applications with discontinuous transmission (DTX), the first packet after a silence period SHOULD have the RTP marker bit set to one; the marker bit in all other packets MUST be zero. Applications without DTX MUST set the marker bit to zero.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
