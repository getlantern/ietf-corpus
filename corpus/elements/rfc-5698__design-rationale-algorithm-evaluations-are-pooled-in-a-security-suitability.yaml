document: rfc-5698
kind: design-rationale
summary: Algorithm evaluations are pooled in a security suitability policy expressed as a machine-readable data structure to enable automated processing, since expert committee evaluations are traditionally published as human-readable documents (e.g., Germany's Federal Network Agency annual publications). This allows signature generation and verification tools to interpret them programmatically.
section: "1.1"
topics:
