document: rfc-4560
kind: protocol-element
summary: 'pingCtlTrapGeneration is a BITS object with three flags: probeFailure(0) triggers pingProbeFailed notification (filtered by pingCtlTrapProbeFailureFilter, 0–15 consecutive failures), testFailure(1) triggers pingTestFailed, and testCompletion(2) triggers pingTestCompleted. Default is no bits set.'
