document: rfc-5998
kind: interoperability-note
summary: An IKE SA established with EAP-only authentication can be resumed using the IKEv2 Session Resumption mechanism (RFC 5723). However, session resumption does not change the authentication method, so the EAP_ONLY_AUTHENTICATION notification MUST NOT be sent during the resumed IKE_AUTH exchange.
section: "3"
topics:
    - ipsec
    - vpn
