document: rfc-4788
kind: interoperability-note
summary: EVRC-B and EVRC codecs do not interoperate with each other because their speech frames are different. At RTP session initiation, sender and receiver must use separate MIME subtypes (e.g., EVRCB vs. EVRC) to indicate which codec is in use.
section: "1.1"
topics:
    - realtime
    - rtp
    - voip
