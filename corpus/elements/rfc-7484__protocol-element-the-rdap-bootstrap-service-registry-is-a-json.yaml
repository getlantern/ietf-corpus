document: rfc-7484
kind: protocol-element
summary: 'The RDAP Bootstrap Service Registry is a JSON object with members: ''version'' (string, currently ''1.0''), ''publication'' (RFC 3339 date/time string), optional ''description'' (string), and ''services'' (array). Each services entry is a two-element array: an Entry Array of scope strings and a Service URL Array of base RDAP URLs.'
section: "3"
topics:
