document: rfc-5440
kind: normative-requirement
summary: A PCReq message MUST contain both an RP object and an END-POINTS object; if either is missing the PCE MUST send a PCErr with Error-Type 'Required Object missing'. Implementations MUST form PCEP messages using the object ordering specified in the document.
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
