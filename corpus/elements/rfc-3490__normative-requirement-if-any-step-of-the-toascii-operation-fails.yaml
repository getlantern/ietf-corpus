document: rfc-3490
kind: normative-requirement
summary: If any step of the ToASCII operation fails on any label in a domain name, that domain name MUST NOT be used as an internationalized domain name; the method for dealing with this failure is application-specific.
section: "4.1"
rfc2119_level: MUST NOT
