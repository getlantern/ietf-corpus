document: rfc-9460
kind: normative-requirement
summary: To establish an ALPN-negotiated connection, clients MUST compute the intersection of the SVCB ALPN set with client-supported protocols, determine implied transports, and for each transport construct a ProtocolNameList containing all client-supported protocols for that transport (not restricted to the SVCB ALPN set).
section: 7.1.2
rfc2119_level: MUST
topics:
