document: rfc-9406
kind: design-rationale
summary: 'CSS is introduced between Slow Start and Congestion Avoidance to handle jitter: if RTT returns to baseline during CSS, the earlier delay spike was not congestion-induced and slow start resumes, preventing premature bandwidth limitation due to transient delay spikes.'
