document: rfc-6416
kind: security-consideration
summary: Most MPEG-4 codecs define an extension mechanism to transmit extra data within a valid stream that is gracefully skipped by non-supporting decoders. This mechanism could be exploited to embed unwanted data in an otherwise legitimate stream.
section: "10"
topics:
    - security
    - rtp
