document: rfc-9360
kind: interoperability-note
summary: 'The ''x5u'' header parameter supports multiple media types for the referenced resource: application/pkix-cert, application/pkcs7-mime with smime-type=certs-only, application/cose-x509, and application/cose-x509 with usage=chain. When application/cose-x509 is used, data is a CBOR sequence of single-entry COSE_X509 bstr structures.'
section: "2"
topics:
    - pkix
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
