document: rfc-1663
kind: normative-requirement
summary: In inverse-multiplexing configurations, every link in a single machine MUST have different Magic Numbers; each end of every link between two peers SHOULD have Magic Numbers unique to those peers to protect against patch-panel errors and loopbacks.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
