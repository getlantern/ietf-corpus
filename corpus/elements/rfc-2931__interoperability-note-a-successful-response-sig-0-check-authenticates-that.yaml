document: rfc-2931
kind: interoperability-note
summary: A successful response SIG(0) check authenticates that data-RRs were sent by the queried server and have not been tampered with in transit, but does NOT directly authenticate the validity of data-RRs themselves. Only a proper SIG(0) RR signed by the zone or a key tracing authority to the zone can directly authenticate data-RRs.
section: "3.2"
topics:
    - dns
    - security
