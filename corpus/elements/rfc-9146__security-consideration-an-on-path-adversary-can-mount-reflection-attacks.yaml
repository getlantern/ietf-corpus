document: rfc-9146
kind: security-consideration
summary: An on-path adversary can mount reflection attacks against third parties by triggering peer address updates, since a DTLS peer cannot distinguish a genuine NAT rebinding from a malicious address change. This is especially dangerous when requests are small and responses large.
section: "9"
topics:
    - tls
    - security
