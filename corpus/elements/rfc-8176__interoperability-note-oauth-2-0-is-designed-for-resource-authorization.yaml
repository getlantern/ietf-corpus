document: rfc-8176
kind: interoperability-note
summary: OAuth 2.0 is designed for resource authorization and cannot be used for authentication without appropriate extensions such as OpenID Connect Core 1.0. The existence of 'amr' claim values should not be taken as encouragement to use OAuth 2.0 for authentication without such extensions.
section: "1"
topics:
    - oauth
    - security
