document: rfc-7223
kind: interoperability-note
summary: The IF-MIB allows two different ifEntries to have the same ifName. Devices that support this feature and also support the ietf-interfaces data model cannot have a 1-1 mapping between the 'name' leaf and ifName, creating a compatibility constraint.
