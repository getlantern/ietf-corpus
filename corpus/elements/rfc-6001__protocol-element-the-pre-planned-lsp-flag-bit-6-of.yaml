document: rfc-6001
kind: protocol-element
summary: The Pre-Planned LSP flag (bit 6 of the Attributes Flags TLV in LSP_ATTRIBUTES/LSP_REQUIRED_ATTRIBUTES per RFC 5420) controls whether an LSP is fully data-plane provisioned (value 0) or established only in the control plane without committing data-plane resources (value 1). Transitioning from 1 to 0 via re-signaling commits data-plane resources.
section: 5.2.1
topics:
    - mpls
    - routing
