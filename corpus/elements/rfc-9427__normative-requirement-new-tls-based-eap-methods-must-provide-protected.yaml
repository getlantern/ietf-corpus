document: rfc-9427
kind: normative-requirement
summary: New TLS-based EAP methods MUST provide protected success and failure indications inside the TLS tunnel. Implementations SHOULD use EAP-GTC instead of PAP, EAP-MD5 instead of CHAP, and MS-CHAPv2/EAP-MSCHAPv2 instead of MS-CHAPv1 to gain protected result indications.
section: "5.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
