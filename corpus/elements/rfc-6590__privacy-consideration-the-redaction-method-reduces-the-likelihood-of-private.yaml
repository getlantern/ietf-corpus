document: rfc-6590
kind: privacy-consideration
summary: The redaction method reduces the likelihood of private data leaking between Administrative Management Domains (ADMDs), but report-generation software cannot feasibly identify all the ways private information may be expressed in human-written text. When stronger protections are required, out-of-band arrangements between relevant entities should be established.
