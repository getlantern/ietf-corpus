document: rfc-6415
kind: normative-requirement
summary: When looking for host-wide information, the client MUST ignore any 'Link' elements with a 'template' attribute, as well as any link using the 'lrdd' relation type. All other elements are scoped as host-wide.
section: "4.1"
rfc2119_level: MUST
