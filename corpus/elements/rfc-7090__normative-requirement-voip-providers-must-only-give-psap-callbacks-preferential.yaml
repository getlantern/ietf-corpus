document: rfc-7090
kind: normative-requirement
summary: VoIP providers MUST only give PSAP callbacks preferential treatment when the calling party identity of the PSAP was successfully matched against entries in a white list. If not verified, the provider MUST remove the PSAP callback marking so the call reverts to normal treatment.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
