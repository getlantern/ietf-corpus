document: rfc-4666
kind: normative-requirement
summary: Where multiple Routing Keys and Routing Contexts are used across a common SCTP association, the Routing Context MUST be included in DATA messages to identify the traffic flow and assist internal distribution. In DUNA/SSNM messages, Routing Context(s) MUST be sent to identify the concerned traffic flows when multiple Routing Contexts share an association.
section: 3.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
