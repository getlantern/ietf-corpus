document: rfc-6665
kind: normative-requirement
summary: Upon successfully accepting or refreshing a subscription, notifiers MUST immediately send a NOTIFY request communicating current resource state to the subscriber. This applies regardless of whether authorization has been completed.
section: 4.2.1.2
rfc2119_level: MUST
topics:
