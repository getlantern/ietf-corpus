summary: 'Three FC port-connection types are supported over an FC PW: N_Port to N_Port (established by PLOGI), N_Port to F_Port (established by FLOGI), and E_Port to E_Port (established by ELP). Other FC connection types such as NL_Port and FL_Port are not supported.'
