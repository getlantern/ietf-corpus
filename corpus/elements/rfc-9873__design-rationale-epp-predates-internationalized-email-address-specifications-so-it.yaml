document: rfc-9873
kind: design-rationale
summary: EPP predates internationalized email address specifications, so it has no native support for SMTPUTF8 addresses. This extension adds a second email slot to the contact object rather than modifying the base contact mapping, preserving backward compatibility.
section: "1"
topics:
