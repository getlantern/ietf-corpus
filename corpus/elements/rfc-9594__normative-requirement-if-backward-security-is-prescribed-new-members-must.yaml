document: rfc-9594
kind: normative-requirement
summary: If backward security is prescribed (new members must not access prior communications), the KDC MUST generate new group keying material and distribute it to existing members before completing the join. If forward security is required (departing members must not access future communications), a rekeying MUST occur on every departure or eviction.
section: 4.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
