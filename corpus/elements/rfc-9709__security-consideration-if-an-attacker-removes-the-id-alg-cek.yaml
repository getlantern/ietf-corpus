document: rfc-9709
kind: security-consideration
summary: If an attacker removes the id-alg-cek-hkdf-sha256 OID from the contentEncryptionAlgorithm.algorithm field before delivery, the recipient will not derive CEK' and will fail to decrypt, denying access to the content but not aiding the attacker in recovering plaintext.
section: "6"
topics:
