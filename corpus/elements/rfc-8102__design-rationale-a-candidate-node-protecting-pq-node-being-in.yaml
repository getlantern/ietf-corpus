document: rfc-8102
kind: design-rationale
summary: A candidate node-protecting PQ-node being in node-protecting extended P-space does not guarantee the full R-LFA alternate path is node-protecting; it guarantees only the S-to-PQ-node segment avoids E. A separate per-destination check via forward SPF on the PQ-node is required to validate the PQ-node-to-destination segment.
section: 2.2.5
topics:
    - routing
