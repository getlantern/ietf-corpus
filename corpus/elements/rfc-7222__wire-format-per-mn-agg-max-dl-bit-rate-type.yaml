document: rfc-7222
kind: wire-format
summary: Per-MN-Agg-Max-DL-Bit-Rate (Type 1, Length 6) and Per-MN-Agg-Max-UL-Bit-Rate (Type 2, Length 6) each carry a 16-bit Reserved field followed by a 32-bit unsigned integer in bits per second representing an aggregate limit across all mobility sessions for the mobile node; the QoS-Traffic-Selector attribute does not apply to these attributes.
