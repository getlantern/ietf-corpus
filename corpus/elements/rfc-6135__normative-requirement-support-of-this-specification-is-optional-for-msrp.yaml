document: rfc-6135
kind: normative-requirement
summary: Support of this specification is OPTIONAL for MSRP UAs in general. UAs that are likely to be deployed in networks with NATs SHOULD support this specification to improve chances of successful TCP NAT traversal.
section: "3"
rfc2119_level: SHOULD
