document: rfc-8287
kind: design-rationale
summary: The format of Segment ID sub-TLVs follows the philosophy of the Target FEC Stack TLV carrying FECs corresponding to each label in the label stack, enabling LSP Ping/Traceroute to function even when the Target FEC Stack TLV contains more FECs than label stacks received at responder nodes.
