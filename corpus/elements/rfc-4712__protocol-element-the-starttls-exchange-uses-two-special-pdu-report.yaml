document: rfc-4712
kind: protocol-element
summary: 'The StartTLS exchange uses two special PDU Report Types: TLS_REQ (sent by the RDS client to request TLS) and TLS_RESP (returned by the RRC), with seven defined result codes: OK (0), OP_ERR (1), PROTO_ERR (2), UNAVAIL (3), CONF_REQD (4), STRONG_AUTH_REQD (5), and REFERRAL (6).'
