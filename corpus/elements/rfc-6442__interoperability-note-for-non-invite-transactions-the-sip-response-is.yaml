document: rfc-6442
kind: interoperability-note
summary: For non-INVITE transactions, the SIP response is likely sent before the dereference of a location URI completes. Receivers of a 200 OK to a non-INVITE request containing location SHOULD NOT interpret that response as confirmation that dereferencing succeeded and the PIDF-LO was parsed without errors.
section: "4.4"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
