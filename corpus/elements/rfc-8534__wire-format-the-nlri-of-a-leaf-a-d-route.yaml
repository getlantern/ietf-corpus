document: rfc-8534
kind: wire-format
summary: 'The NLRI of a Leaf A-D route originated in response to LIR-pF contains: RD (8 octets), Multicast Source Length (1 octet), Multicast Source (variable), Multicast Group Length (1 octet), Multicast Group (variable), and Ingress PE''s IP Address (variable). For (C-*,C-G) flows, Multicast Source is omitted and Source Length is set to 0.'
section: "5.2"
topics:
