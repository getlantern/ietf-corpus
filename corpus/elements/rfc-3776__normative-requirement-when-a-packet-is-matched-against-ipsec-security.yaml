document: rfc-3776
kind: normative-requirement
summary: When a packet is matched against IPsec security policy, an address in a Home Address destination option MUST be treated as the source address, and a home address in a Type 2 Routing header MUST be treated as the destination address.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - ip
