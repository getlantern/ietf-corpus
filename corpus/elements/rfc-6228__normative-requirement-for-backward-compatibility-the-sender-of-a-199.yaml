document: rfc-6228
kind: normative-requirement
summary: For backward compatibility, the sender of a 199 response MUST be prepared to receive SIP requests and responses on the dialog for which the 199 was sent. A UAC that receives a 199 MUST NOT send any further requests on that dialog except requests acknowledging reliable responses.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - realtime
