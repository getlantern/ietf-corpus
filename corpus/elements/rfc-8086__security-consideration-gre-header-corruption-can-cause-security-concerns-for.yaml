document: rfc-8086
kind: security-consideration
summary: GRE header corruption can cause security concerns for applications that rely on the GRE Key field for traffic separation (e.g., NVGRE). At least one of the UDP or GRE checksums MUST be used in such cases to detect corruption.
section: "11"
topics:
    - security
    - udp
