document: rfc-5535
kind: protocol-element
summary: The HBA-set generation process takes as inputs a vector of n 64-bit prefixes, a Sec parameter, and optionally a public key. It outputs an HBA-set and their respective CGA Parameter Data Structures, reusing the CGA generation process from RFC 3972 with the Multi-Prefix extension included.
