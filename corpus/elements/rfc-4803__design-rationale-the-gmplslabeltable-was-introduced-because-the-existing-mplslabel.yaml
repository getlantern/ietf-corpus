document: rfc-4803
kind: design-rationale
summary: The gmplsLabelTable was introduced because the existing MplsLabel textual convention (32-bit) cannot represent all GMPLS label types. GMPLS generalized labels vary in length and bit-by-bit interpretation depending on the switching technology (e.g., MPLS packet labels differ fundamentally from TDM timeslot labels).
section: 4.1.2
topics:
