document: rfc-907
kind: protocol-element
summary: Each host on the satellite network is assigned a permanent 16-bit logical address independent of its physical port on the SIMP. These 16-bit addresses are provided in all Host-to-SIMP and SIMP-to-Host data messages in the destination (word 4) and source (word 5) fields.
