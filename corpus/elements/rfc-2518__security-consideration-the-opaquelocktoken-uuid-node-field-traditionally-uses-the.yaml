document: rfc-2518
kind: security-consideration
summary: The opaquelocktoken UUID node field traditionally uses the IEEE 802 address, which exposes the server machine's MAC address. An alternative algorithm using a 47-bit cryptographic random number with the multicast bit set is provided to avoid this exposure.
section: "17.8"
