document: rfc-8739
kind: protocol-element
summary: 'Two new HTTP response header fields are defined for STAR certificate responses: ''Cert-Not-Before'' and ''Cert-Not-After'', both using HTTP-date format (RFC 7231 Section 7.1.1.2). When present, they MUST equal the corresponding fields inside the end-entity certificate, enabling clients that do not parse certificates to determine validity windows.'
section: "3.3"
topics:
    - acme
    - http
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
