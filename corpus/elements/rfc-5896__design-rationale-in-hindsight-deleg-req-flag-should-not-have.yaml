document: rfc-5896
kind: design-rationale
summary: In hindsight, deleg_req_flag should not have been defined to mean unconditional delegation. Promiscuous delegation reduces overall security by unnecessarily exposing user credentials, including to hosts and services that the user has no reason to trust.
section: "6"
topics:
    - security
