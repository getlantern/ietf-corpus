document: rfc-6677
kind: normative-requirement
summary: If i1 or i2 does not comply with policy, the EAP server MUST NOT list information that failed to comply in the set of information used to perform channel binding. The EAP server SHOULD indicate channel-binding failure in this case.
section: "5.1"
rfc2119_level: MUST NOT
