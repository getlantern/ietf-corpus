document: rfc-5170
kind: normative-requirement
summary: 'LDPC-Staircase encoding MUST follow natural repair symbol order: the first repair symbol is generated first, and repair symbol with ESI i must be generated before ESI i+1, because each repair symbol equals the XOR sum of associated source symbols plus the previous repair symbol.'
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
