document: rfc-3672
kind: protocol-element
summary: The specificationFilter component is a Refinement — a boolean expression (item/and/or/not) over objectClass OIDs. An entry is excluded from the subtree refinement if the filter evaluates to false for that entry. If absent, no entries are excluded based on objectClass.
