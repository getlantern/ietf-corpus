document: rfc-5147
kind: normative-requirement
summary: When an integrity check specifies a character encoding, clients MUST verify that it matches the retrieved MIME entity's encoding, and MUST NOT apply the integrity check if they differ (though they MAY transcode first and then apply the check).
section: "2.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
