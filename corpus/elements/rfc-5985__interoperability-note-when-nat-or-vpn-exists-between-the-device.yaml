document: rfc-5985
kind: interoperability-note
summary: When NAT or VPN exists between the Device and LIS, the source IP address seen by the LIS may not accurately identify the Device's physical location. Devices SHOULD perform their HELD query prior to establishing VPN or proxy connections to avoid receiving location based on a tunneled address.
section: "4.1"
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
