document: rfc-4880
kind: protocol-element
summary: 'String-to-Key (S2K) specifiers convert passphrases to symmetric keys. Three types are defined: Simple S2K (0x00, hash only), Salted S2K (0x01, 8-octet salt + hash), and Iterated and Salted S2K (0x03, salt + hash with repeated hashing). Values 100–110 are private/experimental.'
section: 3.7.1
topics:
