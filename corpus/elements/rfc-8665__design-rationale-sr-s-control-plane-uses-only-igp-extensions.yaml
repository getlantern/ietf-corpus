document: rfc-8665
kind: design-rationale
summary: SR's control plane uses only IGP extensions (OSPFv2 in this document) to program the MPLS data plane, eliminating the need for LDP or RSVP-TE signaling. This simplification is a primary motivation for SR; it can still interoperate with LDP- or RSVP-established LSPs when required.
section: "1"
