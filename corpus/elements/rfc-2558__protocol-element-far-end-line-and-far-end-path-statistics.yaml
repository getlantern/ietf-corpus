document: rfc-2558
kind: protocol-element
summary: 'Far End Line and Far End Path statistics (ES, SES, CV, UAS) are derived from the Far End Block Error (FEBE) count: for Line, from the third Z2 byte of Line Overhead; for Path, from the FEBE bits in the G1 byte of Path Overhead. These groups are optional and apply only to LTE equipment providing FEBE information.'
section: "4.4"
