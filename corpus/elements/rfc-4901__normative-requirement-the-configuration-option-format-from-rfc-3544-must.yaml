document: rfc-4901
kind: normative-requirement
summary: The Configuration Option Format from RFC 3544 MUST be included for ECRTP, CRTP, and IPHC PW types and MUST NOT be included for ROHC PW types. A decompressor MUST reject this option for ROHC PW types and send an explicit error message to the compressor.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
