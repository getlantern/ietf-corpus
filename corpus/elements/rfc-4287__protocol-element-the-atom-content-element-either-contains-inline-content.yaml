document: rfc-4287
kind: protocol-element
summary: The atom:content element either contains inline content or references external content via a 'src' attribute (IRI). When 'src' is present, atom:content MUST be empty and the 'type' attribute SHOULD be a MIME media type. Inline content supports text, html, xhtml, XML media types, text/* types, and Base64-encoded binary.
section: 4.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
