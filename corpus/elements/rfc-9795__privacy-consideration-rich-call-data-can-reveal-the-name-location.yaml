document: rfc-9795
kind: privacy-consideration
summary: Rich Call Data can reveal the name, location, affiliation, or other personal information of the caller. While baseline PASSporT relies on transport-level security (e.g., SIP over TLS) for confidentiality, including rich personal data in RCD increases exposure risk and the verifier's dereferencing of URIs may leak calling patterns to third-party servers.
section: "16"
topics:
    - privacy
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
