document: rfc-7164
kind: normative-requirement
summary: To maintain a consistent RTCP schedule and avoid unintentional timeouts, senders suppressing sender reports near a leap second MAY send receiver reports in place of sender reports.
section: "5.1"
rfc2119_level: MAY
topics:
    - rtp
    - realtime
