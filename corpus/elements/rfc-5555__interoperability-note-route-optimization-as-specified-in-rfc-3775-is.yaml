document: rfc-5555
kind: interoperability-note
summary: Route optimization as specified in RFC 3775 is not possible for IPv4 traffic (traffic addressed to the mobile node's IPv4 home address) or when the mobile node is in an IPv4-only network, because the return-routability test cannot be performed; all such traffic must flow through the home agent.
section: "2.4"
topics:
    - mobility
    - ip
    - nat
