document: rfc-6321
kind: normative-requirement
summary: When converting iCalendar to xCal, any property whose default value type is not known MUST be converted using the IC:unknown value element containing the unprocessed value text. Unrecognized property parameters also MUST use IC:unknown with the parameter value text.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
