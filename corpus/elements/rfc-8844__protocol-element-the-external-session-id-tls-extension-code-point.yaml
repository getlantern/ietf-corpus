document: rfc-8844
kind: protocol-element
summary: The 'external_session_id' TLS extension (code point 56) carries the 'tls-id' SDP attribute value chosen by the sending endpoint, binding the TLS handshake to the specific signaling session. It is sent in ClientHello and, if present in ClientHello, in ServerHello (pre-TLS 1.3) or EncryptedExtensions (TLS 1.3).
section: "4.3"
topics:
