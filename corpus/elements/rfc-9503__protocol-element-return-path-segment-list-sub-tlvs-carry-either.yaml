document: rfc-9503
kind: protocol-element
summary: Return Path Segment List Sub-TLVs carry either an SR-MPLS Label Stack (Type=3) or SRv6 Segment List (Type=4) specifying the return path. Segments MUST be in network order and the list MUST contain at least one segment.
