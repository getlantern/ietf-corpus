document: rfc-2476
kind: security-consideration
summary: Separating submission from relay allows a site to require authentication for submission while rejecting non-local relay, preventing open relay abuse and unsolicited bulk email injection. Failure to require any authorization allows open use of the site's resources and name for spam.
section: "9"
topics:
