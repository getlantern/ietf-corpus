document: rfc-8206
kind: interoperability-note
summary: BGPsec confederations support in RFC 8205 is not directly applicable to AS migration because in migration, eBGP peers may not be peering with the correct external ASN and forward-signed updates are for public ASNs, so signatures are not stripped before propagation as they would be in a confederation.
section: "2"
topics:
    - bgp
    - routing
