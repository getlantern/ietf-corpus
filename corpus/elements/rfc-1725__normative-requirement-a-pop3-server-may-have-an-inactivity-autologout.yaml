document: rfc-1725
kind: normative-requirement
summary: A POP3 server MAY have an inactivity autologout timer, but if implemented it MUST be of at least 10 minutes' duration. On expiry, the server closes the TCP connection without entering UPDATE state, without removing messages, and without sending a response.
section: "3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
