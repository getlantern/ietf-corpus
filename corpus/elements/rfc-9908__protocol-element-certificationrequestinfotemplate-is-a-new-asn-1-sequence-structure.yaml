document: rfc-9908
kind: protocol-element
summary: CertificationRequestInfoTemplate is a new ASN.1 SEQUENCE structure that resembles PKCS#10 CertificationRequestInfo but omits the signature wrapper. Fields 'subject' and 'subjectPKInfo' are OPTIONAL, and 'subjectPublicKey' within SubjectPublicKeyInfoTemplate is OPTIONAL, allowing partial server specification of CSR contents.
section: "3.4"
topics:
