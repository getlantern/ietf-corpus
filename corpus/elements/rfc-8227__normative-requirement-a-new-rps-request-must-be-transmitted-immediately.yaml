document: rfc-8227
kind: normative-requirement
summary: A new RPS request MUST be transmitted immediately when a change in the transmitted status occurs. The first three RPS protocol messages carrying a new request MUST be transmitted as fast as possible; for fast protection switching within 50 ms, the interval of the first three messages SHOULD be 3.3 ms. Successive RPS requests SHOULD be transmitted at 5-second intervals.
section: 5.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
