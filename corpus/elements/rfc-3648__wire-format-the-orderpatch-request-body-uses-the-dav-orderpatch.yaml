document: rfc-3648
kind: wire-format
summary: 'The ORDERPATCH request body uses the DAV:orderpatch XML element containing an optional DAV:ordering-type child and zero or more DAV:order-member elements, each with a DAV:segment and a DAV:position (first, last, before, or after). The DTD is: `<!ELEMENT orderpatch (ordering-type?, order-member*)>`, `<!ELEMENT order-member (segment, position)>`, `<!ELEMENT position (first | last | before | after)>`.'
section: "7"
topics:
