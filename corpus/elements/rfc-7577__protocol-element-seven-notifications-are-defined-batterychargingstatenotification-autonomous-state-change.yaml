document: rfc-7577
kind: protocol-element
summary: 'Seven notifications are defined: batteryChargingStateNotification (autonomous state change), batteryLowNotification (charge or voltage below threshold), batteryCriticalNotification (battery cannot supply normal power), batteryTemperatureNotification (temperature threshold crossed), batteryAgingNotification (capacity or cycle count threshold), batteryConnectedNotification, and batteryDisconnectedNotification.'
