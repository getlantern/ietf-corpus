document: rfc-5480
kind: security-consideration
summary: 'For interoperability, specific combinations are RECOMMENDED: 192-bit key with SHA-256/secp192r1 (80-bit security), 224-bit/SHA-256/secp224r1 (112-bit), 256-bit/SHA-256/secp256r1 (128-bit), 384-bit/SHA-384/secp384r1 (192-bit), and 521-bit/SHA-512/secp521r1 (256-bit).'
