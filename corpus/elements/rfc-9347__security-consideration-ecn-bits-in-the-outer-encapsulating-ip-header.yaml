document: rfc-9347
kind: security-consideration
summary: ECN bits in the outer encapsulating IP header are not protected by IPsec and thus may constitute a covert channel. For this reason, ECN use SHOULD NOT be enabled by default.
section: "8"
rfc2119_level: SHOULD NOT
topics:
    - security
    - ipsec
    - privacy
    - ecn
