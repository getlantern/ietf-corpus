document: rfc-8122
kind: interoperability-note
summary: Including a fingerprint calculated using the same hash function as the certificate's signature algorithm ensures interoperability with strict RFC 4572 implementations. Either this or the SHA-256 fingerprint MAY be omitted if a stronger hash known to be supported by the peer is included.
section: "5.1"
topics:
    - tls
    - crypto
    - pkix
