document: rfc-8790
kind: security-consideration
summary: In FETCH and (i)PATCH requests, the client can pass arbitrary names to the target resource. Implementers must ensure access is restricted to names that are actually part of (or accessible through) the target resource, and that input does not lead to uncontrolled special interpretation by the system.
section: "6"
topics:
