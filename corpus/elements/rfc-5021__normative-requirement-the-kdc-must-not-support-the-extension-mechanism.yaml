document: rfc-5021
kind: normative-requirement
summary: The KDC MUST NOT support the extension mechanism if it does not support any extensions. If no extensions are supported, the KDC MUST return a KRB-ERROR with KRB_ERR_FIELD_TOOLONG and MUST close the TCP stream.
section: "3"
rfc2119_level: MUST NOT
topics:
    - tcp
    - security
