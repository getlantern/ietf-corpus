document: rfc-8628
kind: security-consideration
summary: When user codes are transmitted non-visually (e.g., text-to-speech, Bluetooth LE), it is RECOMMENDED that the chosen communication channel only be accessible by people in close proximity to prevent credential bootstrapping attacks by remote malicious users.
