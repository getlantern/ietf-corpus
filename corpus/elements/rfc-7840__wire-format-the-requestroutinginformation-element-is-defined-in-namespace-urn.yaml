kind: wire-format
summary: The <requestRoutingInformation> element is defined in namespace urn:ietf:params:xml:ns:geopriv:held:ri with a single optional attribute 'service' of type xs:anyUri, defaulting to urn:service:sos. The <routingInformation> element contains a <service> complex type with unbounded <dest> (xs:anyURI) children, a required 'serviceUri' (xs:anyURI) attribute, and an optional boolean 'defaultRoute' attribute (default false).
