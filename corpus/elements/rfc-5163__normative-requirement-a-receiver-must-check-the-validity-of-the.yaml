document: rfc-5163
kind: normative-requirement
summary: A Receiver MUST check the validity of the Length value prior to processing the TS-Concat payload. An invalid Length (one that does not yield an integral number of TS Packets when divided by 188) MUST result in discard of all encapsulated TS Packets and SHOULD be recorded as a TS-Concat size mismatch error.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
