document: rfc-3984
kind: normative-requirement
summary: All receivers MUST support Single NAL Unit Mode (packetization-mode=0 or absent). In this mode only single NAL unit packets MAY be used; STAPs, MTAPs, and FUs MUST NOT be used, and transmission order MUST comply with NAL unit decoding order.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
