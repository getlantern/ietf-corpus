document: rfc-7095
kind: normative-requirement
summary: Parameter names MUST be in lowercase in jCard; the original case of the parameter value MUST be preserved. The VALUE parameter MUST NOT be added to the parameters object — the value type is instead signaled through the type identifier string.
section: "3.4"
rfc2119_level: MUST
