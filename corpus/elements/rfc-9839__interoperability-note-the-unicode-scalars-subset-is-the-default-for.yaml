document: rfc-9839
kind: interoperability-note
summary: The Unicode Scalars subset is the default for CBOR (RFC 8949) and corresponds to Definition D76 from the Unicode Standard. JSON, by contrast, permits all code points including surrogates and noncharacters, creating implementation divergence when libraries parse strings containing such values.
section: "4.1"
topics:
    - cbor
    - json
