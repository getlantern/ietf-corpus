document: rfc-5749
kind: security-consideration
summary: AAA protocols carrying KDE messages must provide integrity protection, replay protection, and key wrap for the root key. Confidential fields such as peer identifiers should be encrypted. These requirements apply both to the direct AAA transport and to any end-to-end security layer used when the AAA path is not fully trusted.
section: "6.1"
topics:
    - security
    - crypto
    - diameter
    - radius
