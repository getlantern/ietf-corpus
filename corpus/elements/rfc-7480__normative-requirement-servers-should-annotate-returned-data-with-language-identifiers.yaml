document: rfc-7480
kind: normative-requirement
summary: Servers SHOULD annotate returned data with language identifiers whenever available. Servers SHOULD ignore the HTTP Accept-Language header when formulating entity responses, so clients do not conflate Accept-Language with 'lang' values in the entity body.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - http
