document: rfc-9904
kind: security-consideration
summary: Algorithms identified as MUST or RECOMMENDED to implement are not known to be broken at the current time, but future documents will be issued to reflect changing best practices. Retiring an algorithm too soon would downgrade signed zones to the equivalent of unsigned zones, so deprecation must be done carefully and slowly.
