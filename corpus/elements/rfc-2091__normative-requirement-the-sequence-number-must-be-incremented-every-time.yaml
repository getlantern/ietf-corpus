document: rfc-2091
kind: normative-requirement
summary: The Sequence Number MUST be incremented every time a new Update Response packet is sent on the WAN; it is unchanged for retransmissions. The Sequence Number wraps around at 65535. The same Update Response sent to different peers MAY carry different Sequence Numbers.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
