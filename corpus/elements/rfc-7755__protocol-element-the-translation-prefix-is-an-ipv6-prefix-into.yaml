document: rfc-7755
kind: protocol-element
summary: The Translation Prefix is an IPv6 prefix into which the entire IPv4 address space is mapped per the RFC 6052 algorithm. It is routed to the BR's IPv6 interface; addresses without a matching EAM are translated by inserting or removing this prefix.
