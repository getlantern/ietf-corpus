document: rfc-8538
kind: state-machine
summary: When a session resets (NOTIFICATION received or HOLDTIME expired) and the 'N' bit has been exchanged, both speakers transition to the Receiving Speaker state retaining stale routes. A Hard Reset bypasses this and triggers full session termination per RFC 4271.
