kind: protocol-element
summary: 'Three new FETCH command data items are defined: BINARY<section-binary>[<partial>] to retrieve CTE-decoded section data, BINARY.PEEK<section-binary>[<partial>] as an alternate form that does not set the \Seen flag, and BINARY.SIZE<section-binary> to request the decoded size of the section.'
