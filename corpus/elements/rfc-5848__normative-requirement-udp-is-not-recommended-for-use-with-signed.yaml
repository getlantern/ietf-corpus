document: rfc-5848
kind: normative-requirement
summary: UDP is NOT RECOMMENDED for use with signed syslog because its recommended payload size of 480 octets is too restrictive for Signature Block messages. TLS transport (RFC 5425) is the preferred transport.
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - syslog
    - security
    - udp
