document: rfc-9660
kind: protocol-element
summary: ZONEVERSION is a new EDNS(0) option (OPTION-CODE 19) that DNS clients include in queries to request zone version information, and that authoritative servers include in responses to provide it. It is designed for hop-to-hop use only and is OPTIONAL to implement.
