kind: wire-format
summary: 'The Version 2 Multicast Listener Report (ICMPv6 Type 143) contains: Type (8 bits), Reserved (8 bits), Checksum (16 bits), Reserved (16 bits), Nr of Mcast Address Records M (16 bits), followed by M variable-length Multicast Address Records each containing Record Type, Aux Data Len, Number of Sources N, Multicast Address (128 bits), N source addresses, and optional Auxiliary Data.'
