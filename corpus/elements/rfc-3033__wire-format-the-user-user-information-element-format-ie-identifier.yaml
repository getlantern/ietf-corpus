document: rfc-3033
kind: wire-format
summary: 'The User-user information element format (IE identifier 0x7E): octet 1 is the IE identifier, octet 2 is the IE instruction field, octets 3-4 are the length, octet 5 is the Protocol discriminator, and octets 6+ are the User information field. Maximum total length is 133 octets.'
