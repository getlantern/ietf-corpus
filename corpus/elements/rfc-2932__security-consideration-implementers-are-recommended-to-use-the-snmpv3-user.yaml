document: rfc-2932
kind: security-consideration
summary: Implementers are recommended to use the SNMPv3 User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) to restrict SET access to authorized principals only. Read access to multicast routing state (e.g., which sources send to which groups) may itself be sensitive.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - multicast
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
