document: rfc-3841
kind: normative-requirement
summary: A proxy MUST NOT apply the preferences matching operation unless it is the owner of the domain in the request URI and is accessing a location service that has capabilities associated with request targets. If it does perform matching, it MUST do so as described in Section 7.2.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
