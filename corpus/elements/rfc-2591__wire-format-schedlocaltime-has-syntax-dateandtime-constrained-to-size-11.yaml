document: rfc-2591
kind: wire-format
summary: schedLocalTime has SYNTAX DateAndTime constrained to SIZE(11), meaning the full 11-byte form including UTC offset is always required. This allows a manager to determine the local-time-to-GMT offset used by calendar schedules.
