document: rfc-6749
kind: normative-requirement
summary: In the resource owner password credentials grant, the client MUST discard the resource owner's credentials once an access token has been obtained. The authorization server MUST protect the token endpoint against brute force attacks.
section: 4.3.1
rfc2119_level: MUST
