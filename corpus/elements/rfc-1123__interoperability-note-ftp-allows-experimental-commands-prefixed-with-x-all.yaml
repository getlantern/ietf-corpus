document: rfc-1123
kind: interoperability-note
summary: FTP allows experimental commands prefixed with 'X'. All implementations SHOULD recognize both the RFC-959 forms and the legacy 'X' forms of directory commands (XMKD/MKD, XRMD/RMD, XPWD/PWD, XCUP/CDUP, XCWD/CWD), because deployed servers may only support one form.
section: 4.1.3.1
rfc2119_level: SHOULD
topics:
    - tcp
