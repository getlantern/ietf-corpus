document: rfc-4761
kind: design-rationale
summary: BGP Route Reflectors are used purely as a control plane technique for VPLS scaling; they introduce no data plane state or forwarding requirements on the RRs and do not change the forwarding path of VPLS traffic, in contrast to Hierarchical VPLS with LDP.
