document: rfc-3380
kind: protocol-element
summary: New status code 'client-error-attributes-not-settable' (0x0413) is returned when Set-Printer-Attributes or Set-Job-Attributes fails because one or more attributes are READ-ONLY or not settable in the implementation. The Printer MUST return this code along with the 'not-settable' out-of-band value for each unsettable attribute in the Unsupported Attributes Group.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
