document: rfc-9887
kind: normative-requirement
summary: Server-side validation of client identities MUST support either network-address-based validation (per RFC 5425 Section 5.2) or Client Identity validation of a shared identity in the certificate subjectAltName, with mandatory support for matching dNSName and iPAddress.
