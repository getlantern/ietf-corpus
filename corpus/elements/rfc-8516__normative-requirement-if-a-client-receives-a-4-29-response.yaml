document: rfc-8516
kind: normative-requirement
summary: If a client receives a 4.29 response, it SHOULD NOT send a similar request to the server before the time indicated in the Max-Age option has passed. If no Max-Age option is present, the default value of 60 seconds applies.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - congestion
