document: rfc-2429
kind: normative-requirement
summary: For H.263+ bitstreams coded with temporal, spatial, or SNR scalability, the temporal relations between layers shall be expressed using the RTP timestamp so they can be synchronized at receiving ends in multicast or unicast applications.
section: "2"
rfc2119_level: MUST
topics:
