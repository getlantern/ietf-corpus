document: rfc-5922
kind: interoperability-note
summary: For backward compatibility with legacy certificates, implementations MAY accept a DNS name from the Subject CN field if and only if the subjectAltName extension is absent. New certificates SHOULD use the subjectAltName extension instead.
section: "7.1"
