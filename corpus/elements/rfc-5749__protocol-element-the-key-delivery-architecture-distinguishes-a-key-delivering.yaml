document: rfc-5749
kind: protocol-element
summary: The key delivery architecture distinguishes a Key Delivering Server (KDS), which holds the EMSK or DSRK and derives and distributes root keys, from a Key Requesting Server (KRS), which is authorized to request root keys and uses them to derive keying material for its services. The EAP/AAA server and DSR-KH can act as KDS; USR-KH, DSR-KH, and DSUSR-KH can act as KRS.
