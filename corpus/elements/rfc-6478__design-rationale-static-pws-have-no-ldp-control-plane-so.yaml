document: rfc-6478
kind: design-rationale
summary: Static PWs have no LDP control plane, so there is no native method to transmit PW or attachment circuit status between PE devices. This document defines an in-band method using the generic associated channel (ACh) to carry PW status codes without requiring a dynamic control plane.
section: "1"
topics:
