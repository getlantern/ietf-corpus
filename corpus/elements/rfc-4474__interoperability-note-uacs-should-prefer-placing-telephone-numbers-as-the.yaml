document: rfc-4474
kind: interoperability-note
summary: UACs SHOULD prefer placing telephone numbers as the username portion of SIP or SIPS URIs in the From header (e.g., 'sip:+17005551008@chicago.example.com;user=phone') rather than bare TEL URIs, because bare TEL URIs make it unclear which domain is the appropriate signatory for the identity.
section: "11"
topics:
    - sip
    - security
