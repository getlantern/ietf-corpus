document: rfc-6345
kind: security-consideration
summary: Use of manually configured preshared keys for IPsec between PREs and PAAs does not defend against replayed PANA messages. Residual risks must be mitigated via additional physical or cryptographic security, such as access control lists backed by authentication.
section: "6"
topics:
    - security
    - ipsec
    - crypto
