document: rfc-4855
kind: interoperability-note
summary: Payload format (encoding) names defined in the RTP Profile are commonly shown in upper case while media subtype names are commonly shown in lower case, but these names are case-insensitive in both places. Similarly, parameter names are case-insensitive in media type strings and in the default mapping to the SDP a=fmtp attribute.
section: "3"
topics:
