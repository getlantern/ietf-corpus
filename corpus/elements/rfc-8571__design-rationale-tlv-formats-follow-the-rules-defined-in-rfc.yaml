document: rfc-8571
kind: design-rationale
summary: TLV formats follow the rules defined in RFC 7752 (BGP-LS), ensuring consistency with the existing BGP-LS framework. The semantics and value encoding of all fields are delegated to the IGP source specifications (RFC 8570 and RFC 7471) rather than re-specified in this document.
