document: rfc-9815
kind: security-consideration
summary: To mitigate peering with masquerading BGP speakers, TCP-AO (RFC 5925) is RECOMMENDED for authenticating all BGP-LS-SPF sessions. A compromised authorized peer could advertise modified NLRIs causing misrouting or excessive SPF calculations.
section: "9"
rfc2119_level: RECOMMENDED
