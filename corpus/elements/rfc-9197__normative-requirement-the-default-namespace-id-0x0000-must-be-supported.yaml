document: rfc-9197
kind: normative-requirement
summary: The Default-Namespace-ID (0x0000) MUST be supported by all nodes implementing IOAM. For any Namespace-ID that does not match one the node is configured to operate on, the node MUST NOT change the contents of the IOAM-Data-Fields.
section: "4.3"
rfc2119_level: MUST
topics:
    - measurement
