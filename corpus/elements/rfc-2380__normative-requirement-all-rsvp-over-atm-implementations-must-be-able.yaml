document: rfc-2380
kind: normative-requirement
summary: All RSVP over ATM implementations MUST be able to support LLC encapsulation per RFC 1483 on RSVP-triggered QoS VCs. When a QoS VC carries only IP packets, implementations SHOULD negotiate VC-based multiplexing to avoid LLC header overhead.
section: "2.5"
rfc2119_level: MUST
topics:
    - ip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
