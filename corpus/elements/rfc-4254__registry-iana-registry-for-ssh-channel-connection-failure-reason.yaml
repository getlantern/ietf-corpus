document: rfc-4254
kind: registry
summary: IANA registry for SSH channel connection failure reason codes. Values 0x00000001–0xFDFFFFFF require IETF CONSENSUS for assignment. Range 0xFE000000–0xFEFFFFFF is PRIVATE USE for locally assigned channels. Range 0xFF000000–0xFFFFFFFF is unrestricted experimental use.
