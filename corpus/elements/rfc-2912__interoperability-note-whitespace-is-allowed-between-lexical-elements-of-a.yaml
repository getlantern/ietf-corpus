document: rfc-2912
kind: interoperability-note
summary: Whitespace is allowed between lexical elements of a media feature expression per RFC 2533, and RFC 822/MIME allows folding of long headers at whitespace points. It is therefore recommended that whitespace be included in long feature expressions to facilitate header folding by agents that do not understand the field syntax.
section: "3.1"
topics:
