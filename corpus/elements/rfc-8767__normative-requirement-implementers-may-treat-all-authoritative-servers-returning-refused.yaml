document: rfc-8767
kind: normative-requirement
summary: Implementers MAY treat all authoritative servers returning Refused as preempting the use of stale data, since Refused may signal an explicit zone takedown, though it is also overloaded to mean transient configuration failures.
section: "6"
rfc2119_level: MAY
