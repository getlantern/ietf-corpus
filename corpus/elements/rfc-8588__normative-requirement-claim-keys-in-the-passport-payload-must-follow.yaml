document: rfc-8588
kind: normative-requirement
summary: 'Claim keys in the PASSporT payload MUST follow the lexicographic ordering rules of Section 9 of RFC 8225. In a ''shaken'' PASSporT, the required order is: attest, dest, iat, orig, origid.'
section: "8"
rfc2119_level: MUST
