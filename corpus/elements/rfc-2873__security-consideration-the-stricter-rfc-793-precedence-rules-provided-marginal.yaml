document: rfc-2873
kind: security-consideration
summary: The stricter RFC 793 precedence rules provided marginal additional security against TCP spoofing attacks, as attackers would need to guess both the initial sequence number and the precedence setting. Removing precedence enforcement eliminates this minor protection.
section: "5"
topics:
    - tcp
    - security
