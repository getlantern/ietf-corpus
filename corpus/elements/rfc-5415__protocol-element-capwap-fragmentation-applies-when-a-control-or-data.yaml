document: rfc-5415
kind: protocol-element
summary: CAPWAP fragmentation applies when a control or data message exceeds the path MTU between WTP and AC. The CAPWAP Header Fragment ID and Fragment Offset fields identify fragment position; the Last Fragment bit marks the final fragment. MTU Discovery uses a padding message element to probe the maximum supported size.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
