document: rfc-2460
kind: protocol-element
summary: 'Options in the Hop-by-Hop and Destination Options headers are TLV-encoded: 8-bit Option Type, 8-bit Opt Data Len, variable-length Option Data. The two highest-order bits of the Option Type encode the action to take if the type is unrecognized (skip, discard, discard+ICMP, discard+ICMP if not multicast).'
section: "4.2"
topics:
    - ip
