document: rfc-6329
kind: normative-requirement
summary: The SPB-Inst sub-TLV Must contain at least one ECT-ALGORITHM entry, specifically the default 00-80-C2-01. The ECT-ALGORITHM and Base VID Must match what is generated in the IIHs of the same node.
section: "14.1"
rfc2119_level: MUST
