document: rfc-5953
kind: protocol-element
summary: tlstmSessionID is a locally chosen unique session identifier stored in the LCD and tmStateReference. For DTLS/UDP, it is indexed by the combination of transportDomain, transportAddress, tmSecurityName, and requestedSecurityLevel. It must not reuse identifiers while still referenced.
