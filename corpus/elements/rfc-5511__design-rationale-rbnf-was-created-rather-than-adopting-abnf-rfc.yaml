document: rfc-5511
kind: design-rationale
summary: RBNF was created rather than adopting ABNF (RFC 5234) because ABNF terminals are integers (characters/bytes), while routing protocol BNF terminals are 'objects' (protocol message elements) or entire 'messages'. Converting existing specifications to ABNF would require extensive document rework and extensions to ABNF itself.
section: "1"
topics:
