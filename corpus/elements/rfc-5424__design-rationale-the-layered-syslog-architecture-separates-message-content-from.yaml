document: rfc-5424
kind: design-rationale
summary: The layered syslog architecture separates message content from transport so that each protocol feature need only be implemented once rather than once per transport. Prior standardization efforts failed because each required its own packet format and transport, causing subtle long-term compatibility issues.
section: "1"
extracted_by: claude-sonnet-4-6
