document: rfc-2156
kind: design-rationale
summary: X.400 security services — Content Confidentiality, Content Integrity, Message Security Labelling, Non-Repudiation of Delivery/Origin/Submission, Message Flow Confidentiality, and Message Sequence Integrity — are not mapped onto RFC 822 because no equivalent RFC 822 mechanisms exist. If such a service is marked critical for transfer or delivery, the gateway generates a non-delivery notification; otherwise the request is silently ignored.
section: 2.3.1
topics:
    - email
    - security
