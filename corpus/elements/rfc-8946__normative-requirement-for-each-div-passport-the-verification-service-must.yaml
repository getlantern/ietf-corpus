document: rfc-8946
kind: normative-requirement
summary: For each "div" PASSporT, the verification service MUST find an earlier PASSporT in the request whose "dest" claim is equivalent to the "div" claim; if a complete chain cannot be constructed, "div" validation cannot be completed.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - security
