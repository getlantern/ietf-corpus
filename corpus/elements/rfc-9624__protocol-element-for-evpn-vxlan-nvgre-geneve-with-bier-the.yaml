document: rfc-9624
kind: protocol-element
summary: 'For EVPN-VXLAN/NVGRE/GENEVE with BIER, the local bias split-horizon procedure still applies: the BFIR-id in the BIER header identifies the ingress PE, and a receiving PE does not forward the BUM packet to any multihomed ES that the ingress PE is also attached to.'
