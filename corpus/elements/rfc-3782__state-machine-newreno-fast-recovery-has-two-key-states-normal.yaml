document: rfc-3782
kind: state-machine
summary: 'NewReno Fast Recovery has two key states: normal (outside Fast Recovery) and Fast Recovery. Trigger to enter: third duplicate ACK when cwnd covers more than ''recover''. Triggers to exit: full ACK (Step 5) or retransmit timeout (Step 6). Partial ACKs cause retransmission but do not exit the state.'
