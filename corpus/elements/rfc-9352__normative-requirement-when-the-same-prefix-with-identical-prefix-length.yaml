document: rfc-9352
kind: normative-requirement
summary: When the same prefix with identical prefix length, MTID, and algorithm is received in both a Prefix Reachability TLV and an SRv6 Locator TLV, the Prefix Reachability advertisement MUST be preferred for forwarding plane installation to prevent inconsistent behavior between SRv6-capable and SRv6-incapable routers.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
