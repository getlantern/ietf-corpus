document: rfc-1752
kind: design-rationale
summary: The high-order two bits of the Option Type field encode the required action on unrecognized options, enabling incremental deployment of new option types into an operational network with minimal disruption risk. This allows new functionality to be introduced without requiring simultaneous network-wide software upgrades.
section: 12.2.2
topics:
    - ip
