document: rfc-8777
kind: normative-requirement
summary: When the D-bit is 0, a gateway MUST perform AMT relay discovery (receive a Relay Advertisement) before sending an AMT Request to the address. This is necessary for load balancers and brokers that are not full AMT relays.
section: 4.2.2
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
