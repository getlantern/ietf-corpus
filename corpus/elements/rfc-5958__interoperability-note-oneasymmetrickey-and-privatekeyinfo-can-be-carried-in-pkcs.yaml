document: rfc-5958
kind: interoperability-note
summary: 'OneAsymmetricKey and PrivateKeyInfo can be carried in PKCS #12 (P12) messages: private-key information in the keyBag BAG-TYPE and EncryptedPrivateKeyInfo in the pkcs8ShroudedKeyBag BAG-TYPE. File extensions .pfx and .p12 are used interchangeably in current implementations.'
