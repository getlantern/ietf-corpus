document: rfc-5490
kind: protocol-element
summary: The "servermetadata" test retrieves the value of the server annotation "annotation-name" and compares it against "key-list". Returns true if the annotation exists and its value matches any key. Default match type is ":is" and default comparator is "i;ascii-casemap". Capability string is "servermetadata".
