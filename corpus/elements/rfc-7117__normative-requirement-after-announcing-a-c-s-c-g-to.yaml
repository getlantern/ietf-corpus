document: rfc-7117
kind: normative-requirement
summary: After announcing a (C-S, C-G)-to-Selective-tree mapping, the source PE MUST wait for a configurable switchover delay before transmitting on the Selective tree; no (C-S, C-G) packet may be sent on both trees simultaneously.
section: "8.1"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
