document: rfc-5939
kind: protocol-element
summary: The 'a=acap' attribute expresses a named SDP attribute and optional value as a numbered capability (handle 1 to 2^31-1). Session-level attributes may only appear as acap at session level; media-level attributes may appear at either level. Each att-cap-num MUST be unique across the entire session description.
section: 3.4.1
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
