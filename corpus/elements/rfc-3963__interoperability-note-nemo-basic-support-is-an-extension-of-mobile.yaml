document: rfc-3963
kind: interoperability-note
summary: NEMO Basic Support is an extension of Mobile IPv6 (RFC 3775) and is backward compatible with it. A NEMO-compliant Home Agent can also operate as a standard Mobile IPv6 Home Agent. The extensions do not require changes to the IPsec signaling protection described in RFC 3776.
section: "1"
topics:
