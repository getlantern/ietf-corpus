document: rfc-8810
kind: registry
summary: 'RFC 8810 revises the IANA ''Capability Codes'' registry registration procedures for the range 128-255, splitting the former ''Private Use'' designation into: 128-238 (First Come First Served), 239-254 (Experimental Use), and 255 (Reserved). Ranges 1-63 (IETF Review) and 64-127 (First Come First Served) are unchanged, making the full FCFS range 64-238.'
