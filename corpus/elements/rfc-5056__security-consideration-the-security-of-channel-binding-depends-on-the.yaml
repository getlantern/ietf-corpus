document: rfc-5056
kind: security-consideration
summary: The security of channel binding depends on the security of the channels, the construction of their channel bindings, and the security of the authentication mechanism and its channel binding method. Delegating session protection involves cryptographic trade-offs (e.g., weaker cipher modes); implementors and administrators should understand these trade-offs and interfaces SHOULD expose a security profile concept.
section: "8"
topics:
    - security
    - crypto
