document: rfc-4566
kind: protocol-element
summary: The `a=rtpmap:<payload type> <encoding name>/<clock rate>[/<encoding parameters>]` attribute maps dynamic RTP payload type numbers to encoding names, clock rates, and optional parameters (e.g., channel count for audio). At most one rtpmap may be defined per media format.
