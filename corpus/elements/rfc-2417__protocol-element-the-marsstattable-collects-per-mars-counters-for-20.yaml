summary: The marsStatTable collects per-MARS counters for 20 message types, including transmitted MARS_MULTI, MARS_GROUPLIST_REPLY, MARS_REDIRECT_MAP, MARS_MIGRATE, MARS_NAK, MARS_JOIN, MARS_LEAVE, MARS_SJOIN, MARS_SLEAVE, MARS_MSERV, MARS_UNSERV and received counterparts, plus counts of registered member and MCS groups.
