document: rfc-4474
kind: normative-requirement
summary: If the authentication service is not responsible for the identity in the From header field, it SHOULD process and forward the request normally but MUST NOT add an Identity header. For retargeting cases, if the From domain is not under the authentication service's authority, no Identity header is added.
section: "5"
rfc2119_level: MUST NOT
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
