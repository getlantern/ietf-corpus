document: rfc-3339
kind: protocol-element
summary: Leap seconds are represented by time-second = '60', occurring at the end of months in which a leap second is inserted (historically June 30 or December 31), expressed as YYYY-MM-DDT23:59:60Z. A subtracted leap second allows time-second = '58'.
