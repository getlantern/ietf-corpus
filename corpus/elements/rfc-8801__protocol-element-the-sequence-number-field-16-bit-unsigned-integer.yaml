document: rfc-8801
kind: protocol-element
summary: The Sequence Number field (16-bit unsigned integer) in the PvD Option signals when PvD Additional Information has been updated. Routers SHOULD increment it whenever new Additional Information is available; if the value exceeds the field width it MUST wrap to zero. Hosts use this to trigger re-fetching of the JSON object.
section: "3.1"
topics:
    - ip
