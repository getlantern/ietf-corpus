document: rfc-1132
kind: design-rationale
summary: Encapsulating 802.2 over IPX rather than defining a custom framing allows any network protocol that supports the IEEE 802.2 Data Link Layer specification to be carried over IPX, including IP, ARP, and CLNP, and enables reuse of the RFC 1042 IP-over-IEEE-802 framework.
