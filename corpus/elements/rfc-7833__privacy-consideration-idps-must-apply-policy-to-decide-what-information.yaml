document: rfc-7833
kind: privacy-consideration
summary: IdPs MUST apply policy to decide what information is released to a particular RP. When RADIUS proxies are used without TLS encryption, SAML Assertions containing potentially identifying attributes are visible to all intermediate proxies, representing a significant privacy exposure that must be carefully evaluated.
section: "9"
topics:
    - privacy
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
