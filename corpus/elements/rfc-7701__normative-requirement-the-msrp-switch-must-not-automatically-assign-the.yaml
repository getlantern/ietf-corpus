document: rfc-7701
kind: normative-requirement
summary: The MSRP switch MUST NOT automatically assign the same nickname to more than one MSRP session established from the same URI, since this could confuse the user as to whether the nickname is bound to the second session.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
