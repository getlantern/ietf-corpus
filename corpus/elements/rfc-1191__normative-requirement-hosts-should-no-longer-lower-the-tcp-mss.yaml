document: rfc-1191
kind: normative-requirement
summary: Hosts SHOULD no longer lower the TCP MSS option value for non-local peers; the MSS should be 40 octets less than the largest datagram the host can reassemble (MMS_R), enabling PMTU Discovery to find PMTUs larger than 576.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
