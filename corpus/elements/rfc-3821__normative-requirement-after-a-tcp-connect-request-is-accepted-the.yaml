document: rfc-3821
kind: normative-requirement
summary: After a TCP connect request is accepted, the FCIP Entity SHALL wait for the FSF echo; if echoed FSF bytes (words 7–17) do not exactly match the sent FSF or the echoed Destination FC Fabric Entity WWN is zero, the FCIP Entity SHALL close the TCP Connection.
section: 8.1.2.3
rfc2119_level: REQUIRED
topics:
    - tcp
