document: rfc-6501
kind: normative-requirement
summary: If <allow-conference-event-subscription> is set to FALSE, subscription to conference state events MUST be rejected. If the element is undefined, it defaults to true, causing subscriptions to be accepted.
section: 4.4.1
rfc2119_level: MUST
topics:
