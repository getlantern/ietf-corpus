document: rfc-8412
kind: interoperability-note
summary: SWIMA operates exclusively over the PA-TNC interface (RFC 5792) within the NEA architecture (RFC 5209). It has no dependencies on the SACM architecture despite being developed to support it, and is usable wherever the NEA architecture is employed. The TNC and NEA architectures are interoperable and many components are equivalent.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
