document: rfc-8152
kind: protocol-element
summary: Externally supplied data allows applications to authenticate bytes not carried in the COSE object (e.g., CoAP option fields). Applications must define unambiguous construction of the external_aad byte string, addressing field ordering, fixed-width encoding, or length prefixing to prevent collisions.
section: "4.3"
topics:
