document: rfc-9132
kind: normative-requirement
summary: The 'mid' (Mitigation Identifier) MUST be unique per 'cuid' and DOTS server for active mitigations, MUST increase monotonically to handle out-of-order delivery, and MUST be reset to 0 when it reaches 3/4 of (2^32 - 1) during a non-attack period.
section: 4.4.1.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
