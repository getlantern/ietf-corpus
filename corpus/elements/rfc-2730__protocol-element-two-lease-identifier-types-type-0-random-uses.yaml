document: rfc-2730
kind: protocol-element
summary: 'Two Lease Identifier types: type 0 (Random) uses at least 16 octets of random data; type 1 (Address-Specific) uses a 2-octet address family number, an address from that family, and a client-specific identifier such as a sequence number. Clients without a globally unique address SHOULD use type 0.'
section: "2.4"
topics:
    - multicast
