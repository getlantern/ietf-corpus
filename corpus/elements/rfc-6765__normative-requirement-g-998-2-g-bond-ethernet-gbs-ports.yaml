document: rfc-6765
kind: normative-requirement
summary: G.998.2 (G.Bond/Ethernet) GBS ports with multiple BCEs MUST perform fragmentation and reassembly of Ethernet frames. For single-BCE G.998.2 ports, this function MAY be omitted (bonding bypass) to minimize overhead and enable interoperability with non-G.998 DSL equipment.
section: 4.1.2
rfc2119_level: MUST
topics:
