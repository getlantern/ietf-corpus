document: rfc-8964
kind: interoperability-note
summary: Penultimate Hop Popping (PHP) means the S-Label may be the only label present at the terminating DetNet service, with no F-Label in the protocol stack on the final hop. Implementations must handle this case, optionally using the incoming interface together with the S-Label for service identification.
section: "4.1"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
