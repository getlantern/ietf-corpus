document: rfc-7280
kind: normative-requirement
summary: IANA must not allocate values greater than 511 decimal in the ULE Next-Header registry. The combination of each IANA-registered value and the H-LEN field derives a set of allowed 16-bit integer values in the range 0-1535 decimal, forming the first part of the ULE Type space.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
