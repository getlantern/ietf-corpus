document: rfc-1767
kind: interoperability-note
summary: EDI data may contain non-printable ASCII characters (e.g., delimiters) or pure binary data. For such objects, MIME Content-Transfer-Encoding of quoted-printable or base64 must be used to ensure safe transport through Internet mail infrastructure.
