document: rfc-8825
kind: interoperability-note
summary: WebRTC session setup typically occurs over TLS-secured web technologies using application-specific protocols; operational techniques that insert network elements to interpret SDP (SIP ALGs or DHCP SIP server discovery via RFC 3361) will not work with such signaling.
