document: rfc-5019
kind: security-consideration
summary: To mitigate man-in-the-middle attacks, clients must validate the signature on the OCSP response and ensure they are communicating with an authorized responder per RFC 2560 Section 4.2.2.2. Signed responses authenticate the OCSP responder identity and its authorization to sign on the CA's behalf.
section: "7.2"
topics:
    - pkix
    - security
