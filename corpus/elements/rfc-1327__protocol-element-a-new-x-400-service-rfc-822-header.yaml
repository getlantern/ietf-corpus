document: rfc-1327
kind: protocol-element
summary: A new X.400 service 'RFC 822 Header Field' is defined using extension facilities to carry any RFC 822 header field in an X.400 message. New RFC 822 headers are also defined for X.400 services without RFC 822 equivalents, including X400-MTS-Identifier, Importance, Sensitivity, Expiry-Date, DL-Expansion-History, Language, Obsoletes, and others.
section: 2.2.2
topics:
