summary: 'Retransmission parameters for UDP-based MIH transport: the default maximum number of retransmissions is 2, the initial retransmission timer (TMO) is 3 seconds when RTT is unknown, and the maximum TMO is 30 seconds. Timer values are computed per RFC 2988.'
