document: rfc-9485
kind: design-rationale
summary: I-Regexp was motivated by the JSONPath WG's need for a regexp mechanism interoperable across popular libraries. No suitable specification existed, so a new limited flavor was defined, inspired by the I-JSON approach of selecting a safe, interoperable subset.
