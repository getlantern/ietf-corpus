document: rfc-2447
kind: design-rationale
summary: The 'method' MIME parameter is required on the Content-Type to allow mail processing agents to dispatch iCalendar objects by scheduling method without parsing the body, and its value is constrained to match the internal METHOD property to prevent inconsistency.
section: "2.4"
