document: rfc-8194
kind: protocol-element
summary: 'The LMAP YANG data model is split into three modules: ietf-lmap-common (shared typedefs and groupings), ietf-lmap-control (Controller-to-MA data structures), and ietf-lmap-report (MA-to-Collector data structures). Controllers implement common+control as clients; MAs implement common+control as servers and common+report as clients; Collectors implement common+report as servers.'
section: "2"
