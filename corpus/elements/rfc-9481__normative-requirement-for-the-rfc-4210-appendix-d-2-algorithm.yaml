document: rfc-9481
kind: normative-requirement
summary: For the RFC 4210 Appendix D.2 algorithm profile, RSA (sha256WithRSAEncryption, 2048-bit) is mandatory for MSG_SIG_ALG; PBMAC1 is mandatory for MSG_MAC_ALG; DH is mandatory for PROT_ENC_ALG; AES-wrap is mandatory for SYM_PENC_ALG; and AES-CBC is mandatory for PROT_SYM_ALG.
