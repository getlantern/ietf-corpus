document: rfc-9596
kind: protocol-element
summary: The "typ" (type) header parameter declares the type of the complete COSE object, as opposed to the content type header parameter which declares the type of the COSE object payload. It is intended to disambiguate among different kinds of COSE objects that might be present in an application data structure.
