document: rfc-3119
kind: protocol-element
summary: If interleaving is not used by the sender, the high-order 11 bits of each MPEG header remain 0xFFE. Receivers detect this as a sequence of identical ISNs and simply release ADU frames sequentially without reordering, treating each frame as if the Interleave Cycle Count changed with each arrival.
section: "6"
topics:
    - rtp
    - realtime
