document: rfc-9427
kind: security-consideration
summary: TLS 1.3 permits the server to send NewSessionTicket before inner authentication completes. A malicious client can obtain a ticket, abort, and attempt to resume—bypassing inner authentication. EAP servers MUST NOT assume a user is authenticated simply because a TLS session is being resumed.
section: "5.1"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
