document: rfc-8296
kind: design-rationale
summary: In MPLS networks the BIER-MPLS label performs the role of the BIFT-id; it is locally significant and may be swapped at each hop (as with normal MPLS). In non-MPLS networks the BIFT-id is domain-wide unique and does not change as the packet traverses the domain.
section: 2.2.1.1
topics:
