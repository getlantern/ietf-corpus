document: rfc-7550
kind: normative-requirement
summary: Servers MUST return the NoAddrsAvail Status Code option encapsulated within the IA_NA/IA_TA option and MUST NOT return a top-level NoAddrsAvail Status Code when no addresses will be assigned in an Advertise message. This aligns Advertise handling with Reply message behavior.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
