document: rfc-5762
kind: protocol-element
summary: 'Five DCCP service codes are defined for RTP: SC:RTPA (audio), SC:RTPV (video), SC:RTPT (text), SC:RTPO (other media), and SC:RTCP (RTCP-only connection). Applications SHOULD use these to identify RTP sessions for middlebox benefit.'
