document: rfc-4012
kind: protocol-element
summary: The route6 class is the IPv6 equivalent of the route class, keyed by the route6 attribute (an IPv6 address prefix) and the origin attribute (AS number). Attributes inject, components, export-comps, holes, and mnt-routes must specify IPv6 prefixes and addresses.
