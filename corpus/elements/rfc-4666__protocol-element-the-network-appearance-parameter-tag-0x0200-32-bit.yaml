document: rfc-4666
kind: protocol-element
summary: The Network Appearance parameter (Tag 0x0200, 32-bit unsigned integer) is a locally significant reference shared between an SG and an AS that identifies the SS7 network context, implicitly defining the Point Code format, Network Indicator value, and MTP3 variant. Different SGPs may assign different Network Appearance values to the same SS7 network context.
section: 3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
