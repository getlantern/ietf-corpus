document: rfc-3416
kind: normative-requirement
summary: 'A GetBulkRequest response may be truncated to fewer than N + (M * R) bindings for three reasons: (1) message size exceeds local or originator constraint; (2) all bindings for some iteration i are endOfMibView; (3) processing requires significantly more time than normal, provided at least one repetition completes.'
section: 4.2.3
rfc2119_level: MAY
topics:
