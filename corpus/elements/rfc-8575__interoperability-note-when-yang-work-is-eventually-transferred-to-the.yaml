document: rfc-8575
kind: interoperability-note
summary: When YANG work is eventually transferred to the IEEE 1588 WG, the module namespace root changes from IETF (urn:ietf:params:xml:ns:yang:ietf-ptp) to IEEE (e.g., urn:ieee:Std:1588:yang:ieee1588-ptp), but the prefix 'ptp' is preserved to minimize migration impact for importing modules.
section: A.3
topics:
