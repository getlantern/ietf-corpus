document: rfc-6513
kind: normative-requirement
summary: If BGP is used to distribute C-multicast routing information, or if the UMH route is from a multi-AS VPN (RFC 4364 option b), every eligible UMH route MUST carry a VRF Route Import Extended Community identifying the PE that originated the route.
section: 5.1.2
rfc2119_level: MUST
topics:
