document: rfc-8224
kind: normative-requirement
summary: The 'info' parameter MUST contain a URI that dereferences to the public key of the authentication service's credential. For common cases, this URI SHOULD be dereferenceable by any entity on the public Internet; in constrained environments, a private service MAY be used.
section: "7.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - pkix
