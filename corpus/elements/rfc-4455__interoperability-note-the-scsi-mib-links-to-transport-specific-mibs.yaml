document: rfc-4455
kind: interoperability-note
summary: The SCSI MIB links to transport-specific MIBs (iSCSI MIB, FCP MIB, etc.) via the scsiTransportPointer RowPointer in the scsiTransportTable and scsiPortTransportPtr in the scsiPortTable; if no MIB exists for a given transport, scsiTransportPointer is set to 0.0.
