document: rfc-7403
kind: security-consideration
summary: Answering media-loopback calls consumes B2BUA resources and network bandwidth, creating a denial-of-service vector. B2BUAs should provide configuration options to control who may initiate such test calls, the maximum number of concurrent loopback sessions, and maximum call duration.
section: "4"
topics:
    - sip
    - security
    - realtime
