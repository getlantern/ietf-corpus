document: rfc-5251
kind: normative-requirement
summary: When an ingress PE receives a Path message from an ingress CE that contains no ERO, it MUST calculate a route to the destination for the PE-to-PE LSP and include that route in an ERO before forwarding the Path message.
section: 4.3.1.3
rfc2119_level: MUST
topics:
    - vpn
    - mpls
