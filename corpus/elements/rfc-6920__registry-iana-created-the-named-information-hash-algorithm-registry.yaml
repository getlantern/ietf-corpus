document: rfc-6920
kind: registry
summary: 'IANA created the ''Named Information Hash Algorithm Registry'' with fields: Suite ID (0–63, optional), hash algorithm name string, value length, underlying algorithm reference, and status (''current'' or ''deprecated''). Initial entries: sha-256 (ID 1, 256 bits), sha-256-128 (ID 2), sha-256-120 (ID 3), sha-256-96 (ID 4), sha-256-64 (ID 5), sha-256-32 (ID 6); IDs 0 and 32 reserved. Future assignments via Expert Review.'
