document: rfc-6190
kind: wire-format
summary: 'The payload header length varies by Type: if Type equals 14, 20, or 30 the first 4 bytes form the payload header; if Type equals 31, the first 2 bytes form the header; otherwise the payload header is the first byte of the RTP packet payload.'
section: "4.3"
