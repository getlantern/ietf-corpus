document: rfc-1388
kind: normative-requirement
summary: 'On an interface where a RIP-1 router may operate on RIP-2 routing entries: (1) information internal to one network MUST NOT be advertised into another network, and (2) information about a more specific subnet MUST NOT be advertised where RIP-1 routers would consider it a host route.'
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
