document: rfc-6864
kind: normative-requirement
summary: Address-sharing or rewriting devices (NATs, NAPTs, ASMs, tunnel ingresses) MUST ensure that the IPv4 ID field of datagrams whose addresses or protocols are translated complies with these requirements as if the datagram were sourced by that device.
section: 5.3.1
rfc2119_level: MUST
topics:
