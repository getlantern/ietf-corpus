document: rfc-9705
kind: normative-requirement
summary: An implementation supporting RI-RSVP-FRR MUST set the RI-RSVP Capable flag in the CAPABILITY object in Hello messages as specified in RFC 8370. Every RI-RSVP-FRR node MUST support backward compatibility procedures for LSP subsets traversing non-RI-RSVP-FRR nodes.
section: 4.6.1, 4.6.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
