document: rfc-4033
kind: design-rationale
summary: DNSSEC provides object security (data origin authentication for DNS RRsets) rather than channel security (transaction authentication). This means DNSSEC keys are associated with the zone itself, not with its authoritative name servers. Transaction authentication (TSIG, SIG(0)) is a separate mechanism.
section: "3.1"
topics:
    - dns
    - security
    - crypto
