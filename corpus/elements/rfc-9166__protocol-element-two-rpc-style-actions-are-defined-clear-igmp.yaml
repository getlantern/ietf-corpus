document: rfc-9166
kind: protocol-element
summary: 'Two RPC-style actions are defined: clear-igmp-snooping-groups and clear-mld-snooping-groups (both guarded by feature action-clear-groups). Each takes a group address (or ''all-groups'') and a source address (or ''*'') as input to selectively or wholesale clear the snooping forwarding table.'
