document: rfc-821
kind: interoperability-note
summary: When mail data is partially deliverable (some recipients succeed, some fail), the DATA command reply must be 250 OK, but the receiver-SMTP must compose and send separate undeliverable-mail notifications for each failed recipient to the originator.
section: 4.1.1
topics:
