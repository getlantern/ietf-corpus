summary: 'The Temporal Scalability Control Information (TSCI), signaled by F0=1 in PACI, occupies 4 bytes in the PHES: TL0PICIDX (8 bits), IrapPicID (8 bits), S bit (1 bit, start of sub-layer access unit), E bit (1 bit, end of sub-layer access unit), and RES (6 reserved bits).'
