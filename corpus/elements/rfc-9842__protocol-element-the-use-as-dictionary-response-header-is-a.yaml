document: rfc-9842
kind: protocol-element
summary: 'The ''Use-As-Dictionary'' response header is a Structured Field Dictionary with four values: ''match'' (required URL Pattern string), ''match-dest'' (optional Inner List of destination strings), ''id'' (optional opaque server identifier string up to 1024 characters), and ''type'' (optional Token defaulting to ''raw''). It advertises that the response body may be used as a compression dictionary for future matching requests.'
section: "2.1"
topics:
    - http
