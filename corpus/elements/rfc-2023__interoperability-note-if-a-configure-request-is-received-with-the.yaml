document: rfc-2023
kind: interoperability-note
summary: If a Configure-Request is received with the Interface-Token option but the receiving peer does not implement this option, it sends a Configure-Reject, and the peer MUST NOT send further Configure-Nak messages including that option.
section: "4.1"
topics:
