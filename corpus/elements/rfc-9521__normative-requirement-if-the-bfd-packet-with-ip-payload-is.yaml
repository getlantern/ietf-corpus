document: rfc-9521
kind: normative-requirement
summary: If the BFD packet with IP payload is received with Your Discriminator set to 0, the BFD session SHOULD be identified using the VNI number and inner IP header (source IP and destination IP); if identification fails, incoming BFD Control packets MUST be dropped.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
