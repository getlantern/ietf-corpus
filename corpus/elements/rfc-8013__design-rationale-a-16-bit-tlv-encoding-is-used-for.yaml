document: rfc-8013
kind: design-rationale
summary: A 16-bit TLV encoding is used for metadata rather than a ForCES Index-Length-Value (ILV), which would use 32-bit component IDs. This saves 4 bytes per metadatum transferred at the cost of restricting metadata IDs to 16 bits, deemed sufficient at publication time.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
