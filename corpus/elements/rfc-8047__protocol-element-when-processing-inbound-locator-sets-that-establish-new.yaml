document: rfc-8047
kind: protocol-element
summary: When processing inbound LOCATOR_SETs that establish new SAs on an interface with multiple addresses, a host uses the destination address of the UPDATE containing the LOCATOR_SET as the local address to which the LOCATOR_SET plus ESP_INFO is targeted, because a host may send UPDATEs from the same locator IP to different peer addresses.
section: 4.2.4
topics:
    - mobility
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
