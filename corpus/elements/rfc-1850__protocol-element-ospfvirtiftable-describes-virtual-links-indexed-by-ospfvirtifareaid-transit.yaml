document: rfc-1850
kind: protocol-element
summary: 'ospfVirtIfTable describes virtual links indexed by ospfVirtIfAreaId (transit area, never 0.0.0.0) and ospfVirtIfNeighbor (router ID). Configurable parameters include transit delay, retransmission interval, hello interval (default 10s), and dead interval (default 60s). ospfVirtIfState has only two values: down(1) and pointToPoint(4).'
section: "3.9"
topics:
    - routing
    - snmp
