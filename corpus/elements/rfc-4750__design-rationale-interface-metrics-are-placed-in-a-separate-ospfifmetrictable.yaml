document: rfc-4750
kind: design-rationale
summary: Interface metrics are placed in a separate ospfIfMetricTable rather than inline in ospfIfTable to simplify dealing with multiple types of service (TOS). This separation allows multiple metric rows per interface without complicating the primary interface table structure.
