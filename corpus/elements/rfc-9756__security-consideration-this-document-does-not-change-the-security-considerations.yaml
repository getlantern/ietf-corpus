document: rfc-9756
kind: security-consideration
summary: This document does not change the security considerations for any of the updated RFCs. Per RFC 3692, experimental codepoints introduce no new security considerations; however, implementations accepting experimental error codepoints must consider how they parse and process them in case they come accidentally from another experiment, and must consider security aspects of the experimental extensions per RFC 6709.
section: "5"
topics:
    - security
    - routing
    - mpls
