summary: The TTML feature extension designation 'urn:ietf:rfc:8759#rtp-relative-media-time' identifies processors that set the epoch E to the RTP Timestamp as required by this specification. The namespace 'urn:ietf:rfc:8759' is defined per RFC 2648.
