document: rfc-8899
kind: interoperability-note
summary: QUIC is a UDP-based acknowledged PL that supports DPLPMTUD natively via padding and packet coalescence for probe construction. From DPLPMTUD's perspective, QUIC functions as an acknowledged PL; the QUIC specification describes the method for using DPLPMTUD with QUIC packets.
section: "6.3"
topics:
