document: rfc-9368
kind: normative-requirement
summary: Clients MUST validate that the server's Chosen Version equals the Negotiated Version (as determined e.g. from QUIC long header version field during compatible negotiation). A mismatch MUST cause the client to close the connection with a version negotiation error.
section: "4"
rfc2119_level: MUST
topics:
    - quic
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
