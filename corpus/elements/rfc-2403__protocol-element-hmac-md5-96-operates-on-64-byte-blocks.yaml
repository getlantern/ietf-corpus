document: rfc-2403
kind: protocol-element
summary: HMAC-MD5-96 operates on 64-byte blocks of data and produces a 128-bit authenticator value, truncated to 96 bits for use in ESP or AH. The truncated value is stored in the authenticator field; upon receipt the full 128-bit value is computed and the first 96 bits compared.
section: "2"
topics:
    - ipsec
    - crypto
