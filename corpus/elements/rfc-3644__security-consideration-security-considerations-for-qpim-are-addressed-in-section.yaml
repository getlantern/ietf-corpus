document: rfc-3644
kind: security-consideration
summary: Security considerations for QPIM are addressed in section 11. Because QPIM governs access to network QoS resources, unauthorized modification of QPIM policy data instances could allow an attacker to disrupt traffic conditioning, grant unauthorized QoS privileges, or deny service to legitimate flows. The security of QPIM data depends on the access controls and authentication mechanisms of the underlying data model and access protocol (e.g., LDAP, SNMP) used to store and retrieve policy instances.
section: "11"
topics:
    - qos
    - security
