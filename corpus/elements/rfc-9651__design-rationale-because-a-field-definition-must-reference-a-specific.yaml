document: rfc-9651
kind: design-rationale
summary: Because a field definition must reference a specific RFC for Structured Fields, the Date and Display String types added in RFC 9651 are unavailable to fields whose definitions reference RFC 8941. Upgrading a parser from RFC 8941 to RFC 9651 may cause previously-rejected field values (e.g., syntactically valid Dates) to be accepted, which could affect field-specific logic.
section: "2.4"
topics:
    - http
