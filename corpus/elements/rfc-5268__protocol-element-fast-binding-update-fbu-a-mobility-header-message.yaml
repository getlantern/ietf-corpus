document: rfc-5268
kind: protocol-element
summary: 'Fast Binding Update (FBU): a Mobility Header message (type 8) sent by the MN to authorize the PAR to bind PCoA to NCoA and begin tunneling. The ''A'' flag requests FBack; ''H'' flag MUST be set. MUST carry an alternate CoA option (set to NCoA) when sent from PAR''s link, plus the BADF option.'
section: 6.3.1
topics:
    - mobility
    - ip
