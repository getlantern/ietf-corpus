document: rfc-2574
kind: protocol-element
summary: The authoritative SNMP engine for replay protection is the receiver when the message contains a Confirmed Class PDU (e.g., Get, Set), and the sender when the message contains an Unconfirmed Class PDU (e.g., Trap, Inform). Each message includes the authoritative engine's snmpEngineID to prevent cross-engine replay.
section: 1.5.1
topics:
    - snmp
    - security
