document: rfc-9577
kind: design-rationale
summary: The challenge_digest field in the Token structure is SHA-256 of the original TokenChallenge. Changing the hash algorithm would require a new token type and structure definition, intentionally making algorithm agility explicit and version-controlled rather than implicit.
section: 2.2.1
topics:
