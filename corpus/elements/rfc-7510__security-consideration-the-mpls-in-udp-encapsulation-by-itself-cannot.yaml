document: rfc-7510
kind: security-consideration
summary: The MPLS-in-UDP encapsulation by itself cannot ensure the integrity or privacy of transported data, nor can it authenticate the tunnel encapsulator. When any of these security properties is required, MPLS-in-UDP SHOULD be secured with IPsec (RFC 4301) or DTLS (RFC 6347).
section: "6"
topics:
    - mpls
    - udp
    - security
    - ipsec
    - tls
