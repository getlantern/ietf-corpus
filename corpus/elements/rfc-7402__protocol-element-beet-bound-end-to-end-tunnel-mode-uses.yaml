summary: 'BEET (Bound End-to-End Tunnel) mode uses ESP transport mode syntax with tunnel mode semantics: HITs serve as inner addresses and IP addresses as outer addresses, with header replacement at endpoints rather than tunneling. BEET mode is internal to a host and transparent to peers.'
