document: rfc-3852
kind: normative-requirement
summary: When computing the message digest over signedAttrs, the EXPLICIT SET OF tag must be used rather than the IMPLICIT [0] tag. The DER encoding of the SET OF tag, along with the length and content octets of the SignedAttributes value, are all included in the digest computation.
section: "5.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
