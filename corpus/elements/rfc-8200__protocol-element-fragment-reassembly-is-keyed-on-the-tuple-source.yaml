document: rfc-8200
kind: protocol-element
summary: Fragment reassembly is keyed on the tuple (Source Address, Destination Address, Fragment Identification). Per-Fragment headers from the Offset-zero fragment are retained in the reassembled packet; only the Next Header and Payload Length fields are adjusted.
