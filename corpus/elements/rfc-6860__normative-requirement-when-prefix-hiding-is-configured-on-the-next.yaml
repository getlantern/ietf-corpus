document: rfc-6860
kind: normative-requirement
summary: When prefix-hiding is configured on the next-hop interface, the next-hop address MUST NOT be advertised as a forwarding address in AS-external-LSAs or NSSA-LSAs, because the hidden prefix's routing table entry would not exist to support SPF calculation.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
