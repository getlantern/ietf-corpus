summary: 'The MTRK parameter syntax is: mtrk-parameter = ''MTRK='' mtrk-certifier ['':'' mtrk-timeout]; mtrk-certifier is a base64-encoded 128-bit SHA-1 hash; mtrk-timeout is 1-9 decimal digits representing seconds until timeout.'
