document: rfc-5886
kind: normative-requirement
summary: It is RECOMMENDED that a PCC not cancel a queued PCReq and reissue it to another PCE solely because the PCE is overloaded, to avoid overload thrashing where multiple PCCs shift load simultaneously and compound delays across the network.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - mpls
