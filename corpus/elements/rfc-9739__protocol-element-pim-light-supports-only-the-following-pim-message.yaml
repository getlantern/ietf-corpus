document: rfc-9739
kind: protocol-element
summary: 'PIM Light supports only the following PIM message types: type 1 (Register), type 2 (Register Stop), type 3 (Join/Prune), type 8 (Candidate RP Advertisement), type 13.0 (PIM Packed Null-Register), type 13.1 (PIM Packed Register-Stop), and any future PIM message types where the destination is a unicast IP address.'
