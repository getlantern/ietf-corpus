document: rfc-9190
kind: normative-requirement
summary: EAP-TLS peer implementations MUST support checking certificate revocation after authentication completes and network connectivity is available. An EAP peer SHOULD NOT trust the network until revocation status is verified and MUST use a secure transport to do so.
section: "5.4"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
