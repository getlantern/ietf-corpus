document: rfc-6320
kind: protocol-element
summary: DSL access line identification uses TLVs carrying the Access-Aggregation-Circuit-ID-ASCII (circuit identifier as UTF-8 string), Access-Aggregation-Circuit-ID-Binary, and Remote-ID, modeled on DSL Forum TR-101. These TLVs are carried in topology discovery and line configuration messages to uniquely identify subscriber access lines.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
