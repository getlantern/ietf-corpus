document: rfc-5464
kind: normative-requirement
summary: Servers SHOULD delete annotations for a mailbox when the mailbox is deleted, so that a new mailbox created with the same name does not inherit the old mailbox's annotations.
section: "4.1"
rfc2119_level: SHOULD
