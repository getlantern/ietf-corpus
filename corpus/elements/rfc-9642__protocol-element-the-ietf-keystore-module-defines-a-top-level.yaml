document: rfc-9642
kind: protocol-element
summary: The 'ietf-keystore' module defines a top-level 'keystore' container (constrained by the 'central-keystore-supported' feature) composed of an 'asymmetric-keys' list and a 'symmetric-keys' list, each entry identified by a 'name' string. The structure for both key types is defined by the 'keystore-grouping' grouping.
