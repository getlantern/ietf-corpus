document: rfc-9112
kind: normative-requirement
summary: A sender MUST NOT generate a bare CR within any protocol elements other than the content. A recipient of a bare CR MUST consider that element invalid or replace each bare CR with SP before processing or forwarding.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - http
    - security
