document: rfc-5244
kind: design-rationale
summary: R2 register signalling events carry raw tone numbers (MFC Forward 1–15, Backward 1–15) rather than semantic signal names because tone meanings vary by country and call stage. Using semantic names would require an unmanageable number of distinct events.
section: 2.3.2
topics:
