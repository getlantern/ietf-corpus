summary: 'DetNet functionality is implemented in two adjacent sub-layers: the DetNet service sub-layer (providing service protection, packet sequencing, replication, elimination) and the DetNet forwarding sub-layer (providing explicit routes and resource allocation). Not all sub-layers are required for any given application or network.'
