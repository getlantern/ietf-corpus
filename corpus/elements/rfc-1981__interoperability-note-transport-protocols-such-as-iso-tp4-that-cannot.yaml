document: rfc-1981
kind: interoperability-note
summary: Transport protocols such as ISO TP4 that cannot repacketize during retransmission may fall back to IP-layer fragmentation for the retransmitted segment; subsequent first-time transmissions should be sized to the Path MTU.
section: "5.5"
