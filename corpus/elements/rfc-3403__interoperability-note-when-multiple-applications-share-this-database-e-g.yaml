document: rfc-3403
kind: interoperability-note
summary: When multiple Applications share this Database (e.g., ENUM and URI Resolution), collision between NAPTR records in the same domain can be avoided by using separate sub-zones, anchoring regular expressions to Application-specific strings, or using distinct Flags/Services values.
