document: rfc-3024
kind: security-consideration
summary: 'Ingress filtering targeting reverse-tunneled (IP-in-IP encapsulated) packets is not warranted: topologically correct reverse tunnels carry a valid source address in the encapsulating header, which is exactly the property ingress filtering seeks to enforce.'
section: "6.2"
topics:
    - mobility
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
