document: rfc-7015
kind: interoperability-note
summary: When aggregating Flows from multiple Metering Processes with different active timeouts, the IAP delay is determined by the maximum active timeout among all contributing Metering Processes, as the IAP must wait for all Original Flows that may contribute to a given interval.
section: "6.2"
topics:
