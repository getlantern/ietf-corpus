document: rfc-5934
kind: normative-requirement
summary: All TAMP structures MUST be encoded with DER (Distinguished Encoding Rules). Unlike other CMS-based specifications, TAMP requires DER even for structures that are not digitally signed, in order to reduce the number of options that a TAMP processor must implement.
section: "1.4"
rfc2119_level: REQUIRED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
