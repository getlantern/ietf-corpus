document: rfc-9326
kind: security-consideration
summary: An attacker may inject synthetic packets or maliciously add/remove the DEX Option-Type from transit packets to overload IOAM nodes and/or receiving entities. Because DEX affects multiple devices along the network path, it can amplify effects on network bandwidth, device storage, and the receiving entity's load.
section: "6"
topics:
