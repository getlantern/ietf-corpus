document: rfc-5368
kind: security-consideration
summary: A REFER-Recipient accepting multiple-target REFER requests acts as a URI-list service and therefore MUST apply RFC 5363 security rules, including opt-in lists and mandatory client authentication/authorization, to prevent abuse such as amplification attacks or unauthorized fan-out.
section: "10"
topics:
