document: rfc-2091
kind: wire-format
summary: Netware SAP triggered packets use a 2-octet Operation field followed by the 4-octet Update Header; Update Responses carry up to 8 service entries of 64 octets each, containing Service Type (2), Service Name (48), Network Address (4), Node Address (6), Socket Address (2), and Hops to Server (2), all big-endian.
