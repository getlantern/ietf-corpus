document: rfc-1195
kind: design-rationale
summary: Integrated IS-IS uses a single routing protocol for both IP and OSI, avoiding the 'Ships in the Night' (S.I.N.) approach of running OSPF and IS-IS independently. This reduces implementation complexity, CPU/memory usage, network overhead, and simplifies network management with a single coordinated MIB and backbone.
section: "1.5"
topics:
