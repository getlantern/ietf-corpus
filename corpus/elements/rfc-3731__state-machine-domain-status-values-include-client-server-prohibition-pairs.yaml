document: rfc-3731
kind: state-machine
summary: Domain status values include client/server prohibition pairs (Delete, Hold, Renew, Transfer, Update Prohibited), server-managed values (inactive, ok), and pending operation values (pendingCreate, pendingDelete, pendingRenew, pendingTransfer, pendingUpdate). 'ok' MUST NOT be combined with any other status; pending values MUST NOT be combined with each other or with the corresponding prohibition status.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
