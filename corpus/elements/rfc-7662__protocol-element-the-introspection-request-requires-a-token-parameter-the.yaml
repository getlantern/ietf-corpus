document: rfc-7662
kind: protocol-element
summary: The introspection request requires a 'token' parameter (the string value of the token) and optionally a 'token_type_hint' parameter (a hint about the token type to help the server optimize lookup). Values for token_type_hint are defined in the 'OAuth Token Type Hints' registry from RFC 7009.
section: "2.1"
topics:
