document: rfc-2445
kind: normative-requirement
summary: The TZID property parameter MUST be specified on DTSTART, DTEND, DUE, EXDATE, and RDATE properties when the value is a DATE-TIME or TIME that is neither UTC nor floating. The TZID parameter MUST NOT be applied to properties whose time values are specified in UTC.
section: 4.2.19
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
