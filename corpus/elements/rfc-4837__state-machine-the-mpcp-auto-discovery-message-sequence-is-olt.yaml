document: rfc-4837
kind: state-machine
summary: 'The MPCP auto-discovery message sequence is: OLT sends Discovery GATE → ONU sends Register Request → OLT sends Register (assigning LLID) → OLT sends GATE → ONU sends Register ACK. Higher-layer protocols may additionally authenticate the ONU before it participates in the network.'
section: 2.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
