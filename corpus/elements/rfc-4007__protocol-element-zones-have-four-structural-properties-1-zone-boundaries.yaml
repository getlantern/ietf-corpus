document: rfc-4007
kind: protocol-element
summary: 'Zones have four structural properties: (1) zone boundaries cut through nodes, not links; (2) zones of the same scope cannot overlap; (3) a zone of a given scope falls completely within zones of larger scope; (4) each zone must be convex from a routing perspective so packets never leave the zone en route to another interface in the same zone.'
section: "5"
topics:
