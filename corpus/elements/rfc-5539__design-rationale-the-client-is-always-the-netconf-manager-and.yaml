document: rfc-5539
kind: design-rationale
summary: The client is always the NETCONF manager and the server is always the NETCONF agent when NETCONF runs over TLS, because TLS is application-protocol-independent and this mapping provides a clean, consistent binding between the transport and protocol roles.
