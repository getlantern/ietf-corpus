document: rfc-7321
kind: design-rationale
summary: AES-CTR is demoted from SHOULD to MAY because AES-GCM has all the advantages of AES-CTR (efficient counter mode) while also providing authentication, making AES-CTR a strictly inferior choice when AES-GCM is available.
section: "4.2"
topics:
    - ipsec
    - crypto
