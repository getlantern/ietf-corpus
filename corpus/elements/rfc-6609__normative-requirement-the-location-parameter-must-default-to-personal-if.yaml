document: rfc-6609
kind: normative-requirement
summary: The ':location' parameter MUST default to ':personal' if not specified and MUST NOT be specified more than once. ':personal' refers to the user's private repository; ':global' refers to a site-wide repository accessible to all users.
section: "3.2"
rfc2119_level: MUST
