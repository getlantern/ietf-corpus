document: rfc-6374
kind: design-rationale
summary: The DM protocol is fully stateless and LM is 'almost stateless' (only the last response's counters need retention). This design enables external post-processing by forwarding complete messages to a dedicated device, allows the querier and responder to be stateless, and simplifies hardware implementation.
