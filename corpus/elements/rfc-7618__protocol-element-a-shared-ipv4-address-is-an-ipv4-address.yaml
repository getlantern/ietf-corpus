document: rfc-7618
kind: protocol-element
summary: A shared IPv4 address is an IPv4 address paired with a restricted Layer 4 port set identified by a Port Set ID (PSID). The combined tuple of IPv4 address and PSID must be unique for each active lease, allowing one address to serve multiple clients simultaneously.
