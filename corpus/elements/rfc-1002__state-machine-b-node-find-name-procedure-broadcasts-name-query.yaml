summary: 'B-node find-name procedure: broadcasts NAME QUERY REQUEST, waits BCAST_REQ_RETRY_TIMEOUT; on POSITIVE NAME QUERY RESPONSE, saves response as authoritative and starts CONFLICT_TIMER to detect additional responders. NEGATIVE and REDIRECT responses are ignored by B-nodes.'
