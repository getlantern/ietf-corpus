document: rfc-9081
kind: normative-requirement
summary: A PE MAY treat only the BGP best-selected MVPN SA route for a given (C-S,C-G) as the source of an MSDP SA. If the best route lacks the EC but another route for the same (C-S,C-G) has it, the next best route with the EC SHOULD be chosen.
section: "3"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
