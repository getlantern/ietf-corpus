document: rfc-9691
kind: protocol-element
summary: The Trust Anchor Key (TAK) object is a new RPKI signed object that documents the location(s) of the TA CA certificate for the current TA public key, as well as the value of the successor public key and the location(s) of its TA CA certificate. It enables in-band notification of TA key changes to Relying Parties.
section: "1"
