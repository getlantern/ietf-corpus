document: rfc-4302
kind: protocol-element
summary: The Next Header field is an 8-bit field identifying the type of payload following the AH header, selected from IANA IP Protocol Numbers. For example, value 4 indicates IPv4, 41 indicates IPv6, and 6 indicates TCP.
