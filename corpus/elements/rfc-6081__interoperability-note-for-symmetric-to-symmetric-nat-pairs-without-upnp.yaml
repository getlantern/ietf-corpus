document: rfc-6081
kind: interoperability-note
summary: For symmetric-to-symmetric NAT pairs without UPnP, and for address-symmetric NATs communicating with anything other than cone NATs, no connectivity is achievable even with all extensions defined in this document. Failed connectivity tests complete within a finite time, allowing fallback to native IPv4 addresses.
