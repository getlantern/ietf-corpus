document: rfc-4950
kind: protocol-element
summary: The MPLS Label Stack Object is appended to ICMP Time Exceeded and Destination Unreachable messages. A single instance represents the entire MPLS label stack exactly as it arrived at the LSR sending the ICMP message. It must be preceded by an ICMP Extension Structure Header and an ICMP Object Header as defined in RFC 4884.
section: "5"
