document: rfc-1532
kind: security-consideration
summary: BOOTP has no authentication mechanism, making it trivial for unauthorized servers to supply false IP addresses, spoofed default routers, or false DNS server addresses to clients. Unauthorized relay agents can present the same threats. Malicious clients can masquerade as legitimate clients or claim all dynamically-allocated resources, denying service to others.
section: Security Considerations
topics:
    - security
    - ip
