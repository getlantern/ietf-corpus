document: rfc-7232
kind: security-consideration
summary: 'An entity-tag can be abused to create privacy risks: a site may construct a semantically invalid but user-unique entity-tag in a long-lived cacheable response and later read it in conditional requests as a persistent identifier for re-identification. User agents should clear or replace caches when users perform privacy-maintaining actions such as clearing cookies or entering private browsing mode.'
section: "8"
topics:
    - http
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
