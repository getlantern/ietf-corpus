document: rfc-5116
kind: normative-requirement
summary: Each nonce provided to distinct invocations of the Authenticated Encryption operation MUST be distinct for any particular value of the key, unless each and every nonce is zero-length. The number of octets in the nonce SHOULD be twelve (12).
section: "2.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
