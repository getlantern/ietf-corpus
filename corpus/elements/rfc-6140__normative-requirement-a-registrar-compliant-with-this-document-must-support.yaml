document: rfc-6140
kind: normative-requirement
summary: A registrar compliant with this document MUST support the Path mechanism defined in RFC 3327. Additionally, all URI parameters present on the 'bnc' Contact URI (except 'bnc' itself) MUST be copied to the contact value stored in the location service.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
