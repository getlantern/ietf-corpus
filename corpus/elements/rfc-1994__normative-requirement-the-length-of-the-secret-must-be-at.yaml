document: rfc-1994
kind: normative-requirement
summary: The length of the secret MUST be at least 1 octet. The secret SHOULD be at least as large and unguessable as a well-chosen password, and is preferred to be at least the length of the hash value (16 octets for MD5) to protect against exhaustive search attacks.
section: "2.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
