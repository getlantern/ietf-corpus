document: rfc-9460
kind: normative-requirement
summary: If DNS responses are cryptographically protected (DNSSEC or TLS) and SVCB resolution fails due to an authentication error, SERVFAIL, transport error, or timeout, clients SHOULD abandon their connection attempt even if SVCB-optional, to prevent downgrade attacks.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
