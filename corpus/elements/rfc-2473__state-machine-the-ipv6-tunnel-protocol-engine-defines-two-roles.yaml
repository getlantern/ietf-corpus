summary: 'The IPv6 Tunnel Protocol Engine defines two roles: upper-layer (decapsulation input from link-layer or nested tunnel, output to upper-layer or nested tunnel) and link-layer (encapsulation input from upper-layer, link, or nested tunnel; output of original packets post-decapsulation to upper-layer, link, or nested tunnel). Paths #1-8 govern packet flow through encapsulation and decapsulation stages.'
