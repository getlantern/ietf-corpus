document: rfc-7263
kind: interoperability-note
summary: DRR requires the sending peer to be publicly reachable. Behind NATs that do not implement endpoint-independent filtering, DRR will fail and peers must fall back to SRR. This document addresses UNSAF considerations by specifying SRR as the mandatory fallback; no new UNSAF mechanisms are defined.
section: Appendix A
topics:
    - nat
    - routing
