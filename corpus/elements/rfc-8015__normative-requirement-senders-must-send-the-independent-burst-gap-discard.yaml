document: rfc-8015
kind: normative-requirement
summary: Senders MUST send the Independent Burst/Gap Discard Metrics Block in the same compound RTCP packet as the Measurement Information Block. Receivers MUST verify the measurement period is received in the same compound RTCP packet; if not, the metrics block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
