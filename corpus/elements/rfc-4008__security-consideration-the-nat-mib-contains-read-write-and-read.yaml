document: rfc-4008
kind: security-consideration
summary: The NAT MIB contains read-write and read-create objects that allow configuration of NAT address mappings and interface settings. Unauthorized write access could redirect or intercept traffic by altering translation rules. Implementors are directed to the SNMPv3 security model (RFC 3410, RFC 3411) for authentication and privacy protections to prevent unauthorized access.
section: "7"
topics:
    - nat
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
