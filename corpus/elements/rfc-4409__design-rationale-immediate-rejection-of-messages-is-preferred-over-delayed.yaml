document: rfc-4409
kind: design-rationale
summary: Immediate rejection of messages is preferred over delayed bouncing because it gives the user and MUA direct feedback; delayed bounces require MUAs to maintain a queue and match bounces, a capability many contemporary MUAs lack.
section: "3.2"
topics:
