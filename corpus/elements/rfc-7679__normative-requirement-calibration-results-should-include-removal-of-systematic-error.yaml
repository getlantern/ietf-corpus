document: rfc-7679
kind: normative-requirement
summary: Calibration results SHOULD include removal of systematic error from measured values, reporting of calibration error e (such that true value is reported value ± e with 95% confidence), and reporting conditions under which finite-delay packets are reported as lost due to resource exhaustion.
section: 3.8.3
rfc2119_level: SHOULD
topics:
    - measurement
