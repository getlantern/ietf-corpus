document: rfc-6073
kind: normative-requirement
summary: In two LDP control planes using the same FEC type, the S-PE SHOULD assume an initial passive role and not advertise the LDP PW FEC mapping until it has received at least one of the two PW LDP FECs from a remote PE.
section: "7.2"
rfc2119_level: SHOULD
