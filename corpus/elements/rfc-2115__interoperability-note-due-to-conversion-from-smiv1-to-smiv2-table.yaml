document: rfc-2115
kind: interoperability-note
summary: Due to conversion from SMIv1 to SMIv2, table index objects have MAX-ACCESS of read-only rather than not-accessible, which is atypical for SMIv2 index objects. This deviation was required for backward compatibility with RFC 1315.
