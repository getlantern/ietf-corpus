document: rfc-8168
kind: normative-requirement
summary: If the client can use the prefixes in the Advertise messages despite them differing from the hint, it SHOULD choose the shortest prefix length that is closest to the prefix-length hint and SHOULD continue requesting the preferred prefix in subsequent DHCPv6 messages.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
