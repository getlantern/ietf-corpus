document: rfc-3980
kind: design-rationale
summary: The NAA naming format was added to iSCSI to enable SCSI storage devices with both iSCSI and SAS ports to share a single NAA-based SCSI device name across transports. NAA is already the most commonly used identifier format for SCSI transports (FC and SAS), and direct representation avoids translation across multiple namespaces.
section: "3"
