document: rfc-7015
kind: normative-requirement
summary: The interval distribution process SHOULD accept Flow start and end times in Original Flows in any reasonable order. The expiration of intervals MUST be made configurable in contexts where 'reasonable order' is not obvious at implementation time.
section: 5.1.1
rfc2119_level: SHOULD
