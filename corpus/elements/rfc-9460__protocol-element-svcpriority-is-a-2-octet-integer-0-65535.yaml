document: rfc-9460
kind: protocol-element
summary: SvcPriority is a 2-octet integer (0–65535). A value of 0 places the record in AliasMode; any non-zero value places it in ServiceMode. Lower values are preferred over higher ones when selecting among ServiceMode records in an RRset.
section: 2.4.1
topics:
