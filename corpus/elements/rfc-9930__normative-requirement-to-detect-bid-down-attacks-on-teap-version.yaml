document: rfc-9930
kind: normative-requirement
summary: To detect bid-down attacks on TEAP version negotiation (which is not TLS-protected), peers MUST exchange the TEAP version number received during negotiation using the Crypto-Binding TLV. The receiver MUST verify that the version in the Crypto-Binding TLV matches the version the receiver sent during negotiation.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
