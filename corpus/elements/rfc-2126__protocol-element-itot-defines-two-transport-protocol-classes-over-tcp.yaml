summary: 'ITOT defines two transport protocol classes over TCP: Class 0, which refines and supersedes RFC1006 and provides connection establishment, data transfer with segmentation, and NS-provider-based disconnection; and Class 2, which adds explicit transport disconnection and independent Normal and Expedited Data channels.'
