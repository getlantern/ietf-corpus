document: rfc-7232
kind: design-rationale
summary: The fixed precedence order for evaluating conditional header fields reflects that 'lost update' preconditions have more strict requirements than cache validation, a validated cache is more efficient than a partial response, and entity-tags are presumed to be more accurate than date validators.
