document: rfc-5568
kind: wire-format
summary: 'Handover Acknowledge (HAck): Mobility Header message. Fields: Sequence# (16-bit, copied from HI), Reserved (8-bit), Code (8-bit, values 0–4 for accepted, 128–130 for rejected). When ''S'' flag was set in HI, the New Care-of Address option MUST be included in HAck.'
