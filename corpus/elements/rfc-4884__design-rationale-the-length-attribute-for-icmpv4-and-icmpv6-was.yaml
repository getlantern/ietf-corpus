document: rfc-4884
kind: design-rationale
summary: The length attribute for ICMPv4 and ICMPv6 was placed in previously reserved octets (sixth octet for ICMPv4, fifth octet for ICMPv6) so that the extension structure could be added without changing the positions of existing fields, enabling backwards compatibility.
