document: rfc-8489
kind: protocol-element
summary: The long-term credential mechanism uses a provisioned username/password with digest challenge/response. The client first sends an unauthenticated request, receives a 401 with REALM and NONCE, then retries including USERNAME (or USERHASH), REALM, NONCE, and a message-integrity attribute. The HMAC key is MD5(username:OpaqueString(realm):OpaqueString(password)) by default. Long-term credentials cannot protect indications.
section: "9.2"
topics:
    - nat
    - security
    - crypto
