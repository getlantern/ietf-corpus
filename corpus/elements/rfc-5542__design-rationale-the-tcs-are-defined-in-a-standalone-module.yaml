document: rfc-5542
kind: design-rationale
summary: The TCs are defined in a standalone module (PW-TC-STD-MIB) rather than inline in each PW MIB module so that PW-related MIB modules can import shared representations instead of each defining their own, improving consistency and reducing duplication across the PWE3 MIB suite.
