document: rfc-1444
kind: normative-requirement
summary: The MIN-ACCESS clause, if present, must not specify a greater level of access than is specified in the correspondent OBJECT-TYPE macro. An implementation is compliant if the access level it provides is greater or equal to the minimal level in MODULE-COMPLIANCE and less or equal to the maximal level in OBJECT-TYPE.
section: 4.4.3.3
rfc2119_level: MUST NOT
topics:
    - snmp
