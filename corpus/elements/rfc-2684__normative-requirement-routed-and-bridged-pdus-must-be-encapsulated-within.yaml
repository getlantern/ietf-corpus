document: rfc-2684
kind: normative-requirement
summary: Routed and bridged PDUs MUST be encapsulated within the Payload field of an AAL5 CPCS-PDU. The AAL5 message mode service in the non-assured mode of operation MUST be used; the corrupted delivery option MUST NOT be used.
section: "4"
rfc2119_level: MUST
topics:
    - ip
