document: rfc-9479
kind: design-rationale
summary: Zero-length Application Identifier Bit Masks serve as a wildcard, associating link attributes with any application. This allows shared attribute values to be advertised once rather than repeated for every application, minimizing duplicate link/attribute pairs.
section: "6.2"
topics:
    - routing
