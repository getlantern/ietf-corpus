document: rfc-8770
kind: normative-requirement
summary: When the H-bit is set, an ABR MUST advertise the same H-bit setting in its self-originated router-LSAs for all attached areas, and MUST only advertise IPv4 prefixes associated with its local interfaces in summary-LSAs.
section: "3"
rfc2119_level: MUST
topics:
