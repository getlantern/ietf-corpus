document: rfc-4028
kind: interoperability-note
summary: 'A re-INVITE or UPDATE sent for purposes other than session refresh also has the effect of refreshing the session and MUST be processed per the session timer rules. The UPDATE method is RECOMMENDED over re-INVITE for refreshes when the peer supports it (indicated by Allow: UPDATE), and UPDATE SHOULD NOT contain an offer while re-INVITE SHOULD.'
section: "7.4"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
