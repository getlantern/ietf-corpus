document: rfc-8212
kind: design-rationale
summary: 'The ''N+1 N+2'' release strategy is recommended for implementers transitioning to compliance: N+1 introduces an ''ebgp insecure-mode'' parameter and informational warnings, while N+2 inverts the default so new installations are secure and upgraded installations remain on old behavior unless reconfigured.'
