document: rfc-6797
kind: security-consideration
summary: 'HSTS can be abused to mount Denial-of-Service attacks: an attacker who can inject a spurious STS header (e.g., via HTTP response splitting or a spoofed redirect) can cause a UA to refuse all HTTP connections to a site that does not uniformly support HTTPS, rendering it unreachable.'
section: "14.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
