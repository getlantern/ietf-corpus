document: rfc-2344
kind: design-rationale
summary: The design targets mobile nodes that rely on a foreign agent for forward tunnel support rather than those using co-located care-of addresses; the latter can initiate the tunnel to the home agent directly. Supporting FA-dependent mobile nodes in the presence of filtering routers is the primary motivation.
