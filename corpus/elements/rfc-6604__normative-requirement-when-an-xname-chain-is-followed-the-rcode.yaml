document: rfc-6604
kind: normative-requirement
summary: When an xNAME chain is followed, the RCODE in the ultimate DNS response MUST be set based on the final query cycle leading to that response. If the chain terminated by an error, the error code is used; if terminated without error, RCODE is zero.
section: "3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
