document: rfc-7710
kind: normative-requirement
summary: To avoid having to perform DNS interception, the URI carried in the Captive-Portal option SHOULD contain an IP address literal. A DNS name is acceptable only if the captive portal allows the client to perform DNS requests to resolve the name.
section: "2"
rfc2119_level: SHOULD
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
