document: rfc-5709
kind: interoperability-note
summary: When verifying a received message, one must save the received digest value before computing the expected digest, then compare the two. The cryptographic algorithm in use is indicated implicitly by the KeyID of the received OSPFv2 packet.
section: "3.4"
topics:
