document: rfc-8474
kind: normative-requirement
summary: The server MUST keep the same MAILBOXID for the source and destination when renaming a mailbox in a way that keeps the same messages (with the exception of RENAME INBOX, which is treated as creating a new mailbox and moving messages).
section: "4"
rfc2119_level: MUST
topics:
    - email
