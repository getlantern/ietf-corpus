document: rfc-6135
kind: normative-requirement
summary: When the a=setup attribute value is 'actpass' or 'passive', the IP address and port values in the MSRP URI of the SDP a=path attribute MUST contain the actual address and port values on which the UA can receive a TCP connection.
section: 4.2.2
rfc2119_level: MUST
topics:
