document: rfc-6121
kind: interoperability-note
summary: The 'ver' attribute on <query/>, the 'approved' attribute on <item/>, and subscription pre-approval (Section 3.4) are all newly defined in RFC 6121 and absent from RFC 3921; implementations supporting only RFC 3921 will not recognize these features.
