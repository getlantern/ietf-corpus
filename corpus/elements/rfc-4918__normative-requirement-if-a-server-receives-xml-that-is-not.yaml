document: rfc-4918
kind: normative-requirement
summary: If a server receives XML that is not well-formed it MUST reject the entire request with a 400 Bad Request. If a depth-infinity write LOCK request encounters a conflicting lock, the request MUST fail with 423 Locked.
section: "8.2"
rfc2119_level: MUST
topics:
    - http
    - security
