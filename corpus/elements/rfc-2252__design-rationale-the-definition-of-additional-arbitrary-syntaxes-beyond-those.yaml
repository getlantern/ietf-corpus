document: rfc-2252
kind: design-rationale
summary: The definition of additional arbitrary syntaxes beyond those listed is strongly deprecated because today's client and server implementations generally cannot dynamically recognize new syntaxes, which hinders interoperability. In most cases, attributes should be defined with the Directory String syntax.
