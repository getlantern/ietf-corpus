document: rfc-6733
kind: normative-requirement
summary: Session state MUST be freed upon receipt of Session-Termination-Request, Session-Termination-Answer, expiration of Session-Timeout, and per application-specific rules. A client receiving an authorization response for a service it cannot perform MUST NOT substitute an alternate service and then send accounting requests for that alternate service instead.
section: "2"
rfc2119_level: MUST
topics:
    - diameter
