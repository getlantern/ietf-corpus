document: rfc-2392
kind: protocol-element
summary: 'The ''cid:'' URL scheme provides a reference to a specific MIME body part by its Content-ID. The scheme syntax is: cid-url = "cid" ":" content-id, where content-id = url-addr-spec (URL encoding of RFC 822 addr-spec).'
section: "2"
topics:
