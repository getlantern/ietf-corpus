document: rfc-7752
kind: wire-format
summary: 'The TE Default Metric TLV (code 1092, length 4 octets) carries the TE metric as a 32-bit value. If the source protocol uses fewer than 32 bits, the high-order bits MUST be zero-padded. The IGP Metric TLV (code 1095) is variable: 1 octet for IS-IS small metric, 2 for OSPF, 3 for IS-IS wide metric.'
section: 3.3.2.3
