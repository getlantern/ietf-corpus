document: rfc-2617
kind: wire-format
summary: An MD5 digest is represented as 32 lowercase ASCII hexadecimal characters (LHEX) encoding the 128-bit value most-significant-bit first. The nonce-count (nc-value) field is exactly 8 hex digits (8LHEX); the request-digest is a quoted string of 32LHEX.
section: 3.1.3
