document: rfc-6768
kind: design-rationale
summary: Performance monitoring counters are not reset when a GBS is re-initialized, but only when the agent itself is reset or re-initialized. This preserves historical performance data across link-layer restarts, which is important for SLA and trend analysis.
section: "5.2"
topics:
