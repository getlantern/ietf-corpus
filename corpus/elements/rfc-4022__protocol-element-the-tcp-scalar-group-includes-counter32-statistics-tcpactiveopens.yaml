summary: 'The tcp scalar group includes Counter32 statistics: tcpActiveOpens (SYN-SENT from CLOSED), tcpPassiveOpens (SYN-RCVD from LISTEN), tcpAttemptFails, tcpEstabResets, tcpInSegs, tcpOutSegs, tcpRetransSegs, tcpInErrs, and tcpOutRsts. Counter discontinuities are signaled via sysUpTime.'
