document: rfc-5545
kind: wire-format
summary: 'The DATE-TIME value type supports three forms: (1) local/floating time ''YYYYMMDDTHHmmss'' with no timezone suffix, (2) UTC time ''YYYYMMDDTHHmmssZ'' with a trailing ''Z'', and (3) local time with a TZID parameter reference. The form with a UTC offset (e.g., ''-0800'') MUST NOT be used.'
section: 3.3.5
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
