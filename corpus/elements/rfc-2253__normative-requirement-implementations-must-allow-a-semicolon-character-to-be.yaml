document: rfc-2253
kind: normative-requirement
summary: Implementations MUST allow a semicolon character to be used instead of a comma to separate RDNs, and MUST allow whitespace on either side of the comma or semicolon; the whitespace is ignored and the semicolon is replaced with a comma.
section: "4"
rfc2119_level: MUST
topics:
