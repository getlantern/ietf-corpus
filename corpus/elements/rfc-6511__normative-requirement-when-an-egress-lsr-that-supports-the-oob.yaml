document: rfc-6511
kind: normative-requirement
summary: When an egress LSR that supports the OOB mapping flag receives a Path message with that flag set, it MUST set the OOB mapping flag in the RRO Attributes subobject and MUST NOT set up forwarding state for the LSP before receiving the OOB mapping.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
