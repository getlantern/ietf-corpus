document: rfc-7888
kind: interoperability-note
summary: RFC 4466 updated the non-terminal 'literal8' (from RFC 3516 BINARY extension) to allow non-synchronizing literals when both BINARY and LITERAL+ are supported. This document extends that to also permit the extended literal8 syntax when both BINARY and LITERAL- are supported.
