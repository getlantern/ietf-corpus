document: rfc-5938
kind: wire-format
summary: 'The Start-N-Sessions message (Command Number 7) contains: 1-octet command number, 11 octets MBZ, 4-octet Number of Sessions, one or more 16-octet SID fields, and a 16-octet HMAC terminator. The Number of Sessions field MUST be one or greater and MUST equal the count of SID fields that follow.'
section: "3.2"
topics:
