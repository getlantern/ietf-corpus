document: rfc-8449
kind: normative-requirement
summary: In TLS 1.2, when a record size limit lower than the protocol-defined limit is in effect, an endpoint MUST NOT add padding to block-cipher records that would cause the protected record to exceed the size of a maximum-plaintext record with minimum padding.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
