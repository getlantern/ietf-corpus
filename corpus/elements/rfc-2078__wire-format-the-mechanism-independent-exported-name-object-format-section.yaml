document: rfc-2078
kind: wire-format
summary: The Mechanism-Independent Exported Name Object format (Section 3.2) provides a canonical flat binary representation of a mechanism-specific name suitable for binary comparisons and use in access control lists. It is produced by GSS_Export_name() and accepted by GSS_Import_name().
