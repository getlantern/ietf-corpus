document: rfc-3442
kind: design-rationale
summary: This option obsoletes the Static Route option (option 33) defined in RFC 2132 because classful routing is no longer in common use. The Static Routes option omits per-route subnet masks, making it unsuitable for classless (CIDR) routing, which requires both a network number and an explicit subnet mask to identify a route.
section: Introduction
topics:
