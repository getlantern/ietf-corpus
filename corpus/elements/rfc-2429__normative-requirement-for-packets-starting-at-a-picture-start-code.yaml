document: rfc-2429
kind: normative-requirement
summary: For packets starting at a Picture Start Code, PLEN shall be zero unless the picture header in the bitstream is incomplete (UFEP='000') AND the attached additional picture header is not incomplete (UFEP='001').
section: 5.1.1
rfc2119_level: MUST
