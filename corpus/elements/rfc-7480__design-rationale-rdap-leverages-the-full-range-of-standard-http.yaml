document: rfc-7480
kind: design-rationale
summary: RDAP leverages the full range of standard HTTP mechanisms (caching, authorization, compression, redirection) rather than defining custom transport. This benefits from widespread HTTP investment in scalability, reliability, and REST-based programmer familiarity, reducing deployment cost.
