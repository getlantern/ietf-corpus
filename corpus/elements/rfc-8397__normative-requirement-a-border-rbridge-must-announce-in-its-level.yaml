document: rfc-8397
kind: normative-requirement
summary: A border RBridge MUST announce in its Level 1 area the ownership of all external nicknames reachable from that border RBridge (nicknames in other unique nickname areas and Level 2). It MUST also announce in Level 2 the ownership of all nicknames within its own area.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
