document: rfc-9688
kind: normative-requirement
summary: For KMAC128-KDF/KMAC256-KDF, the input key K length MUST be less than 2^2040, the output length L MUST be >= 0 and less than 2^2040, and the customization label S length MUST be less than 2^2040.
