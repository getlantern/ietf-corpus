document: rfc-7813
kind: protocol-element
summary: The Topology sub-TLV (type 21) is the primary sub-TLV for describing an explicit tree or GADAG. It MUST be carried in an MT-Capability TLV (type 144) in a Link State PDU, and contains a count of Base VIDs (12-bit each), followed by variable-length sub-TLVs specifying hops and constraints.
section: "6.1"
topics:
    - routing
