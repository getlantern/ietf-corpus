document: rfc-8964
kind: protocol-element
summary: An S-Label (service label) identifies a DetNet flow at the receiving DetNet service sub-layer processing node. S-Label values are driven by the receiver, not the sender, and may be taken from the platform label space to provide unique flow identification regardless of input interface.
section: 4.2.2
topics:
