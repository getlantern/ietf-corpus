document: rfc-6107
kind: protocol-element
summary: 'Three Component Link Identification TLVs identify the component link within a bundle: Type 2 (Unnumbered, 32-bit identifier), Type 3 (IPv4 Numbered, 32-bit address), and Type 4 (IPv6 Numbered, 128-bit address). When the B-flag is set, exactly one of these TLVs MUST appear in both Path and Resv objects.'
section: "3.3"
topics:
