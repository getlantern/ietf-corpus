document: rfc-3720
kind: normative-requirement
summary: For any iSCSI request issued over a TCP connection, the corresponding response and all related PDUs MUST be sent over the same connection (connection allegiance). This allegiance may be explicitly reassigned only after the original connection fails.
section: 3.2.4.1
rfc2119_level: MUST
topics:
    - tcp
