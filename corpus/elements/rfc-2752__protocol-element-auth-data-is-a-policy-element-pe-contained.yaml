document: rfc-2752
kind: protocol-element
summary: 'AUTH_DATA is a policy element (PE) contained in the POLICY_DATA object that carries authentication credentials and policy locators to identify the user or application making an RSVP request. It contains a list of authentication attributes and is typed by P-Type (Identity Type): AUTH_USER (1) or AUTH_APP (2).'
section: "3.2"
topics:
    - security
    - qos
