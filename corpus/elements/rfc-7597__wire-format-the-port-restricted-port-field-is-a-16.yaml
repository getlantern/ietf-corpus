document: rfc-7597
kind: wire-format
summary: 'The port-restricted port field is a 16-bit value structured as: a-bit field A (must be >0 to exclude system ports), k-bit PSID (Port Set Identifier), and m-bit index j. The default value of ''a'' is 6, which excludes system ports 0-1023.'
