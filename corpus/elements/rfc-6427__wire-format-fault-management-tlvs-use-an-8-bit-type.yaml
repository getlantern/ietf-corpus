document: rfc-6427
kind: wire-format
summary: Fault Management TLVs use an 8-bit Type, 8-bit Length, and variable-length Value field. The Interface Identifier TLV (Type=1, Length=0x8) carries an MPLS-TP Node Identifier (32 bits) and MPLS-TP Interface Number (32 bits) as defined in RFC 6370.
section: 4.1.1
topics:
    - mpls
