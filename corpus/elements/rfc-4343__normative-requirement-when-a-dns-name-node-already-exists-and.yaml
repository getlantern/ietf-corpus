document: rfc-4343
kind: normative-requirement
summary: When a DNS name node already exists and new input provides the same label with different case, implementations MAY retain the original case, allow new input to override, or maintain separate copies. Any retrieval capitalization will retrieve all RRs regardless of stored capitalization.
section: "4.2"
rfc2119_level: MAY
topics:
    - dns
