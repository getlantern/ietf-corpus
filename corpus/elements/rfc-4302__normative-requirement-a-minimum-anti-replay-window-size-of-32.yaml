document: rfc-4302
kind: normative-requirement
summary: A MINIMUM anti-replay window size of 32 packets MUST be supported; a window size of 64 is preferred and SHOULD be employed as the default. Larger windows MAY be chosen by the receiver without notifying the sender.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
