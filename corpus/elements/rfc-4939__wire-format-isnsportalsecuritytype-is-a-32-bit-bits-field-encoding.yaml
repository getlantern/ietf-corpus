document: rfc-4939
kind: wire-format
summary: IsnsPortalSecurityType is a 32-bit BITS field encoding IPsec/IKE security attributes for a portal. Bit 31 (bitmapVALID) must be set for other bits to be considered valid; bits 25-30 encode tunnel mode preference, transport mode preference, PFS, aggressive mode, main mode, and IKE/IPsec enabled.
