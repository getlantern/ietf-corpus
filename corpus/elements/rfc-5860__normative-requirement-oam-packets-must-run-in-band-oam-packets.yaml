document: rfc-5860
kind: normative-requirement
summary: OAM packets MUST run in-band; OAM packets for a specific PW, LSP, or Section MUST follow the exact same data path as user traffic (fate sharing). It MUST be possible to discriminate user traffic from OAM packets.
section: 2.1.3
rfc2119_level: MUST
