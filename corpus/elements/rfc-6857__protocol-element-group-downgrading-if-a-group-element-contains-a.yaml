document: rfc-6857
kind: protocol-element
summary: 'Group downgrading: if a <group> element contains a mailbox with a non-ASCII local-part, the entire <group-list> is encoded as encoded-words and rewritten as ''display-name ENCODED_WORD :;''. If local-parts are ASCII-only, non-ASCII domain names in mailboxes are rewritten using A-labels.'
section: 3.1.7
topics:
    - email
