document: rfc-5362
kind: security-consideration
summary: Subscriptions to the Pending Additions event package can reveal sensitive information. Relays SHOULD use strong authentication (e.g., SIP Digest as per RFC 3261) and information integrity/confidentiality mechanisms. End-to-end encryption via S/MIME is RECOMMENDED; if unavailable, hop-by-hop TLS with SIPS URIs SHOULD be used.
section: "8"
topics:
    - sip
    - security
    - realtime
    - tls
