document: rfc-1452
kind: normative-requirement
summary: When converting trap definitions to SNMPv2, each TRAP-TYPE macro must be replaced with a NOTIFICATION-TYPE macro. The ENTERPRISES clause must be removed, VARIABLES must be renamed to OBJECTS, a STATUS clause must be added, and the value must be an OBJECT IDENTIFIER rather than an INTEGER.
section: "2.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
