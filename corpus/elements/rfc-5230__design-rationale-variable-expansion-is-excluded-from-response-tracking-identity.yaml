document: rfc-5230
kind: design-rationale
summary: 'Variable expansion is excluded from response tracking identity so that a single vacation action with a variable subject (e.g., "Auto response to: ${1}") is treated as one logical response rather than generating a unique reply for every distinct subject line received.'
