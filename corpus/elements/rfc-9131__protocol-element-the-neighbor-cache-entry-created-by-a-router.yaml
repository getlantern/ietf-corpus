document: rfc-9131
kind: protocol-element
summary: The Neighbor Cache entry created by a router upon receiving an unsolicited NA MUST be in STALE state and includes the link-layer address from the Target Link-Layer Address Option. This entry is used when return traffic arrives, avoiding the address resolution delay.
section: 6.1.1
topics:
    - ip
    - routing
