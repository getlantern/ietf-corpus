document: rfc-8412
kind: normative-requirement
summary: All SWIMA-PCs MUST track the source of each piece of software information they report. For each source, the SWIMA-PC MUST assign an 8-bit unsigned Source Identifier and MUST deliver all information from that source with the same Source Identifier consistently throughout a PB-TNC session.
section: 3.4.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
