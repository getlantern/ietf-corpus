document: rfc-5077
kind: interoperability-note
summary: A server wishing to support RFC 4507 clients should respond to an empty SessionTicket extension encoded the same way it was received, since the encoding of an empty extension was ambiguous in RFC 4507 (it could include a zero-length inner field or omit it).
section: Appendix A
topics:
    - tls
