document: rfc-8854
kind: protocol-element
summary: 'Codec-specific in-band FEC (Opus, AMR/AMR-WB): redundant data is included within the codec payload with no additional framing. Opus re-encodes important frames at lower bitrate appended to the next payload; AMR/AMR-WB can include copies or lower-quality encodings of multiple prior frames.'
section: "3.3"
