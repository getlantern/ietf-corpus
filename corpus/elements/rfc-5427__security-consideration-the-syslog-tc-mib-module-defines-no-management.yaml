document: rfc-5427
kind: security-consideration
summary: The SYSLOG-TC-MIB module defines no management objects, only textual conventions, so it has no direct impact on Internet security. However, MIB modules that use these TCs to define management objects may introduce security issues; users of these TCs should consult the security considerations of RFC 5424.
section: "4"
topics:
    - syslog
    - snmp
    - security
