document: rfc-6844
kind: security-consideration
summary: A CA could abuse the critical flag to trick customers into publishing CAA records that block competing CAs, even though the customer intends to authorize multiple providers. In practice this attack has minimal effect as a blocked competitor would investigate and notify the customer.
section: "6.5"
topics:
