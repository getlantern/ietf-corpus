document: rfc-9148
kind: normative-requirement
summary: The EST-coaps client MUST be configured with at least an Implicit Trust Anchor database to enable authentication of the server before updating its trust anchor. The updated Explicit TA MUST continue to be used in new DTLS connections after a /crts response.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
