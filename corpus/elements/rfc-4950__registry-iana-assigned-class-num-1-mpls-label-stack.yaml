kind: registry
summary: 'IANA assigned Class-Num 1 (MPLS Label Stack Class) in the ICMP Extension Object registry. A new registry for the corresponding C-Type subtype space was established: C-Type 0 is Reserved, C-Type 1 is Incoming MPLS Label Stack, 0x02-0xF6 are available for assignment on FCFS basis, and 0xF7-0xFF are reserved for private use.'
