document: rfc-9661
kind: protocol-element
summary: 'SieveScript/set extends the standard JMAP /set method with two optional arguments: ''onSuccessActivateScript'' (Id of script to activate after all mutations succeed) and ''onSuccessDeactivateScript'' (Boolean to deactivate the currently active script). When both are present, deactivation is processed first.'
