document: rfc-5908
kind: security-consideration
summary: To mitigate rogue NTP server advertisement attacks, operators SHOULD secure OPTION_NTP_SERVER use by employing either NTPv4 Autokey public key authentication (RFC 5906) or authenticated DHCPv6 as described in RFC 3315 Section 21.
