document: rfc-2634
kind: normative-requirement
summary: Receiving agents MUST NOT process an equivalentLabels attribute unless the signer is trusted to translate the original eSSSecurityLabel values to the security policy in the equivalentLabels. If the ESSSecurityLabel policy is recognized, the agent MUST process that label and MUST ignore all EquivalentLabels.
section: 3.4.2
rfc2119_level: MUST NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
