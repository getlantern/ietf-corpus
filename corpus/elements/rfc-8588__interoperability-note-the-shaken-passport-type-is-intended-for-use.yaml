document: rfc-8588
kind: interoperability-note
summary: The 'shaken' PASSporT type is intended for use within an RFC 3324 trust domain, and SHAKEN PASSporTs are expected to be stripped before calls exit that trust domain. This limits exposure of the 'origid' and attestation information beyond the originating SP's network.
section: "10"
topics:
