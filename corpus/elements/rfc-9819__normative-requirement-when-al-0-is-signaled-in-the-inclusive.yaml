document: rfc-9819
kind: normative-requirement
summary: When AL=0 is signaled in the Inclusive Multicast Ethernet Tag route, the SRv6 Service SID is formed using only LOC:FUNC (all bits after LBL+LNL+FL MUST be zero), and the ingress PE MUST ignore the SID and structure from the corresponding Ethernet A-D per ES route.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
