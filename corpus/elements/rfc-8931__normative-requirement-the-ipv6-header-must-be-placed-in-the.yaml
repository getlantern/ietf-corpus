document: rfc-8931
kind: normative-requirement
summary: The IPv6 header MUST be placed in the first fragment in full to enable routing decisions. The first fragment is routed and creates the LSP; subsequent fragments are label-switched along that LSP and cannot follow an alternate route.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
