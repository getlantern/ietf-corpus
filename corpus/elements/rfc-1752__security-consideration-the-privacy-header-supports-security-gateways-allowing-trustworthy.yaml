document: rfc-1752
kind: security-consideration
summary: The Privacy Header supports security gateways, allowing trustworthy network segments to operate without per-host encryption costs while protecting traffic transiting untrusted segments. Either a transport-layer frame or an entire IPv6 datagram may be encrypted depending on security requirements.
section: 12.2.6
topics:
    - ip
    - security
    - crypto
    - vpn
