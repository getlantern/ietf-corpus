document: rfc-2765
kind: interoperability-note
summary: IPv4 options are ignored (not translated) during IPv4-to-IPv6 translation. Similarly, IPv6 hop-by-hop options, destination options, and routing headers with Segments Left equal to zero are ignored during IPv6-to-IPv4 translation, with the Total Length and Protocol fields adjusted to skip these extension headers.
section: "3.1"
topics:
    - ip
    - v6ops
