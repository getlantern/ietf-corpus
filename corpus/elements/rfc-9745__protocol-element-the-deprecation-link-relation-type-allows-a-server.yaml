document: rfc-9745
kind: protocol-element
summary: The deprecation link relation type allows a server to link to human- or machine-readable documentation about the deprecation of the resource context. It can be sent before or after the actual deprecation date using a Link header field with `rel="deprecation"`.
section: "3"
