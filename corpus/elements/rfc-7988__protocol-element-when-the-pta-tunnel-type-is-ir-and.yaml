document: rfc-7988
kind: protocol-element
summary: When the PTA Tunnel Type is IR and either the PTA is in a Leaf A-D route or the Leaf Information Required bit is not set, the Tunnel Identifier field MUST contain a routable IP address of the route's originator. The parent node uses this address to determine which unicast tunnel to use to send data along the IR P-tunnel to that originator.
section: "5"
topics:
    - routing
    - multicast
