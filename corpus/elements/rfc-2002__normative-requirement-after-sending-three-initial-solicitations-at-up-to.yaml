document: rfc-2002
kind: normative-requirement
summary: After sending three initial solicitations at up to one per second, a mobile node MUST reduce the solicitation rate using binary exponential backoff up to a maximum interval of at least one minute. The mobile node MUST NOT increase the rate unless it receives a positive indication of movement to a new link.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
