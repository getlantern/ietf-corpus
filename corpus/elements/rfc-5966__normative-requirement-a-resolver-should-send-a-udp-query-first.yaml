document: rfc-5966
kind: normative-requirement
summary: A resolver SHOULD send a UDP query first, but MAY elect to send a TCP query instead if it has good reason to expect truncation or for other operational reasons, in particular if it already has an open TCP connection to the server. This relaxes the prior RFC 1123 MUST-send-UDP-first requirement.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
