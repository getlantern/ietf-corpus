document: rfc-7666
kind: protocol-element
summary: The vmStorageTable describes virtual storage devices attached to virtual machines, indexed by vmStorageVmIndex and vmStorageIndex. Entries include source type, access permission, media type, defined/allocated sizes (in vmStorageSizeUnit-byte units), and I/O counters (ReadIOs, WriteIOs, ReadOctets, WriteOctets, ReadLatency, WriteLatency) all as Counter64 values in microseconds or octets.
section: "6.1"
topics:
