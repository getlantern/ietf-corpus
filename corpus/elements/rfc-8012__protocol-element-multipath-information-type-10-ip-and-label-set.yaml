document: rfc-8012
kind: protocol-element
summary: 'Multipath Information Type {10} (IP and Label set) is a new type for the DDMAP TLV that combines three sections: IP Multipath Information (reusing types {2,4,8}), Label Multipath Information (reusing type {9}), and Associated Label Multipath Information (a list of 24-bit labels mapping one-to-one to the IP addresses or labels in the other sections).'
