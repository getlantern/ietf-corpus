document: rfc-6080
kind: protocol-element
summary: The 'ua-profile' SIP event package is defined to allow devices to subscribe to specific profile types with a Profile Delivery Server (PDS) and receive profile data or content indirection in NOTIFY responses. The package name appears in the Event header of SUBSCRIBE and NOTIFY requests.
section: "6.1"
