document: rfc-7761
kind: normative-requirement
summary: Hello messages MUST be sent on all active interfaces, including physical point-to-point links, multicast to the ALL-PIM-ROUTERS group (224.0.0.13 for IPv4, ff02::d for IPv6). Not sending Hello messages on point-to-point interfaces is explicitly non-compliant behavior.
section: 4.3.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
