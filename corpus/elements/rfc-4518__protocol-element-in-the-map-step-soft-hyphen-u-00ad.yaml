summary: In the Map step, SOFT HYPHEN (U+00AD), MONGOLIAN TODO SOFT HYPHEN (U+1806), COMBINING GRAPHEME JOINER (U+034F), VARIATION SELECTORs (U+180B-180D, FF00-FE0F), and OBJECT REPLACEMENT CHARACTER (U+FFFC) are mapped to nothing. Control characters like CHARACTER TABULATION, LINE FEED, CARRIAGE RETURN, and NEXT LINE are mapped to SPACE (U+0020).
