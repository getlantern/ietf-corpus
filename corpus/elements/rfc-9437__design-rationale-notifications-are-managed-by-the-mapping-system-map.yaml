document: rfc-9437
kind: design-rationale
summary: Notifications are managed by the Mapping System (Map-Server) rather than by ETRs (as in RFC 9301 Section 6.1). This allows mapping changes to be detected and disseminated faster and centralizes subscription state in the infrastructure rather than at LISP sites.
section: "1"
topics:
    - routing
