document: rfc-4557
kind: design-rationale
summary: OCSP responses are well-bounded and small in size, making them preferable to large Certificate Revocation Lists (CRLs) for constrained clients and networks. This mechanism allows PKINIT clients and the KDC to maximize reuse of cached OCSP responses.
