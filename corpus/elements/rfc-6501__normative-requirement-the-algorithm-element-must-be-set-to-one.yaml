document: rfc-6501
kind: normative-requirement
summary: The <algorithm> element MUST be set to one of 'moderator-controlled', 'FCFS', or 'random'. The <moderator-id> element MUST be set if <algorithm> is 'moderator-controlled'; when BFCP is the floor control protocol, <moderator-id> corresponds to the BFCP floor chair concept.
section: 4.5.4
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
