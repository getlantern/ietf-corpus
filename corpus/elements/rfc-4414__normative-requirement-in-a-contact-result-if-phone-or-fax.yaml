document: rfc-4414
kind: normative-requirement
summary: In a <contact> result, if phone or fax begins with a '+' character it MUST be a number defined by E.164; the E.164 format is RECOMMENDED. The <country> element SHOULD be a 2-letter ISO 3166 country code.
section: 3.2.5
rfc2119_level: MUST
topics:
    - realtime
    - registry
