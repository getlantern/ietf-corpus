summary: In TOKEN_BUCKET_TSPEC, the minimum policed unit [m] and maximum packet size [M] MUST both be positive, and [m] MUST be less than or equal to [M]. All IP datagrams smaller than [m] are treated as size [m] for resource allocation and policing.
