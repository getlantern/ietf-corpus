document: rfc-9584
kind: protocol-element
summary: 'The absolute decoding order number AbsDon is computed from 16-bit modular DON values using five case-based rules that handle wraparound and gaps. AbsDon values determine NAL unit decoding sequence: larger AbsDon means later in decoding order; equal AbsDon means either order is acceptable.'
