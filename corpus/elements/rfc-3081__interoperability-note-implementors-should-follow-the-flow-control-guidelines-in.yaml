document: rfc-3081
kind: interoperability-note
summary: Implementors should follow the flow control guidelines in RFC 1122 Section 4.2.2.16, which states that a receiver SHOULD NOT shrink the window; only the portions of RFC 1122 concerning flow control are applicable when mapping BEEP onto TCP.
section: 3.1.4
topics:
