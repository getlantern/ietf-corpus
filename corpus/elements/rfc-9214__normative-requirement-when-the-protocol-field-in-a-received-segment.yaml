document: rfc-9214
kind: normative-requirement
summary: When the protocol field in a received Segment ID sub-TLV Type 35 or 36 is OSPF (value 1), the responder MAY treat the protocol value as 'Any IGP Protocol' (value 0) to support legacy implementations that use value 1 to indicate OSPFv3.
section: "4"
rfc2119_level: MAY
topics:
