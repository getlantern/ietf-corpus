document: rfc-5860
kind: design-rationale
summary: OAM packets must run in-band and follow the same data path as user traffic (fate sharing) so that OAM accurately reflects the actual forwarding behavior experienced by user packets, enabling meaningful fault and performance monitoring.
section: 2.1.3
