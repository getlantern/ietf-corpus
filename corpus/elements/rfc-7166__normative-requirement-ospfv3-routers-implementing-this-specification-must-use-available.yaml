document: rfc-7166
kind: normative-requirement
summary: OSPFv3 routers implementing this specification MUST use available mechanisms to preserve the sequence number's strictly increasing property for the deployed life of the router including cold restarts, such as using the high-order 32 bits as a wrap/boot count stored in non-volatile storage.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
