summary: 'Two new endpoint restriction TLVs are defined for the END-POINTS Generalized Endpoint: Optical Interface Class List TLV (Type 11, encoding per RFC 7581 Section 4.1) and Client Signal Information TLV (Type 12, encoding per RFC 7581 Section 4.2). These carry signal compatibility constraints for RWA path computation.'
