document: rfc-5061
kind: wire-format
summary: The ASCONF-ACK chunk (type 0x80) carries a 32-bit Sequence Number copied from the acknowledged ASCONF and zero or more TLV ASCONF Parameter Responses. An ASCONF-ACK with only the Chunk Type, Flags, Length=8, and Sequence Number implicitly indicates complete success for all TLVs.
section: 4.1.2
topics:
    - sctp
    - multipath
