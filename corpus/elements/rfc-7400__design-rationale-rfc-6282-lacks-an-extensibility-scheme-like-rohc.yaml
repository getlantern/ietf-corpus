document: rfc-7400
kind: design-rationale
summary: RFC 6282 lacks an extensibility scheme like ROHC profiles, requiring new specifications for every new header type. 6LoWPAN-GHC addresses this by plugging into the existing NHC concept with a generic, slightly less efficient but vastly more general compression scheme that can be defined on a single page.
section: "1.1"
topics:
    - ip
    - privacy
