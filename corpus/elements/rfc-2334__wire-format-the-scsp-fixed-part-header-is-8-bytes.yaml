document: rfc-2334
kind: wire-format
summary: 'The SCSP Fixed Part header is 8 bytes: Version (1 byte, current=1), Type Code (1 byte; CA=1, CSU-Request=2, CSU-Reply=3, CSUS=4, Hello=5), Packet Size (2 bytes, total octets excluding link-layer encapsulation), Checksum (2 bytes, IP checksum over entire packet), and Start Of Extensions (2 bytes, offset to first extension or zero).'
section: B.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
