document: rfc-6442
kind: normative-requirement
summary: The Geolocation-Routing header field MUST NOT appear more than once in any SIP request and MUST NOT lack a header-value. When absent in a request that contains a Geolocation header, it MUST be interpreted as if present with value "no".
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - realtime
