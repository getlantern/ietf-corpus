document: rfc-6762
kind: design-rationale
summary: mDNS uses a fixed multicast address (224.0.0.251) rather than a range of hashed addresses because all devices on the link must receive all mDNS traffic to enable passive cache sharing, conflict detection, duplicate suppression, and Known-Answer Suppression across hosts (see Appendix B).
section: Appendix B
topics:
