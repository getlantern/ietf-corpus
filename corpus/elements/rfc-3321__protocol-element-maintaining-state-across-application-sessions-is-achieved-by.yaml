document: rfc-3321
kind: protocol-element
summary: Maintaining state across application sessions is achieved by extending the SigComp compartment lifetime beyond a single application session. Messages from the same source contain redundancies across session boundaries, and amortizing state overhead over multiple sessions improves long-term compression efficiency.
section: "5.3"
topics:
    - sip
