document: rfc-5804
kind: design-rationale
summary: The VERSION capability was introduced to distinguish servers compliant with RFC 5804 from older pre-specification implementations. Lack of VERSION indicates the server predates this specification and does not support RENAMESCRIPT, CHECKSCRIPT, or NOOP commands. The version numbering scheme uses major.minor where incrementing major signals a backward-incompatible change.
section: "1.7"
