document: rfc-8074
kind: protocol-element
summary: 'When the same address is bound to the same binding anchor by multiple SAVI methods (e.g., both FCFS SAVI and SAVI-DHCP), lifetime priority follows the order: (1) manual configuration, (2) SAVI-DHCP, (3) FCFS SAVI; the binding is removed when the highest-priority lifetime expires.'
section: "6.2"
topics:
