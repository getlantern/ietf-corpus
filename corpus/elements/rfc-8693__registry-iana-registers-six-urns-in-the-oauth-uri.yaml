document: rfc-8693
kind: registry
summary: 'IANA registers six URNs in the ''OAuth URI'' subregistry: the token-exchange grant type and five token type URIs (access_token, refresh_token, id_token, saml1, saml2). Seven new OAuth Parameters are registered (audience, requested_token_type, subject_token, subject_token_type, actor_token, actor_token_type, issued_token_type). The ''N_A'' access token type and four JWT claims (act, scope, client_id, may_act) are also registered.'
section: "7"
