document: rfc-7212
kind: wire-format
summary: 'GAP Suppress TLV (Type=3): requests the receiver to cease sending GAP updates for a Duration (16-bit seconds). If Length=2 (empty Application ID list), suppression of all GAP messages is requested; otherwise only the listed applications are suppressed. Duration=0 cancels existing suppress requests.'
section: "4.4"
topics:
    - mpls
