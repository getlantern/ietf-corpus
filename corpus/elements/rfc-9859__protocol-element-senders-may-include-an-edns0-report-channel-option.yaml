document: rfc-9859
kind: protocol-element
summary: Senders MAY include an EDNS0 Report-Channel option (RFC 9567) in the NOTIFY message to request error reporting via extended DNS error (EDE) codes (RFC 8914). The agent domain in this option MUST be subordinate to or equal to one of the NS hostnames listed in the child's delegation, preventing unsolicited queries to unrelated third parties.
section: 4.2.1
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
