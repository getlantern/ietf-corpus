document: rfc-8401
kind: normative-requirement
summary: A router receiving an <MT,SD> advertisement that does not match its locally configured pair MUST report a misconfiguration and MUST ignore all received BIER advertisements associated with the conflicting <MT,SD> pair.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
