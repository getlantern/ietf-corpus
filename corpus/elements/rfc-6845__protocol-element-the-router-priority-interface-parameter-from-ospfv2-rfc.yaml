summary: The 'Router Priority' interface parameter from OSPFv2 (RFC 2328) and OSPFv3 (RFC 5340) applies to the hybrid-broadcast-and-P2MP interface. The 'LinkLSASuppression' parameter also applies, with a default value of 'disabled' that may be enabled via configuration.
