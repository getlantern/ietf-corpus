document: rfc-6810
kind: normative-requirement
summary: When a router receives a Cache Reset, it SHOULD attempt to connect to any more preferred caches. If no more preferred caches exist, it MUST issue a Reset Query to get an entire new load from the cache.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
