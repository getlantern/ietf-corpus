document: rfc-5451
kind: security-consideration
summary: A malicious sender can forge an Authentication-Results header field using a legitimate ADMD's authserv-id. A non-conformant MTA that fails to strip forged headers allows MUAs to incorrectly trust them. Mitigation requires MUAs to treat this header field as untrusted by default and border MTAs to strip inbound instances claiming to be from within the ADMD.
section: "7.1"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
