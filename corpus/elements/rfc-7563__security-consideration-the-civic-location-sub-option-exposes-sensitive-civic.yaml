document: rfc-7563
kind: security-consideration
summary: The Civic-Location sub-option exposes sensitive civic location of the mobile node's attachment point. IPsec ESP with confidentiality and integrity protection SHOULD be used to protect this information in PMIPv6 signaling, as specified in RFC 5213. Operators may also choose to provision location only to coarse granularity (e.g., city or province level).
section: "6"
topics:
    - security
    - privacy
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
