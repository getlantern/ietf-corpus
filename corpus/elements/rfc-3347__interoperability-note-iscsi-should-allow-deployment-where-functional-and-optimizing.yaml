document: rfc-3347
kind: interoperability-note
summary: iSCSI SHOULD allow deployment where functional and optimizing middle-boxes such as firewalls, proxy servers, and NATs are present. URL syntax for iSCSI resource connection allows an initiator to address a target both directly and through an iSCSI proxy server or NAT.
