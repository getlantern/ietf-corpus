document: rfc-8003
kind: interoperability-note
summary: REG_REQUEST MUST NOT be included in I2 or UPDATE unless the registrar's most recent R1 or UPDATE contained a REG_INFO listing the requested registration types, preventing requests for services the registrar has not advertised.
section: "4.3"
topics:
    - security
