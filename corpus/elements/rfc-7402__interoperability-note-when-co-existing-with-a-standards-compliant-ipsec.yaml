document: rfc-7402
kind: interoperability-note
summary: When co-existing with a standards-compliant IPsec implementation, in tunnel mode overlap cases traffic MUST be encrypted with both HIP ESP SA and the IPsec SA. In transport mode overlap, the IPsec encryption MAY be skipped if local policy allows, to avoid double encryption.
section: 3.4.1
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
