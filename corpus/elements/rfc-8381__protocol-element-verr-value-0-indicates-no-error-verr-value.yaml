document: rfc-8381
kind: protocol-element
summary: VERR value 0 indicates no error; VERR value 1 indicates the RBridge-Channel-Specific Data is less than 4 bytes (truncation); VERR value 2 indicates an unknown OUI/CID; VERR value 3 indicates an unknown Sub-Protocol; VERR value 4 indicates an unknown Sub-Version. Values 0x00–0x0F and 0xFF are IETF-reserved; 0x10–0xFE are available for vendor use.
section: "3"
topics:
