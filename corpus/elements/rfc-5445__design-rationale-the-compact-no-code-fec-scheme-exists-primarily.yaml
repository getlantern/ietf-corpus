document: rfc-5445
kind: design-rationale
summary: The Compact No-Code FEC Scheme exists primarily to enable interoperability testing between different implementations of protocols using the FEC building block, without requiring either party to implement an actual FEC codec. Assigning it FEC Encoding ID 0 (the lowest Fully-Specified value) reflects its baseline role.
section: "3.1"
topics:
