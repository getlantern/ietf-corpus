document: rfc-4479
kind: normative-requirement
summary: Implementations SHOULD include <geopriv> location objects as part of the person and/or device components of a presence document (not under <tuple>), but SHOULD also be prepared to receive presence documents with <geopriv> as a child of <tuple>, as defined in RFC 4119 prior to this specification.
section: "4"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
