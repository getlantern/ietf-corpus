document: rfc-4359
kind: security-consideration
summary: RSA signature verification is computationally expensive; an attacker with a valid SA and sequence number can force receivers to perform expensive signature verifications, potentially causing a denial-of-service attack. In multicast, all group members are attacked simultaneously.
section: "6.7"
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
