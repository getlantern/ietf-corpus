document: rfc-9937
kind: protocol-element
summary: SafeACK is a local boolean that is true only when the current ACK has cumulatively acknowledged new data and does not indicate further losses (e.g., does not trigger an RFC 6675 'rescue' retransmission). It controls whether PRR-SSRB or PRR-CRB is used when inflight is below ssthresh.
section: "6.2"
topics:
    - tcp
    - congestion
