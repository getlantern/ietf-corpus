document: rfc-7044
kind: normative-requirement
summary: Applications MUST evaluate hi-entries for gaps (indicated by a '0' in the index or duplicate indices from non-supporting intermediaries). Gaps MUST NOT be treated as errors; applications SHOULD indicate gap presence to higher-layer logic.
section: "11"
rfc2119_level: MUST
