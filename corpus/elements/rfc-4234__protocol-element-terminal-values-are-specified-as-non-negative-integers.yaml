document: rfc-4234
kind: protocol-element
summary: 'Terminal values are specified as non-negative integers with explicit base notation: %b for binary, %d for decimal, %x for hexadecimal. Concatenated values use dot notation (e.g., %d13.10 for CRLF); value ranges use dash notation (e.g., %x30-39 for DIGIT).'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
