document: rfc-5331
kind: normative-requirement
summary: An upstream-assigned label MUST always be looked up in a context-specific label space, because when it is at the top of the label stack it must be looked up by an LSR that is not the one that assigned it.
section: "4"
rfc2119_level: MUST
topics:
