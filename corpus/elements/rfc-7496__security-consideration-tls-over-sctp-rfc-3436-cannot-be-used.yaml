document: rfc-7496
kind: security-consideration
summary: TLS over SCTP (RFC 3436) cannot be used with PR-SCTP associations; DTLS over SCTP (RFC 6083) should be used instead for transport-layer security. If DTLS over SCTP is used, the security considerations of RFC 6083 apply.
section: "5"
topics:
    - sctp
    - tls
    - security
