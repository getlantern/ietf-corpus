document: rfc-5285
kind: normative-requirement
summary: In the one-byte header form, the local identifier value 15 is reserved for future extension and MUST NOT be used as an identifier. If ID 15 is encountered, its length field should be ignored and processing of the entire extension should terminate at that point.
section: "4.2"
rfc2119_level: MUST NOT
topics:
