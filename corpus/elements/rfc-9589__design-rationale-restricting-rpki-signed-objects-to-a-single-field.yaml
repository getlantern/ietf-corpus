document: rfc-9589
kind: design-rationale
summary: Restricting RPKI Signed Objects to a single field (signing-time) for storing the signing time—rather than allowing both signing-time and binary-signing-time—removes potential for ambiguity that existed when both attributes could be present with differing values.
