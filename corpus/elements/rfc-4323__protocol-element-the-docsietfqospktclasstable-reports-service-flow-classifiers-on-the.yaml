document: rfc-4323
kind: protocol-element
summary: The docsIetfQosPktClassTable reports Service Flow Classifiers on the CM or CMTS, indexed by {ifIndex, docsIetfQosServiceFlowId, docsIetfQosPktClassId}. It is read-only, created only via CM configuration file or DSA messages, and supports classification by IP TOS, protocol, source/destination address and port, Ethernet type, 802.1Q VLAN, and MAC address.
section: 2.2.1
topics:
