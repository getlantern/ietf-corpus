document: rfc-1509
kind: protocol-element
summary: gss_verify and gss_unseal check signatures and decrypt sealed messages, returning qop_state (protection strength) and, for gss_unseal, conf_state (whether confidentiality was used). Both return GSS_S_DUPLICATE_TOKEN, GSS_S_OLD_TOKEN, or GSS_S_UNSEQ_TOKEN for replay and sequencing violations.
section: "3.9"
