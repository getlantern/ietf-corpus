kind: design-rationale
summary: '`max_fragment_length` only permits values up to 2^12, which is smaller than the protocol''s 2^14 maximum, and RFC 6066 requires servers to abort with `illegal_parameter` on unknown values, making it impossible to add a 2^14 codepoint without breaking existing servers.'
