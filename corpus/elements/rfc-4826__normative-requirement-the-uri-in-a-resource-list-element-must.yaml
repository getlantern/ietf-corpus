document: rfc-4826
kind: normative-requirement
summary: The URI in a <resource-list> element MUST be an absolute URI, and the server MUST verify the URI path contains 'resource-lists' in the AUID path segment. If the RLS services document is in the user tree, the server MUST verify the XUI matches.
section: 4.4.5
rfc2119_level: MUST
topics:
