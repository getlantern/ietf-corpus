document: rfc-8949
kind: normative-requirement
summary: An encoder MUST NOT issue two-byte sequences starting with 0xf8 (major type 7, additional information 24) and continuing with a byte less than 0x20 (32 decimal); such sequences are not well-formed, and each simple value such as false, true, null, or undefined has only a single one-byte representation.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - cbor
