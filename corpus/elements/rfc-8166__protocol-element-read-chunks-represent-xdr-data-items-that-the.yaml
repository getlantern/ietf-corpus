document: rfc-8166
kind: protocol-element
summary: Read chunks represent XDR data items that the Responder pulls from the Requester using RDMA Read operations. They are encoded as a linked list (Read list) of xdr_read_chunk entries grouped by Position value; the Responder reconstructs the reduced Payload stream by concatenating each segment's data at the indicated Position offset.
section: 3.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
