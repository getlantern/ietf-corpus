document: rfc-5124
kind: design-rationale
summary: SAVP and AVPF are largely orthogonal profiles, making their combination in SAVPF mostly straightforward without requiring new sophisticated algorithms. SAVPF simply layers AVPF timing and feedback packet formats on top of SAVP's SRTP encryption and integrity protection.
