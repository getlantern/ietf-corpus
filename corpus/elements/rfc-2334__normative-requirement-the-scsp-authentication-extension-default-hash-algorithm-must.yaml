document: rfc-2334
kind: normative-requirement
summary: The SCSP Authentication Extension default hash algorithm MUST be HMAC-MD5-128; manual keying MUST be supported. If a received packet fails authentication, it is discarded and the event logged.
section: B.3.1
rfc2119_level: MUST
