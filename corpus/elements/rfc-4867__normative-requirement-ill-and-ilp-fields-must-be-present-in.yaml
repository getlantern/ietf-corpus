document: rfc-4867
kind: normative-requirement
summary: ILL and ILP fields MUST be present in each packet of a session if interleaving is signaled out-of-band. Interleaving MUST be performed on a frame-block basis, not on a frame basis, in a multi-channel session.
section: 4.4.1
rfc2119_level: MUST
topics:
