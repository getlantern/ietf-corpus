document: rfc-9808
kind: design-rationale
summary: A dCDN-provided Telemetry Source that both parties reference creates an unambiguous metric for comparing current usage against a limit. Without a shared source, the uCDN and dCDN might observe different values, making limit enforcement ambiguous.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
