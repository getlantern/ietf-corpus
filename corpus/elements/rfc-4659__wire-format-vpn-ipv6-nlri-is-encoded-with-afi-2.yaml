summary: VPN IPv6 NLRI is encoded with AFI=2 (IPv6) and SAFI=128 (MPLS labeled VPN-IPv6). The NLRI prefix consists of an 8-octet Route Distinguisher followed by an IPv6 prefix, carried in MP_REACH_NLRI.
