document: rfc-8955
kind: interoperability-note
summary: The Port (Type 4), Destination Port (Type 5), and Source Port (Type 6) components never match when the packet's IP protocol is not 6 (TCP) or 17 (UDP), when the packet is a non-first fragment, or when the system cannot locate the transport header.
