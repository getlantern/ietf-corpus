document: rfc-2863
kind: registry
summary: The IANAifType textual convention, maintained by IANA in the separate IANAifType-MIB document, defines enumerated integer values for the ifType object. New ifType values are assigned by IANA without requiring re-issue of the IF-MIB, decoupling interface type registration from MIB versioning.
