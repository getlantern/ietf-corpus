document: rfc-9196
kind: security-consideration
summary: Capability information may allow an attacker to determine how long unauthorized configuration changes might remain undetected (e.g., from minimum update periods) and which communication channels to disrupt to extend the non-detection window. Documents augmenting this module are encouraged to document security considerations of their new YANG nodes per BCP 216.
section: "6"
topics:
