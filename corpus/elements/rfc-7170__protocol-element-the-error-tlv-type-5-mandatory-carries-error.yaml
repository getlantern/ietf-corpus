document: rfc-7170
kind: protocol-element
summary: 'The Error TLV (type 5, mandatory) carries error codes: 1–999 are informative, 1000–1999 are warnings, and 2000–2999 are fatal. Fatal Error TLVs MUST accompany a failure Result TLV. Error code 1031 (User account credentials incorrect) usage is NOT RECOMMENDED as it enables username enumeration by attackers.'
section: 4.2.6
topics:
    - security
