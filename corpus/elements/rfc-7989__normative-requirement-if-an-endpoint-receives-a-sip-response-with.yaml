document: rfc-7989
kind: normative-requirement
summary: If an endpoint receives a SIP response with a non-nil 'local-uuid' that is not 32 octets long, the response comes from a misbehaving implementation and its Session-ID header field MUST be discarded; however, the response itself SHOULD still be checked for SIP validity.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
