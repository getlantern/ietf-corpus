document: rfc-4607
kind: normative-requirement
summary: A host that supports the SSM service model MUST implement the host portion of IGMPv3 (RFC 3376) for IPv4 and MLDv2 (RFC 3810) for IPv6, and MUST conform to the IGMPv3/MLDv2 behavior described in RFC 4604.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
