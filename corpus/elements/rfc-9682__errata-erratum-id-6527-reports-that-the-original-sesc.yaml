document: rfc-9682
kind: errata
summary: Erratum ID 6527 reports that the original SESC rule in RFC 8610 was too permissive (allowing nearly any non-C0 character after a backslash) and critically omitted the \uXXXX and \uHHHH\uLLLL hex escape forms that CDDL imports from JSON per Section 3.1 item 6 of RFC 8610.
section: 2.1.1
topics:
