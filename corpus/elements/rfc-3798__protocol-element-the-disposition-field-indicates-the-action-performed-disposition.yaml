document: rfc-3798
kind: protocol-element
summary: 'The Disposition field indicates the action performed: disposition-mode (action-mode "/" sending-mode) ";" disposition-type ["/" disposition-modifier]. Action-mode is "manual-action" or "automatic-action"; sending-mode is "MDN-sent-manually" or "MDN-sent-automatically"; disposition-type is "displayed" or "deleted".'
section: 3.2.6
topics:
