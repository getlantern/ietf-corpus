document: rfc-4932
kind: protocol-element
summary: 'Host object status values are: clientDeleteProhibited, clientUpdateProhibited, linked, ok, pendingCreate, pendingDelete, pendingTransfer, pendingUpdate, serverDeleteProhibited, serverUpdateProhibited. Values prefixed ''client'' are set by clients; values prefixed ''server'' are set by servers; ''linked'' and ''ok'' are server-managed.'
