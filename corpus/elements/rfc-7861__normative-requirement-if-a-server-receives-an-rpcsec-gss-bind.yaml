document: rfc-7861
kind: normative-requirement
summary: If a server receives an RPCSEC_GSS_BIND_CHANNEL operation on an RPCSEC_GSSv3 handle, it MUST return a reply status of MSG_ACCEPTED with an accept_stat of PROC_UNAVAIL; the RPCSEC_GSS_BIND_CHANNEL operation is not supported on version 3 handles.
section: "2.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
