document: rfc-2511
kind: security-consideration
summary: The regToken value should be distributed out-of-band with security commensurate with the risk of the CA accepting an intercepted value. If an attacker can intercept and replay the regToken, they can impersonate the legitimate subscriber during PKI initialization.
section: "6.1"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
