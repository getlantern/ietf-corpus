document: rfc-4036
kind: protocol-element
summary: 'docsSubMgtCpeControlActive (TruthValue) globally enables or disables CMTS-based subscriber management for a modem. When false, no subscriber management filtering is applied at the CMTS. Defaults to docsSubMgtCpeActiveDefault (default value: false) if not signaled at DOCSIS registration.'
