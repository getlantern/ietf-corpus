document: rfc-7247
kind: protocol-element
summary: An XMPP resourcepart (the portion of a JID after the slash, e.g., 'foo' in 'user@example.com/foo') corresponds semantically to a SIP Globally Routable User Agent URI (GRUU) 'gr' parameter. Both identify a particular device associated with an address of record; the 'gr' URI parameter value maps to the XMPP resourcepart. This mapping applies only to non-temporary GRUUs.
section: "6.3"
topics:
    - sip
    - realtime
