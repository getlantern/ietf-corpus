document: rfc-6580
kind: registry
summary: Creates the 'DDP Errors' IANA registry for Direct Data Placement protocol errors. The 16-bit error field uses a 4-bit Layer (always 0x1), 4-bit Error Type, and 8-bit Error Code. Allocation policy is Standards Action per RFC 5226.
