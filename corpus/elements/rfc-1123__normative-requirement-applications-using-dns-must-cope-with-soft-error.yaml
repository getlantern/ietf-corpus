document: rfc-1123
kind: normative-requirement
summary: Applications using DNS MUST cope with soft error conditions, MUST wait a reasonable interval between successive retries on soft error, and MUST allow for the possibility that network problems may deny DNS service for hours or even days.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
