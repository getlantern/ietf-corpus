summary: The interface identifier generation mechanisms provide uniqueness at the virtual-circuit level. Protection against duplicate addresses is achieved through IPv6 Stateless Autoconfiguration Duplicate Address Detection, applied repeatedly until the generated identifier and link-local address are unique on the VC.
