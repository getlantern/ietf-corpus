document: rfc-6276
kind: normative-requirement
summary: When selecting a home agent, a mobile router that requires DHCPv6PD service MUST identify a home agent that will provide the service, determined by initiating a DHCPv6 Solicit message exchange and checking for prefix delegation in the response.
section: "3.3"
rfc2119_level: MUST
topics:
