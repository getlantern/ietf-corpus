document: rfc-7603
kind: interoperability-note
summary: EMAN references the DMTF Power State Management Profile (DSP1027) and Power State Set for power-state control. The DMTF standard covers power-state control (sleep, hibernate, off) but does not include energy monitoring, which EMAN provides.
section: 4.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
