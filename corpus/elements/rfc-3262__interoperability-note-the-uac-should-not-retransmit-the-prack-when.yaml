document: rfc-3262
kind: interoperability-note
summary: The UAC SHOULD NOT retransmit the PRACK when it receives a retransmission of the provisional response being acknowledged, though doing so does not create a protocol error. Once a reliable provisional response is received, retransmissions of that response MUST be discarded.
section: "4"
topics:
    - sip
    - realtime
