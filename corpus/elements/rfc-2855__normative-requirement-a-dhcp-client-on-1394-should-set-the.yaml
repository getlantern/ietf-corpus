document: rfc-2855
kind: normative-requirement
summary: A DHCP client on 1394 SHOULD set the BROADCAST flag in DHCPDISCOVER and DHCPREQUEST messages (and set 'ciaddr' to zero) to ensure the server or relay agent broadcasts its reply, since 1394 ARP may not yet be possible.
section: "3"
rfc2119_level: SHOULD
