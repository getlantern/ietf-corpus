document: rfc-2806
kind: protocol-element
summary: The post-dial sequence (';postd=') encodes DTMF digits, pause ('p'), and wait-for-dial-tone ('w') characters to be sent in-band after call setup, used for voice-mail access codes and service control. It may contain dtmf-digit characters '*', '#', 'A'–'D' in addition to ordinary phonedigits.
section: 2.5.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
