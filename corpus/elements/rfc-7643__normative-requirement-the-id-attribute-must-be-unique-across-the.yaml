document: rfc-7643
kind: normative-requirement
summary: The 'id' attribute MUST be unique across the entire SCIM service provider's set of resources, MUST be a stable non-reassignable identifier, and MUST NOT be specified by the client. The string 'bulkId' is a reserved keyword and MUST NOT be used as an id value.
section: "3.1"
rfc2119_level: MUST
topics:
