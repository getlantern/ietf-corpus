document: rfc-8006
kind: protocol-element
summary: TimeWindowACL defines time-based access restrictions via an ordered array of TimeWindowRule objects, each pairing TimeWindow objects (UNIX epoch integer start/end) with allow/deny actions. Absent 'times' means allow-all; non-matching windows result in deny.
section: 4.2.3
topics:
