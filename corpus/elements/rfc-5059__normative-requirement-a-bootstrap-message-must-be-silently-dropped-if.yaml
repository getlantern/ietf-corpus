document: rfc-5059
kind: normative-requirement
summary: A Bootstrap message MUST be silently dropped if it did not arrive from a directly connected neighbor for which active Hello state exists, or if it was not sent to ALL-PIM-ROUTERS and is not a valid unicast BSM on startup, or if it arrived on an interface that is an admin-scope border for the first group address in the message.
section: 3.1.3
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
