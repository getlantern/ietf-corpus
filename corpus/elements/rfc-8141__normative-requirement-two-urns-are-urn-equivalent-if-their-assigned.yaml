document: rfc-8141
kind: normative-requirement
summary: 'Two URNs are URN-equivalent if their assigned-name portions are octet-by-octet equal after: (1) converting the scheme ''urn'' to lower case, (2) converting the NID to lower case, and (3) converting hex digits A-F in percent-encoded sequences within the NSS to upper case. The r-component, q-component, and f-component MUST be ignored for URN-equivalence.'
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
