document: rfc-2234
kind: design-rationale
summary: External encoding of terminal values is explicitly out of scope for ABNF. The same ABNF grammar may have multiple external encodings (7-bit ASCII, binary octet, 16-bit Unicode), enabling alternate encoding environments to use the same syntax.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
