document: rfc-1112
kind: protocol-element
summary: The maximum report delay D is 10 seconds. When a host receives a Query, it sets a random timer per group membership between 0 and D seconds; the Report is sent only when the timer expires, unless suppressed by hearing another Report first.
section: Appendix I
