document: rfc-9777
kind: normative-requirement
summary: The S flag (Suppress Router-Side Processing), when set to one, instructs receiving multicast routers to suppress normal timer updates upon receiving a Query. It does not suppress querier election or host-side Query processing.
section: 5.1.7
rfc2119_level: MUST
topics:
    - multicast
