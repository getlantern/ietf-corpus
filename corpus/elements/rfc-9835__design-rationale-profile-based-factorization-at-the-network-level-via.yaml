document: rfc-9835
kind: design-rationale
summary: Profile-based factorization at the network level (via 'ac-profile' and specific provisioning profiles) avoids redundant configuration across ACs. Values specified at the AC level take precedence over inherited profile values, enabling both reuse and selective overrides—consistent with the pattern established in RFC 9182 and RFC 9291.
section: "5.3"
topics:
    - yang
    - netconf
