document: rfc-8629
kind: normative-requirement
summary: The Direct Connection Action is only valid on a per-destination basis and MUST NOT be sent in a Session Update Message; it indicates the modem SHOULD attempt to establish a direct connection with the identified destination.
section: 3.2.3
rfc2119_level: MUST NOT
