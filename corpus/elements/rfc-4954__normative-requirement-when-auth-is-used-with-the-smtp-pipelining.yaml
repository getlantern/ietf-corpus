document: rfc-4954
kind: normative-requirement
summary: When AUTH is used with the SMTP PIPELINING extension, it MUST be the last command in a pipelined group, except when the initial response is for a mechanism that allows the client to send data first, completes in one round-trip, and no security layer is negotiated.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
