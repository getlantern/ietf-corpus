document: rfc-8912
kind: normative-requirement
summary: 'For DNS and UDP Poisson metrics, Poisson Method 3 SHALL be used: given a start time, all subsequent send times are pre-computed from a pseudorandom distribution of inter-packet send times (truncating at Trunc), and the Src sends each packet at the computed times.'
section: 6.3.2
rfc2119_level: SHOULD
topics:
