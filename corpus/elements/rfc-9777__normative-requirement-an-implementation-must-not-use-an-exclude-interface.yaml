document: rfc-9777
kind: normative-requirement
summary: An implementation MUST NOT use an EXCLUDE interface record for a multicast address if all sockets for that address are in INCLUDE state. If system resource limits are reached when computing per-interface source-lists, an error MUST be returned to the requesting application.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
