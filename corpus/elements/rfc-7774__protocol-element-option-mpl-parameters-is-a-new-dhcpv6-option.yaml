document: rfc-7774
kind: protocol-element
summary: OPTION_MPL_PARAMETERS is a new DHCPv6 option (code 104) that distributes MPL parameter sets to MPL Forwarders. It can configure a specific MPL Domain (option_len=32) or serve as a wildcard default for all MPL Domains (option_len=16) within a DHCP-managed network.
section: "2.1"
topics:
    - routing
    - registry
