document: rfc-2022
kind: normative-requirement
summary: Each outgoing multicast VC MUST have a configurable inactivity timer; when it expires an L_RELEASE is issued and the group no longer has an active path. The timer SHOULD be no less than 1 minute, with a RECOMMENDED default of 20 minutes.
section: 5.1.3
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
