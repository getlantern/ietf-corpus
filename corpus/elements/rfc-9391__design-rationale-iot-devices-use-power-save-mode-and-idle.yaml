document: rfc-9391
kind: design-rationale
summary: IoT devices use Power Save Mode and Idle Mode DRX (battery life up to 10 years), so the Inactivity Timer and Retransmission Timer for SCHC should be set based on 3GPP radio timer values defined in TS 24.008, ranging from N to 3N hours.
