document: rfc-6223
kind: normative-requirement
summary: When a SIP entity sends STUN keep-alives and does not receive a STUN response (per RFC 5389 Section 7.2.1), it MUST stop sending keep-alives for the remaining dialog duration, or until keep-alives are re-negotiated for the registration.
section: "10"
rfc2119_level: MUST
topics:
    - sip
    - nat
    - security
