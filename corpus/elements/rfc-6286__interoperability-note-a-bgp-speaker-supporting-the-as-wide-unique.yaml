document: rfc-6286
kind: interoperability-note
summary: A BGP speaker supporting the AS-wide Unique BGP Identifier cannot share a BGP Identifier with an external neighbor until the remote BGP speaker is upgraded with software that supports these revisions. No backward compatibility issues are introduced with current usage.
