document: rfc-5779
kind: normative-requirement
summary: The entity responsible for MN address management (LMA or HAAA) MUST be pre-agreed on a per-deployment basis. When the LMA delegates MN-HNP or IPv4-MN-HoA assignment to the HAAA, the respective AVP MUST be set to all-zeroes address in the Diameter request.
section: 4.2.3
rfc2119_level: MUST
topics:
    - diameter
    - mobility
