document: rfc-4356
kind: normative-requirement
summary: If there are any non-7-bit characters in the local part of an address, the message MUST be rejected. Non-7-bit characters in an address domain MUST be encoded with IDNA; non-7-bit characters elsewhere in a header MUST be encoded per RFC 2047 (Hdr-Enc).
section: 2.1.3.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
