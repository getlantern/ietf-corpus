document: rfc-4201
kind: normative-requirement
summary: When Interface Identification TLVs are used to identify errored components, any received TLVs SHOULD be copied into the IF_ID ERROR_SPEC object (RSVP) or IF_ID Status TLV (CR-LDP). The Error Node Address / HOP Address SHOULD indicate the TE Link associated with the error.
section: 2.3.2
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
