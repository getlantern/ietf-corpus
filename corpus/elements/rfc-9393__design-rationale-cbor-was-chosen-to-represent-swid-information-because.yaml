document: rfc-9393
kind: design-rationale
summary: CBOR was chosen to represent SWID information because it significantly reduces data size compared to XML — the CBOR scaffolding takes up 10 percent or less of the XML equivalent, resulting in 50–85 percent overall size reduction, making CoSWID suitable for constrained devices and networks.
