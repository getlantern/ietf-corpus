document: rfc-6562
kind: normative-requirement
summary: When padded packet sizes vary over time, padding SHOULD NOT be reduced without waiting for a random hold time. The RECOMMENDED hold time uses the same exponentially distributed duration as the VAD overhang (half-life of a few hundred milliseconds).
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - security
    - rtp
