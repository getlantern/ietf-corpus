document: rfc-6904
kind: normative-requirement
summary: A receiver SHOULD decrypt header extensions only after validating the packet's authentication tag and MUST NOT take any security- or correctness-affecting actions based on decrypted header content prior to authentication tag validation.
section: "3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - security
