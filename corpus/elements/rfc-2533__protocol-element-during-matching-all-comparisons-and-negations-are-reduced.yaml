document: rfc-2533
kind: protocol-element
summary: 'During matching, all comparisons and negations are reduced to four relational operators: LE (''<=''), GE (''>=''), NL (strict less-than, i.e., NOT GE), and NG (strict greater-than, i.e., NOT LE). The original ''='', ''<='', ''>='' and their negations are translated into combinations of these four primitives.'
section: "5.5"
