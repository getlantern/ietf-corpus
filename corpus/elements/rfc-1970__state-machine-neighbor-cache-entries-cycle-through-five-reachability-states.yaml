document: rfc-1970
kind: state-machine
summary: 'Neighbor Cache entries cycle through five reachability states: INCOMPLETE (address resolution in progress), REACHABLE (confirmed reachable within ReachableTime), STALE (no longer confirmed reachable; no probe sent until traffic is sent), DELAY (traffic sent recently; waiting for upper-layer confirmation before probing), PROBE (unicast NS probes being sent to verify reachability).'
section: 7.3.2
topics:
    - ip
