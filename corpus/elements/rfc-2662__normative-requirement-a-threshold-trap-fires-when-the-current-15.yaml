document: rfc-2662
kind: normative-requirement
summary: A threshold trap fires when the current 15-minute interval error counter becomes equal to or exceeds the configured threshold value. At most one trap is sent per 15-minute interval per interface; setting the threshold to 0 disables the trap.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
