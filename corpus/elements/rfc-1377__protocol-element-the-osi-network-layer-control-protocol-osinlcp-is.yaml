document: rfc-1377
kind: protocol-element
summary: The OSI Network Layer Control Protocol (OSINLCP) is the PPP NCP responsible for configuring, enabling, and disabling OSI protocol modules on both ends of a point-to-point link. It uses the same packet exchange mechanism as LCP and is identified by Protocol field hex 8023.
