document: rfc-3813
kind: interoperability-note
summary: MPLS interfaces are represented in the IF-MIB ifTable with ifType=mpls(166). The MPLS interface is treated as a sub-layer; ifConnectorPresent is false(2), ifLinkUpDownTrapEnable defaults to disabled(2), and ifInUnknownProtos counts labeled packets discarded during header validation including those with unrecognized label values.
section: "8.1"
topics:
    - mpls
    - snmp
