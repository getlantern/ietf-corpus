document: rfc-2272
kind: interoperability-note
summary: The pduVersion element is passed from the Message Processing Model to both the Dispatcher and applications so they know whether to apply RFC1905 (SNMPv2) or SNMPv1 PDU semantics; the v3MP always sets pduVersion to SNMPv2-PDU for all decoded messages.
section: "3.2"
topics:
    - snmp
