document: rfc-7130
kind: protocol-element
summary: BFD control packets for each micro-BFD session are IP/UDP encapsulated per RFC 5881 but use a new UDP destination port 6784 instead of the standard BFD port. This port distinguishes BFD-over-LAG packets from BFD-over-single-hop-IP packets.
section: "2.2"
topics:
