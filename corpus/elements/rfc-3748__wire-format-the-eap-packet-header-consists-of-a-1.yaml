document: rfc-3748
kind: wire-format
summary: The EAP packet header consists of a 1-octet Code field, a 1-octet Identifier field, a 2-octet Length field (total packet length including Code, Identifier, Length, and Data), and a variable-length Data field. Octets outside the Length range MUST be ignored as Data Link Layer padding; a packet with Length larger than received octets MUST be silently discarded.
section: "4"
topics:
    - security
