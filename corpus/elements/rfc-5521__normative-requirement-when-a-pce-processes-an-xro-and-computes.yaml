document: rfc-5521
kind: normative-requirement
summary: When a PCE processes an XRO and computes a path, the returned path MUST NOT include any resources encoded with X-bit clear, and SHOULD NOT include any with X-bit set unless no alternate path satisfying other constraints is available.
section: 2.1.2
rfc2119_level: MUST NOT
topics:
