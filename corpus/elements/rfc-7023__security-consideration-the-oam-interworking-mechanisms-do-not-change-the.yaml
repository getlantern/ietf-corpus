document: rfc-7023
kind: security-consideration
summary: The OAM interworking mechanisms do not change the security functions inherent in the actual messages. Generic PW traffic security from RFC 3985, VCCV security from RFC 5085, and PWE3 control protocol security from RFC 4447 all apply. Since these mechanisms enable propagation of OAM messages and fault conditions between native service networks and PSNs, continuity of the end-to-end service depends on a trust relationship between the operators of these networks, as discussed in RFC 5254.
section: "7"
topics:
    - mpls
    - security
