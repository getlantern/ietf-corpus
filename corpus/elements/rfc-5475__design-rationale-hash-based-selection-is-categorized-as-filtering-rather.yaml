document: rfc-5475
kind: design-rationale
summary: Hash-based Selection is categorized as Filtering rather than Sampling because hashing is a deterministic operation on Packet Content. However, it can be used to emulate random Sampling and enables consistent selection of the same packets at multiple Observation Points, a property not achievable with true random Sampling.
