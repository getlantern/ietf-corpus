document: rfc-5630
kind: normative-requirement
summary: When a target refresh occurs within a dialog (re-INVITE, UPDATE), both the UAC and the UAS MUST include a Contact header field with a SIPS URI if the original request used a SIPS Request-URI.
section: 5.1.2
rfc2119_level: MUST
topics:
