summary: AES-GMAC with a 128-bit key was chosen as the SHOULD-level MAC replacement because it is a NIST-standardized authenticated encryption primitive providing strong integrity guarantees and broad hardware support, in contrast to the deprecated DES-MAC and Triple-DES-MAC.
