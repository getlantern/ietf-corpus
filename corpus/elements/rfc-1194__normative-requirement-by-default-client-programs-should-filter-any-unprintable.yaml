document: rfc-1194
kind: normative-requirement
summary: By default, client programs SHOULD filter any unprintable data from RUIP responses, retaining only USASCII characters and CRLF, to protect against VT100 escape code attacks and similar abuses. Two user options SHOULD be available to allow characters below ASCII 32 or above ASCII 126.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - security
