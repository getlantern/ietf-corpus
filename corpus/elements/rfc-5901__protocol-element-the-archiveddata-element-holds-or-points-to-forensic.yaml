document: rfc-5901
kind: protocol-element
summary: The ArchivedData element holds or points to forensic copies of phishing-related sites; the required type attribute classifies the archive as collectionsite, basecamp, sendersite, credentialInfo, or unspecified. Content may be a URL pointer or inline xs:base64Binary data.
section: "5.13"
topics:
    - security
