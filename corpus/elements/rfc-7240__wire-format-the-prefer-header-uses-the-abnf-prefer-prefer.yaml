summary: 'The Prefer header uses the ABNF: `Prefer = "Prefer" ":" 1#preference`, where `preference = token [ BWS "=" BWS word ] *( OWS ";" [ OWS parameter ] )` and `parameter = token [ BWS "=" BWS word ]`. Token and parameter names are case-insensitive; values are case-sensitive.'
