document: rfc-9107
kind: design-rationale
summary: Knowledge of the IGP topology for the area/level that includes each selected IGP location is needed to compute the shortest path tree. This knowledge can be gained via a link-state IGP (IS-IS or OSPF) or via BGP-LS (RFC 7752).
