document: rfc-5905
kind: interoperability-note
summary: When an NTPv4 server uses IPv6 and serves an NTPv3 client, the Reference ID field (containing the first four octets of the MD5 hash of the IPv6 address) appears as a random value to the NTPv3 client, which may prevent detection of timing loops.
section: "7.3"
topics:
    - ntp
