document: rfc-9863
kind: protocol-element
summary: Color capability is advertised by setting the C-bit (Bit 20) in the STATEFUL-PCE-CAPABILITY TLV during PCEP session Open message exchange. This flag signals that the PCEP speaker supports the color attribute defined in this document.
section: "3.1"
topics:
