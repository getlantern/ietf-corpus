document: rfc-6387
kind: protocol-element
summary: UPSTREAM_TSPEC object (class number 121, form 0bbbbbbb) is carried in Resv messages and describes the traffic flow originating at the egress (upstream sender). Its format and C-Types mirror those of the SENDER_TSPEC object (C-Num 12).
