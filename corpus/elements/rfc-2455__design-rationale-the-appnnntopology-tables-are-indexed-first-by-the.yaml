document: rfc-2455
kind: design-rationale
summary: The appnNnTopology tables are indexed first by the FRSN (flow-reduction sequence number) so that a management station can poll for incremental topology updates rather than fetching the entire database each time, since agents update the FRSN only on new or changed resources.
