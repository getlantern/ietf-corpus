kind: protocol-element
summary: 'EnvelopedData is an ASN.1 SEQUENCE containing version, optional originatorInfo, recipientInfos SET (at least one element required), encryptedContentInfo, and optional unprotectedAttrs. It supports four key management techniques: key transport, key agreement, previously distributed symmetric KEK, and password-based.'
