document: rfc-2533
kind: protocol-element
summary: Feature values are typed as Boolean (TRUE/FALSE, case-insensitive), numeric (decimal integer or rational 'n/m' with optional sign), token (letters/digits/hyphens), or quoted string. Numeric values may appear as rationals where multiple forms (e.g., 3/2, +15/10, 600/400) can represent the same value.
section: 4.2.4
