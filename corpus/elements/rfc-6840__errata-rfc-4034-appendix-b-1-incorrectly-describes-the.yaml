document: rfc-6840
kind: errata
summary: RFC 4034 Appendix B.1 incorrectly describes the Key Tag field for algorithm 1 as using the fourth-to-last and third-to-last octets of the public key modulus; the correct octets are the third-to-last and second-to-last.
section: "5.5"
topics:
    - dns
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
