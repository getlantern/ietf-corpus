document: rfc-2426
kind: security-consideration
summary: vCard objects have no inherent authentication or privacy. When spoofed vCard information is a concern, vCards SHOULD be transported using a security mechanism that provides authentication or privacy for MIME objects.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
