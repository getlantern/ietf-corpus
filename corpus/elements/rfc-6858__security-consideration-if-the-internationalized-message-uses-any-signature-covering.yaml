document: rfc-6858
kind: security-consideration
summary: If the internationalized message uses any signature covering header fields, the surrogate message's signature is almost certainly invalid because the header fields have been modified. Despite being invalid, signatures SHOULD NOT be removed from the surrogate message, to preserve as much information as possible. Full discussion is in RFC6857.
section: "5"
topics:
