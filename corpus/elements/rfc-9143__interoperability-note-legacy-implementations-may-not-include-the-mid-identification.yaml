document: rfc-9143
kind: interoperability-note
summary: Legacy implementations may not include the MID identification-tag in RTP/RTCP traffic and instead use payload type values to associate RTP streams with 'm=' sections. In this case each 'm=' section must use unique payload type values, and an SSRC mapped to an 'm=' section by payload type will not be remapped simply because the payload type changes.
section: "9.2"
topics:
    - realtime
    - rtp
