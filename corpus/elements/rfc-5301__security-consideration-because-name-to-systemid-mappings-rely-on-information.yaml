document: rfc-5301
kind: security-consideration
summary: Because name-to-systemID mappings rely on information provided by the routers themselves, a misconfigured or compromised router can inject false mapping information. This information should be treated with suspicion, especially when diagnosing suspected security incidents.
section: "5"
topics:
    - routing
    - security
