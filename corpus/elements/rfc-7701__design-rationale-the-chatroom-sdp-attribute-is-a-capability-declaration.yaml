document: rfc-7701
kind: design-rationale
summary: The 'chatroom' SDP attribute is a capability declaration, not an offer/answer negotiation parameter. An SDP answer may contain a 'chatroom' attribute even if the offer did not, and the answer need not be a subset of the offer's tokens, because it reflects local policy rather than a negotiated intersection.
section: "8"
topics:
