document: rfc-4704
kind: normative-requirement
summary: The server SHOULD NOT perform any DNS updates if the N bit is 1 in the Flags field of the Client FQDN option in REPLY messages. However, the server SHOULD delete any RRs that it previously added via DNS updates for the client.
section: "6.1"
rfc2119_level: SHOULD NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
