document: rfc-5789
kind: design-rationale
summary: The 204 No Content status code is used in successful PATCH responses when no message body is returned. The ETag response header should reflect the entity created by applying the PATCH, and Content-Location should match the Request-URI to indicate the PATCH response body is a resource representation.
section: "2.1"
topics:
    - http
