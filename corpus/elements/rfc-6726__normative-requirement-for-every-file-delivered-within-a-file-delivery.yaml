document: rfc-6726
kind: normative-requirement
summary: For every file delivered within a file delivery session, there MUST be a file description entry included in at least one FDT Instance sent within the session. Each entry MUST include at minimum the TOI-to-URI mapping.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
