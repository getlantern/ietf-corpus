document: rfc-1971
kind: normative-requirement
summary: If a link has no routers, a host MUST attempt stateful autoconfiguration to obtain addresses and other configuration information. The invocation of stateful autoconfiguration in this case MAY be disabled by implementation, but SHOULD be enabled by default.
section: 5.5.2
rfc2119_level: MUST
topics:
