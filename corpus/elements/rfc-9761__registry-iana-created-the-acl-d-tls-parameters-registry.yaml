kind: registry
summary: 'IANA created the ''ACL (D)TLS Parameters'' registry with Expert Review policy, initially populated with: extension-type (uint16), supported-group (uint16), signature-algorithm (uint16), psk-key-exchange-mode (uint8), application-protocol (string), cert-compression-algorithm (uint16), cipher-algorithm (uint16), tls-version (enumeration), dtls-version (enumeration). Updates to this registry trigger corresponding updates to the ''iana-tls-profile'' YANG module.'
