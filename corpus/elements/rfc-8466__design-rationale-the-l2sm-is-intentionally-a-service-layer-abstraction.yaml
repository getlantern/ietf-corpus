document: rfc-8466
kind: design-rationale
summary: The L2SM is intentionally a service-layer abstraction model, not a device configuration model. It serves as input to an orchestration layer that translates it into network element configurations; the actual configuration of network elements via CLI, NETCONF, or device-specific YANG models is explicitly out of scope.
