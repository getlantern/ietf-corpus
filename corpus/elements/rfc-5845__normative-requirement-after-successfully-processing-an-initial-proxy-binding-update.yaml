document: rfc-5845
kind: normative-requirement
summary: After successfully processing an initial Proxy Binding Update that includes a downlink GRE key, the LMA MUST include the GRE Key option with the uplink GRE key in the GRE Key Identifier field of the successful Proxy Binding Acknowledgement.
section: 3.3.1
rfc2119_level: MUST
