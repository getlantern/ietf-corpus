document: rfc-7442
kind: normative-requirement
summary: In Mechanism 2, whenever an LSR deletes (S,G) state that was created from an mLDP Label Map with the Transit IPv4/IPv6 Source TLV, the LSR MUST also withdraw any Source Active auto-discovery route that was advertised when the state was created.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
