document: rfc-4019
kind: wire-format
summary: The dynamic part of IR and IR-DYN packets for UDP-Lite adds a 2-octet Checksum Coverage field before the 2-octet Checksum field (octets 5–8), compared to the ROHC UDP dynamic part. The CRC-DYNAMIC covers both the Checksum Coverage and Checksum fields; CRC-STATIC covers the static fields (octets 1–4).
section: 5.2.1
topics:
    - udp
