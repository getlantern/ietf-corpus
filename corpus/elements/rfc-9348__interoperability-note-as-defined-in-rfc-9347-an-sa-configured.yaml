document: rfc-9348
kind: interoperability-note
summary: As defined in RFC 9347, an SA configured for IP-TFS supports only IP-TFS packets — mixed IPsec mode operation on the same SA is not permitted. This constraint is not enforced by the YANG model itself but must be observed by implementations applying this configuration.
section: "2"
topics:
    - ipsec
    - yang
