document: rfc-5195
kind: wire-format
summary: The BGP NLRI for L1VPN auto-discovery consists of a 1-octet Length field followed by a variable-length Auto-discovery info field encoding one or more <PPI, CPI> tuples. The encoding of the auto-discovery information itself is defined in the L1VPN Basic Mode specification.
