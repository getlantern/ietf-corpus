document: rfc-6522
kind: normative-requirement
summary: The first body part of multipart/report MUST be human-readable and provide an easily understood description of the condition(s) that caused the report, for readers whose user agents cannot interpret the second section. Any IANA-registered MIME media type, charset, or language MAY be used.
section: "3"
rfc2119_level: MAY
