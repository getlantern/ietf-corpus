document: rfc-7361
kind: wire-format
summary: The MAC Flush Parameters TLV (type 0x0406) is encoded with a 2-byte type field (U-bit and F-bit both set to 1 for forward-if-unknown), a 2-byte Length field, a mandatory 1-byte Flags field, and zero or more sub-TLVs. The U/F bits ensure intermediate devices unaware of the TLV propagate it transparently.
section: 5.1.1
topics:
    - mpls
    - registry
