document: rfc-7589
kind: normative-requirement
summary: Both peers MUST use X.509 certificate path validation (RFC 5280) to verify the integrity of the peer's certificate. If path validation fails and the certificate does not match a locally trusted copy, the connection MUST be terminated.
section: "5"
rfc2119_level: MUST
