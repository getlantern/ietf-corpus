document: rfc-5415
kind: wire-format
summary: 'The CAPWAP Header contains: HLEN (5 bits, header length in 4-byte words), RID (5 bits, Radio ID), WBID (5 bits, Wireless Binding ID), Flags (9 bits: Type, Fragment, Last Fragment, Native Frame indicator, Radio MAC present, Wireless Specific Info present, and Reserved), Fragment ID (16 bits), Fragment Offset (13 bits), and Reserved (3 bits), optionally followed by Radio MAC Address and Wireless Specific Information fields.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
