document: rfc-8798
kind: design-rationale
summary: The percent symbol '%' is not used as the secondary unit name for percent (1/100 of unity); instead '/100' is registered. The name '%' was already taken in RFC 8428 as a NOT RECOMMENDED synonym for '/' (unity) for legacy reasons, and using it with a different meaning would create confusion.
section: "3"
