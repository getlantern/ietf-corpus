document: rfc-9129
kind: security-consideration
summary: The ietf-ospf YANG module defines writable configuration nodes that, if modified by an unauthorized party, could disrupt OSPF routing. Implementations must enforce NETCONF/RESTCONF access control (e.g., NACM per RFC 8341) to restrict write access to OSPF configuration to authorized administrators only.
section: "4"
topics:
    - yang
    - security
    - routing
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
