document: rfc-7145
kind: interoperability-note
summary: For 'new' initiators (supporting late connection allocation) connecting to 'old' targets (not supporting iSERHelloRequired), the initiator SHOULD either allocate full connection resources before the final Login Request, or pre-allocate receive buffers for unexpected control-type PDUs, to prevent RCaP connection closure from buffer exhaustion before Full Feature Phase resources are ready.
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
