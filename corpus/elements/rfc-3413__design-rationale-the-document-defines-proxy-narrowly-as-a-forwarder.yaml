document: rfc-3413
kind: design-rationale
summary: 'The document defines ''proxy'' narrowly as a forwarder that forwards SNMP messages based solely on context information, irrespective of individual managed object types. This avoids historical confusion where ''proxy'' covered at least three distinct scenarios: cross-domain/version forwarding, non-SNMP protocol translation, and managed-object aggregation.'
section: "1.5"
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
