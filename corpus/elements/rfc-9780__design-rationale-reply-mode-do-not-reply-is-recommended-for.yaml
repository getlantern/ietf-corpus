document: rfc-9780
kind: design-rationale
summary: Reply Mode 'Do not reply' is recommended for LSP Ping bootstrap of MultipointTail because BFD over a multipoint network operates in Demand mode, meaning the MPLS echo reply from a tail conveys no useful information to the head (unlike BFD over P2P MPLS LSP).
section: "4.1"
topics:
