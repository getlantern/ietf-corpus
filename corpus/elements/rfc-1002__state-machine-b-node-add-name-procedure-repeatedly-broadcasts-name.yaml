document: rfc-1002
kind: state-machine
summary: 'B-node add-name procedure: repeatedly broadcasts NAME REGISTRATION REQUEST (up to BCAST_REQ_RETRY_TIMEOUT * retry count). If no response received, broadcasts NAME UPDATE REQUEST and adds name to local table (success). If a NEGATIVE NAME REGISTRATION RESPONSE is received with matching tid, returns failure.'
section: 5.1.1.1
