document: rfc-5177
kind: normative-requirement
summary: All Registration Requests and replies MUST be authenticated by the MN-HA Authentication Extension per RFC 3344. When in explicit mode, all Mobile Network Prefix extensions MUST be included before the MN-HA Authentication extension and MUST be included in the authenticator calculation.
section: "10"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - ip
