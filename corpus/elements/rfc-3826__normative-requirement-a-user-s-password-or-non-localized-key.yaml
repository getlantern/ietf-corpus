document: rfc-3826
kind: normative-requirement
summary: A user's password or non-localized key MUST NOT be stored on a managed device/node; instead, only the localized key SHALL be stored (if at all) to limit the blast radius of device compromise.
section: "1.3"
rfc2119_level: MUST NOT
topics:
