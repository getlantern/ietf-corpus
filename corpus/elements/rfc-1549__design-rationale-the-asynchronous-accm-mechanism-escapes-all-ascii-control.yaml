document: rfc-1549
kind: design-rationale
summary: The asynchronous ACCM mechanism escapes all ASCII control characters (octets less than 0x20, excluding DEL) to allow transparent communication through all known data communications equipment that may intercept or inject control characters such as XON/XOFF. The sending ACCM may be extended to 256 bits to cover additional octets, though this does not address 7-bit links.
section: "4"
extracted_by: claude-sonnet-4-6
