document: rfc-5644
kind: normative-requirement
summary: Duplication of routers in the routers digest MUST be identified before computation of statistics to avoid corrupted information; path instability (e.g., micro-loops during reconvergence) can cause a test packet to be observed more than once by the same router.
section: 5.4.2
rfc2119_level: MUST
topics:
    - measurement
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
