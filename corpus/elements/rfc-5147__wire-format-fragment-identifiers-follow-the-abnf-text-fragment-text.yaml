summary: 'Fragment identifiers follow the ABNF: text-fragment = text-scheme 0*('';'' integrity-check), where text-scheme is ''char='' or ''line='' followed by a position or range, and integrity-check is ''length='' number or ''md5='' 32HEXDIG, each optionally followed by '','' mime-charset. All scheme names are lowercase.'
