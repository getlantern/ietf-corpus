document: rfc-5046
kind: state-machine
summary: 'An iSCSI/iSER connection progresses through: (1) TCP/transport connection established; (2) iSCSI Login Phase in byte-stream mode with RDMAExtensions negotiation; (3) Allocate_Connection_Resources invoked; (4) Enable_Datamover triggers RCaP mode; (5) iSER Hello/HelloReply exchange; (6) Full Feature Phase in iSER-assisted mode. Termination reverses resource allocation and invalidates all STags.'
section: "5.1"
topics:
    - tcp
