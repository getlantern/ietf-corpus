summary: 'Result values for SMTP AUTH are: none (authentication not attempted), pass (client authenticated successfully), fail (authentication attempted but unsuccessful), temperror (transient error such as temporary LDAP lookup failure), permerror (permanent error such as permanent LDAP lookup failure).'
