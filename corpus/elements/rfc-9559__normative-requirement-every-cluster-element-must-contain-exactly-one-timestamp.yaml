document: rfc-9559
kind: normative-requirement
summary: Every Cluster element MUST contain exactly one Timestamp element, and that Timestamp MUST be stored once per Cluster. The Timestamp SHOULD be the first child of the Cluster it belongs to, or the second if that Cluster begins with a CRC-32 element.
section: 5.1.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
