document: rfc-4706
kind: protocol-element
summary: 'The Adsl2PowerMngState textual convention defines four power management states: L0 (full power), L1 (low power for G.992.2), L2 (low power for G.992.3/4/5), and L3 (idle). Autonomous transitions are controlled via the Adsl2LConfProfPmMode BITS field.'
section: 2.3.2
extracted_by: claude-sonnet-4-6
