document: rfc-8105
kind: security-consideration
summary: DECT ULE communications are secured at the link layer (DLC) using CCM mode (Counter with CBC-MAC) with AES-128 for per-message encryption and authentication. Session security keys are individual per FP-PP binding; no shared encryption key is used among PPs.
