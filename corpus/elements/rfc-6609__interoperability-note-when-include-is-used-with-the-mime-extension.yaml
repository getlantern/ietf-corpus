document: rfc-6609
kind: interoperability-note
summary: When 'include' is used with the MIME extension 'foreverypart' control structure, the included script MUST be presented with the current MIME part as though it were the entire message. A 'break' command in an included script cannot terminate a 'foreverypart' iteration in another script; 'return' should be used to transfer control back to the including script.
section: "3.5"
topics:
