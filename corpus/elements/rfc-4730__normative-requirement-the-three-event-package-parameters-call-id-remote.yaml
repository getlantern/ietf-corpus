document: rfc-4730
kind: normative-requirement
summary: The three Event Package parameters call-id, remote-tag, and local-tag MUST be present in the SUBSCRIBE Event header to identify the subscription dialog. The User Interface matches local-tag against the To tag, remote-tag against the From tag, and call-id against the Call-ID.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
