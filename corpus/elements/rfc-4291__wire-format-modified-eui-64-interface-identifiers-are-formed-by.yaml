document: rfc-4291
kind: wire-format
summary: Modified EUI-64 interface identifiers are formed by inverting the 'u' (universal/local) bit of an IEEE EUI-64 identifier. In the result, 'u'=1 indicates universal scope and 'u'=0 indicates local scope.
