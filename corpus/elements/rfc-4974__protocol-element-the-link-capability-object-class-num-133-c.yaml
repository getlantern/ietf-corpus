document: rfc-4974
kind: protocol-element
summary: 'The LINK_CAPABILITY object (Class-Num=133, C-Type=1) is introduced to carry link-local capability information during Call setup. It contains subobjects: Types 1/2/4 for link identification (IPv4, IPv6, unnumbered), Type 64 for Maximum Reservable Bandwidth, and Type 65 for interface switching capability descriptor.'
section: "5.3"
topics:
