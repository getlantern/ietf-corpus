document: rfc-1531
kind: normative-requirement
summary: Vendors defining 'vendor specific information' options MUST document them in the form of the DHCP Options document, MUST use defined or well-defined data types, and MUST choose options that can be encoded in configuration files for exchange with other vendors' servers.
