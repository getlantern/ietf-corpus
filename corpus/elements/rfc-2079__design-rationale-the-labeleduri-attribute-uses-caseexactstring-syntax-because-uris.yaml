document: rfc-2079
kind: design-rationale
summary: The labeledURI attribute uses caseExactString syntax because URIs are case-sensitive. The space character serves as an unambiguous delimiter between the URI and the label because space characters are not allowed to appear un-encoded in URIs.
section: Discussion of the labeledURI Attribute Type
