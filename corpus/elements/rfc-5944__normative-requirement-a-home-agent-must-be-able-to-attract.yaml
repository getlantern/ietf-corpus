document: rfc-5944
kind: normative-requirement
summary: A home agent MUST be able to attract and intercept datagrams destined to the home address of any of its registered mobile nodes. A mobile node and a current foreign agent MUST be able to exchange datagrams without relying on standard IP routing mechanisms.
section: "1.7"
rfc2119_level: MUST
topics:
    - mobility
    - ip
