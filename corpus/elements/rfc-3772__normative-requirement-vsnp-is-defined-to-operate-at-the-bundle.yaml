document: rfc-3772
kind: normative-requirement
summary: VSNP is defined to operate at the bundle level when Multilink PPP is in use, above any Compression and Encryption Protocols. VSP operates at the per-link level, MUST NOT be subjected to data compression, and MUST be encrypted if per-link encryption is in use.
section: "7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
