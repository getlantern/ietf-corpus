document: rfc-7136
kind: design-rationale
summary: New methods of IID formation (temporary addresses RFC 4941, CGAs RFC 3972, HBAs RFC 5535, ISATAP RFC 5214, NAT64 RFC 6052, stable privacy addresses) each independently specified different values for the 'u' and 'g' bits with no consistent semantics, confirming these bits carry no generic meaning in an IID.
