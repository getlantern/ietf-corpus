document: rfc-6040
kind: normative-requirement
summary: A decapsulating tunnel egress compliant with this specification MUST agree to any mode request from an ingress (RFC 6040, RFC 4301, RFC 3168 full or limited functionality), since its single decapsulation behaviour is compatible with all of them. If no ECN-related mode is requested, the egress MUST continue without error.
section: "4.4"
rfc2119_level: MUST
topics:
    - ecn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
