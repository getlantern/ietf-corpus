document: rfc-5733
kind: wire-format
summary: The <contact:transfer> command MUST carry an 'op' attribute identifying the transfer operation (query, request, approve, reject, or cancel as defined in RFC 5730), a <contact:id> element, and a <contact:authInfo> element containing the authorization credential.
section: 3.2.4
