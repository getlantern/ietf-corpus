document: rfc-6397
kind: security-consideration
summary: Geo-location data supplied by a BGP peer can only be taken at face value; a BGP peer may supply coordinates that are purposefully misleading or inaccurate. It is up to the BGP collector whether to include this information or use its own methods to validate it.
section: "9"
topics:
    - bgp
    - security
    - measurement
