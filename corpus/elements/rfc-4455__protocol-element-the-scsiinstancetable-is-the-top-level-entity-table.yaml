document: rfc-4455
kind: protocol-element
summary: The scsiInstanceTable is the top-level entity table, representing distinct SCSI instances within a managed system. Each row includes an alias (SnmpAdminString up to 79 chars), a link to hrSWInstalledTable (scsiInstSoftwareIndex), vendor version string, notification enable flag, and a StorageType that governs persistence for all associated sub-tables.
