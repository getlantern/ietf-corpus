document: rfc-5426
kind: interoperability-note
summary: RFC 5424 requires all syslog protocol implementers to support this UDP transport mapping for interoperability. The syslog TLS transport (RFC 5425) is REQUIRED to implement and RECOMMENDED for general use; UDP is a conditionally acceptable alternative only in managed networks.
section: "1"
topics:
