document: rfc-7231
kind: security-consideration
summary: URIs, the Referer header, and request logs can expose sensitive information including personal data, session tokens, and credentials. HTTP does not define a confidentiality mechanism for URI components, so sensitive data should not appear in request URIs.
section: "9.4"
topics:
    - http
    - security
    - privacy
