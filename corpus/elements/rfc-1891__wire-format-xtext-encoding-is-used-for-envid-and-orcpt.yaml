document: rfc-1891
kind: wire-format
summary: xtext encoding is used for ENVID and ORCPT parameter values to allow arbitrary octets within esmtp-values. ASCII characters between '!' (33) and '~' (126), except '+' and '=', may appear as-is; all other octets MUST be encoded as '+' followed by two uppercase hexadecimal digits.
