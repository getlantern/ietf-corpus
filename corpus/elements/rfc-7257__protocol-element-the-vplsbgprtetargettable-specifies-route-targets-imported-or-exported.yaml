document: rfc-7257
kind: protocol-element
summary: The vplsBgpRteTargetTable specifies Route Targets imported or exported by BGP during VPLS auto-discovery. Each entry has vplsBgpRteTargetRTType (import/export/both) and vplsBgpRteTargetRT (OCTET STRING 0..256), supporting hierarchical VPLS via multiple Route Targets per service.
section: "6.1"
topics:
    - snmp
    - routing
    - bgp
