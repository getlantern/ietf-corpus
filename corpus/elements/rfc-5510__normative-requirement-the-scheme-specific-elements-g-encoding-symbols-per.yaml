document: rfc-5510
kind: normative-requirement
summary: The Scheme-Specific elements G (encoding symbols per group) and m (finite field element length in bits) MUST be defined for FEC Encoding ID 2. When G is not communicated to the decoder, it MUST assume G=1; when m is not communicated, the decoder MUST assume m=8.
section: 4.2.3
rfc2119_level: MUST
topics:
    - multicast
