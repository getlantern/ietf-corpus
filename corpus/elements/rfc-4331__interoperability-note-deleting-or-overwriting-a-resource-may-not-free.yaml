document: rfc-4331
kind: interoperability-note
summary: Deleting or overwriting a resource may not free the same amount of storage as indicated by DAV:getcontentlength, for example if the server moves files to a trash folder, retains old versions (as in versioning systems per RFC 3253), or uses reference counting.
section: "7"
topics:
