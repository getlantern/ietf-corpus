document: rfc-5651
kind: protocol-element
summary: The Close Session flag (A) and Close Object flag (B) are 1-bit fields. The sender MAY set A=1 when session termination is imminent and SHOULD set it in all subsequent packets once set. Similarly B=1 signals imminent end of transmission for the object identified by the TOI field.
section: "5.1"
topics:
    - multicast
