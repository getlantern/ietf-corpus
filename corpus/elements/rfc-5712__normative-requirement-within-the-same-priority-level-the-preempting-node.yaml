document: rfc-5712
kind: normative-requirement
summary: Within the same priority level, the preempting node SHOULD first attempt to preempt TE LSPs with the 'Soft Preemption Desired' bit of the SESSION-ATTRIBUTE object cleared (i.e., Hard Preemptable LSPs) before soft-preempting others.
section: "6.1"
rfc2119_level: SHOULD
