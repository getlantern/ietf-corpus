document: rfc-2249
kind: protocol-element
summary: mtaLoopsDetected (per-MTA) and mtaGroupLoopsDetected (per-group) are Counter32 objects counting detected message loops since initialization or group creation. The MIB explicitly notes that loop detection mechanisms, granularity, and handling vary across MTA implementations and cannot be inferred from these counters.
