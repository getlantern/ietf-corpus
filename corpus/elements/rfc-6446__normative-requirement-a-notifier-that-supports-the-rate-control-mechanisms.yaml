document: rfc-6446
kind: normative-requirement
summary: A notifier that supports the rate control mechanisms MUST adjust its rate of notification according to the rate control values agreed with the subscriber, and MUST reflect back the possibly adjusted rate control values in the corresponding Subscription-State header field parameter of subsequent NOTIFY requests.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
