document: rfc-7261
kind: security-consideration
summary: For deployments using Voice Activity Detection (Annex A or Annex B) with SRTP, implementations MUST follow the guidelines in RFC 6562 ('Guidelines for the Use of Variable Bit Rate Audio with Secure RTP') to avoid leaking information through varying packet sizes.
