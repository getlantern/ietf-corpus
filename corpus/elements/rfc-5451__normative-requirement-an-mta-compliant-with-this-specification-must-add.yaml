document: rfc-5451
kind: normative-requirement
summary: An MTA compliant with this specification MUST add the Authentication-Results header field after performing one or more message authentication tests. If more than one test is applied, it MUST add the header field either once per test or once indicating all results. An MTA MUST NOT add a result to an existing header field.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
