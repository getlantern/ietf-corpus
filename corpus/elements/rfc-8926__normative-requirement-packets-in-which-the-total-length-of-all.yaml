document: rfc-8926
kind: normative-requirement
summary: Packets in which the total length of all options is not equal to the Opt Len value in the base header are invalid and MUST be silently dropped if received by a tunnel endpoint that processes options. If Opt Len exceeds the endpoint's processing capability, the endpoint MUST drop such packets.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
