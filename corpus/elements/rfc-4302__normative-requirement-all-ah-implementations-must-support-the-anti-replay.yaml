document: rfc-4302
kind: normative-requirement
summary: All AH implementations MUST support the anti-replay service using a sliding receive window. The receiver MUST verify that each packet's Sequence Number does not duplicate any previously received on the SA. Duplicate checking SHOULD be the first AH check after SA matching.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
