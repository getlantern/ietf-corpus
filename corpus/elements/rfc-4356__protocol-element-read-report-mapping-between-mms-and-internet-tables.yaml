document: rfc-4356
kind: protocol-element
summary: 'Read report mapping between MMS and Internet (Tables 6 and 7): MMS ''X-Mms-Read-Status: read'' maps to MDN disposition-type ''displayed''; MMS ''Deleted without being read'' maps to ''deleted''. Reverse: MDN ''displayed'' maps to X-Mms-Read-Status ''read''; ''deleted''/''denied''/''failed'' with automatic-action maps to ''Deleted without being read''.'
