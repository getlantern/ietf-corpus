document: rfc-1907
kind: interoperability-note
summary: A large set of SNMPv1 SNMP group objects defined in RFC 1213—including snmpOutPkts, snmpInTooBigs, snmpInNoSuchNames, snmpInBadValues, and many others—are declared STATUS obsolete in this MIB and collected in snmpObsoleteGroup (snmpMIBGroups 10). Implementations SHOULD NOT implement these objects.
section: 2.6.3
topics:
    - snmp
