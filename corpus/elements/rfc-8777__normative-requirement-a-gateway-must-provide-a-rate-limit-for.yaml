document: rfc-8777
kind: normative-requirement
summary: A gateway MUST provide a rate limit for DNS queries; by default settings SHOULD NOT permit more than 10 queries per 100-millisecond period (though this MAY be overridable by administrative configuration).
section: 3.2.2
rfc2119_level: MUST
topics:
