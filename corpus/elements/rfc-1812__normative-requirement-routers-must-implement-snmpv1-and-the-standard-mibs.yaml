document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement SNMPv1 and the standard MIBs (MIB-II) for network management. Routers SHOULD implement all standard MIB variables relevant to their configuration and SHOULD provide vendor-specific MIBs for additional management information.
section: "8.1"
rfc2119_level: MUST
topics:
    - snmp
