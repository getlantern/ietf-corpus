document: rfc-3119
kind: design-rationale
summary: An interleave cycle pattern such as 1,3,5,7,0,2,4,6 (cycle size 8) has the property that any loss of up to four consecutive ADUs in the interleaved stream produces a deinterleaved stream with no gaps greater than one, maximizing audio continuity under burst loss.
