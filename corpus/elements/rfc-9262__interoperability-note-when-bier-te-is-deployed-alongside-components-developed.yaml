document: rfc-9262
kind: interoperability-note
summary: When BIER-TE is deployed alongside components developed for BIER (such as multicast flow overlays) that use BFR-ids, BIER-TE deployments MUST assign BFR-ids to BFRs and insert them into the BFIR-id field of BIER packet headers, mirroring BIER behavior.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
