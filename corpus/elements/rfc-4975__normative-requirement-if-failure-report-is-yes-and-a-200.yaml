document: rfc-4975
kind: normative-requirement
summary: If Failure-Report is 'yes' and a 200 response is not received within 30 seconds of sending the last byte of the transaction, the element MUST inform the user that the request probably failed.
section: 7.1.1
rfc2119_level: MUST
