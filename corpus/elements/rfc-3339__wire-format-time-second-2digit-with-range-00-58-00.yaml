document: rfc-3339
kind: wire-format
summary: time-second = 2DIGIT with range 00-58, 00-59, or 00-60 depending on leap second rules. The value "60" is permitted only at the end of months in which a leap second occurs (historically June or December); a subtracted leap second makes the maximum "58".
