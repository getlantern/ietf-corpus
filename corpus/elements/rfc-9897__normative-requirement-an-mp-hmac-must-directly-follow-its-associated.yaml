document: rfc-9897
kind: normative-requirement
summary: An MP_HMAC MUST directly follow its associated Multipath Option so that the receiver can correctly associate HMAC validation with the corresponding suboption (MP_JOIN, MP_ADDADDR, or MP_REMOVEADDR). If the HMAC validation fails for MP_JOIN, the subflow MUST be closed; for MP_ADDADDR or MP_REMOVEADDR, the receiving host MUST silently ignore the option.
section: 3.2.6
rfc2119_level: MUST
topics:
    - multipath
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
