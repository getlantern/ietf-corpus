document: rfc-5482
kind: interoperability-note
summary: Stateful firewalls that time out connection state based on inactivity may close connections regardless of UTO advertisements. Future firewalls might parse UTO options in unencrypted segments and adapt their state management accordingly.
section: "4.1"
