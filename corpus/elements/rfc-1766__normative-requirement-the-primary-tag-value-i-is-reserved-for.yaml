document: rfc-1766
kind: normative-requirement
summary: The primary tag value 'i' is reserved for IANA-defined registrations; the value 'x' is reserved for private use, and subtags of 'x' will not be registered by IANA. All other primary tag values outside 2-letter ISO 639 codes cannot be assigned except by updating this standard.
section: "2"
rfc2119_level: MUST NOT
