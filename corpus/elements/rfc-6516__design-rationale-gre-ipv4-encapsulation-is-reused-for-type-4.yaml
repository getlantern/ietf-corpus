document: rfc-6516
kind: design-rationale
summary: GRE/IPv4 encapsulation is reused for Type 4 S-PMSI Joins carrying IPv6 customer flows, consistent with the encapsulation already defined in RFC 6513 Section 12 for Type 1 (IPv4) flows. This avoids defining a new tunnel type and keeps the P-tunnel mechanism uniform regardless of customer address family.
section: "3"
topics:
