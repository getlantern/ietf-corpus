document: rfc-1582
kind: normative-requirement
summary: 'To guarantee delivery of routing updates on the WAN, an acknowledgement and retransmission scheme MUST be used: the sender retransmits the update until a triggered acknowledgement is received, and if the routing database changes before an ACK arrives, a new update with an updated sequence number is sent.'
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
