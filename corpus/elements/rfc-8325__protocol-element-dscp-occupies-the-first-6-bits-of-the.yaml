document: rfc-8325
kind: protocol-element
summary: DSCP occupies the first 6 bits of the IPv4 TOS field and the IPv6 Traffic Class field; the remaining 2 bits carry ECN (RFC 3168). The common 'default' practice derives 802.11 UP by using the 3 most significant bits of the DSCP, and reverses it upstream by left-shifting UP by 3 bits.
section: "2.3"
topics:
    - diffserv
    - ip
    - qos
