document: rfc-6536
kind: normative-requirement
summary: Access to the <delete-config> protocol operation is denied by default; the exec-default leaf does not apply to it, and explicit access control rules must be configured to allow invocation by non-recovery sessions.
section: 3.2.5
rfc2119_level: MUST
topics:
