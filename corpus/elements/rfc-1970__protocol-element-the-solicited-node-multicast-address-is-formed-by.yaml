document: rfc-1970
kind: protocol-element
summary: The solicited-node multicast address is formed by appending the low-order 32 bits of a target's IP address to the 96-bit prefix FF02::1:0:0/96, yielding an address in FF02::1:0:0 to FF02::1:FFFF:FFFF. Addresses differing only in high-order bits map to the same solicited-node address.
section: "2.3"
topics:
    - ip
    - multicast
