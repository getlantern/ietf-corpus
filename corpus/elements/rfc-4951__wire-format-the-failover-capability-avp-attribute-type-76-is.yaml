document: rfc-4951
kind: wire-format
summary: The Failover Capability AVP (Attribute Type 76) is a 12-byte AVP containing a Vendor ID field (0), two flag bits (C for control channel recovery, D for data channel Nr-reset capability), and a 32-bit Recovery Time field in milliseconds. The M-bit MUST be 0; the H-bit MAY be set.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
