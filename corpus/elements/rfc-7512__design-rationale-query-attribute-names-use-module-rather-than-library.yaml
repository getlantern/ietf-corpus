document: rfc-7512
kind: design-rationale
summary: Query attribute names use 'module' rather than 'library' to avoid confusion with the semantically different 'library-*' path attributes that identify specific Cryptoki libraries. The path 'library-*' attributes identify an API producer; the query 'module-*' attributes modify provider lookup behavior.
section: "2.4"
topics:
