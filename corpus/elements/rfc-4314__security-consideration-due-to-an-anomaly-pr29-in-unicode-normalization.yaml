document: rfc-4314
kind: security-consideration
summary: Due to an anomaly (PR29) in Unicode normalization, canonical equivalence is not guaranteed for a select few character sequences when using SASLprep. An ACL server MAY reject identifiers containing these sequences by sending a BAD response.
