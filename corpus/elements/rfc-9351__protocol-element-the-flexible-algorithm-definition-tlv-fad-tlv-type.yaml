document: rfc-9351
kind: protocol-element
summary: The Flexible Algorithm Definition TLV (FAD TLV, Type 1039) is a new optional BGP-LS Attribute TLV associated with the Node NLRI. It carries the Flexible Algorithm number (128–255), Metric-Type, Calc-Type, Priority, and zero or more sub-TLVs defining the algorithm's computation constraints.
