document: rfc-5798
kind: normative-requirement
summary: 'On packet reception, the receiver MUST verify: TTL/Hop Limit = 255, VRRP version = 3, packet completeness, VRRP checksum, and that the VRID is configured on the interface. Any check failure MUST cause the packet to be discarded.'
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
