document: rfc-8342
kind: design-rationale
summary: <operational> incorporates 'config true' nodes (unlike the original NETCONF model which only had 'config false' nodes) to expose all operational settings without requiring replication of definitions in data models. This allows a single unified view of both configuration and state.
