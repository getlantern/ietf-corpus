document: rfc-7341
kind: normative-requirement
summary: If the DHCP 4o6 Server Address option is empty, the client MUST send requests to the All_DHCP_Relay_Agents_and_Servers multicast address. If it contains addresses, the client SHOULD send to each unique address in the option.
section: "9"
rfc2119_level: MUST
topics:
