document: rfc-6015
kind: security-consideration
summary: If source packets are encrypted after FEC protection is applied, repair packets must receive equal levels of confidentiality, integrity, and authentication. Failure to do so compromises source packet security because FEC repair is generated by XOR-ing across source packets.
section: "9"
topics:
    - rtp
    - realtime
    - security
    - crypto
