document: rfc-8560
kind: normative-requirement
summary: An EVPN PE MUST set up the label stack for the MP2P VPN unicast FEC to any remote PE that has advertised an EVPN IMET route. This establishes the EVPN forwarding path between EVPN-capable PEs.
section: "3.2"
rfc2119_level: MUST
topics:
