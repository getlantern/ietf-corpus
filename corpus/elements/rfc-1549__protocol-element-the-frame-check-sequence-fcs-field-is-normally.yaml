document: rfc-1549
kind: protocol-element
summary: The Frame Check Sequence (FCS) field is normally 16 bits (two octets), transmitted most-significant coefficient first. It is calculated over the Address, Control, Protocol, Information, and Padding fields, excluding Flag Sequences, FCS itself, start/stop bits, and any transparency-inserted octets or bits.
section: "3.1"
extracted_by: claude-sonnet-4-6
