document: rfc-5538
kind: security-consideration
summary: Articles on NNTP servers expire over time, and the NNTP protocol does not guarantee worldwide uniqueness of Message-IDs forever. Under some conditions the same Message-ID could be reused for different articles, allowing attackers to distribute malicious content via known 'news' or 'nntp' URLs.
section: "7"
topics:
    - security
