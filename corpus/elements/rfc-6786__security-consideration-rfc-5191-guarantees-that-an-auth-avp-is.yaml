document: rfc-6786
kind: security-consideration
summary: RFC 5191 guarantees that an AUTH AVP is always present in every PANA message after key generation. Therefore, an Encryption-Encap AVP is always accompanied by an AUTH AVP, satisfying AES-CTR's companion authentication requirement.
section: "7.1"
