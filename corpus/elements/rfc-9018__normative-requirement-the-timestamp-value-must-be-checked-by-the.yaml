document: rfc-9018
kind: normative-requirement
summary: The Timestamp value MUST be checked by the server to be within a defined period; servers SHOULD allow cookies within a 1-hour window in the past and a 5-minute window into the future to accommodate low-volume clients and clock skew in anycast sets.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - security
