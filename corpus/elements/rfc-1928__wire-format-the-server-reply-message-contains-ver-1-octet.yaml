summary: 'The server reply message contains: VER (1 octet, X''05''), REP (1 octet, reply code), RSV (1 octet, X''00''), ATYP (1 octet), BND.ADDR (variable, server-bound address), BND.PORT (2 octets, network byte order). RSV fields MUST be set to X''00''.'
