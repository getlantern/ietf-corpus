document: rfc-4037
kind: wire-format
summary: 'Data and quoted values use a length-prefixed binary encoding: ''size:octets'', where size is a decimal integer in [0,2147483647] specifying the exact number of octets following the colon. Any bare value may also be expressed as a quoted value; both yield identical semantics. Unicode UTF-8 is the default encoding.'
section: "3.1"
