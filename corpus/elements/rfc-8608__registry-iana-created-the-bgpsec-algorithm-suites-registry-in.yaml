document: rfc-8608
kind: registry
summary: IANA created the 'BGPsec Algorithm Suites' registry in the RPKI group. One-octet algorithm suite identifiers map to digest and signature algorithm pairs. Future assignments require the Standards Action process. The registry currently includes 0x00 (Reserved), 0x01 (SHA-256/ECDSA P-256), 0x02–0xF6 (Unassigned), 0xF7–0xFA (Experimentation), 0xFB–0xFE (Documentation), and 0xFF (Reserved).
