document: rfc-7545
kind: normative-requirement
summary: When the stop time in a spectrum schedule is reached, the device MUST obtain a new spectrum-availability schedule (either from the next schedule in the list or by issuing a new query). If the device cannot contact the Database, it MUST treat this as equivalent to no available spectrum.
section: 4.5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
