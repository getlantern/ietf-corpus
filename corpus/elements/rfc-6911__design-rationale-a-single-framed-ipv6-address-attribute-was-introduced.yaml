document: rfc-6911
kind: design-rationale
summary: A single Framed-IPv6-Address Attribute was introduced instead of reusing the RFC 3162 combination of Framed-Interface-Id and Framed-IPv6-Prefix because the combined form is more natural for PPP IPv6CP than for DHCPv6, and a single address attribute simplifies accounting record processing.
section: "2.1"
topics:
