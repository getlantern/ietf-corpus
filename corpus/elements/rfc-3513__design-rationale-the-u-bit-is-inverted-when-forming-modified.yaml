document: rfc-3513
kind: design-rationale
summary: The 'u' bit is inverted when forming Modified EUI-64 interface identifiers so that administrators can hand-configure non-global identifiers simply as 1, 2, 3, etc. rather than the unwieldy form 0200:0:0:1, 0200:0:0:2, etc. that would result without inversion.
section: 2.5.1
topics:
