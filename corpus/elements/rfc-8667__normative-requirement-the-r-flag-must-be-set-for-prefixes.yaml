document: rfc-8667
kind: normative-requirement
summary: The R-Flag MUST be set for prefixes not local to the router that are advertised due to level propagation, leaking, or redistribution from another protocol. A Level-1-2 router propagating its own configured interface addresses to another level MUST NOT set the R-Flag.
section: 2.1.1.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
