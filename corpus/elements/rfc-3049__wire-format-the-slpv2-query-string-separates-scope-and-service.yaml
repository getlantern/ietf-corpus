document: rfc-3049
kind: wire-format
summary: The SLPv2 query string separates scope and service type into distinct fields. Service type is 'service:TN3270', scope is a comma-separated list, and the query string uses the format '(LUPOOL=<POOL NAME> <DEVICE TYPE>)' with whitespace compressed to a single space during matching.
section: 5.3.3
