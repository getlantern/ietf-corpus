document: rfc-2829
kind: protocol-element
summary: Certificate-based authentication uses TLS negotiation in which the server requests the client certificate, followed by an LDAPv3 bind request with the SASL 'EXTERNAL' mechanism after successful TLS completion. The user's certificate subject field SHOULD be the name of the user's directory entry.
section: "7.1"
topics:
    - ldap
    - tls
    - pkix
    - security
