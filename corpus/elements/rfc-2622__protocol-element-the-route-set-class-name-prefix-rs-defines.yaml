document: rfc-2622
kind: protocol-element
summary: The route-set class (name prefix 'rs-') defines named sets of route prefixes (not route objects). Members can be address-prefix-ranges, other route-set names with optional range operators, or AS numbers and as-set names (which implicitly define the set of routes originated by those ASes). The predefined set rs-any contains all routes in the IRR.
section: "5.2"
topics:
    - routing
    - bgp
