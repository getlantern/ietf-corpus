document: rfc-6428
kind: normative-requirement
summary: The My Discriminator field MUST be set to a non-zero value. The transmitted Your Discriminator value MUST reflect back the received My Discriminator field, or be set to zero if not known. A node MUST NOT change the My Discriminator field for an established BFD session.
section: 3.7.7
rfc2119_level: MUST
topics:
    - mpls
