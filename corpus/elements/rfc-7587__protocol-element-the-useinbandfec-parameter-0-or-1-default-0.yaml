document: rfc-7587
kind: protocol-element
summary: The 'useinbandfec' parameter (0 or 1, default 0) signals that the decoder can take advantage of Opus in-band FEC. The receiver MUST be able to process packets that include FEC information even if the FEC part is discarded.
section: "6.1"
topics:
    - rtp
    - realtime
