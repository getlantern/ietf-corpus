document: rfc-5465
kind: normative-requirement
summary: Support for MailboxMetadataChange is OPTIONAL unless the METADATA extension (RFC 5464) is also supported, in which case support is REQUIRED. A deleted metadata item MUST always be included in the METADATA response.
