document: rfc-4293
kind: protocol-element
summary: ipIfStatsTable provides the same counters as ipSystemStatsTable but on a per-interface basis, indexed by InetVersion and InterfaceIndex. The two tables share identical object semantics; object ID 2 in ipSystemStatsEntry is reserved to keep the two tables' OID suffixes aligned.
