document: rfc-2111
kind: wire-format
summary: Both cid and mid URLs are based on url-addr-spec, which is a URL-encoded RFC 822 addr-spec. Characters not allowed in a URL (including '/', which is reserved within the 'mid' scheme) must be hex-encoded using the %hh escape mechanism.
