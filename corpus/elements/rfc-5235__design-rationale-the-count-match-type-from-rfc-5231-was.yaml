document: rfc-5235
kind: design-rationale
summary: The ':count' match type from RFC 5231 was added in this revision to allow scripts to reliably determine whether a spam or virus test was actually performed, rather than relying solely on the result value '0' which is ambiguous in the ':percent' mode.
