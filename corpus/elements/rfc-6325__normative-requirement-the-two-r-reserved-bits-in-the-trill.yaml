document: rfc-6325
kind: normative-requirement
summary: The two R (Reserved) bits in the TRILL header MUST be set to zero by an ingress RBridge, MUST be transparently copied but otherwise ignored by transit RBridges, and are ignored by egress RBridges. Allocation of reserved TRILL header bits requires an IETF Standards Action.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
