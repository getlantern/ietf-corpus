document: rfc-6827
kind: interoperability-note
summary: ASON extensions are scoped to ASON routing domains and MUST NOT be combined with global Internet or Layer 3 VPN routing in the same OSPFv2 instance. If a Routing Controller must participate in both domains, separate OSPFv2 instances are required.
section: "8"
topics:
    - routing
