document: rfc-5260
kind: normative-requirement
summary: Implementations MAY support extraction of date and time information in RFC 2822 or other formats appearing in positions other than the end of a header field. When a field contains more than one date/time value, the last one SHOULD be used.
section: "4"
rfc2119_level: MAY
topics:
