document: rfc-3031
kind: protocol-element
summary: The label stack is an ordered, last-in-first-out set of labels carried by a labeled packet. Processing is always based on the top label regardless of stack depth, and an unlabeled packet is treated as having a label stack of depth 0. The stack supports MPLS hierarchy via LSP tunneling.
section: "3.9"
topics:
