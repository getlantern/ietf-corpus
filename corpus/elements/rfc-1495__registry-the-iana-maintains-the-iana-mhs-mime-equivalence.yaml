document: rfc-1495
kind: registry
summary: The IANA maintains the 'IANA MHS/MIME Equivalence Table' mapping MHS body part OIDs to MIME content-type/subtype pairs. If a new MIME content-type/subtype is registered without a corresponding entry, IANA assigns it an OID from the arc defined in this memo.
