document: rfc-5583
kind: protocol-element
summary: A Media Partition is a subset of a Media Bitstream intended for independent transportation. In layered coding it represents one or more layers; in MDC coding it represents one or more descriptions. An integer number of Media Partitions forms a complete Media Bitstream.
