document: rfc-8177
kind: protocol-element
summary: The 'aes-key-wrap' container (if-feature aes-key-wrap) contains a boolean 'enable' leaf (default false). When enabled, key strings are encrypted using AES Key Wrap and encoded as hexadecimal key strings; the AES KEK is configured outside the YANG model.
