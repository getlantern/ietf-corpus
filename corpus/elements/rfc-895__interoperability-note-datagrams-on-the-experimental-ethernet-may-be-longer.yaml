document: rfc-895
kind: interoperability-note
summary: Datagrams on the Experimental Ethernet may be longer than the general Internet default maximum packet size of 576 octets. Hosts should consider sending smaller datagrams to avoid unnecessary fragmentation at intermediate gateways when communicating with hosts not on the same Ethernet.
section: Frame Format
topics:
    - ip
