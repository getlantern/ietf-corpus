document: rfc-8224
kind: design-rationale
summary: The authentication service is commonly implemented at a proxy rather than at each UA because UAs may be numerous (phones, PCs, PDAs) and synchronizing keying material across multiple devices is prohibitively complex. Centralizing signing at the proxy trades end-to-end security properties for deployment practicality.
