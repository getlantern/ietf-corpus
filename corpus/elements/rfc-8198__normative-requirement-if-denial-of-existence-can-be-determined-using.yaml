document: rfc-8198
kind: normative-requirement
summary: If denial of existence can be determined using NSEC records in the cache according to RFC 4035 Section 5.4 rules, then the resolver can immediately return an NXDOMAIN or NODATA response without querying authoritative servers.
section: "5.1"
rfc2119_level: SHOULD
topics:
