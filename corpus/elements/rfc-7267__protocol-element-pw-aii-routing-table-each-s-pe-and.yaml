document: rfc-7267
kind: protocol-element
summary: 'PW AII Routing Table: each S-PE and T-PE capable of dynamic MS-PW maintains a table keyed on (Global ID, Prefix, AC ID) with a length mask (0–96 bits) analogous to IPv4 CIDR. Longest-match lookup determines the next signaling hop. Entries may be static or BGP-learned.'
