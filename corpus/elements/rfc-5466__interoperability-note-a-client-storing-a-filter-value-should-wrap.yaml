document: rfc-5466
kind: interoperability-note
summary: A client storing a filter value SHOULD wrap any SEARCH key not defined in RFC 3501 in parentheses, to assist other clients in partially parsing the filter for editing purposes. For example, an extension key 'x-dsfa from 5' should be stored as '(x-dsfa from 5)'.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
