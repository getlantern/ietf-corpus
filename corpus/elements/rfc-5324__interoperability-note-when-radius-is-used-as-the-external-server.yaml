document: rfc-5324
kind: interoperability-note
summary: When RADIUS is used as the external server for DH-CHAP response verification, t11FcSpAuServerProtocol takes the value t11FcSpAuServerProtocolRadius. In this case, RADIUS server configuration is expected to be available from the RADIUS-AUTH-CLIENT-MIB (RFC 4668) radiusAuthServerExtTable; this document deliberately defines no duplicate RADIUS server objects.
section: "5"
topics:
