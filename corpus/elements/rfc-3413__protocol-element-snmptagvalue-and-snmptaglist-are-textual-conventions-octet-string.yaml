document: rfc-3413
kind: protocol-element
summary: SnmpTagValue and SnmpTagList are TEXTUAL-CONVENTIONs (OCTET STRING, SIZE 0..255) encoded in UTF-8 (ISO/IEC IS 10646-1). A tag value must not contain delimiter characters (space 0x20, TAB 0x09, CR 0x0D, LF 0x0A). Within a tag list, values are separated by a single delimiter; leading/trailing delimiters and adjacent delimiters are prohibited.
section: 4.1.1
topics:
    - snmp
