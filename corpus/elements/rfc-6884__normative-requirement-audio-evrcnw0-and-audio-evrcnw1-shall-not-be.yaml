document: rfc-6884
kind: normative-requirement
summary: audio/EVRCNW0 and audio/EVRCNW1 SHALL NOT be used for storage or file transfer; audio/EVRCNW SHALL be used instead. These two subtypes depend on RTP framing and are only defined for transfer via RTP.
section: 9.1.2
rfc2119_level: REQUIRED
