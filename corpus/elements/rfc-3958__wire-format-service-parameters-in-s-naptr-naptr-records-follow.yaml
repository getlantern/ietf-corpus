document: rfc-3958
kind: wire-format
summary: 'Service parameters in S-NAPTR NAPTR records follow the ABNF: service-parms = [[app-service] *('':'' app-protocol)], where app-service and app-protocol tags are 1-32 ALPHANUMSYM characters starting with ALPHA. IANA-registered protocols use ALPHA *31ALPHANUM. The separator is '':'' (colon), not ''+'' as used in RFC 3404. Tags are case-insensitive.'
section: "6.5"
topics:
    - dns
    - registry
