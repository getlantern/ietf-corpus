document: rfc-4202
kind: protocol-element
summary: FSC (Fiber-Switch Capable) interfaces switch the entire contents of an interface to another interface without distinguishing individual lambdas, channels, or packets. An FSC interface cannot restrict itself to switching only a single lambda; it operates at the granularity of the whole interface.
section: 2.4.5
topics:
    - routing
