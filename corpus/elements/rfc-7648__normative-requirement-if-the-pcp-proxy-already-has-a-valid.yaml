document: rfc-7648
kind: normative-requirement
summary: If the PCP proxy already has a valid active mapping for a mapping-creation request and the remaining lifetime is at least 3/4 of the requested lifetime, it SHOULD send an immediate reply with the outermost external address/port and actual remaining lifetime rather than generating an upstream request.
section: "3"
rfc2119_level: SHOULD
topics:
    - pcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
