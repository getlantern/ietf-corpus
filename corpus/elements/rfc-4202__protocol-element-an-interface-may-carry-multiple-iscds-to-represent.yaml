document: rfc-4202
kind: protocol-element
summary: An interface may carry multiple ISCDs to represent hybrid switching capabilities (e.g., LSC+TDM for an interface that can either cross-connect a lambda or demultiplex its TDM channels). Multiple ISCDs are also used for interfaces supporting multiple SDH multiplexing hierarchy branches or discrete bandwidth levels.
section: 2.4.6
