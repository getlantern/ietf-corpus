document: rfc-7195
kind: design-rationale
summary: RTP/AVP payload type numbers are reused in the 'm=' fmt subfield to identify codecs on circuit-switched bearers, avoiding definition of a new codec numbering scheme; in the PSTN context these numbers represent only the codec, not RTP encapsulation.
section: 5.2.2
topics:
