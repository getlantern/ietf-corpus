document: rfc-9073
kind: interoperability-note
summary: Previous iCalendar libraries had trouble handling components nested deeper than those defined in RFC 5545. This specification introduces nested components (PARTICIPANT, VLOCATION, VRESOURCE inside VEVENT/VTODO/VJOURNAL/VFREEBUSY), which may require library updates for correct handling.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
