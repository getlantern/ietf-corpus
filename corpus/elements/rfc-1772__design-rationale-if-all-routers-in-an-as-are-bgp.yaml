document: rfc-1772
kind: design-rationale
summary: If all routers in an AS are BGP speakers (pervasive BGP), no BGP/IGP interaction or synchronization is needed. The IGP handles only intra-AS routing, and BGP routes may be advertised without waiting for IGP convergence because all routers already hold full BGP state.
section: A.2.4
topics:
    - bgp
    - routing
