document: rfc-2305
kind: security-consideration
summary: The actual sender of an IFax message might not be the same as specified in the Sender, From, or MAIL FROM fields. SMTP does not provide inherent sender authentication; end-to-end solutions such as S/MIME and PGP/MIME are recommended for authentication where required.
section: 5.2.1
topics:
    - security
    - email
