document: rfc-3412
kind: protocol-element
summary: The Dispatcher is the single component in an SNMP engine responsible for dispatching tasks to version-specific Message Processing Models and dispatching PDUs to applications. There is only one Dispatcher per SNMP engine. It also collects statistics about SNMP messages in managed objects.
section: "2.1"
topics:
    - snmp
