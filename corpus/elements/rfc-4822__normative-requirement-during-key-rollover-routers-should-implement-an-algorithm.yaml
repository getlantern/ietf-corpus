document: rfc-4822
kind: normative-requirement
summary: During key rollover, routers SHOULD implement an algorithm to detect which Security Associations neighbors are using and transmit using both old and new Security Associations until all neighbors have migrated or the old association expires.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - routing
    - security
