document: rfc-5755
kind: protocol-element
summary: The AC Targeting extension (id-ce-targetInformation, { id-ce 55 }) is a SEQUENCE OF Targets that restricts AC use to named servers or groups. An honest AC verifier not among the named targets MUST reject the AC. This extension MUST be marked critical. The targetCert CHOICE MUST NOT be used.
section: 4.3.2
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
