document: rfc-1490
kind: design-rationale
summary: Unlike IP fragmentation, Frame Relay fragmentation is scoped to the Frame Relay network boundary (DTEs only). A packet is first encapsulated as normal, then large frames are broken up and wrapped in the fragmentation format, allowing reassembled packets to pass through the same processing path as non-fragmented packets.
section: "6"
