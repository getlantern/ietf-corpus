summary: 'The generic URI syntax is: URI = scheme ":" hier-part [ "?" query ] [ "#" fragment ], where hier-part = "//" authority path-abempty / path-absolute / path-rootless / path-empty. The scheme and path are required; authority, query, and fragment are optional.'
