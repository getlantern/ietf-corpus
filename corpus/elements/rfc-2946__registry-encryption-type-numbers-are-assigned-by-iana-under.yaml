document: rfc-2946
kind: registry
summary: Encryption type numbers are assigned by IANA under a First Come First Served policy per RFC 2434. Defined types include NULL (0), DES_CFB64 (1), DES_OFB64 (2), DES3_CFB64 (3), DES3_OFB64 (4), CAST5_40_CFB64 (8), CAST5_40_OFB64 (9), CAST128_CFB64 (10), CAST128_OFB64 (11). If over 50% of the 8-bit space becomes allocated, IANA shall refer requests to IESG or a designated expert.
section: "1"
topics:
