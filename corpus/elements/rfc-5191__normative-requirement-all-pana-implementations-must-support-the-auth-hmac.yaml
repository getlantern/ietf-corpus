kind: normative-requirement
summary: All PANA implementations MUST support the AUTH_HMAC_SHA1_160 (IKEv2 Transform ID 7) integrity algorithm as defined in RFC 4595, and MUST support the PRF_HMAC_SHA1 (IKEv2 Transform ID 2) pseudo-random function as defined in RFC 2104.
