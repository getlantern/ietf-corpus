document: rfc-6384
kind: normative-requirement
summary: An FTP ALG SHOULD translate all occurrences of the EPSV command issued by the client to the PASV command and reformat a 227 response as a corresponding 229 response. An ALG MAY forego this translation if it has positive knowledge that EPSV will succeed without translation.
