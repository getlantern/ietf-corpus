document: rfc-5815
kind: protocol-element
summary: The Template Definition Table (ipfixTemplateDefinitionTable) enumerates, in order, the Information Elements composing each Template or Options Template. Each entry records the IE Id (1–65535), encoded length, enterprise number (0 for IANA-registered IEs), and flags indicating whether the IE is used for scoping or as a Flow Key.
