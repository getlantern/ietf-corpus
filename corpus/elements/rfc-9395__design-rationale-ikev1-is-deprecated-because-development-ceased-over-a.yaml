document: rfc-9395
kind: design-rationale
summary: IKEv1 is deprecated because development ceased over a decade ago, leaving unmaintained code with security risks; IKEv1 systems are vulnerable to packet amplification attacks (CVE-2016-5361); and the de facto negotiated algorithms consist of dated or deprecated choices like AES-CBC, SHA1, and Diffie-Hellman groups 1 or 2.
section: "3"
topics:
