document: rfc-7057
kind: security-consideration
summary: Some deployments may allow for weak server authentication later validated with an existing exchange providing mutual authentication. Mutual channel bindings (RFC 7029) are RECOMMENDED in such cases, and the authenticator MUST NOT be able to modify channel binding data in transit.
section: "4"
topics:
