document: rfc-8808
kind: interoperability-note
summary: The contents of <factory-default> cannot be changed by management operations via NETCONF, RESTCONF, CLI, etc., unless specialized dedicated operations are provided. It can be read using standard NETCONF/RESTCONF protocol operations.
