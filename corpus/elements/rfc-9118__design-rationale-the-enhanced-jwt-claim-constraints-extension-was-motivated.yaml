document: rfc-9118
kind: design-rationale
summary: The Enhanced JWT Claim Constraints extension was motivated by the delegation scenario in RFC 9060, where service providers issue STIR certificates to enterprises. The original JWTClaimConstraints extension lacked the ability to prohibit specific claims; adding mustExclude fills that gap and enables finer-grained authority delegation.
section: "1"
topics:
