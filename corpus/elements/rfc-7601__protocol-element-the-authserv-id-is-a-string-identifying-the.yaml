document: rfc-7601
kind: protocol-element
summary: The authserv-id is a string identifying the authentication service within the ADMD that performed the checks. It is intended to be machine-readable. Common practice is to use the DNS organizational domain name of the ADMD, though any unique token pertaining to that ADMD is permitted.
section: "2.5"
topics:
