document: rfc-3010
kind: normative-requirement
summary: The callback RPC must mutually authenticate the NFS server to the principal that acquired the clientid using the same security flavor the original SETCLIENTID operation used; the server MUST identify itself via a GSS_C_NT_HOSTBASED_SERVICE name of the form nfs@hostname.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
