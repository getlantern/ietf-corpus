document: rfc-8591
kind: normative-requirement
summary: The UAS SHOULD return a SIP 493 (Undecipherable) response if it immediately attempts decryption and finds the message was encrypted to the wrong certificate; it MAY return a 200-class response if decryption is deferred. This updates RFC 3261.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
