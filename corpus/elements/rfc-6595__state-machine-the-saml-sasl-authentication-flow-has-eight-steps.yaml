document: rfc-6595
kind: state-machine
summary: 'The SAML SASL authentication flow has eight steps: (1) server advertises SAML20, (2) client sends initial-response with gs2-header and IdP domain, (3) server sends authentication request URI, (4) client sends ''='', (5-6) out-of-band SAML flow between client and IdP, (7) IdP sends authentication statement to server out-of-band, (8) server sends SASL outcome to client.'
