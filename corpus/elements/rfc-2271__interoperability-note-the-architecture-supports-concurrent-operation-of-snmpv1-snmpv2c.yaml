document: rfc-2271
kind: interoperability-note
summary: The architecture supports concurrent operation of SNMPv1, SNMPv2c, SNMPv3, and future SNMP versions by allowing the Message Processing Subsystem and Security Subsystem to each host multiple models simultaneously. The Dispatcher determines the version of an incoming message and routes it to the appropriate Message Processing Model.
section: "2.14"
