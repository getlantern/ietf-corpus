document: rfc-2518
kind: privacy-consideration
summary: Properties on resources may expose sensitive metadata about authorship, creation dates, and modification history. The DAV:source link property can reveal URIs of server-side source files (e.g., CGI scripts or server-side includes) that administrators intended to keep hidden.
section: "17.5"
topics:
    - http
    - privacy
