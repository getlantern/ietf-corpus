document: rfc-9926
kind: normative-requirement
summary: If the 6LN owns at least one IPv6 address derived from the registered prefix with a non-zero interface ID, it MUST indicate one of those addresses in full in the Target Address field of the NS(EARO). Otherwise it MUST indicate the prefix padded with zeros in the Target Address field.
section: "4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
