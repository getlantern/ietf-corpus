document: rfc-3377
kind: design-rationale
summary: RFC 2251 through 2256 were published with an IESG Note discouraging deployment of LDAPv3 update functionality because they did not mandate any satisfactory authentication mechanism. RFC 2829 was subsequently published to address this gap, and RFC 3377 formally incorporates RFC 2829 into the LDAPv3 suite to resolve the IESG Note.
section: "1"
topics:
