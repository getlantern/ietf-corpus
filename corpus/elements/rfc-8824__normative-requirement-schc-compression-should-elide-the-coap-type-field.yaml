document: rfc-8824
kind: normative-requirement
summary: SCHC compression SHOULD elide the CoAP Type field if a client is sending only Non-confirmable or only Confirmable messages. For RST messages, SCHC may use a dedicated Rule.
section: "4.2"
rfc2119_level: SHOULD
