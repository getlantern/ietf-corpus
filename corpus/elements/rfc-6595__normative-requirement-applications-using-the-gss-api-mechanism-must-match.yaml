document: rfc-6595
kind: normative-requirement
summary: Applications using the GSS-API mechanism MUST match the TLS server's identity with the target name per RFC 6125; the client uses the negotiated targ_name as the reference identifier matched against the DNS-ID of the server's certificate, and MUST reject the connection on mismatch.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
