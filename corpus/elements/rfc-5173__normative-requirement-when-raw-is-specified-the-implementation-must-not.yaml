document: rfc-5173
kind: normative-requirement
summary: When :raw is specified, the implementation MUST NOT remove any transfer encoding from the message, MUST NOT refuse to filter messages with syntactic errors, and MUST treat multipart boundaries or MIME headers of enclosed body parts as part of the content being matched.
section: "5.1"
rfc2119_level: MUST NOT
