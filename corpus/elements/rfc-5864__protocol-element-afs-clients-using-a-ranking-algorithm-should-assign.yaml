document: rfc-5864
kind: protocol-element
summary: AFS clients using a ranking algorithm SHOULD assign ranks by sorting targets by priority, assigning base rank values sufficiently distinct to enforce priority ordering, then ordering equal-priority targets using the RFC 2782 weighted algorithm and assigning incrementing rank values. Dynamic rank adjustment based on network metrics is permitted but must not alter the priority ordering.
section: "4.1"
topics:
    - dns
