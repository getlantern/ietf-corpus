document: rfc-1372
kind: wire-format
summary: Subnegotiations use the form IAC SB TOGGLE-FLOW-CONTROL <code> IAC SE, where <code> is one of OFF (0), ON (1), RESTART-ANY (2), or RESTART-XON (3). No additional data follows the command code.
