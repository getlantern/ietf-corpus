document: rfc-2206
kind: protocol-element
summary: TSpec parameters in rsvpSenderEntry include rsvpSenderTSpecRate (average bit rate, bits/s), rsvpSenderTSpecPeakRate (peak bit rate, bits/s), rsvpSenderTSpecBurst (largest burst, bytes), rsvpSenderTSpecMinTU and rsvpSenderTSpecMaxTU (min and max message sizes). These mirror the IntServ token-bucket TSpec.
section: "3.2"
