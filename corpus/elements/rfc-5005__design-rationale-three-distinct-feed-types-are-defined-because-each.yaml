document: rfc-5005
kind: design-rationale
summary: 'Three distinct feed types are defined because each has different trade-offs: complete feeds are useful when old entries should be discarded; paged feeds suit large/infinite/unstable entry sets needing piecemeal access; archived feeds suit long-lived entries where clients must see every one without loss.'
