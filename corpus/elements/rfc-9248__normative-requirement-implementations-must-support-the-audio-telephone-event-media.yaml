document: rfc-9248
kind: normative-requirement
summary: Implementations MUST support the 'audio/telephone-event' media type per RFC 4733 and MUST support conveying event codes 0 through 11 (DTMF digits '0'-'9', '*', '#'). Implementations MUST conform to RFC 7874 for audio codec requirements (WebRTC audio profile including Opus).
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
