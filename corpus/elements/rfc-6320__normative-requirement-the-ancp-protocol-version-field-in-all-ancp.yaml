document: rfc-6320
kind: normative-requirement
summary: The ANCP protocol version field in all ANCP messages MUST be set to 50. This value distinguishes ANCP messages from GSMPv3 messages received over the same TCP port and encapsulation.
section: "3.1"
rfc2119_level: MUST
