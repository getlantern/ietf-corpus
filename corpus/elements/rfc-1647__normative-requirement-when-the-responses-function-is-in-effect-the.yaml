document: rfc-1647
kind: normative-requirement
summary: When the RESPONSES function is in effect, the sender MUST set the SEQ-NUMBER field for every 3270-DATA or SCS-DATA message regardless of the RESPONSE-FLAG value. The counter starts at zero and increments by one per message, wrapping at 32767.
section: "10.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
