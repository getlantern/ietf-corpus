document: rfc-1035
kind: normative-requirement
summary: The SOA MINIMUM field acts as a floor on the TTL of all RRs sent from a zone; a name server must apply this floor when copying RRs into a response, not when loading the zone.
section: 3.3.13
rfc2119_level: MUST
topics:
    - dns
