document: rfc-5819
kind: registry
summary: This document registers the LIST-EXTENDED return option named STATUS in the IANA LIST-EXTENDED options registry (established by RFC 5258). The option type is RETURN, intended usage is COMMON, and it causes LIST to return STATUS responses alongside LIST responses.
