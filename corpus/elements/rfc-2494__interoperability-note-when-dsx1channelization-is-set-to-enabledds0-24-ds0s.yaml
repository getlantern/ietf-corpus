document: rfc-2494
kind: interoperability-note
summary: When dsx1Channelization is set to enabledDs0, 24 DS0s are created by the agent. If dsx1Channelization is set to disabled, those 24 DS0s are destroyed. Treatment of E1 is similar but with a different number of DS0s depending on framing; timeslot 16 is not created for framing types that do not pass data over it.
section: 2.3.1
topics:
    - snmp
