document: rfc-6609
kind: normative-requirement
summary: A 'stop' command in an included script MUST stop all script processing, including the processing of scripts that included it. By contrast, 'return' stops only the immediate script and returns control to the including script.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
