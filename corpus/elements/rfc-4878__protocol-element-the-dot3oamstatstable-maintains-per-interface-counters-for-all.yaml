document: rfc-4878
kind: protocol-element
summary: 'The dot3OamStatsTable maintains per-interface counters for all OAMPDU types: InformationTx/Rx, UniqueEventNotificationTx/Rx, DuplicateEventNotificationTx/Rx, LoopbackControlTx/Rx, VariableRequestTx/Rx, VariableResponseTx/Rx, OrgSpecificTx/Rx, UnsupportedCodesTx/Rx, and FramesLostDueToOam. Counters are 32-bit (matching IEEE 802.3ah) and persist across dot3OamOperStatus transitions.'
section: "6"
topics:
