document: rfc-5316
kind: security-consideration
summary: Manually configured inter-AS TE information (remote AS number, remote ASBR ID) should be carefully verified before entry. If a BGP OPEN reveals a different remote AS number than locally configured, local policy SHOULD determine whether to alert the operator or suppress the ISIS advertisement.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
