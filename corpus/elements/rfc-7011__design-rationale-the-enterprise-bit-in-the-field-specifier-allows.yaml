document: rfc-7011
kind: design-rationale
summary: The Enterprise bit in the Field Specifier allows vendors to define proprietary Information Elements without IANA registration, enabling pre-standards products and commercially sensitive IEs. The 15-bit IE identifier space is doubled for enterprise use by the presence of a 32-bit IANA Private Enterprise Number, keeping the standard and enterprise namespaces cleanly separated.
section: "3.2"
topics:
