document: rfc-7753
kind: design-rationale
summary: PORT_SET is preferred over multiple individual MAP requests because it reduces network traffic and latency, enables server-side bulk allocation that improves data-plane efficiency (e.g., CGN bulk port schemes), and allows a single state-table entry per client, greatly improving scalability.
