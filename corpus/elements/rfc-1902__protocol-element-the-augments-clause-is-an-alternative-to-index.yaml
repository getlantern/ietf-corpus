document: rfc-1902
kind: protocol-element
summary: The AUGMENTS clause is an alternative to INDEX for conceptual rows with a strict one-to-one correspondence to a base row. A row using AUGMENTS inherits the base row's INDEX, cannot itself be augmented, and its column instances exist co-extensively with the base row's instances; creating a base row implicitly creates all augmenting rows.
section: "7.8"
