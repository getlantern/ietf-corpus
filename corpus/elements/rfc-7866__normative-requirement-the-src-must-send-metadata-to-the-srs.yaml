document: rfc-7866
kind: normative-requirement
summary: The SRC MUST send metadata to the SRS in a Recording Session. The SRC SHOULD include a full metadata snapshot in the initial INVITE; if not yet available, it SHOULD send one as soon as metadata becomes available. If the SRS requests a snapshot, the SRC MUST immediately provide a full metadata snapshot.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
