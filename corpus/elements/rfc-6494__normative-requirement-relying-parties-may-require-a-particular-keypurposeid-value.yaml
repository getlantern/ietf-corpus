document: rfc-6494
kind: normative-requirement
summary: Relying parties MAY require a particular KeyPurposeId value (such as id-kp-sendRouter or id-kp-sendProxiedRouter) within the EKU extension. If multiple KeyPurposeId values are included, relying parties need not recognize all of them as long as the required value is present.
section: "7"
rfc2119_level: MAY
topics:
    - pkix
    - security
