document: rfc-2248
kind: protocol-element
summary: assocApplicationProtocol is an OBJECT IDENTIFIER identifying the protocol in use. For TCP-based protocols not in the IANA registry, the form {applTCPProtoID port} is used; for UDP-based protocols, {applUDPProtoID port} is used, where 'port' is the primary port number.
