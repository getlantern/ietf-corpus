document: rfc-9255
kind: security-consideration
summary: Attempts to use RPKI data to authenticate real-world documents are misleading as to authenticity. When a document is signed with an RPKI private key, the signer is speaking for INRs (an authorization), not asserting a real-world identity.
section: "4"
topics:
    - routing
    - security
    - pkix
