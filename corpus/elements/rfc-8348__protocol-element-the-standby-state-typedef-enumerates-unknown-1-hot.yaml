document: rfc-8348
kind: protocol-element
summary: 'The ''standby-state'' typedef enumerates: unknown (1), hot-standby (2), cold-standby (3), and providing-service (4). Hot-standby means immediate takeover without initialization; cold-standby requires initialization activity before takeover.'
section: "7.1"
