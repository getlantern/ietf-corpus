summary: 'The BIER encapsulation procedure at a BFIR involves: determining the Proto field and destination BFERs from the multicast flow overlay, converting BFR-ids to SI:BitString format, making one copy per distinct SI, and prepending a BIER header with the appropriate BIFT-id or BIER-MPLS label.'
