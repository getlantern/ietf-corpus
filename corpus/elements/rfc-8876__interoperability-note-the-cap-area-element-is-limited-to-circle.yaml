document: rfc-8876
kind: interoperability-note
summary: The CAP <area> element is limited to circle or polygon geometries. When converting from a PIDF-LO structure, points SHOULD be converted to a circle with radius equal to uncertainty, arc-bands and ellipses SHOULD be converted to polygons, and 3D locations SHOULD be converted to 2D forms.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
