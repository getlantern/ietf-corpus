document: rfc-3501
kind: normative-requirement
summary: A server MUST send mailbox size updates automatically whenever a mailbox size change is observed during command processing. It is NOT permitted to send an EXISTS response that reduces the message count; only the EXPUNGE response may do this.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
