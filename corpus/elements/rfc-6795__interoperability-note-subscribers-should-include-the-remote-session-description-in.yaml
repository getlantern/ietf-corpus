document: rfc-6795
kind: interoperability-note
summary: Subscribers SHOULD include the remote session description in SUBSCRIBE bodies when available, but SHOULD omit it in subsequent requests if the notifier has signaled via the "local-only" parameter that it does not require the remote description, reducing unnecessary information disclosure.
section: "3.6"
topics:
    - sip
