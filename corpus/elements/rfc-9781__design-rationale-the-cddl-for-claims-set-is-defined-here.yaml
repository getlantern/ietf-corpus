document: rfc-9781
kind: design-rationale
summary: The CDDL for Claims-Set is defined here because RFC 8392 did not provide a formal CDDL definition for CWT Claims Sets. The same CDDL rules cover both CBOR (UCCS) and JSON (UJCS) encoding by toggling 'cbor'/'json' features, avoiding duplication.
