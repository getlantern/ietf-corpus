document: rfc-5605
kind: security-consideration
summary: The pwAtmOutboundTable, pwAtmInboundTable, pwAtmCfgTable, pwAtmOutboundNto1Table, and pwAtmInboundNto1Table contain ATM PW configuration parameters on Provider Edge devices. Unauthorized SET access to these read-write/read-create objects could disrupt traffic on the network; they should be protected with SNMPv3 or equivalent.
section: "10"
topics:
