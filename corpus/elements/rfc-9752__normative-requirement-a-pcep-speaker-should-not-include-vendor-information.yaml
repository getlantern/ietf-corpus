document: rfc-9752
kind: normative-requirement
summary: A PCEP speaker SHOULD NOT include vendor information in a stateful PCEP message if it believes the recipient does not support that information, to avoid message congestion as highlighted in Section 6.6 of RFC 7470.
section: "4.6"
rfc2119_level: SHOULD NOT
