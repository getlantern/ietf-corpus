document: rfc-1425
kind: wire-format
summary: Successful EHLO response (code 250) is a multiline reply where each line contains an ehlo-keyword optionally followed by space-separated ehlo-params. The final line uses '250 SP ehlo-line' while continuation lines use '250-'. Keywords are (ALPHA/DIGIT) sequences; params exclude SP and control characters (US ASCII 0-31).
section: "4.1"
topics:
