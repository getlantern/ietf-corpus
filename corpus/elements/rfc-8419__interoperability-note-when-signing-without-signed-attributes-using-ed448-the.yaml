document: rfc-8419
kind: interoperability-note
summary: When signing without signed attributes using Ed448, the digestAlgorithm is id-shake256 (not id-shake256-len), and parameters MUST be absent — contrasting with the signed-attributes case where id-shake256-len with a length parameter is required.
section: "3.2"
topics:
