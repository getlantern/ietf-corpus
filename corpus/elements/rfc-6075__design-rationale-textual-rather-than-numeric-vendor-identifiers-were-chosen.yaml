document: rfc-6075
kind: design-rationale
summary: Textual rather than numeric vendor identifiers were chosen so engineers and operators diagnosing protocol problems have some possibility of recognizing the origin of a vendor attribute without consulting a registry. The ASCII restriction for registrations is not believed to harm this diagnostic use case.
