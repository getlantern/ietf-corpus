document: rfc-5329
kind: protocol-element
summary: 'The Link TLV describes a single link via sub-TLVs inherited from OSPFv2 TE, except the Link ID sub-TLV which cannot be used in OSPFv3. Three new sub-TLVs are defined: Neighbor ID (18), Local Interface IPv6 Address (19), and Remote Interface IPv6 Address (20).'
