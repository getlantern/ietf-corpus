document: rfc-4030
kind: design-rationale
summary: The server generates its own Authentication suboption in reply messages rather than echoing back the relay agent's suboption; this is a deliberate variance from RFC 3046 section 2.2, enabling independent authentication of server-to-relay traffic.
section: "11.2"
topics:
    - security
