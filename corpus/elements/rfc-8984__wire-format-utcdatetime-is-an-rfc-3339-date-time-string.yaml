document: rfc-8984
kind: wire-format
summary: UTCDateTime is an RFC 3339 date-time string where all letters MUST be uppercase and the time offset MUST be 'Z'. Fractional seconds MUST NOT be included unless non-zero, and MUST NOT have trailing zeros, ensuring a single canonical representation per date-time.
section: 1.4.4
rfc2119_level: MUST
