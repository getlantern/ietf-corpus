document: rfc-2530
kind: interoperability-note
summary: DSNs are not available between all senders and receivers; MDNs require the receiver to disclose message disposition information (or, if using the 'denied' disposition-type, the time the notification was generated). Implementations must choose the appropriate mechanism given these drawbacks.
