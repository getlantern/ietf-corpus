document: rfc-3321
kind: protocol-element
summary: 'Acknowledgement optimization: when shared compression is active and endpoint 1 sets the ''r'' bit indicating it saved a shared state(M), endpoint 1 can implicitly infer that state(S) was created at endpoint 2 when it observes that shared state(M) is requested by decompressor 1—making an explicit acked_state_id unnecessary for that state. The state handler must maintain a mapping between state(M) and state(S) for this optimization.'
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
