document: rfc-5132
kind: interoperability-note
summary: ipMcastRouteInIfIndex of 0 indicates that datagrams are not subject to an incoming interface check and may be accepted on multiple interfaces, as in BIDIR-PIM. Similarly, ipMcastRouteUpstreamNeighborType of unknown(0) indicates the upstream neighbor is unknown, as in BIDIR-PIM.
section: "6"
topics:
    - multicast
    - snmp
    - routing
