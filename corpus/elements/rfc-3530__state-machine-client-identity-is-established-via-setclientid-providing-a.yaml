document: rfc-3530
kind: state-machine
summary: Client identity is established via SETCLIENTID (providing a verifier4 and opaque client ID string) followed by SETCLIENTID_CONFIRM. The server issues a 64-bit clientid4 shorthand reference. If the client presents a new verifier (indicating restart), the server schedules release of prior state. If the same verifier is presented with the same client ID, the prior clientid is returned.
section: 8.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
