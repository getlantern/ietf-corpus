document: rfc-9466
kind: design-rationale
summary: Routers MAY send PackedAssert messages twice in short order (e.g., 50 msec apart) to overcome packet loss, but only when the total size of both copies is less than equivalent Assert messages AND the assert records are in a winner state that would not trigger reply storms.
section: 3.3.1.4
topics:
    - multicast
    - routing
