document: rfc-6543
kind: security-consideration
summary: The security considerations from RFC 5213 and RFC 5844 continue to apply. The reservations made here extend the use of the same fixed link-local and link-layer addresses beyond a single PMIPv6 domain, expanding the scope of the existing problem of asserting ownership of configured addresses from a single domain to a multi-domain environment. Future work may be needed to address these issues.
section: "4"
topics:
    - security
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
