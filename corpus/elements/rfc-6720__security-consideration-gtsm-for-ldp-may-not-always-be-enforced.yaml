document: rfc-6720
kind: security-consideration
summary: GTSM for LDP may not always be enforced on single-hop sessions established via Extended Discovery, leaving LDP susceptible to forged/spoofed protocol packets in those scenarios. Use of cryptographic integrity (e.g., TCP-AO per RFC 5925) is recommended as an alternate or complementary solution.
section: "4"
topics:
