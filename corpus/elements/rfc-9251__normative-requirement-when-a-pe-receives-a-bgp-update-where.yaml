document: rfc-9251
kind: normative-requirement
summary: When a PE receives a BGP update where both M and I flags of the Multicast Flags Extended Community are 0, the router MUST treat this update as malformed and MUST ignore the extended community.
section: "9.4"
rfc2119_level: MUST
topics:
    - multicast
    - routing
