document: rfc-3645
kind: normative-requirement
summary: The owner name of the TKEY resource record queried for and the owner name of the supplied TKEY record in the additional records section MUST be the same. The client SHOULD use a globally unique value, which MAY contain a UUID/GUID.
section: 3.1.2
rfc2119_level: MUST
topics:
