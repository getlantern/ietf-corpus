document: rfc-3434
kind: interoperability-note
summary: The HC-ALARM MIB is completely independent of the RMON-1 alarm mechanisms; hcAlarmTable entries and hcRising/FallingAlarm notifications are separate from and do not replace the existing RMON-1 alarmTable and risingAlarm/fallingAlarm notifications. Both may coexist in an implementation.
section: "3"
topics:
