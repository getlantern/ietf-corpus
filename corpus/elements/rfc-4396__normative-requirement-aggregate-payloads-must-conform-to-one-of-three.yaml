document: rfc-4396
kind: normative-requirement
summary: 'Aggregate payloads MUST conform to one of three ordered configurations: (1) TYPE 5 units then TYPE 1 units; (2) TYPE 5 units then at most one TYPE 3 or TYPE 4 unit; (3) TYPE 5 units, at most one TYPE 2, at most one TYPE 3, both from the same sample. Other aggregations SHALL NOT be used.'
section: "4.6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
