document: rfc-8415
kind: wire-format
summary: DHCPv6 client/server messages have a fixed header with msg-type (1 octet) and transaction-id (3 octets), followed by a variable-length options field. All values are in network byte order; options are stored serially with no padding and no alignment beyond byte boundaries.
