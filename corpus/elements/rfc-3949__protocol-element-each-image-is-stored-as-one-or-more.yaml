document: rfc-3949
kind: protocol-element
summary: Each image is stored as one or more strips within an IFD. Required strip fields are StripOffsets (tag 273), RowsPerStrip (tag 278), and StripByteCounts (tag 279); all strips except the last must contain the same number of scanlines.
