document: rfc-7222
kind: normative-requirement
summary: A receiver MUST ignore any received QoS option whose Operational Code field is set to a reserved value (6-255). Reserved bits in the TC field MUST be initialized to (0) by the sender and MUST be ignored by the receiver.
section: "4.1"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
