document: rfc-9882
kind: normative-requirement
summary: SHAKE256 SHOULD be supported as the digest algorithm, as it is the digest used internally in ML-DSA. When SHAKE256 is used, the id-shake256 identifier is used and the parameters field MUST be omitted; SHAKE256 produces 512 bits of output in this context.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
