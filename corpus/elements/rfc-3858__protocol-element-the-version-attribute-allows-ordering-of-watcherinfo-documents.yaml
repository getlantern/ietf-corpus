document: rfc-3858
kind: protocol-element
summary: The 'version' attribute allows ordering of watcherinfo documents within a subscription scope. Versions start at 0, increment by 1 per document, and are scoped to a single watcherinfo subscription; they do not wrap even though stored as a 32-bit integer.
