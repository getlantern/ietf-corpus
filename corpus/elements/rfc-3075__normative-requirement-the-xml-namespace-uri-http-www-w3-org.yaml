document: rfc-3075
kind: normative-requirement
summary: The XML namespace URI http://www.w3.org/2000/09/xmldsig# MUST be used by implementations of this specification. Implementations MUST support XML and XML namespaces; use of a specific namespace prefix is OPTIONAL.
section: "1.3"
rfc2119_level: MUST
