document: rfc-7782
kind: wire-format
summary: The EXTENDED-RBRIDGE-CAP APPsub-TLV (type 254) has Length=10 and contains a 2-byte Topology field followed by 8 bytes of capability flags. Bit 0 (E) signals Option B support; Bit 1 (H) signals Option A support; bits 2–63 are Reserved and MUST be sent as zero and ignored on receipt.
section: "4.2"
topics:
    - routing
