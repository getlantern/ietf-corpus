document: rfc-4821
kind: protocol-element
summary: 'A probe packet is a packet used to test a path for a larger MTU; its size including IP headers equals the probe size. Probe outcomes are classified as: Success (acknowledged by remote), Failure (probe lost, no other losses), Timeout Failure (loss via timeout with go-back-n, trailing window indeterminate), or Inconclusive (probe lost along with other packets).'
section: "7.5"
topics:
