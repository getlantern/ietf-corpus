document: rfc-7306
kind: protocol-element
summary: The FetchAdd Atomic Operation reads a 64-bit value at a 64-bit-aligned ULP Buffer address on the Responder, adds a 64-bit 'Add Data' value subject to a 64-bit 'Add Mask' that defines independent sub-field boundaries for carry isolation, writes the result back, and returns the original value to the Requester.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
