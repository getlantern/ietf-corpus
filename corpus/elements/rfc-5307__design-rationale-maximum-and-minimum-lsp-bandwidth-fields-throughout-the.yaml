document: rfc-5307
kind: design-rationale
summary: Maximum and Minimum LSP Bandwidth fields throughout the ISCD sub-TLV are encoded in bytes per second (not bits per second) using IEEE 754 floating-point format. This is a non-obvious unit choice that implementors must handle correctly to avoid bandwidth miscalculation.
section: "1.3"
topics:
