document: rfc-2858
kind: protocol-element
summary: 'Third-party next hop rules: a BGP speaker may advertise an internal peer''s interface as next hop to an external peer if they share a common subnet, or may advertise an external peer router''s address as next hop if that address was learned from an external peer and shares a common subnet with the destination peer.'
