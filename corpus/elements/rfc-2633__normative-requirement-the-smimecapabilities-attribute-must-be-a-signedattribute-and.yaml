document: rfc-2633
kind: normative-requirement
summary: The SMIMECapabilities attribute MUST be a SignedAttribute and MUST NOT be an UnsignedAttribute. The SignedAttributes in a signerInfo MUST NOT include multiple instances of SMIMECapabilities, and it MUST only include a single AttributeValue.
section: 2.5.2
rfc2119_level: MUST
topics:
    - email
    - crypto
