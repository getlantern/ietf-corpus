document: rfc-9108
kind: normative-requirement
summary: When a new DNS class or RR type is added to the IANA registries, a new 'enum' statement SHALL be added to the 'dns-class-name' or 'rr-type-name' type respectively. The enum's assigned name SHALL match the registry mnemonic.
section: "4"
rfc2119_level: REQUIRED
