document: rfc-8150
kind: security-consideration
summary: The mplsLpsStatusTable and mplsLpsMeStatusTable expose history and current status of MPLS-TP linear protection domains, enabling performance estimation of the network. These tables should be considered sensitive/vulnerable if operators do not wish to reveal network performance information, and GET/NOTIFY access should be controlled and values possibly encrypted.
section: "9"
topics:
