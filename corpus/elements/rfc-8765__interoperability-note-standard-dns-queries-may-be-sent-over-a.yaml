document: rfc-8765
kind: interoperability-note
summary: Standard DNS queries MAY be sent over a DNS Push Notification (DSO) session. For authoritative zones, the server MUST respond authoritatively; for recursive resolver mode, DNS Push Notification support implies standard query support for the same names.
section: "3"
topics:
