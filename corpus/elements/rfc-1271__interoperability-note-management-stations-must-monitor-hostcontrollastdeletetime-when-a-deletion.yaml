document: rfc-1271
kind: interoperability-note
summary: Management stations must monitor hostControlLastDeleteTime; when a deletion is detected, all locally stored hostTimeCreationOrder-to-hostEntry associations must be invalidated and any in-progress download of hostTimeTable must be restarted, because deletion renumbers creation-order indexes.
