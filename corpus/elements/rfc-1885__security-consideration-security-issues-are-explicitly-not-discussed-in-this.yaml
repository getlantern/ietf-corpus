document: rfc-1885
kind: security-consideration
summary: 'Security issues are explicitly not discussed in this memo. However, the specification includes implicit mitigations: rate-limiting of error messages (section 2.4(f)) to prevent ICMPv6-based bandwidth amplification, and prohibition on sending errors in response to packets with non-unicast or unspecified source addresses to prevent reflection attacks.'
