document: rfc-3339
kind: protocol-element
summary: 'The unknown local offset is represented as "-00:00", which is semantically distinct from "+00:00" or "Z": the latter two imply UTC is the preferred reference point, while "-00:00" signals that the UTC offset is unknown.'
section: "4.3"
