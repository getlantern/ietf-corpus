document: rfc-2308
kind: design-rationale
summary: The NODATA pseudo-RCODE was introduced in BIND 4.9.2 (1993) to distinguish 'name exists but no records of this type' from NXDOMAIN; it has no wire-format RCODE value and must be algorithmically inferred from the response contents.
