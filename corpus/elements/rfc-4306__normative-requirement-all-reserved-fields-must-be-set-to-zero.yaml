document: rfc-4306
kind: normative-requirement
summary: All RESERVED fields MUST be set to zero by a version 2.0 implementation and their content MUST be ignored on receipt. If the Critical flag is set on an unrecognized payload, the message MUST be rejected with UNSUPPORTED_CRITICAL_PAYLOAD; if the Critical flag is not set and the payload type is unrecognized, the payload MUST be ignored.
section: "2.5"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
