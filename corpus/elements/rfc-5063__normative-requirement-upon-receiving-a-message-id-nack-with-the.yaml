document: rfc-5063
kind: normative-requirement
summary: Upon receiving a MESSAGE_ID NACK with the RecoveryPath Flag set, the downstream RSVP neighbor MUST generate a RecoveryPath message per Section 4.5.1 for the matching received Path message. If no matching Path message is found, the NACK is ignored.
section: 5.3.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
