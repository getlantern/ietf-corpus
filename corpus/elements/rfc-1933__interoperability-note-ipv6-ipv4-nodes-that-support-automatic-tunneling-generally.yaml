document: rfc-1933
kind: interoperability-note
summary: IPv6/IPv4 nodes that support automatic tunneling generally should not return IPv4-compatible IPv6 addresses to applications when automatic tunneling is disabled or unsupported, because those destinations are only reachable via tunneling; implementations with tunneling enabled may elect to return only the IPv4-compatible IPv6 address rather than the IPv4 address.
section: 3.2.1
topics:
    - ip
    - v6ops
    - dns
