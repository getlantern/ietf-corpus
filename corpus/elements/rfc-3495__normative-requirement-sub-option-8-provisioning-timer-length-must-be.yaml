document: rfc-3495
kind: normative-requirement
summary: Sub-option 8 (Provisioning Timer) length MUST be 1. A value of 0 means the timer MUST be disabled. If the timer expires before provisioning completes, the MTA should reset and restart provisioning.
section: "5.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
