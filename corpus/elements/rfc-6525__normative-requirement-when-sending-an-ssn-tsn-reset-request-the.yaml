document: rfc-6525
kind: normative-requirement
summary: When sending an SSN/TSN Reset Request, the sender MUST queue all user data and suspend new transmissions and TSN assignments (step C2). Only one SSN/TSN Reset Request SHOULD be sent within 30 seconds (one IP maximum segment lifetime).
section: 5.1.4
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
