document: rfc-8054
kind: normative-requirement
summary: All data submitted for compression MUST be included in the compressed output and appropriately flushed so that the receiving decompressor can completely decompress it. The receiving decompressor MUST automatically adjust to the compression parameters selected by the sender.
section: 2.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
