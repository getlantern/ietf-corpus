document: rfc-7523
kind: protocol-element
summary: To use a Bearer JWT as an authorization grant, the client sends a token request with grant_type set to 'urn:ietf:params:oauth:grant-type:jwt-bearer' and the JWT in the 'assertion' parameter. The 'scope' parameter may optionally be included; client authentication is optional.
section: "2.1"
topics:
