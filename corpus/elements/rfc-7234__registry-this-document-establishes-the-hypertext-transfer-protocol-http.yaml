document: rfc-7234
kind: registry
summary: This document establishes the 'Hypertext Transfer Protocol (HTTP) Warn Codes' registry at IANA (http://www.iana.org/assignments/http-warn-codes), populated with warn codes 110, 111, 112, 113, 199, 214, and 299. Registrations must include a 3-digit warn code, short description, and specification pointer. New entries require IETF Review.
section: "7.2"
