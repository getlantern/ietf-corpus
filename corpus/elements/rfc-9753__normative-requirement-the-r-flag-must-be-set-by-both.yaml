document: rfc-9753
kind: normative-requirement
summary: The R flag MUST be set by both the PCC and PCE to activate handling of the P and I flags in the PCEP common object header for relaxing constraints by marking objects as 'optional to process'. If a PCEP speaker does not set the R flag but receives PCEP objects with P or I bits set, it MUST ignore those flags.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
