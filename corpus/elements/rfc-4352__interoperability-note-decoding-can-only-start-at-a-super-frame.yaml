document: rfc-4352
kind: interoperability-note
summary: Decoding can only start at a super-frame boundary, and it is only RECOMMENDED to start if at least 2 out of 4 transport frames belonging to that super-frame are available. This affects receivers joining a multicast mid-session or re-synchronizing after access-control key changes.
section: "4.4"
topics:
    - rtp
    - realtime
