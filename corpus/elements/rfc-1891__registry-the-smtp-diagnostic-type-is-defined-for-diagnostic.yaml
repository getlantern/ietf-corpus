document: rfc-1891
kind: registry
summary: The 'smtp' diagnostic-type is defined for Diagnostic-Code DSN fields, encoding SMTP reply codes in the format '*( 3*DIGIT "-" *text ) 3*DIGIT SPACE *text'. Single-line replies should be transcribed exactly; multi-line replies require a SPACE inserted before each continuation line.
