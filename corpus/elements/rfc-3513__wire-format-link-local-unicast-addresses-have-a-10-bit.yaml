document: rfc-3513
kind: wire-format
summary: Link-local unicast addresses have a 10-bit prefix of 1111111010 (FE80::/10), 54 zero bits, and a 64-bit interface ID. Site-local unicast addresses have a 10-bit prefix of 1111111011 (FEC0::/10), a 54-bit subnet ID, and a 64-bit interface ID.
section: 2.5.6
