document: rfc-4467
kind: security-consideration
summary: The 'authuser' access identifier should be used with caution as it permits any authorized IMAP user to access the URL. The 'anonymous' access identifier should be used with extreme caution as it permits anyone, and MUST NOT be assumed equivalent to 'authuser' even on servers that disallow anonymous access.
section: "10"
rfc2119_level: MUST NOT
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
