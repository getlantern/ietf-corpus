document: rfc-8175
kind: normative-requirement
summary: Implementations MUST support the Generalized TTL Security Mechanism (RFC 5082) and MUST adhere to it for all DLEP Messages. Signals received with TTL ≠ 255 MUST be silently ignored; TCP packets received with TTL ≠ 255 MUST cause an immediate transition to the Session Reset state.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
