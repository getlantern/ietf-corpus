document: rfc-2961
kind: normative-requirement
summary: The Srefresh refresh period MUST NOT be longer than the standard Path/Resv refresh period, and Srefresh use MUST NOT cause state to time out at the RSVP next hop. When Srefresh is used, generation of standard refresh messages for the same state SHOULD be suppressed.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - qos
