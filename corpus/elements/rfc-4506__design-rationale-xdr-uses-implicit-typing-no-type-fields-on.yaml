document: rfc-4506
kind: design-rationale
summary: 'XDR uses implicit typing (no type fields on the wire) rather than explicit typing because data-typing has high cost: it expands data size and requires field interpretation at runtime, yet protocols already know the expected type, making type tags redundant.'
section: "5"
