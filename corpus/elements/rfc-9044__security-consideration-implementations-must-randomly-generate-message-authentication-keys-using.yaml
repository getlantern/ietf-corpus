document: rfc-9044
kind: security-consideration
summary: Implementations must randomly generate message-authentication keys using adequate PRNGs. Use of inadequate PRNGs can result in little or no security, as an attacker may reproduce the PRNG environment rather than brute-force the key space.
section: "7"
topics:
    - crypto
    - security
