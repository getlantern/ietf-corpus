document: rfc-1981
kind: protocol-element
summary: When a Packet Too Big message is received containing a Routing header, the destination address is taken from the Routing header's last address (Address[n]) if Segments Left is greater than zero, or from the IPv6 Destination Address field if Segments Left equals zero.
section: "5.2"
