document: rfc-8007
kind: normative-requirement
summary: CI/T invalidate and purge commands MUST be applied to all data acquired before the command was accepted by the dCDN. The dCDN SHOULD NOT apply these commands to data acquired after acceptance.
section: "2.1"
rfc2119_level: MUST
topics:
