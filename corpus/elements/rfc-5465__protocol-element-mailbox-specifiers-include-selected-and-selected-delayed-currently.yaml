document: rfc-5465
kind: protocol-element
summary: 'Mailbox specifiers include: SELECTED and SELECTED-DELAYED (currently selected mailbox), personal (all selectable personal namespace mailboxes), inboxes (delivery-eligible personal mailboxes), subscribed (all subscribed mailboxes), subtree (mailbox plus descendants), and mailboxes (explicit list, no wildcard expansion).'
