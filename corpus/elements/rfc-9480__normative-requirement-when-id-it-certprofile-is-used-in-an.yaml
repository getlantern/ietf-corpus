document: rfc-9480
kind: normative-requirement
summary: When id-it-certProfile is used in an ir/cr/kur/genm, the value MUST NOT contain more elements than the number of CertReqMsg or InfoTypeAndValue elements. When used in a p10cr, the value MUST NOT contain multiple certificate profile names.
section: "2.4"
rfc2119_level: MUST NOT
