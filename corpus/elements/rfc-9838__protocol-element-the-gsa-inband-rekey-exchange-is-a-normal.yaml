document: rfc-9838
kind: protocol-element
summary: The GSA_INBAND_REKEY exchange is a normal IKEv2 request-response exchange initiated by the GCKS over the unicast IKE SA from registration. It carries GSA, KD, and optional N payloads; the GM responds with an empty SK payload. This provides reliable, individually-addressed policy updates for small groups without a separate multicast Rekey SA.
section: 2.4.2
topics:
