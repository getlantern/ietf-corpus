document: rfc-3731
kind: protocol-element
summary: The <domain:trnData> element (returned for transfer query and transfer command responses) contains domain name, transfer status (trStatus), requesting client ID (reID), request date (reDate), acting client ID (acID), action deadline/completion date (acDate), and optional new expiry date (exDate).
