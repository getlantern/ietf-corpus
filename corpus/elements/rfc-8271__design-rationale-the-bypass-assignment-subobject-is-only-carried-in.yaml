document: rfc-8271
kind: design-rationale
summary: The BYPASS_ASSIGNMENT subobject is only carried in RSVP Path messages (never Resv) and only inserted by the downstream PLR, reflecting the document's choice that downstream PLRs initiate bypass assignments and upstream PLRs (downstream MPs) react by reflecting the assignment in the reverse direction rather than independently assigning their own.
section: 4.5.1
topics:
