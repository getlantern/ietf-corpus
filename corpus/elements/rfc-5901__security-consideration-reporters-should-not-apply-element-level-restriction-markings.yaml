document: rfc-5901
kind: security-consideration
summary: Reporters should not apply element-level restriction markings via iodef:restriction unless the receiving party has mechanisms to safeguard data as marked; for example, a PhraudReport element marked private containing a DCSite/SiteURL cannot then be redistributed in a public block list.
section: "7.2"
topics:
    - security
