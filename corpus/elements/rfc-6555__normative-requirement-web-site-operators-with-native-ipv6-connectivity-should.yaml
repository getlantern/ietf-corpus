document: rfc-6555
kind: normative-requirement
summary: Web site operators with native IPv6 connectivity SHOULD NOT offer multiple AAAA records because, for clients without Happy Eyeballs and with broken IPv6 connectivity, multiple AAAA records further increase the delay before falling back to IPv4.
section: "5.4"
rfc2119_level: SHOULD NOT
topics:
