document: rfc-9880
kind: design-rationale
summary: Base SDF does not define a version concept for the format itself. Instead, extensibility is achieved via extension points (Quality Names and Given Names) and the features quality in the info block, avoiding version negotiation complexity while allowing incremental additions.
