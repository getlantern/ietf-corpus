document: rfc-9533
kind: normative-requirement
summary: When sending a reflected test packet, the micro TWAMP Session-Reflector MUST copy the Sender Micro-session ID from the received packet into the reflected packet's Sender Micro-session ID field, and MUST fill the Reflector Micro-session ID field with the member link identifier associated with the micro TWAMP session.
section: 4.2.4
rfc2119_level: MUST
topics:
    - measurement
