document: rfc-8899
kind: security-consideration
summary: If a PL can use cryptographic confidentiality or data-integrity mechanisms, the design ought to avoid adding padding to DPLPMTUD probe packets that is not also protected by those cryptographic mechanisms. Probe packet padding content does not influence the search algorithm.
section: "8"
topics:
    - security
    - crypto
