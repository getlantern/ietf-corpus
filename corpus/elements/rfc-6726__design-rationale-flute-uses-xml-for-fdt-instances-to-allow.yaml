document: rfc-6726
kind: design-rationale
summary: 'FLUTE uses XML for FDT Instances to allow extensibility: private elements and attributes may be added inside ''File'' or ''FDT-Instance'' elements, and unsupported private attributes SHOULD be silently ignored. This avoids versioning churn for application-specific metadata.'
section: 3.4.2
topics:
