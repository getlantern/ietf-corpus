document: rfc-5428
kind: normative-requirement
summary: The MTA MUST create exactly one event class entry with index=100 named 'generic' that contains all events not associated with any other vendor-specified event class. This guarantees a catch-all class is always present.
section: "6"
rfc2119_level: MUST
