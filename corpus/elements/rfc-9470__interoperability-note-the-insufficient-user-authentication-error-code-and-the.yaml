document: rfc-9470
kind: interoperability-note
summary: The `insufficient_user_authentication` error code and the `acr_values`/`max_age` auth-params are defined for the Bearer scheme but are also applicable to other OAuth authentication schemes (such as DPoP per RFC 9449) that use the same error parameter convention.
