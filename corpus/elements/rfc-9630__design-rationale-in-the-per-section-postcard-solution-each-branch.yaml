document: rfc-9630
kind: design-rationale
summary: In the per-section postcard solution, each branch fork node exports accumulated trace data in a postcard before replicating the packet, then clears the IOAM node data list and resets RemainingLen. This avoids redundancy while preserving per-branch telemetry, with no modification needed to the IOAM trace option header format.
