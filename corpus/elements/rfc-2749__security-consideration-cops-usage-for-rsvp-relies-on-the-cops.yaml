document: rfc-2749
kind: security-consideration
summary: COPS usage for RSVP relies on the COPS protocol's own security mechanisms for signaling. RSVP message security is provided by inter-router MD5 authentication operating under a chain-of-trust model, with PEPs deployed at network edges and policy-ignorant PIN nodes forming the backbone.
