document: rfc-1771
kind: wire-format
summary: 'NOTIFICATION message fields: 1-octet Error Code, 1-octet Error Subcode, variable Data. Minimum length 21 octets. Data length = MessageLength − 21. Six error codes are defined: Message Header Error (1), OPEN Message Error (2), UPDATE Message Error (3), Hold Timer Expired (4), Finite State Machine Error (5), Cease (6).'
