document: rfc-4695
kind: design-rationale
summary: The payload format does not provide a general extension mechanism by design; instead, new payload formats are encouraged for specialized musical applications. IETF session management tools (RFC 3264, RFC 2326) support codec negotiation to enable backward-compatible use of new formats.
