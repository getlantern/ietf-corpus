document: rfc-9421
kind: privacy-consideration
summary: 'Signed messages can function as signing oracles: if an attacker can cause a party to sign attacker-chosen content (e.g., by injecting controlled values into covered components), the attacker may be able to forge signatures for chosen messages or extract information about the signing key. Applications must carefully control what components are covered.'
section: "8.3"
topics:
    - http
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
