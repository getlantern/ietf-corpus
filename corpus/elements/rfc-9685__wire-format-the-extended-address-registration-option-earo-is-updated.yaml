document: rfc-9685
kind: wire-format
summary: The Extended Address Registration Option (EARO) is updated to add a 2-bit P-Field at bit positions 2–3 (counting 0 to 7 in network order) in the flags byte, with 2 bits of Rsv (MUST be 0) at positions 0–1. The existing I, R, T flags and TID/Registration Lifetime/ROVR fields are unchanged.
section: "7.1"
topics:
