document: rfc-4341
kind: normative-requirement
summary: The sender MUST NOT decrement pipe more than once per data packet; true duplicate acknowledgements MUST NOT affect pipe, and the sender MUST NOT decrement pipe again upon receiving acknowledgement of a packet previously inferred as lost.
section: "5"
rfc2119_level: MUST NOT
topics:
    - congestion
    - udp
