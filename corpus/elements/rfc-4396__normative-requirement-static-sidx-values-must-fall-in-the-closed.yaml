document: rfc-4396
kind: normative-requirement
summary: Static SIDX values MUST fall in the closed interval [129,254] and MUST be sent out-of-band; they remain active for the whole session. Dynamic SIDX values MUST fall in [0,127] and are sent in-band. SIDX values 128 and 255 are reserved.
section: 4.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
