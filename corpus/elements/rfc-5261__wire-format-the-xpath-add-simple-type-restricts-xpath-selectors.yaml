document: rfc-5261
kind: wire-format
summary: The 'xpath-add' simple type restricts XPath selectors for <add> to allow child node targets (text(), comment(), processing-instruction(), element steps). The 'xpath' type for <replace> and <remove> additionally allows attribute axis (@qname) and namespace axis (namespace::ncname) as final steps. The 'pos' type enumerates 'before', 'after', 'prepend'. The 'ws' type enumerates 'before', 'after', 'both'.
section: "8"
