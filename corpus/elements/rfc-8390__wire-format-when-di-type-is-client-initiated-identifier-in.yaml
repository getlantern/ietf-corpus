document: rfc-8390
kind: wire-format
summary: 'When DI Type is ''Client-Initiated Identifier'' in an IPv4 Diversity XRO subobject, the Diversity Identifier Value MUST encode: 32-bit IPv4 Tunnel Endpoint Address, 16-bit Must Be Zero, 16-bit Tunnel ID, 32-bit Extended Tunnel ID, 16-bit Must Be Zero, and 16-bit LSP ID, as defined in RFC 3209.'
