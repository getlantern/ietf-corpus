document: rfc-9339
kind: security-consideration
summary: Modification of the Reverse Metric and Reverse TE Metric TLVs may result in traffic being misrouted. The security considerations from RFC 5613 (OSPF LLS) apply, and when OSPFv2 authentication is in use, the Cryptographic Authentication TLV MUST protect the entire LLS block.
section: "10"
topics:
    - security
    - routing
    - crypto
