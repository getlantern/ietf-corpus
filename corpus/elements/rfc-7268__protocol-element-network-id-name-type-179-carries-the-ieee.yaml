document: rfc-7268
kind: protocol-element
summary: Network-Id-Name (Type 179) carries the IEEE 802.1X NID-Name (up to 253 octets). Zero or one instance is permitted in Access-Request (hint), Access-Challenge, Access-Accept (authorized NID), and Accounting-Request packets. In an Access-Request it represents a hint of the desired NID-Name; in an Access-Accept it is the authorized NID-Name.
section: "2.7"
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
