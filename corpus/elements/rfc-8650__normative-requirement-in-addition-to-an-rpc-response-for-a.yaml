document: rfc-8650
kind: normative-requirement
summary: In addition to an RPC response for a 'modify-subscription' RPC traveling over connection (a), a 'subscription-modified' state change notification MUST be sent within connection (b), so the receiver knows exactly when within the stream of events the new subscription terms have been applied.
section: "3.4"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
