document: rfc-8951
kind: normative-requirement
summary: Although RFC 2616 base64 does not permit CRLF, EST receivers SHOULD tolerate white space including CR, LF, spaces (ASCII 32), and tabs (ASCII 9) in base64-encoded bodies. Senders are not required to insert any white space.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - http
    - pkix
