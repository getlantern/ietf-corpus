document: rfc-8849
kind: normative-requirement
summary: If there is only one MC in the MCC, the media provider MUST send the captureID of the current constituent MC in the RTP header extension and as an RTCP CaptureID SDES item. When the provider switches the MC it sends within an MCC, it MUST send the captureID value for the newly switched MC.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
