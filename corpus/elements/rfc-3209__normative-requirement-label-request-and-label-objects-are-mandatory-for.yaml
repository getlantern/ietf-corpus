document: rfc-3209
kind: normative-requirement
summary: 'LABEL_REQUEST and LABEL objects are mandatory for LSP tunnel setup: a receiver that accepts a LABEL_REQUEST MUST include a LABEL object in corresponding Resv messages. Conversely, a node MUST NOT include a LABEL object in a Resv message if no LABEL_REQUEST was present in the corresponding Path message.'
section: 4.2.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
