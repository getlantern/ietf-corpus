document: rfc-7463
kind: interoperability-note
summary: A UA with no knowledge of shared appearances can still register against the group AOR; the Appearance Agent assigns appearance numbers for its calls. If the UA does not support Join or Replaces, all its dialogs SHOULD be marked exclusive to avoid unnecessary SIP messaging failures.
section: "9.1"
topics:
    - sip
    - realtime
