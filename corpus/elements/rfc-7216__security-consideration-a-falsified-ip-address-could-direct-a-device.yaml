document: rfc-7216
kind: security-consideration
summary: A falsified IP address could direct a Device to a malicious LIS controlled by the attacker, which could then provide false location information via verifiable DNS records. A valid LIS for the falsified address might also return a HELD 'notLocatable' error, resulting in denial of service.
section: "6"
topics:
    - security
    - dns
