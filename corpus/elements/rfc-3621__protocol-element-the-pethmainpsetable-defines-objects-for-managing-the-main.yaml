document: rfc-3621
kind: protocol-element
summary: The pethMainPseTable defines objects for managing the main power supply of a PSE device, including nominal power (pethMainPsePower, Gauge32 in Watts), operational status (on/off/faulty), measured consumption (pethMainPseConsumptionPower), and a usage threshold (pethMainPseUsageThreshold, 1–99%). All read-write values are persistent across restart/reboot.
