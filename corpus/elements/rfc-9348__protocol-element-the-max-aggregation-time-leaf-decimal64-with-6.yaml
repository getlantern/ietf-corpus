document: rfc-9348
kind: protocol-element
summary: The max-aggregation-time leaf (decimal64 with 6 fraction-digits, units milliseconds, precision down to 1 nanosecond) specifies the maximum time a received inner packet may be held before transmission. Inner packets that would exceed this hold time under the current tunnel configuration are dropped rather than queued.
section: "3.2"
topics:
