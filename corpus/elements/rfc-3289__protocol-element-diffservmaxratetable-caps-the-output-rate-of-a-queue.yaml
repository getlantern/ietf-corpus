document: rfc-3289
kind: protocol-element
summary: diffServMaxRateTable caps the output rate of a queue or scheduler input. A multi-rate shaper requires multiple diffServMaxRateEntries, shaping traffic to the lowest specified rate that exceeds the arrival rate at any given time.
