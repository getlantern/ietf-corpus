document: rfc-8896
kind: protocol-element
summary: CalendarAttributes is an IRD object identified by the 'calendar-attributes' member of a resource entry. It groups one or more cost type names sharing the same 'time-interval-size' (seconds, JSONNumber) and 'number-of-intervals' (strictly positive integer) values. Multiple CalendarAttributes objects may appear in the array to handle cost types with different interval parameters.
section: "4.1"
topics:
