document: rfc-8264
kind: design-rationale
summary: Spaces are excluded from the IdentifierClass because many Unicode code points are confusable with SPACE (U+0020), space code points are often invisible in user interfaces, and some devices generate non-SPACE code points (e.g., ZERO WIDTH JOINER U+200D) when users press the space bar. The PRECIS WG considered discouraging spaces in identifiers a feature, not a limitation.
section: "5.3"
topics:
    - security
