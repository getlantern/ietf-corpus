document: rfc-7759
kind: protocol-element
summary: The Performance Monitoring Sub-TLV (sub-type 200) is a container carried within the MPLS OAM Functions TLV when any of the L (Loss), D (Delay), or T (Throughput) flags are set. Its PM Configuration Flags 32-bit field includes bits D (delay mode), L (loss mode), J (jitter), Y (dyadic), K (loopback), and C (combined).
section: 2.2.6
topics:
