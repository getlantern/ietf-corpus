document: rfc-7306
kind: normative-requirement
summary: CmpSwap Atomic Operations MUST target ULP Buffer addresses that are 64-bit aligned. If misaligned, the operation MUST NOT be performed, the Responder's memory MUST NOT be modified, the result MUST be surfaced as an error, and a Terminate Message MUST be generated.
section: 5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
