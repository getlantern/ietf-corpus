document: rfc-8435
kind: normative-requirement
summary: For tightly coupled storage devices, if ffdv_tightly_coupled is set, the client MUST ignore both ffds_user and ffds_group, since user and group on the storage device will be the same as on the metadata server.
section: "5.1"
rfc2119_level: MUST
