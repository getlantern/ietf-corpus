document: rfc-5247
kind: protocol-element
summary: After phase 1b, transported keying material is bound to the EAP peer and authenticator but not to a specific port. TSKs MAY be bound to particular ports by the SAP, or MAY be used on multiple ports if TSK freshness is guaranteed (e.g., via per-port replay counters). The backend authentication server and authenticator MAY apply additional attributes (e.g., Called-Station-Id, SSID filters) to further restrict key scope.
section: "3.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
