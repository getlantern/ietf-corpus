document: rfc-3928
kind: protocol-element
summary: A UUID (LCUPUUID ::= OCTET STRING) MUST be used to uniquely identify each entry because distinguished names can change and are therefore unreliable as stable identifiers. The UUID is carried in the Sync Update control value returned with each search result.
section: "3.2"
topics:
    - ldap
