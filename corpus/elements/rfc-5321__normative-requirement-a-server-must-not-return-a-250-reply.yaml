document: rfc-5321
kind: normative-requirement
summary: A server MUST NOT return a 250 reply to VRFY or EXPN unless it has actually verified the address; returning 250 merely because the syntax is valid is prohibited. Reply code 252 SHOULD be used when apparent validity cannot be confirmed in real time.
section: 3.5.3
rfc2119_level: MUST NOT
topics:
    - email
