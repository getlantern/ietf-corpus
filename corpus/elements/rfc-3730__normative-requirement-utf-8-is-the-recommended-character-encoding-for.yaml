document: rfc-3730
kind: normative-requirement
summary: UTF-8 is the RECOMMENDED character encoding for EPP. EPP clients and servers MUST accept a UTF-8 BOM if present, though emitting a UTF-8 BOM is NOT RECOMMENDED. Conformant XML parsers must recognize both UTF-8 and UTF-16.
section: "2"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
