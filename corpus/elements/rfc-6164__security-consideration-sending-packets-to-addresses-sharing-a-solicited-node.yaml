document: rfc-6164
kind: security-consideration
summary: Sending packets to addresses sharing a Solicited-Node multicast address with a router causes that router to spend significant processing time discarding useless Neighbor Solicitation messages; rate-limiting and garbage collection reduce but do not eliminate this impact, whereas /127 subnets eliminate it entirely.
section: "5.2"
topics:
