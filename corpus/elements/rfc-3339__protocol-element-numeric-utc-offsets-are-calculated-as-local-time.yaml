document: rfc-3339
kind: protocol-element
summary: Numeric UTC offsets are calculated as local time minus UTC and are expressed as "+HH:MM" or "-HH:MM". Alphabetic timezone strings (e.g., "EST") are not permitted due to historical interoperability failures.
section: "4.2"
