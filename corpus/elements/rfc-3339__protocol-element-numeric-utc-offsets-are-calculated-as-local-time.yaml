document: rfc-3339
kind: protocol-element
summary: Numeric UTC offsets are calculated as 'local time minus UTC'. Alphabetic timezone abbreviations are explicitly excluded due to historical interoperability failures. Offsets represent only zones differing from UTC by an integral number of minutes.
section: "4.2"
