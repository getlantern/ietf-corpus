document: rfc-8360
kind: normative-requirement
summary: Under amended path validation step 8, if a certificate uses the old RFC 6487 Certificate Policy (id-cp-ipAddr-asNumber) and its declared resources differ from its VRS, the certificate MUST be rejected. If it uses the new policy (id-cp-ipAddr-asNumber-v2), a warning SHOULD be issued for the overclaiming resources instead of rejection.
section: 4.2.4.4
rfc2119_level: MUST
topics:
    - pkix
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
