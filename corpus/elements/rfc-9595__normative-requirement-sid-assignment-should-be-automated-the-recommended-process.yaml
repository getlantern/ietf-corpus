document: rfc-9595
kind: normative-requirement
summary: SID assignment SHOULD be automated. The recommended process sorts items alphabetically (namespace descending, identifier ascending) then assigns SIDs sequentially from the entry point to minimize serialization overhead when using the SID delta mechanism.
section: B
rfc2119_level: SHOULD
