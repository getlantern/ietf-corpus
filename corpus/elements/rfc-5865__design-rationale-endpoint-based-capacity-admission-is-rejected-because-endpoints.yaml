document: rfc-5865
kind: design-rationale
summary: Endpoint-based capacity admission is rejected because endpoints may not accurately measure their traffic's impact on the network and tend to be greedy. A network operator providing a guaranteed service cannot trust admission decisions made by systems outside the operator's control.
section: "2.2"
topics:
    - diffserv
    - qos
    - realtime
