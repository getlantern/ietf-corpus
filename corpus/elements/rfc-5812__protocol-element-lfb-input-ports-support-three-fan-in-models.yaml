kind: protocol-element
summary: 'LFB input ports support three fan-in models: implicit multiplexing via a single input (multiple outputs connect to it), explicit multiple singleton inputs (distinct stream types, fixed count), and input groups (variable count, where the input index is visible to the LFB for scheduling or table selection).'
