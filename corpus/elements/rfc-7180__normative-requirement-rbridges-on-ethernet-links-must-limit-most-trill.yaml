document: rfc-7180
kind: normative-requirement
summary: RBridges on Ethernet links MUST limit most TRILL IS-IS PDUs so that the PDU length does not exceed Sz (the campus-wide minimum originatingL1LSPBufferSize). TRILL Hello PDUs MUST NOT exceed 1470 bytes. Sz does not limit TRILL Data frames.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
