document: rfc-7294
kind: wire-format
summary: Buffer Adjustment Concealment Duration is a 32-bit field in RTP timestamp units reporting playout of locally manufactured data due to jitter buffer adaptation or re-sizing. Concealment events that cannot be classified as Buffer Adjustment-Type MUST be classified as Loss-Type.
section: "3.2"
topics:
    - rtp
    - realtime
