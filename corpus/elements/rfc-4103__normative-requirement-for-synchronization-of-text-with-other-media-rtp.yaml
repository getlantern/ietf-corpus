document: rfc-4103
kind: normative-requirement
summary: For synchronization of text with other media, RTP streams MUST be associated at session establishment and MUST share the same reference clock. Association can be done through the CNAME field of RTCP SDES.
section: "3.4"
rfc2119_level: MUST
topics:
