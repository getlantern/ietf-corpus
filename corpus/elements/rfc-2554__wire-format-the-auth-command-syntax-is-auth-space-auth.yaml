document: rfc-2554
kind: wire-format
summary: 'The AUTH command syntax is: ''AUTH'' SPACE auth_type [SPACE (base64 / ''='')] followed by optional continuation lines of base64 data. The auth_type is 1–20 characters from ALPHA, DIGIT, ''-'', and ''_''. The AUTH= MAIL FROM parameter uses xtext encoding where the decoded value must be an addr-spec or ''<>''.'
