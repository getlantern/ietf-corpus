document: rfc-5891
kind: protocol-element
summary: 'The IDNA lookup protocol (Section 5) defines a sequential process: accept local-charset string, convert to Unicode NFC, optionally process A-label input, apply validation/character-list testing, convert to ACE via Punycode, and perform DNS resolution. Lookup validation is more permissive than registration.'
section: "5"
topics:
    - dns
