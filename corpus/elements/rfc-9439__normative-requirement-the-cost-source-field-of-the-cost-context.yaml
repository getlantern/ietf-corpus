document: rfc-9439
kind: normative-requirement
summary: The 'cost-source' field of the 'cost-context' field MUST be one that is registered in the 'ALTO Cost Source Types' registry. If a metric does not include a 'cost-source' value, the application MUST assume the value is 'estimation'.
section: "3.1"
rfc2119_level: MUST
topics:
    - registry
