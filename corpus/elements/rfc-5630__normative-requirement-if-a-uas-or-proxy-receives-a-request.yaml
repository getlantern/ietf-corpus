document: rfc-5630
kind: normative-requirement
summary: If a UAS or proxy receives a request with inconsistently used URI schemes (e.g., SIPS Request-URI but SIP Contact header field), the UAS MUST reject the request with 400 (Bad Request).
section: 5.1.2
rfc2119_level: MUST
