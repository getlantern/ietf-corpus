document: rfc-6506
kind: normative-requirement
summary: When the OSPFv3 Authentication Trailer mechanism is used, OSPFv3 header checksum calculation MUST be omitted on transmission (checksum field SHOULD be set to 0) and verification MUST be omitted on reception, though a non-zero received checksum is included in the digest verification computation.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
