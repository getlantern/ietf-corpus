document: rfc-5575
kind: wire-format
summary: 'Flow specification components use a numeric operator byte with fields: e (end-of-list bit), a (AND bit for logical combination with previous term), len (value field length as 1<<len bytes), lt (less than), gt (greater than), and eq (equality). The lt, gt, and eq bits can be combined to produce ranges and inequalities.'
section: "4"
