document: rfc-3839
kind: protocol-element
summary: The 3GP file format is based on the ISO Media File Format and contains an intrinsic file-type box that identifies specifications the file complies with via four-letter 'brands'. At the time of writing, supported codecs include H.263 or MPEG-4 video, AMR Narrow-band, AMR Wide-band speech, AAC audio, and 3GPP timed text.
section: "1"
