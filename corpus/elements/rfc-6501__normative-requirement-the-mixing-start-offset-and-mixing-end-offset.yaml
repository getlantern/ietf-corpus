document: rfc-6501
kind: normative-requirement
summary: The <mixing-start-offset> and <mixing-end-offset> elements MUST each include the 'required-participant' attribute specifying the participant role (none, administrator, moderator, user, observer, participant) whose presence triggers the mixing start or stop event.
section: 4.2.5
rfc2119_level: MUST
topics:
