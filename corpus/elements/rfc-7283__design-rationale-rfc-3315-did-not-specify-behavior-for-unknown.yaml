document: rfc-7283
kind: design-rationale
summary: RFC 3315 did not specify behavior for unknown message types, leading to relay agents inappropriately dropping messages and DHCP agents inappropriately processing them. This document fills that gap by providing explicit normative behavior for all three agent roles.
section: "3"
topics:
