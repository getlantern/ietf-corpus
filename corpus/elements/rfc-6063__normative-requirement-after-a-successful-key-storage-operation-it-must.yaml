document: rfc-6063
kind: normative-requirement
summary: After a successful key storage operation, it MUST NOT be possible to overwrite the key unless knowledge of an authorizing key is proven through a MAC on a later KeyProvServerHello (and KeyProvServerFinished) message.
section: 4.2.5
rfc2119_level: MUST NOT
topics:
    - security
