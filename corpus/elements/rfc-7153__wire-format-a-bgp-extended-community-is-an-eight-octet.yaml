document: rfc-7153
kind: wire-format
summary: A BGP Extended Community is an eight-octet quantity. The high-order octet is the 'Type' field. For 'Extended Types', the second octet is a 'Sub-Type' field and the remaining six octets are the 'Value' field. For 'Regular Types', there is no Sub-Type and the Value field occupies seven octets.
