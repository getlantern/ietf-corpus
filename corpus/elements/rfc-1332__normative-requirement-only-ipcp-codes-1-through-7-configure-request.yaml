document: rfc-1332
kind: normative-requirement
summary: Only IPCP Codes 1 through 7 (Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, and Code-Reject) are used. Other Codes should be treated as unrecognized and should result in Code-Rejects.
section: "2"
rfc2119_level: SHOULD
