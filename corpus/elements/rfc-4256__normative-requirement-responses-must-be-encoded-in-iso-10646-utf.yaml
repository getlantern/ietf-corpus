document: rfc-4256
kind: normative-requirement
summary: Responses MUST be encoded in ISO-10646 UTF-8. If the client reads responses in another encoding (e.g., ISO 8859-1), it MUST convert them to UTF-8 before transmitting.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
