document: rfc-6926
kind: normative-requirement
summary: Servers MUST be able to limit concurrent accepted connections; BULK_LQ_MAX_CONNS (default 10) SHOULD be the enforced limit. Connections exceeding this limit SHOULD be closed immediately.
