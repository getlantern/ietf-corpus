document: rfc-7272
kind: security-consideration
summary: IDMS implementations SHOULD include source authentication and message integrity measures (as surveyed in RFC 7201) to reduce vulnerability to man-in-the-middle attacks that could insert erroneous IDMS reports. Message confidentiality also prevents third parties from correlating receivers via the Media Stream Correlation Identifier.
section: "12"
topics:
    - security
    - rtp
    - realtime
    - privacy
