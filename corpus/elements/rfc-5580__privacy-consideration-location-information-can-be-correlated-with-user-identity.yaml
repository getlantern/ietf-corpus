document: rfc-5580
kind: privacy-consideration
summary: Location information can be correlated with user identity through MAC addresses, fixed IP addresses, EAP identity exchanges, RADIUS Class Attributes, mobility protocols, and application-layer identifiers. Preventing identity/location correlation requires suppressing identity leakage from all sources simultaneously.
section: "7.3"
