document: rfc-8518
kind: protocol-element
summary: When the OSPF forwarding address is non-zero, LFA inequalities use F_opt(X,Y) — the shortest-path distance from X to the forwarding address specified by ASBR Y — instead of D_opt(X,Y) to the ASBR itself, for all three protection types (link, downstream, node).
section: 4.2.2.1
topics:
    - routing
