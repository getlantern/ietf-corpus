document: rfc-5801
kind: design-rationale
summary: GS2 was created because GS1 (the original GSS-API->SASL bridge, RFC 4752) was not round-trip optimized and did not support channel binding. GS2 fixes both deficiencies and also serves as the bridge for newer mechanisms such as SCRAM.
section: "1"
topics:
