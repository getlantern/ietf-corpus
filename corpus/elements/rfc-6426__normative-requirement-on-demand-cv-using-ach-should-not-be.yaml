document: rfc-6426
kind: normative-requirement
summary: On-demand CV using ACH SHOULD NOT be used when there is ECMP for a given LSP, as the additional ACH header can modify hashing behavior and result in incorrect monitoring of the path taken by data traffic.
section: "4.4"
rfc2119_level: SHOULD NOT
topics:
