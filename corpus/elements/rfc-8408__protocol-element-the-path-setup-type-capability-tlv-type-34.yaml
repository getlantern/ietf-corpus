document: rfc-8408
kind: protocol-element
summary: The PATH-SETUP-TYPE-CAPABILITY TLV (Type 34) is carried in the OPEN object during PCEP session initialization to advertise which Path Setup Types (PSTs) a PCEP speaker supports. It contains a list of one-byte PST values, optional sub-TLVs, and a Num of PSTs field.
