document: rfc-6470
kind: normative-requirement
summary: A NETCONF server MUST report events that are directly related to the NETCONF protocol. A server MAY report events for non-NETCONF management sessions, using the 'session-id' value of zero.
section: "2.1"
rfc2119_level: MUST
topics:
