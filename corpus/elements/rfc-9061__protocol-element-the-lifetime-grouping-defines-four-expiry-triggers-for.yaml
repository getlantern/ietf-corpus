document: rfc-9061
kind: protocol-element
summary: 'The lifetime grouping defines four expiry triggers for IPsec SAs: time (seconds since SA addition), bytes processed, packets processed, and idle time (seconds without traffic). Value 0 means infinite for each. When bytes or packets limits are reached, the SA SHOULD be rekeyed; when idle limit is reached, the SA SHOULD be removed.'
section: 5.1.1
topics:
    - ipsec
    - yang
