document: rfc-5397
kind: design-rationale
summary: The existing DAV:principal-match REPORT produces ambiguous results because it returns both the individual user principal and every group principal the user belongs to, with no clear way to distinguish them. DAV:current-user-principal was introduced to unambiguously identify the principal resource for the current user.
section: "1"
topics:
    - http
