document: rfc-5046
kind: protocol-element
summary: The TargetRecvDataSegmentLength and InitiatorRecvDataSegmentLength keys replace MaxRecvDataSegmentLength for iSER sessions, defining the maximum RDMA Send message size each side can receive. These govern the size of iSCSI control-type PDU transfers only, since SCSI data is moved via RDMA Write/Read.
section: "6.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
