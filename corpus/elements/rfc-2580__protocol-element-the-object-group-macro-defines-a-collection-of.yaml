document: rfc-2580
kind: protocol-element
summary: The OBJECT-GROUP macro defines a collection of related managed objects for conformance purposes. Each object in the group must have a MAX-ACCESS clause of 'accessible-for-notify', 'read-only', 'read-write', or 'read-create'. The macro's value is an OBJECT IDENTIFIER naming the group.
