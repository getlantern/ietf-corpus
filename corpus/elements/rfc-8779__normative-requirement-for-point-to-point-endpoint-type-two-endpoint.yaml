document: rfc-8779
kind: normative-requirement
summary: 'For Point-to-Point endpoint type, two endpoint TLVs MUST be present: the first is the source and the second is the destination. For P2MP, the root endpoint MUST be the same for all END-POINTS objects; inconsistent root endpoints require a PCErr with Error-Type=17 and Error-value=4.'
section: 2.5.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
