document: rfc-3720
kind: security-consideration
summary: iSCSI provides in-band authentication during Login via CHAP, SRP, Kerberos (KRB5), or SPKM, negotiated through the AuthMethod key. For network-layer security, IPsec ESP in transport or tunnel mode provides data integrity, authentication, anti-replay, and optional confidentiality for the full iSCSI data stream.
