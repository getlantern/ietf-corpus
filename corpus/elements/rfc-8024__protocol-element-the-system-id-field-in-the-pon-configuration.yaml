document: rfc-8024
kind: protocol-element
summary: The System ID field in the PON Configuration TLV is 8 octets encoding the OLT chassis MAC address. When a 6-octet MAC is used, the two least-significant octets are encoded as 0x0000, providing a uniform field width across implementations.
