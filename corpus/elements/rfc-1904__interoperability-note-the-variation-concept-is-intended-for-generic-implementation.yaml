document: rfc-1904
kind: interoperability-note
summary: The VARIATION concept is intended for generic implementation restrictions. If a variation depends on the runtime values of other objects, that dependency should be noted in the DESCRIPTION clause rather than encoded structurally, since the macro cannot express value-dependent branching.
section: 6.5.2
