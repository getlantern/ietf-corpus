document: rfc-2741
kind: normative-requirement
summary: The NETWORK_BYTE_ORDER bit in h.flags must govern byte ordering for all multi-byte integer values in the entire AgentX packet. If set, network (big-endian) byte order is used; if not set, little-endian is used. This bit applies to all AgentX PDUs.
section: "6.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
