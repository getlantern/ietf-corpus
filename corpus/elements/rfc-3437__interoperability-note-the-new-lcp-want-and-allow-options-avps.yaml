document: rfc-3437
kind: interoperability-note
summary: The new LCP Want and Allow Options AVPs may coexist with Proxy LCP and Proxy Authentication AVPs from RFC 2661. If Proxy AVPs are received, the LNS may accept them or renegotiate LCP using the suggestions in the new AVPs. To force LNS-side LCP negotiation, the LAC should omit all Proxy AVPs.
section: "2"
topics:
