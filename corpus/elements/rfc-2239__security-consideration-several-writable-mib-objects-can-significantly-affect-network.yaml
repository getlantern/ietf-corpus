document: rfc-2239
kind: security-consideration
summary: Several writable MIB objects can significantly affect network operation, including enabling/disabling MAUs, changing default MAU type, and modifying auto-negotiation capabilities. Implementers are recommended to require at minimum authentication of request origin before permitting set operations on this MIB.
section: "6"
topics:
