document: rfc-7887
kind: design-rationale
summary: When the same Join/Prune attribute values need to be specified for multiple sources in a PIM Join/Prune message, RFC 5384 requires them to be repeated for each individual source. This document introduces a hierarchical encoding so that message-wide or group-wide attributes need only be specified once, reducing message size.
section: "1"
topics:
    - multicast
    - routing
