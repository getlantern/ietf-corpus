document: rfc-9646
kind: protocol-element
summary: 'The ''ietf-ztp-types'' module defines three reusable YANG groupings: ''csr-support-grouping'' (client capability announcement), ''csr-request-grouping'' (server''s CSR request), and ''csr-grouping'' (client''s CSR submission). These are defined independently of ''ietf-sztp-csr'' so other bootstrapping protocols can reuse them.'
