document: rfc-9259
kind: security-consideration
summary: An on-path attacker able to observe the OAM channel carrying exported packets marked by the O-flag could conduct traffic analysis or eavesdropping on telemetry for the entire SR domain. The security properties of the OAM export channel depend on the specific OAM processes deployed.
