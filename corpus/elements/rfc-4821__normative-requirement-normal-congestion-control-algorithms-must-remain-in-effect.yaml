document: rfc-4821
kind: normative-requirement
summary: Normal congestion control algorithms MUST remain in effect under all conditions except when only an isolated probe packet is detected as lost; in that one case, the normal congestion window or data rate reduction SHOULD be suppressed. If any other data loss is detected, standard congestion control MUST take place.
section: "4"
rfc2119_level: MUST
topics:
    - congestion
    - tcp
