document: rfc-8185
kind: protocol-element
summary: The MPLS-TP Dual-Homing Coordination (DHC) message is sent on the DNI-PW between dual-homing PEs over the Generic Associated Channel (G-ACh). It consists of a 4-octet G-ACh common header, a 4-octet Dual-Homing Group ID, a 2-octet TLV Length, a 2-octet Reserved field, and a variable-length TLV section.
section: "4.1"
topics:
