document: rfc-9393
kind: normative-requirement
summary: The hash-alg-id in a hash-entry MUST refer to an ID in the IANA Named Information Hash Algorithm Registry with a Status of 'current'; other hash algorithms MUST NOT be used. If the algorithm is unknown, the integer value '0' MUST be used.
section: 2.9.1
rfc2119_level: MUST
topics:
    - cbor
    - crypto
    - registry
