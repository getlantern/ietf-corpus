document: rfc-9580
kind: normative-requirement
summary: A v3 PKESK packet MUST NOT precede a v2 SEIPD packet, and a v6 PKESK packet MUST NOT precede a v1 SEIPD packet or a deprecated SED packet. PKESK packet version must align with the SEIPD packet version.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
