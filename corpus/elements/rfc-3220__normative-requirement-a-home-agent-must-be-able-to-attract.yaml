document: rfc-3220
kind: normative-requirement
summary: A home agent MUST be able to attract and intercept datagrams destined to the home address of any registered mobile node. A mobile node and foreign agent MUST be able to exchange datagrams without relying on standard IP routing (e.g., by sharing a link and using link-layer addresses directly).
section: "1.7"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
