document: rfc-8159
kind: normative-requirement
summary: 'The cookie value MUST be able to be changed at any time without dropping legitimate tunneled packets: the receiver MUST be configurable to accept two discrete cookies for a single tunnel simultaneously, holding both ''old'' and ''new'' values during transition. Cookie values SHOULD be changed periodically by the management plane.'
section: "3"
rfc2119_level: MUST
topics:
    - security
    - vpn
