document: rfc-2301
kind: security-consideration
summary: Security considerations for the TIFF-FX file format are addressed in Section 10. As a file format specification for image data, implementors should apply standard defensive parsing practices against malformed or malicious TIFF files, particularly given the complexity of multi-strip, multi-IFD structures.
section: "10"
topics:
