document: rfc-8577
kind: normative-requirement
summary: The ETLD MUST be decremented at each non-delegation transit hop, and at each delegation hop the ETLD MUST be reset to the maximum number of transport labels that the hop can send. The ETLD field MUST be set to a non-zero value.
section: 5.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
