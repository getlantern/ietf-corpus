document: rfc-2782
kind: protocol-element
summary: The Service field is an underscore-prefixed symbolic name of the desired service (e.g., `_ldap`), as defined in Assigned Numbers or locally. The field is case insensitive, and the underscore prevents collisions with naturally occurring DNS labels.
section: The format of the SRV RR
