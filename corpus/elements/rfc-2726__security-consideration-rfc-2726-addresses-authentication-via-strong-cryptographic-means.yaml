document: rfc-2726
kind: security-consideration
summary: RFC 2726 addresses authentication—via strong cryptographic means (PGP digital signatures)—of transactions that add, delete, or update routing policy information in the RIPE database. Authorization of these transactions is addressed separately in RFC 2725.
