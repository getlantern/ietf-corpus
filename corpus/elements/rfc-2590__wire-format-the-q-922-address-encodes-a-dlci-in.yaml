summary: 'The Q.922 address encodes a DLCI in canonical (least-significant-bit-first) order. Three DLCI sizes are defined: 10 bits (2-octet Q.922), 17 bits (4-octet Q.922), and 23 bits (4-octet Q.922), distinguished by specific bit patterns in the address octets.'
