document: rfc-6790
kind: interoperability-note
summary: This document updates LSP traceroute (RFC 4379) to specify that the label range value for path verification is placed in the entropy label. For BFD (RFC 5884), a value from the label range for a given path should be used as the EL value for BFD packets on that path, enabling per-path session tracking.
section: "6"
topics:
    - mpls
