document: rfc-8237
kind: wire-format
summary: 'The PW status refresh reduction message is carried over the MPLS G-ACh (Channel Type 0x29) and contains: MPLS LSP Label Stack Entry, GAL, G-ACh header (PW OAM Message 0x29), Session ID (16-bit), Ack Session ID (16-bit), Refresh Timer (16-bit), Total Message Length (16-bit), and optional Checksum, Message Sequence Number, Last Received Sequence Number, Message Type, Flags, and Control Message Body.'
