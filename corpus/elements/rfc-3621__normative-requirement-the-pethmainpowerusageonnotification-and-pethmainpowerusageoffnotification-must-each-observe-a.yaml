document: rfc-3621
kind: normative-requirement
summary: The pethMainPowerUsageOnNotification and pethMainPowerUsageOffNotification MUST each observe a minimum inter-notification gap of at least 500 milliseconds per object instance to prevent notification storms when power consumption oscillates around the threshold.
section: "5"
rfc2119_level: MUST
