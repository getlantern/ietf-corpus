document: rfc-9429
kind: state-machine
summary: 'JSEP defines a five-state offer/answer machine: stable, have-local-offer, have-remote-offer, have-local-pranswer, and have-remote-pranswer. Transitions are triggered by setLocalDescription and setRemoteDescription with offer, pranswer, answer, or rollback types. A rollback returns the machine to the previous stable state.'
section: "3.2"
topics:
