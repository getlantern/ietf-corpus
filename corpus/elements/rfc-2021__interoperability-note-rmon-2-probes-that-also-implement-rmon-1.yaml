document: rfc-2021
kind: interoperability-note
summary: 'RMON 2 probes that also implement RMON 1 augment all RMON 1 tables with DroppedFrames and LastCreateTime, and extend filter/capture status bits: bit 6 for WAN direction, bit 7 for any physical-layer error, bit 8 for undersized packets, and bit 9 for oversized packets. These additions impose no requirements on RMON-only probes.'
section: "2.2"
topics:
