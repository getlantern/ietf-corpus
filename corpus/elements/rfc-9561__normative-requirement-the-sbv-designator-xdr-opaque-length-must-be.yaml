document: rfc-9561
kind: normative-requirement
summary: The 'sbv_designator' XDR opaque<> length MUST be 16 octets for an NVMe NGUID identifier and MUST be 8 octets for an NVMe EUI64 identifier. All other lengths MUST NOT be used with an NVMe namespace.
section: "2.1"
rfc2119_level: MUST
