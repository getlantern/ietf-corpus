document: rfc-4483
kind: normative-requirement
summary: Changes in the underlying content referred to by a URI MUST result in a change in the Content-ID associated with that URI. Multiple SIP messages carrying URIs referring to the same content SHOULD reuse the same Content-ID to enable caching.
section: "5.6"
rfc2119_level: MUST
topics:
    - sip
    - email
