document: rfc-5676
kind: security-consideration
summary: Unauthorized modification of syslogMsgTableMaxSize can increase memory consumption or eliminate the GET-based notification retrieval capability; unauthorized modification of syslogMsgEnableNotifications can suppress real-time alerts or enable DoS against a network management system via notification flooding.
