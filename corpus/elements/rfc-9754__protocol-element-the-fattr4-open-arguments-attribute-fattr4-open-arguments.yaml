document: rfc-9754
kind: protocol-element
summary: The fattr4_open_arguments attribute (FATTR4_OPEN_ARGUMENTS = 86) provides a capability-probing framework for OPEN extensions, modeled using bitmap4 structures for each OPEN argument category (share_access, share_deny, share_access_want, open_claim, create_mode). Its scope applies to all objects with a matching fsid.
section: "3"
extracted_by: claude-sonnet-4-6
