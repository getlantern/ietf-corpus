document: rfc-6761
kind: interoperability-note
summary: Application software and name resolution libraries SHOULD NOT treat private-address reverse-mapping names, 'test.' names, or example domain names differently from ordinary names; special treatment at these layers is reserved for 'localhost.' and 'invalid.' which have protocol-guaranteed resolution behavior.
section: "6.1"
topics:
    - dns
