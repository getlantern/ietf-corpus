document: rfc-1233
kind: interoperability-note
summary: Controlled Slip Seconds (CSS) is only supported on SYNTRAN interfaces. Agents configured with non-SYNTRAN interfaces may treat ds3IntervalCSSs, ds3CurrentCSSs, and ds3TotalCSSs as having an ACCESS clause value of not-accessible.
