document: rfc-7330
kind: normative-requirement
summary: Attempts to set an IANAbfdSessAuthenticationKeyTC object to a value inconsistent with the associated IANAbfdSessAuthenticationTypeTC must fail with an inconsistentValue error. The key value must always be consistent with the associated authentication type.
section: "3"
rfc2119_level: MUST
topics:
