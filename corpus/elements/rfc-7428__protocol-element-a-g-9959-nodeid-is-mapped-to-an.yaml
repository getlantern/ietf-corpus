document: rfc-7428
kind: protocol-element
summary: 'A G.9959 NodeID is mapped to an IEEE EUI-64-style IID as: IID = 0000:00ff:fe00:YYXX, where XX is the 8-bit NodeID and YY is a 1-byte interface discriminator (default zero). Multiple IPv6 interfaces may be instantiated by using non-zero YY values.'
