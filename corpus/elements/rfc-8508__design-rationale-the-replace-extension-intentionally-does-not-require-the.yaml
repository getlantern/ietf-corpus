document: rfc-8508
kind: design-rationale
summary: The REPLACE extension intentionally does not require the target mailbox to match the selected mailbox, enabling use cases such as moving a finalized draft directly to \Sent by replacing a \Drafts message with submission to a different special-use mailbox.
