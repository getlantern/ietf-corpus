document: rfc-8245
kind: design-rationale
summary: Defining an UNSPECIFIED Value (value 255) for Address Block TLVs with discrete values is recommended to allow a single multivalue TLV to span addresses that don't need the attribute, reducing the total number of TLVs needed and producing smaller messages.
section: "6.3"
topics:
    - routing
