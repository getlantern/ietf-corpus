document: rfc-8622
kind: normative-requirement
summary: LE traffic SHOULD be congestion controlled, using a congestion-controlled transport or an appropriate congestion control method. Transport protocols or applications SHOULD be able to detect and react to starvation situations caused by prolonged absence of LE forwarding resources.
section: "3"
rfc2119_level: SHOULD
