document: rfc-8441
kind: normative-requirement
summary: On requests bearing :protocol, the server MUST NOT create a tunnel to the host indicated by :authority as it would with an unmodified CONNECT request. The :authority pseudo-header is interpreted per RFC 7540 Section 8.1.2.3 rather than Section 8.3.
section: "4"
rfc2119_level: MUST NOT
topics:
    - websocket
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
