document: rfc-9328
kind: design-rationale
summary: 'The Z bit (nuh_reserved_zero_bit) is not overloaded for local extensions: overloading the F bit is sufficient for local signaling, and preserving Z maintains compatibility with possible future versions of the VVC specification that may assign semantics to this reserved bit.'
