document: rfc-3831
kind: normative-requirement
summary: An FC Information Unit containing an IPv6 packet MUST carry the FC Network_Header and the LLC/SNAP header. Only the first frame of the Sequence MUST include these headers; subsequent frames MUST NOT include them.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
