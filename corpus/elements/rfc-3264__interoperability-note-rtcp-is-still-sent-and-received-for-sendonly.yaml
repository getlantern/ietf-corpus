document: rfc-3264
kind: interoperability-note
summary: RTCP is still sent and received for sendonly, recvonly, and inactive RTP streams; the directionality of the media stream has no impact on RTCP usage. For sendonly streams, the RTCP port is one higher than the indicated port unless explicitly indicated otherwise.
section: "5.1"
topics:
    - realtime
    - rtp
