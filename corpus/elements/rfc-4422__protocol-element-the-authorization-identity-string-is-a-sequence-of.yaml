document: rfc-4422
kind: protocol-element
summary: The authorization identity string is a sequence of zero or more Unicode characters excluding NUL (U+0000). An absent or empty string means the client requests to act as the identity associated with its credentials; a non-empty string requests to act as that represented identity.
section: 3.4.1
topics:
    - security
