summary: 'mplsTunnelRole designates each tunnel entry''s function: head(1) at the originating LSR, transit(2) at intermediate LSRs, tail(3) at the terminating LSR, or headTail(4) when the tunnel begins and ends on the same LSR. This value must be set at row creation.'
