document: rfc-8270
kind: protocol-element
summary: SSH_MSG_KEY_DH_GEX_REQUEST is the client message used in DH Group Exchange; it carries 'min' (minimum acceptable group size), 'n' (preferred group size), and 'max' (maximum acceptable group size) in bits. The minimum acceptable 'min' value is updated to 2048 bits by this document.
