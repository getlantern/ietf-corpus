document: rfc-9034
kind: interoperability-note
summary: 'When a packet transits from one DODAG to another with a different time zone (reference clock), the 6LBR at the boundary updates the DT field to express the deadline in the new network''s time reference and recalculates OTD to account for delay already experienced, using: new_network_origin_time = time_now_in_new_network - current_dly.'
section: "6.3"
topics:
