document: rfc-7848
kind: wire-format
summary: Mark and SMD identifiers use the <mark:id> type, encoded as a concatenation of a local identifier, a hyphen ('-', ASCII 0x002D), and an issuer identifier. The XSD pattern is '\d+-\d+'.
section: "3.2"
