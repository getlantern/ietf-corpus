document: rfc-7252
kind: protocol-element
summary: 'CoAP defines three response delivery modes: Piggybacked (response carried in the ACK message that acknowledges the CON request), Separate (server sends an Empty ACK immediately, then a new CON or NON carrying the response), and Non-confirmable (response in a NON message, used when request was NON). The server chooses which mode to use; the client MUST be prepared to receive any of them.'
section: "5.2"
topics:
    - http
    - udp
