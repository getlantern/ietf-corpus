document: rfc-5097
kind: design-rationale
summary: All non-error counters in the UDP-Lite MIB use 64-bit (Counter64) instead of the 32-bit counters used in the UDP MIB. This choice is justified by UDP-Lite being a newer protocol and the continued growth of network speeds.
section: "1.1"
topics:
    - snmp
    - udp
