document: rfc-6184
kind: protocol-element
summary: 'The NRI (nal_ref_idc) field serves dual purpose: zero indicates the NAL unit is not needed for reference picture reconstruction and may be discarded; non-zero values convey relative transport priority (11=highest, 10, 01, 00=lowest) that MANEs can use for selective packet dropping under congestion.'
section: "5.3"
