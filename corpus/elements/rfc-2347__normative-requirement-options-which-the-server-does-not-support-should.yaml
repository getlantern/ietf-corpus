document: rfc-2347
kind: normative-requirement
summary: Options which the server does not support should be omitted from the OACK; they should not cause an ERROR packet to be generated. If the value of a supported option is invalid, the option specification determines whether the server omits it, proposes an alternate value, or sends ERROR code 8.
section: Negotiation Protocol
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
