document: rfc-3597
kind: normative-requirement
summary: Servers MUST exactly preserve the RDATA of RRs of known type (except for permitted compression/decompression changes) to ensure correct equality comparison and DNSSEC canonical form when an RR type is known to some but not all servers. In particular, the character case of domain names not subject to compression MUST be preserved.
section: "3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
