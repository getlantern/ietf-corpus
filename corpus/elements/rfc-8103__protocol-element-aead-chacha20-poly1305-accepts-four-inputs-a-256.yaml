document: rfc-8103
kind: protocol-element
summary: 'AEAD_CHACHA20_POLY1305 accepts four inputs: a 256-bit key, a 96-bit nonce, an arbitrary-length plaintext, and an arbitrary-length additional authenticated data (AAD). It produces two outputs: ciphertext of the same length as the plaintext and a 128-bit authentication tag.'
section: "1.1"
