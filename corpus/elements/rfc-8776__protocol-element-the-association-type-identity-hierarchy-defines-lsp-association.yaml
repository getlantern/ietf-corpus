document: rfc-8776
kind: protocol-element
summary: 'The ''association-type'' identity hierarchy defines LSP association types: recovery (RFC 4872/6780 for grouping LSPs of the same tunnel), resource-sharing for make-before-break (RFC 4873/6780), double-sided bidirectional (RFC 7551 with independent per-endpoint configuration), and single-sided bidirectional (RFC 6780/7551 with one endpoint dynamically created).'
