document: rfc-5584
kind: design-rationale
summary: The Fragment Number field is only 3 bits because this is sufficient to avoid rollover given the maximum supported ATRAC bit-rate at time of publication; the spec notes this choice should be revisited if the maximum bit-rate increases.
