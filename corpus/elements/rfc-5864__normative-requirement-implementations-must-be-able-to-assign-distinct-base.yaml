document: rfc-5864
kind: normative-requirement
summary: Implementations MUST be able to assign distinct base ranks for at least ten distinct priority values. If more distinct priority values are encountered than can be represented as base ranks, implementations SHOULD fall back to generating ranks based solely on priorities, ignoring other rank inputs and disabling dynamic rank adjustment.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
