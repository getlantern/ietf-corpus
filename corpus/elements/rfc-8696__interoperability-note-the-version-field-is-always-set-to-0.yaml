document: rfc-8696
kind: interoperability-note
summary: The version field is always set to 0 in both KeyTransPSKRecipientInfo and KeyAgreePSKRecipientInfo, even as the syntax may evolve. The document notes that some implementations do not check version numbers before attempting a decode and only check them as part of error handling; this 'forgiving' approach is described as reasonable.
section: "1.3"
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
