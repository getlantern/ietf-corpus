document: rfc-4388
kind: interoperability-note
summary: Servers that do not implement the DHCPLEASEQUERY message SHOULD simply not respond. When an access concentrator receives no response, it cannot distinguish between packet loss and a non-supporting server, and SHOULD use exponential backoff per RFC 2131 Section 4.1 for retransmission.
section: "6.6"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
