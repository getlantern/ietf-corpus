document: rfc-1541
kind: protocol-element
summary: The 'giaddr' (gateway IP address) field carries the relay agent's address. If non-zero, the server sends return messages to UDP port 67 on the relay agent at 'giaddr'. If zero and 'ciaddr' is set, the server unicasts to 'ciaddr'; otherwise it broadcasts or uses 'chaddr' for link-layer delivery.
section: "4.1"
topics:
    - ip
