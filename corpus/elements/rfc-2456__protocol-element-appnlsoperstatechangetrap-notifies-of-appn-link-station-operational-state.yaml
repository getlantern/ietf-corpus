document: rfc-2456
kind: protocol-element
summary: 'appnLsOperStateChangeTrap notifies of APPN link station operational state transitions, carrying appnLsTableChanges and appnLsOperState. Sending rules are the same as for the port trap: only on transitions to ''active'' or ''inactive'', row creation only if active, row deletion only if last state was active.'
