document: rfc-8857
kind: wire-format
summary: BFCP messages use TLV (Type-Length-Value) binary encoding and MUST be carried in unfragmented binary WebSocket frames with FIN bit set to 1 and opcode %x2 (binary frame). Maximum payload size is 2^16 + 12 bytes per RFC 8855.
section: "4.2"
topics:
    - websocket
    - realtime
