document: rfc-8915
kind: wire-format
summary: The Unique Identifier extension field (Field Type 0x0104) carries a cryptographically random octet string in client packets; the body MUST be at least 32 octets. Servers echo the identical octet string in their response to enable replay detection.
section: "5.3"
topics:
