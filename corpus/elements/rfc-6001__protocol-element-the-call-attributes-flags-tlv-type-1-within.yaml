document: rfc-6001
kind: protocol-element
summary: The Call Attributes Flags TLV (Type 1 within CALL_ATTRIBUTES) carries a 32-bit-aligned bit array. Unassigned bits MUST be set to zero on transmission. Absent bits (due to foreshortening or absent TLV) MUST be treated as present and zero.
section: 5.1.4
topics:
    - mpls
    - routing
