document: rfc-4220
kind: security-consideration
summary: The MIB module contains writable objects that could be used to configure or disrupt TE link settings. Unauthorized modifications could affect traffic engineering parameters and disrupt network operation. Implementations should use SNMPv3 with authentication and privacy to protect against unauthorized access and modification.
section: "10"
topics:
    - mpls
    - security
    - snmp
