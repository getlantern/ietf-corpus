document: rfc-9493
kind: normative-requirement
summary: Every member within a Subject Identifier MUST match the rules specified for that member by the Identifier Format. A Subject Identifier MUST NOT contain any members prohibited or not described by its Identifier Format and MUST contain all required members.
section: "3"
rfc2119_level: MUST
