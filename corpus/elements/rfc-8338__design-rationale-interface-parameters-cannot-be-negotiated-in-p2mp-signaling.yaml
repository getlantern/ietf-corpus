document: rfc-8338
kind: design-rationale
summary: Interface parameters cannot be negotiated in P2MP signaling because the LDP Label Mapping Message is only sent by the R-PE to all L-PEs unidirectionally; instead, L-PEs check their values against R-PE thresholds rather than performing a bidirectional negotiation as in P2P PW.
