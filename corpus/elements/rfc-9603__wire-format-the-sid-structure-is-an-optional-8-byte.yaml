summary: 'The SID Structure is an optional 8-byte field within the SRv6-ERO/SRv6-RRO subobject encoding the bit lengths of the SRv6 SID components: LB Length (1 octet, locator block), LN Length (1 octet, locator node), Fun. Length (1 octet, function), and Arg. Length (1 octet, arguments), followed by a 3-octet Reserved and 1-octet Flags.'
