document: rfc-5122
kind: normative-requirement
summary: If the processing application does not understand query components or the specified query type, it MUST ignore the query component and treat the IRI/URI as consisting only of the base address. If it does not understand a particular key, it MUST ignore that key and its associated value.
section: "2.5"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
