document: rfc-6536
kind: security-consideration
summary: '''Fishing'' attacks allow a session with some write access but no read access to a sensitive subtree to determine the presence or absence of sensitive data by repeatedly issuing edit requests and observing whether access-denied errors are returned, even without the error-path field being present in the response.'
section: 3.7.2
topics:
