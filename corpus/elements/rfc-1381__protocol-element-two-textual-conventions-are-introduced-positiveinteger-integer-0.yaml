summary: 'Two textual conventions are introduced: PositiveInteger (INTEGER 0..2147483647), used for frame sizes and timers, and IfIndexType (INTEGER 1..2147483647), used as an index whose values match MIB-II ifIndex. Their introduction does not alter SMI or SNMP encoding rules.'
