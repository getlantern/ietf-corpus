document: rfc-9780
kind: design-rationale
summary: A new G-ACh channel type (0x0013) is required for non-IP multipoint BFD because PW-ACH encapsulation without IP/UDP headers prevents an implementation from verifying the identity of the MultipointHead, making proper BFD session demultiplexing impossible.
section: "3.2"
topics:
