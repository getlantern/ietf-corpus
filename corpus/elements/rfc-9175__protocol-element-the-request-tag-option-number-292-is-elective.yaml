document: rfc-9175
kind: protocol-element
summary: The Request-Tag option (number 292) is elective, safe to forward, repeatable, and part of the cache key. Its format is opaque with length 0–8 bytes and no default value. It is set by the CoAP client to distinguish concurrent block-wise request operations on the same resource.
section: 3.2.1
topics:
    - security
