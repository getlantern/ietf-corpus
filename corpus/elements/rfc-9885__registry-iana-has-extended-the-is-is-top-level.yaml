document: rfc-9885
kind: registry
summary: IANA has extended the 'IS-IS Top-Level TLV Codepoints' registry with an MP column indicating MP-TLV applicability per codepoint. Key entries with MP=Y include Extended IS reachability (22), Extended IP reachability (135), GMPLS-SRLG (138), SRv6 Locator (27), MT-ISN (222), IS-IS Router CAPABILITY TLV (242), and Application-Specific SRLG (238).
section: 9.2.1
