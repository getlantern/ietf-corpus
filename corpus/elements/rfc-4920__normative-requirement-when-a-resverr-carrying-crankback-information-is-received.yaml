document: rfc-4920
kind: normative-requirement
summary: When a ResvErr carrying crankback information is received at an egress LSR that supports crankback extensions, and after all local recovery procedures have failed, it SHOULD generate a PathErr message carrying the crankback information and send it to the ingress LSR.
section: 6.5.1
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
