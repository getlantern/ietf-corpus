document: rfc-4721
kind: normative-requirement
summary: The foreign agent MUST NOT accept any Challenge in the Registration Request unless it was offered in the last Registration Reply, unicast Agent Advertisement sent to the mobile node, or advertised as one of the last CHALLENGE_WINDOW Challenge values in preceding Agent Advertisements.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mobility
    - security
