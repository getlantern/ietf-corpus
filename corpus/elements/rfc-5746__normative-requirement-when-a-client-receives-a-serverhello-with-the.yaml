document: rfc-5746
kind: normative-requirement
summary: When a client receives a ServerHello with the `renegotiation_info` extension on an initial handshake, the client MUST verify that the `renegotiated_connection` field has zero length; if it does not, the client MUST abort the handshake with a fatal handshake_failure alert.
section: "3.4"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
