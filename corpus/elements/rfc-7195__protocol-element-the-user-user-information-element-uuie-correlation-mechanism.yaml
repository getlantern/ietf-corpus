document: rfc-7195
kind: protocol-element
summary: The User-User Information Element (UUIE) correlation mechanism places a base-16-encoded UUIE value (Protocol Discriminator octet followed by User Information octets, up to 130 hex digits) in the 'uuie' subfield of 'cs-correlation'. The active endpoint includes this value in the PSTN call setup; the passive endpoint compares it to verify correlation.
section: 5.2.3.3
topics:
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
