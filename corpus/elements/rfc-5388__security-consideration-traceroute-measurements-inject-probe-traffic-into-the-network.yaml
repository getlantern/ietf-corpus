document: rfc-5388
kind: security-consideration
summary: Traceroute measurements inject probe traffic into the network and can be abused for denial-of-service attacks disguised as legitimate measurement activity. Authentication techniques such as digital signatures may guard against injected artificial traffic attacks.
section: "8.1"
topics:
    - measurement
    - security
