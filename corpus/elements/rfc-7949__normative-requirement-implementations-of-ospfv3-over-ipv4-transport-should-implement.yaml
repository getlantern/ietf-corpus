document: rfc-7949
kind: normative-requirement
summary: Implementations of OSPFv3 over IPv4 transport SHOULD implement separate counters for protocol mismatch (OSPFv2 packet received by OSPFv3 process and vice versa) and SHOULD provide means to suppress the relevant SNMP bad-packet notifications defined in RFC 4750 and RFC 5643.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
