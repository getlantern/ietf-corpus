document: rfc-6772
kind: normative-requirement
summary: Implementations MUST support the WGS 84 coordinate reference system (urn:ogc:def:crs:EPSG::4326, 2D) for geodetic location conditions. A CRS MUST be specified using this URN notation only; user-defined CRSs need not be supported.
section: "4.1"
rfc2119_level: MUST
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
