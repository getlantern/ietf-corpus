document: rfc-6814
kind: design-rationale
summary: A number of IPv4 options became obsolete in practice but were never formally deprecated. This document formalizes their deprecation to clean up the IANA 'IP OPTION NUMBERS' registry, providing a clear authoritative signal to implementers.
