document: rfc-6622
kind: wire-format
summary: The ICV TLV value field is <ICV-value>, a field of <length> octets containing the ICV data. For type extension=0 (basic), the value is simply <ICV-data>, an unsigned integer of <length> octets with no pre-defined internal structure.
