summary: 'The Match-Prefix Part is 24 octets and contains: OpCode (8-bit), OpLength (8-bit, units of 8 octets, must be of form 4N+3), Ordinal (8-bit, unique per PCO in a message), MatchLen (8-bit, 0–128), MinLen (8-bit), MaxLen (8-bit), 16-bit reserved, and MatchPrefix (128-bit).'
