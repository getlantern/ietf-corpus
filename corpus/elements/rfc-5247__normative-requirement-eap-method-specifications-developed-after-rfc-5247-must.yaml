document: rfc-5247
kind: normative-requirement
summary: EAP method specifications developed after RFC 5247 MUST define the Peer-Id, Server-Id, and Session-Id for that method. Methods supporting key derivation and mutual authentication SHOULD export a Session-Id and Peer-Id(s); Server-Id(s) MAY also be exported.
section: "1.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
