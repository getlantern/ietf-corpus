document: rfc-5626
kind: normative-requirement
summary: A SIP node MUST NOT send STUN requests over a flow unless it has an explicit indication that the target next-hop SIP server claims to support this specification. UACs MUST NOT use ambiguous configuration options to imply next-hop STUN support.
section: "8"
rfc2119_level: MUST NOT
topics:
