document: rfc-9125
kind: interoperability-note
summary: The solution is agnostic as to whether transit ASes have SR capabilities. SR is used to stitch path segments between gateways and ASBRs, requiring that gateways and ASBRs are SR capable, but transit AS internals may use IP, MPLS, SR-MPLS, or SRv6 technologies.
section: "1"
topics:
