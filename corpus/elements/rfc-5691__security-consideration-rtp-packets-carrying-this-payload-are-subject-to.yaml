document: rfc-5691
kind: security-consideration
summary: RTP packets carrying this payload are subject to confidentiality, integrity, and source authenticity requirements. Confidentiality is achieved by encrypting the RTP payload; integrity and source authentication require a cryptographic mechanism. SRTP is recommended where suitable; IPsec and TLS (RTP over TCP) are noted as alternatives.
