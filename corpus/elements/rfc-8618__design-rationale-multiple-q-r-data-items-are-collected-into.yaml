document: rfc-8618
kind: design-rationale
summary: Multiple Q/R data items are collected into blocks, with common data abstracted into shared Block Tables referenced by index. This blocking and indexing provides significant file size reduction by exploiting DNS message structure knowledge, and also substantially reduces CPU needed for subsequent general-purpose compression.
