document: rfc-7484
kind: protocol-element
summary: Domain name lookups use label-wise longest match of the target domain name against domain values in the Bootstrap Registry for Domain Name Space. Matching is done per label, from right to left; if the longest match yields multiple entries they are treated as equivalent. The root of the domain name space is represented as the empty string "".
section: "4"
topics:
    - dns
