document: rfc-8082
kind: interoperability-note
summary: For layered codec implementations receiving TSTR messages, it is suggested to be liberal in accepting them and respond with TSTN indicating 'no change'. New implementations should not send TSTR messages except when operating in SRST (Single RTP stream on a Single media Transport) mode, as defined in RFC 7656.
section: "6.4"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
