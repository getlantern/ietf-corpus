document: rfc-2284
kind: security-consideration
summary: Counters used for authentication failure SHOULD NOT be reset until after successful authentication or subsequent termination of the failed link, to prevent brute-force circumvention via repeated renegotiation.
section: Security Considerations
rfc2119_level: SHOULD
topics:
    - security
