document: rfc-7181
kind: normative-requirement
summary: Broadcast, multicast, and addresses limited in scope to less than the entire MANET MUST NOT be considered as routable addresses. Anycast addresses MAY be considered routable.
section: "2"
rfc2119_level: MUST NOT
