document: rfc-3440
kind: protocol-element
summary: adslLineTransAtucActual returns the single transmission mode negotiated during ADSL line initialization; the ATU-R determines the mode. It returns 0 (no bit set) if the mode is unknown, and persists as the 'current' mode if the link goes down.
