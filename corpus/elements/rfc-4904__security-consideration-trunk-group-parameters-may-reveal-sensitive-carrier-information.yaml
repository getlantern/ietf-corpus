document: rfc-4904
kind: security-consideration
summary: 'Trunk group parameters may reveal sensitive carrier information: how a carrier performs least-cost routing and peering, and network topology details. Carriers should use discretionary judgment about including trunk group parameters, and TLS SHOULD be used for confidentiality protection.'
