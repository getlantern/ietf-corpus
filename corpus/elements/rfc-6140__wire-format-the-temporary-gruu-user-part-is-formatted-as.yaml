document: rfc-6140
kind: wire-format
summary: The temporary GRUU user part is formatted as 'tgruu.' followed by base64(E) followed by '.' followed by base64(PA), where E = RSA-Encrypt(K_e2, base64dec(SSP-cookie) || D) and PA = HMAC(PK_a, E). All base64 encoding uses RFC 4648 Section 4 with trailing '=' stripped on encoding.
