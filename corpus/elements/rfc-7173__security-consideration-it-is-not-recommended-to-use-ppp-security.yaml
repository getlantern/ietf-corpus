document: rfc-7173
kind: security-consideration
summary: 'It is NOT RECOMMENDED to use PPP security for TRILL transport over pseudowires because: the PPP layer is vestigial (primarily used for code point identification), and existing PPP security standards are questionable by current security criteria. Instead, link security SHOULD be provided at the MPLS, IP, or lower link layers supporting the pseudowires.'
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
