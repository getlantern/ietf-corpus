document: rfc-9573
kind: normative-requirement
summary: If neither the DCB-flag nor the Context-Specific Label Space ID EC is present on an x-PMSI/IMET route, the label in the PTA or ESI Label EC MUST be treated as an upstream-assigned label from the source PE's label space, and the procedures of RFC 6514 and RFC 7432 MUST be followed.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
