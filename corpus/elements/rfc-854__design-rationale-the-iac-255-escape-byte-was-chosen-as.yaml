document: rfc-854
kind: design-rationale
summary: The IAC (255) escape byte was chosen as the command prefix to minimize collisions with data bytes. Only IAC itself must be doubled to appear as data; all other 255 byte values pass transparently, avoiding pervasive escaping overhead.
section: TELNET COMMAND STRUCTURE
