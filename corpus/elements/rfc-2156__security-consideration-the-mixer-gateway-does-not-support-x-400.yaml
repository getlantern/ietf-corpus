document: rfc-2156
kind: security-consideration
summary: The MIXER gateway does not support X.400 security services including Content Confidentiality, Content Integrity, Message Security Labelling, Non-Repudiation of Delivery, Non-Repudiation of Origin, Message Flow Confidentiality, and Message Sequence Integrity. These properties cannot be preserved across the X.400/RFC 822 boundary, and applications requiring end-to-end security must use other mechanisms.
section: Security Considerations
topics:
    - email
    - security
