document: rfc-3986
kind: wire-format
summary: 'The path is defined by five mutually exclusive ABNF rules (path-abempty, path-absolute, path-noscheme, path-rootless, path-empty) to resolve ambiguities. A path segment character is: pchar = unreserved / pct-encoded / sub-delims / ":" / "@".'
