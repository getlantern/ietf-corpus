document: rfc-1112
kind: state-machine
summary: 'IGMP defines three per-group states per interface: Non-Member (initial), Delaying Member (belongs to group, timer running), and Idle Member (belongs to group, no timer). Transitions are triggered by join group, leave group, query received, report received, and timer expired events.'
section: Appendix I
