document: rfc-6381
kind: normative-requirement
summary: The 'codecs' parameter SHOULD only be used for MPEG-21 files (application/mp21) when timed, coded material (a top-level 'moov' atom) is also present in the file, as MPEG-21 files may but are not required to contain such material.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
