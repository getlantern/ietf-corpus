document: rfc-5424
kind: security-consideration
summary: Syslog messages are transmitted in clear text; the protocol provides no confidentiality mechanism. An attacker positioned on the network path can read human-readable message content to gather intelligence for further attacks. Operators should use TLS transport to address this.
section: "8.8"
topics:
    - security
    - privacy
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
