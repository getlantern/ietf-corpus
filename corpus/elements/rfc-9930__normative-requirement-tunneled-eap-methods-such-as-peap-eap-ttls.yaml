document: rfc-9930
kind: normative-requirement
summary: Tunneled EAP methods such as PEAP, EAP-TTLS, and EAP-FAST MUST NOT be used for inner EAP authentication. TEAP implementations MUST NOT permit inner EAP methods that fail to perform crypto-binding of the Inner Method to the TLS session.
section: 3.6.5
rfc2119_level: MUST NOT
topics:
    - security
    - tls
