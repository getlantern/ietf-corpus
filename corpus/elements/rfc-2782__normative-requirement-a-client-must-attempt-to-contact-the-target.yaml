document: rfc-2782
kind: normative-requirement
summary: A client MUST attempt to contact the target host with the lowest-numbered priority it can reach. Hosts with the same priority SHOULD be tried in an order determined by the Weight field.
section: The format of the SRV RR
rfc2119_level: MUST
topics:
    - dns
