document: rfc-2496
kind: protocol-element
summary: The DS3 Far End Group (ds3 9–12) provides four tables—FarEndConfig, FarEndCurrent, FarEndInterval, FarEndTotal—containing configuration codes (EquipCode, LocationIDCode, FrameIDCode, UnitCode, FacilityIDCode) and far-end C-bit statistics (CESs, CSESs, CCVs, UASs) reported via C-bits from the remote end.
