document: rfc-1661
kind: state-machine
summary: 'PPP link passes through five phases: Dead (physical layer not ready), Establish (LCP negotiation), Authenticate (optional peer authentication), Network (NCP configuration and data transfer), and Terminate (link shutdown). Transitions are triggered by LCP/NCP events and external signals such as carrier loss.'
section: "3.2"
