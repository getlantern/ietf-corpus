document: rfc-5191
kind: normative-requirement
summary: PANA request messages MUST be retransmitted until an answer is received or the maximum retransmission count is reached, at which point the PANA session MUST be terminated immediately. Invalid messages MUST be discarded to provide robustness against DoS attacks.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
