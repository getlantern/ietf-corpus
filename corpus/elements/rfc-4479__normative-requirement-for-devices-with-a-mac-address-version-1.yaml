document: rfc-4479
kind: normative-requirement
summary: For devices with a MAC address, version 1 UUIDs are RECOMMENDED as the device ID, as they produce a time-based identifier that incorporates the MAC address. For devices without a MAC address, a version 4 (random) UUID is RECOMMENDED.
section: "3.4"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
