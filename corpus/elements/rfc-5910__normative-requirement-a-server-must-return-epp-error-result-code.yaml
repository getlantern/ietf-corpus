document: rfc-5910
kind: normative-requirement
summary: A server MUST return EPP error result code 2306 if it supports the 'urgent' attribute but an urgent update (with urgent='true') cannot be completed with high priority. This distinguishes the case of unsupported feature (2102) from a supported but currently unserviceable request (2306).
section: 5.2.5
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
