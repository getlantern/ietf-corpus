document: rfc-5936
kind: normative-requirement
summary: The TC (truncation) bit MUST be 0 in AXFR responses and is never considered by an AXFR client. The DNS message size limit for UDP and EDNS0 extensions to that limit are not relevant for AXFR.
section: "2"
rfc2119_level: MUST
topics:
    - dns
