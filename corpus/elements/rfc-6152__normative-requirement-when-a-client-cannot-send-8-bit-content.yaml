document: rfc-6152
kind: normative-requirement
summary: When a client cannot send 8-bit content to a non-8BITMIME server, it must either convert the message to valid 7-bit MIME with no loss of information, or treat the barrier as a permanent error and handle it as a delivery failure.
section: "3"
rfc2119_level: MUST
topics:
