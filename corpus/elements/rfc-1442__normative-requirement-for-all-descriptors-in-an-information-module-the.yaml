document: rfc-1442
kind: normative-requirement
summary: For all descriptors in an information module, the descriptor shall be unique and mnemonic, and shall not exceed 64 characters in length. The set of descriptors defined in all 'standard' information modules shall be unique, and the hyphen is not allowed as a character in any descriptor within a standard module.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
