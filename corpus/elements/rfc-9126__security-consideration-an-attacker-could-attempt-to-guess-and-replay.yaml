document: rfc-9126
kind: security-consideration
summary: An attacker could attempt to guess and replay a valid request URI to impersonate a client. The authorization server MUST account for JAR Section 10.2(d) on request URI entropy, requiring cryptographically strong pseudorandom values.
section: "7.1"
topics:
    - oauth
    - security
