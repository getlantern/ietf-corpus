document: rfc-6325
kind: normative-requirement
summary: Even when ESADI is used to announce end nodes, RBridges MUST still learn end-station MAC addresses from received native frames and from the ingress nickname, Inner.VLAN, and Inner.MacSA of decapsulated TRILL Data frames, unless explicitly configured not to do so.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
