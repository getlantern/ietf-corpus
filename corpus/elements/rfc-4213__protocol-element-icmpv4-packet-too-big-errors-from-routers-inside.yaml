document: rfc-4213
kind: protocol-element
summary: ICMPv4 'packet too big' errors from routers inside the tunnel are handled per IPv4 Path MTU Discovery (RFC 1191) and the resulting path MTU is recorded. For other ICMPv4 errors, if sufficient payload bytes are available, the encapsulator MAY generate an ICMPv6 'unreachable / address unreachable' message to the originating IPv6 source. ICMPv4 error handling applies only to dynamic MTU determination.
section: "3.4"
topics:
    - ip
    - v6ops
