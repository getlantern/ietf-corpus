document: rfc-2491
kind: interoperability-note
summary: 'Redirects are unidirectional: after a source host reacts to a Redirect and sets up a new VC, the destination continues to send back on the old path, having no way to determine the caller identity from the new VC in the absence of Neighbor Discovery. Both endpoints only use the new VC symmetrically if the destination also receives a Redirect.'
section: "4.6"
topics:
    - ip
    - v6ops
