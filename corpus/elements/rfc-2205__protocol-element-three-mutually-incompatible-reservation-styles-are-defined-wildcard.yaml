document: rfc-2205
kind: protocol-element
summary: 'Three mutually incompatible reservation styles are defined: Wildcard-Filter (WF, shared reservation + wildcard sender selection), Fixed-Filter (FF, distinct reservations + explicit sender selection), and Shared-Explicit (SE, shared reservation + explicit sender selection). Shared and distinct reservation modes cannot be merged, nor can wildcard and explicit sender selection.'
section: "1.3"
topics:
