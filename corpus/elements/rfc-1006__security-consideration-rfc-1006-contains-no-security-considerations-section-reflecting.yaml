document: rfc-1006
kind: security-consideration
summary: RFC 1006 contains no security considerations section, reflecting its 1987 vintage. The protocol provides no authentication, integrity protection, or confidentiality for the ISO transport service tunneled over TCP; security must be provided by other means at adjacent layers if required.
topics:
    - security
    - tcp
