document: rfc-6527
kind: protocol-element
summary: vrrpv3AssociatedIpAddrTable stores the IP addresses (IPv4 4-byte or IPv6 16-byte) that each virtual router backs up, indexed by ifIndex, VRID, InetAddressType, and address. Rows cannot be modified unless the corresponding vrrpv3OperationsStatus is initialize(1). Implementations should not allow deletion of the last row corresponding to an active operations entry.
section: "10"
