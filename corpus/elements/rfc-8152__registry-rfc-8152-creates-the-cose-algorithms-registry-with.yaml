document: rfc-8152
kind: registry
summary: RFC 8152 creates the COSE Algorithms registry with initial entries for ECDSA (ES256=-7, ES384=-35, ES512=-36), EdDSA (-8), HMAC variants, AES-GCM, AES-CCM, AES-CBC-MAC, ChaCha20/Poly1305, HKDF, AES Key Wrap, and ECDH variants. It also creates the COSE Key Types, COSE Key Common Parameters, COSE Key Type Parameters, and COSE Elliptic Curves registries.
section: "16.4"
