document: rfc-2535
kind: normative-requirement
summary: DSA (algorithm 3) is the mandatory-to-implement algorithm for KEY and SIG RRs. RSA/MD5 (algorithm 1) is recommended. An appropriate zone KEY RR MUST occur at the apex node of a secure zone.
section: 3.1.1
rfc2119_level: MUST
topics:
