document: rfc-4184
kind: security-consideration
summary: AC-3 decoders are designed to detect malformed frames and discard them, concealing errors in audio output until a valid frame is decoded. This error-resilience design is expected to prevent crashes and abnormal decoder behavior in response to malformed data or attacks.
