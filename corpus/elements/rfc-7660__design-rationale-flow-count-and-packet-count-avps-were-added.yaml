document: rfc-7660
kind: design-rationale
summary: Flow-Count and Packet-Count AVPs were added because a Filter-Rule can describe multiple flows but not the exact number, and existing accounting AVPs (Bytes, Time, Service-Units) do not differentiate between throughput and good-put or provide flow-level granularity needed for congestion management decisions.
section: "1"
topics:
