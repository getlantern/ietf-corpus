document: rfc-5182
kind: normative-requirement
summary: If a server refuses to save a SEARCH (SAVE) result (e.g., due to internal limits), it MUST return a tagged NO response containing the NOTSAVED response code and set the search result variable to the empty sequence.
section: "2.5"
rfc2119_level: MUST
