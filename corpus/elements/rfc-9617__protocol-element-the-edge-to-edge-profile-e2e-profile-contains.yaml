summary: The edge-to-edge profile ('e2e-profile') contains node-action and an 'e2e-types' container (conditional on action-encapsulate) with 'use-namespace' and a leaf-list of 'e2e-type'. It carries data added by the encapsulating node and interpreted only by the decapsulating node.
