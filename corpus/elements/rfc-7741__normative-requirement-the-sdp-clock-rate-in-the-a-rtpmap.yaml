document: rfc-7741
kind: normative-requirement
summary: The SDP clock rate in the a=rtpmap line MUST be 90000. The media name MUST be video, and the encoding name MUST be VP8. The max-fs and max-fr parameters MUST be included in the a=fmtp line when SDP is used to declare receiver capabilities.
section: 6.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
