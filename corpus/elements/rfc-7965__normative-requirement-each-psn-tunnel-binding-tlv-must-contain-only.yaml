document: rfc-7965
kind: normative-requirement
summary: Each PSN Tunnel Binding TLV MUST contain only one PSN Tunnel Sub-TLV. When sending, only one sub-TLV MUST be carried. When received, if more than one sub-TLV is present, only the first MUST be used and the rest MUST be ignored.
section: 3.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
