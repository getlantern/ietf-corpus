document: rfc-9015
kind: wire-format
summary: The SFT Sub-TLV (Type=3) carries a 2-octet SFT value followed by a variable-length SFIR-RD List where each entry is 8 octets. Entries with high-order octet 0x00 are SFIR-RDs (RD type 0/1/2); entries with a nonzero high-order octet are SFIR Pool Identifiers (Extended Community type 0x0b).
section: 3.2.1.3
topics:
