document: rfc-4072
kind: normative-requirement
summary: A Key-Name AVP sent in a Diameter-EAP-Request MUST NOT contain any data; a home Diameter server receiving a non-empty EAP-Key-Name AVP in a DER MUST silently discard the AVP.
section: 4.1.4
rfc2119_level: MUST NOT
topics:
