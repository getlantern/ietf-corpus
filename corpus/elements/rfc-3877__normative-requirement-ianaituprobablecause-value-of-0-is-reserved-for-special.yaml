document: rfc-3877
kind: normative-requirement
summary: IANAItuProbableCause value of 0 is reserved for special purposes and MUST NOT be assigned. Values 1–1023 are reserved for ITU-T probable causes; all other new causes are assigned starting at 1025 on a first-come basis.
