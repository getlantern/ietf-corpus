document: rfc-5310
kind: security-consideration
summary: The Remaining Lifetime field of LSPs is excluded from authentication (set to zero before computation) to allow intermediate ISes to age LSPs without recomputing the authentication data. This omission can be exploited by an attacker to manipulate the remaining lifetime.
section: "4"
topics:
    - routing
    - security
