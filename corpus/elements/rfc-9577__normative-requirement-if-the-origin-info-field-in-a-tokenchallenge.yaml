document: rfc-9577
kind: normative-requirement
summary: If the origin_info field in a TokenChallenge is non-empty, the Origin that issued the authentication challenge MUST include its own name as one of the names in the list. Comparison is case-insensitive.
section: 2.1.1
rfc2119_level: MUST
topics:
