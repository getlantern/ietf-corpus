document: rfc-5755
kind: normative-requirement
summary: The issuer/serialNumber pair MUST form a unique combination for every conforming AC. The serialNumber MUST be a positive integer (sign bit zero in DER); AC users MUST handle serial numbers longer than 4 octets, and conformant ACs MUST NOT contain serialNumber values longer than 20 octets.
section: 4.2.5
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
