document: rfc-4303
kind: protocol-element
summary: In transport mode, ESP is inserted after the IP header (and any options/extension headers) and before the next-layer protocol header. In tunnel mode, ESP encapsulates the entire inner IP packet; the outer IP header contains IPsec peer addresses. Mixed IPv4/IPv6 inner and outer headers are permitted.
section: "3.1"
topics:
    - ipsec
    - security
    - ip
