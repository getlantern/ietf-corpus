document: rfc-9928
kind: design-rationale
summary: The 4o6RA approach was chosen because legacy IPv4-only clients cannot easily be replaced or updated to implement DHCPv4-over-DHCPv6 (RFC 7341). By moving the encapsulation/decapsulation to an intermediate relay agent (switch or router), IPv4 clients require no changes and remain unaware of the DHCPv6 transport.
section: "1"
topics:
