document: rfc-9569
kind: protocol-element
summary: A TIPS view (tv) is the container of incremental transport information for a network information resource. Its primary component is the updates graph (ug), a directed acyclic graph whose nodes are resource versions identified by monotonically increasing sequence numbers, and whose edges are update items (snapshots or incremental updates).
section: "2.2"
