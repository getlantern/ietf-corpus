summary: The recovery journal top-level header is 3 octets containing flags S (single-packet loss), Y (system journal present), A (channel journals present), H (enhanced Chapter C encoding), TOTCHAN (4-bit count of channel journals minus 1), and a 16-bit Checkpoint Packet Seqnum in big-endian order.
