document: rfc-3182
kind: normative-requirement
summary: For unicast sessions, a network node copies the user policy locator from the previous hop and uses its own credentials. For multicast messages, the node uses its own identity for both policy locator and credentials.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - multicast
