document: rfc-4338
kind: normative-requirement
summary: 'IPv6 multicast, IPv4 multicast/broadcast, and ARP broadcast packets MUST be addressed to the broadcast N_Port_ID 0xFFFFFF in FC Class 3. The Destination N_Port_Name in the FC Network_Header MUST be set to specific values: 0x10-00-FF-FF-FF-FF-FF-FF for broadcast, or multicast-derived values for IPv6/IPv4 multicast.'
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - multicast
