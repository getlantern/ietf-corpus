document: rfc-9956
kind: normative-requirement
summary: A node supporting the NQB PHB SHOULD NOT rate limit or rate police the aggregate of NQB traffic separately from Default traffic. The NQB queue SHOULD be given equivalent forwarding preference to the Default queue, e.g., via a Deficit Round-Robin (DRR) scheduler with equal weights.
section: "5.1"
rfc2119_level: SHOULD NOT
topics:
    - diffserv
    - qos
