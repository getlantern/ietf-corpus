document: rfc-7876
kind: wire-format
summary: The MPLS-PLDM Response packet over UDP/IP consists of an IP header (destination = URO.Address), a UDP header (destination port = URO.UDP-Destination-Port), and the RFC 6374 message body directly — the Associated Channel Header (ACH) is omitted because binding is achieved via the UDP port and RFC 6374 session identifier.
section: "4.3"
topics:
