document: rfc-7891
kind: wire-format
summary: The Explicit RPF Vector Attribute TLV has a 1-byte field containing F bit (transitive, MUST be 0), E bit (end of attributes), and 6-bit Type (value 4); followed by a 1-byte Length and a variable-length Value carrying an Encoded-Unicast address (IPv4 or IPv6).
section: "5"
topics:
