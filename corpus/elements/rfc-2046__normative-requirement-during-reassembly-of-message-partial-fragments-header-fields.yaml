document: rfc-2046
kind: normative-requirement
summary: 'During reassembly of ''message/partial'' fragments: header fields from the initial enclosing message (except Content-* and Subject/Message-ID/Encrypted/MIME-Version) are copied to the new message; Content-* and the named fields from the enclosed message are appended; all headers from subsequent enclosing messages are discarded.'
section: 5.2.2.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
