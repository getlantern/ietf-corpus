document: rfc-4420
kind: normative-requirement
summary: An LSR that does not recognize a bit set in the Attributes Flags TLV within LSP_REQUIRED_ATTRIBUTES MUST reject the Path message using a PathErr with Error Code 'Unknown Attributes Bit' and Error Value set to the bit number of the unknown bit.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
