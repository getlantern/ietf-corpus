document: rfc-5677
kind: design-rationale
summary: No security mechanism is defined at the MIH protocol level because the IEEE 802.21 base specification does not include one and reliance on lower-layer or proprietary security was deemed sufficient for initial deployment. This is acknowledged as a deviation from standard IETF requirements for Standards Track protocols.
section: "1"
topics:
