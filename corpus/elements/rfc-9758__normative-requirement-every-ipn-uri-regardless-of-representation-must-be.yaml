document: rfc-9758
kind: normative-requirement
summary: 'Every ipn URI, regardless of representation, MUST be considered as a tuple of three components: the Allocator Identifier, the Node Number, and the Service Number. The combination uniquely identifies a single resource.'
section: "3"
rfc2119_level: MUST
