document: rfc-5080
kind: normative-requirement
summary: The contents of Access-Request packets SHOULD NOT be changed during retransmissions. If attributes must change (e.g., due to Event-Timestamp), responses to earlier transmissions MUST be silently discarded, and any response to the current transmission MUST be treated as definitive.
section: "2.10"
rfc2119_level: SHOULD NOT
topics:
    - radius
