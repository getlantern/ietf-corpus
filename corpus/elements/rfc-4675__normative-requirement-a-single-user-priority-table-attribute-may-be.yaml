document: rfc-4675
kind: normative-requirement
summary: A single User-Priority-Table attribute MAY be included in an Access-Accept or CoA-Request packet; this attribute MUST NOT be sent within an Access-Request, Access-Challenge, Access-Reject, Disconnect-Request, Disconnect-ACK, Disconnect-NAK, CoA-ACK, CoA-NAK, or Accounting-Request.
section: "2.4"
rfc2119_level: MUST NOT
