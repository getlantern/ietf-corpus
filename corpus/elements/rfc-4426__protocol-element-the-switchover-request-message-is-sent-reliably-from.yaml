document: rfc-4426
kind: protocol-element
summary: The Switchover Request Message is sent reliably from the master to the slave, indicating which LSP(s) on a failed working link should be switched to an available protection link, including the protection link ID and, when necessary, new label mappings. A single Failure Indication may result in multiple Switchover Request messages.
section: 2.5.2
topics:
    - mpls
