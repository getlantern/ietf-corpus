document: rfc-5321
kind: normative-requirement
summary: When a message is delivered to a mailing list, the return address in the envelope (MAIL FROM:) MUST be changed to be the address of the list administrator. The message header section MUST be left unchanged.
section: "3.9"
rfc2119_level: MUST
topics:
    - email
