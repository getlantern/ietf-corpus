document: rfc-9301
kind: normative-requirement
summary: Implementations SHOULD use 'HMAC-SHA256-128+HKDF-SHA256' as the Algorithm ID in Map-Register messages and MUST NOT use 'None' or 'HMAC-SHA-1-96-None' as the Algorithm ID in public Internet deployments.
section: "1.1"
rfc2119_level: MUST NOT
