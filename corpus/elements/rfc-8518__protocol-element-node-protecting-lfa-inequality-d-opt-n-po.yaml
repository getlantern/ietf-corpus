document: rfc-8518
kind: protocol-element
summary: 'Node-Protecting LFA inequality: D_opt(N,PO_i) + Cost(PO_i,P) < D_opt(N,E) + D_opt(E,PO_best) + Cost(PO_best,P). Ensures alternate N''s path to MHP P does not traverse the primary neighbor E, protecting against E''s node failure.'
