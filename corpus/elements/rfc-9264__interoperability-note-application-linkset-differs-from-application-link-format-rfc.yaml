document: rfc-9264
kind: interoperability-note
summary: '''application/linkset'' differs from ''application/link-format'' (RFC 6690) in that it fully matches the RFC 8288 Link header grammar, whereas RFC 6690 adds CoRE-specific constraints. Implementations targeting both environments must handle the distinction.'
section: "4.1"
topics:
