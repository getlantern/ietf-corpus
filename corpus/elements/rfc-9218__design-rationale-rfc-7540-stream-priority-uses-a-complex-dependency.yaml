document: rfc-9218
kind: design-rationale
summary: RFC 7540 stream priority uses a complex dependency-tree model that suffered from limited deployment, poor interoperability, and no server-to-intermediary signal path. Independent research showed simpler absolute-value schemes achieve equivalent or better performance, motivating the new extensible scheme.
section: "2"
