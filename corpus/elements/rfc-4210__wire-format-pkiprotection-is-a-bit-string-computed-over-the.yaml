document: rfc-4210
kind: wire-format
summary: PKIProtection is a BIT STRING computed over the DER encoding of ProtectedPart ::= SEQUENCE { header PKIHeader, body PKIBody }. Protection may be a MAC (shared-secret PBM or DH-based) or a digital signature; the field is OPTIONAL but if omitted the protectionAlg field MUST also be omitted.
section: 5.1.3
topics:
    - pkix
    - crypto
    - security
