document: rfc-2509
kind: interoperability-note
summary: IPv4 and IPv6 compression contexts share the same context identifier space. When parameter values negotiated via IPCP and IPV6CP differ, the compression engine allocates context identifiers from a common pool and the decompressor must examine context state to determine which parameters to apply.
section: "3.1"
topics:
    - ip
    - v6ops
