document: rfc-4872
kind: normative-requirement
summary: The S bit (Secondary) set to 1 with the P bit (Protecting) set to 0 is not a valid combination in the PROTECTION object. Working LSPs are always primary (S=0, P=0); only protecting LSPs may be secondary (S=1, P=1).
section: "14.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
