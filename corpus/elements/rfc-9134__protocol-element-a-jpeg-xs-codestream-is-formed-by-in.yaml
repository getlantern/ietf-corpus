document: rfc-9134
kind: protocol-element
summary: 'A JPEG XS codestream is formed by (in order): a codestream header starting with an SOC marker (0xff10), one or more slices, and an End of Codestream (EOC) marker (0xff11). Slices are the smallest independently decodable units.'
