document: rfc-9459
kind: security-consideration
summary: An attacker can replace COSE algorithm identifiers with AES-CTR or AES-CBC identifiers in messages that originally used AEAD algorithms (e.g., AES-CCM, AES-GCM), then strip the authentication tag to bypass integrity protection and manipulate ciphertext or extract keying material.
