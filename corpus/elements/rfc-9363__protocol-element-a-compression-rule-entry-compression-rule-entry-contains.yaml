document: rfc-9363
kind: protocol-element
summary: 'A compression Rule entry (compression-rule-entry) contains seven elements: Field ID (fid-type), Field Length (union of uint8 or fl-type function), Field Position (uint8), Direction Indicator (di-type), Target Value list (indexed binary), Matching Operator (mo-type), and Compression/Decompression Action (cda-type). The entry is keyed by field-id, field-position, and direction-indicator.'
section: "5.1"
