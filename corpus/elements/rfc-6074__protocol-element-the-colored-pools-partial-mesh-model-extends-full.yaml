document: rfc-6074
kind: protocol-element
summary: The Colored Pools partial mesh model extends full-mesh by allowing each pool to be configured with separate 'import RTs' and 'export RTs'. During BGP auto-discovery, export RTs replace the color in BGP Update messages. A pool creates a PW to every other pool that has a matching import RT, enabling hub-and-spoke and other asymmetric topologies.
section: "3.4"
topics:
