document: rfc-4480
kind: protocol-element
summary: 'The <place-is> element reports properties of the presentity''s current physical environment using per-media-type sub-elements: <audio> (noisy/ok/quiet/unknown), <video> (toobright/ok/dark/unknown), and <text> (uncomfortable/inappropriate/ok/unknown). This helps watchers judge which communication modality is likely to succeed.'
section: "3.6"
topics:
