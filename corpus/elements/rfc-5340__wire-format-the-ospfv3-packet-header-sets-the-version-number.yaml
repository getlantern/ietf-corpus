document: rfc-5340
kind: wire-format
summary: 'The OSPFv3 packet header sets the version number to 3, expands the Options field to 24 bits, removes Authentication and AuType fields, and adds an Instance ID field. Two new Options bits are added: the R-bit (clear means router participates in topology without forwarding transit traffic) and the V6-bit (clear means router does not forward IPv6 datagrams but may forward other protocols).'
section: "2.7"
topics:
    - routing
