document: rfc-5121
kind: interoperability-note
summary: 'IPv6 support over IP CS is indicated by Bit #2 of the CS capability parameter in REG-REQ/REG-RSP messages. By default, Packet, IPv4, and 802.3/Ethernet are supported; absence of this parameter implies only those defaults, not IPv6 over IP CS.'
section: "6.2"
topics:
    - ip
    - v6ops
