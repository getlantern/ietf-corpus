document: rfc-9863
kind: security-consideration
summary: The COLOR TLV and color-capability flag do not introduce security concerns beyond those in RFC 5440, RFC 8231, and RFC 8281. However, an unauthorized PCE could maliciously associate an LSP with an incorrect color; RFC 8253 (PCEPS/TLS) and RFC 9325 (secure TLS usage) should be used to protect against this.
section: "4"
topics:
