document: rfc-4935
kind: interoperability-note
summary: When a device is connected to a single physical Fabric without virtual Fabrics, the Fabric Index (T11FabricIndex) always has the value 1. Multiple physical or virtual Fabrics each receive a distinct index value per FC-SW-4.
