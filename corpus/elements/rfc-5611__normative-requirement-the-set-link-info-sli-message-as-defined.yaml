document: rfc-5611
kind: normative-requirement
summary: The Set-Link-Info (SLI) message as defined in RFC 3931 SHOULD NOT be used for conveying attachment circuit status for TDM PWs, because RFC 4553 and RFC 5086 define AC status transfer via the data plane.
