document: rfc-2728
kind: wire-format
summary: In schema 0x00 uncompressed format, the packet consists of a 1-byte compression key (MSB=0), 20-byte IP header, 8-byte UDP header, up to 1472 bytes of payload, and a 32-bit CRC. The compression key's lower 7 bits identify the compression group.
