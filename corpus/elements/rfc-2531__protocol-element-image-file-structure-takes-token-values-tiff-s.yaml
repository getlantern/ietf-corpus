document: rfc-2531
kind: protocol-element
summary: image-file-structure takes token values TIFF-S, TIFF-F, TIFF-J, TIFF-C, TIFF-L, or TIFF-M (TIFF-FX profiles per RFC 2301), describing how coded image data is wrapped and formatted. This is explicitly distinct from image data coding, which is captured by separate tags.
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
