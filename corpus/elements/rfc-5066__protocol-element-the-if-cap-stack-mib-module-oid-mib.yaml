summary: The IF-CAP-STACK-MIB module (OID mib-2 166) defines two read-only tables — ifCapStackTable and ifInvCapStackTable — that describe cross-connect capability of stacked (layered) interfaces, complementing the writable ifStackTable and ifInvStackTable in IF-MIB and IF-INVERTED-STACK-MIB.
