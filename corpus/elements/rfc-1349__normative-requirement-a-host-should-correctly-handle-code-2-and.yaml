document: rfc-1349
kind: normative-requirement
summary: A host should correctly handle code 2 and code 3 ICMP Redirects in addition to codes 0 and 1. If a host cannot, it is better to treat code 2 as equivalent to code 0 and code 3 as equivalent to code 1 rather than ignoring them entirely.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - ip
    - qos
