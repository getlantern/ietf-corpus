document: rfc-9097
kind: design-rationale
summary: UDP is chosen over TCP for IP-Layer Capacity measurements because it allows the most direct correlation to the IP Layer and because ad hoc TCP-based methods repeatedly failed to achieve measurement accuracy in comparison tests. TCP's congestion control weaknesses prevent it from reaching Maximum IP-Layer Capacity.
section: B.1
topics:
    - measurement
    - udp
    - tcp
