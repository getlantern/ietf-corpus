document: rfc-8431
kind: design-rationale
summary: Nexthop lifecycle is managed separately from route lifecycle via dedicated nh-add/nh-delete RPCs that return a server-allocated nexthop-id. This enables nexthop sharing (sharing-flag=true) across multiple routes, reducing FIB memory when many routes share the same forwarding action.
section: "2.5"
topics:
