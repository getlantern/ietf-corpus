document: rfc-4535
kind: normative-requirement
summary: Diffie-Hellman exponents MUST NOT be derived from long-lived secrets such as the seed to a pseudo-random generator that is not erased after use. It is assumed that DH exponents are erased from memory after use.
section: 3.2.4
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
