document: rfc-9776
kind: normative-requirement
summary: Routers MUST accept a Membership Report with a source address of 0.0.0.0, which may be used by a system that has not yet acquired an IP address. Multiple systems on a LAN may simultaneously use 0.0.0.0 as a source address.
section: 4.2.14
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
