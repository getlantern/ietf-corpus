document: rfc-7864
kind: protocol-element
summary: 'The Flow Mobility Cache (FMC) is a conceptual data structure maintained by each LMA, containing per-flow entries with fields: FID-PRI, FID, Traffic Selector, BID(s), Action (Forward/Drop), and Active/Inactive status; reuses the flow-binding list format from RFC 6089.'
