document: rfc-9298
kind: normative-requirement
summary: The URI Template used to configure a UDP proxy MUST be a level 3 template or lower, in absolute form with non-empty scheme, authority, and path components, and MUST contain the variables 'target_host' and 'target_port'. It MUST NOT contain non-ASCII characters outside 0x21-0x7E, and MUST NOT use reserved or fragment expansion operators.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
