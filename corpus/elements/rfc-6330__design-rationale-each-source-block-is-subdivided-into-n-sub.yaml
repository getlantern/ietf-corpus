document: rfc-6330
kind: design-rationale
summary: Each source block is subdivided into N sub-blocks so that each sub-block fits within the decoder's working memory WS. When N>1, a symbol spans one sub-symbol from each sub-block (non-contiguous in the object), allowing sub-block-at-a-time decoding on memory-constrained receivers.
section: 4.4.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
