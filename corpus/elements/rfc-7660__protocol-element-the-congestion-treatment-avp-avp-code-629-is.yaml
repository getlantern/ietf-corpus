document: rfc-7660
kind: protocol-element
summary: The Congestion-Treatment AVP (AVP Code 629) is of type Grouped and indicates how to treat traffic IP 5-tuple flow(s) when congestion is detected, whether by CE codepoint reception or other administratively defined criteria. It contains a mandatory Treatment-Action and optional QoS-Profile-Template and QoS-Parameters.
section: "3.2"
