document: rfc-5101
kind: state-machine
summary: 'Template lifecycle: allocated (Template ID assigned, Template Record transmitted) → active (in use by Data Records) → withdrawn (Template Withdrawal Message sent after configurable delay from last Data Record) → retired (Template ID reusable after Collector processes withdrawal). SCTP association shutdown discards all Templates and requires reassignment on reconnect.'
