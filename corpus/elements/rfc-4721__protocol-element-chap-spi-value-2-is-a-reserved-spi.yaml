document: rfc-4721
kind: protocol-element
summary: CHAP_SPI (value 2) is a reserved SPI number used to indicate CHAP-style authentication (MD5-based) compatible with RADIUS AAA servers. The authenticator is computed using the high-order challenge octet, key, MD5 of preceding data, and least-order 237 octets of challenge.
