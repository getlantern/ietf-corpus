document: rfc-9134
kind: normative-requirement
summary: For an interlaced JPEG XS frame, both picture segments SHALL contain identical VS and CS boxes — the byte sequence of the concatenated boxes MUST be exactly the same in both segments. The frat field indicating top-field-first or bottom-field-first SHALL also be identical.
section: "3.4"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
