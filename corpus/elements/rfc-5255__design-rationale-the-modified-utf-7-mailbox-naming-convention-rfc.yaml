document: rfc-5255
kind: design-rationale
summary: The modified UTF-7 mailbox naming convention (RFC 3501 Section 5.1.3) is described as a transitional measure from 1996 when local character sets such as ISO-8859-1 and Shift-JIS were in unofficial use for mailbox names, causing non-interoperability. Full UTF-8 mailbox names are a future goal.
section: "5.2"
topics:
    - email
