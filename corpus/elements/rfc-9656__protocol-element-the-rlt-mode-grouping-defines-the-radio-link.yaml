document: rfc-9656
kind: protocol-element
summary: 'The rlt-mode grouping defines the Radio Link Terminal mode via two mandatory uint32 leaves: num-bonded-carriers (number of active aggregated carriers) and num-protecting-carriers (number of standby/protecting carriers). This flexibly encodes configurations such as 1+0, 2+0, and 1+1.'
section: "2.5"
