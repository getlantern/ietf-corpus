document: rfc-2572
kind: normative-requirement
summary: If a receiver encounters reportableFlag=1 for an Unconfirmed Class PDU, it MUST process the message as though reportableFlag were zero; similarly, if reportableFlag=0 for a Confirmed Class PDU, it must be treated as though set to one.
section: "6.4"
rfc2119_level: MUST
topics:
