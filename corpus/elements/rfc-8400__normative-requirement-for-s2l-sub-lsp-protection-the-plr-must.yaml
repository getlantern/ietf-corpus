document: rfc-8400
kind: normative-requirement
summary: For S2L sub-LSP protection, the PLR MUST determine to protect a primary egress node via S2L sub-LSP protection when it receives a Path message with the 'S2L sub-LSP backup desired' flag set, and MUST set up the backup S2L sub-LSP to the backup egress node.
section: 5.4.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
