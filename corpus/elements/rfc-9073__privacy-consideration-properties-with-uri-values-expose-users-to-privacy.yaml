document: rfc-9073
kind: privacy-consideration
summary: 'Properties with URI values expose users to privacy leaks: any network access can be tracked by network observers and by the entity hosting the remote resource. Clients SHOULD NOT automatically download URI-referenced data without explicit user instruction; proxy services are recommended to mitigate this.'
section: "10.1"
topics:
    - privacy
