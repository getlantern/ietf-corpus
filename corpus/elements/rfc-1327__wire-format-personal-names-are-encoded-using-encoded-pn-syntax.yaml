document: rfc-1327
kind: wire-format
summary: 'Personal names are encoded using encoded-pn syntax: ''[ given "." ] *( initial "." ) surname'', where given is 2+ ps-chars excluding ''.'', initial is a single ALPHA, and surname is a printablestring. The encoding is reversible for names meeting five restrictions (no generational qualifier, single-letter initials, given name at least 2 chars, etc.).'
section: 4.2.1
topics:
    - email
