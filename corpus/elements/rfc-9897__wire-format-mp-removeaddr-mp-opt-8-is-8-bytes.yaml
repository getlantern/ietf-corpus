document: rfc-9897
kind: wire-format
summary: 'MP_REMOVEADDR (MP_OPT=8) is 8 bytes: Type=46, Length=8, MP_OPT=8, 1-byte Address ID, 4-byte Nonce. Must be immediately followed by an MP_HMAC option. Address removal is done by Address ID to support NAT traversal.'
section: 3.2.9
topics:
