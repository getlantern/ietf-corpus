document: rfc-8782
kind: normative-requirement
summary: The active-but-terminating period after a mitigation withdrawal SHOULD be set by default to 120 seconds. The DOTS server MAY exponentially increase it (base 2) up to a maximum of 300 seconds if the client re-requests mitigation before the period elapses.
section: 4.4.4
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
