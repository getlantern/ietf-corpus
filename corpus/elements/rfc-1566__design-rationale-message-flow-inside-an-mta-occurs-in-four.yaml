document: rfc-1566
kind: design-rationale
summary: 'Message flow inside an MTA occurs in four steps: receive from UA/store/MTA/gateway, determine next hop, convert format, and transmit. Storage may occur at different points in this pipeline, so measured counts of received, stored, and transmitted messages may legitimately differ from each other.'
