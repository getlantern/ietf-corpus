document: rfc-9854
kind: normative-requirement
summary: When a TargNode is one of multiple targets in a single RREQ-Instance, it MUST delete the ART option containing its own address from the RREQ-DIO before propagating it, so that downstream routers with higher Rank do not attempt to build a route to an already-reached target.
section: 6.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
