document: rfc-7838
kind: normative-requirement
summary: The ALTSVC frame is processed hop-by-hop. An intermediary MUST NOT forward ALTSVC frames, though it can use the information to form new ALTSVC frames to send to its own clients.
section: "4"
rfc2119_level: MUST NOT
