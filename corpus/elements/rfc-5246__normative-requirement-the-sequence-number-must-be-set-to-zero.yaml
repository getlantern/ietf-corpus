document: rfc-5246
kind: normative-requirement
summary: The sequence number MUST be set to zero whenever a connection state is made active. Sequence numbers MUST NOT wrap; if an implementation would need to wrap, it must renegotiate instead.
section: "6.1"
rfc2119_level: MUST
topics:
