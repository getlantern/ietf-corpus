document: rfc-8534
kind: normative-requirement
summary: If a Leaf A-D route is originated in response to a match for tracking whose PTA specifies 'no tunnel information present', the Leaf A-D route MUST carry a PTA that specifies 'no tunnel information present' with the LIR-pF flag set.
section: "5.2"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
