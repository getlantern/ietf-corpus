summary: The RSVP ADSPEC object carries path property information generated at senders or intermediate network elements, flowing downstream toward receivers. It consists of a mandatory default general parameters fragment (service 1) plus optional per-service fragments for Guaranteed (service 2) and Controlled-Load (service 5), each updated by RSVP-aware nodes.
