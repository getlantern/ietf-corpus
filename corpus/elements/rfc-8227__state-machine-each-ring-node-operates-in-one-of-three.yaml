summary: 'Each ring node operates in one of three RPS states: Idle (no active RPS request, sending/receiving NR in both directions), Switching (active protection switch or external command), and Pass-Through (highest-priority request is neither destined to nor generated by this node; traffic flows through protection tunnels transparently).'
