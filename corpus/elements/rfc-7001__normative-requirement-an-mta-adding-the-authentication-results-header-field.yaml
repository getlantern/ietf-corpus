document: rfc-7001
kind: normative-requirement
summary: An MTA adding the Authentication-Results header field SHOULD NOT include any data that has not been authenticated by the method(s) being applied. MUAs SHOULD NOT render unauthenticated data to users if presented by a method known not to authenticate it.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
