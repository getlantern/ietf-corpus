summary: IANA assigned TCP port 5161 ('snmpssh') for SNMP-over-SSH and port 5162 ('snmpssh-trap') for SNMP-over-SSH notifications. SMI number 189 under mib-2 and SMI number 7 under snmpDomains (snmpSSHDomain) were also assigned. 'ssh' was registered as the snmpSSHDomain prefix in the SNMP Transport Domains registry, and 'snmp' was registered as a Connection Protocol Subsystem Name in the SSH Protocol Parameters registry.
