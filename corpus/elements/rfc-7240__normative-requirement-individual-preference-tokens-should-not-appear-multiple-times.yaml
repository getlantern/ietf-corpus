document: rfc-7240
kind: normative-requirement
summary: Individual preference tokens SHOULD NOT appear multiple times within a single request. If a preference appears more than once, only the first instance is considered; all subsequent occurrences SHOULD be ignored without signaling an error.
section: "2"
rfc2119_level: SHOULD NOT
topics:
