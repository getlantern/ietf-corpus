document: rfc-2634
kind: interoperability-note
summary: Some ESS extensions cause messages created by an S/MIME version 3 sender to be unreadable by an S/MIME version 2 recipient, though they will not prevent an S/MIME v3 recipient from reading messages from an S/MIME v2 sender.
