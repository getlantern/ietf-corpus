document: rfc-5711
kind: normative-requirement
summary: Per RFC 2205 Section 3.7.1, a node receiving a PathErr message MUST take no action upon it and must not clear Path or Resv control-plane or data-plane state, regardless of whether the error is fatal or non-fatal.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
