document: rfc-5758
kind: design-rationale
summary: DSA with SHA2 is only specified for SHA-224 and SHA-256, while ECDSA with SHA2 covers all four (SHA-224, SHA-256, SHA-384, SHA-512). This reflects the algorithm strength pairings in FIPS 186-3, which does not define DSA use with SHA-384 or SHA-512.
