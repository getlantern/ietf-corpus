document: rfc-9461
kind: security-consideration
summary: An adversary on the query path can forge a response indicating SVCB records do not exist. For SVCB-reliant clients this results in denial of service only. SVCB-optional clients will fall back to insecure DNS, exposing all DNS traffic to surveillance and manipulation.
section: 8.1.1
topics:
    - dns
    - security
    - privacy
