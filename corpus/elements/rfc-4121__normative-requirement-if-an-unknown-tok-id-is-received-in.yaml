document: rfc-4121
kind: normative-requirement
summary: If an unknown TOK_ID is received in the initial context establishment token, the receiver MUST return GSS_S_CONTINUE_NEEDED major status, and the returned output token MUST contain a KRB_ERROR message with error code KRB_AP_ERR_MSG_TYPE.
section: "4.1"
rfc2119_level: MUST
topics:
