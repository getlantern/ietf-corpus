document: rfc-6347
kind: normative-requirement
summary: For anti-replay, a minimum sliding window size of 32 MUST be supported; a window size of 64 is SHOULD be employed as the default. The receiver packet counter MUST be initialized to zero when the session is established, and duplicate sequence numbers MUST be rejected.
section: 4.1.2.6
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
