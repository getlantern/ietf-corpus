document: rfc-5610
kind: design-rationale
summary: IE type records are scoped to a Transport Session rather than being persistent definitions because the mechanism is intended for interoperability within a session, not as a permanent out-of-band type registry replacement. This scoping also limits the attack surface for malicious type redefinition.
section: "3.9"
topics:
    - snmp
    - security
