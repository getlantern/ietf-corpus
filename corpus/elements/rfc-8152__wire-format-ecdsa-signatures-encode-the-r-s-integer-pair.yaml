kind: wire-format
summary: 'ECDSA signatures encode the (R, S) integer pair as concatenated fixed-width byte strings: Signature = I2OSP(R, n) || I2OSP(S, n) where n = ceiling(key_length / 8). Defined algorithm identifiers: ES256 (value -7, SHA-256), ES384 (-35, SHA-384), ES512 (-36, SHA-512).'
