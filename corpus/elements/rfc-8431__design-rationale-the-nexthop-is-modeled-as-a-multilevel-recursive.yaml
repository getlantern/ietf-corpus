document: rfc-8431
kind: design-rationale
summary: The nexthop is modeled as a multilevel recursive structure to support combinations of use cases—load-balancing, protection switching, multicast replication—that cannot be expressed with a flat single-nexthop model. Nexthop chain allows multiple header operations on a packet before forwarding, enabling tunneling stacked with other actions.
