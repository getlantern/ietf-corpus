document: rfc-3347
kind: security-consideration
summary: All aspects of the iSCSI protocol SHOULD be scrutinized for potential denial of service issues and guarded against as much as possible. Firewall deployment is an important defense; iSCSI SHOULD operate through a firewall to defend against DoS from less-trusted network areas.
section: "9.1"
topics:
    - security
    - ip
