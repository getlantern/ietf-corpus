document: rfc-8986
kind: protocol-element
summary: The End.X (Endpoint with L3 Cross-Connect) behavior is the SRv6 instantiation of an Adj-SID. It is associated with a set J of one or more L3 adjacencies; after SRH processing, the packet is submitted to the IPv6 module for transmission via a member of J selected by flow-based hash.
section: "4.2"
