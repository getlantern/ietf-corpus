document: rfc-3329
kind: state-machine
summary: 'The security agreement proceeds through five steps: (1) client sends supported mechanism list, (2) server challenges with its own list, (3) client selects highest-preference common mechanism and activates security, (4) client sends request with Security-Verify echoing server''s list under the selected security, (5) server verifies the echoed list is unmodified. If the list was modified at any step, the procedure is restarted or aborted.'
section: "2.1"
topics:
    - sip
    - security
