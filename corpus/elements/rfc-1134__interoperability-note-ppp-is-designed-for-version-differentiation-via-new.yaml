document: rfc-1134
kind: interoperability-note
summary: PPP is designed for version differentiation via new Data Link Layer Protocol field values rather than a version field within LCP packets. A correctly functioning Version 1 implementation will always respond to unknown Protocol values with a recognizable Version 1 packet, providing a deterministic fallback mechanism.
section: "4.3"
