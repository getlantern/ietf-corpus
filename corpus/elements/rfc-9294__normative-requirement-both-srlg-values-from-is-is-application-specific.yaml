document: rfc-9294
kind: normative-requirement
summary: Both SRLG values from IS-IS Application-Specific SRLG TLVs and link attributes from IS-IS ASLA sub-TLVs with zero-length application bit masks MUST be advertised into a BGP-LS ASLA TLV with a zero-length application bit mask, independent of the collation procedure.
