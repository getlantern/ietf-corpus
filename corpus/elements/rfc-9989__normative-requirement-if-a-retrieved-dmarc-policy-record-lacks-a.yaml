document: rfc-9989
kind: normative-requirement
summary: If a retrieved DMARC Policy Record lacks a valid 'p' tag but contains a 'rua' tag with at least one syntactically valid reporting URI, the Mail Receiver MUST treat the record as if it specified 'p=none' and continue processing; otherwise no DMARC processing applies.
section: 4.10.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
