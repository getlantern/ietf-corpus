document: rfc-3813
kind: normative-requirement
summary: 'Counter size requirements depend on interface speed: for interfaces at or below 20 Mbps, 32-bit byte and packet counters MUST be supported; above 20 Mbps and below 650 Mbps, 32-bit packet counters MUST and 64-bit octet counters MUST be supported; at or above 650 Mbps, both 64-bit packet counters AND 64-bit octet counters MUST be supported.'
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
