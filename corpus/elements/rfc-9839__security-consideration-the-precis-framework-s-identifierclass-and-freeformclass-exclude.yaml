document: rfc-9839
kind: security-consideration
summary: The PRECIS framework's IdentifierClass and FreeformClass exclude many code points beyond the problematic ones defined here. Specifications of fields designed for display to or interaction with humans should consider PRECIS's more-restrictive subsets, as they address spoofing and homograph attacks.
section: "2.2"
topics:
