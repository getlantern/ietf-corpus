document: rfc-9255
kind: interoperability-note
summary: Regional Internet Registries (RIRs) provide INR-to-real-world identity mapping through WHOIS (RFC 3912) and similar services, and claim to be authoritative for the INRs they allocate. This is the appropriate mechanism for INR identity, not RPKI.
section: "2"
topics:
