document: rfc-8625
kind: design-rationale
summary: Without bandwidth availability information in signaling, a bandwidth request is treated as requiring the highest availability level, which may cause LSP setup to fail even when lower availability would suffice. The TLV addresses this by allowing explicit <bandwidth, availability> pairs in PATH messages.
section: "1"
topics:
    - routing
    - mpls
