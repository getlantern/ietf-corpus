document: rfc-8767
kind: design-rationale
summary: Stale data is served only after a good-faith refresh attempt has failed, not speculatively before attempting resolution. If stale data were always returned immediately, resolvers would frequently send data they could have refreshed, undermining the intent of TTL as a freshness signal.
section: "7"
topics:
    - dns
