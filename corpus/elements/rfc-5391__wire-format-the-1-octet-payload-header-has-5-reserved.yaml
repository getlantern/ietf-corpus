document: rfc-5391
kind: wire-format
summary: The 1-octet payload header has 5 reserved bits (MSBs, MUST be set to zero and ignored by receivers) followed by a 3-bit Mode Index (MI) field indicating R1 (MI=1, 40 octets/frame), R2a (MI=2, 50 octets/frame), R2b (MI=3, 50 octets/frame), or R3 (MI=4, 60 octets/frame).
