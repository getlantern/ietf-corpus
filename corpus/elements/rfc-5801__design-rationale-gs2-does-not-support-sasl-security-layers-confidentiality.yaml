document: rfc-5801
kind: design-rationale
summary: GS2 does not support SASL security layers (confidentiality/integrity of application data after authentication) because SASL applications typically run over TLS, making security layers redundant; channel binding to the TLS channel is the recommended replacement.
section: "1"
topics:
