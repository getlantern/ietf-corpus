document: rfc-4561
kind: interoperability-note
summary: 'Two implementation options are permitted for combining node-id and interface address recording in the RRO: (1) add the node-id sub-object plus an optional separate IPv4/IPv6 interface-address sub-object, or (2) add an IPv4/IPv6 interface-address sub-object plus an optional node-id sub-object. Both orderings are valid.'
section: "3"
topics:
