document: rfc-9350
kind: normative-requirement
summary: To advertise participation in a Flex-Algorithm for Segment Routing (both SR-MPLS and SRv6), the Flex-Algorithm value MUST be included in the SR-Algorithm TLV (OSPF) or sub-TLV (IS-IS). SR Flex-Algorithm participation advertisement is topology independent.
section: "11.1"
rfc2119_level: MUST
topics:
    - routing
