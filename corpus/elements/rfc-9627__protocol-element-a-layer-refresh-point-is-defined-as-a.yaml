document: rfc-9627
kind: protocol-element
summary: A 'layer refresh point' is defined as a point after which a decoder that could previously decode only some layers can decode a greater number; for spatial layers this requires encoding that references only lower-layer subpictures of the current picture and no prior pictures of that layer.
