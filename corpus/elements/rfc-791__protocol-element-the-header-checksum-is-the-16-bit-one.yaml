document: rfc-791
kind: protocol-element
summary: The Header Checksum is the 16-bit one's complement of the one's complement sum of all 16-bit words in the header, with the checksum field treated as zero during computation. It protects only the header; the data portion has no IP-level error check.
section: "3.1"
