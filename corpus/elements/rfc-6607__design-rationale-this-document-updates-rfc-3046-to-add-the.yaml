document: rfc-6607
kind: design-rationale
summary: 'This document updates RFC 3046 to add the clause ''except if otherwise specified in the definition of specific Relay Agent Information sub-options.'' This change was necessary to make the VSS-Control sub-option mechanism legally coherent: a supporting server MUST NOT echo VSS-Control, which contradicts the prior blanket echo-all requirement.'
section: "8"
topics:
