document: rfc-9302
kind: normative-requirement
summary: 'An update to a Map-Version number MUST consist of an increment of the previous version number. The only exception is skipping the Null Map-Version: if the next increment would equal 0x000, the number MUST be incremented by 2 (set to 0x001).'
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
