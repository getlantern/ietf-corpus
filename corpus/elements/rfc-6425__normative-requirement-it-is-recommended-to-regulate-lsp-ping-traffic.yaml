document: rfc-6425
kind: normative-requirement
summary: It is RECOMMENDED to regulate LSP ping traffic passed to the control plane via a rate limiter applied to the well-known LSP ping UDP port. It is also RECOMMENDED that traceroute operations provide a configurable upper limit on TTL values.
section: "1.1"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
    - security
