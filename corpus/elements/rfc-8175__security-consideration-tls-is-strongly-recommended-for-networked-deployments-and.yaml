document: rfc-8175
kind: security-consideration
summary: TLS is STRONGLY RECOMMENDED for networked deployments and SHOULD be implemented in all cases. 'Dedicated deployments' (directly connected or dedicated-switch topologies) MAY omit TLS. The absence of TLS leaves DLEP session messages unauthenticated and susceptible to spoofing or metric manipulation.
section: "14"
topics:
    - routing
    - security
    - tls
