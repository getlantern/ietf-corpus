document: rfc-9899
kind: interoperability-note
summary: The 'ietf-acl-enh' module augments RFC 8519's 'ietf-access-control-list' and imports from RFC 6991 (ietf-inet-types), RFC 8519 (ietf-packet-fields), and RFC 8294 (ietf-routing-types). Implementations must also import the three new IANA-maintained modules (iana-icmpv4-types, iana-icmpv6-types, iana-ipv6-ext-types) created by this document.
section: "4"
topics:
