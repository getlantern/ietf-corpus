document: rfc-7787
kind: design-rationale
summary: Trickle transmits only the short network state hash rather than full data; in steady state, once the maximum Trickle interval is reached, only one hash per interval is needed, making DNCP 'very thrifty when updates happen rarely.' Networks with A_NC_I below the Trickle minimum interval gain little benefit from DNCP.
section: "1"
extracted_by: claude-sonnet-4-6
