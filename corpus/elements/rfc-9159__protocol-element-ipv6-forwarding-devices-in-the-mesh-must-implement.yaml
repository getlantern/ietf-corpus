document: rfc-9159
kind: protocol-element
summary: IPv6 forwarding devices in the mesh MUST implement both IPSP Node and Router roles, while simpler leaf-only nodes need only implement the IPSP Node role. A device may simultaneously act as a Bluetooth LE central and peripheral.
