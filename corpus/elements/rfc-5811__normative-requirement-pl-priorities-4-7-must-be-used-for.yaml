document: rfc-5811
kind: normative-requirement
summary: PL priorities 4-7 MUST be used for all PL messages on the HP channel. AssociationSetup, AssociationSetupResponse, AssociationTeardown (priority 7), Config, ConfigResponse, Query, and QueryResponse (priority 4) MUST use the HP channel.
