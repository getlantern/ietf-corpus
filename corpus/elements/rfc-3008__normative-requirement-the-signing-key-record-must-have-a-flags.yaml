document: rfc-3008
kind: normative-requirement
summary: The signing KEY record MUST have a flags value of 00 or 01 (authentication allowed, confidentiality optional). A DNSSEC resolver MUST only trust signatures generated by keys that are permitted to authenticate data.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
