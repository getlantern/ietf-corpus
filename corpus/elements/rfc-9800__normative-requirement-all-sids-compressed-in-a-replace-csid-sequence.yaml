document: rfc-9800
kind: normative-requirement
summary: All SIDs compressed in a REPLACE-CSID sequence MUST share the same Locator-Block and the same compression scheme (16-bit or 32-bit CSID length). All SIDs except the last one in a CSID sequence MUST have the REPLACE-CSID flavor.
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
