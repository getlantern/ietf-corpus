document: rfc-3977
kind: security-consideration
summary: NNTP servers that resolve client hostnames via DNS for access control are vulnerable to DNS spoofing. An attacker who can poison DNS responses could gain unauthorized access by causing the server to resolve an attacker-controlled IP to a trusted hostname.
section: "12.4"
topics:
    - security
    - dns
