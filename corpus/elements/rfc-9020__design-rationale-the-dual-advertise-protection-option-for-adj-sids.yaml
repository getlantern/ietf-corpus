document: rfc-9020
kind: design-rationale
summary: The 'dual' advertise-protection option for Adj-SIDs is specifically intended for traffic engineering scenarios where a path must traverse either all protected segments or all unprotected segments, requiring explicit advertisement of both a B-flag-set and a B-flag-clear Adj-SID for the same adjacency.
section: 5.1.1.2
topics:
    - mpls
    - routing
