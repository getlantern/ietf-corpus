document: rfc-2846
kind: security-consideration
summary: GSTN services may require dialing of private codes (e.g., PINs) embedded in the local-phone field. Because e-mail addresses are transmitted without encoding across MTAs, these codes may be exposed to unauthorized parties or appear on fax cover pages. Senders SHOULD be provided methods such as code encryption or masquerading to prevent this disclosure.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
