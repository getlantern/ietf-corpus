document: rfc-7867
kind: normative-requirement
summary: For MIFP calculation, if a video frame is totally lost, a value of 0xFF SHOULD be used for that frame. For MCFP, a value of 0xFF SHOULD be used for a lost frame that is totally concealed, and 0 for frames with no concealed macroblocks.
section: "4"
rfc2119_level: SHOULD
topics:
