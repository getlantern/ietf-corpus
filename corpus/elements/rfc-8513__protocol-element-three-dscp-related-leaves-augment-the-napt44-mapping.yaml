summary: 'Three DSCP-related leaves augment the NAPT44 mapping entry (conditioned on v6-v4-dscp-preservation being true): ''v6-dscp'' (DSCP at the IPv6 softwire level), ''internal-v4-dscp'' (DSCP of the encapsulated IPv4 packet from B4), and ''external-v4-dscp'' (DSCP set by the AFTR on the external IPv4 interface).'
