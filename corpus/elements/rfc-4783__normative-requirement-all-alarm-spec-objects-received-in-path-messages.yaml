document: rfc-4783
kind: normative-requirement
summary: All ALARM_SPEC objects received in Path messages SHOULD be passed unmodified downstream. All ALARM_SPEC objects received in Resv messages SHOULD be passed unmodified upstream. Nodes SHOULD store alarm information from received ALARM_SPEC objects.
section: 3.1.2
rfc2119_level: SHOULD
