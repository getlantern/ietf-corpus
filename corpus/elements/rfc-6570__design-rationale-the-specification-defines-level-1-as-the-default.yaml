document: rfc-6570
kind: design-rationale
summary: The specification defines Level 1 as the default simple string expansion (no operator, single variable) to maintain compatibility with prior implementations in WSDL, WADL, and OpenSearch that only implemented this default type. Level 2-4 features are additive extensions.
