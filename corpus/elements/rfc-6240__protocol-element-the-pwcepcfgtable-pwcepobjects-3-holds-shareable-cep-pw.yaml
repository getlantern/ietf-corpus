summary: The pwCepCfgTable (pwCepObjects 3) holds shareable CEP PW configuration parameters (payload length, jitter buffer depth, DBA settings, LOPS thresholds, etc.). A single entry may be referenced by many pwCepTable entries, reducing NMS burden.
