document: rfc-4467
kind: security-consideration
summary: To protect against computational denial-of-service attacks, a server MAY impose progressively longer delays on multiple URL validation requests that fail. Timing attack prevention (using dummy key calculations for unrecognized mailboxes) is also required during URLAUTH validation.
section: "10"
rfc2119_level: MAY
topics:
    - email
    - security
