document: rfc-2461
kind: wire-format
summary: Redirect (Type 137) carries a 32-bit Reserved field, a 128-bit Target Address (the better first-hop), and a 128-bit Destination Address (the redirected destination). Source MUST be the link-local address of the sending interface; destination is the source of the triggering packet; Hop Limit is 255.
section: "4.5"
