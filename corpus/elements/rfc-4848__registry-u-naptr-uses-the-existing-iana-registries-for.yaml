document: rfc-4848
kind: registry
summary: U-NAPTR uses the existing IANA registries for application service tags and application protocol tags defined in RFC 3958 (S-NAPTR). Tags starting with 'x-' are experimental with no duplicate-use prevention. All other tags require an RFC as the specification (any category), registered under the 'specification required' policy.
