document: rfc-2065
kind: normative-requirement
summary: If time synchronization protocols such as NTP are used, they MUST be used securely so that time cannot be spoofed. Otherwise a host could have its clock set back and accept old SIG and KEY RRs that were once valid but are no longer.
section: "6.4"
rfc2119_level: MUST
topics:
    - dns
    - security
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
