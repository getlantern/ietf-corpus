document: rfc-7522
kind: normative-requirement
summary: The authorization server MUST reject the entire Assertion if the NotOnOrAfter instant on the <Conditions> element has passed (subject to allowable clock skew). The server MAY ensure Bearer Assertions are not replayed by maintaining used ID values.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - security
