document: rfc-9432
kind: protocol-element
summary: The schema version is stored as a TXT RR named 'version.$CATZ'. For this specification the value MUST be "2" and the RRset MUST contain exactly one RR. Version "1" was used in earlier drafts and is reflected in the BIND 9.11 implementation.
section: 4.2.1
topics:
    - dns
