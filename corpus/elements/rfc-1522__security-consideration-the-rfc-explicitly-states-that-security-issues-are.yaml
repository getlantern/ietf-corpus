document: rfc-1522
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed. However, section 5 notes that mail readers implementing decoding must ensure display of decoded data on the recipient's terminal will not cause unwanted side-effects, implicitly flagging the risk of terminal escape sequences or other hostile content embedded in encoded-words.
