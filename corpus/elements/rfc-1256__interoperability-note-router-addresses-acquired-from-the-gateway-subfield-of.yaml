document: rfc-1256
kind: interoperability-note
summary: Router addresses acquired from the 'Gateway' subfield of BOOTP vendor extensions are treated as configured addresses with default preference level 0 and no expiry timer. The 'giaddr' field in a BOOTP packet identifies a BOOTP forwarder that is not necessarily an IP router and must not be installed in the host's default router list.
section: "5.3"
topics:
    - ip
    - routing
