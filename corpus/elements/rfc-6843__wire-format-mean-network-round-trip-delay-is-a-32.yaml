summary: Mean Network Round-Trip Delay is a 32-bit field expressing the mean RTP-to-RTP interface round-trip delay over the measurement period in units of 1/65536 seconds, typically derived from NTP timestamp, LSR, and DLSR fields in RTCP SR/RR.
