document: rfc-1731
kind: normative-requirement
summary: For GSSAPI, the client must call GSS_Init_sec_context with input_name_string 'SERVICE:imap@hostname' where hostname is the fully qualified host name in lower case. The client must respond with the resulting output_token.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - crypto
