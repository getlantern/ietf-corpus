document: rfc-6073
kind: design-rationale
summary: MS-PWs allow inter-AS L2VPN deployments to confine cryptographic key administration to just the PW switching points at domain boundaries, rather than requiring crypto on every T-PE. This is the primary motivation for the MS-PW architecture over SS-PW in multi-domain scenarios.
section: "1"
topics:
