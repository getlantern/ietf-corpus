document: rfc-8314
kind: interoperability-note
summary: An AVAS (Antivirus/Antispam) product or service is considered compatible with this specification only if all IMAP, POP, and SMTP-related software (including proxies) it includes are compliant. SMTP relay proxies that intercept mail at the application layer can directly interfere with TLS confidentiality.
section: "6"
topics:
    - email
    - tls
    - security
