document: rfc-6797
kind: protocol-element
summary: The REQUIRED `max-age` directive specifies the number of seconds (delta-seconds) after reception of the STS header during which the UA regards the host as a Known HSTS Host. A value of zero signals the UA to delete the cached HSTS Policy, including any asserted includeSubDomains directive.
section: 6.1.1
topics:
    - http
    - security
