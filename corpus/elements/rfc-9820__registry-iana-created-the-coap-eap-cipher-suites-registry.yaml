summary: 'IANA created the ''CoAP-EAP Cipher Suites'' registry under the ''CoAP-EAP'' registry group. Initial entries: 0 = AES-CCM-16-64-128 + SHA-256 (default, mandatory to implement), 1 = A128GCM + SHA-256, 2 = A256GCM + SHA-384, 3 = ChaCha20/Poly1305 + SHA-256, 4 = ChaCha20/Poly1305 + SHAKE256. Registration policies range from Standards Action with Expert Review (−20 to 23) to Specification Required.'
