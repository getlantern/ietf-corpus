document: rfc-3115
kind: protocol-element
summary: The Normal Vendor/Organization Specific Extension (NVSE) allows vendors to include organization-specific data in Mobile IP messages. When an unrecognized NVSE is encountered, the extension SHOULD be ignored but the rest of the message MUST still be processed. NVSE is assigned Type number 134.
section: "2.2"
topics:
    - mobility
