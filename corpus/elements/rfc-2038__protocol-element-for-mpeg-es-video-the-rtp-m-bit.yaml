document: rfc-2038
kind: protocol-element
summary: For MPEG ES video, the RTP M bit is set to 1 on the packet containing the MPEG frame end code (0 otherwise). For audio, the M bit is set to 1 on the first packet of a talk-spurt (0 otherwise). The RTP timestamp for video represents the presentation time and may not be monotonically increasing when B pictures are present.
section: "3.3"
topics:
