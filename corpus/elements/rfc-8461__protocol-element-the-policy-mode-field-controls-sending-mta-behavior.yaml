document: rfc-8461
kind: protocol-element
summary: 'The policy ''mode'' field controls Sending MTA behavior on validation failure: ''enforce'' prohibits delivery to non-compliant MX hosts; ''testing'' allows delivery but requires TLSRPT failure reporting; ''none'' instructs senders to treat the domain as having no active policy, used for clean opt-out.'
section: "3.2"
