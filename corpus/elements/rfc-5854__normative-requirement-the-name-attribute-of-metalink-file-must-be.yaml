document: rfc-5854
kind: normative-requirement
summary: The 'name' attribute of metalink:file MUST be unique for each file element. The path MUST NOT contain any directory traversal directives; it MUST be relative and MUST NOT begin with '/', './', or '../'; contain '/../'; or end with '/..'.
section: 4.1.2.1
rfc2119_level: MUST NOT
topics:
    - security
