document: rfc-8397
kind: protocol-element
summary: 'Each RBridge in a unique nickname area calculates two types of distribution trees: local distribution trees (for area-confined multi-destination traffic) and global distribution trees (for multi-destination traffic spanning areas). The tree scope is determined by the tree root nickname being a Level 1 or Level 2 nickname.'
