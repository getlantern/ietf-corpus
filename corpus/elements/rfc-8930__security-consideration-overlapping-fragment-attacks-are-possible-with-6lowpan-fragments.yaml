document: rfc-8930
kind: security-consideration
summary: Overlapping fragment attacks are possible with 6LoWPAN fragments. Firewalls SHOULD NOT forward fragments and MUST drop a packet if overlapping fragments contain different data at the same offset. Overlapping fragments with identical payload are acceptable.
section: "7"
topics:
