document: rfc-3273
kind: normative-requirement
summary: For half-duplex links or full-duplex-capable links operating in half-duplex mode, the mediaIndependentIn* objects shall be used and the mediaIndependentOut* objects shall not increment. For full-duplex links, the mediaIndependentOut* objects shall be present and shall increment.
section: "5"
rfc2119_level: SHALL
topics:
