document: rfc-5644
kind: security-consideration
summary: Active measurement packets used for spatial and one-to-group metrics are dedicated test packets; passive measurement of user traffic is explicitly out of scope. Implementations must ensure test traffic rates are chosen to not impact network performance.
section: "9.2"
topics:
    - measurement
    - security
