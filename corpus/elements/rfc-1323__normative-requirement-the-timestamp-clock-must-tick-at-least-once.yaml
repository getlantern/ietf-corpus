document: rfc-1323
kind: normative-requirement
summary: The timestamp clock must tick at least once per 2**31 bytes sent (not too slow) and its recycling period must exceed MSL seconds (not too fast, maximum one tick per 59 ns for 255 s MSL). The recommended clock frequency is 1 ms to 1 sec per tick.
section: 4.2.2
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
