document: rfc-5575
kind: wire-format
summary: 'The traffic-action extended community (type 0x8007) uses 6 bytes; only the two least-significant bits of byte 6 are defined: bit 47 (Terminal Action — if set, continue evaluating subsequent rules; if unset, stop at this rule) and bit 46 (Sample — enables traffic sampling and logging for this flow).'
