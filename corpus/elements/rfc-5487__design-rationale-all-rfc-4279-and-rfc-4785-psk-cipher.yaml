document: rfc-5487
kind: design-rationale
summary: All RFC 4279 and RFC 4785 PSK cipher suites use HMAC-SHA1 as their MAC algorithm. Due to recent analytic work on SHA-1 (Wang et al., CRYPTO 2005), the IETF is gradually moving away from SHA-1 and towards stronger hash algorithms, motivating the new suites defined here.
