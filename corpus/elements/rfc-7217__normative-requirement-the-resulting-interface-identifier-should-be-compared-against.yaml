document: rfc-7217
kind: normative-requirement
summary: The resulting Interface Identifier SHOULD be compared against reserved IPv6 Interface Identifiers (RFC 5453 and IANA registry) and against those already employed in the same interface/prefix. If an unacceptable identifier is generated, it SHOULD be handled the same as a duplicate address.
section: "5"
rfc2119_level: SHOULD
topics:
    - ip
    - registry
