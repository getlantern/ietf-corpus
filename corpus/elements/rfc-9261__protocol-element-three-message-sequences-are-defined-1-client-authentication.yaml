document: rfc-9261
kind: protocol-element
summary: 'Three message sequences are defined: (1) Client Authentication — server generates request, client produces authenticator, server validates; (2) Server Authentication — client generates request, server produces authenticator, client validates; (3) Spontaneous Server Authentication — server generates authenticator without a preceding request, client validates.'
