document: rfc-8572
kind: wire-format
summary: 'For DNS device-specific queries, bootstrapping artifacts are encoded as key/value pairs in TXT records: ''ci'' carries the conveyed-information binary CMS artifact, ''oc'' carries the owner-certificate binary artifact, and ''ov'' carries the ownership-voucher binary artifact. All DNS TXT records are capped at 65535 bytes (16-bit RDLENGTH field).'
section: 4.2.2
topics:
