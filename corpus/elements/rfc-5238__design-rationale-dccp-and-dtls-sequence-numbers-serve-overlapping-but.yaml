document: rfc-5238
kind: design-rationale
summary: DCCP and DTLS sequence numbers serve overlapping but not identical functions. There is no connection between the sequence number of a DCCP packet and the sequence number in a DTLS record, and no connection between DCCP synchronization and DTLS anti-replay protection.
section: "3.1"
topics:
    - tls
    - congestion
