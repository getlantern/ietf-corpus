document: rfc-3224
kind: design-rationale
summary: 'Three extension mechanisms are provided for SLPv2: (1) IANA-registered extension IDs via expert review (preferred, vendor-neutral); (2) experimental range 0x8000-0x8FFF (unregistered, collision risk); (3) Vendor Opaque Extension using Enterprise Numbers (collision-free, vendor-specific). The Vendor Opaque Extension is recommended over the experimental range when vendor-specific use is intended.'
section: "5.0"
topics:
    - registry
    - security
