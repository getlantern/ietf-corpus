document: rfc-4875
kind: normative-requirement
summary: A Resv message MUST NOT be sent upstream until at least one Resv has been received from a downstream neighbor. When the LSP integrity bit is set in LSP_REQUIRED_ATTRIBUTES, the node MUST NOT send Resv upstream until all downstream Resv messages have been received.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
