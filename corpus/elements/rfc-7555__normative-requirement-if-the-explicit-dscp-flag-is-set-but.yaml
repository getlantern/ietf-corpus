document: rfc-7555
kind: normative-requirement
summary: If the Explicit DSCP flag is set but the Proxy LSR does not permit explicit DSCP control, the Proxy LSR MUST include the Proxy Echo Parameters TLV (with the Explicit DSCP flag cleared) in the Proxy Ping Reply and MUST set the Return Code to 17.
section: 3.2.4.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
