document: rfc-793
kind: normative-requirement
summary: After a crash in which memory of sequence numbers in use was lost, a TCP must keep quiet for a maximum segment lifetime (MSL = 2 minutes) before emitting any segments, to allow old segments from prior incarnations to drain from the network.
section: "3.3"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
