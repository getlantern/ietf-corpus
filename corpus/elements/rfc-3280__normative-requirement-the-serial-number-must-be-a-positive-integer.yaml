document: rfc-3280
kind: normative-requirement
summary: The serial number MUST be a positive integer unique for each certificate issued by a given CA. Certificate users MUST be able to handle serialNumber values up to 20 octets; conformant CAs MUST NOT use serialNumber values longer than 20 octets.
section: 4.1.2.2
rfc2119_level: MUST
topics:
