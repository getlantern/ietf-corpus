document: rfc-5007
kind: wire-format
summary: OPTION_LQ_QUERY (option code 44) carries the leasequery request. It contains a 1-octet query-type, a 16-octet link-address (IPv6), and variable-length query-options. Total option-len is 17 plus the length of query-options.
