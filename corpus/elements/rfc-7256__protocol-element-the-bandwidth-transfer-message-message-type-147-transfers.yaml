document: rfc-7256
kind: protocol-element
summary: The Bandwidth Transfer message (Message Type 147) transfers delegated multicast bandwidth between peers for a specific access line; it is the mandatory response to a Bandwidth Reallocation Request and may also be sent autonomously (Result=Ignore) to release previously borrowed bandwidth.
