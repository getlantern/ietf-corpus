document: rfc-7858
kind: normative-requirement
summary: Clients and servers that keep idle connections open MUST be robust to termination of idle connections by either party. Clients MUST handle abrupt closes and be prepared to reestablish connections and/or retry queries.
section: "3.4"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - tcp
