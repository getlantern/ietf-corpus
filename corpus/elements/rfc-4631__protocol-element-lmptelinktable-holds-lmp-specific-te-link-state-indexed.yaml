document: rfc-4631
kind: protocol-element
summary: lmpTeLinkTable holds LMP-specific TE link state indexed by ifIndex, with TruthValue flags for link verification (lmpTeLinkVerification), fault management (lmpTeLinkFaultManagement), and DWDM procedure (lmpTeLinkDwdm). Administrative status is controlled via the ifEntry; setting ifAdminStatus to testing triggers link verification.
section: "6.4"
topics:
