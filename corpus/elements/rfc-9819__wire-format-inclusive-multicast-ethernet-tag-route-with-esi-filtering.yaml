summary: 'Inclusive Multicast Ethernet Tag route with ESI Filtering (16-bit ARG): BGP Prefix-SID carries SRv6 L2 Service TLV with SID 2001:db8:1:fbd1::, Behavior End.DT2M, and SRv6 SID Structure Sub-Sub-TLV with LBL:32, LNL:16, FL:16, AL:16, TPOS-L:0, TPOS-O:0. The egress PE then accepts traffic with the ARG embedded at offset LBL+LNL+FL.'
