document: rfc-5730
kind: protocol-element
summary: An EPP command contains a command element (login, logout, check, info, poll, create, delete, renew, transfer, or update), an optional <extension> element for server-defined extensions, and an optional <clTRID> client transaction identifier. All commands are wrapped in an outer <epp> element.
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
