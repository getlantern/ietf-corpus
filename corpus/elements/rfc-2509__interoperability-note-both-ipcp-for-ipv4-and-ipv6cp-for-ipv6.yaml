document: rfc-2509
kind: interoperability-note
summary: Both IPCP (for IPv4) and IPV6CP (for IPv6) use the same NCP configuration option format to negotiate IPHC parameters. The negotiated values apply to packets whose outer header is IPv4 or IPv6, respectively.
