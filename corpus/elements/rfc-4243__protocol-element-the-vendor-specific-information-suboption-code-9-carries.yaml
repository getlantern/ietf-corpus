document: rfc-4243
kind: protocol-element
summary: The Vendor-Specific Information Suboption (code 9) carries vendor-defined data within the DHCP relay agent information option. It contains one or more Enterprise Number / DataLen / SuboptionData tuples, allowing a single suboption instance to carry data from multiple vendors.
