document: rfc-9214
kind: design-rationale
summary: A separate OSPFv3 code point (value 3) is introduced rather than reusing the existing OSPF code point (value 1) because OSPFv2 is not compatible with IPv6 addresses used by Segment ID sub-TLV Types 35 and 36, necessitating clear IGP version disambiguation.
