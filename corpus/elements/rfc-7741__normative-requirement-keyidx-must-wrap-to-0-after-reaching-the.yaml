document: rfc-7741
kind: normative-requirement
summary: KEYIDX MUST wrap to 0 after reaching the maximum value of 31. The sender MUST increment KEYIDX for key frames that convey parameter updates critical to subsequent frames, and SHOULD leave it unchanged for non-critical key frames.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
