document: rfc-8659
kind: protocol-element
summary: The CAA 'issuewild' Property Tag has the same syntax and semantics as 'issue' but applies only to Wildcard Domain Names. When at least one issuewild Property is present in the Relevant RRset for a Wildcard Domain Name, each issue Property MUST be ignored for that wildcard request. Each issuewild Property MUST be ignored when processing a request for a non-wildcard FQDN.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
