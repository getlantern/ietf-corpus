document: rfc-4448
kind: interoperability-note
summary: PAUSE frames received on a local Ethernet port SHOULD cause the PE to buffer or discard further Ethernet frames for that port. The implementation MUST provide a mechanism for terminating PAUSE frames locally at the PE; PAUSE frames MUST NOT be forwarded across the PW.
section: A.2
topics:
    - mpls
