document: rfc-3592
kind: state-machine
summary: LOS defect declared when no transitions detected for 2.3-100 µs; cleared after 125 µs interval with no LOS. LOS failure declared when LOS defect persists 2.5 ±0.5 s (or if LOS defect present when LOF failure criteria met); cleared when LOS defect absent for 10 ±0.5 s. LOS failure clears any existing LOF failure.
