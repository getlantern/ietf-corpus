document: rfc-9061
kind: protocol-element
summary: 'The autostartup-type enumeration controls when IKE/IPsec SAs are established after configuration is loaded: ''add'' (load config only, no SA started), ''on-demand'' (load policies, establish SA on ACQUIRE notification), or ''start'' (immediately establish SAs without waiting for traffic). Default is ''add''.'
section: 5.2.1
topics:
    - ipsec
    - yang
