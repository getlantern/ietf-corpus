summary: ifMauAutoNegCapabilityBits, ifMauAutoNegCapAdvertisedBits, and ifMauAutoNegCapReceivedBits are 16-bit BITS objects covering 10BASE-T through 1000BASE-T plus four PAUSE variants (symmetric, asymmetric, and combinations). They replace the deprecated integer-encoded ifMauAutoNegCapability, ifMauAutoNegCapAdvertised, and ifMauAutoNegCapReceived objects.
