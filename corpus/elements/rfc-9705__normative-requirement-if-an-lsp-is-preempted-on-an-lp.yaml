document: rfc-9705
kind: normative-requirement
summary: If an LSP is preempted on an LP-MP or NP-MP after PHOP link failure but before backup LSP signaling completes, the node MUST send a normal PathTear and delete both PSB and RSB states, since preemption invalidates its MP role.
section: 4.5.3.1, 4.5.3.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
