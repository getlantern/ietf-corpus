document: rfc-6647
kind: normative-requirement
summary: Database records for IP addresses that have generated no recent traffic SHOULD be expired. The default expiry SHOULD be at least one week, enabling re-evaluation of addresses that may have changed owners since their last recorded contact.
section: "5"
rfc2119_level: SHOULD
topics:
    - email
