document: rfc-6990
kind: protocol-element
summary: The MPEG-2 TS PSI-Independent Decodability Statistics Metrics Block (Block Type 22) is an RTCP XR block that carries counts of eight PSI-independent error metrics defined in ETSI TR 101290, covering both first-priority (basic decodability) and second-priority (continuous monitoring) indicators. It is measured at the receiving end of an RTP stream carrying MPEG-2 TS.
section: "3"
topics:
