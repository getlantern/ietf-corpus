summary: 'Three new PDU types are added to the ''IS-IS PDU Registry'': 10 (FS-LSP), 11 (FS-CSNP), 12 (FS-PSNP). A new ''LSP Flooding Scope Identifier Registry'' is created with Expert Review procedure; values 1–63 designate standard TLV PDUs and 64–127 designate extended TLV PDUs. Initial assignments: L1CS=1, L2CS=2, L1FS=3, L2FS=4, DFS=5, E-L1CS=64, E-L2CS=65, E-L1FS=66, E-L2FS=67, E-DFS=68.'
