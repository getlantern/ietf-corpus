document: rfc-4789
kind: wire-format
summary: SNMP messages are serialized per RFC 3417 Section 8 and placed in the data portion of an IEEE LAN MAC frame. The IEEE 802.3 frame carries a 6-byte destination Ethernet address, 6-byte source Ethernet address, a 2-byte Ethertype field (0x814C), followed by the variable-length SNMP message payload.
section: "3.3"
topics:
