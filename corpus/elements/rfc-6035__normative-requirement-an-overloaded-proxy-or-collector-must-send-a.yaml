document: rfc-6035
kind: normative-requirement
summary: An overloaded proxy or COLLECTOR MUST send a 503 Service Unavailable (or other 5xx) with an appropriate Retry-After time. REPORTERs MUST act on these responses and respect the Retry-After interval.
section: "3.4"
rfc2119_level: MUST
topics:
