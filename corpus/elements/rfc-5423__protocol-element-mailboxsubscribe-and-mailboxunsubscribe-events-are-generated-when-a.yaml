document: rfc-5423
kind: protocol-element
summary: MailboxSubscribe and MailboxUnSubscribe events are generated when a mailbox is added to or removed from the server-stored subscription list (as managed by IMAP SUBSCRIBE/UNSUBSCRIBE). Parameters include the affected user, the mailbox identifier, and optionally the triggering access protocol.
section: "4.4"
