summary: 'An IPv6 packet on the air over 802.11-OCB is structured as: Radiotap header (monitor mode only) | IEEE 802.11 Data header (Type/Subtype, Duration, Receiver/Transmitter Address, BSS ID ff:ff:ff:ff:ff:ff, Frag/Seq Number) | LLC header (DSAP, SSAP, Control, Org Code, Type=0x86DD) | IPv6 Base header | payload.'
