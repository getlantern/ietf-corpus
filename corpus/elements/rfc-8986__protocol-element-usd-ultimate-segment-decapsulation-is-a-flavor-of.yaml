document: rfc-8986
kind: protocol-element
summary: USD (Ultimate Segment Decapsulation) is a flavor of End, End.X, and End.T that decapsulates the outer IPv6 header when the Upper-Layer header is IPv4 or IPv6, enabling TI-LFA repair paths where the last SR endpoint strips the repair encapsulation and forwards the inner packet.
section: 4.16.3
topics:
