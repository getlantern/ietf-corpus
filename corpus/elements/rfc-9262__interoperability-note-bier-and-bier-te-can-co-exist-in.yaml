document: rfc-9262
kind: interoperability-note
summary: BIER and BIER-TE can co-exist in the same domain by partitioning the BIFT-id address space (e.g., via non-overlapping MPLS label ranges or disjoint subdomains), since a BFR must interpret a BIER-TE BitString differently from a non-TE BIER BitString. A packet is always forwarded end-to-end exclusively via BIER or BIER-TE ('ships in the night').
section: "4.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
