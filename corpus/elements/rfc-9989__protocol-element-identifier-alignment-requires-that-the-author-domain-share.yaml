document: rfc-9989
kind: protocol-element
summary: Identifier Alignment requires that the Author Domain share its Organizational Domain with an Authenticated Identifier (relaxed alignment) or be identical to it (strict alignment). The alignment mode for DKIM and SPF is independently configurable via the 'adkim' and 'aspf' tags, defaulting to relaxed.
section: "4.4"
