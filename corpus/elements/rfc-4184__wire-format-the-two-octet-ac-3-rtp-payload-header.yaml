document: rfc-4184
kind: wire-format
summary: 'The two-octet AC-3 RTP payload header contains a 6-bit MBZ (Must Be Zero) field, a 2-bit FT (Frame Type) field, and an 8-bit NF (Number of Frames/Fragments) field. FT encodes four values: 0=complete frames, 1=initial fragment including first 5/8ths, 2=initial fragment not including first 5/8ths, 3=non-initial fragment.'
section: 4.1.1
topics:
