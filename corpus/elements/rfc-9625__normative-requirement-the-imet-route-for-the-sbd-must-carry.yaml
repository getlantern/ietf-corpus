document: rfc-9625
kind: normative-requirement
summary: The IMET route for the SBD MUST carry a Multicast Flags Extended Community in which the OISM SBD flag is set. IMET routes for non-SBD BDs SHOULD carry an EVI-RT EC constructed from the SBD-RT to indicate the BD's corresponding SBD.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
