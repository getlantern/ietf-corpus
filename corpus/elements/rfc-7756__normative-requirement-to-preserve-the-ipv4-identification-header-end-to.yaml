document: rfc-7756
kind: normative-requirement
summary: To preserve the IPv4 Identification header end-to-end, IPv6 Atomic Fragment generation MUST be enabled on both the BR and the ER. If Atomic Fragment generation is disabled on either, the IPv4 Identification value is lost during translation.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
