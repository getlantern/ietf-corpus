document: rfc-9524
kind: normative-requirement
summary: A replication node MAY use an Anycast-SID or BGP PeerSet-SID in the segment list to send a replicated packet to one downstream replication node in a set of Anycast nodes, if and only if all nodes in the set have an identical Replication-SID and reach the same set of receivers.
section: "2.1"
rfc2119_level: MAY
topics:
    - routing
    - mpls
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
