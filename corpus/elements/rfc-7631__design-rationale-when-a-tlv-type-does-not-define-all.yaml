document: rfc-7631
kind: design-rationale
summary: When a TLV type does not define all its type extensions, leaving the TLV type unnamed (described only by number as 'Defined by Type Extension') facilitates future allocation of additional type extensions without imposing an inappropriate or misleading name on them. For example, LINK_STATUS becomes the name of the full type (type 3, extension 0) rather than of type 3 generally.
section: "1"
topics:
