document: rfc-3448
kind: normative-requirement
summary: If a retransmission is required by the transport protocol, the retransmitted packet MUST use a new sequence number (not the original), so TFRC can distinguish delayed from retransmitted packets. Protocols that must retransmit with the original sequence number must resolve the ambiguity themselves.
section: "5.1"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
