document: rfc-8063
kind: normative-requirement
summary: 'The <create> command MUST contain a <keyrelay:create> element with: a REQUIRED <keyrelay:name> (domain name), a REQUIRED <authInfo> element (domain authorization information per RFC 5731 Section 3.2.1), and one or more REQUIRED <keyrelay:keyRelayData> elements.'
section: 3.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
