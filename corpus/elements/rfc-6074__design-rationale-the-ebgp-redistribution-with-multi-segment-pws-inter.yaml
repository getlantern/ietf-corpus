document: rfc-6074
kind: design-rationale
summary: The EBGP redistribution with multi-segment PWs inter-AS approach (Section 4.2) restricts LDP/L2TPv3 signaling sessions to terminate on a small set of ASBRs rather than a full mesh across the AS boundary. This allows standard authentication procedures to be applied on a manageable set of inter-provider sessions and reduces the number of cross-AS control connections.
section: "4.2"
topics:
    - mpls
    - vpn
    - bgp
