document: rfc-8234
kind: design-rationale
summary: In cold reboot scenarios, no valid SF/SD indications may be present; the PSC Control Logic restarts as if no local requests are present and responds to SF/SD only when detected later. This is a non-normative clarification of expected restart behavior.
