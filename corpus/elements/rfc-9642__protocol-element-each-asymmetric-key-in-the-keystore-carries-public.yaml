document: rfc-9642
kind: protocol-element
summary: 'Each asymmetric key in the keystore carries ''public-key-format'' (identityref), ''public-key'' (binary), ''private-key-format'' (identityref), and a ''private-key-type'' choice with three cases: ''cleartext-private-key'' (binary), ''hidden-private-key'' (empty), or ''encrypted-private-key'' (containing ''encrypted-by'', ''encrypted-value-format'', and ''encrypted-value''). An asymmetric key may also contain a ''certificates'' list and a ''generate-csr'' action.'
section: 2.1.4
