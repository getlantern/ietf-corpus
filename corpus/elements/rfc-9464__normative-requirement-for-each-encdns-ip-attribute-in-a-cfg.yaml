document: rfc-9464
kind: normative-requirement
summary: For each ENCDNS_IP* attribute in a CFG_REPLY, the list of IP addresses MUST include at least one IP address. The service parameters SHOULD include at least the 'alpn' service parameter.
section: "4"
rfc2119_level: MUST
