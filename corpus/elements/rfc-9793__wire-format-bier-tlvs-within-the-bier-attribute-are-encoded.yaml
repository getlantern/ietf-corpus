document: rfc-9793
kind: wire-format
summary: BIER TLVs within the BIER attribute are encoded as Type (2 octets), Length (2 octets), Value (variable). TLVs are not padded to 4-octet alignment. The BIER TLV (Type=1) contains Sub-domain (1 octet), BFR-ID (2 octets), Reserved (1 octet), and Sub-TLVs.
section: "3"
topics:
