document: rfc-3195
kind: wire-format
summary: 'The ''linkprops'' attribute is a string of flag characters describing security properties of a link: ''o'' (weak privacy, <80 bits), ''O'' (strong privacy, ≥80 bits), ''U'' (authenticated user via SASL/TLS with accepted ''iam''), ''A'' (per-message authentication), ''R'' (replay protection), ''I'' (integrity), ''L'' (reliable/loss-free delivery), ''D'' (from-side is a device).'
section: 4.4.3
topics:
