document: rfc-4129
kind: protocol-element
summary: DUA introduces a new Message Class 13 for DPNSS/DASS2 Boundary Primitives Transport Messages (DPTM) to distinguish them from IUA and other IUA extension messages (V5, GR-303). Valid message classes for DUA also include 0 (Management), 3 (ASPSM), and 4 (ASPTM).
