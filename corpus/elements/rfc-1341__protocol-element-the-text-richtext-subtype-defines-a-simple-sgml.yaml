document: rfc-1341
kind: protocol-element
summary: The 'text/richtext' subtype defines a simple SGML-compatible markup format using angle-bracket formatting commands such as <bold>, <italic>, <nl>, and <np>. Commands must be properly balanced and nested; implementations MUST treat any unrecognized command as equivalent to 'No-op' to facilitate extensibility.
