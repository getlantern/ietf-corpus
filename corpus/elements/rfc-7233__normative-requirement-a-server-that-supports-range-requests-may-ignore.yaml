document: rfc-7233
kind: normative-requirement
summary: A server that supports range requests MAY ignore or reject a Range header field consisting of more than two overlapping ranges or many small ranges not in ascending order, as both indicate a broken client or a deliberate denial-of-service attack.
section: "3.1"
rfc2119_level: MAY
topics:
    - http
    - security
