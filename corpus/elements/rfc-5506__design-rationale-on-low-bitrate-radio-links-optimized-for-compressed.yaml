document: rfc-5506
kind: design-rationale
summary: On low-bitrate radio links optimized for compressed speech, minimal compound RTCP is 2–3× larger than an RTP speech packet. If the speech packet loss probability is p, the compound RTCP loss probability is 1-(1-p)^x where x is the number of link-layer fragments, making Reduced-Size RTCP substantially more reliable under poor channel conditions.
