document: rfc-9669
kind: protocol-element
summary: 'Byte swap instructions use the END code (0xd) with ALU or ALU64 class. ALU variants use the source bit to select little-endian (LE=0) or big-endian (BE=1) conversion between host and target byte order. ALU64 unconditionally swaps byte order regardless of host endianness. The ''imm'' field encodes the width: 16, 32, or 64 bits.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
