document: rfc-4720
kind: interoperability-note
summary: FCS length must be identical on both ends of the pseudowire for retention to make sense. Since FCS length on HDLC, PPP, and Frame Relay interfaces is a local setting, including the FCS length in the parameter or AVP allows PEs to ensure FCS is only retained when the lengths match.
section: "3"
topics:
