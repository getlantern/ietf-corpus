document: rfc-4121
kind: wire-format
summary: 'Context establishment tokens use a two-octet big-endian TOK_ID field followed by a Kerberos message: KRB_AP_REQ=0x01 0x00, KRB_AP_REP=0x02 0x00, KRB_ERROR=0x03 0x00. The outer wrapper follows RFC 2743 section 3.1 GSS-API framing with MechType OID and innerToken.'
