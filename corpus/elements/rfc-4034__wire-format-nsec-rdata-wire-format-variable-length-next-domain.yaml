document: rfc-4034
kind: wire-format
summary: 'NSEC RDATA wire format: variable-length Next Domain Name field (uncompressed wire-format domain name) followed by a Type Bit Maps field. The Type Bit Maps field uses 256 window blocks, each encoded as a 1-octet window number, 1-octet bitmap length (1-32), and up to 32 octets of bitmap.'
