document: rfc-7619
kind: normative-requirement
summary: If a host's local policy requires non-null authentication of its peer and it receives an AUTH payload containing the NULL Authentication method type, it MUST return an AUTHENTICATION_FAILED notification.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
