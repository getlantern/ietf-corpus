document: rfc-3602
kind: protocol-element
summary: AES-CBC uses a block size of 16 octets (128 bits) and an IV of the same size. The IV is XOR'd with the first plaintext block before encryption; subsequent blocks XOR the previous ciphertext block with the current plaintext before encryption.
section: "2.1"
topics:
    - ipsec
    - crypto
