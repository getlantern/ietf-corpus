document: rfc-6737
kind: design-rationale
summary: Modifying the security mechanism in use is explicitly prohibited over an existing connection. If the security method between a pair of peers must change, the affected connection MUST be restarted, ensuring that capability updates do not weaken or bypass the established security context.
section: "1"
topics:
    - diameter
    - security
