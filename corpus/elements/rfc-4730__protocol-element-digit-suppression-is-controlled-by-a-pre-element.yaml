document: rfc-4730
kind: protocol-element
summary: Digit suppression is controlled by a <pre> element inside a <regex> tag; at most one <pre> tag is allowed per <regex>. Once the User Interface accumulates input matching the <pre> prefix, it suppresses further in-band DTMF/RFC 2833 forwarding and continues collecting digits. The 'suppressed' attribute in the response indicates whether suppression occurred.
section: "3.4"
topics:
    - sip
    - realtime
