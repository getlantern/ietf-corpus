document: rfc-4182
kind: interoperability-note
summary: 'Implementations not conforming to this specification may not interoperate: if a router advertises a binding of Explicit NULL but its upstream LDP peer refuses to transmit packets with multiple label stack entries and Explicit NULL at the top, the Pipe Model cannot function until that peer is brought into compliance.'
