summary: 'Four new NO-PATH-VECTOR TLV bit flags are defined to communicate multi-domain path failure reasons: bit 22 (destination domain unknown), bit 21 (unresponsive child PCE(s)), bit 20 (no available resources in one or more domains), and bit 19 (destination not found in indicated domain).'
