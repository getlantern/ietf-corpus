document: rfc-3306
kind: interoperability-note
summary: Using unicast prefix-based multicast addresses after the unicast prefix has become invalid may cause operational problems, such as routers performing policy checks comparing the multicast prefix against the unicast prefix assigned to an AS discarding packets.
