document: rfc-4836
kind: interoperability-note
summary: MIB modules that currently import MAU type OBJECT-IDENTITY descriptors from MAU-MIB will need to be revised to import those descriptors from IANA-MAU-MIB. Management applications that process OBJECT-IDENTITY definitions to present DESCRIPTION text to users will similarly need to obtain those definitions from IANA-MAU-MIB instead of MAU-MIB.
section: "3.1"
topics:
