document: rfc-9762
kind: normative-requirement
summary: Clients that do not support DHCPv6 prefix delegation MUST ignore the P flag. The P flag is also meaningless for link-local prefixes, and any PIO containing the link-local prefix MUST be ignored per RFC 4862 Section 5.5.3.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
