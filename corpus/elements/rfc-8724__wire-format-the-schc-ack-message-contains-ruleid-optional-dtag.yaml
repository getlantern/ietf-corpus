document: rfc-8724
kind: wire-format
summary: 'The SCHC ACK message contains: RuleID, optional DTag, optional W field, and a 1-bit C field. C=1 signals successful integrity check (no Bitmap follows). C=0 signals failure or no check; if windows are used a Compressed Bitmap for the window referenced by W follows.'
