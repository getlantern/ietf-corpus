document: rfc-7267
kind: normative-requirement
summary: On receiving a Label Mapping that loops (originated from a different peer than the one the forward Label Mapping was sent to, or where the received SAII is local to the S-PE), the S-PE MUST send a Label Release with status code 'PW Loop Detected'.
section: 4.2.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
