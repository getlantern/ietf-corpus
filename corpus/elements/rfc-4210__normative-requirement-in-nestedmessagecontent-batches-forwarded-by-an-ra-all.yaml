document: rfc-4210
kind: normative-requirement
summary: In NestedMessageContent batches forwarded by an RA, all messages MUST be of the same type (e.g., all ir). The original EE PKIMessage MAY be included in generalInfo using infoType {id-it 15} with infoValue PKIMessages in the same order as requests in PKIBody.
section: 5.1.3.4
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
