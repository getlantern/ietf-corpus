document: rfc-7022
kind: design-rationale
summary: 'The Section 5 algorithm is intentionally simple: generating a CSPRNG value of at least 96 bits replaces the more complex algorithm in RFC 6222 Section 5. Environments that already support TLS, ICE, or DTLS-SRTP already have a CSPRNG available, making this straightforward to implement.'
