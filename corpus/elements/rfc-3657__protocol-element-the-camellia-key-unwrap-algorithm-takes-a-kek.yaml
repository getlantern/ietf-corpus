document: rfc-3657
kind: protocol-element
summary: The Camellia key unwrap algorithm takes a KEK K and (n+1) 64-bit ciphertext blocks {C[0]..C[n]}, producing n 64-bit plaintext blocks {P[1]..P[n]}, and returns an error if the recovered initial value does not match the expected IV.
