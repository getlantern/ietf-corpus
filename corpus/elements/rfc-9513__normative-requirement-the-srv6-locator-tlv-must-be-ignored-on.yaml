document: rfc-9513
kind: normative-requirement
summary: The SRv6 Locator TLV MUST be ignored on receipt if the Route Type field contains any value other than 1 (Intra-Area), 2 (Inter-Area), 3 (AS External Type 1), 4 (AS External Type 2), 5 (NSSA External Type 1), or 6 (NSSA External Type 2).
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
