document: rfc-2822
kind: normative-requirement
summary: 'A date-time specification MUST be semantically valid: day-of-week (if present) MUST match the date, numeric day MUST be in range for the month/year, time MUST be 00:00:00–23:59:60 (allowing leap second), and zone MUST be within -9959 through +9959.'
section: "3.3"
rfc2119_level: MUST
topics:
    - email
