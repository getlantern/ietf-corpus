document: rfc-7599
kind: normative-requirement
summary: A CE processing IPv6-to-IPv4 packets MUST check that each received packet's transport-layer destination port is within the range allowed by the CE's BMR configuration, and MUST silently drop any nonconforming packet while incrementing an appropriate counter.
section: "8.2"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
