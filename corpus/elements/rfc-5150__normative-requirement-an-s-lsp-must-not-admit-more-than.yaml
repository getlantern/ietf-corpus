document: rfc-5150
kind: normative-requirement
summary: An S-LSP MUST NOT admit more than one e2e LSP into it. If an S-LSP is allocated to an e2e LSP, the unreserved bandwidth SHOULD be set to zero to prevent further e2e LSPs from being admitted.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
