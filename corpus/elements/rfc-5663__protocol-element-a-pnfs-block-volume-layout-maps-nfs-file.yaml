document: rfc-5663
kind: protocol-element
summary: A pNFS block/volume layout maps NFS file regions to extents on a logical storage volume. Extents use 64-bit byte offsets and lengths (offset4, length4 types), and the volume topology is communicated via GETDEVICEINFO using a pnfs_block_deviceaddr4 structure returned as the storage-protocol-specific da_addr_body field.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
