summary: The id-pe-autonomousSysIds-v2 extension encodes an ASIdentifiers SEQUENCE with optional EXPLICIT-tagged asnum [0] and rdi [1] fields, each an ASIdentifierChoice of either NULL (inherit) or a SEQUENCE OF ASIdOrRange. ASId is an INTEGER; RDI values MUST NOT be used.
