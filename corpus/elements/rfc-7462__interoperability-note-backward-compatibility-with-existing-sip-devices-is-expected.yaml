document: rfc-7462
kind: interoperability-note
summary: Backward compatibility with existing SIP devices is expected because devices that do not understand an 'alert' URN should ignore it, and multiple Alert-Info values were syntactically permitted by RFC 3261 before this document even though they were rarely used in practice.
