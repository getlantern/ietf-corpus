document: rfc-4642
kind: security-consideration
summary: During TLS negotiation, the client MUST check its understanding of the server hostname against the server's identity in the Certificate message to prevent man-in-the-middle attacks. The client MUST use the hostname used to open the connection and MUST NOT use hostnames derived from insecure remote sources such as insecure DNS lookups.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
