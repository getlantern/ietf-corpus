document: rfc-5949
kind: normative-requirement
summary: HI and HAck messages exchanged between the PMAG and NMAG MUST be protected using end-to-end security associations offering integrity and data origin authentication. Both MAGs MUST implement IPsec (RFC 4301) for this purpose.
section: "7"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - ipsec
