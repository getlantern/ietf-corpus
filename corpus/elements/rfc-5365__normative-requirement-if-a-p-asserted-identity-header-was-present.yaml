document: rfc-5365
kind: normative-requirement
summary: If a P-Asserted-Identity header was present in the incoming MESSAGE and the request was from a trusted source and the first hop of the outgoing request is also trusted, the MESSAGE URI-list service MUST include P-Asserted-Identity with the same value in the outgoing request.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
