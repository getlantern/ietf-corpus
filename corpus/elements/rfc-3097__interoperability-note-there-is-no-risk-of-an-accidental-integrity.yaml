document: rfc-3097
kind: interoperability-note
summary: There is no risk of an accidental Integrity handshake succeeding due to the renumbering because both sides of the handshake must use matching numbers. Additionally, the Integrity Response includes a 32-bit cookie that must match the cookie in the Challenge message, and RFC 2961 requires Bundle messages be sent only to Bundle-capable nodes.
section: "3"
topics:
    - security
