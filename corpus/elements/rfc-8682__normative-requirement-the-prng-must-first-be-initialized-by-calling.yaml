document: rfc-8682
kind: normative-requirement
summary: The PRNG MUST first be initialized by calling tinymt32_init(s, seed) before any output is generated. The tinymt32_t structure must be left unchanged by the caller between successive calls to tinymt32_generate_uint32.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
