document: rfc-6447
kind: normative-requirement
summary: It is RECOMMENDED that the initial SUBSCRIBE contain a 'min-rate' rate control parameter with a large value (corresponding to a very short delay) that is updated in a later message to a more sensible value, to obtain location information in a timely fashion for use cases such as emergency call routing.
section: "3.6"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
