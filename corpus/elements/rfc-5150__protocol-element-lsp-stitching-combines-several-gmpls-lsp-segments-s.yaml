document: rfc-5150
kind: protocol-element
summary: LSP stitching combines several GMPLS LSP segments (S-LSPs) such that a single end-to-end LSP is realized in the data plane, with the key constraint that a constituent S-LSP not be allocated to more than one e2e LSP. The entire bandwidth of an S-LSP is dedicated to the single e2e LSP stitched to it.
section: "1"
topics:
    - mpls
    - realtime
    - routing
