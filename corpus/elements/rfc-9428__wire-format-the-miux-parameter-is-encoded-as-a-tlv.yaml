document: rfc-9428
kind: wire-format
summary: 'The MIUX parameter is encoded as a TLV: Type field (1 byte, value 0x02), Length field (1 byte, value 0x02), and a 2-byte Value field where the MIUX value occupies the least significant 11 bits. Unused bits are set to zero by the sender and ignored by the receiver.'
section: "3.4"
