document: rfc-3816
kind: interoperability-note
summary: 'rohcRtpContextMode exposes the three ROHC operating modes from RFC 3095 Section 4.4: unidirectional(1), optimistic(2), and reliable(3). Implementations using the RTP/UDP/ESP/LLA profile MIB must map the negotiated RFC 3095 mode to these enumerated values.'
