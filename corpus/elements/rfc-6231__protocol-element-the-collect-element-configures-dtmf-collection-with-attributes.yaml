document: rfc-6231
kind: protocol-element
summary: The <collect> element configures DTMF collection, with attributes including maxdigits, timeout, interdigittimeout, termchar, and bargein. A <grammar> child element can specify an inline or external DTMF grammar. Results are reported in <collectinfo> with dtmf and termmode attributes.
section: 4.3.1.3
topics:
