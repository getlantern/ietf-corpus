document: rfc-5985
kind: normative-requirement
summary: The LIS MUST NOT include any means of identifying the Device in the PIDF-LO unless it is able to verify that the identifier is correct and inclusion of identity is expressly permitted by a Rule Maker. A unique, unlinked presentity URI SHOULD be generated by the LIS for the mandatory presence 'entity' attribute.
section: "6.6"
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
