document: rfc-6880
kind: protocol-element
summary: keyEncryptionType SHOULD be represented as an enumeration using the string name of the enctype from the IANA Kerberos Encryption Type Numbers registry (e.g., 'aes128-cts-hmac-sha1-96'). keyValue is a single-valued mandatory octet string holding the binary key material.
section: 4.3.1.1
