document: rfc-7192
kind: normative-requirement
summary: If an implementation supports RSA, RSASSA-PSS, DSA, RSAES-OAEP, or Diffie-Hellman, it MUST support key lengths from 1024-bit to 2048-bit inclusive. If it supports ECDSA or ECDH, it MUST support keys on the P-256 curve.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
