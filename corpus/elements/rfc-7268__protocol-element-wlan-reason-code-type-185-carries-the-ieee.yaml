document: rfc-7268
kind: protocol-element
summary: WLAN-Reason-Code (Type 185) carries the IEEE 802.11 Reason Code (Table 8-36) to be copied by the AP into a Disassociation or Deauthentication frame upon receipt of an Access-Reject or Disconnect-Request. It MAY appear in Access-Reject, Disconnect-Request, and Accounting-Request packets.
section: "2.13"
topics:
