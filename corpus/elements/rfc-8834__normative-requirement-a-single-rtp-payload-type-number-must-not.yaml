document: rfc-8834
kind: normative-requirement
summary: A single RTP payload type number MUST NOT be assigned to different RTP payload formats, or different configurations of the same format, within a single RTP session. Payload type assignments MUST be unique across signaling contexts when used to associate RTP packet streams with those contexts.
section: "4.3"
rfc2119_level: MUST
topics:
    - webrtc
    - rtp
    - realtime
