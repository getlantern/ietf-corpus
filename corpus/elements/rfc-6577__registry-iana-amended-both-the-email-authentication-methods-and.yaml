document: rfc-6577
kind: registry
summary: IANA amended both the Email Authentication Methods and Email Authentication Result Names registries to include a 'Status' column. Legal values are 'active' (entry is in current use) and 'deprecated' (entry is no longer in current use). All existing entries except 'hardfail' are marked 'active'.
