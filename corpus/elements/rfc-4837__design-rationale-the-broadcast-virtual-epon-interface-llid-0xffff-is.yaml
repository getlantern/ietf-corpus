document: rfc-4837
kind: design-rationale
summary: The broadcast virtual EPON interface (LLID=0xffff) is added at the OLT to allow single-copy broadcast transmission to all ONUs, preserving the inherent bandwidth efficiency of the shared PON medium. This interface has no corresponding bridge port mapping.
section: 2.2.5
