document: rfc-5691
kind: protocol-element
summary: The MPS-profile-level-id parameter carries a decimal representation of the MPEG Surround Profile and Level Indication as defined in ISO/IEC 14496-3. It MUST be used in capability exchange or session set-up to indicate the required decoder capability.
