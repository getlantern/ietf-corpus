document: rfc-9071
kind: interoperability-note
summary: Gateways to PSTN textphones (TTYs) SHOULD NOT indicate multiparty awareness for those endpoints, or alternatively should incorporate the multiparty-unaware mixing function themselves, since textphones are limited devices with no multiparty awareness.
section: "6.1"
topics:
