document: rfc-2264
kind: protocol-element
summary: The authoritative SNMP engine for a message exchange is the receiver for PDUs expecting a response (Get, GetNext, GetBulk, Set, Inform) and the sender for PDUs not expecting a response (SNMPv2-Trap, Response, Report). This designation determines which engine's snmpEngineBoots/snmpEngineTime values are used for timeliness.
section: 1.5.1
topics:
    - snmp
    - security
