document: rfc-2601
kind: protocol-element
summary: An ATMARP client queries the service registry table via ILMI using SNMP GetNext to sweep beginning with {Port=0, ServiceID=atmfSrvcRegATMARP OID, Index=0}, holding port number and serviceID constant. Port number 0 indicates 'this port' within ILMI.
