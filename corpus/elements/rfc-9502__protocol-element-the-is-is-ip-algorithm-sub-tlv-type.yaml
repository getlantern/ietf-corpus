document: rfc-9502
kind: protocol-element
summary: The IS-IS IP Algorithm Sub-TLV (Type 29) is a sub-TLV of the IS-IS Router Capability TLV that advertises IP Flexible Algorithm participation. It contains a variable-length list of 1-octet Algorithm values, each in the range 128–255. Participation advertised here is topology-independent and applies to all topologies in which the advertising node participates.
section: "5.1"
topics:
    - routing
    - ip
