document: rfc-9536
kind: normative-requirement
summary: Servers MUST add the "reverse_search_properties_mapping" member to the topmost object of a reverse search response, detailing the JSONPath mapping used for each property in the query. This member MUST be included for all properties used in the search.
section: "5"
rfc2119_level: MUST
topics:
