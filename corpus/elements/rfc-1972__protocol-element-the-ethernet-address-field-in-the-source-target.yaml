document: rfc-1972
kind: protocol-element
summary: The Ethernet Address field in the Source/Target Link-layer Address option is the 48-bit IEEE 802 address in canonical bit order. This is the address the interface currently responds to and may differ from the built-in address used as the address token.
section: Address Mapping -- Unicast
