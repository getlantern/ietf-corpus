document: rfc-1994
kind: design-rationale
summary: CHAP provides protection against replay attacks through an incrementally changing Identifier and a variable Challenge Value. Repeated challenges limit the time of exposure to any single attack, with the authenticator controlling the frequency and timing.
section: "2.1"
