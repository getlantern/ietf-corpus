document: rfc-9348
kind: protocol-element
summary: The dont-fragment leaf (boolean, default false) disables inner-packet fragmentation across consecutive IP-TFS tunnel packets on transmission. When enabled, inner packets that exceed the outer packet capacity are dropped rather than fragmented and spread across multiple outer packets.
section: "3.2"
topics:
