document: rfc-3209
kind: wire-format
summary: 'ERO subobject header: 1-bit L (loose/strict flag), 7-bit Type, 8-bit Length (MUST be a multiple of 4 and at least 4). IPv4 prefix subobject is always 8 bytes (4-octet address + 1-octet prefix length + 1-octet pad). IPv6 prefix subobject is always 20 bytes. AS number subobject is 4 bytes with 2-octet AS number.'
section: 4.3.3
topics:
    - mpls
    - routing
