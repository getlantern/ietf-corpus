document: rfc-2047
kind: normative-requirement
summary: A mail reader MUST NOT prevent the display or handling of a message because an encoded-word is incorrectly formed. The reader need not attempt to display the text of a malformed encoded-word, but must not block the entire message.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - email
