document: rfc-9374
kind: protocol-element
summary: The HHIT Suite ID (HHSI) is an 8-bit value that specifies the HI and hash algorithms, and is a superset of the 4-bit and 8-bit HIT Suite IDs defined in RFC 7401. Values 1–31 map to existing HIT Suite IDs; values 32–255 are HHIT-specific. Values 254 and 255 are reserved for HDA Private Use.
section: "3.2"
topics:
