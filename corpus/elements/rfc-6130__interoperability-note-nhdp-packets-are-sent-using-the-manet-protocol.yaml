document: rfc-6130
kind: interoperability-note
summary: NHDP packets are sent using the 'manet' protocol number or well-known UDP port number from RFC 5498, and MAY use the link-local multicast address LL-MANET-Routers. All packets and messages MUST conform to RFC 5444 format.
