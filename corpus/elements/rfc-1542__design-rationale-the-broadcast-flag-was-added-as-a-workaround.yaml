document: rfc-1542
kind: design-rationale
summary: The BROADCAST flag was added as a workaround for client implementations that cannot receive unicast datagrams before knowing their IP address. The workaround is discouraged and such implementations SHOULD be fixed to accept unicast BOOTREPLY messages.
section: 3.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
