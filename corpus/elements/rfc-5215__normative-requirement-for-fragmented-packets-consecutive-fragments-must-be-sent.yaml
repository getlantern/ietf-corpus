document: rfc-5215
kind: normative-requirement
summary: For fragmented packets, consecutive fragments MUST be sent without any other payload between the first and last fragment. The timestamp MUST be the same as the first packet sent across all fragments, while the sequence number increments normally.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
