document: rfc-9983
kind: normative-requirement
summary: The AC-Flag and the N-flag MUST NOT both be set. Reception of an advertisement with both flags set MUST be considered a configuration anomaly, and the N-flag MUST be ignored.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
