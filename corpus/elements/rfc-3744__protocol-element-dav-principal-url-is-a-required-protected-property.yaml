document: rfc-3744
kind: protocol-element
summary: DAV:principal-URL is a required protected property on every principal resource that returns the single canonical URL clients MUST use when constructing ACEs for that principal. It resolves the problem of a principal having multiple URLs.
section: "4.2"
topics:
    - security
