document: rfc-9604
kind: design-rationale
summary: A binding label/SID enables upstream nodes to steer traffic with a single SID instead of imposing a full SID stack. As illustrated in the DC/WAN example, the access node uses {Y, X} rather than {Y, A, B, C, D}, directly reducing the forwarding capacity burden on access nodes.
section: "1.1"
topics:
