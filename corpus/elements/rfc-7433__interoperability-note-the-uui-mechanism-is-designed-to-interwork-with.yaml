document: rfc-7433
kind: interoperability-note
summary: The UUI mechanism is designed to interwork with PSTN/ISDN services. The default package 'isdn-uui' provides interworking with ITU-T Q.931 User-user information and Q.763 User-to-User information parameter; details are in RFC 7434.
