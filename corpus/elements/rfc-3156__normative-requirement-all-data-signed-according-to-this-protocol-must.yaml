document: rfc-3156
kind: normative-requirement
summary: All data signed according to this protocol MUST be constrained to 7 bits; 8-bit data MUST be encoded using either Quoted-Printable or Base64. This applies even when the signed object is also encrypted.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
