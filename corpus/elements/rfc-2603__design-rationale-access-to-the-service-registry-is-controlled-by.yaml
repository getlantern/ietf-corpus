document: rfc-2603
kind: design-rationale
summary: Access to the service registry is controlled by MIB design (read-only access) rather than protocol security mechanisms. This means any user-side device can query the registry but cannot alter NHS addresses, relying on administrative control of ATM switch configuration as the security boundary.
section: "7"
topics:
    - security
