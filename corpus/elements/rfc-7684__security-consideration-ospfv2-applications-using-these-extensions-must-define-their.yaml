document: rfc-7684
kind: security-consideration
summary: OSPFv2 applications using these extensions must define their own security considerations in their respective specifications. The new LSAs are subject to the same general security concerns as OSPFv2 (RFC 2328) and Opaque LSAs (RFC 5250).
