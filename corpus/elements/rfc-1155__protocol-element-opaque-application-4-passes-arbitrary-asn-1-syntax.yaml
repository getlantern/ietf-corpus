document: rfc-1155
kind: protocol-element
summary: Opaque (APPLICATION 4) passes arbitrary ASN.1 syntax by encoding a value with ASN.1 BER into an octet string, then encoding that as an OCTET STRING—effectively double-wrapping. A conforming implementation need only accept and recognize opaque data, not interpret it.
section: 3.2.3.6
topics:
    - snmp
