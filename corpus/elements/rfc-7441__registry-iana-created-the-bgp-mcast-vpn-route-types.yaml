document: rfc-7441
kind: registry
summary: IANA created the 'BGP MCAST-VPN Route Types' registry under the 'Border Gateway Protocol (BGP) Parameters' top-level registry. Allocation policy is Standards Action. Initial assignments include values 0x01-0x07 for Generic/PIM types (RFC 6514), 0x43, 0x44, 0x47 for mLDP types, and 0x80-0xFF reserved.
