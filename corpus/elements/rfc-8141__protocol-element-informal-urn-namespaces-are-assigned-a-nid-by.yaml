document: rfc-8141
kind: protocol-element
summary: 'Informal URN namespaces are assigned a NID by IANA consisting of the string ''urn-'' followed by the next available positive integer (e.g., ''urn-7''). The NID syntax is: InformalNamespaceName = ''urn-'' Number, where Number is a non-zero-leading decimal integer.'
section: "5.2"
topics:
