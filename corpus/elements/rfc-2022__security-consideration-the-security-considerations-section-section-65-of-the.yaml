summary: 'The Security Considerations section (section 65 of the document) is present but the document text was truncated before that section. The MARS architecture has inherent trust assumptions: cluster members rely on the MARS for correct group membership information, and a compromised MARS could redirect multicast traffic or deny service by returning incorrect ATM addresses or manipulating the ClusterControlVC.'
