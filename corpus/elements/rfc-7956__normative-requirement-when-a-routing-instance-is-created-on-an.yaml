document: rfc-7956
kind: normative-requirement
summary: When a routing instance is created on an edge RBridge, the Tenant ID, tenant Data Label, and tenant gateway MAC MUST be globally advertised (via the Tenant Label and Gateway MAC APPsub-TLV) so that remote edge RBridges can generate IP routing entries for that routing domain.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
