document: rfc-7138
kind: normative-requirement
summary: The Switching Capability Specific Information (SCSI) MUST include one Type 1 sub-TLV for each fixed container and one Type 2 sub-TLV for each variable container. The muxing hierarchy tree MUST be encoded as an order-independent list.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
