document: rfc-2001
kind: protocol-element
summary: 'Fast recovery algorithm: on the third duplicate ACK, set ssthresh to max(cwnd/2, 2*segsize), retransmit the missing segment, and set cwnd to ssthresh + 3*segsize to account for segments that have left the network and are buffered at the receiver.'
