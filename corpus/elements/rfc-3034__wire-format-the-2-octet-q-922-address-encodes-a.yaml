summary: The 2-octet Q.922 address encodes a 10-bit DLCI across two bytes with specific bit positions for DLCI high and low order bits, with bits 1-0 of octet 0 set to 0 and bit 0 of octet 1 set to 1 (EA bit). The 4-octet form encodes a 23-bit DLCI across four bytes, with bit 0 of the last octet set to 1.
