document: rfc-3986
kind: protocol-element
summary: URI component recomposition reconstructs a URI string from parsed components by conditionally prepending "scheme:", "//authority", appending path, then "?query" and "#fragment" if defined. An undefined component (separator absent) is distinct from an empty component (separator present but no value).
section: "5.3"
topics:
    - http
