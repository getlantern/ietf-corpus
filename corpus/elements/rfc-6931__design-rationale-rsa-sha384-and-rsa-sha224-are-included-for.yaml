document: rfc-6931
kind: design-rationale
summary: RSA-SHA384 and RSA-SHA224 are included for completeness but the document notes that SHA-384 requires about the same computation as SHA-512, and SHA-224 as SHA-256; therefore RSA-SHA512 is suggested over RSA-SHA384, and RSA-SHA256 over RSA-SHA224, wherever possible.
section: 2.3.3
