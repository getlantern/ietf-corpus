document: rfc-7839
kind: design-rationale
summary: ANI options in DHCP are motivated by PMIPv6 deployments where the Local Mobility Anchor (LMA) needs access-network information to apply differentiated service treatment and policy (e.g., 3GPP PCC, ANDSF). The Mobile Access Gateway (MAG) obtains this information from the DHCP relay agent and conveys it to the LMA via PMIPv6 signaling (RFC 6757).
section: "2"
topics:
