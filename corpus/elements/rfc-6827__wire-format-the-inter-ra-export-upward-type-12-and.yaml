document: rfc-6827
kind: wire-format
summary: The Inter-RA Export Upward (Type 12) and Inter-RA Export Downward (Type 13) sub-TLVs each have Length 4 and a Value field containing the 4-octet RA ID from which the routing information was exported. These sub-TLVs may appear in Link, Node Attribute, and Router Address TLVs.
