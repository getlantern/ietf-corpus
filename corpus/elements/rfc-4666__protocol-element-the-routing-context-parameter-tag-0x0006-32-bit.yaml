document: rfc-4666
kind: protocol-element
summary: The Routing Context parameter (Tag 0x0006, 32-bit unsigned integer) uniquely identifies a Routing Key — a set of SS7 parameters (e.g., DPC, OPC, SI) used to filter and route traffic to a specific Application Server. There is a strict 1:1 relationship between a Routing Context and a Routing Key, and the Routing Context functions as an index into the node's Message Distribution Table.
section: 1.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
