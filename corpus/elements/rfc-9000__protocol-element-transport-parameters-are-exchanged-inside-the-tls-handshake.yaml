document: rfc-9000
kind: protocol-element
summary: Transport parameters are exchanged inside the TLS handshake and thereby authenticated. They configure initial flow control limits (initial_max_data, initial_max_stream_data_*), stream concurrency limits (initial_max_streams_*), idle timeout, max UDP payload size, and connection ID constraints. Server parameters are TLS-encrypted; client parameters are not.
section: "7.4"
topics:
