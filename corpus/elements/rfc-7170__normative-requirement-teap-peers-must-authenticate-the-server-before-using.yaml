document: rfc-7170
kind: normative-requirement
summary: TEAP peers MUST authenticate the server before using peer services such as PAC provisioning, certificate provisioning, or channel binding. Peers MUST have a configuration where authentication fails if server authentication cannot be achieved.
section: "3.8"
rfc2119_level: MUST
topics:
