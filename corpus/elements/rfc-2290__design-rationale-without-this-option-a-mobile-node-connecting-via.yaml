document: rfc-2290
kind: design-rationale
summary: Without this option, a mobile node connecting via PPP to a foreign link cannot use a foreign agent care-of address without first being assigned a unique IP address. The ambiguity in IPCP negotiation (the peer cannot distinguish a mobile node proposing its home address from a conventional node proposing a non-routable address) defeats the shared-address advantage of foreign agents.
section: "1.3"
topics:
    - mobility
    - ip
