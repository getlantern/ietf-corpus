document: rfc-1771
kind: normative-requirement
summary: 'For a peer previously transitioned to Idle due to an error, automatically generated Start events SHALL use exponential backoff: initial timer is 60 seconds, doubling on each consecutive retry, to prevent persistent connection flapping.'
section: "8"
rfc2119_level: SHOULD
