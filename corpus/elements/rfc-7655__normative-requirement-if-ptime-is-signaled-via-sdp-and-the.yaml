document: rfc-7655
kind: normative-requirement
summary: If ptime is signaled via SDP and the number of G.711 symbols decoded from the RTP payload does not match ptime, the packet MUST be discarded unless system design knowledge (e.g., 5 ms clock slips) allows otherwise.
section: 4.2.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
