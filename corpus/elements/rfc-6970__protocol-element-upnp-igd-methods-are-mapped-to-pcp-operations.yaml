document: rfc-6970
kind: protocol-element
summary: 'UPnP IGD methods are mapped to PCP operations: AddAnyPortMapping() and AddPortMapping() map to PCP MAP requests; GetSpecificPortMappingEntry() maps to MAP with PREFER_FAILURE option; DeletePortMapping() maps to MAP with Requested Lifetime=0; GetExternalIPAddress() can be satisfied from any active mapping.'
