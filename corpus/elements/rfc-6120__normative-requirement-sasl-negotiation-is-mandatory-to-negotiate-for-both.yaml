document: rfc-6120
kind: normative-requirement
summary: SASL negotiation is mandatory-to-negotiate for both client-to-server and server-to-server streams; both the initiating entity and receiving entity MUST support SASL. After successful SASL exchange the initiating entity MUST send a new initial stream header to restart the stream.
section: 6.3.1
rfc2119_level: MUST
topics:
    - security
