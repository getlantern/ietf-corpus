document: rfc-8210
kind: normative-requirement
summary: The cache MUST rate-limit Serial Notify PDUs to no more than one per minute. Serial Notify is analogous to DNS NOTIFY and is only a hint; the protocol requires the router to poll periodically regardless.
section: "8.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
