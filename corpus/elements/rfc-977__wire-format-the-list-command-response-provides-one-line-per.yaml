document: rfc-977
kind: wire-format
summary: 'The LIST command response provides one line per newsgroup in the format: ''group last first p'', where group is the newsgroup name, last and last are numeric article numbers (possibly with leading zeros), and p is ''y'' (posting allowed) or ''n'' (posting prohibited). If last < first, there are no current articles.'
