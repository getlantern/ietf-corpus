document: rfc-5116
kind: normative-requirement
summary: Each AEAD algorithm MUST only accept keys with a fixed key length K_LEN and MUST NOT require any particular data format for the keys. Each algorithm MUST accept plaintext lengths between zero and P_MAX (which MUST be larger than zero and SHOULD be at least 65,536 octets).
section: "4"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
