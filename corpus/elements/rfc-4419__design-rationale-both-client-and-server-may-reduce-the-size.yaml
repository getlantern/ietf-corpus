document: rfc-4419
kind: design-rationale
summary: Both client and server may reduce the size of their private exponents to speed up key exchange. The private exponent should be at least twice as long as the key material generated from the shared secret (per van Oorschot and Wiener). Safe primes make short exponents safe from discrete-log attacks.
section: "6.2"
topics:
