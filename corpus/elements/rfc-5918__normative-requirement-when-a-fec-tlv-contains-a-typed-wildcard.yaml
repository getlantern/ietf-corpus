document: rfc-5918
kind: normative-requirement
summary: When a FEC TLV contains a Typed Wildcard FEC Element, the Typed Wildcard FEC Element MUST be the only FEC Element in the TLV. If other FEC elements are also present, the receiver should ignore them and process as if only the Typed Wildcard FEC Element was present.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
