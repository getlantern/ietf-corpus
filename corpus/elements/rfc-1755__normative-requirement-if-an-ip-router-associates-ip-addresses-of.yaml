document: rfc-1755
kind: normative-requirement
summary: If an IP router associates IP addresses of multiple LISs with distinct ATM addresses differentiated by the SEL field, its signaling entity MUST carry the ATM addresses corresponding to the particular IP entity in the Calling and Called Party Number IEs of the SETUP message.
section: "7.4"
rfc2119_level: MUST
topics:
    - ip
