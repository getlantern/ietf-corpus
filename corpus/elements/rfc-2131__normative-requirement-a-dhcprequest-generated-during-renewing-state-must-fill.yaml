document: rfc-2131
kind: normative-requirement
summary: A DHCPREQUEST generated during RENEWING state MUST fill in 'ciaddr' with the client's current IP address and MUST NOT include 'server identifier' or 'requested IP address' options; the message is sent unicast directly to the server.
section: 4.3.2
rfc2119_level: MUST
topics:
    - ip
