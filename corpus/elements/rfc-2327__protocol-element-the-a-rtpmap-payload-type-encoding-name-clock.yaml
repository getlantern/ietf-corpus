document: rfc-2327
kind: protocol-element
summary: The 'a=rtpmap:<payload-type> <encoding-name>/<clock-rate>[/<encoding-params>]' attribute dynamically binds RTP payload type numbers to media encodings, required for dynamic payload types. Up to one rtpmap attribute per format; audio channels may be given as encoding-params. Experimental encoding names must be prefixed with 'X-'.
section: "6"
topics:
