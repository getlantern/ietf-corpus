document: rfc-5951
kind: normative-requirement
summary: An MPLS-TP NE MUST support local reporting of alarms and MUST support reporting of alarms to an OS both autonomously and on request. An NE supporting client-layer technologies over MPLS-TP MUST be capable of translating MPLS-TP defects into client-layer failure conditions.
section: 5.3.3
rfc2119_level: MUST
topics:
    - mpls
