document: rfc-5324
kind: design-rationale
summary: When InterfaceIndexOrZero and Fabric Index appear together in an INDEX clause, the interface index is listed first. This ordering simplifies management queries that retrieve information about multiple Fabrics connected to the same physical port, allowing the table to be walked by interface without specifying a Fabric.
section: "4.4"
topics:
    - security
