document: rfc-5944
kind: normative-requirement
summary: The mobile node's solicitation rate MUST be limited; after three initial solicitations at up to one per second, subsequent solicitations MUST use binary exponential backoff up to a maximum interval that SHOULD be at least one minute.
section: "2.4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
