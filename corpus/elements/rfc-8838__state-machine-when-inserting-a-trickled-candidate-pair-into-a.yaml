document: rfc-8838
kind: state-machine
summary: 'When inserting a trickled candidate pair into a checklist, three rules determine initial pair state: Rule 1 — if the pair is topmost in its foundation column (lowest component ID, highest priority), set to Waiting; Rule 2 — if any pair in that foundation has already Succeeded, set to Waiting; Rule 3 — in all other cases, set to Frozen.'
