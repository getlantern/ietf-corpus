document: rfc-5989
kind: interoperability-note
summary: To monitor multiple HTTP resources efficiently, clients may use the 'monitor-group' URI to group resources sharing a common monitor-group link into a single SUBSCRIBE request per group, using request-contained resource lists per RFC 5367. This avoids the overhead of a separate subscription per resource.
section: "3.2"
topics:
    - sip
    - http
