document: rfc-4871
kind: normative-requirement
summary: Verifiers MUST implement both 'simple' and 'relaxed' canonicalization algorithms for header and body. If no canonicalization algorithm is specified by the signer, 'simple' is the default for both header and body.
section: "3.4"
rfc2119_level: MUST
