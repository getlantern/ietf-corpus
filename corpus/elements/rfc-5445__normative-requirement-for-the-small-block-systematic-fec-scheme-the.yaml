document: rfc-5445
kind: normative-requirement
summary: For the Small Block Systematic FEC Scheme, the RFC 5052 Section 9.1 partitioning algorithm MAY be used; if it is not used, the FEC Scheme instance MUST specify the partitioning algorithm. This allows systematic FEC instances with non-standard block structures to define their own partitioning.
section: "5.3"
rfc2119_level: MAY
topics:
    - multicast
