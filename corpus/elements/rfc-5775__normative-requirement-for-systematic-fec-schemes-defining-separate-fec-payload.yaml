document: rfc-5775
kind: normative-requirement
summary: For systematic FEC Schemes defining separate FEC Payload ID formats for source vs. repair packets, the SPI bit MUST be set to 1 for source-data format and MUST be set to 0 for repair-data format. For FEC Schemes with only a single FEC Payload ID format, SPI MUST be set to 0 by sender and MUST be ignored by receiver.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
