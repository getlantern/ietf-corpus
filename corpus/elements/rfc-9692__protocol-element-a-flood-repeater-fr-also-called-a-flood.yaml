document: rfc-9692
kind: protocol-element
summary: A Flood Repeater (FR), also called a flood leader, is a northbound neighbor designated by a node to relay northbound TIEs further north. This mechanism prunes redundant flooding over a sufficient subset of links to minimize control-plane overhead.
section: 6.3.9
topics:
    - routing
