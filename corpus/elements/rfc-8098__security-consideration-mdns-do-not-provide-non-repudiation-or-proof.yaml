document: rfc-8098
kind: security-consideration
summary: MDNs do not provide non-repudiation or proof of delivery. Even unforgeable MDNs can be lost in transit or bypassed by the recipient, so they cannot serve as a legal guarantee that a message was seen.
section: "6.3"
topics:
