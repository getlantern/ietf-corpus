document: rfc-9530
kind: normative-requirement
summary: Content-Digest and Repr-Digest MAY be sent in a trailer section, in which case they MAY be merged into the header section per Section 6.5.1 of [HTTP]. A sender MAY send a digest without knowing whether the recipient supports the given hashing algorithm.
section: "2"
rfc2119_level: MAY
topics:
    - http
