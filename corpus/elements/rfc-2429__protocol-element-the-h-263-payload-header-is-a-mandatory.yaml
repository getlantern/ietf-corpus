document: rfc-2429
kind: protocol-element
summary: The H.263+ payload header is a mandatory variable-length header present in every H.263+ RTP packet. It consists of a 16-bit base field, an optional 8-bit VRC field (when V=1), and an optional extra picture header of PLEN bytes.
