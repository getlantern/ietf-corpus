document: rfc-6994
kind: normative-requirement
summary: All ExIDs MUST be unique based on their first 16 bits. IANA registers on an FCFS basis using the first two bytes, so those two bytes alone are sufficient to identify which experiment the option belongs to.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - registry
