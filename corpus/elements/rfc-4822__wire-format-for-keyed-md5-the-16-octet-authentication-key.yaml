document: rfc-4822
kind: wire-format
summary: For Keyed-MD5, the 16-octet Authentication Key is appended to the RIPv2 packet in memory, followed by MD5 trailing pad octets and a 64-bit message length, then MD5 is computed per RFC 1321. The Authentication Data Length field is always 16 octets.
section: "2.4"
topics:
    - routing
    - crypto
