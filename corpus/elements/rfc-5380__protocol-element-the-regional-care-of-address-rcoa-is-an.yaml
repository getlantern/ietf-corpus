document: rfc-5380
kind: protocol-element
summary: The Regional Care-of Address (RCoA) is an address allocated by the MAP to the mobile node, formed stateless by combining the mobile node's interface identifier with the subnet prefix received in the MAP option. The LCoA is the on-link CoA configured on the mobile node's interface based on the prefix advertised by its default router.
section: "2"
