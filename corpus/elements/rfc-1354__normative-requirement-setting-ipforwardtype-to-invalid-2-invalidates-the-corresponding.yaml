document: rfc-1354
kind: normative-requirement
summary: Setting ipForwardType to invalid(2) invalidates the corresponding entry in ipForwardTable. Whether the agent removes the entry is implementation-specific; management stations MUST be prepared to receive entries not currently in use and MUST examine ipForwardType to interpret them correctly.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
