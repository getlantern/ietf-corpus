document: rfc-9635
kind: protocol-element
summary: The grant continuation mechanism allows the client instance to continue, update, or revoke a pending grant by calling the continuation URI using the continuation access token. The continuation access token is always bound to the client instance's key and must be presented with the appropriate proofing method.
section: "3.1"
topics:
    - oauth
    - security
