document: rfc-2273
kind: protocol-element
summary: The registerContextEngineID abstract service interface allows a command responder or proxy forwarder to register with the Dispatcher for a given contextEngineID and pduType. Duplicate registrations for the same contextEngineID/pduType are denied; only one registrant per combination is allowed.
section: "3.2"
topics:
