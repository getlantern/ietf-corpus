document: rfc-7112
kind: normative-requirement
summary: When discarding a non-compliant First Fragment and sending an ICMPv6 error, the error message MUST be Type 4 ("Parameter Problem") with Code 3 ("First Fragment has incomplete IPv6 Header Chain"). The Pointer field MUST be set to zero.
section: "5"
rfc2119_level: MUST
topics:
