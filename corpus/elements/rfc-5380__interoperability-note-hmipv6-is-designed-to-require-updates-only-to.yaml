document: rfc-5380
kind: interoperability-note
summary: HMIPv6 is designed to require updates only to mobile node implementations. The home agent and correspondent node operations are completely unchanged and transparent to HMIPv6. An HMIPv6-aware mobile node with a Mobile IPv6 implementation SHOULD choose to use the MAP when discovering such capability, but may fall back to standard Mobile IPv6.
section: "3"
topics:
    - mobility
    - ip
