document: rfc-7784
kind: security-consideration
summary: SET operations against the TRILL OAM MIB in a non-secure environment without proper protection expose RBridges to attack. Implementations must apply SNMPv3 security or equivalent access controls; if OAM frame rates are high and control-plane policing is absent, destination RBridges may suffer CPU spikes.
section: "8"
topics:
    - security
    - snmp
