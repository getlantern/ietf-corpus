document: rfc-7138
kind: security-consideration
summary: This document extends RFC 4203 and specifies contents of Opaque LSAs in OSPFv2. Opaque LSAs are not used for SPF computation, so extensions have no direct effect on IP routing. Tampering with GMPLS TE LSAs may affect the underlying optical/SONET-SDH transport. Security mechanisms from RFC 2328 and analysis from RFC 6863 apply. RFC 5920 should be consulted for detailed MPLS/GMPLS security threats and defensive techniques.
section: "8"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
