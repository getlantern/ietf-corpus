document: rfc-3175
kind: wire-format
summary: The IP6 SESSION object (Class = SESSION, C-Type = RSVP-AGGREGATE-IP6 = 10) contains a 16-byte IPv6 session address followed by a Flags byte and a 6-bit DSCP field. For sessions using paired PHBs (e.g., AF11/AF12), the numerically smallest DSCP (AF11) is used.
section: "3.3"
