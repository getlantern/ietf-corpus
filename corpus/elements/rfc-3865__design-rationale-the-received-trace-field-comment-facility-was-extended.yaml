document: rfc-3865
kind: design-rationale
summary: 'The Received: trace field comment facility was extended to carry solicitation keywords because RFC 2821 and 2822 prohibit intermediate MTAs from modifying message headers except for Received: fields, yet intermediate relay systems are commonly where spam detection occurs.'
section: "2.6"
topics:
