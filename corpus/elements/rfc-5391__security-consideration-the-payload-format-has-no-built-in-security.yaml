document: rfc-5391
kind: security-consideration
summary: The payload format has no built-in security mechanisms; confidentiality, integrity, and authentication must be provided by external mechanisms such as SRTP (RFC 3711). The format does not exhibit non-uniform receiver-end computational load and is unlikely to pose a denial-of-service threat via pathological datagrams.
section: "8"
topics:
