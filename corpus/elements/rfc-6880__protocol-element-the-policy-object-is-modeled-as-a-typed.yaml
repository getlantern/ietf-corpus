document: rfc-6880
kind: protocol-element
summary: The Policy object is modeled as a typed opaque binary value ('typed hole') paired with a globally unique identifier. Both the type identifier and the value must be present. Implementations SHOULD implement policies but MAY allow them to be OPTIONAL.
