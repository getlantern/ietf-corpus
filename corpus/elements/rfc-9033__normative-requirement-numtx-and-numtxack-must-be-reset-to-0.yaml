document: rfc-9033
kind: normative-requirement
summary: NumTx and NumTxAck MUST be reset to 0 each time the node switches parent (or first selects a parent). When NumTx reaches MAX_NUMTX, both MUST be divided by 2; MAX_NUMTX MUST be a power of two to avoid division error.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
