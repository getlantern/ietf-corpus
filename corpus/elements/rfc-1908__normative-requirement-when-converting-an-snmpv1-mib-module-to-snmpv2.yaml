document: rfc-1908
kind: normative-requirement
summary: When converting an SNMPv1 MIB module to SNMPv2, the IMPORTS statement must reference SNMPv2-SMI instead of RFC1155-SMI and RFC-1212, and the MODULE-IDENTITY macro must be invoked immediately after any IMPORTS statement.
section: "2.1"
rfc2119_level: MUST
topics:
