document: rfc-7726
kind: normative-requirement
summary: Each MPLS LSP ping used to bootstrap a BFD session MUST carry a different discriminator value in the BFD discriminator TLV. This enables multiple concurrent BFD sessions for the same <MPLS LSP, FEC> tuple.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
