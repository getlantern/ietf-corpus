document: rfc-3697
kind: security-consideration
summary: An adversary may obtain better service by modifying the IPv6 header or injecting packets with false addresses and/or Flow Labels. Such theft-of-service can become a denial-of-service attack when modified or injected traffic depletes forwarding resources. The risk is closely related to address spoofing because flows are identified by the 3-tuple.
section: "5.1"
topics:
    - ip
    - security
