document: rfc-3515
kind: normative-requirement
summary: If no final response has been generated, the UA MUST return a 202 Accepted response before the REFER transaction expires. If a REFER request is accepted (2xx response), the recipient MUST create a subscription and send notifications of the status of the refer.
section: 2.4.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
