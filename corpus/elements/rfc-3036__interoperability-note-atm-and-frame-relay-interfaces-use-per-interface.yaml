document: rfc-3036
kind: interoperability-note
summary: ATM and Frame Relay interfaces use per-interface label spaces (VCI/VPI and DLCI respectively), while interfaces that can share labels use a platform-wide label space. Per-interface label spaces are only meaningful when LDP peers are directly connected over that interface.
section: 2.2.1
topics:
    - mpls
    - routing
