document: rfc-4681
kind: normative-requirement
summary: If the client sends more than one user mapping hint, the server SHOULD use the applicable mapping supported by the server. No preference is given to the order in which hints are specified in the UserMappingDataList vector.
section: "3"
rfc2119_level: SHOULD
