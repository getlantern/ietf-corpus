document: rfc-9742
kind: protocol-element
summary: The 'severity-filter' grouping defines severity selection with special enumeration values 'none' (value 2147483647, matches nothing) and 'all' (value -2147483648, matches everything), plus standard syslog-severity enum values emergency(0) through debug(7). Lower numeric value means higher severity.
