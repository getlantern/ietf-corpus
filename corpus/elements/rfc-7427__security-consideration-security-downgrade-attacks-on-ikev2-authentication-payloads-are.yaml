document: rfc-7427
kind: security-consideration
summary: Security downgrade attacks on IKEv2 Authentication payloads are not a significant concern because any modification to the AUTH payload will be detected when the peer computes the signature over the IKE messages. However, attacks that force catastrophically weak ciphers must be blocked by policy.
section: "6"
topics:
