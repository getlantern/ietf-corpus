document: rfc-9761
kind: privacy-consideration
summary: 'The use of (D)TLS proxies for full handshake inspection is NOT RECOMMENDED whenever possible due to the privacy tradeoff: decrypting traffic exposes personally identifiable information and protected health information. Alternatives include bypass rules for well-known services, IoT device rejection of proxy sessions, and object security (e.g., OSCORE/RFC 8613).'
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - privacy
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
