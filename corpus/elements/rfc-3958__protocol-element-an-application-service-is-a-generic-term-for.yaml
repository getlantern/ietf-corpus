document: rfc-3958
kind: protocol-element
summary: An 'application service' is a generic term for some type of application independent of protocol, associated with an IANA-registered tag. An 'application protocol' implements the application service and is also IANA-registered. The combination of service and protocol tags (e.g., 'RetMail:POP3') is sufficient for a client to identify a compatible server.
section: "2.1"
topics:
    - dns
    - registry
