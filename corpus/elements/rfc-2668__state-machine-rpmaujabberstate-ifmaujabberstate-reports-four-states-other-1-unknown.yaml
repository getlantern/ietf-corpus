document: rfc-2668
kind: state-machine
summary: 'rpMauJabberState / ifMauJabberState reports four states: other(1), unknown(2), noJabber(3), jabbering(4). The agent MUST always return other(1) for MAU type dot3MauTypeAUI; the jabbering counter is always zero for AUI and all MAU types above 10 Mbps.'
