document: rfc-8334
kind: security-consideration
summary: The signed mark validation model provides cryptographic assurance that mark information has not been tampered with; the server MUST validate the digital signature using the public key of the external party. Other models (code, mark) rely on server-side policy and out-of-band secrets with weaker guarantees.
section: "6"
