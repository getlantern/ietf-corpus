document: rfc-4184
kind: interoperability-note
summary: When an RTP payload contains multiple complete AC-3 frames (FT=0, NF>1), the receiver must use the 'frmsizecod' field in the Synchronization Information block of each frame to determine frame boundaries, since frame length may vary from frame to frame.
section: "4.1"
topics:
