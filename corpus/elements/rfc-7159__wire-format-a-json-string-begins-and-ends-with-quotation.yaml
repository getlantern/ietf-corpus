document: rfc-7159
kind: wire-format
summary: A JSON string begins and ends with quotation marks (U+0022). Characters U+0000 through U+001F, quotation mark, and reverse solidus MUST be escaped. Non-BMP characters are encoded as a 12-character UTF-16 surrogate pair escape sequence (e.g., '\uD834\uDD1E').
section: "7"
