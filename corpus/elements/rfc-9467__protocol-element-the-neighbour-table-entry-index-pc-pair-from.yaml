document: rfc-9467
kind: protocol-element
summary: The neighbour table entry (Index, PC) pair from RFC 8967 Section 3.2 is replaced by a triple (Index, PCm, PCu), where Index is 0–32 octets, and PCm and PCu are 32-bit integers tracking the highest PC seen for multicast and unicast packets respectively.
section: "3.1"
topics:
