document: rfc-9050
kind: protocol-element
summary: Central Controller Instructions (CCI) are conveyed via PCInitiate messages for label download and cleanup, and acknowledged via PCRpt messages. The CC-ID uniquely identifies each CCI within a PCEP session; values 0 and 0xFFFFFFFF are reserved.
