document: rfc-9346
kind: interoperability-note
summary: When advertising an IPv4 TE Router ID, if the Traffic Engineering router ID TLV (RFC 5305) is being advertised, the value SHOULD be identical to the address in that TLV. Similarly for IPv6, if the IPv6 TE Router ID TLV (RFC 6119) is advertised, the values SHOULD be identical.
section: "3.1"
topics:
    - routing
    - mpls
