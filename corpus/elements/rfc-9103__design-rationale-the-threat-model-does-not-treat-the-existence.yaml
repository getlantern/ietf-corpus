document: rfc-9103
kind: design-rationale
summary: The threat model does not treat the existence of a zone, the act of zone transfer, or the identities of name servers as sensitive information, because much of this can be obtained via active DNS scanning and traffic patterns reveal server relationships even when traffic is encrypted.
