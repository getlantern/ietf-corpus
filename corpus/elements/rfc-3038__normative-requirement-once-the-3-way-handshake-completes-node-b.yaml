document: rfc-3038
kind: normative-requirement
summary: Once the 3-way handshake completes, node B must ignore all VCID PROPOSE messages received over the VC. If node A does not receive an ACK with the expected message ID and VCID within a given period, it must resend the VCID PROPOSE message.
section: 3.1.1
rfc2119_level: MUST
topics:
    - mpls
