document: rfc-2034
kind: wire-format
summary: Enhanced status codes have the syntax 'class "." subject "." detail' where class is '2', '4', or '5'; subject is 1–3 digits; and detail is 1–3 digits. The code is always followed by one or more spaces before the response text.
