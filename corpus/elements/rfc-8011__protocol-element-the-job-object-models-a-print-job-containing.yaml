document: rfc-8011
kind: protocol-element
summary: The Job object models a Print Job containing zero or more Documents. Job attributes are grouped as 'job-template' (Client-supplied processing instructions intended to override Printer defaults and embedded Document instructions) and 'job-description' (identification, state, size, and progress). An implementation MUST support at least one Document per Job and MAY support multiple Documents.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
