document: rfc-2741
kind: protocol-element
summary: The agentx-Notify-PDU is sent by a subagent to cause the master agent to forward a notification. The VarBindList must include snmpTrapOID.0 (mandatory); if sysUpTime.0 is also provided it must be the first varbind and snmpTrapOID.0 the second.
