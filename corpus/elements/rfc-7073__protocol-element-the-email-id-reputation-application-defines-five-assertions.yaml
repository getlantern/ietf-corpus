document: rfc-7073
kind: protocol-element
summary: 'The ''email-id'' reputation application defines five assertions: ''abusive'' (personally abusive/threatening/harassing email), ''fraud'' (phishing and fraudulent email), ''invalid-recipients'' (delivery attempts to nonexistent recipients), ''malware'' (sending/handling malware via email), and ''spam'' (unwanted bulk email).'
section: "3.1"
topics:
    - email
    - security
