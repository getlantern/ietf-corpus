document: rfc-3460
kind: design-rationale
summary: Device-level filter classes (IpHeadersFilter, 8021Filter) were defined separately from domain-level variable/value pairs because they support specifying all fields of a protocol header in a single object instance and use native type representations, whereas domain-level classes require separate instances per field and use string representations.
section: 3.2.8
