document: rfc-6275
kind: protocol-element
summary: Dynamic Home Agent Address Discovery uses two new ICMP message types (Home Agent Address Discovery Request and Reply) to allow a mobile node away from home to discover the IP address of a home agent on its home link. No security is provided for this mechanism by design.
section: "6.5"
topics:
