document: rfc-3510
kind: normative-requirement
summary: The 'ipp' URL scheme MUST only be used to specify absolute URLs; relative IPP URLs are not allowed. It MUST only be used to specify the use of the abstract IPP protocol over an HTTP transport as defined in RFC 2910.
section: "4.1"
rfc2119_level: MUST
topics:
