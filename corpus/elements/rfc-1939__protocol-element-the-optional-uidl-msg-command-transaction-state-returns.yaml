document: rfc-1939
kind: protocol-element
summary: The optional UIDL [msg] command (TRANSACTION state) returns unique-id listings in the format 'message-number<SP>unique-id'. With no argument it lists all non-deleted messages; with a message-number it returns the single unique-id listing for that message.
