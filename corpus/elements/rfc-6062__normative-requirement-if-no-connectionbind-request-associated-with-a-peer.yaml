document: rfc-6062
kind: normative-requirement
summary: If no ConnectionBind request associated with a peer data connection is received within 30 seconds of a successful Connect response or ConnectionAttempt indication, the server MUST close the peer data connection.
section: "5.2"
rfc2119_level: MUST
topics:
    - nat
    - tcp
