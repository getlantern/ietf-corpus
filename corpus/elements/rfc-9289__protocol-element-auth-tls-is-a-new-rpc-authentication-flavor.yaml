document: rfc-9289
kind: protocol-element
summary: AUTH_TLS is a new RPC authentication flavor (value 7) that signals a client's desire to initiate TLS negotiation. It is used exclusively on the NULL RPC procedure to probe for server-side RPC-with-TLS support before a TLS handshake begins.
section: "4.1"
topics:
    - tls
    - security
