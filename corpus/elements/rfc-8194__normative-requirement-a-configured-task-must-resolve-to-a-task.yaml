document: rfc-8194
kind: normative-requirement
summary: A configured Task MUST resolve to a Task listed in the /lmap/capabilities/tasks list. Attempts to execute a configured Task that is not listed in the capabilities result in a runtime execution error.
section: "4.2"
rfc2119_level: MUST
