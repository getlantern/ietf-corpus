document: rfc-6920
kind: interoperability-note
summary: In the nih URI format, for algorithms with a reserved Suite ID, the alg field MAY contain the Suite ID as an ASCII-encoded decimal number instead of the hash name string (e.g., '3' instead of 'sha-256-120'). Implementations MUST be able to match decimal ID values for all supported algorithms even if they do not support the binary format.
section: "7"
topics:
    - security
