document: rfc-1374
kind: protocol-element
summary: Each node on a HIPPI-SC LAN should be assigned a 48-bit Universal LAN MAC Address (ULA); the ULA occupies bits 47–0 of the HIPPI-LE address fields in IEEE 802.1A canonical bit order, with the U/L bit (L) and I/G bit (G) carried in the least significant bits of octet 0.
section: 48 bit Universal LAN MAC Addresses
topics:
    - ip
