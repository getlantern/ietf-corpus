document: rfc-3963
kind: protocol-element
summary: The bi-directional tunnel between the Mobile Router and the Home Agent is created by merging two unidirectional IP-in-IP tunnels (RFC 2473). The Mobile Router's Care-of Address and the Home Agent's address serve as the respective tunnel endpoints. All traffic to and from the Mobile Network flows through this tunnel.
section: "5.5"
topics:
