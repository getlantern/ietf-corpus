document: rfc-9622
kind: normative-requirement
summary: The implementation MUST ensure outcomes consistent with all Require and Prohibit preferences. When conflict arises between path and protocol preferences, the Transport Services System SHOULD determine the preferred path first, regardless of protocol preferences, to provide consistency across implementations.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
