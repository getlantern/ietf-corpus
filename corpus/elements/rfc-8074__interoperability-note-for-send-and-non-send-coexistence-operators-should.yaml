document: rfc-8074
kind: interoperability-note
summary: For SEND and non-SEND coexistence, operators should avoid mixed environments or separate the prefixes announced to SEND and non-SEND nodes, for example by sending unicast Router Advertisements with different non-overlapping prefixes in response to SEND vs. non-SEND Router Solicits.
