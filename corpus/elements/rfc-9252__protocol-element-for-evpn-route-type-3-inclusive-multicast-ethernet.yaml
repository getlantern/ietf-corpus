document: rfc-9252
kind: protocol-element
summary: For EVPN Route Type 3 (Inclusive Multicast Ethernet Tag / BUM traffic) over SRv6 core, the PMSI Tunnel Attribute MPLS label field carries the whole or a portion of the SRv6 SID Function part when ingress replication and the Transposition Scheme are used (Transposition Length ≤ 24). The Service SID SHOULD use End.DT2M behavior. When ESI-based filtering is used, the Arg.FE2 from Route Type 1 SHOULD be merged with the End.DT2M SID via bitwise OR.
section: "6.3"
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
