document: rfc-6672
kind: protocol-element
summary: DNAME substitution replaces the suffix labels of the queried name matching the DNAME owner name with the DNAME target. Only whole labels are replaced. If substitution would produce a name exceeding 255 octets, the server returns RCODE YXDOMAIN.
section: "2.2"
topics:
    - dns
