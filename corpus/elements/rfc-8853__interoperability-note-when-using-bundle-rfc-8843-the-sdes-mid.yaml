document: rfc-8853
kind: interoperability-note
summary: When using BUNDLE (RFC 8843), the SDES MID mechanism relates RTP streams to individual media descriptions, after which RtpStreamId relations can be used for simulcast identification. It is recommended to carry both MID and RtpStreamId as RTP header extensions (RFC 7941) to ensure rapid initial reception.
section: "5.5"
topics:
