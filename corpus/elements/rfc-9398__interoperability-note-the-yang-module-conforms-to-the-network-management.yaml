document: rfc-9398
kind: interoperability-note
summary: The YANG module conforms to the Network Management Datastore Architecture (NMDA) as defined in RFC 8342, and augments the NMDA-version routing data model from RFC 8349. Implementations must support NMDA to use this module correctly.
