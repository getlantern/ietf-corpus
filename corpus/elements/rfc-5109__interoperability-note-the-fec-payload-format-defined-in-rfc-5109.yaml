document: rfc-5109
kind: interoperability-note
summary: The FEC payload format defined in RFC 5109 is not backward compatible with RFC 2733 or RFC 3009. Different MIME types (ulpfec) are used to prevent misidentification; hosts that implement the older RFCs are recommended to update to RFC 5109 when possible.
