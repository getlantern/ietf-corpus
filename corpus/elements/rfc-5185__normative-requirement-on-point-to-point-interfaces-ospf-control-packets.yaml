document: rfc-5185
kind: normative-requirement
summary: On point-to-point interfaces, OSPF control packets for multi-area adjacencies are sent to the AllSPFRouters address. For all other network types, OSPF control packets are unicast to the remote neighbor's IP address.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
