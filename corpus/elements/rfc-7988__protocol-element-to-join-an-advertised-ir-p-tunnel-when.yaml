document: rfc-7988
kind: protocol-element
summary: To join an advertised IR P-tunnel when the Leaf Information Required bit is set, a router determines its UMH (from the P2MP Segmented Next Hop Extended Community or the route's next hop), then originates a Leaf A-D route with the IR P-tunnel identifier as the route key, an IP-address-specific RT identifying the UMH, and a PTA with Tunnel Type IR and a non-zero MPLS label (the P-tunnel label).
section: 4.1.1
topics:
    - routing
    - multicast
    - mpls
