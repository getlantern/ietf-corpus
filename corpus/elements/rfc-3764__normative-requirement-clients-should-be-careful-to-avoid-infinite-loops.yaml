document: rfc-3764
kind: normative-requirement
summary: Clients SHOULD be careful to avoid infinite loops when recursively performing ENUM queries on SIP URIs that result from an ENUM lookup, particularly when the user portion of the SIP URI contains a telephone number (e.g., 'sip:+1442079460148@example.com').
section: "4"
rfc2119_level: SHOULD
topics:
    - sip
    - dns
