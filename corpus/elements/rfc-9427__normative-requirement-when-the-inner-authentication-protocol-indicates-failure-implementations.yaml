document: rfc-9427
kind: normative-requirement
summary: When the inner authentication protocol indicates failure, implementations MUST fail authentication for the entire session and MUST invalidate or discard any associated session tickets. The EAP server MUST send a final EAP-Failure or EAP-Success message per the full EAP state machine.
section: "5.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
