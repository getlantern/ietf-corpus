document: rfc-9701
kind: privacy-consideration
summary: A token introspection request reveals to the AS when the client (and potentially the user) is accessing the RS. If this timing disclosure is not acceptable, implementers MUST use other means to relay access token data, such as embedding the needed data directly within the access token.
section: "9"
rfc2119_level: MUST
topics:
    - oauth
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
