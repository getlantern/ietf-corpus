document: rfc-8058
kind: normative-requirement
summary: The mail sender MUST NOT return an HTTPS redirect in response to the POST request, since redirected POST actions have historically not worked reliably and many browsers convert redirected HTTP POSTs into GETs.
section: "3.1"
rfc2119_level: MUST NOT
topics:
