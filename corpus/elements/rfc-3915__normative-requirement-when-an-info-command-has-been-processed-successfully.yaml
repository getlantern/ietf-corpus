document: rfc-3915
kind: normative-requirement
summary: When an <info> command has been processed successfully, the EPP <resData> element MUST contain child elements as described in RFC 3731, and the EPP <extension> element MUST contain a child <rgp:infData> element identifying the registry grace period namespace and schema location.
section: 4.1.2
rfc2119_level: MUST
topics:
    - dns
    - registry
