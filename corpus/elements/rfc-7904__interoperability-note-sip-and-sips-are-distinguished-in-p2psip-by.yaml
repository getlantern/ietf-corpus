document: rfc-7904
kind: interoperability-note
summary: SIP and SIPS are distinguished in P2PSIP by the Application-ID. An AOR is considered not to include the scheme (e.g., 'sip:') because it needs to match the rfc822Name in X.509 v3 certificates; the 'sip:' prefix must be removed before matching, and '%' encoding decoded.
