document: rfc-6590
kind: protocol-element
summary: 'The redaction process is a five-step procedure: (1) select a consistent, collision-resistant transformation; (2) identify private data strings; (3) apply the transformation to each; (4) base64-encode if the output is not directly usable in context; (5) substitute each private datum with its (possibly encoded) transformation output when generating the ARF report.'
section: "3"
topics:
