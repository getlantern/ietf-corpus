document: rfc-1243
kind: state-machine
summary: 'atportStatus defines four states: operational(1), unconfigured(2), off(3), and invalid(4). Setting atportStatus to invalid(4) disassociates the port entry; agents may or may not remove the row, so management stations must be prepared to receive stale entries.'
