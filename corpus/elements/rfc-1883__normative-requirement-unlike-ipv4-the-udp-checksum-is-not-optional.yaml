document: rfc-1883
kind: normative-requirement
summary: Unlike IPv4, the UDP checksum is not optional in IPv6. An IPv6 node must compute a UDP checksum over the packet and the pseudo-header; if the result is zero, it must be changed to hex FFFF. IPv6 receivers must discard UDP packets containing a zero checksum.
section: "8.1"
rfc2119_level: MUST
topics:
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
