document: rfc-4566
kind: normative-requirement
summary: Sessions using an IPv4 multicast connection address MUST include a TTL value (range 0–255) appended to the address. IPv6 multicast MUST NOT include a TTL; IPv6 scoped addresses are expected to limit conference scope instead.
section: "5.7"
rfc2119_level: MUST
topics:
    - realtime
    - multicast
    - ip
