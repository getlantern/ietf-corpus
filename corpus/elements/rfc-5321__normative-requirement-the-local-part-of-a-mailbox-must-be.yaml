document: rfc-5321
kind: normative-requirement
summary: The local-part of a mailbox MUST BE treated as case sensitive; SMTP implementations MUST preserve the case of mailbox local-parts. Command verbs and domain names are case-insensitive.
section: "2.4"
rfc2119_level: MUST
topics:
