document: rfc-1220
kind: wire-format
summary: IEEE 802.1 Bridge Hello PDUs (BPDUs) are carried under PPP Protocol 0x0201. The PDU contains only the raw 802.1(d) BPDU data with no MAC or 802.2 LLC header, no LAN pad, and no LAN FCS; Address and Control Fields are subject to standard PPP ACFC negotiation.
section: "6.2"
