document: rfc-4447
kind: protocol-element
summary: Wildcard PW status notifications and label withdrawals use Group ID (PWid FEC) or PW Grouping ID TLV (Generalized ID FEC) by setting PW info length to 0 and omitting the PW ID/AGI/SAII/TAII. This enables a single message to affect all PWs in a group upon port failure.
section: 5.4.2
topics:
    - mpls
