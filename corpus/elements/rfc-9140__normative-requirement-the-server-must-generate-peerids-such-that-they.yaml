document: rfc-9140
kind: normative-requirement
summary: The server MUST generate PeerIds such that they do not repeat and cannot be guessed by the peer or third parties before the server sends them. A recommended approach is to choose a random 16-byte value and base64url encode it without padding into a 22-character ASCII string.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
