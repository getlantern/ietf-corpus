document: rfc-1995
kind: normative-requirement
summary: When a zone is updated, it should be saved to stable storage before the new version is used to respond to IXFR or AXFR queries. Failure to do so risks distributing data that becomes unavailable after a server crash, causing persistent database inconsistencies.
section: "2"
rfc2119_level: SHOULD
topics:
    - dns
