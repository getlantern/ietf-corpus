document: rfc-6554
kind: security-consideration
summary: ICMPv6 error message generation triggered by malformed SRH headers can be weaponized for denial-of-service attacks via back-to-back error-causing datagrams. Correct implementation of RFC 4443 Section 2.4 rate limiting on ICMPv6 provides the required protection.
section: "5.2"
topics:
    - ip
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
