document: rfc-6020
kind: design-rationale
summary: YIN (YANG Independent Notation) provides a lossless XML representation of YANG modules, enabling XSLT scripts and XML-based tools to operate on YANG models. The YANG-to-YIN conversion is lossless and round-trippable, making it possible to author in either syntax.
