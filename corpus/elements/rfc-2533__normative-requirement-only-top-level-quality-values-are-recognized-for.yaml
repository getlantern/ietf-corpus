document: rfc-2533
kind: normative-requirement
summary: Only top-level quality values are recognized for ranking purposes. Quality values attached to sub-expressions inside an AND or OR are syntactically permitted but have no defined effect on preference ordering.
section: "4.1"
rfc2119_level: OPTIONAL
