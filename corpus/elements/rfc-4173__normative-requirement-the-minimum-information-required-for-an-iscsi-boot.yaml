document: rfc-4173
kind: normative-requirement
summary: 'The minimum information required for an iSCSI boot client to contact an iSCSI boot server is: (a) the client''s IP address (IPv4 or IPv6), (b) the server''s iSCSI Target Name, and (c) mandatory iSCSI initiator capability. The default LUN is 0 and the default port is the well-known iSCSI port.'
section: "2"
rfc2119_level: REQUIRED
topics:
    - tcp
