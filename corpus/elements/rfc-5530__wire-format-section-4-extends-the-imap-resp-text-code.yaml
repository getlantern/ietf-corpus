document: rfc-5530
kind: wire-format
summary: 'Section 4 extends the IMAP resp-text-code non-terminal (RFC 3501) via ABNF to include the 16 new response code tokens: UNAVAILABLE, AUTHENTICATIONFAILED, AUTHORIZATIONFAILED, EXPIRED, PRIVACYREQUIRED, CONTACTADMIN, NOPERM, INUSE, EXPUNGEISSUED, CORRUPTION, SERVERBUG, CLIENTBUG, CANNOT, LIMIT, OVERQUOTA, ALREADYEXISTS, and NONEXISTENT. All alphabetic characters in these tokens are case-insensitive.'
