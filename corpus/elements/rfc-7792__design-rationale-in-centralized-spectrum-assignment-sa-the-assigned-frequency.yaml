document: rfc-7792
kind: design-rationale
summary: In centralized Spectrum Assignment (SA), the assigned frequency slot is fully specified in the RSVP-TE Path message. In distributed SA, only the slot width is specified in the Path message, allowing network elements to select the actual frequency slot when processing RSVP-TE messages.
section: "3"
topics:
