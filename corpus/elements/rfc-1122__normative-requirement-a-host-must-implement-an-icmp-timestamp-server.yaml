document: rfc-1122
kind: normative-requirement
summary: A host MUST implement an ICMP Timestamp server. Timestamp values MUST be in milliseconds since midnight UT; if the host cannot maintain standard time it MUST indicate this by setting the high-order bit of the Timestamp value.
section: 3.2.2.8
rfc2119_level: MUST
topics:
    - ip
    - ntp
