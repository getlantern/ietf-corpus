document: rfc-8979
kind: design-rationale
summary: Subscriber and Performance Policy identifiers are carried in distinct Context Headers rather than multiplexed in one header because multiple policies may be associated with a single subscriber within a Service Function Chain, and multiplexing would require additional internal structure to distinguish identifier types.
