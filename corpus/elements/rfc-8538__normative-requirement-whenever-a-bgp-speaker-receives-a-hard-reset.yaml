document: rfc-8538
kind: normative-requirement
summary: Whenever a BGP speaker receives a Hard Reset, the speaker MUST terminate the BGP session following the standard procedures in RFC 4271, with no graceful restart semantics applied.
section: "3.2"
rfc2119_level: MUST
