document: rfc-2835
kind: normative-requirement
summary: An IP station MUST have a mechanism for permanent ARP table entries to allow interoperability with legacy HIPPI adapters using static ARP. The HARP server SHOULD use static entries to resolve incoming HARP_REQUESTs, eliminating the need for static tables on client ports. Permanent entries are not aged.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
