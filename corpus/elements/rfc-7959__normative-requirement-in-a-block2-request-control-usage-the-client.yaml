document: rfc-7959
kind: normative-requirement
summary: In a Block2 request (control usage), the client MUST set the M bit to zero and the server MUST ignore it on reception. The server MUST use the block size indicated by the client or a smaller size.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
