document: rfc-8765
kind: wire-format
summary: The SUBSCRIBE request begins with a standard DSO 12-byte header followed by DSO-TYPE = 0x0040. The DSO-DATA contains exactly one NAME (variable), TYPE (16-bit), and CLASS (16-bit) identifying the RRset to subscribe to.
