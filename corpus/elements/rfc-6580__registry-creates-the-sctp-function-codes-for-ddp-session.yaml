document: rfc-6580
kind: registry
summary: Creates the 'SCTP Function Codes for DDP Session Control' IANA registry for 16-bit SCTP function codes used with DDP stream session control. Initial values include Session Initiate (0x0001) through Session Terminate (0x0004), with 0xFFFF reserved for experimental use. Allocation policy is Standards Action.
section: "3.5"
topics:
