document: rfc-3565
kind: protocol-element
summary: ES-DH/AES key derivation uses SHA-1 per RFC 2631 to generate the AES KEK from the shared secret ZZ, with a counter and key length encoded in the hash input. Multiple SHA-1 invocations with incrementing counter values are concatenated to reach the required key length (e.g., two invocations for AES-256).
section: 2.3.1
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
