document: rfc-3820
kind: design-rationale
summary: Delegation tracing information (identity of issuer and receiver at each delegation step) was considered for inclusion in ProxyCertInfo but was omitted because consensus was not reached on what information to include — specifically whether to record only issuer/receiver identities or also include the full delegated proxy details and a signed acceptance statement from the receiver.
section: "5.4"
topics:
    - pkix
