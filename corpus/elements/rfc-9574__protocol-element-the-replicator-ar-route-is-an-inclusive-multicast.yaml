document: rfc-9574
kind: protocol-element
summary: The Replicator-AR route is an Inclusive Multicast Ethernet Tag route advertised by AR-REPLICATORs. Its Originating Router's IP Address MUST be a common loopback; Tunnel Type MUST be Assisted Replication Tunnel (0x0A); T MUST be set to 01 (AR-REPLICATOR); L MUST be 0 for non-selective AR and 1 for selective AR. The Next Hop address (AR-IP) MUST differ from the IR-IP unless single-IP procedures (Section 8) apply.
section: "4"
topics:
    - mpls
    - routing
