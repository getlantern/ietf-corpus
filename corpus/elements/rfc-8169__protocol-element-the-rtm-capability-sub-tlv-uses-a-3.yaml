document: rfc-8169
kind: protocol-element
summary: 'The RTM Capability Sub-TLV uses a 3-bit bitmap advertised per interface in OSPFv2 (type 5), IS-IS (type 40), and BGP-LS (type 1105): 0b001 = one-step RTM supported, 0b010 = two-step RTM supported. It reflects the egress capability of the advertised interface.'
section: "4.2"
topics:
    - routing
