document: rfc-3428
kind: normative-requirement
summary: The size of MESSAGE requests outside of a media session MUST NOT exceed 1300 bytes, unless the UAC has positive knowledge that the message will not traverse a congestion-unsafe link or that the message size is at least 200 bytes less than the lowest MTU value en route.
section: "8"
rfc2119_level: MUST NOT
topics:
    - sip
    - congestion
    - realtime
