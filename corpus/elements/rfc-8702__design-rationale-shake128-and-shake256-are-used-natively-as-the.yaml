document: rfc-8702
kind: design-rationale
summary: SHAKE128 and SHAKE256 are used natively as the MGF in RSASSA-PSS rather than via the MGF1 construction, exploiting SHAKE's extendable-output property to produce arbitrary-length output directly without iterating the hash function.
