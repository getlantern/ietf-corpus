document: rfc-3673
kind: security-consideration
summary: Prior to this extension, operational attributes were only returned when requested by name, which some viewed as an obscurity feature. This document notes that was a false sense of security since the attributes were always transferable; implementations should use proper access controls rather than relying on obscurity.
section: "4"
topics:
    - ldap
    - security
