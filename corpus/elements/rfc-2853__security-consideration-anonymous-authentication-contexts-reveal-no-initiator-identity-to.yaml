document: rfc-2853
kind: security-consideration
summary: Anonymous authentication contexts reveal no initiator identity to the acceptor; getSrcName() returns a reserved implementation-defined name. The printable form of an anonymous name must be syntactically distinguishable from any valid principal name to prevent spoofing in audit logs.
section: "3.4"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
