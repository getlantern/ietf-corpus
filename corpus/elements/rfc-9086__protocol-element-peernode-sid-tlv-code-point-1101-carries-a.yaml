summary: PeerNode SID TLV (code point 1101) carries a SID with NEXT SR operation semantics, where the next-hop is the connected peering node. It is advertised in BGP-LS Link NLRI with local and remote BGP Router-ID/ASN descriptors and BGP session address link descriptors.
