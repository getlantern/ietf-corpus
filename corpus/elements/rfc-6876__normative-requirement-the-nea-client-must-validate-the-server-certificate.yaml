document: rfc-6876
kind: normative-requirement
summary: The NEA Client MUST validate the server certificate according to RFC 5280 and MUST follow RFC 6125 when checking the server domain name. Wildcards MUST NOT appear in the DNS-ID or CN-ID of a PT-TLS server certificate; use of CN-IDs is NOT RECOMMENDED.
section: 3.4.2.1
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
