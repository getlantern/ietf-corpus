document: rfc-7812
kind: protocol-element
summary: An MRT Island is the set of routers supporting the same MRT profile in the same IGP area or level, connected by bidirectional links. Island Border Routers (IBRs) are MRT Island routers adjacent to non-MRT routers in the same area; Island Neighbors (INs) are non-MRT routers adjacent to IBRs in the same area/level.
section: "7"
topics:
    - routing
