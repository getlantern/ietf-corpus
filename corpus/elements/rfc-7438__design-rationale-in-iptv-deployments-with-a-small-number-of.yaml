document: rfc-7438
kind: design-rationale
summary: In IPTV deployments with a small number of content server sites, statically configured channels MAY be forwarded over MP-LSPs with wildcard encoding (source and/or group depending on provider address allocation policy), as an alternative to MSDP or BGP Auto-Discovery for Ingress LSR source discovery.
section: "4.3"
topics:
    - mpls
    - multicast
