document: rfc-7623
kind: normative-requirement
summary: In the MAC/IP Advertisement route, the Ethernet Segment Identifier field must be set to either 0 (for single-homed segments or multihomed segments with per-I-SID load-balancing) or MAX-ESI (for multihomed segments with per-flow load-balancing). All other ESI values are not permitted.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
