document: rfc-7266
kind: protocol-element
summary: 'The MOS Metrics Block (BT=29) is an RTCP XR block with a variable-length structure containing a block header (BT, Interval Metric flag I, Reserved, Block Length), SSRC of source, and one or more 32-bit segments. The leftmost bit of each segment determines its type: 0 for single-channel audio/video per SSRC, 1 for multi-channel audio per SSRC.'
section: "3.1"
