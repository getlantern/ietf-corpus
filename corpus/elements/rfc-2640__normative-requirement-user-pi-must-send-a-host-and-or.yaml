document: rfc-2640
kind: normative-requirement
summary: User-PI MUST send a HOST and/or LANG command before issuing any other command (other than FEAT). If HOST is not supported, a LANG command MUST be issued. Until either is received, server-PI SHOULD assume the client does not comply with this specification.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
