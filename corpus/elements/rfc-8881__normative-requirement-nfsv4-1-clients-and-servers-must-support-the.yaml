kind: normative-requirement
summary: NFSv4.1 clients and servers MUST support the Kerberos V5 security mechanism via RPCSEC_GSS/GSS-API. Implementations MUST run on environments that comply with the REQUIRED cryptographic algorithms of each REQUIRED mechanism.
