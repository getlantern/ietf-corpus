document: rfc-6901
kind: normative-requirement
summary: When the currently referenced value is a JSON array, the reference token MUST contain either digits representing an unsigned base-10 integer (no leading zeros allowed) that identify the zero-based array element, or exactly the single character '-' referring to the nonexistent element after the last.
section: "4"
rfc2119_level: MUST
topics:
    - json
