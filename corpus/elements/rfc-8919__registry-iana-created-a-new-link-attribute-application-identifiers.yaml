document: rfc-8919
kind: registry
summary: 'IANA created a new ''Link Attribute Application Identifiers'' registry under ''IGP Parameters'' with Expert Review policy. Initial bits: 0=RSVP-TE (R-bit), 1=Segment Routing Policy (S-bit), 2=Loop-Free Alternate (F-bit), 3-63 unassigned. Bits SHOULD be assigned to fill lowest available octet first.'
