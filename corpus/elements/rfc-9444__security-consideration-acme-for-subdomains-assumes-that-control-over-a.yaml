document: rfc-9444
kind: security-consideration
summary: ACME for Subdomains assumes that control over a domain may imply control over a subdomain, and thus authorization for certificate issuance for the former may imply authorization for the latter. In ecosystems where this assumption does not hold, a more complicated threat analysis and server policy is needed.
section: "7"
topics:
