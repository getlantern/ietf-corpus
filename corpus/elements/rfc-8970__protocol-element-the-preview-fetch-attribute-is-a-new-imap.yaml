document: rfc-8970
kind: protocol-element
summary: The PREVIEW FETCH attribute is a new IMAP FETCH data item that clients use to request a server-generated abbreviated text preview of a message. The server returns a variable-length string intended for display to the user as contextual preview of the entire message.
section: "3.1"
topics:
    - email
