document: rfc-8341
kind: design-rationale
summary: The nacm:default-deny-write and nacm:default-deny-all YANG extensions allow data model designers to embed machine-readable security annotations directly in YANG modules, eliminating a window of vulnerability that would otherwise exist between loading a new module and manually configuring corresponding NACM rules.
section: "2.8"
