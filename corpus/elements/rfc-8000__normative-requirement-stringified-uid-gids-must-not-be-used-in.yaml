document: rfc-8000
kind: normative-requirement
summary: Stringified UID/GIDs MUST NOT be used in a multi-domain deployment due to UID and GID collisions. Multi-domain-capable servers MUST reject requests that use stringified UID/GIDs.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - security
