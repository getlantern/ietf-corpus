document: rfc-3415
kind: security-consideration
summary: The SNMP-VIEW-BASED-ACM-MIB objects control access to all MIB data accessible via the SNMP engine and are considered sensitive. Both read and write access to these MIB objects must be closely controlled using appropriately configured access control models.
section: "7.4"
topics:
