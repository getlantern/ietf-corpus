document: rfc-7156
kind: design-rationale
summary: Localized Routing Service Authorization can happen during the network access authentication procedure before localized routing is initialized, allowing preauthorized pairs of LMA/prefix sets to be downloaded to PMIPv6 entities in advance. Localized routing can then be initiated once a destination matches a received prefix.
