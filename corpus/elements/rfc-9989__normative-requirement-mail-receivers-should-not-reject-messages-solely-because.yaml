document: rfc-9989
kind: normative-requirement
summary: Mail Receivers SHOULD NOT reject messages solely because of a published Domain Owner Assessment Policy of 'reject'; they should apply other knowledge and analysis to avoid rejecting legitimate messages, harming mailing list operation, and similar side effects.
section: "5.4"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
