document: rfc-7097
kind: interoperability-note
summary: The Discard RLE report block format is deliberately identical to the RFC 3611 loss and duplicate RLE block formats (same field layout and chunk encoding), differing only in the added E flag and the semantics of chunks representing discarded rather than lost packets.
