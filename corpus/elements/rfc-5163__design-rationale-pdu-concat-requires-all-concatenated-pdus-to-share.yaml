document: rfc-5163
kind: design-rationale
summary: PDU-Concat requires all concatenated PDUs to share a single common ULE Type (PDU-Concat-Type) rather than allowing mixed types. This constraint simplifies receiver design and reduces per-PDU transmission overhead, which is the primary motivation for using concatenation in the first place.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
