document: rfc-7301
kind: security-consideration
summary: In TLS versions 1.2 and below, the client sends ALPN protocol identifiers in the clear. For at least the next decade from the document's publication, browsers were expected to use these earlier TLS versions in the initial ClientHello, meaning ALPN identifiers are externally visible.
section: "5"
topics:
