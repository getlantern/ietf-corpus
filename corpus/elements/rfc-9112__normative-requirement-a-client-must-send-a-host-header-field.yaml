document: rfc-9112
kind: normative-requirement
summary: A client MUST send a Host header field in all HTTP/1.1 request messages. If the target URI includes an authority component, the Host value MUST be identical to that authority component excluding any userinfo subcomponent.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
