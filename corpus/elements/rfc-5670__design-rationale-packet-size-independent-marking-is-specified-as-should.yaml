document: rfc-5670
kind: design-rationale
summary: 'Packet-size-independent marking is specified as SHOULD rather than MUST because it may be harder for some equipment to implement, and its absence has only moderate impact: flows with large packets become disproportionately likely to be terminated with the ''classic'' token-bucket behaviour.'
section: B.6
