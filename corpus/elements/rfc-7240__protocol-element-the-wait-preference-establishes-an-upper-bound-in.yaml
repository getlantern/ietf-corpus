document: rfc-7240
kind: protocol-element
summary: 'The "wait" preference establishes an upper bound in seconds on the time the client expects it will take the server to process the request. If processing will exceed this time, the server or proxy may return a 202 (Accepted) response. ABNF: `wait = "wait" BWS "=" BWS delta-seconds`.'
section: "4.3"
topics:
