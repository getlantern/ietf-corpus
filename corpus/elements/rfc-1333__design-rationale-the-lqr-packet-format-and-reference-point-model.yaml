document: rfc-1333
kind: design-rationale
summary: The LQR packet format and reference-point model explicitly accommodate multi-process and hardware-assisted implementations where framing, transmit, and receive may be separate processes or devices. The SaveIn... fields are logically appended by the Rx process in an implementation-dependent manner.
