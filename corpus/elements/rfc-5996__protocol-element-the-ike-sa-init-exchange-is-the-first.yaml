document: rfc-5996
kind: protocol-element
summary: The IKE_SA_INIT exchange is the first request/response pair, negotiating cryptographic algorithms, exchanging nonces, and performing a Diffie-Hellman exchange. The initiator sends SAi1, KEi, and Ni; the responder replies with SAr1, KEr, Nr, and optionally CERTREQ. SKEYSEED and all IKE SA keys are derived from this exchange.
section: "1.2"
topics:
