document: rfc-793
kind: normative-requirement
summary: Upon transmitting a segment, TCP places a copy on the retransmission queue and starts a timer. If an acknowledgment is not received before the timer expires, the segment must be retransmitted. Damage is handled by checksumming each segment and discarding damaged ones at the receiver.
section: "2.6"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
