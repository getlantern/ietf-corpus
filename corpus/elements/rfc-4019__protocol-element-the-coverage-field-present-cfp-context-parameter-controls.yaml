document: rfc-4019
kind: protocol-element
summary: The Coverage Field Present (CFP) context parameter controls whether the UDP-Lite Checksum Coverage field appears in compressed packets. If CFP is nonzero, the field is sent uncompressed in every compressed packet; if zero, the field is compressed away based on the Coverage Field Inferred (CFI) flag.
section: "5.1"
topics:
    - udp
