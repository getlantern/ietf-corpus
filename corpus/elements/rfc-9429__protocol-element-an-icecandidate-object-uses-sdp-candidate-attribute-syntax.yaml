document: rfc-9429
kind: protocol-element
summary: An IceCandidate object uses SDP 'candidate-attribute' syntax (without the 'a=' prefix) for the candidate field, plus fields for ufrag (identifying the gathering phase), an 'm=' section index, and a MID. If the MID field is present it MUST be used for identification; otherwise the 'm=' section index is used.
section: 3.5.2.1
