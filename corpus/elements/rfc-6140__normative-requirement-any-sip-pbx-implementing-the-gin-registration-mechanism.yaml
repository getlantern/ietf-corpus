document: rfc-6140
kind: normative-requirement
summary: Any SIP-PBX implementing the GIN registration mechanism MUST also support the Path mechanism defined in RFC 3327 and MUST include the 'path' option tag in the 'Supported' header field of the REGISTER request, so that intermediate proxies can insert Path header field values.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
