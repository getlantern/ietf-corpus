document: rfc-9810
kind: normative-requirement
summary: To prove authorized delegation, certificates used for CMP message protection or signed central key generation MUST be issued by the delegating CA and MUST contain the respective EKU (id-kp-cmcCA, id-kp-cmcRA, or id-kp-cmKGA).
section: "4.5"
rfc2119_level: MUST
topics:
