document: rfc-9926
kind: normative-requirement
summary: The 6LR MUST maintain a registration state per tuple (IPv6 prefix, prefix length, ROVR) for all registered prefixes, and SHOULD notify the 6LBR via an EDAR message. In turn, the 6LBR MUST maintain a registration state per tuple (IPv6 prefix, ROVR).
section: "7.4"
rfc2119_level: MUST
topics:
    - ip
