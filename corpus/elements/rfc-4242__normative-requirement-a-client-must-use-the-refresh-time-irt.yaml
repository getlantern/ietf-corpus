document: rfc-4242
kind: normative-requirement
summary: A client MUST use the refresh time IRT_MINIMUM (600 seconds) if it receives the option with a value less than IRT_MINIMUM, preventing servers or attackers from forcing excessively short refresh intervals.
section: "3.2"
rfc2119_level: MUST
topics:
