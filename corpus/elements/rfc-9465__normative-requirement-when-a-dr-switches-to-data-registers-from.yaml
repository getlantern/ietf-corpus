document: rfc-9465
kind: normative-requirement
summary: When a DR switches to Data Registers from Null-Registers (due to RP downgrade), it MUST start a Packed_Register_Probe_Time timer to detect whether the RP still supports packed messages.
section: "6.3"
rfc2119_level: MUST
topics:
