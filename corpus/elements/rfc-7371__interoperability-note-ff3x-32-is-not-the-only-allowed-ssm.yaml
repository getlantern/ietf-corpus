document: rfc-7371
kind: interoperability-note
summary: ff3x::/32 is not the only allowed SSM prefix range. When ff1 bits are set to 0011 the SSM range is ff3x::/32, but if additional ff1 flag bits are set (e.g., the most significant bit), other SSM prefix ranges such as ffbx::/32 are also valid.
section: 4.1.2
topics:
    - ip
    - multicast
