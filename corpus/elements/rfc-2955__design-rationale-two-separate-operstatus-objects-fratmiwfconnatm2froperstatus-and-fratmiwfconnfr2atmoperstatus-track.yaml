document: rfc-2955
kind: design-rationale
summary: Two separate OperStatus objects (frAtmIwfConnAtm2FrOperStatus and frAtmIwfConnFr2AtmOperStatus) track each direction of the IWF independently. This reflects that ATM-to-FR and FR-to-ATM paths may fail independently and need per-direction monitoring.
