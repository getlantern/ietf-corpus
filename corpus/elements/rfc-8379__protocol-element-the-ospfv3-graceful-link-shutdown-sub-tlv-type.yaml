summary: The OSPFv3 Graceful-Link-Shutdown sub-TLV (Type 8, Length 0) is carried in the Router-Link TLV as defined in RFC 8362; the Router-Link TLV already contains Neighbor Interface ID enabling unique link identification on the remote node.
