document: rfc-9580
kind: wire-format
summary: Version 6 key fingerprint is computed as SHA-256 of a specific octet sequence and is 32 octets long. Version 4 fingerprints are SHA-1 (20 octets). Version 3 fingerprints use MD5 (16 octets). Implementations SHOULD NOT assume Key IDs (8-octet truncations of fingerprints) are unique.
section: 5.5.4
topics:
    - crypto
    - security
