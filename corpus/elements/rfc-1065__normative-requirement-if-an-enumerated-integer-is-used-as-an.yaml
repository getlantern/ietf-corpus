document: rfc-1065
kind: normative-requirement
summary: If an enumerated INTEGER is used as an object type, a named-number with value 0 shall not be present in the enumeration list; use of value 0 in enumerations is prohibited.
section: 3.2.1.1
rfc2119_level: MUST NOT
