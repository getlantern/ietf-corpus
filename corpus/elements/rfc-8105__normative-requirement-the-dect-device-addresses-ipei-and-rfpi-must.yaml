document: rfc-8105
kind: normative-requirement
summary: The DECT device addresses IPEI and RFPI MUST be used to derive the IPv6 link-local 64-bit Interface Identifiers (IIDs) for 6LN and 6LBR respectively, by expanding the 40-bit addresses to 48-bit with leading zeros and setting the MSB to 1 (RFPI) or 0 (IPEI).
section: 3.2.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
