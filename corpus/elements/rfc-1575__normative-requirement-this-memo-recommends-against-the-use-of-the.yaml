document: rfc-1575
kind: normative-requirement
summary: This memo RECOMMENDS against the use of the source route option in either echo-request or echo-response packets, because use of the source route option in ISO 8473 may cause packets to loop until their lifetime expires.
section: "5.7"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
