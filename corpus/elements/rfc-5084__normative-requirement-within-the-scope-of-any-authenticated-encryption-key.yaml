document: rfc-5084
kind: normative-requirement
summary: Within the scope of any authenticated-encryption key for AES-GCM, the nonce value MUST be unique. The set of nonce values used with any given key MUST NOT contain any duplicate values.
section: "1.5"
rfc2119_level: MUST NOT
