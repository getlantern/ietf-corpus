document: rfc-6290
kind: design-rationale
summary: The SIR (Safe IKE Recovery) approach, where the non-rebooted peer queries the possibly rebooted peer about SA existence, was considered but the working group preferred QCD tokens because QCD allows the rebooted peer to proactively signal the crash rather than requiring a query-response round trip.
