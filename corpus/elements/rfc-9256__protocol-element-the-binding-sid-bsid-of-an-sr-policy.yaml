document: rfc-9256
kind: protocol-element
summary: The Binding SID (BSID) of an SR Policy is the BSID of its active candidate path. A BSID is available when its value (MPLS label or IPv6 address) is not associated with any other usage. The BSID MAY change over the life of the SR Policy and SHOULD NOT be used as an identifier for the SR Policy.
section: "6.2"
topics:
    - routing
    - mpls
