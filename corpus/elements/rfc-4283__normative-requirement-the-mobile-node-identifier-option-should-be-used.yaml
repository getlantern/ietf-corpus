document: rfc-4283
kind: normative-requirement
summary: The Mobile Node Identifier option SHOULD be used when IKE/IPsec is not used for protecting binding updates or binding acknowledgements. It is typically used with the authentication option [RFC4285] but may also be used independently.
section: "1"
rfc2119_level: SHOULD
