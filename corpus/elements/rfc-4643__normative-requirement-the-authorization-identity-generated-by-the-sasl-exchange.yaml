document: rfc-4643
kind: normative-requirement
summary: The authorization identity generated by the SASL exchange is a simple username, and both client and server MUST use the SASLprep profile of the StringPrep algorithm to prepare these names for transmission or comparison. If preparation fails or results in an empty string, the server MUST fail authentication with 481.
section: 2.4.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
