document: rfc-3459
kind: protocol-element
summary: The Handling parameter is a Content-Disposition parameter inserted by the sending agent to indicate whether a body part is critical. Defined values are REQUIRED (sender requires delivery) and OPTIONAL (sender does not care about delivery). This parameter is not case sensitive per RFC 2183.
