document: rfc-8054
kind: normative-requirement
summary: Authentication MUST NOT be attempted after a successful use of the COMPRESS command to help mitigate leaking authentication credentials via attacks such as CRIME. A server MUST either list the AUTHINFO capability with no arguments or not advertise it at all after successful COMPRESS.
section: 2.2.2
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
