document: rfc-7780
kind: protocol-element
summary: The OOMF (Overload Originated Multi-destination Frame) service allows an overloaded RBridge (RB2) to tunnel multi-destination frames to a non-overloaded neighbor that volunteers service. RB2 encapsulates with M=0, Hop Count=2, Ingress Nickname=RB2 nickname, and Egress Nickname=0xFFC1 (special OOMF nickname), unicasting to the OOMF-offering neighbor.
section: 2.4.2
topics:
    - routing
    - multicast
