document: rfc-5779
kind: design-rationale
summary: This specification deliberately avoids defining new Diameter Application-IDs or Command Codes. It is intentionally generic to any existing Diameter application (e.g., NASREQ, EAP) suitable for network access authentication and authorization, allowing reuse of existing infrastructure.
