kind: normative-requirement
summary: HHIT registration is a MUST, and HHIT/HI registration validation SHOULD be performed by Observers either through registry lookups or via broadcasted registration proofs, because 2^64 EdDSA keypair generation is computationally and economically feasible with current hardware.
