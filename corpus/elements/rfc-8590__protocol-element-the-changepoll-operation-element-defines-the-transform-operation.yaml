document: rfc-8590
kind: protocol-element
summary: The <changePoll:operation> element defines the transform operation type. It supports an enumerated set of values (create, delete, renew, transfer, update, restore, autoRenew, autoDelete, autoPurge, custom) and an optional 'op' attribute for sub-operations or custom operation names.
section: "2.1"
