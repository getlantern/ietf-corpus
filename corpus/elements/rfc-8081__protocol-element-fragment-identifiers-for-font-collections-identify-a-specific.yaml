summary: Fragment identifiers for font collections identify a specific font within the collection by its PostScript name (name ID=6), which is a string no longer than 63 characters restricted to printable ASCII codes 33–126, excluding 10 forbidden characters and requiring percent-encoding of 6 URI-reserved characters.
