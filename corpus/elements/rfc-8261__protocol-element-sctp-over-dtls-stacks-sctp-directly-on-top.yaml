document: rfc-8261
kind: protocol-element
summary: SCTP over DTLS stacks SCTP directly on top of DTLS, which runs over ICE/UDP. The complete SCTP packet (common header plus chunks) is treated as the application-layer payload of DTLS. SCTP is unaware of the protocols below DTLS, so all associations are single-homed.
section: "1"
topics:
