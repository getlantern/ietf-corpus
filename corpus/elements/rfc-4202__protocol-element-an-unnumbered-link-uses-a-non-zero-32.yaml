document: rfc-4202
kind: protocol-element
summary: An unnumbered link uses a non-zero 32-bit identifier assigned independently by the LSR at each end, unique within the scope of that LSR. The advertising LSR carries both the 'link local identifier' (its own assignment) and the 'link remote identifier' (the far-end's assignment) in the TE link advertisement.
section: "2.1"
topics:
    - routing
