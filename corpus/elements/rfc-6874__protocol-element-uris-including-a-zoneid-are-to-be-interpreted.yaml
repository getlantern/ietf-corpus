document: rfc-6874
kind: protocol-element
summary: URIs including a ZoneID are to be interpreted only in the context of the host at which they originate, since the ZoneID has local significance only. The IPv6 stack behaviour when passed a non-null zone index for an address other than link-local is undefined.
section: "2"
topics:
