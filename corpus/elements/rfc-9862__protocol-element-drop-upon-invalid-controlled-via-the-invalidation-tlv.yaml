document: rfc-9862
kind: protocol-element
summary: 'Drop-Upon-Invalid (controlled via the INVALIDATION TLV) is a policy-level feature: when any Candidate Path has Drop-Upon-Invalid enabled, the entire SR Policy has it enabled. When all Candidate Paths become invalid, the highest-preference Drop-Upon-Invalid Candidate Path is activated and traffic is dropped at the headend.'
section: 5.2.3.1
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
