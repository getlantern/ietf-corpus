document: rfc-2890
kind: protocol-element
summary: The Key Present bit (bit 2) in the GRE header flags presence of the 4-octet Key field. When set to 1, the Key field is present; otherwise it is absent. The Key field identifies an individual traffic flow within a tunnel.
