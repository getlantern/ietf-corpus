document: rfc-4873
kind: wire-format
summary: The SECONDARY_EXPLICIT_ROUTE object (class 200, 11bbbbbb form) has the same format as an EXPLICIT_ROUTE object. It carries a new protection subobject (type 37) with an L-bit (MUST be zero), 1-byte Reserved, 1-byte C-Type, and PROTECTION object contents matching the indicated C-Type.
section: "4.1"
