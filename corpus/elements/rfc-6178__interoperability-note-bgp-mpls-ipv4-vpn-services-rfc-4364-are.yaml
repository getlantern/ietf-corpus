document: rfc-6178
kind: interoperability-note
summary: BGP/MPLS IPv4 VPN services (RFC 4364) are not subject to the bypass-encapsulation attacks described here because such packets always use a VRF instance and are always MPLS encapsulated by the ingress LER. The Router Alert Label threat, however, applies to both VPN and global IPv4 address families.
section: "5.1"
topics:
    - mpls
    - ip
    - security
