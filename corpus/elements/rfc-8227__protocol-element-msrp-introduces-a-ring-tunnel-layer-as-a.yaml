document: rfc-8227
kind: protocol-element
summary: 'MSRP introduces a ring tunnel layer as a server layer for LSPs traversing the ring. Each egress node has four ring tunnels: clockwise working (RcW), anticlockwise protection (RaP), anticlockwise working (RaW), and clockwise protection (RcP). LSPs sharing the same egress node and direction share the same ring tunnels.'
section: "4.1"
topics:
