document: rfc-7795
kind: normative-requirement
summary: For VCCV using CC type 3 'TTL Expiry' with S-PE redundancy, the PW label TTL MUST be set to the appropriate value to reach the target PE. The hop count can be obtained via SP-PE TLVs, MS-PW path trace, or management-plane information.
section: "5"
rfc2119_level: MUST
