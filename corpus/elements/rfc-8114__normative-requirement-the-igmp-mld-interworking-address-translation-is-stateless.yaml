document: rfc-8114
kind: normative-requirement
summary: The IGMP-MLD interworking address translation is stateless and MUST follow the address mapping specified in Section 5. The mB4 performs the host portion of MLD on the upstream interface, and the IPv6 membership composition MUST synchronize with the IGMP membership database.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
