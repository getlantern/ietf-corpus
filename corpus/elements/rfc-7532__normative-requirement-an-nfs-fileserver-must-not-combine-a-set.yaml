document: rfc-7532
kind: normative-requirement
summary: An NFS fileserver MUST NOT combine a set of FSL records into a single fs_location4 or fs_locations_item4 unless each FSL record in the set contains the same rootpath value and extended file system information.
section: 2.8.1.3
rfc2119_level: MUST NOT
