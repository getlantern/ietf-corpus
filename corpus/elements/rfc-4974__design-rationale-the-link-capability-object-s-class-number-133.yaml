document: rfc-4974
kind: design-rationale
summary: The LINK_CAPABILITY object's Class Number (133, form 10bbbbbb) is deliberately selected so that nodes not recognizing this object drop it silently. The top bit is set and the next bit is cleared, following RSVP's unknown object handling rules to allow backward-compatible deployment.
section: "5.3"
topics:
