document: rfc-9255
kind: design-rationale
summary: 'There is a temporal issue with using RPKI for identity: the holder of an AS or IP prefix may change after a document was signed, or resources may be administratively moved between CAs requiring a key change, making it impossible to determine if a real-world signature remains valid.'
section: "3"
topics:
