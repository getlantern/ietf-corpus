document: rfc-1256
kind: normative-requirement
summary: A multicast solicitation response MUST be delayed by a random interval not greater than MAX_RESPONSE_DELAY (2 seconds) to prevent synchronization among responding routers and to allow multiple closely-spaced solicitations to be answered with a single advertisement.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
