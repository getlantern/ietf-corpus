document: rfc-8052
kind: security-consideration
summary: Setting both authentication and confidentiality algorithms to NONE is possible but NOT RECOMMENDED; it may be necessary during migration when some traffic has not yet been scheduled for protection, or when network-layer encryption is applied before delivery to a public network.
