document: rfc-3275
kind: protocol-element
summary: 'The X509Data element contains identifiers for X.509 certificates: X509IssuerSerial (issuer DN/serial number pair, SHOULD be RFC 2253 compliant), X509SubjectName, X509SKI (base64 SubjectKeyIdentifier), X509Certificate (base64 DER), and X509CRL. All certificate references within one X509Data element MUST relate to the same certificate.'
section: 4.4.4
topics:
    - security
    - pkix
    - crypto
