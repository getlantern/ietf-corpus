document: rfc-4178
kind: security-consideration
summary: 'When the selected mechanism does not support integrity protection, the negotiation is vulnerable: an active attacker can force selection of a security mechanism that is not mutually preferred but is acceptable to the target. The strength of SPNEGO is bounded by the integrity protection strength of the weakest mechanism acceptable to both peers.'
section: "7"
topics:
