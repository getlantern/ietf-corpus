document: rfc-8000
kind: interoperability-note
summary: NFSv4 clients setting or getting owner/group attributes typically need identity-mapping services because client-side APIs require local identity forms (e.g., UID/GID), which must be converted to or from the unique name@domain form for on-the-wire representation.
section: "4.2"
topics:
    - security
