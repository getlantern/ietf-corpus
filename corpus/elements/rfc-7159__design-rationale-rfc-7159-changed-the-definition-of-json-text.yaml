document: rfc-7159
kind: design-rationale
summary: RFC 7159 changed the definition of 'JSON text' from RFC 4627 to allow any JSON value (not just object or array) as a top-level construct, enabling bare strings, numbers, and literals as valid JSON texts. This reflects widespread real-world usage.
section: "2"
topics:
