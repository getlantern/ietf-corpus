document: rfc-7159
kind: design-rationale
summary: RFC 7159 changed the definition of 'JSON text' from RFC 4627's constraint of object-or-array to allow any JSON value, reflecting actual widespread use. Implementations that generate only objects or arrays remain interoperable since all implementations accept those.
section: "1.3"
topics:
    - json
