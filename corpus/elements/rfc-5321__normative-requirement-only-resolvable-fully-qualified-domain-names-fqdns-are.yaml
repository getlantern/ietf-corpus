document: rfc-5321
kind: normative-requirement
summary: Only resolvable, fully-qualified domain names (FQDNs) are permitted in SMTP transactions. Local nicknames or unqualified names MUST NOT be used. The domain name given in the EHLO command MUST be a primary host name or an address literal.
section: 2.3.5
rfc2119_level: MUST NOT
topics:
    - email
    - dns
