document: rfc-6086
kind: normative-requirement
summary: A UA that supports the Info Package mechanism MUST indicate, using the Recv-Info header field, the set of Info Packages for which it is willing to receive INFO requests. If not willing to receive INFO for any Info Package, the UA MUST include an empty Recv-Info header field to signal continued support of the mechanism.
section: 5.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
