document: rfc-3841
kind: security-consideration
summary: When the caller preferences target set is empty after explicit preference processing, the proxy returns a 480 without indicating the callee's capabilities. Revealing capabilities without callee authorization would leak potentially sensitive information, so the specification deliberately provides no mechanism for it.
section: 7.2.4
topics:
    - sip
    - security
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
