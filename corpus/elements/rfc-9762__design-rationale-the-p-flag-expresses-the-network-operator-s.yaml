document: rfc-9762
kind: design-rationale
summary: The P flag expresses the network operator's preference that clients attempt DHCPv6-PD instead of individual address configuration. The actual delegated prefix will necessarily differ from the PIO prefix—the PIO prefix is only used to convey the signal, not for address assignment by the client.
