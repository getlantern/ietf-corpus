document: rfc-2112
kind: normative-requirement
summary: 'MIME-capable MUAs are required to provide the application: (a) the bodies of MIME entities and Content-* headers, (b) the Multipart/Related Content-type header parameters, and (c) the correspondence between each body''s local file name, header data, and content-ID.'
