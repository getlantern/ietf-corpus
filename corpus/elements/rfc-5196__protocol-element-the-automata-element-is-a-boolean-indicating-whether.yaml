document: rfc-5196
kind: protocol-element
summary: The <automata> element is a boolean indicating whether the service represents an automaton (e.g., voicemail server, conference server, recording device) or a human, as defined in RFC 3840. Value 'true' means automaton; 'false' means human.
section: 3.2.10
topics:
