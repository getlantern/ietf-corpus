summary: The Tree and FGLs APPsub-TLV (type 13) contains a 2-byte Type, 2-byte Length (must be a multiple of 8), and n Tree-FGL RECORDs of 8 bytes each. Each record contains a 2-byte Nickname, a 3-byte Start.FGL, and a 3-byte End.FGL.
