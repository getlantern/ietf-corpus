document: rfc-4003
kind: protocol-element
summary: The U-bit in an ERO label subobject distinguishes downstream (U=0) from upstream (U=1) label assignment for bidirectional LSPs. For unidirectional LSPs, one subobject is examined; for bidirectional LSPs, two subobjects are examined.
