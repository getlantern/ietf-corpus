document: rfc-7643
kind: security-consideration
summary: SCIM protocol interactions MUST use appropriate authentication and authorization per RFC 7644. Service providers are advised to consider multi-hop and multi-party scenarios carefully, as personal information may be propagated to third parties acting as downstream SCIM clients or providers.
section: "9.1"
topics:
    - security
    - oauth
