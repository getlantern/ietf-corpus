document: rfc-2128
kind: protocol-element
summary: dialCtlTrapEnable is a global trap switch. When enabled(1), traps are generated for all peers; when disabled(2), traps are only generated for peers whose dialCtlPeerCfgTrapEnable is individually set to enabled(1). Default is disabled.
section: "3.1"
topics:
    - snmp
