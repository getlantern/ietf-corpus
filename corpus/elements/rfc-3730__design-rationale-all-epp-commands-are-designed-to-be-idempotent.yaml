document: rfc-3730
kind: design-rationale
summary: All EPP commands are designed to be idempotent so that executing a command more than once has the same net effect as executing it once successfully. This property ensures safety of retrying commands in cases of response delivery failure without causing unintended side effects.
section: "2"
