document: rfc-4717
kind: normative-requirement
summary: ATM PWs that consume more than their fair share of PSN bandwidth in the presence of TCP-friendly services SHOULD be halted; PEs SHOULD monitor for congestion using explicit congestion notification, VCCV, or packet loss measurement.
