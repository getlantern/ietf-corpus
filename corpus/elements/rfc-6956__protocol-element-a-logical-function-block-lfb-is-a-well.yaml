document: rfc-6956
kind: protocol-element
summary: A Logical Function Block (LFB) is a well-defined, logically separable functional block residing in a Forwarding Element (FE), controlled by a Control Element (CE) via the ForCES protocol. It is a functionally accurate abstraction of FE processing capabilities, not a hardware-accurate representation. LFB classes are templates for fine-grained FE processing aspects; multiple instances of the same class may exist in one FE.
section: "2.2"
topics:
    - routing
