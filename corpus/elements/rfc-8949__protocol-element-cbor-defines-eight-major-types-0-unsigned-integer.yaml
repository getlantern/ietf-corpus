summary: 'CBOR defines eight major types: 0 (unsigned integer, value = argument), 1 (negative integer, value = -1 minus argument), 2 (byte string, argument = byte count), 3 (UTF-8 text string, argument = byte count), 4 (array, argument = item count), 5 (map, argument = pair count), 6 (tag, argument = tag number), 7 (simple values and floating-point).'
