document: rfc-9876
kind: normative-requirement
summary: For the 0-255 range, the designated expert must additionally evaluate the requested code point concerning the limited availability of the 1-byte code point space. A similar criterion may apply for 256-9999, 10000-19999, and 33000-64997 ranges where parameter and coding combinations consume considerable code point space.
section: 4.1.3
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
