document: rfc-8505
kind: interoperability-note
summary: An updated 6LR MUST accept registrations from RFC 6775-only 6LNs (which use Source Address instead of Target Address for the Registered Address) and MUST use RFC 6775-only DAR/DAC messages to the 6LBR to indicate TID absence. The 6LR MUST still reply with an NA(EARO).
section: "6.2"
topics:
    - ip
    - v6ops
