document: rfc-2364
kind: normative-requirement
summary: When originating a switched virtual circuit, the caller MUST request in the SETUP message either VC-multiplexed PPP, LLC-encapsulated PPP, or both. When offering both, they are encoded within a Broadband Repeat Indicator IE in preference order.
section: "7"
rfc2119_level: MUST
topics:
