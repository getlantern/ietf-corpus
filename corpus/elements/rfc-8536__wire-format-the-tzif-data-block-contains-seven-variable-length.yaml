document: rfc-8536
kind: wire-format
summary: 'The TZif data block contains seven variable-length elements in order: transition times (timecnt × TIME_SIZE), transition types (timecnt × 1), local time type records (typecnt × 6), time zone designations (charcnt octets), leap-second records (leapcnt × (TIME_SIZE+4)), standard/wall indicators (isstdcnt), and UT/local indicators (isutcnt). TIME_SIZE is 4 in version 1 and 8 in version 2+.'
section: "3.2"
