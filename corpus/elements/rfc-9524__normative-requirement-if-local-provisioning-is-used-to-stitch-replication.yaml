document: rfc-9524
kind: normative-requirement
summary: If local provisioning is used to stitch Replication segments, a chain of Replication segments SHOULD NOT form a loop. If a control plane is used, the control plane specification MUST prevent loops or detect and mitigate loops in steady state.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
