document: rfc-9568
kind: normative-requirement
summary: For IPv6, the Hop Limit MUST be set to 255, and a VRRP Router receiving a packet with Hop Limit not equal to 255 MUST discard the packet. This implements the Generalized TTL Security Mechanism (GTSM) per RFC 5082.
section: 5.1.2.3
rfc2119_level: MUST
topics:
    - ip
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
