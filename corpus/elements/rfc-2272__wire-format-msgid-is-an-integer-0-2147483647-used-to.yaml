document: rfc-2272
kind: wire-format
summary: msgID is an INTEGER (0..2147483647) used to correlate requests and responses between SNMP entities and to coordinate processing across subsystem models. It is distinct from the PDU request-id and must be findable even if PDU decryption fails.
