document: rfc-6766
kind: wire-format
summary: G9983SvcIndexList is an OCTET STRING of size 0..60; each octet encodes an 8-bit G9983SvcIndex (1–255) identifying an active service. The octet's position in the string directly encodes the service's priority and position in the G.Bond/TDIM frame.
