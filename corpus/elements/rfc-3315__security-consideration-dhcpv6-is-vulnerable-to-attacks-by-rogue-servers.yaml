document: rfc-3315
kind: security-consideration
summary: DHCPv6 is vulnerable to attacks by rogue servers sending false configuration, clients exhausting address pools, and message replay. The Authentication option (section 22.11) provides integrity protection via the Delayed Authentication Protocol (HMAC-MD5 with a shared key) or the Reconfigure Key Authentication Protocol.
section: "23"
topics:
    - security
    - ip
    - crypto
