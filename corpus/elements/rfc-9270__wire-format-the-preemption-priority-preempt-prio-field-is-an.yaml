document: rfc-9270
kind: wire-format
summary: The Preemption Priority (Preempt Prio) field is an 8-bit field allocated from the formerly reserved bits in the 32-bit PROTECTION object header (as modified by RFC 4873). It indicates the SMP preemption priority of a protecting LSP; a lower value indicates a higher priority.
section: "6.3"
topics:
    - mpls
    - routing
