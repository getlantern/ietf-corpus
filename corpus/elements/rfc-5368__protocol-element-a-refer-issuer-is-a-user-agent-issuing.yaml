document: rfc-5368
kind: protocol-element
summary: A REFER-Issuer is a user agent issuing a REFER request. A REFER-Recipient is an entity (typically a URI-list server/network entity) receiving the REFER and forwarding SIP requests to REFER-Targets. A REFER-Target is the UA of the intended final recipient.
