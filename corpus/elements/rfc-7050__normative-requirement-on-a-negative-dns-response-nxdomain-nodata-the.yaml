document: rfc-7050
kind: normative-requirement
summary: On a negative DNS response (NXDOMAIN, NODATA), the node MUST obey the TTL before resending the AAAA query; on timeout, the node SHOULD retransmit like any other DNS query.
section: "3"
rfc2119_level: MUST
topics:
