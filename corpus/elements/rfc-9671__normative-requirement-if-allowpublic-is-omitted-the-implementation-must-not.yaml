document: rfc-9671
kind: normative-requirement
summary: If :allowpublic is omitted, the implementation MUST NOT process calendar data unless it is a well-formed iTIP message and one of the recipient's email addresses matches the Calendar User Address of the intended target (ORGANIZER for REPLY; ATTENDEE for REQUEST, CANCEL, ADD).
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
