document: rfc-1771
kind: protocol-element
summary: NEXT_HOP (Type Code 3) is a well-known mandatory attribute holding the IP address of the border router to use as next hop. A speaker must never advertise a peer's own address as NEXT_HOP for an originated route, and must never install a route with itself as next hop.
section: 5.1.3
topics:
    - bgp
    - routing
