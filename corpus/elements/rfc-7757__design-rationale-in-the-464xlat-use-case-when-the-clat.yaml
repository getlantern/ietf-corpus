document: rfc-7757
kind: design-rationale
summary: In the 464XLAT use case, when the CLAT lacks a dedicated IPv6 prefix and uses a single interface address that is not IPv4-translatable, EAMs allow that address to be mapped to the IPv4 Service Continuity Prefix address, enabling stateless translation without IPv4-translatable addressing.
section: A.1
topics:
