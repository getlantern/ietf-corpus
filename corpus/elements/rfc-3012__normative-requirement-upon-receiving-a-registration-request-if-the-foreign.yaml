document: rfc-3012
kind: normative-requirement
summary: Upon receiving a Registration Request, if the Foreign Agent issued a Challenge and has no SA with the mobile node, it MUST verify the MN-FA Challenge extension exists and contains a previously unused challenge value; if missing, it MUST reply with MISSING_CHALLENGE.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
