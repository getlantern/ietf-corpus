document: rfc-6089
kind: normative-requirement
summary: All flow binding state MUST be refreshed in every Binding Update the mobile node sends. Any previously registered flow binding not included—either via a flow identification mobility option or a flow summary mobility option—will be deleted by the receiver.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - mobility
