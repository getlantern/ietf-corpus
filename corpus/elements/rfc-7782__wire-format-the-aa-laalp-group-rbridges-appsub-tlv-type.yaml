document: rfc-7782
kind: wire-format
summary: 'The AA-LAALP-GROUP-RBRIDGES APPsub-TLV (type 252) encodes: 2-byte Type, 2-byte Length (= 3+k), 2-byte Sender Nickname (the ingress nickname), 1-byte LAALP ID Size (k), and k-byte LAALP ID. For MC-LAG or DRNI, the LAALP ID is the 8-byte ID from IEEE 802.1AX Clause 6.3.2.'
section: 4.1.2
topics:
    - routing
