document: rfc-3168
kind: protocol-element
summary: ECT(0) and ECT(1) are the two ECN-Capable Transport codepoints set by the data sender in IP packet headers to signal that both endpoints support ECN. Routers treat ECT(0) and ECT(1) as equivalent; senders that need only one codepoint SHOULD use ECT(0).
section: "5"
topics:
