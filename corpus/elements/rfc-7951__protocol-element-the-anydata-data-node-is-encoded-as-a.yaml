document: rfc-7951
kind: protocol-element
summary: The anydata data node is encoded as a name/object pair (same as container). Its JSON content must be valid I-JSON, have member names matching the ABNF production, contain arrays of only unique scalars or only objects, and use '[null]' only for the 'empty' type encoding.
