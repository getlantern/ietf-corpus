document: rfc-4704
kind: design-rationale
summary: 'The two primary supported models are: (1) client updates AAAA RRs, server updates PTR RRs; (2) server updates both AAAA and PTR RRs. Other permutations are not practically meaningful because of DNS authority considerations. A third case where the server performs no updates is supported but presumed rare.'
section: "3"
topics:
