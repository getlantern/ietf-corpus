document: rfc-7581
kind: design-rationale
summary: The inclusive range Action value in the RB Set Field enables compact encoding of large resource sets. The RFC notes that numbering resource blocks contiguously can allow status updates to exploit this efficiency, reducing routing protocol overhead in large WSON deployments.
section: "2.1"
topics:
