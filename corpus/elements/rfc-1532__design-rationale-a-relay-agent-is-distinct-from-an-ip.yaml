document: rfc-1532
kind: design-rationale
summary: 'A relay agent is distinct from an IP router: it receives BOOTP messages as a final destination and generates new ones, rather than forwarding packets transparently. This distinction justifies placing relay-agent logic in routers but also allowing it in directly-connected hosts.'
