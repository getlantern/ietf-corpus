document: rfc-3559
kind: protocol-element
summary: 'Six compliance statements are defined: mallocServerReadOnlyCompliance, mallocClientReadOnlyCompliance, mallocPrefixCoordinatorReadOnlyCompliance (monitoring-only, no write access), and mallocServerFullCompliance, mallocClientFullCompliance, mallocPrefixCoordinatorFullCompliance (full read-create support). Read-only compliance requires all writable objects to be accessible at MIN-ACCESS read-only.'
section: "4"
