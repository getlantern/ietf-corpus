document: rfc-5360
kind: normative-requirement
summary: A relay that receives a request-contained URI list with a URI for which it has no permissions MUST NOT perform the translation and SHOULD return a 470 (Consent Needed) response with a Permission-Missing header field listing the unauthorized URIs.
section: 5.9.1
rfc2119_level: MUST NOT
topics:
    - sip
