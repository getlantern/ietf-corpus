document: rfc-9437
kind: security-consideration
summary: Removing subscription state can enable replay attacks by resetting the nonce baseline. The Map-Server SHOULD retain the last nonce seen per xTR-ID after unsubscription; if it cannot, it MUST require xTRs to re-establish a new security association before re-subscribing.
section: "5"
topics:
    - security
    - routing
