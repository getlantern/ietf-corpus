document: rfc-8444
kind: security-consideration
summary: In deployments where potential attackers have access to one or more networks in the OSPF routing domain, stronger authentication mechanisms such as those specified in RFC 7474 SHOULD be used. The document assumes BIER and OSPF layers are under a single administrative domain.
section: "3"
rfc2119_level: SHOULD
topics:
