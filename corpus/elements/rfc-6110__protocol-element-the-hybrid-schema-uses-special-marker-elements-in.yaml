summary: 'The hybrid schema uses special marker elements in the NETMOD annotation namespace (''urn:ietf:params:xml:ns:netmod:dsdl-annotations:1'') to demarcate sub-schemas: <nma:data> for configuration/state data, <nma:rpcs> and <nma:rpc> for RPC operations, <nma:input> and <nma:output> for RPC request/reply, and <nma:notifications>/<nma:notification> for event notifications.'
