document: rfc-6712
kind: security-consideration
summary: If HTTP responses to pushed Announcement messages are not authenticated and integrity-protected, their processing-state information cannot be trusted. The overall PKI system design must not depend on Announcements being reliably received and processed in this case.
section: "5"
topics:
