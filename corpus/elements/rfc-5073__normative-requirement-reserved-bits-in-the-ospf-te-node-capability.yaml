document: rfc-5073
kind: normative-requirement
summary: Reserved bits in the OSPF TE Node Capability Descriptor TLV MUST be set to zero on transmission and MUST be ignored on reception. Any unknown bit flags SHALL be treated as reserved.
section: "4.1"
rfc2119_level: MUST
