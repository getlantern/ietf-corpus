document: rfc-6535
kind: normative-requirement
summary: BIH MUST NOT perform protocol translation from IPv4 to IPv6 for dual-stack destinations when the host has any IPv4 interfaces (native or tunneled) available. If an IPv4 interface becomes available during BIH operation, BIH MUST stop initiating new translation sessions.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
