document: rfc-9801
kind: normative-requirement
summary: For SRv6 encapsulation via H.Encaps.L1 or H.Encaps.L1.Red, the next header field of the SRH or last extension header MUST be set to 147 (BIT-EMU). The End.DX1 SID MUST be the last segment in an SR Policy.
section: 5.1.1
rfc2119_level: MUST
topics:
    - ip
    - routing
