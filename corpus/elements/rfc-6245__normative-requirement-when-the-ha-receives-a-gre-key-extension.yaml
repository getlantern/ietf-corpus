document: rfc-6245
kind: normative-requirement
summary: When the HA receives a GRE Key Extension carrying a GRE key value of zero in the initial Registration Request, it MUST assign GRE keys for both directions and include them in the GRE Key Extension in the RRP sent to the FA.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
