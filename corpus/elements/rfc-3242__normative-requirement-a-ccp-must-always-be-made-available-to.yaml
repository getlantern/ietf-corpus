document: rfc-3242
kind: normative-requirement
summary: A CCP MUST always be made available to the assisting layer. If the assisting layer receives CCPs with C=1, it MUST use the last CCP received (corresponding to the last non-CCP packet) whenever it chooses to send a CCP.
section: 4.1.3
rfc2119_level: MUST
topics:
    - rtp
