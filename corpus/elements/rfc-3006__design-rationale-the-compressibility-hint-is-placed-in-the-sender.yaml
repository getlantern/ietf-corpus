document: rfc-3006
kind: design-rationale
summary: The compressibility hint is placed in the Sender TSpec rather than a separate RSVP object because the sender knows best what the data will look like, the TSpec is not modified in transit (unlike the Adspec), and placing it there works for non-RSVP resource reservation mechanisms as well.
