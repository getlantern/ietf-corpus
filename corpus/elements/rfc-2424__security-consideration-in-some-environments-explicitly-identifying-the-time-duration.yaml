document: rfc-2424
kind: security-consideration
summary: In some environments, explicitly identifying the time duration of audio/* or video/* content in a header may be a security issue and should not be noted. The duration value in the header cannot be trusted for determining exact data size; the actual data must be examined directly.
section: "4"
topics:
