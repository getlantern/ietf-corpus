document: rfc-6326
kind: wire-format
summary: The Enabled-VLANs sub-TLV (MT-PORT-CAP sub-TLV type 2, minimum length 3) advertises VLANs enabled for end-station service at the sending port. It encodes a 12-bit Start VLAN ID followed by a bit-map where each bit represents consecutive VLAN IDs starting from Start VLAN ID.
section: 2.2.2
topics:
    - routing
