summary: The Basic Constraints extension (OID id-ce 19) identifies whether the subject is a CA (cA BOOLEAN DEFAULT FALSE) and specifies the maximum depth of a valid certification path via pathLenConstraint (INTEGER). A pathLenConstraint of zero means only an end-entity certificate may follow.
