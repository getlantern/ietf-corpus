document: rfc-8445
kind: design-rationale
summary: Peer-reflexive candidates receive higher type preference than server-reflexive candidates because they are learned directly from the peer endpoint, always represent a path the peer can actually reach, and may reflect a more accurate NAT binding than a server-reflexive candidate discovered through a distant STUN server.
