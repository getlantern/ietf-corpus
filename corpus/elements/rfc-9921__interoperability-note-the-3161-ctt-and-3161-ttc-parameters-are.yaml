document: rfc-9921
kind: interoperability-note
summary: The 3161-ctt and 3161-ttc parameters are defined for COSE_Sign and COSE_Sign1 only. For COSE_Sign, the MessageImprint input in CTT mode is the entire CBOR-encoded signatures array (not individual signatures), enabling a single TST to cover all signers.
section: 3.1.2
topics:
    - crypto
    - cbor
