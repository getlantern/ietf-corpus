document: rfc-907
kind: protocol-element
summary: The Unnumbered Response control message (type 5) provides critical feedback even when operating in pure discard mode (A/R disabled). It carries a response code (e.g., destination unreachable, protocol violation, illegal stream ID) and response information words identifying the offending address or message.
