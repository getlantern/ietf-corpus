document: rfc-8662
kind: protocol-element
summary: Entropy Readable Label Depth (ERLD) is defined as the number of labels a router can both read in an MPLS packet (starting from the top of the stack) and use in its load-balancing function. A router will perform load-balancing using the EL only if the EL is placed within the first ERLD labels.
section: "4"
topics:
