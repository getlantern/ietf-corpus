document: rfc-5163
kind: security-consideration
summary: An attacker with access to the link or layer-2 equipment could inject arbitrary TS Packets into a ULE or GSE stream and thereby modify MPEG-2 layer-2 signalling information transmitted via the TS-Concat extension. This attack vector is equivalent to directly attacking native TS Packet signalling; use of security mechanisms to protect MPEG-2 signalling is discussed in referenced security requirements work.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
