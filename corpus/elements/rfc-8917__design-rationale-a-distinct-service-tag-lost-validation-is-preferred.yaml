document: rfc-8917
kind: design-rationale
summary: A distinct service tag ('LoST-Validation') is preferred over a DNS naming convention (e.g., 'ecrf.example.org' vs 'lvf.example.org') because DNS name conventions are inflexible and fragile, and because LoST referrals return an AUS rather than a URL, requiring a mechanism that works throughout the full LoST tree structure.
section: "2"
topics:
    - dns
