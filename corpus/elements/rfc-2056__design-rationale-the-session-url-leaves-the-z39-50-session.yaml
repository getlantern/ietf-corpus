document: rfc-2056
kind: design-rationale
summary: The Session URL leaves the Z39.50 session open for the user to do retrievals, new searches, etc. This is the main distinction from the Retrieval URL, which leaves it up to the client whether or not to keep the session open after completing the retrieval.
