document: rfc-6081
kind: protocol-element
summary: 'The Sequential Port-Symmetric NAT Extension uses an Echo Test: the client sends a router solicitation to the Teredo server, a direct bubble to the peer, and a router solicitation to the secondary server from a random port. The external port for the direct bubble is estimated as the midpoint of the ports reported by the two server responses.'
section: "3.4"
topics:
    - nat
    - v6ops
