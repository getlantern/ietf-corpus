document: rfc-9159
kind: design-rationale
summary: The 6CO is not needed when context is pre-provisioned or provided by out-of-band means, since the in-band indication would be superfluous. The 6LBR MAY include a 6CO matching each advertised prefix only when in-band signaling is desired.
section: 3.3.3
topics:
