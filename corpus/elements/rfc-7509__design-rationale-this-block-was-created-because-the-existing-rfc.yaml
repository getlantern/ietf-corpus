document: rfc-7509
kind: design-rationale
summary: This block was created because the existing RFC 5725 post-repair RLE XR block incurs higher reporting overhead due to its packet-by-packet format. When applications use multiple XR blocks and require concise reporting to save bandwidth, this count-based block provides a more efficient alternative.
