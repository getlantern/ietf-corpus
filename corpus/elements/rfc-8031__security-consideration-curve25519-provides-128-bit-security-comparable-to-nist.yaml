document: rfc-8031
kind: security-consideration
summary: Curve25519 provides ~128-bit security (comparable to NIST P-256/group 19) and Curve448 provides ~224-bit security. Unlike the NIST curves, the generation process for Curve25519 and Curve448 is fully documented and independently verifiable, preventing malicious parameter manipulation.
