document: rfc-3927
kind: protocol-element
summary: An ARP Announcement is an ARP Request identical to an ARP Probe except that both the 'sender IP address' and 'target IP address' fields are set to the host's newly selected IPv4 address. It is broadcast on the local link to clear stale ARP cache entries.
section: "1.2"
topics:
