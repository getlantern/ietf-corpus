document: rfc-5790
kind: interoperability-note
summary: If an LW-IGMPv3 router receives an IS_EX(x) report with a non-empty source list, it treats it as IS_EX({}). Similarly, a TO_EX(x) with a non-empty source list is treated as TO_EX({}). This ensures graceful handling of full-version IGMPv3 messages that are not generated by lightweight hosts.
section: "5.3"
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
