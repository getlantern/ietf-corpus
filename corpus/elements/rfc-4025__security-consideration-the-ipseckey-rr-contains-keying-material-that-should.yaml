document: rfc-4025
kind: security-consideration
summary: The IPSECKEY RR contains keying material that SHOULD be delivered with integrity protection (e.g., DNSSEC, TSIG, SIG(0), or a secure local channel). The keying material itself is not sensitive to passive attacks and may be freely disclosed without compromising IPsec session security.
section: "4"
topics:
    - security
    - dns
    - ipsec
