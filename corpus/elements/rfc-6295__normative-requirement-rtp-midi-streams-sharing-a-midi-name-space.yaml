document: rfc-6295
kind: normative-requirement
summary: RTP MIDI streams sharing a MIDI name space MUST NOT be sent in the same RTP session; each MUST be sent from a different RTP session. All such streams MUST use the same SSRC value and the same randomly chosen RTP timestamp initialization value, enabling receivers to reconstruct the interleaved command stream.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
