document: rfc-7988
kind: interoperability-note
summary: If an egress PE joined an IR P-tunnel via the Intra-AS I-PMSI A-D route procedures (Section 4.1.2), it cannot infer the ingress PE from the P-tunnel label, so the 'Discarding Packets from Wrong PE' procedure of RFC 6513 Section 9.1.1 cannot be applied. Duplicate prevention then requires Single Forwarder Selection or native PIM procedures.
section: "6"
topics:
    - routing
    - multicast
    - mpls
