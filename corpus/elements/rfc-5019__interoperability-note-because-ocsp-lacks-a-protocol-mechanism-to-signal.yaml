document: rfc-5019
kind: interoperability-note
summary: Because OCSP lacks a protocol mechanism to signal responder capabilities, clients needing to differentiate between RFC 5019-conformant and non-conformant responders must rely on out-of-band mechanisms. This profile ensures interoperability between a fully RFC 2560-conformant client and an RFC 5019-mode responder.
section: "1"
topics:
