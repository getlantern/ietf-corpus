document: rfc-6991
kind: protocol-element
summary: The object-identifier type represents ASN.1 OIDs as dot-separated non-negative sub-identifiers, each not exceeding 2^32-1. It is a superset of SMIv2 OBJECT IDENTIFIER since it is not restricted to 128 sub-identifiers; the object-identifier-128 type should be used for SMIv2 compatibility.
