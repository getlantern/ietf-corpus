document: rfc-3655
kind: interoperability-note
summary: This document updates RFC 2535 Section 6.1, replacing the AD bit definition. Resolvers trusting the AD bit must confirm the responder supports the updated definition, which is indicated by support for the DO bit (RFC 3225).
