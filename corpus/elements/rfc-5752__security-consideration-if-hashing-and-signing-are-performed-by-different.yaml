document: rfc-5752
kind: security-consideration
summary: If hashing and signing are performed by different entities, the signing entity must ensure the hash comes from a trustworthy source. Using multiple hashes with different algorithms partially mitigates the risk of a malicious hash provider.
section: "6"
topics:
