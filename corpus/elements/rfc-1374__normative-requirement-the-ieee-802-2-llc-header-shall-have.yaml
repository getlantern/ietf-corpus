document: rfc-1374
kind: normative-requirement
summary: The IEEE 802.2 LLC header shall have SSAP=170 decimal, DSAP=170 decimal, and CTL=3 (Unnumbered Information); the SNAP Organization Code shall be zero and EtherType set per Assigned Numbers (IP=2048, ARP=2054, RARP=32821).
section: Protocol/Packet Format
rfc2119_level: MUST
topics:
