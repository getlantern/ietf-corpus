document: rfc-3768
kind: design-rationale
summary: The virtual router MAC address is used as the source MAC in all periodic Master advertisements so that learning bridges in extended LANs correctly learn the LAN segment the virtual router is on, preventing flooding of all packets sent to the virtual router.
section: "2.4"
