document: rfc-3963
kind: normative-requirement
summary: If a Home Agent receives a DHAAD Request with the Mobile Router Support Flag set, it MUST reply with a list of Home Agents that support Mobile Routers. If none support Mobile Routers, the Home Agent MAY reply with a standard list and MUST set the Mobile Router Support Flag to 0 in the reply.
section: "7.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
