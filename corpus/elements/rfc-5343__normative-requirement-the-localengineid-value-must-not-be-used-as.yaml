document: rfc-5343
kind: normative-requirement
summary: The localEngineID value MUST NOT be used as a value to identify an SNMP engine; specifically, it MUST NOT be used in the snmpEngineID.0 scalar or in the msgAuthoritativeEngineID field in the USM securityParameters.
section: "3.1"
rfc2119_level: MUST NOT
