document: rfc-3472
kind: normative-requirement
summary: The egress MUST generate a NOTIFICATION with 'Routing problem/Unsupported G-PID' if the G-PID cannot be supported. In PSC with penultimate hop popping (PHP), the penultimate hop also checks the G-PID and MUST generate a NOTIFICATION with 'Routing problem/Unacceptable label value' if unsupported.
section: 2.1.1
rfc2119_level: MUST
topics:
    - routing
