document: rfc-3758
kind: normative-requirement
summary: Any delay applied to sending a FORWARD TSN chunk SHOULD NOT exceed 200ms and MUST NOT exceed 500ms. These values align with delayed acknowledgement rules in RFC 2960 because delaying FORWARD TSN has symmetric consequences.
section: "3.5"
rfc2119_level: MUST NOT
topics:
