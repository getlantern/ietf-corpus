document: rfc-6522
kind: interoperability-note
summary: Removing the outermost-MIME-type constraint (present in RFC 3462) is the key interoperability change. Other documents may update or establish constraints on use of multipart/report in contexts where restrictions are needed; RFC 6522 itself imposes none beyond what individual report-type registrations may specify.
