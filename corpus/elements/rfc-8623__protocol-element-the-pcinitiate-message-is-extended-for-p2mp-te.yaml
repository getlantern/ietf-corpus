document: rfc-8623
kind: protocol-element
summary: The PCInitiate message is extended for P2MP TE LSPs. An instantiation request includes SRP, LSP (with N flag), and an end-point-path-pair list; a deletion request includes only SRP and LSP with the R flag set in SRP.
