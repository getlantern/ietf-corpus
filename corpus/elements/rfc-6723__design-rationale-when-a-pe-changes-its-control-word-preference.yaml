document: rfc-6723
kind: design-rationale
summary: When a PE changes its control-word preference from PREFERRED to NOT PREFERRED (the reverse direction), the existing RFC 4447 Section 5.4.1 procedures are sufficient and no additional mechanism is required. The Label Request extension is only needed for the NOT PREFERRED to PREFERRED direction.
section: "4.1"
topics:
    - realtime
    - mpls
