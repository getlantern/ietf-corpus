document: rfc-2078
kind: security-consideration
summary: The ability for an entity to acquire and use credentials associated with a given identity is equivalent to that entity's ability to assert that principal's identity; underlying mechanisms and OS functions must constrain credential acquisition to appropriate processes. Implementors are directed to take this responsibility seriously.
section: 1.1.1.2
topics:
    - security
