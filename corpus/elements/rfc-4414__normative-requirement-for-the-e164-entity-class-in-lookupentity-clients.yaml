document: rfc-4414
kind: normative-requirement
summary: For the 'e164' entity class in <lookupEntity>, clients SHOULD remove all non-digit characters between the digits of an E.164 number, and servers MUST ignore any non-digit characters between the digits (e.g., '+1 703 555 1234' is interpreted as '+17035551234').
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
