document: rfc-4666
kind: protocol-element
summary: 'ASP State Maintenance messages manage the ASP lifecycle: ASP Up (ASPUP, type 1) and its acknowledgement ASP Up Ack (type 4), ASP Down (ASPDN, type 2) and ASP Down Ack (type 5), Heartbeat (BEAT, type 3) and Heartbeat Ack (BEAT ACK, type 6) for monitoring association health. ASP Traffic Maintenance messages ASP Active (ASPAC) and ASP Inactive (ASPIA) with their acknowledgements control traffic flow.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
