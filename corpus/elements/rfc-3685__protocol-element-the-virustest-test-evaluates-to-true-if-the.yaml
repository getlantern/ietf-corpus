document: rfc-3685
kind: protocol-element
summary: The 'virustest' test evaluates to true if the virustest result matches a given value. It returns a string starting with a numeric value in the range '0' through '5', where 0 means not tested, 1 means no known viruses, 2 means virus replaced with harmless content, 3 means virus cured, 4 means possibly contains a known virus, and 5 means definitely contains a known virus.
section: "2.3"
topics:
    - email
    - security
