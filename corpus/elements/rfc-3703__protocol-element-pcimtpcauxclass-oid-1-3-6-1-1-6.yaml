summary: pcimTPCAuxClass (OID 1.3.6.1.1.6.1.12) is an auxiliary subclass of pcimConditionAuxClass providing time-based activation scheduling. Its MAY attributes include pcimTPCTime, pcimTPCMonthOfYearMask, pcimTPCDayOfMonthMask, pcimTPCDayOfWeekMask, pcimTPCTimeOfDayMask, and pcimTPCLocalOrUtcTime.
