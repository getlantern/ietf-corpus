document: rfc-8920
kind: normative-requirement
summary: The ASLA sub-TLV MUST be used for advertisement of a defined set of link attributes (SRLG, extended metrics, administrative group, extended administrative group, TE metric) if these are advertised inside the OSPFv2 Extended Link TLV or OSPFv3 Router-Link TLV.
