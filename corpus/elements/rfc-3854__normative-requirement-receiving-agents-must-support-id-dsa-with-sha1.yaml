document: rfc-3854
kind: normative-requirement
summary: Receiving agents MUST support id-dsa-with-sha1 with absent (not NULL) algorithm parameters, and MUST support rsaEncryption. Sending agents MUST support either id-dsa-with-sha1 or rsaEncryption.
section: "2.2"
rfc2119_level: MUST
topics:
