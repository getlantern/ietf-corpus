document: rfc-6705
kind: wire-format
summary: 'The LRI message wire format includes a 16-bit Sequence Number, 16-bit Reserved field, 16-bit Lifetime, followed by variable-length Mobility Options. The Mobility Options MUST contain two MN-ID options each followed by one or more HNP options, in order: [MN1-ID, MN1-HNP], [MN2-ID, MN2-HNP].'
section: "10.1"
topics:
    - mobility
