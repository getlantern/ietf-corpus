document: rfc-7277
kind: privacy-consideration
summary: The 'ipv6/autoconf' container controls whether temporary addresses (RFC 4941 privacy extensions) are created. Unauthorized modification of these leaves can impact the addresses used by a node and indirectly affect user privacy by disabling or enabling privacy address generation.
section: "6"
topics:
