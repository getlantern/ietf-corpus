kind: protocol-element
summary: The gmplsTunnelARHopLabelStatuses bitmask includes forwardPresent(0), reversePresent(1), forwardGlobal(2), and reverseGlobal(3) bits. The Global bits distinguish Global Label Space from Per-Interface labels; a Global bit is only meaningful when the corresponding Present bit is set.
