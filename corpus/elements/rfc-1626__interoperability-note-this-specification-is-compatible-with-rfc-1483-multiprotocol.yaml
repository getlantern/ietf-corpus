document: rfc-1626
kind: interoperability-note
summary: This specification is compatible with RFC 1483 (Multiprotocol Encapsulation over ATM AAL5) and RFC 1577 (Classical IP and ARP over ATM), and may be used as a conforming extension to RFC 1577. Its applicability is not limited to the Classical IP over ATM model.
