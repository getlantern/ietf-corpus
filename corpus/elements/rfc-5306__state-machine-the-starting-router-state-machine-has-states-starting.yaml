document: rfc-5306
kind: state-machine
summary: 'The Starting Router state machine has states: Starting → ADJ Seen RA (on RX RA) or ADJ Seen CSNP (on RX CSNP set); T1 cancelled when both RA and CSNP received; T2 expiry or LSP DB Sync clears overload bit, clears SA bit, and transitions to Running. On ADJ UP, local LSPs are immediately transmitted with overload bit set.'
section: "4.3"
topics:
