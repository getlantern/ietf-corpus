document: rfc-7172
kind: normative-requirement
summary: An FGL TRILL Data packet MUST contain exactly two occurrences of Ethertype 0x893B as shown in the packet structure. If a TRILL switch processing an FGL packet notices that the second occurrence is any other value, it MUST discard the packet.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
