document: rfc-8831
kind: interoperability-note
summary: The PPIDs 'WebRTC Binary Partial' (52) and 'WebRTC String Partial' (54) are deprecated. They were used for PPID-based fragmentation and reassembly of user messages on reliable and ordered channels; that approach has been superseded.
