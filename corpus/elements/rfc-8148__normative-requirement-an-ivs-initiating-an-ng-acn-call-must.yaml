document: rfc-8148
kind: normative-requirement
summary: An IVS initiating an NG-ACN call MUST support sending the VEDS data object and MUST include at minimum a <request> child element with action set to 'send-data' and supported-values containing 'VEDS' in its <capabilities> element.
section: "9.4"
rfc2119_level: MUST
topics:
