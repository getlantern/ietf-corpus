document: rfc-4730
kind: security-consideration
summary: 'User Interfaces MUST NOT downgrade their own security policy: if policy restricts notifications to authenticated subscribers over secure channels, the User Interface must reject unauthenticated or insecure subscriptions. Signaling SHOULD use TLS and sips:; content SHOULD be protected with S/MIME or equivalent mechanisms.'
section: "8"
topics:
