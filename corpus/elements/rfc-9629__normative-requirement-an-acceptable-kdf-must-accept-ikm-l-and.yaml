document: rfc-9629
kind: normative-requirement
summary: An acceptable KDF MUST accept IKM, L, and info as inputs; it MAY also accept a salt carried as a parameter to KeyDerivationAlgorithmIdentifier. All of these inputs MUST influence the output of the KDF.
section: "5"
rfc2119_level: MUST
topics:
