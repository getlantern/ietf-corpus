document: rfc-9125
kind: security-consideration
summary: If BGP messages within the backbone can be modified, it may be possible to spoof the existence of a gateway, causing traffic to be attracted to a specific node and potentially resulting in traffic not being delivered. Existing protocol mechanisms such as securing TCP sessions over which BGP flows SHOULD be used to protect against these exposures.
section: "8"
topics:
    - security
    - bgp
    - routing
