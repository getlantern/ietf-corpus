document: rfc-8445
kind: privacy-consideration
summary: Host candidates directly expose an endpoint's IP addresses to the peer and any passive observers, revealing location information. Agents may suppress tracking-enabling IPv6 addresses when privacy-preserving addresses are available on the same interface and prefix to limit location exposure.
section: "19.1"
topics:
