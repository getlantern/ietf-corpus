document: rfc-3598
kind: protocol-element
summary: The ':detail' argument specifies the sub-part of the local-part to the right of the separator character (e.g., 'sieve' in 'ken+sieve@example.org'). If no separator exists the test evaluates to false; if nothing lies to the right of the separator, ':detail' ':is' the null key ('').
