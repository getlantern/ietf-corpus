document: rfc-5702
kind: security-consideration
summary: Users of DNSSEC are encouraged to deploy SHA-2 as soon as software implementations allow. SHA-2 is considered more resilient to attack than SHA-1, whose strength has been eroded by announced attacks, making SHA-2 the better choice for DNSSEC records.
section: "8.1"
topics:
    - dns
    - security
    - crypto
