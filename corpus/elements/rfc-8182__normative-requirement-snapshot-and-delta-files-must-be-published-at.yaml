document: rfc-8182
kind: normative-requirement
summary: Snapshot and Delta Files MUST be published at URLs unique to their specific session_id and serial so they can be cached indefinitely. The Update Notification File URL, by contrast, remains stable across versions.
section: 3.5.2.2
rfc2119_level: MUST
