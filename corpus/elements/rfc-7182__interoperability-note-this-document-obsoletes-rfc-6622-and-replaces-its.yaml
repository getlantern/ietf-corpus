document: rfc-7182
kind: interoperability-note
summary: This document obsoletes RFC 6622 and replaces its TLV type and type extension registrations. The normative change from RFC 6622 is that TIMESTAMP TLVs MUST (changed from SHOULD) be added to a message before ICV TLVs when both are present.
section: "1.1"
topics:
    - security
    - routing
