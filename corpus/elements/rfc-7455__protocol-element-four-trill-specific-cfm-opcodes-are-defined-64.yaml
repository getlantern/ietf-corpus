summary: 'Four TRILL-specific CFM OpCodes are defined: 64 (Path Trace Reply), 65 (Path Trace Message), 66 (Multi-destination Tree Verification Reply), 67 (Multi-destination Tree Verification Message). Loopback (OpCodes 2/3) and CCM reuse 802.1Q OpCodes without modification.'
