summary: 'NLPID values relevant to ATM encapsulation: 0x00 (Null/Inactive Set — invalid for ATM), 0x80 (SNAP header follows), 0x81 (ISO CLNP), 0x82 (ISO ESIS), 0x83 (ISO ISIS), 0xCC (Internet IP — valid as NLPID but must not be used with ATM; use SNAP instead).'
