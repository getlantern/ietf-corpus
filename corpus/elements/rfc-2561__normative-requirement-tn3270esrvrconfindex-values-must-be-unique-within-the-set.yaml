document: rfc-2561
kind: normative-requirement
summary: tn3270eSrvrConfIndex values MUST be unique within the set of MIB objects returned by one SNMP agent, though they need not be contiguous. This allows a single SNMP agent to manage multiple TN3270E servers.
section: 3.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
