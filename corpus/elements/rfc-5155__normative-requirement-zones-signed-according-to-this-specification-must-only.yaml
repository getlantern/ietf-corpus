document: rfc-5155
kind: normative-requirement
summary: Zones signed according to this specification MUST only use algorithm identifiers 6 (DSA-NSEC3-SHA1) or 7 (RSASHA1-NSEC3-SHA1) for their DNSKEY RRs. Security-aware resolvers that know this spec MUST treat these identifiers as equivalent to the algorithms they alias.
section: "2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
