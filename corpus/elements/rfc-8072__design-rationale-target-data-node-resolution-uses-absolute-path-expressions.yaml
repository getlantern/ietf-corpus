document: rfc-8072
kind: design-rationale
summary: Target data node resolution uses absolute path expressions when the request URI identifies a datastore resource, and relative path expressions when it identifies a configuration data resource. This allows YANG Patch to operate at both the datastore level and within sub-trees.
section: "2.4"
