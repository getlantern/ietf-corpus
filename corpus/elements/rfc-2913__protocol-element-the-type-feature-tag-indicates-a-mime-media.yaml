document: rfc-2913
kind: protocol-element
summary: The 'type' feature tag indicates a MIME media content type appearing in a 'Content-type:' header of corresponding MIME-formatted data. Its value must be a string of the form "type/subtype" using only lower-case letters, with no content-type parameter values included.
