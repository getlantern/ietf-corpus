document: rfc-8669
kind: security-consideration
summary: The BGP Prefix-SID attribute is not protected by BGPsec signatures even when advertised using BGPsec as described in RFC 8205. Implementations must be aware that this attribute can be forged or modified by intermediate BGP speakers.
section: "9"
topics:
    - bgp
    - security
