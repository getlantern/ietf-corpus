document: rfc-4204
kind: protocol-element
summary: The LinkSummary message includes a TE_LINK object followed by one or more DATA_LINK objects. It is used to aggregate data links into a TE link, exchange and correlate TE link parameters, and exchange Interface_Ids. It carries negotiable and non-negotiable objects identified by the N flag.
