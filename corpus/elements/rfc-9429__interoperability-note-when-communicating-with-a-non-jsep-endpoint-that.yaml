document: rfc-9429
kind: interoperability-note
summary: When communicating with a non-JSEP endpoint that does not understand 'a=imageattr', any signaled video size limits may be exceeded. The JSEP implementation MUST handle this gracefully, e.g., by discarding the oversized video.
section: "3.6"
topics:
