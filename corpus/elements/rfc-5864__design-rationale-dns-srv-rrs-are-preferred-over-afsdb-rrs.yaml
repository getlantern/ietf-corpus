document: rfc-5864
kind: design-rationale
summary: DNS SRV RRs are preferred over AFSDB RRs because SRV RRs support priority and weight for server ranking, include protocol and port information (enabling future TCP support and non-standard ports), allow separation of VLDB and PTS servers, and are in widespread use whereas AFSDB RRs are little-known and little-supported.
section: "1"
topics:
