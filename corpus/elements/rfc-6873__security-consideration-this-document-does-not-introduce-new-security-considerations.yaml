document: rfc-6873
kind: security-consideration
summary: This document does not introduce new security considerations beyond those in RFC 6872. Sensitive information in SIP CLF files may need to be obfuscated for privacy when files are exchanged between domains. If a Base64 encoded string contains non-obfuscated values, those values must also be obfuscated before Base64 encoding.
section: "7"
topics:
    - sip
    - realtime
    - security
    - privacy
