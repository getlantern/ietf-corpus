document: rfc-8967
kind: normative-requirement
summary: If the received PC is smaller than or equal to the PC stored in the neighbour table, the packet MUST be dropped (no challenge is sent, since the mismatch may be caused by harmless packet reordering).
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - security
