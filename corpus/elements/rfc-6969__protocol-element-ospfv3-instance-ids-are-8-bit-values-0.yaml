document: rfc-6969
kind: protocol-element
summary: 'OSPFv3 Instance IDs are 8-bit values (0-255) mapped to address families. RFC 5838 originally defined: 0 (IPv6 unicast), 1-31 (IPv6 unicast policy-dependent), 32 (IPv6 multicast base), 33-63 (IPv6 multicast policy-dependent), 64 (IPv4 unicast base), 65-95 (IPv4 unicast policy-dependent), 96 (IPv4 multicast base), 97-127 (IPv4 multicast policy-dependent), and 128-255 (Unassigned).'
section: "1"
topics:
