document: rfc-4372
kind: security-consideration
summary: The CUI format used SHOULD NOT reveal the real user identity. Where a CUI is a reference to a real user identity, the binding lifetime SHOULD be kept as short as possible to limit the window during which the CUI could be used to identify the user.
section: "6"
topics:
