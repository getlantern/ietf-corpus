document: rfc-7159
kind: interoperability-note
summary: Implementations that compare strings by first converting to Unicode code unit sequences and performing numeric code-unit-by-code-unit comparison are interoperable; implementations that compare escaped and unescaped representations directly may incorrectly find strings unequal (e.g., "a\\b" vs "a\u005Cb").
section: "8.3"
topics:
    - json
