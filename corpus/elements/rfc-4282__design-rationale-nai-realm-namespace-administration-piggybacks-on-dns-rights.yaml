document: rfc-4282
kind: design-rationale
summary: 'NAI realm namespace administration piggybacks on DNS: rights to use an NAI realm for roaming are obtained coincident with acquiring the corresponding FQDN, avoiding the creation of a separate administrative procedure. Use of a realm without ownership of the corresponding FQDN is discouraged as it risks conflicts.'
section: "4"
topics:
