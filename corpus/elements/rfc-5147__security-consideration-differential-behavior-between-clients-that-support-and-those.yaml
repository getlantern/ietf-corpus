document: rfc-5147
kind: security-consideration
summary: Differential behavior between clients that support and those that do not support text/plain fragment identifiers can enable spoofing or phishing. An attacker could use a fragment identifier to display only a misleading portion of a document (e.g., hiding small-print legal text, or showing site-key-like material to fake legitimacy).
section: "7"
topics:
    - security
