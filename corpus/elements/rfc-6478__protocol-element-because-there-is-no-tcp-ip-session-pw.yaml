document: rfc-6478
kind: protocol-element
summary: Because there is no TCP/IP session, PW OAM messages must be sent repeatedly for reliability. A new status message is sent immediately, retried twice more at one-second intervals if unacknowledged within one second, and then periodically at the refresh timer interval. The suggested default refresh timer value is 600 seconds.
section: "5.3"
topics:
    - mpls
