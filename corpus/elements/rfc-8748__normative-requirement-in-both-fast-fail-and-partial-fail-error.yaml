document: rfc-8748
kind: normative-requirement
summary: In both fast-fail and partial-fail error scenarios for <check>, the server MUST set the <fee:cd> 'avail' attribute to false (0) and MUST process all objects in the client request. All failed <fee:command> elements MUST include a <fee:reason> element detailing the failure.
section: "3.9"
rfc2119_level: MUST
topics:
    - registry
