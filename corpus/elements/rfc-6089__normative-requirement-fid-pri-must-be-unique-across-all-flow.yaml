document: rfc-6089
kind: normative-requirement
summary: FID-PRI MUST be unique across all flow bindings pertaining to a given mobile node; two FIDs MUST NOT be associated with the same FID-PRI value. FID-PRI value 0 is reserved and MUST NOT be used.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - mobility
