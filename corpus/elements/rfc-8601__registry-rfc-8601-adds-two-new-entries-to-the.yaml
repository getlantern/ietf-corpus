document: rfc-8601
kind: registry
summary: 'RFC 8601 adds two new entries to the Email Authentication Methods registry: ''header.a'' (DKIM signature algorithm tag ''a'') and ''header.s'' (DKIM selector tag ''s''), both with method ''dkim'', ptype ''header'', status ''active'', version 1. These support post-verification processing, notably identifying deprecated rsa-sha1 signatures.'
section: "6.3"
topics:
