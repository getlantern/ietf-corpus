summary: The maximum source block size max_k is the minimum of a codec-imposed limit max2_k and max1_k = 2^^(16 - ceil(log2(1/CR))), derived from the 16-bit ESI field size. For CR in [1/2, 1), max1_k = 32,768 symbols.
