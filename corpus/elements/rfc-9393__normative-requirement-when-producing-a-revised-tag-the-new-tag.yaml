document: rfc-9393
kind: normative-requirement
summary: When producing a revised tag, the new tag-version value MUST be greater than the old tag-version value. This allows a tag producer to correct a previously released tag without changing the software component it describes.
section: "2.3"
rfc2119_level: MUST
topics:
