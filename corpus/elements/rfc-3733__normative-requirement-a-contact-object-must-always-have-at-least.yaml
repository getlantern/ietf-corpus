document: rfc-3733
kind: normative-requirement
summary: A contact object MUST always have at least one associated status value. Status values can be set only by the sponsoring client or the server, and a client MUST NOT alter status values set by the server.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
