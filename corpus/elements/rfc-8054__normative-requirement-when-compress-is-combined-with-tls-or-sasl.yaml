document: rfc-8054
kind: normative-requirement
summary: When COMPRESS is combined with TLS or SASL security layers, the processing order MUST be first COMPRESS, then SASL, and finally TLS. When receiving data, the processing order MUST be reversed.
section: 2.2.2
rfc2119_level: MUST
topics:
    - security
    - tls
