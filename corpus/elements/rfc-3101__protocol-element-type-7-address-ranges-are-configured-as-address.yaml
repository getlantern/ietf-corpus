document: rfc-3101
kind: protocol-element
summary: Type-7 address ranges are configured as [address, mask] pairs with a status of Advertise or DoNotAdvertise and an optional external route tag. Multiple Type-7 LSAs matching a range are aggregated into a single Type-5 LSA by the translating NSSA border router.
section: "2.2"
topics:
    - routing
