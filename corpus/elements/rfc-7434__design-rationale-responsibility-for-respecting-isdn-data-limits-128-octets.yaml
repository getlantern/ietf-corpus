document: rfc-7434
kind: design-rationale
summary: Responsibility for respecting ISDN data limits (128 octets plus protocol discriminator) is placed on the end UA rather than on the interworking point. If an interworking point receives UUI data that exceeds ISDN limits, it discards the UUI data silently but proceeds with the SIP-to-ISDN interworking of the call itself.
section: "6"
topics:
