document: rfc-7577
kind: protocol-element
summary: batteryIdentifier (SnmpAdminString, read-only) holds the manufacturer-assigned battery identifier tied to the physical battery. When multiple sub-identifiers exist (e.g., model number and serial number), they are concatenated with ':' as a separator, more significant value first.
