document: rfc-4998
kind: protocol-element
summary: CryptoInfos (optional in EvidenceRecord) is SEQUENCE SIZE(1..MAX) OF Attribute, storing validation-useful data such as trust anchors, certificates, revocation information, and cryptographic algorithm suitability declarations (e.g., 'RSA 1024-bit valid until 2008'). Data here is not protected by any timestamp and must be verified through external mechanisms.
section: "3.1"
topics:
    - crypto
    - pkix
    - security
