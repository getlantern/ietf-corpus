document: rfc-7573
kind: normative-requirement
summary: If an MSRP-to-XMPP gateway receives an MSRP message exceeding its configured size limit, it MUST return an MSRP 413 error, for example in response to the first SEND request whose Byte-Range header indicates a byte total exceeding the limit.
section: "8"
rfc2119_level: MUST
topics:
