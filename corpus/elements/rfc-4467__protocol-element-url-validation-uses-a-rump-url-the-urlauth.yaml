document: rfc-4467
kind: protocol-element
summary: URL validation uses a 'rump URL' (the URLAUTH URL with the ':<mech>:<token>' suffix stripped). If the mailbox cannot be identified, the server calculates an authorization token using random 'plausible' keys before returning a validation failure, to prevent timing attacks on mailbox name existence.
section: "6"
topics:
    - email
    - security
