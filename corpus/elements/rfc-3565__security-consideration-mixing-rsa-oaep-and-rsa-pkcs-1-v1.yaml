document: rfc-3565
kind: security-consideration
summary: Mixing RSA-OAEP and RSA PKCS#1 v1.5 to transport the same CEK is inadvisable because an attacker can exploit the Bleichenbacher attack against the PKCS#1 v1.5 encrypted key even if OAEP is also present.
section: "6"
topics:
