document: rfc-9856
kind: registry
summary: IANA allocated bit 4 in the 'Multicast Flags Extended Community' registry (introduced by RFC 9251) as the 'Single Flow Group' flag. This flag in an S-PMSI A-D route indicates the (*,G) or (S,G) entry is associated with an SFG.
