document: rfc-8913
kind: protocol-element
summary: The refwait leaf on the Session-Reflector (uint32, range 1..604800 seconds, default 900) defines the inactivity timeout after which the Session-Reflector MAY discontinue a test session that has received no packets, freeing resources on failure.
