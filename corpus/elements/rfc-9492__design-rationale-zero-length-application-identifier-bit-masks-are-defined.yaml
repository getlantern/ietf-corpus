document: rfc-9492
kind: design-rationale
summary: Zero-length Application Identifier Bit Masks are defined to allow link attributes to be used by any application, minimizing duplicate advertisements in common cases where multiple applications share the same attribute values. However, this creates ambiguity for applications like RSVP-TE that infer enablement from advertisement presence.
section: "12.2"
topics:
    - routing
