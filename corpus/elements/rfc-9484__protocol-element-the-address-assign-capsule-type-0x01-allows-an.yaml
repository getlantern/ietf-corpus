document: rfc-9484
kind: protocol-element
summary: The ADDRESS_ASSIGN capsule (type 0x01) allows an endpoint to assign its peer a list of IP addresses or prefixes. Every capsule contains the full list currently assigned; if a previously assigned address is absent, it is considered removed. Each Assigned Address entry contains Request ID (variable-length integer), IP Version (8-bit, 4 or 6), IP Address (32 or 128 bits), and IP Prefix Length (8-bit).
section: 4.7.1
topics:
    - http
    - ip
