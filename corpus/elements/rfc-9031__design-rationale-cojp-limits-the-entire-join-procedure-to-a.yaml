document: rfc-9031
kind: design-rationale
summary: CoJP limits the entire join procedure to a single CoAP request-response exchange because 6TiSCH nodes keep their radios off most of the time to conserve energy, giving the join link limited bandwidth. Reusing CoAP and OSCORE, which are already in the 6TiSCH stack, also minimizes code footprint on constrained microcontrollers.
section: "1"
