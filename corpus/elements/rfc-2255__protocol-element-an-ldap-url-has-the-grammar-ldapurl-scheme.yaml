document: rfc-2255
kind: protocol-element
summary: 'An LDAP URL has the grammar: ldapurl = scheme "://" [hostport] ["/" [dn ["?" [attributes] ["?" [scope] ["?" [filter] ["?" extensions]]]]]]. The scheme is "ldap", scope is "base" / "one" / "sub", and extensions is a comma-separated list of ["!"] extype ["=" exvalue] pairs.'
