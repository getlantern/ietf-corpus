document: rfc-5152
kind: normative-requirement
summary: If crankback is not allowed for an inter-area TE LSP or if the ABR is configured not to perform crankback, then the ABR MUST stop the signaling process and MUST forward a PathErr to the Head-end LSR without trying to select another ABR.
section: 4.1.1
rfc2119_level: MUST
topics:
    - realtime
    - routing
    - mpls
