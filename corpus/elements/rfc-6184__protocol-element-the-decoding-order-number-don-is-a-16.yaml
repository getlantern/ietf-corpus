document: rfc-6184
kind: protocol-element
summary: The Decoding Order Number (DON) is a 16-bit unsigned field (range 0–65535, wrapping modulo 65536) used in interleaved mode to signal NAL unit decoding order when transmission order differs. The don_diff(m,n) function uses modulo-65536 arithmetic to determine relative ordering; positive values mean n follows m in decoding order.
section: "5.5"
topics:
