document: rfc-5775
kind: security-consideration
summary: Attackers can inject forged packets with incorrect congestion control information into the multicast stream, potentially adversely affecting network elements and downstream receivers. Packet-level authentication (e.g., TESLA) is RECOMMENDED to protect against such attacks, though TESLA-based checks may only take effect several seconds after receipt.
section: "5"
topics:
    - security
    - congestion
    - multicast
