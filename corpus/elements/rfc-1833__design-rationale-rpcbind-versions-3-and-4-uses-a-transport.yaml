document: rfc-1833
kind: design-rationale
summary: RPCBIND (versions 3 and 4) uses a transport-independent universal address format (an ASCII string) rather than raw port numbers, enabling the binding protocol to work over any transport, not just TCP/UDP. The Port Mapper (version 2) is retained for backward compatibility but is limited to TCP and UDP.
