document: rfc-3060
kind: protocol-element
summary: PolicyCondition is an abstract class with no properties of its own, serving as a superclass for domain-specific condition subclasses. Each condition evaluates to TRUE or FALSE; conditions are combined via ConditionListType and the GroupNumber/ConditionNegated properties of the PolicyConditionInPolicyRule aggregation.
section: "6.4"
