summary: 'Four per-connection state variables control UTO operation: USER_TIMEOUT (RFC 793 parameter), ADV_UTO (value advertised to peer), ENABLED (Boolean, defaults false, controls sending and receiving), and CHANGEABLE (Boolean, defaults true, controls whether USER_TIMEOUT may be adapted from received UTO options).'
