document: rfc-8842
kind: normative-requirement
summary: When establishing a new DTLS association over an unordered transport (e.g., UDP), a new 3-tuple (transport/source address/source port) MUST be allocated by at least one endpoint so that DTLS packets for different associations can be demultiplexed.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
