document: rfc-2741
kind: protocol-element
summary: AgentX defines 18 PDU types split into administrative PDUs (Open/1, Close/2, Register/3, Unregister/4, Notify/12, Ping/13, IndexAllocate/14, IndexDeallocate/15, AddAgentCaps/16, RemoveAgentCaps/17) and SNMP-request processing PDUs (Get/5, GetNext/6, GetBulk/7, TestSet/8, CommitSet/9, UndoSet/10, CleanupSet/11, Response/18).
