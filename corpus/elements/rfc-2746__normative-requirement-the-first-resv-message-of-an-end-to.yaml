document: rfc-2746
kind: normative-requirement
summary: The first RESV message of an end-to-end session determines its mapping to a tunnel session; this mapping cannot change for the lifetime of the reservation. Rentry bases the mapping on some or all of the end-to-end PATH contents, the RESV flowspec, and local policy.
section: 4.2.4
rfc2119_level: MUST
topics:
    - qos
