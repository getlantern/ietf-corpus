document: rfc-1334
kind: security-consideration
summary: Each named user should be associated with exactly one authentication method to prevent downgrade attacks. If a user requires different methods under different circumstances, distinct user names SHOULD be employed rather than permitting negotiation of the least-secure method.
section: Security Considerations
topics:
    - security
