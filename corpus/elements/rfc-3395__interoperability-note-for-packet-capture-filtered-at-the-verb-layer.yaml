document: rfc-3395
kind: interoperability-note
summary: For packet capture filtered at the verb layer, the decision to include a packet may need to be deferred until the packet can be conclusively attributed to a verb. A probe may need to pre-buffer packets pending arrival of later packets that determine verb classification.
section: "4.2"
