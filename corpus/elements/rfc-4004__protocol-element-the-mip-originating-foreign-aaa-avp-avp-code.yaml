document: rfc-4004
kind: protocol-element
summary: The MIP-Originating-Foreign-AAA AVP (AVP Code 347, type Grouped) identifies the AAAF that issues the AMR; it contains Origin-Realm and Origin-Host sub-AVPs and MUST only be used when the home agent is or may be allocated in a foreign domain.
