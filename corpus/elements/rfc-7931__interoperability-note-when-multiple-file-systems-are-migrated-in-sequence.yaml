document: rfc-7931
kind: interoperability-note
summary: When multiple file systems are migrated in sequence to the same destination server, an owner may arrive at a destination where it already exists, requiring merger of owner sequence values. The resulting sequence value must be the greater of the two; neither prior reply record may be discarded until the client has demonstrably received it. Servers may decline to transfer such state rather than implement the merger logic.
section: 6.1.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
