document: rfc-4934
kind: normative-requirement
summary: Implementations of TLS often contain a weak cryptographic mode that SHOULD NOT be used to protect EPP; clients and servers desiring high security SHOULD instead use TLS with cryptographic algorithms less susceptible to compromise.
