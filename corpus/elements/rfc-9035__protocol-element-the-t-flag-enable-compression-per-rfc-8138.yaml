document: rfc-9035
kind: protocol-element
summary: The 'T' flag ('Enable Compression per RFC 8138') is defined at bit position 2 of the reserved flags in the RPL DODAG Configuration option. When set by the DODAG Root, it signals that RFC 8138 6LoWPAN Routing Header compression is enabled throughout the DODAG.
section: "3"
topics:
