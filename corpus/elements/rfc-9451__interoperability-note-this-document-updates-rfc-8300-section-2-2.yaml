document: rfc-9451
kind: interoperability-note
summary: This document updates RFC 8300 Section 2.2 by replacing the definition of the O bit. Implementations conforming to RFC 8300 that treat any NSH-encapsulated packet carrying OAM data as an OAM packet—regardless of whether user data is also present—are non-conformant with this update and may produce non-deterministic behavior at SFC data plane elements.
section: "3"
topics:
