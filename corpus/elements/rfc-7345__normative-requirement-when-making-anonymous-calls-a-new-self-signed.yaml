document: rfc-7345
kind: normative-requirement
summary: When making anonymous calls, a new self-signed certificate SHOULD be used for each call, and certificate attributes such as 'subjectAltName' and 'commonName' MUST NOT contain information that allows user correlation or identification.
section: "5.1"
rfc2119_level: MUST NOT
