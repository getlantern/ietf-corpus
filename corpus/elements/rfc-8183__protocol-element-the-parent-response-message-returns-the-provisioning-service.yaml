document: rfc-8183
kind: protocol-element
summary: The <parent_response/> message returns the provisioning service_uri, the parent's name for the child (child_handle), the parent's own handle (parent_handle), and the parent's self-signed BPKI CA certificate (<parent_bpki_ta/>). It may also include an <offer/> (direct publication service) or one or more <referral/> elements (third-party publication service).
section: 5.2.2
topics:
    - pkix
    - security
