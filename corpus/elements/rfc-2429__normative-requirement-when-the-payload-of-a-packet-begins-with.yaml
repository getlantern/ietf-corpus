document: rfc-2429
kind: normative-requirement
summary: When the payload of a packet begins with a Picture, GOB, Slice, EOS, or EOSBS start code, the first two all-zero bytes of the start code shall be removed and replaced by setting the P bit to 1 in the payload header.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
