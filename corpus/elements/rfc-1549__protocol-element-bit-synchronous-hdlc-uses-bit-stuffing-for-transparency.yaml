document: rfc-1549
kind: protocol-element
summary: 'Bit-synchronous HDLC uses bit stuffing for transparency: the transmitter inserts a ''0'' bit after every five consecutive ''1'' bits (including the last 5 bits of the FCS). The receiver discards any ''0'' bit that directly follows five contiguous ''1'' bits. The default sending and receiving ACCM is 0 (no octet stuffing).'
section: "5"
