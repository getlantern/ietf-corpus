document: rfc-7862
kind: protocol-element
summary: The NFS4ERR_UNION_NOTSUPP error code allows a server to signal that an operation is supported but the specific arm of a discriminated union in the request is not, enabling gradual adoption of new union arms without replacing entire operations.
