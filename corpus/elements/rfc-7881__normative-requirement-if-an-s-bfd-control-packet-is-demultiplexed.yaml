document: rfc-7881
kind: normative-requirement
summary: If an S-BFD Control packet is demultiplexed to an SBFDInitiator (destination port is not 7784), the packet MUST be looked up to locate a corresponding SBFDInitiator session based on Your Discriminator; the destination IP address SHOULD be validated to be for itself.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
