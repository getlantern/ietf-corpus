document: rfc-6186
kind: normative-requirement
summary: When using TLS (STARTTLS or direct TLS), MUAs SHOULD use TLS Server Name Indication (RFC 6066). Certificate verification MUST use the procedure outlined in Section 6 of RFC 6125 with respect to verification where an SRV RR is the starting point.
section: "4"
rfc2119_level: MUST
topics:
