document: rfc-7271
kind: normative-requirement
summary: If no PSC message is received on the protection path during at least 3.5 times the long PSC message interval (e.g., 17.5 seconds with default 5-second interval) and there is no defect on the protection path, the node MUST alert the operator and MUST NOT perform any protection switching until the defect is resolved.
section: "12"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
