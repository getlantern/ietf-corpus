document: rfc-9881
kind: wire-format
summary: 'ML-DSA public keys are encoded as raw byte strings (per FIPS 204 Algorithm 22) within the subjectPublicKey BIT STRING of SubjectPublicKeyInfo, with no ASN.1 wrapping. When appearing outside SubjectPublicKeyInfo, they may be encoded as typed OCTET STRINGs: ML-DSA-44-PublicKey (SIZE 1312), ML-DSA-65-PublicKey (SIZE 1952), ML-DSA-87-PublicKey (SIZE 2592).'
