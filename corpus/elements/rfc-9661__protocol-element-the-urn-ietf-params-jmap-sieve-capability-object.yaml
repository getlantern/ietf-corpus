document: rfc-9661
kind: protocol-element
summary: The urn:ietf:params:jmap:sieve capability object at the session level MUST include 'implementation' (String). At the account level it MUST include 'maxSizeScriptName', 'maxSizeScript', 'maxNumberScripts', 'maxNumberRedirects', 'sieveExtensions', 'notificationMethods', and 'externalLists'.
