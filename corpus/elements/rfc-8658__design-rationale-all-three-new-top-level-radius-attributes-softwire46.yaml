document: rfc-8658
kind: design-rationale
summary: All three new top-level RADIUS attributes (Softwire46-Configuration, Softwire46-Priority, Softwire46-Multicast) are allocated from the RADIUS 'Extended Type' code space per RFC 6929, as standard RADIUS type space (1–191) was not available. This follows RFC 6158 and RFC 8044 design guidelines.
