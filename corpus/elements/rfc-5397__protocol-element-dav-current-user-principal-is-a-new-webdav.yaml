document: rfc-5397
kind: protocol-element
summary: DAV:current-user-principal is a new WebDAV property that returns a URL to the principal resource corresponding to the currently authenticated user. Its value is either a DAV:href element containing an http(s) URL or a DAV:unauthenticated element when the user is not authenticated. The property is protected and computed on a per-request basis, so it is never copied or moved.
section: "3"
topics:
    - http
