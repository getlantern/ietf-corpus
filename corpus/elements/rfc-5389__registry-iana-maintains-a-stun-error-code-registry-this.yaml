document: rfc-5389
kind: registry
summary: 'IANA maintains a STUN Error Code Registry. This document defines: 300 (Try Alternate), 400 (Bad Request), 401 (Unauthorized), 420 (Unknown Attribute), 438 (Stale Nonce), and 500 (Server Error). New error codes in the 300–399 and 400–499 ranges require IETF review.'
