document: rfc-9484
kind: wire-format
summary: The IP Proxying HTTP Datagram Payload consists of a Context ID (variable-length integer) followed by a Payload field. Context ID 0 is reserved for full IP packets (from IP Version field through the last byte of IP payload). Unknown Context IDs SHALL be either silently dropped or briefly buffered awaiting registration.
section: "6"
topics:
