document: rfc-8766
kind: normative-requirement
summary: Multicast DNS NSEC records received on the local link MUST NOT be forwarded unmodified to a unicast querier, because mDNS NSEC records do not have the NSEC bit set in the Type Bit Map, whereas conventional Unicast DNS NSEC records do.
section: 5.5.3
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
