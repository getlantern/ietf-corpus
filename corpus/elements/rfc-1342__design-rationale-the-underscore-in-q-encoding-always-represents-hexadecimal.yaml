document: rfc-1342
kind: design-rationale
summary: The underscore '_' in 'Q' encoding always represents hexadecimal 20 (SPACE), chosen to greatly enhance readability of Q-encoded data on mail readers that do not support this encoding, even though it may not pass through some internetwork mail gateways.
section: The "Q" encoding
