document: rfc-5147
kind: protocol-element
summary: The 'char' scheme identifies a character position (single number) or character range (two comma-separated numbers) within a text/plain MIME entity. Character positions are zero-based, counting each character separately, with line endings always counted as one character regardless of byte representation.
section: 2.2.1
