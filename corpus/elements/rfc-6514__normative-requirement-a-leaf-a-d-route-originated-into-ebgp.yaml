document: rfc-6514
kind: normative-requirement
summary: A Leaf A-D route originated into EBGP by an ASBR MUST include the PMSI Tunnel attribute with Tunnel Type set to Ingress Replication and a routable ASBR address in the Tunnel Identifier, MUST carry a downstream-assigned MPLS label, and MUST carry the NO_ADVERTISE Community to constrain its distribution scope.
section: 9.2.3.2.1
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
