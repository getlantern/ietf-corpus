document: rfc-4780
kind: security-consideration
summary: The SIP MIB exposes configuration and statistics of SIP entities including organization names, transport protocols, port numbers, and registered user URIs (in sipServerRegUserTable). This information could be exploited by attackers for reconnaissance; network operators should restrict read access using SNMPv3 with authentication and privacy.
section: "9"
topics:
    - sip
    - snmp
    - security
    - privacy
