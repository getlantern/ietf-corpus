document: rfc-8669
kind: wire-format
summary: The Originator SRGB TLV (Type=3, Length=2+N*6) contains a 16-bit Flags field followed by one or more 6-octet SRGB entries, each encoding a 3-octet first label and 3-octet range count. Multiple SRGB ranges are concatenated to form the full SRGB.
