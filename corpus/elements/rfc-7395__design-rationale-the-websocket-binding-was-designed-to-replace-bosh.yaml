document: rfc-7395
kind: design-rationale
summary: The WebSocket binding was designed to replace BOSH (HTTP long-polling) for browser-based XMPP clients because BOSH suffers from high transport overhead and known issues with long polling. WebSocket provides bidirectional communication effectively emulating TCP at the application layer.
section: "1"
topics:
