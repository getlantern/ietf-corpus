document: rfc-9480
kind: security-consideration
summary: Implementations must generate nonces and private keys from cryptographically secure random input. If shared secret information is generated by a CSRNG, its entropy equals its bit length; for centrally generated key pair delivery, shared secret entropy SHOULD NOT be less than the security strength of the key pair. It is RECOMMENDED that low-entropy secrets (e.g., user passwords) be limited to a single PKI management operation.
section: "2.23"
topics:
    - crypto
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
