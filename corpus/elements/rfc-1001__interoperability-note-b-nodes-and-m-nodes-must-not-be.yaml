document: rfc-1001
kind: interoperability-note
summary: B nodes and M nodes must not be intermixed in an internet (routed) environment because B node broadcasts do not cross IP routers; doing so would allow undetected NetBIOS name conflicts between the broadcast domain and the routed internet, causing unpredictable behavior.
section: 12.2.2
topics:
    - ip
