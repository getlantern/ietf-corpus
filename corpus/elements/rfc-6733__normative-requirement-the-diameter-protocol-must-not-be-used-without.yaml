document: rfc-6733
kind: normative-requirement
summary: The Diameter protocol MUST NOT be used without one of TLS, DTLS, or IPsec. All Diameter base protocol implementations MUST support TLS/TCP and DTLS/SCTP. Connections between Diameter peers SHOULD be protected by TLS/TCP and DTLS/SCTP.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - diameter
    - tls
    - security
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
