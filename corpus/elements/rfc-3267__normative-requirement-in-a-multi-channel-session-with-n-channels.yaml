document: rfc-3267
kind: normative-requirement
summary: In a multi-channel session with N channels and K frame-blocks per packet in bandwidth-efficient mode, there MUST be N*K entries in the ToC; the first N entries are from frame-block 1, the next N from frame-block 2, and so on.
section: 4.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
