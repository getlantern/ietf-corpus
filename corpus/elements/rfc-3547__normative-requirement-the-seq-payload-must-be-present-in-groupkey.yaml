document: rfc-3547
kind: normative-requirement
summary: The SEQ payload MUST be present in GROUPKEY-PULL if the SA payload contains an SA KEK attribute; the member MUST check that the sequence number is greater than any previously received sequence number before installing new SAs.
section: "3.2"
