document: rfc-7374
kind: normative-requirement
summary: Before registering or performing a lookup, a peer MUST determine a starting level Lstart. It is RECOMMENDED that Lstart be set to 2 for the first operation; in subsequent lookups, nodes MAY use the mode of the last 16 lookup completion depths as an optimization.
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
