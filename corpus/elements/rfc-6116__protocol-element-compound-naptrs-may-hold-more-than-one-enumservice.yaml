document: rfc-6116
kind: protocol-element
summary: Compound NAPTRs may hold more than one Enumservice in a single record (e.g., 'E2U+voice:tel+sms:tel'), sharing the same Regexp field and generating the same URI. These are treated as logically separate NAPTRs with left-to-right priority ordering.
section: 3.4.3.2
