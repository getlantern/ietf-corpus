document: rfc-4012
kind: protocol-element
summary: The Address Family Identifier (<afi>) is a new dictionary attribute introduced as an optional element within mp- attributes. Valid values include ipv4.unicast, ipv4.multicast, ipv4, ipv6.unicast, ipv6.multicast, ipv6, any, any.unicast, and any.multicast.
