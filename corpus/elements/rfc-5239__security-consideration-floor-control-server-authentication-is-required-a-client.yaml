document: rfc-5239
kind: security-consideration
summary: 'Floor control server authentication is required: a client must authenticate the floor control server before issuing floor requests, to prevent rogue servers from granting unauthorized floor access. Authentication mechanisms are specified in the BFCP specification (RFC 4582).'
section: "11.3"
topics:
