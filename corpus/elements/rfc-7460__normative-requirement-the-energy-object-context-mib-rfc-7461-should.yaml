document: rfc-7460
kind: normative-requirement
summary: The ENERGY-OBJECT-CONTEXT-MIB (RFC 7461) SHOULD be implemented as a prerequisite for this MIB module, since the eoPowerTable is a sparse extension of the eoTable in that module. The NMS must first poll the ENERGY-OBJECT-CONTEXT-MIB to discover all Energy Objects and their relationships.
section: "8"
rfc2119_level: SHOULD
