document: rfc-7515
kind: protocol-element
summary: The Flattened JWS JSON Serialization is a single-signature variant of the General JWS JSON Serialization that elevates 'protected', 'header', and 'signature' to the top-level JSON object alongside 'payload'. The 'signatures' member MUST NOT be present.
