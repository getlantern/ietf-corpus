document: rfc-6680
kind: security-consideration
summary: Asserted (non-authenticated) attributes MUST NOT be used for security-sensitive purposes such as authorization decisions, because asserted attributes may be controlled directly by the peer. Only authenticated attributes — those with a secure association to a trusted credential source — are appropriate for such uses.
section: "9"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
