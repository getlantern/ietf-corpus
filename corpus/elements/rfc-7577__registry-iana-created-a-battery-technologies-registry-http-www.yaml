document: rfc-7577
kind: registry
summary: IANA created a Battery Technologies registry (http://www.iana.org/assignments/battery-technologies) seeded with 20 technologies (values 0–20, including lead-acid, lithium-ion, nickel-cadmium, etc.; values 21–4294967295 unassigned). New assignments require Expert Review; technologies must be in commercial use and relevant to standardized Internet battery monitoring.
