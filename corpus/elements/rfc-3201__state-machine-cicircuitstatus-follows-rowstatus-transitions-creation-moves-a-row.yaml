document: rfc-3201
kind: state-machine
summary: ciCircuitStatus follows RowStatus transitions. Creation moves a row to notInService or notReady; setting active(1) triggers ifEntry and ciIfMapEntry creation. Setting destroy(6) or loss of the referenced circuit object triggers row deletion and cascading ifTable/ciIfMapTable removal.
