document: rfc-7239
kind: protocol-element
summary: The "by" parameter identifies the proxy's user-agent-facing interface (i.e., the interface on which the request arrived). Its syntax conforms to the node ABNF. It is primarily added by reverse proxies wishing to pass interface information to backend servers.
section: "5.1"
topics:
