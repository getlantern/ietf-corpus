document: rfc-8049
kind: protocol-element
summary: Access diversity constraints are specified via a 'groups' container (assigning site-network-accesses to named groups) and a 'constraints' list (specifying a constraint-type identity such as 'pop', 'pe', or 'linecard' and a target referencing another group, all other accesses, or all other groups). This drives multihoming placement without prescribing the SP's internal mechanism.
section: 6.6.4
topics:
    - yang
    - vpn
    - multipath
