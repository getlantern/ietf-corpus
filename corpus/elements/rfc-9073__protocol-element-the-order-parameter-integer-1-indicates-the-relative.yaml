document: rfc-9073
kind: protocol-element
summary: The ORDER parameter (integer >= 1) indicates the relative ordering of multiple instances of the same property. When absent, the property instance is treated as ordered last. It MUST NOT be applied to properties that do not allow multiple instances.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
