document: rfc-2298
kind: security-consideration
summary: MDNs cannot be relied upon as non-repudiation evidence. They may be lost in transit, actively forged, or the MDN issuance mechanism may be bypassed by the recipient. MDNs provide useful information but do not guarantee a message was or was not seen.
section: "6.3"
topics:
    - email
    - security
