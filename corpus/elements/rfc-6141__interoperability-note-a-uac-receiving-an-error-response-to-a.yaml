document: rfc-6141
kind: interoperability-note
summary: A UAC receiving an error response to a re-INVITE that undoes already executed changes may be facing a legacy UAS that does not implement RFC 6141. The UAC should treat this the same as a race condition and issue a synchronizing re-INVITE or UPDATE.
section: "3.4"
topics:
    - sip
    - realtime
