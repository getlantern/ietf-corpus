document: rfc-9085
kind: design-rationale
summary: Semantic and content checking of BGP-LS SR TLVs is deliberately left to the consumer (e.g., an SR PCE or controller) rather than to the BGP protocol itself. The BGP-LS protocol only performs syntactic validation; a malformed BGP-LS Attribute results in it being discarded with an error log.
section: "4"
topics:
