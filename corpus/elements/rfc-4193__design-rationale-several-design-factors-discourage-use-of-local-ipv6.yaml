document: rfc-4193
kind: design-rationale
summary: 'Several design factors discourage use of Local IPv6 addresses as arbitrary global unicast: default filtering rules at site borders, lack of public registration and uniqueness guarantee, non-aggregatable random allocation, and the /48 prefix being too long for exclusive use by the largest organizations.'
section: "5.2"
