document: rfc-9345
kind: normative-requirement
summary: When a (D)TLS version negotiated is less than 1.3, the client MUST ignore the delegated_credential extension in CertificateRequest. Delegated credentials are only permitted in (D)TLS 1.3 or later.
section: 4.1.2
rfc2119_level: MUST
topics:
    - tls
