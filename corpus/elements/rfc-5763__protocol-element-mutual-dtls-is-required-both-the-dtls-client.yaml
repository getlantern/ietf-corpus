document: rfc-5763
kind: protocol-element
summary: 'Mutual DTLS is required: both the DTLS client and server present certificates, even if one or both are self-signed. Certificates serve purely as a carrier for public keys; their validity is established through the SDP fingerprint, not a PKI chain.'
