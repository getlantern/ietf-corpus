document: rfc-3042
kind: design-rationale
summary: Limited Transmit is designed to enable Fast Retransmit (which requires three duplicate ACKs) in situations where the congestion window is too small to generate three duplicate ACKs naturally. With cwnd of three segments and one drop, only two duplicate ACKs arrive, forcing an RTO without this mechanism.
section: "1"
topics:
