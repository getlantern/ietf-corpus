document: rfc-9007
kind: protocol-element
summary: 'The Disposition object embedded in MDN has three required string properties: actionMode (''manual-action'' or ''automatic-action''), sendingMode (''mdn-sent-manually'' or ''mdn-sent-automatically''), and type (''deleted'', ''dispatched'', ''displayed'', or ''processed''). These correspond to RFC 8098 disposition fields.'
