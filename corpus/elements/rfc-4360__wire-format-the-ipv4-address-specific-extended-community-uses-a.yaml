document: rfc-4360
kind: wire-format
summary: The IPv4 Address Specific Extended Community uses a 2-octet Type Field (high-order octet 0x01 or 0x41, low-order octet is sub-type) and a 6-octet Value Field split into a 4-octet Global Administrator sub-field (an IPv4 unicast address) and a 2-octet Local Administrator sub-field.
