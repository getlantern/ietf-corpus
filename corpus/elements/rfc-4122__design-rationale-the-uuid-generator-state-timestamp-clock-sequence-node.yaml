document: rfc-4122
kind: design-rationale
summary: The UUID generator state (timestamp, clock sequence, node ID) does not need to be written to stable storage on every UUID generation. Instead, the stable store timestamp can be periodically set to a future value; as long as generated UUIDs use timestamps less than that value, only the volatile shared copy needs updating.
section: 4.2.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
