document: rfc-4836
kind: protocol-element
summary: The ifMauAutoNegTable provides auto-negotiation configuration and status indexed by {ifMauIfIndex, ifMauIndex}. Key objects include ifMauAutoNegAdminStatus (enabled/disabled, read-write), ifMauAutoNegRemoteSignaling (detected/notdetected), ifMauAutoNegCapabilityBits (local caps), ifMauAutoNegCapAdvertisedBits (advertised caps, read-write), ifMauAutoNegCapReceivedBits (remote caps), ifMauAutoNegRestart, and remote fault advertised/received objects for 1000 Mbps MAUs.
section: "4"
topics:
