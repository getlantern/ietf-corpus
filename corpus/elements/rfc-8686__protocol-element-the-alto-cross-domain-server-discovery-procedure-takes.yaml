document: rfc-8686
kind: protocol-element
summary: 'The ALTO Cross-Domain Server Discovery Procedure takes two parameters: X (an IPv4 or IPv6 address or prefix in CIDR notation) and SP (a U-NAPTR Service Parameter, typically ''ALTO:https''). It returns one or more ALTO IRD URIs with order and preference values.'
