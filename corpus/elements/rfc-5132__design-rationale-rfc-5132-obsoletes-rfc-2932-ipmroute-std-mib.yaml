document: rfc-5132
kind: design-rationale
summary: RFC 5132 obsoletes RFC 2932 (IPMROUTE-STD-MIB) because the earlier MIB supported only IPv4, assumed at most one multicast routing protocol per interface, and was restricted to multicast routing. The new MIB adds IPv6/scoped-address support, allows multiple protocols per interface (now per-route via ipMcastRouteProtocol), and covers non-routing multicast function.
section: "2"
topics:
    - multicast
    - snmp
