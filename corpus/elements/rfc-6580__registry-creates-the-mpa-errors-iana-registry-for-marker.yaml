document: rfc-6580
kind: registry
summary: Creates the 'MPA Errors' IANA registry for Marker PDU Aligned Framing errors. The 16-bit error field uses a 4-bit Layer (always 0x2), 4-bit Error Type, and 8-bit Error Code; every entry must have a numeric Error Code and Error Code Name. Allocation policy is Standards Action.
section: "3.3"
topics:
    - registry
