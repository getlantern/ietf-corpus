document: rfc-3812
kind: protocol-element
summary: 'mplsTunnelResourceTable specifies the traffic parameters for a tunnel: maximum rate, mean rate, maximum burst size, mean burst size, excess burst size, frequency (unspecified/frequent/veryFrequent), and weight. Multiple tunnels may share a single resource entry by pointing to the same mplsTunnelResourceIndex.'
