document: rfc-3339
kind: interoperability-note
summary: The 'T' separator between date and full-time, and the 'Z' UTC indicator, may be lower case ('t' or 'z') per ABNF and ISO 8601. However, specifications operating in case-sensitive environments (e.g., XML) MAY further restrict the syntax to require upper case.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
