document: rfc-5725
kind: security-consideration
summary: An attacker may inject incorrect information in Pre-repair or Post-repair Loss RLE reports to influence proactive or reactive decisions made by the sender in the repair process. Sender applications should be aware of this risk and take precautions to minimize or eliminate such attacks.
section: "5"
topics:
    - rtp
    - realtime
    - security
