document: rfc-9108
kind: normative-requirement
summary: Classes and types of DNS resource records MUST NOT be directly added to the 'iana-dns-class-rr-type' YANG module; they MUST instead be added to the 'DNS CLASSes' and 'Resource Record (RR) TYPEs' IANA registries respectively, which then trigger module updates.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
    - yang
    - registry
