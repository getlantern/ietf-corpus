document: rfc-9746
kind: normative-requirement
summary: An SHT different than 00 MUST NOT be set if the 'Single-Active' bit is set. A received A-D per ES route where both the 'Single-Active' and SHT bits are non-zero MUST follow the treat-as-withdraw behavior in RFC 7606.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
