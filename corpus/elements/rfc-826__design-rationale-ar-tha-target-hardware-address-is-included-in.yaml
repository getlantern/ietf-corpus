document: rfc-826
kind: design-rationale
summary: ar$tha (target hardware address) is included in request packets for completeness, network monitoring, and to allow implementations without direct access to the 14-byte Ethernet header to pass this field directly to the hardware driver as the destination address of the reply.
section: Why is it done this way??
