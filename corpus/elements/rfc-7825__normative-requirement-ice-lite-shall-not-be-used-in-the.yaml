document: rfc-7825
kind: normative-requirement
summary: ICE-Lite SHALL NOT be used in the context of RTSP. ICE-Lite is insufficient because it does not cause the media server to send a connectivity check, which is required to protect against the RTSP server being used as a denial-of-service tool.
section: 5.1.1
rfc2119_level: SHALL NOT
topics:
    - nat
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
