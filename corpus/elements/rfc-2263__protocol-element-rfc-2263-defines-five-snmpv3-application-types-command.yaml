document: rfc-2263
kind: protocol-element
summary: 'RFC 2263 defines five SNMPv3 application types: Command Generators (initiate Get/Set requests), Command Responders (process incoming requests), Notification Originators (generate Trap/Inform messages), Notification Receivers (receive notifications), and Proxy Forwarders (forward requests and notifications between SNMP engines). Multiple application types may coexist in a single SNMP engine.'
