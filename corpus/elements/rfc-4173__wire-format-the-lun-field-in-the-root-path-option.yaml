document: rfc-4173
kind: wire-format
summary: The LUN field in the Root Path option is a hexadecimal representation divided into four groups of four hex digits separated by '-' (e.g., '4752-3A4F-6b7e-2F99'). At most three leading zero digits MAY be omitted per group; trailing all-zero groups MAY be omitted with the preceding '-'. Other concise representations MUST NOT be used.
section: "5"
topics:
