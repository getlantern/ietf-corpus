document: rfc-2332
kind: normative-requirement
summary: When a station receives an NHRP Purge Request it MUST discard all cached information matching the CIEs. An NHRP Purge Reply MUST be returned to the requester whenever the N bit is clear, even if no matching cache entry exists.
section: 5.2.5
rfc2119_level: MUST
topics:
    - ip
