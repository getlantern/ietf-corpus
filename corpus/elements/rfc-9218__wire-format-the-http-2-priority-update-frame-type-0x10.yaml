document: rfc-9218
kind: wire-format
summary: 'The HTTP/2 PRIORITY_UPDATE frame (type=0x10) contains: a 24-bit Length, 8-bit Type, 8 unused flag bits, 1 reserved bit + 31-bit Stream Identifier (must be 0x0), 1 reserved bit + 31-bit Prioritized Stream ID, and a variable-length Priority Field Value in ASCII Structured Fields encoding.'
