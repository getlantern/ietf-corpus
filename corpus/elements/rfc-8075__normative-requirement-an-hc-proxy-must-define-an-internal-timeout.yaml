document: rfc-8075
kind: normative-requirement
summary: An HC Proxy MUST define an internal timeout for each pending CoAP request. For confirmable requests, the timeout T SHOULD be T = MAX_RTT + MAX_SERVER_RESPONSE_DELAY; if MAX_SERVER_RESPONSE_DELAY is unknown, a default of 250 seconds MAY be used.
section: "8.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
