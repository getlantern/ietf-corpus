document: rfc-7179
kind: normative-requirement
summary: An RBridge SHOULD NOT set a critical extended flag in a frame unless it has determined that the RBridges that will receive and process the frame (next-hop for hop-by-hop, egress for ingress-to-egress, or the applicable class for reserved) support that flag.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
