document: rfc-6735
kind: design-rationale
summary: The 3GPP-defined priority AVPs (Reservation-Priority, Priority-Level, Session-Priority) are aimed at IMS deployment environments and are considered private implementations within a walled garden. The priority AVPs defined in this RFC are explicitly not constrained to IMS environments.
