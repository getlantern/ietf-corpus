document: rfc-7117
kind: protocol-element
summary: The PMSI (Provider Multicast Service Interface) Tunnel attribute [RFC6514], carried in BGP VPLS A-D routes, encodes the tunnel type (LDP P2MP LSP or RSVP-TE P2MP LSP), the tunnel identifier, an optional upstream-assigned MPLS label, and a Leaf Information Required flag for explicit tracking.
