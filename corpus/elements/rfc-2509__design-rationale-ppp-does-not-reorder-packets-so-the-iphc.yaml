document: rfc-2509
kind: design-rationale
summary: PPP does not reorder packets, so the IPHC mechanisms that allow reordering links are disabled by default. This simplifies deployment on PPP links while the mechanisms remain available for use with multiclass multilink PPP.
section: "1"
