document: rfc-8012
kind: normative-requirement
summary: The initiating LSR MUST set EL_LSP=True when it pushes ELI/EL and MUST use Multipath Information Type {10} (unless the responder cannot handle it) when EL_LSP is True. When sending Type {10} with EL_LSP=True, both IP and Label Multipath Information MUST be included and Associated Label Multipath Information MUST be omitted.
section: "7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
