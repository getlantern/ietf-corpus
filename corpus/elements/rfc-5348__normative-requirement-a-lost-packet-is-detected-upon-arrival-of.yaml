document: rfc-5348
kind: normative-requirement
summary: A lost packet is detected upon arrival of at least NDUPACK=3 packets with higher sequence numbers, mirroring TCP behavior for robustness against reordering. Unlike TCP, a late-arriving packet in TFRC can still fill the hole and cause recalculation of the loss event rate.
section: "5.1"
rfc2119_level: REQUIRED
topics:
    - congestion
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
