document: rfc-2381
kind: normative-requirement
summary: The IS break bit <1,2> MUST be left unmodified by IS-aware implementations. The GS and CLS service-specific break bits <2,2> and <5,2> MUST be set if the corresponding ATM service category does not adequately support the service; corresponding hop counters MUST be incremented if not set.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
