document: rfc-3402
kind: normative-requirement
summary: The result of applying a substitution expression to the Application Unique String MUST produce a key conforming to the Database's rules (unless it is a Terminal Rule). Client software SHOULD verify that the result is a legal database key before using it.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - dns
