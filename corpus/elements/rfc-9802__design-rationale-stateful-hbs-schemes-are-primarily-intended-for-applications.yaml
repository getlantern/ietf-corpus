document: rfc-9802
kind: design-rationale
summary: 'Stateful HBS schemes are primarily intended for applications that: (1) must deploy a digital signature scheme in the near future, (2) will have a long implementation lifetime, and (3) cannot practically transition to a different scheme once deployed. Appropriate use cases include firmware signing, software signing, and CA certificates, where operators tightly control the signing environment.'
section: "3"
