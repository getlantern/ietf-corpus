document: rfc-8500
kind: protocol-element
summary: The W bit (0x01) in the Flags field is used only on multi-access LANs. When set and sent from a non-DIS to the DIS, it signals the DIS to add the received Metric value to all nodes' Default Metrics in the Pseudonode LSP. When clear, the DIS adjusts only the originating node's metric.
section: "2"
topics:
