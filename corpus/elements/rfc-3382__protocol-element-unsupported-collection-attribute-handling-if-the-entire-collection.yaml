document: rfc-3382
kind: protocol-element
summary: 'Unsupported collection attribute handling: if the entire collection attribute is unsupported, the Printer returns just the collection attribute name with the ''unsupported'' out-of-band value. If a collection contains unrecognized or unsupported member attributes, the Printer returns a collection in the Unsupported Group containing those unrecognized/unsupported member attributes with their unsupported values.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
