document: rfc-2238
kind: design-rationale
summary: The HPR MIB deliberately omits configuration of HPR nodes, protocol-specific uses of HPR (such as APPN), and traps. Traps for Alert conditions affecting HPR resources are instead defined in the APPN MIB, which may reference HPR MIB objects via VariablePointer in the affectedObject.
