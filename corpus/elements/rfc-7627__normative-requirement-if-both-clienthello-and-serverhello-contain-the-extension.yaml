document: rfc-7627
kind: normative-requirement
summary: If both ClientHello and ServerHello contain the extension and a full handshake takes place, both client and server MUST use the extended master secret derivation algorithm defined in Section 4; all other cryptographic computations remain unchanged.
section: "5.1"
rfc2119_level: MUST
