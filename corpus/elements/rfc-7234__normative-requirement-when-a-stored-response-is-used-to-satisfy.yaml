document: rfc-7234
kind: normative-requirement
summary: When a stored response is used to satisfy a request without validation, a cache MUST generate an Age header field equal to current_age. A cache MUST write through requests with unsafe methods to the origin server and MUST NOT generate a reply before forwarding the request and receiving a corresponding response.
section: "4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
