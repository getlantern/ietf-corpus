document: rfc-3788
kind: design-rationale
summary: IPsec is considerably less flexible than TLS for configuring trust anchors in peer-to-peer scenarios because IKE Phase 1 prohibits port identifiers, making it impossible to configure per-application trust anchors; a trust anchor trusted for SIGTRAN must also be trusted for other protocols such as SNMP.
section: "8"
topics:
