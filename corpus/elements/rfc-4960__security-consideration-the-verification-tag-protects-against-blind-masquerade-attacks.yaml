document: rfc-4960
kind: security-consideration
summary: The Verification Tag protects against blind masquerade attacks and stale packets from previous associations. Packets without the expected Verification Tag are silently discarded; a randomly chosen tag makes it computationally infeasible for an off-path attacker to inject valid packets.
section: 11.2.4.2
topics:
    - sctp
    - security
