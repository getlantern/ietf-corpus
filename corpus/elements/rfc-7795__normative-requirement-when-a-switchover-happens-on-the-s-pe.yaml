document: rfc-7795
kind: normative-requirement
summary: When a switchover happens on the S-PE, if the S-PE supports SP-PE TLV processing as defined in RFC 6073, it SHOULD advertise the updated SP-PE TLVs by sending a Label Mapping message to the T-PEs.
