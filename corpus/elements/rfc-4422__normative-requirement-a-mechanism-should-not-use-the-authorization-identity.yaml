document: rfc-4422
kind: normative-requirement
summary: A mechanism SHOULD NOT use the authorization identity string in generation of any long-term cryptographic keys or hashes, because different clients may provide semantically equivalent but textually different authorization identity strings, causing interoperability failures.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - security
    - crypto
