document: rfc-8727
kind: wire-format
summary: A minimal valid IODEF JSON document requires 'version' (string '2.0'), 'lang', at least one 'Incident' containing 'purpose', 'IncidentID' (with 'id' and 'name'), 'GenerationTime', and at least one 'Contact'. The CBOR encoding of this minimal document uses CBOR map/array structures with the defined mapkeys.
