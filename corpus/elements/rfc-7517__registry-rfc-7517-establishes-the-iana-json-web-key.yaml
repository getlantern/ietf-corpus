document: rfc-7517
kind: registry
summary: RFC 7517 establishes the IANA "JSON Web Key Set Parameters" registry for JWK Set parameter names. The initial entry is "keys" (Array of JWK Values). It also registers the "application/jwk+json" and "application/jwk-set+json" media types.
