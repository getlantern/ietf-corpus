document: rfc-6584
kind: normative-requirement
summary: Each packet sent MUST contain exactly one Digital Signature EXT_AUTH header extension. A receiver MUST drop all packets that do not contain the expected Digital Signature EXT_AUTH header extension.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
    - multicast
