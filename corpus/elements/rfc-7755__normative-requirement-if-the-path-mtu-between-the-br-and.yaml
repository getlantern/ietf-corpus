document: rfc-7755
kind: normative-requirement
summary: If the path MTU between the BR and IPv6 nodes is increased to 1520 bytes, the MTU on IPv6 nodes themselves SHOULD NOT be increased accordingly, as doing so would trigger Path MTU Discovery toward all IPv6 Internet destinations. Nodes MUST, however, be able to accept and process incoming packets larger than their own MTU.
section: 4.9.1
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
