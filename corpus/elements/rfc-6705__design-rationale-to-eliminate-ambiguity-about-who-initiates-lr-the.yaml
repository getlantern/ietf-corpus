document: rfc-6705
kind: design-rationale
summary: 'To eliminate ambiguity about who initiates LR, the protocol assigns initiation responsibility based on topology: the LMA initiates when it anchors both MNs (same-LMA scenarios), while the MAG initiates only when both MNs are attached to it but anchored at different LMAs. This ensures exactly one entity initiates per scenario.'
