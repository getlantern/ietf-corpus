document: rfc-3413
kind: protocol-element
summary: 'Five types of SNMP applications are defined: Command Generators (initiate Read/Write-Class requests), Command Responders (respond to Read/Write-Class requests), Notification Originators (generate Notification-Class PDUs), Notification Receivers (receive Notification-Class PDUs), and Proxy Forwarders (forward SNMP messages irrespective of managed object types).'
