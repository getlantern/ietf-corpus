document: rfc-7145
kind: design-rationale
summary: The iSER layer is intentionally oblivious to the iSCSI session concept and maintains minimal per-connection state, to permit implementation on generic RDMA-Capable Controllers without requiring iSCSI- or iSER-specific hardware assists in the RNIC.
section: "1.3"
