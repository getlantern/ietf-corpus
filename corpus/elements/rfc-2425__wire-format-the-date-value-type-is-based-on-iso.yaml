document: rfc-2425
kind: wire-format
summary: 'The ''date'' value type is based on ISO 8601: YYYY[-MM[-DD]]. The ''time'' type is HH[:MM[:SS[,frac][Z|±HH[:MM]]]. The ''date-time'' type combines these with a ''T'' separator. Multiple values can be comma-separated unless restricted by a profile.'
