document: rfc-8663
kind: normative-requirement
summary: If SR-MPLS-capable routers A and E are in different routing domains, the Prefix-SID advertisement and tunnel encapsulation information MUST be flooded into both domains so that router A knows the characteristics of router E.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
