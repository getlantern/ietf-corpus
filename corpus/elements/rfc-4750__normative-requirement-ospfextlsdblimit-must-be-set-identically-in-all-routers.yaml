document: rfc-4750
kind: normative-requirement
summary: ospfExtLsdbLimit MUST be set identically in all routers attached to the OSPF backbone and any regular OSPF area. Stub areas and NSSAs are excluded from this requirement. When the non-default AS-external LSA count reaches this limit, the router enters overflow state.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - snmp
