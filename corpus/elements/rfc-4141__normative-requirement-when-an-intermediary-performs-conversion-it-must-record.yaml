document: rfc-4141
kind: normative-requirement
summary: When an intermediary performs conversion, it MUST record details of the previous representation in a Content-Previous header field and MUST create or revise the Content-Features header field for that MIME body-part to reflect the conversion result.
section: "8"
rfc2119_level: MUST
