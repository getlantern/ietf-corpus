document: rfc-2848
kind: design-rationale
summary: The SDP origin-field (global-session-id) rather than the SIP Call-ID is used as the canonical identifier for monitoring sessions, because a SUBSCRIBE from a third party (not the original requestor) constitutes a new SIP call leg and would not share the original Call-ID.
section: 3.5.3.1
topics:
