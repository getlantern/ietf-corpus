document: rfc-7679
kind: privacy-consideration
summary: Active measurement techniques reduce exposure of sensitive user information compared to passive observation; passive observation of user traffic raises significant privacy issues. Measurement results or systems should be protected against access for reconnaissance purposes in support of subsequent system attacks.
section: "6"
topics:
    - measurement
    - privacy
    - security
