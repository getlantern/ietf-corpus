document: rfc-4776
kind: normative-requirement
summary: The GEOCONF_CIVIC option SHOULD be returned by DHCPv4 servers only when the DHCPv4 client has included this option in its 'parameter request list'. Similarly, OPTION_GEOCONF_CIVIC SHOULD be returned by DHCPv6 servers only when included in the client's OPTION_ORO.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
