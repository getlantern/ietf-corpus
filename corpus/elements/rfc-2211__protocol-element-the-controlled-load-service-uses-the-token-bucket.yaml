summary: The controlled-load service uses the TOKEN_BUCKET_TSPEC (general parameter number 127, per RFC 2215) to describe flow traffic parameters. It contains bucket rate r, bucket depth b, peak rate p, minimum policed unit m, and maximum packet size M. The service is assigned service_name 5.
