document: rfc-2931
kind: wire-format
summary: 'For a transaction SIG(0) on a response, the signed data is: RDATA (omitting signature) concatenated with the full DNS query message and the full DNS response message, both including DNS headers but not UDP/IP headers. Formula: data = RDATA | full query | response - SIG(0).'
section: "3.1"
topics:
    - dns
    - security
    - crypto
