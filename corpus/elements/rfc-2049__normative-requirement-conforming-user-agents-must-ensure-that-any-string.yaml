document: rfc-2049
kind: normative-requirement
summary: Conforming user agents must ensure that any string within a '*text' or '*ctext' that begins with '=?' and ends with '?=' is a valid encoded-word. Similarly, any 'word' within a 'phrase' matching that pattern must be a valid encoded-word.
section: "2"
rfc2119_level: MUST
