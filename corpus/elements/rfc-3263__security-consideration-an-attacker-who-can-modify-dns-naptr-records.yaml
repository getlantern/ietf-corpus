document: rfc-3263
kind: security-consideration
summary: 'An attacker who can modify DNS NAPTR records could cause a client to use a non-secure transport even when TLS is available and preferred, constituting a bid-down attack. The SIPS URI scheme partially mitigates this: a sips URI always requires TLS regardless of DNS records.'
section: "7"
topics:
    - sip
    - dns
    - security
