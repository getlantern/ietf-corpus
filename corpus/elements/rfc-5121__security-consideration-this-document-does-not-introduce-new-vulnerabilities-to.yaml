document: rfc-5121
kind: security-consideration
summary: This document does not introduce new vulnerabilities to IPv6 operation. The 802.16 air interface provides traffic encryption using a Traffic Encryption Key (TEK) generated by the MS and BS on successful authentication. IPv6 security mechanisms (e.g., IPsec) may be used in addition to 802.16 link-layer security.
section: "11"
topics:
    - security
    - ip
    - v6ops
