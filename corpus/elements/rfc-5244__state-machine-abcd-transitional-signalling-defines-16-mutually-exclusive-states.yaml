document: rfc-5244
kind: state-machine
summary: ABCD transitional signalling defines 16 mutually exclusive states (event codes 144–159). On a state transition, the same ABCD information is sent 3 times at 5 ms intervals (triple-redundancy per ITU-T I.366.2 Annex L); if no change occurs, ABCD information is then sent every 5 seconds as a keepalive.
section: "2.4"
topics:
    - realtime
    - rtp
