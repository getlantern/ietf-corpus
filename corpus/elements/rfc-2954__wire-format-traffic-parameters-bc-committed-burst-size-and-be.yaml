document: rfc-2954
kind: wire-format
summary: Traffic parameters Bc (Committed Burst Size) and Be (Excess Burst Size) are encoded in bits (Integer32, 1..2147483647) in the MIB objects frPVCEndptInBc, frPVCEndptInBe, frPVCEndptOutBc, frPVCEndptOutBe, whereas the Q.933 Link Layer Core Parameters Information Element encodes these values in octets. CIR is encoded in bits per second.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
