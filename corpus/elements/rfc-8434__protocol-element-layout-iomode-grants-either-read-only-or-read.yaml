document: rfc-8434
kind: protocol-element
summary: Layout iomode grants either read-only or read/write I/O access to the client. Layout type specifications must ensure iomode is enforced; for layout types where storage devices cannot enforce it (e.g., block layout), the enforcement responsibility falls solely on the client.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
