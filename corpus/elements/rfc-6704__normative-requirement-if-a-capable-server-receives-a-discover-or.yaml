document: rfc-6704
kind: normative-requirement
summary: If a capable server receives a DISCOVER or REQUEST indicating a capable client and has no previous nonce recorded, it MUST generate a nonce and include it in the ACK.
section: 3.1.3
rfc2119_level: MUST
