document: rfc-9520
kind: protocol-element
summary: An alias loop occurs when CNAME or DNAME records form a circular chain. RFC 1034 Section 3.6.2 requires that resolver software detect and signal CNAME loops as errors rather than failing silently.
section: "2.5"
