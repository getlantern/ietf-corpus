document: rfc-5847
kind: normative-requirement
summary: If a PMIPv6 node restarts and loses PMIPv6 session state, it SHOULD send an unsolicited Heartbeat Response message with an incremented Restart Counter to all PMIPv6 nodes that had previously established sessions.
section: "3.2"
rfc2119_level: SHOULD
topics:
