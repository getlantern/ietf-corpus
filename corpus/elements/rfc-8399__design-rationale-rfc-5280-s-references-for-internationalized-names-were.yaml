summary: RFC 5280's references for internationalized names were updated from IDNA2003 (RFC 3490) to IDNA2008 (RFC 5890, RFC 5891) to align with the current specification. Both IDNA2003 and IDNA2008 use the Punycode algorithm for conversion.
