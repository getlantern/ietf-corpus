document: rfc-8664
kind: security-consideration
summary: Without integrity protection (per RFC 5440, RFC 8231, RFC 8281), an attacker could instantiate an SR path bypassing the verification checks that RSVP-TE signaling would perform. SR-enabled PCEP requires the same security mechanisms as the base PCEP specifications.
