document: rfc-6107
kind: design-rationale
summary: The numbered FA signaling procedure from RFC 4206 Section 1.3.6 is deprecated because it requires the egress to parse all received IGP advertisements to detect when it must issue a reverse FA advertisement — a complex, non-scalable process. An informal CCAMP survey found no significant deployments of this mechanism, making deprecation safe.
section: 1.4.6
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
