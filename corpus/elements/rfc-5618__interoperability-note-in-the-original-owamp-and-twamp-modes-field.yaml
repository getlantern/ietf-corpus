document: rfc-5618
kind: interoperability-note
summary: In the original OWAMP and TWAMP Modes field, setting bit position 0, 1, or 2 indicated the security mode of the Control protocol, and the Test protocol inherited the same mode. This extension breaks that inheritance when bit position 3 is set, maintaining backward compatibility for existing implementations.
section: "3.1"
topics:
    - measurement
    - security
