document: rfc-6644
kind: protocol-element
summary: RFC 6644 extends the Reconfigure Message option to permit msg-type value 6 (Rebind), in addition to the RFC 3315 values 5 (Renew) and 11 (Information-request), enabling a server to direct a client to rebind to any available server.
