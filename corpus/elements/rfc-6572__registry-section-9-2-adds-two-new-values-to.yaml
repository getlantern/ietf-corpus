document: rfc-6572
kind: registry
summary: 'Section 9.2 adds two new values to the Mobility Capability registry (RFC 5447) for use with the MIP6-Feature-Vector AVP: IP4_TRANSPORT_SUPPORTED (0x0000800000000000) indicating MAG ability to provide IPv4-based encapsulation, and IP4_HOA_ONLY_SUPPORTED (0x0001000000000000) indicating only IPv4 PMIPv6 mobility is authorized.'
