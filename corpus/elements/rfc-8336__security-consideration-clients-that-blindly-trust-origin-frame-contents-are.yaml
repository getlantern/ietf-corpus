document: rfc-8336
kind: security-consideration
summary: Clients that blindly trust ORIGIN frame contents are vulnerable to a large number of attacks. Relaxing the DNS check means an attacker with a valid certificate can redirect traffic by convincing a user to visit another website and coalescing connections, without needing to modify DNS.
section: "4"
topics:
