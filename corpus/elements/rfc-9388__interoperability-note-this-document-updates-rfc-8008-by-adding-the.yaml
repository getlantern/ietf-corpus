document: rfc-9388
kind: interoperability-note
summary: This document updates RFC 8008 by adding the 'footprintunion' footprint type, which introduces additive semantics over the narrowing semantics defined in Appendix B of RFC 8008. Implementations must be aware that the footprints array now supports both narrowing (existing behavior) and union (new type) semantics.
