document: rfc-5751
kind: interoperability-note
summary: S/MIME v3.1 clients may only implement RSA (rsaEncryption) for key encryption/decryption and may not know sha256WithRSAEncryption. S/MIME v3 clients may only use Diffie-Hellman for key management. S/MIME v2 clients can only decrypt using rsaEncryption. Sending agents must account for these constraints when selecting encryption algorithms.
section: "2.3"
topics:
    - email
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
