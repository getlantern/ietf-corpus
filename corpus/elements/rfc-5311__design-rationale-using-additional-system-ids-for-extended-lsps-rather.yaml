document: rfc-5311
kind: design-rationale
summary: Using additional system-ids for Extended LSPs (rather than RFC 3786's approach) eliminates the need for two operating modes and special Logical LSP handling during SPF, because legacy systems naturally treat Virtual ISs as leaf nodes reachable only via the Originating System.
section: "5"
topics:
