document: rfc-4643
kind: design-rationale
summary: AUTHINFO GENERIC is deprecated in favor of AUTHINFO SASL so that NNTP can benefit from authentication mechanisms developed for other SASL-enabled protocols (SMTP, POP, IMAP, LDAP, BEEP), rather than maintaining an NNTP-specific equivalent.
section: "1"
topics:
    - security
