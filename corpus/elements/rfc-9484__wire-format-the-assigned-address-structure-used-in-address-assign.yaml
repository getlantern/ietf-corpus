document: rfc-9484
kind: wire-format
summary: 'The Assigned Address structure used in ADDRESS_ASSIGN capsules contains: Request ID (variable-length integer), IP Version (8-bit unsigned, MUST be 4 or 6), IP Address (32 bits for IPv4, 128 bits for IPv6), and IP Prefix Length (8-bit unsigned, MUST be ≤ length of IP Address in bits). Lower bits not covered by prefix length MUST be zero.'
section: 4.7.1
topics:
    - http
    - ip
