summary: The MPA Request/Reply Frame contains a 16-byte Key (ASCII 'MPA ID Req Frame' or 'MPA ID Rep Frame'), a flags byte with M (Markers required), C (CRC preferred), and R (Rejected Connection, Reply only) bits, an 8-bit Rev field, a 16-bit PD_Length, and an optional Private Data field of 0–512 octets.
