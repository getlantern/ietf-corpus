document: rfc-3720
kind: normative-requirement
summary: Login requests and responses MUST be used exclusively during the Login phase. The login phase MUST immediately follow TCP connection establishment, and a subsequent Login phase MUST NOT occur before tearing down a connection.
section: 3.2.3
rfc2119_level: MUST
topics:
    - security
    - tcp
