document: rfc-7118
kind: normative-requirement
summary: When a SIP WebSocket Server receives a request, it MAY decide not to add a "received" parameter to the top Via header. SIP WebSocket Clients MUST accept responses without such a parameter in the top Via header regardless of whether the Via "sent-by" field contains a domain name.
section: "5.3"
rfc2119_level: MUST
topics:
    - websocket
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
