document: rfc-2507
kind: normative-requirement
summary: DELTA values for TCP sequence number, acknowledgment number, window, and urgent pointer MUST be coded as specified in RFC 1144. A Reserved field value passed via the R-flag MUST NOT update the context at either compressor or decompressor.
section: 7.12.1
rfc2119_level: MUST
