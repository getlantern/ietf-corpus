document: rfc-6991
kind: protocol-element
summary: The date-and-time type is a profile of ISO 8601 using the RFC 3339 date-time production, encoded as a string matching the pattern YYYY-MM-DDTHH:MM:SS[.fraction](Z|±HH:MM). Time-offset -00:00 indicates an unknown time zone; canonical format uses a numeric UTC offset derived from the device's configured offset.
