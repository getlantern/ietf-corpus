document: rfc-6004
kind: protocol-element
summary: The Endpoint ID TLV (Type 30, variable length) carries a character-based Ethernet endpoint identifier within the CALL_ATTRIBUTES object, bridging the gap between MEF/G.8011 endpoint identifiers and GMPLS IP-address-based identifiers. The Endpoint ID field is null-padded as defined in RFC 6001.
section: 2.1.1
topics:
    - mpls
    - vpn
