document: rfc-7083
kind: normative-requirement
summary: If a DHCPv6 client receives a message containing an INF_MAX_RT option with a valid value, the client MUST set its internal INF_MAX_RT parameter to that value, which is then used by the retransmission mechanism in RFC 3315 Sections 14 and 18.1.5.
section: "7"
rfc2119_level: MUST
