document: rfc-1122
kind: normative-requirement
summary: Every host MUST implement an ICMP Echo server function that receives Echo Requests and sends corresponding Echo Replies. A host SHOULD also provide an application-layer interface for sending Echo Requests and receiving Echo Replies.
section: 3.2.2.6
rfc2119_level: MUST
topics:
    - ip
