document: rfc-3381
kind: normative-requirement
summary: If the value of 'sheet-completed-copy-number' is unknown, the Printer MUST return the 'unknown' out-of-band value as defined in RFC 2911 section 4.1, rather than the -2 value used in some MIBs.
section: "4.2"
rfc2119_level: MUST
