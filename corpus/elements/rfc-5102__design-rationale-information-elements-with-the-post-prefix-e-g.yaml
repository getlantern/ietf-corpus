summary: Information Elements with the 'post' prefix (e.g., postIpClassOfService IE 55) report Flow properties after modification by downstream middlebox functions, obtained within the Observation Domain by other means (e.g., analyzing a packet marker's tables) rather than direct observation at the Observation Point.
