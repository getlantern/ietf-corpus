document: rfc-7346
kind: design-rationale
summary: Global scope (scop E) has no boundary, and reserved scopes (0 and F) will have their boundary configuration defined when their semantics are defined. This asymmetric treatment reflects that only scopes with defined forwarding behavior require boundary configuration rules.
section: "2"
topics:
