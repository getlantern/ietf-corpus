document: rfc-2222
kind: protocol-element
summary: The SKEY mechanism (name 'SKEY') uses S/Key with MD4. The client sends an initial response with the authorization identity; the server challenges with a decimal sequence number, a space, and the seed string. The client responds with the one-time-password as either a 64-bit network byte order value or in 'six English words' format. No security layer is supported.
section: "7.3"
topics:
    - security
    - crypto
