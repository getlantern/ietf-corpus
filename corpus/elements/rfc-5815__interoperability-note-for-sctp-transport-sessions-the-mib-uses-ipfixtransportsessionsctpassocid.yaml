document: rfc-5815
kind: interoperability-note
summary: For SCTP transport sessions, the MIB uses ipfixTransportSessionSctpAssocId (equal to sctpAssocId in the SCTP MIB, RFC 3873) as the session identifier rather than address/port tuples; port objects for SCTP are populated by copying sctpAssocLocalPort or sctpAssocRemPort depending on device mode.
section: "5.1"
topics:
    - snmp
    - sctp
    - measurement
