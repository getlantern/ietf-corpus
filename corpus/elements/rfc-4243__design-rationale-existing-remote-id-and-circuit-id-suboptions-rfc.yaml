document: rfc-4243
kind: design-rationale
summary: Existing Remote-ID and Circuit-ID suboptions (RFC 3046) carry values tied to physical network resources such as IP addresses, ATM VCs, or DOCSIS cable-modem identifiers. The Vendor-Specific suboption was introduced to let administrators associate arbitrary additional data with relayed DHCP messages, independent of physical network configuration.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
