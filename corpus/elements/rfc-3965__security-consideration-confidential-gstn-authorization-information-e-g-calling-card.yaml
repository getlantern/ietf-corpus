document: rfc-3965
kind: security-consideration
summary: Confidential GSTN authorization information (e.g., calling card numbers) encoded in recipient addresses may be disclosed to the G3Fax recipient. Replay attacks using earlier authorizations to trigger later unauthorized dialouts are a concern.
section: 5.2.3
topics:
    - email
    - security
