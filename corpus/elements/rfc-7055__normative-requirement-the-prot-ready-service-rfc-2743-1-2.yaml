document: rfc-7055
kind: normative-requirement
summary: The PROT_READY service (RFC 2743 §1.2.7) is never available with this mechanism. Implementations MUST NOT offer this flag or permit per-message security services before context establishment is complete.
section: "5.8"
rfc2119_level: MUST NOT
topics:
    - security
