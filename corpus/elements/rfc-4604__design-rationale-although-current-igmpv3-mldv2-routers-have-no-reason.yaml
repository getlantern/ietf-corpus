document: rfc-4604
kind: design-rationale
summary: Although current IGMPv3/MLDv2 routers have no reason to send a Group-Specific Query for an SSM address, SSM-aware hosts should still respond correctly to such queries because the semantics are well-defined and future implementations may have reason to send them ('be liberal in what you accept').
section: 2.2.6
topics:
    - multicast
