document: rfc-6083
kind: normative-requirement
summary: DATA chunks of SCTP MUST be sent in an authenticated way as defined in RFC 4895. If PR-SCTP (RFC 3758) is used, FORWARD-TSN chunks MUST also be sent authenticated to prevent an attacker from forging chunk sequences to hide dropped messages.
section: "4.5"
rfc2119_level: MUST
topics:
    - sctp
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
