document: rfc-6402
kind: interoperability-note
summary: Section 6.3.3 of RFC 5272 is renamed from 'Renewal and Rekey Messages' to 'Existing Certificate Linking' to clarify that linking an existing certificate to a new certification request is not limited to renewal/rekey but also applies to obtaining new certificates of different types or using third-party device certificates.
section: "2.4"
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
