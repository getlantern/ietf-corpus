document: rfc-6213
kind: wire-format
summary: 'The BFD-Enabled TLV has Type 148, a Length field indicating the number of octets in the value field (3 to 255), and a Value field consisting of 3-octet MTID/NLPID entries: 2 octets for the MTID (with 4 reserved bits, then a 12-bit MTID) and 1 octet for the NLPID (as defined in ISO 9577).'
