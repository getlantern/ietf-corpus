document: rfc-8587
kind: protocol-element
summary: When server-trunkable addresses exist, the client may assume that for each file system in a given server network address's namespace, corresponding file systems exist at the same namespace locations for each other trunkable address, even without explicit listing in fs_locations.
section: "5.3"
