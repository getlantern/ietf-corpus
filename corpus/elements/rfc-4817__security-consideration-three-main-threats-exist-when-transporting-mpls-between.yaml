document: rfc-4817
kind: security-consideration
summary: 'Three main threats exist when transporting MPLS between PEs via IP tunnels: packet insertion by a third party, packet viewing (confidentiality), and packet alteration (integrity). Mitigations include access lists, authentication, encryption, and context validation via the L2TPv3 Cookie.'
