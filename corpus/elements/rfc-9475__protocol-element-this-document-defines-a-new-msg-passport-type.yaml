document: rfc-9475
kind: protocol-element
summary: This document defines a new "msg" PASSporT type to differentiate a PASSporT for an individual message from a PASSporT used to secure a telephone call or message stream. "msg" PASSporTs may carry the optional "msgi" JWT claim providing a digest over a MIME body containing a text or multimedia message.
section: "3.2"
topics:
    - sip
    - security
    - jose
