document: rfc-6345
kind: security-consideration
summary: A rogue PRE sending a spoofed PRY can redirect PAA responses to itself by overwriting the PRE address in the PANA session state. It also imposes additional storage requirements on the PAA for holding the PaC-Information AVP alongside the relayed PANA message.
section: "6"
topics:
