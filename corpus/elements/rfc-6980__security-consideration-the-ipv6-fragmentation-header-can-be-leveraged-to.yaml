document: rfc-6980
kind: security-consideration
summary: The IPv6 Fragmentation Header can be leveraged to circumvent network monitoring tools and current implementations of RA-Guard, since layer-2 devices cannot find all necessary filtering information within a single fragment. Forbidding the Fragment Header in all ND messages except CPA greatly simplifies protection of local nodes against ND attacks.
section: "7"
topics:
    - ip
    - security
