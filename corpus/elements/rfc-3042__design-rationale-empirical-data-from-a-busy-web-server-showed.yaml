document: rfc-3042
kind: design-rationale
summary: Empirical data from a busy web server showed 56% of retransmissions were RTO-based and only 4% could have been avoided with SACK alone. The technique in this document could have avoided approximately 25% of the RTO-based retransmissions in that dataset, motivating its adoption.
