document: rfc-6505
kind: protocol-element
summary: The <audio-mixing> element configures conference audio mixing policy via a 'type' attribute ("nbest" or "controller") and an 'n' attribute indicating how many loudest participants are included in the mix; a value of 0 means all contributing participants are included.
