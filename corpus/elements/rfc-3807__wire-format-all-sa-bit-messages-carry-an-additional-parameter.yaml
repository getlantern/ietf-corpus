document: rfc-3807
kind: wire-format
summary: All Sa-Bit messages carry an additional parameter with Tag 0x83, a 2-byte BIT ID field (Sa7 = 0x7), and a 2-byte Bit Value field (ZERO = 0x0, ONE = 0x1). For Sa-Bit Status Request and Set Confirm, Bit Value SHALL be set to 0 and ignored by the receiver.
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
