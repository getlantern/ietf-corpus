document: rfc-8296
kind: interoperability-note
summary: If the BIER payload is an MPLS packet with an upstream-assigned label at the top, that label is interpreted in the context of <BFIR-id, sub-domain-id>; the sub-domain-id must be inferred from the BIFT-id since it is not carried explicitly in the BIER header.
section: "3"
topics:
