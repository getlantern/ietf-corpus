document: rfc-6001
kind: protocol-element
summary: The IACD sub-TLV in IS-IS is an optional sub-TLV of the Extended IS Reachability TLV (TLV 22) with Type 27. Its format is identical to the OSPF variant. Multiple IACD sub-TLVs MAY be present and do not affect processing of the ISCD sub-TLV defined in RFC 5307.
section: 3.2.2
topics:
    - mpls
    - routing
