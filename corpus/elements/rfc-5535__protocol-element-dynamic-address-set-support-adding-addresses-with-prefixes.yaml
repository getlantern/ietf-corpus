document: rfc-5535
kind: protocol-element
summary: 'Dynamic address set support (adding addresses with prefixes not in the original HBA set) requires CGA capabilities: the new address is announced via a Shim6 UPDATE message signed with the private key corresponding to the public key in the CGA Parameter Data Structure. HBA-only verification cannot validate addresses with prefixes not included at HBA generation time.'
section: "8.1"
topics:
    - ip
    - security
