document: rfc-6427
kind: protocol-element
summary: Fault Management messages are carried in-band of the client LSP or MS-PW using the Associated Channel Header (ACH). For LSPs other than PWs, the ACH is identified by the Generic Associated Channel Label (GAL) as defined in RFC 5586.
