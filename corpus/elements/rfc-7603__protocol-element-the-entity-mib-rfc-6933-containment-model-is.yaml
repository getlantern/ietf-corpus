document: rfc-7603
kind: protocol-element
summary: The ENTITY-MIB (RFC 6933) containment model is used to uniquely identify physical subcomponents of network devices. The entPhysicalContainsTable with entPhysicalChildIndex and the entPhysicalContainedIn object express parent-child energy object containment (e.g., line-card within chassis).
section: "2.1"
