document: rfc-7796
kind: normative-requirement
summary: If a PE is in Optimized Mode for a PW (peer PE has only leaf nodes), upon transmit the PE SHOULD drop any frame whose VLAN ID matches the local leaf VLAN ID, avoiding unnecessary leaf-to-leaf traffic over the PW.
section: 5.3.3
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
