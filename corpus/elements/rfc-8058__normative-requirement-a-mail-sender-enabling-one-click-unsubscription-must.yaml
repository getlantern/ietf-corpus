document: rfc-8058
kind: normative-requirement
summary: A mail sender enabling one-click unsubscription MUST place one List-Unsubscribe header field containing one HTTPS URI and one List-Unsubscribe-Post header field containing the single key/value pair 'List-Unsubscribe=One-Click'.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
