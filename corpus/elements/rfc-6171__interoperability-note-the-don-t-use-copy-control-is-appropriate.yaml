document: rfc-6171
kind: interoperability-note
summary: The Don't Use Copy control is appropriate only for LDAP interrogation operations (Compare and Search). It is inappropriate for Abandon, Bind, Delete, Modify, ModifyDN, StartTLS, and Unbind operations.
section: "3"
topics:
