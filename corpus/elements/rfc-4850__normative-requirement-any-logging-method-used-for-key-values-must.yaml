document: rfc-4850
kind: normative-requirement
summary: Any logging method used for key values MUST keep the information secure from intruders. Display of the log MUST only be possible with administrative rights to the node, and options to disable logging to disk and keep logs for a fixed duration SHOULD be provided.
section: "4"
rfc2119_level: MUST
topics:
    - security
