document: rfc-9708
kind: normative-requirement
summary: When the HSS/LMS AlgorithmIdentifier appears in the SubjectPublicKeyInfo of an end-entity X.509 certificate, the key usage extension MUST contain at least one of digitalSignature, nonRepudiation, or cRLSign, and MUST NOT contain other values.
section: "4"
rfc2119_level: MUST
topics:
