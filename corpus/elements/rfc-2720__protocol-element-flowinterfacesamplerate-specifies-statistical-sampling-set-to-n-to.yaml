document: rfc-2720
kind: protocol-element
summary: 'flowInterfaceSampleRate specifies statistical sampling: set to N to count 1/Nth of packets on that interface; value 1 counts all packets; value 0 causes the interface to be ignored by the meter. The meter should introduce variance into sampling to avoid counting exactly every Nth packet.'
section: "4"
topics:
