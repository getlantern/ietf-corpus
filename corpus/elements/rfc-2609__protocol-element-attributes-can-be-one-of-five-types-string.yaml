document: rfc-2609
kind: protocol-element
summary: 'Attributes can be one of five types: string (UTF-8, set determined at registration time), integer (signed 32-bit), boolean (single-valued only), opaque (''\FF'' followed by hex-encoded bytes), or keyword (existence-only attribute with no type, flags, or values). Each attribute identifier must be unique within a template and is case-folded.'
section: 3.2.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
