document: rfc-1442
kind: wire-format
summary: Opaque is APPLICATION 4, an IMPLICIT OCTET STRING encoding arbitrary ASN.1 values via BER double-wrapping. A conforming implementation need only accept and recognize opaquely-encoded data; it need not unwrap or interpret the contents.
section: 7.1.9
topics:
