document: rfc-8026
kind: protocol-element
summary: OPTION_S46_PRIORITY (option code 111) is a DHCPv6 option that conveys a priority-ordered list of IPv4-in-IPv6 softwire mechanisms. The option contains one or more 16-bit s46-option-code fields, each identifying a DHCPv6 option code for a specific S46 mechanism. Mechanisms are prioritized in the order they appear in the option.
section: "1.3"
topics:
    - v6ops
    - ip
