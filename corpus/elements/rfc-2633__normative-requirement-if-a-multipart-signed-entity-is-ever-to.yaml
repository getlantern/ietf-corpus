document: rfc-2633
kind: normative-requirement
summary: If a multipart/signed entity is EVER to be transmitted over standard Internet SMTP or other 7-bit-constrained transport, it MUST have transfer encoding applied so it is represented as 7-bit text.
section: 3.1.3
rfc2119_level: MUST
