document: rfc-5510
kind: design-rationale
summary: Encoding and decoding over packets with G>=1 symbols per packet means that symbol erasures produce the same erasure pattern for each of the S m-bit element positions. As a result, the matrix inversion needs to be performed only once and applied to all S encoding vectors, making the inversion cost negligible for large S.
section: "8.4"
