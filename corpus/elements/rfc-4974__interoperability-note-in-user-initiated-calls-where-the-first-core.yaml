document: rfc-4974
kind: interoperability-note
summary: In user-initiated Calls where the first core node acts as External Call Manager, neither long nor short Call ID is supplied by the edge node (Session Name Length=0, Call_ID=0). The first core node generates both IDs before dispatching the Notify to the remote Call endpoint.
section: "7.2"
topics:
