document: rfc-7866
kind: protocol-element
summary: The SRC may act as an RTP translator (forwarding or transcoding), RTP mixer, or RTP endpoint with respect to the RS. As a forwarding translator it preserves SSRCs; as a mixer it uses its own SSRC and conveys source SSRCs as CSRCs; as an endpoint the RS RTP session is completely independent of the CS.
section: "8.2"
topics:
    - rtp
    - realtime
