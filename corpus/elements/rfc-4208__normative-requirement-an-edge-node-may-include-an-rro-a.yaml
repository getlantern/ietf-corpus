document: rfc-4208
kind: normative-requirement
summary: An edge-node MAY include an RRO. A core-node MAY remove the RRO from the Path message before forwarding it, and MAY also remove the RRO from a Resv message before forwarding it to the edge-node. Such behavior is controlled by configuration.
section: "4"
rfc2119_level: MAY
topics:
