document: rfc-7470
kind: normative-requirement
summary: 'A PCE that receives a PCReq containing a Vendor Information object MUST act according to the P flag in the object header: if P is set, the object is mandatory and the request must be processed using the object''s contents or rejected; if P is clear, the object may be used or ignored.'
section: "2"
rfc2119_level: MUST
topics:
    - routing
