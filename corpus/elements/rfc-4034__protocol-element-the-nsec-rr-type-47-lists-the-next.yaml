document: rfc-4034
kind: protocol-element
summary: The NSEC RR (type 47) lists the next owner name in canonical zone order that has authoritative data or a delegation NS RRset, and the set of RR types present at the NSEC owner name. Together, NSEC RRs form a chain enabling authenticated denial of existence.
