document: rfc-5536
kind: protocol-element
summary: The Message-ID header field contains a unique message identifier distinguishing the article from every other article ever posted. Articles with the same message identifier are treated as identical regardless of body or header differences. Its syntax is stricter than RFC 5322 to enable fast comparison and NNTP compatibility.
section: 3.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
