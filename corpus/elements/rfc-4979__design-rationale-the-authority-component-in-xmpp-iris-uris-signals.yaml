document: rfc-4979
kind: design-rationale
summary: The Authority Component in XMPP IRIs/URIs signals the processing application to authenticate as the user indicated. In ENUM context, arbitrary clients discover these URIs and cannot typically fulfill that authentication, making the Authority Component inappropriate for ENUM-published XMPP URIs.
section: "4.1"
topics:
    - dns
