document: rfc-9354
kind: protocol-element
summary: The MTU for ITU-T G.9903 is 400 octets, insufficient for IPv6's minimum 1280-octet MTU, requiring fragmentation and reassembly at the adaptation layer. IEEE 1901.1 supports up to 2031 octets and IEEE 1901.2 supports up to 1576 octets, but smaller MTUs may be configured in high-noise environments.
section: "3.3"
topics:
    - ip
    - v6ops
