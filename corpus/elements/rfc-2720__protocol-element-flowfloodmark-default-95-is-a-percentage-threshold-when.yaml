document: rfc-2720
kind: protocol-element
summary: flowFloodMark (default 95%) is a percentage threshold; when the flow table exceeds this level the meter sets flowFloodMode to true(1) and takes action to avoid running out of resources. Values 0% or 100% disable the check.
