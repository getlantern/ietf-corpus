document: rfc-5591
kind: interoperability-note
summary: SNMPv1 and SNMPv2c message processing as described in BCP 74 (RFC 3584) always selects the SNMPv1(1) and SNMPv2c(2) Security Models with no mechanism to select an alternative, so these message formats cannot use the Transport Security Model.
section: 2.3.1
topics:
    - security
