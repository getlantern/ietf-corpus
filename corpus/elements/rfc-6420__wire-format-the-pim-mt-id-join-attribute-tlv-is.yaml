summary: 'The PIM MT-ID Join Attribute TLV is 4 bytes: F-bit=0 (non-transitive), E-bit per RFC 5384, Attr Type=2, Length=2, 4 reserved bits set to zero, and a 12-bit Value field carrying the MT-ID (range 1–4095).'
