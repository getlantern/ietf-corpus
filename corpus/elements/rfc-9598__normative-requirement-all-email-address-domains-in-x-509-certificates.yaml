document: rfc-9598
kind: normative-requirement
summary: All email address domains in X.509 certificates MUST conform to IDNA2008 (RFC 5890) and avoid any mappings mentioned in that document. This applies to SmtpUTF8Mailbox and rfc822Name in subjectAltName, issuerAltName, and everywhere else they appear.
section: "4"
rfc2119_level: MUST
topics:
    - pkix
    - email
