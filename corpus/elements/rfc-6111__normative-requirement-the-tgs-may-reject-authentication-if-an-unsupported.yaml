document: rfc-6111
kind: normative-requirement
summary: The TGS MAY reject authentication if an unsupported well-known principal name is used as the client principal, and SHOULD reject if an unsupported well-known name is used as the server principal name. This asymmetry allows incremental cross-realm migration.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
