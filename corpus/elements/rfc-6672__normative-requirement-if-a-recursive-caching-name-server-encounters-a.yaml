document: rfc-6672
kind: normative-requirement
summary: If a recursive caching name server encounters a DNSSEC-validated DNAME RR that contradicts cached information, it SHOULD cache the DNAME RR. If the DNAME RR cannot be DNSSEC-validated, the server SHOULD NOT cache the DNAME RR.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
