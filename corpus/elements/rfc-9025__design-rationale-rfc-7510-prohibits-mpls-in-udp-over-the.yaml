document: rfc-9025
kind: design-rationale
summary: RFC 7510 prohibits MPLS-in-UDP over the general Internet or non-cooperating network operators for non-congestion-controlled traffic. This constraint is compatible with DetNet because DetNet is constrained to operate within a single administrative control or a closed group of administrative control.
section: "1"
topics:
    - mpls
    - udp
    - security
