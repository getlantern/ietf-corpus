document: rfc-2069
kind: security-consideration
summary: The server password file stores H(A1) = MD5(username:realm:password) and must be protected as if it contained plaintext passwords, because it grants direct realm access without decryption. A brute-force attack would still be required to recover the actual password.
section: "3.5"
topics:
    - http
    - security
    - crypto
