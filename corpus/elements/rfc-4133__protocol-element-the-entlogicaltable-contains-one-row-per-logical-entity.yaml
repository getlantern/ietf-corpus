document: rfc-4133
kind: protocol-element
summary: The entLogicalTable contains one row per logical entity. It must be implemented when the agent represents multiple logical entities; agents with a single naming scope may omit it. Each row includes entLogicalContextEngineID and entLogicalContextName for SNMPv3 context identification.
