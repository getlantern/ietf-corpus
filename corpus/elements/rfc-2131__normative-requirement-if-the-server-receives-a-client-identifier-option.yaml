document: rfc-2131
kind: normative-requirement
summary: If the server receives a 'client identifier' option, the server MUST use that identifier to identify the client in all interactions. If no 'client identifier' is provided, the server MUST use the 'chaddr' field to identify the client.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
