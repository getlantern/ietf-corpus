document: rfc-2457
kind: design-rationale
summary: The MIB explicitly does not support EBN configuration, session initiation failure history, Peripheral Border Node (PBN) management, or traps, on grounds that PBN is not expected to be widely implemented and APPN MIB alertTrap can reference EBN MIB objects via VariablePointer.
