document: rfc-4895
kind: protocol-element
summary: The RANDOM parameter (type 0x8002) carries a random number used during association setup to derive shared keys. It must be included once in INIT or INIT-ACK if the sender wants to send or receive authenticated chunks, and must contain a 32-byte Random Number.
section: "3.1"
topics:
    - sctp
    - crypto
    - security
