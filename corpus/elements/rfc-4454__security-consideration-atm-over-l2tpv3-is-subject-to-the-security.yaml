document: rfc-4454
kind: security-consideration
summary: ATM over L2TPv3 is subject to the security considerations defined in RFC 3931 with no additional ATM-specific considerations. To address the loss of end-to-end AAL5 CRC integrity and HEC integrity across ATMPWs, the L2TPv3 session can utilize IPsec as specified in RFC 3931 Section 4.1.3.
section: "11"
topics:
    - security
    - routing
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
