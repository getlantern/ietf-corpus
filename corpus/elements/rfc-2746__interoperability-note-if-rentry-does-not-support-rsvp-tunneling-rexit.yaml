document: rfc-2746
kind: interoperability-note
summary: If Rentry does not support RSVP tunneling, Rexit will have no PATH state for the tunnel and simply sets the global break bit in the decapsulated end-to-end PATH message and forwards it, ensuring correct non-RSVP link signaling for unupgraded equipment.
section: 4.2.2
topics:
