document: rfc-2562
kind: normative-requirement
summary: A client SHOULD respond to a definite response request when it completes processing the transaction, not immediately upon receipt. Clients that respond immediately will be attributed lower total response times than actually occurred.
section: "3.1"
rfc2119_level: SHOULD
topics:
