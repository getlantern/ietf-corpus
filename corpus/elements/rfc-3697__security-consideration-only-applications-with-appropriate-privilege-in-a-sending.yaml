document: rfc-3697
kind: security-consideration
summary: Only applications with appropriate privilege in a sending host are entitled to set a non-zero Flow Label. Mechanisms for enforcing this are operating system dependent, and authorization policy (e.g., per-user restrictions on a multi-user host) is outside the scope of this specification.
section: "5.1"
topics:
    - ip
    - security
