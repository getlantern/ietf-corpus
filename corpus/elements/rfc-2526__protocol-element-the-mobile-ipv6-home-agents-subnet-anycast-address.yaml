document: rfc-2526
kind: protocol-element
summary: The Mobile IPv6 Home-Agents subnet anycast address uses anycast identifier 126 (0x7E). For EUI-64 addresses, its 64-bit interface identifier is 0xFDFFFFFFFFFFFFFF (with universal/local bit = 0); for non-EUI-64, it is 0xFFFFFFFFFFFFFFFE.
