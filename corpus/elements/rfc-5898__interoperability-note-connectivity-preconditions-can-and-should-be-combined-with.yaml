document: rfc-5898
kind: interoperability-note
summary: 'Connectivity preconditions can and should be combined with other precondition types: the "qos" precondition (RFC 3312) for Quality of Service requirements and the "sec" precondition (RFC 5027) for security parameter negotiation, as connectivity alone may not fully satisfy all media stream requirements.'
