document: rfc-3998
kind: normative-requirement
summary: Suspend-Current-Job and Resume-Job MUST both be supported if either is supported. The Printer MUST reject a Suspend-Current-Job for a job already in 'processing-stopped' with 'job-suspended' in job-state-reasons. Resume-Job moves the job to 'pending' and removes 'job-suspended' from job-state-reasons.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
