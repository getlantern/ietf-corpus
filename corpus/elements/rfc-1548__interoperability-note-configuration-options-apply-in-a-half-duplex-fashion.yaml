document: rfc-1548
kind: interoperability-note
summary: Configuration Options apply in a half-duplex fashion (typically in the receive direction of the Configure-Request sender). An implementation that does not include an optional feature MUST be prepared to interoperate with an implementation that does include it. Options not present in a Configure-Request are assumed to take their default values.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
