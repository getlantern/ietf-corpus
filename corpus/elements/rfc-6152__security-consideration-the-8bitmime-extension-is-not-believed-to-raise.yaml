document: rfc-6152
kind: security-consideration
summary: The 8BITMIME extension is not believed to raise any security issues beyond those already present in RFC 5321-conforming SMTP implementations. Since MIME semantics are transport-neutral, 8BITMIME provides no more capability to disseminate malware than unextended 7-bit SMTP.
section: "5"
topics:
