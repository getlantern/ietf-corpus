document: rfc-2355
kind: protocol-element
summary: The BIND-IMAGE function requires the server to send a BIND-IMAGE data message (containing the exact SNA Bind RU) after accepting a Bind and Start Data Traffic from the host, and an UNBIND data message (with reason code or 0x01 for normal end) when the SNA session terminates. Before the first BIND-IMAGE is received, only SSCP-LU-DATA and NVT-DATA may carry user data.
section: "10.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
