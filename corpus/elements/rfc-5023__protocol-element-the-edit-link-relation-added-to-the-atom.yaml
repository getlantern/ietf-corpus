document: rfc-5023
kind: protocol-element
summary: The 'edit' link relation (added to the Atom Registry of Link Relations) specifies that the href IRI is the URI of an editable Member Entry, usable for GET, PUT, and DELETE. An atom:entry MUST NOT contain more than one 'edit' link relation.
