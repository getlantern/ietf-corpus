document: rfc-5151
kind: protocol-element
summary: A new 'Contiguous LSP' bit (bit number 4) is defined in the Attributes Flags TLV of the LSP_Attributes object (RFC 4420). When set by the ingress node in a Path message, it restricts all domain border nodes from performing stitching or nesting for the inter-domain TE LSP.
section: "4.1"
topics:
    - mpls
    - routing
