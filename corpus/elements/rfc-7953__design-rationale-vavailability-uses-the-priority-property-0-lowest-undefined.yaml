document: rfc-7953
kind: design-rationale
summary: VAVAILABILITY uses the PRIORITY property (0=lowest/undefined, 1=highest, 9=lowest explicit) to allow higher-priority components to override lower-priority ones without modifying the base availability. This enables a 'default' schedule (priority 0) to be temporarily overridden (e.g., for travel) by a higher-priority component covering the exception period.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
