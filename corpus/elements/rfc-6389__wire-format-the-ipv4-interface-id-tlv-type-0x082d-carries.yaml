document: rfc-6389
kind: wire-format
summary: 'The IPv4 Interface ID TLV (type 0x082d) carries: 16-bit type, 16-bit Length, 4-octet IPv4 Next/Previous Hop Address (set to 0), 4-octet Logical Interface ID (set to 0), followed by Sub-TLVs. Value fields not a multiple of four MUST be zero-padded for 4-octet alignment.'
