document: rfc-2916
kind: protocol-element
summary: 'The E2U (E.164 to URI) service is defined for NAPTR use in this system. It takes one operand (an E.164 number in the form from step 2 of the conversion algorithm) and outputs one or more URIs. Error conditions include: number not in numbering plan, number in plan but no URIs exist, and service unavailable.'
section: 3.1.2
topics:
