document: rfc-6155
kind: normative-requirement
summary: Any identifier used in a HELD location request MUST only be used when it uniquely identifies a single Device at the time location is determined. The LIS is responsible for ensuring that identifiers are not transient or ambiguous.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - realtime
