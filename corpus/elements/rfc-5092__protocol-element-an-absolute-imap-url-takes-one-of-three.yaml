document: rfc-5092
kind: protocol-element
summary: 'An absolute IMAP URL takes one of three forms: a server reference (imap://<iserver>[/]), a mailbox/search reference (imap://<iserver>/<enc-mailbox>[<uidvalidity>][?<enc-search>]), or a specific message/part reference (imap://<iserver>/<enc-mailbox>[<uidvalidity>]<iuid>[<isection>][<ipartial>][<iurlauth>]). The default port is 143.'
section: "1"
