document: rfc-9751
kind: normative-requirement
summary: New RTP payload format authors must register their media type only in the IANA 'Media Types' registry (https://www.iana.org/assignments/media-types/). Registration in the now-closed 'RTP Payload Format Media Types' registry is no longer required or possible.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - registry
