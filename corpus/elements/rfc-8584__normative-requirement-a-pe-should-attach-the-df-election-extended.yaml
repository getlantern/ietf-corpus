document: rfc-8584
kind: normative-requirement
summary: A PE SHOULD attach the DF Election Extended Community to any advertised ES route. The Extended Community MUST be sent if the ES is configured with a non-default DF election algorithm or if a capability is required.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
