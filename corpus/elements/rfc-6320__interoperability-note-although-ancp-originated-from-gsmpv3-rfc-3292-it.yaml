document: rfc-6320
kind: interoperability-note
summary: Although ANCP originated from GSMPv3 (RFC 3292), it introduces so many extensions and modifications that the two protocols are not interoperable. ANCP uses version number 50 to distinguish itself; GSMPv3 uses versions 1 through 3.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
