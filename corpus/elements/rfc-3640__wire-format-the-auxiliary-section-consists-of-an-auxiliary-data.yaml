document: rfc-3640
kind: wire-format
summary: The Auxiliary Section consists of an auxiliary-data-size field (whose bit length is configured by a MIME parameter) followed by the auxiliary-data field. Up to 7 zero-padding bits are appended for octet-alignment. The default length of zero for the size field indicates the entire Auxiliary Section is absent.
