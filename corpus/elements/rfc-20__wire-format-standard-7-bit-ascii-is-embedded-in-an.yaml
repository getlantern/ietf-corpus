document: rfc-20
kind: wire-format
summary: Standard 7-bit ASCII is embedded in an 8-bit byte whose high-order bit is always 0, yielding 128 code positions arranged as 8 columns (b7–b5) by 16 rows (b4–b1). The column number is the decimal value of bits b7b6b5 and the row number is the decimal value of bits b4b3b2b1.
