document: rfc-2949
kind: normative-requirement
summary: If a new OFB64_IV command is received while encryption is enabled, the encryption machine must be re-initialized immediately following the END of the OFB64_IV command using the new IV and the keyid from the last START command.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
