document: rfc-4771
kind: normative-requirement
summary: In mode 2, packets with SEQ not equal to 0 mod R MUST be protected using the default SRTP integrity transform. Modes 1, 2, and 3 are all MANDATORY to implement, though local policy determines which modes may be used.
