document: rfc-7357
kind: protocol-element
summary: ESADI-LSP fragment zero and any CSNP or PSNP covering fragment zero MUST NOT exceed 1446 bytes (VLAN) or 1442 bytes (FGL) for robustness, based on the 1470-byte inter-RBridge link MTU baseline minus TRILL overhead. Received overlong PDUs are still processed normally.
