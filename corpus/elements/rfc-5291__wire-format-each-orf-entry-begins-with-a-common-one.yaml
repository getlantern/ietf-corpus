document: rfc-5291
kind: wire-format
summary: 'Each ORF entry begins with a common one-octet header: Action (2 bits, 0=ADD/1=REMOVE/2=REMOVE-ALL), Match (1 bit, 0=PERMIT/1=DENY), Reserved (5 bits set to 0 on transmit). When Action is REMOVE-ALL, the entry consists of only this common part.'
