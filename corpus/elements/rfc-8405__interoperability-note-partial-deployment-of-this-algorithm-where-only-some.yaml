document: rfc-8405
kind: interoperability-note
summary: Partial deployment of this algorithm (where only some routers in an area adopt it) can increase rather than decrease micro-loop frequency and duration, especially if the previous algorithm was deployed uniformly. It is RECOMMENDED to migrate all routers in an IGP area/level to this algorithm at roughly the same time.
