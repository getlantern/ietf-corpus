summary: 'The sending part of a stream transitions through: Ready (created) → Send (first STREAM/STREAM_DATA_BLOCKED sent) → Data Sent (FIN sent) → Data Recvd (all ACKed, terminal). An abort from any non-terminal state sends RESET_STREAM and moves through Reset Sent → Reset Recvd (terminal).'
