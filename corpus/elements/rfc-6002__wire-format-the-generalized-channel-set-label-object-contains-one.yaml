document: rfc-6002
kind: wire-format
summary: The Generalized Channel_Set LABEL object contains one or more Channel_Set Subobjects. Each subobject has an Action field (8 bits), Number of Subchannels field (10 bits), Label Type field (14 bits), followed by variable-length Subchannel fields and optional Padding. The subobject size MUST be a multiple of 4 bytes and at least 4 bytes.
section: "3.2"
topics:
