document: rfc-9291
kind: protocol-element
summary: Ethernet OAM at the VPN network access level models IEEE 802.1ag CFM (N2-UNI-C and N2-UNI-N MEPs with MAID, MEP ID, level, CCM interval, holdtime, and PCP priority) and ITU-T Y.1731 (performance monitoring type, loss measurement, synthetic loss, one-way/two-way delay measurement, and frame size). The structure is inherited from RFC 8466 §5.3.2.2.6.
section: 7.6.3
topics:
