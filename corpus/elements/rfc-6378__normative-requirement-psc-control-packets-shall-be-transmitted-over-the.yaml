document: rfc-6378
kind: normative-requirement
summary: PSC control packets SHALL be transmitted over the protection path only. This avoids affecting normal data traffic in the prevalent Normal state and prevents race conditions that could arise if messages were sent on both paths.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
