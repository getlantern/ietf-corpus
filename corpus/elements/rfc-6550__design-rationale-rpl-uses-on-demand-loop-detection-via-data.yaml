document: rfc-6550
kind: design-rationale
summary: RPL uses on-demand loop detection via data-packet Rank inspection rather than continuous topology tracking, because transient LLN connectivity changes are common, often innocuous, and costly to track; detection and local repair are triggered only when a forwarding loop is actually encountered.
section: 3.2.7
topics:
