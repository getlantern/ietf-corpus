document: rfc-1342
kind: interoperability-note
summary: If a mail reader does not support the character set used in an encoded-word, it may either display the encoded-word as ordinary text (verbatim as it appears in the header) or substitute an appropriate message indicating the decoded text could not be displayed.
section: Recognition of encoded-words in message headers
topics:
    - email
