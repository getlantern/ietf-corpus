document: rfc-8315
kind: normative-requirement
summary: If an injecting agent or moderator acting as representative has added a Cancel-Lock element to the original article, it MUST add a Cancel-Key header field with at least one matching <c-key> element to any corresponding cancel or supersede article, given that it authenticates the poster as the same person.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
