document: rfc-9286
kind: normative-requirement
summary: A CA MUST sign only one manifest with each generated private key and MUST generate a new key pair for each new version of the manifest. The corresponding 'one-time-use' EE certificate MUST be revoked when the manifest is replaced.
section: "3"
rfc2119_level: MUST
topics:
