document: rfc-2131
kind: normative-requirement
summary: The server MUST choose a 'server identifier' address that is reachable from the client. When giaddr is zero (same subnet), the server SHOULD select the IP address used for communication on that subnet; when the message arrived via a relay agent, the server SHOULD choose an address from the receiving interface.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
