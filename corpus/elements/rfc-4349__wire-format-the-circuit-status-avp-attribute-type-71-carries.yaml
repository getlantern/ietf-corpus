document: rfc-4349
kind: wire-format
summary: The Circuit Status AVP (Attribute Type 71) carries a 16-bit mask. Bit 0 (A) indicates ACTIVE (1) or INACTIVE (0). Bit 1 (N) indicates a new circuit (1) or existing (0). Reserved bits MUST be set to 0 on send and ignored on receipt.
section: "3.4"
rfc2119_level: MUST
topics:
