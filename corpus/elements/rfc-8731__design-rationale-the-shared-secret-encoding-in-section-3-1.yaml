document: rfc-8731
kind: design-rationale
summary: The shared secret encoding in Section 3.1 differs from RFC 5656, which uses a different conversion. Curve25519/448 outputs are in little-endian (per RFC 7748) but are reinterpreted as big-endian unsigned integers before mpint encoding for SSH key derivation. This is intentional and scoped only to this document's mechanisms.
section: "3.1"
topics:
    - crypto
    - security
