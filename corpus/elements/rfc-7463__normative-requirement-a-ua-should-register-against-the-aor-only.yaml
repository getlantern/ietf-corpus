document: rfc-7463
kind: normative-requirement
summary: A UA SHOULD register against the AOR only if it will be answering incoming calls. If a UA is mainly monitoring or picking up calls, it SHOULD subscribe but not register, to avoid generating large amounts of unnecessary network traffic.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
