document: rfc-6321
kind: normative-requirement
summary: The iCalendar VALUE property parameter is not mapped to an xCal XML element; instead, value type is indicated by the XML element name used inside property elements. When converting xCal back to iCalendar, the appropriate VALUE property parameter MUST be included if the value type is not the default for that property.
section: 3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
