document: rfc-2138
kind: security-consideration
summary: The shared secret SHOULD be at least 16 octets and as unguessable as a well-chosen password to resist exhaustive search. A RADIUS server SHOULD use the source IP address of each UDP packet to select the correct shared secret, enabling proxy support.
section: "3"
topics:
    - security
    - crypto
