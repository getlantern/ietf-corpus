document: rfc-3485
kind: wire-format
summary: 'Each entry in the table subset encodes a (length, offset) pair: the string length is stored as a 1-byte value, and the string offset is stored as a 2-byte value with 1024 (0x0400) added to the actual offset. This allows direct UDVM referencing when the dictionary state is loaded at address 1024.'
