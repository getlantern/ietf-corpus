document: rfc-1894
kind: normative-requirement
summary: The Status field MUST be present for each delivery attempt. The status-code format is DIGIT "." 1*3DIGIT "." 1*3DIGIT where the first subfield is 2 (success), 4 (persistent temporary failure), or 5 (permanent failure). Each numeric subfield MUST be expressed without leading zeros.
section: 2.3.4
rfc2119_level: MUST
topics:
    - email
