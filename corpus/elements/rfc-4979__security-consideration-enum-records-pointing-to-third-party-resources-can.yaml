document: rfc-4979
kind: security-consideration
summary: ENUM records pointing to third-party resources can be provisioned by the ENUM domain owner, meaning any assumption about the association between a number and an entity could be bogus unless identity verification is in place; such verification is out of scope for this document.
section: "6"
topics:
