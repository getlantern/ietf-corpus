document: rfc-7731
kind: normative-requirement
summary: For each MPL Domain Address that an MPL Interface subscribes to, the MPL Interface MUST also subscribe to the same MPL Domain Address with Link-Local scope (scop=2) when reactive forwarding is in use (i.e., when MPL Control Messages are being communicated).
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
