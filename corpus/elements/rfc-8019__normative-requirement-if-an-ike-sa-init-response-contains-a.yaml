document: rfc-8019
kind: normative-requirement
summary: If an IKE_SA_INIT response contains a PUZZLE notification but no COOKIE notification, the Initiator MUST ignore the received message and continue waiting, as the puzzle cannot be solved without the cookie.
section: 7.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - security
