document: rfc-8912
kind: design-rationale
summary: An initiation process with control exchanges resulting in unpredictable start times (within a time interval) is explicitly noted as a valid replacement for selecting a random start time from a fixed interval for periodic streams. This design avoids periodic stream synchronization artifacts without requiring a true random number generator.
