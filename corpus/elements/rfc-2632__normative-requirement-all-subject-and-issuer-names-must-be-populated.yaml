document: rfc-2632
kind: normative-requirement
summary: All subject and issuer names MUST be populated (not an empty SEQUENCE) in S/MIME-compliant PKIX certificates, except that the subject DN in an end-entity certificate MAY be empty if the subjectAltName extension includes the subject's identifier and is marked critical.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
