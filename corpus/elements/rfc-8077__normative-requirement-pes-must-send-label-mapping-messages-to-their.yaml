document: rfc-8077
kind: normative-requirement
summary: PEs MUST send Label Mapping messages to their peers as soon as the PW is configured and administratively enabled, regardless of the Attachment Circuit state. If the label-to-PW binding is not available, the PW MUST be considered in the down state.
section: 6.3.1
rfc2119_level: MUST
topics:
    - mpls
