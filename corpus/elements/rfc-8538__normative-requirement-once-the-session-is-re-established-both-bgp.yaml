document: rfc-8538
kind: normative-requirement
summary: Once the session is re-established, both BGP speakers SHOULD set their Forwarding State bit to 1. Failure to do so causes routes to be flushed per RFC 4724 Section 4.2, defeating the goals of this specification.
section: "4"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
