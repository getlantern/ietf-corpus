document: rfc-9914
kind: protocol-element
summary: A Storing Mode P-Route (segment) is a strict hop-by-hop sequence installed by passing a P-DAO along the reverse data path. Each intermediate node installs an entry in the Track's RIB. Segments reduce SRH size by enabling loose source routing over the main DODAG and are the building blocks joining loose hops of protection paths in a Complex Track.
section: 3.5.1
topics:
    - routing
