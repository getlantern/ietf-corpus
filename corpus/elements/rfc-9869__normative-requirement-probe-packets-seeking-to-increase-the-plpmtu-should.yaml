document: rfc-9869
kind: normative-requirement
summary: Probe packets seeking to increase the PLPMTU SHOULD NOT carry application data, since they will be lost whenever their size exceeds the actual PMTU; a probe packet MUST include the REQ Option.
section: "4.2"
rfc2119_level: MUST
topics:
