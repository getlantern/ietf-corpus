document: rfc-7848
kind: design-rationale
summary: The <mark:id> and <smd:id> values are composed of a local identifier plus an issuer identifier to uniquely identify marks and SMDs across repositories potentially maintained by more than one issuer, avoiding collisions in a multi-issuer environment.
