document: rfc-5003
kind: wire-format
summary: AII Type 2 TLV encodes a 1-octet type (0x02), 1-octet length (12), a 4-octet Global ID, a 4-octet Prefix, and a 4-octet AC ID, for a total value field of 12 octets. The structure supports globally unique AII values through the combination of these three fields.
section: "3.2"
