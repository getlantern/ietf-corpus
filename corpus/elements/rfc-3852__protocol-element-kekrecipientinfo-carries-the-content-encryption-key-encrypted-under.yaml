document: rfc-3852
kind: protocol-element
summary: KEKRecipientInfo carries the content-encryption key encrypted under a previously distributed symmetric key-encryption key. It contains version (always 4), kekid (KEKIdentifier with keyIdentifier OCTET STRING and optional date/other), keyEncryptionAlgorithm, and encryptedKey.
