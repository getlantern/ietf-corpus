document: rfc-7582
kind: security-consideration
summary: There are no security considerations beyond those of RFC 6513 (Multicast in MPLS/BGP IP VPNs), RFC 6514 (BGP Encodings and Procedures for Multicast in MPLS/BGP IP VPNs), RFC 5015 (BIDIR-PIM), and RFC 6388 (LDP MP2MP extensions). The existing security frameworks from those documents fully apply.
