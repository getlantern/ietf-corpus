document: rfc-6785
kind: protocol-element
summary: The 'fileinto' action, when triggered by an IMAP event, stores the message into the fileinto mailbox in addition to (for APPEND/COPY) or as a copy from (for flag changes) the original mailbox. The 'fileinto' action itself is not an IMAP APPEND or COPY and does not trigger a subsequent Sieve invocation.
section: "3.3"
topics:
    - email
