document: rfc-6871
kind: wire-format
summary: 'The ''a=sescap'' ABNF is: att-value = session-num 1*WSP list-of-configs [1*WSP optional-configs]; list-of-configs = alt-config *('','' alt-config); optional-configs = ''['' list-of-configs '']''; alt-config = config-number *(''|'' config-number). Leading zeroes are not permitted in session-num or config-number.'
section: 3.3.8
topics:
    - realtime
