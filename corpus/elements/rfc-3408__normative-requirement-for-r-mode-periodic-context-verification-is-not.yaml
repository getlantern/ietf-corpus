document: rfc-3408
kind: normative-requirement
summary: For R-mode, periodic context verification is not needed and no change to ROHC RTP is required in this regard, because there is no CRC replacement in R-mode and the sending of R-0-CRC on 6-bit SN wrap-around implicitly provides periodic context verification.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - realtime
    - rtp
