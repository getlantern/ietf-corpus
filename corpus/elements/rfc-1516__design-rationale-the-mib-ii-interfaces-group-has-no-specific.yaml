document: rfc-1516
kind: design-rationale
summary: The MIB-II 'interfaces' group has NO specific relationship to a repeater's ports, because a repeater is a bit-level store-and-forward device with no MAC address, no MAC implementation, and no higher-layer protocol processing. The interfaces group applies only to the management entity's own network interfaces.
section: 2.4.2
topics:
    - snmp
