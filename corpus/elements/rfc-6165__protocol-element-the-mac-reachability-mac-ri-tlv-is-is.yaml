document: rfc-6165
kind: protocol-element
summary: The MAC-Reachability (MAC-RI) TLV is IS-IS TLV type 147. It carries a Topology-id/Nickname (2 bytes), a Confidence byte, a 4-bit RESV field, a 12-bit VLAN-ID, and one or more 48-bit unicast MAC addresses (6 bytes each). It is carried in IS-IS LSPs.
section: "2.2"
topics:
