document: rfc-9640
kind: interoperability-note
summary: 'The ietf-crypto-types module is the foundational dependency in a layered RFC family: truststore (RFC 9641) and keystore (RFC 9642) depend on it; these in turn support SSH, TLS, HTTP, NETCONF, and RESTCONF client/server modules. Implementors must implement ietf-crypto-types for the identity namespace to be available to all consuming modules.'
section: "1.1"
topics:
    - yang
    - netconf
    - crypto
    - tls
