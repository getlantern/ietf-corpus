document: rfc-1938
kind: security-consideration
summary: OTP protects only against passive eavesdropping/replay attacks. It does not provide privacy for transmitted data and does not protect against active attacks such as IP spoofing and hijacked TCP connections (per CERT CA-95:01).
section: "10.0"
topics:
    - security
