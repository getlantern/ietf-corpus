document: rfc-3977
kind: normative-requirement
summary: Registered extension capability labels and command names MUST NOT begin with 'X'. Private extension labels, if listed in capabilities, MUST begin with 'X'. If a server advertises a registered extension capability it MUST fully implement that extension; partial implementations MUST use a different (private) name.
section: 3.3.3
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
