document: rfc-9048
kind: privacy-consideration
summary: Use of permanent identifiers (IMSI, SUPI) in EAP-AKA' is strongly NOT RECOMMENDED as it enables subscriber tracking. Privacy-friendly identifiers (5G GUTI, SUCI, pseudonyms, fast re-authentication identities) are strongly RECOMMENDED. The SUCI null-scheme is also NOT RECOMMENDED where identity privacy matters.
section: "7.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
