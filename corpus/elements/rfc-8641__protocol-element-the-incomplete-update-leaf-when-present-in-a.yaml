document: rfc-8641
kind: protocol-element
summary: The incomplete-update leaf, when present in a push-update or push-change-update, indicates that not all changes since the last update are included and the publisher has failed to fulfill its full subscription obligations. On receipt, a receiver may wait, actively resync, or tear down the subscription.
section: 4.3.2
topics:
