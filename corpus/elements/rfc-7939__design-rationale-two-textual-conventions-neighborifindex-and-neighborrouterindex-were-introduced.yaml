document: rfc-7939
kind: design-rationale
summary: Two TEXTUAL-CONVENTIONs, NeighborIfIndex and NeighborRouterIndex, were introduced because NHDP indexes neighbor information via dynamic address sets whereas SMIv2 requires statically defined table indexes. These constructs provide a local mapping between NHDP address-set-based identity and integer-indexed MIB tables.
section: "5.3"
topics:
