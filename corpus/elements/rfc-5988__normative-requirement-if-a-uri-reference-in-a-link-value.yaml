document: rfc-5988
kind: normative-requirement
summary: If a URI-Reference in a link-value is relative, parsers MUST resolve it as per RFC 3986 Section 5. The base IRI from the message body content is NOT applied; only the request URI is used.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
