document: rfc-8915
kind: security-consideration
summary: NTS avoids DDoS amplification by requiring one NTS Cookie Placeholder extension field per desired return cookie, each padded to the same size as a real cookie. This ensures NTS-related response fields are never larger than the corresponding request fields.
section: "8.4"
topics:
