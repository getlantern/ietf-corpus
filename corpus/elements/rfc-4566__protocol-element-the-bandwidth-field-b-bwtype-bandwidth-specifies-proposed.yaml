document: rfc-4566
kind: protocol-element
summary: The bandwidth field (`b=<bwtype>:<bandwidth>`) specifies proposed bandwidth in kilobits per second. `CT` gives the conference total across all sites and sessions; `AS` gives application-specific bandwidth for a single media at a single site. The `X-` prefix is reserved for experimental use but NOT RECOMMENDED.
section: "5.8"
topics:
