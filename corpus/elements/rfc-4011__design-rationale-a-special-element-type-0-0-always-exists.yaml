document: rfc-4011
kind: design-rationale
summary: A special element type '0.0' always exists and represents the single instance of the system itself, providing an execution context for policies operating on scalar MIB objects. No actual element discovery takes place for '0.0', and pmElementTypeRegMaxLatency has no effect for it.
