document: rfc-4936
kind: protocol-element
summary: The t11ZsNotifyControlTable provides independent per-notification enable/disable control for all notification types in t11ZsNotificationGroup (zone merge success/failure, request rejections, default zone changes, zone set activation/deactivation). Included notification-control objects are read-only to allow querying the values sent in the most recent notification.
section: 5.8.6
topics:
    - snmp
