document: rfc-7280
kind: wire-format
summary: Optional Extension Header Type values registered at decimal 256 with H-LEN=1 yield Type 256 (0x0100); the same extension with H-LEN=3 yields Type 768 (0x0300). Bits 8-15 come from the registry entry; bits 5-7 carry the actual H-LEN value used.
section: "2.2"
