document: rfc-5239
kind: design-rationale
summary: The same conference object type is reused for all lifecycle stages (blueprint, reservation, active, completed) rather than using separate schemas per stage. This allows conferencing systems to support a subset of conferencing functions while remaining framework-compliant, and allows read-only participants to consume the core conference-type defined in RFC 4575.
section: "5"
topics:
    - realtime
