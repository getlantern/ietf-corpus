document: rfc-9503
kind: protocol-element
summary: When Control Code Reply Request flag is 0x0, the Session-Reflector does not transmit a reply and terminates the test packet; only one-way measurement applies. When set to 0x1, the Session-Reflector transmits the reply on the same incoming link in reverse direction.
section: 4.1.1
topics:
    - measurement
