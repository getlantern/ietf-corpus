document: rfc-5152
kind: interoperability-note
summary: The per-domain path computation technique is applicable to any node (not just boundary nodes) that receives a Path message with an ERO containing a loose hop or non-simple abstract node. When a strict node is present in the ERO, procedures from RFC 3209 apply with no further action needed.
section: "3.1"
topics:
    - routing
    - realtime
    - mpls
