document: rfc-3288
kind: design-rationale
summary: 'The boot exchange serves two distinct purposes: resource identification (each SOAP-profile channel is bound to a single resource/service) and feature negotiation (allowing future SOAP features such as compression to be negotiated at channel setup time rather than requiring new profiles).'
