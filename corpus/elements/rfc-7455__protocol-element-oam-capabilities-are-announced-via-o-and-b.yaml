document: rfc-7455
kind: protocol-element
summary: 'OAM capabilities are announced via O and B flags in the TRILL Version sub-TLV (TRILL-VER): O=1/B=0 signals new-style OAM; O=1/B=1 signals backwards-compatible OAM; O=0 means OAM incapable (B ignored). Absence of the TRILL-VER sub-TLV also means the RBridge is not OAM capable.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
