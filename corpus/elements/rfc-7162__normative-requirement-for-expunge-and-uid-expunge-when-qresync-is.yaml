document: rfc-7162
kind: normative-requirement
summary: For EXPUNGE and UID EXPUNGE, when QRESYNC is enabled and at least one message was permanently removed, the server MUST send HIGHESTMODSEQ in the tagged OK response. For CLOSE, the server MUST NOT send HIGHESTMODSEQ, as doing so could cause loss of synchronization on the client.
section: 3.2.7
rfc2119_level: MUST
topics:
    - email
