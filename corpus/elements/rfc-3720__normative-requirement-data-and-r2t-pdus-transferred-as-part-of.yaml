document: rfc-3720
kind: normative-requirement
summary: Data and R2T PDUs transferred as part of command execution MUST be sequenced via the DataSN field. For any read or bidirectional command, a target MUST issue fewer than 2**32 combined R2T and Data-In PDUs; any output data sequence MUST contain fewer than 2**32 Data-Out PDUs.
section: 3.2.2.3
rfc2119_level: MUST
topics:
    - tcp
