document: rfc-6060
kind: normative-requirement
summary: To initiate a bidirectional Eth-LSP, the initiator MUST set the LSP encoding type to Ethernet (2), MUST set the LSP switching type to '802_1 PBB-TE' (value 40), and MUST set the UPSTREAM_LABEL to the ESP-VID1/ESP-MAC1 tuple.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
