document: rfc-5580
kind: protocol-element
summary: The Operator-Name Attribute (Type 126) carries an operator namespace identifier (1 octet, ASCII-encoded) followed by a variable-length operator name text field. The combined value MUST NOT exceed 253 bytes and uniquely identifies the owner of an access network.
