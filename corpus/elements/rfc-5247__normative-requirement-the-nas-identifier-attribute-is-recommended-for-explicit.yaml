document: rfc-5247
kind: normative-requirement
summary: The NAS-Identifier Attribute is RECOMMENDED for explicit identification of the EAP authenticator in both the AAA protocol exchange and the Secure Association Protocol conversation, rather than using endpoint addresses or ports, since a NAS can have multiple IP addresses and authenticators can have multiple ports.
section: "2.3"
rfc2119_level: RECOMMENDED
topics:
