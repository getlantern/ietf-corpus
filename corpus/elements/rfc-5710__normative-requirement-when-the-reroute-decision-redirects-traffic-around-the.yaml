document: rfc-5710
kind: normative-requirement
summary: When the reroute decision redirects traffic around the local node, the local node MUST be indicated in the ERROR_SPEC object. When only an interface is impacted, the interface MUST be indicated and IF_ID ERROR_SPEC format SHOULD be used.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
