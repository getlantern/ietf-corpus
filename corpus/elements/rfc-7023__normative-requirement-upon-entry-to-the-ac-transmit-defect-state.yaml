document: rfc-7023
kind: normative-requirement
summary: Upon entry to the AC transmit defect state, PE1 MUST notify PE2 via a reverse defect notification (LDP PW status message or VCCV-BFD reverse defect diagnostic code). Upon exit from this state, PE1 MUST clear the reverse defect notification to PE2.
section: "6.7"
rfc2119_level: MUST
topics:
    - mpls
