document: rfc-3281
kind: normative-requirement
summary: When PKC-based authentication is used, the holder field SHOULD use baseCertificateID, where the PKC issuer MUST have a non-empty distinguished name and the holder's PKC serialNumber and issuer MUST be identical to the AC holder field. Only one of baseCertificateID, entityName, or objectDigestInfo SHOULD be present in any given AC.
section: 4.2.2
rfc2119_level: SHOULD
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
