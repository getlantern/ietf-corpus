document: rfc-7531
kind: protocol-element
summary: The stable_how4 enum (UNSTABLE4=0, DATA_SYNC4=1, FILE_SYNC4=2) controls write commit semantics. Clients may request weaker stability for performance and use COMMIT to flush to stable storage; the writeverf verifier detects server restarts between WRITE and COMMIT.
