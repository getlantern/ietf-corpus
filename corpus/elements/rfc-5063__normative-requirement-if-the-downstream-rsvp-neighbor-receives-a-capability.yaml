document: rfc-5063
kind: normative-requirement
summary: If the downstream RSVP neighbor receives a Capability object with the R-bit set but without the Restart_Cap object, it MUST process the Hello message as if the R-bit is cleared (0), preventing inadvertent RecoveryPath procedures without proper graceful restart advertisement.
section: 4.4.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
