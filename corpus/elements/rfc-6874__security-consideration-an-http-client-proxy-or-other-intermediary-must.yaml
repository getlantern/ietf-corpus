document: rfc-6874
kind: security-consideration
summary: An HTTP client, proxy, or other intermediary MUST remove any ZoneID attached to an outgoing URI, as it has only local significance at the sending host and its presence in an outgoing request represents both a privacy leak and a potential attack vector.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - ip
    - http
