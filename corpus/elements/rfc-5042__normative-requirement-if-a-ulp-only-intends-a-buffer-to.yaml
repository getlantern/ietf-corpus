document: rfc-5042
kind: normative-requirement
summary: If a ULP only intends a buffer to be exposed for remote write access, it MUST set the access rights to the buffer to only enable remote write access, preventing unintended RDMA Read disclosure. This requirement does not restrict zero-length RDMA Reads.
section: 6.3.5
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
