document: rfc-7307
kind: normative-requirement
summary: If an LSR receives a FEC element with an MT-ID value that is 'Unassigned' for future use and not IANA allocated yet, the LSR MUST abort the processing of the FEC element and SHOULD send a notification message with status code 'Invalid Topology ID' to the sender.
section: "3.7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
