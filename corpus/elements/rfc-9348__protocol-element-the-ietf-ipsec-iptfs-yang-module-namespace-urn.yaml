document: rfc-9348
kind: protocol-element
summary: The ietf-ipsec-iptfs YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-ipsec-iptfs, prefix iptfs) augments the IPsec YANG modules from RFC 9061 to add IP Traffic Flow Security configuration and operational state. It supports both the IKE model (ietf-i2nsf-ike) and the IKE-less model (ietf-i2nsf-ikeless), augmenting SPD entries and SAD entries in each.
section: "3.2"
topics:
