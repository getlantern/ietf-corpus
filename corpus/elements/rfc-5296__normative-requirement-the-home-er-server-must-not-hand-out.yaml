document: rfc-5296
kind: normative-requirement
summary: The home ER server MUST NOT hand out a given DSRK to a local domain server more than once, unless it can verify that the receiving entity is the same as the original recipient. The Authorization Indication TLV (Type 6) may be included to assure the peer that DSRK delivery is secure.
section: "8"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
