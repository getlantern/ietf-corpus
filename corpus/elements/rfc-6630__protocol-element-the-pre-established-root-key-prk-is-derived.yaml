document: rfc-6630
kind: protocol-element
summary: The pre-established Root Key (pRK) is derived from either the EMSK (when the peer is in the home AAA realm) or the DSRK (when in a visited realm). pRK = KDF(K, S) where S = 'EAP Early-Authentication Root Key@ietf.org' | '\0' | length.
section: "4.1"
