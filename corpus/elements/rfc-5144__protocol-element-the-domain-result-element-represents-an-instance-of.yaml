document: rfc-5144
kind: protocol-element
summary: 'The <domain> result element represents an instance of a domain assignment and includes child elements: <domainName> (required, RFC 1035 domain name), <idn> (optional, nameprep form), <status> (optional, domain status), <registrationReference>, <createdDateTime>, <initialDelegationDateTime>, <expirationDateTime>, <lastDatabaseUpdateDateTime>, and <iris:seeAlso>.'
