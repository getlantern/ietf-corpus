document: rfc-8513
kind: protocol-element
summary: The 'b4-address-change-limit' leaf (type uint32, units seconds, default 1800, feature 'aftr') enforces a minimum interval between successive B4 IPv6 address changes from the same prefix, rate-limiting potential DoS attacks via frequent source address changes. RFC 7785 recommends 30 minutes.
section: "3"
topics:
