document: rfc-9142
kind: design-rationale
summary: To avoid combinatorial explosion of key exchange names, newer key exchanges are generally restricted to *-sha256 and *-sha512 variants only. The exceptions are ecdh-sha2-nistp384 and gss-nistp384-sha384-*, which use SHA-384 to match the curve's 192-bit security level.
section: "1.1"
topics:
