document: rfc-7543
kind: protocol-element
summary: CP-ORF (Covering Prefixes Outbound Route Filter) is a new ORF type (code point 65) that a BGP speaker sends to a peer to pull routes that cover a specified host address. A prefix covers a host address if it can be used to forward traffic towards that host address.
