document: rfc-2178
kind: protocol-element
summary: 'Router classification defines four overlapping categories: Internal routers (all interfaces in one area), Area Border Routers (interfaces in multiple areas, run one SPF instance per area), Backbone Routers (at least one backbone interface), and AS Boundary Routers (exchange routing info with other Autonomous Systems and advertise external routes throughout the AS).'
section: "3.3"
topics:
    - routing
