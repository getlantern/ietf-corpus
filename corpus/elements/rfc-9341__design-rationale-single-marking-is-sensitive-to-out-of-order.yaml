document: rfc-9341
kind: design-rationale
summary: Single-Marking is sensitive to out-of-order reception and only yields mean delay without distribution information. Double-Marking was introduced to obtain minimum, maximum, median, and percentile delay values and to robustly identify which measurement packet was lost within a block.
section: 3.2.2
