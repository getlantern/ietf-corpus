document: rfc-7780
kind: normative-requirement
summary: If a TRILL switch advertises any NickFlags APPsub-TLV entries with the IN (Ingress) flag set, it MUST NOT use any other nickname(s) it owns as the Ingress Nickname in TRILL Headers it constructs. If no IN-flagged entries are advertised, any owned nickname may be used as ingress.
section: "8.4"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
