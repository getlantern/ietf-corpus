document: rfc-9022
kind: protocol-element
summary: The Domain Name Object (rdeDomain) is based on the EPP domain info response (RFC 5731) and includes name (A-label), ROID, optional Unicode name (<uName>), IDN table reference, statuses, optional RGP sub-statuses, registrant, contacts, name servers, DNSSEC data, sponsoring registrar, creation/expiry/update dates, and optional transfer data.
