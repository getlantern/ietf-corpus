document: rfc-1812
kind: security-consideration
summary: 'Routing protocol security is critical: unauthenticated routing updates can be used to redirect traffic or cause denial of service. Routers SHOULD use authentication mechanisms provided by each routing protocol (e.g., MD5 authentication in OSPF and BGP) and SHOULD validate the source addresses of routing protocol messages.'
section: 7.1.1
topics:
    - routing
    - security
    - bgp
