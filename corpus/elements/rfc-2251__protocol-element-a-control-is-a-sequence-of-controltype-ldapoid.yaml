document: rfc-2251
kind: protocol-element
summary: A Control is a SEQUENCE of controlType (LDAPOID), criticality (BOOLEAN DEFAULT FALSE), and optional controlValue (OCTET STRING). If a critical control is unrecognized or inappropriate, the server MUST NOT perform the operation and MUST return unsupportedCriticalExtension; non-critical unrecognized controls MUST be ignored.
section: 4.1.12
rfc2119_level: MUST
topics:
    - ldap
