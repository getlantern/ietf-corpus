document: rfc-7791
kind: interoperability-note
summary: When both VPN endpoints have multiple interfaces (n x m topology), care must be taken to avoid duplicate VPN creation by both ends simultaneously or conflicting MOBIKE moves. The protocol does not prescribe coordination; local policy governs which VPNs to clone and when.
section: "1"
topics:
