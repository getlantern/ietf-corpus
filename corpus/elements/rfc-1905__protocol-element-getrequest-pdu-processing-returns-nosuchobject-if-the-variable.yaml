document: rfc-1905
kind: protocol-element
summary: GetRequest-PDU processing returns noSuchObject if the variable's OID prefix does not match any accessible variable, or noSuchInstance if the prefix matches but the exact instance does not exist. These per-binding exceptions allow partial success in a single response.
