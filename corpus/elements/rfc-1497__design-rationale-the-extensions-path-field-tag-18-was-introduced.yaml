document: rfc-1497
kind: design-rationale
summary: The Extensions Path field (Tag 18) was introduced to overcome the 64-byte size constraint on the BOOTP vendor field, allowing an unconstrained-length file retrieved via TFTP to carry additional vendor extension data interpreted by the same rules.
section: BOOTP Vendor Information Format
