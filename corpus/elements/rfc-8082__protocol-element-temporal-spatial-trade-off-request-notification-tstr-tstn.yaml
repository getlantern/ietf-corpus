document: rfc-8082
kind: protocol-element
summary: Temporal-Spatial Trade-Off Request/Notification (TSTR/TSTN, RFC 5104 Sections 4.3.2 and 4.3.3) includes an SSRC target that may refer to any layer's RTP stream, and the semantics apply to layers present in the targeted RTP stream. Per-layer TSTR/TSTN is considered potentially counterproductive in layered codec systems because adjusting spatio/temporal quality balance may involve more than just the addressed stream.
section: "6.4"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
