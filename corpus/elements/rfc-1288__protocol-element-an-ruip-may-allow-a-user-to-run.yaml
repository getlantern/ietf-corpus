document: rfc-1288
kind: protocol-element
summary: An RUIP MAY allow a user to run a program in response to a Finger query. If this feature exists, the system administrator SHOULD be allowed to specifically enable or disable it; the RUIP MUST NOT allow system security to be compromised by that program.
section: 2.5.2
topics:
    - security
