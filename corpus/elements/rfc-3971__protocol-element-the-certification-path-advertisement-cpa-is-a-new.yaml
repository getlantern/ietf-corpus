document: rfc-3971
kind: protocol-element
summary: The Certification Path Advertisement (CPA) is a new ICMPv6 message (Type 149) sent by routers in response to CPS. It includes Identifier, All Components (total number of certificates in path), and Component (index of current certificate, sent in order from trust-anchor end, with the trust anchor's own certificate omitted).
section: 6.4.2
topics:
    - security
    - pkix
    - ip
