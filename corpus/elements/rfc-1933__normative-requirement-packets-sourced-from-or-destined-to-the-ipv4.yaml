document: rfc-1933
kind: normative-requirement
summary: Packets sourced from or destined to the IPv4 loopback address must not be sent onto the network; implementations may treat ::127.0.0.1 as an IPv6 loopback address, and such packets should also remain entirely within the node.
section: 3.1.1
rfc2119_level: SHOULD
topics:
