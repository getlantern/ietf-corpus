document: rfc-5055
kind: protocol-element
summary: 'Seven check OIDs under id-stc (pkix arc 17) define what the server should perform: id-stc-build-pkc-path (DPD), id-stc-build-valid-pkc-path (DPV without revocation), id-stc-build-status-checked-pkc-path (DPV with revocation), and four analogous checks for attribute certificates. Servers supporting DPD MUST support id-stc-build-pkc-path; servers supporting DPV MUST support id-stc-build-valid-pkc-path and id-stc-build-status-checked-pkc-path.'
section: 3.2.2
topics:
