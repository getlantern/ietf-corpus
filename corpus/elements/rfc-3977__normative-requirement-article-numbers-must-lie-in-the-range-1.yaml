document: rfc-3977
kind: normative-requirement
summary: Article numbers MUST lie in the range 1 to 2,147,483,647 inclusive. The server MUST issue article numbers in arrival order (later articles MUST receive higher numbers) and SHOULD allocate the next sequential unused number to each new article.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
