document: rfc-3425
kind: security-consideration
summary: If IQUERY were not obsoleted, securing its responses with DNSSEC would be extremely difficult without on-the-fly digital signing. Removing IQUERY is unlikely to open new security holes since absence of a positive response would logically lead to denial of authentication.
section: "4"
topics:
    - dns
    - security
