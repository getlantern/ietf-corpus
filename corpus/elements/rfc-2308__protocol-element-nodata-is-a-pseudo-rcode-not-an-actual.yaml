document: rfc-2308
kind: protocol-element
summary: NODATA is a pseudo-RCODE (not an actual RCODE value) indicating the name is valid but no records of the queried type exist. It is inferred algorithmically from an NOERROR response with no relevant answers and an SOA or no NS records in the authority section.
section: "2.2"
