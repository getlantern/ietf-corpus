document: rfc-2284
kind: normative-requirement
summary: All EAP implementations MUST support Types 1 (Identity), 2 (Notification), 3 (Nak), and 4 (MD5-Challenge). The Nak Type MUST NOT be sent in a Request; it MUST only be sent in response to a Request that uses an authentication Type code.
section: "3"
rfc2119_level: MUST
topics:
    - security
