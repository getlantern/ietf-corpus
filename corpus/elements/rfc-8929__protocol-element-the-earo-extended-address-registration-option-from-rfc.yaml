document: rfc-8929
kind: protocol-element
summary: The EARO (Extended Address Registration Option) from RFC 8505 is used over the backbone in NS, NA, and RS messages to carry ROVR (distinguishes duplication from movement) and TID (orders registrations). 6BBRs also exchange EDAR/EDAC messages with an optional 6LBR for pre-DAD duplicate checking; EDAR SHOULD carry an SLLAO and EDAC SHOULD carry a TLLAO.
section: "3"
