document: rfc-9056
kind: design-rationale
summary: 'The three main differences of mapping IP to DetNet MPLS (compared to plain MPLS) are: (1) mandatory flow identification for forwarding decisions rather than FEC-based forwarding, (2) the d-CW is mandatory for MPLS encapsulation, and (3) DetNet-flow-specific traffic treatment is required during forwarding.'
