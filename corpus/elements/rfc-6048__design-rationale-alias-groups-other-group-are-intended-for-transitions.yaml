document: rfc-6048
kind: design-rationale
summary: Alias groups ('=other.group') are intended for transitions such as group renames or spelling corrections, and an alias SHOULD NOT point to itself or another alias. The target group SHOULD exist and be visible to any client that can see the original group.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
