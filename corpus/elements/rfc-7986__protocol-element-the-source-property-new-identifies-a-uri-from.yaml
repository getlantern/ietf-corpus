document: rfc-7986
kind: protocol-element
summary: The SOURCE property (new) identifies a URI from which calendar data can be refreshed. Its value type is URI (no default, VALUE=URI required). It may appear at most once and differs from URL in that SOURCE is the origin location of the data.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
