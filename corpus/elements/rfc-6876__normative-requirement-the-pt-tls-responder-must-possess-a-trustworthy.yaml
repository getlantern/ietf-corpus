document: rfc-6876
kind: normative-requirement
summary: The PT-TLS Responder MUST possess a trustworthy X.509 certificate used to authenticate to the PT-TLS Initiator and bootstrap TLS session security. The PT-TLS Initiator MAY also present an X.509 certificate for bidirectional authentication.
section: 3.4.2.1
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
