document: rfc-4287
kind: normative-requirement
summary: Atom Processors that decrypt Atom Documents MUST support AES-128 in CBC mode. XML Encryption alone does not ensure integrity; processors SHOULD verify a hash (from an embedded signature or explicit hash) after decryption to guard against bit-manipulation attacks.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
