summary: 'The pmip6BindingRegCounters group defines 17 Counter32 objects tracking PMIPv6 binding events at the LMA: rejected PBUs (codes 152–162), initial registrations, lifetime extensions (same MAG and after handoff), de-registrations, binding acknowledgements, and a discontinuity timestamp (pmip6CounterDiscontinuityTime).'
