document: rfc-2218
kind: normative-requirement
summary: IWPS client applications should use the recommended field sizes as maximum sizes, but must be able to handle attributes of arbitrary size returned by a non-compliant server. All size recommendations are in characters, not bytes.
section: "5.0"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
