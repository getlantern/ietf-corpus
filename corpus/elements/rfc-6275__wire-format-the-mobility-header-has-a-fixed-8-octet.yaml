summary: 'The Mobility Header has a fixed 8-octet header: Payload Proto (8-bit, Next Header value of following header), Header Len (8-bit, length in 8-octet units excluding first 8 octets), MH Type (8-bit), Reserved (8-bit, zero), Checksum (16-bit one''s complement), followed by variable-length Message Data.'
