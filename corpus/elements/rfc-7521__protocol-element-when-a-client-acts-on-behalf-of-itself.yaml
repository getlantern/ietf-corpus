document: rfc-7521
kind: protocol-element
summary: 'When a client acts on behalf of itself (analogous to the Client Credentials Grant), it combines both authentication and authorization grant patterns: it uses ''client_assertion_type'' and ''client_assertion'' for authentication while specifying grant_type=client_credentials for the authorization request.'
section: "6.2"
topics:
