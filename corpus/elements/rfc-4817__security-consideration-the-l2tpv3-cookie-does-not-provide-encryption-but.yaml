document: rfc-4817
kind: security-consideration
summary: The L2TPv3 Cookie does not provide encryption but, when used as a sufficiently random 64-bit secret value, acts as a packet source authentication check resistant to brute-force spoofing. It validates the Session ID on each packet and complements IPsec protection.
section: "6.2"
