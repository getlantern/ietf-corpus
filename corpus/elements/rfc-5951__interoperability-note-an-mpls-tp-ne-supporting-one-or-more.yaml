document: rfc-5951
kind: interoperability-note
summary: An MPLS-TP NE supporting one or more other networking technologies (e.g., Ethernet, SDH/SONET, MPLS) over MPLS-TP MUST be capable of translating MPLS-TP defects into failure conditions meaningful to the client layer, as described in RFC 4377 Section 4.7.
section: 5.3.3
topics:
    - mpls
