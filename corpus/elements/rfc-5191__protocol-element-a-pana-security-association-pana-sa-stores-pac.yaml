kind: protocol-element
summary: 'A PANA Security Association (PANA SA) stores: PaC_nonce, PAA_nonce, MSK, MSK Identifier, PANA_AUTH_KEY, the negotiated PRF, and the negotiated integrity algorithm. The SA lifetime equals the PANA session lifetime and is deleted upon session termination.'
