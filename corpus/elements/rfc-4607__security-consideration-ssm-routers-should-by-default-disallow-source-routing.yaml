document: rfc-4607
kind: security-consideration
summary: SSM routers SHOULD by default disallow source routing (both Loose and Strict, RFC 791) to an SSM destination address, as source routing combined with source address spoofing can allow an attacker to inject packets onto an SSM channel.
section: "7.4"
rfc2119_level: SHOULD
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
