document: rfc-7946
kind: interoperability-note
summary: Coordinate precision has a large impact on GeoJSON text size; increasing precision from 6 to 15 decimal places can nearly double the size of texts with many detailed Polygons. Six decimal places (~10 cm) is well within GPS precision. Implementations should consider the cost of using greater precision than necessary.
section: "11.2"
topics:
    - json
