document: rfc-3266
kind: interoperability-note
summary: An implementation may receive an SDP session description with an IPv6 address that is internally an IPv4-mapped address. Such an address is actually the address of an IPv4-only node, and implementors are warned to interpret IPv4-mapped addresses as equivalent to IP4.
section: "5"
topics:
    - realtime
    - ip
    - v6ops
