document: rfc-9766
kind: design-rationale
summary: A client may present all mirrors in ff_layout_wcc4 (with an empty attribute mask for unmodified ones) or only mirrors with updated attributes; the triple (ffdsw_deviceid, ffdsw_stateid, ffdsw_fh_vers) unambiguously identifies each data server regardless of how many mirrors are included, making positional-only matching insufficient.
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
