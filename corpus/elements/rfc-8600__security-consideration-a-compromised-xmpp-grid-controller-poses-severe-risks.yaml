document: rfc-8600
kind: security-consideration
summary: A compromised XMPP-Grid Controller poses severe risks beyond what a Platform can do, including exposing different data to different Platforms (inconsistent views), obtaining and caching Platform credentials for future impersonation, and eavesdropping or modifying data in transit between Providers and Consumers.
section: 8.2.3
topics:
