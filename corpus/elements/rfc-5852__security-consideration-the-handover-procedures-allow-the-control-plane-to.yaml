document: rfc-5852
kind: security-consideration
summary: The Handover procedures allow the Control Plane to take an LSP out of Management Plane control, which could cause considerable disruption and introduce a new security concern. The use of GMPLS security techniques is therefore more important; implementors should refer to RFC 3473 for RSVP-TE security and the GMPLS security framework.
section: "9"
topics:
    - security
    - routing
    - mpls
