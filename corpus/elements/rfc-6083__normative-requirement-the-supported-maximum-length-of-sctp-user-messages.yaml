document: rfc-6083
kind: normative-requirement
summary: The supported maximum length of SCTP user messages MUST be at least 18445 bytes (2^14 + 2048 + 13), and the SCTP implementation MUST support fragmentation of user messages to accommodate full-sized DTLS records.
section: "4.1"
rfc2119_level: MUST
topics:
