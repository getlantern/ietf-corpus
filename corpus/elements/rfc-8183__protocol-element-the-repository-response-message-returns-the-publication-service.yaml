summary: The <repository_response/> message returns the publication service_uri, the repository's name for the publisher (publisher_handle), the rsync:// sia_base URI for the allocated publication space, an optional rrdp_notification_uri for RRDP coverage, and the repository's BPKI CA certificate (<repository_bpki_ta/>).
