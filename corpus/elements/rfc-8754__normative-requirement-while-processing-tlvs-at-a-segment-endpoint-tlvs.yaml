document: rfc-8754
kind: normative-requirement
summary: While processing TLVs at a segment endpoint, TLVs MUST be fully contained within the SRH as determined by the Hdr Ext Len. Detection of TLVs exceeding this boundary results in an ICMP Parameter Problem, Code 0, message to the Source Address and the packet being discarded.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
