document: rfc-7352
kind: interoperability-note
summary: When a Sieve script includes other scripts via the 'include' extension, all 'duplicate' tests across included scripts within a single execution with identical arguments MUST yield the same result, since the tracking list is only updated at the end of the outermost successful execution.
