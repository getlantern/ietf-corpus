document: rfc-2625
kind: protocol-element
summary: FARP uses two ELS commands—FARP-REQ (broadcast, no reply sequence) and FARP-REPLY (unicast, followed by ACCEPT or REJECT). Login is not required to issue a FARP-REQ or to send a FARP-REPLY. At most one FARP-REPLY is generated per FARP-REQ.
section: "5.2"
topics:
