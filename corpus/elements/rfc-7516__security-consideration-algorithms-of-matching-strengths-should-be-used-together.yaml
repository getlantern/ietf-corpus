document: rfc-7516
kind: security-consideration
summary: Algorithms of matching strengths should be used together. When AES Key Wrap is used, the same key size should be used for AES GCM. If key encryption and content encryption algorithms differ, the effective security is determined by the weaker algorithm.
section: "11.3"
