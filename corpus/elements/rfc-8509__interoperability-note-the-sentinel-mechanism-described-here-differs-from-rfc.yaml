document: rfc-8509
kind: interoperability-note
summary: The sentinel mechanism described here differs from RFC 8145, which has resolvers report cached trust anchors to root servers. RFC 8145 measures resolver impact but not end-user impact; this sentinel mechanism addresses user-facing impact of a KSK roll.
section: "1"
topics:
    - dns
    - measurement
