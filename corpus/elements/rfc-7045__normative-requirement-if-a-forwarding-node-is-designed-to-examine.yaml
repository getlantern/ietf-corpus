document: rfc-7045
kind: normative-requirement
summary: If a forwarding node is designed to examine extension headers for any reason, it MUST recognise and deal appropriately with all standard IPv6 extension header types, and SHOULD recognise and deal appropriately with experimental IPv6 extension header types. Implementors are advised to check the IANA list regularly for updates.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
