document: rfc-6555
kind: normative-requirement
summary: After performing connection attempts, the client MUST cache information regarding the outcome of each connection attempt and use that information to avoid thrashing the network with subsequent attempts. Cache entries should be flushed when their age exceeds a system-defined maximum on the order of 10 minutes.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
