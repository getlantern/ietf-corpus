summary: 'The ''sap-entry'' grouping defines core SAP fields: ''sap-id'' (string, node-scoped unique key), ''description'' (string), ''parent-termination-point'' (nt:tp-id), ''attachment-interface'' (string), ''interface-type'' (identityref), ''encapsulation-type'' (identityref from RFC 9181), ''role'' (UNI/NNI identityref), ''allows-child-saps'' (boolean), and ''peer-sap-id'' (leaf-list of strings).'
