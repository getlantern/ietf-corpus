document: rfc-5949
kind: normative-requirement
summary: When a MAG receives an HI message with the 'U' (buffer) flag set, it MUST be followed by another HI message with the 'F' (forwarding) flag set at an appropriate time to forward the buffered packets.
section: "4.2"
