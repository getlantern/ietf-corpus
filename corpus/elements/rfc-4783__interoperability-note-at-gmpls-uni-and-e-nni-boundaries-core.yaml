document: rfc-4783
kind: interoperability-note
summary: At GMPLS UNI and E-NNI boundaries, core-nodes MAY filter or modify alarm information from the core network before forwarding to client-node or peering LSPs, to protect internal network information or facilitate the peer's understanding of failures. Core-nodes MAY also choose not to request alarm reporting on outgoing Path messages.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
