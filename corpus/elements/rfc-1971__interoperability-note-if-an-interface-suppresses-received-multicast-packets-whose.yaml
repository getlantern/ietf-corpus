document: rfc-1971
kind: interoperability-note
summary: If an interface suppresses received multicast packets whose link-layer source address matches the interface's own address (a common loopback suppression heuristic), DAD will fail when another node shares the same link-layer address. The implementation must not filter packets solely on matching link-layer source address during DAD.
section: Appendix
