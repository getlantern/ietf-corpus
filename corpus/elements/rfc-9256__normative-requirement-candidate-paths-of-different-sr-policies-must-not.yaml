document: rfc-9256
kind: normative-requirement
summary: Candidate paths of different SR Policies MUST NOT have the same BSID. When a specified BSID is not available (optionally not in the SRLB), an alert message MUST be generated via mechanisms like syslog.
section: "6.1"
rfc2119_level: MUST NOT
