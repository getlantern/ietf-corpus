document: rfc-9844
kind: design-rationale
summary: RFC 6874 attempted to encode zone identifiers in URIs (using percent-encoding), but browser implementors found this impracticable. RFC 9844 replaces that URI-specific approach with a generic UI requirement, making zone identifier support achievable for all non-browser tools without requiring URI syntax changes.
section: "3"
topics:
    - ip
    - http
    - v6ops
