document: rfc-9090
kind: security-consideration
summary: An attacker may trick an application into treating a byte string inside a tag-factored data item as falling under an OID tag when it was not intended to, causing the application to emit data with unintended semantics. Applications must be restrictive about what data items they apply tag factoring to.
section: "8"
topics:
    - cbor
    - security
