document: rfc-5109
kind: protocol-element
summary: The protection operation builds an FEC bit string as the bitwise XOR of 'protected bit strings' from associated media packets. For the FEC header, the protected bit string is 80 bits formed from the first 64 bits of the RTP header plus a 16-bit payload-length representation; for the FEC payload, full RTP packet data are XOR'd per level.
section: "8"
