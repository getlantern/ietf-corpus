document: rfc-2592
kind: security-consideration
summary: 'VACM configuration examples in Section 8 illustrate three security profiles: a sandbox for guest access (restricting language and smCodeTable access), shared scripts (allowing multiple managers read-only access to a common script), and emergency scripts (granting elevated access to specific scripts during emergencies). These demonstrate how VACM views can isolate Script MIB functions.'
