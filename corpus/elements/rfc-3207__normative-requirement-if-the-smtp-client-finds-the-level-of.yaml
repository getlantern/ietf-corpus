document: rfc-3207
kind: normative-requirement
summary: If the SMTP client finds the level of authentication or privacy insufficient, it SHOULD issue a QUIT command immediately after TLS negotiation completes. If the server finds it insufficient, it SHOULD reply with 554 to every subsequent client command except QUIT.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - email
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
