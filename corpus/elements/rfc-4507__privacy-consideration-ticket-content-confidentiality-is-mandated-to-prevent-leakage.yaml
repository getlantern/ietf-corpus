document: rfc-4507
kind: privacy-consideration
summary: Ticket content confidentiality is mandated to prevent leakage of user-relevant information. However, an on-path adversary observing multiple handshakes using the same ticket can link them to the same endpoints, so unlinkability is not guaranteed.
section: "5.8"
topics:
    - tls
    - privacy
