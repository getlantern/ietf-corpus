document: rfc-6389
kind: interoperability-note
summary: LDP P2MP on a LAN procedures can coexist with LSRs that do not support upstream label assignment. Ingress replication and downstream label assignment continue to be used for those LSRs that do not advertise the Upstream Label Assignment Capability.
