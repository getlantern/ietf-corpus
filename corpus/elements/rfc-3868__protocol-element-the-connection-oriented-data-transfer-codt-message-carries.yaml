document: rfc-3868
kind: protocol-element
summary: The Connection Oriented Data Transfer (CODT) message carries connection-oriented data; it represents DT1 (Sequence Number present with 'more' indicator), DT2 (Sequence Number present with P(S)/P(R)/more), or Expedited Data (Sequence Number absent) depending on presence of the Sequence Number parameter.
