document: rfc-6147
kind: protocol-element
summary: Pref64::/n is the IPv6 prefix used by DNS64 to construct IPv6 representations of IPv4 addresses. It may be the Well-Known Prefix 64:ff9b::/96 (reserved by RFC 6052) or a Network-Specific Prefix (NSP) assigned by the operating organization. The same Pref64::/n must be configured identically in both DNS64 and the paired IPv6/IPv4 translator.
section: "2"
