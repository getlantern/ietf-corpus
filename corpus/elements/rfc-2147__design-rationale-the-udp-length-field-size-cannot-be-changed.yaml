document: rfc-2147
kind: design-rationale
summary: The UDP length field size cannot be changed, so a zero value was chosen to signal that the field should be ignored and the pseudo-header length used instead. This works because the minimum valid UDP length is 8 (the header alone), making zero otherwise invalid.
