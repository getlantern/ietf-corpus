document: rfc-5908
kind: normative-requirement
summary: The option number for OPTION_NTP_SERVER MAY appear in the Option Request option in Solicit, Request, Renew, Rebind, Information-Request, and Reconfigure messages. If it appears in other message types, the receiver SHOULD ignore it.
section: "5"
rfc2119_level: MAY
