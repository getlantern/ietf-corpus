document: rfc-3270
kind: design-rationale
summary: The specification defines two complementary LSP types—E-LSPs (EXP-Inferred-PSC) and L-LSPs (Label-Only-Inferred-PSC)—to give network administrators flexibility in mapping Diff-Serv Behavior Aggregates onto Label Switched Paths while optimizing for Traffic Engineering and MPLS protection objectives. Label space is conserved by only resorting to multiple LSPs per FEC when required.
section: "1"
topics:
