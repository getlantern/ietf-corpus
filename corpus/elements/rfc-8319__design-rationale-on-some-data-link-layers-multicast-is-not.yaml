document: rfc-8319
kind: design-rationale
summary: On some data link layers, multicast is not natively supported, making any reduction of multicast traffic highly beneficial. The fixed protocol constants in RFC 4861 made it difficult to relax multicast timers for Neighbor Discovery, motivating per-link overrides of MaxRtrAdvInterval and router lifetime.
section: "1"
topics:
