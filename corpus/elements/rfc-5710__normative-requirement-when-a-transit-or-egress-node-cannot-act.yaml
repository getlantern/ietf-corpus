document: rfc-5710
kind: normative-requirement
summary: 'When a transit or egress node cannot act locally on a reroute, it MUST issue a PathErr message containing an ERROR_SPEC object with one of three error code/value combinations: ''Notify/Local node maintenance required'', ''Notify/Local link maintenance required'', or ''Reroute/<any Reroute error value>''.'
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
