document: rfc-1196
kind: security-consideration
summary: Sound implementation of Finger is of utmost importance; an RUIP SHOULD protect itself against malformed inputs and be subjected to penetration testing. Finger is explicitly identified as a security perimeter protocol comparable to Telnet, FTP, and SMTP, and was exploited by the Morris worm.
section: "3.1"
topics:
    - security
