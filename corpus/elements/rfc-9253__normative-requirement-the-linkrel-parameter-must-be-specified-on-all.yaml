document: rfc-9253
kind: normative-requirement
summary: The LINKREL parameter MUST be specified on all LINK properties to define the type of reference. There is no default relation type; its presence allows consuming programs to scan for supported reference types.
section: "6.1"
rfc2119_level: MUST
