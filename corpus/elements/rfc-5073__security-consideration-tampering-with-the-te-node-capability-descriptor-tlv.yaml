document: rfc-5073
kind: security-consideration
summary: Tampering with the TE Node Capability Descriptor TLV may affect Traffic Engineering computation, but since it is not used for SPF computation or normal routing, it has no direct effect on IP routing. Existing IS-IS Link State PDU security mechanisms (RFC 3567) and OSPF LSA security (RFC 2154) can be used to secure this TLV.
section: "7"
topics:
    - security
    - routing
    - mpls
