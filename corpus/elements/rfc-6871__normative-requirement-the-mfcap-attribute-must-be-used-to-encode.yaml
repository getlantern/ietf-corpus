document: rfc-6871
kind: normative-requirement
summary: The 'mfcap' attribute MUST be used to encode format parameters for media capabilities that would conventionally appear in an 'fmtp' attribute. The existing 'acap' attribute MUST NOT be used to encode 'fmtp' attributes.
section: 3.3.2
rfc2119_level: MUST NOT
