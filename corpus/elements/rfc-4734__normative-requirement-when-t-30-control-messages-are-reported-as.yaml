document: rfc-4734
kind: normative-requirement
summary: 'When T.30 control messages are reported as V.21 bit events, the transmitted information MUST include the complete message: initial HDLC flags, information field, checksum, terminating HDLC flags, and extra ''0'' bits that prevent false HDLC flag recognition.'
section: "2.6"
rfc2119_level: MUST
topics:
