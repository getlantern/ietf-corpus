document: rfc-7512
kind: design-rationale
summary: 'The ''pin-source'' attribute value format is intentionally left implementation-specific to avoid limiting PKCS #11 URI portability. A priority order of interpretations is provided (URI reference, then pipe command, then implementation-defined) as a SHOULD guideline rather than a strict requirement.'
section: "2.4"
