document: rfc-1997
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed. Implementations should be aware that the COMMUNITIES attribute is optional and transitive, meaning it may be propagated across ASes and could be used to influence routing policy in unintended ways if not filtered.
section: Security Considerations
