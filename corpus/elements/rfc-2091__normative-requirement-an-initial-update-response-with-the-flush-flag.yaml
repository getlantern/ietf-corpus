document: rfc-2091
kind: normative-requirement
summary: An initial Update Response with the Flush flag set MAY contain no routes and is used at power-on to flush routes learned by the peer from a previous incarnation of the router, preventing stale acknowledgements from causing confusion about which routes are confirmed.
section: "4.2"
rfc2119_level: MAY
topics:
    - routing
