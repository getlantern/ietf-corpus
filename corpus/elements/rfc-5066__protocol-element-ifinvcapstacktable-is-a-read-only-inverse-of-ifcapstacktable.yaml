document: rfc-5066
kind: protocol-element
summary: ifInvCapStackTable is a read-only inverse of ifCapStackTable, indexed with lower-layer first and higher-layer second, allowing efficient lookup of which higher-layer interfaces can sit above a given lower-layer interface. It contains exactly the same rows as ifCapStackTable but in reverse index order.
section: "5"
