summary: 'A printer is modeled as 13 sub-unit types: General Printer, Inputs, Media, Outputs, Finishers, Markers, Media Paths, System Controller (Host Resources MIB), Interfaces (MIB-II), Print Job Delivery Channels, Interpreters, Console, and Alerts. Sub-units may be logical processes rather than physical mechanisms.'
