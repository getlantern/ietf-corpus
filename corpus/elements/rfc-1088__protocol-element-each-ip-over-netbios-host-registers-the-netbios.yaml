document: rfc-1088
kind: protocol-element
summary: Each IP-over-NetBIOS host registers the NetBIOS name IP.XX.XX.XX.XX, where each XX is the two-character ASCII hexadecimal representation of the corresponding octet of the host's IP address. This deterministic mapping eliminates the need for an address resolution protocol such as ARP.
section: Address Mappings
topics:
    - ip
