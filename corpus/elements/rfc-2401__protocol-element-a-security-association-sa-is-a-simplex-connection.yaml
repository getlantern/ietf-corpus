document: rfc-2401
kind: protocol-element
summary: 'A Security Association (SA) is a simplex ''connection'' that affords security services using either AH or ESP but not both. An SA is uniquely identified by a triple: Security Parameter Index (SPI), IP Destination Address, and security protocol (AH or ESP). Two SAs (one in each direction) are required for typical bidirectional communication.'
section: "4.1"
topics:
    - ipsec
    - security
