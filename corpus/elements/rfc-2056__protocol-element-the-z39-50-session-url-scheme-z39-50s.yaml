document: rfc-2056
kind: protocol-element
summary: The Z39.50 Session URL (scheme z39.50s) provides the mechanism to switch the user to a Z39.50 client application. Host is required; port is optional (defaults to 210); all other parameters are optional. The client leaves the session open for the user after any initial search.
section: "3"
