document: rfc-3028
kind: interoperability-note
summary: Implementations SHOULD decode message header charsets to UTF-8 for comparison, supporting at minimum US-ASCII, ISO-8859-1, and UTF-8. Implementations that do not support this MUST treat any string containing octets above 127 as unequal to any other string.
section: 2.7.2
topics:
    - email
