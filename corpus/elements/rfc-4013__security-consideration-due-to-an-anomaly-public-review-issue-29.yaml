summary: 'Due to an anomaly (Public Review Issue #29) in the Unicode normalization specification, canonical equivalence is not guaranteed for a select few character sequences. These sequences do not appear in well-formed text, and the specification was published despite this known technical problem, with the expectation it will be revised.'
