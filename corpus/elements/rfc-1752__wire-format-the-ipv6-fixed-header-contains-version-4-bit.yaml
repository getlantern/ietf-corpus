document: rfc-1752
kind: wire-format
summary: 'The IPv6 fixed header contains: Version (4-bit), Flow Label (28-bit), Payload Length (16-bit unsigned), Next Header (8-bit selector using IPv4 Protocol field values), Hop Limit (8-bit unsigned), Source Address (128-bit), and Destination Address (128-bit). Total header is 40 octets, twice IPv4 despite four-times-longer addresses.'
section: "12.1"
