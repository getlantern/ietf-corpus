document: rfc-4331
kind: protocol-element
summary: 'DAV:quota-used-bytes is a live, computed property on collections (DAV: namespace) containing the amount of storage in octets counted against the quota for the resource and possibly related resources sharing the same quota pool. It must include sub-resource usage and should include metadata storage if that counts against the quota.'
section: "4"
