document: rfc-8480
kind: normative-requirement
summary: When receiving a duplicate 6P message (same SeqNum and type as the last frame from that neighbor), a node MUST send a link-layer acknowledgment but MUST silently ignore the message at 6top. Duplicate messages arise from link-layer retransmissions when a prior L2 ACK is lost.
section: 3.4.6.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
