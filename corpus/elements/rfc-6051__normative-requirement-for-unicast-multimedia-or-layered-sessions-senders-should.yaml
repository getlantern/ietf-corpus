document: rfc-6051
kind: normative-requirement
summary: For unicast multimedia or layered sessions, senders SHOULD transmit an initial compound RTCP packet (SR + SDES/CNAME) immediately on joining each RTP session, in parallel with the first data packet, enabling immediate synchronisation absent packet loss.
section: 2.1.1
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
