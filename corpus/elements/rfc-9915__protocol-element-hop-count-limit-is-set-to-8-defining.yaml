document: rfc-9915
kind: protocol-element
summary: HOP_COUNT_LIMIT is set to 8, defining the maximum hop count in a Relay-forward message. A relay agent MUST NOT forward a Relay-forward message whose hop-count field is greater than or equal to HOP_COUNT_LIMIT.
section: "7.6"
