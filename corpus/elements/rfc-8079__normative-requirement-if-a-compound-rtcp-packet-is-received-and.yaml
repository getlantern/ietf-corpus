document: rfc-8079
kind: normative-requirement
summary: If a compound RTCP packet is received and any individual RTCP message within it needs to be dropped, the B2BUA SHOULD NOT drop the whole compound RTCP packet but only the selected messages.
section: "3.2"
rfc2119_level: SHOULD NOT
