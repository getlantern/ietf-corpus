document: rfc-6736
kind: registry
summary: 'IANA assigned seven new Result-Code AVP values for DNCA: transient failure RESOURCE_FAILURE (4014); and permanent failures UNKNOWN_BINDING_TEMPLATE_NAME (5042), BINDING_FAILURE (5043), MAX_BINDINGS_SET_FAILURE (5044), MAXIMUM_BINDINGS_REACHED_FOR_ENDPOINT (5045), SESSION_EXISTS (5046), and INSUFFICIENT_CLASSIFIERS (5047). All conforming implementations SHALL support these values.'
section: "11.4"
topics:
