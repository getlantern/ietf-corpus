document: rfc-3229
kind: normative-requirement
summary: A status-226 cache entry MUST NOT be used in response to a subsequent request if any IM header values from the cached response do not appear in the subsequent request's A-IM header, or if their order differs, or if the Delta-Base entity tag is not in the subsequent If-None-Match.
section: "10.6"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
