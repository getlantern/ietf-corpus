document: rfc-6884
kind: protocol-element
summary: 'Three RTP packet formats are defined for EVRC-NW: interleaved/bundled (audio/EVRCNW), header-free (audio/EVRCNW0), and compact bundled (audio/EVRCNW1). All operational details such as TOC, interleaving, DTX, and bundling follow existing EVRC/EVRC-B/EVRC-WB definitions except for EVRC-NW-specific modifications to the mode change request field and the C-bit.'
