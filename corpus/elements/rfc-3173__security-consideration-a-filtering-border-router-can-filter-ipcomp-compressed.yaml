document: rfc-3173
kind: security-consideration
summary: A filtering border router can filter IPComp-compressed datagrams only if it shares the IPComp Association used for compression. A mechanism must be in place for the receiving node to securely communicate the IPCA to the border router in environments requiring packet filtering.
section: "5"
topics:
    - ip
    - security
