document: rfc-8601
kind: normative-requirement
summary: MUAs and downstream filters SHOULD NOT interpret this header field unless specifically configured to do so; interpretation should not be on by default. They SHOULD also verify that the authserv-id is one used within their ADMD.
section: "4.1"
rfc2119_level: SHOULD NOT
