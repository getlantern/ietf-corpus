document: rfc-7689
kind: normative-requirement
summary: Once a node properly parses a ResourceBlockInfo sub-TLV in an ERO Hop Attributes subobject, it allocates the indicated resources for the LSP. The node SHOULD report compliance by adding an RRO Hop Attributes subobject with the WSON Processing Hop Attribute TLV indicating the utilized resources.
section: 4.2.1
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
