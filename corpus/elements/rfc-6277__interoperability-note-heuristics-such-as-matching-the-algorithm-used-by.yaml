document: rfc-6277
kind: interoperability-note
summary: Heuristics such as matching the algorithm used by the CA to sign CRLs may fail when the OCSP responder's key pair is incompatible with that algorithm, or when the request is for an unknown certificate that provides no basis for algorithm selection.
