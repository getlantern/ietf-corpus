document: rfc-7377
kind: normative-requirement
summary: If the server supports SEARCHRES, the SAVE result option is valid in ESEARCH only if 'selected' is the sole mailbox being searched. If any other source option is specified, the ESEARCH command MUST return a BAD result.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
