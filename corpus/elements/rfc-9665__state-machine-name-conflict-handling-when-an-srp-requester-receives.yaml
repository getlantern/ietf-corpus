document: rfc-9665
kind: state-machine
summary: 'Name conflict handling: when an SRP requester receives a YXDomain RCODE, the registrar has found a conflicting existing name owned by a different SIG(0) key. The requester MUST choose a new name (typically by appending or incrementing a number) or give up. There is no normative requirement on the exact name-selection strategy.'
section: 3.2.5.2
topics:
    - dns
    - zeroconf
