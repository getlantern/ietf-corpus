document: rfc-8616
kind: security-consideration
summary: The updates to SPF, DKIM, and DMARC are intended to allow those specifications to work as reliably on internationalized mail as on ASCII mail, so that spam and phishing filters using them can work more reliably on internationalized mail. No new threats are introduced.
section: "8"
topics:
