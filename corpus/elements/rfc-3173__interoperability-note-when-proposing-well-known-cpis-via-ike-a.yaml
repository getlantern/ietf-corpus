document: rfc-3173
kind: interoperability-note
summary: When proposing well-known CPIs via IKE, a Proposal Payload with a single Transform Payload may use a pre-defined CPI (0-63). When two or more Transform Payloads are present in one Proposal Payload, the CPI MUST be in the negotiated range (256-61439).
section: "4.1"
topics:
    - ip
    - ipsec
