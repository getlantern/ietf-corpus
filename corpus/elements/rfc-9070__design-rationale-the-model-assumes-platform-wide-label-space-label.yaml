document: rfc-9070
kind: design-rationale
summary: The model assumes platform-wide label space (label space ID of zero). When upstream label assignment (RFC 6389) is in use, an upstream-assigned label is looked up in a Context-Specific Label Space per RFC 5331, which is outside the scope of this base model.
