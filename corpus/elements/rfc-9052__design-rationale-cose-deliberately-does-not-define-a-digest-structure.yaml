document: rfc-9052
kind: design-rationale
summary: COSE deliberately does not define a digest structure, unlike CMS. Different protocols need different fields in a digest structure, so each application protocol should define its own (e.g., RFC 9054). A single COSE-defined structure would be too rigid for the diversity of use cases.
section: "1"
topics:
    - cbor
    - crypto
