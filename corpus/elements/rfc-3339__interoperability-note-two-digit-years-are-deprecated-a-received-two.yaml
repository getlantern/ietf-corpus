document: rfc-3339
kind: interoperability-note
summary: Two-digit years are deprecated. A received two-digit year should be accepted ONLY if an incorrect interpretation will not cause a protocol or processing failure. Programs using two-digit years may produce three-digit or non-numeric decade representations for years after 1999.
