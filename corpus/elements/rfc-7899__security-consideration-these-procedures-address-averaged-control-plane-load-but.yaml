document: rfc-7899
kind: security-consideration
summary: These procedures address averaged control-plane load but not instantaneous peaks; a burst of simultaneous Join/Prune events on many states can still cause a peak load before damping activates. Damping must be complemented by configuration limiting the number of multicast states createable via protocol interactions with receivers, neighboring ASes, or multicast CEs.
