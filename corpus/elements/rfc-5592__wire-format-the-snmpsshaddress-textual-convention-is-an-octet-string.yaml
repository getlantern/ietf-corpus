document: rfc-5592
kind: wire-format
summary: The SnmpSSHAddress Textual Convention is an OCTET STRING of SIZE 1..255, encoding an optional 'user@' UTF-8 prefix, followed by a hostname (US-ASCII/IDNA) or IPv4 dotted-decimal or bracket-enclosed IPv6 address, followed by ':' and a decimal port number in US-ASCII.
