document: rfc-8667
kind: protocol-element
summary: The SR-Algorithm sub-TLV (Type 19) lists the SR algorithms currently supported by the router. Algorithm 0 is SPF on link metric (local policy overrides permitted); Algorithm 1 is Strict SPF (all nodes MUST honor the SPF forwarding decision; local policy MUST NOT alter it).
section: "3.2"
topics:
