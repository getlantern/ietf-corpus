document: rfc-2459
kind: protocol-element
summary: The Name Constraints extension (used only in CA certificates) defines permittedSubtrees and excludedSubtrees of GeneralSubtrees within which all subject names in subsequent path certificates must fall. It applies to subject DNs and subject alternative names; any name matching an excludedSubtrees entry is invalid regardless of permittedSubtrees. This extension MUST be critical.
section: 4.2.1.11
topics:
    - pkix
    - security
