document: rfc-7482
kind: normative-requirement
summary: The IPv6 zone_id (RFC 4007) MUST NOT be used in IP network path segments, as it is not appropriate in this context; servers are to ignore it if possible. RFC 5952 text representation rules for IPv6 addresses are RECOMMENDED.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
