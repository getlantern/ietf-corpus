document: rfc-2273
kind: protocol-element
summary: The snmpTargetParamsTable (OID snmpTargetObjects 3) stores SNMP message generation parameters. Each entry (indexed by snmpTargetParamsName) contains snmpTargetParamsMPModel, snmpTargetParamsSecurityModel (range excludes 255), snmpTargetParamsSecurityName, snmpTargetParamsSecurityLevel, snmpTargetParamsStorageType, and snmpTargetParamsRowStatus. Active rows cannot have their security parameters modified.
section: 4.1.2
topics:
