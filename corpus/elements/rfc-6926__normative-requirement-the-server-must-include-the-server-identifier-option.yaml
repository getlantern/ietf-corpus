document: rfc-6926
kind: normative-requirement
summary: The server MUST include the server-identifier option (option 54) in the first response to any DHCPBULKLEASEQUERY; it SHOULD NOT include it in subsequent responses, and the requestor MUST cache and apply it to all subsequent messages in the stream.
section: "7.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
