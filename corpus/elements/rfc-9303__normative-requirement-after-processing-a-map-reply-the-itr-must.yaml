document: rfc-9303
kind: normative-requirement
summary: After processing a Map-Reply, the ITR MUST discard the <nonce, ITR-OTK> pair associated with that exchange, preventing replay attacks by ensuring a replayed Map-Reply finds no matching OTK.
section: "6.9"
rfc2119_level: MUST
topics:
    - security
    - routing
