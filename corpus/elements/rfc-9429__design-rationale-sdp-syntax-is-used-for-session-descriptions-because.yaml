document: rfc-9429
kind: design-rationale
summary: SDP syntax is used for session descriptions because it is widely accepted and frequently updated with new features. It is encapsulated in a SessionDescription object so that a future JSON format could be adopted without changing the API; most applications can treat SessionDescriptions as opaque blobs.
section: "3.3"
