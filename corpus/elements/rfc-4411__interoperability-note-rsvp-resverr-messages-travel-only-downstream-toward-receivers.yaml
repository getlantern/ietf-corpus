document: rfc-4411
kind: interoperability-note
summary: RSVP ResvErr messages travel only downstream toward receivers and do not reach the upstream UA; therefore, the UA receiving the ResvErr is responsible for generating the SIP BYE with cause=2 to synchronize the upstream UA and all stateful SIP proxies.
section: "3"
topics:
