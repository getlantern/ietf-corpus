document: rfc-6785
kind: protocol-element
summary: The 'imapsieve' IMAP capability string advertises server support for IMAP events in Sieve. Its syntax is 'IMAPSIEVE=<sieveurl-server>' where sieveurl-server identifies the ManageSieve server for managing associated Sieve scripts. Only one such capability string is allowed.
section: "2.1"
topics:
    - email
    - registry
