document: rfc-3339
kind: protocol-element
summary: Leap seconds are represented by the value "60" in the time-second field, occurring at the end of certain months (historically June 30 or December 31), expressed as YYYY-MM-DDT23:59:60Z. A negative leap second would reduce the maximum time-second value to "58".
section: "5.7"
