document: rfc-7213
kind: design-rationale
summary: Because IP functionality is optional in MPLS-TP networks, ARP and IPv6 Neighbor Discovery may not be available for MAC address learning. The GAP-based mechanism provides unicast MAC discovery specifically for MPLS-TP nodes without IP support, avoiding the operational burden of static MAC configuration.
section: "1"
topics:
