document: rfc-8490
kind: normative-requirement
summary: A responder that receives a DSO request or unidirectional message with a malformed MESSAGE ID (nonzero when it must be zero, or zero when it must be nonzero per the Primary TLV specification) MUST treat it as a fatal error and forcibly abort the connection immediately.
section: 5.4.1
rfc2119_level: MUST
topics:
    - dns
