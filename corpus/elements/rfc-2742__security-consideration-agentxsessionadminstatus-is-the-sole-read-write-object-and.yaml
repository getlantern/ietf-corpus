document: rfc-2742
kind: security-consideration
summary: 'agentxSessionAdminStatus is the sole read-write object and is sensitive: setting it to an inappropriate value can prevent access to management information or expose inappropriate information. Even GET access should be controlled, and encryption of values over the network is advised.'
