document: rfc-1209
kind: normative-requirement
summary: All frames MUST be transmitted in standard IEEE 802.2 LLC Type 1 Unnumbered Information format with DSAP and SSAP set to decimal 170 (0xAA). The 24-bit Org Code in the SNAP MUST be set to zero.
section: Packet Format
rfc2119_level: MUST
topics:
    - ip
