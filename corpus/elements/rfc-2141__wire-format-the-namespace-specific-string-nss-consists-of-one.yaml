document: rfc-2141
kind: wire-format
summary: The Namespace Specific String (NSS) consists of one or more URN chars, where each URN char is either a member of the allowed character set (`<trans>`) or a percent-encoded octet (`%<hex><hex>`). Characters outside the URN character set MUST be encoded as UTF-8 and then percent-encoded.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
