document: rfc-1509
kind: wire-format
summary: 'The GSS status code is a 32-bit OM_uint32 value partitioned into three fields: calling error (bits 31–24), routine error (bits 23–16), and supplementary info (bits 15–0). If either upper 16-bit field is non-zero the call failed. Symbol values such as GSS_S_BAD_NAMETYPE are complete 32-bit codes with the field value already shifted to its correct bit position.'
section: 2.1.9.1
topics:
    - security
