document: rfc-8333
kind: normative-requirement
summary: If a new convergence event occurs while ULOOP_DELAY_DOWN_TIMER is running, the timer MUST be stopped and the RIB/FIB SHOULD be updated as part of the new convergence event without further delay.
section: "5.4"
rfc2119_level: SHOULD
topics:
