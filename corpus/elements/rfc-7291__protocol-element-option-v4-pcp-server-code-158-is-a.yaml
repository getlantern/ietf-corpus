document: rfc-7291
kind: protocol-element
summary: OPTION_V4_PCP_SERVER (code 158) is a DHCPv4 option that conveys one or more lists of PCP server IPv4 addresses. Each list is a separate server entry identified by a List-Length sub-field. The option is concatenation-requiring per RFC 3396.
section: "4.1"
topics:
    - pcp
    - ip
