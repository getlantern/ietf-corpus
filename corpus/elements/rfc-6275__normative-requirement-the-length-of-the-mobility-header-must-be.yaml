document: rfc-6275
kind: normative-requirement
summary: The length of the Mobility Header MUST be a multiple of 8 octets. The Mobility Header MUST be aligned on an 8-octet boundary. The Reserved fields MUST be initialized to zero by the sender and MUST be ignored by the receiver.
section: 6.1.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
