summary: pktcMtaDevConfigFile, when the MTA SNMP Enrollment mechanism is not used, MUST contain the TFTP URL derived from the 'siaddr' and 'file' fields of the DHCP ACK, and the MTA MUST return an 'inconsistentValue' error in response to SNMP SET operations.
