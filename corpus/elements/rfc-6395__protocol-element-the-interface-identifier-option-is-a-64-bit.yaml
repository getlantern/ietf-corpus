document: rfc-6395
kind: protocol-element
summary: The Interface Identifier option is a 64-bit value carried in PIM Hello messages to uniquely identify the interface of a neighboring router. It consists of a 32-bit Router Identifier (high bits) and a 32-bit Local Interface Identifier (low bits).
section: "2"
topics:
    - multicast
    - routing
