document: rfc-8801
kind: normative-requirement
summary: The PvD Additional Information JSON object's 'prefixes' list MUST be checked against all PIO prefixes in the associated RA. If any PIO prefix is not covered by at least one listed prefix, the Additional Information MUST be considered a misconfiguration and MUST NOT be used.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
