document: rfc-4331
kind: design-rationale
summary: Two live properties scoped to collections only (DAV:quota-available-bytes and DAV:quota-used-bytes) were chosen rather than per-resource properties because quota is inherently a collection-level concept borrowed from NFS (RFC 3530). Implementing just these two properties satisfies the interoperability requirements for quota-aware WebDAV clients.
section: "2"
topics:
