document: rfc-6609
kind: normative-requirement
summary: When ':optional' is specified, implementations MUST NOT generate an error for a missing script and MUST continue as if the 'include' command had not been present. Without ':optional', a missing included script MUST generate an execution-time error.
section: "3.2"
rfc2119_level: MUST NOT
topics:
