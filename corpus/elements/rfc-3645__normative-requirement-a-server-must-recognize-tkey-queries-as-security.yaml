document: rfc-3645
kind: normative-requirement
summary: A server MUST recognize TKEY queries as security context negotiation messages. Upon receiving QTYPE=TKEY, the server MUST examine the Mode and Algorithm Name fields for values 3 and 'gss-tsig' respectively.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
