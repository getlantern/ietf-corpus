summary: 'Six mandatory objective functions are defined: MCP (code 1, minimize cost), MLP (code 2, minimize load), MBP (code 3, maximize residual bandwidth) for individual requests; MBC (code 4, minimize aggregate bandwidth consumption), MLL (code 5, minimize load of most loaded link), MCC (code 6, minimize cumulative cost) for synchronized request sets.'
