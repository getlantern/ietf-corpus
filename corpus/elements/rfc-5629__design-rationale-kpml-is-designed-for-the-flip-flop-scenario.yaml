document: rfc-5629
kind: design-rationale
summary: KPML is designed for the 'flip-flop' scenario where a client-local UI waits for a trigger (e.g., long pound key), then hands off to a client-remote UI for more complex interaction. Using KPML locally eliminates the need to send media streams into the network just to wait for a keypress.
section: "5.3"
topics:
    - sip
    - realtime
