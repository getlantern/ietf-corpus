document: rfc-5386
kind: design-rationale
summary: 'Leap-of-faith (LoF) for BTNS mirrors the SSH model: on first contact, the peer''s public key is accepted and recorded; subsequent communications verify against that stored key. This provides continuity-based trust without a PKI, but was still being designed at time of publication.'
