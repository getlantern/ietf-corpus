document: rfc-9270
kind: interoperability-note
summary: The rules in Section 14.2 of RFC 4872 ensure that all nodes along an SMP LSP are SMP-aware (via the Protection Type check during signaling), so there are no backward-compatibility issues with the new 0x20 Protection Type value.
