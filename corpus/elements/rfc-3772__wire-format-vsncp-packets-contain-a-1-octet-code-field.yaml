document: rfc-3772
kind: wire-format
summary: VSNCP packets contain a 1-octet Code field (LCP codes 1-7 only), 1-octet Identifier, 2-octet Length, a 3-octet OUI, and variable Data. All other Code values SHOULD result in a Code-Reject reply.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
