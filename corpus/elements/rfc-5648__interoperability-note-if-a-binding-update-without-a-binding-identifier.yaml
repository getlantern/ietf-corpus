document: rfc-5648
kind: interoperability-note
summary: If a Binding Update without a Binding Identifier mobility option is received and the receiver already has multiple bindings for the home address, it MUST replace all existing bindings with the received single binding, restoring RFC 3775 single-binding semantics.
section: "6.2"
topics:
    - mobility
    - ip
