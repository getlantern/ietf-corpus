document: rfc-4286
kind: protocol-element
summary: Advertisement messages are sent to the All-Snoopers multicast address (224.0.0.106 / FF02::6A); Solicitation messages are sent to the All-Routers multicast address. Advertisements carry the IPv4 Protocol field set to IGMP (2) and for IPv6 use ICMPv6 Next Header value 58.
section: "3.3"
topics:
    - multicast
    - ip
