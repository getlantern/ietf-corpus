document: rfc-2141
kind: normative-requirement
summary: 'Two URNs are lexically equivalent after: (1) normalizing the case of `urn:`, (2) normalizing the case of the NID, and (3) normalizing the case of any `%`-escape sequences. Percent-escaping MUST NOT be removed during normalization.'
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
