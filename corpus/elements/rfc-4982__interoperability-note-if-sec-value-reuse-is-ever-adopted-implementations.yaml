document: rfc-4982
kind: interoperability-note
summary: 'If Sec value reuse is ever adopted, implementations using the old and new meanings of the same Sec value cannot interoperate: CGA verification fails in the worst case and both nodes revert to unprotected IPv6 addresses. This affects only obsolete, already-insecure CGA parameter sets.'
section: "4.1"
topics:
    - crypto
    - ip
    - security
