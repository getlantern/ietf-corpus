document: rfc-9182
kind: security-consideration
summary: BGP authentication in the L3NM follows RFC 4364 §13.2 recommendations; supported options are TCP-AO (via key-chain reference requiring SendID/RecvID beyond RFC 8177), MD5 (via key-chain), explicit key with crypto algorithm, and IPsec SA. TCP-AO key chains are assumed to be pre-configured outside the L3NM.
section: 7.6.3.2
topics:
    - security
    - bgp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
