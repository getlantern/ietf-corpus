document: rfc-8912
kind: interoperability-note
summary: 'For DNS Response Latency metrics, the RFC 1035 entities must be mapped to RFC 2681 roles: the Local Host with its User Program and Resolver takes the Src role, and the Foreign Name Server takes the Dst role. The DNS server is expected to perform all required functions before responding, so response time includes processing time and network delay.'
section: 6.2.1
topics:
    - measurement
    - dns
