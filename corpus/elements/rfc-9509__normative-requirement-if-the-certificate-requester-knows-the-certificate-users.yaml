document: rfc-9509
kind: normative-requirement
summary: If the certificate requester knows the certificate users are mandated to use these KeyPurposeIds, it MUST enforce their inclusion in the certificate request and MUST ensure that the KeyUsage extension is set to digitalSignature or nonRepudiation for signature operations and/or keyEncipherment for secret key encryption.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - security
