document: rfc-9134
kind: normative-requirement
summary: All video support boxes and color specification boxes within an RTP stream SHALL retain their respective layouts for each JPEG XS frame. Each VS box SHALL define the same sub-boxes, and the relative byte offsets of fields SHALL NOT change, though effective values may change.
section: "4.4"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
