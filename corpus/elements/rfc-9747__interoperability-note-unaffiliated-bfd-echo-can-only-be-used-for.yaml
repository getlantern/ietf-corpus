document: rfc-9747
kind: interoperability-note
summary: Unaffiliated BFD Echo can only be used for single IP hops over IPv4 or IPv6. It cannot be used for multihop paths because the Echo packets would be looped back by the first hop, preventing end-to-end path monitoring.
section: "1"
topics:
