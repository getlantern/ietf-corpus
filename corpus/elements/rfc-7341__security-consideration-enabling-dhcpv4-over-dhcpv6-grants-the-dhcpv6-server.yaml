document: rfc-7341
kind: security-consideration
summary: Enabling DHCPv4-over-DHCPv6 grants the DHCPv6 server the ability to shut off DHCPv4 (and consequently IPv4) traffic on the configured interface. The mechanism should only be enabled where there is a clear trust relationship, such as a CPE device on its WAN interface toward an ISP.
section: "12"
topics:
    - security
    - ip
    - v6ops
