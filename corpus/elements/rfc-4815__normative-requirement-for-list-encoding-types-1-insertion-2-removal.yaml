document: rfc-4815
kind: normative-requirement
summary: For list encoding types 1 (insertion), 2 (removal), and 3 (removal/insertion), the ref_id field MUST refer to a non-empty reference list, regardless of operating mode. Using these encoding types with an empty reference list is prohibited.
section: "5.7"
rfc2119_level: MUST
