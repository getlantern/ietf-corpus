document: rfc-2080
kind: wire-format
summary: The next hop RTE is a special 20-octet RTE identified by metric value 0xFF. The 16-octet prefix field holds the IPv6 next hop address; route tag and prefix length must be zero. A next hop of 0:0:0:0:0:0:0:0 means the originator of the advertisement.
section: 2.1.1
topics:
