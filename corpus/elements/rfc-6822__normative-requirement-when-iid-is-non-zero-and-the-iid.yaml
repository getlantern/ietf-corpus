document: rfc-6822
kind: normative-requirement
summary: When IID is non-zero and the IID-TLV appears in an IIH, there MUST be at least one ITID present. If multiple IID-TLVs appear in an IIH and the IID values differ across TLVs, the PDU MUST be ignored.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
