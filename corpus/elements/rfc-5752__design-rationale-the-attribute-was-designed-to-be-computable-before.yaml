document: rfc-5752
kind: design-rationale
summary: The attribute was designed to be computable before any signatures are applied, to identify individual signatures, and to contain enough information to resist collision, preimage, and second preimage attacks. This requires hashing the signedAttrs of the referenced SignerInfo rather than just referencing it by index.
section: "2.1"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
