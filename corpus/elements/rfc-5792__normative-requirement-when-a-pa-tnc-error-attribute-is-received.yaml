document: rfc-5792
kind: normative-requirement
summary: When a PA-TNC Error attribute is received, the recipient MUST NOT respond with another PA-TNC Error to prevent infinite error loops. The recipient MAY log, modify behavior, ignore, or terminate the assessment.
section: 4.2.8
rfc2119_level: MUST NOT
topics:
    - security
