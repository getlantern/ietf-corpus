document: rfc-6779
kind: protocol-element
summary: nhdpIib2HopSetTable records symmetric 2-hop neighbor addresses indexed by {nhdpIfIndex, nhdpDiscIfIndex, nhdpIib2HopSetIpAddressType, nhdpIib2HopSetIpAddress}. Each entry stores the prefix length, the NeighborIfIndex of the 1-hop relay, and an expiry timestamp (nhdpIib2HopSetN2Time).
