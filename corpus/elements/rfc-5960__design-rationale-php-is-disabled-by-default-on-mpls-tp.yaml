document: rfc-5960
kind: design-rationale
summary: PHP is disabled by default on MPLS-TP LSPs because transport networks require the penultimate LSR to forward the packet with its LSP label intact, enabling end-to-end OAM and consistent TTL/label-stack semantics at the egress LER.
section: 3.1.1
topics:
