document: rfc-9867
kind: normative-requirement
summary: If a series of IKE_INTERMEDIATE exchanges takes place, the PPK_IDENTITY_KEY notification(s) MUST be sent in the last one — the IKE_INTERMEDIATE exchange immediately preceding IKE_AUTH.
