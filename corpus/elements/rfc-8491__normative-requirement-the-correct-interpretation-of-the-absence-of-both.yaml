document: rfc-8491
kind: normative-requirement
summary: The correct interpretation of the absence of both Node and Link MSD advertisements for a given MSD-Type MUST be specified when an MSD-Type is defined, since absence may mean either lack of advertisement support or lack of the underlying functionality.
