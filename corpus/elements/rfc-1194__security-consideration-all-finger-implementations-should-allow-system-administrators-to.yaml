document: rfc-1194
kind: security-consideration
summary: All Finger implementations SHOULD allow system administrators to choose which atoms of information are returned (e.g., office location, phone number, login/logout time), enabling fine-grained control over the information disclosed. The minimum required is the person's full name.
section: 3.2.3
topics:
    - security
    - privacy
