document: rfc-1196
kind: security-consideration
summary: Allowing an RUIP to return content from user-modifiable files (plan files) is equivalent to permitting arbitrary information distribution about the system, effectively bypassing administrator-configured information controls. This risk should be explicitly understood before enabling the feature.
section: 3.2.4
topics:
    - security
