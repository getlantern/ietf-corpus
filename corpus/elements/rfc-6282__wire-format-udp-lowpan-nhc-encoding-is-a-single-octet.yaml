summary: 'UDP LOWPAN_NHC encoding is a single octet: bits 0–4 are ''11110'', bit 5 (C) indicates checksum elision, and bits 6–7 (P) indicate port compression mode—00 full ports in-line, 01 destination upper byte elided (0xf0), 10 source upper byte elided (0xf0), 11 both upper 12 bits elided (0xf0b).'
