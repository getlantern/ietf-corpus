document: rfc-3327
kind: normative-requirement
summary: Proxies processing a REGISTER response SHOULD NOT alter any Path header field values present in the response. Proxies SHOULD only consider altering the Path value if they have credentials to correctly alter the S/MIME body to account for the change.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
