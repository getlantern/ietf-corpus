document: rfc-5130
kind: normative-requirement
summary: On receipt, an implementation MAY consider only one encoded tag; if so, the first encoded tag MUST be considered and any additional tags ignored. This applies to both 32-bit and 64-bit sub-TLVs.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
