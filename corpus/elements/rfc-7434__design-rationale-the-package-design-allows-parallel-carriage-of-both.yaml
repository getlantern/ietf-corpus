document: rfc-7434
kind: design-rationale
summary: The package design allows parallel carriage of both 'isdn-uui' and a future package in the same or different messages during the ISDN-to-SIP transition, enabling the remote endpoint to consume whichever format it supports depending on whether it is an ISDN gateway or a native SIP endpoint.
