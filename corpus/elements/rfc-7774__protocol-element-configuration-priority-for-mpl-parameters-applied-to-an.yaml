document: rfc-7774
kind: protocol-element
summary: 'Configuration priority for MPL parameters applied to an MPL Domain is (highest to lowest): specific domain option (option_len=32), wildcard option (option_len=16), and default configuration from RFC 7731. Manual configuration priority relative to DHCP-derived configuration is not defined.'
