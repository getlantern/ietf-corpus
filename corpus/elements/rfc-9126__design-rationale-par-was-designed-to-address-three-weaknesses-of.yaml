document: rfc-9126
kind: design-rationale
summary: 'PAR was designed to address three weaknesses of conventional OAuth authorization requests: lack of cryptographic integrity/authenticity protection, no confidentiality for request parameters (query strings leak via user agents, logs, referrers), and URL length limitations causing processing errors in fine-grained authorization scenarios.'
section: "1"
topics:
