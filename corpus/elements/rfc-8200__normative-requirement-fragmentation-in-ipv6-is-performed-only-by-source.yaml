document: rfc-8200
kind: normative-requirement
summary: Fragmentation in IPv6 is performed only by source nodes, not by routers along a packet's delivery path. A source node may use the Fragment header to fragment packets larger than the path MTU.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - ip
