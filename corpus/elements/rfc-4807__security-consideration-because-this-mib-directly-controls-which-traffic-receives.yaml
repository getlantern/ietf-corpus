document: rfc-4807
kind: security-consideration
summary: Because this MIB directly controls which traffic receives IPsec protection, unauthorized write access can cause traffic to bypass security entirely. SNMPv3 with authentication (authNoPriv minimum) is required to protect against unauthenticated modifications to SPD policy.
section: "7.2"
topics:
    - ipsec
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
