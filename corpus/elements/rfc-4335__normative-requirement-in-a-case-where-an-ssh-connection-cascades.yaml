document: rfc-4335
kind: normative-requirement
summary: In a case where an SSH connection cascades to another connection, the BREAK SHOULD be passed along the cascaded connection; for example, an SSH client initiated from a Telnet connection SHOULD pass a BREAK indication from the Telnet connection.
section: "3"
rfc2119_level: SHOULD
topics:
    - security
