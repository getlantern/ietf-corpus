document: rfc-5550
kind: normative-requirement
summary: Lemonade Message Stores MUST store $SubmitPending and $Submitted IMAP keywords, MUST preserve them on COPY, and MUST support SEARCH KEYWORD for each. Submission state transitions (pending → submitting → submitted) are managed atomically using STORE (UNCHANGEDSINCE).
section: "5.10"
rfc2119_level: MUST
topics:
    - email
