document: rfc-7597
kind: protocol-element
summary: If o + r < 32, an IPv4 prefix is assigned. If o + r = 32, a full IPv4 address is assigned by concatenating the Rule IPv4 prefix with EA-bits. If o + r > 32, a shared IPv4 address is assigned with p = 32 - r IPv4 suffix bits and q = o - p PSID bits in the EA field.
section: "5.2"
topics:
    - ip
    - v6ops
