document: rfc-5305
kind: wire-format
summary: Sub-TLVs 9 (Maximum Link Bandwidth) and 10 (Maximum Reservable Link Bandwidth) each carry a 4-octet IEEE 754 floating-point value in bytes per second. Sub-TLV 11 (Unreserved Bandwidth) carries eight such 4-octet IEEE floating-point values (32 octets total), one per priority level 0-7.
