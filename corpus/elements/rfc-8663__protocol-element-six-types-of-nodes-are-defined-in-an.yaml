kind: protocol-element
summary: 'Six types of nodes are defined in an SR-MPLS domain: (1) domain ingress nodes, (2) legacy IP-only transit nodes, (3) SR-MPLS-capable transit nodes not identified by a SID in the stack, (4) SR-MPLS-capable transit nodes identified by a SID, (5) the penultimate SR-MPLS-capable node, and (6) the domain egress node.'
