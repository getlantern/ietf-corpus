document: rfc-1724
kind: security-consideration
summary: Reading rip2IfConfAuthKey always returns an OCTET STRING of length zero, preventing authentication keys from being retrieved via SNMP and thus preventing authentication bypass through MIB access. The security considerations section otherwise states that security issues are not discussed in this memo.
section: "4.2"
topics:
    - security
    - snmp
    - routing
