document: rfc-2509
kind: interoperability-note
summary: The two COMPRESSED_NON_TCP formats (8-bit and 16-bit CID) may share the same link-level identifier (0x0065) because they can be distinguished by their contents; the two COMPRESSED_RTP and COMPRESSED_UDP formats require separate protocol values for 8-bit versus 16-bit CIDs.
