document: rfc-3024
kind: normative-requirement
summary: If a foreign agent receives an un-encapsulated packet from a mobile node that explicitly requested Encapsulating Delivery Style, the foreign agent MUST NOT reverse-tunnel such a packet and MUST instead forward it using standard IP routing.
section: 5.2.1
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
