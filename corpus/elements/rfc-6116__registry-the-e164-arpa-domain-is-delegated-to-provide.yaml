document: rfc-6116
kind: registry
summary: The 'e164.arpa' domain is delegated to provide DNS infrastructure for E.164 number data. Subdomain delegations must be consistent with ITU E.164 hierarchy. The IAB coordinates with ITU TSB on technical contact changes. Enumservice registrations are governed by RFC 6117.
