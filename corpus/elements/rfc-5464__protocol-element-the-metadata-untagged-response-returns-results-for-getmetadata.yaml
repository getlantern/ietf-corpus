document: rfc-5464
kind: protocol-element
summary: The METADATA untagged response returns results for GETMETADATA or is sent unsolicited when annotations change due to a third party. It contains either entry-value pairs (solicited) or entry names only (unsolicited). Multiple entries may appear in a single response or across multiple responses.
