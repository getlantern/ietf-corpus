document: rfc-9148
kind: interoperability-note
summary: An HTTPS-CoAPS Registrar bridges constrained CoAP networks to external HTTP/TLS EST servers. The Registrar must translate URI paths per Table 1, map CoAP/HTTP response codes, convert binary CBOR payloads to Base64, and reassemble blocks before forwarding upstream.
