document: rfc-4494
kind: security-consideration
summary: Security considerations for AES-CMAC-96 are inherited from AES-CMAC (RFC 4493). According to NIST, at least 64 bits should be used against guessing attacks; AES-CMAC-96 uses 96 bits, exceeding this minimum.
section: "7"
topics:
