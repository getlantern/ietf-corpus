document: rfc-8572
kind: state-machine
summary: 'The device boot sequence defines four states: (1) check if SZTP bootstrapping is configured, (2) iterate over sources of bootstrapping data, (3) if bootstrapped successfully run with new config, (4) otherwise loop back to step 1. The trigger to exit the loop is a successful bootstrap from any source.'
section: "5.2"
topics:
    - netconf
    - security
