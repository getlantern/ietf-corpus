document: rfc-6622
kind: normative-requirement
summary: For a Message ICV TLV with type extension=1, the ICV is calculated over <hash-function>, <cryptographic-function>, <key-id-length>, and <key-id> (in that order) concatenated with the entire message; the considerations in Section 9.1 (zeroing mutable fields, removing existing ICV TLVs) MUST be applied.
section: 12.2.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
