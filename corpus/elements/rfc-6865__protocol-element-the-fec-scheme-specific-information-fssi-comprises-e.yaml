document: rfc-6865
kind: protocol-element
summary: 'The FEC Scheme-Specific Information (FSSI) comprises: E (Encoding Symbol Length, non-negative integer < 2^^16), S (Strict flag, 1-bit: 1 means E is fixed for all blocks, 0 means E is the maximum), and m (finite field element length in bits, 2 <= m <= 16). All three are required by both encoder and decoder.'
section: 5.1.1.2
