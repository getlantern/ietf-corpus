document: rfc-5760
kind: protocol-element
summary: 'Two reporting models are defined: the Simple Feedback Model (basic reflection of individual receiver RTCP packets to all receivers) and the Distribution Source Feedback Summary Model (Distribution Source aggregates receiver reports into RSI summary packets). The reporting method MUST be decided prior to session start and MUST NOT change during the session.'
