document: rfc-4104
kind: protocol-element
summary: pcelsVendorVariableAuxClass and pcelsVendorValueAuxClass are auxiliary classes providing a standard extension mechanism for vendor-specific policy variables and values not specifically modeled in PCIM_EXT. These are LDAP-only constructs introduced by this document, not mapped from PCIM_EXT.
