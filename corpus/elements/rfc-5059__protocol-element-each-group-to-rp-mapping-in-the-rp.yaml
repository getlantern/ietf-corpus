document: rfc-5059
kind: protocol-element
summary: 'Each group-to-RP mapping in the RP-Set contains: multicast group range (address and prefix length), RP priority, RP address, hash mask length, and an SM/BIDIR flag. Multiple mappings may cover the same group; routers apply a deterministic algorithm from the routing protocol to select one RP.'
section: "1.1"
topics:
    - multicast
    - routing
