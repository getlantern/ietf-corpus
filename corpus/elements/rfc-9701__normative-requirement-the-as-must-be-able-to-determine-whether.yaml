document: rfc-9701
kind: normative-requirement
summary: The AS MUST be able to determine whether an RS is the audience for a particular access token and what data it is entitled to receive; otherwise the RS is not authorized to obtain data for the access token.
section: "3"
rfc2119_level: MUST
