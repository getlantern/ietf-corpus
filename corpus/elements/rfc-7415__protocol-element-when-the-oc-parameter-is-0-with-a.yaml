document: rfc-7415
kind: protocol-element
summary: When the 'oc' parameter is 0 with a non-zero 'oc-validity', the client should reject 100% of SIP requests destined to the overloaded server. When 'oc-validity' is 0, the client should immediately stop throttling.
section: 3.5.1
