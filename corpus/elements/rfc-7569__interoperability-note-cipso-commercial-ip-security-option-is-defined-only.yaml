document: rfc-7569
kind: interoperability-note
summary: CIPSO (Commercial IP Security Option) is defined only as an IPv4 option assigned to IPv4 option number 134; IANA has never assigned any IPv6 option value to CIPSO, so it cannot be used in IPv6 environments.
section: "3.2"
topics:
    - security
    - ip
    - v6ops
