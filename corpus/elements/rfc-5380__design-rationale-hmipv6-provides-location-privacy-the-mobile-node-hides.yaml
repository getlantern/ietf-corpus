document: rfc-5380
kind: design-rationale
summary: 'HMIPv6 provides location privacy: the mobile node hides its LCoA from correspondent nodes and the home agent by using the RCoA as source address. Address-based location tracking by CNs or the HA is more difficult since they only know the RCoA, not the actual on-link address.'
section: "6.6"
topics:
    - mobility
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
