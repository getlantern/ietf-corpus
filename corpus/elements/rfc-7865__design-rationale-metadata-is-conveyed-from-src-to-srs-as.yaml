document: rfc-7865
kind: design-rationale
summary: 'Metadata is conveyed from SRC to SRS as a series of snapshots, each representing the state at a particular instant as seen by a single SRC. This snapshot model accommodates incremental updates: the SRC sends only changed elements in a partial-mode document rather than retransmitting the full metadata on every change.'
