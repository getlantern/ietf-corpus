document: rfc-9233
kind: design-rationale
summary: 'IDNA follows a progressive subsetting model: Unicode defines the maximum set of code points, IDNA2008 creates a subset via PVALID/CONTEXT derived property values, and DNS registries create further subsets. SAC-084 and RFC 6912 recommend DNS registries use conservative, inclusion-based subsetting.'
section: "2.3"
topics:
    - dns
    - registry
