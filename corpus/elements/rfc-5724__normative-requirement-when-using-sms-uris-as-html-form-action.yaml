document: rfc-5724
kind: normative-requirement
summary: When using 'sms' URIs as HTML form action targets, form contents MUST be packaged using 'application/x-www-form-urlencoded' media type, encoded as UTF-8 and percent-encoded. The SMS message MUST NOT contain HTTP header fields, and the media type MUST NOT be transferred in the SMS message.
section: "2.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
