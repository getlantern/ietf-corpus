document: rfc-9015
kind: normative-requirement
summary: When an SFF receives a packet with an SI not present in the SFP, it MUST reduce the SI to the next smaller value present in the SFP. If no smaller SI exists, the SFF MUST treat the SI as invalid and drop the packet per RFC 8300.
section: 4.5.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
