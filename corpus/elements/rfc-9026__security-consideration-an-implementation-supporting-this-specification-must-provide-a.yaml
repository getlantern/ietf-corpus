document: rfc-9026
kind: security-consideration
summary: An implementation supporting this specification MUST provide a mechanism to limit the overall capacity used by BFD traffic, considering both the number of active P2MP BFD sessions and the rate of BFD Control packets, to prevent resource exhaustion.
