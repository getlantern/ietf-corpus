document: rfc-6526
kind: interoperability-note
summary: Adding new SCTP streams to an existing association per RFC 6525 requires that both Exporting and Collecting Processes support RFC 6525 stream reconfiguration; without it, the only alternative to accommodate additional Templates is restarting the SCTP association with more streams, potentially causing Flow Record loss.
section: "1.3"
topics:
    - sctp
