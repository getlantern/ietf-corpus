document: rfc-9828
kind: normative-requirement
summary: A single RTP packet payload MUST NOT contain bytes from more than one JPEG 2000 codestream. The Body Packet payload MUST NOT contain any bytes of the codestream Extended Header; the Main Packet payload MUST contain at least one byte of the Extended Header.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
