document: rfc-5740
kind: normative-requirement
summary: Receivers SHOULD NOT execute repair requests (NACKs) for objects marked with NORM_FLAG_UNRELIABLE, since the sender will not provide repair for those objects. If a receiver erroneously NACKs such an object, the sender SHALL respond with NORM_CMD(SQUELCH) to suppress further invalid requests.
section: 4.2.1
rfc2119_level: SHOULD NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
