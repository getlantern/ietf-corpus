document: rfc-3413
kind: normative-requirement
summary: A command generator receiving a response must discard it if messageProcessingModel, securityModel, securityName, contextEngineID, contextName, or pduVersion do not all equal the values used in the original request, or if the request-id does not match.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
    - security
