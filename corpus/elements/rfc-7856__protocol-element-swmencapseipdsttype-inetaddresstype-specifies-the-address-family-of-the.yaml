document: rfc-7856
kind: protocol-element
summary: 'swmEncapsEIPDstType (InetAddressType) specifies the address family of the E-IP destination prefix: IPv6(2) for IPv6-over-IPv4 tunneling, IPv4(1) for IPv4-over-IPv6 tunneling. This field differs from tunnelIfAddressType in the IP Tunnel MIB.'
