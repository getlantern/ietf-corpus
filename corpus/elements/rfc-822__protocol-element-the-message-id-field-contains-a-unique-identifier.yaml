document: rfc-822
kind: protocol-element
summary: The Message-ID field contains a unique identifier in the form '<addr-spec>' that refers to exactly one instantiation of a particular message. Uniqueness is guaranteed by the generating host. Subsequent revisions receive new message identifiers.
