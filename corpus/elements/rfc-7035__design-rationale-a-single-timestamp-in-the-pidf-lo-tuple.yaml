document: rfc-7035
kind: design-rationale
summary: A single timestamp in the PIDF-LO tuple applies to all three components of relative location (baseline, reference, and offset). This is intentional to ensure consistency when dynamic elements such as velocity or orientation are present; the location generator is responsible for keeping all fields temporally coherent.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
