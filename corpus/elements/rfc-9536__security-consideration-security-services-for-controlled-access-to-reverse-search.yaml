document: rfc-9536
kind: security-consideration
summary: Security services for controlled access to reverse search operations are described in RFC 7481. RDAP providers may also physically separate reverse search endpoints from other endpoints via a proxy routing to a dedicated backend, with additional controls such as digital certificates and IP allow-listing.
