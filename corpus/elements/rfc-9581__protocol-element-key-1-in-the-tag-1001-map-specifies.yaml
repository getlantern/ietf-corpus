document: rfc-9581
kind: protocol-element
summary: Key 1 in the tag 1001 map specifies a base time value exactly like the data item tagged by CBOR tag 1 (POSIX time as int or float). Keys 4 and 5 similarly specify base time values using CBOR tag 4 (Decimal) or tag 5 (Bigfloat) array encoding, enabling higher resolution and avoiding rounding errors.
