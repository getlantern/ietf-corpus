document: rfc-1112
kind: normative-requirement
summary: Ethernet implementations MUST be capable of listening on an arbitrary number of Ethernet multicast addresses, which may require opening the hardware address filter to accept all multicast packets when the number of groups exceeds hardware filter capacity.
section: "7.4"
rfc2119_level: MUST
