document: rfc-3456
kind: security-consideration
summary: DHCP packets between the remote host and security gateway are authenticated and integrity protected by IPsec. However, no protection is afforded the DHCP packets between the security gateway and the DHCP server unless DHCPv4 authentication (RFC 3118) is also used.
section: "5"
topics:
    - ipsec
    - vpn
    - security
