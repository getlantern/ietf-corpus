summary: 'The KDF counter block is 16 octets: 7 zero octets, an 8-bit label byte (LB), a 6-octet (index DIV kdr) field, and a 2-octet block counter b_c. This is XORed with the master salt (padded with two zero octets) before AES encryption.'
