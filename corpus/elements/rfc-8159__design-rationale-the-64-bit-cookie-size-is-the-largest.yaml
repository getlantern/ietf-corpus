document: rfc-8159
kind: design-rationale
summary: The 64-bit cookie size is the largest permitted in RFC 3931 and is mandated (not optional) in this specification. This is a deliberate change from RFC 3931's optional variable-length cookie, made to ensure sufficient protection against spoofing and brute-force blind insertion attacks at the cost of constraining interoperability to RFC 3931 implementations that support 64-bit cookies.
section: "3"
topics:
