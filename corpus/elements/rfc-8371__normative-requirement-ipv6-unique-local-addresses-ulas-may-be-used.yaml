document: rfc-8371
kind: normative-requirement
summary: IPv6 Unique Local Addresses (ULAs) MAY be used as mobile node identifiers as long as any security operations making use of the ULA also take into account the domain in which the ULA is guaranteed to be unique.
section: "4.1"
rfc2119_level: MAY
