document: rfc-8194
kind: security-consideration
summary: Read access to /lmap/agent may reveal identity information usable to select targets; read access to /lmap/capabilities may reveal software version and supported Tasks enabling targeted implementation attacks; read access to /lmap/suppressions may allow prediction of measurement-active vs. measurement-inactive time windows.
