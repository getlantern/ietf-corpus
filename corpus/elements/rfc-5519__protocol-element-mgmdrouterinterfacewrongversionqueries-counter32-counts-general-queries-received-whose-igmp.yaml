document: rfc-5519
kind: protocol-element
summary: mgmdRouterInterfaceWrongVersionQueries (Counter32) counts general queries received whose IGMP or MLD version does not match mgmdRouterInterfaceVersion over the lifetime of the row; a non-zero value indicates a configuration error since all routers on a LAN must run the same version.
