document: rfc-2631
kind: design-rationale
summary: ZZ is the only source of secret entropy in the KM computation. Even if more bits than ZZ are generated, the effective key space is bounded by the size of ZZ and the security level of p and q. This is why a larger m is advisable when symmetric ciphers stronger than DES are used.
section: 2.1.2
topics:
