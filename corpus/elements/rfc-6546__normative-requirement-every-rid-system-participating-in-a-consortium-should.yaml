document: rfc-6546
kind: normative-requirement
summary: Every RID system participating in a consortium SHOULD listen for HTTP/TLS connections on port 4590. RID systems SHOULD NOT use TCP port 443 to avoid confusing standard HTTP/TLS servers for RID systems.
section: "3"
rfc2119_level: SHOULD
topics:
    - http
    - tls
