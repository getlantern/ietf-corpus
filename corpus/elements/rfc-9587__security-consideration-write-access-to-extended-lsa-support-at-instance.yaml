document: rfc-9587
kind: security-consideration
summary: 'Write access to ''extended-lsa-support'' at instance or area level can cause a Denial-of-Service attack: toggling this setting causes OSPFv3 routers to use incompatible LSA types (Extended vs Legacy), resulting in incomplete reachability and possible routing domain partitioning.'
section: "5"
topics:
    - security
    - routing
    - yang
