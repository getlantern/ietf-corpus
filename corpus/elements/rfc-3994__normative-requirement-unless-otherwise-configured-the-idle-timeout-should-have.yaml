document: rfc-3994
kind: normative-requirement
summary: Unless otherwise configured, the idle timeout SHOULD have a default value of 15 seconds. If the user stops composing for longer than this, the state transitions to 'idle' and an 'idle' status message is sent.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - realtime
