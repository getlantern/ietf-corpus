document: rfc-6438
kind: protocol-element
summary: In an IP-in-IPv6 tunnel, the tunnel endpoint (TEP) is the source node of the outer packet and is therefore free to set the outer IPv6 flow label. Routers R1 and R2 between TEP A and TEP B can rely on flow labels assigned by a known method to perform ECMP or LAG.
section: "1.2"
topics:
    - ip
