document: rfc-4415
kind: security-consideration
summary: Calls placed to PSTN/PLMN numbers via voice:tel may incur charges, including premium-rate tariffs considerably higher than standard calls. End users must be asked to confirm call placement and shown the destination number to allow informed consent.
