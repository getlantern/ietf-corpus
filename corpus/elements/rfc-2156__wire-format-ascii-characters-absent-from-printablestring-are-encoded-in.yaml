document: rfc-2156
kind: wire-format
summary: 'ASCII characters absent from PrintableString are encoded in EBNF.ps-encoded as special abbreviations: ''@'' as ''(a)'', ''%'' as ''(p)'', ''!'' as ''(b)'', ''"'' as ''(q)'', ''_'' as ''(u)'', ''('' as ''(l)'', '')'' as ''(r)'', and other non-PS characters as 3-digit decimal in parentheses (range 0-127). Special encodings are case-insensitive on parse but always generated in lower case.'
section: "3.4"
topics:
