document: rfc-7695
kind: design-rationale
summary: Nodes joining the participating set do not cause renumbering; Nodes leaving may be handled without renumbering via prefix adoption. However, Links that merge or split may violate correctness conditions and thus force renumbering — this is an inherent limitation of the distributed approach.
