document: rfc-3339
kind: protocol-element
summary: Leap seconds occur simultaneously in all time zones as an extra second at the end of a UTC day, represented as YYYY-MM-DDT23:59:60Z. In non-UTC time zones, the leap second point is shifted by the zone offset.
section: "5.7"
