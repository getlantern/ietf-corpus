document: rfc-3339
kind: protocol-element
summary: Leap seconds occur simultaneously in all time zones as an extra second appended to a UTC day (YYYY-MM-DDT23:59:60Z). In non-Z time zones the leap second point is shifted by the zone offset but represents the same instant.
section: "5.7"
