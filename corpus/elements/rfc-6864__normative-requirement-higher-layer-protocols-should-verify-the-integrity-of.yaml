document: rfc-6864
kind: normative-requirement
summary: Higher-layer protocols SHOULD verify the integrity of IPv4 datagrams using a checksum or hash that can detect reassembly errors, since UDP and TCP checksums are weak. Tunnels with strong integrity (IPsec, SCTP, SEAL) provide stronger reassembly error detection.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
