document: rfc-6633
kind: design-rationale
summary: ICMP Source Quench (type 4, code 0) was originally specified in RFC 792 as a congestion control mechanism, but research showed it to be ineffective and unfair. Router generation was deprecated by RFC 1812 in 1995, virtually all popular implementations had removed support by 2005, and ICMPv6 omitted Source Quench entirely — making continued transport-layer reaction both unnecessary and a security risk.
section: "1"
topics:
    - congestion
    - security
    - ip
