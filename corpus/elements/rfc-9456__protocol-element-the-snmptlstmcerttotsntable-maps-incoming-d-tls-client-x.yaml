document: rfc-9456
kind: protocol-element
summary: The snmpTlstmCertToTSNTable maps incoming (D)TLS client X.509 certificates to tmSecurityNames. Rows are evaluated in prioritized order by snmpTlstmCertToTSNID (lower = higher priority); a row matches if its fingerprint identifies the presented certificate or a trusted CA in the validation path.
