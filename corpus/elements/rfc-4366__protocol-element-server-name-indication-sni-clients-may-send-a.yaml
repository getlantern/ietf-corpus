document: rfc-4366
kind: protocol-element
summary: 'Server Name Indication (SNI): clients MAY send a server_name extension containing a ServerNameList with one or more ServerName entries, each specifying a NameType (currently only host_name(0)) and a UTF-8 HostName (1..2^16-1 bytes). Servers respond with an empty server_name extension if they use the information.'
section: "3.1"
topics:
