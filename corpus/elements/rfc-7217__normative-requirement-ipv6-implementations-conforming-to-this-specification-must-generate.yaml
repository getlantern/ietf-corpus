document: rfc-7217
kind: normative-requirement
summary: IPv6 implementations conforming to this specification MUST generate Interface Identifiers using the algorithm specified in Section 5 as a replacement for any other algorithms for generating stable addresses with SLAAC (such as those in RFC 2464, RFC 2467, and RFC 2470). The method MUST be employed for all stable addresses including global, link-local, and unique-local addresses.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
