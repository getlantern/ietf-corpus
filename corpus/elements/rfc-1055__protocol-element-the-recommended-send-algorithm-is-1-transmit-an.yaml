document: rfc-1055
kind: protocol-element
summary: 'The recommended send algorithm is: (1) transmit an initial END byte to flush line noise, (2) iterate over payload bytes applying byte stuffing for END and ESC values, (3) transmit a final END byte to signal packet completion. The receive algorithm loops until END is received, applying inverse byte-unstuffing for ESC sequences.'
section: SLIP DRIVERS
