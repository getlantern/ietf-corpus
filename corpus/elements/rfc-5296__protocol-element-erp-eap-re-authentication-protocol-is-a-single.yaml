document: rfc-5296
kind: protocol-element
summary: ERP (EAP Re-authentication Protocol) is a single round-trip, EAP method-independent re-authentication protocol between a peer and an ER server, executed through an authenticator acting as a pass-through. It requires prior full EAP authentication to derive root keys (rRK, rIK) that are then used to authenticate re-authentication without repeating the full EAP method exchange.
section: "3"
topics:
