document: rfc-9930
kind: interoperability-note
summary: Implementations SHOULD limit permitted inner EAP methods to EAP-TLS and EAP-FAST-MSCHAPv2, which are the most commonly supported and known-interoperable inner methods. Other EAP methods (EAP-pwd, EAP-SIM, EAP-AKA) may work but are untested; tunneled EAP methods MUST NOT be used.
section: 3.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
