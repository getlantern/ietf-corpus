summary: IANA maintains a 'CCMP Message Types' registry (Section 12.5.1) listing the twelve defined request/response message type pairs (e.g., blueprintsRequest/Response, confRequest/Response). New entries require IETF Review. A separate 'CCMP Response Codes' registry (Section 12.5.2) lists all defined numeric response codes with their descriptions.
