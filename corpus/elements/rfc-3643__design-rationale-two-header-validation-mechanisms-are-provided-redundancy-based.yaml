document: rfc-3643
kind: design-rationale
summary: Two header validation mechanisms are provided — redundancy-based (one's complement fields, stepwise) and CRC-based (word 6 CRC over words 0-5) — to address the needs of different design and operating environments. Redundancy-based validation allows early rejection before the full header is available, while CRC-based provides stronger integrity assurance.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
