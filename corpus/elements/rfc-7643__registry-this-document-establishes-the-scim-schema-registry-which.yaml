document: rfc-7643
kind: registry
summary: This document establishes the SCIM Schema Registry, which records SCIM schema URIs. The initial registrations include the core User, Group, ServiceProviderConfig, ResourceType, and Schema schemas, as well as the Enterprise User extension schema. Registration requires an IETF Review or Expert Review procedure.
