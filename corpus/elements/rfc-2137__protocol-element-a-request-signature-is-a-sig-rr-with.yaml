document: rfc-2137
kind: protocol-element
summary: A request signature is a SIG RR with a type-covered field of zero, placed in the Additional Information section of an update request. Each request SIG signs the entire request including the DNS header (but excluding other request SIGs), with ARCOUNT set to the value it would have without the request SIGs.
section: "4.1"
topics:
    - dns
    - security
    - crypto
