document: rfc-6773
kind: normative-requirement
summary: The UDP checksum MUST NOT be zero for a UDP packet that carries DCCP-UDP. If the received UDP Checksum field is zero, the packet MUST be dropped.
section: "3.1"
rfc2119_level: MUST NOT
topics:
