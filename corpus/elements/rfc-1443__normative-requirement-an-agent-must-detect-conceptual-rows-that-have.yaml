document: rfc-1443
kind: normative-requirement
summary: An agent must detect conceptual rows that have been in 'notInService' or 'notReady' state for an abnormally long time and remove them. It is suggested this period be approximately 5 minutes, long enough to allow for human response time between row creation and activation.
section: "2"
rfc2119_level: MUST
topics:
    - snmp
