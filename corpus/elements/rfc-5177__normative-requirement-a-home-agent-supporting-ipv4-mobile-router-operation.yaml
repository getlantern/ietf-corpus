document: rfc-5177
kind: normative-requirement
summary: A Home Agent supporting IPv4 Mobile Router operation MUST be able to forward packets destined to Mobile Network prefixes to the Mobile Router's Care-of Address, and MUST accept packets tunneled by the Mobile Router with the outer source set to the Care-of Address.
section: "6.5"
rfc2119_level: MUST
topics:
    - mobility
    - ip
