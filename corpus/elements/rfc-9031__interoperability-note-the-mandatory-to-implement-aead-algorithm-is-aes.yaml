document: rfc-9031
kind: interoperability-note
summary: The mandatory-to-implement AEAD algorithm is AES-CCM-16-64-128, which is also used for IEEE 802.15.4 frame security and has hardware acceleration on virtually all compliant radio chips. The mandatory KDF is HKDF (RFC 5869) instantiated with SHA-256.
section: 7.3.3
