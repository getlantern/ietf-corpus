document: rfc-9466
kind: interoperability-note
summary: The Zero field in Simple and Aggregated PackedAssert messages is set to zero on transmission specifically to cause non-capable PIM routers to fail in parsing rather than mis-parse the message as a standard Assert message.
section: "4.3"
topics:
