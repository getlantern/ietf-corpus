document: rfc-2492
kind: normative-requirement
summary: For SVC null encapsulation, both ends of the SVC MUST agree to use null encapsulation during the call SETUP phase. Null encapsulation SHALL NOT be used on the pt-pt SVC between the IPv6/ATM driver and its local MARS.
section: 4.1.4
rfc2119_level: MUST
topics:
    - ip
    - v6ops
