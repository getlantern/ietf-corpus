document: rfc-6554
kind: normative-requirement
summary: When using IPv6-in-IPv6 tunneling, a RPL router generating an SRH MUST set Segments Left to less than the original datagram's IPv6 Hop Limit value upon forwarding. After generating the SRH, the router decrements the original datagram's IPv6 Hop Limit by the SRH Segments Left value.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
