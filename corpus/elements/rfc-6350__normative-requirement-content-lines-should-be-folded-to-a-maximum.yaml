document: rfc-6350
kind: normative-requirement
summary: Content lines SHOULD be folded to a maximum width of 75 octets, excluding the line break. Multi-octet characters MUST remain contiguous and must not be split across folded lines.
section: "3.2"
rfc2119_level: MUST
