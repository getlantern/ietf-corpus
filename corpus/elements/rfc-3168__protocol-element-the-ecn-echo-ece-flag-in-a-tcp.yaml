document: rfc-3168
kind: protocol-element
summary: The ECN-Echo (ECE) flag in a TCP ACK informs the sender that a CE packet was received. The receiver continues setting ECE on all subsequent ACKs until it receives a packet with the CWR flag set from the sender.
section: 6.1.3
topics:
    - ecn
    - tcp
