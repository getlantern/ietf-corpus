summary: An AIB is encoded as a 'message/sipfrag' MIME body (per RFC 3420) with Content-Disposition set to 'aib; handling=optional', signed using S/MIME (multipart/signed with application/pkcs7-signature). The signed body is embedded in a multipart/mixed alongside other MIME bodies such as SDP.
