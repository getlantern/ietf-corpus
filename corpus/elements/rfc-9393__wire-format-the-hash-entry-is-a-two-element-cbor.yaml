document: rfc-9393
kind: wire-format
summary: 'The hash-entry is a two-element CBOR array: [hash-alg-id: int, hash-value: bytes]. The hash-value MUST be raw bytes (not base64-encoded) produced by the algorithm identified by hash-alg-id. Used for both file hashes (index 7) and entity thumbprints (index 34).'
section: 2.9.1
topics:
