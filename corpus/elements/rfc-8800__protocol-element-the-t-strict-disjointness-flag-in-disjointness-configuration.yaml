document: rfc-8800
kind: protocol-element
summary: The T (Strict Disjointness) flag in DISJOINTNESS-CONFIGURATION TLV controls PCE behavior when disjoint paths cannot be found. When set, the PCE MUST return no path for LSPs that could not be made disjoint. When unset, the PCE may relax disjointness by applying a requested objective function or using local policy.
section: "5.2"
topics:
    - routing
    - mpls
