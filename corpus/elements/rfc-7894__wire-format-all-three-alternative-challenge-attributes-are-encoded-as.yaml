document: rfc-7894
kind: wire-format
summary: All three alternative challenge attributes are encoded as DirectoryString with a maximum length of 255 characters. Values SHOULD use PrintableString encoding when possible; UTF8String SHOULD be used when internationalization requires it. Implementations MUST support PrintableString and UTF8String; other string types are OPTIONAL.
