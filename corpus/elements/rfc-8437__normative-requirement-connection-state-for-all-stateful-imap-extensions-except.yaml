document: rfc-8437
kind: normative-requirement
summary: Connection state for all stateful IMAP extensions (except STARTTLS and ID) MUST be reset if the extension is advertised and UNAUTHENTICATE is advertised and used. This requirement applies to all current and future extensions.
section: "4.1"
rfc2119_level: MUST
topics:
