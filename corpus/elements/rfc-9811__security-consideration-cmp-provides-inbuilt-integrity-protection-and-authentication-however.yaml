document: rfc-9811
kind: security-consideration
summary: CMP provides inbuilt integrity protection and authentication; however, an eavesdropper may gather confidential information from unencrypted CMP messages. Users should consider HTTP over TLS (RFC 9110) or IPsec VPNs to protect confidentiality and ensure EE privacy.
section: "5"
topics:
