document: rfc-8861
kind: wire-format
summary: 'The RTCP RGRS packet (PT=212) contains: a 2-bit version (V=2), 1-bit padding (P), 5-bit source count (SC), 8-bit payload type (PT=212), 16-bit length, 32-bit SSRC of packet sender, and a variable-length list of 32-bit SSRCs identifying the reporting sources. The length field is always 2 or greater since at least one reporting source SSRC must be present.'
section: 3.2.2
topics:
    - rtp
    - realtime
