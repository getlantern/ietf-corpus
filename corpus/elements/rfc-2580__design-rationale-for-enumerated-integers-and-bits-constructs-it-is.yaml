document: rfc-2580
kind: design-rationale
summary: For enumerated INTEGERs and BITS constructs, it is recommended to explicitly list all objects with enumerated syntax in a VARIATION clause even when all enumerations are currently supported, to avoid problems if the MIB module later adds new enumerations or changes labels.
section: 6.5.2.1
