document: rfc-9595
kind: registry
summary: 'New IANA registry ''IETF YANG-SID Ranges'' records SID range assignments to YANG modules. The first million SIDs are subdivided: 0-999 (IESG Approval), 1,000-59,999 and 100,000-299,999 (RFC + Expert Review for IETF modules), 60,000-99,999 (Experimental Use, MUST NOT be used in operational deployments), 300,000-999,999 (Reserved). SID range size SHOULD be a multiple of 50 and at least 33% above current item count.'
section: "6.4"
topics:
    - registry
    - yang
    - netconf
