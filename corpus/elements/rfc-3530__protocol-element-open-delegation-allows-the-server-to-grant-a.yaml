document: rfc-3530
kind: protocol-element
summary: Open delegation allows the server to grant a client a read or write delegation for a file at OPEN time. A read delegation guarantees no other client can write; a write delegation guarantees exclusive access. Delegations are recalled via server callback (CB_RECALL) when conflicting access is requested and require a working callback path to be granted.
section: 1.4.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
