document: rfc-4244
kind: design-rationale
summary: Adding History-Info between Steps 8 and 9 of RFC 3261 proxy forwarding (rather than Step 5) is recommended because strict routing can change the Request-URI during Step 6, which would cause an incorrect URI to be captured if the header were added earlier.
section: 4.3.3.1
topics:
    - sip
    - realtime
