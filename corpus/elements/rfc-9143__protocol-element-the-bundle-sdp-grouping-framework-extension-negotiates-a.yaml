document: rfc-9143
kind: protocol-element
summary: The BUNDLE SDP Grouping Framework extension negotiates a single transport (5-tuple) for sending and receiving media described by multiple 'm=' sections. The address:port combination used by an endpoint for bundled media is the BUNDLE address:port, and a single 'group:BUNDLE' attribute lists the identification-tags of all bundled 'm=' sections.
section: "5"
