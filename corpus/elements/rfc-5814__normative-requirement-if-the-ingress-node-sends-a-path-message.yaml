document: rfc-5814
kind: normative-requirement
summary: If the ingress node sends a Path message but receives a PathErr message in response, the LSP setup delay MUST be set to undefined. Reasons include invalid Path parameters or insufficient network resources.
section: "4.6"
rfc2119_level: MUST
