document: rfc-7766
kind: normative-requirement
summary: DNS clients MUST take care to minimize the number of concurrent TCP connections made to any individual server. It is RECOMMENDED that there be no more than one connection for regular queries, one for zone transfers, and one for each protocol on top of TCP.
section: 6.2.2
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
