document: rfc-6122
kind: normative-requirement
summary: XMPP entities SHOULD consider resourceparts to be opaque strings and SHOULD NOT impute meaning to any given resourcepart. The '/' separator does not imply hierarchy, and '@' is allowed within the resourcepart (commonly used for chatroom nicks).
section: "2.4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
