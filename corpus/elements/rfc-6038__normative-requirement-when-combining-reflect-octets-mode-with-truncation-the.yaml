document: rfc-6038
kind: normative-requirement
summary: When combining Reflect Octets mode with truncation, the Session-Sender MUST append at least 27 octets of padding plus the Length of padding to reflect in Unauthenticated mode, and at least 56 octets plus the Length of padding to reflect in Authenticated/Encrypted modes.
section: 5.1.3
rfc2119_level: MUST
topics:
