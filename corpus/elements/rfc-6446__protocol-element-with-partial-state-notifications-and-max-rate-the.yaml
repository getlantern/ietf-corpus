document: rfc-6446
kind: protocol-element
summary: With partial-state notifications and max-rate, the notifier maintains both the current full state F and the last communicated full state F'. F' is only replaced with F after the partial difference has been included in a notification. If the accumulated partial state exceeds full state size, the notifier SHOULD send full state instead.
section: 5.5.1
topics:
    - sip
    - realtime
