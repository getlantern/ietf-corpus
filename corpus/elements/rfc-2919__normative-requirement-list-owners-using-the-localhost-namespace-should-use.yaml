document: rfc-2919
kind: normative-requirement
summary: List owners using the 'localhost' namespace SHOULD use the month and year (MMYYYY) of creation as a subdomain, and some portion of the identifier MUST be a randomly generated string. Identifiers with a random component SHOULD contain a hex encoding of 128 bits of randomness (32 hex characters).
section: "5"
rfc2119_level: SHOULD
topics:
