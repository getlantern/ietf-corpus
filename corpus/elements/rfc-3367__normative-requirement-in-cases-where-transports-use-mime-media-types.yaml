document: rfc-3367
kind: normative-requirement
summary: In cases where transports use MIME Media Types (HTTP and SMTP), the CNRP payload MUST use the 'application/cnrp+xml' media type. Since CNRP always uses UTF-8, there is no charset attribute for this media type.
section: "7"
rfc2119_level: MUST
topics:
    - http
    - email
