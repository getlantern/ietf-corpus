document: rfc-5784
kind: interoperability-note
summary: Unknown controls encountered during Sieve-to-XML conversion are treated as actions; while this may cause semantic issues, the conversion can pass such constructs through both representations since knowledge of a control's semantics is almost always needed to exploit it.
