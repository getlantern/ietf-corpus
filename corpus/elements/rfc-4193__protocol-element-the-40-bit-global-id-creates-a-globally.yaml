document: rfc-4193
kind: protocol-element
summary: The 40-bit Global ID creates a globally unique prefix through pseudo-random allocation. It MUST NOT be assigned sequentially or with well-known numbers, ensuring no relationship between allocations and clarifying these prefixes are not intended for global routing.
section: "3.2"
topics:
