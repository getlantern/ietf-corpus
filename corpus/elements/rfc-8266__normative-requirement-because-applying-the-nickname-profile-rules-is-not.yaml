document: rfc-8266
kind: normative-requirement
summary: Because applying the Nickname profile rules is not idempotent for all code points, an implementation SHOULD apply the rules repeatedly until the output stabilizes; if not stable after three additional applications, the implementation SHOULD reject the input as invalid.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
