document: rfc-2472
kind: protocol-element
summary: To derive an interface identifier from an EUI-64, the only transformation is to invert the 'u' (universal/local) bit (bit 6 in canonical order). For EUI-48, it is first expanded to EUI-64 by inserting 0xFF and 0xFE between the company_id and extension-identifier.
