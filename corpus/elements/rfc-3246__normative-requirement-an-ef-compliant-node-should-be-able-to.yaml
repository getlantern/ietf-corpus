document: rfc-3246
kind: normative-requirement
summary: An EF-compliant node SHOULD be able to be characterized by the range of R values and the value of E_p that can be met on each interface. E_p MAY be specified as worst-case, as a function of R, or as 'undefined' for schedulers where a meaningful bound cannot be provided.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
