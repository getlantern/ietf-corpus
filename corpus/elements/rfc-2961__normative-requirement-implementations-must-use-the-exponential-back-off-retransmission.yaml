document: rfc-2961
kind: normative-requirement
summary: Implementations MUST use the exponential back-off retransmission procedures defined in Section 6 (or equivalent) when retransmitting messages with ACK_Desired set. The retransmission timer is not advertised via the TIME_VALUE object.
section: "6"
rfc2119_level: MUST
topics:
