document: rfc-9648
kind: interoperability-note
summary: This document does not deprecate the TCP MIB (RFC 4022); the basic statistics defined follow the TCP MIB model, allowing implementations to migrate from MIB to YANG. The YANG module adds a statistics reset capability not present in the TCP MIB.
section: "3.1"
topics:
    - tcp
    - yang
    - snmp
