document: rfc-5437
kind: normative-requirement
summary: An implementation SHOULD NOT retry delivery if it receives an XMPP error of type 'auth' or 'cancel', MAY retry for 'wait' errors, and MAY retry for 'modify' errors only with appropriate modifications. The number of retries SHOULD be limited to between 3 and 10.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - email
