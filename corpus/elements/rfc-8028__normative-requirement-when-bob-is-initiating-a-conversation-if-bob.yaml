document: rfc-8028
kind: normative-requirement
summary: When Bob is initiating a conversation, if Bob-B has advertised an RIO for the destination prefix and Bob-A has not, Bob MAY take that fact into account in address selection, choosing an address that would allow use of the RIO.
section: "3.1"
rfc2119_level: MAY
topics:
