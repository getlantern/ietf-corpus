document: rfc-7975
kind: design-rationale
summary: The scope dictionary in RI responses allows a dCDN to indicate that a response applies to a wider IP range than the specific UA in the request, reducing RI request volume and latency for the uCDN. This is a deliberate trade-off that also increases the risk of topology probing as noted in Section 5.
section: "4.6"
topics:
