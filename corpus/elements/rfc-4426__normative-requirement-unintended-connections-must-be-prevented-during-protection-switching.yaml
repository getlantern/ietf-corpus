document: rfc-4426
kind: normative-requirement
summary: Unintended connections MUST be prevented during protection switching. The master node MUST disconnect any pre-empted traffic on the selected protection link before sending the Switchover Request, and the slave MUST disconnect pre-empted traffic before sending the Switchover Response.
section: "2.6"
rfc2119_level: MUST
topics:
    - mpls
    - security
