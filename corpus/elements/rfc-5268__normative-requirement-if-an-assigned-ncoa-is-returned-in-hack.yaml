document: rfc-5268
kind: normative-requirement
summary: If an assigned NCoA is returned in HAck, it MUST be included in the FBack message, and the MN MUST use the assigned address (rather than the proposed NCoA in the FBU) upon attaching to the NAR.
section: "3.2"
rfc2119_level: MUST
