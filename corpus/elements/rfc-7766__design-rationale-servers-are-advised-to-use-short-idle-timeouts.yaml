document: rfc-7766
kind: design-rationale
summary: Servers are advised to use short idle timeouts (on the order of seconds) rather than long fixed timeouts because long server timeouts cause resource exhaustion under heavy load and enable trivial TCP DoS attacks by clients leaving idle connections open.
section: 6.1.2
topics:
    - dns
    - tcp
    - security
