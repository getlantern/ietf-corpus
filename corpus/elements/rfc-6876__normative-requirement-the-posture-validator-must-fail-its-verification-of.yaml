document: rfc-6876
kind: normative-requirement
summary: The Posture Validator MUST fail its verification of the endpoint if an NEA Asokan attack is detected (i.e., the tls-unique channel binding value provided by the EMA does not match the tls-unique value for the server's end of the connection).
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
