document: rfc-4837
kind: interoperability-note
summary: OLT virtual interfaces are stacked onto the physical OLT interface via the IF-MIB ifStackTable and ifInvStackTable (ifStackHigherLayer=virtual_ifIndex, ifStackLowerLayer=physical_ifIndex). The broadcast virtual interface is also stacked onto the physical interface.
