document: rfc-4209
kind: protocol-element
summary: A new LMP-WDM CONFIG object (Class = 6, C-Type = 2) is defined to distinguish peer node-to-OLS LMP sessions from peer node-to-peer node sessions. It contains a WDM bit (support for LMP-WDM extensions) and an OLS bit (sender is OLS if set, peer node if clear).
section: "2.1"
topics:
    - mpls
    - routing
