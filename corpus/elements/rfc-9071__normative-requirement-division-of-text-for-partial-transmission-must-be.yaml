document: rfc-9071
kind: normative-requirement
summary: Division of text for partial transmission MUST be made at T140block borders when the 'cps' limit is reached. When the rate falls below 'cps' again, transmission intervals SHALL be reset to 330 ms and new text SHALL again be sent as soon as available.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - congestion
