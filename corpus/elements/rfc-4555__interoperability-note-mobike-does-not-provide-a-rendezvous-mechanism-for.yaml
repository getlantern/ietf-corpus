document: rfc-4555
kind: interoperability-note
summary: MOBIKE does not provide a rendezvous mechanism for simultaneous movement of both parties or initial address discovery. At least one endpoint must have a relatively stable address discoverable via DNS or local configuration.
section: "1.2"
