document: rfc-4650
kind: protocol-element
summary: MIKEY-DHHMAC is a fourth MIKEY key management variant (data types 7 and 8) combining Diffie-Hellman key agreement with HMAC authentication over a pre-shared key. It establishes a TEK Generation Key (TGK = g^(xi*xr)) within one roundtrip for peer-to-peer multimedia sessions without requiring a PKI.
section: "1"
topics:
