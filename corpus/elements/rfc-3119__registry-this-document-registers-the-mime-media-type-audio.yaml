document: rfc-3119
kind: registry
summary: This document registers the MIME media type audio/mpa-robust for MP3 audio transported via RTP as specified in RFC 3119. It has no required or optional parameters, is only for RTP transfer, and is incompatible with audio/mpa and audio/mpeg.
section: "7"
topics:
