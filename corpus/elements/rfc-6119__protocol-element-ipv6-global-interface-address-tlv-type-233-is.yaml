document: rfc-6119
kind: protocol-element
summary: IPv6 Global Interface Address TLV (type 233) is structurally identical to the IPv6 Interface Address TLV but carries global or unique-local IPv6 addresses; it is included in IIH PDUs only (not LSPs) to allow neighbors to construct the IPv6 Neighbor Address sub-TLV.
section: "4.5"
topics:
    - routing
    - ip
