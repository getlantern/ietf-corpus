document: rfc-7056
kind: normative-requirement
summary: Federated context attribute names MUST NOT be used for attributes issued by a party other than one closely associated with the source of credentials, unless the source of credentials is re-asserting those attributes. Acceptors can assume attributes in the federated context come from the credential source.
section: "4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
