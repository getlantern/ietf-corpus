document: rfc-7171
kind: security-consideration
summary: Without confidentiality from the outer EAP tunnel, an eavesdropper could observe PA-TNC attributes in PB-TNC batches and determine that an endpoint lacks patches or that sub-networks have lenient policies, enabling targeted attacks. The EAP tunnel must provide strong cryptographic authentication, integrity, and confidentiality.
section: 4.2.1
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
