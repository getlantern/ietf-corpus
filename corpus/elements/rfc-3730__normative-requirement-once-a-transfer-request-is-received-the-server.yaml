document: rfc-3730
kind: normative-requirement
summary: Once a transfer request is received, the server MUST notify the current sponsoring client by queuing a service message for retrieval via <poll>. Transfer service messages MUST include the object-specific elements specified for <transfer> command responses.
section: 2.9.3.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
