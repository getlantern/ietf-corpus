document: rfc-2996
kind: security-consideration
summary: Observation of DCLASS object values in RSVP messages may reveal that different flows receive different QoS levels, that a single flow's QoS has changed (potentially signaling significant application events), or internal DS network operational details useful for theft-of-service attacks.
