document: rfc-1575
kind: normative-requirement
summary: When an echo-response packet header is embedded in the echo-request data part and used by the packet composition function, the value of the lifetime field in that embedded header MUST be used as the lifetime field value in the echo-response packet; segment length and checksum SHALL be recomputed by the network-entity regardless.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
