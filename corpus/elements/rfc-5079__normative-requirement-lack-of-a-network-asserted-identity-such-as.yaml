document: rfc-5079
kind: normative-requirement
summary: Lack of a network-asserted identity (such as the P-Asserted-Identity header field), in and of itself, SHOULD NOT be considered an indication of anonymity, because there is no way to differentiate removal of a network-asserted identity from a domain that never supported it.
section: "3"
rfc2119_level: SHOULD NOT
