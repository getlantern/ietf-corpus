document: rfc-5234
kind: protocol-element
summary: 'Terminal values are specified with a base prefix: %b for binary, %d for decimal, %x for hexadecimal. Concatenated values use ''.'' notation (e.g., %d13.10 for CRLF) and ranges use ''-'' notation (e.g., %x30-39 for digits).'
section: "2.3"
