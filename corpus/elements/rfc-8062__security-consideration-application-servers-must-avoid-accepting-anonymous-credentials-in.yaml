document: rfc-8062
kind: security-consideration
summary: Application servers MUST avoid accepting anonymous credentials in situations where they must record the client's identity (e.g., when an audit trail is required). Servers MAY reject anonymous authentication to prevent information disclosure or as part of DoS prevention.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - privacy
