document: rfc-7886
kind: security-consideration
summary: Advertising S-BFD Discriminators via L2TPv3 makes it possible for attackers to initiate S-BFD sessions using the advertised discriminator values. The introduction of this AVP introduces no new security risks beyond those addressed in RFC 3931 (L2TPv3), and the S-BFD-specific vulnerabilities and mitigations are discussed in RFC 7880.
section: "4"
topics:
    - security
