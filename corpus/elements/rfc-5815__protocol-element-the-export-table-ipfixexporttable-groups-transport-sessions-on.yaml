document: rfc-5815
kind: protocol-element
summary: The Export Table (ipfixExportTable) groups Transport Sessions on an Exporter into Transport Session groups via ipfixExportIndex. Each group member carries a type of unknown(0), primary(1), secondary(2), parallel(3), or loadBalancing(4) to express failover, duplicate export, or load-balancing relationships. This table is not needed on Collectors.
section: "5.4"
topics:
