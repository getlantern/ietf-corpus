document: rfc-7845
kind: normative-requirement
summary: The RECOMMENDED MIME type for Ogg Opus files is 'audio/ogg'; the RECOMMENDED filename extension is '.opus'. When multiplexed with other streams, 'audio/ogg', 'video/ogg', or 'application/ogg' SHOULD be used and '.opus' is NOT RECOMMENDED.
section: "9"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
