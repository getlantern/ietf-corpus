document: rfc-2615
kind: wire-format
summary: The octet stream is mapped into the SONET STS-SPE/SDH Higher Order VC with octet boundaries aligned with VC octet boundaries. The entire SONET/SDH payload (STS-SPE/Higher Order VC minus path overhead and fixed stuff) is scrambled using a self-synchronous scrambler of polynomial X^43+1.
