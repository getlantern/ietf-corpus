document: rfc-4807
kind: normative-requirement
summary: Sub-actions within a spdCompoundActionTable row MUST execute in series in ascending spdSubActPriority order. spdCompActExecutionStrategy governs whether to run all sub-actions (doAll), stop on first success (doUntilSuccess), or stop on first failure (doUntilFailure).
section: "6"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
