document: rfc-1808
kind: protocol-element
summary: 'The Base URL can be embedded in RFC 822-style message headers using the format: ''Base: <URL:absoluteURL>'', where ''Base'' is case-insensitive and whitespace inside angle brackets is ignored. This header serves as the base for relative URLs in both message headers and enclosed documents.'
section: "3.1"
