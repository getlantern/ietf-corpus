document: rfc-4220
kind: protocol-element
summary: The teLinkBandwidthTable (teLinkObjects 4) provides priority-based unreserved bandwidth per TE link, indexed by ifIndex and teLinkBandwidthPriority (0–7). The unreserved bandwidth at priority p is the sum of unreserved bandwidths at priority p across all component links associated with the TE link, excluding protecting-only links.
section: "6.4"
topics:
