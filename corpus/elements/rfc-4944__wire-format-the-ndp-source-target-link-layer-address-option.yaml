kind: wire-format
summary: The NDP Source/Target Link-layer Address option for 802.15.4 uses Type 1/2, Length=2 (16 octets) for EUI-64 addresses with zero padding, or Length=1 (8 octets) for 16-bit short addresses with zero padding. The IEEE 802.15.4 address is in canonical bit order.
