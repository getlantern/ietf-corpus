document: rfc-5990
kind: security-consideration
summary: 'RSA-KEM should be considered for new CMS applications as a replacement for PKCS #1 v1.5, which is vulnerable to chosen-ciphertext attacks. RSA-KEM has a tighter security proof than RSAES-OAEP, at the cost of slightly longer encrypted keying data.'
section: "3"
topics:
    - crypto
    - security
