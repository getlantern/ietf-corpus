document: rfc-8705
kind: normative-requirement
summary: A client using the 'tls_client_auth' authentication method MUST use exactly one of the defined metadata parameters (tls_client_auth_subject_dn, tls_client_auth_san_dns, tls_client_auth_san_uri, tls_client_auth_san_ip, tls_client_auth_san_email) to indicate the expected certificate subject.
section: 2.1.2
rfc2119_level: MUST
topics:
