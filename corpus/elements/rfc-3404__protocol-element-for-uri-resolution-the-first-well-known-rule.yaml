document: rfc-3404
kind: protocol-element
summary: For URI resolution, the First Well Known Rule extracts the URI scheme as the initial key (e.g., 'http' from 'http://www.example.com/'). For URN resolution, the Namespace Identifier is extracted as the first key (e.g., 'foo' from 'urn:foo:foospace').
section: "4.2"
