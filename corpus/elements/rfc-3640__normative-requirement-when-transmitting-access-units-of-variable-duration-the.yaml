document: rfc-3640
kind: normative-requirement
summary: When transmitting Access Units of variable duration, the 'constantDuration' parameter MUST NOT be present, the transmitter MUST use AU-Index to encode ordering information, and CTS-delta MUST be coded in the AU-header for each non-first AU in the RTP packet.
section: 3.2.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
