document: rfc-7959
kind: normative-requirement
summary: The Size2 option value MUST be set to 0 when used in a request as a size request (asking the server to provide a size estimate). A client MUST be prepared for the server to ignore the size estimate request, as the options are elective.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
