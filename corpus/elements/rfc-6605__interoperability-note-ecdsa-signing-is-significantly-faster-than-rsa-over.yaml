document: rfc-6605
kind: interoperability-note
summary: ECDSA signing is significantly faster than RSA (over 20× in some implementations), but RSA signature validation is significantly faster than ECDSA validation (about 5× faster), which has implications for validator performance when deploying ECDSA in DNSSEC.
section: "1"
topics:
