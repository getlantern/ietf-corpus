document: rfc-9181
kind: interoperability-note
summary: The L3SM (RFC 8299) uses 'input'/'output' to identify bandwidth direction; the 'ietf-vpn-common' module replaces this with 'inbound-bw'/'outbound-bw' identities and feature flags. The L3SM terminology is declared deprecated in this document, establishing a migration path for future L3SM revisions.
