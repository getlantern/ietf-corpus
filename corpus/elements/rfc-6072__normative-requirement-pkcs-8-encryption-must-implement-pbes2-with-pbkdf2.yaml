document: rfc-6072
kind: normative-requirement
summary: 'PKCS #8 encryption MUST implement PBES2 with PBKDF2 using HMAC (supporting both SHA-1 and SHA-256) and MUST implement id-aes128-wrap-pad as defined in RFC 5649. A different password SHOULD be used for PKCS #8 encryption than for client authentication.'
section: "10.5"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
