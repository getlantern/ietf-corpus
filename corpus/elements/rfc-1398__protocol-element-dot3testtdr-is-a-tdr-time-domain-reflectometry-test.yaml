document: rfc-1398
kind: protocol-element
summary: dot3TestTdr is a TDR (Time-domain Reflectometry) test identifier under dot3Tests. On completion, the result is the time interval in 10 MHz ticks (100 ns units) between the start of TDR transmission and detection of a collision or carrier deassertion. Not applicable to 10BaseT or 10BaseF interfaces.
section: "4.3"
topics:
