document: rfc-7731
kind: normative-requirement
summary: An MPL Forwarder MUST use a separate Trickle timer for each MPL Data Message that it is actively forwarding. After DATA_MESSAGE_TIMER_EXPIRATIONS Trickle timer expiration events, the MPL Forwarder MUST disable the Trickle timer for that message.
section: "9.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
