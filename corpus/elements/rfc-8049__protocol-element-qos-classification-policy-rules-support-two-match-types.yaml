document: rfc-8049
kind: protocol-element
summary: 'QoS classification policy rules support two match types: ''match-flow'' (matching DSCP, dot1p, IPv4/IPv6 src/dst prefixes, L4 src/dst ports, port ranges, or IP protocol field) and ''match-application'' (identity reference). Each rule maps to a ''target-class-id'' string for downstream QoS profile application.'
