document: rfc-9243
kind: security-consideration
summary: The OPTION_AUTH (11) Authentication Option is modeled to allow configuration of DHCPv6 message authentication (algorithm, replay detection method, and RKAP). Proper use of this option protects against rogue server attacks and Reconfigure message injection; the RKAP protocol case specifically guards against misconfiguration by a malicious DHCP server.
section: "4.1"
topics:
    - yang
    - security
    - crypto
