document: rfc-7986
kind: normative-requirement
summary: In the absence of the DISPLAY parameter, the default value BADGE MUST be used. Servers and clients MUST handle unrecognized x-name and iana-token values by not displaying any image at all.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
