document: rfc-5603
kind: normative-requirement
summary: The value 4095 MUST be used for pwEnetPwVlan when the object is not applicable (e.g., port mode where all packets from the port map to the PW). The value 0 MUST be set to indicate untagged frames when pwEnetVlanMode is noChange and pwEnetPortVlan is 0.
section: "10"
rfc2119_level: MUST
topics:
