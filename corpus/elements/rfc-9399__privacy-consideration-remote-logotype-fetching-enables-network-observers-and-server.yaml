document: rfc-9399
kind: privacy-consideration
summary: Remote logotype fetching enables network observers and server operators to determine which clients are using certificates with particular logotype data, potentially revealing certificate usage frequency. Clients SHOULD cache logotype data to reduce fetching frequency, and MAY use HTTPS with padding to reduce visibility.
section: "10"
topics:
    - pkix
    - privacy
