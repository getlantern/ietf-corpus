document: rfc-8529
kind: protocol-element
summary: The ietf-network-instance module defines a 'network-instances' container holding a keyed list 'network-instance', each with a 'name' string (mandatory), optional 'enabled' boolean (default true), optional 'description' string, a 'ni-type' choice for augmentation anchoring, and a mandatory 'root-type' choice selecting among the three well-known mount points.
