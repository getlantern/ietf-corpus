document: rfc-3023
kind: protocol-element
summary: application/xml-dtd is the media type for external DTD subsets and external parameter entities. Neither external DTD subsets nor external parameter entities parse as XML documents, requiring a dedicated type distinct from text/xml and application/xml.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
