document: rfc-9735
kind: normative-requirement
summary: An AFI 17 Distinguished Name encoded string MUST be at least 1 octet in length; if the octet after the AFI field is the NULL octet (0x00), the string is a NULL string and MUST be accepted.
section: "3"
rfc2119_level: MUST
