document: rfc-6872
kind: design-rationale
summary: Establishing SIP CLF is more challenging than HTTP CLF because SIP supports parallel/serial forking (multiple final responses), dialog grouping of transactions with varying inter-arrival rates, ACK as a special non-response-eliciting method tied to INVITE, CANCEL, and provisional responses that must be logged for anomaly detection training.
