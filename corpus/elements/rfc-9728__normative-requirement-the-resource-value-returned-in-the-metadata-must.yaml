document: rfc-9728
kind: normative-requirement
summary: The resource value returned in the metadata MUST be identical to the protected resource's resource identifier used to derive the well-known URL. If these values are not identical, the data contained in the response MUST NOT be used.
section: "3.3"
rfc2119_level: MUST
topics:
