document: rfc-2558
kind: protocol-element
summary: 'The SONET-MIB is organized into eight groups indexed by ifIndex: Medium, Section, Line, Far End Line, Path, Far End Path, VT, and Far End VT. Each group has a Current table (current 15-minute interval) and an Interval table (up to 96 previous 15-minute intervals). The MIB OID root is transmission(39).'
