document: rfc-7235
kind: protocol-element
summary: 'The WWW-Authenticate header field indicates the authentication scheme(s) and parameters applicable to the target resource. ABNF: WWW-Authenticate = 1#challenge. It can contain multiple challenges, each with a comma-separated list of authentication parameters, and the header field itself can occur multiple times.'
section: "4.1"
topics:
    - http
