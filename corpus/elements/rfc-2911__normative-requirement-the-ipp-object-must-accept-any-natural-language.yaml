document: rfc-2911
kind: normative-requirement
summary: The IPP object MUST accept any natural language and any Natural Language Override value supplied by the client, independent of 'generated-natural-language-supported' and independent of 'ipp-attribute-fidelity'. The IPP object MUST NOT reject a request based on an unsupported natural language.
section: 3.1.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
