document: rfc-1122
kind: design-rationale
summary: 'The Robustness Principle states: ''Be liberal in what you accept, and conservative in what you send.'' Software must handle every conceivable error and unexpected variation gracefully, while senders should avoid obscure or non-obvious features that may break other implementations.'
