document: rfc-4287
kind: protocol-element
summary: The atom:id element conveys a permanent, universally unique IRI identifier for an entry or feed. The IRI MUST NOT be assumed dereferenceable; it is a persistent opaque identifier that MUST NOT change when the document is relocated, migrated, syndicated, or republished.
section: 4.2.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
