document: rfc-4791
kind: normative-requirement
summary: The UID property value of calendar components in a calendar object resource MUST be unique in the scope of the calendar collection. Components with the same UID MUST be contained in the same calendar object resource.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
