document: rfc-2651
kind: design-rationale
summary: CIP is a 'backend' protocol spoken only among servers; queries are answered via the server's native data access protocol (e.g., LDAP, HTTP), while index objects travel via separate CIP protocol exchanges. This separation is intentional and fundamental to the architecture.
section: "3.1"
