document: rfc-9005
kind: normative-requirement
summary: If a PCEP speaker does not support handling multiple policies for an LSP, it MUST NOT add the LSP into the association group and MUST return a PCErr with Error-Type 26 'Association Error' and Error-value 7 'Cannot join the association group'.
section: "4"
rfc2119_level: MUST NOT
topics:
