document: rfc-9258
kind: normative-requirement
summary: Applications SHOULD provision separate PSKs for (D)TLS 1.3 and prior versions. Reusing external PSKs across different TLS versions may produce related outputs and lead to security problems.
section: "1"
rfc2119_level: SHOULD
topics:
