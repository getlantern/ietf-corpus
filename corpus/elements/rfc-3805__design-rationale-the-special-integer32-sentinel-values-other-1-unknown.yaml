document: rfc-3805
kind: design-rationale
summary: The special Integer32 sentinel values other(-1), unknown(-2), and partial(-3) were introduced to express conditions outside normal numeric ranges (e.g., some supply remaining but amount indeterminate) without requiring separate status objects alongside every numeric measurement.
