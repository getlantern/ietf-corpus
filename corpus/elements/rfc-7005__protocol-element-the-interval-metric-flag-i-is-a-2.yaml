document: rfc-7005
kind: protocol-element
summary: The Interval Metric flag (I) is a 2-bit field indicating whether metrics are Sampled (I=01), Interval Duration (I=10), or Cumulative Duration (I=11). The value I=00 is reserved. For de-jitter buffer metrics, only I=01 (Sampled) is valid.
section: "4.2"
