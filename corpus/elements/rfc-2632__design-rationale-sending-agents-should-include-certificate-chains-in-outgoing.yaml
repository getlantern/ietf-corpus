document: rfc-2632
kind: design-rationale
summary: Sending agents SHOULD include certificate chains in outgoing messages to increase the likelihood that recipients can establish trust, especially when sending to new recipients or those without access to a shared directory. This can be omitted when a group has established certificate sharing by other means.
section: "2.3"
topics:
    - email
    - pkix
