document: rfc-8486
kind: design-rationale
summary: Channel Mapping Family 3 adds flexibility over family 2 by supporting a demixing matrix, enabling mixed-order Ambisonics, non-diegetic stereo, and arbitrary channel mixing. Silent ACN channels in mixed-order representations are indicated by all-zero rows in the demixing matrix.
section: "3.2"
