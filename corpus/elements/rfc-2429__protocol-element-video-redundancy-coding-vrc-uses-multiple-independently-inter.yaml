document: rfc-2429
kind: protocol-element
summary: Video Redundancy Coding (VRC) uses multiple independently inter-frame predicted 'threads' of pictures. All threads converge periodically to a sync frame; lower-numbered threads carry equal or higher quality representations and have higher delivery priority.
section: "4.2"
topics:
