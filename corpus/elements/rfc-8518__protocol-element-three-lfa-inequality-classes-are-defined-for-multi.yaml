document: rfc-8518
kind: protocol-element
summary: 'Three LFA inequality classes are defined for multi-homed prefixes (MHPs): link-protecting, link-protecting + downstream-paths-only, and node-protecting. Each uses D_opt(X,Y) (shortest-path metric) and Cost(X,P) (prefix metric from originating node X) to evaluate a neighbor N as a valid alternate.'
