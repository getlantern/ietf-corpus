document: rfc-4401
kind: design-rationale
summary: The PRF extension is introduced because applications using GSS-API for authentication but not for transport security have no way to obtain keying material from established security contexts, making GSS-API ineffective for such use cases. The extension fills this gap by providing a standard keying interface.
section: "1"
topics:
    - security
    - crypto
