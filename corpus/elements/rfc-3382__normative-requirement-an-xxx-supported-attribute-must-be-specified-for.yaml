document: rfc-3382
kind: normative-requirement
summary: 'An ''xxx-supported'' attribute MUST be specified for every collection attribute, in one of two forms: (a) a ''1setOf collection'' enumerating all supported collection values, or (b) a ''1setOf type2 keyword'' enumerating the names of all member attributes.'
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
