document: rfc-5170
kind: security-consideration
summary: 'Attacks against FEC parameters (FEC OTI) can prevent decoding by, for example, causing a different block partitioning (e.g., modifying B). It is RECOMMENDED that FEC OTI integrity be protected: in-band EXT_FTI via digital signature, Group MAC, or TESLA; FDT Instances via XML digital signatures; out-of-band OTI via CMS signatures.'
section: "8.3"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
