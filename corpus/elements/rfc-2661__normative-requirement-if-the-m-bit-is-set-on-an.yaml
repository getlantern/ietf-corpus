document: rfc-2661
kind: normative-requirement
summary: If the M bit is set on an unrecognized AVP within a session-associated message, the session MUST be terminated. If the M bit is set on an unrecognized AVP within a tunnel-associated message, the entire tunnel and all sessions within MUST be terminated. If the M bit is not set, the unrecognized AVP MUST be ignored.
section: "4.1"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
