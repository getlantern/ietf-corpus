document: rfc-4868
kind: security-consideration
summary: Security of HMAC-SHA-256+ depends on the strength of the underlying hash algorithm, the HMAC construct, correctness of implementation, security of key management, and strength of the secret key. Test vectors are provided to verify implementation correctness but do not verify surrounding security infrastructure.
