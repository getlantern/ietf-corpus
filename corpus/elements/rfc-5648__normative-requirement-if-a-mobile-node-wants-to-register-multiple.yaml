document: rfc-5648
kind: normative-requirement
summary: If a mobile node wants to register multiple bindings, it MUST generate a unique BID for each care-of address and store the BID in the Binding Update List. A BID MUST be unique for a given home address; once multiple care-of addresses exist, all MUST be mapped to BIDs.
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
