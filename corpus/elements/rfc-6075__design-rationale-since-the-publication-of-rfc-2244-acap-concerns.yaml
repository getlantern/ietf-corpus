document: rfc-6075
kind: design-rationale
summary: Since the publication of RFC 2244 (ACAP), concerns arose about handling and comparing full Unicode strings, prompting this specification to restrict new registrations to the ASCII subset of UTF-8 while preserving the requirement that processors accept arbitrary Unicode vendor tags already in use.
section: "3.1"
topics:
