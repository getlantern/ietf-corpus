document: rfc-959
kind: protocol-element
summary: The error recovery restart procedure is defined for block and compressed modes only. The sender inserts a marker block in the data stream; the receiver records the corresponding position and returns marker information via a 110 reply. On system failure, the user sends REST with the server's marker code immediately followed by the interrupted service command.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
