document: rfc-1596
kind: protocol-element
summary: 'The frPVCEndptTable models a bidirectional PVC segment endpoint indexed by ifIndex and DLCI. It stores per-direction traffic parameters (CIR in bps, Bc and Be in bits, MaxFrameSize in octets) for both ingress and egress directions, plus statistics: in/out frames, DE frames, excess frames, discards, and octets.'
