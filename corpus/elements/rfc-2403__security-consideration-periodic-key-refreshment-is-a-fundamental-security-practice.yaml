document: rfc-2403
kind: security-consideration
summary: 'Periodic key refreshment is a fundamental security practice recommended for HMAC-MD5-96: it guards against potential weaknesses, reduces information available to a cryptanalyst, and limits damage from an exposed key, even though current attacks do not mandate a specific rekeying frequency.'
