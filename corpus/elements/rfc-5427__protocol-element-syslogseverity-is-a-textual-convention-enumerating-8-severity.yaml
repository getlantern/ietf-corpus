document: rfc-5427
kind: protocol-element
summary: 'SyslogSeverity is a TEXTUAL-CONVENTION enumerating 8 severity levels (0–7): emerg(0), alert(1), crit(2), err(3), warning(4), notice(5), info(6), debug(7). It provides a normative label-to-numeric mapping for SNMP management interfaces, referencing RFC 5424 Table 2.'
