document: rfc-8264
kind: normative-requirement
summary: It is NOT RECOMMENDED for application protocols to profile the FreeformClass for passwords in a way that removes entire code point categories (e.g., disallowing symbols or punctuation), as this reduces entropy. It is NOT RECOMMENDED to map case in password strings; case preservation and case-sensitive comparison are RECOMMENDED instead.
section: "12.6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
