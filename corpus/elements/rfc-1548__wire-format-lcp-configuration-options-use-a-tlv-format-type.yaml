summary: 'LCP Configuration Options use a TLV format: Type (1 octet), Length (1 octet, inclusive), and Data (variable). Defined option types are: 1=Maximum-Receive-Unit, 2=Async-Control-Character-Map, 3=Authentication-Protocol, 4=Quality-Protocol, 5=Magic-Number, 6=RESERVED, 7=Protocol-Field-Compression, 8=Address-and-Control-Field-Compression.'
