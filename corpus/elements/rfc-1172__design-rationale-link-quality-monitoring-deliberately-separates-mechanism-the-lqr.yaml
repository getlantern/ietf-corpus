document: rfc-1172
kind: design-rationale
summary: Link Quality Monitoring deliberately separates 'mechanism' (the LQR packet format and transmission procedure, fully specified) from 'policy' (how to judge quality and what to do about it, left to each implementation). This allows interoperation between peers with different link quality policies.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
