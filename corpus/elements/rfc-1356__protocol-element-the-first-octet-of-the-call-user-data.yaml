document: rfc-1356
kind: protocol-element
summary: The first octet of the Call User Data (CUD) field in the X.25 Call Request packet is a one-octet Network Layer Protocol Identifier (NLPID), per ISO/IEC TR 9577, used for protocol demultiplexing on the virtual circuit. Receivers MUST ignore extraneous octets beyond the NLPID.
section: "3.2"
topics:
    - ip
