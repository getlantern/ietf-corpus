document: rfc-8830
kind: protocol-element
summary: A MediaStreamTrack is signaled as ended when its 'msid' attribute disappears from SDP, when all associated SSRCs have disappeared per RFC 3550 BYE or timeout rules, or when the media description is disabled by setting its port to zero. Changing media direction (sendonly/recvonly/inactive) does NOT end the track.
section: "3"
