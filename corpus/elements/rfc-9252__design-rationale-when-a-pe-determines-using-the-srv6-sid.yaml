document: rfc-9252
kind: design-rationale
summary: When a PE determines (using the SRv6 SID Structure) that the Service SID belongs to the same SRv6 Locator as the last SRv6 SID in an SR Policy segment list, it MAY exclude the last segment-list SID and instead use <S1, S2, S3-Service-SID> directly, avoiding double-encapsulation while achieving policy steering.
section: "5"
topics:
