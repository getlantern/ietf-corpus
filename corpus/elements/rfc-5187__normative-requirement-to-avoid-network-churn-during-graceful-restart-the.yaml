document: rfc-5187
kind: normative-requirement
summary: To avoid network churn during graceful restart, the restarting router MUST preserve the LSA ID to prefix correspondence across graceful restarts, since OSPFv3 inter-area prefix LSA and external LSA IDs are unsigned 32-bit integers without a direct prefix correspondence.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
