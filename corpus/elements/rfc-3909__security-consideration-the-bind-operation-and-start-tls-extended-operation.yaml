document: rfc-3909
kind: security-consideration
summary: The Bind operation and Start TLS extended operation are disallowed from cancellation to avoid adding complexity to authentication, authorization, and security layer semantics. Designers of future extended operations and/or controls should disallow abandonment and cancellation when appropriate.
