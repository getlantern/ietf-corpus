document: rfc-2451
kind: normative-requirement
summary: For 3DES, implementations MUST reject keys where the first two or last two independent 64-bit keys are equal (k1 == k2 or k2 == k3), as this reduces 3DES to simple DES.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
