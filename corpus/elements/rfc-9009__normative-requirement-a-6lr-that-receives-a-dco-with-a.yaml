document: rfc-9009
kind: normative-requirement
summary: A 6LR that receives a DCO with a Path Sequence that is not newer than its stored Path Sequence for the target MUST NOT remove its current routing state and MUST NOT forward the DCO downstream. If the stored Path Sequence is as new as or newer, the DCO MUST be dropped (DCO Base Rule 5).
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
