document: rfc-5949
kind: design-rationale
summary: The NMAG SHOULD send a Router Advertisement with HNP(s) immediately upon detecting the mobile node's link attachment, because in reactive handover the MN may arrive before context transfer completes and will otherwise be unable to send uplink packets without first receiving prefix information.
section: "5.2"
