document: rfc-8365
kind: normative-requirement
summary: For VXLAN and NVGRE encapsulations with locally assigned VNIs, each PE MUST advertise an IMET route to other PEs in an EVPN instance for the multicast tunnel type it uses. For globally assigned VNIs, each PE MUST advertise an IMET route for ingress replication or a PIM-SSM tunnel.
section: "9"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
