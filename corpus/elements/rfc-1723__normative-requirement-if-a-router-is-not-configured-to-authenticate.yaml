document: rfc-1723
kind: normative-requirement
summary: If a router is not configured to authenticate RIP-2 messages, authenticated RIP-2 messages SHALL be discarded. If configured for authentication, unauthenticated RIP-2 messages and those failing authentication SHALL be discarded. For maximum security, RIP-1 messages SHOULD be ignored when authentication is in use.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
