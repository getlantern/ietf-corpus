document: rfc-8167
kind: protocol-element
summary: Forward- and reverse-direction operations on the same connection share the same Receive buffers, so inline threshold values are identical in both directions. The call inline threshold for the reverse direction equals the reply inline threshold for the forward direction, and vice versa.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
