document: rfc-4862
kind: wire-format
summary: A link-local address is formed by taking the well-known prefix FE80::0, zeroing all bits to the right of the prefix, and replacing the rightmost N bits with the interface identifier. If the sum of link-local prefix length and N exceeds 128, autoconfiguration fails.
section: "5.3"
topics:
