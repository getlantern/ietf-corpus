document: rfc-8076
kind: protocol-element
summary: When using an array data model for Shared Resources, the array index is formed by taking the least significant 24 bits of the signer's Node-ID as a prefix and appending an 8-bit individual index, yielding a 32-bit index allowing each peer up to 256 distinct entries.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
