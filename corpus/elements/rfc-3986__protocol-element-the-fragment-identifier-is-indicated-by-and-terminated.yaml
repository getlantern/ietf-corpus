document: rfc-3986
kind: protocol-element
summary: 'The fragment identifier is indicated by "#" and terminated by end of URI: fragment = *( pchar / "/" / "?" ). Fragment semantics are defined by the media type of the representation, not the URI scheme, and are processed solely by the user agent prior to any dereference.'
section: "3.5"
topics:
    - http
