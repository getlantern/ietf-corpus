document: rfc-5655
kind: interoperability-note
summary: NetFlow V9 flow data can be stored in IPFIX Files because the NetFlow V9 information model is a compatible subset of the IPFIX Information Model. Appendix B specifies a transformation method for converting NetFlow V9 Messages to IPFIX format for multi-vendor collection environments.
