document: rfc-4704
kind: normative-requirement
summary: The TTL for RRs added as a result of DHCP address assignment SHOULD be less than the initial lifetime, SHOULD NOT exceed 1/3 of the lifetime, and SHOULD NOT be less than 10 minutes. DHCP servers and clients SHOULD allow administrators to configure TTL bounds.
section: "7"
rfc2119_level: SHOULD
topics:
    - dns
