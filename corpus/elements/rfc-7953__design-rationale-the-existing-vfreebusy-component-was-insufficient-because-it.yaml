document: rfc-7953
kind: design-rationale
summary: The existing VFREEBUSY component was insufficient because it can only represent fixed busy-time periods and lacks support for repeating patterns. VAVAILABILITY was designed to express recurring available or unavailable windows (e.g., standard office hours) that integrate naturally into free-busy lookups without requiring generation of a large set of VFREEBUSY instances.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
