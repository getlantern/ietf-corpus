document: rfc-7941
kind: normative-requirement
summary: To handle flaps caused by packet reordering, SDES items received in RTP packets with the same or a lower extended sequence number than the last change MUST NOT be applied; items that can be determined to be older than the current one must be discarded.
section: 4.2.6
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
