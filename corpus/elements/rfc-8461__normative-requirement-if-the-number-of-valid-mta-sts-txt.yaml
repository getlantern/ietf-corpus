document: rfc-8461
kind: normative-requirement
summary: If the number of valid '_mta-sts' TXT records (after discarding those not beginning with 'v=STSv1;') is not exactly one, or if the resulting record is syntactically invalid, senders MUST assume the recipient domain does not have an available MTA-STS Policy and skip the remaining steps of policy discovery.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - tls
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
