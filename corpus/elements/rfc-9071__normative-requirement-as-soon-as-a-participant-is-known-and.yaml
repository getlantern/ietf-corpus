document: rfc-9071
kind: normative-requirement
summary: As soon as a participant is known and available for text reception, a Unicode BOM character SHALL be sent by the other entity. If the transmitter is a mixer, the source of the BOM SHALL be indicated as the mixer itself, and the BOM SHALL be transmitted with the same redundancy procedures as any other text.
section: "3.2"
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
