document: rfc-5892
kind: protocol-element
summary: 'The Exceptions (F) category explicitly overrides core Unicode property assignments. Notable entries: U+00DF (LATIN SMALL LETTER SHARP S) and U+3007 (IDEOGRAPHIC NUMBER ZERO) become PVALID; U+00B7 (MIDDLE DOT), U+0375, U+05F3, U+05F4, U+30FB become CONTEXTO; Arabic-Indic digit sets (U+0660–U+0669, U+06F0–U+06F9) become CONTEXTO; U+0640 (ARABIC TATWEEL) and ten vertical Kana repeat marks become DISALLOWED.'
section: "2.6"
topics:
    - dns
