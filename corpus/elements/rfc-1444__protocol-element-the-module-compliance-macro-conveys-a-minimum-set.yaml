document: rfc-1444
kind: protocol-element
summary: The MODULE-COMPLIANCE macro conveys a minimum set of requirements with respect to implementation of one or more MIB modules. A requirement on all 'standard' MIB modules is that a corresponding MODULE-COMPLIANCE specification is also defined, either in the same or a companion information module.
