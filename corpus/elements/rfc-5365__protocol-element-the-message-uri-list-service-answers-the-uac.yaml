document: rfc-5365
kind: protocol-element
summary: The MESSAGE URI-list service answers the UAC with a 202 (Accepted) response upon receiving a MESSAGE with a URI list. This response does not indicate delivery success to the individual recipients; it only confirms the service received and will attempt delivery.
