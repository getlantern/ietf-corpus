document: rfc-7936
kind: registry
summary: 'The WebSocket Subprotocol Name Registry (originally created by RFC 6455 Section 11.5) is clarified: registrations use First Come First Served procedures, tokens are case-sensitive, and case-only variants of existing registrations will be refused. Both RFC 6455 and RFC 7936 are listed as references for this registry.'
section: "4"
