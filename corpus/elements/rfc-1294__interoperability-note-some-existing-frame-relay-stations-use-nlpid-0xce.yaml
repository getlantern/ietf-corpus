document: rfc-1294
kind: interoperability-note
summary: Some existing Frame Relay stations use NLPID=0xCE to escape to Ethernet Packet Types (RFC-1060). Stations may recognize this value and interpret the following 2-byte EtherType for backward compatibility, but must never generate this encapsulation format.
section: "15"
