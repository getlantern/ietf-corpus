document: rfc-7811
kind: normative-requirement
summary: 'All routers MUST order interfaces identically using the Interface_Compare function: first by ascending metric, then by ascending mrt_node_id of the remote neighbor. Consistent ordering is required so that every router produces the same DFS tree, the same GADAG, and the same topological sort.'
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
