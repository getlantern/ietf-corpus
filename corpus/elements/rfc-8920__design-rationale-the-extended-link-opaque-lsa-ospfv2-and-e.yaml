document: rfc-8920
kind: design-rationale
summary: The Extended Link Opaque LSA (OSPFv2) and E-Router-LSA (OSPFv3) were chosen as carriers for ASLA rather than the TE Opaque LSA because advertising link attributes there does not implicitly make the link part of the RSVP-TE topology, maintains a clear application distinction, and preserves the TE Opaque LSA as truly opaque to OSPF.
section: "4.1"
topics:
    - routing
