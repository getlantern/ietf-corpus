document: rfc-6515
kind: protocol-element
summary: MCAST-VPN NLRI is carried in the NLRI field of MP_REACH_NLRI/MP_UNREACH_NLRI attributes. When the SAFI field has the MCAST-VPN value, AFI=1 indicates customer multicast addresses are IPv4 and AFI=2 indicates they are IPv6; this AFI applies only to customer addresses, not to PE infrastructure addresses.
section: "1.1"
topics:
    - bgp
    - multicast
    - vpn
