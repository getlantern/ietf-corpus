document: rfc-9437
kind: protocol-element
summary: The N-bit (Notification-Requested bit) is a per-EID-Record bit in the Map-Request record header (bit position 1 in the Map-Request-Record). When set to 1 it specifies that the xTR wants to be notified of mapping updates for that EID-Prefix.
