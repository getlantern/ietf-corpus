document: rfc-6426
kind: design-rationale
summary: RFC 4379 defined DSMAP address types without creating a formal IANA registry, creating the possibility of 'address-type' collisions. This document retroactively establishes the Downstream Mapping Address Type registry to manage assignments for both RFC 4379 and future documents.
section: "7.5"
topics:
    - mpls
    - registry
