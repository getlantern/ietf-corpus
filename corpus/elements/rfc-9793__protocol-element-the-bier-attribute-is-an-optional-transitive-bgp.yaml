document: rfc-9793
kind: protocol-element
summary: The BIER attribute is an optional, transitive BGP path attribute with type code 41 and variable length. It is attached to BGP UPDATE messages for NLRIs of AFI 1 or 2 and SAFI 1, 2, or 4 to convey BIER-specific information (BFR-ID, BSL, encapsulation) for /32 or /128 host address prefixes.
section: "3"
