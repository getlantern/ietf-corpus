document: rfc-9647
kind: design-rationale
summary: The information model (RFC 9046) mandates certain read-only attributes (e.g., babel-implementation-version, babel-self-router-id), but YANG has no mechanism to mandate that a config-false leaf be present; implementations must ensure these attributes are present when the protocol is enabled.
section: "2.1"
