document: rfc-3225
kind: protocol-element
summary: The DNSSEC OK (DO) bit is the most significant bit of the Z field in the EDNS0 OPT header's extended RCODE and flags portion (third and fourth bytes). Setting DO=1 signals the resolver can accept DNSSEC security RRs (SIG, KEY, NXT); DO=0 signals it cannot.
section: "3"
topics:
