document: rfc-6810
kind: normative-requirement
summary: If at any time either the router or the cache finds the session identifier value is not the same as the other's, they MUST completely drop the session and the router MUST flush all data learned from that cache.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
