document: rfc-4008
kind: interoperability-note
summary: RFC 3489 defines four NAPT variations (Full Cone, Restricted Cone, Port Restricted Cone, Symmetric NAT) which the NAT MIB does not distinguish via a type field. Instead, implementations are differentiated by observing the pattern of zero vs. non-zero address/port fields in natSessionTable and the presence or absence of entries in the bind tables.
section: "4.6"
topics:
    - nat
