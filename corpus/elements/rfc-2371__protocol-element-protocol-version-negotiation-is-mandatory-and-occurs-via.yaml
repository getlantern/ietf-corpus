document: rfc-2371
kind: protocol-element
summary: 'Protocol version negotiation is mandatory and occurs via the IDENTIFY command: the primary sends the lowest and highest version numbers it supports; the secondary responds with the highest version it supports. Communication uses the lower of the two highest versions. If no common version exists the newer party drops the connection.'
section: "10"
