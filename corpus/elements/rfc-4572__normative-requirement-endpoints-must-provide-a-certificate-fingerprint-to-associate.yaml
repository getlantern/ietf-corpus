document: rfc-4572
kind: normative-requirement
summary: Endpoints MUST provide a certificate fingerprint to associate media streams with connections and to prevent unauthorized barge-in attacks. If the X.509 certificate presented for the TLS connection matches the fingerprint in the SDP, the endpoint can be confident that the author of the SDP is the initiator of the connection.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
