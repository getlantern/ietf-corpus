document: rfc-7317
kind: design-rationale
summary: Optional YANG features (local-users, radius-authentication, ntp, ntp-udp-port, timezone-name, dns-udp-tcp-port) are used instead of mandatory nodes so that implementations can advertise exactly which subset of capabilities they support, avoiding non-conformance for commonly unsupported options like non-default NTP or DNS ports.
section: "3.5"
topics:
    - yang
    - netconf
