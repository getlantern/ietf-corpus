summary: 'The revised server algorithm defines six steps: (1) check recursion availability; (2) find nearest ancestor zone; (3) match labels in zone data, handling CNAME, NS cuts, and DNAME substitution; (4) search cache for QNAME or ancestor DNAME; (5) use recursive resolution; (6) add additional section data.'
