document: rfc-8265
kind: normative-requirement
summary: A password MUST NOT be zero bytes in length, enforced after normalization and mapping. This is not a recommendation about password strength but prevents applications from mistakenly omitting a password after canonicalization of internationalized strings.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
