summary: 'The BFD-Enabled TLV (Type=148) in a TRILL Hello encodes topology/NLPID pairs: 1-byte Type (148), 1-byte Length (3*n), then n pairs each of a 2-byte field (4-bit RESV + 12-bit MT ID, default 0) and a 1-byte NLPID (0xC0 for TRILL).'
