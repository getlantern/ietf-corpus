document: rfc-6616
kind: protocol-element
summary: The OpenID GSS-API mechanism OID is 1.3.6.1.5.5.16, with DER encoding 0x2b 0x06 0x01 0x05 0x05 0x10. GSS-API messages differ from SASL in that the GS2 header is excluded and the initial context token header from RFC 2743 Section 3.1 is prefixed.
section: "4"
