kind: protocol-element
summary: The pimGroupMappingTable (RFC 5060) stores all Group-to-RP mapping entries including origin type, PIM mode, group prefix, RP address, and precedence. The new algorithm operates on this table, using origin and mode fields rather than the precedence field.
