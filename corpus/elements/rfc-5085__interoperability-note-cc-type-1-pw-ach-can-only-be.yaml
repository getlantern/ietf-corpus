document: rfc-5085
kind: interoperability-note
summary: CC Type 1 (PW-ACH) can only be used for PW types that employ the control word and only when the CW follows the 'Generic PW MPLS Control Word' format. It cannot be applied to PWs that do not use a control word or use a different CW format.
section: 5.1.1
topics:
