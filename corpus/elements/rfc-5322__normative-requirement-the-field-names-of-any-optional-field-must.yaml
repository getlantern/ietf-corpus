document: rfc-5322
kind: normative-requirement
summary: 'The field names of any optional field MUST NOT be identical to any field name specified elsewhere in this document. Optional fields MUST conform to the optional-field syntax: a field name of printable US-ASCII excluding SP and colon, followed by a colon and unstructured content.'
section: 3.6.8
rfc2119_level: MUST NOT
