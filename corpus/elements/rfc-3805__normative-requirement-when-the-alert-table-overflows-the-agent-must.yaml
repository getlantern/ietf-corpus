document: rfc-3805
kind: normative-requirement
summary: 'When the Alert Table overflows, the agent must delete alerts in priority order: (1) oldest non-critical unary alert, (2) oldest non-critical binary alert, (3) oldest critical binary alert. Implementers are encouraged to provision storage for the maximum number of simultaneous critical alerts.'
section: 2.2.13.4
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
