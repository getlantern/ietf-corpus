document: rfc-1730
kind: normative-requirement
summary: A server MUST send mailbox size updates (EXISTS untagged response) automatically if a size change is observed during command processing. The client implementation MUST record mailbox size updates and MUST NOT assume any command after initial selection will return the size.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
