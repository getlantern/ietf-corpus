document: rfc-2264
kind: protocol-element
summary: Discovery allows a non-authoritative engine to learn the authoritative engine's snmpEngineID by sending a Request with securityLevel noAuthNoPriv, msgUserName 'initial', zero-length msgAuthoritativeEngineID, and empty varBindList. The authoritative engine replies with a Report PDU containing its snmpEngineID and the usmStatsUnknownEngineIDs counter.
section: "4"
topics:
    - snmp
    - security
