document: rfc-5023
kind: normative-requirement
summary: When a server returns a partial list of a Collection, the first partial list MUST contain the most recently edited Member Resources and MUST include an atom:link with rel='next' pointing to the URI of the next partial list.
section: "10.1"
rfc2119_level: MUST
topics:
