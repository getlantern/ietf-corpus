document: rfc-7798
kind: wire-format
summary: A Fragmentation Unit (FU, Type=49) contains a 2-byte PayloadHdr, a 1-byte FU header (S bit for start, E bit for end, 6-bit FuType equal to the fragmented NAL unit's Type), an optional 16-bit DONL (present only in first fragment when sprop-max-don-diff > 0), and the FU payload.
