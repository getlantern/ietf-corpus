document: rfc-7494
kind: interoperability-note
summary: Prior to this specification, different vendors mapped IEEE 802.11 encryption to different locations in Split MAC mode, requiring operators to apply vendor-specific configurations and causing interoperability failures when mixing AC and WTP equipment from different vendors.
