document: rfc-5255
kind: design-rationale
summary: I18NLEVEL=1 is a simpler version of I18NLEVEL=2 with no ability to select a different collation; it mandates i;unicode-casemap as the fixed comparator. I18NLEVEL=2 is a superset adding comparator negotiation via the COMPARATOR command, enabling locale-appropriate sorting.
section: "4.1"
