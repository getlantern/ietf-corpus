document: rfc-7680
kind: interoperability-note
summary: 'Out-of-order arrival of test packets must be handled correctly: it is possible for a packet sent second (at TS[i+1]) to arrive at the destination before a packet sent first (at TS[i]). Reordering metrics are defined in RFC 4737.'
