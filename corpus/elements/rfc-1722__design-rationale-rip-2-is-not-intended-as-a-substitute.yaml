document: rfc-1722
kind: design-rationale
summary: RIP-2 is not intended as a substitute for OSPF in large autonomous systems. The same restrictions on AS diameter and complexity that applied to RIP-1 still apply to RIP-2; RIP-2 fills the gap for smaller, simpler environments that need authentication or VLSM but do not require a link-state protocol.
section: "2"
