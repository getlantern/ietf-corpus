document: rfc-4412
kind: security-consideration
summary: Systems should minimize state, computation, and network resources that an unauthorized user can command, and must not amplify attacks by transmitting packets to unverified network addresses. DoS attacks may target both the network and its authentication/authorization infrastructure during emergencies when the system is already stressed.
section: "11.5"
