document: rfc-9134
kind: normative-requirement
summary: In codestream packetization mode (K=0), the L bit and M bit have equivalent meaning and SHALL have identical values in each packet. The L bit is always set whenever the M bit is set.
section: "4.3"
rfc2119_level: SHALL
