document: rfc-7235
kind: normative-requirement
summary: Upon receipt of a request that omits or contains invalid proxy credentials, a proxy that requires authentication SHOULD generate a 407 (Proxy Authentication Required) response containing a Proxy-Authenticate header field with at least one applicable challenge.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
