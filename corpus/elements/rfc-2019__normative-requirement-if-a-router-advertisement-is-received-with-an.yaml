document: rfc-2019
kind: normative-requirement
summary: If a Router Advertisement is received with an MTU option specifying a value larger than the default or manually configured MTU, that option may be logged to system management but must be otherwise ignored.
section: Maximum Transmission Unit
rfc2119_level: MUST
topics:
