document: rfc-8985
kind: interoperability-note
summary: RACK-TLP is compatible with the standard RTO [RFC6298], RTO Restart [RFC7765], F-RTO [RFC5682], and Eifel [RFC3522] algorithms because RACK-TLP detects loss solely via ACK events and does not change the RTO timer calculation or detect spurious RTOs.
section: "9.2"
topics:
