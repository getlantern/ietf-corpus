document: rfc-5650
kind: normative-requirement
summary: The SNMP agent MUST automatically create rows in xdsl2ChannelStatusTable and xdsl2PMChCurrTable when the number of bearer channels increases, and MUST destroy rows in those tables plus xdsl2PMChHist15MinTable and xdsl2PMChHist1DTable when the number of channels decreases.
section: 2.8.4
rfc2119_level: MUST
