document: rfc-2592
kind: normative-requirement
summary: An implementation MUST store a descriptive error message in smRunError if a script exits with smRunExitCode 'genericError'. The value is the zero-length string as long as smRunExitCode is 'noError'.
section: "6"
rfc2119_level: MUST
