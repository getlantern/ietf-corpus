document: rfc-2108
kind: protocol-element
summary: rptrMonitorPortLateEvents counts CarrierEvents where activity exceeds LateEventThreshold (greater than 480 bit times and less than 565 bit times). Such an event is counted both as a collision (rptrMonitorPortCollisions) and as a lateEvent — it increments two counters simultaneously.
