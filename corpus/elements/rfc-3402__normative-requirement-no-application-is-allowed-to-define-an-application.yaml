document: rfc-3402
kind: normative-requirement
summary: No application is allowed to define an Application Unique String such that a key obtained by a rewrite rule is treated as the AUS for input to a new rule, except when the application defines a flag or state suspending DDDS rules and handing off to another application or rule set.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
