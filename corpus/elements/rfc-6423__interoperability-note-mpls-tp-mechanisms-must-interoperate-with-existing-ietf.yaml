document: rfc-6423
kind: interoperability-note
summary: MPLS-TP mechanisms must interoperate with existing IETF MPLS (RFC 3031) and PWE3 (RFC 3985) architectures. The prior RFC 5586 restriction on GAL usage with MPLS-TP PWs was inconsistent with this interoperability requirement.
