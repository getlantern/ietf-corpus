document: rfc-8825
kind: normative-requirement
summary: Privacy concerns MUST be satisfied; for instance, if remote control of a camera is offered, the APIs should be available to let the local participant figure out who's controlling the camera and possibly decide to revoke the permission for camera usage.
section: "9"
rfc2119_level: MUST
