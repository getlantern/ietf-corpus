document: rfc-6779
kind: protocol-element
summary: nhdpLibLocalIfSetTable records all local MANET interface addresses as Local Interface Address Tuples. Each row stores an InetAddressType (IPv4 or IPv6 only), InetAddress (4 or 16 octets), InetAddressPrefixLength, and the associated nhdpIfIndex. The table is manager-created.
