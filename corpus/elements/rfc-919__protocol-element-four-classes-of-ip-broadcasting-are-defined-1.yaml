document: rfc-919
kind: protocol-element
summary: 'Four classes of IP broadcasting are defined: (1) single-destination datagram sent as a data link layer broadcast but not an IP broadcast; (2) broadcast to all hosts on the local IP network using a distinguished host-number; (3) directed broadcast to all hosts on a remote IP network, routed normally to a gateway then broadcast locally; and (4) broadcast to the entire Internet, considered not useful and undesirable.'
section: "4"
