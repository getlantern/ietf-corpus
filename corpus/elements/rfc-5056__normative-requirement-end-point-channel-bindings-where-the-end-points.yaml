document: rfc-5056
kind: normative-requirement
summary: End-point channel bindings where the end-points are meaningful names SHOULD NOT be used when the channel does not provide confidentiality protection and privacy protection is desired. Channels that export such channel bindings SHOULD provide for the use of a digest and SHOULD NOT introduce new digest/hash agility problems.
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
    - security
    - privacy
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
