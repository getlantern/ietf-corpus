document: rfc-6551
kind: protocol-element
summary: The DAG Metric Container carries Routing Metric/Constraint objects with a common header. The C flag distinguishes constraint from metric; the O flag marks a constraint as optional; the R flag indicates recorded (versus aggregated) metric; the A field encodes aggregation as additive (0), maximum (1), minimum (2), or multiplicative (3).
