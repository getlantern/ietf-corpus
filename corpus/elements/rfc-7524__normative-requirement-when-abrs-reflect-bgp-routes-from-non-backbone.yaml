document: rfc-7524
kind: normative-requirement
summary: When ABRs reflect BGP routes from non-backbone areas into the backbone, they MUST set the BGP Next Hop to their own loopback addresses (next-hop-self). When reflecting from the backbone area into non-backbone areas, ABRs SHOULD NOT change the BGP Next Hop (next-hop-unchanged).
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
