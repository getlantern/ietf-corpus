document: rfc-8696
kind: normative-requirement
summary: An acceptable KDF MUST accept IKM, L, and info inputs, and all of these inputs MUST influence the output of the KDF. If the KDF requires a salt or other inputs, those MUST be provided as parameters of the KeyDerivationAlgorithmIdentifier.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
