document: rfc-6442
kind: normative-requirement
summary: 'When the Geolocation-Routing header-value is "no", SIP intermediaries MUST NOT view, process, inspect, or actively dereference any location (neither cid: body parts nor location URIs). An LR MUST default to treating Geolocation-Routing as "no" unless the header is explicitly set to "yes".'
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
