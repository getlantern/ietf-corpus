document: rfc-7518
kind: security-consideration
summary: Passwords used with PBES2 algorithms have limited entropy and are susceptible to brute-force and dictionary attacks. A high PBKDF2 iteration count and a unique random salt per operation are essential mitigations; the password input MUST be UTF-8 encoded when supplied as text.
section: "8.8"
topics:
