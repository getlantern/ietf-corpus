document: rfc-7507
kind: security-consideration
summary: It is strongly recommended to send TLS_FALLBACK_SCSV when downgrading to SSL 3.0, because the CBC cipher suites in SSL 3.0 have weaknesses that cannot be addressed by implementation workarounds, unlike later TLS versions.
