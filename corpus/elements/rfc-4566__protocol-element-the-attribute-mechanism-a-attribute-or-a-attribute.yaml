document: rfc-4566
kind: protocol-element
summary: The attribute mechanism (`a=<attribute>` or `a=<attribute>:<value>`) is the primary means for extending SDP. Attributes may be property attributes (flags) or value attributes. Session-level attributes apply to all media unless overridden by a media-level attribute of the same name.
section: "5.13"
topics:
    - realtime
