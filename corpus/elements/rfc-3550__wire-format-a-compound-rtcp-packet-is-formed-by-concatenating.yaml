document: rfc-3550
kind: wire-format
summary: A compound RTCP packet is formed by concatenating individual RTCP packets (each ending on a 32-bit boundary) into a single UDP datagram. If encrypted, a random 32-bit prefix is prepended. The compound packet must begin with SR or RR, followed by SDES (with CNAME), then optionally BYE or APP in any order.
section: "6.1"
topics:
    - rtp
    - realtime
