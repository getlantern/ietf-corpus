document: rfc-8302
kind: normative-requirement
summary: A dynamic proxy ARP/ND entry SHOULD be flushed if the IP/MAC address mapping has not been refreshed within the age-time. The Ageing Timer is configurable per RBridge and defaults to 3/4 of the MAC address learning Ageing Timer defined in RFC 6325.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
