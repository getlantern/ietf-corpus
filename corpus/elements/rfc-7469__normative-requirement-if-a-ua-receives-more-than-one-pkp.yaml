document: rfc-7469
kind: normative-requirement
summary: If a UA receives more than one PKP header field or more than one PKP-RO header field in an HTTP response, it MUST process only the first of each kind. PKP and PKP-RO headers received over insecure transport or that are not Valid Pinning Headers MUST be ignored.
section: 2.3.1
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
