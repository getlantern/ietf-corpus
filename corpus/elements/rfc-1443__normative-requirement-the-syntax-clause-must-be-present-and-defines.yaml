document: rfc-1443
kind: normative-requirement
summary: The SYNTAX clause must be present and defines the abstract data structure for the textual convention. The data structure must be one of the alternatives defined in the ObjectSyntax CHOICE. Sub-typing is not allowed for Counter32 or Counter64 derived types, but is allowed for Gauge32 derived types.
section: "3.5"
rfc2119_level: MUST
topics:
