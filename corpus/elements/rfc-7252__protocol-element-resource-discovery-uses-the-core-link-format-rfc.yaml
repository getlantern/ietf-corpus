document: rfc-7252
kind: protocol-element
summary: Resource discovery uses the CoRE Link Format (RFC 6690) served at the well-known URI '/.well-known/core'. A CoAP client queries this resource to retrieve a list of hosted resources. Multicast service discovery uses the 'All CoAP Nodes' multicast address.
