document: rfc-8778
kind: design-rationale
summary: 'The HSS/LMS signature value is designed as a large byte string for easy parsing: the HSS, LMS, and LM-OTS components include counters and type codes that indirectly provide all information needed to parse the byte string during signature validation without requiring out-of-band parameter negotiation.'
