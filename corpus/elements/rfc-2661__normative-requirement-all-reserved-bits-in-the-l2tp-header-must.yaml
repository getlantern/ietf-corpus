document: rfc-2661
kind: normative-requirement
summary: All reserved bits in the L2TP header MUST be set to 0 on outgoing messages and ignored on incoming messages. An AVP received with a reserved bit set to 1 MUST be treated as an unrecognized AVP.
section: "3.1"
rfc2119_level: MUST
topics:
    - vpn
