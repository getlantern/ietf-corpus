document: rfc-7858
kind: security-consideration
summary: DNS over TLS is vulnerable to known TLS attacks such as person-in-the-middle and protocol downgrade; these are general TLS risks. Clients tracking servers known to support TLS can detect downgrade attacks. Depending on privacy profile, clients may try another server, continue without TLS, or refuse to forward the query.
section: "8"
topics:
    - dns
    - tls
    - security
