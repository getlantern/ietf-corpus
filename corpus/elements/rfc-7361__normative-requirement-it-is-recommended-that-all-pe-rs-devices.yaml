document: rfc-7361
kind: normative-requirement
summary: It is RECOMMENDED that all PE-rs devices participating in PBB-VPLS support the MAC Flush Parameters TLV. If not possible, the MAC Flush Parameters TLV SHOULD be disabled, reverting to RFC 4762 flushing at the Backbone MAC level.
section: 5.2.2
rfc2119_level: RECOMMENDED
topics:
    - mpls
