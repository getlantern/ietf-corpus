summary: dsx1IntervalTable stores the same ten performance counters for each of the previous 96 completed 15-minute intervals, indexed by (dsx1IntervalIndex, dsx1IntervalNumber) where 1 is the most recent. A dsx1IntervalValidData boolean flags intervals where proxy data was unavailable.
