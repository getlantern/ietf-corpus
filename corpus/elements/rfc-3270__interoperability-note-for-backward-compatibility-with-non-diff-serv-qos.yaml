document: rfc-3270
kind: interoperability-note
summary: For backward compatibility with non-Diff-Serv QoS options (Integrated Services Controlled Load or Guaranteed Service) defined in RFC 3209, an LSR MAY support a configurable override option that interprets a Path message lacking a DIFFSERV object as a request for an LSP with non-Diff-Serv QoS rather than as a preconfigured E-LSP request.
section: "5.3"
topics:
    - mpls
    - diffserv
    - qos
