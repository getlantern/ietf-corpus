document: rfc-8292
kind: normative-requirement
summary: A push service MAY reject a request with a 403 (Forbidden) status code if the JWT signature or its claims are invalid. A push service MUST NOT use information from an invalid token.
section: "2"
rfc2119_level: MUST NOT
topics:
