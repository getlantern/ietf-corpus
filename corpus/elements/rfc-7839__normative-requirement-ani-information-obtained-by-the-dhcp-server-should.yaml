document: rfc-7839
kind: normative-requirement
summary: ANI information obtained by the DHCP server SHOULD NOT be stored unless absolutely needed; if stored, it MUST be deleted as quickly as possible to eliminate any possibility of the information being exposed to an intruder.
section: "7"
rfc2119_level: MUST
