document: rfc-1724
kind: protocol-element
summary: 'rip2IfStatTable (OID rip2 2) is a mandatory interface status table indexed by rip2IfStatAddress, containing per-interface counters: rip2IfStatRcvBadPackets (discarded RIP responses), rip2IfStatRcvBadRoutes (ignored routes in valid packets), rip2IfStatSentUpdates (triggered updates sent), and rip2IfStatStatus (RowStatus for row deletion).'
section: "4.2"
