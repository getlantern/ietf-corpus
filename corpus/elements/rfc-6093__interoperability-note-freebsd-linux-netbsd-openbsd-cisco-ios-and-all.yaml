document: rfc-6093
kind: interoperability-note
summary: FreeBSD, Linux, NetBSD, OpenBSD, Cisco IOS, and all tested Microsoft Windows versions all implement the Urgent Pointer as pointing to the octet following the urgent data (RFC 793 section 3.1 semantics), and all support only one byte of urgent data in practice.
