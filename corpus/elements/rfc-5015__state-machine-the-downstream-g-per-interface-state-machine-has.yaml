document: rfc-5015
kind: state-machine
summary: 'The downstream (*,G) per-interface state machine has three states: NoInfo, Join, and PrunePending. Transitions are triggered by receiving Join(*,G) or Prune(*,G) targeted to this router, PrunePendingTimer or ExpiryTimer expiry, and the ''Stop Being DF'' event. PrunePending functions identically to Join for forwarding purposes.'
section: 3.4.1
topics:
    - multicast
    - routing
