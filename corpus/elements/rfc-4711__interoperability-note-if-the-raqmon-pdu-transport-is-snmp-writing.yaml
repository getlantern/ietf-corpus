document: rfc-4711
kind: interoperability-note
summary: If the RAQMON PDU transport is SNMP, writing raqmonConfigPort has no effect because the standard SNMP trap port 162 is always used; raqmonConfigPort only governs non-SNMP transports (e.g., TCP).
