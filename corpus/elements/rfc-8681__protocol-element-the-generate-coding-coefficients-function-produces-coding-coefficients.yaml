document: rfc-8681
kind: protocol-element
summary: 'The generate_coding_coefficients() function produces coding coefficients for each repair symbol, parameterized by repair_key (PRNG seed), cc_nb (encoding window size), DT (density threshold 0–15), and m (Galois Field parameter: 1 for GF(2), 8 for GF(2^8)). When DT=15, all coefficients are guaranteed nonzero; otherwise the average fraction of nonzero coefficients is (DT+1)/16.'
section: "3.6"
