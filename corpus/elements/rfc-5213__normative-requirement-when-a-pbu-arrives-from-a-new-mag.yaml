document: rfc-5213
kind: normative-requirement
summary: When a PBU arrives from a new MAG after handoff, the LMA MUST update the BCE, remove previous prefix routes, delete the tunnel to the previous MAG if no other MNs share it (SHOULD), establish a tunnel to the new MAG if none exists, and create new prefix routes over the new tunnel.
section: 5.3.4
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
