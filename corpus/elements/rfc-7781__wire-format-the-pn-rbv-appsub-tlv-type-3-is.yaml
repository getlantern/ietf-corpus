document: rfc-7781
kind: wire-format
summary: 'The PN-RBv APPsub-TLV (type=3) is sent by the vDRB and contains: RBv''s Pseudo-Nickname (2 bytes), LAALP ID Size (1 byte), and n variable-length LAALP IDs. Length must equal 3 + n*k; if not, the sub-TLV is corrupt and MUST be ignored.'
section: "9.2"
topics:
    - routing
    - registry
