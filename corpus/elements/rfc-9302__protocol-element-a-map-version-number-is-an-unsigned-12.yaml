document: rfc-9302
kind: protocol-element
summary: A Map-Version number is an unsigned 12-bit integer assigned on a per-mapping basis to an EID-to-RLOC mapping. Version numbers use circular (serial number) arithmetic as defined in RFC 1982, where half the number space is considered newer and half older than the current value.
