document: rfc-8383
kind: protocol-element
summary: The K-nicks field specifies the number of nicknames to which the Address Flush message applies. If zero, only the ingress nickname in the TRILL Header is used; if non-zero, the flush applies only to the listed nicknames and not to the ingress nickname unless explicitly listed.
section: "2.1"
topics:
    - routing
