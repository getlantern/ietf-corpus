document: rfc-6543
kind: protocol-element
summary: The reserved IPv6 interface identifier for Proxy Mobile IPv6 is 0200:5EFF:FE00:5213. It is a modified EUI-64 interface identifier generated from the allocated Ethernet unicast address 00-00-5E-00-52-13 per the procedure in RFC 4291 Appendix A.
