document: rfc-4401
kind: interoperability-note
summary: For some mechanisms or contexts, GSS_C_PRF_KEY_FULL and GSS_C_PRF_KEY_PARTIAL MAY refer to the same cryptographic keys; for mechanisms like Kerberos V GSS-API (RFC 1964), where one peer may assert a better key, they MAY be different keys.
