document: rfc-3594
kind: security-consideration
summary: The CMTS (head-end router) is explicitly configured to forward DHCP requests only to valid DHCP server addresses and to allow downstream DHCP traffic only from those addresses, mitigating the risk of rogue DHCP servers. However, this does not prevent spoofed DHCP servers located behind the CMTS.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
