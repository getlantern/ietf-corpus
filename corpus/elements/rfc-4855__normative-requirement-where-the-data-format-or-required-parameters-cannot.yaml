document: rfc-4855
kind: normative-requirement
summary: Where the data format or required parameters cannot be the same for RTP and non-RTP transfer methods, the data formats MUST be registered as separate types. It is RECOMMENDED that subtype names be related, such as using a common root plus a suffix ('+rtp' is suggested for RTP variants).
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
