document: rfc-2674
kind: wire-format
summary: VlanId is a 12-bit INTEGER restricted to the range 1–4094, representing an IEEE 802.1Q VLAN tag ID. VlanIndex extends this as an Unsigned32 where values 1–4094 are global 802.1Q VLAN IDs, values above 4095 denote agent-local VLANs without a global ID, and 0 and 4095 are not permitted.
section: "5"
topics:
