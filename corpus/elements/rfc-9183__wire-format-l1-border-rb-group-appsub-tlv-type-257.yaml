kind: wire-format
summary: 'L1-BORDER-RB-GROUP APPsub-TLV (type 257): Type 2 bytes, Length 2 bytes (= 2*k), followed by k L1 Border RBridge Nicknames each 2 bytes. Carried in E-L2FS FS-LSP fragment zero. If Length is not a multiple of 2, the APPsub-TLV is corrupt and MUST be ignored.'
