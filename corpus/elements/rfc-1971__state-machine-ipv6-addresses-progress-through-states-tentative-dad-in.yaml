document: rfc-1971
kind: state-machine
summary: 'IPv6 addresses progress through states: tentative (DAD in progress) → preferred (unrestricted use) → deprecated (discouraged for new communications, preferred lifetime expired) → invalid (valid lifetime expired, must not be used). A preferred address becomes deprecated when its preferred lifetime expires; a deprecated address becomes invalid when its valid lifetime expires.'
section: "2"
topics:
