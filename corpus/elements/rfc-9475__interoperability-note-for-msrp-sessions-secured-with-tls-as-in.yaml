document: rfc-9475
kind: interoperability-note
summary: For MSRP sessions secured with TLS (as in RCS), fingerprints of TLS keys can be secured via the "mky" claim of PASSporT using RFC 8862. Similar practices apply to sessions negotiating real-time text over DTLS/SRTP.
