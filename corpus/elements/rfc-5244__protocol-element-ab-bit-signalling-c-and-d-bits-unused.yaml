document: rfc-5244
kind: protocol-element
summary: AB bit signalling (C and D bits unused) uses event codes 208–211 representing states A=0/B=0, A=0/B=1, A=1/B=0, A=1/B=1 respectively. A-bit-only signalling uses event codes 206 (A=0) and 207 (A=1). Both are state-type events with no volume.
section: "2.4"
