document: rfc-7516
kind: design-rationale
summary: 'Two serializations are defined with different trade-offs: the JWE Compact Serialization is compact and URL-safe for use in HTTP headers and URI query parameters, while the JWE JSON Serialization is a full JSON object enabling encryption to multiple recipients, at the cost of compactness and URL-safety.'
