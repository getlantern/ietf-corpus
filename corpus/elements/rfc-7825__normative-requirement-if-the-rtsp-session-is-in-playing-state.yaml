document: rfc-7825
kind: normative-requirement
summary: If the RTSP session is in PLAYING state when a SETUP request requiring ICE restart is issued, the ICE connectivity checks SHALL use Regular nomination. Ongoing media delivery continues on previously nominated candidate pairs until new pairs are nominated.
section: "6.12"
rfc2119_level: SHALL
topics:
    - nat
    - realtime
