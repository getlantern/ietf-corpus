document: rfc-2244
kind: normative-requirement
summary: Each STORE command within a dataset (including simultaneous stores from different connections) MUST use different modtime values, and any two entries changed by successive modifications MUST have strictly ascending modtime values.
section: 3.1.1
rfc2119_level: MUST
