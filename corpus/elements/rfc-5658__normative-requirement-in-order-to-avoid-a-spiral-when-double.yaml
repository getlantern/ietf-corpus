document: rfc-5658
kind: normative-requirement
summary: In order to avoid a spiral when double Record-Routing, a proxy MAY remove two Route headers instead of one when performing 'Route Information Preprocessing' per RFC 3261 Section 16.4 — it can scan an extra Route header ahead to determine whether the request will spiral through it.
section: "5"
rfc2119_level: MAY
topics:
    - sip
    - realtime
