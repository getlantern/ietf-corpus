document: rfc-8206
kind: interoperability-note
summary: RFC 8205 does not specify whether the forward-signed ASN value must match the configured remote AS for BGPsec validation; CE1 configured as 'remote AS 64510' may or may not accept updates forward-signed from AS64500, and this cannot be assumed to work across vendor implementations.
section: 3.2.1
topics:
    - bgp
    - routing
