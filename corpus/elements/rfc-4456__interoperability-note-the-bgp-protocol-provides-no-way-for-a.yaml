document: rfc-4456
kind: interoperability-note
summary: The BGP protocol provides no way for a Client to dynamically identify itself as a Client of an RR; client configuration must be done manually on the RR. Conventional BGP speakers (those unaware of route reflection) can coexist as either Client or Non-Client peers, enabling gradual migration from full-mesh IBGP.
section: "11"
topics:
    - bgp
    - routing
