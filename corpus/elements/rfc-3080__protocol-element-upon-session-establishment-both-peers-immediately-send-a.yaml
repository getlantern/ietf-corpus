document: rfc-3080
kind: protocol-element
summary: Upon session establishment both peers immediately send a positive reply with msgno 0 on channel zero containing a 'greeting' element. The greeting lists supported profiles (via 'profile' elements), and optionally 'features' (optional channel management features) and 'localize' (preferred language tags for diagnostics).
section: 2.3.1.1
