document: rfc-8158
kind: protocol-element
summary: 'The complete IE table (Table 1) defines all IPFIX fields for NAT logging. Key fields include: timeStamp (64-bit, ID 323), natInstanceID (32-bit, ID 463), internalAddressRealm (octetArray, ID 464), externalAddressRealm (octetArray, ID 465), natEvent (8-bit, ID 230), natQuotaExceededEvent (32-bit, ID 466), natThresholdEvent (32-bit, ID 467), and 11 quota/threshold limit IEs (IDs 471-481).'
section: "4.2"
