document: rfc-6409
kind: interoperability-note
summary: Message modification by the MSA can affect the validity of existing message signatures (DKIM, PGP, S/MIME) and render them invalid, which in turn can affect message handling by downstream filtering engines. MSA operators should carefully consider this before modifying messages.
