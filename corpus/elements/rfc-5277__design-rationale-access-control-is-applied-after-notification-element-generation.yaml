document: rfc-5277
kind: design-rationale
summary: 'Access control is applied after <notification> element generation per session: if a session lacks permission to receive the notification, it is silently discarded for that session. This defers authorization to per-session evaluation rather than at stream definition time.'
section: "3.2"
topics:
    - netconf
    - security
