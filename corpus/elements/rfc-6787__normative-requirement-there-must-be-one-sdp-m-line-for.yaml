document: rfc-6787
kind: normative-requirement
summary: There MUST be one SDP 'm=' line for each MRCPv2 resource to be used in the session. This 'm=' line MUST have media type 'application' and transport type 'TCP/MRCPv2' or 'TCP/TLS/MRCPv2'. The port MUST be the discard port (9) in the client offer and the TCP listen port in the server answer.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
