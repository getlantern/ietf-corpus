document: rfc-1515
kind: protocol-element
summary: 'rpMauMediaAvailable reports link/loopback status with values: other(1), unknown(2), available(3), notAvailable(4), remoteFault(5), invalidSignal(6). For link/fiber MAUs it reflects link test state; for AUI/coax it reflects loopback on the DI circuit. remoteFault and invalidSignal apply only to 10BASE-FB MAUs.'
section: 4.1.1
