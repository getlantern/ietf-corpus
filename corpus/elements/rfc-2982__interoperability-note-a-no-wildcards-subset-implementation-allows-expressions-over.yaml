document: rfc-2982
kind: interoperability-note
summary: A no-wildcards subset implementation allows expressions over individual scalar MIB objects but is unsuitable for table-wide expressions or tables with dynamic instances. Compliance is indicated by restricting expObjectIDWildcard write syntax to false(2).
