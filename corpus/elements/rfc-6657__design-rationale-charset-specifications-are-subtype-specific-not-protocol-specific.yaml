document: rfc-6657
kind: design-rationale
summary: Charset specifications are subtype-specific, not protocol-specific, because each 'text/*' subtype has unique structural properties that determine how charset is conveyed. Placing charset defaults in protocol specifications (as HTTP did with ISO-8859-1) creates confusion and conflicts with subtype-level definitions.
section: "3"
topics:
