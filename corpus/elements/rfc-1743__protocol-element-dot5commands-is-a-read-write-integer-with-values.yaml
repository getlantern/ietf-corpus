document: rfc-1743
kind: protocol-element
summary: dot5Commands is a read-write INTEGER with values noop(1), open(2), reset(3), and close(4) that controls ring interface state. Setting open(2) causes the station to enter the open state; close(4) removes the station from the ring; reset(3) resets the station while retaining MIB counter values if possible. When read, always returns noop(1).
