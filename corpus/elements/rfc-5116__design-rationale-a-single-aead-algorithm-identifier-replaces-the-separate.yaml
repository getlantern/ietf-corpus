document: rfc-5116
kind: design-rationale
summary: A single AEAD algorithm identifier replaces the separate cipher+MAC pair, eliminating the need for application designers to reason about the relative order of authentication and encryption, the security of cipher/MAC combinations, or the potential confidentiality loss through the MAC. This abstraction allows security analysis independent of application context.
section: "1.3"
topics:
    - crypto
    - security
