document: rfc-5605
kind: protocol-element
summary: The pwAtmOutboundTable configures ATM PW in the outbound (PSN-bound) direction for 1:1 service modes. It is indexed by pwIndex and applies to pwType values atmAal5SduVcc(2), atmCell1to1Vcc(12), atmCell1to1Vpc(13), atmAal5PduVcc(14), and atmTransparent(3). Fields include pwAtmOutboundAtmIf (InterfaceIndex), pwAtmOutboundVpi (AtmVpIdentifier), pwAtmOutboundVci (AtmVcIdentifier), and pwAtmOutboundTrafficParamDescr (RowPointer).
section: "9"
topics:
