document: rfc-5778
kind: wire-format
summary: The MIP6-Request (MIR) command uses Command-Code 325 with the 'R' bit set. It is mandatory to include User-Name, Auth-Application-Id, Destination-Realm, Origin-Host, Origin-Realm, Auth-Request-Type, MIP6-Auth-Mode, 1-2 MIP-Mobile-Node-Address AVPs, MIP6-Agent-Info, and MIP-Careof-Address.
