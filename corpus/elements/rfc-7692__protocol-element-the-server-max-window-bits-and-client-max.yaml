document: rfc-7692
kind: protocol-element
summary: The 'server_max_window_bits' and 'client_max_window_bits' parameters carry a decimal integer value (8–15, no leading zeros) representing the base-2 logarithm of the LZ77 sliding window size limit. A response value for server_max_window_bits must be equal to or smaller than the offered value.
