document: rfc-2938
kind: protocol-element
summary: 'Hash value calculation involves three normalization steps: (1) remove all whitespace outside quoted strings, (2) convert all unquoted lowercase letters to uppercase, (3) apply MD5 to the normalized US-ASCII string. The feature expression must conform to RFC 2533''s ''filter'' syntax.'
