document: rfc-6855
kind: normative-requirement
summary: This specification does not extend the IMAP LOGIN command to support UTF-8 usernames and passwords. Whenever a client needs to use UTF-8 usernames or passwords, it MUST use the IMAP AUTHENTICATE command, which is already capable of passing UTF-8 usernames and credentials.
section: "5"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
