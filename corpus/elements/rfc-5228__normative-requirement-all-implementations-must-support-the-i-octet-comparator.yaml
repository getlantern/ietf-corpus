document: rfc-5228
kind: normative-requirement
summary: All implementations MUST support the 'i;octet' comparator (compares octets) and the 'i;ascii-casemap' comparator (treats uppercase and lowercase US-ASCII characters as equal). The default comparator when unspecified is 'i;ascii-casemap'.
section: 2.7.3
rfc2119_level: MUST
topics:
    - email
