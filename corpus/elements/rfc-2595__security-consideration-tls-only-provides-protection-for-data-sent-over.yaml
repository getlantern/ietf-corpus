document: rfc-2595
kind: security-consideration
summary: TLS only provides protection for data sent over a network connection; messages transferred over IMAP or POP3 remain available to server administrators and subject to eavesdropping when transmitted through SMTP or NNTP. TLS is not a substitute for end-to-end message security using MIME security multiparts.
section: "9"
topics:
    - tls
    - security
    - privacy
