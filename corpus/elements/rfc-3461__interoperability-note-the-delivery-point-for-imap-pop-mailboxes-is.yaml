document: rfc-3461
kind: interoperability-note
summary: The 'delivery' point for IMAP/POP mailboxes is when the message is made available to the IMAP/POP service, not when it is retrieved by the user agent. For mailing list exploders, 'delivery' is when the message is made available to the exploder, even if the exploder rejects the message.
section: 5.2.3
topics:
    - email
