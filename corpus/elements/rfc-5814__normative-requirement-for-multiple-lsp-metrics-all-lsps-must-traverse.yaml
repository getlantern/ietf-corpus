document: rfc-5814
kind: normative-requirement
summary: For multiple LSP metrics, all LSPs MUST traverse the same route. If multiple routes exist between ingress ID0 and egress ID1, Explicit Route Objects (EROs) or an alternate method such as static configuration MUST be used to enforce same-route traversal.
section: "5.5"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
