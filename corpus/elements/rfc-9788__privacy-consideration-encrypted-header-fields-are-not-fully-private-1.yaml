document: rfc-9788
kind: privacy-consideration
summary: 'Encrypted Header Fields are not fully private: (1) they may reveal information to the recipient that the sender didn''t intend; (2) they can be inferred from external metadata (e.g., message size, timing); (3) HCP may not fully mask them. Additionally, a naive recipient may overestimate the confidentiality status of a Header Field that is signed-only despite the message body being encrypted.'
section: "11.2"
topics:
    - email
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
