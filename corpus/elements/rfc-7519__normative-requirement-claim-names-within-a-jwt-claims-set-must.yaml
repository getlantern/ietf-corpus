document: rfc-7519
kind: normative-requirement
summary: Claim Names within a JWT Claims Set MUST be unique. JWT parsers MUST either reject JWTs with duplicate Claim Names or use a JSON parser that returns only the lexically last duplicate member name.
section: "4"
rfc2119_level: MUST
topics:
