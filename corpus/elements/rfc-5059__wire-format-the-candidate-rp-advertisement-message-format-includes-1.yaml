document: rfc-5059
kind: wire-format
summary: 'The Candidate-RP-Advertisement message format includes: 1-byte Prefix Count, 1-byte Priority (lower = higher priority), 2-byte Holdtime, a variable-length RP Address in Encoded-Unicast format, and n Group Addresses in Encoded-Group format. PIM message type value is 8.'
