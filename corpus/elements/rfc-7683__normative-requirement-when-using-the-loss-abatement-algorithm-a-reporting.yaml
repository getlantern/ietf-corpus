document: rfc-7683
kind: normative-requirement
summary: When using the loss abatement algorithm, a reporting node MUST indicate a percentage reduction in the OC-Reduction-Percentage AVP. A reacting node MUST apply abatement treatment to the requested percentage of outgoing request messages, using a stateless per-request probabilistic selection.
section: "6"
rfc2119_level: MUST
topics:
