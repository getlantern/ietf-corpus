document: rfc-3620
kind: protocol-element
summary: If the outermost 'tunnel' element has an 'srv' attribute, the concatenation of 'srv' and 'fqdn' (with a period) is looked up as a DNS SRV record to find the server. If SRV lookup fails and a 'port' attribute is present, the connection falls back to a direct address lookup as if 'srv' were absent.
section: "4"
topics:
    - realtime
    - dns
