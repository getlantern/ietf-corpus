document: rfc-5936
kind: interoperability-note
summary: Some old AXFR clients expect each response message to contain only a single RR. A server MAY restrict response messages to a single RR for compatibility; however, since there is no standard way to automatically detect such clients, this typically requires manual configuration at the server.
section: "2.2"
topics:
    - dns
