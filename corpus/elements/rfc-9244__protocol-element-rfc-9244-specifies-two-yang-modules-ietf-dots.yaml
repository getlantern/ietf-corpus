document: rfc-9244
kind: protocol-element
summary: 'RFC 9244 specifies two YANG modules: ''ietf-dots-telemetry'' for representing DOTS telemetry message types over the signal channel, and ''ietf-dots-mapping'' for sharing attack mapping details over the DOTS data channel. The telemetry module is not intended for NETCONF/RESTCONF server management; it serves only to provide a data model and encoding.'
