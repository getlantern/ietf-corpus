document: rfc-5364
kind: security-consideration
summary: Mishandling of 'bcc' copy control can reveal confidential information. Under the first method, blind recipients may accidentally reply-all and reveal themselves. Under the second method, if a single copy is sent containing all 'bcc' URIs, all blind recipients will see each other. Implementations must carefully process replies as per Section 4.
section: "8"
topics:
    - sip
    - security
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
