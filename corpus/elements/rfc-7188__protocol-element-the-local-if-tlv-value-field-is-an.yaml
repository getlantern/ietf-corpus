document: rfc-7188
kind: protocol-element
summary: The LOCAL_IF TLV value field is an enumerated single-octet value. Values THIS_IF (0) and OTHER_IF (1) identify whether an address belongs to the sending interface or another interface of the same router; value 255 (UNSPECIFIED) indicates no information.
section: 5.1.1
topics:
