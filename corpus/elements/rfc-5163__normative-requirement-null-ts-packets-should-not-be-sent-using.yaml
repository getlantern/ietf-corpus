document: rfc-5163
kind: normative-requirement
summary: NULL TS Packets SHOULD NOT be sent using the TS-Concat encapsulation. An Encapsulator SHOULD specify a bounded, configurable TS Packing Threshold; if no additional TS Packets arrive within that threshold, the Encapsulator MUST immediately send any queued TS Packets.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
