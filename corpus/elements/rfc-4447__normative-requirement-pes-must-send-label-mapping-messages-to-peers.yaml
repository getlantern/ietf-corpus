document: rfc-4447
kind: normative-requirement
summary: PEs MUST send Label Mapping Messages to peers as soon as the PW is configured and administratively enabled, regardless of attachment circuit state. If the label-to-PW binding is not available, the PW MUST be considered in the down state.
section: 5.4.1
rfc2119_level: MUST
