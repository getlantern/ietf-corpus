document: rfc-9441
kind: normative-requirement
summary: The fragment sender MUST listen for SCHC Compound ACK messages after sending an All-1 SCHC Fragment or a SCHC ACK REQ. Each time a sender sends an All-1 SCHC Fragment or SCHC ACK REQ, it MUST increment the Attempts counter and MUST reset the Retransmission Timer.
section: 3.2.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
