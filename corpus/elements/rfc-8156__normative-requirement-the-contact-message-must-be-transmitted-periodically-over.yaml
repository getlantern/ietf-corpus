document: rfc-8156
kind: normative-requirement
summary: The CONTACT message MUST be transmitted periodically over every established connection if other message traffic is not flowing, to ensure the partner continues to see the connection as operational. The keepalive interval is negotiated via OPTION_F_KEEPALIVE_TIME (code 128).
section: 5.3.12
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
