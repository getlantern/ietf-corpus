document: rfc-2210
kind: protocol-element
summary: Break bits are per-service flags in ADSPEC per-service headers signaling a break in QoS coverage. The global break bit (service 1, bit 23) indicates a non-RSVP or non-IS hop exists; service-specific break bits indicate a particular service (Guaranteed or Controlled-Load) is unsupported at one or more hops, rendering that service's ADSPEC parameters unreliable.
section: 2.3.1
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
