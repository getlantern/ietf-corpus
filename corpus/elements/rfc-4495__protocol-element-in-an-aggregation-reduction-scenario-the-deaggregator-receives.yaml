document: rfc-4495
kind: protocol-element
summary: 'In an aggregation reduction scenario, the deaggregator receives a ResvErr with the reduction indication and chooses to: (a) partially fail one or more individual flows with reduced bandwidth, (b) fully preempt a single individual flow via ResvErr+ResvTear, or (c) fully preempt multiple individual flows. In all cases the aggregate Resv bandwidth is lowered accordingly.'
section: "5.4"
topics:
