document: rfc-4037
kind: protocol-element
summary: The uni type is a unique numeric identifier in [0,2147483647] scoped to its OCP context (xid for transactions, sg-id for service groups). New identifiers MUST use monotonically increasing values within the same type and scope, enabling efficient log cross-referencing and duplicate detection.
section: "10.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
