document: rfc-6364
kind: design-rationale
summary: Specifying the repair window size as an absolute time value does not necessarily correspond to an integer number of packets or exactly match the RTP clock rate, causing mismatches among subsequent repair windows. However, this mismatch does not break anything in the FEC decoding process in practice.
section: "4.6"
topics:
    - realtime
    - rtp
