document: rfc-6326
kind: normative-requirement
summary: In the set of LSPs originated by an IS, the union of VLAN ranges in all INT-VLAN sub-TLV occurrences MUST be precisely the set of VLANs for which the IS is appointed forwarder on at least one port, and VLAN ranges in multiple INT-VLAN sub-TLVs for an IS MUST NOT overlap unless the per-VLAN information is identical.
section: 2.3.6
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
