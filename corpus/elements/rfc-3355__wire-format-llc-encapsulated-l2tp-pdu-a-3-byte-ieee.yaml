summary: 'LLC Encapsulated L2TP PDU: a 3-byte IEEE 802.2 LLC header (Destination SAP 0xAA, Source SAP 0xAA, Frame Type UI 0x03), followed by a 5-byte IEEE 802.1a SNAP header (OUI 0x00-00-5E for IANA, PID 0x0007 for L2TP), followed by the L2TP PDU payload.'
