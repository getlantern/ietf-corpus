document: rfc-9514
kind: wire-format
summary: The SRv6 Capabilities TLV (Type 1038, Length 4) carries a 2-octet Flags field (copied from IS-IS or OSPFv3 SRv6 Capabilities TLVs) and a 2-octet Reserved field. It is included in the BGP-LS Attribute of the Node NLRI to signal SRv6 support.
section: "3.1"
