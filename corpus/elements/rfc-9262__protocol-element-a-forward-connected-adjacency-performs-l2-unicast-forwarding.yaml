document: rfc-9262
kind: protocol-element
summary: A forward_connected() adjacency performs L2 unicast forwarding to a directly connected BFR neighbor on a specified interface without involving a routing underlay. It optionally carries a DoNotClear (DNC) flag that suppresses clearing of its BP in the packet copy sent to that adjacency.
section: 4.2.1
topics:
    - routing
