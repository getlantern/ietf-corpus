document: rfc-1374
kind: interoperability-note
summary: HIPPI nodes may use Path MTU Discovery (RFC 1191) without modification to detect MTU restrictions on paths between HIPPI-SC LANs and other networks; gateways between HIPPI-SC LANs and other network types should implement RFC 1191.
section: Path MTU Discovery
