document: rfc-7941
kind: wire-format
summary: The one-byte format consists of a 4-bit ID field followed by a 4-bit length field (len), where the data payload is len+1 bytes of UTF-8 text encoding the SDES item value. This reuses the RFC 5285 one-byte header format.
