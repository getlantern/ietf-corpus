document: rfc-9109
kind: interoperability-note
summary: On most current operating systems implementing RFC 6056 ephemeral port randomization, NTP clients can rely on the OS by not calling bind() or binding to port 0; using connect() additionally restricts the socket to only receive packets from the specified remote socket.
section: "4"
topics:
