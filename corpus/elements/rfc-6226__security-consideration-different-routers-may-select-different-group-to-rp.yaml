document: rfc-6226
kind: security-consideration
summary: Different routers may select different Group-to-RP mappings for the same group if their learned mappings are inconsistent (e.g., BSR not enabled on one router), breaking multicast connectivity. Consistent, secure mapping distribution is required.
section: "12"
topics:
    - security
    - multicast
