document: rfc-2930
kind: normative-requirement
summary: A resolver query for DH-mode TKEY MUST include a KEY RR with the resolver's DH public key in the additional information section; the server response includes a server DH KEY RR so both sides can compute the shared secret.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - crypto
