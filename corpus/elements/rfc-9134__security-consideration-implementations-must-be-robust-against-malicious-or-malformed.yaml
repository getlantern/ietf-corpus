document: rfc-9134
kind: security-consideration
summary: Implementations MUST be robust against malicious or malformed payloads; a decoder that overruns its allocated memory due to a crafted payload could allow arbitrary code execution by an attacker. The same robustness applies to encoders, though encoder vulnerabilities are typically rarer.
section: "10"
