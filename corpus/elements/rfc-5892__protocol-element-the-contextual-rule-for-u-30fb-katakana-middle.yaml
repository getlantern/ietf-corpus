document: rfc-5892
kind: protocol-element
summary: The contextual rule for U+30FB (KATAKANA MIDDLE DOT) requires that at least one character in the label have a Script property value of Hiragana, Katakana, or Han. The Katakana Middle Dot itself has Script=Common, so labels consisting solely of this character are disallowed.
section: A.7
topics:
    - dns
