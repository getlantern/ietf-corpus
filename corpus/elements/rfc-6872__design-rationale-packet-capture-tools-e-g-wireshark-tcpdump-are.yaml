document: rfc-6872
kind: design-rationale
summary: Packet capture tools (e.g., Wireshark, tcpdump) are unsuitable as SIP CLF because they cannot decrypt TLS-protected SIP traffic, require third-party libraries on every platform, and produce output not amenable to simple command-line text processing.
