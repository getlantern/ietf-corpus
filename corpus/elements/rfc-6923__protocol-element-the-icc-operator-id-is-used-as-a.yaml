document: rfc-6923
kind: protocol-element
summary: The ICC_Operator_ID is used as a drop-in replacement for the Global_ID defined in RFC 6370, prefixed to node, interface, tunnel, LSP, and PW identifiers to provide global uniqueness. The substitution is direct for all RFC 6370 identifiers except MEG, MEP, and MIP IDs, which are redefined in this document.
section: "3.1"
topics:
