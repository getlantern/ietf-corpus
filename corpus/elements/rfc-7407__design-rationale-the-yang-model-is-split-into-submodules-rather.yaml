document: rfc-7407
kind: design-rationale
summary: The YANG model is split into submodules rather than a flat module to preserve SNMP's own modularity, keeping the number of namespaces manageable while allowing additional SNMP features to be added independently. This mirrors how SNMP MIB modules are structured without forcing consumers to deal with multiple YANG namespaces.
section: "2"
topics:
