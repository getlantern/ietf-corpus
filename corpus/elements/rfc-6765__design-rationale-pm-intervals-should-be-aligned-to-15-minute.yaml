document: rfc-6765
kind: design-rationale
summary: PM intervals SHOULD be aligned to 15-minute wall-clock boundaries (and 1-day intervals to midnight) to simplify collection and correlation across multiple agents by an NMS, since each interval can be timestamped using gBond*IntervalIndex aligned to NTP/SNTP-distributed network time.
section: "5.2"
topics:
