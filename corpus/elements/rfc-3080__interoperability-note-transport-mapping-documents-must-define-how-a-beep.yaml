document: rfc-3080
kind: interoperability-note
summary: Transport mapping documents MUST define how a BEEP session is established and released, how initiating vs. listening roles are identified, how messages are reliably sent/received in order on a single channel, and how messages on different channels are sent without ordering constraints.
