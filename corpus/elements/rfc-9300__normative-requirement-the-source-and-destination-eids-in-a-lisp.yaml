document: rfc-9300
kind: normative-requirement
summary: The source and destination EIDs in a LISP-encapsulated packet MUST belong to the same Instance ID. An EID used on the public Internet MUST be unique and have the same properties as any other IP address used in that manner.
section: "8"
rfc2119_level: MUST
topics:
    - ip
