document: rfc-1850
kind: protocol-element
summary: ospfIfAuthType at the interface level (0=none, 1=simplePassword, 2=MD5, >2 reserved for IANA) supersedes the obsolete area-level ospfAuthType. ospfIfAuthKey (OCTET STRING, up to 256 octets) always returns a zero-length string when read, regardless of the configured value.
section: "3.7"
topics:
