document: rfc-6354
kind: design-rationale
summary: RFC 2198 defines the timestamp offset as a 14-bit unsigned value, implying redundant data must be sent after primary data. This prevents RFC 2198 from supporting forward-shifted redundant blocks, which motivated a new media type.
section: "3"
topics:
