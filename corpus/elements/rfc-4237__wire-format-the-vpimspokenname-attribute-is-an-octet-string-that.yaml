document: rfc-4237
kind: wire-format
summary: The vPIMSpokenName attribute is an octet string that MUST be encoded in 32 kbit/s ADPCM exactly as defined by RFC 3802. The length of the spoken name segment MUST NOT exceed five seconds (approximately 20000 octets at 4 kbytes/second).
section: "2.3"
rfc2119_level: MUST
