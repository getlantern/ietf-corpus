document: rfc-4303
kind: protocol-element
summary: Traffic Flow Confidentiality (TFC) padding is an optional variable-length field inserted within the Payload Data after the real payload and before the Padding field. It can be used only when the payload contains an explicit length field (always true in tunnel mode), and its use MUST be negotiated via the SA management protocol for backward compatibility.
section: "2.7"
topics:
    - ipsec
    - privacy
    - security
