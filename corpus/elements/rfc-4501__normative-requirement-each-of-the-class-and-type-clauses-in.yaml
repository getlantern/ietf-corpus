document: rfc-4501
kind: normative-requirement
summary: Each of the CLASS and TYPE clauses in a dnsqueryelement MUST NOT be used more than once. For example, 'dns:example?TYPE=A;TYPE=TXT' is invalid.
section: "3"
rfc2119_level: MUST NOT
