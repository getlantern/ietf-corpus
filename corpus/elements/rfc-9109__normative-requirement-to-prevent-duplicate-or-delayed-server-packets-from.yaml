document: rfc-9109
kind: normative-requirement
summary: To prevent duplicate or delayed server packets from eliciting ICMP port unreachable errors at the client, the client MAY wait for additional responses for a specific period (e.g., 3 seconds) before closing the UDP socket/port.
section: "4"
rfc2119_level: MAY
