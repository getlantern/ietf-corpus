document: rfc-2833
kind: normative-requirement
summary: 'For ABCD trunk signaling state transitions, implementations SHOULD use a triple-redundancy mechanism: the same ABCD bits are sent 3 times at 5 ms intervals on each transition; after a period of no change, ABCD is sent every 5 seconds.'
section: "3.14"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - voip
