document: rfc-5914
kind: normative-requirement
summary: Fields defined in TrustAnchorInfo (policySet, policyFlags, nameConstr, pathLenConstraint, exts) always override or supplement corresponding values in any enveloped certificate. TrustAnchorInfo fields are always enforced; certificate extensions are enforced only when no corresponding TrustAnchorInfo value exists.
section: "2.5"
rfc2119_level: REQUIRED
topics:
    - pkix
    - security
