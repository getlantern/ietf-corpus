document: rfc-7420
kind: state-machine
summary: 'The pcePcepSessState object defines four session states: tcpPending(1) — TCP connection being established; openWait(2) — waiting for Open message; keepWait(3) — waiting for Keepalive or PCErr after Open exchange; sessionUp(4) — session fully active. The idle state is not represented because entries are absent from pcePcepSessTable in idle state.'
section: "4.1"
topics:
    - routing
