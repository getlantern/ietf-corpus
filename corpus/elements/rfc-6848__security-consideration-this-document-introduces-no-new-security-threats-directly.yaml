document: rfc-6848
kind: security-consideration
summary: This document introduces no new security threats directly, but creators of civic address extensions should consult RFC 3694 Sections 4.3.1 and 5.1 to understand threat environments. Security threats applicable to civic address formats are described in RFC 4776 (DHCP) and RFC 5139 (XML).
