document: rfc-8000
kind: normative-requirement
summary: AUTH_SYS MUST NOT be used in a multi-domain file system deployment because its UID/GID authorization ID representation has no domain component, causing collisions when multiple name services are used.
section: "6.2"
rfc2119_level: MUST NOT
