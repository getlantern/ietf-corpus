document: rfc-7532
kind: wire-format
summary: 'The fedfsAnnotation attribute (OID 1.3.6.1.4.1.31103.1.12) stores key/value pairs formatted per ABNF: ANNOTATION = KEY ''='' VALUE, where KEY and VALUE are double-quoted UTF-8 strings. It is multi-valued; a malformed annotation SHOULD be ignored in its entirety but MUST NOT prevent processing of the containing entry.'
section: 4.2.1.6
