document: rfc-3923
kind: normative-requirement
summary: The application/xmpp+xml media type root element <xmpp/> MUST contain one and only one child element corresponding to an XMPP stanza type (message, presence, or iq), and the character encoding MUST be UTF-8.
section: "10"
rfc2119_level: MUST
