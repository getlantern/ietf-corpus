document: rfc-2746
kind: protocol-element
summary: When multiple end-to-end sessions map to a single tunnel session, Rentry computes an aggregate Tspec (e.g., by summing individual Tspecs as specified in RFC 2211/RFC 2212) for the tunnel PATH; similarly, Rexit computes an aggregate flowspec from the arriving end-to-end RESVs.
section: "6.4"
topics:
