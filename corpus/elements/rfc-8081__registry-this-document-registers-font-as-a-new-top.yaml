document: rfc-8081
kind: registry
summary: 'This document registers ''font'' as a new top-level media type in the IANA standards tree, under which subtypes for font representation formats may be registered. It also registers six initial subtypes: font/sfnt, font/ttf, font/otf, font/collection, font/woff, and font/woff2.'
