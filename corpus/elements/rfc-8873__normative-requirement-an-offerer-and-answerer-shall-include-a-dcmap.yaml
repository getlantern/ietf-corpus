document: rfc-8873
kind: normative-requirement
summary: An offerer and answerer SHALL include a 'dcmap' attribute in each offer and answer for the SDP media description describing the SCTP association, with parameters 'label=' and 'subprotocol="msrp"'. The 'max-retr' and 'max-time' parameters SHALL NOT be included.
section: "4.3"
rfc2119_level: SHALL
