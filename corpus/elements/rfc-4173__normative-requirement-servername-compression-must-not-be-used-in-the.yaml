document: rfc-4173
kind: normative-requirement
summary: Servername compression MUST NOT be used in the servername field of the Root Path option. The servername must follow URI specification Section 3.2.2 and contain either a valid domain name, a literal IPv4 address, or a literal IPv6 address.
section: "5"
rfc2119_level: MUST NOT
topics:
    - tcp
    - ip
