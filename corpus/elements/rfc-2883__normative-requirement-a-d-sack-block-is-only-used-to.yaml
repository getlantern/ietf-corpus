document: rfc-2883
kind: normative-requirement
summary: A D-SACK block is only used to report a duplicate contiguous sequence received in the most recent packet. Each such duplicate is reported in at most one D-SACK block; the receiver sends two identical D-SACK blocks in subsequent packets only if it receives two separate duplicate segments.
section: "4"
rfc2119_level: SHOULD
topics:
    - tcp
