summary: 'Three new Extended Key Usage OIDs are defined: id-kp-cmcCA (id-pkix kp 27) for CA role, id-kp-cmcRA (id-pkix kp 28) for RA role, and id-kp-cmKGA (id-pkix kp 32) for Key Generation Authority role. These allow automated validation of PKI management entity delegation.'
