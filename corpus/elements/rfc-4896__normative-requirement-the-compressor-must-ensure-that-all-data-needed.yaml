document: rfc-4896
kind: normative-requirement
summary: The compressor MUST ensure that all data needed to decompress a SigComp message is available at the receiving endpoint. Whether message misordering can occur and its impact depends on the compartment definition and transport protocol, so the compressor implementer must account for these factors.
section: "8"
rfc2119_level: MUST
topics:
    - realtime
