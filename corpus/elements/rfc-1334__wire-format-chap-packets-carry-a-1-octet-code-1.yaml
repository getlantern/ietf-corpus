document: rfc-1334
kind: wire-format
summary: CHAP packets carry a 1-octet Code (1=Challenge, 2=Response, 3=Success, 4=Failure), 1-octet Identifier, 2-octet Length, and variable Data field. Octets beyond the Length field are treated as Data Link Layer padding.
