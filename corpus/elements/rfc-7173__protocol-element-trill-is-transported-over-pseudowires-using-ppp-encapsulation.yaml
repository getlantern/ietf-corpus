document: rfc-7173
kind: protocol-element
summary: TRILL is transported over pseudowires using PPP encapsulation (PW type 0x0007) per RFC 4618. After the pseudowire is established and TRILL use is negotiated within PPP, the ports appear directly connected with a PPP link, following RFC 6361 behavior.
section: "2.2"
topics:
    - mpls
    - routing
