document: rfc-2955
kind: protocol-element
summary: frAtmIwfConnectionDescriptorTable contains shared attribute sets (descriptor rows) that one or more cross-connect entries may reference via frAtmIwfConnectionDescriptor. Each descriptor captures DE/CLP mapping mode, congestion mapping mode, encapsulation mode, fragmentation, and ARP translation settings.
