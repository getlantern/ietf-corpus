document: rfc-3734
kind: normative-requirement
summary: Mutual client and server authentication using the TLS Handshake Protocol is REQUIRED; signatures on the complete certificate chain for both client and server MUST be validated, and EPP service MUST NOT be granted until successful completion of a TLS handshake and certificate validation.
section: "8"
rfc2119_level: REQUIRED
