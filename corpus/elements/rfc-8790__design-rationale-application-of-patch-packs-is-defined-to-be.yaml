document: rfc-8790
kind: design-rationale
summary: Application of Patch Packs is defined to be idempotent, making PATCH and iPATCH semantically equivalent for SenML. This reflects that SenML record replacement/addition/removal is a set operation with no ordering side-effects between identical requests.
section: "3.2"
