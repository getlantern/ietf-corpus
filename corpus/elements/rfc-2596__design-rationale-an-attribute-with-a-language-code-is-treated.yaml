document: rfc-2596
kind: design-rationale
summary: An attribute with a language code is treated as a subtype of the attribute without a language code. This means that a search filter or requested attribute list without a language code will match or return all values regardless of their language code, preserving backward compatibility.
section: "3"
topics:
