document: rfc-3966
kind: interoperability-note
summary: The tel URI can be used as a Request-URI in SIP. SIP proxy servers must translate tel URIs to SIP URIs for routing; for local numbers, a proxy MUST NOT translate tel URIs whose contexts it does not understand, and must return 404 (Not Found) if the context is unrecognized.
section: "9"
topics:
