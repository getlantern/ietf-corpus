document: rfc-4951
kind: wire-format
summary: The Tunnel Recovery AVP (Attribute Type 77) carries a Recover Tunnel ID and Recover Remote Tunnel ID, each 32 bits for L2TPv3 and 16 bits (with Reserved prefix) for L2TPv2. The H-bit MUST be 0 and the M-bit MUST be 1 (mandatory). This AVP MUST appear only in SCCRQ messages establishing a recovery tunnel.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
