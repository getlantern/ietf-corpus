document: rfc-5151
kind: design-rationale
summary: Per-domain reoptimization using nesting or stitching is limited to preserving domain entry and exit points, whereas end-to-end reoptimization can select new domain border LSRs. This locality principle means stitching or nesting better supports local reoptimization, while contiguous LSPs give the ingress maximal end-to-end control.
section: "6"
topics:
