document: rfc-8282
kind: registry
summary: IANA has created a new 'Inter-Layer Object Path Property Bits' subregistry for the INTER-LAYER object Flag field, with bits 0-28 unassigned, bit 29 (T) for Triggered Signaling Allowed, bit 30 (M) for Multi-Layer Requested, and bit 31 (I) for Inter-Layer Allowed. New bits require IETF Review.
