kind: protocol-element
summary: The flexi-grid Port Label Restrictions field defines Central Frequency Granularity (C.F.G) as a positive integer multiple of C.S., and Slot Width Granularity (S.W.G) as a positive integer multiple of 2*C.S., enabling expression of a port's supported slot width subset.
