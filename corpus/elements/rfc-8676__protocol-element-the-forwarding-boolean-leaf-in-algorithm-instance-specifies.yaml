document: rfc-8676
kind: protocol-element
summary: The forwarding boolean leaf in algorithm-instance specifies whether a MAP rule may be used as a Forwarding Mapping Rule (FMR); if false, the rule is a Basic Mapping Rule (BMR) only and must not be used for forwarding (per RFC 7598, Section 4.1).
section: "4.2"
