summary: 'Parameters collected at MP(Src) include Tstamp(Src)[i] per packet, with optional PktID(Src)[i] (sequence number) and PktSi(Src)[i] (actual packet size). Parameters at MP(Dst) mirror these and add optional PktStatus[i] with possible values: OK, corrupt header, corrupt payload, duplicate, fragment.'
