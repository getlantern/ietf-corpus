document: rfc-4931
kind: normative-requirement
summary: Transfer of a domain object MUST implicitly transfer all subordinate host objects. For example, if 'example.com' is transferred and 'ns1.example.com' exists as a host object, 'ns1.example.com' MUST be transferred as part of the 'example.com' transfer process.
section: 3.2.4
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
