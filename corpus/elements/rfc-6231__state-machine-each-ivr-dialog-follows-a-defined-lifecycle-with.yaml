document: rfc-6231
kind: state-machine
summary: Each IVR dialog follows a defined lifecycle with states IDLE, PREPARING, PREPARED, STARTING, STARTED, and TERMINATED. Transitions are triggered by <dialogprepare>, <dialogstart>, <dialogterminate> requests, 200 responses, dialogexit notifications, and error conditions. Once TERMINATED, the dialog identifier is no longer valid.
