document: rfc-6211
kind: normative-requirement
summary: For Signed Data validation, if a CMS validator supports this attribute, it MUST compare SignerInfo.digestAlgorithm to the digestAlgorithm field in the attribute; if they differ (modulo encoding), signature validation MUST fail.
section: "3.1"
rfc2119_level: MUST
topics:
