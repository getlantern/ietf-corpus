document: rfc-9796
kind: normative-requirement
summary: When URIs are used within a jCard, the content referenced by those URIs MUST NOT contain any URI references; the client MUST ensure that those URI references are not followed, and any URIs present in URI-linked content are not rendered.
section: "10.1"
rfc2119_level: MUST NOT
