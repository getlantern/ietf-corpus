document: rfc-9447
kind: normative-requirement
summary: 'The JWT payload MUST contain a new ''atc'' claim (Authority Token Challenge) with three mandatory elements: ''tktype'' (ATC identifier type, restricted to ACME Identifier Types registry values), ''tkvalue'' (identifier value), and ''fingerprint'' (binding).'
