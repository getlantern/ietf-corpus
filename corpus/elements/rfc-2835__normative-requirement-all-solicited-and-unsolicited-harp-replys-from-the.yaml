document: rfc-2835
kind: normative-requirement
summary: All solicited and unsolicited HARP_REPLYs from the authoritative HARP server SHALL be used to update and refresh the client's HARP table entries, enabling the server to push updates similar to gratuitous ARP on Ethernet.
section: "5.2"
rfc2119_level: SHALL
