document: rfc-5285
kind: normative-requirement
summary: Each extension is named by a URI that MUST be absolute and precisely identifies the format and meaning of the extension. URIs containing a domain name SHOULD also contain a month-date in the form mmyyyy. The definition and URI assignment MUST have been authorized by the domain name owner on or very close to that date.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - registry
