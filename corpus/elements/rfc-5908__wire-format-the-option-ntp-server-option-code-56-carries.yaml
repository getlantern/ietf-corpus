document: rfc-5908
kind: wire-format
summary: The OPTION_NTP_SERVER option (code 56) carries a variable-length sequence of suboptions. The 2-byte option-code field is set to 56, followed by a 2-byte option-len giving the total length of all included suboptions. The option itself holds no value directly.
