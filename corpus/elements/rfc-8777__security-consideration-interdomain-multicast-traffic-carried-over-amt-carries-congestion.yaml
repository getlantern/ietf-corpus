document: rfc-8777
kind: security-consideration
summary: Interdomain multicast traffic carried over AMT carries congestion risks. Operators should use traffic authentication at ingest, rate-limiting, and circuit-breaker techniques (per RFC 8085) to protect network health against misconfiguration, poorly written applications, or deliberate attacks.
section: "6.3"
topics:
    - security
    - multicast
    - congestion
