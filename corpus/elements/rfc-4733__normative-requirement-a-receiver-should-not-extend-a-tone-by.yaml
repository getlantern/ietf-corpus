document: rfc-4733
kind: normative-requirement
summary: A receiver SHOULD NOT extend a tone by more than three packet interarrival times when using the 'play until E bit or timeout' playout algorithm, to prevent a tone from getting stuck due to loss of all retransmissions of the final packet.
section: 2.5.2.2
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
