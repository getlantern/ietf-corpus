document: rfc-4856
kind: interoperability-note
summary: audio/L16 is compatible with the encoding used in WAV (Microsoft Windows RIFF) and Apple AIFF formats, and with the public domain 'sox' and 'rateconv' programs. Unlike other audio types in this document, audio/L16 is also defined for non-RTP file-based transfer.
