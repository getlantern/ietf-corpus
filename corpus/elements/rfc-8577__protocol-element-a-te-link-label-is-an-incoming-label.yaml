document: rfc-8577
kind: protocol-element
summary: A TE link label is an incoming label at an LSR that causes a pop operation with the packet forwarded over a specific outgoing TE link to a neighbor. These labels are preinstalled per-TE link and can be shared by all MPLS RSVP-TE LSPs traversing that TE link, regardless of LSP ingress or egress.
section: "2"
topics:
