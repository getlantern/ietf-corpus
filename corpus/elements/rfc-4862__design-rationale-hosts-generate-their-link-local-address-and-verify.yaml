document: rfc-4862
kind: design-rationale
summary: Hosts generate their link-local address and verify its uniqueness in parallel with waiting for a Router Advertisement, rather than serially, because a router may delay responding to a Router Solicitation for several seconds; parallel execution significantly reduces total autoconfiguration time.
