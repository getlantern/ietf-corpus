document: rfc-8127
kind: normative-requirement
summary: On receiving a PBU, if EnableLCMPSubOptHeartbeatControl is set and all heartbeat variables are NON_ZERO, the LMA MUST include the Heartbeat Control Sub-Option in the PBA. If any heartbeat variable is ZERO, the LMA MUST reject the binding with status code '128 - Reason Unspecified'.
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
