document: rfc-4090
kind: security-consideration
summary: This document does not introduce new security issues; the security considerations of the base RSVP protocol remain relevant. However, the facility backup method requires that a PLR and its selected merge point trust RSVP messages received from each other, as the PLR forwards protected LSP control traffic through the bypass tunnel.
