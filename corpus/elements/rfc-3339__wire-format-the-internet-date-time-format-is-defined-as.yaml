document: rfc-3339
kind: wire-format
summary: 'The Internet Date/Time Format is defined as: date-time = full-date ''T'' full-time, where full-date = 4DIGIT ''-'' 2DIGIT ''-'' 2DIGIT and full-time = time-hour '':'' time-minute '':'' time-second [time-secfrac] time-offset. The time-offset is either ''Z'' or a numeric offset ''(+/-)HH:MM''.'
