document: rfc-3339
kind: wire-format
summary: 'The Internet Date/Time Format is defined as: date-time = full-date "T" full-time, where full-date = date-fullyear "-" date-month "-" date-mday (4DIGIT-2DIGIT-2DIGIT) and full-time = partial-time time-offset. The "T" separator and all punctuation are mandatory.'
