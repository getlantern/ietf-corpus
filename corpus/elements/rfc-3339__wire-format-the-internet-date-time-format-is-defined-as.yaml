document: rfc-3339
kind: wire-format
summary: 'The Internet Date/Time Format is defined as: date-time = full-date "T" full-time, where full-date = date-fullyear "-" date-month "-" date-mday and full-time = partial-time time-offset. The time-offset is either "Z" or a numeric offset of the form ("+" / "-") time-hour ":" time-minute.'
