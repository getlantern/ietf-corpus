document: rfc-3949
kind: normative-requirement
summary: If GlobalParametersIFD (tag 400) is present, it SHOULD be located in the first IFD immediately following the 8-byte header. In a conflict between GlobalParametersIFD and an image IFD, the image IFD values prevail.
section: 2.1.3
rfc2119_level: SHOULD
