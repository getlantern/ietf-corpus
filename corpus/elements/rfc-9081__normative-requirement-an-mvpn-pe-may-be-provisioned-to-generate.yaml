document: rfc-9081
kind: normative-requirement
summary: An MVPN PE MAY be provisioned to generate MSDP SA messages from received MVPN SA routes, with or without local policy control; if triggered, the MVPN SA route is treated as a corresponding MSDP SA received from within the PE mesh group.
section: "3"
rfc2119_level: MAY
topics:
