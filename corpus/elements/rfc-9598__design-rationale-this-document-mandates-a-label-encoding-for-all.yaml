document: rfc-9598
kind: design-rationale
summary: This document mandates A-label encoding for all domain labels in SmtpUTF8Mailbox, eliminating the conditional A-label or U-label encoding from RFC 8398. This simplification reduces complexity for path validation algorithm implementations by eliminating the need to convert domain labels to Unicode representation during comparison.
section: "1"
topics:
