summary: This document has no new IANA actions but references the existing 'FEC Framework (FECFRAME) FEC Encoding IDs' registry defined in RFC 6363. Each sliding window FEC scheme for use with this framework must register its own FEC Encoding ID in that registry under all the rules of RFC 6363 Section 11.
