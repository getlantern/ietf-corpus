document: rfc-6772
kind: protocol-element
summary: The <set-retention-expiry> transformation (non-negative integer, in seconds) is added to the time the LS provides location to compute the <retention-expiry> in the PIDF-LO. A value of zero requests that the information not be retained. If absent and the PIDF-LO is newly created, the value MUST be set to the current date.
section: "6.2"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
