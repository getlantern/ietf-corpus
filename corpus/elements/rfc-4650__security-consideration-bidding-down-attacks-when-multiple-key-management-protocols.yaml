document: rfc-4650
kind: security-consideration
summary: Bidding-down attacks when multiple key management protocols are offered via SDP are addressed by listing all KMP identifiers within the HMAC-protected General Extension Payload. Omitting this protection could allow an attacker to force negotiation of a weaker protocol.
section: "5.2"
topics:
    - security
