document: rfc-9857
kind: normative-requirement
summary: The SR Segment sub-TLV MUST be included as an ordered set within the SR Segment List TLV when the SID list is not empty; when the SID list is empty (e.g., for a dynamic path not yet computed), the SR Segment List TLV MUST NOT include any SR Segment sub-TLVs.
section: "5.7"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
