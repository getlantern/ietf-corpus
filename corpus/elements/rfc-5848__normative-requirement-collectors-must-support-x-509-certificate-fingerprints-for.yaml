document: rfc-5848
kind: normative-requirement
summary: Collectors MUST support X.509 certificate fingerprints for end-entity certificate matching, and MUST support configuring a list of HOSTNAMEs (as FQDNs or IP addresses) for each peer. Signer implementations MUST provide a means to generate a key pair and self-signed certificate.
section: 5.2.2
rfc2119_level: MUST
topics:
