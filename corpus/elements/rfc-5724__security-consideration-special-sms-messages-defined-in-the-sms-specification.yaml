document: rfc-5724
kind: security-consideration
summary: Special SMS messages defined in the SMS specification can be used to turn on indicators on phone displays, send data to communication ports, or remotely reconfigure devices (e.g., WAP configuration messages). SMS clients SHOULD filter out malicious use of such User Data header fields; gateways SHOULD implement 'firewalling' of such messages.
section: "4"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
