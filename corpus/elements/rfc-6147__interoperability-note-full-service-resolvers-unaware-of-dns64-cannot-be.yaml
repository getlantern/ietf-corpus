document: rfc-6147
kind: interoperability-note
summary: Full-service resolvers unaware of DNS64 cannot be used as mixed iterative/forwarding resolvers in a DNS64 environment, because they may obtain IPv4-only glue records and be unable to answer AAAA queries without the DNS64 synthesis capability.
section: "6.1"
topics:
    - dns
    - v6ops
