document: rfc-5026
kind: normative-requirement
summary: Addresses MUST be marked as used for at least as long as the binding exists and associated with the mobile node identity. The home agent MUST also ensure that a requested address is not the authorized address of any other mobile node.
section: "9.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
