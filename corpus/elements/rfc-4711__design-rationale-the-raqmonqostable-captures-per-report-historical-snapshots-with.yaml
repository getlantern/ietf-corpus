document: rfc-4711
kind: design-rationale
summary: The raqmonQosTable captures per-report historical snapshots with a more restricted set of parameters compared to raqmonParticipantTable, which holds session-lifetime aggregates. This separation allows fine-grained time-series analysis without bloating the aggregate table.
