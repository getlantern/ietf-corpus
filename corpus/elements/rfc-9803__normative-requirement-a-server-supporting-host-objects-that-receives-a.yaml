document: rfc-9803
kind: normative-requirement
summary: A server supporting host objects that receives a command attempting to set TTL values for A and AAAA records on a domain object MUST respond with a 2306 'Parameter value policy' error. EPP servers using the host attribute model MAY allow clients to set A and AAAA TTL values for domain objects.
section: 1.2.1.2.1
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
