document: rfc-5905
kind: wire-format
summary: The NTP packet header is a UDP datagram of 12 32-bit words (48 octets) in network byte order, containing LI (2 bits), VN (3 bits), Mode (3 bits), Stratum (8 bits), Poll (8 bits), Precision (8 bits), Root Delay (32 bits NTP short format), Root Dispersion (32 bits NTP short format), Reference ID (32 bits), and four 64-bit timestamps (Reference, Origin, Receive, Transmit). Optional extension fields and an optional MAC (32-bit Key Identifier + 128-bit MD5 digest) may follow.
section: "7.3"
topics:
    - ntp
