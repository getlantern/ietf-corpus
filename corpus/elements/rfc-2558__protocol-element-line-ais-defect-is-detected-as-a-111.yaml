document: rfc-2558
kind: protocol-element
summary: Line AIS defect is detected as a '111' pattern in bits 6, 7, 8 of the K2 byte in 5 consecutive frames; terminated when that pattern is absent for 5 consecutive frames. Line AIS failure is declared when defect persists 20.5 ±0.5 s; cleared after 10 ±0.5 s absence.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
