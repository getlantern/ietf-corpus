document: rfc-3920
kind: normative-requirement
summary: A resource identifier MUST be formatted so that the Resourceprep profile of STRINGPREP can be applied without failing. A server MUST (and a client SHOULD) apply Resourceprep before comparing two resource identifiers.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
