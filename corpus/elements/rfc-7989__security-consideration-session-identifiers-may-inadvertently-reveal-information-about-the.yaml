document: rfc-7989
kind: security-consideration
summary: Session identifiers may inadvertently reveal information about the network topology or the relationships between devices. Endpoints and intermediaries should be aware that logging session identifiers, while useful for troubleshooting, must be done in accordance with RFC 6872 to limit unintended disclosure.
section: "12"
topics:
