document: rfc-2110
kind: normative-requirement
summary: If a message contains one or more body parts with links and also contains the linked data as separate body parts, the whole set SHOULD be sent within a multipart/related body part. The root body part SHOULD be the start object for rendering (e.g., text/html) or a multipart/alternative whose alternatives resolve to such an object.
section: "7"
rfc2119_level: SHOULD
topics:
    - email
