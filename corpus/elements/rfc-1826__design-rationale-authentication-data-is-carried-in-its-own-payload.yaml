document: rfc-1826
kind: design-rationale
summary: Authentication data is carried in its own payload so that systems not participating in authentication MAY simply ignore the Authentication Data, preserving backward compatibility without requiring changes to the broader Internet infrastructure.
section: "1.1"
topics:
