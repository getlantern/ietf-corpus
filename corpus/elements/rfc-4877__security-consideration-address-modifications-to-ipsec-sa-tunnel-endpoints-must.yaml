document: rfc-4877
kind: security-consideration
summary: Address modifications to IPsec SA tunnel endpoints MUST only be performed based on Binding Updates received and protected by IPsec. Modifications based on other sources (e.g., unprotected BUs to correspondent nodes, or open API access) may introduce security vulnerabilities.
section: "4.3"
topics:
    - ipsec
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
