document: rfc-3412
kind: wire-format
summary: 'The msgFlags field is a single octet with three defined bits: bit 0 (authFlag), bit 1 (privFlag), and bit 2 (reportableFlag). The combination authFlag=0, privFlag=1 is reserved and MUST NOT be used. All other bits are reserved and MUST be zero on send.'
section: "6.4"
topics:
