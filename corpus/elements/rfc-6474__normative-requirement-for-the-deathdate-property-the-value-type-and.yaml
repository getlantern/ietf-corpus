document: rfc-6474
kind: normative-requirement
summary: For the DEATHDATE property, the value type and VALUE parameter MUST match. Additionally, CALSCALE can only be present when DEATHDATE-value is date-and-or-time and actually contains a date or date-time.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
