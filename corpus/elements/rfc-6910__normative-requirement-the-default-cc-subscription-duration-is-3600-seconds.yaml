document: rfc-6910
kind: normative-requirement
summary: The default CC subscription duration is 3600 seconds (equivalent to the SS7 service duration timer maximum from ETSI/ITU-T). It is RECOMMENDED that subscribers request and notifiers grant a subscription time of at least 3600 seconds.
section: "9.4"
rfc2119_level: RECOMMENDED
