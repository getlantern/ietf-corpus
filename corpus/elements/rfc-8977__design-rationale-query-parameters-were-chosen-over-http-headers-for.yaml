document: rfc-8977
kind: design-rationale
summary: Query parameters were chosen over HTTP headers for sorting and paging because headers cannot be set directly from a web browser, conflate session state with resource identification, and require clients to have prior knowledge of the server implementation—a recognized REST anti-pattern.
