document: rfc-7428
kind: wire-format
summary: When a 16-bit address is required for header compression, it MUST be formed by prepending a 1-byte Interface label to the 1-byte G.9959 NodeID. If Interface is zero (default), all corresponding IPv6 address bytes may be elided.
section: "5"
topics:
