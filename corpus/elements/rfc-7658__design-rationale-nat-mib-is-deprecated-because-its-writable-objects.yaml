document: rfc-7658
kind: design-rationale
summary: 'NAT-MIB is deprecated because its writable objects caused incompatibility: NAT algorithms and data structures vary so widely across implementations that few could claim full compliance with the write-capable configuration objects. The lesson learned is that the MIB should be read-only as much as possible.'
section: "3.1"
topics:
    - nat
    - snmp
    - yang
