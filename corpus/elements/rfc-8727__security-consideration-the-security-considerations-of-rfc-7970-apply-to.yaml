document: rfc-8727
kind: security-consideration
summary: The security considerations of RFC 7970 apply to this JSON/CBOR binding. Implementers must consider risks inherent in JSON and CBOR parsing, including parser differentials, deeply nested structures, and integer overflow for values outside the ±2^53 range representable in JSON numbers.
section: "8"
topics:
    - security
    - json
    - cbor
