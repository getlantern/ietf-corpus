document: rfc-3460
kind: normative-requirement
summary: If a parent rule's condition evaluates to TRUE, the set of sub-rules SHALL BE evaluated according to the decision strategy and priorities defined in Section 5.5. The parent rule's actions are executed before those of sub-rules.
section: 5.4.1
