document: rfc-5491
kind: protocol-element
summary: The Circle shape represents a 2D uncertainty area using gs:Circle with a gml:pos center point and a gs:radius in meters (EPSG 9001); it MUST use a 2D CRS. For 3D uncertainty, the Sphere shape type should be used instead.
section: 5.2.3
