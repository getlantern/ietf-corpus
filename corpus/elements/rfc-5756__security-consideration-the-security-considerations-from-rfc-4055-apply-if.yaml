document: rfc-5756
kind: security-consideration
summary: The security considerations from RFC 4055 apply. If RSAES-OAEP-params are negotiated, the negotiation mechanism must provide integrity for those parameters; for example, an S/MIME agent can advertise capabilities via the SMIMECapabilities attribute as a signed attribute or certificate extension.
