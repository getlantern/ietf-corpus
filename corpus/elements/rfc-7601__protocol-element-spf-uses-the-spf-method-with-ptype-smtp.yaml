document: rfc-7601
kind: protocol-element
summary: 'SPF uses the ''spf'' method with ptype ''smtp'' and property ''mailfrom'' or ''helo''. Sender ID uses ''sender-id'' with ptype ''header'' and property being the header field name from which the Purported Responsible Address was extracted. Both share result codes: none, pass, fail, softfail, policy, neutral, temperror, permerror.'
section: 2.7.2
