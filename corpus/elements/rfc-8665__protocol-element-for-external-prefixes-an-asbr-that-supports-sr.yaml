document: rfc-8665
kind: protocol-element
summary: For external prefixes, an ASBR that supports SR SHOULD originate an AS-wide OSPF Extended Prefix Opaque LSA alongside its Type-5 LSA. When an NSSA ABR translates Type-7 to Type-5 LSAs, it SHOULD also carry the Prefix-SID from the Type-7 advertising router.
section: "7.3"
topics:
    - routing
    - mpls
