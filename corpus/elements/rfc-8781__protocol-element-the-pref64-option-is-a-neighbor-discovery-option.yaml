document: rfc-8781
kind: protocol-element
summary: The PREF64 option is a Neighbor Discovery option carried in Router Advertisements to communicate NAT64 prefixes to hosts. It consists of a Type (8-bit, value 38), Length (8-bit), Scaled Lifetime (13-bit), Prefix Length Code (3-bit), and the highest 96 bits of the NAT64 prefix.
