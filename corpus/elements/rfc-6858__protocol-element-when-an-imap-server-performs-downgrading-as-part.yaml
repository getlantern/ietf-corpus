document: rfc-6858
kind: protocol-element
summary: 'When an IMAP server performs downgrading as part of generating FETCH responses, it MUST report which messages were synthesized using the DOWNGRADED response code with an attendant UID set. Example: ''a OK [DOWNGRADED 70,105,108,109] Done''. The message-set argument contains UIDs of downgraded messages.'
section: "3"
topics:
