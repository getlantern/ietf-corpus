document: rfc-7095
kind: normative-requirement
summary: When converting jCard to vCard, the VALUE parameter MUST be added to properties whose default value type is unknown but which do not have jCard type identifier "unknown". The VALUE parameter MUST be omitted for properties with jCard type "unknown".
section: "4"
rfc2119_level: MUST
topics:
