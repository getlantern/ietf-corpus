kind: protocol-element
summary: 'Two opcodes are defined: ares_op$REQUEST (= 1, high byte transmitted first) sent as a broadcast to solicit a hardware address, and ares_op$REPLY (= 2) sent unicast back to the requester. The opcode is a 16-bit field (ar$op) in the ARP payload.'
