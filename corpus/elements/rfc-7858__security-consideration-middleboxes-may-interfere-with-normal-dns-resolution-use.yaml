document: rfc-7858
kind: security-consideration
summary: Middleboxes may interfere with normal DNS resolution; use of a designated port (853) for DNS over TLS should reduce such interference. Clients that attempt TLS and fail may fall back to unencrypted DNS or wait and retry, depending on their privacy profile.
section: "8"
topics:
    - dns
    - tls
    - security
