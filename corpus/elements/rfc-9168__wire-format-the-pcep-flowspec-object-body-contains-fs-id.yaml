summary: 'The PCEP FLOWSPEC object body contains: FS-ID (32-bit unique session-scoped identifier, values 0 and 0xFFFFFFFF reserved), AFI (16-bit Address Family Identifier per RFC 4760), Reserved (8 bits, zero), Flags (8 bits including L bit for LPM and R bit for Remove), followed by TLVs.'
