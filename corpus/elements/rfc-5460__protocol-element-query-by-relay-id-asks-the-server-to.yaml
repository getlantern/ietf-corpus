document: rfc-5460
kind: protocol-element
summary: QUERY_BY_RELAY_ID asks the server to return bindings associated with a relay identified by a DUID in a Relay-ID option. If link-address is 0::0, all bindings for that relay are returned; if link-address is specified, only bindings on that link are returned.
section: 5.3.1
topics:
    - dns
