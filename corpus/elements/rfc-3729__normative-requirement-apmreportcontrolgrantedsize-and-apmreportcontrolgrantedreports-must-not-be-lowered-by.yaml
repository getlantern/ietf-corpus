document: rfc-3729
kind: normative-requirement
summary: apmReportControlGrantedSize and apmReportControlGrantedReports must not be lowered by the agent except as a result of a SET to the corresponding Requested objects. The agent must maintain sufficient storage to satisfy the full report size for all reports at all times.
