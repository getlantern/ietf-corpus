document: rfc-9834
kind: normative-requirement
summary: A Child AC MAY rely upon more than one Parent AC; however, in such cases these parent ACs MUST NOT be overlapping. An example use case is a Child AC with separate L2 and L3 parent ACs.
section: 5.2.5
rfc2119_level: MUST NOT
