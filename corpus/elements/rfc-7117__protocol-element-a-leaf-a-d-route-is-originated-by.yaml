document: rfc-7117
kind: protocol-element
summary: A Leaf A-D route is originated by an egress PE in response to receiving an S-PMSI A-D route with the Leaf Information Required flag set to 1. It carries a PMSI Tunnel attribute with Tunnel Type set to Ingress Replication and a downstream-assigned MPLS label used to demultiplex VPLS traffic received over the unicast tunnel.
section: "8.3"
topics:
    - mpls
    - multicast
    - routing
