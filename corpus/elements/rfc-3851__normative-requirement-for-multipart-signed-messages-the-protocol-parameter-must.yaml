document: rfc-3851
kind: normative-requirement
summary: For multipart/signed messages, the protocol parameter MUST be "application/pkcs7-signature" (quotation marks required because '/' in the parameter value MUST be quoted per MIME). The micalg parameter MUST list multiple digest algorithms separated by commas if applicable.
section: 3.4.3.2
rfc2119_level: MUST
