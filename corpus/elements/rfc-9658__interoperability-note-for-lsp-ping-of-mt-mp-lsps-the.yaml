document: rfc-9658
kind: interoperability-note
summary: For LSP ping of MT MP LSPs, the rules and procedures for using the new sub-TLV in MPLS Echo Request messages are the same as defined for P2MP/MP2MP LDP FEC Stack sub-TLVs in RFC 6425; the only difference is that the Root LSR Address field is now sub-topology scoped.
section: "7"
topics:
