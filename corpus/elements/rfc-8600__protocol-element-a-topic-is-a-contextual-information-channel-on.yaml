document: rfc-8600
kind: protocol-element
summary: A Topic is a contextual information channel on a Broker, limited to a specific type and format of security data (e.g., IODEF namespace). Providers publish to Topics; Consumers subscribe and receive real-time updates. Topics map to XMPP publish-subscribe Nodes (XEP-0060).
