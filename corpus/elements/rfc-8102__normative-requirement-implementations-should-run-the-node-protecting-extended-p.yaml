summary: Implementations SHOULD run the node-protecting extended P-space inequality (D_opt(Ni,Y) < D_opt(Ni,E) + D_opt(E,Y)) for all direct neighbors other than primary next-hop E to determine whether a node Y is a candidate node-protecting PQ-node.
