kind: protocol-element
summary: 'Five compliance levels are defined: dlswCoreCompliance (minimum for all implementations), dlswTConnTCPCompliance (TCP transport support), dlswDirCompliance (directory function), dlswDirLocateCompliance (directory with ordered retrieval), and dlswSdlcCompliance (SDLC end-station support). NetBIOS-related objects are grouped separately in each because DLSw Version 1 does not require NetBIOS support.'
