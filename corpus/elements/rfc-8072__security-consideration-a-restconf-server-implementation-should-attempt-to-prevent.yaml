document: rfc-8072
kind: security-consideration
summary: A RESTCONF server implementation SHOULD attempt to prevent system disruption due to excessive resource consumption required to fulfill YANG Patch edit requests, as an attacker may construct a patch designed to exhaust available memory or other resources.
section: "5"
rfc2119_level: SHOULD
