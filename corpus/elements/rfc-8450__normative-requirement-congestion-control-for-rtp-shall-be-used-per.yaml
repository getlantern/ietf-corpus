document: rfc-8450
kind: normative-requirement
summary: Congestion control for RTP SHALL be used per RFC 3550. When best-effort service is used, senders MUST monitor packet loss to ensure it remains within acceptable parameters. Applications MUST comply with RTP Circuit Breakers (RFC 8083).
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
