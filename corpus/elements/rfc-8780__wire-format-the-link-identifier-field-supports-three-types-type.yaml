document: rfc-8780
kind: wire-format
summary: 'The Link Identifier field supports three types: Type 1 (IPv4, 4-byte address), Type 2 (IPv6, 16-byte address), and Type 3 (Unnumbered IF ID: 4-byte TE Node ID + 4-byte Interface ID). Each type is preceded by an 8-bit Type field and 24 reserved bits. All link identifiers in the same list MUST be of the same type.'
section: 4.3.1
topics:
    - routing
    - ip
