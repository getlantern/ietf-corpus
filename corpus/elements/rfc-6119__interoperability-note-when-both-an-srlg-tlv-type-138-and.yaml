document: rfc-6119
kind: interoperability-note
summary: When both an SRLG TLV (type 138) and an IPv6 SRLG TLV (type 139) are received describing SRLGs for the same link, the receiver MUST apply type 138 and ignore type 139, ensuring consistent behavior across mixed IPv4/IPv6 deployments.
section: "4.4"
topics:
    - routing
    - ip
    - v6ops
