document: rfc-1035
kind: protocol-element
summary: 'The IN-ADDR.ARPA domain provides reverse DNS: an IPv4 address is written in reversed-octet label form (e.g., 10.2.0.52 → 52.0.2.10.IN-ADDR.ARPA) with PTR records pointing to canonical host names. Network-level nodes carry PTR records for gateway discovery.'
section: "3.5"
topics:
