document: rfc-9240
kind: design-rationale
summary: Resource-specific entity domain names (e.g., 'netmap1.pid') were introduced because the same PID name (e.g., 'mypid10') can be defined in multiple network maps with different address sets. Using just 'pid:mypid10' without a resource scope loses information about the originating information resource, causing ambiguity that this naming scheme resolves.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
