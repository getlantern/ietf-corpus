document: rfc-3107
kind: wire-format
summary: 'The labeled NLRI is encoded as one or more triples of the form <length, label, prefix>: Length (1 octet) gives the bit length of the prefix plus label(s); Label (3 octets per label, high-order 20 bits = label value, low-order bit = Bottom of Stack); Prefix (variable, padded to octet boundary).'
