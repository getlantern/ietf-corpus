document: rfc-5537
kind: normative-requirement
summary: An injecting agent MUST NOT alter the body of an article in any way (including Content-Transfer-Encoding changes), MUST NOT alter or delete any existing Message-ID header field, and SHOULD NOT alter, delete, or reorder any existing header fields except Path.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
