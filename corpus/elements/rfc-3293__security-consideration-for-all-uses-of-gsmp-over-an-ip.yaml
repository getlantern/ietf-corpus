document: rfc-3293
kind: security-consideration
summary: For all uses of GSMP over an IP network, GSMP MUST be run over TCP/IP with IPsec ESP providing integrity and confidentiality. For ATM and Ethernet encapsulations, security MAY be provided at the link layer, but for secure operation over any media, the IP encapsulation with IPsec SHOULD be used.
section: "5"
topics:
    - security
    - ipsec
