document: rfc-9885
kind: security-consideration
summary: This document creates no new security issues for IS-IS. Additional instances of existing TLVs expose no new information. Support for MP-TLV may result in implementations being more robust in handling unexpected occurrences of MP-TLV. Existing IS-IS security is addressed in ISO 10589, RFC 5304, and RFC 5310.
section: "10"
topics:
