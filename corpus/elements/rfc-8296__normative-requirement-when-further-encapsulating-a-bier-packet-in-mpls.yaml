document: rfc-8296
kind: normative-requirement
summary: When further encapsulating a BIER packet in MPLS networks, the outer encapsulation's next-protocol codepoint for MPLS MUST be used, specifically the codepoint for 'MPLS with downstream-assigned label' (e.g., Ethertype 0x8847 for Ethernet).
section: 2.1.3
rfc2119_level: MUST
topics:
    - mpls
    - multicast
