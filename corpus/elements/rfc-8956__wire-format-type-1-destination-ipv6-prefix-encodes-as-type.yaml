document: rfc-8956
kind: wire-format
summary: 'Type 1 (Destination IPv6 Prefix) encodes as: type (1 octet), length (1 octet), offset (1 octet), pattern (variable), padding (variable). The length field indicates the N-th most significant bit where matching stops; offset indicates bits to skip; padding bits MUST be 0 on encoding and MUST be ignored on decoding.'
