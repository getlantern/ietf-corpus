document: rfc-7524
kind: state-machine
summary: For global table multicast, when the first Leaf A-D route for a Route Key is received, the PIM implementation MUST set the upstream (S/RP,G) state machine to Joined state. When the last Leaf A-D route for a Route Key is withdrawn, the PIM implementation MUST set the upstream (S/RP,G) state machine to Prune state.
section: "9"
topics:
