document: rfc-8154
kind: wire-format
summary: The pnfs_scsi_extent4 structure contains se_vol_id (deviceid4), se_file_offset (offset4), se_length (length4), se_storage_offset (offset4), and se_state (pnfs_scsi_extent_state4). The pnfs_scsi_layout4 wraps a variable-length array of these extents as the loc_body for SCSI layouts.
