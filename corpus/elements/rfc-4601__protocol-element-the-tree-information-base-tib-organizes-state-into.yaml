document: rfc-4601
kind: protocol-element
summary: 'The Tree Information Base (TIB) organizes state into four categories: (*,*,RP) state for per-RP all-groups trees, (*,G) state for the shared RP tree, (S,G) state for source-specific trees, and (S,G,rpt) state recording source-specific prune information on the RP tree. Implementations typically translate TIB state into an efficient MFIB for actual forwarding.'
section: "4.1"
topics:
    - multicast
    - routing
