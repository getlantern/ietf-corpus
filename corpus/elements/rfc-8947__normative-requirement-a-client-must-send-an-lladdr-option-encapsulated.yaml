document: rfc-8947
kind: normative-requirement
summary: A client MUST send an LLADDR option encapsulated in an IA_LL option, specifying link-layer-type and link-layer-len. For link-layer types 1 (Ethernet) and 6 (IEEE 802), the client sets link-layer-address to all zeroes if it has no hint, or to a specific address to request a particular block.
section: "7"
rfc2119_level: MUST
topics:
    - ip
