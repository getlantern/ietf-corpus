document: rfc-1229
kind: design-rationale
summary: Rather than defining generic-but-reusable objects redundantly inside each interface-type-specific MIB, this document consolidates them as extensions to the generic interface group (MIB-II). This avoids duplication across media-specific MIB efforts (e.g., IEEE 802.5 Token Ring).
