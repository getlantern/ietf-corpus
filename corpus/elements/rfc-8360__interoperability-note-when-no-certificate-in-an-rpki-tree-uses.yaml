document: rfc-8360
kind: interoperability-note
summary: When no certificate in an RPKI tree uses the new OIDs, the amended validation algorithm produces identical outcomes to RFC 6487 validation. The two algorithms diverge only when a certificate bearing the new Certificate Policy OID is encountered.
