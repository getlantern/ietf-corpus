document: rfc-6478
kind: normative-requirement
summary: If a T-PE receives an LDP label mapping message with the B bit set in the Generic Protocol Flags TLV, it MAY send S-PE bypass status messages. If bit B is not set or the TLV is absent, the T-PE MUST NOT send S-PE bypass status messages.
section: 5.5.1
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
