document: rfc-4650
kind: security-consideration
summary: 'MIKEY-DHHMAC does not provide identity protection; identities are transmitted in cleartext. This is an explicit design trade-off: no known protocol can achieve PFS, one-roundtrip completion, and no-PKI while also providing identity protection. Identity protection may be inherited from a security layer below MIKEY.'
section: "5.2"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
