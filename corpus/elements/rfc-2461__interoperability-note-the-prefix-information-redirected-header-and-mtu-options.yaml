document: rfc-2461
kind: interoperability-note
summary: The Prefix Information, Redirected Header, and MTU options each specify that they MUST be silently ignored when appearing in ND messages other than their designated message type (RA for Prefix Information and MTU; Redirect for Redirected Header). This allows future option reuse across message types without breaking existing implementations.
section: 4.6.2
topics:
    - ip
    - v6ops
