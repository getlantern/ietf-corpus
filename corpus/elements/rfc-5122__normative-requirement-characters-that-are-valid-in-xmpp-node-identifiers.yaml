document: rfc-5122
kind: normative-requirement
summary: Characters that are valid in XMPP node identifiers but not in IRI userinfo ([ \ ] ^ ` { | }) and characters valid in XMPP resource identifiers but not in IRI pchar (" < > [ \ ] ^ ` { | }) MUST be percent-encoded when transforming an XMPP address into an XMPP IRI or URI.
section: "2.2"
rfc2119_level: MUST
topics:
    - realtime
