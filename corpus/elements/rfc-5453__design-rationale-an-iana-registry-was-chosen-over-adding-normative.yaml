document: rfc-5453
kind: design-rationale
summary: An IANA registry was chosen over adding normative references to each specification that reserves an IID because the normative reference approach does not scale well (too many specs to update) and would create downward reference problems when a reserving document has lower maturity than a prohibited document.
section: "2.1"
