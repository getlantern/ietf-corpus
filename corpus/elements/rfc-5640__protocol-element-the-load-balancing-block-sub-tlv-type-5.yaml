document: rfc-5640
kind: protocol-element
summary: The Load-Balancing Block sub-TLV (type 5) is a new sub-TLV for the BGP Tunnel Encapsulation Attribute (RFC 5512). Its length is 2 octets, and its value represents the size of the load-balancing block in bits, following a VLSM-like model where the block is extracted from the leading bits of the load-balancing field.
section: "2"
