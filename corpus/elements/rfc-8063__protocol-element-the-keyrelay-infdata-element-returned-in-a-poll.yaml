kind: protocol-element
summary: 'The <keyrelay:infData> element returned in a poll response contains: REQUIRED <name> (domain name), REQUIRED <authInfo> (domain auth info), one or more REQUIRED <keyRelayData> elements, and OPTIONAL <crDate>, <reID> (requesting client ID), and <acID> (acting client ID) elements.'
