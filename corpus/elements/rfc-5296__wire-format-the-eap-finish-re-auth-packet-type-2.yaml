document: rfc-5296
kind: wire-format
summary: 'The EAP-Finish/Re-auth packet (Type=2) mirrors the Initiate/Re-auth format: 1-octet flags (R=result, B=bootstrap, L=lifetime present), 16-bit SEQ, TV/TLV attributes (keyName-NAI, optionally rRK Lifetime Type=2 as 32-bit seconds, rMSK Lifetime Type=3 as 32-bit seconds, Domain-Name Type=4, cryptosuite list Type=5, Authorization Indication Type=6), 1-octet cryptosuite, and Authentication Tag.'
section: 5.3.3
topics:
