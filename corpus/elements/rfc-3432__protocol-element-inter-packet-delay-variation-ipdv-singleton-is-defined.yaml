document: rfc-3432
kind: protocol-element
summary: Inter-Packet Delay Variation (IPDV) singleton is defined as IPDV[i] = Delay[i] - Delay[i-1] for each packet except the first; it may be negative, zero, or positive. An example sample metric is RangeIPDV = max(IPDV[]) - min(IPDV[]).
section: 4.2.4
topics:
    - measurement
    - realtime
