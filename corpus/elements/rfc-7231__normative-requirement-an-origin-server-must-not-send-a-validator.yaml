document: rfc-7231
kind: normative-requirement
summary: An origin server MUST NOT send a validator header field (ETag, Last-Modified) in a successful response to PUT unless the representation data was saved without any transformation applied to the body and the validator reflects the new representation.
section: 4.3.4
rfc2119_level: MUST NOT
topics:
    - http
