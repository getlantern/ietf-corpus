document: rfc-5090
kind: protocol-element
summary: Digest-HA1 (type 121) carries the hexadecimal H(A1) value, enabling the RADIUS client to compute the rspauth value for Authentication-Info when qop is 'auth-int' and the response body is not available to the RADIUS server.
