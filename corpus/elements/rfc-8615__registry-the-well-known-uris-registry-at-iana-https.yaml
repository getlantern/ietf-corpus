document: rfc-8615
kind: registry
summary: The 'Well-Known URIs' registry at IANA (<https://www.iana.org/assignments/well-known-uris/>) tracks registered well-known URI suffixes. Registration requires Specification Required review. This document updates the procedure from RFC 5785 and adds a 'Status' column (permanent/provisional) to all entries.
section: "5.1"
topics:
