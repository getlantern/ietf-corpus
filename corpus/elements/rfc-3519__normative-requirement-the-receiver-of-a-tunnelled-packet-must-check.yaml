document: rfc-3519
kind: normative-requirement
summary: The receiver of a tunnelled packet MUST check that the Next Header value in the MIP Tunnel Data Message matches the tunnelling mode established for the mobility binding; if a discrepancy is detected, the packet MUST be dropped.
section: "3.3"
rfc2119_level: MUST
topics:
    - nat
    - mobility
