document: rfc-1425
kind: wire-format
summary: Extended MAIL FROM and RCPT TO commands accept esmtp-parameters of the form 'esmtp-keyword [= esmtp-value]' appended after a SP. The esmtp-keyword is (ALPHA/DIGIT)(ALPHA/DIGIT/'-')*; the esmtp-value excludes '=', SP, and control characters (US ASCII 0-31).
section: "6"
