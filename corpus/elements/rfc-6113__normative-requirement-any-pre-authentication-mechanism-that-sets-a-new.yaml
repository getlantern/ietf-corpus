document: rfc-6113
kind: normative-requirement
summary: Any pre-authentication mechanism that sets a new reply key not based on the principal's long-term secret MUST either verify the KDC reply some other way or indicate the reply is not verified. If a mechanism indicates the reply is not verified, the client MUST return an error unless a subsequent mechanism verifies it.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
