document: rfc-6051
kind: normative-requirement
summary: An NTP-format timestamp included in an RTP packet via header extension MUST correspond to the same time instant as the RTP timestamp in the packet header, and MUST be derived from the same clock used to generate the NTP-format timestamps in RTCP SR packets.
section: "3.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
