document: rfc-9502
kind: normative-requirement
summary: Forwarding entries for IP Flex-Algorithm prefixes MUST be installed in the forwarding plane of routers that participate in the associated topology and algorithm. Forwarding entries for IP Flex-Algorithm prefixes associated with Flex-Algorithms in which the node is not participating MUST NOT be installed.
section: "8"
rfc2119_level: MUST
topics:
    - routing
    - ip
