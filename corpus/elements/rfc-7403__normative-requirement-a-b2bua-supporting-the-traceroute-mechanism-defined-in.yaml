document: rfc-7403
kind: normative-requirement
summary: A B2BUA supporting the traceroute mechanism defined in this document MUST also comply with RFC 7332, which requires B2BUAs to inspect the Max-Forwards value to prevent loops and to copy and decrement it as if acting as a proxy.
section: "3.1"
rfc2119_level: MUST
topics:
