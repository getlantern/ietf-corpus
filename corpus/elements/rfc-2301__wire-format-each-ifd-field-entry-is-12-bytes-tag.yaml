document: rfc-2301
kind: wire-format
summary: 'Each IFD field entry is 12 bytes: Tag (2 bytes), field type (2 bytes: SHORT, LONG, RATIONAL, ASCII, etc.), count of values (4 bytes), and value or file offset (4 bytes). IFD entries are sorted in ascending tag order; the IFD is preceded by a 2-byte field count and followed by a 4-byte next-IFD offset.'
section: 2.1.1
