kind: protocol-element
summary: 'The SACK-based algorithm maintains six sender variables: HighACK (highest cumulatively ACKed byte), HighData (highest transmitted sequence number), HighRxt (highest retransmitted sequence number during current recovery), RescueRxt (highest optimistically retransmitted sequence number), Pipe (estimated bytes outstanding in network), and DupAcks (duplicate acknowledgments since last cumulative ACK).'
