document: rfc-9391
kind: protocol-element
summary: SCHC over Non-IP Data Delivery (NIDD) places SCHC compression entities at the application layer of the Dev-UE and Application Server (or broker at the operator edge); the network treats compressed packets as Non-IP traffic and delivers them directly over L2 without protocol stack intervention.
section: 5.1.1
topics:
    - ip
