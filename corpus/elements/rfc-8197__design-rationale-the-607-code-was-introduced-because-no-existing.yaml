document: rfc-8197
kind: design-rationale
summary: The 607 code was introduced because no existing 4xx, 5xx, or 6xx response codes signify that a SIP request is unwanted by the called party. The 603 (Decline) code indicates the called party's temporary status, not the caller's identity as the reason for rejection.
