document: rfc-1442
kind: normative-requirement
summary: When extending an information module, if any non-editorial change is made to an object assignment or object definition beyond the explicitly permitted revisions (adding enumerations, deprecating status, adding DEFVAL/REFERENCE/UNITS, augmenting rows), then the OBJECT IDENTIFIER value and descriptor must also be changed.
section: "10.2"
rfc2119_level: MUST
topics:
