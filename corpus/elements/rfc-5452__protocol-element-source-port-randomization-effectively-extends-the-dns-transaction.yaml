document: rfc-5452
kind: protocol-element
summary: Source port randomization effectively extends the DNS transaction ID space. With ports in the range 1024–49152 available (approximately 64512 options), an attacker must on average try around 32256 source ports before matching the original query's source port, multiplying the effective problem space by up to 64000.
section: "4.5"
topics:
    - dns
    - security
