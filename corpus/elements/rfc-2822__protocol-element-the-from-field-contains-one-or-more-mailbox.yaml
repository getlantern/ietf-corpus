document: rfc-2822
kind: protocol-element
summary: The 'From:' field contains one or more mailbox specifications. If 'From:' contains more than one mailbox, a 'Sender:' field containing a single mailbox MUST appear. An optional 'Reply-To:' field may indicate preferred reply addresses.
section: 3.6.2
topics:
