document: rfc-7900
kind: normative-requirement
summary: A given VRF containing extranet C-sources or C-receivers MUST use only one extranet transmission model, and a source VRF and a receiver VRF that exchange C-flows MUST use the same model. The model is determined by provisioning.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
