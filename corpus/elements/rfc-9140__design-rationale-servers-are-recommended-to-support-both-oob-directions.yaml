document: rfc-9140
kind: design-rationale
summary: Servers are RECOMMENDED to support both OOB directions (Dirs=3) for maximum flexibility, but peers are RECOMMENDED to select only one direction (Dirp=1 or 2) even when both are technically possible. Selecting both would present users with two OOB messages when only one needs to be delivered, causing confusion; the protocol resolves simultaneous delivery by prioritizing the server-to-peer direction.
section: 3.3.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
