document: rfc-4804
kind: normative-requirement
summary: If sufficient bandwidth is available on the final TE tunnel, the Aggregator MUST update its internal accounting of TE tunnel usage and MUST forward the E2E Resv to the corresponding PHOP; if insufficient, it MUST send a ResvError back toward the receiver.
section: "4.6"
rfc2119_level: MUST
topics:
