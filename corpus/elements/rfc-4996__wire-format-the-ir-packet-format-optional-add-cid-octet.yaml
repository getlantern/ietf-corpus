document: rfc-4996
kind: wire-format
summary: 'The IR packet format: optional Add-CID octet, IR type octet (11111101), 0-2 CID octets, 1-octet Profile=0x06, 1-octet CRC-8 over entire IR header, variable-length static chain, variable-length dynamic chain, and payload. The x bit in the IR type octet MUST be set to one for IR (and zero for IR-CR).'
