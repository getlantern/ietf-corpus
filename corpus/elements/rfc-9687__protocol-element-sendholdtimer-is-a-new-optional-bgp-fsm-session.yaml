document: rfc-9687
kind: protocol-element
summary: SendHoldTimer is a new optional BGP FSM session attribute (attribute 14) that tracks how long a speaker may remain in the Established state without successfully sending any BGP message to its peer. SendHoldTime (attribute 15) stores the configured initial value for this timer and may be set independently per peer.
section: "4.1"
topics:
    - bgp
    - routing
