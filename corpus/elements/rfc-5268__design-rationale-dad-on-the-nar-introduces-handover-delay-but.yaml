document: rfc-5268
kind: design-rationale
summary: 'DAD on the NAR introduces handover delay, but the protocol preserves correctness: the NAR SHOULD perform a DAD probe before proxying the NCoA unless DupAddrDetectTransmits is set to zero. This setting is appropriate only where address collision probability is negligible, balancing latency against uniqueness guarantees.'
