document: rfc-1989
kind: protocol-element
summary: InGoodOctets is a 32-bit counter that counts octets in each successfully received Data Link Layer packet. Unlike ifInOctets, octets for frames counted in ifInDiscards and ifInErrors MUST NOT be counted; this counter MAY be set to any initial value at LCP Establishment.
section: "2.2"
rfc2119_level: MUST NOT
topics:
