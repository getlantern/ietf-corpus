document: rfc-9145
kind: normative-requirement
summary: Classifiers, NSH-aware SFs, and SFC proxies MUST implement the AES_128_GCM authenticated encryption algorithm and SHOULD implement AES_192_GCM and AES_256_GCM. They MUST implement HMAC-SHA-256-128 and SHOULD implement HMAC-SHA-384-192 and HMAC-SHA-512-256. SFFs MAY implement these algorithms.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
