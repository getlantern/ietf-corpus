document: rfc-3949
kind: normative-requirement
summary: When an attribute value appears in both the compressed data stream and a TIFF field, the data stream value takes precedence for values required to interpret the stream; the TIFF field value takes precedence for informational values not needed to interpret the stream.
section: 2.1.2
rfc2119_level: REQUIRED
