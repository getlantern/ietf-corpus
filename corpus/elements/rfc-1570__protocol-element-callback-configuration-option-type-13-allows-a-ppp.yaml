document: rfc-1570
kind: protocol-element
summary: Callback (Configuration Option Type 13) allows a PPP implementation to request a dial-up peer to call back. When successfully negotiated and authentication is complete, the link immediately proceeds to the Termination phase; the peer then re-establishes the link without negotiating Callback.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
