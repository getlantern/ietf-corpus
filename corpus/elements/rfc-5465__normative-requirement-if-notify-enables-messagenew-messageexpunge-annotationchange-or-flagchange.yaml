document: rfc-5465
kind: normative-requirement
summary: If NOTIFY enables MessageNew, MessageExpunge, AnnotationChange, or FlagChange for a non-selected mailbox and the client specified the STATUS indicator, the server MUST send a STATUS response for that mailbox before NOTIFY's tagged OK. If MessageNew is enabled, STATUS MUST contain MESSAGES, UIDNEXT, and UIDVALIDITY.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
