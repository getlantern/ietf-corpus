document: rfc-6698
kind: protocol-element
summary: 'TLSA records are stored at a prefixed DNS domain name constructed as: _port._transport.base-domain (e.g., _443._tcp.www.example.com). Valid transport labels are ''tcp'', ''udp'', and ''sctp''. Internationalized domain names MUST use A-label form.'
