document: rfc-2390
kind: normative-requirement
summary: For every InARP request received, the receiving station should format a proper response using the source addresses from the request as the target addresses of the response. If the station is unable or unwilling to reply, it ignores the request.
section: "7"
rfc2119_level: SHOULD
topics:
