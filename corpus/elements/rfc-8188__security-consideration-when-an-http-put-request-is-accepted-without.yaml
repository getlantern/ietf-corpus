document: rfc-8188
kind: security-consideration
summary: When an HTTP PUT request is accepted without decrypting the payload, an unauthenticated third party can poison the stored content or deny service. HTTP authentication (RFC 7235) must be applied independently of this content coding.
section: "4.7"
topics:
