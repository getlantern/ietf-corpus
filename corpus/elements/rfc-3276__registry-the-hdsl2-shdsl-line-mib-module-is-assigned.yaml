summary: The HDSL2-SHDSL-LINE-MIB module is assigned object identifier transmission(48) in the SNMPv2-SMI MIB module. IANA allocated this OID for the MODULE-IDENTITY. Additionally, IANA assigned ifType values hdsl2(168) and shdsl(169) to represent the two interface types.
