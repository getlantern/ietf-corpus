document: rfc-7675
kind: interoperability-note
summary: Although TCP has its own consent mechanism (TCP acknowledgements), consent checks are still necessary over TCP connections because they could be translated to UDP connections (e.g., via TURN TCP allocations per RFC 6062).
section: "5.1"
