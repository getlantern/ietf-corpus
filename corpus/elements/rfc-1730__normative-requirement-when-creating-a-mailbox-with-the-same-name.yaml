document: rfc-1730
kind: normative-requirement
summary: When creating a mailbox with the same name as a previously deleted mailbox, the new mailbox's unique identifiers MUST be greater than any used in the previous incarnation, unless the new incarnation has a different UIDVALIDITY value.
section: 6.3.3
rfc2119_level: MUST
topics:
    - email
