document: rfc-4941
kind: protocol-element
summary: A temporary address is formed by appending the interface's current randomized interface identifier to a globally scoped prefix received in a Router Advertisement Prefix Information option (A bit set). Its Valid Lifetime is min(public address Valid Lifetime, TEMP_VALID_LIFETIME) and its Preferred Lifetime is min(public address Preferred Lifetime, TEMP_PREFERRED_LIFETIME - DESYNC_FACTOR).
section: "3.3"
topics:
    - ip
    - privacy
    - v6ops
