document: rfc-6454
kind: protocol-element
summary: An origin is either a scheme/host/port triple (for hierarchical URIs with a supported scheme) or a globally unique identifier (for URIs without a server-based naming authority, unsupported schemes, or when the algorithm generates a fresh value). Two origins are the same if and only if they are identical.
