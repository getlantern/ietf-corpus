kind: protocol-element
summary: dsx3Channelization (read-write) indicates whether the DS3/E3 is unchannelized (disabled), channelized into DS1s (enabledDs1), or channelized into DS2s (enabledDs2). Setting this object causes creation or deletion of DS1/DS2 entries in the ifTable.
