document: rfc-6478
kind: wire-format
summary: The PW Generic Protocol Flags sub-TLV (Type 0x18, Length always 4 octets) carries a 16-bit flags field. Bit B (position 31 of the 32-bit word, i.e., bit 0 of the flags) is set to request S-PE bypass mode. All other bits (R bits) are reserved, MUST be zero on transmission, and ignored on reception.
section: 5.5.1
topics:
    - mpls
