document: rfc-8365
kind: normative-requirement
summary: When a remote PE receives the withdrawal of an Ethernet A-D per EVI route (in inter-AS Option B scenarios), it SHOULD remove the withdrawing PE as a next hop for all MAC addresses associated with that <ES, EVI, BD>.
section: 10.2.2
rfc2119_level: SHOULD
topics:
    - routing
    - bgp
