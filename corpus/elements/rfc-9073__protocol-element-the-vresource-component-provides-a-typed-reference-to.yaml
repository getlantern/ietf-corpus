document: rfc-9073
kind: protocol-element
summary: The VRESOURCE component provides a typed reference to a resource (e.g., room, projector, conferencing equipment) used by an event. UID is required; NAME, GEO, RESOURCE-TYPE, and STRUCTURED-DATA are optional. It may appear in VEVENT, VTODO, VJOURNAL, VFREEBUSY, or PARTICIPANT.
section: "7.3"
