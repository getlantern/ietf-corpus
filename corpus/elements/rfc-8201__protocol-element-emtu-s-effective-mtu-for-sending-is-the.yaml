document: rfc-8201
kind: protocol-element
summary: EMTU_S (Effective MTU for sending) is the largest IP packet that can be sent; MMS_S (maximum send transport-message size) is EMTU_S minus the IPv6 header size. When source fragmentation is not desired, EMTU_S is set to PMTU.
section: "5.1"
topics:
    - ip
    - tcp
