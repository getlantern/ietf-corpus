document: rfc-3816
kind: normative-requirement
summary: ROHC-MIB implementations SHOULD store the value of rohcInstanceContextStorageTime persistently. The default value is 360000 centi-seconds (3600 seconds). Changing this value does not affect previously created rohcContextTable entries.
section: "5"
rfc2119_level: SHOULD
