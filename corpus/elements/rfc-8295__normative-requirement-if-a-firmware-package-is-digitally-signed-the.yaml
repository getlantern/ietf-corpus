document: rfc-8295
kind: normative-requirement
summary: If a firmware package is digitally signed, the client MUST reject it if the digital signature does not validate back to an authorized TA. If a firmware receipt or error is digitally signed, the server MUST reject it if the digital signature does not validate back to an authorized TA.
section: 6.1.2
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
