document: rfc-8141
kind: interoperability-note
summary: All URN namespaces and URNs that were valid under RFC 2141 and RFC 3406 remain valid under RFC 8141, even though it may be useful to update namespace definitions to take advantage of new features such as r-components, q-components, and the '/' character in the NSS.
