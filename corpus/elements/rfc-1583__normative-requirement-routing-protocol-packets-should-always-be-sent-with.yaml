document: rfc-1583
kind: normative-requirement
summary: Routing protocol packets should always be sent with the IP TOS field set to 0. If at all possible, routing protocol packets should be given preference over regular IP data traffic both when being sent and received.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
