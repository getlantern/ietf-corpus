document: rfc-5261
kind: protocol-element
summary: 'The <add> element has three attributes: required ''sel'' (xpath-add type XPath selector), optional ''type'' (used only for attributes ''@attr'' or namespaces ''namespace::pref''), and optional ''pos'' (before/after/prepend, used for non-attribute/namespace insertions). Children of <add> are copied into the target document.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
