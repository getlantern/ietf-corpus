document: rfc-6307
kind: normative-requirement
summary: Fragmentation as described in RFC 4623 SHALL NOT be used for an FC PW; therefore the MPLS network MUST be configured with a minimum MTU sufficient to transport the largest encapsulated FC frame (2164 octets without PW and MPLS labels). The MPLS network SHOULD accommodate frames up to 2500 octets for future FC frame size increases.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
