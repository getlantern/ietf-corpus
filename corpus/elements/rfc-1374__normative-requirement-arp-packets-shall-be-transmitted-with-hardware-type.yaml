document: rfc-1374
kind: normative-requirement
summary: ARP packets shall be transmitted with hardware type code ar$hrd=1 (Ethernet) and shall be accepted if received with hardware type codes of either 1 or 6 (IEEE 802 networks).
section: Address Resolution/ARP and RARP Message Format
rfc2119_level: MUST
topics:
    - ip
