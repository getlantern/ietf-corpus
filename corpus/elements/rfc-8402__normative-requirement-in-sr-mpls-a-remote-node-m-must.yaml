document: rfc-8402
kind: normative-requirement
summary: 'In SR-MPLS, a remote node M MUST maintain a FIB entry for each learned Prefix-SID SID-R: Ingress Operation is NEXT if the next-hop is the originator and M is instructed to remove the active segment, otherwise CONTINUE; Egress interface is towards the next-hop along the path computed by the advertised algorithm.'
section: 3.1.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
