document: rfc-8078
kind: security-consideration
summary: A parent SHOULD ensure that when allowing a child to become securely delegated, the CDS/CDNSKEY RRset used to bootstrap security is visible from a geographically and topologically diverse view, and that the zone validates correctly after DS publication.
section: "5"
rfc2119_level: SHOULD
topics:
