document: rfc-9582
kind: protocol-element
summary: A canonical form for ipAddrBlocks is defined so that every set of IP address information has a unique representation. Each ROAIPAddress is mapped to an abstract 4-tuple (afi, addr, plen, mlen) and the set is sorted and deduplicated in ascending order by those four fields in priority order.
section: 4.3.3
topics:
