document: rfc-8551
kind: security-consideration
summary: If a sending agent sends the same message encrypted with both a strong and a weak algorithm (to accommodate different recipients), an attacker monitoring the channel can learn the plaintext by decrypting the weakly encrypted copy and thereby break the strongly encrypted message.
section: 2.7.3
topics:
    - email
    - security
    - crypto
