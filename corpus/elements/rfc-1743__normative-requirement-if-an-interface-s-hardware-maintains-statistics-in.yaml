document: rfc-1743
kind: normative-requirement
summary: If an interface's hardware maintains statistics in 16-bit counters, the agent must read the hardware's counters frequently enough to prevent loss of significance in order to maintain 32-bit counters in software.
section: "4"
rfc2119_level: MUST
