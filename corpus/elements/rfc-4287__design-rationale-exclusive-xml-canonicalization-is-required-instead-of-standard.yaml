document: rfc-4287
kind: design-rationale
summary: Exclusive XML canonicalization is required instead of standard Canonical XML because signed Atom Documents enclosed in other XML documents have their signatures broken by standard canonicalization; exclusive canonicalization avoids this by limiting the canonicalized namespace context.
section: "5.1"
topics:
    - security
    - crypto
