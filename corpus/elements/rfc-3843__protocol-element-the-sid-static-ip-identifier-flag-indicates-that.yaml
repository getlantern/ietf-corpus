document: rfc-3843
kind: protocol-element
summary: The SID (Static IP Identifier) flag indicates that the IPv4 IP-ID field is constant. When context(SID)=1 and RND=0, the IP-ID is compressed away entirely and reconstructed from context. Only IR and IR-DYN packets can update context(SID).
section: "3.3"
topics:
    - ip
