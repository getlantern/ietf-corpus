document: rfc-8849
kind: protocol-element
summary: The CaptureID RTP header extension and RTCP SDES item enable mapping of an MCC's RTP stream SSRC to the captureID of the single original MC currently switched into the MCC. The special value '-' (single-dash) indicates no applicable constituent captureID (e.g., composed multi-MC scenario).
