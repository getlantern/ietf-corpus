document: rfc-2402
kind: design-rationale
summary: The anti-replay sequence number is made an integral, mandatory part of AH (not a transform-defined option as in RFC 1826) to ensure consistent implementation. The default mandatory-to-implement algorithms were changed from keyed MD5 to HMAC-MD5 and HMAC-SHA-1 for security reasons.
section: "7"
topics:
