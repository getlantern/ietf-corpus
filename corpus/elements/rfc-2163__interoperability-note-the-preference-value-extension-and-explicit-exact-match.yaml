document: rfc-2163
kind: interoperability-note
summary: The PREFERENCE value extension and explicit exact-match DNS entries are not available in MIXER static tables. Their use is strongly discouraged when interworking with any table-based gateway or application, and they should be considered reserved for future use in current deployments.
section: "4.1"
