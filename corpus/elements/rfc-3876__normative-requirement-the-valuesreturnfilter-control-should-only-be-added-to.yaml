document: rfc-3876
kind: normative-requirement
summary: The valuesReturnFilter control SHOULD only be added to the Search operation by the client. If the server supports it and it is present on a Search operation, the server MUST obey the control regardless of the criticality flag.
section: "2"
rfc2119_level: MUST
