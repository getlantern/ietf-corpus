document: rfc-8108
kind: normative-requirement
summary: For correct operation with multiple SSRCs, implementations MUST treat each SSRC as a separate participant in the RTP session, so that an endpoint with N SSRCs counts as N participants for RTCP bandwidth and scheduling purposes.
section: "5"
rfc2119_level: MUST
