document: rfc-3828
kind: normative-requirement
summary: The Checksum field MUST include a pseudo-header based on the IP header, irrespective of the Checksum Coverage value. Prior to computation, the checksum field MUST be set to zero. If the computed checksum is 0, it is transmitted as all ones.
section: "3.1"
rfc2119_level: MUST
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
