summary: 'Compact fragment header is 1 byte: bit 7 = R (resume flag, inverted B-bit; R=1 means resuming prior fragments), bits 6-4 = 3-bit sequence number, bits 3-1 = 3-bit class field, bit 0 = always 1 (for HDLC chip compatibility). Data follows immediately.'
