document: rfc-8495
kind: normative-requirement
summary: If an object requires an Allocation Token and the token does not apply to the object, the server SHOULD return the availability status as unavailable (avail=0/false) in response to a <check> command.
section: 3.1.1
rfc2119_level: SHOULD
