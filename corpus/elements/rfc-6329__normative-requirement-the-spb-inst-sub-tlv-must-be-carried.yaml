document: rfc-6329
kind: normative-requirement
summary: The SPB-Inst sub-TLV MUST be carried within the MT-Capability TLV in the fragment ZERO LSP. If there is an additional SPB instance, it MUST be declared under a separate MT-Capability TLV also carried in fragment ZERO LSP.
section: "14.1"
rfc2119_level: MUST
