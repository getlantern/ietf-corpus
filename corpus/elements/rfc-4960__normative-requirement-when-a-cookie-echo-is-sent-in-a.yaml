document: rfc-4960
kind: normative-requirement
summary: When a COOKIE ECHO is sent in a packet it MUST be the first chunk. If an ERROR chunk must accompany the COOKIE ECHO (reporting unrecognized INIT ACK parameters), it SHOULD be bundled in the same packet.
section: 3.2.2
rfc2119_level: MUST
