document: rfc-6426
kind: normative-requirement
summary: At the Requester, when encapsulating an LSP echo request packet using ACH, a GAL MUST be added before adding the MPLS LSP label. The GAL MUST NOT be considered part of the MPLS label stack requiring verification, and a Nil FEC TLV MUST NOT be associated with the GAL.
section: "3.7"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
