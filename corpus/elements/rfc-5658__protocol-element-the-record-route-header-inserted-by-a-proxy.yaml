document: rfc-5658
kind: protocol-element
summary: The Record-Route header inserted by a proxy contains a SIP or SIPS URI indicating where and how subsequent in-dialog requests should be sent to reach the proxy. The URI may include IPv4 or IPv6 addresses and parameters such as 'transport=tcp' or 'comp=sigcomp' that influence downstream routing.
section: "3.2"
topics:
    - sip
    - realtime
