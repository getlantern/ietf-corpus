document: rfc-4972
kind: wire-format
summary: 'The OSPF TE-MESH-GROUP TLV for IPv4 (Type 3) encodes one or more entries each containing: a 32-bit mesh-group-number, a 32-bit tail-end IPv4 address, a 1-octet name-length field, and a variable-length tail-end name. The TLV is padded to 4-octet alignment; padding is not included in the length field.'
section: "4.1"
topics:
    - mpls
    - routing
