document: rfc-6478
kind: normative-requirement
summary: A PE that establishes a PW using LDP MUST use the PW status TLV mechanism and MUST NOT use the static PW OAM status mechanisms for those PWs, except that S-PE bypass mode MAY be used when both T-PEs use LDP.
section: "4"
rfc2119_level: MUST NOT
