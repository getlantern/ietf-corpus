document: rfc-7590
kind: interoperability-note
summary: Server Dialback keys (XEP-0220) can be used together with encrypted but unauthenticated TLS server-to-server connections; Dialback alone provides only weak identity verification, strengthened somewhat by DNSSEC, but at minimum enables encryption of s2s links.
