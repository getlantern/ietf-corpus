document: rfc-3115
kind: normative-requirement
summary: When a transit Mobile IP entity receives a registration reply containing a recognized CVSE with an unknown or unsupported Vendor-ID or Vendor-CVSE-Type, it MUST send a registration reject to the next entity (e.g., FA rejects to MN upon receiving an unknown CVSE from HA).
section: "2.3"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
