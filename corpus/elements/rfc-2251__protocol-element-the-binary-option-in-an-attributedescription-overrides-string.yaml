document: rfc-2251
kind: protocol-element
summary: The 'binary' option in an AttributeDescription overrides string-based encoding and causes the attribute to be transferred as a BER-encoded binary value. If a server cannot generate binary format when requested, it MUST treat the attribute as an unrecognized type; clients MUST NOT expect binary return unless they requested it.
section: 4.1.5.1
topics:
    - ldap
