document: rfc-8550
kind: normative-requirement
summary: If a key usage extension is included in a PKIX certificate, it MUST be marked as critical. S/MIME receiving agents MUST NOT accept the signature of a message if it was verified using a certificate containing a key usage extension without at least one of the digitalSignature or nonRepudiation bits set. If the key usage extension is absent, receiving clients MUST presume both bits are set.
section: 4.4.2
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
