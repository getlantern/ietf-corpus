document: rfc-1122
kind: normative-requirement
summary: A host MUST NOT send a datagram with TTL=0, and MUST NOT discard a received datagram solely because its TTL is less than 2. The IP layer MUST provide a means for the transport layer to set the TTL; when a fixed TTL value is used it MUST be configurable.
section: 3.2.1.7
rfc2119_level: MUST
topics:
    - ip
