document: rfc-2332
kind: design-rationale
summary: NHRP Requests and Replies do not cross the borders of an NBMA subnetwork; internetwork layer traffic out of or into an NBMA subnetwork always traverses an internetwork layer router at its border. Establishing transit paths across NBMA subnetwork borders requires additional loop-avoidance mechanisms addressed in a separate document.
section: "2.2"
topics:
    - ip
    - routing
