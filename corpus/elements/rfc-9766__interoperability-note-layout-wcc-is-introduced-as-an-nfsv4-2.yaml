summary: LAYOUT_WCC is introduced as an NFSv4.2 extension following the RFC 8178 versioning rules; it is built on top of XDR generated from RFC 7863 and depends on types from the nfs4_prot.x file. The XDR snippets must be placed in their respective areas of that file.
