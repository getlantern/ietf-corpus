document: rfc-6389
kind: protocol-element
summary: The Interface ID TLV (RFC 3472) is used for signaling the Tunnel Identifier when LDP is used for upstream label assignment. If Ru uses an IP or MPLS tunnel to transmit MPLS packets with upstream-assigned labels to Rd, Ru MUST include the Interface ID TLV along with the Upstream-Assigned Label TLV in Label Mapping messages.
section: "5"
topics:
