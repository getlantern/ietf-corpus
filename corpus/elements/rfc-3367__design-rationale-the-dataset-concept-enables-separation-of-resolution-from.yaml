document: rfc-3367
kind: design-rationale
summary: The Dataset concept enables separation of resolution from data, allowing one CNRP service to resolve common names on behalf of another service or multiple services, and allowing the same dataset to be served by two distinct CNRP services. Dataset declaration and use are completely optional for protocol compliance.
section: 4.2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
