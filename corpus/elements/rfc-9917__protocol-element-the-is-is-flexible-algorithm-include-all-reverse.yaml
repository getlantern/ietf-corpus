document: rfc-9917
kind: protocol-element
summary: 'The IS-IS Flexible Algorithm Include-All Reverse Admin Group Sub-TLV (Type 12) advertises an include-all rule: during Flex-Algorithm path computation, any link whose reverse direction does not have all Admin Groups in the include-all rule set is pruned. Its format is identical to the FAERAG Sub-TLV.'
