document: rfc-5051
kind: interoperability-note
summary: UTF-8 and US-ASCII are the only mandatory-to-implement charsets for step (1)(a). All other charset support is optional, and strings in unsupported charsets fall through to binary i;octet comparison, which may produce collation results inconsistent with user expectations.
section: "4"
