summary: 'ABNF defines five parameters extending the "tel" URI parameter production: rn (global-rn or local-rn), npdi (flag), cic (global-cic or local-cic), rn-context (;rn-context=rn-descriptor), and cic-context (;cic-context=rn-descriptor). global-rn and global-cic begin with "+" followed by up to 3 DIGIT (E.164 country code) then hex-phonedigits.'
