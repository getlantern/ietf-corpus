document: rfc-6625
kind: normative-requirement
summary: If a PE receives a (C-S,C-*) S-PMSI A-D route and can determine that C-G is not an SSM group address, the PE SHOULD 'ignore' this route. The (C-S,C-*) wildcard is specified only for SSM group addresses.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
