document: rfc-8650
kind: interoperability-note
summary: Subscribers querying event streams should use the 'streams' container of ietf-subscribed-notifications.yang (RFC 8639); support for the 'streams' container of ietf-restconf-monitoring.yang (RFC 8040) is not required, though when supported, event streams therein must also appear in the RFC 8639 container.
section: "3.2"
topics:
