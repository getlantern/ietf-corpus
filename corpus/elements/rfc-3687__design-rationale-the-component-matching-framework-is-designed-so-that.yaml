document: rfc-3687
kind: design-rationale
summary: The component matching framework is designed so that an ASN.1 type definition alone is sufficient to fully specify LDAP encoding (via GSER), binary encoding, an equality matching rule, and all component matching capabilities for a new attribute syntax. This enables automatic code generation from ASN.1 definitions.
