document: rfc-9856
kind: design-rationale
summary: The Warm Standby solution operates entirely on upstream PEs, so downstream PEs that are not connected to redundant G-sources require no upgrades. This makes WS deployment easier in incremental rollout scenarios at the cost of longer failover times.
