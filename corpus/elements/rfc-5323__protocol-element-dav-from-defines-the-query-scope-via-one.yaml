document: rfc-5323
kind: protocol-element
summary: DAV:from defines the query scope via one or more DAV:scope elements, each containing a mandatory DAV:href and DAV:depth ("0", "1", or "infinity"). An optional DAV:include-versions child element extends scope to include all versions of version-controlled resources. Support for multiple scope elements is optional.
section: "5.4"
topics:
    - http
