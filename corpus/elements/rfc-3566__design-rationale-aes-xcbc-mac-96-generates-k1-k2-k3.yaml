document: rfc-3566
kind: design-rationale
summary: AES-XCBC-MAC-96 generates K1, K2, K3 from a single 128-bit key (rather than requiring the caller to supply 384 bits) because this approach is analogous to other authenticators used within IPsec, simplifying key management.
