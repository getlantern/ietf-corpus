document: rfc-9629
kind: normative-requirement
summary: The IKM value produced by the KEM MUST NOT be reused for any other purpose. The originator MUST generate a fresh KEM shared secret for each recipient, and MUST discard it after constructing the KEMRecipientInfo entry for that recipient. Similarly, the recipient MUST discard the KEM shared secret after deriving the KEK.
section: "7"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
