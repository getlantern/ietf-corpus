document: rfc-7344
kind: design-rationale
summary: Using the SEP bit in DNSKEY to drive DS selection was rejected because it gives the Child no control over DS digest algorithms and is incompatible with Double-DS rollover, which requires DS records for keys not yet in the DNSKEY RRset.
section: "2.1"
topics:
    - dns
    - security
