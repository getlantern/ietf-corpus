document: rfc-6155
kind: protocol-element
summary: Port number elements ('udpport', 'tcpport', 'sctpport', 'dccpport') allow a Device to be identified by a flow when NAT prevents unique identification by IP address alone. A port number must be combined with an IP address and is only useful when the LIS has knowledge of the NAT mappings in use.
section: "3.3"
topics:
    - nat
    - realtime
    - tcp
    - udp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
