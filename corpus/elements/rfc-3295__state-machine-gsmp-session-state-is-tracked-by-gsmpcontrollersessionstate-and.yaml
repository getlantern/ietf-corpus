kind: state-machine
summary: 'GSMP session state is tracked by gsmpControllerSessionState and gsmpSwitchSessionState with four values: null(1), synsent(2), synrcvd(3), estab(4). The NULL state is returned when encapsulation is not yet configured, the row is not active, or the session is in NULL state per the GSMP specification.'
