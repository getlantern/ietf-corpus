document: rfc-3395
kind: protocol-element
summary: An application verb (also called simply 'verb') is a transaction type defined for a particular application protocol, potentially involving several PDU types. It is not equivalent to a sub-command or opcode within a single packet. A special 'connect(0)' verb is implicitly defined for every application protocol to capture connection/session setup and tear-down traffic.
section: "2.3"
topics:
    - snmp
    - realtime
