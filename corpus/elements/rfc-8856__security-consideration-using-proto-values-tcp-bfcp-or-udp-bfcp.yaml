document: rfc-8856
kind: security-consideration
summary: Using proto values 'TCP/BFCP' or 'UDP/BFCP' results in a BFCP stream not protected by TLS or DTLS. Operators must provide integrity and confidentiality protection through other means when using these unencrypted transports.
