document: rfc-9427
kind: design-rationale
summary: TEAP's Protected Access Credential (PAC) is deprecated for TLS 1.3 because TLS 1.3 session tickets are functionally equivalent, containing a PSK along with other data. PAC provisioning (RFC 7170 Section 3.8.1) is likewise removed from TEAP when TLS 1.3 is used.
section: "2.2"
topics:
    - tls
    - security
