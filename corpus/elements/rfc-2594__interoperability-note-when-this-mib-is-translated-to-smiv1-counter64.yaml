document: rfc-2594
kind: interoperability-note
summary: When this MIB is translated to SMIv1, Counter64 objects cannot be represented and will be omitted. The translated MIB must be semantically equivalent except for this omission; the companion Counter32 low-byte objects provide partial coverage for SMIv1 environments.
