document: rfc-5172
kind: security-consideration
summary: Lack of proper link security such as authentication prior to data transfers may enable man-in-the-middle attacks resulting in loss of data integrity and confidentiality. Recommended mitigations include Access Control Lists, an authentication protocol (e.g., EAP with MD5), and an encryption control protocol for negotiating cipher suites.
section: "3"
topics:
    - security
    - ip
