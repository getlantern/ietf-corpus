document: rfc-7213
kind: interoperability-note
summary: GAP messages for Ethernet Interface Parameters are multicast to 01-00-5e-80-00-0d (as defined in Section 7 of RFC 7212), while the MPLS-TP point-to-point data address is 01-00-5E-90-00-00; implementors must distinguish between these two addresses.
section: "4"
topics:
