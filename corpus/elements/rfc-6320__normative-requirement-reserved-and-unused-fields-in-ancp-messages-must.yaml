document: rfc-6320
kind: normative-requirement
summary: Reserved and unused fields in ANCP messages MUST be set to zeroes by the sender and MUST be ignored by the receiver. This applies to both explicitly reserved fields and to unused bits in flag fields.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
