document: rfc-7533
kind: wire-format
summary: FedFsUuid is a 16-byte opaque field encoding a version 4 UUID (RFC 4122) in network byte order. It is used as both the fileset name UUID (fsnUuid in FedFsFsn) and the fileset location UUID (fslUuid in FedFsNfsFsl).
