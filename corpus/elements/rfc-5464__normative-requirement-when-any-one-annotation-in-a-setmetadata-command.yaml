document: rfc-5464
kind: normative-requirement
summary: When any one annotation in a SETMETADATA command fails to be set (resulting in a tagged NO), the server MUST NOT change the values of any other annotations specified in the same command. The operation is atomic across all entries in the command.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
