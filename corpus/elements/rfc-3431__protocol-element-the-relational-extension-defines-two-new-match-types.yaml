document: rfc-3431
kind: protocol-element
summary: 'The RELATIONAL extension defines two new match types: VALUE and COUNT. The syntax is MATCH-TYPE =/ COUNT / VALUE, where COUNT = ":count" relational-match and VALUE = ":value" relational-match, and relational-match = DQUOTE ( "gt" / "ge" / "lt" / "le" / "eq" / "ne" ) DQUOTE.'
section: "4"
