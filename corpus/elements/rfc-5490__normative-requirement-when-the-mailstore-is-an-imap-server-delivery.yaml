document: rfc-5490
kind: normative-requirement
summary: When the mailstore is an IMAP server, delivery is possible if the READ-WRITE response code is present (when IMAP ACL is not supported), or if the user has 'p' or 'i' rights for the mailbox (when IMAP ACL is supported).
section: "3.1"
rfc2119_level: REQUIRED
