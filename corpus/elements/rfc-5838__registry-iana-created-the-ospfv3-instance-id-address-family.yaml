document: rfc-5838
kind: registry
summary: IANA created the 'OSPFv3 Instance ID Address Family Values' registry mapping OSPFv3 Instance IDs 0-127 to specific address families (0-31 IPv6 unicast, 32-63 IPv6 multicast, 64-95 IPv4 unicast, 96-127 IPv4 multicast). Instance IDs 128-255 are unassigned and require a Standards Track RFC for assignment.
section: "5"
topics:
