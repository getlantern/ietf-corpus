document: rfc-8883
kind: normative-requirement
summary: An ICMPv6 Destination Unreachable with Code 8 ('Headers too long') SHOULD be sent when a node discards a packet because the aggregate length of all headers (including encapsulation headers like UDP) exceeds its processing limits.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
