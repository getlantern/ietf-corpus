document: rfc-4589
kind: design-rationale
summary: The registry deliberately avoids imposing a strict hierarchy of location descriptions. Multiple terms can apply simultaneously to the same location (e.g., 'restaurant' and 'airport'), and no limit is placed on the number of terms that can describe a single place, as few combinations are physically impossible.
