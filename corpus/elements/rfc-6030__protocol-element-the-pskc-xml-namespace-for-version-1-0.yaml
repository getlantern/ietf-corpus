kind: protocol-element
summary: The PSKC XML namespace for version 1.0 is 'urn:ietf:params:xml:ns:keyprov:pskc', and implementations SHOULD use the prefix 'pskc'. PSKC also relies on XML Signature (ds:), XML Encryption (xenc:), XML Encryption 1.1 (xenc11:), and PKCS#5 (pkcs5:) namespaces.
