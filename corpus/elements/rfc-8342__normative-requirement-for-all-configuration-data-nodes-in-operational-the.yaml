document: rfc-8342
kind: normative-requirement
summary: For all configuration data nodes in <operational>, the device SHOULD report the origin that most accurately reflects the source of the configuration in use by the system. If a device cannot provide an accurate origin, it SHOULD use the origin 'unknown'.
section: 5.3.4
rfc2119_level: SHOULD
topics:
    - netconf
    - yang
