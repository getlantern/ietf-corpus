document: rfc-2421
kind: normative-requirement
summary: Compliant implementations MUST implement the EHLO command and return the capabilities defined in this profile. The HELO command MUST be supported for backward compatibility but clients SHOULD NOT send it unless EHLO is not supported.
section: 5.1.9
rfc2119_level: MUST
