document: rfc-8415
kind: interoperability-note
summary: DHCPv4 and DHCPv6 are operationally distinct; the IETF consensus is that DHCPv4 (not DHCPv6) should be used when conveying IPv4 configuration information. For IPv6-only networks requiring IPv4 provisioning, RFC 7341 defines a transport mechanism to carry DHCPv4 messages encapsulated within DHCPv6.
section: "1.2"
topics:
    - ip
