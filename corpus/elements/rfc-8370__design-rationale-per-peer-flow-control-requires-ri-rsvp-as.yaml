document: rfc-8370
kind: design-rationale
summary: Per-Peer Flow Control requires RI-RSVP as a prerequisite because its back-pressure mechanism (detecting congestion via missing ACKs) only works reliably when acknowledgements are mandatory and the refresh interval is large enough to make ACK absence meaningful.
