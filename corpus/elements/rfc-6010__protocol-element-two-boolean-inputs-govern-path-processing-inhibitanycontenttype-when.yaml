document: rfc-6010
kind: protocol-element
summary: 'Two boolean inputs govern path processing: inhibitAnyContentType (when true, id-ct-anyContentType does not match any content type) and absenceEqualsUnconstrained (when true, absence of CCC in a certificate is treated as inheriting the issuer''s CCC privileges; when false, absence means no authorizations). Neither flag affects apex trust anchors, which are always unconstrained.'
section: "3.1"
topics:
    - pkix
    - crypto
    - security
