document: rfc-9561
kind: design-rationale
summary: The NVMe Flush command is the direct NVMe equivalent to SCSI SYNCHRONIZE CACHE commands. The mapping is used for volatile write cache flushing before LAYOUTCOMMIT, preserving the same semantic guarantee across both protocols.
