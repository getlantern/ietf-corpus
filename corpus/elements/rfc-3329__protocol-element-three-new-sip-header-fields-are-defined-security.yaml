document: rfc-3329
kind: protocol-element
summary: 'Three new SIP header fields are defined: Security-Client (sent by client listing supported mechanisms), Security-Server (sent by server listing supported mechanisms), and Security-Verify (sent by client echoing back the server''s list under the negotiated security). Each contains one or more sec-mechanism entries with a mechanism-name and optional parameters.'
section: "2.2"
topics:
