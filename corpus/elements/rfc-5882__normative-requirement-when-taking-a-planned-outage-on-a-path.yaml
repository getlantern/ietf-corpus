document: rfc-5882
kind: normative-requirement
summary: When taking a planned outage on a path over which BFD is running, the BFD session SHOULD be taken to AdminDown state prior to the outage. The system asserting AdminDown SHOULD maintain that state for at least one Detection Time to ensure the remote system is aware.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
