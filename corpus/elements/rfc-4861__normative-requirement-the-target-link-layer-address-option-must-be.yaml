document: rfc-4861
kind: normative-requirement
summary: The Target Link-Layer Address option MUST be included in Neighbor Advertisement responses to multicast Neighbor Solicitations on link layers that have addresses, to avoid infinite NS recursion when the peer has no cache entry.
section: "4.4"
rfc2119_level: MUST
