document: rfc-7440
kind: security-consideration
summary: TFTP includes no protection against an on-path attacker. Care must be taken in controlling windowsize values according to data sender, data receiver, and network environment capabilities. The windowsize extension itself does not pose additional security risks beyond those already present in TFTP.
section: "7"
topics:
