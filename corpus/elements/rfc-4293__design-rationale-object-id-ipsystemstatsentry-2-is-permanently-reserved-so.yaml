document: rfc-4293
kind: design-rationale
summary: Object ID { ipSystemStatsEntry 2 } is permanently reserved so that the OID suffixes of the traffic counters in ipSystemStatsTable align with their counterparts in ipIfStatsTable. This makes cross-table navigation predictable for managers.
