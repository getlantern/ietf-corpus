document: rfc-9143
kind: normative-requirement
summary: The offerer MUST NOT suggest a bundle-only 'm=' section as the offerer-tagged 'm=' section. It is RECOMMENDED that the suggested offerer-tagged 'm=' section be one the offerer believes is unlikely to be rejected or moved out of the BUNDLE group.
section: 7.2.1
rfc2119_level: MUST NOT
topics:
