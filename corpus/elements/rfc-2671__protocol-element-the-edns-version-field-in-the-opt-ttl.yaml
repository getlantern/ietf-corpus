document: rfc-2671
kind: protocol-element
summary: The EDNS VERSION field in the OPT TTL indicates the implementation level of the sender. Version 0 means full conformance with RFC 2671. Requestors should set VERSION to the lowest implemented level capable of expressing the transaction to minimize negotiation overhead.
section: "4.6"
topics:
    - dns
