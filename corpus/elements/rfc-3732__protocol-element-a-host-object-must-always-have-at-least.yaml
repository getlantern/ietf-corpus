document: rfc-3732
kind: protocol-element
summary: A host object MUST always have at least one associated status value. Status values are set by the sponsoring client or the server; client-settable values are prefixed with 'client', server-settable values with 'server', and server-managed values have no prefix.
section: "2.3"
extracted_by: claude-sonnet-4-6
