document: rfc-5132
kind: protocol-element
summary: ipMcastRouteDifferentInIfOctets and ipMcastRouteDifferentInIfPackets count packets dropped due to incoming interface checks (RPF check failure in PIM-SM, DF check failure in BIDIR-PIM, etc.). If the rate of increase exceeds 1% of ipMcastRouteOctets, it indicates multicast routing problems requiring investigation.
section: "6"
topics:
    - multicast
    - snmp
