summary: 'OPTION_F_PROTOCOL_VERSION (option code 127, option-len 4) encodes two unsigned 16-bit integers in network byte order: major-version (initially 1) and minor-version (initially 0), allowing partners to negotiate protocol compatibility across future revisions.'
