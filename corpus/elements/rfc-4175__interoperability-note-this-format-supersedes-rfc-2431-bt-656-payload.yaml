document: rfc-4175
kind: interoperability-note
summary: 'This format supersedes RFC 2431 (BT.656 payload format): it supports scan sizes up to 32767 lines and pixels per line (vs. 4096/2048), and adds support for RGB, RGBA, BGR, BGRA, YCbCr 4:4:4, 4:2:0, and 4:1:1 color formats beyond the 4:2:2-only RFC 2431.'
