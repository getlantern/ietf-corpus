document: rfc-9362
kind: interoperability-note
summary: DOTS uses a default value of 3 for 'non-max-retransmit' instead of the generic CoAP default of 4 (MAX_RETRANSMIT). This aligns with the DOTS-specific 'max-retransmit' default specified in Section 4.5.2 of RFC 9132 rather than the CoAP default in Section 4.8 of RFC 7252.
section: "3"
topics:
