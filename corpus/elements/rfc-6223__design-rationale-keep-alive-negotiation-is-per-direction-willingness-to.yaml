document: rfc-6223
kind: design-rationale
summary: 'Keep-alive negotiation is per-direction: willingness to receive keep-alives from an adjacent entity does not imply willingness to send them. This requires each direction to be independently negotiated, avoiding unintended asymmetric keep-alive flows.'
section: "4.1"
topics:
