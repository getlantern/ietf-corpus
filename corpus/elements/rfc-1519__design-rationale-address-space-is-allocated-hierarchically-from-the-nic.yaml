document: rfc-1519
kind: design-rationale
summary: Address space is allocated hierarchically from the NIC to service providers, and from providers to clients, rather than from a central authority directly to each client. This distributes administrative load, scales as the Internet grows, and enables topological aggregation so that a provider can advertise a single aggregate covering all its clients.
section: "2.2"
topics:
    - ip
    - routing
