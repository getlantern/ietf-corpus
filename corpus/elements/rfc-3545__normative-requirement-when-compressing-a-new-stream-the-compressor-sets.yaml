document: rfc-3545
kind: normative-requirement
summary: When compressing a new stream, the compressor sets a value of N for that context and sends N+1 FULL_HEADER packets. The compressor MUST also repeat each subsequent COMPRESSED_UDP update N+1 times.
section: "2.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
