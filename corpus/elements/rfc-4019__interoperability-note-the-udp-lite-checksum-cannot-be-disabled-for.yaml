document: rfc-4019
kind: interoperability-note
summary: The UDP-Lite checksum cannot be disabled for IPv4 (unlike UDP), and it must always be sent as-is in every compressed packet for both IPv4 and IPv6. The context parameter context(UDP Checksum) from ROHC UDP is not applicable to ROHC UDP-Lite.
section: "5.1"
topics:
    - udp
