document: rfc-5250
kind: security-consideration
summary: OSPF authentication, including the Cryptographic authentication option using MD5 message digests with a shared secret key, protects against passive and active attacks on routing protocol information. However, none of the standard authentication types provide confidentiality or protection against traffic analysis.
