document: rfc-8408
kind: normative-requirement
summary: When a PCC sends a PCRpt message for a non-RSVP-TE PST, it MUST include the PATH-SETUP-TYPE TLV in the SRP object and MUST include the SRP object even when the SRP-ID-number is the reserved value 0x00000000.
section: "5"
rfc2119_level: MUST
topics:
    - routing
