document: rfc-4724
kind: normative-requirement
summary: The Restarting Speaker MUST defer route selection for an address family until it either receives the End-of-RIB marker from all eligible peers or the Selection_Deferral_Timer expires. An implementation MUST support a configurable Selection_Deferral_Timer to bound deferral time.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
