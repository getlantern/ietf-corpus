document: rfc-9253
kind: normative-requirement
summary: The LINK property MUST NOT be treated as just another attachment. It differs semantically from ATTACH, which handles server-side management, stripping, and inline data; clients may handle them differently.
section: "1.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
