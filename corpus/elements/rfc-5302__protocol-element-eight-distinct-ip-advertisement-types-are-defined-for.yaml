document: rfc-5302
kind: protocol-element
summary: 'Eight distinct IP advertisement types are defined for IS-IS LSPs, combining: LSP level (L1 or L2), TLV type (128=internal or 130=external route-type), metric-type bit (internal or external), and up/down bit. The combination of TLV 128 with external metric-type is invalid.'
section: "3.1"
