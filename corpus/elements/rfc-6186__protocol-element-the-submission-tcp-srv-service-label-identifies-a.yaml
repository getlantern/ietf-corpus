document: rfc-6186
kind: protocol-element
summary: The `_submission._tcp` SRV service label identifies a Mail Submission Agent (MSA) using RFC 4409. It covers connections both with and without TLS as defined for SMTP in RFC 3207. The conventional port is 587.
