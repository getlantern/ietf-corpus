document: rfc-7527
kind: normative-requirement
summary: Detecting looped back DAD messages using a Layer 2 protocol SHOULD be enabled by default, and it MUST be a configurable option if the Layer 2 technology provides means for detecting loopback messages on an interface circuit.
section: "3.2"
rfc2119_level: MUST
