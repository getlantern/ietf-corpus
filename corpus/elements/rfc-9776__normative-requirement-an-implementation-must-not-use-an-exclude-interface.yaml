document: rfc-9776
kind: normative-requirement
summary: An implementation MUST NOT use an EXCLUDE interface record to represent a group when all sockets for that group are in INCLUDE state. If system resource limits are reached when calculating interface state, an error MUST be returned to the requesting application.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
