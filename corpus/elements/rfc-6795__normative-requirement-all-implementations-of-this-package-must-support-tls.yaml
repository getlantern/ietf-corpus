document: rfc-6795
kind: normative-requirement
summary: All implementations of this package MUST support TLS and the SIPS URI scheme. Subscribers SHOULD use SIPS URIs when subscribing to session-specific policies so that policies are transmitted over TLS.
section: "3.6"
rfc2119_level: MUST
