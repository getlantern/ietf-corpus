document: rfc-8615
kind: security-consideration
summary: Applying metadata from a well-known URI to resources on other origins (e.g., subdomains, different ports) risks administrative and security issues by implying relationships between hosts where none may exist, potentially giving an attacker control across multiple hosts.
section: "4.3"
topics:
