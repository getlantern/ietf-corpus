document: rfc-6795
kind: normative-requirement
summary: A subscriber MUST insert the local session description in the SUBSCRIBE body when used with an SDP offer/answer exchange. If no session description is available initially (e.g., empty INVITE), the subscriber MUST refresh the subscription with the session description as soon as it becomes available.
section: "3.6"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
