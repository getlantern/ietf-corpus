document: rfc-8529
kind: security-consideration
summary: Security considerations for modules mounted under an NI root are not substantively changed by their NI context; the security considerations of those mounted modules (e.g., RFC 8349 for routing) apply equally whether accessed at the device root or under an NI instance root.
section: "4"
topics:
