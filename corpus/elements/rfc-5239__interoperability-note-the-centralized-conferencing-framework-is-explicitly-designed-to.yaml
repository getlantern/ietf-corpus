document: rfc-5239
kind: interoperability-note
summary: The Centralized Conferencing Framework is explicitly designed to be compatible with the SIP Conferencing Framework (RFC 4353). Section 10 describes the relationship; conferencing systems may use basic SIP-only conferencing (RFC 4579) for ad hoc conferences without any of the additional framework machinery defined in this document.
section: "10"
topics:
