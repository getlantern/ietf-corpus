document: rfc-1782
kind: state-machine
summary: 'For a Read Request with options, the server may respond with: OACK (acknowledges RRQ and options), DATA (acknowledges RRQ but not options, initiating normal transfer), or ERROR (request denied). The client then ACKs the OACK with block number 0 to confirm option acceptance.'
section: Negotiation Protocol
