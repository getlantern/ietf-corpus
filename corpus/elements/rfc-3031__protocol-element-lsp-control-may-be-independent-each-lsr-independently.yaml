document: rfc-3031
kind: protocol-element
summary: LSP Control may be Independent (each LSR independently binds a label to a FEC as soon as it recognizes it) or Ordered (an LSR binds a label only if it is the LSP egress or has already received a label binding from its next hop). Ordered control is required when traffic must follow a path with guaranteed properties; both modes are interoperable but a network with mixed modes behaves largely as independent control.
section: "3.19"
topics:
    - routing
