document: rfc-7679
kind: protocol-element
summary: Type-P-One-way-Delay-Poisson-Stream is a sample metric defined by parameters Src, Dst, T0, Tf, Tmax, and lambda (rate in reciprocal seconds). It consists of a sequence of <time, delay> pairs obtained by sending test packets at times drawn from a Poisson process with average rate lambda between T0 and Tf.
