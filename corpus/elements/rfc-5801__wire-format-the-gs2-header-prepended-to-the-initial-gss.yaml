document: rfc-5801
kind: wire-format
summary: 'The GS2 header prepended to the initial GSS-API context token has the ABNF form: gs2-header = [gs2-nonstd-flag ","] gs2-cb-flag "," [gs2-authzid] ",". The gs2-cb-flag is one of ''p=<cb-name>'' (used channel binding), ''n'' (no CB support), or ''y'' (supports CB, thinks server does not).'
section: "4"
topics:
