document: rfc-2293
kind: design-rationale
summary: 'A table is used when the key cannot be represented as a global name, for reasons including: the object lacks a natural global name, the name is only meaningful in the context of the binding, there is no authority to place parameters in the global entry, or grouping information together is a performance optimization for replication.'
