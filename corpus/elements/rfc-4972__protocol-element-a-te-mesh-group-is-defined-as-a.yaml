document: rfc-4972
kind: protocol-element
summary: A TE mesh-group is defined as a group of LSRs connected by a full mesh of TE LSPs. Each mesh-group membership advertisement includes a mesh-group number, a tail-end address (used as TE LSP tail-end by peer members), and a tail-end name display string.
