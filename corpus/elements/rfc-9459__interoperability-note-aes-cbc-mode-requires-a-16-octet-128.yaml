document: rfc-9459
kind: interoperability-note
summary: AES-CBC mode requires a 16-octet (128-bit) IV; use of a randomly or pseudorandomly generated IV ensures that encryption of the same plaintext yields different ciphertext. This IV requirement increases overhead compared to AES-CTR.
section: "5"
topics:
