document: rfc-9673
kind: protocol-element
summary: The Hop-by-Hop Options header is identified by a Next Header value of 0 in the IPv6 header, must appear immediately after the IPv6 header, and may appear at most once in a packet. It can contain one or more Hop-by-Hop options.
section: "5.1"
