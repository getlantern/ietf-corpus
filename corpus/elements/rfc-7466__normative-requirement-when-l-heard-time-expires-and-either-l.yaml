document: rfc-7466
kind: normative-requirement
summary: When L_HEARD_time expires and either L_status changes from SYMMETRIC or L_SYM_time expires, the Section 13.2 actions (2-Hop Tuple updates) MUST be performed before the Section 13.3 actions for that Link Tuple.
section: "4.3"
rfc2119_level: MUST
