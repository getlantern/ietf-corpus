document: rfc-4954
kind: wire-format
summary: 'The auth-command ABNF is: ''AUTH'' SP sasl-mech [SP initial-response] *(CRLF [base64]) [CRLF cancel-response] CRLF. The initial-response is base64 or ''=''. The continue-req (server challenge) is: ''334'' SP [base64] CRLF. The cancel-response is a single ''*''.'
