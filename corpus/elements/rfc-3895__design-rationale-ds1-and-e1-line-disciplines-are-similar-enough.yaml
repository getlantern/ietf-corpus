document: rfc-3895
kind: design-rationale
summary: DS1 and E1 line disciplines are similar enough that separate MIBs are unwarranted—Loss of Frame is defined in both ESF and D4 specs, and other performance parameters overlap substantially. Consequently, e1(19) and g703at2mb(67) ifTypes are obsoleted; ds1(18) covers all variants.
