document: rfc-4780
kind: normative-requirement
summary: A device implementing the SIP MIB MUST support the NETWORK-SERVICES-MIB and, at a minimum, MUST support the index and name objects (applIndex and applName) in the application table (applTable) to allow each instance of a SIP entity to be managed as a separate network service application.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
