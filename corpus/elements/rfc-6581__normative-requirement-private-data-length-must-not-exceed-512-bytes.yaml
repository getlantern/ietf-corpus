document: rfc-6581
kind: normative-requirement
summary: Private Data length MUST NOT exceed 512 bytes in any Enhanced SCTP DDP stream session message, including the enhanced RDMA connection establishment data prefix. Private Data MUST NOT be included in the DDP Stream Session TERM message.
