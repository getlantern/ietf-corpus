document: rfc-3389
kind: design-rationale
summary: Noise level is expressed in -dBov (relative to system overload) rather than absolute dBm because digital implementations do not need to know the analog calibration. For a mu-law system, 0 dBov corresponds to a +/-8031 square wave, equating to 6.18 dBm0.
