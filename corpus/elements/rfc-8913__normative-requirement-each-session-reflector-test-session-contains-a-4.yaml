document: rfc-8913
kind: normative-requirement
summary: Each Session-Reflector test-session contains a 4-tuple {parent-connection-client-ip, parent-connection-client-tcp-port, parent-connection-server-ip, parent-connection-server-tcp-port} that MUST correspond to the equivalent 4-tuple in server/ctrl-connection, allowing the test session to be traced back to its parent TWAMP-Control connection.
section: "4.4"
rfc2119_level: MUST
topics:
    - measurement
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
