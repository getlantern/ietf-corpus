document: rfc-1982
kind: normative-requirement
summary: Care SHOULD be taken that the SOA serial number not be incremented, in one or more steps, by more than 2^31 - 1 within the period given by SOA.expire. Exceeding this may leave secondary servers with out-of-date zones whose serial number appears greater than the primary's.
section: "7"
rfc2119_level: SHOULD
topics:
    - dns
