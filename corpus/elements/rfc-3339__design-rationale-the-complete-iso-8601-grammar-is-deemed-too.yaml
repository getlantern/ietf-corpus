document: rfc-3339
kind: design-rationale
summary: The complete ISO 8601 grammar is deemed too complex for Internet protocols because it provides multiple and partial representations; this profile is a conformant subset that makes most fields and punctuation mandatory, trading expressiveness for simplicity and interoperability.
section: "5.5"
