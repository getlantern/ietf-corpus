document: rfc-9408
kind: normative-requirement
summary: 'The administrative ''service-status'' MUST NOT be influenced by the value of the operational ''sap-status''. These two status containers are independent: sap-status reflects the SAP''s physical/operational state, while service-status reflects the state of a specific provisioned service at that SAP.'
section: "5"
rfc2119_level: MUST NOT
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
