document: rfc-8412
kind: registry
summary: 'Four IANA registries are created or updated: (1) PA Subtypes — new SWIMA subtype added; (2) PA-TNC Attribute Types — new SWIMA attribute type codes registered; (3) PA-TNC Error Codes — new SWIMA-specific error codes (SWIMA_ERROR, SWIMA_SUBSCRIPTION_DENIED_ERROR, SWIMA_SUBSCRIPTION_ID_REUSE_ERROR, SWIMA_RESPONSE_TOO_LARGE_ERROR, SWIMA_SUBSCRIPTION_FULFILLMENT_ERROR); (4) Software Data Model Types — new registry for data model type values under the IANA PEN.'
