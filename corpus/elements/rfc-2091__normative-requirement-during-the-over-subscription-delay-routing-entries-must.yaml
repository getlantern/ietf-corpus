document: rfc-2091
kind: normative-requirement
summary: During the over-subscription delay, routing entries MUST NOT start timing out, so that a subsequent circuit-up message can be safely ignored if the delay has not yet expired and no confusion arises from a peer that previously issued a Route Flush.
section: "6.4"
rfc2119_level: MUST NOT
topics:
    - routing
