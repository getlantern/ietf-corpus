document: rfc-4502
kind: design-rationale
summary: The OwnerString mechanism on each control entry allows multiple management stations to share probe resources by identifying who owns each function. The convention that 'monitor'-prefixed owner strings indicate long-lived administrator-configured entries discourages indiscriminate modification by management stations.
section: "3.1"
topics:
