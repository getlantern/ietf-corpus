document: rfc-5121
kind: normative-requirement
summary: DAD SHOULD be performed as per RFC 4861 and RFC 4862. However, DAD on a global unicast address may be redundant if (1) the AR assigns unique prefixes per link and (2) the AR does not autoconfigure IPv6 global unicast addresses from the advertised prefix.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
