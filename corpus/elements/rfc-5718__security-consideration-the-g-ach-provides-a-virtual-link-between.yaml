document: rfc-5718
kind: security-consideration
summary: The G-ACh provides a virtual link between MPLS-TP nodes and might be used to induce many forms of security attack. The MPLS data plane does not include any security mechanisms of its own; protocols using the DCN must apply their own security mechanisms.
section: "4"
topics:
    - mpls
    - security
