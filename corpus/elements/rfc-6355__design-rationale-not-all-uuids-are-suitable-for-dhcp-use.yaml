document: rfc-6355
kind: design-rationale
summary: Not all UUIDs are suitable for DHCP use. UUIDs used in COM components or filesystem partition labels are likely inappropriate because they may not be accessible to firmware boot loaders and can change over time. Firmware-managed UUIDs are preferred.
section: "3"
