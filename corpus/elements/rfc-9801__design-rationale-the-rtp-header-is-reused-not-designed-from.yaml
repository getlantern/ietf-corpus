document: rfc-9801
kind: design-rationale
summary: The RTP header is reused (not designed from scratch) to align with other bit-stream emulation pseudowires (SAToP RFC 4553, CESoPSN RFC 5086, CEP RFC 4842) and to allow PLE implementations to reuse preexisting work. Full RTP topologies, RTCP, SRTP, header extensions, and CSRC lists are explicitly not supported as they are not applicable to PLE VPWS.
section: 5.2.2
topics:
    - rtp
