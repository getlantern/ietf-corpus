document: rfc-2155
kind: design-rationale
summary: A link station flagged appnLsActOnDemand is advertised in the network topology as active regardless of its actual operational state, so it can be included in route calculations; if selected, it is activated on demand. This avoids penalizing dial-on-demand links in route computation while still allowing their use.
section: "4"
topics:
    - routing
