document: rfc-7136
kind: normative-requirement
summary: 'RFC 4291 Section 2.5.1 is updated: the requirement that Interface IDs ''be constructed in Modified EUI-64 format'' is replaced with ''If derived from an IEEE MAC-layer address, they must be constructed in Modified EUI-64 format.'' The prior statement that the universal/local bit is ''to allow development of future technology'' is explicitly obsoleted.'
section: "5"
rfc2119_level: MUST
topics:
