document: rfc-6487
kind: protocol-element
summary: For EE certificates, the SIA extension MUST be present and non-critical, and MUST include an id-ad-signedObject entry (OID id-ad 11) with an rsync URI pointing to the signed object verified by this EE certificate. Other AccessMethods MUST NOT be used.
section: 4.8.8.2
topics:
