document: rfc-7673
kind: normative-requirement
summary: If an address (A or AAAA) RRset for an SRV target is 'secure', the client MUST perform a TLSA query for that connection endpoint. If no address RRsets are 'secure', the client MUST NOT perform a TLSA query for that endpoint.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
