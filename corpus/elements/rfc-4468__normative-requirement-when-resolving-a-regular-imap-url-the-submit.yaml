document: rfc-4468
kind: normative-requirement
summary: When resolving a regular IMAP URL, the submit server SHOULD forward the client's credentials to the IMAP server if and only if the submit server knows the IMAP server is in the same administrative domain.
section: "3.3"
rfc2119_level: SHOULD
