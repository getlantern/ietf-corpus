document: rfc-5729
kind: design-rationale
summary: Internationalized realm names (IDN) in NAIs should only be converted to ASCII-compatible encoding when DNS infrastructure is queried, not during Decorated NAI realm-placement processing. This keeps the NAI value unchanged during routing.
