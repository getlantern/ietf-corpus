document: rfc-6584
kind: wire-format
summary: 'The Group-keyed MAC EXT_AUTH header extension contains: HET=1, HEL, ASID (4 bits), rsvd (3 bits), AR flag (1 bit), SN (8 or 40 bits), a variable-length truncated Group-keyed MAC field (multiple of 32 bits), and optional Padding. For HMAC-SHA-256 with default truncation the extension is 16 bytes.'
section: "5.1"
topics:
