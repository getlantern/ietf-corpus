document: rfc-895
kind: design-rationale
summary: Using the last eight bits of the Internet address host number as the Experimental Ethernet address is recommended as the easiest approach for address mapping, given that Experimental Ethernet uses 8-bit addresses and Internet addresses contain a host number portion.
section: Address Mappings
