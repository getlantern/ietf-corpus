document: rfc-5322
kind: interoperability-note
summary: Folding white space (FWS) in the obsolete syntax (obs-FWS) allows any amount of folding white space including entirely-whitespace lines, which differs from current syntax. Implementations parsing older messages must handle this more liberal form without treating it as a header section terminator.
section: "4.2"
topics:
    - email
