document: rfc-8686
kind: interoperability-note
summary: Resource-consumer-initiated discovery (ALTO requirement AR-32) is a special case of cross-domain discovery, but requires the client to first determine its public IP address using a protocol like STUN due to widespread NAT deployment; DHCP-based discovery is an alternative specified in RFC 7286.
section: 5.1.1
topics:
    - nat
