document: rfc-1604
kind: interoperability-note
summary: The Frame Relay Service MIB models only one network provider's segment of a PVC. For end-to-end visibility across a multi-network PVC, the customer must poll separate SNMP proxy-agents in each Frame Relay network (Networks I, J, K per Figure 2).
