document: rfc-9774
kind: normative-requirement
summary: 'Per RFC 4632 Rule #2, a router generating an aggregate route MUST discard packets that match the aggregate route but not any of the more-specific routes (i.e., the next hop for the aggregate route should be the null destination).'
section: "6.3"
rfc2119_level: MUST
topics:
