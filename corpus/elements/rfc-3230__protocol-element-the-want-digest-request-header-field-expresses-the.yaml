document: rfc-3230
kind: protocol-element
summary: 'The Want-Digest request header field expresses the sender''s desire to receive an instance digest, using quality values (qvalues) to indicate preference among algorithms: ''Want-Digest = "Want-Digest" ":" #(digest-algorithm [";", "q" "=" qvalue])''. An absent qvalue is treated as 1.0.'
section: 4.3.1
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
