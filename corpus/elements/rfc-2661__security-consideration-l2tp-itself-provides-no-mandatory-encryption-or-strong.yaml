document: rfc-2661
kind: security-consideration
summary: L2TP itself provides no mandatory encryption or strong per-packet authentication. The document explicitly recommends use of IPsec for packet-level confidentiality and integrity, noting that L2TP tunnel authentication alone is insufficient for many environments.
section: "9.2"
