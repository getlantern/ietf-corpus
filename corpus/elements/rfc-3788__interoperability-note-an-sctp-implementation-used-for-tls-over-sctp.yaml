document: rfc-3788
kind: interoperability-note
summary: An SCTP implementation used for TLS over SCTP MUST support fragmentation of user data and may need to support the partial delivery API, even if all SIGTRAN messages are small. The SCTP 'unordered delivery' feature cannot be used in conjunction with TLS.
section: "6"
topics:
    - tls
    - sctp
    - security
