document: rfc-3156
kind: normative-requirement
summary: Implementations MUST ensure that no trailing whitespace is present after the MIME encoding has been applied to signed data. Whitespace-only header lines must be removed entirely rather than replaced by empty lines.
section: "3"
rfc2119_level: MUST
