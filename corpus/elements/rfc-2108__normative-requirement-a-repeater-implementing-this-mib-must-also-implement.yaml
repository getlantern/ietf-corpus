document: rfc-2108
kind: normative-requirement
summary: A repeater implementing this MIB must also implement (at least) the 'system' group from MIB-II. The 'system' group is mandatory and applies to the managed entity even if its sole functionality is management of repeaters.
section: 2.4.1.1
rfc2119_level: MUST
