document: rfc-5331
kind: normative-requirement
summary: When Ru transmits MPLS packets with upstream-assigned top labels over IP or MPLS tunnels, Rd MUST be able to determine the root of those tunnels and MUST use a separate label space for each unique root, identified by the tunnel head-end IP address.
section: "7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
