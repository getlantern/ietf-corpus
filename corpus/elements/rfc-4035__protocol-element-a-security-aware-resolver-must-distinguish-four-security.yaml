document: rfc-4035
kind: protocol-element
summary: 'A security-aware resolver MUST distinguish four security statuses for an RRset: Secure (valid chain of signed DNSKEY/DS from a trust anchor), Insecure (no chain from any trusted starting point), Bogus (chain should exist but cannot be established), and Indeterminate (cannot determine if the RRset should be signed).'
section: "4.3"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
