document: rfc-6945
kind: interoperability-note
summary: If the rpkiRtrCacheServerRemoteAddress object exceeds 114 octets, or rpkiRtrPrefixOriginAddress exceeds 111 octets, the SNMP OID index will exceed the 128 sub-identifier limit and the row cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
