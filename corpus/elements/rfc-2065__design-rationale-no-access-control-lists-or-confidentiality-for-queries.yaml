document: rfc-2065
kind: design-rationale
summary: No access control lists or confidentiality for queries/responses are provided, following the DNS design philosophy that data in the DNS is public and the same answers are given to all inquirers. Confidentiality may be available via IPsec. The security extensions focus solely on data integrity and authentication.
section: "2.1"
topics:
    - dns
    - security
    - privacy
