document: rfc-7517
kind: normative-requirement
summary: Duplicate key operation values MUST NOT be present in the "key_ops" array. Multiple unrelated key operations SHOULD NOT be specified for a key due to vulnerabilities from using the same key with multiple algorithms.
section: "4.3"
rfc2119_level: MUST NOT
