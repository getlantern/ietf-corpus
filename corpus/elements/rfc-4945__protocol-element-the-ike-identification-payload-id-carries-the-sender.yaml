document: rfc-4945
kind: protocol-element
summary: The IKE Identification Payload (ID) carries the sender's claimed identity and serves as a lookup key for policy and certificate store queries. The profile mandates support for IP*_ADDR, FQDN, USER_FQDN, and ID_DER_ASN1_DN types; IP ranges, GN, and KEY_ID are prohibited in the certificate context.
section: "3.1"
topics:
    - ipsec
