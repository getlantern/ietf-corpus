document: rfc-8629
kind: security-consideration
summary: The Hop Control mechanism can impact the set of reachable destinations more directly than the base DLEP Link Characteristics Request Message, increasing the risk that a compromised modem can suppress routing reachability. Implementations should consider additional configuration controls to restrict use of Hop Control to operator-intended conditions.
section: "4"
topics:
    - security
