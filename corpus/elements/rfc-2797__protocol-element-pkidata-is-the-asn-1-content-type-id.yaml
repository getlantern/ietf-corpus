document: rfc-2797
kind: protocol-element
summary: PKIData is the ASN.1 content type (id-cct-PKIData, OID id-cct 2) used as the body of the Full PKI Request message. It is a SEQUENCE containing controlSequence, reqSequence, cmsSequence, and otherMsgSequence, each holding zero or more tagged items.
