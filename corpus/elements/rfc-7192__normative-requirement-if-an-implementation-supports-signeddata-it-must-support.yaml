document: rfc-7192
kind: normative-requirement
summary: If an implementation supports SignedData, it MUST support RSA signature scheme and SHOULD support RSASSA-PSS and DSA. Implementations MUST support SHA-256 and SHOULD support SHA-1 in concert with these schemes.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
