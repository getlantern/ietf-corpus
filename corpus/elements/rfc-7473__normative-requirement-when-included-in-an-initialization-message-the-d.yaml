document: rfc-7473
kind: normative-requirement
summary: When included in an Initialization message, the D-bit in each SAC Element MUST be set to 1 (disable). Enabling a previously disabled application can only be done via a subsequent Capability message, not in an Initialization message.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
