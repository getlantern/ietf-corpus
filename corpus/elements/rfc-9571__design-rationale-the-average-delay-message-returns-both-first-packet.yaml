document: rfc-9571
kind: design-rationale
summary: The Average Delay message returns both first-packet and last-packet timestamps plus the sum of all timestamps, allowing analytics engines to compute mean delay and also to characterize delay components at multiple points along the packet path, rather than only at the endpoint.
