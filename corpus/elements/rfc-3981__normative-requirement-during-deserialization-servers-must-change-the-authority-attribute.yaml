document: rfc-3981
kind: normative-requirement
summary: During deserialization, servers MUST change the authority attribute of a referral to a valid authority of the server if the serialized attribute is empty. During serialization, servers MUST leave the authority attribute empty for referrals where the referent is an entity the server answers queries for.
section: "5"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
