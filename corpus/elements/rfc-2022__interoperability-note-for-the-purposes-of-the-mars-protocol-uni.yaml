document: rfc-2022
kind: interoperability-note
summary: For the purposes of the MARS protocol, UNI 3.0 and UNI 3.1 provide equivalent multicast support. Differences between the two specifications in required signalling elements are covered in RFC 1755. Both restrict multicasting to point-to-multipoint unidirectional VCs where only the root may add or remove leaf nodes.
section: "3"
topics:
