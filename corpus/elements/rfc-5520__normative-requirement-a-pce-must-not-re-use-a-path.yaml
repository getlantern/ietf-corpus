document: rfc-5520
kind: normative-requirement
summary: A PCE MUST NOT re-use a path-key value to represent a new CPS for at least 30 minutes after discarding the previous use of the same path-key, to prevent accidental misuse or replay.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
