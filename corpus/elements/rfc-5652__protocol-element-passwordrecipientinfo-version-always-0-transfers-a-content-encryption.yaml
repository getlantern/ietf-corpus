document: rfc-5652
kind: protocol-element
summary: PasswordRecipientInfo (version always 0) transfers a content-encryption key encrypted under a key-encryption key derived from a password or shared secret via an optional keyDerivationAlgorithm. If the derivation algorithm field is absent, the key-encryption key is supplied from an external source such as a hardware token.
section: 6.2.4
topics:
    - crypto
    - security
