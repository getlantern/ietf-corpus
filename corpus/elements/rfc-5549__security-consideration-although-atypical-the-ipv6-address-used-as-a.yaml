document: rfc-5549
kind: security-consideration
summary: Although atypical, the IPv6 address used as a BGP Next Hop could be an IPv4-mapped IPv6 address (RFC4291). Security mechanisms that validate next hop addresses (e.g., access control checks) must account for this case.
section: "8"
topics:
