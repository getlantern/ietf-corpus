document: rfc-7555
kind: interoperability-note
summary: The Proxy Ping procedures are restricted to LSP Ping FEC types where MPLS Echo Request/Reply are IP-encapsulated and the Echo Reply can be sent out-of-band over IP. Remote pinging over in-band control channels is explicitly out of scope.
section: "1"
topics:
