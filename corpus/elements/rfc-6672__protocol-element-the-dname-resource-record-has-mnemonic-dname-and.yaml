document: rfc-6672
kind: protocol-element
summary: The DNAME resource record has mnemonic DNAME and type code 39 (decimal). It is CLASS-insensitive. Its RDATA consists of a single field, <target>, which is a fully qualified domain name that provides subtree-level DNS redirection.
