document: rfc-8845
kind: normative-requirement
summary: A Provider MUST be compliant to RFC 6350 when supplying xCard Person Information and MUST supply a VERSION and a FN property. The Provider SHOULD use a URI to point to any LOGO, PHOTO, or SOUND in the xCard rather than embedding the data inline in CLUE messages.
section: 7.1.1.10
rfc2119_level: MUST
topics:
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
