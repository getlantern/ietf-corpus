summary: Random n-out-of-N sampling is configured via samplingSize (ElementId 309, unsigned32, packets) and samplingPopulation (ElementId 310, unsigned32, packets). Uniform probabilistic sampling uses samplingProbability (ElementId 311, float64), a value between 0 and 1 applied equally to every packet.
