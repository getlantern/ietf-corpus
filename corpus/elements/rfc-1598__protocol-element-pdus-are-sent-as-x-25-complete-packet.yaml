document: rfc-1598
kind: protocol-element
summary: 'PDUs are sent as X.25 ''complete packet sequences'': PDUs begin on X.25 data packet boundaries and the M bit (''more data'') is used to fragment PDUs larger than one X.25 data packet. The X.25 packet size is not directly related to the PPP MRU.'
