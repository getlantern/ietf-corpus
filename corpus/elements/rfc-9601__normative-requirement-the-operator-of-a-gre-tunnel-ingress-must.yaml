document: rfc-9601
kind: normative-requirement
summary: The operator of a GRE tunnel ingress MUST follow the configuration requirements in Section 4 of RFC 9601 when the outer delivery protocol is IP (v4 or v6). This update is appended to Section 3 of RFC 2784.
