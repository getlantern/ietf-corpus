document: rfc-4970
kind: registry
summary: A new IANA registry for OSPFv3 LSA Function Codes is created. Function code 12 is assigned to the OSPFv3 RI LSA. Codes 0 are reserved; 1-9 already assigned; 10-11 and 13-255 unassigned (Standards Action); 256-8175 reserved pending a Standards Track RFC; 8176-8183 for experimentation (not IANA-registered); 8184-8191 for Vendor Private Use.
