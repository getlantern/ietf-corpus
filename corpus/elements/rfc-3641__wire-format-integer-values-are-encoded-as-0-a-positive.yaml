document: rfc-3641
kind: wire-format
summary: INTEGER values are encoded as "0", a positive decimal number, a negative decimal number (with leading "-"), or an identifier from the named number list if one exists. OBJECT IDENTIFIER values are encoded as dotted decimal (numeric-oid) or as an object descriptor name (descr); the descriptor form is potentially ambiguous and should be used with care.
section: "3.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
