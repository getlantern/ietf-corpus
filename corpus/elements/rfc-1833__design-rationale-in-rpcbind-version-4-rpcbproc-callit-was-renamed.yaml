document: rfc-1833
kind: design-rationale
summary: In RPCBIND version 4, RPCBPROC_CALLIT was renamed RPCBPROC_BCAST to make its intended use (broadcast RPC only) explicit, and RPCBPROC_INDIRECT was added as a separate procedure for unicast indirect calls that reports errors rather than being silent.
