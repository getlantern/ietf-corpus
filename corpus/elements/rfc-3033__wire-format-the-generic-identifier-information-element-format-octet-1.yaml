document: rfc-3033
kind: wire-format
summary: 'The Generic Identifier information element format: octet 1 is the IE identifier (0x7F), octet 2 is the IE instruction field with coding standard and action indicator, octets 3-4 are the length, octet 5 is the Identifier related standard/application field, octet 6 is the Identifier type, octet 7 is the Identifier length, and octets 8+ are the Identifier value. Maximum total length is 63 octets.'
section: "3.1"
topics:
