kind: protocol-element
summary: PSP (Penultimate Segment Pop) is a flavor of End, End.X, and End.T that instructs the penultimate SR Segment Endpoint Node to remove the SRH after decrementing Segments Left to zero, avoiding SRH processing overhead at the egress PE.
