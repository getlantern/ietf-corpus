document: rfc-9143
kind: design-rationale
summary: RFC 3264 and RFC 5888 are updated to allow extensions to assign non-disabling semantics to zero port values in 'm=' sections and to allow 'group' attributes to reference zero-port 'm=' sections. This enables 'bundle-only' to use zero port as a signal for BUNDLE-conditional acceptance rather than stream rejection.
section: "13"
topics:
