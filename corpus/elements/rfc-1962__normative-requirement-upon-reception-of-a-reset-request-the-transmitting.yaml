document: rfc-1962
kind: normative-requirement
summary: Upon reception of a Reset-Request, the transmitting compressor is reset to an initial state, and a CCP packet MUST be transmitted with Code 15 (Reset-Ack), with the Identifier field copied from the Reset-Request.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
