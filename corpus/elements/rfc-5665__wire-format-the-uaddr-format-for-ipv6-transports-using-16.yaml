document: rfc-5665
kind: wire-format
summary: The uaddr format for IPv6 transports using 16-bit ports is the US-ASCII string 'x1:x2:x3:x4:x5:x6:x7:x8.p1.p2'. The prefix follows RFC 4291 Section 2.2 preferred (or two alternative) textual forms for IPv6 addresses, and the '.p1.p2' port suffix is computed identically to the IPv4 uaddr format.
section: 5.2.3.4
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
