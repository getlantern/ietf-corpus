document: rfc-4039
kind: normative-requirement
summary: Network administrators MUST only enable Rapid Commit on a DHCP server if either the server is the only server for the subnet, or multiple servers are present and each can commit a binding for all clients with sufficient addresses available.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
