document: rfc-6844
kind: wire-format
summary: 'The CAA RDATA consists of: Flags (1 octet), Tag Length (1 octet, value MUST be ≥1 and SHOULD be ≤15), Tag (Tag Length octets of US-ASCII alphanumerics, case-insensitive), and Value (remaining octets; length m = d - n - 2 where d is RDATA length and n is tag length).'
section: "5.1"
