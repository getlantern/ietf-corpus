document: rfc-5055
kind: protocol-element
summary: 'Eight error OIDs under id-bvae (aliased to id-svp-basicValAlg) signal specific basic validation failures in the response: id-bvae-expired, id-bvae-not-yet-valid, id-bvae-wrongTrustAnchor, id-bvae-noValidCertPath, id-bvae-revoked, id-bvae-invalidKeyPurpose, id-bvae-invalidKeyUsage, and id-bvae-invalidCertPolicy. These may be used by any validation algorithm since all must implement basic validation.'
section: 3.2.4.2.2
topics:
    - pkix
