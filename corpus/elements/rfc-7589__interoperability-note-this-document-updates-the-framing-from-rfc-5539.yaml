document: rfc-7589
kind: interoperability-note
summary: This document updates the framing from RFC 5539 (which used RFC 4742 EOM framing) to align with RFC 6242 framing. When both peers advertise :base:1.1, chunked framing is used; otherwise, legacy EOM framing is used for backward compatibility.
