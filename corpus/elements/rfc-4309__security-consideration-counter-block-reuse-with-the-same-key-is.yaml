document: rfc-4309
kind: security-consideration
summary: 'Counter block reuse with the same key is catastrophic: XORing the same key stream with two different plaintexts allows an attacker who obtains both ciphertexts to recover P1 XOR Q1, from which the individual plaintexts can be separated.'
