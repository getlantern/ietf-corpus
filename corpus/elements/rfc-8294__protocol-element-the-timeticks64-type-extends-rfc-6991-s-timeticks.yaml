document: rfc-8294
kind: protocol-element
summary: The timeticks64 type extends RFC 6991's timeticks to 64-bit width, representing time modulo 2^64 in hundredths of a second between two epochs. The uint24 type defines a 24-bit unsigned integer as a uint32 with range 0..16777215.
