document: rfc-7946
kind: interoperability-note
summary: Bounding boxes that cross the antimeridian have a northeast corner longitude that is less than the longitude of the southwest corner (e.g., bbox [177.0, -20.0, -178.0, -16.0] for Fiji). This distinguishes them from boxes that do not cross the antimeridian.
