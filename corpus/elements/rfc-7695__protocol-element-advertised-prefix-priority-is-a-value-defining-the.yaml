document: rfc-7695
kind: protocol-element
summary: Advertised Prefix Priority is a value defining the priority of an Advertised Prefix. When multiple prefixes conflict (overlapping or same Delegated Prefix on same link), all but the greatest priority are eventually removed; ties are broken by the Node ID of the advertising node.
