document: rfc-9011
kind: security-consideration
summary: SCHC data (LoRaWAN payload) is protected at the LoRaWAN level by AES-128 encryption using a session key shared by the device and the SCHC gateway. These session keys are renewed at each LoRaWAN session (each join or rejoin). This document introduces no new security issues beyond those identified in RFC 8724.
section: "6"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
