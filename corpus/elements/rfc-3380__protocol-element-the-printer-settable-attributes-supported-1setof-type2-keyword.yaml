document: rfc-3380
kind: protocol-element
summary: The 'printer-settable-attributes-supported' (1setOf type2 keyword) is a REQUIRED READ-ONLY Printer Description attribute that lists which Printer attributes are settable in the implementation. It MUST be supported if Set-Printer-Attributes is supported, and the Printer MUST reject attempts to set attributes not listed here.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
