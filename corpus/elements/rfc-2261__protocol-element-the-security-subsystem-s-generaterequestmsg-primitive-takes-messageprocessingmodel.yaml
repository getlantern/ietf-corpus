document: rfc-2261
kind: protocol-element
summary: The Security Subsystem's generateRequestMsg primitive takes messageProcessingModel, globalData, maxMessageSize, securityModel, securityEngineID, securityName, securityLevel, and scopedPDU as inputs and outputs securityParameters, wholeMsg, and wholeMsgLength. A corresponding processIncomingMsg primitive validates incoming messages and extracts the scopedPDU payload.
