document: rfc-6753
kind: normative-requirement
summary: HTTP GET requests to a HELD URI MUST be safe and idempotent per RFC 2616; there are no side effects of making the request, and a repeated request has no more effect than a single request.
section: "3.2"
rfc2119_level: MUST
topics:
