document: rfc-6603
kind: interoperability-note
summary: If the requesting router requests OPTION_PD_EXCLUDE but the delegating router does not support this specification, the delegating router acts as specified in RFC 3633 (ignoring the unknown option code in OPTION_ORO). The requesting router must therefore be prepared to operate without prefix exclusion when the delegating router omits OPTION_PD_EXCLUDE from its Advertise.
section: "5.2"
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
