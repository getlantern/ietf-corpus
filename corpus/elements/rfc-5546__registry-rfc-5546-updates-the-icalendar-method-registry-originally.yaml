summary: 'RFC 5546 updates the iCalendar METHOD Registry (originally created by RFC 2446) to add the eight iTIP method values: PUBLISH, REQUEST, REPLY, ADD, CANCEL, REFRESH, COUNTER, and DECLINECOUNTER, along with their applicable component types and descriptions.'
