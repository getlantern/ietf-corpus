document: rfc-7220
kind: normative-requirement
summary: A PCP server SHOULD be able to store at least 128 bytes for a description. The server MUST send the stored value back to the PCP client in the DESCRIPTION option in the response, truncating it if the full value cannot be stored.
section: "3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
