document: rfc-5654
kind: normative-requirement
summary: Operation of the MPLS-TP layer network MUST be possible without any dependencies on the server or client layer network. The server layer MUST guarantee that traffic loading from other clients does not degrade the transport service to the MPLS-TP layer below the agreed level.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
