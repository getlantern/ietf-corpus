document: rfc-1284
kind: design-rationale
summary: Attributes already represented in MIB-II (RFC 1213) or the generic interface extensions MIB (RFC 1229) — such as octet counts, frame counts, promiscuous status, MAC address, and multicast information — are deliberately not duplicated in this MIB. The relationship between an ethernet-like interface and an ifIndex instance is one-to-one.
