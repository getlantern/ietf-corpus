document: rfc-4388
kind: protocol-element
summary: 'Three query regimes are defined: query by IP address (ciaddr set, MAC and Client-identifier absent), query by MAC address (htype/hlen/chaddr set, ciaddr zero), and query by Client-identifier option (option 61 present, ciaddr and MAC zero). A server MUST implement all three.'
