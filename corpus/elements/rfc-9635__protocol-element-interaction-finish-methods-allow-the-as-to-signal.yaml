document: rfc-9635
kind: protocol-element
summary: Interaction finish methods allow the AS to signal to the client instance that interaction is complete. Methods include redirect (browser redirect to callback URI with interaction reference and hash) and push (direct HTTP request to client's callback URI). Both include a client-supplied nonce and the AS-provided finish nonce for hash computation.
section: 2.5.2
topics:
    - oauth
    - security
