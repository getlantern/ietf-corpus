document: rfc-4930
kind: normative-requirement
summary: A globally unique identifier (ROID) MUST be assigned to every object when created and MUST be returned to the client as part of any <info> request. The RECOMMENDED construction is a local identifier concatenated with a hyphen and an IANA-maintained repository identifier.
section: "2.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
