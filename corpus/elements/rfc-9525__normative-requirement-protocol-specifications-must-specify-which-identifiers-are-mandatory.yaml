document: rfc-9525
kind: normative-requirement
summary: Protocol specifications MUST specify which identifiers are mandatory to implement and SHOULD provide operational guidance when necessary. This is required to address cross-protocol attacks such as ALPACA, which are possible when two different protocol services use the same certificate.
section: "2"
rfc2119_level: MUST
topics:
