document: rfc-9177
kind: normative-requirement
summary: The Size1 option MUST be used with Q-Block1 in all request payloads preserving the same value; the Size2 option MUST be used with Q-Block2 in all response payloads preserving the same value. Both must exactly represent the body size so missing data can be determined.
section: "4.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
