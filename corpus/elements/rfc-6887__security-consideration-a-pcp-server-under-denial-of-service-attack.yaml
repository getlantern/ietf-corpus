document: rfc-6887
kind: security-consideration
summary: A PCP server under denial-of-service attack from a high volume of requests MAY silently discard excess requests (relying on client retransmission) or MAY return NO_RESOURCES. Attacks against server discovery (e.g., rogue DHCP PCP-server options) can redirect clients to a malicious server that denies all mapping creation.
section: 18.3.1
topics:
    - nat
    - security
