document: rfc-9552
kind: wire-format
summary: 'The IGP Router-ID sub-TLV (code 515, variable length) encodes: IS-IS non-pseudonode as 6-octet ISO System-ID; IS-IS pseudonode as 6-octet DIS Node-ID + 1-octet nonzero PSN (7 octets); OSPFv2/v3 non-pseudonode as 4-octet Router-ID; OSPFv2 pseudonode as 4-octet DR Router-ID + 4-octet DR interface IPv4 address.'
section: 5.2.1.4
topics:
    - bgp
    - routing
