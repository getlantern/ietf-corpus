document: rfc-3878
kind: design-rationale
summary: The ARC feature provides automatic in-service provisioning by suppressing alarm reporting during service setup, customer testing, and maintenance activities. Once a resource is problem-free, alarm reporting can be automatically or manually turned on, reducing unnecessary work items and maintenance costs.
