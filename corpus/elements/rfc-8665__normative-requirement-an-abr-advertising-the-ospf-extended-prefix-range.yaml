document: rfc-8665
kind: normative-requirement
summary: An ABR advertising the OSPF Extended Prefix Range TLV between areas MUST set the IA-Flag. An ABR only propagates an inter-area Prefix Range advertisement from the backbone to nonbackbone areas if it is the best one, preferring intra-area over inter-area advertisements.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
