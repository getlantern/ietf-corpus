document: rfc-7434
kind: security-consideration
summary: If ISDN forms part of the call route, the security level of the ISDN service may be lower than that of SIP. ISDN security exists only on a hop-by-hop basis and is not definable end-to-end; it can range from high (requiring physical access to secure premises) to low (at building entry points). Applications requiring higher security should use a different package or data transfer method.
section: "14"
topics:
    - sip
    - security
    - realtime
    - voip
