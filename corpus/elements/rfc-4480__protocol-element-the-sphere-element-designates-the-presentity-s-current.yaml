document: rfc-4480
kind: protocol-element
summary: The <sphere> element designates the presentity's current overall role (e.g., 'work', 'home', or a custom value). It is intended for use with authorization rules, allowing the presentity to control which groups of contacts can see their presence based on their current sphere.
section: "3.11"
topics:
