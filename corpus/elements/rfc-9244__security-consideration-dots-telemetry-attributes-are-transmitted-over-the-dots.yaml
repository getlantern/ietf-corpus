document: rfc-9244
kind: security-consideration
summary: DOTS telemetry attributes are transmitted over the DOTS signal channel, which requires mutual authentication and encryption (DTLS). A DOTS server MUST treat attack details received from DOTS clients as hints only and cannot completely rely on or trust them, as the client's detection may differ from the server's own analysis.
section: "14.1"
topics:
    - security
