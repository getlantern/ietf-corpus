document: rfc-8661
kind: design-rationale
summary: SRMS advertisements are propagated through standard inter-area advertisement procedures in link-state protocols (IS-IS, OSPF), and a preference mechanism supports primary/secondary SRMS schemes allowing controlled SID migration. Multiple SRMSes can be provisioned for redundancy, with the expectation that operator policy keeps their mappings consistent.
section: 3.2.3
topics:
    - mpls
    - routing
