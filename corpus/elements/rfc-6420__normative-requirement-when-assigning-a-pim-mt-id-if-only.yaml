document: rfc-6420
kind: normative-requirement
summary: When assigning a PIM MT-ID, if only one unicast routing protocol contributes routes to a topology, the PIM MT-ID is RECOMMENDED to be assigned the same value as the IGP topology identifier to reduce management overhead.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
