document: rfc-7009
kind: protocol-element
summary: The 'token_type_hint' parameter is an optional hint to help the authorization server optimize token lookup. If the server cannot locate the token using the given hint, it MUST extend its search across all supported token types; it MAY ignore this parameter entirely.
section: "2.1"
topics:
