document: rfc-4112
kind: registry
summary: The URN sub-namespace urn:ietf:params:ecml is permanently registered per RFC 3553; subordinate values are registered by RFC publication and, once registered, may never change. The sub-value 'v2.0' is registered by this document to identify ECML v2.0-conformant fields.
