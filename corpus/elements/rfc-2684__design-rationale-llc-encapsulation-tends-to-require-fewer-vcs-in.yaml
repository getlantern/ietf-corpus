document: rfc-2684
kind: design-rationale
summary: LLC encapsulation tends to require fewer VCs in a multiprotocol environment. VC multiplexing reduces fragmentation overhead and can reduce per-packet processing; for example, an IPv4 TCP control packet with no options exactly fits one ATM cell.
