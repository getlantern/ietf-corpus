document: rfc-2355
kind: normative-requirement
summary: During FUNCTIONS negotiation, neither party may add to the function-list it receives any function that it previously added and the other side has already removed, preventing infinite negotiation loops.
section: 7.2.1
rfc2119_level: MUST NOT
