document: rfc-8910
kind: security-consideration
summary: Clients processing Captive-Portal options SHOULD validate that the option's contents conform to URI validation requirements including those in RFC 3986. In the absence of RA-Guard (RFC 6105, RFC 7113) or DHCPv6-Shield (RFC 7610), an attacker could inject, modify, or block DHCP messages or RAs to force users to contact an attacker-chosen address.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
