document: rfc-6960
kind: normative-requirement
summary: 'Before accepting a signed OCSP response, clients SHALL confirm: the certificate in the response matches the request, the signature is valid, the signer identity matches the intended recipient, the signer is currently authorized, thisUpdate is sufficiently recent, and (when present) nextUpdate is greater than current time.'
section: "3.2"
rfc2119_level: REQUIRED
topics:
