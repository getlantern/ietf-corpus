document: rfc-9658
kind: wire-format
summary: The MT IP address family data format consists of a 32-bit IPv4 address (or 128-bit IPv6 address) followed by an 8-bit Reserved field (MUST be zero on transmission, ignored on receipt), an 8-bit IPA field, and a 16-bit MT-ID field. This updates RFC 7307 by repurposing 8 bits from the previously 16-bit Reserved field.
section: 3.1.2
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
