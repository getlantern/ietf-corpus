document: rfc-9177
kind: wire-format
summary: Q-Block1 (option number 19) and Q-Block2 (option number 31) are encoded as unsigned integers of 0–3 bytes with no default value. The structure mirrors the Block1/Block2 option from RFC 7959, comprising a block number (NUM), a More bit (M), and a size exponent (SZX).
section: "4.2"
