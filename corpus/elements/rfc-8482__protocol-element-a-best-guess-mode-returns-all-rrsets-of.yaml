document: rfc-8482
kind: protocol-element
summary: A 'best guess' mode returns all RRsets of RRTYPE CNAME, MX, A, and AAAA present at the owner name while suppressing others such as TXT and DNSKEY. This heuristic satisfies common application needs but produces larger responses than the subset or synthesized-HINFO approaches.
section: "4.3"
topics:
