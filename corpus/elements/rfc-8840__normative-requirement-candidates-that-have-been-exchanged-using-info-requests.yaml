document: rfc-8840
kind: normative-requirement
summary: Candidates that have been exchanged using INFO requests SHALL be included in subsequent Offers or Answers, and the version number in the 'o=' line of the subsequent Offer needs to be incremented by 1 per RFC 3264 rules.
