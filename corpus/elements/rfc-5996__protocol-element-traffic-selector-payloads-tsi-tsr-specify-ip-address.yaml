document: rfc-5996
kind: protocol-element
summary: Traffic Selector payloads (TSi, TSr) specify IP address ranges, port ranges, and IP protocol numbers for traffic to be protected by a Child SA. The Traffic Selector type distinguishes IPv4 (TS_IPV4_ADDR_RANGE) and IPv6 (TS_IPV6_ADDR_RANGE) selectors. The responder may narrow but MUST NOT widen the initiator's proposed selectors.
section: "3.13"
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
