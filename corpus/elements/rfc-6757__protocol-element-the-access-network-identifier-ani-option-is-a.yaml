document: rfc-6757
kind: protocol-element
summary: The Access Network Identifier (ANI) option is a PMIPv6 mobility header option (Type 52) carried in Proxy Binding Update and Proxy Binding Acknowledgement messages to convey access network information from the MAG to the LMA. At most one instance of this option is permitted per mobility message, and it MUST contain one or more ANI sub-options.
section: "3"
topics:
    - mobility
    - ip
