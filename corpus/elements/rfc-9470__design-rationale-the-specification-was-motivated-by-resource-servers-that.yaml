document: rfc-9470
kind: design-rationale
summary: The specification was motivated by resource servers that require different authentication strengths or recentness based on dynamic, request-time logic opaque to the authorization server (e.g., purchase value thresholds or per-request risk evaluation), which static provisioning-time authorization policies cannot satisfy.
