summary: 'Each FCI entry in the PAUSE-RESUME message contains: Target SSRC (32 bits), Type (4 bits: 0=PAUSE, 1=RESUME, 2=PAUSED, 3=REFUSED, 4-15 reserved), Res (4 bits, must be 0), Parameter Len (8 bits, length of Type Specific in 32-bit words), PauseID (16 bits), and a variable-length Type Specific field.'
