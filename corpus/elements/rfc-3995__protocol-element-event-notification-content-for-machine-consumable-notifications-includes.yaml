document: rfc-3995
kind: protocol-element
summary: 'Event Notification content for Machine Consumable notifications includes: notify-subscription-id, notify-printer-uri, notify-printer-up-time, notify-printer-name, notify-subscribed-event, notify-sequence-number, notify-charset, notify-user-data, notify-natural-language, and printer-up-time. Job Events additionally include job-id, job-state, job-state-reasons, and job-impressions-completed.'
section: "9.1"
extracted_by: claude-sonnet-4-6
