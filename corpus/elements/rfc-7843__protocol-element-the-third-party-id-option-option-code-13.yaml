document: rfc-7843
kind: protocol-element
summary: The THIRD_PARTY_ID option (Option Code 13) is a new PCP option designed to be used together with the THIRD_PARTY option to uniquely identify a third party (internal host) in cases where the IP address alone is insufficient, such as CGN deployments with overlapping private address spaces.
