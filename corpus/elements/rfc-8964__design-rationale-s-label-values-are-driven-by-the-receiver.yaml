document: rfc-8964
kind: design-rationale
summary: S-Label values are driven by the receiver rather than the sender, consistent with pseudowire encapsulation conventions. Labels may be taken from the platform label space (making them unique regardless of input interface) or from a per-interface space requiring F-Labels for disambiguation; the choice is a local implementation decision.
section: "3.1"
topics:
    - mpls
