document: rfc-7268
kind: protocol-element
summary: Preauth-Timeout (Type 178) sets the maximum number of seconds the NAS must retain pre-authentication state (e.g., a Pairwise Master Key derived via IEEE 802.11 pre-authentication) before the session is established. After a session is underway, this attribute has no effect; Session-Timeout governs maximum session time.
section: "2.6"
topics:
    - radius
    - security
