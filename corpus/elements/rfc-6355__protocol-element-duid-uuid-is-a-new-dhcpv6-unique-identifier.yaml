document: rfc-6355
kind: protocol-element
summary: DUID-UUID is a new DHCPv6 Unique Identifier type (type code 4) that embeds a 128-bit UUID as defined in RFC 4122. It is carried within Client Identifier or Server Identifier options in DHCPv6 messages.
