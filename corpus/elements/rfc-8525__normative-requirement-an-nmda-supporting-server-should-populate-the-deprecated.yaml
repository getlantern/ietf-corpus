document: rfc-8525
kind: normative-requirement
summary: An NMDA-supporting server SHOULD populate the deprecated '/modules-state' tree in a backwards-compatible manner, reporting YANG modules with 'config true' nodes configurable via conventional datastores and 'config false' nodes returned via NETCONF <get>.
section: "1"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
