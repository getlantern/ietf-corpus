document: rfc-8561
kind: security-consideration
summary: 'Access to NETCONF and RESTCONF management interfaces must use secure transports: SSH (RFC 6242) is mandatory-to-implement for NETCONF, and TLS (RFC 8446) is mandatory-to-implement for RESTCONF. NACM (RFC 8341) must be used to restrict access to authorized users.'
section: "6"
topics:
