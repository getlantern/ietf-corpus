document: rfc-9483
kind: design-rationale
summary: When design flexibility existed, complexity was placed in PKI management entities rather than EEs, because management entities typically have more computational resources. This minimizes resource requirements for memory-constrained IoT devices while keeping the mandatory-to-implement feature set for EEs small.
section: "1.3"
topics:
