document: rfc-9352
kind: security-consideration
summary: IS-IS is deployed under a single administrative domain but deployments may expose the routing domain to potential attackers. Stronger authentication mechanisms from RFC 5304 and RFC 5310 SHOULD be used. Advertising incorrect MSD values may have negative consequences, and security concerns for the O-flag and Flexible Algorithms are addressed in RFC 9259 and RFC 9350, respectively.
section: "12"
rfc2119_level: SHOULD
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
