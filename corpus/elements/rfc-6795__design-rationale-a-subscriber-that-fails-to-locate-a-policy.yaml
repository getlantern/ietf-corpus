document: rfc-6795
kind: design-rationale
summary: A subscriber that fails to locate a policy server MAY continue setting up the session without session-specific policies rather than being blocked, to prevent a failed policy server from preventing session establishment. However, such sessions may be blocked by policy enforcement mechanisms.
section: "3.6"
topics:
    - sip
