document: rfc-6206
kind: security-consideration
summary: An adversary can force excessive packet transmissions by triggering Trickle timer resets, increasing energy consumption and potentially depleting battery-powered nodes. Protocols should authenticate any messages or events that can cause a timer reset to prevent forgery.
section: "8"
topics:
    - security
    - realtime
