document: rfc-9008
kind: normative-requirement
summary: If the 6LN is a RUL, the root that encapsulates a packet SHOULD terminate the IP-in-IP tunnel at the parent 6LR rather than all the way to the RUL, since it cannot be assumed that a RUL supports IP-in-IP decapsulation.
section: 4.1.1
rfc2119_level: SHOULD
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
