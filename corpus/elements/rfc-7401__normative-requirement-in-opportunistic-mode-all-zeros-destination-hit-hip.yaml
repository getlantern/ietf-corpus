document: rfc-7401
kind: normative-requirement
summary: In opportunistic mode (all-zeros destination HIT), HIP implementations MUST NOT place any expectation that the peer's HI returned in R1 matches any HI previously seen from that address, since the peer may be a different host.
section: 4.1.8
rfc2119_level: MUST NOT
