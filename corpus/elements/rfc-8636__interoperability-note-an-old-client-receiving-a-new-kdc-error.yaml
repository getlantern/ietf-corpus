summary: An old client receiving a new KDC error containing TD-CMS-DIGEST-ALGORITHMS-DATA or TD-CERT-DIGEST-ALGORITHMS-DATA typed data will silently ignore those unknown elements, since typed data encoding allows unknown elements to be skipped.
