document: rfc-2455
kind: protocol-element
summary: 'appnNodeLsCounterType indicates which ANR traffic the node counts in link station byte/frame statistics: other(1), noAnr(2), anrForLocalNces(3) (only locally terminating RTP connections), or allAnr(4). ISR traffic is always counted regardless of this setting.'
