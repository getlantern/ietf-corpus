document: rfc-4424
kind: protocol-element
summary: VMR-WB mode 4 is a new operating mode added to the VMR-WB codec, operating at lower average data rates than existing modes (0-3) to improve system capacity in IP and non-IP networks. It has similar characteristics to existing modes including variable bit rate, wideband processing, and discontinuous transmission support.
