document: rfc-8019
kind: security-consideration
summary: 'Puzzle difficulty must be balanced carefully: puzzles too easy fail to stop attackers; puzzles too hard cause unacceptable latency and power consumption for legitimate Initiators (especially battery-powered or mobile devices), which itself constitutes a DoS success. It is RECOMMENDED to dynamically adjust difficulty based on current Responder load.'
section: "10"
topics:
    - ipsec
    - security
