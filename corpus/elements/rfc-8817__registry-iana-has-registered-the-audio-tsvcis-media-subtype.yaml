summary: IANA has registered the 'audio/TSVCIS' media subtype in the 'RTP Payload Format Media Types' registry per RFC 4855 and RFC 6838. Required clock rate is 8000 Hz; the media type is framed and binary and is only defined for transfer via RTP.
