document: rfc-4776
kind: security-consideration
summary: DHCP messages have no privacy protection; an eavesdropper monitoring the link between server and client can discover location information. Usage of this option on networks without access restrictions or without network-layer or link-layer privacy mechanisms is NOT RECOMMENDED.
section: "6"
topics:
    - security
    - privacy
