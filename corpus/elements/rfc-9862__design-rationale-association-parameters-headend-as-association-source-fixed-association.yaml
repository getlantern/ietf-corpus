document: rfc-9862
kind: design-rationale
summary: Association parameters (Headend as Association Source, fixed Association ID=1, Color and Endpoint in the Extended Association ID TLV) are encoded deterministically so all PCEP speakers independently compute the same parameters from SR Policy attributes, eliminating race conditions when multiple speakers associate the same SR Policy simultaneously.
