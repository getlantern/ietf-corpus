document: rfc-4202
kind: interoperability-note
summary: An opaque OXC interface is always advertised as LSC (not FSC), even when external DWDM is present, because it handles a single wavelength transparently; the DWDM framing must match the OXC framing. A PXC interface with no external DWDM is advertised as FSC because it is not limited to one wavelength.
section: "3.5"
topics:
    - routing
