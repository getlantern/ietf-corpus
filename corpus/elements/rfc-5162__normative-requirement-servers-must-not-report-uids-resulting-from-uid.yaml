document: rfc-5162
kind: normative-requirement
summary: 'Servers MUST NOT report UIDs resulting from UID FETCH (VANISHED) or SELECT/EXAMINE (QRESYNC) in the same VANISHED response as UIDs of messages expunged now. Instead, the server MUST send separate VANISHED responses: one with EARLIER and one without.'
section: "3.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
