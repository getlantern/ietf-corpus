document: rfc-7143
kind: protocol-element
summary: 'The SNACK Request PDU requests retransmission of missed data, R2T, or status PDUs. The Type field (4 bits) specifies: Data/R2T SNACK (0), Status SNACK (1), Data ACK (2), R-Data SNACK (3). BegRun (4 bytes) and RunLength (4 bytes) identify the starting DataSN/R2TSN and count of missing PDUs.'
section: "11.16"
topics:
