document: rfc-5510
kind: normative-requirement
summary: It is RECOMMENDED that the 'n-algorithm' be used by a sender to determine max_n and n, though other algorithms remain possible. A receiver MAY use the receiver part of the n-algorithm to estimate n, but MUST be prepared to handle symbols with an ESI >= the computed n value.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
