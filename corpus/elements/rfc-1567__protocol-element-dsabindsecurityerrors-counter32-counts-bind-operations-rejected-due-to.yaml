document: rfc-1567
kind: protocol-element
summary: dsaBindSecurityErrors (Counter32) counts bind operations rejected due to inappropriateAuthentication or invalidCredentials, as defined in X.511 Section 12.7.2. This is distinct from dsaSecurityErrors which counts post-bind security failures.
