document: rfc-8445
kind: protocol-element
summary: 'Candidate priority is computed as: priority = (2^24)*(type preference) + (2^8)*(local preference) + (2^0)*(256 - component ID). Recommended type preferences are 126 for host, 110 for peer-reflexive, 100 for server-reflexive, and 0 for relayed candidates.'
