document: rfc-7686
kind: design-rationale
summary: Ownership of a .onion name is derived solely from control of a public/private key pair corresponding to the algorithmic derivation of the name. Because the Tor network has no central controlling authority, .onion names cannot be registered, assigned, transferred, or revoked through any registry.
section: "1"
