kind: normative-requirement
summary: 'To avoid routing-loop recursive encapsulation, two mechanisms must be used together: decrementing the original packet hop limit at each forwarding/encapsulation operation, and decrementing the tunnel encapsulation limit at each nested encapsulation.'
