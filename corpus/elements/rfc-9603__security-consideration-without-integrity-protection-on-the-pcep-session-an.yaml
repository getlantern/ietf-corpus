document: rfc-9603
kind: security-consideration
summary: Without integrity protection on the PCEP session, an attacker could inject an SRv6 path bypassing verification checks. Additionally, the MSD field in the Open message can disclose node forwarding capabilities. Therefore, securing PCEP sessions using TLS (RFC 8253) is RECOMMENDED.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
