document: rfc-2734
kind: design-rationale
summary: MCAP uses a cooperative protocol over the existing broadcast channel rather than a dedicated management channel so that all IP-capable nodes, which must already monitor the broadcast channel, can participate without requiring extra channel allocation or separate signaling infrastructure.
