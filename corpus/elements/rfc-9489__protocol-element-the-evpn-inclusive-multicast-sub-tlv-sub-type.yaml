document: rfc-9489
kind: protocol-element
summary: The EVPN Inclusive Multicast sub-TLV (sub-type 43) verifies multicast connectivity state on peer PEs in EVPN and PBB-EVPN networks. Fields include Route Distinguisher (8 octets), Ethernet Tag ID (4 octets), IP Addr Len (1 octet), and Originating Router's IP Addr (4 or 16 octets).
section: "4.2"
topics:
    - mpls
    - routing
    - multicast
