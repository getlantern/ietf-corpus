document: rfc-8666
kind: security-consideration
summary: OSPFv3 with SR extensions now directly programs the MPLS data plane without requiring LDP or RSVP-TE. Attacks on the OSPF control plane can therefore result in MPLS traffic misrouting, which can be more difficult to detect and isolate than IP misrouting.
section: "11"
topics:
    - security
    - mpls
    - routing
