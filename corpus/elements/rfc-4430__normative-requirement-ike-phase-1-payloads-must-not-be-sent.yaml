document: rfc-4430
kind: normative-requirement
summary: IKE phase 1 payloads MUST NOT be sent in KINK. All capabilities and requirements in IKE Quick Mode MUST be supported unless otherwise noted. KINK MUST NOT send multiple Quick Mode transactions within a single KINK_ISAKMP payload.
section: "5"
rfc2119_level: MUST NOT
topics:
