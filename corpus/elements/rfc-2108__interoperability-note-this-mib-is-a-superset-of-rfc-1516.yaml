document: rfc-2108
kind: interoperability-note
summary: This MIB is a superset of RFC 1516, which is obsoleted and goes to historic status. All RFC 1516 objects are retained but many are deprecated. Scalar objects under rptrRptrInfo and rptrMonitorRptrInfo always duplicate the first entry of the new multi-repeater tables (rptrInfoTable and rptrMonTable) for backwards compatibility.
section: "2.1"
topics:
