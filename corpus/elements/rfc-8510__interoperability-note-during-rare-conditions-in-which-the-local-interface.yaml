document: rfc-8510
kind: interoperability-note
summary: During rare conditions in which the Local Interface ID changes, a timing window may exist where the values advertised through LLS and the Link Local TE Opaque LSA differ. This situation is temporary; values via both mechanisms should converge once the next Hello and/or Link Local TE Opaque LSA is regenerated.
