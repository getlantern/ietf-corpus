document: rfc-6773
kind: protocol-element
summary: UDP port 6511 is the IANA-assigned default listening UDP port for a DCCP-UDP server. It is allocated for use by the transport service rather than a specific application, enabling a system-wide DCCP-UDP daemon to multiplex multiple DCCP applications over the same port.
section: "3.8"
