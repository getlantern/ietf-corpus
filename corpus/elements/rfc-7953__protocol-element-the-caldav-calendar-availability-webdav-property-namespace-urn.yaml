document: rfc-7953
kind: protocol-element
summary: The CALDAV:calendar-availability WebDAV property (namespace urn:ietf:params:xml:ns:caldav) is defined on a CalDAV scheduling Inbox collection. Its value MUST be a valid iCalendar object containing exactly one VAVAILABILITY component and optionally VTIMEZONE components; no other iCalendar components are permitted.
section: 7.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
