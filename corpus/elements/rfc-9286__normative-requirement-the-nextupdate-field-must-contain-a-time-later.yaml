document: rfc-9286
kind: normative-requirement
summary: The nextUpdate field MUST contain a time later than thisUpdate. If any published objects change, a new manifest MUST be issued. Even with no changes, a new manifest MUST be issued before the nextUpdate time.
section: 4.2.1
rfc2119_level: MUST
topics:
    - pkix
    - security
