document: rfc-8276
kind: design-rationale
summary: 'A new separate protocol mechanism was created rather than mapping xattrs to named attributes because such a mapping would be a compromise: a client using xattrs through named attributes with a server supporting xattrs directly would get a lower level of service, and file systems implementing both natively would need additional guidance on namespace reservation.'
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
