summary: Impairment-aware optical networks and flexi-grid are explicitly out of scope; separate YANG models ([OPT-IMPAIR-AWARE-YANG] and [FLEXI-GRID-YANG]) address those cases. Transponder models and resource block models (e.g., 3R) are also excluded, narrowing this document to fixed-grid transparent WSON topology.
