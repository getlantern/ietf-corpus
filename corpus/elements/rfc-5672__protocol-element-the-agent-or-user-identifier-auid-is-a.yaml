document: rfc-5672
kind: protocol-element
summary: The Agent or User Identifier (AUID) is a single identifier, comprising a domain name and optional Local-part, that refers to the agent or user on behalf of whom the SDID has taken responsibility. The domain name must equal or be a subdomain of the SDID, and it is specified via the i= tag.
section: "7"
topics:
