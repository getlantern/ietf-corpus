document: rfc-4419
kind: normative-requirement
summary: The server should return the smallest group it knows that is larger than the client-requested size. If no larger group exists, the server SHOULD return the largest group it knows, and in all cases the returned group SHOULD be at least 1024 bits.
section: "3"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
