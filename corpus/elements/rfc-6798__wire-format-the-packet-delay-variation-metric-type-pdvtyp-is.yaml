document: rfc-6798
kind: wire-format
summary: 'The Packet Delay Variation Metric Type (pdvtyp) is a 4-bit unsigned integer identifying the PDV algorithm: 0 = MAPDV2 (ITU-T G.1020 Clause 6.2.3.2), 1 = 2-point PDV (ITU-T Y.1540 Clause 6.2.4). Values 2–15 are reserved.'
