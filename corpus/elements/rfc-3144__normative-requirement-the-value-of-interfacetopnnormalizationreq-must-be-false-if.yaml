document: rfc-3144
kind: normative-requirement
summary: The value of interfaceTopNNormalizationReq MUST be false if the effective speed of the interface sub-layer as determined from ifSpeed is zero, conforming to the ifSpeed definition in RFC 2863 for sub-layers with no concept of bandwidth.
section: "6"
rfc2119_level: MUST
topics:
