document: rfc-7916
kind: design-rationale
summary: Link coloring reuses standardized administrative-group IGP extensions (RFC 5305 for IS-IS, RFC 3630 for OSPF) that are already widely implemented, enabling operators to define a color system analogous to TE affinities or BGP communities and apply policies uniformly across many nodes without per-node reconfiguration.
section: 6.2.4.2
topics:
    - routing
