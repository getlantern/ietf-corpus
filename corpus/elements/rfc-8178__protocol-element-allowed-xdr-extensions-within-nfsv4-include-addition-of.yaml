document: rfc-8178
kind: protocol-element
summary: 'Allowed XDR extensions within NFSv4 include: addition of new operation codes within COMPOUND/CB_COMPOUND; addition of new attributes with bitmap positions and XDR typedefs; addition of new values to existing enums; addition of previously unassigned bit values to flag words; and addition of new cases to existing switches that lacked a default case. New RPC procedures are never allowed.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
