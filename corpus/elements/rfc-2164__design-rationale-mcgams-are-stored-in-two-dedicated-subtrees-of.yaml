document: rfc-2164
kind: design-rationale
summary: MCGAMs are stored in two dedicated subtrees of the DIT rather than in routing subtrees. This allows mapping information to be widely replicated efficiently, facilitates migration from a table-based approach, and handles missing OR address components naturally. The alternative of co-locating with routing subtrees was explicitly rejected as offering fewer benefits.
