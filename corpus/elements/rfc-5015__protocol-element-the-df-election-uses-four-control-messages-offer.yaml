document: rfc-5015
kind: protocol-element
summary: 'The DF election uses four control messages: Offer (advertising sender metric), Winner (declaring DF status), Backoff (DF acknowledging a better offer and instructing others to hold), and Pass (old DF transferring responsibility to the best offering router). All are sent to the ALL-PIM-ROUTERS group with TTL 1.'
section: 3.5.3.2
topics:
    - multicast
    - routing
