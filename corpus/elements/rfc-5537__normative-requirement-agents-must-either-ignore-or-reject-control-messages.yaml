document: rfc-5537
kind: normative-requirement
summary: Agents MUST either ignore or reject control messages with unrecognized types. The presence of a Subject header field beginning with 'cmsg ' MUST NOT cause an article to be treated as a control message; only the presence of a Control header field confers that status.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
