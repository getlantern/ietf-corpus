document: rfc-8261
kind: normative-requirement
summary: The DTLS implementation SHOULD allow the DTLS user to set the DSCP value for sent IP packets. Only a single DSCP value can be used for all packets belonging to the same SCTP association.
section: "5"
rfc2119_level: SHOULD
