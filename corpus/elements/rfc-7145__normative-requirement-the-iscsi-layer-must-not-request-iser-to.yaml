document: rfc-7145
kind: normative-requirement
summary: The iSCSI layer MUST NOT request iSER to allocate RCaP connection resources until sufficiently far into the Login Phase. If the Login Phase includes a SecurityNegotiation stage, resource allocation MUST be deferred to the LoginOperationalNegotiation stage, after authentication is completed.
section: 5.1.2
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
