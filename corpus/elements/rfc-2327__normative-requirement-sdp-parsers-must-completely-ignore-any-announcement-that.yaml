document: rfc-2327
kind: normative-requirement
summary: SDP parsers MUST completely ignore any announcement that contains a type letter they do not understand. Unrecognised attributes must also be ignored. This strict ignore-unknown policy enables forward compatibility without breaking deployed implementations.
section: "6"
rfc2119_level: MUST
