document: rfc-5810
kind: design-rationale
summary: TLV structuring is used throughout the protocol because it provides binary type-value encoding analogous to XML tag-value pairs, enables fast generalized binary parsing, and supports forward/backward compatibility—old implementations silently ignore unknown TLVs just as XML parsers ignore unknown tags.
