document: rfc-6775
kind: interoperability-note
summary: Multihop prefix/context distribution (ABRO + 6CO between routers) and multihop DAD (DAR/DAC) are individually substitutable by routing protocol mechanisms. However, if substitution of ABRO is intended, 6CO MUST also be substituted simultaneously; they cannot be replaced independently.
section: "1.4"
topics:
    - ip
    - v6ops
