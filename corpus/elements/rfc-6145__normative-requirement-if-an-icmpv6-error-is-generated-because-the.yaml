document: rfc-6145
kind: normative-requirement
summary: If an ICMPv6 error is generated because the IPv6 source address is not IPv4-translatable and the translator is stateless, the message MUST have Type 1 Code 5 (Source address failed ingress/egress policy). In other discard cases it MUST have Type 1 Code 1.
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
