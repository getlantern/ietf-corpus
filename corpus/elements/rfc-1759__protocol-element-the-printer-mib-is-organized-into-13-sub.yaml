summary: 'The Printer MIB is organized into 13 sub-unit groups: General Printer, Input, Media, Output, Finisher, Marker, Marker Supplies, Marker Colorant, Media Path, Channel, Interpreter, Console, and Alerts. Each sub-unit reports description and status information; only Alerts reports event information.'
