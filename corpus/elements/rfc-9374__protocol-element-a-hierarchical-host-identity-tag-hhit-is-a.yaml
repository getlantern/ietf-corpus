document: rfc-9374
kind: protocol-element
summary: A Hierarchical Host Identity Tag (HHIT) is a valid but non-routable IPv6 address that serves as a self-asserting identifier. When used for UAS Remote ID, HHITs are called DRIP Entity Tags (DETs). They encode an explicit administrative hierarchy in the ORCHID construction, enabling registry discovery via DNS or RDAP.
