document: rfc-2474
kind: normative-requirement
summary: PHB group specifications MUST identify any possible packet re-ordering implications for each individual PHB and when packets within a microflow are marked for different PHBs within the group. It is RECOMMENDED that PHB implementations not introduce re-ordering within a microflow.
section: "5"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
