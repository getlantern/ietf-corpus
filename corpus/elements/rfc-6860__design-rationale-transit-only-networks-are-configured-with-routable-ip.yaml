document: rfc-6860
kind: design-rationale
summary: Transit-only networks are configured with routable IP addresses advertised in LSAs but not needed for data traffic. Hiding them speeds up network convergence and reduces vulnerability to remote attacks by preventing routers from being targeted via these addresses.
section: "1"
topics:
    - routing
    - security
