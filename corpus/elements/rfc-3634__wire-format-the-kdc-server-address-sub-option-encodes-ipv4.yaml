document: rfc-3634
kind: wire-format
summary: 'The KDC Server Address sub-option encodes IPv4 addresses in a TLV format: a 1-octet sub-option code (10), a 1-octet length field (n), followed by n octets of IPv4 addresses (4 octets each). Minimum length is 4 octets; length must always be a multiple of 4.'
