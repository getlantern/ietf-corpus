document: rfc-9658
kind: design-rationale
summary: Since the {MT-ID, IPA} tuple is part of the mLDP FEC, there is no need to support multiple topology forwarding tables or per-topology label forwarding tables in mLDP; each MP LSP will be unique due to the tuple being part of the FEC and will have its own unique local label.
