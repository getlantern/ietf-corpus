document: rfc-9761
kind: design-rationale
summary: MUD (D)TLS ACL matching uses software-based ACLs rather than hardware TCAM because matching on binary data, strings, and (D)TLS parameters requires flexible string matching not available in fixed-length bit-matching hardware. The DNS extension in MUD (RFC 8520) has the same requirement.
