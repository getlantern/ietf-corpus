document: rfc-9246
kind: normative-requirement
summary: The JWT MUST be signed to prevent the UA from altering the claims. The CDNI URI Container (cdniuc) claim is the only mandatory claim and MUST be present in every URI Signing JWT.
section: "1.2"
rfc2119_level: MUST
