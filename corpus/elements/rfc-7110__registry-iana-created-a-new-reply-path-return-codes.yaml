document: rfc-7110
kind: registry
summary: IANA created a new 'Reply Path return codes' subregistry under the MPLS LSP Ping Parameters registry, defining codes 0x0000-0x0005 (including malformed TLV, unknown sub-TLVs, successful reply, and fallback to alternate LSP or IP path), with 0x0006-0xfffb unassigned (Standard Action) and 0xfffc-0xffff reserved for Experimental Use.
section: "7.4"
topics:
