document: rfc-5163
kind: normative-requirement
summary: The most significant bit (R) of each PDU length prefix in PDU-Concat MUST be set to zero by the sender; Receivers MUST ignore its value. The length of each PDU MUST be less than 32758 bytes.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
