document: rfc-8152
kind: normative-requirement
summary: The 'crit' header parameter (label 2) MUST be placed in the protected header bucket and its array MUST contain at least one value. If a label listed in 'crit' is absent from the protected bucket, this is a fatal error in message processing.
section: "3.1"
rfc2119_level: MUST
topics:
    - cbor
    - security
