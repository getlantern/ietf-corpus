document: rfc-3551
kind: normative-requirement
summary: RTP receivers SHOULD monitor packet loss to ensure congestion is within acceptable parameters. Packet loss is acceptable only if a TCP flow across the same path would achieve average throughput not less than the RTP flow, requiring TCP-friendly congestion control or leaving the session if loss is unacceptably high.
section: "2"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
