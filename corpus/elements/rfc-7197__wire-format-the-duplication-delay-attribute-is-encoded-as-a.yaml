document: rfc-7197
kind: wire-format
summary: 'The ''duplication-delay'' attribute is encoded as ''a=duplication-delay:'' followed by one or more period values, each being a positive integer in milliseconds, separated by spaces. ABNF: delaying-attribute = "a=duplication-delay:" periods CRLF; periods = period *( SP period); period = 1*DIGIT.'
