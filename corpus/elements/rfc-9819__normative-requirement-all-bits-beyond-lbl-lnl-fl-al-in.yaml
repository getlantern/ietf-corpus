document: rfc-9819
kind: normative-requirement
summary: All bits beyond LBL + LNL + FL + AL in an SRv6 SID MUST be set to zero. An advertisement of the ARG value MUST specify the size of the argument, its value, the associated SRv6 Endpoint Behavior, and the association with the SID(s) for which it applies (REQUIRED).
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
