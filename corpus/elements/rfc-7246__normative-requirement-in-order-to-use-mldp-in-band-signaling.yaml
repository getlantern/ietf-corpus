document: rfc-7246
kind: normative-requirement
summary: In order to use mLDP in-band signaling procedures for a particular group address in the context of a particular set of VRFs, those VRFs MUST be configured with a range of multicast group addresses for which mLDP in-band signaling is to be enabled.
section: "1"
rfc2119_level: MUST
topics:
