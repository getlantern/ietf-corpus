document: rfc-3986
kind: wire-format
summary: 'Unreserved characters (ALPHA, DIGIT, "-", ".", "_", "~") may appear unencoded in a URI; their percent-encoded equivalents identify the same resource. ABNF: unreserved = ALPHA / DIGIT / "-" / "." / "_" / "~".'
