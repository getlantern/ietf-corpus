document: rfc-5792
kind: design-rationale
summary: PA-TNC chose binary TLV encoding over XML to minimize bandwidth on constrained links (e.g., 802.1X) and reduce CPU overhead on low-power endpoints such as mobile devices. XML encoding remains possible within vendor-defined attribute namespaces where these constraints are less applicable.
section: "2.3"
topics:
    - security
