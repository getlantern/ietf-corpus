document: rfc-1112
kind: normative-requirement
summary: An ICMP error message (Destination Unreachable, Time Exceeded, Parameter Problem, Source Quench, or Redirect) MUST NEVER be generated in response to a datagram destined to an IP host group address.
section: "7.2"
rfc2119_level: MUST NOT
topics:
