document: rfc-4235
kind: normative-requirement
summary: The 'sip.rendering' parameter MUST only be used in a Contact header field in a dialog created using the INVITE request. Its three legal values are 'yes', 'no', and 'unknown', indicating whether the UA is currently rendering any received media.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
