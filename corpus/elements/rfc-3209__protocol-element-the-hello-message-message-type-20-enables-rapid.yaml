document: rfc-3209
kind: protocol-element
summary: The HELLO message (message type 20) enables rapid detection of node failure or restart between adjacent RSVP nodes. It carries HELLO REQUEST (class 22, C-Type 1) or HELLO ACK (class 22, C-Type 2) objects, each containing a 32-bit Src_Instance (non-zero, changed on restart) and 32-bit Dst_Instance (last received Src_Instance; zero in initial Hello).
