document: rfc-4975
kind: normative-requirement
summary: If a node receives a first SEND request whose To-Path URI matches no existing session, it MUST reject the request with a 481 response; if the session is already in use on another connection, it MUST reject with a 506 response.
section: "5.4"
rfc2119_level: MUST
topics:
    - realtime
    - security
