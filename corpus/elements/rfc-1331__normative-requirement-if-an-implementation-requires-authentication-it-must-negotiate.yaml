document: rfc-1331
kind: normative-requirement
summary: If an implementation requires authentication, it MUST negotiate the use of that authentication protocol during Link Establishment. Advancement to the Network-Layer Protocol phase MUST NOT occur until the peer is successfully authenticated; on failure, PPP SHOULD proceed to Link Termination.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - security
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
