document: rfc-8972
kind: normative-requirement
summary: A Session-Sender MUST set U=1 before transmitting; a Session-Reflector MUST set U=1 if it did not understand the TLV, and MUST set U=0 otherwise. If the M flag is set in a reflected packet, the STAMP system MUST stop processing the remainder of the extended packet.
section: "4"
rfc2119_level: MUST
topics:
    - measurement
