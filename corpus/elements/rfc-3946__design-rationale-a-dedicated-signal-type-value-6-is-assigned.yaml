document: rfc-3946
kind: design-rationale
summary: A dedicated signal type (value 6) is assigned to STS-3c SPE rather than coding it as contiguous concatenation of three STS-1 SPEs. This simplifies interworking between SONET and SDH signaling by providing a single canonical representation shared by both hierarchies (STS-3c SPE = VC-4).
section: "2.1"
topics:
