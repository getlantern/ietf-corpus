document: rfc-5575
kind: design-rationale
summary: The validation procedure ties flow specification acceptance to the unicast routing topology so that only the neighboring AS that is the immediate destination of the described traffic can request it be dropped. This prevents an AS from using flow specs to create denial-of-service attacks against traffic destined for others.
section: "6"
topics:
    - bgp
    - routing
    - security
