document: rfc-4790
kind: protocol-element
summary: The collation identifier is a single US-ASCII string that MUST NOT exceed 254 characters, formed by a collation-prefix, a semicolon, a collation-core-name, and optional collation arguments. The ABNF grammar specifies allowed characters as ALPHA, DIGIT, '-', ';', '=', and '.'.
