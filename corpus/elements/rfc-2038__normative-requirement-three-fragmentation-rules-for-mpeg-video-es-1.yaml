document: rfc-2038
kind: normative-requirement
summary: 'Three fragmentation rules for MPEG Video ES: (1) Video_Sequence_Header, when present, will always be at the beginning of an RTP payload; (2) GOP_header, when present, will always be at the beginning or follow a Video_Sequence_Header; (3) Picture_Header, when present, will always be at the beginning or follow a GOP_header.'
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
