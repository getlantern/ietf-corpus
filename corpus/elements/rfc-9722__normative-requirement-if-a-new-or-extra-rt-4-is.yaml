document: rfc-9722
kind: normative-requirement
summary: If a new or extra RT-4 is received without the T-bit during an ongoing SCT-based DF Election sequence, all SCT-based delays MUST be canceled and DF Election is immediately applied as specified in RFC 7432, as if no SCT had been previously exchanged.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
