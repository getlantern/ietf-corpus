document: rfc-5380
kind: design-rationale
summary: Dynamic MAP Discovery from RFC 4140 was removed in this specification because its scalability was seen as inappropriate for large-scale deployments and it was prone to routing loops. MAP configuration is now static (manual AR configuration).
