document: rfc-1533
kind: wire-format
summary: DHCP options and BOOTP vendor extensions use a tag-length-value (TLV) encoding. Each option begins with a 1-octet tag, followed by a 1-octet length (excluding tag and length octets themselves), followed by that many data octets. Only codes 0 (Pad) and 255 (End) are fixed-length with no length octet. All multi-octet quantities are in network byte order.
