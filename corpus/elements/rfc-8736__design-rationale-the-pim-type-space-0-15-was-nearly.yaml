document: rfc-8736
kind: design-rationale
summary: The PIM type space (0–15) was nearly exhausted. Rather than requiring an entirely new header version, types 13, 14, and 15 were repurposed to carry a 4-bit Subtype field in the flag bits, extending the effective type space by 48 values with minimal header change.
section: "1"
topics:
