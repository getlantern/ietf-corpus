document: rfc-5420
kind: normative-requirement
summary: LSRs MUST be prepared to receive the LSP_ATTRIBUTES and LSP_REQUIRED_ATTRIBUTES objects in any order at any position within a Path message. Subsequent instances of these objects within a Path message SHOULD be ignored and MUST be forwarded unchanged.
section: "9"
rfc2119_level: MUST
topics:
    - mpls
    - routing
