document: rfc-8555
kind: interoperability-note
summary: ACME servers intended to be accessible from browser-based clients SHOULD enable CORS and set the Access-Control-Allow-Origin header to '*'. Without CORS headers, same-origin policy in browsers blocks cross-origin ACME requests.
section: "6.1"
topics:
    - http
    - security
