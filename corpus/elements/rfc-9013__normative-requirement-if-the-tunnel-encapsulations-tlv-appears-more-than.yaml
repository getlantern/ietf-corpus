document: rfc-9013
kind: normative-requirement
summary: If the Tunnel Encapsulations TLV appears more than once in an OSPF Router Information LSA, the set of all Tunnel Sub-TLVs from all Tunnel Encapsulations TLVs SHOULD be considered. The scope of the advertisement SHOULD be domain wide.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
