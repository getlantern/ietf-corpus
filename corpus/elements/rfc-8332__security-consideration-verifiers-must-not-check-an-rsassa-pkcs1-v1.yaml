document: rfc-8332
kind: security-consideration
summary: Verifiers MUST NOT check an RSASSA-PKCS1-v1_5 signature by applying the RSA key and then parsing the output to extract the hash, as this may be exploitable. Instead, verifiers MUST apply RSASSA-PKCS1-v1_5 padding to the expected hash and compare the encoded bytes with the RSA operation output.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
