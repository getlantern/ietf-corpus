document: rfc-4447
kind: protocol-element
summary: Attachment identifiers in the Generalized PWid FEC consist of an Attachment Group Identifier (AGI), a Source Attachment Individual Identifier (SAII), and a Target Attachment Individual Identifier (TAII). The AGI must be the same at both endpoints; the combination of PE router IP address and AI must be globally unique.
section: 5.3.1
topics:
