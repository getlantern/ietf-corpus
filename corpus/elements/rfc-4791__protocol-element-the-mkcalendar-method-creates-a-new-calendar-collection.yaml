document: rfc-4791
kind: protocol-element
summary: The MKCALENDAR method creates a new calendar collection resource. Support is RECOMMENDED but not REQUIRED because some servers support only one calendar per user. If a MKCALENDAR request fails, the server state preceding the request MUST be restored.
section: 5.3.1
topics:
