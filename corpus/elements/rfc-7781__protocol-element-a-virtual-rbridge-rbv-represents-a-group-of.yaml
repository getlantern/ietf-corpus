document: rfc-7781
kind: protocol-element
summary: A Virtual RBridge (RBv) represents a group of edge RBridges to which at least one CE is multiply attached via an LAALP. It is identified campus-wide by a single pseudo-nickname distinct from any physical RBridge's regular nickname(s). Member RBridges use this pseudo-nickname as the ingress nickname when ingressing frames received on RBv ports.
section: "3"
topics:
    - routing
