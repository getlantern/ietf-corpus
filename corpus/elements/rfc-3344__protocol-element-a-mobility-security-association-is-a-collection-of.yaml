document: rfc-3344
kind: protocol-element
summary: A Mobility Security Association is a collection of security contexts between a pair of nodes, each specifying an authentication algorithm and mode, a secret (shared key or key pair), and a replay protection style (timestamps or nonces). It is indexed by SPI and IP address.
