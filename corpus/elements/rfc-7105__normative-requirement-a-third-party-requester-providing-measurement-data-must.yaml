document: rfc-7105
kind: normative-requirement
summary: 'A third-party requester providing measurement data MUST be authorized to provide the specific measurement for the identified Device: either the LIS trusts the third party for that measurement type, or the measurement data MUST be validated before use.'
section: "6.4"
rfc2119_level: MUST
topics:
