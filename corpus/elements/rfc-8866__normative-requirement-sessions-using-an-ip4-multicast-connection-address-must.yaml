document: rfc-8866
kind: normative-requirement
summary: Sessions using an 'IP4' multicast connection address MUST also have a TTL value present. TTL values MUST be in the range 0–255. For 'IP6' multicast, the TTL value MUST NOT be present.
section: "5.7"
rfc2119_level: MUST
topics:
    - realtime
    - multicast
    - ip
