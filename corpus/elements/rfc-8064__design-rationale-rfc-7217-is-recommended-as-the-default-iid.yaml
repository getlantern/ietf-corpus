document: rfc-8064
kind: design-rationale
summary: RFC 7217 is recommended as the default IID generation scheme because it produces semantically opaque identifiers that are stable within a subnet but change across networks, thereby preserving the operational benefits of stable addresses while eliminating the privacy and security harms of MAC-derived IIDs.
section: "1"
topics:
    - ip
    - privacy
    - security
