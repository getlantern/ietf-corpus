document: rfc-8797
kind: design-rationale
summary: The inline threshold negotiation was motivated by NFS version 4 COMPOUND operations being larger on average than NFS version 3 procedures, and by RPCSEC_GSS increasing RPC header sizes, both of which force costly explicit RDMA operations under the 1024-byte default threshold.
section: "3.1"
