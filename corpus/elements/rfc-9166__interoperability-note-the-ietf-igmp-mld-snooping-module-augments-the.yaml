document: rfc-9166
kind: interoperability-note
summary: The ietf-igmp-mld-snooping module augments the core routing data model (RFC 8349) rather than the IGMP/MLD protocol model (RFC 8652). Implementations do not need RFC 8652 support, and the two models are independent of each other.
