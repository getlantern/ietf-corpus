document: rfc-8920
kind: normative-requirement
summary: The SABM Length and UDABM Length fields MUST each be set to 0, 4, or 8. If either field is absent, its length MUST be set to 0. If either length is any value other than 0, 4, or 8, the entire ASLA sub-TLV MUST be ignored by the receiver.
section: "5"
rfc2119_level: MUST
topics:
    - routing
