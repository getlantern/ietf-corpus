document: rfc-5051
kind: security-consideration
summary: 'Implementations MUST consider whether result variation across implementations is a problem for their use case. Four sources of variation are identified: (1) new Unicode characters with unknown decomposition/titlecase properties, (2) optional NFKD normalization of out-of-order diacriticals in step (2)(b), (3) open-ended charset support in step (1)(a), and (4) charset revisions adding new characters.'
section: "4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
