document: rfc-8972
kind: design-rationale
summary: The Location TLV is designed to detect last-hop IP addresses, ports, and MAC addresses. MAC addresses can indicate a path switch on the last hop; IP addresses and UDP ports reveal NAT routers and changes in NAT mapping that could send STAMP packets to the wrong Session-Reflector.
section: 4.2.2
topics:
    - measurement
    - nat
