document: rfc-4868
kind: wire-format
summary: HMAC-SHA-256-128 uses a 512-bit block size, 256-bit output, 128-bit truncated authenticator field, and 256-bit key. HMAC-SHA-384-192 uses 1024-bit block, 384-bit output, 192-bit authenticator, and 384-bit key. HMAC-SHA-512-256 uses 1024-bit block, 512-bit output, 256-bit authenticator, and 512-bit key.
