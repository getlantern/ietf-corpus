document: rfc-4721
kind: design-rationale
summary: The Mobile-AAA Authentication extension is designed so the foreign agent can interact with AAA infrastructure (e.g., RADIUS servers) to authenticate mobile nodes without requiring a direct security association between the foreign agent and the mobile node, enabling use of existing AAA deployments.
