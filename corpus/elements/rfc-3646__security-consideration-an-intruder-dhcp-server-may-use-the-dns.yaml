document: rfc-3646
kind: security-consideration
summary: An intruder DHCP server may use the DNS Recursive Name Server option to redirect DNS queries to a malicious recursive name server, enabling DNS name spoofing. Mitigation requires DHCP authentication per RFC 3315.
section: "6"
topics:
