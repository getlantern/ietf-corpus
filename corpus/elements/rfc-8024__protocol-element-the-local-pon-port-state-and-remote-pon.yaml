document: rfc-8024
kind: protocol-element
summary: The Local PON Port State and Remote PON Port State fields in the PON State TLV are each 4 octets. The least-significant bit indicates fault status of the PON port associated with the PW (1=in fault, 0=normal), enabling rapid inter-chassis fault notification.
section: 2.1.4
topics:
