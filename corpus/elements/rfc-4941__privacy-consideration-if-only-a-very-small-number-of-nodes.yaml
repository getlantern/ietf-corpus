document: rfc-4941
kind: privacy-consideration
summary: If only a very small number of nodes share a prefix for extended periods, changing the interface identifier alone does not ensure privacy, because the network prefix itself serves as a constant identifier grouping those nodes.
section: "3.6"
topics:
