document: rfc-9441
kind: state-machine
summary: 'Reassembly concludes at the receiver when: a Sender-Abort is received, the Inactivity Timer has expired, the Attempts counter has exceeded MAX_ACK_REQUESTS, or at least one All-1 SCHC Fragment has been received and integrity checking of the reassembled SCHC Packet is successful.'
section: 3.2.1.2
