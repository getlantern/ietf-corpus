document: rfc-7369
kind: normative-requirement
summary: When initiating RSVP-TE signaling for a bidirectional Ethernet LSP, the local node MUST include the OAM Configuration TLV with OAM Type set to Ethernet OAM in the LSP_ATTRIBUTES or LSP_REQUIRED_ATTRIBUTES objects.
section: "3.1"
rfc2119_level: MUST
topics:
