document: rfc-6797
kind: wire-format
summary: 'The STS header field ABNF: `Strict-Transport-Security = "Strict-Transport-Security" ":" [ directive ] *( ";" [ directive ] )` where `directive = directive-name [ "=" directive-value ]`. Directive names are case-insensitive tokens; values are tokens or quoted-strings as defined in RFC 2616.'
section: "6.1"
topics:
