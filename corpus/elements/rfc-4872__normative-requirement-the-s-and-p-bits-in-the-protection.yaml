document: rfc-4872
kind: normative-requirement
summary: The S and P bits in the PROTECTION object MUST be processed on a hop-by-hop basis, independently of the LSP Protection Type context. This allows intermediate nodes to determine resource allocation status without needing to interpret the end-to-end Protection Type semantics.
section: 4.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
