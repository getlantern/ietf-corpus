document: rfc-9946
kind: normative-requirement
summary: The Load PDU timeout and Status PDU timeout MUST each be no more than 1 second by default; expiry of the Load PDU timeout closes the receiver and stops Status PDU feedback, while expiry of the Status PDU timeout closes the sender and stops load packets.
section: "5.1"
rfc2119_level: MUST
topics:
    - measurement
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
