summary: 'Non-IP G-ACh encapsulation (Figure 1) consists of: LSP Label (20 bits) + TC (3) + S (1) + TTL (8); GAL (20) + TC (3) + S=1 (1) + TTL (8); ACH: 0001 (4) + Version (4) + Flags (8) + Channel Type=0x0013 (16); BFD Control Packet (variable); Source Address TLV with Type=0 (8), Reserved (8), Length (16), Reserved (16), Address Family (16), Address (variable).'
