document: rfc-3633
kind: design-rationale
summary: An IA_PD differs from an IA in that it does not need to be associated with exactly one interface; one IA_PD can be associated with the requesting router as a whole, a set of interfaces, or exactly one interface. This flexibility accommodates diverse CPE deployment topologies without requiring per-interface bindings.
