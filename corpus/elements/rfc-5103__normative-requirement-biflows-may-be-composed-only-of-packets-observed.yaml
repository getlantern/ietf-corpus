document: rfc-5103
kind: normative-requirement
summary: Biflows may be composed only of packets observed within the same Observation Domain. Metering Processes that build Biflows from Uniflows must ensure both Uniflows were observed within the same Observation Domain.
section: "4"
rfc2119_level: REQUIRED
topics:
    - measurement
