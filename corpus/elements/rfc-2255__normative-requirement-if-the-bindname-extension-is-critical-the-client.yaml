document: rfc-2255
kind: normative-requirement
summary: If the bindname extension is critical, the client resolving the URL MUST authenticate to the directory using the given distinguished name and an appropriate authentication method. For a NULL DN, no bind MAY be required to obtain anonymous access.
section: "4"
rfc2119_level: MUST
topics:
