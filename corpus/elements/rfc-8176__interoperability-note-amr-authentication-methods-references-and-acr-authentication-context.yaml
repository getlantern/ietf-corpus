document: rfc-8176
kind: interoperability-note
summary: '''amr'' (Authentication Methods References) and ''acr'' (Authentication Context Class Reference) are related but distinct. ''acr'' states which business-rule class was satisfied without describing how; ''amr'' states which specific methods were used. Relying on ''amr'' values is considered more brittle than ''acr'' because appropriate authentication methods evolve over time.'
section: "3"
topics:
    - oauth
    - jose
    - security
