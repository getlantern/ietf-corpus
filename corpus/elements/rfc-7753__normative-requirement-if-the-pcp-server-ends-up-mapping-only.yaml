document: rfc-7753
kind: normative-requirement
summary: If the PCP server ends up mapping only a single port for any reason, the PORT_SET option MUST NOT be present in the response. A single-port MAP request with PORT_SET is silently treated as a plain single-port request.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - nat
    - pcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
