document: rfc-5066
kind: interoperability-note
summary: 'The EFMCu interpretation of ifMauMediaAvailable differs from other MAU types due to PME aggregation: ''unknown'' means Initializing; ''ready'' means Down with at least one PME ready for handshake; ''available'' means Up with all PMEs up; ''availableReduced'' means Up but with a link fault on one or more PMEs while at least one PME remains up; ''pmdLinkFault'' means link fault on all PMEs.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
