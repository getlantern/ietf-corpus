document: rfc-3749
kind: protocol-element
summary: DEFLATE compression (RFC 1951) is defined as a stateful TLS compression method with identifier value 1. The sender selects compression parameters; the receiver must adapt automatically and all input data must appear in the compressed output with mandatory flushing.
section: "2.1"
topics:
