document: rfc-8502
kind: normative-requirement
summary: Implementations SHOULD provide SNMPv3 security features, and deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. SNMPv3 with cryptographic security is RECOMMENDED instead.
