document: rfc-7939
kind: normative-requirement
summary: A NeighborRouterIndex value MUST remain constant at least from one re-initialization of the network management agent to the next, except when an application is deleted and re-created. A NeighborRouterIndex value MUST NOT be reused until the next agent restart.
section: "7"
rfc2119_level: MUST NOT
topics:
    - routing
