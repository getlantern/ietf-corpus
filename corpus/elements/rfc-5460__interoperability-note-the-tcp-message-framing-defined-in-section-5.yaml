document: rfc-5460
kind: interoperability-note
summary: The TCP message framing defined in Section 5.1 (2-octet size prefix) is not compatible with the UDP message format. A TCP-framed request sent as a UDP message will have all protocol fields offset by the 2-byte message-size prefix and may not be valid.
section: "4"
topics:
    - dns
    - tcp
