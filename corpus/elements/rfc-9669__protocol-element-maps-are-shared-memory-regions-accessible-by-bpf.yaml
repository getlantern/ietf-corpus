document: rfc-9669
kind: protocol-element
summary: Maps are shared memory regions accessible by BPF programs. A map can be referenced by file descriptor (map_by_fd) if the platform supports it, or by a program-load-time index (map_by_idx). The map_val() operation returns the address of the first value and is only defined for maps with a single contiguous memory region.
section: 5.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
