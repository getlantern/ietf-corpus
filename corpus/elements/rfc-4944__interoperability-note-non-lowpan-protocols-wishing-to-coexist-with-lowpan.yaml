document: rfc-4944
kind: interoperability-note
summary: Non-LoWPAN protocols wishing to coexist with LoWPAN nodes should include a byte matching the NALP pattern (00xxxxxx) immediately following the 802.15.4 header. Any LoWPAN node encountering a dispatch value of 00xxxxxx shall discard the packet.
section: "5.1"
topics:
    - ip
