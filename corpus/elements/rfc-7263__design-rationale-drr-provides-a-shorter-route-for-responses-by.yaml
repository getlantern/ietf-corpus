document: rfc-7263
kind: design-rationale
summary: DRR provides a shorter route for responses by sending them directly from the destination peer to the sending peer, bypassing intermediate peers. This reduces CPU, bandwidth, and battery load on intermediate peers compared to SRR, especially in closed or wireless networks.
section: 3.1.2
topics:
    - routing
