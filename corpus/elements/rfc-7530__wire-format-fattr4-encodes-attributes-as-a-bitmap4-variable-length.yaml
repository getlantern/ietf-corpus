document: rfc-7530
kind: wire-format
summary: fattr4 encodes attributes as a bitmap4 (variable-length array of uint32_t, where bit n is at integer position n/32 and bit offset n mod 32) followed by attrlist4 (opaque byte stream of attribute values). This structure supports extensible attribute sets without fixed-size overhead.
section: 2.2.8
