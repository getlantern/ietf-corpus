document: rfc-4872
kind: normative-requirement
summary: For all protection types, working and protecting LSPs belonging to the same protected entity MUST use the same SESSION object (same Tunnel Endpoint Address, Tunnel ID, and Extended Tunnel ID), but MUST use different LSP ID values to distinguish the individual LSPs within the session.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
