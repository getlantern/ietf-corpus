document: rfc-9390
kind: normative-requirement
summary: When a group command results in an error applying to all sessions in the identified groups, an associated protocol error MUST be returned, the sender MUST fall back to single-session processing, and the identified session groups MUST be deleted.
section: 4.4.3
rfc2119_level: MUST
topics:
    - diameter
