document: rfc-7811
kind: protocol-element
summary: The Lowpoint value L(x) for a node x equals the minimum of D(x), the lowest DFS number reachable via a back-edge from x, and the lowest lowpoint value of any DFS tree child of x. It is used to identify cut-vertices (when a child c has L(c) >= D(x), x is a cut-vertex) and to find ears for GADAG construction.
section: "4.3"
topics:
    - routing
