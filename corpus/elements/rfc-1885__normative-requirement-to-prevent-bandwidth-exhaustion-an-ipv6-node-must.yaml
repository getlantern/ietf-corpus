document: rfc-1885
kind: normative-requirement
summary: To prevent bandwidth exhaustion, an IPv6 node MUST rate-limit ICMPv6 error messages sent to each source of erroneous packets. Rate-limiting parameters (e.g., T=1 second per source or F=2% of link bandwidth) MUST be configurable with conservative defaults.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
