document: rfc-8873
kind: design-rationale
summary: WebRTC data channels are preferred over WebSocket for MSRP transport because data channels provide low-latency transport, leverage NAT-aware connectivity, and integrate the security features of WebRTC (DTLS), whereas WebSocket only provides message-passing with no direct access to TCP/TLS sockets.
section: "1"
topics:
