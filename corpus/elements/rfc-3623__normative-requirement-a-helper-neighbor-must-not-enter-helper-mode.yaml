document: rfc-3623
kind: normative-requirement
summary: 'A helper neighbor MUST NOT enter helper mode for a restarting router unless: (1) a full adjacency (neighbor state Full) currently exists, (2) no topology-changing LSAs (types 1–5, 7) have appeared since the restart, (3) the grace period has not expired, (4) local policy permits it, and (5) the helper itself is not currently performing graceful restart.'
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
