document: rfc-4466
kind: security-consideration
summary: As IMAP parsers grow more complex due to extensions, the risk of parser bugs including buffer overflow, denial of service, and other security coding errors increases. Implementers are encouraged to take care when extending existing implementations, and future extensions should strive for consistency and simplicity.
section: "4"
topics:
