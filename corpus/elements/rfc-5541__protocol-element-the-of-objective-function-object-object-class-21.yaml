document: rfc-5541
kind: protocol-element
summary: The OF (Objective Function) object (Object-Class 21, Object-Type 1) is an optional PCEP object carried in PCReq messages to indicate the required/desired objective function, or in PCRep messages to report the objective function used during path computation. The body contains a 2-byte OF Code, a 2-byte Reserved field, and optional TLVs.
section: "3.1"
topics:
