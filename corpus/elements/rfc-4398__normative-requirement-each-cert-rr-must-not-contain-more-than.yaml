document: rfc-4398
kind: normative-requirement
summary: Each CERT RR MUST NOT contain more than 65535 octets (64 KB) of payload, even if the corresponding certificate or CRL is larger. The indirect types address this by allowing the CERT RR to reference external content via URL.
section: "4"
rfc2119_level: MUST NOT
