document: rfc-4695
kind: design-rationale
summary: The default 'comex' (COMmand EXecution) timestamp semantics treat each timestamp as the command execution time. This works well for transcoding Standard MIDI Files and for hardware controllers coding raw sensor data, but is usually not optimal for sources with implicit MIDI 1.0 DIN cable timing.
