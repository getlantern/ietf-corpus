document: rfc-4012
kind: design-rationale
summary: Existing 'import:', 'export:', and 'default:' attributes are kept as IPv4 unicast only, and new 'mp-' prefixed attributes are introduced instead of extending existing syntax. This preserves backward compatibility and avoids undermining clarity in policy expressions.
section: "2"
topics:
