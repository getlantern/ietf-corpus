document: rfc-8693
kind: normative-requirement
summary: If the request or either token is invalid or unacceptable based on policy, the authorization server MUST construct an error response with the 'invalid_request' error code. If unable to issue a token for an indicated target, the 'invalid_target' error code SHOULD be used.
section: 2.2.2
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
