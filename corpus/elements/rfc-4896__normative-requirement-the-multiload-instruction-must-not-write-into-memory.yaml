document: rfc-4896
kind: normative-requirement
summary: The MULTILOAD instruction must not write into memory positions occupied by its own opcode or parameters, and indirection MUST be resolved at execution time. Any non-step-by-step implementation technique MUST yield the same result as a step-by-step implementation.
section: "3.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
