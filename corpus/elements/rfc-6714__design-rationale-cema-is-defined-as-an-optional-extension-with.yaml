document: rfc-6714
kind: design-rationale
summary: CEMA is defined as an OPTIONAL extension with mandatory fallback to RFC 4975 behavior, ensuring that CEMA-enabled endpoints can still interoperate with the installed base of non-CEMA endpoints and relays. The extension only affects how the MSRP TCP connection address is determined; after connection establishment, RFC 4975/4976 message procedures apply unchanged.
section: "1"
topics:
