document: rfc-7939
kind: normative-requirement
summary: Notification throttling is RECOMMENDED with a threshold value of 10 occurrences and a window of at least 5 times nhdpHelloInterval. This is stricter than the RFC 4750 recommendation of '7 traps / 10 seconds' because NHDP is expected to operate over lossier wireless channels than OSPF.
section: 5.1.3.2
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
