document: rfc-3965
kind: normative-requirement
summary: IFax devices MUST be compliant with RFC 2822 and RFC 1123, which define the format of mail headers. The header of an IFax message SHOULD include Message-ID and MUST include all fields required by those standards, such as DATE and FROM.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
