document: rfc-5155
kind: protocol-element
summary: The NSEC3PARAM RR (type 51) is placed at the zone apex and contains Hash Algorithm, Flags, Iterations, and Salt—the parameters authoritative servers need to compute hashed owner names for negative responses. It is not used by validators or resolvers. If its Flags field is non-zero the RR MUST be ignored.
