document: rfc-6698
kind: wire-format
summary: The TLSA RDATA consists of a one-octet Certificate Usage field, a one-octet Selector field, a one-octet Matching Type field, and a variable-length Certificate Association Data field. The first three fields are encoded as 8-bit unsigned integers; the association data is raw bytes or a hash thereof.
section: "2.1"
topics:
