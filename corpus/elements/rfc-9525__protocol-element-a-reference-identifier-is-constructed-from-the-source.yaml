document: rfc-9525
kind: protocol-element
summary: A reference identifier is constructed from the source domain and optionally an application service type; it is what the client expects the server to present. A presented identifier is what the server includes in its PKIX certificate. The client verifies identity by checking each reference identifier against presented identifiers for a match.
section: "1.5"
topics:
    - tls
    - pkix
    - security
