document: rfc-3371
kind: normative-requirement
summary: The l2tpConfigGroup and l2tpStatsGroup are mandatory for all implementors of this MIB. These groups provide configuration, state, and statistics for the L2TP protocol, its tunnels, and sessions.
section: "3.0"
