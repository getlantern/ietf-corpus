document: rfc-5891
kind: interoperability-note
summary: During lookup, CONTEXTO characters need only have a rule defined (not necessarily evaluated), whereas CONTEXTJ characters require full contextual rule evaluation. This asymmetry is intentional to balance protection with lookup performance.
section: "5.4"
topics:
