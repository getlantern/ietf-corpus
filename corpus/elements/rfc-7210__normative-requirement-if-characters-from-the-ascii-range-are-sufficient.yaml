document: rfc-7210
kind: normative-requirement
summary: If characters from the ASCII range are sufficient for a key name, they SHOULD be used. If characters outside that range are desirable or required, they MUST be in an encoding of Unicode.
section: "5.1"
rfc2119_level: SHOULD
