document: rfc-2878
kind: interoperability-note
summary: When connected to an old BCP (RFC 1638) peer, BPDUs must be sent in the old format described in Appendix A (a bare BPDU with Spanning Tree Protocol PPP protocol field, no MAC/LLC header) only when a non-NULL STP protocol is successfully negotiated and Management-Inline is configure-rejected. Implementations SHOULD implement a backward compatibility mode.
section: 4.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
