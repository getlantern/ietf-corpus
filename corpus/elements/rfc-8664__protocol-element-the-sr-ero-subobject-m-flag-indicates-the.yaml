document: rfc-8664
kind: protocol-element
summary: The SR-ERO subobject M-Flag indicates the SID contains an MPLS label stack entry per RFC 3032; if M=0, the SID is an index into an MPLS label space (SRGB or SRLB). The C-Flag (valid only when M=1) indicates the PCE specifies TC, S, and TTL fields of the label stack entry.
section: 4.3.1
topics:
    - routing
    - mpls
