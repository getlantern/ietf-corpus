document: rfc-5619
kind: normative-requirement
summary: A softwire concentrator SHOULD NOT change its IP address or port number in the SCCRP response; if an address change is required (e.g., for load balancing), a new IKE_SA and CHILD_SA MUST be established to the new IP address.
section: 3.5.3
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
    - security
