document: rfc-7672
kind: security-consideration
summary: To prevent downgrade attacks, implementations must strictly follow the sections specifying when non-authenticated or cleartext connections are permissible (Sections 2.1.2, 2.1.3, 2.2, 2.2.1, 2.2.2, 2.2.3, 3.2, and 9.1) and MUST NOT initiate a connection when the specification indicates a server must be considered unreachable.
section: "10"
topics:
