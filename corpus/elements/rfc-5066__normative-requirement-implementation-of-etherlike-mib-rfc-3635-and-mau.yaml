document: rfc-5066
kind: normative-requirement
summary: Implementation of EtherLike-MIB (RFC 3635) and MAU-MIB (RFC 4836) is REQUIRED for EFMCu interfaces. EFMCu PCS ports SHALL return ifType ethernetCsmacd(6) and the appropriate ifMauType (dot3MauType2BaseTL or dot3MauType10PassTS).
section: "3.4"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
