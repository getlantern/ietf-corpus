document: rfc-2451
kind: protocol-element
summary: 'Rounds are fixed (non-negotiable) for all specified algorithms: CAST-128 uses 12 rounds for keys ≤80 bits and 16 for keys >80 bits; RC5 uses 16; IDEA uses 8; Blowfish uses 16; 3DES uses 48 (16×3). A default value MUST always exist when rounds are not negotiated.'
section: "2.5"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
