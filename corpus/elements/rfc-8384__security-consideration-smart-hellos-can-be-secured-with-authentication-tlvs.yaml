document: rfc-8384
kind: security-consideration
summary: Smart-Hellos can be secured with Authentication TLVs based on RFC 5310. Without authentication, a rogue end station could falsely present itself as a valid Smart Endnode and gain encapsulation privileges on the TRILL campus.
section: "7"
topics:
