document: rfc-9513
kind: protocol-element
summary: 'OSPFv3 supports a defined mapping of SRv6 Endpoint behaviors (from RFC 8986) to advertisement sub-TLVs: End variants (code points 1-4, 28-31) appear only in End SID sub-TLV; End.X/End.DX6/End.DX4 variants appear in End.X and LAN End.X sub-TLVs; End.DT6/DT4/DT64 appear only in End SID sub-TLV.'
