document: rfc-2183
kind: wire-format
summary: 'Content-Disposition header field is defined in RFC 822 extended BNF as: disposition-type (''inline'' | ''attachment'' | extension-token) followed by zero or more semicolon-separated disposition-parm values (filename-parm, creation-date-parm, modification-date-parm, read-date-parm, size-parm, or generic parameter). Disposition-type values are not case-sensitive.'
