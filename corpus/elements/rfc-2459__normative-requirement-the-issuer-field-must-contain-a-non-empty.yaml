document: rfc-2459
kind: normative-requirement
summary: The issuer field MUST contain a non-empty distinguished name. Certificate users MUST process issuer and subject DN fields to perform name chaining for certification path validation by matching the issuer DN in one certificate against the subject name in a CA certificate.
section: 4.1.2.4
rfc2119_level: MUST
topics:
    - pkix
