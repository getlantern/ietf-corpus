document: rfc-2403
kind: security-consideration
summary: 'The birthday attack, the strongest known attack against HMAC, is impractical for HMAC-MD5-96: a successful attack would require processing 2**64 blocks, which is infeasible unless the underlying hash had collisions after only 2**30 blocks.'
