document: rfc-9645
kind: interoperability-note
summary: 'To support both TLS 1.2 and TLS 1.3 simultaneously, the hello-params-grouping cipher-suites configuration should address three parameters: TLS Cipher Suites, TLS SignatureScheme, and TLS Supported Groups, since these cover the algorithm negotiation for both protocol versions.'
