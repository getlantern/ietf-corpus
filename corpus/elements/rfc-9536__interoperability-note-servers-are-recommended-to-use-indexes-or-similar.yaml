document: rfc-9536
kind: interoperability-note
summary: Servers are RECOMMENDED to use indexes or similar techniques to speed up data retrieval for reverse searches. Performance risks can also be mitigated by restricting search functionality, rate-limiting by user authorization, truncating/paging results (RFC 8977), and returning partial responses (RFC 8982).
