document: rfc-2165
kind: security-consideration
summary: All SLP entities configured for protected scopes SHOULD implement 'md5WithRSAEncryption' (BSD value 1) and associate it with the scope's private key. User Agents MAY use the URL Authentication Block in Service Replies to verify a SA is authorized to offer the advertised service.
