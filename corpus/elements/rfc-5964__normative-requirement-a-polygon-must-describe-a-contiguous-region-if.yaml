document: rfc-5964
kind: normative-requirement
summary: A polygon MUST describe a contiguous region. If a hole overlaps with the outer boundary or shares part of a side with the outer boundary (creating an inlet), it MUST be expressed without the hole.
section: "3"
rfc2119_level: MUST
