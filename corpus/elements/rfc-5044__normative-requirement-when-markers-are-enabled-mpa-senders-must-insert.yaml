document: rfc-5044
kind: normative-requirement
summary: When Markers are enabled, MPA senders MUST insert a Marker at a 512-octet periodic interval in the TCP Sequence Number Space, beginning immediately before the first FPDU of Full Operation. All MPA senders MUST be capable of generating Markers when required by the opposing receiver.
section: "4.3"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
