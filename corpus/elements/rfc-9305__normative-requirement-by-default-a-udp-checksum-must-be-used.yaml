document: rfc-9305
kind: normative-requirement
summary: By default, a UDP checksum MUST be used when LISP-GPE is transported over IPv6. An operator MAY configure zero UDP checksum only under specific conditions (TMCE plus one of three listed criteria).
section: 4.3.1
rfc2119_level: MUST
