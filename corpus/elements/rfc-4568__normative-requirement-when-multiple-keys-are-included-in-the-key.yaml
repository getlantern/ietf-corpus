document: rfc-4568
kind: normative-requirement
summary: When multiple keys are included in the key parameters, it MUST be possible to determine which key is being used in a given media packet by simple inspection; a trial-and-error approach MUST NOT be performed. For SRTP, this is achieved using Master Key Identifiers (MKI).
section: "4.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
