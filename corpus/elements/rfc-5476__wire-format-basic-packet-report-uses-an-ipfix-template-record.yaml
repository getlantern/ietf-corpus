document: rfc-5476
kind: wire-format
summary: Basic Packet Report uses an IPFIX Template Record (Set ID=2) with fields selectionSequenceId (IE 301, 4 bytes), digestHashValue (IE 326, 4 bytes), a packet-section field such as dataLinkFrameSection (IE 315, fixed or variable length), and observationTimeMicroseconds (IE 324, 4 bytes). The Data Record carries the actual packet bytes.
