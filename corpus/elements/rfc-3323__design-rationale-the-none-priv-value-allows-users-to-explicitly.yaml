document: rfc-3323
kind: design-rationale
summary: The 'none' priv-value allows users to explicitly opt out of pre-provisioned privacy profiles when routing through a privacy service that would otherwise apply privacy functions by default. This gives users positive control over privacy application.
section: "4.2"
topics:
