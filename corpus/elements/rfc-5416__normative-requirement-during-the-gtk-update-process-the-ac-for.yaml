document: rfc-5416
kind: normative-requirement
summary: During the GTK update process, the AC (for Split MAC) or WTP (for Local MAC) MUST duplicate broadcast packets and transmit them encrypted with both the current and new GTK. When the update is complete, the AC MUST transmit an IEEE 802.11 WLAN Configuration Request including an Update WLAN element with Key Status=4.
section: "2.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
