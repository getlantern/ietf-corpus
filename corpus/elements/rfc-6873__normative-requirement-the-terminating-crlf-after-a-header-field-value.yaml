document: rfc-6873
kind: normative-requirement
summary: The terminating CRLF after a header field value MUST NOT be logged. Mandatory fields MUST NOT contain a CRLF when logged; no escaping is required for CRLF in mandatory fields since bare CRLF is not permitted within SIP header field values.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
