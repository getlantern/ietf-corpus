summary: The nlHostTable collects per-network-address traffic statistics (inPkts, outPkts, inOctets, outOctets, outMacNonUnicastPkts, createTime) for all addresses appearing as source or destination in error-free packets. It is indexed by TimeFilter for incremental polling.
