document: rfc-2748
kind: wire-format
summary: 'All COPS objects share a common 4-octet header: a 16-bit Length (in octets, including the header), an 8-bit C-Num (class identifier), and an 8-bit C-Type (subtype). Objects whose length does not fall on a 32-bit boundary MUST be padded to the next 32-bit boundary before transmission.'
section: "2.2"
