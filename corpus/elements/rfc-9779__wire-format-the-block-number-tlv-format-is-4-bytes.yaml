document: rfc-9779
kind: wire-format
summary: 'The Block Number TLV format is 4 bytes total: 1-byte Type (=6), 1-byte Length (=2), a Reserved field with R flag (7 reserved bits + 1-bit R flag), and an 8-bit Block Number. The fixed Length of 2 bytes covers the Reserved/R-flag byte and the Block Number byte.'
section: "6.2"
