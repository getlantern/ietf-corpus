document: rfc-6118
kind: protocol-element
summary: The 'ical-access:http' and 'ical-access:https' Enumservices (Application-Based, Common) enable ENUM lookup to CalDAV calendar resources (e.g., free/busy status) over HTTP and HTTPS respectively. The 'ical-sched:mailto' variant supports iMIP-based calendar scheduling via email. Defined in RFC 5333.
section: "4.7"
topics:
    - dns
    - http
    - email
