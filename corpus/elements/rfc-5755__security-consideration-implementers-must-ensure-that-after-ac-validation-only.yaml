document: rfc-5755
kind: security-consideration
summary: Implementers MUST ensure that after AC validation, only attributes the issuer is trusted to issue are used in authorization decisions; all other attributes MUST be ignored. Since AAControls is optional to implement, verifiers MUST be provided trusted attribute lists by other means such as configuration.
section: "8"
topics:
    - pkix
    - security
