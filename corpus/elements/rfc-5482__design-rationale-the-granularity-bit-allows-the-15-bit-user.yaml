document: rfc-5482
kind: design-rationale
summary: The Granularity bit allows the 15-bit User Timeout field to express values in seconds (1 s to ~9 hours) or minutes (1 min to ~22 days), providing fine granularity for short timeouts and extended range for mobile or intermittently connected scenarios without widening the field.
