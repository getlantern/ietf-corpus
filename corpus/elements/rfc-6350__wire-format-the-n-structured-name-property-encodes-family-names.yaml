document: rfc-6350
kind: wire-format
summary: 'The N (structured name) property encodes Family Names, Given Names, Additional Names, Honorific Prefixes, and Honorific Suffixes as five semicolon-separated list-components. Individual components may contain multiple values separated by COMMA. ABNF: N-value = list-component 4(";" list-component).'
section: 6.2.2
