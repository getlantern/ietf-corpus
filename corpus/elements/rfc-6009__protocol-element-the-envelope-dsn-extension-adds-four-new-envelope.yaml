document: rfc-6009
kind: protocol-element
summary: 'The ''envelope-dsn'' extension adds four new envelope-part strings to the Sieve envelope test: ''notify'' (DSN NOTIFY conditions), ''orcpt'' (original recipient), ''ret'' (return of content), and ''envid'' (envelope identifier), corresponding to SMTP DSN extension parameters from RFC 3461.'
