document: rfc-2515
kind: design-rationale
summary: ILMI negotiates Max Current VPI/VCI bits as the minimum of both ends' Max Active values because a manager may lack write access to the peer's MIB or the peer may have hardware limitations, so a bilateral mechanism is needed to agree on the usable address space.
