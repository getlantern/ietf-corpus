document: rfc-6605
kind: security-consideration
summary: The cryptographic work factor of ECDSA with curve P-256 is considered equivalent to 128 bits of security, and P-384 equivalent to 192 bits, based on the principle that equivalent strength is half the key length. This assessment could change if new attacks are found.
