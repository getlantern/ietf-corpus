document: rfc-5603
kind: interoperability-note
summary: For VPLS services, the PW is associated to a virtual interface attached to a bridge or VPLS forwarder. The bridging function between local physical ports and virtual interfaces is out of scope for this MIB module and must be handled by other MIB modules managing the forwarder and Native Service Processing (NSP) sections.
section: "9"
topics:
