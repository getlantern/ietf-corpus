document: rfc-3885
kind: security-consideration
summary: Site administrators may wish to treat delivery to an alias as final delivery to protect individual identities (e.g., postmaster or webmaster aliases), and implementors are encouraged to provide mechanisms allowing administrators to choose whether to permit tracking through aliases.
section: "4.2"
topics:
