document: rfc-2358
kind: normative-requirement
summary: Support for the mauModIfCompl compliance statement of the MAU-MIB (RFC 2239) is REQUIRED for Ethernet-like interfaces, to allow applications to determine the current MAU type and duplex mode. Without it, there is no standard way to determine duplex mode.
section: "3.3"
rfc2119_level: REQUIRED
topics:
    - snmp
