document: rfc-4710
kind: normative-requirement
summary: Transport protocols carrying RAQMON PDUs MUST meet scalability (handling many tens or hundreds of RDSs), congestion safety per RFC 2914, and security requirements providing strong secure modes or data encryption and integrity; NAT-friendliness per RFC 3235 is SHOULD.
section: "2.4"
rfc2119_level: REQUIRED
topics:
    - qos
    - realtime
    - security
    - congestion
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
