document: rfc-4737
kind: protocol-element
summary: Type-P-Packet-Reordering-Extent-Stream quantifies how far out-of-order a reordered packet is. The reordering extent e of packet s[i] is i - j, where j is the smallest arrival index before i such that s[j] > s[i]. This represents the maximum distance to the earliest packet received with a larger sequence number.
section: "4.2"
topics:
