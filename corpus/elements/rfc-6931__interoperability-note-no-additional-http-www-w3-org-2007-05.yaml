document: rfc-6931
kind: interoperability-note
summary: No additional 'http://www.w3.org/2007/05/xmldsig-more#' URIs are intended to be created beyond those enumerated in this RFC. The '2001/04/xmldsig-more#' namespace was frozen with RFC 4051's publication; the '2000/09/xmldsig#' namespace is prohibited from new URIs by W3C namespace stability rules.
