document: rfc-8160
kind: normative-requirement
summary: The client SHOULD transmit a value for the IUTF8 terminal mode if it knows about one, and the server MAY ignore it. This mirrors the behavior specified for all other encoded terminal modes in RFC 4254.
section: "3"
rfc2119_level: SHOULD
