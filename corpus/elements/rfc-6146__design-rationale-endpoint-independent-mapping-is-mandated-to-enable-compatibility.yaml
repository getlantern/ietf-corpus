document: rfc-6146
kind: design-rationale
summary: Endpoint-Independent Mapping is mandated to enable compatibility with NAT traversal techniques such as ICE (RFC 5245). Without it, techniques that discover the external transport address and share it with remote peers would fail because different remote peers would see different mappings.
section: "1.1"
topics:
    - nat
    - v6ops
