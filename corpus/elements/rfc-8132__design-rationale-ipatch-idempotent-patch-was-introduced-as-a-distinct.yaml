document: rfc-8132
kind: design-rationale
summary: iPATCH (idempotent PATCH) was introduced as a distinct method so that constrained servers can implement only one variant, saving state required to handle non-idempotent PATCH. The indication of idempotence enables servers to keep less state about the interaction.
