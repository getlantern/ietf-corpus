document: rfc-2894
kind: security-consideration
summary: At the time of writing, no multicast key management protocol for IPsec existed, making manually configured Security Associations common for the All-Routers multicast case. The SPD may use per-management-station or per-unicast-address entries, with a final wildcard entry to discard all other incoming RR messages.
section: "7.1"
topics:
    - security
    - ipsec
    - ip
    - v6ops
    - multicast
