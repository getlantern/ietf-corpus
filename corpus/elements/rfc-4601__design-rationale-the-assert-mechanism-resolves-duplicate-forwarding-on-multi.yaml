document: rfc-4601
kind: design-rationale
summary: 'The Assert mechanism resolves duplicate forwarding on multi-access LANs reactively rather than preventively: PIM allows duplicate Joins and detects duplicate data on the LAN, then uses Assert messages to elect a single forwarder. This avoids complex pre-coordination while still converging to correct single-copy delivery.'
section: "3.6"
topics:
    - multicast
    - routing
