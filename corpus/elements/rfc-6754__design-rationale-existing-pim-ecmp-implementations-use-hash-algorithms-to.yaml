document: rfc-6754
kind: design-rationale
summary: Existing PIM ECMP implementations use hash algorithms to select RPF paths, which do not allow traffic distribution according to administrative metrics such as bandwidth, delay, or routing preferences. This leads to inefficient use of network resources and motivates the ECMP Redirect mechanism.
section: "1"
topics:
    - multicast
    - routing
