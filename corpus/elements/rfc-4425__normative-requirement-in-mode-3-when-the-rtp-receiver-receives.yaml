document: rfc-4425
kind: normative-requirement
summary: In 'mode=3', when the RTP receiver receives a complete AU or first fragment where the RA bit is set to 1 but the AU does not begin with an entry-point header, the RTP receiver MUST insert an entry-point header at the beginning of the AU using the one specified by the 'config' media type parameter.
section: "4.9"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
