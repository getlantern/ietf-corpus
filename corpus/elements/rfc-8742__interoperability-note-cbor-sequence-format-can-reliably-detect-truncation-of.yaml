document: rfc-8742
kind: interoperability-note
summary: CBOR Sequence format can reliably detect truncation of the last CBOR data item in the sequence, but cannot detect entirely missing CBOR data items at the end. A streaming decoder may pause and resume decoding when a truncated final item is being received.
section: "2"
