summary: 'Congestion information is communicated via a timestamp echo mechanism: the sender sets TVal; the receiver echoes it back in TEcho with an Echo Delay (time since first receipt). The sender computes RTT as (current_time - TEcho - EchoDelay), also bounding by the sum of both sides'' Transmit Delays.'
