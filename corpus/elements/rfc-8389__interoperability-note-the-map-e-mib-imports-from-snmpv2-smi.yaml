document: rfc-8389
kind: interoperability-note
summary: The MAP-E MIB imports from SNMPv2-SMI (RFC 2578), SNMPv2-TC (RFC 2579), SNMPv2-CONF (RFC 2580), IF-MIB (RFC 2863), and INET-ADDRESS-MIB (RFC 4001). Implementations must support these base MIB modules for the MAP-E MIB to function correctly.
