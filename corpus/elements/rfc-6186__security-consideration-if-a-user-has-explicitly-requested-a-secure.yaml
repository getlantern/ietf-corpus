document: rfc-6186
kind: security-consideration
summary: If a user has explicitly requested a secure connection, the MUA MUST successfully negotiate TLS before sending any authentication command. This applies to imaps, pop3s, imap with STARTTLS, or pop3 with STLS.
section: "6"
rfc2119_level: MUST
topics:
    - email
    - tls
    - security
