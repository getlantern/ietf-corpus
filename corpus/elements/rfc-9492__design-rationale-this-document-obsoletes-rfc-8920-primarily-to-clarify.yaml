document: rfc-9492
kind: design-rationale
summary: This document obsoletes RFC 8920 primarily to clarify normative behavior around zero-length SABM/UDABM advertisements. RFC 8920 used the word 'permitted' suggesting optional use, which created interoperability risks. The replacement text makes explicit the conditions under which such advertisements MUST and MUST NOT be used.
section: "15"
topics:
    - routing
    - bcp
