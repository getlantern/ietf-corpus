document: rfc-2576
kind: normative-requirement
summary: Multi-lingual command responders MUST NOT return a variable binding containing a Counter64 value in response to an SNMPv1 request. Counter64 object instances are treated as implicitly excluded from view when processing SNMPv1 messages.
section: 4.1.2.1
rfc2119_level: MUST NOT
topics:
