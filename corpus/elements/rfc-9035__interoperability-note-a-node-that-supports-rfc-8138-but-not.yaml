document: rfc-9035
kind: interoperability-note
summary: A node that supports RFC 8138 but not this specification (i.e., without the 'T' flag mechanism) can only be used in a homogeneous network and requires a flag-day upgrade to enable compression. Coexistence with this specification requires the 'T' flag to be unset during migration.
