document: rfc-5360
kind: interoperability-note
summary: The framework is designed with backwards compatibility so legacy user agents (those not implementing RFC 5360) can act as both clients and recipients with acceptable functionality. However, full functionality requires implementing the Pending Additions event package (RFC 5362), the permission document format (RFC 5361), and the header fields defined here.
section: "4.5"
