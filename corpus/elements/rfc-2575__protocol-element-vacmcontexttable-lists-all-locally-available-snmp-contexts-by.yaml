document: rfc-2575
kind: protocol-element
summary: vacmContextTable lists all locally available SNMP contexts by contextName (SnmpAdminString, SIZE 0..32). The empty contextName represents the default context. The table is read-only and must be accessible via the default context; it changes dynamically only when management instrumentation recognizes more or fewer contexts.
