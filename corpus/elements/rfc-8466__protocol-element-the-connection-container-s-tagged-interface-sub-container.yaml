document: rfc-8466
kind: protocol-element
summary: 'The connection container''s tagged-interface sub-container supports five VLAN tagging variants: priority-tagged (frame-priority level), dot1q-vlan-tagged (one or more CVLANs), qinq (CVLANs plus single SVLAN), qinany (unknown CVLANs plus single SVLAN), and vxlan (VNI identifier plus a peer-list of IP addresses).'
section: 5.3.2.2.2
topics:
