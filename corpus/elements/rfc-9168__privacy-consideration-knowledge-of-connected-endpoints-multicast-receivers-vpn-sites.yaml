document: rfc-9168
kind: privacy-consideration
summary: Knowledge of connected endpoints (multicast receivers, VPN sites) and routing topology exposed via PCEP FlowSpec is typically private customer information. Implementations concerned with privacy MUST apply IPsec or TLS to protect the PCEP session.
