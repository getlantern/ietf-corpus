document: rfc-2589
kind: protocol-element
summary: The Refresh extended operation (OID 1.3.6.1.4.1.1466.101.119.1) allows a client to reset the TTL of a dynamic entry. The request carries an entryName (LDAPDN) and a requestTtl (INTEGER, seconds) inside a DER-encoded SEQUENCE.
