document: rfc-5147
kind: normative-requirement
summary: Fragment identifiers containing a syntax error (not conforming to the Section 3 ABNF) MUST be ignored. Clients MUST NOT attempt to correct or guess fragment identifiers; syntax errors MAY be reported.
section: "4.4"
