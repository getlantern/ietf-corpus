document: rfc-9810
kind: state-machine
summary: Root CA key update defines four verification cases based on whether the verifier's TEE holds the old or new CA public key and whether the signer's certificate was issued under the old or new key. Cases 1 and 4 verify directly; Case 2 requires retrieving 'new with new' and 'new with old' link certificates; Case 3 requires retrieving the 'old with new' certificate.
section: 4.4.2
topics:
