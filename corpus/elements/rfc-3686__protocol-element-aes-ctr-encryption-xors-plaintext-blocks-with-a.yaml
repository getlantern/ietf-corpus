document: rfc-3686
kind: protocol-element
summary: AES-CTR encryption XORs plaintext blocks with a key stream generated by AES-encrypting sequential counter block values. The counter block begins as NONCE || IV || ONE and increments by one for each subsequent 128-bit block of key stream.
section: "2.1"
topics:
