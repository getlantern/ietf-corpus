kind: wire-format
summary: GML polygons are encoded using gml:Polygon with srsName='urn:ogc:def:crs:EPSG::4326'. The exterior boundary uses gml:exterior/gml:LinearRing with gml:pos (or gml:posList) elements; the first and last points must be identical to close the ring.
