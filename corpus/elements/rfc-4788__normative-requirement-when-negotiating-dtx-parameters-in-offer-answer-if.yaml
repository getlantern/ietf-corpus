document: rfc-4788
kind: normative-requirement
summary: 'When negotiating DTX parameters in Offer/Answer: if any DTX parameter is absent, its default value MUST be assumed; if silencesupp=0 in either offer or answer, other DTX parameter values SHOULD be ignored; if dtxmin exceeds dtxmax, the sender MUST ignore the indicated values and fall back to defaults.'
section: "6.8"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
