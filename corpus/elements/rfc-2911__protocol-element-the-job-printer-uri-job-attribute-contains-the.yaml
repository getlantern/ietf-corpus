document: rfc-2911
kind: protocol-element
summary: The 'job-printer-uri' Job attribute contains the URI of the Printer object that created the Job. When the Printer supports multiple URIs, it uses the specific URI supplied by the client in the create request to populate this attribute, enabling reverse lookup from job to printer.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
