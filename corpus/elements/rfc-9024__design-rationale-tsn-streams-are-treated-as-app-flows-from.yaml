document: rfc-9024
kind: design-rationale
summary: TSN Streams are treated as App-flows from the DetNet MPLS perspective, meaning a single DetNet MPLS flow can aggregate multiple TSN Streams. The whole DetNet domain behaves as a TSN relay node for the TSN Streams, with service proxies acting as ports of that relay node.
