document: rfc-3462
kind: protocol-element
summary: Multipart/Report is a MIME container type for electronic mail reports of any kind. Required parameters are 'boundary' and 'report-type'; the report-type parameter identifies the MIME content sub-type of the second body part. Encoding considerations indicate 7-bit should always be adequate.
