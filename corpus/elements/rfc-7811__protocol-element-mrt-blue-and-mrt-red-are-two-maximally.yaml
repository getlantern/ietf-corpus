summary: MRT-Blue and MRT-Red are two Maximally Redundant Trees rooted at the GADAG root. Each spanning tree provides a path from every node to the root such that the two paths share the minimum number of nodes and links; shared nodes are cut-vertices and shared links are cut-links.
