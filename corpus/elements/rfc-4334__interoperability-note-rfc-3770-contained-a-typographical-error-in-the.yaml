document: rfc-4334
kind: interoperability-note
summary: RFC 3770 contained a typographical error in the OID for the Wireless LAN SSID Attribute Certificate Attribute (id-aca-wlanSSID). RFC 4334 corrects this error; implementations based on RFC 3770 may have used the wrong OID arc.
