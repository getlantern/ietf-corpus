kind: protocol-element
summary: DsmonCounterAggGroupIndex is a textual convention defined as Integer32 (0..2147483647), starting at zero to allow direct mapping to DSCP values (0–63). DsmonCounterAggProfileIndex starts at 1 and identifies complete sets of 64 DSCP-to-group mappings.
