document: rfc-6793
kind: normative-requirement
summary: When a NEW BGP speaker processes an OPEN message from another NEW BGP speaker, it MUST use the AS number encoded in the Capability Value field of the four-octet AS number capability in lieu of the 'My Autonomous System' field of the OPEN message.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
