document: rfc-7170
kind: normative-requirement
summary: Phase 2 MUST NOT occur if the Phase 1 TLS handshake fails, as that would mean the tunnel was not successfully established. Phase 2 MUST always end with a Crypto-Binding TLV exchange and a protected termination exchange.
section: "3.3"
rfc2119_level: MUST
topics:
    - tls
    - security
