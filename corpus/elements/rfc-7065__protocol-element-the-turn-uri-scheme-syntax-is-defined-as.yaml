document: rfc-7065
kind: protocol-element
summary: 'The TURN URI scheme syntax is defined as: turnURI = scheme ":" host [ ":" port ] [ "?transport=" transport ], where scheme is "turn" or "turns" and transport is "udp", "tcp", or an extension token. The <host>, <port>, and <transport> components are passed without modification to the RFC 5928 resolution algorithm.'
section: "3.1"
topics:
    - nat
    - webrtc
