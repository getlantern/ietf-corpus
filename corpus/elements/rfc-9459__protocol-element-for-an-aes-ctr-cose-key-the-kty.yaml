kind: protocol-element
summary: 'For an AES-CTR COSE key: the ''kty'' field MUST be ''Symmetric''; if ''alg'' is present it MUST match the AES-CTR algorithm; if ''key_ops'' is present it MUST include ''encrypt'' when encrypting and ''decrypt'' when decrypting.'
