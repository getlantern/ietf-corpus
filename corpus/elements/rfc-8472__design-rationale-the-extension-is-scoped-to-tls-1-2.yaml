document: rfc-8472
kind: design-rationale
summary: The extension is scoped to TLS 1.2 and earlier because it adds Token Binding negotiation without extra round trips in those versions. Negotiation for TLS 1.3 is addressed by a separate draft (TOKENBIND-TLS13) and is explicitly out of scope here.
section: "1"
