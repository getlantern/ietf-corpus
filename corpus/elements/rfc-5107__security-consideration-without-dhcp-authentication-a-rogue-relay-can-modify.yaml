document: rfc-5107
kind: security-consideration
summary: Without DHCP authentication, a rogue relay can modify the Server Identifier Override option in DHCPOFFER and DHCPACK messages undetected; this threat pre-exists this suboption. This document does not introduce new vulnerabilities except when DHCP authentication is already required by clients.
section: "5"
topics:
