document: rfc-6465
kind: normative-requirement
summary: Implementations MUST NOT include more than 15 audio level values, matching RTP's maximum of 15 CSRC IDs. The maximum len field value is therefore 14 for the one-byte header format and 15 for the two-byte header format.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
