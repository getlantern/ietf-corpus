document: rfc-9735
kind: interoperability-note
summary: DN strings are encoded as NULL-terminated US-ASCII using the UTF-8 character set as defined in RFC 3629, which preserves the full US-ASCII range. This ensures interoperability across implementations that handle UTF-8.
