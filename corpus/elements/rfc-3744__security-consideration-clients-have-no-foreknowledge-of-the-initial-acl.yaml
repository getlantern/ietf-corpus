document: rfc-3744
kind: security-consideration
summary: Clients have no foreknowledge of the initial ACL assigned to a newly created resource. Clients requiring specific initial permissions must read and, if necessary, update the ACL immediately after resource creation, accepting a race window where the default ACL applies.
section: "12.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
