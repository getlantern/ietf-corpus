document: rfc-4666
kind: protocol-element
summary: M3UA is an adaptation layer that transports SS7 MTP3-User signalling (ISUP, SCCP, TUP, etc.) over IP using SCTP between Signalling Gateways (SGs) and Application Server Processes (ASPs), or between IP-based applications (IPSPs). It extends MTP3 service primitives to IP-resident applications while providing seamless interworking with the SS7 network.
section: "1"
topics:
    - sctp
    - security
