document: rfc-3729
kind: protocol-element
summary: AppLocalIndex is a textual convention (Unsigned32, 1..2147483647) providing a locally unique identifier for an application or application verb. All AppLocalIndex values—whether derived from protocolDirLocalIndex or assigned to HTTP filter entries—must not overlap and must not be reused after an agent restart until the next re-initialization.
section: "3"
topics:
