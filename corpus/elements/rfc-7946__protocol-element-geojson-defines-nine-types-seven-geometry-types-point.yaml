document: rfc-7946
kind: protocol-element
summary: 'GeoJSON defines nine types: seven geometry types (Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection) plus Feature and FeatureCollection. Every GeoJSON object MUST carry a "type" member whose value is one of these nine case-sensitive strings.'
section: "1.4"
topics:
    - json
