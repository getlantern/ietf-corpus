document: rfc-2046
kind: normative-requirement
summary: Encapsulated headers in ALL 'message/external-body' entities MUST include a Content-ID header field to provide a unique identifier for caching and mail-server receipt recognition. The ACCESS-TYPE parameter is unconditionally mandatory and MUST be present on every 'message/external-body'.
section: 5.2.3
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
