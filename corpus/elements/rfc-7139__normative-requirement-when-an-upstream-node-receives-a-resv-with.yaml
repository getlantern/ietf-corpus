document: rfc-7139
kind: normative-requirement
summary: When an upstream node receives a Resv with an unacceptable OTN-TDM label, it MUST generate a ResvErr with 'Routing problem/Unacceptable label value'. When a downstream node receives a Path with an unacceptable UPSTREAM_LABEL, it MUST generate a PathErr with the same indication.
section: 6.2.1
rfc2119_level: MUST
topics:
    - mpls
