document: rfc-7601
kind: design-rationale
summary: The authserv-id SHOULD use a hierarchical, globally unique ADMD identifier (e.g., a DNS domain name) rather than a flat hostname. A hierarchical identifier permits aggregating related trusted systems under a single parent identifier, avoiding the administrative burden of individually listing each trusted system in consumer configurations.
section: "2.5"
topics:
    - email
