document: rfc-5133
kind: design-rationale
summary: The message type 5 originally assigned to TEI Query Request in RFC 4233 conflicts with the DLC Status message type 5 introduced by the DUA protocol (RFC 4129), making it impossible to differentiate the two messages. The type is therefore changed to 8.
