document: rfc-7577
kind: protocol-element
summary: batteryChargingCycleCount tracks completed charging cycles, defined per the Smart Battery Data Specification Rev 1.1 as total discharge equal to the design capacity (batteryDesignCapacity). Partial charge/discharge steps accumulate; the next cycle begins immediately after the prior one completes. Value 0xFFFFFFFF indicates the count is undetermined.
section: "3.4"
topics:
    - snmp
