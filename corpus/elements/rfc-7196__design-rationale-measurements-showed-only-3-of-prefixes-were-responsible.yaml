document: rfc-7196
kind: design-rationale
summary: Measurements showed only 3% of prefixes were responsible for 36% of BGP messages at a router with real feeds, implying that only very frequently flapping prefixes should be damped. The recommended values target this small fraction without penalizing normal convergence.
