document: rfc-7619
kind: normative-requirement
summary: If NULL authentication is in use and anonymity is a concern, ID_NULL SHOULD be used in the Identification payload. The content of the Identification payload MUST NOT be used for any trust and policy checking in IKE_AUTH exchange when NULL authentication is employed.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ipsec
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
