document: rfc-8598
kind: normative-requirement
summary: If the negotiated IPsec connection is not a split-tunnel configuration, the INTERNAL_DNS_DOMAIN and INTERNAL_DNSSEC_TA Configuration Payloads MUST be ignored to prevent generic VPN services from overriding the public DNS hierarchy.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - dns
    - vpn
    - security
