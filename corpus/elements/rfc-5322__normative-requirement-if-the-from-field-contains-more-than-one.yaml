document: rfc-5322
kind: normative-requirement
summary: If the 'From:' field contains more than one mailbox specification, then the 'Sender:' field MUST appear in the message, containing a single mailbox. The 'Sender:' field SHOULD NOT be used when the author and transmitter are identical.
section: 3.6.2
rfc2119_level: MUST
topics:
    - email
