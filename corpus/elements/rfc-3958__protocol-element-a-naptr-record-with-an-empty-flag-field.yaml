document: rfc-3958
kind: protocol-element
summary: 'A NAPTR record with an empty FLAG field is non-terminal: the REPLACEMENT field is used as the target of the next DNS lookup for NAPTR RRs. In S-NAPTR, the only valid terminal flags are ''S'' (triggers SRV lookup on the REPLACEMENT field) and ''A'' (triggers address record lookup on the REPLACEMENT field).'
section: 2.2.3
topics:
    - dns
