document: rfc-8098
kind: normative-requirement
summary: The MDN MUST be addressed (both message header and transport envelope) to the address(es) in the Disposition-Notification-To header field of the original message. The From header of the MDN MUST contain the address of the person for whom the MDN is issued.
section: "3"
rfc2119_level: MUST
topics:
    - email
