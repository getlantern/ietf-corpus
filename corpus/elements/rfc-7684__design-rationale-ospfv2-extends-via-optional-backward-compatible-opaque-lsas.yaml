document: rfc-7684
kind: design-rationale
summary: OSPFv2 extends via optional, backward-compatible Opaque LSAs carrying TLV tuples rather than replacing fixed-format LSAs as OSPFv3 does (OSPFv3-EXTEND). This preserves full interoperability with routers that do not support the extensions.
section: "1"
topics:
    - routing
