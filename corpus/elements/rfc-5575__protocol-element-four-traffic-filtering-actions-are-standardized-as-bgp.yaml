document: rfc-5575
kind: protocol-element
summary: 'Four traffic filtering actions are standardized as BGP extended community values: 0x8006 (traffic-rate), 0x8007 (traffic-action bitmask), 0x8008 (redirect to VRF by Route Target), and 0x8009 (traffic-marking/DSCP remarking). The default action for a matching flow spec, absent these communities, is to accept traffic.'
