document: rfc-1277
kind: design-rationale
summary: The Telex AFI was chosen for the IDP of the new network address format because it provides the largest DSP and is less likely than other AFI forms (Local, X.121, DCC, ICD) to be confused with 'real' Network Addresses used for CONS or CLNS.
