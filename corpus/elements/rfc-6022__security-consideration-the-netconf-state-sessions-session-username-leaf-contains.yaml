document: rfc-6022
kind: security-consideration
summary: The /netconf-state/sessions/session/username leaf contains identity information that could be exploited for authentication attacks; read access MUST be controlled. This username SHOULD NOT be used for access control purposes without careful consideration, as different servers may report identical usernames for different persons.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - security
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
