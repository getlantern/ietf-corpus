document: rfc-1112
kind: design-rationale
summary: 'IGMP uses two techniques to suppress report implosion: randomized per-group delay timers spread Reports over D seconds, and Reports are multicast to the group address so other members can hear and cancel their own pending Reports. This ensures typically only one Report per group is transmitted per Query.'
section: Appendix I
topics:
