document: rfc-2368
kind: interoperability-note
summary: It is legal to specify recipients both in the "to" component and via an "hname" of "to". For example, `mailto:addr1%2C%20addr2`, `mailto:?to=addr1%2C%20addr2`, and `mailto:addr1?to=addr2` are equivalent forms.
section: "2"
