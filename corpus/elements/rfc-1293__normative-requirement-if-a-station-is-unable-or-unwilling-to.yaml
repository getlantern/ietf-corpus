document: rfc-1293
kind: normative-requirement
summary: If a station is unable or unwilling to reply to an InARP request, it ignores the request. When the requesting station receives an InARP reply, it MAY complete the ARP table entry and use the provided address information.
section: "7"
rfc2119_level: MAY
topics:
    - ip
