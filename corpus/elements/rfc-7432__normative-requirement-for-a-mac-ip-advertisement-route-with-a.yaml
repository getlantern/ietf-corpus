document: rfc-7432
kind: normative-requirement
summary: For a MAC/IP Advertisement route with a non-reserved ESI, the receiving PE MUST NOT install forwarding state until both the MAC/IP Advertisement route AND the associated set of Ethernet A-D per ES routes have been received, preventing accidental MAC installation during mass withdraw periods.
section: 9.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - vpn
