document: rfc-1766
kind: design-rationale
summary: The meaning of a language tag relative to the information it annotates is defined by the standard describing the context in which it appears. For a single object it denotes languages required for complete comprehension; for aggregations it denotes languages used in components; for alternatives it is a hint that content is provided in multiple languages.
section: "2.1"
