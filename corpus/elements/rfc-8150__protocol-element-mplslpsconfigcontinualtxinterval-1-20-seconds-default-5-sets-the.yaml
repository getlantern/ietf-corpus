document: rfc-8150
kind: protocol-element
summary: mplsLpsConfigContinualTxInterval (1–20 seconds, default 5) sets the interval for sending continual PSC packets based on current state. mplsLpsConfigRapidTxInterval (1000–20000 microseconds, default 3300) sets the interval for sending PSC packets when there is a local state change.
