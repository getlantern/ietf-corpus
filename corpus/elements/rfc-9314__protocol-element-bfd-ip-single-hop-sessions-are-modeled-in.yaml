document: rfc-9314
kind: protocol-element
summary: BFD IP single-hop sessions are modeled in 'ietf-bfd-ip-sh' as a list keyed by {interface, dest-addr}. A separate 'interfaces' list under 'ip-sh' allows per-interface authentication configuration for sessions created by BFD clients. The 'singlehop-notification' carries interface and echo-enabled fields in addition to common notification parameters.
section: "2.6"
topics:
