document: rfc-9041
kind: registry
summary: 'The ''TLVs'' registry is restructured into eight ranges: Standards Action (0-16383 and 32768-49161), RFC Required (16384-31739 and 49162-64507), Experimental Use (31740-31743 and 64508-64511, not to be assigned), and FCFS (31744-32767 and 64512-65535). The lower four ranges require an error response if unrecognized; the upper four may be silently dropped.'
section: 6.2.1
