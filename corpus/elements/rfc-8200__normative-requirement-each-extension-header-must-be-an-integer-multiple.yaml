document: rfc-8200
kind: normative-requirement
summary: Each extension header must be an integer multiple of 8 octets long to retain 8-octet alignment for subsequent headers. Multi-octet fields within each extension header must be aligned on their natural boundaries.
section: "4"
rfc2119_level: MUST
