document: rfc-7597
kind: protocol-element
summary: 'Two types of mapping rules exist: the Basic Mapping Rule (BMR), which is mandatory and used by a CE to provision its IPv4 address/prefix/shared address, and the Forwarding Mapping Rule (FMR), which is optional and used in mesh mode for direct CE-to-CE connectivity. Both rules share parameters: Rule IPv6 prefix, Rule IPv4 prefix, and Rule EA-bit length.'
