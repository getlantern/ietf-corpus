document: rfc-7427
kind: design-rationale
summary: Hash algorithm selection is not a negotiated single common value; each direction independently picks a hash algorithm from the other peer's advertised list. This avoids a mandatory intersection step and allows asymmetric algorithm use, simplifying the protocol while still ensuring each side uses a peer-accepted algorithm.
