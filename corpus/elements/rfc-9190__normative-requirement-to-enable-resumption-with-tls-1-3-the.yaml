document: rfc-9190
kind: normative-requirement
summary: To enable resumption with TLS 1.3, the EAP-TLS server MUST send one or more post-handshake NewSessionTicket messages after the initial authentication. Ticket lifetime MUST NOT exceed 604800 seconds (7 days) as specified in TLS 1.3.
section: 2.1.2
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
