document: rfc-7565
kind: design-rationale
summary: An 'acct' URI enables abstract identification only and not interaction; therefore, this specification provides no method for dereferencing an 'acct' URI on its own. Any protocol that uses 'acct' URIs is responsible for specifying how the URI is employed, dereferenced, or resolved in that protocol's context.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
