document: rfc-6773
kind: wire-format
summary: The UDP header for DCCP-UDP carries Source Port and Destination Port (16 bits each) identifying UDP listeners, a 16-bit Length field covering UDP header plus payload, and a 16-bit Checksum over the network-layer pseudoheader and UDP packet. The UDP port values do not identify the DCCP source and destination ports.
section: "3.1"
topics:
    - udp
    - nat
