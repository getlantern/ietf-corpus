document: rfc-8415
kind: normative-requirement
summary: If a client uses a delegated prefix to configure addresses on itself or downstream nodes, the preferred and valid lifetimes of those addresses MUST NOT exceed the corresponding remaining lifetimes of the delegated prefix. This also applies to prefixes advertised for stateless address autoconfiguration.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
