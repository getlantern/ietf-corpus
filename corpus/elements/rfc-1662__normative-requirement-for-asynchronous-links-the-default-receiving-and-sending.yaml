document: rfc-1662
kind: normative-requirement
summary: For asynchronous links, the default receiving and sending ACCM is 0xffffffff, ensuring all ASCII control characters (excluding DEL) can be transparently communicated. For other link types, the default ACCM is 0, since no mapping is needed.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
