document: rfc-8967
kind: interoperability-note
summary: The MAC TLV MUST be ignored if found in the packet body; it is only valid in the packet trailer. PC, Challenge Request, and Challenge Reply TLVs found in an accepted packet are silently ignored during normal processing.
section: "6.1"
topics:
    - routing
    - security
