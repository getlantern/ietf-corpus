document: rfc-5685
kind: wire-format
summary: The REDIRECTED_FROM payload wire format includes the standard IKEv2 Notify header (Protocol ID=0, SPI Size=0, Notify Message Type=16408), followed by GW Ident Type (1 octet, values 1 or 2 for IPv4/IPv6 only), GW Ident Len (1 octet), and the Original Responder GW Identity (variable). FQDN is not a valid identity type here.
section: "9.3"
topics:
    - ipsec
    - vpn
