document: rfc-4171
kind: normative-requirement
summary: Each object of a specific type in the iSNS database MUST have an implicit internal linear ordering based on its key(s), enabling DevGetNext queries; the relative order of surviving entries SHOULD NOT change due to insertions or deletions.
section: "3.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
