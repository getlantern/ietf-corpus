document: rfc-2142
kind: design-rationale
summary: The scope of a well-known mailbox name is the domain name level, not the host level; for non-protocol-specific names like ABUSE, only the organization's top-level domain name is required to be valid, though supporting sub-domain mailbox names is encouraged.
