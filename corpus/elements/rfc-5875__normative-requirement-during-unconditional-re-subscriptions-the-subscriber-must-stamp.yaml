document: rfc-5875
kind: normative-requirement
summary: During unconditional re-subscriptions, the subscriber MUST stamp the received state of all previous resources as stale. If a conditional re-subscription is successful, the subscriber MUST preserve the current state of resources unless the subscribed URI list has changed.
section: "4.8"
rfc2119_level: MUST
topics:
    - sip
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
