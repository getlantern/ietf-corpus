document: rfc-6550
kind: wire-format
summary: RPL control messages are ICMPv6 (Type 155) messages. The body consists of a Type (8 bits), Code (8 bits), Checksum (16 bits), a code-dependent Base, and optional Options. High-order bit (0x80) of Code indicates a secure variant, which inserts a Security section between Checksum and Base.
