document: rfc-3492
kind: design-rationale
summary: An alternative overflow-handling strategy for decoders used exclusively inside IDNA ToUnicode is to skip overflow checking entirely, since ToUnicode performs a higher-level re-encoding and comparison where a mismatch produces the same consequence as a decoder failure.
