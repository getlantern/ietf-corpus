document: rfc-6940
kind: protocol-element
summary: The Chord topology plugin uses a ring DHT where each peer maintains a neighbor table of immediately adjacent peers and a finger table for O(log N) routing. Routing proceeds by forwarding messages to the peer closest to the target Resource-ID in the identifier space.
