document: rfc-9800
kind: protocol-element
summary: End.LBS (Endpoint with SRv6 Locator-Block Swap) is a new SRv6 endpoint behavior that modifies the Locator-Block of the active CSID sequence, enabling a CSID sequence to span multiple routing domains. It is used when the routing domain boundary is at the SR segment endpoint node itself. It is defined with both NEXT-CSID and REPLACE-CSID flavors.
section: "7.1"
topics:
    - routing
    - ip
