document: rfc-5750
kind: normative-requirement
summary: All subject and issuer names MUST be populated (i.e., not an empty SEQUENCE) in S/MIME-compliant X.509 certificates, except that the subject DN in an end-entity certificate MAY be an empty SEQUENCE, in which case the subjectAltName MUST be marked as critical.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - email
