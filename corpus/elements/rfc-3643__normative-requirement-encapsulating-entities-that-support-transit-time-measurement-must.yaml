document: rfc-3643
kind: normative-requirement
summary: Encapsulating entities that support transit time measurement MUST have access to an internal time base with sufficient stability and resolution, and a time base synchronized with peer entities. The encapsulating protocol specification MUST describe the synchronization and alignment procedure.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
