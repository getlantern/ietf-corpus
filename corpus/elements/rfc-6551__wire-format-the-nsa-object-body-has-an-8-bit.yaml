document: rfc-6551
kind: wire-format
summary: The NSA Object body has an 8-bit Res field (MUST be set to zero on transmission), an 8-bit Flags field with 'A' (bit 6, aggregator) and 'O' (bit 7, overloaded) bits defined, and optional TLVs. Unassigned flag bits MUST be set to zero on transmission and MUST be ignored on receipt.
section: "3.1"
