document: rfc-8215
kind: interoperability-note
summary: Operators must not use the aggregate prefix 64:ff9b::/47 to refer to all special-use prefixes for IPv4/IPv6 translation, as this aggregate covers an unallocated range (64:ff9b::1:0:0 through 64:ff9b:0:ffff:ffff:ffff:ffff:ffff) that the IETF could reserve in the future for entirely different purposes.
section: "5"
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
