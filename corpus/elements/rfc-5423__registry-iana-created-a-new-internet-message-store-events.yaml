kind: registry
summary: 'IANA created a new ''Internet Message Store Events'' registry with two sub-registries: event names and event parameters. Entries not starting with ''vnd.'' are allocated by IETF Consensus for interoperable use; entries starting with ''vnd.'' are allocated First Come First Served for private use.'
