document: rfc-7545
kind: protocol-element
summary: AVAIL_SPECTRUM_BATCH_REQ allows a Master Device to query spectrum for multiple locations (GeoLocation list) in a single request, enabling prefetch for anticipated positions. The Database MAY return fewer locations than requested. If the Database does not support batch requests, it MUST return an UNIMPLEMENTED error.
section: 4.5.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
