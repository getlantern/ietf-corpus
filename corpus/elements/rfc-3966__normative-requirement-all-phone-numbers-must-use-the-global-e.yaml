document: rfc-3966
kind: normative-requirement
summary: All phone numbers MUST use the global (E.164) form unless they cannot be represented as such. Numbers from private numbering plans, emergency numbers (e.g., '911', '112'), and certain service codes that cannot be expressed in E.164 form MUST be represented as local numbers with a 'phone-context'.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
