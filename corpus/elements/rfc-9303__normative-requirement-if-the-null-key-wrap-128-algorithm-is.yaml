document: rfc-9303
kind: normative-requirement
summary: If the NULL-KEY-WRAP-128 algorithm is selected and no DTLS (or other encryption mechanism) is enabled between the ITR and the Map-Resolver, the Map-Request MUST be dropped and an appropriate log action SHOULD be taken.
