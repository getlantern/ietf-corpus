document: rfc-5627
kind: normative-requirement
summary: If the Call-ID in a REGISTER request differs from the most recently registered contact with the same AOR and instance ID, the registrar MUST invalidate all previously generated temporary GRUUs for that AOR and instance ID; subsequent requests to those GRUUs will be rejected with a 404.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
