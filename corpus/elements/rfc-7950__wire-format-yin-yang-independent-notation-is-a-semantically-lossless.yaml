document: rfc-7950
kind: wire-format
summary: YIN (YANG Independent Notation) is a semantically lossless XML representation of YANG modules. Each YANG statement maps to an XML element; the conversion is round-trippable. YIN files use the '.yin' extension and enable XSLT-based processing of data models.
