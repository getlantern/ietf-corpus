document: rfc-8798
kind: design-rationale
summary: The unit 'var' (volt-ampere reactive) is registered as a separate primary unit from VA because there is strong interest in using it specifically for the imaginary content of complex power (reactive power) per IEEE 1459, making the distinction between apparent and reactive power explicit in the unit symbol.
section: "2.1"
