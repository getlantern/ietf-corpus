document: rfc-9233
kind: design-rationale
summary: No exception was added for U+08A1 ARABIC LETTER BEH WITH HAMZA ABOVE despite IAB concerns, because the combining-sequence ambiguity issue is not unique to this code point and affects a number of long-standing PVALID code points. A special exception was not warranted given the broader nature of the problem.
section: "3.1"
topics:
