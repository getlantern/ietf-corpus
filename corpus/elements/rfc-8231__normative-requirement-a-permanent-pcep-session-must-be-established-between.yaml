document: rfc-8231
kind: normative-requirement
summary: A permanent PCEP session MUST be established between a stateful PCE and a PCC. In case of session failure, re-establishment MUST be re-attempted per RFC 5440 procedures including backoff timers.
section: "5.10"
rfc2119_level: MUST
topics:
