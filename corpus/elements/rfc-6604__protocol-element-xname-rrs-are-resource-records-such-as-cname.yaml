document: rfc-6604
kind: protocol-element
summary: xNAME RRs are resource records such as CNAME and DNAME that cause a DNS query to be redirected to a different name. When encountered during resolution of a different query type, the xNAME RR (and any synthesized CNAME) is added to the response answer, and the query is restarted with the redirected name.
section: "1"
topics:
