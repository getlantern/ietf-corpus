document: rfc-9520
kind: protocol-element
summary: SERVFAIL (RCODE=2) is returned when a name server cannot process a query due to its own problems; authoritative servers use it when they lack valid zone data, and recursive servers use it for a variety of failure conditions including those described in this document.
section: "2.1"
