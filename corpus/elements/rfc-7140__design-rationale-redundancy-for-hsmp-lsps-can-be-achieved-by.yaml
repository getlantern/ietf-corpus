document: rfc-7140
kind: design-rationale
summary: Redundancy for HSMP LSPs can be achieved by provisioning two independent HSMP LSPs in active/standby configuration. Upon failure of the active LSP, root and leaf nodes switch traffic to the standby. The detailed redundancy mechanism is out of scope for this document.
