document: rfc-8873
kind: security-consideration
summary: MSRP traffic over data channels — including confidentiality, integrity, and source authentication — is secured as specified by RFC 8831 (WebRTC Data Channels, which mandates DTLS). This provides stronger transport-layer security guarantees than the optional TLS in RFC 4975.
section: "8"
topics:
