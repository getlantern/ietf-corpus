document: rfc-7015
kind: privacy-consideration
summary: Aggregation operations that eliminate IP addresses make it impossible to later directly identify nodes using those addresses, providing a potential anonymizing effect on Aggregated Flows; however, this effect must be explicitly evaluated against RFC 6235 guidelines and is not a guaranteed privacy protection.
section: "1"
topics:
    - privacy
    - measurement
