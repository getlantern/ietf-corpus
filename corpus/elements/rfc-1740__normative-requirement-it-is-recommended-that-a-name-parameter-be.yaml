document: rfc-1740
kind: normative-requirement
summary: It is recommended that a NAME parameter be included on the Content-Type header of AppleSingle and AppleDouble messages to give the recipient a hint about the attached file. The value must be a 'value' as defined by RFC-1521, restricting it to seven-bit US-ASCII characters.
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - email
