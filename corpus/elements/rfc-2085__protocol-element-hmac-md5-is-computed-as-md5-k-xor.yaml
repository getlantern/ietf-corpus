document: rfc-2085
kind: protocol-element
summary: HMAC-MD5 is computed as MD5(K XOR opad, MD5(K XOR ipad, text)), where ipad is 0x36 repeated 64 times and opad is 0x5C repeated 64 times, and K is zero-padded to 64 bytes (or pre-hashed with MD5 if longer than 64 bytes).
section: "2.2"
topics:
