document: rfc-9910
kind: design-rationale
summary: The 'rirSearch1' path segment was introduced to provide a single namespace for all relation searches so that other searches can be independently defined under the top-level resource type path segments. The '1' suffix denotes version 1; new versions will use different identifiers. The remaining identifiers (ips, autnums, etc.) omit version suffixes for consistency with other core object classes.
