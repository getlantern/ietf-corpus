document: rfc-7961
kind: protocol-element
summary: The Data Label sub-sub-TLV (type 3) specifies the VLAN or FGL within which the interfaces are reachable. Length 2 encodes a VLAN ID (bottom 12 bits); Length 3 encodes an FGL. Multiple occurrences indicate reachability in all listed Data Labels.
section: "3.3"
topics:
