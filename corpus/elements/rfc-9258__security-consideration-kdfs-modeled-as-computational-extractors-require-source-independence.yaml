document: rfc-9258
kind: security-consideration
summary: 'KDFs modeled as computational extractors require source-independence: the same IKM must not be used for two different KDFs. The PSK importer ensures each imported PSK is used as IKM for at most one KDF by diversifying on ImportedIdentity.target_kdf.'
