document: rfc-9635
kind: privacy-consideration
summary: Subject Identifiers returned to client instances can enable surveillance and tracking of users. The AS SHOULD allow users to control what subject information is released, SHOULD use pairwise identifiers where possible, and SHOULD NOT release more information than necessary for the declared purpose.
section: "12.1"
topics:
    - privacy
    - oauth
