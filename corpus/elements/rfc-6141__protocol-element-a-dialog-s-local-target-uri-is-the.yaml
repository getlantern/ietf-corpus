document: rfc-6141
kind: protocol-element
summary: A dialog's local target URI is the SIP or SIPS URI recorded by a UA at which the peer can communicate with it, equal to the URI in the Contact header of requests and responses the UA sends. The remote target URI is the complementary URI from messages received from the peer.
section: "4.1"
topics:
    - sip
    - realtime
