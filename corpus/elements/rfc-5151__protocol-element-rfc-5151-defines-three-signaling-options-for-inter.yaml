document: rfc-5151
kind: protocol-element
summary: 'RFC 5151 defines three signaling options for inter-domain RSVP-TE LSPs: contiguous (single end-to-end LSP per RFC 3209/3473), nested (LSP carried inside an H-LSP per RFC 4206), and stitched (concatenated LSP segments per RFC 5150). Any combination of these options may be used across the domains traversed by a single end-to-end LSP.'
section: "2.1"
topics:
    - mpls
    - realtime
    - routing
