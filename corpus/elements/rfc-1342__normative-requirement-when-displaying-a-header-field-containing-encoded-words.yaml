document: rfc-1342
kind: normative-requirement
summary: When displaying a header field containing encoded-words, an unencoded SPACE immediately following an encoded-word MUST NOT be displayed, and a newline immediately following an encoded-word MUST NOT be displayed unless it is the last token in that field.
section: Use of encoded-words in message headers
rfc2119_level: MUST NOT
topics:
    - email
