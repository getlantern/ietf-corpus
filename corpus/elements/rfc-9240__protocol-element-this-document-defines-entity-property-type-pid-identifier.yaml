document: rfc-9240
kind: protocol-element
summary: 'This document defines entity property type ''pid'' (identifier: ''pid'') extending the RFC 7285 endpoint property type ''pid''. It applies to IPv4 and IPv6 address entities, returns the PID in a given network map that contains the address, and requires application/alto-networkmap+json as its defining information resource media type.'
section: 8.7.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
