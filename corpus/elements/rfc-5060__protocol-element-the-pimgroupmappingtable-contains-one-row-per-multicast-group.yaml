kind: protocol-element
summary: The pimGroupMappingTable contains one row per multicast group prefix mapping, recording the PIM mode, RP address, origin mechanism, and precedence value for each mapping. Only the entry with the lowest pimGroupMappingPrecedence value is the active mapping for a given group.
