document: rfc-2574
kind: interoperability-note
summary: The same userName may be defined on multiple SNMP engines with different localized keys at each. Non-authoritative engines that cache timeliness state for an authoritative engine must resynchronize (reset cached boots/time to zero) whenever the authoritative engine reboots, detected by receiving a message with a higher snmpEngineBoots value.
section: "2.3"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
