summary: 'The unicast-prefix-based IPv6 multicast address format is: 8 bits (11111111) | 4 bits flags | 4 bits scope | 8 bits reserved | 8 bits plen | 64 bits network prefix | 32 bits group ID. This replaces the original 112-bit group ID field with structured prefix information.'
