document: rfc-8015
kind: protocol-element
summary: 'The Threshold field (8 bits) is equivalent to Gmin in RFC 3611: the number of successive packets that must be received prior to and following a discarded packet for that discard to be counted as part of a gap rather than a burst. It is set per the Gmin calculation in RFC 3611 Section 4.7.2.'
section: "3.2"
topics:
