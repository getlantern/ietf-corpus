document: rfc-9427
kind: normative-requirement
summary: Implementations of EAP methods that wish to use TLS 1.3 MUST follow the guidelines in RFC 9190, unless otherwise required by this document. The main difference is that other EAP method types use their own Type value instead of the EAP-TLS Type value (0x0D) in key derivation calculations.
section: "2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
