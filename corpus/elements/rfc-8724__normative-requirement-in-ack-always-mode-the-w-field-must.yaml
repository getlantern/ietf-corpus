document: rfc-8724
kind: normative-requirement
summary: 'In ACK-Always mode, the W field MUST be present with size M=1 bit. Each Profile MUST define: N, WINDOW_SIZE (strictly less than 2^N), RCS size/algorithm, T, MAX_ACK_REQUESTS, Retransmission Timer expiry, and Inactivity Timer expiry.'
section: 8.4.2
rfc2119_level: MUST
topics:
