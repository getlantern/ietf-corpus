document: rfc-2108
kind: protocol-element
summary: rptrMonitorPortDataRateMismatches counts frames received where the data rate (frequency) is detectably mismatched from the local transmit frequency, using either of two measurement methods (by activity duration or by octet count). The exact degree of detectable mismatch is vendor-specific.
