document: rfc-8747
kind: interoperability-note
summary: Key IDs for PoP keys are not necessarily the same value for different parties. When Key ID is not a cryptographic value derived from the key, implementers should expect collisions where different keys are assigned the same Key ID, and recipients must be prepared to handle them.
section: "3.4"
topics:
    - cbor
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
