document: rfc-6728
kind: protocol-element
summary: 'The FilterHash class configures hash-based packet filtering with parameters: hashFunction (BOB, IPSX, or CRC; default BOB), initializerValue, ipPayloadOffset (default 0), ipPayloadSize (default 8 bytes), and digestOutput. One or more SelectedRange sub-objects define accepted hash value ranges via min/max.'
