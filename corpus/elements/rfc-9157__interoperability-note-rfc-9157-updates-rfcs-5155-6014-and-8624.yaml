document: rfc-9157
kind: interoperability-note
summary: RFC 9157 updates RFCs 5155, 6014, and 8624. Implementations relying on RFC 8624 for algorithm implementation guidance must account for the clarified scope that now explicitly includes algorithms defined in non-standards-track RFCs, not only mandatory-to-implement or deprecated algorithms.
section: "3"
topics:
