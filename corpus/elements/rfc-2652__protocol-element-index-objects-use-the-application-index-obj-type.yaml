document: rfc-2652
kind: protocol-element
summary: Index objects use the application/index.obj.<type> MIME type with required parameters dsi (globally unique dataset identifier) and base-uri (one or more URIs forming the base for referral generation). The type in the MIME subtype name distinguishes syntactically different index formats.
section: "2.4"
