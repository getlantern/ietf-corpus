document: rfc-9535
kind: protocol-element
summary: The filter selector ?<logical-expr> iterates over elements/members of arrays and objects, selecting those for which the logical expression is true. It supports &&, ||, !, comparison operators (==, !=, <, <=, >, >=), existence tests, and function calls.
section: 2.3.5
topics:
