document: rfc-4470
kind: security-consideration
summary: The effectiveness of this technique depends critically on the quality of the epsilon functions. An increment function that is obviously derived from the next instantiated name, or that always returns a name very close to the next instantiated name, can be easily reverse-engineered and defeats the purpose of zone walking prevention.
section: "5"
topics:
