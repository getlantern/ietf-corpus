document: rfc-2271
kind: protocol-element
summary: The maxSizeResponseScopedPDU conveys the maximum size of a scopedPDU that may be included in a response message; it excludes the SNMP message header. This value is propagated through Dispatcher and Message Processing primitives to communicate the sender's buffer constraints to the responder.
section: 3.4.1
topics:
