document: rfc-5510
kind: design-rationale
summary: 'Repair symbols can be produced on demand: a sender can initially produce a limited number of repair symbols and later produce additional ones (up to n-k) based on observed channel erasures, since producing repair symbol e_j only requires multiplying the S source vectors by column j of GM.'
