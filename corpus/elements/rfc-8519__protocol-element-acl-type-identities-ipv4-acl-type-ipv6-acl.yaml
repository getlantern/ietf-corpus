document: rfc-8519
kind: protocol-element
summary: ACL type identities (ipv4-acl-type, ipv6-acl-type, eth-acl-type, mixed-eth-ipv4-acl-type, mixed-eth-ipv6-acl-type, mixed-eth-ipv4-ipv6-acl-type) all derive from acl-base and are guarded by corresponding feature statements. The 'type' leaf on an ACL drives YANG 'when' conditions that enforce which match containers are available for its ACEs.
