document: rfc-9573
kind: normative-requirement
summary: If a VPN/BD/ES/PMSI label is assigned from one of the context-specific label spaces (not the DCB), a Context-Specific Label Space ID EC MUST be attached to the route, with ID-Type 0 and ID-Value set to the DCB label that identifies that context-specific label space.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
