document: rfc-8665
kind: normative-requirement
summary: An Adj-SID for a P2P adjacency MAY be advertised when in state 2-Way or higher. If the adjacency transitions to a state lower than 2-Way, the Adj-SID advertisement MUST be withdrawn from the area.
section: 7.4.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
