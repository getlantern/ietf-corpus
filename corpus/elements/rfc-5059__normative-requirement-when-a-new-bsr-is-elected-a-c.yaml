document: rfc-5059
kind: normative-requirement
summary: When a new BSR is elected, a C-RP MUST send one to three C-RP-Advertisement messages (each preceded by a randomized C_RP_Adv_Backoff delay) so the new BSR learns active RPs quickly despite possible packet loss during the transition.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
    - routing
