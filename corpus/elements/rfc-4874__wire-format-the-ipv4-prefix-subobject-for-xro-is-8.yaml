document: rfc-4874
kind: wire-format
summary: 'The IPv4 Prefix subobject for XRO is 8 bytes: 1-bit L flag, 7-bit Type (1), 1-byte Length, 4-byte IPv4 address, 1-byte Prefix Length, and 1-byte Attribute. The Attribute octet distinguishes interface exclusion (0), node exclusion (1), and SRLG exclusion (2), allowing a single interface address to exclude the whole node or all its SRLGs.'
section: 3.1.1
topics:
    - mpls
    - routing
    - ip
