document: rfc-7166
kind: protocol-element
summary: 'Sequence number wrap handling: the sequence number is treated as unsigned 64-bit; if the lower-order 32 bits wrap, the higher-order 32 bits are incremented and saved in non-volatile storage. If a full 64-bit wrap is possible, all keys MUST be reset to prevent replay attacks.'
section: 4.1.1
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
