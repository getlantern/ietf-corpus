document: rfc-9254
kind: protocol-element
summary: YANG Schema Item iDentifier (YANG SID or SID) is a 63-bit unsigned integer (range 0..9223372036854775807) used to identify YANG items including identities, data nodes, RPCs, actions, YANG data structures, notifications, modules, and features. SID value 0 is reserved and never used in interchange.
