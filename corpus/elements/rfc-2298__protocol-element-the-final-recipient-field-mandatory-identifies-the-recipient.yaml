document: rfc-2298
kind: protocol-element
summary: The Final-Recipient field (mandatory) identifies the recipient for whom the MDN is being issued, using address-type ';' generic-address. It must contain the mailbox address as it existed when the MDN was generated, and alphabetic case must be preserved.
