document: rfc-6672
kind: interoperability-note
summary: This document updates RFC 3363 by dropping all constraints on having DNAME RRs in the IPv6 reverse tree. RFC 3363 had deprecated DNAME use in the reverse tree based on a faulty premise tied to A6 records; that deprecation is now reversed.
section: "4"
topics:
    - dns
    - v6ops
