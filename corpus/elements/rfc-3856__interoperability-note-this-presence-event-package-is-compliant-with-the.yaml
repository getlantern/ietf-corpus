document: rfc-3856
kind: interoperability-note
summary: This presence event package is compliant with the Common Presence Profile (CPP) framework (RFC 3859), enabling SIP-based presence to interwork with other CPP-compliant presence systems through gateways. Protocol-independent pres URIs are used to facilitate this interoperability.
