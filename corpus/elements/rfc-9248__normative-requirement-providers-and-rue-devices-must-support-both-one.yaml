document: rfc-9248
kind: normative-requirement
summary: Providers and RUE devices MUST support both one-stage and two-stage dial-around. In one-stage dial-around, the domain part of the SIP URIs in the To field and Request-URI MUST be the domain of the dial-around provider.
section: 5.2.2
rfc2119_level: MUST
topics:
    - sip
    - voip
