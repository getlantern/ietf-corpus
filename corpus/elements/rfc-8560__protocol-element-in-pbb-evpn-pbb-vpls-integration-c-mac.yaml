document: rfc-8560
kind: protocol-element
summary: In PBB-EVPN/PBB-VPLS integration, C-MAC addresses learned over local ACs are processed in the I-component of PBB-EVPN PEs and are not advertised in the control plane, per RFC 7623. Only B-MAC addresses are exchanged in the BGP control plane.
section: "4.2"
topics:
    - mpls
