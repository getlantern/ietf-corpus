document: rfc-7854
kind: protocol-element
summary: 'The Peer Flags field (1 byte) in the Per-Peer Header carries three defined flags: V (bit 0) indicates IPv6 peer address; L (bit 1) indicates post-policy Adj-RIB-In when set (pre-policy when clear); A (bit 2) indicates legacy 2-byte AS_PATH format when set. Remaining bits MUST be transmitted as 0.'
section: "4.2"
topics:
