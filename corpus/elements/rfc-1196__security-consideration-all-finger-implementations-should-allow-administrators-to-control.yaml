document: rfc-1196
kind: security-consideration
summary: All Finger implementations SHOULD allow administrators to control which atoms of information (office location, phone numbers, idle time, full name, etc.) are returned per query, down to the minimum required response of the user's full name. This 'atomic discharge' capability is essential for site-specific security policy.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
