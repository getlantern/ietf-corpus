document: rfc-6156
kind: protocol-element
summary: 'For IPv6-to-IPv6 translations, the relay treats the two flows independently: Flow Label SHOULD NOT be copied, Hop Limit is decremented as a router, and fragmentation logic preserves or regenerates Fragment Headers based on MTU. Outgoing fragments exceeding MTU must be no more than 1280 bytes.'
section: "8.2"
topics:
    - nat
    - ip
    - v6ops
