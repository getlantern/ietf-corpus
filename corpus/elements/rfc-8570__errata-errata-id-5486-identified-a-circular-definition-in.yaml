document: rfc-8570
kind: errata
summary: 'Errata ID 5486 identified a circular definition in RFC 7810 Section 4.6: available bandwidth on bundled links was incorrectly defined as the sum of component link available bandwidths rather than the sum of component link residual bandwidths. RFC 8570 corrects and clarifies this definition.'
section: Appendix A
