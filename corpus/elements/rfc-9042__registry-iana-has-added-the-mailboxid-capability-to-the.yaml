document: rfc-9042
kind: registry
summary: IANA has added the "mailboxid" capability to the "Sieve Extensions" registry. It adds a test for checking mailbox existence by OBJECTID and new optional :mailboxid arguments to fileinto and :fcc for selecting the destination mailbox by OBJECTID.
