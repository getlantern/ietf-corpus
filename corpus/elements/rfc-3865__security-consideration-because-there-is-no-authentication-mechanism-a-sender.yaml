document: rfc-3865
kind: security-consideration
summary: Because there is no authentication mechanism, a sender could begin using this extension before widespread receiver adoption and attempt to interpret the absence of the extension as implied consent. The spec explicitly forecloses this interpretation.
section: "3"
topics:
