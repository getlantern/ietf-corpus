summary: Template Withdrawal Message is a Template Record with Field Count = 0; Set ID MUST be 2 for Template Set Withdrawal or 3 for Options Template Set Withdrawal. Multiple Template IDs may be withdrawn in one message. An all-Templates withdrawal uses Template ID equal to the Set ID value.
