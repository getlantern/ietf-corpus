document: rfc-6772
kind: protocol-element
summary: 'The civic-transformation profile uses the <provide-civic> element with levels: ''none'', ''country'', ''region'', ''city'', ''building'', and ''full''. Each level is a superset of all lower levels (e.g., ''city'' includes country, A1, A2, A3). The default value is ''none''.'
section: 6.5.1
topics:
    - privacy
