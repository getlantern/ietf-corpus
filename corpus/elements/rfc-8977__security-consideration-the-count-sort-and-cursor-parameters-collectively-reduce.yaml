summary: 'The ''count'', ''sort'', and ''cursor'' parameters collectively reduce inefficiency risks from large result sets: ''count'' lets clients evaluate response completeness, ''sort'' surfaces the most relevant results first, and ''cursor'' enables controlled traversal within server-acceptable query limits.'
