document: rfc-8029
kind: registry
summary: 'RFC 8029 consolidates and updates the ''MPLS LSP Ping Parameters'' IANA registry group, comprising sub-registries for: Message Types, Reply Modes, Return Codes (Section 6.2.1); TLVs and sub-TLVs (Section 6.2.2); Global Flags (Section 6.2.3); Downstream Detailed Mapping Address Type (Section 6.2.4); DS Flags (Section 6.2.5); Multipath Types (Section 6.2.6); Pad Type (Section 6.2.7); Interface and Label Stack Address Type (Section 6.2.8). It obsoletes registries from RFCs 4379, 6424, 6829, and 7537.'
section: "6.2"
topics:
    - mpls
    - registry
