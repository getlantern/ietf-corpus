document: rfc-3720
kind: design-rationale
summary: iSCSI names are associated with iSCSI nodes rather than network adapter cards so that NIC or HBA replacement does not require reconfiguration of SCSI resource allocations. Names are globally unique, permanent, and location-independent, delegating naming authority to existing DNS domain name holders or IEEE EUI-64 registrants.
section: 3.2.6
topics:
    - security
