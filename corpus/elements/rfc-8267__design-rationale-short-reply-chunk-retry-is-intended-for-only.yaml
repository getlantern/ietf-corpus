document: rfc-8267
kind: design-rationale
summary: Short Reply chunk retry is intended for only a few operations where the size of returned data items cannot be known in advance; in all other cases, reply size underestimation is considered a correctable implementation bug rather than a protocol-level retry mechanism.
section: "3.1"
extracted_by: claude-sonnet-4-6
