document: rfc-8004
kind: design-rationale
summary: Rendezvous servers (RVS) are introduced to improve reachability for mobile or multihomed HIP nodes. A HIP node registers its HIT-to-IP mappings with an RVS, and peers can initiate a base exchange using the RVS's IP address instead of the node's current (possibly unknown) IP address.
section: "1"
topics:
    - ip
    - mobility
    - security
