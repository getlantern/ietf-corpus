document: rfc-8742
kind: security-consideration
summary: The security considerations of CBOR (RFC 7049) apply to CBOR Sequences. The format provides no cryptographic integrity protection of any kind, but can be combined with CBOR Object Signing and Encryption (COSE) to do so. COSE protections can be applied to an entire sequence or to each element independently.
section: "5"
topics:
