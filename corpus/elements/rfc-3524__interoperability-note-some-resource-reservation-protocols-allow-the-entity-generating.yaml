document: rfc-3524
kind: interoperability-note
summary: Some resource reservation protocols allow the entity generating the SDP session description to allocate resources in both directions for the session, making the SRF grouping mechanism unnecessary in those scenarios. SRF is specifically needed when the remote party participates in reservation.
