document: rfc-5756
kind: normative-requirement
summary: When id-RSAES-OAEP is used in an AlgorithmIdentifier, the parameters MUST employ the RSAES-OAEP-params syntax, MUST be absent when used in the subjectPublicKeyInfo field, and MUST be present when used in the algorithm identifier associated with an encrypted value.
section: "4"
rfc2119_level: MUST
topics:
