document: rfc-8471
kind: normative-requirement
summary: When operating in a special privacy mode (e.g., private browsing), applications SHOULD use newly generated Token Binding keys and delete them when exiting this mode; otherwise, they SHOULD NOT negotiate Token Binding at all.
section: "8"
rfc2119_level: SHOULD
topics:
