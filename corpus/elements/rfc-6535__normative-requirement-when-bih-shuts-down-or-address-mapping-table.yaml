document: rfc-6535
kind: normative-requirement
summary: When BIH shuts down or address mapping table entries are cleared for any reason, DNS cache entries for synthetic IPv4 addresses MUST be flushed, including caches in both the network-layer ENR and the host's stub resolver.
section: 2.3.4
rfc2119_level: MUST
topics:
