document: rfc-7627
kind: normative-requirement
summary: If a client receives a ServerHello without the extension, it SHOULD abort the handshake if it does not wish to interoperate with legacy servers. If both sides continue without the extension, they MUST use the standard master secret derivation.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - tls
