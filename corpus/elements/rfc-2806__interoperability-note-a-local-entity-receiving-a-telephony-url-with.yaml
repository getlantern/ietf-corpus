document: rfc-2806
kind: interoperability-note
summary: A local entity receiving a telephony URL with a local number MUST verify it knows the context in which the number is to be processed before using it; the local entity MUST NOT assume that a locally-formatted number beginning with '00' is equivalent to the corresponding global number beginning with '+'.
section: 2.7.5
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
