document: rfc-9251
kind: security-consideration
summary: Security considerations for RFC 9251 inherit from the underlying EVPN and BGP substrates (RFC 7432), multicast in MPLS/BGP IP VPNs (RFC 6513, RFC 6514), and the IGMP/MLD protocols themselves (RFC 2236, RFC 3376, RFC 2710, RFC 3810). The EVPN IGMP Proxy provides a single broadcast domain, so the same IGMP/MLD security considerations apply.
section: "11"
topics:
    - security
    - multicast
