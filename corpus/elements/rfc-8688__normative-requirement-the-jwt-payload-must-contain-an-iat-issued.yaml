document: rfc-8688
kind: normative-requirement
summary: The JWT payload MUST contain an 'iat' (issued at) claim set to the date and time of the issuance of the 608 response, and MUST contain a 'jcard' claim whose value is a JSON array conforming to the jCard data format (RFC 7095).
section: 3.2.2
rfc2119_level: MUST
