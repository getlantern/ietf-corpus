document: rfc-5424
kind: wire-format
summary: MSG is optional and is either MSG-ANY (any octets not starting with BOM) or MSG-UTF8 (BOM %xEF.BB.BF followed by a UTF-8 string). The BOM unambiguously signals UTF-8 encoding; its absence means the encoding is unknown.
section: "6.4"
