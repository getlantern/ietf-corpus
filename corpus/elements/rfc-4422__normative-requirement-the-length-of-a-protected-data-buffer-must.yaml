document: rfc-4422
kind: normative-requirement
summary: The length of a protected data buffer MUST be no larger than the maximum size the other side expects. Upon receipt of a length field whose value exceeds the maximum size, the receiver SHOULD close the connection, as this may indicate an attack.
section: "3.7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
