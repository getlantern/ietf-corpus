document: rfc-5886
kind: interoperability-note
summary: The P and I flags of all PCEP objects defined in this document SHOULD always be set to 0 on transmission and MUST be ignored on receipt, since these flags are exclusively related to path computation requests and have no meaning in monitoring objects.
