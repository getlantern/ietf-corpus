document: rfc-8010
kind: wire-format
summary: 'An attribute-with-one-value is encoded as: value-tag (1 byte), name-length (2 bytes, SIGNED-SHORT), name (variable bytes), value-length (2 bytes, SIGNED-SHORT), and value (variable bytes). The value-tag specifies the attribute syntax (e.g., 0x44 for keyword).'
section: 3.1.4
