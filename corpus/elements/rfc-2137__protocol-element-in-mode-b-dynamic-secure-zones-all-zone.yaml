document: rfc-2137
kind: protocol-element
summary: In Mode B dynamic secure zones, all zone data is authenticated by zone key SIG RRs; update data signatures need not be included with the update. A resolver determines the zone's mode by examining the signatory field bits of the zone KEY RR.
section: "4.2"
