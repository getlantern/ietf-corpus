summary: 'The symmetric key PoP mechanism is conceptually similar to Kerberos tickets: the issuer embeds an encrypted copy of the symmetric key in the JWT confirmation claim, and the recipient decrypts it to obtain the key used to verify subsequent communications with the presenter.'
