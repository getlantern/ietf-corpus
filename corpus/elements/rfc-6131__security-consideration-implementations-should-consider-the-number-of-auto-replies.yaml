document: rfc-6131
kind: security-consideration
summary: Implementations SHOULD consider the number of auto-replies that might be generated by allowing small values of ':seconds' (including 0), and MAY impose additional limits on that number. The Security Considerations of RFC 3834 apply.
section: "4"
rfc2119_level: SHOULD
