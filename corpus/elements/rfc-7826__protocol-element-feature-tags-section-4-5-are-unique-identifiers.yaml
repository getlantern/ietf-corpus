document: rfc-7826
kind: protocol-element
summary: Feature tags (Section 4.5) are unique identifiers designating optional RTSP capabilities. They appear in Require, Proxy-Require, Proxy-Supported, Supported, and Unsupported headers to negotiate feature availability. The mandatory baseline feature tag is 'play.basic'.
section: "4.5"
