document: rfc-2320
kind: interoperability-note
summary: The IANA ifType ipOverAtm(114) was created for systems that require a virtual IP over ATM interface layer. Systems that use this ifType SHOULD use ifStackTable to show the relationship to underlying ATM physical interfaces.
