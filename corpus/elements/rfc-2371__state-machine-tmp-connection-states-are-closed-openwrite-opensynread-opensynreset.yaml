document: rfc-2371
kind: state-machine
summary: 'TMP connection states are: Closed, OpenWrite, OpenSynRead, OpenSynReset, ReadWrite, CloseWrite, and CloseRead. State transitions are driven by SYN, FIN, RESET, DATA-IN events and API calls (open, close, abort). Receipt of a TMP packet in an incorrect state causes the underlying TCP connection to be closed.'
section: A.5
topics:
    - tcp
