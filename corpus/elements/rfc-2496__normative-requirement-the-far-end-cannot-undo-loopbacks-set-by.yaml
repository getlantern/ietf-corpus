document: rfc-2496
kind: normative-requirement
summary: The far end cannot undo loopbacks set by a manager; a manager can undo loopbacks set by the far end. Both a LineLoopback and InwardLoopback can coexist; when a NoLoopback is received from the far end while an InwardLoopback was set by the manager, the InwardLoopback remains.
section: 2.2.4
rfc2119_level: MUST
topics:
    - snmp
