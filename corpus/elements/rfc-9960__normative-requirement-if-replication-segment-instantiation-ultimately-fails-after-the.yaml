document: rfc-9960
kind: normative-requirement
summary: If Replication segment instantiation ultimately fails after the allowed number of attempts, the controller SHOULD generate an alert via mechanisms like syslog. These alerts SHOULD be rate-limited to protect the logging facility.
section: "5.5"
rfc2119_level: SHOULD
