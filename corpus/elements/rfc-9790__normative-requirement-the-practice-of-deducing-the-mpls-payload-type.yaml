document: rfc-9790
kind: normative-requirement
summary: The practice of deducing the MPLS payload type based on the PFN value is deprecated; this MUST NOT be part of new implementations or deployments. This supersedes the heuristic method described in RFC 4928.
section: "2.2"
rfc2119_level: MUST NOT
