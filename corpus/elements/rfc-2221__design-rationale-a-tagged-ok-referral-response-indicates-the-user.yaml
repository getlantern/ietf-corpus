document: rfc-2221
kind: design-rationale
summary: A tagged OK referral response indicates the user's personal mailboxes are elsewhere but the current server has readable public mailboxes; a tagged NO referral means the server contains no mailboxes accessible to the user. After receiving either, the client cannot assume whether the move is permanent or temporary.
section: "4"
