document: rfc-9479
kind: protocol-element
summary: The Application-Specific Link Attributes (ASLA) sub-TLV (Type 16) is defined for TLVs Advertising Neighbor Information. Its value contains an Application Identifier Bit Mask followed by link attribute sub-sub-TLVs whose formats match those of legacy sub-TLVs defined in RFC 5305, RFC 7308, and RFC 8570.
section: "4.2"
topics:
    - routing
