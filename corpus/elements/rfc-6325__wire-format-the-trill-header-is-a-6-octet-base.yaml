kind: wire-format
summary: 'The TRILL header is a 6-octet base structure containing: V (2-bit version), R (2-bit reserved), M (1-bit multi-destination), Op-Length (5-bit options length in 4-octet units), Hop Count (6-bit), Egress RBridge Nickname (16-bit), and Ingress RBridge Nickname (16-bit), followed by optional variable-length options.'
