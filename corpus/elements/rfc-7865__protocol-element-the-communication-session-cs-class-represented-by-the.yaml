summary: The Communication Session (CS) class, represented by the 'session' XML element, captures the CS as seen by the SRC. Key attributes include session_id (base64 UUID), sipSessionID (per RFC Session-ID), reason (from SIP Reason header with protocol attribute), group-ref, start-time, and stop-time.
