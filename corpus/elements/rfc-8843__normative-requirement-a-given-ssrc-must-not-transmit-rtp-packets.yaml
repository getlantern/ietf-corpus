document: rfc-8843
kind: normative-requirement
summary: A given SSRC MUST NOT transmit RTP packets using payload types that originate from different bundled 'm=' sections. Doing so would cause RTP/RTCP failures and timestamp rate-switching issues.
section: "9.1"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - rtp
    - realtime
