document: rfc-6871
kind: normative-requirement
summary: If the answerer supports media capabilities negotiation and session configurations are offered via 'sescap', it MUST accept one of the offered configurations or MUST refuse the session. Therefore, if the offer includes any session capabilities, it SHOULD include all session capabilities the offerer is willing to support.
section: 3.3.8
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
