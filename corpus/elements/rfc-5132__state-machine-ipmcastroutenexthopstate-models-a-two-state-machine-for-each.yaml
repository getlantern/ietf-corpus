document: rfc-5132
kind: state-machine
summary: 'ipMcastRouteNextHopState models a two-state machine for each multicast next-hop: pruned(1) indicates the outgoing interface is not currently forwarding, and forwarding(2) indicates it is. The ipMcastRouteNextHopExpiryTime represents time until a prune expires and state reverts to forwarding(2).'
