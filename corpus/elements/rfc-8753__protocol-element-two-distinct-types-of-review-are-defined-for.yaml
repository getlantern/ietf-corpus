summary: 'Two distinct types of review are defined for each new major Unicode version: Part I is an algorithmic comparison of derived properties between the new and previous Unicode version to detect incompatibilities; Part II is a review of newly assigned code points for violations of IDNA design assumptions or requirements for special treatment such as contextual rules.'
