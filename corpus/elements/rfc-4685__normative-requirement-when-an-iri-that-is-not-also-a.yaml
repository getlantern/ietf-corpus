document: rfc-4685
kind: normative-requirement
summary: When an IRI that is not also a URI must be dereferenced, it MUST be mapped to a URI using the steps in RFC 3987 Section 3.1. When an IRI serves as an identifier (e.g., ref attribute), it MUST NOT be so mapped.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
