document: rfc-3284
kind: design-rationale
summary: The delta encoding separates ADD/RUN data, instructions and sizes, and COPY addresses into three distinct byte arrays within each window. This separation enables optional independent secondary compression of each section and allows linear-time decoding with working space proportional to window size.
section: "4.3"
