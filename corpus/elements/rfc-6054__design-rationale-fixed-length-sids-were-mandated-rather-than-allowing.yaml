document: rfc-6054
kind: design-rationale
summary: Fixed-length SIDs were mandated (rather than allowing variable-length prefix-free codes such as Huffman codes) to favor implementation simplicity over theoretical optimality. Variable-length prefix-free codes would be secure but would complicate parsing.
section: A
