document: rfc-6630
kind: normative-requirement
summary: The 'E' flag in the EAP-Initiate/Re-auth-Start packet MUST be set to '1' if early authentication is in use and MUST be set to '0' otherwise. The remaining 7 reserved bits MUST be set to 0 and ignored on reception.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
