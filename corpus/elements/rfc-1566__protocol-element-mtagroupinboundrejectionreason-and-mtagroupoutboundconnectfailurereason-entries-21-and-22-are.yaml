document: rfc-1566
kind: protocol-element
summary: mtaGroupInboundRejectionReason and mtaGroupOutboundConnectFailureReason (entries 21 and 22) are DisplayStrings holding the failure reason for the last rejected or failed association. An empty string indicates the last attempt succeeded; the value 'never' indicates no attempt has been made since MTA initialization.
