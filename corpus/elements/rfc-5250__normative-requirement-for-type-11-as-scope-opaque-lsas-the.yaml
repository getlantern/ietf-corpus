document: rfc-5250
kind: normative-requirement
summary: For type-11 (AS-scope) Opaque LSAs, the LSA MUST NOT be flooded out an interface associated with a stub area or NSSA. A type-11 Opaque LSA received on such an interface MUST be discarded and not acknowledged.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
