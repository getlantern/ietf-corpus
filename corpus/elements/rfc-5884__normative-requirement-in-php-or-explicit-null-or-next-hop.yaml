document: rfc-5884
kind: normative-requirement
summary: In PHP or explicit-null or next-hop-label-allocation scenarios, demultiplexing of BFD Control packets MUST be done using the remote discriminator field in the received BFD Control packet, since the packet does not contain sufficient information otherwise.
