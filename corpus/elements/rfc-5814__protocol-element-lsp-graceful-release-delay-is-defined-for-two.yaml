document: rfc-5814
kind: protocol-element
summary: 'LSP Graceful Release Delay is defined for two procedures: ingress-initiated (Path message with Admin Status Object R and D bits set, measured until egress receives PathTear) and egress-initiated (Resv message with R and D bits set, measured until egress receives PathTear). Forceful release is explicitly out of scope.'
