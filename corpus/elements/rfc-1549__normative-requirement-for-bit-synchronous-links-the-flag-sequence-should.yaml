document: rfc-1549
kind: normative-requirement
summary: For bit-synchronous links, the Flag Sequence SHOULD be transmitted during inter-frame time fill. Mark idle SHOULD NOT be used, but when required (e.g., circuit-switched accounting), the implementation MUST ensure at least 15 consecutive '1' bits between Flags during idle and always generate a Flag Sequence at the start of a frame after an idle period.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
