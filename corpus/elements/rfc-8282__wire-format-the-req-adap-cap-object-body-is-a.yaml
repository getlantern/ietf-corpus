document: rfc-8282
kind: wire-format
summary: 'The REQ-ADAP-CAP object body is a single 32-bit word: Switching Capability (8 bits) from RFC 4203, Encoding (8 bits) from RFC 3471, and Reserved (16 bits). When only Switching Capability is specified, Encoding MUST be set to zero.'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
