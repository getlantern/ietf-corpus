document: rfc-5777
kind: normative-requirement
summary: When both the Time-Of-Day-Condition AVP and the Classifier AVP are present in the same Filter-Rule AVP, both the time-of-day condition and the packet classification condition MUST match for the traffic treatment action to be applied (AND semantics).
section: "4"
rfc2119_level: MUST
