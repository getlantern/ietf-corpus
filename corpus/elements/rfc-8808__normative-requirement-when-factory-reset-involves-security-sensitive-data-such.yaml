document: rfc-8808
kind: normative-requirement
summary: When factory-reset involves security-sensitive data such as cryptographic keys or passwords, it is RECOMMENDED to perform deletion as thoroughly as possible (e.g., overwriting storage with zeros and/or random bits) to reduce risk of sensitive material being recoverable.
section: "2"
rfc2119_level: RECOMMENDED
topics:
