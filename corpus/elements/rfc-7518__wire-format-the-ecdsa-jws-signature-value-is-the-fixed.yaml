document: rfc-7518
kind: wire-format
summary: The ECDSA JWS Signature value is the fixed-length concatenation of the R and S integers as big-endian octet sequences. For ES256, R and S are each 32 octets (64 total); for ES384, 48 octets each (96 total); for ES512, 66 octets each (132 total). Leading zero octets MUST NOT be omitted.
section: "3.4"
