document: rfc-5779
kind: protocol-element
summary: 'Service-Configuration AVP (AVP Code 507) is a grouped AVP that pairs a service with an LMA, enabling the HAAA to inform the MAG of multiple subscribed services and their hosting LMAs in a single response. ABNF: `Service-Configuration ::= < AVP-Header: 507 > [ MIP6-Agent-Info ] [ Service-Selection ] * [ AVP ]`.'
section: "5.9"
topics:
