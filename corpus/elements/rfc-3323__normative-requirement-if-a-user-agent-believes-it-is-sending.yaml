document: rfc-3323
kind: normative-requirement
summary: If a user agent believes it is sending a request directly to a privacy service, it SHOULD include a Proxy-Require header containing the option-tag 'privacy', especially when the 'critical' priv-value is present in the Privacy header.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
