document: rfc-6222
kind: design-rationale
summary: The RFC 3550 recommendation to use FQDNs or IPv4 addresses as the 'host' part of RTCP CNAMEs is no longer sufficient to guarantee uniqueness. FQDNs can be shared across endpoints in large service provider networks, and IPv4 addresses can be duplicated behind NAT devices or through RFC 1918 private address reuse.
section: "3"
topics:
    - rtp
    - realtime
    - nat
