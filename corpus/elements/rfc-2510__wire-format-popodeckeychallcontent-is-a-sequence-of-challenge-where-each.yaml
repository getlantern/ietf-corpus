summary: POPODecKeyChallContent is a SEQUENCE OF Challenge where each Challenge contains an owf AlgorithmIdentifier, a witness OCTET STRING (OWF applied to random integer A), and a challenge OCTET STRING (public-key encryption of Rand ::= SEQUENCE { int INTEGER, sender GeneralName }). POPODecKeyRespContent is a SEQUENCE OF INTEGER returning the decrypted A values.
