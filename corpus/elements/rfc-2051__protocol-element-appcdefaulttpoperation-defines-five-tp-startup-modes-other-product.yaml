document: rfc-2051
kind: protocol-element
summary: 'appcDefaultTpOperation defines five TP startup modes: other (product-specific), queuedOperatorStarted (operator prompted on first attach, subsequent attaches queued), queuedOperatorPreloaded (attach rejected if TP not started; no operator message; subsequent attaches queued), queuedAmStarted (attach manager starts one instance; subsequent queued), and nonqueuedAmStarted (attach manager starts multiple concurrent instances).'
section: "4"
