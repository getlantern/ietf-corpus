document: rfc-7481
kind: security-consideration
summary: When using digital certificates for federated authentication, there is a risk of overly permissive or rogue CAs being trusted by TLS servers. Periodic monitoring of the CA list trusted by RDAP servers for client authentication can reduce this risk.
section: "5"
topics:
