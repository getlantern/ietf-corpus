document: rfc-4805
kind: security-consideration
summary: Section 5 addresses SNMP security for this MIB. Read-write objects such as dsx1LoopbackConfig, dsx1LineType, dsx1LineCoding, dsx1Channelization, and dsx1SendCode can disrupt DS1 interface operation if accessed by unauthorized parties; implementers should restrict write access using SNMPv3 or equivalent security mechanisms.
section: "5"
topics:
    - snmp
    - security
