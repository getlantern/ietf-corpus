document: rfc-8045
kind: design-rationale
summary: The IP-Port-Local-Id TLV was introduced because some CGN deployments use overlapping private or shared address spaces (RFC 1918, RFC 6598) across different subscribers, making the internal IP address alone insufficient to uniquely identify a host. An additional identifier such as a tunnel ID is required in those deployments.
section: 3.2.11
topics:
    - nat
    - radius
