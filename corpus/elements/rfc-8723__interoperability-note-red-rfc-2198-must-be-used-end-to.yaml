document: rfc-8723
kind: interoperability-note
summary: RED (RFC 2198) must be used end-to-end when double encryption is in use; the MD cannot synthesize RED packets because it has no access to plaintext media payloads. FlexFEC is recommended as a superior alternative because it allows MD-side synthesis of recovery packets.
section: "7.2"
topics:
    - rtp
    - crypto
