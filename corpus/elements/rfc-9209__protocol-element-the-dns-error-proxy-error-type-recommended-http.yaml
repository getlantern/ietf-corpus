document: rfc-9209
kind: protocol-element
summary: 'The ''dns_error'' proxy error type (recommended HTTP 502) carries two extra parameters: ''rcode'' (a String conveying the DNS RCODE per RFC 8499 §3) and ''info-code'' (an Integer conveying the Extended DNS Error Code INFO-CODE per RFC 8914). It is only generated by intermediaries.'
section: 2.3.2
topics:
    - http
    - dns
