document: rfc-8783
kind: interoperability-note
summary: The same ICMP match structure is used for both ICMP and ICMPv6. Whether an ACL targets ICMP or ICMPv6 is governed by the 'l3' match choice or the ACL type, not by separate protocol-specific containers.
