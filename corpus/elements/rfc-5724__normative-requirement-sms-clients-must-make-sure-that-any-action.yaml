document: rfc-5724
kind: normative-requirement
summary: SMS clients MUST make sure that any action incurring costs is acknowledged by the end user, unless explicitly instructed otherwise. If multiple submission methods exist, the end user MUST have a way to control which method is chosen.
section: "4"
rfc2119_level: MUST
topics:
    - security
