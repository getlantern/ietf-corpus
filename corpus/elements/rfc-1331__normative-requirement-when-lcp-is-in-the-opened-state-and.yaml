document: rfc-1331
kind: normative-requirement
summary: When LCP is in the Opened state and a frame with an unknown Protocol is received, the implementation MUST send a Protocol-Reject (Code=8). Upon receiving a Protocol-Reject, an implementation SHOULD stop transmitting frames of the indicated protocol. Protocol-Reject packets received outside the Opened state SHOULD be silently discarded.
section: "6.7"
rfc2119_level: MUST
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
