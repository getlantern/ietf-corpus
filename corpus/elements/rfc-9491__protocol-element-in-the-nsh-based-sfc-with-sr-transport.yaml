document: rfc-9491
kind: protocol-element
summary: In the NSH-based SFC with SR transport scenario, SR-MPLS or SRv6 provides the transport encapsulation between SFFs while the NSH conveys and triggers SFC policies. The SFF performs NSH lookup to determine forwarding, then applies SR encapsulation for inter-domain traversal.
