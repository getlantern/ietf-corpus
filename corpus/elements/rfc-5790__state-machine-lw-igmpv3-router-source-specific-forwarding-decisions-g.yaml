document: rfc-5790
kind: state-machine
summary: 'LW-IGMPv3 router source-specific forwarding decisions: (G_Timer==0, S_Timer>0) → forward; (G_Timer==0, S_Timer==0) → stop and remove source, delete group if no sources remain; (G_Timer==0, no sources) → do not forward; (G_Timer>0, any S_Timer) → forward; (G_Timer>0, no sources) → forward.'
section: "5.2"
topics:
