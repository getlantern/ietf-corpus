document: rfc-7845
kind: normative-requirement
summary: If a player uses R128_TRACK_GAIN or R128_ALBUM_GAIN, it MUST apply those gains in addition to the 'output gain' value from the ID header. If a tool modifies the ID header's 'output gain', it MUST also update or remove the R128 comment tags.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
