document: rfc-2049
kind: design-rationale
summary: 'The canonical encoding model defines MIME composition as four sequential steps: (1) create body in local form, (2) convert to canonical form, (3) apply transfer encoding, (4) insert into MIME entity with headers. This model is conceptual only — actual implementations may collapse or reorder these steps as long as the resulting messages are equivalent.'
