document: rfc-7496
kind: protocol-element
summary: The SCTP_PR_SUPPORTED socket option (read/write) enables or disables negotiation of PR-SCTP support for future associations, and queries whether PR-SCTP was negotiated on an existing association. Whether PR-SCTP is enabled by default is implementation specific.
section: "4.5"
topics:
    - sctp
