document: rfc-7627
kind: normative-requirement
summary: Clients and servers implementing this document SHOULD refuse SSL 3.0 handshakes. If they choose to support SSL 3.0, the resulting sessions MUST use the legacy master secret computation and the interoperability considerations of Section 5.4 apply.
section: "6.4"
rfc2119_level: SHOULD
