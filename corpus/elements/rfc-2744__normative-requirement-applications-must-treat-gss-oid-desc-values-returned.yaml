document: rfc-2744
kind: normative-requirement
summary: Applications must treat gss_OID_desc values returned by GSS-API routines as read-only and must not attempt to deallocate them with free(). Storage for all OID sets returned to the application must be released with gss_release_oid_set().
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
