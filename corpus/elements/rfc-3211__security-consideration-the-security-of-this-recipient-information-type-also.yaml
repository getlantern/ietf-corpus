document: rfc-3211
kind: security-consideration
summary: The security of this recipient information type also rests on the security of the underlying mechanisms (RFC 2630 and PKCS5v2). The double-wrap prevents bit-flipping attacks and ensures that wrapping the same CEK with the same KEK produces a different EncryptedKey each time due to the IV.
