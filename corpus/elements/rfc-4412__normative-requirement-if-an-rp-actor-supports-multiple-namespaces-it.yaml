document: rfc-4412
kind: normative-requirement
summary: If an RP actor supports multiple namespaces, it MUST create a local total ordering across all resource values from those namespaces, maintaining relative ordering within each namespace. It is RECOMMENDED that the same ordering be used across an administrative domain.
section: "8.1"
rfc2119_level: MUST
topics:
