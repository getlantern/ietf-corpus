document: rfc-4072
kind: normative-requirement
summary: Diameter server implementations MUST be able to distinguish between EAP packets with the same Identifier existing within distinct EAP sessions using the Session-Id AVP. If an EAP session is terminated mid-exchange, the NAS MUST select a new Diameter Session-Id for any subsequent EAP sessions.
section: 2.8.5
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
