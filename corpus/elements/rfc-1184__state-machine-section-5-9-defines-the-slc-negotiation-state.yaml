document: rfc-1184
kind: state-machine
summary: 'Section 5.9 defines the SLC negotiation state diagram with an IDLE state and transitions triggered by receiving or sending SLC triplets. Key transitions: receiving a function with SLC_DEFAULT causes the receiver to reply with its current value and level; receiving SLC_VALUE causes either an ACK reply or a counter-offer at a lower level; receiving with ACK set causes no response. Conflicts between simultaneous requests are resolved in favor of the client''s requested value.'
