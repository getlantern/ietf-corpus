document: rfc-9292
kind: wire-format
summary: All lengths and numeric values are encoded using the variable-length integer encoding from Section 16 of QUIC (RFC 9000). Integer values do not need to be encoded on the minimum number of bytes necessary, and the maximum encodable value is 2^62-1.
