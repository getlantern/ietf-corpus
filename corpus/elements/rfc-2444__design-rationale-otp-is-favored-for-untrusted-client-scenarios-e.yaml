document: rfc-2444
kind: design-rationale
summary: OTP is favored for untrusted client scenarios (e.g., kiosk clients) because a one-time password gives the client only a single opportunity to act on behalf of the user. It is also preferred when interactive logins are permitted, since a compromised OTP database is only subject to dictionary attacks, unlike databases for mechanisms such as CRAM-MD5.
section: "2"
