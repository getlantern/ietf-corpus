document: rfc-8224
kind: normative-requirement
summary: Implementations MUST support receiving multiple Identity header fields in a single request for future compatibility. If at least one Identity header field is valid and from a trusted source, relying parties may use it for authorization regardless of other invalid or untrusted Identity headers present.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
