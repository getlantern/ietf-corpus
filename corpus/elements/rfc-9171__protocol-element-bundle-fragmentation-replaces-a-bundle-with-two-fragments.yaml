document: rfc-9171
kind: protocol-element
summary: Bundle fragmentation replaces a bundle with two fragments sharing the same source node ID and creation timestamp; fragment payloads MUST cover the first N and last (M-N) bytes of the original. The primary block of each fragment MUST set the 'bundle is a fragment' flag and include fragment offset and total ADU length fields.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
