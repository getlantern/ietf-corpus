document: rfc-3307
kind: protocol-element
summary: Permanent IPv6 multicast group identifiers provide a global identifier for a service offered by numerous servers, allocated in the range 0x40000000 to 0x7FFFFFFF. Unlike permanent multicast addresses, a permanent group ID identifies a service regardless of the upper 96 bits of the multicast address.
section: "4.2"
topics:
    - multicast
    - ip
    - registry
