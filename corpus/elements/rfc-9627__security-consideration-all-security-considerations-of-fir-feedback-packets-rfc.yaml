document: rfc-9627
kind: security-consideration
summary: All security considerations of FIR feedback packets (RFC 5104) apply to LRR. Additionally, senders MUST validate that payload types and layer indices in received LRR packets are valid for the stream being sent and discard invalid requests, preventing malicious or erroneous requests from triggering unnecessary refresh points.
section: "7"
topics:
