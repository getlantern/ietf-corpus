document: rfc-9800
kind: protocol-element
summary: The REPLACE-CSID flavor compresses a segment list where only the first entry in a CSID sequence is a fully formed SRv6 SID; remaining entries are CSID containers in packed format carrying subsequent CSIDs without the Locator-Block. The Argument of the first SID carries an index indicating the current CSID position within the current packed container.
section: "4.2"
topics:
    - routing
    - ip
