document: rfc-7023
kind: normative-requirement
summary: When a MEP at a PE or CE receives a CCM with the wrong MEG ID, MEP ID, or MEP level, the receiving PE or CE SHOULD treat such an event as an AC receive defect; in any case, if such events persist for 3.5 times the local CCM transmission time, loss of continuity will be declared.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
