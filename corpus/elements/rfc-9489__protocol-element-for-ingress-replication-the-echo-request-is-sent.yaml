document: rfc-9489
kind: protocol-element
summary: For ingress replication, the Echo Request is sent using a label stack of [Transport label, Inclusive Multicast label] to each egress PE. The Inclusive Multicast label is the downstream-assigned label announced by the egress PE and is the inner label in the MPLS label stack.
section: 6.2.1
topics:
    - mpls
    - routing
    - multicast
