summary: CHAP-Ident AVP (Code 404) is OctetString containing the 1-octet CHAP identifier. CHAP-Response AVP (Code 405) is OctetString containing the 16-octet authentication data. CHAP-Challenge AVP (Code 60) carries the challenge sent by the NAS.
