document: rfc-5595
kind: protocol-element
summary: The Service Code value 4294967295 (0xFFFFFFFF) is defined as 'invalid', providing a special 4-byte sentinel that implementations can use to indicate 'no valid Service Code'. DCCP-Requests carrying this value must be rejected.
section: "2.5"
topics:
    - congestion
