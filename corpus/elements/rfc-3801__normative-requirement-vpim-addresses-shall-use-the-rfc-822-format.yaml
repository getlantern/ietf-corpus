document: rfc-3801
kind: normative-requirement
summary: VPIM addresses SHALL use the RFC 822 format based on the Domain Name System. The local part SHALL be a printable US-ASCII string containing the mailbox ID; short numeric local parts SHOULD be used because most voice mail networks rely on numeric mailbox identifiers compatible with the 10-digit telephone keypad.
section: "4.1"
rfc2119_level: SHALL
topics:
    - email
