document: rfc-4388
kind: normative-requirement
summary: When more than one IP address has been involved in a DHCP exchange with the specified client, the list of all IP addresses MUST be returned in the associated-ip option, whether or not it was requested in the Parameter Request List.
section: 6.4.2
rfc2119_level: MUST
topics:
    - ip
