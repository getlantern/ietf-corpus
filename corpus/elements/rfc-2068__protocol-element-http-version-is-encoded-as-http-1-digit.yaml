document: rfc-2068
kind: protocol-element
summary: HTTP-Version is encoded as 'HTTP' '/' 1*DIGIT '.' 1*DIGIT. Major and minor numbers MUST be treated as separate integers; leading zeros MUST be ignored by recipients and MUST NOT be sent. HTTP/2.13 is higher than HTTP/2.4.
section: "3.1"
