document: rfc-9532
kind: normative-requirement
summary: A backslash ('\') character in a DNS label MUST be escaped as '\\' before percent-encoding. Other uses of '\' MUST NOT appear in the label after percent-decoding.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - dns
