document: rfc-4819
kind: normative-requirement
summary: All IANA-registered names MUST be printable US-ASCII strings, MUST NOT contain '@', ',', whitespace, or control characters (ASCII ≤ 32), are case-sensitive, and MUST NOT exceed 64 characters. Locally extensible names use the format 'name@domainname' where the domain portion must be a valid FQDN controlled by the defining organization.
section: 6.2.1
rfc2119_level: MUST
topics:
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
