document: rfc-1001
kind: protocol-element
summary: The NetBIOS Datagram Service is connectionless and unreliable, supporting unicast, multicast (to all holders of a group name), and broadcast delivery. B nodes use UDP broadcast directly; P and M nodes use the NBDD for multicast and broadcast distribution. NetBIOS datagrams that exceed a single UDP packet are fragmented at the NetBIOS level.
section: "17.1"
