document: rfc-4861
kind: normative-requirement
summary: When a Redirect's target is a router (not the destination itself), the Target Address MUST be the router's link-local address so that hosts can uniquely identify routers across renumbering events. The Redirect source MUST be the link-local address of the sending interface.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
