document: rfc-1171
kind: normative-requirement
summary: Upon reception of a Terminate-Request, a LCP packet MUST be transmitted with Code=6 (Terminate-Ack), the Identifier copied from the request, and any desired data. Terminate-Request packets should continue to be sent until a Terminate-Ack is received or the physical layer goes down.
section: 4.4.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
