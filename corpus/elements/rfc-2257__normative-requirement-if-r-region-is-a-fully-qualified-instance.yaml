document: rfc-2257
kind: normative-requirement
summary: If r.region is a fully qualified instance name in an agentx-Register-PDU, the INSTANCE_REGISTRATION bit in h.flags must be set; otherwise it must be cleared. The master agent may use this information to optimize operational dispatching.
section: 6.2.3
rfc2119_level: MUST
topics:
