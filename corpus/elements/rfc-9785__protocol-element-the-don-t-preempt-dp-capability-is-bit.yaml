document: rfc-9785
kind: protocol-element
summary: The 'Don't Preempt' (DP) Capability is Bit 0 (D bit) in the 2-octet Bitmap field of the DF Election Extended Community. When set to 1, the advertising PE requests remote PEs not to preempt it as Designated Forwarder. Default value is 0, compatible with revertive behavior.
section: "3"
topics:
