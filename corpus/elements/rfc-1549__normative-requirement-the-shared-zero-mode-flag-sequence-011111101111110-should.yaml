document: rfc-1549
kind: normative-requirement
summary: The 'shared zero mode' Flag Sequence '011111101111110' SHOULD NOT be used in bit-synchronous HDLC. When unavoidable, the implementation MUST ensure the first detected Flag Sequence (end of frame) is promptly communicated to the link layer.
section: "5"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
