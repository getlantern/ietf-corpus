document: rfc-3229
kind: protocol-element
summary: The Cache-Control "retain" directive is a server hint suggesting that a delta-capable client should retain the associated cached instance as a potential base for future delta requests; an optional timeout parameter indicates how long the server plans to keep the base.
section: 10.8.1
