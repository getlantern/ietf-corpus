document: rfc-7530
kind: normative-requirement
summary: RPCSEC_GSS security flavors as defined in RFC 2203 (version 1) and RFC 5403 (version 2) MUST be implemented as the mechanism to deliver stronger security for NFSv4. Deployment of RPCSEC_GSS is optional, but the security flavor MUST be used to enable the mandatory-to-implement security mechanism.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
