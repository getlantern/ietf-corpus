document: rfc-9739
kind: normative-requirement
summary: If there are redundant PIM routers at the edge of a BIER domain using PLI, they MUST establish PIM adjacency as per RFC 7761 to prevent multicast stream duplication and to ensure DR election at the edge of the BIER domain.
section: 3.2.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
