document: rfc-2561
kind: normative-requirement
summary: Agents MUST implement the tn3270eConfSpinLock object; however, its use by management applications SHALL NOT be enforced by agents. Management applications SHOULD use this advisory lock when creating or altering entries in the configuration tables to serialize changes.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
