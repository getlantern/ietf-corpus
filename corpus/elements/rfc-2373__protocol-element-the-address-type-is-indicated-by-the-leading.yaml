document: rfc-2373
kind: protocol-element
summary: The address type is indicated by the leading bits (Format Prefix, FP). Aggregatable Global Unicast Addresses use prefix 001 (1/8 of address space); Link-Local Unicast uses 1111111010; Site-Local Unicast uses 1111111011; Multicast uses 11111111. Approximately 15% of address space is initially allocated.
