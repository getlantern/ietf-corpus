document: rfc-4088
kind: protocol-element
summary: 'An SNMP object URI includes one or more OIDs after the context component. Three suffix forms are defined: no suffix designates the named instance; ''+'' designates the lexically next instance; ''.*'' designates all instances for which the OID is a strict lexical prefix.'
