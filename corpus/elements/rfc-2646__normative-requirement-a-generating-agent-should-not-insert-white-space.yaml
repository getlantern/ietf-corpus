document: rfc-2646
kind: normative-requirement
summary: A generating agent SHOULD NOT insert white space into a word (a sequence of printable characters without spaces). If a word exceeds 79 characters (but is less than 998), the agent SHOULD send it as-is, exceeding the line-length limit.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
