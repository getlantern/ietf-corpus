document: rfc-9568
kind: protocol-element
summary: 'The Virtual Router MAC address format is: 00-00-5E-00-01-{VRID} for IPv4 and 00-00-5E-00-02-{VRID} for IPv6 (in hex, network byte order). The first three octets are the IANA OUI; bytes 4-5 identify the VRRP address block per IP version; the final byte is the VRID, allowing up to 255 VRRP instances per address family per LAN.'
section: "7.3"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
