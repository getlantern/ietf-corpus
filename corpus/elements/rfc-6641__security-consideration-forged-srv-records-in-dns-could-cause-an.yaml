document: rfc-6641
kind: security-consideration
summary: Forged SRV records in DNS could cause an NFSv4 client to connect to attacker-controlled file servers instead of legitimate ones. This is analogous to attacks via forged fs_location attributes in the base NFSv4 protocol.
section: "6"
topics:
    - security
    - dns
