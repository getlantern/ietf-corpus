document: rfc-9240
kind: design-rationale
summary: Internet address domain types are RECOMMENDED for properties closely tied to IP addresses or that benefit from CIDR inheritance (e.g., ISP or ASN). The PID domain type is RECOMMENDED for properties arising from the PID's definition itself (e.g., geographic region of a PID), rather than from the IP prefixes it contains.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
