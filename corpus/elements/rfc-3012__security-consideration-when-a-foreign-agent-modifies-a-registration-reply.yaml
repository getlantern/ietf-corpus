document: rfc-3012
kind: security-consideration
summary: When a Foreign Agent modifies a Registration Reply field, it invalidates the Home Agent's MN-HA authentication data, creating a window where a bogus rejection Reply could be injected to mislead the mobile node into thinking its registration failed.
section: "12"
topics:
