document: rfc-8202
kind: security-consideration
summary: Security concerns for IS-IS are addressed in ISO 10589, RFC 5304 (IS-IS Cryptographic Authentication), and RFC 5310 (IS-IS Generic Cryptographic Authentication). When authentication is in use, the IID is first used to select the applicable authentication configuration before the authentication check is performed.
