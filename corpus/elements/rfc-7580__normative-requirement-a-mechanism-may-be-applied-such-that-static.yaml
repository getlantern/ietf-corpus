document: rfc-7580
kind: normative-requirement
summary: A mechanism MAY be applied such that static information and dynamic information of one TE link are contained in separate Opaque LSAs, e.g., the Port Label Restrictions sub-TLV could be nested in separate top-level Link TLVs and advertised in separate LSAs.
