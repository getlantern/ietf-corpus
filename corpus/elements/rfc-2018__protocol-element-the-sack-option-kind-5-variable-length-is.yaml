document: rfc-2018
kind: protocol-element
summary: The SACK option (Kind=5, variable length) is sent by the data receiver to convey non-contiguous blocks of received data. Each block is defined by a Left Edge and Right Edge, both 32-bit unsigned integers in network byte order. A SACK option with n blocks has length 8*n+2 bytes.
section: "3"
