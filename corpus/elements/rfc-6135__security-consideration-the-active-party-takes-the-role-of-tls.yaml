document: rfc-6135
kind: security-consideration
summary: The active party takes the role of TLS client when TLS is used. There are no procedures in RFC 4975 that break if the SDP offer receiver takes the TLS client role, and the security level provided by TLS is unaffected by which endpoint is active.
section: "6"
topics:
    - security
    - tls
    - realtime
