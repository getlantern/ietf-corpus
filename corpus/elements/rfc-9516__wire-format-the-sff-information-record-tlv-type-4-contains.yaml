document: rfc-9516
kind: wire-format
summary: 'The SFF Information Record TLV (Type=4) contains: SFF Record TLV (1-octet, value 4), Reserved (1-octet), Length (2-octet), Service Path Identifier (3-octet SPI), Reserved (1-octet), and one or more SF Information Sub-TLVs. It reports all SFs available from an SFF instance for the specified SFP.'
section: 6.6.1
