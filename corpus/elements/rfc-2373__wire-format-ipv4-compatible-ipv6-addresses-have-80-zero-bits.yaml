document: rfc-2373
kind: wire-format
summary: IPv4-compatible IPv6 addresses have 80 zero bits, a 16-bit zero field, and a 32-bit IPv4 address in the low order. IPv4-mapped IPv6 addresses have 80 zero bits, 16 bits of 0xFFFF, and a 32-bit IPv4 address, used to represent IPv4-only nodes as IPv6 addresses.
