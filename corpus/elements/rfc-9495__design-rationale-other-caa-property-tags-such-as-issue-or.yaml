document: rfc-9495
kind: design-rationale
summary: Other CAA Property Tags such as "issue" or "issuewild" are explicitly not extended to cover email certificates; a new dedicated tag "issuemail" is introduced instead. This avoids conflating TLS server certificate policy with S/MIME email certificate policy, allowing domains to set independent restrictions for each.
