document: rfc-5238
kind: normative-requirement
summary: Applications that use multiple DTLS connections in series over one transport connection SHOULD limit the potential burden on the system by some means, such as enforcing a minimum time of 1 second between session initiations, to protect against attackers repeatedly starting and stopping sessions.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - tls
    - congestion
    - security
