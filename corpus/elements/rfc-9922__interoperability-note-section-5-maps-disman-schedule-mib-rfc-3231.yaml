document: rfc-9922
kind: interoperability-note
summary: Section 5 maps DISMAN-SCHEDULE-MIB (RFC 3231) objects to the YANG module parameters. Several MIB objects are not supported (schedOwner, schedContextName, schedStorageType) and two (schedVariable, schedValue) are not applicable. This enables migration paths from SNMP-based scheduling to YANG-based management.
section: "5"
topics:
    - yang
    - netconf
    - snmp
