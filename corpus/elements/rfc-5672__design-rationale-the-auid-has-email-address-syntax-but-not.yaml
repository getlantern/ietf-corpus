document: rfc-5672
kind: design-rationale
summary: 'The AUID has email-address syntax but not necessarily email-address semantics: its domain need not be registered in DNS and its Local-part may be drawn from a namespace unrelated to user mailboxes. The details of AUID namespace structure are determined by the Signer and are outside the scope of the DKIM specification.'
section: "10"
topics:
    - email
    - security
