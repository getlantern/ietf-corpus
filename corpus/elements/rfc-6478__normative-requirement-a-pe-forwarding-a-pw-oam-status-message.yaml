document: rfc-6478
kind: normative-requirement
summary: A PE forwarding a PW OAM status message to the adjacent PE across the PSN tunnel MUST set the PW label TTL field to 1. If the control word is not in use, the PE MUST place the GAL reserved label below the PW label with TTL set to 1.
section: 5.4.1
rfc2119_level: MUST
topics:
    - mpls
