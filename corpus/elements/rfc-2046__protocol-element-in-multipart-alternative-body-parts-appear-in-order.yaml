document: rfc-2046
kind: protocol-element
summary: In 'multipart/alternative', body parts appear in order of increasing faithfulness to the original content (plainest first, richest last). Receiving agents should pick and display the last format they are capable of displaying, and must not automatically show the user multiple versions.
section: 5.1.4
topics:
