document: rfc-9196
kind: protocol-element
summary: The ietf-system-capabilities module provides a read-only system-capabilities container with a datastore-capabilities list (keyed by datastore leafref into yang-library) and nested per-node-capabilities entries with an optional node-selector of type nacm:node-instance-identifier. The module itself defines no concrete capabilities; it only provides augmentation points.
section: "4.2"
topics:
    - yang
    - netconf
