document: rfc-5132
kind: protocol-element
summary: ipMcastRouteSourceAddressType uses a value of unknown(0) to indicate a non-source-specific entry corresponding to all sources in a group. Otherwise, the value MUST be the same as the value of ipMcastRouteGroupType.
