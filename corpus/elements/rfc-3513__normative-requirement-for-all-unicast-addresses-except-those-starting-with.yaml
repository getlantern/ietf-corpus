document: rfc-3513
kind: normative-requirement
summary: For all unicast addresses except those starting with binary 000, Interface IDs are required to be 64 bits long and constructed in Modified EUI-64 format. The same interface identifier may be used on multiple interfaces of a single node provided they attach to different subnets.
section: 2.5.1
rfc2119_level: REQUIRED
topics:
    - ip
    - v6ops
