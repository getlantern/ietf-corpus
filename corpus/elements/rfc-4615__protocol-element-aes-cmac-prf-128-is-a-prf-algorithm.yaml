document: rfc-4615
kind: protocol-element
summary: AES-CMAC-PRF-128 is a PRF algorithm identical to AES-CMAC (RFC 4493) except that the 128-bit key length restriction is removed, supporting variable-length keys (VK). It takes a variable-length key VK, a message M, and produces a 128-bit pseudo-random output (PRV).
