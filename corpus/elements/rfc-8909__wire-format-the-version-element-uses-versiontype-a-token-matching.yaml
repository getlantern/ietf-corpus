document: rfc-8909
kind: wire-format
summary: The <version> element uses versionType, a token matching the pattern [1-9]+\.[0-9]+ with the sole permitted enumeration value '1.0'. All date fields SHALL carry RFC 3339 timestamps in UTC with time-offset specified as 'Z'.
section: "6.1"
