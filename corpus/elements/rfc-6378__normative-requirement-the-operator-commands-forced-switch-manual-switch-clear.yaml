document: rfc-6378
kind: normative-requirement
summary: The operator commands Forced Switch, Manual Switch, Clear, and Lockout of protection MUST be supported by the Local Request logic. The hold-off timer for server-layer alarm indication SHOULD be configurable by the network operator.
