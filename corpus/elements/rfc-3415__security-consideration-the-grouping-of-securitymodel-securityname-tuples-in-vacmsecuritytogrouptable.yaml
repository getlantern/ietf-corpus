document: rfc-3415
kind: security-consideration
summary: The grouping of <securityModel, securityName> tuples in vacmSecurityToGroupTable does not consider securityLevel. It is the security administrator's responsibility to use the securityLevel index in vacmAccessTable to separate noAuthNoPriv, authNoPriv, and authPriv access rights.
section: "7.2"
topics:
    - snmp
    - security
