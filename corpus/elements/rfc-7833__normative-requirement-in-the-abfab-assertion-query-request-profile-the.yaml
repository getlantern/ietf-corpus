document: rfc-7833
kind: normative-requirement
summary: In the ABFAB Assertion Query/Request Profile, the RADIUS Access-Request MUST include a Service-Type attribute with value Authorize-Only, and SHOULD include the RADIUS State attribute when the query pertains to a previously authenticated client.
section: 8.3.2
rfc2119_level: MUST
topics:
