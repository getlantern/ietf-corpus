document: rfc-6439
kind: normative-requirement
summary: To minimize native traffic loss due to inhibition, a VLAN inhibition timer per VLAN for which end station service will ever be offered SHOULD be implemented. An RBridge MUST NOT merge VLAN inhibition timers for two VLANs when it is Appointed Forwarder for one but not the other, as this can cause unnecessarily prolonged inhibition.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
