document: rfc-2426
kind: normative-requirement
summary: Inline encoded binary data MUST be encoded using the "B" encoding format (RFC 2047), and the ENCODING type parameter MUST be used when specifying inline binary data. Long lines of encoded binary data SHOULD be folded to 75 characters.
section: 2.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
