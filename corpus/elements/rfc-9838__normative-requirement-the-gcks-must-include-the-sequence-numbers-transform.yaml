document: rfc-9838
kind: normative-requirement
summary: The GCKS MUST include the Sequence Numbers transform in the GSA payload for every Data-Security SA. A new Transform ID '32-bit Unspecified Numbers' signals that sequence number uniqueness is not guaranteed, allowing GMs to decide locally whether to enable anti-replay service.
section: "2.6"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
