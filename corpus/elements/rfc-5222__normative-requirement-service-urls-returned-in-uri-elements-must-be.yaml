document: rfc-5222
kind: normative-requirement
summary: Service URLs returned in <uri> elements MUST be absolute URLs. Each URL scheme MUST appear at most once, though both secured and unsecured versions of a protocol (e.g., 'sip' and 'sips') may coexist.
section: "5.8"
rfc2119_level: MUST
topics:
