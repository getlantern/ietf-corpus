document: rfc-6396
kind: wire-format
summary: 'The Peer Type field is a 1-octet bit field: bit 6 (A) encodes Peer AS number size (0=16-bit, 1=32-bit) and bit 7 (I) encodes Peer IP Address family (0=IPv4, 1=IPv6). This determines the variable-length encoding of subsequent Peer IP Address and Peer AS fields.'
section: 4.3.1
