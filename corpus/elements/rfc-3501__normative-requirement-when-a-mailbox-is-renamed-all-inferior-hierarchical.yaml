document: rfc-3501
kind: normative-requirement
summary: 'When a mailbox is renamed, all inferior hierarchical names MUST also be renamed. Renaming INBOX is a special case: all messages are moved to the new mailbox name, leaving INBOX empty; inferior hierarchical names of INBOX are unaffected.'
section: 6.3.5
rfc2119_level: MUST
topics:
    - email
