document: rfc-5322
kind: protocol-element
summary: The only required header fields are the origination date field ('Date:') and the originator address field(s) ('From:'). All other header fields, including 'To:', 'Cc:', 'Bcc:', 'Subject:', and 'Message-ID:', are syntactically optional though 'Message-ID:' SHOULD be present.
section: "3.6"
