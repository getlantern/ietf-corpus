document: rfc-6384
kind: interoperability-note
summary: When an FTP client uses AUTH to negotiate TLS (RFC 4217) or another security mechanism, the ALG enters transparent mode and can no longer translate FTP commands, meaning only passive transfers from a server that implements EPSV or a client that supports PASV will succeed.
section: "14"
topics:
