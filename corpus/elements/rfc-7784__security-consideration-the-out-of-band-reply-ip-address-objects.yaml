document: rfc-7784
kind: security-consideration
summary: The out-of-band reply IP address objects (trillOamMepTransmitLbmReplyIp, trillOamMepTransmitPtmReplyIp, trillOamMepTransmitMtvmReplyIp) are read-create and allow OAM replies to be directed to any IP address, enabling denial-of-service attacks against arbitrary systems if SET operations are not protected.
section: "8"
