document: rfc-2684
kind: wire-format
summary: The SNAP header consists of a 3-octet OUI (Organizationally Unique Identifier) followed by a 2-octet PID (Protocol Identifier). Its presence is indicated by LLC header value 0xAA-AA-03. OUI 0x00-00-00 means the PID is an EtherType.
