document: rfc-3331
kind: normative-requirement
summary: The Data Ack message MUST be sent if a Correlation Id parameter is received from the peer. The Data Ack message MUST NOT be sent if no Correlation Id was received. Failure to send Data Acks will eventually cause SS7 link failure due to lack of MTP Level 2 acknowledgments.
section: 3.3.1.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
