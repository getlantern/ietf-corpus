document: rfc-4404
kind: normative-requirement
summary: 'The fcipCompliance MODULE-COMPLIANCE statement mandates six groups: fcipEntityScalarGroup, fcipEntityInstanceGroup, fcipLinkGroup, fcipTcpConnGroup, fcipDiscoveryDomainGroup, and fcipLinkErrorsGroup. The dynamic and static route groups are mandatory only for systems that do not expose these objects via another FC MIB.'
section: "4"
rfc2119_level: REQUIRED
