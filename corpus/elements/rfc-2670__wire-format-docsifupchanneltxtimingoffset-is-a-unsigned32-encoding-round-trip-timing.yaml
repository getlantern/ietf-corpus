document: rfc-2670
kind: wire-format
summary: docsIfUpChannelTxTimingOffset is a Unsigned32 encoding round-trip timing in units of (6.25 µs / 64), i.e., approximately 97.66 nanoseconds per unit. At the CM it reflects current round-trip time; at the CMTS it reflects the maximum seen, used to synchronize upstream transmissions.
section: "4"
topics:
