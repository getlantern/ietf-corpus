document: rfc-4088
kind: protocol-element
summary: 'The SNMP URI scheme syntax is defined as: snmp-uri = "snmp://" snmp-authority [ context [ oids ]], where snmp-authority includes an optional securityName, host, and port. The context component includes a contextName and optional contextEngineID encoded as hexadecimal digits.'
