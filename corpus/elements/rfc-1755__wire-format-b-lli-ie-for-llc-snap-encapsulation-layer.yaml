summary: 'B-LLI IE for LLC/SNAP encapsulation: layer_2_id=2, user_information_layer=12 (lan_llc - ISO 8802/2). An optional IP-ownership variant adds layer_3_id=3 and ISO/IEC TR 9577 IPI=204 (0xCC), but LLC/SNAP encapsulation is still required on all datagrams even when this variant is used.'
