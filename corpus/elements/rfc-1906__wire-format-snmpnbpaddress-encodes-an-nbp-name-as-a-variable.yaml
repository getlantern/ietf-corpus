summary: 'SnmpNBPAddress encodes an NBP name as a variable-length OCTET STRING (SIZE 3..99): length-prefixed object (up to 32 octets), length-prefixed type (up to 32 octets), and length-prefixed zone (up to 32 octets). Strings are case-insensitive and may contain any octet except 0xff.'
