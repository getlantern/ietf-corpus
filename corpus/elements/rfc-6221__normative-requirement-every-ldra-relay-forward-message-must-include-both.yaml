document: rfc-6221
kind: normative-requirement
summary: Every LDRA Relay-Forward message MUST include both the Relay-Message option (encapsulating the original client message) and the Interface-ID option. These are the mandatory DHCP options for the LDRA.
section: "5.3"
rfc2119_level: MUST
