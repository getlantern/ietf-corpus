document: rfc-6153
kind: wire-format
summary: The ANDSF IPv4 Address Option for DHCPv4 (option code 142) carries one or more IPv4 addresses of ANDSF servers. The Length field is set to 4N bytes where N is the number of IPv4 addresses; it excludes the Option Code and Length fields themselves.
