document: rfc-791
kind: design-rationale
summary: Each internet datagram is treated as a completely independent entity with no connection state. There are no virtual circuits. This makes routing decisions per-datagram and allows different paths through the internet, simplifying gateways and improving resilience.
section: "1.4"
