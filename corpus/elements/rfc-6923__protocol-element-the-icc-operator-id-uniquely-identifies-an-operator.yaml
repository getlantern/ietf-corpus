document: rfc-6923
kind: protocol-element
summary: The ICC_Operator_ID uniquely identifies an operator using ITU-T conventions. It is formed by concatenating a two-character Country Code (CC) and an ITU Carrier Code (ICC) as CC::ICC, serving as a globally unique context for all other MPLS-TP identifiers in place of the Global_ID from RFC 6370.
section: "3"
topics:
