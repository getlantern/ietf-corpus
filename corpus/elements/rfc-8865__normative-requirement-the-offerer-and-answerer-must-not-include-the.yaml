document: rfc-8865
kind: normative-requirement
summary: The offerer and answerer MUST NOT include the 'max-retr' or 'max-time' attribute parameters in the 'dcmap' attribute. If either parameter is received in an offer, the answerer MUST reject the offer; if received in an answer, the offerer MUST NOT accept it.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
