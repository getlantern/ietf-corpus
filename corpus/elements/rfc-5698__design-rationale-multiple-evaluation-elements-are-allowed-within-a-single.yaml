document: rfc-5698
kind: design-rationale
summary: Multiple Evaluation elements are allowed within a single Algorithm element to handle parameter-dependent suitability periods. For example, RSA with a 1024-bit modulus may have a different (shorter) validity period than RSA with a 2048-bit modulus, requiring separate evaluation entries for each range.
section: "3.9"
topics:
