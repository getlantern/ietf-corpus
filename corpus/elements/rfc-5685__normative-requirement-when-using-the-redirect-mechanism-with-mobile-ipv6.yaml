document: rfc-5685
kind: normative-requirement
summary: When using the redirect mechanism with Mobile IPv6, if the mobile node has authenticated information about its home agent, it MUST NOT update that information based on the IKE_SA_INIT response containing a REDIRECT.
section: "8"
rfc2119_level: MUST NOT
topics:
