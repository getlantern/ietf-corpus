document: rfc-2275
kind: protocol-element
summary: A ViewTreeFamily pairs a family name (OBJECT IDENTIFIER) with a family mask (bit string). An OID belongs to the family if it has at least as many sub-identifiers as the family name and each sub-identifier matches wherever the corresponding mask bit is non-zero.
section: 2.4.2
