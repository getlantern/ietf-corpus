document: rfc-3403
kind: protocol-element
summary: 'The NAPTR DNS Resource Record (type code 35) serves as the Rule encoding mechanism for the DDDS DNS Database. It contains six fields: ORDER, PREFERENCE, FLAGS, SERVICES, REGEXP, and REPLACEMENT, and is retrieved by querying DNS for NAPTR RRs at a domain-name Key.'
