document: rfc-6872
kind: security-consideration
summary: Threats to log files at rest include unauthorized viewing or copying, deletion of records, and replay attacks enabled by captured SIP header information. Threats during transfer include viewing, modification, insertion of fabricated records, and man-in-the-middle delivery of falsified logs.
