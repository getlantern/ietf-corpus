document: rfc-3414
kind: normative-requirement
summary: Whenever the local value of snmpEngineBoots has the value 2147483647 it latches at that value and an authenticated message always causes a notInTimeWindow authentication failure. Manual intervention (physical reconfiguration with a new snmpEngineID or new secret values) is required to reset such an engine.
section: 2.2.2
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
