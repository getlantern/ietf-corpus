document: rfc-2668
kind: interoperability-note
summary: Agents implementing older MAU type OIDs dot3MauType10BaseT(5) and dot3MauType10BaseFL(8) SHOULD return the duplex-specific variants (HD/FD) when the duplex mode is known; management applications MUST be prepared to receive the generic type value from older agent implementations.
