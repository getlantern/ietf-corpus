document: rfc-2935
kind: normative-requirement
summary: The HTTP server SHOULD avoid having its IOTP responses cached. In HTTP/1.0 the 'nocache' pragma can be used; POST responses in HTTP/1.1 are not cached; SSL/TLS connections are also not cached.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
