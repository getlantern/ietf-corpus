document: rfc-5692
kind: normative-requirement
summary: In the public access scenario where the AR functions as NAS, the bridge SHOULD forward upstream traffic from hosts toward the AR rather than bridging between SSs, but MUST perform normal bridging for downstream traffic from the AR and MUST bridge SEND (RFC 3971) messages.
section: "8"
rfc2119_level: MUST
topics:
