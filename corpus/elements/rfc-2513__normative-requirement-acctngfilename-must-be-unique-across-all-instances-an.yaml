document: rfc-2513
kind: normative-requirement
summary: acctngFileName must be unique across all instances; an agent returns an error (e.g., wrongValue) if a SET attempts to duplicate an existing name or uses a name invalid on the local file system. The value cannot be changed while acctngFileRowStatus is 'active'.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
