document: rfc-8169
kind: normative-requirement
summary: When an egress node receives a Path message with the RTM_SET Attribute Flag set in LSP_ATTRIBUTES, it MUST include an initialized RRO and LSP_ATTRIBUTES object with the RTM_SET Attribute Flag set and the RTM_SET TLV initialized in the Resv message.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
