document: rfc-9651
kind: protocol-element
summary: Decimals have an integer component of at most 12 digits and a fractional component of at most 3 digits. The serialization algorithm rounds input with more than three fractional digits to the nearest value (or even value if equidistant); field definitions requiring a different rounding strategy must specify it before serialization.
section: 3.3.2
topics:
