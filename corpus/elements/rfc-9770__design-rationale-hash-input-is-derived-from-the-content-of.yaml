document: rfc-9770
kind: design-rationale
summary: HASH_INPUT is derived from the content of the 'access_token' parameter in the AS-to-Client response because that is the one artifact that the AS, the client, and the RS are all able to see in some form. This ensures that the same HASH_INPUT is used regardless of CWT/JWT token format or CBOR/JSON response encoding.
section: 4.1.3
topics:
    - crypto
    - security
