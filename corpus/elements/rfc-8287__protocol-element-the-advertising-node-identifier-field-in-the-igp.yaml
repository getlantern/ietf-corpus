document: rfc-8287
kind: protocol-element
summary: The Advertising Node Identifier field in the IGP-Adjacency Segment ID sub-TLV is 4 octets carrying the 32-bit OSPF Router ID when Protocol=1, 6 octets carrying the 48-bit IS-IS System ID when Protocol=2, or 4 octets set to zero when Protocol=0.
