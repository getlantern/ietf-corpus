document: rfc-9628
kind: normative-requirement
summary: The max-fr and max-fs SDP parameters MUST both be provided if the implementation is willing to receive media. A sender SHOULD NOT send media exceeding the receiver's signaled max-fr and max-fs values, though MAY do so in scenarios such as pre-encoded media or selective forwarding.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
