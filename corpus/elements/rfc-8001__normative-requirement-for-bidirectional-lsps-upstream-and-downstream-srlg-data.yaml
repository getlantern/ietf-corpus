document: rfc-8001
kind: normative-requirement
summary: For bidirectional LSPs, upstream and downstream SRLG data MUST be added in separate SRLG subobjects. A single SRLG subobject MUST NOT contain a mixture of upstream and downstream SRLGs. The D-bit MUST be set appropriately to indicate direction.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
