document: rfc-6597
kind: normative-requirement
summary: When a KLVunit spans multiple RTP packets, the KLVunit data MUST be sent in sequential byte order such that concatenating payloads in sequence-number order exactly reproduces the original KLVunit.
section: 4.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
