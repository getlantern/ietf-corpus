document: rfc-9654
kind: normative-requirement
summary: Responders that implement this extension MUST reject any OCSP request that has a Nonce with a length of either 0 octets or greater than 128 octets, with the malformedRequest OCSPResponseStatus as described in Section 4.2.1 of RFC 6960.
section: "2.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
