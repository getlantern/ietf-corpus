document: rfc-6650
kind: normative-requirement
summary: Mechanical reports based solely on inline content analysis tools SHOULD NOT be sent because they are subjective and unlikely to provide a basis for recipient action. Reports from end users or spam traps MAY be sent.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - email
