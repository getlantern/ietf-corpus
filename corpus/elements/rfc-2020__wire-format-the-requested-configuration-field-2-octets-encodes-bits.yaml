summary: 'The Requested Configuration field (2 octets) encodes: bits 7-5 of octet 1 = version (vvv, current = 100 binary = 4); bits 3-2 of octet 2 = frame type (FF: 00=88023, 01=88025, 11=Either); bits 1-0 = promisc mode (PP: 00=single, 01=promiscuous); bit 0 of octet 1 side in octet 2 bit-0 = R (0=end node, 1=repeater).'
