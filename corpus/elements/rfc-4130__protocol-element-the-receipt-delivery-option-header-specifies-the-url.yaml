document: rfc-4130
kind: protocol-element
summary: The Receipt-Delivery-Option header specifies the URL for asynchronous MDN delivery. Its absence indicates a synchronous receipt. The value MUST be a URL indicating the transport destination (HTTP, HTTPS, or SMTP/mailto). The Disposition-notification-to header MUST carry a mail-address even though its value is ignored for routing.
section: "7.3"
topics:
    - http
    - email
