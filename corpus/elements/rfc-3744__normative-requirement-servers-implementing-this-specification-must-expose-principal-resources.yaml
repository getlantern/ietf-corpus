document: rfc-3744
kind: normative-requirement
summary: Servers implementing this specification MUST expose principal resources at an http(s) scheme URL. A URI of any scheme MAY identify a principal, but at least one of its URIs must be http(s).
section: "2"
rfc2119_level: MUST
