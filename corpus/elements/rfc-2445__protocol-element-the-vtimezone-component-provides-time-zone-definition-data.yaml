document: rfc-2445
kind: protocol-element
summary: The VTIMEZONE component provides time zone definition data. It requires the TZID property and at least one STANDARD or DAYLIGHT sub-component, each of which must include DTSTART, TZOFFSETFROM, and TZOFFSETTO. An optional TZURL property references an externally maintained definition.
section: 4.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
