document: rfc-5506
kind: normative-requirement
summary: RTCP packet types for which successful delivery cannot be detected SHOULD NOT be transmitted as Reduced-Size RTCP packets unless transmitted in the same lower-layer datagram as another RTCP packet type for which successful delivery can be detected.
