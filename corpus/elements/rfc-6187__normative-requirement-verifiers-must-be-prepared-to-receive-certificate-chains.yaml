document: rfc-6187
kind: normative-requirement
summary: Verifiers MUST be prepared to receive certificate chains and OCSP responses using algorithms not listed in the SSH_MSG_KEXINIT server_host_key_algorithms field, including algorithms with no SSH equivalent. The number of OCSP responses MUST NOT exceed the number of certificates.
section: "2.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
