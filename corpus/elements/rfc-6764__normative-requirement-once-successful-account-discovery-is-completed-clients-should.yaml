document: rfc-6764
kind: normative-requirement
summary: Once successful account discovery is completed, clients SHOULD cache the service details (user identity and principal-URL with full scheme/host/port) and reuse them on subsequent connections. On persistent failure, clients SHOULD retry SRV lookup and discovery.
section: "6"
rfc2119_level: SHOULD
topics:
