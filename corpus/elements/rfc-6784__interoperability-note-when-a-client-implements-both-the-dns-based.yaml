document: rfc-6784
kind: interoperability-note
summary: When a client implements both the DNS-based KDC discovery method (RFC 4120 Section 7.2.3.2) and the DHCPv6 method defined here, the choice of method is determined by local policy as configured by the realm administrator. When no policy is set and both are available, DNS is preferred.
section: "4.1"
topics:
