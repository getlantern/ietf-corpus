document: rfc-8693
kind: design-rationale
summary: The token exchange act has no impact on the validity of the subject or actor tokens (absent one-time-use semantics), and does not create tight linkage between input and output tokens—renewal of the input token is not expected to be reflected in the output token. Token revocation propagation is deployment-specific, not a general STS protocol property.
section: "2.1"
topics:
    - oauth
