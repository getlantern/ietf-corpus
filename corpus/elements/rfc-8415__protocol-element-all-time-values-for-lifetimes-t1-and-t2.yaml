document: rfc-8415
kind: protocol-element
summary: All time values for lifetimes, T1, and T2 are unsigned 32-bit integers expressed in seconds. The value 0xffffffff represents 'infinity'; a client with T1=0xffffffff never attempts to renew, and with T2=0xffffffff never attempts to rebind.
