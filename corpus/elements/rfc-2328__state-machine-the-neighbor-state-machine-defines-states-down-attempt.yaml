document: rfc-2328
kind: state-machine
summary: The neighbor state machine defines states Down, Attempt, Init, 2-Way, ExStart, Exchange, Loading, and Full. Adjacency formation progresses through ExStart (master/slave negotiation), Exchange (DD packets), Loading (LSR/LSU), to Full (synchronized databases).
