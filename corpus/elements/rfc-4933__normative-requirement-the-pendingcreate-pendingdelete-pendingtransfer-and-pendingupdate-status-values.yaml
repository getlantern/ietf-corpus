document: rfc-4933
kind: normative-requirement
summary: The pendingCreate, pendingDelete, pendingTransfer, and pendingUpdate status values MUST NOT be combined with each other. Additionally, pendingDelete MUST NOT be combined with clientDeleteProhibited or serverDeleteProhibited, and analogous restrictions apply for pendingTransfer and pendingUpdate.
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
