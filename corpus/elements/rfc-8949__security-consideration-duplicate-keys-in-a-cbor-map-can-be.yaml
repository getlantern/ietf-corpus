document: rfc-8949
kind: security-consideration
summary: Duplicate keys in a CBOR map can be exploited for security attacks when different decoders or processing layers resolve duplicates differently, leading to inconsistent interpretation of data. Protocols should mandate unique map keys and specify deterministic handling of duplicates.
section: "10"
topics:
    - cbor
    - security
