document: rfc-9866
kind: normative-requirement
summary: While LORS is GLOBALLY DOWN, RNFD MUST prevent RPL from having any DODAG parent and MUST prevent it from advertising any Rank other than INFINITE_RANK. The node MUST NOT change LORS or CFRCs until it joins a new DODAG Version.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
