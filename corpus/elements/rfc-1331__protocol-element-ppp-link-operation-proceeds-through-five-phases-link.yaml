document: rfc-1331
kind: protocol-element
summary: 'PPP link operation proceeds through five phases: Link Dead (physical layer not ready), Link Establishment (LCP negotiation), Authentication (optional peer authentication), Network-Layer Protocol (NCP configuration), and Link Termination. Each NCP may independently open and close during the Network-Layer Protocol phase.'
