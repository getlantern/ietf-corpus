document: rfc-6049
kind: security-consideration
summary: Passive measurement MUST restrict attention to packet headers of interest. If user payloads are temporarily stored for length analysis, suitable precautions MUST be taken to maintain confidentiality; a hashing function is recommended for payload comparisons.
section: "7.2"
rfc2119_level: MUST
topics:
    - security
    - privacy
    - measurement
