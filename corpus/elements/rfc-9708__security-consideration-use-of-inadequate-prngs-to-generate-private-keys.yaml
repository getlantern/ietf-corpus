document: rfc-9708
kind: security-consideration
summary: Use of inadequate PRNGs to generate private keys or LM-OTS random values (C) can result in little or no security; an attacker may reproduce the PRNG environment and search the resulting small key space. RFC 4086 guidance on random number generation MUST be followed.
section: "6"
topics:
    - crypto
    - security
