document: rfc-4733
kind: normative-requirement
summary: The first packet for an event MUST have the RTP marker (M) bit set. The final packet MUST have the E bit set (though setting of the E bit MAY be deferred to the retransmission). Intermediate packets MUST NOT have either the M bit or the E bit set.
section: 2.5.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
