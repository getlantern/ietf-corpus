summary: Unsolicited Neighbor Advertisements are described as a performance enhancement only (unreliable), not a correctness mechanism. The Neighbor Unreachability Detection algorithm independently ensures all nodes reliably discover changed link-layer addresses, at the cost of potentially longer convergence delay.
