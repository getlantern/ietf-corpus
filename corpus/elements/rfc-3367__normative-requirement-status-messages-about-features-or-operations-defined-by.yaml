document: rfc-3367
kind: normative-requirement
summary: Status messages about features or operations defined by the transport (e.g., security via HTTP, mail failure via SMTP) MUST be sent in accordance with that transport's reporting mechanism and not via CNRP status codes.
section: 4.2.4.1
rfc2119_level: MUST
topics:
    - http
    - email
