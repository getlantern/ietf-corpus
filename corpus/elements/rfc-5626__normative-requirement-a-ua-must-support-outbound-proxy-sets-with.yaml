document: rfc-5626
kind: normative-requirement
summary: A UA MUST support outbound-proxy-sets with at least two outbound proxy URIs and SHOULD support sets with up to four URIs. If the set has more than one URI, the UAC MUST send a REGISTER request to at least two of the default outbound proxies.
section: 4.2.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
