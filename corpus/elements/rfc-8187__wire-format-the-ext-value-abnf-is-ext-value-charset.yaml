document: rfc-8187
kind: wire-format
summary: 'The ext-value ABNF is: ext-value = charset "''" [ language ] "''" value-chars, where charset is "UTF-8" or a mime-charset token, language is an RFC 5646 Language-Tag, and value-chars is a sequence of pct-encoded or attr-char characters.'
