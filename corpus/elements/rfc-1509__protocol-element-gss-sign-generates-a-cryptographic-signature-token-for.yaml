document: rfc-1509
kind: protocol-element
summary: gss_sign generates a cryptographic signature token for a supplied message using the specified context and qop_req (quality-of-protection, defaulting to GSS_C_QOP_DEFAULT). The resulting msg_token is transferred to the peer and verified via gss_verify.
section: "3.8"
topics:
