document: rfc-8863
kind: normative-requirement
summary: When a full ICE implementation begins ICE processing as described in RFC 8445 Section 6.1, it MUST set a PAC timer (Patiently Awaiting Connectivity) to ensure ICE runs for a minimum amount of time before determining failure.
section: "4"
rfc2119_level: MUST
