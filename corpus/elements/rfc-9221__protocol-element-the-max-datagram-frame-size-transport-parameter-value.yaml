document: rfc-9221
kind: protocol-element
summary: The max_datagram_frame_size transport parameter (value=0x20) advertises support for receiving DATAGRAM frames. It is a variable-length integer representing the maximum size (in bytes) of a DATAGRAM frame the endpoint is willing to receive, including frame type, length, and payload. Default is 0, meaning no support.
