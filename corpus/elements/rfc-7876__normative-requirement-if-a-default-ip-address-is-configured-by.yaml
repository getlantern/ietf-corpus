document: rfc-7876
kind: normative-requirement
summary: If a default IP address is configured by the equipment vendor for the UDP return path, it MUST be an address that keeps the Response packet contained within the responder. A responder receiving such an address unexpectedly SHOULD notify the operator in a rate-limited manner.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
