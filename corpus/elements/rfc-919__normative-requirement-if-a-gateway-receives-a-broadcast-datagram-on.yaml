document: rfc-919
kind: normative-requirement
summary: If a gateway receives a broadcast datagram on the hardware network to which it is addressed, the gateway should not forward it but should treat itself as a destination (e.g., processing the datagram as a routing table update).
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - ip
