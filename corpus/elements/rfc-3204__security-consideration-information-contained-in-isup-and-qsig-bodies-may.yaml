document: rfc-3204
kind: security-consideration
summary: Information contained in ISUP and QSIG bodies may include sensitive customer information, potentially requiring use of encryption. Security mechanisms defined in RFC 2543 (SIP) should be used as appropriate for both the SIP message and the encapsulated ISUP or QSIG body.
section: "5"
topics:
    - sip
    - security
    - realtime
