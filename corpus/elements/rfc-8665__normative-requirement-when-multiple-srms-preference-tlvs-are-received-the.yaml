document: rfc-8665
kind: normative-requirement
summary: When multiple SRMS Preference TLVs are received, the receiver MUST use the first occurrence; if flooding scopes differ, the narrowest scope MUST be used; within the same scope, the smallest Instance ID MUST be used. AS-scoped flooding SHOULD be used for SRMS Preference TLV.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
