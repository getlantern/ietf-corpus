document: rfc-5321
kind: normative-requirement
summary: An originating SMTP client that has not successfully negotiated an 8-bit extension MUST NOT transmit messages with information in the high-order bit of octets. The unextended SMTP service provides 7-bit transport only.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - email
