document: rfc-4598
kind: interoperability-note
summary: Since an AC-3 bit stream is a special case of an E-AC-3 bit stream, carriage of AC-3 frames in the E-AC-3 RTP payload format is permitted, but only for the independent substream of the first (or only) program.
section: "4.4"
topics:
