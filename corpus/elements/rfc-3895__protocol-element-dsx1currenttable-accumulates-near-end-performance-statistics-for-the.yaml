document: rfc-3895
kind: protocol-element
summary: 'dsx1CurrentTable accumulates near-end performance statistics for the current 15-minute interval: Errored Seconds (ESs), Severely Errored Seconds (SESs), Severely Errored Framing Seconds (SEFSs), Unavailable Seconds (UASs), Controlled Slip Seconds (CSSs), Path Coding Violations (PCVs), Line Errored Seconds (LESs), Bursty Errored Seconds (BESs), Degraded Minutes (DMs), and Line Code Violations (LCVs). All counters use PerfCurrentCount (Gauge32).'
section: "3"
topics:
    - snmp
    - measurement
