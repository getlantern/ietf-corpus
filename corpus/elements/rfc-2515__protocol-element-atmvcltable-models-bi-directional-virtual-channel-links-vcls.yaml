summary: atmVclTable models bi-directional Virtual Channel Links (VCLs), indexed by ifIndex, VPI, and VCI. Each entry carries the same fields as atmVplTable plus AAL type, AAL5 receive/transmit SDU sizes, and AAL5 encapsulation type. Used for PVCs, SVCs, and Soft PVCs.
