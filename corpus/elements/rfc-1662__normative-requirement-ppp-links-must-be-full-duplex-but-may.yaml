document: rfc-1662
kind: normative-requirement
summary: PPP links MUST be full-duplex, but MAY be either dedicated or circuit-switched. The physical layer must operate in asynchronous (start/stop), bit-synchronous, or octet-synchronous mode, transparent to PPP Data Link Layer frames.
section: "1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
