document: rfc-5287
kind: normative-requirement
summary: The TDMoIP AAL2 Options parameter MUST be present for TDMoIP AAL2 mode PWs (PW type 0x0018). The Encoding field MUST be zero when no native signal processing is performed (G.711), and both directions MUST match for PW setup to succeed.
section: "3.6"
rfc2119_level: MUST
topics:
