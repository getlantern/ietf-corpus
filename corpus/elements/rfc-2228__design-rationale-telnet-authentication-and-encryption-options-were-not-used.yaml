document: rfc-2228
kind: design-rationale
summary: Telnet authentication and encryption options were not used for FTP security because RFC 1123 explicitly forbids Telnet option negotiation over the FTP control connection (other than Synch and IP). Additionally, the Telnet mechanism does not provide integrity-only protection or address data channel security.
section: "1"
topics:
    - security
