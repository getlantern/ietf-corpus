document: rfc-2298
kind: normative-requirement
summary: If a Disposition-Notification-Options parameter has importance 'required' and the UA does not understand it, the UA MUST NOT generate an MDN with any disposition type other than 'failed'. A UA that does not understand an 'optional' parameter MAY generate an MDN ignoring the parameter.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - email
