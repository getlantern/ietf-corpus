document: rfc-6320
kind: wire-format
summary: 'The ANCP adjacency message contains (in order): Version (8 bits), Message Type (8 bits, always 10), Timer (8 bits, units of 100 ms, default 250), M flag (1 bit), Code (7 bits, values 1=SYN/2=SYNACK/3=ACK/4=RSTACK), Sender Name (48 bits), Receiver Name (48 bits), Sender Port (32 bits), Receiver Port (32 bits), PType (4 bits), P Flag (4 bits), Sender Instance (24 bits), Partition ID (8 bits), Receiver Instance (24 bits), Reserved (8 bits), # of Caps (8 bits), Total Length (16 bits), and variable-length Capability Fields.'
section: 3.5.1
