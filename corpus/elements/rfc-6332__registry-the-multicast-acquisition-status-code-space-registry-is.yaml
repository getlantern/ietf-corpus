summary: The 'Multicast Acquisition Status Code Space Registry' is created under Specification Required policy with a 16-bit (65536-value) space. Codes 0-4 and 1001-1007 are defined; 65535 is reserved. Simple join uses 1-1000; RAMS uses 1001-2000.
