document: rfc-8047
kind: security-consideration
summary: 'VPN tunnel leakage risk: use of multiple addresses in HIP multihoming may cause data sessions intended to be ESP-protected to be sent in the clear if some addresses fall outside the configured security policy or association database range. Implementors must prevent such leakage.'
