document: rfc-2492
kind: wire-format
summary: NHRP control messages are encapsulated as [0xAA-AA-03][0x00-00-5E][0x00-03][NHRP control message]. The ar$pro field SHALL be 0x86DD (IPv6), ar$afn remains 0x0F (ATM), and ar$spln/ar$tpln are 0 or 16.
