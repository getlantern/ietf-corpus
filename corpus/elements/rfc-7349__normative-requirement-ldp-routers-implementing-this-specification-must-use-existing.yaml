document: rfc-7349
kind: normative-requirement
summary: LDP routers implementing this specification MUST use existing mechanisms to preserve the sequence number's strictly increasing property for the deployed life of the router, including across cold restarts. One approach is to use the high-order 32 bits as a boot count stored in non-volatile storage.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
