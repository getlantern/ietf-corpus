document: rfc-5565
kind: interoperability-note
summary: When the transit core spans multiple Autonomous Systems, the softwire remote endpoint is not the BGP next hop, breaking the core selection procedure. Solutions include AS-boundary AFBRs, multi-hop EBGP, or preserving next hops at ASBRs, possibly requiring stacked encapsulations.
