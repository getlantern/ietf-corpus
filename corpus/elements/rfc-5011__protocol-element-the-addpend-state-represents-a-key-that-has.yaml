document: rfc-5011
kind: protocol-element
summary: The AddPend state represents a key that has been seen at the resolver with its SEP bit set and included in a validated DNSKEY RRSet, but is still within the hold-down period. The resolver tracks which keys originally validated the RRSet; if all those keys are revoked before hold-down expires, the acceptance process is aborted.
section: "4.2"
topics:
    - dns
    - security
