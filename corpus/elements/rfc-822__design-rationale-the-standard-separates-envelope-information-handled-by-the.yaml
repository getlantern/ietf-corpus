document: rfc-822
kind: design-rationale
summary: The standard separates envelope information (handled by the transport service) from message contents (governed by this spec), and deliberately contains no specification of envelope format. This separation allows the standard to be applied across different mail transport environments.
section: "1.1"
topics:
    - email
