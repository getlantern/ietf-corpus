document: rfc-2688
kind: protocol-element
summary: 'Admission control computes effective rate (eRate) as: number of fragments = CMTU div (FRAG-Header); eMTU accounts for last fragment remainder; eRate = eMTU/CMTU * R. This gives the worst-case bandwidth required at the link layer after fragmentation overhead.'
section: "4.3"
topics:
