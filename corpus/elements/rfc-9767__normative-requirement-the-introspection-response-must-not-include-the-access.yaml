document: rfc-9767
kind: normative-requirement
summary: The introspection response MUST NOT include the access token value itself. The access array in the response MAY be filtered for the identified RS, including being an empty array indicating no explicit access rights can be disclosed.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
    - privacy
