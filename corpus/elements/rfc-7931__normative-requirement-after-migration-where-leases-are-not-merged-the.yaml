document: rfc-7931
kind: normative-requirement
summary: After migration where leases are not merged, the client SHOULD re-establish callback information with the new server as soon as possible using SETCLIENTID/SETCLIENTID_CONFIRM. This prevents unwanted revocation of existing delegations caused by the server's inability to recall them due to missing callback information.
section: 6.1.1.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
