document: rfc-7195
kind: normative-requirement
summary: When generating the initial offer, the offerer MUST set nettype to 'PSTN' and addrtype to 'E164' in the 'c=' line, MUST include an 'a=cs-correlation' attribute, and MUST NOT include more than one 'cs-correlation' attribute per media description.
section: 5.6.1
rfc2119_level: MUST
topics:
