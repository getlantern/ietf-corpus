document: rfc-3768
kind: protocol-element
summary: The Authentication Type field is an 8-bit integer scoped per virtual router. Values 1 and 2 are reserved for backwards compatibility with RFC 2338; only value 0 (No Authentication) is currently active. The Authentication Data fields SHOULD be set to zero and ignored on reception.
section: 5.3.6
topics:
    - security
