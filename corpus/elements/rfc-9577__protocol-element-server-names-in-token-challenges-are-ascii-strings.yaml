document: rfc-9577
kind: protocol-element
summary: Server names in token challenges are ASCII strings containing hostname and optional port (implied 443 if absent), following URI authority format (RFC 3986 Section 3.2). Names MUST NOT include a userinfo portion. Multiple Origin names in origin_info are comma-delimited without whitespace.
section: 2.1.1.1
topics:
