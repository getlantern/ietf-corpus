document: rfc-8748
kind: normative-requirement
summary: A <fee:fee> element MUST have a zero or greater (non-negative) value; a <fee:credit> element MUST have a negative value. When multiple such elements appear in a response, the net fee or credit is the arithmetic sum of all values.
section: "3.4"
rfc2119_level: MUST
topics:
    - registry
