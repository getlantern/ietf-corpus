document: rfc-3958
kind: design-rationale
summary: The service parameter separator is ':' rather than '+' (used in RFC 3404 URI DDDS) because S-NAPTR expands the syntax to allow all characters valid in URI scheme names, and '+' is itself a valid URI scheme character and therefore unsuitable as a separator.
section: "6.5"
topics:
    - dns
