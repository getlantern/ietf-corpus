document: rfc-8861
kind: normative-requirement
summary: When RTCP XR is used, media-specific XR report blocks that are relevant to only certain media types (e.g., VoIP metrics for audio SSRCs) MUST be sent by the SSRC to which they are relevant and MUST NOT be included in the common report sent by the reporting source.
section: "3.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
