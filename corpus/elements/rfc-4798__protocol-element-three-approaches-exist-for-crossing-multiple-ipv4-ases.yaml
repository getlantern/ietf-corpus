document: rfc-4798
kind: protocol-element
summary: 'Three approaches exist for crossing multiple IPv4 ASes: (a) eBGP redistribution of unlabeled IPv6 routes between ASBRs with separate per-AS LSP meshes; (b) eBGP redistribution of labeled IPv6 routes requiring inter-AS LSPs; (c) multi-hop eBGP with eBGP redistribution of labeled IPv4 /32 routes to build end-to-end LSPs across ASes.'
