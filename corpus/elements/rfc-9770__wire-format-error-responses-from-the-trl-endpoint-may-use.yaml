document: rfc-9770
kind: wire-format
summary: Error responses from the TRL endpoint MAY use the problem-details format (Content-Format 'application/concise-problem-details+cbor', code 257). The payload MUST include the Custom Problem Detail entry 'ace-trl-error' (a CBOR map with mandatory 'error-id' field at key 0 and optional 'cursor' field at key 1).
section: "6.1"
topics:
