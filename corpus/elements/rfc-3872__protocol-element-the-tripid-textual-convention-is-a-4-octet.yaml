document: rfc-3872
kind: protocol-element
summary: The TripId textual convention is a 4-octet unsigned integer (Unsigned32) that uniquely identifies a Location Server within its ITAD. It may, but need not, represent an IPv4 address in network-byte order; it does not represent an IPv6 address.
section: "6.1"
topics:
