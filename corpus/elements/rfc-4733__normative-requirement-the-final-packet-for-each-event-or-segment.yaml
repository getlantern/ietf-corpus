document: rfc-4733
kind: normative-requirement
summary: The final packet for each event or segment SHOULD be sent a total of three times at the source's update interval to protect against packet loss. The RTP sequence number MUST be incremented for each retransmission.
section: 2.5.1.4
rfc2119_level: SHOULD
