document: rfc-5586
kind: security-consideration
summary: The security considerations for the associated control channel from RFC 4385 apply. Further security considerations MUST be described in each relevant associated channel type specification. RFC 5085 data-plane security considerations also apply to the G-ACh regardless of whether GAL or ACH-only alerting is used.
