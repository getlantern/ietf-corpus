document: rfc-4196
kind: protocol-element
summary: SEED uses a block size of 16 octets (128 bits) and a key size of 128 bits with a 16-round Feistel structure; it supports only a single fixed key length with no variable key size attribute negotiation beyond the fixed 128-bit value.
