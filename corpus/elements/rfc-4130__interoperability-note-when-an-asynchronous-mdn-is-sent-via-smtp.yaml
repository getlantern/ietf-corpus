document: rfc-4130
kind: interoperability-note
summary: When an asynchronous MDN is sent via SMTP, it MUST follow RFC 3335 (AS1) semantics and formatting rather than AS2 HTTP formatting. AS2-To and AS2-From headers are not required in asynchronous SMTP MDNs.
section: "7.2"
topics:
