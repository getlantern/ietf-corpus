document: rfc-3972
kind: normative-requirement
summary: The Public Key field MUST be formatted as a DER-encoded ASN.1 SubjectPublicKeyInfo structure per RFC 3280. SEND SHOULD use RSA, with algorithm identifier rsaEncryption (OID 1.2.840.113549.1.1.1) and RSAPublicKey type per RFC 3279. The RSA key length SHOULD be at least 384 bits.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
