document: rfc-8865
kind: interoperability-note
summary: Multi-party T.140 scenarios require one T.140 data channel per remote party because neither WebRTC data channels nor the T.140 protocol support source indication within a single channel. The 'label' attribute in 'dcmap' can help implementations distinguish between channels.
section: "5.5"
topics:
