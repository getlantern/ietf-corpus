document: rfc-3201
kind: protocol-element
summary: ciCircuitObject is a RowPointer index that identifies the circuit in its native MIB table (e.g., frCircuitTable, frPVCEndptTable, aal5VccTable). It MUST be the lexicographically smallest accessible OID that fully describes the circuit.
