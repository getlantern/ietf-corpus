document: rfc-5040
kind: protocol-element
summary: 'RDMA OpCodes are 4-bit values assigned per message type: 0000b=RDMA Write (Tagged), 0001b=RDMA Read Request (Untagged/QN1), 0010b=RDMA Read Response (Tagged), 0011b=Send (Untagged/QN0), 0100b=Send with Invalidate, 0101b=Send with SE, 0110b=Send with SE and Invalidate, 0111b=Terminate (Untagged/QN2); 1000b-1111b are Reserved.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
