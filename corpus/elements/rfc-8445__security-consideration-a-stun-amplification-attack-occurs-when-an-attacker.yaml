document: rfc-8445
kind: security-consideration
summary: A STUN amplification attack occurs when an attacker provides many candidate addresses, causing an agent to send a large volume of STUN checks toward a victim. The mandatory 100-pair (configurable) limit on total candidate pairs in the checklist set directly bounds the worst-case amplification factor.
section: 19.5.1
topics:
    - security
    - nat
    - webrtc
