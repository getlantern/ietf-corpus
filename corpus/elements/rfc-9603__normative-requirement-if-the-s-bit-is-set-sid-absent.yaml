document: rfc-9603
kind: normative-requirement
summary: If the S bit is set (SID absent) in an SRv6-ERO subobject and the PCC does not support NAI resolution, the PCC MUST consider the entire ERO invalid and send a PCErr with Error-Type=4 and Error-Value=4 ('Unsupported parameter').
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
