document: rfc-9729
kind: protocol-element
summary: The 'Concealed' HTTP authentication scheme uses asymmetric cryptography. Clients possess a key ID and a public/private key pair; servers maintain a mapping of authorized key IDs to public keys. The client signs data derived from a TLS key exporter and sends the result unprompted in the Authorization (or Proxy-Authorization) header field.
section: "2"
topics:
    - http
    - tls
    - security
    - crypto
