document: rfc-4866
kind: normative-requirement
summary: The permanent home keygen token MUST be transmitted encrypted using RSAES-PKCS1-v1_5 with the mobile node's public key in the Permanent Home Keygen Token field. The Binding Authorization Data option MUST be the last option in the Binding Acknowledgment, covering the Permanent Home Keygen Token option.
section: "4.7"
rfc2119_level: MUST
topics:
    - mobility
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
