document: rfc-3327
kind: protocol-element
summary: An intermediate proxy wishing to be on the path for future requests inserts a URI referencing itself as the topmost value in the Path header field before forwarding the REGISTER request. A proxy with specific topology knowledge MAY also insert a Path value referencing another node, allowing construction of a path discongruent with the REGISTER route.
section: "5.2"
topics:
    - sip
    - realtime
