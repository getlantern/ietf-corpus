document: rfc-2817
kind: normative-requirement
summary: If an unsecured response would be unacceptable, a client MUST send an OPTIONS request first (rather than the actual request) to initiate the switch to TLS/1.0. This avoids sending sensitive request data before TLS is established.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
