document: rfc-5840
kind: wire-format
summary: 'Next Header (8 bits): In integrity-only mode, MUST equal the ESP trailer Next Header field. In encrypted mode, this field loses its semantics and MUST be initialized to all zeros. The receiver MUST drop the packet if the two Next Header values do not match in integrity-only mode.'
section: "2"
topics:
