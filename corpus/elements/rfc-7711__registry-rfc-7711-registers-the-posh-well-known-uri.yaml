document: rfc-7711
kind: registry
summary: RFC 7711 registers the 'posh' well-known URI suffix in the IANA 'Well-Known URIs' registry (RFC 5785). The suffix is expected to be followed by an additional path component of the form '{servicename}.json'.
section: "9.1"
