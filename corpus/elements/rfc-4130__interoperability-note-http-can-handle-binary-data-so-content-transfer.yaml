document: rfc-4130
kind: interoperability-note
summary: HTTP can handle binary data, so Content-Transfer-Encoding of MIME is not required and its absence MUST NOT result in transaction failure. A value of 'binary' or '8-bit' is permissible but not required.
section: 5.2.1
