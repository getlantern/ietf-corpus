document: rfc-5267
kind: protocol-element
summary: The CANCELUPDATE command takes one or more command tags as arguments and instructs the server to cease sending updates for those contexts; the server MAY free resources associated with them, but the client may still issue further PARTIAL requests for the same criteria.
