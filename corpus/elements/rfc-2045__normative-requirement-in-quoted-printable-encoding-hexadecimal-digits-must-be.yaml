document: rfc-2045
kind: normative-requirement
summary: In Quoted-Printable encoding, hexadecimal digits MUST be uppercase; lowercase letters in 'abcdef' are formally illegal. TAB and SPACE MUST NOT appear at the end of an encoded line; trailing whitespace must be deleted on decode.
section: "6.7"
rfc2119_level: MUST
