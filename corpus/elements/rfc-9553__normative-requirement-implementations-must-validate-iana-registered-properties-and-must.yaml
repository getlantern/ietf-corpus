document: rfc-9553
kind: normative-requirement
summary: Implementations MUST validate IANA-registered properties and MUST reject invalid ones. IANA-registered property names MUST be in lower camel case and MUST only contain ASCII alphanumeric characters or the '@' character; control characters, colons, and quotation marks are forbidden.
section: 1.7.2
rfc2119_level: MUST
topics:
    - json
    - registry
