document: rfc-4184
kind: protocol-element
summary: An AC-3 synchronization frame contains a Synchronization Information (SI) field, a Bit Stream Information (BSI) field, six audio blocks (AB0–AB5) each representing 256 PCM samples, an optional auxiliary data field (AUX), and an error correction field (CRC). The entire frame represents 1536 PCM samples across all coded channels.
