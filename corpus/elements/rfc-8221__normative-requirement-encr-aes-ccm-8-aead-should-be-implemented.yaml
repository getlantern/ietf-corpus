document: rfc-8221
kind: normative-requirement
summary: ENCR_AES_CCM_8 (AEAD) SHOULD be implemented at 128-bit keys for IoT interoperability, raised from MAY in RFC 7321. This requirement also applies to server-side implementations that need to interoperate with IoT devices.
