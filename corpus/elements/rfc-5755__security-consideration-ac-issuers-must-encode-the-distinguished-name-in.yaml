document: rfc-5755
kind: security-consideration
summary: AC issuers MUST encode the distinguished name in the AC holder.entityName field identically to the PKC subject distinguished name. Inconsistent name encoding or comparison rules may result in acceptance of invalid targeted or proxied ACs, or rejection of valid ones.
