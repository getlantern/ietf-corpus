document: rfc-8562
kind: design-rationale
summary: MultipointHead sessions cannot fail by definition and are always administratively driven. The head remains always-Up and in Demand mode because the unidirectional multipoint model gives the head no BFD mechanism to learn of tail state—this is intentionally asymmetric.
section: "5.3"
topics:
    - routing
    - multicast
