document: rfc-9277
kind: design-rationale
summary: Tag values with embedded zero bytes (e.g., 0x12003456) are discouraged to avoid confusing implementations that treat the magic number as a C string. The use of four ASCII characters mnemonic to the protocol is encouraged but not required.
section: "2.1"
topics:
