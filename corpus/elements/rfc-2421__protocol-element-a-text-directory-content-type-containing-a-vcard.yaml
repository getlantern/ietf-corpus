document: rfc-2421
kind: protocol-element
summary: A Text/Directory content type containing a vCard (version 3.0) SHOULD be included in each VPIM message to convey originator identity. Required vCard attributes are TEL, EMAIL, and VERSION; SOUND (spoken name via content ID), N, ROLE, and REV are recommended.
section: 4.3.3
topics:
