document: rfc-9427
kind: protocol-element
summary: 'For TEAP with TLS 1.3, the session_key_seed is derived as TLS-Exporter("EXPORTER: teap session key seed", Type, 40), and IMCK[j] = TLS-Exporter("EXPORTER: Inner Methods Compound Keys", S-IMCK[j-1] || IMSK[j], 60), where S-IMCK[j] = first 40 octets and CMK[j] = last 20 octets of IMCK[j].'
