document: rfc-5393
kind: protocol-element
summary: The Max-Breadth header field carries a single positive integer representing the maximum number of concurrent branches a forked request may spawn from its current point. When a proxy forks, the Incoming Max-Breadth is divided among outgoing branches; Outgoing Max-Breadth is the sum of Max-Breadth values of branches without a final response.
section: "5.1"
topics:
    - sip
    - security
