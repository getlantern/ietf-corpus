document: rfc-8859
kind: interoperability-note
summary: The DCCP-based attributes dccp-service-code (RFC 5762) and dccp-port (RFC 6773) are categorized CAUTION because DCCP is connection-oriented and does not allow multiple connections on the same 5-tuple, making multiplexing of DCCP-based media descriptions over a single transport inadvisable.
section: "5.8"
topics:
    - realtime
    - rtp
