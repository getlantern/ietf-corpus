document: rfc-9621
kind: security-consideration
summary: When racing between two different Protocol Stacks, both stacks must use the same security protocols and options. A Transport Services Implementation can race different security protocols only if the application explicitly specifies it considers them equivalent.
section: "6"
topics:
    - security
    - tls
    - crypto
