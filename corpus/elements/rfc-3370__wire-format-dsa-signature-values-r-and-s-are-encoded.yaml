summary: DSA signature values r and s are encoded as Dss-Sig-Value ::= SEQUENCE { r INTEGER, s INTEGER }. DSA public key Y is encoded as an INTEGER (Dss-Pub-Key). Domain parameters use Dss-Parms ::= SEQUENCE { p INTEGER, q INTEGER, g INTEGER }.
