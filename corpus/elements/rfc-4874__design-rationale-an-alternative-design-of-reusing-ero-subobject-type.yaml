document: rfc-4874
kind: design-rationale
summary: An alternative design of reusing ERO subobject type bits (e.g., the top bit) to distinguish inclusion vs. exclusion was rejected because RFC 3209 allocates only 32 IETF-consensus subobject types in that scheme, which was considered an unacceptably small number for future protocol expansion. Separate new objects and subobject types were chosen instead.
section: "8"
topics:
