document: rfc-6840
kind: normative-requirement
summary: Security-aware resolvers SHOULD implement a BAD cache as described in RFC 4035. This guidance upgrades the previous permissive 'may implement' to a SHOULD, based on operational experience showing DNSSEC administrative errors cause significant DNS traffic increases.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
