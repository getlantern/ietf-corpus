document: rfc-9234
kind: design-rationale
summary: The OTC Attribute value is set identically whether applied at the egress of the remote AS or at the ingress of the local AS, so if the remote AS is non-compliant the local AS compensates without disagreement. This makes the scheme robust and benefits early adopters before universal deployment.
section: "5"
topics:
