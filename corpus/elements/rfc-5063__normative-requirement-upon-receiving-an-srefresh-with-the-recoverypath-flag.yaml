document: rfc-5063
kind: normative-requirement
summary: Upon receiving an Srefresh with the RecoveryPath Flag set, if matching transmitted Path state is found, the restarted node MUST generate a trigger Path message per Section 4.5.2.2. If no match is found, the restarted node MUST generate a MESSAGE_ID NACK with the RecoveryPath Flag set (1).
section: 5.3.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
