document: rfc-8999
kind: security-consideration
summary: Version Negotiation packets have no integrity or confidentiality protection, providing only modest resistance to insertion by attackers. Specific QUIC versions may add mechanisms to detect modification of the supported versions list, but no such mechanism is defined here.
