document: rfc-8831
kind: state-machine
summary: 'Data channel close sequence: (1) closing side resets its outgoing SCTP stream (RFC 6525); (2) peer detects incoming stream reset and resets its corresponding outgoing stream; (3) both resets complete and the channel is closed. Stream Sequence Numbers reset to zero and streams become available for reuse.'
