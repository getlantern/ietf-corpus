document: rfc-4236
kind: protocol-element
summary: The Content-Encodings parameter allows a callout server to indicate preferred content encodings (e.g., gzip). The OPES processor MUST NOT bypass a service just because the actual content encoding does not match the service's preferences.
section: 3.2.7
rfc2119_level: MUST NOT
topics:
    - http
