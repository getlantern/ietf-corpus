document: rfc-4683
kind: privacy-consideration
summary: 'Reusing the same SIM across certificate renewals enables linkability: an attacker can correlate successive certificates to the same individual. Generating a fresh R and recomputing the SIM at each renewal prevents this correlation.'
section: "8"
topics:
    - pkix
    - privacy
