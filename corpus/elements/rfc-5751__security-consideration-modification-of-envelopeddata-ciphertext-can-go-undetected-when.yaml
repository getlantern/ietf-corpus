document: rfc-5751
kind: security-consideration
summary: Modification of EnvelopedData ciphertext can go undetected when authentication is not also applied. Sending EnvelopedData without wrapping in or enclosing SignedData provides no integrity protection, allowing alteration of message meaning without detection.
