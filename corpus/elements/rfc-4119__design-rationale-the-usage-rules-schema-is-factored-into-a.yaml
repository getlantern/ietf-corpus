document: rfc-4119
kind: design-rationale
summary: The 'usage-rules' schema is factored into a separate 'basicPolicy' namespace (urn:ietf:params:xml:ns:pidf:geopriv10:basicPolicy) to allow its reuse outside the core geopriv schema. The document notes that the semantics defined here apply only to the geopriv usage; any other reuse must define its own semantics.
section: 2.2.5
