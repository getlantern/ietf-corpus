document: rfc-2049
kind: interoperability-note
summary: 'Only 73 characters are guaranteed to survive all known gateways intact: upper/lowercase A-Z and a-z, digits 0-9, and eleven punctuation characters. Base64 encoding confines itself to this invariant set and is thus maximally portable.'
