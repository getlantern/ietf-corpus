document: rfc-4769
kind: design-rationale
summary: The 'pstn' Enumservice enables service providers to consolidate all telephone number lookups (ported numbers, pooled numbers, number blocks) into a single ENUM lookup, simplifying call routing and network operations into either an on-net IP-based or off-net PSTN-based response.
