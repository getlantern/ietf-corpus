document: rfc-7023
kind: protocol-element
summary: 'Native Service (NS) OAM notification for Ethernet PW uses three mechanisms: sending AIS frames from the local MEP when CCM transmission is disabled, suspending CCM frame transmission to convey PE receive defects when CCM is enabled, and setting the RDI bit in CCM frames when loss of CCMs from the peer MEP is detected or when conveying PW reverse defects.'
section: "4.1"
topics:
    - mpls
    - measurement
