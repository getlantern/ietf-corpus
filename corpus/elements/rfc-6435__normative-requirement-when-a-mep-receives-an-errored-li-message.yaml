document: rfc-6435
kind: normative-requirement
summary: When a MEP receives an errored LI message (unrecognized label binding, no return path, or unexpected Source MEP-ID), the receiving MEP MUST NOT apply a lock. A MEP receiving errored LI messages SHOULD perform local diagnostic actions such as counting the messages and MAY log them.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
