document: rfc-9884
kind: normative-requirement
summary: The headend MUST perform validity checks on PSID sub-TLVs received in echo replies without setting a return code; if any validation fails, the headend MUST drop the echo reply and SHOULD log and/or report an error.
section: "4.1"
rfc2119_level: MUST
topics:
