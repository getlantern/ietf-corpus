document: rfc-8551
kind: protocol-element
summary: The application/pkcs7-signature media type always contains a CMS ContentInfo with a single SignedData object where the encapContentInfo eContent field MUST be absent; the signerInfos field contains the detached signatures for the first MIME body part of a multipart/signed message.
