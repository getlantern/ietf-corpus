document: rfc-5801
kind: security-consideration
summary: Because GS2 does not support security layers, it is strongly RECOMMENDED that channel binding to a secure external channel be used. Successful channel binding eliminates MITM attacks, provided the external channel and its channel binding data are secure.
section: "16"
rfc2119_level: RECOMMENDED
topics:
