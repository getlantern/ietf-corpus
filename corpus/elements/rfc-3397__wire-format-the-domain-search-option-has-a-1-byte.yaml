document: rfc-3397
kind: wire-format
summary: The Domain Search Option has a 1-byte code field (value 119), a 1-byte Len field, and a variable-length Searchstring field containing the encoded domain search list. If the searchlist exceeds 255 octets, multiple options MAY be used per RFC 3396.
