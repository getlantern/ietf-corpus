document: rfc-7248
kind: normative-requirement
summary: The XMPP-to-SIP gateway MUST consider the XMPP subscription to be permanently cancelled (and inform the XMPP user) if it receives a SIP response of 403, 489, or 603; responses of 423 or 481 are transient errors and the long-lived XMPP subscription should be maintained.
section: 4.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
