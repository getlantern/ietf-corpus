document: rfc-9819
kind: normative-requirement
summary: If the AL values in the Ethernet A-D per ES route and the Inclusive Multicast Ethernet Tag route are both non-zero but unequal, no usable ARG is available; BUM traffic MUST NOT be forwarded from that Ethernet Segment, and implementations SHOULD log an error. This prevents potential forwarding loops caused by the configuration error.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
