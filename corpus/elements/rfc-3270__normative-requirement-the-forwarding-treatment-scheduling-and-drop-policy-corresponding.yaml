document: rfc-3270
kind: normative-requirement
summary: The forwarding treatment (scheduling and drop policy) corresponding to the outgoing PHB MUST be applied by the LSR at the granularity of the Behavior Aggregate and MUST be compliant with the relevant PHB specification, regardless of whether bandwidth reservation is used.
