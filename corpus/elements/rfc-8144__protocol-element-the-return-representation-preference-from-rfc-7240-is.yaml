document: rfc-8144
kind: protocol-element
summary: The 'return=representation' preference from RFC 7240 is extended to apply to 412 (Precondition Failed) responses in addition to 2xx responses, enabling clients to retrieve the current resource state without a separate GET when a conditional update fails.
