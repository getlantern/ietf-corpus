document: rfc-4877
kind: normative-requirement
summary: Mobile IPv6 implementations MUST use the Alternate Care-of Address mobility option in Binding Updates sent by mobile nodes while away from home, in order to prevent tampering with the care-of address outside the ESP-protected region.
section: "4.3"
rfc2119_level: MUST
topics:
