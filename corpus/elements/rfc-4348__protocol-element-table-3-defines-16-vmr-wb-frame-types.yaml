summary: 'Table 3 defines 16 VMR-WB frame types (FT 0–15): FT 0–2 are AMR-WB interoperable rates (132, 177, 253 bits); FT 3–6 are native VMR-WB rates (266, 124, 54, 20 bits); FT 9 is CNG/SID (40 bits); FT 14 is Erasure and FT 15 is Blank (both 0 bits); others are reserved.'
