document: rfc-9882
kind: design-rationale
summary: 'Including signed attributes when using ML-DSA in hardware devices (HSMs, tokens) is recommended for performance: only the small signed-attributes set needs to be transmitted to the device rather than the full content. Alternatively, the internal ''μ'' message representative defined in FIPS 204 Section 6.2 may be computed externally and supplied to the device.'
section: "5"
topics:
