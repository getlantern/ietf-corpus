document: rfc-8530
kind: design-rationale
summary: 'An LNE is modeled as an independently managed virtual device analogous to a virtual machine guest: it has its own management interfaces, YANG models, and namespace, so multiple LNEs may each define a ''Tunnel0'' without conflict. This independence is expressed via the YANG Schema Mount ''root'' mount point rather than a flat namespace.'
section: "1"
topics:
