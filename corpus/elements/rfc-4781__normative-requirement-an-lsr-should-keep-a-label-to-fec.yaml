document: rfc-4781
kind: normative-requirement
summary: An LSR SHOULD keep a label-to-FEC binding value for as long as it has a route to the FEC. When creating a new <label, FEC> binding, the LSR SHOULD pick the least recently used label to minimize misrouting.
section: "6"
rfc2119_level: SHOULD
topics:
    - bgp
    - mpls
    - routing
