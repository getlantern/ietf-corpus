document: rfc-5397
kind: design-rationale
summary: The specification intentionally restricts DAV:current-user-principal to a single http(s) URL rather than providing a complete list of alternate URLs. The purpose is only to provide a bootstrap entry point; clients can then query that principal resource to discover additional URLs.
section: "1"
topics:
