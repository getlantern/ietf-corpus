document: rfc-4622
kind: normative-requirement
summary: If a processing application does not understand the query component or the specified query type, it MUST ignore the query component and treat the IRI/URI as if only the path component were present. Unknown keys within a query component MUST also be ignored.
section: "2.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
