document: rfc-5365
kind: design-rationale
summary: The MESSAGE URI-list service is designed for pager-mode instant messages to ad hoc groups, explicitly avoiding the overhead of establishing a session (e.g., via MSRP), which is considered unnecessary when a user simply wants to send a small one-time message to multiple recipients.
section: "1"
topics:
