document: rfc-8089
kind: interoperability-note
summary: 'The vertical line character "|" has historically appeared in place of ":" in drive letter constructs (e.g., "file:///c|/path/to/file"). RFC 3986 forbids this usage; to update such URIs, replace "|" with ":". Parsers needing to handle legacy URIs may use the extended drive-letter rule: drive-letter = ALPHA ":" / ALPHA "|".'
section: E.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
