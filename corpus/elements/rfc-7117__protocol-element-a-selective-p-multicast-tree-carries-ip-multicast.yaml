document: rfc-7117
kind: protocol-element
summary: A Selective P-multicast tree carries IP multicast traffic for one or more specific (C-S, C-G) streams only to PEs that have receivers for those streams, avoiding flooding uninvolved PEs. Selective trees MUST NOT be used for non-IP multicast traffic.
section: "3.1"
topics:
    - mpls
    - multicast
