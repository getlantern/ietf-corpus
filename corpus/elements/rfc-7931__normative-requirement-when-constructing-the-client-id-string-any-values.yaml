document: rfc-7931
kind: normative-requirement
summary: When constructing the client ID string, any values that may change over time (IP address, MAC address, etc.) SHOULD be captured as saved copies rather than re-derived dynamically, or the entire constructed string should be saved and reused, to prevent the id string from changing across SETCLIENTID invocations within the same client incarnation.
section: "5.9"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
