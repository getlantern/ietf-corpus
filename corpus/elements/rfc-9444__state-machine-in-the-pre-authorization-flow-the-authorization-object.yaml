document: rfc-9444
kind: state-machine
summary: In the pre-authorization flow, the authorization object starts in 'pending' state after creation. Once the ACME server validates the DNS challenge (or HTTP challenge), it transitions the authorization object and associated challenge object to 'valid' state. If validation is slow, the server may return 'processing' and the client must poll.
