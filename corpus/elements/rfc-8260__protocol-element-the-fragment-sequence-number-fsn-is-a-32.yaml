document: rfc-8260
kind: protocol-element
summary: The Fragment Sequence Number (FSN) is a 32-bit unsigned integer stored at the PPID field location when the B bit is not set. It enumerates fragments of a single user message starting from 0. When the B bit is set, the PPID occupies this field and FSN is implicitly 0. Serial number arithmetic (RFC 1982, SERIAL_BITS=32) applies.
section: "2.1"
topics:
    - sctp
    - webrtc
