document: rfc-6307
kind: normative-requirement
summary: If measured latency violates any of the three FC timing requirements, the FC PW PE MUST generate a WAN Down event as specified in FC-BB-5/AM1. PING and PING_ACK FC PW control frames SHOULD be used to measure current FC pseudowire latency.
section: "5"
rfc2119_level: MUST
topics:
