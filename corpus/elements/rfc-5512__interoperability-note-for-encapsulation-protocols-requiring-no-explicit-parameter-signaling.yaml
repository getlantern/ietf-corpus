document: rfc-5512
kind: interoperability-note
summary: For encapsulation protocols requiring no explicit parameter signaling (e.g., GRE without key), the BGP Encapsulation Extended Community can be attached to payload-prefix UPDATE messages to indicate the encapsulation protocol type, serving as a lightweight alternative to the full Encapsulation SAFI mechanism.
section: "4.5"
topics:
