document: rfc-3407
kind: design-rationale
summary: SDP conflates session parameters and capabilities without a clear distinction between the two. This document introduces a minimal, backwards-compatible capability declaration mechanism to address urgent needs of SIP and MGCP without waiting for the incompatible SDPng.
