document: rfc-8169
kind: normative-requirement
summary: A node with RTM-capable interfaces MUST be able to compute a TTL that causes expiry of an RTM packet at the next RTM-capable node downstream; this TTL-based hop-by-hop delivery is fundamental to the RTM data-plane mechanism.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
