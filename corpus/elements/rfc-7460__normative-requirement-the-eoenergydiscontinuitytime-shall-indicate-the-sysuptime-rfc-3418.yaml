document: rfc-7460
kind: normative-requirement
summary: The eoEnergyDiscontinuityTime SHALL indicate the sysUpTime (RFC 3418) when the device was last reset, to flag interruptions in continuous energy measurement totals. This enables NMS systems to detect and account for measurement gaps.
section: "5.6"
rfc2119_level: REQUIRED
topics:
    - snmp
