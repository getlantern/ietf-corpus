document: rfc-2533
kind: protocol-element
summary: Unit designations may be appended to numeric feature values (e.g., '72dpi') to indicate a non-standard unit of measurement. The feature tag registration (RFC 2506) specifies the standard unit and any permitted alternates with their designator tokens.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
