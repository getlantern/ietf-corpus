document: rfc-9636
kind: normative-requirement
summary: The utoff field MUST NOT be -2^31 (to allow 32-bit clients to negate without overflow) and SHOULD be in the range [-89999, 93599] seconds (more than -25 hours and less than 26 hours).
section: "3.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
