document: rfc-3241
kind: security-consideration
summary: Header compression can in rare cases cause misdelivery of packets; when packet confidentiality is required, encryption should be applied. IPsec encryption of IP headers precludes ROHC compression of those headers.
section: "6"
topics:
    - security
    - ip
    - ipsec
