document: rfc-9142
kind: normative-requirement
summary: The rsa1024-sha1 key exchange method MUST NOT be implemented. It uses an RSA 1024-bit modulus with SHA-1, providing only approximately 80 bits of security, which does not meet minimum requirements.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
