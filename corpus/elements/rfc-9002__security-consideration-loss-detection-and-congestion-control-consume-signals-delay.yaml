document: rfc-9002
kind: security-consideration
summary: Loss detection and congestion control consume signals — delay, loss, and ECN markings — from unauthenticated entities. An attacker can reduce endpoints' sending rates by dropping packets, strategically altering path delay, or changing ECN codepoints in transit.
