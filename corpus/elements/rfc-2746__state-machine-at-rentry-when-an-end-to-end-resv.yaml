document: rfc-2746
kind: state-machine
summary: 'At Rentry, when an end-to-end RESV arrives: if a NODE_CHAR T-bit is present on the first RESV, Rentry initiates session mapping based on PATH/RESV contents and local policy, either binding to a configured tunnel session, creating a new dynamic tunnel session with an adjusted Tspec, or denying the mapping entirely.'
