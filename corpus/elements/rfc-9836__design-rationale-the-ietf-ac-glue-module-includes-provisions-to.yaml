document: rfc-9836
kind: design-rationale
summary: The 'ietf-ac-glue' module includes provisions to reference ACs both within and outside a VPN network access entry. This accommodates deployment contexts where an AC reference may be created before or after a VPN instance is created, allowing flexible ordering of provisioning steps.
