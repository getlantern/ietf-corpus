document: rfc-8853
kind: protocol-element
summary: The order of listed simulcast streams in the 'send' direction suggests a proposed order of preference in decreasing order (leftmost = most preferred). In the 'recv' direction, leftmost is most preferred. This ordering guides simulcast stream selection when adaptation requires reducing the number of active streams.
