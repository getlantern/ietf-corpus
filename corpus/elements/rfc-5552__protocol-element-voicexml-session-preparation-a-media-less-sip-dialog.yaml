document: rfc-5552
kind: protocol-element
summary: 'VoiceXML Session Preparation: a media-less SIP dialog is established by sending an SDP with no media lines or by answering the server''s offer in the ACK with all media ports set to 0. The VoiceXML application does not execute until a re-INVITE establishes an active media session.'
section: "2.3"
topics:
