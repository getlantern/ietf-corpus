document: rfc-1697
kind: design-rationale
summary: The MIB is intentionally limited to broad, cross-product monitoring objects. The gap between this generic MIB and detailed management or performance monitoring is expected to be filled by vendor- and product-specific MIBs, locatable via PrivateMibOID objects.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
