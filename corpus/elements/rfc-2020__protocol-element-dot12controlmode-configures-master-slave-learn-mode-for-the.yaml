document: rfc-2020
kind: protocol-element
summary: dot12ControlMode configures master/slave/learn mode for the interface. Interfaces that cannot operate in master mode or use hardware pushbutton control may implement this as read-only. Modifying dot12ControlMode causes the interface to retrain.
