document: rfc-9051
kind: normative-requirement
summary: If a server has an inactivity autologout timer for post-authentication sessions, its duration MUST be at least 30 minutes. Receipt of any command from the client resets the timer. No minimum is specified for pre-authentication timers.
section: "5.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
