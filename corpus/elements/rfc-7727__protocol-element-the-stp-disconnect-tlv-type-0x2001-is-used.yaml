document: rfc-7727
kind: protocol-element
summary: The STP Disconnect TLV (Type=0x2001) is used in the RG Disconnect Message to indicate termination of the ICCP STP application connection. It may contain an optional STP Disconnect Cause Sub-TLV (Type=0x200C) carrying a variable-length UTF-8 encoded reason string.
section: "3.2"
