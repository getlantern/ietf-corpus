kind: interoperability-note
summary: 'QCD tokens interact with IKEv2 Session Resumption (RFC 5723): QCD addresses the failure-detection gap (liveness checks may not yet have started or completed), while session resumption reduces re-establishment cost after detection. A client conforming to both stores the QCD token and the session resumption ticket; the combined exchange flow is shown in Section 7.'
