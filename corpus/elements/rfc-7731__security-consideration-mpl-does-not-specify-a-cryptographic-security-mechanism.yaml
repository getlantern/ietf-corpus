document: rfc-7731
kind: security-consideration
summary: MPL does not specify a cryptographic security mechanism. LLNs should rely on link-layer security (e.g., IEEE 802.15.4 AES-128 frame security for access control, integrity, confidentiality, and replay protection). If the attack vector includes adversaries with LLN access, MPL SHOULD NOT be used.
section: "12"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
