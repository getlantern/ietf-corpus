document: rfc-8410
kind: wire-format
summary: Private keys for EdDSA, X25519, and X448 are encoded using the OneAsymmetricKey structure (RFC 5958). The private key byte sequence is wrapped in a CurvePrivateKey OCTET STRING, which is then wrapped in the privateKey OCTET STRING field. The optional publicKey field holds the encoded public key as a BIT STRING.
