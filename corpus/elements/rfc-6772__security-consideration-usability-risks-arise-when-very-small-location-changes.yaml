document: rfc-6772
kind: security-consideration
summary: Usability risks arise when very small location changes trigger significantly different disclosure levels. Location uncertainty may produce unexpected policy evaluation results. Software creating authorization policies should perform consistency checks, and XCAP's 409 conflict response with <constraint-failure> can communicate errors back to users.
section: "13.4"
topics:
    - privacy
    - security
