document: rfc-9866
kind: normative-requirement
summary: When becoming a Sentinel, a node MUST add itself to PositiveCFRC via merge(oldpc, self()). When switching from Sentinel to Acceptor in states UP or SUSPECTED DOWN, the node MUST add itself to NegativeCFRC using the same selfc value generated when it last added itself to PositiveCFRC; this accounts for the node no longer monitoring the root.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
