document: rfc-7731
kind: normative-requirement
summary: MPL Data Messages with an MPL Option in which the V flag is set to 1 MUST be dropped. The three high-order bits of the Option Type are set to '011' so that nodes not understanding the MPL Option MUST discard the MPL Data Message (per RFC 2460).
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
