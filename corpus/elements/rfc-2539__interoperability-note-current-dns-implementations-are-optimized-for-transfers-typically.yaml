document: rfc-2539
kind: interoperability-note
summary: Current DNS implementations are optimized for transfers typically under 512 bytes including overhead. Implementors should make reasonable efforts to minimize KEY RR set sizes consistent with adequate security, since a secure zone also returns an authenticating SIG RR alongside each KEY RR.
section: "3"
topics:
    - dns
