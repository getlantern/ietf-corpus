document: rfc-9458
kind: security-consideration
summary: Traffic analysis can be used to correlate messages on either side of a relay even when HTTPS is used. The time at which Encapsulated Requests and Responses are sent can reveal information to a network observer or a malicious relay. Padding (via binary HTTP) and delays can reduce effectiveness.
section: 6.2.3
topics:
    - security
    - privacy
    - http
