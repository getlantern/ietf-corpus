document: rfc-8812
kind: interoperability-note
summary: RSASSA-PKCS1-v1_5 algorithms (RS256, RS384, RS512) are already present in the IANA JOSE algorithms registry; RFC 8812 only adds registrations for the COSE Algorithms registry. This allows interoperability between WebAuthn/CTAP and both COSE and JOSE ecosystems.
