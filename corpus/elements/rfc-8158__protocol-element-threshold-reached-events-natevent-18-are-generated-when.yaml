document: rfc-8158
kind: protocol-element
summary: Threshold Reached events (natEvent=18) are generated when operator-configured thresholds are hit, giving operators a chance to act before traffic disruptions occur. The natThresholdEvent IE (IPFIX ID 467, unsigned32) identifies sub-types including address pool high/low threshold (1-2), address and port mapping high threshold (3), per-user address and port mapping high threshold (4), and global address mapping high threshold (5).
section: "4.5"
topics:
