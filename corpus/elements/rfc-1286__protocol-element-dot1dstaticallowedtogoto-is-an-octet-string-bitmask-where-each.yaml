document: rfc-1286
kind: protocol-element
summary: dot1dStaticAllowedToGoTo is an OCTET STRING bitmask where each bit represents one bridge port (first octet = ports 1–8, MSB = lowest port number). A bit value of 1 permits forwarding to that port; the bit for the receive port is irrelevant.
section: "5.6"
topics:
