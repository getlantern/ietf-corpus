document: rfc-3038
kind: normative-requirement
summary: For outband notification with small-sized field on point-to-multipoint VCs, the BLLI value used in ADD_PARTY must be the same value as that used to establish the first point-to-point VC of the tree, and the upstream root node determines this value.
