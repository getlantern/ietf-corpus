document: rfc-5592
kind: security-consideration
summary: The SSH Transport Model has no mechanism to verify that server authentication was performed or that the correct host public key is being used; it trusts that these are properly configured by the implementer and deployer. Skipping public-key verification leaves data protection of dubious value against a man-in-the-middle attacker.
section: "9.1"
topics:
    - snmp
    - security
    - crypto
