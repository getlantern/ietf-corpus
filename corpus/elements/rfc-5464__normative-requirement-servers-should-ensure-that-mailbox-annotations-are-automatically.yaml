document: rfc-5464
kind: normative-requirement
summary: Servers SHOULD ensure that mailbox annotations are automatically moved when a mailbox is renamed (annotations follow the mailbox). When INBOX is renamed, annotations are copied to the renamed mailbox so that INBOX retains its annotations.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
