document: rfc-2814
kind: interoperability-note
summary: SBM coexists with non-RSVP bandwidth allocation mechanisms (e.g., SNMP-based static configuration) only if reserved resources are either statically partitioned between the mechanisms or resolved through a common bandwidth allocator to prevent over-commitment of the same resource.
