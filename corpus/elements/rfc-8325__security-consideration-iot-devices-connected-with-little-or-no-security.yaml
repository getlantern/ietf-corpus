document: rfc-8325
kind: security-consideration
summary: IoT devices connected with little or no security capabilities can be leveraged for DDoS attacks amplified by QoS preferential treatment if their packet markings are trusted. It is generally NOT RECOMMENDED to pass through DSCP from unauthenticated or unauthorized devices.
section: "8.1"
topics:
    - security
    - qos
