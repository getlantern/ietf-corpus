document: rfc-2193
kind: security-consideration
summary: The IMAP4 referral mechanism inherits the security considerations of general internet URLs (RFC-1738) and IMAP URLs (RFC-2192). The MAILBOX-REFERRALS capability potentially makes it easier to write a rogue server that injects bogus referral responses directing users to incorrect mailboxes, though the referral response also makes detection of such intrusion easier.
section: "6"
topics:
    - email
    - security
