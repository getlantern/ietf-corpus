document: rfc-1381
kind: normative-requirement
summary: Support of the lapbFlowTable is mandatory for all agents of systems that implement LAPB. It is read-only and records state changes, busy defers, REJ/SREJ frames sent and received, T1 timeouts, and the most recent FRMR and XID frame information fields.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
