document: rfc-4469
kind: protocol-element
summary: The BADURL response code is returned in a tagged NO response when the APPEND fails to process one of the specified URLs. The response code contains the first failing URL as a parameter. Possible reasons include bad URL syntax, unrecognized URL schema, invalid message UID, or invalid body part.
section: "4.1"
topics:
