document: rfc-9607
kind: security-consideration
summary: Applications SHOULD use one or more appropriate strong security mechanisms as per RFC 7201. Since SCIP provides end-to-end encryption, SRTP is not required for payload protection, but is OPTIONAL for header/RTCP protection.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
    - crypto
