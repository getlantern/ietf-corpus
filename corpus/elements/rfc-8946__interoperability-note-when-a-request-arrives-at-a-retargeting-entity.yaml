document: rfc-8946
kind: interoperability-note
summary: When a request arrives at a retargeting entity carrying multiple non-"div" PASSporTs with different "orig" or "dest" values, the authentication service SHOULD generate one "div" PASSporT for each such non-"div" PASSporT, creating multiple chains in a single request.
section: "4.1"
topics:
    - sip
