summary: Packet protection keys are derived from TLS secrets using HKDF-Expand-Label with labels 'quic key' (AEAD key), 'quic iv' (IV, minimum of AEAD nonce length or 8 bytes), and 'quic hp' (header protection key). Key updates use label 'quic ku'.
