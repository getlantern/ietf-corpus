document: rfc-1521
kind: protocol-element
summary: Application/Octet-Stream is the primary subtype for uninterpreted binary data; the simplest recommended action on receipt is to offer to write the data to a file. Application/PostScript is defined for transporting PostScript documents but carries significant security concerns due to PostScript's programmability.
section: 7.4.1
topics:
    - email
    - security
