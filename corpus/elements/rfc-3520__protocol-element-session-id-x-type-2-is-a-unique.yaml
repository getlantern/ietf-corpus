document: rfc-3520
kind: protocol-element
summary: SESSION_ID (X-Type 2) is a unique identifier generated by the authorizing entity for replay detection or to correlate the reservation request with a policy decision; its format is implementation-dependent. The SubType field MUST be set to zero.
