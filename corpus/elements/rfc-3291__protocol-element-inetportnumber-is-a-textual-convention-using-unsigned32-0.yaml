document: rfc-3291
kind: protocol-element
summary: InetPortNumber is a textual convention using Unsigned32 (0..65535) to represent a 16-bit Internet transport-layer port number. Zero is object-specific and must be defined in the DESCRIPTION of any object using this syntax.
