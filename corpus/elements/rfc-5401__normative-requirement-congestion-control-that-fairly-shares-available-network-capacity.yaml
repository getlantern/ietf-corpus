document: rfc-5401
kind: normative-requirement
summary: Congestion control that fairly shares available network capacity with other reliable multicast and TCP instantiations is REQUIRED for general Internet operation. TFMCC or PGMCC techniques can be applied to NACK-based reliable multicast to meet this requirement.
section: "3.9"
rfc2119_level: REQUIRED
topics:
    - multicast
    - congestion
