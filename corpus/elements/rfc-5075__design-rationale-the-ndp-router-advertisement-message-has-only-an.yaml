document: rfc-5075
kind: design-rationale
summary: The NDP Router Advertisement message has only an 8-bit field for single-bit flags, and several protocols have already reserved flags, with others preparing to exhaust the remaining bits. This document defines an option that expands the available flag bits by adding 48 additional bits to NDP messages.
section: "1"
topics:
