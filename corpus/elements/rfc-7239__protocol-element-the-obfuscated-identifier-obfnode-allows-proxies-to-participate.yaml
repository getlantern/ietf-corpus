document: rfc-7239
kind: protocol-element
summary: The obfuscated identifier (obfnode) allows proxies to participate in tracing and debugging while concealing internal IP addresses. It MUST begin with a leading underscore "_" and consist only of ALPHA, DIGIT, ".", "_", and "-" characters.
section: "6.3"
topics:
    - http
    - privacy
