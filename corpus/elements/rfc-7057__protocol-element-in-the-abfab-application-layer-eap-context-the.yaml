document: rfc-7057
kind: protocol-element
summary: In the ABFAB application-layer EAP context, the authenticator is responsible for retransmission. The lower layer can either use a default unreliable mode (retransmission timer-driven) or set the retransmission timer to infinite, making the lower layer responsible for reliable delivery.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
