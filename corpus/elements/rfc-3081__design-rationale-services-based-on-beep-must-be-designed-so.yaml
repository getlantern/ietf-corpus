document: rfc-3081
kind: design-rationale
summary: Services based on BEEP must be designed so that simultaneous TCP OPENs cannot occur, because a simultaneous TCP OPEN would result in both peers believing they are the initiator and neither peer being able to start any channels.
section: "2"
