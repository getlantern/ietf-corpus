document: rfc-2925
kind: protocol-element
summary: 'pingCtlTrapGeneration is a BITS object with three flags: probeFailure(0) generates pingProbeFailed after N successive failures (controlled by pingCtlTrapProbeFailureFilter), testFailure(1) generates pingTestFailed when total probe failures exceed pingCtlTrapTestFailureFilter, and testCompletion(2) generates pingTestCompleted at test end.'
