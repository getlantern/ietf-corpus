document: rfc-4004
kind: protocol-element
summary: The Home-Agent-MIP-Request (HAR), Command-Code 262 with 'R' bit set, is sent by the AAAH to the Home Agent carrying the encapsulated Mobile IPv4 Registration Request and session keys. Mandatory AVPs include Authorization-Lifetime, Auth-Session-State, MIP-Reg-Request, User-Name, Destination-Realm, and MIP-Feature-Vector.
