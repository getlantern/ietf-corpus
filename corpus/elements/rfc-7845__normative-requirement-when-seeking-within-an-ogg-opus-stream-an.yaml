document: rfc-7845
kind: normative-requirement
summary: When seeking within an Ogg Opus stream, an implementation SHOULD start decoding and discarding output at least 3840 samples (80 ms) prior to the seek target to ensure correct audio at the target.
section: "4.6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
