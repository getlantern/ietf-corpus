document: rfc-2328
kind: state-machine
summary: The interface state machine defines states Down, Loopback, Waiting, Point-to-Point, DROther, BDR, and DR. Events include InterfaceUp, WaitTimer, BackupSeen, NeighborChange, LoopInd, UnloopInd, and InterfaceDown. DR/BDR election occurs during the Waiting state.
section: "9.1"
topics:
