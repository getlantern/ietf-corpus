document: rfc-9796
kind: security-consideration
summary: 'Inclusion of media directly, via Base64 encoding, or via remote URIs in RCD poses threat vectors: maliciously crafted documents could trigger parsing bugs or install malware, and remote URI access could expose user agent information. Sensitive users should be able to control or disable these mechanisms.'
section: "13"
topics:
