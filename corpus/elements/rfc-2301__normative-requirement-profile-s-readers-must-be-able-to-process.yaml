document: rfc-2301
kind: normative-requirement
summary: Profile S readers MUST be able to process files that do not include RTC sequences and SHOULD be able to process files that do include RTCs (which is allowed only when T4Options bit 2=0, indicating non-byte-aligned EOLs).
section: 3.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
