document: rfc-3339
kind: protocol-element
summary: The time-second field may have the value "60" only at the end of months containing a positive leap second (historically June 30 or December 31, encoded as XXXX-06-30T23:59:60Z or XXXX-12-31T23:59:60Z). For a negative leap second, the maximum value of time-second is "58".
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
