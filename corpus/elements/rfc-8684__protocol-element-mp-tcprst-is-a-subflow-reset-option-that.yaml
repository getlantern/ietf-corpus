document: rfc-8684
kind: protocol-element
summary: MP_TCPRST is a subflow reset option that carries a reason code explaining why the subflow was reset. It is carried on TCP RST segments and SHOULD be included whenever a subflow is closed with a RST due to an MPTCP-specific error.
section: "3.6"
topics:
    - multipath
    - tcp
