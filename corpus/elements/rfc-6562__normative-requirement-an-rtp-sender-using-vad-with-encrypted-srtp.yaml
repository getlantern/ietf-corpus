document: rfc-6562
kind: normative-requirement
summary: An RTP sender using VAD with encrypted SRTP audio SHOULD insert an unpredictable overhang period at the end of each talkspurt, delaying the start of the silence/comfort noise interval by a random amount to obscure the actual length of active speech intervals.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
