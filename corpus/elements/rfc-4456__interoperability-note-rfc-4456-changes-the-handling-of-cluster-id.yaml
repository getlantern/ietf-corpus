document: rfc-4456
kind: interoperability-note
summary: RFC 4456 changes the handling of CLUSTER_ID from appending to prepending relative to RFC 1966, to match deployed implementations. Implementations upgrading from RFC 1966 behavior must reverse the order of CLUSTER_ID insertion.
