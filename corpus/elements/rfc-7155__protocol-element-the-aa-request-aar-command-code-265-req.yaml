summary: The AA-Request (AAR, Command Code 265, REQ+PXY) is used to request authentication and/or authorization for a NAS user; it carries credentials (User-Password, CHAP-Auth), session info (NAS-Port, NAS-IP-Address), and authorization hints (Service-Type, Framed-Protocol).
