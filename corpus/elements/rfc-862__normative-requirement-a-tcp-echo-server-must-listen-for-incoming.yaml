document: rfc-862
kind: normative-requirement
summary: A TCP echo server MUST listen for incoming connections on TCP port 7. Once a connection is established, any data received MUST be sent back to the originating source.
section: TCP Based Echo Service
rfc2119_level: MUST
topics:
    - tcp
