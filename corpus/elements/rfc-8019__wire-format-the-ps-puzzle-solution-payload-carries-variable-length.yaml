document: rfc-8019
kind: wire-format
summary: The PS (Puzzle Solution) payload carries variable-length Puzzle Solution Data consisting of four equal-sized PRF keys. The key size equals (Payload Length - 4) / 4; for fixed-key PRFs the key size is that fixed size, otherwise 1 octet to preferred key length. Payload type is 54.
