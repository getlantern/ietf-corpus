document: rfc-4385
kind: normative-requirement
summary: PW packets carried over an MPLS PSN MUST NOT start with the value 4 (IPv4) or the value 6 (IPv6) in the first nibble, as those values indicate normal IP payloads and would cause incorrect processing by LSRs performing MPLS payload inspection.
section: "2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
