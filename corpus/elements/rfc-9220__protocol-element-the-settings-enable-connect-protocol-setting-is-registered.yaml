document: rfc-9220
kind: protocol-element
summary: The SETTINGS_ENABLE_CONNECT_PROTOCOL setting is registered for HTTP/3 with value 0x08 (decimal 8), identical to its HTTP/2 value. This setting is sent by a server to allow the client to use Extended CONNECT.
