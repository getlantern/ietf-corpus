document: rfc-8473
kind: protocol-element
summary: 'The Sec-Token-Binding HTTP request header field carries a base64url-encoded TokenBindingMessage. Its ABNF is: Sec-Token-Binding = EncodedTokenBindingMessage. It is defined for HTTP/1.1 and HTTP/2 and is only meaningful over HTTPS.'
