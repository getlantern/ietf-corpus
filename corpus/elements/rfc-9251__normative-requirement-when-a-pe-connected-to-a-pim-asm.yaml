document: rfc-9251
kind: normative-requirement
summary: When a PE connected to a PIM ASM network behind a multicast router needs to receive all multicast traffic in the EVPN domain, it MUST originate a (*,*) SMET route using the wildcard procedure from RFC 6625.
section: 9.1.3
rfc2119_level: MUST
topics:
    - multicast
    - routing
