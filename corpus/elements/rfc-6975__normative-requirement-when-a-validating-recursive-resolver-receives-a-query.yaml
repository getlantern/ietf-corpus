document: rfc-6975
kind: normative-requirement
summary: When a validating recursive resolver receives a query with DAU/DHU/N3U options set, it MUST set the algorithm list for outgoing iterative queries to the union of the stub client's list and the resolver's own list.
section: 4.2.1
rfc2119_level: MUST
topics:
