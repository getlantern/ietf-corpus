document: rfc-7759
kind: normative-requirement
summary: If the symmetric (S) flag is set, the Acceptable Min. Asynchronous RX interval MUST equal the TX interval. If the RX interval received from a peer is greater than the TX interval already proposed, the receiving edge LSR MUST adopt the RX interval value. If the Required Echo TX Interval is unsupported, an 'Unsupported BFD TX Echo rate interval' error MUST be generated.
section: 2.2.3
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
