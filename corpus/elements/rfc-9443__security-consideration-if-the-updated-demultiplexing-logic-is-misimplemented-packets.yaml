document: rfc-9443
kind: security-consideration
summary: If the updated demultiplexing logic is misimplemented, packets could be misclassified, exposing individual protocol handlers (STUN, DTLS, SRTP, QUIC) to input of the wrong type. This is an additional risk beyond those described in RFC 7983.
