document: rfc-9374
kind: security-consideration
summary: 'The DET collision risk within a single RAA/HDA domain: there is a 0.01% probability of collision at a population of 66 million and a 1% probability at 663 million. The DET registration process MUST reject collisions, forcing the UAS to generate a new HI and reapply, which also defeats adversarial collision generation.'
section: "9.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - registry
