document: rfc-5433
kind: wire-format
summary: 'Ciphersuites are encoded as 6-octet arrays: a 4-octet CSuite/Vendor field (0x00000000 for IETF-standardized, or SMI enterprise number for vendor-specific) followed by a 2-octet CSuite/Specifier. CSuite_List is a variable-length concatenation of 6-octet entries; its length MUST be a multiple of 6.'
section: "9.2"
topics:
    - security
