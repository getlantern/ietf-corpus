document: rfc-1327
kind: interoperability-note
summary: 'For compatibility with ISO''s string form of O/R Address, alternative keywords are recognized when mapping from RFC 822 to X.400 only (not generated going the other way): ADMD=A, PRMD=P, GQ=Q, X121=X.121, UA-ID=N-ID, PD-OFFICE-NUMBER=''PD-OFFICE NUMBER''. Keywords OU1/OU2/OU3/OU4 are also recognized as ordered OU values.'
