document: rfc-1570
kind: security-consideration
summary: 'Security issues related to Callback center on authentication: a peer agreeing to Callback SHOULD request the Authentication-Protocol Configuration Option so that user information from authentication can be used to determine or restrict callback locations and billing. Mutual authentication SHOULD also be requested when the link is called back.'
section: "2.3"
topics:
    - security
