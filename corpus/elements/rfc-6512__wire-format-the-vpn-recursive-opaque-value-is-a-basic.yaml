document: rfc-6512
kind: wire-format
summary: The VPN-Recursive Opaque Value is a basic type identified by Type=8 (1-octet), followed by a 2-octet Length field, an 8-octet Route Distinguisher (RD), and a P2MP or MP2MP FEC element. The total length includes the 8 octets of RD plus the type, length, and value fields of the embedded FEC element.
section: "3.1"
topics:
