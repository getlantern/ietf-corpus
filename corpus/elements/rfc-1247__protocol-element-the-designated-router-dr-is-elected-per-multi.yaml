document: rfc-1247
kind: protocol-element
summary: The Designated Router (DR) is elected per multi-access network by the Hello Protocol using configurable per-interface Router Priority. The DR originates a network links advertisement and becomes adjacent to all other attached routers, centralizing database synchronization.
section: "7.3"
