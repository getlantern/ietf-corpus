document: rfc-2725
kind: normative-requirement
summary: The mnt-by attribute is mandatory in all objects. A missing mnt-by attribute is interpreted as the absence of any control over changes, which is highly inadvisable, and most repositories will no longer allow this.
section: "9.1"
rfc2119_level: REQUIRED
