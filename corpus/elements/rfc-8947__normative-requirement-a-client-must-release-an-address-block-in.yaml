document: rfc-8947
kind: normative-requirement
summary: A client MUST release an address block in its entirety; partial release of a block is not permitted. If the released address is the one the client is currently using, it MUST stop using it before sending the Release message.
section: "10"
rfc2119_level: MUST
topics:
    - ip
