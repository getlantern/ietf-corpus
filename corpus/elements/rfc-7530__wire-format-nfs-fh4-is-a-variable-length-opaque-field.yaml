document: rfc-7530
kind: wire-format
summary: nfs_fh4 is a variable-length opaque field bounded by NFS4_FHSIZE, representing the per-server unique file system object identifier. The clientaddr4 structure (r_netid and r_addr strings per RFC 5665) carries network addresses for callback registration in SETCLIENTID.
section: "2.1"
