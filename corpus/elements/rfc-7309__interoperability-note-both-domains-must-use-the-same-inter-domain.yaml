document: rfc-7309
kind: interoperability-note
summary: Both domains must use the same inter-domain redundancy use case (two-PW per Section 5.2 or four-PW per Section 5.3), and all modes and options must be provisioned identically within each RG and between RGs. Inconsistent provisioning may cause the redundancy mechanism to malfunction.
