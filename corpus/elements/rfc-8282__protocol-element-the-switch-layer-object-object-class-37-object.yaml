document: rfc-8282
kind: protocol-element
summary: The SWITCH-LAYER object (Object-Class 37, Object-Type 1) is optional on PCReq messages and specifies switching layers (as switching type and encoding type per RFC 3471) in which a path MUST or MUST NOT be established. Each row contains LSP Encoding Type (8 bits), Switching Type (8 bits), Reserved, and an I flag (1 bit).
section: "3.2"
topics:
    - routing
    - mpls
