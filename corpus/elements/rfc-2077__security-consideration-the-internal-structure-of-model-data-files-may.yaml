document: rfc-2077
kind: security-consideration
summary: The internal structure of model data files may direct agents to access additional data from the network (inclusions); the security limits of those inclusions are not predefined. Actions based on network inclusions are governed by the security definitions of the inclusions themselves. Subtype-specific security considerations are deferred to individual subtype registrations.
section: "5"
topics:
    - security
