document: rfc-4454
kind: design-rationale
summary: Cell concatenation in ATM Cell Relay Mode improves pseudowire bandwidth efficiency by reducing per-cell overhead, but introduces latency and delay variation. The maximum concatenated cells value is negotiated per-direction via the ATM Maximum Concatenated Cells AVP to allow asymmetric limits.
section: "9.2"
topics:
