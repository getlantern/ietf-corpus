document: rfc-3433
kind: normative-requirement
summary: For sensor types voltsAC, voltsDC, amperes, watts, hertz, celsius, or cmm, an EntitySensorValue object MUST contain a fixed-point number ranging from -999,999,999 to +999,999,999; -1000000000 indicates underflow and +1000000000 indicates overflow.
section: "4"
rfc2119_level: MUST
topics:
