document: rfc-3297
kind: protocol-element
summary: The Content-alternative MIME header is attached to a MIME body part to indicate availability of an alternative form of that data. Its value is an Alternative-feature-expression (same syntax as the RFC 2533 Filter), and multiple such headers may appear on a single body part.
