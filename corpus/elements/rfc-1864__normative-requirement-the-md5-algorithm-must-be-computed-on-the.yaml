document: rfc-1864
kind: normative-requirement
summary: The MD5 algorithm MUST be computed on the canonical form of the MIME entity's object, after conversion to canonical form but before applying any content-transfer-encoding. The receiver also applies MD5 after undoing content-transfer-encoding.
section: "2"
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
