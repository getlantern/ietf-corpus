document: rfc-7873
kind: normative-requirement
summary: If the COOKIE option is shorter than 8 bytes, longer than 8 but shorter than 16, or longer than 40 bytes, the server MUST respond with FORMERR. Valid cookie option lengths are exactly 8 or in the range 16–40 inclusive.
section: 5.2.2
rfc2119_level: MUST
topics:
    - dns
    - security
