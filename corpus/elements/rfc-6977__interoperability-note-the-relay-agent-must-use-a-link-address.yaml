document: rfc-6977
kind: interoperability-note
summary: The relay agent MUST use a link-address value in the Link Address Option equivalent to the value used when relaying messages from the client to the server. To defend against poor implementations, the relay SHOULD use the exact same value previously sent to the server.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
