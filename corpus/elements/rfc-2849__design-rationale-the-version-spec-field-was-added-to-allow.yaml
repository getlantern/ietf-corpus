document: rfc-2849
kind: design-rationale
summary: The version-spec field was added to allow distinction between the current LDIF format and the older University of Michigan ldap-3.3 format. If absent, implementations MAY interpret the file as the older format for backward compatibility.
section: Notes on LDIF Syntax
topics:
