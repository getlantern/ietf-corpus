document: rfc-6876
kind: normative-requirement
summary: Implementations of PT-TLS MUST at least support the TLS_RSA_WITH_AES_128_CBC_SHA cipher suite. Implementations SHOULD NOT include anonymous Diffie-Hellman cipher suites (e.g., TLS_DH_anon_WITH_AES_128_CBC_SHA) that provide no server authentication. Implementations MUST support RFC 5746 (TLS renegotiation indication).
section: 3.4.3
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
