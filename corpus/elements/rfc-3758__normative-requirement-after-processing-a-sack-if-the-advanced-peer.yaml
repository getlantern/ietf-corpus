document: rfc-3758
kind: normative-requirement
summary: After processing a SACK, if the Advanced.Peer.Ack.Point is greater than the Cumulative TSN ACK in the SACK, the sender MUST send the receiver a FORWARD TSN chunk containing the latest Advanced.Peer.Ack.Point value.
section: "3.5"
rfc2119_level: MUST
topics:
    - sctp
