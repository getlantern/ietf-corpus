document: rfc-2608
kind: normative-requirement
summary: If a SLP message does not fit into a UDP datagram it MUST be truncated to fit, and the OVERFLOW flag is set in the reply message. The reserved listening port for SLP is 427 and the default maximum UDP MTU is 1400 bytes excluding headers.
section: "6.1"
rfc2119_level: MUST
topics:
    - ldap
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
