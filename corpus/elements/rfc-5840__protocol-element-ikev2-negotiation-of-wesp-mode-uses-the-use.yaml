document: rfc-5840
kind: protocol-element
summary: IKEv2 negotiation of WESP mode uses the USE_WESP_MODE notification (value 16415). It MUST be included in a request containing an SA payload for a CHILD_SA using ESP. If accepted, the response MUST also include USE_WESP_MODE; if declined, the CHILD_SA uses standard ESP per RFC 4303.
section: "2.3"
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
