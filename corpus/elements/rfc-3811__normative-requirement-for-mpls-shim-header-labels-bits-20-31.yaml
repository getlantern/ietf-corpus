kind: normative-requirement
summary: 'For MPLS shim header labels, bits 20-31 MUST be zero. Reserved label values are: 0 (IPv4 Explicit NULL), 1 (Router Alert), 2 (IPv6 Explicit NULL), 3 (Implicit NULL), and 4-15 are reserved.'
