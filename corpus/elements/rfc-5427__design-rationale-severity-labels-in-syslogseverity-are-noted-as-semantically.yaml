document: rfc-5427
kind: design-rationale
summary: Severity labels in SyslogSeverity are noted as semantically meaningless because the criteria for each level are and have historically been implementation-dependent. Originators, relays, and collectors must be configured to handle varying severity interpretations across implementations.
section: "3"
