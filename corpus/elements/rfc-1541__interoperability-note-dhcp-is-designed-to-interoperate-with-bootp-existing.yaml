document: rfc-1541
kind: interoperability-note
summary: 'DHCP is designed to interoperate with BOOTP: existing BOOTP clients can use DHCP servers without modification. DHCP/BOOTP relay agents forward messages transparently. A separate RFC details interactions between BOOTP and DHCP clients and servers.'
