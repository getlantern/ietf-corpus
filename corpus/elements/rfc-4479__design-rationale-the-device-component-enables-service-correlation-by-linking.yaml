document: rfc-4479
kind: design-rationale
summary: 'The device component enables service correlation: by linking services to a shared device ID, a presence server can infer the availability of one service from the state of another service or the device itself (e.g., inferring device non-idleness from an active VoIP call reported by a co-located IM application).'
