document: rfc-5613
kind: normative-requirement
summary: The LLS block MAY be attached only to OSPF Hello and Database Description (DD) packets. It MUST NOT be attached to any other OSPF packet types on generation and MUST be ignored on reception if present on other packet types.
section: "2"
rfc2119_level: MAY
topics:
    - routing
