document: rfc-9224
kind: protocol-element
summary: The RDAP Bootstrap Service Registry is a JSON object containing 'version', 'publication' (RFC 3339 timestamp), optional 'description', and a 'services' member. The services member is an array of two-element arrays, each pairing an Entry Array (registry keys) with a Service URL Array (base RDAP URLs).
