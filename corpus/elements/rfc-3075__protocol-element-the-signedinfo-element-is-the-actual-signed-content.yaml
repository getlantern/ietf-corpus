document: rfc-3075
kind: protocol-element
summary: The SignedInfo element is the actual signed content; it contains a required CanonicalizationMethod, a required SignatureMethod, and one or more Reference elements. The SignatureValue is computed over the canonicalized form of SignedInfo, not over the raw XML bytes.
