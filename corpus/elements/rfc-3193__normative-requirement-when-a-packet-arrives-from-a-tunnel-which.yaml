document: rfc-3193
kind: normative-requirement
summary: When a packet arrives from a tunnel which requires security, L2TP MUST check that the packet was decrypted and/or authenticated by IPsec, and MUST verify that the IP addresses and UDP port values match the socket information used to setup the L2TP tunnel.
section: "3.3"
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
    - security
