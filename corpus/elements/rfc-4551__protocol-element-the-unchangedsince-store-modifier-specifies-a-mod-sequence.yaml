document: rfc-4551
kind: protocol-element
summary: The UNCHANGEDSINCE STORE modifier specifies a mod-sequence threshold. For each message in the set, the requested flag operation is performed only if the message's mod-sequence is equal to or less than the specified value; if any metadata item's mod-sequence exceeds the threshold, the operation MUST NOT be performed for that message.
section: "3.2"
topics:
    - email
