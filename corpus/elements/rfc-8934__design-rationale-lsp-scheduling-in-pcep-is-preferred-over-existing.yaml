document: rfc-8934
kind: design-rationale
summary: LSP scheduling in PCEP is preferred over existing NMS-based path pre-establishment because traditionally established paths reserve resources indefinitely, preventing other services from using bandwidth when the service is idle. Centralized scheduling in PCEP enables resources to be used by other services when not needed, improving network resource utilization efficiency.
section: "1"
topics:
