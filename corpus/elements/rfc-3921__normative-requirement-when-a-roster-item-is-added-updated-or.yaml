document: rfc-3921
kind: normative-requirement
summary: When a roster item is added, updated, or deleted, the server MUST update roster information in persistent storage and MUST push the change (a roster 'set' IQ) to all of the user's available resources that have requested the roster.
section: "7.4"
rfc2119_level: MUST
