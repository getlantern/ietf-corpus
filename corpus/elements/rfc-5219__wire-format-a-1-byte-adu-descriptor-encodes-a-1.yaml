document: rfc-5219
kind: wire-format
summary: A 1-byte ADU descriptor encodes a 1-bit Continuation flag (C), a 1-bit Descriptor Type flag (T=0), and a 6-bit ADU size field. A 2-byte ADU descriptor encodes C, T=1, and a 14-bit ADU size field; the 2-byte form is used for ADU frames of 64 bytes or more.
section: "4.2"
topics:
