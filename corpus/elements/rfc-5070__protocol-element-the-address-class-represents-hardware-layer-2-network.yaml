document: rfc-5070
kind: protocol-element
summary: The Address class represents hardware (layer-2), network (layer-3), or application (layer-7) addresses. The 'category' attribute supports asn, atm, e-mail, ipv4-addr, ipv4-net, ipv4-net-mask, ipv6-addr, ipv6-net, ipv6-net-mask, and mac, with a default of 'ipv4-addr'. Optional vlan-name and vlan-num attributes allow VLAN identification.
section: 3.16.2
topics:
