document: rfc-8143
kind: protocol-element
summary: The STARTTLS capability label in NNTP signals server support for upgrading a plaintext connection to TLS. Clients should attempt STARTTLS even when this label is absent, and be warned when it disappears after having been previously advertised.
section: "3.4"
topics:
