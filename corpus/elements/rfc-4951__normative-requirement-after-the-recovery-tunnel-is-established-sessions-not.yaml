document: rfc-4951
kind: normative-requirement
summary: After the recovery tunnel is established, sessions not in an established state MUST be silently cleared (without sending CDN) by each endpoint. An FSQ message MUST include at least one FSS AVP. Before session synchronization completes, if an endpoint receives an ICRQ for an already-established session, it MUST respond with a CDN.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
