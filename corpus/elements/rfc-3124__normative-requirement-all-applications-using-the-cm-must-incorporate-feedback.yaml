document: rfc-3124
kind: normative-requirement
summary: All applications using the CM MUST incorporate feedback from the receiver, typically once or twice per RTT, and MUST use cm_update() to inform the CM of the resulting congestion information.
section: "5.1"
rfc2119_level: MUST
topics:
