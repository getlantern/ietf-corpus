document: rfc-8370
kind: normative-requirement
summary: Any node setting the I-bit in its CAPABILITY object MUST also set the Refresh-Reduction-Capable bit in the common header of all RSVP-TE messages. If a peer sets the I-bit but not the Refresh-Reduction-Capable bit, RI-RSVP functionality MUST NOT be activated for that peer.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
