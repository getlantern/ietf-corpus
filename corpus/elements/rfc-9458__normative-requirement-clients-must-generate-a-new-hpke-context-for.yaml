document: rfc-9458
kind: normative-requirement
summary: Clients MUST generate a new HPKE context for every request, using a good source of entropy for generating keys. Key reuse risks linking requests and could expose request and response contents to the relay.
section: "6.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - privacy
