document: rfc-7694
kind: security-consideration
summary: This specification does not introduce new security considerations beyond those in HTTP/1.1 (RFC 7231 Section 9) and HTTP/2 (RFC 7540 Section 10). However, improved discoverability may increase use of compression codings over secure channels, which can enable side-channel attacks such as BREACH; at publication time it was unclear how BREACH-like attacks apply to request compression.
section: "6"
topics:
    - http
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
