document: rfc-3896
kind: security-consideration
summary: The dsx3LineStatusChangeTrapEnable object defaults to disabled(2). Enabling traps exposes operational state to SNMP notification receivers; operators should ensure trap destinations are authorized. The MIB relies on SNMPv2 security infrastructure for authentication and access control.
section: "8"
topics:
    - snmp
    - security
