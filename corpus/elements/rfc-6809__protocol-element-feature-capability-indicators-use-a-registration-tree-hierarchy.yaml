document: rfc-6809
kind: protocol-element
summary: Feature-capability indicators use a registration tree hierarchy distinguished by a leading facet prefix (e.g., 'g.' for the global tree, 'sip.' for the SIP tree). A dot-separated naming scheme allows sub-feature hierarchies (e.g., 'tree.feature.subfeature'). No leading '+' is used in IANA registrations.
section: "5.2"
topics:
