document: rfc-5420
kind: normative-requirement
summary: An LSR that does not recognize a TLV type code in the LSP_REQUIRED_ATTRIBUTES object MUST reject the Path message with a PathErr using Error Code 29 ('Unknown Attributes TLV') and Error Value set to the unknown TLV type code.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
