document: rfc-1990
kind: wire-format
summary: The short sequence number fragment format uses the same PPP protocol identifier 0x00-0x3d but with a 2-byte MP header containing a B bit, E bit, 2 reserved bits (MUST be zero), and a 12-bit sequence number. This format must be negotiated via the Short Sequence Number Header Format LCP option before it may be used.
section: "3"
extracted_by: claude-sonnet-4-6
