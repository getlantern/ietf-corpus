document: rfc-8143
kind: interoperability-note
summary: When an NNTP server receives a Netnews article and has verified the identity of the client or peer server, it MAY add a <diag-match> ('!!' in the Path header field per RFC 5536 Section 3.1.5) to signal authenticated receipt.
section: "3.5"
topics:
