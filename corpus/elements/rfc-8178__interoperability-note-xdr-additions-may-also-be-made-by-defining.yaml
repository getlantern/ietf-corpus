document: rfc-8178
kind: interoperability-note
summary: XDR additions may also be made by defining XDR structures that overlay nominally opaque fields defined to allow incremental extension, such as pNFS mapping types overlaying opaque arrays defined in RFC 5661. These additions may be made outside the formal extension framework as long as they obey the rules established when the opaque elements were first added.
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
