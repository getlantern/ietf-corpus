document: rfc-6558
kind: normative-requirement
summary: If a 'convert' action cannot be completed — because the conversion failed or is not available — it MUST terminate and leave the message unchanged, rolling back any other conversions done by that action. No partial conversions from a single 'convert' action are allowed.
section: "2"
rfc2119_level: MUST
topics:
    - email
