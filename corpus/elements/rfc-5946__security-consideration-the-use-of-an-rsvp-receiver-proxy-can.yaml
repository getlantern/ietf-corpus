document: rfc-5946
kind: security-consideration
summary: The use of an RSVP Receiver Proxy can actually reduce security risks in environments where receivers are in physically unsecured locations. The operator can place filters at the network edge to discard any RSVP messages received from end-users, completely excluding untrusted receivers from the reservation and admission control operation.
