document: rfc-9492
kind: normative-requirement
summary: So long as there is any legacy router in the network that has any of the standard applications enabled, all routers MUST continue to advertise link attributes for these applications using only legacy advertisements. ASLA advertisements for these applications MUST NOT be sent.
section: 12.3.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
