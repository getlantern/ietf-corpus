document: rfc-8917
kind: interoperability-note
summary: In the absence of any NAPTR records containing the 'LoST-Validation' service tag, the 'LoST' service tag is used. Clients may also fall back to 'LoST' if 'LoST-Validation' fails to resolve to a usable LoST server.
