document: rfc-3297
kind: normative-requirement
summary: A system capable of performing content negotiation MUST have an option for its user to disable negotiation responses, either generally, on a per-message basis, or both, respecting privacy concerns about automatic MDN generation.
section: "6.5"
rfc2119_level: MUST
topics:
