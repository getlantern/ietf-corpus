document: rfc-1035
kind: security-consideration
summary: IN-ADDR.ARPA reverse-DNS data and the forward DNS zone for the same host reside in different zones, so inconsistency between them is possible. Additionally, gateway routing table initialization using DNS requires pre-configured bootstrap name server addresses to avoid a chicken-and-egg dependency.
section: "3.5"
topics:
    - dns
    - security
