document: rfc-7352
kind: normative-requirement
summary: The 'duplicate' test MUST only check for duplicates among unique ID values from previous Sieve script executions; it MUST NOT treat ID values encountered earlier in the current execution as potential duplicates. All 'duplicate' tests within one execution with identical arguments MUST always yield the same result.
section: "3"
rfc2119_level: MUST
topics:
    - email
