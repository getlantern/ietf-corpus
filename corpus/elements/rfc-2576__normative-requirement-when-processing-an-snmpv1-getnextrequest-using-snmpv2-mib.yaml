document: rfc-2576
kind: normative-requirement
summary: When processing an SNMPv1 GetNextRequest using SNMPv2 MIB access, any Counter64 variable bindings SHALL be treated as not-in-view and MIB data accessed repeatedly until a non-Counter64 value or an error is returned.
section: 4.1.2.4
rfc2119_level: MUST
topics:
    - snmp
