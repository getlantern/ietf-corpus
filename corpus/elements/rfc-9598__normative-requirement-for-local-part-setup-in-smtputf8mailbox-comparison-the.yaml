document: rfc-9598
kind: normative-requirement
summary: For Local-part setup in SmtpUTF8Mailbox comparison, the Local-part MUST be verified to conform to RFC 6530 and RFC 6531 in UTF-8 form. The Local-part MUST NOT be transformed in any way, such as by doing case folding or normalization of any kind.
section: "5"
rfc2119_level: MUST NOT
