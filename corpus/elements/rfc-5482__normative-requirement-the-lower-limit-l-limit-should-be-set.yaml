document: rfc-5482
kind: normative-requirement
summary: The lower limit L_LIMIT SHOULD be set to at least 100 seconds (consistent with RFC 1122's recommendation) and MUST be larger than the current retransmission timeout (RTO) to avoid unnecessarily aborting connections.
section: "3.1"
rfc2119_level: MUST
