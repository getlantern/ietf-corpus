document: rfc-8994
kind: interoperability-note
summary: The ACP uses only IPv6 to avoid dual-stack complexity, but can be integrated into otherwise IPv4-only networks without changing the data plane. IPv6 is additional implementation footprint required solely for ACP. Support for constrained devices is opportunistic but incomplete because GRASP reliable transport specifies only TCP/TLS, which is not suitable for the most constrained environments.
section: "1.1"
topics:
