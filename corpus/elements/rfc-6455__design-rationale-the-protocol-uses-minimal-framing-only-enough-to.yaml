document: rfc-6455
kind: design-rationale
summary: The protocol uses minimal framing — only enough to distinguish text from binary frames and to support fragmentation — because metadata is expected to be layered by the application (as HTTP layers on TCP). The design goal was to be as close to raw TCP as is safe given web infrastructure constraints.
section: "1.5"
topics:
