document: rfc-4342
kind: normative-requirement
summary: Loss Intervals options MUST contain information about at least the most recent NINTERVAL+1 = 9 loss intervals unless fewer have occurred or the sender's acknowledgements confirm prior intervals were received. The receiver MUST transmit at least one loss interval regardless.
section: 8.6.1
rfc2119_level: MUST
topics:
    - congestion
