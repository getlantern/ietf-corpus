document: rfc-4616
kind: normative-requirement
summary: Regardless of the preparation algorithm used, if the output of a non-invertible function (e.g., hash) of the expected string is stored, the string MUST be prepared before input to that function.
section: "2"
rfc2119_level: MUST
topics:
