document: rfc-9131
kind: security-consideration
summary: Sending gratuitous NAs to ff02::2 may reveal a host's IPv6 addresses to on-link attackers. However, DAD already discloses this information to all nodes (when MLD snooping is absent). MLD snooping on link-layer devices can mitigate this exposure.
section: "10"
topics:
    - security
    - privacy
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
