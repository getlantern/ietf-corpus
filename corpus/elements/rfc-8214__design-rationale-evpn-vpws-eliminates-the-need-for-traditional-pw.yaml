document: rfc-8214
kind: design-rationale
summary: EVPN-VPWS eliminates the need for traditional PW signaling (LDP-based per RFC 4448) by using BGP to perform service endpoint discovery and label signaling concurrently, and additionally enables All-Active redundancy with flow-based load-balancing, which was not possible with PW-based VPWS.
