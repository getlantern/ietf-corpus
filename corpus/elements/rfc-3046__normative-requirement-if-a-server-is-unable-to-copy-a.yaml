document: rfc-3046
kind: normative-requirement
summary: If a server is unable to copy a full Relay Agent Information field into a response, it SHALL send the response without the Relay Agent Information field and SHOULD increment an error counter.
section: "2.2"
rfc2119_level: SHALL
