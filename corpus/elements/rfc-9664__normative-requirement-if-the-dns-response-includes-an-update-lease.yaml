document: rfc-9664
kind: normative-requirement
summary: If the DNS Response includes an Update Lease option, the Requester MUST use the durations returned in that option when determining when to send Refresh Requests, regardless of whether those durations are shorter or longer than requested.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
