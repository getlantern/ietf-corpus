document: rfc-6320
kind: wire-format
summary: 'ANCP messages transported over TCP MUST be prepended with a 4-byte encapsulating header: a 16-bit Identifier field (MUST be set to 0x880C) and a 16-bit Length field giving the total byte length of the ANCP message, excluding the 4-byte header itself.'
section: "3.2"
topics:
    - tcp
