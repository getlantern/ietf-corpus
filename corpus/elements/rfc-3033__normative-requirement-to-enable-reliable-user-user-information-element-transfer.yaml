document: rfc-3033
kind: normative-requirement
summary: To enable reliable User-user information element transfer, when the calling party sends a SETUP or ADD PARTY message with a User-user IE, the CONNECT or ADD PARTY ACK returned by the called party must contain a User-user IE.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ip
