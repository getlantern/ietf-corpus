document: rfc-6016
kind: normative-requirement
summary: A PE SHOULD NOT discard or modify RSVP messages received from a CE or destined for a CE when RSVP is not enabled on the PE-CE links; such messages should be forwarded transparently as regular IP datagrams.
section: "6"
rfc2119_level: SHOULD NOT
