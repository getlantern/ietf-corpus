document: rfc-9145
kind: protocol-element
summary: 'A single secret key K is split into two secondary keys: MAC_KEY (the initial MAC_KEY_LEN octets of K), used with HMAC for integrity protection of NSH data including unencrypted context headers and the inner packet; and ENC_KEY (the final ENC_KEY_LEN octets of K), used as the symmetric AEAD encryption key for Context Headers.'
section: "4.2"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
