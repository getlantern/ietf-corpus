summary: 'SIP status codes are grouped into six classes: 1xx Informational (progress, non-terminal), 2xx Success, 3xx Redirection, 4xx Client Error, 5xx Server Error, and 6xx Global Failure. All 2xx–6xx responses are final and terminate a SIP transaction.'
