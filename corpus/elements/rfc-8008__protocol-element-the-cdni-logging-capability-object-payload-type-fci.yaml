document: rfc-8008
kind: protocol-element
summary: 'The CDNI Logging Capability Object (Payload Type: FCI.Logging) has a mandatory ''record-type'' property (string from the CDNI Logging record-types registry) and an optional ''fields'' property (list of strings from the CDNI Logging Field Names registry) indicating which optional fields for that record-type are supported.'
