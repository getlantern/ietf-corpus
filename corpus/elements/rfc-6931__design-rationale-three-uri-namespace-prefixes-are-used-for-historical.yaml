document: rfc-6931
kind: design-rationale
summary: 'Three URI namespace prefixes are used for historical reasons: ''http://www.w3.org/2000/09/xmldsig#'' for original XMLDSIG algorithms, ''http://www.w3.org/2001/04/xmldsig-more#'' for algorithms added by RFC 4051 (now frozen), and ''http://www.w3.org/2007/05/xmldsig-more#'' for algorithms newly added by this document. The 2001 namespace was frozen with RFC 4051''s publication per W3C namespace stability rules.'
section: "2"
topics:
