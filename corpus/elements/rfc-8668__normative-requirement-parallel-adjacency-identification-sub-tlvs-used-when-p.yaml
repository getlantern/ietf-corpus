document: rfc-8668
kind: normative-requirement
summary: Parallel-adjacency identification sub-TLVs (used when P-Flag is set) MAY be omitted if no parallel adjacencies to the neighbor exist. Only one of the three allowed sub-TLVs may be used at a time to uniquely identify the L3 adjacency.
section: "3.1"
rfc2119_level: MAY
topics:
    - routing
