document: rfc-3711
kind: interoperability-note
summary: When computing the RTCP variable avg_rtcp_size at initialization and update time, implementations MUST include the sizes of the SRTCP-added fields (index, E-bit, authentication tag, and optional MKI) to prevent SRTCP from exceeding its allotted bandwidth share.
section: "3.4"
topics:
    - realtime
    - rtp
