document: rfc-8831
kind: design-rationale
summary: 'The SCTP-over-DTLS-over-UDP stack was chosen over alternatives (e.g., DTLS over SCTP per RFC 6083) for three reasons: it supports arbitrarily large user messages, it shares the DTLS connection with SRTP media channels of the PeerConnection, and it provides privacy for SCTP control information.'
