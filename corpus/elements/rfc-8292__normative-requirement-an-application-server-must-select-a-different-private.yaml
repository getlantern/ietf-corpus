document: rfc-8292
kind: normative-requirement
summary: An application server MUST select a different private key for key exchange (RFC 8291) and for signing the authentication token; a push service SHOULD reject push messages where these keys are identical with a 400 (Bad Request).
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
