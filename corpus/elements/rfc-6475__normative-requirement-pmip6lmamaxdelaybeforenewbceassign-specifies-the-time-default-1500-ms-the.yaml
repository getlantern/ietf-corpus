document: rfc-6475
kind: normative-requirement
summary: pmip6LmaMaxDelayBeforeNewBCEAssign specifies the time (default 1500 ms) the LMA MUST wait for a de-registration from an existing session before creating a new mobility session; this value has a dependency on the PBU retransmission algorithm timing.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - snmp
