document: rfc-7712
kind: interoperability-note
summary: After establishing DNA in one direction, S2S peers can use SASL EXTERNAL with a valid client certificate to achieve mutual authentication and establish DNA in both directions on the same connection. If this succeeds, no Server Dialback or second connection is needed for the reverse direction.
section: "4.1"
topics:
    - tls
    - pkix
    - security
