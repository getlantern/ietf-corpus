document: rfc-3417
kind: normative-requirement
summary: When an SNMP entity uses the UDP over IPv4 transport mapping, it must be capable of accepting messages up to and including 484 octets in size. It is recommended that implementations accept messages up to 1472 octets.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
