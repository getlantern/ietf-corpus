document: rfc-5807
kind: security-consideration
summary: When the EP resides on a separate device from the PAA, the PEMK distribution protocol must provide encryption, integrity protection, and replay protection. The PAA-EP security association must be cryptographically bound to identities known to the PaC to prevent man-in-the-middle attacks.
section: "4.2"
topics:
    - security
    - crypto
