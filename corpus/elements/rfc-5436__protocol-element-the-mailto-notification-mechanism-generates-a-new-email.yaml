document: rfc-5436
kind: protocol-element
summary: The mailto notification mechanism generates a new email message (a 'notification message') to notify a recipient about a 'triggering message'. It uses standard mailto URIs, which may contain URI headers consisting of a header name and value, distinct from message headers.
