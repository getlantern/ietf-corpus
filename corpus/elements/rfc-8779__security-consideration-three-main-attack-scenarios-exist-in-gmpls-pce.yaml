document: rfc-8779
kind: security-consideration
summary: 'Three main attack scenarios exist in GMPLS PCE context: PCE identity theft (malicious PCE returns paths ignoring constraints or enabling physical attacks), PCC identity theft (malicious PCC learns physical topology of critical infrastructure), and message inspection (sniffing PCEP messages reveals infrastructure details). TLS per RFC 8253 and PCC-side path validation policies are recommended mitigations.'
