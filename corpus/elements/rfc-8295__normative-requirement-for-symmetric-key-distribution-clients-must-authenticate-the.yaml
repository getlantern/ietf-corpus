document: rfc-8295
kind: normative-requirement
summary: For symmetric key distribution, clients MUST authenticate the server and check server authorization; the server MUST authenticate the client and check client authorization. The cipher suite used to return the symmetric key MUST offer cryptographic strength commensurate with the key being delivered, and MUST NOT use the NULL encryption algorithm.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
