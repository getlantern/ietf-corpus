document: rfc-2060
kind: design-rationale
summary: 'Mailbox international naming uses a modified UTF-7 encoding rather than standard UTF-7 to avoid five specific conflicts: UTF-7''s ''+'' shift conflicts with USENET names, ''/'' in BASE64 conflicts with hierarchy delimiters, and UTF-7''s prohibition of unencoded ''\'', ''~'', and multiple alternate forms are all problematic. Modified UTF-7 uses ''&'' for shifting and '','' instead of ''/''.'
section: 5.1.3
topics:
