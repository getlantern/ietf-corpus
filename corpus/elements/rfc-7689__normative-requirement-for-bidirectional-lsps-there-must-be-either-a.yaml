document: rfc-7689
kind: normative-requirement
summary: For bidirectional LSPs, there MUST be either (a) one ResourceBlockInfo sub-TLV with both I and O bits set to 1, or (b) two sub-TLVs — one with only the I bit set and the other with only the O bit set. Any violation SHALL be treated as an error per RFC 7570.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
