document: rfc-5624
kind: design-rationale
summary: Two TMOD AVPs (TMOD-1 and TMOD-2) are defined because DiffServ EF traffic requires only a single token bucket, while DiffServ AF traffic requires two token buckets (one for average traffic, one for burst), enabling distinction among three levels of drop precedence as defined by the srTCM in RFC 2697.
section: "1"
topics:
