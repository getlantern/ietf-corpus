document: rfc-8104
kind: design-rationale
summary: 'Two categories of IGP advertisement approaches are supported for the context identifier: the first requires no IGP extension and advertises the context identifier as reachable via both primary PE and protector (e.g., via a virtual proxy node), allowing normal path computation; the second requires an explicit ''context identifier object'' IGP extension but ensures the transport tunnel terminates only at the primary PE. The mechanism is flexible as long as tunnel path requirements are satisfied.'
section: 4.3.3
topics:
    - mpls
    - routing
