document: rfc-9788
kind: security-consideration
summary: 'Legacy Display Elements in composing MUAs can expose confidential Header Fields: a Legacy MUA handling the message will display the Legacy Display Element in the message body, revealing the same fields that were removed or obscured from the Outer Header Section. Composers must understand this tradeoff.'
section: "10.3"
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
