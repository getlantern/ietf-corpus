document: rfc-9249
kind: protocol-element
summary: 'The module defines four NTP access modes via YANG identities: peer-access-mode (full access, bidirectional sync plus control queries), server-access-mode (unidirectional sync plus control queries), server-only-access-mode (unidirectional sync, no control queries), and query-only-access-mode (control queries only).'
