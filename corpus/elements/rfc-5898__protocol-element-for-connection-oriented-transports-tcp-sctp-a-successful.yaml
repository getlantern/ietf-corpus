document: rfc-5898
kind: protocol-element
summary: For connection-oriented transports (TCP, SCTP), a successful three-way handshake satisfies both "send" and "recv" connectivity preconditions implicitly, regardless of whether they were explicitly requested. SCTP connections SHOULD be treated the same as TCP in this regard.
section: "4.3"
rfc2119_level: SHOULD
