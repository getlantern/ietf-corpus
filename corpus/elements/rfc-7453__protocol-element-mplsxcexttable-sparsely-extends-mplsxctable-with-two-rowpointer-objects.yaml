document: rfc-7453
kind: protocol-element
summary: 'mplsXCExtTable sparsely extends mplsXCTable with two RowPointer objects: mplsXCExtTunnelPointer (read-only back-pointer to the associated tunnel entry) and mplsXCExtOppositeDirXCPtr (pointer to the cross-connect entry in the opposite direction). A zeroDotZero value for either pointer indicates no associated entry.'
