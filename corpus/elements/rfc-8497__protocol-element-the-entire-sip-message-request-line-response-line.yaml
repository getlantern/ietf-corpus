document: rfc-8497
kind: protocol-element
summary: The entire SIP message (request line, response line, header fields, and message body) SHOULD be logged. Logging SHOULD use SIP Common Log Format (CLF) per RFC 6873 or Libpcap. Header fields SHOULD NOT be converted between long and compact forms.
section: "3.6"
topics:
