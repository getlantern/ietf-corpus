document: rfc-9929
kind: design-rationale
summary: UPA is intended as an event-driven signal of the transition from reachable to unreachable, not a persistent state. Leaving UPA advertisements indefinitely would result in stale information in link-state databases across all routers in the area.
section: "2"
topics:
    - routing
