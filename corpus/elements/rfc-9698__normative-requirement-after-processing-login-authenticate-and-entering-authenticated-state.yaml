document: rfc-9698
kind: normative-requirement
summary: After processing LOGIN/AUTHENTICATE and entering Authenticated state, if the server can infer that the client's credentials suffice to authenticate via JMAP, it MUST include a JMAPACCESS capability in any capability list sent after that point, including any immediate post-authentication capability list.
section: "3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
