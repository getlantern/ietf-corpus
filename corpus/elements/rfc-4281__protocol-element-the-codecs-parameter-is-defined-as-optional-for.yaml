document: rfc-4281
kind: protocol-element
summary: The 'codecs' parameter is defined as optional for audio/3gpp, audio/3gpp2, video/3gpp, and video/3gpp2 MIME types. Its value is a single codec identifier or a comma-separated list of dot-hierarchical codec identifiers indicating all codecs required to render the body part.
section: "3"
