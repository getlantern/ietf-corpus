document: rfc-7505
kind: normative-requirement
summary: SMTP servers that reject mail because a RFC5321.MailFrom or RFC5322.From domain has a null MX record SHOULD use a 550 reply code and a 5.7.27 enhanced status code (Sender address has null MX).
section: "4.1"
rfc2119_level: SHOULD
