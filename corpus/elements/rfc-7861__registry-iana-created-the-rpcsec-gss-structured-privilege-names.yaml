document: rfc-7861
kind: registry
summary: IANA created the 'RPCSEC_GSS Structured Privilege Names Registry' maintained under the Standards Action policy. Names are UTF-8 strings of 1–128 characters; the prefixes 'EXPE' and 'PRIV' (and their case permutations) are reserved; the initial entries are copy_to_auth, copy_from_auth, and copy_confirm_auth from RFC 7862.
