document: rfc-2137
kind: normative-requirement
summary: All update requests to a secure zone must include signatures by one or more keys that together authorize that update. The keys must be available to and authenticated by the receiving server as specially flagged KEY Resource Records.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
