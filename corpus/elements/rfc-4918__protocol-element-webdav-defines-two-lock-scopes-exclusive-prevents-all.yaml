document: rfc-4918
kind: protocol-element
summary: 'WebDAV defines two lock scopes: exclusive (prevents all other locks) and shared (multiple principals may hold simultaneous locks). A successful shared lock request MUST result in a unique lock and lock token per requesting principal.'
section: "6.2"
