document: rfc-5372
kind: interoperability-note
summary: Implementations following this document are expected to interoperate with implementations of RFC 5371 alone. Receivers that do not support these extensions can safely ignore the mh_id and priority field values, and in a multicast environment senders MAY use these mechanisms even if some clients do not support them.
section: "2.1"
topics:
