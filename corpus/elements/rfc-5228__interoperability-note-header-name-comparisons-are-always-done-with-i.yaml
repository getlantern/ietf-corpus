document: rfc-5228
kind: interoperability-note
summary: Header name comparisons are always done with 'i;ascii-casemap' (case-insensitive), as defined by the message specification. The user cannot override this with a :comparator argument; comparator selection only applies to header value comparisons.
section: "2.7"
