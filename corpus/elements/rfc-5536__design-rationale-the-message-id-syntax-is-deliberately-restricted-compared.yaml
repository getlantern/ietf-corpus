document: rfc-5536
kind: design-rationale
summary: The Message-ID syntax is deliberately restricted compared to RFC 5322 because Netnews is more dependent on message identifier uniqueness and fast comparison than Email. Prohibiting comments, whitespace inside the identifier, and making id-right case-sensitive means a simple octet comparison always suffices to determine identity.
section: 3.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
