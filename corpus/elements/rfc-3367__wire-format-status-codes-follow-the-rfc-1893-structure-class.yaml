document: rfc-3367
kind: wire-format
summary: 'Status codes follow the RFC 1893 structure: class ''.'' subject ''.'' detail, where class is 2/3/4/5 (success through permanent failure), subject is 1-3 digits indicating the category, and detail is 1-3 digits with specifics. The subject sub-code MUST be reported if recognized even if the detail sub-code is not.'
section: 4.2.4.3
