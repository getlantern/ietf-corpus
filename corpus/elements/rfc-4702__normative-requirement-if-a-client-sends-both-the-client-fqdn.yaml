document: rfc-4702
kind: normative-requirement
summary: If a client sends both the Client FQDN and Host Name options, the server SHOULD ignore the Host Name option. The server MUST use the same encoding format as the client and MUST set the E bit accordingly.
section: "4"
rfc2119_level: MUST
topics:
    - dns
