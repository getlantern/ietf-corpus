document: rfc-3856
kind: protocol-element
summary: Polite blocking allows a PA to return 200 OK to a subscription even when it has been rejected or marked pending. The NOTIFY presence document SHOULD be constructed to not reveal to the subscriber that their request has been blocked, typically by indicating "offline" status.
section: 6.6.2
topics:
    - sip
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
