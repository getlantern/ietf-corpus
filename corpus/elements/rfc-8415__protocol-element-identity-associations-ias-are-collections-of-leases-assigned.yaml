document: rfc-8415
kind: protocol-element
summary: 'Identity Associations (IAs) are collections of leases assigned to a client, indexed by a client-chosen IAID. Three IA types are defined: IA_NA (non-temporary addresses), IA_TA (temporary addresses), and IA_PD (delegated prefixes). A server binding is indexed by the tuple <DUID, IA-type, IAID>.'
