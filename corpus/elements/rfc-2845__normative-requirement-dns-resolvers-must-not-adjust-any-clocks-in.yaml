document: rfc-2845
kind: normative-requirement
summary: DNS resolvers MUST NOT adjust any clocks in the client based on BADTIME errors. The server's time in the Other Data field SHOULD be logged so operators can diagnose clock skew.
section: 4.6.2
rfc2119_level: MUST NOT
topics:
    - dns
    - security
    - ntp
