document: rfc-2380
kind: protocol-element
summary: Dynamic QoS changes are implemented by establishing a replacement VC at the new QoS level while keeping the old VC active. Data transmission is shifted to the new VC only after it is fully established, and only then is the old VC closed.
section: "2.4"
