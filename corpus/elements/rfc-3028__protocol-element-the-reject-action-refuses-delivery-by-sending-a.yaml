document: rfc-3028
kind: protocol-element
summary: The 'reject' action refuses delivery by sending a failure MDN back to the sender. The MDN action-value field MUST be 'deleted' with MDN-sent-automatically and automatic-action modes set. The reject action is optional and must be declared with require.
section: "4.1"
