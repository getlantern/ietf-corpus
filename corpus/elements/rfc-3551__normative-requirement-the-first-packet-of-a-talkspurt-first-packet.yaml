document: rfc-3551
kind: normative-requirement
summary: The first packet of a talkspurt (first packet after a silence period) SHOULD be distinguished by setting the RTP marker bit to one. Applications without silence suppression MUST set the marker bit to zero.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
