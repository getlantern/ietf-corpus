document: rfc-5322
kind: normative-requirement
summary: Each line of characters MUST be no more than 998 characters, and SHOULD be no more than 78 characters, excluding the CRLF. The 998-character limit reflects transport system limitations; the 78-character recommendation accommodates user interfaces that may truncate or wrap longer lines.
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
