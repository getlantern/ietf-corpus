document: rfc-7210
kind: design-rationale
summary: The database supports both direct use of long-lived keys and use via a key derivation function to produce short-lived keys, because some security protocols use the long-lived key directly while others derive short-term session keys. The KDF field set to 'none' indicates direct use.
