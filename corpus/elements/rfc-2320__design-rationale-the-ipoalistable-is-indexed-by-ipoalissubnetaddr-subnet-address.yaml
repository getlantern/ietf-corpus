document: rfc-2320
kind: design-rationale
summary: The ipoaLisTable is indexed by ipoaLisSubnetAddr (subnet address) rather than ifIndex because the same LIS can be reached via different ATM interfaces; the ipoaLisIfMappingTable provides the separate interface-to-LIS mapping.
