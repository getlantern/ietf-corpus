document: rfc-3709
kind: security-consideration
summary: A malicious CA can comply with name and policy constraints imposed by a parent CA while including inappropriate or fraudulent logotypes in issued certificates that will still pass certification path validation. No technical mechanism prevents subordinate CAs from inserting arbitrary logotype content; parent CAs must rely on contractual agreements, monitoring, and revocation.
section: "7"
topics:
