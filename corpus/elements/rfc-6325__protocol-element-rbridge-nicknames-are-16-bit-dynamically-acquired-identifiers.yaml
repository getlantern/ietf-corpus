document: rfc-6325
kind: protocol-element
summary: RBridge Nicknames are 16-bit dynamically acquired identifiers that abbreviate IS-IS IDs for use in the TRILL header. Value 0x0000 indicates an unspecified nickname, values 0xFFC0 through 0xFFFF are reserved, and each nickname in use also designates a distribution tree rooted at the corresponding RBridge.
section: "3.7"
topics:
    - routing
