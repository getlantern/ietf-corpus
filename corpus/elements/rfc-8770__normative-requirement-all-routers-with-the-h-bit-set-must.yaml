document: rfc-8770
kind: normative-requirement
summary: All routers with the H-bit set MUST advertise all non-stub links with a metric equal to MaxLinkMetric in their LSAs so that routers not supporting H-bit will still avoid using those links for transit (unless last-resort).
section: "5"
rfc2119_level: MUST
topics:
    - routing
