document: rfc-9492
kind: normative-requirement
summary: If the same attribute is advertised in more than one ASLA sub-TLV with the application listed in the Application Identifier Bit Masks, the application SHOULD use the first instance of advertisement and ignore any subsequent advertisements of that attribute.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
