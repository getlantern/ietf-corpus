document: rfc-8086
kind: normative-requirement
summary: When applying payload fragmentation, the UDP checksum MUST be used so that the receiving endpoint can validate reassembly; the same UDP source port SHOULD be used for all packet fragments to ensure transit routers forward fragments on the same path.
section: 2.1.1
rfc2119_level: MUST
topics:
    - udp
    - ip
