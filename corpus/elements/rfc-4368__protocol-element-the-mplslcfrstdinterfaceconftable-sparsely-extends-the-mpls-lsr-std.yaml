summary: The mplsLcFrStdInterfaceConfTable sparsely extends the MPLS-LSR-STD-MIB's mplsInterfaceConfTable to identify MPLS interfaces that have LC-Frame Relay capability. Each entry is indexed by mplsInterfaceIndex and exists only when corresponding ifTable and mplsInterfaceConfTable entries exist.
