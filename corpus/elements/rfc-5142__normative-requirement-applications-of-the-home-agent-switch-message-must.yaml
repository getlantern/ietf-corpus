document: rfc-5142
kind: normative-requirement
summary: Applications of the Home Agent Switch message MUST either employ a feedback loop between resources of the new home agent and additional message sending, or apply a maximum rate (defaulting to MAX-HA-SWITCH-TRANSMIT-RATE if no other information is available) to avoid overloading the new home agent.
section: "7"
rfc2119_level: REQUIRED
topics:
    - mobility
    - qos
