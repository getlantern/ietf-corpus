document: rfc-1044
kind: protocol-element
summary: The Message Type field (bytes 8–9) is a 16-bit formal protocol type designator. Major protocols are assigned a unique value in byte 8; minor protocols receive full 16-bit values. NSC maintains a network protocol registry for these assignments. The value 0xFF00 causes the receiving adapter to loop back the message without delivering it to the host.
section: MESSAGE TYPE
topics:
    - ip
    - registry
