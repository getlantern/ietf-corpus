document: rfc-9504
kind: design-rationale
summary: Active stateful PCEs use PCUpd messages (PCE to PCC) to update delegated GMPLS LSP state, with PCRpt responses; passive stateful PCEs use PCReq/PCRep for computation plus PCRpt for state change reporting. This distinction drives which GMPLS-specific objects appear in which messages.
section: "3"
topics:
