document: rfc-9788
kind: normative-requirement
summary: The rendering MUA MUST completely avoid rendering Legacy Display Elements to the user. If a text/html or text/plain part is identified as containing Legacy Display Elements, those elements MUST be hidden when rendering and MUST be dropped when generating a draft reply or inline forwarded message.
section: 4.5.3
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
