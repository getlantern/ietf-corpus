document: rfc-9965
kind: normative-requirement
summary: EAP peers MUST track which provisioning methods have been tried and MUST NOT repeat the same method to the same EAP server upon receiving an EAP Nak. Peers MUST rate limit provisioning attempts and SHOULD retry no more than once every few minutes with jitter and exponential backoff.
section: 3.4.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
