document: rfc-9953
kind: design-rationale
summary: Direct protocol mapping between DoC and DoH at a CoAP-to-HTTP proxy is NOT RECOMMENDED because rewriting the FETCH method semantics and the TTL/Max-Age relationship would be non-trivial. A DNS forwarder should be used instead, as with any other pair of DNS transports.
section: "5.3"
topics:
    - dns
