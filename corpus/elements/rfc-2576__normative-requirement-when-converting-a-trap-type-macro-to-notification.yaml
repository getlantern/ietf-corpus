summary: When converting a TRAP-TYPE macro to NOTIFICATION-TYPE for SMIv2 conformance, the ENTERPRISE clause MUST be removed, VARIABLES renamed to OBJECTS, a STATUS clause MUST be added, and one or more NOTIFICATION-GROUPs MUST be defined.
