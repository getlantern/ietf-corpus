document: rfc-4998
kind: interoperability-note
summary: While RFC 3161 is the primary timestamp format, the timeStamp field MAY contain other timestamp formats (e.g., ISO 18014, ANSI X9.95) provided they contain time data, timestamped data, and a cryptographically secure TSA confirmation. Non-certificate-based timestamps (ISO 18014-2, ISO 18014-3) require no CRL/OCSP preservation.
section: "4.1"
topics:
