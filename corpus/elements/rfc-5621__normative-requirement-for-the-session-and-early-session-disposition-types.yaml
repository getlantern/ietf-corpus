document: rfc-5621
kind: normative-requirement
summary: For the 'session' and 'early-session' disposition types, UAs MUST NOT place more than one body part with a given content type in a 'multipart/alternative' body, since these disposition types require all body parts to have different content types.
section: "6.2"
rfc2119_level: MUST NOT
topics:
