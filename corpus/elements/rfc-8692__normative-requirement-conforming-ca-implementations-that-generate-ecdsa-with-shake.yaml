document: rfc-8692
kind: normative-requirement
summary: Conforming CA implementations that generate ECDSA with SHAKE signatures in certificates or CRLs SHOULD generate such signatures with a deterministically generated, nonrandom k in accordance with all the requirements specified in RFC 6979.
section: 4.1.2
rfc2119_level: SHOULD
