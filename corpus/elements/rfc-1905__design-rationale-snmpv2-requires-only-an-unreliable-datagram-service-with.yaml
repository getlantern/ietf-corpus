document: rfc-1905
kind: design-rationale
summary: SNMPv2 requires only an unreliable datagram service, with every message entirely contained in a single transport datagram. Retransmission of requests is left to the discretion of the requesting application depending on urgency, but applications must act responsibly regarding frequency and duration of retransmissions.
section: "2.4"
topics:
    - snmp
