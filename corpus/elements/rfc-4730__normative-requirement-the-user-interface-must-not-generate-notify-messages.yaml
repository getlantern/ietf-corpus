document: rfc-4730
kind: normative-requirement
summary: The User Interface MUST NOT generate NOTIFY messages faster than 25 messages per second (one message per 40 milliseconds). The sustained rate MUST be no more than 100 NOTIFYs per minute. KPML strongly RECOMMENDS AGAINST digit-by-digit messaging (e.g., using only '<regex>x</regex>').
section: "4.11"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
