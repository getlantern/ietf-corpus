document: rfc-5511
kind: design-rationale
summary: Precedence is identified as the main source of confusion in RBNF, particularly when alternatives are mixed with concatenations. The concrete example from RFC 2205 Section 3.1.4 illustrates how a line break could be misread as implying grouping; the precedence rules resolve it to formulation (a) where concatenation binds before the alternative.
section: "2.4"
topics:
