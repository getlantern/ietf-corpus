document: rfc-1889
kind: wire-format
summary: 'When the X bit in the RTP header is set, a variable-length header extension follows the CSRC list: a 16-bit profile-defined field, a 16-bit length counting 32-bit words in the extension body (zero is valid), then the extension data. Only a single extension may be appended.'
section: 5.3.1
topics:
