document: rfc-1572
kind: design-rationale
summary: A new option code was assigned rather than reusing the RFC 1408 option number specifically to eliminate ambiguity caused by the VAR/VALUE value reversal bug. RFC 1571 documents how to interoperate with pre-existing implementations.
