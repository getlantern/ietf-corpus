document: rfc-1598
kind: interoperability-note
summary: The triggered update mechanism described in this document runs unmodified on LANs. Because LAN interfaces typically do not have the WAN demand-circuit characteristics, the additional complexity for WAN optimization has no adverse effect on LAN operation.
