document: rfc-7171
kind: design-rationale
summary: Success or failure of PT-EAP does not determine the outcome of the overall EAP tunnel authentication; that depends on administrator policy. This decoupling allows flexible deployment where NEA assessment failure need not necessarily deny network access.
