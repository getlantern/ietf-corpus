document: rfc-7401
kind: wire-format
summary: The HOST_ID parameter encodes the Host Identity public key. It includes HI Length (2 bytes), DI Type and DI Length fields, the algorithm-specific public key (RSA encoded per RFC 3110, DSA per RFC 2536, or ECDSA per RFC 6090), and an optional Domain Identifier.
section: 5.2.9
