document: rfc-1122
kind: normative-requirement
summary: An Internet host that implements embedded gateway functionality MUST have a configuration switch to disable the gateway function, and this switch MUST default to the non-gateway mode. The host MUST NOT automatically enable gateway mode solely because it has more than one interface.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
