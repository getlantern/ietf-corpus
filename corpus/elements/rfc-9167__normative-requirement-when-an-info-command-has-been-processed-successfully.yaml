document: rfc-9167
kind: normative-requirement
summary: When an <info> command has been processed successfully, the EPP <resData> element MUST contain a child <maint:infData> element containing either a <maint:list> (with zero or more <maint:listItem> elements) or a <maint:item> element.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
