document: rfc-7057
kind: normative-requirement
summary: It is REQUIRED for the application layer to prove that both the EAP peer and EAP authenticator possess the EAP Master Session Key (MSK). Failing to validate MSK possession can allow an attacker to insert himself into the conversation and impersonate the peer or authenticator.
section: "2"
rfc2119_level: REQUIRED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
