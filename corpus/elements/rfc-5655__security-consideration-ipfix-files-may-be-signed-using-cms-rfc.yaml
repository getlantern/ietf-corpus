document: rfc-5655
kind: security-consideration
summary: IPFIX Files may be signed using CMS (RFC 3852) detached signatures stored separately from the File to provide integrity and authentication. The CMS SignedData structure with detached EncapsulatedContentInfo is the specified signing method.
