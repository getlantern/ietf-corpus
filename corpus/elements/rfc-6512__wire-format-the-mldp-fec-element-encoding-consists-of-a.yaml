document: rfc-6512
kind: wire-format
summary: The mLDP FEC element encoding consists of a 1-octet Type field, 2-octet Address Family, 1-octet Address Length, variable-length Root Node Address, 2-octet Opaque Length, and variable-length Opaque Value. A P2MP or MP2MP LSP is identified by the combination of root node address and opaque value.
section: "1"
topics:
