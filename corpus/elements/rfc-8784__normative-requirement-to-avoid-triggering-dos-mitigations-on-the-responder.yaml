document: rfc-8784
kind: normative-requirement
summary: To avoid triggering DoS mitigations on the responder due to half-open SAs, it is RECOMMENDED that the initiator cache the negative result of a failed mandatory-PPK negotiation and not retry for at least a few minutes.
section: "6"
rfc2119_level: RECOMMENDED
