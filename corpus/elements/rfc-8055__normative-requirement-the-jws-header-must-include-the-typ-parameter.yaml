document: rfc-8055
kind: normative-requirement
summary: The JWS Header MUST include the 'typ' parameter with value 'JWT' and the 'alg' parameter set to the algorithm used to calculate the JWS. Operators must agree on a set of supported algorithms and use only those with registered 'alg' parameter values.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - jose
    - crypto
