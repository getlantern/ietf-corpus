document: rfc-3804
kind: design-rationale
summary: VPIM v2 recommends a numeric LHS because many legacy voice mail systems only use digits to identify mailboxes, and some systems will only accept messages from addresses with a numeric LHS, driving the deployment of the private numeric format.
