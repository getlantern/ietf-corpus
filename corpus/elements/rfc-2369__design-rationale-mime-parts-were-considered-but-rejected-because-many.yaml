document: rfc-2369
kind: design-rationale
summary: MIME parts were considered but rejected because many mail clients at the time did not support MIME or could not handle specialized parts, and header fields are easier for list servers to implement. A MIME-based approach for more complete command description was noted as future work.
section: A.6
