document: rfc-2557
kind: normative-requirement
summary: A sending MUA SHOULD maintain the WWW URIs of objects retrieved from the web and SHOULD NOT transform these URIs into another form before transmission, so that recipients can verify message integrity checks and compare against the original web resources.
section: "7"
rfc2119_level: SHOULD
