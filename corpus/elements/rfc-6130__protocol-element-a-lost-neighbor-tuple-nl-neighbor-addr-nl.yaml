document: rfc-6130
kind: protocol-element
summary: A Lost Neighbor Tuple (NL_neighbor_addr, NL_time) records a network address of a router that recently was a symmetric 1-hop neighbor but is now lost. This enables HELLO messages to advertise the loss, accelerating removal from recipients' 2-Hop Sets.
section: "8.2"
topics:
    - routing
    - mobility
