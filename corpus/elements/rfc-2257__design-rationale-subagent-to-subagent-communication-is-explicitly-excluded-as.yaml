document: rfc-2257
kind: design-rationale
summary: Subagent-to-subagent communication is explicitly excluded as a non-goal due to security implications and added complexity. Subagent access to MIB variables via the master is also out of scope since other mechanisms exist; AgentX is narrowly scoped to cover only subagent-to-master communication.
