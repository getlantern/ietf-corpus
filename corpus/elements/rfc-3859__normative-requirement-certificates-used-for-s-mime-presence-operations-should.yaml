document: rfc-3859
kind: normative-requirement
summary: Certificates used for S/MIME presence operations SHOULD contain a subjectAltName field with the PRES URI of their subject, for reference integrity purposes. Such certificates may also contain other identifiers specific to particular presence protocols.
