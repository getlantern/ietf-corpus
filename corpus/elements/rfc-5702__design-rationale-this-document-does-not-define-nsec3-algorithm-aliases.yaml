document: rfc-5702
kind: design-rationale
summary: This document does not define NSEC3 algorithm aliases for RSA/SHA-2 (unlike RFC 5155 for older algorithms) because that aliasing mechanism was specifically designed to protect pre-RFC 5155 implementations, which would not exist for newly defined algorithm numbers.
section: "5.2"
topics:
