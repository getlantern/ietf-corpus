document: rfc-4976
kind: security-consideration
summary: Use-Path URI tokens must be treated as secrets shared only between the two MSRP clients in a session. If a third party discovers a token it can inject messages to the receiving relay, though the relay will only forward them to the authorized destination client.
section: "9.4"
topics:
    - realtime
    - security
    - privacy
