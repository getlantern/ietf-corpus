summary: The security considerations of BCP 26 (RFC 2434) are generally applicable. Security considerations specific to RADIUS are deferred to RFC 2607, RFC 2865, RFC 3162, RFC 3576 (DynAuth), and RFC 2869bis (RADIUS EAP support).
