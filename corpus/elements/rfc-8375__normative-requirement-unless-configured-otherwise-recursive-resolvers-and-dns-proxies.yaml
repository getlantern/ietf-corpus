document: rfc-8375
kind: normative-requirement
summary: 'Unless configured otherwise, recursive resolvers and DNS proxies MUST behave as described in RFC 6303 Section 3: queries for ''home.arpa.'' and its subdomains MUST NOT be forwarded, with the exception that a DS record query with the DO bit set MUST return the correct answer including proper authority section information.'
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
