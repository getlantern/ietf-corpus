document: rfc-9584
kind: interoperability-note
summary: Implementations SHOULD be able to parse all optional media type parameters even when the related functionality is not supported, enabling graceful SDP Offer/Answer downgrade. Prior H.26x payload format implementations that silently rejected offers containing unrecognized optional parameters caused negotiation to fall back to lowest-common-denominator baseline configurations, degrading user experience.
section: 7.3.2
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
