document: rfc-4103
kind: normative-requirement
summary: 'When using redundancy: each redundant data block MUST contain the same data as a previously transmitted primary T140block; redundant data MUST be placed in age order with the most recent last; and all T140blocks from the oldest desired generation up through the generation immediately preceding the new primary MUST be included.'
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
