document: rfc-3275
kind: security-consideration
summary: XML Signature alone does not specify how keys are associated with persons or institutions, nor the meaning of signed data. Applications must specify additional key, algorithm, processing, and rendering requirements. HMAC-based signatures provide message authentication, not signer authentication.
section: "8.2"
topics:
    - security
    - crypto
