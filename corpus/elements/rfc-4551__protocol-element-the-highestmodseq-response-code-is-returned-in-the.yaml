document: rfc-4551
kind: protocol-element
summary: 'The HIGHESTMODSEQ response code is returned in the OK untagged response to SELECT/EXAMINE when the mailbox supports persistent mod-sequence storage. Its value is the highest mod-sequence of all messages in the mailbox: `OK [HIGHESTMODSEQ <mod-sequence-value>]`.'
section: 3.1.1
topics:
    - email
