document: rfc-8311
kind: design-rationale
summary: 'RFC 8311 relaxes RFC 3168 restrictions on ECN experimentation to allow Experimental RFCs to deviate from RFC 3168 without requiring a standards-process exception for each one. The three target areas are: congestion response differences, congestion marking differences, and ECN on TCP control packets and retransmissions.'
