document: rfc-2380
kind: design-rationale
summary: Although RSVP control is receiver-oriented and ATM control is sender-oriented, this mismatch is resolved by requiring subnet senders to initiate all QoS VCs. This allows senders to use different flow-to-VC mappings and QoS renegotiation techniques without interoperability problems.
section: "2.2"
topics:
