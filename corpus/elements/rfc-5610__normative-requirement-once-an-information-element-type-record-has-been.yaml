document: rfc-5610
kind: normative-requirement
summary: Once an Information Element type record has been exported for a given IE within a given Transport Session, all subsequent type records for that IE MUST be identical. IE type records SHOULD NOT be duplicated within a given Observation Domain within a Transport Session.
section: "3.9"
rfc2119_level: MUST
topics:
    - snmp
