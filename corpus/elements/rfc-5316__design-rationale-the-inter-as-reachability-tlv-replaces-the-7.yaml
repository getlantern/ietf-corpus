document: rfc-5316
kind: design-rationale
summary: The Inter-AS Reachability TLV replaces the 7-octet System ID/Pseudonode Number field of the extended IS reachability TLV with a 4-octet Router ID and adds a control byte (S bit, D bit), because inter-AS links have no ISIS adjacency and require explicit flooding scope control.
section: "3.1"
topics:
    - routing
    - mpls
