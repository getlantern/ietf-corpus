document: rfc-5905
kind: normative-requirement
summary: If authentication is implemented, the MD5-keyed hash algorithm described in RFC 1321 must be supported. The MAC is computed over the key concatenated with all NTP header and extension fields (but not the Key Identifier or Message Digest fields themselves).
section: "9.2"
rfc2119_level: MUST
topics:
    - ntp
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
