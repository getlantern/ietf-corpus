document: rfc-6991
kind: protocol-element
summary: The ietf-inet-types YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-inet-types) defines derived YANG data types relevant to the Internet protocol suite, including IP version, DSCP, port numbers, AS numbers, IP addresses, prefixes, domain names, and URIs. The 2013-07-15 revision adds ip-address-no-zone, ipv4-address-no-zone, and ipv6-address-no-zone.
section: "4"
topics:
