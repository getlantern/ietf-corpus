document: rfc-7181
kind: state-machine
summary: 'TC message forwarding decision: upon receipt, a router checks (1) message not self-originated, (2) not in Forwarded Set, (3) not previously received on this interface (Received Set), (4) sender is a flooding MPR selector. All four conditions MUST hold to forward; otherwise the message is dropped or only processed.'
section: "14.3"
topics:
    - routing
