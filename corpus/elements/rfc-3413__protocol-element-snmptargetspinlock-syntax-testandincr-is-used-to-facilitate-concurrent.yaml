document: rfc-3413
kind: protocol-element
summary: 'snmpTargetSpinLock (SYNTAX TestAndIncr) is used to facilitate concurrent modification of snmpTargetAddrTagList by multiple managers. The safe procedure is: (1) retrieve lock and current tag list, (2) compute new value, (3) set both atomically; if the lock set fails, restart from step 1.'
section: 4.1.2
topics:
    - snmp
