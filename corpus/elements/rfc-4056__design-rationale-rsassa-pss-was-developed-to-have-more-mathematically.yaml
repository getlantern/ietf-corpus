document: rfc-4056
kind: design-rationale
summary: 'RSASSA-PSS was developed to have more mathematically provable security compared to PKCS #1 v1.5, which was developed in an ad hoc manner. Although no known defects exist in PKCS #1 v1.5, RSASSA-PSS is based on mathematical foundations.'
