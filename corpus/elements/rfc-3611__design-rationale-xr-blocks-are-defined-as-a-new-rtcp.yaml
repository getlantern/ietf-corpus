document: rfc-3611
kind: design-rationale
summary: XR blocks are defined as a new RTCP packet type rather than profile-specific SR/RR extensions because the extended statistics are useful across multiple RTP profiles (e.g., multicast MINC tomography and VoIP monitoring), making profile-specific carriage inappropriate.
section: "1.1"
topics:
