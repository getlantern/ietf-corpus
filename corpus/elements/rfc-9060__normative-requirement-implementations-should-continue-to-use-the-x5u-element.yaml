document: rfc-9060
kind: normative-requirement
summary: Implementations SHOULD continue to use the 'x5u' element rather than 'x5c' for delivering certification paths in STIR, since 'x5u' is already established in operational practice. 'x5c' is OPTIONAL for environments where it is known to be supported.
