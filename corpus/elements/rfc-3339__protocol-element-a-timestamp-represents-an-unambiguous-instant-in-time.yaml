document: rfc-3339
kind: protocol-element
summary: A timestamp represents an unambiguous instant in time, expressed as a full-date and full-time joined by 'T', always accompanied by a UTC offset. Timestamps cover dates from 0000AD to 9999AD and express instants only, not periods or intervals.
section: "1"
