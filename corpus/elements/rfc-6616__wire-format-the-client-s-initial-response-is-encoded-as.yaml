document: rfc-6616
kind: wire-format
summary: The client's initial response is encoded as 'gs2-header Auth-Identifier' where Auth-Identifier is a URI per OpenID 2.0 Section 7.2. XRIs MUST NOT be used. The gs2-nonstd-flag MUST NOT be present, and gs2-cb-flag MUST be 'n'.
section: "3.1"
topics:
