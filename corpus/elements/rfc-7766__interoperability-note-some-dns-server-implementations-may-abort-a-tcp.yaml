document: rfc-7766
kind: interoperability-note
summary: Some DNS server implementations may abort a TCP session if the first 'read' from the TCP layer does not contain both the length field and the entire message. This document explicitly forbids such behavior to ensure interoperability.
section: "8"
topics:
