summary: The 'ietf-sap-ntw' module augments '/nw:networks/nw:network/nw:network-types' with a presence container 'sap-network' (holding a 'service-type' leaf-list) and augments '/nw:networks/nw:network/nw:node' (conditioned on the sap-network presence) with a 'service' list keyed by 'service-type', each entry containing a 'sap' list keyed by 'sap-id'.
