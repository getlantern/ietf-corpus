document: rfc-6401
kind: registry
summary: IANA extended the Resource-Priority Priority-Values registry (under SIP Parameters) by adding a 'Priority Numerical Value' column for each namespace. Within each namespace, values are allocated in decreasing order ending at 0 (greatest priority = 0), and values must be unique within a namespace.
section: "7"
