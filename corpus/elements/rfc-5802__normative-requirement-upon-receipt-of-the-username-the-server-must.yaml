document: rfc-5802
kind: normative-requirement
summary: Upon receipt of the username, the server MUST either prepare it using SASLprep or be prepared to do SASLprep-aware comparisons and lookups; regardless, the server MUST use the username as received (unprepared) in hash calculations.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
