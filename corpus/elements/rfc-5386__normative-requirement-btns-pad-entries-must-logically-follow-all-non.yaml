document: rfc-5386
kind: normative-requirement
summary: BTNS PAD entries MUST logically follow all non-BTNS PAD entries in the PAD. This ensures that a peer with a known identity is always matched against non-BTNS entries first before falling back to BTNS matching.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
