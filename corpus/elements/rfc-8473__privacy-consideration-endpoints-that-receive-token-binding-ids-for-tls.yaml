document: rfc-8473
kind: privacy-consideration
summary: Endpoints that receive Token Binding IDs for TLS connections other than their own (e.g., a Token Provider receiving a Referred Token Binding ID) gain correlation handles for those other connections. A privacy analysis of such correlations should be performed before enabling referred Token Binding in application designs.
section: "8.3"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
