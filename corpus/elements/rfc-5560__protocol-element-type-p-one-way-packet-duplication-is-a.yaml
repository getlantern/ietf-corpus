document: rfc-5560
kind: protocol-element
summary: Type-P-one-way-packet-duplication is a singleton metric whose value is a positive integer indicating the number of additional copies (beyond the first) of an individual packet received by dst in [T, T+T0]. It equals Type-P-one-way-packet-arrival-count minus 1; it is 0 if exactly one copy arrives, and undefined if no copy arrives.
section: "3"
topics:
