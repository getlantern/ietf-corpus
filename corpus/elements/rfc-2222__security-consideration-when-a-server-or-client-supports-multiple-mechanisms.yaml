document: rfc-2222
kind: security-consideration
summary: When a server or client supports multiple mechanisms of different security strengths, an active attacker can force use of the weakest mechanism. Both client and server should have a configurable minimum strength; a server-only check is insufficient because an attacker can modify the advertised mechanism list seen by the client.
section: "9"
topics:
    - security
