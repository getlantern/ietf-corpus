summary: 'Type-7 route calculation proceeds after type-5 route calculation (step 5 of OSPF chapter 16). For each type-7 LSA: skip if metric is LSInfinity, age equals MaxAge, or advertising router is self; skip if ASBR is unreachable; skip default routes between two NSSA ABRs; otherwise compute cost X to forwarding address and advertised cost Y, then compare against existing routing table entries using type-5/type-7 tie-breaking rules.'
