document: rfc-9174
kind: protocol-element
summary: MSG_REJECT (message type 0x06) allows a TCPCL entity to reject a received message it cannot process or does not recognize, conveying a numeric reason code. It provides a mechanism for signaling unknown or malformed messages without immediately terminating the session.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
