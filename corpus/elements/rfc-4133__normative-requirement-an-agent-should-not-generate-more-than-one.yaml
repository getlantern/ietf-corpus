document: rfc-4133
kind: normative-requirement
summary: An agent SHOULD NOT generate more than one entConfigChange notification-event in a given five-second throttling interval. If additional changes occur within the throttling period, those notification-events should be suppressed until the period expires, after which one event is sent if any changes occurred.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - snmp
