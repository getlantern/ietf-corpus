document: rfc-3478
kind: normative-requirement
summary: Once an LSR creates a <label, FEC> binding, it SHOULD keep that label value as long as it has a route to the FEC. To minimize mis-routing from label reuse, when assigning a new label the LSR SHOULD pick the least recently used label.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
