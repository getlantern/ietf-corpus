document: rfc-5870
kind: design-rationale
summary: The number of decimal digits in coordinate values MUST NOT be interpreted as indicating a level of accuracy or uncertainty. Uncertainty is expressed only via the explicit 'u' parameter, keeping coordinate precision concerns separate from uncertainty semantics.
section: 3.4.3
