document: rfc-8346
kind: security-consideration
summary: Access to the YANG modules MUST be via NETCONF over SSH (mandatory secure transport per RFC 6242) or RESTCONF over HTTPS/TLS (RFC 5246), and access control MUST use the NETCONF access control model (RFC 8341) to restrict operations and content to authorized users.
section: "9"
topics:
    - security
    - yang
    - netconf
