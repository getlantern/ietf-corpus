document: rfc-7925
kind: normative-requirement
summary: PSK identities SHOULD NOT assume a structured format such as domain names or IP addresses, and a byte-by-byte comparison MUST be used by the server for any operation related to the PSK identity. These identifiers are called 'absolute' per RFC 6943.
section: "4.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
