document: rfc-5588
kind: protocol-element
summary: GSS_Store_cred() is a new GSS-API primitive that stores a given credential (delegated or otherwise) into the current implicit credential store. It accepts input_cred_handle, cred_usage, desired_mech_element, overwrite_cred, and default_cred as inputs, and returns major_status, minor_status, mech_elements_stored, and cred_usage_stored.
section: "3"
topics:
