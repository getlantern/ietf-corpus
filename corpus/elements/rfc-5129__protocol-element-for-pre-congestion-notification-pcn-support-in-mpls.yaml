document: rfc-5129
kind: protocol-element
summary: 'For Pre-Congestion Notification (PCN) support in MPLS, three EXP codepoints per PCN-capable PHB are needed: Not Marked (NM), Admission Marked (AM), and Termination Marked (TM). State transitions are NM→AM, NM→TM, and AM→TM only; TM is sticky and overrides all other states.'
section: A
topics:
