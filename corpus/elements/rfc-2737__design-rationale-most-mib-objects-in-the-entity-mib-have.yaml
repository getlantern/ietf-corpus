document: rfc-2737
kind: design-rationale
summary: Most MIB objects in the Entity MIB have at most read-only MAX-ACCESS, a conscious decision to limit the MIB's scope. Version 2 introduced only a small set of writable string objects (entPhysicalSerialNum, entPhysicalAlias, entPhysicalAssetID) for administrative identification of physical components.
