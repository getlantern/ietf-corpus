document: rfc-8990
kind: normative-requirement
summary: If the substrate specifies UDP for discovery/flooding, it MUST NOT use IP fragmentation. GRASP MUST then enforce a message size limit at the user API level; for IPv6, multicast packets MUST be at most 1280 bytes unless a known larger minimum link MTU is confirmed across the whole GRASP domain.
section: 2.5.3
rfc2119_level: MUST NOT
topics:
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
