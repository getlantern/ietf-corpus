document: rfc-3033
kind: design-rationale
summary: Forwarding the IP setup protocol (e.g., RSVP) as an information element in B-ISDN signaling (simultaneous QoS session + ATM VC establishment) is preferred over sequential establishment because it simplifies admission control, simplifies watchdog timer processing, and enables QoS negotiation. However, PVC-based QoS sessions cannot use this approach, so both procedures must be supported.
section: "2.2"
topics:
