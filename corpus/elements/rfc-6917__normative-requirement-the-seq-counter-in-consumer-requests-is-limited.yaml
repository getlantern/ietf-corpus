document: rfc-6917
kind: normative-requirement
summary: The <seq> counter in Consumer requests is limited to the 0..2^31-1 range. If the counter reaches the maximum value, it MUST be reset to 0. The initial <seq> value SHOULD be randomly generated by the MRB to reduce the risk of session disruption by a malicious entity.
section: 5.2.3
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
