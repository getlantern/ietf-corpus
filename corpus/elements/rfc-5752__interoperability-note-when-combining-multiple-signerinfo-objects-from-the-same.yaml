document: rfc-5752
kind: interoperability-note
summary: When combining multiple SignerInfo objects from the same signer, applications must specify how signer identity is matched if subject name or subject alternative names are ambiguous. S/MIME applications may consider two SignerInfo objects from the same identity if the same rfc822Name appears in either the subject name or subject alt name.
section: "5.2"
topics:
    - crypto
    - email
