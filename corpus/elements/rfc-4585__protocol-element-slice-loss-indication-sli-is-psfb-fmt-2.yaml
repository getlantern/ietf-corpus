document: rfc-4585
kind: protocol-element
summary: Slice Loss Indication (SLI) is PSFB FMT=2 and reports loss or corruption of consecutive macroblocks in raster-scan order. It MUST NOT be used with video codecs that have non-uniform, dynamically changeable macroblock sizes (e.g., H.263 Annex Q), where the encoder cannot identify the corrupted spatial region.
section: 6.3.2
topics:
    - rtp
    - realtime
