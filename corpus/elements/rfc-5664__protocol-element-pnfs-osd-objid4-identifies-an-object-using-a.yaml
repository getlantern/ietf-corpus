document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_objid4 identifies an object using a three-level hierarchy: deviceid4 oid_device_id (selects the OSD from GETDEVICELIST/GETDEVICEINFO), uint64_t oid_partition_id (64-bit partition number within the OSD), and uint64_t oid_object_id (64-bit object number within the partition).'
section: "3.1"
