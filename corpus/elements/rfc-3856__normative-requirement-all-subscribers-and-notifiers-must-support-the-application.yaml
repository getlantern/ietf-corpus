document: rfc-3856
kind: normative-requirement
summary: All subscribers and notifiers MUST support the "application/pidf+xml" presence data format. If no Accept header field is present in the SUBSCRIBE, the default value is "application/pidf+xml"; if present, it MUST include "application/pidf+xml".
section: "6.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
