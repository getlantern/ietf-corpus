document: rfc-5258
kind: normative-requirement
summary: The CHILDINFO extended data item MUST NOT be returned unless the client has specified the RECURSIVEMATCH selection option. Servers SHOULD suppress redundant CHILDINFO responses (i.e., SHOULD only return it when at least one matching child is not also being returned directly).
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - email
