document: rfc-3767
kind: wire-format
summary: All SACRED messages are encoded as XML using the namespace 'urn:sacred-2002-12-19'. The SacredPKCS15 element carries the credential as a base64Binary value inside a ds:KeyInfo structure. The CredentialType includes CredentialSelector (string), LastModified (dateTime), and optional Payload, TimeToLive, ProcessInfo, and ClientInfo fields.
section: Appendix A
