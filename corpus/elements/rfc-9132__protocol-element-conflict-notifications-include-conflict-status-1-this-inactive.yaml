document: rfc-9132
kind: protocol-element
summary: Conflict notifications include 'conflict-status' (1=this inactive, another active; 2=this active; 3=all inactive), 'conflict-cause' (1=overlapping targets; 2=conflicts with accept-list; 3=CUID collision), 'conflict-scope' identifying overlapping resources, and 'retry-timer' indicating when the client may reissue the request.
section: 4.4.1.3
topics:
    - security
