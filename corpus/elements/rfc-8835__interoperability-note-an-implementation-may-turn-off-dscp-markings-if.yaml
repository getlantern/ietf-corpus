document: rfc-8835
kind: interoperability-note
summary: An implementation MAY turn off DSCP markings if it detects symptoms of unexpected behavior such as priority inversion or blocking of packets with certain DSCP values; one detection strategy is to send initial ICE probes with DSCP 0 and then probe each intended DSCP after candidate pair selection.
