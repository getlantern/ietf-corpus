document: rfc-3404
kind: design-rationale
summary: URI and URN resolution are specified as two separate but technically identical DDDS Applications to allow URN resolution to proceed without dependency on the adoption of generic URI resolution, addressing concerns that URNs might suffer from lack of URI resolution adoption.
