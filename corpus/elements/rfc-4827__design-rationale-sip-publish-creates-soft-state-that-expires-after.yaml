document: rfc-4827
kind: design-rationale
summary: SIP PUBLISH creates soft state that expires after a negotiated lifetime, making it unsuitable for presence state that should persist without active devices. XCAP is chosen as a complementary mechanism for device-independent, permanent presence state manipulation.
