document: rfc-8159
kind: security-consideration
summary: The 64-bit L2TPv3 cookie provides protection against blind packet-spoofing attacks that could violate VPN traffic separation. However, it provides no protection against a sophisticated man-in-the-middle attacker who can sniff and correlate captured data. The cookie MUST NOT be regarded as a substitute for IPsec when operating over open or untrusted networks.
section: "8"
topics:
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
