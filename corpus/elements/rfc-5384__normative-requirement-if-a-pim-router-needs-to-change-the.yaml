document: rfc-5384
kind: normative-requirement
summary: If a PIM router needs to change the set of attributes for a given tree without changing the upstream neighbor, it MUST send a new Join for that tree specifying the new attribute set; if the new set is null, the type 0 Encoded-Source format MUST be used.
section: 3.3.4
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
