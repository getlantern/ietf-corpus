document: rfc-1237
kind: normative-requirement
summary: It is strongly recommended that addresses in the U.S. Internet be assigned hierarchically based on prefixes assigned to individual TRDs. For GOSIP addresses, AA identifiers should be assigned to all TRDs; single-homed leaf routing domains should receive an RD value from their TRD's address space.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
