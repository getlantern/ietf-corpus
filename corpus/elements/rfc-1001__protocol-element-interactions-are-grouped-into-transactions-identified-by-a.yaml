document: rfc-1001
kind: protocol-element
summary: Interactions are grouped into transactions identified by a 16-bit transaction ID chosen by the originator and echoed in all request/response pairs. Responses must be matched by both transaction ID and source IP address; unmatched or stale responses must be discarded.
section: 13.2.1
