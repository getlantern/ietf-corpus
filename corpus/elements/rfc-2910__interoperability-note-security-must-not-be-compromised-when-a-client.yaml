document: rfc-2910
kind: interoperability-note
summary: Security MUST NOT be compromised when a client supplies an 'http' or other non-secure URL scheme in the target printer-uri and job-uri operation attributes. The client's choice of URL scheme in the request must not cause the server to relax security enforcement.
section: "9.2"
topics:
    - security
