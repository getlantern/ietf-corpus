document: rfc-5797
kind: design-rationale
summary: Placeholder 'pseudo FEAT codes' (listed in lowercase) are introduced for commands predating RFC 2389 and others lacking a formal FEAT keyword. These reserve reasonable feature names for future standardization and are not intended to appear in FEAT responses. Real FEAT keywords are listed in uppercase; IANA enforces uniqueness case-insensitively.
section: "2.2"
topics:
