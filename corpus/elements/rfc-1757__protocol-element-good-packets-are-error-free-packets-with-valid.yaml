document: rfc-1757
kind: protocol-element
summary: Good packets are error-free packets with valid frame length (64 to 1518 octets inclusive on Ethernet, per IEEE 802.3 section 3.2). Bad packets have valid preamble and SFD but contain a bad CRC or have invalid length (shorter than 64 or longer than 1518 octets).
