document: rfc-6381
kind: wire-format
summary: For ISO Base Media File Format and QuickTime, the first element of a 'codecs' value is a four-character sample description entry code registered at MP4RA (case sensitive). For 'mp4a' (MPEG-4 audio), the second element is the two-hex-digit OTI, and for OTI 40 (MPEG-4 audio) the third element is the decimal audio ObjectTypeIndication—e.g., 'mp4a.40.2' for AAC-LC.
section: "3.3"
topics:
