document: rfc-2272
kind: design-rationale
summary: msgID values should be generated using the low-order bits of snmpEngineBoots as the high-order portion combined with a monotonically increasing integer for the low-order portion, providing replay protection without requiring unpredictable values—non-repetition is sufficient.
section: "6.2"
topics:
    - snmp
    - security
