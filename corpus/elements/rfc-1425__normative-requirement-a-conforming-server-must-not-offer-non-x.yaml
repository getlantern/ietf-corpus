document: rfc-1425
kind: normative-requirement
summary: A conforming server MUST NOT offer non-'X'-prefixed EHLO keyword values that are not described in a registered IANA extension. Any keyword not beginning with 'X' must correspond to a registered SMTP service extension.
section: "4.1"
rfc2119_level: MUST NOT
topics:
