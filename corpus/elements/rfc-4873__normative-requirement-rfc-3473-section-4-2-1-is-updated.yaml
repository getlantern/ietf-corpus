document: rfc-4873
kind: normative-requirement
summary: 'RFC 3473 Section 4.2.1 is updated: subsequent NOTIFY_REQUEST objects MUST be propagated in the order received (replacing the old rule that they MAY be ignored and SHOULD NOT be propagated). A locally added NOTIFY_REQUEST object MUST be listed first; received objects follow in reception order.'
section: 4.3.1
rfc2119_level: MUST
topics:
