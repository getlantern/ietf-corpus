document: rfc-8005
kind: security-consideration
summary: An attacker able to tamper with an insecure HIP RR (e.g., via DNS spoofing) can mount man-in-the-middle attacks on the cryptographic core of the HIP exchange by substituting the Responder's HI, and can redirect I1 packets to an attacker-controlled IP by altering the RVS field.
section: "8.1"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
