document: rfc-5280
kind: normative-requirement
summary: Conforming implementations generating new certificates with electronic mail addresses MUST use rfc822Name in the subjectAltName extension. Simultaneous inclusion of an emailAddress attribute in the subject DN to support legacy implementations is deprecated but permitted.
section: 4.1.2.6
rfc2119_level: MUST
topics:
