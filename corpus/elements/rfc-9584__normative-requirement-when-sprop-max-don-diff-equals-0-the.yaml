document: rfc-9584
kind: normative-requirement
summary: When sprop-max-don-diff equals 0, the transmission order of NAL units MUST be identical to NAL unit decoding order. When sprop-max-don-diff is greater than 0, transmission order MAY differ from decoding order.
section: "5"
rfc2119_level: MUST
topics:
