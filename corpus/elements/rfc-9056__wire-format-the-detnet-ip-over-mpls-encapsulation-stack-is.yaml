document: rfc-9056
kind: wire-format
summary: 'The DetNet IP over MPLS encapsulation stack is: IP flow (NProto + IP) as App-flow, followed by the DetNet Control Word (d-CW), followed by MPLS Labels, followed by the link/sub-network layer (L2, TSN, or UDP/IP/L2). The d-CW is mandatory for all MPLS encapsulation of DetNet flows.'
section: "4.2"
topics:
    - mpls
    - routing
