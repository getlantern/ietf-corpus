document: rfc-2745
kind: protocol-element
summary: The optional TUNNEL object is inserted into DIAG_RESPONSE when a DREQ arrives at an RSVP node acting as a tunnel exit point. It provides the mapping between the end-to-end RSVP session and the tunnel RSVP session, enabling a client to issue a separate diagnostic query for the tunnel segment.
section: "3.7"
topics:
