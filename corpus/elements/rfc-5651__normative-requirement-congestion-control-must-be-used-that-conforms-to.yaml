document: rfc-5651
kind: normative-requirement
summary: Congestion control MUST be used that conforms to RFC 2357 between receivers and the sender for each LCT session. The total flow of packets to each receiver MUST NOT compete unfairly with existing flow-adaptive protocols such as TCP.
section: "3"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
