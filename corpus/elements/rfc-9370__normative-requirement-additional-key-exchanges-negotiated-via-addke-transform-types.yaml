document: rfc-9370
kind: normative-requirement
summary: Additional key exchanges negotiated via ADDKE Transform Types MUST take place in a series of IKE_INTERMEDIATE exchanges in order of the Transform Type values, so that the key exchange negotiated using Additional Key Exchange i always precedes Additional Key Exchange i+1. Each MUST be fully completed before the next one is started.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
