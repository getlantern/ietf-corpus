document: rfc-5048
kind: normative-requirement
summary: 'All iSCSI implementations MUST support the clarified multi-task abort semantics: the target MUST wait for responses on valid TTTs of affected tasks, MUST wait for all affected commands per CmdSN ordering, and MUST provide Response Fence behavior for the TMF Response on issuing and third-party sessions.'
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
