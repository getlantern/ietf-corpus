document: rfc-7349
kind: wire-format
summary: The Cryptographic Authentication TLV (type 0x0405) contains a 32-bit Security Association ID, a 64-bit Cryptographic Sequence Number (split into high and low 32-bit halves), and a variable-length Authentication Data field whose size depends on the algorithm (20 bytes for HMAC-SHA-1, 32 for HMAC-SHA-256, 48 for HMAC-SHA-384, 64 for HMAC-SHA-512).
