document: rfc-6474
kind: protocol-element
summary: The DEATHDATE property specifies the date of death of the object the vCard represents. The default value type is date-and-or-time, which can be reset to text. Cardinality is *1; supported parameters are VALUE, CALSCALE, and LANGUAGE.
section: "2.3"
extracted_by: claude-sonnet-4-6
