summary: des3-cbc-hmac-sha1-kd (etype 16) with hmac-sha1-des3-kd (checksum type 12) uses Triple-DES Outer-CBC mode and HMAC-SHA1 with key derivation per the simplified profile. Key is 24 bytes (three 8-byte DES subkeys), seed length 21 bytes, HMAC output 160 bits, message block size 8 bytes, confounder 8 random octets.
