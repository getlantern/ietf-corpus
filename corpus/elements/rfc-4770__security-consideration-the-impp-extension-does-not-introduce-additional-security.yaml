document: rfc-4770
kind: security-consideration
summary: The IMPP extension does not introduce additional security issues beyond the existing vCard specification. However, presence information is often considered more sensitive than other address information, and systems storing or transferring vCards should carefully consider the privacy implications.
section: "5"
