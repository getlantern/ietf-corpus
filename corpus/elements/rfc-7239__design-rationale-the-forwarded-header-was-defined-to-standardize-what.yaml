document: rfc-7239
kind: design-rationale
summary: The "Forwarded" header was defined to standardize what X-Forwarded-For, X-Forwarded-By, and X-Forwarded-Proto do informally, providing interoperability and—crucially—combining all information in a single field so that data items can be correlated and attributed to the correct hop. The X-Forwarded-* class cannot provide such correlation guarantees.
section: "1"
topics:
