document: rfc-9836
kind: interoperability-note
summary: A 'site-network-access' in RFC 8299 (L3SM) maps to an AC with both Layer 2 and Layer 3 properties per RFC 9834; a 'site-network-access' in RFC 8466 (L2SM) maps to an AC with Layer 2 properties. Similarly, 'vpn-network-access' defined in RFC 9182 and RFC 9291 maps to an AC per RFC 9834 or RFC 9835.
