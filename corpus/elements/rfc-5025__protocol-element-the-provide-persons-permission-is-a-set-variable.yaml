document: rfc-5025
kind: protocol-element
summary: The <provide-persons> permission is a set variable controlling watcher visibility into <person> elements. Set members identify person occurrences by <class> or <occurrence-id>. The special value <all-persons> grants access to all person occurrences.
section: 3.3.1.2
topics:
    - sip
    - privacy
