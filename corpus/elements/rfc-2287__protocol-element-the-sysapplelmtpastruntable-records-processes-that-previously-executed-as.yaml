document: rfc-2287
kind: protocol-element
summary: The sysApplElmtPastRunTable records processes that previously executed as part of an identified application; processes that cannot be associated with any installed application are silently discarded when they terminate and are not moved here. Aged out by sysApplElemPastRunMaxRows (default 500) and sysApplElemPastRunTblTimeLimit (default 7200 seconds).
section: 5.2.2
