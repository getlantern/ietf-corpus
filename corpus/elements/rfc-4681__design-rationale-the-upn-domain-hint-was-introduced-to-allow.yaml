document: rfc-4681
kind: design-rationale
summary: The UPN domain hint was introduced to allow a single certificate to be mapped to one or more user accounts without requiring a proprietary UPN in the certificate, addressing drawbacks of Microsoft's legacy approach that required UPN presence in the client certificate.
