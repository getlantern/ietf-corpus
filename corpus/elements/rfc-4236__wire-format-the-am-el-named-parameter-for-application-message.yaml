document: rfc-4236
kind: wire-format
summary: The AM-EL named parameter for Application Message Start (AMS) messages carries the entity length (size) of the request-body (request profile) or response-body (response profile) before transfer codings are applied. An OCP agent SHOULD announce this when known; MUST NOT send it when unknown.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - http
