document: rfc-8688
kind: normative-requirement
summary: If there is a Call-Info header field in a 608 response, it MUST have the 'purpose' parameter set to 'jwscard', and its value MUST refer to a valid JSON Web Signature (JWS) encoding of a jCard object.
