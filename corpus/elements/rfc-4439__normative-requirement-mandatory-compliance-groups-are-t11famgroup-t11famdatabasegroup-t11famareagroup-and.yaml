document: rfc-4439
kind: normative-requirement
summary: Mandatory compliance groups are t11FamGroup, t11FamDatabaseGroup, t11FamAreaGroup, and t11FamNotificationGroup. t11FamCacheGroup is mandatory only for switches supporting Preferred Domain_ID. t11FamCommandGroup is optional. All read-write objects have a minimum required compliance of read-only.
