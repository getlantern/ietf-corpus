document: rfc-5670
kind: normative-requirement
summary: A PCN-node MUST classify a packet as a competing-non-PCN-packet if it is not a PCN-packet and competes with PCN-packets for forwarding bandwidth on a link. Competing-non-PCN-packets MUST NOT be PCN-marked.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - diffserv
    - ecn
    - qos
