document: rfc-9085
kind: interoperability-note
summary: The L2 Bundle Member Attributes TLV is derived from IS-IS (RFC 8668) only; equivalent functionality has not yet been specified for OSPF. Implementations carrying OSPF-sourced Link NLRIs cannot use this TLV.
