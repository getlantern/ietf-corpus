document: rfc-3107
kind: design-rationale
summary: Label mapping information is piggybacked in the same BGP Update message used to distribute the route itself, eliminating the need for a separate label distribution protocol between adjacent BGP/LSR peers and allowing Route Reflectors to distribute labels alongside routes, significantly improving scalability.
section: "2"
topics:
