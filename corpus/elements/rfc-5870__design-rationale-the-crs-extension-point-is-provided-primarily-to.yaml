document: rfc-5870
kind: design-rationale
summary: The 'crs' extension point is provided primarily to accommodate a future scenario where another CRS replaces WGS-84 as the predominant system, not to support arbitrary use of thousands of CRSes — which would harm interoperability. Use of alternate CRSes is explicitly discouraged in comparison-heavy use cases.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
