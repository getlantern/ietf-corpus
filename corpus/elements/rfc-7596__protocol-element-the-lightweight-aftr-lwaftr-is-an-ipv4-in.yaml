document: rfc-7596
kind: protocol-element
summary: The Lightweight AFTR (lwAFTR) is an IPv4-in-IPv6 tunnel endpoint that maintains per-subscriber address binding only and does not perform NAPT44. It uses its binding table for both ingress filtering of outbound packets and encapsulation of inbound IPv4 packets destined to the correct lwB4.
section: "3"
topics:
