document: rfc-4120
kind: normative-requirement
summary: Implementations of Kerberos MUST NOT use insecure DNS queries to canonicalize the hostname components of service principal names. Applications SHOULD provide security mechanisms with names folded to lowercase without other modifications.
section: "1.3"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
