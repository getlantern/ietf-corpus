document: rfc-4227
kind: protocol-element
summary: When the soap.beep URL authority contains a domain name with no port, the DNS SRV record algorithm is used with service 'soap-beep' and protocol 'tcp'; if no SRV RRs are found, the IANA-assigned well-known port is used.
section: 6.1.1
topics:
    - dns
