document: rfc-3034
kind: security-consideration
summary: Label distribution can be secured by applying authentication or encryption to the underlying protocol carrying label information (i.e., LDP). MPLS encapsulation itself has no effect on authenticated or encrypted network layer packets — such IP packets pass through unchanged.
section: "8"
topics:
