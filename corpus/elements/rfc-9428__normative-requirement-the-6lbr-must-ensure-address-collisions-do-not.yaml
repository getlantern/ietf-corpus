document: rfc-9428
kind: normative-requirement
summary: The 6LBR MUST ensure address collisions do not occur when multiple 6LNs are connected in a star topology, since 6LNs register their addresses with the 6LBR and the 6LBR checks for IPv6 address duplicates.
