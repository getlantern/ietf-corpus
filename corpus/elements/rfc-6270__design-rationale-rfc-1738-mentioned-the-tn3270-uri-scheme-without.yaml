document: rfc-6270
kind: design-rationale
summary: RFC 1738 mentioned the 'tn3270' URI scheme without defining its syntax or semantics. Without a formal specification, there was risk of incompatible or undocumented implementations arising from the IANA provisional registration alone; RFC 6270 was written to eliminate that ambiguity.
section: "1"
topics:
