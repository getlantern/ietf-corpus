document: rfc-7940
kind: normative-requirement
summary: A document MUST contain exactly one 'lgr' element. Each 'lgr' element MUST contain zero or one 'meta' element, exactly one 'data' element, and zero or one 'rules' element; these three elements MUST appear in that order.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
