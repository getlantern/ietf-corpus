document: rfc-5796
kind: normative-requirement
summary: Implementations SHOULD support confidentiality for PIM-SM. If confidentiality is supported, AES-CBC with a 128-bit key MUST be supported, and ESP MUST be used. An implementation MUST NOT generate the combination of NON-NULL Encryption and NULL Authentication.
section: "5"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
