document: rfc-1885
kind: normative-requirement
summary: 'An ICMPv6 error message MUST NOT be sent in response to: another ICMPv6 error message; a packet destined to an IPv6 multicast address (with two exceptions: Packet Too Big and Parameter Problem Code 2); a link-layer multicast or broadcast packet; or a packet whose source address does not uniquely identify a single node (e.g., unspecified address, multicast address, anycast address).'
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
