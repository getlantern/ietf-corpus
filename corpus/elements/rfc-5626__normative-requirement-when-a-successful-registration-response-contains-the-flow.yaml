document: rfc-5626
kind: normative-requirement
summary: When a successful registration response contains the Flow-Timer header field, the UA MUST send keep-alives at least as often as the number of seconds indicated. If using the server-recommended frequency, the UA SHOULD send keep-alives with interval randomly distributed between 80% and 100% of the server-provided time.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
