document: rfc-3046
kind: design-rationale
summary: The circuit access model deliberately avoids allocating an IP address to the modem or a dedicated Logical IP Subnet (LIS) per user-side LAN, since doing so would require a full IP router at the user site and is inappropriate for large public-access networks.
section: "1.1"
extracted_by: claude-sonnet-4-6
