document: rfc-1755
kind: normative-requirement
summary: A SETUP message establishing an ATM connection for IP and multiprotocol interconnection MUST contain AAL Parameters, ATM Traffic Descriptor, Broadband Bearer Capability, Broadband Low Layer Information, QoS Parameter, Called Party Number, and Calling Party Number IEs. Although AAL Parameters and B-LLI are optional in UNI 3.1, they MUST be included for IP over ATM.
section: "5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
