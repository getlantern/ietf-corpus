document: rfc-2091
kind: normative-requirement
summary: A limit SHOULD be placed on retransmission attempts; if no response is received after a configurable period (approximately 180 seconds), routes via the next hop are marked unreachable, the hold-down timer is started, and unreachability is advertised on other interfaces.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - routing
