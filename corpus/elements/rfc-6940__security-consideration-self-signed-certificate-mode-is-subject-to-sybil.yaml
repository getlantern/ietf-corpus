document: rfc-6940
kind: security-consideration
summary: Self-signed certificate mode is subject to Sybil attacks and is safe only in closed, mutually trusting networks. Even in this mode, all security mechanisms (TLS/DTLS and message signatures) remain active; the only difference is that certificate verification does not chain to a single trusted root.
section: "13.4"
topics:
    - security
    - tls
