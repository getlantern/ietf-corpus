document: rfc-2060
kind: protocol-element
summary: The AUTHENTICATE command performs a BASE64-encoded challenge-response exchange for the specified authentication mechanism. If a protection mechanism is negotiated, subsequent data is framed with a 4-octet network-byte-order length field followed by ciphertext.
