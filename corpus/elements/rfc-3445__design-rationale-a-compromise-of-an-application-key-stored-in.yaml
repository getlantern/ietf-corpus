document: rfc-3445
kind: design-rationale
summary: A compromise of an application key stored in the KEY RR could allow an attacker to forge DNS data from the affected zone and all sub-zones if resolvers do not carefully check the KEY sub-type. Separating application keys from DNSSEC keys eliminates this vulnerability entirely.
section: "2.1"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
