document: rfc-9421
kind: privacy-consideration
summary: HTTP Message Signatures provide integrity and authenticity but explicitly do not provide confidentiality. Signed messages remain readable by any party that intercepts them. Confidentiality must be provided independently by TLS or other encryption mechanisms.
section: "8.2"
topics:
    - http
    - privacy
    - security
