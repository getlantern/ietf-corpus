document: rfc-6753
kind: interoperability-note
summary: 'An ''http:'' (non-TLS) location URI provides insufficient security in most deployments: the Rule Maker loses control over who receives location information, and the Location Recipient has no assurance of information integrity. Use is conditionally permitted only when another protection mechanism is in place.'
section: "3"
topics:
    - http
    - tls
    - security
