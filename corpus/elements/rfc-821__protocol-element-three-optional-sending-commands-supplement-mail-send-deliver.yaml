document: rfc-821
kind: protocol-element
summary: 'Three optional sending commands supplement MAIL: SEND (deliver to terminal only), SOML (Send Or Mail — deliver to terminal if active, else mailbox), and SAML (Send And Mail — deliver to both terminal and mailbox). These are not required in the minimum implementation.'
