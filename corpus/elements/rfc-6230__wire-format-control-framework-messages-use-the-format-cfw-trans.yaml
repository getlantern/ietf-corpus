document: rfc-6230
kind: wire-format
summary: 'Control Framework messages use the format: ''CFW <trans-id> <method|status-code> CRLF *headers CRLF [body]''. The ''pCFW'' token is the literal ASCII string ''CFW''. The transaction identifier is an alpha-num-token of 4–32 characters. Headers are line-delimited and case-insensitive. The Content-Length header represents body size as a decimal octet count.'
section: "9.1"
topics:
