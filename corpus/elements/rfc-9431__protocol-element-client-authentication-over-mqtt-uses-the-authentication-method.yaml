document: rfc-9431
kind: protocol-element
summary: Client authentication over MQTT uses the Authentication Method property set to the string "ace" (property identifier 0x15) and Authentication Data (property identifier 0x16) carrying the token and PoP material. The Broker MUST support both TLS-exporter-based PoP and Broker-generated challenge/response.
section: 2.2.4.2
topics:
    - http
    - tls
    - oauth
    - security
