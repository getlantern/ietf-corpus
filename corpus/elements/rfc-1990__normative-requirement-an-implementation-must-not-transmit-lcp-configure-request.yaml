document: rfc-1990
kind: normative-requirement
summary: An implementation MUST NOT transmit LCP Configure-Request, -Reject, -Ack, -Nak, Terminate-Request, or -Ack packets via the multilink procedure, and MUST silently discard any such packets received over the bundle.
section: "2"
rfc2119_level: MUST NOT
