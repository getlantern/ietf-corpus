document: rfc-9258
kind: normative-requirement
summary: ImportedIdentity.context MUST include the context used to determine the EPSK, if any exists (e.g., peer role information to mitigate Selfie-style reflection attacks). If the EPSK is derived from an external protocol, ImportedIdentity.context MUST include a channel binding for those deriving protocols per RFC 5056.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
