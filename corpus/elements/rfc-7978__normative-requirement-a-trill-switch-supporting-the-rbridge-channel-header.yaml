document: rfc-7978
kind: normative-requirement
summary: A TRILL switch supporting the RBridge Channel Header Extension MUST support PType 2 (Ethertyped Payload) with the RBridge-Channel Ethertype (0x8946) as the leading Ethertype of the payload (i.e., an encapsulated nested RBridge Channel message).
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
