document: rfc-4601
kind: interoperability-note
summary: RFC 4601 is designed to be interoperable with RFC 2362 (Experimental PIM-SM). The specification diverges from RFC 2362 behavior only where that behavior was clearly incorrect. Routers implemented to RFC 4601 should successfully interoperate with routers implemented to RFC 2362.
section: "1"
topics:
    - multicast
    - routing
