document: rfc-9103
kind: interoperability-note
summary: After a failed IXFR over XoT, an IXoT client SHOULD request the AXFR on the already open XoT connection rather than opening a new connection. Fallback to AXFR occurs when the primary cannot provide IXFR for the requested SOA serial.
section: 7.10.2
topics:
    - dns
    - tls
