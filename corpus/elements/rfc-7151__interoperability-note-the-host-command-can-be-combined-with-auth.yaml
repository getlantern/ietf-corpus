document: rfc-7151
kind: interoperability-note
summary: The HOST command can be combined with AUTH/ADAT (RFC 2228, RFC 4217) and ACCT commands. When TLS is not used, HOST precedes AUTH; when TLS SNI is used, HOST may follow the AUTH TLS exchange but the server must verify the names match.
section: 3.2.2
topics:
    - security
    - tls
