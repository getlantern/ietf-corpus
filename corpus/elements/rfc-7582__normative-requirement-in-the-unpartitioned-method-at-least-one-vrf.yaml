document: rfc-7582
kind: normative-requirement
summary: In the Unpartitioned Method, at least one VRF of the MVPN MUST originate an Intra-AS I-PMSI A-D route with a PTA specifying a bidirectional P-tunnel, and the disposition of a received packet MUST NOT depend upon the particular P-tunnel over which it was received.
section: 3.2.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
