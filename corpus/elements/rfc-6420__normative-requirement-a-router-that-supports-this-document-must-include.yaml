document: rfc-6420
kind: normative-requirement
summary: A router that supports this document MUST include the PIM MT-ID Hello Option in its PIM Hello packets and MUST include both the Join Attribute Option (RFC 5384) and the PIM MT-ID Option.
section: "4.1"
rfc2119_level: MUST
topics:
