document: rfc-2327
kind: wire-format
summary: The media field 'm=<media> <port> <transport> <fmt-list>' specifies media type ('audio', 'video', 'application', 'data', 'control'), transport port (1024-65535 for UDP; even for RTP compliance), transport protocol ('RTP/AVP', 'udp'), and one or more format tokens. Multiple ports for layered streams use 'm=<media> <port>/<num-ports> <transport> <fmt-list>'.
section: "6"
topics:
