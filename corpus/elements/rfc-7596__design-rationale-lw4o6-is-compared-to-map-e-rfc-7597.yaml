document: rfc-7596
kind: design-rationale
summary: 'lw4o6 is compared to MAP-E (RFC 7597): both provide complete independence between IPv6 subnet prefixes and IPv4 addresses. MAP-E introduces an algorithmic IPv6-to-IPv4 address relationship enabling direct meshed connectivity, while lw4o6 maintains per-subscriber binding state centrally and uses hub-and-spoke forwarding.'
