document: rfc-2073
kind: protocol-element
summary: 'The Registry ID is a 5-bit field immediately following the Format Prefix, identifying the Regional Registry responsible for address allocation. Values are assigned to IANA (Multi-Regional: 10000), RIPE NCC (01000), INTERNIC (11000), and APNIC (00100); all other values are reserved by IANA.'
section: "3.2"
topics:
