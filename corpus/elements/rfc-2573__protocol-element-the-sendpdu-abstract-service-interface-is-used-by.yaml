document: rfc-2573
kind: protocol-element
summary: The sendPdu abstract service interface is used by command generators and notification originators to dispatch PDUs. Parameters include transportDomain, transportAddress, messageProcessingModel, securityModel, securityName, securityLevel, contextEngineID, contextName, pduVersion, PDU, and expectResponse. On success it returns a sendPduHandle used to correlate subsequent responses.
section: "3.1"
topics:
    - snmp
