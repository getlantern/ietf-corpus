document: rfc-2238
kind: protocol-element
summary: hprRtpStatusTable (hprRtp 3) records historical information for each completed RTP path switch attempt, indexed by (hprRtpStatusLocNceId, hprRtpStatusLocTcid, hprRtpStatusIndex). Each entry includes start/end timestamps, old and new RSCVs, cause, and last-attempt result.
