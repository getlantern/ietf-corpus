document: rfc-9050
kind: normative-requirement
summary: PCECC LSPs MUST be delegated to a PCE at all times. For PCC-initiated PCECC LSPs, a PCC MUST delegate the LSP by sending a PCRpt with the PST set to '2' and D (Delegate) flag set.
section: 5.5.2
rfc2119_level: MUST
