document: rfc-5023
kind: normative-requirement
summary: If a POST creation response contains a Content-Location header that matches the Location header character-for-character, the client is authorized to treat the response entity as a complete representation of the new Entry. Without a matching Content-Location header, the client MUST NOT assume the returned entity is complete.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
