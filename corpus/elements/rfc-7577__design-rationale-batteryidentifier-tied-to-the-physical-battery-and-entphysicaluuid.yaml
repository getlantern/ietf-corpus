document: rfc-7577
kind: design-rationale
summary: batteryIdentifier (tied to the physical battery) and entPhysicalUUID (tied to the battery slot) serve distinct purposes. This separation allows the management system to trace a battery across devices and maintain monitoring continuity when a replaceable battery is moved, while entPhysicalUUID remains stable for the slot.
section: "3.3"
