document: rfc-3017
kind: protocol-element
summary: 'The media element is a container for media types and related protocols supported by a POP. Defined media types are: viaMODEM, viaISDN, viaATM, viaFR, and viaX25. At least one media element is required per pop. Additional types may be registered by IANA.'
section: 6.1.2
topics:
    - registry
