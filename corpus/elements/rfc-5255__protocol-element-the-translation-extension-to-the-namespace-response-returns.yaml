document: rfc-5255
kind: protocol-element
summary: The TRANSLATION extension to the NAMESPACE response returns a single modified UTF-7 encoded string containing the localized translation of a namespace prefix. The client is responsible for converting between the prefix and its translation when presenting mailbox names.
