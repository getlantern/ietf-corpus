document: rfc-8655
kind: normative-requirement
summary: Starvation of non-DetNet traffic must be avoided, for example by traffic policing and shaping functions. The net effect of DetNet flows on non-DetNet flows is primarily a reduction in available bandwidth, not complete exclusion.
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
    - qos
    - congestion
