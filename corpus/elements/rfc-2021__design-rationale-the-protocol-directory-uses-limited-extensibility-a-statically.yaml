summary: 'The protocol directory uses ''limited extensibility'': a statically compiled probe that understands where a protocol''s demultiplexing field is can be extended via SNMP to recognize new child identifiers (e.g., a new UDP port number) but cannot acquire entirely new protocol parsers at runtime.'
