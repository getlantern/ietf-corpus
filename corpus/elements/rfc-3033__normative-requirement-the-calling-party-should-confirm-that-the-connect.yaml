document: rfc-3033
kind: normative-requirement
summary: The calling party should confirm that the CONNECT or ADD PARTY ACK response contains a User-user information element. The called party may not respond with the same user information received from the calling party.
section: 4.2.1
rfc2119_level: SHOULD
