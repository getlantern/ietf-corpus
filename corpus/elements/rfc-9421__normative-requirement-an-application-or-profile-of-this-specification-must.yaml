document: rfc-9421
kind: normative-requirement
summary: 'An application or profile of this specification MUST specify at a minimum: required covered component identifiers and signature parameters, expected Structured Field types for covered components, means of retrieving key material, allowable signature algorithms, means of verifying algorithm-key appropriateness, means of determining message component context, and error codes returned on verification failure.'
section: "1.4"
rfc2119_level: MUST
topics:
    - http
    - security
