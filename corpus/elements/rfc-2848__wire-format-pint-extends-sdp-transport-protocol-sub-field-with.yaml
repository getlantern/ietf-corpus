document: rfc-2848
kind: wire-format
summary: 'PINT extends SDP transport protocol sub-field with three values for use with TN address type: ''voice'' (GSTN voice call), ''fax'' (GSTN fax transmission), and ''pager'' (pager message). The Fmt sub-field lists MIME sub-types; ''-'' means default/unspecified.'
