document: rfc-8587
kind: protocol-element
summary: Trunking detection refers to confirming that two independently acquired network addresses are connected to the same NFSv4 server instance. In NFSv4.0 this requires the client to support the uniform client ID string (UCS) approach described in RFC 7931 Section 5.6.
section: 5.2.2
