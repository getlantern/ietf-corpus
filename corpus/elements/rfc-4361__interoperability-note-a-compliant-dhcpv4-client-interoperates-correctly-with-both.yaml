document: rfc-4361
kind: interoperability-note
summary: A compliant DHCPv4 client interoperates correctly with both compliant and non-compliant servers. A non-compliant client interoperates correctly with a compliant server. Functionality is not lost if either side is non-compliant, but the node-identity goals are not met.
