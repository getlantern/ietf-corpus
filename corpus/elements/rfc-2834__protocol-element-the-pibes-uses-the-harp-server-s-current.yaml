document: rfc-2834
kind: protocol-element
summary: The PIBES uses the HARP server's current table as its target list. It SHALL validate that all incoming messages have source addresses in the target list and that messages are addressed to the IP LIS broadcast address, multicast address, or 255.255.255.255. Invalid messages MUST be dropped; valid messages are forwarded to all addresses in the target list.
section: "7.1"
topics:
    - ip
    - multicast
