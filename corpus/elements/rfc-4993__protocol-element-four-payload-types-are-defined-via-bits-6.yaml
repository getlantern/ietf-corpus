document: rfc-4993
kind: protocol-element
summary: 'Four payload types are defined via bits 6–7 of the header: 00 = XML payload (''xml''), 01 = version info (''vi''), 10 = size info (''si''), 11 = other info (''oi''). Types ''si'' and ''oi'' are descriptor errors when present in request packets.'
section: 3.1.4
