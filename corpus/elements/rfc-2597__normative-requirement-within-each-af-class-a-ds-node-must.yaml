document: rfc-2597
kind: normative-requirement
summary: Within each AF class, a DS node MUST accept all three drop precedence codepoints and they MUST yield at least two different levels of loss probability. Three different levels SHOULD be supported in DS domains where congestion is common.
section: "2"
rfc2119_level: MUST
