document: rfc-7753
kind: normative-requirement
summary: In a request, the First Internal Port field MUST be set equal to the Internal Port field in the MAP Opcode header. In a response it indicates the first port of the mapped internal port set, which may differ from the requested value.
section: "4"
rfc2119_level: MUST
topics:
