document: rfc-4827
kind: design-rationale
summary: Multiple XCAP clients (on different physical devices) may manipulate the same presence document on the XCAP server, but this still produces only one input to the event state compositor, distinguishing XCAP-based manipulation from per-PUA SIP PUBLISH soft state.
