document: rfc-9796
kind: protocol-element
summary: The "jcard" Call-Info 'purpose' token indicates that the URI in the Call-Info header field points to a jCard JSON object (RFC 7095) representing the calling party's Rich Call Data. It is distinct from the existing "card" token and is specific to the jCard profile defined for RCD use in SIP.
