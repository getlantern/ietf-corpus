document: rfc-9059
kind: normative-requirement
summary: For co-routed LSPs, the Bidirectional LSP Association Group TLV MUST be present and the C flag set for both forward and reverse LSPs. For reverse LSPs, the TLV MUST be present and the R flag set. For forward LSPs within the TLV, the R flag MUST be reset.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
