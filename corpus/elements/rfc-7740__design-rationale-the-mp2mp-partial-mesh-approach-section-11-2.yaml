document: rfc-7740
kind: design-rationale
summary: The MP2MP partial-mesh approach (Section 11.2.3 of RFC 6513) guarantees that a PE discards bidirectional C-flow traffic from PEs not in the same partition without needing an extra PE Distinguisher Label, by having all PEs in a partition join a single dedicated MP2MP tunnel.
section: "1"
topics:
