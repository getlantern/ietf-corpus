document: rfc-5989
kind: normative-requirement
summary: The monitor-group URI MUST correspond to an RLS service that supports subscriptions to request-contained resource lists as defined in RFC 5367. The HTTP server MUST also return a 'monitor' link relation whenever it returns a 'monitor-group' link relation.
section: "3.2"
rfc2119_level: MUST
topics:
