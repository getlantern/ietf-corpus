document: rfc-4759
kind: security-consideration
summary: If "enumdi" is illegally inserted into the "tel" URI in transit, the call may be routed to the PSTN incurring unexpected charges or causing downstream rejection. Recipients outside a trust boundary may ignore the parameter and perform their own ENUM query to mitigate this attack.
section: "6"
topics:
    - security
    - voip
    - dns
