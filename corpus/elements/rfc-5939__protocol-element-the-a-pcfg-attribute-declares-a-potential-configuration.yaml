document: rfc-5939
kind: protocol-element
summary: The 'a=pcfg' attribute declares a potential configuration at the media level, identified by a unique config-number (lower numbers indicate higher preference). It references attribute and transport capabilities using a compact syntax supporting alternatives (separated by '|'), mandatory vs. optional attribute capabilities, and optional deletion of existing attributes ('-m', '-s', '-ms').
section: 3.5.1
topics:
