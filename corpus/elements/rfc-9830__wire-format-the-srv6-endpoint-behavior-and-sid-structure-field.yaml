document: rfc-9830
kind: wire-format
summary: 'The SRv6 Endpoint Behavior and SID Structure field (8 octets) encodes: 2-octet Endpoint Behavior code point (0xFFFF = Opaque), 2-octet Reserved, and four 1-octet length fields for Locator Block, Locator Node, Function, and Argument in bits. The sum of all four lengths MUST be ≤128.'
