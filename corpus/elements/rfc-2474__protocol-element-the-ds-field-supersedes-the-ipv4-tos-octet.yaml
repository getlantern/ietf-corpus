document: rfc-2474
kind: protocol-element
summary: The DS field supersedes the IPv4 TOS octet (RFC 791) and the IPv6 Traffic Class octet (RFC 2460). It is interpreted identically in both IP versions, carrying a 6-bit DSCP that maps to a per-hop behavior at each DS-compliant node.
