document: rfc-6733
kind: wire-format
summary: 'The Diameter header is 20 octets: Version (1 octet, MUST be 1), Message Length (3 octets, always a multiple of 4 including header and padded AVPs), Command Flags (1 octet), Command Code (3 octets), Application-ID (4 octets), Hop-by-Hop Identifier (4 octets, unsigned 32-bit), and End-to-End Identifier (4 octets, unsigned 32-bit). All fields are transmitted in network byte order.'
section: "3"
