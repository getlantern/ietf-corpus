document: rfc-5332
kind: protocol-element
summary: Ethertype 0x8847 is used for MPLS unicast ethernet frames and also for multicast ethernet frames carrying MPLS packets whose top label is downstream-assigned. Ethertype 0x8848 is used exclusively when a multicast ethernet frame carries an MPLS packet whose top label is upstream-assigned.
