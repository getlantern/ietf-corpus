document: rfc-3592
kind: normative-requirement
summary: ANSI T1.231 compliance requires that unavailable time begins at the onset of 10 contiguous SESs and an implementation MUST NOT increment any counters other than UAS during those 10 seconds — not even temporarily. Implementations may use a 10-second delay-line approach instead of retroactive counter adjustment.
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
