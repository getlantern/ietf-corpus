document: rfc-9018
kind: design-rationale
summary: The original RFC 7873 recommendation included the Client IP address as input to Client Cookie construction to prevent cross-link tracking. Multiple DNS vendors found this impractical because the Client Cookie is typically computed before the Client IP address is known, so the IP input requirement was removed and replaced with mandatory cookie invalidation on IP change.
section: "3"
topics:
    - dns
    - privacy
