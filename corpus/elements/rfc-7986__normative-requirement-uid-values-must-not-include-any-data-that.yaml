document: rfc-7986
kind: normative-requirement
summary: UID values MUST NOT include any data that might identify a user, host, domain, or any other security- or privacy-sensitive information. It is RECOMMENDED to generate UID values as hex-encoded random UUID values per RFC 4122 Sections 4.4 and 4.5.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
