document: rfc-8370
kind: design-rationale
summary: RI-RSVP eliminates RSVP's reliance on periodic refreshes and refresh timeouts by increasing the refresh interval to a large value (tens of minutes). This removes the dominant source of processing overhead in large-scale RSVP-TE deployments while preserving full functionality through complementary mechanisms.
