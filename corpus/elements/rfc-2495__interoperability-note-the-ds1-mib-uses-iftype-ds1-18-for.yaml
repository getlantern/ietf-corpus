document: rfc-2495
kind: interoperability-note
summary: The DS1 MIB uses ifType ds1(18) for DS1, E1, DS2, and E2 interfaces. The DS2 type is determined by examining ifSpeed or dsx1LineType rather than a separate ifType value. Interface types e1(19) and g703at2mb(67) are obsoleted by this MIB.
