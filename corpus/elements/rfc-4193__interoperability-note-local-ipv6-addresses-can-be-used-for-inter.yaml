document: rfc-4193
kind: interoperability-note
summary: Local IPv6 addresses can be used for inter-site VPNs with appropriate routes configured. Because the addresses are globally unique (with high probability), these VPNs work without address translation and remain stable through site renumbering or merging.
section: "4.7"
topics:
    - ip
    - v6ops
    - vpn
