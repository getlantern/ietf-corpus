document: rfc-4607
kind: normative-requirement
summary: A router that receives an IP datagram with a source-specific destination address MUST silently drop it unless a neighboring host or router has communicated a desire to receive packets from that specific source and destination.
section: "5.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
