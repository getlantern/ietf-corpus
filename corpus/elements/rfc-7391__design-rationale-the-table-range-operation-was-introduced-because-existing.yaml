document: rfc-7391
kind: design-rationale
summary: The table range operation was introduced because existing approaches to retrieve or delete a sizable number of sparse table rows were both programmatically tedious (requiring up to 10,000 individual requests or complex batching) and wire-inefficient. A single TABLERANGE-TLV replaces all of these approaches.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
