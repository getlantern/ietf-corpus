document: rfc-5629
kind: state-machine
summary: 'A user interface component has two lifecycle states: active (created when pushed to client, after dialog creation and application authorization) and terminated (when the associated dialog ends, or earlier via SUBSCRIBE with Expires=0 for presentation-free UI, or when the UA dismisses it). Termination of presentation-free UI by the UA sends NOTIFY with Subscription-State: terminated.'
section: 8.1.4
topics:
    - sip
    - realtime
