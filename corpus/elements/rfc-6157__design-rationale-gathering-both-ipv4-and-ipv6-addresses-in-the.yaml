document: rfc-6157
kind: design-rationale
summary: 'Gathering both IPv4 and IPv6 addresses in the initial ICE offer reduces session establishment time: because any answerer (IPv4-only or IPv6-only) will find at least one compatible address in the offer, no re-offer/re-answer due to address type mismatch is needed.'
section: "4.2"
topics:
    - sip
    - v6ops
    - nat
