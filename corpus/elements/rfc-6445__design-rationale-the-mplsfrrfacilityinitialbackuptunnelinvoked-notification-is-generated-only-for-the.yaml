document: rfc-6445
kind: design-rationale
summary: The mplsFrrFacilityInitialBackupTunnelInvoked notification is generated only for the first tunnel protected on an interface (not for each subsequent one) to prevent scaling issues with LSR performance and network notification load during a failure affecting many LSPs.
