document: rfc-5537
kind: interoperability-note
summary: The message/news MIME type is declared obsolete by this document; it was never widely implemented and commonly fell back to application/octet-stream handling. Implementations SHOULD use message/rfc822 in its place when transmitting news articles via mail for human reading.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
