document: rfc-9488
kind: wire-format
summary: The LSPA object Flags field is 8 bits wide. Bit 7 is the L (Local Protection Desired) flag from RFC 5440; bit 6 is the new E (Protection Enforcement) flag defined by this document. Remaining bits are reserved. The LSPA object also contains 32-bit Exclude-any, Include-any, and Include-all fields, plus 8-bit Setup Priority and Holding Priority fields.
section: "5"
