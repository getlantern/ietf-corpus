document: rfc-5244
kind: protocol-element
summary: Trunk unavailable event (event code 175) is an 'other'-type event with no volume; the duration field indicates the length of downtime, with a recommended granularity of 1 second. Used to synchronize trunk unavailability between gateways connected through provisioned RTP trunks.
