document: rfc-5452
kind: protocol-element
summary: The DNS ID field is 16 bits wide, providing at most 65536 distinct values. If full random use is made of all bits, an attacker requires on average 32768 attempts to guess; implementations using only 14 bits reduce this to around 8192 attempts on average.
section: "4.3"
topics:
    - dns
    - security
