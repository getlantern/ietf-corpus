document: rfc-2446
kind: normative-requirement
summary: In VFREEBUSY REQUEST and REPLY methods, all DateTime values for DTSTART and DTEND MUST be in UTC. In VFREEBUSY PUBLISH, DTSTART and DTEND likewise MUST be in UTC.
section: 3.3.1
rfc2119_level: MUST
