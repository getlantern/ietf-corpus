document: rfc-5627
kind: normative-requirement
summary: If a UA wishes its previously obtained temporary GRUUs to remain valid, it MUST utilize the same Call-ID in REGISTER refreshes; changing the Call-ID causes the registrar to invalidate all temporary GRUUs for that UA instance.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
