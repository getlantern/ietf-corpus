document: rfc-2141
kind: design-rationale
summary: Percent-encoding must not be decoded during lexical equivalence testing because `%`-encoded and literal characters may have different meanings within a given namespace (a namespace may assign special meaning to a literal character while using its percent-encoded form as a literal).
section: "5"
