document: rfc-1381
kind: interoperability-note
summary: MIB-II ifLastChange for a LAPB interface should reflect the last time the interface changed state; a reset is treated as an instantaneous transition to the NDM (disconnected) state and back to ABM or ABME, making it the last time lapbFlowChangeReason and lapbFlowStateChanges changed.
section: "4"
topics:
