document: rfc-5436
kind: normative-requirement
summary: The 'Subject:' field SHOULD use the ':message' tag value if present; if absent but a 'subject' URI header exists, that SHOULD be used; otherwise the subject SHOULD be retained from the triggering message. The ':message' tag value SHOULD NOT normally be truncated.
section: "2.7"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
