document: rfc-8598
kind: normative-requirement
summary: When an IKE SA is terminated, DNS forwarding MUST be unconfigured, including deleting forwarding rules, flushing cached data (including negative cache), removing DNSSEC trust anchors, and clearing the outstanding DNS request queue.
section: "5"
rfc2119_level: MUST
topics:
