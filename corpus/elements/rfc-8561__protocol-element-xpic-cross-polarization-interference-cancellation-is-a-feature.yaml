summary: XPIC (Cross Polarization Interference Cancellation) is a feature-gated capability. When enabled, xpic-pairs groups exactly two microwaveCarrierTermination interfaces; the actual cross-polar interference is reported as the read-only leaf actual-xpi (decimal64, 0.1 dB resolution, 0-99 dB).
