summary: 'The Signature Block is encoded as an SD ELEMENT with SD-ID ''ssign'', containing fields in fixed order: VER (4 octets), RSID (1-10 octets), SG (1 octet), SPRI (1-3 octets), GBC (1-10 octets), FMN (1-10 octets), CNT (1-2 octets), HB (variable, base64), SIGN (variable, base64). All binary values are base64 encoded per RFC 4648.'
