document: rfc-8860
kind: interoperability-note
summary: In SSRC-multiplexed retransmission mode (RFC 4588), when multiple original RTP streams are sent in one session, original and retransmission stream association must be done via heuristics or via distinct payload types using the 'apt' parameter.
