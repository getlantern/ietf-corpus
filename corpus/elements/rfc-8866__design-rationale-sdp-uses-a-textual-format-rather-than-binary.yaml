document: rfc-8866
kind: design-rationale
summary: SDP uses a textual format (rather than binary encodings such as ASN.1 or XDR) to enhance portability, enable a variety of transports, and allow flexible text-based toolkits. The encoding is deliberately compact because session descriptions may be size-constrained, and strict field ordering enables simple parsers and easy error detection.
