document: rfc-3486
kind: normative-requirement
summary: If a client sends a compressed request and the transaction times out without a response, the client SHOULD retry the same request without compression. If the request was sent over TCP, the client SHOULD close that connection and open a new one.
section: "7"
rfc2119_level: SHOULD
topics:
    - sip
    - tcp
