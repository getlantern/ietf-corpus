document: rfc-8512
kind: protocol-element
summary: 'Resource limits are structured in four configurable groups: port-quota (max ports per subscriber, optionally per-protocol), fragments-limit (uint32, max out-of-order fragments), mapping-limits (limit-subscribers, limit-address-mappings, limit-port-mappings, limit-per-protocol), and connection-limits (rate limits per-subscriber, per-instance, per-protocol). Packets exceeding any limit are dropped.'
section: "2.9"
topics:
