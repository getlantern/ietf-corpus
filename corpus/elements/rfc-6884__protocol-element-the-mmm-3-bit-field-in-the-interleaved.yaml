document: rfc-6884
kind: protocol-element
summary: The MMM 3-bit field in the interleaved/bundled format allows a communication node to indicate its preferred compression mode (Capacity Operating Point) to the opposite node, enabling a controlled trade-off between voice quality and channel capacity. A remote sender MAY ignore mode-set-recv requests but must not assume mode 0 support unless explicitly signaled.
section: "11"
topics:
