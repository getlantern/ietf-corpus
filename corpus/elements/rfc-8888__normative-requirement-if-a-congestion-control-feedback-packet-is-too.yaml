document: rfc-8888
kind: normative-requirement
summary: If a Congestion Control Feedback Packet is too large to fit within the path MTU, its sender SHOULD split it into multiple feedback packets. The RTCP reporting interval SHOULD be chosen so that feedback packets fit within the path MTU.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
    - realtime
