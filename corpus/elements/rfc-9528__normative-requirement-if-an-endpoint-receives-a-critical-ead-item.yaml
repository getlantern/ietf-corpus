document: rfc-9528
kind: normative-requirement
summary: If an endpoint receives a critical EAD item it does not recognize, or that it cannot process, it MUST send an EDHOC error message back and MUST abort the EDHOC session. Non-critical EAD items may be ignored.
section: "3.8"
rfc2119_level: MUST
topics:
    - security
    - cbor
