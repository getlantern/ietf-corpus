document: rfc-3513
kind: protocol-element
summary: 'The 4-bit multicast scope field limits group scope: 1=interface-local, 2=link-local, 4=admin-local (must be administratively configured), 5=site-local, 8=organization-local, E=global; values 0 and F are reserved, and 3/6/7/9-D are unassigned.'
