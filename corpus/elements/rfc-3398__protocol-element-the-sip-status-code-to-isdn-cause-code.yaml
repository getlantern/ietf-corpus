document: rfc-3398
kind: protocol-element
summary: The SIP Status Code to ISDN Cause Code mapping (Section 8.2.6.1) defines how SIP error responses from a UAS are translated into ISUP REL cause codes when the call originated from PSTN. This is the inverse of the cause-to-status mapping in Section 7.2.4.1 and is applied by the ISUP-to-SIP state machine on receipt of 4xx–6xx responses.
section: 8.2.6.1
topics:
    - sip
    - voip
    - realtime
