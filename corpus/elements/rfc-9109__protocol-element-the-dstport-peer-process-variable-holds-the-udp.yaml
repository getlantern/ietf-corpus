document: rfc-9109
kind: protocol-element
summary: 'The dstport peer process variable holds the UDP port number of the NTP client. It becomes the source port number in packets sent from that association. Its value depends on the operating mode: well-known port 123 for broadcast/symmetric modes, randomized port for client mode.'
