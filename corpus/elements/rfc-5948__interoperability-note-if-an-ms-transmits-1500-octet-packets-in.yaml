document: rfc-5948
kind: interoperability-note
summary: If an MS transmits 1500-octet packets in a deployment with a smaller MTU, packets may be dropped at the link layer silently because IPv4 (unlike IPv6 with ND MTU options) has no reliable automatic mechanism for an MS to discover the link MTU before sending.
section: "4.3"
topics:
    - ip
