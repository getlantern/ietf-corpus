document: rfc-9422
kind: interoperability-note
summary: When pipelining is in use, a client cannot check intermediate command responses without stalling the pipeline, so it cannot count successful versus failed responses to adjust behavior. Limit designers must account for this; for example, RCPTMAX counts total RCPT TO commands rather than only successful ones.
section: "3.3"
