document: rfc-5303
kind: wire-format
summary: 'The Adjacency Three-Way State field is 1 octet with values: 0=Up, 1=Initializing, 2=Down. The Extended Local Circuit ID field is 4 octets, uniquely identifying the circuit on the local IS. The Neighbor System ID field length equals the ID Length of the IIH PDU. The Neighbor Extended Local Circuit ID field is 4 octets.'
