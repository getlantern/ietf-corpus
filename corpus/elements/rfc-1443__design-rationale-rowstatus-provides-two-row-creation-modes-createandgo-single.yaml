document: rfc-1443
kind: design-rationale
summary: 'RowStatus provides two row-creation modes: createAndGo (single atomic transaction) and createAndWait (multi-step negotiated creation). createAndWait exists to allow management stations to iteratively populate required columns when they cannot determine all column requirements in advance.'
