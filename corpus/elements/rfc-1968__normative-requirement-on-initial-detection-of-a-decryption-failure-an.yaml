document: rfc-1968
kind: normative-requirement
summary: On initial detection of a decryption failure, an ECP implementation SHOULD transmit an ECP packet with Code field set to 14 (Reset-Request). Once sent, encrypted packets received are discarded until a valid Reset-Ack is received.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
