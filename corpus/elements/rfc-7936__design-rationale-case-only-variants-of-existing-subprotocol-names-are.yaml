document: rfc-7936
kind: design-rationale
summary: Case-only variants of existing subprotocol names are refused to minimize potential confusion among different registered versions, even though matching is case-sensitive. This prevents a class of subtle interoperability bugs where implementations might differ only in capitalization.
section: "2"
topics:
