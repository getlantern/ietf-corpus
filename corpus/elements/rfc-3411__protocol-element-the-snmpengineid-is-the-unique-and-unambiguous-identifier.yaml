document: rfc-3411
kind: protocol-element
summary: The snmpEngineID is the unique and unambiguous identifier of an SNMP engine within an administrative domain. It also uniquely identifies the containing SNMP entity. Different administrative domains may have SNMP entities with the same snmpEngineID value; federation may require reassignment.
section: 3.1.1.1
topics:
