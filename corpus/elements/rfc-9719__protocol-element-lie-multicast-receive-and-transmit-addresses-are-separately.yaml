document: rfc-9719
kind: protocol-element
summary: LIE multicast receive and transmit addresses are separately configurable. Receive defaults are 224.0.0.121 (IPv4) and ff02::a1f7 (IPv6); transmit addresses have no defaults and may differ from receive addresses, enabling asymmetric LIE multicast configurations.
