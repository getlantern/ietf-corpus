document: rfc-2933
kind: protocol-element
summary: 'Four compliance statements are defined: igmpV1HostMIBCompliance and igmpV1RouterMIBCompliance for IGMPv1 implementations, and igmpV2HostMIBCompliance and igmpV2RouterMIBCompliance for IGMPv2 implementations. All four permit igmpInterfaceStatus and igmpCacheStatus to be read-only (write access not required).'
