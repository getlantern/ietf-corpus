document: rfc-4320
kind: normative-requirement
summary: An SIP element MUST NOT respond to a non-INVITE request with a Status-Code of 100 over any unreliable transport (such as UDP) before the amount of time it takes a client transaction's Timer E to be reset to T2.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
