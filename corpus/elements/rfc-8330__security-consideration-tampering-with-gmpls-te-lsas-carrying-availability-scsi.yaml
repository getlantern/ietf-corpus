document: rfc-8330
kind: security-consideration
summary: Tampering with GMPLS-TE LSAs carrying Availability SCSI-TLVs may affect TE computations. RFC 3630 and RFC 2154 (OSPF with Digital Signatures) mechanisms should be used to secure and/or authenticate the information in Opaque LSAs. An OSPF security analysis is provided in RFC 6863.
section: "5"
topics:
    - security
    - routing
    - mpls
