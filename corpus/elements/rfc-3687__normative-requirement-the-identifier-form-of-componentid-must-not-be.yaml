document: rfc-3687
kind: normative-requirement
summary: The <identifier> form of ComponentId MUST NOT be used on any ASN.1 type other than SET, SEQUENCE, or CHOICE. Similarly, the <from-beginning>, <count>, <from-end> and <all> forms MUST NOT be used on ASN.1 types other than SET OF or SEQUENCE OF.
section: 3.1.2
rfc2119_level: MUST NOT
topics:
    - ldap
