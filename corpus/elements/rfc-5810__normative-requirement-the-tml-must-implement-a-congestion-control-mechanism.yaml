document: rfc-5810
kind: normative-requirement
summary: The TML MUST implement a congestion control mechanism that prevents transport congestive collapse (per RFC 2914) on either the FE or CE side. The TML MUST also define mechanisms to prevent node overload, addressing both transport-congestion-induced and non-congestion CPU overload scenarios (including DoS table-hash attacks).
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - congestion
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
