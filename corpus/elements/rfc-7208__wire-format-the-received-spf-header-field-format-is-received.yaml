document: rfc-7208
kind: wire-format
summary: 'The Received-SPF header field format is: ''Received-SPF:'' [CFWS] result FWS [comment FWS] [key-value-list] CRLF, with defined keys: client-ip, envelope-from, helo, mechanism, problem, receiver, identity. It SHOULD be prepended above the Received: field generated by the SMTP receiver.'
section: "9.1"
topics:
    - email
