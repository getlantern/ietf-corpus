document: rfc-4470
kind: design-rationale
summary: This technique requires on-line private keys and on-demand signing, both of which introduce security risks. At publication time, the DNSEXT WG was developing NSEC3 as an alternative that avoids on-line signing, though NSEC3 exposes slightly more zone information (e.g., the count of instantiated names).
section: "2"
topics:
