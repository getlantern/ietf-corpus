document: rfc-7981
kind: security-consideration
summary: LSPs carrying the Router CAPABILITY TLV may be snooped or modified by an attacker, exposing router capability information. Specifications using this mechanism must describe their own security considerations, and an integrity mechanism such as RFC 5304 or RFC 5310 should be applied when capability modification poses high risk.
section: "5"
topics:
    - security
    - routing
