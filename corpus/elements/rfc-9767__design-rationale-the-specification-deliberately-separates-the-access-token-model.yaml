document: rfc-9767
kind: design-rationale
summary: 'The specification deliberately separates the access token model (Section 2.1) from the wire format (Section 2.2) and the introspection API (Section 3.3), because both structured and reference-style tokens are valid and can be combined: structured tokens carry one class of information while introspection carries another. This avoids mandating a single approach across all GNAP deployments.'
section: "2.1"
topics:
    - oauth
    - json
    - jose
