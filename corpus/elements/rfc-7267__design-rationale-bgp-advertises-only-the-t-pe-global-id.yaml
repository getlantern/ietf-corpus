document: rfc-7267
kind: design-rationale
summary: BGP advertises only the T-PE Global ID, Prefix, and prefix length — not a fully-qualified per-AC 96-bit address — because the ST-PE already knows the AC ID on the terminating T-PE by provisioning, eliminating the need for per-PW auto-discovery advertisements and reducing BGP state.
section: 4.1.3
topics:
    - bgp
    - mpls
    - routing
