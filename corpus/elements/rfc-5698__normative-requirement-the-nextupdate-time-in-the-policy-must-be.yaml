document: rfc-5698
kind: normative-requirement
summary: The NextUpdate time in the policy MUST be either greater than the current time or absent. If NextUpdate is less than the current time, the policy MUST be rejected as expired.
section: "6.2"
rfc2119_level: MUST
topics:
