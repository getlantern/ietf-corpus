document: rfc-5642
kind: protocol-element
summary: The Dynamic Hostname TLV is a new OSPF Router Information TLV (type 7) that carries a symbolic hostname-to-Router-ID mapping. The hostname Value field is 1 to 255 octets encoded in US-ASCII, padded with zeroes to 4-octet alignment. The Router ID is derived from the Advertising Router field in the RI Opaque LSA header.
section: "3.1"
topics:
    - routing
    - registry
