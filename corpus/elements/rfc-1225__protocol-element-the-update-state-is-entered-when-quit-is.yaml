document: rfc-1225
kind: protocol-element
summary: The UPDATE state is entered when QUIT is issued from TRANSACTION. The server deletes all messages marked for deletion, releases the exclusive-access lock on the maildrop, sends a final +OK or -ERR response, and closes the TCP connection.
section: The UPDATE State
