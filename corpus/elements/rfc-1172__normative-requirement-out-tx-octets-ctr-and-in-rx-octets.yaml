document: rfc-1172
kind: normative-requirement
summary: Out-Tx-Octets-Ctr and In-Rx-Octets-Ctr MUST count all octets included in FCS calculations (including the FCS octets themselves) and MUST NOT count any other octets such as transparency or framing bits.
section: "3.4"
rfc2119_level: MUST
