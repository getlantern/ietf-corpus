document: rfc-8265
kind: normative-requirement
summary: An entity preparing a string under the UsernameCaseMapped profile MUST apply the width mapping rule first, then ensure only IdentifierClass code points are present. The width mapping must occur before the PRECIS HasCompat category check, which would otherwise forbid fullwidth and halfwidth code points.
section: 3.3.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
