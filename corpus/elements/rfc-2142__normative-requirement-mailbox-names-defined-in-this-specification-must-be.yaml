document: rfc-2142
kind: normative-requirement
summary: Mailbox names defined in this specification must be recognized independent of character case; for example, POSTMASTER, postmaster, Postmaster, and PoStMaStEr must all be treated as the same address with delivery to the same mailbox.
section: "2"
rfc2119_level: MUST
topics:
