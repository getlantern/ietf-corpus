summary: IANA registered RTCP-SR-REQ (RTCP Rapid Resynchronisation Request) with FMT value 5 in the table of FMT Values for RTPFB Payload Types (RFC 4585). This allows receivers to request rapid generation of an RTCP SR when unable to synchronise media streams.
