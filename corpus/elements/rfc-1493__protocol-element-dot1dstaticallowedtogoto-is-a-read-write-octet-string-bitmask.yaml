document: rfc-1493
kind: protocol-element
summary: dot1dStaticAllowedToGoTo is a read-write OCTET STRING bitmask specifying which ports may receive a frame matching the static filter entry. Each octet covers eight ports; within each octet, MSB represents the lowest-numbered port. The default is a string of all ones (forward to all ports).
section: "5.5"
topics:
