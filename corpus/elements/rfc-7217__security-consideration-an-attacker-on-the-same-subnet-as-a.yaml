document: rfc-7217
kind: security-consideration
summary: An attacker on the same subnet as a victim can send a forged Router Advertisement and learn the victim's IID for an arbitrary prefix by observing DAD packets or subsequent traffic. First-hop security mechanisms such as RA-Guard (RFC 6105, RFC 7113) and the optional Network_ID parameter mitigate this attack.
section: "8"
topics:
    - security
    - ip
    - v6ops
