document: rfc-2136
kind: design-rationale
summary: No semantic checking (e.g., verifying that NS or CNAME targets exist) is required in the primary master when adding RRs. Servers that implement such checking should restrict it to the prescan phase and must avoid out-of-zone dependencies whose veracity cannot be authoritatively verified.
section: "7.14"
topics:
    - dns
