document: rfc-2369
kind: design-rationale
summary: URLs were chosen over parameter lists because they are an established, widely deployed syntax; many clients already parse them (enabling prototype implementations without source modification); and as the URL standard evolves, the list fields gain new capabilities without requiring changes to this proposal.
