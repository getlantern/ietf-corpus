document: rfc-9114
kind: normative-requirement
summary: After the QUIC connection is established, a SETTINGS frame MUST be sent by each endpoint as the initial frame of their respective HTTP control stream. Each side MUST initiate a single control stream; receipt of a second control stream MUST be treated as a connection error of type H3_STREAM_CREATION_ERROR.
section: 6.2.1
rfc2119_level: MUST
topics:
    - http
    - quic
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
