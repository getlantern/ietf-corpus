document: rfc-6020
kind: design-rationale
summary: YANG syntax was deliberately modeled on SMIng and C/C++ rather than XML because readability was prioritized above the convenience of module writers and tool-chain developers. The C-like syntax with braces and semicolons makes models more accessible to human readers.
