document: rfc-5043
kind: normative-requirement
summary: ULP-supplied Private Data MUST be included for DDP Stream Session Initiate, Accept, and Reject messages (though MAY be zero length). Private Data length MUST NOT exceed 512 bytes. Private Data MUST NOT be included in the Terminate message.
section: 5.2.3
rfc2119_level: MUST
topics:
