document: rfc-7573
kind: normative-requirement
summary: Because the XMPP Message Receipts specification (XEP-0184) does not support failure reports, gateways SHOULD set the MSRP Failure-Report header field to 'no', preventing unnecessary MSRP failure notifications that cannot be forwarded to XMPP.
section: "7"
rfc2119_level: SHOULD
