document: rfc-9684
kind: protocol-element
summary: The mtpm feature indicates that multiple TPMs on the device can support remote attestation, enabling scenarios such as multiple line cards each with their own TPM. When mtpm is active and no certificate-name is provided in an RPC, all compliant TPMs respond.
section: 2.1.1.1
