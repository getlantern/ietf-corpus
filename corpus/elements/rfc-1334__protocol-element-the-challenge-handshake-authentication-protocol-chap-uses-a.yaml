document: rfc-1334
kind: protocol-element
summary: The Challenge-Handshake Authentication Protocol (CHAP) uses a 3-way handshake with a one-way hash function to verify peer identity. The authenticator sends a Challenge; the peer responds with a hash of the Identifier, secret, and Challenge Value. CHAP MAY be repeated at any time after link establishment to ensure the connection has not been altered.
section: "3"
topics:
    - security
    - crypto
