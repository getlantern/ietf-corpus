document: rfc-2244
kind: security-consideration
summary: ACAP uses SASL for authentication, with CRAM-MD5 as the mandatory-to-implement mechanism. The AUTH-TOO-WEAK and ENCRYPT-NEEDED response codes allow servers to enforce site security policies by rejecting authentication attempts that do not meet minimum strength requirements. SASL also allows optional negotiation of a security layer for session encryption.
section: "10"
topics:
    - security
    - crypto
