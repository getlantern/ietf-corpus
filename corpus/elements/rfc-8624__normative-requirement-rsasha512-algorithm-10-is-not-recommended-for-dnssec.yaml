document: rfc-8624
kind: normative-requirement
summary: RSASHA512 (algorithm 10) is NOT RECOMMENDED for DNSSEC signing but MUST be implemented for DNSSEC validation to ensure interoperability. There is no significant cryptographic strength difference between RSASHA512 and RSASHA256.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
