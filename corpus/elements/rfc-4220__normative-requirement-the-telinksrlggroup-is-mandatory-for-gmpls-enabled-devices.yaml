document: rfc-4220
kind: normative-requirement
summary: The teLinkSrlgGroup is mandatory for GMPLS-enabled devices in both full-compliance and read-only-compliance conformance statements. The teLinkPscGroup is mandatory for devices supporting packet switching capability, and teLinkTdmGroup is mandatory for devices supporting TDM switching capability.
