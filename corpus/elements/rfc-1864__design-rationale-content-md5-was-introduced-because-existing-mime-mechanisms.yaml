document: rfc-1864
kind: design-rationale
summary: Content-MD5 was introduced because existing MIME mechanisms, while protecting data during transport encoding/decoding, do not provide a mechanism for verifying that decoded data remain intact. The field fills the gap between transport-level encoding and verified data integrity.
