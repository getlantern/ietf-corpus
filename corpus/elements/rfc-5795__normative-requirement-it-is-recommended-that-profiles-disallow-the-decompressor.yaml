document: rfc-5795
kind: normative-requirement
summary: It is RECOMMENDED that profiles disallow the decompressor from attempting decompression of packets carrying only a 3-bit CRC after the dynamic context has been invalidated, until a packet with a 7- or 8-bit CRC is successfully verified.
section: 5.2.3
rfc2119_level: RECOMMENDED
