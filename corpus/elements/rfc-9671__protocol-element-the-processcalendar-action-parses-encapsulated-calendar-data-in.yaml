document: rfc-9671
kind: protocol-element
summary: 'The ''processcalendar'' action parses encapsulated calendar data in a MIME email message and performs appropriate create, update, or delete operations on a user''s calendars. It accepts optional arguments: :allowpublic, :addresses, :updatesonly/:calendarid, :deletecancelled, :organizers, :outcome, and :reason.'
