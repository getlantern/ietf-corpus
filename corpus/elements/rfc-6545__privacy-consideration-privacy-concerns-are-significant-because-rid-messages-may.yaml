document: rfc-6545
kind: privacy-consideration
summary: Privacy concerns are significant because RID messages may carry sensitive incident data about individuals or organizations. Privacy issues must be evaluated before sharing; the iodef:restriction attribute governs disclosure guidelines. Policy guidelines for sharing, use, and abuse must be established by consortiums or through peering agreements. Section 9.5 provides detailed privacy and system-use guidelines.
section: "9.5"
topics:
    - privacy
    - security
