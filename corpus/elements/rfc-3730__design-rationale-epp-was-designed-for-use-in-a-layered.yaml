document: rfc-3730
kind: design-rationale
summary: EPP was designed for use in a layered protocol environment because diverse operating environments have widely varying transport and security requirements; a single transport or security specification is unlikely to meet all anticipated operators' needs. Transport and security bindings are explicitly out of scope.
section: "1"
