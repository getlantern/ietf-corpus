document: rfc-2215
kind: design-rationale
summary: The reserved-value approach (a single distinguished value meaning 'indeterminate/invalid') is used exclusively instead of a separate INVALID flag, so that any protocol retrieving a parameter value—including SNMP—can carry the invalid indication without needing a separate flag.
