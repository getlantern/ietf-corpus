document: rfc-3921
kind: protocol-element
summary: 'Message stanzas support five ''type'' values: ''chat'' (one-to-one), ''error'', ''groupchat'' (multi-user), ''headline'' (automated broadcast), and ''normal'' (standalone). The ''type'' attribute is RECOMMENDED; child elements include optional <subject/>, <body/>, and <thread/>.'
section: 2.1.1
