document: rfc-3337
kind: design-rationale
summary: A 1500-byte packet on a 128 kbit/s ATM virtual circuit blocks the link for about 100 ms, adding unacceptable worst-case latency for interactive real-time applications; multi-class fragmentation solves this by allowing high-priority packets to be sent between lower-priority fragments.
