document: rfc-2147
kind: normative-requirement
summary: The length used in the pseudo-header for computing the UDP checksum is always the true length of the UDP header plus data, NOT zero, even when the UDP length field is set to zero for a jumbogram.
section: "2"
rfc2119_level: MUST
topics:
