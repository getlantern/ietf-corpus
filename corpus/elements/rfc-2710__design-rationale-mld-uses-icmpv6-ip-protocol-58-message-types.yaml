document: rfc-2710
kind: design-rationale
summary: MLD uses ICMPv6 (IP Protocol 58) message types rather than IGMP (IP Protocol 2). MLD is derived from IGMPv2 but adapted for IPv6, with the most significant architectural difference being its embedding within ICMPv6.
