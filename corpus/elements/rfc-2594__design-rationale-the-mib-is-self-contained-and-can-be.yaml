document: rfc-2594
kind: design-rationale
summary: The MIB is self-contained and can be implemented without the APPLICATION-MIB or SYSAPPL-MIB, though it interfaces to those MIBs via the wwwServiceIndex/applSrvIndex linkage. This allows incremental adoption in environments that only need WWW monitoring.
