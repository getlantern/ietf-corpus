document: rfc-5465
kind: normative-requirement
summary: If a client loses access to a monitored mailbox after a successful NOTIFY, the server MUST stop monitoring it. If access is later granted, the server MUST restart event monitoring.
section: "5.9"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
