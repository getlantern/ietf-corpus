document: rfc-2734
kind: normative-requirement
summary: All broadcast IP datagrams SHALL use asynchronous stream packets with the channel number from the BROADCAST_CHANNEL register, and SHALL NOT be transmitted when the valid bit in BROADCAST_CHANNEL is zero (e.g., immediately after a bus reset).
section: "8"
rfc2119_level: MUST
topics:
    - ip
    - multicast
