document: rfc-1717
kind: design-rationale
summary: Multilink offers a pure software alternative to bit-level synchronization (BONDING) for bonding multiple ISDN or async channels. The four-byte sequencing header allows splitting and reassembly of packets across parallel virtual circuits, reducing latency and increasing effective MRU compared to simple per-packet alternation (the 'Bank Teller's algorithm'), which causes reordering.
section: "1.1"
