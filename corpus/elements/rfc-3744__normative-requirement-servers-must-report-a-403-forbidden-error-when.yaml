document: rfc-3744
kind: normative-requirement
summary: Servers MUST report a 403 Forbidden error when access is denied due to insufficient privileges, except where the privilege restricts knowledge of the resource's existence, in which case 404 Not Found MAY be returned.
section: "3"
rfc2119_level: MUST
topics:
