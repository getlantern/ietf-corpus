document: rfc-3892
kind: wire-format
summary: 'The Referred-By header field grammar: ''Referred-By = ("Referred-By" / "b") HCOLON referrer-uri *( SEMI (referredby-id-param / generic-param) )'' where referredby-id-param = "cid" EQUAL sip-clean-msg-id and sip-clean-msg-id = LDQUOT dot-atom "@" (dot-atom / host) RDQUOT. The compact form is ''b''.'
section: "3"
topics:
