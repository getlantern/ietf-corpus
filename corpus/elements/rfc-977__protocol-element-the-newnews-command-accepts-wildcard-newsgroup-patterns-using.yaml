document: rfc-977
kind: protocol-element
summary: The NEWNEWS command accepts wildcard newsgroup patterns using '*' (matches any substring) and '!' prefix for negation. Multiple newsgroup names and patterns may be combined with commas. An optional distributions parameter in angle brackets filters by the distribution prefix of newsgroup names.
