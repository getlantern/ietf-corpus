document: rfc-4659
kind: protocol-element
summary: A VPN-IPv6 address is a 24-octet quantity, beginning with an 8-octet Route Distinguisher (RD) and ending with a 16-octet IPv6 address. The RD allows creation of distinct routes to a common IPv6 address prefix across different VPNs.
