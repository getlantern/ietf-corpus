document: rfc-1248
kind: protocol-element
summary: ospfIfTable (OID ospf 7) augments ifTable with OSPF-specific interface parameters; indexed by ospfIfIpAddress and ospfAddressLessIf (0 for addressed interfaces, ifIndex for addressless), and includes area assignment, interface type (broadcast/nbma/pointToPoint), timer values, DR/BDR addresses, event counter, and ospfIfAuthKey.
