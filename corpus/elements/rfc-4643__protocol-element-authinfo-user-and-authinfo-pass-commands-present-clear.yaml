document: rfc-4643
kind: protocol-element
summary: AUTHINFO USER and AUTHINFO PASS commands present clear-text credentials to the server. AUTHINFO USER supplies the username; AUTHINFO PASS supplies the password. These commands MUST NOT be pipelined.
section: "2.3"
