document: rfc-4168
kind: protocol-element
summary: 'The Via header transport parameter is extended to include ''TLS-SCTP'' for requests sent over TLS over SCTP. The updated ABNF is: transport = "UDP" / "TCP" / "TLS" / "SCTP" / "TLS-SCTP" / other-transport.'
