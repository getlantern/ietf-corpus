document: rfc-1209
kind: normative-requirement
summary: The MTU for IP stations operating over SMDS SHALL be 9180 octets. This is derived from the SMDS maximum SDU of 9188 octets minus the 8-octet LLC/SNAP header. There is no minimum packet size restriction.
section: MAC Sublayer Details
rfc2119_level: MUST
topics:
    - ip
    - tcp
