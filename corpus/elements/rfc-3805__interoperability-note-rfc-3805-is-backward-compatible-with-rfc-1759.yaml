document: rfc-3805
kind: interoperability-note
summary: 'RFC 3805 is backward compatible with RFC 1759: a compliant RFC 1759 implementation is also compliant with RFC 3805. The nine new objects added (prtAuxiliarySheetStartupPage, prtGeneralPrinterName, prtGeneralSerialNumber, prtAlertCriticalEvents, prtAlertAllEvents, etc.) appear in optional GROUP rather than MANDATORY-GROUP conformance clauses.'
