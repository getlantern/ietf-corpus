document: rfc-8381
kind: wire-format
summary: 'The Vendor Channel message payload begins with a 3-byte Vendor ID (OUI or CID), followed by a 1-byte VERR field, a 1-byte Sub-Protocol field, and a 1-byte Sub-Version field, followed by variable-length Vendor-Protocol-Specific Data. The Vendor ID type is determined by the bottom two bits of its first byte: 0b00 = OUI, 0b10 = CID.'
section: "2"
topics:
