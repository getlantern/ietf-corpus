document: rfc-6119
kind: normative-requirement
summary: A router implementing IPv6 traffic engineering MUST include the IPv6 Neighbor Address sub-TLV (type 13) for point-to-point links. This sub-TLV MUST NOT contain an IPv6 link-local address.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
