document: rfc-927
kind: wire-format
summary: The UUID is transmitted via subnegotiation as IAC SB TUID <uuid> IAC SE, where <uuid> is a 32-bit binary number (4 octets). Any octet with value 255 (IAC) within the UUID must be doubled (sent as IAC IAC) to escape it within the subnegotiation stream.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
