document: rfc-4502
kind: interoperability-note
summary: RMON2 probes that also implement RMON may use the augmented filter and capture status bits (bits 6-9) for WAN direction, physical-layer errors, too-short, and too-long packets. These enhancements add no requirements to RMON-only compliant probes.
section: "2.2"
topics:
