document: rfc-3747
kind: design-rationale
summary: To avoid duplication of managed objects, the actual functional datapath templates are defined in the Differentiated Services MIB (RFC 3289) tables rather than in the DIFFSERV-CONFIG-MIB. The DIFFSERV-CONFIG-MIB only provides a starting pointer (diffServConfigStart) into those pre-existing tables.
