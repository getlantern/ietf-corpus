document: rfc-1549
kind: protocol-element
summary: Octet-synchronous HDLC (used with SONET and optionally ISDN B or H channels) uses the same octet stuffing procedure as asynchronous HDLC but escapes only the Flag Sequence (0x7e) and Control Escape (0x7d) octets. There is no bit stuffing despite the synchronous bit rate.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
