document: rfc-7582
kind: normative-requirement
summary: Implementation of bidirectional P-tunnels is OPTIONAL. If implemented, an implementation claiming compliance MUST support at least one of the two P-tunnel technologies (MP2MP LSPs or BIDIR-PIM). An implementation providing C-BIDIR support via partitioned sets of PEs MUST support the Partial Mesh of MP2MP P-tunnels variant using Flat Partitioned Method.
section: 3.2.4
rfc2119_level: OPTIONAL
topics:
    - routing
    - mpls
    - multicast
