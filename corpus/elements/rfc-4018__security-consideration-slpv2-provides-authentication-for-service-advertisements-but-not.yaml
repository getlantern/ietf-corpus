document: rfc-4018
kind: security-consideration
summary: SLPv2 provides authentication for service advertisements but not confidentiality, and does not authenticate zero-result responses. When false discovery information is a risk, IPsec SAs and iSCSI in-band authentication SHOULD be used so only authenticated endpoints exchange iSCSI traffic.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
