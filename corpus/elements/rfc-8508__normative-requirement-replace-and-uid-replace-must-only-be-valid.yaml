document: rfc-8508
kind: normative-requirement
summary: REPLACE and UID REPLACE MUST only be valid in the selected state. Unlike APPEND, which is valid in the authenticated state, REPLACE operates on message sequence numbers and therefore requires a selected mailbox.
section: "3.5"
rfc2119_level: MUST
topics:
    - email
