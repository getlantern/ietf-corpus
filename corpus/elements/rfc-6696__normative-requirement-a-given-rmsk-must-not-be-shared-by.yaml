document: rfc-6696
kind: normative-requirement
summary: A given rMSK MUST NOT be shared by multiple authenticators. If a new rRK is derived, subsequent rMSKs MUST be derived from the new rRK. The rMSK lifetime MUST NOT be greater than the lifetime of the rRK.
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
