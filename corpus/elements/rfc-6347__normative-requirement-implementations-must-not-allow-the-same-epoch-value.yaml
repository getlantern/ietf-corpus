document: rfc-6347
kind: normative-requirement
summary: Implementations MUST NOT allow the same epoch value to be reused within two times the TCP maximum segment lifetime, to ensure that any given sequence/epoch pair is unique across cipher state changes.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
