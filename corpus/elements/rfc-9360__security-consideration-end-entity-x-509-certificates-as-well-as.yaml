document: rfc-9360
kind: security-consideration
summary: End-entity X.509 certificates, as well as 'x5t' and 'x5u' parameters, expose permanent identifiers that a passive on-path attacker can use to identify and track the subject. COSE does not provide identity protection; wrapping COSE inside a confidential transport is required to prevent tracking.
section: "5"
topics:
    - security
    - privacy
    - pkix
