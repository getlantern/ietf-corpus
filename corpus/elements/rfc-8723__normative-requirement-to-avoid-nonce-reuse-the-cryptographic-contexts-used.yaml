document: rfc-8723
kind: normative-requirement
summary: To avoid nonce reuse, the cryptographic contexts used for decryption and re-encryption by the MD MUST use different, independent master keys. The MD MUST NOT re-encrypt using the sender's keys and MUST use an independent key for each recipient.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
