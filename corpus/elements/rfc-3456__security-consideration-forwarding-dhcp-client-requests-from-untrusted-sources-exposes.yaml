document: rfc-3456
kind: security-consideration
summary: Forwarding DHCP client requests from untrusted sources exposes the network to DHCP exhaustion attacks and spoofing of the client-identifier option or client MAC address. These risks can be partially addressed through the DHCP Relay Agent Information Option (RFC 3046).
section: "5"
topics:
