document: rfc-5275
kind: protocol-element
summary: 'GLAdministration is an INTEGER with three values: unmanaged(0), which allows prospective members to self-add and self-delete without GLO intervention; managed(1), which redirects member requests to the GLO for approval; and closed(2), which allows only GLO-initiated additions and deletions. The default is managed(1).'
section: 3.1.1
topics:
    - crypto
    - security
