document: rfc-9504
kind: wire-format
summary: 'The LSP Exclusion subobject for the XRO (Type 11) is a variable-length structure: 1-bit X flag (mandatory/desired exclusion), 7-bit Type (value 11), 1-byte Length, 1-byte Reserved, 1-byte Flags, and a variable-length Symbolic Path Name (printable ASCII, no NULL terminator). Multiple instances may appear in a single XRO.'
section: 6.2.2
topics:
    - routing
