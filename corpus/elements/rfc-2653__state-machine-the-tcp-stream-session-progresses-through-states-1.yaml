document: rfc-2653
kind: state-machine
summary: 'The TCP stream session progresses through states: (1) connected/banner received, (2) version negotiated (300 received), (3) request sent and acknowledged (200/201), (4) session closed (222). A 500-series response during negotiation causes the server to terminate the connection and sender may retry with an older protocol version.'
section: "2.1"
topics:
    - tcp
