document: rfc-5910
kind: protocol-element
summary: 'The DS Data Interface uses the <secDNS:dsData> element for creates, adds, removes, and <domain:info> responses. It contains four required child elements: <secDNS:keyTag> (unsignedShort), <secDNS:alg> (algorithm number), <secDNS:digestType> (digest algorithm identifier), and <secDNS:digest> (hexBinary). An optional <secDNS:keyData> child may be included for server validation.'
section: "4.1"
topics:
    - dns
    - security
    - registry
