document: rfc-6120
kind: interoperability-note
summary: At the time of publication, most deployed servers use Server Dialback (XEP-0220) for weak server identity verification rather than SASL with PKIX certificates, particularly when TLS is not mandated by the peer or when peer certificates are self-signed. RFC 6120 specifies the stronger SASL+PKIX approach but acknowledges the existing deployment base.
section: "1.3"
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
