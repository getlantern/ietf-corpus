document: rfc-4309
kind: normative-requirement
summary: Implementations MUST support M values of 8 octets and 16 octets for the ICV; implementations MAY support an M value of 12 octets. Only M values that are a multiple of four and at least eight are permitted.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
