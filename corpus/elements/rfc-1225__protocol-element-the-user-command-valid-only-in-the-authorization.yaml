document: rfc-1225
kind: protocol-element
summary: The USER command, valid only in the AUTHORIZATION state, takes a server-specific user-id as a required argument. A +OK response permits the client to issue PASS or QUIT; a -ERR response permits re-issuing USER or QUIT.
section: The AUTHORIZATION State
