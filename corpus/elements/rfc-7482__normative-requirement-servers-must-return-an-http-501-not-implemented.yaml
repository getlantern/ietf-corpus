document: rfc-7482
kind: normative-requirement
summary: Servers MUST return an HTTP 501 (Not Implemented) response to inform clients of unsupported query types. This allows partial server implementations that support only a subset of RDAP query features.
section: "1"
rfc2119_level: MUST
topics:
