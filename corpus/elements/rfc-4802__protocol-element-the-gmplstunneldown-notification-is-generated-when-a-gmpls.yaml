document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelDown notification is generated when a GMPLS tunnel's mplsTunnelOperStatus transitions to down(2) from any state other than notPresent. It includes mplsTunnelAdminStatus, mplsTunnelOperStatus, gmplsTunnelErrorLastErrorType, gmplsTunnelErrorReporterType, gmplsTunnelErrorReporter, gmplsTunnelErrorCode, and gmplsTunnelErrorSubcode to convey the failure cause.
