document: rfc-8665
kind: protocol-element
summary: For inter-area SR, when an ABR advertises a Type-3 Summary LSA it MUST also originate an area-scoped OSPF Extended Prefix Opaque LSA carrying the Prefix-SID. The ABR selects the Prefix-SID from the best-path advertising router in the source area; if none, it uses any other advertised Prefix-SID.
section: "7.2"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
