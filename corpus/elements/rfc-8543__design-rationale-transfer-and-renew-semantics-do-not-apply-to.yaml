document: rfc-8543
kind: design-rationale
summary: Transfer and renew semantics do not apply to organization objects, so no EPP <transfer> or <renew> command mappings are defined. This reflects that organizations are managed entities without the subscription lifecycle of domain names.
section: 4.1.3
