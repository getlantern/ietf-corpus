document: rfc-3620
kind: protocol-element
summary: If the outermost 'tunnel' element has a 'profile' attribute with no nested elements, the proxy is responsible for determining hop-by-hop routing to a peer serving the BEEP profile identified by the URI; source routing is not used, and local provisioning maps the URI to a concrete next hop.
