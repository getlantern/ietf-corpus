document: rfc-3959
kind: normative-requirement
summary: If a UA needs to refuse an early-session offer, it MUST do so by refusing all the media streams in it. When SDP is used, this is done by setting the port number of all media streams to zero.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
