document: rfc-3779
kind: normative-requirement
summary: In the ASIdentifiers SEQUENCE, the asnum entry MUST precede the rdi entry when both are present. Any pair of items in asIdsOrRanges MUST NOT overlap; contiguous AS identifiers MUST be combined into a single range; AS identifiers MUST be sorted by increasing numeric value.
section: 3.2.3.1
rfc2119_level: MUST
topics:
