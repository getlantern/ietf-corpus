document: rfc-2873
kind: wire-format
summary: 'The DiffServ DS field reuses the IPv4 TOS octet with a new layout: bits 0-5 (DSCP, Differentiated Services Code Point, 6 bits), bits 6-7 (CU, currently unused, 2 bits). The DSCP includes the three bits formerly known as the precedence field.'
