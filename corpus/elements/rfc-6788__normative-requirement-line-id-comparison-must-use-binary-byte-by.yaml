document: rfc-6788
kind: normative-requirement
summary: Line ID comparison MUST use binary byte-by-byte comparison; two Line IDs are equal only when they have the same number of bytes and the same value at every byte index. Intermediate systems MUST NOT alter the contents of the Line ID.
section: "7.1"
rfc2119_level: MUST NOT
topics:
