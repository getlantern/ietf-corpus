document: rfc-5475
kind: security-consideration
summary: An attacker who can observe selection outcomes (via billing reports, IDS feedback, or eavesdropping on export packets) can use trial streams to reconstruct hash parameters and craft disproportionately sampled packet sets. For the modular hash f(x) = ax+b mod k, roughly 2/p outcome observations suffice to succeed.
section: 6.2.3.2
topics:
    - measurement
    - security
