document: rfc-9795
kind: security-consideration
summary: Dereferencing URI-linked RCD resources during verification (in-network or on device) can reveal calling patterns to the resource host. The use of "rcdi" digests within JWT Claim Constraints certificates is RECOMMENDED over embedding raw claim content, to avoid exposing private caller information through publicly accessible certificates.
section: "16"
topics:
    - security
    - privacy
    - crypto
