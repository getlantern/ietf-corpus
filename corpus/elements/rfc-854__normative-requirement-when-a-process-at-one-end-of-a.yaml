document: rfc-854
kind: normative-requirement
summary: When a process at one end of a TELNET connection cannot proceed without input from the other end (i.e., its output queue is empty and no input is queued), it MUST transmit the TELNET Go Ahead (GA, code 249) command to signal the user-side host to yield the terminal to the user.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
