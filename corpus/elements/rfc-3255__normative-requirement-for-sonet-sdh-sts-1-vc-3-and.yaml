document: rfc-3255
kind: normative-requirement
summary: For SONET/SDH STS-1/VC-3 and above SPE/VCs using virtual concatenation, the path signal label (C2 byte) value is required to be the same for all constituent channels, in accordance with RFC 2615 values.
