document: rfc-3321
kind: normative-requirement
summary: New shared state items must not be created unless the compressor has made sufficient state memory available at the remote end, because creating a shared state that evicts existing states could cause decompression failure.
section: "5.2"
rfc2119_level: MUST NOT
