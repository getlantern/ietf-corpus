document: rfc-1248
kind: protocol-element
summary: ospfLsdbTable (OID ospf 4) represents the OSPF link-state database; each OspfLsdbEntry is indexed by ospfLsdbAreaId, ospfLsdbType (routerLink/networkLink/summaryLink/asSummaryLink/asExternalLink), ospfLsdbLSID, and ospfLsdbRouterId, and exposes ospfLsdbSequence, ospfLsdbAge, ospfLsdbChecksum, and ospfLsdbAdvertisement (full raw LSA as OCTET STRING).
section: "5.4"
topics:
