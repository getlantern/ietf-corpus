document: rfc-9493
kind: normative-requirement
summary: Applications SHOULD choose the most specific possible Identifier Format for a given identifier. For example, an email address that could be conveyed as a "mailto:" URI SHOULD instead use the Email Identifier Format rather than the URI Format.
section: "3.2"
rfc2119_level: SHOULD
topics:
