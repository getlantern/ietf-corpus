document: rfc-5545
kind: protocol-element
summary: The VTODO component represents a to-do task. It supports DTSTART, DUE or DURATION (not both), COMPLETED, PERCENT-COMPLETE, and STATUS values specific to tasks (NEEDS-ACTION, IN-PROCESS, COMPLETED, CANCELLED). Unlike VEVENT, VTODO instances without a specified duration are considered to have zero duration.
section: 3.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
