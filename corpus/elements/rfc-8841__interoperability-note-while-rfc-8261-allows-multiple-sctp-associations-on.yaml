document: rfc-8841
kind: interoperability-note
summary: While RFC 8261 allows multiple SCTP associations on top of a single DTLS association, the procedures in this specification only support negotiation of a single SCTP association per DTLS association. Future mux extensions must also define mux rules for the sctp-port and max-message-size attributes.
section: "7"
topics:
