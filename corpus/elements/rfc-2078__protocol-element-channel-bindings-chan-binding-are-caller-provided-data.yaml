document: rfc-2078
kind: protocol-element
summary: Channel bindings (chan_binding) are caller-provided data that bind context establishment to characteristics of the underlying communications channel (e.g., addresses, encryption keys). They strengthen peer entity authentication by limiting the reuse scope of intercepted context-establishment tokens.
section: 1.1.6
topics:
    - security
