summary: 'The IPv4 Extended Association ID format contains: a 32-bit IPv4 LSP Source Address, a 16-bit Reserved field (must be zero), a 16-bit LSP ID of the forward LSP, followed by a variable-length Extended Association ID inserted by the endpoint node.'
