document: rfc-1661
kind: wire-format
summary: 'LCP packet format: Code (1 octet identifying packet type), Identifier (1 octet for request/reply matching), Length (2 octets, includes Code/Identifier/Length/Data, MUST NOT exceed link MRU), and Data (variable). Octets beyond Length are treated as padding and ignored.'
section: "5"
