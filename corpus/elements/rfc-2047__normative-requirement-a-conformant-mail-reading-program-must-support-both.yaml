document: rfc-2047
kind: normative-requirement
summary: A conformant mail reading program must support both 'B' and 'Q' encodings for any character set it supports, must be able to display unencoded text when charset is US-ASCII, and must display at least the ASCII-range characters for ISO-8859-* charsets.
section: "7"
rfc2119_level: MUST
topics:
    - email
