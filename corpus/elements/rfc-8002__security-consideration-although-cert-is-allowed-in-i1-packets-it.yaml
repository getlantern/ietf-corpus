document: rfc-8002
kind: security-consideration
summary: Although CERT is allowed in I1 packets, it is NOT RECOMMENDED because it increases I1 processing time and can be exploited during I1 storm attacks. Additionally, the Responder may drop the CERT parameter in I1 without processing it.
section: "7"
topics:
