document: rfc-4501
kind: protocol-element
summary: The DNS URI scheme uses the syntax 'dns:[//dnsauthority/]dnsname[?dnsquery]', where dnsauthority is an optional host:port, dnsname is a sequence of pchars (relative or absolute domain name), and dnsquery is a semicolon-delimited list of CLASS= and TYPE= elements.
