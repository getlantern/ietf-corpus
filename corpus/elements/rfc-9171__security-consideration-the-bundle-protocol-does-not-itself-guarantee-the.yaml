document: rfc-9171
kind: security-consideration
summary: The Bundle Protocol does not itself guarantee the identity of processing entities at endpoints. Authentication requires verification of the signature provided by a Block Integrity Block (BIB) targeting the primary block, as defined by Bundle Protocol Security (BPSec). Nodes that receive bundles should verify authenticity before acting on them.
section: "8"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
