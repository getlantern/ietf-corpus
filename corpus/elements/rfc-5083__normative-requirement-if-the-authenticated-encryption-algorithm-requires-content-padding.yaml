document: rfc-5083
kind: normative-requirement
summary: If the authenticated encryption algorithm requires content padding, the padding MUST be added as described in Section 6.3 of CMS. This padding method is well defined if and only if the block size is less than 256 octets.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
