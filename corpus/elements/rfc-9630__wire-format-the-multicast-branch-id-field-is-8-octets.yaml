document: rfc-9630
kind: wire-format
summary: 'The Multicast Branch ID field is 8 octets: a 3-octet Branching Node ID (unsigned integer per RFC 9197 node ID spec), 1 unused octet, a 2-octet Interface Index (unsigned integer), and 2 unused octets. Unused octets MUST be set to 0.'
