document: rfc-5053
kind: normative-requirement
summary: If Kt*T > F (total symbol bytes exceed object size), the last source symbol MUST be padded at the end with Kt*T - F zero bytes for encoding purposes; these padding bytes need not be transmitted.
section: 5.3.1.2
rfc2119_level: MUST
