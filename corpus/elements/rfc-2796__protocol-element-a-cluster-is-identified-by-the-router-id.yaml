document: rfc-2796
kind: protocol-element
summary: A cluster is identified by the ROUTER_ID of the single RR when only one RR exists. To support multiple RRs in the same cluster (for redundancy), all RRs in the cluster are configured with the same 4-byte CLUSTER_ID.
