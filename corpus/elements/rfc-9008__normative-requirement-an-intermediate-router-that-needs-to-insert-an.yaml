document: rfc-9008
kind: normative-requirement
summary: An intermediate router that needs to insert an extension header (e.g., RH3 or RPL Option) into a packet being routed MUST first encapsulate the packet in an additional outer IPv6 header; the new header is placed after the outer IP header. This upholds the IPv6 rule against on-the-fly header insertion.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
