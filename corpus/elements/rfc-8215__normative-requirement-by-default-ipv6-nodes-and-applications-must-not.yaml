document: rfc-8215
kind: normative-requirement
summary: By default, IPv6 nodes and applications must not treat IPv6 addresses within 64:ff9b:1::/48 differently from other globally scoped IPv6 addresses. In particular, they must not make any assumptions regarding the syntax or properties of those addresses (e.g., embedded IPv4 addresses) or the type of translation mechanism involved.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
