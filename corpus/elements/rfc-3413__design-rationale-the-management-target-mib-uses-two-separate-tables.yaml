document: rfc-3413
kind: design-rationale
summary: The Management Target MIB uses two separate tables (snmpTargetAddrTable for transport endpoints, snmpTargetParamsTable for SNMP parameters) with a many-to-many relationship, allowing multiple transport endpoints to share one set of security parameters or one endpoint to be used with multiple security parameter sets.
