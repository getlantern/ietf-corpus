document: rfc-5235
kind: design-rationale
summary: The extensions were created to provide portable Sieve spam and virus filtering commands because each third-party tool uses its own header format, forcing users to write tool-specific scripts that break when tools are updated or replaced. The underlying implementation maps tool-specific results into the normalized numeric range.
