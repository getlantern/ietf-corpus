document: rfc-8237
kind: normative-requirement
summary: If a new PW is added to a particular LSP, the PE MUST place the configuration verification of this PW on hold for at least 30 seconds to minimize false-positive misconfiguration events caused by the two ends of the PW being slightly out of sync.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
