document: rfc-8036
kind: interoperability-note
summary: IEEE 1901.2 uses a variable PHY MTU dependent on modulation and FEC settings; for CENELEC A/B ROBO/Super-ROBO modulations the threshold is 247 octets, and for other modulations 239 octets, before MAC-layer segmentation is required.
