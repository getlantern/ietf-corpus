summary: 'The adslAtucChanTable and adslAturChanTable (indexed by ifIndex where ifType is adslInterleave(124) or adslFast(125)) expose: interleaveDelay in milliseconds (noSuchObject for fast channel), currTxRate in bps, prevTxRate in bps (updated at each rate-change trap and at initialization), and crcBlockLength in bytes.'
