document: rfc-1407
kind: protocol-element
summary: 'dsx3LoopbackConfig (read-write) specifies loopback state: dsx3NoLoop, dsx3PayloadLoop (signal looped after framing), dsx3LineLoop (signal looped with minimum penetration), or dsx3OtherLoop. Devices incapable of loopback must always return dsx3NoLoop.'
section: 4.1.1
topics:
