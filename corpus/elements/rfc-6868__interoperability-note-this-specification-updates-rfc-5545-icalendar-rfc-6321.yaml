document: rfc-6868
kind: interoperability-note
summary: This specification updates RFC 5545 (iCalendar), RFC 6321 (xCal), RFC 6350 (vCard), and RFC 6351 (xCard) to allow ^ escape sequences in parameter values; implementations of those formats must be updated to generate and consume these sequences consistently.
section: "1"
