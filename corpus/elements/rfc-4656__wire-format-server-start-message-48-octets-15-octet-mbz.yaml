document: rfc-4656
kind: wire-format
summary: 'Server-Start message (48 octets): 15-octet MBZ, 1-octet Accept (0=OK), 16-octet Server-IV (random, unused in unauthenticated mode), 8-octet Start-Time (timestamp of server process start), 8-octet MBZ. In authenticated/encrypted mode, Start-Time is encrypted unless Accept is non-zero.'
section: "3.1"
