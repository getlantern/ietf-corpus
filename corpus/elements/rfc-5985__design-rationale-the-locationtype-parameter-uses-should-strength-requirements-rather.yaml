document: rfc-5985
kind: design-rationale
summary: The 'locationType' parameter uses SHOULD-strength requirements (rather than MUST) for specific location types to allow soft-failover, enabling fixed client configurations that prefer a specific type without failing when that type is unavailable from the LIS.
section: "6.2"
