document: rfc-6401
kind: protocol-element
summary: The Application-Level Resource Priority Policy Element (P-Type=0x06) carries a variable-length list of ALRPs (Application-Level Resource Priority entries) inside RSVP POLICY_DATA objects. It is intended to be processed by Policy Decision Points (PDPs) at policy area boundaries, not by LPDPs inside the domain.
