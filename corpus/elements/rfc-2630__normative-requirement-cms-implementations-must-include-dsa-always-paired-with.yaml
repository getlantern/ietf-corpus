document: rfc-2630
kind: normative-requirement
summary: CMS implementations must include DSA (always paired with SHA-1); RSA signatures may be included. Key agreement must include X9.42 Ephemeral-Static Diffie-Hellman with Triple-DES key wrapping; RC2 key wrapping should also be included.
section: "12.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
