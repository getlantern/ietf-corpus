document: rfc-6572
kind: normative-requirement
summary: The Service-Selection identifier MUST be unique within the PMIPv6 Domain when normalized using the selected normalization form (e.g., NFKC). The MAG MUST include the Service-Selection attribute in the Access-Request if the information was acquired by operator-specific configuration.
section: "4.3"
rfc2119_level: MUST
topics:
    - mobility
    - radius
