document: rfc-6378
kind: normative-requirement
summary: To revert from Do-not-Revert state back to Normal state, the administrator SHALL issue a Lockout of protection command followed by a Clear command. The protection domain SHALL remain in Do-not-Revert state until such a command sequence or a new trigger.
section: 4.3.3.6
rfc2119_level: MUST
topics:
    - mpls
    - routing
