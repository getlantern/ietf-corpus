document: rfc-6345
kind: security-consideration
summary: When EAP channel binding solutions use the PAA's IP address as a channel binding parameter, they must account for the fact that the PaC sees the PRE's IP address as the PAA address, while the authentication server sees the PAA's actual IP address. This same issue can arise with non-relayed PANA on multi-homed PAAs.
section: "6"
topics:
    - security
