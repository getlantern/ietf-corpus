document: rfc-1572
kind: normative-requirement
summary: IAC WILL NEW-ENVIRON indicates the sender is willing to send environment variables; IAC DO NEW-ENVIRON indicates willingness to receive them. WONT and DONT refuse sending and receiving respectively.
section: "2"
rfc2119_level: SHOULD
