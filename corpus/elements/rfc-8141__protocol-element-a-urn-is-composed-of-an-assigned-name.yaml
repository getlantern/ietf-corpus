document: rfc-8141
kind: protocol-element
summary: 'A URN is composed of an assigned-name (scheme + NID + NSS) plus optional r-component, q-component, and f-component. The ABNF is: namestring = assigned-name [ rq-components ] [ "#" f-component ]; assigned-name = "urn" ":" NID ":" NSS; NID = (alphanum) 0*30(ldh) (alphanum); NSS = pchar *(pchar / "/").'
section: "2"
topics:
