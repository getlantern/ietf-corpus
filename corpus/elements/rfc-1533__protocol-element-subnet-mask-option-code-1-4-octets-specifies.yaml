document: rfc-1533
kind: protocol-element
summary: Subnet Mask option (code 1, 4 octets) specifies the client's subnet mask per RFC 950. Router option (code 3, minimum 4 octets, must be multiple of 4) specifies a list of IP addresses for routers on the client's subnet; routers SHOULD be listed in preference order.
section: 3.3, 3.5
