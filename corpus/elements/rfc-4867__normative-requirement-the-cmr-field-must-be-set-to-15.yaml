document: rfc-4867
kind: normative-requirement
summary: The CMR field MUST be set to 15 (no mode request) for all packets sent to a multicast group. The encoder SHOULD ignore codec mode requests when sending to a multicast session but MAY use RTCP feedback as a hint.
section: 4.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - multicast
