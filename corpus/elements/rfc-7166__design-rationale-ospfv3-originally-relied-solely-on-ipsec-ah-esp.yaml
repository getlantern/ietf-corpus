document: rfc-7166
kind: design-rationale
summary: OSPFv3 originally relied solely on IPsec (AH/ESP) for authentication, but IPsec is difficult to configure and maintain in some environments such as MANETs, and does not provide replay protection when using manually configured keys. This document defines an Authentication Trailer mechanism as an alternative that solves replay protection and packet prioritization issues.
section: "1"
topics:
    - routing
    - security
    - ipsec
