document: rfc-5698
kind: normative-requirement
summary: XML-encoded DSSC policies MUST be based on XML 1.0 and MUST be encoded using UTF-8. They use the namespace URI 'urn:ietf:params:xml:ns:dssc' and are identified with MIME type 'application/dssc+xml'.
section: "4"
rfc2119_level: MUST
