document: rfc-2720
kind: normative-requirement
summary: Once a RuleSet's flowRuleInfoStatus has been set to active(1), a manager may not change any of the other variables in the row nor the contents of the associated RuleSet; any attempt to do so should result in a notWritable(17) SNMP error-status.
section: "4"
rfc2119_level: MUST NOT
topics:
