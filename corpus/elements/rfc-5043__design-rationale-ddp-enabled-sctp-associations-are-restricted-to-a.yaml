document: rfc-5043
kind: design-rationale
summary: DDP-enabled SCTP associations are restricted to a single Adaptation Indication and cannot mix DDP and non-DDP streams, because the handling of incoming DDP data chunks is sufficiently different from routine SCTP that mixing is undesirable.
