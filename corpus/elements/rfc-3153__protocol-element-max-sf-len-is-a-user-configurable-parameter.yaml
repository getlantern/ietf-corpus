document: rfc-3153
kind: protocol-element
summary: MAX_SF_LEN is a user-configurable parameter representing the maximum subframe size eligible for multiplexing. Its value MUST be less than or equal to the minimum of (MRU minus 2) and 16,383 bytes.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
