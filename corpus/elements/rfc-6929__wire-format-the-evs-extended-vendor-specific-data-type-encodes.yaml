document: rfc-6929
kind: wire-format
summary: 'The EVS (Extended-Vendor-Specific) data type encodes: Vendor-Id (4 octets, network byte order PEN), EVS-Type (1 octet), EVS-Value (1+ octets). Unlike RFC 2865 Section 5.26, there is no Vendor-Length field; EVS-Value length is derived from the encapsulating attribute''s Length minus header bytes.'
section: "2.4"
topics:
