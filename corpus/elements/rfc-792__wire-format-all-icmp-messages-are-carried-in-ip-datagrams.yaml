document: rfc-792
kind: wire-format
summary: All ICMP messages are carried in IP datagrams with Protocol=1. The first octet of the IP data portion is the ICMP Type field; its value determines the format of the remaining data. The IP header uses Version=4, ToS=0, and a 16-bit one's complement Header Checksum.
section: Message Formats
topics:
    - ip
