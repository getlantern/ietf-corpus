document: rfc-6130
kind: normative-requirement
summary: All network addresses in the router's Local Interface Set MUST be included as address objects in every generated HELLO message (with a narrow exception allowing omission of a single-address interface's address when it is the IP datagram source). Each such address MUST be associated with a LOCAL_IF Address Block TLV.
section: 10.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
