document: rfc-9990
kind: normative-requirement
summary: The Report-ID MUST be unique among reports to the same domain. If a report must be re-sent, the system MUST use the same filename as the original report, allowing the receiver to detect and handle the duplicate.
section: 3.5.1
rfc2119_level: MUST
topics:
    - email
