document: rfc-5546
kind: design-rationale
summary: iTIP is defined without reference to a specific transport protocol so that it can be bound to multiple communication methods (real-time, store-and-forward, email via iMIP, etc.). This layered approach allows the application protocol to remain stable while transport bindings evolve independently.
section: "2"
topics:
