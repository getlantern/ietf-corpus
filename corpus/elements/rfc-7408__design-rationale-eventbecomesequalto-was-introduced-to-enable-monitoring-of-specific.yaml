document: rfc-7408
kind: design-rationale
summary: eventBecomesEqualTo was introduced to enable monitoring of specific LFB or FE states without polling; for example, a master CE in a CEHA scenario can be notified immediately when a backup CE becomes associated, rather than polling periodically.
section: "2.4"
extracted_by: claude-sonnet-4-6
