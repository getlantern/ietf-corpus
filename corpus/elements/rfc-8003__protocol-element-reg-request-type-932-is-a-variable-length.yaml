document: rfc-8003
kind: protocol-element
summary: REG_REQUEST (Type 932) is a variable-length HIP parameter sent by a requester in an I2 or UPDATE packet to request registration for one or more service types, including a requested lifetime and an ordered list of registration type identifiers.
