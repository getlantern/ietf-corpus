document: rfc-4359
kind: wire-format
summary: For AH, the ICV equals the RSA modulus size. If the modulus is not a multiple of 32 bits (IPv4) or 64 bits (IPv6), explicit ICV Padding bits are required per AH Section 3.3.3.2.1 to produce a suitably sized ICV.
