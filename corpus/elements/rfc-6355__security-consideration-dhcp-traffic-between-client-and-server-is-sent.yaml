document: rfc-6355
kind: security-consideration
summary: DHCP traffic between client and server is sent in the clear. An eavesdropper on the path could obtain the UUID for a particular machine, raising privacy concerns. However, this is not a new issue specific to DUID-UUID; it applies to all DUID types.
section: "7"
topics:
    - security
    - privacy
    - v6ops
