document: rfc-9127
kind: design-rationale
summary: The BFD YANG data model is split into multiple modules, each corresponding to one type of forwarding path, because there is no uniform key to identify a BFD session across all path types. The main difference between modules is how a BFD session is uniquely identified (i.e., the key for the session list).
