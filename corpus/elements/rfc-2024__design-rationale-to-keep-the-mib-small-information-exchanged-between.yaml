document: rfc-2024
kind: design-rationale
summary: To keep the MIB small, information exchanged between partner DLSw nodes (e.g., SAP lists, NetBIOS names, MAC address lists from Capabilities Exchange) is only stored at the receiving end. There are no objects for what was sent, requiring managers to query both partners to get a complete picture.
section: 2.5.1
