document: rfc-6610
kind: security-consideration
summary: Secure delivery of home agent and home network information relies entirely on DHCP security mechanisms; the new options introduce no additional DHCP security impact. Operators must also ensure secure delivery of mobile IP information to the DHCP server through out-of-band mechanisms.
