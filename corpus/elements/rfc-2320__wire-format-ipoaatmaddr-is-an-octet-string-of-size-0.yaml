summary: 'IpoaAtmAddr is an OCTET STRING of size 0..40 encoding ATM addresses by length: no address (0 octets), E.164 (8 octets), NSAP (20 octets), and concatenated address+subaddress variants up to 40 octets. E.164 is encoded in BCD format.'
