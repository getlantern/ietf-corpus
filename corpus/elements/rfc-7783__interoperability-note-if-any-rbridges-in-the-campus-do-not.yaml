document: rfc-7783
kind: interoperability-note
summary: If any RBridges in the campus do not support the Affinity sub-TLV, distribution trees fall back to the RFC 6325 / RFC 7780 SPF-based algorithm. CMT requires all campus RBridges to support the Affinity sub-TLV for full operation; the fallback is intended as a temporary measure during upgrade.
section: "4.1"
topics:
    - routing
    - multicast
