document: rfc-5629
kind: interoperability-note
summary: A third-party application not on the call path will not see capability header fields in dialog-initiating requests. It must obtain UA capability information via other means, such as the registration event package which can contain user agent capability information from REGISTER requests.
section: 8.1.1
topics:
    - sip
    - realtime
