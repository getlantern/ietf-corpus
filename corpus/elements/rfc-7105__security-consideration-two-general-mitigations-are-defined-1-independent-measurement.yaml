document: rfc-7105
kind: security-consideration
summary: 'Two general mitigations are defined: (1) independent measurement validation — comparing Device-provided data against trusted sources or corroborating it — and (2) location validation — comparing untrusted location derived from Device measurements against trusted location from LIS-controlled sources, discarding the untrusted result if it falls outside the trusted uncertainty region.'
