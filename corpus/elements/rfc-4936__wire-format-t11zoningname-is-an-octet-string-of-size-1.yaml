document: rfc-4936
kind: wire-format
summary: T11ZoningName is an OCTET STRING of SIZE(1..64) that must begin with an ASCII letter (upper or lower case) followed by letters, digits, or the symbols ($-^_). It represents zone, zone set, and alias names as stored in the Fibre Channel Zoning Data Structure.
