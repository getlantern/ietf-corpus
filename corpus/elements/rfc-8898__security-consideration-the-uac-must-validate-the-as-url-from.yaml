document: rfc-8898
kind: security-consideration
summary: The UAC MUST validate the AS URL from a 401/407 response against a configured trusted-AS list. Blindly contacting any advertised AS enables attackers to redirect authentication to a malicious AS and harvest credentials.
section: "5"
topics:
    - sip
    - oauth
    - security
