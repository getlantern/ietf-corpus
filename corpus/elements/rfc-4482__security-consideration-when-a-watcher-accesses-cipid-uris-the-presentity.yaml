document: rfc-4482
kind: security-consideration
summary: When a watcher accesses CIPID URIs, the presentity can deduce the watcher is currently active; a presence application may cache these objects to mitigate this privacy exposure, at the cost of potentially stale data.
section: "8"
topics:
