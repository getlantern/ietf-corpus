document: rfc-7275
kind: normative-requirement
summary: ICCP MUST ensure transport security between RG devices; ICCP MUST NOT accept connections arbitrarily from any device, and means to prevent source address spoofing MUST be in place. This leverages TCP-based security mechanisms already required for LDP operation, and is especially critical when RG members communicate over a shared PSN.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
