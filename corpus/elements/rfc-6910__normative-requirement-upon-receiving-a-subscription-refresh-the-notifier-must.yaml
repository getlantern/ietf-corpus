document: rfc-6910
kind: normative-requirement
summary: Upon receiving a subscription refresh, the notifier MUST set the 'expires' parameter of the Subscription-State header to a value not higher than the current remaining subscription duration, regardless of any Expires header value in the refresh request.
section: "9.7"
rfc2119_level: MUST
topics:
    - sip
