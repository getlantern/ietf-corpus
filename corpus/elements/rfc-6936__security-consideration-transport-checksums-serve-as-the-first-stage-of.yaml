document: rfc-6936
kind: security-consideration
summary: Transport checksums serve as the first stage of stack protection and enable accurate packet counter logging and detection of unusual behaviors; removing the UDP checksum for IPv6 requires compensating integrity mechanisms at the tunnel or application layer to preserve these properties.
