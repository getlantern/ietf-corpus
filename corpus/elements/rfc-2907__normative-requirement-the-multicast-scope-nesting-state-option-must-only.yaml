document: rfc-2907
kind: normative-requirement
summary: The Multicast Scope Nesting State option MUST only appear in ACK messages sent in response to GETINFO, and MUST NOT be included in any message that does not also carry the Multicast Scope List option.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
