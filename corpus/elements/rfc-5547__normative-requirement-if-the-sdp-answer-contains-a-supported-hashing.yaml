document: rfc-5547
kind: normative-requirement
summary: If the SDP answer contains a supported hashing algorithm in the 'hash' selector, the file receiver SHOULD compute the hash of the received file and verify it against the SDP answer; a mismatch means the transfer SHOULD be considered failed and the user informed.
section: 8.2.2
rfc2119_level: SHOULD
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
