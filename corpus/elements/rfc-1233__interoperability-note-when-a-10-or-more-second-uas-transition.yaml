document: rfc-1233
kind: interoperability-note
summary: When a 10-or-more-second UAS transition period crosses a 900-second statistics window boundary, successive GETs of ds3IntervalSES and ds3IntervalUAS will return differing values. This is an unavoidable side-effect of the presently defined managed objects.
