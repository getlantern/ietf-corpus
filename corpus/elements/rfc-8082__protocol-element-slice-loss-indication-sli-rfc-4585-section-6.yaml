document: rfc-8082
kind: protocol-element
summary: Slice Loss Indication (SLI, RFC 4585 Section 6.3.2) requires no specification update for layered codecs. The prudent response is to repair the affected spatial area of the targeted enhancement layer and all dependent layers; reference layers do not need repair. SLI has seen very little implementation and none known with layered systems.
section: "6.2"
topics:
    - rtp
    - realtime
