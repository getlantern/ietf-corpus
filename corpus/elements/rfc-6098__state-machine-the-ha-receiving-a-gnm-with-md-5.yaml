summary: 'The HA receiving a GNM with MD=5 (from FA): validates FA-HA AE; checks Identification field; processes notification extension; MAY reply with GNAM Code 0. If the HA receives a GNM from an FA and there is no corresponding MN registration, the HA SHOULD drop the GNM.'
