document: rfc-6059
kind: interoperability-note
summary: DHCPv6, as specified in RFC 3315, only attempts to confirm addresses obtained on the most recently attached link. Simple DNA operates alongside DHCPv6 without modifying the DHCPv6 protocol or state machine; DHCPv6 results take precedence over NS/NA results for DHCPv6-assigned addresses.
section: 5.5.4
topics:
    - ip
    - v6ops
