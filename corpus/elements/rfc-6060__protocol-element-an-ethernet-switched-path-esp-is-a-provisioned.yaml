document: rfc-6060
kind: protocol-element
summary: An Ethernet Switched Path (ESP) is a provisioned unidirectional traffic-engineered connectivity path identified by the 3-tuple <ESP-MAC DA, ESP-MAC SA, ESP-VID>. ESPs can be P2P or P2MP and are analogous to unidirectional LSPs.
section: "2.1"
topics:
