document: rfc-2421
kind: normative-requirement
summary: A conformant implementation MUST send Audio/32KADPCM by default for voice, and receivers MUST be able to accept and decode Audio/32KADPCM. This is the mandatory baseline voice encoding for interoperability.
section: 4.3.4
rfc2119_level: MUST
