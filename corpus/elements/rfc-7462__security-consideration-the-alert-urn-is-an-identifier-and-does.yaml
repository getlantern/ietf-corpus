document: rfc-7462
kind: security-consideration
summary: The 'alert' URN is an identifier and does not by itself raise security issues, since it avoids the need to download or dereference a resource. This eliminates risks associated with fetching and rendering untrusted audio content that exist with HTTP URL-based Alert-Info references.
section: "16"
topics:
