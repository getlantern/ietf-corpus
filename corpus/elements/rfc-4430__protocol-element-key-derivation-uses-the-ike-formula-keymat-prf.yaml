kind: protocol-element
summary: 'Key derivation uses the IKE formula: KEYMAT = prf(SKEYID_d, [g(qm)^xy |] protocol | SPI | Ni_b [| Nr_b]). SKEYID_d is the Kerberos session key from the AP-REQ ticket; prf is the pseudo-random function corresponding to the session key''s etype. Nr_b is optional and treated as zero-length when absent.'
