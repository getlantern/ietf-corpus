document: rfc-8147
kind: normative-requirement
summary: An IVS initiating an NG-eCall MUST include the MSD body part with Content-Disposition header value 'By-Reference; handling=optional' in the initial INVITE. The 'handling=optional' directive prevents rejection by legacy intermediaries that do not understand the MSD.
section: "6"
rfc2119_level: OPTIONAL
topics:
