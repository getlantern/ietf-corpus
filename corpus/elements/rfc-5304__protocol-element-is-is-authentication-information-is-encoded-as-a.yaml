document: rfc-5304
kind: protocol-element
summary: 'IS-IS authentication information is encoded as a Type-Length-Value (TLV) tuple with type 10. The first octet of the value specifies the authentication type: 0 is reserved, 1 indicates cleartext password, 54 (0x36) indicates HMAC-MD5, and 255 is for routing domain private authentication methods.'
