document: rfc-1407
kind: state-machine
summary: An incoming failure state (LOS, OOF, or AIS) is declared when the defect persists for 2–10 seconds and cleared when the defect is absent for ≤20 seconds. The RAI failure is declared immediately upon detection of Yellow Alarm or Far End Alarm Channel signals and cleared when those signals are removed.
section: 3.3.3
