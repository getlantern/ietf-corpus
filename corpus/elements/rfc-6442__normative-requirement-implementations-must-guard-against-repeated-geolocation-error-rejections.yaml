document: rfc-6442
kind: normative-requirement
summary: Implementations MUST guard against repeated Geolocation-Error rejections used to probe for more precise location information. A configurable limit is required with a RECOMMENDED maximum of three rejections per related transaction.
section: "4.4"
rfc2119_level: MUST
topics:
