document: rfc-9575
kind: state-machine
summary: 'DRIP defines nine Observer authentication states: None (Black, no auth received), Partial (Gray, missing pages), Unsupported (Brown, unknown SAM Type), Unverifiable (Yellow, missing public key), Verified (Green, valid signature and content validation), Trusted (Blue, Verified with vetted DIME chain), Questionable (Orange, mixed Verified/Unverified), Unverified (Red, failed), and Conflicting (Purple, mixed Trusted/Unverified). States transition based on signature outcomes and DIME trust policy.'
section: A
