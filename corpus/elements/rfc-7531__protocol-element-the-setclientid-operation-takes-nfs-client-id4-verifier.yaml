document: rfc-7531
kind: protocol-element
summary: The SETCLIENTID operation takes nfs_client_id4 (verifier + opaque id), cb_client4 (callback program + address), and callback_ident. On success it returns a clientid4 and setclientid_confirm verifier that must be confirmed via SETCLIENTID_CONFIRM before the client ID is active.
section: "2"
