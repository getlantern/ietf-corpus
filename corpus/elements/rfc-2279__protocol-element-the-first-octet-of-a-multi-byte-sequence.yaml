document: rfc-2279
kind: protocol-element
summary: The first octet of a multi-byte sequence encodes the sequence length via the count of leading 1-bits (e.g., 110xxxxx means 2 bytes, 1110xxxx means 3 bytes). This enables character boundary resynchronization from any arbitrary position in an octet stream without rescanning from the start.
section: "2"
