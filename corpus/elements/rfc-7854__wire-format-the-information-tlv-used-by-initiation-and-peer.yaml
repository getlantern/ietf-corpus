document: rfc-7854
kind: wire-format
summary: 'The Information TLV used by Initiation and Peer Up messages consists of Information Type (2 bytes), Information Length (2 bytes), and variable-length Information field. Defined types: 0=String (UTF-8), 1=sysDescr (ASCII, equals MIB-II sysDescr), 2=sysName (ASCII, equals MIB-II sysName).'
