document: rfc-7464
kind: wire-format
summary: The parser ABNF defines an input-JSON-sequence as zero or more occurrences of one or more RS bytes (0x1E) followed by a possible-JSON string (any octets other than RS). Each such octet string is then interpreted as a UTF-8-encoded JSON text.
section: "2.1"
topics:
    - json
