document: rfc-9643
kind: normative-requirement
summary: When a hostname is configured as 'remote-address', DNS resolution should happen on each connection attempt; if multiple IP addresses result, they are tried in local preference order until a connection is established or all have failed.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - tcp
    - dns
    - yang
