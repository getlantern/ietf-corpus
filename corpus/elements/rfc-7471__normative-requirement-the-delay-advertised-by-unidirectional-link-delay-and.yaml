document: rfc-7471
kind: normative-requirement
summary: The delay advertised by Unidirectional Link Delay and Min/Max Unidirectional Link Delay sub-TLVs MUST be the delay from the advertising node to its neighbor (the forward path delay). Similarly, link loss MUST be the packet loss from the advertising node to its neighbor.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
