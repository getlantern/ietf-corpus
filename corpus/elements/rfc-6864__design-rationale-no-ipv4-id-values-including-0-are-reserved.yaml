document: rfc-6864
kind: design-rationale
summary: No IPv4 ID values, including 0, are reserved as distinguished. Atomic datagrams are identified by testing the DF, MF, and fragment offset fields, making the approach fully backward compatible without requiring special ID values.
section: "4.1"
