document: rfc-6111
kind: interoperability-note
summary: The DOMAIN-X500-COMPRESS encoding for transited realms can be used when the client or server realm is reserved or when a reserved realm appears in the transited field. However, abbreviation forms that build on a preceding name cannot be used at the start of a transited encoding if the client's realm is a well-known realm. The null-subfield form cannot be used adjacent to a well-known realm.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
