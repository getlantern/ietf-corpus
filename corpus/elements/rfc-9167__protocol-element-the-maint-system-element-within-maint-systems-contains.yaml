document: rfc-9167
kind: protocol-element
summary: The <maint:system> element within <maint:systems> contains <maint:name>, optional <maint:host> (in A-label form), and <maint:impact>. The impact value MUST be 'full' (completely unavailable), 'partial' (intermittently unavailable), or 'none' (not affected).
section: "3.3"
rfc2119_level: MUST
