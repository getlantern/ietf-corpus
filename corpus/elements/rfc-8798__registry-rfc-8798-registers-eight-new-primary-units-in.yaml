summary: 'RFC 8798 registers eight new primary units in the IANA ''SenML Units'' subregistry: B (Byte), VA (volt-ampere, Apparent Power), VAs (volt-ampere second, Apparent Energy), var (volt-ampere reactive, Reactive Power), vars (volt-ampere-reactive second, Reactive Energy), J/m (joule per meter), kg/m3 (kilogram per cubic meter), and deg (degree, plane angle). All are of type float.'
