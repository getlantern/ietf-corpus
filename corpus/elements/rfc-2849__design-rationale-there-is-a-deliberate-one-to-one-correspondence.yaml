document: rfc-2849
kind: design-rationale
summary: There is a deliberate one-to-one correspondence between LDAP operations (add, delete, modify, modrdn) and LDIF changerecord types. This permits straightforward, mechanical translation from LDIF to LDAP protocol operations without semantic interpretation.
section: Definition of the LDAP Data Interchange Format
