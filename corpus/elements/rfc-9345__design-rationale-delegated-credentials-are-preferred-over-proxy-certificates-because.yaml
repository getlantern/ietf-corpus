document: rfc-9345
kind: design-rationale
summary: Delegated credentials are preferred over proxy certificates because they require no change to PKI certificate validation, have restricted semantics that avoid X.509 conflicts, provide a cryptographic binding between the entire certificate and the credential, and bind each DC to a specific signature algorithm preventing use with unintended algorithms.
section: "3.1"
topics:
    - tls
    - pkix
    - crypto
