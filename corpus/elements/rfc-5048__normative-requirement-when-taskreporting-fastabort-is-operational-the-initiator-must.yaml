document: rfc-5048
kind: normative-requirement
summary: When TaskReporting=FastAbort is operational, the initiator MUST NOT send any more Data-Out PDUs for affected tasks once the TMF is sent, MUST respond to each Async Message PDU with AsyncEvent=5, and MUST treat the TMF response as terminating all affected tasks for which responses have not been received.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
