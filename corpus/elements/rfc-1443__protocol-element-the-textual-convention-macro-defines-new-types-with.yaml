document: rfc-1443
kind: protocol-element
summary: The TEXTUAL-CONVENTION macro defines new types with unique names (max 64 characters, no hyphens) that have similar syntax to SMI types but more precise semantics. Objects defined using a textual convention are always encoded by means of the rules that define their primitive type.
