document: rfc-2446
kind: normative-requirement
summary: In a VFREEBUSY REPLY, FREEBUSY property values MUST all be of the same data type; multiple instances MUST be sorted in ascending order; and values MAY NOT overlap. Both comma-separated lists within a single FREEBUSY property and multiple FREEBUSY properties MUST be supported by conforming implementations.
section: 3.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
