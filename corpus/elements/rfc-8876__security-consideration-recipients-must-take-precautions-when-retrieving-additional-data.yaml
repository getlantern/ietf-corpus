document: rfc-8876
kind: security-consideration
summary: Recipients MUST take precautions when retrieving additional data blocks passed by reference (including the CAP alert via Call-Info URIs), as the URI may point to a malicious actor. No trust relationships can be assumed between the sending device domain, the CAP alert server domain, and additional data block domains.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
