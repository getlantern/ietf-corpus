document: rfc-4548
kind: design-rationale
summary: No previous RFC had ever formalized an IPv4 ICP assignment, possibly due to the lack of a defined IANA assignment policy for ICP values under AFI '35'. This document formalizes ICP '1' for IPv4, consistent with what ITU-T X.213 had assumed.
