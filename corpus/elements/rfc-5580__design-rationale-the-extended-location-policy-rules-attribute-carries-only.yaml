document: rfc-5580
kind: design-rationale
summary: The Extended-Location-Policy-Rules Attribute carries only a URI reference to the extended ruleset rather than embedding the full XML policy (as RFC 4119 does). This deviation is explicitly motivated by RADIUS message size limitations, which make carrying attached XML rulesets impractical.
section: "4.5"
topics:
    - radius
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
