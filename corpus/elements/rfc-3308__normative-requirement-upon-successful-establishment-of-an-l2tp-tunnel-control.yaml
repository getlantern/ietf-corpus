document: rfc-3308
kind: normative-requirement
summary: Upon successful establishment of an L2TP tunnel control connection or session employing DS AVPs, both LAC and LNS MUST use their own PHB-to-DSCP mappings to map the PHB to a DSCP and place it in the DS field of the outer IP header of transmitted packets.
section: "6"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
    - ip
