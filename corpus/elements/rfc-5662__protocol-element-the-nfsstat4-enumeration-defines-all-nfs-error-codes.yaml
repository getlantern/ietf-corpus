document: rfc-5662
kind: protocol-element
summary: The nfsstat4 enumeration defines all NFS error codes. NFSv4.0 errors run from NFS4_OK=0 through NFS4ERR_CB_PATH_DOWN=10048; NFSv4.1-specific errors begin at NFS4ERR_BADIOMODE=10049 and extend through NFS4ERR_DELEG_REVOKED=10087. Error value 10073 is explicitly unused, and NFS4ERR_RESOURCE (10018) is not valid in NFSv4.1.
section: "2"
