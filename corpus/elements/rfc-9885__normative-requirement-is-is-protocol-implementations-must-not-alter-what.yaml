document: rfc-9885
kind: normative-requirement
summary: IS-IS protocol implementations MUST NOT alter what is sent or how received information is processed based on the MP-TLV Support sub-TLV advertisement. The sub-TLV is purely informational management data, not a protocol-altering capability signal.
section: "7"
rfc2119_level: MUST NOT
topics:
