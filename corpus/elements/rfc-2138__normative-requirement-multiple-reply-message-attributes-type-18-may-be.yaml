document: rfc-2138
kind: normative-requirement
summary: Multiple Reply-Message attributes (Type 18) MAY be included in a packet, but if any are displayed to the user they MUST be displayed in the same order as they appear in the packet.
section: "5.18"
rfc2119_level: MUST
topics:
