document: rfc-5076
kind: normative-requirement
summary: When an `<info>` command has been processed successfully, the EPP `<resData>` element MUST contain child elements as described in the EPP domain mapping, and the EPP `<extension>` element MUST contain an `<e164val:infData>` element identifying the extension namespace.
section: 5.1.2
rfc2119_level: MUST
