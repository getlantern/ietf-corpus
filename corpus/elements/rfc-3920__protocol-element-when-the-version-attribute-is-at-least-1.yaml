document: rfc-3920
kind: protocol-element
summary: When the 'version' attribute is at least '1.0', the receiving entity MUST send a <features/> element (prefixed by the streams namespace) to advertise negotiable capabilities such as STARTTLS, SASL mechanisms, and resource binding. Non-security features SHOULD NOT be advertised before required security features are successfully negotiated.
section: "4.6"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
