document: rfc-4303
kind: normative-requirement
summary: If a received ESP packet appears to be an IP fragment (OFFSET field non-zero or MORE FRAGMENTS flag set), the receiver MUST discard it; this is an auditable event. Reassembly is performed prior to ESP inbound processing.
section: 3.4.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
