document: rfc-5055
kind: protocol-element
summary: 'SCVPCertID provides a certificate reference by hash: certHash (OCTET STRING computed over the entire DER-encoded certificate including signature), issuerSerial (SCVPIssuerSerial), and hashAlgorithm (AlgorithmIdentifier DEFAULT sha-1). For public key certificates, issuer MUST contain only the issuer name encoded as directoryName in GeneralNames.'
section: 3.2.1
topics:
