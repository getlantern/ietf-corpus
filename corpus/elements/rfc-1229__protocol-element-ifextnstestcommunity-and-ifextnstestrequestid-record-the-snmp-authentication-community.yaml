document: rfc-1229
kind: protocol-element
summary: ifExtnsTestCommunity and ifExtnsTestRequestId record the SNMP authentication community name and request-id from the SNMP PDU that invoked the current or most recent test; these persist until the next test is invoked to allow managers to correlate results with requests.
