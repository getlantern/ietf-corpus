document: rfc-5689
kind: interoperability-note
summary: CalDAV's MKCALENDAR method can be replaced by an extended MKCOL request that specifies both DAV:collection and CALDAV:calendar-collection in the DAV:resourcetype property. The request and response XML differ (DAV:mkcol / DAV:mkcol-response vs. CALDAV:mkcalendar / CALDAV:mkcalendar-response), but the functional result is equivalent.
section: "4.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
