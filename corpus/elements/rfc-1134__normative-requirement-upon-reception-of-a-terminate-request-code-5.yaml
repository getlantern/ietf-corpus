document: rfc-1134
kind: normative-requirement
summary: Upon reception of a Terminate-Request (Code=5), a LCP implementation MUST transmit a Terminate-Ack (Code=6) with the Identifier field copied from the Terminate-Request. Reception of an unelicited Terminate-Ack indicates the connection has been closed.
section: 4.3.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
