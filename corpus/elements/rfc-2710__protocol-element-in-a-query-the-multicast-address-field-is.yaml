document: rfc-2710
kind: protocol-element
summary: In a Query, the Multicast Address field is zero for a General Query and a specific IPv6 multicast address for a Multicast-Address-Specific Query. In a Report or Done, it holds the specific multicast address the sender is listening to or ceasing to listen to, respectively.
section: "3.6"
topics:
    - multicast
    - ip
