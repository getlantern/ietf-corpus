document: rfc-4960
kind: registry
summary: This document establishes IANA registries for SCTP Chunk Parameter Types (0–65534; 65535 reserved) and Additional Error Causes used in ERROR and ABORT chunks. Thirteen error causes (1–13) are defined, including Invalid Stream Identifier, Stale Cookie Error, and Protocol Violation.
