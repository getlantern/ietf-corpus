document: rfc-9243
kind: design-rationale
summary: Only DHCPv6 options defined in RFC 8415 are included in this document, and only those requiring operator configuration are modeled. Options whose fields are computed by the server from other configuration inputs (e.g., OPTION_IA_NA) are excluded. Additional options can be added via YANG augmentation of the element modules.
section: 1.2.1
topics:
    - yang
    - v6ops
