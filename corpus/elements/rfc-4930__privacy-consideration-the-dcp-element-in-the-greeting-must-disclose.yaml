document: rfc-4930
kind: privacy-consideration
summary: The <dcp> element in the greeting MUST disclose the server's data collection policy, including <access> (scope of data access), one or more <statement> elements with mandatory <purpose>, <recipient>, and <retention> child elements, and an optional <expiry>. Policy information MUST be disclosed to provisioning entities. This design is based on W3C P3P.
section: "2.4"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
