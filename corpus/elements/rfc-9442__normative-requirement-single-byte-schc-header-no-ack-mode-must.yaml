document: rfc-9442
kind: normative-requirement
summary: Single-byte SCHC Header No-ACK mode MUST be used for transmitting short, non-critical packets that require fragmentation and do not require full reliability. In No-ACK mode, the FCN field MUST be used to indicate the size of the data packet; consecutive fragments MUST be marked with decreasing FCN values and the last fragment marked with FCN = All-1.
section: 3.5.1.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
