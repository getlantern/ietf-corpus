document: rfc-8919
kind: design-rationale
summary: For RSVP-TE, advertisement of application-specific link attributes implies RSVP is enabled on that link, while for SR Policy and LFA, such advertisements do not imply enablement — SR Policy is implicitly enabled on all SR-topology links and LFA is controlled by local configuration.
