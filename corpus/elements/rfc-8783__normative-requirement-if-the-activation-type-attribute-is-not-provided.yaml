document: rfc-8783
kind: normative-requirement
summary: If the 'activation-type' attribute is not provided in a filtering rule request, the DOTS server MUST use 'activate-when-mitigating' as the default. When mitigation is active, the DOTS server MUST only activate 'activate-when-mitigating' filters bound to the DOTS client that triggered the mitigation.
section: "7.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
