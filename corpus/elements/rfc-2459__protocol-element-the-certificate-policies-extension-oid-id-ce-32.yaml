summary: The Certificate Policies extension (OID id-ce 32) contains a sequence of PolicyInformation terms, each comprising a CertPolicyId OID and optional qualifiers. Two defined qualifier types are the CPS Pointer (URI to Certification Practice Statement) and User Notice (display text up to 200 characters).
