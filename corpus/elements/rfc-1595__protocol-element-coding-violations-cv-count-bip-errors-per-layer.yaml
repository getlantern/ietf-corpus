kind: protocol-element
summary: 'Coding Violations (CV) count BIP errors per layer: Section CVs use BIP-8 in B1 byte; Line CVs use BIP-8 in each B2 byte (up to 8×N per STS-N frame); Path CVs use BIP-8 in B3 byte of STS SPE; VT CVs use BIP-2 in V5 overhead byte.'
