document: rfc-8986
kind: security-consideration
summary: SRv6-based services require a well-defined SR Domain trust boundary to prevent external traffic from accessing or exploiting SRv6 behaviors. Careful IPv6 address allocation—keeping SRv6 SID and infrastructure addresses distinct from end-user addresses—provides the necessary separation between internal and external address space.
section: "9"
topics:
