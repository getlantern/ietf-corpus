document: rfc-9644
kind: protocol-element
summary: 'The ''ssh-client-grouping'' grouping in ietf-ssh-client defines four containers: ''client-identity'' (username and authentication methods), ''server-authentication'' (trust anchors for server validation), ''transport-params'' (feature-gated, references transport-params-grouping), and ''keepalives'' (feature-gated, aliveness testing). All containers carry nacm:default-deny-write.'
section: 3.1.2.1
topics:
    - yang
    - netconf
    - security
