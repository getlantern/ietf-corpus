document: rfc-5845
kind: normative-requirement
summary: During Binding Lifetime Extension re-registration, the MAG MUST include the GRE Key option with the downlink GRE key in the Proxy Binding Update, and the LMA MUST return the same uplink GRE key that was exchanged in the last successful Proxy Binding Update for the same mobility session.
section: 3.3.2
rfc2119_level: MUST
topics:
