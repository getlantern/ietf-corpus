document: rfc-9173
kind: normative-requirement
summary: The total number of invocations of the AES-GCM authenticated encryption function with a single key is required not to exceed 2^32, and the total number of AES blocks processed with a single key is recommended to be less than 2^64, as per NIST SP 800-38D.
section: "4.5"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
