document: rfc-6940
kind: normative-requirement
summary: Each node MUST have a certificate containing its Node-ID in a subjectAltName extension, unique within the overlay instance. The Node-ID is tightly coupled to the certificate and serves for addressing, topology placement, and resource responsibility determination.
section: "4.1"
rfc2119_level: MUST
