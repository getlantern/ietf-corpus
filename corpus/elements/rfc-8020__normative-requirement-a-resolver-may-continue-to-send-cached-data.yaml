document: rfc-8020
kind: normative-requirement
summary: A resolver MAY continue to send cached data under an NXDOMAIN cut as a reply until the TTL of that cached data expires, since this may avoid additional processing when a query is received.
section: "2"
rfc2119_level: MAY
