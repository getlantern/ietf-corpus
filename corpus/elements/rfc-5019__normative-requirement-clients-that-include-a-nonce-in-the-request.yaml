document: rfc-5019
kind: normative-requirement
summary: Clients that include a nonce in the request SHOULD NOT reject a corresponding OCSPResponse solely on the basis of a nonexistent expected nonce, but MUST fall back to validating the OCSPResponse based on time. Clients that do not include a nonce MUST ignore any nonce present in the response.
section: "4"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
