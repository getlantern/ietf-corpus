document: rfc-7812
kind: design-rationale
summary: The Rainbow-FEC was introduced to reuse existing per-neighbor FEC-filtering machinery already present in most LDP implementations, avoiding the need for per-neighbor label-spoofing (which most implementations lack). ABRs use the Rainbow-FEC to enforce that traffic from non-best-area neighbors always enters the default shortest-path forwarding topology.
section: 10.1.1
topics:
    - routing
    - mpls
