document: rfc-9567
kind: wire-format
summary: 'The report query QNAME is constructed by concatenating: the label ''_er'', the QTYPE as a decimal label, the non-null labels of the failed query name, the extended DNS error code as a decimal label, the label ''_er'' again, and finally the agent domain. If multiple QTYPEs are present they are represented as ordered decimal values separated by a hyphen in a single label (e.g., ''1-28'').'
section: 6.1.1
topics:
    - dns
