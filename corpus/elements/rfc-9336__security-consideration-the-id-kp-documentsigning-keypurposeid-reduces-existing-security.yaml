document: rfc-9336
kind: security-consideration
summary: The id-kp-documentSigning KeyPurposeId reduces existing security risks by separating document signing from extended key purposes used for communication protocols (TLS via id-kp-clientAuth, S/MIME via id-kp-emailProtection), thereby minimizing the risk of cross-protocol attacks. It introduces no new security or privacy concerns.
section: "6"
topics:
