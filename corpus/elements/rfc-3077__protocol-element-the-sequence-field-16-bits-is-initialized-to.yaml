document: rfc-3077
kind: protocol-element
summary: The Sequence field (16 bits) is initialized to a random value at boot time and incremented by 1 whenever any value in the HELLO message changes. Receivers use it to determine whether to update or just refresh the timer for an existing feed entry.
section: "7.1"
topics:
    - routing
