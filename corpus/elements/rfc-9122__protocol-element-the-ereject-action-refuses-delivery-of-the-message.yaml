document: rfc-9122
kind: protocol-element
summary: The `ereject` action refuses delivery of the message (extended reject, RFC 5429) and cancels the implicit keep. It is incompatible with the `vacation` action and is typically not permitted alongside delivery actions. It cannot be used with IMAP events.
section: "2.2"
topics:
    - email
