document: rfc-9645
kind: protocol-element
summary: 'The client-identity presence container supports a mandatory choice among four authentication methods: certificate (X.509 via inline-or-keystore-end-entity-cert-with-key-grouping), raw-public-key (RFC 7250), tls12-psk (with psk_identity leaf), and tls13-epsk (with external-identity, hash, context, target-protocol, target-kdf leaves). Each method is individually feature-gated.'
section: 3.1.2.1
topics:
