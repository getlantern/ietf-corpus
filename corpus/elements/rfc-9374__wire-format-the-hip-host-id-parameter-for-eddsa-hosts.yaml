document: rfc-9374
kind: wire-format
summary: The HIP HOST_ID parameter for EdDSA hosts contains a 16-bit EdDSA Curve label, a 16-bit NULL field, and the Public Key in octet-string format per RFC 8032. EdDSA25519 (value 1) and EdDSA448 (value 3) are RECOMMENDED curves.
section: 3.4.1.1
