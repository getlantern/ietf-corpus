document: rfc-5340
kind: protocol-element
summary: The AS-External-LSA (LS type 0x4005) has AS flooding scope and describes a path to a prefix external to the AS. Forwarding address and external route tag are optional, present only when the F-bit and T-bit are set respectively. A Referenced LS Type field and optional Referenced Link State ID support attaching additional route attributes (e.g., BGP path attributes) via a referenced LSA.
section: 4.4.3.6
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
