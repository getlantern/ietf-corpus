document: rfc-2741
kind: interoperability-note
summary: 'RFC 2741 obsoletes RFC 2257. Two wire-level changes affect interoperability: agentx-Notify-PDU and agentx-Close-PDU now generate an agentx-Response-PDU (previously they did not), and three new error codes are defined: parseFailed(266), requestDenied(267), processingError(268).'
section: "1"
topics:
