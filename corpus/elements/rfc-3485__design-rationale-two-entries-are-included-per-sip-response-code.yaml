document: rfc-3485
kind: design-rationale
summary: 'Two entries are included per SIP response code: one with only the status code and a space (e.g., ''302 '') and one with the code plus the standard reason phrase (e.g., ''302 Moved Temporarily''). This accommodates both messages that use the standard reason phrase and those that substitute a different one.'
section: "2"
