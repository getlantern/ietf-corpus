document: rfc-5892
kind: normative-requirement
summary: A character with derived property value CONTEXTJ or CONTEXTO MUST NOT be used in an IDN label unless an appropriate contextual rule has been established and the context of the character is consistent with that rule. It is invalid to register or look up a string containing such characters without a satisfied contextual rule.
section: "1"
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
