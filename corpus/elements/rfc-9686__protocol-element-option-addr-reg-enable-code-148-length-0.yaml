document: rfc-9686
kind: protocol-element
summary: OPTION_ADDR_REG_ENABLE (code 148, length 0) is a new DHCPv6 option that signals mutual support for the address registration mechanism. Clients include it in Option Request options; servers echo it in Advertise/Reply messages to indicate registration is supported.
section: "4.1"
