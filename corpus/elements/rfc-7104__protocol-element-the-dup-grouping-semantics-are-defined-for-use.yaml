document: rfc-7104
kind: protocol-element
summary: The 'DUP' grouping semantics are defined for use with the SDP Grouping Framework (RFC 5888) to associate redundant streams into a 'Duplication Group' via 'a=group:DUP' lines. Each 'a=group' line indicates an association relationship between the redundant streams.
