document: rfc-2373
kind: protocol-element
summary: 'The multicast scope field (4 bits) defines: 1=node-local, 2=link-local, 5=site-local, 8=organization-local, E=global, with 0 and F reserved. Permanently-assigned multicast addresses have scope-independent meaning; transient addresses are meaningful only within a given scope.'
section: "2.7"
topics:
