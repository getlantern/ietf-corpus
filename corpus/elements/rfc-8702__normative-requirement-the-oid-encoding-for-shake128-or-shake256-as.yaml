document: rfc-8702
kind: normative-requirement
summary: The OID encoding for SHAKE128 or SHAKE256 as a message digest MUST omit the parameters field, and the output length MUST be 32 bytes (SHAKE128) or 64 bytes (SHAKE256). The digest algorithm MUST be the same as the message hash algorithm used in signatures.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
