document: rfc-919
kind: design-rationale
summary: Broadcasts are assumed not to be reliably delivered; providing reliability is left to higher-layer protocols. The RFC assumes only that a host will receive most broadcasts sent. Broadcast reliability guarantees are considered too expensive relative to their benefit.
section: "1"
topics:
    - ip
