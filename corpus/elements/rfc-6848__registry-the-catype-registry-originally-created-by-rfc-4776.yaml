document: rfc-6848
kind: registry
summary: 'The CAtype registry (originally created by RFC 4776) is modified: it is closed to new numeric CAtypes, the NENA column is removed, columns for Namespace URI, Contact, Schema, and Type (A or B) are added, and the PIDF column is renamed to Local Name. All new civic address element registrations use CAtype 40.'
section: "4"
