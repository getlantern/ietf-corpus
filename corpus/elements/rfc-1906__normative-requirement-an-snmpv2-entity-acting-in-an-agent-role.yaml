document: rfc-1906
kind: normative-requirement
summary: An SNMPv2 entity acting in an agent role MUST NEVER prime its NBP name-to-address cache. It should perform NBP lookups only when it needs to send a trap; when generating a response, it need not confirm a cache entry.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
    - snmp
