document: rfc-6487
kind: protocol-element
summary: For CA certificates, the Subject Information Access extension MUST be present and non-critical, and MUST include both an id-ad-caRepository entry (rsync URI to the CA's publication directory) and an id-ad-rpkiManifest entry (OID id-ad 10, rsync URI to the CA's manifest).
section: 4.8.8.1
topics:
