document: rfc-8412
kind: normative-requirement
summary: The SWIMA-PC MUST be able to generate a Software Identifier for each record it delivers; if it cannot, the record cannot be delivered. All SWIMA-PCs MUST at least be able to generate Software Identifiers for the data model types specified in Section 6.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
