document: rfc-7159
kind: interoperability-note
summary: 'JSON texts containing unpaired UTF-16 surrogates (e.g., "\uDEAD") have unpredictable behavior: implementations may return different string lengths or suffer fatal runtime exceptions. This can arise when a library truncates a UTF-16 string without checking for surrogate pairs.'
section: "8.2"
topics:
    - json
