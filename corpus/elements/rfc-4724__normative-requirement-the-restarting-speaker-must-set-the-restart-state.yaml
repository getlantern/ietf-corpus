document: rfc-4724
kind: normative-requirement
summary: The Restarting Speaker MUST set the Restart State bit in the Graceful Restart Capability of its OPEN message when re-establishing sessions. The Forwarding State bit for an address family MUST only be set if forwarding state was actually preserved for that family during the restart (unless overridden by configuration).
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
