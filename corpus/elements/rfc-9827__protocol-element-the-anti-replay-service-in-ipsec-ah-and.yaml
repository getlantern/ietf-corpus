document: rfc-9827
kind: protocol-element
summary: The anti-replay service in IPsec AH and ESP uses a monotonically increasing counter that never wraps, sent in the Sequence Number field of each packet. The receiver maintains a sliding window to detect duplicates; enabling anti-replay is optional and per-SA at the receiver.
section: "1"
topics:
    - ipsec
    - security
