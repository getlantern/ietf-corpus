document: rfc-8416
kind: normative-requirement
summary: When both Validation Output Filters and Locally Added Assertions are used, the resulting assertions MUST be the same as if output filtering were performed before locally adding assertions; that is, Locally Added Assertions MUST NOT be removed by output filtering.
section: "3.2"
rfc2119_level: MUST
topics:
