document: rfc-1449
kind: protocol-element
summary: SNMPv2 over OSI (CLTS) serializes each message onto a single TSDU. Agents using CL-mode service should listen on transport selector 'snmp-l'; notification sinks on 'snmpt-l'. For CO-mode, selectors are 'snmp-o' and 'snmpt-o' respectively.
section: "4.2"
