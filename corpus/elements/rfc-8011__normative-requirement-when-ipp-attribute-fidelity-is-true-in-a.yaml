document: rfc-8011
kind: normative-requirement
summary: When 'ipp-attribute-fidelity' is 'true' in a Job Creation request, the Printer MUST reject the job if any supplied attribute or value is unsupported. When 'false' (the default if not supplied by the Client), the Printer accepts and processes the job while substituting or ignoring unsupported attributes and returning them in the Unsupported Attributes group.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
