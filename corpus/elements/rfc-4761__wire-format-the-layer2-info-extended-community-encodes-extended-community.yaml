document: rfc-4761
kind: wire-format
summary: 'The Layer2 Info Extended Community encodes: Extended community type (2 octets), Encaps Type (1 octet), Control Flags (1 octet), Layer-2 MTU (2 octets), Reserved (2 octets). The Encaps Type for VPLS is 19; Control Flags bit C indicates control word requirement, bit S indicates sequenced delivery requirement.'
