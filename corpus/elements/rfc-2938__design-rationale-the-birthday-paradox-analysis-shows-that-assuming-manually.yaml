document: rfc-2938
kind: design-rationale
summary: The birthday paradox analysis shows that assuming manually generated feature sets, the probability of two distinct feature sets yielding the same MD5 hash is negligibly small (less than 1 in 10^38 for any pair). Even with 1 billion feature sets in circulation, the collision probability remains only 1 in 10^21.
