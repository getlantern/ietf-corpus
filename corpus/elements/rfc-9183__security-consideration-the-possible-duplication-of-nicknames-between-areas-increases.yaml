document: rfc-9183
kind: security-consideration
summary: The possible duplication of nicknames between areas increases the risk of a TRILL Data packet being delivered to the wrong egress RBridge if areas are unexpectedly merged. In most cases such misdelivered data would be discarded at the egress as it would not match a known end-station Data Label/MAC address.
section: "9"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
