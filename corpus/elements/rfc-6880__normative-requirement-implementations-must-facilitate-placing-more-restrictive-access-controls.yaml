document: rfc-6880
kind: normative-requirement
summary: Implementations MUST facilitate placing more restrictive access controls on KeySets than on other principal data, and MUST support more secure backup arrangements for KeySets, given that Kerberos 5 security depends absolutely on the confidentiality and integrity of key objects in the KDC.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
