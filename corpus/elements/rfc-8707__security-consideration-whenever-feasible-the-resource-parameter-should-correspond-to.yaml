document: rfc-8707
kind: security-consideration
summary: Whenever feasible, the 'resource' parameter should correspond to the network-addressable location of the protected resource, enabling the client to validate that the resource being requested controls that network location. If using an abstract identifier, the client is responsible for out-of-band validation that network endpoints receiving tokens are the intended audience.
section: "3"
topics:
    - oauth
    - security
