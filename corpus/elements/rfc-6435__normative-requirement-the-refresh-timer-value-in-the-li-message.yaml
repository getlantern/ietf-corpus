document: rfc-6435
kind: normative-requirement
summary: The Refresh Timer value in the LI message MUST NOT be changed for the duration of a lock. A node receiving an LI message with a changed Refresh Timer MAY ignore the new value and continue to apply the old value.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - mpls
