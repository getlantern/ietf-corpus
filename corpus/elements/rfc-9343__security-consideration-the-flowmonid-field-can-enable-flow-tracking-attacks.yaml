document: rfc-9343
kind: security-consideration
summary: The FlowMonID field can enable flow-tracking attacks, allowing an attacker to collect information about network paths. The marking bits alone are insufficient for single-point reconnaissance, but multi-point passive eavesdropping could yield performance data. Controlled-domain deployment mitigates these risks.
section: "6"
topics:
    - ip
    - measurement
    - security
    - privacy
