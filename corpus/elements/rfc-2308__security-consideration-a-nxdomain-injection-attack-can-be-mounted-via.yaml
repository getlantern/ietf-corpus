document: rfc-2308
kind: security-consideration
summary: A NXDOMAIN injection attack can be mounted via a CNAME that causes a parent server to query an attacker-controlled server. Resolvers can mitigate this by re-querying the final QNAME while ignoring NS data received during the query.
section: "11"
topics:
    - dns
    - security
