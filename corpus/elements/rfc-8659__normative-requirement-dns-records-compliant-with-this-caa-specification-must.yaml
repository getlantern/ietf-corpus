document: rfc-8659
kind: normative-requirement
summary: DNS records compliant with this CAA specification MUST clear (set to 0) all reserved flag bits (bits 1–7). Applications that interpret CAA records MUST ignore the value of all reserved flag bits.
section: "4.1"
rfc2119_level: MUST
