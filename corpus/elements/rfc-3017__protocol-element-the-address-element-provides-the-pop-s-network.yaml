document: rfc-3017
kind: protocol-element
summary: 'The address element provides the POP''s network address as #PCDATA (e.g., a telephone number in ITU-T E.123 format such as ''+1 234 5678''). It has a required ''family'' attribute (E164 or X121) and optional ''countryCode'' and ''areaCode'' attributes.'
section: 6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
