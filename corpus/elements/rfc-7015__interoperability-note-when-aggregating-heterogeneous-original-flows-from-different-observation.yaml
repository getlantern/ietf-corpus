document: rfc-7015
kind: interoperability-note
summary: When aggregating heterogeneous Original Flows from different Observation Points into a single Aggregated Flow stream, the correlation and normalization operation must ensure each packet is represented in only one Aggregated Flow or set of Aggregated Flows differing only by aggregation interval, to prevent double-counting.
section: "6.4"
topics:
    - measurement
