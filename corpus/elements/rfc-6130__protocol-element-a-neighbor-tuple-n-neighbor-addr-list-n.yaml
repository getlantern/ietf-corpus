document: rfc-6130
kind: protocol-element
summary: A Neighbor Tuple (N_neighbor_addr_list, N_symmetric) aggregates all known network addresses of a single 1-hop neighbor and tracks whether any link to it is currently symmetric. Neighbor Tuples are removed only when all corresponding Link Tuples expire, not by independent timers.
section: "8.1"
topics:
    - routing
    - mobility
