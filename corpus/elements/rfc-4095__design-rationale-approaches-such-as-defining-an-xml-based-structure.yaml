document: rfc-4095
kind: design-rationale
summary: Approaches such as defining an XML-based structure to contain specific meta-data about solicitation class keywords were ruled out. The explicit design goal was to keep the system as simple as possible, merely associating a keyword with a URI that contains an explanation.
