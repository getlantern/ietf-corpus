document: rfc-2960
kind: normative-requirement
summary: DATA chunks MUST NOT be bundled with ABORT. Control chunks (except INIT, INIT ACK, and SHUTDOWN COMPLETE) MAY be bundled with ABORT but MUST appear before the ABORT chunk in the packet.
section: 3.3.7
rfc2119_level: MUST NOT
