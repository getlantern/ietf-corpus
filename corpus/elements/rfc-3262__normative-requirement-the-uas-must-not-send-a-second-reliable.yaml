document: rfc-3262
kind: normative-requirement
summary: The UAS MUST NOT send a second reliable provisional response until the first is acknowledged. The value of RSeq in each subsequent reliable provisional response MUST be greater by exactly one, and RSeq numbers MUST NOT wrap around.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
