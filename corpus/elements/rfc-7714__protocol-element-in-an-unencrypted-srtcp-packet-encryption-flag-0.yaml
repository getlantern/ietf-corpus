document: rfc-7714
kind: protocol-element
summary: In an unencrypted SRTCP packet (Encryption flag = 0), all RTCP data and the SRTCP index are Associated Data (authenticated only) and there is no Plaintext. GCM still produces a cipher consisting solely of the 16-octet authentication tag, placed before the Encryption flag and SRTCP index.
section: "9.3"
topics:
