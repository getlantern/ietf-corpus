document: rfc-4791
kind: protocol-element
summary: The CALDAV:supported-calendar-component-set property, if present, restricts the calendar component types allowed in a collection. It MUST be protected; clients may initialize it via MKCALENDAR but cannot modify it via PROPPATCH.
section: 5.2.3
