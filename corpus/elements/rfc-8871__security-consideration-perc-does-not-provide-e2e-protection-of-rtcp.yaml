document: rfc-8871
kind: security-consideration
summary: PERC does not provide E2E protection of RTCP messages, allowing a compromised Media Distributor to forge or modify media statistics, picture requests, and loss indications. Forged picture requests can consume significant bandwidth and impair conference performance.
section: 8.2.5
topics:
    - rtp
    - security
    - realtime
