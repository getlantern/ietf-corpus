document: rfc-7293
kind: wire-format
summary: 'The RRVS SMTP parameter is encoded as: `rrvs-param = "RRVS=" date-time [ ";" ( "C" / "R" ) ]` where date-time follows RFC 3339 format. This increases the maximum RCPT command length by 33 characters.'
