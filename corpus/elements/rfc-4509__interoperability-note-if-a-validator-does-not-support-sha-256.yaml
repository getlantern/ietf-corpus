document: rfc-4509
kind: interoperability-note
summary: If a validator does not support SHA-256 and no other supported digest type exists in the DS RRset, the validator has no supported authentication path from parent to child and should treat this as it would an authenticated NSEC RRset proving no DS RRset exists, per RFC 4035 Section 5.2.
section: "4"
topics:
    - dns
    - security
