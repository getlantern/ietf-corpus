document: rfc-5566
kind: normative-requirement
summary: IPsec SAs for BGP-signaled tunnel types MUST typically be established using IKEv2 with public-key or pre-shared key authentication. Manual SA configuration is also permitted (MAY) and must include keys, SPI numbers, IPsec protocol, integrity/encryption algorithms, and sequence number mode.
section: "3"
rfc2119_level: MAY
topics:
    - ipsec
    - bgp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
