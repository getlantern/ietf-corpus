document: rfc-5990
kind: normative-requirement
summary: The random integer z MUST be generated independently at random for different encryption operations, whether for the same or different recipients. Reuse of z across encryption operations would undermine the security of the scheme.
section: A.2
rfc2119_level: MUST
topics:
    - crypto
    - security
