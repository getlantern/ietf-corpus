document: rfc-8652
kind: protocol-element
summary: The ssm-map list (feature intf-ssm-map) provides (*,G) to (S,G) mapping policy, keyed by ssm-map-source-addr (union of 'policy' enum or IPv4/IPv6 address) and ssm-map-group-policy (string). The static-group list (feature intf-static-group) allows configuring static (*,G) or (S,G) multicast routes; IGMPv3/MLDv2 is required for (S,G) entries.
section: "4"
topics:
    - yang
    - multicast
