document: rfc-7829
kind: normative-requirement
summary: Acknowledgments for chunks transmitted to multiple destinations SHOULD NOT clear the error count for an inactive destination and SHOULD NOT move a PF-state destination to active, because the sender cannot determine whether the ACK was for the original or a retransmitted copy.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - sctp
    - multipath
