document: rfc-7578
kind: normative-requirement
summary: Multiple files for a single form field MUST be sent by supplying each file in a separate part, all with the same 'name' parameter. The previously recommended nested 'multipart/mixed' approach from RFC 2388 is deprecated for creators.
section: "4.3"
rfc2119_level: MUST
topics:
