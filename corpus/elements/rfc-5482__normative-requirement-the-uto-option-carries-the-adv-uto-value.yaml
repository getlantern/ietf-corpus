document: rfc-5482
kind: normative-requirement
summary: The UTO option carries the ADV_UTO value intended for synchronized connection states (ESTABLISHED, FIN-WAIT-1, FIN-WAIT-2, CLOSE-WAIT, CLOSING, LAST-ACK); connections in other states MUST use default timeout values from RFC 793 and RFC 1122.
section: "3.3"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
