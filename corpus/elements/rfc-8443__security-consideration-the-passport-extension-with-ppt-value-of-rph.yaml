document: rfc-8443
kind: security-consideration
summary: The PASSporT extension with 'ppt' value of 'rph' MUST only be sent with SIP INVITE when the SIP 'Resource-Priority' header field is used to convey priority. To avoid replay and cut-and-paste attacks, the recommendations in RFC 8224 Section 12.1 MUST be followed.
section: "7.1"
topics:
    - sip
    - security
