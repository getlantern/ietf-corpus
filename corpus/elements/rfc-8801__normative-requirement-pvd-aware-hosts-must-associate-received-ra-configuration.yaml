document: rfc-8801
kind: normative-requirement
summary: PvD-aware hosts MUST associate received RA configuration information with the Explicit PvD identified by the first PvD Option in the RA, or with the Implicit PvD (identified by host interface and RA source address) if no PvD Option is present. In case multiple PvD Options appear, hosts MUST ignore all but the first.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
