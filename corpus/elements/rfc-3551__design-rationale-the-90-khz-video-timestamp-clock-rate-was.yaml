document: rfc-3551
kind: design-rationale
summary: The 90 kHz video timestamp clock rate was chosen because it yields exact integer timestamp increments for all common video frame rates (24, 25, 29.97, 30 Hz) and field rates (50, 59.94, 60 Hz), and provides adequate resolution for RTCP SR/NTP synchronization and jitter estimation.
