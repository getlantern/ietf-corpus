document: rfc-6221
kind: normative-requirement
summary: On receipt of a DHCP message on a client-facing interface, the LDRA MUST discard messages of types ADVERTISE (2), REPLY (7), RECONFIGURE (10), and RELAY-REPL (13), as these are server-to-client messages that should not arrive on client-facing interfaces.
section: 6.1.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
