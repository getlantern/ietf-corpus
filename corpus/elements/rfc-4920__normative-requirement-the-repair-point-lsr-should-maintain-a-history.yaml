document: rfc-4920
kind: normative-requirement
summary: The repair point LSR SHOULD maintain a history table of all experienced blockages for an LSP (at least until routing protocol updates the state) so path computations can detour all blockages. The history table SHOULD be discarded using a timer no larger than the LSP retry timer configured on the ingress LSR.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
