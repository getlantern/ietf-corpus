document: rfc-7044
kind: design-rationale
summary: The 'rc', 'mp', and 'np' header field parameters were added in RFC 7044 (absent in RFC 4244) because deployment showed that implementations were making incompatible assumptions about which hi-entries were relevant (e.g., filtering to first/last redirection). Explicit tagging of the target-determination mechanism eliminates the need for such guesswork and reduces interoperability issues.
