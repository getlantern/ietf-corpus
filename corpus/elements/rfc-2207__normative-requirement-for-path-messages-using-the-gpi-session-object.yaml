document: rfc-2207
kind: normative-requirement
summary: For PATH messages using the GPI SESSION object, end-stations must verify that the protocol ID is a protocol known to use GPI SESSION. Protocol IDs 51 (AH) and 50 (ESP) must be supported by implementations of these IPSEC extensions.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - qos
