document: rfc-8956
kind: protocol-element
summary: The Redirect IPv6 (rt-redirect-ipv6) Traffic Filtering Action (Type 0x000d) is an IPv6-Address-Specific Extended Community that redirects matched traffic to a VRF routing instance importing the specified IPv6-Address-Specific Route-Target. It uses the same encoding as RFC 5701 with Type always 0x000d.
section: "6.1"
topics:
    - bgp
    - routing
    - ip
