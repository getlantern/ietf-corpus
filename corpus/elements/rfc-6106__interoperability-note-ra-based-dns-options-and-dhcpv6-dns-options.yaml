document: rfc-6106
kind: interoperability-note
summary: RA-based DNS options and DHCPv6 DNS options (RFC 3646) can coexist. When both are present, DHCP-sourced DNS information is placed first in the Resolver Repository and therefore takes precedence over RA-sourced DNS information for resolver queries.
section: "1.2"
topics:
    - dns
    - ip
    - v6ops
