document: rfc-8182
kind: normative-requirement
summary: On initialization, the Repository Server MUST generate a new random version 4 UUID as the session_id and MUST generate a Snapshot File for serial number ONE containing all currently known published objects, making it available at a URL unique to that session_id and serial.
section: 3.3.1
rfc2119_level: MUST
topics:
