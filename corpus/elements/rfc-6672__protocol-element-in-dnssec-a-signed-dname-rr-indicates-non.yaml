document: rfc-6672
kind: protocol-element
summary: In DNSSEC, a signed DNAME RR indicates non-terminal redirection. Any server-synthesized CNAME accompanying a DNAME will never itself be signed. A DNSSEC validator verifies the DNAME RR signature and confirms the CNAME was properly synthesized rather than requiring a separate CNAME signature.
section: 5.3.1
topics:
    - dns
    - security
