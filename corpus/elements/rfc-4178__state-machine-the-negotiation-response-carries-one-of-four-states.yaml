document: rfc-4178
kind: state-machine
summary: 'The negotiation response carries one of four states: accept-completed (context established, no further tokens needed), accept-incomplete (more tokens needed, MIC exchange optional), reject (negotiation terminated), or request-mic (MIC exchange REQUIRED if integrity available). negState is REQUIRED in the first reply and OPTIONAL thereafter; when absent, state is inferred from the negotiated mechanism context.'
section: 4.2.2
