document: rfc-5510
kind: normative-requirement
summary: In a packet erasure channel implementation, the location of erased symbols in the sequence MUST be known. Source symbols containing fewer than S m-bit elements (e.g., the last symbol of the last block) MUST be virtually padded with zero elements, though this padding need not be transmitted.
section: "8.4"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
