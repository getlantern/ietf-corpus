document: rfc-5019
kind: wire-format
summary: For HTTP GET requests, clients MUST base64-encode the OCSPRequest structure and append it to the URI from the AIA extension. Clients MUST NOT include CR or LF characters in the base64-encoded string and MUST properly URL-encode the base64-encoded OCSPRequest.
section: "5"
