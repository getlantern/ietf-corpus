document: rfc-6936
kind: normative-requirement
summary: IPv6 nodes that receive ICMPv6 messages referring to packets with a zero UDP checksum MUST validate the consistency of the reported packet (address and port numbers) to verify that it actually originated from the node before acting on the ICMPv6 information.
section: "4"
rfc2119_level: MUST
topics:
    - udp
    - ip
