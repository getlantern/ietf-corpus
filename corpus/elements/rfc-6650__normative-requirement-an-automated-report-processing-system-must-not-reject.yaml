document: rfc-6650
kind: normative-requirement
summary: An automated report processing system MUST NOT reject (in the SMTP sense) a report based solely on an unknown Feedback-Type. Unknown types may be set aside for manual handling.
section: "4.5"
rfc2119_level: MUST NOT
