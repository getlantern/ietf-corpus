document: rfc-6794
kind: normative-requirement
summary: After receiving a 488 (Not Acceptable Here) with a Policy-Contact header field and deciding to continue, the UAC MUST use one of the provided policy server URIs to contact the policy server per Section 4.5, then MUST apply the received policies and re-send the updated request with a Policy-ID header field.
section: 4.4.1
rfc2119_level: MUST
topics:
    - sip
