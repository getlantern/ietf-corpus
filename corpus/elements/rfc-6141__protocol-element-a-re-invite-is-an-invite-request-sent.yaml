document: rfc-6141
kind: protocol-element
summary: A re-INVITE is an INVITE request sent within an existing dialog to modify session parameters (e.g., IP address for a media stream), dialog parameters (e.g., the remote target URI), or both. It carries an offer/answer exchange and is a target-refresh request.
