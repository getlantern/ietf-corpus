document: rfc-9901
kind: normative-requirement
summary: The same digest value MUST NOT appear more than once in an SD-JWT. If any digest is encountered more than once (directly or via recursive Disclosures), the SD-JWT MUST be rejected.
section: "7.1"
rfc2119_level: MUST
topics:
    - jose
    - security
