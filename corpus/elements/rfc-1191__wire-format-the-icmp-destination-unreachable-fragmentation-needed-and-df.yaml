document: rfc-1191
kind: wire-format
summary: 'The ICMP Destination Unreachable ''fragmentation needed and DF set'' message (Type=3, Code=4) is extended: the previously-unused 32-bit field is split into a 16-bit ''unused'' high-order half (MUST be zero) and a 16-bit ''Next-Hop MTU'' low-order field carrying the MTU of the constricting hop in octets, including IP header and data but excluding lower-level headers.'
