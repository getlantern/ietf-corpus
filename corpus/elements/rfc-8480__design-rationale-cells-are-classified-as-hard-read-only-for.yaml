document: rfc-8480
kind: design-rationale
summary: Cells are classified as 'hard' (read-only for 6top, e.g., minimal 6TiSCH configuration cells) or 'soft' (fully managed by 6top). This distinction allows statically provisioned infrastructure cells to coexist with dynamically negotiated cells without 6P inadvertently deleting bootstrap connectivity.
section: "2.1"
