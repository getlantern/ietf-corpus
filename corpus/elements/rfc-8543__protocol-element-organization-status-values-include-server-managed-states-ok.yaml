document: rfc-8543
kind: protocol-element
summary: Organization status values include server-managed states (ok, hold, terminated, linked) and client/server-prefixed prohibitions (clientDeleteProhibited, serverUpdateProhibited, clientLinkProhibited, etc.) plus pending states (pendingCreate, pendingUpdate, pendingDelete). 'pendingCreate', 'ok', 'hold', and 'terminated' are mutually exclusive; an organization MUST have exactly one of these.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
