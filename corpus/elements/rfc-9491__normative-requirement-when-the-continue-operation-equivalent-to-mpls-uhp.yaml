document: rfc-9491
kind: normative-requirement
summary: When the CONTINUE operation (equivalent to MPLS UHP) is used for NSH over SR-MPLS, it is RECOMMENDED that a specific Prefix-SID be allocated at each node for SFC use, and the No Penultimate Hop Popping (No-PHP) flag MUST be set in the Prefix-SID Sub-TLV to prevent premature label pop.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
