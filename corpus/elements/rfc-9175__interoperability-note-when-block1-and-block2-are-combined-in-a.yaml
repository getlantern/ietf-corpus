document: rfc-9175
kind: interoperability-note
summary: When Block1 and Block2 are combined in a single operation, the Request-Tag value set during the Block1 phase must also be set in the Block2 phase; otherwise the request would have a different option set and would not be recognized as the same operation.
section: "3.4"
topics:
    - security
