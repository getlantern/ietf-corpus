document: rfc-8011
kind: state-machine
summary: 'Job objects transition through states: ''pending'' (queued, awaiting processing), ''pending-held'' (held, not ready for processing), ''processing'' (actively being processed), ''processing-stopped'' (halted mid-job), ''canceled'' (canceled by Cancel-Job), ''aborted'' (system-aborted), and ''completed'' (successfully finished). The ''canceled'', ''aborted'', and ''completed'' states are Terminating States from which no forward transitions occur.'
section: 5.3.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
