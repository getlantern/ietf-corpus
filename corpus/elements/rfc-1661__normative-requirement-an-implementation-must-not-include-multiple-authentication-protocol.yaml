document: rfc-1661
kind: normative-requirement
summary: An implementation MUST NOT include multiple Authentication-Protocol Configuration Options in a Configure-Request. It SHOULD attempt the most desirable protocol first and, if Configure-Nak'd, attempt the next most desirable in the subsequent Configure-Request.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
