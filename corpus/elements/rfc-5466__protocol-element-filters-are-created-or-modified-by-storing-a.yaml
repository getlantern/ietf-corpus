document: rfc-5466
kind: protocol-element
summary: Filters are created or modified by storing a non-NIL value in the /private/filters/values/<filter_name> or /shared/filters/values/<filter_name> server annotation via SETMETADATA. Deletion is done by storing NIL in both entries.
