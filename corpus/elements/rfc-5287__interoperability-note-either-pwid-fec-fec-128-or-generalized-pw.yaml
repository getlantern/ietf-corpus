document: rfc-5287
kind: interoperability-note
summary: Either PWId FEC (FEC 128) or Generalized PW FEC (FEC 129) MAY be used for TDM PW setup; when using the Generalized PW FEC for CESoPSN data/signaling PW pairs, no specific rules for matching the two FECs are defined and implementation-specific mechanisms MAY be used.
