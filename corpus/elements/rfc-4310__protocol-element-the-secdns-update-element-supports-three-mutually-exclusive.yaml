document: rfc-4310
kind: protocol-element
summary: 'The <secDNS:update> element supports three mutually exclusive child operations: <secDNS:add> to add DS records to an existing set, <secDNS:rem> to remove DS records by key tag, and <secDNS:chg> to replace all existing DS records. It also carries an optional boolean ''urgent'' attribute (default false).'
section: 3.2.5
topics:
    - dns
    - security
