document: rfc-1194
kind: normative-requirement
summary: Any data transferred MUST be in ASCII format, with no parity, and with lines ending in CRLF. Other character formats such as EBCDIC are excluded; characters between ASCII 128 and 255 should represent genuine international data, not USASCII with parity set.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
