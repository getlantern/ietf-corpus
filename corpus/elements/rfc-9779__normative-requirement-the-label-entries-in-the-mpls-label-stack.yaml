document: rfc-9779
kind: normative-requirement
summary: The label entries in the MPLS Label Stack Sub-TLV MUST be in network order. The responder that supports this Sub-TLV MUST process only the first Return Path Sub-TLV and MUST send the response message back on the return path specified therein.
section: 6.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
