document: rfc-1990
kind: design-rationale
summary: Null fragments (both B and E bits set, no payload) SHOULD be sent on links that become idle immediately after transmitting an E-bit fragment, to advance M at the receiver and prevent indefinite reassembly stalls. Implementations may defer null fragments until a timer expires to avoid wasting bandwidth.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
