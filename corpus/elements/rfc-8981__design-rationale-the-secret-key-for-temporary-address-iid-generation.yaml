document: rfc-8981
kind: design-rationale
summary: The secret_key for temporary address IID generation must not be shared with the stable-address secret_key (RFC 7217) because reusing the same key would enable an observer to correlate stable and temporary addresses to the same host, defeating the privacy goal.
section: 3.3.2
topics:
    - ip
    - crypto
    - privacy
