document: rfc-5731
kind: state-machine
summary: 'A domain object starts in ''inactive'' status when created with no associated name server hosts. Transitions occur as operations are applied: ''ok'' is set when no prohibitions or pending operations exist; ''pendingXxx'' is set when a transform command is received but awaiting completion; pending statuses are removed upon completion and ''ok'' is restored or other applicable statuses applied.'
section: "2.3"
topics:
    - dns
