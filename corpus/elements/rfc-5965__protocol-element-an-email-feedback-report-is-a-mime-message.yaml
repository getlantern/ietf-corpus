document: rfc-5965
kind: protocol-element
summary: 'An email feedback report is a MIME message with top-level content type ''multipart/report'' with the ''report-type'' parameter set to ''feedback-report''. It consists of three mandatory parts: a human-readable description, a machine-readable ''message/feedback-report'' section, and the original message or its headers.'
