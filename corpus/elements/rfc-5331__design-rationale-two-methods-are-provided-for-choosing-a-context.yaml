document: rfc-5331
kind: design-rationale
summary: 'Two methods are provided for choosing a context label on a LAN: manual provisioning of a 20-bit value (universally applicable), or auto-generation from the low-order bits of the interface''s primary IPv4 address (only when all LSRs on the LAN have IPv4 addresses). The auto-generation method derives uniqueness from IP address uniqueness on the LAN.'
section: "8"
