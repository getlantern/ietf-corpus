document: rfc-8044
kind: wire-format
summary: The 'extended' data type (value 15) encodes a 1-octet Extended-Type followed by one or more octets of Ext-Data. Extended-Type values 241–255 are reserved and MUST NOT be used. Ext-Data MUST NOT contain concat, vsa, extended, long-extended, or evs types.
