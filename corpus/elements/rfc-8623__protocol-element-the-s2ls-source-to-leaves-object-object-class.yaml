document: rfc-8623
kind: protocol-element
summary: The S2LS (Source-to-Leaves) Object (Object-Class 41, Object-Type 1) is a new PCEP object used to report the operational status of one or more destinations encoded in END-POINTS for a P2MP TE LSP. It contains a 32-bit Flags field with a 3-bit O (Operational) field.
