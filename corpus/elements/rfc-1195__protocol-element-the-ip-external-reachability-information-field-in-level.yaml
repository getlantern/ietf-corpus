document: rfc-1195
kind: protocol-element
summary: The IP External Reachability Information field in Level 2 LSPs carries routes to destinations outside the routing domain, learned from OSPF, EGP, RIP, or any other external protocol. Each entry carries a metric typed as 'internal' (comparable to internal metrics) or 'external' (not comparable).
section: "3.4"
topics:
    - routing
    - ip
