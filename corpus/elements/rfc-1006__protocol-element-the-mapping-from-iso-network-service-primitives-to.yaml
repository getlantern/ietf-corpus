document: rfc-1006
kind: protocol-element
summary: 'The mapping from ISO network service primitives to TCP: N-CONNECT maps to TCP active/passive open; N-DATA.REQUEST/INDICATION maps to TCP send/receive; N-DISCONNECT maps to TCP close or error. Address parameters map to IP addresses; all other connection parameters are ignored.'
