document: rfc-3510
kind: design-rationale
summary: The IPP URL scheme is based on the ABNF for the HTTP URL scheme defined in RFC 2616, which is derived from URI Generic Syntax (RFC 2396) and updated for IPv6 by RFC 2732. An IPP URL is transformed into an HTTP URL according to rules in section 5 of RFC 2910.
section: "1"
