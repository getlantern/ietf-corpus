document: rfc-4821
kind: protocol-element
summary: 'For TCP probing, two segmentation methods are defined: non-overlapping (probe and subsequent segments contain no overlapping data; failed probe gap requires retransmitting multiple smaller segments) and overlapping (subsequent data overlaps the probe such that the probe gap equals one MSS; probe size SHOULD be limited to 3x current MSS to avoid triggering Fast Retransmit).'
section: "10.1"
topics:
