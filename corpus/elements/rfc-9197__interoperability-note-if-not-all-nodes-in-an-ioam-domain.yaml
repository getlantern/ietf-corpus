document: rfc-9197
kind: interoperability-note
summary: If not all nodes in an IOAM-Domain support IOAM, non-supporting nodes forward packets without modifying IOAM-Data-Fields, resulting in incomplete trace records. The Overflow (O-bit) flag signals when insufficient space remains in a pre-allocated option to record further node data.
section: "4.4"
topics:
