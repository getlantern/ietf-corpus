document: rfc-3242
kind: normative-requirement
summary: The agreed optimistic approach principles MUST be enforced not only by the compressor but also by the transmitting assisting layer. An LLA decompressor MUST use optimistic approach knowledge to detect context loss; if suspected, it MUST invalidate the context and not forward packets before resynchronization.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
