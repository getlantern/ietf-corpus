document: rfc-5372
kind: normative-requirement
summary: When there are multiple JPEG 2000 packets in the same RTP payload packet, the sender MUST set the payload packet priority value to the lowest (most important) JPEG 2000 packet priority among those packed.
section: "3"
rfc2119_level: MUST
