document: rfc-5389
kind: protocol-element
summary: 'The long-term credential mechanism uses a digest challenge/response: the client sends an initial unauthenticated request; the server rejects it with 401 providing REALM and NONCE; the client retries with USERNAME, REALM, NONCE, and MESSAGE-INTEGRITY. Nonces may be invalidated by the server to provide additional security.'
section: "10.2"
topics:
    - nat
    - security
