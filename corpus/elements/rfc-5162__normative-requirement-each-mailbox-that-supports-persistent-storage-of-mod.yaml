document: rfc-5162
kind: normative-requirement
summary: Each mailbox that supports persistent storage of mod-sequences MUST increment the per-mailbox mod-sequence when one or more messages are expunged due to EXPUNGE, UID EXPUNGE, or CLOSE. The server MUST associate the incremented mod-sequence with the UIDs of the expunged messages.
section: "1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
