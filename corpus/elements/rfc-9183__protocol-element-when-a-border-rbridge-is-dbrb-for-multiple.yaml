document: rfc-9183
kind: protocol-element
summary: When a border RBridge is DBRB for multiple connected areas and receives a packet that was originally flooded on the L2 tree (i.e., a replication originated from one of its own areas), the replication arriving from L2 MUST be dropped, identified by the ingress nickname matching a border RBridge nickname of a connected L1 area.
section: "6"
topics:
    - routing
    - multicast
