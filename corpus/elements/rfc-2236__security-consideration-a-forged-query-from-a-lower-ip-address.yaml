document: rfc-2236
kind: security-consideration
summary: A forged Query from a lower IP address will cause the forger to assume Querier duties; if the forger ignores Leave Messages, traffic may flow to groups with no members for up to [Group Membership Interval]. Defenses include source address validation and Router Alert option enforcement.
