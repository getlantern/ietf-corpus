document: rfc-9240
kind: protocol-element
summary: 'A property map is a new ALTO information resource (media type: application/alto-propmap+json) requested via HTTP GET that returns all properties for all entities in declared entity domains. Its IRD capabilities include a ''mappings'' object (type EntityPropertyMapping) associating each entity domain name with the list of applicable entity property names.'
