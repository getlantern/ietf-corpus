document: rfc-6510
kind: normative-requirement
summary: When an LSP_ATTRIBUTES object is present before the first S2L_SUB_LSP object in a Resv message, it represents the operational status of all S2L sub-LSPs identified in the message; subsequent instances SHOULD be ignored and MUST be forwarded unchanged.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
