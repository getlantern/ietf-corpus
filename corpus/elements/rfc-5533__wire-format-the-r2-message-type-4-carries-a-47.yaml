document: rfc-5533
kind: wire-format
summary: The R2 message (Type=4) carries a 47-bit Responder Context Tag and the 32-bit Initiator Nonce copied from I2. It completes context establishment and is also sent when concurrent I1 messages cross in flight. Optionally carries a Locator List with CGA/HBA verification material.
