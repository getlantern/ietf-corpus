document: rfc-7848
kind: wire-format
summary: Telephone number elements (<mark:voice>, <mark:fax>, <smd:voice>) MUST begin with a plus sign ('+', ASCII 0x002B), followed by an ITU E.164 country code, a dot ('.', ASCII 0x002E), and digits. Maximum length is 17 characters. An optional 'x' attribute carries extension information.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
