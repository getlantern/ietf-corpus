document: rfc-6475
kind: design-rationale
summary: The PMIPV6-MIB extends MOBILEIPV6-MIB (RFC 4295) rather than defining all objects independently, using AUGMENTS on existing binding cache and binding update list entries. This keeps the MIB as simple as possible while leveraging existing Mobile IPv6 management infrastructure.
