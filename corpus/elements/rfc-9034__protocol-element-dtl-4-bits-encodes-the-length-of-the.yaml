document: rfc-9034
kind: protocol-element
summary: DTL (4 bits) encodes the length of the DT field as the number of hex digits minus one (i.e., DT field length = DTL+1 hex digits = 4*(DTL+1) bits), allowing DT to range from 4 to 64 bits. OTL (3 bits) encodes the length of the OTD field in hex digits; OTL=0 means OTD is absent.
