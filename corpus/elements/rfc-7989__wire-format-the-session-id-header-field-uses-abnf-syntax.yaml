document: rfc-7989
kind: wire-format
summary: 'The Session-ID header field uses ABNF syntax: session-id-value = local-uuid *(SEMI sess-id-param), where sess-uuid is exactly 32 lowercase hexadecimal characters ([0-9a-f]) and nil is 32 zeros. The remote UUID is carried as a ''remote'' parameter after a semicolon.'
