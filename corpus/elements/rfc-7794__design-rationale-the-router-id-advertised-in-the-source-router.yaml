document: rfc-7794
kind: design-rationale
summary: The Router ID advertised in the Source Router ID sub-TLVs is always the Router ID of the IS-IS instance that originated the advertisement, even if the prefix was learned from another protocol (X-flag set). This ensures consistent identification of the IS-IS originator.
section: "2.2"
topics:
    - routing
