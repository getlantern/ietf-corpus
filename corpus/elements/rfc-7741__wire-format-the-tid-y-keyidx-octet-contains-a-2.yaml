document: rfc-7741
kind: wire-format
summary: The TID/Y/KEYIDX octet contains a 2-bit temporal-layer index (TID), a 1-bit layer sync bit (Y), and a 5-bit temporal key frame index (KEYIDX, wrapping at 31). This octet MUST be present when either T or K is set to 1 in the extension control bits.
section: "4.2"
