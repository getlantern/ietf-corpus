document: rfc-4842
kind: wire-format
summary: 'The CEP Header is a 64-bit (two 32-bit word) structure containing: 4 reserved zero bits, L (CEP-AIS), R (CEP-RDI), N and P (pointer adjustment), FRG (2 bits, must be 0), Length (6 bits), Sequence Number (16 bits), Reserved (20 bits), and Structure Pointer (12 bits). An optional 4-byte or 12-byte header extension carries the Equipped Bit Mask (EBM) for fractional encapsulations.'
section: "5.2"
topics:
