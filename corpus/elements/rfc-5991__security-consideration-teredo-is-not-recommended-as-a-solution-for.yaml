document: rfc-5991
kind: security-consideration
summary: Teredo is NOT RECOMMENDED as a solution for networks that wish to implement strict controls for Internet traffic; administrators of such networks may wish to filter all Teredo traffic at network boundaries, as Teredo can open holes in enterprise firewalls.
