document: rfc-4204
kind: normative-requirement
summary: An upstream node receiving a ChannelStatus message MUST send a ChannelStatusAck. Upon Channel Activation Indication, the corresponding data links MUST be put into the Active state; upon Channel Deactivation Indication, they MUST be taken out of the Active state.
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
