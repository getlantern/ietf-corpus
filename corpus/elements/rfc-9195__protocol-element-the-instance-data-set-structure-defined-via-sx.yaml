summary: The instance-data-set structure (defined via sx:structure extension) comprises a header part with metadata and a content-data anydata node carrying the actual instance data. Key header nodes include name, format-version, includes-defaults, content-schema, description, contact, organization, datastore, revision list, and timestamp.
