summary: 'The feature-capability indicator ABNF: `feature-cap = "+" fcap-name [EQUAL LDQUOT (fcap-value-list / fcap-string-value) RDQUOT]`. The leading ''+'' sign is mandatory for feature-capability indicators, distinguishing them from media feature tags.'
