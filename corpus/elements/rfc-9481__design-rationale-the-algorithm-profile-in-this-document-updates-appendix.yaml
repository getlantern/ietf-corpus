document: rfc-9481
kind: design-rationale
summary: The algorithm profile in this document updates Appendix D.2 of RFC 4210 to replace deprecated algorithms (3-DES, DSA, MD5/SHA-1 combinations, RC5, CAST-128) with modern equivalents, making AES-CBC and PBMAC1 mandatory instead of 3-DES and X9.9, to address weakening cryptographic strength over time.
section: "7.1"
topics:
