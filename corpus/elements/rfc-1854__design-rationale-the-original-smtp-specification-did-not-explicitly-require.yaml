document: rfc-1854
kind: design-rationale
summary: The original SMTP specification did not explicitly require servers to support command pipelining, so a non-trivial number of deployed servers cannot handle it. This extension uses EHLO negotiation so clients can use pipelining only with servers that declare support.
section: Introduction
