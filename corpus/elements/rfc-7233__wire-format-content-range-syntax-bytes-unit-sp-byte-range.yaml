document: rfc-7233
kind: wire-format
summary: 'Content-Range syntax: ''bytes-unit SP (byte-range-resp / unsatisfied-range)'' where byte-range-resp is ''first-byte-pos "-" last-byte-pos "/" (complete-length / "*")'' and unsatisfied-range is ''"*/" complete-length''. An asterisk for complete-length means the total length was unknown at generation time.'
section: "4.2"
topics:
    - http
