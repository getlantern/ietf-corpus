document: rfc-3456
kind: design-rationale
summary: By keeping configuration and addressing state on the DHCP server rather than in the IKE implementation, loss of a tunnel server does not result in loss of addressing state, making failover significantly easier to support. IKECFG creates a separate pool of address state that complicates failover provisioning.
section: "2.1"
topics:
    - ipsec
    - vpn
