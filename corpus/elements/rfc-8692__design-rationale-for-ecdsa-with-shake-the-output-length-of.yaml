summary: For ECDSA with SHAKE, the output length of the hash function is explicitly fixed (256 bits for SHAKE128, 512 bits for SHAKE256) for simplicity and compliance with the ECDSA standard specification [X9.62], which requires the output length to be explicitly determined.
