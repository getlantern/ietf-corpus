document: rfc-2019
kind: design-rationale
summary: FDDI adjacency detection uses the LLC priority field of the FC octet to distinguish FDDI-native frames from frames that have traversed an Ethernet (which must have zero priority per IEEE 802.1d). This allows per-destination MTU determination without router support.
section: Interaction with Bridges
