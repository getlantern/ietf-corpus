document: rfc-6266
kind: normative-requirement
summary: Recipients MAY take steps to recover a usable field value from an invalid Content-Disposition header, but SHOULD NOT reject the message outright unless it is a validator. The default handling of invalid fields is to ignore them.
section: "3"
rfc2119_level: SHOULD NOT
