document: rfc-9578
kind: normative-requirement
summary: For Blind RSA, the SPKI object MUST use the id-RSASSA-PSS OID; the parameters field MUST contain RSASSA-PSS-params and MUST include hashAlgorithm, maskGenAlgorithm, and saltLength, where saltLength MUST match the hash output size.
section: "6.5"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - crypto
    - pkix
