document: rfc-9705
kind: interoperability-note
summary: 'RI-RSVP-FRR extensions are enabled per-LSP direction only when all relevant neighbors support them: for link protection, NHOP/PHOP must support; for node protection, both NHOP+NNHOP (downstream) or PHOP+PPHOP (upstream) must support. This allows incremental deployment scoped to network regions.'
section: 4.6.2.3
topics:
    - mpls
    - routing
