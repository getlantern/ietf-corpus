document: rfc-3025
kind: normative-requirement
summary: When a Mobile IP entity receives a registration request with a recognized CVSE but an unknown/unsupported vendor ID or Vendor-CVSE-Type, a registration reject MUST be sent with an error code indicating rejection due to unknown CVSE.
section: "2.3"
rfc2119_level: MUST
topics:
    - mobility
    - security
