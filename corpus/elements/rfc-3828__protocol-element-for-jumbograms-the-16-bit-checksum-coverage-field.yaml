document: rfc-3828
kind: protocol-element
summary: For Jumbograms, the 16-bit Checksum Coverage field can represent coverage up to 65535 octets. The checksum can cover either the entire payload (value zero) or at most the initial 65535 octets of the UDP-Lite packet.
