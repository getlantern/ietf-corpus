document: rfc-7873
kind: normative-requirement
summary: For anycast server clusters, it is RECOMMENDED that all server clones share the same Server Secret. If time skew exists during secret updates, servers SHOULD accept Server Cookies based on either the old or new secret for the maximum likely skew period.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - security
