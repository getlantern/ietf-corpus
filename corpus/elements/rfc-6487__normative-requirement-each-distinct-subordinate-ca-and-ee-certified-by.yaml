document: rfc-6487
kind: normative-requirement
summary: Each distinct subordinate CA and EE certified by the issuer MUST be identified using a subject name that is unique per issuer, where 'distinct' is defined as an entity and a given public key. An issuer SHOULD use a different subject name if the subject's key pair has changed.
section: "4.5"
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
