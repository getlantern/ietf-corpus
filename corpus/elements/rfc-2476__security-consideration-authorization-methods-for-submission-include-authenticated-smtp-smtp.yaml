document: rfc-2476
kind: security-consideration
summary: Authorization methods for submission include authenticated SMTP (SMTP-AUTH), IP address restrictions, secure IP (IPsec), and prior POP authentication. IP restrictions do not support travelers and can be spoofed; POP-before-SMTP has coordination and timing-window vulnerabilities.
section: "3.3"
topics:
    - email
    - security
