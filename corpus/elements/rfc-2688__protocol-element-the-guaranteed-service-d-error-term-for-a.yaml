document: rfc-2688
kind: protocol-element
summary: The Guaranteed Service D error term for a fragmenting implementation is calculated as D = Dlink + FRAG/LinkRate, and for a suspend/resume implementation as D = Dlink + pHeader + pDelay, where Dlink is fixed link overhead delay.
