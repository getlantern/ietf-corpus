document: rfc-6145
kind: normative-requirement
summary: All ICMPv4 packets MUST have their Type translated and, for ICMPv4 error messages, the included IP header MUST also be translated. The ICMPv6 checksum field MUST be calculated as part of translation since ICMPv6 has a pseudo-header checksum.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
