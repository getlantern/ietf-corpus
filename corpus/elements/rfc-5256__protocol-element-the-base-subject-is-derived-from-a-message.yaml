document: rfc-5256
kind: protocol-element
summary: 'The ''base subject'' is derived from a message''s Subject header by applying a multi-step normalization procedure: converting encoded-words to UTF-8, collapsing whitespace, stripping subj-trailer suffixes, stripping subj-leader and subj-blob prefixes, and unwrapping subj-fwd-hdr/subj-fwd-trl forwarding wrappers. The resulting text is used for subject-based sorting and threading.'
section: "2.1"
