document: rfc-9300
kind: design-rationale
summary: A maximum of two LISP headers is recommended (not mandated) to limit per-packet overhead and prevent encapsulation loops from misconfiguration. The first header separates location from identity at the site boundary; the second supports Traffic Engineering inside a service provider.
