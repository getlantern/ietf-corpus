document: rfc-2157
kind: interoperability-note
summary: The BP15 body part definition is fully compatible with RFC 1494. The multipart-message HEADING-EXTENSION uses id-hex-multipart-message-v2 (not the RFC 1494 version) because the original definition was insufficient for new multipart subtypes (Signed, Related). If both extensions appear on a message, a MIXER gateway should prefer the v2 one.
section: "6.6"
topics:
