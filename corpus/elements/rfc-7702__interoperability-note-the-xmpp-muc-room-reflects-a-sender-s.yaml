document: rfc-7702
kind: interoperability-note
summary: The XMPP MUC room reflects a sender's message back to all users including the sender. The MSRP-to-XMPP gateway SHOULD wait until receiving this reflected message before sending an MSRP 200 OK reply to the original sender, to correctly handle XMPP moderated rooms where message acceptance is not guaranteed.
section: 6.3.1
topics:
    - sip
    - realtime
