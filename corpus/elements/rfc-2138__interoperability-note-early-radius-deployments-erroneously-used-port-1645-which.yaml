document: rfc-2138
kind: interoperability-note
summary: Early RADIUS deployments erroneously used port 1645 (which conflicts with the 'datametrics' service). The officially assigned IANA port for RADIUS is 1812 (UDP). Implementations must be aware that legacy deployments may still use 1645.
section: "3"
topics:
