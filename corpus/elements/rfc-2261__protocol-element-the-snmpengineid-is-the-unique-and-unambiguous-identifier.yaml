document: rfc-2261
kind: protocol-element
summary: The snmpEngineID is the unique and unambiguous identifier of an SNMP engine within an administrative domain. Because there is a one-to-one association between SNMP engines and SNMP entities, it also uniquely identifies the SNMP entity.
