document: rfc-5073
kind: registry
summary: 'IANA created a new capability bit flags registry (sub-registry under a new IGP-TE base registry covering both OSPF and IS-IS) with five initial assignments: bit 0 (B, P2MP Branch LSR), bit 1 (E, P2MP Bud LSR), bit 2 (M, MPLS-TE), bit 3 (G, GMPLS), bit 4 (P, P2MP RSVP-TE). New bit allocations require IETF Consensus.'
