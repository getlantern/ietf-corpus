document: rfc-8503
kind: interoperability-note
summary: BGP-MPLS-LAYER3-VPN-MULTICAST-MIB is designed to be used in conjunction with MPLS-L3VPN-STD-MIB (RFC 4382) and IPMCAST-MIB (RFC 5132). Row pointers and shared index components (mplsL3VpnVrfName) link entries across these three MIB modules.
section: "3"
topics:
