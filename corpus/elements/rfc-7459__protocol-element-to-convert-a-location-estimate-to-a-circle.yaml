document: rfc-7459
kind: protocol-element
summary: To convert a location estimate to a Circle or Sphere, take the centroid as center and the maximum distance from the centroid to any point in the region of uncertainty as the radius. Specific formulas are given for each shape type (Ellipse, Polygon, Arc-Band).
