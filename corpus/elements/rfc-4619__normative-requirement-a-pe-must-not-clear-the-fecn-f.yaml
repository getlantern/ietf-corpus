document: rfc-4619
kind: normative-requirement
summary: A PE MUST NOT clear the FECN (F) or BECN (B) bits if received as 1. These bits MAY be set to reflect detected congestion on the PE, but are never cleared from 1 to 0.
section: 7.5.1
rfc2119_level: MUST NOT
topics:
    - mpls
    - congestion
