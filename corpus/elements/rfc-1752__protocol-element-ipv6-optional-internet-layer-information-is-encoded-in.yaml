document: rfc-1752
kind: protocol-element
summary: IPv6 optional internet-layer information is encoded in separate extension headers placed between the IPv6 header and the transport-layer header. Each extension header is identified by a distinct Next Header value and is not examined by intermediate routers unless it is the Hop-by-Hop Options header.
section: "12.2"
topics:
    - ip
