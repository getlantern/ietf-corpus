document: rfc-4796
kind: interoperability-note
summary: There is no mechanism to discover whether a peer endpoint understands the 'content' attribute because its values are purely informative at the offer/answer model level. A peer that does not understand the attribute can still establish the media session; the only consequence is that end-user interaction may be required to direct streams appropriately.
section: "6"
topics:
