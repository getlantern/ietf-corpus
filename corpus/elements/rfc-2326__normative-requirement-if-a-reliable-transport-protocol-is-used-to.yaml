document: rfc-2326
kind: normative-requirement
summary: If a reliable transport protocol is used to carry RTSP, requests MUST NOT be retransmitted; the RTSP application MUST instead rely on the underlying transport to provide reliability. Double retransmission at both layers would exacerbate congestion.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - realtime
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
