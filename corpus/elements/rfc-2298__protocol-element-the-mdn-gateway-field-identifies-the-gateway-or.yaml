document: rfc-2298
kind: protocol-element
summary: The MDN-Gateway field identifies the gateway or MTA that translated a foreign disposition notification into MDN format, using mta-name-type ';' mta-name. For Internet gateways the mta-name-type is typically 'smtp'.
