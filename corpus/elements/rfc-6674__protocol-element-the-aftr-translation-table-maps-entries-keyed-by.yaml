document: rfc-6674
kind: protocol-element
summary: The AFTR translation table maps entries keyed by (Softwire-ID, Context-ID, inner IPv4 address, port) to a public (IPv4 address, port) tuple. This allows access devices sharing the same private IPv4 address to be uniquely identified and NATted based on CID and SWID.
