document: rfc-5560
kind: protocol-element
summary: Type-P-one-way-replicated-packet-rate is a statistic giving the fraction of packets that were duplicated one or more times, computed as (number of packets with arrival-count > 1) / (number of packets sent and not lost). It is equivalent to ITU-T Y.1540 RIPR.
section: "5.2"
topics:
    - measurement
