document: rfc-2461
kind: normative-requirement
summary: Nodes MUST silently discard an ND packet containing an option with a Length field of zero. Receivers MUST silently ignore any options they do not recognize and continue processing the remainder of the message.
section: "4.6"
rfc2119_level: MUST
topics:
