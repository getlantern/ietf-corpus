kind: protocol-element
summary: The flowDataTable is indexed by flowDataRuleSet, flowDataTimeMark (a TimeFilter from RMON2-MIB), and flowDataIndex. The TimeFilter allows GetNext/GetBulk to efficiently retrieve only flows that have changed since a specified meter Uptime value.
