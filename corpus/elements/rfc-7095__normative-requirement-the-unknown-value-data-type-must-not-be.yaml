document: rfc-7095
kind: normative-requirement
summary: The UNKNOWN value data type MUST NOT be used in any plain vCard (RFC 6350); it is reserved exclusively for the jCard format. When converting jCard with type "unknown" to vCard, the VALUE parameter MUST NOT be specified and the value MUST be taken over without processing.
section: "5"
rfc2119_level: MUST NOT
topics:
    - json
    - registry
