document: rfc-2181
kind: normative-requirement
summary: 'DNS implementations must not place any restrictions on the labels that can be used beyond the length limits: individual labels are limited to 1–63 octets, and a full domain name is limited to 255 octets including separators. Any binary string is a valid DNS label.'
section: "11"
rfc2119_level: MUST NOT
topics:
    - dns
