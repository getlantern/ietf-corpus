document: rfc-9792
kind: design-rationale
summary: All OSPFv3 Prefix Options bits (8-bit field) have already been assigned, and only 5 bits remained unassigned in the OSPFv2 Extended Prefix TLV Flags field at publication time. To solve the exhaustion of prefix flag space, this document defines a variable-length Prefix Extended Flags sub-TLV applicable to both OSPFv2 and OSPFv3.
