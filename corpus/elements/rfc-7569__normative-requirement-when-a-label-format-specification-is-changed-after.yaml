document: rfc-7569
kind: normative-requirement
summary: When a label format specification is changed after a selector number is assigned, a new selector assignment MUST be requested rather than reusing the old one. The Specification Required policy applies to such requests.
section: "5.3"
rfc2119_level: MUST
