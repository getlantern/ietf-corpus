document: rfc-7641
kind: design-rationale
summary: Observable resource semantics (what constitutes a state change, at what granularity) are defined entirely by the server rather than by protocol-level trigger or threshold mechanisms. This allows application designers to choose the appropriate level of complexity, from raw sensor polling to complex parameterized queries.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
