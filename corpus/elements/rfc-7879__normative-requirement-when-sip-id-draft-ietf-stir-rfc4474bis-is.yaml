document: rfc-7879
kind: normative-requirement
summary: When SIP-ID (draft-ietf-stir-rfc4474bis) is in use — identified by an Identity header without an Identity-Info header — B2BUAs MUST NOT modify any headers used to construct the identity signature, but the B2BUA may still act as a media-relay B2BUA.
section: "3"
rfc2119_level: MUST NOT
topics:
