document: rfc-6353
kind: protocol-element
summary: The TLSTM session is uniquely identified by a tlstmSessionID. For DTLS/UDP, sessions are further uniquely identified by the combination of transportDomain, transportAddress, tmSecurityName, and requestedSecurityLevel. TLS/TCP sessions rely on TCP framing but still require a unique tlstmSessionID.
section: 3.1.3
topics:
