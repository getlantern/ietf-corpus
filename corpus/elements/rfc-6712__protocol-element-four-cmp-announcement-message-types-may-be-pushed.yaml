summary: 'Four CMP Announcement message types may be pushed by a CA via HTTP POST: [15] CA Key Update Announcement, [16] Certificate Announcement, [17] Revocation Announcement, and [18] CRL Announcement. These require no CMP response, only an HTTP status acknowledgement.'
