document: rfc-7078
kind: security-consideration
summary: An attacker can send packets with different source addresses to a destination to solicit different source addresses in responses, exploiting the privacy concern described in RFC 6724. The introduction of this DHCPv6 option does not modify this threat, regardless of whether the host is multihomed.
section: "5"
topics:
    - security
    - privacy
    - ip
    - v6ops
