document: rfc-9758
kind: security-consideration
summary: LocalNode and Private Use ipn URIs, if propagated beyond their valid domain, break ipn URI uniqueness, enabling a malicious node to disrupt correct network functioning. Sections 5.4 and 5.5 define the required behaviors to prevent this.
