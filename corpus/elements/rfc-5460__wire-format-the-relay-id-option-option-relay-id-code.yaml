document: rfc-5460
kind: wire-format
summary: 'The Relay-ID option (OPTION_RELAY_ID, code 53) carries a variable-length DUID identifying a relay agent. The format is: 2-octet option-code, 2-octet option-len (length of DUID in octets), followed by the DUID value.'
