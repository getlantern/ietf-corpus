document: rfc-8046
kind: protocol-element
summary: 'The basic mobility exchange (without rekeying) uses three UPDATE messages: mobile host sends UPDATE(ESP_INFO, LOCATOR_SET, SEQ); peer replies with UPDATE(ESP_INFO, SEQ, ACK, ECHO_REQUEST) containing a nonce challenge sent to the new address; mobile host completes with UPDATE(ACK, ECHO_RESPONSE) echoing the nonce.'
section: 3.2.1
topics:
    - ip
    - mobility
