document: rfc-4323
kind: interoperability-note
summary: DOCSIS 1.0 modems have no entries in the DOCS-IETF-QOS-MIB. For devices supporting both DOCSIS 1.0 and 1.1/2.0, the DOCS-IF-MIB applies before modem registration and for DOCSIS 1.0 registered modems; DOCS-IETF-QOS-MIB applies only after a modem registers as DOCSIS 1.1 or 2.0.
section: 2.2.2.1
