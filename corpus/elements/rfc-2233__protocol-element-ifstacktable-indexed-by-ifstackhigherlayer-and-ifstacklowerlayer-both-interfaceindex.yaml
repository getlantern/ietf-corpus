document: rfc-2233
kind: protocol-element
summary: ifStackTable (indexed by ifStackHigherLayer and ifStackLowerLayer, both InterfaceIndex) defines the relationships between interface sub-layers. A row with ifStackHigherLayer=0 identifies the top of a stack; ifStackLowerLayer=0 identifies the bottom. ifStackStatus (RowStatus) controls row creation/deletion.
