document: rfc-5626
kind: protocol-element
summary: The 'reg-id' Contact header field parameter distinguishes concurrent registrations from the same UA instance over different flows for the same AOR. The registrar uses instance-id plus reg-id together as the binding key instead of the Contact URI.
section: "2.1"
