document: rfc-3834
kind: wire-format
summary: 'The Auto-Submitted field is defined using ABNF: ''Auto-Submitted:'' followed by one of ''no'', ''auto-generated'', ''auto-replied'', or an extension token, optionally followed by a semicolon-delimited parameter list. At most one Auto-Submitted field may appear in a message header.'
