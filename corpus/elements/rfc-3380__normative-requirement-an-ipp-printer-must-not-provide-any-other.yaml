document: rfc-3380
kind: normative-requirement
summary: An IPP Printer MUST NOT provide any other way, using IPP, to set the three IPP/1.1 READ-ONLY Printer Description attributes 'printer-uri-supported', 'uri-authentication-supported', and 'uri-security-supported' other than through 'printer-xri-supported', since they MUST have consistent values at all times.
section: "6.6"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
