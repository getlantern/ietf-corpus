document: rfc-7341
kind: normative-requirement
summary: If the client receives the DHCP 4o6 Server Address option on an interface where DHCPv4 is already active, the client MUST stop using IPv4 configuration obtained via DHCPv4 on that interface and MUST NOT use DHCPv4 on it while receiving the 4o6 Server Address option.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
