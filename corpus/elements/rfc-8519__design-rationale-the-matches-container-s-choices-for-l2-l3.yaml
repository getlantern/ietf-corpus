document: rfc-8519
kind: design-rationale
summary: The 'matches' container's choices for L2, L3, and L4 are expressed as separate YANG choice statements, allowing only one variant per layer per ACE. Additional match criteria (e.g., IPFIX) can be added by augmenting the 'matches' container rather than modifying the base module.
section: "3.1"
topics:
