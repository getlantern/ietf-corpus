document: rfc-5244
kind: interoperability-note
summary: Naive relay of R2 inter-register signals may result in unacceptably long call setup times and timeouts when a call passes through several exchanges and a gateway. In the worst case, the relay point must act as a terminating exchange on one side and reoriginate the call on the other.
section: 2.3.2
topics:
    - realtime
    - rtp
