document: rfc-6059
kind: normative-requirement
summary: The host SHOULD maintain the SDAT by removing entries when a prefix's valid lifetime expires, removing a router from an SDAT entry when it stops advertising a prefix (after three consecutive RAs without that prefix), and adding a router to an SDAT entry when it begins advertising a prefix that already has an entry.
section: "5.10"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
