document: rfc-4320
kind: design-rationale
summary: Non-100 provisional responses to non-INVITE requests are disallowed because non-INVITE transactions must complete rapidly; any information beyond 'I'm here' can be just as usefully delayed to the final response, and sending non-100 provisionals wastes bandwidth.
section: "2.1"
topics:
    - sip
    - realtime
