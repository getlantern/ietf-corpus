document: rfc-6716
kind: wire-format
summary: 'Code 3 packets include a frame count byte following the TOC byte: bit 0 (''v'') signals VBR, bit 1 (''p'') signals Opus padding presence, and bits 2–7 (''M'') encode the frame count. M MUST NOT be zero and total audio duration MUST NOT exceed 120 ms [R5].'
