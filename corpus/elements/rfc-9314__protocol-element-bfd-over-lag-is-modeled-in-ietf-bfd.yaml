document: rfc-9314
kind: protocol-element
summary: BFD-over-LAG is modeled in 'ietf-bfd-lag' with a 'session' list keyed by lag-name. Per-session configuration includes 'ipv4-dest-addr', 'ipv6-dest-addr', 'use-ipv4', and 'use-ipv6' leaves. Operational state is per member-link, with separate 'micro-bfd-ipv4' and 'micro-bfd-ipv6' containers for each LAG member link.
section: "2.8"
topics:
    - yang
