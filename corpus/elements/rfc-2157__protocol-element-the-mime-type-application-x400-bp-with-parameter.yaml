document: rfc-2157
kind: protocol-element
summary: The MIME type application/x400-bp with parameter 'bp-type=' carries any X.400 body part through MIME. For basic body parts the bp-type is the numeric tag; for Extended Body Parts it is the OBJECT IDENTIFIER from IPMS.body.externally-defined.data.direct-reference. The body is the raw BER encoding of IPM.Body.BodyPart including the initial tag octet.
section: "3.2"
topics:
