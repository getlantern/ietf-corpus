document: rfc-3301
kind: security-consideration
summary: The document states that no extra security risks beyond those specified in RFC 2661 are foreseen for the ATM access network extensions. For ATM SVC establishment, calling party number information MAY be used for first-level authentication analogously to PSTN/ISDN calling line ID.
