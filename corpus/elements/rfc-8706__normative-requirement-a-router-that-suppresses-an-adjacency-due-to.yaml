document: rfc-8706
kind: normative-requirement
summary: A router that suppresses an adjacency due to SA bit MUST NOT use that adjacency when performing its SPF calculation. In particular, the suppressed adjacency MUST NOT be pre-loaded into TENT.
section: 3.2.2
rfc2119_level: MUST NOT
