summary: 'The AVP header contains AVP Code (4 octets), AVP Flags (1 octet: V, M, P bits plus 5 reserved bits), AVP Length (3 octets, includes header and value but not padding), optionally Vendor-ID (4 octets, present only when V-bit is set), followed by data padded to a 4-octet boundary.'
