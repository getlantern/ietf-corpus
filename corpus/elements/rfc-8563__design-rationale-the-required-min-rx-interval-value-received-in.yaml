document: rfc-8563
kind: design-rationale
summary: The Required Min RX Interval value received in a unicast BFD Control packet from the head always takes precedence over the value received in multipoint BFD Control packets, allowing per-tail packet rate control and eliminating the random transmission delay for faster failure reporting.
