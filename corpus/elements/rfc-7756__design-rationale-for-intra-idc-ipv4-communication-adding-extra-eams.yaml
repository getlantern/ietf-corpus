document: rfc-7756
kind: design-rationale
summary: 'For intra-IDC IPv4 communication, adding extra EAMs directly in the ER (Section 5.2) avoids traversing the BR entirely, yielding lower latency than hairpinning (Section 5.1). The two approaches are mutually compatible: EAMs can appear on both ER and BR simultaneously.'
section: "5.2"
