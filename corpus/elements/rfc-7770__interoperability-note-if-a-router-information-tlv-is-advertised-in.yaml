document: rfc-7770
kind: interoperability-note
summary: If a Router Information TLV is advertised in multiple RI LSA instances and the multiple-instance processing is not explicitly specified in the defining RFC, the TLV from the RI LSA with the numerically smallest Instance ID is used and subsequent instances are ignored.
section: "3"
topics:
