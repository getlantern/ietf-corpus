document: rfc-8317
kind: design-rationale
summary: Approach B (single RT per EVI with a Leaf-Indication color flag in a new extended community) is chosen over Approach A (two RTs per EVI for Root/Leaf). Both approaches require the same data-plane enhancements, but Approach B is consistent with baseline EVPN RFC 7432 RT usage and provides better generality.
