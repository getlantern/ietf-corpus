document: rfc-8651
kind: normative-requirement
summary: Sub-Data Item Type is scoped within the parent Data Item type. Parsing errors in Sub-Data Items MUST cause the receiving implementation to issue a Session Termination Message with a Status Data Item set to status code 130 ("Invalid Data") and transition to the Session Termination state.
section: 3.1.1
rfc2119_level: MUST
topics:
    - routing
    - security
