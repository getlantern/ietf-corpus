document: rfc-6172
kind: design-rationale
summary: All known deployments of iFCP use address transparent mode exclusively for FC inter-switch links. Address translation mode cannot be used for FC inter-switch links because the necessary embedded fabric address translations for Switch Fabric Internal Link Services (ILSs) were never specified.
section: "3.1"
