document: rfc-791
kind: protocol-element
summary: 'IPv4 addresses are fixed 32-bit values in three classes: Class A (bit 0 = 0, 7-bit network, 24-bit host), Class B (bits 0-1 = 10, 14-bit network, 16-bit host), Class C (bits 0-2 = 110, 21-bit network, 8-bit host). The 111 prefix is reserved for extended addressing mode.'
section: "2.3"
