document: rfc-3393
kind: design-rationale
summary: 'The document avoids the term ''jitter'' because it is ambiguous: it means either variation relative to a clock signal (used in synchronous/circuit contexts) or variation relative to a reference metric such as average or minimum delay (used by computer scientists). ''Delay variation'' is used instead for precision.'
section: "1.1"
