document: rfc-2686
kind: interoperability-note
summary: If no Multilink Header Format option and no Short Sequence Number Header Format option is present but an MRRU option is present, long sequence number multilink headers with class 0 only are used by default (equivalent to Code=2, number of suspendable classes=1).
