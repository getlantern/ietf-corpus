document: rfc-1542
kind: normative-requirement
summary: BOOTP messages MUST be at least 300 octets (the minimum BOOTP header size). Messages larger than this minimum MUST also be accepted. Messages with an 'op' field other than BOOTREQUEST (1) or BOOTREPLY (2) MUST be silently discarded.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
