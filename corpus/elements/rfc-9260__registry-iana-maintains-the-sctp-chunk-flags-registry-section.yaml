document: rfc-9260
kind: registry
summary: IANA maintains the 'SCTP Chunk Flags' registry (Section 15.2), introduced from RFC 6096. Each chunk type has its own flags sub-registry; flag bits not defined for a given chunk type MUST be set to 0 on transmit and are ignored on receipt.
section: "15.2"
topics:
    - sctp
    - registry
