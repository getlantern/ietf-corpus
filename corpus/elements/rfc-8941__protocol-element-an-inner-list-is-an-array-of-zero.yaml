document: rfc-8941
kind: protocol-element
summary: An Inner List is an array of zero or more Items delimited by parentheses, with items separated by one or more spaces. Both the Inner List itself and its individual Items can carry Parameters. Parsers MUST support Inner Lists with at least 256 members.
