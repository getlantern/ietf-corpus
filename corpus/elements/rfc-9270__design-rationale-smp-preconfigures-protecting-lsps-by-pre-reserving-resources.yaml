document: rfc-9270
kind: design-rationale
summary: SMP preconfigures protecting LSPs by pre-reserving resources without activating them (e.g., cross-connects are not preestablished), allowing link and node resources to be shared by protecting LSPs of multiple disjoint working LSPs. SMP is always revertive.
