document: rfc-5557
kind: normative-requirement
summary: The M-bit in the RP object can be set only if the R (Reoptimization) flag is also set. When the M-bit is not set, break-before-make reoptimization is allowed for that request.
section: "5.3"
rfc2119_level: MUST
topics:
