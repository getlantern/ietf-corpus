document: rfc-791
kind: wire-format
summary: The Record Route option (Type=7) contains a length, a pointer, and a pre-allocated area for recording 32-bit internet addresses inserted by each forwarding module. The option size does not change; if full, the datagram is forwarded without recording but no error is raised unless there is partial space.
section: "3.1"
topics:
