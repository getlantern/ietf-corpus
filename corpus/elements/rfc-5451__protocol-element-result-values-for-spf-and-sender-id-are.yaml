document: rfc-5451
kind: protocol-element
summary: 'Result values for SPF and Sender-ID are: none (no policy records), neutral (sender ADMD makes no assertion), pass (client authorized), policy (authorized but local policy rejects), hardfail (explicitly not authorized), softfail (likely not authorized), temperror (transient error), permerror (unrecoverable error).'
