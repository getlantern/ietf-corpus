document: rfc-7716
kind: interoperability-note
summary: The GTM procedures of RFC 7524 are different from and NOT interoperable with the procedures defined in RFC 7716. The two sets can co-exist in the same network only if they are not applied to the same multicast flows or ASM multicast group addresses.
section: "3"
topics:
    - bgp
    - routing
    - multicast
