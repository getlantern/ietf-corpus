document: rfc-3776
kind: interoperability-note
summary: Per RFC 2401, the outer source address in tunnel packets is not checked, allowing the mobile node to use its new care-of address as the source of existing tunnel-mode security associations after movement without rekeying; however, some implementations are known to make source address checks.
section: "3.2"
topics:
    - ipsec
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
