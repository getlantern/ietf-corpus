document: rfc-4238
kind: design-rationale
summary: It is a goal to avoid content-processing to determine the nature of a message and its internal destination. A simple mail forwarding rule sending all inbound VPIM messages to a designated system should be sufficient, while still enabling routing of FAX, SMS, or other telephone-addressed messages to different systems.
section: "1"
topics:
    - email
    - realtime
