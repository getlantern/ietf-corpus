document: rfc-2930
kind: normative-requirement
summary: Except for GSS-API mode, TKEY responses MUST always have DNS transaction authentication (TSIG or SIG(0)) to protect keying data and error codes. This authentication MUST NOT use any key that the response itself is providing.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
