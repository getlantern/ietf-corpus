document: rfc-6160
kind: normative-requirement
summary: Regardless of key management technique, implementations MUST support AES-128 Key Wrap with Padding (RFC5649) as the content-encryption algorithm for EnvelopedData. AES-256 Key Wrap with Padding SHOULD be supported.
