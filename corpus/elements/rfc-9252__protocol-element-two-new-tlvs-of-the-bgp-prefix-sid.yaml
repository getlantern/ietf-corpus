document: rfc-9252
kind: protocol-element
summary: 'Two new TLVs of the BGP Prefix-SID attribute are defined: SRv6 L3 Service TLV (Type 5) encodes Service SID information for SRv6-based L3 services (equivalent to MPLS label for L3VPN), and SRv6 L2 Service TLV (Type 6) encodes Service SID information for SRv6-based L2/EVPN services. Each TLV contains a 1-octet Type, 2-octet Length, 1-octet RESERVED, and variable-length SRv6 Service Sub-TLVs.'
section: "2"
topics:
    - bgp
    - routing
    - ip
