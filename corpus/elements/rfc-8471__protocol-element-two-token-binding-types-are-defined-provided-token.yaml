document: rfc-8471
kind: protocol-element
summary: 'Two Token Binding types are defined: provided_token_binding (value 0), used when connecting to a server, and referred_token_binding (value 1), used when requesting tokens intended for presentation to a different server. Implementations MUST ignore any unknown Token Binding types.'
