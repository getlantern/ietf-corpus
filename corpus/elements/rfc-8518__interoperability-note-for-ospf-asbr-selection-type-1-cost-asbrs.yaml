document: rfc-8518
kind: interoperability-note
summary: For OSPF ASBR selection, type 1 cost ASBRs are preferred and type 2 cost ASBRs are pruned when mixed; among type 2 ASBRs, only those with equal external cost to the primary are eligible for LFA evaluation, with the cost to reach ASBR/forwarding address used as a tiebreaker.
section: 4.2.1.2
topics:
    - routing
