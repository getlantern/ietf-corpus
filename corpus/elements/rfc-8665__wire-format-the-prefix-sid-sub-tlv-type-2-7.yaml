document: rfc-8665
kind: wire-format
summary: The Prefix-SID Sub-TLV (Type 2, 7 or 8 octets depending on V-Flag) contains Flags (NP, M, E, V, L bits), Reserved, MT-ID, Algorithm, and SID/Index/Label. When V=0 and L=0, the field is a 4-octet global index; when V=1 and L=1, it is a 3-octet local label.
