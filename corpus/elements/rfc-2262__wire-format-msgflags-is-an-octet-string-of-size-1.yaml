document: rfc-2262
kind: wire-format
summary: 'msgFlags is an OCTET STRING of SIZE(1) with three defined bits: authFlag (bit 0), privFlag (bit 1), and reportableFlag (bit 2). The combination authFlag=0/privFlag=1 is reserved and must NOT be used; the three valid combinations map to noAuthNoPriv, authNoPriv, and authPriv.'
section: "6.4"
