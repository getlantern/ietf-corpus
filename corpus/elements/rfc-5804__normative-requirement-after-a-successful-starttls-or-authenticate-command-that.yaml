document: rfc-5804
kind: normative-requirement
summary: After a successful STARTTLS or AUTHENTICATE command that negotiates a SASL security layer, the server MUST re-issue its capability results followed by an OK response, to protect against man-in-the-middle attacks that alter the capability list.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
