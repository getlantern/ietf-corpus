document: rfc-8881
kind: protocol-element
summary: 'NFSv4.1 defines five lock types: share reservations (OPEN), byte-range locks, file delegations, directory delegations, and layouts. All locks for a client are tied to a single client-wide lease renewed by any activity on any session associated with that client.'
section: 1.8.4
extracted_by: claude-sonnet-4-6
