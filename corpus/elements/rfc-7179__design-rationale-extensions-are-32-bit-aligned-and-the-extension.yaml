document: rfc-7179
kind: design-rationale
summary: Extensions are 32-bit aligned and the extension area has a hard length limit (Op-Length field caps it at 124 octets) specifically to assist efficient hardware processing of frames with a TRILL Header extensions area. Despite this, including extensions may still force processing onto a 'slow path' with reduced throughput.
