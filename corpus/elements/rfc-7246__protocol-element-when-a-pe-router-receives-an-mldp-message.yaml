document: rfc-7246
kind: protocol-element
summary: When a PE router receives an mLDP message with a P2MP or MP2MP FEC where it is the root node and the opaque value is one of the VRF types defined in Section 3, it uses the RD encoded in the opaque value to determine the VRF context, then follows RFC 6826 procedures in that VRF context.
section: "2"
topics:
    - mpls
    - multicast
