document: rfc-7795
kind: protocol-element
summary: In MS-PW redundancy on S-PE, the S-PE has a single-homed side (one PW segment toward T-PE1) and a multi-homed side (multiple PW segments toward redundant T-PEs). The primary PW segment on the multi-homed side carries traffic while the secondary provides resiliency for T-PE or AC failure.
section: "2.1"
topics:
    - mpls
