document: rfc-5678
kind: normative-requirement
summary: To discover MoS via DHCPv4, the mobile node MUST include either a MoS IPv4 Address Option or a MoS Domain Name List Option in the Parameter Request List (PRL) in its DHCP messages per RFC 2131.
section: 6.1.1
rfc2119_level: MUST
