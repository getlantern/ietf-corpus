document: rfc-4008
kind: normative-requirement
summary: With the exception of Symmetric NAT, a NAT session entry MUST NOT exist in natSessionTable without a corresponding bind entry. Symmetric NAT derives translation parameters directly from an address map entry, bypassing the bind tables.
section: "4.9"
rfc2119_level: MUST NOT
topics:
    - nat
    - snmp
