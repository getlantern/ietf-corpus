document: rfc-7356
kind: wire-format
summary: 'FS-CSNP PDU (type 11): Scope field bits 1–7 hold the flooding scope; bit 8 is Reserved. Fixed header includes Source ID (ID Length + 1 octets), Start FS-LSP ID, and End FS-LSP ID (each ID Length + 2 octets). Variable-length fields are limited to those supported by standard CSNP.'
section: "3.2"
