document: rfc-9204
kind: normative-requirement
summary: An encoder MUST limit the number of streams that could become blocked to the value of SETTINGS_QPACK_BLOCKED_STREAMS at all times. If a decoder encounters more blocked streams than it promised to support, it MUST treat this as a connection error of type QPACK_DECOMPRESSION_FAILED.
section: 2.1.2
rfc2119_level: MUST
topics:
    - http
    - quic
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
