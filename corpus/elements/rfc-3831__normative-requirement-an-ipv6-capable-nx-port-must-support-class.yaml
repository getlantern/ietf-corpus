document: rfc-3831
kind: normative-requirement
summary: An IPv6-capable Nx_Port MUST support Class 3 FC service, MUST support continuously increasing SEQ_CNT, and its N_Port_Name format MUST be one of 0x1, 0x2, 0x5, 0xC, 0xD, 0xE, or 0xF.
