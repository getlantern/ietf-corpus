document: rfc-6066
kind: normative-requirement
summary: If an older session is resumed, the server MUST ignore the extensions and send a server hello containing none of the extension types; the functionality negotiated during the original session initiation is applied to the resumed session.
section: "1.1"
rfc2119_level: MUST
topics:
    - tls
