document: rfc-5334
kind: design-rationale
summary: The .ogg file extension previously used for application/ogg is reassigned to audio/ogg (Vorbis-only) because historically some implementations expected .ogg files to contain solely Vorbis-encoded audio, leading to the new .ogx extension for application/ogg.
section: "10.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
