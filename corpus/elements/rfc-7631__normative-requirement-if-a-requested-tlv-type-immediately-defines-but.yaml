document: rfc-7631
kind: normative-requirement
summary: If a requested TLV type immediately defines (but not necessarily allocates) all corresponding type extensions, a common name SHOULD be assigned for the TLV type. This case is unchanged by RFC 7631 and includes TLV types named ICV, TIMESTAMP, and LINK_METRIC.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
