document: rfc-4930
kind: normative-requirement
summary: When a command requires offline activity before completion, the server MUST clearly note in the response that the command has been received and processed but the action is pending (result code 1001). The object's state MUST clearly reflect the pending action, and the server MUST notify the client when offline processing completes.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
