document: rfc-7865
kind: design-rationale
summary: The SRC should create a Participant object for every participant it knows about, even those without a direct SIP signaling relationship (e.g., participants in a pre-mixed stream, or a 3pcc initiator). This allows the SRS to have a complete picture of who was involved in a CS regardless of the SRC's direct signaling scope.
section: 6.3.2
topics:
    - sip
    - realtime
