document: rfc-9554
kind: protocol-element
summary: 'The GRAMGENDER property (cardinality *) specifies the grammatical gender a contact prefers for salutations and grammatical constructs. Allowed values are: animate, common, feminine, inanimate, masculine, neuter, plus iana-token or x-name extensions.'
section: "3.2"
