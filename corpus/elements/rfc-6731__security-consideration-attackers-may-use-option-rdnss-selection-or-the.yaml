document: rfc-6731
kind: security-consideration
summary: Attackers may use OPTION_RDNSS_SELECTION or the DHCPv4 RDNSS Selection option to redirect DNS queries to malicious destinations for denial of service or man-in-the-middle attacks, by advertising broad domains/networks or placing an attacker's RDNSS as the highest-preference default. The primary countermeasure is implementing validating DNSSEC-aware resolvers.
section: "8.1"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
