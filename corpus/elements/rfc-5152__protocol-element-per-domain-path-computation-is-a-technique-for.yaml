document: rfc-5152
kind: protocol-element
summary: Per-domain path computation is a technique for establishing inter-domain TE LSPs where each node responsible for computing a section of the path is always along the path itself. It applies when the full end-to-end path cannot be or is not determined at the ingress node, and is not signaled across domain boundaries.
section: "1"
topics:
    - realtime
    - routing
    - mpls
