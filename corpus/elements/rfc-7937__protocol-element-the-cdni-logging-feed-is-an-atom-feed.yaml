document: rfc-7937
kind: protocol-element
summary: The CDNI Logging Feed is an Atom feed published by the dCDN that advertises available CDNI Logging Files. The uCDN polls this feed and then pulls individual log files via HTTP GET (Section 4.2). This constitutes the post-collection exchange mechanism.
