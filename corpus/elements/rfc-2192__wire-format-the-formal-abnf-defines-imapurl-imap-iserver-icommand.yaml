summary: 'The formal ABNF defines `imapurl = "imap://" iserver "/" [ icommand ]` where `icommand` is one of `imailboxlist`, `imessagelist`, or `imessagepart`. Key parameters use semicolon-prefixed names: `;TYPE=`, `;UID=`, `;SECTION=`, `;UIDVALIDITY=`, and `;AUTH=`.'
