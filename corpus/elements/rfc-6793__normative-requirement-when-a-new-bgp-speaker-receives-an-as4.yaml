document: rfc-6793
kind: normative-requirement
summary: When a NEW BGP speaker receives an AS4_PATH or AS4_AGGREGATOR attribute in an UPDATE from another NEW BGP speaker, it MUST discard the path attribute and continue processing. This case SHOULD be logged locally for analysis.
section: "6"
rfc2119_level: MUST
topics:
