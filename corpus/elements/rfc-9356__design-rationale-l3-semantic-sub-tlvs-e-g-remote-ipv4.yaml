document: rfc-9356
kind: design-rationale
summary: L3-semantic sub-TLVs (e.g., Remote IPv4 Address, Local/Remote Interface ID, OSPFv2 Link MSD) are not applicable to L2 bundle member links, while L2-semantic sub-TLVs (e.g., Adj-SID, bandwidth, delay, administrative group) are applicable. This distinction drives the applicability table in Section 2.
section: "2"
topics:
    - routing
