document: rfc-3459
kind: design-rationale
summary: Critical content processing is explicitly scoped as a content gateway function, not an MTA or UA function. This insight (attributed to Greg White) clarifies that the mechanism is about what gateways should do when bridging networks of differing capability, not about enforcing delivery at every hop.
