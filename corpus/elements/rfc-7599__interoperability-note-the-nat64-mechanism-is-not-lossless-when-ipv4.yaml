document: rfc-7599
kind: interoperability-note
summary: 'The NAT64 mechanism is not lossless: when IPv4-originated communication traverses a double NAT64 function (NAT464), IPv4 PMTUD using DF=1/MF=1 as specified in RFC 4821 ceases to be fully reliable, because double NAT64 translation converts that combination to DF=0/MF=1.'
