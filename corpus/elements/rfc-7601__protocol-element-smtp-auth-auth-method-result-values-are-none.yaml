document: rfc-7601
kind: protocol-element
summary: 'SMTP AUTH (''auth'' method) result values are: none (auth not attempted), pass (client authenticated successfully), fail (authentication attempted but unsuccessful), temperror (transient error during authentication), permerror (permanent error during authentication). Reported with ptype ''smtp'' and property ''auth'' (AUTH command identity) or ''mailfrom'' (AUTH parameter on MAIL FROM).'
section: 2.7.4
topics:
    - email
    - security
