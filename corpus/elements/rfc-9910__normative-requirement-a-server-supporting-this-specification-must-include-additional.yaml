document: rfc-9910
kind: normative-requirement
summary: 'A server supporting this specification MUST include additional rdapConformance string literals in responses. Specifically: ''rirSearch1'' and ''ips'' for any IP network search link or request; ''ipSearchResults'' for IP network search responses; ''rirSearch1'' and ''autnums'' for ASN searches; ''autnumSearchResults'' for ASN search responses; and a /help response includes all five literals.'
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
