document: rfc-7156
kind: state-machine
summary: 'In the MAG-Initiated LR authorization flow (scenario A12): MAG1 detects data packet from MN1 to MN2, sends AA-Request with MFV and MN identifiers, receives AA-Answer authorizing localized routing, then sends LRI to both LMAs and awaits LRA responses. On LRA_WAIT_TIME expiration, MAG1 re-requests authorization before retransmitting LRI up to LRI_RETRIES.'
