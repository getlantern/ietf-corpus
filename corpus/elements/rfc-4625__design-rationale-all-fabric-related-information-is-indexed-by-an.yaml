document: rfc-4625
kind: design-rationale
summary: All Fabric-related information is indexed by an arbitrary integer 'Fabric Index' so that the same MIB structure applies uniformly whether a switch operates on a single physical Fabric (index=1) or within multiple Virtual Fabrics (FC-SW-4). This avoids separate table definitions for virtual vs. physical environments.
section: "5.3"
topics:
    - routing
