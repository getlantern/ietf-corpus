document: rfc-5302
kind: normative-requirement
summary: L1L2 routers SHOULD only advertise in their L2 LSP those L1 routes that they use for forwarding themselves. They SHOULD NOT unconditionally advertise into L2 all prefixes from LSPs in the L1 database.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
