document: rfc-4825
kind: protocol-element
summary: An XCAP URI is constructed by concatenating the XCAP root URI, a document selector, the node selector separator ('~~'), a percent-encoded node selector, and an optional query component containing xmlns() namespace bindings. The node selector separator SHOULD NOT itself be percent-encoded; %7E%7E and ~~ are equivalent.
section: "6"
