document: rfc-6241
kind: normative-requirement
summary: For subtree filtering, if a filter element is unqualified (xmlns=''), the server MUST evaluate all XML namespaces it supports when processing that filter node. This wildcard mechanism does not apply to XML attributes.
section: 6.2.1
rfc2119_level: MUST
topics:
