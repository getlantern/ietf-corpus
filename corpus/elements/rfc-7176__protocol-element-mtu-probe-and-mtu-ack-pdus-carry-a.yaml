document: rfc-7176
kind: protocol-element
summary: MTU-probe and MTU-ack PDUs carry a common 8+2*(ID Length) byte fixed header with PDU Length (2 bytes), Probe ID (6 bytes opaque), Probe Source ID (ID Length bytes), and Ack Source ID (ID Length bytes). The TLV area MUST be padded with the Padding TLV to the exact size being tested.
section: "3"
topics:
