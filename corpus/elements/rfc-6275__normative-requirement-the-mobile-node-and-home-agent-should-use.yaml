document: rfc-6275
kind: normative-requirement
summary: The mobile node and home agent SHOULD use an IPsec security association to protect Mobile Prefix Solicitations and Advertisements. Both MUST support and SHOULD use ESP in transport mode with a non-NULL payload authentication algorithm.
section: "5.4"
rfc2119_level: SHOULD
