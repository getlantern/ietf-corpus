document: rfc-3588
kind: state-machine
summary: 'The Peer State Machine (Section 5.6) governs transport-level peer connections with states: Closed, Wait-Conn-Ack, Wait-I-CEA, Open, Closing, and Wait-Returns. Events include Start, R-Conn-CER (incoming connection), I-Rcv-CEA, Timeout, Disconnect, and Error; the Election Process resolves simultaneous open attempts.'
section: "5.6"
topics:
