document: rfc-6961
kind: normative-requirement
summary: If an inconclusive OCSP response cannot be resolved through other means and the application provides no guidance, the client MUST abort the connection because the server certificate has not been sufficiently validated.
section: "2.2"
rfc2119_level: MUST
topics:
