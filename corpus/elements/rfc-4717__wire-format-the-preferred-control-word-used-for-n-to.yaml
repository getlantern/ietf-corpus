document: rfc-4717
kind: wire-format
summary: 'The Preferred Control Word (used for N-to-one cell mode and AAL5 SDU mode) is 32 bits: 4-bit zero indicator, 4-bit flags, 6-bit length field (set to packet length if < 64 bytes, else 0; MUST be 0 for N-to-one), and 16-bit sequence number.'
