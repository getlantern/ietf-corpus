document: rfc-4035
kind: protocol-element
summary: 'DNSSEC allocates two new DNS message header bits: the CD (Checking Disabled) bit, controlled by resolvers, which a security-aware name server MUST copy from a query into the corresponding response; and the AD (Authentic Data) bit, controlled by name servers, which a security-aware name server MUST ignore when set in a query.'
section: "3"
topics:
    - dns
    - security
