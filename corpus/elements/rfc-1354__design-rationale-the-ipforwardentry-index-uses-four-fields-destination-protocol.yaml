document: rfc-1354
kind: design-rationale
summary: The ipForwardEntry index uses four fields (destination, protocol, policy, next-hop) rather than just destination, allowing a management station to represent and manage multiple multipath routes to the same destination and distinguish routes selected under different policy conditions.
