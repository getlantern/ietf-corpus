document: rfc-7172
kind: design-rationale
summary: 'VL and FGL coexistence is retained for three reasons: (1) VL switches can exchange VL packets through an FGL core using specified precautions; (2) a maintenance VLAN/FGL in which all switches participate is simpler if VL is used when any VL switches remain; (3) incremental campus upgrades from VL to FGL require long-term VL support.'
section: "2.4"
topics:
    - routing
