document: rfc-6435
kind: security-consideration
summary: MPLS-TP security builds on MPLS security assumptions (traffic injection is hard); the LI protocol additionally depends on G-ACh security as defined in RFC 5586 and RFC 4385, and on the data-plane security of the associated channel discussed in RFC 5085.
