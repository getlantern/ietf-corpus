document: rfc-7900
kind: protocol-element
summary: The Extranet Separation Extended Community is a new Transitive Opaque Extended Community used only when extranet separation is in effect. It is attached to UMH-eligible routes and to I-PMSI A-D or (C-*,C-*) S-PMSI A-D routes exported by VRFs that carry extranet traffic on separate P-tunnels.
section: "4.5"
