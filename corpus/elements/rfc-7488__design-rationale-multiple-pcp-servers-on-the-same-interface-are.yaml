document: rfc-7488
kind: design-rationale
summary: Multiple PCP servers on the same interface are not required to have the same capabilities, and PCP requests to them are independent. This allows deployment scenarios such as firewall-only servers where the client must contact all servers to install state everywhere.
section: "1"
topics:
