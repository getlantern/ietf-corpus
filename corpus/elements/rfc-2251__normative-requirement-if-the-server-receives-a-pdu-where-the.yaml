document: rfc-2251
kind: normative-requirement
summary: If the server receives a PDU where the LDAPMessage SEQUENCE tag cannot be recognized, the messageID cannot be parsed, the protocolOp tag is not a request, or encoding structures are incorrect, the server MUST return the Notice of Disconnection with resultCode protocolError and immediately close the connection.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ldap
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
