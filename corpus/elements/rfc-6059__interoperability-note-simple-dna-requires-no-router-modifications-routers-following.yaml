document: rfc-6059
kind: interoperability-note
summary: Simple DNA requires no router modifications; routers following standard RFC 4861 neighbor discovery procedures will delay RAs by 0–500 ms and rate-limit consecutive all-nodes multicast RAs to one per 3 seconds, giving a worst-case 3.5-second delay. NS-based unicast probing bypasses this delay when the host has a valid prior configuration.
section: "1.4"
topics:
