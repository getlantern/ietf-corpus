document: rfc-3436
kind: normative-requirement
summary: The supported maximum length of SCTP user messages MUST be at least 18437 bytes (2^14 + 2048 + 5), which is the maximum length of a TLSCiphertext as defined in RFC 2246.
section: "3.2"
rfc2119_level: MUST
topics:
