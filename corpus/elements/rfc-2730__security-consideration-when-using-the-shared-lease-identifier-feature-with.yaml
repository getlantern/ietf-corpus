document: rfc-2730
kind: security-consideration
summary: When using the Shared Lease Identifier feature with MADCAP security, the confidentiality of the Lease Identifier MUST be maintained by encrypting all messages containing it. The Lease Identifier MUST include at least 8 cryptographically random octets to resist guessing attacks.
section: "2.4"
rfc2119_level: MUST
topics:
    - multicast
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
