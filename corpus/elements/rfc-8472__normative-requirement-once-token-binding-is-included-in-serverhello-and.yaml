document: rfc-8472
kind: normative-requirement
summary: Once token_binding is included in ServerHello and the client supports the selected version, the version and key parameters SHALL be definitive for the TLS connection. The client MUST use the negotiated key parameters in the 'provided_token_binding' as described in RFC 8471.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
