document: rfc-4572
kind: security-consideration
summary: SDP messages describing TLS streams must have their integrity assured by the encapsulating application protocol (e.g., SIP, MGCP). The encapsulating protocol SHOULD invoke its own security mechanisms or use a lower-layer security service providing strong message authentication and effective replay protection.
section: "7"
topics:
    - tls
    - security
    - realtime
