document: rfc-9535
kind: design-rationale
summary: The original JSONPath proposal delegated filter expression evaluation to the host language runtime (e.g., JavaScript eval()), causing portability problems across environments. This specification removes all implementation-specific dependencies, making queries language-agnostic at the cost of some backwards compatibility.
section: "1.2"
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
