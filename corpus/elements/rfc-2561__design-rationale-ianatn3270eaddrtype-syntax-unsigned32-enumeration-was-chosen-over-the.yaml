document: rfc-2561
kind: design-rationale
summary: IANATn3270eAddrType (SYNTAX Unsigned32 enumeration) was chosen over the TDomain textual convention (OID syntax) because an integer is far simpler to embed as a component in an SNMP instance identifier. The IANA-administered module placement allows new address type values to be added without revising this RFC.
section: "3.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
