document: rfc-2327
kind: wire-format
summary: The origin field 'o=<username> <session-id> <version> <nettype> <addrtype> <address>' identifies the session originator. The tuple (username, session-id, nettype, addrtype, address) forms a globally unique session identifier; version must be increased on each modification. NTP timestamps are recommended for both session-id and version.
section: "6"
topics:
    - realtime
    - ntp
