document: rfc-8582
kind: wire-format
summary: The OC-Maximum-Rate AVP has AVP code 670, is of type Unsigned32, and expresses the maximum allowed request rate in requests per second. The V flag MUST NOT be set. A value of zero means no traffic is to be sent.
