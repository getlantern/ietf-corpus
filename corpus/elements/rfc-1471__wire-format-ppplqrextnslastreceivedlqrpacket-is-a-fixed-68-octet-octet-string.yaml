document: rfc-1471
kind: wire-format
summary: pppLqrExtnsLastReceivedLqrPacket is a fixed 68-octet OCTET STRING storing the most recently received LQR packet in network byte order. The first four octets contain the Magic-Number field, the next four the LastOutLQRs field, and the last four octets contain the SaveInOctets field. PPP and LAP-B headers are not stored.
section: "4.3"
topics:
