document: rfc-7303
kind: normative-requirement
summary: Applications converting XML from UTF-16 to another encoding MUST strip the BOM before conversion. When converting into UTF-16 (unlabelled or labelled 'utf-16'), the BOM MUST be added unless the original was UTF-8 with an existing BOM, which MUST be transcoded to the appropriate UTF-16 BOM.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
