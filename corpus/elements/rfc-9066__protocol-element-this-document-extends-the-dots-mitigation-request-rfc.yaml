document: rfc-9066
kind: protocol-element
summary: 'This document extends the DOTS mitigation request (RFC 9132 Section 4.4.1) with three new optional parameters: ''source-prefix'' (list of attacker IP prefixes in CIDR notation), ''source-port-range'' (list of port ranges defined by lower-port and upper-port), and ''source-icmp-type-range'' (list of ICMP/ICMPv6 type ranges defined by lower-type and upper-type). These convey attack source information to the Call Home DOTS server.'
section: 5.3.1
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
