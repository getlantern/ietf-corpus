document: rfc-4631
kind: protocol-element
summary: 'lmpNbrTable identifies neighbor nodes with which control channels may be established, indexed by lmpNbrNodeId (IPv4). Each entry stores retransmission parameters: lmpNbrRetransmitInterval (default 500 ms), lmpNbrRetryLimit (default 3), and lmpNbrRetransmitDelta (default 1) governing exponential backoff.'
section: "6.1"
topics:
