document: rfc-6611
kind: normative-requirement
summary: If assignment of a home agent is required only in the ASP, a minimal implementation MAY only support the delivery of home agent information from the DHCP server to the DHCP client through RFC 6610, without needing the NAS-to-DHCP-relay transfer mechanism.
