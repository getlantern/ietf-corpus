document: rfc-4931
kind: normative-requirement
summary: 'A server operator MUST use one name server specification form consistently: either host objects (<domain:hostObj>) or host attributes (<domain:hostAttr>). A server announcing support for host objects in its EPP greeting MUST NOT allow domain attributes to describe name server hosts.'
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
