document: rfc-9820
kind: normative-requirement
summary: The EAP peer MUST start the CoAP-EAP process by sending a POST to /.well-known/coap-eap (the trigger message), carrying the No-Response CoAP option and a URI payload indicating the resource where the EAP authenticator must send the next message.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - cbor
