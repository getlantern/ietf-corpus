document: rfc-9479
kind: normative-requirement
summary: In the Application-Specific SRLG TLV, at least one set of link identifiers (IPv4, IPv6, or Link Local/Remote) MUST be present. Multiple occurrences of the same identifier type MUST NOT be present. TLVs that do not meet these requirements MUST be ignored.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
