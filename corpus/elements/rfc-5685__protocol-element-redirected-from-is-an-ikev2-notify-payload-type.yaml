document: rfc-5685
kind: protocol-element
summary: REDIRECTED_FROM is an IKEv2 Notify payload (type 16408) included by the initiator in its IKE_SA_INIT request to the new VPN gateway to identify the original gateway that performed the redirect. It contains a GW Identity Type (1=IPv4, 2=IPv6) and the original gateway's IP address, and also implicitly signals redirect mechanism support to the new gateway.
section: "9.3"
topics:
    - ipsec
    - vpn
    - security
