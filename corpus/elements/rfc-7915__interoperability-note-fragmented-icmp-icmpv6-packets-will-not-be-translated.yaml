document: rfc-7915
kind: interoperability-note
summary: Fragmented ICMP/ICMPv6 packets will not be translated by IP/ICMP translators. Additionally, the translator does not translate any IPv4 options and does not translate IPv6 extension headers except the Fragment Header.
section: "1.2"
