document: rfc-4444
kind: design-rationale
summary: Separate isisSysLevelMetricStyle and isisSysLevelSPFConsiders objects allow an operator to migrate between narrow and wide metrics by first generating both styles, then shifting SPF to consider wide metrics only, achieving a hitless transition as described in RFC 3787.
