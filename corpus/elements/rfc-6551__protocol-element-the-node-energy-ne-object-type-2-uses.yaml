document: rfc-6551
kind: protocol-element
summary: 'The Node Energy (NE) object (type 2) uses sub-objects each encoding a 2-bit T field (node type: 0=mains, 1=battery, 2=scavenger), an ''I'' bit (include/exclude), an ''E'' bit (estimation present), and an 8-bit E_E field (estimated percentage of remaining energy). Multiple sub-objects combine to build inclusion/exclusion sets when used as a constraint.'
section: "3.2"
topics:
    - routing
