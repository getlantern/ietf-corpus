document: rfc-7880
kind: normative-requirement
summary: When using the S-BFD Echo function, it is RECOMMENDED that both S-BFD Control packets and S-BFD Echo packets be sent together, so that Control packets can verify the identity of the U-turn node and detect AdminDown transitions that Echo packets alone cannot detect.
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
