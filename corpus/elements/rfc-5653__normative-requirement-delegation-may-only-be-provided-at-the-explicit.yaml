document: rfc-5653
kind: normative-requirement
summary: Delegation may only be provided at the explicit request of the application. If the application instructs the GSSContext object that delegation is not desired, the implementation must not permit delegation to occur, overriding any mechanism-specific delegation controls.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
