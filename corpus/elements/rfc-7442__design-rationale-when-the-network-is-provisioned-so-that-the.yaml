document: rfc-7442
kind: design-rationale
summary: When the network is provisioned so that the RP for a group G is always between receivers and sources, the ingress PE for (S,G) always equals the ingress PE for the RP, making Source Active auto-discovery routes unnecessary. In that case, RFC 7438 in-band signaling with wildcards can be used instead of the procedures in this document.
section: "1"
topics:
    - mpls
    - multicast
