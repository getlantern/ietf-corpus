document: rfc-4227
kind: state-machine
summary: 'The responding SOAP node state machine has states: Init (await inbound request; may only generate ERR) → Receiving (receive request, prepare response) → Receiving+Sending (complete receiving/sending) → Success. Success and Fail are terminal states.'
