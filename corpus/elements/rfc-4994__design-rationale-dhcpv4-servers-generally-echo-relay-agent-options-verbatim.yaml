document: rfc-4994
kind: design-rationale
summary: DHCPv4 servers generally echo relay agent options verbatim back to the relay agent, but DHCPv6 does not require this. The ERO option was introduced to allow relay agents to explicitly request echoing of specific options they need, even when the server does not recognize them.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
