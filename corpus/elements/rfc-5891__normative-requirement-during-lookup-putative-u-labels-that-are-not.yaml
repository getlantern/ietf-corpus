document: rfc-5891
kind: normative-requirement
summary: During lookup, putative U-labels that are not in NFC, contain '--' in positions 3-4, begin with a combining mark, contain DISALLOWED code points, fail CONTEXTJ rules, lack defined CONTEXTO rules, or contain UNASSIGNED code points MUST be rejected prior to DNS lookup.
section: "5.4"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
