document: rfc-3977
kind: design-rationale
summary: NNTP distinguishes 'reading' (client fetches articles for a user) from 'transit' (bulk peer-to-peer transfer). Some server implementations are optimized for one use. The official port 119 is for reading servers; port 433 SHOULD be used for transit servers to allow separate deployments.
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
