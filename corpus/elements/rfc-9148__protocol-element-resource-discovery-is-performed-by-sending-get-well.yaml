document: rfc-9148
kind: protocol-element
summary: Resource discovery is performed by sending GET /.well-known/core?rt=ace.est* over CoAPS. The server MUST return ace.est.crts, ace.est.sen, and ace.est.sren in the response if it supports resource discovery; optional resources are only listed if implemented.
section: "4.1"
topics:
