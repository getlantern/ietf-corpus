document: rfc-5460
kind: state-machine
summary: 'A Bulk Leasequery reply is complete under three conditions: (1) the LEASEQUERY-REPLY had no OPTION_CLIENT_DATA — complete on receipt of LEASEQUERY-REPLY; (2) LEASEQUERY-REPLY had OPTION_CLIENT_DATA — complete on receipt of LEASEQUERY-DONE; (3) otherwise — complete when the connection is closed.'
section: 6.3.1
topics:
