document: rfc-5476
kind: protocol-element
summary: An Extended Packet Report MAY contain other Information Elements related to protocol fields (e.g., source/destination IP addresses), packet treatment (e.g., output interface, BGP AS), or Selection State (e.g., hash value), and MAY omit the raw packet content bytes that are mandatory in the basic report.
