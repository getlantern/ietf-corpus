document: rfc-8332
kind: design-rationale
summary: RSASSA-PKCS1-v1_5 was chosen over RSASSA-PSS because PSS is not universally available, PKCS#1 v1.5 is widely supported in existing SSH implementations, and PKCS#1 v1.5 is not known to be insecure for this use case.
