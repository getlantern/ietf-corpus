document: rfc-2453
kind: normative-requirement
summary: When generating a Response to a Request, the Response version SHOULD match the Request version. If a RIP-2 router is configured to send only RIP-2 messages, it MUST NOT respond to a RIP-1 Request.
section: "4.6"
rfc2119_level: SHOULD
topics:
    - routing
