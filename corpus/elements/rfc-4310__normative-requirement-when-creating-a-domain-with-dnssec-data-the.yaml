document: rfc-4310
kind: normative-requirement
summary: When creating a domain with DNSSEC data, the EPP <create> command MUST contain an <extension> element, which MUST contain a <secDNS:create> child element, which in turn MUST contain one or more <secDNS:dsData> elements.
section: 3.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
