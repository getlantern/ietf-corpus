document: rfc-9352
kind: protocol-element
summary: The Maximum End D MSD Type (SRH Max End D, value 45) specifies the maximum number of SIDs present in an SRH when performing decapsulation. Zero or absent means the router cannot perform decapsulation-and-forward when the outer IPv6 header contains an SRH.
section: "4.4"
topics:
