document: rfc-7172
kind: normative-requirement
summary: The FGL ingress process MUST copy the priority and DEI of an ingressed native frame to the upper 4 bits of the Inner.Label Low Order part. It SHOULD also associate a possibly different mapped priority and DEI in the Inner.Label High Part; if mapping is not supported, the original priority and DEI MUST be placed in the High Part.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
