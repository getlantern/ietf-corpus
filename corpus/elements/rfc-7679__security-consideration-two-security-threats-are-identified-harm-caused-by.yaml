document: rfc-7679
kind: security-consideration
summary: 'Two security threats are identified: harm caused by measurements (active packet injection that could cause congestion or denial of service if not carefully parameterized) and harm to measurements (routers prioritizing measurement traffic differently, or attackers injecting fake measurement packets to corrupt results). Authentication techniques such as digital signatures may guard against injected traffic attacks.'
section: "6"
topics:
