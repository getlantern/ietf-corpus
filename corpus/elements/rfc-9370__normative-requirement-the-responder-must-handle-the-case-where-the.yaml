document: rfc-9370
kind: normative-requirement
summary: The responder MUST handle the case where the initiator loses state and never sends remaining IKE_FOLLOWUP_KE exchanges by deleting the associated state after a reasonable timeout (typically 5–20 seconds).
section: 2.2.4
rfc2119_level: MUST
