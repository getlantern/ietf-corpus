document: rfc-3417
kind: normative-requirement
summary: BER serialization must use only the definite form for length encoding; the indefinite form is prohibited. Primitive form must be used for simple types (INTEGER, OCTET STRING, OBJECT IDENTIFIER); constructed form only for SEQUENCE types.
section: "8"
rfc2119_level: MUST
topics:
