document: rfc-3810
kind: normative-requirement
summary: 'Upon reception of a Query, the node MUST verify: the source address is a valid link-local address, the Hop Limit is 1, and the Router Alert option is present in the Hop-by-Hop Options header. If any check fails, the packet is dropped without further processing.'
section: "6.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
