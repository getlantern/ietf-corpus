document: rfc-7866
kind: normative-requirement
summary: For base interoperability, an SRC MUST support separate SDP m-lines (one per CS media direction). An SRS supporting audio recording MUST support receiving at least two audio m-lines; one supporting audio and video MUST support at least four total m-lines.
section: "8.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
