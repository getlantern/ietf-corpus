document: rfc-3956
kind: design-rationale
summary: MSDP was deliberately not specified for IPv6, leaving PIM-SM with no way to propagate active source information across domains and rendering interdomain ASM unusable. Embedded-RP was designed to fill this gap without requiring MSDP, by making the RP address self-describing in the group address.
section: "1.1"
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
