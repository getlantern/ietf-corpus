document: rfc-4712
kind: protocol-element
summary: The RAQMON Parameter Presence Flags (RPPF) is a 32-bit field in the BASIC part where each bit signals the presence of a specific parameter (bits 0–31 map to DA, RA, NTP Timestamp, Application Name, DN, RN, Session Setup Status, Session Duration, RTT, OWD, packet loss/discard counts, octets, ports, layer 2/3 priorities, payload types, CPU/memory utilization, delays, jitter, and fraction metrics).
section: 2.1.2
topics:
