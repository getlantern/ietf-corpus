document: rfc-9669
kind: protocol-element
summary: '64-bit immediate instructions (IMM mode, DW size, LD class) use the wide encoding and repurpose the ''src_reg'' field as an opcode subtype to encode: load 64-bit integer (0x0), map reference by file descriptor (0x1), map value address by fd (0x2), platform variable address (0x3), code address (0x4), map reference by index (0x5), and map value address by index (0x6).'
section: "5.4"
extracted_by: claude-sonnet-4-6
