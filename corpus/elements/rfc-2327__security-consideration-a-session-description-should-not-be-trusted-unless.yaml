document: rfc-2327
kind: security-consideration
summary: A session description should not be trusted unless obtained by an authenticated transport from a trusted source. SAP provides encryption and authentication, but anonymous originators are common in open multicast environments because no universal PKI exists for session announcement senders.
section: "7"
topics:
