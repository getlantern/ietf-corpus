document: rfc-3685
kind: interoperability-note
summary: Numeric comparison against spamtest/virustest results requires use of the SIEVE relational extension together with the 'i;ascii-numeric' comparator from ACAP, which tests for a numeric value at the start of the string while ignoring any trailing text.
