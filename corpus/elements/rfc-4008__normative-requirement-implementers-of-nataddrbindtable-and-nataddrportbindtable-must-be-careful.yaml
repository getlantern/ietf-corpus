document: rfc-4008
kind: normative-requirement
summary: Implementers of natAddrBindTable and natAddrPortBindTable must be careful not to create entries with index OIDs exceeding 128 subidentifiers, as such entries cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - snmp
