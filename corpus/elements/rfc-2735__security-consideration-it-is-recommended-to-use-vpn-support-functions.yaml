document: rfc-2735
kind: security-consideration
summary: It is RECOMMENDED to use VPN support functions in combination with NHRP authentication (section 5.3.4 of RFC 2332) to prevent VPN-related information from being misdirected to other VPNs or accessed across shared infrastructure. Where full trust in the NHRP authentication chain cannot be established, IPsec SHOULD be used for confidentiality and integrity.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - vpn
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
