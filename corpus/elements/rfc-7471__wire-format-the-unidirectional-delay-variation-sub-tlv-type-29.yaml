summary: The Unidirectional Delay Variation sub-TLV (type 29, length 4) contains 8 reserved bits and a 24-bit Delay Variation field in microseconds encoded as an integer. A value of 0 indicates the metric has not been measured; maximum encodable value is 16,777,215.
