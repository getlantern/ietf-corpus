document: rfc-8007
kind: wire-format
summary: CDN PID is encoded as a string with the format 'AS' followed by the CDN provider's Autonomous System number, a colon, and an additional numeric qualifier (e.g., 'AS64496:0'). If a CDN provider has multiple ASes, the same AS number SHOULD be used unless there are multiple distinct CDNs.
section: "4.6"
topics:
