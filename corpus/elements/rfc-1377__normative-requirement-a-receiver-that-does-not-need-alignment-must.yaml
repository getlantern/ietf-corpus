document: rfc-1377
kind: normative-requirement
summary: A receiver that does not need alignment MUST NOT request the Align-NPDU option. A sender that desires a particular alignment prior to sending SHOULD Configure-Nak with an appropriate Alignment value.
section: "3.1"
rfc2119_level: MUST NOT
