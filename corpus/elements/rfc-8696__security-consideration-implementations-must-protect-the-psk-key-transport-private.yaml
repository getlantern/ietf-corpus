document: rfc-8696
kind: security-consideration
summary: Implementations must protect the PSK, key transport private key, agreement private key, and key-derivation key. Compromise of the PSK alone makes encrypted content vulnerable to a future quantum computer; compromise of PSK plus either private key or KDK may result in disclosure of all protected content.
section: "7"
topics:
    - security
    - crypto
