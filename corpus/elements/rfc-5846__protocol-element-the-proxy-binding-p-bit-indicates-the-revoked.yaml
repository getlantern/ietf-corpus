document: rfc-5846
kind: protocol-element
summary: The Proxy Binding (P) bit indicates the revoked binding is a PMIPv6 binding. The IPv4 HoA Binding Only (V) bit indicates only the IPv4 Home Address binding is being revoked while the IPv6 HoA/HNP binding to the current CoA is maintained. Both bits are mirrored from BRI to BRA.
section: "5.1"
topics:
    - mobility
    - ip
