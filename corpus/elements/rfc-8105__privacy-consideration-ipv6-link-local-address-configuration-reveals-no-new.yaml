document: rfc-8105
kind: privacy-consideration
summary: IPv6 link-local address configuration reveals no new information to the 6LBR beyond what it already knows from the link layer connection. For non-link-local addresses, 6LNs SHOULD use randomly generated IIDs or privacy-preserving schemes such as CGAs, privacy extensions, HBAs, or semantically opaque addresses.
section: "5"
topics:
    - privacy
    - ip
    - v6ops
