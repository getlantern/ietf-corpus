document: rfc-6468
kind: security-consideration
summary: As required by RFC 3428, user agents supporting SIP MESSAGE MUST implement end-to-end authentication, body integrity, and body confidentiality mechanisms; without these, man-in-the-middle attacks can expose credentials and message content.
