document: rfc-6240
kind: normative-requirement
summary: Manual entries in the pwCepTable SHOULD be preserved after a reboot; the agent MUST ensure their integrity. If a row's entries are found inconsistent after reboot, the PW's pwOperStatus MUST be declared as notPresent(5).
section: "7"
rfc2119_level: MUST
topics:
