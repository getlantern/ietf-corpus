document: rfc-4825
kind: protocol-element
summary: The node selector grammar selects a single XML element, attribute, or namespace bindings via steps that match by expanded element name (by-name), position predicate (by-pos), attribute value predicate (by-attr), or combinations. Each intermediate step MUST resolve to exactly one element. The terminal selector may be an attribute selector ('@att-name') or namespace selector ('namespace::*').
section: "6.3"
topics:
    - http
