summary: The BIER Sub-TLV wire format includes a 2-octet Type field (value 9), variable-length Length field, 1-octet sub-domain-id, 1-octet MT-ID, 2-octet BFR-id, 1-octet BAR, 1-octet IPA, 2 reserved octets, and variable sub-TLVs.
