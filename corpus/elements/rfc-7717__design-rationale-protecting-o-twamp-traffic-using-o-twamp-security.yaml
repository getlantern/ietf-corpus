summary: Protecting O/TWAMP traffic using O/TWAMP security (with IKEv2-derived PSK) while bypassing the IPsec tunnel allows partial authentication of packets — the sequence number can be encrypted and authenticated before the timestamp is fetched, potentially improving latency measurement accuracy.
