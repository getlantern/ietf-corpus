document: rfc-6249
kind: protocol-element
summary: OpenPGP signatures are referenced via Link header fields with rel='describedby' and type='application/pgp-signature'. S/MIME signatures use type='application/pkcs7-mime'. Metalink clients SHOULD support both signature types.
