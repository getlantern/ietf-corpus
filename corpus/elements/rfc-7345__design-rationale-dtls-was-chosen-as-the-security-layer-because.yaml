document: rfc-7345
kind: design-rationale
summary: DTLS was chosen as the security layer because its design is well understood, implementations are widely available, no DTLS extensions are required, and UDPTL can be transported simply by inserting the DTLS layer between UDPTL and UDP with no modifications to higher layers.
