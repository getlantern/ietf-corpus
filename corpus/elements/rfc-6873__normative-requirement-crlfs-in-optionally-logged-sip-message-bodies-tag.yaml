document: rfc-6873
kind: normative-requirement
summary: CRLFs in optionally logged SIP message bodies (Tag=01 and Tag=02) MUST be escaped using URI-encoded '%0D%0A'. Base64 encoding (BEB=01) MUST be applied before any character escaping.
