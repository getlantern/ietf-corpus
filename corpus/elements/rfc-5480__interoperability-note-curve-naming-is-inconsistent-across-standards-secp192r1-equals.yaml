document: rfc-5480
kind: interoperability-note
summary: 'Curve naming is inconsistent across standards: secp192r1 equals ansix9p192r1 in X9.62, was called prime192v1 in RFC 3279, and is referred to as P-192 in FIPS 186-3. Similarly secp256r1 was prime256v1. Implementers must account for these aliases.'
section: 2.1.1.1
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
