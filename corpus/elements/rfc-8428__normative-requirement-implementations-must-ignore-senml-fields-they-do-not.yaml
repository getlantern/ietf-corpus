document: rfc-8428
kind: normative-requirement
summary: Implementations MUST ignore SenML fields they do not recognize, unless the field's label name ends with the '_' character, in which case an error MUST be generated. This enables backwards-compatible extension.
section: "4.4"
rfc2119_level: MUST
topics:
