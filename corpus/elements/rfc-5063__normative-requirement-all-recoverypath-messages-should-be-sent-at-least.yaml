document: rfc-5063
kind: normative-requirement
summary: All RecoveryPath messages SHOULD be sent at least once within approximately 1/2 of the Recovery Time advertised by the restarted neighbor. If many LSPs must be recovered, messages SHOULD be spread across that 1/2 Recovery Time interval to avoid CPU overload on the restarted node.
section: 4.5.1
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
