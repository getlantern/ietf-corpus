document: rfc-7658
kind: protocol-element
summary: natNotifThrottlingInterval (deprecated) controls generation of natPacketDiscard notifications; valid values are 0 (disabled) or 5–3600 seconds. A value of zero disables notifications; the suggested default when enabled is 60 seconds, but notifications should be disabled by default.
