document: rfc-4737
kind: protocol-element
summary: 'Type-P-Packet-Late-Time-Stream measures the temporal lateness of a reordered packet: LateTime(s[i]) = DstTime(i) - DstTime(j), where j is the earliest arrival index of a packet with a larger sequence number. This helps predict whether reordered packets will be useful in a finite receiver buffer or de-jitter buffer.'
section: "4.3"
topics:
    - measurement
