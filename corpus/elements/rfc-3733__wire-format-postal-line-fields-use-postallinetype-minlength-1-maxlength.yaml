document: rfc-3733
kind: wire-format
summary: Postal line fields use postalLineType (minLength=1, maxLength=255, normalizedString) for required fields and optPostalLineType (maxLength=255) for optional fields. Postal codes use pcType (maxLength=16). Country codes use ccType (exact length=2, token), restricted to ISO 3166-1 values.
