document: rfc-1407
kind: protocol-element
summary: DS3 OOF defect is detected when 3 or more errors occur in 16 or fewer consecutive F-bits within a DS3 M-frame; cleared upon reframe. LOF failure is declared when OOF persists 2–10 seconds; cleared when OOF is absent for 10–20 seconds. E3 OOF requires 4 consecutive incorrect frame alignment signals.
section: 3.3.3
