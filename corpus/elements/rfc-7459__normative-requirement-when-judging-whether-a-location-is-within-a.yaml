document: rfc-7459
kind: normative-requirement
summary: When judging whether a location is within a given region, a probability threshold of 50% or greater is recommended before deciding that an uncertain value is within the region. If selecting among multiple regions, the region with the highest probability can be selected.
section: "5.5"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
