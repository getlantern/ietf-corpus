document: rfc-9528
kind: protocol-element
summary: External Authorization Data (EAD) items consist of an ead_label (int) and optional ead_value (bstr). A negative ead_label marks the item as critical; nonnegative marks it as non-critical. EAD_1 through EAD_4 appear in the corresponding EDHOC messages. ead_label = 0 is reserved for padding.
section: "3.8"
topics:
