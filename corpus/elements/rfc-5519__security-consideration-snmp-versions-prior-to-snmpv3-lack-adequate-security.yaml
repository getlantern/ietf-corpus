document: rfc-5519
kind: security-consideration
summary: SNMP versions prior to SNMPv3 lack adequate security; even on a network secured with IPsec, there is no per-principal access control for GET/SET operations. Operators are responsible for configuring proper SNMPv3 access rights.
section: "6"
topics:
