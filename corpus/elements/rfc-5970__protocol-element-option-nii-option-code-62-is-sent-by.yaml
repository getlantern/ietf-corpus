document: rfc-5970
kind: protocol-element
summary: OPTION_NII (option code 62) is sent by clients that support the Universal Network Device Interface (UNDI) to inform the server of their UNDI support level. It contains three 1-octet fields (Type, Major, Minor) as defined in RFC 4578 Section 2.2 and the UEFI specification.
section: "3.4"
topics:
