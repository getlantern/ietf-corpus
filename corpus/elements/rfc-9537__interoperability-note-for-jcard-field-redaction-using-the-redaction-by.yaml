document: rfc-9537
kind: interoperability-note
summary: For jCard field redaction using the Redaction by Empty Value Method, servers MUST reference jCard property values at array index 3 and greater (the value positions), not at index 0 (the property name). This allows clients to directly identify which jCard property values have been redacted.
section: "5.2"
topics:
    - json
