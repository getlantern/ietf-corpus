document: rfc-5465
kind: security-consideration
summary: The NOTIFY extension makes it possible to retrieve messages immediately when delivered, making it wholly impractical to delete sensitive messages using programs like imapfilter before the client sees them. Using SIEVE (RFC 5228) for server-side filtering is recommended instead.
section: "9"
topics:
    - email
    - security
    - privacy
