document: rfc-7647
kind: normative-requirement
summary: A UA constructing a REFER request that could result in an implicit subscription in a dialog MUST build it as an out-of-dialog message (no tag parameter in the To header field), unless the remote endpoint is an older RFC 3515 implementation without a GRUU in its remote target.
section: "4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
