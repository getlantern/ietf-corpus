document: rfc-7427
kind: protocol-element
summary: A new IKEv2 authentication method 'Digital Signature' (Auth Method value 14) is defined. It may only be used when the SIGNATURE_HASH_ALGORITHMS Notify payload has been sent and received by each peer. The Authentication Data field includes an ASN.1 AlgorithmIdentifier object before the raw signature value, unlike all other existing IKEv2 authentication methods.
section: "3"
topics:
    - ipsec
    - crypto
    - security
