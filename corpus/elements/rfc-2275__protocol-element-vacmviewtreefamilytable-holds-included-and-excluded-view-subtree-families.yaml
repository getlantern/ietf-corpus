document: rfc-2275
kind: protocol-element
summary: vacmViewTreeFamilyTable holds included and excluded view subtree families indexed by (vacmViewTreeFamilyViewName, vacmViewTreeFamilySubtree). When multiple entries match an OID, the entry with the most sub-identifiers in its subtree takes precedence; ties are broken by the lexicographically greatest vacmViewTreeFamilyType.
