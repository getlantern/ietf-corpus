document: rfc-3520
kind: normative-requirement
summary: If a PDP fails to verify the AUTH_SESSION policy element, it MUST return a policy control failure (Error Code 02) to the PEP. If RSVP is used, the PEP MUST include the Policy Data object with error details in the outgoing RSVP Error message.
section: "7"
rfc2119_level: MUST
topics:
    - security
