document: rfc-8052
kind: protocol-element
summary: GDOI_PROTO_IEC_61850 (value 3) is defined as a new Protocol-ID for the SA TEK payload, used to distribute IEC 61850 security policy. Its TEK Protocol-Specific Payload includes OID, OID-Specific Payload, SPI (4 octets), Auth Alg (2 octets), Enc Alg (2 octets), Remaining Lifetime Value (4 octets), and SA Data Attributes.
section: "2.2"
