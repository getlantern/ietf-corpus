document: rfc-3947
kind: privacy-consideration
summary: Sending the original source address in Quick Mode NAT-OA payloads reveals the internal IP address behind the NAT to the authenticated remote peer. This disclosure is only required in transport mode, and the peer has already been authenticated at that point.
