document: rfc-4220
kind: protocol-element
summary: The componentLinkDescriptorTable (teLinkObjects 6) and componentLinkBandwidthTable (teLinkObjects 7) mirror the TE link descriptor and bandwidth tables at the component link level. TE link descriptor and bandwidth values (max reservable bandwidth, min/max LSP bandwidth, unreserved bandwidth) are derived as aggregates from the corresponding component link tables.
