document: rfc-8070
kind: design-rationale
summary: Standardizing the internal contents of the freshness token is explicitly not a concern for interoperability, since freshness tokens are validated only by KDCs within the same realm and are opaque to clients. This allows realm-specific implementations.
section: "2.4"
topics:
