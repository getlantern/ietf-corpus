document: rfc-4833
kind: wire-format
summary: DHCPv6 OPTION_NEW_TZDB_TIMEZONE (option-code 42) encodes a TZ Database name. The 16-bit option-code field is 42, followed by a 16-bit option-length giving the number of octets, followed by the TZ Name string.
