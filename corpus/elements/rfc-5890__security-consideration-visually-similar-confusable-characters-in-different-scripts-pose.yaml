document: rfc-5890
kind: security-consideration
summary: Visually similar (confusable) characters in different scripts pose a risk that users will be connected to unintended hosts. Implementations should provide visual indications when a domain name contains multiple scripts, and DNS zone administrators should impose restrictions to minimize confusable characters, though no comprehensive technical solution exists.
section: "4.4"
topics:
    - dns
    - security
