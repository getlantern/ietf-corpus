document: rfc-4279
kind: security-consideration
summary: Low-entropy PSKs are vulnerable to brute-force or dictionary attacks. For PSK ciphersuites an off-line attack is possible via passive eavesdropping; for DHE_PSK an active man-in-the-middle is required; for RSA_PSK only an authenticated server can mount an off-line attack.
section: "7.2"
topics:
    - tls
    - security
