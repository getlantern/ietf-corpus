document: rfc-5815
kind: protocol-element
summary: The Metering Process Table (ipfixMeteringProcessTable) is indexed by cache IDs and records the Observation Point group reference, active timeout (seconds after which an active Flow is force-expired), and inactive timeout (seconds of no matching packets before expiry). A zero inactive timeout means every packet immediately produces a Data Record.
section: "5.5"
topics:
    - snmp
    - measurement
