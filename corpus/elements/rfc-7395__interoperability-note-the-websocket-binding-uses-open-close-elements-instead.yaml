document: rfc-7395
kind: interoperability-note
summary: The WebSocket binding uses <open/>/<close/> elements instead of <stream:stream/> tags, and frames each XML element as an independent parsable document rather than using streaming XML as in the TCP binding (RFC 6120). This framing difference does not affect XMPP security properties.
section: "3.3"
topics:
    - websocket
    - realtime
