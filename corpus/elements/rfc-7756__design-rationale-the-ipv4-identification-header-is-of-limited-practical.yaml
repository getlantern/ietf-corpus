document: rfc-7756
kind: design-rationale
summary: The IPv4 Identification header is of limited practical importance (few application protocols use it beyond diagnostics), so its loss when Atomic Fragments are disabled is generally acceptable. Operators who need end-to-end preservation must enable Atomic Fragment generation on both BR and ER.
section: "4.3"
topics:
    - ip
    - v6ops
