document: rfc-8861
kind: normative-requirement
summary: An endpoint MUST NOT create an RTCP Reporting Group comprising only a single local SSRC (i.e., where the reporting source is the only member), unless it is anticipated that additional SSRCs will be added in the future.
section: "3.1"
rfc2119_level: MUST NOT
topics:
