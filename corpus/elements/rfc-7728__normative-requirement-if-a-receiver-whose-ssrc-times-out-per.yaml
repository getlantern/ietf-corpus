document: rfc-7728
kind: normative-requirement
summary: If a receiver whose SSRC times out (per RFC 3550 Section 6.3.5, i.e., no RTP or RTCP for five RTCP reporting intervals) was the one that caused an RTP stream to pause, any streams paused by that removed SSRC SHALL be resumed.
section: 6.3.2
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
