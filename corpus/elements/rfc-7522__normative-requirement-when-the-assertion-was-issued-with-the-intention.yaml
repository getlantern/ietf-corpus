document: rfc-7522
kind: normative-requirement
summary: When the Assertion was issued with the intention that the client act autonomously on behalf of the subject, an <AuthnStatement> SHOULD NOT be included, and the presenting client SHOULD be identified in the <NameID> or <SubjectConfirmation> element or by other means such as the SAML Delegation Restriction condition.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
