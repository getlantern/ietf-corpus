document: rfc-6638
kind: protocol-element
summary: SCHEDULE-FORCE-SEND iCalendar property parameter forces the server to send a scheduling message even when it would not normally do so (e.g., allowing an Organizer to re-invite an Attendee who previously declined, without modifying the event itself).
section: "7.2"
