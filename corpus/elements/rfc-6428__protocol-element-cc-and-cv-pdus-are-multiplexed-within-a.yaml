summary: 'CC and CV PDUs are multiplexed within a single BFD session using distinct ACH code points: BFD CC code point 0x0022 and BFD proactive CV code point 0x0023. CV PDUs are augmented with a Source MEP-ID TLV for mis-connectivity detection.'
