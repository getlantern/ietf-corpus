document: rfc-9651
kind: registry
summary: IANA added a new 'Structured Type' column to the 'Hypertext Transfer Protocol (HTTP) Field Name Registry', with values 'Dictionary', 'List', or 'Item'. Existing entries for Accept-CH, Cache-Status, CDN-Cache-Control, Cross-Origin-* Policy fields, Origin-Agent-Cluster, Priority, and Proxy-Status were annotated with their respective structured types.
