document: rfc-5322
kind: normative-requirement
summary: Header fields SHOULD NOT be reordered when a message is transported or transformed. More importantly, the trace header fields and resent header fields MUST NOT be reordered, and SHOULD be kept in blocks prepended to the message.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - email
