document: rfc-791
kind: normative-requirement
summary: Every internet module must be able to forward a datagram of 68 octets without further fragmentation, since an internet header may be up to 60 octets and the minimum fragment is 8 octets.
section: "3.2"
rfc2119_level: MUST
topics:
