document: rfc-9795
kind: normative-requirement
summary: If an authentication service generates an "rcd" claim with a "nam" value that is not string-equivalent to the From header field display-name, it MUST use the full (non-compact) form of the PASSporT in SIP. The use of Call-Info via SIP as a trusted source of RCD on the authentication side is NOT RECOMMENDED.
section: "12.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
