document: rfc-4454
kind: normative-requirement
summary: ATMPWs carrying CBR and VBR-rt traffic SHOULD be halted when acute congestion is detected, to allow other traffic or network infrastructure to continue. LCCEs SHOULD monitor for congestion and SHOULD terminate the ATM service by tearing down the L2TP session via CDN when severe congestion is detected.
section: "10"
rfc2119_level: SHOULD
topics:
    - routing
    - congestion
    - qos
