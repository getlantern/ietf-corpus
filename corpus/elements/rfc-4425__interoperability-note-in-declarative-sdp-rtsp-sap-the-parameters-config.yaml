document: rfc-4425
kind: interoperability-note
summary: In declarative SDP (RTSP, SAP), the parameters 'config', 'width', 'height', 'bitrate', and 'buffer' MUST be specified, while 'max-width', 'max-height', 'max-framerate', 'max-bitrate', and 'max-buffer' MUST NOT be used.
section: "6.4"
