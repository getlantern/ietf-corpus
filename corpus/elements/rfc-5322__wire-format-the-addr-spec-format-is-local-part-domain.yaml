document: rfc-5322
kind: wire-format
summary: 'The addr-spec format is ''local-part "@" domain'', where local-part is a dot-atom or quoted-string, and domain is a dot-atom or domain-literal (IP address enclosed in brackets). The msg-id is a restricted form: ''<'' dot-atom-text ''@'' (dot-atom-text / no-fold-literal) ''>'' with no internal CFWS.'
section: 3.4.1
topics:
    - email
