document: rfc-5777
kind: normative-requirement
summary: If the Filter-Rule-Precedence AVP is absent from a Filter-Rule AVP, the rules SHOULD be executed in the order in which they appear in the QoS-Resources AVP. Rules with equal precedence MAY be executed in parallel if supported by the Resource Management Function.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - diameter
    - qos
