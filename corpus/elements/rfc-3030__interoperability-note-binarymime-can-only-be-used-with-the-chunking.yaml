document: rfc-3030
kind: interoperability-note
summary: BINARYMIME can only be used with the CHUNKING extension; it cannot be used standalone. Both CHUNKING and BINARYMIME must be advertised in the EHLO response before BINARYMIME transmission can be attempted.
