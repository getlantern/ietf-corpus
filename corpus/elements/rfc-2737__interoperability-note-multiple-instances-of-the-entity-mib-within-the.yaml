document: rfc-2737
kind: interoperability-note
summary: Multiple instances of the Entity MIB within the same managed system (from different agents) are not required to be equivalent or consistent. Index values, vendor-specific identifiers, and the subset of entities represented are likely to differ between agents.
section: "2.9"
