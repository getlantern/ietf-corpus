document: rfc-1519
kind: interoperability-note
summary: Transit networks that import external routing information into an IGP must either adopt a classless IGP (e.g., OSPF or IS-IS), use internal BGP to propagate external reachability without flooding the IGP, or flood only a default route. Older fixed-subnet or classful IGPs cannot propagate supernet information.
section: "4.5"
topics:
    - ip
    - routing
