document: rfc-3949
kind: security-consideration
summary: Section 10 of RFC 3949 addresses security considerations for the TIFF-FX Internet fax file format. Implementors should treat TIFF-FX parsing as a potential attack surface, as malformed or maliciously crafted files could exploit parsing vulnerabilities.
section: "10"
topics:
