document: rfc-1495
kind: normative-requirement
summary: 'For T.61 string mapping: (1) ASCII-only strings are copied directly; (2) strings from an IANA-registered character set use encoded-words per RFC-1342; (3) strings from unregistered character sets use X.408 mappings to IA5. This applies only to human-readable fields (Subject and FreeForm Name).'
section: "4"
rfc2119_level: MUST
