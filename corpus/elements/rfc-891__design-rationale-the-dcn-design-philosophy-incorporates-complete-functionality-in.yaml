document: rfc-891
kind: design-rationale
summary: The DCN design philosophy incorporates complete functionality in every host, which can serve simultaneously as a packet switch, gateway, and service host. When Fuzzballs are connected via arbitrary serial, parallel, and contention-bus interfaces, they self-organize into a minimum-delay-routed network without a central leader, contrasting with ARPANET's leader-based approach.
section: "1"
topics:
