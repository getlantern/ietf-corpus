document: rfc-1573
kind: normative-requirement
summary: By default, ifLinkUpDownTrapEnable should be enabled(1) only for interfaces that do not operate on top of any other interface (i.e., the lowest sub-layer), limiting trap generation to one per interface per linkUp/Down event.
section: 3.2.9
rfc2119_level: SHOULD
