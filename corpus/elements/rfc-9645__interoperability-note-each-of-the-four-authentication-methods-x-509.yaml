document: rfc-9645
kind: interoperability-note
summary: Each of the four authentication methods (X.509 certificates, raw public keys, TLS 1.2 PSKs, TLS 1.3 EPSKs) for both client and server is independently feature-gated, allowing implementations to advertise only the authentication methods they support, consistent with RFC 5280, RFC 7250, RFC 4279, and RFC 8446.
section: 3.1.1
topics:
