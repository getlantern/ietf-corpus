document: rfc-5553
kind: design-rationale
summary: PKS expansion by an LSR may use the specific PCE identified in the PKS, any PCE as proxy via PCEP, or locally cached CPS data. This flexibility accommodates varying deployment models (e.g., PCE co-located with ASBR) without mandating a single resolution mechanism.
section: "3.1"
topics:
