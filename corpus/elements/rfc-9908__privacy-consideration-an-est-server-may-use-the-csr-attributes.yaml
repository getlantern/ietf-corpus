document: rfc-9908
kind: privacy-consideration
summary: An EST server may use the CSR Attributes mechanism to instruct clients to replace a manufacturer IDevID serial number (which may constitute personally identifiable information) with a new random opaque identifier in the CSR. This is especially desirable when the CA and EST server have different operators.
section: "6.1"
topics:
    - privacy
    - pkix
    - security
