document: rfc-5384
kind: security-consideration
summary: Security of Join Attributes is only guaranteed by the security of the enclosing PIM packet; the security considerations for PIM Join packets in RFC 4601 apply. Additional security considerations may apply to specific attribute types and must be documented in their respective specifications.
