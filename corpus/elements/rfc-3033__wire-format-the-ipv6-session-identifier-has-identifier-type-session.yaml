summary: 'The IPv6 session identifier has Identifier type=Session (0x01) and Identifier length=37 octets. The Identifier value field contains in order: Source IPv6 address (16 octets), Destination IPv6 address (16 octets), Protocol (1 octet), Source Port (2 octets), Destination Port (2 octets).'
