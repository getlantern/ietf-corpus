document: rfc-8167
kind: protocol-element
summary: Bidirectional RPC-over-RDMA operation allows both endpoints to act as Requester and Responder concurrently on a single transport connection, without changes to the RPC-over-RDMA version 1 protocol. Forward-direction and reverse-direction RPC transactions can coexist on the same connection.
section: "2.3"
topics:
    - rdma
