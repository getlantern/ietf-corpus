document: rfc-2232
kind: protocol-element
summary: dlurNondisDlusDlurSessDeactSup (dlurNodeCapabilities 7) indicates support for nondisruptive DLUR-DLUS session deactivation. When the DLUR receives an UNBIND for the CPSVRMGR pipe with sense data X'08A0 000B', it immediately attempts to activate a CPSVRMGR pipe with a different DLUS. Corresponds to byte 9, bit 4 of CV51.
section: "5"
