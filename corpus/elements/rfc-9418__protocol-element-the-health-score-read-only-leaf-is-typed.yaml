document: rfc-9418
kind: protocol-element
summary: The `health-score` read-only leaf is typed as `int8` with range `-1..100`. A value of 100 means healthy, 0 means broken, values in between indicate degradation, and the special value -1 indicates the score could not be computed (e.g., a required metric was unavailable).
section: "3.2"
topics:
