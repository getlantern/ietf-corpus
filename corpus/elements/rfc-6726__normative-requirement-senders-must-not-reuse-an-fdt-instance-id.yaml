document: rfc-6726
kind: normative-requirement
summary: Senders MUST NOT reuse an FDT Instance ID value already in use for a non-expired FDT Instance. Receipt of an FDT Instance reusing a currently-active ID MUST be considered an error. Receivers MUST be ready to handle FDT Instance ID wraparound.
section: 3.4.1
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
