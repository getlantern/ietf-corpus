document: rfc-3986
kind: design-rationale
summary: 'URI identification is intentionally separated from interaction: the URI provides identification only; access to the resource is neither guaranteed nor implied. Operations on a URI are defined by the protocols that use it, not by the URI specification.'
section: 1.2.2
extracted_by: claude-sonnet-4-6
