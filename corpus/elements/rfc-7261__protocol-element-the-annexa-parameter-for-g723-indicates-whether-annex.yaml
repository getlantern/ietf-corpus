document: rfc-7261
kind: protocol-element
summary: The annexa parameter for G723 indicates whether Annex A (voice activity detection) is used or preferred; permissible values are 'yes' and 'no', with 'yes' implied if the parameter is omitted. It is carried as an fmtp attribute in SDP.
