document: rfc-3168
kind: normative-requirement
summary: ECN-capable TCP implementations MUST NOT set either ECT codepoint on retransmitted data packets; the TCP receiver SHOULD ignore the ECN field on arriving data packets that are outside the receiver's current window.
section: 6.1.5
rfc2119_level: MUST NOT
topics:
