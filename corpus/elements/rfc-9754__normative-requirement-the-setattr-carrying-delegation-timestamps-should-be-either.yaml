document: rfc-9754
kind: normative-requirement
summary: The SETATTR carrying delegation timestamps SHOULD be either in a separate compound before the one containing DELEGRETURN, or in the same compound as an operation before DELEGRETURN. Failure to properly sequence may lead to race conditions.
section: "5"
rfc2119_level: SHOULD
