document: rfc-9086
kind: normative-requirement
summary: For PeerAdj SID advertisement, Link Descriptors MUST include the Link Local/Remote Identifiers TLV (258) containing the 4-octet Link Local Identifier followed by the 4-octet Link Remote Identifier; value 0 is used by default when the remote identifier is unknown.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
