document: rfc-3923
kind: design-rationale
summary: The 'urn:ietf:params:xml:ns:xmpp-e2e' namespace has no inherent semantics; it is a using protocol only, and versioning is delegated to the encapsulated object specifications (MSGFMT, PIDF, XMPP-CORE). This avoids coupling the e2e wrapper to specific payload versions.
section: "9"
