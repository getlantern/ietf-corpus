document: rfc-3731
kind: normative-requirement
summary: When an offline-reviewed transform command is pending, the server MUST return response code 1001. The server MUST manage object status to reflect the pending action and MUST notify all involved clients via a service message when the action completes.
section: 3.2.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
