document: rfc-2301
kind: normative-requirement
summary: The implementation of a particular profile MUST also implement all profiles on the path connecting it to the root node (Profile S). For example, an implementation of Profile M must also implement Profiles C and S.
section: "1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
