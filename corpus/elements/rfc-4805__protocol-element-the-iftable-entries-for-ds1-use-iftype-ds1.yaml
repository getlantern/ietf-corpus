kind: protocol-element
summary: 'The ifTable entries for DS1 use ifType ds1(18) with ifSpeed values: DS1/J1=1,544,000; E1=2,048,000; DS2=6,312,000; E2=8,448,000 bps. ifPhysAddress carries the Circuit Identifier (zero-length if unassigned); ifLinkUpDownTrapEnable should be enabled(1); only ifGeneralInformationGroup needs to be supported.'
