document: rfc-6286
kind: normative-requirement
summary: The BGP Identifier MUST be a 4-octet, unsigned, non-zero integer that should be unique within an AS. The value is determined on startup and is the same for every local interface and every BGP peer.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
