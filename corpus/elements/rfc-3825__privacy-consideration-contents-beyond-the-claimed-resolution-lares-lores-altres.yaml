document: rfc-3825
kind: privacy-consideration
summary: Contents beyond the claimed resolution (LaRes/LoRes/AltRes) MAY be randomized to obscure greater precision that might otherwise be available, providing a built-in mechanism for deterministic location imprecision. However, the resolution fields explicitly do not define Geographic Privacy policy.
section: "1.3"
topics:
    - privacy
    - ip
