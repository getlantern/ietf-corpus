document: rfc-3965
kind: security-consideration
summary: IFax delivery failure bounces may be sent to publicly-accessible accounts or printers rather than the sender, potentially exposing message content. Channel security (VPN, TLS/IPSec) and message encryption (S/MIME, PGP/MIME) are recommended countermeasures.
section: 5.2.6
topics:
    - email
    - security
    - privacy
