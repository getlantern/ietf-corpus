summary: 'Early implementations used vendor-specific assignments (Vendor ID 529): Modem-Status as Attr Type 0 value 2, Modem On-Hold Capable as Attr Type 2, and Modem On-Hold Status as Attr Type 3. These are superseded by the IANA-assigned values in this document.'
