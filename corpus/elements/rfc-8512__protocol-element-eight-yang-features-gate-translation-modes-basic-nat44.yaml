summary: 'Eight YANG features gate translation modes: basic-nat44, napt44, dst-nat, nat64, siit, clat, eam, and nptv6 (Table 1). Additional combination modes (port-restricted NAT, simultaneous stateful/stateless NAT64, NAT64+EAM) are realized by composing feature-guarded parameters rather than defining extra features.'
