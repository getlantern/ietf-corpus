document: rfc-3382
kind: design-rationale
summary: The collection is encoded as a 1setOf to make it easy for a Printer that does not support a particular collection attribute (or the collection attribute syntax at all) to simply skip over the entire collection value, ensuring backward compatibility with IPP 1.x parsers.
section: "7.1"
