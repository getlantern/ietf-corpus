document: rfc-8804
kind: security-consideration
summary: This specification's extensions are subject to the security and privacy considerations defined in RFC 8006 Section 8 (Metadata Interface) and RFC 8008 Section 7 (Footprint & Capabilities Advertisement interface). Third parties intercepting FCI transactions could use redirect target information to attack the dCDN.
