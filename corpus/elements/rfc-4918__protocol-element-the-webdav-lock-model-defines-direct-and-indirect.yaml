document: rfc-4918
kind: protocol-element
summary: The WebDAV lock model defines direct and indirect locking. An exclusive lock conflicts with any other lock on the same resource. A depth-infinity lock on a collection indirectly locks all member resources, and membership changes dynamically adjust the indirectly locked set.
section: "6.1"
topics:
    - http
