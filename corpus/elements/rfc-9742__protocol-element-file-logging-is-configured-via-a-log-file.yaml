document: rfc-9742
kind: protocol-element
summary: File logging is configured via a 'log-file' list keyed by URI name (must use 'file:' scheme per RFC 8089). Each entry supports a 'file-rotation' container with number-of-files and max-file-size (size-based, gated by file-limit-size feature) and rollover and retention in minutes (time-based, gated by file-limit-duration feature).
section: "4.1"
topics:
    - syslog
    - yang
