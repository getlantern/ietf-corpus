document: rfc-7866
kind: normative-requirement
summary: The SRC MUST include the 'siprec' option tag in the Require header when initiating a Recording Session, causing UAs that do not support the Session Recording Protocol to reject the INVITE with 420 (Bad Extension). The SRS MUST do likewise when it initiates an RS.
section: 6.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
