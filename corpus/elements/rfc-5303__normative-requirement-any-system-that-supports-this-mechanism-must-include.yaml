document: rfc-5303
kind: normative-requirement
summary: Any system that supports this mechanism MUST include the Adjacency Three-Way State field in the option. The other fields (Extended Local Circuit ID, Neighbor System ID, Neighbor Extended Local Circuit ID) SHOULD be included as explained in section 3.2.
