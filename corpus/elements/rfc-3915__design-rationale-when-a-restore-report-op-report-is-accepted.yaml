document: rfc-3915
kind: design-rationale
summary: When a restore report (op='report') is accepted, no registry grace period extension is included in the EPP response. This is because acceptance of the restore report completes redemption grace period processing, making further RGP status signaling unnecessary.
section: 4.2.5
topics:
    - dns
    - registry
