document: rfc-7731
kind: protocol-element
summary: An MPL Domain is a scope zone in which MPL Interfaces subscribe to the same MPL Domain Address and participate in disseminating MPL Data Messages. MPL avoids constructing or maintaining any multicast routing topology by using a controlled flood within the domain. Each MPL Domain is identified by an MPL Domain Address, defaulting to ALL_MPL_FORWARDERS with Realm-Local scope (scop=3).
section: "4.1"
topics:
    - multicast
    - ip
    - routing
