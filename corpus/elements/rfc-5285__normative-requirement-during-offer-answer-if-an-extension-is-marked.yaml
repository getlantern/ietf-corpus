document: rfc-5285
kind: normative-requirement
summary: During offer/answer, if an extension is marked sendonly and the answerer desires to receive it, the extension MUST be marked recvonly in the SDP answer. If marked recvonly and the answerer desires to send it, the extension MUST be marked sendonly in the answer. Identifier values in the valid range MUST NOT be altered (remapped) during a session update.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
