document: rfc-2613
kind: normative-requirement
summary: For each dataSourceCapsEntry representing a VLAN or entPhysicalEntry, the agent MUST create an associated ifEntry with ifType 'propVirtual(53)'; the assigned ifIndex is stored in dataSourceCapsIfIndex and used as the actual RMON control table dataSource value.
section: "3.4"
rfc2119_level: MUST
