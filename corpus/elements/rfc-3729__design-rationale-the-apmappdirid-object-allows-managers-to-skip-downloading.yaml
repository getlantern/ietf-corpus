document: rfc-3729
kind: design-rationale
summary: The apmAppDirID object allows managers to skip downloading the full application directory when they recognize a known configuration, enabling efficient operation across thousands of distributed APM agents that likely share the same directory. Registrations are scoped to an administrative domain, not globally, permitting custom configurations without a global registry.
section: 2.4.1
topics:
