document: rfc-7181
kind: normative-requirement
summary: T_HOLD_TIME MUST be >= TC_INTERVAL. If TC messages can be lost, both T_HOLD_TIME and A_HOLD_TIME SHOULD be >= 3 × TC_INTERVAL. T_HOLD_TIME MUST be representable in the RFC 5497 exponent-mantissa notation.
section: 5.4.4
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
