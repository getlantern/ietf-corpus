document: rfc-6068
kind: normative-requirement
summary: Non-ASCII characters in the local-part of an addr-spec MUST first be encoded as UTF-8 and then percent-encoded. Any other percent-encoding of non-ASCII characters in local-part is prohibited.
section: "2"
rfc2119_level: MUST
