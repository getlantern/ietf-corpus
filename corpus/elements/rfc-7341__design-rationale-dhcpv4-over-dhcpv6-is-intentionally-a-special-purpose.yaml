document: rfc-7341
kind: design-rationale
summary: DHCPv4 over DHCPv6 is intentionally a special-purpose mechanism for nodes that cannot access native DHCPv4; it should not be enabled by default and may be activated by an administrative control or a dual-stack transition mechanism such as Lightweight 4over6.
