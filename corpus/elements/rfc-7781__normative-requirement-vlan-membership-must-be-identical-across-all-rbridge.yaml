document: rfc-7781
kind: normative-requirement
summary: VLAN membership MUST be identical across all RBridge ports in an LAALP. TRILL switches MUST disable ports connected to an LAALP with inconsistent VLAN configuration, as inconsistencies can cause packet loss or non-shortest paths when remote RBridges route return traffic based on the shared pseudo-nickname.
section: "11"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
