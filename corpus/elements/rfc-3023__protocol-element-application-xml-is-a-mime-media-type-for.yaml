document: rfc-3023
kind: protocol-element
summary: application/xml is a MIME media type for XML document entities, preferred when the XML content is unreadable by casual users. If the charset parameter is omitted, no charset information is conveyed via MIME, and conforming XML processors must follow XML specification section 4.3.3 to determine encoding.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
