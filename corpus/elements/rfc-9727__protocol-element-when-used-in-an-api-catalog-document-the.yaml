document: rfc-9727
kind: protocol-element
summary: When used in an API catalog document, the 'item' link relation (RFC 6573) identifies a target resource that represents an API that is a member of the catalog. Other link relations (e.g., service-desc, service-doc, service-meta, status from RFC 8631) may convey metadata.
