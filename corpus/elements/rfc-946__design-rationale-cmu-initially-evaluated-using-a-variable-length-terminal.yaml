document: rfc-946
kind: design-rationale
summary: CMU initially evaluated using a variable-length terminal location string but found it would be expensive to integrate into existing software at multiple OS and network layers. The fixed 64-bit integer was chosen because it can be stored efficiently in OS tables and passed through layered software with minimal changes.
section: Overview
