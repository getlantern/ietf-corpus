document: rfc-3339
kind: wire-format
summary: The time-numoffset field encodes a UTC offset as ("+" / "-") time-hour ":" time-minute, representing local time minus UTC. Numeric offsets represent only time zones differing from UTC by an integral number of minutes.
section: "5.6"
