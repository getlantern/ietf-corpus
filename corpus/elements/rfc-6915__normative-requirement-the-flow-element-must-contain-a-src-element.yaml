document: rfc-6915
kind: normative-requirement
summary: The <flow> element MUST contain a <src> element and a <dst> element whose child elements contain the Layer 3 address (which MUST conform to the relevant 'IPv4address' or 'IPv6address' grammar as defined in RFC 3986) and the Layer 4 port number of each end of the flow.
section: "3"
rfc2119_level: MUST
topics:
    - ip
