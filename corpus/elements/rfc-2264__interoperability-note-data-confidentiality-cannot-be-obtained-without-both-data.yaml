document: rfc-2264
kind: interoperability-note
summary: Data confidentiality cannot be obtained without both data integrity and data origin authentication. The USM model enforces this by requiring that any message sent with privacy (securityLevel authPriv) must also be authenticated; a privacy-without-authentication configuration is not permitted.
section: "1.3"
topics:
    - snmp
    - security
