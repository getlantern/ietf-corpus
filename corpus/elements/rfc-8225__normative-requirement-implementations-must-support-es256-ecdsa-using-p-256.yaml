document: rfc-8225
kind: normative-requirement
summary: Implementations MUST support ES256 (ECDSA using P-256 and SHA-256) for creation and verification of PASSporT digital signatures. Implementations MAY support other algorithms from the "JSON Web Signature and Encryption Algorithms" registry.
