summary: The model relies on the supporting-network, supporting-node, supporting-link, and supporting-termination-point leaves from the generic Network Topologies model (RFC 8345) to express the dependency from higher topology layers (e.g., L2 Ethernet) down to the supporting microwave radio link topology, rather than defining new cross-layer references.
