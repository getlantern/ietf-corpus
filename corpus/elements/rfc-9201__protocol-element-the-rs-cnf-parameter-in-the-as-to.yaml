document: rfc-9201
kind: protocol-element
summary: The rs_cnf parameter in the AS-to-client token response is OPTIONAL when token type is 'pop' and asymmetric keys are used, and MUST NOT be present otherwise. It contains the public key used by the RS to authenticate to the client.
section: "3.2"
