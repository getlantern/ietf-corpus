document: rfc-9885
kind: design-rationale
summary: IS-IS TLVs are limited to 255 octets of payload because both Type and Length fields are one octet in size. Growing deployment scales and new traffic engineering technologies cause many critical TLVs to exceed this limit, motivating a standardized extension mechanism.
section: "1"
topics:
    - routing
