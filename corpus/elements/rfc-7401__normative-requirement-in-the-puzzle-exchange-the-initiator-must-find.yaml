document: rfc-7401
kind: normative-requirement
summary: 'In the puzzle exchange, the Initiator must find #J such that the lowest-order #K bits of RHASH(#I | HIT_I | HIT_R | #J) are zero. The Initiator SHOULD give up after exceeding the puzzle Lifetime specified in the PUZZLE parameter.'
section: 4.1.2
rfc2119_level: MUST
topics:
    - security
    - ip
