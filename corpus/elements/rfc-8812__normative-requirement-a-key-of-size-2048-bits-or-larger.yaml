document: rfc-8812
kind: normative-requirement
summary: A key of size 2048 bits or larger MUST be used with RSASSA-PKCS1-v1_5 algorithms (RS256, RS384, RS512, RS1). Implementations must check that the key type is 'RSA' when creating or verifying a signature.
section: "2"
rfc2119_level: MUST
