document: rfc-5913
kind: protocol-element
summary: 'The Clearance attribute indicates the security policy, clearance levels, and additional authorization information held by the certificate subject. It may appear in the subject directory attributes extension of a PKC or in the attributes field of an AC. Its three fields are: policyId (identifies the security policy), classList (security classifications), and securityCategories (additional authorization information).'
section: "2"
topics:
