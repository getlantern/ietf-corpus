document: rfc-8446
kind: normative-requirement
summary: Implementations MUST NOT send extension responses for extensions not requested by the remote endpoint (except 'cookie' in HelloRetryRequest). Upon receiving an unsolicited extension response, an endpoint MUST abort with 'unsupported_extension' alert.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
