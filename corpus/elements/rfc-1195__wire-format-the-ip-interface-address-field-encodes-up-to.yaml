document: rfc-1195
kind: wire-format
summary: The IP Interface Address field encodes up to 63 IP addresses per interface in Hello packets and one or more router interface addresses in LSPs. Each address is 4 octets (IPv4). The field may be omitted or present with zero entries on interfaces with no IP address.
