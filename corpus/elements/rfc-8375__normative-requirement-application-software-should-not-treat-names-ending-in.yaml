document: rfc-8375
kind: normative-requirement
summary: Application software SHOULD NOT treat names ending in '.home.arpa.' differently than other names, and there is no basis for trusting names that are subdomains of 'home.arpa.' more than any other DNS response.
section: "4"
rfc2119_level: SHOULD NOT
topics:
