document: rfc-3515
kind: interoperability-note
summary: SIP proxies do not require modification to support the REFER method; a proxy should process a REFER request the same way it processes an OPTIONS request. A registrar unaware of REFER returns 501; a registrar aware of REFER SHOULD return 405.
section: "2.5"
topics:
    - sip
    - realtime
