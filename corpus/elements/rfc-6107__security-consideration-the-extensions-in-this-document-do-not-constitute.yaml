document: rfc-6107
kind: security-consideration
summary: The extensions in this document do not constitute an additional security risk relative to RFC 3477. The extra interface identifier information could arguably make RSVP messages harder to spoof, representing a minor security improvement. Further MPLS-TE and GMPLS security details are in RFC 5920.
