document: rfc-1532
kind: normative-requirement
summary: Clients MUST set the reserved (MBZ) bits of the 'flags' field to zero in all BOOTREQUEST messages; servers and relay agents MUST ignore those bits. A client MUST also ignore these bits in received BOOTREPLY messages.
section: 3.1.2
rfc2119_level: MUST
topics:
    - ip
