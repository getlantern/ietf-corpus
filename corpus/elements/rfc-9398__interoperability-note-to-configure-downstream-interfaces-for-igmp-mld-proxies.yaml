document: rfc-9398
kind: interoperability-note
summary: To configure downstream interfaces for IGMP/MLD Proxies, the ability to enable IGMP or MLD on those interfaces is required, which is defined in the separate YANG module from RFC 8652 ('A YANG Data Model for IGMP and MLD'). This document only covers the proxy-specific upstream interface configuration.
section: "3.1"
topics:
