document: rfc-8333
kind: interoperability-note
summary: Compared to oFIB (RFC 6976), the local delay mechanism limits ordered convergence to the first hop adjacent to the failure instead of computing per-node timers across the entire network. This sacrifices solving remote loops but eliminates complexity and network-wide coordination overhead.
section: "10.2"
topics:
    - routing
