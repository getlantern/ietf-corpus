document: rfc-6173
kind: security-consideration
summary: 'Five read-write MIB objects can disrupt storage traffic if modified without authorization: ifcpLclGtwyInstAddrTransMode, ifcpLclGtwyInstFcBrdcstSupport, ifcpLclGtwyInstDefaultIpTOV, ifcpLclGtwyInstDefaultLTInterval, and ifcpSessionIpTOV. SET operations in a non-secure environment without proper protection can have a negative effect on network operations.'
