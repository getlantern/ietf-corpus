document: rfc-7915
kind: wire-format
summary: 'When translating IPv4 headers to IPv6: Version=6, Flow Label=0, Next Header maps ICMPv4(1) to ICMPv6(58) or copies protocol field, Hop Limit derived from TTL, Source/Destination addresses mapped via Section 6 algorithms. Payload Length is IPv4 Total Length minus IPv4 header and options size.'
