document: rfc-2733
kind: protocol-element
summary: Recovery of a missing media packet xi requires XOR-ing the bit strings of all other associated media packets with the FEC packet's bit string (using PT recovery, TS recovery fields in place of PT and TS; CSRC, extension, and padding always set to null for the FEC bit string). The result reconstructs the full RTP header and payload of xi.
section: "8.1"
topics:
    - rtp
    - realtime
