document: rfc-2737
kind: normative-requirement
summary: An agent must not return an entLogicalCommunity value that allows more privileges than the community string used to access the object. The agent may return a community string with read-only privileges even when accessed with a read-write community.
section: "3"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
