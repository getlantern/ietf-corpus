document: rfc-9039
kind: design-rationale
summary: DEV URNs are preferred over UUID-based identifiers in constrained environments because UUIDs impose additional requirements on stable storage, real-time clocks, and identifier length that can be prohibitive. UUID-based identifiers are preferred for general-purpose use instead.
section: "1"
