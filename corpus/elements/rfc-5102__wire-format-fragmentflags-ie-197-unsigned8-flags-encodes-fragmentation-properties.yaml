document: rfc-5102
kind: wire-format
summary: 'fragmentFlags (IE 197, unsigned8, flags) encodes fragmentation properties: Bit 0 = RS (reserved, must be 0), Bit 1 = DF (Don''t Fragment, from IPv4 or future IPv6), Bit 2 = MF (More Fragments, from IPv4 or IPv6 Fragment header M flag), Bits 3–7 = don''t care.'
