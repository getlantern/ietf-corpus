document: rfc-4931
kind: normative-requirement
summary: All date-time attribute values MUST be represented in UTC using the Gregorian calendar. The extended date-time form using uppercase 'T' and 'Z' characters MUST be used; time zone offset identifiers and lowercase 'T' or 'Z' characters MUST NOT be used.
section: "2.4"
rfc2119_level: MUST
topics:
    - dns
