document: rfc-8551
kind: security-consideration
summary: When signing then encrypting, a recipient can assume the signed content was not altered but a careful attacker could change unauthenticated portions of the outer encrypted message. When encrypting then signing, the signer-to-plaintext relationship cannot be established. Either ordering has distinct security implications for recipients.
section: "3.7"
topics:
    - email
    - security
    - crypto
