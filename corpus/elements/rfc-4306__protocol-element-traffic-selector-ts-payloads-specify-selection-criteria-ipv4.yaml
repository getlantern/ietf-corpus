document: rfc-4306
kind: protocol-element
summary: Traffic Selector (TS) payloads specify selection criteria (IPv4/IPv6 address range, port range, IP protocol ID) for packets to be forwarded over a CHILD_SA. TSi covers the initiator side and TSr the responder side. The responder may narrow the proposed traffic selectors but may not expand them; if it cannot accept the full set but can accept the first selectors, it MUST narrow to a subset including the initiator's first choices.
section: "2.9"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
