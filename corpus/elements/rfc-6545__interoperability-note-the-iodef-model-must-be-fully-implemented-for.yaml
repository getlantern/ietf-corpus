document: rfc-6545
kind: interoperability-note
summary: The IODEF model MUST be fully implemented for RID messages that include IODEF payloads to ensure proper parsing. All IODEF classes, elements, and attributes are valid in a RID message context, though some optional IODEF elements become mandatory for specific RID message types.
