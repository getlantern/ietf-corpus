document: rfc-3729
kind: interoperability-note
summary: Every protocolDirLocalIndex value registered by the agent in the RMON2 protocolDirTable automatically occupies the same value in the AppLocalIndex number space. Implementations must ensure no apmHttpFilterAppLocalIndex value collides with any existing protocolDirLocalIndex value, and must track all assigned values jointly.
section: "3"
topics:
