document: rfc-3546
kind: normative-requirement
summary: If a server receives a max_fragment_length value other than the allowed values it MUST abort with illegal_parameter. If a client receives a response that differs from the requested length it MUST also abort with illegal_parameter.
section: "3.2"
rfc2119_level: MUST
