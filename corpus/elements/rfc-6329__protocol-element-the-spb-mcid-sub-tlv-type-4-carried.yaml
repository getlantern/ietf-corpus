document: rfc-6329
kind: protocol-element
summary: 'The SPB-MCID sub-TLV (type 4, carried in MT-Port-Cap TLV in IIH) carries two 51-byte MCIDs: a primary MCID and an auxiliary MCID. Each MCID contains a 1-byte format selector, 32-byte configuration name, 2-byte revision level, and 16-byte HMAC-MD5 signature over VID-to-protocol assignments.'
section: "13.1"
topics:
