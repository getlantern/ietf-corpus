document: rfc-7714
kind: interoperability-note
summary: This document's guidance that SRTCP authentication tags SHOULD NOT be present contradicts Section 3.4 of RFC 3711, which makes the SRTCP authentication tag field mandatory. The presence of AEAD authentication renders the older authentication methods redundant.
section: "7.1"
topics:
    - rtp
    - realtime
    - crypto
