document: rfc-7843
kind: normative-requirement
summary: If an identifier used in THIRD_PARTY_ID is based on an existing standard (e.g., L2TPv3 session ID), the encoding rules of that standard must be followed to allow simple octet-by-octet comparison at the PCP-controlled device.
