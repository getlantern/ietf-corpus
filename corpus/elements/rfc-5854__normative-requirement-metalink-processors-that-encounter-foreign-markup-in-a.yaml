document: rfc-5854
kind: normative-requirement
summary: Metalink Processors that encounter foreign markup in a legal location MUST ignore it; they MUST NOT stop processing or signal an error due to unrecognized markup from the Metalink vocabulary or other namespaces.
section: "5.3"
rfc2119_level: MUST
