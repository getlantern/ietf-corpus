document: rfc-8010
kind: protocol-element
summary: 'Value tags specify the type of each attribute value. Integer tags: 0x21 (integer), 0x22 (boolean), 0x23 (enum). OctetString tags include 0x31 (dateTime), 0x32 (resolution), 0x33 (rangeOfInteger), 0x34 (begCollection), 0x37 (endCollection). Character-string tags include 0x41 (textWithoutLanguage), 0x44 (keyword), 0x45 (uri), 0x47 (charset), 0x4a (memberAttrName).'
section: 3.5.2
