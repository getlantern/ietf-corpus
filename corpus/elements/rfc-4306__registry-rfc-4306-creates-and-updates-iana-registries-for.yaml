document: rfc-4306
kind: registry
summary: 'RFC 4306 creates and updates IANA registries for IKEv2 including: Exchange Types, Payload Types, Transform Types and IDs (encryption algorithms, PRF algorithms, integrity algorithms, DH groups), Notify Message Types, Authentication Methods, Traffic Selector Types, and Configuration Attribute Types. Most new assignments require Expert Review as defined in RFC 2434.'
