document: rfc-7030
kind: normative-requirement
summary: The EST server MUST be authenticated during the TLS handshake unless the client is requesting Bootstrap Distribution of CA certificates (Section 4.1.1) or Full CMC (Section 4.3). TLS server authentication with certificates MUST be supported.
section: 3.3.1
rfc2119_level: MUST
