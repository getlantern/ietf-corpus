document: rfc-9118
kind: protocol-element
summary: The EnhancedJWTClaimConstraints certificate extension (OID id-pe-eJWTClaimConstraints, arc id-pe 33) is a non-critical, end-entity-only X.509 extension that constrains which JWT claims authentication services may include in PASSporT objects they sign. It supersedes the JWTClaimConstraints extension from RFC 8226 by adding a mustExclude capability.
section: "3"
topics:
