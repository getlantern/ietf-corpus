document: rfc-8004
kind: security-consideration
summary: Opportunistic Initiators (those without prior knowledge of the Responder's host identity) cannot authenticate public keys exchanged via an RVS, making MITM defense nearly impossible. For this reason, the specification explicitly does not support opportunistic HIP association establishment via an RVS.
section: "5"
topics:
    - security
    - crypto
