document: rfc-5681
kind: state-machine
summary: 'TCP transitions between slow start (cwnd < ssthresh, exponential growth: cwnd += min(N, SMSS) per ACK) and congestion avoidance (cwnd > ssthresh, linear growth: ~1 SMSS per RTT). On retransmission timeout, TCP returns to slow start with cwnd = LW = 1 segment.'
section: "3.1"
topics:
