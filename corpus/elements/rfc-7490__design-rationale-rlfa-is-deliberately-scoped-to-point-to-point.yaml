document: rfc-7490
kind: design-rationale
summary: RLFA is deliberately scoped to point-to-point link failures only, excluding broadcast/NBMA failed interfaces and node failures, to keep the mechanism simple. MPLS-TE FRR already exists to handle arbitrary topologies at greater complexity cost.
