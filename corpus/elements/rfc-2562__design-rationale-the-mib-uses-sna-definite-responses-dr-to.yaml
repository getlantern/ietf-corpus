document: rfc-2562
kind: design-rationale
summary: The MIB uses SNA definite responses (DR) to timestamp flows rather than the SNA/MS Response Time Monitoring (RTM) method, because not all TN3270E server implementations have access to their underlying SNA stacks. RTM concepts (response time buckets, interval-based collection) are preserved.
