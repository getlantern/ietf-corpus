document: rfc-7208
kind: security-consideration
summary: The 'exp' modifier, external explanation URLs, and macro-expanded data all originate from the publishing domain and are untrusted. Implementations must clearly attribute explanation strings to third parties and must not allow macro-expanded content to inject malicious data into SMTP responses or headers.
section: "11.5"
topics:
    - email
    - security
