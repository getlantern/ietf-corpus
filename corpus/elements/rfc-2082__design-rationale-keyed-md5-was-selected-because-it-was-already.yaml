document: rfc-2082
kind: design-rationale
summary: Keyed MD5 was selected because it was already in use for OSPF cryptographic authentication and was therefore already present in routers. A similar approach had also been standardized for IP-layer authentication (IP Authentication Header, RFC 1826).
