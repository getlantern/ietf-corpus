document: rfc-4171
kind: state-machine
summary: A Discovery Domain (DD) is active if and only if it is a member of at least one active Discovery Domain Set (DDS); DDs not belonging to any active DDS are disabled and Storage Nodes within them cannot discover each other via scoped iSNSP queries.
section: "3.6"
