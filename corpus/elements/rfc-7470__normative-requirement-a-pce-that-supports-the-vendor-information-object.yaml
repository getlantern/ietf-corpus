document: rfc-7470
kind: normative-requirement
summary: 'A PCE that supports the Vendor Information object but receives one carrying an unknown Enterprise Number MUST act according to the P flag: if P is set, the PCE MUST reject the PCReq with Error-Type ''Not supported Object'' and return the corresponding Vendor Information object.'
section: "2"
rfc2119_level: MUST
topics:
    - routing
