document: rfc-4878
kind: protocol-element
summary: The dot3OamPeerTable maintains per-interface information about the remote OAM entity, including its MAC address, vendor OUI, vendor info, mode (active/passive/unknown), maximum OAMPDU size, configuration revision, and supported functions. Entries are auto-created when peer information becomes available and auto-deleted when the peer is no longer in communication.
section: "6"
extracted_by: claude-sonnet-4-6
