document: rfc-4034
kind: interoperability-note
summary: 'The RSA/MD5 algorithm (algorithm 1) is included in Appendix A for completeness but is NOT RECOMMENDED per RFC 3110. Its key tag calculation also differs from all other algorithms: it uses the most significant 16 bits of the least significant 24 bits of the public key modulus.'
section: A.1, B.1
