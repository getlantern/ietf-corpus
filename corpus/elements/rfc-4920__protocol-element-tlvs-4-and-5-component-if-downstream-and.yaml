document: rfc-4920
kind: protocol-element
summary: TLVs 4 and 5 (COMPONENT_IF_DOWNSTREAM and COMPONENT_IF_UPSTREAM) are obsoleted by RFC 4201 and SHOULD NOT be used to identify component interfaces in IF_ID ERROR_SPEC objects, though LSRs MUST still be prepared to receive them.
