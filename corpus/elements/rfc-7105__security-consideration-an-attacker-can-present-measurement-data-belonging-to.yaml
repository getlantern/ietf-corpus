document: rfc-7105
kind: security-consideration
summary: An attacker can present measurement data belonging to a different Device to coerce a LIS into providing location information for that Device without authorization, particularly for measurement types (e.g., LLDP) that are broadcast to all nodes on the same network segment and thus easily collected.
section: 7.1.1
topics:
    - security
    - privacy
