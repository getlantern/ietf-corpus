document: rfc-6130
kind: protocol-element
summary: A 2-Hop Tuple (N2_neighbor_iface_addr_list, N2_2hop_addr, N2_time) records a single network address of a symmetric 2-hop neighbor reachable via a named symmetric 1-hop neighbor interface. The 2-Hop Set is populated from received HELLO messages advertising SYMMETRIC links.
section: "7.2"
topics:
