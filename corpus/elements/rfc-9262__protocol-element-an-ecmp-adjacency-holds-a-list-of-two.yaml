document: rfc-9262
kind: protocol-element
summary: An ECMP() adjacency holds a list of two or more non-ECMP adjacencies and an optional seed parameter. An implementation-specific hash selects one adjacency per packet; packets with the same entropy field value SHOULD be sent to the same adjacency. The seed parameter allows the BIER-TE controller to prevent polarization across consecutive ECMP hops.
section: 4.2.3
topics:
    - routing
    - multipath
