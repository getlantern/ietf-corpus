document: rfc-9436
kind: design-rationale
summary: The type space extension uses types 13, 14, and 15 with a 4-bit subtype in the upper flag bits to expand PIM message types from 16 to 64 (48 new extended types) without changing the common header size. No relationship is expected or implied between extended type messages sharing a common Type field value.
section: "5"
topics:
