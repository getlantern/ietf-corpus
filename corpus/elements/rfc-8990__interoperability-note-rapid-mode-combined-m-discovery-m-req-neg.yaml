document: rfc-8990
kind: interoperability-note
summary: Rapid mode (combined M_DISCOVERY + M_REQ_NEG or M_REQ_SYN) SHOULD be disabled by default and MAY be enabled by Intent, because a network with a mix of rapid-mode and non-rapid-mode nodes exhibits complex timing-dependent behaviors. The rapid synchronization function SHOULD be configured off by default.
section: 2.5.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
