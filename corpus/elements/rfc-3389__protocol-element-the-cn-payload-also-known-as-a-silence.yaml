document: rfc-3389
kind: protocol-element
summary: The CN payload (also known as a Silence Insertion Descriptor or SID frame) consists of a single octet noise level byte followed by optional spectral information in the form of reflection coefficients for an all-pole model of the noise. The total payload length is M+1 bytes where M is the model order.
