document: rfc-1793
kind: protocol-element
summary: Hello suppression on point-to-point demand circuits is negotiated by both endpoints setting the DC-bit in Hello and Database Description packets. Receiving a Hello or DBD with DC-bit set indicates agreement. Receiving a Hello with DC-bit clear that also lists the router's ID (indicating bidirectionality), or a DBD with DC-bit clear, indicates refusal and causes reversion to periodic Hellos.
section: 3.2.1
topics:
    - routing
