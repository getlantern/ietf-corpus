document: rfc-6326
kind: interoperability-note
summary: The Topology-ID field in the GMAC-ADDR sub-TLV is not used by TRILL — it is sent as zero and ignored on receipt — but is included in the format for use by other technologies that may reuse this sub-TLV structure.
section: 2.1.1
topics:
    - routing
