document: rfc-2467
kind: normative-requirement
summary: A manually or software-set MAC address should not be used to derive the Interface Identifier. If such an address must be used, its global uniqueness property should be reflected in the value of the U/L bit.
section: "5"
rfc2119_level: SHOULD NOT
topics:
