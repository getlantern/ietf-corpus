document: rfc-2487
kind: interoperability-note
summary: A client certificate presented during TLS negotiation authenticates the SMTP client agent, not the original author of the email message; end-to-end author authentication requires every hop in the delivery chain to be authenticated (e.g., via SMTP-AUTH or MIME security).
