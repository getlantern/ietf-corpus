document: rfc-8434
kind: protocol-element
summary: A control protocol is the mechanism an implementation of a layout type uses to meet the control communication requirement between the metadata server and storage devices. It need not be a protocol in the traditional sense; in some cases the storage protocol itself serves as the control protocol (loose coupling).
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
