document: rfc-8335
kind: design-rationale
summary: PROBE differs from PING in that it does not require bidirectional connectivity between the probing and probed interfaces. Instead, it requires bidirectional connectivity between the probing interface and a proxy interface, enabling diagnostics for unnumbered, unreachable, or address-family-mismatched interfaces.
section: "1"
