document: rfc-1730
kind: normative-requirement
summary: The DELETE command MUST preserve the highest-used unique identifier of the deleted mailbox so that a new mailbox with the same name cannot reuse those identifiers, unless the new incarnation has a different UIDVALIDITY value.
section: 6.3.4
rfc2119_level: MUST
topics:
    - email
