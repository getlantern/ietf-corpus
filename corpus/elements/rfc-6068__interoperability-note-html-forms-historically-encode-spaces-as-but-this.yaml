document: rfc-6068
kind: interoperability-note
summary: HTML forms historically encode spaces as '+', but this is problematic in 'mailto' URIs because a '+' cannot be distinguished from a literal '+' (used in subaddressing). All spaces SHOULD be encoded as %20 when producing 'mailto' URIs.
section: "5"
topics:
    - email
    - http
