document: rfc-7461
kind: security-consideration
summary: SNMP versions prior to SNMPv3 did not include adequate security; even on a secure network (e.g., IPsec), there is no access control for MIB GET/SET operations. Implementations SHOULD use SNMPv3 with USM/AES and MAY additionally support TSM with SSH or TLS/DTLS.
section: "6"
topics:
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
