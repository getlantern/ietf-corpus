document: rfc-8955
kind: normative-requirement
summary: 'In the absence of explicit configuration, a Flow Specification NLRI MUST be validated as feasible if and only if: (a) a destination prefix component is present, (b) the originator of the Flow Specification matches the originator of the best-match unicast route, and (c) there are no more-specific unicast routes from a different neighboring AS.'
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
