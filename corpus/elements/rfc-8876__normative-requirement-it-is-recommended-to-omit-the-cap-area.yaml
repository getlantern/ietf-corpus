document: rfc-8876
kind: normative-requirement
summary: It is RECOMMENDED to omit the CAP <area> element when constructing a message. If location is present in the CAP alert, it SHOULD be copied into a PIDF-LO structure referenced by the SIP Geolocation header field.
section: "4.2"
rfc2119_level: RECOMMENDED
