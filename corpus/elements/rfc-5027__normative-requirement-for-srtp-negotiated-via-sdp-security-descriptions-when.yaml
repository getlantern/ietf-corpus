document: rfc-5027
kind: normative-requirement
summary: For SRTP negotiated via SDP Security Descriptions, when the offerer requests the "send" precondition, the offerer needs to receive the answer before the precondition is satisfied (to learn destination address and chosen cryptographic parameters). The answerer MUST use the confirm-status attribute to trigger an updated offer from the offerer.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
