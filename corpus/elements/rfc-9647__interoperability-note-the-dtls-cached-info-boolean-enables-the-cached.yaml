document: rfc-9647
kind: interoperability-note
summary: The dtls-cached-info boolean enables the cached_info TLS extension for inclusion in ClientHello and ServerHello messages; this corresponds to behavior defined in RFC 8968 (Babel over DTLS) Appendix A. The dtls-cert-prefer list populates TLS certificate type extensions during handshaking.
