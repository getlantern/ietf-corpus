document: rfc-8331
kind: wire-format
summary: ANC_Count is an 8-bit unsigned integer indicating the total number of ANC data packets in the RTP payload; a maximum of 255 per payload. ANC_Count of 0 signals no ANC data packets are present, and Length will also be 0 in that case.
section: "2.1"
topics:
