document: rfc-3019
kind: normative-requirement
summary: Routers implementing the MLD MIB MUST support mldBaseMIBGroup and mldRouterMIBGroup (which adds query interval, join counters, querier state, version, max response delay, robustness, and last-listen-query-interval objects). Write access to mldInterfaceStatus is not required.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - multicast
