document: rfc-7574
kind: normative-requirement
summary: For live streaming over the Internet, the Unified Merkle Tree method MUST be used for content authentication. The RSASHA1, RSASHA256, ECDSAP256SHA256, and ECDSAP384SHA384 algorithms are mandatory to implement.
section: "6.1"
rfc2119_level: MUST
topics:
