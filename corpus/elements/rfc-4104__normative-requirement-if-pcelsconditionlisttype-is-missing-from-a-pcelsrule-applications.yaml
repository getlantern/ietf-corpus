document: rfc-4104
kind: normative-requirement
summary: If pcelsConditionListType is missing from a pcelsRule, applications MUST assume disjunctive normal form (value 1). If pcelsSequencedActions is missing, applications MUST assume DontCare (value 3). If pcelsExecutionStrategy is missing, applications MUST assume Do all (value 2).
section: "5.4"
rfc2119_level: MUST
topics:
