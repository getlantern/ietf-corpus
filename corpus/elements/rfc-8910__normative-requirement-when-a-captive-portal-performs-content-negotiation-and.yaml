document: rfc-8910
kind: normative-requirement
summary: When a captive portal performs content negotiation and the client does not explicitly indicate support for the captive portal API content type, the captive portal SHOULD redirect the client to the value associated with the 'user-portal-url' API key.
section: "2"
rfc2119_level: SHOULD
