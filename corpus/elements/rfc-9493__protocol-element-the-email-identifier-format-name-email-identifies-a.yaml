document: rfc-9493
kind: protocol-element
summary: 'The Email Identifier Format (name: "email") identifies a subject using an email address formatted as an "addr-spec" per RFC 5322. The "email" member is REQUIRED, MUST NOT be null or empty, and MUST identify a mailbox to which email may be delivered per RFC 5321.'
section: 3.2.2
topics:
    - email
    - json
    - security
