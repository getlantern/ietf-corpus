document: rfc-9024
kind: design-rationale
summary: Due to intentional similarities between DetNet PREOF and TSN FRER functions, service protection interworking is conceptually possible between the TSN and DetNet domains, potentially requiring copying of sequence number fields from TSN (L2) to PW (MPLS) encapsulation. However, such interworking is explicitly left out of scope for further study.
section: "5.2"
topics:
