document: rfc-8555
kind: design-rationale
summary: TLS 1.3 0-RTT early data is explicitly permitted for ACME because the protocol's own nonce-based anti-replay mechanism covers all operations where replay would be harmful, making the TLS-layer 0-RTT replay risk moot for ACME payloads.
section: "6.1"
