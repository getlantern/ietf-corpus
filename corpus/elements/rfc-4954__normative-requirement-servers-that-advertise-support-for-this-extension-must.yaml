document: rfc-4954
kind: normative-requirement
summary: Servers that advertise support for this extension MUST support the AUTH parameter to the MAIL FROM command even when the client has not authenticated. If the server does not sufficiently trust the client, or if AUTH=<> was supplied, the server MUST supply AUTH=<> when relaying the message to any server it has authenticated to using the AUTH extension.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
