document: rfc-5802
kind: protocol-element
summary: 'The gs2-cbind-flag signals channel binding intent: ''n'' = client does not support channel binding; ''y'' = client supports it but believes server does not; ''p=<type>'' = client requires channel binding of the named type. The flag must be the first element of the client-first-message.'
section: "7"
