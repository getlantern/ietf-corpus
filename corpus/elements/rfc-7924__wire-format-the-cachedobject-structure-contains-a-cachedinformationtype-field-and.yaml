document: rfc-7924
kind: wire-format
summary: The CachedObject structure contains a CachedInformationType field and, on the client side, an opaque hash_value field of 1–255 bytes. On the server side the body contains only the type. Multiple CachedObjects are grouped in a CachedInformation struct with a 2-byte length prefix (1..2^16-1 bytes).
