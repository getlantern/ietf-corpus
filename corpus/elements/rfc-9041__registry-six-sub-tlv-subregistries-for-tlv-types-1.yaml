document: rfc-9041
kind: registry
summary: Six sub-TLV subregistries (for TLV Types 1/16/21, 6, 11, 20, 23, and 27) are each updated with the same eight-range structure as the TLVs registry, replacing 'Vendor Private Use' or 'Private Use' with FCFS and adding Experimental Use ranges. The 'Sub-TLVs for TLV Type 9' subregistry is explicitly not updated.
