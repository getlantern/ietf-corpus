document: rfc-8621
kind: security-consideration
summary: When a user has partial account access, Email objects are visible via JMAP only if the user has read permission (mayReadItems) for at least one Mailbox containing that Email. Servers must enforce Mailbox-level ACLs when returning Email data.
section: "9.5"
topics:
    - email
    - security
