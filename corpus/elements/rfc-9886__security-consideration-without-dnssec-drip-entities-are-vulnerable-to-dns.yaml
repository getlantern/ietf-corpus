document: rfc-9886
kind: security-consideration
summary: Without DNSSEC, DRIP entities are vulnerable to DNS spoofing attacks including denial-of-service, replay attacks, impersonation or cloning of UAVs, hijacking of DET registrations, injection of corrupt metadata, and compromise of the established trust hierarchy. DNSSEC validation is essential to authenticate DNS responses.
section: "7.1"
topics:
    - dns
    - security
