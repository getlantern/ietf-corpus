document: rfc-8543
kind: security-consideration
summary: The organization object may contain personally identifiable information such as <org:contact>. If PII is provided, both client and server MUST ensure that authorization information is stored and exchanged with high-grade encryption mechanisms to provide privacy services as specified in RFC 5733. The security considerations of RFC 5730 also apply.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
