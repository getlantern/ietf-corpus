document: rfc-9927
kind: wire-format
summary: The EARO format for use in NS messages is a 32-bit header (Type, Length, F, Prefix Length, Opaque) followed by a second 32-bit word containing flags |r|C|P|I|R|T|, TID, and Registration Lifetime, followed by a variable-length ROVR field (64, 128, 192, or 256 bits). The C-flag now occupies bit 1 of the flags byte.
section: "3"
