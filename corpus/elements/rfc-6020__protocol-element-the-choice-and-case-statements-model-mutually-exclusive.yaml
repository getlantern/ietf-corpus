document: rfc-6020
kind: protocol-element
summary: The choice and case statements model mutually exclusive sets of schema nodes. When a node from one case is created, all nodes from all other cases are implicitly deleted by the device. Choice and case nodes appear only in the schema tree, not in XML data or NETCONF messages.
section: "7.9"
topics:
