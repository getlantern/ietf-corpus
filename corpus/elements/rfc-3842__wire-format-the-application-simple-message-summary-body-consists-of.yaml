summary: 'The application/simple-message-summary body consists of a msg-status-line (Messages-Waiting: yes/no), an optional Message-Account URI, optional msg-summary-line entries per message-context-class with new/old and urgent counts encoded as DIGIT strings not exceeding 2^32-1, and optional RFC 2822-style extension headers.'
