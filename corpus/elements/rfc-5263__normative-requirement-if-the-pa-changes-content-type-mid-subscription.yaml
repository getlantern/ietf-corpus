document: rfc-5263
kind: normative-requirement
summary: If the PA changes content type mid-subscription, the watcher MUST discard all previously received presence information except the local version counter; the version counter MUST NOT be discarded so that it continues correctly if the PA reverts to 'application/pidf-diff+xml'.
section: "4.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
