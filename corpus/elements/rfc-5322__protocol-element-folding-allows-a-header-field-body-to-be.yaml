document: rfc-5322
kind: protocol-element
summary: Folding allows a header field body to be split across multiple lines by inserting CRLF before any whitespace (WSP). Unfolding is performed by removing any CRLF immediately followed by WSP before semantic analysis; the unfolded form has no length restriction.
