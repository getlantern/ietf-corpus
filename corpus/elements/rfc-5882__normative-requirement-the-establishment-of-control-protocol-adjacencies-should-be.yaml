document: rfc-5882
kind: normative-requirement
summary: The establishment of control protocol adjacencies SHOULD be blocked if both systems are willing to establish a BFD session but a BFD session cannot be established. If it is believed the neighboring system does not support BFD, adjacency establishment SHOULD NOT be blocked.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
