document: rfc-9537
kind: security-consideration
summary: The redaction extension does not provide any security services beyond those described by RFC 9083. Servers MAY exclude redacted member entries for RDAP fields where even signaling the existence of data would itself be a privacy concern.
section: "7"
topics:
