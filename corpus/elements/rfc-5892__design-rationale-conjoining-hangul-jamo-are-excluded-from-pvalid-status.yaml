document: rfc-5892
kind: design-rationale
summary: Conjoining Hangul Jamo are excluded from PVALID status so that old Hangul syllables (spelled with Jamo sequences) cannot appear in IDN labels. This avoids the complexity of Jamo-sequence handling in domain names and limits Korean IDNs to preformed syllable code points.
section: "2.9"
topics:
    - dns
