document: rfc-9068
kind: normative-requirement
summary: If a scope parameter is included in the authorization request, the issued JWT access token SHOULD include a 'scope' claim as defined in RFC 8693 Section 4.2. All individual scope strings MUST have meaning for the resources indicated in the 'aud' claim.
section: 2.2.3
rfc2119_level: SHOULD
topics:
    - oauth
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
