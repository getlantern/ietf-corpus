document: rfc-3287
kind: interoperability-note
summary: DSMON data tables are indexed as closely as possible to comparable RMON-2 and HC-RMON tables, with an additional dsmonAggGroupIndex component for DSCP-based classification. This preserves RMON look-and-feel and allows MIB re-use by implementers familiar with RMON-2.
