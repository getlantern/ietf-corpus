document: rfc-9668
kind: normative-requirement
summary: If the Initiator receives EDHOC message_2 with C_R equal to the C_I it selected, it MUST abort the session and reply with an EDHOC error message with error code 1. This prevents identifier collision between the two connection identifiers.
section: 4.1.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
