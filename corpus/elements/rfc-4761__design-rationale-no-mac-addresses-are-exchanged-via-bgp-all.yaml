document: rfc-4761
kind: design-rationale
summary: No MAC addresses are exchanged via BGP; all MAC address learning and aging is done in the data plane individually by each PE. BGP VPLS message exchange is limited to auto-discovery and label exchange, making it relatively infrequent and scalable.
