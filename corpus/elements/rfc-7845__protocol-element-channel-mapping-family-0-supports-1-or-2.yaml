document: rfc-7845
kind: protocol-element
summary: Channel Mapping Family 0 supports 1 or 2 channels (mono or stereo) with the same channel interpretation as RFC 7587 RTP mapping. The channel mapping table is omitted; stream count defaults to 1 and coupled count defaults to (C-1).
