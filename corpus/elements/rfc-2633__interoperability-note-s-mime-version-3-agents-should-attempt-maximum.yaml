document: rfc-2633
kind: interoperability-note
summary: S/MIME version 3 agents should attempt maximum interoperability with S/MIME version 2 agents (RFC 2311-2315). S/MIME v2 clients can only verify signatures using rsaEncryption and only decrypt content encryption keys using rsaEncryption.
section: "1.4"
topics:
    - email
    - crypto
