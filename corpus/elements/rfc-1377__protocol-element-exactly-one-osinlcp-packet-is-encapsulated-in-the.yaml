summary: Exactly one OSINLCP packet is encapsulated in the Information field of a PPP Data Link Layer frame where the Protocol field indicates type hex 8023 (OSI Network Layer Control Protocol). Only Codes 1 through 7 are used; other Codes should result in Code-Rejects.
