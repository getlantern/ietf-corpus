document: rfc-2564
kind: security-consideration
summary: Read-only objects in this MIB can expose sensitive system configuration details including open file paths, connection addresses, application-layer protocol identifiers, and heap usage; the SNMPv3 security framework with appropriate view-based access control should be used to restrict access to these objects.
