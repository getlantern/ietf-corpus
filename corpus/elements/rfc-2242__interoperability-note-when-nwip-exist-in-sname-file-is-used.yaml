document: rfc-2242
kind: interoperability-note
summary: When NWIP_EXIST_IN_SNAME_FILE is used, options 62 and 63 are placed in the area covered by the DHCP 'sname' and 'file' fields. Option 63 in the 'options' area is a stub with length 2 pointing to the sname/file area; the full sub-option data appears only in sname/file.
section: "3"
