document: rfc-4314
kind: protocol-element
summary: An Access Control List (ACL) is a set of <access identifier, rights> pairs that applies to a mailbox name. Access identifiers are UTF-8 strings; 'anyone' is reserved for the universal identity. Rights is a string of alphanumeric characters controlling operations.
