document: rfc-2284
kind: protocol-element
summary: The Notification type (2) conveys a displayable message from authenticator to peer (e.g., password expiration warnings). The peer SHOULD display or log it. A Response MUST be sent immediately with Type=2 and zero-length Type-Data, independent of how the message is displayed.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
