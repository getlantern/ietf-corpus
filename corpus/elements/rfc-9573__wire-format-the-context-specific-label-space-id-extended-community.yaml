document: rfc-9573
kind: wire-format
summary: The Context-Specific Label Space ID Extended Community is a Transitive Opaque EC (type 0x03 or 0x43, sub-type 0x08) with a 2-octet ID-Type field and a 4-octet ID-Value field. When ID-Type is 0 (MPLS Label), the most significant 20 bits of ID-Value carry the label value.
section: "4.1"
topics:
    - mpls
    - routing
