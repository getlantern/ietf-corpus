document: rfc-2078
kind: protocol-element
summary: GSS_Export_sec_context() and GSS_Import_sec_context() enable transfer of an active security context between processes on an end system, supporting multi-process server architectures. The exporting call deactivates the context locally and produces an interprocess transfer token.
section: 2.2.8
topics:
    - security
