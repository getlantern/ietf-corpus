document: rfc-4568
kind: registry
summary: 'RFC 4568 creates the ''SDP Security Descriptions'' IANA registry with two sub-registries: Key Methods (initially containing ''inline'') and Media Stream Transports (initially containing ''SRTP'', which itself has sub-registries for crypto suites and session parameters). New entries require Standards Action RFCs.'
