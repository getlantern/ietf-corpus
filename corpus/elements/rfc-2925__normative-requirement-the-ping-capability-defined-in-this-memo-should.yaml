document: rfc-2925
kind: normative-requirement
summary: The ping capability defined in this memo SHOULD be implemented using the ICMP Echo Facility. The management application using a remote ping capability must know which method is in use because different methods yield different response times.
section: "1.0"
rfc2119_level: RECOMMENDED
topics:
    - measurement
    - snmp
