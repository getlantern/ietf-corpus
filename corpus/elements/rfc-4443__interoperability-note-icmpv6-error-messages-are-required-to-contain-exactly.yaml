document: rfc-4443
kind: interoperability-note
summary: ICMPv6 error messages are required to contain exactly 32 bits of type-specific data (the Unused/MTU/Pointer field) so that receivers can reliably locate the embedded invoking packet even when they do not recognize the ICMP message Type. This is a structural constraint added relative to RFC 2463.
section: Appendix A
topics:
    - ip
