document: rfc-9965
kind: normative-requirement
summary: When a provisioning method is selected, the EAP peer MUST NOT have a configuration interface that allows the EAP user identifier to be configured directly by the user; instead, the peer selects the EPI matching the chosen provisioning method.
section: 3.4.1
rfc2119_level: MUST NOT
topics:
