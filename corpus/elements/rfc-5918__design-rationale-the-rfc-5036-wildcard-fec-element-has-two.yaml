document: rfc-5918
kind: design-rationale
summary: 'The RFC 5036 Wildcard FEC Element has two key deficiencies: it is untyped (cannot reference all FECs of a given type), and its use is limited to Label Withdraw and Label Release messages only, excluding Label Request. The Typed Wildcard FEC Element addresses both limitations.'
