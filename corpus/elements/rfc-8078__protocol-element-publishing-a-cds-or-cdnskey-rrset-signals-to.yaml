document: rfc-8078
kind: protocol-element
summary: Publishing a CDS or CDNSKEY RRset signals to the parent that the child desires the corresponding DS records to be synchronized. The CDS RRset is an instruction to modify the DS RRset if the CDS and DS RRsets differ.
section: "2.1"
topics:
