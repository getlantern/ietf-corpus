document: rfc-6980
kind: design-rationale
summary: SEND Certification Path Advertisement messages are treated differently from other ND messages because the Certificate Option they carry can contain substantially more data than any other ND option, potentially exceeding the local link MTU, making it impractical to forbid fragmentation entirely for CPA.
