document: rfc-5692
kind: normative-requirement
summary: The network-side bridging function MUST create a new radio-side port whenever a new SS attaches to any BS, and MUST remove a radio-side port when an associated SS detaches. It MUST be based on IEEE 802.1D and amendment 802.16k.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
