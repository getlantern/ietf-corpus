document: rfc-9084
kind: normative-requirement
summary: A prefix advertisement's parent TLV MAY include more than one Prefix Source OSPF Router-ID Sub-TLV, one per ECMP node that originated the advertised prefix. The same applies to the Prefix Source Router Address Sub-TLV.
section: "2.1"
rfc2119_level: MAY
topics:
    - routing
