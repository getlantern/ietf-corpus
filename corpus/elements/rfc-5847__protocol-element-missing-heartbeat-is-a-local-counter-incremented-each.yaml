document: rfc-5847
kind: protocol-element
summary: MISSING_HEARTBEAT is a local counter incremented each time a Heartbeat Response is not received before the next request. When it exceeds MISSING_HEARTBEATS_ALLOWED, the peer is declared unreachable; it resets to zero upon receipt of a valid Heartbeat Response.
section: "3.1"
topics:
    - mobility
    - ip
