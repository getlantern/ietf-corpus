document: rfc-2598
kind: design-rationale
summary: 'The EF PHB can be implemented by multiple queue scheduling mechanisms: a simple priority queue (best for jitter), weighted round-robin with the EF queue share equal to the configured rate, or a CBQ scheduler giving the EF queue priority up to the configured rate. Different choices yield different ancillary behaviors such as jitter seen by individual microflows.'
