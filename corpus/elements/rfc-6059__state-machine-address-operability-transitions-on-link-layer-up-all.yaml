document: rfc-6059
kind: state-machine
summary: 'Address operability transitions: on link-layer ''up'', all non-tentative addresses enter AS_INOPERABLE. On receipt of a confirming NA (matching IPv6 and MAC), associated SDAT addresses transition to AS_OPERABLE. On receipt of an RA from a known router, associated addresses revert to AS_INOPERABLE before standard RA processing may update them.'
section: "5.4"
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
