document: rfc-5810
kind: security-consideration
summary: An attacker who can inject false PL messages can subvert FE data-path behavior by spoofing CE commands, or corrupt CE state by spoofing FE events and responses. CE/FE endpoint authentication and PL message authentication at the TML layer are the primary countermeasures.
