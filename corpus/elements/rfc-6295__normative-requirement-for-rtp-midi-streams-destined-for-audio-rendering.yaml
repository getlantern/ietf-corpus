document: rfc-6295
kind: normative-requirement
summary: For RTP MIDI streams destined for audio rendering, the clock rate SHOULD be an audio sample rate of 32 KHz or higher (e.g., 32, 44.1, 48, 96 KHz). If the MIDI stream is part of a synchronized session with another RTP audio stream at 32 KHz or higher, the MIDI stream SHOULD match that stream's clock rate.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
