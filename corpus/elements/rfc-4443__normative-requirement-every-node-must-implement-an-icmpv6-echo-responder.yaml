document: rfc-4443
kind: normative-requirement
summary: Every node MUST implement an ICMPv6 Echo responder function that receives Echo Requests and originates corresponding Echo Replies. A node SHOULD also implement an application-layer interface for originating Echo Requests and receiving Echo Replies, for diagnostic purposes.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
