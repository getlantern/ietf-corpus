document: rfc-3664
kind: security-consideration
summary: The security of AES-XCBC-PRF-128 rests on the strength of AES; at time of publication no known practical cryptographic attacks existed against AES or AES-XCBC-MAC-PRF. Strength also depends on key management quality, secret key strength, and correctness of implementations.
