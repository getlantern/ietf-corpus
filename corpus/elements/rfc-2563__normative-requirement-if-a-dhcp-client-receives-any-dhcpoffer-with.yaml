document: rfc-2563
kind: normative-requirement
summary: If a DHCP client receives any DHCPOFFER with 'yiaddr' of 0x00000000 and the Auto-Configure flag says DoNotAutoConfigure, and no valid-address DHCPOFFER arrives, the client MUST NOT generate a link-local IP address.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - ip
