document: rfc-5936
kind: normative-requirement
summary: The AXFR response MUST contain the appropriate glue records as registered with the zone. Even when there is an inconsistency between a glue record's address and the authoritative copy, the registered glue record must be included.
section: "3.3"
rfc2119_level: MUST
topics:
