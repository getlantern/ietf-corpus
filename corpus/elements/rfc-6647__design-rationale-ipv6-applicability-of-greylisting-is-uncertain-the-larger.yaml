document: rfc-6647
kind: design-rationale
summary: IPv6 applicability of greylisting is uncertain. The larger address space may allow bad actors to behave differently, potentially negating greylisting benefits or requiring substantially different algorithm parameters. The required database would also be substantially larger for IPv6.
