document: rfc-5280
kind: design-rationale
summary: X.509 v3 extensions replace the rigid PEM/RFC 1422 hierarchy (with its IPRA root, PCAs, and name subordination rule) because extensions allow policy information and path constraints to be embedded directly in certificates, enabling automated validation without a priori knowledge of PCAs and supporting cross-certification without structural restrictions.
section: "3.2"
topics:
    - pkix
