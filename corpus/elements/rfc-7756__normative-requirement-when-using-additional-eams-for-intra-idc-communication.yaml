document: rfc-7756
kind: normative-requirement
summary: When using Additional EAMs for intra-IDC communication and the target service is located behind another ER, that other ER MUST be provisioned with an additional EAM containing the IPv4 and IPv6 Service Addresses of the originating node; otherwise the target ER cannot translate the incoming packet's source address.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
