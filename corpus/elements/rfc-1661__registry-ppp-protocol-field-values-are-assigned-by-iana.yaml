document: rfc-1661
kind: registry
summary: 'PPP Protocol field values are assigned by IANA. Ranges: 0x0000-0x3fff (network-layer protocols), 0x8000-0xbfff (associated NCPs), 0x4000-0x7fff (low-volume protocols with no NCP), 0xc000-0xffff (link-layer control protocols). Reserved values include 0xc021 (LCP), 0xc023 (PAP), 0xc025 (Link Quality Report), 0xc223 (CHAP).'
