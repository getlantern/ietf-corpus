document: rfc-8910
kind: interoperability-note
summary: This document obsoletes RFC 7710 by changing the DHCPv4 option code from 160 to 114, and also updates RFC 3679 (which listed code 160 as unused). Implementations upgrading from RFC 7710 must migrate to code 114.
