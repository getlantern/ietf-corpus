document: rfc-9259
kind: interoperability-note
summary: Non-SRv6-capable nodes process traceroute probes using standard IPv6 forwarding and generate ICMPv6 'Time Exceeded' responses that include the SRH contents (up to minimum IPv6 MTU), allowing the ingress node to display segment list information even through non-SRv6-capable hops.
section: A.2.1
