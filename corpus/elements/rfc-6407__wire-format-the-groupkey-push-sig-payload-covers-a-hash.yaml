summary: The GROUPKEY-PUSH SIG payload covers a hash computed over the literal string 'rekey', the GROUPKEY-PUSH ISAKMP HDR, and all payloads preceding the SIG payload, taken over the unencrypted content. The prefixed string ensures this signature cannot be replayed in any other GDOI protocol context.
