document: rfc-5392
kind: normative-requirement
summary: The Link ID sub-TLV MUST NOT be used in the Link TLV of an Inter-AS-TE-v2 LSA, and the Neighbor ID sub-TLV MUST NOT be used in the Link TLV of an Inter-AS-TE-v3 LSA, as these OSPF-specific sub-TLVs are not applicable to inter-AS links.
