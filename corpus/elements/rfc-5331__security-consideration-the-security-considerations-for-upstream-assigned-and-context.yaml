document: rfc-5331
kind: security-consideration
summary: The security considerations for upstream-assigned and context labels are no different in kind from those for downstream-assigned labels. The auto-generated context label procedure (Section 8) assumes IP address uniqueness in the low-order 20 bits on a LAN; if two LSRs share those bits, other LSRs may misroute packets from either of them.
section: "10"
topics:
