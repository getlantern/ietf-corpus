document: rfc-6185
kind: security-consideration
summary: RTP packets using the H264-RCDO payload format are subject to the security considerations of the RTP specification (RFC 3550), applicable RTP profiles, and the H.264 RTP payload format specification in RFC 6184. No additional security considerations are introduced by this specification.
