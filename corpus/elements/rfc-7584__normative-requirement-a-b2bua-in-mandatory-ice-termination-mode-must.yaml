document: rfc-7584
kind: normative-requirement
summary: A B2BUA in mandatory ICE termination mode MUST NOT propagate the candidate list received in incoming SDP to the outbound SDP; it MUST only advertise its own candidate list and set its default candidate in the 'c=' and 'm=' lines.
section: "4.2"
rfc2119_level: MUST NOT
topics:
