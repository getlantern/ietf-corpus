document: rfc-2769
kind: design-rationale
summary: No encryption is specified for repository-to-repository authentication because encryption may be illegal in some jurisdictions. Authentication is done via cryptographic signatures (PGP) rather than encrypted channels, satisfying integrity without encryption.
section: "3"
