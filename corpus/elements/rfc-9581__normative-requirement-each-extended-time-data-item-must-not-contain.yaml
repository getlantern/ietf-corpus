document: rfc-9581
kind: normative-requirement
summary: Each extended time data item MUST NOT contain more than one of the timescale keys (-1, -13, 13). Timescale values MUST be unsigned integers or text strings; text strings MUST NOT be used between parties that are not both part of the experiment.
