document: rfc-3031
kind: normative-requirement
summary: An LSR that is capable of popping the label stack MUST perform penultimate hop popping when explicitly requested by its downstream label distribution peer. Initial label distribution protocol negotiations MUST allow each LSR to determine whether its neighbors are capable of popping the label stack, and an LSR MUST NOT request PHP from a peer that cannot do it.
section: "3.16"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
