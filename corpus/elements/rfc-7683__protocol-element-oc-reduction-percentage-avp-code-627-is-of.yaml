document: rfc-7683
kind: protocol-element
summary: OC-Reduction-Percentage AVP (code 627) is of type Unsigned32 with values 0–100 indicating the percentage of traffic the reacting node is requested to reduce. A value of 100 means all traffic should be throttled; values greater than 100 are ignored.
