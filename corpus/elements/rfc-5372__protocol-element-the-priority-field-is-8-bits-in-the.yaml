document: rfc-5372
kind: protocol-element
summary: The priority field is 8 bits in the RTP payload header. Value 0 is reserved for payloads containing a header (main or tile-part); values 1–255 indicate decreasing importance of the JPEG 2000 packet data contained in the RTP payload.
