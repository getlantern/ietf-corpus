document: rfc-8442
kind: design-rationale
summary: 'ECDHE_PSK cipher suites were created to fill a gap: RFC 4279 defined PSK cipher suites without elliptic curve cryptography, RFC 8422 introduced ECC for TLS without PSK, RFC 5487 combined AES-GCM with PSK but not ECDHE, and RFC 5489 combined PSK with ECDHE but not AES-GCM or AES-CCM. This document unifies all three capabilities.'
