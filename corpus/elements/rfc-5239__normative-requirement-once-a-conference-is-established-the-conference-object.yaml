document: rfc-5239
kind: normative-requirement
summary: Once a conference is established, the conference object identifier MUST be used to manipulate any conferencing data or access advanced conferencing features. This applies regardless of the call signaling protocol used to initially join the conference.
section: 6.2.1
rfc2119_level: MUST
topics:
    - realtime
