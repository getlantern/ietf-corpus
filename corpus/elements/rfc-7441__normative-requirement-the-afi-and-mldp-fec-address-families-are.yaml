document: rfc-7441
kind: normative-requirement
summary: The AFI and mLDP FEC address families are considered to correspond if they are identical, or if BGP AFI is IPv4 and FEC identifies 'Multi-Topology IPv4', or if BGP AFI is IPv6 and FEC identifies 'Multi-Topology IPv6'.
section: "3"
rfc2119_level: MUST
topics:
