document: rfc-3591
kind: security-consideration
summary: The optIfOTSnAprControl object allows writing arbitrary implementation-defined values to control Automatic Power Reduction, representing a risk of denial-of-service if accessed by unauthorized managers. Implementations must document all accepted and returned values and their effects.
section: "4"
topics:
