document: rfc-9256
kind: registry
summary: IANA created a new 'Segment Types' subregistry under the 'Segment Routing' registry (originally created by RFC 8986). It maintains alphabetic identifiers (A–Z, then AA–AZ, etc.) for segment types usable within an SR Policy segment list, with Specification Required allocation policy.
