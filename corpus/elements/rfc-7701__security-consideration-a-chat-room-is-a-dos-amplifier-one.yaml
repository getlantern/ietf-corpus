document: rfc-7701
kind: security-consideration
summary: 'A chat room is a DoS amplifier: one message from a single sender is replicated to all participants. Implementers of both UAs and MSRP switches must deploy appropriate anti-DoS measures. The MSRP switch should perform sanity checks before fast-forwarding chunks.'
section: "11"
topics:
