document: rfc-5557
kind: protocol-element
summary: 'GCO indication is conveyed implicitly: if any of the GCO-related objects (OF, GC, or XRO) follows the SVEC object in the PCReq message, all requested path computations specified in that SVEC are subject to those global constraints and objective functions. No separate explicit indicator field is needed.'
