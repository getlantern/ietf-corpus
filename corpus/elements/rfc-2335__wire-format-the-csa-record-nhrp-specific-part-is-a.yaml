summary: 'The CSA Record NHRP Specific Part is a variable-length structure beginning with fixed fields: Address Family Number (16 bits), NHRP Protocol Type (16 bits), Snap (40 bits), NHRP Vers Num (8 bits), Flags (16 bits), Request ID (32 bits), State (8 bits), Prefix Length (8 bits), unused (16 bits), MTU (16 bits), Holding Time (16 bits), Cli Addr T/L (8 bits), Cli SAddr T/L (8 bits), Cli Proto Len (8 bits), Preference (8 bits), followed by variable-length Client Subnetwork Address, Client Subnetwork Subaddress, and Client Protocol Address.'
