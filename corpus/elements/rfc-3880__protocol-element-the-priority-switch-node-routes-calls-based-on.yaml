document: rfc-3880
kind: protocol-element
summary: 'The ''priority-switch'' node routes calls based on priority level. Priorities in decreasing order are: ''emergency'', ''urgent'', ''normal'', ''non-urgent''. If no priority is specified, ''normal'' is assumed; unknown priorities are treated as ''normal'' for ''greater''/''less'' comparisons.'
section: "4.5"
topics:
