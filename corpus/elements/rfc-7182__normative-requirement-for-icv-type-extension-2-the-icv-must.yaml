document: rfc-7182
kind: normative-requirement
summary: For ICV type extension = 2, the ICV MUST additionally cover the source address of the IP datagram, represented as a single length octet followed by the address in network byte order, prepended to the remaining input data.
section: 12.2.1
rfc2119_level: MUST
