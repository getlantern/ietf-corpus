summary: The BFD Configuration Sub-TLV (sub-type 100) is carried within the MPLS OAM Functions TLV and specifies BFD protocol version, mode flags (N=negotiation, S=symmetric, I=integrity, G=G-ACh encapsulation, U=IP/UDP encapsulation, B=bidirectional), and nested sub-TLVs for discriminator, timer, and authentication.
