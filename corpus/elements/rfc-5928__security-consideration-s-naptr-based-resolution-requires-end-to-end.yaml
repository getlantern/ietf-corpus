document: rfc-5928
kind: security-consideration
summary: S-NAPTR-based resolution requires end-to-end authentication to ensure the correct TURN server is reached. RFC 5928 satisfies this requirement via the Long-Term Credential Mechanism defined in RFC 5389, which is mandatory for RFC 5766 deployments.
section: "5"
topics:
