document: rfc-9110
kind: design-rationale
summary: RFC 9110 deliberately separates HTTP semantics (this document) from HTTP/1.1 messaging syntax ([HTTP/1.1]) and caching ([CACHING]), so that each specification and each major HTTP version can progress independently while sharing the same authoritative definition of core semantics.
