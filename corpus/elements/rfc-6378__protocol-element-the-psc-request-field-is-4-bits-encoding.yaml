document: rfc-6378
kind: protocol-element
summary: 'The PSC Request field is 4 bits encoding the current protection condition: 0=No Request, 1=Do-not-Revert, 4=Wait-to-Restore, 5=Manual Switch, 7=Signal Degrade, 10=Signal Fail, 12=Forced Switch, 14=Lockout of protection. All other values are reserved for future extensions and SHALL be ignored upon receipt.'
section: 4.2.2
topics:
