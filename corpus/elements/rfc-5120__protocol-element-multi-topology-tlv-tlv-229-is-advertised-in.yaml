document: rfc-5120
kind: protocol-element
summary: Multi-Topology TLV (TLV 229) is advertised in IIHs and LSP fragment 0 to indicate which topologies a router or interface participates in. It contains one or more 2-byte MT components, each with an OVERLOAD bit (O), ATTACH bit (A), reserved bits (R), and a 12-bit MT ID field.
section: "7.1"
topics:
