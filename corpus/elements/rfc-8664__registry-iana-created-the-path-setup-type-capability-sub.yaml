document: rfc-8664
kind: registry
summary: IANA created the 'PATH-SETUP-TYPE-CAPABILITY Sub-TLV Type Indicators' sub-registry within PCEP Numbers, assigned by Standards Action. Initializes value 0 (Reserved) and value 26 (SR-PCE-CAPABILITY). This document updates RFC 8408 by mandating that sub-TLVs appear in this registry.
