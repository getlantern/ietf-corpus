document: rfc-3296
kind: normative-requirement
summary: If alias dereferencing was necessary in finding the referral object during a search base lookup, the DN part of the returned URI MUST be replaced with the base DN as modified by alias dereferencing, per RFC 2251 section 4.1.11.
section: "5.3"
rfc2119_level: MUST
