document: rfc-1035
kind: design-rationale
summary: DNS stores multiple values of a type as multiple RRs rather than as multiple values inside a single RR's RDATA. This keeps individual RRs shorter and simplifies caching, at the cost of some efficiency for bulk retrieval.
section: "3.6"
topics:
    - dns
