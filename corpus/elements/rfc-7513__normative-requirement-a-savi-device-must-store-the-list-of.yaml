document: rfc-7513
kind: normative-requirement
summary: A SAVI device MUST store the list of DHCP server addresses it could contact during a leasequery process. It may also require preconfigured security keys for establishing secure leasequery connections per RFC 4388 and RFC 5007.
section: "4.4"
rfc2119_level: MUST
topics:
