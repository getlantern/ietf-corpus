document: rfc-8663
kind: design-rationale
summary: MPLS-over-UDP (RFC 7510) is preferred over MPLS-over-IP (RFC 4023) because its UDP source port field can encode entropy for ECMP and LAG load balancing, whereas MPLS-over-IP provides no entropy mechanism.
