document: rfc-9754
kind: protocol-element
summary: The OPEN4_SHARE_ACCESS_WANT_OPEN_XOR_DELEGATION flag (0x200000) allows a client to request that OPEN return either an open stateid or a delegation stateid, but not necessarily both. This is a hint; the server may still return both stateids.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
