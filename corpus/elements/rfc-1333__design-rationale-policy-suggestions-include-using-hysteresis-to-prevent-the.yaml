document: rfc-1333
kind: design-rationale
summary: Policy suggestions include using hysteresis to prevent the link from bouncing up and down, and a K-out-of-N algorithm where the link is considered good only when K of the last N periods succeed. Recovery may involve closing NCPs (e.g., sending IPCP Terminate-Request) while continuing to send LQRs.
section: "2.10"
