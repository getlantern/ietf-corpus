document: rfc-3922
kind: normative-requirement
summary: When unsubscribing, the gateway MUST set the CPP 'duration parameter' to zero, and upon receiving the 'unsubscribe' stanza the gateway MUST NOT send further presence notifications to the XMPP entity.
section: "6.4"
rfc2119_level: MUST
