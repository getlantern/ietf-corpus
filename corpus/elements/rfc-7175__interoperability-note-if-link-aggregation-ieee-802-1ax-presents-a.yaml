document: rfc-7175
kind: interoperability-note
summary: If link aggregation (IEEE 802.1AX) presents a single logical interface to TRILL IS-IS, only a single TRILL BFD session can be established to another RBridge over that logical interface. Lower-layer OAM may run separately on individual aggregation components.
section: "2.1"
topics:
    - routing
