document: rfc-4683
kind: security-consideration
summary: The protocol trusts the relying party (Bob) not to reuse Alice's P and SII to impersonate her. If the relying party is untrusted, combining P and SII knowledge with a certificate could enable impersonation; hence the MUST requirement for digital-signature-based protocols.
section: "8"
topics:
    - pkix
    - security
