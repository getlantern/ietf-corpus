document: rfc-2743
kind: protocol-element
summary: Mechanism types are identified by ASN.1 Object Identifiers (OIDs) per [ISOIEC-8824]/[ISOIEC-8825] and embody a specific cryptographic technology plus the syntax and semantics of data element exchanges. The Kerberos V5 mechanism OID is 1.2.840.113554.1.2.2; DASS is 1.3.12.2.1011.7.5. Hierarchically-structured OIDs prevent ambiguous mech_type interpretation.
