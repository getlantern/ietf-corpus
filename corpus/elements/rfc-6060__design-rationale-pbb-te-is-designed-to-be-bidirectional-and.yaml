document: rfc-6060
kind: design-rationale
summary: 'PBB-TE is designed to be bidirectional and symmetrically routed: complete Ethernet protocol functionality is only guaranteed for bidirectional Eth-LSPs. The IEEE PBB-TE standard assumes co-routed ESPs for P2P TESIs to support TE service monitoring and operational simplicity.'
