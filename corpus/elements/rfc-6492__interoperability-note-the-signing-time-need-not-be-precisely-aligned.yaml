document: rfc-6492
kind: interoperability-note
summary: The signing-time need not be precisely aligned to a real-time clock; arbitrarily large clock skew is permitted as long as signing times are monotonically non-decreasing between the same originator/recipient pair. This relaxes interoperability requirements for systems with poor clock synchronization.
section: "4"
topics:
    - pkix
