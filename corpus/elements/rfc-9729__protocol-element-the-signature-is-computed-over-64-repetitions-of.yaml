document: rfc-9729
kind: protocol-element
summary: 'The signature is computed over: 64 repetitions of octet 0x20, the UTF-8 context string ''HTTP Concealed Authentication'', a single 0x00 separator byte, and the 32-byte Signature Input from the key exporter output. This construction mirrors TLS 1.3 CertificateVerify to prevent cross-protocol key misuse.'
section: "3.3"
