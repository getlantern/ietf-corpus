document: rfc-6030
kind: normative-requirement
summary: If the <Policy> element contains child elements or attribute values not understood by the recipient, the recipient MUST assume that key usage is not permitted. This deny-by-default ensures unknown policy extensions do not silently permit unintended usage.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
