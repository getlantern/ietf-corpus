document: rfc-6276
kind: interoperability-note
summary: The DHCPv6 messages exchanged between the mobile router and the home agent MAY also be used for other DHCPv6 functions such as global address assignment and DNS configuration, alongside DHCPv6PD. The home agent MAY also act as a DHCPv6 relay agent for mobile nodes while acting as delegating router for mobile routers.
section: "3.5"
topics:
    - mobility
    - ip
    - dns
