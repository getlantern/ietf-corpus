document: rfc-7648
kind: normative-requirement
summary: Upon change of its external IP address, the PCP proxy SHOULD renew its maintained mappings, and if the PCP server assigns a different external port, SHOULD follow the PCP mapping repair procedure (RFC 6887), requiring a full state table.
section: "3.5"
rfc2119_level: SHOULD
