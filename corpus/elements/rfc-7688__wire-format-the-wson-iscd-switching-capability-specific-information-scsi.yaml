document: rfc-7688
kind: wire-format
summary: 'The WSON ISCD Switching Capability Specific Information (SCSI) contains a variable number of Bandwidth sub-TLVs: Type 1 (Available Labels) and Type 2 (Shared Backup Labels), as defined in RFC 7579. Multiple sub-TLVs of each type are permitted and their order is arbitrary.'
section: "3.1"
