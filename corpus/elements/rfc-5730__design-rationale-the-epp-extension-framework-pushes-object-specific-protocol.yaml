document: rfc-5730
kind: design-rationale
summary: 'The EPP extension framework pushes object-specific protocol operation definitions into per-object documents and allows adding new object mappings without modifying the base protocol. Three extension levels are defined: protocol extensions (at the <epp> element), object extensions (per object namespace), and command-response extensions (per command).'
section: "2.7"
