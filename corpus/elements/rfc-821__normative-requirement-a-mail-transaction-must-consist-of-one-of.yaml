document: rfc-821
kind: normative-requirement
summary: A mail transaction must consist of one of the transaction-beginning commands (MAIL, SEND, SOML, or SAML), followed by one or more RCPT commands, followed by DATA, in that order. If commands are out of order a 503 failure reply must be returned.
section: 4.1.1
rfc2119_level: MUST
topics:
    - email
