document: rfc-6002
kind: security-consideration
summary: This document introduces new message object formats for GMPLS signaling (RFC 3473) but does not introduce new signaling messages or change the relationship between adjacent LSRs in the control plane. As such, no additional security considerations are introduced beyond those in RFC 3473 and the MPLS/GMPLS security framework in RFC 5920.
section: "5"
topics:
