summary: 'The pseudonode is controlled by the DRB: if the DRB sets the bypass pseudonode bit in its Hellos, all RBridges report adjacencies directly; otherwise the DRB generates pseudonode LSPs reporting adjacency to all RBridges with Report-state adjacency to the DRB.'
