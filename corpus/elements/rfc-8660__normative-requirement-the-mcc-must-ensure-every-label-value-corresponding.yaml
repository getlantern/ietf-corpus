document: rfc-8660
kind: normative-requirement
summary: The MCC MUST ensure every label value corresponding to any SID it installs is unique within the router—it MUST only represent that one SID and MUST NOT be used for any other forwarding purpose on the same router.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
