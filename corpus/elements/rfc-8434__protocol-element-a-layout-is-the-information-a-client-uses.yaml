document: rfc-8434
kind: protocol-element
summary: A layout is the information a client uses to access file data on a storage device, including specification of the protocol (layout type) and the identity of the storage devices. The bulk of layout contents are defined in RFC 5661 as nominally opaque, but individual layout types are responsible for specifying the format of the layout data.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
