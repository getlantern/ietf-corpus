document: rfc-1426
kind: normative-requirement
summary: If a server SMTP does not support the 8-bit MIME transport extension, then the client SMTP must not, under any circumstances, attempt to transfer a content which contains characters outside the US ASCII octet range (hex 00-7F).
section: "4"
rfc2119_level: MUST NOT
topics:
