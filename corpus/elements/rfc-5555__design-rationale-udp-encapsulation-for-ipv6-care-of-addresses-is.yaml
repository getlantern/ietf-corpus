document: rfc-5555
kind: design-rationale
summary: UDP encapsulation for IPv6 care-of addresses is designated a last-resort mechanism for cases where IP-in-IP tunneling fails due to local firewalling policies. It should not be used in normal IPv6-enabled network operation to avoid unnecessary overhead.
section: "1.3"
topics:
    - mobility
    - nat
    - udp
    - ip
