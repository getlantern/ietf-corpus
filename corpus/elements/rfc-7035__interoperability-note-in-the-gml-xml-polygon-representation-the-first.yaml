document: rfc-7035
kind: interoperability-note
summary: In the GML (XML) polygon representation, the first point is repeated at the end of the coordinate sequence to close the ring, but in the TLV binary representation the closing duplicate is removed; decoders must account for this difference when converting between the two forms.
section: 4.9.4.2
