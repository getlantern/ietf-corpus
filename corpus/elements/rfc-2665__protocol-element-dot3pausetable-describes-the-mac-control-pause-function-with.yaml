summary: 'dot3PauseTable describes the MAC Control PAUSE function with dot3PauseAdminMode (read-write: disabled/enabledXmit/enabledRcv/enabledXmitAndRcv), dot3PauseOperMode (read-only current mode), dot3InPauseFrames, and dot3OutPauseFrames. Only interfaces supporting the PAUSE function have a row here.'
