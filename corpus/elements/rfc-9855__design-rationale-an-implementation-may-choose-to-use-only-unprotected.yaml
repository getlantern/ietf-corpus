document: rfc-9855
kind: design-rationale
summary: 'An implementation MAY choose to use only unprotected Adjacency segments in the RL to avoid double FRR activation: if a protected Adj-SID in the RL itself fails, the nested FRR could cause unexpected behavior. FRR is designed to protect against a single pre-planned failure.'
