document: rfc-3270
kind: design-rationale
summary: The Pipe Model is particularly suited to MPLS VPN environments where VPN sites share a common Diff-Serv policy that differs from the service provider's interior policy. It allows end-to-end Diff-Serv policy to operate consistently across LSP ingress and egress while remaining transparent to the intermediate SP domain.
section: 2.6.2
topics:
    - mpls
    - diffserv
    - qos
