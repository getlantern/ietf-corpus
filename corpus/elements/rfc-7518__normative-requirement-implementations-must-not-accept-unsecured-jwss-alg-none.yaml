document: rfc-7518
kind: normative-requirement
summary: Implementations MUST NOT accept Unsecured JWSs (alg='none') by default, and applications MUST NOT signal acceptance at a global level. Acceptance must be signaled per-object to mitigate downgrade attacks.
section: "3.6"
rfc2119_level: MUST NOT
topics:
