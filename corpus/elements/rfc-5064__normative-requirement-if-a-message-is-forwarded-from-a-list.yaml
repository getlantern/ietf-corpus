document: rfc-5064
kind: normative-requirement
summary: If a message is forwarded from a list to a sublist and both lists support adding Archived-At, the sublist SHOULD add a new Archived-At field without removing existing ones, unless the header field is exactly the same as an existing one, in which case the new header SHOULD NOT be added.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
