document: rfc-1374
kind: normative-requirement
summary: When a node receives an AR_S_Response message whose Destination_IEEE_Address matches its own ULA, it shall take the new switch address from Destination_Switch_Address and shall invalidate its ARP tables to force rediscovery using the new address.
section: Address Resolution/Discovery of One's Own Switch Address
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
