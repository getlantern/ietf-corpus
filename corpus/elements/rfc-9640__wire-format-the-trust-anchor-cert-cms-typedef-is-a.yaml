document: rfc-9640
kind: wire-format
summary: The 'trust-anchor-cert-cms' typedef is a signed-data-cms that MUST contain a single chain of X.509 certificates with exactly one self-signed root certificate, and MAY contain revocation objects. The 'end-entity-cert-cms' typedef MUST contain exactly one end-entity certificate, MUST NOT contain spurious certificates, and MAY contain intermediate CA certificates and revocation objects.
section: 2.1.3
topics:
    - yang
    - crypto
    - pkix
