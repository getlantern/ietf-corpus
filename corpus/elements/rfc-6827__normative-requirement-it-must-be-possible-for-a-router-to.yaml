document: rfc-6827
kind: normative-requirement
summary: It MUST be possible for a router to originate more than one TE LSA containing the Node Attribute TLV when used for ASON reachability advertisement, because a router may support multiple transport nodes. This relaxes the Node Attribute TLV advertisement rules of RFC 5786.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
