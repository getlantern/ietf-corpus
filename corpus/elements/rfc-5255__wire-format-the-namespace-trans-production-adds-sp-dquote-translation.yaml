document: rfc-5255
kind: wire-format
summary: The namespace-trans production adds 'SP DQUOTE "TRANSLATION" DQUOTE SP "(" string ")"' to namespace responses, where the string is encoded in modified UTF-7. The resp-text rule is replaced after language change to allow UTF8-TEXT-CHAR (UTF-8 excluding 7-bit control characters and "[").
