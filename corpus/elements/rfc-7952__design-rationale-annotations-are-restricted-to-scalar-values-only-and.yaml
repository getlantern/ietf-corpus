document: rfc-7952
kind: design-rationale
summary: Annotations are restricted to scalar values only, and cannot be attached to a whole list or leaf-list (only to individual entries). This deliberate restriction preserves compatibility with XML encoding of YANG data nodes and limitations of XML attributes.
