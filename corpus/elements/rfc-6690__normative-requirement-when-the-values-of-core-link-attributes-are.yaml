document: rfc-6690
kind: normative-requirement
summary: When the values of CoRE link attributes are compared, they MUST be compared as strings. URIs used as attribute values MAY be dereferenced, but MUST NOT be dereferenced automatically on link evaluation.
section: "3"
rfc2119_level: MUST
