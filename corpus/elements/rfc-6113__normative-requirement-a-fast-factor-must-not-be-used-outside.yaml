document: rfc-6113
kind: normative-requirement
summary: A FAST factor MUST NOT be used outside of FAST unless its specification explicitly allows it. New pre-authentication mechanisms SHOULD be designed as FAST factors rather than as standalone full pre-authentication mechanisms, as FAST factors are significantly easier to analyze from a security standpoint.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
