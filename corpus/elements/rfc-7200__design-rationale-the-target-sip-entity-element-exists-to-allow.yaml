document: rfc-7200
kind: design-rationale
summary: The <target-sip-entity> element exists to allow a load-filtering server with multiple routing paths to apply a received policy only to requests destined for the specific overloaded entity, avoiding unnecessary throttling of calls that can be routed through non-overloaded alternatives.
section: 5.3.3
topics:
    - sip
    - realtime
