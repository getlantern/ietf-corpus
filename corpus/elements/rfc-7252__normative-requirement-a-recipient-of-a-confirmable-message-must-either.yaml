document: rfc-7252
kind: normative-requirement
summary: A recipient of a Confirmable message MUST either acknowledge it with an ACK (echoing the Message ID) or reject it with a matching RST. Recipients of ACK and RST messages MUST NOT respond with either ACK or RST messages.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
    - udp
