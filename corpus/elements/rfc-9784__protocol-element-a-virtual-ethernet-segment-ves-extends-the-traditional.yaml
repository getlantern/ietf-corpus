document: rfc-9784
kind: protocol-element
summary: A virtual Ethernet Segment (vES) extends the traditional ES concept by associating an ES with a set of Ethernet Virtual Circuits (EVCs) such as VLANs, MPLS LSPs, or pseudowires instead of physical links. A multihomed vES can span across two or more ENNIs on any two or more PEs and operates in either Single-Active or All-Active redundancy mode.
section: "1"
topics:
