document: rfc-8362
kind: normative-requirement
summary: A single instance of the IPv6 Link-Local Address TLV SHOULD be included in the E-Link-LSA; instances after the first MUST be ignored. If the Link-Local Address TLV corresponding to the active address family is absent from the E-Link-LSA, the LSA is treated as malformed.
section: "4.7"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
