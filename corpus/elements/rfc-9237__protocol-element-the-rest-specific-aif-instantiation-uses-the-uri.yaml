document: rfc-9237
kind: protocol-element
summary: The REST-specific AIF instantiation uses the URI-local-part (path and query components) as the object identifier (Toid) and a bit-encoded set of CoAP/HTTP methods as the permission set (Tperm). The URI authority components are excluded as they are authenticated via the cryptographic armor.
section: "2.1"
