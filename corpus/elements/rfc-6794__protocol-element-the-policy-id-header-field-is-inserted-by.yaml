document: rfc-6794
kind: protocol-element
summary: The Policy-ID header field is inserted by the UAC into INVITE, UPDATE, or PRACK requests to identify all policy servers the UAC has contacted for the current request. Its value consists of a policy server URI and an optional opaque token received from the policy server.
section: 4.4.5.1
topics:
