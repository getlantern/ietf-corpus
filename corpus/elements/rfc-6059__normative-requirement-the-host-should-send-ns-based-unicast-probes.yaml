document: rfc-6059
kind: normative-requirement
summary: The host SHOULD send NS-based unicast probes in parallel with the multicast Router Solicitation so that the DNA procedure never runs slower than standard neighbor discovery. A Simple DNA implementation SHOULD limit its NS-based probing to at most six previously seen routers.
section: 5.5.3
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
