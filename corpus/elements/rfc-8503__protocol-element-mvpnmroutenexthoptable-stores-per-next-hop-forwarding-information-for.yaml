document: rfc-8503
kind: protocol-element
summary: mvpnMrouteNextHopTable stores per-next-hop forwarding information for each multicast route, indexed by (VRF name, group prefix, source prefix, outgoing ifIndex, next-hop address). Key fields include mvpnMrouteNextHopState (pruned or forwarding), expiry time, closest member hops (0–256), and per-next-hop octet/packet counters.
section: "3.2"
