document: rfc-2467
kind: normative-requirement
summary: When mixed media are bridged together by bridges that do not support IPv6 Path MTU Discovery, the smallest MTU of all the media must be advertised by routers in an MTU option. If no routers are present, this MTU must be manually configured in each node connected to a medium with a default MTU larger than the smallest MTU.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
