document: rfc-2919
kind: security-consideration
summary: Mail list processors SHOULD NOT allow any user-originated List-Id fields to pass through to their lists, as forged headers could confuse users and create security problems. On the client side, a forged list identifier SHOULD NOT be used as an indication of message authenticity.
section: "8"
topics:
    - email
    - security
