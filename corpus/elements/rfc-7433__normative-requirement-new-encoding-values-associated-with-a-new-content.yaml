document: rfc-7433
kind: normative-requirement
summary: New 'encoding' values associated with a new content MUST reference a specific encoding scheme or define a new one. New UUI encodings cannot be added to existing contents—a new content must be defined. Newly defined encoding values are added to the IANA registry with a Standards Track RFC.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
