document: rfc-8229
kind: protocol-element
summary: Every TCP stream used for IKE and IPsec encapsulation MUST begin with a 6-byte magic stream prefix containing the ASCII characters 'IKETCP' (0x49 0x4b 0x45 0x54 0x43 0x50), sent once by the TCP Originator only.
