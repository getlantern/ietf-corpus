document: rfc-1073
kind: normative-requirement
summary: If the server's operating system does not support window size updates, the server may send DON'T NAWS after initially accepting the option to forbid further subnegotiations. This rule prevents negotiation loops.
section: "2"
rfc2119_level: MAY
