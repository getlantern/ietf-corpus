document: rfc-8086
kind: normative-requirement
summary: For UDP in IPv6, the UDP checksum MUST be processed per RFC 768 and RFC 2460 for both transmit and receive. A TMCE tunnel MAY use UDP zero-checksum mode only when specific conditions regarding packet corruption risk and operator willingness are satisfied.
section: "6.2"
rfc2119_level: MUST
topics:
    - udp
    - ip
    - v6ops
