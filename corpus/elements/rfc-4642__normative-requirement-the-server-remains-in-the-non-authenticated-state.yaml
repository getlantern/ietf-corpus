document: rfc-4642
kind: normative-requirement
summary: The server remains in the non-authenticated state even if client credentials are supplied during TLS negotiation. The AUTHINFO SASL command with the EXTERNAL mechanism MAY be used to authenticate after TLS client credentials are exchanged.
section: 2.2.2
rfc2119_level: MAY
topics:
    - tls
    - security
