document: rfc-4382
kind: normative-requirement
summary: When a label stack is created for a VRF route, the implementation MUST establish the associated cross-connect entry in mplsXCTable and then set mplsL3VpnVrfRteXCPointer to that index. Changes to the cross-connect object MUST automatically be reflected in this pointer.
section: "7"
rfc2119_level: MUST
topics:
