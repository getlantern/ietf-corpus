document: rfc-6486
kind: normative-requirement
summary: The nextUpdate field MUST contain a time later than thisUpdate. If the authority alters any published objects at the publication point, it MUST issue a new manifest before the nextUpdate time.
section: 4.2.1
rfc2119_level: MUST
