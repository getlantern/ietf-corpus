document: rfc-3462
kind: interoperability-note
summary: The Text/RFC822-Headers body part returns only the RFC 822 headers and is not the complete message; it must not be returned as a Message/RFC822 type. The returned headers are useful for identifying the failed message and for diagnostics based on received lines.
