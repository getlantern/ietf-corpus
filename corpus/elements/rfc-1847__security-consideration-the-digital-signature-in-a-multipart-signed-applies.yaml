document: rfc-1847
kind: security-consideration
summary: The digital signature in a multipart/signed applies only to material actually within the multipart/signed object. It does not apply to any enclosing message material nor to entities referenced (e.g., via MIME message/external-body) rather than included in the signed content.
section: "2.1"
topics:
    - email
    - security
    - crypto
