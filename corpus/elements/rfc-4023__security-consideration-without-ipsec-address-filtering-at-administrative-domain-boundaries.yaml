document: rfc-4023
kind: security-consideration
summary: Without IPsec, address filtering at administrative domain boundaries can help prevent spoofed tunnel packets. Source address filtering alone is insufficient unless the decapsulator validates the IP source address; effective protection requires destination-based or combined source+destination filtering.
section: "8.2"
topics:
