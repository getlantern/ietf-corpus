document: rfc-4243
kind: security-consideration
summary: Fraudulent relay agent option data could lead to theft-of-service or exhaustion of IP addresses by unauthorized clients. A host tampering with relay agent data could deny service to another host or cause the DHCP server to assign it inappropriate configuration parameters. The relay agent option depends on a trusted relationship between relay agent and server.
section: "6"
topics:
    - security
