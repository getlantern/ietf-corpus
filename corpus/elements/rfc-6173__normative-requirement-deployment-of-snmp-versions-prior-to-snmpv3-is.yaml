document: rfc-6173
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers are RECOMMENDED to use SNMPv3 with full cryptographic mechanisms for authentication and privacy, and to restrict object access to principals with legitimate rights.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - snmp
