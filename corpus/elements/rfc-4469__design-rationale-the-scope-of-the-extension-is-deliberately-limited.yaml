document: rfc-4469
kind: design-rationale
summary: The scope of the extension is deliberately limited to relative URLs referencing the current authenticated IMAP session. Support for absolute URLs or cross-session references would require a separate extension, keeping this specification simple and secure.
section: "3"
topics:
