document: rfc-1665
kind: protocol-element
summary: snaLuAdminTable contains read-create LU configuration indexed by snaNodeAdminIndex and snaLuAdminLuIndex. Fields include LU type (lu0 through lu7 plus lu62), dependency type (dependent/independent), local address (1-byte OCTET STRING), display model (model2A through model5B plus dynamic, valid only for LU type 2), and termination method.
