document: rfc-1826
kind: design-rationale
summary: Key management is intentionally decoupled from the Authentication Header protocol. The only coupling is the SPI value. This permits different key management mechanisms to be used and allows the key management protocol to be changed or corrected without impacting AH implementations.
section: "2"
topics:
