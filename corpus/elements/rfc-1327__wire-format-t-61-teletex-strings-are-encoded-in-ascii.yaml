document: rfc-1327
kind: wire-format
summary: 'T.61 (Teletex) strings are encoded in ASCII using the quoting form: common ps-char characters map directly; other octets are represented as ''{'' followed by one or more 3-digit decimal octet values ''}''. The combined teletex-and-or-ps encoding is ''[ printablestring ] [ "*" teletex-string ]'' and handles attributes that may have either or both forms.'
section: 3.3.4
