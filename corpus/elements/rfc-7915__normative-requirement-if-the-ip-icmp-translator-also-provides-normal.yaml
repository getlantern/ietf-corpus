document: rfc-7915
kind: normative-requirement
summary: If the IP/ICMP translator also provides normal forwarding, and the destination address is reachable by a more specific route without translation, the translator MUST forward it without translating. When an IPv4 datagram is addressed to an IPv4 destination representing a host in the IPv6 domain, the packet MUST be translated to IPv6.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
