document: rfc-8859
kind: normative-requirement
summary: For RFC 6871 media capabilities negotiation under multiplexing, when dealing with payload type numbers, each payload type MUST have identical rmcap and mfcap values across all multiplexed "m=" lines, because payload type assignments must be consistent within a single RTP session.
section: 14.3.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
