document: rfc-9815
kind: design-rationale
summary: 'BGP SPF significantly reduces NLRI advertisement volume compared to standard path-vector BGP: a single link failure requires only the originating BGP speaker to withdraw its Link NLRI, rather than triggering readvertisement of potentially hundreds of prefix NLRIs across the domain.'
