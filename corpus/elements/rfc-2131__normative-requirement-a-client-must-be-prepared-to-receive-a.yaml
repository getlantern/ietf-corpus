document: rfc-2131
kind: normative-requirement
summary: A client MUST be prepared to receive a DHCP message with an 'options' field of at least 312 octets, implying readiness to receive a 576-octet message (the minimum IP datagram size). Larger messages may be negotiated via the 'maximum DHCP message size' option.
section: "2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
