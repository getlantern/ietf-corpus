document: rfc-2474
kind: normative-requirement
summary: When an IPsec tunnel egresses into a DS domain and the inner IP header has not been processed by a DS boundary node, the tunnel egress node MUST act as a DS boundary node and ensure the resulting traffic carries appropriate DS codepoints.
section: "7.2"
rfc2119_level: MUST
topics:
    - diffserv
    - security
    - ipsec
    - vpn
