document: rfc-9431
kind: wire-format
summary: For MQTT v3.1.1 token transport, the CONNECT User Name field MUST be prefixed with ASCII characters 'a','c','e' followed by the base64url-encoded (no padding) access token; the Password field MUST contain the MAC or signature for PoP over the TLS-exporter challenge.
section: "6.1"
topics:
    - tls
    - oauth
    - crypto
