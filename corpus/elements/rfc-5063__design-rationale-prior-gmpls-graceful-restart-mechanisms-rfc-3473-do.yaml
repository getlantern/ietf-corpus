document: rfc-5063
kind: design-rationale
summary: Prior GMPLS Graceful Restart mechanisms (RFC 3473) do not support full recovery of Path state on ingress nodes, nor recovery of all RSVP objects (e.g., ERO, Protection, Admin Status, Session Attribute). The extensions in this document fill that gap by having the downstream neighbor return the last received Path message to the restarting node.
section: "1"
topics:
    - routing
    - mpls
