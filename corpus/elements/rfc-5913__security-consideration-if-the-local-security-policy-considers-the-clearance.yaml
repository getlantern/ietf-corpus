document: rfc-5913
kind: security-consideration
summary: If the local security policy considers the clearance held by a subject or those supported by a CA or AA to be sensitive, then the Clearance attribute or Authority Clearance Constraints should only be included if the subject's and Authority's certificates can be privacy protected. Distribution of trust anchors and associated Authority Clearance Constraints must also be privacy protected in this case.
section: "9"
topics:
    - pkix
    - security
    - privacy
