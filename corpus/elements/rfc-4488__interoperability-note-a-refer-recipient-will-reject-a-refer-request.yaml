document: rfc-4488
kind: interoperability-note
summary: 'A REFER-Recipient will reject a REFER request containing ''Require: norefersub'' with a 420 (Bad Extension) response unless it supports this extension. The ''Require: norefersub'' header can be present alongside ''Refer-Sub: false''.'
