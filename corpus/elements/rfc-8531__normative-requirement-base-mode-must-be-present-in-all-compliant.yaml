document: rfc-8531
kind: normative-requirement
summary: Base Mode MUST be present in all compliant devices as the default configuration enabling a zero-touch experience. The Maintenance Domain Name MUST be the character string 'GenericBaseMode', the Short MA Name format MUST be 2-octet integer (value 3 per IEEE 802.1Q), and the Short MA name MUST be set to 65532 (0xFFFC).
section: "6"
rfc2119_level: MUST
topics:
    - yang
    - netconf
