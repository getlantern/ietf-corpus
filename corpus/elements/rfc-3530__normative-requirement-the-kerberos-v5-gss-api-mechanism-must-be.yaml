document: rfc-3530
kind: normative-requirement
summary: 'The Kerberos V5 GSS-API mechanism MUST be implemented and provide security triples: krb5 (rpc_gss_svc_none), krb5i (rpc_gss_svc_integrity), and krb5p (rpc_gss_svc_privacy), all using OID 1.2.840.113554.1.2.2 with DES MAC MD5 for integrity and 56-bit DES for privacy.'
section: 3.2.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
