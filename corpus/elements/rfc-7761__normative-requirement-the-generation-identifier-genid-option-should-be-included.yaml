document: rfc-7761
kind: normative-requirement
summary: The Generation Identifier (GenID) option SHOULD be included in all Hello messages. When a Hello with a new GenID is received from a neighbor, any old Hello information about that neighbor SHOULD be discarded and superseded by the new Hello information, potentially triggering a new DR election.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
