document: rfc-1220
kind: wire-format
summary: The Line Identification Option (type=2, length=4 octets) has the same encoding as the Remote Ring Identification Option but represents the serial line itself as a virtual Token Ring; both peers must configure identical ring numbers for normal Source Routing operation.
