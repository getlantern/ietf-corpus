document: rfc-3895
kind: design-rationale
summary: dsx1LoopbackConfig represents the desired loopback state (manager-controlled) while dsx1LoopbackStatus reflects the actual state including far-end-initiated loopbacks. This separation allows a management entity to distinguish manager-requested versus remotely-imposed loopback conditions.
section: 2.2.5
