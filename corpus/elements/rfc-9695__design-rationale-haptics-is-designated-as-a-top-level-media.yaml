document: rfc-9695
kind: design-rationale
summary: Haptics is designated as a top-level media type (analogous to 'audio' for hearing and 'video' for sight) because touch is an equally important human sense, haptic files can exist entirely independently of audio or video content, and 'application' implies executable code which carries inappropriate security connotations.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
