document: rfc-6332
kind: normative-requirement
summary: To indicate use of a private extension, the RTP receiver MUST set the Status field to zero. A private extension MUST NOT be used in an XR unless the receiver knows via out-of-band methods that the recipient understands it.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
