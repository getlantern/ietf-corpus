document: rfc-9584
kind: normative-requirement
summary: When an offerer proposes an interleaved stream (sprop-max-don-diff > 0), it MUST include sprop-depack-buf-bytes in the offer. sprop-depack-buf-bytes MUST be greater than or equal to the actual maximum de-packetization buffer occupancy, and MUST be greater than 0 when sprop-max-don-diff is present and greater than 0.
section: 7.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
