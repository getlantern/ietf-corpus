document: rfc-7756
kind: interoperability-note
summary: When using a network-based ER with a shared IPv4 prefix (Appendix A.1), other SIIT-DC services assigned IPv4 Service Addresses within the same prefix become unreachable from behind the ER, because downstream nodes ARP for them on-link instead of routing through the ER. Operators must either avoid prefix overlap or use the unrouted private address approach in Appendix A.2.
section: A.1
topics:
    - ip
    - v6ops
    - nat
