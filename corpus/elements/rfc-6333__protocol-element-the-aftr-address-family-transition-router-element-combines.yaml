document: rfc-6333
kind: protocol-element
summary: The AFTR (Address Family Transition Router) element combines an IPv4-in-IPv6 tunnel endpoint with an IPv4-IPv4 NAT on the same node. It terminates softwire tunnels from B4 elements and performs carrier-grade NAT to share a pool of public IPv4 addresses among customers.
section: "6.1"
topics:
