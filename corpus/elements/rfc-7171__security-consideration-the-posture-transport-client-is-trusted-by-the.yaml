document: rfc-7171
kind: security-consideration
summary: The Posture Transport Client is trusted by the Posture Broker Client not to observe, fabricate, or alter PB-TNC batches in either direction, to apply configured security protections, and to expose the authenticated identity of the Posture Transport Server. Since the Posture Transport Server cannot validate the trustworthiness of the PT Client, it must protect itself appropriately.
section: 4.1.1
topics:
    - security
