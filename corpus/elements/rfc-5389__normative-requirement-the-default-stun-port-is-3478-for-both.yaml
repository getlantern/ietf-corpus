document: rfc-5389
kind: normative-requirement
summary: The default STUN port is 3478 for both UDP and TCP; the default TLS port is 5349. DNS SRV service names are 'stun' (plain) and 'stuns' (TLS). The port in DNS MUST reflect the port on which the server is actually listening; administrators SHOULD publish SRV records.
section: "9"
rfc2119_level: MUST
topics:
    - nat
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
