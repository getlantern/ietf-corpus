document: rfc-2730
kind: normative-requirement
summary: If a MADCAP server detects clock skew greater than [CLOCK-SKEW-ALLOWANCE] (recommended default 30 minutes), it MUST return an Excessive Clock Skew error. Servers MUST make EXTRA-ALLOCATION-TIME (recommended default 1 hour) and CLOCK-SKEW-ALLOWANCE configurable parameters.
section: "2.12"
rfc2119_level: MUST
topics:
    - multicast
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
