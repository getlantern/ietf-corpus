document: rfc-5150
kind: normative-requirement
summary: When a PathTear arrives at the GMPLS stitching node for e2e LSP teardown, the PathTear MUST be IP routed to the LSP segment egress node with the destination IP address set to the address of the S-LSP end node. Router Alert MUST be off and RSVP TTL check MUST be disabled on the receiving node.
section: 5.1.5
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
