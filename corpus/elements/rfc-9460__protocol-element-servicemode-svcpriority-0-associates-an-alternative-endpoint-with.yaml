document: rfc-9460
kind: protocol-element
summary: ServiceMode (SvcPriority>0) associates an alternative endpoint with its connection parameters via SvcParams. Clients MUST ignore unrecognized SvcParamKeys unless the 'mandatory' key requires them; an RR whose recognized SvcParams are not self-consistent MUST be rejected.
section: 2.4.3
