document: rfc-5476
kind: normative-requirement
summary: Each separate logical instance of a Selector used across multiple Selection Sequences MUST maintain its own individual Selection State and statistics. The Selection Sequence Statistics Report Interpretation MUST be exported periodically and MUST include packetsObserved and packetsSelected for each Primitive Selector in sequence order.
section: 6.5.3
rfc2119_level: MUST
topics:
    - measurement
