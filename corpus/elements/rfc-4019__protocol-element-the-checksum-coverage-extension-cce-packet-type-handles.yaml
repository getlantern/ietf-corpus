document: rfc-4019
kind: protocol-element
summary: 'The Checksum Coverage Extension (CCE) packet type handles changes in checksum coverage compression state. Three variants exist: CCE() (mode-agnostic, no context update beyond inner packet), CCE(ON) (sets CFP nonzero, turns on presence of Checksum Coverage field), and CCE(OFF) (sets CFP to zero, turns off coverage field and updates CFI and stored coverage).'
section: 5.3.2
topics:
    - udp
