document: rfc-8163
kind: protocol-element
summary: A MAC-address-derived IID is formed by concatenating the node's 8-bit MS/TP MAC address to the seven octets 0x00, 0x00, 0x00, 0xFF, 0xFE, 0x00, and 0x00, following the Modified EUI-64 format (RFC 4291 Appendix A, updated by RFC 7136). This type is RECOMMENDED for link-local addresses because it enables the most efficient LOWPAN_IPHC compression.
section: "6"
