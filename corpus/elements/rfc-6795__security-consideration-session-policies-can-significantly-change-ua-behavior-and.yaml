document: rfc-6795
kind: security-consideration
summary: Session policies can significantly change UA behavior and may be exploited by attackers to compromise a UA — for example, by setting available bandwidth to zero to force session termination or by injecting malicious policy decisions. Policy servers SHOULD be addressable only through SIPS URIs, and both policy server and UA MUST support TLS.
section: "4"
topics:
    - sip
    - security
    - tls
