document: rfc-2590
kind: security-consideration
summary: To avoid IPsec Authentication Header verification failure, the Frame Relay-specific preprocessing of a received ND Solicitation message that contains a DLCI format Source Link-layer Address option MUST be performed only after IPsec processing is complete.
