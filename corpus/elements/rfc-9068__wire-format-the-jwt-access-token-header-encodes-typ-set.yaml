document: rfc-9068
kind: wire-format
summary: 'The JWT access token header encodes ''typ'' (set to ''at+JWT''), ''alg'' (signing algorithm, e.g., ''RS256''), and ''kid'' (key ID). Claims are encoded as base64url-separated-by-period JSON, as shown in the example: {"typ":"at+JWT","alg":"RS256","kid":"RjEwOwOA"}.'
