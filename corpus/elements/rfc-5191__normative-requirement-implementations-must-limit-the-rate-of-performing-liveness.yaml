document: rfc-5191
kind: normative-requirement
summary: Implementations MUST limit the rate of performing liveness tests (ping). There is no protocol-level negotiation of ping timers; rate limiting is handled locally by each peer independently.
section: "4.2"
rfc2119_level: MUST
topics:
