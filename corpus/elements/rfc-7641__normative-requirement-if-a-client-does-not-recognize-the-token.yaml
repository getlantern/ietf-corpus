document: rfc-7641
kind: normative-requirement
summary: If a client does not recognize the token in a confirmable notification, it MUST NOT acknowledge the message and SHOULD reject it with a Reset message. If the token is recognized, the client MUST acknowledge the message as usual.
section: "3.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
