summary: 'Two new ISAKMP encapsulation modes are defined for Quick Mode NAT-T negotiation: UDP-Encapsulated-Tunnel (value 3) and UDP-Encapsulated-Transport (value 4). The final decision to use NAT-Traversal is made in Quick Mode via the SA payload.'
