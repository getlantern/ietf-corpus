document: rfc-8415
kind: normative-requirement
summary: A client MUST include a Client Identifier option (carrying its DUID) in all messages. A client MUST NOT include a Server Identifier option when sending Solicit, Confirm, Rebind, or Information-request messages sent to the multicast address.
section: "16"
rfc2119_level: MUST
topics:
    - ip
