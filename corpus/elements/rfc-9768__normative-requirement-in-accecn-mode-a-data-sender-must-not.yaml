document: rfc-9768
kind: normative-requirement
summary: In AccECN mode, a Data Sender MUST NOT set CWR to indicate that it has received and responded to congestion indications, unlike an RFC 3168 sender. The continuously repeated counter approach replaces the CWR mechanism.
section: 3.1.5
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
    - ecn
