document: rfc-2531
kind: interoperability-note
summary: For color-levels matching, it is recommended that a recipient declares the number of color values it can handle as an inequality (<=) and a data resource declares the number it uses as an equality, so that feature matching can succeed when actual document color count does not exactly equal receiver capacity.
section: A.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
