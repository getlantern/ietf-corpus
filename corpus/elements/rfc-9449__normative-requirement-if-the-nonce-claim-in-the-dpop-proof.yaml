document: rfc-9449
kind: normative-requirement
summary: If the nonce claim in the DPoP proof does not exactly match a nonce recently supplied by the authorization server, the authorization server MUST reject the request. A server MUST NOT accept DPoP proofs without the nonce claim when a DPoP nonce has been provided to the client.
section: "8"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
