document: rfc-6225
kind: wire-format
summary: 'DHCPv4 GeoLoc Option (code 144) is 16 octets: 8-bit code, 8-bit length, 6-bit LatUnc, 34-bit Latitude, 6-bit LongUnc, 34-bit Longitude, 4-bit AType, 6-bit AltUnc, 30-bit Altitude, 2-bit Ver, 3-bit Res, 3-bit Datum. Mirrors the DHCPv6 GeoLoc Option format.'
