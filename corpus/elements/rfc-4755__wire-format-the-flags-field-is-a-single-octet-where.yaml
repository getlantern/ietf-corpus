document: rfc-4755
kind: wire-format
summary: 'The Flags field is a single octet where bit 0 indicates RC support and bit 1 indicates UC support; all other bits are reserved and MUST be set to 0 on transmit and ignored on receive. Format: +RC|UC|0|0|0|0|0|0+.'
section: "3.1"
