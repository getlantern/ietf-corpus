document: rfc-5302
kind: normative-requirement
summary: It is RECOMMENDED that the default configuration of L1L2 routers not advertise any L2 routes into L1. Implementations SHOULD force the network administrator to manually configure L1L2 routers to advertise any L2 routes into L1.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
