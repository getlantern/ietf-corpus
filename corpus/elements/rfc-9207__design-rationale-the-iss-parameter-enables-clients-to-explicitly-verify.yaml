document: rfc-9207
kind: design-rationale
summary: The `iss` parameter enables clients to explicitly verify the identity of the authorization server that issued a response, countering mix-up attacks where an attacker-controlled authorization server tricks the client into sending credentials to the wrong party. Its effectiveness was formally proven in Fett et al. [arXiv.1601.01229].
section: "1"
topics:
