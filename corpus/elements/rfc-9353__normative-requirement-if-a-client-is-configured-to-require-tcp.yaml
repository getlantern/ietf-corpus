document: rfc-9353
kind: normative-requirement
summary: If a client is configured to require TCP-AO support, it MUST verify the TCP-AO flag bit in the PCE-CAP-FLAGS sub-TLV is set before opening a connection. Similarly, if TLS is required, the client MUST verify the PCEP over TLS support flag bit is set.
section: "3.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
