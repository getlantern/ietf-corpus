document: rfc-9351
kind: protocol-element
summary: The Flexible Algorithm Unsupported sub-TLV (Type 1046) signals that the originating BGP-LS node encountered one or more FAD sub-TLVs in the IGP advertisement that it does not support. It carries a Protocol-ID octet and zero or more unsupported sub-TLV type codes.
