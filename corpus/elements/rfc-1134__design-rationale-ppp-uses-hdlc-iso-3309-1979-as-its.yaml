document: rfc-1134
kind: design-rationale
summary: PPP uses HDLC (ISO 3309-1979) as its framing basis, extended by ISO 3309:1984/PDAD1 to support asynchronous (start/stop) environments. This choice leverages widely standardized procedures and makes PPP consistent with CCITT X.25 LAPB, facilitating implementation on existing hardware.
section: "3"
