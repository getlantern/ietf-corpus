document: rfc-3388
kind: security-consideration
summary: An attacker who can modify session descriptions exchanged between participants could use FID semantics to force participants to send media copies to an arbitrary destination. Integrity mechanisms provided by the session description transport protocol and media encryption should be used to prevent this attack.
section: "9"
topics:
    - security
    - realtime
