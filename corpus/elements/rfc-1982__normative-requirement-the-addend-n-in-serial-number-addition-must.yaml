document: rfc-1982
kind: normative-requirement
summary: The addend n in serial number addition MUST be within [0 .. 2^(SERIAL_BITS-1) - 1]. Addition of a value outside this range is undefined and implementations must not rely on any particular outcome.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
