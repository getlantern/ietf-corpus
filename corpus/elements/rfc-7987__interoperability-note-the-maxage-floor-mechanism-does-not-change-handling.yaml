document: rfc-7987
kind: interoperability-note
summary: The MaxAge floor mechanism does not change handling of received purged LSPs (zero Remaining Lifetime). A purged LSP is still considered newer than a matching LSP with non-zero Remaining Lifetime per ISO10589 Section 7.3.15.1.b, ensuring LSPDB consistency across routers in the network is preserved.
section: "2"
topics:
