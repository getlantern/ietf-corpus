document: rfc-3648
kind: security-consideration
summary: Sites whose URIs appear in DAV:ordering-type properties of widely-deployed collections may be at risk of denial-of-service attacks due to clients fetching those URIs to read ordering semantics. The risk is mitigated if clients use hard-coded values for common ordering semantics and follow the recommendation not to access the ordering-type URI.
section: "11.1"
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
