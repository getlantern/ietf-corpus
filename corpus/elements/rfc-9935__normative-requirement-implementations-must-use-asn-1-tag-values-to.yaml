document: rfc-9935
kind: normative-requirement
summary: 'Implementations MUST use ASN.1 tag values to parse the private key CHOICE: context-specific [0] (raw value 0x80) for seed, OCTET STRING (0x04) for expandedKey, and SEQUENCE (0x30) for both. Heuristics such as length of the enclosing OCTET STRING MUST NOT be used.'
section: "6"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
