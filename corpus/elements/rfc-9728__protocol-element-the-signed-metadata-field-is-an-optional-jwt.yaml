document: rfc-9728
kind: protocol-element
summary: The signed_metadata field is an OPTIONAL JWT included in the protected resource metadata JSON object, asserting metadata values about the protected resource as claims. The signed_metadata parameter SHOULD NOT itself appear as a claim within the JWT.
section: "2.2"
