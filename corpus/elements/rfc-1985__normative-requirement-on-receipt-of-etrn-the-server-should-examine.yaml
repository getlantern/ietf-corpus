document: rfc-1985
kind: normative-requirement
summary: On receipt of ETRN, the server should examine the node name and make a local decision whether to honour the request; if not, it should return the appropriate error code. If honoured, the server should force its retry queues to start sending messages to the remote site via a new SMTP connection.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
