summary: 'The MAP-E MIB module (MAP-E-MIB) is assigned OID { mib-2 242 } and defines managed objects for monitoring MAP-E Border Relays (BRs) and Customer Edges (CEs). It contains two main subtrees: mapRule for managing mapping rules and mapSecurityCheck for security check statistics.'
