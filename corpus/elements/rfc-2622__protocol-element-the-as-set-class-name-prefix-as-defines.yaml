document: rfc-2622
kind: protocol-element
summary: 'The as-set class (name prefix ''as-'') defines named sets of AS numbers. Members can be listed directly via the members attribute (AS numbers or other as-set names), or indirectly via mbrs-by-ref: aut-num objects maintained by listed maintainers whose member-of attribute references the set are automatically included.'
section: "5.1"
topics:
