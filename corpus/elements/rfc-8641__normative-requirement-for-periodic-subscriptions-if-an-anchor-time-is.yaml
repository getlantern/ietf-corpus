document: rfc-8641
kind: normative-requirement
summary: For periodic subscriptions, if an anchor-time is not provided, the anchor-time MUST be set to the creation time of the initial update record. Subsequent update intervals are calculated as multiples of the period from this anchor-time.
section: "4.2"
rfc2119_level: MUST
topics:
