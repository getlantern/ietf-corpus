document: rfc-9072
kind: normative-requirement
summary: Type code 255 is not a bona fide Optional Parameter type code and MUST NOT be used other than as the Non-Ext OP Type signal. If encountered in any other position, it MUST be treated as an unrecognized Optional Parameter and handled per RFC 4271 Section 6.2.
section: "3"
rfc2119_level: MUST NOT
topics:
