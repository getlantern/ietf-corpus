document: rfc-7233
kind: interoperability-note
summary: Some implementations were coded to an early draft of the byteranges specification that used the media type multipart/x-byteranges, which is almost but not quite compatible with the standardized multipart/byteranges type. Additionally, some implementations handle a quoted boundary string incorrectly.
