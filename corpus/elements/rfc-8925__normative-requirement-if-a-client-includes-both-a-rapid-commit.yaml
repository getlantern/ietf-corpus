document: rfc-8925
kind: normative-requirement
summary: If a client includes both a Rapid Commit option (RFC 4039) and an IPv6-Only Preferred option in DHCPDISCOVER, the server SHOULD NOT honor the Rapid Commit option if its response would contain the IPv6-Only Preferred option; it SHOULD respond with a DHCPOFFER instead.
section: "3.3"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
