document: rfc-4501
kind: security-consideration
summary: DNS URIs referencing the public Internet DNS expose both the URI and the referenced data as public information. For security-sensitive data (e.g., certificates stored in DNS), implementations may need to employ Secure DNS (DNSSEC), CMS, or OpenPGP to protect data during transport.
section: "6"
topics:
    - dns
    - security
