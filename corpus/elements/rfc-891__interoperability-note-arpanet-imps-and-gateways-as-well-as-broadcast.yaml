document: rfc-891
kind: interoperability-note
summary: 'ARPANET IMPs and gateways, as well as broadcast nets, may forward a HELLO message back to its originator unchanged. The DCN HELLO process detects this loop condition (PKT.SOURCE equals LOCAL-ADDRESS) and handles it specially: on broadcast links it is allowed and roundtrip delay is set to zero; on point-to-point links it is treated as an error. This allows monitoring connectivity through foreign systems.'
section: "2.2"
topics:
    - ip
    - routing
