document: rfc-4619
kind: normative-requirement
summary: QoS information SHOULD be represented in the EXP field of the PW MPLS label. If more than one MPLS label is imposed by the ingress LSR, the EXP field of labels higher in the stack SHOULD also carry the same value.
section: "7.7"
rfc2119_level: SHOULD
