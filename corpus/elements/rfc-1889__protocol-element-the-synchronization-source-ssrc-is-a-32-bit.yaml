document: rfc-1889
kind: protocol-element
summary: The synchronization source (SSRC) is a 32-bit randomly chosen identifier unique within an RTP session that labels a stream of RTP packets sharing a single timing and sequence number space. A participant generating multiple streams in one session must identify each as a different SSRC.
