document: rfc-9661
kind: protocol-element
summary: SieveScript/validate allows clients to verify Sieve script validity without storing it. It takes 'accountId' and 'blobId' arguments, and returns 'accountId' and 'error' (an 'invalidSieve' SetError or null). It is equivalent to ManageSieve's CHECKSCRIPT command.
section: "2.6"
topics:
