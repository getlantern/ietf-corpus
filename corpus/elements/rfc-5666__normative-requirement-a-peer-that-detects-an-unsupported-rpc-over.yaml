document: rfc-5666
kind: normative-requirement
summary: A peer that detects an unsupported RPC-over-RDMA header version MUST reply with ERR_VERS, providing the low and high inclusive version numbers it supports. When other chunk or header decoding errors are detected, ERR_CHUNK MUST be returned.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
