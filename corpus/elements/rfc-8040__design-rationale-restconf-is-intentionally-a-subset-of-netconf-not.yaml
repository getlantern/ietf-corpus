document: rfc-8040
kind: design-rationale
summary: RESTCONF is intentionally a subset of NETCONF, not a replacement. It eliminates explicit locking and multi-datastore management (candidate, startup) to achieve RESTful simplicity, while remaining compatible with NETCONF's datastore model and access control (NACM).
section: "1.2"
topics:
