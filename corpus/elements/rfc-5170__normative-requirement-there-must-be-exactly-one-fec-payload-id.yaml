document: rfc-5170
kind: normative-requirement
summary: There MUST be exactly one FEC Payload ID per packet. In the case of an Encoding Symbol Group where multiple encoding symbols are sent in the same packet, the FEC Payload ID refers to the first symbol; other symbols are derived using the dedicated function in Section 5.6.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
