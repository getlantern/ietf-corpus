document: rfc-8285
kind: normative-requirement
summary: Local identifiers MUST be unique in an RTP session, and the same identifier MUST be used for the same offered extension in the answer. Identifier values in the valid range MUST NOT be altered (remapped) during session updates.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
