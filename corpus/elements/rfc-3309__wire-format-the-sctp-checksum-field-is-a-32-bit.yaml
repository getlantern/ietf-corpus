document: rfc-3309
kind: wire-format
summary: The SCTP Checksum field is a 32-bit field in the SCTP common header. On transmission it is set to 0 before CRC-32c calculation, then replaced with the computed CRC value. On reception, the field is zeroed before verification recalculation.
section: "2.1"
topics:
    - sctp
