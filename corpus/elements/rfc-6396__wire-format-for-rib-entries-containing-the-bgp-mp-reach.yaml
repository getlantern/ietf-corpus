document: rfc-6396
kind: wire-format
summary: For RIB Entries containing the BGP MP_REACH_NLRI attribute (Type Code 14), only the Next Hop Address Length and Next Hop Address fields are included; the AFI, SAFI, NLRI, and Reserved fields are omitted since they are already encoded in the RIB Entry Header. The attribute length is adjusted accordingly.
section: 4.3.4
topics:
