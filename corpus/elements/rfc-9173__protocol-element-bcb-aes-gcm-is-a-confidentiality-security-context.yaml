document: rfc-9173
kind: protocol-element
summary: BCB-AES-GCM is a confidentiality security context that replaces the block-type-specific data field of its security target with AES-GCM ciphertext. It also generates an authentication tag over the plaintext and optional additional authenticated data (AAD). The security context identifier is assigned value 2.
section: "4.1"
