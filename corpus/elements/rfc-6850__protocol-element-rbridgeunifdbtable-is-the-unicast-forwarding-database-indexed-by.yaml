summary: rbridgeUniFdbTable is the unicast forwarding database, indexed by FDB-ID and MAC address, providing egress RBridge nickname, confidence level (0..255), and entry status (other, invalid, learned, self, mgmt, esadi). It extends BRIDGE-MIB and Q-BRIDGE-MIB FDB tables with TRILL-specific fields.
