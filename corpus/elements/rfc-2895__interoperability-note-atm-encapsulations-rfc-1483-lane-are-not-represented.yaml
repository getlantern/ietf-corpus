document: rfc-2895
kind: interoperability-note
summary: ATM encapsulations (RFC 1483, LANE) are not represented by explicit PI macros; a probe must map ATM traffic to one of the existing base layers (llc, snap, or vsnap) regardless of how the raw data was obtained (VC-muxing vs. LLC-muxing, routed vs. bridged).
section: 2.4.2
topics:
    - snmp
    - measurement
