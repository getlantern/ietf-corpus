document: rfc-8338
kind: normative-requirement
summary: The capability of supporting P2MP PWs MUST be advertised to all LDP peers using the P2MP PW Capability TLV; if the peer does not support dynamic capability advertisement, the TLV MUST be included in the LDP Initialization message.
