document: rfc-3190
kind: interoperability-note
summary: DV audio stream sample packing into native DV blocks differs from the RTP interleaved channel ordering. Applications must explicitly reshuffle samples; alternatively, native DV audio/video bundled streams may use the payload format defined in RFC 3189 instead.
