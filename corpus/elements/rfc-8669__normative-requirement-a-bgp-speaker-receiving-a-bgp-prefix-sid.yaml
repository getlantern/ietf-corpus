document: rfc-8669
kind: normative-requirement
summary: A BGP speaker receiving a BGP Prefix-SID attribute from an EBGP neighbor outside the SR domain MUST discard the attribute unless explicitly configured to accept it. An error SHOULD be logged when discarding.
section: "4"
rfc2119_level: MUST
topics:
