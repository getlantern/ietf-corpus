document: rfc-951
kind: security-consideration
summary: RFC 951 contains no dedicated Security Considerations section. The vend field is suggested as an optional authentication mechanism — 'a workstation client could provide an authentication key and receive from the server a capability for remote file access' — but no cryptographic mechanism is specified. The protocol relies entirely on network-level trust and offers no protection against spoofed bootreply packets.
section: "7.3"
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
