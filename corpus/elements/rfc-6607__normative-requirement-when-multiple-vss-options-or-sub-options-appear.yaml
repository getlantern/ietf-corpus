document: rfc-6607
kind: normative-requirement
summary: When multiple VSS options or sub-options appear in a packet, all existing VSS options or sub-options MUST be replicated in the appropriate places in the response and MUST contain only the VSS information actually used by the server to allocate the IP address (excepting VSS-Control sub-options).
section: "7.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
