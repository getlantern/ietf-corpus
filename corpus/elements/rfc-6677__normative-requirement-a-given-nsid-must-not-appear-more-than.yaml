document: rfc-6677
kind: normative-requirement
summary: A given NSID MUST NOT appear more than once in a channel-binding data or channel-binding response; all NS-Specific data for a particular NSID must be consolidated into one set of (NSID, Length, NS-Specific) fields.
section: "5.3"
rfc2119_level: MUST NOT
