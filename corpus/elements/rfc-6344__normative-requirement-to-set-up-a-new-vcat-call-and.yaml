document: rfc-6344
kind: normative-requirement
summary: To set up a new VCAT call and VCG simultaneously, a CALL_ATTRIBUTES object containing the VCAT TLV MUST be included in the Notify message with the Action field set to 1. LSPs MUST then be added until the member count reaches the value specified in the TLV.
section: 5.3.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
