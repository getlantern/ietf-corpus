document: rfc-7865
kind: protocol-element
summary: The Participant-Stream Association class ('participantstreamassoc' element) describes a participant's association to a media stream as sender, receiver, or both. Attributes include associate-time, disassociate-time, send (points to stream unique_id), recv (points to stream unique_id), and participant_id. Absence of send/recv elements means the participant is neither sending nor receiving.
section: "6.8"
topics:
