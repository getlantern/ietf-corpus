document: rfc-7981
kind: normative-requirement
summary: If leaking of the IS-IS Router CAPABILITY TLV is required, the entire CAPABILITY TLV MUST be leaked into another level without change, except for changes to TLV flags as defined in Section 2, even if it contains sub-TLVs unsupported by the leaking router.
section: "4"
rfc2119_level: MUST
topics:
    - routing
