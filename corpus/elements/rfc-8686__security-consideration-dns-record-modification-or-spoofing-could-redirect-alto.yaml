document: rfc-8686
kind: security-consideration
summary: DNS record modification or spoofing could redirect ALTO clients to a wrong ALTO server, which may provide suboptimal or forged guidance, affect traffic distribution, or threaten user privacy. DNSSEC must be supported by all implementations and should be deployed by network operators to mitigate this threat.
section: "6.1"
topics:
    - dns
    - security
    - crypto
