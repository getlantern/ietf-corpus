document: rfc-5993
kind: protocol-element
summary: An optional GSM-HR-specific redundancy scheme aggregates previously transmitted frames with new ones using a sliding window. Multiple RTP packets may cover overlapping time intervals; the receiver uses timestamps to identify and apply redundant copies.
section: "4.1"
