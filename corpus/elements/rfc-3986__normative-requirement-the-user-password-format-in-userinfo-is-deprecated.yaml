document: rfc-3986
kind: normative-requirement
summary: The "user:password" format in userinfo is deprecated. Applications SHOULD NOT render as clear text any data after the first ":" in a userinfo subcomponent and SHOULD reject storage of such data in unencrypted form.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - security
