document: rfc-5798
kind: protocol-element
summary: The Priority field (8-bit unsigned integer) specifies the VRRP router's election priority. Value 255 is reserved for the IPvX address owner; values 1–254 are for Backup routers (default 100); value 0 signals that the current Master is releasing responsibility, triggering rapid Backup-to-Master transition.
section: 5.2.4
topics:
    - routing
