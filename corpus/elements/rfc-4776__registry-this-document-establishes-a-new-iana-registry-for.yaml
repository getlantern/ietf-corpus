document: rfc-4776
kind: registry
summary: This document establishes a new IANA registry for CAtypes (civic address component type identifiers), operating under 'Expert Review' and 'Specification Required' rules per RFC 2434. Each registration requires a numeric identifier, brief description, stable specification reference, and any country-specific considerations.
