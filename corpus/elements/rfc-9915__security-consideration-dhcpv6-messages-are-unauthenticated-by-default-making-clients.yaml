document: rfc-9915
kind: security-consideration
summary: DHCPv6 messages are unauthenticated by default, making clients and servers vulnerable to rogue servers, rogue relay agents, and denial-of-service attacks. The Reconfiguration Key Authentication Protocol (RKAP) provides authentication for Reconfigure messages; use of IPsec or other security mechanisms between relay agents and servers is recommended.
section: "22"
topics:
