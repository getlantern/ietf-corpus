document: rfc-5710
kind: normative-requirement
summary: Before initiating a reroute request, the requesting node MUST check that the Explicit Route Object (ERO) in the LSP's incoming Path message does not preclude LSP rerouting. The actual repair action SHOULD be performed only after verification that local policy allows local repair.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
