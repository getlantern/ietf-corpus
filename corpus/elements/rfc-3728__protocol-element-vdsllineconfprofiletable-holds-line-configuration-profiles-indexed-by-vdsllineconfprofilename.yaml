document: rfc-3728
kind: protocol-element
summary: vdslLineConfProfileTable holds line configuration profiles indexed by vdslLineConfProfileName (SnmpAdminString, 1–32 octets). Profile parameters include downstream/upstream rate mode, max power, SNR margins (target/min/max), data rates for fast and slow channels, interleave delay, PBO control, deployment scenario, band plan, PSD templates, HAM band mask, and custom notch filters.
