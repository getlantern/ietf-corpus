document: rfc-6076
kind: normative-requirement
summary: When the originating UA or proxy is forking messages, it MUST parse the message exchanges necessary for metric input. It MAY utilize the first INVITE sent and the first accepted 200 OK, using dialog tags to distinguish between dialogs. Each element responsible for forking MUST be considered.
section: "5.4"
rfc2119_level: MUST
topics:
    - realtime
    - voip
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
