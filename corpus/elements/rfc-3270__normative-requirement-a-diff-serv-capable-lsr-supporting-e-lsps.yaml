document: rfc-3270
kind: normative-requirement
summary: A Diff-Serv capable LSR supporting E-LSPs with signaled EXP↔PHB mappings MUST support the RSVP DIFFSERV Object. A Diff-Serv capable LSR supporting L-LSPs MUST support the DIFFSERV Object. LSRs supporting only preconfigured-mapping E-LSPs MAY support the DIFFSERV Object.
section: "5.1"
rfc2119_level: MUST
topics:
