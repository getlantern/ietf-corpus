summary: 'The MAC Type field in the Bridged LAN Traffic header identifies the frame type and address bit ordering: values 1–4 cover IEEE 802.3/Ethernet (canonical), 802.4, 802.5 (non-canonical), and FDDI (non-canonical); values 11–12 are canonical variants of 802.5 and FDDI.'
