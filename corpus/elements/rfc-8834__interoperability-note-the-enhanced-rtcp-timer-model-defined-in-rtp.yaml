document: rfc-8834
kind: interoperability-note
summary: The enhanced RTCP timer model defined in RTP/AVPF is backwards compatible with legacy RTP/AVP or RTP/SAVP systems if the 'trr-int' parameter is set to a value representing 4 seconds when interworking via a gateway (see RFC 8108 Section 7.1.3).
section: "4.2"
topics:
