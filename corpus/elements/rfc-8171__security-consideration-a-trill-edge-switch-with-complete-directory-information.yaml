document: rfc-8171
kind: security-consideration
summary: 'A TRILL edge switch with complete directory information can detect forged source MAC or IP addresses in native frames: if the source address does not match the directory''s mapping for the ingress port and Data Label, the frame can be discarded. Directory completeness is therefore a prerequisite for reliable source-address validation.'
section: "6.1"
topics:
    - security
    - routing
