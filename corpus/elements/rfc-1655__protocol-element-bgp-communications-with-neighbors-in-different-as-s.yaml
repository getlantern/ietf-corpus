document: rfc-1655
kind: protocol-element
summary: BGP communications with neighbors in different AS's are External BGP (eBGP); communications with neighbors in the same AS are Internal BGP (iBGP). All BGP speakers representing the same AS must give a consistent routing image to the outside.
section: "3.3"
topics:
    - bgp
    - routing
