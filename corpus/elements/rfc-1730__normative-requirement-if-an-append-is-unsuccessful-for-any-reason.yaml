document: rfc-1730
kind: normative-requirement
summary: If an APPEND is unsuccessful for any reason, the mailbox MUST be restored to its state before the attempt; no partial appending is permitted. If the destination mailbox does not exist, the server MUST return an error and MUST NOT automatically create it.
section: 6.3.10
rfc2119_level: MUST
topics:
    - email
