document: rfc-8466
kind: design-rationale
summary: The model makes extensive use of YANG features to allow modular implementations, so capabilities such as site diversity, QoS, cloud access, extranet VPN, LAG, BFD, and Carriers' Carrier can be supported optionally. New behaviors or service types are intended to be added via YANG augmentation.
