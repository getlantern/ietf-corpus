document: rfc-9744
kind: design-rationale
summary: 'VLAN-Signaled FXC enables automatic cross-checking of normalized VIDs: if the same normalized VID is configured on three PE devices for the same EVI, the PE detects this when it receives a second remote Ethernet A-D per-EVI route with a different ESI and generates an error. This cross-checking is not feasible in Default FXC mode because normalized VIDs are not signaled.'
section: "3.3"
topics:
    - vpn
    - bgp
    - routing
