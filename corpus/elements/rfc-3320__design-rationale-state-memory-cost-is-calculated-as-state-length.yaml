document: rfc-3320
kind: design-rationale
summary: State memory cost is calculated as (state_length + 64) bytes per item, where the 64-byte overhead accounts for the fixed-size metadata fields (state_identifier, state_length, state_address, state_instruction, minimum_access_length) stored alongside each state value.
