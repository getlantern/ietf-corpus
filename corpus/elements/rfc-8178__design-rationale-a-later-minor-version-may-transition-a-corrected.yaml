document: rfc-8178
kind: design-rationale
summary: 'A later minor version may transition a corrected REQUIRED feature through several stages: (1) change uncorrected from REQUIRED to OPTIONAL while requiring at least one version be supported; (2) change corrected from OPTIONAL to REQUIRED, making both REQUIRED; (3) change uncorrected from REQUIRED to OPTIONAL while corrected becomes REQUIRED; and ultimately (4) make the uncorrected version mandatory to not implement.'
section: "9.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
