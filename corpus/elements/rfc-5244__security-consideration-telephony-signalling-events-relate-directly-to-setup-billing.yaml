document: rfc-5244
kind: security-consideration
summary: Telephony signalling events relate directly to setup, billing, and takedown of calls, making them subject to confidentiality violations (monitoring of called/calling numbers), unauthorized call establishment, call hijacking via message insertion or man-in-the-middle, and denial of service via message insertion, modification, deletion, or delay.
