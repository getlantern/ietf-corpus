document: rfc-6054
kind: protocol-element
summary: Each IV for a group SA is formed by concatenating a Sender Identifier (SID) field with a Sender-Specific IV (SSIV) field. The leftmost bits of the IV hold the SID; the remaining bits hold the SSIV. This partitions the IV space among senders so that no two senders ever produce the same IV under a shared key.
section: "3"
