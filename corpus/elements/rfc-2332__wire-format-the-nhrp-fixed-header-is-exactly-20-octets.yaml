document: rfc-2332
kind: wire-format
summary: 'The NHRP Fixed Header is exactly 20 octets and contains: ar$afn (16-bit address family number), ar$pro.type (16-bit protocol type), ar$pro.snap (40-bit SNAP extension), ar$hopcnt (8-bit hop count), ar$pktsz (16-bit total packet length), ar$chksum (16-bit IP checksum over entire packet), ar$extoff (16-bit extension offset from start of packet), ar$op.version (8-bit), ar$op.type (8-bit), ar$shtl (8-bit source NBMA address type/length), ar$sstl (8-bit source NBMA subaddress type/length).'
section: "5.1"
topics:
    - ip
