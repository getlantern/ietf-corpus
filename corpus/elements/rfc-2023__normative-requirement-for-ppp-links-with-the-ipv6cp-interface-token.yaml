document: rfc-2023
kind: normative-requirement
summary: For PPP links with the IPV6CP Interface-Token option enabled, it is recommended that the DupAddrDetectTransmits autoconfiguration variable default to zero, because token uniqueness is guaranteed by the IPV6CP negotiation, making duplicate address detection redundant.
