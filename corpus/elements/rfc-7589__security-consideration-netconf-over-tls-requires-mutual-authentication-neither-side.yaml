document: rfc-7589
kind: security-consideration
summary: NETCONF over TLS requires mutual authentication; neither side should establish a connection with an unknown, unexpected, or incorrect identity. If a white-listed CA certificate is used for client acceptance, it should issue only certificates for NETCONF access, not general-purpose certificates.
section: "9"
topics:
    - tls
    - netconf
    - security
    - pkix
