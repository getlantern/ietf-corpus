document: rfc-9534
kind: design-rationale
summary: A LAG uses hash-based load balancing across member links, but link delay may vary between members due to different transport paths. To support low-latency traffic steering, per-member-link performance metrics are needed, motivating the micro-session approach.
section: "1"
topics:
