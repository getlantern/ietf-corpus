document: rfc-4524
kind: design-rationale
summary: The 'pilotObject' and 'pilotPerson' object classes from RFC 1274 were not brought forward because their functions are largely replaced by operational attributes in X.500(93) and LDAPv3 (e.g., creatorsName, modifyTimestamp replacing lastModifiedBy/lastModifiedTime) and by 'organizationalPerson' subclasses like 'inetOrgPerson'.
section: A.2
topics:
