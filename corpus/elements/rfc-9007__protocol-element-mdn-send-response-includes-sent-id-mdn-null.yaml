document: rfc-9007
kind: protocol-element
summary: MDN/send response includes sent (Id[MDN]|null) containing server-set properties omitted by the client, and notSent (Id[SetError]|null). Recognized SetError types include notFound, forbidden, forbiddenFrom, overQuota, tooLarge, rateLimit, invalidProperties, and the new mdnAlreadySent.
