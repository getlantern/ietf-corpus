document: rfc-5591
kind: protocol-element
summary: When snmpTsmConfigurationUsePrefix is true, securityNames are formatted as 'prefix:tmSecurityName', where the prefix is a 1–4 character US-ASCII alphanumeric transport domain identifier followed by a colon (0x3a). The tmSecurityName in the tmStateReference never contains a prefix.
section: 3.1.3
topics:
