document: rfc-8476
kind: protocol-element
summary: The Link MSD Sub-TLV carries the MSD of the interface associated with a specific link. For OSPFv2, it is an optional sub-TLV of the OSPFv2 Extended Link TLV (type 6); for OSPFv3, it is an optional sub-TLV of the E-Router-LSA TLV (type 9).
