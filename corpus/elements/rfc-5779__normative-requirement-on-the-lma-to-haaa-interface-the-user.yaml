document: rfc-5779
kind: normative-requirement
summary: On the LMA-to-HAAA interface, the User-Name AVP SHOULD contain the MN's identity, which is strongly RECOMMENDED to be the same as the MN's identity in the PBU MN-ID mobility option. If the MAG-to-HAAA and LMA-to-HAAA identities differ, the HAAA MUST have a mechanism to map between them.
section: 4.2.1
rfc2119_level: MUST
topics:
    - diameter
    - mobility
