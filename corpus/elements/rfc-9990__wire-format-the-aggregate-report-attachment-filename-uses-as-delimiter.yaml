document: rfc-9990
kind: wire-format
summary: 'The aggregate report attachment filename uses ''!'' as delimiter: receiver ''!'' policy-domain ''!'' begin-timestamp ''!'' end-timestamp [''!'' unique-id] ''.'' extension. Timestamps are Unix epoch seconds; extension is ''xml'' or ''xml.gz''. Example: ''mail.receiver.example!example.com!1013662812!1013749130.xml.gz''.'
