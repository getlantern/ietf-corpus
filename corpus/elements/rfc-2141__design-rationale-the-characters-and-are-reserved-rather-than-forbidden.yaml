document: rfc-2141
kind: design-rationale
summary: The characters `/`, `?`, and `#` are reserved rather than forbidden because RFC 1630 assigns them particular purposes in URIs; since the URN WG had not yet defined their semantics within URNs, they are held in reserve for future specification rather than being permitted or prohibited outright.
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
