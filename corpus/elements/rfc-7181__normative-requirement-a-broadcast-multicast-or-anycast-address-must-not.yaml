document: rfc-7181
kind: normative-requirement
summary: A broadcast, multicast, or anycast address MUST NOT be chosen as an originator address. If a routable address is selected, it MUST be one the router will accept as a destination.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
