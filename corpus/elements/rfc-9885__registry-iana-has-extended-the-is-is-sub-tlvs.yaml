summary: IANA has extended the 'IS-IS Sub-TLVs for TLVs Advertising Prefix Reachability' registry with an MP column. Sub-TLVs with MP=Y include 32-bit Administrative Tag (1), 64-bit Administrative Tag (2), SRv6 End SID (5), and BIER Info (32).
