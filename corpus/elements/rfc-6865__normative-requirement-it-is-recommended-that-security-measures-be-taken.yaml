document: rfc-6865
kind: normative-requirement
summary: It is RECOMMENDED that security measures be taken to guarantee FFCI integrity, protecting against attacks that modify the FEC Encoding ID, E, S flag, or m parameters. How to achieve this depends on the FFCI communication mechanism and is not specified in this document.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
