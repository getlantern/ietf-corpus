document: rfc-3880
kind: interoperability-note
summary: For SIP, the 'origin' address-switch field maps to the 'From' header, 'destination' maps to the 'Request-URI', and 'original-destination' maps to the 'To' header. The 'destination' field never has a 'display' subfield due to SIP syntax constraints.
