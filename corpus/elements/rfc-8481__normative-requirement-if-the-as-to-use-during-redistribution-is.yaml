document: rfc-8481
kind: normative-requirement
summary: If the AS to use during redistribution is ambiguous (e.g., due to confederation, AS migration, or multi-AS configuration), the router configuration MUST provide a means of specifying the AS to be used, either per redistribution or globally.
section: "4"
rfc2119_level: MUST
topics:
