summary: The ASN.1 module X509-SLH-DSA-Module-2025 imports Pure SLH-DSA public key and signature algorithm objects from RFC 9814 (SLH-DSA-Module-2024) and defines the 12 HashSLH-DSA public key identifiers, 12 HashSLH-DSA signature algorithm identifiers, and expanded SignatureAlgorithms and PublicKeyAlgorithms information object sets covering all 24 algorithm combinations.
