document: rfc-7711
kind: security-consideration
summary: The security of POSH depends on the POSH client correctly verifying the HTTPS server's identity at the source domain per RFC 2818 and following TLS best practices per RFC 7525. POSH can additionally benefit from HSTS (RFC 6797) and HTTP key pinning (RFC 7469) if the client shares a common HTTPS implementation.
section: "10"
topics:
