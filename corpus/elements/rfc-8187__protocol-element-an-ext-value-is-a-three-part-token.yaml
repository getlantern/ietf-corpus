document: rfc-8187
kind: protocol-element
summary: 'An ext-value is a three-part token: (1) REQUIRED charset name, (2) OPTIONAL BCP 47 language tag, and (3) the percent-encoded character sequence (value-chars), separated by single-quote characters. Both charset names and language tags are US-ASCII and matched case-insensitively.'
