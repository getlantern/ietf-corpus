document: rfc-8732
kind: interoperability-note
summary: This document updates RFC 4462 by adding new key exchange methods and deprecating the SHA-1-based methods (gss-group1-sha1-*, gss-group14-sha1-*, gss-gex-sha1-*). Implementations wishing to interoperate with legacy peers may still need to support the deprecated methods.
section: "6"
topics:
