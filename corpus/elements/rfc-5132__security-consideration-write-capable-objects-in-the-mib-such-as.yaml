document: rfc-5132
kind: security-consideration
summary: Write-capable objects in the MIB (such as ipMcastEnabled, interface TTL thresholds, rate limits, SSM range entries, scope boundaries, and scope names) can disrupt multicast service if manipulated by unauthorized parties. SNMPv3 with authentication and privacy (authPriv) is required to protect against unauthorized access.
section: "7"
topics:
    - security
    - snmp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
