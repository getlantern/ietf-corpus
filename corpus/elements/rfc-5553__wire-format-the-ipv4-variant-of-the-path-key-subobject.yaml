summary: 'The IPv4 variant of the Path Key Subobject (PKS) is 8 bytes total: 1-byte L+Type field, 1-byte Length (always 8), 2-byte Path Key, and 4-byte PCE-ID (IPv4 address). The subobject type is assigned by IANA as 64.'
