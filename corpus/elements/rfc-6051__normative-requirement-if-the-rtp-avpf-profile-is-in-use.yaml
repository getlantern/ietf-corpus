document: rfc-6051
kind: normative-requirement
summary: If the RTP/AVPF profile is in use, a receiver MAY send RTCP-SR-REQ to request rapid resynchronisation. A media source that understands RTCP-SR-REQ SHOULD generate an RTCP SR as soon as possible while complying with RTCP early feedback rules. The request MAY be repeated once per RTCP reporting interval if no SR is forthcoming.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
