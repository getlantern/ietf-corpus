document: rfc-4836
kind: normative-requirement
summary: When ifMauAutoNegAdminStatus transitions from enabled to disabled, the agent MUST ensure that the operational type of the MAU (ifMauType) correctly transitions to the value specified by ifMauDefaultType, rather than continuing at the value determined by the auto-negotiation function.
section: "4"
rfc2119_level: MUST
topics:
