document: rfc-6777
kind: protocol-element
summary: 'The ''error-free signal'' is a data-plane-specific indication of data path connectivity: for packet switching, reception of the first error-free packet; for SDH/SONET cross-connects, disappearance of alarms. Implementations must choose a signal appropriate to the technology being tested.'
section: "4"
topics:
