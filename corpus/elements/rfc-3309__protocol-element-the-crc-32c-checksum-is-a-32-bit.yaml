document: rfc-3309
kind: protocol-element
summary: The CRC-32c checksum is a 32-bit value placed in the Checksum field of the SCTP common header, computed over the entire SCTP packet. The Castagnoli polynomial 0x11EDC6F41 (CRC-32c) is used, replacing the previously specified Adler-32.
section: "2.1"
topics:
    - sctp
