document: rfc-2633
kind: security-consideration
summary: When signing then encrypting, the signatories are securely hidden by the envelope. When encrypting then signing, signatories are exposed but signatures can be verified without a private key; however, a careful attacker may alter unauthenticated portions of the encrypted message.
section: "3.5"
topics:
    - email
    - crypto
    - security
