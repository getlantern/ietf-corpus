document: rfc-8500
kind: protocol-element
summary: The U bit (0x02) in the Flags field specifies that the accumulated metric (reverse metric plus default metric) is limited to the maximum value of (2^24 - 1), marking the link as unreachable. This applies only in IS-IS wide metric mode.
