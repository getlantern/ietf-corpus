document: rfc-8400
kind: protocol-element
summary: The Egress Protection subobject is a PROTECTION object with a new C-Type (3), embedded as the second subobject in an SERO. It contains E-Flags indicating 'egress local protection' (bit 31) and 'S2L sub-LSP backup desired' (bit 30), plus optional primary egress and P2P LSP ID subobjects.
