document: rfc-5052
kind: normative-requirement
summary: Any complete multicast CDP MUST provide congestion control that conforms to RFC 2357, specifically Section 3.2. Congestion control MUST be provided by another building block when the FEC building block is used in a CDP, as the FEC building block itself provides no congestion control support.
section: "5"
rfc2119_level: MUST
topics:
    - multicast
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
