document: rfc-9618
kind: state-machine
summary: 'Step (d) of Section 6.1.3 processing: for each non-anyPolicy certificate policy P, find parent_nodes at depth i-1 whose expected_policy_set contains P-OID and create a single merged child node; if no match, fall back to anyPolicy parent if present. Step (d)(2) handles anyPolicy in the certificate policies extension. Step (d)(3) prunes nodes at depth i-1 or less that have no children by repeated deletion.'
section: "5.3"
