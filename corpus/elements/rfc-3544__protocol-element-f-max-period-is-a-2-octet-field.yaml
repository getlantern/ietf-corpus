document: rfc-3544
kind: protocol-element
summary: F_MAX_PERIOD is a 2-octet field specifying the maximum number of COMPRESSED_NON_TCP headers that may be sent between FULL_HEADER headers. Suggested value is 256; a value of zero means no limit.
