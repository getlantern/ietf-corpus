document: rfc-5092
kind: interoperability-note
summary: Synchronizing literals are not allowed in enc-search content; only quoted strings and non-synchronizing literals (LITERAL+, if the server supports it) are permitted, because synchronizing literals would require the URL-interpreting agent to handle command continuation request handling.
