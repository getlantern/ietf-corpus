summary: The basic approach builds on existing PW encapsulations for the DetNet service sub-layer and existing MPLS-TE encapsulations for the forwarding sub-layer. This reuse of established mechanisms is intentional, as edge node functions are described as 'functionally similar to PW T-PE nodes which use MPLS-TE LSPs.'
