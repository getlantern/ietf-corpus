document: rfc-5151
kind: normative-requirement
summary: A domain border node MUST NOT suppress the propagation of a PathErr message except to attempt crankback rerouting. If a subsequent rerouting attempt is successful, the held PathErr MUST be discarded; if all subsequent attempts are unsuccessful, the PathErr MUST be sent upstream toward the ingress.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
