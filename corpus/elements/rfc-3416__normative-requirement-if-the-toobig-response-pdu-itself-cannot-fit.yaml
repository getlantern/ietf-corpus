document: rfc-3416
kind: normative-requirement
summary: If the tooBig Response-PDU itself cannot fit within message size constraints, the snmpSilentDrops counter (RFC 3418) is incremented and the message is discarded. This applies to GetRequest, GetNextRequest, GetBulkRequest, SetRequest, and InformRequest processing.
section: 4.2.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
