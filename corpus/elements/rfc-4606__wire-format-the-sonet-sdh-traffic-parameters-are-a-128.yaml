document: rfc-4606
kind: wire-format
summary: 'The SONET/SDH traffic parameters are a 128-bit structure: Signal Type (8 bits), RCC/Requested Contiguous Concatenation (8 bits), NCC/Number of Contiguous Components (16 bits), NVC/Number of Virtual Components (16 bits), Multiplier/MT (16 bits), Transparency/T (32 bits), and Profile/P (32 bits). This format is carried in RSVP-TE SENDER_TSPEC/FLOWSPEC objects or the CR-LDP SONET/SDH Traffic Parameters TLV.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
