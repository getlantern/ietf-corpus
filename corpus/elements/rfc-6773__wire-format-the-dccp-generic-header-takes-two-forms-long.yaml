document: rfc-6773
kind: wire-format
summary: 'The DCCP Generic Header takes two forms: long sequence numbers (48-bit sequence number, 16 bytes total) with X=1, and short sequence numbers (24-bit sequence number, 12 bytes total) with X=0. Both include Source Port, Dest Port, Data Offset, CCVal, CsCov, and Checksum fields as defined in RFC 4340.'
section: "3.2"
topics:
