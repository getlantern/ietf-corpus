document: rfc-9868
kind: protocol-element
summary: The UDP surplus area is the region of the IP transport payload that follows the end of the UDP user data, created when the UDP Length field indicates a smaller payload than the IP header implies. This document repurposes the surplus area entirely for UDP Options, effectively redefining the UDP Length field as a 'trailer options offset'.
section: "7"
topics:
