document: rfc-5140
kind: interoperability-note
summary: TGREP reuses TRIP message formats (OPEN, UPDATE, KEEPALIVE, NOTIFICATION) and the same FSM for session establishment. Several TRIP attributes are not applicable in TGREP (AdvertisementPath, RoutedPath, AtomicAggregate, LocalPreference, MultiExitDisc, ITADTopology, ConvertedRoute); a TGREP receiver MAY ignore them if present.
section: "3"
topics:
