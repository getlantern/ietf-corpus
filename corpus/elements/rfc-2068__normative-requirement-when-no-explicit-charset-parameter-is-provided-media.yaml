document: rfc-2068
kind: normative-requirement
summary: When no explicit charset parameter is provided, media subtypes of the 'text' type received via HTTP default to ISO-8859-1. HTTP/1.1 recipients MUST respect the charset label provided by the sender; user agents that 'guess' a charset MUST use the content-type field's value if supported.
section: 3.7.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
