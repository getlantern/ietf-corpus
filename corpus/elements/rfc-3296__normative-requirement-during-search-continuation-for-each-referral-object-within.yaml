document: rfc-3296
kind: normative-requirement
summary: During search continuation, for each referral object within the requested scope (regardless of the search filter), the server SHOULD return a SearchResultReference constructed from the URI component of the ref attribute values, with an explicit scope specifier added if the URI is an LDAP URL.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - ldap
