kind: protocol-element
summary: 'The ''yang-patch'' container defines an ordered patch request with fields: mandatory ''patch-id'' (string), optional ''comment'' (string), and user-ordered ''edit'' list keyed by ''edit-id''. Each edit contains ''edit-id'', mandatory ''operation'' (enumeration), mandatory ''target'', optional ''point'', optional ''where'', and optional ''value''.'
