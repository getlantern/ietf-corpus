document: rfc-3801
kind: security-consideration
summary: 'The actual sender of a VPIM message may not match the From: or Sender: headers or the SMTP MAIL FROM address. SMTP provides no inherent sender authentication; voice recognition of the audio content may offer independent identity confirmation in constrained environments.'
section: 9.2.1
topics:
    - email
    - security
