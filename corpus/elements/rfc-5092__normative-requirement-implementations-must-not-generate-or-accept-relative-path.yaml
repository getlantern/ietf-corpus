document: rfc-5092
kind: normative-requirement
summary: Implementations MUST NOT generate or accept relative-path IMAP URL references (those that do not begin with a slash character). Only network-path, absolute-path, and empty-path relative references are permitted.
section: "7.2"
rfc2119_level: MUST NOT
