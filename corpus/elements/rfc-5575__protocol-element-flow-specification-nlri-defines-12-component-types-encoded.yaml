document: rfc-5575
kind: protocol-element
summary: 'Flow Specification NLRI defines 12 component types encoded as <type (1 octet), operator/value pairs>: (1) Destination Prefix, (2) Source Prefix, (3) IP Protocol, (4) Port (TCP/UDP src or dst), (5) Destination Port, (6) Source Port, (7) ICMP type, (8) ICMP code, (9) TCP flags, (10) Packet length, (11) DSCP, (12) Fragment. A packet matches a flow spec only if it matches all present components (logical AND).'
section: "4"
