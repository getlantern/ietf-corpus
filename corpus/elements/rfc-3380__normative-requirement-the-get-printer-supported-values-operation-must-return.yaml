document: rfc-3380
kind: normative-requirement
summary: The Get-Printer-Supported-Values operation MUST return those, and only those, 'xxx-supported' Printer attributes that the Printer supports setting with Set-Printer-Attributes. It returns the values inherently supported by the implementation code, not the current configured values.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
