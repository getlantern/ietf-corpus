document: rfc-2001
kind: protocol-element
summary: Slow start adds a congestion window (cwnd) to the sender's TCP. The cwnd is initialized to one segment when a new connection is established with a host on another network. The sender transmits up to the minimum of cwnd and the receiver's advertised window.
section: "1"
topics:
    - tcp
    - congestion
