document: rfc-8748
kind: normative-requirement
summary: In <check> responses, if the <fee:cd> 'avail' attribute is true and no <fee:fee> elements are present in a <fee:command> element, this indicates no fee will be assessed. If 'avail' is true, the <fee:command> element MUST NOT contain a <fee:reason> element.
section: 5.1.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
