document: rfc-8484
kind: normative-requirement
summary: If the DNS response has no records in the Answer section and has an SOA record in the Authority section, the response freshness lifetime MUST NOT be greater than the MINIMUM field from that SOA record.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - http
