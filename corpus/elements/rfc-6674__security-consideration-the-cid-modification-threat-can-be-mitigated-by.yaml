document: rfc-6674
kind: security-consideration
summary: The CID modification threat can be mitigated by enabling IPsec with integrity protection between the access gateway and the AFTR, ensuring the correct binding of the Context Identifier and the inner packet. No security requirements beyond those in RFC 6333 (DS-Lite) and the underlying access architecture are introduced.
