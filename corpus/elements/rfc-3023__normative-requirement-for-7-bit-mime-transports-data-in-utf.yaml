document: rfc-3023
kind: normative-requirement
summary: For 7-bit MIME transports, data in UTF-8 MUST be encoded in quoted-printable or base64. For 8-bit clean transport, the UTF-16 family MUST be encoded in base64. For binary-clean transports such as HTTP, no content-transfer-encoding is necessary.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
