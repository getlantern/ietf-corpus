document: rfc-4326
kind: design-rationale
summary: Each ULE Extension Header requires at least 2 bytes (the 16-bit Type field). The designers accepted this overhead cost because it simplifies processing and eliminates the need for multiple IANA registries, keeping the common case (no extensions) lightweight.
section: "5"
