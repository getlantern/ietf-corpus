document: rfc-2595
kind: normative-requirement
summary: An IMAP server which implements STARTTLS MUST implement support for the LOGINDISABLED capability on unencrypted connections. An IMAP client compliant with this specification MUST NOT issue the LOGIN command if LOGINDISABLED is present.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
