document: rfc-2212
kind: design-rationale
summary: 'Non-conforming datagrams are relegated to best-effort rather than dropped to prevent a denial-of-service scenario: a new receiver requesting a reservation with an inadequate TSpec could otherwise cause the policer to discard traffic, cutting off existing best-effort receivers of the same flow.'
section: Policing
