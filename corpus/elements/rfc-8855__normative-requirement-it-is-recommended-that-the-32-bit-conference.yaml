document: rfc-8855
kind: normative-requirement
summary: It is RECOMMENDED that the 32-bit Conference ID be randomly chosen. Predictable conference identifiers with a nonsecure transport make BFCP susceptible to off-path data injection attacks where an attacker can forge requests or responses.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
