document: rfc-8829
kind: security-consideration
summary: DTLS-SRTP is required for all media sessions; negotiation failure occurs if 'a=fingerprint' attributes are absent. The SDP security descriptions mechanism (RFC 4568) is prohibited. WebRTC security requirements are governed by RFC 8827.
section: 5.1.1
topics:
    - webrtc
    - realtime
    - crypto
    - security
