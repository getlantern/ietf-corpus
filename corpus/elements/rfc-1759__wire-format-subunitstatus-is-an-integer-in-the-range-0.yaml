document: rfc-1759
kind: wire-format
summary: 'SubUnitStatus is an INTEGER in the range 0..126, formed as the arithmetic sum of five independent bit fields: Availability (0/1/2/3/4/5/6), Non-Critical alert (0 or 8), Critical alert (0 or 16), On-Line intent (0 or 32), and Transitioning (0 or 64). Example: a jammed tray with low paper = 27 (3+16+8).'
section: 2.2.13.2.2
