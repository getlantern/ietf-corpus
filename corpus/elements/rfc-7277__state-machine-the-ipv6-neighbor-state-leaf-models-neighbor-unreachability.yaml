kind: state-machine
summary: 'The IPv6 neighbor state leaf models Neighbor Unreachability Detection (NUD) states from RFC 4861 Section 7.3.2: incomplete (address resolution in progress), reachable (recently confirmed reachable), stale (no longer known reachable, no probing yet), delay (traffic sent, waiting before probing), probe (unicast Neighbor Solicitation probes being sent).'
