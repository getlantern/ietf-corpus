document: rfc-4606
kind: normative-requirement
summary: For RSVP-TE, the FLOWSPEC object contents received in a Resv SHOULD be identical to the SENDER_TSPEC contents in the corresponding Path message. If they do not match, a ResvErr 'Traffic Control Error/Bad Flowspec value' SHOULD be generated.
section: "2.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
