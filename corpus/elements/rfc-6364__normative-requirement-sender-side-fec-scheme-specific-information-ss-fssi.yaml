document: rfc-6364
kind: normative-requirement
summary: Sender-Side FEC-Scheme-Specific Information (SS-FSSI) MUST be communicated in the 'ss-fssi' container; any other FSSI MUST be communicated in the 'fssi' container. If the FEC scheme does not require any specific information, the 'ss-fssi' and 'fssi' parameters MUST NOT exist.
section: "4.5"
rfc2119_level: MUST
topics:
    - realtime
