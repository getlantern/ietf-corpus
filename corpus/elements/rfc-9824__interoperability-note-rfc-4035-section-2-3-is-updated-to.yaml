document: rfc-9824
kind: interoperability-note
summary: 'RFC 4035 Section 2.3 is updated to add an exception for online signing implementations: dynamically generated NSEC records may be produced for owner names that don''t exist or are Empty Non-Terminals (ENTs). The original restriction (NSEC MUST NOT be the only RRset at an owner name) applies only to precomputed-signature implementations.'
section: "7.2"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
