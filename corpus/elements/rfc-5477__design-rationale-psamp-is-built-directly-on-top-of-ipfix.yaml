document: rfc-5477
kind: design-rationale
summary: 'PSAMP is built directly on top of IPFIX: a PSAMP Report is a special IPFIX Data Record representing an IPFIX Flow containing only a single packet. This reuse allows the IPFIX information model to serve as the basis for PSAMP Reports, with this document providing only the extensions required.'
