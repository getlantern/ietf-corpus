document: rfc-4364
kind: normative-requirement
summary: PE routers and ASBRs that redistribute VPN-IPv4 addresses MUST insert /32 address prefixes for themselves into the backbone IGP routing tables so that MPLS can assign labels for the label switched path to each PE. LDP is required for setting up these paths, though other methods are also permitted.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - vpn
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
