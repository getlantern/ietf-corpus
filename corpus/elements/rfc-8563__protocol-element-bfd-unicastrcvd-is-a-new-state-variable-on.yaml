document: rfc-8563
kind: protocol-element
summary: bfd.UnicastRcvd is a new state variable on a tail, set to 1 when the tail has received a unicast BFD Control packet from the head while in Up state. MUST be reset to zero when transitioning out of Up state, and MUST be initialized to zero.
section: 6.3.1
topics:
    - routing
    - multicast
