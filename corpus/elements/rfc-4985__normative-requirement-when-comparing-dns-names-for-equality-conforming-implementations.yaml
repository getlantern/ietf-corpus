document: rfc-4985
kind: normative-requirement
summary: When comparing DNS names for equality, conforming implementations MUST perform a case-insensitive exact match on the entire domain name. When evaluating name constraints, implementations MUST perform a case-insensitive exact match on a label-by-label basis.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - dns
