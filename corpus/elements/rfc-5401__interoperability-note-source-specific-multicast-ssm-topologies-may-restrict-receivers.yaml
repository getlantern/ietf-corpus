document: rfc-5401
kind: interoperability-note
summary: Source-Specific Multicast (SSM) topologies may restrict receivers to unicast NACK feedback. When unicast delivery is used, the recommended K value for T_maxBackoff increases from 4 to 6, and the sender should forward a multicast representation of its aggregated NACK content to enable receiver suppression among groups lacking direct multicast connectivity.
section: "2.6"
topics:
    - multicast
    - nat
