document: rfc-8866
kind: normative-requirement
summary: An RTP-based system in receive-only mode (a=recvonly) MUST still send RTCP packets as described in RFC 3550. Similarly, an RTP-based system in inactive mode MUST still send RTCP if RTCP is used.
section: 6.7.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
