document: rfc-3381
kind: design-rationale
summary: The implicit value of 'sheet-collate' in a Printer that does not support the attribute is 'collated', because the semantics of 'multiple-document-handling' are otherwise nonsensical in the case of separate documents with uncollated sheets.
