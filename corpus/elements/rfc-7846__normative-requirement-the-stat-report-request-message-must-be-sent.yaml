document: rfc-7846
kind: normative-requirement
summary: The STAT_REPORT request message MUST be sent periodically to the tracker while the peer is active in the system to signal continuing activity and prevent the tracker from de-registering the peer when the 'track timer' expires.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
