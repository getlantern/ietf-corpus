document: rfc-9441
kind: normative-requirement
summary: The application MUST set expiration timer values according to when the feedback is expected to be received, e.g., after the All-0 or after the All-1, to account for the flexibility introduced in whether the receiver responds to All-0 fragments.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
