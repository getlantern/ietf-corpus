document: rfc-3768
kind: security-consideration
summary: The TTL=255 mechanism (set on send, verified on receive) protects against VRRP packets injected from remote networks, limiting most vulnerabilities to local LAN attacks. Attacks by local nodes (ARP spoofing, MAC spoofing, redirects) are possible independently of VRRP and are not made worse by it.
section: "10"
