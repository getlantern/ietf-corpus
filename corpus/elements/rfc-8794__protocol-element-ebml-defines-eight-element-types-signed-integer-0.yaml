summary: 'EBML defines eight Element types: Signed Integer (0–8 octets, two''s complement, big-endian), Unsigned Integer (0–8 octets, big-endian), Float (0, 4, or 8 octets, IEEE 754), String (ASCII 0x20–0x7E), UTF-8, Date (0 or 8 octets, nanoseconds from 2001-01-01T00:00:00 UTC), Master (container), and Binary.'
