document: rfc-7090
kind: normative-requirement
summary: SIP UAs MUST maintain a timer started at the time of the original emergency call, which expires within a reasonable amount of time (e.g., 30 minutes per RFC 6881), to limit the window during which PSAP callback preferential treatment applies.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
