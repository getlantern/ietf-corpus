document: rfc-2243
kind: normative-requirement
summary: A server processing 'hex' and 'word' responses MUST process all arguments in a case-insensitive manner. A generator SHOULD generate otp-word tokens in upper case with single spaces separating them, and SHOULD generate hexadecimal numbers using only lower case for letters.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
