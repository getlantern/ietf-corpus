document: rfc-6506
kind: protocol-element
summary: A new AT-bit (bit position 0x000400) is defined in the 24-bit OSPFv3 Options field to signal that Authentication Trailers are present on the link. Its presence in Hello and Database Description packets indicates all packets on the link will include an Authentication Trailer; for other packet types, the AT expectation is derived from the neighbor data structure.
section: "2.1"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
