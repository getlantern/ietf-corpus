document: rfc-2078
kind: normative-requirement
summary: The first context-level token from GSS_Init_sec_context() is required to indicate at its very beginning a globally-interpretable mechanism identifier (OID) of the security mechanism. Remaining tokens' contents are mechanism-specific and opaque to callers.
section: 1.1.2
rfc2119_level: REQUIRED
topics:
    - security
    - registry
