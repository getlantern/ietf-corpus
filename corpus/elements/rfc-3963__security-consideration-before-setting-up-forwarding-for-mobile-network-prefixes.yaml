document: rfc-3963
kind: security-consideration
summary: Before setting up forwarding for Mobile Network Prefixes, the Home Agent MUST verify that the Mobile Router is authorized for those prefixes. Home Agents and Mobile Routers MAY use IPsec ESP to protect tunneled payload packets against on-path attackers.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - mobility
    - ipsec
