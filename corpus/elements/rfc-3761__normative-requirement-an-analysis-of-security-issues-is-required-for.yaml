document: rfc-3761
kind: normative-requirement
summary: An analysis of security issues is required for all registered Enumservices. All known security risks must be identified; stating 'no security issues' must not be confused with 'security issues have not been assessed'.
section: 3.1.3
rfc2119_level: REQUIRED
