document: rfc-6054
kind: wire-format
summary: The IV is a bit string whose leftmost N bits are the SID and whose remaining bits are the SSIV. SID width N may be 8, 12, or 16 bits; all SIDs used with a given SA MUST have the same length. An 8-bit SID with a 64-bit IV leaves 56 bits for the SSIV (Figure 1).
