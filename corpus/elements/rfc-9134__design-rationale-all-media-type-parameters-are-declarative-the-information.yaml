document: rfc-9134
kind: design-rationale
summary: All media type parameters are declarative — the information they signal is also present in the payload header or JPEG XS header segment. This redundancy allows SDP-level negotiation and validation while ensuring the payload itself is always self-describing, with the payload data prevailing on any conflict.
