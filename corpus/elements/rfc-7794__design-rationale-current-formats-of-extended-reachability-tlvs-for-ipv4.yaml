document: rfc-7794
kind: design-rationale
summary: Current formats of Extended Reachability TLVs for IPv4 and IPv6 are fixed and do not allow introduction of additional flags without backwards compatibility issues. A new sub-TLV is defined rather than modifying the fixed format to allow extensible flag advertisement.
section: "1"
topics:
    - routing
