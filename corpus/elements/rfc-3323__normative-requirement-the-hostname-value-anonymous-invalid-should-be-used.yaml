document: rfc-3323
kind: normative-requirement
summary: 'The hostname value ''anonymous.invalid'' SHOULD be used for anonymous URIs. The full recommended form of the anonymous From header is: From: "Anonymous" <sip:anonymous@anonymous.invalid>;tag=1928301774, and this From header MUST contain a valid and unique ''tag='' parameter.'
section: 4.1.1.3
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
