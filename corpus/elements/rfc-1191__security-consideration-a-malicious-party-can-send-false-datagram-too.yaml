document: rfc-1191
kind: security-consideration
summary: A malicious party can send false Datagram Too Big messages claiming a PMTU larger than reality, causing temporary blockage as the victim sends oversized datagrams that are dropped. Because hosts must never raise their PMTU estimate based on a Datagram Too Big message, they are not directly vulnerable; however, frequent repetition can cause significant datagram loss within one RTT per attack cycle.
section: "8"
topics:
