document: rfc-6876
kind: state-machine
summary: 'PT-TLS operates in three sequential phases: TLS Setup (TCP connection and TLS handshake), PT-TLS Negotiation (version negotiation and optional SASL client authentication), and PT-TLS Data Transport (exchange of PB-TNC batches). The Negotiation phase runs only once per TLS session; the Data Transport phase persists for the session''s lifetime.'
section: 3.4.2
topics:
    - tls
    - security
