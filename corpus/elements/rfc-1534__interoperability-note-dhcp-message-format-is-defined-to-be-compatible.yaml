document: rfc-1534
kind: interoperability-note
summary: DHCP message format is defined to be compatible with BOOTP message format, enabling existing BOOTP clients to interoperate with DHCP servers. A message received by a DHCP server that includes a 'DHCP message type' option (51) is assumed to be from a DHCP client; messages without it are assumed to be from a BOOTP client.
section: "2"
