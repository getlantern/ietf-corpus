document: rfc-5537
kind: normative-requirement
summary: An injecting agent SHOULD reject articles whose Injection-Date or Date header field is more than 24 hours in the future, and SHOULD reject articles dated too far in the past; the past-rejection interval SHOULD NOT be shorter than 72 hours.
section: "3.5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
