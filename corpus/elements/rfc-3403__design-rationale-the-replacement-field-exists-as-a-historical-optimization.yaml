document: rfc-3403
kind: design-rationale
summary: The REPLACEMENT field exists as a historical optimization for DNS name compression when the substitution is a simple domain-name replacement. It is otherwise functionally equivalent to using REGEXP and avoids the need to send a full regular expression.
section: "4.1"
topics:
    - dns
