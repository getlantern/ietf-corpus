document: rfc-6773
kind: interoperability-note
summary: A single DCCP Service Code registry and DCCP port registration apply to all combinations of encapsulation (DCCP-STD and DCCP-UDP) and IP version. Applications SHOULD NOT register different Service Codes or ports for different encapsulations.
section: "3.9"
topics:
    - udp
    - nat
    - registry
