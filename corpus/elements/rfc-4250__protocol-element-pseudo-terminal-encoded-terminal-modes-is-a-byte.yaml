document: rfc-4250
kind: protocol-element
summary: Pseudo-Terminal Encoded Terminal Modes is a byte stream of opcode-argument pairs carried in SSH_MSG_CHANNEL_REQUEST 'pty-req' messages. Opcodes are single bytes in the range 1–255; opcodes 1–159 carry a uint32 argument. Opcodes 160–255 are not yet defined. Opcode 0 (TTY_OP_END) marks the end of options.
section: "4.5"
topics:
