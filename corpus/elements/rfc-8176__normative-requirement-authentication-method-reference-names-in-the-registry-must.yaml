document: rfc-8176
kind: normative-requirement
summary: Authentication Method Reference Names in the registry MUST use only printable ASCII characters excluding double quote and backslash (Unicode code points U+0021, U+0023–U+005B, U+005D–U+007E). Names are case sensitive and may not match other registered names in a case-insensitive manner unless Designated Experts grant an exception.
section: 6.1.1
rfc2119_level: MUST
