document: rfc-7733
kind: protocol-element
summary: 'Recommended MPL Trickle parameters for 200 ms deadline: Imin=10 to 50 ms, Imax=100 to 400 ms, k=2 or 3 (k > q where q=Imin/3ms), max_expiration=2 to 4. Higher max_expiration values generate copies likely to miss the deadline.'
section: 5.1.2
