document: rfc-3755
kind: design-rationale
summary: The alternative of replacing the DO bit with a new 'DA' EDNS0 flag to signal DS-awareness was rejected because it requires all 2535-aware resolvers to zero out unknown EDNS0 flags; since this behavior cannot be guaranteed across all DNS implementations, it is not a universal solution.
section: "2.3"
topics:
    - dns
