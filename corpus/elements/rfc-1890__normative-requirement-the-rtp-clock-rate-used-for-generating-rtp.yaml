document: rfc-1890
kind: normative-requirement
summary: The RTP clock rate used for generating RTP timestamps equals the number of sampling periods per second, independent of the number of channels and the encoding. For N-channel encodings, each sampling period generates N samples.
section: "4.1"
rfc2119_level: REQUIRED
