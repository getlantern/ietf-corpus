document: rfc-8229
kind: interoperability-note
summary: When a MOBIKE-enabled Initiator changes networks, UPDATE_SA_ADDRESSES SHOULD be sent over UDP first; if no UDP response, it is sent over TCP. The resulting encapsulation mode follows whichever transport received a response.
