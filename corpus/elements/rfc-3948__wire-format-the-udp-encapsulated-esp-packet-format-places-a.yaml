document: rfc-3948
kind: wire-format
summary: The UDP-Encapsulated ESP packet format places a standard UDP header (Source Port, Destination Port, Length, Checksum — each 16 bits) immediately before the ESP header. The Source and Destination Ports MUST match those used by IKE traffic; the ESP SPI MUST NOT be zero.
section: "2.1"
topics:
    - ipsec
    - vpn
    - udp
