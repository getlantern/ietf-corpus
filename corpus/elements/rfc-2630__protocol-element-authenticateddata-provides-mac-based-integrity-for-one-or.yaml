document: rfc-2630
kind: protocol-element
summary: AuthenticatedData provides MAC-based integrity for one or more recipients; version is always 0. Its SEQUENCE includes originatorInfo, recipientInfos, macAlgorithm, optional digestAlgorithm, encapContentInfo, optional authenticatedAttributes (DER-encoded SET), mac (OCTET STRING), and optional unauthenticatedAttributes.
section: "9.1"
