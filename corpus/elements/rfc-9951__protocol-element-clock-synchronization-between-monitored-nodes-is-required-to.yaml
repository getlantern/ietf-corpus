document: rfc-9951
kind: protocol-element
summary: Clock synchronization between monitored nodes is required to produce representative delay measurements. NTP (RFC 5905) is cited as a suitable synchronization mechanism. Output values are expressed as decimal64 with fraction digits = 9, providing 0.001 microsecond (1 ns) resolution.
