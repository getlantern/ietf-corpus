document: rfc-2925
kind: normative-requirement
summary: It is RECOMMENDED that agent implementations impose a time limit on traceroute operations; an implementation that cannot process multiple concurrent traceroute operations SHOULD impose a shorter maximum allowed time period to prevent the operation from running for the theoretical maximum of 42+ hours.
section: 3.2.2
rfc2119_level: RECOMMENDED
topics:
