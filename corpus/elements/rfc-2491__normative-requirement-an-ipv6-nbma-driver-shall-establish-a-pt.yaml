document: rfc-2491
kind: normative-requirement
summary: An IPv6/NBMA driver SHALL establish a pt-pt VC to the MARS associated with its Logical Link and register as a Cluster Member before the node can send or receive IPv6 datagrams. Hosts and routers SHALL issue MARS_JOIN for solicited-node addresses, all-nodes, and other configured multicast groups; routers additionally SHALL join all-routers and block ranges for promiscuous reception.
section: "4.1"
rfc2119_level: SHALL
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
