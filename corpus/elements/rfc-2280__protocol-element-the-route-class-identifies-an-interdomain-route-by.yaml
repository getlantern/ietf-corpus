document: rfc-2280
kind: protocol-element
summary: 'The route class identifies an interdomain route by the mandatory pair (route, origin): ''route'' is the address prefix and ''origin'' is the originating AS number. Together these form the class key. An optional ''withdrawn'' date attribute signals the prefix is no longer originated.'
