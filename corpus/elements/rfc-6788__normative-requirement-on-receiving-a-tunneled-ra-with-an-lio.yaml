document: rfc-6788
kind: normative-requirement
summary: On receiving a tunneled RA with an LIO from the Edge Router, the AN MUST use the LIO's line-identification data to identify the subscriber circuit, MUST remove the outer IPv6 header, and MUST multicast the inner RA on that specific subscriber circuit.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
