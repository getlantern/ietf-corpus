document: rfc-5848
kind: security-consideration
summary: Unless TLS is used as a transport, all event messages, Certificate Blocks, and Signature Blocks are sent in plaintext, allowing both network administrators and attackers to observe the contents. TLS transport (RFC 5425) is recommended to protect confidentiality.
section: "8.8"
topics:
    - syslog
    - security
    - tls
    - privacy
