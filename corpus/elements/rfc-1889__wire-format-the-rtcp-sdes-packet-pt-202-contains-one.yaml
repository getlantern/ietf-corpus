document: rfc-1889
kind: wire-format
summary: The RTCP SDES packet (PT=202) contains one or more chunks, each 32-bit-boundary-aligned, beginning with an SSRC/CSRC identifier followed by a list of items. Each item has an 8-bit type, 8-bit length, and UTF-8 text up to 255 octets; the item list is terminated by one or more null octets padded to a 32-bit boundary.
section: "6.4"
topics:
