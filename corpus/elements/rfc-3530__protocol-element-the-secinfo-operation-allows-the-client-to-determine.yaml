document: rfc-3530
kind: protocol-element
summary: The SECINFO operation allows the client to determine on a per-filehandle basis what security triple (mechanism, QoP, service) is required for server access. The client uses it during initial communication or when crossing security policy boundaries, and in response to NFS4ERR_WRONGSEC errors.
section: 3.3.1
topics:
    - security
