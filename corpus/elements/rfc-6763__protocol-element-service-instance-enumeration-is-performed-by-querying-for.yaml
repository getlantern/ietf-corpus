document: rfc-6763
kind: protocol-element
summary: Service Instance Enumeration is performed by querying for DNS PTR records with the name '<Service>.<Domain>'. Each PTR record in the response contains a Service Instance Name pointing to an SRV+TXT record pair describing a specific service instance.
