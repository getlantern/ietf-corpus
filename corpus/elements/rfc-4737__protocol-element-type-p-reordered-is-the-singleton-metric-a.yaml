document: rfc-4737
kind: protocol-element
summary: Type-P-Reordered is the singleton metric. A packet with sequence number s is declared reordered (TRUE) if s < NextExp at the time of arrival; otherwise it is in-order (FALSE) and NextExp is updated to s+1. NextExp never decreases, providing a non-reversing order criterion.
section: "3.3"
topics:
