document: rfc-2068
kind: normative-requirement
summary: An HTTP/1.1 client MUST send a Host header field in all HTTP/1.1 request messages. If the Request-URI is not absolute and no Host header is present, or the determined host is not valid, the server MUST respond with 400 (Bad Request).
section: "14.23"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
