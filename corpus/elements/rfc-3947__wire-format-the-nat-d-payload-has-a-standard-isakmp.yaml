document: rfc-3947
kind: wire-format
summary: The NAT-D payload has a standard ISAKMP generic header (Next Payload, RESERVED, Payload Length) followed by the variable-length HASH of the IP address and port. The IP field is 4 octets for IPv4 or 16 octets for IPv6; port is 2 octets in network byte order. Payload type is 20.
section: "3.2"
topics:
    - ipsec
    - vpn
    - nat
