document: rfc-8705
kind: privacy-consideration
summary: In TLS versions prior to 1.3, the client's certificate is sent unencrypted during the handshake and can be used by third parties to monitor, track, and correlate client activity. Clients acting on behalf of a single end user (e.g., native mobile apps) should use TLS 1.3 whenever possible to protect certificate privacy.
section: "8"
topics:
    - tls
    - privacy
    - security
