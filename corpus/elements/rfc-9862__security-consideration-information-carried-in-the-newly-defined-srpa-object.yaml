document: rfc-9862
kind: security-consideration
summary: Information carried in the newly defined SRPA object and TLVs (SR Policy name, color, endpoint, candidate path identifiers) could provide an eavesdropper with additional topology and policy information about the SR domain. It is RECOMMENDED that these PCEP extensions be activated only on authenticated and encrypted sessions using TLS per RFC 8253 and RFC 9325.
section: "7"
topics:
    - security
    - routing
    - tls
