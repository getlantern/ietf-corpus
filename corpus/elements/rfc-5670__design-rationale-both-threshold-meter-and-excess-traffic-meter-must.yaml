document: rfc-5670
kind: design-rationale
summary: Both threshold-meter and excess-traffic-meter MUST be implemented even when only two encoding states are available, to ensure equipment compatibility, remove a configuration option, and allow future deployment of full three-state encoding without hardware replacement.
