document: rfc-5477
kind: protocol-element
summary: Measurement accuracy is reported via absoluteError (320, float64) or relativeError (321, float64) for directly measured values, and via the triplet upperCILimit (336), lowerCILimit (337), confidenceLevel (338) — all float64 — for estimated (sampled) values. The three confidence IEs must be used together and should be disregarded if any one is absent.
section: 8.6.3
topics:
    - measurement
