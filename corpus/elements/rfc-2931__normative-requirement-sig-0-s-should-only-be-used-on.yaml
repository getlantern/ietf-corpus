document: rfc-2931
kind: normative-requirement
summary: SIG(0)s SHOULD only be used on requests when necessary to authenticate that the requester has some required privilege or identity, due to the expense of public key operations and the risk of recursive key-fetching deadlocks.
section: "2.4"
rfc2119_level: SHOULD
