document: rfc-6374
kind: normative-requirement
summary: By default, direct LM MUST exclude packets transmitted and received over the Generic Associated Channel (G-ACh). An implementation MAY provide the means to alter this LM scope to include some or all G-ACh messages, but both endpoints must agree.
section: 4.2.8
rfc2119_level: MUST
topics:
