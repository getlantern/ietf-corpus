document: rfc-7303
kind: interoperability-note
summary: This specification aligns text/xml and text/xml-external-parsed-entity with their application/ counterparts for character encoding handling, eliminating the former distinction. The application/ variants remain preferred to avoid confusion based on the earlier distinction.
section: "4.1"
