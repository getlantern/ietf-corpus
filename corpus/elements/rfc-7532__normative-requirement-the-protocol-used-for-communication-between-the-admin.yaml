document: rfc-7532
kind: normative-requirement
summary: The protocol used for communication between the admin entity and each NSDB node MUST be LDAPv3 (RFC 4510). Administrators SHOULD authenticate using the DN of a privileged LDAP user when performing write operations.
section: "5.1"
rfc2119_level: MUST
topics:
