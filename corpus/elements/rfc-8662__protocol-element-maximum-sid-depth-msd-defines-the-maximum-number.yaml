document: rfc-8662
kind: protocol-element
summary: Maximum SID Depth (MSD) defines the maximum number of labels a node can impose on a packet, including service, entropy, and transport labels. It is a per-link and/or per-node property that can vary based on hardware or software limitations and the number of MPLS operations to be performed before label push.
section: "5"
topics:
