document: rfc-8601
kind: normative-requirement
summary: Any MTA conforming to this specification MUST delete any discovered instance of this header field that claims, via its authserv-id, to have been added within its trust boundary but did not arrive from a trusted internal MTA. This prevents forged authentication assertions from reaching consumers.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - security
