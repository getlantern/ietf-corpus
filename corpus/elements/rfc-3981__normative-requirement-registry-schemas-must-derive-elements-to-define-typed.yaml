document: rfc-3981
kind: normative-requirement
summary: Registry schemas MUST derive elements to define typed queries and results from the base IRIS schema. The identifier for a registry type and its XML namespace identifier MUST be the same URN registered in the 'ns' class of the IANA registry governed by XML_URN.
section: 4.3.1
rfc2119_level: MUST
topics:
    - registry
