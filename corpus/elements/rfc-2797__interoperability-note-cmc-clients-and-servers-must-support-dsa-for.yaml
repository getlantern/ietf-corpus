document: rfc-2797
kind: interoperability-note
summary: CMC clients and servers MUST support DSA for message signatures and Diffie-Hellman for message encryption key protection (D-H/3DES). RSA signatures and RSA key transport are SHOULD-level requirements. A minimally compliant server MUST accept Full PKI Requests (with both CRMF and PKCS#10 bodies), Simple Enrollment Requests, and MUST be able to return a Full PKI Response.
section: "8"
topics:
    - pkix
    - crypto
    - security
