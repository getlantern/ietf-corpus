document: rfc-4467
kind: interoperability-note
summary: URLAUTH overrides the second purpose of the userid in the IMAP URL (authentication requirement) defined in RFC 2192 (IMAPURL), replacing it with an authorization mechanism. The authimapurl grammar replaces the 'imapurl' and 'iserver' rules from RFC 2192 for URLAUTH-authorized URLs, making iuserauth mandatory.
