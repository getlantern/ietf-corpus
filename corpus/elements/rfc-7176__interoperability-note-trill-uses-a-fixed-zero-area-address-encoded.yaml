document: rfc-7176
kind: interoperability-note
summary: TRILL uses a fixed zero Area Address encoded as a 4-byte Area Address TLV (type 0x01, length 0x02, address length 0x01, address 0x00). This distinguishes TRILL IS-IS from Layer 3 IS-IS operation on the same link.
section: "4.2"
topics:
    - routing
