document: rfc-2646
kind: wire-format
summary: A soft line break is encoded as SP CRLF (a trailing space followed by CRLF). A hard line break is encoded as bare CRLF. The trailing space signals that the line is flowed and may be joined with the next.
section: "4.1"
topics:
