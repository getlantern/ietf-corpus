document: rfc-4235
kind: interoperability-note
summary: The dialog 'id' attribute is a distinct identifier from the SIP dialog ID defined in RFC 3261; it is created at INVITE send/receive time and remains stable even as the dialog is formally established by tagged responses, allowing half-dialogs to be tracked before a full RFC 3261 dialog exists.
section: 4.1.1
topics:
    - sip
    - realtime
