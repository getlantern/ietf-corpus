document: rfc-1449
kind: registry
summary: 'This document defines the SNMPv2-TM MIB module, assigning OIDs under snmpDomains for five transport domains: snmpUDPDomain ({snmpDomains 1}), snmpCLNSDomain ({snmpDomains 2}), snmpCONSDomain ({snmpDomains 3}), snmpDDPDomain ({snmpDomains 4}), and snmpIPXDomain ({snmpDomains 5}). It also assigns rfc1157Proxy ({snmpProxys 1}) with sub-OIDs rfc1157Domain and rfc1157noAuth.'
section: "2"
topics:
