document: rfc-9567
kind: normative-requirement
summary: If the RDATA content of a TXT record response is logged by the monitoring agent, the agent MUST assume the content can be malicious and take appropriate measures such as logging in hexadecimal to avoid exploitation (e.g., log4shell-style attacks).
section: "9"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
