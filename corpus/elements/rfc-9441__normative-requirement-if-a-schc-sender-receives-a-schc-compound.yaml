document: rfc-9441
kind: normative-requirement
summary: If a SCHC sender receives a SCHC Compound ACK with invalid window numbers (duplicate W values or W values not yet sent), it MUST discard the whole SCHC Compound ACK message.
section: "3.1"
rfc2119_level: MUST
