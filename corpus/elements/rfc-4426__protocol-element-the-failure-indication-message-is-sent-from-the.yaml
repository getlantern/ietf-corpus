document: rfc-4426
kind: protocol-element
summary: The Failure Indication Message is sent from the slave to the master to indicate the identities of one or more failed working links. A single message MAY include multiple failed links detected within a time window; separate messages MAY be sent to meet implementation-dependent time constraints.
section: 2.5.1
topics:
