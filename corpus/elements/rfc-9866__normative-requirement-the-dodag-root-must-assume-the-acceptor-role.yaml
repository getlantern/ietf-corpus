document: rfc-9866
kind: normative-requirement
summary: The DODAG root MUST assume the Acceptor role and MUST NOT ever switch from it. The root MUST generate a new DODAG Version if it changes its LORS to GLOBALLY DOWN, whether due to a post-crash restart or a false detection by nodes.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
