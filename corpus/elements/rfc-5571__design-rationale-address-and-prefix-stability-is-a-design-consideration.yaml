document: rfc-5571
kind: design-rationale
summary: 'Address and prefix stability is a design consideration: the SC should provide the same address and prefix to a reconnecting user. When multiple SCs are used for load-balancing, providing the same address across SCs is possible but increases routing table fragmentation; aggregating prefixes near the SC mitigates this.'
