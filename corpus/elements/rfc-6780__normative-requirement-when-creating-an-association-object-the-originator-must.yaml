document: rfc-6780
kind: normative-requirement
summary: When creating an ASSOCIATION object, the originator MUST format the object per RFC 4872 Section 16.1, MUST set the Association Type field based on the type of association, MUST set the Association ID to a value unique within the Association Source context, and MUST set the Association Source to a unique address assigned to the originating node.
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
