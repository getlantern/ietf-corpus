document: rfc-5660
kind: normative-requirement
summary: Implementations MUST provide a default disposition for latch breaks. The document RECOMMENDs acting as connection reset (option b) for TCP and single-path SCTP, and ICMP destination unreachable (option c) for multi-homed SCTP; implementations SHOULD also provide APIs for applications to choose or be notified of dispositions.
section: "5.5"
rfc2119_level: RECOMMENDED
topics:
    - ipsec
    - tcp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
