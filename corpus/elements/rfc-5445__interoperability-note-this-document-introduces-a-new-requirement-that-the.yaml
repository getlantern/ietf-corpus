document: rfc-5445
kind: interoperability-note
summary: This document introduces a new requirement that the Encoding Symbol Length be uniform across all source blocks of a transport object, which was not required by RFC 3452 or RFC 3695. Because no protocols were defined that supported per-source-block variation in Encoding Symbol Length, this tightening is stated to introduce no backwards compatibility issues.
section: "10"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
