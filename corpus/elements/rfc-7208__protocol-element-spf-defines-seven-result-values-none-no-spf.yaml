document: rfc-7208
kind: protocol-element
summary: 'SPF defines seven result values: ''none'' (no SPF record or invalid domain), ''neutral'' (no assertion made), ''pass'' (explicitly authorized), ''fail'' (explicitly not authorized), ''softfail'' (probably not authorized), ''temperror'' (transient DNS error), and ''permerror'' (uninterpretable record requiring DNS operator action).'
section: "2.6"
