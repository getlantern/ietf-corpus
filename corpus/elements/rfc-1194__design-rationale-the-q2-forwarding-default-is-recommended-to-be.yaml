document: rfc-1194
kind: design-rationale
summary: The {Q2} forwarding default is RECOMMENDED to be 'refuse' because cases warranting forwarding are far outnumbered by cases against it. Enabling {Q2} on a security gateway creates an unintended path through the security perimeter.
section: 3.2.1
topics:
    - security
