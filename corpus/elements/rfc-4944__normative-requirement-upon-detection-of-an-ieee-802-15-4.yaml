document: rfc-4944
kind: normative-requirement
summary: Upon detection of an IEEE 802.15.4 Disassociation event, fragment recipients MUST discard all link fragments of all partially reassembled datagrams, and fragment senders MUST discard all not-yet-transmitted link fragments of all partially transmitted datagrams.
section: "5.3"
rfc2119_level: MUST
