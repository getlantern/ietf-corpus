document: rfc-1381
kind: normative-requirement
summary: Support of the lapbOperTable is mandatory for all agents of systems that implement LAPB. This read-only table reflects parameters currently in use, which may differ from lapbAdmnTable values if XID negotiation overrode them or if the admin table was changed after interface start.
section: "4"
rfc2119_level: MUST
topics:
