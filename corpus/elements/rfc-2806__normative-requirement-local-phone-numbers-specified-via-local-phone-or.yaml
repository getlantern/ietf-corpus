document: rfc-2806
kind: normative-requirement
summary: Local phone numbers specified via local-phone or fax-local-phone MUST be passed to the dialing entity 'as is', without any conversion, unless the local entity opts to utilize an optional service-provider parameter.
section: 2.5.4
rfc2119_level: MUST
