document: rfc-2728
kind: protocol-element
summary: 'SLIP-style framing uses END (0xC0) to delimit packets and ESC (0xDB) for byte stuffing: a data byte equal to END is replaced by ESC+0xDC; a data byte equal to ESC is replaced by ESC+0xDD. Each framed packet begins with a 1-byte (or 2-byte if MSB=1) schema field.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
