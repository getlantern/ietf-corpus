document: rfc-5535
kind: protocol-element
summary: Hash-Based Addresses (HBAs) are IPv6 addresses where the interface identifier is generated as a hash of the available prefixes and a random Modifier, then multiple addresses are formed by prepending each prefix to the generated interface identifier. This creates a set of addresses inherently bound to each other without requiring public-key cryptography.
section: "3.2"
topics:
    - ip
    - security
    - crypto
