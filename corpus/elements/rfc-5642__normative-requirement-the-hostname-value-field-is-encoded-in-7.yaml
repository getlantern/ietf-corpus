document: rfc-5642
kind: normative-requirement
summary: The hostname Value field is encoded in 7-bit ASCII. If a user interface permits Unicode characters, it is responsible for applying the ToASCII and/or ToUnicode algorithm (RFC 3490) for correct transmission or display.
section: "3.1"
rfc2119_level: REQUIRED
