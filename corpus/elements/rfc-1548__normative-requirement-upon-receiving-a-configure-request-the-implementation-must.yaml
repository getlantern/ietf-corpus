document: rfc-1548
kind: normative-requirement
summary: Upon receiving a Configure-Request, the implementation MUST transmit an appropriate reply. Configuration Options SHOULD NOT be included in a Configure-Request with default values. The Identifier MUST be changed whenever the Options field content changes or a valid reply has been received.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
