document: rfc-9112
kind: normative-requirement
summary: A pipelining server MAY process safe-method requests in parallel but MUST send responses in the same order the requests were received. A client that pipelines MUST NOT pipeline immediately after reconnection to avoid losing error responses from the prior pipeline.
section: 9.3.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
