document: rfc-9843
kind: interoperability-note
summary: Per RFC 9350, any node that does not understand sub-TLVs in a FAD TLV stops participation in the corresponding Flex-Algorithm. New FAD constraints and metric-types defined in this document can therefore be deployed incrementally among upgraded nodes without affecting non-upgraded nodes.
