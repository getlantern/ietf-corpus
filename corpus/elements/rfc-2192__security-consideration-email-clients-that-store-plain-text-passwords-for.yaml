document: rfc-2192
kind: security-consideration
summary: Email clients that store plain text passwords for IMAP MUST NOT use a stored password in response to an IMAP URL without explicit permission from the user to supply that password to the specified host name.
section: "11"
rfc2119_level: MUST NOT
topics:
