document: rfc-8776
kind: wire-format
summary: The 'te-node-id' typedef encodes a TE topology node identifier as 'yang:dotted-quad' (4 octets, dotted-quad notation). It MAY be mapped to the OSPF Router Address TLV (RFC 3630 §2.4.1), IS-IS TE Router ID TLV (RFC 5305 §4.3), IPv6 IS-IS TE Router ID TLV (RFC 6119 §3.2.1), or ASON TE Router ID (RFC 6827 §3).
section: "4"
topics:
    - routing
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
