document: rfc-8263
kind: security-consideration
summary: Confidentiality is not provided for the GROUPKEY-PUSH ACK. A passive attacker can observe the hash value, the sequence number from the acknowledged GROUPKEY-PUSH, and the GM identity. The sequence number not previously available to the attacker is revealed, but this does not enable forgery of GROUPKEY-PUSH messages.
section: "7.1"
topics:
    - security
    - privacy
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
