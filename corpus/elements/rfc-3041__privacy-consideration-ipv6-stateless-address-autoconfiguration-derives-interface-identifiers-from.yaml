document: rfc-3041
kind: privacy-consideration
summary: IPv6 stateless address autoconfiguration derives interface identifiers from IEEE MAC addresses, creating globally unique and non-changing identifiers embedded in addresses. Even as a mobile node changes its routing prefix across topological locations, the interface identifier remains constant, enabling tracking of device movement and activity correlation across unrelated transactions.
section: "2.3"
topics:
    - privacy
    - ip
    - v6ops
