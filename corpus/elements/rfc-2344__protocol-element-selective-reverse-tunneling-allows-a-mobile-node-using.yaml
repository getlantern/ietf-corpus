document: rfc-2344
kind: protocol-element
summary: Selective reverse tunneling allows a mobile node using the Encapsulating Delivery Style to send some packets via the reverse tunnel (encapsulated) and others directly (unencapsulated). The foreign agent MUST NOT reverse-tunnel the unencapsulated packets; it MUST reverse-tunnel the encapsulated ones.
section: "5.4"
topics:
    - mobility
    - ip
