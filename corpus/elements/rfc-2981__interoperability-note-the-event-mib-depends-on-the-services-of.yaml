document: rfc-2981
kind: interoperability-note
summary: The Event MIB depends on the services of the SNMPv3 Management Target MIB and Notification MIB (RFC 2573) for remote target selection and notification dispatch. Remote monitoring uses the tag service of the Management Target MIB to select remote systems.
