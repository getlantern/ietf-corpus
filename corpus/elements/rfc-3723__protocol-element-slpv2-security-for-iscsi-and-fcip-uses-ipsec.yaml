document: rfc-3723
kind: protocol-element
summary: SLPv2 security for iSCSI and FCIP uses IPsec ESP with a non-null transform to protect unicast SLPv2 messages. SLPv2 authentication blocks (digital signatures per RFC 2608) MAY also be used to authenticate unicast and multicast messages, but IPsec is preferred as certificate deployment for IPsec is more likely than for SLPv2 alone.
section: 2.5.1
topics:
    - ipsec
    - security
