document: rfc-6873
kind: normative-requirement
summary: The Optional Fields Start Pointer MUST point to the terminating line-feed (0x0A) at the end of the record if the optional fields group is not implemented. When optional fields are present, it points to the Tab (0x09) character beginning the first optional entry.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
