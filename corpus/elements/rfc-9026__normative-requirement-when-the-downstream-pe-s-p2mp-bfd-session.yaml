document: rfc-9026
kind: normative-requirement
summary: When the downstream PE's P2MP BFD session state transitions to Down, the associated P-tunnel MUST be considered down; the PE MAY then initiate a traffic switchover to the Standby Upstream PE if that PE's BFD session is Up.
section: 3.1.6.2
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
