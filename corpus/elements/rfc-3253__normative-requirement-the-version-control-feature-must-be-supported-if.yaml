document: rfc-3253
kind: normative-requirement
summary: The version-control feature MUST be supported if any other versioning feature is supported. A server indicates support by including "version-control" in the DAV response header to OPTIONS requests on any resource that supports versioning properties, reports, or methods.
section: "3"
rfc2119_level: MUST
topics:
    - http
