document: rfc-8431
kind: protocol-element
summary: The nexthop-protection type uses a nexthop-list-p grouping where each member has a nexthop-preference value (uint8, range 1..99, lower preferred). To download N nexthops to the FIB, the N members with lowest preference values are selected; tie-breaking among equal-preference nexthops is implementation-defined.
section: "3"
topics:
