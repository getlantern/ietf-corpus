document: rfc-7371
kind: normative-requirement
summary: The ff2 'r' bits MUST each be sent as zero and MUST be ignored on receipt. This applies to all IPv6 multicast addresses using the updated format defined in this document.
section: 4.1.1
rfc2119_level: MUST
topics:
