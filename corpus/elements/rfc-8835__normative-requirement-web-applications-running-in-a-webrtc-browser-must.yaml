document: rfc-8835
kind: normative-requirement
summary: Web applications running in a WebRTC browser MUST be able to utilize both IPv4 and IPv6 where available; when two peers have only IPv4 or only IPv6 connectivity, applications MUST be able to communicate.
section: "3.2"
rfc2119_level: MUST
topics:
