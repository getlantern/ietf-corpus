document: rfc-2894
kind: normative-requirement
summary: After processing all PCOs on all interfaces, an implementation MUST record the SegmentNumber of the packet in a list associated with the current SequenceNumber, to prevent duplicate processing of retransmitted messages.
section: "4.3"
rfc2119_level: MUST
