document: rfc-9449
kind: protocol-element
summary: The jkt JWT Confirmation Method member conveys the JWK SHA-256 Thumbprint of the DPoP public key in JWT-structured access tokens under the cnf claim. Its value MUST be the base64url encoding of the JWK SHA-256 Thumbprint per RFC 7638.
section: "6.1"
