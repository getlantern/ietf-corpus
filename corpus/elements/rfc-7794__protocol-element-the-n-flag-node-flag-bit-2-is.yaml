document: rfc-7794
kind: protocol-element
summary: The N-Flag (Node Flag, Bit 2) is set when the prefix identifies the advertising router itself, typically a host prefix (/32 for IPv4, /128 for IPv6) associated with a loopback address. The advertising router MAY choose not to set this flag even when conditions are met.
section: "2.1"
topics:
