document: rfc-2662
kind: normative-requirement
summary: The MIB module is compliant to SMIv2. Implementors may produce an SMIv1-conformant MIB via translation, but Counter64 objects cannot be translated and some machine-readable information will be lost; such translation does not change the semantic equivalence of the MIB.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
