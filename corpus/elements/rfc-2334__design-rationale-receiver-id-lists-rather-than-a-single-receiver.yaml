document: rfc-2334
kind: design-rationale
summary: 'Receiver ID lists (rather than a single Receiver ID) in Hello messages enable efficient use of point-to-multipoint connections: a single Hello carrying all known DCSIDs replaces N unicast Hellos, at the cost of slightly larger messages.'
