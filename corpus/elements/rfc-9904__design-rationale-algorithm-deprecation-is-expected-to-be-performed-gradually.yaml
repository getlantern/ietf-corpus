document: rfc-9904
kind: design-rationale
summary: 'Algorithm deprecation is expected to be performed gradually: an algorithm should be downgraded from MUST to NOT RECOMMENDED or MAY before being marked MUST NOT, unless there are strong security reasons for an immediate change. Similarly, new algorithms should be introduced as RECOMMENDED before being elevated to MUST.'
section: "1.2"
