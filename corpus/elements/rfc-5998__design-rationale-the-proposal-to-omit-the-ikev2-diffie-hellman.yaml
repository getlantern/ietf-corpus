document: rfc-5998
kind: design-rationale
summary: The proposal to omit the IKEv2 Diffie-Hellman exchange and rely solely on EAP-derived session keys (Appendix A.3) was rejected because it would require designing a completely new protocol and the only benefit — saving g^xy computation — is insufficient justification.
