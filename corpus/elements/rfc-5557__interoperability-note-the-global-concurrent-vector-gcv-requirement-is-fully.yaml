document: rfc-5557
kind: interoperability-note
summary: The Global Concurrent Vector (GCV) requirement is fully satisfied by the existing SVEC object defined in RFC 5440. The SVEC object identifies a set of concurrent path requests, so it is reused without modification for GCO rather than defining a new object.
