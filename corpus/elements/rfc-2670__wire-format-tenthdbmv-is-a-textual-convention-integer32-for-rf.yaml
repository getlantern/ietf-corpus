summary: TenthdBmV is a textual convention (Integer32) for RF power levels normally expressed in dBmV. Units are tenths of a dBmV; for example, 5.1 dBmV is encoded as 51. Used in docsIfDownChannelPower and docsIfCmStatusTxPower.
