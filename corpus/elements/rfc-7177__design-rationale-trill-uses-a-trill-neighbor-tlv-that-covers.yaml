document: rfc-7177
kind: design-rationale
summary: TRILL uses a TRILL Neighbor TLV that covers a range of MAC addresses rather than listing every neighbor individually, because on large backbone technologies (e.g., a giant Ethernet interconnecting hundreds of TRILL sites) hundreds of RBridges may appear as neighbors on a single link, making individual per-neighbor listings per Hello impractical.
section: "2.5"
topics:
    - routing
