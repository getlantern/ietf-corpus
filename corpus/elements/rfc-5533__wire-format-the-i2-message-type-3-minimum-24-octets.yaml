document: rfc-5533
kind: wire-format
summary: The I2 message (Type=3, minimum 24 octets) carries a 47-bit Initiator Context Tag, a new 32-bit Initiator Nonce, the Responder Nonce copied from R1, and 32-bit Reserved2. The Responder Validator option MUST be copied from R1; a Locator List, CGA PDS, and CGA Signature may optionally be included.
section: "5.6"
