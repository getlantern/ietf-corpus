document: rfc-6929
kind: normative-requirement
summary: When a container TLV holds nested TLVs, the container TLV-Length MUST be exactly two more than the sum of the contained TLV-Length fields. If contained TLVs overfill the container, the container MUST be treated as an invalid attribute.
section: 2.3.1
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
