document: rfc-5044
kind: normative-requirement
summary: MPA receivers MUST preserve ULPDU boundaries when passing data to DDP. Receivers MUST pass the ULPDU data and ULPDU_Length to DDP, and MUST NOT pass Markers, FPDU headers, or the CRC field to DDP.
section: "4.3"
rfc2119_level: MUST
topics:
    - tcp
