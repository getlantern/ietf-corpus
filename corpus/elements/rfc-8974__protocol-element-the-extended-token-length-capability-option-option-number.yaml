document: rfc-8974
kind: protocol-element
summary: The Extended-Token-Length Capability Option (option number 6) is an elective CSM signaling option with format uint, length 0–3 bytes, and base value 8. A server uses it to advertise the maximum token length (in bytes) it can accept in requests; the base value (8) applies when the option is absent.
section: 2.2.1
topics:
