document: rfc-2873
kind: design-rationale
summary: There is no field in the TCP header that indicates the precedence of a segment; instead, the precedence field in the IP packet header is used. This is why DiffServ modifications to IP header bits conflict with TCP precedence semantics.
section: "1"
topics:
    - tcp
    - ip
    - diffserv
