document: rfc-3036
kind: protocol-element
summary: 'LDP Extended Discovery supports sessions between non-directly connected LSRs using LDP Targeted Hellos sent as UDP unicast packets to a specific address. Extended Discovery is asymmetric: the initiating LSR sends Targeted Hellos and the targeted LSR decides whether to respond.'
section: 2.4.2
topics:
