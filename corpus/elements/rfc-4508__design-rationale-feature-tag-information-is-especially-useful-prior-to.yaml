document: rfc-4508
kind: design-rationale
summary: Feature tag information is especially useful prior to session establishment. For example, knowing a remote UA supports video allows the calling UA to offer video in SDP; knowing a UA is a conference focus allows subscribing to the conference URI before sending an INVITE. This motivates extending REFER to carry feature tags about the REFER-Target.
section: "1"
topics:
    - sip
