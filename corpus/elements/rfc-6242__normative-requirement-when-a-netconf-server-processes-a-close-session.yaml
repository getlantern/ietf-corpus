document: rfc-6242
kind: normative-requirement
summary: When a NETCONF server processes a <close-session> operation, it SHALL respond and close the SSH session channel. The NETCONF server MUST NOT process any NETCONF messages received after the <close-session> operation.
section: "5"
rfc2119_level: MUST NOT
topics:
    - netconf
