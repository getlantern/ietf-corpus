document: rfc-8528
kind: normative-requirement
summary: In the 'shared-schema' case, all instances of the same mount point MUST use the same mounted schema and therefore MUST have the same YANG library content identifier. In the 'inline' case, different instances MAY use different mounted schemas.
section: "3.3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
