document: rfc-9363
kind: protocol-element
summary: The SCHC data fragment header starts with RuleID followed by optional DTag (T bits), optional Window W (M bits, absent in No-ACK mode), and mandatory FCN (N bits). DTag identifies concurrent datagrams; FCN indicates fragment position within the window.
