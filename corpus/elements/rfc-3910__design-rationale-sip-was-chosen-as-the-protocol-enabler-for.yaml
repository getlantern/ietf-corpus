document: rfc-3910
kind: design-rationale
summary: SIP was chosen as the protocol enabler for SPIRITS because the SPIRITS protocol requirements mandate that parameters be carried in a manner consistent with SIP practices, and SIP already provides payload description capabilities (Content-Type, Content-Length). The rationale for this choice is detailed in the SPIRITS requirements RFC 3298.
