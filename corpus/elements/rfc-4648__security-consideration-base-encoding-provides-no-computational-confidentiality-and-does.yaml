document: rfc-4648
kind: security-consideration
summary: Base encoding provides no computational confidentiality and does not add entropy to the plaintext. It has caused security incidents where users inadvertently revealed passwords embedded in base64-encoded protocol traces, incorrectly believing the encoding protected the data.
section: "12"
topics:
    - security
