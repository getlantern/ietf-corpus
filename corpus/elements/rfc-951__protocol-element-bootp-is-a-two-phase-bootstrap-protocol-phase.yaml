document: rfc-951
kind: protocol-element
summary: 'BOOTP is a two-phase bootstrap protocol: phase 1 uses a single UDP packet exchange to determine the client''s IP address, server address, and boot filename; phase 2 uses TFTP (or SFTP/FTP) to transfer the boot file. Both phases are intended to reside in PROM on the client.'
