document: rfc-7447
kind: protocol-element
summary: The Entropy Label Capability Attribute (ELCA) is an optional, transitive BGP path attribute defined in RFC 6790 Section 5.2. It was intended to signal that a router is capable of processing MPLS entropy labels. This document deprecates it.
