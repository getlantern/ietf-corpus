kind: protocol-element
summary: The ietf-dhcpv6-relay module models relay interfaces as a list keyed by if-name (an ietf-interfaces interface-ref), with per-interface destination-address list, link-address, relay-options (AUTH and Interface-Id options), statistics counters, and optional prefix-delegation state (pd-leases).
