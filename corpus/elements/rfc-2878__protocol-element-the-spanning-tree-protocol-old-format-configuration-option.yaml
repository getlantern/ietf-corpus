document: rfc-2878
kind: protocol-element
summary: The Spanning-Tree-Protocol (old format) Configuration Option (Type 7) lists one or more 1-octet spanning tree protocol identifiers (0=Null, 1=IEEE 802.1D, 2=IEEE 802.1G, 3=IBM Source Route, 4=DEC LANbridge 100) in increasing numerical order. Both bridges MUST agree on the protocol; disagreement prevents BCP from entering the Opened state.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
