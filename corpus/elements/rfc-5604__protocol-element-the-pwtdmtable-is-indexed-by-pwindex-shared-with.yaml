summary: The pwTDMTable is indexed by pwIndex (shared with PW-STD-MIB) and is automatically populated by the agent for every pwTable entry with pwType values 17–24 (e1Satop, t1Satop, e3Satop, t3Satop, basicCesPsn, basicTdmIp, tdmCasCesPsn, tdmCasTdmIp). All writable objects MUST NOT be changed after row activation, and values must persist after reboot.
