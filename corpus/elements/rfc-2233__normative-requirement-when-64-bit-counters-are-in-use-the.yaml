document: rfc-2233
kind: normative-requirement
summary: When 64-bit counters are in use, the corresponding 32-bit counters MUST still be available and MUST report the low 32 bits of the associated 64-bit count (e.g., ifInOctets reports the least significant 32 bits of ifHCInOctets). This requirement enhances interoperability with existing implementations.
section: 3.1.6
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
