document: rfc-8300
kind: security-consideration
summary: Implementers and operators MUST be aware that NSH metadata can have privacy implications. Attached metadata should be limited to what is necessary for correct SFP operation. Subscriber-identifying information SHOULD be obfuscated; for situations where obfuscation is insufficient, transport-layer encryption (e.g., IPsec) MUST be used.
section: 8.2.2
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
