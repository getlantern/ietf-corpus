document: rfc-3981
kind: normative-requirement
summary: 'Registry type specifications MUST include: formal XML syntax deriving from IRIS XML, an identifying registry URN, any registry-specific resolution methods, a registration of the abbreviated URN as an S-NAPTR application service label, a list of well-known entity classes, and a statement on case sensitivity of entity names.'
section: "8.1"
rfc2119_level: MUST
topics:
    - registry
