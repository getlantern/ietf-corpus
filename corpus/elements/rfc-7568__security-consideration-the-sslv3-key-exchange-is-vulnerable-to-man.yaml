document: rfc-7568
kind: security-consideration
summary: The SSLv3 key exchange is vulnerable to man-in-the-middle attacks when renegotiation (RFC 5746) or session resumption (Triple Handshake attack) are used. Both flaws were fixed in TLS via extensions that SSLv3 cannot adopt.
section: "4.2"
topics:
    - tls
    - security
    - crypto
