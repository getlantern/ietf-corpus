document: rfc-6724
kind: design-rationale
summary: RFC 1918 private addresses were changed from site-local to global scope to match existing implementation practice. The site-local mapping caused Destination Rule 2 (prefer matching scope) to inappropriately prefer IPv6 over IPv4 in mixed NAT scenarios, making the behavior non-configurable via the policy table.
section: Appendix B
topics:
    - ip
    - v6ops
    - nat
