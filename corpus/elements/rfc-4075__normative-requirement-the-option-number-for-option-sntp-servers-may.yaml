document: rfc-4075
kind: normative-requirement
summary: The option number for OPTION_SNTP_SERVERS MAY appear in the Option Request Option in Solicit, Request, Renew, Rebind, Information-Request, and Reconfigure messages. If it appears in the Option Request Option in other messages, the receiver SHOULD ignore it.
section: "5"
rfc2119_level: MAY
topics:
