document: rfc-891
kind: interoperability-note
summary: When connecting a DCN host to an ARPANET IMP, Gateway, or Port Expander via ARPANET 1822 Local or Distant Host interfaces, a 96-bit 1822 leader (per BBN Report 1822) must be prepended before the Internet datagram. When connecting two DCN hosts directly via 1822, no leader is used and the frame contains only the Internet datagram.
section: A.4
topics:
    - ip
