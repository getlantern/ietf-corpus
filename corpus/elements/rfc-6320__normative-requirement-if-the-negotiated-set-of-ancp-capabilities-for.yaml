document: rfc-6320
kind: normative-requirement
summary: If the negotiated set of ANCP capabilities for a session is empty, the sender of the SYNACK MUST raise an alarm to management, halt the adjacency procedure, and tear down the TCP session if it is not being used by another adjacency.
section: 3.5.2.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
