document: rfc-2646
kind: design-rationale
summary: Trailing whitespace was chosen as the flowed-line indicator because it makes Format=Flowed messages appear as normal Text/Plain to legacy clients, avoiding the backwards-compatibility failures seen with Text/Enriched and Text/HTML deployments.
