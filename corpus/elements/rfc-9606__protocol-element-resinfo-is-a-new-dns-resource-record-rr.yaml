document: rfc-9606
kind: protocol-element
summary: RESINFO is a new DNS resource record (RR) type that allows recursive resolvers to publish information about themselves as key/value pairs. DNS clients query for RESINFO using the Authentication Domain Name (ADN) or 'resolver.arpa' as the QNAME. The record is a property of the resolver and is not subject to recursive resolution.
section: "3"
