document: rfc-7442
kind: interoperability-note
summary: In Mechanism 2, if an LSR creates (S,G) state from an mLDP Source TLV Label Map while already having (*,G) state (with the RP reachable via IP) from an mLDP Shared Tree TLV Label Map, the LSR does NOT originate a Source Active auto-discovery route, since the shared tree context is already established via in-band signaling.
section: "3.2"
topics:
    - mpls
    - multicast
