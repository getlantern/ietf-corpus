document: rfc-1134
kind: protocol-element
summary: 'Asynchronous HDLC uses character stuffing: the Control Escape octet 0x7d causes the following octet to have bit 6 complemented (XOR with 0x20). All octets with values 0x7e, 0x7d, and any octet below 0x20 are escaped. This allows all ASCII control characters except DEL to be transparently transmitted.'
section: A
