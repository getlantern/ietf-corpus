document: rfc-5268
kind: normative-requirement
summary: The BADF option MUST be the last Mobility Option present in an FBU or FBack message. The default MAC is HMAC-SHA1 with the first 96 bits used; other algorithms such as HMAC-SHA256 are permitted via the Option Length field.
section: 6.5.4
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
