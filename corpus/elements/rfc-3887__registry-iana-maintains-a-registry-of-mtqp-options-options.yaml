document: rfc-3887
kind: registry
summary: IANA maintains a registry of MTQP options. Options not beginning with 'vnd.' MUST be defined in a standards-track or IESG-approved experimental RFC. The STARTTLS option is the initial registered entry. Vendor-specific options use a 'vnd.<reversed-domain>.<name>' naming convention.
