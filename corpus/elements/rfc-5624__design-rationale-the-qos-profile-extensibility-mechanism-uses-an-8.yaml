document: rfc-5624
kind: design-rationale
summary: The QoS profile extensibility mechanism uses an 8-octet vendor+specifier field to allow both IANA-registered profiles (vendor=0) and vendor-specific profiles (vendor=Enterprise Number), enabling different organizations to define their own QoS parameter sets without conflicting with the standard profile.
