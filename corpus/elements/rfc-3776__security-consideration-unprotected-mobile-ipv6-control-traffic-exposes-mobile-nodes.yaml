document: rfc-3776
kind: security-consideration
summary: Unprotected Mobile IPv6 control traffic exposes mobile nodes, home agents, and third parties to man-in-the-middle, hijacking, passive wiretapping, impersonation, and denial-of-service attacks; ESP protects Binding Updates so an attacker cannot redirect a mobile node's traffic to a third party.
