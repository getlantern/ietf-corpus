document: rfc-7260
kind: normative-requirement
summary: When deleting OAM entities, OAM source functions MUST be deleted first. Only after OAM alarms are disabled may associated OAM sink functions be removed, ensuring OAM messages do not leak outside the LSP.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
