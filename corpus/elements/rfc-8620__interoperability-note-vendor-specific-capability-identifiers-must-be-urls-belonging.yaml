document: rfc-8620
kind: interoperability-note
summary: Vendor-specific capability identifiers MUST be URLs belonging to a domain owned by the vendor. Clients MUST opt in by including the capability URI in 'using'; servers MUST behave as if non-opted-in extensions do not exist, ensuring compatibility with clients unaware of custom extensions.
section: "1.8"
topics:
    - json
