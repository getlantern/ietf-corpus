document: rfc-6309
kind: design-rationale
summary: For some registries, a stable specification (e.g., an RFC via the Independent Stream) is sufficient, removing the need for IETF evaluation of extensions lacking general demand. 'IETF Review' is still encouraged over 'IESG Approval' when there is doubt about whether it is needed.
