document: rfc-4420
kind: normative-requirement
summary: If more than one Attributes subobject appears between a pair of LSR-identifying subobjects in the RRO, only the first one (nearest the top of the stack) SHALL have meaning. All such subobjects MUST be forwarded unmodified by transit LSRs.
section: 7.3.1
rfc2119_level: MUST
topics:
    - mpls
    - realtime
