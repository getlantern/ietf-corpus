document: rfc-1570
kind: protocol-element
summary: Compound-Frames (Configuration Option Type 15) allows multiple PPP encapsulated packets with determinate lengths to be aggregated into a single frame. The PPP Protocol value of 1 is reserved as the Padding Protocol, signaling the end of data in a compound frame.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
