document: rfc-7219
kind: privacy-consideration
summary: A SEND SAVI device MUST delete binding anchor information as soon as a given address returns to NO_BIND state, except where needed for detection or tracing of actual source address spoofing. Binding data about non-spoofing hosts SHOULD NOT be logged.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - privacy
    - security
