document: rfc-5565
kind: normative-requirement
summary: Since softwires are set up dynamically as a byproduct of routing, key distribution MUST be done automatically via IKEv2 (RFC 4306). If no PKI is available, the IPsec Tunnel Authenticator sub-TLV from RFC 5566 MUST be used and validated before establishing an SA.
section: "13.3"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - vpn
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
