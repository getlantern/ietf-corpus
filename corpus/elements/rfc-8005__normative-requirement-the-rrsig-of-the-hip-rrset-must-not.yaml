document: rfc-8005
kind: normative-requirement
summary: The RRSIG of the HIP RRSet MUST NOT be misinterpreted as a certificate binding the HI and/or the HIT to the owner name. DNSSEC only provides data integrity and authenticity between the DNS server and the HIP node, not zone publisher trustworthiness.
section: "8"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
    - pkix
