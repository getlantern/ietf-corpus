document: rfc-7248
kind: normative-requirement
summary: Once the XMPP user's server receives a subscription request, it MUST deliver the presence subscription request to the XMPP user; if a subscription already exists in the roster, the XMPP server SHOULD auto-reply with a <presence/> stanza of type 'subscribed'.
section: 4.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
