document: rfc-3986
kind: protocol-element
summary: 'Unreserved characters—ALPHA, DIGIT, hyphen, period, underscore, and tilde—are allowed anywhere in a URI without percent-encoding: unreserved = ALPHA / DIGIT / "-" / "." / "_" / "~". URIs that differ only in the percent-encoding of unreserved characters are equivalent.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
