document: rfc-7075
kind: interoperability-note
summary: 'When S-NAPTR DNS-based dynamic peer discovery is used, realm-based redirection is already achievable by updating NAPTR resource records: the NAPTR RR for the desired application has an empty FLAG field and a REPLACEMENT field containing the new realm. This document''s mechanism applies only when S-NAPTR peer discovery is not used.'
section: "2"
topics:
