document: rfc-6826
kind: design-rationale
summary: For sender-only branches of a bidirectional tree, a MP2MP LSP is created; other branches receive the packets but drop them since they have no receivers. If this packet waste is undesirable, an alternative transport (e.g., a multipoint-to-point LSP or unicast to root) must be used.
section: "2.3"
topics:
    - mpls
    - multicast
    - routing
