document: rfc-2332
kind: security-consideration
summary: NHRP includes an Authentication Failure error code (11) for packets failing an authentication test, and defines an authentication extension mechanism. Without authentication, NHRP is vulnerable to spoofed Registration and Resolution messages that could redirect traffic or poison the NHS cache. The authentication extension (referenced in Section 5.3) provides per-packet integrity protection.
section: 5.2.7
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
