document: rfc-4340
kind: normative-requirement
summary: Options MUST be processed sequentially from the first option in the header. Options with unknown types MUST be ignored. Options with nonsensical lengths (less than 2 or beyond the options area) MUST be ignored, and any option space following them MUST likewise be ignored.
section: "5.8"
rfc2119_level: MUST
topics:
    - udp
    - congestion
