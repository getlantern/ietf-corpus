document: rfc-3458
kind: design-rationale
summary: 'Media type alone is insufficient to convey message context: a message with audio and image could be voice mail with diagrams, fax with commentary, or a fully multimedia message. Likewise, text and audio could be e-mail with an MP3 attachment or a voice message with a text header. An explicit header is needed.'
section: "3"
topics:
