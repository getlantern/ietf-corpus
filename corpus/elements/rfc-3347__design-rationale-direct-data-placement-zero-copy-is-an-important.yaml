document: rfc-3347
kind: design-rationale
summary: 'Direct data placement (''zero-copy'') is an important implementation goal: iSCSI data placed directly off the wire into allocated memory with no intermediate copies reduces memory bus loading, improves performance, and reduces NIC memory requirements. The protocol SHOULD permit such architectures.'
section: "3.2"
topics:
    - tcp
