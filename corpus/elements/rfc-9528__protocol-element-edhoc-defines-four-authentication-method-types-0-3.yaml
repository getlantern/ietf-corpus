document: rfc-9528
kind: protocol-element
summary: EDHOC defines four authentication method types (0–3) combining signature keys and static Diffie-Hellman keys for the Initiator and Responder. Method 0 uses signature keys for both parties; method 3 uses static DH keys for both; methods 1 and 2 are mixed. Value 23 is reserved.
section: "3.2"
topics:
    - crypto
    - security
