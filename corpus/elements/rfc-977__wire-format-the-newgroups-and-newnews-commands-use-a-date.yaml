document: rfc-977
kind: wire-format
summary: The NEWGROUPS and NEWNEWS commands use a date parameter formatted as 6 digits YYMMDD and a time parameter as 6 digits HHMMSS (24-hour clock). The optional token GMT specifies UTC; otherwise the server's local timezone is assumed. Century is inferred from the 2-digit year (86→1986, 30→2030).
section: 3.7.1
