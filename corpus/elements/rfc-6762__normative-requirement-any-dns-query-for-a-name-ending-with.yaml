document: rfc-6762
kind: normative-requirement
summary: Any DNS query for a name ending with '.local.' MUST be sent to the mDNS IPv4 link-local multicast address 224.0.0.251 or its IPv6 equivalent FF02::FB. Implementers MAY also look up such names concurrently via Unicast DNS.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - multicast
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
