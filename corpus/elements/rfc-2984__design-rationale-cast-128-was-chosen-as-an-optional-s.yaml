document: rfc-2984
kind: design-rationale
summary: 'CAST-128 was chosen as an optional S/MIME algorithm primarily for performance reasons: 3DES (the mandatory algorithm) may be too slow for some environments, and CAST-128 offers relatively high performance along with a variable key size from 40 to 128 bits.'
