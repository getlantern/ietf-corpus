document: rfc-2067
kind: normative-requirement
summary: Each HIPPI interconnection between a node and a switch SHALL consist of a pair of HIPPI links, one in each direction. If a link supports the 1600 Mb/s option (Cable B), the node's HIPPI-PH implementation SHALL also support 32-bit operation and SHALL be able to select or deselect the 1600 Mb/s option at each connection.
section: "4"
rfc2119_level: MUST
topics:
    - ip
