document: rfc-9684
kind: normative-requirement
summary: The receiver of the tpm20-challenge-response-attestation RPC response must verify that the certificate is for an active AK, confirmed by a third party to belong to an entity legitimately able to perform Attestation on the targeted TPM 2.0.
