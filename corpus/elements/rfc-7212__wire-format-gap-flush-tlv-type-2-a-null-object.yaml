document: rfc-7212
kind: wire-format
summary: 'GAP Flush TLV (Type=2): a null object (Length=0) instructing the receiver to flush all GAP data for the (sender, channel) pair. Application data in the same message is still processed normally; the flush does not apply to data in the carrying message.'
