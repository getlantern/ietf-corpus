document: rfc-8200
kind: security-consideration
summary: 'The Fragment extension header architecture has been revised to fix several security issues from RFC 2460: whole-datagram atomic fragments are now handled correctly, overlapping fragments must be silently discarded, all headers through the Upper-Layer header must be in the first fragment, and RH0 (Type 0 Routing Header) has been removed.'
section: "10"
topics:
