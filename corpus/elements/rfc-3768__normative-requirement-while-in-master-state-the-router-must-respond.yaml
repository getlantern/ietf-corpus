document: rfc-3768
kind: normative-requirement
summary: While in Master state, the router MUST respond to ARP requests for the virtual router IP addresses, MUST forward packets with the virtual router MAC as destination, MUST NOT accept packets addressed to the virtual router IPs if it is not the IP address owner, and MUST accept them if it is the owner.
section: 6.4.3
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
