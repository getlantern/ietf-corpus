document: rfc-4630
kind: security-consideration
summary: Different strings can have the same or visually similar representations due to similar glyphs, composed characters (e.g., e + combining acute = U+00E9), or language-specific composition rules. Issuers and relying parties must be aware that visual comparison of certificate names may mislead, enabling name confusion or substitution attacks.
section: "6"
topics:
