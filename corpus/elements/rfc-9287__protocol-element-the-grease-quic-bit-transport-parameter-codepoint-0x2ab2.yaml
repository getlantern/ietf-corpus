document: rfc-9287
kind: protocol-element
summary: The grease_quic_bit transport parameter (codepoint 0x2ab2) is defined for QUIC version 1 and can be sent by both client and server. It is sent with an empty value; receipt of a non-empty value MUST be treated as a TRANSPORT_PARAMETER_ERROR connection error.
section: "3"
topics:
