document: rfc-7904
kind: interoperability-note
summary: SIP messages carry SIP URIs of overlay endpoints in Via and Contact headers while communication continues via the RELOAD connection. A UA can redirect by setting an alternate Contact header field as in ordinary SIP.
section: "5.1"
