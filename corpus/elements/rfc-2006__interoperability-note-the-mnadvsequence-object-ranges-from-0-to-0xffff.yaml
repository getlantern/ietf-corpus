document: rfc-2006
kind: interoperability-note
summary: The mnAdvSequence object ranges from 0 to 0xffff (65535), but after reaching 0xffff it rolls over to 256 rather than 0, matching the Mobile IP protocol behavior that distinguishes a rollover from an agent reboot (sequence numbers 0–255 signal reboot).
section: "4"
topics:
