document: rfc-4208
kind: design-rationale
summary: In optical networks, deletion of a connection (e.g., removal of a cross-connect) may cause downstream nodes to perceive a failure (loss of frame, loss of light), triggering management alarms and potentially unwanted protection/restoration. The ADMIN_STATUS graceful deletion procedure addresses this by pre-signaling the intent to delete.
section: "6.1"
topics:
    - mpls
