document: rfc-4069
kind: design-rationale
summary: The MIB is structured as an optional extension to RFC 3728 (VDSL-LINE-MIB) rather than incorporating SCM-specific objects into the base MIB. This design separates line-code-independent TC layer management (in RFC 3728) from line-code-specific PMD layer management, allowing implementations to support only the line coding they use.
section: "2.1"
topics:
    - snmp
