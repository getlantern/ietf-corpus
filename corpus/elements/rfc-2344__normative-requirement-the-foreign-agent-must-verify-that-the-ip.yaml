document: rfc-2344
kind: normative-requirement
summary: The foreign agent MUST verify that the IP TTL field in a received Registration Request is 255; if not, it MUST reject the registration with code 76 (mobile node too distant) and MUST limit the rate of such replies to a maximum of one per second.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
