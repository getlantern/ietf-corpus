document: rfc-2883
kind: protocol-element
summary: 'A retransmit timeout caused by an entire window of lost ACKs is detectable via D-SACK: if the first ACK received following a timeout carries a D-SACK block, it indicates the retransmitted data was a duplicate, meaning the original data was received and only the ACKs were lost.'
section: "5.3"
topics:
    - tcp
