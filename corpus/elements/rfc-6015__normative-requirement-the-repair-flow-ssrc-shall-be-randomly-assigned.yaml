document: rfc-6015
kind: normative-requirement
summary: The repair flow SSRC SHALL be randomly assigned to enable multiplexing with source flows. SSRC collisions MUST be resolved per RFC 3550. When RTP Source and FEC Source are different hosts, they MUST share the same CNAME for source-repair flow association.
section: "4.2"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
