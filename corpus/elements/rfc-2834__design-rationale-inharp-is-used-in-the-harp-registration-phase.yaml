document: rfc-2834
kind: design-rationale
summary: 'InHARP is used in the HARP registration phase for a purpose not originally intended by the InARP protocol: to accomplish registration of port IP address mappings with a HARP server if one exists, or to detect hardware broadcast capability by checking whether a port receives its own InHARP_REQUEST.'
