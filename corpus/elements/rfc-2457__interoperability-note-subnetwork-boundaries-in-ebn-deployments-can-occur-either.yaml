document: rfc-2457
kind: interoperability-note
summary: Subnetwork boundaries in EBN deployments can occur either where adjacent nodes have different NETIDs or where nodes with the same NETID are configured to enforce a boundary; the SNANAU APPN MIB appnNnTopology group identifies these boundaries, which the EBN MIB then extends.
