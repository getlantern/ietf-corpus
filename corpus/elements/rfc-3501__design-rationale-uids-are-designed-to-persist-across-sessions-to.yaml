document: rfc-3501
kind: design-rationale
summary: UIDs are designed to persist across sessions to support disconnected and offline clients that need to resynchronize state from a previous session. The UIDVALIDITY mechanism is an acknowledged fallback for server environments where persistence is unavoidable (e.g., after mailbox deletion/recreation or non-IMAP reordering of the message store).
section: 2.3.1.1
topics:
    - email
