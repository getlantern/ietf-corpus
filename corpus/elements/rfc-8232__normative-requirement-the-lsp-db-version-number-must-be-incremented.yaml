document: rfc-8232
kind: normative-requirement
summary: The LSP-DB Version Number MUST be incremented by 1 for each successive change in the PCC's LSP-DB. It MUST start at 1 and may wrap around. Values 0 and 0xFFFFFFFFFFFFFFFF are reserved.
section: "3.2"
rfc2119_level: MUST
topics:
