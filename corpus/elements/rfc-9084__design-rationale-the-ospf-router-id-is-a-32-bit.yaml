document: rfc-9084
kind: design-rationale
summary: The OSPF Router ID is a 32-bit identifier unique within the domain but not necessarily a reachable address; for OSPFv2, loopback addresses are commonly used as Router IDs, but this assumption does not hold for IPv6 with OSPFv3. The separate Prefix Source Router Address Sub-TLV provides a confirmed reachable address via the Router Address TLV mechanism.
section: "1"
topics:
    - routing
