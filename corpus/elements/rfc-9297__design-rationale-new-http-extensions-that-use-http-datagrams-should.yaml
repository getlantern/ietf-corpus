document: rfc-9297
kind: design-rationale
summary: New HTTP extensions that use HTTP Datagrams SHOULD use the Capsule Protocol because failing to do so makes it harder to support HTTP versions other than HTTP/3 and prevents interoperability with intermediaries that only support the Capsule Protocol.
