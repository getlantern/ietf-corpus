document: rfc-3111
kind: normative-requirement
summary: A multihomed SA MUST NOT include an address in a SAAdvert sent on a zone where that address is not valid (e.g., no link-local address from Link 1 in a SAAdvert sent on Link 2).
section: 4.2.4.3
rfc2119_level: MUST NOT
topics:
