document: rfc-6066
kind: design-rationale
summary: The status_request extension allows OCSP certificate status to be delivered within the TLS handshake, saving round trips and conserving bandwidth on constrained networks compared to fetching CRLs separately. The server MAY choose not to send a CertificateStatus even after advertising support, providing flexibility.
section: "8"
topics:
