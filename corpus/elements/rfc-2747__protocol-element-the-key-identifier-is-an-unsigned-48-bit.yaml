document: rfc-2747
kind: protocol-element
summary: The Key Identifier is an unsigned 48-bit number that MUST be unique for a given sender. Combined with the sending system's IP address, it uniquely identifies the security association. Locally unique values can be generated from the sending interface address (IP, MAC, or LIH) and a key number.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
