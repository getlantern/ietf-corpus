document: rfc-9263
kind: security-consideration
summary: A misbehaving node within the SFC-enabled domain may alter Context Header content, leading to service disruption. RFC 9145 specifies integrity protection and encryption for NSH metadata; MAC verification must precede any use of Context Header data.
section: "5"
topics:
