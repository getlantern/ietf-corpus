document: rfc-7296
kind: protocol-element
summary: The Security Association (SA) payload contains one or more Proposal substructures, each identifying a protocol (IKE=1, AH=2, ESP=3), an SPI, and one or more Transform substructures (Transform Type + Transform ID) for algorithm negotiation. An initiator proposes multiple suites in mix-and-match fashion; the responder selects exactly one.
