document: rfc-9636
kind: wire-format
summary: Leap-second records are 8 octets in v1 (4-octet occur + 4-octet corr) and 12 octets in v2+ (8-octet occur + 4-octet corr). The occur field is a UNIX leap time value for the correction event; the corr field is the signed LEAPCORR value on or after that occurrence.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
