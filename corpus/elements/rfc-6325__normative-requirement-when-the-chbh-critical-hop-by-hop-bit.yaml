document: rfc-6325
kind: normative-requirement
summary: When the CHbH (Critical Hop-by-Hop) bit in the TRILL options area is set, transit RBridges that do not support all critical hop-by-hop options present MUST drop the frame. When CItE (Critical Ingress-to-Egress) or CHbH is set, egress RBridges that do not support all critical options present MUST drop the frame.
section: "3.8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
