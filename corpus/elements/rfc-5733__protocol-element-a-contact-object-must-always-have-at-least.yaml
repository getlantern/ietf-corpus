document: rfc-5733
kind: protocol-element
summary: 'A contact object MUST always have at least one associated status value. Status values are prefixed ''client'' when settable by the sponsoring client, ''server'' when settable by the server, or unprefixed when server-managed. Valid values include: clientDeleteProhibited, clientTransferProhibited, clientUpdateProhibited, serverDeleteProhibited, serverTransferProhibited, serverUpdateProhibited, linked, ok, pendingCreate, pendingDelete, pendingTransfer, pendingUpdate.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
