document: rfc-3977
kind: protocol-element
summary: The CAPABILITIES command (mandatory) returns a multi-line list of capability lines. Each line begins with a capability label keyword followed by optional arguments. VERSION MUST be the first line and MUST be advertised by all servers; it carries the numeric NNTP version number(s) supported.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
