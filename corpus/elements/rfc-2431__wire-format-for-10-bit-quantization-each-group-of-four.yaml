document: rfc-2431
kind: wire-format
summary: For 10-bit quantization, each group of four samples (Cb, Y, Cr, Y) MUST be encoded into a 40-bit word (five octets) prior to transmission; sample order is identical to 8-bit quantization and octets are transmitted in network byte order.
