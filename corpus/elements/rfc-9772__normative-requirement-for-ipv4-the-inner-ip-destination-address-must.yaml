document: rfc-9772
kind: normative-requirement
summary: For IPv4, the inner IP destination address MUST be set to the loopback address 127.0.0.1/32. For IPv6, the destination address MUST be selected from the Dummy IPv6 Prefix 100:0:0:1::/64 (RFC 9780).
section: "2.3"
rfc2119_level: MUST
topics:
