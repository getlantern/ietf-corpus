document: rfc-8311
kind: design-rationale
summary: Using ECT(1) versus ECT(0) to distinguish traffic classes at network nodes is the proposed means of enabling very-shallow-queue AQM experiments (e.g., L4S) without harming conventional ECT(0) traffic. Differentiating by codepoint avoids requiring network nodes to use other per-flow state to identify experimental traffic.
section: "4.2"
topics:
