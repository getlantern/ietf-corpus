document: rfc-3633
kind: normative-requirement
summary: The delegating router MUST include an IA_PD Prefix option or options (in an IA_PD option) in Reply messages sent to a requesting router. For prefixes not found in the requesting router's binding entry, the delegating router returns the prefix with lifetimes of 0.
section: "12.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
