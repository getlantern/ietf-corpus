document: rfc-9565
kind: protocol-element
summary: The tcpControlBits IPFIX Information Element (ElementID 6) is an unsigned16 with flags semantics that records all TCP control bits observed for the packets of a Flow. A bit is set to 1 if any observed packet in the Flow has the corresponding TCP control bit set to 1; otherwise it is cleared to 0.
