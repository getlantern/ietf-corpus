document: rfc-1772
kind: interoperability-note
summary: When injecting BGP-4 NLRI into EGP2 or BGP-3, a potential information explosion can occur if an IP prefix from BGP-4 denotes a set of consecutive class A/B/C networks; injection of subnets requires the corresponding classful network to be injected instead.
section: "8.1"
topics:
    - bgp
    - routing
