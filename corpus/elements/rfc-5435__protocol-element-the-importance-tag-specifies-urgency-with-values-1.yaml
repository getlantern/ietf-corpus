document: rfc-5435
kind: protocol-element
summary: The :importance tag specifies urgency with values "1" (high), "2" (normal, default), and "3" (low). If the notification method does not support importance, this parameter MUST be ignored. Notification methods SHOULD use recipient availability state to filter low-importance notifications.
section: "3.4"
topics:
    - email
