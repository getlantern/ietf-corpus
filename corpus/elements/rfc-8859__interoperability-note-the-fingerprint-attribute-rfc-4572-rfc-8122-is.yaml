document: rfc-8859
kind: interoperability-note
summary: 'The fingerprint attribute (RFC 4572/RFC 8122) is TRANSPORT: when multiple DTLS-based "m=" lines are bundled, the fingerprint value from the "m=" line chosen for transport setup is used. This is consistent with DTLS operating at the transport layer rather than per-media-stream.'
section: "5.36"
topics:
