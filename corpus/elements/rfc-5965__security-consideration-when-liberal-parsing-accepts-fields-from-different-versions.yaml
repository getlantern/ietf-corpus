document: rfc-5965
kind: security-consideration
summary: When liberal parsing accepts fields from different versions or transitional states, attackers can craft reports making conflicting claims (e.g., presenting both historic 'Received-Date' and current 'Arrival-Date') to exploit parsing ambiguity. Such choices must be implemented with extreme caution.
section: "8.9"
topics:
    - email
    - security
