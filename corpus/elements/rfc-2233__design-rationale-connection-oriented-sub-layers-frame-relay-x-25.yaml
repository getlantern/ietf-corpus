document: rfc-2233
kind: design-rationale
summary: Connection-oriented sub-layers (Frame Relay, X.25) are strongly recommended NOT to create one ifTable row per virtual circuit, to avoid row proliferation with redundant information. An exception is warranted only in unusual cases (e.g., PPP over an X.25 VC), and requires compelling rationale in the media-specific MIB.
section: 3.1.3
topics:
    - snmp
