document: rfc-4341
kind: normative-requirement
summary: The sender SHOULD NOT attempt to renegotiate the Ack Ratio more than once per round-trip time. It MAY rate-limit Ack Ratio renegotiations to once every four or five RTTs or once every second or two.
section: 6.1.2
rfc2119_level: SHOULD NOT
topics:
