document: rfc-6066
kind: normative-requirement
summary: A server implementing server_name MUST NOT accept a session resumption request if the server_name extension contains a different name than the one used in the original handshake; instead it MUST perform a full handshake. When resuming, the server MUST NOT include a server_name extension in the server hello.
section: "3"
rfc2119_level: MUST NOT
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
