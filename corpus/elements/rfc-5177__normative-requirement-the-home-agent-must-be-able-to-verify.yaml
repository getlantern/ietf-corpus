document: rfc-5177
kind: normative-requirement
summary: The Home Agent MUST be able to verify that the Mobile Router is authorized to provide mobility service for the Mobile Networks in the Registration Request before anchoring those prefixes. Forwarding MUST NOT be set up without successful authorization.
section: "10"
rfc2119_level: MUST
