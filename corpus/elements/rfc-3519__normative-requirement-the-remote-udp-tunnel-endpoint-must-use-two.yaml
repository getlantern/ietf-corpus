document: rfc-3519
kind: normative-requirement
summary: The remote UDP tunnel endpoint MUST use two-way keepalives (ICMP Echo Request/Reply). The mobile node MUST NOT use a keepalive interval less than 10 seconds, even when compensating for NAT mapping loss.
section: "4.9"
rfc2119_level: MUST
topics:
    - nat
    - mobility
