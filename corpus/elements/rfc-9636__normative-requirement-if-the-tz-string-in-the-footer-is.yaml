document: rfc-9636
kind: normative-requirement
summary: If the TZ string in the footer is non-empty and one or more transitions appear in the v2+ data block, the TZ string MUST be consistent with the last v2+ transition — evaluating the TZ string at the last transition time must yield the same time type as specified in the last transition.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
