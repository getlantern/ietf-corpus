document: rfc-9050
kind: security-consideration
summary: A malicious or compromised PCE has complete control to download/remove labels and can cause LSPs to behave inappropriately. It is RECOMMENDED that PCECC extensions be activated only on mutually authenticated and encrypted PCEP sessions using TLS (RFC 8253) per BCP 195.
section: "8.1"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
