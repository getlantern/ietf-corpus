document: rfc-4203
kind: wire-format
summary: Link Protection Type sub-TLV (type 14, length 4 octets) encodes protection capabilities in the first octet as a bit vector (0x01=Extra Traffic, 0x02=Unprotected, 0x04=Shared, 0x08=Dedicated 1:1, 0x10=Dedicated 1+1, 0x20=Enhanced). The remaining 3 octets are reserved.
section: "1.2"
