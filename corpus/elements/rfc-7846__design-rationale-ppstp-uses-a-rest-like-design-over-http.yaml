document: rfc-7846
kind: design-rationale
summary: PPSTP uses a REST-like design over HTTP to leverage existing HTTP implementations and infrastructure, with messages encoded in JSON (RFC 7159) and using the HTTP POST method to send request parameters. This aligns with the HTTP messaging model (currently version 1.1) and is intended to also support future HTTP versions.
section: "2.2"
topics:
