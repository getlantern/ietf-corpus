document: rfc-6515
kind: interoperability-note
summary: This document explicitly rejects the approach taken in RFC 4659 and RFC 4798, which required IPv4 PE addresses to be represented as IPv6-mapped IPv4 addresses when occurring in routes with IPv6 customer addresses. Instead, this specification follows the approach of RFC 4684 and RFC 5549, using native address lengths to distinguish IPv4 from IPv6 PE addresses.
section: "1.1"
topics:
    - bgp
    - multicast
    - vpn
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
