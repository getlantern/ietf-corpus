document: rfc-9959
kind: normative-requirement
summary: On entry to the Safe Retreat Phase, the CWND MUST be reduced to no more than PipeSize/2 to avoid persistent starvation of competing flows. The CWND MUST NOT be increased while in the Safe Retreat Phase.
section: "3.5"
rfc2119_level: MUST
topics:
    - congestion
