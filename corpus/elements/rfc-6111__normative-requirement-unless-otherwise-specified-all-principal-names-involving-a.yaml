document: rfc-6111
kind: normative-requirement
summary: Unless otherwise specified, all principal names involving a well-known realm name are reserved; if such a reserved principal name is used but not supported and authentication is rejected, the error code MUST be KRB_AP_ERR_PRINCIPAL_RESERVED.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
