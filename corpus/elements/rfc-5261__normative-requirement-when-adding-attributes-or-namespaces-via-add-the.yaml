document: rfc-5261
kind: normative-requirement
summary: When adding attributes or namespaces via <add>, the child node of the <add> element MUST be a single text node. The located target node MUST be an element. For other additions, <add> MAY contain any mixture of element, text, comment, or processing instruction nodes.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
