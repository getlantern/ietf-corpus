summary: Error handling in IKE_INTERMEDIATE follows RFC 7296 Sections 2.21.1 and 2.21.2 (initial exchange error handling), with the qualification that not all error notifications apply (e.g., authentication errors are generally only applicable to IKE_AUTH).
