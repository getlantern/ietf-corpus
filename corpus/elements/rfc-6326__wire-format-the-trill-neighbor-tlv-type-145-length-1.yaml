document: rfc-6326
kind: wire-format
summary: The TRILL Neighbor TLV (type 145, length 1+9*n) replaces the IS Neighbor TLV in TRILL IIH PDUs. It has a 1-byte header with S (Smallest) and L (Largest) flags, followed by n neighbor records each containing a 1-byte F (failed MTU) flag, a 2-byte MTU, and a 6-byte MAC address.
section: "2.5"
topics:
    - routing
