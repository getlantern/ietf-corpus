document: rfc-8826
kind: design-rationale
summary: ZRTP Short Authentication Strings (SAS) do not offer a practical solution against a compromised calling service because voice cloning systems can mimic a speaker's voice to forge SAS confirmation, and users are unlikely to voluntarily perform the SAS exchange. Additionally, key continuity after initial SAS verification is problematic for the reasons in Section 4.3.2.1.
section: 4.3.2.2
topics:
    - webrtc
    - security
    - crypto
    - voip
