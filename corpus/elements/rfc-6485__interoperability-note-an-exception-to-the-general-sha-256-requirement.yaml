document: rfc-6485
kind: interoperability-note
summary: 'An exception to the general SHA-256 requirement exists: Certification Authorities MUST use SHA-1 when generating authority and subject key identifiers as specified in RFC 6487. This is the only permitted use of SHA-1 in the RPKI algorithm profile.'
section: "2"
topics:
