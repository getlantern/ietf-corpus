document: rfc-2251
kind: protocol-element
summary: The ModifyDNRequest carries entry (DN to rename), newrdn (new RDN), deleteoldrdn (BOOLEAN controlling whether old RDN values are removed), and optional newSuperior (DN of new parent, enabling subtree moves). Clients MUST NOT expect arbitrary cross-server entry movements to succeed.
section: "4.9"
