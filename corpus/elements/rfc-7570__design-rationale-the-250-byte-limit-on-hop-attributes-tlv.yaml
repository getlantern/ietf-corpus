document: rfc-7570
kind: design-rationale
summary: The 250-byte limit on Hop Attributes TLV size is imposed by the ERO subobject size constraints. The document notes that known forthcoming TLVs (WSON_SIGNALING, Objective Function, Metric) are not expected to exceed this limit, justifying the choice not to define a fragmentation mechanism.
