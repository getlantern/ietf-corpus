document: rfc-6794
kind: interoperability-note
summary: Intermediaries MAY fall back to existing mechanisms such as rejecting non-policy-compliant sessions with a 488 response for backward compatibility with UAs that do not support this specification. UAs lacking support receive the same behavior as today, though this approach has drawbacks and explicit policy signaling is RECOMMENDED.
