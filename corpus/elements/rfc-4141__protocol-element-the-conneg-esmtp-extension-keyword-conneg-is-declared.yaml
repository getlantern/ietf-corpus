document: rfc-4141
kind: protocol-element
summary: The CONNEG ESMTP extension (keyword 'CONNEG') is declared in EHLO and added as a parameter to RCPT-TO. The server responds with a multi-line listing of content capabilities that can be received on behalf of the addressed recipient, formatted per the [SYN] filter syntax.
