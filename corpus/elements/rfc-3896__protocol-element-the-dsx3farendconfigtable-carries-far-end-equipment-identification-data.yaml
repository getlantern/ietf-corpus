summary: The dsx3FarEndConfigTable carries far-end equipment identification data reported via C-bits in C-bit Parity DS3 framing. Objects include dsx3FarEndEquipCode (10 chars), dsx3FarEndLocationIDCode (11 chars), dsx3FarEndFrameIDCode (10 chars), dsx3FarEndUnitCode (6 chars), and dsx3FarEndFacilityIDCode (38 chars).
