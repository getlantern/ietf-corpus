document: rfc-6089
kind: protocol-element
summary: The Flow Identification Mobility Option (Option Type 45) carries a 16-bit FID, a 16-bit FID-PRI priority field, an 8-bit Status field, and optional sub-options. It is included in Binding Update and Binding Acknowledgement messages to install or report flow binding policies.
