document: rfc-8010
kind: protocol-element
summary: 'Delimiter tags separate major protocol sections. Defined values: 0x00 (Reserved), 0x01 (operation-attributes-tag), 0x02 (job-attributes-tag), 0x03 (end-of-attributes-tag), 0x04 (printer-attributes-tag), 0x05 (unsupported-attributes-tag). Tags 0x06-0x0f are reserved for future group extensions.'
