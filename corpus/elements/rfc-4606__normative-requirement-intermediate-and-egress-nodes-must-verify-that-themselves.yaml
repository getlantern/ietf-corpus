document: rfc-4606
kind: normative-requirement
summary: Intermediate and egress nodes MUST verify that themselves and the LSP interfaces can support the requested Multiplier value. If the MT field is received with a zero value, the node MUST generate a PathErr (RSVP-TE) or NOTIFICATION (CR-LDP) message.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
