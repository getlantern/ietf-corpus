document: rfc-4918
kind: normative-requirement
summary: All DAV-compliant resources MUST support the PROPFIND method and the propfind XML element along with all XML elements defined for use with that element. Servers MUST support Depth '0' and '1' requests and SHOULD support 'infinity' requests.
section: "9.1"
rfc2119_level: MUST
topics:
