document: rfc-3110
kind: design-rationale
summary: MD5 was replaced by SHA1 because continued cryptographic research revealed hints of weakness in MD5. SHA1 produces a larger hash and is generally acknowledged to be stronger, making it appropriate for high-value DNS zones such as root and top-level domains.
section: "1"
topics:
