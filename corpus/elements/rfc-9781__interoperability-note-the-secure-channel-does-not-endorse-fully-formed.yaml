document: rfc-9781
kind: interoperability-note
summary: The Secure Channel does not endorse fully formed CWTs transferred through it — the COSE envelope of a CWT shields the CWT Claims Set from the channel's endorsement. This contrasts with UCCS, which is fully endorsed by the Secure Channel context.
section: "4"
