document: rfc-3779
kind: design-rationale
summary: The encoding rules were designed to produce a unique canonical encoding so that two extension instances can be compared for equality octet-by-octet, to achieve minimal size, and to allow relying parties to use one-pass subset-checking algorithms during path validation without needing to sort or handle adjacent/overlapping/subsumed ranges.
