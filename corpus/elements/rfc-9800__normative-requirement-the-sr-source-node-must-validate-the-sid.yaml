document: rfc-9800
kind: normative-requirement
summary: The SR source node MUST validate the SID structure of each CSID-flavor SID in the segment list before compression, regardless of whether the segment list is explicitly configured, locally computed, or advertised by a controller. A SID with an unknown or invalid structure MUST be treated as uncompressible.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
