document: rfc-9578
kind: security-consideration
summary: All security properties established by VOPRF (RFC 9497) and blind RSA (RFC 9474) carry over to the Privacy Pass use case. Notable cross-cutting concerns include Issuer Public Key rotation, key consistency (as described in the key-consistency draft), and Issuer selection.
