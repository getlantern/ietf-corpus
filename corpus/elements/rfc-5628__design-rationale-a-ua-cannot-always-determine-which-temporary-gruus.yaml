document: rfc-5628
kind: design-rationale
summary: A UA cannot always determine which temporary GRUUs are valid from REGISTER responses or RFC 3680 notifications alone. This extension provides the 'first-cseq' attribute so a UA can definitively identify and discard invalidated temporary GRUUs.
section: "1"
topics:
