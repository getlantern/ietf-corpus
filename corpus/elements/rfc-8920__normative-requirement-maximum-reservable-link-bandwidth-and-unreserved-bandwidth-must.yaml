document: rfc-8920
kind: normative-requirement
summary: Maximum reservable link bandwidth and unreserved bandwidth MUST use the OSPFv2 TE Opaque LSA and OSPFv3 Intra-Area-TE-LSA and MUST NOT be advertised in the ASLA sub-TLV, as these are not application-specific attributes.
section: 12.2.4
rfc2119_level: MUST NOT
