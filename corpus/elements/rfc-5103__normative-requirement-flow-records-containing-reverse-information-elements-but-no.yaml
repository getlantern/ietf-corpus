document: rfc-5103
kind: normative-requirement
summary: Flow Records containing Reverse Information Elements but no Directional Key Fields are illegal and MUST NOT be sent by the Exporting Process. The Collecting Process SHOULD drop such records and SHOULD log their receipt.
