document: rfc-4918
kind: normative-requirement
summary: Servers MUST return authorization errors in preference to other errors. This avoids leaking information about protected resources (e.g., a client finding a hidden resource exists by seeing a 423 Locked response).
section: "8.1"
rfc2119_level: MUST
topics:
    - http
    - security
