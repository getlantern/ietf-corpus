document: rfc-6651
kind: security-consideration
summary: Fraudulent DKIM-Signature fields that omit 'r=' cannot be detected or reported by this mechanism. Extending detection to signatures without 'r=' would create a DoS vector (Verifiers would always query the reporting TXT record), so such reporting is intentionally unsupported.
section: "8.4"
topics:
    - email
    - security
