document: rfc-6940
kind: protocol-element
summary: The Attach method uses ICE to establish direct RELOAD connections through NATs. The initiating node gathers ICE candidates and routes an Attach request through the overlay; the responding node returns its candidates in the response and ICE connectivity checks then proceed between the two nodes.
section: 6.5.1
topics:
    - nat
