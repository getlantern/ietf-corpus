document: rfc-6420
kind: normative-requirement
summary: 'Validity checks on a received PIM MT-ID: only the last of multiple MT-ID attributes is accepted; if the Length field is not 2 the rest of the Join message including the current (S,G)/(*,G) entry MUST be ignored; if the Value is 0 the attribute is ignored but processing continues.'
section: 4.2.3
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
