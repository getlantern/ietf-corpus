document: rfc-6222
kind: protocol-element
summary: 'The unique identifier generation procedure (Section 5) uses: (1) current 64-bit NTP timestamp, (2) modified EUI-64 or MAC-derived identifier, (3) for per-session CNAMEs, also the initial SSRC plus source/destination IP addresses and ports, all concatenated and hashed with SHA-256 to yield a 256-bit output.'
section: "5"
