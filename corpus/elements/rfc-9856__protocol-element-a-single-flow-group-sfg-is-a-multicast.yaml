document: rfc-9856
kind: protocol-element
summary: A Single Flow Group (SFG) is a multicast group carrying a single flow where multiple redundant G-sources may transmit identical traffic. An SFG is represented as (*,G) for any source or (S,G) where S is a prefix of any length; a source is deemed redundant if its address matches the prefix.
section: "2"
topics:
    - routing
    - mpls
    - multicast
