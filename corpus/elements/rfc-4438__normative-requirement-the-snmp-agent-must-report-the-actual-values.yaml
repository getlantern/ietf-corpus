document: rfc-4438
kind: normative-requirement
summary: The SNMP agent MUST report the actual values of registered objects, even if incorrectly formatted. This is why t11NsNodeIpAddress and t11NsPortIpAddress use OCTET STRING syntax rather than InetAddress, to allow representation of invalid values.
section: "5.5"
rfc2119_level: MUST
topics:
    - snmp
