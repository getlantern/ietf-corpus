document: rfc-1661
kind: normative-requirement
summary: The Restart timer MUST be configurable but SHOULD default to three seconds. Max-Terminate MUST be configurable but SHOULD default to two transmissions. Max-Configure MUST be configurable but SHOULD default to ten transmissions. Max-Failure MUST be configurable but SHOULD default to five transmissions.
section: "4.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
