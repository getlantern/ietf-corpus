document: rfc-2730
kind: wire-format
summary: Options are encoded as a 2-octet option code followed by a 2-octet option length, followed by the specified number of octets. The options field MUST end with the End option (code 0, length 0). Any message whose options field does not conform to this syntax MUST be ignored.
section: 2.1.5
topics:
    - multicast
