document: rfc-4836
kind: protocol-element
summary: ifMauHCFalseCarriers is a 64-bit Counter64 counting false carrier events during IDLE in 100BASE-X and 1000BASE-X links. It is provided because the 32-bit ifMauFalseCarriers counter (which can increment at up to once per 10 µs for 1000BASE-X) rolls over very quickly; management stations are advised to poll the 64-bit version to avoid loss of information.
section: "4"
