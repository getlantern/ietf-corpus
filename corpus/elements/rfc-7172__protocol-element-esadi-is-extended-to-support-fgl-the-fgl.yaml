document: rfc-7172
kind: protocol-element
summary: 'ESADI is extended to support FGL: the FGL to which an ESADI packet applies is indicated only by the Inner.Label of the packet, and no indication of the FGL is allowed within the ESADI payload, mirroring the VL approach.'
section: "4.7"
topics:
    - routing
