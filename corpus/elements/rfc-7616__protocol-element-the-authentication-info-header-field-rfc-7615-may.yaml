document: rfc-7616
kind: protocol-element
summary: The Authentication-Info header field (RFC 7615) MAY carry nextnonce, qop, rspauth, cnonce, and nc in successful responses. The rspauth parameter provides mutual authentication by proving the server knows the user's secret.
section: "3.5"
