document: rfc-6426
kind: interoperability-note
summary: The non-IP encapsulation procedures defined in this document apply exclusively to MPLS-TP transport paths. For non-MPLS-TP LSPs where IP addressing is used, the procedures from RFC 4379 MUST be used without the extensions defined here.
