document: rfc-5152
kind: security-consideration
summary: When signaling inter-domain RSVP-TE LSPs, operators may use RSVP-TE security features (RFC 3209), requiring domain coordination to share cryptographic keys (RFC 2747, RFC 3097) with sufficiently frequent key changes. Fast Reroute protection (RFC 4090) requires additional synchronization since the Merge Point and PLR must also share keys.
section: "7"
topics:
    - security
    - routing
    - realtime
    - mpls
    - crypto
