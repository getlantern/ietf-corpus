document: rfc-2814
kind: normative-requirement
summary: When an L3 device forwards a PATH or RESV message from a managed L2 domain onto an interface outside that domain, it MUST remove the TCLASS, LAN_NHOP, RSVP_HOP_L2, and LAN_LOOPBACK objects before forwarding.
section: 4.2.2.8
rfc2119_level: MUST
