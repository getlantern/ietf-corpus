document: rfc-4639
kind: normative-requirement
summary: The CM and CMTS MUST provide support for notification message throttling, including both rate-based throttling (cease/resume based on message rate vs. threshold) and count-based limiting (cease when total count exceeds a threshold over a measurement interval).
section: 3.2.3
rfc2119_level: MUST
topics:
    - snmp
