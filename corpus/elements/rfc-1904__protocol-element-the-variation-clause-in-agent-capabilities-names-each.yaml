document: rfc-1904
kind: protocol-element
summary: The VARIATION clause in AGENT-CAPABILITIES names each object or notification that the agent implements in a variant or restricted fashion. It supports SYNTAX, WRITE-SYNTAX, ACCESS, CREATION-REQUIRES, and DEFVAL subclauses to precisely document deviations from the MIB definition.
