document: rfc-8285
kind: normative-requirement
summary: In the one-byte header form, the local identifier value 15 is reserved and MUST NOT be used. If ID 15 is encountered, its length field MUST be ignored, and processing of the entire extension MUST terminate at that point.
section: "4.2"
rfc2119_level: MUST NOT
