document: rfc-9444
kind: security-consideration
summary: ACME server policy for subdomain issuance should consider whether the claimed identifier is syntactically valid, whether the domain name is on the Public Suffix List or is a high-value name, and whether the key in the CSR is sufficiently strong, as per RFC 8555 Section 10.5.
section: "7.3"
topics:
    - acme
    - security
    - pkix
