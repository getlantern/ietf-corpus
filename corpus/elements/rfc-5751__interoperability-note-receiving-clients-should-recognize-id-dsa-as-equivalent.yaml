document: rfc-5751
kind: interoperability-note
summary: Receiving clients SHOULD recognize id-dsa as equivalent to id-dsa-with-sha1, but sending clients MUST use id-dsa-with-sha1 when using DSA. S/MIME v3 clients may use id-dsa as the AlgorithmIdentifier, which creates a backward-compatibility concern for v3.2 implementations.
section: "2.2"
topics:
    - email
    - crypto
