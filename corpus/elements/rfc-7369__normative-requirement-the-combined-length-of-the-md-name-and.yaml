document: rfc-7369
kind: normative-requirement
summary: The combined length of the MD Name and Short MA Name MUST be less than or equal to 44 bytes; violation MUST generate 'OAM Problem/Name Length Problem'. An undefined name format MUST generate the corresponding 'Unknown MD/MA Name Format' error.
section: 3.3.1
rfc2119_level: MUST
