document: rfc-6736
kind: protocol-element
summary: The NAT-External-Port-Style AVP (AVP Code 604, Enumerated) specifies the style of external port selection (e.g., consecutive or random) for NAT bindings where the external port is unspecified. It applies only to bindings within the same NAT-Control-Install whose NAT-External-Address or Port AVPs are absent.
section: 8.7.10
topics:
