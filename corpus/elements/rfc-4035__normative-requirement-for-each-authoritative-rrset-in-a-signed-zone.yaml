document: rfc-4035
kind: normative-requirement
summary: For each authoritative RRset in a signed zone there MUST be at least one RRSIG record whose owner name, class, type, TTL, Labels field, Signer's Name, algorithm, and Key Tag all match the RRset and identify a zone key DNSKEY record at the zone apex.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
