document: rfc-4172
kind: wire-format
summary: iFCP frames are fibre channel frames encapsulated per the FC Frame Encapsulation specification. The encapsulation header includes an iFCP flags field containing the TRP bit (set to one for address transparent mode frames). The encapsulated FC frame consists of a 24-byte header, 0–2112 bytes of payload, and a 32-bit CRC, bracketed by SOF and EOF delimiter words.
section: 5.3.1
