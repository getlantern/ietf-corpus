document: rfc-1293
kind: normative-requirement
summary: A requesting station MUST format an InARP request by inserting its source hardware and protocol addresses, the known target hardware address, and zero-filling the target protocol address field. The packet is then sent directly to the target station without broadcasting.
section: "7"
rfc2119_level: MUST
topics:
    - ip
