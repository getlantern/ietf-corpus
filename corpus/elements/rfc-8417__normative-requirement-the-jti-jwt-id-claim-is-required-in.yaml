document: rfc-8417
kind: normative-requirement
summary: The 'jti' (JWT ID) claim is REQUIRED in every SET. The identifier MUST be unique within a particular event feed and MAY be used by clients to track whether a particular SET has already been received.
section: "2.2"
rfc2119_level: REQUIRED
