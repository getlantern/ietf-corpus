document: rfc-6514
kind: normative-requirement
summary: Each VRF on a PE MUST have a VRF Route Import Extended Community (C-multicast Import RT), and a PE originating unicast VPN-IP routes MUST include this community in the BGP Update unless it is known a priori that no addresses in the route could be multicast sources or C-RP.
section: "7"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
