document: rfc-7904
kind: normative-requirement
summary: An existing RELOAD connection between peers MUST NOT be used for SIP messages unless it is a SIP connection. A previously established SIP connection MAY be reused for a new call.
section: "5.1"
rfc2119_level: MUST NOT
topics:
