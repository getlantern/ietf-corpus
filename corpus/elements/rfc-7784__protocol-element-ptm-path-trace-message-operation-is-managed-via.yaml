document: rfc-7784
kind: protocol-element
summary: PTM (Path Trace Message) operation is managed via trillOamMepTxPtmStatus (boolean trigger), trillOamMepTxPtmMessages (count 1..1024), and trillOamMepTxPtmSeqNumber. The PTM is first sent with HC=1 and retransmitted with incrementing HC until a response arrives or the configured maximum is reached.
