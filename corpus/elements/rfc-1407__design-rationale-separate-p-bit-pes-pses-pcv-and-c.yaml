document: rfc-1407
kind: design-rationale
summary: Separate P-bit (PES, PSES, PCV) and C-bit (CES, CSES, CCV) near-end counters were introduced to achieve symmetry with the far-end statistics available via C-bits in C-bit Parity and SYNTRAN applications. The original ES and SES counters were renamed to PES and PSES to reflect their P-bit basis.
