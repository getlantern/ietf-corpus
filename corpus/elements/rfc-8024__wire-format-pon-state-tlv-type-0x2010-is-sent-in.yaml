document: rfc-8024
kind: wire-format
summary: PON State TLV (Type=0x2010) is sent in the RG Application Data message to report PON port states. It contains an 8-octet ROID, a 4-octet Local PON Port State, and a 4-octet Remote PON Port State; the least-significant bit of each state field indicates fault (1=fault, 0=normal).
section: 2.1.4
topics:
