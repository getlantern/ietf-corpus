summary: The FEC header for the fixed L/D variant (R=0, F=1) contains a 16-bit length recovery, a 32-bit TS recovery, a 16-bit SN base per SSRC, an 8-bit L (columns) field, and an 8-bit D (rows) field, giving a maximum value of 255 for each.
