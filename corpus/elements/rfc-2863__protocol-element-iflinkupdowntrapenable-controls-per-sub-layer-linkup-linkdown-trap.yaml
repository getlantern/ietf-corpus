document: rfc-2863
kind: protocol-element
summary: ifLinkUpDownTrapEnable controls per-sub-layer linkUp/linkDown trap generation. By default, only the lowest sub-layer of an interface stack should generate traps, limiting trap volume to one per interface per link event.
section: 3.1.9
topics:
