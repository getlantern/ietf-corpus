document: rfc-4560
kind: security-consideration
summary: The MIB objects defined can expose sensitive information such as network topology (via traceroute hops) and DNS resolution results. Implementations should use SNMPv3 with VACM to restrict read access to the results tables, in addition to restricting write access to control tables.
section: "5"
topics:
    - security
    - snmp
    - privacy
