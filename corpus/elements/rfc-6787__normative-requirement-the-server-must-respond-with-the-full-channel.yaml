document: rfc-6787
kind: normative-requirement
summary: The server MUST respond with the full Channel-Identifier (including the resource type and a difficult-to-guess, unambiguous string) in the 'channel' attribute of the SDP answer. The server MUST ensure the channel identifier does not clash with any other MRCP channel currently allocated on that server.
section: "4.2"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
