document: rfc-862
kind: normative-requirement
summary: A UDP echo server MUST listen for datagrams on UDP port 7. When a datagram is received, the data MUST be sent back in an answering datagram to the originating source.
section: UDP Based Echo Service
rfc2119_level: MUST
topics:
    - udp
