document: rfc-9390
kind: interoperability-note
summary: If a Diameter node does not support session grouping, it can fall back to single-session operation by ignoring the optional group AVPs and processing the command solely for the session identified in the mandatory Session-Id AVP. The response MUST NOT include any group identifier.
section: 4.4.4
rfc2119_level: MUST NOT
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
