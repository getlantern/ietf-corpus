document: rfc-3585
kind: security-consideration
summary: AcceptCredentialFrom specifies which CredentialManagementServices (e.g., CAs, Kerberos KDCs) are trusted to certify peer credentials. If a peer's credential is not issued by a listed service or its trust hierarchy, the CredentialFilterEntry does not match, preventing unauthorized peers from satisfying policy conditions.
section: "5.7"
topics:
    - ipsec
    - security
    - pkix
