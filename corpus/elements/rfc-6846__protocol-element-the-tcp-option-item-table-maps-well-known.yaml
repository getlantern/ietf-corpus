document: rfc-6846
kind: protocol-element
summary: 'The TCP option item table maps well-known options to fixed indices: NOP=0, EOL=1, MSS=2, WINDOW SCALE=3, TIMESTAMP=4, SACK-PERMITTED=5, SACK=6, and Generic options=7-15. The table is limited to 16 entries. Both compressor and decompressor MUST use these fixed mappings when performing list compression of TCP options.'
section: 6.3.4
topics:
    - tcp
    - registry
