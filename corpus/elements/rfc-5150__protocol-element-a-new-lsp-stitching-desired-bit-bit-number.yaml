document: rfc-5150
kind: protocol-element
summary: A new 'LSP stitching desired' bit (Bit Number 5) is defined in the Attributes Flags TLV of the LSP_ATTRIBUTES object (RFC 4420). This bit SHOULD be set in the Path message for the S-LSP by its head end to signal the desire for stitching, and MUST NOT be modified by any other nodes.
section: 5.1.1
topics:
    - mpls
    - routing
    - registry
