document: rfc-3041
kind: wire-format
summary: The randomized interface identifier is 64 bits wide. It is formed by taking the leftmost 64 bits of the MD5 digest over (history_value || ieee_interface_identifier) and setting bit 6 (universal/local bit) to zero, indicating local significance only.
