document: rfc-4577
kind: normative-requirement
summary: OSPF cryptographic authentication SHOULD be used between a PE and a CE router on the PE/CE link. It MUST be implemented on each PE to guard against spoofed OSPF messages that could compromise VPN routing or enable denial-of-service attacks.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - routing
    - mpls
