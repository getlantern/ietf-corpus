document: rfc-6560
kind: protocol-element
summary: PA-OTP-PIN-CHANGE (padata-type 144) is returned by the KDC in the enc-fast-rep of a PA-FX-FAST-REPLY to indicate PIN expiry, PIN change, or to convey a system-set PIN. It carries PinFlags (systemSetPin, mandatory), optional pin value, optional minLength/maxLength constraints, optional last-req for expiry times, and optional format restrictions.
section: "4.3"
topics:
    - security
