document: rfc-3863
kind: normative-requirement
summary: A processor of presence information MUST ignore any XML element with an unrecognized name, including all its content. The mustUnderstand attribute MUST be used only within optional elements nested in a <status> element.
section: 4.2.3
rfc2119_level: MUST
