document: rfc-7196
kind: security-consideration
summary: An attacker can generate false flapping to cause a victim's prefix(es) to be damped. The more conservative parameter values recommended by this document slightly mitigate false-flap attacks compared to the aggressive defaults, and should not increase risk.
