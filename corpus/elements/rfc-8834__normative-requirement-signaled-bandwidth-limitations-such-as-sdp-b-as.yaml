document: rfc-8834
kind: normative-requirement
summary: Signaled bandwidth limitations such as SDP 'b=AS:' or 'b=CT:' lines received from the peer MUST be followed when sending RTP packet streams. A WebRTC endpoint receiving media SHOULD signal its own bandwidth limitations.
section: "7.1"
rfc2119_level: MUST
topics:
    - webrtc
    - rtp
    - congestion
    - realtime
