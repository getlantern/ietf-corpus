document: rfc-9755
kind: wire-format
summary: When UTF8=ACCEPT is active, IMAP quoted-strings are extended via uQUOTED-CHAR, which adds UTF8-2, UTF8-3, and UTF8-4 (as defined in RFC 3629) to the existing QUOTED-CHAR production. The base QUOTED-CHAR non-terminal is not modified.
