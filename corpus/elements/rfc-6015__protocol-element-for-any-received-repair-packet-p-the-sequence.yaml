document: rfc-6015
kind: protocol-element
summary: 'For any received repair packet p*, the sequence numbers of its associated source packets are computed as: p*_snb + i × L (modulo 65536), for 0 ≤ i < D, where p*_snb is the SN base low field value. Recovery succeeds only when exactly one source packet in the resulting set T(p*) is missing.'
