document: rfc-2301
kind: normative-requirement
summary: Facsimile hardware that does not provide page-quality information MUST NOT write page-quality fields (BadFaxLines, CleanFaxData, ConsecutiveBadFaxLines). Computer-generated or error-corrected files SHOULD NOT write these fields.
section: 4.4.5
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
