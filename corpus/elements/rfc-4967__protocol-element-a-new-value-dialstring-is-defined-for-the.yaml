document: rfc-4967
kind: protocol-element
summary: A new value 'dialstring' is defined for the 'userinfo' parameter of 'sip:' or 'sips:' URIs. The dial string is a sequence of characters 0-9, A-F, P, X, '*', and '#', where E=*, F=#, P=pause, and X=wait-for-call-completion.
