document: rfc-4121
kind: design-rationale
summary: The RRC (Right Rotation Count) field was added specifically to allow in-place encryption by SSPI applications that only provide a single buffer without separate header and trailer regions. This is an SSPI-compatibility accommodation rather than a cryptographic requirement.
section: 4.2.5
topics:
    - security
