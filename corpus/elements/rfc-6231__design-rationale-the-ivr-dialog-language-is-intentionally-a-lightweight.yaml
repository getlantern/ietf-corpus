document: rfc-6231
kind: design-rationale
summary: The IVR dialog language is intentionally a lightweight subset of VoiceXML, omitting advanced constructs such as <form>, its interpretation algorithm, and a dynamic data model. This provides a familiar foundation for IVR developers while remaining sufficient for most applications, with a clear migration path to richer languages like VoiceXML for advanced use cases.
