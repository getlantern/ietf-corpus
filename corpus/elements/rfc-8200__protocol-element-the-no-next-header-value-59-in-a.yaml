document: rfc-8200
kind: protocol-element
summary: The 'No Next Header' value (59) in a Next Header field indicates nothing follows that header. Octets past the end of the header with Next Header=59, as indicated by Payload Length, must be ignored and passed on unchanged if the packet is forwarded.
section: "4.7"
topics:
    - ip
