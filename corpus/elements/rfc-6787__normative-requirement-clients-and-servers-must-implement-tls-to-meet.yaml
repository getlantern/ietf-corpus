document: rfc-6787
kind: normative-requirement
summary: Clients and servers MUST implement TLS to meet the security requirements of the SPEECHSC requirements (RFC 4313). All MRCPv2 servers MUST support TLS; servers MAY use TCP without TLS only in controlled environments where both nodes are inside a protected perimeter.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - realtime
