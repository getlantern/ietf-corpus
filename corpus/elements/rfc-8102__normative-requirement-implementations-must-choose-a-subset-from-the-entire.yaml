document: rfc-8102
kind: normative-requirement
summary: Implementations MUST choose a subset from the entire set of PQ-nodes with a finite limit on the number of PQ-nodes (to bound SPF overhead). Implementations MUST choose a default value for this limit; this document suggests 16 as the default.
section: 2.3.4
rfc2119_level: MUST
topics:
    - routing
