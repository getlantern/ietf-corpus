document: rfc-5311
kind: normative-requirement
summary: IS Neighbor Reachability advertisements in Extended LSPs are restricted to the Originating System only. A neighbor to the Originating System MUST be advertised, MUST use a non-zero metric, and SHOULD use MaxLinkMetric-1. For multi-topology, an MT IS Neighbor advertisement MUST be included for every topology advertised.
section: 4.2.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
