document: rfc-2625
kind: wire-format
summary: The FC Network_Header carries 64-bit source and destination World Wide Port Names (WW_PN), each divided into a 4-bit NAA field and a 60-bit Network Address. In this specification the high-order 12 bits of the network address are 0x0000 and the lower 48 bits hold an IEEE MAC address.
section: "3.3"
