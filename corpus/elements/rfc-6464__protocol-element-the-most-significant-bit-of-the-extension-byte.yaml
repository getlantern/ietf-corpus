document: rfc-6464
kind: protocol-element
summary: The most significant bit of the extension byte is the V flag, indicating whether the encoder believes the audio packet contains voice activity. Value 1 means voice activity detected; value 0 means none. The voice activity detection algorithm is unspecified and implementation-specific.
