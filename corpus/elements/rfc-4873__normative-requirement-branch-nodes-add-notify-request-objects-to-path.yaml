document: rfc-4873
kind: normative-requirement
summary: Branch nodes add NOTIFY_REQUEST objects to Path messages of recovery LSPs with the notify node address set to the local router address. The NOTIFY_REQUEST SHOULD NOT be removed if it is the sole NOTIFY_REQUEST object, to cover backward compatibility scenarios.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
