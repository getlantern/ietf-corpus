document: rfc-9421
kind: normative-requirement
summary: Derived component names MUST start with the '@' character, which differentiates them from HTTP field names (which cannot contain '@'). Processors MUST treat derived component names separately from HTTP field names.
section: "2.2"
rfc2119_level: MUST
