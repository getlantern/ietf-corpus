document: rfc-6560
kind: design-rationale
summary: The Client Key and Reply Key are derived from both the Armor Key and the OTP value using KRB-FX-CF2, achieving cryptographic binding to the outer FAST tunnel. This mitigates man-in-the-middle attacks against the tunneled pre-authentication protocol, as described by [ASNINY02].
section: "6.1"
topics:
    - security
    - crypto
