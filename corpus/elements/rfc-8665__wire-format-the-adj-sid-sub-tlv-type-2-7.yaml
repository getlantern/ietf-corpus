document: rfc-8665
kind: wire-format
summary: The Adj-SID Sub-TLV (Type 2, 7 or 8 octets) is a sub-TLV of the Extended Link TLV and contains Flags (B, V, L, G, P bits), Reserved, MT-ID, Weight, and SID/Label/Index. Multiple instances MAY appear per Extended Link TLV.
