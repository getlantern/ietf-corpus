document: rfc-9744
kind: wire-format
summary: 'The EVPN Layer 2 Attributes Extended Community (Type 0x06, Sub-type 0x04) is extended with two new 2-bit fields in the Control Flags: M (bits 10-11) encodes the FXC mode of operation (00=RFC8214, 01=VLAN-Signaled FXC, 10=Default FXC), and V (bits 8-9) encodes VID normalization type (00=RFC8214, 01=single-VID, 10=double-VID).'
