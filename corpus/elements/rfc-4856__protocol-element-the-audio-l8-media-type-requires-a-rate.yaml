document: rfc-4856
kind: protocol-element
summary: The audio/L8 media type requires a 'rate' parameter and supports an optional 'channels' parameter (defaulting to 1) specifying the number of interleaved audio streams; interleaving occurs between individual one-byte samples, with channel order per RFC 3551.
