document: rfc-2304
kind: interoperability-note
summary: When multiple T.33 subaddresses are needed for the same fax-mbox, multiple fax-email elements must be used. The UA may accept multiple subaddress elements but must generate multiple fax-mbox elements when passing to the MTA.
section: "4.1"
