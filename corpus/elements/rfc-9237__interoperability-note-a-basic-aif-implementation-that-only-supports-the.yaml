document: rfc-9237
kind: interoperability-note
summary: A basic AIF implementation that only supports the static REST model (Section 2.1) must handle receipt of dynamic-resource-creation permissions (Section 2.3) by either rejecting the whole AIF item or ignoring unrecognized permissions; it MUST NOT partially apply an authorization it does not fully understand.
