document: rfc-4750
kind: protocol-element
summary: The ospfAreaNssaTranslatorStabilityInterval (default 40 seconds) specifies how long an elected NSSA translator continues performing translation duties after determining its services are no longer required. This prevents translator flapping during election transitions.
