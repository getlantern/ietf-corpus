document: rfc-5810
kind: state-machine
summary: 'The FE Object LFB FEState component drives data-path availability: FE initializes in OperDisable, transitions to OperEnable when ready for packet processing. The CE may set FEState to AdminDisable to pause the FE; the FE stays there until the CE explicitly restores OperEnable. Loss of association may trigger return to pre-association per configured policy.'
section: "4.2"
topics:
    - routing
