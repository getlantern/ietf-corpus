document: rfc-6068
kind: interoperability-note
summary: Combining a 'to' address in both the <to> component and a 'to' hfvalue (e.g., mailto:addr1@example.com?to=addr2@example.com) is syntactically valid but NOT RECOMMENDED because different user agents handle this case differently; some existing clients ignore 'to' hfvalues.
section: "2"
topics:
