document: rfc-3344
kind: security-consideration
summary: Ingress filtering deployed at some network boundaries may drop tunneled packets whose inner source address (the mobile node's home address) differs from the outer source address (the care-of address). Reverse tunneling (the 'T' flag) is one mitigation, routing return traffic back through the home agent.
section: "5.6"
topics:
    - mobility
    - security
    - ip
