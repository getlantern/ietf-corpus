document: rfc-4896
kind: normative-requirement
summary: Even when a compressor sets the I-bit to indicate it will not access local state items, the remote endpoint SHOULD still advertise its DMS and SMS parameters. Without this advertisement, the sender must assume default parameters, which degrades compression efficiency.
section: "10.1"
rfc2119_level: SHOULD
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
