document: rfc-5948
kind: protocol-element
summary: The IPv4 CS link is a point-to-point link between the MS and the AR. When the AR and BS are co-located, the collection of transport connections to an MS forms a single IPv4 link. When separated, a tunnel (e.g., GRE) with granularity no greater than per-MS or per-service-flow must be established between AR and BS.
section: "4"
topics:
