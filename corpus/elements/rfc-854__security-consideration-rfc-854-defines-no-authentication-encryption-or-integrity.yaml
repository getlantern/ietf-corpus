document: rfc-854
kind: security-consideration
summary: RFC 854 defines no authentication, encryption, or integrity protection. All data, including credentials typed at the NVT keyboard, is transmitted in plaintext over the TCP connection. The protocol predates modern security requirements and should be considered inherently insecure for use over untrusted networks.
topics:
    - security
