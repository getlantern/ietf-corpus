summary: Three initial security configurations are specified (initial-no-access-configuration, initial-semi-security-configuration, initial-minimum-security-configuration) to allow deployers to choose the level of bootstrap access appropriate to their environment, ranging from no pre-configured access to full internet subtree access for unauthenticated principals.
