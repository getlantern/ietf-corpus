document: rfc-4935
kind: security-consideration
summary: The topology tables (t11FcsIeTable, t11FcsMgmtAddrListTable, t11FcsPortTable, t11FcsAttachPortNameListTable, t11FcsPlatformTable, t11FcsNodeNameListTable) and t11FcsStatsTable expose sensitive network topology and operational data; even GET and NOTIFY access should be controlled and values SHOULD be encrypted when transmitted via SNMP.
