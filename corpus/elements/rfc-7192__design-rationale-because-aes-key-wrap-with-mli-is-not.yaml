document: rfc-7192
kind: design-rationale
summary: Because AES Key Wrap with MLI is not used as the content-encryption algorithm, there is no requirement to align the key-wrap algorithm with the content-encryption algorithm as in sibling specifications; plain AES Key Wrap is used instead.
