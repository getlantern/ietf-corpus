document: rfc-2420
kind: normative-requirement
summary: All packets not already a multiple of eight bytes in length MUST be padded prior to encrypting using Self Describing Padding with a Maximum Pad Value (MPV) of 8, using the octet sequence 1, 2, 3, ..., up to 7.
section: "4.1"
rfc2119_level: MUST
topics:
