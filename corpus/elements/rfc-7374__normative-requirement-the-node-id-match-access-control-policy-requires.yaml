document: rfc-7374
kind: normative-requirement
summary: The NODE-ID-MATCH access control policy requires that a value MUST be written or overwritten only if the request is signed with a key whose certificate Node-ID equals the dictionary key, the Node-ID belongs to one of the tree node's intervals (when exists=True), and H(namespace, level, node) equals the Resource-ID.
section: "5"
rfc2119_level: MUST
topics:
