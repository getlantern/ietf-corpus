document: rfc-4629
kind: security-consideration
summary: Confidentiality of media streams is achieved by encryption applied after end-to-end compression, with no conflict between the two operations. In multicast environments, source pruning via IGMP or multicast routing protocols may help receivers limit unwanted traffic.
