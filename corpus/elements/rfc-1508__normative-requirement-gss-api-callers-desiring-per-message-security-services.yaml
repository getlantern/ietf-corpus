document: rfc-1508
kind: normative-requirement
summary: GSS-API callers desiring per-message security services must check the values of integ_avail and conf_avail flags at context establishment time, and must be aware that a FALSE integ_avail value means GSS_Sign() or GSS_Seal() invocations will apply no cryptographic protection to user data.
section: 1.2.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
