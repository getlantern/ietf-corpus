document: rfc-2686
kind: interoperability-note
summary: Using standard PPP Multilink as-is (without classes) already provides two levels of priority — multilink fragments can be suspended by non-multilink packets — but this approach supports only one level of suspension and prevents true parallel multi-link fragment reordering.
section: "3.1"
topics:
