document: rfc-5380
kind: wire-format
summary: 'The MAP Option for IPv6 Neighbour Discovery (Type=23, Length=3) contains: a 4-bit Dist field (hop count distance from MAP, starting at 1, zero MUST NOT be used), a 4-bit Pref field (operator preference, 15=highest), an R flag (RCoA allocation via RFC 4877), a 32-bit Valid Lifetime field, and a 128-bit Global IP Address for the MAP.'
section: "5"
topics:
