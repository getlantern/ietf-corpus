document: rfc-8798
kind: design-rationale
summary: SenML normally requires unscaled SI units (following the Celsius/Kelvin precedent), but this document extends that exception to volt-ampere (VA), volt-ampere reactive (var), joule per meter (J/m), kilogram per cubic meter (kg/m3), and degree (deg) because these are in wide use across SDOs and engineering practice.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
