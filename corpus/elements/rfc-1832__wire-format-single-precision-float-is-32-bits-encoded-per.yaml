document: rfc-1832
kind: wire-format
summary: 'Single-precision float is 32 bits encoded per IEEE 754: 1-bit sign (S), 8-bit exponent biased by 127 (E), 23-bit mantissa fraction (F); value is (-1)^S * 2^(E-127) * 1.F. NaN is system-dependent and must not be interpreted as anything other than NaN within XDR.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
