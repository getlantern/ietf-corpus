document: rfc-8693
kind: protocol-element
summary: 'Token type identifiers are URIs. Defined types include: access_token, refresh_token, id_token (OpenID Connect), saml1 (base64url-encoded SAML 1.1 assertion), and saml2 (base64url-encoded SAML 2.0 assertion). The JWT type ''urn:ietf:params:oauth:token-type:jwt'' is defined in RFC 7519.'
