summary: dot1qLearningConstraintsTable controls IVL/SVL learning constraints per VLAN and constraint set, using dot1qConstraintType (independent or shared) and dot1qConstraintStatus (RowStatus). dot1qConstraintSetDefault and dot1qConstraintTypeDefault provide device-wide defaults.
