document: rfc-6715
kind: design-rationale
summary: String-value properties such as EXPERTISE, HOBBY, and INTEREST intentionally have no fixed list of allowed strings; de facto taxonomies are expected to emerge through usage rather than specification, as these values are meant to be understood by humans rather than used for automated categorization.
section: "2"
