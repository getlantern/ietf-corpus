document: rfc-6329
kind: interoperability-note
summary: IS-IS for SPB currently only supports peer-to-peer adjacencies; pseudonodes and links to/from pseudonodes are not used in IS-IS SPF computations for SPB and will be avoided if present in the physical topology. Other NLPIDs may use pseudonodes normally.
