document: rfc-3920
kind: normative-requirement
summary: 'Stream-level errors are unrecoverable: the detecting entity MUST send a <stream:error> element, send a closing </stream> tag, and terminate the underlying TCP connection. If the error occurs during stream setup, the receiving entity must still send the opening <stream> tag before including the error.'
section: 4.7.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
