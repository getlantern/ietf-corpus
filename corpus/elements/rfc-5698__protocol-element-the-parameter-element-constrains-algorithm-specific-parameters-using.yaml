document: rfc-5698
kind: protocol-element
summary: The Parameter element constrains algorithm-specific parameters using Min and/or Max integer elements, plus an optional wildcard for future constraints. At least one constraint (Min, Max, or other) MUST be present; an exact value is expressed by setting Min equal to Max.
