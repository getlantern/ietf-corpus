summary: 'adslAtucCurrStatus is a BITS object with 10 positions indicating current ATU-C defect conditions: noDefect(0), lossOfFraming(1), lossOfSignal(2), lossOfPower(3), lossOfSignalQuality(4) (triggered when SNR margin falls below minimum or BER exceeds 10^-7), lossOfLink(5), dataInitFailure(6), configInitFailure(7), protocolInitFailure(8), noPeerAtuPresent(9). The ATU-R counterpart has only bits 0-4.'
