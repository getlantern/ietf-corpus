document: rfc-8278
kind: protocol-element
summary: The MAG Multipath Binding (MMB) option is a new mobility header option (Type 63) used in PBU and PBA messages to request multipath support, registering the current CoA as one of multiple CoAs for the MAG, and carrying access network information associated with the CoA.
section: "4.1"
topics:
