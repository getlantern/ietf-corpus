kind: protocol-element
summary: The entPhysicalContainsTable exposes container/containee relationships indexed by (entPhysicalIndex, entPhysicalChildIndex), providing a direct format equivalent to traversing the containment tree via entPhysicalContainedIn. This allows an NMS to quickly discover all children of a given physical entity.
