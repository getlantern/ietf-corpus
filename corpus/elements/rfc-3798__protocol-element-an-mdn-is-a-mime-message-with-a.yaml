document: rfc-3798
kind: protocol-element
summary: 'An MDN is a MIME message with a top-level content-type of multipart/report (report-type=disposition-notification). It consists of: (a) a human-readable explanation, (b) a message/disposition-notification body, and optionally (c) the original message or a portion thereof.'
