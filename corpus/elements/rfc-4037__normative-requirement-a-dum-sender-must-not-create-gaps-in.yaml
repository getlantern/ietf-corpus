document: rfc-4037
kind: normative-requirement
summary: 'A DUM sender MUST NOT create gaps in the data stream: the my-offset of each data message must equal the my-offset plus the payload size of the previous data message. A DUM without a payload field is invalid; zero-size (empty) payloads are permitted.'
section: "11.9"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
