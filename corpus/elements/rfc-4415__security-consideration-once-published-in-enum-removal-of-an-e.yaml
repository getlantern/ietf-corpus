document: rfc-4415
kind: security-consideration
summary: Once published in ENUM, removal of an E.164 number from the zone does not remove copies harvested by third parties; any publication may effectively be permanent. Regulations in many regions require that data subjects can request removal and that consent be confirmed at regular intervals.
section: "5"
topics:
