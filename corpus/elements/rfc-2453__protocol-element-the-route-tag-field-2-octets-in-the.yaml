document: rfc-2453
kind: protocol-element
summary: The Route Tag field (2 octets in the RIP-2 RTE) is an attribute that must be preserved and re-advertised with the route. Its primary purpose is to distinguish internal RIP routes from routes imported from EGP, BGP, or another IGP; it may be set to the originating Autonomous System number.
section: "4.2"
topics:
    - routing
    - bgp
