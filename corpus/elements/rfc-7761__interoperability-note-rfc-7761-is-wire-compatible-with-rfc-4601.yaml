document: rfc-7761
kind: interoperability-note
summary: RFC 7761 is wire-compatible with RFC 4601; implementations conforming to either specification interoperate successfully. The only behavioral differences are the removal of the optional (*,*,RP) state, PMBR features, and IPsec authentication, which were already optional in RFC 4601.
section: "1"
topics:
    - multicast
    - routing
