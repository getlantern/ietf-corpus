document: rfc-8794
kind: normative-requirement
summary: An EBML Element with 'unknownsizeallowed' set to true MUST NOT also have 'recursive' set to true, and its Parent Element MUST also have 'unknownsizeallowed' set to true. Non-Master Elements MUST NOT set 'unknownsizeallowed' to true.
section: 11.1.6.10
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
