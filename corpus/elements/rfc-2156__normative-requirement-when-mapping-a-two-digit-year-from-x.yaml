document: rfc-2156
kind: normative-requirement
summary: When mapping a two-digit year from X.400 UTCTime to RFC 822, the year shall be assumed to fall within the epoch 1980-2079. RFC 822 (as modified by RFC 1123) requires a four-digit year; the original two-digit form is no longer legal.
section: 3.3.5
rfc2119_level: MUST
topics:
    - email
