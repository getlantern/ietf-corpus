document: rfc-6486
kind: normative-requirement
summary: For a 'one-time-use' EE certificate, the validity period MUST exactly match the thisUpdate and nextUpdate times of the manifest. For a 'sequential-use' EE certificate, the validity period MUST encompass the full thisUpdate-to-nextUpdate interval.
section: "5.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
