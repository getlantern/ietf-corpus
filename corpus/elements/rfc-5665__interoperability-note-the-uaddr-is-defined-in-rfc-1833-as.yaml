document: rfc-5665
kind: interoperability-note
summary: The uaddr is defined in RFC 1833 as an XDR data type string (US-ASCII only), but SVR4 loopback transport implementations use an opaque octet array instead. Implementors must handle this deviation from the RFC 1833 uaddr specification when interoperating with SVR4-based systems.
section: 5.2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
