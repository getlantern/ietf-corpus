document: rfc-2305
kind: interoperability-note
summary: IFax senders are NOT REQUIRED to send text/plain messages (relaxing RFC 2049 requirement 4), though IFax recipients are required to accept and process such messages. IFax recipients are also NOT REQUIRED to offer to save results to a file, and MAY directly print or fax a received message rather than displaying it.
section: "9"
