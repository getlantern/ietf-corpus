document: rfc-2911
kind: normative-requirement
summary: The 'attributes-charset' attribute MUST be the first attribute and 'attributes-natural-language' MUST be the second attribute in the Operation Attributes group of every IPP request and response. These two attributes MUST appear in every IPP request and response.
section: 3.1.4
rfc2119_level: MUST
