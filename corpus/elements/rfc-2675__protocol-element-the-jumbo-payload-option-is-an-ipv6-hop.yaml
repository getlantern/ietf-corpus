document: rfc-2675
kind: protocol-element
summary: The Jumbo Payload option is an IPv6 Hop-by-Hop option carrying a 32-bit unsigned integer Jumbo Payload Length field, with Option Type 0xC2 and Opt Data Len of 4. It allows IPv6 packets with payloads between 65,536 and 4,294,967,295 octets. The option has an alignment requirement of 4n+2.
section: "2"
