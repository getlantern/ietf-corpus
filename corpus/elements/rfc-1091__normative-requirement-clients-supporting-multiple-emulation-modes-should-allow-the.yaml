document: rfc-1091
kind: normative-requirement
summary: Clients supporting multiple emulation modes SHOULD allow the user to specify which mode is preferred (sent first) prior to connection establishment. The order of names sent cannot be changed after negotiation begins.
section: "7"
rfc2119_level: SHOULD
