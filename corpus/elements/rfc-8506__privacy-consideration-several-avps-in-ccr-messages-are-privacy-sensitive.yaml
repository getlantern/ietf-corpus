document: rfc-8506
kind: privacy-consideration
summary: Several AVPs in CCR messages are privacy-sensitive, including Subscription-Id (MSISDN, IMSI, NAI), User-Equipment-Info (IMEI, MAC, EUI64), and service-specific rating AVPs; implementations SHOULD minimize the set of identifiers included and MUST protect them in transit using the Diameter security mechanisms.
section: "15.1"
topics:
    - diameter
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
