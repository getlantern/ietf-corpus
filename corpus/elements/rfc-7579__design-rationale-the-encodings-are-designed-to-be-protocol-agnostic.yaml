document: rfc-7579
kind: design-rationale
summary: The encodings are designed to be protocol-agnostic so that a single specification can be referenced by OSPF, IS-IS, and PCEP protocol extension documents, avoiding redundant or inconsistent per-protocol definitions. Protocol-specific documents define nesting within TLV/sub-TLV constructs.
