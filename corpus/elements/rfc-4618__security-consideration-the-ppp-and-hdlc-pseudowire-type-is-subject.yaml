document: rfc-4618
kind: security-consideration
summary: The PPP and HDLC pseudowire type is subject to all general security considerations in RFC3985 and RFC4447. This document specifies only encapsulations; each protocol used to carry encapsulated packets across the MPLS network may have its own security issues not affected by these encapsulations.
section: "9"
topics:
    - mpls
    - security
