document: rfc-5311
kind: normative-requirement
summary: The Overload (OL), Attached (ATT), and Partition Repair (P) bits MUST be set to 0 in all Extended LSPs. Setting ATT would incorrectly indicate the Virtual IS is attached to other areas, potentially causing legacy systems to use it as a default exit point.
section: 4.2.5
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
