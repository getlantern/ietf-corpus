document: rfc-2280
kind: protocol-element
summary: AS-path regular expressions are POSIX-compliant over the alphabet of AS numbers, supporting standard operators (*, +, ?, {m}, {m,n}), AS number sets ([...] and [^...]), and the 'same-match' variants (~*, ~+, ~{m,n}) where all occurrences must match the same AS.
