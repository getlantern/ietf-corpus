document: rfc-6642
kind: design-rationale
summary: In the SSM Distribution Source Feedback Summary Model, the distribution source does not redistribute NACKs (e.g., to prevent revealing the identity of NACK senders) and instead sends RTCP TPLR to suppress redundant feedback from other receivers unaware of the reported loss.
