document: rfc-7724
kind: wire-format
summary: Message framing for Active Leasequery over TCP uses the same 2-byte length-prefixed format defined for Bulk Leasequery (RFC 6926). When TLS is used, one DHCP message is carried per TLS record using the same framing.
