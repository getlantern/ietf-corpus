document: rfc-4752
kind: normative-requirement
summary: When the server used GSS_C_NO_NAME/GSS_C_NO_CREDENTIAL, it SHOULD verify via GSS_Inquire_context that the client's target_name matches the expected service principal in either GSS_C_NT_HOSTBASED_SERVICE or GSS_KRB5_NT_PRINCIPAL_NAME format.
section: "3.2"
rfc2119_level: SHOULD
topics:
