document: rfc-8139
kind: normative-requirement
summary: If the DRB on a link detects VLAN mapping (a Hello arrives on VLAN-x but was sent on VLAN-y), it MUST make or revoke appointments to ensure the same TRILL switch is Appointed Forwarder for both VLAN-x and VLAN-y, preventing potential forwarding loops.
section: "2.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
