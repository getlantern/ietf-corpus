document: rfc-1334
kind: normative-requirement
summary: Because the Authenticate-Ack might be lost, the authenticator MUST allow repeated Authenticate-Request packets after completing the Authentication phase and MUST return the same reply Code as when authentication completed. Any Authenticate-Request packets received during any other phase MUST be silently discarded.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
