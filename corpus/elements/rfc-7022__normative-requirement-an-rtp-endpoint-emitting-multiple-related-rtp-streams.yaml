document: rfc-7022
kind: normative-requirement
summary: An RTP endpoint emitting multiple related RTP streams that require synchronization MUST use the same RTCP CNAME for all streams to be synchronized, such as the audio and video streams of a multimedia session.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
