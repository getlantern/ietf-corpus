document: rfc-7968
kind: normative-requirement
summary: The highest-priority tree root RBridge MUST include all tree-related sub-TLVs defined in RFC 7176 in its E-L1FS FS-LSP and MAY additionally include TREE-VLANs and/or TREE-FGLs APPsub-TLVs to indicate per-tree VLAN/FGL restrictions.
section: "3.3"
rfc2119_level: MUST
topics:
