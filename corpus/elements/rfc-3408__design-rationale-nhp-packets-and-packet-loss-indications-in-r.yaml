document: rfc-3408
kind: design-rationale
summary: NHP packets and packet loss indications in R-mode do not update either the compressor or decompressor context, so the secure reference principle (RFC 3095, section 5.5) is not affected and there is no loss of robustness compared to ROHC RTP.
