document: rfc-8613
kind: normative-requirement
summary: To ensure unique Sender Keys, the quartet (Master Secret, Master Salt, ID Context, Sender ID) MUST be unique across all security contexts. Specifically, (ID Context, Sender ID) SHALL be unique for the same Master Secret and Master Salt pair.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
