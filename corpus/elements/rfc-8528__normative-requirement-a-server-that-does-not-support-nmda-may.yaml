summary: A server that does not support NMDA MAY implement revision 2016-06-21 of 'ietf-yang-library' (RFC 7895) under a mount point. A server that supports NMDA MUST implement at least revision 2019-01-04 of 'ietf-yang-library' (RFC 8525) under a mount point.
