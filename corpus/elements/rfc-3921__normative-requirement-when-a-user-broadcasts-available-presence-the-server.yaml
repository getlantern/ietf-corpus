document: rfc-3921
kind: normative-requirement
summary: When a user broadcasts available presence, the server MUST send the full XML of the presence stanza to all roster contacts with subscription 'from' or 'both' to whom outbound presence is not blocked and from whom no presence error was received during the session.
section: 5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
