document: rfc-9456
kind: normative-requirement
summary: TLS 1.3 implementations for SNMP MUST NOT enable the 0-RTT mode of session resumption (either sending or accepting) and MUST NOT automatically resend 0-RTT data if it is rejected by the server.
section: "3.1"
rfc2119_level: MUST NOT
topics:
