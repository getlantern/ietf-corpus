kind: protocol-element
summary: 'TDomain (OBJECT IDENTIFIER) denotes a kind of transport service. TAddress (OCTET STRING SIZE 1..255) denotes a transport service address. For snmpUDPDomain, TAddress is 6 octets: 4 octets of IP address in network-byte order followed by 2 octets of UDP port in network-byte order.'
