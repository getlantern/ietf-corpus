document: rfc-7741
kind: normative-requirement
summary: The RTP timestamp for VP8 uses a 90 kHz clock granularity, representing the time when the frame was sampled. A delta of 1 represents 1/90,000 of a second.
section: "4.1"
rfc2119_level: MUST
topics:
