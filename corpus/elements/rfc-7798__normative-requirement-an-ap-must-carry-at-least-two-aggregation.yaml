document: rfc-7798
kind: normative-requirement
summary: An AP MUST carry at least two aggregation units, MUST NOT contain FUs, and MUST NOT be nested (an AP must not contain another AP). The total data MUST fit into an IP packet, and size SHOULD be chosen to remain below MTU to avoid IP-layer fragmentation.
section: 4.4.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
