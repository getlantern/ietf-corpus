document: rfc-4875
kind: protocol-element
summary: A P2MP TE Tunnel is identified by a P2MP SESSION object containing a P2MP ID (4-octet number unique within the ingress LSR scope), a Tunnel ID, and an Extended Tunnel ID. The SESSION object replaces the Tunnel Endpoint Address field of the RFC 3209 SESSION object with the P2MP ID.
section: "4.1"
topics:
    - mpls
    - routing
