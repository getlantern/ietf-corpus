document: rfc-8049
kind: security-consideration
summary: Security configuration is provided at both site and site-network-access levels (access level overrides site level). The 'encryption' container (feature-gated) includes an 'enabled' leaf, a 'layer' enumeration, and a profile choice between a provider-defined profile name or a customer-defined algorithm with either PSK (preshared-key) or PKI key type.
section: "6.9"
topics:
