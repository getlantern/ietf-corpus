document: rfc-1618
kind: protocol-element
summary: The ISDN D-channel can carry PPP packets when suitably framed (via 'PPP in X.25' or 'PPP in Frame Relay'), but is limited in bandwidth and often restricts links to a local switch. By default, no data service is expected on the D-channel.
