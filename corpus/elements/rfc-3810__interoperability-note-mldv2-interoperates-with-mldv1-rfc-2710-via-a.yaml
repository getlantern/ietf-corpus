document: rfc-3810
kind: interoperability-note
summary: MLDv2 interoperates with MLDv1 (RFC 2710) via a per-interface Host Compatibility Mode variable. When MLDv1 routers are detected on a link, nodes switch to MLDv1 compatibility mode. MLDv2 implementations must support Version 1 Multicast Listener Report (Type 131) and Version 1 Multicast Listener Done (Type 132).
section: "8"
topics:
    - multicast
    - ip
