document: rfc-9322
kind: interoperability-note
summary: If an encapsulating node receives a looped-back packet that was not originated from the current encapsulating node (Node ID mismatch), the packet MUST be dropped, ensuring that loopback cannot be exploited across IOAM-Domain boundaries.
