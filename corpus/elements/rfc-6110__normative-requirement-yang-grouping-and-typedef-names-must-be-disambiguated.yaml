document: rfc-6110
kind: normative-requirement
summary: 'YANG grouping and typedef names MUST be disambiguated when mapped to RELAX NG named patterns: top-level names are prefixed with the module name and ''__''; nested names are further prefixed with ancestor data node names separated by ''__''; grouping names are additionally prefixed with a leading underscore ''_'' to distinguish them from type definitions in the shared RELAX NG pattern namespace.'
section: "9.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
