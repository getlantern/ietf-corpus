document: rfc-2625
kind: design-rationale
summary: The IP MTU is limited to 65,280 bytes (rather than the 65,536-byte FC maximum) to allow 256 bytes of overhead headroom for buffer resource allocation at N_Ports; 16 bytes are used by the FC Network_Header and 8 by LLC/SNAP, leaving 232 bytes for future use.
section: 3.2.1
