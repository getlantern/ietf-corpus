document: rfc-8737
kind: normative-requirement
summary: The "acme-tls/1" protocol MUST only be used for validating ACME tls-alpn-01 challenges. Once the TLS handshake is completed, the client MUST NOT exchange any further data and MUST immediately close the connection.
section: "4"
rfc2119_level: MUST
topics:
