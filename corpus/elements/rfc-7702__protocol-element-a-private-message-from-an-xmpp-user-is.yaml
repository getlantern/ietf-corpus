document: rfc-7702
kind: protocol-element
summary: A private message from an XMPP user is sent as a message of type 'chat' to the recipient's occupant JID and translated into an MSRP SEND with the CPIM To header containing the occupant's SIP URI with GRUU (e.g., <sip:montague@chat.example.org>;gr=Romeo).
