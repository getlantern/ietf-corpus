document: rfc-9606
kind: wire-format
summary: The RESINFO RR type uses the same format as DNS TXT records, as defined in Section 3.3.14 of RFC 1035 and further elaborated in Section 6.1 of RFC 6763. Key/value pairs are encoded per Section 6.3 of RFC 6763; a key with no '=' is a boolean attribute (presence-only).
