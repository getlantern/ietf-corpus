document: rfc-7802
kind: normative-requirement
summary: The PRF+ MUST be keyed with the key indicated by the 'prf_key' input parameter. For GSS_C_PRF_KEY_FULL, use the acceptor's sub-session key if present, else the initiator's sub-session key if present, else the Ticket's session key.
