document: rfc-5155
kind: normative-requirement
summary: A validator MUST ignore NSEC3 RRs with unknown hash types and MUST ignore NSEC3 RRs with a Flags field value other than zero or one. Responses containing only such NSEC3 RRs will generally be treated as bogus.
section: "8.1"
rfc2119_level: MUST
topics:
    - dns
    - security
