document: rfc-5090
kind: security-consideration
summary: To mitigate denial-of-service attacks via large volumes of unauthenticated HTTP-style requests, the RADIUS server MUST verify that it generated the nonce received from the HTTP-style client, preferably statelessly using a cryptographic signature embedded in the nonce.
section: "8.1"
topics:
    - radius
    - security
