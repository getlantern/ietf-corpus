document: rfc-9827
kind: protocol-element
summary: Transform ID 1 (renamed from 'Extended Sequence Numbers' to 'Partially Transmitted 64-bit Sequential Numbers') defines 64-bit monotonically increasing counters where only the low-order 32 bits are transmitted; the high-order 32 bits are inferred by the receiver from prior packets. Incoming packets must be authenticated even when replay protection is not used.
section: "3"
topics:
    - ipsec
    - security
