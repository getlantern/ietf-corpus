document: rfc-9562
kind: normative-requirement
summary: For all UUIDs defined in this document, bits 64 and 65 of the UUID (the most significant bits of octet 8) MUST be set to 1 and 0, establishing variant 10xx. All bit and field layouts avoid use of these two bits.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
