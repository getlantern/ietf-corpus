document: rfc-2348
kind: protocol-element
summary: 'The final packet rules from RFC 1350 remain unchanged: a data packet with a data length less than the negotiated blocksize is the final packet. If the total data is an exact multiple of the blocksize, an extra zero-length data packet ends the transfer.'
section: Blocksize Option Specification
