document: rfc-3635
kind: security-consideration
summary: The only writable object in this MIB is dot3PauseAdminMode. Unauthorized write access to this object could disrupt network flow control. Implementations should use SNMPv3 with authentication and privacy to protect against unauthorized modification. Read-only objects expose interface statistics that could be sensitive in some environments.
section: "9"
topics:
    - snmp
    - security
