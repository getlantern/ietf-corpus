document: rfc-5150
kind: interoperability-note
summary: S-LSP teardown follows standard procedures defined in RFC 3209 and RFC 3473. Teardown of the S-LSP SHOULD be treated as a failure event for the associated e2e LSP, and corresponding teardown or recovery procedures SHOULD be triggered for the e2e LSP.
section: 5.1.4
topics:
