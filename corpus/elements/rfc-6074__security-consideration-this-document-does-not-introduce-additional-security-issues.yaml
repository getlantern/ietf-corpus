document: rfc-6074
kind: security-consideration
summary: This document does not introduce additional security issues beyond those already covered in the referenced protocol specifications. Signaling security is addressed in RFC 5036, RFC 4447, RFC 3931, and RFC 4667. BGP-based auto-discovery security, including inter-AS considerations, is covered in RFC 4364. Automated security mechanisms for L2VPNs are identified as recommended future work.
