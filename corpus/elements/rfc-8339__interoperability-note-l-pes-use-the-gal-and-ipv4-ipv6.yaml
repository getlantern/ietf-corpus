document: rfc-8339
kind: interoperability-note
summary: L-PEs use the GAL and IPv4/IPv6 ACH Channel header, or PW ACH, to determine that an arriving packet is an OAM packet. L-PEs process the P2MP Pseudowire sub-TLV in the Target FEC Stack TLV per Section 4.4 of RFC 8029 and respond according to the processing rules in that document.
section: "5"
topics:
