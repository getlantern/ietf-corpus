document: rfc-5882
kind: normative-requirement
summary: When deconfiguring BFD from a system, the session SHOULD be placed into AdminDown state and maintained for a Detection Time before ceasing BFD Control packet transmission, to avoid triggering an unintended session failure on the remote system.
section: "8"
rfc2119_level: SHOULD
