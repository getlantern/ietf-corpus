document: rfc-9260
kind: interoperability-note
summary: Omitting IP Address parameters from INIT and INIT ACK chunks—so only the source IP of the IP datagram is used as the peer address—makes an SCTP association more likely to work correctly through Network Address Translation (NAT) devices.
section: 3.3.2.1.2
topics:
    - sctp
    - nat
