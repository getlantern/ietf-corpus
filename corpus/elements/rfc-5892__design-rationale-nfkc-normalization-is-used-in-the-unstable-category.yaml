document: rfc-5892
kind: design-rationale
summary: NFKC normalization is used in the Unstable category calculation even though NFC is used in the Protocol document (RFC 5891). NFKC is applied at the classification stage to identify characters that are not stable across normalization forms, catching a broader set of problematic code points.
