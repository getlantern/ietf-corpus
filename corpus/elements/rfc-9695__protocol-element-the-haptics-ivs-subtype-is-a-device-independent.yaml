summary: 'The ''haptics/ivs'' subtype is a device-independent haptic effect coding based on XML format (ISO/IEC JTC 1/SC 29/WG 2 N0072). Encoding is 8bit for UTF-8 or binary for UTF-16/UTF-32. File extension: .ivs.'
