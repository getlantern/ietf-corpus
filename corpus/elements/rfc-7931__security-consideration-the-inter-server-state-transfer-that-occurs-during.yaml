document: rfc-7931
kind: security-consideration
summary: The inter-server state transfer that occurs during transparent state migration is a security-sensitive operation. The communication channel used for this transfer must provide adequate authentication and integrity protection to prevent an attacker from injecting or modifying migrated locking state, which could result in unauthorized access or denial of service to legitimate clients.
section: "8.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
