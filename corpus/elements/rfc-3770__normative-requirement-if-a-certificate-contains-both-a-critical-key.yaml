document: rfc-3770
kind: normative-requirement
summary: If a certificate contains both a critical key usage extension and a critical extended key usage extension, then both extensions MUST be processed independently and the certificate MUST only be used for a purpose consistent with both extensions. If no such purpose exists, the certificate MUST NOT be used for any purpose.
section: "2"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
