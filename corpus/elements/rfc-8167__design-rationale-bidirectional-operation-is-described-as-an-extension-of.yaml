document: rfc-8167
kind: design-rationale
summary: Bidirectional operation is described as an extension of RPC transport connection sharing, enabling two endpoints to exchange independent RPC messages in opposite directions over a shared connection without modifying the RPC-over-RDMA version 1 protocol. This avoids the need for a separate backchannel connection.
section: "1"
