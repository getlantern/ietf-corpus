document: rfc-4798
kind: normative-requirement
summary: In inter-AS cases (b) and (c), an ASBR 6PE SHOULD only accept labeled packets from its peer ASBR 6PE if the topmost label is one it has explicitly signaled to that peer, to avoid label spoofing.
