document: rfc-4011
kind: protocol-element
summary: 'The searchColumn() function performs an SNMP walk searching for column values matching a pattern using one of six match modes: ExactMatch, ExactCaseMatch, SubstringMatch, SubstringCaseMatch, RegexpMatch, RegexpCaseMatch (POSIX 1003.2 extended regular expressions). Caller controls search start/continuation via the ''oid'' in-out parameter.'
section: 8.1.3.4
topics:
    - snmp
