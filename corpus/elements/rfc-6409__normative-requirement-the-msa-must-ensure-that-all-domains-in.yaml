document: rfc-6409
kind: normative-requirement
summary: The MSA MUST ensure that all domains in the SMTP envelope are fully qualified. If the MSA examines or alters the message text in any way (except adding trace header fields), it MUST also ensure all domains in address header fields are fully qualified. Reply code 554 is used for improper domain references.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
