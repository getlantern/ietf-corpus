document: rfc-3841
kind: normative-requirement
summary: It is RECOMMENDED that a UAC include a term in an Accept-Contact feature set with the 'sip.methods' feature tag whose value includes the method of the request. For SUBSCRIBE, it is RECOMMENDED to include a term with the 'sip.events' feature tag matching the event package.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
