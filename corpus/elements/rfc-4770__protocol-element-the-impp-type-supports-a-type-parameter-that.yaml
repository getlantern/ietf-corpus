document: rfc-4770
kind: protocol-element
summary: 'The IMPP type supports a TYPE parameter that can specify intended use via values: PERSONAL or BUSINESS (purpose), HOME, WORK, or MOBILE (location), and PREF (preferred address, same semantics as TEL''s PREF). Multiple TYPE values may be combined in a single IMPP entry.'
section: "2"
