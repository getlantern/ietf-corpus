document: rfc-8196
kind: design-rationale
summary: The all-zeros area address makes accidental interoperation between autoconfigured and non-autoconfigured routers unlikely. The A flag check in the Router-Fingerprint TLV provides an additional layer of protection beyond the area address mismatch.
