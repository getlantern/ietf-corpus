kind: design-rationale
summary: An agent may choose to delay updates to performance statistics by 10 seconds (using a 10-element delay line) to avoid retroactive adjustments when the unavailable seconds determination crosses interval boundaries. Appendix B sketches this delay approach as an alternative to real-time updates with retroactive corrections.
