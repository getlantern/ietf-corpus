document: rfc-6486
kind: normative-requirement
summary: The EE certificate used to verify a manifest MUST have an SIA extension access description with accessMethod OID id-ad-signedobject referencing the manifest's publication URL. The EE certificate MUST describe its INRs using the 'inherit' attribute rather than explicit resource sets.
section: "5.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
