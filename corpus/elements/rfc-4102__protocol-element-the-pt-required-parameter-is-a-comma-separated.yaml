document: rfc-4102
kind: protocol-element
summary: The 'pt' required parameter is a comma-separated ordered list of RTP payload types enumerating the primary, secondary, etc., encodings in accordance with RFC 2198. Because comma is a special character, the list MUST be a quoted-string enclosed in double quotes.
