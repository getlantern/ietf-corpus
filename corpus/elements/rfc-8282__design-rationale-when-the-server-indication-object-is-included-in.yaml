document: rfc-8282
kind: design-rationale
summary: 'When the SERVER-INDICATION object is included in a PCRep, the PCRep includes at least two sets of ERO information in the path-list: one for the client-layer path and one for the server-layer path. This allows the PCC (e.g., NMS or ingress node) to trigger signaling to set up LSPs at both layers according to computed paths.'
section: "4.2"
topics:
    - routing
    - mpls
