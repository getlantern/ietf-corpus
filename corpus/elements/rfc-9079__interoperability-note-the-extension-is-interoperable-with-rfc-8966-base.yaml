document: rfc-9079
kind: interoperability-note
summary: 'The extension is interoperable with RFC 8966 base protocol routers: loop-avoidance properties are preserved when non-source-specific and source-specific routers are mixed. However, it is incompatible with RFC 6126 (the older Babel) because that version does not support mandatory sub-TLVs.'
