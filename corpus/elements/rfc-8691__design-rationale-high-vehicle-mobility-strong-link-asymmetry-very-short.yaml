document: rfc-8691
kind: design-rationale
summary: High vehicle mobility, strong link asymmetry, very short connection durations, and strict automotive reliability and privacy requirements make the 802.11-OCB link significantly different from other 802.11 networks, justifying this separate specification rather than reusing existing 802.11 IPv6 documents without modification.
section: E
topics:
