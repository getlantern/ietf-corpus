document: rfc-7564
kind: design-rationale
summary: PRECIS uses an 'inclusion model' in which a string class consists only of code points that are explicitly allowed; any code point not explicitly allowed is forbidden. This contrasts with an exclusion model and provides a more predictable security posture.
