document: rfc-8895
kind: design-rationale
summary: The substream-id mechanism is introduced to multiplex updates for multiple resources—including multiple POST-mode requests with different inputs—over a single update stream, achieving the same goal as HTTP/2 stream multiplexing while remaining compatible with HTTP/1.x.
