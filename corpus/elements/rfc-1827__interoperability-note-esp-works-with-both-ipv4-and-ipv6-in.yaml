document: rfc-1827
kind: interoperability-note
summary: ESP works with both IPv4 and IPv6. In IPv6, the Authentication Header and other end-to-end headers precede the ESP header; in Transport-mode the ESP header sits immediately before the transport-layer header. The mechanism is the same for both IP versions.
section: "1"
topics:
