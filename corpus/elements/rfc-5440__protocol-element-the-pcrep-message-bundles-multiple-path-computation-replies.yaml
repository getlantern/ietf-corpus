document: rfc-5440
kind: protocol-element
summary: The PCRep message bundles multiple path computation replies and contains a response-list where each response includes an RP object, optional NO-PATH, optional attribute-list (LSPA, BANDWIDTH, METRIC, IRO), and optional path-list (each path is an ERO followed by an attribute-list). The PCRep MUST contain at least one RP object.
section: "6.5"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
