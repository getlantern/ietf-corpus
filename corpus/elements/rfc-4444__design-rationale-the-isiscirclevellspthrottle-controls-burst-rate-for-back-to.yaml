document: rfc-4444
kind: design-rationale
summary: The isisCircLevelLSPThrottle controls burst rate for back-to-back LSP transmissions (minimum inter-LSP interval in ms), while isisCircLevelMinLSPRetransInt controls the minimum re-send interval for the same LSP (in seconds). These are intentionally separate to address different flooding behaviors.
