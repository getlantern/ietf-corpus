document: rfc-9255
kind: design-rationale
summary: Normally the INR holder does not hold the private key attesting to their resources — the CA does. The INR holder has a real-world business relationship with the CA and relies on it to manipulate INRs, meaning proof of key possession does not imply organizational authority.
