document: rfc-4960
kind: security-consideration
summary: SCTP does not provide confidentiality; users requiring it should use IPSEC or application-layer encryption. The CRC32c checksum provides protection against accidental data corruption in the network but is not a cryptographic integrity mechanism.
section: 11.2.3
topics:
    - sctp
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
