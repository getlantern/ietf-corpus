document: rfc-9125
kind: normative-requirement
summary: A route target MUST be attached to each gateway's auto-discovery route, and its value MUST be set to a value that indicates the site identifier. It is RECOMMENDED that a Type x00 or x02 route target be used.
section: "3"
rfc2119_level: MUST
topics:
