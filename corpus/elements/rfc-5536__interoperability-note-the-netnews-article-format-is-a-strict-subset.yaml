document: rfc-5536
kind: interoperability-note
summary: 'The Netnews article format is a strict subset of RFC 5322: all conformant Netnews articles satisfy RFC 5322 syntax, but the converse is not guaranteed. Key additional restrictions are: mandatory space after '':'', 250-octet msg-id limit, no comments in Message-ID, non-empty header field bodies, and acceptance of GMT timezone.'
