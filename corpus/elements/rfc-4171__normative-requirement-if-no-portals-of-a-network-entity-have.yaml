document: rfc-4171
kind: normative-requirement
summary: If no Portals of a Network Entity have been placed into a DD, queries scoped to that DD SHALL report all Portals of that Entity; if one or more Portals have been explicitly placed, only those Portals SHALL be reported.
section: 2.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
