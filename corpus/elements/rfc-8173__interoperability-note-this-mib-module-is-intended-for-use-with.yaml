document: rfc-8173
kind: interoperability-note
summary: This MIB module is intended for use with the default PTP profile of IEEE Std. 1588-2008 running over IP. It does not address PTPv1 (IEEE Std. 1588-2002) and is not intended to replace profile-specific MIB modules that other PTP profiles (e.g., G.8265.1 Telecom Profile) define as part of their own specification.
