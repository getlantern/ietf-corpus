document: rfc-8415
kind: normative-requirement
summary: A DHCP client that generates a DUID-LLT MUST provide an administrative interface that allows the existing DUID to be replaced with a newly generated DUID-LLT, to recover from the unlikely event of a collision.
section: "11.2"
rfc2119_level: MUST
