document: rfc-3697
kind: normative-requirement
summary: To avoid accidental Flow Label value reuse, the source node SHOULD select new Flow Label values in a well-defined sequence (e.g., sequential or pseudo-random) and use an initial value that avoids reuse of recently used values each time the system restarts.
section: "3"
rfc2119_level: SHOULD
