document: rfc-3295
kind: normative-requirement
summary: For TCP/IP encapsulation, implementations are only REQUIRED to support unknown(0) and IPv4 addresses in gsmpTcpIpEncapAddressType; zone-index and IPv6 address support is optional. DNS domain names for Internet addresses are not allowed.
section: "4"
rfc2119_level: REQUIRED
