document: rfc-9671
kind: interoperability-note
summary: The :organizers argument requires the 'extlists' extension to be enabled. The :outcome and :reason arguments require the 'variables' extension. When these extensions are not enabled, using their associated arguments MUST cause an error per RFC 5228.
