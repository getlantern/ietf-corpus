document: rfc-4954
kind: protocol-element
summary: The AUTH parameter to the MAIL FROM command carries a <mailbox> (encoded in xtext) representing the identity that originally submitted the message, or the two-character sequence '<>' when that identity is unknown or insufficiently authenticated. This allows cooperating agents in a trusted environment to propagate submission identity across relay hops.
section: "5"
topics:
