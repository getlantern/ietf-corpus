document: rfc-6763
kind: registry
summary: IANA manages the namespace of unique Service Names per RFC 6335. When a protocol uses subtypes, these should be documented in the protocol specification or in the 'notes' field of the IANA registration. When a flagship protocol relationship exists, the flagship name should also be recorded in the 'notes' field of each related service registration.
