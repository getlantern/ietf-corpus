document: rfc-9780
kind: normative-requirement
summary: The sender of an MPLS echo request SHOULD use an IPv6 destination address from the Dummy IPv6 Prefix address block 100:0:0:1::/64; it MAY instead select an address from ::ffff:7f00/104.
section: "3.1"
rfc2119_level: SHOULD
