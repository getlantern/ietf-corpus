document: rfc-9597
kind: security-consideration
summary: Processing information in claims prior to cryptographic validation poses security risks. Implementers must ensure any tentative decisions made on unverified claims are confirmed once cryptographic processing completes, including information used to derive the intended interpretation of the CWT claims parameter.
section: "4"
topics:
    - security
    - cbor
    - crypto
