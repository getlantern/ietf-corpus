kind: protocol-element
summary: The TAK structure contains a version integer (default 0), a required 'current' TAKey, an optional 'predecessor' TAKey (tagged [0]), and an optional 'successor' TAKey (tagged [1]). The current field must match the TA CA certificate that issued the TAK's EE certificate.
