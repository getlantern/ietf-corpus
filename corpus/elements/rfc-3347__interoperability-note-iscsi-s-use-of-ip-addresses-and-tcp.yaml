document: rfc-3347
kind: interoperability-note
summary: 'iSCSI''s use of IP addresses and TCP port numbers MUST be firewall-friendly: all connection requests should normally be addressed to a specific well-known TCP port, allowing firewalls to filter on source/destination IP and destination port number.'
