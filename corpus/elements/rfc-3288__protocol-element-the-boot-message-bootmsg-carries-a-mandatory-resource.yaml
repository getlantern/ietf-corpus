document: rfc-3288
kind: protocol-element
summary: The boot message ('bootmsg') carries a mandatory 'resource' attribute (analogous to HTTP's abs_path Request-URI) and an optional 'features' attribute listing requested optional profile features. The boot response ('bootrpy') echoes a subset of accepted feature tokens; absence means no features are enabled.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
