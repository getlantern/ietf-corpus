document: rfc-2212
kind: normative-requirement
summary: Each network element MUST ensure its service approximates the fluid model at the reserved service rate R, matching it to within sharp error bounds characterized by C and D. It is acceptable to provide better service than the fluid model.
section: Network Element Data Handling Requirements
rfc2119_level: MUST
