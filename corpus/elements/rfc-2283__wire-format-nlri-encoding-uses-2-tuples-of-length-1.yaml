kind: wire-format
summary: NLRI encoding uses 2-tuples of <Length (1 octet, length in bits of address prefix), Prefix (variable, padded with trailing bits to octet boundary)>. A length of zero indicates a prefix matching all addresses with the prefix itself being zero octets.
