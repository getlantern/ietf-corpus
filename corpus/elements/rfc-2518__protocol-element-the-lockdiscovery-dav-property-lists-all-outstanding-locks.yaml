document: rfc-2518
kind: protocol-element
summary: The lockdiscovery DAV property lists all outstanding locks on a resource, including lock type (exclusive/shared), scope, depth, owner, timeout, and lock token. The supportedlock property advertises which lock types and scopes the resource supports.
