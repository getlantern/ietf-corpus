document: rfc-5460
kind: normative-requirement
summary: If the TCP connection becomes blocked while requestor is sending or receiving, the requestor SHOULD be prepared to terminate the connection after BULK_LQ_DATA_TIMEOUT (default 300 seconds). Same timeout applies to servers accepting connections or reading queries.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
