document: rfc-5361
kind: normative-requirement
summary: The <validity> element is not applicable to permission documents; each <permission> element has an infinite lifetime and can be revoked via an independent mechanism. If present, <validity> elements MUST be ignored.
section: 3.1.4
rfc2119_level: MUST
topics:
