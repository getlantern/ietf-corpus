document: rfc-8708
kind: design-rationale
summary: The HSS hierarchy was introduced to scale LMS beyond the limits of a single tree. Without HSS, generating the entire tree for a large number of signatures might take weeks or longer; subordinate trees are generated on demand by the signer.
