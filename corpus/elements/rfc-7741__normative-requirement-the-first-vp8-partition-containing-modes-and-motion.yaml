document: rfc-7741
kind: normative-requirement
summary: The first VP8 partition (containing modes and motion vectors) MUST be labeled with PID=0. PID SHOULD be incremented by 1 for each subsequent partition, but MAY be kept at 0 for all packets. PID cannot be larger than 7.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
