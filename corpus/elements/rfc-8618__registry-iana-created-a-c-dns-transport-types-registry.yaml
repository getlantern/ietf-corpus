summary: 'IANA created a ''C-DNS Transport Types'' registry. Initial values: 0=UDP, 1=TCP, 2=TLS, 3=DTLS, 4=HTTPS, 15=Non-standard transport. Values 5-14 are reserved. These values are used in the ''qr-transport-flags'', ''ae-transport-flags'', and ''mm-transport-flags'' fields (bits 1-4).'
