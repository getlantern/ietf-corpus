document: rfc-4660
kind: protocol-element
summary: Filtering rules are transported by inserting an XML document (per RFC 4661) in the body of a SUBSCRIBE request. The filter body uses MIME type 'application/simple-filter+xml' and may contain multiple <filter> elements, each optionally carrying a 'uri' or 'domain' attribute to identify the target resource.
section: "3.1"
topics:
    - sip
    - realtime
