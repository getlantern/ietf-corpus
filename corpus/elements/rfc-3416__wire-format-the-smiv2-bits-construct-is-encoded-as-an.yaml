document: rfc-3416
kind: wire-format
summary: The SMIv2 BITS construct is encoded as an OCTET STRING with named bits placed from bit 8 (high order) to bit 1 (low order) of the first octet, continuing through subsequent octets. Remaining bits in the final octet are set to zero on generation and ignored on receipt.
