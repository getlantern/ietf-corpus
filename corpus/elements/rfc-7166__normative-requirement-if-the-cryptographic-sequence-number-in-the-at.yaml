document: rfc-7166
kind: normative-requirement
summary: If the cryptographic sequence number in the AT is less than or equal to the last sequence number for the same OSPFv3 packet type from the neighbor, the packet MUST be dropped and an error event SHOULD be logged.
section: "4.6"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
