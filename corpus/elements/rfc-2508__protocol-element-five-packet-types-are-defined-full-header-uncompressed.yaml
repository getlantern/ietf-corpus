document: rfc-2508
kind: protocol-element
summary: 'Five packet types are defined: FULL_HEADER (uncompressed headers with CID and sequence number), COMPRESSED_RTP (fully compressed IP/UDP/RTP with delta fields), COMPRESSED_UDP (compressed IP/UDP with uncompressed RTP payload), CONTEXT_STATE (decompressor-to-compressor error signal), and optionally COMPRESSED_NON_TCP (non-differential compression from RFC 2507, primarily for IPv6).'
section: "3.3"
topics:
