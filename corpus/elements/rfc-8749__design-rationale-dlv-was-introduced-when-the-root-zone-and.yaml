document: rfc-8749
kind: design-rationale
summary: DLV was introduced when the root zone and many TLDs were unsigned, allowing trust anchors to be published outside the normal DNS delegation chain. With the root zone signed in 2010 and 1389 of 1531 TLDs securely delegated as of May 2019, DLV has served its purpose.
section: "1"
topics:
