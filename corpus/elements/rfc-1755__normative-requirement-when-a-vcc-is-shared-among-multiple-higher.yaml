document: rfc-1755
kind: normative-requirement
summary: When a VCC is shared among multiple higher-layer protocol entities, the ATM endsystem MUST monitor traffic at the lowest multiplexing layer to properly detect idle connections. If a shared VCC is not to be disconnected per RFC 1577, the ATMARP client or server SHALL NOT disconnect the call.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
