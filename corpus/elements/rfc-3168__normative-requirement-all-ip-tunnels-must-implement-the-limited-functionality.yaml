document: rfc-3168
kind: normative-requirement
summary: All IP tunnels MUST implement the limited-functionality ECN option (setting not-ECT in the outer header regardless of inner header) and SHOULD support the full-functionality option (copying ECN codepoints and propagating CE from outer to inner header at egress).
section: 9.1.1
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
