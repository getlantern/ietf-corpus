summary: The SYSLOG-MSG-MIB module is assigned OID mib-2 192 and organizes objects into syslogMsgNotifications (0), syslogMsgObjects (1), and syslogMsgConformance (2) subtrees. It provides a MIB representation of SYSLOG messages for SNMP management.
