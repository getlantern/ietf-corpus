summary: SNMP transport endpoints SHOULD continue to use definitions from the SNMPv2-TM MIB module where applicable, and SHOULD use the transport domain values from this memo for SNMP transports not defined in SNMPv2-TM (e.g., SNMP over UDP over IPv6).
