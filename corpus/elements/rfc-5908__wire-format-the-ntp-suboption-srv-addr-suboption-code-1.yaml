document: rfc-5908
kind: wire-format
summary: The NTP_SUBOPTION_SRV_ADDR suboption (code 1) carries the IPv6 unicast address of an NTP/SNTP server. It has a fixed suboption-len of 16 bytes containing the 128-bit IPv6 address.
