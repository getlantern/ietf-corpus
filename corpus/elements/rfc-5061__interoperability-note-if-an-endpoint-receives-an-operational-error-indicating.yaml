document: rfc-5061
kind: interoperability-note
summary: If an endpoint receives an Operational Error indicating that the ASCONF chunk type is not understood, it MUST NOT send any further ASCONF chunks to that peer and MUST inform the upper-layer application that the peer does not support the dynamic address reconfiguration extension.
section: "5.1"
topics:
    - sctp
    - multipath
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
