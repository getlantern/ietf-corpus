document: rfc-9755
kind: protocol-element
summary: The 'UTF8=ACCEPT' capability indicates server support for opening internationalized mailboxes via SELECT/EXAMINE and for UTF-8 responses to LIST/LSUB. It also affects NAMESPACE, ACL, and other extensions that return mailbox names.
