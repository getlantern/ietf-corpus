document: rfc-6884
kind: registry
summary: 'This document registers three new IANA ''audio'' media subtypes: audio/EVRCNW (interleaved/bundled format, also usable for file storage), audio/EVRCNW0 (header-free format, RTP-only), and audio/EVRCNW1 (compact bundled format, RTP-only). All three support mode-set-recv, DTX, and silence suppression parameters.'
section: "9.1"
