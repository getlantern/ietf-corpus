document: rfc-6470
kind: protocol-element
summary: 'The ''common-session-parms'' grouping identifies a management session with three leaves: ''username'' (mandatory string), ''session-id'' (mandatory nc:session-id-or-zero-type), and optional ''source-host'' (inet:ip-address). It is reused across session-start, session-end, and confirmed-commit notifications.'
section: "2.2"
topics:
