document: rfc-9264
kind: security-consideration
summary: The implicit context of an HTTP interaction can be lost or changed when self-contained link representations are moved. Links without explicit anchors or using relative URIs may be misinterpreted; applications may choose to ignore such links in standalone resources.
section: "9"
topics:
