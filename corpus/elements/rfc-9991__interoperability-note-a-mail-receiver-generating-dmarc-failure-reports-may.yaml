document: rfc-9991
kind: interoperability-note
summary: A Mail Receiver generating DMARC failure reports MAY also issue DKIM-specific or SPF-specific failure reports (per RFC 6591) instead of or in addition to the DMARC failure report type. Reporters are also free to follow RFC 6651 (DKIM failure reporting) or RFC 6652 (SPF failure reporting) specifications.
section: "3"
topics:
