document: rfc-5942
kind: security-consideration
summary: RFC 4861's prior definition of 'on-link' included two bullets — receiving an NA for an address or any ND message from an address — that could allow an on-link attacker to spoof addresses and cause a host to add remote addresses to its Neighbor Cache as on-link. This document deprecates both bullets. US-CERT VU#472363 tracks affected implementations.
section: "8"
topics:
    - ip
    - security
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
