document: rfc-2115
kind: protocol-element
summary: frDlcmiPollingInterval (Timer T391) specifies the number of seconds between successive status enquiry messages, with a range of 5..30 seconds and a default of 10. frDlcmiFullEnquiryInterval (Counter N391) is the number of status enquiry intervals before a full status enquiry is issued, range 1..255, default 6.
section: "6.1"
