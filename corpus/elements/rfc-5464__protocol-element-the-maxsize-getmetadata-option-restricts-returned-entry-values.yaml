document: rfc-5464
kind: protocol-element
summary: The MAXSIZE GETMETADATA option restricts returned entry values to those whose octet size is less than or equal to the specified limit. If any entries exceed the limit, the server MUST include the METADATA LONGENTRIES response code in the tagged OK response, reporting the size of the largest excluded entry.
section: 4.2.1
topics:
    - email
