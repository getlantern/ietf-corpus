document: rfc-2954
kind: design-rationale
summary: The working group chose to update DisplayString to SnmpAdminString in-place rather than deprecate old objects and add new ones. They judged that deprecation would have a more adverse impact on backward compatibility and interoperability given the semantics of these string-typed objects, even though the in-place change is not strictly supported by SMIv2.
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
