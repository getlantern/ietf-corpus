document: rfc-4807
kind: wire-format
summary: SpdTimePeriod is a UTF-8 OCTET STRING (SIZE 0..31) encoding a time range as 'yyyymmddThhmmss/yyyymmddThhmmss', where 'T' separates date from time and '/' separates start from end. The start may be replaced with 'THISANDPRIOR' and the end with 'THISANDFUTURE'.
