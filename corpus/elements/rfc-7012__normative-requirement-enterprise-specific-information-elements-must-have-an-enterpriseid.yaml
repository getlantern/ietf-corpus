document: rfc-7012
kind: normative-requirement
summary: Enterprise-specific Information Elements MUST have an enterpriseId defined. If such IEs are used outside the enterprise, the identifier MUST be made globally unique by combining it with an enterprise identifier from the IANA SMI private enterprise numbers registry.
section: "2.1"
rfc2119_level: MUST
topics:
    - measurement
    - registry
