summary: 'Address synthesis rules: OUI (3 bytes) combined with MAC/24 (3 bytes) produces a 48-bit MAC; OUI combined with MAC/40 (5 bytes) produces a 64-bit MAC. IPv6/64 (8 bytes) combined with a 48-bit or 64-bit MAC (expanded per RFC 7042 Section 2.2.1) produces a 128-bit IPv6 address.'
