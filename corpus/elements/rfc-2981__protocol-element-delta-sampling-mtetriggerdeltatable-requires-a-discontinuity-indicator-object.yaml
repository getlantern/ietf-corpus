document: rfc-2981
kind: protocol-element
summary: Delta sampling (mteTriggerDeltaTable) requires a discontinuity indicator object specified by mteTriggerDeltaDiscontinuityID, defaulting to sysUpTime.0. Even if a custom discontinuity ID is configured, sysUpTime MUST still be checked for an overall discontinuity.
