document: rfc-4939
kind: security-consideration
summary: The iSNS MIB defines exclusively read-only (MAX-ACCESS read-only) objects, limiting the attack surface to information disclosure. Implementors should apply SNMPv3 authentication and encryption (authPriv security level) to prevent unauthorized access to storage topology data including portal addresses, node names, and IPsec policy settings.
section: "7"
topics:
    - snmp
    - security
