document: rfc-2848
kind: interoperability-note
summary: PINT clients sending included data objects (multipart MIME) SHOULD use TCP to avoid fragmentation and ensure reliable delivery. If the PINT gateway location is unknown and the request is likely to span multiple IP datagrams, it is RECOMMENDED to use a URI reference rather than inline data.
section: 3.5.1
topics:
    - realtime
    - sip
    - tcp
