document: rfc-8659
kind: protocol-element
summary: 'A CAA RR contains a single Property (tag-value pair). An FQDN MAY have multiple CAA RRs, and a given Property Tag MAY appear more than once. The canonical presentation format is: CAA <flags> <tag> <value>, where flags is 0–255, tag is lowercase ASCII alphanumeric, and value is a contiguous string or quoted string with no 255-character limit.'
section: 4.1.1
topics:
