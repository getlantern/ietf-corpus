document: rfc-4880
kind: state-machine
summary: 'Key revocation states are encoded in the Reason for Revocation subpacket (type 29): code 0 (unspecified), 1 (superseded), 2 (compromised), 3 (retired), 32 (User ID no longer valid). A compromised key makes all prior signatures suspect, whereas superseded/retired keys leave old signatures valid.'
section: 5.2.3.23
