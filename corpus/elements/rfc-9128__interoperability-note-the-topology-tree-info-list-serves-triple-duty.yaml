kind: interoperability-note
summary: 'The topology-tree-info list serves triple duty: (*,G) routes when source-address is ''ietf-routing-types:*'' and is-rpt is false (maps to pimStarGTable), (S,G) routes when source-address is specific and is-rpt is false (pimSGTable), and (S,G,rpt) entries when is-rpt is true (pimSGRptTable).'
