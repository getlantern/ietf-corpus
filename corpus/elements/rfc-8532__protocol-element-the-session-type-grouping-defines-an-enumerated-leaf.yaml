document: rfc-8532
kind: protocol-element
summary: The 'session-type' grouping defines an enumerated leaf ('proactive' or 'on-demand', default 'on-demand') indicating the OAM activation mode. Proactive requires persistent configuration and runs continuously; on-demand requires only transient configuration for limited-time diagnostics.
section: "3.2"
