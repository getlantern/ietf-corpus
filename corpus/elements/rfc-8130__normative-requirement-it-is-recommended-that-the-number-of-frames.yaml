document: rfc-8130
kind: normative-requirement
summary: It is RECOMMENDED that the number of frames contained within an RTP packet be consistent with the application; for real-time telephony, fewer frames per packet reduces delay, while bandwidth-constrained links may use more frames per packet.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
    - congestion
