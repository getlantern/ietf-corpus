document: rfc-5001
kind: interoperability-note
summary: Adding the NSID option to a response may trigger DNS message truncation. This specification does not change truncation rules; including NSID in a response is always optional, so servers are never required to truncate to include it.
section: "3.4"
topics:
    - dns
