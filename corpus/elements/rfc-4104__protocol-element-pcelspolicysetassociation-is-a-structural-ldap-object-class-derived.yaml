document: rfc-4104
kind: protocol-element
summary: pcelsPolicySetAssociation is a structural LDAP object class derived from pcimPolicy used to associate PolicySet instances to other entries. It MUST include a pcelsPriority attribute and MAY include pcelsPolicySetName and pcelsPolicySetDN. It is always subordinated to the aggregating entry.
section: "5.2"
topics:
    - ldap
