document: rfc-4095
kind: protocol-element
summary: A solicitation class keyword (e.g., 'org.example.adv') is transformed into a DNS lookup key by substituting '.' for ':' and reversing the label. For example, 'org.example:ADV' becomes 'ADV.example.org'. This key is then used to query for NAPTR resource records.
section: "2"
topics:
