document: rfc-3670
kind: protocol-element
summary: DropThresholdCalculationService (DTCS) represents per-queue smoothing parameterization (weight and time interval) consumed by a REDDropperService. A DTCS instance is tied to exactly one queue, but a queue may be referenced by multiple DTCS instances; a single DTCS may be shared across multiple REDDropperService instances.
section: 3.10.2
topics:
    - qos
    - congestion
