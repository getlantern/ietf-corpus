document: rfc-5795
kind: normative-requirement
summary: If a parsing error occurs for any packet type, the decompressor MUST discard the packet without further processing; for example, a large CID field encoded with more than 2 octets (first bits 110 or 111) triggers a parsing error.
section: 5.2.3
rfc2119_level: MUST
topics:
    - routing
