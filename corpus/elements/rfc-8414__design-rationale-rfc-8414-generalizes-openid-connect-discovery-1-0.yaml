document: rfc-8414
kind: design-rationale
summary: RFC 8414 generalizes OpenID Connect Discovery 1.0's metadata format to be applicable to a wider set of OAuth 2.0 use cases, intentionally paralleling how RFC 7591 generalized OpenID Connect Dynamic Client Registration. This allows OAuth implementations to adopt a standard discovery mechanism without requiring OpenID Connect.
section: "1"
topics:
    - oauth
