document: rfc-5577
kind: normative-requirement
summary: Non-standard bit rates MUST have a value that is a multiple of 400 bits/s to maintain octet alignment. It is RECOMMENDED that values in the range 16000 to 48000 be used.
section: "3.2"
rfc2119_level: MUST
topics:
