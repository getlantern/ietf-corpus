document: rfc-1237
kind: design-rationale
summary: Regionals should not derive their NSAP prefix from a backbone's address space because regionals and backbones are independent—regionals may change backbone providers (analogous to switching long-distance carriers). Tying a regional's addresses to a backbone prefix is structurally inconsistent with this independence.
section: 5.3.2
topics:
    - routing
