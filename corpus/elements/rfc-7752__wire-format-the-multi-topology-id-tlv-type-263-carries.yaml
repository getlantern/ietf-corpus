document: rfc-7752
kind: wire-format
summary: The Multi-Topology ID TLV (Type 263) carries one or more IS-IS or OSPF Multi-Topology IDs, each 2 octets wide (4 reserved bits + 12-bit MT-ID). Length is 2*n where n is the count of MT-IDs. For OSPF-derived values, the upper 9 bits MUST be set to 0.
section: 3.2.1.5
topics:
    - bgp
    - routing
