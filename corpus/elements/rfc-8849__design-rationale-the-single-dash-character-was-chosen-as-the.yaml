document: rfc-8849
kind: design-rationale
summary: The single-dash '-' character was chosen as the sentinel value for 'no applicable captureID' because the CLUE captureID syntax (defined as 'xs:ID' in RFC 8846) makes a single dash an illegal captureID value, eliminating any ambiguity with actual captureID values.
