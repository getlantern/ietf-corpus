document: rfc-4121
kind: wire-format
summary: The EC (Extra Count) field is a two-octet big-endian integer. In Wrap tokens with confidentiality it encodes the number of filler octets appended to plaintext before encryption; in Wrap tokens without confidentiality it encodes the number of octets in the trailing checksum.
