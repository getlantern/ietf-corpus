document: rfc-6856
kind: protocol-element
summary: 'The UTF8 POP3 extension capability (CAPA tag: UTF8) adds a new command ''UTF8'' that switches the session from ASCII-only mode to UTF-8 mode, enabling UTF-8 strings in headers, bodies, usernames, and passwords. The capability may carry an optional ''USER'' argument indicating the server accepts UTF-8 credentials.'
section: "2"
topics:
