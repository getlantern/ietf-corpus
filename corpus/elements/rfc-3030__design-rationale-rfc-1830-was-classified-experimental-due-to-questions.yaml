document: rfc-3030
kind: design-rationale
summary: RFC 1830 was classified experimental due to questions about the robustness of Binary Content-Transfer-Encoding in MIME implementations. As MIME matured and binary encoding deployments increased, those concerns were resolved, enabling promotion to standards track in RFC 3030.
