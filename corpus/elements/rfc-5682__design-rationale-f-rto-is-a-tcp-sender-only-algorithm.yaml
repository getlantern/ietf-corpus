document: rfc-5682
kind: design-rationale
summary: F-RTO is a TCP sender-only algorithm requiring no TCP options. Unlike Eifel (which requires TCP timestamps) and DSACK-based algorithms (which require SACK with DSACK extension), F-RTO can be deployed with sender-side modifications only, broadening its applicability.
section: "1"
topics:
