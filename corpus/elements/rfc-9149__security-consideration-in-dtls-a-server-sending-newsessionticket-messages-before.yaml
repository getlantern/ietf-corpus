document: rfc-9149
kind: security-consideration
summary: 'In DTLS, a server sending NewSessionTicket messages before verifying client IP ownership enables an amplification attack: an attacker can spoof client packets to direct a flood of ticket messages proportional to the requested count toward a target.'
section: "6"
