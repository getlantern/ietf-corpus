document: rfc-3885
kind: normative-requirement
summary: Servers MAY ignore the mtrk-timeout value if it violates local policy, but any enforced upper limit MUST be at least one day. An MTQP server MUST NOT deny knowledge of a message while that message still sits in the MTA queue.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
