document: rfc-7858
kind: normative-requirement
summary: When using TCP Fast Open, the client and server MUST immediately initiate or resume a TLS handshake; cleartext DNS MUST NOT be exchanged. DNS servers SHOULD enable fast TLS session resumption (RFC 5077).
section: "3.4"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
