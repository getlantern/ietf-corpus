summary: 'IANA registered four permanent URI schemes: coap+tcp, coaps+tcp, coap+ws, and coaps+ws. A note in each registration acknowledges that assigning distinct URI schemes per transport runs counter to the W3C principle of avoiding URI aliases for the same resource.'
