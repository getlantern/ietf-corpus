document: rfc-8104
kind: normative-requirement
summary: A primary PE MUST advertise a primary PW's label to a protector via a Label Mapping message carrying a Protection FEC Element TLV, an Upstream-Assigned Label TLV, and an Interface_ID TLV encoded with the context identifier of the {primary PE, protector}.
section: "6.2"
rfc2119_level: MUST
