document: rfc-2739
kind: protocol-element
summary: CAPURI (Calendar Access URI) is a protocol-independent URI from which a CUA can communicate with a user's entire calendar. Semantics for using this URI as an access protocol locator are deferred to the Calendar Access Protocol specification.
