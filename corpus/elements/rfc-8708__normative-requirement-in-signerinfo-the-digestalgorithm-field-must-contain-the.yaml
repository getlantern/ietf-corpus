document: rfc-8708
kind: normative-requirement
summary: In SignerInfo, the digestAlgorithm field MUST contain the one-way hash function used in the HSS/LMS tree (currently SHA-256), and the signatureAlgorithm MUST contain id-alg-hss-lms-hashsig with absent parameters.
section: "5"
rfc2119_level: MUST
topics:
