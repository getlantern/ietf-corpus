document: rfc-3581
kind: design-rationale
summary: Although this specification is primarily aimed at enabling SIP responses to traverse NATs, it can also be used as a UNSAF (Unilateral Self-Address Fixing) protocol, allowing a client to learn its externally-visible IP address and port for use in Contact or Record-Route headers. The IAB considerations section documents the brittleness of such secondary usage.
section: "9"
topics:
