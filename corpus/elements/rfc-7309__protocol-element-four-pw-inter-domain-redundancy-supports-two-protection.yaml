document: rfc-7309
kind: protocol-element
summary: 'Four-PW inter-domain redundancy supports two protection models: 1:1 (one active, one standby) and 3:1 (one active, three standby). In the 3:1 model, Option A requires Request Switchover bit support (RFC 6870 Section 6.3); Option B requires master/slave mode and ICCP in only one domain.'
section: "5.3"
topics:
