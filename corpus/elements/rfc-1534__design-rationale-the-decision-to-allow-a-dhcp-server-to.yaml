document: rfc-1534
kind: design-rationale
summary: The decision to allow a DHCP server to return automatic addresses to BOOTP clients must be under administrator control and default to OFF, because BOOTP clients may not be prepared to receive automatic addresses and will not participate in the DHCP lease lifecycle.
section: "2"
