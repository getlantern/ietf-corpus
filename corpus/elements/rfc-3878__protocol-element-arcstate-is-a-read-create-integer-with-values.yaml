document: rfc-3878
kind: protocol-element
summary: arcState is a read-create INTEGER with values nalm(1), nalmQI(2), nalmTI(3), nalmQICD(4) controlling the alarm reporting inhibit state for a resource. The alm state is not enumerated; row deletion represents the alm state. A resource must support alm and at least one of nalm, nalmTI, or nalmQI; nalmQICD is optional.
section: "5"
