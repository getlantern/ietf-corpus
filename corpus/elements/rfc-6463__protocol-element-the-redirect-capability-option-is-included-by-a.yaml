document: rfc-6463
kind: protocol-element
summary: The Redirect-Capability option is included by a MAG in a PBU that establishes a new mobility session (Handoff Indicator = 1) to signal to the LMA that the MAG supports and has enabled the runtime LMA assignment functionality. Its presence is a prerequisite for the rfLMA to perform redirection.
section: "4.1"
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
