document: rfc-3030
kind: normative-requirement
summary: DATA and BDAT commands cannot be used in the same transaction. If a DATA statement is issued after a BDAT for the current transaction, a 503 'Bad sequence of commands' MUST be issued.
section: "2"
rfc2119_level: MUST
topics:
    - email
