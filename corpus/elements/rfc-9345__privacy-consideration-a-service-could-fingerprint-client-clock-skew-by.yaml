document: rfc-9345
kind: privacy-consideration
summary: A service could fingerprint client clock skew by creating delegated credentials with different expiry timestamps and observing which ones the client accepts. Privacy-sensitive clients (e.g., browsers in incognito mode) might choose not to advertise support for delegated credentials or limit probing by the server.
section: "7.5"
topics:
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
