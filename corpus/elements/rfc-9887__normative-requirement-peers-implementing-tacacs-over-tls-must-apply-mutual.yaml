document: rfc-9887
kind: normative-requirement
summary: Peers implementing TACACS+ over TLS MUST apply mutual authentication and encrypt all data exchanged. When a TCP connection is established, a TLS handshake begins immediately; options that upgrade an initial non-TLS connection MUST NOT be used.
section: "3.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
