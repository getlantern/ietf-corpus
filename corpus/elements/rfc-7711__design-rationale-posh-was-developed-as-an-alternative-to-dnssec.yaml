document: rfc-7711
kind: design-rationale
summary: POSH was developed as an alternative to DNSSEC/DANE specifically because deployment of DNSSEC and DANE was expected to take years for many operators due to tooling and top-level domain delays, making a more immediately deployable HTTP-based solution desirable.
