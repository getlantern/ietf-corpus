document: rfc-7784
kind: design-rationale
summary: TRILL's 24-bit Fine-Grained Label (FGL) is represented in the IEEE8021-TC-MIB by reusing value 2 of IEEE8021ServiceSelectorType (originally defined for 24-bit ISIDs), rather than adding a new type, enabling reuse of existing textual conventions for service selector encoding.
