summary: iscsiTgtPortalAttributesTable contains target-portal-specific attributes including TCP listen port (iscsiTgtPortalPort) and aggregation tag (iscsiTgtPortalTag, range 1..65535). Portals sharing the same tag can aggregate connections within the same multi-connection session.
