document: rfc-3739
kind: normative-requirement
summary: The dateOfBirth attribute SHOULD specify GMT 12:00:00 (noon) down to the granularity of seconds to prevent accidental change of date due to time zone adjustments. Compliant certificate parsing applications SHOULD ignore any time data and present only the date.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - pkix
