document: rfc-2821
kind: wire-format
summary: 'End-of-data indicator for the DATA command is a line containing only a period: the byte sequence <CRLF>.<CRLF>. Transparency is achieved by prepending a period to any message line beginning with a period; the receiver strips the extra period. ''<LF>.<LF>'' MUST NOT be treated as equivalent.'
section: 4.5.2
topics:
    - email
