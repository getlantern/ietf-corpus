document: rfc-9008
kind: security-consideration
summary: IPsec Authentication Header (AH) can be applied across the RPL Option and RH3 headers because both are marked mutable-but-recoverable; however, AH cannot protect the values that mutate en route (e.g., SenderRank, Segments Left).
