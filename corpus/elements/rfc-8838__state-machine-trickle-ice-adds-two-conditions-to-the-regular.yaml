document: rfc-8838
kind: state-machine
summary: 'Trickle ICE adds two conditions to the regular ICE failure criteria for a checklist: (1) all candidate gathering has completed and no new local candidates are expected, AND (2) the remote agent has conveyed an end-of-candidates indication for that checklist. Only when both Trickle ICE conditions and the original RFC 8445 conditions are satisfied can a checklist be set to Failed.'
section: "8"
