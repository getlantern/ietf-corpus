document: rfc-3101
kind: wire-format
summary: The Router-LSA (Type-1) is extended with the Nt bit in the flags byte, positioned alongside the existing V, E, W, and B bits. When Nt is set, the router is an NSSA border router with NSSATranslatorRole=Always, unconditionally translating Type-7 LSAs into Type-5 LSAs.
section: Appendix B
topics:
    - routing
