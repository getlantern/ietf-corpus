document: rfc-9622
kind: design-rationale
summary: When path and protocol preferences conflict, path selection is prioritized over protocol selection. This ordering is chosen because interface type preferences often reflect user cost concerns (e.g., avoiding cellular data charges), which are higher-stakes than protocol preferences.
section: "6.2"
