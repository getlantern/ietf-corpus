document: rfc-8794
kind: normative-requirement
summary: Each Variable-Size Integer MUST contain exactly one VINT_MARKER. The VINT_DATA MUST be zero-padded to the left so the entire VINT is octet-aligned, and VINT_DATA MUST be expressed as a big-endian unsigned integer.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
