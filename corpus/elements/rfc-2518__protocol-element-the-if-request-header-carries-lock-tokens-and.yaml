document: rfc-2518
kind: protocol-element
summary: The If request header carries lock tokens and optionally ETags as preconditions. It uses no-tag-list and tagged-list productions, where tagged-lists associate conditions with specific resource URIs. If conditions are not met, the server MUST return 412 (Precondition Failed).
section: "9.4"
topics:
