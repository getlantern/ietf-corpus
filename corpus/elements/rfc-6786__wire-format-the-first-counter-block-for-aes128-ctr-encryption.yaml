summary: 'The first counter block for AES128_CTR encryption is Ctr_1: a 1-octet Flags field (0x02) followed by the 12-octet nonce (Key-Id | Session ID | Sequence Number) followed by a 3-octet counter initialized to 1, yielding a 16-octet block.'
