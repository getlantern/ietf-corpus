document: rfc-8343
kind: security-consideration
summary: The YANG module is accessed via NETCONF or RESTCONF; the mandatory-to-implement secure transport for NETCONF is SSH (RFC 6242) and for RESTCONF is TLS (RFC 5246). The NETCONF Access Control Model (RFC 8341) must be used to restrict access to authorized users.
section: "7"
topics:
    - security
    - yang
    - netconf
    - tls
