document: rfc-8214
kind: design-rationale
summary: 'EVPN-VPWS enables faster failover than PW redundancy: a single BGP route withdrawal per EVPL service triggers convergence, whereas PW redundancy requires two control-plane messages (deactivate primary group, then activate backup group). Additionally, EVPN can use data-plane egress link protection via the backup PE''s label.'
