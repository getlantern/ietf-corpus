document: rfc-6733
kind: protocol-element
summary: Capabilities Exchange uses CER (Capabilities-Exchange-Request, command code 257) and CEA messages exchanged at connection establishment. They carry Origin-Host, Origin-Realm, Host-IP-Address, Vendor-Id, Product-Name, and lists of supported Auth-Application-Id and Acct-Application-Id AVPs. Relay and redirect agents MUST advertise the Relay Application ID (0xffffffff); other nodes MUST advertise only locally supported applications.
section: "5.3"
topics:
    - diameter
