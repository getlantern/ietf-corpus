document: rfc-1001
kind: state-machine
summary: Name conflict arises when a unique name is held by more than one node. B and M nodes detect conflict by receiving inconsistent responses to broadcast name queries within CONFLICT_TIMER; the detector sends NAME CONFLICT DEMAND to the offending node. Any end-node receiving NAME CONFLICT DEMAND must mark the name conflicted in its local name table, ceasing all use except DELETE NAME.
section: 15.1.3.5
topics:
    - security
