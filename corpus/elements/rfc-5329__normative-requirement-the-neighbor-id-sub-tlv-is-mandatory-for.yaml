document: rfc-5329
kind: normative-requirement
summary: The Neighbor ID sub-TLV is mandatory for OSPFv3 TE support and MUST appear exactly once in a Link TLV. All other sub-TLVs defined in this document SHOULD NOT occur more than once; subsequent instances are ignored.
section: "4"
rfc2119_level: MUST
topics:
    - routing
