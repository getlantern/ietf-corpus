document: rfc-3853
kind: design-rationale
summary: S/MIME had not seen widespread deployment in SIP user agents at the time of this update, meaning the change from 3DES to AES as the mandatory ciphersuite would not obsolete any substantial existing deployments and would likely make S/MIME support easier to implement.
