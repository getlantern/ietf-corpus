document: rfc-6073
kind: normative-requirement
summary: For static MPLS and L2TPv3 PW switching, the S-PE MUST be configured to direct packets from one PW to the other, including the mapping of MPLS PW Label to L2TPv3 Session ID (and Cookie if present) and MPLS Tunnel Label to PE destination IP.
section: "8.1"
rfc2119_level: MUST
topics:
