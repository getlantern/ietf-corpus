document: rfc-7866
kind: protocol-element
summary: The Recording Session (RS) is a SIP session established between the Session Recording Client (SRC) and the Session Recording Server (SRS) to deliver replicated real-time media and metadata from a Communication Session (CS). The RS is independent of the CS and may span multiple CSs.
