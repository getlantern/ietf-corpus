document: rfc-2948
kind: design-rationale
summary: OFB mode was chosen originally when CPU speeds were too slow for CFB. The document notes that CPUs have since become much faster and suggests DES3_OFB64 may warrant deprecation in favor of CFB modes given OFB's inherent weaknesses.
