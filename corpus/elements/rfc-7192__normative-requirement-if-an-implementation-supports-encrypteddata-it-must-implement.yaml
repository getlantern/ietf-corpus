document: rfc-7192
kind: normative-requirement
summary: If an implementation supports EncryptedData, it MUST implement AES-128 in CBC mode and SHOULD implement AES-256 in CBC mode. Key management for EncryptedData is handled by other means outside this document.
section: "4"
rfc2119_level: MUST
