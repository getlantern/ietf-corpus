document: rfc-1271
kind: protocol-element
summary: The Alarm Group (alarmTable, alarm 1) periodically samples an ASN.1 INTEGER-typed MIB variable and compares it against a rising threshold and a falling threshold. Sampling may be absoluteValue(1) or deltaValue(2); a hysteresis mechanism prevents repeated events until the opposite threshold is crossed.
section: 4.3.3
