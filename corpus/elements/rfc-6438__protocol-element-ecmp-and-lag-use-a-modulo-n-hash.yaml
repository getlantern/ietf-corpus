document: rfc-6438
kind: protocol-element
summary: ECMP and LAG use a modulo(N) hash over defined header fields to distribute traffic across N equally good paths. The hash ensures all packets of a given flow yield the same output, preventing out-of-order delivery while achieving statistical load balance.
