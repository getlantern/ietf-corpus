document: rfc-5779
kind: protocol-element
summary: PMIP6-IPv4-Home-Address AVP (AVP Code 505) is of type Address and carries the IPv4-MN-HoA. On the MAG-to-HAAA interface, it SHOULD only be present for statically provisioned MNs. On LMA-to-HAAA, a value of 0.0.0.0 in the request indicates delegation of IPv4-MN-HoA assignment to the HAAA.
section: "5.2"
topics:
    - diameter
    - mobility
