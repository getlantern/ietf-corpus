document: rfc-9202
kind: design-rationale
summary: Curve25519 is mandated in addition to secp256r1 because newer ECC curves are considered more efficient and less prone to implementation errors than NIST curves; this is a non-obvious mandatory addition given that RFC 7252 only requires secp256r1.
section: 3.2.2
topics:
