document: rfc-3826
kind: interoperability-note
summary: If the authentication protocol for a user at authoritative engine E is one of those defined in RFC 3414, key localization MUST follow the two-step process in RFC 3414 section 2.6; this ensures the localized key mechanism is consistent across USM implementations.
