document: rfc-4682
kind: normative-requirement
summary: In secure SNMPv3 provisioning mode, the Kerberos realm name for the Provisioning Server supplied in the MTA configuration file MUST match the value supplied in DHCP option code 122, sub-option 6; otherwise, the object must contain the DHCP-supplied value.
section: "4"
rfc2119_level: MUST
