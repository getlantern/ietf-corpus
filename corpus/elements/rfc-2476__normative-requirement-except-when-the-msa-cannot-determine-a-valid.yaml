document: rfc-2476
kind: normative-requirement
summary: Except when the MSA cannot determine a valid return path, an MSA instructed to issue a rejection code MAY instead accept the message and subsequently generate a bounce. Immediate rejection is preferred for direct user feedback.
section: "3.2"
rfc2119_level: MAY
topics:
