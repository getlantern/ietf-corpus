document: rfc-9291
kind: design-rationale
summary: The three-level profile hierarchy (service-level 'global-parameters-profiles' → node-level 'active-global-parameters-profiles' → access-level override) allows VPN parameters to be defined once and reused across nodes and accesses, with more specific levels taking precedence over more general ones to minimize configuration duplication.
section: "7.4"
