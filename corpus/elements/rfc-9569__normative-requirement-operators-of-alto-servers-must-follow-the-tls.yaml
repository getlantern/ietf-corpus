document: rfc-9569
kind: normative-requirement
summary: Operators of ALTO servers MUST follow the TLS security guidelines in RFC 9325 to avoid new TLS vulnerabilities discovered after RFC 7285 was published. All base protocol security considerations (authenticity, integrity, privacy) fully apply to TIPS.
section: "9"
rfc2119_level: MUST
topics:
