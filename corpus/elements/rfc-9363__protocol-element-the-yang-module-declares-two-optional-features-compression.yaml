summary: 'The YANG module declares two optional features: ''compression'' (SCHC compression capabilities) and ''fragmentation'' (SCHC fragmentation capabilities). Implementations can advertise which capabilities are supported, and the data model uses if-feature guards to make the corresponding rule types conditional.'
