document: rfc-1893
kind: wire-format
summary: Status codes use the syntax `status-code = class "." subject "." detail` where class is "2", "4", or "5"; subject is 1–3 digits; and detail is 1–3 digits. White-space and comments are NOT allowed within a status-code, and each numeric sub-code MUST be expressed without leading zero digits.
