document: rfc-6641
kind: normative-requirement
summary: NFS servers listed as SRV targets MUST export the organization's domain root file system at the path "/.domainroot/{Name}" (where {Name} is the organization's DNS domain name) within their pseudo-file systems.
section: "3"
rfc2119_level: MUST
