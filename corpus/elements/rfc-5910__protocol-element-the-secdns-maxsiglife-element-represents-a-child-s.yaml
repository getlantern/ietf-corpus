document: rfc-5910
kind: protocol-element
summary: The <secDNS:maxSigLife> element represents a child's preference in seconds for the signature lifetime on the parent's DS information. It is an OPTIONAL element expressed as an extended XML Schema 'int' with a minimum value of 1. If not provided or unsupported, the server operator's default signature expiration policy applies.
section: "3.3"
topics:
    - dns
    - security
