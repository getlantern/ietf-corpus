document: rfc-4467
kind: protocol-element
summary: The URLMECH status response code lists URL authorization mechanism names supported for a mailbox; it is returned in an untagged OK in response to RESETKEY, SELECT, or EXAMINE commands. Mechanisms other than INTERNAL may include BASE64-encoded mechanism-specific data appended after '='.
section: BASE.7.1.URLMECH
