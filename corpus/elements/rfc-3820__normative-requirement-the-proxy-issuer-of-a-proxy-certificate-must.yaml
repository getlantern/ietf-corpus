document: rfc-3820
kind: normative-requirement
summary: The Proxy Issuer of a Proxy Certificate MUST be either an End Entity Certificate or another Proxy Certificate. The Proxy Issuer MUST NOT have an empty subject field, and the issuer field of the Proxy Certificate MUST contain the subject field of its Proxy Issuer.
section: "3.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
