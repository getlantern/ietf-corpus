document: rfc-4338
kind: normative-requirement
summary: IPv6 stateless address autoconfiguration MUST be performed as specified in RFC 2462. An IPv6 Address Prefix used for stateless address autoconfiguration of an Nx_Port MUST have a length of 64 bits.
section: "5.1"
rfc2119_level: MUST
