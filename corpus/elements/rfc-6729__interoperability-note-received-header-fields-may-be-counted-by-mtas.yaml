document: rfc-6729
kind: interoperability-note
summary: Received header fields may be counted by MTAs when determining whether a message routing loop is in effect (per RFC 5321 Section 6.3). A message with an abundance of state-annotated Received fields might cause an incorrect loop determination, causing it to be removed from the mail stream.
section: "5"
topics:
    - email
