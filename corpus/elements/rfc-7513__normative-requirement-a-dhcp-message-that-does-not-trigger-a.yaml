document: rfc-7513
kind: normative-requirement
summary: A DHCP message that does not trigger a valid event (e.g., fails attribute, TID, or binding anchor checks) MUST still be forwarded if it passes the control packet filtering checks in Section 8.2. The binding state does not change in this case.
section: "6.3"
rfc2119_level: MUST
topics:
    - ip
    - security
