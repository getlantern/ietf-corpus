document: rfc-8320
kind: normative-requirement
summary: An LSR advertising the LDP MRT Capability MUST also advertise the LDP Multi-Topology (MT) Capability. If MRT Capability is negotiated without MT Capability, the LSR MUST behave as if MRT Capability was not negotiated and respond with the 'MRT Capability negotiated without MT Capability' status code.
section: 4.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
