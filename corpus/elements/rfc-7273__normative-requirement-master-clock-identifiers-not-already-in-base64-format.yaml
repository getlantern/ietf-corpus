document: rfc-7273
kind: normative-requirement
summary: Master clock identifiers not already in base64 format MUST be encoded as base64 strings when used in SDP. Although generated using the RFC 7022 CNAME algorithm, the identifier does NOT appear in RTCP as a CNAME.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
