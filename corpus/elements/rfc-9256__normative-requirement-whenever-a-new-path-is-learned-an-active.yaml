document: rfc-9256
kind: normative-requirement
summary: Whenever a new path is learned, an active path is deleted, the validity of an existing path changes, or an existing path is changed, the candidate path selection process MUST be re-executed. The candidate path with the highest Preference value among valid paths is selected.
section: "2.9"
rfc2119_level: MUST
topics:
    - routing
    - mpls
