document: rfc-5881
kind: interoperability-note
summary: An implementation MAY use the UDP source port number to aid in demultiplexing incoming BFD Control packets, but ultimately the mechanisms in the BFD base specification (RFC 5880) MUST be used to demultiplex packets to the proper session.
