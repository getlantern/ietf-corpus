document: rfc-6591
kind: design-rationale
summary: Base64-encoded values in ARF header fields MAY contain folding whitespace (FWS) for formatting purposes per standard header field wrapping; during decoding, any non-base64 characters are ignored, so line wrapping does not corrupt the encoded value.
