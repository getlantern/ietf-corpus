kind: wire-format
summary: 'NegTokenInit is an ASN.1 SEQUENCE with four optional fields: mechTypes [0] (ordered MechTypeList of OIDs), reqFlags [1] (ContextFlags BIT STRING), mechToken [2] (OCTET STRING carrying the first mechanism''s initial token), and mechListMIC [3] (OCTET STRING). The mechTypes field lists mechanisms in preference order.'
