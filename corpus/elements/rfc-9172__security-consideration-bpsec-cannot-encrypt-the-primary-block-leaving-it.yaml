document: rfc-9172
kind: security-consideration
summary: BPSec cannot encrypt the primary block, leaving it vulnerable to topology attacks where an on-path attacker modifies routing fields. Mitigations such as BIBs on the primary block, encapsulation, or routing policy enforcement must be used but are outside BPSec scope.
section: 8.2.3
topics:
    - security
