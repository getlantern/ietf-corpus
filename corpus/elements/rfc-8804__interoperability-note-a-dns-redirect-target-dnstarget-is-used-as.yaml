document: rfc-8804
kind: interoperability-note
summary: A DNS redirect target (DnsTarget) is used as a CNAME alias in uCDN DNS router responses. DNS routing decisions are based on either the DNS resolver's IP address or client IP subnet via EDNS0 ECS. The dCDN may advertise different redirect targets per footprint to cover both resolver-IP and client-subnet routing cases.
section: "2.1"
topics:
    - dns
