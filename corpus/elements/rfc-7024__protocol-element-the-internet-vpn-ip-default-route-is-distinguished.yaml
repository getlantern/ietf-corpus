document: rfc-7024
kind: protocol-element
summary: 'The Internet VPN-IP default route is distinguished from a non-Internet VPN-IP default route by its RT set: for a given V-hub, the Internet variant carries both RT-VPN and RT-VH (allowing import by other V-hubs), while the non-Internet variant carries only RT-VH (imported exclusively by associated V-spokes).'
section: "5"
