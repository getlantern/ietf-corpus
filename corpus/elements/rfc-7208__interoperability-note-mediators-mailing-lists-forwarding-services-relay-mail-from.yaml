document: rfc-7208
kind: interoperability-note
summary: Mediators (mailing lists, forwarding services) relay mail from a different IP than the original sender's MAIL FROM domain, causing SPF to fail or be unreliable for forwarded messages. Originating ADMDs should use SRS or similar; receiving ADMDs must account for this limitation when applying local policy.
section: "10.3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
