summary: 'Five sub-TLVs are defined for the Optical Node Property TLV: Resource Block Information (value 1), Resource Accessibility (value 2), Resource Wavelength Constraints (value 3), Resource Block Pool State (value 4), and Resource Block Shared Access Wavelength Availability (value 5), all with variable length. Encodings are defined in RFC 7581.'
