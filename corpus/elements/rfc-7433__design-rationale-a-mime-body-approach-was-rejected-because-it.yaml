document: rfc-7433
kind: design-rationale
summary: A MIME body approach was rejected because it would require multipart MIME INVITEs (many UAs don't support this), insertion of bodies by redirect servers is not supported by existing UAs, and proxies cannot remove bodies from requests making policy enforcement (REQ-9) impossible.
section: A.3
topics:
