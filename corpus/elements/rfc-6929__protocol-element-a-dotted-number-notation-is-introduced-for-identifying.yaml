document: rfc-6929
kind: protocol-element
summary: 'A dotted-number notation is introduced for identifying extended attributes: ''Type.Extended-Type'' for simple extended attributes, ''Type.Extended-Type.TLV-Type'' for TLVs, and ''Type.Extended-Type.Vendor-Id.Vendor-Type'' for EVS attributes. This notation is used by IANA for allocation.'
