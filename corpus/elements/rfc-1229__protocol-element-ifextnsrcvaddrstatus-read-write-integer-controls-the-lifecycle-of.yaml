document: rfc-1229
kind: protocol-element
summary: 'ifExtnsRcvAddrStatus (read-write INTEGER) controls the lifecycle of receive address entries: nonVolatile(4) persists across restarts, volatile(3) exists only until next restart, other(1) persistence is unclassified, invalid(2) marks the entry for deletion. Default value is volatile(3).'
