document: rfc-4172
kind: normative-requirement
summary: When multiple gateways serve the same gateway region, they MUST coordinate assignment of N_PORT IDs and aliases so each N_PORT has exactly one address, and all iFCP traffic between a given remote/local N_PORT pair MUST flow through the same iFCP session.
section: "4"
rfc2119_level: MUST
topics:
    - ip
