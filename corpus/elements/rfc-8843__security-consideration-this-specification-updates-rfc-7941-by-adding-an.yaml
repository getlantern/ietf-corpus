document: rfc-8843
kind: security-consideration
summary: 'This specification updates RFC 7941 by adding an exception: the requirement that an SDES RTP header extension be confidentiality-protected when RTCP is confidentiality-protected MAY be ignored for the MID RTP header extension, as there are no known significant security risks in leaving it unencrypted when other recommendations are followed.'
