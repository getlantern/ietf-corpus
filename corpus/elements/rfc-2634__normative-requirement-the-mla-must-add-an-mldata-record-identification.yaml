document: rfc-2634
kind: normative-requirement
summary: The MLA MUST add an MLData record (identification, date/time, optional receipt policy) to the end of the mlExpansionHistory sequence each time it expands a message. If the attribute is absent it MUST be created; if present the new entry MUST be appended. Only one mlExpansionHistory can appear per SignerInfo.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
