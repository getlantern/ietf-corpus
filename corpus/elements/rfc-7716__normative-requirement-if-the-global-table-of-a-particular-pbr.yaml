document: rfc-7716
kind: normative-requirement
summary: If the global table of a particular PBR is NOT configured with any import RTs, a received MCAST-VPN route is processed in the context of the global table only if it carries no RTs or if it carries an upstream-node-identifying RT whose Global Administrator field identifies that PBR. The use of non-upstream-node-identifying RTs is OPTIONAL for GTM.
section: "2.2"
rfc2119_level: OPTIONAL
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
