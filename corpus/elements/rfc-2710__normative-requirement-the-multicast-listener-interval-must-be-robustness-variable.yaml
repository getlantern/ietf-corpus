document: rfc-2710
kind: normative-requirement
summary: The Multicast Listener Interval MUST be ((Robustness Variable) times (Query Interval)) plus (one Query Response Interval). This is the time a router waits before deciding there are no more listeners for an address.
section: "7.4"
rfc2119_level: MUST
