document: rfc-1587
kind: normative-requirement
summary: When a translated type-5 LSA should no longer be advertised (because the routing table entry became unreachable or the associated LSA no longer has the P-bit set with a non-zero forwarding address), the NSSA area border router must flush the type-5 LSA by setting it to MaxAge and flooding it.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
