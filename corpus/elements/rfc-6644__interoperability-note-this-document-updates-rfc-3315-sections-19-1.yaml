summary: This document updates RFC 3315 Sections 19.1.1, 19.1.2, 19.2, 19.4.1, 19.4.2, and 19.4.4, and Section 22.19 (Reconfigure Message option definition). Implementations conforming only to RFC 3315 will not recognize msg-type 6 (Rebind) in the Reconfigure Message option.
