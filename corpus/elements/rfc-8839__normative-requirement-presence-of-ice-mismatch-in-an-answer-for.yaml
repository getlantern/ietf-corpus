document: rfc-8839
kind: normative-requirement
summary: Presence of 'ice-mismatch' in an answer for a data stream implies both agents support ICE but ICE procedures MUST NOT be used for that stream, and RFC 3264 procedures MUST be used instead; the answerer MUST also omit 'candidate' attributes for that stream.
section: 4.2.5
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
