document: rfc-2605
kind: design-rationale
summary: This MIB generalizes RFC 1567 (X.500 DSA-only) to support Directory Servers that simultaneously speak multiple protocols (DAP, DSP, LDAP, CLDAP, etc.). The multi-protocol model requires per-interface statistics rather than a single set of counters.
