document: rfc-8545
kind: security-consideration
summary: The registered well-known UDP port for OWAMP-Test/TWAMP-Test could become a target for denial-of-service (DoS) attacks or aid man-in-the-middle (MITM) attacks. Recommended mitigations include filtering access to the Receiver Port via an access list and using a non-globally routable IP address for the Session-Reflector.
section: "6"
topics:
    - measurement
    - security
