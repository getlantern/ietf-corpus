document: rfc-7350
kind: normative-requirement
summary: Secure TURN transports (TURN over TLS and TURN over DTLS) MUST use the 'turns' URI scheme. When using 'turns' to designate TURN over DTLS, the transport value of the TURN URI, if set, MUST be 'udp'.
section: 4.6.1
rfc2119_level: MUST
topics:
    - tls
    - dns
    - nat
