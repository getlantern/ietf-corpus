document: rfc-9744
kind: state-machine
summary: A PE port failure in Default FXC mode causes withdrawal of the service tunnel route, updating the adjacency list for all ACs on that port. In VLAN-Signaled FXC mode, a port failure triggers withdrawal of both the Ethernet A-D per-EVI routes for all normalized VIDs on that port and the Ethernet A-D per-ES route for the port's ES.
section: "5.3"
topics:
    - vpn
    - bgp
    - routing
