document: rfc-6141
kind: normative-requirement
summary: If any of the changes requested in a re-INVITE or in any transaction within it have already been executed, the UAS SHOULD return a 2xx response rather than an error response. Using an error response in this case is prohibited because the UAC cannot reject a forced revert it cannot execute.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
