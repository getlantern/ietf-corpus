summary: A GeoJSON text sequence is any number of GeoJSON texts, each encoded in UTF-8, preceded by one ASCII record separator (RS, 0x1e) character, and followed by a line feed (LF). It conforms to all rules of RFC 7464 (JSON text sequences).
