document: rfc-6265
kind: privacy-consideration
summary: User agents SHOULD provide mechanisms for users to manage, delete, and disable cookies. When cookies are disabled, the user agent MUST NOT send Cookie headers or process Set-Cookie headers. User agents MAY support a non-persistent (private browsing) mode that treats all cookies as session cookies.
section: "7.2"
rfc2119_level: MUST
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
