document: rfc-2342
kind: interoperability-note
summary: A client can discover accessible personal mailboxes of other users by appending '%' to the Other Users' Namespace prefix in a LIST command; however, a server MAY return NO instead, requiring the client to include a specific username before listing.
section: "5"
