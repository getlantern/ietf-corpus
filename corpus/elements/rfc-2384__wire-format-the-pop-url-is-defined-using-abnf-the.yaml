document: rfc-2384
kind: wire-format
summary: 'The POP URL is defined using ABNF. The top-level production is: pop-url = "pop://" server, where server = [user-auth "@"] hostport and user-auth = enc-user [auth]. The auth component uses the form ";AUTH=" followed by "*" or an enc-auth-type.'
