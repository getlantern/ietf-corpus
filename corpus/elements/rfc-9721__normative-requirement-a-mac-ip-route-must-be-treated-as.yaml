document: rfc-9721
kind: normative-requirement
summary: A MAC-IP route MUST be treated as duplicate if either the corresponding MAC route is marked as duplicate via the existing detection procedure, or the corresponding IP is marked as duplicate via the extended IP move counting procedure for Scenario B. The duplicate IP detection procedure counts an 'IP move' when a local or remote MAC-IP route for IPx is learned with a different MAC address association.
section: 8.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
