document: rfc-9635
kind: state-machine
summary: 'A GNAP grant request transitions through four states: _Processing_ (initial state when received or updated), _Pending_ (interaction/approval required, no tokens issued), _Approved_ (access tokens and subject info may be returned), and _Finalized_ (terminal state — no new tokens, interactions, or updates possible). The AS manages the authoritative state; clients track their own view.'
section: "1.5"
topics:
    - oauth
    - security
