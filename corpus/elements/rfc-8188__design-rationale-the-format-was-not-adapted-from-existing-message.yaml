document: rfc-8188
kind: design-rationale
summary: The format was not adapted from existing message-based encryption formats (OpenPGP, CMS, JWE, XML Encryption) because those formats are not suited to stream processing, which is necessary for HTTP. The format instead follows the lower-level constructs of RFC 5116.
section: "1"
topics:
