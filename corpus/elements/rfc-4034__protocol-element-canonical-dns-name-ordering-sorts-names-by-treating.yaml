document: rfc-4034
kind: protocol-element
summary: Canonical DNS name ordering sorts names by treating labels as unsigned left-justified octet strings, starting from the most significant (rightmost) label, with uppercase US-ASCII treated as lowercase. This ordering is required for constructing the NSEC chain and for signing/verifying RRSIGs.
section: "6.1"
topics:
    - dns
