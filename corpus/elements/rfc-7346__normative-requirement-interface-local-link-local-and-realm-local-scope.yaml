document: rfc-7346
kind: normative-requirement
summary: Interface-Local, Link-Local, and Realm-Local scope boundaries are automatically derived from physical connectivity or other non-multicast-related configurations. The boundaries of all other non-reserved scopes of Admin-Local or larger are administratively configured.
