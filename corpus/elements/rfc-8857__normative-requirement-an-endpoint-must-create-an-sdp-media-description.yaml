document: rfc-8857
kind: normative-requirement
summary: An endpoint MUST create an SDP media description ('m=' line) for each BFCP-over-WebSocket media stream and MUST assign either 'TCP/WSS/BFCP' or 'TCP/WS/BFCP' to the 'proto' field. The server side MUST add a 'websocket-uri' attribute in the media section.
section: "7.1"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
