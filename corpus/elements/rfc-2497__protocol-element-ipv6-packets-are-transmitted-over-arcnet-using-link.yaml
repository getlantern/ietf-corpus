document: rfc-2497
kind: protocol-element
summary: IPv6 packets are transmitted over ARCnet using link-layer fragmentation and reassembly according to the PHDS (ARCnet Packet Header Definition Standard). The protocol ID (System Code) assigned to IPv6 on ARCnet is C4 hexadecimal.
