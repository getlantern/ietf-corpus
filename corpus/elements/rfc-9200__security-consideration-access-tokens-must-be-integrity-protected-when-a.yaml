document: rfc-9200
kind: security-consideration
summary: Access tokens MUST be integrity protected. When a symmetric PoP key is included in the token, either the whole token or the key alone MUST be encrypted. Confidentiality protection of token content is layered on top of transport-level security.
section: "6.1"
topics:
    - oauth
    - security
    - crypto
