document: rfc-7937
kind: design-rationale
summary: The CDNI Logging File format is intentionally inspired by the W3C Extended Log File Format to keep the CDNI format close to intra-CDN log formats commonly used today, minimizing the need for systematic translation at the CDN/CDNI boundary. Where the two formats differ, the present document takes precedence.
