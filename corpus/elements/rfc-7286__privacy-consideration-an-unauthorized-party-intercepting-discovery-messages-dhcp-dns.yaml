document: rfc-7286
kind: privacy-consideration
summary: An unauthorized party intercepting discovery messages (DHCP/DNS) could learn that a host is using or attempting to use the ALTO service. This has not been identified as a relevant threat in current ALTO use cases; no protection mechanisms are provided, but re-evaluation is required if a use case emerges that demands privacy here.
section: "6.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
