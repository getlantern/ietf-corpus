document: rfc-7014
kind: interoperability-note
summary: The IFSP is always applied after packets are classified into Flows, in contrast to packet selection which may be applied before or after Packet Classification; an IFSP in the Metering Process before Packet Classification may only use Flow Key fields and hash values, not post-classification characteristics such as Flow size or duration.
