document: rfc-8082
kind: design-rationale
summary: 'RFC 5104''s FIR specification was underspecified for layered codecs when more than one RTP stream is used: it was unclear whether a FIR targeting one stream required a decoder refresh for all layers or only the targeted layer. This document resolves the ambiguity by requiring a full decoder refresh across all layers.'
section: "1"
topics:
    - rtp
    - realtime
