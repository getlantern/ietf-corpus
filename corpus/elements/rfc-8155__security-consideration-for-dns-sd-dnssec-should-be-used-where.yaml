document: rfc-8155
kind: security-consideration
summary: For DNS-SD, DNSSEC should be used where information authenticity matters, and secure DNS updates (RFC 2136/RFC 3007) should be used to control which clients may update DNS records. For mDNS, a rogue system can advertise itself as a TURN server; authentication and authorization of discovered servers are required to mitigate this threat.
section: "9.2"
topics:
    - dns
    - nat
    - security
