document: rfc-4996
kind: normative-requirement
summary: On reception of a NACK, the compressor SHOULD assume only the static context is valid and re-send all dynamic information via IR or IR-DYN. On reception of a STATIC-NACK, the compressor SHOULD assume no valid context and re-send all static and dynamic information via IR.
section: 5.2.2.2
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
