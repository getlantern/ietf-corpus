document: rfc-9864
kind: normative-requirement
summary: A cryptographic key MUST be used with only a single algorithm unless the use of the same key with different algorithms is proven secure. It is RECOMMENDED that the 'alg' parameter of JSON Web Keys and COSE Keys be present, unless there is another mechanism ensuring the key is used as intended.
section: "7"
rfc2119_level: MUST
topics:
    - jose
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
