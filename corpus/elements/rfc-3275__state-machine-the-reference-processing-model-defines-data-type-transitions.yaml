document: rfc-3275
kind: state-machine
summary: 'The Reference Processing Model defines data-type transitions: if the current data object is an octet stream and the next Transform requires a node-set, the application MUST parse the octets as XML; if the data is a node-set and the next Transform requires octets, the application MUST convert using Canonical XML. The final output is an octet stream fed to DigestMethod.'
section: 4.3.3.2
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
