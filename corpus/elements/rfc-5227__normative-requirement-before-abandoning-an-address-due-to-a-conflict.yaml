document: rfc-5227
kind: normative-requirement
summary: Before abandoning an address due to a conflict, hosts SHOULD actively attempt to reset any existing connections using that address, to mitigate the TCP hijacking security risk posed by address reconfiguration.
section: "2.4"
rfc2119_level: SHOULD
