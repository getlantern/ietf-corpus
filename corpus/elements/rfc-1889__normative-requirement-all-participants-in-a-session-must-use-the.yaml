document: rfc-1889
kind: normative-requirement
summary: All participants in a session must use the same constant values (including the 5% RTCP bandwidth fraction) so that every participant independently calculates the same RTCP transmission interval; these constants should be fixed for a particular profile.
section: "6.2"
rfc2119_level: MUST
