document: rfc-2060
kind: security-consideration
summary: The LOGIN command transmits the user's password in plaintext. Servers should consider requiring the use of a privacy protection mechanism (from AUTHENTICATE) before permitting the LOGIN command, especially on networks where eavesdropping is possible.
section: "11"
topics:
    - email
    - security
