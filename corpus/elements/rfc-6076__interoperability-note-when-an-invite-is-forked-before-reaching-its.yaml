document: rfc-6076
kind: interoperability-note
summary: When an INVITE is forked before reaching its destination, multiple early dialogs and potentially multiple confirmed dialogs may result. An SRD measurement should be taken for each dialog created (early or confirmed), and tags MUST be used to distinguish between dialog requests.
section: "5.4"
topics:
    - realtime
    - voip
    - measurement
