document: rfc-8538
kind: normative-requirement
summary: A BGP speaker SHOULD NOT send a Hard Reset to a peer from which it has not received the 'N' bit. The negative effect would be that the peer cannot properly log the associated information.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - routing
