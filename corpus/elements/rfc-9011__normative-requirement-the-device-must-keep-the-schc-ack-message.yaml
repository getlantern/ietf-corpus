document: rfc-9011
kind: normative-requirement
summary: The device MUST keep the SCHC ACK message in memory until it receives a downlink SCHC Fragmentation Message (with FPort == FPortDown) that is not a SCHC ACK REQ, which indicates the SCHC gateway has received the SCHC ACK.
section: 5.6.3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
