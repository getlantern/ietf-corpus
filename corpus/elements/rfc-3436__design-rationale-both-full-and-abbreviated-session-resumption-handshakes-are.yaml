document: rfc-3436
kind: design-rationale
summary: Both full and abbreviated (session-resumption) handshakes are allowed per stream. Abbreviated handshakes reduce computational complexity when many connections are needed, while parallel full handshakes are preferable in high-latency networks. The spec permits both to accommodate diverse deployment conditions.
section: "8.2"
