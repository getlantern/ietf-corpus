document: rfc-9140
kind: protocol-element
summary: The Initial Exchange comprises a common handshake plus two EAP-NOOB request-response pairs (Type=2 and Type=3). The server allocates a PeerId, negotiates protocol version and cryptosuite (Vers/Verp, Cryptosuites/Cryptosuitep), exchanges OOB direction indicators (Dirs/Dirp) and ServerInfo/PeerInfo, and performs an ECDHE key exchange (PKs, PKp) with 32-byte nonces (Ns, Np). The exchange always ends in EAP-Failure.
section: 3.2.2
topics:
    - security
    - crypto
