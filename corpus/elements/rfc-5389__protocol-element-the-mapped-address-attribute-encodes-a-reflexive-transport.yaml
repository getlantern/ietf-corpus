document: rfc-5389
kind: protocol-element
summary: The MAPPED-ADDRESS attribute encodes a reflexive transport address as an 8-bit address family, 16-bit port, and 32-bit (IPv4) or 128-bit (IPv6) address in network byte order. It is retained only for backwards compatibility with RFC 3489 clients.
section: "15.1"
