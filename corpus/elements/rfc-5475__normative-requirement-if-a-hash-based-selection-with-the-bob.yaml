document: rfc-5475
kind: normative-requirement
summary: 'If a Hash-based Selection with the BOB function is used with IPv6 traffic, the following input bytes MUST be used: payload length (2 bytes), bytes 10, 11, 14, 15, 16 of IPv6 source address, bytes 10, 11, 14, 15, 16 of IPv6 destination address, and at least 4 recommended bytes from the IP payload.'
section: 6.2.4.1
rfc2119_level: MUST
topics:
    - measurement
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
