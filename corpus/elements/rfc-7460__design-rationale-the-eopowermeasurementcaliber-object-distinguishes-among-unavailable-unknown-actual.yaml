document: rfc-7460
kind: design-rationale
summary: The eoPowerMeasurementCaliber object distinguishes among unavailable, unknown, actual, estimated, and static measurement methods because NMS systems must account for differing reliability when aggregating power data across heterogeneous devices. Devices that cannot instrument power physically set caliber to unavailable and eoPower to 0, rather than reporting misleading values.
section: "5.4"
