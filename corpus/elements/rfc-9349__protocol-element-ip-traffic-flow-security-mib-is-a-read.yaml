kind: protocol-element
summary: 'IP-TRAFFIC-FLOW-SECURITY-MIB is a read-only SNMP MIB module providing operational and configuration state access to IP Traffic Flow Security (IP-TFS) SAs. It is organized into four object groups: iptfsGroup (configuration), ipsecStatsGroup, iptfsInnerStatsGroup, and iptfsOuterStatsGroup.'
