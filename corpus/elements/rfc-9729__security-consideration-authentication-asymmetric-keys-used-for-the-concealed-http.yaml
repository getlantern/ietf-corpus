document: rfc-9729
kind: security-consideration
summary: Authentication asymmetric keys used for the Concealed HTTP authentication scheme MUST NOT be reused in other protocols. Reusing keys could undermine security guarantees even though the signed data includes a static prefix to mitigate cross-protocol attacks.
section: "8"
topics:
    - http
    - crypto
    - security
