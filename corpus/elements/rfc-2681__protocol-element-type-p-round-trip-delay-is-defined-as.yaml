document: rfc-2681
kind: protocol-element
summary: Type-P-Round-trip-Delay is defined as the time dT such that Src sent the first bit of a Type-P packet to Dst at wire-time T, Dst received that packet and immediately sent a Type-P packet back, and Src received the last bit of the response at wire-time T+dT. The value is undefined (informally infinite) if Src did not receive a response.
section: "2.4"
topics:
    - measurement
