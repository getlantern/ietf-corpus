document: rfc-7781
kind: normative-requirement
summary: 'Before egressing a multi-destination TRILL Data packet out of an RBv port, a member RBridge MUST perform an ingress nickname filtering check: if the packet''s ingress nickname matches the pseudo-nickname associated with that RBv port, the packet MUST NOT be egressed, preventing loopback to the originating CE.'
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
