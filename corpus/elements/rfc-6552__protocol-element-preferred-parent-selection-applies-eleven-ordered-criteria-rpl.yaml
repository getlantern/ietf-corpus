document: rfc-6552
kind: protocol-element
summary: 'Preferred parent selection applies eleven ordered criteria: RPL Section 8 compliance, connectivity validation, interface policy, root administrative preference override, Grounded DODAG preference, more preferable root, most recent DODAG Version, lesser resulting Rank, DODAG Version with alternate parent, currently-in-use parent, and most recent DIO announcement. These criteria and their order MAY be varied by configured policy.'
section: 4.2.1
topics:
    - routing
