document: rfc-9557
kind: normative-requirement
summary: Suffix keys starting with an underscore are reserved for controlled experiments and MUST NOT be used for interchange. Implementations not specifically configured to participate in such an experiment MUST reject these keys.
section: "3.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
