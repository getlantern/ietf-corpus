document: rfc-3606
kind: protocol-element
summary: The atmVplLogicalPortTable supports creation of ATM Logical Port interfaces (VP tunnels). Creating a VP tunnel requires setting atmVplLogicalPortDef to isLogicalIf on a VPL entry, which causes the agent to allocate a new ifIndex and create corresponding entries in ifTable, atmInterfaceConfTable, atmInterfaceExtTable, and ifStackTable.
section: 3.1.10.2
topics:
    - realtime
