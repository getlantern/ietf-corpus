document: rfc-6206
kind: design-rationale
summary: Trickle relies exclusively on local communication (broadcast or local multicast) rather than unicast, making it robust to network re-population, transient disconnections, and lossy links, with minimal state (current implementations use 4-11 bytes of RAM and 50-200 lines of C code).
