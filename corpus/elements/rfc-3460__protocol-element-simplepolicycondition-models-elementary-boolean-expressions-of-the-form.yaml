document: rfc-3460
kind: protocol-element
summary: SimplePolicyCondition models elementary Boolean expressions of the form '(variable MATCH value)'. The MATCH operator is implicit and overloaded, handling singletons, ranges, and sets; complex expressions are formed by combining instances via CompoundPolicyCondition.
section: 5.8.1
