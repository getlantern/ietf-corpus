document: rfc-3865
kind: wire-format
summary: The 'Solicitation:' message header field is defined as 'Solicitation:' followed by one or more spaces and Solicitation-keywords. It is a new RFC 2822 header field that the sending client uses to declare the solicitation class of a message.
