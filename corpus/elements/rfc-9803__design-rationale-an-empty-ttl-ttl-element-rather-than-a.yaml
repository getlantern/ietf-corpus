document: rfc-9803
kind: design-rationale
summary: An empty <ttl:ttl> element (rather than a deletion command or special value) was chosen to signal 'reset to server default', providing a clean mechanism within a single create/update command to restore a record type's TTL to its default without a separate operation.
section: 1.2.1.1
topics:
    - dns
