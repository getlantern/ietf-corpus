document: rfc-4590
kind: security-consideration
summary: To mitigate denial-of-service attacks, the RADIUS server MUST verify it generated the nonce received from the HTTP-style client; this SHOULD be done statelessly, for example by embedding a cryptographic signature in the nonce as described in RFC 2617 Section 3.2.1.
section: "8.1"
topics:
    - radius
    - security
