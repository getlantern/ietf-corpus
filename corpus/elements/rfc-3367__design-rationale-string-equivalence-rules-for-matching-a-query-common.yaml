document: rfc-3367
kind: design-rationale
summary: String equivalence rules for matching a query common name against a resource are deliberately excluded from the CNRP protocol specification because they are language- and service-dependent, tied to relevance-ranking algorithms, and thus treated as a service differentiator rather than a protocol concern.
section: 4.1.4
