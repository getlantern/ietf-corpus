document: rfc-821
kind: interoperability-note
summary: Source routing in forward-paths uses the form @ONE,@TWO:user@THREE, where hosts are listed in traversal order. The forward-path and reverse-path are SMTP envelope constructs and need not appear in the message header fields (To:, From:, CC:).
section: "3.6"
topics:
    - email
