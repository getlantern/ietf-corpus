document: rfc-3873
kind: normative-requirement
summary: Implementations are only required to support globally unique IPv4 (4-octet) and IPv6 (16-octet) addresses in address index objects. Implementations that connect multiple zones are expected to additionally support non-global IPv4 and non-global IPv6 address types with zone indices.
section: "4"
rfc2119_level: REQUIRED
topics:
    - sctp
    - snmp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
