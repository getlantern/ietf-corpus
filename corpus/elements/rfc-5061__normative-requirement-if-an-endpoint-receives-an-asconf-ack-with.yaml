document: rfc-5061
kind: normative-requirement
summary: If an endpoint receives an ASCONF-ACK with a Sequence Number greater than or equal to the next Sequence Number to be used while no ASCONF is outstanding, the endpoint MUST ABORT the association (rule F0), including error cause 0x00A3.
section: "5.3"
rfc2119_level: MUST
topics:
    - sctp
    - security
