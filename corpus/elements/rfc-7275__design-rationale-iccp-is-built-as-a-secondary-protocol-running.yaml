document: rfc-7275
kind: design-rationale
summary: ICCP is built as a secondary protocol running within LDP, exploiting LDP session mechanisms, TCP transport, and TCP-based security already required for pseudowire operation. This avoids duplicating infrastructure that L2VPN PEs must already support.
