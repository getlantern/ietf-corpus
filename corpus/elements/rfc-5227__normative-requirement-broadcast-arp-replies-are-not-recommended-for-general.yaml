document: rfc-5227
kind: normative-requirement
summary: Broadcast ARP Replies are NOT RECOMMENDED for general use; they increase broadcast traffic. They SHOULD NOT be used universally but may be appropriate where faster conflict detection outweighs the cost of increased broadcast load, as specified in RFC 3927 for link-local addressing.
section: "2.6"
rfc2119_level: SHOULD NOT
topics:
    - ip
