document: rfc-4550
kind: normative-requirement
summary: Lemonade-compliant submit servers MUST support BURL, 8BITMIME, BINARYMIME, and CHUNKING, and MUST declare this support via EHLO. BURL MUST support URLAUTH type URLs and MUST advertise the 'imap' option following the BURL EHLO keyword.
section: "2.5"
rfc2119_level: MUST
topics:
    - email
