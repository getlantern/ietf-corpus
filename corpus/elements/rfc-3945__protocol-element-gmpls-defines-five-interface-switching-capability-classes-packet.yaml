document: rfc-3945
kind: protocol-element
summary: 'GMPLS defines five interface switching capability classes: Packet Switch Capable (PSC), Layer-2 Switch Capable (L2SC), Time-Division Multiplex Capable (TDM), Lambda Switch Capable (LSC), and Fiber-Switch Capable (FSC). Each class determines how data is forwarded — by packet header, frame/cell header, time slot, wavelength, or physical port/fiber position respectively.'
section: "1.2"
topics:
    - routing
