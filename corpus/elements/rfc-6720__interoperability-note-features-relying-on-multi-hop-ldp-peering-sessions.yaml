document: rfc-6720
kind: interoperability-note
summary: Features relying on multi-hop LDP peering sessions — such as LDP IGP Synchronization (RFC 5443) and LDP Session Protection — are incompatible with GTSM and require GTSM to be statically or dynamically disabled on the relevant peers.
