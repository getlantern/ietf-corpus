document: rfc-6610
kind: security-consideration
summary: These mechanisms may allow attackers to enumerate home agent addresses, which is valuable in IPv6 where brute-force address scanning is impractical. Leaked topology and prefix information could assist targeted attacks, and DHCP manipulation could cause denial of service by redirecting mobile nodes to suboptimal or unreachable home agents.
section: "5"
topics:
