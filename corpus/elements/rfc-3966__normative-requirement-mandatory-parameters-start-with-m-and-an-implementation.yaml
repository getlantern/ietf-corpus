document: rfc-3966
kind: normative-requirement
summary: Mandatory parameters start with 'm-' and an implementation MUST NOT use the URI if it contains unknown mandatory parameters. Optional parameters MAY be ignored. Entities forwarding protocol requests containing tel URIs MUST NOT delete or modify parameters they do not understand.
section: "5.4"
rfc2119_level: MUST NOT
