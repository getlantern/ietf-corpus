kind: interoperability-note
summary: The ietf-ipsec-iptfs module augments both the IKE-based model (ietf-i2nsf-ike, augmenting SPD conn-entry/spd/spd-entry and child-sa-info) and the IKE-less model (ietf-i2nsf-ikeless, augmenting spd/spd-entry and sad/sad-entry), covering deployments with and without automated key management.
