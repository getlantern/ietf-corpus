document: rfc-7668
kind: design-rationale
summary: A multilink subnet model was chosen over per-link subnets because the complexity of separate subnets and inter-subnet routing was considered excessive for constrained IoT nodes. The benefits outweigh the multilink model's drawbacks as described in RFC 4903.
