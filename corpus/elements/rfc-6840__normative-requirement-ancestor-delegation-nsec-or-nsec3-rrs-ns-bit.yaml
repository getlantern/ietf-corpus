document: rfc-6840
kind: normative-requirement
summary: Ancestor delegation NSEC or NSEC3 RRs (NS bit set, SOA bit clear, signer field shorter than owner name) MUST NOT be used to assume nonexistence of any RRs below the zone cut, including all RRs at that owner name other than DS RRs.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
