document: rfc-4522
kind: normative-requirement
summary: The requested attributes list in an LDAP search MAY contain attribute descriptions with the binary option, but MUST NOT contain two attribute descriptions with the same attribute type and the same tagging options even if only one has the binary option.
section: "5"
rfc2119_level: MUST NOT
