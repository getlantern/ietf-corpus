document: rfc-8794
kind: protocol-element
summary: An Unknown-Sized Element has an Element Data Size with all VINT_DATA bits set to one. Only a Master Element may be unknown-sized, and only when the EBML Schema sets 'unknownsizeallowed' to true. Its end is determined by the first occurrence of a valid Parent, sibling, Root, or end-of-document boundary.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
