document: rfc-2228
kind: design-rationale
summary: The CCC command exists to support environments where IP-layer security already provides host authentication and TCP stream integrity, making per-command integrity redundant. Without CCC, once integrity is negotiated it cannot be disabled, which would prevent interoperability in such deployments.
section: "3"
topics:
    - security
