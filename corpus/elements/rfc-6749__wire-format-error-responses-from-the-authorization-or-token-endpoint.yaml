document: rfc-6749
kind: wire-format
summary: 'Error responses from the authorization or token endpoint include: error (REQUIRED, ASCII code such as invalid_request, unauthorized_client, access_denied, invalid_scope, server_error), error_description (OPTIONAL, human-readable), error_uri (OPTIONAL), state (REQUIRED if present in request). Character set is restricted to %x20-21 / %x23-5B / %x5D-7E.'
section: 4.1.2.1
topics:
    - oauth
    - http
