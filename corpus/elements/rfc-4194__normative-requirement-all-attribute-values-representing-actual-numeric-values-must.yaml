document: rfc-4194
kind: normative-requirement
summary: All attribute values representing actual numeric values MUST be in big-endian format (most significant hex digits to the left). Likewise, multi-byte Words inside a Dump MUST be stored in big-endian format. Producers on little-endian architectures are responsible for byte-swapping.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
