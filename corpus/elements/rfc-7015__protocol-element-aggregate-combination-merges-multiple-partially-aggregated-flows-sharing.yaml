document: rfc-7015
kind: protocol-element
summary: 'Aggregate combination merges multiple Partially Aggregated Flows sharing the same Flow Keys and Aggregation Interval into a single Aggregated Flow, combining non-key values using per-element operations: delta counters are summed, flags are unioned, etc. This operation is idempotent, so any series of IAPs can be modeled as a single process.'
section: "5.4"
topics:
    - measurement
