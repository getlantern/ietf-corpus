document: rfc-8097
kind: normative-requirement
summary: By default, an implementation SHOULD NOT send the origin validation state extended community to EBGP peers, though it SHOULD be possible to configure an implementation to send or accept the community when warranted (e.g., when adjacent ASes are under the same administration).
section: "2"
rfc2119_level: SHOULD NOT
topics:
