document: rfc-3948
kind: normative-requirement
summary: A peer SHOULD send a NAT-keepalive packet if NAT traversal is detected (per RFC 3947) and no other packet to the peer has been sent in M seconds, where M defaults to 20 seconds and is locally configurable.
section: "4"
rfc2119_level: SHOULD
topics:
    - ipsec
    - nat
    - vpn
