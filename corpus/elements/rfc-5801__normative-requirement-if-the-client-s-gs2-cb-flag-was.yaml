document: rfc-5801
kind: normative-requirement
summary: If the client's gs2-cb-flag was 'y' and the server did advertise channel binding support (via the PLUS variant), the server MUST fail authentication. If the flag was 'p' and the server does not support the indicated channel binding type, the server MUST fail authentication.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - tls
