document: rfc-5611
kind: normative-requirement
summary: During session setup, Bit Rate values MUST be equal on both sides; a mismatch results in connection rejection with Result Code 30, Error Code 1. For trunk-specific CESoPSN with CAS, the trunk type encoded in the CAS bits MUST also match; mismatch yields Result Code 30, Error Code 2.
section: "3"
rfc2119_level: MUST
