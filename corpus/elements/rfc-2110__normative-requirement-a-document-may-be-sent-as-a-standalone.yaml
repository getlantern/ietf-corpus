document: rfc-2110
kind: normative-requirement
summary: A document MAY be sent as a standalone Text/HTML body part without multipart/related if it has no linked objects or if the recipient is expected to resolve links via normal network access. Documents with unresolvable links MAY be sent but this is discouraged.
section: "6"
rfc2119_level: MAY
topics:
    - email
