document: rfc-4643
kind: normative-requirement
summary: When a security layer is negotiated via SASL, it takes effect for the client immediately after the CRLF of its last response, and for the server immediately after the CRLF of its success reply. The server MUST discard prior session knowledge such as current newsgroup and article number.
section: 2.4.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
