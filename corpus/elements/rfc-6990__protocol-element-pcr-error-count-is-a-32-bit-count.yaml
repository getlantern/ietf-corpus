document: rfc-6990
kind: protocol-element
summary: PCR_error_count is a 32-bit count of PCR_errors. A PCR_error occurs if the primary clock reference (PCR) is not seen for more than 100 ms; the interval between consecutive PCR values should not exceed 40 ms (ETSI Section 5.2.2).
