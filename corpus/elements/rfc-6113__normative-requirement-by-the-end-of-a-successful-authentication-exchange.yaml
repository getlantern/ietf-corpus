document: rfc-6113
kind: normative-requirement
summary: By the end of a successful authentication exchange, mechanisms MUST guarantee that both client and KDC have verified all plaintext sent by the other party. For multi-round-trip exchanges, mechanisms MUST additionally guarantee no individual messages were reordered or replayed from a previous exchange.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
