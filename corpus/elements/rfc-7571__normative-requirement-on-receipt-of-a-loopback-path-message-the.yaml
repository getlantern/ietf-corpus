document: rfc-7571
kind: normative-requirement
summary: On receipt of a loopback Path message, the target node MUST check that the A bit is set (LSP in lock mode); if not, the loopback request MUST be ignored. The node MUST also verify the desired loopback entity is identified by the ERO subobject preceding the ERO Hop Attributes subobject.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
