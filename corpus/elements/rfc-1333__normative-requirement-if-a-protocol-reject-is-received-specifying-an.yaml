document: rfc-1333
kind: normative-requirement
summary: If a Protocol-Reject is received specifying an LQR packet, the LQM process MUST cease sending LQRs. Whenever a LQR is sent, the LQR timer MUST be restarted.
section: "2.7"
rfc2119_level: MUST
topics:
