document: rfc-7136
kind: protocol-element
summary: 'The ''u'' bit in an IID is at position 6 (position 70 in the full IPv6 address counting from 0). It derives from the IEEE ''u/l'' bit in a MAC address but is inverted: 1 means universal scope, 0 means local scope. After IID formation, this bit has no reliable meaning.'
section: "1"
