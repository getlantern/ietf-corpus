document: rfc-7434
kind: normative-requirement
summary: The UAC MUST NOT include the User-to-User header field with purpose 'isdn-uui' (or no purpose parameter) in any message of an INVITE dialog if the original INVITE did not itself include such a header field. This prevents UUI from appearing mid-dialog without prior signalling.
section: "7"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
