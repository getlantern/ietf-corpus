document: rfc-4610
kind: security-consideration
summary: 'An attacker may forge a Register message using an address from the Anycast-RP list to: (1) overwhelm the target RP in a DoS attack, (2) inject unauthorized data to receivers, or (3) inject bogus SA entries into external MSDP domains if the RP has external MSDP peerings.'
section: "6.1"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
