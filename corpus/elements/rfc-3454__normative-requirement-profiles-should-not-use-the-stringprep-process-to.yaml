document: rfc-3454
kind: normative-requirement
summary: Profiles SHOULD NOT use the stringprep process to 'correct' perceived mis-features or bugs in current character standards. Custom mapping tables in profiles SHOULD be based on UTR21 and SHOULD map from uppercase to lowercase.
section: "1.2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
