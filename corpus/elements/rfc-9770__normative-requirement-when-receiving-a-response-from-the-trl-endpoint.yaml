document: rfc-9770
kind: normative-requirement
summary: 'When receiving a response from the TRL endpoint, a registered device MUST expunge every stored access token associated with a token hash specified in the response. An RS MUST NOT delete stored token hashes after expunging the associated access token until both conditions hold: the token has been seen and confirmed expired.'
section: "11.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
