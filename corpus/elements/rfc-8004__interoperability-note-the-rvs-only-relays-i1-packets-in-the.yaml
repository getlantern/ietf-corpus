document: rfc-8004
kind: interoperability-note
summary: The RVS only relays I1 packets in the base exchange; subsequent packets (I2, R1, R2) are sent directly between Initiator and Responder without further RVS involvement. This specification does not address scenarios where a client initiates a base exchange through its own RVS (e.g., for NAT/firewall traversal).
section: "3"
topics:
