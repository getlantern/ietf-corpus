document: rfc-1509
kind: protocol-element
summary: 'gss_display_status converts a GSS or mechanism-specific status code to human-readable text. Because a single status value may encode multiple errors, callers may need to invoke it multiple times: message_context is initialized to 0 and returns non-zero when additional messages remain in the same status_value.'
section: "3.12"
topics:
    - security
