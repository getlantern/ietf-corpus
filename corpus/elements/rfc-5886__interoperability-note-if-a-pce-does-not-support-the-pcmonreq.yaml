document: rfc-5886
kind: interoperability-note
summary: If a PCE does not support the PCMonReq message or in-band monitoring, it MUST send a PCErr with Error-value=2 (capability not supported); if unrecognized messages arrive at excessive rates, the PCE must send a PCEP CLOSE and terminate the TCP session per RFC 5440 Section 6.9.
section: "6"
topics:
    - routing
    - mpls
