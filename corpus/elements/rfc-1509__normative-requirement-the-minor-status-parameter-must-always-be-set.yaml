document: rfc-1509
kind: normative-requirement
summary: The minor_status parameter must always be set by a GSSAPI routine, even when the routine returns a calling error or a generic fatal API error. Output pointer parameters must always be set (possibly to NULL) even on error; associated length fields must be set to zero when no storage was allocated.
section: 2.1.9.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
