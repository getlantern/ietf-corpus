summary: 'Far-End Line and Far-End Path tables collect statistics derived from the far-end block error (FEBE) code: for Line, from the Z2 byte Line Overhead; for Path, from the G1 byte Path Overhead. Each table covers ESs, SESs, CVs, and UASs in current and interval forms.'
