document: rfc-7519
kind: protocol-element
summary: The JWT Claims Set is a JSON object whose members are the claims conveyed by the JWT. Claim Names are strings and Claim Values can be any JSON value. The Claims Set serves as the JWS Payload or JWE plaintext.
