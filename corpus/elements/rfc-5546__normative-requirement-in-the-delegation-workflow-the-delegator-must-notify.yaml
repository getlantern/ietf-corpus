document: rfc-5546
kind: normative-requirement
summary: In the delegation workflow, the Delegator MUST notify the Organizer by sending a REPLY with PARTSTAT=DELEGATED and including the DELEGATED-TO parameter with the Delegate's calendar address. The Delegate MUST send a REPLY to the Organizer, and SHOULD include the DELEGATED-FROM parameter referencing the Delegator.
section: 3.2.2.3
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
