document: rfc-8104
kind: protocol-element
summary: In the co-located protector model, the protector is the backup PE directly connected to the CE via a backup AC or a backup S-PE on a backup PW. The number of context identifiers scales with the number of distinct {primary PE, backup PE} pairs, making this model suitable for networks with relatively few primary and backup PEs.
section: 4.4.1
topics:
