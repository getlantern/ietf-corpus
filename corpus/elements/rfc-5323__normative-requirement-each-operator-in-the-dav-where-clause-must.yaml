document: rfc-5323
kind: normative-requirement
summary: Each operator in the DAV:where clause MUST evaluate to TRUE, FALSE, or UNKNOWN using three-valued logic. A resource is included in the result set if and only if the search condition evaluates to TRUE. If a query contains an unsupported operator, the server MUST respond with 422 (Unprocessable Entity).
section: "5.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
