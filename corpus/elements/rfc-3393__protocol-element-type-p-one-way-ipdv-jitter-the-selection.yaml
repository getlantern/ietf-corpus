document: rfc-3393
kind: protocol-element
summary: 'Type-P-One-way-ipdv-jitter: the selection function specifies consecutive packet pairs; the absolute value of each ipdv is taken. An alternate formulation from RFC 1889 applies an exponential filter (j_new = 15/16 * j_old + 1/16 * |ipdv_new|) to this sequence.'
section: "4.5"
