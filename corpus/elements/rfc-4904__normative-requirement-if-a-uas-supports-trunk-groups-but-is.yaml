document: rfc-4904
kind: normative-requirement
summary: If a UAS supports trunk groups but is not configured with the particular trunk group identified in the R-URI, it SHOULD NOT use any other trunk group. It MAY reject the request with a 404, or if it processes the request, it MUST disregard the 'trunk-context' and 'tgrp' values.
section: "6.2"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
