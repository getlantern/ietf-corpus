document: rfc-8076
kind: normative-requirement
summary: An existing ACL item MUST only be overwritten by the user who initially stored the corresponding entry, or by the Resource Owner; attempting to overwrite an ACL item signed by another peer causes an Error_Forbidden response from the Storing Peer.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
