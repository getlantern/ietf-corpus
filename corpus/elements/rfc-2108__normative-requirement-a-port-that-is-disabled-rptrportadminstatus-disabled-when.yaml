document: rfc-2108
kind: normative-requirement
summary: A port that is disabled (rptrPortAdminStatus = disabled) when power is lost or when a reset is exerted shall remain disabled when normal operation resumes. Admin status takes precedence over auto-partition and operates functionally between the auto-partition mechanism and the AUI/PMA.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
