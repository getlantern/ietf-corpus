document: rfc-4015
kind: protocol-element
summary: 'Step 11 adapts the retransmission timer upon the first RTT-SAMPLE from new data after a spurious timeout: SRTT is set to max(SRTT_prev, RTT-SAMPLE), RTTVAR to max(RTTVAR_prev, RTT-SAMPLE/2), and RTO to SRTT + max(G, 4*RTTVAR), followed by bounds checks per RFC 2988 and timer restart.'
section: "3.1"
