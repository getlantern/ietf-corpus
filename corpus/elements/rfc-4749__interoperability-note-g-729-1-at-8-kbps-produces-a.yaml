document: rfc-4749
kind: interoperability-note
summary: G.729.1 at 8 kbps produces a bitstream bitstream-compatible with G.729 and G.729A. Offerers SHOULD announce G.729 support alongside G.729.1 in SDP to allow interoperability with G.729-only peers. When operating at 8 kbps, the G.729.1 decoder also supports G.729 Annex B.
section: 6.2.1
topics:
    - rtp
    - realtime
    - voip
