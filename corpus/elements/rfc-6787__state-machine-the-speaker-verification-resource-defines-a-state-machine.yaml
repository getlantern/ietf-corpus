document: rfc-6787
kind: state-machine
summary: The Speaker Verification resource defines a state machine (Section 11.1) for voiceprint enrollment and verification sessions. Key methods include START-SESSION, END-SESSION, VERIFY, VERIFY-FROM-BUFFER, VERIFY-ROLLBACK, QUERY-VOICEPRINT, and DELETE-VOICEPRINT, with VERIFICATION-COMPLETE as the terminal event.
section: "11.1"
topics:
    - realtime
    - security
