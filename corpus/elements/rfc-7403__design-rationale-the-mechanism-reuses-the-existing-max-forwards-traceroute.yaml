document: rfc-7403
kind: design-rationale
summary: The mechanism reuses the existing Max-Forwards traceroute approach (analogous to IP TTL) combined with RFC 6849 media-loopback SDP, allowing the originating UAC to test the media path to each successive B2BUA without requiring knowledge of their addresses or URIs.
