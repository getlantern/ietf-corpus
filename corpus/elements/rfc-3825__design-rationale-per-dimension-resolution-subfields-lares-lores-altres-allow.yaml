document: rfc-3825
kind: design-rationale
summary: Per-dimension resolution subfields (LaRes, LoRes, AltRes) allow independent control of precision for each coordinate axis. This design supports adjusting reported precision without requiring separate option encodings, and allows the LCI to fit in protocols like DHCP that have limited packet size (the full option is only 18 bytes).
