document: rfc-4750
kind: state-machine
summary: 'The OSPF interface state machine (ospfIfState) defines seven states: down, loopback, waiting, pointToPoint, designatedRouter, backupDesignatedRouter, and otherDesignatedRouter. Transitions are driven by link events and DR election results on multi-access networks; the default state is down.'
