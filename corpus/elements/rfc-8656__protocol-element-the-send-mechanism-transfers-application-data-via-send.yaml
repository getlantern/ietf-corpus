document: rfc-8656
kind: protocol-element
summary: The Send mechanism transfers application data via Send indications (client to server) and Data indications (server to client). A Send indication carries an XOR-PEER-ADDRESS attribute identifying the target peer's server-reflexive transport address and a DATA attribute holding the payload. The server extracts the payload and forwards it as a UDP datagram.
section: "3.4"
topics:
    - nat
    - udp
