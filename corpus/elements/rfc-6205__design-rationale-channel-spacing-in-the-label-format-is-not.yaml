document: rfc-6205
kind: design-rationale
summary: Channel spacing in the label format is not used to indicate LSR capability but only to specify a frequency in signaling. When wider channel spacings such as 0.2 THz are utilized, the combination of a narrower channel spacing value and the n integer can still represent the correct frequency.
section: "3.1"
