document: rfc-2110
kind: security-consideration
summary: Web applications sometimes embed passwords, tickets, and other sensitive information in hidden form fields or dynamically constructed URLs. If a user forwards such a document via email, sensitive information may be inadvertently disclosed to unintended recipients.
section: "12"
topics:
