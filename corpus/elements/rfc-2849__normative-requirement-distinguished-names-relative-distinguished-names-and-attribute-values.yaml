document: rfc-2849
kind: normative-requirement
summary: Distinguished names, relative distinguished names, and attribute values of DirectoryString syntax MUST be valid UTF-8 strings. Implementations MUST NOT generate LDIF content that does not contain valid UTF-8 data.
section: Notes on LDIF Syntax
rfc2119_level: MUST
