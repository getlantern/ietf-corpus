document: rfc-8361
kind: normative-requirement
summary: The centralized replication node MUST use a distribution tree whose root is the centralized RBridge itself when forwarding replicated BUM traffic. It forwards the packet as if locally ingressed, but preserves the original ingress nickname (pseudo-nickname) to ensure MAC address learning on egress RBridges is bound to the pseudo-nickname.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
