document: rfc-3945
kind: interoperability-note
summary: GMPLS does not mandate which signaling protocol — RSVP-TE or CR-LDP — must be used. Both are extended to support GMPLS procedures, and manufacturers and operators are expected to choose based on their own requirements.
section: "1.3"
topics:
    - routing
