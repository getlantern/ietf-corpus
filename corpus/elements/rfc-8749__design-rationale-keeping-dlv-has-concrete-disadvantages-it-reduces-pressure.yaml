document: rfc-8749
kind: design-rationale
summary: 'Keeping DLV has concrete disadvantages: it reduces pressure on parent zones and registrars to adopt DNSSEC, complicates validation code, and only two validators (BIND 9 and Unbound) ever implemented it. The sole well-known registry, dlv.isc.org, was deprecated on September 30, 2017.'
section: "3"
