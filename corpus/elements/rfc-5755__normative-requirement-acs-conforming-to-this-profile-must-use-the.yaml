document: rfc-5755
kind: normative-requirement
summary: ACs conforming to this profile MUST use the v2Form AttCertIssuer choice, which MUST contain exactly one GeneralName in issuerName as a non-empty directoryName. The baseCertificateID and objectDigestInfo fields MUST be omitted.
