document: rfc-8696
kind: design-rationale
summary: The PSK is included directly inside the CMSORIforPSKOtherInfo 'info' structure passed to the KDF rather than as the IKM, so that the PSK is cryptographically bound to the key-encryption algorithm identity and key management type. This prevents cross-context use of a derived key with a different algorithm or key management mode.
section: "5"
topics:
    - crypto
    - security
