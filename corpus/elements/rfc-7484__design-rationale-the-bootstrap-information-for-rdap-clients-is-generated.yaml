document: rfc-7484
kind: design-rationale
summary: The bootstrap information for RDAP clients is generated from IANA's existing allocation registries (IPv4, IPv6, AS numbers, domain names) because TLDs, AS numbers, and network blocks are delegated by IANA, making IANA the authoritative and natural source. This avoids creating a parallel infrastructure.
