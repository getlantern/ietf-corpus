document: rfc-3281
kind: wire-format
summary: IetfAttrSyntax is a SEQUENCE with optional policyAuthority (GeneralNames) and a SEQUENCE OF values where each value is a CHOICE of OCTET STRING, OBJECT IDENTIFIER, or UTF8String. All values in a multi-valued attribute MUST use the same choice of value syntax.
