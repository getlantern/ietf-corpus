document: rfc-6630
kind: normative-requirement
summary: The peer MUST maintain retransmission timers for reliable transport of EAP-Initiate/Re-auth. If no response is received after the necessary retransmissions, the peer MUST assume ERP/AAK is not supported by the SAP.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
