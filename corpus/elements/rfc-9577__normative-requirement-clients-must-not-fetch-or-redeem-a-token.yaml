document: rfc-9577
kind: normative-requirement
summary: 'Clients MUST NOT fetch or redeem a token based on a challenge that fails validation. Validation requires: recognized token_type, well-formed TokenChallenge structure, and (if origin_info is non-empty) the challenging Origin''s name appears in origin_info.'
section: 2.1.3
rfc2119_level: MUST NOT
topics:
