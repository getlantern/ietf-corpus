document: rfc-5103
kind: wire-format
summary: A Reverse Information Element in a Template is encoded identically to its forward counterpart except the enterprise bit (bit 0 of the first octet) is set to 1, and the 4-byte Reverse PEN (29305) follows immediately after the field length. Forward IEs have the enterprise bit set to 0 and no trailing PEN.
section: "6.1"
