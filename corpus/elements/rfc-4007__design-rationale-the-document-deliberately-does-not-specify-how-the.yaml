document: rfc-4007
kind: design-rationale
summary: The document deliberately does not specify how the '<address>%<zone_id>' format should be combined with the RFC 2732 preferred format for literal IPv6 addresses in URLs. The '%' character conflicts with URI percent-encoding (so zone 1 would require '%251'), causing parsing problems for applications, URI parsers, and name-to-address libraries. FQDN use is recommended instead of literal addresses in URLs.
section: "11.7"
topics:
    - ip
    - v6ops
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
