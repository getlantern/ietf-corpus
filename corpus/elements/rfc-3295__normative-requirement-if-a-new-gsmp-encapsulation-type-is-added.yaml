document: rfc-3295
kind: normative-requirement
summary: If a new GSMP encapsulation type is added to extend this MIB, it SHOULD be done in the form of a new table with the entity ID as an index, and a row in that table SHOULD be created before any row in a GSMP entity table using the new encapsulation.
section: 3.4.3
rfc2119_level: SHOULD
topics:
