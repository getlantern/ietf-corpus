document: rfc-1647
kind: interoperability-note
summary: If either side refuses TN3270E (WON'T or DON'T), traditional tn3270—negotiating Terminal-Type, Binary Transmission, and End of Record separately—remains available as a fallback. A TN3270E-capable implementation is expected to attempt TN3270E first and fall back to traditional tn3270 only on refusal.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
