document: rfc-4616
kind: security-consideration
summary: When the PLAIN mechanism is used, the server gains the ability to impersonate the user to all services sharing the same password, regardless of any TLS encryption. Clients are encouraged to have an operational mode where all mechanisms that reveal the user's password to the server are disabled.
section: "5"
topics:
    - security
    - privacy
