document: rfc-2598
kind: normative-requirement
summary: The EF PHB SHOULD average at least the configured rate when measured over any time interval equal to or longer than the time it takes to send an output link MTU-sized packet at the configured rate. Behavior at time scales shorter than a packet time at the configured rate is deliberately not specified.
section: "2"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
