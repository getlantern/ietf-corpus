document: rfc-5264
kind: normative-requirement
summary: To construct a partial publication, the Content-Type MUST be 'application/pidf-diff+xml', the body MUST use a <pidf-diff> root element with the 'entity' attribute, and patch operations MUST be constructed in sequence as defined in RFC 5262.
