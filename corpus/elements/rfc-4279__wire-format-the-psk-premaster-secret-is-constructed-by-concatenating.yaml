document: rfc-4279
kind: wire-format
summary: 'The PSK premaster secret is constructed by concatenating: uint16(N), N zero octets, uint16(N), and the PSK itself (where N is the PSK length in octets). This follows the general structure {other_secret<0..2^16-1>, psk<0..2^16-1>} where other_secret is zeroes for plain PSK.'
