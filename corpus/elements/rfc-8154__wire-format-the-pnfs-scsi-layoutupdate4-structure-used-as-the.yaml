summary: The pnfs_scsi_layoutupdate4 structure (used as the SCSI layout-specific argument in LAYOUTCOMMIT) contains slu_commit_list, a variable-length array of pnfs_scsi_range4 structures (each with sr_file_offset and sr_length) covering regions transitioned from PNFS_SCSI_INVALID_DATA to PNFS_SCSI_READ_WRITE_DATA.
