kind: normative-requirement
summary: For L2TPv3 ICMP Ping, the ICMP Echo request IP Header fields MUST set destination IP to the remote LCCE's tunnel endpoint address, source IP to the local LCCE's tunnel endpoint address, and TTL or Hop Limit to 1.
