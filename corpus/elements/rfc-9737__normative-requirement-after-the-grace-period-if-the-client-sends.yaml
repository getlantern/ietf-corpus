document: rfc-9737
kind: normative-requirement
summary: After the grace period, if the client sends an lrf_stateid in LAYOUTRETURN with a value of the anonymous stateid of all zeros, the MDS MUST respond with NFS4ERR_NO_GRACE.
section: "2"
rfc2119_level: MUST
