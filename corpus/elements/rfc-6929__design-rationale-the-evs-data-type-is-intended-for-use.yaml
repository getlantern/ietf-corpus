document: rfc-6929
kind: design-rationale
summary: The EVS data type is intended for use only when a vendor's existing VSA Type space is fully allocated. Vendors are recommended to exhaust the standard Vendor-Specific Attribute (type 26) space first, because this specification may take time to become widely deployed.
