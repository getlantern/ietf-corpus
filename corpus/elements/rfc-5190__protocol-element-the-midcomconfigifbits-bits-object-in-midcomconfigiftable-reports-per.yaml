document: rfc-5190
kind: protocol-element
summary: 'The midcomConfigIfBits BITS object in midcomConfigIfTable reports per-interface middlebox capabilities: ipv4, ipv6, addressWildcards, portWildcards, firewall, nat, portTranslation, protocolTranslation, twiceNat, and inside (indicating NAT inside interface). Interface index 0 denotes capabilities available on all interfaces. midcomConfigIfEnabled indicates whether these capabilities are currently active.'
section: 5.2.1
topics:
    - snmp
    - nat
