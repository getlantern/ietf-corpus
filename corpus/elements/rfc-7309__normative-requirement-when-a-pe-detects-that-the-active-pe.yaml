document: rfc-7309
kind: normative-requirement
summary: When a PE detects that the active PE in the same RG has gone down, if the local PE has redundant PWs for the affected services and has the highest priority after the failed PE, it SHOULD advertise active state for all associated inter-domain PWs.
section: 5.1.3
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
