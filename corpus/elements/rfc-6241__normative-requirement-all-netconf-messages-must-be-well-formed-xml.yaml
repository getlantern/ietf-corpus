document: rfc-6241
kind: normative-requirement
summary: All NETCONF messages MUST be well-formed XML encoded in UTF-8. A peer receiving a malformed or non-UTF-8 <rpc> SHOULD reply with a 'malformed-message' error; if no reply can be sent, the server MUST terminate the session.
section: "3"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
