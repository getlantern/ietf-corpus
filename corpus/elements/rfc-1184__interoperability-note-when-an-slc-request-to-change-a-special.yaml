document: rfc-1184
kind: interoperability-note
summary: When an SLC request to change a special character is simultaneously generated by both server and client with the same level bits but different values and the ACK bit is set, both sides settle on the client's requested value. The server ignores the command and the client switches to its own requested value.
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
