document: rfc-6705
kind: normative-requirement
summary: MAG1 and MAG2 MUST use the same tunneling mechanism for data traffic tunneled between them. The encapsulation mode SHOULD be configurable and defaults to the same mode used for the PMIPv6 LMA-MAG tunnel.
section: "6.2"
rfc2119_level: MUST
