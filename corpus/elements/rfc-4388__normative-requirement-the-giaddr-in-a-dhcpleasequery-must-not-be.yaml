document: rfc-4388
kind: normative-requirement
summary: The giaddr in a DHCPLEASEQUERY MUST NOT be used to restrict query processing in any way and MUST NOT be used to locate a subnet to which the ciaddr must belong; it serves only as the return address for the server's response.
section: "6.3"
rfc2119_level: MUST NOT
