document: rfc-4454
kind: protocol-element
summary: OAM cells are always encapsulated using cell mode encapsulation regardless of the encapsulation format used for user data. In AAL5-SDU Mode, F5 OAM cells arriving during AAL5 reassembly are sent immediately over the PW, ahead of the AAL5 SDU payload.
section: "5.3"
topics:
