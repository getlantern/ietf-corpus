document: rfc-6887
kind: protocol-element
summary: Every PCP response includes a 32-bit Epoch Time that increments by one per second. The server MUST reset Epoch Time to its initial value (usually zero) upon losing explicit dynamic mapping state (reboot, power failure) or upon a change to the NAT's external IP address, signaling clients to promptly renew their mappings.
section: "8.5"
topics:
    - nat
