document: rfc-8876
kind: protocol-element
summary: A CAP alert is included in a SIP message as an additional data block, conveyed via a Call-Info header field with purpose 'EmergencyCallData.cap'. The alert may be included by value (Content-ID URL with MIME body of type 'application/emergencyCallData.cap+xml') or by reference (a URI the recipient dereferences).
section: "4.1"
topics:
    - sip
    - realtime
