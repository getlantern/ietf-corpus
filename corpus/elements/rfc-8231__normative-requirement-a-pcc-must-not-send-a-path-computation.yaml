document: rfc-8231
kind: normative-requirement
summary: A PCC MUST NOT send a path computation request for a delegated LSP; it MUST first perform the Delegation Revocation procedure before sending a PCReq for that LSP. The PCRpt message MUST NOT be used to request a path from the PCE.
section: 5.8.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
