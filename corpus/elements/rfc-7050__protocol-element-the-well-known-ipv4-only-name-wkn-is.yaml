document: rfc-7050
kind: protocol-element
summary: The Well-Known IPv4-only Name (WKN) is the FQDN 'ipv4only.arpa.', which is well-known to have only A records. Querying its AAAA records causes a DNS64 server to synthesize IPv6 addresses, revealing the Pref64::/n in use.
