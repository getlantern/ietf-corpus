document: rfc-6757
kind: design-rationale
summary: Access network information carried in the ANI option is intended only for use between PMIPv6 infrastructure nodes (MAG and LMA) and is not exposed to mobile nodes or external parties. This design keeps location and operator identity internal to the PMIPv6 domain by default.
