document: rfc-4941
kind: normative-requirement
summary: When an interface connects to a new link, a new randomized interface identifier SHOULD be generated immediately together with a new set of temporary addresses, to prevent correlation of addresses across links.
section: "3.5"
rfc2119_level: SHOULD
