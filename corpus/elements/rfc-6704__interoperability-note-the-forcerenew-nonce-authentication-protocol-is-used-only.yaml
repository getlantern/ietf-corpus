document: rfc-6704
kind: interoperability-note
summary: The Forcerenew Nonce Authentication protocol is used only when both client and server have negotiated it via the FORCERENEW_NONCE_CAPABLE (145) option exchange; if either party does not support it, the existing RFC 3118 authentication mechanism remains required for FORCERENEW messages.
section: "3.1"
topics:
