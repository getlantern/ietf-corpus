document: rfc-8077
kind: normative-requirement
summary: For PW types where the control word is REQUIRED, Label Mapping messages MUST have C=1. When such a message is received with C=0, a Label Release with 'Illegal C-bit' status code MUST be sent and the PW will not be enabled.
section: "7.1"
rfc2119_level: MUST
topics:
    - mpls
