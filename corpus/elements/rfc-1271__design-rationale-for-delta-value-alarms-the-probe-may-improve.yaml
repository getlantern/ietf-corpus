document: rfc-1271
kind: design-rationale
summary: For delta-value alarms, the probe may improve precision by sampling twice per period and comparing the sum of the two most recent samples to the threshold, enabling detection of threshold crossings that span a sampling boundary. This requires no special configuration of the threshold value.
