document: rfc-6408
kind: interoperability-note
summary: This document updates RFC 3588 Section 5.2 NAPTR query procedure. Realms that have not provisioned extended S-NAPTR records will return legacy 'aaa:X' or 'aaa' service fields; the querying peer must handle all five NAPTR response patterns to interoperate with both old and new deployments.
