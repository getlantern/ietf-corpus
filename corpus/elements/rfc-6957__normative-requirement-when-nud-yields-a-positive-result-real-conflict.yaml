document: rfc-6957
kind: normative-requirement
summary: 'When NUD yields a positive result (real conflict confirmed), the BNG MUST reply to the DAD-performing CPE2 with a unicast NA message: L2 destination is Link-layer-CPE2, IPv6 destination is all-nodes multicast, Target Address is the conflicting tentative address, and Target Link-layer Address is the BNG''s receiving interface address.'
section: 4.2.3.2
rfc2119_level: MUST
