document: rfc-7361
kind: normative-requirement
summary: On Backbone Core Bridges (BCBs), if the C-bit is set to 1, the PBB-VPLS SHOULD NOT flush their B-MAC FIBs. The B-VPLS control plane SHOULD propagate the MAC flush message following data-plane split-horizon rules to the established B-VPLS topology.
section: 5.2.1
rfc2119_level: SHOULD NOT
topics:
    - mpls
