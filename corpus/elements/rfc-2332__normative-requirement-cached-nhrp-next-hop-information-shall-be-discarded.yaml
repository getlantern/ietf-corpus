document: rfc-2332
kind: normative-requirement
summary: Cached NHRP next-hop information SHALL be discarded when the Holding Time expires. The Holding Time in a CIE specifies the number of seconds for which the Next Hop NBMA information is considered valid, and MUST be set to 0 on a NAK.
section: 5.2.0.1
rfc2119_level: SHALL
