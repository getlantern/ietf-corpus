document: rfc-2752
kind: design-rationale
summary: For multicast merged flows, the application AUTH_DATA is set to either the first application AUTH_DATA in the message or chosen by the PDP, while user AUTH_DATA uses the current node's identity rather than copying from a previous hop — this prevents identity merging ambiguity across multicast branches.
section: "5"
