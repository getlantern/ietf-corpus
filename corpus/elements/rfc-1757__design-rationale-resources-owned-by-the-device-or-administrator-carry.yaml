document: rfc-1757
kind: design-rationale
summary: Resources owned by the device or administrator carry OwnerString values starting with 'monitor' and are intended to be long-lived and shared by many users. Indiscriminate modification of monitor-owned configuration by management stations is discouraged; such modifications should occur only under administrator direction.
section: "3.1"
topics:
