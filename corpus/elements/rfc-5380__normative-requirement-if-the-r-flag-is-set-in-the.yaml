document: rfc-5380
kind: normative-requirement
summary: If the R flag is set in the MAP option, the mobile node MUST place its RCoA in place of the home address in the binding update message, causing the RCoA to be bound to the LCoA in the MAP's binding cache.
section: "7.1"
rfc2119_level: MUST
topics:
