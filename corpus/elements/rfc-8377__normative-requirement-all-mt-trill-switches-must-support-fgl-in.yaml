document: rfc-8377
kind: normative-requirement
summary: All MT TRILL switches MUST support FGL in the sense of being FGL safe (RFC 7172), and thus MUST support all four data labeling area content formats. This requirement collapses FGL and MT support to reduce implementation variations and simplify testing.
section: 2.4.3
rfc2119_level: MUST
topics:
    - routing
