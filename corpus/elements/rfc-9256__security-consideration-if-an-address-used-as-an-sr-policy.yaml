document: rfc-9256
kind: security-consideration
summary: If an address used as an SR Policy endpoint is advertised by more than one node due to misconfiguration or spoofing, traffic steered over the SR Policy may be diverted to an undesired node. Mechanisms for detection of duplicate prefix advertisement should be used, though their details are outside this document's scope.
section: "10"
topics:
    - security
    - routing
