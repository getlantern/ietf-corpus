document: rfc-7880
kind: protocol-element
summary: A new state variable bfd.SessionType is introduced with allowable values SBFDInitiator and SBFDReflector, describing whether a session performs continuity tests or listens for and reflects incoming S-BFD Control packets. It MUST be initialized to the appropriate type at session creation.
section: "6.1"
topics:
    - realtime
