kind: wire-format
summary: 'The CONDITIONS object is a 64-bit structure: a 16-bit Length field, an 8-bit Class field (value 135), an 8-bit C-type field (value 1), and a 32-bit Flags field where bit 31 is the Merge-point (M) bit and bits 0-30 are reserved (MUST be zero on transmission, ignored on receipt).'
