document: rfc-9521
kind: normative-requirement
summary: If the BFD packet is received with Your Discriminator set to 0, the BFD session SHOULD be identified using the VNI number and the inner Ethernet/IP header (source MAC, source IP, destination MAC, destination IP); if identification fails, the packet MUST be dropped.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
