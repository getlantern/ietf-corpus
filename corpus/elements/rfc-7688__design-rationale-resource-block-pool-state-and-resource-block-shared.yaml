document: rfc-7688
kind: design-rationale
summary: Resource Block Pool State and Resource Block Shared Access Wavelength Availability sub-TLVs are dynamic in nature (changing when connections are established or torn down), while the remaining sub-TLVs are static. This distinction allows dynamic sub-TLVs to be separated and advertised with multiple TE LSAs per OSPF router.
