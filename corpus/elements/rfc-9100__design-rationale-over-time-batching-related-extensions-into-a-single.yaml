document: rfc-9100
kind: design-rationale
summary: Over time, batching related extensions into a single feature bit is preferred over fully independent fine-grained bits, as too many individually selectable optional extensions reduce interoperability. This creates a hybrid between completely independent extensions and a linear version scheme.
