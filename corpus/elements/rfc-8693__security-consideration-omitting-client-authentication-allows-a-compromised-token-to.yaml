document: rfc-8693
kind: security-consideration
summary: Omitting client authentication allows a compromised token to be leveraged via the STS into other tokens by anyone possessing it. Client authentication enables additional authorization checks by the STS as to which entities are permitted to impersonate or receive delegations from other entities.
section: "2.1"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
