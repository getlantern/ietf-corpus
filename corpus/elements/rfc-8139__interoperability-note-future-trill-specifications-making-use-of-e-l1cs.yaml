document: rfc-8139
kind: interoperability-note
summary: Future TRILL specifications making use of E-L1CS MUST specify how links will behave when some attached TRILL switches support E-L1CS and others do not. Legacy RBridges that do not support E-L1CS will not see E-L1CS-based forwarder appointments; the DRB must fall back to Hello-based appointments to appoint such legacy switches.
section: "8.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
