document: rfc-1961
kind: interoperability-note
summary: GSS-API peers achieve interoperability by establishing a common security mechanism — either through administrative action or through negotiation — before context establishment. The SOCKS V5 GSS-API method encapsulates any mechanism-selection negotiation within GSS-API itself.
