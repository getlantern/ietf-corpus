document: rfc-3986
kind: design-rationale
summary: The URI syntax is intentionally a superset of all valid URI schemes, enabling a scheme-independent parser to extract major components without knowing scheme-specific requirements. This decouples the evolution of identification schemes from protocols and data formats.
section: 1.1.1
