document: rfc-4805
kind: protocol-element
summary: 'dsx1LineStatus is a read-only INTEGER bitmap (1..131071) simultaneously representing loopback state and 17 alarm/failure conditions: NoAlarm (1), RcvFarEndLOF/Yellow Alarm (2), XmtFarEndLOF (4), RcvAIS (8), XmtAIS (16), LossOfFrame/Red Alarm (32), LossOfSignal (64), LoopbackState (128), T16AIS (256), DS2-specific flags (32768, 65536), and others. dsx1NoAlarm must be set if and only if no other flag is set.'
section: "4"
