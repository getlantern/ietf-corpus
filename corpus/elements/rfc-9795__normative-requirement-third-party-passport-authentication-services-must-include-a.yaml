document: rfc-9795
kind: normative-requirement
summary: Third-party PASSporT authentication services MUST include a PASSporT extension ("ppt") value of "rcd", and their RCD MUST NOT be used when the call lacks a first-party PASSporT assuring the calling party number is not spoofed. Third-party crowdsourced RCD elements MUST use a third-party "rcd" PASSporT with the "iss" claim.
section: "10"
rfc2119_level: MUST
topics:
    - security
    - jose
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
