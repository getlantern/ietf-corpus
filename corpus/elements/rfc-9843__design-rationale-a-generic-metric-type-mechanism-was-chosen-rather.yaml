document: rfc-9843
kind: design-rationale
summary: A generic metric-type mechanism was chosen rather than enumerating all possible metrics (jitter, fiscal cost, reliability, etc.) so that operators can assign semantics to user-defined metric-types 128-255 locally. Standard metric-types 0-127 remain IANA-assigned to ensure interoperability across domains.
