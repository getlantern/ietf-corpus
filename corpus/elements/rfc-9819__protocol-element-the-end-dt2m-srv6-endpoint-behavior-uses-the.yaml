document: rfc-9819
kind: protocol-element
summary: The End.DT2M SRv6 Endpoint Behavior uses the ESI Filtering ARG (Arg.FE2) to perform split-horizon filtering of BUM traffic in EVPN multihoming and E-Tree scenarios. The LOC:FUNC portion is signaled via the Inclusive Multicast Ethernet Tag route (Route Type 3) and the Arg.FE2 value is signaled via the Ethernet A-D per ES route (Route Type 1).
section: "3"
topics:
