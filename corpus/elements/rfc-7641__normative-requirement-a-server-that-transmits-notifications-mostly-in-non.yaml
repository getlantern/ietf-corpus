document: rfc-7641
kind: normative-requirement
summary: A server that transmits notifications mostly in non-confirmable messages MUST send at least one confirmable notification every 24 hours to prevent stale clients from remaining on the observer list indefinitely.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
