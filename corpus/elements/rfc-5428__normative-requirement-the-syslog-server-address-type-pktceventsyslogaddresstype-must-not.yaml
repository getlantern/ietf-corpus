document: rfc-5428
kind: normative-requirement
summary: The syslog server address type (pktcEventSyslogAddressType) MUST NOT be set to dns(16) because an unresolvable DNS name would leave the device without a reachable syslog server. Default is ipv4.
section: "6"
rfc2119_level: MUST NOT
topics:
    - snmp
    - syslog
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
