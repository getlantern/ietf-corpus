document: rfc-3920
kind: security-consideration
summary: The stream ID is security-critical for session management and server dialback; it MUST be both unpredictable and nonrepeating. Implementations SHOULD follow RFC 1750 (or successor) randomness recommendations. Weak or predictable stream IDs expose connections to session hijacking and dialback forgery.
section: "4.4"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
