document: rfc-3440
kind: interoperability-note
summary: For static profile implementations, threshold objects (adslAtucThreshold15MinFailedFastR, etc.) are read-write rather than read-create, and adslLineConfProfileDualLite is read-only (algorithmically set). For dynamic profile implementations, these objects are read-create and the profile index is manager-set.
