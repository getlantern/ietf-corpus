document: rfc-8613
kind: interoperability-note
summary: OSCORE can be transported over HTTP using an 'OSCORE' HTTP header field and a new content type. HTTP-to-CoAP and CoAP-to-HTTP proxy operations are supported; conceptually, HTTP messages are first mapped to CoAP and then OSCORE-processed, though implementations may translate directly.
section: "11"
topics:
