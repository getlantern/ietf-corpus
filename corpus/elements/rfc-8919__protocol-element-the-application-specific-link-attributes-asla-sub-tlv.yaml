document: rfc-8919
kind: protocol-element
summary: The Application-Specific Link Attributes (ASLA) sub-TLV (Type 16) is defined for TLVs 22, 23, 25, 141, 222, and 223. Its value contains an Application Identifier Bit Mask followed by link attribute sub-sub-TLVs whose format matches the corresponding legacy sub-TLV formats.
