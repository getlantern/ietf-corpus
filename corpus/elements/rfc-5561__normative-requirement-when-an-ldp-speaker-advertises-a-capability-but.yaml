document: rfc-5561
kind: normative-requirement
summary: When an LDP speaker advertises a capability but its peer has not advertised the corresponding capability, the behavior is the responsibility of the capability designer. If the specified procedure is to terminate the session, the speaker SHOULD send a Notification with Status Code Unsupported Capability before terminating.
section: "6"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
