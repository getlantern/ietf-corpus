document: rfc-2446
kind: security-consideration
summary: 'Key iTIP security threats include: spoofing the Organizer (forging REQUEST/CANCEL to manipulate attendees'' calendars), spoofing the Attendee (forging REPLY to falsify attendance status), unauthorized replacement of the Organizer, eavesdropping on scheduling data, flooding a calendar with unsolicited REQUEST messages, procedural alarms triggered by malicious calendar components, and unauthorized REFRESH requests.'
section: "6.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
