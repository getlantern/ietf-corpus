document: rfc-5661
kind: protocol-element
summary: The server_owner4 structure identifies a server with an opaque major identifier (so_major_id) and a 64-bit minor identifier (so_minor_id). Matching so_major_id values indicate the same server; matching both values indicates sessions may be shared across connections, enabling trunking.
section: "2.5"
