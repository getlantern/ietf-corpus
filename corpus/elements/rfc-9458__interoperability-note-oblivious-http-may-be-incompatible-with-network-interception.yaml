document: rfc-9458
kind: interoperability-note
summary: Oblivious HTTP may be incompatible with network interception regimes that rely on trust anchors and TLS interception. Middlebox devices may not be updated to recognize the 'message/ohttp-req' and 'message/ohttp-res' media types, and the key management design is not trivially adapted to enable intermediary interception.
section: "8.3"
topics:
    - http
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
