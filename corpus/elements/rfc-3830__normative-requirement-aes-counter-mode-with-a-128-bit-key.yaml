document: rfc-3830
kind: normative-requirement
summary: AES counter mode with a 128-bit key (AES-CM-128) is the mandatory key data transport encryption. NULL encryption MUST NOT be used unless underlying protocols guarantee security; its only sanctioned use is specific SIP scenarios where SDP is protected end-to-end.
section: 4.2.3
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
