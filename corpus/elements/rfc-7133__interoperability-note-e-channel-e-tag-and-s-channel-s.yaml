document: rfc-7133
kind: interoperability-note
summary: E-channel (E-TAG) and S-channel (S-TAG) frame tags have only local meaning identifying virtual ports; accordingly IPFIX does not need to monitor data based on these tags, and Flows are reported as arriving on the corresponding virtual ports.
section: "2.2"
topics:
