document: rfc-7459
kind: protocol-element
summary: A 3D shape can be converted to a 2D shape by removing altitude. Confidence of the resulting 2D shape is higher; the approximate formula is C[2d] >= C[3d]^(2/3) assuming equal per-axis confidence.
