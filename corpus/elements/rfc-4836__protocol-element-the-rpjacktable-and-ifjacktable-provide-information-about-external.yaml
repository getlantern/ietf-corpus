document: rfc-4836
kind: protocol-element
summary: The rpJackTable and ifJackTable provide information about external jack connectors attached to MAUs on repeater ports and interfaces respectively. Each entry carries a jack index and an IANAifJackType value identifying the connector type as it appears on the outside of the system.
