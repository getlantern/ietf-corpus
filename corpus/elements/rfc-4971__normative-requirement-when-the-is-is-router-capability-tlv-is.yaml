document: rfc-4971
kind: normative-requirement
summary: When the IS-IS Router CAPABILITY TLV is leaked from level-2 to level-1, the D bit MUST be set; otherwise it MUST be clear. TLVs with the D bit set MUST NOT be leaked from level-1 to level-2, preventing looping.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
