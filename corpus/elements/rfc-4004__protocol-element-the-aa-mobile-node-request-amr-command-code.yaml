document: rfc-4004
kind: protocol-element
summary: The AA-Mobile-Node-Request (AMR), Command-Code 260 with 'R' bit set, is sent by the FA (or HA for co-located MN) to the AAAF to request authentication and authorization. Mandatory AVPs include Session-Id, Auth-Application-Id, User-Name, Destination-Realm, Origin-Host, Origin-Realm, MIP-Reg-Request, and MIP-MN-AAA-Auth.
