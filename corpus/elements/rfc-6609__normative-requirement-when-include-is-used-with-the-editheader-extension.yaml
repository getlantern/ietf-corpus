document: rfc-6609
kind: normative-requirement
summary: 'When ''include'' is used with the ''editheader'' extension, any changes made to headers in a script MUST be propagated both to and from included scripts: included scripts MUST NOT see removed headers and MUST see added headers, and vice versa upon return.'
section: "3.5"
rfc2119_level: MUST
topics:
    - email
