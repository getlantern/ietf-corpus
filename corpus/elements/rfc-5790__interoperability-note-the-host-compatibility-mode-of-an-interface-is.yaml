document: rfc-5790
kind: interoperability-note
summary: The Host Compatibility Mode of an interface is set to IGMPv2 on receipt of an IGMPv2 General Query, and to IGMPv1 on receipt of an IGMPv1 Membership Query; the corresponding Querier Present timer is set to Older Version Querier Present Timeout. LW-IGMPv3 hosts may optionally suppress their reports when IGMPv1/v2 reports are present, and this suppression behavior may be configurable.
section: 6.2.1
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
