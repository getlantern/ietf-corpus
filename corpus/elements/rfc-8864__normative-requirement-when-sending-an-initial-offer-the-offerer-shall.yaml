document: rfc-8864
kind: normative-requirement
summary: When sending an initial offer, the offerer SHALL include an SDP dcmap attribute in the 'm=' section for the SCTP association, and MAY include one or more dcsa attributes whose 'stream-id' SHALL match the dcmap's 'dcmap-stream-id'.
section: "6.3"
rfc2119_level: REQUIRED
