document: rfc-4629
kind: protocol-element
summary: The RTP Marker bit (M bit) is set to 1 when the current packet carries the end of the current frame and 0 otherwise. The RTP timestamp encodes the sampling instance of the first video frame data and shall be the same on successive packets if a video frame occupies more than one packet.
section: "3.1"
topics:
    - rtp
    - realtime
