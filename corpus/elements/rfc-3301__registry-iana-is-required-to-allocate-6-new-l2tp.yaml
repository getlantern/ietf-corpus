summary: 'IANA is required to allocate 6 new L2TP AVP type values: Rx Minimum BPS (40), Rx Maximum BPS (41), Service Category (42), Service Name (43), Calling Sub-Address (44), and VPI/VCI Identifier (45). Further Service Category flag bits require ''Specification Required'' process.'
