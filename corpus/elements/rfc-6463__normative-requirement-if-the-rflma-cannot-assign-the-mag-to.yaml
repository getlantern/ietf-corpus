document: rfc-6463
kind: normative-requirement
summary: If the rfLMA cannot assign the MAG to any r2LMA and is also unwilling or unable to serve as a normal RFC 5213 LMA, it MUST reject the PBU by returning a PBA with Status Value 130 (Insufficient resources).
section: "5.3"
rfc2119_level: MUST
topics:
