document: rfc-7369
kind: protocol-element
summary: 'Eight CCM Interval values are defined with 3-bit encoding per IEEE 802.1Q-2011: Reserved (000), 3 1/3 ms (001), 10 ms (010), 100 ms (011), 1 s (100), 10 s (101), 1 min (110), 10 min (111). Loss of three consecutive CCMs declares connectivity failure.'
