document: rfc-7380
kind: protocol-element
summary: PMT_error_2_count is a 16-bit unsigned count of PMT2 errors per program_map_PID. A PMT2 error occurs when table_id 0x02 does not appear at least every 0.5 seconds on each program_map_PID listed in the PAT, or has a non-zero Scrambling_control_field on any such packet. Supersedes PMT_error_count.
section: "3"
topics:
