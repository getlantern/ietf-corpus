document: rfc-3711
kind: normative-requirement
summary: 'SRTP/SRTCP MUST NOT share master keys outside of two permitted cases: (1) between an SRTP stream and its corresponding SRTCP, and (2) between streams belonging to the same RTP session. In all other circumstances, separate master keys are required.'
section: "8"
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
    - security
    - crypto
