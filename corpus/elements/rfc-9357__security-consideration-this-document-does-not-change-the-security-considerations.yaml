document: rfc-9357
kind: security-consideration
summary: This document does not change the security considerations set out in RFC 8231 for PCEP with a stateful PCE. RFC 8231 recommends stateful PCEP extensions be authenticated and encrypted using TLS (RFC 8253), per RFC 9325 best practices, which would protect the extended flags.
