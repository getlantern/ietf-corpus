document: rfc-1220
kind: protocol-element
summary: The LAN ID field is an optional 32-bit field that tags a bridged frame with a user-community identifier. Systems not implementing this feature must discard any frame that carries a LAN ID, treating it as belonging to a different community. The default is disabled.
section: "5.4"
