document: rfc-4072
kind: security-consideration
summary: Compromised Diameter agents can manipulate AVPs in DEA/DER messages to grant unauthorized access, redirect user sessions or DNS to attacker-controlled hosts, modify routing tables, remove packet filters, or execute CLI commands on the NAS. Some attacks can be mitigated by configuring the NAS to reject unexpected AVPs.
section: "8.2"
topics:
    - diameter
    - security
