document: rfc-8664
kind: wire-format
summary: The SR-PCE-CAPABILITY sub-TLV (Type=26, Length=4) carries a 32-bit value with Reserved (16 bits), Flags (8 bits including N and X bits), and MSD (8 bits). The N-Flag indicates NAI-to-SID resolution capability; the X-Flag indicates unlimited MSD.
section: 4.1.2
