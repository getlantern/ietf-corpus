document: rfc-8550
kind: normative-requirement
summary: 'Receiving agents MUST support ECDSA with curve P-256 with SHA-256, MUST support EdDSA with curve25519 using PureEdDSA mode, and MUST- support RSA PKCS #1 v1.5 with SHA-256. Agents SHOULD support RSASSA-PSS with SHA-256 and SHOULD use deterministic generation for the ECDSA parameter ''k'' per RFC 6979.'
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
