document: rfc-3408
kind: normative-requirement
summary: It is RECOMMENDED to implement the additional AL-to-compressor interface to improve compression efficiency, especially when the AL often becomes unsafe to send NHPs. This interface is not strictly required and its absence should not prevent implementing the profile.
section: "2.2"
rfc2119_level: RECOMMENDED
