document: rfc-726
kind: normative-requirement
summary: The serving host must send a break reset command for every break character transmitted by the using host (except at the start of an interaction), establishing a strict one-to-one correspondence. The server must also send an initial break reset command to establish break classes and echoing mode before receiving any data from the user.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
