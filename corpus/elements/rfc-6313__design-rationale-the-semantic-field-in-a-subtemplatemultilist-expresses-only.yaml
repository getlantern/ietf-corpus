document: rfc-6313
kind: design-rationale
summary: The Semantic field in a subTemplateMultiList expresses only the top-level relationship across different Template groups; it cannot convey semantics among records within a single Template group. When per-group semantics are required, a basicList of subTemplateLists must be used instead.
section: "5.6"
