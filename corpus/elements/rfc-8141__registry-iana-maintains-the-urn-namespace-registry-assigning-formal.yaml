document: rfc-8141
kind: registry
summary: IANA maintains the URN Namespace Registry, assigning formal NIDs (chosen by applicants) and informal NIDs (assigned as 'urn-N' sequences) following the Expert Review process described in Section 6. This document updates and supersedes the procedures in RFC 3406.
