document: rfc-4701
kind: registry
summary: 'IANA maintains a registry of 2-octet DHCID RR Identifier Type Codes: 0x0000 (htype+chaddr from DHCPv4 DHCPREQUEST), 0x0001 (DHCPv4 Client Identifier option data), 0x0002 (client DUID from DHCPv6 or RFC 4361-encoded DHCPv4), 0x0003-0xfffe (unassigned), 0xffff (reserved). New values require Standards Action.'
section: "3.3"
topics:
