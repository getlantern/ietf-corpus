document: rfc-4866
kind: normative-requirement
summary: If the mobile node's home address is a CGA and it already holds a permanent home keygen token for the correspondent node, it MUST authenticate the Binding Update message by proving knowledge of the permanent home keygen token rather than using a CGA-based or reachability-based method.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
