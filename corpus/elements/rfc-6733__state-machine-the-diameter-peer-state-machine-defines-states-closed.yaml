document: rfc-6733
kind: state-machine
summary: 'The Diameter peer state machine defines states: Closed, Wait-Conn-Ack, Wait-I-CEA, Wait-Conn-Ack/Elect, Wait-Returns, R-Open, I-Open, and Closing. Key transitions are triggered by Start (initiator), R-Conn-CER (responder receives connection), I-Rcv-CEA (initiator receives CEA), Timeout, and Disconnect. An election process using Origin-Host string comparison resolves simultaneous connection attempts between the same pair of peers.'
section: "5.6"
topics:
    - diameter
