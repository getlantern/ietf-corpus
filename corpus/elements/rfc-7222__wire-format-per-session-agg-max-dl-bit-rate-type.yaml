summary: Per-Session-Agg-Max-DL-Bit-Rate (Type 3, Length 6) and Per-Session-Agg-Max-UL-Bit-Rate (Type 4, Length 6) each include a 1-bit S flag (extend scope to sessions sharing the same Service Identifier), a 1-bit E flag (exclude GBR flows from measurement), a 14-bit Reserved field, and a 32-bit bit-rate value in bits per second.
