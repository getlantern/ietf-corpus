document: rfc-8881
kind: normative-requirement
summary: A client SHOULD use DESTROY_CLIENTID to destroy a client ID it no longer needs. As long as sessions, opens, locks, delegations, layouts, or wants remain, the server MUST NOT release the client ID.
section: 2.4.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
