document: rfc-6876
kind: interoperability-note
summary: The Trusted Computing Group (TCG) will replace its existing proprietary posture transport protocols with new versions that are equivalent to and interoperable with the NEA specifications (PT-TLS and PT-EAP), aiming for a single unified set of endpoint assessment standards.
