document: rfc-5580
kind: wire-format
summary: The Extended-Location-Policy-Rules Attribute (Type 130, length >= 3) carries a variable-length Ruleset Reference URI that SHOULD use the HTTPS URI scheme. Unlike RFC 4119, it contains only a reference to the ruleset, not an embedded XML policy, due to RADIUS size constraints.
section: "4.5"
