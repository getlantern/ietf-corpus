document: rfc-8253
kind: interoperability-note
summary: A PCEP speaker not supporting PCEPS that receives a StartTLS message before Open will respond with PCErr Error-Type 1 Error-value 1 and close the session per RFC 5440 error mechanisms. A PCEPS-capable speaker sending Error-Type 25 errors to non-PCEPS peers will not be understood by those peers.
section: "5"
topics:
