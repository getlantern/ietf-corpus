document: rfc-9752
kind: wire-format
summary: 'The PCRpt message format is extended by appending an optional vendor-info-list after the path element in each state-report. The vendor-info-list is defined as one or more VENDOR-INFORMATION objects: <state-report> ::= [<SRP>] <LSP> <path> [<vendor-info-list>], where <vendor-info-list> ::= <VENDOR-INFORMATION> [<vendor-info-list>].'
section: "2"
topics:
