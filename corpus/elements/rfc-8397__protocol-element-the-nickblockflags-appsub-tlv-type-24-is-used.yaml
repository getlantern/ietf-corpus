document: rfc-8397
kind: protocol-element
summary: The NickBlockFlags APPsub-TLV (Type 24) is used by border RBridges to advertise inclusive ranges of nicknames that are or are not available for self-allocation by Level 1 RBridges. It contains an OK flag bit, a RESV field, and one or more Nickname Blocks each specifying a starting and ending nickname.
section: "4.3"
topics:
    - routing
