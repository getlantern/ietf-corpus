document: rfc-7119
kind: normative-requirement
summary: When an Intermediate Process exports Data Records containing different Flow Keys from those received from the Original Exporter, and the Original Exporter sent a Flow Keys Options record, the IPFIX Mediator MUST export a Flow Keys Options record defining the new set of Flow Keys.
section: "10.2"
rfc2119_level: MUST
topics:
    - measurement
