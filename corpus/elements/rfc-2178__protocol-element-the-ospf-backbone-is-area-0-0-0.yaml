document: rfc-2178
kind: protocol-element
summary: The OSPF backbone is Area 0 (0.0.0.0). All area border routers must attach to the backbone. The backbone distributes routing information between non-backbone areas and must remain contiguous; virtual links can be used to repair a partitioned backbone.
section: "3.1"
topics:
    - routing
