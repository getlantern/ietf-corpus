document: rfc-9568
kind: interoperability-note
summary: VRRPv3 and VRRPv2 interoperation is optional and NOT RECOMMENDED for permanent deployments; it is intended only for transitional upgrade scenarios. An implementation MAY support a configuration flag to send and receive both VRRPv2 and VRRPv3 advertisements simultaneously.
section: "8.4"
topics:
    - routing
