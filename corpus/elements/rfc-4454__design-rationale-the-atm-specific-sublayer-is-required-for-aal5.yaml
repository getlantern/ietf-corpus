document: rfc-4454
kind: design-rationale
summary: The ATM-Specific Sublayer is REQUIRED for AAL5 SDU Mode (to carry T, G, C, U bits needed for EFCI/CLP/C-R transparency and OAM cell signaling) but is OPTIONAL for ATM Cell Mode (where sequencing support is the only reason to include it).
