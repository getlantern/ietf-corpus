document: rfc-5010
kind: design-rationale
summary: The motivation for this suboption is that when DHCP clients unicast DHCPREQUEST/RENEW packets to the relay, the server cannot independently determine whether the original packet was broadcast or unicast — information that may affect decisions such as whether to NAK a REBINDING client versus a RENEWING client.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
