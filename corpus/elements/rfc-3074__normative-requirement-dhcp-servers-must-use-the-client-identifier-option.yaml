document: rfc-3074
kind: normative-requirement
summary: DHCP servers MUST use the Client Identifier option as the STID if it is present. If no Client Identifier option is present, the hlen field MUST be used as the length of the data to be hashed, and the contents of the chaddr MUST be the data to be hashed.
section: "4"
rfc2119_level: MUST
topics:
    - dns
