document: rfc-7956
kind: interoperability-note
summary: Tenant Data Labels are independently allocated on each edge RBridge per routing domain with no campus-wide constraint; an edge RBridge may reuse an access Data Label or assign a distinct Data Label as its inter-subnet tenant Label. The ingress RBridge must use the label advertised by the specific egress RBridge.
section: "5.2"
topics:
    - routing
