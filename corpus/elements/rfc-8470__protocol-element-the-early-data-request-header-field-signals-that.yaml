document: rfc-8470
kind: protocol-element
summary: 'The Early-Data request header field signals that the request has been conveyed in early data and that the client understands the 425 (Too Early) status code. It has exactly one valid value: "1". User agents sending early-data requests do not need to include this header; it is intended for intermediaries.'
section: "5.1"
topics:
    - http
    - tls
