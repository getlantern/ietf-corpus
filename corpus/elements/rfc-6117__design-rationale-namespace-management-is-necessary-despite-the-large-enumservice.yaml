document: rfc-6117
kind: design-rationale
summary: Namespace management is necessary despite the large Enumservice namespace (up to 32 alphanumeric characters) to prevent hoarding/hijacking of meaningful Type strings, ensure interoperability by avoiding competing services for the same purpose, and bound DNS operational complexity.
