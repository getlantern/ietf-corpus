document: rfc-5263
kind: normative-requirement
summary: If the root element is <pidf-diff> and the received version is exactly one greater than the local counter, the watcher MUST apply the diff changes to its local copy and increment the local version counter by one.
section: "4.5"
rfc2119_level: MUST
