document: rfc-9460
kind: interoperability-note
summary: Clients supporting both Alt-Svc and HTTPS RRs SHOULD retrieve HTTPS records for each Alt-Svc alt-authority and ensure connection attempts are consistent with both sets of parameters. The HTTPS record's TargetName and port govern connection establishment per Section 3.
section: "9.3"
topics:
    - dns
    - http
