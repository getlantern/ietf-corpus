document: rfc-9741
kind: interoperability-note
summary: JSON has known interoperability problems (RFC 7493). Section 2 of RFC 7493 provides requirements that must be followed when using the .json control operator with CDDL's generic data model, particularly regarding numbers outside JSON's interoperable range.
section: "2.4"
topics:
