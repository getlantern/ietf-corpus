document: rfc-5116
kind: normative-requirement
summary: If a particular implementation is requested to process an input outside the range of admissible lengths, it MUST return an error code and MUST NOT output any other information. Partially encrypted or partially decrypted data MUST NOT be returned.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
