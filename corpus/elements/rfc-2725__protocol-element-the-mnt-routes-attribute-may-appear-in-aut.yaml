document: rfc-2725
kind: protocol-element
summary: The mnt-routes attribute may appear in aut-num, inetnum, or route objects and references a maintainer used for authorizing addition of route objects. It may optionally be constrained to a subset of more specific routes via a prefix list in curly braces or the keyword ANY.
section: "10.1"
