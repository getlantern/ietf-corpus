document: rfc-3489
kind: normative-requirement
summary: Clients SHOULD retransmit Binding Requests starting at 100 ms, doubling each interval until reaching 1600 ms, then retransmitting at 1600 ms intervals for a total of 9 transmissions; if no response is received 1600 ms after the final retransmission (9500 ms total), the transaction is considered failed.
section: "9.3"
rfc2119_level: SHOULD
topics:
    - nat
    - udp
