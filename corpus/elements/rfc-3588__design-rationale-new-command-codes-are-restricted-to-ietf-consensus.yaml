document: rfc-3588
kind: design-rationale
summary: New Command Codes are restricted to IETF Consensus to prevent proliferation; instead, application extensibility is achieved by adding non-mandatory AVPs to existing commands or by defining new mandatory AVPs within a new Application Identifier. A new application must define at least one new Command Code or add new mandatory AVPs to justify its Application Identifier allocation.
section: "1.2"
topics:
    - registry
    - security
