document: rfc-3207
kind: normative-requirement
summary: The server MUST discard knowledge obtained from the client before the TLS handshake (e.g., EHLO argument), and the client MUST discard knowledge obtained from the server (e.g., list of SMTP service extensions) that was not obtained from the TLS negotiation itself.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
