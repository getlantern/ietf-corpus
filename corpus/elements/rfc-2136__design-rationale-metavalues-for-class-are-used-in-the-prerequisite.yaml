document: rfc-2136
kind: design-rationale
summary: Metavalues for CLASS are used in the Prerequisite and Update Sections because all RRs in the packet are assumed to be in the same zone, and CLASS is an attribute of a zone rather than of an RRset. This is why the Zone Section is not optional.
section: "7.1"
topics:
    - dns
