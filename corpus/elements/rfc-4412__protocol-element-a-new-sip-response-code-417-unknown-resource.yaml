document: rfc-4412
kind: protocol-element
summary: A new SIP response code 417 (Unknown Resource-Priority) is defined, returned when an RP actor receives a request with the Require:resource-priority option tag but does not recognize any of the supplied namespaces. A 417 response MAY include an Accept-Resource-Priority header listing valid values.
section: 4.6.2
topics:
    - sip
    - realtime
