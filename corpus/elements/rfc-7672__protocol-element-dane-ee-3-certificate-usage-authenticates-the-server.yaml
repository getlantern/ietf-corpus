document: rfc-7672
kind: protocol-element
summary: DANE-EE(3) certificate usage authenticates the server by matching the leaf certificate directly against the TLSA record. No name checks or certificate expiry checks are performed; the binding of server public key to name is based entirely on the TLSA record secured by DNSSEC.
section: 3.1.1
topics:
