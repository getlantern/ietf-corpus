document: rfc-8601
kind: normative-requirement
summary: MUAs and downstream filters MUST ignore any result reported using a 'result' not in the IANA Result Code registry or a 'ptype' not in the Email Authentication Property Types registry, and MUST ignore results for methods they do not specifically support.
section: "4.1"
rfc2119_level: MUST
