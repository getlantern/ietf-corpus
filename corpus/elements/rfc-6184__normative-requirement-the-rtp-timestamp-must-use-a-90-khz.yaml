document: rfc-6184
kind: normative-requirement
summary: The RTP timestamp MUST use a 90 kHz clock rate. For NAL units without inherent timing (e.g., parameter sets, SEI NAL units), the RTP timestamp is set to the sampling timestamp of the primary coded picture of the access unit in which the NAL unit is included.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
