document: rfc-7459
kind: protocol-element
summary: The centroid of a region of uncertainty is used as the canonical point when reducing a location estimate to a single point. For regular shapes (Circle, Sphere, Ellipse, Ellipsoid) this is the center point; for Arc-Band and irregular Polygons/Prisms, explicit centroid formulas are defined.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
