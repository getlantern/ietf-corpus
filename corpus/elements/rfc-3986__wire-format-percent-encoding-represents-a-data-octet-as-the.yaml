document: rfc-3986
kind: wire-format
summary: Percent-encoding represents a data octet as the triplet pct-encoded = "%" HEXDIG HEXDIG; for example "%20" encodes the space character (SP). Uppercase hex digits A–F are equivalent to lowercase a–f.
