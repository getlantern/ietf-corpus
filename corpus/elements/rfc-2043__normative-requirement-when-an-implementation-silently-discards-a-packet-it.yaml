document: rfc-2043
kind: normative-requirement
summary: When an implementation silently discards a packet, it SHOULD provide the capability of logging the error including the contents of the discarded packet, and SHOULD record the event in a statistics counter.
section: "1.2"
rfc2119_level: SHOULD
