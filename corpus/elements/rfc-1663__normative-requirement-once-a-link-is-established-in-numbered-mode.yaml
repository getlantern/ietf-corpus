document: rfc-1663
kind: normative-requirement
summary: Once a link is established in Numbered-Mode, any re-negotiation of link configuration MUST be conducted entirely in Numbered-Mode. If Numbered-Mode is not successfully re-negotiated, the link reverts to Unnumbered-Information operation.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
