document: rfc-4850
kind: design-rationale
summary: The key was modeled after the HTTP 'Server' and 'User-Agent' header fields (RFC 2616 Sections 14.38 and 14.43), with text-values roughly equivalent to HTTP Product Tokens, because this pattern provides a well-understood mechanism for communicating implementation identity information.
