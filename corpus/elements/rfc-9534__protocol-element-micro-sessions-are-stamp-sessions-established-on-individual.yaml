document: rfc-9534
kind: protocol-element
summary: Micro sessions are STAMP sessions established on individual member links of a LAG, one session per member link, for the purpose of measuring per-link performance metrics. All micro sessions of a LAG share the same Sender IP Address and Receiver IP Address.
section: "2"
topics:
    - measurement
