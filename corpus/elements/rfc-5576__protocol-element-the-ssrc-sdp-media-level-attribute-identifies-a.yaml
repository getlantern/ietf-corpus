document: rfc-5576
kind: protocol-element
summary: The 'ssrc' SDP media-level attribute identifies a property (source-level attribute) of a specific RTP media source within an RTP session. The <ssrc-id> is the 32-bit unsigned SSRC identifier represented in decimal, followed by an attribute name and optional value.
