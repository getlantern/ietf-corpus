document: rfc-9279
kind: design-rationale
summary: IGMP and MLD implementations rarely change, so adoption of this extension mechanism is expected to be slow. Defining new extension TLVs should not be taken lightly; partial support by hosts or routers on the same link and dependencies between Extension Types must be carefully considered.
section: "6"
topics:
    - multicast
