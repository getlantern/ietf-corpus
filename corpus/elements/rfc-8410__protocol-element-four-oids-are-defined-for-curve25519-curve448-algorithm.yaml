summary: 'Four OIDs are defined for curve25519/curve448 algorithm identifiers: id-X25519 (1.3.101.110), id-X448 (1.3.101.111), id-Ed25519 (1.3.101.112), and id-Ed448 (1.3.101.113). The same OIDs identify public keys, private keys, and signatures for the EdDSA variants.'
