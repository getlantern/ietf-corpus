document: rfc-5519
kind: design-rationale
summary: RFC 5519 obsoletes both RFC 2933 (IGMP MIB) and RFC 3019 (MLD MIB) by introducing a single unified Multicast Group Membership Discovery (MGMD) MIB that provides a generic interface for both IGMP (IPv4) and MLD (IPv6) implementations, eliminating the need to maintain two separate MIB modules.
section: "1"
topics:
    - multicast
    - snmp
