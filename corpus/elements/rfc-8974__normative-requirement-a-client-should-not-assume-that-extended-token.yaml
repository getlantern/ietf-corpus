document: rfc-8974
kind: normative-requirement
summary: A client SHOULD NOT assume that extended token lengths are supported by a server for an unlimited duration. Unless additional information is available, address (and therefore token-length support) validity should be assumed for a minimum of 1800 s and a maximum of 86400 s.
section: 2.2.2
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
