document: rfc-2981
kind: design-rationale
summary: The Event MIB is based on extensive experience with RMON (RFC 1757) and provides a superset of RMON alarm and event group capabilities. The key extension is allowing alarms (called 'triggers') to monitor MIB objects on remote network elements, not just the local system.
section: "3"
topics:
