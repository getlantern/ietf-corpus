summary: 'An LSP Self-ping session is a short-lived, ingress-local state object comprising: a 64-bit Session-ID, a Retry Counter (max probe attempts, configurable), a Retry Timer (milliseconds between probes, configurable with optional back-off), and a boolean Status (initially FALSE, set TRUE on echo return).'
