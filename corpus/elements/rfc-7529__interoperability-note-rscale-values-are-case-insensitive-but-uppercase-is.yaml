document: rfc-7529
kind: interoperability-note
summary: RSCALE values are case insensitive, but uppercase is the preferred form. The underscore character '_' is never used in CLDR-based calendar system names. CLDR alias values may be used as RSCALE values and are treated equivalently to the calendar system they alias.
section: "5"
extracted_by: claude-sonnet-4-6
