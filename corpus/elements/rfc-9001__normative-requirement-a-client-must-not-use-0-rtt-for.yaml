document: rfc-9001
kind: normative-requirement
summary: A client MUST NOT use 0-RTT for application data unless specifically requested by the application in use. An application protocol using QUIC MUST include a profile that defines acceptable use of 0-RTT.
section: "5.6"
rfc2119_level: MUST NOT
topics:
