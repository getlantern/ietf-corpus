document: rfc-1413
kind: normative-requirement
summary: Queries are permitted only for fully specified connections. The local/foreign address pair is taken from the query connection itself, meaning a user on address A may only query a server on address B about connections between A and B.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
    - security
