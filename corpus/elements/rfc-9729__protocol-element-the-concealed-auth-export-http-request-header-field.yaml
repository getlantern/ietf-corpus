summary: The 'Concealed-Auth-Export' HTTP request header field carries the 48-byte key exporter output from frontend to backend as a Structured Field Byte Sequence (RFC 9651 Section 3.3.5), encoded in the non-URL-safe base64 variant, when the frontend and backend are separate servers.
