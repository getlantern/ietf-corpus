document: rfc-7541
kind: normative-requirement
summary: 'For Huffman-encoded strings: padding strictly longer than 7 bits MUST be treated as a decoding error; padding not corresponding to the MSBs of the EOS code MUST be treated as a decoding error; a Huffman-encoded string containing the EOS symbol MUST be treated as a decoding error.'
section: "5.2"
rfc2119_level: MUST
topics:
    - http
