document: rfc-2848
kind: security-consideration
summary: PINT service requests invoke real telephone calls at cost to the service provider; any entity able to send a PINT request can cause calls to be made. The protocol relies on the underlying SIP security mechanisms (authentication, encryption) to establish authority and prevent unauthorized invocation.
section: 5.1.2
topics:
    - security
    - realtime
    - sip
