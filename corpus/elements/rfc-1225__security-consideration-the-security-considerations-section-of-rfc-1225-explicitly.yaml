document: rfc-1225
kind: security-consideration
summary: 'The Security Considerations section of RFC 1225 explicitly states: ''Security issues are not discussed in this memo.'' The protocol transmits credentials (USER/PASS) and mail content in cleartext over TCP with no provision for encryption or integrity protection.'
section: Security Considerations
