document: rfc-9393
kind: security-consideration
summary: CoSWID tags SHOULD be signed to ensure integrity and authenticity. Section 7 defines signed CoSWID tag structure; unsigned tags cannot be trusted as authoritative records of software identity for security-sensitive use cases such as remote attestation or vulnerability assessment.
section: "7"
topics:
