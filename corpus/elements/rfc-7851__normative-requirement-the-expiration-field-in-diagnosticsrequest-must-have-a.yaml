document: rfc-7851
kind: normative-requirement
summary: The expiration field in DiagnosticsRequest MUST have a value between 1 and 600 seconds in the future. The ext_length field MUST NOT be negative. Kinds 0x0000 to 0x003f MUST NOT be indicated in the diagnostic_extensions_list as they are representable via dMFlags.
section: "5.1"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
