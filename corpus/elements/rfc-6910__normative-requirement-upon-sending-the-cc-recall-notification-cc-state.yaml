document: rfc-6910
kind: normative-requirement
summary: 'Upon sending the CC recall notification (cc-state: ready), the callee''s monitor MUST start a recall timer. The RECOMMENDED value is 10 to 20 seconds, matching the ETSI ETS 300.356-18 and ITU-T Q.733 recommendations for CC services.'
section: "7.3"
rfc2119_level: MUST
topics:
    - sip
    - voip
