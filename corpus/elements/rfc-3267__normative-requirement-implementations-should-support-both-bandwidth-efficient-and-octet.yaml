document: rfc-3267
kind: normative-requirement
summary: Implementations SHOULD support both bandwidth-efficient and octet-aligned mode for single channel to achieve basic interoperability. No operation mode is mandatory; interleaving, robust sorting, and frame-wise CRC are OPTIONAL.
