document: rfc-1783
kind: design-rationale
summary: The default 512-byte blocksize in TFTP is inefficient on LANs whose MTU may be 1500 bytes or greater. Negotiating a larger blocksize reduces the number of data and acknowledgment packets, decreasing total transfer time significantly.
section: Abstract
