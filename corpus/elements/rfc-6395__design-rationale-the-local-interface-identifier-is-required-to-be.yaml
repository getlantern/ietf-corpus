document: rfc-6395
kind: design-rationale
summary: The Local Interface Identifier is required to be non-zero because value 0 is reserved as a sentinel meaning 'no Interface Identifier referenced', consistent with the fact that 0 is not a valid ifIndex per RFC 2863.
