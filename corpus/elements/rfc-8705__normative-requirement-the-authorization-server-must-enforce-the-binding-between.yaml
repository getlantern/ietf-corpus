document: rfc-8705
kind: normative-requirement
summary: The authorization server MUST enforce the binding between client and certificate per Section 2.1 (PKI) or 2.2 (self-signed); if no certificate is presented or it doesn't match the expected one for the given client_id, the server returns an 'invalid_client' error.
section: "2"
rfc2119_level: MUST
topics:
    - oauth
    - tls
    - security
