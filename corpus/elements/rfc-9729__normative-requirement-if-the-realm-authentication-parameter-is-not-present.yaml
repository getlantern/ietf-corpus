document: rfc-9729
kind: normative-requirement
summary: If the realm authentication parameter is not present, the Realm field in the key exporter context SHALL be empty. A client not configured to use a specific realm SHALL use an empty realm and SHALL NOT send the realm authentication parameter.
section: "3.1"
rfc2119_level: SHALL NOT
topics:
