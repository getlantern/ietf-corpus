document: rfc-9214
kind: normative-requirement
summary: The initiator MUST NOT set the protocol field of Segment ID sub-TLV Type 35 and Type 36 to OSPF (value 1), as OSPFv2 is not compatible with IPv6 addresses indicated by these sub-TLVs.
section: "4"
rfc2119_level: MUST NOT
