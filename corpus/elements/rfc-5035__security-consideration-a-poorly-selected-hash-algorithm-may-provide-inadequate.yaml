document: rfc-5035
kind: security-consideration
summary: A poorly selected hash algorithm may provide inadequate protection against certificate substitution or result in denial of service. Selecting the same hash algorithm used for message signing ensures commensurate security and increases the likelihood the algorithm is supported for certificate identification.
section: "7"
