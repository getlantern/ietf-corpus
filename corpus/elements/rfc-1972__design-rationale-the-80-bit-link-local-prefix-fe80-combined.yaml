document: rfc-1972
kind: design-rationale
summary: 'The 80-bit link-local prefix FE80:: combined with a 48-bit Ethernet address (with 16 zero bits in between) was chosen to align the interface identifier directly at the end of the 128-bit address, simplifying address formation from the existing IEEE 802 identifier without requiring EUI-64 expansion (which was introduced in the successor RFC 2464).'
section: Stateless Autoconfiguration and Link-Local Addresses
topics:
    - ip
