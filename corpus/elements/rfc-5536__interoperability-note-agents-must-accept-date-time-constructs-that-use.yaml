document: rfc-5536
kind: interoperability-note
summary: Agents MUST accept date-time constructs that use the 'GMT' timezone zone even though it is part of RFC 5322 obsolete syntax, because its use is widespread in existing Netnews articles. Agents MUST NOT generate it.
section: 3.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
