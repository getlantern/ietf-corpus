document: rfc-5429
kind: normative-requirement
summary: A reject MDN MUST take the form of a failure MDN per [MDN]. MDNs MUST NOT be generated if MAIL FROM (or Return-Path) is empty. The MDN disposition-field MUST be 'deleted' with 'MDN-sent-automatically' and 'automatic-action' modes set.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
