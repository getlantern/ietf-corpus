document: rfc-8984
kind: normative-requirement
summary: Custom time zone identifiers in the timeZones map MUST start with '/' to avoid conflicts with IANA Time Zone Database names, and MUST be valid RFC 5545 paramtext values. At least one property in the JSCalendar object MUST reference each defined custom time zone (orphaned definitions are not allowed).
section: 4.7.2
rfc2119_level: MUST
topics:
    - json
