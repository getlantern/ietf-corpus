document: rfc-8685
kind: design-rationale
summary: Discovery of parent-child PCE relationships is intentionally excluded from scope. Advertising or querying PCE locations across domain or provider boundaries is considered undesirable for security, scaling, commercial, and confidentiality reasons; configuration is expected instead.
