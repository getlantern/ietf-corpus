document: rfc-4206
kind: normative-requirement
summary: If FAs are bundled via link bundling and the bundled link carries an SRLG TLV, the list of SRLGs in the underlying path followed by each FA-LSP forming component links MUST be the same (though exact paths need not be identical).
section: 3.1.10
rfc2119_level: MUST
topics:
