document: rfc-9343
kind: security-consideration
summary: An on-path attacker can modify the L/D flags or FlowMonID, insert or delete the AltMark Option, causing false loss/delay appearances or invalidating measurements. Mitigation requires deployment strictly within a controlled domain with boundary filtering of external packets carrying the AltMark Option.
section: "6"
topics:
    - ip
    - measurement
    - security
