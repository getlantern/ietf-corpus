document: rfc-3928
kind: interoperability-note
summary: The server MUST send a SearchResultReference when the LCUP Context changes during a search spanning multiple DIT sections. The client SHOULD maintain a cache mapping LDAP URLs to their corresponding cookies and SHOULD issue separate LCUP searches to follow references.
section: 6.3.1
topics:
    - ldap
