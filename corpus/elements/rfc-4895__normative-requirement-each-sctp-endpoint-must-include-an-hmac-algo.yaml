document: rfc-4895
kind: normative-requirement
summary: Each SCTP endpoint MUST include an HMAC-ALGO parameter in the INIT and INIT-ACK. The receiver SHOULD use the first listed algorithm it supports. An endpoint MUST NOT change the HMAC-ALGO parameters during the lifetime of the endpoint.
section: "6.1"
rfc2119_level: MUST
topics:
    - sctp
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
