document: rfc-6773
kind: normative-requirement
summary: A DCCP-UDP client SHOULD ensure each DCCP connection maps to a single DCCP-UDP connection by using a distinct UDP source port per DCCP connection, so that UDP-based flow identifiers differ whenever DCCP-based flow identifiers differ.
section: "3.8"
rfc2119_level: SHOULD
topics:
    - udp
    - nat
