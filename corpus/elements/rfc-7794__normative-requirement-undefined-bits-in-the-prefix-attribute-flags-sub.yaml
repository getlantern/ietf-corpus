document: rfc-7794
kind: normative-requirement
summary: Undefined bits in the Prefix Attribute Flags sub-TLV MUST be transmitted as 0 and MUST be ignored on receipt. Bits that are NOT transmitted MUST be treated as if set to 0 on receipt.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
