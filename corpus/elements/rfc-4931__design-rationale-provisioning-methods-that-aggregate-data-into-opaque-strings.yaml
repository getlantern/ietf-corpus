document: rfc-4931
kind: design-rationale
summary: Provisioning methods that aggregate data into opaque strings SHOULD NOT be used because they impose additional parsing, interpretation, and validation requirements on protocol processors. Separating discrete data elements by type allows XML Schema processors to perform basic syntax validation, reducing ambiguity.
section: "2.7"
rfc2119_level: SHOULD NOT
topics:
    - dns
