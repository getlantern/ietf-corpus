document: rfc-1572
kind: security-consideration
summary: Implementors must carefully analyze which environment variables are safe to set prior to client login/authentication. Permitting a variable to be changed that allows circumvention or compromise of the login/authentication program is explicitly called out as a dangerous implementation choice.
section: "7"
topics:
    - security
