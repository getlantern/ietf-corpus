document: rfc-7909
kind: protocol-element
summary: The digital signature associated with an RPSL object is stored as a new "signature" attribute consisting of mandatory and optional fields structured as name-value pairs separated by semicolons and whitespace. The "name" is a single ASCII character identifier; mandatory fields MUST appear exactly once, optional fields at most once.
section: "2.1"
topics:
