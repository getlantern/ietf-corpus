document: rfc-3748
kind: interoperability-note
summary: Within IEEE 802.1X it is not possible to negotiate non-EAP authentication mechanisms such as PAP or CHAP, because EAP over IEEE 802 does not involve PPP link or network layer negotiations. AAA protocols such as RADIUS (RFC 3579) and Diameter EAP only support pass-through authenticator operation; pass-through peer operation is unsupported.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
