document: rfc-7440
kind: protocol-element
summary: The '#blocks' field specifies the number of consecutive blocks in a window. Valid values MUST be between 1 and 65535 blocks inclusive. The windowsize refers to the number of consecutive blocks transmitted before stopping and waiting for acknowledgment of the last block transmitted.
