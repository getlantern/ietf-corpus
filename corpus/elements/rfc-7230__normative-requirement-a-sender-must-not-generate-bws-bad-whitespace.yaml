document: rfc-7230
kind: normative-requirement
summary: A sender MUST NOT generate BWS (bad whitespace) in messages; BWS is optional whitespace allowed only for historical reasons. A recipient MUST parse for such bad whitespace and remove it before interpreting the protocol element.
section: 3.2.3
rfc2119_level: MUST NOT
topics:
    - http
