document: rfc-5280
kind: security-consideration
summary: Name ambiguity arises when multiple distinct entities share the same distinguished name across different CAs. Relying parties MUST NOT assume that a DN uniquely identifies an entity across all CAs; policy and trust anchor context are required to correctly resolve identity.
section: "8"
topics:
