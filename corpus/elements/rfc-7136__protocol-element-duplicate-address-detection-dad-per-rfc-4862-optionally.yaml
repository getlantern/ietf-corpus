document: rfc-7136
kind: protocol-element
summary: Duplicate Address Detection (DAD) per RFC 4862, optionally extended via a DAD proxy (RFC 6957) or Neighbor Discovery Optimization (RFC 6775), is the primary mechanism for detecting IID collisions on a link. Because DAD is mandatory for all nodes, virtually all IID collisions will be detected regardless of the 'u' bit's value.
section: "4"
topics:
