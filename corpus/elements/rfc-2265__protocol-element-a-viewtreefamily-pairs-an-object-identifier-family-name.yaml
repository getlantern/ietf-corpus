document: rfc-2265
kind: protocol-element
summary: A ViewTreeFamily pairs an OBJECT IDENTIFIER (family name) with a bitmask (family mask). An OID belongs to the family if it has at least as many sub-identifiers as the family name and each sub-identifier matches where the corresponding mask bit is 1; mask bit 0 is a wildcard.
section: 2.4.2
