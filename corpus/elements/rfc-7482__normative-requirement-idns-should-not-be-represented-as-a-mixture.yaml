document: rfc-7482
kind: normative-requirement
summary: IDNs SHOULD NOT be represented as a mixture of A-labels and U-labels in domain queries; all internationalized labels in an IDN SHOULD be either all A-labels or all U-labels to avoid ambiguity when assembling queries from multiple data sources.
section: 3.1.3
rfc2119_level: SHOULD NOT
topics:
    - dns
    - http
