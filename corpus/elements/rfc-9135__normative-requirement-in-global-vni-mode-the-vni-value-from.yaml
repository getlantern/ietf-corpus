document: rfc-9135
kind: normative-requirement
summary: In global VNI mode, the VNI value from received Label2 MUST be the same as the locally configured VNI for the IP-VRF; if they do not match, the route MUST NOT be used and an error message SHOULD be logged.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
