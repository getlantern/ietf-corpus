document: rfc-3173
kind: interoperability-note
summary: IPCAs become non-unique when two or more IPComp sessions are established between two nodes using the same well-known CPI. To ensure uniqueness when multiple IPCAs use the same algorithm, CPIs SHOULD be in the negotiated range (256-61439).
section: "4.1"
topics:
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
