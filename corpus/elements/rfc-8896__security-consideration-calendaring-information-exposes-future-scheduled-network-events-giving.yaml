document: rfc-8896
kind: security-consideration
summary: Calendaring information exposes future scheduled network events, giving a malicious Client foreknowledge to generate massive connections precisely when network load is expected to be high, potentially orchestrating a DDoS attack. Operators should deploy monitoring systems to detect abnormal behavior in addition to standard ALTO authentication and TLS.
section: "7"
topics:
