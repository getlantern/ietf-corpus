document: rfc-2287
kind: protocol-element
summary: The sysApplRunTable records each active invocation of an application, indexed by sysApplInstallPkgIndex and sysApplRunIndex, with columns for start time (DateAndTime) and current RunState. An entry is created when the primary executable is detected running and deleted when the application terminates, at which point a corresponding entry is created in sysApplPastRunTable.
section: 5.2.1
topics:
    - snmp
