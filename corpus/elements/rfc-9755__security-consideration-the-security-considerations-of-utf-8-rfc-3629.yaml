document: rfc-9755
kind: security-consideration
summary: The security considerations of UTF-8 (RFC 3629) and PRECIS Usernames and Passwords (RFC 8265) apply, particularly for UTF-8 in usernames and passwords. Mixed-client access scenarios—where one client supports UTF8=ACCEPT and another does not—create additional security-relevant complexity discussed in Section 8.
section: "11"
topics:
