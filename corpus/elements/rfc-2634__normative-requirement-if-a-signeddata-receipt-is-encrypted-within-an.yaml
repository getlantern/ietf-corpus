document: rfc-2634
kind: normative-requirement
summary: If a signedData/Receipt is encrypted within an envelopedData, an outer signedData MUST encapsulate the envelopedData and a contentHints attribute with contentType set to id-ct-receipt MUST be included in the outer signedData SignerInfo signedAttributes.
section: "2.4"
rfc2119_level: MUST
topics:
