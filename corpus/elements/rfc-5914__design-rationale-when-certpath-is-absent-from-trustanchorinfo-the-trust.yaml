document: rfc-5914
kind: design-rationale
summary: When certPath is absent from TrustAnchorInfo, the trust anchor cannot be used to validate the signature on an X.509 certificate. This allows trust anchors to be defined for purposes other than X.509 path validation.
section: "2.5"
topics:
