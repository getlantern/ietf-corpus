document: rfc-9354
kind: security-consideration
summary: Due to the high accessibility of power grids, PLC is susceptible to eavesdropping. Link-layer security mechanisms including payload encryption and device authentication are required. An on-path malicious PLC device could eavesdrop or modify packets without confidentiality and integrity mechanisms.
section: "8"
topics:
