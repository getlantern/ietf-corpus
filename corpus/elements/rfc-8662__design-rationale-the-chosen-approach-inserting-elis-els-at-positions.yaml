document: rfc-8662
kind: design-rationale
summary: The chosen approach — inserting ELIs/ELs at positions within the readable label stack depths of LSRs along the path (Section 7) — was selected because it balances the number of pushed labels against load-balancing entropy, accommodates varying ERLD values, and avoids requiring hardware changes. Multiple ELI/EL pairs may be needed when ERLD values differ across the path.
section: "10.5"
