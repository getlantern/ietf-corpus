document: rfc-9110
kind: privacy-consideration
summary: URIs must not carry sensitive information such as session tokens or personal data because they appear in Referer headers, server logs, and browser history. The Referer field discloses the URI of the referring page to the target server, potentially leaking sensitive data embedded in the originating URI.
section: "17.9"
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
