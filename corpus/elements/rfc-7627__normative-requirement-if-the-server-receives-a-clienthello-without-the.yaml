document: rfc-7627
kind: normative-requirement
summary: If the server receives a ClientHello without the extension, it SHOULD abort the handshake if it does not wish to interoperate with legacy clients. If it continues the handshake, it MUST NOT include the extension in the ServerHello.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - tls
