document: rfc-8972
kind: protocol-element
summary: The HMAC TLV (Type 8, Length=16) carries a 16-octet HMAC digest computed using HMAC-SHA-256 truncated to 128 bits over the concatenation of the base STAMP packet's Sequence Number field and all preceding TLVs. It MUST follow all TLVs except Extra Padding TLV.
