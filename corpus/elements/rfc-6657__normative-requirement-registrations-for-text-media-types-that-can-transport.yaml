document: rfc-6657
kind: normative-requirement
summary: Registrations for 'text/*' media types that can transport charset information inside their payloads (e.g., 'text/html', 'text/xml') SHOULD NOT specify the use of a 'charset' parameter or any default value, to avoid conflicting interpretations when the parameter value and the in-payload value disagree.
section: "3"
rfc2119_level: SHOULD NOT
topics:
