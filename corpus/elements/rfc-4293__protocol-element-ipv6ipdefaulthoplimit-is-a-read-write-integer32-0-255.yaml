document: rfc-4293
kind: protocol-element
summary: ipv6IpDefaultHopLimit is a read-write Integer32 (0..255) specifying the default Hop Limit for IPv6 datagrams when the transport layer does not supply one, per RFC 2461 Section 6.3.2. Entities SHOULD persist changes to non-volatile storage.
