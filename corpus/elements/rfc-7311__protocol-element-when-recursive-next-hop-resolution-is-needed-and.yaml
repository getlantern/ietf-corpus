document: rfc-7311
kind: protocol-element
summary: 'When recursive next-hop resolution is needed and R1 changes the next hop, the AIGP TLV value is computed via an iterative procedure: starting from the received value A, accumulate AIGP TLV values along the recursive chain until a non-recursive next hop is reached, then add the IGP distance to that hop.'
section: 3.4.3
topics:
    - bgp
    - routing
