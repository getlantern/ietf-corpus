document: rfc-7796
kind: wire-format
summary: 'The E-Tree LDP Interface Parameter Sub-TLV (type 0x1A, length 8 octets) carries: a Reserved field (must be zero), a P bit (leaf-only flag), a V bit (VLAN mapping capability), 4-bit MBZ fields, a 12-bit Root VLAN ID, and a 12-bit Leaf VLAN ID.'
