document: rfc-7442
kind: design-rationale
summary: Each IP multicast tree is mapped one-to-one to a P2MP LSP in the MPLS network. This works well when the number of LSPs is under operator control or known to be limited; aggregating multiple trees onto one LSP (as BGP MVPN procedures allow) is out of scope.
section: "1"
topics:
    - mpls
    - multicast
