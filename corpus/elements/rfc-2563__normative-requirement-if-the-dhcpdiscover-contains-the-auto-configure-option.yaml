document: rfc-2563
kind: normative-requirement
summary: If the DHCPDISCOVER contains the Auto-Configure option and the site administrator has disabled auto-configuration for that subnet or client, the server MUST send a DHCPOFFER with 'yiaddr' of 0x00000000 and Auto-Configure set to DoNotAutoConfigure.
section: "2.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
