document: rfc-2263
kind: protocol-element
summary: 'A ''Management Target'' specifies where and how to send an SNMP message. It consists of two components: destination information (transport domain and transport address, i.e., a transport endpoint) and SNMP parameters (message processing model, security model, security level, and security name). The SNMP-TARGET-MIB provides two tables for these two kinds of information.'
