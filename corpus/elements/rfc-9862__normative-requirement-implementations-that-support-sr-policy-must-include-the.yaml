document: rfc-9862
kind: normative-requirement
summary: Implementations that support SR Policy MUST include the SRPOLICY-CAPABILITY TLV in the OPEN object. If a PCEP speaker receives an SRPA but the SRPOLICY-CAPABILITY TLV was not exchanged, the speaker MUST send PCErr Error-Type=10 Error-value=44 and MUST close the PCEP session.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
