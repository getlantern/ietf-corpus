document: rfc-9524
kind: normative-requirement
summary: The source of an OAM ping to a leaf or bud node via a transit replication node's Replication-SID MUST compute the ICMPv6 Echo Request checksum using the Replication-SID of the target leaf or bud node as the DA, not the transit node's SID.
section: 2.2.2
rfc2119_level: MUST
topics:
    - routing
    - ip
