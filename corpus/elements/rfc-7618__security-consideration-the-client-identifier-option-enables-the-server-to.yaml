document: rfc-7618
kind: security-consideration
summary: The client identifier option enables the server to track the client over time, creating a privacy trade-off between stable parameter allocation and anonymity. Clients can manage exposure by controlling the client identifier value; further guidance is deferred to the DHCP anonymity profile work.
