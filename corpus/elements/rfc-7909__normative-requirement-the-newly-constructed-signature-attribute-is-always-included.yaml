document: rfc-7909
kind: normative-requirement
summary: The newly constructed "signature" attribute is always included in the list of signed attributes. The signature under construction MUST NOT include signature attributes already present in the object (i.e., only one signature at a time is created).
section: "4"
rfc2119_level: MUST NOT
topics:
