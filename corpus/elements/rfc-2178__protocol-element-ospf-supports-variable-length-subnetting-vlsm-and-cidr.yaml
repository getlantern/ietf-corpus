document: rfc-2178
kind: protocol-element
summary: OSPF supports variable-length subnetting (VLSM) and CIDR by attaching an IP address mask to every advertised route. Forwarding always uses the longest (most specific) matching prefix. Host routes are advertised with mask 0xffffffff.
section: "3.5"
