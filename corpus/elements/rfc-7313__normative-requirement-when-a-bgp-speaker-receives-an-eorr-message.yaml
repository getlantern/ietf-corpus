document: rfc-7313
kind: normative-requirement
summary: When a BGP speaker receives an EoRR message, it MUST immediately remove any routes from that peer still marked as stale for the given <AFI, SAFI>. Purged routes MAY be logged for future analysis.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
