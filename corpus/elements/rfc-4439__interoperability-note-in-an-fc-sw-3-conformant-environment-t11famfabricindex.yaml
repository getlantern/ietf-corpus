document: rfc-4439
kind: interoperability-note
summary: In an FC-SW-3-conformant environment, t11FamFabricIndex is always 1 because only a single Fabric operates within a physical infrastructure. The same MIB structure supports FC-SW-4 multi-Virtual-Fabric environments by allowing other index values (0..4095).
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
