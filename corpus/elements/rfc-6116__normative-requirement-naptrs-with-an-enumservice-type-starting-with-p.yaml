document: rfc-6116
kind: normative-requirement
summary: NAPTRs with an Enumservice type starting with 'P-' MUST NOT be provisioned in any system that provides answers to DNS queries for NAPTR RRSets from entities outside the intended private network context. ENUM clients MUST discard any such NAPTR unless sure they are on the intended private network.
section: 3.4.3.1
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
