document: rfc-8400
kind: normative-requirement
summary: For facility protection, the PLR records that the backup LSP is used to protect the primary LSP and MUST include an SERO object in the Path message for the primary LSP; the object MUST contain the backup LSP ID.
section: 5.4.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
