document: rfc-5943
kind: protocol-element
summary: The 'ping-hdl' attribute is an optional, multi-valued member of the RPSL route and route6 objects. Its value is a NIC handle that provides a link to contact information for an entity capable of responding to queries about the specified pingable IP address.
