document: rfc-7775
kind: protocol-element
summary: 'Route preference order for IPv6 (TLVs 236/237): (1) L1 intra-area and L1 external; (2) L2 intra-area, L2 external, L1->L2 inter-area, L1->L2 external, L2->L2 inter-area; (3) L2->L1 inter-area, L2->L1 external, L1->L1 inter-area. This differs from RFC 5308 by eliminating the ''Level 2 down prefix'' preference category.'
section: "3.4"
topics:
    - routing
    - ip
    - v6ops
