document: rfc-2389
kind: normative-requirement
summary: Servers that recognize FEAT but have no extended features to report SHOULD respond with the "no-features" 211 reply, though a 500 or 502 reply MAY also be used since the cases are practically indistinguishable.
section: "3.2"
rfc2119_level: SHOULD
