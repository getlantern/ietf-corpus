document: rfc-7232
kind: design-rationale
summary: Conditional GET requests are the most efficient mechanism for HTTP cache updates. Conditionals can also be applied to state-changing methods such as PUT and DELETE to prevent the 'lost update' problem, where one client accidentally overwrites the work of another acting in parallel.
section: "1"
topics:
