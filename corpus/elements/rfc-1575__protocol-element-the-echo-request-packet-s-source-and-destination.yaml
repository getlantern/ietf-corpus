document: rfc-1575
kind: protocol-element
summary: The echo-request packet's source and destination address fields contain Network Entity Titles (NETs) rather than full NSAP addresses. A NET is syntactically indistinguishable from an NSAP address, and the additional NSAP information is irrelevant to echo-request processing since no N-UNITDATA indication is produced.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
