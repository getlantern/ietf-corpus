document: rfc-4348
kind: normative-requirement
summary: If ILP is found greater than ILL in a received payload, the payload SHOULD be discarded. ILL and ILP fields MUST be present in every packet in a session if interleaving is signaled for the session.
section: 6.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
