document: rfc-6871
kind: normative-requirement
summary: When a range of capability numbers is specified in 'rmcap', 'omcap', or 'mscap', the first (leftmost) capability number MUST be strictly smaller than the second (rightmost), i.e., the range must increase and cover at least two numbers. Leading zeroes are not permitted in any media capability number.
section: 3.3.1
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
