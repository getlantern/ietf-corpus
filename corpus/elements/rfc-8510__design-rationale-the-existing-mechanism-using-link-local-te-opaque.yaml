document: rfc-8510
kind: design-rationale
summary: 'The existing mechanism using Link Local TE Opaque LSA to communicate Local Interface IDs has two key drawbacks: LSAs can only be flooded over adjacencies in Exchange state or greater, meaning a link may be initially advertised without a Remote Interface ID; and the TE Opaque LSA is MPLS TE-specific, making it unnecessarily scoped for non-TE use cases.'
section: "1.1"
topics:
    - routing
    - mpls
