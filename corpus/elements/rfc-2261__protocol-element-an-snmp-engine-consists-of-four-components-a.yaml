document: rfc-2261
kind: protocol-element
summary: 'An SNMP engine consists of four components: a Dispatcher, a Message Processing Subsystem, a Security Subsystem, and an Access Control Subsystem. There is a one-to-one association between an SNMP engine and the SNMP entity containing it. The engine provides services for sending/receiving messages, authenticating/encrypting messages, and controlling access to managed objects.'
section: 3.1.1
topics:
    - snmp
