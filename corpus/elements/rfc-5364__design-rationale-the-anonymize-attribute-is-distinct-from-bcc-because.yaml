document: rfc-5364
kind: design-rationale
summary: The 'anonymize' attribute is distinct from 'bcc' because bcc recipients are completely hidden (recipients don't know they exist), whereas anonymized URIs are replaced with a placeholder in the recipient-history list so that recipients know additional parties received the request but their identities are not disclosed. This provides transparency about the count of recipients without revealing their URIs.
section: "3"
topics:
