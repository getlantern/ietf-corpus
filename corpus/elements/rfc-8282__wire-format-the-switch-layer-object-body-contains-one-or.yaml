document: rfc-8282
kind: wire-format
summary: The SWITCH-LAYER object body contains one or more 32-bit rows, each with LSP Encoding Type (8 bits), Switching Type (8 bits), Reserved (15 bits), and I flag (1 bit). When I=1, the path MUST traverse a layer with that switching/encoding type; when I=0, the path MUST NOT enter or traverse any layer with that combination.
section: "3.2"
topics:
    - routing
    - mpls
