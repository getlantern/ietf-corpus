document: rfc-2021
kind: protocol-element
summary: The LastCreateTime textual convention (syntax TimeStamp) stores the sysUpTime value when an entry was last created or re-created. Management stations use it to detect entry deletion and re-creation between polls, which would otherwise cause an undetectable data discontinuity.
