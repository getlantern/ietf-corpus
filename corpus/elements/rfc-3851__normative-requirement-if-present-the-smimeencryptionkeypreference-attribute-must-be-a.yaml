document: rfc-3851
kind: normative-requirement
summary: If present, the SMIMEEncryptionKeyPreference attribute MUST be a SignedAttribute and MUST NOT be an UnsignedAttribute. A signerInfo MUST NOT include multiple instances, and there MUST be exactly one AttributeValue.
section: 2.5.3
rfc2119_level: MUST
