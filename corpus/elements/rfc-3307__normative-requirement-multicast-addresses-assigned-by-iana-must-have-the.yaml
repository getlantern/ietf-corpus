document: rfc-3307
kind: normative-requirement
summary: Multicast addresses assigned by IANA MUST have the T bit set to 0 and the P bit set to 0. These are permanent addresses allocated with group IDs in the range 0x00000001 to 0x3FFFFFFF on an Expert Review basis.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - registry
