document: rfc-4588
kind: protocol-element
summary: OSN (Original Sequence Number) is a 16-bit field occupying the first 2 octets of the retransmission payload header. It MUST be set to the RTP sequence number of the associated original packet, enabling the receiver to identify and reconstruct the original packet sequence.
section: "4"
topics:
    - rtp
    - realtime
