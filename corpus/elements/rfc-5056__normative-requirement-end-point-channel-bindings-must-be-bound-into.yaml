document: rfc-5056
kind: normative-requirement
summary: End-point channel bindings MUST be bound into the secure channel and all its negotiations, including the initial key exchange and negotiation messages. When end-point channel bindings are identifiers requiring infrastructure authentication (e.g., PKI), applications MUST ensure the channel provides adequate authentication of such identifiers. Applications SHOULD prefer cryptographic quantities (e.g., certificate-subject public keys) as end-point channel bindings.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
