document: rfc-6710
kind: normative-requirement
summary: If any associated esmtp-value for MT-PRIORITY is syntactically invalid, or if more than one MT-PRIORITY parameter appears in a MAIL FROM command, the server MUST return an error such as '501 syntax error in parameter' with Enhanced Status Code 5.5.2.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
