document: rfc-9956
kind: interoperability-note
summary: 'This document updates RFC 8325 by adding ''Non-Queue-Building'' traffic to Section 4.2.9 and inserting a new row in the DSCP-to-802.11 mapping table: NQB (RFC 9956) maps to UP 0 or 3 in AC_BE (Best Effort), or UP 5 in AC_VI (Video) if a separate AC_BE queue cannot be provided.'
section: 7.3.2
