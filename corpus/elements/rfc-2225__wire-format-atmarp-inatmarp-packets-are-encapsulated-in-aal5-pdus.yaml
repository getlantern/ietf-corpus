document: rfc-2225
kind: wire-format
summary: 'ATMARP/InATMARP packets are encapsulated in AAL5 PDUs using LLC/SNAP: LLC 0xAA-AA-03 (3 octets), OUI 0x00-00-00 (3 octets), EtherType 0x08-06 (2 octets), yielding an 8-octet fixed LLC/SNAP header that aligns the ATMARP packet on a 64-bit boundary.'
