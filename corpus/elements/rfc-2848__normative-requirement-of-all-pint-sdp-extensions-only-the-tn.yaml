document: rfc-2848
kind: normative-requirement
summary: Of all PINT SDP extensions, only the TN network type (with its RFC2543 address type) and the 'require' attribute MUST be supported by PINT 1.0 clients and servers. All other constructs are optional unless the client/server wishes to enable the associated function.
section: "3.3"
rfc2119_level: MUST
topics:
