document: rfc-6166
kind: registry
summary: Initial registry content assigns types 0–10 to named PIM messages (Hello, Register, Register Stop, Join/Prune, Bootstrap, Assert, Graft, Graft-Ack, Candidate RP Advertisement, State Refresh, DF Election), leaves 11–14 unassigned, and reserves type 15 for future extension of the type space.
