document: rfc-5880
kind: normative-requirement
summary: Implementations supporting authentication MUST support both Keyed SHA1 and Meticulous Keyed SHA1 authentication. Simple Password, Keyed MD5, and Meticulous Keyed MD5 are optional. The use of MD5-based authentication is strongly discouraged.
section: "6.7"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
