document: rfc-6086
kind: normative-requirement
summary: Any new INFO usage MUST use the Info Package mechanism defined in RFC 6086. UAs SHALL NOT mix legacy INFO usages and Info Package usages to transport the same application-level information; if possible, UAs SHALL prefer an Info Package.
section: "3"
rfc2119_level: MUST
topics:
