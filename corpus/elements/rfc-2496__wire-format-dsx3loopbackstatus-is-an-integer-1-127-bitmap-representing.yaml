summary: 'dsx3LoopbackStatus is an INTEGER (1..127) bitmap representing currently active loopbacks and their sources. Bit positions: 1=NoLoopback, 2=NearEndPayloadLoopback, 4=NearEndLineLoopback, 8=NearEndOtherLoopback, 16=NearEndInwardLoopback, 32=FarEndPayloadLoopback, 64=FarEndLineLoopback.'
