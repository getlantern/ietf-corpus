document: rfc-5329
kind: protocol-element
summary: 'The Remote Interface IPv6 Address sub-TLV (type 20) advertises the neighbor''s interface IPv6 address(es) and is used together with the Local Interface IPv6 Address sub-TLV to distinguish parallel links. For multi-access links, the value MAY be set to :: or the sub-TLV may be omitted.'
section: "4.4"
topics:
