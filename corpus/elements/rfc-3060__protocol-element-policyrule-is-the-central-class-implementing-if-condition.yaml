document: rfc-3060
kind: protocol-element
summary: PolicyRule is the central class implementing 'If Condition then Action' semantics. Its key properties are Enabled (enabled/disabled/enabledForDebug), ConditionListType (DNF/CNF), Priority (uint16, higher value = higher priority), Mandatory (boolean), SequencedActions (mandatory/recommended/dontCare), and PolicyRoles (multi-valued string).
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
