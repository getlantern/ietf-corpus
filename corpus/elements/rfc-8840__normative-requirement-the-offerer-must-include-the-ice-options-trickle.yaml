document: rfc-8840
kind: normative-requirement
summary: The Offerer MUST include the 'ice-options:trickle' attribute and MUST include a 'mid' attribute in each 'm=' line of the initial Offer. If sending an Offer before knowing candidates for a media description, the port MUST be set to the default value '9'.
section: 4.1.1
rfc2119_level: MUST
topics:
