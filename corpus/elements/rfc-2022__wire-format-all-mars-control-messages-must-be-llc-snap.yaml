document: rfc-2022
kind: wire-format
summary: All MARS control messages MUST be LLC/SNAP encapsulated using codepoints [0xAA-AA-03][0x00-00-5E][0x00-03] followed by the MARS control message, where 0x00-00-5E is the IANA OUI and 0x00-03 is the PID. This codepoint differs from ATMARP, allowing co-residency on the same VC.
section: "4.2"
topics:
    - multicast
