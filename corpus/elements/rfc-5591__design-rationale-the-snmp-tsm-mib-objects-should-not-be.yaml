document: rfc-5591
kind: design-rationale
summary: The SNMP-TSM-MIB objects SHOULD NOT be modified via other subsystems or models defined in other documents, following the RFC 3411 design principle of self-contained, independently evolvable modules. This allows TSM to move along the standards track on a different timeline from other SNMP modules.
section: "1.3"
topics:
    - security
    - process
