document: rfc-3643
kind: interoperability-note
summary: Both Fibre Channel and IETF standards use the same byte transmission order, but the bit and byte numbering conventions differ. Implementors must apply the guidance in Appendix A (using FC's descending bit numbering vs. IETF's ascending) to correctly map header fields between the two numbering systems.
section: "1"
