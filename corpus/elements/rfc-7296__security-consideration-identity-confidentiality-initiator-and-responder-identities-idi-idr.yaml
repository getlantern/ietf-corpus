document: rfc-7296
kind: security-consideration
summary: 'Identity confidentiality: initiator and responder identities (IDi, IDr) are carried inside the IKE_AUTH exchange, which is encrypted under keys derived from IKE_SA_INIT, hiding them from passive eavesdroppers. A man-in-the-middle who intercepts IKE_SA_INIT but cannot complete IKE_AUTH can still see the initiator''s identity.'
section: "1.2"
topics:
    - ipsec
    - vpn
    - security
    - privacy
