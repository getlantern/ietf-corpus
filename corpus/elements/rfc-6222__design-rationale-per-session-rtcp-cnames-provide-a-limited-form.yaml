document: rfc-6222
kind: design-rationale
summary: Per-session RTCP CNAMEs provide a limited form of privacy by preventing traffic analysis that correlates separate RTP sessions, at the cost of preventing legitimate third-party monitoring (e.g., network management tools correlating QoS across sessions). Implementations that wish to discourage monitoring should generate a unique CNAME per session.
section: "4.1"
topics:
    - rtp
    - realtime
    - privacy
