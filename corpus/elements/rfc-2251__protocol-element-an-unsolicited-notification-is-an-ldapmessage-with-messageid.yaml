document: rfc-2251
kind: protocol-element
summary: An unsolicited notification is an LDAPMessage with messageID 0 and protocolOp of extendedResp form, sent by the server without a corresponding client request. The Notice of Disconnection uses OID 1.3.6.1.4.1.1466.20036 and signals imminent connection close with resultCode protocolError, strongAuthRequired, or unavailable.
section: 4.4.1
topics:
