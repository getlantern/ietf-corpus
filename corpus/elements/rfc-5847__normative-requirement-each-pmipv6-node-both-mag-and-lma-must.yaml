document: rfc-5847
kind: normative-requirement
summary: Each PMIPv6 node (both MAG and LMA) MUST maintain a monotonically increasing Restart Counter that is incremented every time the node reboots and loses PMIPv6 session state. This counter MUST be treated as state preserved across reboots.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
