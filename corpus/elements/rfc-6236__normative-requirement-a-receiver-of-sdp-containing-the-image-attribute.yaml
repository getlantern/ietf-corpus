document: rfc-6236
kind: normative-requirement
summary: A receiver of SDP containing the image attribute MUST ensure that the parameters have values that are reasonable and that the device can handle the implications in terms of memory and CPU usage. Failure to sanity-check parameters may result in memory or CPU exhaustion.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - realtime
