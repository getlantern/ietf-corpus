document: rfc-2058
kind: design-rationale
summary: User-Password is encrypted using a chained MD5-XOR scheme rather than transmitted in cleartext or with a symmetric cipher, so the shared secret is never exposed on the wire. The chain links each 16-octet block to the previous ciphertext block (not to RA), preventing an attacker who knows one block from decrypting others without the secret.
section: "5.2"
topics:
    - radius
    - crypto
    - security
