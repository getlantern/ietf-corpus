document: rfc-1294
kind: normative-requirement
summary: IP data shall be encapsulated using the NLPID value of 0xCC (option 1 in section 11), not the SNAP form. This is more efficient (48 fewer bits) and consistent with IP encapsulation in X.25.
section: "11"
rfc2119_level: MUST
topics:
    - ip
