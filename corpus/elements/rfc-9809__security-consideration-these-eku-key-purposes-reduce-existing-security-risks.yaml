document: rfc-9809
kind: security-consideration
summary: These EKU key purposes reduce existing security risks by providing means to identify if a certificate is scoped to a specific purpose, thereby mitigating cross-application attacks that could occur if a certificate with no EKU or broad EKU (e.g., id-kp-codeSigning) were accepted for trust anchor configuration or safety-critical communication.
section: "6"
topics:
