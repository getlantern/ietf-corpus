document: rfc-9341
kind: normative-requirement
summary: The flow-based measurement strategy is REQUIRED when implementing this specification. It requires identifying the flow to be monitored and discovering the path it follows; measurement is consistent only if all flows in a group follow the same path.
section: "3.1"
rfc2119_level: REQUIRED
