document: rfc-4211
kind: normative-requirement
summary: The publicKey field in CertTemplate MUST be filled in if the requestor generates its own key; the field is omitted if the key is generated by the RA/CA. If validity is not omitted, at least one of notBefore/notAfter MUST be specified.
section: "5"
rfc2119_level: MUST
topics:
