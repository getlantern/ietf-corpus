document: rfc-3156
kind: normative-requirement
summary: 'When generating an OpenPGP digital signature: (1) data MUST first be converted to canonical form; (2) Content-Transfer-Encoding applied with <CR><LF> line endings; (3) MIME content headers added; (4) trailing whitespace MUST be removed; (5) signature MUST be calculated over both data and its content headers.'
section: "5"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
