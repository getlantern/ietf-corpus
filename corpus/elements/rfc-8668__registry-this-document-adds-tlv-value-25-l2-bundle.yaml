document: rfc-8668
kind: registry
summary: This document adds TLV value 25 (L2 Bundle Member Attributes) to the IS-IS TLV Codepoints Registry. The registry for Sub-TLVs for TLVs 22, 23, 141, 222, and 223 is renamed to also include TLV 25, and a new column is added indicating whether each existing sub-TLV may appear in TLV 25 (y = not shared, y(s) = shareable, n = prohibited).
section: "5"
topics:
