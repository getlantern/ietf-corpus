document: rfc-8666
kind: design-rationale
summary: 'The OSPFv3 Extended Prefix Range TLV was defined to optimize Mapping Server advertisements: rather than advertising individual Prefix-SIDs for each prefix, a single TLV covers a contiguous range with a starting SID value, significantly reducing LSA size and flooding overhead.'
