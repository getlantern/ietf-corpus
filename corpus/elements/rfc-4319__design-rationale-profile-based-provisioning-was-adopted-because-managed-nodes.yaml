document: rfc-4319
kind: design-rationale
summary: Profile-based provisioning was adopted because managed nodes can handle hundreds or thousands of lines and most are provisioned identically. Profiles allow a single parameter set to be shared across multiple lines; individual endpoints can override the span-level profile as needed.
section: "2.7"
