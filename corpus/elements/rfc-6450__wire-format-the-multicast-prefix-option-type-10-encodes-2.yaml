document: rfc-6450
kind: wire-format
summary: 'The Multicast Prefix option (type 10) encodes: 2-octet Address Family, 1-octet Prefix Length, and a partial group address covering exactly the prefix length bits. Prefix length 0 is a wildcard (any multicast address from that family). Option value length is 3 for wildcard, 4–7 for IPv4, and 4–19 for IPv6.'
section: "3.2"
topics:
    - multicast
    - ip
