document: rfc-5088
kind: normative-requirement
summary: When the PCE function is deactivated, the OSPF speaker MUST originate a new Router Information LSA that no longer includes the PCED TLV. If no other TLVs remain, it MUST either send an empty Router Information LSA or purge it by prematurely aging it.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
