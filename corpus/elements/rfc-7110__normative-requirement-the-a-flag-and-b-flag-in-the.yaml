document: rfc-7110
kind: normative-requirement
summary: The A flag and B flag in the Reply Path TLV Flags field MUST NOT both be set. If both are set, an echo reply with Reply Path return code 'Malformed Reply Path TLV was received' MUST be returned.
section: "4.2"
rfc2119_level: MUST NOT
topics:
