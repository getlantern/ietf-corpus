document: rfc-6081
kind: interoperability-note
summary: The UPnP-Enabled Symmetric NAT Extension and the Port-Preserving Symmetric NAT Extension both depend on the Symmetric NAT Support Extension. The Sequential Port-Symmetric NAT Extension additionally depends on the Port-Preserving NAT Extension. All other extensions are independent of each other.
