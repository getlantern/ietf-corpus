document: rfc-7391
kind: design-rationale
summary: The EXTENDEDRESULT-TLV expands the result code space from 8 bits to 32 bits because deployment experience showed that generic codes like E_NOT_SUPPORTED mapped to too many distinct error conditions, making debugging time-consuming. The optional UTF-8 cause string further disambiguates errors for human operators.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
