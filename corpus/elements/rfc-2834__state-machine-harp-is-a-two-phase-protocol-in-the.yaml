document: rfc-2834
kind: state-machine
summary: HARP is a two-phase protocol. In the registration phase, the port detects whether it is connected to broadcast-capable hardware by sending an InHARP_REQUEST to the broadcast address and checking if it receives its own message. If broadcast is detected, the port transitions directly to the operational phase; otherwise it registers with a HARP server and then transitions to operational.
section: "5.1"
topics:
    - ip
