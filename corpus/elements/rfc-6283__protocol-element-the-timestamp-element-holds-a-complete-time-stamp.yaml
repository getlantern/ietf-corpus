document: rfc-6283
kind: protocol-element
summary: The <TimeStamp> element holds a complete Time-Stamp Token as provided by a TSA. The TimeStampToken Type attribute MUST indicate the format ('RFC3161' or 'XMLENTRUST'). For RFC3161 type, the element MUST contain base64 encoding of a DER-encoded ASN.1 structure.
section: 3.1.2
topics:
    - crypto
    - pkix
    - security
