document: rfc-6625
kind: normative-requirement
summary: If a PE receives a (C-*,C-G) S-PMSI A-D route and can determine that C-G is an SSM group address, the PE SHOULD 'ignore' the route (not consider it for P-tunnel selection and not use its MPLS label values).
section: "4.2"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
