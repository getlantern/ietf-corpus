document: rfc-5653
kind: interoperability-note
summary: Applications that set channel bindings should either provide correct initiator and acceptor address information or omit the address fields entirely. Individual mechanisms may verify that address fields contain the correct host network address, making incorrect values a source of context-establishment failure.
section: "5.14"
topics:
    - security
