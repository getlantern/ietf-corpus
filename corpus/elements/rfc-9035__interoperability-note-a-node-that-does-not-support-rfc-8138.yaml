document: rfc-9035
kind: interoperability-note
summary: A node that does not support RFC 8138 can interoperate with nodes that do only when 6LoRH compression is turned off ('T' flag unset). If compression is turned on, all RPL-Aware Nodes (RANs) must handle compressed packets; a non-supporting node may only remain as a RUL.
section: "5.1"
topics:
    - routing
