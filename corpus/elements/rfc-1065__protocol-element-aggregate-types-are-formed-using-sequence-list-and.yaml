document: rfc-1065
kind: protocol-element
summary: Aggregate types are formed using SEQUENCE (list) and SEQUENCE OF (table). A list is SEQUENCE of primitive types, always fully present (no DEFAULT or OPTIONAL). A table is SEQUENCE OF a list entry type.
section: 3.2.2
extracted_by: claude-sonnet-4-6
