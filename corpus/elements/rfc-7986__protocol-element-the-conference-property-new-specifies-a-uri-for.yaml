document: rfc-7986
kind: protocol-element
summary: The CONFERENCE property (new) specifies a URI for accessing a conferencing system for attendees of a VEVENT or VTODO. Value type is URI (no default, VALUE=URI required). Supports FEATURE and LABEL parameters. Multiple instances are permitted.
section: "5.11"
