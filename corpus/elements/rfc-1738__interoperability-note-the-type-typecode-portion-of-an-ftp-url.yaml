document: rfc-1738
kind: interoperability-note
summary: The `;type=<typecode>` portion of an FTP URL is optional; if omitted, the client must guess the appropriate transfer mode (ASCII vs binary) from the file name or content. This can cause interoperability problems when type detection is wrong.
section: 3.2.3
topics:
    - http
