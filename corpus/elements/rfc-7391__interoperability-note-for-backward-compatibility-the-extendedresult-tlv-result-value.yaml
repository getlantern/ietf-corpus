document: rfc-7391
kind: interoperability-note
summary: For backward compatibility, the EXTENDEDRESULT-TLV Result Value first 256 codes (0x00-0xFF) are common to both the old 8-bit RESULT-TLV namespace and the new 32-bit namespace. An FE supporting both modes defaults to EResultNotSupported (EResultAdmin=1) and uses legacy RESULT-TLVs unless explicitly enabled by a master CE.
section: 3.2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
