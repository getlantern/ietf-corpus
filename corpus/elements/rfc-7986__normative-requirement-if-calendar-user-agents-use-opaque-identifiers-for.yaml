document: rfc-7986
kind: normative-requirement
summary: If calendar user agents use opaque identifiers for UID values, they MUST have a length less than 255 octets and MUST conform to the 'iana-token' ABNF syntax defined in Section 3.1 of RFC 5545.
section: "5.3"
rfc2119_level: MUST
