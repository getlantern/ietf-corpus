document: rfc-3080
kind: wire-format
summary: A BEEP frame consists of a header, payload, and trailer. The header encodes keyword (MSG/RPY/ERR/ANS/NUL), channel (0..2147483647), msgno (0..2147483647), more indicator ('*' or '.'), seqno (0..4294967295), size (0..2147483647), and for ANS frames, ansno (0..4294967295). The trailer is the literal string 'END' followed by CRLF.
section: 2.2.1
