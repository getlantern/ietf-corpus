document: rfc-5919
kind: design-rationale
summary: Without End-of-LIB Notification in LDP-IGP Synchronization scenarios, the speaker must rely on heuristics to determine when all peer label bindings are received, which can cause premature IGP signaling (dropping traffic) or delayed signaling (suboptimal paths). The End-of-LIB Notification makes the synchronization point deterministic.
section: "5.1"
topics:
    - mpls
    - routing
