document: rfc-1195
kind: normative-requirement
summary: All IS-IS routers with point-to-point interfaces MUST be able to transmit and receive ISO 9542 ISH packets on those links. IP-capable routers MUST also include the 'Protocols Supported' field in those ISH packets.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
