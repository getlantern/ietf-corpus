document: rfc-791
kind: normative-requirement
summary: IP options must be implemented by all IP modules (hosts and gateways); their presence in any particular datagram is optional, but every module must be able to parse and act on every option. The Security option is required when classified, restricted, or compartmented traffic is passed.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
