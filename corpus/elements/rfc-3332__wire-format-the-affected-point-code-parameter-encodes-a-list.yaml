document: rfc-3332
kind: wire-format
summary: The Affected Point Code parameter encodes a list of 32-bit entries each containing an 8-bit Mask and a 24-bit Point Code. ANSI 24-bit PCs are encoded directly; ITU 14-bit PCs are left-padded to 24 bits. A Mask value equal to or greater than the PC bit-width signals that the entire network appearance is affected (network isolation).
section: 3.4.1
topics:
    - realtime
    - voip
