document: rfc-4044
kind: security-consideration
summary: The MIB is compliant with SNMPv2-CONF and is intended to be used with SNMP. RFC 3410 security recommendations apply; implementations should support SNMPv3 with authentication and privacy to protect the management information from unauthorized access or modification.
