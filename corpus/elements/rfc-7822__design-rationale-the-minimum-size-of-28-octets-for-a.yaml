document: rfc-7822
kind: design-rationale
summary: The minimum size of 28 octets for a single extension field in the absence of a MAC is chosen to allow a receiver to unambiguously distinguish an extension field from a MAC (which is at most 24 octets), preventing parsing ambiguity when no MAC is present.
