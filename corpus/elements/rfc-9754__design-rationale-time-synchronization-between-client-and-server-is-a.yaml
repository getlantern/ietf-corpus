document: rfc-9754
kind: design-rationale
summary: Time synchronization between client and server is a key prerequisite for the delegation timestamp proxy feature. While base NFSv4.2 does not require synchronization, RPCSEC_GSS typically enforces it, making this prerequisite practical in common deployments.
section: "5"
