document: rfc-9197
kind: security-consideration
summary: Attackers can compromise IOAM integrity by modifying IOAM options in transit or injecting packets with maliciously generated IOAM options; all nodes in the path are potential attack vectors. The Proof of Transit Option-Type is provided to help verify that packets traversed a defined set of nodes.
section: "9"
topics:
