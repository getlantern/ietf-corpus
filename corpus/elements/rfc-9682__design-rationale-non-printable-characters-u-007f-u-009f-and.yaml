document: rfc-9682
kind: design-rationale
summary: Non-printable characters (U+007F–U+009F) and surrogates were excluded from SCHAR, BCHAR, and PCHAR for consistency, but the document deliberately stops short of excluding all non-printable Unicode characters to avoid importing complexity from the ongoing evolution of the Unicode standard.
