document: rfc-4129
kind: state-machine
summary: 'DLC reset for a single DLC (Ind=1): SG sends SABMR to PBX; on receipt of UA, SG sends Est Cfm to MGC and DLC enters Reset Completed (RC) state. On failure (NT1/NT2 expiry with no UA), SG sends Rel Ind with RELEASE_OTHER and DLC enters Reset Attempted (RA) state.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
