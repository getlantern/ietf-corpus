document: rfc-8124
kind: normative-requirement
summary: Once offer/answer is complete, the client MUST initiate the WebSocket handshake by sending a GET message toward the URI in 'a=websocket-uri' per RFC 6455. When no port is given in the URI, the default port (80 for ws-URI, 443 for wss-URI) is used.
section: "5"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
