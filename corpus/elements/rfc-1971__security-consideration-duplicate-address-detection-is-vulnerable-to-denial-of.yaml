document: rfc-1971
kind: security-consideration
summary: 'Duplicate Address Detection is vulnerable to denial-of-service attacks: any node can respond to Neighbor Solicitations for a tentative address, causing the legitimate node to reject the address as a duplicate. This attack is analogous to Neighbor Discovery spoofing and can be mitigated by authenticating Neighbor Discovery packets per RFC 1826.'
section: Security Considerations
topics:
    - security
    - ip
    - v6ops
