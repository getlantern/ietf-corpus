document: rfc-8679
kind: normative-requirement
summary: In a scenario where an egress-protected tunnel is inter-area or inter-AS, the associated context ID MUST be propagated by IGP or BGP from the original area or AS to the area or AS of the ingress router, following the same propagation process as for a regular IP address.
section: "5.8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
