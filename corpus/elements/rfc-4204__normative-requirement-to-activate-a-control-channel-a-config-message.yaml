document: rfc-4204
kind: normative-requirement
summary: To activate a control channel, a Config message MUST be transmitted to the remote node and a ConfigAck MUST be received. When both nodes initiate simultaneously, the node with the higher Node_Id wins contention; the lower-Node_Id node MUST stop transmitting Config and respond to the received Config.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
