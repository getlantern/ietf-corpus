document: rfc-3733
kind: protocol-element
summary: 'The <contact:infData> response returns the full contact record: id, roid, status values, up to two postalInfo elements (int/loc types), optional voice/fax, required email, sponsoring client ID, creation/update/transfer timestamps, authInfo (only to sponsoring client), and optional disclose preferences.'
section: 3.1.2
