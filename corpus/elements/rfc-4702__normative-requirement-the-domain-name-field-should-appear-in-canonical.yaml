document: rfc-4702
kind: normative-requirement
summary: The Domain Name field SHOULD appear in canonical DNS wire format (RFC 1035 Section 3.1). The client and server MUST NOT alter the Domain Name field contents unless the FQDN has actually changed, to allow detecting changes between message exchanges.
section: "2.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
