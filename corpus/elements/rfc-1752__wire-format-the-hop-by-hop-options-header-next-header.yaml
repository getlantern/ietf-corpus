document: rfc-1752
kind: wire-format
summary: 'The Hop-by-Hop Options header (Next Header value 0) carries options that must be examined by every node along the delivery path. Format: Next Header (8-bit), Hdr Ext Len (8-bit, in 8-octet units excluding first 8 octets), followed by variable-length TLV-encoded Options padded to a multiple of 8 octets.'
