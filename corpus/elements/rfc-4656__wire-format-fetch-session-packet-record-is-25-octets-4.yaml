document: rfc-4656
kind: wire-format
summary: 'Fetch-Session packet record is 25 octets: 4-octet Sequence Number, 2-octet Send Error Estimate, 2-octet Receive Error Estimate, 8-octet Send Timestamp, 8-octet Receive Timestamp, 1-octet TTL/Hop Limit. Lost packet records use presumed send time, Multiplier=1/Scale=64/S=0 error estimate, all-zero receive timestamp, and TTL=255.'
