document: rfc-5654
kind: normative-requirement
summary: MPLS-TP MUST provide mechanisms to guarantee 50ms recovery times from the moment of fault detection in networks with spans less than 1200 km. Recovery MUST meet SLA requirements over multiple domains, and recovery objectives SHOULD be configurable per transport path.
section: "2.5"
rfc2119_level: MUST
topics:
    - mpls
