document: rfc-8824
kind: normative-requirement
summary: When a packet uses a Block option, SCHC compression MUST send its content in the Compression Residue. The SCHC Rule describes an empty TV with MO set to 'ignore' and CDA set to 'value-sent'.
section: "6.1"
rfc2119_level: MUST
