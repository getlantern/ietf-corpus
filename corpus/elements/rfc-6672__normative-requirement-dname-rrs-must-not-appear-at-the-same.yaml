document: rfc-6672
kind: normative-requirement
summary: DNAME RRs MUST NOT appear at the same owner name as an NS RR unless the owner name is the zone apex. At a non-apex owner, an NS RR signifies a delegation point.
section: "2.3"
rfc2119_level: MUST NOT
topics:
