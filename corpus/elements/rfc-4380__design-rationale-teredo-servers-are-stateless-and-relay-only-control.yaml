document: rfc-4380
kind: design-rationale
summary: Teredo servers are stateless and relay only control traffic (bubbles, ICMPv6) rather than data packets, both to enable easy replication for scale and to avoid privacy issues that would arise if a server retained copies of client data packets.
section: "3.4"
topics:
    - ip
    - nat
    - v6ops
    - privacy
