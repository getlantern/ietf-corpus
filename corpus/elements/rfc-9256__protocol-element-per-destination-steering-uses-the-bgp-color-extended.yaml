document: rfc-9256
kind: protocol-element
summary: 'Per-destination steering uses the BGP Color Extended Community (RFC 9012): a BGP route''s next-hop N and Color C match a valid SR Policy (color=C, endpoint=N), causing the route to be installed with next-hop equal to the SR Policy''s BSID rather than via N.'
section: "8.4"
