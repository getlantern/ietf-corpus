document: rfc-7463
kind: design-rationale
summary: PUBLISH is used to communicate desired appearance operations rather than as a continuous state-synchronization mechanism. Once a dialog transitions from early to confirmed state, the Appearance Agent is assumed to track state via other means (call stateful proxy, B2BUA), so publication refreshes are no longer required.
section: "5.3"
topics:
