document: rfc-6891
kind: interoperability-note
summary: Extended agents MUST be prepared to handle interactions with unextended clients and fall back gracefully to unextended DNS. If a requestor detects that the remote end does not support EDNS(0), it MAY issue queries without an OPT record and MAY cache this knowledge briefly.
section: 6.2.2
topics:
    - dns
