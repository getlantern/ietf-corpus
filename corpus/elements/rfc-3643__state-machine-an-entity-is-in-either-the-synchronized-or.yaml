document: rfc-3643
kind: state-machine
summary: An entity is in either the Synchronized or Unsynchronized state with respect to transit time measurement. It enters Unsynchronized on power-up and transitions to Synchronized once the time base is aligned per the encapsulating protocol specification. It MUST return to Unsynchronized if it cannot maintain time base synchronization.
section: "4"
