document: rfc-2531
kind: protocol-element
summary: size-x and size-y are Rational (>0) feature tags indicating rendered document dimensions in inches (horizontal and vertical respectively). Where actual size is in millimetres, a conversion factor of 10/254 yields an exact inch-based value.
