document: rfc-2562
kind: interoperability-note
summary: TN3270 clients and TN3270E clients that do not support the RESPONSES function can be accommodated by substituting TIMING-MARK request/response flows for definite responses when approximating IP network transit time. The client must not have the NOP option enabled for TIMING-MARK to work in this role.
section: 3.4.2
topics:
