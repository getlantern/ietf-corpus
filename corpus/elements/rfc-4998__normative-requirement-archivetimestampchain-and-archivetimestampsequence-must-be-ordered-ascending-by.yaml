document: rfc-4998
kind: normative-requirement
summary: ArchiveTimeStampChain and ArchiveTimeStampSequence MUST be ordered ascending by time of timestamp. Within an ArchiveTimeStampChain, all reducedHashtrees of contained ArchiveTimeStamps MUST use the same hash algorithm.
section: "5.1"
rfc2119_level: MUST
topics:
