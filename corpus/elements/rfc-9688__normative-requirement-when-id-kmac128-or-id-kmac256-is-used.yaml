document: rfc-9688
kind: normative-requirement
summary: When id-kmac128 or id-kmac256 is used, the parameters field MUST be absent when there is no customization label S; if S is provided, the parameters field MUST be present and contain S encoded as Customization (OCTET STRING).
section: "5.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
