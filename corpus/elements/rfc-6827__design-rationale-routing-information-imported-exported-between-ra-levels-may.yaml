document: rfc-6827
kind: design-rationale
summary: Routing information imported/exported between RA levels MAY be transformed (filtered or aggregated) as long as the result is self-consistent. This policy-based flexibility is intentionally left outside the scope of the routing protocol specification to accommodate operator diversity.
section: "7.1"
topics:
    - routing
