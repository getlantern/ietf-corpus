document: rfc-8841
kind: protocol-element
summary: 'Two new SDP proto values are defined: ''UDP/DTLS/SCTP'' describes an SCTP association on top of DTLS on top of UDP, and ''TCP/DTLS/SCTP'' describes an SCTP association on top of DTLS on top of TCP. These are media-transport-layer identifiers that do not describe the upper-layer protocol.'
section: "4.2"
