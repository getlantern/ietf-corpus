document: rfc-4268
kind: protocol-element
summary: entStateAdmin (read-write) carries the EntityAdminState for the entity. Setting it to 'notSupported' results in an 'inconsistentValue' error. Entities that do not support administrative state return 'inconsistentValue' for all SET operations.
