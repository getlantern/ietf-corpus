document: rfc-5789
kind: normative-requirement
summary: When the server determines that the patch document is not properly formatted, it SHOULD return a 400 (Bad Request) response. The entity body of error responses SHOULD contain enough information to communicate the nature of the error to the client.
section: "2.2"
rfc2119_level: SHOULD
