document: rfc-9109
kind: security-consideration
summary: Transport-protocol ephemeral port randomization is a transport-layer mitigation against blind/off-path attacks and is complementary to—not a replacement for—other NTP-layer mitigations such as NTP data minimization or authentication. Port randomization adds entropy that benefits those other mitigations as well.
section: "3.1"
topics:
    - ntp
    - security
    - udp
    - privacy
