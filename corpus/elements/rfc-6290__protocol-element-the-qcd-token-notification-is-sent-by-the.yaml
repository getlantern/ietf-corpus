document: rfc-6290
kind: protocol-element
summary: The QCD_TOKEN notification is sent by the initiator in the first IKE_AUTH request and by the responder in the final IKE_AUTH response (the messages containing AUTH payloads). It is optional per peer; absence MUST NOT be taken as an indication that the peer does not support this standard.
section: "4.2"
topics:
