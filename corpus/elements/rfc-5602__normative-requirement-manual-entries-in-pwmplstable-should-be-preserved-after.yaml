document: rfc-5602
kind: normative-requirement
summary: Manual entries in pwMplsTable SHOULD be preserved after a reboot, and the agent MUST ensure the integrity of those entries. If entries are found to be nonconsistent after reboot, the PW pwOperStatus MUST be declared as down(2).
section: "8"
rfc2119_level: MUST
topics:
