document: rfc-5506
kind: wire-format
summary: A Receiver Report (RR) containing a report block for a single source is 32 bytes; a Sender Report (SR) is 52 bytes; an SDES packet containing a CNAME item is at least 10 bytes plus the CNAME string length. A Reduced-Size RTCP can therefore be 70–80 bytes smaller than a compound packet.
section: "3.3"
topics:
