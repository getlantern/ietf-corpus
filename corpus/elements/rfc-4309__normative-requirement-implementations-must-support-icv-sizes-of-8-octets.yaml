document: rfc-4309
kind: normative-requirement
summary: Implementations MUST support ICV sizes of 8 octets and 16 octets; implementations MAY also support 12 octets. The AES CCM ICV is carried in the Authentication Data field without further encryption.
section: "3.3"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
