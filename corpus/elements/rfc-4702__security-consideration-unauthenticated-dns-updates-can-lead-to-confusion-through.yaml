document: rfc-4702
kind: security-consideration
summary: Unauthenticated DNS updates can lead to confusion through malicious attack or misconfiguration. Both DHCP clients and servers should use update request origin authentication (e.g., Secure DNS Dynamic Update, RFC 3007) when performing DNS updates.
section: "8"
topics:
