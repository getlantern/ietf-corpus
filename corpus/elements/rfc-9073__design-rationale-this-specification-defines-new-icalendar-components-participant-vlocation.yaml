document: rfc-9073
kind: design-rationale
summary: This specification defines new iCalendar components (PARTICIPANT, VLOCATION, VRESOURCE) rather than properties, breaking with prior convention. Components are a better match for how XML and JSON handle such structures, allow richer definitions, and permit the addition of extra properties inside the components.
section: "2"
topics:
    - json
