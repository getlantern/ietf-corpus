document: rfc-4301
kind: security-consideration
summary: 'The security afforded by IPsec ultimately depends on the quality of its implementation and the operating environment: defects in OS security, poor random number sources, insecure system management protocols, and other environmental factors outside the scope of the IPsec standards can all degrade protection. IPsec is only one part of an overall system security architecture.'
section: "11"
topics:
    - ipsec
    - security
