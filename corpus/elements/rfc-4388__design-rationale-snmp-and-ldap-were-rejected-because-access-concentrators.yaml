document: rfc-4388
kind: design-rationale
summary: SNMP and LDAP were rejected because access concentrators typically do not implement SNMP management client interfaces or LDAP client interfaces, and the DHCP Server MIB targets aggregate server statistics rather than per-lease detail. DHCPLEASEQUERY is also optional and would be awkward to define as an optional MIB object.
section: "4.2"
topics:
    - ip
    - snmp
    - ldap
