document: rfc-5880
kind: state-machine
summary: 'BFD defines four session states: Down (session not established or just created), Init (remote is communicating but session not yet Up), Up (session established, connectivity working), and AdminDown (administratively disabled). Transitions are driven by the received State field and Detection Timer expiration; a three-way handshake is required for both establishment and teardown.'
section: "6.2"
topics:
    - routing
    - security
