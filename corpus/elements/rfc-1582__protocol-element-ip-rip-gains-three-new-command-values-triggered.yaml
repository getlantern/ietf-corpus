document: rfc-1582
kind: protocol-element
summary: 'IP RIP gains three new command values: TRIGGERED REQUEST (6), TRIGGERED RESPONSE (7), and TRIGGERED ACKNOWLEDGEMENT (8). The triggered request sends only the first 4 octets; the triggered acknowledgement sends the first 8 octets (header plus sequence/fragment fields). The sequence number wraps at 65535.'
section: "3"
