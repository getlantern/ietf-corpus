document: rfc-3380
kind: normative-requirement
summary: If Set-Printer-Attributes allows the administrator to define arbitrary 'name' values for an 'xxx-supported' attribute, Get-Printer-Supported-Values MUST return the 'admin-define' out-of-band value as one of the values of that attribute. If 'admin-define' is not present for an attribute, Set-Printer-Attributes MUST NOT accept values beyond those explicitly returned.
section: 4.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
