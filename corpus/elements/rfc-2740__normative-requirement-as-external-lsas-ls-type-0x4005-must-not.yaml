document: rfc-2740
kind: normative-requirement
summary: AS-external-LSAs (LS type 0x4005) MUST NOT be flooded into or throughout stub areas, consistent with OSPFv2 behavior. The forwarding address is included only when the F-bit is set; the external route tag is present only when the T-bit is set; link-local addresses MUST NOT appear as prefixes.
section: 3.4.3.5
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
