document: rfc-4944
kind: registry
summary: 'This document creates an IANA registry for 16-bit short addresses used in 6LoWPAN packets. Defined ranges: 0xxxxxxxxxxxxxxx (unicast), 100xxxxxxxxxxxxx (multicast), 101-111xxxxxxxxxxxxx (reserved); 0xffff (broadcast) and 0xfffe are reserved per IEEE 802.15.4. Future assignments require ''Specification Required''.'
