document: rfc-1331
kind: normative-requirement
summary: Upon reception of an Echo-Request, a LCP implementation MUST transmit an Echo-Reply with the Identifier copied, the local Magic-Number inserted, and the Data field copied from the Echo-Request. Echo-Request/Reply packets received outside the LCP Opened state SHOULD be silently discarded.
section: "6.8"
rfc2119_level: MUST
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
