document: rfc-4434
kind: security-consideration
summary: The security of AES-XCBC-PRF-128 relies on the strength of AES and HMAC; at the time of writing no practical cryptographic attacks were known against AES, AES-XCBC-MAC-PRF, or HMAC. Security also depends on key management quality, secret key strength, and correctness of implementations.
