document: rfc-7655
kind: design-rationale
summary: 'G.711.0 frames are self-describing: the Prefix Code octet encodes the number of source G.711 symbols, so a decoder does not need external signaling (such as SDP ptime) to decompress a frame. This enables transparent in-path compression between G.711 endpoints.'
section: "3.2"
topics:
    - rtp
    - realtime
