document: rfc-7311
kind: normative-requirement
summary: If R1 does not change the next hop of the route, R1 MUST NOT change the AIGP attribute value. The AIGP value MUST be capped at 0xffffffffffffffff and incrementing MUST NOT cause wrap-around.
section: 3.4.3
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
