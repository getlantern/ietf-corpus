document: rfc-3189
kind: wire-format
summary: 'The RTP timestamp is a 32-bit 90 kHz value representing the sampling time of the first data in the frame. Nominal increments per frame are: 3003 (525-60 at 29.97 Hz), 3600 (625-50 at 25 Hz), 3000 (1125-60 at 30 Hz), and 3600 (1250-50 at 25 Hz).'
section: "2.1"
