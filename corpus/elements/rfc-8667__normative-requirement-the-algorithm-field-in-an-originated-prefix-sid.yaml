document: rfc-8667
kind: normative-requirement
summary: The Algorithm field in an originated Prefix-SID MUST be set to 0 or to a value advertised in the SR-Algorithm sub-TLV. A router receiving a Prefix-SID with an algorithm value not advertised by the remote node in its SR-Algorithm sub-TLV MUST ignore the Prefix-SID sub-TLV.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
