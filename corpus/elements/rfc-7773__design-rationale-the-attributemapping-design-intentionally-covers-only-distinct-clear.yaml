document: rfc-7773
kind: design-rationale
summary: The <AttributeMapping> design intentionally covers only distinct, clear one-to-one relationships between SAML attributes and certificate subject attributes. Complex mapping situations (e.g., multiple SAML attributes mapping to one certificate attribute, or structured multivalued attributes) are explicitly noted as out of scope and deferred to extensions of the XML schema.
section: 3.1.2
topics:
    - pkix
