document: rfc-8663
kind: interoperability-note
summary: When IGP dynamic port negotiation (via ISIS-ENCAP or OSPF-ENCAP extensions) is not used, the port numbers specified in RFC 7510 (6635 for MPLS, 6636 for MPLS with DTLS) MUST be used for SR-MPLS-over-UDP tunnels.
