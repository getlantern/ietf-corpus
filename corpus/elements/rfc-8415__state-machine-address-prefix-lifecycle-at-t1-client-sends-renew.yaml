document: rfc-8415
kind: state-machine
summary: 'Address/prefix lifecycle: at T1 client sends Renew to the assigning server to extend lifetimes; at T2 (if Renew receives no reply) client sends Rebind to any available server. A server returning lifetimes of 0 signals inability to extend. If the valid lifetime expires without renewal, the client must cease using the address or prefix.'
section: "5.1"
topics:
    - ip
