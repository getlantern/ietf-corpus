document: rfc-7807
kind: protocol-element
summary: The 'about:blank' URI, when used as the 'type' value, indicates the problem has no additional semantics beyond the HTTP status code. It is the default value for 'type' when that member is absent. The 'title' SHOULD be the standard HTTP status phrase for the code.
section: "4.2"
