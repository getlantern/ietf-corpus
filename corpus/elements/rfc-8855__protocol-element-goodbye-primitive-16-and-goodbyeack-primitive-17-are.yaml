document: rfc-8855
kind: protocol-element
summary: Goodbye (Primitive 16) and GoodbyeAck (Primitive 17) are used exclusively over unreliable transport for graceful session teardown. A BFCP entity transmits Goodbye to dissociate from a remote participant; the peer responds with GoodbyeAck.
section: 5.3.16
topics:
    - realtime
    - udp
