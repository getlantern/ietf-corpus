document: rfc-8154
kind: normative-requirement
summary: A request for a readable layout MUST return only PNFS_SCSI_READ_DATA or PNFS_SCSI_NONE_DATA extents and SHALL NOT return PNFS_SCSI_INVALID_DATA or PNFS_SCSI_READ_WRITE_DATA extents. A request for a writable layout MUST return PNFS_SCSI_READ_WRITE_DATA or PNFS_SCSI_INVALID_DATA extents and SHALL NOT return PNFS_SCSI_NONE_DATA extents.
section: 2.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
