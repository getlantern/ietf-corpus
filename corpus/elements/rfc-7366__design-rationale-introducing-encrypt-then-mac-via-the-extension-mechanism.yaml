document: rfc-7366
kind: design-rationale
summary: Introducing encrypt-then-MAC via the extension mechanism rather than waiting for TLS 1.3 is justified because TLS 1.3 would require full implementation and deployment of TLS 1.2 merely to support a trivial ordering change, whereas the extension mechanism allows incremental deployment.
section: "2.1"
topics:
    - tls
    - security
