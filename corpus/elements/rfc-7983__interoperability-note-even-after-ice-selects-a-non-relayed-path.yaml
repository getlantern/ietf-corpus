document: rfc-7983
kind: interoperability-note
summary: Even after ICE selects a non-relayed path, a TURN server may continue forwarding data (e.g., STUN connectivity checks during an ICE restart or with aggressive nomination). Implementations must be prepared to receive TURN channel packets even on ostensibly direct paths.
section: "6"
topics:
