document: rfc-7670
kind: interoperability-note
summary: 'RFC 5996 supported PKCS #1 RSA raw public keys in IKEv2; RFC 7296 removed this feature. Implementations that previously relied on the RFC 5996 RSA raw key encoding must migrate to the new SubjectPublicKeyInfo-based encoding (value 15) defined here.'
section: "1"
topics:
    - ipsec
    - pkix
