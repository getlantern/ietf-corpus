document: rfc-2024
kind: protocol-element
summary: 'The DLSw MIB is structured into six object groups: dlswNode (node identity, configuration, control), dlswTConn (transport connections to partner DLSw nodes), dlswInterface (interfaces where DLSw is active), dlswDirectory (MAC and NetBIOS name caches), dlswCircuit (end-station circuits), and dlswSdlc (SDLC-attached end stations).'
section: "2.4"
