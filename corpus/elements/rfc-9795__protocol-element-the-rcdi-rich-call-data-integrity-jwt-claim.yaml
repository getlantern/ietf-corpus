document: rfc-9795
kind: protocol-element
summary: The "rcdi" (Rich Call Data Integrity) JWT claim is a JSON object whose key/value pairs provide cryptographic digests over "rcd" elements, using JSON Pointer (RFC 6901) as keys and base64-encoded SHA-2 digests as values. It is modeled after W3C Subresource Integrity and provides per-element integrity validation especially for URI-referenced external resources.
