document: rfc-5818
kind: protocol-element
summary: The ConfirmDataChannelStatusAck message is sent back to the originator of ConfirmDataChannelStatus to return the requested data channel statuses. It contains a Common Header, MESSAGE_ID_ACK, and one or more DATA_LINK objects, and is sent regardless of whether statuses match or not.
section: 5.1.2
topics:
    - routing
