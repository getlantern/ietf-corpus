document: rfc-7383
kind: normative-requirement
summary: If a retransmitted fragment of a request is received after the responder has already sent a response, it MUST trigger retransmission of the response only if the Fragment Number field is 1; otherwise it MUST be ignored.
section: 2.6.1
rfc2119_level: MUST
topics:
    - ipsec
