document: rfc-6060
kind: security-consideration
summary: A GMPLS-controlled Ethernet PBB-TE system assumes UNI-attached users and devices may behave maliciously or incorrectly; intra-provider control traffic is trusted. Security requirements are equivalent to any GMPLS network, with access only via UNI, NNI, or protected management interfaces.
