document: rfc-3986
kind: normative-requirement
summary: Non-ASCII registered names MUST be encoded as UTF-8 and each octet of the UTF-8 sequence percent-encoded for representation as URI characters. URI producing applications MUST NOT use percent-encoding in the host component unless it represents a UTF-8 character sequence.
section: 3.2.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
