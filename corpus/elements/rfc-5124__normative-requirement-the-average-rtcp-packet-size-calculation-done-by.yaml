document: rfc-5124
kind: normative-requirement
summary: The average RTCP packet size calculation done by the AVPF layer for timing purposes MUST take into account the fields added by the SAVP layer (i.e., the SRTCP overhead). This is done by adjusting the RTCP variable 'avg_rtcp_size' to reflect the size of SRTCP packets.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
