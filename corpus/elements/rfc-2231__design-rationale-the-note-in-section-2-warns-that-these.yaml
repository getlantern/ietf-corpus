summary: The note in Section 2 warns that these mechanisms 'end up being somewhat gibbous when they actually are used' and therefore SHOULD NOT be used lightly—they should be reserved for situations where a real need exists. This acknowledges the syntactic complexity introduced by combined continuations and charset/language encoding.
