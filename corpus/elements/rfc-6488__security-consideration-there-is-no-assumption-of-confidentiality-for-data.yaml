document: rfc-6488
kind: security-consideration
summary: There is no assumption of confidentiality for data in an RPKI signed object; signed objects are expected to be stored in publicly accessible repositories. Integrity and authenticity rely solely on verification of the digital signature and validation of the EE certificate.
section: "5"
topics:
