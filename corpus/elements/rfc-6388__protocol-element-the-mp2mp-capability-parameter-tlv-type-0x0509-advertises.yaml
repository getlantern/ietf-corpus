document: rfc-6388
kind: protocol-element
summary: 'The MP2MP Capability Parameter TLV (type 0x0509) advertises support for MP2MP LSP setup. MP2MP uses two FEC element types: MP2MP upstream (0x07) and MP2MP downstream (0x08). Structure and error handling are identical to the P2MP FEC Element.'
section: "3.1"
