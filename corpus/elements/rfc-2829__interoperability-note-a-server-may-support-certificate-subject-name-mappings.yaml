document: rfc-2829
kind: interoperability-note
summary: A server MAY support certificate subject name mappings to directory entry names, but a server supporting such mappings MUST also be configurable to support certificates requiring no mapping. This ensures that standard certificate deployments remain interoperable.
section: "7.1"
topics:
    - ldap
    - pkix
    - security
