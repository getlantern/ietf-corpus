document: rfc-4280
kind: normative-requirement
summary: A DHCPv4 client MAY request the BCMCS Controller Domain Name List (code 88) and/or the IPv4 Address option (code 89) in the Parameter Request List option (code 55). A DHCPv6 client MAY request either or both options in the ORO.
section: "4.5"
rfc2119_level: MAY
topics:
    - multicast
