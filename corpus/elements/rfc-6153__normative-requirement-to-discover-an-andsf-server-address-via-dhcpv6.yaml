document: rfc-6153
kind: normative-requirement
summary: To discover an ANDSF server address via DHCPv6, the mobile node MUST include an ANDSF IPv6 Address Option in the Option Request Option (ORO) in the respective DHCP messages as defined in RFC 3315.
section: 4.2.1
rfc2119_level: MUST
