document: rfc-9744
kind: design-rationale
summary: 'When a single VPWS service tunnel carries multiple ACs across various ESs without BGP signaling of individual ACs, remote PEs cannot associate a failed ES with its ACs or redirect traffic via another multi-homing PE. This necessitated two distinct FXC mechanisms: Default FXC for single-homed endpoints and VLAN-Signaled FXC for multi-homed endpoints.'
section: "2"
topics:
