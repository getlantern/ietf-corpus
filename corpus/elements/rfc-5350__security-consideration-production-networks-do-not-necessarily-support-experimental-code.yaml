document: rfc-5350
kind: security-consideration
summary: Production networks do not necessarily support experimental code points in IP option headers. The network scope of support for experimental RAO values must be evaluated carefully before deploying them across extended domains such as the public Internet, as they risk disrupting stable network operation.
section: "4"
topics:
