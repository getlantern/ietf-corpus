document: rfc-7402
kind: wire-format
summary: The ESP_INFO parameter (Type 65, Length 12) carries a 16-bit Reserved field, a 16-bit KEYMAT Index, a 32-bit OLD SPI, and a 32-bit NEW SPI. OLD SPI is zero during initial SA setup; KEYMAT Index is zero when new Diffie-Hellman keying material is generated.
section: 5.1.1
