document: rfc-7097
kind: normative-requirement
summary: It is RECOMMENDED that the media receiver signal all discarded packets using the Discard RLE method. If all packets over a reporting period are discarded, the receiver MAY use the Discard Report Block (RFC 7002) instead.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
