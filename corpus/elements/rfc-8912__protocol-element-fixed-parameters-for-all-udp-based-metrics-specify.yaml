document: rfc-8912
kind: protocol-element
summary: 'Fixed Parameters for all UDP-based metrics specify Type-P as: IPv4/IPv6 DSCP=0, TTL/Hop Count=255, Protocol/Next Header=17 (UDP), Flow Label=0, no Extension Headers. The UDP checksum must be calculated and a non-zero checksum included. Payload sizes vary by metric (100 bytes for UDP RTDelay, 200 bytes for PDV, 250 bytes for UDP Poisson OWDelay, 142 bytes for UDP Periodic OWDelay).'
section: 4.2.2
topics:
    - measurement
    - ip
    - udp
