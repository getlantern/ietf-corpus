document: rfc-5537
kind: security-consideration
summary: The Netnews flooding algorithm amplifies any forged or malicious article to thousands of servers within minutes. Agents (other than moderators) MUST NOT modify articles; unacceptable articles MUST be rejected rather than corrected, to prevent undetected corruption propagating network-wide.
section: "6.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
