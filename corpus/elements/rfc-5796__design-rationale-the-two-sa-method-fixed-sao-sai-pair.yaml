document: rfc-5796
kind: design-rationale
summary: The two-SA method (fixed SAo/SAi pair with identical parameters shared across all routers) is recommended for manual keying because it keeps SA count constant at two regardless of network size, simplifying administration. The unique-SA-per-peer method is more scalable but practically requires automated key management.
