document: rfc-8169
kind: wire-format
summary: The PTP Packet Sub-TLV (Type=1, Length MUST be 20 octets) contains a 28-bit Flags field with a 1-bit S flag indicating two-step mode, a 4-bit PTPType, a 10-octet Port ID, and a 2-octet Sequence ID. The tuple of PTPType, Port ID, and Sequence ID uniquely identifies the associated PTP message for two-step RTM correlation.
section: "3.1"
topics:
    - ntp
