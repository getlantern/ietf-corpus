document: rfc-9792
kind: wire-format
summary: The sub-TLV format consists of a 2-octet Type field (11 for OSPFv2, 37 for OSPFv3), a 2-octet Length field (must be a multiple of 4 octets), and a variable-length Prefix Extended Flags field grouped in 4-octet blocks. Bits are numbered starting from bit 0 as the most significant bit of the first 32-bit block, with numbering continuing across additional 4-octet blocks.
