document: rfc-2086
kind: design-rationale
summary: How multiple identifiers in an ACL apply to a given user is implementation-defined. An implementation may use the union of rights granted to all applicable identifiers, or may use only those rights granted to the most specific identifier present. Clients can use MYRIGHTS to determine the effective rights.
section: "3"
topics:
    - security
