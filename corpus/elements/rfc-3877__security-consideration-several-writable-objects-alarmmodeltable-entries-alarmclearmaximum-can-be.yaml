document: rfc-3877
kind: security-consideration
summary: 'Several writable objects (alarmModelTable entries, alarmClearMaximum) can be used to disrupt alarm management: an adversary with write access could remove alarm models, suppress active alarms from appearing, or delete historical cleared alarm records. SNMPv3 with authentication and privacy is strongly recommended.'
section: "7"
topics:
