document: rfc-5751
kind: normative-requirement
summary: Receiving and sending agents MUST support RSA encryption for key encryption. RSAES-OAEP is SHOULD+ and DH ephemeral-static is SHOULD-. When DH ephemeral-static is used, the key wrap algorithm and content encryption algorithm key sizes MUST match (e.g., AES-128 key wrap with AES-128 content encryption).
section: "2.3"
rfc2119_level: MUST
topics:
    - crypto
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
