document: rfc-7119
kind: security-consideration
summary: IPFIX Mediators are 'men in the middle' by design, intercepting communication between Original Exporters and downstream Collectors, which breaks end-to-end confidentiality and data integrity guarantees. Trust placed in Collecting Processes is absolute, so care must be taken when exporting IPFIX Messages between processes controlled by different entities.
section: "12"
topics:
    - security
    - measurement
