document: rfc-2344
kind: normative-requirement
summary: The mobile node MUST set the IP TTL field to 255 in Registration Requests sent to the foreign agent. This limits reverse-tunnel hijacking by preventing malicious nodes more than one hop away from posing as valid mobile nodes.
section: 4.1.1
rfc2119_level: MUST
topics:
    - mobility
    - security
