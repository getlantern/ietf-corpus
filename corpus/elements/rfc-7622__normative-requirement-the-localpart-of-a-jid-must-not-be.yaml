document: rfc-7622
kind: normative-requirement
summary: The localpart of a JID MUST NOT be zero octets and MUST NOT exceed 1023 octets in length, enforced after normalization, mapping, and UTF-8 encoding. It MUST conform to the UsernameCaseMapped profile of the PRECIS IdentifierClass as specified in RFC 7613.
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
