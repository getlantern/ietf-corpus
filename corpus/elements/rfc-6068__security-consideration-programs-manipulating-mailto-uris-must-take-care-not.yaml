document: rfc-6068
kind: security-consideration
summary: Programs manipulating 'mailto' URIs must take care not to double-escape or double-unescape, and must apply URI and mail address escaping/unescaping conventions in the correct order. Implementations must sanity-check URIs to avoid buffer overflows and code execution.
