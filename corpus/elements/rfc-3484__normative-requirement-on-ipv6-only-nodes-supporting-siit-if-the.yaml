document: rfc-3484
kind: normative-requirement
summary: On IPv6-only nodes supporting SIIT, if the destination is an IPv4-mapped address the candidate set MUST contain only IPv4-translatable addresses; if the destination is not IPv4-mapped, the candidate set MUST NOT contain IPv4-translatable addresses.
section: "4"
rfc2119_level: MUST
topics:
