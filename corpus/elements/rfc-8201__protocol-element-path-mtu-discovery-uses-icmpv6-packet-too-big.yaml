document: rfc-8201
kind: protocol-element
summary: Path MTU Discovery uses ICMPv6 Packet Too Big (PTB) messages to determine the MTU of a path. When a router cannot forward a packet due to its size, it discards the packet and returns a PTB message containing the MTU of the constricting link.
section: "3"
