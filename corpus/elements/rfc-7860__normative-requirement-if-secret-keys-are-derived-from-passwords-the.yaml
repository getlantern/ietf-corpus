document: rfc-7860
kind: normative-requirement
summary: If secret keys are derived from passwords, the derivation SHOULD be performed using the password-to-key algorithm from Appendix A.1 of RFC 3414 with MD5 replaced by the SHA-2 hash function H used in the HMAC-SHA-2 authentication protocol.
section: "9.3"
rfc2119_level: SHOULD
