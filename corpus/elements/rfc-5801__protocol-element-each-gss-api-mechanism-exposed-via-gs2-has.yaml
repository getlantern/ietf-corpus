document: rfc-5801
kind: protocol-element
summary: 'Each GSS-API mechanism exposed via GS2 has two SASL mechanism names: the base name (server does not support channel binding) and the base name suffixed with ''-PLUS'' (server does support channel binding). The ''-PLUS'' suffix is the sole signal for channel binding capability.'
