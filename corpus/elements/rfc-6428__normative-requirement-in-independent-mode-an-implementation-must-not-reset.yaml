document: rfc-6428
kind: normative-requirement
summary: In independent mode, an implementation MUST NOT reset bfd.RemoteDiscr upon transitioning to the DOWN state. In coordinated mode, an implementation SHOULD NOT reset bfd.RemoteDiscr until it is exiting the DOWN state.
section: "3.7"
rfc2119_level: MUST NOT
topics:
