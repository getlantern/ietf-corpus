document: rfc-4985
kind: protocol-element
summary: SRVName is defined as an otherName form within the GeneralName structure of the X.509 SubjectAltName extension. It is an IA5String with OID id-on-dnsSRV (id-on 7), encoding a service name and domain name in the form '_Service.Name'.
