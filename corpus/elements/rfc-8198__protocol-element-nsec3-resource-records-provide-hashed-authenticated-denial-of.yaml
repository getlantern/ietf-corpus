document: rfc-8198
kind: protocol-element
summary: NSEC3 resource records provide hashed authenticated denial of existence. Aggressive NSEC3 caching requires checking non-terminals and wildcards derived from query names, and is inapplicable when a covering NSEC3 RR has the Opt-Out flag set.
section: "5.2"
topics:
    - dns
    - security
