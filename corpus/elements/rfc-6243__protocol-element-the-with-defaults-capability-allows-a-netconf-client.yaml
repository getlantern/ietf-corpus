document: rfc-6243
kind: protocol-element
summary: The :with-defaults capability allows a NETCONF client to identify how defaults are processed by the server and provides new mechanisms for client control of server processing of default data. It is advertised via a capability URI with required 'basic-mode' parameter.
section: "4.1"
topics:
