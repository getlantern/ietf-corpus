document: rfc-4556
kind: normative-requirement
summary: The lifetime of the ticket returned by the KDC MUST NOT exceed that of the client's public-private key pair. For X.509 certificates, this is the certificate validity period unless configured otherwise.
section: 3.2.3
rfc2119_level: MUST
