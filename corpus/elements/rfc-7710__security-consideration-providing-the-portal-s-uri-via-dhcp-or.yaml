document: rfc-7710
kind: security-consideration
summary: Providing the portal's URI via DHCP or RA is a cleaner alternative to TLS hijacking and reduces user expectation of being hijacked; this may improve security by making users less willing to accept TLS interception from beyond the captive-portal network. Systems aware they are behind a captive portal can also refrain from sending cookies and credentials.
section: "4"
topics:
    - security
    - tls
