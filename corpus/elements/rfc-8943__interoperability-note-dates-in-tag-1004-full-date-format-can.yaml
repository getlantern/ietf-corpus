document: rfc-8943
kind: interoperability-note
summary: Dates in tag 1004 'full-date' format can be compared by normal lexicographic string comparison because digits are in fixed format ordered from most to least significant. Numeric dates in tag 100 format can be compared by normal integer comparison.
