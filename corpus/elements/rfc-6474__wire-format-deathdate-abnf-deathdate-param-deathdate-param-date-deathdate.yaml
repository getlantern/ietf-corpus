document: rfc-6474
kind: wire-format
summary: 'DEATHDATE ABNF: DEATHDATE-param = DEATHDATE-param-date / DEATHDATE-param-text; DEATHDATE-value = date-and-or-time / text. CALSCALE can only be present when the value is date-and-or-time and actually contains a date or date-time. LANGUAGE can only be present when the value is text.'
section: "2.3"
