document: rfc-7774
kind: security-consideration
summary: A forged MPL Parameter Configuration Option can cause excessive Layer 2 broadcasting by setting DM/C_K too high or DM/C_IMIN too low. Implementations MUST set reasonable bounds for each parameter, derived from implementation constraints or MAC/PHY specifications, to avoid network overload.
section: "4"
topics:
    - security
    - routing
