document: rfc-3321
kind: security-consideration
summary: The extended mechanisms described in RFC 3321 (explicit acknowledgement and shared compression) are believed not to introduce any security risks beyond those already identified in the base SigComp specification (RFC 3320). Acknowledgements should be piggybacked onto existing SigComp messages rather than sent standalone to avoid creating additional security risks.
section: "7"
topics:
