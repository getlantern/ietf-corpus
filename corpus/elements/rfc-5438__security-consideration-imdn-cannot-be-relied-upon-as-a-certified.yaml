document: rfc-5438
kind: security-consideration
summary: 'IMDN cannot be relied upon as a certified delivery service: IMDNs may be lost in transit, the IM Recipient may bypass IMDN issuance through policy or user agent manipulation, and the IM Recipient can lie about or delay the timestamp without any protocol-level detection.'
section: "14.3"
topics:
