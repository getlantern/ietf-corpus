document: rfc-6492
kind: normative-requirement
summary: The certificates field MUST be present and MUST contain the single EE certificate whose private key signed the CMS. This MUST NOT be an RPKI certificate, and SHOULD be a certificate that attests to the identity of the creator. The field MAY also contain CA certificates for path validation.
section: 3.1.1.4
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
