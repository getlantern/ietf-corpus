document: rfc-2814
kind: interoperability-note
summary: A non-SBM router that incorrectly forwards the SBM local-scope multicast messages (DSBMLogicalAddress or AllSBMAddress) between two DSBM-managed L2 domains may corrupt SBM protocol operation and cause over- or under-allocation of resources across domains.
section: "6.4"
topics:
    - qos
    - multicast
