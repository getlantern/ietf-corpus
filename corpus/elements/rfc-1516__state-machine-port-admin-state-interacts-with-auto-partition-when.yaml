document: rfc-1516
kind: state-machine
summary: 'Port admin state interacts with auto-partition: when rptrPortAdminStatus is set to disabled(2), the rptrPortAutoPartitionState is frozen at its current value. When the port is re-enabled, rptrPortAutoPartitionState resets to notAutoPartitioned(1) regardless of its pre-disabling value.'
