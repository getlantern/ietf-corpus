document: rfc-2590
kind: normative-requirement
summary: If a received ND Solicitation message contains a Source Link-layer Address option with a DLCI, the message MUST undergo Frame Relay-specific preprocessing before being passed to the ND protocol engine. This preprocessing replaces the received DLCI with the locally significant DLCI of the VC on which the frame arrived.
section: "8"
rfc2119_level: MUST
topics:
    - ip
