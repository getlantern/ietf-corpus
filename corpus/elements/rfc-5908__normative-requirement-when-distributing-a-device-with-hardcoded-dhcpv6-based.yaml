document: rfc-5908
kind: normative-requirement
summary: When distributing a device with hardcoded DHCPv6-based NTP configuration, that configuration MUST NOT include server locations not part of the distributing organization, to avoid overloading public NTP servers.
section: "3"
rfc2119_level: MUST NOT
topics:
