document: rfc-5640
kind: design-rationale
summary: A smaller Load-Balancing Block value leaves more bits for per-flow identification, yielding better entropy and lower ECMP polarization, but consumes more L2TPv3 Session IDs or GRE Keys. Deployments must arbitrate this trade-off based on the number of supported services.
