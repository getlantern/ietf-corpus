document: rfc-9080
kind: interoperability-note
summary: An HNCP node MAY announce a nonspecific IPv6 default route in addition to the source-specific default route required by REQ7. The source-specific route takes precedence on nodes that support it, and the nonspecific route may simplify interoperation with routing protocols that do not support source-specific routing.
section: "3.2"
topics:
    - routing
    - ip
