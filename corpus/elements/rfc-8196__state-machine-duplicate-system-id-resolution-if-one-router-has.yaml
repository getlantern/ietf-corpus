document: rfc-8196
kind: state-machine
summary: 'Duplicate System ID resolution: if one router has the S flag set (startup) and the other does not, the startup-mode router MUST generate a new System ID and restart. If both or neither are in startup mode, the router with the numerically smaller Router-Fingerprint MUST generate a new System ID and restart. If fingerprints are identical and duplication is in hellos, both MUST restart.'
section: 3.4.4
topics:
    - routing
