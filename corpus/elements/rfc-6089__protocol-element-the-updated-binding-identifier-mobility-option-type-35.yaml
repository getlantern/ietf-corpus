document: rfc-6089
kind: protocol-element
summary: The updated Binding Identifier Mobility Option (Type 35) adds a 7-bit BID-PRI field alongside the existing BID, Status, H-flag, and IPv4/IPv6 Care-of Address fields. BID-PRI value 0 is reserved and MUST NOT be used; a lower value means higher priority.
section: "4.1"
topics:
    - ip
    - mobility
