document: rfc-3193
kind: protocol-element
summary: IKE Phase 1 and Phase 2 SAs are established to protect L2TP traffic. Phase 2 quick mode IDs represent traffic to be protected, comprising address space, protocol, and port information. A new Phase 2 SA may be required when the responder changes its port number.
