document: rfc-8333
kind: interoperability-note
summary: 'Compared to PLSN, the local delay mechanism is simpler: PLSN has three possible behaviors (keep old next-hop, use new safe next-hop, use another safe next-hop) and applies to all nodes, while the local delay has exactly one behavior (keep current next-hop or active FRR path) and applies only to nodes adjacent to the failure.'
section: "10.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
