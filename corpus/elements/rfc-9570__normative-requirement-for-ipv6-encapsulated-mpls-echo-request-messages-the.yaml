document: rfc-9570
kind: normative-requirement
summary: For IPv6-encapsulated MPLS echo request messages, the IPv6 loopback address ::1/128 SHOULD be used as the destination address. The sender MAY alternatively select from the 0:0:0:0:0:FFFF:7F00/104 range.
section: "4"
rfc2119_level: SHOULD
topics:
    - mpls
    - ip
