document: rfc-3031
kind: design-rationale
summary: Aggregation (binding one label to a union of FECs that is itself a FEC within a domain) is supported to reduce label table size and label distribution control traffic. When ordered control is used, each LSR should adopt the granularity of its next hop; for independent control, consistent configuration of all LSRs is recommended for best results.
section: "3.20"
topics:
    - routing
