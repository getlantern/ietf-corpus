document: rfc-8045
kind: protocol-element
summary: IP-Port-Range (Type 241, Extended-Type 6) reports a contiguous range of IP source transport ports that have been allocated or deallocated for a user by an address-sharing device. It MAY appear only in Accounting-Request packets and MUST NOT appear in any other RADIUS packet.
section: 3.1.2
topics:
    - radius
    - nat
