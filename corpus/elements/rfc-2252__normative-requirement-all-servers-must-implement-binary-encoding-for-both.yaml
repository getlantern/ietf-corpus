document: rfc-2252
kind: normative-requirement
summary: All servers MUST implement binary encoding for both generating attribute values in search responses and parsing attribute values in add, compare, and modify requests when the attribute type is recognized and has Binary syntax. Clients requesting all attributes MUST be prepared to receive binary values and SHOULD NOT display unrecognized binary values to users.
section: 4.3.1
rfc2119_level: MUST
topics:
    - ldap
