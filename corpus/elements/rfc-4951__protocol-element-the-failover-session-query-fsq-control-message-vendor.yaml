document: rfc-4951
kind: protocol-element
summary: The Failover Session Query (FSQ) control message (Vendor ID 0, Attribute Type 21) is used to query session state from a peer. It MUST contain Message Type and at least one Failover Session State AVP; the M-bit on the Message Type AVP MUST be set to 0.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
