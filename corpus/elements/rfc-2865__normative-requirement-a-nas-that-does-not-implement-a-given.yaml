document: rfc-2865
kind: normative-requirement
summary: A NAS that does not implement a given service MUST NOT implement the RADIUS attributes for that service, and MUST treat a RADIUS Access-Accept authorizing an unavailable service as an Access-Reject instead.
section: "1.1"
rfc2119_level: MUST NOT
topics:
