document: rfc-6284
kind: interoperability-note
summary: When using 'portmapping-req' in SDP offer/answer, an answerer that supports the Token approach MUST echo the attribute unchanged; an answerer that does not implement this specification silently ignores the attribute and can still join the multicast session but cannot use Token-protected unicast services.
section: 7.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
