document: rfc-1288
kind: interoperability-note
summary: 'RFC 1288 corrects RFC 1196: the /W token is placed at the beginning of the query line (matching 4.3BSD Finger behavior), not at the end as RFC 1196 mistakenly specified. The BNF was also clarified to explicitly represent blank space.'
section: "1.4"
