document: rfc-7011
kind: wire-format
summary: 'The boolean data type is encoded as a single-octet integer with value 1 for true and value 2 for false; all other values are undefined. The dateTimeMicroseconds and dateTimeNanoseconds types share an identical 64-bit NTP Timestamp encoding (two 32-bit fields: Seconds and Fraction), but for dateTimeMicroseconds the bottom 11 bits of the Fraction field SHOULD be zero and MUST be ignored.'
section: 6.1.5
topics:
    - measurement
