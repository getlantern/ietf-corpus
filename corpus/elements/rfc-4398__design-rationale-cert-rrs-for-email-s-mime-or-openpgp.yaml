document: rfc-4398
kind: design-rationale
summary: CERT RRs for email (S/MIME or OpenPGP) change DNS access patterns from per-domain to per-user lookups. Wide deployment of certificate-based signed email could substantially increase DNS query volume and degrade cache effectiveness, though the magnitude of this impact is unknown.
section: "4"
topics:
    - dns
    - email
