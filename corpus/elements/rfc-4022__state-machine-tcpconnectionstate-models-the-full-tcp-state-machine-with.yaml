kind: state-machine
summary: 'tcpConnectionState models the full TCP state machine with states: closed(1), listen(2), synSent(3), synReceived(4), established(5), finWait1(6), finWait2(7), closeWait(8), lastAck(9), closing(10), timeWait(11), deleteTCB(12). The listen(2) state is included only for parallelism with the old table and should not appear in tcpConnectionTable; listeners belong in tcpListenerTable.'
