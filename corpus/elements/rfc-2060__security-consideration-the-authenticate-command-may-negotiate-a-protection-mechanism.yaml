document: rfc-2060
kind: security-consideration
summary: The AUTHENTICATE command MAY negotiate a protection mechanism that provides integrity and privacy for all subsequent protocol interactions, taking effect immediately after the authentication exchange concludes. Authentication mechanisms and protection mechanisms are each independently optional.
section: 6.2.1
topics:
