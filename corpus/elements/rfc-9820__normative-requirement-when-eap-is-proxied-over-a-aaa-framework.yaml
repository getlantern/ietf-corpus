document: rfc-9820
kind: normative-requirement
summary: When EAP is proxied over a AAA framework, RADIUS Access-Request packets MUST carry a Framed-MTU attribute with a value of 1024; Diameter MUST use the Framed-MTU AVP with value 1024, to signal the AAA server to limit EAP response size.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - radius
    - diameter
