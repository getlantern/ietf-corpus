document: rfc-7761
kind: design-rationale
summary: RFC 7761 removes the optional (*,*,RP) state, PIM Multicast Border Router (PMBR) features, and IPsec-based authentication from RFC 4601 because these features lack sufficient deployment experience. The document advances PIM-SM to Internet Standard while maintaining wire-level interoperability with RFC 4601 implementations.
section: "1"
topics:
    - multicast
    - routing
    - security
