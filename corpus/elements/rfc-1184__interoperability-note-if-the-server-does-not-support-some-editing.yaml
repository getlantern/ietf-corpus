document: rfc-1184
kind: interoperability-note
summary: If the server does not support some editing functions, it SHOULD send 'XXX SLC_DEFAULT 0' rather than 'XXX SLC_NOSUPPORT 0' in response to a SLC 0 SLC_DEFAULT 0 request, allowing the client to use its own local values for those functions instead of being forced to disable them.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
