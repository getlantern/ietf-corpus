document: rfc-1044
kind: normative-requirement
summary: In the ARP protocol, if ARP information arrives that contradicts a static routing table entry (as opposed to previously set dynamic ARP information), the ARP information SHOULD be ignored. Static entries are presumed to provide authentication in broadcast ARP environments.
section: BROADCAST ARP
rfc2119_level: SHOULD
topics:
    - ip
    - security
