document: rfc-5234
kind: protocol-element
summary: Core rule CRLF = CR LF (%x0D %x0A) is the Internet standard newline. CR = %x0D, LF = %x0A, HTAB = %x09, SP = %x20, WSP = SP / HTAB, VCHAR = %x21-7E (visible/printing characters), CTL = %x00-1F / %x7F (controls), OCTET = %x00-FF.
section: B.1
extracted_by: claude-sonnet-4-6
