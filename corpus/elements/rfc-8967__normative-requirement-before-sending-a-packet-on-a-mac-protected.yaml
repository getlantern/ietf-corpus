document: rfc-8967
kind: normative-requirement
summary: Before sending a packet on a MAC-protected interface, a PC TLV containing the current PC and Index MUST be appended to the packet body, and the PC MUST be incremented by a strictly positive amount. A node MUST NOT include multiple PC TLVs in a single packet.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
