document: rfc-2747
kind: normative-requirement
summary: All conforming implementations MUST implement HMAC-MD5 as the baseline authentication algorithm and MUST support smooth key rollover as described in the Key Management Procedures. Manual key distribution MUST be supported. Stronger algorithms such as HMAC-SHA1 are optional.
section: "6"
rfc2119_level: MUST
topics:
