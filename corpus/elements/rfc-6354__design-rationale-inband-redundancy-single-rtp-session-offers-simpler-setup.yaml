document: rfc-6354
kind: design-rationale
summary: Inband redundancy (single RTP session) offers simpler setup, easier NAT/firewall traversal, and lower overhead, while out-of-band (separate RTP sessions) offers flexibility for middleboxes to add/remove redundancy without requiring a special payload format.
