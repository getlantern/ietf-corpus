document: rfc-5520
kind: security-consideration
summary: A PCE providing a CPS decode response SHOULD verify that the LSR issuing the decode request is the LSR at the head of the CPS (i.e., the first node of the decoded ERO segment). This check largely contains the DoS threat from rogue LSRs sending random expansion requests.
section: "5"
topics:
    - security
    - routing
