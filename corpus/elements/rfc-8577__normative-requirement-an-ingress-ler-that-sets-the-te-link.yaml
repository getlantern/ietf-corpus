document: rfc-8577
kind: normative-requirement
summary: An ingress LER that sets the TE Link Label flag (Bit 16) MUST also set the 'label recording desired' flag in the SESSION_ATTRIBUTE object. A transit hop catering to this request MUST also check for other Attribute Flags introduced in this document.
section: "9.2"
rfc2119_level: MUST
topics:
