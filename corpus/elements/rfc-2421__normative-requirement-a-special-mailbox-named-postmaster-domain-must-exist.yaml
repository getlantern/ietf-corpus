document: rfc-2421
kind: normative-requirement
summary: A special mailbox named 'postmaster@domain' MUST exist on all systems for diagnostics. Implementations generating the non-mail-user@domain address MUST send a negative DSN (status 5.1.1) for any reply sent to that address.
section: 4.1.2
rfc2119_level: MUST
topics:
    - email
