document: rfc-6283
kind: normative-requirement
summary: For non-repudiation proof, the last Archive Time-Stamp MUST be valid at the time of the verification process. Each ATS MUST be valid relative to the time of the succeeding Archive Time-Stamp.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
