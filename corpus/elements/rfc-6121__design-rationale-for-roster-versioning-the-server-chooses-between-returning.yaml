document: rfc-6121
kind: design-rationale
summary: For roster versioning, the server chooses between returning the full roster or an empty IQ-result followed by incremental pushes; the incremental approach is preferred unless the full roster would use less bandwidth or the client's version ID is unrecognized.
section: 2.6.3
