document: rfc-8071
kind: interoperability-note
summary: RESTCONF Call Home only supports TLS transport (not SSH), consistent with the RESTCONF protocol itself. NETCONF Call Home supports both SSH and TLS. Only the TCP initiator role is reversed; all other client/server roles (SSH/TLS layer, NETCONF/RESTCONF layer) remain the same as in client-initiated connections.
section: "1"
topics:
    - netconf
    - tls
