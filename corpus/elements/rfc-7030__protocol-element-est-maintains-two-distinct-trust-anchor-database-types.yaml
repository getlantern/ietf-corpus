document: rfc-7030
kind: protocol-element
summary: 'EST maintains two distinct trust anchor database types on both client and server: Explicit TAs (specifically configured for EST use) and Implicit TAs (broadly available TAs such as those used by web browsers). The client MUST maintain this distinction to support proper authorization; using Implicit TAs allows verifying third-party-issued server certificates but carries different authorization semantics.'
section: "3.6"
topics:
    - pkix
    - security
    - tls
