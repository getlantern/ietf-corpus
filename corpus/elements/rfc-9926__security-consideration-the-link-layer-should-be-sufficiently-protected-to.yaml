document: rfc-9926
kind: security-consideration
summary: The link layer SHOULD be sufficiently protected to prevent rogue access; otherwise a rogue node with physical access to the network may inject packets and perform an attack from within. This inherits the security considerations of RFC 8505.
section: "11"
rfc2119_level: SHOULD
topics:
