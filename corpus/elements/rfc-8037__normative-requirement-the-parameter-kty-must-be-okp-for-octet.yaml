document: rfc-8037
kind: normative-requirement
summary: The parameter "kty" MUST be "OKP" for Octet Key Pair keys. The parameter "crv" MUST be present and contain the subtype of the key from the "JSON Web Elliptic Curve" registry. The parameter "x" MUST be present and contain the public key encoded using base64url.
section: "2"
rfc2119_level: MUST
topics:
    - jose
    - crypto
