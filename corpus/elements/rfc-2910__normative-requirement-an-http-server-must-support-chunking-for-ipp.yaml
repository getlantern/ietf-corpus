document: rfc-2910
kind: normative-requirement
summary: An HTTP server MUST support chunking for IPP requests, and an IPP client MUST support chunking for IPP responses per HTTP/1.1. The spec notes this may conflict with non-compliant HTTP/1.1 implementations that do not support chunking for POST methods or CGI scripts.
section: "4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
