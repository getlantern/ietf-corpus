document: rfc-9546
kind: design-rationale
summary: d-ACH introduces per-packet-level fields (Sequence Number, Node ID, Level, Session ID) beyond the standard PW Associated Channel Header because DetNet service sub-layer PREOF functions operate per packet rather than per segment, requiring OAM packets to carry sequencing information for PREOF processing.
section: "3.1"
topics:
