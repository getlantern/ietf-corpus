document: rfc-5506
kind: interoperability-note
summary: When multiplexing RTP and RTCP on the same port, de-multiplexing must handle Reduced-Size RTCP correctly. Reduced-Size RTCP increases the number of payload type values representing RTCP, reducing the available RTP payload type space.
section: 3.4.4
topics:
    - rtp
    - realtime
