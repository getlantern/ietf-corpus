document: rfc-6160
kind: normative-requirement
summary: If an implementation supports AuthEnvelopedData, it MUST follow EnvelopedData recommendations except that the content-encryption algorithm MUST be AES-GCM; the 128-bit version MUST be implemented and the 256-bit version SHOULD be implemented. AES-CCM MAY also be supported.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
