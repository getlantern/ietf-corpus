document: rfc-8661
kind: interoperability-note
summary: 'In Inter-AS Option C, SR may be independently deployed in each AS. If AS1 operates SR, the tunnel from an ingress PE to the AS border router (ASBR) is provided by the SR node segment, with a three-label stack: node segment to ASBR, labeled BGP label for the egress PE, and the service label.'
section: "4.4"
topics:
