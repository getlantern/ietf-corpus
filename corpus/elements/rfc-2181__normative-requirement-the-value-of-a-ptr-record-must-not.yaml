document: rfc-2181
kind: normative-requirement
summary: The value of a PTR record must not be an alias (CNAME label). There is no restriction that a PTR RRSet contain only one record; multiple PTR records for a name are permitted.
section: "10.2"
rfc2119_level: MUST NOT
