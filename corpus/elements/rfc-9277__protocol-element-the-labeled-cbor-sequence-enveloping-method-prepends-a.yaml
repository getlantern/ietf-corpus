document: rfc-9277
kind: protocol-element
summary: 'The Labeled CBOR Sequence enveloping method prepends a 12-byte label to a CBOR Sequence. The label is: outer tag 55800 (self-described CBOR Sequence), inner protocol-specific 4-byte tag, and a 3-byte CBOR byte string containing 0x42_4f_52 (''BOR'').'
section: "2.3"
