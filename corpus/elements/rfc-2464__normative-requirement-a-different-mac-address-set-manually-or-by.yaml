document: rfc-2464
kind: normative-requirement
summary: A different MAC address set manually or by software should not be used to derive the Interface Identifier. If such a MAC address must be used, its global uniqueness property should be reflected in the U/L bit.
section: "4"
rfc2119_level: SHOULD NOT
topics:
