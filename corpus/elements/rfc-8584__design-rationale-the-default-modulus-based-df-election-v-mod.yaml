document: rfc-8584
kind: design-rationale
summary: The default modulus-based DF election (V mod N) fails under non-uniform Ethernet Tag distributions (e.g., all-even or all-odd tags), can assign all DFs to one PE, and causes widespread DF reassignment whenever N changes by 1 due to a PE joining or leaving—resulting in needless churn. HRW was chosen because it provides near-uniform distribution regardless of key distribution and minimizes reassignment when the PE set changes.
section: 1.3.1
topics:
    - routing
