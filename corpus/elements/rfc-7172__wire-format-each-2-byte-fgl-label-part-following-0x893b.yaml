document: rfc-7172
kind: wire-format
summary: Each 2-byte FGL label part (following 0x893B) has a 3-bit priority field in bits 0–2, a 1-bit Drop Eligibility Indicator (DEI) in bit 3, and 12 bits of label information in bits 4–15. The High Part carries the campus transit priority; the Low Part carries the preserved original user priority.
section: "2.3"
