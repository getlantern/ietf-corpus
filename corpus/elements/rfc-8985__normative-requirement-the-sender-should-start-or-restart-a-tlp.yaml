document: rfc-8985
kind: normative-requirement
summary: The sender SHOULD start or restart a TLP PTO timer after transmitting new data or upon receiving a cumulative ACK for new data, unless it is already in fast recovery, RTO recovery, or segments have been SACKed (RACK.segs_sacked != 0).
section: "7.2"
rfc2119_level: SHOULD
topics:
    - tcp
