document: rfc-8371
kind: security-consideration
summary: Mobile node identifiers are considered private information. Packets including the MN identifier extension MUST be encrypted so that no personal information or trackable identifiers are inadvertently disclosed to passive observers. IPsec ESP in transport mode with confidentiality and integrity protection is one applicable mechanism.
section: "5"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - privacy
    - ipsec
