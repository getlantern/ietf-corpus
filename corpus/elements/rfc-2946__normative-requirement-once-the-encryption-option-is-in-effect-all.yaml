document: rfc-2946
kind: normative-requirement
summary: Once the Encryption option is in effect, all data in the negotiated direction, including TELNET options, is encrypted. Encryption begins with the octet immediately following the START command and ends after the END command.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
