document: rfc-6750
kind: interoperability-note
summary: The Bearer Authorization header syntax follows the Basic scheme usage from RFC 2617 Section 2 and does not conform to the generic syntax in RFC 2617 Section 1.2, though it is compatible with the HTTP/1.1 authentication framework being developed. This reflects existing deployments.
