document: rfc-9113
kind: interoperability-note
summary: Reducing SETTINGS_HEADER_TABLE_SIZE is not widely interoperable. Use of the connection preface to reduce the value below the initial value of 4,096 is somewhat better supported but may fail with some implementations.
