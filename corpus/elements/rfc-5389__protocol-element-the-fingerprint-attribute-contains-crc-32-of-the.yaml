document: rfc-5389
kind: protocol-element
summary: The FINGERPRINT attribute contains CRC-32 of the STUN message (up to but excluding FINGERPRINT itself) XOR'd with 0x5354554e. When present, FINGERPRINT MUST be the last attribute in the message, appearing after MESSAGE-INTEGRITY.
section: "15.5"
topics:
    - nat
    - realtime
