document: rfc-2806
kind: wire-format
summary: Non-unreserved characters (per RFC 2396) present in any tel/fax/modem URL MUST be percent-encoded before use. The ABNF specifies raw unescaped octets; implementations must also reverse-escape when parsing. visual-separator characters ('-', '.', '(', ')') are purely cosmetic and MUST be ignored during processing.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
