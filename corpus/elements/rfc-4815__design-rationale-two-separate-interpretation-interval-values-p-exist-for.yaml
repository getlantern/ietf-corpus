document: rfc-4815
kind: design-rationale
summary: 'Two separate interpretation interval values (p) exist for TS encoding: for timer-based compression (TIME_STRIDE ≠ 0), p = 2^(k-1) − 1 as per RFC 3095 Section 4.5.4; otherwise p = 2^(k-2) − 1 as per RFC 3095 Section 5.7. RFC 3095 was ambiguous about which value to use; the choice depends on whether timer-based compression is active.'
section: "4.3"
topics:
    - rtp
