document: rfc-3980
kind: interoperability-note
summary: SAM-3 specifies that a SCSI device shall have no more than one SCSI device name in the SCSI name string format regardless of the number of SCSI transport protocols it supports. Adding the NAA format to iSCSI enables a single transport-independent device name to be used across iSCSI and SAS transports.
section: "3"
topics:
    - ip
