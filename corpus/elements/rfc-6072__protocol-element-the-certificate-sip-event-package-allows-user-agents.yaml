document: rfc-6072
kind: protocol-element
summary: The 'certificate' SIP event package allows User Agents to subscribe to another user's AOR to retrieve that user's X.509 certificate. The credential service returns the certificate in a NOTIFY request authenticated via the SIP Identity mechanism (RFC 4474).
