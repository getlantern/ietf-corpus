document: rfc-7179
kind: normative-requirement
summary: When CHbHS is set to one, transit RBridges that do not support all critical hop-by-hop extensions present MUST drop the frame. When CItES is set, egress RBridges that do not support all critical extensions MUST drop the frame.
section: 2.3.1
rfc2119_level: MUST
