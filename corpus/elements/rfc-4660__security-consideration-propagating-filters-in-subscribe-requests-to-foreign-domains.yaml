document: rfc-4660
kind: security-consideration
summary: Propagating filters in SUBSCRIBE requests to foreign domains reveals sensitive information about a user's resource lists. An RLS MUST NOT forward a filter addressed to a resource under its administrative domain that is not on the resource list.
section: "8"
topics:
    - sip
    - security
    - privacy
    - realtime
