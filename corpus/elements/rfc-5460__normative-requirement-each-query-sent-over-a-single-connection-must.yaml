document: rfc-5460
kind: normative-requirement
summary: Each query sent over a single connection MUST have a unique transaction-id. A server MUST NOT read more query messages from a connection than it is prepared to process simultaneously.
section: "6.5"
rfc2119_level: MUST
topics:
    - dns
    - tcp
