document: rfc-1195
kind: normative-requirement
summary: The 'Protocols Supported' field MUST be present in all IS-IS Hello packets and all LSPs with LSP number 0 transmitted by IP-capable routers. If absent, the packet is assumed to originate from an OSI-only router.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
