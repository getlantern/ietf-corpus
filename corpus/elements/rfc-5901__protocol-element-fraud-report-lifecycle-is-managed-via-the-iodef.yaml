summary: 'Fraud report lifecycle is managed via the IODEF Incident ext-purpose attribute: empty or ''create'' denotes a new report, ''update'' indicates revision, and ''delete'' signals removal. These are advisory markers; operating procedures for the report lifecycle are environment-specific.'
