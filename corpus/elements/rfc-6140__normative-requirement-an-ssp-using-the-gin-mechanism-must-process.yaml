document: rfc-6140
kind: normative-requirement
summary: An SSP using the GIN mechanism MUST process inbound INVITE requests and SUBSCRIBE requests to the 'reg' event package by re-targeting them to the registered contact for the AOR, and SHOULD perform this processing for all other SIP method types including unrecognized methods.
section: "6"
rfc2119_level: MUST
topics:
