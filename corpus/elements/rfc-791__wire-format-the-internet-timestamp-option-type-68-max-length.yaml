document: rfc-791
kind: wire-format
summary: The Internet Timestamp option (Type=68, max length 40) contains a Pointer, 4-bit Overflow count, 4-bit Flag (0=timestamps only, 1=address+timestamp pairs, 3=prespecified addresses), and 32-bit timestamps in milliseconds since midnight UT. High-order bit set indicates non-standard time source.
section: "3.1"
