document: rfc-7545
kind: security-consideration
summary: Client authentication is optional in the base PAWS protocol; the Database MAY authenticate devices using TLS client certificates or application-layer mechanisms. Regulatory domains may impose additional requirements for device identity verification, particularly for higher-power fixed devices.
section: "10.4"
