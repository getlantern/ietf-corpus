document: rfc-2344
kind: normative-requirement
summary: In the Direct Delivery Style, the mobile node MUST designate the foreign agent as its default router. The foreign agent MUST detect packets sent by the mobile node and encapsulate them before forwarding.
section: 5.1.1
rfc2119_level: MUST
topics:
