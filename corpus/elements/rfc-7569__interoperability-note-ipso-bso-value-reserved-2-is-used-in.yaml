document: rfc-7569
kind: interoperability-note
summary: IPSO BSO value '(Reserved 2)' is used in some locales to mark information considered 'Restricted' by local policy — less sensitive than 'Confidential' but more sensitive than 'Unclassified' — representing a locally extended interpretation beyond the base RFC 1108 definition.
section: "3.1"
