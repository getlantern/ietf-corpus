document: rfc-8513
kind: security-consideration
summary: NETCONF access to the module MUST use SSH (RFC 6242) as the mandatory-to-implement secure transport; RESTCONF access MUST use HTTPS with TLS (RFC 8446). The NACM (RFC 8341) SHOULD be used to restrict access to authorized NETCONF/RESTCONF users.
section: "4"
rfc2119_level: MUST
topics:
