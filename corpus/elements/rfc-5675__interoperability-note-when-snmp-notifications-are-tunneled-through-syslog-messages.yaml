document: rfc-5675
kind: interoperability-note
summary: When SNMP notifications are tunneled through SYSLOG messages and then back to SNMP (via SYSLOG-MSG-MIB), truncation may occur due to SYSLOG transport size restrictions and the more verbose textual encoding, resulting in incomplete reconstructed SNMP notifications.
section: "4"
topics:
