document: rfc-4279
kind: protocol-element
summary: If the server does not recognize the PSK identity, it MAY respond with an 'unknown_psk_identity' alert (value 115), or MAY continue as if the identity existed but the key was incorrect (responding with 'decrypt_error') to hide that the identity was unknown.
