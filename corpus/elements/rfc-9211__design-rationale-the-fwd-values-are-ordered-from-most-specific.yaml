document: rfc-9211
kind: design-rationale
summary: The `fwd` values are ordered from most specific to least specific so that implementations are guided to report the most precise reason for forwarding, improving debuggability. The value `miss` exists as a fallback when an implementation cannot distinguish between uri-miss and vary-miss.
section: "2.2"
topics:
    - http
