document: rfc-3831
kind: protocol-element
summary: Address mapping for IPv6 unicast requires both the non-volatile 64-bit N_Port_Name and the volatile 24-bit N_Port_ID. An Nx_Port MUST validate the N_Port_Name/N_Port_ID mapping after FC link interruption events such as LIP or NOS/OLS.
section: "8"
