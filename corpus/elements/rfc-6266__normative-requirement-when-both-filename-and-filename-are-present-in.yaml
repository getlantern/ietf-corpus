document: rfc-6266
kind: normative-requirement
summary: When both 'filename' and 'filename*' are present in a single header field value, recipients SHOULD pick 'filename*' and ignore 'filename', allowing senders to provide a fallback for legacy agents while still conveying the full Unicode filename.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - http
