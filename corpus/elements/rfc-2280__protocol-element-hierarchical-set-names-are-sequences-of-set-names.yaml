document: rfc-2280
kind: protocol-element
summary: Hierarchical set names are sequences of set names and AS numbers separated by colons (e.g., AS1:AS-CUSTOMERS). A set X1:...:Xn can only be created by the maintainer of X1:...:Xn-1, partitioning the name space under the controlling entity.
section: "5.4"
topics:
    - routing
