document: rfc-9513
kind: protocol-element
summary: The SRv6 Capabilities TLV (Type=20) is an optional top-level TLV of the OSPFv3 Router Information LSA used to advertise a router's support for SR Segment Endpoint Node functionality and SRv6-related capabilities. It contains a 2-octet Flags field and an optional O-flag indicating support for the O-flag in the SRH as specified in RFC 9259.
section: "2"
topics:
