document: rfc-6658
kind: normative-requirement
summary: Although the packet PW is a point-to-point connection, use of a multicast destination address in the Ethernet encapsulation is REQUIRED by some client-layer protocols. Peers MUST be prepared to handle a multicast destination address in the Ethernet encapsulation.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
