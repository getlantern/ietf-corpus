document: rfc-3896
kind: state-machine
summary: 'The loopback state machine for dsx3LoopbackConfig supports states: NoLoop, PayloadLoop, LineLoop, OtherLoop, InwardLoop, and DualLoop (LineLoop + InwardLoop simultaneously). A manager can undo far-end-established loopbacks, but the far end cannot undo manager-established loopbacks. A far-end NoLoopback request leaves a manager-established InwardLoop in place.'
section: 2.2.4
topics:
    - snmp
extracted_by: claude-sonnet-4-6
