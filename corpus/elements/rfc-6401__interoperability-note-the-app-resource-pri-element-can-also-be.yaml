summary: The APP_RESOURCE_PRI element can also be used at boundaries with non-RSVP QoS signaling protocols such as the NSIS Signaling Layer Protocol (NSLP) for QoS Signaling (RFC 5974) to remap application-level resource priority into RSVP admission or preemption priority.
