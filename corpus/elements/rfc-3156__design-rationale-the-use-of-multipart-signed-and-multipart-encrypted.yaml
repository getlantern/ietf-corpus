document: rfc-3156
kind: design-rationale
summary: The use of multipart/signed and multipart/encrypted (from RFC 1847) cleanly separates the signed message body from the signature, enabling recovery of signed message bodies without parsing PGP-specific data structures — a key deficiency in earlier PGP/MIME approaches predating RFC 2015.
