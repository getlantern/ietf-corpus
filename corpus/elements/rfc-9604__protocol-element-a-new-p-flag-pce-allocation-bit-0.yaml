document: rfc-9604
kind: protocol-element
summary: A new P flag (PCE-allocation, bit 0) is added to the LSP object. When set to 1, it signals that the PCC requests the PCE to make allocations for the LSP, or conversely that the PCE has allocated the binding label/SID. The TE-PATH-BINDING TLV must be present alongside P=1.
section: "8"
topics:
