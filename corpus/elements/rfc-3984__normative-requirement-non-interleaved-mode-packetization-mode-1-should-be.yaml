document: rfc-3984
kind: normative-requirement
summary: Non-Interleaved Mode (packetization-mode=1) SHOULD be supported. Only single NAL unit packets, STAP-As, and FU-As MAY be used; STAP-Bs, MTAPs, and FU-Bs MUST NOT be used. Interleaved Mode (packetization-mode=2) requires STAP-Bs, MTAPs, FU-As, and FU-Bs; STAP-As and single NAL unit packets MUST NOT be used.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
