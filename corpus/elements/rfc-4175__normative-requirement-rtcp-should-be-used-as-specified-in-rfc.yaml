document: rfc-4175
kind: normative-requirement
summary: RTCP SHOULD be used as specified in RFC 3550. For high-data-rate streams where RTCP SR octet count and cumulative loss fields wrap quickly, other means of tracking these variables SHOULD be used for network monitoring.
