document: rfc-8485
kind: privacy-consideration
summary: All aspects of a vector of trust contain potentially privacy-sensitive information. Even the absence of specific attributes, or the presence of high proofing or strong token indicators, can reveal more about a user than intended. IdPs and RPs should exchange only the information necessary for the use case.
section: "9"
topics:
