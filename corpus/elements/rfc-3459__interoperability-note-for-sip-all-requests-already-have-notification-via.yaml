document: rfc-3459
kind: interoperability-note
summary: For SIP, all requests already have notification via response status codes; RFC 3204 specifies that a content gateway generates a 415 (Unsupported Media Type) response when a REQUIRED body part cannot be delivered. The DSN/MDN notification table in Section 5.2 is informative for SIP.
