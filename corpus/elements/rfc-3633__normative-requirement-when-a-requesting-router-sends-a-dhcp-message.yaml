document: rfc-3633
kind: normative-requirement
summary: When a requesting router sends a DHCP message, it SHOULD be sent on the interface associated with the upstream router (ISP network). When using unicast after receiving the Server Unicast option, the source address SHOULD be an address from the upstream interface suitable for the delegating router to use in responding.
section: "8"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
