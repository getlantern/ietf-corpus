document: rfc-7524
kind: normative-requirement
summary: When the mapping between an inter-area P2MP service LSP for global table multicast and the intra-area P2MP LSP is many-to-one, the intra-area P2MP LSP MUST be signaled with no Penultimate Hop Popping (PHP), enabling egress PEs to determine the sender upstream node from the preserved label stack.
section: 7.2.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
