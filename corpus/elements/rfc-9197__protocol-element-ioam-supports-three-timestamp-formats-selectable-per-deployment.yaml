document: rfc-9197
kind: protocol-element
summary: 'IOAM supports three timestamp formats selectable per deployment via management plane: PTP Truncated (64-bit, 1 ns resolution, epoch 1970, wraps 2106), NTP 64-bit (233 ps resolution, epoch 1900, wraps 2036), and POSIX-based (1 µs resolution, epoch 1970, wraps 2106). The format is encoded as 32-bit seconds + 32-bit fraction fields.'
