document: rfc-6364
kind: normative-requirement
summary: When a FEC scheme uses an Explicit Source FEC Payload ID, the 'FEC/<proto>' transport protocol identifier MUST be registered with IANA. If a FEC scheme does not use the Explicit Source FEC Payload ID, the original transport protocol identifier MUST be used to support backward compatibility with receivers that do not support FEC.
section: "4.1"
rfc2119_level: MUST
topics:
    - registry
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
