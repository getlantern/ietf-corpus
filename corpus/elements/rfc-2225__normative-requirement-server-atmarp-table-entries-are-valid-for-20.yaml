document: rfc-2225
kind: normative-requirement
summary: Server ATMARP table entries are valid for 20 minutes. If an entry ages beyond 20 minutes without being refreshed by the client, that entry is deleted from the table regardless of the state of any associated VCs.
section: "8.4"
rfc2119_level: MUST
topics:
    - ip
