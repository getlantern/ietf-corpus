document: rfc-5723
kind: normative-requirement
summary: When an IKE SA is deleted by either party, the client MUST delete its stored ticket. When credentials associated with the IKE SA are invalidated (e.g., user logout), the ticket MUST also be deleted.
section: "6.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
