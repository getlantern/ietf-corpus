document: rfc-4337
kind: security-consideration
summary: Non-compliant MPEG streams injected into an MP4 file can overload receiver/decoder buffers, potentially crashing or compromising the receiver. This is especially dangerous for end-to-end systems like MPEG where buffer models are precisely defined.
section: "4"
topics:
    - security
