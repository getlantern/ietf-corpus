document: rfc-9946
kind: interoperability-note
summary: UDPSTP is not interoperable with OWAMP (RFC 4656), TWAMP (RFC 5357), or STAMP (RFC 8762); those protocols lack closed-loop feedback operation. UDPSTP is at least partially compliant with RFC 8085 Section 3.1 when the bottleneck is congested, limiting congestion duration to the minimum required to determine capacity.
section: "1"
topics:
