document: rfc-8536
kind: privacy-consideration
summary: Transmission of TZif data over an insecure channel could leak the past, current, or future location of a device or user. TZif data transmitted over a public communications channel MUST be protected with a confidentiality layer such as TLS.
section: "7"
rfc2119_level: MUST
topics:
    - privacy
    - tls
