document: rfc-1284
kind: protocol-element
summary: dot3StatsSingleCollisionFrames (dot3StatsEntry 4) and dot3StatsMultipleCollisionFrames (dot3StatsEntry 5) count successfully transmitted frames inhibited by exactly one or more than one collision, respectively. A frame is counted in at most one of these two objects and is also counted in ifOutUcastPkts or ifOutNUcastPkts.
