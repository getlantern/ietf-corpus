document: rfc-6466
kind: protocol-element
summary: The 'image' media type for SDP is used to describe a media stream whose content consists of one or more separate images. The media subtype further describes the specific format of the image, and it is primarily used to establish T.38 real-time facsimile media streams via SIP.
