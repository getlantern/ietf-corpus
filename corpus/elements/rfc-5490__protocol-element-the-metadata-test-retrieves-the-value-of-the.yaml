document: rfc-5490
kind: protocol-element
summary: The "metadata" test retrieves the value of the mailbox annotation "annotation-name" for mailbox "mailbox" via the IMAP METADATA extension, then compares it against "key-list". Returns true if the annotation exists and its value matches any key. Default match type is ":is" and default comparator is "i;ascii-casemap". Capability string is "mboxmetadata".
section: "3.3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
