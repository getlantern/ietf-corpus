document: rfc-9293
kind: registry
summary: The 'TCP Header Flags' registry (IANA) controls assignment of the 8 control bits in the TCP header. Currently assigned flags are CWR, ECE, URG, ACK, PSH, RST, SYN, and FIN. A separate IANA registry manages all defined TCP Options, including experimental option space defined in RFC 6994.
section: "3.1"
topics:
    - tcp
    - registry
