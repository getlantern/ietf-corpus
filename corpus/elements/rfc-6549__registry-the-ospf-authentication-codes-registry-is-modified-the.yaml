document: rfc-6549
kind: registry
summary: 'The OSPF Authentication Codes registry is modified: the AuType field is reduced from 16 bits to 8 bits, making values 256–65535 no longer defined and therefore deprecated. These values were previously designated ''Reserved and should not be assigned,'' so there is no backward compatibility issue.'
