document: rfc-1243
kind: normative-requirement
summary: Management stations must be prepared to receive from agents tabular information corresponding to entries not currently in use. Proper interpretation of such entries requires examination of the relevant status object (atportStatus, rtmpState, kipState, zipZoneState, or nbpState).
