document: rfc-2460
kind: normative-requirement
summary: Every link in the internet must have an MTU of 1280 octets or greater. Links that cannot convey a 1280-octet packet in one piece must provide link-specific fragmentation and reassembly below the IPv6 layer.
section: "5"
rfc2119_level: MUST
topics:
    - ip
