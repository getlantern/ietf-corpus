document: rfc-2925
kind: protocol-element
summary: 'pingImplementationTypeDomains registers four standard ping implementation types: pingIcmpEcho(1), pingUdpEcho(2), pingSnmpQuery(3), pingTcpConnectionAttempt(4). Additional enterprise-specific types SHOULD be registered under enterprise OIDs, not beneath pingImplementationTypeDomains.'
section: "4.1"
