document: rfc-4032
kind: protocol-element
summary: Status types defined in RFC 3312 are end-to-end and segmented. New precondition specifications must declare which applies. For segmented status, an address change at one segment may or may not affect precondition status at the remote segment.
section: "3.2"
topics:
