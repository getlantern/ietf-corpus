document: rfc-5361
kind: protocol-element
summary: If the <one> or <except> element lacks a scheme, conversion to a SIP URI is done by prepending 'sip:' to the 'id' attribute value, provided the characters are valid for SIP URI user and hostpart components. If conversion is not possible (e.g., UTF-8 characters in user portion), the identity condition evaluates to FALSE.
section: 3.1.2.3
topics:
    - sip
