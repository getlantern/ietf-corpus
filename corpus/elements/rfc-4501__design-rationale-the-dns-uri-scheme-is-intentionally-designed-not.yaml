document: rfc-4501
kind: design-rationale
summary: The DNS URI scheme is intentionally designed not to specify DNS protocol fields, so that the URI may be used in contexts where the DNS protocol is not used directly (e.g., zone file editors, DNS configuration files). A more detailed URI syntax mapping closely to DNS protocol parameters is considered out of scope.
section: "2"
topics:
