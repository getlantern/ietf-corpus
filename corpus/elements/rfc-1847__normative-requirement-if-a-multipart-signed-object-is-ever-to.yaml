document: rfc-1847
kind: normative-requirement
summary: If a multipart/signed object is ever to be transferred over the standard Internet SMTP infrastructure, the MIME body is constrained to 7 bits. Material requiring 8bit or binary content-transfer-encoding MUST be encoded using quoted-printable or base64.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
