document: rfc-7877
kind: protocol-element
summary: 'SED Group Offer (SedGrpOfferType) controls peering access to SED Groups. Fields: sedGrpOfferKey, status (offered/accepted — server-controlled, client values ignored), offerDateTime, and acceptDateTime. A peer organization''s ID is added to the SED Group''s peeringOrg list only after offer and acceptance.'
