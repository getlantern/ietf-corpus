document: rfc-6368
kind: design-rationale
summary: A BGP/MPLS VPN is modeled as a provider-managed Internal BGP Route Server interconnecting customer sites. Routes learned by any PE are available to all other PEs importing the relevant Route Target, conceptually equivalent to a centralized route server with split-horizon to prevent loops.
section: "3"
topics:
    - bgp
    - vpn
    - mpls
