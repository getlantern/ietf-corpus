document: rfc-5364
kind: protocol-element
summary: The 'copyControl' attribute is added to the <entry> element of the XML resource list format. It takes values 'to' (primary recipient), 'cc' (carbon copy), or 'bcc' (blind carbon copy), analogous to email addressing. The default value when absent is 'bcc'.
