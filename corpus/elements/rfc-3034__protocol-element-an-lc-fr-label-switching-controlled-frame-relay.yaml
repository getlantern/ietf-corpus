document: rfc-3034
kind: protocol-element
summary: An LC-FR (label switching controlled Frame Relay) interface is a Frame Relay interface controlled by the label switching control component where packets carry labels in the DLCI field. A FR-LSR is an LSR with one or more LC-FR interfaces that forwards frames between such interfaces using DLCI-carried labels.
