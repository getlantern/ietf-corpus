document: rfc-2982
kind: design-rationale
summary: Expression syntax is based on ANSI C rather than an SNMP-specific language because C-style arithmetic and boolean operators are widely understood and sufficiently expressive for MIB calculations. The subset is intentionally restricted (no casting, limited constant types) to keep implementation tractable within managed systems.
