document: rfc-4122
kind: wire-format
summary: 'A UUID is 16 octets (128 bits) encoded with most significant byte first (network byte order), comprising: time_low (32-bit unsigned, octets 0–3), time_mid (16-bit unsigned, octets 4–5), time_hi_and_version (16-bit unsigned, octets 6–7), clock_seq_hi_and_reserved (8-bit unsigned, octet 8), clock_seq_low (8-bit unsigned, octet 9), and node (48-bit unsigned, octets 10–15).'
section: 4.1.2
extracted_by: claude-sonnet-4-6
