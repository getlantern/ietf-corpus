document: rfc-6827
kind: protocol-element
summary: 'Local adaptation is advertised as one or more Interface Switching Capability Descriptor (ISCD) sub-TLVs (type 15) within the Link TLV. A link between layers requires at least two ICSDs: one for the server-layer termination capability and one for the client-layer adaptation capability.'
section: "5.1"
topics:
    - routing
