document: rfc-7217
kind: security-consideration
summary: The method prevents trivial host-tracking across networks because the IID changes as the network prefix and/or Network_ID changes. It also mitigates address-scanning attacks that exploit predictable OUI-based Interface Identifiers embedded in MAC-derived IIDs.
