document: rfc-5189
kind: protocol-element
summary: The Policy Enable Rule (PER) is a mandatory configuration transaction that enables packet flow between an internal endpoint (A0) and external endpoint (A3) through the middlebox. The agent sends A0 and A3; the middlebox assigns or reuses (from a prior PRR) A1 and A2, establishes bindings or pinholes according to the specified direction (inbound, outbound, bidirectional), and returns A1 and A2.
section: 2.3.9
topics:
    - nat
