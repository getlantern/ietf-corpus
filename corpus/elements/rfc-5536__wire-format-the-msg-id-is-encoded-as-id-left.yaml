document: rfc-5536
kind: wire-format
summary: The msg-id is encoded as '<' id-left '@' id-right '>' where id-left is dot-atom-text and id-right is dot-atom-text or no-fold-literal. No comments or whitespace are permitted inside. The entire msg-id including angle brackets MUST NOT exceed 250 octets.
section: 3.1.3
