document: rfc-5923
kind: interoperability-note
summary: 'Connection reuse interacts with DNS SRV load balancing: over time a proxy will maintain a distinct aliased connection to each SRV-selected server (e.g., S1, S2, S3). Once established, subsequent traffic continues to be distributed across the downstream servers in the normal SRV manner.'
section: "10"
topics:
