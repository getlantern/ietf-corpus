document: rfc-7184
kind: protocol-element
summary: 'The Topology Information Base is represented by five tables: olsrv2TibAdRemoteRouterSetTable (routers transmitting TC messages), olsrv2TibRouterTopologySetTable (discovered inter-router links indexed by from/to originator address pairs), olsrv2TibRoutableAddressTopologySetTable (routable addresses and advertising routers), olsrv2TibAttNetworksSetTable (external attached networks), and olsrv2TibRoutingSetTable (next-hop routing entries).'
section: "5.5"
topics:
