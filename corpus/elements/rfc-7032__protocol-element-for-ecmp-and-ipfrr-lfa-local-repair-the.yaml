document: rfc-7032
kind: protocol-element
summary: For ECMP and IPFRR LFA local-repair, the access LSR/ABR proactively requests labels on both best next-hop and alternate next-hop DoD sessions. For remote LFA, it also requests labels from the alternate next hop toward the PQ node and from the PQ node toward the destination FEC.
