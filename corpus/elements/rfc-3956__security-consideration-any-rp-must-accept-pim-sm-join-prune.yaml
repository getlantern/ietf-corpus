document: rfc-3956
kind: security-consideration
summary: 'Any RP must accept PIM-SM Join/Prune/Register messages from any DR in the Internet, creating a potential Denial of Service vector. Mitigation: the RP can discard all such messages for multicast addresses that do not encode the RP''s own address.'
section: "10"
topics:
