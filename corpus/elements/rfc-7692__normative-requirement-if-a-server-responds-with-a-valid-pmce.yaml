document: rfc-7692
kind: normative-requirement
summary: If a server responds with a valid PMCE element in Sec-WebSocket-Extensions and the WebSocket Connection is established, both endpoints MUST use the compression/decompression algorithm described in Section 6, configured with the 'agreed parameters' returned by the server.
