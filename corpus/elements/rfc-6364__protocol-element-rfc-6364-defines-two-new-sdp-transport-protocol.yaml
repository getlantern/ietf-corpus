summary: 'RFC 6364 defines two new SDP transport protocol identifiers: ''FEC/UDP'' for source flows that append an Explicit Source FEC Payload ID to a UDP-formatted input stream, and ''UDP/FEC'' for FEC repair packet flows as defined in RFC 6363.'
