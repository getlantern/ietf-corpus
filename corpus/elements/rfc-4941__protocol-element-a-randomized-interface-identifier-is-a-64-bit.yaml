document: rfc-4941
kind: protocol-element
summary: A randomized interface identifier is a 64-bit value derived by computing the MD5 digest over a concatenation of a history value and the IEEE-derived interface identifier, taking the leftmost 64 bits, and setting bit 6 to zero to indicate local significance only.
