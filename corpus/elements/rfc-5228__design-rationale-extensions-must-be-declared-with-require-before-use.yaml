document: rfc-5228
kind: design-rationale
summary: Extensions must be declared with 'require' before use, and if a required extension is unavailable the entire script must not execute. This design, borrowed from LISP and Tcl experience, ensures scripts are not silently altered by extensions the author was unaware of.
section: 2.10.5
topics:
    - email
