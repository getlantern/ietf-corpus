document: rfc-8583
kind: interoperability-note
summary: If an agent does not support the Load mechanism, it relays answer messages without processing load information AVPs, which are passed through unchanged. This allows HOST-type load reports to reach non-peer nodes that perform server selection.
section: "5.1"
