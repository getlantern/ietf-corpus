document: rfc-6550
kind: protocol-element
summary: The DODAG Information Object (DIO, Code 0x01) is the primary RPL control message. Nodes multicast DIOs to the all-RPL-nodes address (ff02::1a) to advertise DODAG membership, Rank, Objective Function, and routing metrics, enabling neighbor DODAG joining and maintenance.
section: "6.3"
