document: rfc-8040
kind: normative-requirement
summary: The server MUST maintain a unique opaque entity-tag for the {+restconf}/data datastore resource and MUST return it in the 'ETag' header for retrieval requests. The entity-tag is only affected by configuration data resources and MUST NOT be updated for non-configuration data changes.
section: 3.4.1.2
rfc2119_level: MUST
topics:
    - netconf
    - yang
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
