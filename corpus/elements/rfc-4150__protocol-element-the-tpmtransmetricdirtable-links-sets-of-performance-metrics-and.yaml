document: rfc-4150
kind: protocol-element
summary: The tpmTransMetricDirTable links sets of performance metrics and protocol transactions to application directory entries, enumerating every (application, protocol-transaction, metric) combination the agent can collect. The table is pre-populated at boot and does not support runtime row creation by management applications.
