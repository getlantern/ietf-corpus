document: rfc-9820
kind: protocol-element
summary: 'The OSCORE Master Secret and Master Salt are derived as: Master Secret = KDF(MSK, CS | "COAP-EAP OSCORE MASTER SECRET", length) and Master Salt = KDF(MSK, CS | "COAP-EAP OSCORE MASTER SALT", length), where CS is the concatenation of the CS-C and CS-I CBOR arrays from the cipher suite negotiation.'
section: "6.2"
topics:
