document: rfc-6038
kind: wire-format
summary: 'The Request-TW-Session packet for Reflect Octets mode adds two new fields after the Type-P Descriptor: ''Octets to be reflected'' (2 octets) containing octets the Server MUST echo in the Accept Session, and ''Length of padding to reflect'' (2 octets, unsigned binary) specifying how many padding octets the Session-Reflector SHALL return in its test packet.'
section: "4.2"
topics:
