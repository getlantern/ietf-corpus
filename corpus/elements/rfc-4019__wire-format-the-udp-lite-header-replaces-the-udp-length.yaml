document: rfc-4019
kind: wire-format
summary: The UDP-Lite header replaces the UDP Length field with a 16-bit Checksum Coverage field, followed by a 16-bit Checksum. Source Port and Destination Port are each 16 bits, identical to UDP. UDP-Lite and UDP do not share the same IP protocol identifier.
section: "3.1"
topics:
    - udp
