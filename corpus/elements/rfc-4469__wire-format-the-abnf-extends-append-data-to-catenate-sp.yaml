document: rfc-4469
kind: wire-format
summary: 'The ABNF extends append-data to: "CATENATE" SP "(" cat-part *(SP cat-part) ")". A cat-part is either a text-literal ("TEXT" SP literal) or a url ("URL" SP astring). Response codes are extended with toobig-response-code ("TOOBIG") and badurl-response-code ("BADURL" SP url-resp-text).'
