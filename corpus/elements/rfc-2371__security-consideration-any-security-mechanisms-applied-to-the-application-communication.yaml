document: rfc-2371
kind: security-consideration
summary: Any security mechanisms applied to the application communication protocol are liable to be subverted unless corresponding mechanisms are applied to the TIP commitment protocol at the same level. A TIP implementation may refuse to provide service unless TLS is used with packet encryption and mutual authentication.
section: "16.1"
topics:
    - security
    - tls
