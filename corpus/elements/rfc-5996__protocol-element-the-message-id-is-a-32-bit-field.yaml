document: rfc-5996
kind: protocol-element
summary: The Message ID is a 32-bit field in every IKE header used to match requests to responses and detect retransmissions. It is zero for IKE_SA_INIT (including retries caused by COOKIE or INVALID_KE_PAYLOAD) and incremented for each subsequent exchange. Message IDs are cryptographically protected and provide replay protection.
section: "2.2"
topics:
    - ipsec
    - security
