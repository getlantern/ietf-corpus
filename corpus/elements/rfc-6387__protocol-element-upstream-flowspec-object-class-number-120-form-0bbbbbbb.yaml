document: rfc-6387
kind: protocol-element
summary: UPSTREAM_FLOWSPEC object (class number 120, form 0bbbbbbb) is carried in Path messages and conveys the bandwidth resources to be reserved in the upstream direction for an asymmetric bandwidth bidirectional LSP. Its format and C-Types are identical to those of the FLOWSPEC object (C-Num 9).
section: "2.1"
topics:
