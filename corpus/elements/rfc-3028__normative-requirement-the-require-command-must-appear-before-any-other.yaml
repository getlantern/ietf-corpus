document: rfc-3028
kind: normative-requirement
summary: The 'require' command MUST appear before any other command (except another require). Any require appearing after a non-require command is an error. Scripts that declare an unknown capability via require MUST NOT be executed at all.
section: "3.2"
rfc2119_level: MUST
topics:
