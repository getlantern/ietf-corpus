document: rfc-4095
kind: interoperability-note
summary: Wildcards are appropriate for this application, allowing multiple solicitation class keywords sharing a common prefix to point to the same URI. However, implementors and zone administrators should exercise care because wildcards may have unintended effects if multiple types of NAPTR resource records are used.
