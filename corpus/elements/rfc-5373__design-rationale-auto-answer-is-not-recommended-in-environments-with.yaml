document: rfc-5373
kind: design-rationale
summary: Auto-answer is NOT RECOMMENDED in environments with parallel forking because forking can cause multiple UASs to auto-accept simultaneously, exacerbating the multiple-acceptance problem. The document suggests early media or dynamic conferencing as alternatives.
