document: rfc-3730
kind: normative-requirement
summary: Objects eligible for transfer MUST have associated authorization information that MUST be provided to complete the <transfer> command. Object mappings MUST provide features to restrict transfer queries to authorized clients.
section: 2.9.3.4
rfc2119_level: MUST
topics:
    - security
