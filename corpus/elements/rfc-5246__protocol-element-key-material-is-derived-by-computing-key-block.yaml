kind: protocol-element
summary: Key material is derived by computing key_block = PRF(master_secret, "key expansion", server_random + client_random) and partitioning it into client/server write MAC keys, encryption keys, and IVs in that order. AES_256_CBC_SHA256 requires the most material at 128 bytes total.
