document: rfc-8049
kind: design-rationale
summary: Route Target (RT) allocation for BGP PE-based VPNs is out of scope for the model; the management system is expected to allocate RTs automatically upon receiving a VPN service creation request, either by querying a network OSS or drawing from a pre-assigned RT pool. The model provides the topology request as input; the allocation mechanism is left to the implementation.
section: 6.2.1.1
topics:
    - yang
    - vpn
    - bgp
    - routing
