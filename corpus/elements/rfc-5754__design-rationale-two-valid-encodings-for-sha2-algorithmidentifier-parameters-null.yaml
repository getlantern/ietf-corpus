document: rfc-5754
kind: design-rationale
summary: Two valid encodings for SHA2 AlgorithmIdentifier parameters (NULL vs absent) exist because the OPTIONAL qualifier was lost when the 1988 AlgorithmIdentifier syntax was translated into 1997 syntax, then recovered via a defect report. By the time of recovery, many implementations were already encoding parameters as NULL, creating a persistent interoperability split.
