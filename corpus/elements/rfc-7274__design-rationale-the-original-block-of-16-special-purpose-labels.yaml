document: rfc-7274
kind: design-rationale
summary: The original block of 16 special-purpose labels (values 0-15) is too small for experimental or private use ranges. The Extended Special-Purpose MPLS Label Values registry provides a much larger space (up to ~1M values) that can accommodate both standard allocations and an experimental range (240-255).
