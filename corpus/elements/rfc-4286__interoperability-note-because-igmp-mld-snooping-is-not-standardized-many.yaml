document: rfc-4286
kind: interoperability-note
summary: Because IGMP/MLD snooping is not standardized, many vendor-specific mechanisms exist to identify multicast routers, leading to interoperability issues between routers and snooping switches from different vendors. MRD provides a vendor-neutral, protocol-independent discovery mechanism to resolve this.
section: "1"
topics:
    - multicast
    - routing
