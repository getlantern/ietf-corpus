document: rfc-2051
kind: design-rationale
summary: 'The MIB explicitly does not support: modifying APPC defaults, creating or deleting partner LUs/modes/TPs/CPI-C side info, activating or deactivating local or partner LUs, activating or deactivating conversations or TPs, activating sessions, or generating traps. This scope limitation keeps the MIB focused on monitoring and limited control rather than full configuration management.'
section: "3"
topics:
