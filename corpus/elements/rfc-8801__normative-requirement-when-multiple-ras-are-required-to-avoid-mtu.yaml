document: rfc-8801
kind: normative-requirement
summary: When multiple RAs are required to avoid MTU fragmentation, the PvD Option header (all fields except the Options field) MUST be repeated in all transmitted RAs; individual options MAY appear in only one of the transmitted PvD Options.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
