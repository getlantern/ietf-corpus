document: rfc-2579
kind: protocol-element
summary: TestAndIncr provides an atomic test-and-increment mechanism for coordinating concurrent SNMP set operations. A set succeeds only if the supplied value exactly matches the current instance value; on success the value increments by one (wrapping from 2^31-1 to zero).
section: "2"
topics:
