document: rfc-6073
kind: normative-requirement
summary: During MS-PW path trace, if no echo reply is received or an error code is received from a particular PE, the trace process MUST stop immediately and packets MUST NOT be sent further along the MS-PW.
section: 9.6.2.4
rfc2119_level: MUST
