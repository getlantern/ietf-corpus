document: rfc-6205
kind: interoperability-note
summary: For bidirectional LSP setup using GMPLS RSVP-TE across domains, the Path message must contain both an Upstream_Label object and a Label_Set object with the same wavelength label value, and the Label_Set must contain a single sub-channel matching the Upstream_Label.
