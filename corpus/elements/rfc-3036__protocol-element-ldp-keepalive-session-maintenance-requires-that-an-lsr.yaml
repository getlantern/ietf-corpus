document: rfc-3036
kind: protocol-element
summary: LDP KeepAlive session maintenance requires that an LSR ensure its peer receives at least one LDP PDU every KeepAlive period. If no other message is due, a KeepAlive message is sent. A KeepAlive timer expiry without receiving any PDU causes the LSR to terminate the session.
section: 2.5.6
topics:
    - mpls
    - routing
