document: rfc-4975
kind: normative-requirement
summary: Each SDP offer or answer proposing MSRP MUST contain a 'path' attribute with one or more MSRP URIs that include explicit port numbers. The rightmost URI MUST identify the generating endpoint and MUST NOT duplicate any URI for another active session.
section: "8.2"
rfc2119_level: MUST
topics:
    - realtime
    - sip
