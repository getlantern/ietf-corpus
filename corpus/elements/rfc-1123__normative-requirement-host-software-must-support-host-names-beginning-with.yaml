document: rfc-1123
kind: normative-requirement
summary: Host software MUST support host names beginning with a digit (relaxing RFC-952), MUST handle names up to 63 characters, and SHOULD handle up to 255 characters. User input SHOULD be checked syntactically for dotted-decimal form before DNS lookup.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
