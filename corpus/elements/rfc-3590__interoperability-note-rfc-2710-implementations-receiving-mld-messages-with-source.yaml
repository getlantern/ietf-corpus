document: rfc-3590
kind: interoperability-note
summary: 'RFC 2710 implementations receiving MLD messages with source address :: may drop them if they do not consider the unspecified address to be link-local in scope. This is acceptable because the unspecified address is only used when joining the link-local solicited-node multicast group during DAD, so dropping has no effect on the sender''s operation.'
section: "5"
topics:
