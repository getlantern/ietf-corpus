document: rfc-9811
kind: security-consideration
summary: Storing the target location of an HTTP 301 (Moved Permanently) response could be exploited by a meddler-in-the-middle attacker to permanently block clients from contacting the correct server; Redirection 3xx support should only be enabled after careful security consideration.
