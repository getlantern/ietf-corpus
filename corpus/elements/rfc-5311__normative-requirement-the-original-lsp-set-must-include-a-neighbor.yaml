document: rfc-5311
kind: normative-requirement
summary: The Original LSP set MUST include a neighbor (with metric zero) to the Virtual IS associated with each Extended LSP set generated. This guarantees two-way connectivity check success and that cost to reach the Virtual IS equals cost to reach the Originating System.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
