document: rfc-9240
kind: registry
summary: This document creates the 'ALTO Entity Domain Types' IANA registry. Initial entries include 'ipv4', 'ipv6', and 'pid'. Registrations require specifying the identifier, semantics, entity identifier format, hierarchy/inheritance rules, and (where applicable) the defining information resource media type. Types with 'priv:' prefix are reserved for private use without registration.
section: "12.3"
