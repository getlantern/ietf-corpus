summary: Both CLONE_IKE_SA_SUPPORTED and CLONE_IKE_SA use the standard IKEv2 Notify Payload format. Protocol ID is set to zero (1 octet), SPI Size is set to zero (1 octet), and Notify Message Type is 16432 for CLONE_IKE_SA_SUPPORTED or 16433 for CLONE_IKE_SA (2 octets).
