document: rfc-4895
kind: normative-requirement
summary: The AUTH chunk MUST NOT appear more than once in an SCTP packet. All control and data chunks placed after the AUTH chunk are authenticated; chunks placed before it are not.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - sctp
    - security
