document: rfc-7356
kind: interoperability-note
summary: FS PDU extensions are not backwards compatible with legacy IS-IS implementations. Legacy routers do not support the FS Update Process and will likely treat received FS PDUs as errors. Correct operation requires that all routers in the flooding domain of a given scope support both FS PDUs and that specific scope.
section: "5"
topics:
    - routing
