document: rfc-5124
kind: normative-requirement
summary: When using SDP key management (RFC 4567) with a secure profile in RTSP, the KeyMgmt header MUST be included in the appropriate RTSP messages. After choosing one secure profile in SETUP, only the KeyMgmt header for the chosen profile MUST be provided.
section: 3.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
