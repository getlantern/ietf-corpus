document: rfc-2712
kind: wire-format
summary: 'The KerberosWrapper structure embedded in ClientKeyExchange contains three opaque fields: a Kerberos Ticket, an optional authenticator, and an EncryptedPreMasterSecret encrypted with the Kerberos session key sealed in the ticket. Ticket and authenticator are ASN.1-encoded per RFC 1510.'
