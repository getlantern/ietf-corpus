document: rfc-8441
kind: interoperability-note
summary: The Origin, Sec-WebSocket-Version, Sec-WebSocket-Protocol, and Sec-WebSocket-Extensions header fields are used in CONNECT request and response headers as defined in RFC 6455. However, HTTP/2 requires header field names to be encoded as lowercase, unlike HTTP/1.1 where they were case-insensitive.
section: "5"
topics:
