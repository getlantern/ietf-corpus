document: rfc-8054
kind: registry
summary: This document creates the 'NNTP Compression Algorithms' registry maintained by IANA at iana.org/assignments/nntp-parameters. New algorithms are registered on a First Come First Served basis. Algorithm names are 1-20 characters of uppercase letters, digits, hyphens, and/or underscores. Registrations MUST NOT be deleted; obsolete algorithms are marked OBSOLETE.
section: "8.1"
topics:
    - registry
