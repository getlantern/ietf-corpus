document: rfc-5795
kind: wire-format
summary: A feedback element begins with a 1-octet feedback type field (11110|Code); Code 0 means a Size octet follows indicating total CID+data length in octets; Code 1–7 encodes the length directly. An optional Add-CID or large CID field follows, then variable-length FEEDBACK data.
