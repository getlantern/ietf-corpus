document: rfc-3246
kind: protocol-element
summary: The delay bound for EF traffic leaving a node interface is D = B/R + E_p (eq_5), where R is the configured EF service rate and B is the token bucket depth bounding the offered EF load at rate r <= R. Since minimum delay >= 0, D also bounds jitter.
