document: rfc-4745
kind: design-rationale
summary: Repeat time intervals (e.g., daily 9am–4pm) were explicitly excluded because different time zones occupied by PT, WR, PS, and RM make correct interpretation difficult and error-prone. The 'Validity' element provides one-shot time windows instead. Work/non-work distinctions are poorly captured by time alone.
section: "5"
