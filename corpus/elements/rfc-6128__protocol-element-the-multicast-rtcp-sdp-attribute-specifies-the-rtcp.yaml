document: rfc-6128
kind: protocol-element
summary: The 'multicast-rtcp' SDP attribute specifies the RTCP port for an SSM session, allowing the distribution source to use a desired port rather than deriving it from the 'm=' line via the +1 rule. It is defined as both a media-level and session-level attribute.
