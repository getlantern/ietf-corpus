document: rfc-5650
kind: protocol-element
summary: A VDSL2/ADSL/ADSL2/ADSL2+ line consists of two transceiver units (xTU-C at the central office and xTU-R at the remote/customer site) and supports up to four independent bearer channels. The MIB indexes all per-line and per-channel objects by ifIndex.
