document: rfc-2206
kind: protocol-element
summary: rsvpResvTable (rsvpObjects 4) models the Reservation State Database for incoming RESV messages, indexed by (rsvpSessionNumber, rsvpResvNumber). Entries include flow filter (sender address, ports), QoS service, TSpec, RSpec (rate and slack for Guaranteed service), scope object, shared/explicit flags, hop info, and RowStatus.
