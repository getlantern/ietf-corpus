document: rfc-5804
kind: state-machine
summary: 'A ManageSieve session has two states: non-authenticated (initial state and state after UNAUTHENTICATE) and authenticated. Transition to authenticated occurs on successful AUTHENTICATE. STARTTLS does not change state. UNAUTHENTICATE returns from authenticated to non-authenticated without affecting established TLS/SASL security layers.'
section: "2"
