document: rfc-3768
kind: normative-requirement
summary: The IP TTL MUST be set to 255 on transmission. A VRRP router receiving a packet with TTL not equal to 255 MUST discard the packet.
section: 5.2.3
rfc2119_level: MUST
topics:
