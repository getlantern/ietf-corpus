document: rfc-2373
kind: wire-format
summary: 'Multicast addresses have the format: 8-bit prefix 0xFF, 4-bit flags field (high 3 bits reserved/zero; T=0 for permanent, T=1 for transient), 4-bit scope field, and 112-bit group ID. New multicast addresses should place the group ID in the low-order 32 bits.'
section: "2.7"
topics:
    - ip
    - v6ops
    - multicast
