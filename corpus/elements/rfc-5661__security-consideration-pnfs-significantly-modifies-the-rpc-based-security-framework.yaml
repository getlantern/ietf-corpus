document: rfc-5661
kind: security-consideration
summary: pNFS significantly modifies the RPC-based security framework because data access may not traverse RPC. The security impact varies with the storage protocol; the NFSv4.1 file layout type can have zero additional security impact, but other layout types may require independent security mechanisms for data-path protection.
section: "12.9"
topics:
    - security
