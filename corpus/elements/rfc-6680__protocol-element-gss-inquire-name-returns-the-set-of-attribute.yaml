document: rfc-6680
kind: protocol-element
summary: GSS_Inquire_name() returns the set of attribute names associated with a GSS name object, and indicates whether the name is a Mechanism Name (MN) and, if so, which mechanism it belongs to. The attrs output is a SET OF OCTET STRING (gss_buffer_set_t in C).
section: "7.4"
