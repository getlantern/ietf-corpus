document: rfc-5360
kind: normative-requirement
summary: Relays implementing this framework MUST NOT allow clients to add more than one recipient URI per transaction. If a client using XCAP attempts to add more than one URI in a single HTTP transaction, the XCAP server SHOULD return an HTTP 409 (Conflict) response.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
