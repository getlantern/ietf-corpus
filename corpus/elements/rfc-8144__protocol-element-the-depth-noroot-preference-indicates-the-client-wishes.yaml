document: rfc-8144
kind: protocol-element
summary: The 'depth-noroot' preference indicates the client wishes the server to exclude the target (root) resource from processing and only apply the HTTP method to the target resource's subordinate resources. It is only applicable when Depth header has value '1' or 'infinity'.
section: "4"
topics:
