document: rfc-9555
kind: design-rationale
summary: The ALTID parameter is not mapped to a registered JSContact property but is used by multiple conversion rules to combine logically related vCard property instances (e.g., multilingual N or ADR variants) into a single JSContact object, driving the PHONETIC and LANGUAGE conversion rules.
