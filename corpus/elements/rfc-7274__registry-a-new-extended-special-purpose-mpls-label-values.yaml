summary: A new 'Extended Special-Purpose MPLS Label Values' registry is created with Standards Action allocation policy. Values 0-15 are reserved (never allocatable); 16-239 are unassigned; 240-255 are reserved for experimental use; 256-1048575 are reserved pending a new Standards Track RFC defining an allocation policy.
