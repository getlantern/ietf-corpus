document: rfc-9410
kind: interoperability-note
summary: The use of multiple Reason header fields with the same protocol value "STIR" is enabled by RFC 9366, which updated RFC 3326 to allow multiple Reason header fields. Implementations must support this to handle scenarios with multiple Identity header field errors.
