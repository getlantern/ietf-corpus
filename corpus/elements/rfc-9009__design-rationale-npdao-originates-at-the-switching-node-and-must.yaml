document: rfc-9009
kind: design-rationale
summary: NPDAO originates at the switching node and must travel upstream via the failing link to the previous parent, which may not be reachable. DCO instead originates at the common ancestor node and flows downstream along the old path, removing the dependency on the broken link.
section: "2.1"
topics:
    - routing
