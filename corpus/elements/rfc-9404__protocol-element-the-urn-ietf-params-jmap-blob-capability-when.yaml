document: rfc-9404
kind: protocol-element
summary: The urn:ietf:params:jmap:blob capability, when present in accountCapabilities, signals support for Blob/upload, Blob/get, and Blob/lookup methods. Its value in the session-level capabilities MUST be an empty object; in account capabilities it carries server limits and supported features.
section: "3.1"
