document: rfc-5641
kind: protocol-element
summary: The (A) Active bit is redefined to indicate whether the local pseudowire endpoint—including the local Attachment Circuit and local PSN-facing pseudowire termination—has no faults present (1) or has faults present (0). This generalizes the prior definition which only pertained to local access circuit state.
