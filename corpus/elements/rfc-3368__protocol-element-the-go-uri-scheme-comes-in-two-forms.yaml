document: rfc-3368
kind: protocol-element
summary: 'The ''go'' URI scheme comes in two forms: form1 for querying a specific server (''go://[<host>]?[<common-name>]*[;<attribute>=[<type>,]<value>]'') and form2 for a location-independent query (''go:<common-name>*[;<attribute>=[<type>,]<value>]'').'
section: "3.1"
