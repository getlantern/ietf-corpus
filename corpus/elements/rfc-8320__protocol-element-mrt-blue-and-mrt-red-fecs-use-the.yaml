document: rfc-8320
kind: protocol-element
summary: MRT-Blue and MRT-Red FECs use the MT Prefix FEC element defined in RFC 7307, with MPLS MT-IDs 3947 (MRT-Blue) and 3946 (MRT-Red) allocated for the Default MRT Profile. These are used without alteration for advertising label mappings.
