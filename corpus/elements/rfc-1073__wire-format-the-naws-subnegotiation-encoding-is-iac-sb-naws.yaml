summary: 'The NAWS subnegotiation encoding is: IAC SB NAWS WIDTH[1] WIDTH[0] HEIGHT[1] HEIGHT[0] IAC SE. Width and height are each 16-bit unsigned integers in network byte order (big-endian), allowing values from 0 to 65535.'
