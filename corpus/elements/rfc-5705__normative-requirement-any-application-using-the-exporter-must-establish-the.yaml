document: rfc-5705
kind: normative-requirement
summary: Any application using the exporter must establish the upper-layer context where keying material will be used, and at a minimum there should be some mechanism for signaling that an exporter will be used. The context must include a part indicating which application will use the exported keys.
section: "3"
rfc2119_level: REQUIRED
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
