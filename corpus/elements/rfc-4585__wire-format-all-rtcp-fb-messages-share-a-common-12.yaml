document: rfc-4585
kind: wire-format
summary: 'All RTCP FB messages share a common 12-octet header: V (2 bits), P (1 bit), FMT (5 bits identifying the specific FB type), PT (8 bits, RTPFB=205 or PSFB=206), Length (16 bits), SSRC of packet sender (32 bits), SSRC of media source (32 bits), followed by variable-length Feedback Control Information (FCI).'
section: "6.1"
topics:
