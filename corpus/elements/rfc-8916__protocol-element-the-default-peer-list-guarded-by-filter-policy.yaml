kind: protocol-element
summary: The default-peer list (guarded by 'filter-policy' feature) identifies peers that accept all MSDP SA messages and bypass RPF checks; it is keyed by peer-addr and prefix-policy (an ACL reference), used in topologies where MSDP peers do not coexist with BGP peers.
