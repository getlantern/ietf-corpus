document: rfc-3035
kind: normative-requirement
summary: 'A non-VC-merge ATM-LSR configured for LDPV MUST include a path vector object in requests it sends to its next hop: either propagating and extending the received path vector, or creating one containing only its own address if no path vector was received.'
