document: rfc-9080
kind: protocol-element
summary: 'All HNCP-Babel interactions are unidirectional: HNCP causes Babel to perform route announcements on its behalf; Babel never causes HNCP to act. In existing implementations, HNCP installs routes in the OS kernel that Babel picks up via standard redistribution mechanisms.'
