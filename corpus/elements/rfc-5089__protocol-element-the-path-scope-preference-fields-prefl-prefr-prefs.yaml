document: rfc-5089
kind: protocol-element
summary: The PATH-SCOPE preference fields (PrefL, PrefR, PrefS, PrefY) are each 3 bits wide, encoding values 0–7 where 7 is highest preference. These preferences support weighted load balancing of path computation requests across PCEs; the algorithms for using them are a matter of local or network-wide policy.
section: "4.2"
