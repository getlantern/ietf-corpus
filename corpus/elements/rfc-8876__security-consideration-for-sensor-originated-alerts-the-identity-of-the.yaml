document: rfc-8876
kind: security-consideration
summary: For sensor-originated alerts, the identity of the sender plays an important role in deciding whether to accept or ignore incoming alert messages. SIP mechanisms such as P-Asserted-Identity (RFC 3325) and SIP Identity (RFC 8224) can be used, as can CAP's own signing mechanisms defined in CAP Section 3.3.4.1.
section: "9"
topics:
