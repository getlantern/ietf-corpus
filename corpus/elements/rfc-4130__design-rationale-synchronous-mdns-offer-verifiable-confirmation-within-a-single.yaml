document: rfc-4130
kind: design-rationale
summary: Synchronous MDNs offer verifiable confirmation within a single connection but may fail for large messages if processing exceeds the connection timeout. Asynchronous MDNs allow rapid return of a transfer-layer response without holding a long-lived connection open, at the cost of requiring enough identifying information in the MDN to reconcile the original message.
section: "7.2"
topics:
    - http
    - email
