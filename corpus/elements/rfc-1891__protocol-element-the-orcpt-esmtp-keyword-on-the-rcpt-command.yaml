document: rfc-1891
kind: protocol-element
summary: The ORCPT esmtp-keyword on the RCPT command conveys the original recipient address in the form 'addr-type;xtext', where addr-type is an IANA-registered address type. The parameter MAY be up to 500 characters in length.
section: "5.2"
topics:
