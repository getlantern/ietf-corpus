document: rfc-7899
kind: normative-requirement
summary: In deployments where RRs and ASBRs cannot distinguish the cause of a C-multicast route withdrawal, it is RECOMMENDED not to enable multicast VPN route damping on RRs and ASBRs, as these devices cannot differentiate whether a withdrawal was due to a multicast hop change or ordinary state churn.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
    - multicast
    - vpn
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
