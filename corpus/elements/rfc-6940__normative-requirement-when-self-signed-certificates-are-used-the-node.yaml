document: rfc-6940
kind: normative-requirement
summary: When self-signed certificates are used, the Node-ID MUST be computed as a digest of the public key to prevent Node-ID theft. The required cryptographic property is partial preimage resistance; collision resistance is not needed.
section: "4.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
