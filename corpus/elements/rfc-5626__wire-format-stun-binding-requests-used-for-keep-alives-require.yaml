document: rfc-5626
kind: wire-format
summary: STUN Binding Requests used for keep-alives require no STUN attributes; corresponding Binding Responses MUST include the XOR-MAPPED-ADDRESS attribute. STUN packets are distinguished from SIP on UDP because the first octet of a STUN Binding method is 0 or 1, while SIP first octets are never 0 or 1.
section: "8"
topics:
