document: rfc-6329
kind: protocol-element
summary: The SPB-Metric sub-TLV (type 29, in MT-ISN TLV type 222 or Extended IS Reachability TLV type 22) carries a 24-bit SPB-LINK-METRIC, Num of Ports count, and Port Identifier values. Absence of this sub-TLV for an adjacency means that adjacency Must not carry SPB traffic.
section: "15.1"
topics:
    - routing
