document: rfc-4666
kind: normative-requirement
summary: MTP3 management messages (such as TFPs or TFAs received from the SS7 network) MUST NOT be encapsulated as Payload Data and sent between SG and ASP. The SG MUST terminate these messages and generate appropriate M3UA SSNM messages instead.
section: 1.4.3.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
