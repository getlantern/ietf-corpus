document: rfc-3056
kind: design-rationale
summary: 6to4 treats the global IPv4 network as a unicast point-to-point link layer, eliminating the need for explicit per-tunnel configuration. This was chosen to allow isolated IPv6 sites to communicate with minimal manual setup during the IPv4-to-IPv6 co-existence period, explicitly not as a permanent solution.
