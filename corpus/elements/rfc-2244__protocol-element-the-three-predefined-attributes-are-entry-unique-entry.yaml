document: rfc-2244
kind: protocol-element
summary: 'The three predefined attributes are: ''entry'' (unique entry name, MUST be single-valued), ''modtime'' (14+ ASCII digit UTC timestamp auto-maintained by the server, with strictly ascending values across successive modifications in a dataset), and ''subdataset'' (list of relative ACAP URLs indicating sub-dataset location).'
