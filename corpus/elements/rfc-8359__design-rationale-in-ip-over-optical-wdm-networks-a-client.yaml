document: rfc-8359
kind: design-rationale
summary: In IP-over-optical (WDM) networks, a client router may not have visibility into the optical network and cannot pick the correct wavelength in advance. Sending a signal at the wrong wavelength may adversely impact existing optical trails, motivating the need for network-assigned upstream labels.
section: "4"
topics:
