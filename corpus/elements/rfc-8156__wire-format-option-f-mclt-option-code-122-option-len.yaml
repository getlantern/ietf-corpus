document: rfc-8156
kind: wire-format
summary: OPTION_F_MCLT (option code 122, option-len 4) carries the Maximum Client Lead Time as an unsigned 32-bit integer in network byte order, representing seconds. OPTION_F_PARTNER_LIFETIME (code 123, option-len 4) and OPTION_F_EXPIRATION_TIME (code 120, option-len 4) carry absolute times as unsigned 32-bit integers (seconds since 2000-01-01 UTC modulo 2^32).
section: 5.5.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
