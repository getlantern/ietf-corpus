document: rfc-4724
kind: protocol-element
summary: The End-of-RIB marker is an UPDATE message with no reachable NLRI and empty withdrawn NLRI, signaling completion of initial routing updates after session establishment. For IPv4 unicast it is a minimum-length UPDATE; for other address families it is an UPDATE containing only MP_UNREACH_NLRI with no withdrawn routes for that <AFI, SAFI>.
section: "2"
topics:
