document: rfc-9033
kind: protocol-element
summary: An Autonomous Rx Cell (AutoRxCell) is a unicast receive cell at [slotOffset, channelOffset] computed as a SAX hash of the node's own EUI-64, with cell option bits TX=0, RX=1, SHARED=0. It is installed at Slotframe 1 and MUST always remain scheduled after synchronization.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
