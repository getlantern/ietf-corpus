document: rfc-8026
kind: design-rationale
summary: The prioritization mechanism requires no server-side logic beyond standard DHCPv6 option assignment, keeping implementation complexity in the CPE only. This was a deliberate choice to avoid scalability burdens on DHCPv6 servers that would arise from per-client mechanism selection logic.
