document: rfc-1653
kind: normative-requirement
summary: Once a server has agreed via the extended MAIL command to accept a message of a particular size, it should not return a 552 reply code after the DATA transfer phase unless the actual transferred message size is greater than the declared message size.
section: "5.3"
rfc2119_level: SHOULD NOT
topics:
    - email
