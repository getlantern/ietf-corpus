document: rfc-1172
kind: protocol-element
summary: Address-and-Control-Field-Compression option (Type=8, Length=2) allows omission of the constant Address (0xff) and Control (0x03) fields. Compression is prohibited when the result would be ambiguous (Protocol value 0xff followed by 0x03) and MUST never be applied to LCP packets.
section: "2.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
