document: rfc-3145
kind: security-consideration
summary: The integrity and confidentiality of this AVP relies on underlying L2TP security mechanisms. The AVP MAY be hidden as described in RFC 2661 section 4.3. Future extensions must not provide distinguishing information that would help an attacker determine a correct authentication name with wrong password.
