document: rfc-8415
kind: design-rationale
summary: Multiple DUID types exist because the kind of globally unique identifier easy to generate varies widely across devices; some devices lack persistent storage and cannot use the time-based DUID-LLT, necessitating alternatives (DUID-EN for vendor-assigned identifiers, DUID-LL for devices needing no stored state).
