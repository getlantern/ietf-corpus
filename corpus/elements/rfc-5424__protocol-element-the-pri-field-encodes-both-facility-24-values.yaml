document: rfc-5424
kind: protocol-element
summary: 'The PRI field encodes both Facility (24 values, 0-23) and Severity (8 values, 0-7) in a single numeric value: PRIVAL = Facility * 8 + Severity. Severity 0 is Emergency (system unusable) and Severity 7 is Debug. Facility 0 is kernel messages; facilities 16-23 are local use.'
section: 6.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
