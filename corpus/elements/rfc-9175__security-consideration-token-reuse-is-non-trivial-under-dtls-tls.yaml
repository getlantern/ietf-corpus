document: rfc-9175
kind: security-consideration
summary: 'Token reuse is non-trivial under DTLS/TLS: binding to the correct request can only be claimed without out-of-band knowledge when the original request was never retransmitted and the response was piggybacked in an Acknowledgement. A sequence number approach is RECOMMENDED in all other cases.'
section: "5.1"
topics:
    - security
    - tls
