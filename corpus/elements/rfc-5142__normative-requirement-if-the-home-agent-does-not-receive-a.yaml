document: rfc-5142
kind: normative-requirement
summary: If the home agent does not receive a response (a Binding Update to delete or create a home binding), it SHOULD retransmit using exponential back-off, doubling the timeout each retransmission starting at INITIAL-HA-SWITCH-TIMEOUT until MAX-HA-SWITCH-TIMEOUT is reached.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
