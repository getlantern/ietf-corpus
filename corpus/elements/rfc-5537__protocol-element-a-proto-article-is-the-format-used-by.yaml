document: rfc-5537
kind: protocol-element
summary: A proto-article is the format used by a posting agent when offering an article to an injecting agent. It MUST NOT contain Injection-Info or Xref header fields, MUST NOT have 'POSTED' in the Path diagnostic, and MAY omit Message-ID, Date, and Path header fields.
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
