document: rfc-3846
kind: security-consideration
summary: The identities sent in the NAI Carrying Extension MAY be sent in the clear over the network. The authors do not envision this creating security issues, and the specification does not lessen the security of Mobile IP messages since they must be authenticated per RFC 2794.
section: "6"
topics:
    - mobility
    - security
    - privacy
    - ip
