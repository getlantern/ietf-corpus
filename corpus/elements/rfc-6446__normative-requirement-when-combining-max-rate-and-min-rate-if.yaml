document: rfc-6446
kind: normative-requirement
summary: When combining max-rate and min-rate, if the subscriber provides a 'min-rate' value higher than 'max-rate', the notifier MUST adjust the 'min-rate' value to a value equal to or lower than the 'max-rate' value.
section: "8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
