document: rfc-2814
kind: design-rationale
summary: Both L2 and L3 addresses are carried in LAN_NHOP and RSVP_HOP objects because L2 devices acting as DSBMs cannot reasonably be expected to have ARP capability to resolve IP addresses to MAC addresses dynamically. Embedding both at L3 devices eliminates this requirement entirely from L2 DSBMs.
section: 4.2.2.3
topics:
