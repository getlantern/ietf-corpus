document: rfc-1271
kind: normative-requirement
summary: The probe must not lower historyControlBucketsGranted except as a result of a modification to historyControlBucketsRequested. When the granted bucket count is reached, the oldest bucket must be deleted to make room for each new sample.
section: "6"
rfc2119_level: MUST
