document: rfc-5642
kind: security-consideration
summary: Use of FQDN as the OSPF dynamic hostname may expose geographic or commercial information when sent in the clear. OSPFv3 supports confidentiality via transport mode IPsec (RFC 4552); OSPFv2 can be operated over IPsec tunnels if confidentiality is required.
section: "5"
topics:
    - routing
    - security
    - ipsec
    - privacy
