document: rfc-1350
kind: normative-requirement
summary: If a packet is received with a source TID that does not match the agreed-upon TID, the packet should be discarded and an error packet (error code 5, Unknown transfer ID) should be sent to the source of the incorrect packet without disturbing the ongoing transfer.
section: "4"
rfc2119_level: SHOULD
topics:
    - udp
