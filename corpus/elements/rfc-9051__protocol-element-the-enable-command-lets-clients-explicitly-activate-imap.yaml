document: rfc-9051
kind: protocol-element
summary: The ENABLE command lets clients explicitly activate IMAP extensions. It is additive (multiple ENABLE commands accumulate), and extensions remain active for the entire connection once enabled. The server MUST send an untagged ENABLED response after each ENABLE command. ENABLE is only valid in the authenticated state before any mailbox is selected.
section: 6.3.1
topics:
    - email
