document: rfc-4130
kind: registry
summary: 'This specification registers a new MDN Disposition-modifier extension: ''warning''. It is used with the ''processed'' disposition-type to indicate the message was successfully processed but an exceptional condition occurred (e.g., ''Warning: authentication-failed, processing continued''). Parameters signed-receipt-protocol, signed-receipt-micalg, and Received-content-MIC were previously registered by RFC 3335 and are reused here.'
section: "10.1"
topics:
    - registry
    - email
