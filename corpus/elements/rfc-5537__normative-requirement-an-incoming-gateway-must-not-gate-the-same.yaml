document: rfc-5537
kind: normative-requirement
summary: An incoming gateway MUST NOT gate the same message twice. It MUST pass the resulting proto-article to an injecting agent (not directly to a relaying agent), and MUST NOT pass control messages without removing or renaming the Control or Supersedes header fields.
section: 3.10.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
