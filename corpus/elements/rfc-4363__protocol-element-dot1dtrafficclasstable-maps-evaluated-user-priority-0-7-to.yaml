document: rfc-4363
kind: protocol-element
summary: dot1dTrafficClassTable maps evaluated User Priority (0..7) to a Traffic Class in the range 0..(dot1dPortNumTrafficClasses-1) per port. For untagged Ethernet frames, the evaluated priority equals dot1dPortDefaultUserPriority; for other untagged media, it equals dot1dRegenUserPriority.
