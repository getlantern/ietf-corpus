document: rfc-3390
kind: design-rationale
summary: 'Analysis of network-wide impact shows that increasing the initial window to 4K bytes does not create a danger of congestion collapse: duplicate retransmissions are bounded (at most one duplicate segment in the absence of SACK), and the segment drop rate increase is small for uncorrelated arrivals.'
