document: rfc-4762
kind: normative-requirement
summary: If a PE is not able to support both Ethernet and Ethernet VLAN PWs simultaneously within the same VPLS, it SHOULD send a Label Release with status code 'Unknown FEC' (per RFC 3036) on the PW type it cannot support.
section: "8"
rfc2119_level: SHOULD
