document: rfc-2464
kind: protocol-element
summary: An IPv6 multicast packet destined for DST is mapped to the Ethernet multicast address 33-33-DST[13]-DST[14]-DST[15]-DST[16], where the first two octets are fixed as 0x3333 and the last four octets are the low-order four octets of the IPv6 destination address.
