document: rfc-7746
kind: interoperability-note
summary: The LSP Self-ping message may arrive at the egress LSR with or without an MPLS header depending on whether penultimate hop popping is in effect; the egress removes any residual MPLS header and then forwards the inner IP packet normally back toward the ingress.
