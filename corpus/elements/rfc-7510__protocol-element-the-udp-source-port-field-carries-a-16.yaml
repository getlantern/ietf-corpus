document: rfc-7510
kind: protocol-element
summary: The UDP Source Port field carries a 16-bit entropy value generated by the encapsulator to uniquely identify a flow for load-balancing purposes. When no entropy is needed, the field SHOULD be set to a randomly selected constant for all packets in a given flow to avoid packet reordering.
