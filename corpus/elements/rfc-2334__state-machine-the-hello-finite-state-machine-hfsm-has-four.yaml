document: rfc-2334
kind: state-machine
summary: 'The Hello Finite State Machine (HFSM) has four states: Down, Waiting, Bidirectional Connection, and Unidirectional Connection. It starts in Down, transitions to Waiting when NBMA-level connectivity is established, advances to Bidirectional Connection when the LS finds its own LSID in the DCS''s Hello Receiver ID list, or to Unidirectional Connection otherwise. Loss of NBMA connectivity returns to Down; abnormal events (e.g., malformed packet) return to Waiting.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
