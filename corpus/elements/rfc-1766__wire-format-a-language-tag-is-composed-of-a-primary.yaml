document: rfc-1766
kind: wire-format
summary: 'A language tag is composed of a primary tag and zero or more subtags separated by hyphens: Language-Tag = Primary-tag *( "-" Subtag ), where Primary-tag and each Subtag are 1 to 8 ASCII alpha characters. Whitespace is not allowed within the tag.'
