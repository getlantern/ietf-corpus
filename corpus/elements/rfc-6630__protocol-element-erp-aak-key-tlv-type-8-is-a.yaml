document: rfc-6630
kind: protocol-element
summary: ERP/AAK-Key TLV (Type 8) is a key container carried in EAP-Finish/Re-auth containing sub-TLVs for CAP-Identifier, pMSK Lifetime, pRK Lifetime, and List of Cryptosuites. Exactly one ERP/AAK-Key SHALL be present per EAP-Finish/Re-auth packet.
section: "5.3"
topics:
