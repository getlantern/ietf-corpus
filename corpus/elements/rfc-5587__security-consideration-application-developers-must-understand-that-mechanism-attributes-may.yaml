document: rfc-5587
kind: security-consideration
summary: Application developers must understand that mechanism attributes may be added at any time to both the known attribute set and existing mechanisms' supported attributes. Applications must identify which attributes are critical and use the criticality features of the new APIs accordingly.
section: "6"
