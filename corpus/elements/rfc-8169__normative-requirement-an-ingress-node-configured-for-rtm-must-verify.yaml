document: rfc-8169
kind: normative-requirement
summary: An ingress node configured for RTM MUST verify that the selected egress node supports RTM via the RTM Capability sub-TLV advertisement before placing the RTM_SET Attribute Flag in the Path message's LSP_ATTRIBUTES object.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
