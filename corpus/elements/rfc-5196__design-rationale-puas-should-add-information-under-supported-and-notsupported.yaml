document: rfc-5196
kind: design-rationale
summary: PUAs should add information under <supported> and <notsupported> only when it may affect watcher decision-making; listing all possible information is rarely needed. This keeps presence documents concise and avoids flooding watchers with irrelevant capability data.
section: "4.1"
topics:
