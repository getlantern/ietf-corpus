document: rfc-2080
kind: normative-requirement
summary: The IPv6 source address of an outgoing Response message (unsolicited or triggered) MUST be the designated link-local address of the sending interface. A router with multiple link-local addresses on one interface must originate only a single Response per interface.
section: 2.5.2
rfc2119_level: MUST
topics:
    - routing
    - ip
