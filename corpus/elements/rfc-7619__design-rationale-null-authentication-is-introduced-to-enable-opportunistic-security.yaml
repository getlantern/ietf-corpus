document: rfc-7619
kind: design-rationale
summary: NULL Authentication is introduced to enable Opportunistic Security (RFC 7435) for IKEv2, allowing unauthenticated or single-side authenticated IKE sessions. This defends against Pervasive Monitoring attacks (RFC 7258) without requiring peers to sacrifice anonymity, covering scenarios where mutual authentication is undesirable, superfluous, or impossible.
