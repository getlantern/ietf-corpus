summary: This document does not introduce new vulnerabilities to IPv4 specifications or operation. Security of the IEEE 802.16 air interface is governed by IEEE Std 802.16. Security of network architectures beyond the BS is governed by architecture documents such as the WiMAX network architecture specification.
