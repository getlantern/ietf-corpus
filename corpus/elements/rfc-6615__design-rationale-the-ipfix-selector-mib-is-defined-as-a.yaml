document: rfc-6615
kind: design-rationale
summary: The IPFIX SELECTOR MIB is defined as a separate module from the IPFIX MIB because its selector function subtree is IANA-controlled and extensible, allowing PSAMP sampling/filtering functions to be added independently without modifying the core IPFIX MIB.
