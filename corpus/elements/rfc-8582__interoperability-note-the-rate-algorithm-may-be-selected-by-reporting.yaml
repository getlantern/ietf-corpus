document: rfc-8582
kind: interoperability-note
summary: 'The rate algorithm MAY be selected by reporting nodes for any of the three DOIC report types: HOST_REPORT, REALM_REPORT (both defined in RFC 7683), and PEER_REPORT (defined in RFC 8581). Future report types are expected to explicitly state whether the rate algorithm is applicable.'
