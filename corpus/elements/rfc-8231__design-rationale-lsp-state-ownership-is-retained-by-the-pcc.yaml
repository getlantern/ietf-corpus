document: rfc-8231
kind: design-rationale
summary: LSP state ownership is retained by the PCC even when an LSP is delegated to an active stateful PCE. This allows simultaneous interaction with stateless and stateful PCEs, operator override via CLI, and graceful reversion to operator-defined defaults upon PCE disconnection or delegation revocation.
section: "5.1"
topics:
    - mpls
    - routing
