document: rfc-2815
kind: design-rationale
summary: A universal, statically defined mapping of delay classes was considered but rejected as too rigid to map the wide range of user requirements onto the limited number of 802.1D classes. Instead, clients query the network for the appropriate user_priority for each flow, allowing the network to factor in current topology, load, and admitted flows.
section: "2"
