document: rfc-3963
kind: protocol-element
summary: Dynamic Home Agent Address Discovery (DHAAD) is extended with a new Mobile Router Support Flag (R) in both the DHAAD Request and Reply messages. Mobile Routers set this flag to discover only Home Agents that support Mobile Routers. The Home Agent Information Option is similarly extended with an R flag.
section: "7"
topics:
    - mobility
    - ip
