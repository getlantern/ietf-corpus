document: rfc-7473
kind: normative-requirement
summary: Upon receipt of a capability update that disables a previously enabled application state during session lifetime, the receiving LSR MUST also withdraw from the peer any previously advertised state corresponding to the disabled application.
section: "4.2"
rfc2119_level: MUST
