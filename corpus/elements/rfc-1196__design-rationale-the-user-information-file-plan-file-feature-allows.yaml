document: rfc-1196
kind: design-rationale
summary: The user information file ('plan' file) feature allows users to leave a short message included in Finger responses. The RFC deliberately leaves the implementation method to the implementor (e.g., a specially named file in the user's home directory), keeping the mechanism flexible.
section: 2.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
