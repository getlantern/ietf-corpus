document: rfc-2261
kind: wire-format
summary: SnmpEngineID is an OCTET STRING of SIZE(1..32). The standard format sets the high bit of the first octet to 1, uses the next 3 octets for the IANA-assigned enterprise number, and uses the fifth octet as a format indicator (1=IPv4, 2=IPv6, 3=MAC, 4=text, 5=octets, 127-255=enterprise-defined). The value MUST NOT be all zeros, all 0xFF, or zero-length.
section: "5"
topics:
    - snmp
