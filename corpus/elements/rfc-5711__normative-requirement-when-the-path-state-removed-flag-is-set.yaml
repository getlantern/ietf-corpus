document: rfc-5711
kind: normative-requirement
summary: When the Path_State_Removed flag is set on a received PathErr, the receiving node should remove its own Path state before forwarding the message, but may alternatively retain state and clear the flag before forwarding.
section: "2.2"
rfc2119_level: SHOULD
topics:
