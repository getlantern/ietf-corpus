document: rfc-1220
kind: design-rationale
summary: Magic Number Loopback Detection and LQM are strongly recommended because the IEEE 802.1 Spanning Tree protocol is inherently unidirectional during normal operation—only BPDUs from the Root flow outward with no reverse traffic—making it unable to detect unidirectional link failures on its own.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
