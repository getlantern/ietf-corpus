document: rfc-9012
kind: wire-format
summary: 'The VXLAN Encapsulation sub-TLV (tunnel type 8) is 12 octets: a 1-octet Flags field with V (VN-ID present) and M (MAC Address present) bits, a 3-octet VN-ID, a 6-octet MAC Address, and 2 reserved octets. Reserved bits MUST be set to 0 by the originator, propagated unchanged, and ignored on receipt.'
section: 3.2.1
topics:
    - bgp
    - routing
