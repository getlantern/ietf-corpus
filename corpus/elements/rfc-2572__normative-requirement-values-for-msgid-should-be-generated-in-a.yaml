document: rfc-2572
kind: normative-requirement
summary: Values for msgID SHOULD be generated in a manner that avoids re-use of any outstanding values, providing protection against some replay attacks. A new msgID value SHOULD be used for each retransmission.
section: "6.2"
rfc2119_level: SHOULD
topics:
