document: rfc-8020
kind: security-consideration
summary: If a resolver does not validate answers with DNSSEC, it can be poisoned with a false NXDOMAIN, effectively deleting a subtree of the domain name space. NXDOMAIN cut may amplify this attack's effects; DNSSEC validation is the only mitigation.
section: "7"
topics:
