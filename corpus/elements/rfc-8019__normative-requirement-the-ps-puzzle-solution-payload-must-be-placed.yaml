document: rfc-8019
kind: normative-requirement
summary: The PS (Puzzle Solution) payload MUST be placed outside the Encrypted payload in IKE_AUTH, so the Responder can verify the puzzle solution before performing the computationally expensive DH shared secret and SK_* key derivations.
section: 7.2.2
rfc2119_level: MUST
