document: rfc-4871
kind: protocol-element
summary: Key revocation is signaled by setting the p= tag in the DNS key record to an empty string. Verifiers should ignore any DKIM-Signature header fields referencing a revoked key. There is no defined semantic difference between a revoked key and a removed key record.
section: 3.6.1
topics:
    - email
    - dns
    - crypto
