document: rfc-6249
kind: normative-requirement
summary: Metalink servers MUST support Link header fields for listing mirrors and MUST support Instance Digests in HTTP. Metalink servers MUST return the same Link header fields and Instance Digests on HEAD requests as on GET requests.
section: "2"
rfc2119_level: MUST
topics:
