document: rfc-7924
kind: design-rationale
summary: The fingerprint is intentionally not a security mechanism; the security of the handshake depends on the private key. The fingerprint's role is only to help the server select the correct cached object (e.g., the right certificate) and to prevent accidental selection of the wrong one.
section: "5"
topics:
