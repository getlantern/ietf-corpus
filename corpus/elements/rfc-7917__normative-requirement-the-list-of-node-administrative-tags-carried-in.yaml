document: rfc-7917
kind: normative-requirement
summary: The list of node administrative tags carried in a Node-Admin-Tag sub-TLV MUST be considered as an unordered list. Policies MUST NOT be reliant upon the order of the tags; all policies should be considered commutative operations.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
