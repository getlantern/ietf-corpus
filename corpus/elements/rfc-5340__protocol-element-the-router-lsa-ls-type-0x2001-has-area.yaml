document: rfc-5340
kind: protocol-element
summary: The Router-LSA (LS type 0x2001) has area flooding scope and describes a router's interfaces to an area in a network-protocol-independent manner using 16-byte link descriptions containing Type, Metric, Interface ID, Neighbor Interface ID, and Neighbor Router ID. Host routes and stub prefixes are no longer included; they appear in intra-area-prefix-LSAs instead.
section: 4.4.3.2
topics:
    - routing
