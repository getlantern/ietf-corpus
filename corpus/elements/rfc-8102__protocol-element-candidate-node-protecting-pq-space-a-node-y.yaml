document: rfc-8102
kind: protocol-element
summary: 'Candidate Node-Protecting PQ-Space: a node Y is in candidate node-protecting PQ-space if and only if Y is present in both the node-protecting extended P-space and the Q-space for the protected link. Membership guarantees only that the S-to-PQ-node path segment avoids the primary next-hop node E, not the full alternate path.'
section: 2.2.5
topics:
    - routing
