summary: 'The Flow Identification Mobility Option header encodes: Option Type (8 bits, value 45), Option Len (8 bits), FID (16-bit unsigned integer, 0 reserved), FID-PRI (16-bit priority, 0 reserved), Reserved (8 bits), and Status (8 bits). Alignment requirement is 2n.'
