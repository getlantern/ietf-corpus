document: rfc-8037
kind: protocol-element
summary: A new key type (kty) value "OKP" (Octet Key Pair) is defined for public key algorithms that use octet strings as private and public keys. It has parameters "kty" (must be "OKP"), "crv" (subtype of key), "x" (public key, base64url-encoded), and optionally "d" (private key, base64url-encoded).
section: "2"
