document: rfc-2067
kind: protocol-element
summary: 'Channel Data Rate Discovery: a 64-bit Source discovers path capability by attempting a 64-bit Camp-on connection. Rejection means the Destination or path lacks Cable B; a subsequent 32-bit connection success confirms 32-bit-only capability. The HIPPI-LE Double_Wide bit hints at 64-bit capability on the return path.'
