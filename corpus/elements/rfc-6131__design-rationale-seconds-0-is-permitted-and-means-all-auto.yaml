document: rfc-6131
kind: design-rationale
summary: ''':seconds 0'' is permitted and means all auto-replies are sent with no suppression of consecutive replies. This differs from the base vacation specification which forbids '':days 0''; the change is necessary to allow operation of a pure auto-responder that must acknowledge every incoming message.'
section: "2"
