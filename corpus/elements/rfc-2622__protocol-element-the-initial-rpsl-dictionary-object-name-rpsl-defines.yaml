document: rfc-2622
kind: protocol-element
summary: 'The initial RPSL dictionary (object name ''RPSL'') defines seven rp-attributes: pref (local preference), med (BGP MED, supports igp_cost), dpa (BGP DPA), aspath (prepend method), community (set/append/delete/contains operations supporting RFC 1997 values internet/no_export/no_advertise), next-hop (for static routes), and cost. It defines protocols BGP4, OSPF, RIP, IGRP, IS-IS, STATIC, RIPng, DVMRP, PIM-DM, PIM-SM, CBT, and MOSPF.'
section: "7.1"
topics:
    - routing
    - bgp
