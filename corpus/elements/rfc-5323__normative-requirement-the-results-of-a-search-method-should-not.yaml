document: rfc-5323
kind: normative-requirement
summary: The results of a SEARCH method SHOULD NOT be cached. Each matching resource's DAV:response MUST include a DAV:propstat element, and the DAV:href element contains the URI of the resource.
section: "2.3"
rfc2119_level: SHOULD NOT
