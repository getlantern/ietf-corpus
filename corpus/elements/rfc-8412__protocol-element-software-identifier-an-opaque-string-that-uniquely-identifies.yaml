document: rfc-8412
kind: protocol-element
summary: 'Software Identifier: an opaque string that uniquely identifies a specific version of a specific software product. It is derived deterministically from a Software Inventory Evidence Record using rules defined per data model type. The same software product may have multiple Software Identifiers if reported by different sources or data models.'
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
