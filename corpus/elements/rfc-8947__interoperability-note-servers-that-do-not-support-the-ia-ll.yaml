document: rfc-8947
kind: interoperability-note
summary: Servers that do not support the IA_LL option will ignore it and not return it in Advertise or Reply messages. Clients that send IA_LL options MUST treat a missing IA_LL in the server response as if the server returned NoAddrsAvail status for those IA_LL options.
section: "8"
topics:
