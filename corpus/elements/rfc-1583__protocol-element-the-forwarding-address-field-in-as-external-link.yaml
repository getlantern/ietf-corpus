document: rfc-1583
kind: protocol-element
summary: The 'forwarding address' field in AS external link advertisements allows an ASBR to direct traffic to a specific IP address (e.g., a non-OSPF router) rather than to the advertising router itself, enabling route-server functionality and eliminating unnecessary hops.
