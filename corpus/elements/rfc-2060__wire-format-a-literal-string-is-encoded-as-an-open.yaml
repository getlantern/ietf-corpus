document: rfc-2060
kind: wire-format
summary: A literal string is encoded as an open brace, octet count, close brace, CRLF, followed immediately by the octet data (for server-to-client). For client-to-server literals, the client MUST wait for a '+' command continuation request before sending the octet data.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
