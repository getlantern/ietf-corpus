document: rfc-4510
kind: normative-requirement
summary: An LDAP server MUST act in accordance with the X.500 (1993) series of ITU-T Recommendations when providing the directory service. However, an LDAP server is not required to use X.500 protocols internally; LDAP may be mapped onto any other directory system as long as the X.500 data and service models are not violated at the LDAP interface.
section: "2"
rfc2119_level: MUST
topics:
    - ldap
