document: rfc-5731
kind: protocol-element
summary: The EPP domain object is identified by a fully qualified name and carries attributes including ROID, status values, registrant, contacts, name servers (ns), subordinate hosts, sponsoring client ID, creation/update/expiration/transfer dates, and authorization information. These are returned via the <domain:infData> element in <info> responses.
