document: rfc-9617
kind: security-consideration
summary: NETCONF access MUST use SSH as the mandatory-to-implement secure transport (RFC 6242); RESTCONF access MUST use TLS 1.3 (RFC 8446) over HTTPS. The Network Configuration Access Control Model (NACM, RFC 8341) MUST be used to restrict which users can access IOAM configuration nodes.
section: "5"
rfc2119_level: MUST
topics:
