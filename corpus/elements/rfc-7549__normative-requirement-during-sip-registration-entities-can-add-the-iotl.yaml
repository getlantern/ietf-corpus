document: rfc-7549
kind: normative-requirement
summary: During SIP registration, entities can add the 'iotl' parameter to Path or Service-Route header field SIP URIs if the entity is aware the SIP URI will indicate the end of a specific traffic leg for subsequent initial requests or stand-alone requests on the registration path.
section: "5.1"
rfc2119_level: MAY
