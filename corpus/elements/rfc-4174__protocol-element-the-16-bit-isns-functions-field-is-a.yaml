document: rfc-4174
kind: protocol-element
summary: 'The 16-bit iSNS Functions Field is a bitmap with three defined bits: bit 15 (Function Fields Enabled), bit 14 (DD-Based Authorization), and bit 13 (Security Policy Distribution). If bit 15 is zero, all other function field contents MUST be ignored.'
