document: rfc-6788
kind: normative-requirement
summary: Each time the AN detects a subscriber circuit coming up, it MUST create an RS using the unspecified address as source and MUST tunnel it toward the Edge Router with the LIO, to trigger periodic unsolicited RAs from the Edge Router.
section: "5.4"
rfc2119_level: MUST
