document: rfc-2608
kind: interoperability-note
summary: SLPv1 UAs will not receive replies from SLPv2 SAs and vice versa; interoperation requires a SLPv2 DA present on the network. SLPv2 DAs answer SLPv1 requests with SLPv1 replies and SLPv2 requests with SLPv2 replies.
