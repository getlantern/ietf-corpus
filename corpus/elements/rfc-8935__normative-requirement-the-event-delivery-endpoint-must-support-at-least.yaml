document: rfc-8935
kind: normative-requirement
summary: The event delivery endpoint MUST support at least TLS 1.2 and SHOULD support the newest version meeting its security requirements (TLS 1.3 at time of publication). The client MUST perform a TLS/SSL server certificate check using DNS-ID and/or DANE. RFC 7525 recommendations MUST be followed.
section: "5.3"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
