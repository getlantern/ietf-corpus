summary: The Extended Association ID TLV (Type 31) is mandatory for SRPA and encodes the SR Policy Color as an unsigned non-zero 32-bit integer followed by the Endpoint as either 4 octets (IPv4) or 16 octets (IPv6), giving total lengths of 8 or 20 octets respectively.
