document: rfc-4694
kind: interoperability-note
summary: SIP has existing mechanisms to detect routing loops due to URI rewriting; the new NP parameters work within these established contexts. Other protocols using these parameters SHOULD ensure they have loop-detection mechanisms when rewriting the "tel" URI.
section: "5"
rfc2119_level: SHOULD
topics:
    - sip
    - voip
