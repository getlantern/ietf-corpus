document: rfc-7524
kind: design-rationale
summary: BGP is used as the inter-area routing and label distribution protocol rather than extending intra-area P2MP signaling (RSVP-TE or mLDP) across area boundaries. This enables scalable deployment across thousands of PEs in multiple IGP areas within a single AS (Seamless MPLS), without requiring area-spanning P2MP state.
section: "1"
topics:
