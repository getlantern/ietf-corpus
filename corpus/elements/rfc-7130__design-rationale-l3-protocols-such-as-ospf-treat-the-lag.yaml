document: rfc-7130
kind: design-rationale
summary: L3 protocols such as OSPF treat the LAG as a single interface and have no insight into individual member links. The signaling from micro-BFD sessions to L3 protocols is done indirectly through the impact on the load-balancing table and any decision by the LAG/interface manager to shut down the LAG.
