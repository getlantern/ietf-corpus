summary: 'The CEP PWE3 control word carries: L bit (AC forward defect indication), R bit (PW reverse defect indication for PSN failures), and N/P bit combination (signals loss of pointer to remote PE). Additionally, loss of packet synchronization itself triggers PW receive defect state entry for CEP PWs.'
