document: rfc-7455
kind: wire-format
summary: 'The Out-of-Band Reply Address TLV (Type 65) carries: Address Type (1 octet: 0=IPv4, 1=IPv6, 2=TRILL nickname), Addr Length (1 octet: 4, 16, or 2 respectively), and Reply Address (variable). When the O bit in the Application Identifier TLV is set, the reply MUST be sent to this address.'
section: 8.4.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
