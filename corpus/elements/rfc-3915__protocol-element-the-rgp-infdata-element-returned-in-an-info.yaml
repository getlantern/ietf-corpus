document: rfc-3915
kind: protocol-element
summary: The <rgp:infData> element returned in an <info> response contains a single <rgp:rgpStatus> element with a required 's' attribute whose value is one of the seven defined grace period status values. This conveys current grace period state to the client.
section: 4.1.2
topics:
