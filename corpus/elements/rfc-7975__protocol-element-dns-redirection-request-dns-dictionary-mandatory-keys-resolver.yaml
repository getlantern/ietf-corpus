kind: protocol-element
summary: 'DNS Redirection Request ''dns'' dictionary mandatory keys: resolver-ip (String, DNS resolver IP), qtype (String, ''A'' or ''AAAA''), qclass (String, e.g., ''IN''), qname (String, FQDN). Optional keys: c-subnet (CIDR IP/prefix of UA), dns-only (Boolean, forces dCDN to return surrogate RTs only via DNS).'
