document: rfc-8930
kind: normative-requirement
summary: Consecutive fragments of the same datagram MUST be separated with an inter-frame gap that allows one fragment to progress beyond the next hop and beyond the interference domain before the next shows up, to avoid hidden terminal problems on half-duplex radios.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - routing
