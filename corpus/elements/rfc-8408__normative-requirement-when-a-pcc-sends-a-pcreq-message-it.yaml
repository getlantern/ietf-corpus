document: rfc-8408
kind: normative-requirement
summary: When a PCC sends a PCReq message, it MUST include the PATH-SETUP-TYPE TLV in the RP object unless the intended PST is RSVP-TE. The PCE MUST respond using the appropriate ERO format for the intended PST.
section: "5"
rfc2119_level: MUST
topics:
    - routing
