document: rfc-3473
kind: protocol-element
summary: The Notify message (Message Type 21) provides non-adjacent LSP event notification. It may be forwarded hop-by-hop or encapsulated in a new IP header to the target address, and uses RFC 2961 Ack messages for reliable delivery.
