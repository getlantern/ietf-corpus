document: rfc-6871
kind: design-rationale
summary: The 'mt=' parameter is defined exclusively for 'lcfg' and not for 'pcfg' because a potential configuration's media type is implicitly determined by its enclosing 'm=' line, while a latent configuration exists independently of any current 'm=' line and therefore requires an explicit media type declaration.
section: 3.3.4.3
