document: rfc-3047
kind: security-consideration
summary: A denial-of-service threat exists if a codec has non-uniform receiver-side computational load, allowing attackers to inject complex-to-decode datagrams. The document notes that G.722.1 does not exhibit significant non-uniformity, mitigating this risk.
