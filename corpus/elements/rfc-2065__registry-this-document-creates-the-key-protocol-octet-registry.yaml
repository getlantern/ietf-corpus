summary: This document creates the KEY protocol octet registry. Values 1-191 are available for IANA assignment to specific protocols. Values 192-254 are reserved for experimental use under bilateral agreement. Value 0 means not valid for any additional protocol. Value 255 means valid for all assigned protocols (1-191).
