document: rfc-3321
kind: design-rationale
summary: When the requested feedback length is non-zero, endpoint-initiated acknowledgements should not be used due to possible bandwidth waste. Since all SigComp implementations support the feedback mechanism, implementing remote-compressor-initiated acknowledgements (Section 5.1.1) is generally preferred.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
