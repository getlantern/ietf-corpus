document: rfc-8896
kind: normative-requirement
summary: The 'constraints' member MUST NOT be present in the input parameters of a request for an Endpoint Cost Calendar. If present, the Server MUST ignore it. Constraints are mutually exclusive with Calendar functionality.
section: 5.2.1
rfc2119_level: MUST NOT
