document: rfc-6478
kind: registry
summary: IANA created the 'PW Generic Protocol Flags' registry for 16-bit flag strings. Bit 0 (mask 0x0001) is assigned as 'S-PE bypass mode'. Bits 1–15 are assigned via IETF Review. Allocation requests require a description of up to 65 characters.
