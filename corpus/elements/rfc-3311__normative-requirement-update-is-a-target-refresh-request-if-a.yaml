document: rfc-3311
kind: normative-requirement
summary: UPDATE is a target refresh request. If a UA uses an UPDATE to modify the remote target while an INVITE transaction is in progress and it is a UAS for that INVITE, it MUST place the same Contact value into the 2xx to the INVITE.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
