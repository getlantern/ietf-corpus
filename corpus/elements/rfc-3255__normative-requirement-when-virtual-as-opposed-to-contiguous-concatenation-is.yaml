document: rfc-3255
kind: normative-requirement
summary: When virtual (as opposed to contiguous) concatenation is used for SONET/SDH STS-1/VC-3 and above SPE/VCs, the H4 multi-frame indicator byte must be populated as per ITU-T G.707 or T1.105.02; it is unused for contiguously concatenated links.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
