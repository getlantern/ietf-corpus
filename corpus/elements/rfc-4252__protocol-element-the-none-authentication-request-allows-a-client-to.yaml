document: rfc-4252
kind: protocol-element
summary: The 'none' authentication request allows a client to obtain the list of supported authentication methods from the server. If no authentication is needed, the server MUST return SSH_MSG_USERAUTH_SUCCESS; otherwise it MUST return SSH_MSG_USERAUTH_FAILURE with available methods.
section: "5.2"
topics:
    - security
