document: rfc-5629
kind: design-rationale
summary: The separation between user interface and application is described as 'absolutely fundamental to the entire framework'. The user interface handles rendering and interpretation of raw user input, while the application only needs the semantic result, not the modality details (e.g., whether a prompt was male or female voice).
