summary: 'The loss episode metrics of this memo subsume the Gilbert model: the two Gilbert transition probabilities P(g|b) = d/m and P(b|g) = (d/m)/(1/r - 1) can be recovered algebraically from the loss ratio r and episode duration m, showing the metrics are sufficient to parameterize the simplest bursty-loss Markov model without requiring Markovian assumptions during measurement.'
