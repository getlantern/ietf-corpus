document: rfc-3852
kind: normative-requirement
summary: The subjectKeyIdentifier form of SignerIdentifier MUST be used to refer to a public key contained in a non-X.509 certificate. For key transport, a recipient X.509 v3 certificate with a key usage extension MUST assert the keyEncipherment bit; for key agreement it MUST assert the keyAgreement bit.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
