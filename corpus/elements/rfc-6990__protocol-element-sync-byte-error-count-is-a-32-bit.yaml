document: rfc-6990
kind: protocol-element
summary: Sync_byte_error_count is a 32-bit count of Sync_byte_errors in the reported interval. A sync byte error occurs when the sync byte is not equal to 0x47 in any TS packet (ETSI Section 5.2.1).
