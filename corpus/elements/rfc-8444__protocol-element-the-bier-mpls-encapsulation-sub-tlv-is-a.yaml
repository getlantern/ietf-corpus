document: rfc-8444
kind: protocol-element
summary: The BIER MPLS Encapsulation Sub-TLV is a sub-TLV of the BIER Sub-TLV that advertises MPLS-specific information for BIER, including the label range (first label plus Max SI) and the supported BitString length. It MAY appear multiple times in the BIER Sub-TLV.
section: "2.2"
topics:
