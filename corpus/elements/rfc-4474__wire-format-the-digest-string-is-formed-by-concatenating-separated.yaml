document: rfc-4474
kind: wire-format
summary: 'The digest-string is formed by concatenating, separated by ''|'': From addr-spec, To addr-spec, Call-ID, CSeq digit and method (single SP), Date (canonicalized capitalization), Contact addr-spec (empty if absent), and message-body. CSeq leading zeros MUST be stripped; Date weekday and month MUST capitalize first letter only.'
