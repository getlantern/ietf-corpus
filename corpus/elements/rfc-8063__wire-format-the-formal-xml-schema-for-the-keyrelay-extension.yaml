document: rfc-8063
kind: wire-format
summary: The formal XML schema for the keyrelay extension uses namespace urn:ietf:params:xml:ns:keyrelay-1.0 and imports secDNS-1.1, eppcom-1.0, and domain-1.0 namespaces. The createType sequence is name (labelType), authInfo (domain:authInfoType), and keyRelayData (unbounded). The keyRelayExpiryType uses xs:choice between absolute (dateTime) and relative (duration).
