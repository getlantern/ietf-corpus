document: rfc-5155
kind: security-consideration
summary: With Opt-Out, a malicious entity can undetectably insert or delete unsigned delegation NS RRs (and any RRs in a subzone under attacker control), as the existence or nonexistence of insecure delegations within an Opt-Out span cannot be cryptographically proven.
section: "12.2"
topics:
    - dns
    - security
