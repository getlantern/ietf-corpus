document: rfc-3122
kind: protocol-element
summary: The Inverse Neighbor Discovery Advertisement message (ICMPv6 Type 142) is sent in response to an IND Solicitation. Its destination address is the source address of the invoking solicitation, and it carries the Target Address List of IPv6 addresses associated with the target's link-layer address.
section: "2.2"
topics:
