document: rfc-3801
kind: security-consideration
summary: Assigning an Internet mail address to a voice mailbox exposes it to unsolicited messages from unknown senders, which voice mail users perceive as a higher privacy breach than email spam. Many Internet mail systems block all messages from unknown sources to address this problem.
section: 9.2.2
topics:
    - email
    - security
