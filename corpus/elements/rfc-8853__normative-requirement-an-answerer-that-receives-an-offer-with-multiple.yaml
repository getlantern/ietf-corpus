document: rfc-8853
kind: normative-requirement
summary: An answerer that receives an offer with multiple 'a=simulcast' attributes in the same media description SHALL disable simulcast by removing all 'a=simulcast' lines for that media description in the answer. An answerer receiving 'a=simulcast' at the session level SHALL remove it in the answer.
section: 5.3.2
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
