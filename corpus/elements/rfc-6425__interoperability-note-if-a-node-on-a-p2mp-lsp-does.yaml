document: rfc-6425
kind: interoperability-note
summary: If a node on a P2MP LSP does not support MPLS LSP ping, it will send no reply, causing an incorrect result at the initiating LSR. There is no protocol protection for this situation; operators must ensure uniform support across all nodes in the P2MP LSP.
section: "5"
topics:
    - mpls
    - routing
