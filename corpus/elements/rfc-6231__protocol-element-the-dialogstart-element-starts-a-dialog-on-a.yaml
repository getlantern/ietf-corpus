document: rfc-6231
kind: protocol-element
summary: The <dialogstart> element starts a dialog on a specified connection or conference. Exactly one of src, prepareddialogid, or inline <dialog> must be specified. Optional child elements include <subscribe>, <params>, and <stream>. Specifying prepareddialogid together with dialogid is a syntax error.
section: 4.2.2
topics:
    - realtime
    - voip
