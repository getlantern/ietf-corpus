document: rfc-9674
kind: interoperability-note
summary: Analysis of rpkiviews archives from April to September 2024 found only one RRDP server (among the five RIR TALs) that employed a same-origin HTTP redirect, and no RRDP Repository Servers observed to employ cross-origin URIs in Update Notification Files during October 2021–October 2024. Imposing the SOP requirement therefore does not cause any commonly used RRDP Repository Server operations to become non-compliant.
