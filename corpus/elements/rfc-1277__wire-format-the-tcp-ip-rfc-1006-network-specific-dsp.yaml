document: rfc-1277
kind: wire-format
summary: 'The TCP/IP (RFC 1006) network-specific DSP format is exactly 20 digits: digits 1–12 encode the IP address (4 octets, each as 3 decimal digits), digits 13–17 encode the optional port number (5 digits, defaulting to the RFC 1006 port), and digits 18–22 encode the optional transport set (5 digits; 1=TCP, 2=UDP; absent or zero means default TCP).'
section: "4.5"
