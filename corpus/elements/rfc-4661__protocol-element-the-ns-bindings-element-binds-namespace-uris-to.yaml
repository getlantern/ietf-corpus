document: rfc-4661
kind: protocol-element
summary: The <ns-bindings> element binds namespace URIs to local prefixes used in XPath-like expressions within <include>, <exclude>, <changed>, <added>, and <removed> elements. Each child <ns-binding> has a required 'prefix' attribute and a required 'urn' attribute.
