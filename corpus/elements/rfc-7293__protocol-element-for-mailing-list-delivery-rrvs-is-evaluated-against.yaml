document: rfc-7293
kind: protocol-element
summary: For mailing list delivery, RRVS is evaluated against the list address as a final delivery. If the mailing list has operated continuously since the RRVS timestamp, delivery proceeds; however, the MDA MUST omit the RRVS parameter in either form when passing the message to the list service, as redistribution by the list constitutes a new message transaction.
section: "8.1"
topics:
    - email
