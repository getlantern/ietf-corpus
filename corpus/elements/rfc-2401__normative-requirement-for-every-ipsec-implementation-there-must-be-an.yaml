document: rfc-2401
kind: normative-requirement
summary: For every IPsec implementation there MUST be an administrative interface that allows a user or system administrator to manage the SPD. The management interface MUST allow creation of entries consistent with the defined selectors and MUST support total ordering of entries.
section: 4.4.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
