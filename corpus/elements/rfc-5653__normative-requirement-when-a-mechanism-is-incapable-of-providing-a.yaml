document: rfc-5653
kind: normative-requirement
summary: When a mechanism is incapable of providing a requested optional service, it is required to send at least one token from acceptor to initiator during context establishment so the initiating GSS-API can correctly indicate whether the service is supported by the acceptor.
section: "4"
rfc2119_level: REQUIRED
