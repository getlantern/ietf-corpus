document: rfc-6856
kind: security-consideration
summary: Modifications to server authentication code to support non-ASCII strings must be done carefully to avoid introducing vulnerabilities such as string parsing or matching bugs, particularly when the native databases or mailstore use a character set other than Unicode in UTF-8.
