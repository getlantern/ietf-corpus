document: rfc-8564
kind: protocol-element
summary: When a tail loses connectivity (detected by not receiving the P2MP BFD RBridge Channel message from the head), it notifies the head using unicast BFD Control packets transmitted via the existing RBridge Channel message (protocol 0x002) assigned to BFD Control.
section: "1"
topics:
