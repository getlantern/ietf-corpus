document: rfc-4036
kind: protocol-element
summary: 'docsSubMgtCpeControlTable AUGMENTs docsIfCmtsCmStatusTable and provides four writable objects controlling subscriber management per cable modem: maximum CPE IP count, active flag, learnable flag, and a reset trigger. Rows are created at modem registration and persist for the lifespan of the corresponding docsIfCmtsCmStatusEntry.'
