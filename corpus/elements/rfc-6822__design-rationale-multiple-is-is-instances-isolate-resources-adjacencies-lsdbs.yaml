document: rfc-6822
kind: design-rationale
summary: Multiple IS-IS instances isolate resources (adjacencies, LSDBs, flooding) and enable instance-specific prioritization and flooding rate control. MI-IS-IS serves as an alternative to Multi-Topology IS-IS (RFC 5120) and enables advertisement of non-routing application information with minimal impact on routing.
section: "1"
topics:
