document: rfc-9085
kind: interoperability-note
summary: This document defines the BGP-LS equivalent mappings for all IS-IS SR TLVs/sub-TLVs (RFC 8667), OSPFv2 SR TLVs/sub-TLVs (RFC 8665), and OSPFv3 SR TLVs/sub-TLVs (RFC 8666), enabling consumers to correlate BGP-LS advertisements back to their IGP origin.
