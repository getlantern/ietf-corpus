document: rfc-6415
kind: normative-requirement
summary: Applications where the authenticity of host-meta information is necessary MUST require the use of HTTPS and MUST NOT produce a host-meta document via other means. Such applications MUST also require that any redirection leading to host-meta retrieval also uses HTTPS.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - http
    - tls
