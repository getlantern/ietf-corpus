document: rfc-3868
kind: state-machine
summary: 'An ASP transitions among three states: ASP-DOWN (no active SCTP association or not yet initialized), ASP-INACTIVE (SCTP association established but not processing traffic), and ASP-ACTIVE (processing traffic). Transitions are driven by ASP Up/Down/Active/Inactive messages and SCTP association events.'
section: "4.3"
topics:
