document: rfc-6116
kind: interoperability-note
summary: Case sensitivity was not addressed in RFC 3761 and caused interoperability failures at test events. This document mandates case-insensitive processing for Public ENUM clients while allowing case-sensitive processing only in fully controlled Infrastructure ENUM environments.
section: "3.6"
topics:
    - dns
