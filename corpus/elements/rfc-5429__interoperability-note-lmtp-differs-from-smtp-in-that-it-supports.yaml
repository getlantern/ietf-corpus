document: rfc-5429
kind: interoperability-note
summary: LMTP differs from SMTP in that it supports per-recipient rejection, so the multi-recipient exception requiring message acceptance and DSN generation (Section 2.1.2) does not apply to LMTP. However, LMTP clients may still be forced to generate blowback DSNs.
section: 2.1.2
topics:
    - email
