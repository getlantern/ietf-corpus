document: rfc-8977
kind: design-rationale
summary: The specification adopts forward-only pagination in 'paging_metadata' links because forward traversal alone is sufficient to scroll the entire result set, keeping the pagination model simple and avoiding the complexity of bidirectional keyset navigation.
