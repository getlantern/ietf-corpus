document: rfc-3404
kind: interoperability-note
summary: The UTF-8 character set is used to encode the substitution expression. Allowed input characters are those permitted anywhere in a URI, while Key characters are restricted to those valid in DNS domain-names. The 'i' flag in the substitution expression denotes case-insensitive matching where appropriate.
