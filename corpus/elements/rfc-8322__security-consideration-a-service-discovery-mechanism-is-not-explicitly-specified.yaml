document: rfc-8322
kind: security-consideration
summary: A service discovery mechanism is not explicitly specified; implementations selecting one must ensure it provides a means for authenticating the server. DNS SRV records are noted as a possible solution. Additionally, distributed policy enforcement between source and destination systems risks unintended denial of service or information leakage.
section: "9"
topics:
