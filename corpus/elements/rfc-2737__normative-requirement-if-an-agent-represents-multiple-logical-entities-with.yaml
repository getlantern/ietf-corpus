document: rfc-2737
kind: normative-requirement
summary: If an agent represents multiple logical entities with the Entity MIB, the entityLogical group must be implemented for all logical entities known to the agent. Agents representing a single logical entity or multiple entities within a single naming scope may omit this group.
section: 2.12.2
rfc2119_level: MUST
topics:
