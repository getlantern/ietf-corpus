document: rfc-8690
kind: normative-requirement
summary: For the IGP-Adjacency Segment ID sub-TLV, the length MUST be calculated by including 2 octets of the Reserved field, with the total length varying by Adjacency Type and Protocol (e.g., OSPF Parallel/IPv4/Unnumbered = 20, OSPF IPv6 = 44, ISIS Parallel/IPv4/Unnumbered = 24, ISIS IPv6 = 48).
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
