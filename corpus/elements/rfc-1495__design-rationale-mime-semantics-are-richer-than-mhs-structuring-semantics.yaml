document: rfc-1495
kind: design-rationale
summary: MIME semantics are richer than MHS structuring semantics, so the mappings are not fully symmetric. MHS heading extensions are used to carry the additional MIME semantics (multipart subtype, partial message parameters) in order to provide reversible round-trip transformations.
