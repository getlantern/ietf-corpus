document: rfc-5701
kind: design-rationale
summary: A new BGP attribute (rather than a new Extended Community type) was required because the existing BGP Extended Community attribute [RFC4360] defines all Extended Communities as exactly 8 octets, which is insufficient to carry a 16-octet IPv6 address alongside sub-type and local administrator fields.
section: "1"
topics:
    - bgp
    - routing
    - ip
