document: rfc-5854
kind: normative-requirement
summary: Metalink Documents MUST be well-formed XML 1.0. All leading and trailing whitespace is part of element content and MUST NOT be ignored. Documents that do not follow the specification are invalid and SHOULD NOT be used by Metalink Processors.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
