document: rfc-7937
kind: normative-requirement
summary: When a field name is listed in the fields directive but the value is unavailable, this MUST be conveyed via a dash character ('-'). When a field name is not listed in the fields directive, the corresponding value MUST NOT be included in the record.
section: 3.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
