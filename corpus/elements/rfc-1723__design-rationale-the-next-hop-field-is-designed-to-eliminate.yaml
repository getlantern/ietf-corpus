document: rfc-1723
kind: design-rationale
summary: The Next Hop field is designed to eliminate sub-optimal routing when RIP is not deployed on all routers in a network. It allows a single RIP-2 router (e.g., XR1) to advertise routes on behalf of other routers (XR2, XR3) with the correct next hop, avoiding extra hops through the advertising router.
section: "3.4"
topics:
    - routing
    - ip
