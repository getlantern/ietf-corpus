document: rfc-7780
kind: normative-requirement
summary: The 4-bit RESV field in the TRILL Header MUST be sent as zero. A TRILL switch receiving a TRILL Data packet with any RESV bit non-zero MUST discard the packet unless the non-zero bit(s) have a specified future use that the switch understands.
section: "10"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
