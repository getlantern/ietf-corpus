document: rfc-9895
kind: normative-requirement
summary: If the credit window information provided by the modem exceeds the router's capabilities, the router SHOULD utilize a subset of the advertised credit windows, or alternatively MAY reset the session and indicate the extension is not supported.
section: "3"
rfc2119_level: SHOULD
