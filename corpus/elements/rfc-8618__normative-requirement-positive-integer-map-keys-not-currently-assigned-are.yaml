document: rfc-8618
kind: normative-requirement
summary: Positive integer map keys not currently assigned are reserved for future standard extensions. Negative integer map keys (from -1 to -24, which also have single-byte CBOR representation) are reserved for implementation-specific entries, ensuring private extensions are not at a space efficiency disadvantage.
section: "7.1"
rfc2119_level: MUST NOT
