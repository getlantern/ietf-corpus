document: rfc-6677
kind: normative-requirement
summary: The transport protocol carrying channel-binding information MUST support end-to-end (peer-to-server) message integrity protection to prevent the adversarial NAS or AAA device from manipulating the transported data. The transport SHOULD provide confidentiality.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
