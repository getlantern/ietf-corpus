document: rfc-6719
kind: protocol-element
summary: MRHOF's parent selection maintains a variable cur_min_path_cost representing the path cost of the current preferred parent. When a new preferred parent is selected, cur_min_path_cost is updated to the path cost corresponding to that parent, and this value is carried in the DIO Metric Container.
section: "3.2"
topics:
    - routing
