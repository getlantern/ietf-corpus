document: rfc-9480
kind: normative-requirement
summary: Certificates used for CMP message protection or signed data for central key generation MUST be issued by the delegating CA and MUST contain the respective EKU extensions (id-kp-cmcCA, id-kp-cmcRA, or id-kp-cmKGA) to prove the delegation of authorization.
section: "2.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - crypto
