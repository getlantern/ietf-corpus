document: rfc-4480
kind: protocol-element
summary: The <relationship> element extends <tuple> to designate the relationship of an alternate contact to the presentity; values include assistant, associate, family, friend, self, supervisor, and unknown. The default is 'self'; if a non-self relationship is indicated, the <contact> URI refers to that related entity, not the presentity.
section: "3.9"
topics:
    - realtime
    - sip
