document: rfc-9546
kind: interoperability-note
summary: The tunneling model of OAM interworking requires that the remote peer of the E2E OAM domain supports the active OAM protocol selected at the ingress endpoint. For example, if BFD is used in the DetNet MPLS domain, BFD (RFC 5885) must be supported at TSN endpoints of the DetNet service.
section: "4.1"
topics:
    - mpls
