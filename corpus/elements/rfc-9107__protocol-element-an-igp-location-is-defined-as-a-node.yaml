document: rfc-9107
kind: protocol-element
summary: An IGP location is defined as a node in the IGP topology, identified by an IP address of that node (e.g., a loopback address). It may be configured on a per-route-reflector basis, per set of clients, or on a per-client basis.
section: "3"
topics:
