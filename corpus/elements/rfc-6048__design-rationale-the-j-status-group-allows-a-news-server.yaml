document: rfc-6048
kind: design-rationale
summary: The 'j' status group allows a news server to propagate peer articles to other peers even for newsgroups the local server does not carry. A catch-all 'junk' newsgroup (named to match the status letter) may be used to locally store such articles that would otherwise be unfileable.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
