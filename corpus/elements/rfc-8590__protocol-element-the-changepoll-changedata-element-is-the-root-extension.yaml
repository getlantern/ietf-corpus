document: rfc-8590
kind: protocol-element
summary: 'The <changePoll:changeData> element is the root extension element carrying operation detail in EPP poll responses. It contains child elements: <changePoll:operation>, <changePoll:date>, <changePoll:svTRID>, <changePoll:who>, optional <changePoll:caseId>, and optional <changePoll:reason>, plus a ''state'' attribute defaulting to ''after''.'
