document: rfc-5043
kind: protocol-element
summary: The DDP/SCTP adaptation layer uses a pair of like-numbered SCTP streams within an SCTP Association to provide a reliable DDP stream. Each DDP Segment is encoded as a single unordered SCTP Data Chunk, accompanied by a DDP-SSN reflecting submission order.
