document: rfc-7627
kind: protocol-element
summary: 'The extended master secret replaces the RFC 5246 computation with: master_secret = PRF(pre_master_secret, ''extended master secret'', session_hash)[0..47]. This substitutes the ''extended master secret'' label for ''master secret'' and session_hash for the concatenation of ClientHello.random and ServerHello.random, binding the master secret to all significant session parameters.'
