document: rfc-7695
kind: normative-requirement
summary: The prefix assignment subroutine MUST be run (with BackoffTriggered=false) whenever an Advertised Prefix in the Delegated Prefix is added or removed, the Delegated Prefix or Link is added, the Node ID changes, or a relevant Assigned Prefix is destroyed outside the subroutine.
section: "4.1"
rfc2119_level: MUST
topics:
