document: rfc-7321
kind: normative-requirement
summary: An encryption transform MUST NOT be used with a NULL authentication transform, unless the encryption transform is an authenticated encryption transform from Section 2.1. NULL authentication and NULL encryption MUST NOT both be used simultaneously.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - crypto
    - security
