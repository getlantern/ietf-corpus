document: rfc-9354
kind: normative-requirement
summary: For address registration in mesh-under mode, a PLC device MUST register its addresses by sending a unicast NS message with an ARO or EARO directly to the 6LBR; DAR/DAC or EDAR/EDAC messages are not required.
section: "4.4"
rfc2119_level: MUST
topics:
