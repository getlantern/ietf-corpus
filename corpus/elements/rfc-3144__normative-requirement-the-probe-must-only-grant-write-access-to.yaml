document: rfc-3144
kind: normative-requirement
summary: The probe MUST only grant write access to interfaceTopNObjectVariable in MIB views that have read access to all objects on the probe, because no SNMP access-control mechanism can otherwise restrict the counter data retrievable via the TopN mechanism.
section: "6"
rfc2119_level: MUST
topics:
