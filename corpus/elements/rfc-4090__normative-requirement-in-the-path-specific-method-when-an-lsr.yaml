document: rfc-4090
kind: normative-requirement
summary: In the path-specific method, when an LSR (MP) receives multiple Path messages from different interfaces with identical SESSION and SENDER_TEMPLATE, Path state merging is REQUIRED. If Path messages do not share an outgoing interface and next-hop LSR, the MP MUST consider them independent LSPs and MUST NOT merge them.
section: 7.1.2
rfc2119_level: REQUIRED
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
