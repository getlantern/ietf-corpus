document: rfc-3641
kind: normative-requirement
summary: To be eligible to be declared a ChoiceOfStrings type, an ASN.1 type MUST be a CHOICE type whose every alternative is one of the restricted string types, with all alternatives being different types, and either none or all having exactly the same constraint.
section: "3.3"
rfc2119_level: MUST
topics:
    - ldap
