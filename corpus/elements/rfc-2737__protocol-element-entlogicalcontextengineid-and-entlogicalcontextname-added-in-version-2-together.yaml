document: rfc-2737
kind: protocol-element
summary: entLogicalContextEngineID and entLogicalContextName, added in Version 2, together identify the SNMPv3 context associated with a logical entity. They replace entLogicalCommunity for SNMPv3-capable agents and are used with entLogicalTAddress/entLogicalTDomain to send SNMPv3 messages on behalf of that entity.
section: "2.3"
topics:
    - snmp
