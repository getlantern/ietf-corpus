document: rfc-7231
kind: protocol-element
summary: The Content-Type header field indicates the media type of the associated representation. A sender that generates a payload body SHOULD generate a Content-Type field; recipients MAY assume 'application/octet-stream' if the field is absent.
section: 3.1.1.5
topics:
