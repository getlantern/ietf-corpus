document: rfc-2535
kind: protocol-element
summary: Data at a security-aware server is internally categorized as Authenticated (valid SIG traceable to a trusted key), Pending (no authenticated SIGs but at least one under evaluation), Insecure (in or reached via an unsecured zone, or unsigned glue/delegation NS data), or Bad (all SIG checks explicitly failed; not retained).
section: "6"
topics:
