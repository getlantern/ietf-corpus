document: rfc-7679
kind: design-rationale
summary: The 95% confidence interval was chosen for calibration error because some confidence level is needed to remove outliers in physical measurement, a specific level allows comparison between independent implementations, and 95% was loose enough to exclude outliers even in prototype user-level implementations.
