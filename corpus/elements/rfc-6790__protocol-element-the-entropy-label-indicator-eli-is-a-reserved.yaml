document: rfc-6790
kind: protocol-element
summary: The Entropy Label Indicator (ELI) is a reserved MPLS label with value 7. It must immediately precede an Entropy Label in the label stack (closer to the top of stack) and allows egress LSRs to unambiguously distinguish entropy labels from application labels.
