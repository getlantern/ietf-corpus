document: rfc-2178
kind: protocol-element
summary: The Hello Protocol dynamically discovers and maintains neighbors. On broadcast and point-to-point networks, Hellos are sent to AllSPFRouters (224.0.0.5). On NBMA networks, Hellos are unicast to configured neighbor addresses. The Hello Protocol also elects the DR and BDR on broadcast/NBMA networks.
section: "7.1"
topics:
    - routing
    - multicast
