document: rfc-8214
kind: state-machine
summary: In Single-Active multihoming, the DF-elected primary PE sets P=1/B=0, the backup PE sets P=0/B=1, and remaining PEs set both to 0. On primary failure, the primary withdraws its Ethernet A-D routes, the remote PE switches traffic to the backup PE, and DF re-election selects a new primary and backup.
section: "3.1"
topics:
    - routing
    - mpls
    - bgp
