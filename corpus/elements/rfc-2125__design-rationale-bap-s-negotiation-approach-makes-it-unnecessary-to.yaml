document: rfc-2125
kind: design-rationale
summary: BAP's negotiation approach makes it unnecessary to define a common bandwidth-on-demand algorithm. Either peer may use any BOD heuristic it chooses, and the Link-Drop-Query mechanism ensures a link stays up as long as either peer deems it necessary.
section: "5.2"
