document: rfc-8933
kind: design-rationale
summary: Requiring the same hash algorithm for both the message content digest and the signed attributes digest is a convention already followed by most implementations, so backward compatibility impact is expected to be minimal. Signatures using two different digest algorithms will be considered invalid by implementations following this specification.
section: "3.4"
topics:
    - crypto
    - security
