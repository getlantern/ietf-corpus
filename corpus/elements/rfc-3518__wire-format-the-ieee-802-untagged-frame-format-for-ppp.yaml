document: rfc-3518
kind: wire-format
summary: The IEEE 802 Untagged Frame format for PPP bridging includes an 8-bit Flags field (F=LAN FCS present, Z=zero-pad to minimum size, B=bridge control packet) and a MAC Type byte, followed by Destination MAC, Source MAC, LLC data, optional LAN FCS, optional padding, and PPP Frame FCS. PPP Protocol field is 0x0031.
section: "4.2"
