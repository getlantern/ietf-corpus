document: rfc-7239
kind: wire-format
summary: 'Node identifiers follow the ABNF: `node = nodename [":" node-port]` where nodename is an IPv4address, bracketed IPv6address, "unknown", or obfnode (`"_" 1*(ALPHA / DIGIT / "." / "_" / "-")`). Port may be a numeric port (1–5 digits) or obfport with a leading underscore. IPv6 addresses and any nodename with a port MUST be quoted.'
section: "6"
topics:
