document: rfc-9134
kind: normative-requirement
summary: The RTP timestamp SHALL use a 90 kHz clock rate. All packets belonging to the same video frame SHALL have the same timestamp. If the sampling instant does not correspond to an integer clock value, the value SHALL be truncated to the next lowest integer.
section: "4.2"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
