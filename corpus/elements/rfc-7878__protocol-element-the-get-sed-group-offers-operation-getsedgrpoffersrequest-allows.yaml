document: rfc-7878
kind: protocol-element
summary: The Get SED Group Offers operation (getSedGrpOffersRequest) allows flexible querying of SED Group Offer objects by filtering on offeredBy, offeredTo, status, and/or sedGrpOfferKey; if no criteria are passed, all offers belonging to the Registrant are returned.
