document: rfc-5751
kind: protocol-element
summary: The SMIMECapabilities signed attribute announces a partial ordered list of an agent's decryption/algorithm capabilities, grouped by category (signature, symmetric, key encipherment). It MUST be a SignedAttribute, MUST NOT appear multiple times in a SignerInfo, and MUST contain exactly one AttributeValue. OIDs are listed in preference order.
section: 2.5.2
topics:
