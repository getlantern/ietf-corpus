document: rfc-1717
kind: interoperability-note
summary: Network protocols sent without multilink headers cannot be sequenced and will be delivered in any convenient order. NCP packets may flow with or without multilink headers over any member link once that link has identified itself as belonging to a multilink arrangement.
section: "2"
