document: rfc-1443
kind: state-machine
summary: 'RowStatus defines four states for a conceptual row: (A) does not exist, (B) notReady, (C) notInService, (D) active. Transitions are driven by SET operations using the action values createAndGo, createAndWait, active, notInService, and destroy. Only three values (notReady, notInService, active) are returned on GET; the action values are write-only.'
