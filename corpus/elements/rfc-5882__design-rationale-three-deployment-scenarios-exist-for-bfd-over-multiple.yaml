document: rfc-5882
kind: design-rationale
summary: 'Three deployment scenarios exist for BFD over multiple-link subnetworks: (1) complete decoupling where BFD runs only at layer N, (2) layer N-1 hints where the aggregation layer informs BFD of link failure for faster detection, and (3) aggregating per-link BFD sessions into a single layer N indication. Combinations are also valid.'
