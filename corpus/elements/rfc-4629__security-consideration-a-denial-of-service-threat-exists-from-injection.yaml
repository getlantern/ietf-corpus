document: rfc-4629
kind: security-consideration
summary: A denial-of-service threat exists from injection of pathological datagrams that are complex to decode and overload the receiver. Authentication of at least the RTP packet is RECOMMENDED to mitigate this threat.
section: "11"
rfc2119_level: RECOMMENDED
