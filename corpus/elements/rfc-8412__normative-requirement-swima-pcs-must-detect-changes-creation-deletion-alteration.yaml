document: rfc-8412
kind: normative-requirement
summary: SWIMA-PCs MUST detect changes (creation, deletion, alteration) to the Software Inventory Evidence Collection in close to real time (within seconds) while operational, and MUST be able to determine net changes that occurred while the SWIMA-PC was not operational.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
