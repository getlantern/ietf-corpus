document: rfc-7075
kind: normative-requirement
summary: A conforming client MUST be prepared to receive either DIAMETER_REALM_REDIRECT_INDICATION directly or a response from a realm differing from the one originally targeted. Upon receiving DIAMETER_REALM_REDIRECT_INDICATION, the client SHOULD follow the same rerouting steps prescribed for proxies.
section: 3.2.3
rfc2119_level: MUST
topics:
    - diameter
