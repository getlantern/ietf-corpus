document: rfc-3840
kind: design-rationale
summary: Feature tags for new SDP media types SHOULD use the name 'sip.' concatenated with the media type name, so that implementations can safely construct caller preferences and callee capabilities for new media types before they are formally registered, as long as there is no naming conflict.
section: "10"
topics:
