document: rfc-8405
kind: protocol-element
summary: HOLDDOWN_TIMER is (re)started on every IGP event and set to HOLDDOWN_INTERVAL. Its expiration moves the FSM to QUIET state from SHORT_WAIT (after deactivating LEARN_TIMER) or from LONG_WAIT.
section: "5.3"
topics:
