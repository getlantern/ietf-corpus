summary: An XSLT 1.0 stylesheet (Appendix A) is provided so IANA can mechanically generate the initial and subsequent versions of the 'iana-dns-class-rr-type' module from the XML version of the IANA DNS Parameters registry, ensuring the YANG module stays synchronized with the authoritative registry without manual transcription.
