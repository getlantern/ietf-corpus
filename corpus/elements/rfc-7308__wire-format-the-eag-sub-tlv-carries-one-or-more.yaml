document: rfc-7308
kind: wire-format
summary: The EAG sub-TLV carries one or more 32-bit Extended Admin Group words in sequence. The Type is 26 for OSPF and 14 for IS-IS. The Length field is the size of the EAG value in bytes and MUST be a multiple of 4.
section: "2.1"
