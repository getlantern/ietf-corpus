document: rfc-2155
kind: wire-format
summary: SnaModeName encodes an SNA mode name as a 0–8 byte OCTET STRING; trailing blanks are prohibited except for the all-blank mode name, which is returned as exactly 8 space characters. A zero-length string indicates the mode name is unavailable.
section: "4"
