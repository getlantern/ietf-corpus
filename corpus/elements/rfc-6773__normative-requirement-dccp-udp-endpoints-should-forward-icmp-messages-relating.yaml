document: rfc-6773
kind: normative-requirement
summary: DCCP-UDP endpoints SHOULD forward ICMP messages relating to a UDP packet carrying DCCP-UDP to the DCCP module, potentially translating the ICMP payload. Precautions similar to those in RFC 5927 (ICMP attacks against TCP) are desirable before forwarding.
section: "3.6"
rfc2119_level: SHOULD
topics:
    - udp
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
