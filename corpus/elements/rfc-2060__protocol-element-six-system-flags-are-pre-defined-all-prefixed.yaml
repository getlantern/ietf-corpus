kind: protocol-element
summary: 'Six system flags are pre-defined, all prefixed with ''\'': \Seen, \Answered, \Flagged, \Deleted, \Draft, and \Recent. \Recent is a session-only flag the client cannot alter; \Deleted marks messages for removal by EXPUNGE.'
