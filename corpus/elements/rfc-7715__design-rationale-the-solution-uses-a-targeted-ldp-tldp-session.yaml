document: rfc-7715
kind: design-rationale
summary: The solution uses a Targeted LDP (tLDP) session between each MPT and PLR to notify PLRs of MPT LSRs. This design avoids defining additional procedures for Make-Before-Break, Graceful Restart, and Typed Wildcard FEC by reusing existing tLDP mechanisms, at the cost of additional tLDP sessions.
section: "1"
topics:
