document: rfc-3986
kind: design-rationale
summary: The terms URL and URN are considered subsets of URI; future specifications should prefer the general term "URI". Whether a given URI acts as a locator or a name depends on the persistence and care of the naming authority's identifier assignment, not on the scheme itself.
section: 1.1.3
extracted_by: claude-sonnet-4-6
