document: rfc-4976
kind: normative-requirement
summary: When a relay receives an AUTH request without an Authorization header, it MUST respond with a 401 Unauthorized containing a WWW-Authenticate header. Upon receiving a 401, the client SHOULD retry with correct credentials in an Authorization header.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
