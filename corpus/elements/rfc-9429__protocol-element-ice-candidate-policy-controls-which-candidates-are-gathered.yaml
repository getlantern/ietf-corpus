document: rfc-9429
kind: protocol-element
summary: ICE candidate policy controls which candidates are gathered and used. The 'all' policy permits all implementation-allowed candidates; the 'relay' policy filters out non-relay candidates to reduce location leakage. The policy can be changed mid-session by triggering an ICE restart.
section: 3.5.3
topics:
    - webrtc
    - realtime
    - privacy
