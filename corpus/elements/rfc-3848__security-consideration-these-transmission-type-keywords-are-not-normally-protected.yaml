document: rfc-3848
kind: security-consideration
summary: These transmission-type keywords are not normally protected in transport and can be modified by an active attacker; they do not reveal specifics of the security mechanism and therefore provide no real-world security assurance. They SHOULD NOT be used for mail filtering or relaying decisions except in very controlled environments.
