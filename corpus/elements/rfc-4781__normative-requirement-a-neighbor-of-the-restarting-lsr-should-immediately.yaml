document: rfc-4781
kind: normative-requirement
summary: A neighbor of the restarting LSR SHOULD immediately remove all NLRI and associated MPLS labels received from the restarting LSR if the Graceful Restart Capability flags indicate the LSR was unable to retain its MPLS state across the restart.
section: "6"
rfc2119_level: SHOULD
topics:
