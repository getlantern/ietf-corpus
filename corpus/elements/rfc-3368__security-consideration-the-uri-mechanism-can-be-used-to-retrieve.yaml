document: rfc-3368
kind: security-consideration
summary: The URI mechanism can be used to retrieve a URI identifying some other site by including only the ID and not the common-name being linked to, making it possible to use a CNRP URI without the user knowing which common-name it refers to. This creates a potential spoofing or misdirection risk.
section: "6"
topics:
    - security
