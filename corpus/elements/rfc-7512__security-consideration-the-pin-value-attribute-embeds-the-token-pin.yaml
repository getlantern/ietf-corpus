document: rfc-7512
kind: security-consideration
summary: The 'pin-value' attribute embeds the token PIN directly in the URI string, which may appear in world-readable command-line arguments, public configuration files, or clear text. It SHOULD only be used if the URI string itself is protected with the same level of security as the PIN itself.
section: "6"
topics:
    - security
    - pkix
    - crypto
