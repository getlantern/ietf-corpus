document: rfc-8664
kind: registry
summary: IANA created the 'SR Capability Flag Field' sub-registry within PCEP Numbers (Standards Action). Defines bit 6 (N, NAI resolution supported) and bit 7 (X, unlimited MSD) of the SR-PCE-CAPABILITY TLV flags. Also allocated METRIC T=11 (Segment-ID Depth) and PST=1 (SR path setup type).
