document: rfc-3380
kind: wire-format
summary: The 'not-settable' out-of-band attribute value is encoded as 0x15 (per RFC 2910). The value-length MUST be 0 and the value empty. It is returned by the Printer in response to indicate an attribute is READ-ONLY or not settable in this implementation.
section: 8.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
