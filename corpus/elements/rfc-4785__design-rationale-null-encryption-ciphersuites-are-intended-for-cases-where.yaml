document: rfc-4785
kind: design-rationale
summary: NULL encryption ciphersuites are intended for cases where confidentiality is not needed or not permitted, such as implementations that must meet import restrictions in some countries. They still provide mutual authentication and message integrity via the PSK mechanism.
