document: rfc-9351
kind: design-rationale
summary: FAD information is advertised as a node-level BGP-LS attribute (with the Node NLRI) because the FAD is a per-node advertisement in IS-IS and OSPF, while the Flexible Algorithm Prefix Metric is a prefix attribute (with the Prefix NLRI), reflecting the different scopes of these objects in IGP.
