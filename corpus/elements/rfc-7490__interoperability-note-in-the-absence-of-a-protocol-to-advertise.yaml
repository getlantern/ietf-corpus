document: rfc-7490
kind: interoperability-note
summary: In the absence of a protocol to advertise the preferred IP address for targeted LDP, an LSR should attempt a TLDP session using the Router ID as defined in RFC 2328, RFC 5305, RFC 5340, RFC 6119, or OSPF-RI, unless configured otherwise.
