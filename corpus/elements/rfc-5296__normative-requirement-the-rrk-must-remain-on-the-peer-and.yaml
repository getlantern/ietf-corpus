document: rfc-5296
kind: normative-requirement
summary: The rRK MUST remain on the peer and the server that derived it and MUST NOT be transported to any other entity. Its lifetime is never greater than that of its parent key, and it MUST be removed from use when the parent key expires.
section: "4.2"
rfc2119_level: MUST NOT
topics:
