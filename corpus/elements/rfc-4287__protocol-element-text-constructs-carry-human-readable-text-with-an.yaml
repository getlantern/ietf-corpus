document: rfc-4287
kind: protocol-element
summary: Text constructs carry human-readable text with an optional 'type' attribute whose value must be 'text', 'html', or 'xhtml'. MIME media types MUST NOT be used as type values on Text constructs; that restriction applies only to atom:content.
section: "3.1"
