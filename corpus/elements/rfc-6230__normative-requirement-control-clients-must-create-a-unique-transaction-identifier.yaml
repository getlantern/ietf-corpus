document: rfc-6230
kind: normative-requirement
summary: Control Clients MUST create a unique transaction identifier for each request; this identifier MUST be unique in the context of the interaction between the Control Client and Control Server. Control Clients MUST wait a minimum of 2*Transaction-Timeout (20 seconds) for a response before considering the transaction failed.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
