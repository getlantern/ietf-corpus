document: rfc-1532
kind: normative-requirement
summary: BOOTP messages that fail consistency checks (IP/UDP length too small for 300-octet minimum payload, or 'op' not 1 or 2) MUST be silently discarded. Messages larger than the minimum MUST be accepted to allow future protocol extensions.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
