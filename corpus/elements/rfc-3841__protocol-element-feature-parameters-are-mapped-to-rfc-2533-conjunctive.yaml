document: rfc-3841
kind: protocol-element
summary: Feature parameters are mapped to RFC 2533 conjunctive normal form predicates. Base feature tag names (e.g., 'audio', 'video', 'methods') get the 'sip.' prefix added; tags with a leading '+' have the '+' stripped; '!' is negation; '#' prefix signals numeric comparison; angle-bracket-quoted values use case-sensitive string matching.
