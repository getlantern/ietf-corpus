document: rfc-9254
kind: security-consideration
summary: Software on the receiving side SHOULD reject all messages that do not comply with the rules of this document and reply with an appropriate error message. In particular, when the id parameter is used, identifiers of the other type must be rejected to avoid divergent interpretation of content between implementations.
