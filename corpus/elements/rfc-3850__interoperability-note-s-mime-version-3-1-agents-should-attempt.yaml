document: rfc-3850
kind: interoperability-note
summary: S/MIME version 3.1 agents should attempt maximum interoperability with prior S/MIME versions (v2 per RFC 2311–2315, v3 per RFC 2630–2634). The changes from v3 include mandatory support for v1/v2 CRLs, overlapping CA validity periods, and prohibition of v1 attribute certificates.
section: "1.2"
