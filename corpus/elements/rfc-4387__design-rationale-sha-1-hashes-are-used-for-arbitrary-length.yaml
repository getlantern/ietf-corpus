document: rfc-4387
kind: design-rationale
summary: SHA-1 hashes are used for arbitrary-length fields such as DNs to keep URI lengths manageable and to emphasize that structured name searching is not supported — this is a simple {key,value} store interface, not an HTTP interface to X.500.
