document: rfc-2711
kind: design-rationale
summary: The option was introduced because the only prior way for a router to determine whether it needed to examine a datagram was to partially parse upper-layer data in every datagram, which was expensive and slow. The Router Alert option avoids this overhead by explicitly signaling router interest.
section: "1.0"
