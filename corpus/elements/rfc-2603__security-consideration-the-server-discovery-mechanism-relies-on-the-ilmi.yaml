document: rfc-2603
kind: security-consideration
summary: The server discovery mechanism relies on the ILMI management framework for security. The service registry MIB is defined with read-only access, so user-side devices may query but not modify it via ILMI; modifications must be made via local configuration on the ATM switch, preventing unauthorized NHC manipulation of registry data.
section: "7"
topics:
    - security
