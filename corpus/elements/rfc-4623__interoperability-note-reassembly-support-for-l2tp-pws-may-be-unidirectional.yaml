document: rfc-4623
kind: interoperability-note
summary: Reassembly support for L2TP PWs MAY be unidirectional; each side independently advertises its reassembly capability via the MRRU AVP. The most recent AVP value received always takes precedence and MUST be updated dynamically if received via the SLI message.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
