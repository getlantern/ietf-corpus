document: rfc-4993
kind: protocol-element
summary: 'Other information (''oi'') payloads MUST conform to RFC 4991 XML and use <other> as root. The ''type'' attribute takes values: ''descriptor-error'', ''payload-error'', ''system-error'', ''authority-error'', and ''no-inflation-support-error'', each with defined trigger conditions.'
section: 3.1.7
