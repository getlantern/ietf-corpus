document: rfc-6553
kind: wire-format
summary: 'The RPL Option is carried in an IPv6 Hop-by-Hop Options header immediately following the IPv6 header, with alignment requirement 2n. It contains: Option Type (0x63, 8-bit), Opt Data Len (8-bit), flags byte (O, R, F bits), RPLInstanceID (8-bit), SenderRank (16-bit), followed by optional sub-TLVs.'
