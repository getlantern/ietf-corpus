document: rfc-5914
kind: security-consideration
summary: Compromise of a trust anchor private key permits unauthorized parties to masquerade as the trust anchor. The scope of damage is bounded by the certification path controls (certPath and exts fields), including any name constraints, associated with the trust anchor.
