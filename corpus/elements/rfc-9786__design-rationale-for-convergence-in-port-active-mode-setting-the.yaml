document: rfc-9786
kind: design-rationale
summary: For convergence in Port-Active mode, setting the standby port to LACP 'out-of-sync' (warm-standby) rather than operationally down improves transition times from standby to active. Prior synchronization of ARP/ND caches is recommended for IRB and L3 services; MAC table synchronization may be considered for L2 services.
section: "4"
topics:
    - routing
