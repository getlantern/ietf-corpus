document: rfc-5626
kind: normative-requirement
summary: The CRLF keep-alive MUST only be used with connection-oriented transports such as TCP or SCTP; it MUST NOT be used with connection-less transports such as UDP. Clients MUST support CRLF keep-alives.
section: 4.4.1
rfc2119_level: MUST
topics:
