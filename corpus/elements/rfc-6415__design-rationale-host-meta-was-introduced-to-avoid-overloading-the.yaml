document: rfc-6415
kind: design-rationale
summary: host-meta was introduced to avoid overloading the root HTTP resource (e.g., 'http://example.com/') with host metadata that is not specific to that resource. A dedicated well-known URI provides a standard location for host-level policy without polluting the root resource.
section: "1"
topics:
