document: rfc-5793
kind: state-machine
summary: 'The PB-TNC session has five states: Init (start), Server Working, Client Working, Decided, and End (terminal). Transitions are triggered by batch types CDATA (client sends data), SDATA (server sends data), RESULT (server signals evaluation complete), CRETRY/SRETRY (restart exchange), and CLOSE (termination or PT disconnect). Both Posture Broker Client and Server MUST follow this state machine.'
section: "3.2"
topics:
