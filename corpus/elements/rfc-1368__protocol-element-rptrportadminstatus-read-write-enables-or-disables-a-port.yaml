document: rfc-1368
kind: protocol-element
summary: rptrPortAdminStatus (read-write) enables or disables a port. A disabled port neither transmits nor receives; it must be explicitly re-enabled. Disabling a port freezes rptrPortAutoPartitionState; enabling it resets the auto-partition state machine to notAutoPartitioned(1) via BEGIN.
section: "4.2"
topics:
    - snmp
