document: rfc-5304
kind: security-consideration
summary: Despite Dobbertin's attacks on MD5 and Wang/Yu's work, there are no published attacks on Keyed-MD5 or HMAC-MD5 as of the document's publication. Bellare's proofs indicate published issues with MD5 do not create an attack on HMAC-MD5 as used in this specification.
