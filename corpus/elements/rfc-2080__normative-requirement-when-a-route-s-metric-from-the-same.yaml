document: rfc-2080
kind: normative-requirement
summary: When a route's metric from the same upstream router changes, or a better metric arrives from any router, the new route MUST be adopted, the route change flag set, and a triggered update signalled. If the new metric is infinity, the deletion process begins.
section: 2.4.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
