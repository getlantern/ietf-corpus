document: rfc-5004
kind: normative-requirement
summary: When the existing best path A and a new candidate best path B are both from external peers and neither is eliminated prior to the BGP identifier comparison step (Step f), the existing best path A SHOULD be kept as the best path to avoid unnecessary transitions.
section: "3"
rfc2119_level: SHOULD
topics:
