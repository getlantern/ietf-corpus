document: rfc-6088
kind: normative-requirement
summary: For the IPv6 (M)Start TC and (N)End TC fields, the 2 least significant bits MUST be ignored in any comparison, consistent with the DS/ECN split defined in RFC 3168. The (N)End TC field MUST be coded the same way as (M)Start TC.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - diffserv
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
