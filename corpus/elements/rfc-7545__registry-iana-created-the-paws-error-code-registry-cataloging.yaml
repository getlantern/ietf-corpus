document: rfc-7545
kind: registry
summary: IANA created the PAWS Error Code Registry cataloging integer error codes for PAWS error responses. Initial entries are MISSING (101), INVALID_VALUE (102), UNSUPPORTED (103), UNIMPLEMENTED (104), OUTSIDE_COVERAGE (105), DATABASE_CHANGE (106), and NOT_REGISTERED (107). New codes require Specification Required.
