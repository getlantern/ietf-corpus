document: rfc-6970
kind: protocol-element
summary: 'PCP error codes are mapped to UPnP IGD error codes: CANNOT_PROVIDE_EXTERNAL maps to 718 ConflictInMappingEntry (for AddPortMapping) or 714 NoSuchEntryInArray (for delete); NOT_AUTHORIZED maps to IGD:1 718 or IGD:2 606; NO_RESOURCES and USER_EX_QUOTA both map to IGD:2 728 NoPortMapsAvailable and cannot be distinguished from each other.'
