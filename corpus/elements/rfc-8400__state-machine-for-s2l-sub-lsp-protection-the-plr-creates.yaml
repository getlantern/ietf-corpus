document: rfc-8400
kind: state-machine
summary: For S2L sub-LSP protection, the PLR creates a forwarding entry with an 'inactive' state after receiving the backup LSP Resv message. On detecting primary egress node failure, the PLR transitions the forwarding entry to 'active', causing traffic to be forwarded through the backup LSP.
section: 5.4.3
topics:
    - routing
    - mpls
