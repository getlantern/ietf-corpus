document: rfc-3326
kind: protocol-element
summary: The Reason header field conveys why a SIP request was issued. It MAY appear in any request within a dialog, in any CANCEL request, and in any response whose status code explicitly allows it. Clients and servers are free to ignore it; it has no impact on protocol processing.
