document: rfc-1971
kind: design-rationale
summary: Stateless autoconfiguration is designed to require no manual configuration of hosts and minimal router configuration, with no additional servers. Small sites can achieve plug-and-play connectivity using link-local addresses formed by appending the interface token to the well-known link-local prefix, without any infrastructure.
