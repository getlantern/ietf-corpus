document: rfc-5575
kind: normative-requirement
summary: Standard BGP policy mechanisms such as UPDATE filtering by NLRI prefix and community matching SHOULD apply to the flow specification NLRI type. Operators can also control propagation by enabling or disabling exchange of a particular (AFI, SAFI) pair on a given BGP peering session.
section: "3"
rfc2119_level: SHOULD
topics:
