document: rfc-5644
kind: protocol-element
summary: Type-P-Spatial-One-way-ipdv-Vector is the sequence <T1, T2, dT2.1-dT1.1, ..., dT2.n-dT1.n, dT2-dT1> representing per-hop IP packet delay variation between two packets P1 and P2; any element is undefined if either packet did not pass the corresponding router.
