document: rfc-1134
kind: wire-format
summary: 'The PPP frame format consists of: Flag (1 octet, 0x7e), Address (1 octet, 0xff), Control (1 octet, 0x03), Protocol (2 octets), Information (variable, default max 1500 octets), FCS (2 octets, optionally 4), and closing Flag (0x7e). Fields are transmitted left to right.'
section: "3.1"
