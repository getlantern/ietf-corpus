document: rfc-1905
kind: normative-requirement
summary: In SetRequest-PDU Phase 2, all variable assignments occur as if simultaneously. If the same variable is named more than once with different values, the actual assignment is implementation-specific. Implementations are strongly encouraged to avoid commitFailed and undoFailed.
section: 4.2.5
rfc2119_level: SHOULD
topics:
