document: rfc-2046
kind: interoperability-note
summary: Multipart messages are NOT completely compatible with RFC 934 encapsulations; in particular, they do not obey RFC 934 quoting conventions for embedded lines beginning with hyphens. Implementations must not assume RFC 934 compatibility.
