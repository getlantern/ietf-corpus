document: rfc-4422
kind: security-consideration
summary: When a SASL security layer with at least integrity protection is in effect, it protects against connection hijack attacks that modify post-authentication protocol data. Implementations SHOULD close the connection when the security layer reports lack of data integrity.
section: 6.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
