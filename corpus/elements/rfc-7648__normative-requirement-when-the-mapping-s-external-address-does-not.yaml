document: rfc-7648
kind: normative-requirement
summary: When the mapping's external address does not belong to the proxy node (e.g., firewall case), the proxy's client side MUST insert a THIRD_PARTY option in its upstream PCP request carrying the mapping's external address.
section: "3.3"
rfc2119_level: MUST
topics:
