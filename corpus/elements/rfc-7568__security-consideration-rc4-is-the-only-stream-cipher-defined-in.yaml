document: rfc-7568
kind: security-consideration
summary: RC4 is the only stream cipher defined in SSLv3 that remains in widespread use, but RC4 exhibits serious biases and is no longer fit for use (RFC 7465). This leaves SSLv3 with no suitable record protection mechanism.
section: "4.1"
topics:
