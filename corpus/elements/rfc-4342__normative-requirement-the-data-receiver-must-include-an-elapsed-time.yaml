document: rfc-4342
kind: normative-requirement
summary: The data receiver MUST include an Elapsed Time option on every required feedback packet, and SHOULD also include the corresponding Timestamp Echo option with Elapsed Time value if recent data packets contained Timestamp options. This allows the sender to separate network RTT from receiver processing delay.
section: "8.2"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
