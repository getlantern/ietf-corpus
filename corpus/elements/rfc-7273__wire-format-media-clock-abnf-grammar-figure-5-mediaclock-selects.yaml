summary: 'Media clock ABNF grammar (Figure 5): `mediaclock` selects among `sender`, `direct[=offset] [rate=N/D]`, `IEEE1722=<EUI64>`, or extension token. An optional `id=[src:]<base64-tag>` prefix precedes the clock type. The `rate` sub-field is expressed as two integers separated by `/`.'
