document: rfc-2355
kind: normative-requirement
summary: The ASSOCIATE command may only be used when requesting a printer device-type, and the specified device-name must be that of a terminal previously returned by the server in a DEVICE-TYPE IS CONNECT command; the server must deny the request otherwise.
section: 7.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
