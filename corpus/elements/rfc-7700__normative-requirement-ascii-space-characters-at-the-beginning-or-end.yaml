document: rfc-7700
kind: normative-requirement
summary: ASCII space characters at the beginning or end of a nickname MUST be removed (e.g., 'stpeter ' becomes 'stpeter'). Interior sequences of more than one ASCII space MUST be mapped to a single ASCII space (e.g., 'St  Peter' becomes 'St Peter').
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
