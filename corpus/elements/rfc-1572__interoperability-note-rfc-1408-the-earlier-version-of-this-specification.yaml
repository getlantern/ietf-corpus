document: rfc-1572
kind: interoperability-note
summary: RFC 1408, the earlier version of this specification, incorrectly reversed the values for VAR and VALUE, putting the spec at odds with existing implementations. A new option number (39) was assigned to NEW-ENVIRON to allow unambiguous interoperation between implementations of this memo and those of RFC 1408.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
