document: rfc-7231
kind: protocol-element
summary: The Expect header field conveys the 100-continue expectation, informing the server that the client is about to send a large message body and wishes to receive a 100 (Continue) interim response before sending it, improving efficiency when the body is large or an error is anticipated.
section: 5.1.1
