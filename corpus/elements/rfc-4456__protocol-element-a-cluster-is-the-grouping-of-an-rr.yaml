document: rfc-4456
kind: protocol-element
summary: A cluster is the grouping of an RR and its client peers. When a single RR exists in a cluster, the cluster is identified by the BGP Identifier of the RR. When multiple RRs exist in the same cluster, all are configured with a shared 4-byte CLUSTER_ID.
