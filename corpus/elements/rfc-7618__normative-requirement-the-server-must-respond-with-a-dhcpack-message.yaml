document: rfc-7618
kind: normative-requirement
summary: The server MUST respond with a DHCPACK message containing OPTION_V4_PORTPARAMS for the requesting client. The port-set assignment MUST be coupled with the address assignment and MUST be conveyed in the same DHCP message.
section: "6"
rfc2119_level: MUST
