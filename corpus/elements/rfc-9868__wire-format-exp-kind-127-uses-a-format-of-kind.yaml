document: rfc-9868
kind: wire-format
summary: EXP (Kind=127) uses a format of Kind (1 byte) + Len (≥4) + 16-bit ExID + option contents. A Length of 255 triggers the extended format with a 16-bit Extended Length. ExIDs are shared with TCP experimental options and assigned by IANA from a combined TCP/UDP ExID registry.
section: "11.10"
topics:
    - udp
    - registry
