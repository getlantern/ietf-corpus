document: rfc-2002
kind: protocol-element
summary: 'Two care-of address types are defined: a ''foreign agent care-of address'' is the IP address of a foreign agent advertised in its Agent Advertisements, and a ''co-located care-of address'' is a locally acquired address (e.g., via DHCP) associated with one of the mobile node''s own network interfaces.'
