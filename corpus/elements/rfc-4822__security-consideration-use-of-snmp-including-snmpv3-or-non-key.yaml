document: rfc-4822
kind: security-consideration
summary: Use of SNMP (including SNMPv3) or non-key-management protocols (e.g., RADIUS, Diameter) to modify or configure RIPv2 Security Associations is NOT RECOMMENDED, as a compromise of those protocols would cascade into compromise of all RIPv2 routing.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
