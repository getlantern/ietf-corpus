document: rfc-6098
kind: design-rationale
summary: RFC 5944 provides replay protection only for Registration Requests initiated by the MN; there is no replay protection mechanism for messages initiated by the FA or HA. The 64-bit Identification field in GNM/GNAM is explicitly designed to close this gap for notification messages originating from FA or HA.
section: "7"
topics:
    - mobility
    - security
