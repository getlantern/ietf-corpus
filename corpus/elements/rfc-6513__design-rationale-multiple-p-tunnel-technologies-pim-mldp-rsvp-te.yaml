document: rfc-6513
kind: design-rationale
summary: Multiple P-tunnel technologies (PIM, mLDP, RSVP-TE, unicast mesh) are all supported because multicast deployment history shows no single option is always acceptable. Segmented inter-AS trees allow each SP to choose the technology that fits its environment without forcing other SPs to adopt it.
section: 3.2.2
topics:
