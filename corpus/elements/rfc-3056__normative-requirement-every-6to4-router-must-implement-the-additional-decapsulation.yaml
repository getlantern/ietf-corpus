document: rfc-3056
kind: normative-requirement
summary: 'Every 6to4 router MUST implement the additional decapsulation rule for incoming IPv4 packets with Protocol 41: apply security checks, remove the IPv4 header, and submit the packet to local IPv6 routing.'
section: "5.3"
rfc2119_level: MUST
