document: rfc-2298
kind: normative-requirement
summary: An MDN with disposition type 'failed' MUST NOT be generated if the user has indicated MDNs are not to be sent. If user consent would be required for other dispositions, it SHOULD also be obtained before sending a 'failed' MDN.
section: "2.2"
rfc2119_level: MUST NOT
