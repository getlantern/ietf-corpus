document: rfc-9233
kind: protocol-element
summary: Georgian letters in ranges U+10D0..U+10FA and U+10FD..U+10FF had their General Category changed from Lo to Ll in Unicode 11.0.0 to reflect new case pairs, but their IDNA2008 derived property value remained PVALID. Newly encoded Mtavruli uppercase letters (General Category Lu) are DISALLOWED.
