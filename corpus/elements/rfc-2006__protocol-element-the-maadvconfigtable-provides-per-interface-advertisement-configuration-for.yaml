document: rfc-2006
kind: protocol-element
summary: The maAdvConfigTable provides per-interface advertisement configuration for mobility agents, including maAdvMaxRegLifetime, maAdvAddress (must be 224.0.0.1 or 255.255.255.255), maAdvMaxInterval (4..1800s), maAdvMinInterval (3..1800s), maAdvMaxAdvLifetime (4..9000s), and maAdvResponseSolicitationOnly (default false).
