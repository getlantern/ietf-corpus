document: rfc-9833
kind: protocol-element
summary: The 'bfd' grouping carries a single holdtime leaf (uint32, units milliseconds) per RFC 5880 Section 6.8.18, representing the expected BFD hold time for failure detection on an AC. The 'redundancy-group' grouping provides a list of groups keyed by group-id with a precedence identityref (primary/secondary).
