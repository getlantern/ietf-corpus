document: rfc-9877
kind: design-rationale
summary: A new 'application/geofeed+csv' media type is preferred over 'text/csv' because the most common use case involves application processing (for IP address lookups) rather than direct user viewing, making an 'application' media type with 'geofeed' subtype more appropriate.
section: "2.1"
