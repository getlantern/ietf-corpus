document: rfc-5929
kind: protocol-element
summary: The 'tls-server-end-point' channel binding type is defined as the hash of the TLS server's certificate as it appears octet-for-octet in the server's Certificate message (the first element of certificate_list). The hash function is selected based on the certificate's signatureAlgorithm.
section: "4.1"
