document: rfc-1088
kind: security-consideration
summary: This specification defines no authentication mechanism for NetBIOS name registration. Any host on the NetBIOS network can register the name IP.XX.XX.XX.XX for an arbitrary IP address, making IP address spoofing and traffic interception trivially possible within the NetBIOS scope.
section: Address Mappings
topics:
    - ip
    - security
