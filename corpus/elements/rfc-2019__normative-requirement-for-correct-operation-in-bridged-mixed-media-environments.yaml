document: rfc-2019
kind: normative-requirement
summary: For correct operation in bridged mixed-media environments, the smallest MTU of all bridged media must be advertised by routers in an MTU option. Multicast packets must not be larger than the smallest MTU of any bridged medium.
section: Interaction with Bridges
rfc2119_level: MUST
topics:
    - ip
    - nat
