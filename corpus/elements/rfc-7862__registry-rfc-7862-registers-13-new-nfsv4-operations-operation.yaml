document: rfc-7862
kind: registry
summary: RFC 7862 registers 13 new NFSv4 operations (operation numbers 59-71) and one new callback operation CB_OFFLOAD (number 15) with IANA. New error codes include NFS4ERR_UNION_NOTSUPP, NFS4ERR_PARTNER_NO_AUTH, and Labeled NFS errors.
