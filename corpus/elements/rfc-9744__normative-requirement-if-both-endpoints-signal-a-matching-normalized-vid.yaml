document: rfc-9744
kind: normative-requirement
summary: If both endpoints signal a matching normalized VID but one operates in single-tag mode and the other in double-tag mode, the V-bit facilitates detection and prevention of tunnel instantiation. The VPWS service tunnel must not be established in this mismatch condition.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - vpn
    - routing
