document: rfc-7203
kind: security-consideration
summary: The IODEF 'restriction' attribute (four values) SHOULD be used at the application level prior to transport to indicate data sensitivity, and XML encryption triggered by these markers (as defined in RID RFC 6545 Section 9.1) MAY be applied for object-level security even when RID transport is not used.
section: "6.1"
topics:
    - security
    - crypto
