document: rfc-8047
kind: interoperability-note
summary: HIP associations can use the multihoming LOCATOR_SET mechanism to migrate between IPv4 and IPv6 addressing realms. However, if both hosts end up with locators only in different realms, an interworking mechanism must be employed; such techniques are outside the scope of this document.
section: 4.2.9
topics:
    - mobility
    - ip
    - v6ops
