document: rfc-4610
kind: interoperability-note
summary: An RP that does not support this specification can coexist with supporting RPs, but it must not receive registrations from DRs (i.e., should not be a closest-RP for any DR). Receivers may still join to it, and it will receive Register copies from supporting RPs.
section: "4"
topics:
