document: rfc-5026
kind: privacy-consideration
summary: Assignment of a home agent from the serving network access provider (local HA) or a nearby network may compromise a mobile node's location privacy, since the home address reveals topological location. Mobile nodes requiring location privacy should not disclose this home address to unauthorized nodes (e.g., by updating DNS).
section: "9.1"
topics:
    - mobility
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
