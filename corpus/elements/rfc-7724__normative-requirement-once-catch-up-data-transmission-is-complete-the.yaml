document: rfc-7724
kind: normative-requirement
summary: Once catch-up data transmission is complete, the server MUST send a DHCPLEASEQUERYSTATUS with dhcp-status-code CatchUpComplete. A DHCPLEASEQUERYSTATUS with QueryTerminated MUST be the last message on the connection before the server closes it.
section: "8.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
