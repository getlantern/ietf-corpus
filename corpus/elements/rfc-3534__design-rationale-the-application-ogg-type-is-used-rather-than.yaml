document: rfc-3534
kind: design-rationale
summary: The application/ogg type is used rather than a more specific subtype because it is intended for cases where no further knowledge of the bitstream content exists; content-specific types (e.g., for Vorbis audio) are handled by the respective subcodecs.
section: "1"
