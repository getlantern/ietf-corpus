document: rfc-8187
kind: wire-format
summary: attr-char covers ALPHA, DIGIT, and the characters "!#$&+-.^_`|~"; it explicitly excludes "*", "'", "%", and curly braces "{}". Characters outside attr-char must be percent-encoded using the specified charset.
