document: rfc-6415
kind: wire-format
summary: The template syntax uses brace-enclosed variable names ('{var-name}') within a URI string. The ABNF defines URI-Template as a sequence of uri-char or variable elements; 'uri' is the predefined variable representing the entire context resource URI, percent-encoded per RFC 3986.
section: 3.1.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
