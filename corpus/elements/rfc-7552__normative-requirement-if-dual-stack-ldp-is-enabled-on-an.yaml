document: rfc-7552
kind: normative-requirement
summary: If Dual-stack LDP is enabled on an interface, the LSR MUST transmit both IPv6 and IPv4 LDP Link Hellos using the same LDP Identifier. If Single-stack LDP is enabled, the LSR MUST transmit only Hellos for the enabled address family.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - v6ops
