document: rfc-3046
kind: interoperability-note
summary: DHCP servers unaware of the Relay Agent Information option will ignore it on receipt and will not echo it back in responses, which is the specified RFC 2132 behavior for unknown options. Deployments must account for servers that silently drop the option.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
