document: rfc-4188
kind: normative-requirement
summary: New implementations SHOULD support dot1dStpPortPathCost32. If the port path cost exceeds the maximum value of dot1dStpPortPathCost (65535), that object should report 65535, and applications should try to read dot1dStpPortPathCost32.
