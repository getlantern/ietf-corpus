document: rfc-9910
kind: design-rationale
summary: '''rdap-active'' is defined only as a link relation, not as a URL <relation> value, because the only known use cases for status filtering involve ''rdap-up''/''rdap-top'' combined with ''active'' status. No other status link relations are defined.'
