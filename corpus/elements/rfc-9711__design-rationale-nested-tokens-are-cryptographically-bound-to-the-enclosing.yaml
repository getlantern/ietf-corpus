document: rfc-9711
kind: design-rationale
summary: Nested tokens are cryptographically bound to the enclosing token by inclusion as a signed submodule claim. If submodule attestations were conveyed in parallel without binding, an attacker could substitute a valid attestation from one device for the attestation of a compromised subsystem.
section: 4.2.18.3
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
