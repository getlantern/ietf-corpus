document: rfc-4738
kind: normative-requirement
summary: The I_MESSAGE MUST contain the MIKEY HDR and timestamp payload for replay protection. The V bit in the HDR MUST be set to '1' (though the Responder ignores it) because a response is mandatory in RSA-R mode.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - crypto
    - security
