document: rfc-5755
kind: errata
summary: The clearance attribute Clearance SEQUENCE in RFC 3281 erroneously used implicit tag [0] on policyId and [1] on classList and [2] on securityCategories. This document corrects it to use untagged fields, restoring conformance with X.509-1997. Implementations MUST NOT output the RFC 3281 version but SHOULD be able to decode it.
section: 4.4.6
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
