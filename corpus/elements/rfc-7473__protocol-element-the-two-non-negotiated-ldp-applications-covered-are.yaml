document: rfc-7473
kind: protocol-element
summary: 'The two non-negotiated LDP applications covered are: (1) Prefix-LSPs — LDP LSPs for IP unicast prefixes advertised via Prefix FEC (RFC 5036); and (2) P2P-PWs — L2VPN point-to-point pseudowire signaling using FEC 128 and FEC 129 (RFC 4447). These predate LDP capabilities negotiation and advertise state without prior capability exchange.'
