kind: wire-format
summary: Embedded (interleaved) binary data is encapsulated in the RTSP stream with a '$' magic byte (decimal 36), followed by a 1-byte channel identifier, and a 2-byte big-endian length field, followed by the binary data (e.g., RTP or RTCP packets).
