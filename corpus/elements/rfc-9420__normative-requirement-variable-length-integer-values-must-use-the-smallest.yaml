document: rfc-9420
kind: normative-requirement
summary: Variable-length integer values MUST use the smallest number of bits required to represent the value. When decoding, values using more bits than necessary MUST be treated as malformed. Vectors starting with prefix '11' are invalid and MUST be rejected.
section: 2.1.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
