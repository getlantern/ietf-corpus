document: rfc-4695
kind: normative-requirement
summary: Standard MIDI File meta-events MUST NOT appear in the MIDI list. By default, undefined System commands (0xF4, 0xF5, 0xF9, 0xFD) MUST NOT appear in a MIDI Command field except for 0xF5 used in the 'dropped 0xF7' construction and 0xF4 used by SysEx cancel sublists.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
