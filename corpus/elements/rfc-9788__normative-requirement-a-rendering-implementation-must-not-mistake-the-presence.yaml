document: rfc-9788
kind: normative-requirement
summary: A rendering implementation MUST NOT mistake the presence of an hp='cipher' parameter in the Cryptographic Payload for the actual presence of a Cryptographic Layer that provides encryption, since encryption may have been added in transit.
section: 2.1.1
rfc2119_level: MUST NOT
topics:
    - email
    - security
