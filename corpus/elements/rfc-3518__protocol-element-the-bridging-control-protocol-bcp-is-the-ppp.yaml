document: rfc-3518
kind: protocol-element
summary: The Bridging Control Protocol (BCP) is the PPP NCP responsible for configuring, enabling, and disabling bridge protocol modules on both ends of a point-to-point link. It uses the same packet exchange mechanism as LCP and operates at PPP protocol type hex 8031.
