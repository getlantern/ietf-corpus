document: rfc-2024
kind: normative-requirement
summary: When multiple TConnConfigTable rows match an incoming transport connection (e.g., individual, group, and global rows overlap), the DLSw node must apply the 'most specific match wins' rule. For equal-specificity matches, the choice of row is implementation-defined. Managers should never create two rows with duplicate remote addressing values.
section: 2.5.3.3
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
