document: rfc-5055
kind: protocol-element
summary: 'The ValidationPolicy SEQUENCE includes a required validationPolRef (OID plus optional params) and optional items: validationAlg [0], userPolicySet [1] (initial policy set), inhibitPolicyMapping [2] BOOLEAN, requireExplicitPolicy [3] BOOLEAN, inhibitAnyPolicy [4] BOOLEAN, trustAnchors [5], keyUsages [6], extendedKeyUsages [7], and specifiedKeyUsages [8]. These map directly to inputs defined in RFC 5280 Section 6.1.1.'
