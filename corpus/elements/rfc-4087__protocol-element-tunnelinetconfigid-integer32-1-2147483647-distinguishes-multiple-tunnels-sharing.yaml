document: rfc-4087
kind: protocol-element
summary: tunnelInetConfigID (Integer32, 1..2147483647) distinguishes multiple tunnels sharing the same endpoints and encapsulation method. For protocols allowing only one tunnel per endpoint pair (e.g., GRE, IP-in-IP), the value is always 1; for protocols like L2F allowing parallel tunnels, managers choose a non-conflicting value.
