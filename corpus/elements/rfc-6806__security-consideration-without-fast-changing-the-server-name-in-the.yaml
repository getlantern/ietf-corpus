document: rfc-6806
kind: security-consideration
summary: 'Without FAST, changing the server name in the request is a significant attack: an attacker can direct a user authenticating to send confidential information to a server under attacker control. Clients SHOULD restrict acceptable server names, especially for the password-changing service.'
