document: rfc-4369
kind: design-rationale
summary: Low-capacity 32-bit statistics (ifcpSessionLcStatsTable) are provided alongside 64-bit counters because at 1 Gbps a Counter32 wraps approximately every 34 seconds, making Counter32 sufficient only in limited scenarios. The 64-bit table is preferred when supported.
