summary: 'IANA created a new ''OTN Signal Type'' subregistry under GMPLS Signaling Parameters, defining values 0–22 (with 12–19 and 23–255 unassigned). New values added by this document: 4 (ODU4), 9 (OCh at 100 Gbps), 10 (ODU0), 11 (ODU2e), 20 (ODUflex(CBR)), 21 (ODUflex(GFP-F) resizable), 22 (ODUflex(GFP-F) non-resizable). New assignments require Standards Action.'
