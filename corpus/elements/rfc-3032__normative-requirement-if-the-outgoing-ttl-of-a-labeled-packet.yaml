document: rfc-3032
kind: normative-requirement
summary: If the outgoing TTL of a labeled packet is 0, the packet MUST NOT be further forwarded, and the label stack MUST NOT be stripped to forward it as an unlabeled packet; the packet's lifetime is considered expired.
section: 2.4.2
rfc2119_level: MUST NOT
topics:
    - mpls
