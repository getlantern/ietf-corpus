document: rfc-2251
kind: protocol-element
summary: An AttributeDescription extends an AttributeType with optional semicolon-separated options (e.g., 'userCertificate;binary'). Options MUST be generated sorted in ascending order, and servers MUST treat AttributeDescriptions with the same type and options as equivalent regardless of option ordering.
section: 4.1.5
rfc2119_level: MUST
topics:
    - ldap
