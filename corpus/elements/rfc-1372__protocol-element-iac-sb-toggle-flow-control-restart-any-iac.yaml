document: rfc-1372
kind: protocol-element
summary: IAC SB TOGGLE-FLOW-CONTROL RESTART-ANY IAC SE requests that any character (except another XOFF) may restart output when flow control is enabled. IAC SB TOGGLE-FLOW-CONTROL RESTART-XON IAC SE restricts restart to the XON character only.
section: "2"
