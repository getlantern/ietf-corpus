document: rfc-3556
kind: design-rationale
summary: Setting RR to zero allows RTCP reception reports to be turned off entirely for sessions on unidirectional links or sessions that do not require reception quality feedback, while keeping RS non-zero so sender reports can still be sent for inter-media synchronization.
