document: rfc-8679
kind: normative-requirement
summary: The context ID MUST be advertised such that all egress-protected tunnels have E as tail end and all egress-protection bypass tunnels have P as tail end while avoiding E. For all relevant routers (primary PE, protector, PLR), they MUST support and agree on the chosen advertisement approach.
section: "5.8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
