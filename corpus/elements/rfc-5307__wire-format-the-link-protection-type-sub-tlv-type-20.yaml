document: rfc-5307
kind: wire-format
summary: 'The Link Protection Type sub-TLV (type 20) is 2 octets: the first octet is a bit vector of protection capabilities (0x01=Extra Traffic, 0x02=Unprotected, 0x04=Shared, 0x08=Dedicated 1:1, 0x10=Dedicated 1+1, 0x20=Enhanced); the second octet is reserved.'
section: "1.2"
topics:
