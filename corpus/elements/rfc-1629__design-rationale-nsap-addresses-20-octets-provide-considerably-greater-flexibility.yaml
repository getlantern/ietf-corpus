document: rfc-1629
kind: design-rationale
summary: NSAP addresses (20 octets) provide considerably greater flexibility and scalability than IPv4 CIDR addresses (4 octets). The larger address space enables deeper hierarchical allocation, more levels of data abstraction, and is expected to support tens or hundreds of thousands of routing domains in the U.S. alone, whereas flat inter-domain routing becomes intractable at that scale.
section: "1"
topics:
