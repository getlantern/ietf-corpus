document: rfc-8047
kind: state-machine
summary: 'Preferred locator change procedure: (1) if ACTIVE, change immediately; (2) if UNVERIFIED, start verification and use another ACTIVE locator meanwhile or use UNVERIFIED under Credit-Based Authorization; (3) if no preference indicated, pick randomly from ACTIVE; (4) if DEPRECATED and non-deprecated exists, pick non-deprecated (applying verification if UNVERIFIED).'
section: "5.4"
topics:
    - mobility
    - ip
