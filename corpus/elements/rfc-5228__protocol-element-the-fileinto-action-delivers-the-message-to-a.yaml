document: rfc-5228
kind: protocol-element
summary: The 'fileinto' action delivers the message to a specified mailbox string. If the implementation uses a different encoding than UTF-8 for mailbox names, it SHOULD reencode from UTF-8. The capability string is 'fileinto'.
section: "4.1"
