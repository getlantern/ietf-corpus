document: rfc-9388
kind: design-rationale
summary: The 'subdivisioncode' footprint type was added to provide finer geographic granularity than the ISO 3166-1 country code type in RFC 8006, enabling dCDNs in Open Caching to advertise coverage at the state or province level rather than only at the country level.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
