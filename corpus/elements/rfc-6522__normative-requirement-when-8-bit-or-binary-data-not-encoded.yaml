document: rfc-6522
kind: normative-requirement
summary: When 8-bit or binary data not encoded in 7-bit form is to be returned and the return path is not guaranteed to be 8-bit or binary capable, the original message MAY be re-encoded into a legal 7-bit MIME message, or the text/rfc822-headers media type MAY be used to return only the original message headers.
section: "3"
rfc2119_level: MAY
topics:
