document: rfc-5445
kind: design-rationale
summary: Complete encoding formats for FEC Object Transmission Information are defined within the FEC Scheme specifications themselves rather than within content delivery protocol specifications. This change from RFC 3452 / RFC 3695 practice reflects that the exact OTI format depends on the FEC Scheme, not on the overlying protocol.
section: "10"
topics:
    - multicast
