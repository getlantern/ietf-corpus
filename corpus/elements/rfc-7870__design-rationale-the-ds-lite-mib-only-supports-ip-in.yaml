document: rfc-7870
kind: design-rationale
summary: The DS-Lite MIB only supports IP-in-IP (IPv4-in-IPv6) encapsulation because RFC 6333 Section 5.2 currently defines only this tunnel type for DS-Lite. If a future RFC defines other tunnel types, the DS-Lite MIB will be updated accordingly.
