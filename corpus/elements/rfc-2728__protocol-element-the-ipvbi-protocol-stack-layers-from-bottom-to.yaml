summary: 'The IPVBI protocol stack layers from bottom to top: NTSC/other television signal, NABTS packetization, Forward Error Correction (FEC), SLIP-style framing, compressed UDP/IP headers, and application data. Each layer has no knowledge of the data it encapsulates.'
