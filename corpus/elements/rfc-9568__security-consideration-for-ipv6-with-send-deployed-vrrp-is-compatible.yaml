document: rfc-9568
kind: security-consideration
summary: For IPv6 with SEND deployed, VRRP is compatible with SEND 'trust anchor' and 'trust anchor or CGA' modes. Active and Backup Routers must share the same prefix delegation in certificates but SHOULD maintain separate key pairs to avoid private key sharing. RFC 9099 Section 2.3 link-level security guidelines are RECOMMENDED.
section: "9"
topics:
    - security
    - ip
    - routing
