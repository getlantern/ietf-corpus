kind: wire-format
summary: The X.509 v3 Certificate is a DER-encoded SEQUENCE of tbsCertificate (TBSCertificate), signatureAlgorithm (AlgorithmIdentifier), and signatureValue (BIT STRING). TBSCertificate contains version, serialNumber, signature, issuer, validity, subject, subjectPublicKeyInfo, optional unique identifiers, and optional extensions.
