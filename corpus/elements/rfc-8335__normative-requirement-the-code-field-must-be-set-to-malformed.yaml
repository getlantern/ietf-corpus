document: rfc-8335
kind: normative-requirement
summary: The Code field MUST be set to Malformed Query (1) if the Extended Echo Request lacks an ICMP Extension Structure, the Extension Structure lacks exactly one Interface Identification Object, or the L-bit is clear but identification is by ifName or ifIndex.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
