document: rfc-8058
kind: security-consideration
summary: A malicious mailer could craft spam with List-Unsubscribe headers to trigger POST requests to arbitrary servers. The fixed 'List-Unsubscribe=One-Click' postarg value limits harm by preventing simulation of arbitrary form submissions on victim websites.
section: "6"
topics:
    - email
    - security
