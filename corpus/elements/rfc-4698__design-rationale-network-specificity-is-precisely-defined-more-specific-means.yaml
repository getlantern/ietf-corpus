document: rfc-4698
kind: design-rationale
summary: 'Network specificity is precisely defined: ''more specific'' means a network whose entire address space is contained within a larger network; ''less specific'' is the inverse. The parent/child relationship is unidirectional — a network cannot simultaneously be both parent and child of an exact-match network.'
