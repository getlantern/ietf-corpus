document: rfc-9176
kind: protocol-element
summary: Registration removal is accomplished by sending DELETE to the registration resource location. The RD responds 2.02 (Deleted) or 404 (Not Found). Endpoints SHOULD explicitly remove registrations on shutdown rather than waiting for lifetime expiry.
section: 5.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
