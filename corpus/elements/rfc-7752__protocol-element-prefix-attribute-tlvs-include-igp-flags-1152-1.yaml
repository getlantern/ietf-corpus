document: rfc-7752
kind: protocol-element
summary: Prefix Attribute TLVs include IGP Flags (1152, 1 octet; bits D/N/L/P for IS-IS Up/Down and OSPF flags), IGP Route Tag (1153, 4*n octets), Extended IGP Route Tag (1154, 8*n octets), Prefix Metric (1155, 4 octets), OSPF Forwarding Address (1156, 4 or 16 octets), and Opaque Prefix Attribute (1157, variable).
