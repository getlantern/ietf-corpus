document: rfc-9462
kind: normative-requirement
summary: When responding to _dns.resolver.arpa. queries, a recursive resolver SHOULD include A and AAAA records for the Designated Resolver's name in the Additional Answers section to save the client an additional round trip.
section: "4"
rfc2119_level: SHOULD
topics:
