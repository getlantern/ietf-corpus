document: rfc-8070
kind: normative-requirement
summary: After receiving the KRB_ERROR with a freshness token, the client SHALL add the PA_AS_FRESHNESS padata-value as an opaque blob in the freshnessToken field of the PKAuthenticator, ensuring it is covered by the client's signature.
