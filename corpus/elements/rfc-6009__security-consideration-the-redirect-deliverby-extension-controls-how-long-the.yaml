document: rfc-6009
kind: security-consideration
summary: The redirect-deliverby extension controls how long the transport infrastructure attempts delivery, potentially generating additional notification messages. Although Deliver-By has a minimum by-time limit, sites may wish to impose additional minimum by-time limits on redirect actions.
