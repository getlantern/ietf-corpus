document: rfc-9562
kind: registry
summary: 'IANA ''UUID Namespace IDs'' registry defines four pre-assigned Namespace IDs: DNS (6ba7b810-9dad-11d1-80b4-00c04fd430c8), URL (6ba7b811-...), OID (6ba7b812-...), X500 (6ba7b814-...). New entries use Specification Required policy; sequential allocation increments the least significant bit of time_low while freezing the remaining fields. Custom/vendor namespace IDs SHOULD use UUIDv4 or UUIDv7 values.'
section: "7.2"
topics:
    - registry
