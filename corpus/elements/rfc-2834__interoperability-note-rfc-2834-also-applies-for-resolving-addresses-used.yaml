document: rfc-2834
kind: interoperability-note
summary: RFC 2834 also applies for resolving addresses used with the Scheduled Transfer Protocol (STP) over HIPPI-800 instead of IP. HARP message types and algorithms can be used for STP since it uses Internet Addresses, provided there is also an IP over HIPPI implementation on all ports.
section: "8"
