document: rfc-3927
kind: normative-requirement
summary: The 'sender IP address' field in an ARP Probe MUST be set to all zeroes to avoid polluting ARP caches on the link in the case where the address is already in use. The 'target IP address' MUST be set to the address being probed.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
