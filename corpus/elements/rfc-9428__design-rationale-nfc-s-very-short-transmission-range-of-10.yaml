document: rfc-9428
kind: design-rationale
summary: NFC's very short transmission range of 10 cm or less is considered to provide intrinsic security properties, as hidden NFC devices outside that range cannot receive NFC signals, making NFC inherently resistant to passive eavesdropping from a distance.
