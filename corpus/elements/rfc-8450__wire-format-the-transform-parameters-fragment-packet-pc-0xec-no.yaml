summary: 'The Transform Parameters Fragment packet (PC=0xEC, No. of Slices=0) adds a payload header containing: Extended Sequence Number (16 bits), Reserved/I/F flags (8 bits), PC=0xEC (8 bits), Picture Number (32 bits), Slice Prefix Bytes (16 bits), Slice Size Scaler (16 bits), Fragment Length (16 bits), and No. of Slices=0 (16 bits), followed by variable-length coded Transform Parameters.'
