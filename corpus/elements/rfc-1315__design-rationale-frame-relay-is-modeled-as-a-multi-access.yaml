document: rfc-1315
kind: design-rationale
summary: Frame Relay is modeled as a multi-access media rather than a group of point-to-point connections. This treats the physical connection as a single interface with many virtual destinations, enabling a network manager to group all virtual circuits with their corresponding physical connection for simpler diagnostics.
