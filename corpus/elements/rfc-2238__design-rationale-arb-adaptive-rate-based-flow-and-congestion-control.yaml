document: rfc-2238
kind: design-rationale
summary: ARB (Adaptive Rate-Based) flow and congestion control is performed only at the RTP endpoints; intermediate HPR nodes are not involved. This design keeps per-hop complexity low and allows the endpoints to prevent congestion rather than react to it.
