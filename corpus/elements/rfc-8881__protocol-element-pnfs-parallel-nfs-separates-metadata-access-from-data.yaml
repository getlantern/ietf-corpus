document: rfc-8881
kind: protocol-element
summary: pNFS (parallel NFS) separates metadata access from data access, enabling data I/O to multiple storage servers in parallel. Access is governed by recallable objects called layouts, which integrate with the locking model and may use NFSv4.1 or other storage protocols.
section: "12"
