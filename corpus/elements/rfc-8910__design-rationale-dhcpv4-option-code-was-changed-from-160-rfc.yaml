document: rfc-8910
kind: design-rationale
summary: DHCPv4 option code was changed from 160 (RFC 7710) to 114 because Polycom devices used code 160 for other purposes, as discovered during the IETF 106 network experiment in Singapore, causing those devices to malfunction when option 160 carried the Captive Portal API URL.
section: Appendix B
topics:
