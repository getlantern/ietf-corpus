document: rfc-4821
kind: normative-requirement
summary: All implementations MUST include a mechanism where applications using connectionless protocols can send their own probes; a third OS mode is REQUIRED where a datagram is sent even if larger than the current eff_pmtu estimate, with the DF bit set for IPv4.
section: "9"
rfc2119_level: MUST
topics:
