document: rfc-8178
kind: protocol-element
summary: 'The following XDR changes are prohibited in NFSv4: any structural modification or deletion of existing requests or replies beyond the listed additions; addition of new RPC procedures to the NFSv4 or callback program; and deletion or reuse of existing RPC procedures, operation codes, enum values, flag bits, or switch cases.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
