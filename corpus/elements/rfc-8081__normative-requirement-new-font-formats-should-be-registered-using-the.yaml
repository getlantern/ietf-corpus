document: rfc-8081
kind: normative-requirement
summary: New font formats SHOULD be registered using the IANA online media type registration form, consulting RFC 6838 on registration procedures. The font specification SHOULD preferably be freely available, and if the format can contain multiple fonts, a fragment identifier syntax SHOULD also be defined.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - registry
    - process
