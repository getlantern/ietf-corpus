document: rfc-5601
kind: interoperability-note
summary: Implementers of the mapping tables (pwIndexMappingTable and pwGenFecIndexMappingTable) must be aware that large InetAddress or attachment identifier OID values can cause table row OIDs to exceed 128 sub-identifiers, making them inaccessible via SNMPv1, SNMPv2c, or SNMPv3.
