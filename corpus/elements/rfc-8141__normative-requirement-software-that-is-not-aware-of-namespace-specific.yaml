document: rfc-8141
kind: normative-requirement
summary: Software that is not aware of namespace-specific canonicalization and encoding rules MUST NOT construct URNs from names in a non-URN identifier system, because names valid in that system may contain characters not permitted in URN syntax.
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
