document: rfc-6276
kind: design-rationale
summary: When the mobile router is away from home, it assumes the role of a DHCPv6 relay agent co-located with the requesting router function, in addition to its normal requesting router role. This dual-role design is necessary because DHCPv6 messages must be unicast to the home agent rather than multicast on the visited link.
section: "3"
topics:
