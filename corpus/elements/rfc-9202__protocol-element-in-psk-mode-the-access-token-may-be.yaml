document: rfc-9202
kind: protocol-element
summary: In PSK mode, the access token may be transferred via the psk_identity field of the DTLS ClientKeyExchange message instead of uploading it to the authz-info endpoint beforehand. For DTLS 1.3, the token is placed in the identity field of a PSKIdentity within the PreSharedKeyExtension of the ClientHello.
section: 3.3.2
topics:
