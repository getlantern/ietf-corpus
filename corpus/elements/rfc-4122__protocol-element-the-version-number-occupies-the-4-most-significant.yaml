document: rfc-4122
kind: protocol-element
summary: 'The version number occupies the 4 most significant bits (bits 12–15) of the time_hi_and_version field. Defined versions are: 1 (time-based), 2 (DCE Security with embedded POSIX UIDs), 3 (name-based using MD5), 4 (randomly or pseudo-randomly generated), and 5 (name-based using SHA-1).'
section: 4.1.3
