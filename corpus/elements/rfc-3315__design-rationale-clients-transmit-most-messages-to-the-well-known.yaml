document: rfc-3315
kind: design-rationale
summary: Clients transmit most messages to the well-known multicast address FF02::1:2 rather than a configured server address, so no pre-configuration of server addresses is required on clients. This zero-configuration discovery model is enabled by IPv6's mandatory multicast support.
section: "1.1"
topics:
    - ip
    - multicast
