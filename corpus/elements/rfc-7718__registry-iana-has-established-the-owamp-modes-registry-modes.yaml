document: rfc-7718
kind: registry
summary: IANA has established the OWAMP-Modes registry. Modes are indicated by setting single bits in a 32-bit Modes field exchanged in Server Greeting and Set-up Response messages, with initial assignments for Unauthenticated (bit 0), Authenticated (bit 1), Encrypted (bit 2), Reserved (bit 3), and IKEv2-derived Shared Secret Key (bit 4).
