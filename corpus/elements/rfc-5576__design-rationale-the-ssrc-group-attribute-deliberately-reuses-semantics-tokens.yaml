document: rfc-5576
kind: design-rationale
summary: The 'ssrc-group' attribute deliberately reuses semantics tokens from the 'group' attribute (FID, FEC) because source grouping relationships are analogous to media-stream grouping relationships. Other 'group' semantics (LS, SRF, ANAT, CS) are explicitly excluded as inapplicable to per-source grouping.
section: "4.2"
topics:
