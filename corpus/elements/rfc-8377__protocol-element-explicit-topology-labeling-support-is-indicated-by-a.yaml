document: rfc-8377
kind: protocol-element
summary: 'Explicit topology labeling support is indicated by a 2-bit capability field (bits 14-15) in the Port TRILL Version Sub-TLV. Four values are defined: 0 (no support), 1 (can insert and tolerate but does not require), and 2 or 3 (requires explicit label in received packets except for topology zero).'
section: 2.4.1
topics:
