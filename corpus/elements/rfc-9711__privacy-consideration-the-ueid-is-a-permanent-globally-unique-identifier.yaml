document: rfc-9711
kind: privacy-consideration
summary: The UEID is a permanent, globally unique identifier that enables cross-context tracking of a device across all interactions. Implementations should limit UEID exposure, and profiles may prohibit its inclusion for privacy-sensitive use cases.
section: "8.1"
topics:
    - privacy
    - security
