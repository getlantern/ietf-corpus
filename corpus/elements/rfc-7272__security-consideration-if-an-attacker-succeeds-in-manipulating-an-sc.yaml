document: rfc-7272
kind: security-consideration
summary: If an attacker succeeds in manipulating an SC's wallclock, the SC will report incorrect IDMS timestamps, corrupting synchronization for the entire group. It is recommended to use a secure time synchronization service to prevent such clock synchronization attacks.
section: "12"
topics:
    - security
    - rtp
    - ntp
    - realtime
