document: rfc-7606
kind: normative-requirement
summary: For all path attributes except AS_PATH and ATOMIC_AGGREGATE, an attribute length of zero SHALL be considered a syntax error. AS_PATH and ATOMIC_AGGREGATE are the only attributes defined in this specification that may validly have a zero-length value.
section: "4"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
