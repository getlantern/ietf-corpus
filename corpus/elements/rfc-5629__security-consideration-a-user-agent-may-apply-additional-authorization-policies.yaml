document: rfc-5629
kind: security-consideration
summary: A user agent MAY apply additional authorization policies, including prompting the user with the application identity and associated dialog. If user authorization is required, the UA SHOULD respond with 202, and if authorization is denied for a SUBSCRIBE, generate a terminating NOTIFY; for REFER, MUST NOT act on the Refer-To URI until authorized.
section: "9.2"
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
