document: rfc-7715
kind: normative-requirement
summary: When a PLR receives a Label Mapping for a FEC that includes a Protected Node Status, it MUST only use that label binding once the advertised node becomes unreachable; for MP2MP LSPs, the label binding on the MPT MUST only be used once node N becomes unreachable.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
