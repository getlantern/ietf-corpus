document: rfc-8402
kind: normative-requirement
summary: An IGP-Anycast segment MUST NOT reference a particular node. Within an anycast group, all routers in the SR domain MUST advertise the same prefix with the same SID value.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
