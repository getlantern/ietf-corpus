document: rfc-5688
kind: security-consideration
summary: The sip.app-subtype tag in a REGISTER request reveals the set of supported application media streams, which may be sensitive information giving insight into product capabilities. Applications utilizing this tag SHOULD provide means for ensuring its integrity and SHOULD provide a mechanism for guaranteeing authenticity.
section: "5"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
