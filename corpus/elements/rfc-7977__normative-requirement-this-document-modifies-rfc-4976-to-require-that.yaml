document: rfc-7977
kind: normative-requirement
summary: 'This document modifies RFC 4976 to require that all connections between MSRP clients and relays MUST be authenticated, not just AUTH requests. Three mechanisms are permitted: HTTP Digest in AUTH, cookie-based or HTTP Digest in the WebSocket handshake, or mutual TLS.'
section: 5.3.1
rfc2119_level: MUST
topics:
    - websocket
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
