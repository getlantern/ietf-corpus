document: rfc-7550
kind: normative-requirement
summary: A client requesting multiple IA option types SHOULD use a single DHCPv6 session and, when the server only fulfills a subset of requested IAs, SHOULD continue including unfulfilled IA options in subsequent messages to the server rather than restarting the discovery process.
section: "4"
rfc2119_level: SHOULD
topics:
