document: rfc-3543
kind: normative-requirement
summary: A registration revocation acknowledgment message MUST be sent in response to a valid and authenticated registration revocation message. The acknowledgment MUST be protected by a valid authenticator (home-foreign or mobile-home) or an equivalent agreed-upon mechanism.
section: "3.4"
rfc2119_level: MUST
topics:
    - mobility
    - security
