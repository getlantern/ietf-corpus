kind: wire-format
summary: 'The PPP-in-X.25 frame substitutes the X.25 header for the smaller HDLC header. Fields in order: Flag (0x7e, 1 octet), Address (1 octet), Control (1 octet), D bit, Q bit, SVC# hi (6 bits), SVC# lo (1 octet), p(r) (3 bits), M bit, p(s) (3 bits), zero bit, PPP Protocol (2 octets), followed by Information and Padding.'
