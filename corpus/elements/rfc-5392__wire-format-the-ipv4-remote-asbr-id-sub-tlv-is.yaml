document: rfc-5392
kind: wire-format
summary: The IPv4 Remote ASBR ID sub-TLV is TLV type 22 and is 4 octets in length, carrying a stable and routable IPv4 address of the remote ASBR. Use of the TE Router Address as specified in the Router Address TLV is RECOMMENDED.
section: 3.3.2
topics:
