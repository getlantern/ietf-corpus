document: rfc-8601
kind: security-consideration
summary: An authentication 'pass' result does not render a message trustworthy. Spam or malicious mail may legitimately pass DKIM or SPF checks if sent by a compromised or spam-originating domain. MUAs and filters must apply additional reputation or policy judgements beyond raw authentication results.
section: "7.2"
topics:
    - email
    - security
