document: rfc-8307
kind: security-consideration
summary: The Security Considerations of RFC 5785 apply to all well-known URIs under 'ws' and 'wss'. Applications defining well-known URI suffixes for WebSocket use must consider whether equivalent HTTP(S) resources (formed via RFC 6455 Section 4) pose information disclosure or other security risks.
section: "3"
topics:
    - websocket
    - security
