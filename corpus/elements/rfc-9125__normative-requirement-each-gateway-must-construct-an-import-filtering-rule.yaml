document: rfc-9125
kind: normative-requirement
summary: Each gateway MUST construct an import filtering rule to import any route that carries a route target with the same site identifier that the gateway itself uses, ensuring only gateways for the same site auto-discover each other.
section: "3"
rfc2119_level: MUST
topics:
