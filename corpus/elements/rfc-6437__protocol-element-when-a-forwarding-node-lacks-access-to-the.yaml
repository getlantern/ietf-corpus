document: rfc-6437
kind: protocol-element
summary: When a forwarding node lacks access to the complete 5-tuple (e.g., for fragmented packets), it may define flows using the 2-tuple {dest addr, source addr} instead. This results in unfragmented and fragmented packets of the same transport session receiving different flow label values.
section: "3"
topics:
