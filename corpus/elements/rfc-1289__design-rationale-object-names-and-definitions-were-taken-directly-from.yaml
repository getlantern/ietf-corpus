document: rfc-1289
kind: design-rationale
summary: Object names and definitions were taken directly from the DIGITAL Network Architecture Network Management Functional Specification Version 4.0.0 (July 1983) and then adapted to be as consistent as possible with RFC 1156 MIB naming conventions. The term EXECUTOR refers exclusively to the local DECnet software node and is not intended to affect any other protocols running on the system.
