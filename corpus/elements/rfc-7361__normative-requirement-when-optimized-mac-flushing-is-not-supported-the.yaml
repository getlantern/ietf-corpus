document: rfc-7361
kind: normative-requirement
summary: When optimized MAC flushing is not supported, the MAC withdraw procedures defined in RFC 4762 (MTU-s or PE2-rs sends the MAC withdraw message) SHOULD be used. This applies during network upgrades when not all devices support the optimized solution.
section: 5.1.2
rfc2119_level: SHOULD
topics:
    - mpls
