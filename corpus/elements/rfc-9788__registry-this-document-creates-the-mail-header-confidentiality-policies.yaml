document: rfc-9788
kind: registry
summary: This document creates the 'Mail Header Confidentiality Policies' IANA registry with 'Specification Required' policy. Initial entries are hcp_baseline (Recommended), hcp_shy, and hcp_no_confidentiality. Entries must include a stable reference, pseudocode, differentiation from existing policies, and deployment considerations.
section: "12.3"
