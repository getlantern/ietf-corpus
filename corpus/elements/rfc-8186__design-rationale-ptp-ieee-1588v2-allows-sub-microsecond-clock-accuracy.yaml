document: rfc-8186
kind: design-rationale
summary: PTP (IEEE 1588v2) allows sub-microsecond clock accuracy in the data plane, whereas NTP typically achieves only 5ms–100ms accuracy and synchronizes the control plane, not the data plane. Supporting PTP timestamps in TWAMP/OWAMP enables higher-precision IP performance measurements.
section: "1"
topics:
