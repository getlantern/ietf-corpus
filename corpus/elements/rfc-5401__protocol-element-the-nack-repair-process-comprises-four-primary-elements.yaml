document: rfc-5401
kind: protocol-element
summary: 'The NACK Repair Process comprises four primary elements: (1) receiver NACK process initiation, (2) NACK suppression via random backoff timers, (3) NACK message content identifying repair needs, and (4) sender NACK processing and repair response. This is the critical component distinguishing NACK-based reliable multicast protocols.'
section: "3.2"
topics:
    - multicast
