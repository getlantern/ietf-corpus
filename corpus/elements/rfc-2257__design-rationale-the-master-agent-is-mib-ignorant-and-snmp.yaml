document: rfc-2257
kind: design-rationale
summary: The master agent is 'MIB ignorant and SNMP omniscient' while each subagent is 'SNMP ignorant and MIB omniscient'. This clean division ensures master agents handle all SNMP protocol operations and access control, while subagents focus exclusively on management instrumentation without needing SNMP knowledge.
