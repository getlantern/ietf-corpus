document: rfc-1184
kind: normative-requirement
summary: At no time should DO LINEMODE be negotiated in both directions of a Telnet connection. The side that sent DO LINEMODE is the server side; the side that sent WILL LINEMODE is the client side. DO/DONT FORWARDMASK and WILL/WONT FORWARDMASK must only be sent after their respective DO/WILL LINEMODE has been negotiated.
section: "5.7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
