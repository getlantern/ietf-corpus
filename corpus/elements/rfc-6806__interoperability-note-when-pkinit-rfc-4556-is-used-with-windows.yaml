summary: When PKINIT (RFC 4556) is used with Windows implementations, the NT-ENTERPRISE client name is encoded as a Subject Alternative Name extension in the client's X.509 certificate using otherName with type-id id-ms-sc-logon-upn (1.3.6.1.4.1.311.20.2.3) and a KerberosString value.
