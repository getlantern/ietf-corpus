document: rfc-9486
kind: security-consideration
summary: Packets that include IPv6 extension headers with IOAM information MUST NOT be leaked through the boundaries of the IOAM-Domain. IOAM-Domain boundary routers MUST filter incoming traffic containing IOAM extension headers and MUST filter outgoing traffic leaving the domain that contains IOAM extension headers.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
