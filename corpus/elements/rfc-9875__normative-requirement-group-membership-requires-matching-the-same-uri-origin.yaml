document: rfc-9875
kind: normative-requirement
summary: Group membership requires matching the same URI origin (per HTTP Section 4.3.1) in addition to matching the Cache-Groups string. Responses from different origins cannot share a group.
section: "2.1"
rfc2119_level: MUST
topics:
