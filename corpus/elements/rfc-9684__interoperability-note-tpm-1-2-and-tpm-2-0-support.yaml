document: rfc-9684
kind: interoperability-note
summary: TPM 1.2 and TPM 2.0 support are modeled as separate YANG features ('tpm12' and 'tpm20') with distinct RPCs and data nodes. Most commonly only one type will be available on an Attester; composite devices with multiple TPMs of different versions may expose both feature sets simultaneously.
section: 2.1.2.1
topics:
