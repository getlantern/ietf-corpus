document: rfc-2051
kind: protocol-element
summary: 'The APPC MIB module (appcMIB, OID snanauMIB 3) is organized into six object groups: appcGlobal (global defaults, controls, CNOS commands), appcLu (local LU, partner LU, mode tables), appcTp (transaction program tables), appcSession (active, stats, history, HPR session tables), appcConversation (active and historical conversation tables), and appcCPIC (CPI-C side information tables).'
section: "3.1"
