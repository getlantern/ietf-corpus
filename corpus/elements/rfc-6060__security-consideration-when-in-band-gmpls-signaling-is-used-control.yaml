document: rfc-6060
kind: security-consideration
summary: When in-band GMPLS signaling is used, control plane and data plane security affect each other. When out-of-band signaling is used, data-plane security is decoupled from the control plane. Where control-plane communications use 802.1AE MACsec point-to-point, no further security measures may be needed.
section: "6"
topics:
