document: rfc-3910
kind: design-rationale
summary: 'The document intentionally reverses the intuitive naming: the ''SPIRITS server'' (IP host) acts as the SIP subscriber (issues SUBSCRIBE requests), and the ''SPIRITS client'' (PSTN gateway) acts as the SIP notifier (issues NOTIFY requests). This was done to adhere to RFC 3265 nomenclature and reduce architectural ambiguity.'
