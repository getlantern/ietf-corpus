document: rfc-7989
kind: normative-requirement
summary: Endpoints MUST include a Session-ID header field value in all SIP messages transmitted as part of a communication session. The locally generated UUID MUST appear in the 'local-uuid' portion and the peer's UUID, if known, MUST appear as the 'remote' parameter; the nil UUID MUST be used if the peer's UUID is not yet known.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
