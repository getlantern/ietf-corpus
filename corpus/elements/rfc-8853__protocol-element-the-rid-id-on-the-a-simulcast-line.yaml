document: rfc-8853
kind: protocol-element
summary: The rid-id on the 'a=simulcast' line is the simulcast stream identifier, defined by 'a=rid' lines per RFC 8851. Each simulcast stream is separated by ';'; alternative formats within a stream are separated by ','. The leftmost listed stream or format is most preferred.
section: "5.2"
topics:
