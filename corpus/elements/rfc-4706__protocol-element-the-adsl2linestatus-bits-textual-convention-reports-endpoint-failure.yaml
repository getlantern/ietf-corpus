document: rfc-4706
kind: protocol-element
summary: 'The Adsl2LineStatus BITS textual convention reports endpoint failure state: noDefect(0), lossOfFrame(1), lossOfSignal(2), lossOfPower(3), and initFailure(4); lossOfPower is typically ATU-R only and initFailure is never active on ATU-R.'
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
