document: rfc-7915
kind: normative-requirement
summary: If an IPv6 packet that is ≤1280 bytes results (after translation) in an IPv4 packet that is larger than the MTU of the next-hop interface, the translator MUST perform IPv4 fragmentation on that packet so it can be transferred over the constricting link.
section: 5.1.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
