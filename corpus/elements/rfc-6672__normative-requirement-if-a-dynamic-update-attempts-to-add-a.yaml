document: rfc-6672
kind: normative-requirement
summary: If a dynamic update attempts to add a DNAME where a CNAME already exists at that owner name, the server MUST ignore the DNAME. If a CNAME is added where a DNAME already exists, the CNAME MUST be ignored.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
