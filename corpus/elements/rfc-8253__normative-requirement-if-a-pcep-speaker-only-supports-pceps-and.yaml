document: rfc-8253
kind: normative-requirement
summary: If a PCEP speaker only supports PCEPS and receives an Open message, it MUST treat it as an unexpected message, reply with PCErr Error-Type 1 Error-value 1, and MUST close the TCP connection.
section: "3.2"
rfc2119_level: MUST
