document: rfc-1042
kind: wire-format
summary: The 802.5 Routing Information Field (RIF) consists of a 2-octet Routing Control (RC) field containing B[3]:LTH[5]:D[1]:LF[3]:r[4] subfields, followed by 0 to 8 two-octet Route Designator (RD) fields. Total RIF length is 2–18 octets; only even values 2–30 are allowed for LTH.
