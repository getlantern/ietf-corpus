document: rfc-6486
kind: security-consideration
summary: Manifests enable detection of deleted or stale-substituted signed objects, but cannot repair such attacks. The manifest's signing structure and nextUpdate field allow detection of manifest tampering within the manifest update schedule; however, fine-grained replay attacks within a single update interval are not necessarily detectable.
section: "8"
topics:
