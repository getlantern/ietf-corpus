document: rfc-1731
kind: normative-requirement
summary: Upon decrypting the Kerberos ticket and authenticator, the server must add one to the checksum and encrypt the resulting 8-octet response in the session key. The server must verify that the principal in the Kerberos ticket is authorized to connect as the specified user name.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
