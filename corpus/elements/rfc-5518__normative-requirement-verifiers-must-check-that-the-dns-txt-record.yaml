document: rfc-5518
kind: normative-requirement
summary: Verifiers MUST check that the DNS TXT record consists of strings of lowercase letters separated by spaces, and discard any records not in that format. This defends against misconfigured records and records synthesized from DNS wildcards.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - dns
