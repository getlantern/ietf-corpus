kind: protocol-element
summary: NLSF stabilization (silk/NLSF_stabilize.c) must use saturating 16-bit addition (silk_ADD_SAT16) when enforcing minimum delta spacing between NLSFs to prevent wrap-around when high LSF parameter values are decoded from adversarial bitstreams.
