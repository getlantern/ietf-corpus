document: rfc-2720
kind: protocol-element
summary: The flowManagerInfoTable controls meter tasks. Each row specifies a CurrentRuleSet, a StandbyRuleSet, and a HighWaterMark percentage. When flow table usage exceeds the HighWaterMark, the meter switches from CurrentRuleSet to StandbyRuleSet automatically.
