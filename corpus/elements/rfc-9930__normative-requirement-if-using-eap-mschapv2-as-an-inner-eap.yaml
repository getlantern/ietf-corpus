document: rfc-9930
kind: normative-requirement
summary: If using EAP-MSCHAPv2 as an inner EAP method, the EAP-FAST-MSCHAPv2 variant defined in RFC 5422, Section 3.2.3 MUST be used instead of the standard MSCHAPv2 derivation. The first and second 16-octet halves of the MSK are swapped when used as IMSKs for TEAP.
section: 3.6.4
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
