document: rfc-9946
kind: protocol-element
summary: The load rate adjustment algorithm always executes at the server regardless of test direction. In upstream tests, the client uses transmission parameters communicated by the server in periodic Status Feedback messages (not a local Sending Rate Table), enabling the server to control both sending rates and the adjustment algorithm.
section: "8.1"
topics:
    - measurement
