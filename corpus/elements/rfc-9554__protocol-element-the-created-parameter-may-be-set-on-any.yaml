document: rfc-9554
kind: protocol-element
summary: The CREATED parameter may be set on any property to record the point in time (as a TIMESTAMP per RFC 6350 Section 4.3.5) when that property was created. Updating a property value SHOULD NOT change this creation timestamp.
section: "4.3"
extracted_by: claude-sonnet-4-6
