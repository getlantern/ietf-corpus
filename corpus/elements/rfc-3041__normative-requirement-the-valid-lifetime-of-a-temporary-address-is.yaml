document: rfc-3041
kind: normative-requirement
summary: The valid lifetime of a temporary address is the lower of the corresponding public address's Valid Lifetime or TEMP_VALID_LIFETIME. The preferred lifetime is the lower of the public address's Preferred Lifetime or (TEMP_PREFERRED_LIFETIME - DESYNC_FACTOR).
section: "3.3"
rfc2119_level: REQUIRED
topics:
    - ip
