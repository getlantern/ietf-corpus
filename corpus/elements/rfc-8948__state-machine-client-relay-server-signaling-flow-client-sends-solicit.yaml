document: rfc-8948
kind: state-machine
summary: 'Client-relay-server signaling flow: client sends Solicit(IA_LL) to relay; relay encapsulates in Relay-forward adding QUAD option; server responds in Relay-reply with Advertise; relay forwards to client; client sends Request; relay forwards in Relay-forward with QUAD; server replies in Relay-reply; relay delivers Reply to client. Renew cycle follows the same relay-mediated pattern.'
section: "3.2"
topics:
    - ip
