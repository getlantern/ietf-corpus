document: rfc-2478
kind: design-rationale
summary: For odd-message-count mechanisms, there is an explicit design tradeoff between optimal message count and providing the initiator assurance against list modification. RFC 2478 leaves this choice to the implementation rather than mandating one approach.
section: 3.2.2
topics:
