document: rfc-1294
kind: normative-requirement
summary: Fragments must be sent in order starting with offset zero and ending with the final fragment, must not be interrupted by other packets on the same DLC, and an end station must be able to reassemble up to 2K octets (8K recommended). If any fragment is missing or corrupted, the entire message is dropped.
section: "9"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
