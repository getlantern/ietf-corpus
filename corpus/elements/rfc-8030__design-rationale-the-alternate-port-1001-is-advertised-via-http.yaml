document: rfc-8030
kind: design-rationale
summary: The alternate port 1001 is advertised via HTTP alternative services to allow middleboxes to optimize idle timeouts for push connections. The default port 443 has lower idle timeouts suited for web browsing, causing unnecessary radio communications on battery-powered devices.
section: "3"
