document: rfc-2495
kind: normative-requirement
summary: The far end cannot undo loopbacks set by a manager. A manager can undo loopbacks set by the far end. Both line and inward loopbacks can co-exist; a NoLoopback from the far end when an inward loopback was set by the manager leaves the inward loopback in place.
section: 2.2.5
rfc2119_level: MUST
topics:
    - snmp
