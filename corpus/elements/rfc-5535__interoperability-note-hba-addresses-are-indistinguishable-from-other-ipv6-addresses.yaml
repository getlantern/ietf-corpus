document: rfc-5535
kind: interoperability-note
summary: HBA addresses are indistinguishable from other IPv6 addresses in their format. DNS publishers and Shim6 initiators cannot determine which addresses belong to an HBA set by inspection alone; alternative mechanisms are required if an initiator must use only HBA addresses when non-HBA addresses are also present in DNS.
section: "9"
topics:
