document: rfc-9806
kind: interoperability-note
summary: RFC 7866 previously specified 'application/rs-metadata', which has been replaced by 'application/rs-metadata+xml' in RFC 9806. Implementations that used the old media type label from RFC 7866 must be updated to use 'application/rs-metadata+xml'.
section: "4.1"
topics:
    - sip
    - realtime
