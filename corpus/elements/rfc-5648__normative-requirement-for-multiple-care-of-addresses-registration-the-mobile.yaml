document: rfc-5648
kind: normative-requirement
summary: For multiple care-of addresses registration, the mobile node MUST include a Binding Identifier mobility option in the Binding Update. When IPsec ESP protects the Binding Update, the care-of address MUST be carried in the Care-of Address field of the Binding Identifier mobility option, and the alternate Care-of Address option MUST NOT be included.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
