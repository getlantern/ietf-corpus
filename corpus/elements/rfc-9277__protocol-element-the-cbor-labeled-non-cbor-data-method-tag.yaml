summary: 'The CBOR-Labeled Non-CBOR Data method (tag 55801) prepends a 12-byte CBOR header to non-CBOR data: outer tag 55801, inner protocol-specific 4-byte tag, and the constant 3-byte byte string ''BOR''. The non-CBOR payload follows directly after the 12-byte header.'
