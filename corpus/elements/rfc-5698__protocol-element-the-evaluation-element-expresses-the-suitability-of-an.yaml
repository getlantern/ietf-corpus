document: rfc-5698
kind: protocol-element
summary: The Evaluation element expresses the suitability of an algorithm for a specific set of parameter constraints, defined by optional Parameter elements and a mandatory Validity period. Multiple Evaluation elements within one Algorithm allow different suitability windows for different parameter ranges (e.g., RSA-1024 vs RSA-2048).
section: "3.9"
topics:
    - crypto
    - security
