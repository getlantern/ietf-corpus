document: rfc-9056
kind: security-consideration
summary: To protect against DoS attacks, excess traffic from malicious or malfunctioning devices can be mitigated through policing and shaping at the input of a DetNet domain. To prevent delay attacks by external entities, DetNet allows for mitigation of man-in-the-middle attacks through authentication and authorization of devices within the DetNet domain.
section: "7"
