document: rfc-5801
kind: normative-requirement
summary: If the client supports channel binding and the server does not appear to (no -PLUS name advertised), the client MUST NOT use an 'n' gs2-cb-flag. Clients that support mechanism negotiation and channel binding MUST use 'p' when the server offers the PLUS variant.
section: "5"
rfc2119_level: MUST NOT
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
