document: rfc-7867
kind: protocol-element
summary: The Video Loss Concealment Report Block (BT=34) is a new RTCP XR block for reporting video loss concealment metrics. It contains fields for Impaired Duration, Concealed Duration, optional Mean Frame-Freeze Duration, MIFP, MCFP, FFSC, and flags for interval type (I) and concealment method type (V).
