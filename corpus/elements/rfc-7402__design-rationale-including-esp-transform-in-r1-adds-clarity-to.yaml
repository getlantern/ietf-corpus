document: rfc-7402
kind: design-rationale
summary: Including ESP_TRANSFORM in R1 adds clarity to TRANSPORT_FORMAT_LIST but may initiate negotiations for unselected transforms. Resource-constrained devices will likely restrict support to a single transform, making the overhead negligible.
