summary: 'The IOAM Pre-allocated Tracing Capabilities Object contains: a 24-bit IOAM-Trace-Type field, a 7-bit Reserved field, a 1-bit W flag (wide format indicator), a 16-bit Namespace-ID, a 16-bit Ingress_MTU (in octets), and a 16- or 32-bit Ingress_if_id (short or wide format depending on W-bit).'
