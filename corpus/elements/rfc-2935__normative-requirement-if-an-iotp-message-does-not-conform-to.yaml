document: rfc-2935
kind: normative-requirement
summary: If an IOTP message does not conform to the specification, the client MUST send an IOTP Error Trading Block to the offending role and to the ErrorLogNetLoc for that role, stop the transaction, and hand control to the browser to GET the Error Net Location.
section: "4.3"
rfc2119_level: MUST
topics:
