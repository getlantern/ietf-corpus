document: rfc-6960
kind: protocol-element
summary: The Extended Revoked Definition extension (id-pkix-ocsp-extended-revoke, OID { id-pkix-ocsp 9 }, value NULL, MUST NOT be critical) signals that the responder supports the 'revoked' status for non-issued certificates. It MUST appear in responseExtensions (not singleExtensions) whenever a 'revoked' response is given for a non-issued certificate.
section: 4.4.8
topics:
    - pkix
