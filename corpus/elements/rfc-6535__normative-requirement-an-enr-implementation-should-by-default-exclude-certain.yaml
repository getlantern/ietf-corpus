document: rfc-6535
kind: normative-requirement
summary: An ENR implementation SHOULD, by default, exclude certain real IPv4 and IPv6 addresses from A and AAAA records, including addresses that should not appear in DNS or on the wire per RFC 6147 Section 5.1.4 and RFC 5735. Additional addresses MAY be excluded by local policy.
section: 2.3.1
rfc2119_level: SHOULD
topics:
    - dns
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
