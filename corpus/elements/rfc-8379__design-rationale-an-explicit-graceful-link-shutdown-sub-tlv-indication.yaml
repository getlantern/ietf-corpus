document: rfc-8379
kind: design-rationale
summary: An explicit Graceful-Link-Shutdown sub-TLV indication is needed for controllers rather than relying solely on metric increases, because metric increases can occur for other reasons such as LDP-IGP synchronization and do not unambiguously signal maintenance activity.
