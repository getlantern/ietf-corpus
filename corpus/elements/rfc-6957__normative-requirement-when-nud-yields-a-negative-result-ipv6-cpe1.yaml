document: rfc-6957
kind: normative-requirement
summary: When NUD yields a negative result (IPv6-CPE1 removed from Neighbor Cache), the BNG MUST delete the conflicting Binding Table entry and replace it with a new entry mapping the same IPv6 address to Link-layer-CPE2.
section: 4.2.3.1
rfc2119_level: MUST
topics:
