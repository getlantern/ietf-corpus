document: rfc-1964
kind: wire-format
summary: 'The Flags field (bytes 20-23 of the authenticator checksum) encodes context-establishment flags in little-endian form: GSS_C_DELEG_FLAG=1, GSS_C_MUTUAL_FLAG=2, GSS_C_REPLAY_FLAG=4, GSS_C_SEQUENCE_FLAG=8, GSS_C_CONF_FLAG=16, GSS_C_INTEG_FLAG=32.'
