document: rfc-6749
kind: design-rationale
summary: OAuth 2.0 was designed to replace direct credential sharing between clients and resource owners. The traditional model forced third parties to store passwords in clear-text, gave overly broad access, and prevented per-client revocation; OAuth replaces credentials with scoped, time-limited access tokens issued by an authorization server.
section: "1"
topics:
