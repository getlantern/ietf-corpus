document: rfc-1827
kind: security-consideration
summary: The security quality provided by ESP depends entirely on the strength of the chosen encryption algorithm, correctness of its implementation, security of the key management mechanism and implementation, and strength of the key. Failure in any of these dimensions provides little or no real security.
