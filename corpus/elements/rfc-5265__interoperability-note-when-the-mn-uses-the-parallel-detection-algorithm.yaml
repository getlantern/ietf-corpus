document: rfc-5265
kind: interoperability-note
summary: When the MN uses the parallel detection algorithm via a foreign agent, it sends two registration requests through the same FA with the same MAC address; while not protocol-violating, some FA implementations may not handle this correctly. Testing indicates a majority of deployed FAs handle the case, but full interoperability cannot be guaranteed.
section: "3.5"
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
