document: rfc-8534
kind: design-rationale
summary: Cross-domain explicit tracking (through segmented tunnels) can only be done when the match for tracking differs from the match for reception, because it relies on S-PMSI A-D routes that do not specify tunnel information. The LIR-pF mechanism enables the ingress PE to see egress PEs across segmentation boundaries for management purposes.
section: "5.3"
topics:
    - multicast
    - mpls
    - routing
