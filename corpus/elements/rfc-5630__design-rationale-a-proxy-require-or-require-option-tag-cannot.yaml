document: rfc-5630
kind: design-rationale
summary: A Proxy-Require or Require option tag cannot substitute for SIPS URIs because SIPS URIs can appear in Contact, Route, Record-Route, Path, From, To, Refer-To, and other fields, as well as in human-readable forms (business cards, web pages); an option tag would only be functionally equivalent in the Request-URI.
section: "4"
topics:
