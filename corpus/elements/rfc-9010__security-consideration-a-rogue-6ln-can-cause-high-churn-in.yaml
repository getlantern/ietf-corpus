document: rfc-9010
kind: security-consideration
summary: A rogue 6LN can cause high churn in the RPL network by constantly registering and deregistering addresses with the R flag set to 1, constituting a DoS attack. Link-layer security and SAVI enforcement at the 6LR are needed to mitigate this. AP-ND (RFC 8928) is suggested to protect address ownership.
section: "11"
topics:
    - security
    - routing
