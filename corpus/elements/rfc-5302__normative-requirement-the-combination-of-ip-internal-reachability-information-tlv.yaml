document: rfc-5302
kind: normative-requirement
summary: The combination of 'IP Internal Reachability Information' (TLV 128) with external metric-type SHOULD NOT be used when building an LSP. Upon receipt of an IP prefix with this combination, routers MUST ignore this prefix.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
