document: rfc-2981
kind: security-consideration
summary: To configure VACM for multi-user Event MIB tables, administrators should create vacmViewTreeFamilyTable entries whose subtree OID includes the owner index portion, with a mask that wildcards the column sub-identifier, granting each owner access only to their own entries.
