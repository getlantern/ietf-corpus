document: rfc-4587
kind: design-rationale
summary: The H.261 stream is carried without the 512-bit ISDN framing or BCH error correction; RTP/UDP provide multiplexing and other error-resilience mechanisms are used instead, since those ISDN-specific layers are unnecessary on the Internet.
