document: rfc-9345
kind: interoperability-note
summary: If a peer decides to cache the certificate chain and re-validate it when resuming a connection, it SHOULD also cache and re-validate the associated delegated credential, to avoid resuming connections for which the DC has expired.
section: "7.4"
rfc2119_level: SHOULD
topics:
    - tls
