document: rfc-6977
kind: design-rationale
summary: The Link Address Option is required in Reconfigure-Request (rather than relying on the relay's peer address) so the server can correctly identify the client's link, consistent with how link identification works during normal relay-forward operations per RFC 3315 Section 20.1.1.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
