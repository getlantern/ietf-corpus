document: rfc-3070
kind: protocol-element
summary: NLPID value 0x80 is used for L2TP over Frame Relay, indicating the presence of a SNAP header. The OUI 0x00-00-5E identifies IANA and PID 0x0007 identifies the L2TP protocol.
