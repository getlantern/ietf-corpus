document: rfc-7812
kind: protocol-element
summary: A named proxy-node represents a destination prefix attachable to the MRT Island via at least two routers. It is 'named' when traffic can be encapsulated to reach it specifically — via an LDP FEC for the associated prefix or via advertised MRT-Red and MRT-Blue IP addresses for the proxy-node.
section: "11"
topics:
