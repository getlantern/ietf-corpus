document: rfc-5303
kind: state-machine
summary: 'The three-way adjacency state machine has three states: Down (initial, no IIH with the option received), Initializing (option received from neighbor but bidirectional reception unconfirmed), and Up (neighbor confirmed to be receiving local IIH packets). This three-way state is distinct from and coexists with the ISO 10589 adjacency state.'
section: "2.1"
topics:
    - routing
