document: rfc-9849
kind: normative-requirement
summary: ClientHelloOuter is authenticated as HPKE associated data by constructing ClientHelloOuterAAD—a serialized ClientHello matching ClientHelloOuter but with the payload field of the encrypted_client_hello extension replaced by zeros—binding the outer to the inner and preventing attacker modification.
section: "5.2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
