document: rfc-7900
kind: security-consideration
summary: If an extranet C-source transmits non-extranet C-flows, extranet C-receivers may inadvertently receive those flows, which is a VPN security violation. Allowing an extranet C-source to transmit non-extranet C-flows is NOT RECOMMENDED, though the SP cannot unilaterally prevent it without customer-coordinated filters.
section: "10"
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
    - security
