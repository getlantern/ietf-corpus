document: rfc-4967
kind: wire-format
summary: 'The dialstring syntax is: dialstring = dialstring-digits context; dialstring-digits = *dialstring-element dialstring-digit *dialstring-element; dialstring-digit = HEXDIG / ''*'' / ''#''; dialstring-element = dialstring-digit / ''P'' / ''X'' / visual-separator. Context follows RFC 3966 conventions and appears between the digits and ''@'' in the userinfo portion.'
section: "4"
topics:
    - sip
    - voip
