document: rfc-3263
kind: normative-requirement
summary: 'If a SIP proxy, redirect server, or registrar is contacted via NAPTR, there MUST be at least three NAPTR records: one with ''SIP+D2T'', one with ''SIP+D2U'', and one with ''SIPS+D2T''. SIPS records SHOULD be preferred (lower order field value).'
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
