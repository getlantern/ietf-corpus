document: rfc-2865
kind: normative-requirement
summary: The Request Authenticator value SHOULD be unpredictable and unique over the lifetime of a secret, exhibiting global and temporal uniqueness, to prevent replay attacks and prevent an attacker from tricking the server into responding to a predicted future request.
section: "3"
rfc2119_level: SHOULD
