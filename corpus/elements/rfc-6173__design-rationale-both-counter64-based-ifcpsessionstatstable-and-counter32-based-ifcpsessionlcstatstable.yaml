document: rfc-6173
kind: design-rationale
summary: Both Counter64-based (ifcpSessionStatsTable) and Counter32-based (ifcpSessionLcStatsTable) statistics are provided because at 1-Gbps rates a Counter32 can wrap as often as every 34 seconds, yet Counter32 objects are needed for backward compatibility with systems lacking Counter64 support or running SNMPv1.
