document: rfc-2385
kind: interoperability-note
summary: Connectionless resets sent by a TCP that does not know the key will be ignored by the protected receiver because the reset cannot carry a valid signature. This means connection attempts to ports with no listener will time out rather than being refused, and stale-connection resets are also silently dropped.
section: "4.1"
topics:
    - tcp
    - bgp
    - security
