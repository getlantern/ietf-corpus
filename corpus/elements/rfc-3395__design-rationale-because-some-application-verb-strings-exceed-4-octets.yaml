document: rfc-3395
kind: design-rationale
summary: Because some application verb strings exceed 4 octets in length, an integer mapping must be provided for each string verb name. The 24-bit enumeration space (up to 16,777,215 verbs) was chosen to fit within the 3 available octets of the verb layer while reserving one octet for future use.
section: "2.2"
