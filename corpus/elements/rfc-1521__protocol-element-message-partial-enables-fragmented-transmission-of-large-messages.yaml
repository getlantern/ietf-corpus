document: rfc-1521
kind: protocol-element
summary: Message/Partial enables fragmented transmission of large messages. Required parameters are 'id' (globally-unique shared identifier), 'number' (1-based fragment sequence number), and 'total' (total fragment count, required only in the last fragment). Reassembly is performed by concatenating fragments in order.
section: 7.3.2
topics:
