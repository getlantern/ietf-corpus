document: rfc-4479
kind: protocol-element
summary: The Device component models the physical operating environment in which services execute. Devices are identified by a globally and temporally unique device ID (a URN). Device characteristics include physical properties (display size, CPU speed); device status includes dynamic properties (power state, battery level, geographic location).
section: "3.4"
topics:
