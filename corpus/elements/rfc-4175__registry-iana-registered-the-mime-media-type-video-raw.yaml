document: rfc-4175
kind: registry
summary: IANA registered the MIME media type video/raw for uncompressed video transported over RTP per RFC 4175. Required parameters are rate, sampling, width, height, depth, and colorimetry; optional parameters include Interlace, Top-field-first, chroma-position, and gamma.
