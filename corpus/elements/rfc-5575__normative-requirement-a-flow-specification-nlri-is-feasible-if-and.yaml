document: rfc-5575
kind: normative-requirement
summary: 'A flow specification NLRI is feasible if and only if: (a) the originator of the flow spec matches the originator of the best-match unicast route for the destination prefix, and (b) there are no more-specific unicast routes for that prefix received from a different neighboring AS than the one in step (a).'
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
