document: rfc-9013
kind: normative-requirement
summary: If the Address Family subfield is IPv4, the Address subfield MUST contain an IPv4 /32 address and the Length field MUST be 6. If IPv6, the Address subfield MUST contain an IPv6 /128 address and the Length MUST be 18.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
