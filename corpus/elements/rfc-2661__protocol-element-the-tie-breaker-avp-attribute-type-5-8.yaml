document: rfc-2661
kind: protocol-element
summary: The Tie Breaker AVP (Attribute Type 5, 8 octets) is used in SCCRQ to resolve simultaneous tunnel creation between the same LAC-LNS pair. The endpoint sending the numerically lower value wins; equal values cause both sides to discard their tunnels.
