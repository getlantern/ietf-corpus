document: rfc-6553
kind: normative-requirement
summary: Datagrams destined to nodes outside the RPL Instance MUST be dropped if the outermost IPv6 header contains a RPL Option not generated by the RPL router forwarding the datagram, preventing the option from escaping the RPL domain.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - security
