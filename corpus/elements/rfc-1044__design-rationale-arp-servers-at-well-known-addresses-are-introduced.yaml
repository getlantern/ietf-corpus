document: rfc-1044
kind: design-rationale
summary: ARP servers at well-known addresses are introduced as an interim measure because current HYPERchannel products lack broadcast capability. Servers respond to unicast ARP requests using the standard ARP protocol (RFC-826), and the expectation is that as HYPERchannel gains broadcast support, ARP servers will fade away in favor of true broadcast ARP.
section: ARP SERVERS
topics:
    - ip
