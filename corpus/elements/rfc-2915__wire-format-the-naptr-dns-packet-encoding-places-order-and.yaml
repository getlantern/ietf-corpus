document: rfc-2915
kind: wire-format
summary: The NAPTR DNS packet encoding places ORDER and PREFERENCE as 16-bit fields, followed by FLAGS, SERVICES, and REGEXP as <character-string> encodings (per RFC 1035), and REPLACEMENT as a <domain-name> encoding. ORDER and PREFERENCE are 16-bit unsigned integers ranging 0–65535.
