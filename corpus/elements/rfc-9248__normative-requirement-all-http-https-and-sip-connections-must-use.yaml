document: rfc-9248
kind: normative-requirement
summary: All HTTP/HTTPS and SIP connections MUST use HTTPS/TLS conforming to at least RFC 7525 and MUST support TLS 1.3 per RFC 8446. All text data payloads not otherwise constrained MUST be encoded as Unicode UTF-8.
section: "4"
rfc2119_level: MUST
topics:
