document: rfc-9801
kind: normative-requirement
summary: A de-jitter buffer MUST be implemented at the CE-bound IWF where PLE packets are stored upon arrival. Lost or dropped packet payloads MUST be replaced with an equivalent amount of replacement data; all PLE implementations MUST support generation of '0xAA' as default replacement data.
section: 7.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
