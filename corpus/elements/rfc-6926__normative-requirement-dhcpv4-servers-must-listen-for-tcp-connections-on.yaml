document: rfc-6926
kind: normative-requirement
summary: DHCPv4 servers MUST listen for TCP connections on port 67 by default (SHOULD listen, configurable MAY be offered). The BULK_LQ_DATA_TIMEOUT default is 300 seconds for both client and server; timeout values smaller than defaults are NOT RECOMMENDED.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
