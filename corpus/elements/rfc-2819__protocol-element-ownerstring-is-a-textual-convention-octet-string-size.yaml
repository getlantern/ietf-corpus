kind: protocol-element
summary: OwnerString is a textual convention (OCTET STRING, SIZE 0..127) identifying the administrative owner of a resource. Agent-owned entries use strings starting with 'monitor'. It enables cooperative resource negotiation among managers but provides no enforcement against uncooperative parties.
