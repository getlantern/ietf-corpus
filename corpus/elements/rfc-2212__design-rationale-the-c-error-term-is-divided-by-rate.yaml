document: rfc-2212
kind: design-rationale
summary: The C error term is divided by rate R in the delay bound formula because its effect (e.g., ATM cell serialization delay) scales with transmission rate; rate-independent delays SHOULD be incorporated into D instead. This distinction ensures accurate delay budgeting across heterogeneous elements.
