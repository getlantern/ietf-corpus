document: rfc-7697
kind: security-consideration
summary: Improper manipulation of MIB objects may result in denial of service to a large number of end-users, since this MIB relates to network connectivity and packet forwarding. Read-write/read-create objects are particularly sensitive, and SET operations in non-secure environments without proper protection open devices to attack.
