document: rfc-8490
kind: normative-requirement
summary: If a DSO response is received for an operation where the specification requires a particular TLV or TLVs that are absent, or where more than the specified number of instances of a TLV are present, this is a fatal error and the recipient MUST forcibly abort the connection immediately.
section: 5.4.2
rfc2119_level: MUST
topics:
    - dns
