document: rfc-9202
kind: normative-requirement
summary: The token request for a dynamic update MUST specify the key identifier (kid) of the PoP key used for the existing DTLS channel; the authorization server MUST verify the kid is valid and MUST include it in the new access token.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - oauth
