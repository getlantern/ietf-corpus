document: rfc-9911
kind: interoperability-note
summary: Several types have defined equivalences to SMIv2 types (e.g., counter32 ↔ Counter32, gauge32 ↔ Gauge32, timeticks ↔ TimeTicks, mac-address ↔ MacAddress, port-number ↔ InetPortNumber). The date-and-time type is explicitly NOT equivalent to SMIv2 DateAndTime due to different date/time separators and higher time-secfrac resolution.
