document: rfc-1079
kind: wire-format
summary: Terminal speed is encoded as an NVT ASCII string containing the decimal transmit speed, a comma, and the decimal receive speed, e.g., "9600,100". No leading zeros and no extraneous characters such as spaces are permitted.
