document: rfc-8444
kind: normative-requirement
summary: All BFRs MUST detect advertisement of duplicate valid BFR-ids for a given MT-ID and sub-domain-id. When such duplication is detected, the BFR MUST behave as described in Section 5 of RFC 8279.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
