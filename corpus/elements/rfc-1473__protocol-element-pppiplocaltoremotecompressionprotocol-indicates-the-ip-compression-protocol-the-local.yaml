kind: protocol-element
summary: pppIpLocalToRemoteCompressionProtocol indicates the IP compression protocol the local PPP-IP entity uses when sending to the remote entity; values are none(1) or vj-tcp(2). Only meaningful when pppIpOperStatus is opened.
