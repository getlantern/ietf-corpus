document: rfc-8341
kind: normative-requirement
summary: If a data node within a datastore is accessed or an action or notification is tied to a data node, the server MUST ensure that the user is authorized to perform the requested read, create, update, delete, or execute access operation on the specified data node.
section: 3.4.5
rfc2119_level: MUST
topics:
