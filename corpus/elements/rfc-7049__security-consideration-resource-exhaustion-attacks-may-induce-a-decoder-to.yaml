document: rfc-7049
kind: security-consideration
summary: Resource exhaustion attacks may induce a decoder to allocate very large strings, arrays, or maps, or exhaust stack depth via deeply nested items. Decoders must apply appropriate resource management; very large declared sizes may also probe for integer overflow vulnerabilities.
section: "8"
topics:
