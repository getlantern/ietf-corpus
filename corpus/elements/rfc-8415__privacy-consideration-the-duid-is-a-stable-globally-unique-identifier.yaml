document: rfc-8415
kind: privacy-consideration
summary: The DUID is a stable, globally unique identifier that enables tracking a client across links and over time. The IAID may also reveal device characteristics. Clients concerned about privacy should follow RFC 7844 (Anonymity Profiles for DHCP Clients), which permits the DUID to change to limit correlation.
section: "23"
topics:
