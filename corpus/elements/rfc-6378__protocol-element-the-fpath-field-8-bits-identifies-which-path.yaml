document: rfc-6378
kind: protocol-element
summary: 'The FPath field (8 bits) identifies which path is in fault or affected by an administrative command: 0=protection path anomaly, 1=working path anomaly. Values 2-255 are for future extensions and SHALL be ignored. The Path field (8 bits) indicates whether user data is on the protection path: 0=protection path not carrying user traffic, 1=protection path substituting for working path.'
section: 4.2.5
topics:
    - mpls
    - routing
