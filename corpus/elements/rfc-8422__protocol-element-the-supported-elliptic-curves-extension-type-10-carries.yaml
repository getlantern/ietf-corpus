document: rfc-8422
kind: protocol-element
summary: The Supported Elliptic Curves Extension (type 10) carries a NamedCurveList containing NamedCurve values in client-preference order. RFC 8422 deprecates curves 1–22 and explicit curves (0xFF01, 0xFF02), retaining secp256r1 (23), secp384r1 (24), secp521r1 (25), x25519 (29), and x448 (30).
