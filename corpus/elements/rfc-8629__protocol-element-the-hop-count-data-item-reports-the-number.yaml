document: rfc-8629
kind: protocol-element
summary: The Hop Count Data Item reports the number of modem hops to reach a destination. Minimum value is 1 (direct reach); 255 (0xFF) indicates an unknown number greater than 1; 0 indicates the destination became unreachable after Hop Control processing (only valid in Link Characteristics Response).
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
