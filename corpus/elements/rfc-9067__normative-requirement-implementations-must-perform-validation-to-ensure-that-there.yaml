document: rfc-9067
kind: normative-requirement
summary: Implementations MUST perform validation to ensure that there is no recursion among nested routing policies. The call-policy MUST NOT have been previously called without returning (i.e., recursion is not allowed).
section: "4.4"
rfc2119_level: MUST
topics:
