document: rfc-7746
kind: design-rationale
summary: 'A timer-based approach (delay traffic forwarding after RESV receipt) was rejected because no single timer value is optimal: too short prevents neither black-holing, too long slows setup. The optimum is network-wide and changes with topology, making it a moving target.'
