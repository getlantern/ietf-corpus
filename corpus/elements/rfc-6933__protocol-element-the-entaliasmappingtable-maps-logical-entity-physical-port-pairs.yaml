document: rfc-6933
kind: protocol-element
summary: The entAliasMappingTable maps logical entity/physical port pairs to external MIB identifiers (e.g., ifIndex or rptrPortGroupIndex). The index value entAliasLogicalIndexOrZero equal to zero acts as a wildcard for all unspecified logical entities; non-zero entries take precedence over zero-indexed entries.
