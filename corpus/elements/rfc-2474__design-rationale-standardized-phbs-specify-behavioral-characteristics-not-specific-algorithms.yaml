document: rfc-2474
kind: design-rationale
summary: Standardized PHBs specify behavioral characteristics, not specific algorithms or mechanisms (e.g., Class Selector PHBs may be implemented by strict priority queuing, WFQ, WRR, CBQ, etc.). This separation mirrors the Internet's original forwarding/routing split and allows mechanisms to evolve independently of behaviors.
section: "5"
topics:
