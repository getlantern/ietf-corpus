document: rfc-1565
kind: protocol-element
summary: applTable (OID mib-2.27.1) holds one row per network service application running on the system. It is indexed by applIndex and carries name, directory name, version, uptime, operational status, last-change timestamp, inbound/outbound association counters, activity timestamps, and rejection/failure counters.
