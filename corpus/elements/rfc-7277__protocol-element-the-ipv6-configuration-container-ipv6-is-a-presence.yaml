document: rfc-7277
kind: protocol-element
summary: The IPv6 configuration container ('ipv6') is a presence container enabling IPv6 on an interface. It includes 'enabled' (boolean, default true), 'forwarding' (boolean, default false), 'mtu' (uint32, range 1280..max), an address list, a neighbor list for static Neighbor Cache entries, 'dup-addr-detect-transmits' (uint32, default 1), and an 'autoconf' sub-container.
