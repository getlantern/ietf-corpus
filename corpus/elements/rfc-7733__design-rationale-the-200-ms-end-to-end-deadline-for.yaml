document: rfc-7733
kind: design-rationale
summary: 'The 200 ms end-to-end deadline for MPL multicast is derived from human-perception studies: if a light does not respond within ~250 ms, users assume failure and re-issue commands, generating command sequences like Light{on,off,on,off} that overload the network.'
section: 2.2.1
topics:
    - multicast
    - routing
