document: rfc-3559
kind: protocol-element
summary: The mallocAllocRangeAdvertisable object (TruthValue) controls whether an allocation range is eligible to be advertised to other MAASs. Its default on row creation is true if the scope is divisible, false otherwise. When true, mallocAllocRangeTotalAllocatedAddrs and mallocAllocRangeTotalRequestedAddrs (populated by a Prefix Coordinator) must be present.
section: "4"
topics:
    - multicast
