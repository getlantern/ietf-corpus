document: rfc-2595
kind: normative-requirement
summary: Both clients and servers SHOULD have a privacy operational mode which refuses authentication unless successful activation of an encryption layer occurs prior to or at the time of authentication, and which will terminate the connection if that encryption layer is deactivated.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - tls
    - security
