document: rfc-8866
kind: privacy-consideration
summary: For privacy reasons, it is sometimes desirable to obfuscate the username and IP address of the session originator in the 'o=' line. An arbitrary username and private unicast address MAY be chosen, provided that global uniqueness of the session identifier tuple is maintained.
section: "5.2"
topics:
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
