document: rfc-4568
kind: design-rationale
summary: MKI is chosen over the SRTP <From, To> sequence-number-based key lifetime feature because the AES master key lifetime of 2^48 SRTP packets eliminates any cryptographic reason to replace a master key for practical point-to-point applications, making a single key signaling mechanism sufficient.
