document: rfc-4466
kind: interoperability-note
summary: The APPEND command allows only a single append-message unless the MULTIAPPEND capability is present; servers not advertising MULTIAPPEND must reject multi-message APPENDs. The non-synchronizing '+' in literal8 is only valid when both BINARY and LITERAL+ are supported.
section: "2.7"
topics:
