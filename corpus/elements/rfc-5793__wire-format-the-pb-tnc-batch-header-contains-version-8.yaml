document: rfc-5793
kind: wire-format
summary: 'The PB-TNC batch header contains: Version (8 bits, MUST be 2), Directionality D (1 bit, 0=client, 1=server), Reserved (19 bits, MUST be 0), B-Type/Batch Type (4 bits), and Batch Length (32 bits, MUST be at least 8). All multi-byte numeric fields are in network (big endian) byte order.'
section: "4.1"
topics:
    - security
