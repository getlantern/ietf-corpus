summary: When originating TE link LSPs during restart, the restarting node SHOULD advertise 0 unreserved bandwidth and TE Default metric 0xffffff; for LSC or FSC links, Max LSP Bandwidth SHOULD be set to 0 until preserved LSP resources are accounted for.
