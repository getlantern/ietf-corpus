document: rfc-9524
kind: protocol-element
summary: A Replication segment is a local segment instantiated at a replication node, identified by the tuple <Replication-ID, Node-ID>. It includes a Replication-SID (SR-MPLS label or SRv6 SID), a set of downstream nodes, and a Replication state (RS) which is a list of replication branches, each abstracting to a <downstream node, downstream Replication-SID> tuple.
section: "2"
topics:
