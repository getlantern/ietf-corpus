document: rfc-7728
kind: protocol-element
summary: The PAUSE-RESUME message is a new transport-layer RTCP feedback message (PT=205, FMT=9) that carries one or more FCI blocks, each of which is a PAUSE request, RESUME request, PAUSED indication, or REFUSED notification. PAUSE and RESUME are categorized as Requests, PAUSED as an Indication, and REFUSED as a Notification per CCM taxonomy.
