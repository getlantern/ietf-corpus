document: rfc-1288
kind: normative-requirement
summary: 'Two separate user options SHOULD be provided in client programs to allow viewing non-default characters: one to allow characters below ASCII 32, and another to allow characters above ASCII 126, to support international data.'
section: "3.3"
rfc2119_level: SHOULD
