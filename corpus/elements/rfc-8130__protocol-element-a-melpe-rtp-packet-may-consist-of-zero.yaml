document: rfc-8130
kind: protocol-element
summary: A MELPe RTP packet MAY consist of zero or more MELPe coder frames followed by zero or one MELPe comfort noise frame. The number of frames is determined by dividing total payload octets by expected octets per frame (7/11/7), noting the last frame may be a 2-octet comfort noise frame.
section: "3.3"
topics:
    - rtp
    - realtime
