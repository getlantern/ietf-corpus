kind: normative-requirement
summary: Client and server implementations MUST be capable of being configured to use HTTP Basic Authentication (RFC 2617) in conjunction with TLS 1.0 or a subsequent standards-track version of TLS, following the conventions for HTTP over TLS in RFC 2818.
