document: rfc-4866
kind: protocol-element
summary: The credit counter is a per-mobile-node value maintained by the correspondent node. It increases by the size of each inbound payload packet received from a VERIFIED care-of address, and decreases by the size of each outbound packet sent to an UNVERIFIED care-of address. Credit aging periodically multiplies the counter by CreditAgingFactor (< 1) at CreditAgingInterval intervals to bound the total accumulated credit.
section: "4.10"
topics:
    - mobility
    - security
