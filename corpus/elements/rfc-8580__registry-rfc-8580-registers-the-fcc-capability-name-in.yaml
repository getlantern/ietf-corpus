document: rfc-8580
kind: registry
summary: RFC 8580 registers the "fcc" capability name in the IANA "Notification-Capability Parameters" registry, indicating whether a notification method supports filing a copy of the notification into a target mailbox. Syntax values are "yes" or "no" in lowercase.
section: "11.2"
