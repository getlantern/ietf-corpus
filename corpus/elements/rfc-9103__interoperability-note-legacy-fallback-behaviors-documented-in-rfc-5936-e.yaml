document: rfc-9103
kind: interoperability-note
summary: Legacy fallback behaviors documented in RFC 5936 (e.g., performing IXFR and AXFR on separate connections) may remain available in existing XFR-over-TCP implementations for backwards compatibility, but XoT connections have no need to support such legacy behaviors since XoT implementations are required to follow optimized TCP usage from the start.
section: 6.3.5
topics:
    - dns
    - tls
    - tcp
