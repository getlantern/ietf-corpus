document: rfc-5101
kind: wire-format
summary: 'Variable-length IEs use a 1-octet length prefix when length < 255 octets (Figure R). For lengths 255–65535 octets, a 3-octet prefix is used: first octet is 0xFF, the 16-bit length follows (Figure S). Length-prefix octets are not counted in the IE length.'
