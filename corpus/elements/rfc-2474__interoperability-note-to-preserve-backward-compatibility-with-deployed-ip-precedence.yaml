document: rfc-2474
kind: interoperability-note
summary: To preserve backward compatibility with deployed IP Precedence usage, codepoints 'xxx000' are reserved as Class Selector Codepoints. Operators may configure nodes to map codepoints irrespective of bits 3–5 of the DSCP field, making the network compatible with historical IP Precedence use (e.g., codepoint '011010' maps to the same PHB as '011000').
section: 4.2.2.3
topics:
    - diffserv
    - ip
    - qos
