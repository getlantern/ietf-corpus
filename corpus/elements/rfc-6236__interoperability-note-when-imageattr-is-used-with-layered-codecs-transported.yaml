document: rfc-6236
kind: interoperability-note
summary: When 'imageattr' is used with layered codecs transported in different RTP streams, the attribute must be specified per media description. The solution is either to specify the same image attribute for each layer's media description or to specify it only for the base layer.
section: 3.2.9
topics:
    - realtime
    - rtp
