document: rfc-1759
kind: design-rationale
summary: 'The Host MIB status mapping is acknowledged as imperfect: the Standby state (running/other) is indistinguishable from other ''running but not printing'' states, and concurrent critical+non-critical alerts cannot both be indicated. The document suggests adding ''standby'' to hrDeviceStatus and ''offline''/''notApplicable'' to hrPrinterStatus in a future revision.'
section: 2.2.13.2
