document: rfc-4236
kind: interoperability-note
summary: OPES agents SHOULD use a single OPES-Via header-field rather than multiple equally-named fields to record a long trace. Using multiple equally-named extension header-fields is illegal from HTTP's point of view and may not work with OPES-unaware HTTP proxies.
section: "4"
topics:
    - http
