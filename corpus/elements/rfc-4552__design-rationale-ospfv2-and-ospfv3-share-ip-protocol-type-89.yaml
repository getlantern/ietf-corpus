document: rfc-4552
kind: design-rationale
summary: OSPFv2 and OSPFv3 share IP protocol type 89 and are normally distinguished by the OSPF header version field. However, IPsec selectors cannot use arbitrary protocol-specific header fields, so the IP header version field (IPv4 vs. IPv6) is used instead to differentiate OSPFv3 from OSPFv2 in SPD rules.
