document: rfc-6026
kind: normative-requirement
summary: If a 2xx response is received while the INVITE client transaction is in the 'Calling' or 'Proceeding' states, it MUST transition to the 'Accepted' state, pass the 2xx to the TU, and set Timer M to 64*T1.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
