document: rfc-7313
kind: normative-requirement
summary: A BGP speaker that has received the Graceful Restart Capability from its neighbor MUST ignore any BoRRs for an <AFI, SAFI> from that neighbor before receiving the EoR for that <AFI, SAFI>. The speaker SHOULD log an error for further analysis.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
