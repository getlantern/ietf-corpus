document: rfc-8500
kind: protocol-element
summary: The Metric field in the Reverse Metric TLV is a 24-bit unsigned integer offset in the range 0–63 for narrow IS-IS metric mode, or 0–(2^24 - 2) for wide metric mode. The accumulated wide metric value with U bit set is bounded at (2^24 - 1), which represents non-reachability; (2^24 - 2) is the last-resort link metric.
section: "2"
topics:
