document: rfc-8779
kind: normative-requirement
summary: If the PROTECTION-ATTRIBUTE TLV is ignored by the PCE, it MUST NOT include the TLV in the LSPA of the response. When used by the PCE, an LSPA object and the TLV MUST be included in the response, with fields not considered set to 0.
section: "2.8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
