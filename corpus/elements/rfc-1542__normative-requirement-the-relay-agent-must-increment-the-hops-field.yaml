document: rfc-1542
kind: normative-requirement
summary: The relay agent MUST increment the 'hops' field and MUST preserve all other BOOTP fields intact when relaying a BOOTREQUEST. The relay destination MUST be configurable and SHOULD be independent of destinations for other broadcast forwarders.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
