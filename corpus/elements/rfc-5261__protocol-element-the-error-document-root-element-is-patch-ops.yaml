document: rfc-5261
kind: protocol-element
summary: The error document root element is <patch-ops-error> in namespace 'urn:ietf:params:xml:ns:patch-ops-error'. It contains a specific error condition element, each carrying a 'phrase' attribute for human-readable text and an optional 'xml:lang'. Most error elements include the offending patch operation element.
section: "5.1"
