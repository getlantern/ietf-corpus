document: rfc-5251
kind: security-consideration
summary: CE-PE signaling is assumed to traverse a private link or private network where all entities are trusted, so no mandatory protocol-level security mechanisms are required. However, operators concerned about control-plane security MAY use RSVP-TE authentication/integrity functions (RFC 3473) or IPsec (RFC 4301/4302/4835/4306) for CE-PE point-to-point signaling.
section: "5"
topics:
