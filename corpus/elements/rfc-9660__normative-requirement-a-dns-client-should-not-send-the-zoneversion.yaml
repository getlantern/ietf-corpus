document: rfc-9660
kind: normative-requirement
summary: A DNS client SHOULD NOT send the ZONEVERSION option to non-authoritative name servers, and MUST NOT include more than one ZONEVERSION option in the OPT pseudo-RR of a DNS query.
section: "3.1"
rfc2119_level: MUST NOT
