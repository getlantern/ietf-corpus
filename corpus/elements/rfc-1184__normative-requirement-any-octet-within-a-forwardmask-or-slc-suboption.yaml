document: rfc-1184
kind: normative-requirement
summary: Any octet within a FORWARDMASK or SLC suboption that is equal to IAC MUST be sent as a double IAC to prevent it being interpreted as a Telnet command prefix.
section: "2.3"
rfc2119_level: MUST
