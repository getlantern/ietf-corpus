document: rfc-8079
kind: normative-requirement
summary: A Media Relay B2BUA SHOULD forward all SSRC- and RTCP-related SDP attributes (such as 'ssrc', 'rtcp-fb', 'rtcp-xr-attrib') when handling a multimedia session setup, except for attributes that implicitly describe the immediate peer (such as the 'rtcp' port attribute), which MUST be rewritten.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
