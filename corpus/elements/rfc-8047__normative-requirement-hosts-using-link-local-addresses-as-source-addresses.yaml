document: rfc-8047
kind: normative-requirement
summary: Hosts using link-local addresses as source addresses in HIP handshakes SHOULD provide a globally routable address either in the initial handshake or via the LOCATOR_SET parameter, since such hosts may not be reachable by a mobile peer.
section: 4.2.1
rfc2119_level: SHOULD
topics:
    - mobility
    - ip
