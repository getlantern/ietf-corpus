document: rfc-5586
kind: wire-format
summary: For an LSP G-ACh packet, the label stack contains an LSP Label LSE followed by a GAL LSE, then the ACH, an optional ACH TLV Header, optional ACH TLVs, and the G-ACh message. The TTL of the GAL LSE MUST be set to at least 1.
section: 4.2.1.1
topics:
    - mpls
