document: rfc-4685
kind: normative-requirement
summary: If the resource being responded to lacks a persistent unique identifier, the publisher MUST assign one meeting the atom:id requirements for use as the 'ref' value. If a dereferenceable IRI valid as atom:id exists, it SHOULD be used as both 'ref' and 'href'.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
