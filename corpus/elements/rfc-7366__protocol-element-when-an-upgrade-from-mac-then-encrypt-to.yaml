document: rfc-7366
kind: protocol-element
summary: When an upgrade from MAC-then-encrypt to encrypt-then-MAC is negotiated during rehandshake, the change takes effect in the first message following the Change Cipher Spec (CCS) message. All messages up to and including the CCS use MAC-then-encrypt.
section: "3.1"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
