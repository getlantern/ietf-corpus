document: rfc-8559
kind: normative-requirement
summary: The Operator-Name attribute MUST NOT occur more than once in a CoA or Disconnect packet. If a packet contains more than one Operator-Name, implementations MUST treat the second and subsequent attributes as 'invalid attributes' per RFC 6929 Section 2.8.
section: "3"
rfc2119_level: MUST NOT
topics:
    - radius
