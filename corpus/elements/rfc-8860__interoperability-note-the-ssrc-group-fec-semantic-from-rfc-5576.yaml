document: rfc-8860
kind: interoperability-note
summary: The ssrc-group 'FEC' semantic from RFC 5576 cannot be used with generic FEC (RFC 5109/2733) in a multi-media-type session, because generic FEC requires the repair packets to share the same SSRC as the source packets being protected.
section: "6.2"
topics:
