document: rfc-3355
kind: design-rationale
summary: Two encapsulation mechanisms are defined—VC-based multiplexing and LLC encapsulation—following RFC 2684. LLC encapsulation is mandatory on PVCs because it allows other protocols to share the same virtual connection, while VC-multiplexing is optional and useful for simpler 'null encapsulation' deployments.
section: "4"
