document: rfc-9922
kind: normative-requirement
summary: For the 'period-of-time' grouping, the 'period-start' MUST be no later than 'period-end'. The 'time-zone-identifier' MUST be specified if either period-start or period-end is in local time format, and MUST NOT be applied to UTC or time zone offset values.
section: 3.3.2
rfc2119_level: MUST
topics:
    - yang
    - netconf
