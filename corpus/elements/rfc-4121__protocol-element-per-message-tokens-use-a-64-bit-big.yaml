document: rfc-4121
kind: protocol-element
summary: Per-message tokens use a 64-bit big-endian sequence number (SND_SEQ) to distinguish intentionally repeated messages from replays. After each GSS_GetMIC() or GSS_Wrap() call, the sender's sequence number SHALL be incremented by one.
section: 4.2.1
topics:
    - security
