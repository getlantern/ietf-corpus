document: rfc-6262
kind: normative-requirement
summary: The RTP timestamp clock frequency SHALL be 16 kHz, and the timestamp SHALL increase by 320 for each consecutive frame (20 ms at 16 kHz). The timestamp is also used to recover correct decoding order.
section: "3.1"
rfc2119_level: SHALL
