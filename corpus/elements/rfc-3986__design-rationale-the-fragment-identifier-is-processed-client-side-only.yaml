document: rfc-3986
kind: design-rationale
summary: The fragment identifier is processed client-side only and not passed to origin servers. This design prevents resource providers from denying reference authors the right to selectively reference portions of a resource, and makes new media types easier to deploy than new schemes.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
