document: rfc-6206
kind: design-rationale
summary: Trickle exponentially doubles the interval length when the network is consistent, reducing communication to a few packets per hour under stable conditions. This allows rapid propagation (Imin scale, e.g., milliseconds) when inconsistencies arise while conserving energy and channel capacity during steady state.
section: "3"
