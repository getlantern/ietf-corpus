document: rfc-5450
kind: normative-requirement
summary: Jitter calculations performed by an RTP client MUST NOT use transmission offsets. The standard jitter formula must continue to operate on raw reception times to maintain consistency, since the sender cannot always know whether offsets have been taken into account by the receiver.
section: "3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
