summary: 'Single Sequenced Flow Repair FEC Payload ID Format A (Figure 6) is a 6-octet field: 16-bit Initial Sequence Number (ISN), 16-bit Source Block Length (SBL), and 16-bit Encoding Symbol ID (ESI); Format B (Figure 7) replaces the ESI with a 24-bit field, making the total 7 octets.'
