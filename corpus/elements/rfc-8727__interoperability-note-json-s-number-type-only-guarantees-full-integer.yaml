document: rfc-8727
kind: interoperability-note
summary: JSON's 'number' type only guarantees full integer precision for values between -2^53 and 2^53. When dealing with integers outside this range in IODEF JSON, precision loss must be considered by implementations.
section: "3.2"
topics:
    - json
    - security
