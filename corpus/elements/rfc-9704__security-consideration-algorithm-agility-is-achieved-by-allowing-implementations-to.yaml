document: rfc-9704
kind: security-consideration
summary: Algorithm agility is achieved by allowing implementations to choose hashing algorithms from the 'ZONEMD Hash Algorithms' registry; the salt MUST be regenerated whenever the authorization claim is updated, and high-quality pseudorandom number generation is required per RFC 4086.
