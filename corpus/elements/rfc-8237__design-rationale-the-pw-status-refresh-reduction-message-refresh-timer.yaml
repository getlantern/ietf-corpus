document: rfc-8237
kind: design-rationale
summary: The PW status refresh reduction Message Refresh Timer should be set much smaller than the PW status Refresh Timer so the protocol reaches ACTIVE state quickly—before the first PW status Refresh Timer expires—minimizing unnecessary PW status retransmissions when an LSP starts forwarding.
