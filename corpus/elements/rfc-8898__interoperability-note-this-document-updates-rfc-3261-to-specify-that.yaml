document: rfc-8898
kind: interoperability-note
summary: This document updates RFC 3261 to specify that when a UAC receives a 401/407 response with multiple WWW-Authenticate/Proxy-Authenticate header fields using different authentication schemes for the same realm, the UAC provides credentials for one scheme it supports based on local policy.
section: 2.1.1
topics:
    - sip
    - oauth
