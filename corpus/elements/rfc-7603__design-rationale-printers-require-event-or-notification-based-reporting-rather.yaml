document: rfc-7603
kind: design-rationale
summary: Printers require event- or notification-based reporting rather than periodic polling alone, because power consumption spikes sharply and briefly during active printing while being very low in timer-based low-power states; periodic polling would miss these transient peaks.
section: "2.11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
