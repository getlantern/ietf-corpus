document: rfc-9739
kind: interoperability-note
summary: PIM Light only supports PIM-SM (including PIM-SSM per RFC 7761). PIM Dense Mode (RFC 3973) and Bidirectional PIM (RFC 5015) are explicitly not supported and not covered by this document.
