document: rfc-5778
kind: interoperability-note
summary: When the HA also acts as an IKEv2 responder for conventional IPsec VPN access, it may not know whether IKEv2 is being used for Mobile IPv6 or VPN. One solution is to use different responder identities for each role, allowing the MN to indicate the preferred type via the IDr payload in IKE_AUTH.
section: "4.1"
topics:
    - mobility
    - ipsec
    - vpn
    - interoperability
