document: rfc-9032
kind: wire-format
summary: The IE subtype structure is a variable-length field starting with a 1-byte subtype ID (value 2), followed by R bit (1), P bit (1), 3 reserved bits, 7-bit proxy priority, 12-bit rank priority, 8-bit PAN priority, optional 64-bit Join Proxy Interface ID (present if P=1), and a variable-length network ID field of up to 16 bytes. The length of the subtype content is calculated from the container per RFC 8137.
section: "2"
