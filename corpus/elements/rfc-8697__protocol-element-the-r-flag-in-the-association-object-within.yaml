document: rfc-8697
kind: protocol-element
summary: The R flag in the ASSOCIATION object within a PCReq message MUST be set to 0 on transmission and ignored on receipt; the ASSOCIATION object in a PCReq associates the path computation request to a pre-existing (operator-configured or dynamically learned) association group.
section: 6.3.2
topics:
    - routing
    - mpls
