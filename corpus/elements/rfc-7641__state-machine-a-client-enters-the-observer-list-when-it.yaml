document: rfc-7641
kind: state-machine
summary: 'A client enters the observer list when it sends GET Observe:0 and receives a 2.xx response containing an Observe Option. It is removed when: it sends GET Observe:1 (explicit deregister), it rejects a notification with a Reset message, or the last retransmission of a confirmable notification times out without acknowledgement.'
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
