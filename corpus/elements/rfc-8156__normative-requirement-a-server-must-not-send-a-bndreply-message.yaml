document: rfc-8156
kind: normative-requirement
summary: A server MUST NOT send a BNDREPLY message in response to a BNDUPD message until it is certain that the binding information from the BNDUPD has been written to stable storage. This ensures the acknowledging server has durably recorded the partner lifetime before the sending server relies on that acknowledgement.
section: 4.4.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
