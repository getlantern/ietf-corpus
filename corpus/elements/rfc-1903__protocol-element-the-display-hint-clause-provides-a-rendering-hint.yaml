document: rfc-1903
kind: protocol-element
summary: The DISPLAY-HINT clause provides a rendering hint for INTEGER or OCTET STRING values. For INTEGER, the hint specifies display format ('x', 'd', 'o', 'b') and optional implied decimal point (e.g., 'd-2' renders 1234 as '12.34'). For OCTET STRING, it specifies one or more octet-format specifications with repeat, length, format, separator, and terminator parts.
section: "3.1"
topics:
