document: rfc-6642
kind: security-consideration
summary: Spoofed or maliciously created TPLR messages can cause missing RTP packets to not be repaired in a timely fashion and suppress legitimate feedback at receivers. Mitigation requires authentication and integrity protection using SAVPF (RFC 5124), which combines SRTP and AVPF.
section: "7"
topics:
