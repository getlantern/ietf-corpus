document: rfc-8775
kind: protocol-element
summary: 'GDR Candidate address in DRLB-List: if the Interface ID option (RFC 6395) is present with a non-zero Router Identifier, the candidate address is set to that Router ID (for IPv6: 96 zero bits followed by the 32-bit Router ID); otherwise the PIM Hello IP source address is used.'
section: 5.3.2
topics:
