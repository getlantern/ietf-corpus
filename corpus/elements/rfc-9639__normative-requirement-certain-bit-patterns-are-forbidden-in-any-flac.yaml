document: rfc-9639
kind: normative-requirement
summary: 'Certain bit patterns are forbidden in any FLAC bitstream: metadata block type 127, streaminfo min/max block sizes below 16, sample rate bits 0b1111, uncommon block size value 65536, LPC coefficient precision bits 0b1111, and negative LPC right shift values.'
section: "5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
