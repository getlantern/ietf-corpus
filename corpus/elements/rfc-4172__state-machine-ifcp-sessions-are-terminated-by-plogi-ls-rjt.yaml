document: rfc-4172
kind: state-machine
summary: 'iFCP sessions are terminated by: PLOGI LS_RJT, N_PORT state change notification (removal/reconfiguration), LOGO ACC from peer, fabric logout (LOGO to D_ID 0xFF-FF-FE), implicit LOGO, LTEST error, non-fatal encapsulation error, TCP connection failure, UNBIND receipt, gateway entering Unsynchronized state, or incorrect address mode detection (last case uses TCP RST without UNBIND).'
section: 5.2.3
topics:
    - ip
    - tcp
