document: rfc-2789
kind: design-rationale
summary: The recommendation to return an empty string from mtaGroupInboundRejectionReason and mtaGroupOutboundConnectFailureReason on success was removed in RFC 2249 because it conflicted with the stated purpose of those variables (to record the failure reason, not success state).
