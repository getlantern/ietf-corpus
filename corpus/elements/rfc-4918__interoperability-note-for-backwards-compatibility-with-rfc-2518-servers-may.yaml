document: rfc-4918
kind: interoperability-note
summary: For backwards compatibility with RFC 2518, servers MAY implement Lock-Null Resources (LNRs) instead of the recommended locked-empty-resource model. Clients can interoperate with both by only attempting PUT (not MKCOL or GET) after locking an unmapped URL.
section: "7.3"
topics:
    - http
