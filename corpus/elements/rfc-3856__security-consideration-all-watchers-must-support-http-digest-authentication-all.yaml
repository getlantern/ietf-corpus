document: rfc-3856
kind: security-consideration
summary: All watchers MUST support HTTP Digest authentication. All PAs MUST support TLS and SIPS. S/MIME MAY be used for end-to-end integrity and authenticity of SUBSCRIBE and NOTIFY requests to prevent forgery or modification of presence documents.
section: "9.2"
