document: rfc-8177
kind: protocol-element
summary: 'The ''lifetime'' grouping provides three end-time options for a key: ''always'' (always valid, the default), ''start-end-time'' with sub-choices of ''infinite'' (no-end-time leaf), fixed ''duration'' in seconds (uint32, 1–2147483646), or explicit ''end-date-time'' (yang:date-and-time).'
