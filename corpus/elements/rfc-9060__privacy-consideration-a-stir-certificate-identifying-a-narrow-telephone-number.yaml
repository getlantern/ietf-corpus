document: rfc-9060
kind: privacy-consideration
summary: A STIR certificate identifying a narrow telephone number range exposes information about the entities placing calls. However, since the TN range is a necessary superset of the calling party number already openly signaled in call setup, the privacy risks are not substantially greater than baseline STIR.
section: "11"
