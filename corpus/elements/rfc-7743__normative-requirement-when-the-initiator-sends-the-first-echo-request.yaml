document: rfc-7743
kind: normative-requirement
summary: When the initiator sends the first Echo Request with a Relay Node Address Stack TLV, the TLV MUST contain the initiator's address as the first stack entry with the Destination Address Offset pointing to that entry, the source address of the replying router set to null, and the Initiator Source Port field MUST be set to the source UDP port.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
