document: rfc-2184
kind: protocol-element
summary: Language and character set information appear only at the beginning of a given parameter value and cannot be changed mid-value. A continued parameter value may contain a mixture of encoded and unencoded segments, but only one character set and one language may be used per parameter value.
section: "4.1"
topics:
