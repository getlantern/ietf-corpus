document: rfc-7233
kind: protocol-element
summary: The 206 (Partial Content) status code indicates successful fulfillment of a range request. For a single range, the response MUST include a Content-Range header; for multiple ranges, it MUST use a multipart/byteranges payload with Content-Range in each body part.
section: "4.1"
topics:
    - http
