document: rfc-8055
kind: security-consideration
summary: A SIP entity MUST NOT use the adjacent network information if there is a mismatch between the JWS Signature received in the SIP header field and the JWS Signature recalculated by the receiving entity. This prevents unauthorized injection of realm identity.
section: "9"
rfc2119_level: MUST NOT
topics:
    - sip
    - jose
    - security
