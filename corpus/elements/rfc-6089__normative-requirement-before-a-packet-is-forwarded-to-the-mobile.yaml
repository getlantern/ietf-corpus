document: rfc-6089
kind: normative-requirement
summary: Before a packet is forwarded to the mobile node, it MUST be matched against the ordered list of flow binding entries; the first matching entry determines routing. If no entry matches, the packet SHOULD be forwarded to the care-of address with the lowest BID-PRI value.
section: 5.3.6
rfc2119_level: MUST
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
