document: rfc-4422
kind: normative-requirement
summary: If at any time the security layer is unable or unwilling to continue producing protected buffers, or is not able to decode a received buffer, the underlying transport connection MUST be closed. In both cases, it SHOULD be closed gracefully.
section: "3.7"
rfc2119_level: MUST
topics:
    - security
