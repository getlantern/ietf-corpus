document: rfc-6581
kind: normative-requirement
summary: To use any enhanced connection establishment feature, the Rev field in the MPA Request/Reply Frame MUST be set to two or higher. A host accepting MPA connections MUST continue to accept MPA Requests with version one, even if it supports version two.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
