document: rfc-8482
kind: normative-requirement
summary: A system that receives an HINFO response SHOULD NOT infer that the response was generated according to this specification and apply special processing, because it is not possible to tell with certainty whether the HINFO RRset was synthesized. Systems SHOULD NOT rely on the specific HINFO RDATA values to distinguish synthesized from non-synthesized records.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - dns
