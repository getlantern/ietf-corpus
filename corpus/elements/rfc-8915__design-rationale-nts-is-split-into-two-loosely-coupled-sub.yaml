document: rfc-8915
kind: design-rationale
summary: 'NTS is split into two loosely coupled sub-protocols so the NTP server can be fully stateless: all per-client session state is carried by the client inside encrypted cookies. This enables servers to scale to large numbers of clients without maintaining any per-client storage.'
section: "1.3"
topics:
    - ntp
    - security
