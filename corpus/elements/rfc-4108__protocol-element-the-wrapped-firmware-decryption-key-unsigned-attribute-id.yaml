document: rfc-4108
kind: protocol-element
summary: The wrapped-firmware-decryption-key unsigned attribute (id-aa-wrappedFirmwareKey, OID …aa.39) carries a CMS EnvelopedData wrapping the firmware-decryption key, enabling intermediaries to re-wrap the key with different key-encryption keys at each distribution chain link.
