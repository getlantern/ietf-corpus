document: rfc-6333
kind: security-consideration
summary: Because ports are a critical shared resource when IPv4 addresses are shared, the AFTR must implement port-usage limits per user — either by rate-limiting new connections or by capping the maximum number of ports — to protect the shared NAT pool from exhaustion by a single user.
section: "11"
topics:
    - nat
    - v6ops
    - security
