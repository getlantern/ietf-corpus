document: rfc-9127
kind: protocol-element
summary: BFD IP multihop sessions (ietf-bfd-ip-mh) are grouped into 'session-group' entries keyed by source-addr and dest-addr. Multiple BFD sessions may exist per group to test ECMP paths; in the operational state model the local discriminator is used as a further key.
