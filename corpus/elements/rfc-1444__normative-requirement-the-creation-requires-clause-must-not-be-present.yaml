document: rfc-1444
kind: normative-requirement
summary: The CREATION-REQUIRES clause must not be present unless the object named in the VARIATION clause is a conceptual row (i.e., has a syntax resolving to a SEQUENCE containing columnar objects). All objects named in CREATION-REQUIRES that are columnar objects of that row must have an access level of 'read-create'.
section: 5.5.2.4
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
