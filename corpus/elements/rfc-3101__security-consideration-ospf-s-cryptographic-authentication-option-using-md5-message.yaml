document: rfc-3101
kind: security-consideration
summary: OSPF's Cryptographic authentication option (using MD5 message digests and a shared secret key) provides significant protection against active attacks on OSPF exchanges including Type-7 LSAs. However, it does not provide confidentiality or protection against traffic analysis, and security depends on key secrecy and correct implementation across all routers.
section: "4.0"
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
