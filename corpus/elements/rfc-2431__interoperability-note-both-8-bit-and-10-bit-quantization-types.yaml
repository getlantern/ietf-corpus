document: rfc-2431
kind: interoperability-note
summary: Both 8-bit and 10-bit quantization types as defined by BT.601-5 are supported. A 10-bit sample is treated as having two extra bits of fixed-point precision; an 8-bit value of 190 corresponds to the 10-bit value 190.75 (binary 10111110.11).
