document: rfc-4495
kind: interoperability-note
summary: This extension updates RFC 2205 by modifying the behaviors of ResvErr and ResvTear indications. A router that does not support this extension will generate both ResvErr and ResvTear per RFC 2205, effectively performing a full preemption rather than a partial one. The extension does not cause ill effects when mixed with non-supporting routers.
section: "6"
topics:
