document: rfc-3182
kind: protocol-element
summary: CREDENTIAL (A-Type 2) encodes user or application credentials. SubTypes are ASCII_ID (1), UNICODE_ID (2), KERBEROS_TKT (3), X509_V3_CERT (4), and PGP_CERT (5). The OctetString field contains the actual credential.
