document: rfc-2976
kind: interoperability-note
summary: CSeq is incremented upon transmission of each INFO message, but CSeq SHOULD NOT be used to determine the sequence of INFO information because gaps can occur when a UA sends re-INVITEs or other SIP messages between INFO messages.
