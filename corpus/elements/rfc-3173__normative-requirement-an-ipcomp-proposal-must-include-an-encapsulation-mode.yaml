document: rfc-3173
kind: normative-requirement
summary: An IPComp proposal MUST include an Encapsulation Mode attribute when proposing a non-default mode (such as Tunnel Mode); the default is Transport Mode. An IPComp proposal MUST NOT be rejected because it lacks attributes of other protocols in a Protection Suite.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
