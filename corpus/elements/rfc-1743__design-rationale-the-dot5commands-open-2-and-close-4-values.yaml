document: rfc-1743
kind: design-rationale
summary: The dot5Commands open(2) and close(4) values correspond to MIB-II's ifAdminStatus up(1) and down(2) values; setting either dot5Commands or ifAdminStatus affects the value of the other. This linkage was clarified from RFC 1231 to avoid ambiguity in dual-path management.
section: "4"
topics:
