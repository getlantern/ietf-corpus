document: rfc-4625
kind: protocol-element
summary: 'The t11FcRouteTable INDEX comprises ten components: fcmInstanceIndex, fcmSwitchIndex, t11FcRouteFabricIndex, t11FcRouteDestAddrId, t11FcRouteDestMask, t11FcRouteSrcAddrId, t11FcRouteSrcMask, t11FcRouteInInterface, t11FcRouteProto, and t11FcRouteOutInterface. All are integers or 3-octet strings, yielding at most 22 appended OID sub-identifiers per instance.'
