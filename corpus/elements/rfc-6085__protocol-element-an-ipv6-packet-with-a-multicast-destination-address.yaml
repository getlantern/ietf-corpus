document: rfc-6085
kind: protocol-element
summary: An IPv6 packet with a multicast destination address may be mapped to an Ethernet link-layer unicast address (rather than a multicast link-layer address) when it is clear that only one address is relevant. This extends the mapping defined in RFC 2464 Section 7.
section: "1"
topics:
