document: rfc-8287
kind: wire-format
summary: The IPv4 IGP-Prefix Segment ID sub-TLV contains a 32-bit IPv4 Prefix field, a 1-octet Prefix Length field (1-32 bits), a 1-octet Protocol field (0=any IGP, 1=OSPF, 2=IS-IS), and a 2-octet Reserved field that MUST be set to zero on send.
section: "5.1"
topics:
