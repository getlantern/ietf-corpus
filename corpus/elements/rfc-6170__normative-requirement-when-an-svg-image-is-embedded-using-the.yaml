document: rfc-6170
kind: normative-requirement
summary: When an SVG image is embedded using the 'data' URL scheme, the SVG data MUST be provided in SVGZ (GZIP compressed) form. Hashing of SVGZ is calculated over the decompressed SVG content with canonicalized EOL characters.
section: "5.2"
rfc2119_level: MUST
topics:
    - pkix
