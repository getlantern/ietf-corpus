document: rfc-4972
kind: design-rationale
summary: The document explicitly limits scope to IGP-based discovery of mesh membership; the actual mechanism for dynamically creating TE LSPs once membership is discovered is implementation-specific and outside scope. This separation keeps the IGP extensions minimal and stable.
