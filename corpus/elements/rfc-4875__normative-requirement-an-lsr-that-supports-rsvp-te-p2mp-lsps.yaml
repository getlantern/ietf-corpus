document: rfc-4875
kind: normative-requirement
summary: An LSR that supports RSVP-TE P2MP LSPs MUST be able to receive and process multiple Path messages for the same P2MP LSP and multiple S2L sub-LSPs within one Path message, and MUST be able to process all objects defined in section 19.
section: "5.2"
rfc2119_level: MUST
topics:
