document: rfc-5692
kind: normative-requirement
summary: The network-side bridging function SHOULD filter broadcast DHCPOFFER and DHCPACK messages and forward them only to the host defined by the client hardware address in the chaddr field, to avoid unnecessary radio broadcasts.
section: "7.2"
rfc2119_level: SHOULD
