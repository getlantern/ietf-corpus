document: rfc-4021
kind: protocol-element
summary: The Importance header field is a hint from the originator to recipients about message importance, with values High, normal, or low. It is not used to control transmission speed. Proposed for use with RFC 2156 (MIXER) and RFC 3801 (VPIM).
section: 2.1.52
