document: rfc-7635
kind: normative-requirement
summary: The token's lifetime value MUST be greater than or equal to the OAuth 'expires_in' parameter (RFC 6749 Section 4.2.2); otherwise the resource server could revoke the token while the client still assumes it is valid and does not refresh.
section: "6.2"
rfc2119_level: MUST
topics:
    - oauth
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
