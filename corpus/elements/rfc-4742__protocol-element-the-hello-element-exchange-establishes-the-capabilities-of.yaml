document: rfc-4742
kind: protocol-element
summary: The <hello> element exchange establishes the capabilities of both client and server at session start; the server sends first, and the client's <hello> must be its first XML document. The <hello> contains a <capabilities> list and the server includes a <session-id>.
section: "3.1"
