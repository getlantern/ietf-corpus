document: rfc-8964
kind: security-consideration
summary: MPLS does not provide any native security services for confidentiality or integrity. Application flows must rely on external mechanisms such as IPsec (RFC 4301) for IP flows or MACsec (IEEE 802.1AE) for Layer 2 flows to protect data in transit.
section: "6"
topics:
    - mpls
    - security
