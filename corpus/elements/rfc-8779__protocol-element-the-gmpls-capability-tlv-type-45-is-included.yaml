document: rfc-8779
kind: protocol-element
summary: The GMPLS-CAPABILITY TLV (Type=45) is included in the OPEN object to negotiate GMPLS capability during session establishment. It contains a 32-bit Flags field; all flags are currently unassigned and MUST be set to zero on transmission and ignored on receipt.
section: 2.1.2
topics:
    - routing
