document: rfc-8913
kind: protocol-element
summary: The key-chain grouping maps a UTF-8 key-id (1..80 octets) to a binary secret-key for TWAMP-Control authentication/encryption. Both the Server and Control-Client use the same key-id-to-secret-key mapping; key-id must be unique across all systems in the administrative domain.
section: "5.2"
topics:
