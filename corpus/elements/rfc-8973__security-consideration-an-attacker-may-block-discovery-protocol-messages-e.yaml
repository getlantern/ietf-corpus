document: rfc-8973
kind: security-consideration
summary: An attacker may block discovery protocol messages (e.g., DHCP) to force a DOTS client to fall back to a lower-priority discovery mechanism. The DOTS client constructs a DNS-ID reference identifier from the S-NAPTR lookup domain name; DNSSEC SHOULD be used to authenticate S-NAPTR results.
section: "8.2"
topics:
    - security
    - dns
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
