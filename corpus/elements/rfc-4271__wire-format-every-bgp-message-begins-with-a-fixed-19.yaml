document: rfc-4271
kind: wire-format
summary: 'Every BGP message begins with a fixed 19-octet header: a 16-octet Marker (all ones), a 2-octet unsigned Length (19–4096), and a 1-octet Type code (1=OPEN, 2=UPDATE, 3=NOTIFICATION, 4=KEEPALIVE). All multi-octet fields are in network byte order.'
section: "4.1"
topics:
