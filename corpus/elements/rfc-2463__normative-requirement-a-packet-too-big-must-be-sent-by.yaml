document: rfc-2463
kind: normative-requirement
summary: A Packet Too Big MUST be sent by a router when it cannot forward a packet because the packet exceeds the MTU of the outgoing link. An incoming Packet Too Big message MUST be passed to the upper-layer process.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
