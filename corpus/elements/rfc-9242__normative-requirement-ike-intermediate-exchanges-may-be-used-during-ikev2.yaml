document: rfc-9242
kind: normative-requirement
summary: IKE_INTERMEDIATE exchanges MAY be used during IKEv2 Session Resumption between IKE_SESSION_RESUME and IKE_AUTH. Peers MUST negotiate support by including INTERMEDIATE_EXCHANGE_SUPPORTED in IKE_SESSION_RESUME messages; support status is not stored in the resumption ticket.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
