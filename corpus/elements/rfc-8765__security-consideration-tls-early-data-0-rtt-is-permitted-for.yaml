document: rfc-8765
kind: security-consideration
summary: TLS Early Data (0-RTT) is permitted for SUBSCRIBE TLVs but is not forward secret and provides no replay protection between connections. Servers MAY implement rate-limiting for spurious subscription requests arising from replayed early data.
section: "7.3"
topics:
    - dns
    - tls
    - security
