document: rfc-1743
kind: interoperability-note
summary: ifPhysAddress for an 802.5 interface must contain the IEEE MAC address as a 6-octet string in IEEE 802.1a canonical order, with the Group Bit positioned as the low-order bit (0x01) of the first octet. This applies regardless of 802.5's on-wire MSB-first transmission order.
section: 3.3.5
topics:
    - snmp
