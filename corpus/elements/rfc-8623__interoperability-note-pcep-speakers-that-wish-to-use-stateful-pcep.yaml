document: rfc-8623
kind: interoperability-note
summary: PCEP speakers that wish to use stateful PCEP for P2MP TE LSPs MUST advertise stateful PCEP capabilities during PCEP session setup even if active, passive, or initiation capabilities were previously advertised via IGP discovery. A PCC MAY initiate stateful PCEP P2MP capability advertisement at session setup even without receiving IGP PCE capability advertisements.
section: "5.3"
topics:
