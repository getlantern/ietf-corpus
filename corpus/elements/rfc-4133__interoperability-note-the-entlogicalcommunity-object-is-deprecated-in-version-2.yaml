document: rfc-4133
kind: interoperability-note
summary: The entLogicalCommunity object is deprecated in version 2 and beyond. SNMPv3 agents may return a zero-length string or may continue to return a community string for tri-lingual agent support. Agents SHOULD use entLogicalContextEngineID and entLogicalContextName for SNMPv3 contexts.
section: "3"
topics:
