document: rfc-6184
kind: normative-requirement
summary: For all aggregation packets, the RTP timestamp MUST be the earliest NALU-time among all aggregated NAL units; the F bit MUST be cleared if all aggregated NAL unit F bits are zero, otherwise MUST be set; and the NRI value MUST be the maximum of all aggregated NAL unit NRI values.
section: "5.7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
