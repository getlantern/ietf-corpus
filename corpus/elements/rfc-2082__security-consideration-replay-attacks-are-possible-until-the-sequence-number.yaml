document: rfc-2082
kind: security-consideration
summary: Replay attacks are possible until the sequence number changes. A forgotten sequence number forces reset to zero, creating a small replay window. Vendors are encouraged to provide stable storage for keys, key lifetimes, Key-IDs, and sequence numbers to minimize this exposure.
section: 3.2.2
topics:
    - routing
    - security
