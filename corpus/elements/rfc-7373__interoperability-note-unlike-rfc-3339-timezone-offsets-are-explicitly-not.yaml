document: rfc-7373
kind: interoperability-note
summary: Unlike RFC 3339, timezone offsets are explicitly not permitted for IPFIX dateTime ADTs; all textual timestamps must be expressed in UTC only, reflecting the UTC-only nature of IPFIX binary timestamps.
section: "4.8"
