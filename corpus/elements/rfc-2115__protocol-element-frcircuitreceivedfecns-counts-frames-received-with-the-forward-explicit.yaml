document: rfc-2115
kind: protocol-element
summary: frCircuitReceivedFECNs counts frames received with the Forward Explicit Congestion Notification bit set (either by the remote DTE or a switch with a congested trunk queue). frCircuitReceivedBECNs counts frames received with the Backward Explicit Congestion Notification bit set.
