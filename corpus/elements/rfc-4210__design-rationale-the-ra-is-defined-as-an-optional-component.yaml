document: rfc-4210
kind: design-rationale
summary: The RA is defined as an OPTIONAL component; when absent, the CA performs RA functions so that end entities use the same protocol regardless of whether they communicate with an RA or directly with the CA. No special RA certification operation is defined, keeping the protocol uniform.
section: 3.1.1.3
topics:
