document: rfc-8114
kind: design-rationale
summary: It is recommended to configure the mAFTR as the Rendezvous Point (RP) for the IPv4-embedded IPv6 multicast groups it manages, so that no PIM registration procedure is required and multicast distribution tree computation is simplified.
