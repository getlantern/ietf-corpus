document: rfc-9603
kind: normative-requirement
summary: If a PCEP speaker receives an SRv6-ERO subobject when PST is not set to 3 or the SRv6-PCE-CAPABILITY sub-TLV was not exchanged, it MUST send a PCErr with Error-Type=19 and Error-Value=19 ('Attempted SRv6 when the capability was not advertised').
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
