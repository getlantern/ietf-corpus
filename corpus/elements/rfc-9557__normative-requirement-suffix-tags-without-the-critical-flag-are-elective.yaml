document: rfc-9557
kind: normative-requirement
summary: 'Suffix tags without the critical flag are elective: recipients are free to ignore any tag they do not recognize or cannot act upon. Applications MAY perform additional processing on inconsistent or unrecognized elective tags but are not required to.'
section: "3.3"
rfc2119_level: MAY
