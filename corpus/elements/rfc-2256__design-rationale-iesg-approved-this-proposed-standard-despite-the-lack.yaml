document: rfc-2256
kind: design-rationale
summary: IESG approved this Proposed Standard despite the lack of mandatory authentication to encourage implementation and interoperability testing, to support read-only application deployments (e.g., LDAPv3 as a query language), and to avoid blocking other Internet standards that depend on LDAPv3 query capability.
