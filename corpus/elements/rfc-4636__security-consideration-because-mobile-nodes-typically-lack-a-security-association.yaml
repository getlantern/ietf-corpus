document: rfc-4636
kind: security-consideration
summary: Because mobile nodes typically lack a security association with the foreign agent, a malicious foreign agent could send a FA Error Extension causing the mobile node to believe registration failed when both home agent and a legitimate foreign agent accepted it. The mobile node MAY delay processing denied Registration Reply messages briefly to check whether a successful reply arrives from the foreign agent.
section: "8"
rfc2119_level: MAY
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
