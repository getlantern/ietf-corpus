document: rfc-8870
kind: normative-requirement
summary: If a source has its EKTKey changed by key management, it MUST also change its SRTP master key. This ensures traffic can be decrypted only by participants who know the current EKTKey.
section: "4.5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - crypto
