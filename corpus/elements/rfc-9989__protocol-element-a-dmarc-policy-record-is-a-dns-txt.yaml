document: rfc-9989
kind: protocol-element
summary: A DMARC Policy Record is a DNS TXT record published at the name formed by prepending '_dmarc' to a domain name (e.g., '_dmarc.example.com'). It encodes the domain owner's handling preference for DMARC failures and optional reporting URIs using a tag-value syntax inherited from DKIM.
section: "4.5"
