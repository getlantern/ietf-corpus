document: rfc-6030
kind: registry
summary: This document creates the 'PSKC Algorithm Profile Registry' (Section 12.4) to record algorithm profiles with their metadata and PSKC transmission profiles. Initial entries are the HOTP profile (urn:ietf:params:xml:ns:keyprov:pskc:hotp) and the PIN profile (urn:ietf:params:xml:ns:keyprov:pskc:pin). New profiles require IETF Review.
section: "12.4"
