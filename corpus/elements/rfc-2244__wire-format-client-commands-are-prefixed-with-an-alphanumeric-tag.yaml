document: rfc-2244
kind: wire-format
summary: Client commands are prefixed with an alphanumeric tag of no more than 32 characters. Server responses are tagged (matching the client command tag), untagged (prefixed with '*'), or command continuation requests (prefixed with '+'). A tagged response other than OK, NO, or BAD is an intermediate response.
section: "2.2"
