document: rfc-946
kind: interoperability-note
summary: The TTYLOC option is not a replacement for the Telnet Terminal Location (SEND-LOCATION) option defined in RFC-779; it is a shorthand mechanism for hosts within the same community (originally the CMU PUP-based network, now extended to TCP). If TTYLOC is refused, SEND-LOCATION should be tried.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
