document: rfc-9398
kind: security-consideration
summary: Unauthorized write access to the igmp-proxy or mld-proxy interface subtrees can cause proxy interfaces to be deleted or reconfigured, potentially leading to network malfunctions, misdelivery of multicast packets, and disruption of multicast forwarding. NACM (RFC 8341) should be used to restrict write access.
section: "5"
topics:
    - security
    - yang
    - multicast
