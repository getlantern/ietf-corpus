document: rfc-7866
kind: normative-requirement
summary: For the Communication Session, the SRC MUST provide recording indications to all participants. When a participant UA includes the 'record-aware' option tag, the SRC MUST provide the indication via the SDP 'a=record' attribute; otherwise the SRC MUST use other means such as an in-band tone.
section: 6.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
