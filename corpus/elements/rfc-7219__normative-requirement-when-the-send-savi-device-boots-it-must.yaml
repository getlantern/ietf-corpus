document: rfc-7219
kind: normative-requirement
summary: When the SEND SAVI device boots, it MUST send a Router Solicitation (RSOL) to populate the SEND SAVI Prefix List. The RSOL need not be secured if the unspecified address is used. The device SHOULD also re-issue RSOL when a prefix entry is about to expire.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
