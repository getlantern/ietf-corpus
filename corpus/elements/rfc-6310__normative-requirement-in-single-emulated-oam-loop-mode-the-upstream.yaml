document: rfc-6310
kind: normative-requirement
summary: In single emulated OAM loop mode, the upstream PE MUST transparently relay NS OAM messages over the PW and MUST signal local AC defects using a NS defect notification sent over the PW. If the defect interferes with NS OAM message generation, the PE MUST instead signal AC defects using a PW defect notification message.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
