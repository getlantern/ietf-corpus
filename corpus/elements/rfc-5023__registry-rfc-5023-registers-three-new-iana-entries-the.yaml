document: rfc-5023
kind: registry
summary: 'RFC 5023 registers three new IANA entries: the media type application/atomcat+xml (file extension .atomcat) for Category Documents, the media type application/atomsvc+xml (file extension .atomsvc) for Service Documents, and the SLUG HTTP header field. It also registers the ''edit'' and ''edit-media'' link relations in the Atom Registry of Link Relations and adds a reference in the application/atom+xml registration for the new ''type'' parameter.'
