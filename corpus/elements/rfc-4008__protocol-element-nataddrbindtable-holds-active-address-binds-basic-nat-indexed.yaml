document: rfc-4008
kind: protocol-element
summary: natAddrBindTable holds active address binds (Basic NAT), indexed by (ifIndex, LocalAddrType, LocalAddr). natAddrPortBindTable holds active NAPT binds, indexed by (ifIndex, LocalAddrType, LocalAddr, LocalPort, Protocol). Both are read-only, derived from the address map table, and lost upon agent restart.
section: "4.4"
