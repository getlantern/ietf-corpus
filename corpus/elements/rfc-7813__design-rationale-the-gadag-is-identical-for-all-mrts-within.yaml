document: rfc-7813
kind: design-rationale
summary: The GADAG is identical for all MRTs within a network domain (a consequence of the MRT Lowpoint algorithm), making it beneficial to compute the GADAG by a single GADAG Computer entity rather than distributedly. The MRTG ECT Algorithm exploits this to centralize GADAG computation and distribute results via IS-IS flooding.
