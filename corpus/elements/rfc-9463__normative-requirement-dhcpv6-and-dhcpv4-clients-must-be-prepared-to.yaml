document: rfc-9463
kind: normative-requirement
summary: DHCPv6 and DHCPv4 clients MUST be prepared to receive multiple instances of OPTION_V6_DNR or DNR Instance Data entries; each is treated as a separate encrypted DNS resolver. These MUST be processed in ascending service priority order (smaller value = higher preference).
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
