document: rfc-6940
kind: normative-requirement
summary: Each stored data value MUST be individually digitally signed by the node that created it, and the signature MUST be stored alongside the data value. This allows any reader to verify data integrity and the responsible peer to verify Store authorization.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
