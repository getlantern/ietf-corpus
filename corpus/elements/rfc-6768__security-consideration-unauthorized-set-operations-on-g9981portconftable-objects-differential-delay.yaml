document: rfc-6768
kind: security-consideration
summary: Unauthorized SET operations on g9981PortConfTable objects (differential delay tolerances, notification enable) can cause SLA breaches by increasing traffic delay or suppressing differential delay threshold notifications. These read-write objects require protection in non-secure environments.
