document: rfc-4771
kind: protocol-element
summary: 'Three transform modes are defined. Mode 1 (RCCm1): integrity protection only on packets carrying the ROC (SEQ = 0 mod R). Mode 2 (RCCm2): all packets integrity protected—ROC packets use the RCC tag, others use the default SRTP MAC. Mode 3 (RCCm3): no MAC at all; ROC is carried unprotected in a 4-octet tag for SEQ = 0 mod R packets.'
