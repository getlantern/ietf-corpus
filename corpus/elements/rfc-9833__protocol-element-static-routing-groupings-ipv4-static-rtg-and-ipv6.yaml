document: rfc-9833
kind: protocol-element
summary: Static routing groupings ('ipv4-static-rtg' and 'ipv6-static-rtg') define keyed lists of LAN prefixes where each entry carries lan (prefix), lan-tag (string for policy tagging), next-hop (union of ip-address or predefined-next-hop identityref), metric (uint32), and service-status. They are guarded by vpn-common:ipv4/ipv6 feature checks.
section: "4.3"
