document: rfc-9793
kind: normative-requirement
summary: BIFT-id ranges within all BIER non-MPLS Encapsulation sub-TLVs advertised by the same BFR MUST NOT overlap. If an overlap is detected, all such sub-TLVs MUST be ignored. Overlap across different encapsulation types (MPLS vs. non-MPLS) is allowed.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - bgp
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
