document: rfc-3779
kind: wire-format
summary: The addressFamily element is an OCTET STRING of size 2 to 3 containing a two-octet AFI in network byte order, optionally followed by a one-octet SAFI. IPv4 unicast uses AFI 0001 SAFI 01; IPv6 uses AFI 0002.
