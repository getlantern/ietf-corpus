document: rfc-7598
kind: design-rationale
summary: Softwire46 options use addresses rather than FQDNs. The rationale is deferred to Section 8 of RFC 7227 (Guidelines for Creating New DHCPv6 Options), which recommends avoiding FQDNs in DHCPv6 options that carry network-layer parameters.
