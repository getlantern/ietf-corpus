document: rfc-7306
kind: normative-requirement
summary: The Local Peer MUST send a Terminate Message when errors are detected while creating or receiving Atomic Request, Atomic Response, Immediate Data, or Immediate Data with SE messages. Error type, error code, and terminated DDP header fields are included as appropriate.
section: "8.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
