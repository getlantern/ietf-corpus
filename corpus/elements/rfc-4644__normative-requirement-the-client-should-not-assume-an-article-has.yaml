document: rfc-4644
kind: normative-requirement
summary: The client SHOULD NOT assume an article has been successfully transferred unless it receives an affirmative response. A dropped connection or 400 response SHOULD be treated as a temporary failure and retried later.
section: 2.5.2
rfc2119_level: SHOULD NOT
