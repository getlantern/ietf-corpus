document: rfc-7788
kind: normative-requirement
summary: The elected stateful DHCPv6 server MUST serve stateful DHCPv6 and all other nodes MUST NOT. DHCPv6 stateful address lease renew and rebind times SHOULD NOT exceed 5 minutes to support fast renumbering.
section: "7.1"
rfc2119_level: MUST
topics:
