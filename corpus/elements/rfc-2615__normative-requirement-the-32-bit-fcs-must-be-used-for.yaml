document: rfc-2615
kind: normative-requirement
summary: The 32-bit FCS MUST be used for all SONET/SDH rates, with the sole exception that for STS-3c-SPE/VC-4 only, the 16-bit FCS MAY be used (though 32-bit is RECOMMENDED). The FCS length is set by provisioning and is not negotiated.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
