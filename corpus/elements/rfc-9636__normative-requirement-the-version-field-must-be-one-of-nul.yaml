document: rfc-9636
kind: normative-requirement
summary: 'The version field MUST be one of: NUL (0x00) for version 1; ''2'' (0x32) for version 2, which MUST contain both v1 and v2+ header/data blocks plus a footer; ''3'' (0x33) for version 3, which additionally MAY use TZ string extensions; or ''4'' (0x34) for version 4, which additionally allows truncated or expiring leap-second tables.'
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
