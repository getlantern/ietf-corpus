document: rfc-4293
kind: normative-requirement
summary: For objects represented by both 32-bit and 64-bit counters, the 32-bit value MUST be the low-order 32 bits of the 64-bit value. Additionally, the 32-bit counters must be included whenever the 64-bit counters are included.
section: "5"
rfc2119_level: MUST
topics:
    - snmp
    - ip
