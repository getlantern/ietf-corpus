document: rfc-2806
kind: normative-requirement
summary: visual-separator characters ('-', '.', '(', ')') MUST be ignored by the local entity when processing a URL; they exist solely for human readability. Space characters MUST NOT be used in URLs as phone number separators.
section: 2.5.3
rfc2119_level: MUST
