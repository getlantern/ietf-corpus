document: rfc-5334
kind: normative-requirement
summary: application/ogg SHOULD only be used in situations where it is not appropriate to serve data under video/ogg or audio/ogg; data served under application/ogg SHOULD use the .ogx file extension and MUST contain an Ogg Skeleton logical bitstream.
section: "10.1"
rfc2119_level: MUST
topics:
    - registry
