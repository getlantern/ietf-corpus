document: rfc-8795
kind: protocol-element
summary: A transitional TE link represents the layer transition function inside a node decomposed into multiple logical TE nodes, connecting a client-layer node with a server-layer node. Transitional TE links only exist while not in use (representing potential connectivity) and disappear when a server-layer trail is established.
