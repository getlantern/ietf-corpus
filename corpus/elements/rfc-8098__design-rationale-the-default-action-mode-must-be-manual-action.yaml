document: rfc-8098
kind: design-rationale
summary: The default action-mode MUST be `manual-action` and the default sending-mode MUST be `MDN-sent-manually` to preserve user privacy. The overall default behavior SHOULD be not to send MDNs at all without explicit user consent.
section: 3.2.6.1
topics:
    - email
    - privacy
