document: rfc-4420
kind: protocol-element
summary: The LSP_REQUIRED_ATTRIBUTES object (class 67, C-Type 1) carries Attributes TLVs that each transit LSR MUST inspect and act on. Its C-Num (form 0bbbbbbb) causes LSRs that do not recognize it to reject the LSP setup with 'Unknown Object Class'. This object is not used on Resv messages.
section: "5"
topics:
