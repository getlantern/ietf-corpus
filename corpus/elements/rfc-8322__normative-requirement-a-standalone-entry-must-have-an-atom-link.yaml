document: rfc-8322
kind: normative-requirement
summary: A standalone Entry MUST have an atom:link with rel='collection' and href pointing to the containing Collection URI. If the Entry belongs to multiple Feeds, it MUST have one such link per Feed. The Entry MUST also declare the information type of the content resource.
section: 6.2.5
rfc2119_level: MUST
topics:
    - http
    - security
