summary: 'The ''cursor'' parameter is an opaque string representing a pointer to a specific fixed-size portion of the result set, enabling pagination. ABNF: cursor = "cursor=" 1*( ALPHA / DIGIT / "/" / "=" / "-" / "_" ). Its internal encoding is server-defined.'
