document: rfc-6929
kind: normative-requirement
summary: TLV-Value MUST NOT contain data using the Extended Type formats defined in this document. TLV nesting depths greater than 4 are NOT RECOMMENDED; reception of packets with deeply nested TLVs may indicate implementation errors or deliberate attacks.
section: "2.3"
rfc2119_level: MUST NOT
