document: rfc-4783
kind: protocol-element
summary: The Admin_Status object is extended with a new Inhibit Alarm Communication (I) bit (value 0x00000010). When set, it indicates that alarm communication is disabled for the LSP and nodes SHOULD NOT add local alarm information.
