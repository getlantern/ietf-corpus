document: rfc-1697
kind: interoperability-note
summary: Disk read/write and logical read/write counters in rdbmsSrvInfoTable are product-specific and explicitly not comparable between RDBMS products. Logical read/write values may only be meaningful when aggregated across all servers sharing a common cache.
section: "4"
