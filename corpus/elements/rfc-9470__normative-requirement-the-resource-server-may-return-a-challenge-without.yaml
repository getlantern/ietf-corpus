document: rfc-9470
kind: normative-requirement
summary: The resource server MAY return a challenge without verifying that the client presented a valid token; however, doing so leaks the required token properties to an actor who has not proven they can obtain a token for that resource server.
section: "9"
rfc2119_level: MAY
topics:
