document: rfc-2091
kind: normative-requirement
summary: After sending an Update Flush (Update Response with Flush flag set), the full routing database MUST subsequently be sent. An Update Response with Flush MUST be sent at power-on, in response to an Update Request, and after transitioning from circuit-down to circuit-up.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
