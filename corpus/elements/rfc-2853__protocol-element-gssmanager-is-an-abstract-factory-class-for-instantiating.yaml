document: rfc-2853
kind: protocol-element
summary: GSSManager is an abstract factory class for instantiating GSSName, GSSCredential, and GSSContext objects. It provides getMechs(), getNamesForMech(), getMechsForName(), and provider-preference methods addProviderAtFront() and addProviderAtEnd(). A default instance is obtained via the static getInstance() method.
section: "5.1"
