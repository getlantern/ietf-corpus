document: rfc-4997
kind: normative-requirement
summary: All ROHC-FN identifiers must start with an alphabetic character; identifiers for constants must be entirely upper case. It is illegal to have two identifiers that differ only in capitalisation within the same scope, and reserved words (ENFORCE, THIS, VARIABLE, UVALUE, CLENGTH, COMPRESSED, etc.) may not be used as identifiers.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
