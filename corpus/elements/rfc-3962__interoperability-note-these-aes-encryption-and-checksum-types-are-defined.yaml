document: rfc-3962
kind: interoperability-note
summary: These AES encryption and checksum types are defined using the 'simplified profile' of RFC 3961 (KCRYPTO). Implementations must follow the profile parameters in Section 6 exactly, including the specific HMAC truncation to 96 bits and CBC-CTS mode with next-to-last block as IV carry-forward.
section: "6"
topics:
