document: rfc-3903
kind: design-rationale
summary: PUBLISH creates soft state with a negotiated lifetime, analogous to REGISTER, so that the ESC can detect stale publications and clean them up automatically. Hard state (provisioned out-of-band) can coexist with soft state, enabling a fallback presence when all EPAs have gone silent.
