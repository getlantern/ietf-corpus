document: rfc-9835
kind: interoperability-note
summary: 'The ''ietf-ac-ntw'' module imports ''ietf-ac-svc'' and ''ietf-bearer-svc'' (RFC 9834) for AC and bearer service references, and ''ietf-ac-common'' (RFC 9833) for shared groupings. The AC model ecosystem forms a layered dependency: ac-common is imported by bearer-svc, ac-svc, and ac-ntw; ac-ntw imports ac-svc for network-to-service correlation.'
section: "3"
topics:
