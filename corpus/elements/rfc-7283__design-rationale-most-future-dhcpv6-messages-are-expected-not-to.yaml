document: rfc-7283
kind: design-rationale
summary: Most future DHCPv6 messages are expected not to communicate directly with relay agents, though relay agents may still need to relay them. This justifies the blanket forward-unknown-to-server rule without requiring relay agents to understand new message semantics.
section: "3"
topics:
