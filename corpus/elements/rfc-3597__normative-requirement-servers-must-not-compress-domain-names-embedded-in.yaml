document: rfc-3597
kind: normative-requirement
summary: Servers MUST NOT compress domain names embedded in the RDATA of types that are class-specific or not well-known. Only the RR types defined in RFC 1035 are considered 'well-known' for this purpose.
section: "4"
rfc2119_level: MUST NOT
