document: rfc-3175
kind: security-consideration
summary: Use of an IPsec Authentication Header is RECOMMENDED to detect malicious modification of the IP protocol number field. Network operators should also use physical security and password protection to prevent routers from being configured to perform malicious protocol number modification.
section: "5"
rfc2119_level: RECOMMENDED
