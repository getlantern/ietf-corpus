document: rfc-5621
kind: normative-requirement
summary: UAs SHOULD avoid unnecessarily nesting body parts. UAs SHOULD NOT nest one 'multipart/mixed' within another unless there is a need to reference the nested one using its Content-ID. Additionally, UAs SHOULD NOT nest one 'multipart/alternative' within another.
section: "4.3"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
