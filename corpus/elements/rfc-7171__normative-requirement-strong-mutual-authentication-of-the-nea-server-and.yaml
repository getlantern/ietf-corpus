document: rfc-7171
kind: normative-requirement
summary: Strong mutual authentication of the NEA Server and Client is REQUIRED to prevent disclosure of possibly sensitive NEA Client information to an attacker. If the tls-unique values of NEA Client and NEA Server do not match, the Posture Validator SHOULD fail its verification.
section: "3.4"
rfc2119_level: REQUIRED
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
