document: rfc-5807
kind: protocol-element
summary: The PaC-EP Master Key (PEMK) is a 64-octet key derived as PEMK = prf+(MSK, "IETF PEMK" | SID | KID | EPID), using the prf+ function from IKEv2 (RFC 4306) with the PRF algorithm specified in the PRF-Algorithm AVP of the PANA-Auth-Request message with the 'S' bit set.
