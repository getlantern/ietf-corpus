document: rfc-5545
kind: normative-requirement
summary: Multi-valued properties MUST NOT be used to specify multiple language variants of the same value. Calendar applications SHOULD display all values when a property has multiple values. Individual property definitions must be consulted to determine which encoding form (multiple content lines vs. COMMA-separated) is allowed.
section: 3.1.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
