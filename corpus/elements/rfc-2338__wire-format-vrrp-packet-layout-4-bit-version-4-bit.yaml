document: rfc-2338
kind: wire-format
summary: 'VRRP packet layout: 4-bit Version, 4-bit Type, 8-bit Virtual Rtr ID, 8-bit Priority, 8-bit Count IP Addrs, 8-bit Auth Type, 8-bit Adver Int, 16-bit Checksum, followed by n×32-bit IP Address fields and two 32-bit Authentication Data words. Total fixed header is 8 octets plus variable IP address list plus 8 octets of authentication data.'
