document: rfc-4842
kind: state-machine
summary: 'Packet synchronization has two states: synchronized and out-of-synchronization. Transition to synchronized requires playing out a configurable number of CEP packets with sequential sequence numbers. Loss of packet synchronization (LOPS) is declared after more than a configurable number of sequential empty packets; LOPS failure is declared after 2.5 ± 0.5 seconds of LOPS defect, and cleared after 10 seconds free of LOPS defect.'
section: "6.2"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
