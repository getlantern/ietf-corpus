document: rfc-4432
kind: protocol-element
summary: 'The RSA key exchange consists of three messages: SSH_MSG_KEXRSA_PUBKEY (server sends transient RSA public key K_T), SSH_MSG_KEXRSA_SECRET (client sends RSAES-OAEP encrypted shared secret K), and SSH_MSG_KEXRSA_DONE (server sends signature of exchange hash H).'
