document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeaderCount (IE 514, unsigned8, totalCounter) carries the number of consecutive occurrences of the same extension header type within a Flow. It is paired with ipv6ExtensionHeaderType inside the ipv6ExtensionHeaderTypeCountList subTemplateList to record repeated EH types in a single chain.
section: "3.2"
