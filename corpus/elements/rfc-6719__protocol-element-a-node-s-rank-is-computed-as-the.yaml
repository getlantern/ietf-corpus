document: rfc-6719
kind: protocol-element
summary: 'A node''s Rank is computed as the maximum of: (1) the Rank for the path through the preferred parent, (2) the highest advertised Rank among parent set members rounded up to the next integral Rank, and (3) the largest calculated Rank among parent set paths minus MaxRankIncrease.'
section: "3.3"
topics:
