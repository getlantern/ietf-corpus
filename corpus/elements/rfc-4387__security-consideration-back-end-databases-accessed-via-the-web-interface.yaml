document: rfc-4387
kind: security-consideration
summary: Back-end databases accessed via the web interface SHOULD be configured for read-only access (e.g., via SQL GRANT/REVOKE or opening Berkeley DB in read-only mode) to prevent modification of the certificate store through the HTTP interface.
