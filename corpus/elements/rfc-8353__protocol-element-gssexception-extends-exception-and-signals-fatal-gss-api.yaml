document: rfc-8353
kind: protocol-element
summary: GSSException extends Exception and signals fatal GSS-API errors via major status codes (BAD_BINDINGS=1 through NAME_NOT_MN=18, and DUPLICATE_TOKEN=19 through GAP_TOKEN=22) and mechanism-specific minor codes. A new getOutputToken() method (added by RFC 8353) returns an optional error token to send to the peer.
section: "7.8"
topics:
    - security
