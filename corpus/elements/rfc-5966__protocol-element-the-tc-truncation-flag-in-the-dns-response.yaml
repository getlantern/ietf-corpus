document: rfc-5966
kind: protocol-element
summary: The TC (truncation) flag in the DNS response header signals that the server had to truncate the response to fit within the 512-byte UDP limit. A client receiving a response with TC set should retry the query over TCP.
section: "3"
topics:
    - dns
    - tcp
    - udp
