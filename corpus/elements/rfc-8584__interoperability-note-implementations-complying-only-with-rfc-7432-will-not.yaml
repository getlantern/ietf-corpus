document: rfc-8584
kind: interoperability-note
summary: Implementations complying only with RFC 7432 will not advertise the DF Election Extended Community; all other PEs in the ES will therefore receive no DF preferences and revert to the default DF election algorithm without AC-DF. An RFC 7432-only PE that receives a DF Election Extended Community will ignore it.
section: 2.2.1
topics:
    - routing
