document: rfc-4780
kind: normative-requirement
summary: An SNMP agent MUST implement the SIP-TC-MIB module plus the SIP-COMMON-MIB module and one of the SIP entity-type-specific MIB modules (SIP-SERVER-MIB or SIP-UA-MIB) as applicable for each instance of a SIP entity being managed. If a device has more than one SIP entity or multiple instances of the same entity type, it MUST implement multiple SIP modules.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
