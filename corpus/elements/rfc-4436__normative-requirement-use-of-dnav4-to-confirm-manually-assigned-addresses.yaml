document: rfc-4436
kind: normative-requirement
summary: Use of DNAv4 to confirm manually assigned addresses SHOULD NOT be enabled by default, because where the manually assigned address falls within a DHCP server's scope, a conflict may arise if the host was unavailable when the DHCP server last checked for conflicts.
section: "2.4"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - security
