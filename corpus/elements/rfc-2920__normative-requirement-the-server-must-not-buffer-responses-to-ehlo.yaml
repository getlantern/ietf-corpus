document: rfc-2920
kind: normative-requirement
summary: The server MUST NOT buffer responses to EHLO, DATA, VRFY, EXPN, TURN, QUIT, and NOOP commands, nor to unrecognized commands, because these commands change state that requires immediate client acknowledgment.
section: "3.2"
rfc2119_level: MUST NOT
