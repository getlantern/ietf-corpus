document: rfc-7879
kind: protocol-element
summary: A DTLS-SRTP session contains either one DTLS connection (when RTP and RTCP are multiplexed per RFC 5761) or two DTLS connections (when RTP and RTCP are not multiplexed), and either one or two SRTP contexts depending on whether media flows in one or both directions on the same 5-tuple.
