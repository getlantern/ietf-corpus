document: rfc-7176
kind: normative-requirement
summary: In the set of LSPs originated by an IS, the union of VLAN ranges in all INT-VLAN sub-TLV occurrences MUST be the set of VLANs for which the IS is Appointed Forwarder on at least one port, and VLAN ranges in multiple sub-TLVs MUST NOT overlap unless the information for that VLAN is identical across instances.
section: 2.3.6
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
