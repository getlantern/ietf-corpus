document: rfc-821
kind: normative-requirement
summary: Data transparency requires that the sender-SMTP prepend an extra period to any line of mail data that begins with a period. The receiver-SMTP strips the leading period from such lines; a line consisting solely of a period signals end of mail data.
section: 4.5.2
rfc2119_level: MUST
topics:
    - email
