document: rfc-4737
kind: security-consideration
summary: An adversary who identifies measurement packets can manipulate the metric by altering packet processing (changing delay) or injecting additional packets that appear part of the sample, perturbing results by causing injected or original packets to be seen as duplicates. OWAMP (RFC 4656) provides mechanisms for data collection resistance to such interference.
section: "8.3"
topics:
    - security
    - measurement
