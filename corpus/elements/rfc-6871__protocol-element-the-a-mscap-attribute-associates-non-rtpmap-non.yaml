document: rfc-6871
kind: protocol-element
summary: The 'a=mscap' attribute associates non-'rtpmap'/non-'fmtp' media-specific attributes (e.g., 'rtcp-fb') with one or more media capability numbers. Its form is 'a=mscap:<media-caps-star> <att-field> <att-value>'; a wildcard '*' appended to a capability number causes the resulting SDP to use '*' instead of the assigned payload type.
section: 3.3.3
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
