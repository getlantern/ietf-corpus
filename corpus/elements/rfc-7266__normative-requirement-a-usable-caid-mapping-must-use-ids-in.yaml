document: rfc-7266
kind: normative-requirement
summary: A usable CAID mapping MUST use IDs in the valid range (1-255), each ID MUST be unique and used only once per stream or channel. The mapping MUST be provided per media stream in the media-level section of SDP.
section: "4.1"
rfc2119_level: MUST
