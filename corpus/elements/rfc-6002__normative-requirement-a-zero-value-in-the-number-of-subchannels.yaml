document: rfc-6002
kind: normative-requirement
summary: A zero value in the Number of Subchannels field of a LABEL or UPSTREAM_LABEL object indicates that subchannels used in the corresponding direction MUST match subchannels in the reverse direction's label object. The zero value MUST NOT be used in both the LABEL and UPSTREAM_LABEL objects of the same LSP simultaneously.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
