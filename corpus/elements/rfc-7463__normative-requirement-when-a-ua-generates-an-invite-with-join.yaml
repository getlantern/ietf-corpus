document: rfc-7463
kind: normative-requirement
summary: When a UA generates an INVITE with Join or Replaces targeting a dialog in the shared appearance group, the UA MUST first send a PUBLISH carrying the appearance number, <joined-dialog>, or <replaced-dialog> element as appropriate, before sending the INVITE.
section: 5.3.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
