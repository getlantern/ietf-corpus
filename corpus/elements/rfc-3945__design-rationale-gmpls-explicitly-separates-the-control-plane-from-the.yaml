document: rfc-3945
kind: design-rationale
summary: GMPLS explicitly separates the control plane from the forwarding plane, and further divides the control plane into a signaling plane and a routing plane. This separation allows each switching layer (PSC through FSC) to use physically diverse data or forwarding planes while sharing a common control infrastructure.
section: "1"
topics:
