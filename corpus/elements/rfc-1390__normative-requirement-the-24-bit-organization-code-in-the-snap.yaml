document: rfc-1390
kind: normative-requirement
summary: The 24-bit Organization Code in the SNAP header must be zero; the remaining 16 bits carry the EtherType from Assigned Numbers (IP=2048, ARP=2054). SNAP must be used with an Organization Code indicating EtherType.
section: Packet Format
rfc2119_level: MUST
topics:
    - ip
    - registry
