document: rfc-4010
kind: design-rationale
summary: SEED was chosen for use in CMS because it is a Korean national industrial standard (TTASSEED), widely deployed in South Korean electronic commerce and financial services, and has been evaluated as cryptographically secure by ISO/IEC JTC 1/SC 27 and Japan CRYPTREC. It is resistant to differential, linear, and related-key attacks.
section: "1.1"
