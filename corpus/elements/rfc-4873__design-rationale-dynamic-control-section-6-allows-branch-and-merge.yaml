document: rfc-4873
kind: design-rationale
summary: Dynamic control (Section 6) allows branch and merge nodes to be identified automatically via PROTECTION object Seg.Flags, avoiding the need for explicit SEROs. The primary difference from explicit control is in how the recovery LSP's ERO is created — dynamically computed rather than derived from SERO contents.
section: "6"
topics:
