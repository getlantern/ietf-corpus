document: rfc-3733
kind: normative-requirement
summary: All date-time values MUST be represented in UTC using the Gregorian calendar. The extended form using upper-case 'T' and 'Z' characters defined in RFC 3339 MUST be used; time zone offset identifiers MUST NOT be used with EPP.
section: "2.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
