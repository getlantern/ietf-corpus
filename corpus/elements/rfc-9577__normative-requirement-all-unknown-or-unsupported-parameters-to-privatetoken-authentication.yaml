document: rfc-9577
kind: normative-requirement
summary: All unknown or unsupported parameters to 'PrivateToken' authentication credentials MUST be ignored by the recipient. Clients MUST also ignore parameters in challenges not defined for the issuance protocol corresponding to the token type.
