document: rfc-2136
kind: design-rationale
summary: Creating a zone using DNS UPDATE is intentionally unsupported because there is no provision for telling a slave server who its master servers are. Addition and deletion of SOA RRs are therefore also unsupported at this time.
section: "7.6"
topics:
