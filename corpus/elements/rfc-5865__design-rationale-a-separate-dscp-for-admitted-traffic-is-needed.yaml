document: rfc-5865
kind: design-rationale
summary: A separate DSCP for admitted traffic is needed because existing VoIP services that perform no capacity admission or only coarse admission can exceed their allocated resources. Service providers need to distinguish special-policy (capacity-admitted) traffic from unadmitted traffic in the same EF PHB.
section: "1"
topics:
    - diffserv
    - qos
    - voip
