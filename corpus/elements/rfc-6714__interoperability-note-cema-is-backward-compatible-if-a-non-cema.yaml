document: rfc-6714
kind: interoperability-note
summary: 'CEMA is backward compatible: if a non-CEMA-enabled endpoint becomes ''active'', it uses the ''path'' attribute URI instead of the c/m-line, causing fallback to RFC 4975 behavior. CEMA-enabled endpoints detect this and revert to base MSRP procedures when CEMA cannot be enabled.'
section: "4.1"
topics:
    - realtime
    - sip
