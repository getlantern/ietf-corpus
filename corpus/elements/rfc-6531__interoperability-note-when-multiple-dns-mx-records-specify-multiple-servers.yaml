document: rfc-6531
kind: interoperability-note
summary: When multiple DNS MX records specify multiple servers for a domain, it is strongly advised that all or none of them SHOULD support the SMTPUTF8 extension. Mixed support can cause unexpected rejections during failures, perceived by users as serious reliability issues.
section: 3.7.2
rfc2119_level: SHOULD
topics:
    - email
    - dns
