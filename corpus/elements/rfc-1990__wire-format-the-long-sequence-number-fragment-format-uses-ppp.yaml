document: rfc-1990
kind: wire-format
summary: The long sequence number fragment format uses PPP protocol identifier 0x00-0x3d, followed by a 4-byte MP header containing a B(eginning) bit, E(nding) bit, 6 reserved bits (MUST be zero), and a 24-bit sequence number. This is the default format when the Short Sequence Number Header Format Option has not been negotiated.
section: "3"
