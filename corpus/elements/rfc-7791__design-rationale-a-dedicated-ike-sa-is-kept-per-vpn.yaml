document: rfc-7791
kind: design-rationale
summary: A dedicated IKE SA is kept per VPN (rather than multiplexing Child SAs under one IKE SA) to simplify reachability tests and VPN maintenance. Cloning preserves this one-IKE-SA-per-VPN invariant while avoiding re-authentication.
