document: rfc-8446
kind: security-consideration
summary: 'Servers SHOULD implement one of three 0-RTT anti-replay mechanisms: (1) single-use tickets via a distributed cache, (2) ClientHello recording using the unique (random, binder) tuple within a time window, or (3) freshness checks using obfuscated ticket age with a server-side clock tolerance window.'
section: "8"
topics:
