document: rfc-3812
kind: interoperability-note
summary: mplsTunnelHopAddrType lspid(5) is valid only for tunnels signaled via CR-LDP; when set, mplsTunnelHopLspId contains the LSPID of a nested tunnel, enabling label stacking. For unnumbered interfaces, mplsTunnelHopAddrUnnum holds the interface identifier while mplsTunnelHopIpAddr holds the LSR Router ID.
section: "11"
