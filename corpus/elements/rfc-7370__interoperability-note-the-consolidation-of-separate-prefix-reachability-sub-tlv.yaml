document: rfc-7370
kind: interoperability-note
summary: The consolidation of separate prefix reachability sub-TLV registries for TLVs 135, 235, 236, and 237 into a single registry represents no change to the IS-IS protocol itself — only a clearer representation of the intended sub-TLV allocation strategy, since existing sub-TLV assignments were already common to all four TLVs.
