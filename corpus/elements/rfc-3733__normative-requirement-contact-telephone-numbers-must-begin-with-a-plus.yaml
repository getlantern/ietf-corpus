document: rfc-3733
kind: normative-requirement
summary: Contact telephone numbers MUST begin with a plus sign ('+', ASCII 0x002B) followed by an E.164 country code, a dot ('.', ASCII 0x002E), and a digit sequence representing the telephone number.
section: "2.5"
rfc2119_level: MUST
