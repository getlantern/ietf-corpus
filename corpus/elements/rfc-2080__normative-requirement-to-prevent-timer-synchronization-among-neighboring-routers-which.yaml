document: rfc-2080
kind: normative-requirement
summary: To prevent timer synchronization among neighboring routers (which can cause collisions), implementations MUST either use a timer unaffected by system load or apply a random offset of ±0–15 seconds to the 30-second update interval.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
