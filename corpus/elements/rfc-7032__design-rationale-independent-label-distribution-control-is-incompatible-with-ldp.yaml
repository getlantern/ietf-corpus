document: rfc-7032
kind: design-rationale
summary: Independent label distribution control is incompatible with LDP DoD in access networks because an LSR binds labels without waiting for downstream confirmation, preventing propagation of label binding failures along the access chain and making alternate-path switchover impossible for upstream LSRs.
