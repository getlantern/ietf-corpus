document: rfc-5403
kind: interoperability-note
summary: 'RPCSEC_GSSv2 is fully backward-compatible with RPCSEC_GSSv1; all RPCSEC_GSSv1 functionality is supported by RPCSEC_GSSv2. Version negotiation is implicit: the initiator sets rgc_version to RPCSEC_GSS_VERS_2, and a non-recognizing target returns an RPC error per RFC 2203 Section 5.1.'
section: "3.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
