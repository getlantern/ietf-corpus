document: rfc-5864
kind: normative-requirement
summary: The TTL of DNS SRV RRs MUST be honored by invalidating and regenerating server preference ranks with new DNS information once the TTL has expired. However, accumulated network and protocol metrics MAY be retained and reapplied to new rankings.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
