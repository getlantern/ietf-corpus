document: rfc-4762
kind: wire-format
summary: The MAC List TLV has a 2-byte Type field (0x0404), a 2-byte Length field (must be a multiple of 6), followed by one or more 6-octet IEEE 802 MAC addresses. The U bit MUST be set to 1 (ignore if unknown) and the F bit MUST be set to 0 (do not forward).
section: 6.2.1
topics:
    - mpls
