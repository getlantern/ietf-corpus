document: rfc-4741
kind: protocol-element
summary: The <lock> operation acquires an exclusive configuration lock on a named datastore; it fails with error-tag 'lock-denied' and includes the holding session-id (or 0 for non-NETCONF entities) in error-info. The lock is automatically released when the session terminates.
section: "7.5"
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
