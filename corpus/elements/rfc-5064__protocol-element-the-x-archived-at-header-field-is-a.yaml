document: rfc-5064
kind: protocol-element
summary: 'The X-Archived-At header field is a deprecated precursor to Archived-At. Its ABNF syntax is: `obs-archived-at = "X-Archived-At:" SP URI CRLF`. It MAY be parsed but SHOULD NOT be generated; it does not allow whitespace inside the URI.'
section: "2.5"
topics:
    - email
