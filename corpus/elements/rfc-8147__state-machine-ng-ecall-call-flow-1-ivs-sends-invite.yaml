document: rfc-8147
kind: state-machine
summary: 'NG-eCall call flow: (1) IVS sends INVITE with MSD; (2) PSAP responds 200 OK with <ack> metadata/control block; (3) media streams start; (4) PSAP may send INFO with <request> for updated MSD; (5) IVS responds 200 OK; (6) IVS sends INFO with updated MSD; (7) BYE terminates. Absence of metadata/control in the final response indicates a non-NG-eCall leg.'
section: "9"
