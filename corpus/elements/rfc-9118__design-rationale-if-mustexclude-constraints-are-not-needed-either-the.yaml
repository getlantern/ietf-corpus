document: rfc-9118
kind: design-rationale
summary: If mustExclude constraints are not needed, either the EnhancedJWTClaimConstraints or the original JWTClaimConstraints extension may be used. The guidance recommends JWTClaimConstraints for broader compatibility until the enhanced extension is widely implemented, on the presumption that earlier-specified extensions gain wider implementation first.
