document: rfc-3840
kind: design-rationale
summary: The content negotiation framework from RFC 2533 is applied to SIP UAs by modeling a feature collection as an instantaneous modality — a snapshot of what the UA is doing at a given instant. This guides whether two properties should be separate feature tags (if they can be exhibited simultaneously) or values of the same tag (if they are mutually exclusive at any instant).
section: "4"
topics:
