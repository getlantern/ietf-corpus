document: rfc-4752
kind: state-machine
summary: 'The GSSAPI SASL authentication exchange proceeds: (1) client sends initial GSS token; (2) client and server exchange GSS_S_CONTINUE_NEEDED tokens until context established; (3) server sends GSS_Wrap''d 4-octet security layer offer; (4) client sends GSS_Wrap''d security layer selection plus authorization identity; (5) server verifies and authentication is complete.'
section: "3"
