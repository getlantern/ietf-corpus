document: rfc-9390
kind: normative-requirement
summary: When a group command partially succeeds, the Result-Code AVP SHOULD indicate DIAMETER_LIMITED_SUCCESS, and sessions for which the command failed MUST be identified by including their Session-Id in the Failed-AVP. The sender MUST fall back to single-session operation for those sessions and MUST remove them from all applicable session groups.
section: 4.4.3
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
