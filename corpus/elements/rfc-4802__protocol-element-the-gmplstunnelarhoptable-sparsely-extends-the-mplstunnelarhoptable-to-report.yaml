document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelARHopTable sparsely extends the mplsTunnelARHopTable to report the actual labels in use on each hop as reported by the signaling protocol after tunnel setup. Implementation is optional because not all GMPLS signaling protocols report actual route information. All objects are read-only.
