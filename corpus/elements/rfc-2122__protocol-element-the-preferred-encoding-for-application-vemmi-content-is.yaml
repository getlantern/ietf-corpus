document: rfc-2122
kind: protocol-element
summary: The preferred encoding for application/vemmi content is base64 because VEMMI uses a native 8-bit binary file format. However, VEMMI data may also be transmitted in 7-bit mode using VEMMI's own 7-bit encoding mechanisms.
