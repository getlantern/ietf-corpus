document: rfc-2863
kind: design-rationale
summary: Each sub-layer beneath the internetwork layer is represented as an individual conceptual row in the ifTable, with a new ifStackTable identifying superior/subordinate relationships via integer pointers. This design supports both upward and downward multiplexing and avoids requiring enumerated ifType values for each combination of sub-layers.
section: 3.1.1
topics:
    - snmp
