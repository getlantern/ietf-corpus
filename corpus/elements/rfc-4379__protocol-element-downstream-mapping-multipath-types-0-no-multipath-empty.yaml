summary: 'Downstream Mapping Multipath Types: 0=no multipath (empty), 2=IP address list, 4=IP address ranges (low/high pairs, non-overlapping, ascending), 8=bit-masked IP address set (base prefix + bitmask, max prefix length 27), 9=bit-masked label set (same encoding). IPv4 multipath addresses are drawn from 127/8; IPv6 from 0:0:0:0:0:FFFF:127/104.'
