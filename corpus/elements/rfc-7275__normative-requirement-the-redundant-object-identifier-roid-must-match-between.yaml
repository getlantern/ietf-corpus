document: rfc-7275
kind: normative-requirement
summary: The Redundant Object Identifier (ROID) MUST match between all RG members for the same protected object, providing a common implementation-agnostic handle for objects such as multi-chassis LAGs, pseudowires, or VLANs. The ROID value 0 is reserved.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
