document: rfc-8898
kind: normative-requirement
summary: If a proxy chooses to challenge a request and is willing to accept an access token, it MUST include a Proxy-Authenticate header field indicating a 'Bearer' scheme with an https URI to the AS. When validating, the proxy MUST successfully validate credentials from at least one Proxy-Authorization header field for its realm.
section: "2.3"
rfc2119_level: MUST
topics:
    - sip
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
