document: rfc-1483
kind: normative-requirement
summary: The Common PDU Header and Trailer of an encapsulated 802.6 frame MUST NOT be simply copied to the outgoing 802.6 subnetwork, because the encapsulated BEtag value may conflict with the previous BEtag value transmitted by that bridge.
section: "4.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
