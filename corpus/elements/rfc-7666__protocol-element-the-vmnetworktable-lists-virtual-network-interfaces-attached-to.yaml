document: rfc-7666
kind: protocol-element
summary: The vmNetworkTable lists virtual network interfaces attached to virtual machines, indexed by vmIndex and vmNetworkIndex. Each entry contains vmNetworkIfIndex (pointer into IF-MIB ifTable), vmNetworkParent (pointer to physical NIC in ifTable), vmNetworkModel (emulated driver name), and vmNetworkPhysAddress (MAC address).
