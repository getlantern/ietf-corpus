document: rfc-9329
kind: protocol-element
summary: IKE_SA_INIT packets sent on a TCP connection SHOULD include NAT_DETECTION_SOURCE_IP and NAT_DETECTION_DESTINATION_IP payloads using the applicable TCP ports in SHA-1 digest calculation. If a NAT is detected, no change should be made to encapsulation since TCP encapsulation inherently supports NAT traversal.
section: "6.5"
topics:
    - ipsec
    - vpn
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
