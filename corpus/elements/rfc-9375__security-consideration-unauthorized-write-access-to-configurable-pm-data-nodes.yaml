document: rfc-9375
kind: security-consideration
summary: Unauthorized write access to configurable PM data nodes (service-type, VPN identifier, VPN topology, node-type, VPN topology role, percentile settings, measurement interval, vpn-pm-type) can disable VPN PM, render data unusable, or degrade monitoring fidelity. These nodes require proper access control protection.
