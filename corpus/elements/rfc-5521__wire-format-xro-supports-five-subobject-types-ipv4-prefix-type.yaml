document: rfc-5521
kind: wire-format
summary: 'XRO supports five subobject types: IPv4 prefix (type 1, 8 bytes), IPv6 prefix (type 2, 20 bytes), Unnumbered Interface ID (type 4, 12 bytes with TE Router ID and Interface ID), Autonomous System Number (type 32, 4 bytes with 2-octet AS number), and SRLG (type 34, 8 bytes with 4-byte SRLG ID).'
