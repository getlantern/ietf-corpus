document: rfc-8551
kind: normative-requirement
summary: When ECDH ephemeral-static is used, the underlying encryption functions and key sizes for the key wrap and content-encryption algorithms MUST be the same (e.g., AES-128 key wrap with AES-128 content encryption). Both AES-128 and AES-256 key wrap algorithms MUST be supported when ECDH ephemeral-static is used.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
