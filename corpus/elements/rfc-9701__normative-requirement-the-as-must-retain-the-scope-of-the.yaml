document: rfc-9701
kind: normative-requirement
summary: The AS MUST retain the scope of the legal basis with the access token (e.g., in the scope value), MUST authenticate the RS, and MUST determine the data an RS is allowed to receive based on the RS's identity and suitable token data.
section: "9"
rfc2119_level: MUST
