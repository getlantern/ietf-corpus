document: rfc-5839
kind: interoperability-note
summary: Some B2BUA devices may be unaware of conditional notification and may treat a NOTIFY with suppressed body as an error or expect all SUBSCRIBEs to have an associated NOTIFY. If subscribers encounter such transient errors, they should disable the feature and fall back to normal subscription behavior.
section: "5.8"
topics:
    - sip
    - realtime
