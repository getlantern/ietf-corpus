document: rfc-7641
kind: wire-format
summary: The Observe Option value is encoded as an unsigned integer in network byte order using a variable number of bytes ('uint' option format per RFC 7252 Section 3.2), occupying 0–3 bytes. In notifications, the 24 least significant bits of a strictly increasing sequence number are placed in this field.
section: "2"
