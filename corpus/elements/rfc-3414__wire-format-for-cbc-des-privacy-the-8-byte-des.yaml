document: rfc-3414
kind: wire-format
summary: For CBC-DES privacy, the 8-byte DES key is taken from the first 8 octets of the localized privKey, and the 8-byte Initialization Vector is derived by XOR-ing the last 8 octets of the privKey with a 64-bit salt (constructed from snmpEngineBoots in the high 32 bits and a monotonically increasing 32-bit counter in the low 32 bits). The salt is placed in msgPrivacyParameters.
section: 8.1.1.1
topics:
    - snmp
    - security
    - crypto
