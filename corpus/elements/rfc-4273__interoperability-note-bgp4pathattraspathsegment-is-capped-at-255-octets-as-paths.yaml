document: rfc-4273
kind: interoperability-note
summary: bgp4PathAttrASPathSegment is capped at 255 octets; AS paths longer than 255 octets will be silently truncated in the MIB. Additionally, BGP Confederation segment types 3 and 4 appear in the field but are not described by this object's definition.
