document: rfc-8620
kind: normative-requirement
summary: 'If ''ifInState'' is supplied in a /set call, it MUST match current server state or the method returns ''stateMismatch''. Each record change is atomic: the server MUST NOT partially commit a single record''s update (e.g., apply some but not all patched properties).'
section: "5.3"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
