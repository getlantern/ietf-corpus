document: rfc-7260
kind: normative-requirement
summary: The 'OAM MIP entities desired' bit MUST NOT be set unless the 'OAM MEP entities desired' bit is also set. If MEP or MIP establishment is not supported at a node, an error MUST be generated ('OAM Problem/MEP establishment not supported' or 'MIP establishment not supported').
section: "4.1"
rfc2119_level: MUST NOT
topics:
