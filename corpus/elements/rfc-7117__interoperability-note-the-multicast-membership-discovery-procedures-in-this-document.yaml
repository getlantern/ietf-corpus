document: rfc-7117
kind: interoperability-note
summary: The multicast membership discovery procedures in this document do not apply when PIM is used as the CE-CE multicast routing protocol and PIM join suppression is not disabled on all CEs. In that scenario, PEs cannot reliably determine IP multicast membership, and procedures for this case are outside the scope of this document.
section: "3.3"
topics:
    - mpls
    - multicast
