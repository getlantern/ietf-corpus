document: rfc-6221
kind: security-consideration
summary: The hop-count-based determination of LDRA trustworthiness can be easily defeated by a rogue relay agent on the network-facing interface of the LDRA, since an attacker on that segment can inject arbitrary relay messages. All DHCPv6 relay agent security issues from RFC 3315 Section 23 apply to the LDRA.
section: "9"
topics:
    - security
    - ip
