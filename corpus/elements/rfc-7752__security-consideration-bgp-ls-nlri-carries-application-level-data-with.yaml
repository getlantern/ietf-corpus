document: rfc-7752
kind: security-consideration
summary: BGP-LS NLRI carries application-level data with no direct forwarding-state impact, but churn in this NLRI can still burden BGP infrastructure. Distribution via dedicated route reflectors is anticipated to provide isolation and fault containment between BGP-LS NLRI and regular BGP updates.
section: 6.1.1
topics:
    - bgp
    - routing
    - security
