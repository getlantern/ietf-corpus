document: rfc-8881
kind: protocol-element
summary: A client is identified by a 64-bit client ID assigned by the server, established via EXCHANGE_ID followed by CREATE_SESSION. Establishing a new incarnation's client ID immediately releases all locking state (byte-range locks, share reservations, layouts, delegations) from any prior incarnation.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
