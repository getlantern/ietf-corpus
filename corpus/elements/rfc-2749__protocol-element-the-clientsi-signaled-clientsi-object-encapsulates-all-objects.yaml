document: rfc-2749
kind: protocol-element
summary: The ClientSI (Signaled ClientSI) object encapsulates all objects received in an RSVP message and is sent from the PEP to the PDP. For the Resource-Allocation context in multicast, it specifically carries SESSION, STYLE, merged FLOWSPEC, FILTERSPEC list, and SCOPE rather than raw message objects.
