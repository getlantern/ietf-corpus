document: rfc-7519
kind: protocol-element
summary: The "jti" (JWT ID) claim provides a unique identifier for the JWT to prevent replay attacks. The value MUST be assigned such that accidental collision with another JWT is negligible; if multiple issuers are used, uniqueness across issuers MUST be ensured. Its value is a case-sensitive string. Use is OPTIONAL.
section: 4.1.7
topics:
    - jose
    - oauth
    - security
