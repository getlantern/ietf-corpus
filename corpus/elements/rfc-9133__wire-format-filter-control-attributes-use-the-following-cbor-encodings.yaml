document: rfc-9133
kind: wire-format
summary: 'Filter control attributes use the following CBOR encodings: ''activation-type'' is encoded with CBOR key 52 (CBOR major type 0, unsigned integer); ''ietf-dots-signal-control:acl-list'' is encoded with CBOR key 53 (CBOR major type 4, array). ''acl-name'' reuses CBOR key 23 (CBOR major type 3, text string) as defined in RFC 9132.'
section: 3.2.1
topics:
