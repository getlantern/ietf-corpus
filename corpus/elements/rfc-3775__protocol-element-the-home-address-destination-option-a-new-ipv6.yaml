document: rfc-3775
kind: protocol-element
summary: The Home Address destination option (a new IPv6 destination option) carries the mobile node's home address in packets sent from the care-of address, making care-of address use transparent to transport and higher layers. Its use is restricted to packets where the correspondent node has an existing Binding Cache entry for the home address.
section: "6.3"
topics:
    - ip
    - mobility
    - security
