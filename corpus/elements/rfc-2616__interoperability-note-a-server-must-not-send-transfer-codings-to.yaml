document: rfc-2616
kind: interoperability-note
summary: A server MUST NOT send transfer-codings to an HTTP/1.0 client. For HTTP/1.0 compatibility, applications SHOULD treat 'x-gzip' and 'x-compress' as equivalent to 'gzip' and 'compress' respectively. HTTP/1.1 requires more stringent compliance than HTTP/1.0 to ensure reliable feature implementation.
section: "3.6"
topics:
    - http
