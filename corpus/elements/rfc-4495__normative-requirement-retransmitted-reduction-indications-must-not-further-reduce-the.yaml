document: rfc-4495
kind: normative-requirement
summary: Retransmitted reduction indications MUST NOT further reduce the bandwidth of a reservation. Any additional reduction MUST be signaled in a new message to avoid compounding errors from duplicate messages.
section: "4"
rfc2119_level: MUST NOT
topics:
