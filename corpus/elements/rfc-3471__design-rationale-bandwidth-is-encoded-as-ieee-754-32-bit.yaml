summary: Bandwidth is encoded as IEEE 754 32-bit floating point in bytes per second to accommodate the wide dynamic range from DS0 (64 kbps) to OC-768 (39.8 Gbps) with a single uniform encoding, while discrete standard signal rates are enumerated as guidelines for non-packet LSPs.
