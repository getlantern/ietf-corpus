document: rfc-3850
kind: normative-requirement
summary: A receiving agent MUST be capable of verifying signatures on certificates and CRLs made with id-dsa-with-sha1, md5WithRSAEncryption, and sha1WithRSAEncryption with key sizes from 512 to 2048 bits. md2WithRSAEncryption MAY be supported.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
