document: rfc-9513
kind: wire-format
summary: The SRv6 LAN End.X SID sub-TLV (Type=32) extends the End.X SID format with a 4-octet Neighbor Router-ID field identifying the OSPFv3 Router-ID of the specific neighbor, enabling per-neighbor SID advertisement on broadcast/NBMA links.
