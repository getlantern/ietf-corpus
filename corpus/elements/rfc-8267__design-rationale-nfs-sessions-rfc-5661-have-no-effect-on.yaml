document: rfc-8267
kind: design-rationale
summary: NFS sessions (RFC 5661) have no effect on RPC-over-RDMA version 1 operation; there is no need to match session slot counts with RPC-over-RDMA credit counts. Transport errors during session use require slot recovery to prevent permanently unavailable slots.
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
