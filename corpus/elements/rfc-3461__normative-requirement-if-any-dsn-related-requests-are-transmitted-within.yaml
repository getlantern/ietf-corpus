document: rfc-3461
kind: normative-requirement
summary: If any DSN-related requests are transmitted within the message itself (e.g., in message headers) rather than via SMTP extensions, those requests MUST be removed from the message before it is transmitted via SMTP.
section: "5.3"
rfc2119_level: MUST
topics:
