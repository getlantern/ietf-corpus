document: rfc-6486
kind: design-rationale
summary: 'Manifests are modeled on X.509 CRLs because the threat models are analogous: detecting stale data and replay attacks. The manifest payload syntax differs from CRLs because RPKI repositories contain signed objects (e.g., ROAs) not covered by CRLs.'
