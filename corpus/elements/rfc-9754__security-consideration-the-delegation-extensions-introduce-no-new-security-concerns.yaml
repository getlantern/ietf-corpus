document: rfc-9754
kind: security-consideration
summary: The delegation extensions introduce no new security concerns. Other clients cannot directly query the delegating client's cached attributes; if a client reports false cached attribute data via CB_GETATTR, this is no worse than what was already possible via SETATTR.
section: "7"
topics:
    - security
