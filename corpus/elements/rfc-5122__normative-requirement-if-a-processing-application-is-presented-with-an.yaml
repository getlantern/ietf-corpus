document: rfc-5122
kind: normative-requirement
summary: If a processing application is presented with an XMPP URI rather than an XMPP IRI, it MUST first convert the URI into an IRI by following the procedure specified in Section 3.2 of RFC 3987.
section: 2.8.1
rfc2119_level: MUST
topics:
