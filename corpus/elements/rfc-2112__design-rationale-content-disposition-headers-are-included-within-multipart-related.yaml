document: rfc-2112
kind: design-rationale
summary: Content-Disposition headers are included within Multipart/Related entities to provide presentation information to User Agents that do not recognize Multipart/Related — they will treat the multipart as Multipart/Mixed and may find the Content-Disposition information useful. However, for aware UAs the disposition type is redundant or misleading.
section: "4"
topics:
