document: rfc-9149
kind: design-rationale
summary: The extension shifts ticket count determination from servers (which currently use hard-coded or application-specific logic) to clients, who have direct knowledge of their concurrency needs (e.g., parallel HTTP connections, Happy Eyeballs racing), thereby reducing ticket waste and avoiding reuse.
