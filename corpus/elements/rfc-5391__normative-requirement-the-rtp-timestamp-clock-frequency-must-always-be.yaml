document: rfc-5391
kind: normative-requirement
summary: The RTP timestamp clock frequency MUST always be 16 kHz regardless of whether the encoder/decoder is configured for 8-kHz or 16-kHz I/O. The timestamp increments by 80 per 5-ms frame.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
