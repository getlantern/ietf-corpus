document: rfc-9842
kind: normative-requirement
summary: When a client does not have a stored dictionary matching the request or chooses not to use one, the client MUST NOT send its dictionary-aware content encodings (dcb, dcz) in the 'Accept-Encoding' request header.
section: "6.1"
rfc2119_level: MUST NOT
