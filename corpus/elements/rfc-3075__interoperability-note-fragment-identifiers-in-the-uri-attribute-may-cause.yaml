document: rfc-3075
kind: interoperability-note
summary: Fragment identifiers in the URI attribute may cause interoperability failures if fragment processing is not performed in a standard way (e.g., by a proxy). The specification RECOMMENDS that URI attributes not include fragment identifiers and that such selection be expressed as an XPath Transform instead.
section: 4.3.3.2
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
