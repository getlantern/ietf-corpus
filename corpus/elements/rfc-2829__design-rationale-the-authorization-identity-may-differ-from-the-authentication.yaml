document: rfc-2829
kind: design-rationale
summary: The authorization identity may differ from the authentication identity, allowing proxy servers to authenticate with their own credentials while requesting access privileges of the identity they are proxying. The uAuthzId form allows backwards compatibility for clients not using DNs.
section: "3.4"
topics:
    - ldap
    - security
