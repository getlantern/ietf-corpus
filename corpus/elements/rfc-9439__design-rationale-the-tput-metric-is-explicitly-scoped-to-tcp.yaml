document: rfc-9439
kind: design-rationale
summary: The 'tput' metric is explicitly scoped to TCP bulk flows using congestion-control-conforming behavior (e.g., CUBIC per RFC 9438). Other transport-specific metrics (e.g., QUIC) are deferred until measurement methodology matures.
section: 5.1.3
topics:
