document: rfc-5491
kind: protocol-element
summary: A PIDF-LO document may contain an arbitrary number of <tuple>, <device>, and <person> elements, each holding a <status> element that may contain one or more <geopriv> children; each <geopriv> must contain at least <location-info> and <usage-rules>.
