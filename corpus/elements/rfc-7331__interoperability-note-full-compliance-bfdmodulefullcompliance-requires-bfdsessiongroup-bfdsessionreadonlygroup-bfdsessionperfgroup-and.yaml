document: rfc-7331
kind: interoperability-note
summary: Full compliance (bfdModuleFullCompliance) requires bfdSessionGroup, bfdSessionReadOnlyGroup, bfdSessionPerfGroup, and bfdNotificationGroup. The bfdSessionPerfHCGroup (Counter64 objects) is mandatory only for systems supporting Counter64. DNS address type (dns(16)) is not allowed; ipv4z(3) is not required.
