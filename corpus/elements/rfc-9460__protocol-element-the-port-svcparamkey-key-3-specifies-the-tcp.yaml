document: rfc-9460
kind: protocol-element
summary: 'The ''port'' SvcParamKey (key 3) specifies the TCP or UDP port for the alternative endpoint. Wire format: a 2-octet value in network byte order. If absent, clients SHALL use the authority endpoint''s port. The presentation value must not contain escape sequences.'
section: "7.2"
