document: rfc-3986
kind: wire-format
summary: 'The generic URI syntax is defined as: URI = scheme ":" hier-part [ "?" query ] [ "#" fragment ], where hier-part may be an authority-based path, an absolute path, a rootless path, or an empty path. Scheme and path are required; authority, query, and fragment are optional.'
