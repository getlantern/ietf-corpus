document: rfc-5340
kind: protocol-element
summary: 'LSA flooding scope is now explicitly encoded in the LS type field with three defined scopes: link-local (flooded only on the originating link, used by link-LSAs), area scope (flooded throughout a single OSPF area, used by router-LSAs, network-LSAs, inter-area-prefix-LSAs, inter-area-router-LSAs, intra-area-prefix-LSAs), and AS scope (flooded throughout the routing domain, used by AS-external-LSAs).'
section: "2.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
