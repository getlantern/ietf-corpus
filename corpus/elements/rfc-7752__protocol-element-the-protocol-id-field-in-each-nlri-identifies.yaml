document: rfc-7752
kind: protocol-element
summary: 'The Protocol-ID field in each NLRI identifies the source routing protocol: IS-IS Level 1 (1), IS-IS Level 2 (2), OSPFv2 (3), Direct (4), Static configuration (5), OSPFv3 (6). The 64-bit Identifier field distinguishes independent routing universes (instance-IDs), with value 0 reserved for the default Layer 3 topology.'
