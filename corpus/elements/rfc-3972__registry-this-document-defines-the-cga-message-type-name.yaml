document: rfc-3972
kind: registry
summary: This document defines the CGA Message Type name space of 128-bit unsigned integers, allocated on a First Come First Served basis. Requesters SHOULD generate values with a strong random-number generator; continuous ranges of at most 256 values may be requested if the 120 most significant bits are randomly generated. Values for private use MAY be self-assigned without IANA allocation.
section: "8"
topics:
