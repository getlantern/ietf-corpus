document: rfc-2002
kind: normative-requirement
summary: A home agent MUST be able to attract and intercept datagrams destined to the home address of any of its registered mobile nodes, using proxy ARP and gratuitous ARP mechanisms (Section 4.6) when the home agent is on the same link as the mobile node's home address.
section: "1.7"
rfc2119_level: MUST
topics:
    - ip
