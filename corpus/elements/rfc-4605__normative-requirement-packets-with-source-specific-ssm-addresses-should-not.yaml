document: rfc-4605
kind: normative-requirement
summary: Packets with source-specific (SSM) addresses SHOULD NOT be forwarded to interfaces with IGMPv2 or IGMPv1 subscriptions for those addresses, as IGMPv1/v2 cannot maintain SSM semantics.
section: "4.3"
rfc2119_level: SHOULD NOT
topics:
    - multicast
