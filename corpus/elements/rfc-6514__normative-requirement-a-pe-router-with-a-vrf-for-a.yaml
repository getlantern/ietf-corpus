document: rfc-6514
kind: normative-requirement
summary: A PE router with a VRF for a given MVPN MUST originate an Intra-AS I-PMSI A-D route and advertise it in IBGP, except when all connected sites are receiver-only and ingress replication is not used, or when all sites are sender-only with ingress replication.
section: 9.1.1
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
