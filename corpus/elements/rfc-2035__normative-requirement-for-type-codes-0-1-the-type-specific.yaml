document: rfc-2035
kind: normative-requirement
summary: For type codes 0/1, the Type specific field is unused and MUST be zero. For types 4/5, the Type specific field (TSPEC) carries the restart interval count (RCOUNT), with intermediate packets set to 254 and the final packet of a restart interval set to 255.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
