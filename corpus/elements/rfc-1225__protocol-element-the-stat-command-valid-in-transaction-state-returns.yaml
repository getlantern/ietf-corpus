document: rfc-1225
kind: protocol-element
summary: The STAT command, valid in TRANSACTION state, returns a 'drop listing' whose format MUST begin with the count of non-deleted messages followed by the total maildrop size in octets. The spec strongly discourages adding further information to the drop listing.
section: The TRANSACTION State
