document: rfc-8469
kind: normative-requirement
summary: Where ECMP is required and both ingress and egress PEs support ELI/EL and FAT PW, either method may be used. Using both on the same PW is not normally necessary and should be avoided unless circumstances require it.
section: "4"
rfc2119_level: RECOMMENDED
