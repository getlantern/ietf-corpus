document: rfc-9661
kind: design-rationale
summary: Script content must be uploaded before being referenced in SieveScript/set or SieveScript/validate calls. This two-phase upload-then-reference pattern follows the JMAP blob model and avoids embedding large binary content inside JSON API calls.
