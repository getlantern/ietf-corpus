document: rfc-4996
kind: normative-requirement
summary: A compressor MUST NOT assign either sequential (NBO) or sequential byte-swapped IP-ID behavior to tunneling (outer) IP headers; sequential IP-ID behavior may only be assigned to the innermost IP header, which is the only one with a sufficiently close correlation to the MSN.
section: 6.1.2
rfc2119_level: MUST NOT
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
