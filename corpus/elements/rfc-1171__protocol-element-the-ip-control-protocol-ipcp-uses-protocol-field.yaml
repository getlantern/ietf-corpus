document: rfc-1171
kind: protocol-element
summary: The IP Control Protocol (IPCP) uses Protocol field value 0x8021 and configures, enables, and disables IP on both ends of the link. IPCP is identical to LCP except it only uses Codes 1-7; other codes result in Code-Rejects. IPCP packets may not be exchanged until LCP has reached the Network-Layer Protocol Configuration Negotiation phase.
section: "5"
