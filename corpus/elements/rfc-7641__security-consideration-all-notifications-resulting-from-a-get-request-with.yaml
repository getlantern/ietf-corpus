document: rfc-7641
kind: security-consideration
summary: All notifications resulting from a GET request with an Observe Option over a DTLS-secured connection MUST be returned within the same DTLS epoch and connection as the original request. Stale state may be a security threat for sensitive resources, so clients must not use representations after Max-Age expires.
section: "7"
topics:
    - security
    - tls
