document: rfc-9294
kind: design-rationale
summary: The ASLA TLV format mirrors the corresponding ASLA sub-TLVs defined for OSPF (RFC 8920) and IS-IS (RFC 8919), maintaining consistency across the IGP-to-BGP-LS mapping. RSVP-TE and GMPLS applications continue to use existing top-level TLVs to preserve backward compatibility with deployed implementations.
section: "2"
topics:
