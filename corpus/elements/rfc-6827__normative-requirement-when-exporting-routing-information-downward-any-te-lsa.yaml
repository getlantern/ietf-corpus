document: rfc-6827
kind: normative-requirement
summary: When exporting routing information downward, any TE LSA tagged with an Inter-RA Export Upward sub-TLV MUST NOT be exported downward into the RA identified by the sub-TLV's RA ID, preventing re-introduction of routing information into the RA from which it was received.
section: 7.2.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
