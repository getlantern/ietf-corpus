document: rfc-4904
kind: normative-requirement
summary: A UAC initiating a call that supports this specification MUST include trunk group parameters in the Contact header URI (as a SIP translation of the tel URI). The Contact URI MUST be a sip or sips URI.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - voip
