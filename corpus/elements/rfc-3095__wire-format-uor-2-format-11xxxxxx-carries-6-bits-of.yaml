document: rfc-3095
kind: wire-format
summary: UOR-2 (format 11xxxxxx) carries 6 bits of RTP SN or TS scaled value in the first octet with an 8-bit CRC in the second octet. Extension headers 0, 1, 2, and 3 can be appended to carry additional bits of SN/TS/IP-ID or to update irregular fields.
section: 5.7.4
topics:
