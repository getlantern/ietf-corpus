document: rfc-2280
kind: interoperability-note
summary: RPSL is designed as a backward-compatible replacement for RIPE-181 (RFC-1786). The import/export/default policy model, peering specification, and object structure are derived from RIPE-181 but generalized. Implementors should consult RIPE-181 for background on underlying principles.
