document: rfc-2327
kind: normative-requirement
summary: A session description must contain either an email or phone field. A 'c=' (connection) field must be present in every media description or at session-level. There must be exactly one 's=' field per session description, and it must contain ISO 10646 characters.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
