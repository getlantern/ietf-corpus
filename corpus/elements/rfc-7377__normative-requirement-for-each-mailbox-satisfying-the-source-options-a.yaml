document: rfc-7377
kind: normative-requirement
summary: For each mailbox satisfying the source options, a single ESEARCH response MUST be returned if any messages in that mailbox match the search criteria; an ESEARCH response MUST NOT be returned for mailboxes that contain no matching messages.
section: "2.1"
rfc2119_level: MUST
topics:
