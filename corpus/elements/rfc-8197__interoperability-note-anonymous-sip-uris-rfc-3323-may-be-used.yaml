document: rfc-8197
kind: interoperability-note
summary: Anonymous SIP URIs (RFC 3323) may be used by multiple callers and are therefore unlikely to be appropriate targets for URI-specific call treatment when tallying 607 responses. SIP entities may need to canonicalize SIP URIs including telephone numbers.
section: "4"
topics:
