document: rfc-5944
kind: design-rationale
summary: The foreign agent care-of address mode is preferred over co-located because it allows many mobile nodes to share a single IP address at the foreign agent, reducing demand on the already-limited IPv4 address space. Co-located mode requires a pool of addresses per visited subnet.
section: "1.7"
topics:
    - mobility
    - ip
