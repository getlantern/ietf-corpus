document: rfc-7195
kind: normative-requirement
summary: If the offerer receives an incoming circuit-switched call while awaiting the answer, it MUST NOT accept the call before the answer has been received. If no answer arrives in an implementation-specific time, the offerer MUST modify or terminate the session.
section: 5.6.3
rfc2119_level: MUST
topics:
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
