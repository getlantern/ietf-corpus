document: rfc-4877
kind: interoperability-note
summary: When all tunneled traffic is protected by a single IPsec SA (selector set to 'any'), that SA MUST fulfill the confidentiality requirements for Return Routability messages. Special handling is needed so that a Binding Update updating the tunnel endpoint is not dropped while the SA endpoint is being changed.
section: "5"
topics:
    - ipsec
    - mobility
