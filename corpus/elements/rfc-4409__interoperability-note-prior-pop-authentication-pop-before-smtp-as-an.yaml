document: rfc-4409
kind: interoperability-note
summary: Prior POP authentication (POP-before-SMTP) as an authorization method imposes restrictions on both clients and servers, has a vulnerability window where unauthorized users can submit, and is substantially subject to IP spoofing — making it an unreliable authorization mechanism.
section: "3.3"
topics:
