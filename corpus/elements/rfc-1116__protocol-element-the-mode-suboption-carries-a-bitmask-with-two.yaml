document: rfc-1116
kind: protocol-element
summary: 'The MODE suboption carries a bitmask with two defined bits: EDIT (1) enables client-side line processing and sends only completed lines; TRAPSIG (2) causes the client to translate interrupts/signals to their Telnet equivalents (IP, BRK, AYT, ABORT, EOF, SUSP). A MODE_ACK bit (4) is used to acknowledge mode changes.'
section: "2.2"
topics:
