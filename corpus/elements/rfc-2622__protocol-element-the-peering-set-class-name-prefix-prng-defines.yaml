document: rfc-2622
kind: protocol-element
summary: The peering-set class (name prefix 'prng-') defines sets of peerings. A peering expression is '<as-expression> [<router-expr-1>] [at <router-expr-2>]' using AND/OR/EXCEPT on AS numbers, AS sets, inet-rtr names, and rtr-set names. EXCEPT has the same precedence as AND and is semantically equivalent to 'AND NOT'.
section: "5.6"
topics:
    - routing
    - bgp
