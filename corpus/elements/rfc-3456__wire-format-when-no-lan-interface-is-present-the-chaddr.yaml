document: rfc-3456
kind: wire-format
summary: When no LAN interface is present, the chaddr field SHOULD be constructed by concatenating x'4000' (indicating a locally administered unicast MAC address), the IPv4 address of the interface supplying connectivity, and an additional persistent octet (MAY represent an interface number).
section: "4.1"
