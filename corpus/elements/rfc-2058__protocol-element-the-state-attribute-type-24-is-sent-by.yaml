document: rfc-2058
kind: protocol-element
summary: The State attribute (Type 24) is sent by the server in an Access-Challenge or qualifying Access-Accept and MUST be returned unmodified by the NAS in the subsequent Access-Request. A packet may contain at most one State attribute; its contents are opaque to the client.
section: "5.24"
