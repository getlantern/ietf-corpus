document: rfc-8512
kind: protocol-element
summary: The port-set grouping offers a choice (default port-range) between a simple contiguous range (start-port-number, end-port-number) and the MAP-E PSID algorithm (psid-offset uint8 0..15, psid-len uint8 0..15 mandatory, psid uint16 mandatory) per RFC 7597. This grouping is reused for port-set-restrict and for internal/external port fields in mapping-entry.
section: "2.7"
topics:
