document: rfc-3664
kind: normative-requirement
summary: Implementations of AES-XCBC-PRF-128 MUST NOT perform the truncation step defined in section 4.3 of RFC 3566 (AES-XCBC-MAC); processing stops after section 4.2, yielding the full 128-bit output.
section: "2"
rfc2119_level: MUST NOT
topics:
    - crypto
    - ipsec
