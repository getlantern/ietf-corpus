document: rfc-4130
kind: normative-requirement
summary: The AS2-To and AS2-From headers MUST be present in all AS2 messages and AS2 MDNs (synchronous or asynchronous), except for asynchronous MDNs sent via SMTP. In a response or MDN, AS2-To MUST match the AS2-From of the corresponding request, and vice versa.
section: "6.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
