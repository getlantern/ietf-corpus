document: rfc-7597
kind: normative-requirement
summary: The NAT44 in the MAP CE MUST implement ICMP behavior conforming to RFC 5508. If a MAP CE receives an ICMP message with the ICMP Identifier field, the NAT44 MUST rewrite this field to a value assigned from the CE's port set.
section: "8.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - nat
