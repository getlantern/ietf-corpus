document: rfc-8853
kind: state-machine
summary: 'An initially paused simulcast stream transitions between paused and active states per RFC 7728 pause/resume signaling. States: paused (stream with ''~'' prefix or explicitly paused via TMMBR/TMMBN); active (resumed). Triggers: RTCP-based pause/resume messages; bitrate adaptation logic; negotiation of initially paused state in SDP.'
