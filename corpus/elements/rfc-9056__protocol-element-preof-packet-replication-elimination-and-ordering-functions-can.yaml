document: rfc-9056
kind: protocol-element
summary: PREOF (Packet Replication, Elimination, and Ordering Functions) can be provided at the MPLS service sub-layer for DetNet IP flows. The egress T-PE MAY be provisioned to apply PREOF on the incoming DetNet MPLS flow before treating packets as DetNet IP flows.
section: "5.1"
topics:
    - mpls
    - routing
