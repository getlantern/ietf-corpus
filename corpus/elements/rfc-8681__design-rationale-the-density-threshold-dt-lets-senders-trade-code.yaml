document: rfc-8681
kind: design-rationale
summary: 'The Density Threshold (DT) lets senders trade code density against computational cost: DT=15 guarantees all-nonzero coefficients (maximum protection) and is appropriate for small encoding windows, while smaller DT values reduce overhead for large windows. DT=15 with GF(2) degenerates to a plain XOR code producing only a single distinct repair symbol per window.'
section: "8.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
