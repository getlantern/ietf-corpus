document: rfc-5510
kind: protocol-element
summary: The generator matrix GM is constructed as (V_{k,k}^^-1) * V_{k,n}, where V_{k,n} is a Vandermonde matrix with entry {i,j} = alpha^^(i*j). This construction yields a systematic MDS code where the first k encoding symbols equal the k source symbols.
