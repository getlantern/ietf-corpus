document: rfc-2672
kind: interoperability-note
summary: DNS clients sending EDNS0 queries with Version 0 or non-extended queries are presumed not to understand DNAME semantics; servers SHOULD synthesize CNAME records for such clients. Behavior under EDNS versions greater than 0 is deferred to future specification.
section: "4.1"
topics:
    - dns
