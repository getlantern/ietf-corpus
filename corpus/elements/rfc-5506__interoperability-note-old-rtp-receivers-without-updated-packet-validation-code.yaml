document: rfc-5506
kind: interoperability-note
summary: Old RTP receivers without updated packet validation code will discard Reduced-Size RTCP, causing them to miss feedback messages. This can result in session partitioning where old receivers may send duplicate feedback for events already reported via Reduced-Size RTCP.
section: 3.4.2
topics:
    - rtp
    - realtime
