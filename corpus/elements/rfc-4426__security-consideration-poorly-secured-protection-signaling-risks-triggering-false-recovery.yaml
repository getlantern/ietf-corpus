document: rfc-4426
kind: security-consideration
summary: Poorly secured protection signaling risks triggering false recovery actions via spoofed or replayed Failure Indication messages, potentially causing de-synchronization between the control and data planes, misconnections, and diversion of traffic to unintended destinations, especially when Extra Traffic is involved.
