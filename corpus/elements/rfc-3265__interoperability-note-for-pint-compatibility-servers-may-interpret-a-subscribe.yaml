document: rfc-3265
kind: interoperability-note
summary: For PINT compatibility, servers MAY interpret a SUBSCRIBE with no 'Event' header as a request for PINT events. Servers that do not support PINT SHOULD return '489 Bad Event' for any SUBSCRIBE without an 'Event' header.
section: 3.3.8
topics:
