document: rfc-7844
kind: design-rationale
summary: The profiles derive DHCP identifiers from the current link-layer address so that DHCP identifiers evolve in synchrony with MAC address randomization. If DHCP identifiers remained stable while the link-layer address changed, the old and new addresses could be trivially correlated.
section: "2.2"
topics:
    - privacy
    - dns
