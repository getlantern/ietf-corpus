document: rfc-9709
kind: security-consideration
summary: If an attacker modifies the contentEncryptionAlgorithm.parameters field, the recipient derives a different CEK', preventing decryption but not assisting the attacker in recovering plaintext. The AlgorithmIdentifier binding thus defeats both OID-manipulation and parameter-manipulation attacks.
section: "6"
topics:
