summary: 'The SPB-B-VID sub-TLV (type 6, carried in IIH MT-Port-Cap TLV) advertises ECT-ALGORITHM to Base VID mappings as 6-byte tuples each containing a 32-bit ECT-ALGORITHM, 12-bit Base VID, Use-Flag (U), and mode bit (M: SPBM=1, SPBV=0).'
