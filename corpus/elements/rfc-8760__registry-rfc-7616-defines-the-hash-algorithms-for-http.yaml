document: rfc-8760
kind: registry
summary: RFC 7616 defines the 'Hash Algorithms for HTTP Digest Authentication' IANA registry. This document specifies that algorithms defined in that registry may be used in SIP digest authentication, extending SIP beyond the single MD5 algorithm specified in RFC 3261.
