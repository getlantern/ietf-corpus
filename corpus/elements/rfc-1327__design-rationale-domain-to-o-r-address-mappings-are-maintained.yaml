document: rfc-1327
kind: design-rationale
summary: 'Domain-to-O/R-Address mappings are maintained rather than relying solely on subdomains for three reasons: as shorthand to avoid redundant X.400 information (e.g., a single ADMD per country), to handle attribute values that do not fit domain syntax, and to handle missing elements in the address hierarchy.'
section: 4.3.1
topics:
