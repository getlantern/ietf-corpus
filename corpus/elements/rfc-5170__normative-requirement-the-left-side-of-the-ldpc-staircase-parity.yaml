document: rfc-5170
kind: normative-requirement
summary: The left side of the LDPC-Staircase parity check matrix MUST be generated using the specified left_matrix_init() function, which places N1 ones per column with a homogeneous distribution, adding extra bits to ensure no row has fewer than two ones.
section: "6.2"
rfc2119_level: MUST
