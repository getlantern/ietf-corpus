document: rfc-5196
kind: protocol-element
summary: The <type> element indicates a MIME media content type supported by the service, as defined in RFC 2913. It is a string type that MUST be of the form 'type/subtype', where type and subtype are defined by the MIME specification (RFC 2045). Only lowercase letters SHOULD be used.
section: 3.2.9
rfc2119_level: MUST
topics:
    - sip
    - realtime
