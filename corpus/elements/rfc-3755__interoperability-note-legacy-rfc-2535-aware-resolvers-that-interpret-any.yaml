document: rfc-3755
kind: interoperability-note
summary: Legacy RFC 2535-aware resolvers that interpret any answer containing an NXT record as a proof of non-existence will fail to resolve unsecure delegations when querying DS-aware authoritative servers, because DS-aware servers include NXT/SIG(NXT) in unsecure referrals. This is the core incompatibility motivating the type code changes.
section: "1.2"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
