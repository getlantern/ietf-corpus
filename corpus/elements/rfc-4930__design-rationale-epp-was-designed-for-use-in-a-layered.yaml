document: rfc-4930
kind: design-rationale
summary: EPP was designed for use in a layered protocol environment because it is intended for diverse operating environments where transport and security requirements vary greatly, and a single transport or security specification cannot meet all operators' needs. Transport and security bindings are explicitly out of scope.
section: "1"
