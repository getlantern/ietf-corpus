document: rfc-8876
kind: normative-requirement
summary: An AlertMsg-Error header field MUST be included in any 425 response. A 425 response MUST NOT be sent when the request lacks CAP data, and a 425 response MUST NOT terminate an existing dialog.
section: "5.1"
rfc2119_level: MUST
topics:
