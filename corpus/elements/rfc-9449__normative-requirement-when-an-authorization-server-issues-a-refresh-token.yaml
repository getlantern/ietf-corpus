document: rfc-9449
kind: normative-requirement
summary: When an authorization server issues a refresh token to a public client that presents a valid DPoP proof, the refresh token MUST be bound to the respective public key. The binding MUST be validated when the refresh token is later used.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
