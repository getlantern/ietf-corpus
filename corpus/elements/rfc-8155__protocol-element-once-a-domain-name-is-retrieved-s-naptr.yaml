document: rfc-8155
kind: protocol-element
summary: Once a domain name is retrieved, S-NAPTR resolution per RFC 5928 is performed using the 'RELAY' application service tag to locate the authoritative TURN server. If no TURN-specific S-NAPTR records exist, discovery fails for that domain.
section: "4.2"
topics:
