summary: WOFF 2.0 is an improvement on WOFF 1.0 but the two formats have different Internet Media Types and different @font-face format identifiers ('woff' vs 'woff2'), and they may be used in parallel. WOFF 2.0 fragment identifiers follow Section 4.2.
