document: rfc-2056
kind: normative-requirement
summary: If one or more record syntaxes (rs) are specified, the client SHOULD select one (preferably the first in the list that it supports) and use it as the value of PreferredRecordSyntax in a Search or Present request. If rs is not specified, the choice is left to the client.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
