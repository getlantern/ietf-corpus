document: rfc-9051
kind: interoperability-note
summary: IMAP4rev2 supports 63-bit body part and message sizes. Servers that support large message sizes must use the extended BODYSTRUCTURE syntax described in Appendix D; clients that do not support 63-bit sizes may misinterpret very large size values.
section: D
