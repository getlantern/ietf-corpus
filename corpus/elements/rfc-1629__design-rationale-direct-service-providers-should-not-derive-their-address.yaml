document: rfc-1629
kind: design-rationale
summary: Direct service providers should not derive their address space from indirect providers (backbones), because the relationship between direct and indirect providers is inherently independent — direct providers may switch backbones — and the routing data abstraction benefit is small given the current order-of-magnitude count of direct providers.
section: 5.3.2
topics:
    - routing
