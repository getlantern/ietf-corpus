document: rfc-4171
kind: interoperability-note
summary: NAT boundaries cause IP address information registered in the iSNS database to be invalid when interpreted in a different addressing domain. Recommended workarounds include using DNS FQDNs stored in the Entity Identifier field instead of nominal IP addresses, or deploying local iSNS servers inside each NAT domain.
section: "2.6"
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
