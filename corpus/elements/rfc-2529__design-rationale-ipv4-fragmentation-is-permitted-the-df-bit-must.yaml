document: rfc-2529
kind: design-rationale
summary: IPv4 fragmentation is permitted (the DF bit must not be set) because, while undesirable for performance, it is not disastrous and avoids black-holing packets when an intermediate IPv4 subnet has a smaller MTU than the 6over4 default of 1480 bytes.
section: "2"
