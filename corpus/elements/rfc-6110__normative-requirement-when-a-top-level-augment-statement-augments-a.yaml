document: rfc-6110
kind: normative-requirement
summary: When a top-level 'augment' statement augments a YANG module that is not processed within the same mapping session, the 'augment' statement MUST be ignored. If the augmented module is co-processed, the augment contents are added to the foreign module's schema fragment with the augmenting module's namespace.
section: "10.3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
