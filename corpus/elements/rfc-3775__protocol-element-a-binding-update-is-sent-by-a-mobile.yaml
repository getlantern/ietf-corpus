document: rfc-3775
kind: protocol-element
summary: A Binding Update is sent by a mobile node to notify a correspondent node or home agent of its current care-of address. Home registrations are protected by IPsec; correspondent registrations are authorized by a Binding Authorization Data option keyed with Kbm derived from the return routability procedure.
section: 6.1.7
topics:
    - ip
    - mobility
    - security
