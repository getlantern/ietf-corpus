document: rfc-8370
kind: normative-requirement
summary: An implementation supporting RI-RSVP or Per-Peer Flow Control MUST indicate support for RSVP Refresh Overhead Reduction extensions as specified in RFC 2961, support receipt of all RFC 2961 messages, and initiate all RFC 2961 mechanisms by default.
