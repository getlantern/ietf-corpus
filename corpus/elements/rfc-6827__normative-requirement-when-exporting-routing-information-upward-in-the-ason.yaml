document: rfc-6827
kind: normative-requirement
summary: When exporting routing information upward in the ASON hierarchy, any TE LSA tagged with an Inter-RA Export Downward sub-TLV MUST NOT be re-exported upward, preventing information from being re-introduced into the level from which it originated.
section: 7.2.2
rfc2119_level: MUST NOT
topics:
    - routing
