document: rfc-5939
kind: normative-requirement
summary: Once the offerer receives an answer indicating the selected configuration, incoming media MUST be processed in accordance with that actual selected configuration. Before the answer is received, media received per a potential configuration MAY be discarded.
section: 3.6.1
rfc2119_level: MUST
topics:
    - realtime
