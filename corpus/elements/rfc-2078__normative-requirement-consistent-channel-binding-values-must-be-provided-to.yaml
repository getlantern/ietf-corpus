document: rfc-2078
kind: normative-requirement
summary: Consistent channel binding values must be provided to both GSS_Init_sec_context() by the initiator and GSS_Accept_sec_context() by the target, in order for both peers' GSS-API mechanisms to validate that received tokens possess correct channel-related characteristics.
section: 1.1.6
rfc2119_level: MUST
topics:
    - security
