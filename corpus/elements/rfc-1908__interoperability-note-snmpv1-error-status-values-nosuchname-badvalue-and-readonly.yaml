document: rfc-1908
kind: interoperability-note
summary: SNMPv1 error-status values 'noSuchName', 'badValue', and 'readOnly' are preserved unmodified in proxy responses so the SNMPv2 manager can interpret them correctly, even though a native SNMPv2 entity would never generate these values.
section: 3.1.2
