document: rfc-2421
kind: normative-requirement
summary: The Content-Disposition header MUST be present on each Audio/32KADPCM body part to allow parsable identification; the audio contents must always be of type 'inline'. A 'voice' disposition parameter with defined values (Voice-Message, Originator-Spoken-Name, Spoken-Subject, etc.) is used to distinguish audio content types.
section: 4.3.4.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
