document: rfc-7466
kind: normative-requirement
summary: In OLSRv2 Section 17.6 (MPR recalculation triggers), 2-Hop Tuples with N2_lost=true MUST NOT trigger MPR recalculation; only tuples with N2_lost=false and valid metrics (N2_out_metric or N2_in_metric != UNKNOWN_METRIC) are considered, along with changes to N2_lost itself.
section: "5"
rfc2119_level: MUST
topics:
    - routing
