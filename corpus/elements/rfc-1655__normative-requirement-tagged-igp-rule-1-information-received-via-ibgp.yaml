document: rfc-1655
kind: normative-requirement
summary: 'Tagged IGP Rule 1: Information received via iBGP declaring a network unreachable must immediately be propagated to all External BGP neighbors. Tagged IGP Rule 2: Information about a reachable network X received via iBGP cannot be propagated to any eBGP neighbor unless the border gateway has an IGP route to X with identical BGP and IGP tags.'
section: A.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
