document: rfc-4209
kind: protocol-element
summary: The LINK_GROUP CHANNEL_STATUS object (Class = 13, C-Type = 4) reports channel status for all data links in a Link Group using one 32-bit Link Group ID and one 32-bit Channel Status field (with A and D bits) per group entry. It is non-negotiable.
section: 2.4.1
topics:
