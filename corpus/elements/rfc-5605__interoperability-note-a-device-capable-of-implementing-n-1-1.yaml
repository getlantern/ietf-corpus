document: rfc-5605
kind: interoperability-note
summary: A device capable of implementing N:1, 1:1, and transparent cell mode may use the Nto1 tables for all modes. In that case, creating an entry for 1:1 or transparent mode only in pwAtmInboundNto1Table will automatically create the corresponding entry in pwAtmOutboundNto1Table.
section: "9"
topics:
