document: rfc-8050
kind: protocol-element
summary: 'Four new BGP4MP/BGP4MP_ET subtypes are defined: BGP4MP_MESSAGE_ADDPATH (8), BGP4MP_MESSAGE_AS4_ADDPATH (9), BGP4MP_MESSAGE_LOCAL_ADDPATH (10), and BGP4MP_MESSAGE_AS4_LOCAL_ADDPATH (11). Their fields are identical to the non-additional-path equivalents in RFC 6396 Section 4.4, and the entire BGP message is encapsulated in the BGP message field.'
section: "3"
