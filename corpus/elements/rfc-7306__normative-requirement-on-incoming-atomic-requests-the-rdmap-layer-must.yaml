document: rfc-7306
kind: normative-requirement
summary: On incoming Atomic requests, the RDMAP layer MUST validate that the Remote Peer's Tagged ULP Buffer address is 64-bit aligned; on failure, a Terminate Message indicating RDMA Layer Remote Operation Error with Error Code 'Catastrophic error, localized to RDMAP Stream' MUST be generated.
section: "8.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
