document: rfc-6786
kind: design-rationale
summary: Two directional keys (PANA_PAC_ENCR_KEY for PaC→PAA and PANA_PAA_ENCR_KEY for PAA→PaC) are defined separately rather than using a single shared key. This prevents replay across directions and follows standard bidirectional key separation practice.
