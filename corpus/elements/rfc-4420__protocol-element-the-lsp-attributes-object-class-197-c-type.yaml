document: rfc-4420
kind: protocol-element
summary: The LSP_ATTRIBUTES object (class 197, C-Type 1) carries Attributes TLVs in RSVP-TE Path and Resv messages. Its C-Num value (form 11bbbbbb) ensures that LSRs not recognizing the object pass it on transparently without rejecting the message.
