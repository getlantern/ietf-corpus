document: rfc-8005
kind: normative-requirement
summary: When the number of seconds that have passed since a HIP RR was retrieved exceeds the record's TTL, the record MUST be considered no longer valid and deleted. If the record is needed to initiate communication, a new query MUST be made to retrieve a fresh copy.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
