document: rfc-4130
kind: protocol-element
summary: 'The AS2-Version header indicates the version of the specification implemented. All implementations MUST interpret versions ''1.0 through 1.9'' as implementing this specification. Receiving systems MUST NOT fail due to the absence of this header. AS2-Version: 1.1 designates support for compression per RFC 3274.'
section: "6.1"
topics:
    - http
