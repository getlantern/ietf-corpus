document: rfc-6313
kind: protocol-element
summary: The subTemplateMultiList abstract data type represents a list of zero or more Data Records where each top-level element may correspond to a different Template. Each element carries its own Template ID and Data Records Length, consistent with the IPFIX Set Header format.
