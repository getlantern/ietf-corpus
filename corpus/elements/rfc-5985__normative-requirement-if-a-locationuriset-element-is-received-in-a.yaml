document: rfc-5985
kind: normative-requirement
summary: If a 'locationUriSet' element is received in a 'locationResponse' message, it MUST contain an 'expires' attribute. The 'expires' attribute is RECOMMENDED not to exceed 24 hours and SHOULD be a minimum of 30 minutes.
section: "6.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
