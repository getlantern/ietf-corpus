document: rfc-8503
kind: protocol-element
summary: mvpnAdvtStatsTable tracks per-MVPN, per-peer-PE advertisement statistics indexed by VRF name, advertisement type (intraAsIpmsi, interAsIpmsi, sPmsi), peer address type, and peer address. Counters include sent, received, received-with-error, malformed tunnel type, and malformed tunnel identifier, with a discontinuity timestamp.
