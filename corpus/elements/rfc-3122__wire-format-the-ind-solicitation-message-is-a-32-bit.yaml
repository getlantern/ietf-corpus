summary: The IND Solicitation message is a 32-bit-aligned ICMP message with Type (8 bits), Code (8 bits, must be 0), Checksum (16 bits), and a 32-bit Reserved field (must be zero), followed by options. Minimum ICMP length is 24 octets.
