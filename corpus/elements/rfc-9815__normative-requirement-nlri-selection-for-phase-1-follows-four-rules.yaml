document: rfc-9815
kind: normative-requirement
summary: 'NLRI selection for Phase 1 follows four rules in priority order: (1) self-originated NLRIs from directly connected peers are preferred; (2) a peer''s NLRI always replaces the same peer''s prior NLRI; (3) higher Sequence Number is preferred; (4) numerically larger BGP Identifier is preferred.'
section: "6.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
