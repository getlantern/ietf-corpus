document: rfc-9176
kind: normative-requirement
summary: RDs implementing this specification MUST support the application/link-format content format (ct=40). Additional content formats MAY be supported, but SHOULD be able to express all information expressible in link format.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
