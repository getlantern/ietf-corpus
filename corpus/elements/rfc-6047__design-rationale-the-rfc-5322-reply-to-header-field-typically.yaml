document: rfc-6047
kind: design-rationale
summary: The RFC 5322 'Reply-To' header field typically contains the originator's address but cannot be relied upon, because the MIME sender may not be the scheduling message originator and the MUA may not enforce iMIP semantics. Therefore, ORGANIZER/ATTENDEE must be determined from the iCalendar object itself.
section: "2"
