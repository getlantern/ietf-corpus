document: rfc-7988
kind: design-rationale
summary: A single unicast tunnel between two nodes (e.g., an LDP MP2P LSP or RSVP-TE P2P LSP) may carry traffic for multiple IR P-tunnels simultaneously, as well as unicast traffic. The P-tunnel label at the top of the label stack is the sole mechanism by which a receiving child node distinguishes which IR P-tunnel a packet belongs to.
section: "2"
topics:
