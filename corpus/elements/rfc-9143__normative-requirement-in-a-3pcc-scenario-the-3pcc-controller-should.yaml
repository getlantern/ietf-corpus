document: rfc-9143
kind: normative-requirement
summary: In a 3PCC scenario, the 3PCC controller SHOULD rewrite a subsequent BUNDLE offer into a valid initial BUNDLE offer before forwarding it to a UA that is not part of an ongoing SIP session, because initial and subsequent BUNDLE offers are constructed using different rules.
section: "7.6"
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
    - sip
