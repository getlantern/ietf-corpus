document: rfc-8167
kind: security-consideration
summary: RPC security is handled at the RPC layer above the transport layer where RPC-over-RDMA operates. Reverse-direction operations use an authentication mechanism and credentials independent of forward-direction operation, but otherwise operate in the same fashion as described in RFC 8166 Section 8.2.
section: "8"
topics:
