document: rfc-7208
kind: normative-requirement
summary: The 'ptr' mechanism SHOULD NOT be published due to slowness, unreliability under DNS errors, and burden on .arpa servers; however, compliant check_host() implementations MUST support it because it remains part of the protocol.
