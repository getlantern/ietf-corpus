document: rfc-6728
kind: protocol-element
summary: The SctpExporter class configures SCTP export with timedReliability (PR-SCTP lifetime in milliseconds for Data-Set-only messages; 0 forces fully reliable transport), optional DTLS via TransportLayerSecurity, rateLimit, and sendBufferSize. Default destination ports are 4739 (without TLS) and 4740 (with TLS/DTLS).
