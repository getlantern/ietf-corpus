document: rfc-4960
kind: normative-requirement
summary: All TSN arithmetic MUST be performed modulo 2^32 using Serial Number Arithmetic as per RFC 1982 (SERIAL_BITS=32). An endpoint SHOULD NOT transmit a DATA chunk with a TSN more than 2^31-1 above the beginning TSN of its current send window.
section: "1.6"
rfc2119_level: SHOULD
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
