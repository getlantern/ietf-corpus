document: rfc-5061
kind: normative-requirement
summary: ASCONF and ASCONF-ACK chunks MUST be sent in an authenticated manner using the mechanism defined in RFC 4895 (SCTP-AUTH). If either chunk is received unauthenticated, it MUST be silently discarded.
section: 4.1.1
rfc2119_level: MUST
topics:
    - sctp
    - security
    - crypto
