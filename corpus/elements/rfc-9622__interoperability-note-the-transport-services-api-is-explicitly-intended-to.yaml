document: rfc-9622
kind: interoperability-note
summary: The Transport Services API is explicitly intended to replace the BSD Socket API as the common transport interface. Implementations have significant freedom in presenting the API to programmers but SHOULD use the names assigned in this document, subject to language typographic conventions, to maintain consistency across implementations.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
