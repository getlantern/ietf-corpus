document: rfc-6737
kind: interoperability-note
summary: A Diameter node must cache the supported applications of its peers in order to ensure that unrecognized commands and/or AVPs are not unnecessarily sent to a peer, as a node only issues a command to peers that have advertised support for the application defining that command.
section: "4"
topics:
    - diameter
