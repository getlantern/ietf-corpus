document: rfc-9906
kind: normative-requirement
summary: GOST R 34.10-2001 (ECC-GOST) MUST NOT be used when creating DNSKEY and RRSIG records. Validating resolvers MUST treat RRSIG records created from DNSKEY records using these algorithms as unsupported algorithms.
section: "2"
rfc2119_level: MUST NOT
topics:
