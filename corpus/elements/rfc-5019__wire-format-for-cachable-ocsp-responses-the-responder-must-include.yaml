document: rfc-5019
kind: wire-format
summary: 'For cachable OCSP responses, the responder MUST include HTTP headers: content-type (application/ocsp-response), content-length, last-modified (equal to thisUpdate), ETag (RECOMMENDED as SHA1 hex of OCSPResponse), expires (equal to nextUpdate), cache-control (max-age, public, no-transform, must-revalidate), and date.'
section: "5"
topics:
