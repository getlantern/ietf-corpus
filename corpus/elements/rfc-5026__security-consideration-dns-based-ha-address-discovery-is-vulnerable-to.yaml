document: rfc-5026
kind: security-consideration
summary: DNS-based HA address discovery is vulnerable to pharming attacks (bogus DNS server returning bogus HA address), but this risk is mitigated because the Mobile Node must complete an IKEv2 exchange with a valid certificate before establishing Mobile IPv6 service.
