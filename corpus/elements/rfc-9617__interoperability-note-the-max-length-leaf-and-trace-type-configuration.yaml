kind: interoperability-note
summary: The 'max-length' leaf and trace-type configuration are conditional on 'action-encapsulate' via YANG 'when' expressions, ensuring that transit and decapsulation nodes do not configure parameters that are only meaningful at the ingress/encapsulation node.
