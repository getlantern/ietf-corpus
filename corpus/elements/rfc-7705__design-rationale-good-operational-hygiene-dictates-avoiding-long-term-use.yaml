document: rfc-7705
kind: design-rationale
summary: Good operational hygiene dictates avoiding long-term use of 'Internal BGP AS Migration' to maintain operational simplicity and reduce reliance on non-standard behavior during ongoing software and configuration lifecycle management. The iBGP migration can be completed in days to months since all routers are under a single administrative entity.
