document: rfc-8941
kind: design-rationale
summary: 'Strict parsing and serialization are intentional features: the only error handling defined is to fail the operation altogether. Being more tolerant of input would create pressure on other implementations to implement similar but subtly different workarounds, harming interoperability and potentially introducing security issues.'
section: "1.1"
topics:
    - http
    - security
