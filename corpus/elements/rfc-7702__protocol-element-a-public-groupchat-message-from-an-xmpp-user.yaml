document: rfc-7702
kind: protocol-element
summary: A public groupchat message from an XMPP user is sent as a message of type 'groupchat' to the room JID and translated by the gateway into an MSRP SEND request with a message/cpim Content-Type wrapper. The gateway must also reflect the message back to the XMPP sender, as required by XEP-0045 for moderated rooms.
section: 5.5.1
topics:
    - sip
    - realtime
