document: rfc-3703
kind: protocol-element
summary: pcimConditionAuxClass (OID 1.3.6.1.1.6.1.11) is an auxiliary class rooted at 'top' that introduces the semantics of being a policy condition. Subclasses of this class represent actual conditions and are attached to pcimRuleConditionAssociation (rule-specific) or pcimPolicyInstance (reusable).
section: "5.7"
