document: rfc-859
kind: normative-requirement
summary: Only the sender of DO STATUS may send solicitation requests (IAC SB STATUS SEND IAC SE). Only the sender of WILL STATUS may transmit actual status information (IAC SB STATUS IS ... IAC SE).
section: "5"
rfc2119_level: MUST
