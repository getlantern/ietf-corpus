summary: The selective forwarding and tunnel segmentation procedures specified in this document are based on existing procedures from RFC 6513, RFC 6514, RFC 7117, and RFC 7524. When applied to EVPNs, they do not introduce new security concerns beyond those already discussed in those references or in RFC 7432.
