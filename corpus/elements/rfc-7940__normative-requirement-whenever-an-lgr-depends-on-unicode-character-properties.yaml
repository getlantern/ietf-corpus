document: rfc-7940
kind: normative-requirement
summary: Whenever an LGR depends on Unicode character properties, the unicode-version used in creating the LGR MUST be listed. If software does not have access to character property data of the requisite version, it MUST NOT perform any whole-label evaluation relying on Unicode character properties.
section: 4.3.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
