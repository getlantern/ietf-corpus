summary: 'Section 7.3 defines two new flag bits in the Interested VLANs and Interested Labels sub-TLVs: PUL (Pull Directory flag, set to 1 to advertise Pull Directory service) and NOD (No Data flag, set to 1 to suppress receipt of multi-destination TRILL Data packets in the Data Label).'
