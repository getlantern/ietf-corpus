document: rfc-8024
kind: wire-format
summary: PON Configuration TLV (Type=0x200F) is sent in the RG Application Data message to announce OLT system parameters. It contains an 8-octet System ID (chassis MAC address, with 6-octet IDs zero-padded to 8 octets), a 2-octet System Priority, and a 2-octet Port ID.
