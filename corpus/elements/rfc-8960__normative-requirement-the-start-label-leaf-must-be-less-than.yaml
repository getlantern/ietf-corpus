document: rfc-8960
kind: normative-requirement
summary: The 'start-label' leaf must be less than or equal to 'end-label', enforced by a YANG must constraint with error-message. Conversely, 'end-label' must be greater than or equal to 'start-label'. This ensures label block ranges are valid.
