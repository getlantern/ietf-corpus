document: rfc-8584
kind: protocol-element
summary: The AC-Influenced DF Election (AC-DF) capability (Bitmap Bit 1) modifies the DF election by pruning from the candidate PE list any PE for which the Ethernet A-D per EVI route for the <ES, Ethernet Tag> has been withdrawn, indicating that PE's ACS is DOWN for that BD. A PE's Ethernet A-D per ES route withdrawal also removes it from the ES candidate list.
section: "4"
topics:
