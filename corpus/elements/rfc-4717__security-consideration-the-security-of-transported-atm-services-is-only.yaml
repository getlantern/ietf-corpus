document: rfc-4717
kind: security-consideration
summary: The security of transported ATM services is only as good as the security of the PSN; this may be less rigorous than native ATM. The document specifies only encapsulations, not the PSN transport protocols, which carry their own security considerations (see RFC 4447, RFC 3985).
section: "16"
topics:
