document: rfc-6106
kind: protocol-element
summary: The DNS Search List (DNSSL) option is a new IPv6 Neighbor Discovery option that carries one or more DNS suffix domain names used by hosts when performing DNS queries for short, unqualified domain names. All names share a single Lifetime value.
