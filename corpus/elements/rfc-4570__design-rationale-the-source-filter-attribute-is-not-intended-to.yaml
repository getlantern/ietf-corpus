document: rfc-4570
kind: design-rationale
summary: The 'source-filter' attribute is not intended to be used as an 'offer' in SDP offer-answer exchanges because sets of source addresses do not represent capabilities or limitations of the offerer, and the offerer generally has no a priori knowledge of which IP source address(es) will appear in an answer.
section: "3.3"
topics:
    - realtime
    - sip
