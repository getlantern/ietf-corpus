document: rfc-8956
kind: normative-requirement
summary: Implementations wishing to exchange IPv6 Flow Specifications MUST use BGP's Capability Advertisement facility to exchange the Multiprotocol Extension Capability Code (Code 1). The (AFI, SAFI) pair MUST be (AFI=2, SAFI=133) for IPv6 Flow Specification rules and (AFI=2, SAFI=134) for L3VPN rules.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
