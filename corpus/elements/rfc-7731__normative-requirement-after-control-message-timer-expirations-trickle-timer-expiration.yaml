document: rfc-7731
kind: normative-requirement
summary: After CONTROL_MESSAGE_TIMER_EXPIRATIONS Trickle timer expiration events, the MPL Forwarder MUST disable the MPL Control Message Trickle timer. When CONTROL_MESSAGE_TIMER_EXPIRATIONS is 0, the forwarder does not execute the Trickle algorithm and does not transmit MPL Control Messages.
section: "10.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
