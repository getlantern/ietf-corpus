document: rfc-4568
kind: normative-requirement
summary: The tag MUST be unique among all crypto attributes for a given media line, and leading zeroes MUST NOT be used. In the offer/answer model, the tag is a negotiated parameter used to identify which offered crypto attribute was accepted.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
    - security
