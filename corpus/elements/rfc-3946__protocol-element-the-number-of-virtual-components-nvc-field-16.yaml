document: rfc-3946
kind: protocol-element
summary: The Number of Virtual Components (NVC) field (16 bits) indicates the number of signals to be virtually concatenated. These signals are all of the same Elementary Signal type (VT1.5_SPE/VC-11, VT2_SPE/VC-12, VT3_SPE, VT6_SPE/VC-2, STS-1_SPE/VC-3, or STS-3c_SPE/VC-4). A value of 0 means no virtual concatenation is requested.
section: "2.1"
topics:
    - mpls
    - routing
