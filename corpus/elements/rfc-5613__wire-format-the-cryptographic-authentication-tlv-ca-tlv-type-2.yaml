document: rfc-5613
kind: wire-format
summary: The Cryptographic Authentication TLV (CA-TLV, Type=2) for OSPFv2 contains a 32-bit Sequence Number followed by an AuthData field holding the message digest of the LLS block up to (but not including) the CA-TLV AuthData. The Length field covers 4 bytes for the Sequence Number plus the digest length.
section: "2.5"
topics:
