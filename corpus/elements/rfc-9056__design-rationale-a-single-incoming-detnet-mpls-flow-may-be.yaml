document: rfc-9056
kind: design-rationale
summary: A single incoming DetNet MPLS flow MAY be treated as a single DetNet IP flow without examination of IP headers, allowing simplified egress processing. Alternatively, normal DetNet IP flow identification per RFC 8939 Section 5.1 may be applied.
section: "5.1"
topics:
    - mpls
    - routing
