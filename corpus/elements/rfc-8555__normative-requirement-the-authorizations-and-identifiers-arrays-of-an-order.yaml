document: rfc-8555
kind: normative-requirement
summary: The 'authorizations' and 'identifiers' arrays of an order object are immutable once set; the server MUST NOT change their contents after creation. A client observing a change SHOULD consider the order invalid.
section: 7.1.3
rfc2119_level: MUST NOT
topics:
    - security
    - acme
