document: rfc-9573
kind: normative-requirement
summary: When a PE receives an x-PMSI/IMET route with the Context-Specific Label Space ID EC, it MUST install an entry in its default MPLS forwarding table mapping the label in the EC to the corresponding context-specific label table for subsequent inner-label lookups.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
