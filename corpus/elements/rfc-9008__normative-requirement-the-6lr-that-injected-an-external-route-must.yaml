document: rfc-9008
kind: normative-requirement
summary: The 6LR that injected an external route MUST undo RFC 8138 compression on the packet before forwarding over that external route, because nodes reachable via external routes are not expected to support RFC 8138.
section: 4.1.1
rfc2119_level: MUST
topics:
