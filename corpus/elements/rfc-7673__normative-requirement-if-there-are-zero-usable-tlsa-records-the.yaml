document: rfc-7673
kind: normative-requirement
summary: If there are zero usable TLSA records, the client SHALL validate the server certificate using PKIX or protocol-specific rules. It SHOULD use TLS SNI (RFC 6066) or its protocol equivalent, with the service domain name as the preferred name.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - security
