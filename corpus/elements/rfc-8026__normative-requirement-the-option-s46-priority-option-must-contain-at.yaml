document: rfc-8026
kind: normative-requirement
summary: The OPTION_S46_PRIORITY option MUST contain at least one s46-option-code. If a client receives an OPTION_S46_PRIORITY option with duplicate s46-option-code values, it should consider the option invalid.
section: "1.3"
rfc2119_level: MUST
topics:
