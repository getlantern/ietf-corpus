document: rfc-3010
kind: design-rationale
summary: The COMPOUND procedure was introduced to reduce the number of RPCs needed for logical file system operations; for example, a client with no prior server contact can read file data in a single RPC by combining LOOKUP, OPEN, and READ operations, which was impossible with NFSv2/v3.
section: 1.1.2
