document: rfc-7275
kind: protocol-element
summary: 'The NAK TLV (Type=0x0002) carries an ICCP Status Code, Rejected Message ID, and optional echoed TLVs. Defined status codes are: Unknown ICCP RG (0x00010001), Connection Count Exceeded (0x00010002), Application Connection Count Exceeded (0x00010003), Application not in RG (0x00010004), Incompatible Protocol Version (0x00010005), Rejected Message (0x00010006), and Administratively Disabled (0x00010007).'
section: 6.4.1
topics:
    - mpls
