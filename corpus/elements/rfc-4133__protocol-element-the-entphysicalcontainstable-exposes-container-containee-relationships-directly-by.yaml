document: rfc-4133
kind: protocol-element
summary: The entPhysicalContainsTable exposes container/containee relationships directly by indexing on (entPhysicalIndex, entPhysicalChildIndex), allowing an NMS to quickly discover all children of a given physical entity. It also captures additional containment mappings (e.g., double-wide modules) that cannot be represented in the virtual containment tree.
