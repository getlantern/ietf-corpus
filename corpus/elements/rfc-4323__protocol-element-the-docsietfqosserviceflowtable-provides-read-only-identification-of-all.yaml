kind: protocol-element
summary: The docsIetfQosServiceFlowTable provides read-only identification of all Service Flows known to the device, indexed by {ifIndex, docsIetfQosServiceFlowId}. Each entry includes the 32-bit SFID, 16-bit SID (upstream active flows), direction, and whether the SF is the primary SF for that direction.
