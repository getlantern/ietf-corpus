document: rfc-9711
kind: privacy-consideration
summary: The 'location' claim can reveal the precise physical location of the entity and its user. Implementations should carefully consider whether location data is necessary, and verifiers should apply privacy-preserving transformations when forwarding location claims to relying parties.
section: "8.2"
topics:
    - privacy
    - security
