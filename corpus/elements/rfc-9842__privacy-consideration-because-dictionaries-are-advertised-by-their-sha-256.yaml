document: rfc-9842
kind: privacy-consideration
summary: Because dictionaries are advertised by their SHA-256 hash, a server can use a unique dictionary per user as a tracking cookie. Clients MUST treat dictionaries with the same partitioning and clearing policies as cookies, including clearing dictionaries whenever cookies are cleared.
section: "10"
rfc2119_level: MUST
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
