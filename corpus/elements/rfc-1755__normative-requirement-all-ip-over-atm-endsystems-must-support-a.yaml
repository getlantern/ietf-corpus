document: rfc-1755
kind: normative-requirement
summary: 'All IP over ATM endsystems MUST support a required subset of traffic management parameter combinations in the SETUP message, comprising: (1) token-bucket SCR/MBS style with BCOB-X/C and PCR+SCR+MBS(CLP=0+1); (2) CBR ''pipe'' with BCOB-X, PCR(CLP=0+1), timing required; and (3) Best Effort non-guaranteed bitrate with PCR(CLP=0+1) and best_effort_indication. QoS Class 0 is required for all three.'
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
