document: rfc-5590
kind: protocol-element
summary: 'Two distinct security level fields exist in tmState: tmTransportSecurityLevel (the level of security offered by the session, set by the Transport Model for incoming messages) and tmRequestedSecurityLevel (the level required by the Security Model, used to prevent sending outgoing messages over an insufficiently secure session).'
section: 5.2.3
topics:
    - snmp
    - security
