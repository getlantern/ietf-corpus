document: rfc-6350
kind: registry
summary: 'This document establishes four IANA vCard Elements registries: (1) Properties Registry, (2) Parameters Registry, (3) Value Data Types Registry, and (4) Values Registries (one per property requiring an enumerated values registry). New entries require Expert Review or Standards Action depending on type. A vendor namespace ("vnd-" prefix) is available for private-use registrations.'
section: "10.2"
topics:
