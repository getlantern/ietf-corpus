document: rfc-8572
kind: wire-format
summary: The DHCPv4 SZTP Redirect Option (Section 8.1) and DHCPv6 SZTP Redirect Option (Section 8.2) encode only unsigned redirect information (a list of bootstrap server host/port pairs) because DHCP packet size constraints preclude carrying signed artifacts. The trust anchor certificate field is intentionally omitted from the DHCP option encoding.
section: "8"
topics:
