document: rfc-9164
kind: interoperability-note
summary: Tags 260 and 261 are deprecated in favor of tags 52 and 54. New implementations should use 52 and 54; tag 260 cannot distinguish IPv6 from IPv4 from MAC addresses without relying solely on byte-string length, preventing trailing-zero omission.
section: "1"
topics:
