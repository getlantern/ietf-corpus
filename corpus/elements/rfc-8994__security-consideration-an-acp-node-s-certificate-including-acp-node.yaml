document: rfc-8994
kind: security-consideration
summary: An ACP node's certificate (including acp-node-name and optional serialNumber fields) may be retrievable by unauthenticated neighbors during a failing ACP secure channel setup attempt, exposing device type information that could aid targeted attacks. Operators should consider what device-identifying fields to include in ACP certificates.
section: 6.2.1
topics:
    - security
    - privacy
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
