summary: The IEEE FILS (Fast Initial Link Setup) authentication standard requires the EAP Session-Id for ERP (EAP Re-authentication Protocol, RFC 6696) to work, motivating the need to correct deficiencies in EAP Session-Id definitions for EAP-SIM and EAP-AKA.
