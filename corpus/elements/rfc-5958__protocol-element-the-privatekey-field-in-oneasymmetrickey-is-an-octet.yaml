document: rfc-5958
kind: protocol-element
summary: 'The privateKey field in OneAsymmetricKey is an OCTET STRING whose content is algorithm-specific: DSA keys are INTEGER, RSA keys use RSAPrivateKey as defined in RFC 3447 (including n and e), and ECC keys use ECPrivateKey as defined in RFC 5915 (including the optional publicKey field).'
