document: rfc-7684
kind: normative-requirement
summary: If the Extended Prefix TLV or Extended Link TLV is advertised multiple times within the same Opaque LSA, only the first instance is used by receiving routers; this situation SHOULD be logged as an error.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - routing
