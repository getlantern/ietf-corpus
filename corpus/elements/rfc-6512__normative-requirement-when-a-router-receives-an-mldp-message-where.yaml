document: rfc-6512
kind: normative-requirement
summary: When a router receives an mLDP message where it is identified as the root node and the opaque value is a Recursive Opaque Value, it MUST replace the received FEC element with the contents of the Recursive Opaque Value (i.e., the embedded FEC element) before any further processing.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
