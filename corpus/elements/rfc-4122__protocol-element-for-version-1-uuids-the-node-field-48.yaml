document: rfc-4122
kind: protocol-element
summary: For version 1 UUIDs, the node field (48 bits, octets 10–15) holds an IEEE 802 MAC address, typically the host address. If no MAC address is available or its use is undesirable, a 47-bit cryptographic-quality random value with the multicast bit set may be substituted.
section: 4.1.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
