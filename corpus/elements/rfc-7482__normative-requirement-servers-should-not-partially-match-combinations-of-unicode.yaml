document: rfc-7482
kind: normative-requirement
summary: Servers SHOULD NOT partially match combinations of Unicode characters where a legal combination is possible, because Unicode characters can be combined with each other in many ways, making partial matching unreliable.
section: "4.1"
rfc2119_level: SHOULD NOT
