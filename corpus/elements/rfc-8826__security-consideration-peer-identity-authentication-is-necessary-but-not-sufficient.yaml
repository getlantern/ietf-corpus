document: rfc-8826
kind: security-consideration
summary: 'Peer identity authentication is necessary but not sufficient for media security: HTML5 MediaStreams can be manipulated by the calling site. A secure media mode is needed whereby sites can verifiably relinquish access to media streams, cryptographically binding the local media access policy into the authentication procedures, with both local and remote users able to verify engagement of this mode.'
section: 4.3.2.4
topics:
    - webrtc
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
