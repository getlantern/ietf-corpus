document: rfc-6874
kind: design-rationale
summary: Using an alternative separator character (e.g., "-" or "_") was rejected because it would require all IPv6 address literal parsers and generators to be updated; an underscore was specifically noted as effectively invisible when user interfaces auto-underline URLs.
section: A
