document: rfc-6794
kind: normative-requirement
summary: A UA MUST set up a policy channel to each discovered policy server and MUST maintain that channel for the lifetime of the session. If the UA does not want to establish a channel to a required policy server, it MUST cancel or reject the pending INVITE or terminate the in-progress session.
section: 4.5.1
rfc2119_level: MUST
topics:
    - sip
