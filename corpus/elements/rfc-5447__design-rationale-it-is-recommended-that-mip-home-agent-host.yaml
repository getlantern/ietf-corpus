document: rfc-5447
kind: design-rationale
summary: It is RECOMMENDED that MIP-Home-Agent-Host is always included in MIP6-Agent-Info so that the HA can be associated with the realm of the Diameter entity that added the AVP via the Destination-Realm sub-AVP, aiding realm-based routing.
