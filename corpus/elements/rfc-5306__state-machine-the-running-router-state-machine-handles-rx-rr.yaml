kind: state-machine
summary: The Running Router state machine handles RX RR (maintain adjacency state, send RA, set SRM flags, send CSNP, update hold time, set Restart Mode), RX RR clear (clear Restart Mode), RX SA (suppress IS neighbor TLV, enter ADJ Suppressed state), and RX SA clear (unsuppress adjacency, return to Running).
