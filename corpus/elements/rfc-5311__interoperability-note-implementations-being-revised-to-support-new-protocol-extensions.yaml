document: rfc-5311
kind: interoperability-note
summary: Implementations being revised to support new protocol extensions that define TLVs/sub-TLVs advertisable in Extended LSPs SHOULD also be revised to support these extensions (RFC 5311) so they can process new information whether it appears in normal or Extended LSPs.
section: "6.1"
topics:
    - routing
