document: rfc-1342
kind: design-rationale
summary: The 75-character limit per encoded-word and 76-character limit per header line were chosen to ease interoperability through internetwork mail gateways and to limit the amount of lookahead a header parser must employ when deciding whether a token is an encoded-word.
