document: rfc-907
kind: wire-format
summary: 'Every HAP message consists of an integral number of 16-bit words. Word 0 identifies the message type (bit 15: 0=data, 1=control), word 1 is a header checksum covering all header words, and subsequent words depend on message type. Fields are described by notation WORD#[BIT#] where bits are numbered 0 (LSB) to 15 (MSB).'
section: "2"
