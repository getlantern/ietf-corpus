document: rfc-7854
kind: security-consideration
summary: Without mutual-authentication transport, an attacker could masquerade as the monitored router to inject false BMP data or as the monitoring station to gain unauthorized access. Without confidentiality, BMP data is vulnerable to interception or tampering. IPsec in tunnel mode with pre-shared keys is recommended where these risks are a concern.
section: "11"
topics:
