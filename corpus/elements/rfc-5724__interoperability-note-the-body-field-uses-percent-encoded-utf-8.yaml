document: rfc-5724
kind: interoperability-note
summary: The body field uses percent-encoded UTF-8 characters, but implementations must convert to a suitable SMS character encoding (7-bit GSM or UCS-2) before transmission. UCS-2 is not as universally supported as 7-bit SMS encoding.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
