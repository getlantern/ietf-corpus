document: rfc-9066
kind: protocol-element
summary: In DOTS Call Home, the Call Home DOTS server acts as the (D)TLS client and initiates the (D)TLS connection to the Call Home DOTS client, which acts as the (D)TLS server. All DOTS application-layer roles (client/server) remain unchanged; only the (D)TLS transport roles are reversed. The Call Home DOTS client then issues mitigation requests over this established connection.
section: "5.1"
topics:
    - security
    - tls
