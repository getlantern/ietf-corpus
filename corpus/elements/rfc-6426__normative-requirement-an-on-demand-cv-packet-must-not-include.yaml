document: rfc-6426
kind: normative-requirement
summary: An on-demand CV packet MUST NOT include more than one Destination Identifier TLV. If more than one is present, error 1 (Malformed echo request) MUST be returned if the source can be unambiguously identified.
section: 2.2.3
rfc2119_level: MUST NOT
topics:
