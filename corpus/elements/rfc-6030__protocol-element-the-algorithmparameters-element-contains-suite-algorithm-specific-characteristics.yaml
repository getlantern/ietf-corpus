document: rfc-6030
kind: protocol-element
summary: The <AlgorithmParameters> element contains <Suite> (algorithm-specific characteristics, e.g., hash strength), <ChallengeFormat> (encoding, min/max size, CheckDigit for CR algorithms), and <ResponseFormat> (encoding, length, CheckDigit for OTP/CR output). Both <ChallengeFormat> and <ResponseFormat> require mandatory 'Encoding', and 'Min'/'Max' or 'Length' attributes.
section: 4.3.4
