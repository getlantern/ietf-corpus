document: rfc-3332
kind: wire-format
summary: 'All M3UA parameters use a Tag-Length-Value (TLV) format: Parameter Tag (16 bits, unsigned), Parameter Length (16 bits, includes Tag+Length+Value but not padding), and variable-length Parameter Value. Parameters may appear in any order unless explicitly mandated; receivers SHOULD accept them in any order.'
section: "3.2"
topics:
