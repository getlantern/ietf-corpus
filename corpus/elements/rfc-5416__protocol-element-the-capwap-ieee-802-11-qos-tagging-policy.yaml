document: rfc-5416
kind: protocol-element
summary: 'The CAPWAP IEEE 802.11 QoS Tagging Policy is configured via five bits in the WTP Quality of Service element: ''P'' enables 802.1p tagging; ''Q'' selects between the default/station-specific 802.1p value and the 802.11 QoS Control field value; ''D'' enables DSCP marking; ''I'' marks the inner (station) packet DSCP; ''O'' marks the outer (tunnel header) DSCP. DSCP and 802.1p mechanisms are not mutually exclusive.'
section: 2.6.1
topics:
    - qos
