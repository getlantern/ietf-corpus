document: rfc-5611
kind: security-consideration
summary: This document covers only the L2TPv3 control plane for TDM PW setup; no additional security considerations beyond those in RFC 3931 apply to the control plane. The L2TPv3 data plane provides additional security via cookies, complementing the data plane security discussed in RFC 4553 and RFC 5086.
