document: rfc-9630
kind: design-rationale
summary: Postcard-based solutions like IOAM DEX eliminate data redundancy for multicast but cannot accurately track tree branches because they lack a branch identifier. Without branching information, it is impossible to determine from postcards alone whether a downstream node is the next hop of one branch or another.
section: "3"
topics:
    - multicast
    - measurement
