document: rfc-8560
kind: interoperability-note
summary: VPLS PEs must support VPLS A-D per RFC 6074 for seamless integration; if a VPLS instance was provisioned without VPLS A-D, EVPN PEs can still integrate it but must manually configure PWs to all VPLS PEs in that instance, making the integration non-seamless.
