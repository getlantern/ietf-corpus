document: rfc-4124
kind: wire-format
summary: The 'Bandwidth Constraints' sub-TLV consists of a 1-octet Bandwidth Constraints Model Id, a 3-octet Reserved field, and N×4-octet Bandwidth Constraints (BC0 through BCh), each encoded as a 32-bit IEEE floating point value in bytes per second. Sub-TLV type 17 for OSPF Link TLV and type 22 for ISIS Extended IS Reachability TLV.
