document: rfc-9246
kind: normative-requirement
summary: The Client IP Address (cdniip) claim MUST be a JSON Web Encryption (JWE) Object in compact serialization form because it contains personally identifiable information. The Subject (sub) claim MUST also be a JWE Object in compact serialization form for the same reason.
section: 2.1.10
rfc2119_level: MUST
topics:
    - jose
    - privacy
    - security
