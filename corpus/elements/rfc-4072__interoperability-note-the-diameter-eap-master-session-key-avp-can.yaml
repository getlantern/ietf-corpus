document: rfc-4072
kind: interoperability-note
summary: 'The Diameter EAP-Master-Session-Key AVP can be translated to the vendor-specific RADIUS MS-MPPE-Recv-Key and MS-MPPE-Send-Key attributes: the first up to 32 octets go into MS-MPPE-Recv-Key and the next up to 32 octets into MS-MPPE-Send-Key, with encryption as described in RFC 2548.'
section: "6.1"
topics:
    - diameter
    - radius
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
