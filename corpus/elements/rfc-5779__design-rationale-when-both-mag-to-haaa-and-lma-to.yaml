document: rfc-5779
kind: design-rationale
summary: When both MAG-to-HAAA and LMA-to-HAAA interfaces are deployed, a single PMIPv6 mobility session will have two distinct Diameter sessions at the HAAA. The HAAA SHOULD allow multiple Diameter sessions for the same PMIPv6 mobility session to accommodate this architecture.
