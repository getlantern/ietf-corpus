document: rfc-2046
kind: normative-requirement
summary: Entities of type 'message/partial' must always have a content-transfer-encoding of 7bit. Even in environments that support binary or 8bit transport, use of '8bit' or 'binary' encoding is explicitly prohibited for 'message/partial'.
section: 5.2.2
rfc2119_level: MUST
topics:
    - email
