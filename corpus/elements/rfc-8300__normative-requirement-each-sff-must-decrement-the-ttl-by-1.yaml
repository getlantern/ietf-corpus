document: rfc-8300
kind: normative-requirement
summary: Each SFF MUST decrement the TTL by 1 prior to NSH forwarding lookup. The packet MUST NOT be forwarded if TTL is 0 after decrement. The default initial TTL value of 63 MUST be used if no value is explicitly configured.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
