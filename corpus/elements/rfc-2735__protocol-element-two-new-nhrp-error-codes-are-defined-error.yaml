summary: 'Two new NHRP error codes are defined: error code 16 (VPN mismatch) returned when a PDU contains a VPN-ID in the LLC/SNAP header that differs from the previously signalled VPN-ID, and error code 17 (VPN not supported) returned when a message arrives for an unsupported VPN.'
