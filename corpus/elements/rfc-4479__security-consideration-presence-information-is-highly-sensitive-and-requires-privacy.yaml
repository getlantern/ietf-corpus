document: rfc-4479
kind: security-consideration
summary: Presence information is highly sensitive and requires privacy filtering—authorization-based removal of attributes a watcher is not permitted to see—before divulging it. RFC 3856 mandates such authorization processing, and the data model is designed so that individual attributes can be selectively withheld.
section: "8"
topics:
