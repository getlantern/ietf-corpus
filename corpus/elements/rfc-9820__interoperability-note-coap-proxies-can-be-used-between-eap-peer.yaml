document: rfc-9820
kind: interoperability-note
summary: CoAP proxies can be used between EAP peer and EAP authenticator. The proxy must handle the role-reversal at Step 0 (acting as forward proxy) and Step 1 onwards (acting as reverse proxy). It must also treat the URI in the Step 0 request payload as equivalent to a Location-Path Option in a response, which is non-standard CoAP behavior.
section: "3.6"
topics:
    - security
