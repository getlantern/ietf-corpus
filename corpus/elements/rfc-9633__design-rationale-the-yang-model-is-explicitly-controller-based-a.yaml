document: rfc-9633
kind: design-rationale
summary: 'The YANG model is explicitly controller-based: a controller or operator configures all devices along the path to form a service, enabling end-to-end DetNet provisioning without depending on any signaling protocol. This allows static data-plane configuration for both MPLS and IP paths.'
