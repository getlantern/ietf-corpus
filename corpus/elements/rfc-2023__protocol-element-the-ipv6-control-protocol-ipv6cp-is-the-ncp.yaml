document: rfc-2023
kind: protocol-element
summary: The IPv6 Control Protocol (IPV6CP) is the NCP responsible for configuring, enabling, and disabling IPv6 protocol modules on both ends of a PPP link. It uses the same packet exchange mechanism as LCP and is identified by PPP Protocol field value 0x8057.
