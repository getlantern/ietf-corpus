document: rfc-7796
kind: normative-requirement
summary: PEs with both leaf and root nodes MUST support BGP E-Tree signaling and MUST attach an E-Tree Extended Community (with local Root and Leaf VLAN IDs) to BGP UPDATE messages if participating in an E-Tree service. If some PEs don't support VLAN mapping, global VLANs MUST be provisioned.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
