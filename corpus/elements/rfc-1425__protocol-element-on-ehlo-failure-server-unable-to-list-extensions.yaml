document: rfc-1425
kind: protocol-element
summary: On EHLO failure (server unable to list extensions), the server returns code 554. On unacceptable argument, code 501. On recognized-but-unimplemented EHLO, code 502. On service unavailable, code 421. The client should issue HELO or QUIT after any error or failure response.
section: 4.2, 4.3
topics:
