document: rfc-9502
kind: normative-requirement
summary: When a prefix advertisement is received in both a standard IPv4 Prefix Reachability TLV and an IPv4 Algorithm Prefix Reachability TLV, the standard IPv4 Prefix Reachability advertisement MUST be preferred when installing entries in the forwarding plane. The same rule applies to IPv6.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
