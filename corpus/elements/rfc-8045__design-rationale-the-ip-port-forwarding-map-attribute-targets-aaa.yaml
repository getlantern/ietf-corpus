document: rfc-8045
kind: design-rationale
summary: 'The IP-Port-Forwarding-Map attribute targets AAA-controlled static NAT mapping and is explicitly complementary to PCP (RFC 6887): PCP targets deployments where the host application controls its own mappings upstream, while this attribute targets deployments where the AAA server authoritatively instructs mappings for subscribers without assuming host participation.'
section: 4.1.3
topics:
    - nat
    - radius
