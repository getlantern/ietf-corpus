document: rfc-2496
kind: design-rationale
summary: 'Two separate objects model loopback state: dsx3LoopbackConfig reflects desired state (set by manager) while dsx3LoopbackStatus reflects actual state (including far-end-initiated loopbacks). This distinction is needed because the far end can independently request loopbacks via FDL or inband signaling.'
section: 2.2.4
