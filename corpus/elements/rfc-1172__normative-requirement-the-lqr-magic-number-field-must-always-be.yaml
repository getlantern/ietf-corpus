document: rfc-1172
kind: normative-requirement
summary: The LQR Magic-Number field MUST always be transmitted as zero and MUST always be ignored on reception unless Magic-Numbers have been negotiated. If negotiated, incoming LQR Magic-Numbers should be checked for loop-back detection.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
