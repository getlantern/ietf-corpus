document: rfc-1908
kind: normative-requirement
summary: When a proxy agent forwards a SNMPv1 GetResponse-PDU to a SNMPv2 manager, it must pass the PDU unaltered, including preserving error-status values such as 'noSuchName', 'badValue', or 'readOnly' that SNMPv2 would never generate natively.
section: 3.1.2
rfc2119_level: MUST
topics:
    - snmp
