document: rfc-1231
kind: protocol-element
summary: 'dot5RingStatus (dot5Entry 3) is a read-only INTEGER bitmask representing currently applicable ring conditions after a successful open. Defined values include: 0 (no problems), 32 (Ring Recovery), 64 (Single Station), 256 (Remove Received), 2048 (Lobe Wire Fault), 4096 (Transmit Beacon), 8192 (Soft Error), 16384 (Hard Error), 32768 (Signal Loss), 131072 (no status/open not completed).'
