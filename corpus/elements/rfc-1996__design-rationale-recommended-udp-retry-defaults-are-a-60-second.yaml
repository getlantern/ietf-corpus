document: rfc-1996
kind: design-rationale
summary: Recommended UDP retry defaults are a 60-second interval and a maximum of 5 retransmissions, with additive or exponential backoff considered reasonable. These are intended to be configurable per-zone by the name server administrator.
section: "3.6"
