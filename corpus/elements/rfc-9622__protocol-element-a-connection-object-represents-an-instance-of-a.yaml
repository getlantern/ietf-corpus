document: rfc-9622
kind: protocol-element
summary: A Connection object represents an instance of a transport Protocol Stack supporting Send and/or Receive. Connections can be created from Preconnections via Initiate (active open), Listen (passive open), or Rendezvous (peer-to-peer); they are presented consistently to the application regardless of whether the underlying transport is connectionless or connection-oriented.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
