document: rfc-1962
kind: design-rationale
summary: A proprietary OUI-based Configuration Option (type 0) was created to allow vendors to negotiate proprietary compression algorithms without encumbering IANA with proprietary number requests. The OUI mechanism reuses IEEE 802 vendor identifiers already assigned to vendors.
section: "4.1"
