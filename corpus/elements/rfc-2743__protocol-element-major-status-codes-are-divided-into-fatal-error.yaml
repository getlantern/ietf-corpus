summary: Major status codes are divided into fatal error codes (GSS_S_BAD_BINDINGS, GSS_S_BAD_MECH, GSS_S_BAD_NAME, GSS_S_BAD_NAMETYPE, GSS_S_BAD_SIG/GSS_S_BAD_MIC, GSS_S_CONTEXT_EXPIRED, GSS_S_CREDENTIALS_EXPIRED, GSS_S_DEFECTIVE_CREDENTIAL, GSS_S_DEFECTIVE_TOKEN, GSS_S_FAILURE, GSS_S_NO_CONTEXT, GSS_S_NO_CRED, GSS_S_BAD_QOP, GSS_S_UNAUTHORIZED, GSS_S_UNAVAILABLE, GSS_S_DUPLICATE_ELEMENT, GSS_S_NAME_NOT_MN) and informatory codes (GSS_S_COMPLETE, GSS_S_CONTINUE_NEEDED, GSS_S_DUPLICATE_TOKEN, GSS_S_OLD_TOKEN, GSS_S_UNSEQ_TOKEN, GSS_S_GAP_TOKEN).
