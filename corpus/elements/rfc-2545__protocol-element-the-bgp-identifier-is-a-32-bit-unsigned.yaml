document: rfc-2545
kind: protocol-element
summary: The BGP Identifier is a 32-bit unsigned integer exchanged at session establishment in the OPEN message; it must be unique in the network and should be derived from an IPv4 address regardless of which network protocol(s) a BGP-4 instance is carrying.
