document: rfc-7761
kind: protocol-element
summary: The LAN Prune Delay Hello option carries a T bit (tracking support), Propagation_Delay, and Override_Interval fields. The effective values per interface are the maximums across all advertising neighbors. The option is only active when every neighbor on the link advertises it; otherwise, defaults apply.
section: 4.3.3
topics:
    - multicast
    - routing
