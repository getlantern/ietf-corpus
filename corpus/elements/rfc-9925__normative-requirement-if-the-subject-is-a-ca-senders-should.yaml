document: rfc-9925
kind: normative-requirement
summary: If the subject is a CA, senders SHOULD assert the keyCertSign key usage bit and SHOULD include a basicConstraints extension with cA set to TRUE. If the subject is an end entity, senders SHOULD NOT assert keyCertSign and SHOULD either omit basicConstraints or set cA to FALSE.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
