document: rfc-7352
kind: security-consideration
summary: Message IDs are not necessarily unique, either through benign generator faults or attacker injection of messages with crafted properties. Scripts should be conservative with actions taken when duplicates are identified only by message ID, as false duplicate detection may result.
section: "6"
topics:
