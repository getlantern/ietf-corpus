document: rfc-9513
kind: normative-requirement
summary: The AC-bit (0x80) in OSPFv3 PrefixOptions MUST be set when a prefix or SRv6 Locator is configured as anycast and MUST be preserved when re-advertising across areas. The AC-bit and N-bit MUST NOT both be set; if both are set, receivers MUST ignore the N-bit.
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
