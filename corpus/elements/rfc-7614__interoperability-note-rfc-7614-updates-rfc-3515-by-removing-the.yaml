document: rfc-7614
kind: interoperability-note
summary: RFC 7614 updates RFC 3515 by removing the requirement to reject out-of-dialog SUBSCRIBE requests to event 'refer'; an element MAY now accept such requests following this document's requirements, making REFER no longer the only mechanism that can create a 'refer' event subscription.
section: "7"
topics:
