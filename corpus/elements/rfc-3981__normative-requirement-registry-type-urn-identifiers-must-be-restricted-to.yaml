document: rfc-3981
kind: normative-requirement
summary: Registry type URN identifiers MUST be restricted to a URN registered in the 'ns' class of the IANA registry and are case insensitive. These identifiers MAY be abbreviated to the part following the class component, but this abbreviation MUST NOT be used inside XML instances.
section: 4.3.2
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
