document: rfc-4920
kind: normative-requirement
summary: When a node that was responsible for expanding or replacing the explicit route cannot or chooses not to perform crankback re-routing, it MUST update the crankback information with regard to the explicit route that it received before forwarding the PathErr message upstream.
section: 6.4.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
