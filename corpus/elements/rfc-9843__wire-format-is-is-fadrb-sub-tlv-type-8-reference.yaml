document: rfc-9843
kind: wire-format
summary: 'IS-IS FADRB sub-TLV (Type 8, Reference Bandwidth Method): 1-octet Type, 1-octet Length (set to 9), 1-octet Flags (G-flag bit 0 enables Interface Group Mode), 32-bit IEEE 754 Reference Bandwidth, and 32-bit IEEE 754 Granularity Bandwidth, both in bytes per second. Metric = Reference_BW / (Link_BW - Modulus(Link_BW, Granularity_BW)) using integer division.'
section: 4.1.3.1
topics:
    - routing
