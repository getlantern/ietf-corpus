document: rfc-7455
kind: protocol-element
summary: 'The Path Trace Message (OpCode 65) uses a traceroute-like hop-count-expiry approach: the originator starts with Hop Count=1, records each intermediate RBridge response (Return Sub-code 2), and increments the Hop Count by 1 for each retransmission until a Valid Response from the destination is received, a timeout occurs, or a configured maximum Hop Count is reached.'
section: "10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
