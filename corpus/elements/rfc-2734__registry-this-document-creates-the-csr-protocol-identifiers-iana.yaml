document: rfc-2734
kind: registry
summary: 'This document creates the ''CSR Protocol Identifiers'' IANA registry: a 24-bit namespace concatenated with IANA''s OUI (0x00 005E) to form a globally unique 48-bit protocol identifier. Values 0 and 0xFFFFFF are reserved; value 1 is assigned to this document. Remaining values are allocated to IESG standards-track documents.'
