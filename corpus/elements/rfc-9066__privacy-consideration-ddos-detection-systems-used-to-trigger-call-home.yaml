document: rfc-9066
kind: privacy-consideration
summary: DDoS detection systems used to trigger Call Home mitigation requests (e.g., flow exports) may be misused to track users and infer their activities. Such misuse is not required for the defined functionality, but is an implementation concern outside the scope of this specification.
section: "9"
topics:
    - privacy
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
