document: rfc-7982
kind: normative-requirement
summary: The client MUST populate the Req value in the TRANSACTION_TRANSMIT_COUNTER attribute to reflect the number of requests transmitted to the server. The initial value for the first request is 1, incremented by 1 for each retransmission.
section: "3.2"
rfc2119_level: MUST
topics:
    - nat
