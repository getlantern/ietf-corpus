document: rfc-2746
kind: normative-requirement
summary: When a tunnel session PATH message encounters an error, Rentry MUST relay the error to the original end-to-end session source; when a tunnel RESV fails, Rexit MUST forward the error (using the ERROR_SPEC code and value) to the end-to-end RESV originator.
section: "6.2"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
