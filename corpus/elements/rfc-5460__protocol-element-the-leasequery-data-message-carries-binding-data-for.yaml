document: rfc-5460
kind: protocol-element
summary: The LEASEQUERY-DATA message carries binding data for a single DHCPv6 client on a single link and MUST be preceded by a LEASEQUERY-REPLY. It MUST contain an OPTION_CLIENT_DATA option; if absent, the message MUST be discarded. Its transaction-id MUST match the originating LEASEQUERY.
section: 5.2.1
topics:
    - dns
