document: rfc-1377
kind: wire-format
summary: 'The Align-NPDU Configuration Option is 3 octets: Type (1 octet, value 1), Length (1 octet, value 3), and Alignment (1 octet). The Alignment field specifies the desired offset of the OSI NPDU relative to the start of the PPP packet header.'
