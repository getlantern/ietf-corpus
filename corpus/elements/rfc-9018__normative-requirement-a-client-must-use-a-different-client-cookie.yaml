document: rfc-9018
kind: normative-requirement
summary: A client MUST use a different Client Cookie for each different Server IP address to provide minimal authentication of the targeted server and complicate spoofing. The Client Cookie SHOULD have 64 bits of entropy.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - security
