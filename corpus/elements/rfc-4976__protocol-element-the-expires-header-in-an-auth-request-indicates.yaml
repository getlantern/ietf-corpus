document: rfc-4976
kind: protocol-element
summary: The Expires header in an AUTH request indicates how long the client wants the returned URI to remain valid (in whole seconds). Min-Expires and Max-Expires headers are sent by the relay in 423 responses to indicate acceptable bounds.
