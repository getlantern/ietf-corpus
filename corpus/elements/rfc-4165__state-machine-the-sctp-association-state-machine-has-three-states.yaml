document: rfc-4165
kind: state-machine
summary: 'The SCTP Association state machine has three states: IDLE (initial/power-up), ASSOCIATING (after issuing SCTP Associate), and ESTABLISHED (after SCTP Comm Up). SCTP Comm Error in ASSOCIATING or ESTABLISHED causes a transition back to ASSOCIATING with re-attempt; SCTP Comm Lost in ESTABLISHED similarly transitions back to ASSOCIATING.'
section: "3.1"
topics:
    - sctp
