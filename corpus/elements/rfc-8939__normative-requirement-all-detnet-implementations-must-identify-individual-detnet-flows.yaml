document: rfc-8939
kind: normative-requirement
summary: All DetNet implementations MUST identify individual DetNet flows based on the set of IP-layer and higher-layer protocol header information specified in Section 5.1. The configuration used to identify flows MUST be ordered, and implementations MUST identify a DetNet flow by the first matching set of flow information.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
