document: rfc-3729
kind: design-rationale
summary: A push model is recommended for desktop-based agents because desktops have dynamic addresses, are frequently unavailable due to reboots and user control, and laptops on dialup are only sporadically reachable—all of which make polling unreliable. The push model specifies exact varbind sets for APM Reports, Transactions, and Exceptions.
section: 2.4.2
