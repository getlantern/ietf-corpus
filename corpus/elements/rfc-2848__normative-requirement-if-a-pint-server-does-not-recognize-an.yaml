document: rfc-2848
kind: normative-requirement
summary: 'If a PINT server does not recognize an attribute listed in the ''require'' attribute, it MUST return an error status code (such as 420 or 400) and SHOULD return Warning: lines or an Unsupported: header. If it recognizes but cannot fulfill the attribute, the request MUST be rejected with 606 Not Acceptable.'
section: 3.4.4
rfc2119_level: MUST
topics:
    - realtime
    - sip
