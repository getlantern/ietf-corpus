document: rfc-7715
kind: normative-requirement
summary: After determining the upstream LSR, node N (which has the node protection feature enabled) MUST advertise the address of that upstream LSR as the PLR address to the downstream members of the MP LSP, but only if a given downstream member has announced support for node protection.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
