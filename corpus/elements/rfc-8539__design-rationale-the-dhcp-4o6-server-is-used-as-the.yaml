document: rfc-8539
kind: design-rationale
summary: The DHCP 4o6 server is used as the single point in the network that holds current client binding information (IPv4 address, Port Set ID, IPv6 source address), allowing the service provider to provision other functional elements such as border relays from this single authoritative source rather than requiring distributed signaling.
