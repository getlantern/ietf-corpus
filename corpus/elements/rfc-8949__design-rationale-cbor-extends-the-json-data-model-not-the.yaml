document: rfc-8949
kind: design-rationale
summary: CBOR extends the JSON data model—not the JSON grammar—to add binary byte strings and other types while allowing multiple serializations of the same value. Extensibility via IANA-registered tags and simple values eliminates the need for version negotiation; unknown tags and simple values can be forwarded by decoders that do not recognize them.
section: "1.1"
topics:
    - cbor
    - json
