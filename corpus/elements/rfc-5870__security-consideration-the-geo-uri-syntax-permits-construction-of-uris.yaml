document: rfc-5870
kind: security-consideration
summary: The 'geo' URI syntax permits construction of URIs that do not identify a valid location (e.g., latitude beyond the poles). Applications MUST NOT use such URIs and SHOULD warn users when they are encountered.
section: "9.1"
topics:
    - security
