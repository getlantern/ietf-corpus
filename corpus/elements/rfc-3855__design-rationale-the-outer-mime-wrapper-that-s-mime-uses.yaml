document: rfc-3855
kind: design-rationale
summary: The outer MIME wrapper that S/MIME uses for 7-bit transport is not required in a homogeneous X.400 environment (which supports 8-bit data natively) and SHOULD NOT be applied, though heterogeneous environments MAY require it.
