summary: 'The DRIP Link format contains: VNB Timestamp by Parent (4 octets), VNA Timestamp by Parent (4 octets), DET of Child (16 octets), HI of Child (32 octets), DET of Parent (16 octets), and Signature by Parent (64 octets over all preceding fields using the Parent DET keypair).'
