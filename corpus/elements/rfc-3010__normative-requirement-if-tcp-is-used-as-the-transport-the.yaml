document: rfc-3010
kind: normative-requirement
summary: If TCP is used as the transport, the client and server SHOULD use persistent connections to prevent weakening of TCP's congestion control via short-lived connections and to improve WAN performance.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
