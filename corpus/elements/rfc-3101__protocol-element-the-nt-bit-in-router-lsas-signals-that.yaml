document: rfc-3101
kind: protocol-element
summary: 'The Nt bit in router-LSAs signals that a router is an NSSA border router unconditionally translating Type-7 LSAs into Type-5 LSAs (NSSATranslatorRole=Always). Border routers with NSSATranslatorRole=Candidate use others'' Nt bits in their router-LSAs to elect the translator: the router with a set Nt bit or the highest router ID wins.'
section: "3.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
