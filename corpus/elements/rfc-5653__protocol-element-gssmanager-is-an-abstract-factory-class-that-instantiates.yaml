document: rfc-5653
kind: protocol-element
summary: GSSManager is an abstract factory class that instantiates GSSName, GSSCredential, and GSSContext objects and provides mechanism-query methods (getMechs, getNamesForMech, getMechsForName). A default instance is obtained via the static getInstance() method; applications may also subclass GSSManager directly.
