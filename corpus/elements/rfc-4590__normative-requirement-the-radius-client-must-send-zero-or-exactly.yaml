document: rfc-4590
kind: normative-requirement
summary: The RADIUS client MUST send zero or exactly one credential to the RADIUS server. Where none of the realms match the locally configured realm, the RADIUS client MUST behave as though no relevant credentials were sent.
section: 2.1.1
rfc2119_level: MUST
topics:
    - radius
    - security
