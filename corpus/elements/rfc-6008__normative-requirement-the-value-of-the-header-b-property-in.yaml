document: rfc-6008
kind: normative-requirement
summary: The value of the 'header.b' property in an Authentication-Results field MUST be at least the first eight characters of the digital signature (the 'b=' tag from a DKIM-Signature) for which a result is being reported, and MUST be long enough to be unique among all results being reported in the same field.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - registry
