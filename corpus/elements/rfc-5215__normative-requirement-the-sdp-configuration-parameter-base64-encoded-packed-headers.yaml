document: rfc-5215
kind: normative-requirement
summary: The SDP 'configuration' parameter (base64-encoded Packed Headers) MUST be included in the SDP 'a=fmtp' attribute. The timestamp clock rate MUST be a multiple of the sample rate; a different payload number MUST be used if the clock rate changes.
section: "7.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
