document: rfc-5011
kind: normative-requirement
summary: Once a resolver has accepted a key as a trust anchor, the key MUST be considered a valid trust anchor by that resolver until explicitly revoked via the REVOKE bit mechanism.
section: "2.2"
rfc2119_level: MUST
topics:
