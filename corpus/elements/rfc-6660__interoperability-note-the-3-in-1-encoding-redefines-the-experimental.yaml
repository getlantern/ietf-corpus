document: rfc-6660
kind: interoperability-note
summary: The 3-in-1 encoding redefines the experimental '01' codepoint from RFC 5696 as the ThM state, obsoleting RFC 5696. Implementations configured to use the RFC 5696 threshold-marking to write the ETM codepoint would be misconfigured under this encoding, though no known deployment of that variant existed.
section: "6.2"
topics:
