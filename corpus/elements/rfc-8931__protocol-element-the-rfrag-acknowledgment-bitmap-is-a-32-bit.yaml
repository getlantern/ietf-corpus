document: rfc-8931
kind: protocol-element
summary: The RFRAG Acknowledgment Bitmap is a 32-bit field included in RFRAG-ACK messages. Each bit position maps one-to-one to a Sequence number; a set bit confirms receipt of that fragment. This enables selective recovery of individual lost fragments without retransmitting the entire datagram.
section: "5.2"
topics:
