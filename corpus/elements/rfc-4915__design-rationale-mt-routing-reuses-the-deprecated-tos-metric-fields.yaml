document: rfc-4915
kind: design-rationale
summary: MT routing reuses the deprecated TOS metric fields from [TOS-OSPF] rather than introducing new fields, since those fields were never deployed and are available for repurposing. The TOS field is redefined as MT-ID in Router, Summary, and AS-external LSAs.
