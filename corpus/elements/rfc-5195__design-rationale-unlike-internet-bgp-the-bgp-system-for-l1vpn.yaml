document: rfc-5195
kind: design-rationale
summary: 'Unlike Internet BGP, the BGP system for L1VPN auto-discovery is amenable to partitioning: one may have any number of independent BGP systems each carrying only a subset of VPN-related information. This is a key scalability distinction from Internet routing.'
