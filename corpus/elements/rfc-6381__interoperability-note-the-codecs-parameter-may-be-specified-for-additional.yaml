document: rfc-6381
kind: interoperability-note
summary: The 'codecs' parameter MAY be specified for additional MIME media types beyond those listed. For ISO-family formats using the existing namespace, only the media type registration needs updating. For formats requiring an expanded namespace or non-ISO-family formats, a new document MAY update RFC 6381 by specifying the additional namespace.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
