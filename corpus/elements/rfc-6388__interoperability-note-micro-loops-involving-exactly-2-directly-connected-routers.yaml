document: rfc-6388
kind: interoperability-note
summary: Micro-loops involving exactly 2 directly connected routers are prevented by mLDP's rule that an upstream LDP neighbor cannot be added as a downstream neighbor in the LFT for the same FEC. Micro-loops involving more than 2 LSRs are not prevented and are transient, resolving when unicast routing converges.
section: "4"
topics:
