document: rfc-3255
kind: normative-requirement
summary: For SONET VT-1.5/2/6 and SDH VC-11/12/2 virtual concatenation, the path signal label (V5 byte bits 5-7) is required to be the same for all constituent channels per ITU-T G.707 and ANSI T1.105.02.
section: "3"
rfc2119_level: REQUIRED
