document: rfc-2507
kind: protocol-element
summary: 'Four field classifications govern how each subheader field is treated during compression: NOCHANGE (constant; any change forces a full header), DELTA (predictably changing; encoded as difference from previous value; TCP streams only), RANDOM (unpredictable; sent as-is in every compressed header), and INFERRED (derivable from link-layer frame size or other fields; omitted entirely).'
