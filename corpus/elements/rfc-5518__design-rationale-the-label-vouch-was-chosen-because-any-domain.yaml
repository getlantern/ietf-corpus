document: rfc-5518
kind: design-rationale
summary: The label "_vouch" was chosen because any domain name containing it as a label cannot be a valid hostname, ensuring there can never be accidental overlap with a valid host name and making it safe to assume any TXT record under a _vouch-labeled name conforms to this specification.
