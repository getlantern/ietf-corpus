document: rfc-9574
kind: normative-requirement
summary: For single-IP AR-REPLICATORs (where AR-IP equals IR-IP), the Replicator-AR route MUST advertise a different VNI/VSID (AR-VNI) than the one in the Regular-IR route (IR-VNI), using different Route Distinguishers. The AR-REPLICATOR performs Ingress or Assisted Replication forwarding mode based on an ingress VNI lookup rather than the tunnel IP DA.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
