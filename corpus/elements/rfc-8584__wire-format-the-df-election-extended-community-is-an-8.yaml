document: rfc-8584
kind: wire-format
summary: The DF Election Extended Community is an 8-octet BGP transitive Extended Community (Type 0x06, Sub-Type 0x06). Octet 3 carries 3 reserved bits (RSV) followed by a 5-bit DF Alg field encoding algorithm values 0–31. Octets 4–5 carry a 2-octet Bitmap of capability flags. Octets 6–8 are reserved.
section: "2.2"
