document: rfc-3556
kind: protocol-element
summary: 'Special cases for RS/RR values: if RR is zero, non-senders never receive RTCP bandwidth regardless of the number of senders. Setting RS to zero means data senders are treated the same as non-senders. If both RS and RR are zero, the fraction RS/(RS+RR) must not be calculated.'
section: "2"
topics:
