document: rfc-8016
kind: normative-requirement
summary: A client MUST NOT include a MOBILITY-TICKET attribute in a Refresh request if its IP address and source port have not changed, as the server will reject such a request and the client would need to retransmit without the attribute.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
    - nat
