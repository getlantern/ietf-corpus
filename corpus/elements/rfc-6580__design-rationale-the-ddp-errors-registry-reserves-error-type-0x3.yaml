document: rfc-6580
kind: design-rationale
summary: The DDP Errors registry reserves Error Type 0x3/'ALL' for use by the Lower Layer Protocol (RFC 5041). This entry is the only DDP registry entry allowed to use 'ALL' for Error Code, making it a uniquely scoped reservation rather than an Error-Type-wide catch-all.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
