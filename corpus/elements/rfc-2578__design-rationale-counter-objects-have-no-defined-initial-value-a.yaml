document: rfc-2578
kind: design-rationale
summary: Counter objects have no defined initial value; a single counter reading has no information content in general. Discontinuities at re-initialization or row creation must be tracked with a companion timestamp object (e.g., TimeStamp or DateAndTime).
section: 7.1.6
topics:
