document: rfc-5026
kind: normative-requirement
summary: If the Mobile Node wants the HA to register the Home Address in the DNS, it MUST use the FQDN as the initiator identity (IDi) in the IKE_AUTH step of the IKEv2 exchange, to prove ownership of the FQDN provided in the DNS Update Option.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ipsec
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
