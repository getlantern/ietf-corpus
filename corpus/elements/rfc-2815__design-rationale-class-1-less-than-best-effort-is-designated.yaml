document: rfc-2815
kind: design-rationale
summary: Class 1 ('less than best effort') is designated for penalty-tagging flows that exceed their Tspec allocation, providing isolation from in-contract flows and enabling preferential discard by overloaded downstream devices. Tagging only individual out-of-Tspec packets is discouraged because it causes packet reordering.
section: "3.3"
topics:
    - qos
