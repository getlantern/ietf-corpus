document: rfc-6710
kind: interoperability-note
summary: Senders using the MT-PRIORITY SMTP extension will not be subject to greylisting (RFC 6647) because the extension requires some form of trust/authentication. However, connection-level or EHLO/HELO greylisting may occur before SMTP AUTH or TLS are available.
section: "5.1"
topics:
    - email
