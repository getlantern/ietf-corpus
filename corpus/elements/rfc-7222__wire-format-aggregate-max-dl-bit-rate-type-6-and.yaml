summary: Aggregate-Max-DL-Bit-Rate (Type 6) and Aggregate-Max-UL-Bit-Rate (Type 7), both Length 6, carry a 16-bit Reserved field followed by a 32-bit unsigned integer in bits per second; when used with QoS-Traffic-Selector, enforcement is at flow level for the identified target flows.
