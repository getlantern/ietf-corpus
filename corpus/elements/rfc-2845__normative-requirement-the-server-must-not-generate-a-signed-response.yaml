document: rfc-2845
kind: normative-requirement
summary: 'The server MUST NOT generate a signed response to an unsigned request. When generating a response to a signed request, the digest components are: Request MAC, DNS Message (response), TSIG Variables (response).'
section: "4.2"
rfc2119_level: MUST NOT
topics:
