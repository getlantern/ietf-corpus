document: rfc-3658
kind: normative-requirement
summary: All DNS servers and resolvers that support DS MUST support the OK bit (RFC 3225) and a larger message size (RFC 3226). A delegation is considered secure only if it contains a DS RRset.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
