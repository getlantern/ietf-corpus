document: rfc-4817
kind: normative-requirement
summary: If an MPLS packet is received without IPsec encapsulation, and its topmost label is in the set distributed exclusively to IPsec-secured tunnel heads, then the packet MUST be discarded.
section: "6.3"
rfc2119_level: MUST
