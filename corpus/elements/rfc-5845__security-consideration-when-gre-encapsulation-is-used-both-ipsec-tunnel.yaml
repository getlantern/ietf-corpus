document: rfc-5845
kind: security-consideration
summary: When GRE encapsulation is used, both IPsec tunnel mode and transport mode can protect the GRE header using the GRE protocol number as traffic selector; however, there is currently no mechanism to use the GRE key itself as an IPsec traffic selector.
