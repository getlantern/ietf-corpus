document: rfc-1342
kind: interoperability-note
summary: An encoded-word is recognized by beginning with '=?', ending with '?=', containing exactly four '?' characters, and being followed by a SPACE or newline. If a token does not meet these tests, it should be displayed as-is rather than decoded.
section: Recognition of encoded-words in message headers
topics:
    - email
