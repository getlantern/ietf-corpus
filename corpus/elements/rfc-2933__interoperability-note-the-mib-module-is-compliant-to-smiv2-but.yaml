document: rfc-2933
kind: interoperability-note
summary: The MIB module is compliant to SMIv2 but can be translated to SMIv1 with semantic equivalence, except where Counter64 objects must be omitted since no SMIv1 translation is possible. Some machine-readable SMIv2 information will become textual descriptions in SMIv1, which is not considered a semantic change.
