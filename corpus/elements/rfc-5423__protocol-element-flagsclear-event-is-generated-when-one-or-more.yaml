document: rfc-5423
kind: protocol-element
summary: FlagsClear event is generated when one or more IMAP flags or keywords are cleared on messages. Parameters include the cleared flag/keyword names, a mailbox identifier, and the UIDs of affected messages; \Recent MUST NOT appear in flagNames.
