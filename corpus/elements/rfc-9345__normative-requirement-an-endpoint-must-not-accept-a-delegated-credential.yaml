document: rfc-9345
kind: normative-requirement
summary: An endpoint MUST NOT accept a delegated credential unless the peer's end-entity certificate has the DelegationUsage extension and the digitalSignature KeyUsage. The DelegationUsage extension MUST be marked non-critical.
section: "4.2"
rfc2119_level: MUST NOT
topics:
