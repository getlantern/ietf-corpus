document: rfc-5580
kind: normative-requirement
summary: If the RADIUS server sends no Requested-Location-Info Attribute, the RADIUS client MUST NOT attach location information to messages toward the RADIUS server. User authorization policies MUST be consulted before requesting location delivery.
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - radius
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
