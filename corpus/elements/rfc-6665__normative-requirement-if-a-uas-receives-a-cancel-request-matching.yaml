document: rfc-6665
kind: normative-requirement
summary: If a UAS receives a CANCEL request matching a SUBSCRIBE or NOTIFY transaction, it MUST respond to the CANCEL request but otherwise ignore it; the CANCEL MUST NOT affect processing of the SUBSCRIBE or NOTIFY request in any way.
section: "4.6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
