document: rfc-3311
kind: normative-requirement
summary: UPDATE MAY be sent for both early and confirmed dialogs and by either caller or callee. However, it is RECOMMENDED that re-INVITE be used instead for confirmed dialogs, because UPDATE must be answered immediately without user approval.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
