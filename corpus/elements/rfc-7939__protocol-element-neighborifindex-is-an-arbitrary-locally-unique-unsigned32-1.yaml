document: rfc-7939
kind: protocol-element
summary: NeighborIfIndex is an arbitrary locally unique Unsigned32 (1..2147483647) identifying a virtual neighbor interface discovered via NHDP HELLO messages. Multiple addresses may share one NeighborIfIndex, and its value need not persist across agent restarts.
