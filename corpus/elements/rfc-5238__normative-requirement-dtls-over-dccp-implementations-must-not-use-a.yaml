document: rfc-5238
kind: normative-requirement
summary: DTLS over DCCP implementations MUST NOT use a DTLS record size greater than the DCCP MPS (Maximum Packet Size) currently in force, which is bounded by the congestion control maximum packet size (CCMPS) and can vary over time.
