document: rfc-4251
kind: wire-format
summary: string is an arbitrary-length binary string stored as a uint32 length followed by that many bytes of value. No null terminator is used. US-ASCII is used for internal names; ISO-10646 UTF-8 is used for user-visible text. The terminating null character SHOULD NOT normally be stored.
