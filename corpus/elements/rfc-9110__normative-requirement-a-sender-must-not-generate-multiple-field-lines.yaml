document: rfc-9110
kind: normative-requirement
summary: A sender MUST NOT generate multiple field lines with the same field name in a message unless the field's definition allows comma-separated recombination. A proxy MUST NOT change the order of field line values when forwarding a message.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - http
