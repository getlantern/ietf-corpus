document: rfc-8851
kind: wire-format
summary: 'The ABNF for ''a=rid'' is: ''rid-syntax = %s"a=rid:" rid-id SP rid-dir [ rid-pt-param-list / rid-param-list ]''. The rid-id consists of one or more alphanumeric characters, hyphens, or underscores. The float-param-val for max-bpp is encoded as ''1*DIGIT "." 1*DIGIT''.'
