document: rfc-3578
kind: normative-requirement
summary: SIP overlap signalling should not be used when attempting to reach parts of the PSTN where a telephone number and a shorter prefix of that number could both be valid addresses of different terminals, as this could result in contacting the wrong destination.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - voip
    - realtime
