document: rfc-1894
kind: normative-requirement
summary: 'The Action field MUST be present for each recipient and takes one of five values: "failed", "delayed", "delivered", "relayed", or "expanded". "delivered" and "failed" are terminal states; "delayed" and "expanded" are not.'
section: 2.3.3
rfc2119_level: MUST
topics:
    - email
