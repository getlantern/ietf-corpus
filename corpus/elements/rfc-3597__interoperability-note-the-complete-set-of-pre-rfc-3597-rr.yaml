document: rfc-3597
kind: interoperability-note
summary: 'The complete set of pre-RFC 3597 RR types containing embedded domain names whose DNSSEC canonical form involves downcasing are: NS, MD, MF, CNAME, SOA, MB, MG, MR, PTR, HINFO, MINFO, MX, RP, AFSDB, RT, SIG, PX, NXT, NAPTR, KX, SRV, DNAME, and A6. Implementors should apply downcasing only to these types.'
section: "7"
topics:
    - dns
    - security
