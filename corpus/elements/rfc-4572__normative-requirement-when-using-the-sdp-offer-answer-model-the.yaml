document: rfc-4572
kind: normative-requirement
summary: When using the SDP offer/answer model, the client (setup:active role) MUST also present a certificate. The server MUST request a certificate; if the client does not provide one or if it does not match the fingerprint, the server MUST terminate the media connection with a bad_certificate error.
section: "6.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
