document: rfc-4305
kind: security-consideration
summary: Security of cryptographic systems depends on both the strength of the chosen algorithms and the keys used; it also depends on correct protocol engineering to eliminate non-cryptographic bypass paths. All algorithms currently specified are believed unbroken but may be compromised in the future, necessitating periodic document updates.
