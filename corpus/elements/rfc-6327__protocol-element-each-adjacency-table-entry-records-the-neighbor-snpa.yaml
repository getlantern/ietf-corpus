summary: Each adjacency table entry records the neighbor SNPA (48-bit MAC), Port ID, and System ID; two 16-bit unsigned Hello holding timers (Designated VLAN and non-Designated VLAN, in seconds); the neighbor's 7-bit DRB priority; and the neighbor's desired Designated VLAN.
