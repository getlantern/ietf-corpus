summary: The t11FcRouteCompliance MODULE-COMPLIANCE statement mandates the t11FcRouteGroup and permits read-only MIN-ACCESS for t11FcRouteIfDown, t11FcRouteDomainId, t11FcRouteMetric, t11FcRouteType, t11FcRouteStorageType, and t11FcRouteRowStatus, meaning write access to these objects is optional for conformant implementations.
