document: rfc-3060
kind: normative-requirement
summary: The evaluation of a PolicyRule MUST be attempted if the Mandatory property value is TRUE. If Mandatory is FALSE, evaluation is best-effort and MAY be ignored.
section: 6.3.5
rfc2119_level: MUST
