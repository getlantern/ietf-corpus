summary: 'Four initially defined mechanism-name tokens: ''tls'' for TLS, ''digest'' for HTTP Digest, ''ipsec-ike'' for IPsec with IKE, and ''ipsec-man'' for manually keyed IPsec without IKE. A fifth, ''ipsec-3gpp'', is registered for 3GPP IMS use (defined in Appendix A).'
