document: rfc-5732
kind: design-rationale
summary: A host is classified as "external" when its name does not belong to the namespace of the repository in which it is used for delegation, and as "internal" (subordinate) when it does. This distinction drives different operational rules, such as when IP addresses are required for glue records.
section: "1.1"
topics:
    - dns
