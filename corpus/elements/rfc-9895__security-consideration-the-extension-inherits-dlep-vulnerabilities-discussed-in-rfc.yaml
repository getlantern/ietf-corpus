document: rfc-9895
kind: security-consideration
summary: The extension inherits DLEP vulnerabilities discussed in RFC 8175, including the risk of an injected message resizing a credit window to a value that causes a denial of service. The security mechanisms from RFC 8175 apply equally to this extension.
