document: rfc-9305
kind: security-consideration
summary: LISP-GPE is subject to on-path adversaries that can arbitrarily modify the P-bit or payload type claims. Typical integrity protection mechanisms such as IPsec SHOULD be used in combination with LISP-GPE by protocol extensions that want to protect against on-path attackers.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - ip
    - ipsec
