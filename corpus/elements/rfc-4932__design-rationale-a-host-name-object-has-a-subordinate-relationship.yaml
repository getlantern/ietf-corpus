document: rfc-4932
kind: design-rationale
summary: A host name object has a subordinate relationship to a superordinate domain name object (e.g., 'ns1.example.com' is subordinate to 'example.com'). A host used as a name server for a domain in the same repository must be treated as an internal host, even if it is not subordinate to that specific domain.
section: "1.1"
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
