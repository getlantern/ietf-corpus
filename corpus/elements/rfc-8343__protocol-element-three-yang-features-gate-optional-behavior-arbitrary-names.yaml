document: rfc-8343
kind: protocol-element
summary: 'Three YANG features gate optional behavior: ''arbitrary-names'' (device allows freely named user-controlled interfaces), ''pre-provisioning'' (interface config may be added before hardware is present), and ''if-mib'' (device implements the IF-MIB, enabling admin-status, if-index, and link-up-down-trap-enable nodes).'
