document: rfc-6241
kind: security-consideration
summary: NETCONF provides management access equivalent to the device's native CLI, which often grants superuser-level privileges. Compromising a NETCONF session gives full control over the device; implementations must ensure strong transport-layer security and careful access control configuration.
section: "9"
topics:
    - netconf
    - security
