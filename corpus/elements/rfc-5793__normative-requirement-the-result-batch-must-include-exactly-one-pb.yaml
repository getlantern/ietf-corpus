document: rfc-5793
kind: normative-requirement
summary: The RESULT batch MUST include exactly one PB-Assessment-Result message and MUST NOT appear in any other batch type. The Posture Broker Client MUST NOT send this message type. The Posture Broker Client MUST implement and process this message and MUST ignore instances not in a RESULT batch.
section: "4.6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
