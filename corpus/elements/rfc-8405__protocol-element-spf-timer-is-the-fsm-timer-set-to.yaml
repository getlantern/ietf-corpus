document: rfc-8405
kind: protocol-element
summary: SPF_TIMER is the FSM timer set to the computed SPF delay (INITIAL_, SHORT_, or LONG_SPF_DELAY) upon IGP events. Upon expiration in any state, the routing table computation is performed.
