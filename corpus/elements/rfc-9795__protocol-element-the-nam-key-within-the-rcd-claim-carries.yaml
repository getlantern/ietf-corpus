document: rfc-9795
kind: protocol-element
summary: The "nam" key within the "rcd" claim carries the display name of the call originator, corresponding to the SIP From header display-name. It is mandatory in every "rcd" claim; if no name string exists, the value MUST be an empty string, and its syntax MUST follow the display-name ABNF in RFC 3261.
section: 5.1.1
topics:
    - realtime
    - sip
    - jose
