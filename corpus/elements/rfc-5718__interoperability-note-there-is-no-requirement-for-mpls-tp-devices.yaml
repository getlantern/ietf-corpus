document: rfc-5718
kind: interoperability-note
summary: There is no requirement for MPLS-TP devices to support IP or OSI forwarding in the fast path; a node MAY apply layer 3 forwarding in the slow or fast path and MAY discard messages it cannot forward. Protocols using the DCN should make no assumptions about forwarding capabilities unless determined a priori or via routing protocol.
section: "2"
topics:
    - mpls
