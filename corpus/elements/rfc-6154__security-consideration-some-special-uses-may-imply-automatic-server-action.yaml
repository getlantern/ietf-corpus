document: rfc-6154
kind: security-consideration
summary: Some special uses may imply automatic server action (e.g., creating \Junk may cause the server to route spam there). Implementors SHOULD consider the consequences of allowing a user or client to designate the target of such automatic action, particularly the risk of false positives being deposited into a shared mailbox and exposing private mail to others.
section: "7"
rfc2119_level: SHOULD
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
