document: rfc-3389
kind: security-consideration
summary: CN RTP packets are subject to the general RTP security considerations (RFC 1889). Confidentiality is achieved by encryption, which MAY be performed after encapsulation with no conflict. Because the payload carries only background noise, there are no significant security, confidentiality, or authentication concerns specific to this format.
