kind: wire-format
summary: Sub-TLV 18 (TE Default Metric) carries a 24-bit unsigned integer representing an administratively assigned metric for TE SPF calculations. It is 3 octets in length and SHOULD appear at most once per Extended IS Reachability TLV entry.
