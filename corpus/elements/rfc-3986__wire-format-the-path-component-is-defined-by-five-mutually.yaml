document: rfc-3986
kind: wire-format
summary: 'The path component is defined by five mutually exclusive rules: path-abempty (begins with "/" or empty), path-absolute (begins with "/" but not "//"), path-noscheme (no leading colon), path-rootless, and path-empty. Dot-segments "." and ".." are removed during resolution.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
