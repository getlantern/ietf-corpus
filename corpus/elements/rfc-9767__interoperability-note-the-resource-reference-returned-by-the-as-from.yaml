document: rfc-9767
kind: interoperability-note
summary: The resource_reference returned by the AS from resource set registration is opaque to both the RS and the client. Implementations that embed structured data or predictable patterns in resource references risk creating hidden dependencies that break separation of concerns between GNAP roles.
section: "6.9"
topics:
    - oauth
    - security
