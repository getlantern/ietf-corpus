document: rfc-9007
kind: security-consideration
summary: To reinforce trust regarding the relation between the user sending a message and their identity, the server SHOULD validate that the user is permitted to use the provided 'finalRecipient' value in conformance with the Identity, and return a 'forbiddenFrom' error if not.
