document: rfc-7293
kind: design-rationale
summary: The SMTP extension is preferred over the header field because it provides positive confirmation of support at each handling node and enables end-to-end rejection when support cannot be confirmed; the header field is 'best-effort' only, cannot guarantee enforcement, and is more prone to privacy exposure.
section: "3"
topics:
    - email
    - privacy
