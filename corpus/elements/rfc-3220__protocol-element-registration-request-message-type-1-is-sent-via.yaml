summary: 'Registration Request message (Type 1) is sent via UDP to port 434 and contains: Type (1 byte), flags S/B/D/M/G/r/T/x (1 byte), Lifetime (2 bytes, 0=deregister, 0xffff=infinity), Home Address (4 bytes), Home Agent (4 bytes), Care-of Address (4 bytes), Identification (8 bytes), followed by extensions including a mandatory authorization-enabling extension.'
