document: rfc-1596
kind: design-rationale
summary: The MIB models only a single Frame Relay service offering from one network provider. For end-to-end PVCs traversing multiple networks, customers must poll a separate proxy agent per network. This reflects the CNM proxy-agent architecture defined in the Service Management Architecture for Virtual Connection Services.
section: "3.1"
topics:
    - routing
