document: rfc-4483
kind: design-rationale
summary: Content indirection is motivated by bandwidth-limited environments (e.g., cellular wireless), where moving large content out of the SIP signaling path to a separate data channel reduces latency and proxy overload. The mechanism is intended as a transport alternative only, not a semantic change.
