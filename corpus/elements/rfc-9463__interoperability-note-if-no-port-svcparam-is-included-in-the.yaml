document: rfc-9463
kind: interoperability-note
summary: 'If no port SvcParam is included in the Encrypted DNS option, default port numbers apply: 853 for DoT, 443 for DoH, and 853 for DoQ. Implementations MUST use these defaults when the port parameter is absent.'
