document: rfc-3369
kind: wire-format
summary: 'Block cipher content-encryption padding: input is padded at the trailing end with k-(lth mod k) octets each having value k-(lth mod k), where k is the block size. All input is padded including lengths already a multiple of k. Valid only when k < 256.'
section: "6.3"
