summary: The ospfIfTable (OID ospf 7) augments the ifTable with OSPF-specific interface parameters including ospfIfType (broadcast/nbma/pointToPoint), ospfIfRtrPriority, ospfIfTransitDelay, ospfIfRetransInterval, ospfIfHelloInterval, ospfIfRtrDeadInterval, ospfIfPollInterval, ospfIfState, ospfIfDesignatedRouter, ospfIfBackupDesignatedRouter, ospfIfEvents, and ospfIfAuthKey.
