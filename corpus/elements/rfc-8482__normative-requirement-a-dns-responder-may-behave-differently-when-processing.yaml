document: rfc-8482
kind: normative-requirement
summary: A DNS responder MAY behave differently when processing ANY queries received over different transports — for example, providing a conventional ANY response over TCP while using a reduced response mechanism for queries received over UDP. Implementers MAY provide configuration options for this.
section: "4.4"
rfc2119_level: MAY
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
