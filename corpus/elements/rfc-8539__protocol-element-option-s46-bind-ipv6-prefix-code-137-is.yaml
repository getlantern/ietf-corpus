document: rfc-8539
kind: protocol-element
summary: OPTION_S46_BIND_IPV6_PREFIX (code 137) is a DHCPv6 option that conveys a preferred IPv6 prefix hint to the client, indicating which prefix it should use to bind its IPv4 configuration and source softwire tunnel traffic. It contains an 8-bit bindprefix6-len field followed by a variable-length bind-ipv6-prefix field.
section: "6.1"
topics:
