document: rfc-2046
kind: security-consideration
summary: PostScript programs can consume unbounded system resources or loop indefinitely, constituting a denial-of-service threat. Message receiving software should provide mechanisms to abort processing after a reasonable time and limit resource consumption by PostScript interpreters.
section: 4.5.2
topics:
    - email
    - security
