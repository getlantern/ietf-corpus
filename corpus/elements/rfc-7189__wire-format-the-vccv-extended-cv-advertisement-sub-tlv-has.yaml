summary: The VCCV Extended CV Advertisement Sub-TLV has Type = 0x19, a variable-length Length field (minimum 4 bytes, extensions in 4-byte increments), an 8-bit CV Type bitmask, and an 8-bit Reserved field. It is a sub-TLV of the PW Interface Parameters Sub-TLV.
