document: rfc-4930
kind: state-machine
summary: 'The EPP server state machine defines states: Waiting for Client, Prepare Greeting, Waiting for Client Authentication, Processing <login>, Waiting for Command or <hello>, Processing Command, Prepare Response, Prepare Fail Response, and End Session. Transitions are triggered by connection or <hello> receipt, <login> success/failure, command receipt, timeout, and session close.'
section: "2"
extracted_by: claude-sonnet-4-6
