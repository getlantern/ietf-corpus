document: rfc-5844
kind: normative-requirement
summary: If the IPv4 DHCP Support Mode option in the received PBA has the S flag set to 1, the MAG MUST function as a DHCP server for the mobile node. If S=0 or the option is absent, the MAG MUST function as a DHCP relay.
section: 3.2.3.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
