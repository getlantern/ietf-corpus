document: rfc-5908
kind: normative-requirement
summary: If the NTP/SNTP server location is an IPv6 multicast address, the client SHOULD use that address as an NTP multicast group address and listen to messages sent to that group to synchronize its clock.
section: "4"
rfc2119_level: SHOULD
