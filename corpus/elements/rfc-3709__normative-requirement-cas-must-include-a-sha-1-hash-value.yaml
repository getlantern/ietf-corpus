document: rfc-3709
kind: normative-requirement
summary: CAs MUST include a SHA-1 hash value for each referenced file, calculated on the whole file. Clients MUST support SHA-1 and MUST discard logotype data if the computed hash does not match the value in the certificate extension.
section: "4.1"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
