document: rfc-4635
kind: security-consideration
summary: Longer MAC values are believed to provide stronger authentication. While mild truncation may reduce information available to an attacker, excessive truncation weakens authentication by reducing the bits an attacker must overcome by brute force, as described in RFC 2104.
section: "6"
topics:
    - dns
    - crypto
    - security
