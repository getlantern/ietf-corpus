document: rfc-856
kind: design-rationale
summary: 'The meaning of WON''T and DON''T is context-dependent: when the connection is not in binary mode, they mean ''continue in the current mode'' (not necessarily NVT ASCII), to avoid confusion when a non-implementing host refuses a DO TRANSMIT-BINARY while already in EBCDIC or another encoding.'
section: "6"
extracted_by: claude-sonnet-4-6
