document: rfc-5731
kind: interoperability-note
summary: A server announcing support for host objects in its EPP greeting MUST NOT allow domain attributes to describe name server hosts; a server that does not announce host object support MUST allow domain attributes. These two forms (hostObj references vs. hostAttr inline) are mutually exclusive within a single <domain:ns> element.
section: "1.1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
