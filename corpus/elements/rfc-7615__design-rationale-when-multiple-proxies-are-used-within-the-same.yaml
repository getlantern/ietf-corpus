document: rfc-7615
kind: design-rationale
summary: When multiple proxies are used within the same administrative domain (e.g., office and regional caching proxies in a corporate network), credentials generated by the user agent may be passed through the hierarchy, making Proxy-Authentication-Info appear to be forwarded as each proxy sends the same field value.
section: "4"
topics:
