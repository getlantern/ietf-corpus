document: rfc-4930
kind: protocol-element
summary: 'EPP result codes use four decimal digits: the first digit indicates success (1) or failure (2); the second digit categorizes the response (0=syntax, 1=implementation rules, 2=security, 3=data management, 4=server system, 5=connection management); the third and fourth provide detail. Every EPP response MUST include a result code and human-readable description.'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
