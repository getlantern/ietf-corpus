document: rfc-4761
kind: design-rationale
summary: Label blocks allow a PE to send a single BGP Update containing demultiplexors for all remote PEs, rather than N individual messages. This reduces control plane load on originating PEs and on BGP Route Reflectors that distribute the updates.
section: "3.2"
topics:
    - bgp
    - mpls
