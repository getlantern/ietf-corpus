document: rfc-2893
kind: design-rationale
summary: The 'default raw send' mode from RFC 1933, which allowed nodes to send packets directly to IPv4-compatible destinations on the same datalink without encapsulation, was removed because implementation experience showed the added complexity was not justified by the minimal header overhead savings.
