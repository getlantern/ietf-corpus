document: rfc-9826
kind: design-rationale
summary: Timer names in the YANG module use hyphens (e.g., dead-timer, keepalive-timer) in contrast to the camelCase used in the PCEP protocol specification RFC 5440 (e.g., DeadTimer), following standard YANG identifier conventions.
