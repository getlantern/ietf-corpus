document: rfc-3730
kind: normative-requirement
summary: A <login> command MUST be sent before any other EPP command. A <login> MUST be rejected if received within an existing session, and a <logout> MUST be rejected if not preceded by a successful <login>.
section: 2.9.1.1
rfc2119_level: MUST
topics:
    - security
