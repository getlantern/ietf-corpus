document: rfc-9928
kind: normative-requirement
summary: If the DHCPv4 message option is present and correct in a received DHCPV4-RESPONSE, the 4o6RA MUST extract the DHCPv4 message and forward it to the requesting DHCPv4 client, provided the encapsulated DHCPv4-RESPONSE is correct and can be forwarded.
section: "3"
rfc2119_level: MUST
topics:
    - v6ops
    - ip
