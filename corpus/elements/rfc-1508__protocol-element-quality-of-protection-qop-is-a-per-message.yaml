document: rfc-1508
kind: protocol-element
summary: Quality of Protection (QOP) is a per-message integer parameter (qop_req = 0 selects default) allowing callers to trade security processing overhead against protection requirements. Non-default QOP values are mechanism-specific and non-portable; meaningful use requires familiarity with the underlying mechanism's QOP definitions.
section: 1.2.4
topics:
    - security
    - crypto
