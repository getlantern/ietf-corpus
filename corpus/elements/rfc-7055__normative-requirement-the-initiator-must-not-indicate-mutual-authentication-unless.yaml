document: rfc-7055
kind: normative-requirement
summary: The initiator MUST NOT indicate mutual authentication unless all name elements it supplied are returned in a successful channel binding response. If an empty target name is supplied, context establishment MUST fail unless the acceptor supplies an acceptor name response subtoken.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - security
