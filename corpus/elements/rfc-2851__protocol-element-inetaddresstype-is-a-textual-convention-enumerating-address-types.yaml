document: rfc-2851
kind: protocol-element
summary: 'InetAddressType is a textual convention enumerating address types: unknown(0), ipv4(1), ipv6(2), and dns(16). The unknown(0) value MUST be used when the corresponding InetAddress object is a zero-length string. Numeric values are aligned with IANA-ADDRESS-FAMILY-NUMBERS-MIB.'
