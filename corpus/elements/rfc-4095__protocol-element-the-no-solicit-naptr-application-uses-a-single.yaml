document: rfc-4095
kind: protocol-element
summary: The No-Solicit NAPTR application uses a single DNS NAPTR lookup to map a solicitation class keyword to a URI. The DDDS application unique string is a Solicitation Class Keyword as defined in RFC 3865, and the expected output is a URI containing information about that keyword.
