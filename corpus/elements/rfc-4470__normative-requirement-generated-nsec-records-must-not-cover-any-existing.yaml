document: rfc-4470
kind: normative-requirement
summary: Generated NSEC records must not cover any existing names. If a generated NSEC would cover an existing name, a better epsilon function must be used or the nearest existing name must be substituted as the NSEC owner name or next name. If an existing name is used as the NSEC owner name, that name's real NSEC record MUST be returned.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
