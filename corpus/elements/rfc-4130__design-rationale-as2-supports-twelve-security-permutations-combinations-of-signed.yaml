document: rfc-4130
kind: design-rationale
summary: AS2 supports twelve security permutations (combinations of signed/unsigned data, encrypted/unencrypted data, and signed/unsigned/no receipt) to give trading partners full flexibility. Only permutation 12—signed data, encrypted data, signed receipt—provides the complete secure transmission loop required for NRR.
section: "2.4"
topics:
