document: rfc-8834
kind: normative-requirement
summary: If RTP header extensions are used, they MUST be formatted and signaled following RFC 8285. Header extensions MUST only be used for data that can safely be ignored by the recipient without affecting interoperability.
section: "5.2"
rfc2119_level: MUST
