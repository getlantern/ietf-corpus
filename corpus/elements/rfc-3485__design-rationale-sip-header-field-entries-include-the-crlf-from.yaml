document: rfc-3485
kind: design-rationale
summary: 'SIP header field entries include the CRLF from the preceding line as a prefix (e.g., ''[CRLF]From: '') rather than a trailing CRLF. Because header values are typically not part of the static dictionary, the trailing CRLF cannot be incorporated into header entries; the prefix CRLF approach avoids this constraint.'
section: "2"
