document: rfc-5539
kind: security-consideration
summary: The security considerations of both TLS (RFC 5246) and NETCONF (RFC 4741) apply. This document does not introduce new security considerations beyond RFC 4742, but it relies on TLS mutual certificate-based authentication as the sole authentication mechanism.
