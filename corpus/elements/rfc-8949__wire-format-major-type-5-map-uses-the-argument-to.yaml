document: rfc-8949
kind: wire-format
summary: Major type 5 (map) uses the argument to specify the number of key-value pairs, so 2N data items follow interleaved key-then-value. A map with an odd number of items (missing final value) is not well-formed. Duplicate keys make a map invalid though well-formed.
section: "3.1"
topics:
