document: rfc-9492
kind: interoperability-note
summary: 'Standard applications (RSVP-TE, SR Policy, LFA) may continue to use RSVP-TE LSA advertisements when: the application is RSVP-TE, or RSVP-TE is not deployed anywhere, or SR Policy/LFA link sets and attribute values are fully congruent with RSVP-TE. Otherwise, application-specific ASLA advertisements must be used.'
section: "12.1"
topics:
    - routing
