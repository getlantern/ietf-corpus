document: rfc-2486
kind: registry
summary: This document defines the NAI realm namespace and specifies that its administration piggybacks on DNS namespace administration. Rights to use an NAI realm are obtained coincident with acquiring rights to use the corresponding FQDN; using a realm without owning the FQDN is discouraged.
section: "6"
topics:
