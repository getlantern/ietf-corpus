document: rfc-6231
kind: protocol-element
summary: The <dialogprepare> element requests the MS to retrieve and validate an external dialog document or inline <dialog> element. Key attributes include src (URI), type (MIME type), fetchtimeout (default 30s), and optional dialogid. Specifying both inline <dialog> and src is a syntax error (400).
section: 4.2.1
topics:
