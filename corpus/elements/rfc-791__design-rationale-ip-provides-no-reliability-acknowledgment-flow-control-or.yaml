document: rfc-791
kind: design-rationale
summary: IP provides no reliability, acknowledgment, flow control, or sequencing by design. These are intentionally left to higher-level protocols (such as TCP), keeping the IP layer minimal and allowing it to exploit whatever services each underlying network offers.
section: "1.2"
topics:
    - ip
