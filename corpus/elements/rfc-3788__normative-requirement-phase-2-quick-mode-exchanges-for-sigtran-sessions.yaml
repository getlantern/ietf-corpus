document: rfc-3788
kind: normative-requirement
summary: Phase 2 Quick Mode exchanges for SIGTRAN sessions MUST explicitly carry Identity Payload fields (IDci and IDcr). Each ID Payload MUST carry a single IP address and a single non-zero port number, and MUST NOT use IP Subnet or IP Address Range formats, so Phase 2 SAs correspond to specific TCP and SCTP connections.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
