document: rfc-7552
kind: normative-requirement
summary: If a Dual-stack LSR finds the Dual-Stack capability TLV in the incoming LDP Hello messages, it MUST advertise both IPv4 and IPv6 addresses (via Address message) and FEC-label bindings for both address families to that peer.
section: "7.2"
rfc2119_level: MUST
topics:
