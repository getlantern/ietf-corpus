document: rfc-2740
kind: normative-requirement
summary: On all OSPF interfaces except virtual links, OSPF packets MUST be sent using the interface's link-local unicast address as the IPv6 source. Virtual links MUST use a global-scope or site-local IPv6 address as source.
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
