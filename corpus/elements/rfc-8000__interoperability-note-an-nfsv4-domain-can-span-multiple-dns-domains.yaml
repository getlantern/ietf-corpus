document: rfc-8000
kind: interoperability-note
summary: An NFSv4 Domain can span multiple DNS domains (in which case one DNS domain name is chosen as the NFSv4 Domain name), and multiple NFSv4 Domains can share a DNS domain (in which case only one can use the DNS domain name; others must choose unique names).
section: 6.1.1
topics:
    - dns
    - security
