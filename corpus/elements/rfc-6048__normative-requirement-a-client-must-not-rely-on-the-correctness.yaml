document: rfc-6048
kind: normative-requirement
summary: A client MUST NOT rely on the correctness of any cached MOTD results. If a client caches the MOTD, it SHOULD provide a way to force the cached information to be refreshed.
section: 2.5.2
rfc2119_level: MUST NOT
