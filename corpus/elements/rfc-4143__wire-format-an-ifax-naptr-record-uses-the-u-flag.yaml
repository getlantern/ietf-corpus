summary: 'An IFax NAPTR record uses the ''u'' flag, service field ''E2U+ifax:mailto'', and a regex that maps any input to a mailto URI, as shown: IN NAPTR 10 10 "u" "E2U+ifax:mailto" "!^.*$!mailto:toyo@example.com!".'
