document: rfc-9580
kind: normative-requirement
summary: An implementation MUST NOT generate a Legacy format packet with indeterminate length (length-type 3). The Legacy packet format SHOULD NOT be used to generate new data; it is permitted only for consuming historical data.
section: 4.2.2
rfc2119_level: MUST NOT
topics:
    - security
