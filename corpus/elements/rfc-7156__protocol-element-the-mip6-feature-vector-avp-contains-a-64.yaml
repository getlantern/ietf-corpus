document: rfc-7156
kind: protocol-element
summary: The MIP6-Feature-Vector AVP contains a 64-bit flags field used to indicate supported capabilities to the AAA server. This document defines a new flag bit INTER_MAG_ROUTING_SUPPORTED (0x0002000000000000) indicating support or authorization of direct routing of IP packets between MNs anchored to different MAGs without involving any LMA.
section: "4.4"
topics:
    - mobility
    - diameter
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
