document: rfc-3498
kind: protocol-element
summary: 'The apsConfigMode object specifies the APS architecture: onePlusOne (permanently bridges working to protection), oneToN (one protection channel for up to n working channels), onePlusOneCompatible (1+1 bidirectional compatible with ITU-T G.783 Annex A), and onePlusOneOptimized (1+1 bidirectional optimized per ITU-T G.783 Annex B). Default is onePlusOne.'
