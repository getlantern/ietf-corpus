document: rfc-9304
kind: design-rationale
summary: A single shared LISP extension message type (code 15) with sub-types was introduced because the LISP packet type space is limited and experiments for new extensions should not consume a dedicated codepoint for each extension. Sub-types uniquely identify each extension making use of the shared message type.
section: "1"
