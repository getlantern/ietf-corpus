document: rfc-1767
kind: protocol-element
summary: Application/EDI-consent is a MIME content-type for EDI data exchanged under explicit bilateral trading partner agreement. It does not specify details of the EDI objects themselves, only provides a standard wrapping mechanism for non-X12, non-EDIFACT EDI traffic.
