document: rfc-6134
kind: security-consideration
summary: To prevent mailbombs when redirecting to externally stored lists with potentially thousands of recipients, implementations SHOULD enforce limits on the number of recipients and/or the domains to which recipients belong. The "redirect :list :addrbook:default" pattern is particularly prone to accidental or intentional abuse.
section: "3"
topics:
    - email
    - security
