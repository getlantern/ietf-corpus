document: rfc-6793
kind: security-consideration
summary: Assigning a non-mappable four-octet AS number as a 'Member AS Number' in a BGP Confederation before all speakers in the Confederation have transitioned to four-octet support is a misconfiguration that weakens AS path loop detection within the Confederation.
section: "10"
topics:
    - bgp
    - routing
    - security
