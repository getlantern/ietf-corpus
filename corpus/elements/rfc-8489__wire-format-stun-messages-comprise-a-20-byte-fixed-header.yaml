document: rfc-8489
kind: wire-format
summary: 'STUN messages comprise a 20-byte fixed header followed by zero or more TLV attributes. The header contains: STUN Message Type (16 bits), Message Length (16 bits, not including the header), Magic Cookie (32 bits, fixed value 0x2112A442), and Transaction ID (96 bits). All fields are big-endian.'
