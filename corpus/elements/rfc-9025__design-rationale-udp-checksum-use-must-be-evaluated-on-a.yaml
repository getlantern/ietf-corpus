document: rfc-9025
kind: design-rationale
summary: UDP checksum use must be evaluated on a case-by-case basis per network scenario based on the exception criteria in RFC 7510, particularly when IPv6 is used. This reflects a deliberate trade-off between overhead and integrity guarantees in controlled DetNet environments.
