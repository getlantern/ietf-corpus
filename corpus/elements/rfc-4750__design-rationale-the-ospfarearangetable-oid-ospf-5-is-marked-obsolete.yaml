document: rfc-4750
kind: design-rationale
summary: The ospfAreaRangeTable (OID ospf 5) is marked obsolete and replaced by the ospfAreaAggregateTable, which provides a more capable address range summarization mechanism. The obsolete table is retained for backwards compatibility with RFC 1850 implementations.
