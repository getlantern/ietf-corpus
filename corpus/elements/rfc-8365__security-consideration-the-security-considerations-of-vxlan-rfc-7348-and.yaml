document: rfc-8365
kind: security-consideration
summary: The security considerations of VXLAN (RFC 7348) and NVGRE (RFC 7637) apply to the data-plane aspects of this document. As with RFC 5512, any modification of encapsulation header information, tunnel type selection, or tunnel-to-payload mapping may lead to user data packets being misrouted, misdelivered, or dropped.
section: "11"
topics:
    - security
    - routing
