document: rfc-4656
kind: design-rationale
summary: 'OWAMP test traffic is intentionally hard to detect: it is a stream of UDP packets between negotiated ports with negotiated size, and in encrypted mode there is nothing static in the packets. This makes interference or special treatment by intermediaries more difficult, protecting measurement integrity.'
section: "1"
topics:
    - measurement
    - privacy
    - security
