document: rfc-4737
kind: protocol-element
summary: 'Type-P-Packet-Reordering-Gap-Stream measures the arrival-position distance between successive reordering discontinuities: Gap(s[j'']) = j'' - j, where j and j'' are the arrival indexes of two consecutive reordering discontinuities. An optional GapTime metric expresses the same distance in seconds.'
section: "4.5"
