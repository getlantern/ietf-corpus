document: rfc-9820
kind: normative-requirement
summary: It is RECOMMENDED that the EAP authenticator limit the rate at which it processes incoming trigger messages (Step 0) to mitigate denial-of-service attacks. It is also RECOMMENDED to minimize EAP authenticator state until EAP-Resp/Id is received.
section: "8.6"
rfc2119_level: RECOMMENDED
topics:
    - security
