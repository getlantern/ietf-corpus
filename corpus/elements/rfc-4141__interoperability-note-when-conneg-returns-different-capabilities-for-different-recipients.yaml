document: rfc-4141
kind: interoperability-note
summary: When CONNEG returns different capabilities for different recipients of the same message, an intermediary MAY either create a single converted copy acceptable to all recipients, or create multiple copies and send each to an appropriate subset of recipients in separate SMTP sessions.
section: "3"
