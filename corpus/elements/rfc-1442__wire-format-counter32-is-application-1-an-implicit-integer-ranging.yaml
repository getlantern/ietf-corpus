document: rfc-1442
kind: wire-format
summary: Counter32 is APPLICATION 1, an IMPLICIT INTEGER ranging 0..4294967295, which monotonically increases until it wraps at 2^32-1 back to zero. It has no defined initial value; MAX-ACCESS must be read-only and no DEFVAL clause is permitted.
section: 7.1.6
