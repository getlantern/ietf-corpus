document: rfc-5343
kind: design-rationale
summary: RFC 3411 originally requested an IANA registry for SnmpEngineID formats but did not record initial assignments or define allocation rules. RFC 5343 retroactively formalizes those rules, requiring a specification for new format values 1-127 and leaving 128-255 as enterprise-specific.
section: "4"
topics:
