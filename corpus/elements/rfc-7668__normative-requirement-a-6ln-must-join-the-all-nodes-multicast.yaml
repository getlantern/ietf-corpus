document: rfc-7668
kind: normative-requirement
summary: A 6LN MUST join the all-nodes multicast address. There is no need for a 6LN to join the solicited-node multicast address, since the 6LBR tracks all connected 6LN device and link-local addresses.
section: 3.2.2
rfc2119_level: MUST
topics:
