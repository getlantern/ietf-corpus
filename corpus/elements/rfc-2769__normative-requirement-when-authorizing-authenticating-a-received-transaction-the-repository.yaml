document: rfc-2769
kind: normative-requirement
summary: When authorizing/authenticating a received transaction, the repository must not use an object from a repository not mentioned in an 'auth-dependency' meta-object, and should only use object versions within the transaction sequence numbers of the auth-dependency meta-objects.
section: "7.3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
