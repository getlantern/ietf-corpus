document: rfc-8167
kind: protocol-element
summary: 'Forward-direction operation refers to the traditional model where the ONC RPC client acts as Requester and the ONC RPC service acts as Responder. Reverse-direction operation inverts this: the ONC RPC service acts as Requester and the ONC RPC client acts as Responder.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
