document: rfc-946
kind: design-rationale
summary: The TTYLOC mechanism was originally designed for the CMU PUP-based network in 1982 and is being extended into TCP-based networking as a migration path. The option enables existing mechanisms such as FINGER and WHOIS to report terminal location for incoming network connections, where otherwise only the remote host name is available.
section: "4"
