document: rfc-1516
kind: design-rationale
summary: The per-group summary counters (rptrMonitorGroupTotalFrames, rptrMonitorGroupTotalOctets, rptrMonitorGroupTotalErrors) are explicitly redundant sums of per-port counters, included because polling a single group-level counter is a considerable optimization over retrieving all individual port counters.
