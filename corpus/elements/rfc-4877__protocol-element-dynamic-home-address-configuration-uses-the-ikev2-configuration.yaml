document: rfc-4877
kind: protocol-element
summary: 'Dynamic home address configuration uses the IKEv2 Configuration Payload: the mobile node includes a zero-length INTERNAL_IP6_ADDRESS attribute in a CFG_REQUEST; the home agent replies in CFG_REPLY with a 128-bit home address plus prefix length. The home address lifetime is tied to the IKEv2 SA lifetime.'
section: "9"
topics:
    - ipsec
    - mobility
    - ip
