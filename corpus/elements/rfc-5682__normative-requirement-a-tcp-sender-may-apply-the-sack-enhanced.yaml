document: rfc-5682
kind: normative-requirement
summary: A TCP sender MAY apply the SACK-enhanced F-RTO algorithm when SACK is enabled; if it does, it MUST follow the specified steps. The SACK-enhanced algorithm SHOULD NOT be applied if the sender is already in loss recovery when the retransmission timeout occurs.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
