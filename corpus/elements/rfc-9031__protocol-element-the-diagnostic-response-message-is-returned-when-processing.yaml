document: rfc-9031
kind: protocol-element
summary: The Diagnostic Response message is returned when processing of a CoJP request payload fails. It maps to a CoAP 4.00 (Bad Request) response carrying an Unsupported_Configuration CBOR object identifying the parameter and error code that triggered the failure.
