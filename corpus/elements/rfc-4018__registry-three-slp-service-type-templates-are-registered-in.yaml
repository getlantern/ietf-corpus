summary: 'Three SLP service type templates are registered in the IANA ''SVRLOC Templates'' registry: ''service:iscsi'' (abstract), ''service:iscsi:target'' (concrete, for iSCSI targets), and ''service:iscsi:sms'' (concrete, for storage management servers). Registration process is per RFC 2609.'
