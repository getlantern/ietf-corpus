document: rfc-6913
kind: design-rationale
summary: While SDP is generally preferred for capability negotiation in SIP, fax is unique in that the ultimate intention of the call is not accurately signaled in the initial SDP exchange—T.38 or other fax transport protocols are not known at INVITE time. This justifies a media feature tag approach for pre-call fax capability advertisement.
section: "3"
topics:
