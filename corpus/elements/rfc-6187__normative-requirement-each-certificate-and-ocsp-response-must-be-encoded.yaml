document: rfc-6187
kind: normative-requirement
summary: Each certificate and OCSP response MUST be encoded as a DER-encoded ASN.1 octet string. The sender's certificate MUST be first, and the public key it conveys MUST be consistent with the public key algorithm used to authenticate the sender.
section: "2.1"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
