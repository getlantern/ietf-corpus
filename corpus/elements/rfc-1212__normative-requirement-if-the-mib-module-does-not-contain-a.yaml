document: rfc-1212
kind: normative-requirement
summary: If the MIB module does not contain a textual description of the object type elsewhere, the DESCRIPTION clause must be present. The clause must provide all semantic definitions necessary for implementation; its entire value must be enclosed in double quotation marks.
section: 4.1.4
rfc2119_level: MUST
