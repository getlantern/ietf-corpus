document: rfc-2181
kind: normative-requirement
summary: SOA records, if added to an authoritative answer, are to be placed in the authority section, not the additional section. RFC1034 section 4.3.4's mention of the additional section for SOA in negative caching is incorrect.
section: "7.1"
rfc2119_level: MUST
topics:
    - dns
