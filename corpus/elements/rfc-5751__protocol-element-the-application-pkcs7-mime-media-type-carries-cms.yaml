document: rfc-5751
kind: protocol-element
summary: 'The application/pkcs7-mime media type carries CMS EnvelopedData, SignedData, and CompressedData content types. The optional ''smime-type'' parameter provides a hint about the content: ''enveloped-data'', ''signed-data'', ''certs-only'', or ''compressed-data''. File extensions are .p7m (signed/enveloped), .p7c (certs-only), .p7z (compressed).'
section: "3.2"
