document: rfc-8981
kind: normative-requirement
summary: The pseudorandom function F() used for IID generation MUST NOT be computable from the outside (without knowledge of the secret key) and MUST be difficult to reverse so that it resists attempts to recover the secret_key from output samples.
section: 3.3.2
rfc2119_level: MUST NOT
