document: rfc-9925
kind: normative-requirement
summary: Senders MAY set the issuer field to the subject (mimicking a self-signed certificate) for interoperability with applications that expect matching issuer and subject, but this is explicitly a placeholder value; the unsigned certificate is not considered self-signed or self-issued.
section: "3.2"
rfc2119_level: MAY
