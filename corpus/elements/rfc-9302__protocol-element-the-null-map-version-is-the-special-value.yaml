document: rfc-9302
kind: protocol-element
summary: The Null Map-Version is the special value 0x000 (zero), signaling that no version number is associated with the mapping. It is used by Proxy-ITRs that cannot provide a Source Map-Version and to indicate that the V-bit MUST NOT be set in encapsulated packets for the associated EID-Prefix.
section: "6.1"
topics:
    - routing
    - ip
