document: rfc-5491
kind: interoperability-note
summary: The Ellipse and Circle shapes MUST be specified using a 2D CRS; a point with uncertainty in three dimensions must use the Sphere shape type, as the orientation of a circle cannot be correctly specified in 3D using these representations.
section: 5.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
