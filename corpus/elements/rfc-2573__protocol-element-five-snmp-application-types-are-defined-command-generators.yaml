document: rfc-2573
kind: protocol-element
summary: 'Five SNMP application types are defined: Command Generators (initiate Read/Write-Class requests), Command Responders (respond to Read/Write-Class requests), Notification Originators (generate Notification-Class PDUs), Notification Receivers (receive Notification-Class PDUs), and Proxy Forwarders (forward SNMP messages). Multiple application types may coexist within a single SNMP engine.'
section: "1"
topics:
