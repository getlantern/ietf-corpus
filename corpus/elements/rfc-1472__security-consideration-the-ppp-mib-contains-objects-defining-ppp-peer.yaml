document: rfc-1472
kind: security-consideration
summary: The PPP MIB contains objects defining PPP Peer Identities (analogous to userids) and authentication secrets (analogous to passwords). An intruder with write access could disable PPP security entirely by manipulating security configuration variables.
section: "6"
topics:
