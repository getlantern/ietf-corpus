document: rfc-4149
kind: security-consideration
summary: The MIB can configure arbitrary packet sizes, injection rates, source/destination addresses, and routing options. If access is compromised, it can be exploited to launch denial-of-service attacks. The sspmGeneralMinFrequency object bounds the maximum packet generation rate a device is willing to support.
