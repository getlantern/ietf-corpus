document: rfc-7941
kind: privacy-consideration
summary: SDES items like NAME and LOC are highly sensitive from a privacy perspective and should not be transported over the network without strong security. No use case requires such information at the time of the first RTP packets, so they are excluded from registration for use with this header extension.
section: "1"
topics:
    - rtp
    - privacy
    - realtime
