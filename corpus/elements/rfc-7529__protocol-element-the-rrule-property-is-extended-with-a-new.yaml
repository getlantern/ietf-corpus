document: rfc-7529
kind: protocol-element
summary: The RRULE property is extended with a new RSCALE element specifying the calendar system for generating the recurrence pattern. All DATE, DATE-TIME, and PERIOD values continue to use the Gregorian format; only the recurrence expansion logic uses the non-Gregorian system.
