document: rfc-4362
kind: normative-requirement
summary: The decompressor is REQUIRED to handle a CCP with C=1 and perform context verification. The received CRC MUST be applied to the last decompressed packet unless a packet loss indication was previously received. Upon CRC failure, actions in RFC 3095 Section 5.3.2.2.3 steps a-d MUST be taken. A CCP with C=0 MUST be ignored.
section: 4.1.3
rfc2119_level: REQUIRED
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
