document: rfc-7694
kind: design-rationale
summary: The most common expected use of 'Accept-Encoding' in responses is with a 415 status code, in reply to a client's optimistic use of a content coding. The header can also be included in 2xx responses to proactively inform clients that compression is supported when the request payload was large enough to warrant it.
section: "3"
topics:
