document: rfc-2381
kind: protocol-element
summary: ATM subnet-specific GS Adspec components are C_ATM (set to zero for a 'pure delay' element unless ATM service rate equals R) and D_ATM (captures CDV/variable queueing delay). When an RESV triggers VC setup, CDV and CTD are set as CDV=D_ATM+S_ATM and CTD=D_ATM+MPL+S_ATM using available slack.
section: "3.3"
