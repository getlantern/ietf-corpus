document: rfc-9356
kind: security-consideration
summary: If the protocol is used in an environment where unauthorized physical access to links occurs, attacks are possible. Use of OSPF authentication as defined in RFC 5709, RFC 7474, RFC 4552, and RFC 7166 is recommended for preventing such attacks.
