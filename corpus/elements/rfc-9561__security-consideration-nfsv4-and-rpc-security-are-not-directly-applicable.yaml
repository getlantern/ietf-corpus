document: rfc-9561
kind: security-consideration
summary: NFSv4 and RPC security are not directly applicable to I/Os to NVMe data servers. Security for NVMe traffic operates at a different granularity and identity model than NFSv4; the pNFS client is responsible for enforcing appropriate correspondences between these security layers.
section: "3"
topics:
    - security
