document: rfc-5629
kind: normative-requirement
summary: The application MUST be prepared to time out and never receive input from a user, since there is no mechanism for a presentation-capable UI to report to the application that the user dismissed the UI component. The duration of this timeout is application-dependent.
section: 8.1.4
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
