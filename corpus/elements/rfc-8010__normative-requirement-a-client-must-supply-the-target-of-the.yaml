document: rfc-8010
kind: normative-requirement
summary: A Client MUST supply the target of the operation both as an operation attribute in the application/ipp body and as a URI at the HTTP layer. The target URI in the IPP operation attribute MUST be an absolute URI.
section: "4.1"
rfc2119_level: MUST
topics:
    - http
