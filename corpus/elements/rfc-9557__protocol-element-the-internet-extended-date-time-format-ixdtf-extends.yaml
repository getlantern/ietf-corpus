document: rfc-9557
kind: protocol-element
summary: The Internet Extended Date/Time Format (IXDTF) extends RFC 3339 by appending an optional suffix to a date-time value. The suffix consists of an optional time zone bracket tag followed by zero or more key=value bracket tags, each optionally marked critical with '!'.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
