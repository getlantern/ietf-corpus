document: rfc-5936
kind: normative-requirement
summary: The AXFR response MUST have ID copied from the request, QR=1, OPCODE=0, TC=0, NSCOUNT=0. If RCODE is NoError(0), the AA bit MUST be 1. The server MUST set Z, AD, and CD bits to 0.
section: 2.2.1
rfc2119_level: MUST
topics:
