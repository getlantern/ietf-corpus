document: rfc-7250
kind: protocol-element
summary: Two new TLS extensions, client_certificate_type and server_certificate_type, are defined for negotiating certificate types during the TLS/DTLS handshake. These extensions are carried in both the ClientHello and ServerHello messages and allow raw public keys to be indicated alongside X.509 and other certificate types.
section: "3"
topics:
