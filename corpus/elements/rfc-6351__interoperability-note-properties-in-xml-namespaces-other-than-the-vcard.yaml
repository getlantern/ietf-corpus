document: rfc-6351
kind: interoperability-note
summary: Properties in XML namespaces other than the vCard 4 namespace are wrapped as-is inside an XML property when converting xCard to vCard. Conversely, the content of XML properties in plain-text vCard is copied as-is to XML.
section: "6"
