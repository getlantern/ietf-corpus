document: rfc-5031
kind: design-rationale
summary: The tel:NNN;context=+C approach was rejected because proxies would need to know all number-context combinations worldwide and track changes; also, many emergency numbers double as non-emergency numbers in other countries (e.g., 00 in Paraguay is also the US international operator prefix).
section: A
