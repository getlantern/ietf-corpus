document: rfc-7213
kind: normative-requirement
summary: If existing mechanisms such as ARP, IPv6 Neighbor Discovery, or LLDP are available to determine destination unicast MAC addresses, these methods SHOULD be used. If none are available and both peers implement the GAP procedures in Section 4, the GAP mechanism SHOULD be used.
section: "2"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
