document: rfc-5120
kind: design-rationale
summary: 'New TLVs were introduced instead of sub-TLVs inside existing TLV type-22 and type-135 because: (1) multi-topologies are often non-congruent so sub-TLVs don''t save LSP space; (2) TLV type-22 is already near its size limit with existing sub-TLVs; (3) new TLVs can automatically inherit TE attributes defined for the standard topology without re-standardization.'
section: "7"
