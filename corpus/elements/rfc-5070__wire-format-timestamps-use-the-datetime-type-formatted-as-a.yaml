document: rfc-5070
kind: wire-format
summary: Timestamps use the DATETIME type formatted as a subset of ISO 8601:2000 per RFC 3339 (xs:dateTime). Port lists (PORTLIST) use a comma-separated list of numbers and ranges matching '\d+(\-\d+)?(,\d+(\-\d+)?)*', e.g., '2,5-15,30,32'. Timezone offsets follow 'Z|[\+\-](0[0-9]|1[0-4]):[0-5][0-9]'.
section: "2.8"
topics:
    - security
