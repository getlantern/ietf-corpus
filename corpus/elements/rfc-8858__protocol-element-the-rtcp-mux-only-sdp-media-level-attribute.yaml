document: rfc-8858
kind: protocol-element
summary: The 'rtcp-mux-only' SDP media-level attribute is defined to indicate exclusive support of RTP/RTCP multiplexing. It has no value (N/A), is not charset dependent, and its syntax is simply 'a=rtcp-mux-only'.
