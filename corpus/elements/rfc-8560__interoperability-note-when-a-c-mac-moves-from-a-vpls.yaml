document: rfc-8560
kind: interoperability-note
summary: When a C-MAC moves from a VPLS PE to an EVPN PE and only known unicast traffic follows, VPLS PEs (but not EVPN PEs) will black-hole traffic to the moved C-MAC until BUM traffic is originated with the moved MAC as source. This asymmetric black-holing is characteristic of VPLS behavior.
section: "3.3"
topics:
    - mpls
