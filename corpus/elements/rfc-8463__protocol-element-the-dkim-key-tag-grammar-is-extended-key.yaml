document: rfc-8463
kind: protocol-element
summary: 'The DKIM key tag grammar is extended: ''key-k-tag-type =/ "ed25519"'' is added to the existing ABNF rule in RFC 6376, Section 3.6.1. The DNS record for an Ed25519 verification key uses the tag ''k=ed25519''.'
section: "4.2"
