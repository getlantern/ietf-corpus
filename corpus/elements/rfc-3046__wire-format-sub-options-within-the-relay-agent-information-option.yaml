document: rfc-3046
kind: wire-format
summary: Sub-options within the Relay Agent Information option are encoded as SubOpt/Len/Value tuples. No pad sub-option is defined, and the field SHALL NOT be terminated with sub-option 255. Sub-option length N counts only that sub-option's value octets; a zero-length sub-option value is permitted.
section: "2.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
