document: rfc-8817
kind: wire-format
summary: In the preferred TSVCIS packing format (for TC ≤ 77 octets), a single trailing octet is appended after the TC packed parameter octets containing CODA=1, CODB=1, and a 6-bit Modified Count (MTC = TC − 15). The MTC value of all-ones (63) is reserved for the alternate format.
