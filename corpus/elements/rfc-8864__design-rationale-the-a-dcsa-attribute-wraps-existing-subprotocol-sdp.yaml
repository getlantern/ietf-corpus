document: rfc-8864
kind: design-rationale
summary: The 'a=dcsa:' attribute wraps existing subprotocol SDP attributes rather than defining new ones, on the basis that subprotocol-related media-level attributes are generally independent of the transport protocol. This allows reuse of existing subprotocol specifications without modification.
section: "5.2"
topics:
