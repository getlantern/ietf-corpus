document: rfc-8154
kind: normative-requirement
summary: A pNFS server MUST avoid partial-block write conflicts by implementing a concurrency control policy of single writer XOR multiple readers for a given data block, since SCSI storage does not provide byte-granularity access.
section: 2.4.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
