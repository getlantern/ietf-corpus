document: rfc-8551
kind: normative-requirement
summary: 'Receiving agents MUST support ECDSA with curve P-256 and SHA-256, MUST support EdDSA with curve25519 in PureEdDSA mode (RFC 8419), and MUST- support RSA PKCS #1 v1.5 with SHA-256. Sending agents MUST support at least one of ECDSA/P-256/SHA-256 or EdDSA/curve25519.'
section: "2.2"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
    - pkix
