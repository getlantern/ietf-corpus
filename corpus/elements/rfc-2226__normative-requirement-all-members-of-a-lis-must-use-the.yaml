document: rfc-2226
kind: normative-requirement
summary: All members of a LIS MUST use the all ones broadcast group (255.255.255.255) in MARS when registering to receive broadcast transmissions, to ensure consistency and support diskless boot clients that cannot determine their subnet.
section: "3"
rfc2119_level: MUST
