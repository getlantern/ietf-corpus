document: rfc-8384
kind: security-consideration
summary: Smart Endnodes can forge both outer and inner MAC addresses and can send data in any Data Label, bypassing Data Label-based security policies. End-to-end encryption and authentication between source and destination end stations is recommended as a countermeasure.
