document: rfc-5944
kind: normative-requirement
summary: The foreign agent MUST NOT increase the Lifetime selected by the mobile node in the Registration Request, and the home agent MUST NOT increase it either. If the Reply Lifetime exceeds the Request Lifetime, the Request value MUST be used.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
