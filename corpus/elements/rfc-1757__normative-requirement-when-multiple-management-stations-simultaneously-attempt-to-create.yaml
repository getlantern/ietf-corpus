document: rfc-1757
kind: normative-requirement
summary: 'When multiple management stations simultaneously attempt to create the same conceptual row, only the first will succeed; others receive an error. EntryStatus object creation is the atomic collision-detection point: if the object already exists, the creation attempt is rejected.'
section: "3.2"
rfc2119_level: MUST
topics:
