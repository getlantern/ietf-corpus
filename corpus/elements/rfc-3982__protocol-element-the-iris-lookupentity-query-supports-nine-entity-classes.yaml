kind: protocol-element
summary: 'The <iris:lookupEntity> query supports nine entity classes: host-name, host-handle, domain-name, idn, domain-handle, contact-handle, ipv4-address, ipv6-address, and registration-authority. All names in these entity classes are case insensitive.'
