document: rfc-5892
kind: protocol-element
summary: The contextual rule for U+200C (ZERO WIDTH NON-JOINER) permits its use in formally cursive scripts (e.g., Persian) where it breaks a required cursive connection, or in Indic scripts immediately following a character with Canonical_Combining_Class equal to Virama. The rule also permits it when it appears between characters with appropriate Joining_Type values (L or D on the left, R or D on the right, with optional T characters in between).
section: A.1
topics:
    - dns
