document: rfc-6531
kind: registry
summary: 'IANA updated the SMTP Enhanced Status Code registry with three new codes from RFC 6531: X.6.7 (non-ASCII addresses not permitted, basic codes 550/553), X.6.8 (UTF-8 reply required but not permitted by client, basic codes 252/550/553), and X.6.9 (UTF-8 header message cannot be transferred, basic code 550). X.6.10 is deprecated as a duplicate of X.6.8.'
section: "4.2"
