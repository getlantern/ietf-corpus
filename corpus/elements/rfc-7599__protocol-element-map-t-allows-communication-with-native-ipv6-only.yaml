document: rfc-7599
kind: protocol-element
summary: MAP-T allows communication with native IPv6-only servers in the MAP-T domain by configuring those servers with IPv4-mapped IPv6 addresses drawn from the DMR IPv6 prefix space. Such servers SHOULD have both A and AAAA DNS records; DNS64 is only required when IPv6-only servers need to initiate connections to external IPv4-only hosts.
section: "12.3"
topics:
    - nat
    - v6ops
    - dns
