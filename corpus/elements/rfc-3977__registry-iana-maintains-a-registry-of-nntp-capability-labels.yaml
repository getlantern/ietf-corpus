document: rfc-3977
kind: registry
summary: IANA maintains a registry of NNTP capability labels. All registered labels MUST be keywords and MUST NOT begin with 'X'. The initial entries include VERSION, READER, IHAVE, POST, NEWNEWS, HDR, OVER, LIST, IMPLEMENTATION, MODE-READER, AUTHINFO, SASL, STARTTLS, and STREAMING.
section: 3.3.4
