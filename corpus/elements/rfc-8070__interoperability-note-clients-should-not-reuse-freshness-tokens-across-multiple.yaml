document: rfc-8070
kind: interoperability-note
summary: Clients SHOULD NOT reuse freshness tokens across multiple exchanges, as there is no guarantee a KDC will accept a previously valid token again; clients that reuse tokens may fail to interoperate with certain KDC implementations.
section: "7"
rfc2119_level: SHOULD NOT
