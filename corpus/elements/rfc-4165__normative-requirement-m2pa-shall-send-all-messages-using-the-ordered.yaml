document: rfc-4165
kind: normative-requirement
summary: M2PA SHALL send all messages using the ordered delivery option of SCTP. M2PA SHOULD give higher priority to messages on the Link Status stream than on the User Data stream, and higher priority to SCTP notifications than to reading either stream.
section: 4.1.8
rfc2119_level: MUST
topics:
    - sctp
