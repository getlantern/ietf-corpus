document: rfc-6062
kind: normative-requirement
summary: When a client data connection is closed, the server MUST close the corresponding peer data connection, and vice versa. If the allocation associated with a data connection expires, the data connection MUST be closed.
section: "5.5"
rfc2119_level: MUST
topics:
    - nat
    - tcp
