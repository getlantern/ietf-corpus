document: rfc-3156
kind: normative-requirement
summary: OpenPGP signed messages MUST use multipart/signed with a "protocol" parameter value of "application/pgp-signature" (MUST be quoted). The "micalg" parameter MUST contain exactly one hash-symbol of the format "pgp-<hash-identifier>".
section: "5"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
