document: rfc-8918
kind: errata
summary: RFC 6232 erroneously set the LSP column to 'y' for the Purge Originator Identification (POI) TLV in the IANA section, contradicting the normative text which states the POI TLV MUST NOT be found in LSPs with a non-zero Remaining Lifetime. The correct value is 'n'.
section: "3.4"
topics:
    - routing
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
