document: rfc-8470
kind: normative-requirement
summary: A server MUST NOT act on early data before the TLS handshake completes if it and any other server instance could make a different decision about how to handle the same data, to prevent inconsistent replay handling across instances.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - http
    - tls
    - security
