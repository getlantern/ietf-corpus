document: rfc-6704
kind: design-rationale
summary: The Forcerenew Nonce Authentication protocol was introduced because RFC 3118 authentication—mandatory for FORCERENEW per RFC 3203—requires out-of-band distribution of shared secrets to DHCP clients, which is operationally burdensome and has severely limited adoption of DHCP FORCERENEW. The nonce-based approach, mirroring RFC 3315 (DHCPv6), eliminates the out-of-band key distribution requirement.
section: "1"
topics:
