document: rfc-5424
kind: interoperability-note
summary: RFC 5424 retains the BSD syslog PRI syntax and semantics from RFC 3164 to allow legacy implementations to bin messages correctly. The TAG field from RFC 3164 has been split into APP-NAME, PROCID, and MSGID header fields. STRUCTURED-DATA and the richer TIMESTAMP are entirely new additions not present in RFC 3164.
section: A.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
