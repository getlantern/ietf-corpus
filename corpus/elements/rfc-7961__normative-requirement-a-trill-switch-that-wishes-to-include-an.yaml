document: rfc-7961
kind: normative-requirement
summary: A TRILL switch that wishes to include an AFN that some receiving TRILL switch in the campus may not know SHOULD include an AFN Size sub-sub-TLV to allow parsing of the Address Sets even if the AFN is unrecognized.
section: "2"
rfc2119_level: SHOULD
topics:
