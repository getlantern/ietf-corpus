document: rfc-9909
kind: protocol-element
summary: 'SLH-DSA has 24 algorithm OIDs total: 12 for Pure SLH-DSA (id-slh-dsa-*) covering SHA-2 and SHAKE256 variants at 128s/128f/192s/192f/256s/256f parameter sets, and 12 for HashSLH-DSA (id-hash-slh-dsa-*) with the same parameter sets plus a pre-hash function suffix (e.g., -with-sha256). All OIDs are under the NIST sigAlgs arc (2.16.840.1.101.3.4.3), assigned values 20–31 for Pure and 35–46 for Hash variants.'
