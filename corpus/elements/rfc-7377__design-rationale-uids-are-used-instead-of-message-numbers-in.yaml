document: rfc-7377
kind: design-rationale
summary: UIDs are used instead of message numbers in ESEARCH responses because message numbers are only meaningful in the context of the selected mailbox; searching non-selected mailboxes makes message numbers inapplicable. Using UIDs universally keeps the response model consistent.
section: "2.1"
topics:
    - email
