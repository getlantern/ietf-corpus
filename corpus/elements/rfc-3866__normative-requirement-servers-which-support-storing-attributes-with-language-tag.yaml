document: rfc-3866
kind: normative-requirement
summary: Servers which support storing attributes with language tag options SHOULD allow any attribute type with Directory String, IA5 String, or other textual string syntaxes to have language tag options. Clients SHOULD NOT assume servers can store attributes with language tags.
section: "2"
rfc2119_level: SHOULD
topics:
    - ldap
