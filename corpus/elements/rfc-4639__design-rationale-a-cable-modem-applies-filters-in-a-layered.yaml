document: rfc-4639
kind: design-rationale
summary: 'A cable modem applies filters in a layered order: inbound LLC filters first, then special filters (IP spoofing and SNMP access), then IP inbound filters, then IP outbound filters, and finally LLC outbound filters. This ordering reflects the protocol layering model.'
section: "3.3"
topics:
