document: rfc-9200
kind: interoperability-note
summary: ACE profile implementations are interoperable only with other implementations of the same profile; implementations of different profiles are not expected to interoperate. More capable devices (e.g., smartphones) may implement multiple profiles to interact with a wider range of constrained devices.
section: "1"
topics:
