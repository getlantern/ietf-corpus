document: rfc-2096
kind: protocol-element
summary: ipCidrRouteMask (IpAddress, read-only) is the subnet mask to be AND-ed with the destination address before comparing to ipCidrRouteDest. Systems not supporting arbitrary subnet masks construct this value by reference to IP Address Class.
