document: rfc-8853
kind: interoperability-note
summary: The redundant audio data format (RFC 2198) may be used alongside simulcast for loss-protection purposes without conflict. When used as a simulcast stream, the 'red' format rather than the carried formats SHOULD be listed on the 'a=simulcast' line.
section: "5.2"
topics:
    - realtime
    - rtp
