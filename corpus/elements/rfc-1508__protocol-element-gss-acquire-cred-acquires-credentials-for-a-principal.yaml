document: rfc-1508
kind: protocol-element
summary: GSS_Acquire_cred() acquires credentials for a principal via inputs desired_name (NULL for default), lifetime_req, desired_mechs (empty set for system default), and cred_usage (0=INITIATE-AND-ACCEPT, 1=INITIATE-ONLY, 2=ACCEPT-ONLY), returning a cred_handle, actual_mechs, and lifetime_rec. Single-user clients using default credentials typically need not invoke this call.
section: 2.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
