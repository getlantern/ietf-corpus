document: rfc-9114
kind: protocol-element
summary: MAX_PUSH_ID frame (type=0x0d) is sent by clients on the control stream to set the maximum push ID the server may use in PUSH_PROMISE and CANCEL_PUSH frames. The server cannot push until it receives this frame; a server MUST NOT send MAX_PUSH_ID.
section: 7.2.7
topics:
    - http
    - quic
