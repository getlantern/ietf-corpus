summary: 'Section 11.1 registers the `sd_hash` JWT claim in the IANA JSON Web Token Claims registry. Section 11.2 registers two media types: `application/sd-jwt` (SD-JWT compact serialization) and `application/kb+jwt` (Key Binding JWT). Section 11.3 registers the `+sd-jwt` structured syntax suffix.'
