document: rfc-9024
kind: normative-requirement
summary: Network fragmentation for DetNet MUST be avoided because it is inconsistent with the packet delivery times needed for DetNet. IPv6 fragmentation MUST NOT be used, and IPv4 packets MUST be sent with the DF bit set.
section: "4.2"
rfc2119_level: MUST NOT
