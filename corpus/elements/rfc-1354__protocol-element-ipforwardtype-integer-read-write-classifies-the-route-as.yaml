document: rfc-1354
kind: protocol-element
summary: ipForwardType (INTEGER, read-write) classifies the route as other(1), invalid(2), local(3), or remote(4). local(3) means the next hop is the final destination; remote(4) means it is not. Default value is invalid(2).
section: "4.1"
topics:
    - routing
    - snmp
