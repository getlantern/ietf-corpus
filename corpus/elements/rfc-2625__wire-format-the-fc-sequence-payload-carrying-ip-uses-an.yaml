document: rfc-2625
kind: wire-format
summary: The FC Sequence Payload carrying IP uses an 8-byte LLC/SNAP Header followed by the IPv4 Header (20 bytes fixed), optional IP Header (up to 40 bytes), and IP Data (up to 65280 minus header sizes). Each IP packet maps one-to-one to a single FC Sequence.
section: "3.4"
