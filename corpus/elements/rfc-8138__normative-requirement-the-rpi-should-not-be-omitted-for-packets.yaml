document: rfc-8138
kind: normative-requirement
summary: The RPI SHOULD NOT be omitted for packets going down the RPL graph in Non-Storing mode, even though some implementations do so. The RPI-6LoRH carries the RPLInstanceID needed to identify the DODAG root address used as the compression reference for SRH-6LoRH entries.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - routing
