document: rfc-3411
kind: protocol-element
summary: A contextEngineID uniquely identifies an SNMP entity that may realize an instance of a context with a particular contextName within an administrative domain. The combination of contextEngineID and contextName unambiguously identifies a context within an administrative domain.
