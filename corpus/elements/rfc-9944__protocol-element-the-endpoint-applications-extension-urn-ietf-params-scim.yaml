summary: The Endpoint Applications extension (urn:ietf:params:scim:schemas:extension:endpointAppsExt:2.0:Device) links non-IP devices to enterprise gateway endpoints. It provides deviceControlEnterpriseEndpoint (required, read-only URL), telemetryEnterpriseEndpoint (optional, read-only URL), and a multivalued applications list of UUID references to EndpointApp resources.
