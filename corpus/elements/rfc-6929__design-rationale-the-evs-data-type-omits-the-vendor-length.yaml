document: rfc-6929
kind: design-rationale
summary: The EVS data type omits the Vendor-Length field present in RFC 2865 Section 5.26 VSAs because many vendors did not follow the RFC 2865 recommendations, causing interoperability issues. The EVS length is made implicit, derived from the encapsulating attribute's Length field.
section: "2.4"
topics:
    - radius
