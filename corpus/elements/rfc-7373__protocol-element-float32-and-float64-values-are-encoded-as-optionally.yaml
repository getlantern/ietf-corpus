document: rfc-7373
kind: protocol-element
summary: float32 and float64 values are encoded as optionally signed, optionally base-10 exponent-suffixed decimal numbers per IEEE 754-2008; the special literals 'NaN', '+inf', and '-inf' represent not-a-number and infinities. Exponents are limited to at most three digits.
