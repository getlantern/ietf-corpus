document: rfc-7988
kind: protocol-element
summary: When a PTA (PMSI Tunnel Attribute) identifies an IR P-tunnel, its Tunnel Type field is set to the value 6, meaning 'Ingress Replication'. This is the sole indicator that a given A-D route refers to an IR P-tunnel.
