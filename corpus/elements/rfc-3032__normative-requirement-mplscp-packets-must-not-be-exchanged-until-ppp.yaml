document: rfc-3032
kind: normative-requirement
summary: MPLSCP packets MUST NOT be exchanged until PPP has reached the Network-Layer Protocol phase; packets received before this phase SHOULD be silently discarded. An implementation should be prepared to wait for Authentication and Link Quality Determination to complete before timing out.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
