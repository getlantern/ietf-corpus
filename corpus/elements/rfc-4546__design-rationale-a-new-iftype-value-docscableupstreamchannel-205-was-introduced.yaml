document: rfc-4546
kind: design-rationale
summary: A new ifType value docsCableUpstreamChannel(205) was introduced for DOCSIS 2.0 to model upstream logical channels (A-TDMA and S-CDMA) as a distinct layer beneath the physical upstream interface (ifType 129), enabling the ifStackTable to represent the multi-channel upstream architecture while preserving backward compatibility with DOCSIS 1.x.
