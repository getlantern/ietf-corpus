document: rfc-9410
kind: wire-format
summary: The compact form PASSporT included in the "ppi" parameter contains only the signature field of the PASSporT, prefixed with two periods (e.g., "..rq3pjT1..."), as defined in Section 7 of RFC 8225. The full form includes the complete base64url-encoded PASSporT header, payload, and signature.
