document: rfc-8008
kind: normative-requirement
summary: Updates to capability objects MUST indicate the version of the capability object in a newly registered Payload Type (e.g., by appending '.v2'). Future specifications defining a capability MUST define any necessary registries for the values advertised for that capability type.
section: "4"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
