document: rfc-3413
kind: protocol-element
summary: 'The snmpTargetAddrTable stores transport endpoint information for management targets. Its columnar objects are: snmpTargetAddrName (index, 1..32 octets), snmpTargetAddrTDomain, snmpTargetAddrTAddress, snmpTargetAddrTimeout (default 1500), snmpTargetAddrRetryCount (0..255, default 3), snmpTargetAddrTagList, snmpTargetAddrParams, snmpTargetAddrStorageType, and snmpTargetAddrRowStatus.'
