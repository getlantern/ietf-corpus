document: rfc-8334
kind: security-consideration
summary: The security considerations of RFC 5730 (EPP core), RFC 5731 (domain name mapping), and RFC 7848 (mark and signed mark) apply to this extension. Transport-layer security (e.g., TLS) is required for protecting sensitive trademark and claims notice data in transit.
