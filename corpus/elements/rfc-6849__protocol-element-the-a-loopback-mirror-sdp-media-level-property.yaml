document: rfc-6849
kind: protocol-element
summary: The 'a=loopback-mirror' SDP media-level property attribute indicates the generating entity will echo all received media back to the RTP stream sender. When a stream is offered with loopback-source, the corresponding response carries loopback-mirror, and vice versa.
section: "4.2"
topics:
    - realtime
    - rtp
    - sip
