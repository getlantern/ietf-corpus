document: rfc-8629
kind: normative-requirement
summary: When the Hop Control Data Item is received in a Session Update Message, the modem MUST respond with a Session Update Response Message with an appropriate Status Code, and MUST notify the router of unreachable destinations via Destination Down and Destination Update Messages.
section: "3.2"
rfc2119_level: MUST
