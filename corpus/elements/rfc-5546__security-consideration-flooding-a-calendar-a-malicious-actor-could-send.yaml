document: rfc-5546
kind: security-consideration
summary: 'Flooding a calendar: a malicious actor could send a large number of unsolicited iTIP REQUEST or PUBLISH messages to fill a user''s calendar with bogus events. Implementations SHOULD provide access controls and filtering mechanisms to limit which sources are trusted to inject calendar data.'
section: 6.1.5, 6.2.3
topics:
    - security
    - email
