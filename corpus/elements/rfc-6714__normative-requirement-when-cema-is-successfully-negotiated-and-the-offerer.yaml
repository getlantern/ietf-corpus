document: rfc-6714
kind: normative-requirement
summary: When CEMA is successfully negotiated and the offerer becomes 'active', it MUST use the SDP c/m-line address information to establish the MSRP TCP or TLS connection, rather than the MSRP URI in the 'path' attribute.
section: "4.2"
rfc2119_level: MUST
topics:
