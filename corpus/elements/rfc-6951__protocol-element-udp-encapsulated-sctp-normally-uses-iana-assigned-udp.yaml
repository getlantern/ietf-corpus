document: rfc-6951
kind: protocol-element
summary: UDP-encapsulated SCTP normally uses IANA-assigned UDP port 9899 (sctp-tunneling) on both ends. Implementations in application space may use other ports, and NAT boxes may remap port numbers, so implementations must handle port numbers other than 9899.
section: "5.1"
topics:
    - sctp
    - udp
    - nat
