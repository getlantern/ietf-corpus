document: rfc-6425
kind: protocol-element
summary: The Downstream Detailed Mapping TLV (RFC 6424) is used in P2MP traceroute echo replies to return multiple Return Codes for different downstream paths. Transit nodes include one DDM TLV; branch nodes include one per downstream path; egress nodes include none.
