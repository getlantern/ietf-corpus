document: rfc-7005
kind: normative-requirement
summary: 'For all four delay fields (nominal, maximum, high-water mark, low-water mark): if the measured value exceeds 0xFFFD, the value 0xFFFE MUST be reported to indicate over-range; if the measurement is unavailable, 0xFFFF MUST be reported.'
section: "4.2"
rfc2119_level: MUST
