document: rfc-3185
kind: protocol-element
summary: The id-aa-CEKMaxDecrypts attribute (OID { id-aa 31 }, type INTEGER, value MUST be >=1 and at most 2^31) is an optional hint placed in unprotectedAttrs indicating the maximum number of subsequent messages (excluding MSG1) that will reuse the referenced CEK.
