document: rfc-4090
kind: wire-format
summary: 'DETOUR object for IPv4 (Class-Num 63, C-Type 7): variable-length list of (PLR_ID, Avoid_Node_ID) pairs, each 4 bytes (IPv4). PLR_ID identifies the PLR beginning the detour; Avoid_Node_ID identifies the immediate downstream node being avoided. High-order bit of Class-Num is 0, so LSRs that do not support it MUST reject and send PathErr.'
section: 4.2.1
topics:
    - mpls
    - routing
