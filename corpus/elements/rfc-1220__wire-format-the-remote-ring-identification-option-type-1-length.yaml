summary: The Remote Ring Identification Option (type=1, length=4 octets) encodes a 12-bit Token Ring ring number and a 4-bit bridge number in a single 16-bit field, exchanged via BNCP to identify the ring-and-bridge of the adjacent interface for Source Routing.
