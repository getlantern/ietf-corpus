document: rfc-9374
kind: wire-format
summary: 'The 128-bit HHIT is composed of: a variable IPv6 prefix (max 28 bits), a 28-bit Hierarchy ID (HID) split into a 14-bit RAA and 14-bit HDA, an 8-bit HHIT Suite ID (HHSI), and a 64-bit ORCHID hash (when prefix is 28 bits). All fields are cryptographically bound through the cSHAKE128 hash.'
