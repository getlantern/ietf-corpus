kind: protocol-element
summary: The BIND_CONN_TO_SESSION operation binds a transport connection to a session, specifying session ID, channel direction (CDFC4_FORE, CDFC4_BACK, CDFC4_FORE_OR_BOTH, CDFC4_BACK_OR_BOTH), and whether RDMA mode is requested. The server response confirms the direction actually bound.
