document: rfc-6422
kind: protocol-element
summary: The Relay-Supplied Options option (RSOO) is a new DHCPv6 option that relay agents include in Relay-Forward messages to supply options the DHCPv6 server can then pass to the client. It encapsulates one or more DHCPv6 options that the relay agent wishes the server to forward to the client.
section: "2"
