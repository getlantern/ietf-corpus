document: rfc-6766
kind: design-rationale
summary: G.Bond/TDIM is a synchronous bonding scheme that requires both ends to agree on data distribution tables before any data transfer occurs, unlike G.Bond/ATM and G.Bond/Ethernet which carry reassembly information inline. This is why service configuration is communicated via BCC messages and must be pre-provisioned via MIB objects.
section: "5.3"
topics:
