document: rfc-8276
kind: normative-requirement
summary: A server MUST support all four xattr operations (GETXATTR, SETXATTR, LISTXATTRS, REMOVEXATTR) when directed to a file system that supports xattr_support and returns TRUE. For file systems that do not support xattr_support or return FALSE, all four operations MUST NOT be supported.
section: "8.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
