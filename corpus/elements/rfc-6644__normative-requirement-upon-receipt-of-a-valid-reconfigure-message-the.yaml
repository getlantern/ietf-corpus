document: rfc-6644
kind: normative-requirement
summary: Upon receipt of a valid Reconfigure message, the client MUST respond with a Renew, Rebind, or Information-request as indicated by the Reconfigure Message option. The client ignores the transaction-id field in the received Reconfigure.
section: "5"
rfc2119_level: REQUIRED
topics:
    - ip
