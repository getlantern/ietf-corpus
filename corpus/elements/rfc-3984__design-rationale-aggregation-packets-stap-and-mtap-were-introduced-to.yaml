document: rfc-3984
kind: design-rationale
summary: 'Aggregation packets (STAP and MTAP) were introduced to bridge dramatically different MTU sizes: wireline IP networks (typically ~1500-byte Ethernet MTU) versus IP/non-IP wireless systems such as ITU-T H.324/M (preferred ≤254 bytes). Without aggregation, transcoding between these environments would be necessary at gateways.'
section: "5.7"
topics:
