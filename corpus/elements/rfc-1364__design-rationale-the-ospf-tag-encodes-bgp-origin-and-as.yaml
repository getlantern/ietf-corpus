document: rfc-1364
kind: design-rationale
summary: The OSPF tag encodes BGP ORIGIN and AS_PATH to allow ASBRs not running IBGP to advertise correct routes. This eliminates the need to configure IBGP on every ASBR in an AS that mixes EGP and BGP as exterior gateway protocols.
section: "4"
topics:
    - bgp
    - routing
