document: rfc-3623
kind: normative-requirement
summary: Before restarting, Router X MUST ensure its forwarding table is up-to-date and will remain in place across the restart. It MUST also originate grace-LSAs for each OSPF interface and SHOULD retransmit them until acknowledged to maximize the chance that all neighbors enter helper mode.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
