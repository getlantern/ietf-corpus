document: rfc-3892
kind: design-rationale
summary: The 428 error response (from RFC 3261's authenticated identity management) is explicitly noted as NOT appropriate for use by a refer target requesting a Referred-By token — 428 is needed to request an authentication token from the referee, while 429 is defined specifically for this purpose.
section: "2.3"
topics:
