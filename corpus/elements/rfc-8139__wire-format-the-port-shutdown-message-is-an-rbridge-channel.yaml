document: rfc-8139
kind: wire-format
summary: The Port-Shutdown message is an RBridge Channel message (protocol number 0x006) whose payload consists of a list of 2-byte Port IDs for ports that have failed or are shutting down. It uses priority 7, VLAN tag with Ethertype 0x8100 on the Designated VLAN, and the All-Egress-RBridges Inner.MacDA.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
