document: rfc-9658
kind: protocol-element
summary: The 'MT Multipoint Capability' is a new LDP capability TLV (code point 0x0510) that an mLDP speaker advertises to peers to announce support for MTR and the procedures in this document. The U and F bits MUST be 1 and 0 respectively, the Length MUST be 1, and the S bit is set to 1 to announce or 0 to withdraw.
section: "4"
topics:
