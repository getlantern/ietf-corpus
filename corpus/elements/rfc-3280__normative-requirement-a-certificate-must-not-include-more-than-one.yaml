document: rfc-3280
kind: normative-requirement
summary: A certificate MUST NOT include more than one instance of a particular extension. A certificate-using system MUST reject the certificate if it encounters a critical extension it does not recognize; a non-critical unrecognized extension MAY be ignored.
section: "4.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
