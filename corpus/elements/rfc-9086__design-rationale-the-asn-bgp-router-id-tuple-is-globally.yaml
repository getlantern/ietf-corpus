document: rfc-9086
kind: design-rationale
summary: The <ASN, BGP Router-ID> tuple is globally unique (per RFC 6286 requiring Router-ID uniqueness within an AS and non-zero), so their combined use in Node Descriptors maps BGP-LS NLRIs with BGP protocol-ID to a unique BGP router in the administrative domain.
section: "4.2"
topics:
