document: rfc-2215
kind: design-rationale
summary: TOKEN_BUCKET_TSPEC is defined as a general parameter rather than a service-specific one because the same traffic description may be used by multiple QoS control services. It is not a characterization parameter (intermediate nodes do not export local values for it); it is a common data structure shared across services.
