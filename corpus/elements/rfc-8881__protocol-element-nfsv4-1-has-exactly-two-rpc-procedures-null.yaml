document: rfc-8881
kind: protocol-element
summary: 'NFSv4.1 has exactly two RPC procedures: NULL and COMPOUND. The COMPOUND procedure encodes a series of individual operations evaluated in order without atomicity guarantees; a failing operation stops evaluation and all prior results are returned.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
