document: rfc-7602
kind: normative-requirement
summary: For each PDU containing the ESN TLV, the 96-bit combined value (ESSN || PSN) MUST be greater than the most recently received value in a PDU of the same type originated by the same IS.
section: "3"
rfc2119_level: MUST
