document: rfc-2203
kind: normative-requirement
summary: Any application protocol referencing RPCSEC_GSS must specify a mandatory set of {mechanism, QOP, service} triples; an implementation cannot claim conformance unless it implements all required triples. RPCSEC_GSS itself does not mandate any specific mechanism.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
