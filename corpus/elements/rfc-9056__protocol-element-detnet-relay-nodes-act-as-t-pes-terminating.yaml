document: rfc-9056
kind: protocol-element
summary: DetNet relay nodes act as T-PEs (Terminating Provider Edges) at the boundaries of the MPLS domain, responsible for mapping DetNet flows at the service sub-layer between the IP and MPLS DetNet data planes. An S-PE (Switching Provider Edge) may sit in the middle of the domain.
section: "4.1"
topics:
