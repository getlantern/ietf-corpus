document: rfc-9342
kind: protocol-element
summary: Clustered Alternate Marking (Multipoint Alternate Marking) extends the Alternate-Marking Method of RFC 9341 to multipoint-to-multipoint unicast flows, anycast, and ECMP flows. The methodology splits packet flows into marking blocks and uses packet counters and timestamps per marking period.
section: "1"
