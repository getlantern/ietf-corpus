document: rfc-4095
kind: security-consideration
summary: A malicious sender or intermediate MTA could insert a solicitation class keyword and use the associated URI to mislead message recipients, for example by falsely indicating official status for a message. Users must take additional steps outside this specification to determine what and whom to believe.
section: "6"
topics:
