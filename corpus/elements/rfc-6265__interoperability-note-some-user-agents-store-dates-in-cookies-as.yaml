document: rfc-6265
kind: interoperability-note
summary: Some user agents store dates in cookies as 32-bit UNIX time_t values; implementation bugs may cause incorrect processing of dates after 2038. Servers should avoid setting expiration dates beyond what such systems can reliably represent.
section: 4.1.1
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
