document: rfc-6265
kind: interoperability-note
summary: Some existing user agents do not support the Max-Age attribute and will ignore it, treating the cookie as session-scoped. Servers that need cross-agent compatibility SHOULD include both Max-Age and Expires; Max-Age takes precedence in agents that support both.
section: 4.1.2.2
topics:
    - http
