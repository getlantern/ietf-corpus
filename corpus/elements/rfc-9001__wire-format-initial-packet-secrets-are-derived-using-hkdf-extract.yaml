document: rfc-9001
kind: wire-format
summary: Initial packet secrets are derived using HKDF-Extract with a fixed 20-byte salt (0x38762cf7f55934b34d179ae6a4c80cadccbb7f0a) and the client's Destination Connection ID as IKM, then HKDF-Expand-Label with labels 'client in' and 'server in' to produce 32-byte secrets. SHA-256 is used as the hash function.
section: "5.2"
