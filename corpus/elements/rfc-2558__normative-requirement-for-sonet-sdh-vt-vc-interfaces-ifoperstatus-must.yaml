document: rfc-2558
kind: normative-requirement
summary: For SONET/SDH VT/VC interfaces, ifOperStatus must assume the value down(2) if sonetVTCurrentStatus has any value other than sonetVTNoDefect(1). ifConnectorPresent must be set to false(2) and ifLinkUpDownTrapEnable defaults to disabled(2).
section: "3.4"
