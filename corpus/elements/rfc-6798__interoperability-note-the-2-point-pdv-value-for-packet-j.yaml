document: rfc-6798
kind: interoperability-note
summary: The 2-point PDV value for packet j is identical to the quantity D(i,j) defined in RFC 3550 Section 6.4.1, where packet i is the reference packet (typically the minimum-delay packet). Implementors should set packet index i to the reference packet index per RFC 5481 Section 1 and 5.1.
section: "3.3"
topics:
    - rtp
    - realtime
