document: rfc-5568
kind: security-consideration
summary: When using IKEv2 to secure inter-access-router communication, the PAD (Peer Authorization Database) must contain entries allowing IKE and ESP/AH SAs between PAR and NAR. The SPD must specify that traffic between PAR and NAR IP addresses is IPsec-protected.
section: "10.1"
topics:
    - security
    - mobility
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
