document: rfc-7343
kind: normative-requirement
summary: Router software MUST NOT include any special handling code for ORCHIDs. Non-routability of ORCHIDs, if implemented, must be achieved via configuration (e.g., an ACL entry) rather than hardwired code.
section: "3"
rfc2119_level: MUST NOT
