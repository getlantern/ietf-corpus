document: rfc-7438
kind: interoperability-note
summary: Procedures for wildcard group usage in Bidir TLVs (Transit IPv4 Bidir, Transit IPv6 Bidir, Transit VPNv4 Bidir, Transit VPNv6 Bidir) are explicitly outside the scope of this document. Procedures for using both a wildcard source and a wildcard group in the same TLV are also outside scope. Bidir TLVs have no source address subfield, so wildcard source does not apply to them.
section: "3.2"
topics:
    - mpls
    - multicast
