document: rfc-3633
kind: normative-requirement
summary: If verification of the delegating router binding is needed (e.g., after reboot, link flap, or physical disconnection), the requesting router MUST initiate a Rebind/Reply message exchange, with retransmission parameters set as for the Confirm message per RFC 3315 section 18.1.2.
section: "12.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
