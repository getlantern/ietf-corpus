document: rfc-7527
kind: design-rationale
summary: The problem motivating Enhanced DAD is that IPv4 recovers automatically after a loopback is removed, but IPv6 remains in DAD-failed state requiring manual intervention. In access concentrator deployments, a single looped back NS(DAD) can affect thousands of broadband modem subscribers simultaneously.
section: "2"
topics:
