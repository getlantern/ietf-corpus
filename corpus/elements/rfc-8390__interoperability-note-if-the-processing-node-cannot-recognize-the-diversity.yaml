document: rfc-8390
kind: interoperability-note
summary: If the processing node cannot recognize the Diversity XRO/EXRS subobject, it is expected to follow the procedure defined in RFC 4874 for unknown subobjects. The general RFC 4874 processing rules for XRO and EXRS are not changed by this document.
