document: rfc-5190
kind: protocol-element
summary: The midcomGroupTable has one entry per policy rule group, auto-created when a midcomRuleTable entry uses a new midcomGroupIndex and auto-deleted when the last member entry is removed. midcomGroupLifetime reflects the maximum remaining lifetime across all established member rules and can be written to change all member lifetimes at once (setting it to 0 terminates all member rules).
section: 5.1.2
topics:
