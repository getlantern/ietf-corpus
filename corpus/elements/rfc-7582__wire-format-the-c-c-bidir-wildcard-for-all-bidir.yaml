document: rfc-7582
kind: wire-format
summary: The (C-*,C-*-BIDIR) wildcard for 'all BIDIR-PIM groups' is encoded with a multicast group length field containing 0x08 (8 bits) and a single-octet multicast group field containing 0x00. This encoding is distinct from the generic group wildcard defined in RFC 6625.
