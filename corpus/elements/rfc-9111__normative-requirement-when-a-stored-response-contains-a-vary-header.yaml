document: rfc-9111
kind: normative-requirement
summary: When a stored response contains a Vary header field, a cache MUST NOT reuse that response without revalidation unless all request header fields nominated by the Vary field match those of the original request. A Vary value of '*' always fails to match.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
