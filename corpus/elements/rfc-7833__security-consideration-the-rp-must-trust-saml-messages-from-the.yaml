document: rfc-7833
kind: security-consideration
summary: The RP MUST trust SAML messages from the IdP to the same degree as RADIUS attributes, relying on the RADIUS infrastructure for integrity. The RP MUST also apply policy to filter information based on what the IdP is permitted to assert and the level of trust placed in any intermediate proxies.
section: "10"
topics:
