document: rfc-5838
kind: design-rationale
summary: IPv4 next-hop addresses are preferable over IPv6 link-local next hops for IPv4 AFs because PIM RPF lookups require the PIM neighbor address and next-hop to both be IPv4, and troubleshooting is easier when prefix and next-hop are in the same AF.
