document: rfc-7885
kind: state-machine
summary: Capability selection between S-BFD and BFD is determined by the intersection of advertised CV Types. When both ends advertise both S-BFD and BFD, both protocols are selected. When only one protocol is advertised by both ends, that protocol is used. If there is no overlap, no CV Type is selected.
