document: rfc-9460
kind: security-consideration
summary: A hostile DNS intermediary can forge SVCB records pointing to arbitrary IP addresses and ports, including internal network addresses, potentially enabling server-side request forgery if the attacker can influence the client's payload. SVCB mapping documents SHOULD specify appropriate port number restrictions.
section: "12"
topics:
    - dns
    - security
