document: rfc-7345
kind: privacy-consideration
summary: For anonymous calls, a fresh self-signed certificate SHOULD be generated per call, and attributes such as 'subjectAltName' and 'commonName' MUST NOT carry identifying or correlatable information, preventing certificate-based user tracking.
