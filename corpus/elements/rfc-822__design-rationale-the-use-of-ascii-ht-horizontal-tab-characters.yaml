document: rfc-822
kind: design-rationale
summary: The use of ASCII HT (horizontal tab) characters in message headers, though permitted, is discouraged because there is no network-wide definition of the visual effect of tabs at remote hosts, leading to unpredictable rendering.
section: 3.4.2
topics:
