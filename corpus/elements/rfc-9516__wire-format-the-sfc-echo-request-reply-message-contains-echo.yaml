document: rfc-9516
kind: wire-format
summary: 'The SFC Echo Request/Reply message contains: Echo Request Flags (2-octet bit vector, MUST be zeroed), Reserved (2-octet, MUST be zeroed), Echo Type (1-octet), Reply Mode (1-octet), Return Code (1-octet), Return Subcode (1-octet), Sender''s Handle (4-octet), Sequence Number (4-octet), followed by variable-length TLVs. If no TLVs are included, the Length in the SFC Active OAM Header MUST be 16 octets.'
section: "6"
topics:
    - routing
