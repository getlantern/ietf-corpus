document: rfc-7616
kind: interoperability-note
summary: MD5 is retained for backward compatibility with RFC 2617 but is explicitly NOT RECOMMENDED. SHA-256 is mandatory to implement in all new implementations. Backward compatibility with RFC 2069 (which omitted qop) is deprecated.
