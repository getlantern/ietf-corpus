document: rfc-8512
kind: interoperability-note
summary: DS-Lite (Dual-Stack Lite) support is defined as an extension to this YANG module in RFC 8513 rather than here. The napt44 feature description notes that an IPv6 address (DS-Lite softwire) may serve as an extra attribute to disambiguate NAPT44 mappings beyond the five-tuple.
section: "2.2"
