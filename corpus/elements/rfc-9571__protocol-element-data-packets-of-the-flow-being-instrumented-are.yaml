document: rfc-9571
kind: protocol-element
summary: Data packets of the flow being instrumented are grouped into batches, all packets within a batch are marked with the corresponding Synonymous Flow Label (SFL), the sender counts packets in the batch, and when the batch is complete the sender issues a Query message using the same SFL to determine packets received and hence packets lost.
