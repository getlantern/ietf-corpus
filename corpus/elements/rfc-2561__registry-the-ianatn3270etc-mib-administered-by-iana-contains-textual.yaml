document: rfc-2561
kind: registry
summary: The IANATn3270eTC-MIB, administered by IANA, contains textual conventions for TN3270E address types (IANATn3270eAddrType, IANATn3270eAddress), client types, function bits (IANATn3270Functions), resource types, device types, and log data. New values can be added without reissuing RFC 2561.
