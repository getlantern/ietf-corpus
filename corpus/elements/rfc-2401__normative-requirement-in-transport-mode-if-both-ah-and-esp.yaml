document: rfc-2401
kind: normative-requirement
summary: In transport mode, if both AH and ESP are applied, AH SHOULD appear as the first header after IP, prior to ESP, so that AH covers the ciphertext output of ESP.
section: "4.3"
rfc2119_level: SHOULD
