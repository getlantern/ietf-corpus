document: rfc-3737
kind: design-rationale
summary: 'Earlier OID assignments under rmon were not logically organized: initially normal MIB OIDs were assigned directly, but later the WG used the rmon root to create new MIB modules. The document acknowledges this cannot be changed but constrains all future assignments to MODULE-IDENTITY (MIB root) only.'
