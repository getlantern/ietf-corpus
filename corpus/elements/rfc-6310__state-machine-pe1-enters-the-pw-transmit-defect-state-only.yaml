document: rfc-6310
kind: state-machine
summary: PE1 enters the PW transmit defect state only when it receives an RDI from PE2 and is not already in the PW receive defect state. PE1 exits when PE2 clears the RDI or when PE1 transitions to the PW receive defect state. For L2TPv3/IP using only the basic Circuit Status AVP (RFC 3931), the transmit defect state is not valid.
section: 6.2.2
topics:
