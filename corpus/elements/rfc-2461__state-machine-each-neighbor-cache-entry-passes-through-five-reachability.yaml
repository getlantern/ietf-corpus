document: rfc-2461
kind: state-machine
summary: 'Each Neighbor Cache entry passes through five reachability states driven by NUD: INCOMPLETE (address resolution in progress, link-layer address unknown), REACHABLE (recently confirmed reachable), STALE (reachability unknown, no probe sent yet), DELAY (traffic sent recently, waiting for upper-layer confirmation before probing), and PROBE (sending unicast NS probes to actively verify reachability).'
section: "5.1"
topics:
    - ip
    - v6ops
