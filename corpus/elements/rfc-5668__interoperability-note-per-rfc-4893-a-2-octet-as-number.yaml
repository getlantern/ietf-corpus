document: rfc-5668
kind: interoperability-note
summary: Per RFC 4893, a 2-octet AS number can be converted to a 4-octet AS number by setting the two high-order octets to zero. As a consequence, a 2-octet AS could technically use either 2-octet or 4-octet AS specific extended communities, but this is undesirable because the two forms would be treated as distinct even with identical Sub-Type and Local Administrator values.
section: "3"
topics:
