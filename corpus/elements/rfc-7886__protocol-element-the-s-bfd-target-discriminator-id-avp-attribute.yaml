summary: The S-BFD Target Discriminator ID AVP (Attribute Type 102) is exchanged during L2TPv3 session negotiation using ICRQ, ICRP, OCRQ, and OCRP control messages. It advertises S-BFD target discriminator(s) supported by an LCCE for S-BFD reflector operation.
