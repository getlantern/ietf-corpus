document: rfc-8011
kind: state-machine
summary: 'Printer objects maintain three states: ''idle'' (accepting jobs, none currently processing), ''processing'' (one or more jobs actively processing), and ''stopped'' (not processing, intervention required). The ''printer-state-reasons'' attribute (1setOf type2 keyword) provides supplementary detail about conditions contributing to the current state.'
section: 5.4.11
