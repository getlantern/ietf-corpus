document: rfc-5749
kind: design-rationale
summary: In explicit ERP bootstrapping, the EAP peer initiates distribution by sending an EAP-Initiate message with the bootstrapping flag set, providing cryptographic verification of peer consent via the message's integrity checksum. This contrasts with implicit bootstrapping, where the peer has no visibility into or control over key distribution.
section: "6.2"
topics:
