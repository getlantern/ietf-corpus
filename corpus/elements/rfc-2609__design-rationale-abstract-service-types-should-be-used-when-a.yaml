document: rfc-2609
kind: design-rationale
summary: Abstract service types SHOULD be used when a service can be accessed via multiple protocols (e.g., 'device-drivers' via ftp, tftp, or http) rather than encoding a concrete protocol name as the service type. This allows SLP queries for the abstract type to return all protocol variants, letting the client select the most appropriate one.
section: 2.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
