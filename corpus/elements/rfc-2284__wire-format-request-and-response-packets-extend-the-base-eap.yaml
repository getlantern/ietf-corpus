document: rfc-2284
kind: wire-format
summary: Request and Response packets extend the base EAP header with a Type field (1 octet, indicating the request/response type) and Type-Data (variable, format determined by Type). The Length field covers Code, Identifier, Length, Type, and Type-Data.
