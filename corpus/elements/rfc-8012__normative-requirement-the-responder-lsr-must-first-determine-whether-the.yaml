document: rfc-8012
kind: normative-requirement
summary: The responder LSR MUST first determine whether the initiating LSR supports the EL extension (by detecting Type {10} or an EL-FEC in the Target FEC Stack). If the initiating LSR does not support the extension, the responder MUST NOT set the new DS flags or use Multipath Type {10} in its echo reply.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
