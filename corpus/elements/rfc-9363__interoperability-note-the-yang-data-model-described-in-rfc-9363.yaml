document: rfc-9363
kind: interoperability-note
summary: The YANG data model described in RFC 9363 conforms to the Network Management Datastore Architecture (NMDA) defined in RFC 8342. Implementations accessing the ietf-schc module must support NMDA-compliant datastores.
