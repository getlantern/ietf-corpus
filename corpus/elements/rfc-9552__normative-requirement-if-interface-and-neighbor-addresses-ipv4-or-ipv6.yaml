document: rfc-9552
kind: normative-requirement
summary: If interface and neighbor addresses (IPv4 or IPv6) are present in the LSA/LSP, the interface/neighbor address TLVs MUST be included and the Link Local/Remote Identifiers TLV MUST NOT be included in the Link Descriptor. IPv4/IPv6 link-local addresses MUST NOT be carried in address TLVs (259/260/261/262) as descriptors.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
