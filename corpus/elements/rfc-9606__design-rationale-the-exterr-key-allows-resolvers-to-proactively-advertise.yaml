document: rfc-9606
kind: design-rationale
summary: The 'exterr' key allows resolvers to proactively advertise which EDE codes they support, enabling clients to detect mismatches. If a client receives an unlisted EDE, it can re-query RESINFO to learn of updated capabilities or identify the resolver information as inaccurate and discard it.
section: "5"
topics:
