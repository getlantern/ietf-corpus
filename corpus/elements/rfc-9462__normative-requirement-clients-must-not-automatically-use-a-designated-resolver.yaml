document: rfc-9462
kind: normative-requirement
summary: Clients MUST NOT automatically use a Designated Resolver without some form of validation such as Verified Discovery, Opportunistic Discovery, or a future mechanism; omitting validation allows an attacker to direct traffic to an unrelated Encrypted DNS Resolver.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
