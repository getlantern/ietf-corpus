document: rfc-9964
kind: normative-requirement
summary: For ML-DSA private keys, the priv parameter MUST be the seed and MUST have a length of 32 bytes. The expanded private key representation from FIPS 204 is intentionally not defined in order to maintain a single representation across COSE and JOSE.
