summary: The SelectionProcess class contains an ordered list of one or more Selector objects applied sequentially to the packet stream. It carries read-only SelectionSequence state as a list of (observationDomainId, selectionSequenceId) tuples assigned by the Monitoring Device, enabling correlation with PSAMP protocol Selection Sequence report interpretations.
