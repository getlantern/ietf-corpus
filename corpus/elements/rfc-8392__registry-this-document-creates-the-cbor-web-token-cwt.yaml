summary: 'This document creates the ''CBOR Web Token (CWT) Claims'' registry with registration policies: Standards Action for integer keys -256 to 255 and length-1 strings; Specification Required for keys -65536 to -257, 256 to 65535, and length-2 strings; Expert Review for larger values; Private Use for integers below -65536.'
