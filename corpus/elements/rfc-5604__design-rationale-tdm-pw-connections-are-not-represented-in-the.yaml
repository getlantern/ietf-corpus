document: rfc-5604
kind: design-rationale
summary: TDM PW connections are not represented in the ifTable; instead, a separate pwTDMTable is used, indexed by the same pwIndex as the PW-STD-MIB. This follows the PWE3 layered architecture (RFC 3985) separating TDM service layer, generic PW layer, PSN VC layer, and PSN layer.
