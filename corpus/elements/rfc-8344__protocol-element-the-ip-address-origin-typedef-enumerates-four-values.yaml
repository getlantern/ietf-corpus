document: rfc-8344
kind: protocol-element
summary: 'The ''ip-address-origin'' typedef enumerates four values: ''other'', ''static'' (configured via NETCONF/CLI), ''dhcp'' (assigned by DHCP server), ''link-layer'' (IPv6 SLAAC embedding link-layer address), and ''random'' (system-chosen, e.g., 169.254/16, RFC 4941 temporary, or RFC 7217 opaque).'
