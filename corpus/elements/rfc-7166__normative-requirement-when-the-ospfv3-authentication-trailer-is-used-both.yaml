document: rfc-7166
kind: normative-requirement
summary: When the OSPFv3 Authentication Trailer is used, both checksum calculation and verification are omitted for the OSPFv3 header checksum and the LLS data block checksum. The OSPFv3 header checksum SHOULD be set to 0 prior to computing the Authentication Trailer message digest.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
