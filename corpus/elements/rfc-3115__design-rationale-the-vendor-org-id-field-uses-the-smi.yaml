document: rfc-3115
kind: design-rationale
summary: The Vendor/Org-ID field uses the SMI Network Management Private Enterprise Code (with high-order octet set to 0) rather than a new registry, leveraging an existing globally administered namespace to uniquely identify vendors without requiring IANA to manage vendor identities for these extensions.
section: "2.1"
topics:
