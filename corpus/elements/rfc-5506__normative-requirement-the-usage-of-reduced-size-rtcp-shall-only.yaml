document: rfc-5506
kind: normative-requirement
summary: The usage of Reduced-Size RTCP SHALL only be done in RTP sessions operating in AVPF or SAVPF Early RTCP or Immediate Feedback mode. Reduced-Size RTCP SHALL NOT be sent until at least one compound RTCP has been sent.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
