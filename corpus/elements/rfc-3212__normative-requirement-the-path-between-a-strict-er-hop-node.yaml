document: rfc-3212
kind: normative-requirement
summary: The path between a strict ER-Hop node and its prior abstract node MUST include only network nodes from those two abstract nodes. A loose hop's path MAY include other network nodes not part of those abstract nodes.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
