document: rfc-4805
kind: protocol-element
summary: 'The DS1 statistics architecture uses three tables: dsx1CurrentTable (current 15-minute interval), dsx1IntervalTable (up to 96 completed 15-minute intervals, index 1=most recent), and dsx1TotalTable (24-hour cumulative totals). Per-table counters cover ESs, SESs, SEFSs, UASs, CSSs, PCVs, LESs, BESs, and LCVs; DM objects are deprecated.'
