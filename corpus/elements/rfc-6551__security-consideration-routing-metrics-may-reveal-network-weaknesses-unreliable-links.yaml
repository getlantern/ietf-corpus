document: rfc-6551
kind: security-consideration
summary: Routing metrics may reveal network weaknesses—unreliable links, energy-depleted nodes—to potential attackers. It is RECOMMENDED to carefully consider which metrics are used and their visibility, or to apply the security measures specified in RFC 6550 to protect advertised metric information.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - security
