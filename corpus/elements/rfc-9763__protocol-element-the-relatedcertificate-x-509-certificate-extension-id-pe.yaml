document: rfc-9763
kind: protocol-element
summary: The RelatedCertificate X.509 certificate extension (id-pe-relatedCert, OID 1.3.6.1.5.5.7.1.36) is an ASN.1 SEQUENCE containing hashAlgorithm (DigestAlgorithmIdentifier) and hashValue (OCTET STRING), where hashValue is the digest of the entire related end-entity certificate. It creates an association between two certificates owned by the same end entity.
section: "4.1"
topics:
    - pkix
    - crypto
    - security
