document: rfc-5734
kind: normative-requirement
summary: Automated clients SHOULD return or log an error and SHOULD close the transport connection if the server identity check fails. They MAY provide a configuration setting to disable this check but MUST provide a setting to enable it.
section: "9"
rfc2119_level: MUST
topics:
    - tls
    - security
