document: rfc-6773
kind: security-consideration
summary: Processing of ICMP messages received for DCCP-UDP packets and their translation for use by DCCP introduces risk; precautions analogous to RFC 5927 (ICMP attacks against TCP) are desirable before a DCCP-UDP endpoint acts on received ICMP messages.
section: "6"
topics:
    - security
    - udp
    - nat
