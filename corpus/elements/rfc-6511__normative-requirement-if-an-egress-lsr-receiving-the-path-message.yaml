document: rfc-6511
kind: normative-requirement
summary: If an egress LSR receiving the Path message supports the LSP Attributes object, the Attributes Flags TLV, and recognizes the Non-PHP behavior flag, it MUST allocate a non-NULL local label and MUST set the Non-PHP behavior flag in the RRO Attributes subobject.
section: "2.1"
rfc2119_level: MUST
topics:
