document: rfc-5272
kind: wire-format
summary: CMCUnsignedData (id-aa-cmc-unsignedData, OID {id-aa 34}) is a SEQUENCE of bodyPartPath (BodyPartPath), identifier (OBJECT IDENTIFIER), and content (ANY DEFINED BY identifier). There MUST be at most one CMCUnsignedData attribute per SignerInfo or AuthenticatedData, and if present it MUST appear with the same value(s) in all SignerInfo and AuthenticatedData items.
section: 3.2.3
topics:
    - pkix
