document: rfc-8200
kind: normative-requirement
summary: If a destination node encounters an unrecognized Next Header value while processing a header, it should discard the packet and send an ICMP Parameter Problem message with Code 1 ('unrecognized Next Header type encountered') and the Pointer field pointing to the unrecognized value.
section: "4"
rfc2119_level: SHOULD
topics:
    - ip
