document: rfc-4626
kind: protocol-element
summary: t11FspfIfHelloInterval (default 20 seconds) sets the periodic HELLO message interval on an interface; t11FspfIfDeadInterval (default 80 seconds) sets the maximum time without a HELLO before the interface is assumed broken. Both values must be identical at both ends of a link.
section: "6"
topics:
