document: rfc-5761
kind: normative-requirement
summary: Future RTCP packet type assignments SHOULD be made from the range 209-223 first, then 194-199, so that only payload types 64-95 are blocked when multiplexing. Ranges 1-191 and 224-254 SHOULD only be used when other values are exhausted.
section: "4"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - registry
