document: rfc-9709
kind: normative-requirement
summary: Implementations MUST randomly generate content-encryption keys and content-authenticated-encryption keys. Using an inadequate PRNG can result in little or no security because an attacker may reproduce the PRNG environment and search the small resulting key space.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
