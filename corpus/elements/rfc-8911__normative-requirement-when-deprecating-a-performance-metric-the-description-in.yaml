document: rfc-8911
kind: normative-requirement
summary: When deprecating a Performance Metric, the Description in the Registry MUST be updated to explain the deprecation and refer to the new replacement metric. Names and Metric IDs of deprecated Registered Performance Metrics must not be reused.
section: "8.3"
rfc2119_level: MUST
topics:
    - registry
    - measurement
