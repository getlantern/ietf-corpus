document: rfc-7001
kind: normative-requirement
summary: Experimental extension method identifiers MUST only be used within ADMDs that have explicitly consented to use them. Any MTA, MUA, or downstream filter intended for production use SHOULD ignore or delete any Authentication-Results header field that includes an experimental (unknown) method identifier or extension result.
section: 2.6.6
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
