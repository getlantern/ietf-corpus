document: rfc-3402
kind: wire-format
summary: 'The Substitution Expression uses sed-style syntax: delim-char ERE delim-char repl delim-char *flags. The delimiter is the first character of the expression (any octet not in POS-DIGIT or flags), must appear exactly three non-escaped times, and digits MUST NOT be used as delimiters to avoid confusion with backreferences.'
section: "3.2"
topics:
    - dns
