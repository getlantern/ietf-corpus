document: rfc-9772
kind: security-consideration
summary: Active OAM in Geneve inherits security considerations from RFC 8926. A system MUST provide control to limit the rate of Geneve OAM packets punted to the Geneve control plane to avoid overloading it. Any packet received with an inner TTL/Hop Count other than 255 MUST be discarded (per the General TTL Security Mechanism, RFC 5082).
section: "4"
topics:
    - security
    - measurement
