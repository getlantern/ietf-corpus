document: rfc-8302
kind: protocol-element
summary: The IA APPsub-TLV (RFC 7961) distributed via ESADI (RFC 7357) is the control-plane mechanism for distributing IP/MAC address mappings between RBridges. It includes a Flags field to identify whether the source is a directory server or local observation, plus a confidence level.
