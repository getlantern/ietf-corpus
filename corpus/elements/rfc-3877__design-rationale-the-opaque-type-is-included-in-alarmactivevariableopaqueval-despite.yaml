document: rfc-3877
kind: design-rationale
summary: The Opaque type is included in alarmActiveVariableOpaqueVal despite RFC 2578 forbidding its use in standard MIB modules. This is justified by the need to accurately represent any well-formed notification and to maintain backward compatibility with existing notification definitions that use Opaque.
section: "4.2"
topics:
    - snmp
