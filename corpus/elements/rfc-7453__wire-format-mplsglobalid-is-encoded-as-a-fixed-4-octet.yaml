document: rfc-7453
kind: wire-format
summary: MplsGlobalId is encoded as a fixed 4-octet OCTET STRING carrying a 2-octet or 4-octet ASN; for a 2-octet ASN the high two octets are zero. MplsCcId is a fixed 2-octet string (or zero-length if invalid). MplsIccId is 1–6 octets (or zero-length if invalid). All alphabetic characters use ITU-T T.50 encoding.
section: "10"
