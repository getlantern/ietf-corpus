document: rfc-8049
kind: normative-requirement
summary: In the any-to-any VPN service topology, all sites MUST have the 'any-to-any-role'. In the Hub-and-Spoke or Hub-and-Spoke Disjoint topologies, sites MUST have either a Hub role or a Spoke role.
section: "6.4"
rfc2119_level: MUST
