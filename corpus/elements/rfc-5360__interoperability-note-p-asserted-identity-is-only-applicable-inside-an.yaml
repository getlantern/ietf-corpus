document: rfc-5360
kind: interoperability-note
summary: P-Asserted-Identity is only applicable inside an administrative domain with previously agreed-upon policies (trusted networks), as described in RFC 3325. It cannot be used across administrative domains for authenticating permission grants.
section: 5.6.1.2
topics:
    - sip
    - security
