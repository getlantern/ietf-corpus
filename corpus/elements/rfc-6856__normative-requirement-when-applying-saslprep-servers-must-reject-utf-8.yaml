document: rfc-6856
kind: normative-requirement
summary: When applying SASLprep, servers MUST reject UTF-8 usernames or passwords containing a UTF-8 character listed in Section 2.3 of SASLprep. USER/PASS/APOP username arguments MUST be treated as query strings; APOP password arguments MUST be treated as stored strings.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
