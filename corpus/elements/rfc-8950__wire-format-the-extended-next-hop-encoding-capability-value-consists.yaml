document: rfc-8950
kind: wire-format
summary: 'The Extended Next Hop Encoding capability value consists of one or more triples: NLRI AFI (2 octets), NLRI SAFI (2 octets), Nexthop AFI (2 octets). Each triple indicates that NLRI of <NLRI AFI/SAFI> may be advertised with a next-hop address of the Nexthop AFI protocol.'
