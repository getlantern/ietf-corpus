document: rfc-9034
kind: protocol-element
summary: The Origination Time Delta (OTD) field, when present, contains the time at which the packet was enqueued for transmission expressed as a positive offset to be subtracted from DT (i.e., OT = DT - OTD). Because it is a delta, OTL requires fewer bits than DTL, saving header space.
