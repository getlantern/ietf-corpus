document: rfc-8139
kind: wire-format
summary: 'The FGL-VLAN-Pairs APPsub-TLV (type 20) encodes an explicit list of FGL-to-VLAN mappings as k Mapping RECORDs of 5 bytes each: 4-bit RESV, 12-bit VLAN ID, 3-byte FGL. Length = 5*k; APPsub-TLVs with Length not a multiple of 5 are corrupt and MUST be ignored.'
section: "10.5"
topics:
    - registry
