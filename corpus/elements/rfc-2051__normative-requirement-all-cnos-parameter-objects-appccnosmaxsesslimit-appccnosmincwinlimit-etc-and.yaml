document: rfc-2051
kind: normative-requirement
summary: All CNOS parameter objects (appcCnosMaxSessLimit, appcCnosMinCwinLimit, etc.) and the three target objects (appcCnosTargetLocLuName, appcCnosTargetParLuName, appcCnosTargetModeName) must be set to their desired values before setting appcCnosCommand to trigger execution of the CNOS verb.
section: 3.1.1
rfc2119_level: MUST
