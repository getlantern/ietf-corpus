document: rfc-6823
kind: design-rationale
summary: The GENINFO encoding was designed to minimize consumption of IS-IS TLV codepoints (limited to 256 total) and maximize format flexibility. A single TLV codepoint (251) with a 16-bit Application ID field allows up to 65535 applications without additional top-level codepoint allocations.
section: "1"
topics:
