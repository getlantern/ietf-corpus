document: rfc-8826
kind: normative-requirement
summary: For ICE consent verification, the receiving element MUST demonstrate receipt/knowledge of some value not available to the initiating site, preventing the site from forging responses. STUN transaction IDs MUST be generated by the browser and MUST NOT be made available to the initiating script, even via a diagnostic interface.
section: 4.2.1
rfc2119_level: MUST
topics:
    - webrtc
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
