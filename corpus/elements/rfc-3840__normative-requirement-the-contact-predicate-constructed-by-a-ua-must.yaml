document: rfc-3840
kind: normative-requirement
summary: The contact predicate constructed by a UA MUST be an AND of terms (a conjunction), where each term in the conjunction MUST be for a different feature tag. If a string value is used in a simple filter, it MUST NOT include '<' or '>' characters, MUST NOT be negated, and MUST be the only simple filter for that feature tag.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
