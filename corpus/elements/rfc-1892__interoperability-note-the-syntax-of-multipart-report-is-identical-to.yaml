document: rfc-1892
kind: interoperability-note
summary: The syntax of Multipart/Report is identical to the Multipart/Mixed content-type defined in RFC 1521. This means existing MIME parsers can handle the structure, with the report-type parameter providing the differentiator for automated processing.
