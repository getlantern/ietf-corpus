document: rfc-3578
kind: normative-requirement
summary: If the IAM contains less than the minimum amount of digits to route a call, the gateway starts T35 (15-20 seconds per Q.764) and waits for the minimum number of digits or a stop digit. If T35 expires before that threshold is reached, a REL with cause value 28 must be sent to the ISUP side.
section: "2.1"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
