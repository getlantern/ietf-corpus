document: rfc-9960
kind: normative-requirement
summary: If two or more multipoint services are mapped to one SRv6 PTI, the SRv6 SID representing the service context MUST be encoded as the last segment in the Segment List of the Segment Routing Header by the Root node to derive the packet processing context at a Leaf node.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
