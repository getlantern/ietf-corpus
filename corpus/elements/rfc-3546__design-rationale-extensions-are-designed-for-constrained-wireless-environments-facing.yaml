document: rfc-3546
kind: design-rationale
summary: Extensions are designed for constrained wireless environments facing bandwidth, memory, computational, and battery limitations not present in wired environments. The six specific extensions (SNI, max fragment, cert URLs, trusted CA, truncated HMAC, OCSP stapling) directly address these constraints rather than adding general TLS features.
