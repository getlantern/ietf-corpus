document: rfc-8641
kind: design-rationale
summary: YANG-Push replaces polling-based management with a push model because polling incurs latency, cycles may be missed under network stress, interval fluctuations make data hard to calibrate, and polling for infrequent changes wastes resources on network, devices, and applications.
