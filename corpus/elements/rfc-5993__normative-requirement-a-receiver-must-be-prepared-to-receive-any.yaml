document: rfc-5993
kind: normative-requirement
summary: A receiver MUST be prepared to receive any speech frame multiple times due to redundant transmission. A given frame MUST NOT be encoded as a speech frame in one packet and as a SID or No_Data frame in another packet.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
