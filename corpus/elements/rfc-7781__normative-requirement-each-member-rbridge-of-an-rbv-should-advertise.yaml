document: rfc-7781
kind: normative-requirement
summary: Each member RBridge of an RBv SHOULD advertise the RBv's pseudo-nickname with maximum priority (0xFF) in a Nickname sub-TLV within its TRILL IS-IS LSP, alongside its regular nicknames, to prevent the pseudo-nickname from being claimed by a higher-priority RBridge.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
