document: rfc-2529
kind: normative-requirement
summary: IPv4 multicast MUST be available in the domain. An IPv6 packet with a multicast destination address DST MUST be transmitted to the IPv4 Organization-Local Scope multicast address formed as 239.OLS.DST14.DST15, where DST14 and DST15 are the last two bytes of the IPv6 multicast address.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - multicast
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
