document: rfc-6780
kind: normative-requirement
summary: When the Extended Association ID field is omitted, the object Length MUST be set to 16 (IPv4) or 28 (IPv6). When included, the Length field MUST indicate the additional bytes including pad bytes. The Extended Association ID field MUST be set to a value that, together with all other fields, uniquely identifies the association.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
