document: rfc-4604
kind: interoperability-note
summary: SSM can be used by any host supporting source filtering APIs and the appropriate SFGMP. The SFGMP modifications defined in this document make SSM work better on SSM-aware hosts but are not strict prerequisites for using SSM.
