summary: 'Mandatory fields of the "signature" attribute are: version ("v"), certificate URL ("c"), signature method ("m"), time of signing ("t"), signed attributes list ("a"), and the signature value ("b"). The "b" field MUST be last. Optional field: expiration time ("x").'
