document: rfc-3986
kind: normative-requirement
summary: Percent-encoded octets corresponding to unreserved characters SHOULD be decoded to their corresponding characters by URI normalizers (e.g., "%7E" → "~"); unreserved-character octets are the only ones safe to decode at any time without risk of misinterpretation.
section: "2.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
