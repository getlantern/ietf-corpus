document: rfc-9685
kind: security-consideration
summary: This specification enables tracking the origin of multicast subscriptions inside the RPL network via the ROVR field in the EARO, representing a first step toward Route Ownership Validation (ROV) in RPL. RFC 8928 can protect anycast and multicast subscriptions if the ROVR values are pre-provisioned in the 6LBR.
section: "12"
topics:
    - security
    - routing
