document: rfc-8831
kind: normative-requirement
summary: The PPIDs WebRTC String (51), WebRTC String Empty (56), WebRTC Binary (53), and WebRTC Binary Empty (57) MUST be used to signal message type. Empty messages must be sent as a one-zero-byte SCTP user message with the Empty PPID, and receivers MUST ignore the byte and treat it as an empty message.
section: "6.6"
rfc2119_level: MUST
topics:
    - webrtc
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
