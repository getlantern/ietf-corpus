document: rfc-1827
kind: normative-requirement
summary: Conforming implementations MUST fully implement the ESP header, MUST support manual key distribution, MUST comply with all requirements of the IP Security Architecture (RFC 1825), and MUST support DES CBC as specified in the companion ESP DES-CBC Transform document (RFC 1829).
