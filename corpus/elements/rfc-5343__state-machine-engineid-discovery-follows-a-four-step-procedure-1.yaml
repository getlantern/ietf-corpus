summary: 'EngineID discovery follows a four-step procedure: (1) use existing contextEngineID if known; (2) delegate to the security model if it supports discovery (e.g., USM); (3) send a Read Class operation using localEngineID to retrieve snmpEngineID.0; (4) return error if contextEngineID cannot be determined.'
