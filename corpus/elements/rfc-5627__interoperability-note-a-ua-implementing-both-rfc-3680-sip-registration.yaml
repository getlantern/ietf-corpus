document: rfc-5627
kind: interoperability-note
summary: A UA implementing both RFC 3680 (SIP registration event package) and GRUU MUST also implement RFC 5628 (extension to RFC 3680 for GRUU), as RFC 3680 allows registrars to shorten registrations forcefully and RFC 5628 is necessary to keep the set of valid temporary GRUUs synchronized between UA and registrar.
section: "4.2"
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
