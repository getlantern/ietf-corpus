document: rfc-7652
kind: normative-requirement
summary: After sending a PA message, a PCP device MUST NOT send any subsequent PA message until it receives a PA message with a proper sequence number from the peer; this ensures reliable delivery required by EAP.
section: "6.3"
rfc2119_level: MUST NOT
topics:
