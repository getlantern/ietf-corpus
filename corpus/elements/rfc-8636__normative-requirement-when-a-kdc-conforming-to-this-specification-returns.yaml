document: rfc-8636
kind: normative-requirement
summary: When a KDC conforming to this specification returns KDC_ERR_DIGEST_IN_CERT_NOT_ACCEPTED, it MAY include a TD_CERT_DIGEST_ALGORITHMS typed data element listing acceptable digest algorithms for the client's X.509 certificate in decreasing order of preference.
