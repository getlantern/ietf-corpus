document: rfc-2735
kind: registry
summary: The LLC/SNAP protocol ID 0x00-08 for VPN encapsulation was previously allocated by IANA in conjunction with RFC 2684; this document requires no additional LLC/SNAP protocol ID allocations. VPN indices under the IANA OUI (0x00-00-5E) are reserved and require IESG allocation and approval per RFC 2434.
