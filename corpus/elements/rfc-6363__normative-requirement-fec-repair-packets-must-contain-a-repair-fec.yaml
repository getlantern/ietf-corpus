document: rfc-6363
kind: normative-requirement
summary: FEC repair packets MUST contain a Repair FEC Payload ID field that identifies the source block and the relationship between the contained repair payloads and the original source block. The contents and format of this field are defined by the FEC scheme.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
