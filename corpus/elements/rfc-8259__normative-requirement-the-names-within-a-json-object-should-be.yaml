document: rfc-8259
kind: normative-requirement
summary: The names within a JSON object SHOULD be unique. When names are not unique, behavior of receiving software is unpredictable — implementations vary between reporting last value, reporting error, or reporting all pairs.
section: "4"
rfc2119_level: SHOULD
topics:
    - json
