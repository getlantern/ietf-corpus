document: rfc-5682
kind: interoperability-note
summary: F-RTO detects spurious RTOs only following an RTO event. Eifel (using TCP timestamps) and DSACK-based algorithms can additionally detect spurious retransmissions caused by other events such as packet reordering, providing broader detection coverage.
