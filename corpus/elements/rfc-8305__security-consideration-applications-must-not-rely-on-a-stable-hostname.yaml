document: rfc-8305
kind: security-consideration
summary: Applications MUST NOT rely on a stable hostname-to-address mapping to ensure security properties, since DNS results may change between queries. Happy Eyeballs increases the likelihood that subsequent connections to a single hostname use different IP addresses.
section: "10"
topics:
