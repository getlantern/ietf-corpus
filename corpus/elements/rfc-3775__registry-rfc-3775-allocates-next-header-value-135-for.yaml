summary: 'RFC 3775 allocates Next Header value 135 for the Mobility Header and creates an IANA registry for Mobility Header (MH) Type values: 0=Binding Refresh Request, 1=Home Test Init, 2=Care-of Test Init, 3=Home Test, 4=Care-of Test, 5=Binding Update, 6=Binding Acknowledgement, 7=Binding Error. Values 8–255 are unassigned.'
