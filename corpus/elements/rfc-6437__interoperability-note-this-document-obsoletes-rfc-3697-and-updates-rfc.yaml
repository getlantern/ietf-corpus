document: rfc-6437
kind: interoperability-note
summary: This document obsoletes RFC 3697 and updates RFC 2205 and RFC 2460. The key differences from RFC 3697 include encouraging non-zero flow label values, promoting the stateless model with uniformly distributed values, and allowing routers to set labels on behalf of hosts that do not.
