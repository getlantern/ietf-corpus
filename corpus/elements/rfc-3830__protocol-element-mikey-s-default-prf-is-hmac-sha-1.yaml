document: rfc-3830
kind: protocol-element
summary: MIKEY's default PRF is HMAC-SHA-1 based. The input key is split into 256-bit blocks; each block feeds an iterative HMAC chain (P-function) over a label, and the per-block outputs are XOR-combined to produce an output key of the desired length.
section: 4.1.2
topics:
