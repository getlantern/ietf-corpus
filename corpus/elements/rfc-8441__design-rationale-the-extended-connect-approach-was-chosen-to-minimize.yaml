document: rfc-8441
kind: design-rationale
summary: The Extended CONNECT approach was chosen to minimize solution complexity while addressing the primary concern of running HTTP/2 and WebSockets concurrently. A more native HTTP/2 integration would have required larger additions to HTTP/2.
