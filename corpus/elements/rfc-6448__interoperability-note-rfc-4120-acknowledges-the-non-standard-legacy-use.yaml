document: rfc-6448
kind: interoperability-note
summary: RFC 4120 acknowledges the non-standard legacy use of unencrypted KRB-CRED messages in the MIT, Heimdal, and Microsoft Kerberos GSS-API implementations; this document formalizes that behavior to enable its continued use in new applications without breaking existing deployments.
