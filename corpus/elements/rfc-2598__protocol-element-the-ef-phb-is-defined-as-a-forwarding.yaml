document: rfc-2598
kind: protocol-element
summary: The EF PHB is defined as a forwarding treatment for a diffserv aggregate where the departure rate from any diffserv node must equal or exceed a configurable rate, independent of other traffic. It provides the foundation for low loss, low latency, low jitter, assured bandwidth end-to-end service.
section: "2"
topics:
