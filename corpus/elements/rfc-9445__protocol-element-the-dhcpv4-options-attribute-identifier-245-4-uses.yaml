document: rfc-9445
kind: protocol-element
summary: The DHCPv4-Options Attribute (identifier 245.4) uses the Long Extended Type format with Type=245 and Extended-Type=4. Its Value field contains a list of DHCPv4 options. Multiple instances of the same option MAY be included especially for concatenation-requiring options that exceed the 255-octet maximum DHCPv4 option size.
section: "3.2"
topics:
