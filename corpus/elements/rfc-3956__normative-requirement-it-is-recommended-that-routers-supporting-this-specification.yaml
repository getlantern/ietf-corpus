document: rfc-3956
kind: normative-requirement
summary: It is RECOMMENDED that routers supporting this specification do not act as RPs unless explicitly configured to do so, since becoming an RP requires no advertisement. Multicast groups or group ranges to be served MAY need to be explicitly configured at the RP.
section: "10"
rfc2119_level: RECOMMENDED
