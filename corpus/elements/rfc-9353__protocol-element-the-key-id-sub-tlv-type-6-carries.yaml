document: rfc-9353
kind: protocol-element
summary: The KEY-ID sub-TLV (Type=6) carries a one-octet KeyID as per RFC 5925 to uniquely identify the Master Key Tuple (MKT) for TCP-AO. It MAY be present in PCED sub-TLV when the TCP-AO capability flag bit is set.
section: "3.2"
topics:
