document: rfc-5488
kind: normative-requirement
summary: Deployment of SNMPv3 with full cryptographic mechanisms (authentication and privacy) is RECOMMENDED; deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers SHOULD consider the SNMPv3 security framework per RFC 3410 section 8.
section: "5"
rfc2119_level: RECOMMENDED
topics:
