document: rfc-5648
kind: design-rationale
summary: Binding cache lookup for data packets does not carry BID information, so when no flow-filter-based BID selection mechanism is available, a node SHOULD use the binding last verified by receiving data or signaling from the mobile node. This avoids requiring per-packet BID signaling overhead.
section: "3"
topics:
    - mobility
    - ip
