document: rfc-5132
kind: protocol-element
summary: ipMcastScopeNameTable provides human-readable, language-tagged names for multicast address scopes, indexed by address type, address prefix, and LangTag. The ipMcastScopeNameDefault flag indicates a preferred language when no desired language name is available.
