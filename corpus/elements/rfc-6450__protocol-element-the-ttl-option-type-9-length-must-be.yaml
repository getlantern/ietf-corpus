document: rfc-6450
kind: protocol-element
summary: The TTL option (type 9, length MUST be 1) specifies the TTL/hop-count used for an Echo Reply message. Servers SHOULD include this in every Echo Reply to allow clients to determine the number of router hops traversed. If absent, the client SHOULD NOT attempt to calculate hop count.
section: "3.2"
topics:
    - multicast
    - ip
