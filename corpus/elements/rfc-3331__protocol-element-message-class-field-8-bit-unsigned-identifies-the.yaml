kind: protocol-element
summary: 'Message Class field (8-bit unsigned) identifies the protocol adaptation layer: 0=MGMT, 3=ASPSM, 4=ASPTM, 6=MAUP (M2UA-specific MTP2 user adaptation messages), 10=IIM (Interface Identifier Management). Values 11-127 are reserved by IETF; 128-255 reserved for IETF-defined extensions.'
