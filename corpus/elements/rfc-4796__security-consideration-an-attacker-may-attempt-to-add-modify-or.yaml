document: rfc-4796
kind: security-consideration
summary: An attacker may attempt to add, modify, or remove 'content' attributes from a session description, potentially causing an application to behave in an undesirable way. It is strongly RECOMMENDED that integrity protection (e.g., S/MIME or TLS when carried over SIP) be applied to SDP session descriptions.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - realtime
    - sip
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
