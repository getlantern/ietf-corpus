document: rfc-4537
kind: security-consideration
summary: If a stronger enctype key is negotiated beneath a weaker enctype key, an attacker able to break the weaker enctype can also recover the stronger enctype key. The extension's benefit is minimizing the amount of ciphertext encrypted under a weak enctype that is exposed to an attacker.
section: "4"
topics:
