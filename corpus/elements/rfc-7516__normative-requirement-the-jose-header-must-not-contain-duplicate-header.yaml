document: rfc-7516
kind: normative-requirement
summary: The JOSE Header MUST NOT contain duplicate Header Parameter names. When using JWE JSON Serialization, the same Header Parameter name MUST NOT occur across the JWE Protected Header, JWE Shared Unprotected Header, and JWE Per-Recipient Unprotected Header — the three sets must be disjoint.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - jose
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
