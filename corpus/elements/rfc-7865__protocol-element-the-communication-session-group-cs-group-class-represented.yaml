document: rfc-7865
kind: protocol-element
summary: The Communication Session Group (CS-Group) class, represented by the 'group' XML element, groups related Communication Sessions (e.g., a transferred call across multiple agents). Its attributes are group_id (base64-encoded UUID, unique across SRCs interacting with the same SRS), associate-time, and disassociate-time.
section: "6.2"
