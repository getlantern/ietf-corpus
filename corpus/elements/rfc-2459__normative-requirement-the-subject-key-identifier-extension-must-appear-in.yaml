document: rfc-2459
kind: normative-requirement
summary: The Subject Key Identifier extension MUST appear in all conforming CA certificates. Its value MUST equal the keyIdentifier placed in the authorityKeyIdentifier extension of certificates issued by the subject CA. This extension MUST NOT be marked critical.
section: 4.2.1.2
rfc2119_level: MUST
topics:
    - pkix
