document: rfc-5321
kind: wire-format
summary: The MAIL command has the form 'MAIL FROM:<reverse-path> [SP <mail-parameters>] CRLF'; the RCPT command has the form 'RCPT TO:<forward-path> [SP <rcpt-parameters>] CRLF'. Spaces are not permitted on either side of the colon following FROM or TO.
