document: rfc-3081
kind: normative-requirement
summary: SEQ frames for a channel must have higher priority than messages for that channel, and BEEP peers must advertise windows based on available buffer space to allow data to be read from the transport service as soon as available.
section: 3.1.4
rfc2119_level: MUST
topics:
