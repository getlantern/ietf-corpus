document: rfc-7012
kind: design-rationale
summary: The use of the term 'information model' for IPFIX is not fully aligned with RFC 3444's definition, because the IPFIX information model specifies neither relationships between Information Elements nor a concrete wire encoding. The IPFIX encoding is defined separately in RFC 7011; other encodings (e.g., XML) are also possible.
section: "1"
topics:
