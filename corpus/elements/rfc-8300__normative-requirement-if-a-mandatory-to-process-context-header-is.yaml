document: rfc-8300
kind: normative-requirement
summary: 'If a mandatory-to-process Context Header is missing in an SFP packet, the SFC-aware SF MUST NOT process the packet and MUST log an error at least once per SPI. Multiple Context Headers of the same type where duplicates are not allowed: MUST process only the first instance.'
section: 2.5.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
