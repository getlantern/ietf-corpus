document: rfc-959
kind: interoperability-note
summary: A file must be stored and retrieved with the same TYPE, STRU, and MODE parameters to ensure the retrieved version is identical to the original. All Local type transformations must be invertible, and Image type padding schemes must be well publicized to enable processing at the storage site.
section: 3.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
