document: rfc-8668
kind: normative-requirement
summary: L2 Bundle Member Attributes advertisements MUST be withdrawn if the advertised link becomes operationally down or is no longer a member of the identified L2 Bundle. An advertisement implies that the identified link is a member of the L2 Bundle and is operationally up.
section: "3"
rfc2119_level: MUST
topics:
    - routing
