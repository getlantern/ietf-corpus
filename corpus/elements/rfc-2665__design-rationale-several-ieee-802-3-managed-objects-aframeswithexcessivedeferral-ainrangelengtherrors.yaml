document: rfc-2665
kind: design-rationale
summary: Several IEEE 802.3 managed objects (aFramesWithExcessiveDeferral, aInRangeLengthErrors, aOutOfRangeLengthField, aMACEnableStatus, aTransmitEnableStatus, aMulticastReceiveStatus, acInitializeMAC) were removed from the MIB based on implementation feedback; others were omitted because the information is derivable from MAU-MIB objects.
