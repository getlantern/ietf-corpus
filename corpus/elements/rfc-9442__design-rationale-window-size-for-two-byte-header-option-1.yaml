document: rfc-9442
kind: design-rationale
summary: WINDOW_SIZE for Two-Byte Header Option 1 is limited to 12 (not the maximum 15 for 4-bit FCN) because 4 windows (M=2) with bitmaps of size 12 can be fitted in a single SCHC Compound ACK within the 64-bit Sigfox Downlink payload constraint.
section: 3.5.1.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
