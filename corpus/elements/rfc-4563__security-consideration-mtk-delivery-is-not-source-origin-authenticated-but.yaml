document: rfc-4563
kind: security-consideration
summary: MTK delivery is not source origin authenticated but protected by a group MAC keyed by MSK. Group members with access to MSK can spoof MTK updates to other members; injection on the air interface between base stations and user equipment is the primary risk.
section: "7"
topics:
    - crypto
    - security
