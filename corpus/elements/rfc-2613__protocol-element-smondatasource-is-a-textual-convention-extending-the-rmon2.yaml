document: rfc-2613
kind: protocol-element
summary: 'SmonDataSource is a textual convention extending the RMON2 DataSource type to three forms: ifIndex.<I> (port-based, where ifType is not propVirtual), smonVlanDataSource.<V> (VLAN-based, where V is an 802.1Q VLAN-ID between 1 and 4094), and entPhysicalEntry.<N> (entity-based, referencing a physical entity such as a switch backplane).'
section: "5"
