document: rfc-3107
kind: protocol-element
summary: Label mapping information is carried in the NLRI field of the BGP-4 Multiprotocol Extensions attribute (RFC 2858). SAFI value 4 indicates that the NLRI contains label information, and the AFI indicates the address family of the associated route.
