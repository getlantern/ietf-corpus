document: rfc-4737
kind: design-rationale
summary: The reordering extent metric tends to overestimate the receiver storage needed to restore order because it does not subtract earlier reordered packets the receiver could pass on. This bias is acknowledged as acceptable, especially for on-the-fly calculation requirements.
section: 4.2.3
topics:
    - measurement
