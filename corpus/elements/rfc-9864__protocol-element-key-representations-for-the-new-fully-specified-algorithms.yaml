document: rfc-9864
kind: protocol-element
summary: Key representations for the new fully-specified algorithms are identical to those for the polymorphic algorithms they replace, except for the 'alg' parameter value. For example, a key for Ed25519 uses the same structure as specified in RFC 8037 for EdDSA keys, with 'alg' set to 'Ed25519' rather than 'EdDSA'.
