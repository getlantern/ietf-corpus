summary: BANDWIDTH object type 3 represents Generalized bandwidth for a new TE-LSP; type 4 represents Generalized bandwidth of an existing TE-LSP for which reoptimization is requested. Both reuse RSVP-TE traffic specification encodings supporting SONET/SDH, G.709, Ethernet, OTN-TDM, SSON, and Intserv.
