document: rfc-8601
kind: security-consideration
summary: Attackers may inject intentionally malformed or extraordinarily large Authentication-Results header fields to exploit weaknesses in parsing code. Implementers must thoroughly validate all received instances and be robust against both intentional and accidental malformation.
section: "7.8"
topics:
