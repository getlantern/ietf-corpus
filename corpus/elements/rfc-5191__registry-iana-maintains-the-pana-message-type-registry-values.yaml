document: rfc-5191
kind: registry
summary: IANA maintains the PANA Message Type registry (values 1–65519 by IETF Consensus; 65520–65535 reserved for experiments). This document defines types 1–4. The same type number is shared by request and answer messages (except type 1); the R-bit distinguishes them.
