document: rfc-3858
kind: security-consideration
summary: Watcher information is sensitive because it reveals who is monitoring a resource. The distribution protocol SHOULD ensure privacy, message integrity, and authentication, and SHOULD implement access controls restricting which subscribers can see watcher information for a given resource.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
    - sip
    - realtime
