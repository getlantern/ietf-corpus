document: rfc-7880
kind: normative-requirement
summary: bfd.DemandMode MUST be initialized to 1 for SBFDInitiator sessions and to 0 for SBFDReflector sessions. This divergence from RFC 5880 defaults is essential to prevent infinite reflection loops (see Appendix A).
