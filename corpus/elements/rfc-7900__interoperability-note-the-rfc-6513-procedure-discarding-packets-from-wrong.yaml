document: rfc-7900
kind: interoperability-note
summary: The RFC 6513 procedure 'Discarding Packets from Wrong PE' (Section 9.1.1) does not cause a receiver VRF to discard ambiguous extranet traffic arriving on the wrong P-tunnel when both P-tunnels originate from the same upstream PE; additional per-tunnel expected-P-tunnel checks are required.
section: "2.1"
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
