document: rfc-9867
kind: interoperability-note
summary: If the responder agrees to a PPK during IKE_INTERMEDIATE but later, during IKE_AUTH, finds that the selected PPK is not associated with the initiator's identity per local policy, it SHOULD abort with AUTHENTICATION_FAILED but MAY continue if local policy permits the mismatch.
section: "3.1"
topics:
    - ipsec
    - vpn
    - security
