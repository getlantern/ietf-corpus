document: rfc-5953
kind: wire-format
summary: SnmpTLSAddress is an OCTET STRING (SIZE 1..255) encoding an IPv4 dotted-decimal address, an IPv6 colon-separated address in square brackets, or a US-ASCII hostname, each followed by a colon and a decimal port number. Internationalized hostnames are encoded via the ToASCII operation with UseSTD3ASCIIRules.
