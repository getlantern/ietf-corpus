document: rfc-3498
kind: protocol-element
summary: 'The ApsSwitchCommand textual convention defines the set of APS switch commands: noCmd (read-only sentinel), clear, lockoutOfProtection, forcedSwitchWorkToProtect, forcedSwitchProtectToWork, manualSwitchWorkToProtect, manualSwitchProtectToWork, and exercise. If an equal or higher priority request is already in effect when a switch command is issued, an inconsistentValue error is returned.'
section: "4"
topics:
