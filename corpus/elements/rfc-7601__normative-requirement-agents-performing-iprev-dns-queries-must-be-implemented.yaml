document: rfc-7601
kind: normative-requirement
summary: Agents performing 'iprev' DNS queries MUST be implemented to limit the number of names evaluated by corresponding A or AAAA queries so as not to be unduly taxing to the DNS infrastructure; this limit MAY be configurable by an administrator. SPF's example limit of 10 is cited.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
