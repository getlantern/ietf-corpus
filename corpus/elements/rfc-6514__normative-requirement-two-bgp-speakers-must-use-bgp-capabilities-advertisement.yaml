document: rfc-6514
kind: normative-requirement
summary: Two BGP speakers MUST use BGP Capabilities Advertisement (capability code 1, multiprotocol BGP) with AFI 1 or 2 and SAFI MCAST-VPN before exchanging MCAST-VPN NLRIs, to ensure both peers can process them correctly.
