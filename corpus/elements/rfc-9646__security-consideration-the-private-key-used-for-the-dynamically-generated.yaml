document: rfc-9646
kind: security-consideration
summary: The private key used for the dynamically generated identity certificate MUST be protected from inadvertent disclosure to prevent identity fraud. It is RECOMMENDED that devices use a hardware security module (HSM) such as a TPM to generate and contain the private key within the HSM's security perimeter.
section: 4.1.1
topics:
    - security
    - crypto
    - pkix
