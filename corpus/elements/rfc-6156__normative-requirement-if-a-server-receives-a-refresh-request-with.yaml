document: rfc-6156
kind: normative-requirement
summary: If a server receives a Refresh Request with a REQUESTED-ADDRESS-FAMILY attribute whose value does not match the address family of the allocation, the server MUST reply with a 443 (Peer Address Family Mismatch) Refresh error response.
section: "5.2"
rfc2119_level: MUST
topics:
    - nat
    - ip
