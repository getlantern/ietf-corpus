document: rfc-2735
kind: normative-requirement
summary: Network Administrators MUST avoid configurations in which a VPN-aware NHRP Client is authoritatively served by a non-VPN-aware NHRP Server, since a non-VPN-aware NHS cannot process the NHRP Device Capability extension.
