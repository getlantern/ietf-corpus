document: rfc-2865
kind: protocol-element
summary: 'The challenge/response flow: the server returns an Access-Challenge with a Reply-Message and optional State attribute. The NAS prompts the user, then sends a new Access-Request with a new ID, the user''s encrypted response in User-Password, and the State attribute from the challenge. The server replies with Access-Accept, Access-Reject, or another Access-Challenge.'
section: "2.1"
topics:
    - radius
    - security
