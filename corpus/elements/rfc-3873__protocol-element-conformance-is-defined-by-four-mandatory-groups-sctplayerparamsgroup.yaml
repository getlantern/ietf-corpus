summary: 'Conformance is defined by four mandatory groups: sctpLayerParamsGroup (7 layer-wide config objects), sctpStatsGroup (22 layer/association statistics), sctpPerAssocParamsGroup (19 per-association parameter objects), and sctpPerAssocStatsGroup (4 per-association flow control stats). The sctpInverseGroup (reverse lookup tables) is optional.'
