document: rfc-9668
kind: security-consideration
summary: 'Even if a client sends multiple simultaneous EDHOC + OSCORE requests with the same C_R (violating the SHOULD NOT), there is no security impact: the server will not process the same EDHOC message_3 more than once in the same session and will enforce OSCORE replay protection regardless.'
section: "7"
