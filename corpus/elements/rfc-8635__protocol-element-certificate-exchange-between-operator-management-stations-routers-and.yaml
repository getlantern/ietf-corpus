summary: 'Certificate exchange between operator management stations, routers, and the RPKI uses PKCS#7 certs-only messages (RFC 8551). Three transport options are enumerated: application/pkcs10 + pkcs7-mime media types, FTP/HTTP per RFC 2585, or EST per RFC 7030.'
