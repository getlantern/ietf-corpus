document: rfc-7512
kind: registry
summary: This document moves the 'pkcs11' URI scheme from the Provisional URI Schemes registry to the Permanent URI Schemes registry (IANA). Known consumers include GnuTLS, GNOME, p11-kit, Oracle Solaris 11+, OpenSC, OpenConnect, and FreeIPA.
