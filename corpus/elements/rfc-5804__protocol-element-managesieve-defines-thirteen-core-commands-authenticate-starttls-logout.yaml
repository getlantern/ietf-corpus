document: rfc-5804
kind: protocol-element
summary: 'ManageSieve defines thirteen core commands: AUTHENTICATE, STARTTLS, LOGOUT, CAPABILITY, HAVESPACE, PUTSCRIPT, LISTSCRIPTS, SETACTIVE, GETSCRIPT, DELETESCRIPT, RENAMESCRIPT, CHECKSCRIPT, and NOOP. Commands valid in all states are CAPABILITY, LOGOUT, and NOOP; AUTHENTICATE and STARTTLS are only valid in non-authenticated state; all others are only valid in authenticated state.'
section: "2"
