document: rfc-5227
kind: interoperability-note
summary: ACD does not require all hosts on the link to implement this specification; it only requires that peers correctly implement RFC 826 ARP. If a peer correctly responds to ARP Requests targeting its address, the probing host can detect the conflict even if the peer does not implement ACD.
section: "1.3"
topics:
    - ip
