document: rfc-5934
kind: security-consideration
summary: Digital signatures protect TAMP messages from undetected modification and provide data origin authentication. Replay attacks are mitigated by per-signer sequence numbers stored in the trust anchor store; sequence number processing must succeed before any message is acted upon.
section: "10"
