document: rfc-4514
kind: interoperability-note
summary: Line-wrapping of long DN strings for display should insert whitespace only after the RDN separator (comma) or AVA separator (plus). That inserted whitespace must be removed before the DN is used in LDAP operations.
section: A
topics:
    - ldap
