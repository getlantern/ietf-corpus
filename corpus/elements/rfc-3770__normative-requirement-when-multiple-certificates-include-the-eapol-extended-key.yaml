document: rfc-3770
kind: normative-requirement
summary: When multiple certificates include the EAPOL extended key usage and SSID values collide (same SSID in different certificates), automatic selection will fail and the implementation SHOULD obtain help from the user to choose the correct certificate.
section: "3"
rfc2119_level: SHOULD
