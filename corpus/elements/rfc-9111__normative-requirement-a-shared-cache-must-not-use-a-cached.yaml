document: rfc-9111
kind: normative-requirement
summary: 'A shared cache MUST NOT use a cached response to a request with an Authorization header field to satisfy a subsequent request unless the response contains a Cache-Control directive that explicitly allows shared caching: must-revalidate, public, or s-maxage.'
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
