document: rfc-4479
kind: design-rationale
summary: Services are not centrally enumerated; anything exhibiting the required properties (characteristics, reach information, status, relative information) qualifies as a service. This avoids definitional problems when a service spans multiple software agents, lacks a distinct network address, or is defined by complex dispatch logic.
