document: rfc-8250
kind: normative-requirement
summary: Operating systems MUST implement a separate packet sequence number counter per 5-tuple (SADDR, SPORT, DADDR, DPORT, PROTC). PSNTP is initialized at a random number to make spoofing harder and incremented monotonically for each packet of the session flow.
section: 3.2.1
rfc2119_level: MUST
topics:
    - ip
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
