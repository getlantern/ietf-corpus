document: rfc-5104
kind: protocol-element
summary: Temporal-Spatial Trade-off Notification (TSTN) is the mandatory response to a TSTR, conveying the encoder's chosen trade-off index. It provides an explicit acknowledgement because trade-off changes cannot be directly identified from the media bit stream.
