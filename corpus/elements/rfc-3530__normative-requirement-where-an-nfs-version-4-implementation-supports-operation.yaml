document: rfc-3530
kind: normative-requirement
summary: Where an NFS version 4 implementation supports operation over the IP network protocol, the supported transports MUST be among the IETF-approved congestion control transport protocols. An NFS version 4 implementation MUST support operation over the TCP transport protocol.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
