document: rfc-7433
kind: protocol-element
summary: Hex encoding ('encoding=hex') encodes UUI data using base16 encoding per RFC 4648 Section 8. The hex-encoded value is normally represented using the 'token' construction; if 'quoted-string' is used, the quotes MUST be ignored.
