document: rfc-2244
kind: protocol-element
summary: 'The SEARCH command retrieves entries from a dataset or context with optional modifiers: DEPTH (tree traversal depth), HARDLIMIT/LIMIT (result capping), MAKECONTEXT [ENUMERATE] [NOTIFY] (create a persistent context with optional ordered enumeration and change notifications), NOINHERIT, RETURN (attribute/metadata selection), and SORT.'
