document: rfc-4120
kind: normative-requirement
summary: If a server loses track of authenticators presented within the allowable clock skew, it MUST reject all requests until the clock skew interval has passed, preventing replay of any lost or recorded authenticators.
section: 3.2.3
rfc2119_level: MUST
topics:
    - security
