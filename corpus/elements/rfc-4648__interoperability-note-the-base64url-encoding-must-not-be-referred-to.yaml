document: rfc-4648
kind: interoperability-note
summary: The 'base64url' encoding MUST NOT be referred to simply as 'base64' and should not be treated as equivalent to it. Unless clarified otherwise, 'base64' means the standard alphabet with '+' and '/' at positions 62–63.
section: "5"
extracted_by: claude-sonnet-4-6
