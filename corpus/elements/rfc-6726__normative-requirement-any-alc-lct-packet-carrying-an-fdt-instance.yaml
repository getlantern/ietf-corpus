document: rfc-6726
kind: normative-requirement
summary: Any ALC/LCT packet carrying an FDT Instance MUST include the EXT_FDT LCT Header Extension. The FDT Instance Header is identical for all packets belonging to a particular FDT Instance.
section: "3.3"
rfc2119_level: MUST
