document: rfc-9546
kind: normative-requirement
summary: For DetNet active OAM packets, PREOF MUST use the Sequence Number field in d-ACH as the source of sequencing information; RFC 8964 Section 4.2.1 (which governs the generic Control Word Sequence Number) does not apply.
