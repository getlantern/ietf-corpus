document: rfc-5304
kind: design-rationale
summary: Adding a Key-ID field (similar to OSPFv2 and RIPv2) was considered and rejected. The existing mechanism was already widely implemented since 1999 and widely deployed, and the improvement from a revised mechanism was not large enough to justify the change given the installed base.
section: "3.4"
topics:
