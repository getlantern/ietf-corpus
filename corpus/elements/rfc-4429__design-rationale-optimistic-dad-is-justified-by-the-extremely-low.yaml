document: rfc-4429
kind: design-rationale
summary: Optimistic DAD is justified by the extremely low probability of address collision when using randomly or hash-generated Interface Identifiers from a 2^62-element space. Birthday-paradox analysis shows collision probability below 5.4e-8 even for networks of 500,000 nodes, making it safe to begin using an address before DAD completes.
section: A.1
topics:
    - ip
    - v6ops
