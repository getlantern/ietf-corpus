document: rfc-3526
kind: security-consideration
summary: Strength estimates for the defined groups range from approximately 90-120 bits for the 1536-bit group (id 5) up to 190-310 bits for the 8192-bit group (id 18). The exponent used in Diffie-Hellman must have double the entropy of the desired security strength (e.g., a 128-bit-strength group requires more than 256 bits of randomness in the exponent).
section: "8"
topics:
