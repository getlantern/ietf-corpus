document: rfc-9824
kind: protocol-element
summary: 'Signaled Response Code Restoration: when the CO flag is set in a query, an authoritative server implementing both Compact Denial of Existence and this scheme will set the CO flag in the response and additionally set RCODE to NXDOMAIN (3) for nonexistent names, while still returning a NODATA body with NXNAME in the NSEC Type Bit Maps.'
section: "5.1"
topics:
    - dns
