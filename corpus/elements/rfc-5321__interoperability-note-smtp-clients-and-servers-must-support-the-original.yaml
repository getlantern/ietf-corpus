document: rfc-5321
kind: interoperability-note
summary: SMTP clients and servers MUST support the original HELO mechanism as a fallback for compatibility with older conforming implementations that do not support ESMTP extensions. If a server returns 'command not recognized' to EHLO, the client SHOULD fall back to HELO.
section: 2.2.1
topics:
    - email
