document: rfc-2046
kind: normative-requirement
summary: Fragmentation agents must split messages at line boundaries only, because many transports cannot preserve the semantics of messages that do not end with a CRLF sequence. Splits at non-line-boundary points are explicitly forbidden.
section: 5.2.2.1
rfc2119_level: MUST
topics:
    - email
