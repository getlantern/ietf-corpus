document: rfc-7978
kind: registry
summary: 'IANA created the ''RBridge Channel SubError Codes'' subregistry (registration procedure: IETF Review) under the existing ''RBridge Channel Error Codes'' registry. SubERR values are defined only for ERR=6 (Unknown or unsupported field value): 0 (Reserved), 1 (Non-zero RESV4), 2 (Unsupported SType), 3 (Unsupported PType), 4 (Unknown Key ID), 5 (Unsupported Ethertype with PType=2), 6 (Unsupported authentication algorithm for SType=1), 7 (Non-zero SubERR with zero ERR). IANA also assigned ERR codes 6, 7, and 8 in the existing Error Codes registry.'
section: 6.2.2
topics:
    - routing
    - registry
