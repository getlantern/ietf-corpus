document: rfc-1981
kind: design-rationale
summary: 'PMTU aging is asymmetric: stale values that are too large are self-correcting (the next oversized packet elicits a Packet Too Big message), but stale values that are too small have no self-correction mechanism, so periodic reset to first-hop MTU is required.'
section: "5.3"
