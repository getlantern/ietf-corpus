document: rfc-8314
kind: security-consideration
summary: Use of client certificates with TLS 1.2 reveals the user's identity to any party with the ability to read packets from the transmission medium, compromising user privacy. TLS 1.3 reduces this risk somewhat; the only mitigation in TLS 1.2 is to avoid presenting client certificates except with explicit authorization.
section: "8"
topics:
    - tls
    - email
    - security
    - privacy
