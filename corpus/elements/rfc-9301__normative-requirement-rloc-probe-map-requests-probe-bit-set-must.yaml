document: rfc-9301
kind: normative-requirement
summary: RLOC-Probe Map-Requests (probe-bit set) MUST NOT be sent inside Encapsulated Control Messages. If a Map-Resolver or Map-Server receives a Map-Request with the probe-bit set, it MUST drop the message.
section: "5.8"
rfc2119_level: MUST NOT
topics:
    - routing
