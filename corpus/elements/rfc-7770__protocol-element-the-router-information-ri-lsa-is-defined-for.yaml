document: rfc-7770
kind: protocol-element
summary: The Router Information (RI) LSA is defined for advertising optional router capabilities in both OSPFv2 and OSPFv3. In OSPFv2 it uses an Opaque LSA with type 4; in OSPFv3 it uses LSA function code 12. Multiple instances are supported, with Instance ID 0 being the primary instance.
