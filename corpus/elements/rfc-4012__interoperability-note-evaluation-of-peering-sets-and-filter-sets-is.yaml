document: rfc-4012
kind: interoperability-note
summary: Evaluation of peering-sets and filter-sets is constrained by address family context, which may result in a 'NOT ANY' <mp-filter> or invalid <mp-peering>. Implementations may wish to issue a warning when a 'NOT ANY' filter is encountered.
section: 2.5.3
topics:
