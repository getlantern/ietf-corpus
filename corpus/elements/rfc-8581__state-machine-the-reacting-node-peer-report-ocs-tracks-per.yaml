document: rfc-8581
kind: state-machine
summary: 'The Reacting-Node Peer-Report OCS tracks per-peer, per-application overload state. States are: no OCS (new peer report creates OCS), active OCS (updated when sequence number increases), expired OCS (validity duration zero or timer expiry triggers controlled abatement end). A non-matching SourceID causes the report to be ignored entirely.'
section: 6.2.3
topics:
