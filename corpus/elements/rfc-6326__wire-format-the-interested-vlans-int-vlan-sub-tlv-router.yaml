document: rfc-6326
kind: wire-format
summary: The Interested VLANs (INT-VLAN) sub-TLV (Router Capability sub-TLV type 10, length 10+6*n) encodes a 2-byte Nickname, a 4-byte Interested VLANs field with M4/M6 multicast flags and start/end VLAN IDs, a 4-byte Appointed Forwarder Status Lost Counter, and n 6-byte root bridge IDs.
