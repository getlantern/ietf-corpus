document: rfc-7533
kind: wire-format
summary: FedFsStatus is an XDR enum with 38 values (0–37) encoding operation results, including NSDB connectivity errors (FEDFS_ERR_NSDB_ROUTE through FEDFS_ERR_NSDB_FAULT), LDAP referral errors, cache errors, and path errors. Numeric values differ from analogous NFSv4 status codes even where names are similar.
section: "2"
