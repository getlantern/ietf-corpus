document: rfc-4466
kind: design-rationale
summary: Extensibility for the APPEND command was structured slightly differently from other commands (SELECT, FETCH, STORE, etc.) in order to preserve backward compatibility with the existing BINARY and MULTIAPPEND extensions that had already defined append syntax independently.
