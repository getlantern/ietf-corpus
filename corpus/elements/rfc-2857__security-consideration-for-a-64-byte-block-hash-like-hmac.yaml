document: rfc-2857
kind: security-consideration
summary: For a 64-byte block hash like HMAC-RIPEMD-160-96, a birthday attack would require successfully processing 2**64 blocks, making it infeasible unless the underlying hash had collisions after only 2**30 blocks.
section: "3"
topics:
