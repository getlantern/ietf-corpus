document: rfc-8579
kind: protocol-element
summary: The 'specialuse_exists' test checks whether a special-use attribute is assigned to a particular mailbox or any mailbox in the user's personal namespace that allows message delivery. Without a mailbox argument, it tests any personal namespace mailbox; with a mailbox argument, it tests that specific mailbox for the listed attributes.
section: "3"
topics:
    - email
