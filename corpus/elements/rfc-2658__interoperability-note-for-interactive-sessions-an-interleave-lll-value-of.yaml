document: rfc-2658
kind: interoperability-note
summary: For interactive sessions, an interleave (LLL) value of 0 or 1 and a bundling factor of 4 or less is recommended to minimize end-to-end delay. When delay is not a concern, a bundling value of at least 4 and LLL of 4 or 5 (subject to MTU limits) is recommended for better packet-loss resilience.
section: "5"
topics:
    - rtp
    - realtime
