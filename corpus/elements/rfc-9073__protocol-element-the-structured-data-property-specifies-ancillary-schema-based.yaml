document: rfc-9073
kind: protocol-element
summary: The STRUCTURED-DATA property specifies ancillary schema-based data associated with a calendar component. Its value may be TEXT, BINARY (BASE64-encoded), or URI. For TEXT or BINARY values, the FMTTYPE and SCHEMA parameters MUST be present.
