document: rfc-4703
kind: normative-requirement
summary: The updater should only remove the DHCID RR if there are no A or AAAA RRs remaining for the client; the second UPDATE request asserts no A RRs and no AAAA RRs as prerequisites before deleting all RRs for the FQDN.
section: "5.5"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
