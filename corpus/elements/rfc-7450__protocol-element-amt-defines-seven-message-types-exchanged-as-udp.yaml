document: rfc-7450
kind: protocol-element
summary: 'AMT defines seven message types exchanged as UDP datagrams: Relay Discovery (1), Relay Advertisement (2), Request (3), Membership Query (4), Membership Update (5), Multicast Data (6), and Teardown (7). All messages are exchanged as IPv4 or IPv6 UDP datagrams, one message per datagram.'
