document: rfc-6775
kind: design-rationale
summary: The ABRO carries a 32-bit version number and the originating 6LBR IP address so that 6LRs in a multi-hop route-over topology can determine which of multiple 6LBRs originated a given set of prefix/context information and suppress redistribution of older versions, controlling flooding.
section: "4.3"
topics:
