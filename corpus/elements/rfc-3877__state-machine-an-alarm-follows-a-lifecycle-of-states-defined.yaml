document: rfc-3877
kind: state-machine
summary: 'An alarm follows a lifecycle of states defined by alarmModelState values: state 1 is always Clear; higher integer values represent raise states of increasing severity (e.g., warning, minor, major, critical). Transitions are triggered by matching incoming Notifications to alarmModelNotificationId and the optional alarmModelVarbindIndex/Value discriminator.'
section: "3.1"
