document: rfc-8733
kind: design-rationale
summary: 'The Minimum-Threshold field in percentage-based sub-TLVs suppresses unnecessary resignaling when LSP bandwidth is very low: a percentage crossing is only acted upon if the absolute deviation also exceeds the Minimum-Threshold, preventing frequent re-signaling due to small absolute changes at low bandwidth values.'
section: "4.2"
topics:
    - mpls
