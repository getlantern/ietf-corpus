document: rfc-3295
kind: protocol-element
summary: gsmpSwitchTable represents Switch Entities; each row configures a potential GSMP session on the switch side. Fields include max version, timer, switch name (first 3 octets must be OUI), port, instance number, partition type/ID, notification map, switch type (16-bit manufacturer field), window size, session state, storage type, and row status.
