document: rfc-9335
kind: interoperability-note
summary: Peers MAY negotiate both Cryptex and RFC 6904 header extension encryption simultaneously via SDP offer/answer; either mechanism may be used on a per-packet basis, but a single packet cannot use both at the same time.
