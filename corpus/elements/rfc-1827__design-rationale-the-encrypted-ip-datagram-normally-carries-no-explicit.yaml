document: rfc-1827
kind: design-rationale
summary: The encrypted IP datagram normally carries no explicit Security Label because the SPI implicitly indicates the sensitivity level, improving over IPv4 practice where explicit Sensitivity Labels were required for Compartmented Mode Workstations. This reduces overhead while maintaining security classification.
section: "3.2"
topics:
