document: rfc-9619
kind: design-rationale
summary: RFC 1035 predates the normative key words of BCP 14 (RFC 2119), so its QDCOUNT guidance for OPCODE = 0 lacked clear normative language. This document eliminates that ambiguity by expressing the constraint explicitly with MUST NOT.
