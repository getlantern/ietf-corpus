document: rfc-6788
kind: design-rationale
summary: The Line ID encoding uses only US-ASCII printable characters (decimal 32–126) and is derived from the DHCPv6 Remote-ID option (RFC 4649), which is in turn derived from DHCPv4 options (RFC 3046). This maintains encoding compatibility with the provisioning systems that already consume those DHCP options.
section: "7.1"
topics:
