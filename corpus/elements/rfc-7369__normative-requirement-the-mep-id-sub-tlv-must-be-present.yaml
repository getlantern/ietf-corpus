document: rfc-7369
kind: normative-requirement
summary: The MEP ID Sub-TLV MUST be present in the Ethernet OAM Configuration Sub-TLV. When the Transmit (T) flag is set, the corresponding MEP MUST send OAM packets; when the Receive (R) flag is set, the MEP MUST expect to receive OAM packets.
section: 3.3.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
