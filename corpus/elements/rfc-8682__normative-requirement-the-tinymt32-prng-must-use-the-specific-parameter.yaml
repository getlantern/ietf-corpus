kind: normative-requirement
summary: 'The TinyMT32 PRNG MUST use the specific parameter set: mat1 = 0x8f7011ee, mat2 = 0xfc78ff1f, tmat = 0x3793fdff. This ensures the pseudorandom sequence depends only on the seed value and not on parameter selection.'
