document: rfc-1374
kind: interoperability-note
summary: Support for IEEE 802.2 XID, TEST, and Type 2 PDUs is not required on HIPPI; Destinations that receive these PDUs may either ignore them or respond correctly per IEEE 802.2, ensuring compatibility with generic 802-aware upper layers.
