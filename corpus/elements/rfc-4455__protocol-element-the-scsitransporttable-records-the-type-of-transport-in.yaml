summary: The scsiTransportTable records the type of transport in use per device (scsiTransportType, an AutonomousType OID such as scsiTransportFCP), a RowPointer to the transport-specific MIB module row (scsiTransportPointer, 0.0 if no transport MIB exists), and the device name in the transport's naming format (scsiTransportDevName).
