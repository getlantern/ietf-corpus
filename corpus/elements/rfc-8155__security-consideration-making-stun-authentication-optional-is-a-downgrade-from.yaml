document: rfc-8155
kind: security-consideration
summary: Making STUN authentication optional is a downgrade from RFC 5766 to allow network-provided TURN servers to accept guest/new users. As a consequence, operational protections such as access control lists, firewalls, subscriber quotas, and ingress filtering MUST be applied to protect the TURN server.
section: "9"
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
