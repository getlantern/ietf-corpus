document: rfc-6016
kind: normative-requirement
summary: For SRefresh messages (RFC 2961 refresh overhead reduction), the source IP address MUST match the IPv4 address signaled in the RSVP_HOP object of the corresponding Path or Resv message; the IPv4 address field of a received VPN-IPv4 RSVP_HOP MUST be used as the source address for this matching.
section: "7.1"
rfc2119_level: MUST
topics:
    - qos
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
