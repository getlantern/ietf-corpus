document: rfc-2141
kind: wire-format
summary: The Namespace Identifier (NID) must match `<let-num> [ 1,31<let-num-hyp> ]`, allowing letters, digits, and hyphens (but not as the first character). The NID is case-insensitive and limited to 32 characters total.
section: "2.1"
extracted_by: claude-sonnet-4-6
