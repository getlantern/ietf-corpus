document: rfc-8832
kind: normative-requirement
summary: If a DATA_CHANNEL_OPEN message is received on an already-used stream, has invalid parameters, violates the odd/even rule, or is malformed, the receiver MUST close the corresponding data channel and MUST NOT send a DATA_CHANNEL_ACK.
section: "6"
rfc2119_level: MUST
topics:
