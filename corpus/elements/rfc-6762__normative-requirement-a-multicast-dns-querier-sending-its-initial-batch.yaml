document: rfc-6762
kind: normative-requirement
summary: A Multicast DNS querier sending its initial batch of questions immediately on wake from sleep or interface activation SHOULD set the unicast-response bit (QU) in those questions. On retransmission, the unicast-response bit SHOULD NOT be set.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - dns
    - multicast
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
