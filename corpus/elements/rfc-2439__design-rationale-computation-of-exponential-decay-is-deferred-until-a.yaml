document: rfc-2439
kind: design-rationale
summary: Computation of exponential decay is deferred until a route event occurs rather than being applied periodically to all routes, drastically reducing CPU load. Reuse lists allow suppressed routes to be batched and reevaluated only when they approach reuse eligibility.
