document: rfc-3676
kind: interoperability-note
summary: Messages generated with DelSp=yes and received by Format=Flowed-aware but DelSp-unaware clients will display an extra trailing space after removal of soft line breaks. For languages where spaces are common, generators MAY always use DelSp=no to avoid this.
section: "5"
topics:
