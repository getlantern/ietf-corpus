document: rfc-9482
kind: wire-format
summary: CMP PKIMessages are DER-encoded ASN.1 structures carried as the body of CoAP POST requests with content-format 'application/pkixcmp' (CoAP Content-Format ID 259). Large messages exceeding the interface MTU MUST be segmented using CoAP block-wise transfer.
section: "2.3"
topics:
