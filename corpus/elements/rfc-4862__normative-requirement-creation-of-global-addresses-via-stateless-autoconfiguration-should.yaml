document: rfc-4862
kind: normative-requirement
summary: Creation of global addresses via stateless autoconfiguration SHOULD be locally configurable, but the processing described in Section 5.5.3 MUST be enabled by default. If the sum of the advertised prefix length and the interface identifier length does not equal 128 bits, the Prefix Information option MUST be ignored.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
