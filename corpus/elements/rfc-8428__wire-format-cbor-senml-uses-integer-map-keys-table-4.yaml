document: rfc-8428
kind: wire-format
summary: CBOR SenML uses integer map keys (Table 4) for all fields defined in RFC 8428; future extension labels use string keys only. String Values use CBOR major type 3 (definite-length text string); Data Values use CBOR major type 2 (definite-length byte string). Numeric values MAY use integers, floats, or CBOR Tag 4 decimal fractions, but SHOULD round-trip identically through IEEE double.
section: "6"
