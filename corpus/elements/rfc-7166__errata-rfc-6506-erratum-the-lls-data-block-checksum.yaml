document: rfc-7166
kind: errata
summary: 'RFC 6506 erratum: the LLS data block checksum calculation should be omitted when an OSPFv3 Authentication Trailer is used (since LLS is included in the auth digest, recomputing a checksum is unnecessary). This is now explicitly stated in Sections 2.2 and 4.2.'
section: "1.2"
topics:
    - routing
    - security
