document: rfc-8955
kind: security-consideration
summary: The security properties of Flow Specification are equivalent to BGP unicast routing only as long as the validation procedure (Section 6) is enforced. Any relaxation may allow unwanted Flow Specifications to propagate, enabling denial-of-service via unwanted traffic filtering, remarking, or redirection. Specifications relaxing validation MUST include security considerations detailing required additional filtering.
section: "12"
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
