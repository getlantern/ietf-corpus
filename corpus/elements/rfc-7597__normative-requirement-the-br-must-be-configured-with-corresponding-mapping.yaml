document: rfc-7597
kind: normative-requirement
summary: The BR MUST be configured with corresponding mapping rules for each MAP domain for which it acts as a BR. If the BR IPv6 address is anycast, the relay MUST use this anycast IPv6 address as the source address in packets relayed to CEs.
section: "7.2"
rfc2119_level: MUST
topics:
