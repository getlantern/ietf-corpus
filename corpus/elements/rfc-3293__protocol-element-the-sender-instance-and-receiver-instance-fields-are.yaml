document: rfc-3293
kind: protocol-element
summary: The Sender Instance and Receiver Instance fields are appended to all non-adjacency GSMP messages in the Ethernet encapsulation to offer additional protection against the introduction of corrupt state. These fields are already present in adjacency protocol messages.
