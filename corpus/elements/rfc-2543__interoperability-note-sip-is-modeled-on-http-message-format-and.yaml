document: rfc-2543
kind: interoperability-note
summary: SIP is modeled on HTTP message format and borrows its header syntax and authentication mechanisms but is explicitly NOT an extension of HTTP. Unlike HTTP, SIP may use UDP and allows multiple transactions per datagram or TCP connection.
