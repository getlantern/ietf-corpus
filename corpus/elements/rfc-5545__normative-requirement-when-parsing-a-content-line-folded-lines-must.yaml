document: rfc-5545
kind: normative-requirement
summary: When parsing a content line, folded lines MUST first be unfolded by removing the CRLF and the immediately following linear white-space character. Implementations must take care not to split UTF-8 multi-octet sequences across fold boundaries.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
