document: rfc-4590
kind: protocol-element
summary: 'Digest-Response-Auth (type 106): enables the RADIUS server to prove password possession. The server calculates rspauth per RFC 2617 Section 3.2.3 and places it here; the RADIUS client copies it into the Authentication-Info header. Used only in Access-Accept packets.'
section: "3.4"
topics:
    - radius
    - crypto
