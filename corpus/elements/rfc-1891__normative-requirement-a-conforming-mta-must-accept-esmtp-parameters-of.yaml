document: rfc-1891
kind: normative-requirement
summary: 'A conforming MTA MUST accept ESMTP parameters of at least: ENVID=100 chars, NOTIFY=28 chars, ORCPT=500 chars, RET=8 chars. It MUST also accept SMTP command lines of at least 1036 characters (512 base + 530 for ORCPT and NOTIFY parameters on RCPT).'
section: "6.4"
rfc2119_level: MUST
topics:
    - email
