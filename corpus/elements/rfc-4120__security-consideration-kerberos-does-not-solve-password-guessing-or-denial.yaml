document: rfc-4120
kind: security-consideration
summary: Kerberos does not solve password-guessing or denial-of-service attacks, and does not provide authorization. Each host MUST maintain a loosely synchronized clock (typically within 5 minutes); if clock synchronization runs over the network, that protocol MUST itself be secured.
section: "1.6"
topics:
    - security
    - ntp
