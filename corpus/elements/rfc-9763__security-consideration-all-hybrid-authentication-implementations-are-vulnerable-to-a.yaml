document: rfc-9763
kind: security-consideration
summary: All hybrid authentication implementations are vulnerable to a downgrade attack in which a malicious peer does not express support for the stronger algorithm, resulting in an exchange that can only rely upon a weaker algorithm for security. Protocol designers using this mechanism must account for this risk.
section: "7"
topics:
