document: rfc-3315
kind: normative-requirement
summary: Devices using DUID-LLT MUST store the DUID-LLT in stable storage and MUST continue using it even if the network interface that generated it is removed. Devices without stable storage MUST NOT use DUID-LLT.
section: "9.2"
rfc2119_level: MUST
topics:
