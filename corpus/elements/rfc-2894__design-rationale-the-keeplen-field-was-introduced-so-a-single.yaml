document: rfc-2894
kind: design-rationale
summary: 'The KeepLen field was introduced so a single PCO can define a new global prefix on every router in a site while preserving the subnetting structure: bits encoding the subnet ID are copied from the existing site-local prefix into the new global prefix at the same bit positions.'
