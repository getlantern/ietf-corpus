document: rfc-9475
kind: design-rationale
summary: 'Two high-level approaches for applying STIR PASSporTs to messaging are identified: (1) a PASSporT securing a SIP-negotiated session (e.g., MSRP) with little deviation from RFC 8224, and (2) a per-message PASSporT with the new "msgi" claim for sessionless scenarios such as the SIP MESSAGE method.'
