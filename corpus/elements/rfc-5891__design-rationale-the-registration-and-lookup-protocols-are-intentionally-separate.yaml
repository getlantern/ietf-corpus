document: rfc-5891
kind: design-rationale
summary: 'The registration and lookup protocols are intentionally separate with different strictness: registration enforces maximum validity to protect the DNS namespace, while lookup is more permissive to avoid blocking resolution of labels that exist in the DNS even if locally unvalidated.'
