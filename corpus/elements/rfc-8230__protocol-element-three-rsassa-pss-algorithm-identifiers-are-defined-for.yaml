summary: 'Three RSASSA-PSS algorithm identifiers are defined for COSE: PS256 (value -37, SHA-256, salt length 32), PS384 (value -38, SHA-384, salt length 48), and PS512 (value -39, SHA-512, salt length 64). All use MGF1 as the mask generation function with the same hash as used for data hashing.'
