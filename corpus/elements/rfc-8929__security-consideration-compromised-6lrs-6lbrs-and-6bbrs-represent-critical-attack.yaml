document: rfc-8929
kind: security-consideration
summary: 'Compromised 6LRs, 6LBRs, and 6BBRs represent critical attack vectors: a compromised 6LR can modify ROVR fields in EDAR messages to transfer address ownership; a compromised 6LBR can unduly accept ownership transfers or block newcomers by faking duplicates; a compromised 6BBR can accept registrations but block traffic. All three router types must be fully trusted.'
section: "11"
topics:
