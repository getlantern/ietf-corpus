document: rfc-6374
kind: design-rationale
summary: The truncated IEEE 1588v2 PTP format was chosen as the mandatory default timestamp rather than NTP because of the significant deployment of PTP-capable equipment in transport network environments. NTP has wider general Internet deployment, but PTP is more prevalent in the MPLS-TP target environment. Full rationale is in Appendix A.
