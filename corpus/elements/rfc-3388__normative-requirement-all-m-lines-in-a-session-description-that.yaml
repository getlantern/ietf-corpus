document: rfc-3388
kind: normative-requirement
summary: All 'm' lines in a session description that uses 'group' MUST be identified with a 'mid' attribute, whether they appear in the group line or not. If any 'm' line lacks a 'mid' identification, the application MUST NOT perform any grouping of media lines.
section: "5"
rfc2119_level: MUST
topics:
    - realtime
