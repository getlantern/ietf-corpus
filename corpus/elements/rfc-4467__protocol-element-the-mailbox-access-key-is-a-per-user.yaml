document: rfc-4467
kind: protocol-element
summary: The mailbox access key is a per-user, per-mailbox random string with at least 128 bits of entropy, generated by software (not the human user). Two users sharing the same mailbox each have a different mailbox access key for that mailbox.
section: "2.2"
topics:
    - email
    - security
    - crypto
