document: rfc-1905
kind: protocol-element
summary: The InformRequest-PDU is sent manager-to-manager to notify of MIB information remote to the receiver. Like SNMPv2-Trap-PDU, its first two bindings must be sysUpTime.0 and snmpTrapOID.0. The receiver MUST respond with a Response-PDU echoing the request-id and variable-bindings.
section: 4.2.7
topics:
    - snmp
