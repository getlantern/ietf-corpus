document: rfc-5246
kind: normative-requirement
summary: Upon transmission or receipt of a fatal alert, both parties MUST immediately close the connection and MUST forget all session identifiers, keys, and secrets associated with the failed connection; connections terminated with a fatal alert MUST NOT be resumed.
section: 7.2.2
rfc2119_level: MUST
topics:
    - tls
    - security
