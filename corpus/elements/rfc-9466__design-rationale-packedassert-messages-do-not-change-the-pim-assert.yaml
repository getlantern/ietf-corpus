document: rfc-9466
kind: design-rationale
summary: PackedAssert messages do not change the PIM Assert state machine; they are purely a packetization optimization that transmits the same assert record information in fewer, larger packets with reduced total byte overhead, enabling faster processing without protocol semantic changes.
