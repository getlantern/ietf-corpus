document: rfc-6184
kind: interoperability-note
summary: RFC 6184 obsoletes RFC 3984. Key additions include sprop-deint-buf-req and deint-buf-cap SDP parameters, clarified offer/answer procedures, and expanded packetization-mode semantics. Section 15 notes that endpoints implementing only RFC 3984 single NAL unit mode remain interoperable with RFC 6184 implementations using the same mode.
section: "15"
topics:
