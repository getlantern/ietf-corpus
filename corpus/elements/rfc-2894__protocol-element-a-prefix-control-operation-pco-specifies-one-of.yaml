document: rfc-2894
kind: protocol-element
summary: 'A Prefix Control Operation (PCO) specifies one of three OpCodes: ADD (1) appends Use-Prefixes to the interface, CHANGE (2) replaces the matched prefix with Use-Prefixes, or SET-GLOBAL (3) replaces all global-scope prefixes with Use-Prefixes. An empty Use-Prefix set causes ADD to do nothing and the others to delete.'
section: 3.2.1.1
topics:
    - ip
    - v6ops
