document: rfc-3339
kind: interoperability-note
summary: ISO 8601 numeric offsets represent only time zones differing from UTC by an integral number of minutes. Many historical time zones differ by a non-integral number of minutes; applications must convert such timestamps to a representable UTC offset (e.g., +00:20 for Netherlands 1909-1937).
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
