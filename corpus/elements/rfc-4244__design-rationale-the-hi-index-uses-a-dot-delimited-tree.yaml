document: rfc-4244
kind: design-rationale
summary: The hi-index uses a dot-delimited tree structure rather than a flat sequence number so that forking and nesting of requests can be accurately represented, enabling applications to extract metrics such as total retargets, retargets per branch, and forking depth from the index values alone.
