document: rfc-8762
kind: design-rationale
summary: STAMP adopts HMAC-SHA-256 truncated to 128 bits (following RFC 4868 / IPsec practice) rather than HMAC-SHA-1 used in TWAMP, improving integrity protection at the cost of authenticated-mode interoperability with TWAMP Light.
