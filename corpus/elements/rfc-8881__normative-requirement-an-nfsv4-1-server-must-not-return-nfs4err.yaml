document: rfc-8881
kind: normative-requirement
summary: An NFSv4.1 server MUST NOT return NFS4ERR_WRONGSEC in response to a put filehandle operation that is immediately followed by LOOKUP, OPEN by component name, LOOKUPP, SECINFO, or SECINFO_NO_NAME.
section: 2.6.3.1.1
rfc2119_level: MUST NOT
topics:
    - security
