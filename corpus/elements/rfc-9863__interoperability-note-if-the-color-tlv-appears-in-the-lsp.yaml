document: rfc-9863
kind: interoperability-note
summary: If the COLOR TLV appears in the LSP object of a message that also carries an ASSOCIATION object of type SR Policy Association (RFC 9862), the COLOR TLV is ignored and the color encoded in the SR Policy Association takes precedence.
section: "2"
