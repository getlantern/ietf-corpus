document: rfc-9854
kind: protocol-element
summary: The S (Symmetric) bit in the RREQ option is initialized to 1 by OrigNode and cleared to 0 by any intermediate router for which the downward direction of the incoming link does not satisfy the OF. TargNode reads the final S bit value to decide whether to unicast the RREP along the known symmetric path (S=1) or to multicast the RREP-DIO to rebuild the asymmetric path (S=0).
section: "5"
topics:
