document: rfc-5881
kind: normative-requirement
summary: Implementations that support the Echo function MUST ensure that ingress filtering (BCP 38) is not in use on an interface employing the Echo function, or make an exception for BFD Echo packets, because ingress filtering is incompatible with the way Echo packets are sent.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
