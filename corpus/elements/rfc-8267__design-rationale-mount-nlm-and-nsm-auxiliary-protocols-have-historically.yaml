document: rfc-8267
kind: design-rationale
summary: MOUNT, NLM, and NSM auxiliary protocols have historically been conveyed via TCP even when NFS/RDMA is in use; requiring TCP support for these protocols avoids needing separate RDMA upper-layer bindings for protocols with no significant data payloads.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
