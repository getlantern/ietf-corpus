document: rfc-5521
kind: normative-requirement
summary: If the PCE does not recognize the XRO, it MUST return a PCErr with Error-Type 'Unknown Object'. If the PCE is unwilling or unable to process the XRO, it MUST return a PCErr with Error-Type 'Not supported object'.
section: 2.1.2
rfc2119_level: MUST
topics:
