document: rfc-6753
kind: design-rationale
summary: 'Policy frameworks such as RFC 4745 are designed to degrade in a privacy-preserving direction: if a policy rule is conditioned on recipient identity and the protocol cannot assert that identity, the rule has no effect and the policy defaults to providing less information rather than more.'
section: "4.3"
topics:
    - privacy
    - security
