document: rfc-7136
kind: interoperability-note
summary: ILNP (RFC 6741), a multihoming solution that might be expected to benefit from universally unique EUI-64 IIDs, does not rely on them and uses its own Node Identifier format with uniqueness guaranteed only within the context of a given Locator, relying on DAD rather than the 'u' bit.
section: "2"
topics:
