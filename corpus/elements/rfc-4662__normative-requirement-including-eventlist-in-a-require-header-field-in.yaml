document: rfc-4662
kind: normative-requirement
summary: 'Including ''eventlist'' in a ''Require'' header field in a SUBSCRIBE request is NOT RECOMMENDED as it serves no purpose except to break interoperability. Implementations SHOULD NOT include ''Supported: eventlist'' in any requests except SUBSCRIBE.'
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
