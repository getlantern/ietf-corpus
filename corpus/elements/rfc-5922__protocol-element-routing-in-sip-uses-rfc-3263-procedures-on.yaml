document: rfc-5922
kind: protocol-element
summary: 'Routing in SIP uses RFC 3263 procedures on the Application Unique String (AUS): the domain portion of the SIP URI is extracted, DNS is queried to obtain an ordered set of IP addresses with port and transport, and if TLS is indicated, a TLS connection is opened and the server certificate is verified against the AUS domain.'
