document: rfc-5124
kind: interoperability-note
summary: RTP entities using SAVP and SAVPF MAY be mixed in a single RTP session. The interworking considerations defined in Section 5 of RFC 4585 apply. However, mixing secure (SAVP/SAVPF) and insecure (AVP/AVPF) profiles in the same RTP session is prohibited.
section: "4"
topics:
