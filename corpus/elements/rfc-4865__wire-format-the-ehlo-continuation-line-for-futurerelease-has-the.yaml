document: rfc-4865
kind: wire-format
summary: 'The EHLO continuation line for FUTURERELEASE has the form: ''250-FUTURERELEASE SP max-future-release-interval SP max-future-release-date-time''. The max-future-release-interval is a positive integer (1-999999999) in seconds; the max-future-release-date-time is an RFC 3339 UTC date-time.'
section: "3"
