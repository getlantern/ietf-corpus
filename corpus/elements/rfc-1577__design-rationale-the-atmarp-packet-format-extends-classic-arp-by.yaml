document: rfc-1577
kind: design-rationale
summary: The ATMARP packet format extends classic ARP by replacing fixed-length hardware address fields with variable-length ATM number and ATM subaddress fields, each preceded by an 8-bit type/length indicator, because ATM addresses are not fixed-length hardware addresses and support multiple structures (NSAPA and E.164).
section: "6.6"
