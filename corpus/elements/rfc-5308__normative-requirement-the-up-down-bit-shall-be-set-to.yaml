document: rfc-5308
kind: normative-requirement
summary: The up/down bit SHALL be set to 0 when a prefix is first injected into IS-IS. If a prefix is advertised from a higher level to a lower level (e.g., level 2 to level 1), the bit SHALL be set to 1. Prefixes with the up/down bit set to 1 may only be advertised down the hierarchy.
section: "2"
rfc2119_level: SHALL
topics:
    - routing
    - ip
