document: rfc-6823
kind: normative-requirement
summary: When different flooding scopes are required for the same Application ID, a router MUST originate a minimum of one GENINFO TLV per required flooding scope. Area/level-scoped TLVs have S bit clear and MUST NOT be leaked; domain-scoped TLVs have S bit set and MUST be leaked.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
