document: rfc-1738
kind: normative-requirement
summary: 'If no user name or password is supplied for an FTP URL and the server requests credentials, anonymous FTP conventions MUST be used: supply user name ''anonymous'' and the end user''s Internet e-mail address as the password.'
section: 3.2.1
rfc2119_level: MUST
topics:
