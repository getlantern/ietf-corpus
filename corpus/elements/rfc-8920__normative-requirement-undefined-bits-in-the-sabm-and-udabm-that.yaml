document: rfc-8920
kind: normative-requirement
summary: Undefined bits in the SABM and UDABM that are transmitted MUST be set to 0. On receipt, undefined bits and bits not supported by an implementation MUST be ignored. Bits that are not transmitted MUST be treated as if set to 0.
section: "5"
rfc2119_level: MUST
topics:
    - routing
