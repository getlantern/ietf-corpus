document: rfc-5643
kind: normative-requirement
summary: ospfv3ExtAreaLsdbLimit MUST be set identically in all routers attached to the OSPFv3 backbone and any regular OSPFv3 area (stub areas and NSSAs are excluded). When the non-default AS-external-LSA count reaches this limit, the router enters Overflow state.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - snmp
