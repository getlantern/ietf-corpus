document: rfc-6544
kind: interoperability-note
summary: Implementations should include both IPv4 and IPv6 candidates. If the local network does not support IPv6, clients SHOULD use techniques such as TURN-IPv6 (RFC 6156), Teredo (RFC 4380), or SOCKS IPv4-IPv6 gatewaying (RFC 3089) to obtain IPv6 candidates.
section: "5"
topics:
