document: rfc-4721
kind: protocol-element
summary: The Agent Advertisement Challenge Extension (Type 24) is inserted by the foreign agent into Agent Advertisements to communicate a previously unused challenge value for mobile node authentication. The Challenge field SHOULD be at least 32 bits and the Length SHOULD be at least 4 octets.
section: "2"
topics:
    - mobility
    - security
