document: rfc-7180
kind: registry
summary: Bit 1 from the RESV bits in the per-neighbor Neighbor RECORD of the TRILL Neighbor TLV is allocated with description 'Offering OOMF service', indicating that the sending RBridge volunteers to provide OOMF forwarding service to the TRILL Switch whose SNPA appears in that Neighbor RECORD.
