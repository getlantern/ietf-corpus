document: rfc-7271
kind: normative-requirement
summary: MS-P and MS-W SHALL have the same priority. When received in succession, the second command SHALL be cancelled. When both commands occur simultaneously at opposite ends, MS-W SHALL be considered to have higher priority and MS-P SHALL be cancelled and discarded.
section: "6.3"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
