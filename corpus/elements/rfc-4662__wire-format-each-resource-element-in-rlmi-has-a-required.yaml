document: rfc-4662
kind: wire-format
summary: 'Each <resource> element in RLMI has a required ''uri'' attribute (xs:anyURI) identifying the resource, and contains zero or more <name> and <instance> child elements. Each <instance> has required ''id'' (opaque string, unique within the resource) and ''state'' (enumerated: ''active'', ''pending'', or ''terminated'') attributes, and optional ''reason'' and ''cid'' attributes.'
section: "5.3"
topics:
