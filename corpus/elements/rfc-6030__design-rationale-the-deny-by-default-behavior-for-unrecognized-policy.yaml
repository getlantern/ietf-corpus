document: rfc-6030
kind: design-rationale
summary: The deny-by-default behavior for unrecognized <Policy> child elements (Section 5) was chosen to ensure that future policy extensions cannot be silently ignored, preventing an implementation that does not understand a new restriction from inadvertently permitting key usage that the sender intended to prohibit.
section: "5"
topics:
