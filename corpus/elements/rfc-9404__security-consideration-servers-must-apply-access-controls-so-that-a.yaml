document: rfc-9404
kind: security-consideration
summary: Servers MUST apply access controls so that a Blob/lookup cannot reveal blobIds from objects (e.g., emails in inaccessible mailboxes) that the authenticated user would not be able to discover through normal queries. Access-controlled IDs MUST NOT appear in lookup responses.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
