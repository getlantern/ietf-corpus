document: rfc-1971
kind: normative-requirement
summary: The IP layer MUST continue to accept datagrams destined to a deprecated address, as it remains a valid address. An invalid address MUST NOT be used as a source in outgoing communications and MUST NOT be recognized as a destination on a receiving interface.
section: 5.5.4
rfc2119_level: MUST
topics:
    - ip
    - v6ops
