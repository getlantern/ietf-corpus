document: rfc-7264
kind: interoperability-note
summary: The RPR ExtensiveRoutingModeOption reuses the ExtensiveRoutingMode framework defined in RFC 7263 (DRR extension), adding RouteMode value RPR(2) alongside the existing DRR(1). Both extensions depend on the state-keeping flag defined in RFC 7263.
