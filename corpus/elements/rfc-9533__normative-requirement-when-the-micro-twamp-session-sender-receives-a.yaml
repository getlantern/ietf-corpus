document: rfc-9533
kind: normative-requirement
summary: When the micro TWAMP Session-Sender receives a reflected test packet, it MUST use the receiving member link to correlate to a micro TWAMP session (discard if none found), MUST validate the Sender Micro-session ID (discard on failure), and MUST validate the Reflector Micro-session ID (discard on failure).
section: 4.2.2
rfc2119_level: MUST
topics:
