document: rfc-7711
kind: normative-requirement
summary: For POSH-using protocols that rely on DNS SRV records, the POSH service name SHOULD be the same as the DNS SRV 'Service' field (e.g., 'xmpp-server' for XMPP server-to-server connections).
section: "8"
rfc2119_level: SHOULD
