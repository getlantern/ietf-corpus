document: rfc-8412
kind: interoperability-note
summary: 'SWIMA provides no confidentiality mechanism of its own. Confidentiality must be provided by the underlying NEA transport: PT-TLS (RFC 6876) binding to TLS, or PT-EAP (RFC 7171) for tunneled EAP methods. Implementors that deploy SWIMA without a confidentiality-providing transport expose sensitive software inventory data.'
section: "2.4"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
