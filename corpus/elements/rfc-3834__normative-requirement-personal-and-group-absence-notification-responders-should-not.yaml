document: rfc-3834
kind: normative-requirement
summary: Personal and Group absence-notification responders SHOULD NOT be issued unless a valid address for the recipient is explicitly included in a To, Cc, Bcc, Resent-To, Resent-Cc, or Resent-Bcc field of the subject message.
