document: rfc-6173
kind: security-consideration
summary: SNMP versions prior to SNMPv3 lack adequate security. Even on a network secured by IPsec, earlier SNMP versions provide no access control over who on the secure network may GET or SET MIB objects.
section: "6"
topics:
    - security
    - snmp
    - ipsec
