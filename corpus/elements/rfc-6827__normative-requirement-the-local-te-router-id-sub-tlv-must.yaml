document: rfc-6827
kind: normative-requirement
summary: The Local TE Router ID sub-TLV MUST be included in a Node Attribute TLV when an OSPF router advertises ASON information on behalf of transport nodes with TE Router IDs different from the Router Address TLV value. If omitted or set to 0, the Node Attribute TLV is not used for SCN reachability.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
