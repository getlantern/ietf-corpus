document: rfc-2305
kind: security-consideration
summary: Eavesdropping of senders and recipients is easier on the Internet than on the GSTN. Message object encryption does not prevent traffic analysis; channel security such as VPNs using IPSec or transport layer security can help frustrate traffic analysis.
section: 5.2.7
topics:
