document: rfc-7296
kind: design-rationale
summary: 'Cookies are designed to be stateless at the responder: Cookie = VersionIDofSecret | Hash(Ni | IPi | SPIi | secret). This lets the responder validate a returning initiator without retaining per-initiator state, defending against CPU and state exhaustion DoS attacks from forged IP addresses.'
section: "2.6"
topics:
    - ipsec
    - vpn
    - security
