document: rfc-7545
kind: protocol-element
summary: REGISTRATION_REQ allows a Master Device to register with the Database; required fields are deviceDesc and location. Optional fields include deviceOwner (vCard-based) and antenna (AntennaCharacteristics). Some rulesets, such as FCC rules for fixed devices, require registration of owner/operator contact, device identifier, location, and antenna height.
section: 4.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
