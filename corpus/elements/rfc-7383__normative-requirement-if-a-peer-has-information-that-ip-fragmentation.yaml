document: rfc-7383
kind: normative-requirement
summary: If a peer has information that IP fragmentation is likely to interfere with an IKE exchange, that peer SHOULD use IKE fragmentation. If IKE fragmentation was used in a previous exchange on the current SA, peers SHOULD continue using it for messages larger than the fragmentation threshold.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
