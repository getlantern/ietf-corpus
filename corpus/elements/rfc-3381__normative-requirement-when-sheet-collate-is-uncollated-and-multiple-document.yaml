document: rfc-3381
kind: normative-requirement
summary: When 'sheet-collate' is 'uncollated' and 'multiple-document-handling' is either 'separate-documents-collated-copies' or 'separate-documents-uncollated-copies', the Printer object MUST reject the job and return the status 'client-error-conflicting-attributes', as these are degenerate combinations.
section: "3.1"
rfc2119_level: MUST
