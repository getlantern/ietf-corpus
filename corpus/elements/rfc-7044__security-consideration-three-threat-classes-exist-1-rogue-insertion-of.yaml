summary: 'Three threat classes exist: (1) rogue insertion of bogus hi-entries, (2) rearrangement of history information to mislead receivers, and (3) deletion of history entries. Mitigations rely on secure transport (TLS/SIPS) and trust in path intermediaries; no cryptographic signing of individual entries is defined.'
