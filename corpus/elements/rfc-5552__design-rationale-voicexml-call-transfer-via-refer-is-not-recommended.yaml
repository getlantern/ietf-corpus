document: rfc-5552
kind: design-rationale
summary: VoiceXML call transfer via REFER is NOT RECOMMENDED in networks involving Application Servers; instead, the Application Server should provide call routing based on data returned via HTTP or in the SIP BYE message. VoiceXML transfer is primarily suited to PSTN IVR Service Node use cases where no Application Server is involved.
section: "6"
topics:
    - sip
    - voip
