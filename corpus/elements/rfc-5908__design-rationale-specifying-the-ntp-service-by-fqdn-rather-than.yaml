document: rfc-5908
kind: design-rationale
summary: 'Specifying the NTP service by FQDN rather than IP address provides indirection that mitigates misconfiguration: DNS can redirect misconfigured clients to an unrouted address without requiring the NTP server''s IP address to change. The FQDN suboption is preferred for its deployment flexibility, resiliency, and security.'
section: "3"
topics:
