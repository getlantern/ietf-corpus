document: rfc-6035
kind: protocol-element
summary: 'Three NOTIFY body types are defined: SessionReport (sent at session end or codec change), IntervalReport (periodic/interval reporting), and AlertReport (triggered when voice quality degrades below a threshold). All report types include SessionInfo, LocalMetrics, and optionally RemoteMetrics.'
