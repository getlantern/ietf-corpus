document: rfc-2725
kind: interoperability-note
summary: To reference objects in external repositories, the object key is preceded by the repository name and the delimiter ::, e.g., RIPE::CO19. Within a local repository, a bare key defaults to the local repository, but cross-repository references are unambiguous.
section: "9.6"
topics:
