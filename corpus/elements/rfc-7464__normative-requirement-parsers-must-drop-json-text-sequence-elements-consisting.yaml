document: rfc-7464
kind: normative-requirement
summary: Parsers MUST drop JSON text sequence elements consisting of non-self-delimited top-level values (numbers, true, false, null) that may have been truncated, i.e., those not followed by whitespace. Parsers can optionally report such texts as warnings.
section: "2.4"
rfc2119_level: MUST
topics:
    - json
