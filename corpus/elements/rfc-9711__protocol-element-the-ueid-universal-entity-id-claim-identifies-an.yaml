document: rfc-9711
kind: protocol-element
summary: 'The UEID (Universal Entity ID) claim identifies an individual manufactured entity using a type byte followed by unique bytes. Three types are defined: RAND (0x01, 128–256-bit random), IEEE EUI (0x02, EUI-48/60/64), and IMEI (0x03, 14-digit GSMA identifier encoded as 14 bytes).'
section: 4.2.1.1
topics:
