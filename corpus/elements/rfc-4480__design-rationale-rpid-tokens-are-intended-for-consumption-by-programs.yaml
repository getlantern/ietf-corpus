document: rfc-4480
kind: design-rationale
summary: RPID tokens are intended for consumption by programs rather than directly by humans; programs are expected to translate tokens into language-appropriate text per watcher preferences. Free-text <note> and <other> elements carry human-readable content and SHOULD be labeled with xml:lang.
