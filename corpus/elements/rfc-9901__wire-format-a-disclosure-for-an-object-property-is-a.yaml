document: rfc-9901
kind: wire-format
summary: 'A Disclosure for an object property is a base64url-encoded UTF-8 JSON array of exactly three elements in order: (1) a cryptographically random salt string, (2) the claim name string, (3) the claim value. For an array-element Disclosure, only two elements are used: the salt and the array element value.'
section: 4.2.1
topics:
