document: rfc-1782
kind: wire-format
summary: 'Options are appended to RRQ or WRQ packets as null-terminated, case-insensitive ASCII option/value pairs following the mode field. The format is: opcode | filename NUL | mode NUL | opt1 NUL | value1 NUL | ... | optN NUL | valueN NUL. Maximum request packet size is 512 octets.'
section: Packet Formats
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
