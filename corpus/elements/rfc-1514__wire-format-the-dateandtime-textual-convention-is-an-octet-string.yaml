document: rfc-1514
kind: wire-format
summary: 'The DateAndTime textual convention is an OCTET STRING of SIZE 8 or 11: octets 1–2 = year (network byte order, 0..65536), octet 3 = month (1..12), 4 = day, 5 = hour, 6 = minutes, 7 = seconds (0..60 to allow leap second), 8 = deci-seconds; optional octets 9 = UTC direction (''+''/''-'' ASCII), 10 = hours from UTC (0..11), 11 = minutes from UTC (0..59).'
section: "4.1"
