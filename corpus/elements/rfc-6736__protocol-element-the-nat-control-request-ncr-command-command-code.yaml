document: rfc-6736
kind: protocol-element
summary: The NAT-Control-Request (NCR) command (Command Code 330, 'R' bit set) is sent from the NAT controller to the NAT device to install, update, query, or remove NAT bindings. Endpoint classifiers (User-Name, Framed-IP-Address, Framed-IPv6-Prefix, EGRESS-VLANID, etc.) identify the endpoint; NAT-Control-Install and NAT-Control-Remove AVPs carry binding instructions.
section: "6.1"
topics:
    - nat
    - diameter
