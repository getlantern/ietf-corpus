document: rfc-1832
kind: design-rationale
summary: A formal data-description language is preferred over graphical (diagram) representations because languages are more formal, less ambiguous, closer to high-level language types (C/Pascal), and the specification itself is an ASCII string that can be transmitted for on-the-fly data interpretation.
