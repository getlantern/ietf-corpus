document: rfc-7564
kind: normative-requirement
summary: If case mapping is desired, it is RECOMMENDED to use Unicode Default Case Folding. It is NOT RECOMMENDED to map uppercase/titlecase to lowercase for strings used as passwords; instead, case-sensitive comparison with preserved case is RECOMMENDED.
section: 5.2.3
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
