summary: The BGP Identifier is also used in the AGGREGATOR attribute (combined with AS number to identify the aggregating speaker), in route reflection within an AS (only internal neighbor BGP Identifiers may be propagated in reflection attributes), and in route selection. None of these usages are broken by the relaxed definition.
