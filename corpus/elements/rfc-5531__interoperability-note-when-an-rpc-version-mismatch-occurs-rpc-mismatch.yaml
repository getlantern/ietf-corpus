document: rfc-5531
kind: interoperability-note
summary: When an RPC version mismatch occurs (RPC_MISMATCH), the server returns the lowest and highest supported RPC version numbers; when a program version mismatch occurs (PROG_MISMATCH), it returns the lowest and highest supported program version numbers, enabling client adaptation.
section: "8.1"
