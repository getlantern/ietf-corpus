document: rfc-8668
kind: protocol-element
summary: A new TLV (Type 25, L2 Bundle Member Attributes) is introduced to advertise link attributes for individual Layer 2 bundle members associated with a Layer 3 IS-IS adjacency. The TLV contains a Parent L3 Neighbor Descriptor (7-octet System ID + pseudonode ID plus a flags octet) followed by one or more L2 Bundle Attribute Descriptors, each listing Link Local Identifiers and associated sub-TLVs.
section: "3"
topics:
