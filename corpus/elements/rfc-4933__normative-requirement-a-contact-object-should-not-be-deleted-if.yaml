document: rfc-4933
kind: normative-requirement
summary: A contact object SHOULD NOT be deleted if it is associated with other known objects. A server SHOULD notify clients of object relationships when a <delete> command fails due to existing associations.
section: 3.2.2
rfc2119_level: SHOULD NOT
