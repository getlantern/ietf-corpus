document: rfc-4807
kind: protocol-element
summary: 'spdIpOffsetFilterTable matches packets by comparing an administrator-specified OCTET STRING (spdIpOffFiltValue, SIZE 1..1024) against bytes at a byte offset (spdIpOffFiltOffset, 0..65535) from the front of the IP packet, using one of six comparison operators: equal, notEqual, arithmeticLess, arithmeticGreaterOrEqual, arithmeticGreater, arithmeticLessOrEqual.'
