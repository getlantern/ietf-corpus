document: rfc-7659
kind: normative-requirement
summary: All cumulative Counter64 statistics MUST be monotone increasing in the periods between updates of the associated discontinuity time object. A manager SHOULD NOT use the difference between counter values if the discontinuity time has changed since the last sample.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - snmp
