document: rfc-4280
kind: design-rationale
summary: DHCP is used for BCMCS controller discovery because in a roaming environment, static configuration of the BCMCS controller's IP address becomes unrealistic. DHCP enables dynamic configuration of MNs with either the IP address or FQDN of the controller.
section: "1"
topics:
    - multicast
    - mobility
