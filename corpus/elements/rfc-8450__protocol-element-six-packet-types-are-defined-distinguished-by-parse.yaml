document: rfc-8450
kind: protocol-element
summary: 'Six packet types are defined, distinguished by Parse Code: Sequence Header (0x00), End of Sequence (0x10), Auxiliary Data (0x20), Padding Data (0x30), HQ Picture Fragment — Transform Parameters (0xEC, No. of Slices=0), and HQ Picture Fragment — Coded Slices (0xEC, No. of Slices>0). LD Picture (0xC8) and HQ Picture (0xE8) are NOT valid in this payload format.'
