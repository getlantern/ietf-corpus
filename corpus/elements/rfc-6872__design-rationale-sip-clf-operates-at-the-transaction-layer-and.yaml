document: rfc-6872
kind: design-rationale
summary: SIP CLF operates at the transaction layer and logs SIP-specific fields (To/From tags, CSeq, Call-ID) that allow dialog state to be reconstructed; by contrast, CDRs are designed for charging and use identifiers that do not necessarily correspond to SIP headers, making dialog reconstruction from CDRs impractical.
section: "5.1"
topics:
