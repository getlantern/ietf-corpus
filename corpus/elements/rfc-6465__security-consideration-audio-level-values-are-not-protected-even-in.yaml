document: rfc-6465
kind: security-consideration
summary: Audio level values are not protected even in an SRTP session, potentially revealing participant activity confidentiality. An attacker may also infer conversation content, possibly with phoneme-level resolution, as discussed in SRTP-VBR-AUDIO.
section: "6"
