document: rfc-4954
kind: protocol-element
summary: The SMTP Authentication extension adds the EHLO keyword 'AUTH', whose parameter is a space-separated list of available SASL mechanism names. A new SMTP verb 'AUTH' is defined, and an optional 'AUTH' parameter is added to the MAIL FROM command, extending its maximum line length by 500 characters.
