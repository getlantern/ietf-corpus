document: rfc-3730
kind: design-rationale
summary: EPP uses XML namespaces to push each protocol operation's definition into the context of a specific managed object, allowing new object mappings to be added without modifying the base protocol. Specific namespace prefix strings (e.g., 'foo' in 'xmlns:foo') are illustrative and not required for interoperability.
section: 2.7.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
