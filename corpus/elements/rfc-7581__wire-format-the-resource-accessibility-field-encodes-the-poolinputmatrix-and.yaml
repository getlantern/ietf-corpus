document: rfc-7581
kind: wire-format
summary: The Resource Accessibility Field encodes the PoolInputMatrix and PoolOutputMatrix as alternating Input/Output Link Set Fields (encoded per RFC 7579) and RB Set Fields. A 1-bit Connectivity (C) flag at byte 9 indicates fixed (C=0) or switched (C=1) port-to-resource connectivity.
