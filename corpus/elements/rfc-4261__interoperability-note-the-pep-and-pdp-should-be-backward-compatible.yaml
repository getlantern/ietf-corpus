document: rfc-4261
kind: interoperability-note
summary: The PEP and PDP SHOULD be backward compatible with peers that have not been modified to support COPS/TLS. They SHOULD handle errors generated in response to the Integrity-TLS object, enabling graceful fallback in mixed deployments.
