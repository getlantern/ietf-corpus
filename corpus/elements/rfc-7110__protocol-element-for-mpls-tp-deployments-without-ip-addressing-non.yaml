document: rfc-7110
kind: protocol-element
summary: For MPLS-TP deployments without IP addressing, Non-IP encapsulation as defined in RFC 6426 applies. The LSP Ping Reply Mode in both echo request and echo reply is set to 5, and the return path of the echo reply is as specified in the Reply Path TLV.
section: "5.5"
topics:
    - mpls
