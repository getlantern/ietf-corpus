document: rfc-2244
kind: protocol-element
summary: The ACAP URL scheme has the form 'acap://<server>/<entry>[filter][extension]', defaults to port 674, and forbids plaintext passwords. If no authentication mechanism is specified, SASL ANONYMOUS is used by default; if no user name is specified with a mechanism, one should be obtained from the mechanism or the user.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
