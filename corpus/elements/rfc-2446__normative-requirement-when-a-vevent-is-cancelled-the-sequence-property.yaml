document: rfc-2446
kind: normative-requirement
summary: When a VEVENT is cancelled, the SEQUENCE property value MUST be incremented. To cancel the entire recurring event, RECURRENCE-ID MUST NOT be specified; to cancel a single instance, RECURRENCE-ID MUST be specified. A range of instances may be cancelled using RECURRENCE-ID with the RANGE parameter set to THISANDPRIOR or THISANDFUTURE.
section: 3.2.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
