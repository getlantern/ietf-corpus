document: rfc-8940
kind: protocol-element
summary: 'EAP-SIM Session-Id for full authentication with n=3 GSM triplets is: Session-Id = 0x12 || RAND1 || RAND2 || RAND3 || NONCE_MT, which is 65 octets in length. RAND1, RAND2, and RAND3 correspond to the RAND value from each GSM triplet.'
