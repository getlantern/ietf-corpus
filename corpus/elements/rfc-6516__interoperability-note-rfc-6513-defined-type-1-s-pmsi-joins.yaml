document: rfc-6516
kind: interoperability-note
summary: RFC 6513 defined Type 1 S-PMSI Joins for IPv4 customer flows and did not cover IPv6 customer flows. RFC 6516 extends that specification by adding Type 4 for IPv6 flows; implementations of RFC 6513 alone cannot bind IPv6 (C-S,C-G) flows to PIM/IPv4 P-tunnels.
section: "1"
topics:
    - multicast
    - vpn
    - ip
