document: rfc-854
kind: normative-requirement
summary: Rejected option requests SHOULD NOT be repeated until something changes (e.g., the process changes state, the user intervenes, or new information arrives from the remote end). Repeating rejected requests can create nonterminating request loops.
section: GENERAL CONSIDERATIONS
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
