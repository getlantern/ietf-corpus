document: rfc-3643
kind: protocol-element
summary: The Time Stamp [Seconds] and Time Stamp [Seconds Fraction] fields (32 bits each, words 4-5) follow the SNTP Version 4 format, recording the departure time of the encapsulated frame. A value of zero in both fields indicates an invalid or unavailable timestamp. The 32-bit seconds field will overflow in 2036.
section: "3.1"
topics:
    - ntp
