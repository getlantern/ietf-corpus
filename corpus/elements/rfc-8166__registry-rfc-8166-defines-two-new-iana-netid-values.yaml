document: rfc-8166
kind: registry
summary: 'RFC 8166 defines two new IANA netid values for RPC-over-RDMA: one for RPC services operating atop iWARP (layered on TCP or SCTP) and one for RPC services atop InfiniBand (when a suitable port translation service is available). Additional RDMA networks may define their own netids or share these where port translation is applicable.'
section: "9"
