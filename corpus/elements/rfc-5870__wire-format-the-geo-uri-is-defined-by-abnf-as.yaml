document: rfc-5870
kind: wire-format
summary: 'The ''geo'' URI is defined by ABNF as: geo-URI = geo-scheme ":" geo-path, where geo-path = coordinates p, coordinates = coord-a "," coord-b ["," coord-c], and optional parameters follow as semicolon-delimited key=value pairs. For WGS-84, coord-a is latitude (1-2 digits before decimal), coord-b is longitude (1-3 digits before decimal), and coord-c is altitude in meters.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
