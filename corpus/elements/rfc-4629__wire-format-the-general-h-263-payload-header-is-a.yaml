document: rfc-4629
kind: wire-format
summary: 'The general H.263+ payload header is a 16-bit field containing: RR (5 bits, reserved, SHALL be zero), P (1 bit, picture/segment start indicator), V (1 bit, VRC header presence), PLEN (6 bits, extra picture header length in bytes), and PEBIT (3 bits, ignored bits in last byte of picture header).'
section: "5.1"
