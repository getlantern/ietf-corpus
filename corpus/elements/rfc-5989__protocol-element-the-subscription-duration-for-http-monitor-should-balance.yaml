document: rfc-5989
kind: protocol-element
summary: The subscription duration for http-monitor should balance server load against failure recovery time. Rapidly changing resources warrant 1800–3600 seconds; slowly changing resources may use up to 604800 seconds (one week) or longer. Default server assumption in the absence of an Expires value is 86400 seconds.
section: "4.4"
topics:
    - sip
    - http
