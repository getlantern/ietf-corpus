document: rfc-9961
kind: security-consideration
summary: SR P2MP Policy ping is susceptible to the same three attack vectors described in RFC 8029 Section 5. Implementations should follow the procedures and recommendations from RFC 8029 Section 5 and RFC 6425 Section 8 (which references RFC 4379) to mitigate these vectors, specifically including rate limiting of LSP ping traffic to the control plane.
section: "5"
topics:
