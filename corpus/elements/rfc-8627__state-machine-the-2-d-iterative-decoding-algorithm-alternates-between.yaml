document: rfc-8627
kind: state-machine
summary: The 2-D iterative decoding algorithm alternates between applying non-interleaved (row) and interleaved (column) FEC repair until either all packets are recovered or no further progress is made. The loop terminates when num_recovered_so_far equals num_recovered_until_this_iteration.
