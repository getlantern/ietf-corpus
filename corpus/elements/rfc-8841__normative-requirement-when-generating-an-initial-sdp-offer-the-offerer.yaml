document: rfc-8841
kind: normative-requirement
summary: When generating an initial SDP offer, the offerer MUST include an SDP 'setup' attribute and an SDP 'sctp-port' attribute with the m= line. For TCP/DTLS/SCTP, it MUST also include an SDP 'connection' attribute with value 'new'.
section: "10.2"
rfc2119_level: MUST
topics:
    - sctp
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
