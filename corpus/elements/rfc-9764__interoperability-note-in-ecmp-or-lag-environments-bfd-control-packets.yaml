document: rfc-9764
kind: interoperability-note
summary: In ECMP or LAG environments, BFD Control packets may only traverse currently-up member links, so BFD with Large Packets cannot guarantee all component links have been tested. A BFD session may be Up while some traffic is dropped on specific component links with misconfigured MTUs.
section: "4.5"
topics:
    - routing
