document: rfc-9418
kind: normative-requirement
summary: '`agent-id` MUST be unique among all agents of the assurance system, and `symptom-id` MUST be unique among all symptoms raised by a given agent, so that the pair `(agent-id, symptom-id)` globally identifies a symptom.'
section: "3.2"
rfc2119_level: MUST
