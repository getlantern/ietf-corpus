document: rfc-1123
kind: normative-requirement
summary: Every Telnet implementation MUST support the Binary option and the Suppress Go Ahead option, and SHOULD support Echo, Status, End-of-Record, and Extended Options List options. A server SHOULD initiate negotiation of the terminal interaction mode it expects.
section: 3.3.3
rfc2119_level: MUST
topics:
    - tcp
