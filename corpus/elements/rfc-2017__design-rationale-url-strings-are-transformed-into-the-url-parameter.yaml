document: rfc-2017
kind: design-rationale
summary: URL strings are transformed into the URL-parameter encoding (splitting into 40-character tokens) because URL strings can be of arbitrary length and contain arbitrary content, creating problems when embedded in MIME headers that must be line-wrapped per RFC 822 rules.
section: "3.1"
