document: rfc-2032
kind: normative-requirement
summary: The bit stream cannot be fragmented between a GOB header and MB 1 of that GOB. If a packet begins with a GOB header, GOBN, MBAP, and QUANT are all set to 0.
section: "3.2"
rfc2119_level: MUST
topics:
