document: rfc-3004
kind: normative-requirement
summary: The value in UC_Len_i does not include the length field itself and MUST be non-zero. The minimum value of Len when any User Class Data instances are present is two (Len = UC_Len_1 + 1 = 1 + 1 = 2).
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
