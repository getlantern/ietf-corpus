document: rfc-8587
kind: protocol-element
summary: When a file system becomes absent, a client receives NFS4ERR_MOVED, then uses the fs_locations attribute to find the new location. The client must see the same data at the new location; any change visible on the original must already be reflected on all migration targets to prevent state reversion.
section: 5.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
