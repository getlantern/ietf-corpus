document: rfc-6425
kind: state-machine
summary: 'Bud node reply behavior is determined by the Responder Identifier TLV: (1) no TLV → behave as egress+branch; (2) Node Address sub-TLV matching local address → egress+branch; (3) Node Address sub-TLV not matching → no reply; (4) Egress Address sub-TLV matching local address → egress only; (5) node on path to Egress Address → transit; (6) node not on path → no reply.'
section: 4.2.1.3
topics:
