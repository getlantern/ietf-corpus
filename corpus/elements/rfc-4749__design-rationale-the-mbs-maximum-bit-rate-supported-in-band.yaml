document: rfc-4749
kind: design-rationale
summary: The MBS (Maximum Bit rate Supported) in-band signalling field was introduced so that a receiver can request the remote sender to reduce its sending bit rate, enabling bidirectional bandwidth adjustment without external signalling. This is specifically useful for fixed-bandwidth links shared among multiple simultaneous calls.
