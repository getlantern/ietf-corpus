summary: Only DNCP Codes 1 through 7 (Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, and Code-Reject) are used. Other Codes should be treated as unrecognized and should result in Code-Rejects.
