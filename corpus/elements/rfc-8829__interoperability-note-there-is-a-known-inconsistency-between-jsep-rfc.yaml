document: rfc-8829
kind: interoperability-note
summary: There is a known inconsistency between JSEP (RFC 8829) and BUNDLE (RFC 8843) regarding bundle-only m= sections. JSEP requires port zero and a=bundle-only only in initial offers; BUNDLE requires it in all offers and answers; most browsers mark no m= sections with port zero. The IETF intends to publish revised documents resolving this.
section: "1.3"
topics:
    - webrtc
    - realtime
