document: rfc-7294
kind: protocol-element
summary: The Interval Metric flag (I) field (2 bits) indicates whether metrics are Interval Duration (I=10), Cumulative Duration (I=11), Sampled Value (I=01, not allowed for these blocks), or Reserved (I=00). Senders MUST NOT use I=00 or I=01 for Loss Concealment or Concealed Seconds blocks.
section: "3.2"
topics:
    - rtp
    - realtime
