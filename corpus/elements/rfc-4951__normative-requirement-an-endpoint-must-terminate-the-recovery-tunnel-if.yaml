document: rfc-4951
kind: normative-requirement
summary: An endpoint MUST terminate the recovery tunnel if the Recover Tunnel ID or Recover Remote Tunnel ID is unknown, if the prior endpoint had not indicated failover capability, or if the L2TP version of the recovery tunnel differs from the old tunnel.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
