document: rfc-4622
kind: normative-requirement
summary: Percent-encoded octets corresponding to XMPP-address-allowed characters in the inodeid, ihost, and iresid rules MUST be transformed back into their character equivalents when processing an XMPP IRI for interaction with the represented XMPP entity.
section: 2.8.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
