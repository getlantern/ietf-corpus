document: rfc-7781
kind: design-rationale
summary: To reduce traffic disruption from nickname changes, the vDRB SHOULD attempt to reuse the pseudo-nickname recently advertised by member RBridges in their PN-LAALP-Membership APPsub-TLVs. The candidate with the most supporting LAALPs is chosen; ties are broken by smallest nickname value.
section: "4.2"
topics:
    - routing
