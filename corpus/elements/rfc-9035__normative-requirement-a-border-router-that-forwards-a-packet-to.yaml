document: rfc-9035
kind: normative-requirement
summary: A border router that forwards a packet to an external target MUST uncompress the packet first. In all other cases, a router MUST forward a packet in the form the source used (compressed or uncompressed).
section: "4"
rfc2119_level: MUST
topics:
    - routing
