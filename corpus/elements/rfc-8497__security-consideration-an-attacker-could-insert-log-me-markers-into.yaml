document: rfc-8497
kind: security-consideration
summary: An attacker could insert 'log me' markers into SIP traffic to trigger excessive logging and cause a denial-of-service condition. Implementations must apply authorization controls and rate-limiting to mitigate this risk.
section: "7.3"
topics:
