document: rfc-2535
kind: normative-requirement
summary: Security-aware servers MUST NOT return Bad data (data for which all SIG checks have explicitly failed). For resolvers that do not set the CD bit, servers MUST return only Authenticated or Insecure data in answer and authority sections. The AD bit MUST NOT be set unless all answer and authority RRs are either Authenticated or Insecure.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
