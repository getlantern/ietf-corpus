document: rfc-5292
kind: interoperability-note
summary: The Address Prefix ORF type builds on the Outbound Route Filtering Capability defined in RFC 5291 (BGP-ORF) and uses the multiprotocol address family support from RFC 4760 (BGP-MP). Implementations must support these base specifications for Address Prefix ORF to function.
