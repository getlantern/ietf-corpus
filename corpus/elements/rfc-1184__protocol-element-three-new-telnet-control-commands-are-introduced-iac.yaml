document: rfc-1184
kind: protocol-element
summary: 'Three new Telnet control commands are introduced: IAC ABORT (238) to terminate the connected process, IAC SUSP (237) to suspend it so another process takes over the NVT, and IAC EOF (236) to signal end-of-file. These are distinct from the existing IAC IP, which may ''suspend, interrupt, abort or terminate''.'
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
