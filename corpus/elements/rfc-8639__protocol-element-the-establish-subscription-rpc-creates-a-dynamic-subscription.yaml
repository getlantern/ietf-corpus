document: rfc-8639
kind: protocol-element
summary: The 'establish-subscription' RPC creates a dynamic subscription. Inputs include stream name, optional event stream filter (subtree or XPath), optional encoding, optional stop-time, and optional replay-start-time. On success the publisher returns a subscription-id and immediately starts streaming; on failure it MAY return error hints in an 'establish-subscription-stream-error-info' yang-data container.
section: 2.4.2
topics:
    - yang
    - netconf
