document: rfc-821
kind: protocol-element
summary: 'The SMTP mail transaction has three steps: (1) MAIL FROM:<reverse-path> identifying the sender, which resets all state buffers; (2) one or more RCPT TO:<forward-path> commands identifying recipients; (3) DATA command followed by message content terminated by <CRLF>.<CRLF>.'
section: "3.1"
topics:
