document: rfc-9193
kind: interoperability-note
summary: The registry structure for CoAP Content-Formats currently provides for zero or one content coding. Nothing in this document needs to change if the registry is extended to allow sequences of content codings, since the Content-Format-String syntax already supports multiple '@'-separated codings.
section: "1"
