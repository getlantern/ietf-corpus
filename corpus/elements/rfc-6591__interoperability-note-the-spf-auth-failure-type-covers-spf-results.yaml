document: rfc-6591
kind: interoperability-note
summary: The 'spf' auth-failure type covers SPF results of 'none', 'fail', 'softfail', 'temperror', or 'permerror'. 'none' is not strictly a failure per RFC 4408 (SPF), but a service requiring successful SPF evaluations may treat it as a failure for reporting purposes.
section: "3.3"
