document: rfc-9827
kind: interoperability-note
summary: Protocols that rely on properties guaranteed by the current Transform IDs—such as Implicit IV in ESP (RFC 8750) and Aggregation and Fragmentation for ESP (RFC 9347)—may not be compatible with future Transform IDs. New Transform ID definitions must discuss applicability to protocols that depend on specific sequence number properties.
section: "3"
topics:
