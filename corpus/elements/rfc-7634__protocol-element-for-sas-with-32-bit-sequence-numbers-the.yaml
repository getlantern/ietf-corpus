document: rfc-7634
kind: protocol-element
summary: 'For SAs with 32-bit sequence numbers, the AAD is 8 octets: a 4-octet SPI followed by a 4-octet sequence number in network byte order. For SAs with Extended Sequence Numbers (ESN), the AAD is 12 octets: a 4-octet SPI followed by an 8-octet sequence number in big-endian order.'
section: "2.1"
topics:
    - ipsec
    - crypto
