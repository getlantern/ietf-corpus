document: rfc-3895
kind: interoperability-note
summary: In proxy scenarios where the agent does not communicate continuously with DS1/E1 devices, missed collection periods result in invalid interval data. dsx1InvalidIntervals counts gaps within the valid range; dsx1IntervalValidData per row flags individual invalid intervals, which count as 0 in 24-hour totals.
