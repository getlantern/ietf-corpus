document: rfc-6528
kind: design-rationale
summary: Pure random ISN selection would mitigate sequence number guessing attacks but would break the 4.4BSD heuristics that allow a new connection to be accepted while a previous incarnation is still in TIME-WAIT. The PRF-based approach preserves monotonic growth per connection-id while obscuring cross-connection relationships.
section: "2"
topics:
