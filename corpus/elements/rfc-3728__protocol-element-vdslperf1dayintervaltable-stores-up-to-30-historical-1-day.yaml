document: rfc-3728
kind: protocol-element
summary: vdslPerf1DayIntervalTable stores up to 30 historical 1-day interval buckets per Vtu (interval 1 = most recent day; interval 30 = 30 days ago); intervals 2–30 are optional. This table is NOT persistent as it contains live equipment data.
