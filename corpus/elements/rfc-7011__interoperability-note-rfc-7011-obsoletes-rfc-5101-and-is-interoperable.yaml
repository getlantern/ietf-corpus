document: rfc-7011
kind: interoperability-note
summary: RFC 7011 obsoletes RFC 5101 and is interoperable with it. All outstanding errata on RFC 5101 have been resolved, template management language has been relaxed compared to RFC 5101 (especially around Template ID reuse failure cases), and the new specification is interoperable to the extent that behavior was defined in the prior specification.
section: "1.1"
topics:
