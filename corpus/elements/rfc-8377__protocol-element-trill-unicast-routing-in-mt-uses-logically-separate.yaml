document: rfc-8377
kind: protocol-element
summary: TRILL unicast routing in MT uses logically separate forwarding tables per topology T, each calculated based on least-cost routing within T using only links and nodes that support T. The next hop is determined by a lookup on {topology, egress nickname}.
section: "3.3"
topics:
    - routing
