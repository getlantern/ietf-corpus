document: rfc-3961
kind: interoperability-note
summary: Some DES-based mechanisms in Section 6 do not fulfill all profile requirements (e.g., missing non-malleability, no key derivation); they are defined for backward compatibility with existing Kerberos implementations. Newer implementations should use mechanisms that satisfy all profile requirements whenever possible.
section: "6"
topics:
