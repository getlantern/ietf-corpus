document: rfc-9537
kind: interoperability-note
summary: Servers SHOULD use absolute JSONPath expressions beginning with '$' and SHOULD validate "prePath" expressions against the non-redacted response to ensure they resolve to the intended field. RDAP extensions SHOULD define any special JSONPath considerations needed for their redacted fields.
section: "5.2"
topics:
