document: rfc-8416
kind: normative-requirement
summary: Before configuring SLURM files from different sources, an RP MUST verify there is no internal conflict among INR assertions. If overlapping prefixes or ASNs are found across SLURM files, the RP MUST NOT use them and SHOULD issue a warning; the whole set of files MUST be rejected.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
