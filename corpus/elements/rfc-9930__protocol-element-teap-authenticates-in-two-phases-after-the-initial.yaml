document: rfc-9930
kind: protocol-element
summary: TEAP authenticates in two phases after the initial EAP Identity exchange. Phase 1 uses TLS to establish an authenticated tunnel; Phase 2 performs tunneled authentication using TLV objects for inner methods, result indication, and channel binding. All inner data is encapsulated in TLV objects inside the TLS record.
section: "2"
topics:
