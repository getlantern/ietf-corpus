document: rfc-6674
kind: protocol-element
summary: The softwire between the access gateway and AFTR MAY be created at system startup or dynamically established on-demand. OAM mechanisms such as ICMP, BFD (RFC 5880), or LSP ping (RFC 4379) MAY be employed for softwire health management and protection strategies.
