document: rfc-5653
kind: interoperability-note
summary: Applications may call isProtReady() on an incomplete GSSContext to determine whether per-message protection services (wrap, getMIC) are available before full context establishment completes. Some mechanisms embed sufficient key material in initial tokens to allow this optimization.
section: "4.7"
topics:
    - security
