document: rfc-5464
kind: wire-format
summary: 'The METADATA response syntax is: ''METADATA'' SP mailbox SP (entry-values / entry-list), where entry-values is a parenthesized list of entry SP value pairs, and entry-list is a space-separated list of entry names only (for unsolicited responses). An empty string mailbox implies server annotation.'
