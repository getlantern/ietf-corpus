document: rfc-4171
kind: design-rationale
summary: iSNS database records are distributed between servers via out-of-band mechanisms such as LDAP replication or SNMP management GET/SET rather than a dedicated iSNS replication protocol, allowing inter-organization storage sharing without new protocol work; interactions among multiple authoritative primary iSNS servers are deferred as future work.
section: "2.7"
topics:
    - ldap
    - snmp
