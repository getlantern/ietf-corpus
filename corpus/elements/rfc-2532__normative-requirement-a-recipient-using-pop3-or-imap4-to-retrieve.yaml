document: rfc-2532
kind: normative-requirement
summary: A recipient using POP3 or IMAP4 to retrieve mail MUST NOT generate a Delivery Status Notification message, because the MTA would have already issued one upon delivery to the message store.
section: 2.2.2
rfc2119_level: MUST NOT
