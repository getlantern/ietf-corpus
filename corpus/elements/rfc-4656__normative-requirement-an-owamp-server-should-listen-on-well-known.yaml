document: rfc-4656
kind: normative-requirement
summary: An OWAMP server SHOULD listen on well-known TCP port 861. An implementation SHOULD expunge unused state (e.g., drop the TCP connection if a full control message is not received within approximately 30 minutes) to prevent denial-of-service attacks or unbounded memory usage.
section: "3"
rfc2119_level: SHOULD
topics:
    - measurement
    - tcp
    - security
