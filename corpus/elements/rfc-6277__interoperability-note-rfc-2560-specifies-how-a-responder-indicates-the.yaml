document: rfc-6277
kind: interoperability-note
summary: RFC 2560 specifies how a responder indicates the algorithms used in a response but provides no mechanism for clients to signal which algorithms they support, creating a risk that a responder choosing a non-mandatory algorithm will produce a response the client cannot verify.
section: "2"
topics:
    - pkix
    - crypto
