document: rfc-7795
kind: protocol-element
summary: 'In Scenario 1 normal operation: S-PE1 receives Active Preferential Forwarding from T-PE1 (single-homed side) and propagates it to PW-Seg2 and PW-Seg3. T-PE2 responds Active and T-PE3 responds Standby (reflecting AC states), causing PW-Seg2 to be selected for forwarding.'
