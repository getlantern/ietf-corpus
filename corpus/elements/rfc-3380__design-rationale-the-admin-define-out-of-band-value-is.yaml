document: rfc-3380
kind: design-rationale
summary: The 'admin-define' out-of-band value is intentionally restricted to 'xxx-supported' attributes defined to include the 'name' attribute syntax. It is not intended for attributes with other syntaxes (e.g., 'uri'), even if administrators define arbitrary values for them, to maintain a clear and limited scope.
section: "8.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
