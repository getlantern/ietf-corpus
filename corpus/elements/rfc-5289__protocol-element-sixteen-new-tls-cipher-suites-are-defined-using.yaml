document: rfc-5289
kind: protocol-element
summary: Sixteen new TLS cipher suites are defined using Elliptic Curve Cryptography for key exchange and digital signature. Eight use AES-CBC with HMAC-SHA-256 or HMAC-SHA-384, and eight use AES-GCM with SHA-256 or SHA-384 as the PRF hash.
