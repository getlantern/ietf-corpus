document: rfc-5227
kind: interoperability-note
summary: When receiving an echoed-back ARP probe (e.g., from a buffered repeater or wireless access point that rebroadcasts to all recipients including the sender), a host MUST check that the 'sender hardware address' does not match any of its own interfaces before treating the packet as a conflict signal.
section: 2.1.1
topics:
    - ip
