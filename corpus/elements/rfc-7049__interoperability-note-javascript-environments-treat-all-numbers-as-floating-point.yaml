document: rfc-7049
kind: interoperability-note
summary: JavaScript environments treat all numbers as floating point, which may silently lose precision for integers exceeding 53 significant bits. CBOR-based protocols targeting JavaScript environments should define their expectations for handling large integers.
section: "3.6"
topics:
