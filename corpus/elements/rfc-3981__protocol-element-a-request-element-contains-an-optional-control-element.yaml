document: rfc-3981
kind: protocol-element
summary: A <request> element contains an optional <control> element and one or more <searchSet> elements. Each <searchSet> contains either a <lookupEntity> element (with attributes 'registryType', 'entityClass', 'entityName') or a derived <query> element, plus an optional <bag> child.
