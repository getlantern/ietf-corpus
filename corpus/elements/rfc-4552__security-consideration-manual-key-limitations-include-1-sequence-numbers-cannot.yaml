document: rfc-4552
kind: security-consideration
summary: 'Manual key limitations include: (1) sequence numbers cannot be negotiated so replay protection is absent; (2) manual keys are usually long-lived giving attackers time to discover them; (3) administrators may configure weak keys (known weak keys exist for DES/3DES).'
