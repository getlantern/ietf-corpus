document: rfc-7639
kind: interoperability-note
summary: The ALPN header field is OPTIONAL; clients and HTTP proxies may choose not to support it. If absent or ignored, a proxy cannot identify the tunnel's intended protocol, which is indistinguishable from the case where either party does not support the field.
section: "4"
topics:
