document: rfc-3195
kind: design-rationale
summary: Both profiles are mapped onto BEEP rather than raw TCP to leverage BEEP's built-in ordered reliable delivery, authentication, and privacy features. BEEP guarantees ordered reliable delivery within each channel, so both RAW and COOKED inherit this property automatically.
