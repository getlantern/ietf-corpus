document: rfc-3108
kind: design-rationale
summary: The SDP forward/backward convention (away from the local node = forward) differs from the ATM signaling convention (Q.2931/Q.2630.1 forward = from setup-initiating end). In the backward SVC call setup model a media gateway must swap direction labels when mapping between SDP descriptors and ATM bearer signaling messages.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
