document: rfc-7198
kind: protocol-element
summary: For spatial redundancy, the duplicate RTP stream is sent using a different source and/or destination address/port pair, forming a separate RTP session. If source-specific multicast (SSM) is used, receivers must join each SSM session separately since the streams originate from different IP addresses.
