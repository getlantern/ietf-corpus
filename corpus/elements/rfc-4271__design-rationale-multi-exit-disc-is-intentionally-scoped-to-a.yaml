document: rfc-4271
kind: design-rationale
summary: MULTI_EXIT_DISC is intentionally scoped to a single AS boundary (must not be propagated to other neighboring ASes) to prevent unintended influence on distant routing decisions and to preserve each AS's autonomy over its own exit-point selection.
section: 5.1.4
topics:
