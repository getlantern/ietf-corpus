document: rfc-1565
kind: design-rationale
summary: This MIB was created because little work had been done on managing application layer entities, and it is neither efficient nor reasonable to manage all aspects of application layer entities using only lower layer information. The difficulty of managing application entities increases dramatically as they become more complex.
