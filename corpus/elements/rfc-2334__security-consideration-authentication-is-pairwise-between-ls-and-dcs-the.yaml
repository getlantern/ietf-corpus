document: rfc-2334
kind: security-consideration
summary: Authentication is pairwise between LS and DCS; the SPI indexes a per-pair table of {lifetime, algorithm, key}. The SPI and parameters can be negotiated manually or via an Internet key management protocol, and multiple SPIs for the same DCS ID may be active simultaneously to support key rollover.
section: B.3.1.3
topics:
    - security
    - crypto
