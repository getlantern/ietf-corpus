document: rfc-7455
kind: protocol-element
summary: 'TRILL OAM packets consist of six parts: Link Header (media-dependent), TRILL Header (6+ bytes), Flow Entropy (96 bytes fixed, padded with zeros), OAM Ethertype (0x8902), OAM Message Channel (variable, CFM-formatted), and Link Trailer. Flow Entropy starts with Inner.MacDA and steers OAM frames along the same path as data packets.'
section: "3"
