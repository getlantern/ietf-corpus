document: rfc-6865
kind: interoperability-note
summary: When m=16, the theoretical maximum of 65535 encoding symbols enables very large source blocks, but at significantly higher processing cost; pre-calculated tables may require prohibitive memory on embedded platforms. Lightweight alternatives such as LDPC FEC (RFC 5170) may be preferred when processing load is a concern and large source blocks are needed.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
