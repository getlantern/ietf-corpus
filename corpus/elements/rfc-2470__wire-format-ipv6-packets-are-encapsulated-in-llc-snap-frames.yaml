document: rfc-2470
kind: wire-format
summary: IPv6 packets are encapsulated in LLC/SNAP frames on Token Ring. The DSAP and SSAP fields shall always be 0xAA, CTL shall always be 0x03 (Unnumbered Information), OUI shall always be 0x000000, and EtherType shall always be 0x86DD for IPv6.
section: "3"
topics:
