document: rfc-8919
kind: normative-requirement
summary: For a given application, the setting of the L-flag MUST be the same in all ASLA sub-TLVs for a given link. If this constraint is violated, the L-flag MUST be considered set for that application.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
