document: rfc-9031
kind: state-machine
summary: 'The pledge join process traverses four steps: (1) passive scan for Enhanced Beacon and TSCH synchronization; (2) optional Neighbor Discovery with JP; (3a) send OSCORE-protected Join Request via JP to JRC; (3b) receive Join Response and transition to joined node. CoAP retransmit failure triggers an attempt on a different network identifier.'
section: "4"
extracted_by: claude-sonnet-4-6
