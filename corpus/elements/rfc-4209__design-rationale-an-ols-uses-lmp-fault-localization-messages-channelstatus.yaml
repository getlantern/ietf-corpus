document: rfc-4209
kind: design-rationale
summary: An OLS uses LMP fault localization messages (ChannelStatus, ChannelStatusAck, etc.) to inform adjacent peer nodes of detected failures in order to initiate LMP fault localization between peer nodes, but does not itself participate in the peer-to-peer fault localization procedure.
section: "2.4"
topics:
