document: rfc-4032
kind: interoperability-note
summary: For streams using segmented status, a local address change may or may not affect the remote segment's precondition status. The specification mandates treating the move as a full reset (all current status to 'No') regardless, to ensure consistent behavior across implementations.
section: "4.1"
topics:
    - sip
