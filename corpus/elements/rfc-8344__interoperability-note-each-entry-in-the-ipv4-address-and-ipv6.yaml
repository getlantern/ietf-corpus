document: rfc-8344
kind: interoperability-note
summary: Each entry in the 'ipv4/address' and 'ipv6/address' lists maps to one ipAddressEntry in the IP-MIB (RFC 4293), where ipAddressIfIndex refers to the entry's interface. The 'ipv4/neighbor' and 'ipv6/neighbor' lists map to ipNetToPhysicalTable.
