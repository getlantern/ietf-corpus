document: rfc-7138
kind: normative-requirement
summary: When supporting these extensions, both fixed and flexible ODUs MUST use Switching Capability = OTN-TDM and Encoding Type = G.709 ODUk (Digital Path) as defined in RFC 4328. The ISCD MUST then be interpreted as defined in RFC 4203.
section: "4"
rfc2119_level: MUST
