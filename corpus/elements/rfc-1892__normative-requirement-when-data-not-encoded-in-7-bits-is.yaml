document: rfc-1892
kind: normative-requirement
summary: When data not encoded in 7 bits is to be returned on a path not guaranteed to be 8-bit capable, the original message MAY be reencoded into a legal 7-bit MIME message, or the Text/RFC822-Headers content-type MAY be used to return only the original message headers.
section: "1"
rfc2119_level: MAY
