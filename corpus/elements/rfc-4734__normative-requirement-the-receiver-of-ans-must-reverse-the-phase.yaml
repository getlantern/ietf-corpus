document: rfc-4734
kind: normative-requirement
summary: The receiver of /ANS MUST reverse the phase of the 2100-Hz tone at the beginning of /ANS playout and every 450 ms thereafter until the end of the tone; the same requirement applies to /CED in T.30 signalling.
section: "2.4"
rfc2119_level: MUST
