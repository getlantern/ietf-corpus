document: rfc-4818
kind: normative-requirement
summary: The Delegated-IPv6-Prefix MAY appear in an Access-Accept packet and can appear multiple times. It MAY appear in an Access-Request packet as a hint by the NAS, but the server is not required to honor the hint.
section: "3"
rfc2119_level: MAY
