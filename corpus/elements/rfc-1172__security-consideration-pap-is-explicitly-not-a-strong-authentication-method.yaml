document: rfc-1172
kind: security-consideration
summary: 'PAP is explicitly not a strong authentication method: passwords are transmitted in the clear and there is no protection against repeated trial-and-error (brute force) attacks. Implementors are strongly recommended to switch to stronger methods when they become available.'
