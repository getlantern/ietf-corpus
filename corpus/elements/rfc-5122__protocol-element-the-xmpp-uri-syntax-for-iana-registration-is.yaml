document: rfc-5122
kind: protocol-element
summary: 'The XMPP URI syntax (for IANA registration) is defined in ABNF as: xmppuri = "xmpp" ":" hierxmpp ["?" querycomp] ["#" fragment], using percent-encoded US-ASCII characters rather than raw Unicode. The nodeid and resid rules specify which special characters are explicitly allowed beyond unreserved and pct-encoded.'
section: "3.3"
topics:
