document: rfc-7162
kind: protocol-element
summary: The HIGHESTMODSEQ response code (OK [HIGHESTMODSEQ <mod-sequence-value>]) is returned during SELECT/EXAMINE when the mailbox supports persistent mod-sequence storage. Its value is the highest mod-sequence of all messages in the mailbox and is used by disconnected clients to decide whether resynchronization is necessary.
section: 3.1.2.1
topics:
    - email
