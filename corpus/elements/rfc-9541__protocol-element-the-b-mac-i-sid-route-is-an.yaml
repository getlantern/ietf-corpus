document: rfc-9541
kind: protocol-element
summary: The B-MAC/I-SID route is an EVPN MAC/IP Advertisement route that encodes a B-MAC address in the MAC address field and an I-SID value in the Ethernet Tag field (instead of zero). It is used exclusively as a C-MAC flush notification for C-MACs associated with the specified B-MAC and I-SID.
section: "3"
topics:
