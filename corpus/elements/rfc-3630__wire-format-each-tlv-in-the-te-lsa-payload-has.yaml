document: rfc-3630
kind: wire-format
summary: Each TLV in the TE LSA payload has a 16-bit Type field, a 16-bit Length field (value portion only, in octets), and a variable-length Value field. TLVs are padded to 4-octet alignment; padding is not included in the Length. Unrecognized types are ignored.
section: 2.3.2
topics:
