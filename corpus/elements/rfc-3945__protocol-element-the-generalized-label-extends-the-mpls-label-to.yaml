document: rfc-3945
kind: protocol-element
summary: The Generalized Label extends the MPLS label to represent time-slots, wavelengths, or space-division multiplexed positions (fibers). It carries only a single level of label hierarchy; when multiple levels are required, each LSP must be established separately.
