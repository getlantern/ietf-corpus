document: rfc-1793
kind: wire-format
summary: 'The DoNotAge bit is defined as the high bit (0x8000) of the 16-bit LS age field in OSPF LSAs. When set, the LSA is not aged in the link state database and does not require periodic refresh every LSRefreshInterval. Valid LS age values fall in two ranges: 0 through MaxAge and DoNotAge through DoNotAge+MaxAge.'
section: "2.2"
topics:
    - routing
