document: rfc-9733
kind: design-rationale
summary: BRSKI-AE requires the registrar to use the same enrollment protocol for communicating with the backend PKI as is used between pledge and registrar, because end-to-end authentication requires the pledge's signed certification request to be forwarded intact. Using a different protocol toward the backend would break the pledge-to-RA authentication chain.
section: "4.1"
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
