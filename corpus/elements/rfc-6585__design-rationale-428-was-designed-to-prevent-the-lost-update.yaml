document: rfc-6585
kind: design-rationale
summary: '428 was designed to prevent the ''lost update'' problem: a client GETs a resource, modifies it, and PUTs it back while a third party has modified the server state. By requiring conditional requests, the server ensures clients are working with correct copies.'
