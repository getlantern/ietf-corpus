document: rfc-8520
kind: normative-requirement
summary: Publishers of MUD files SHOULD avoid use of IP addresses and MUST NOT include ACL model nodes outside those described in this specification or its extensions; a MUD manager SHOULD NOT automatically implement a MUD file that contains IP addresses with local significance.
section: "2"
rfc2119_level: MUST NOT
