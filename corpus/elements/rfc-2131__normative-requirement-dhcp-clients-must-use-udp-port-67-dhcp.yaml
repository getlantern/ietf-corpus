document: rfc-2131
kind: normative-requirement
summary: DHCP clients MUST use UDP port 67 (DHCP server port) for client-to-server messages and servers send replies to UDP port 68 (DHCP client port). A server with multiple network addresses MAY use any of its addresses in outgoing messages.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - udp
