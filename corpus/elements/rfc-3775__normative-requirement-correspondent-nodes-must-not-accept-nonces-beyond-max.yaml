document: rfc-3775
kind: normative-requirement
summary: Correspondent nodes MUST NOT accept nonces beyond MAX_NONCE_LIFETIME seconds after first use. Each nonce SHOULD remain acceptable for at least MAX_TOKEN_LIFETIME seconds after first use, and a new nonce SHOULD be generated every 30 seconds.
section: 5.2.7
rfc2119_level: MUST NOT
topics:
    - security
    - ip
    - mobility
