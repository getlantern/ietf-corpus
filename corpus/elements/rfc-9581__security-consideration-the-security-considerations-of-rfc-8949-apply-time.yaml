document: rfc-9581
kind: security-consideration
summary: The security considerations of RFC 8949 apply. Time representations carry inherent security risks including exploitation of ambiguities where time is security-relevant (e.g., for freshness or validity spans) and disclosure of system characteristics such as time zone, clock resolution, and wall clock offset. A detailed discussion of security considerations for complex time representations is available in Section 7 of RFC 9557.
section: "8"
topics:
