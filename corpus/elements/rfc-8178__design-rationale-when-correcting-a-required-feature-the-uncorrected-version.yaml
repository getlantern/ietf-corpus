document: rfc-8178
kind: design-rationale
summary: When correcting a REQUIRED feature, the uncorrected version remains REQUIRED (servers must support it until a minor version change), while the corrected version is introduced as OPTIONAL. The corrected version should not be described as 'RECOMMENDED' because which version to support depends on client needs, which may be slow to adopt the updated version.
section: "9.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
