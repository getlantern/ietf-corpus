document: rfc-5373
kind: protocol-element
summary: 'The Priv-Answer-Mode header field operates identically to Answer-Mode but requests privileged/administrative-level treatment, subject to stricter authorization policy at the UAS. It is analogous to ''sudo'' in UNIX: it requests escalated privilege rather than asserting it.'
