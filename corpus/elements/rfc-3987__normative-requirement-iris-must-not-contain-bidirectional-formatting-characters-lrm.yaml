document: rfc-3987
kind: normative-requirement
summary: IRIs MUST NOT contain bidirectional formatting characters (LRM, RLM, LRE, RLE, LRO, RLO, and PDF); such characters affect visual rendering but cannot be correctly input as part of an IRI.
