summary: 'Three bits are defined for inclusion in the LSP Attributes TLV of LSP_ATTRIBUTES object: bit 1 (End-to-end re-routing desired), bit 2 (Boundary re-routing desired), bit 3 (Segment-based re-routing desired). These convey the Re-routing Flag on Path messages.'
