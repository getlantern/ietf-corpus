document: rfc-8723
kind: normative-requirement
summary: All RTP header fields other than PT, SEQ, and the marker bit MUST remain unmodified by the MD, because the OHB cannot carry their original values and the receiver would be unable to verify end-to-end integrity.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - crypto
    - security
