document: rfc-3958
kind: protocol-element
summary: 'S-NAPTR DDDS uses only two flags: ''S'' (terminal, REPLACEMENT is target for SRV lookup) and ''A'' (terminal, REPLACEMENT is target for address record lookup). Empty flag means non-terminal: look up NAPTR records for the REPLACEMENT target. No other flags are valid.'
section: "6.4"
topics:
