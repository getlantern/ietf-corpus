document: rfc-5285
kind: design-rationale
summary: The existing RFC 3550 header extension mechanism permits only one extension per RTP packet and gives no guidance on allocating 16-bit identifiers to avoid collisions. RFC 5285 removes both drawbacks by defining a backward-compatible multi-element extension format named by URIs, with SDP signaling to map URIs to the compact local identifiers carried in packets.
section: "1"
topics:
    - rtp
    - realtime
