document: rfc-2252
kind: normative-requirement
summary: Servers and clients MUST be prepared to receive encodings of arbitrary Unicode characters in Directory String syntax, including characters not presently assigned to any character set. Servers MUST NOT reject values merely because they contain legal Unicode characters outside the range of printable ASCII.
section: "6.10"
rfc2119_level: MUST NOT
