document: rfc-2018
kind: normative-requirement
summary: The congestion control algorithms present in de facto standard TCP implementations MUST be preserved. In particular, recovery is not triggered by a single ACK reporting out-of-order packets, and the sender limits segments sent per ACK during recovery.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
