document: rfc-9873
kind: protocol-element
summary: The <addlEmail:addlEmail> element is the top-level extension element, containing a single <addlEmail:email> child that holds either an ASCII or SMTPUTF8 address. An empty <addlEmail:email/> unsets the second address in an update or indicates no second address in an info response.
