document: rfc-7345
kind: protocol-element
summary: 'The SDP ''setup'' attribute (RFC 4145) is used to negotiate DTLS roles: ''active'' (sends ClientHello), ''passive'' (receives ClientHello), or ''actpass'' (willing to do either). The value ''holdconn'' MUST NOT be used.'
