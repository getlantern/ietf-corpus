document: rfc-2359
kind: protocol-element
summary: The UIDPLUS extension is present in any IMAP4 server that returns "UIDPLUS" as one of the supported capabilities to the CAPABILITY command. It adds one new command (UID EXPUNGE) and additional data returned with successful APPEND and COPY commands.
