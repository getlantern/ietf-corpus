document: rfc-8366
kind: protocol-element
summary: The 'pinned-domain-cert' field is a mandatory binary field containing a DER-encoded X.509v3 certificate. The domain certificate presented to the pledge by the bootstrapping protocol MUST have this certificate somewhere in its chain; the field MAY be an end-entity or self-signed certificate.
section: "5.3"
topics:
    - pkix
    - crypto
    - security
