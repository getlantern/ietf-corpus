document: rfc-9489
kind: interoperability-note
summary: The procedures from RFC 6425 for preventing congestion of Echo Responses (Echo Jitter TLV) and limiting Echo Reply to a single egress node (P2MP Responder Identifier TLV) can be applied to LSP Ping in EVPN and PBB-EVPN when using P2MP P-trees for BUM traffic.
section: 6.2.3
topics:
    - mpls
    - routing
    - multicast
