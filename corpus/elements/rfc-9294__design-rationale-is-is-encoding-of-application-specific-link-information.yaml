document: rfc-9294
kind: design-rationale
summary: 'IS-IS encoding of application-specific link information differs from OSPF and requires additional procedures: the presence of the L-flag and the need to collate information from two IS-IS encoding types (ASLA sub-TLV and Application-Specific SRLG TLV) into a single BGP-LS ASLA TLV necessitate special handling rules.'
section: "4"
topics:
