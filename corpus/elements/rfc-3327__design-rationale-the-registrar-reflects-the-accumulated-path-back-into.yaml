document: rfc-3327
kind: design-rationale
summary: The registrar reflects the accumulated Path back into the REGISTER response so that the originating UA is informed of which intermediate proxies have been inserted into its registered path. This transparency allows the UA to detect proxies that have inappropriately added themselves to the routing chain.
section: "4"
topics:
