document: rfc-8986
kind: security-consideration
summary: RFC 8754's HMAC TLV permits SR Segment Endpoint Nodes to verify that the SRH was selected by an authorized party and that the segment list was not modified after generation. When enabled by local configuration, HMAC processing occurs at the beginning of SRH processing.
section: "9"
topics:
