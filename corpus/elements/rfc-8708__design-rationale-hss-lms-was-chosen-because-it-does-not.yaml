document: rfc-8708
kind: design-rationale
summary: HSS/LMS was chosen because it does not depend on the difficulty of discrete logarithms or factoring, making it post-quantum secure. RSA, DSA, ECDSA, and EdDSA are all vulnerable if large-scale quantum computers are developed, motivating the need for hash-based signatures.
section: "1.3"
topics:
