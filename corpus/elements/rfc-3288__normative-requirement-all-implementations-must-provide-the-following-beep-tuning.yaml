kind: normative-requirement
summary: 'All implementations MUST provide the following BEEP tuning profiles: SASL/DIGEST-MD5 for authentication, TLS with TLS_RSA_WITH_3DES_EDE_CBC_SHA for confidentiality, and TLS with TLS_RSA_WITH_3DES_EDE_CBC_SHA supporting client-side certificates for both authentication and confidentiality.'
