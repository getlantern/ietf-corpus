summary: 'The IPv4 session identifier has Identifier type=Session (0x01) and Identifier length=13 octets. The Identifier value field contains in order: Source IPv4 address (4 octets), Destination IPv4 address (4 octets), Protocol (1 octet), Source Port (2 octets), Destination Port (2 octets).'
