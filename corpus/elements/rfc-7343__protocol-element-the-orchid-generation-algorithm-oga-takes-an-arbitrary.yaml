document: rfc-7343
kind: protocol-element
summary: The ORCHID Generation Algorithm (OGA) takes an arbitrary input bitstring and a 128-bit Context Identifier, concatenates them, hashes the result with a context-specified hash function, and extracts the middle 96 bits. The 4-bit OGA ID encodes which hash function was used.
