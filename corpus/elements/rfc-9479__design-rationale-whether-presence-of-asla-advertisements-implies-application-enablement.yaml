document: rfc-9479
kind: design-rationale
summary: 'Whether presence of ASLA advertisements implies application enablement depends on the application: RSVP-TE presence implies enablement; SR Policy and LFA advertisements do not imply enablement since SR Policy is implicitly enabled on all SR-topology links and LFA enablement is controlled by local configuration.'
