document: rfc-5269
kind: normative-requirement
summary: When an FMIPv6-capable AR receives an RtSolPr with a Handover Key Request Option, it MUST first validate the RtSolPr using SEND. If validation fails, the AR MUST NOT include a Handover Key Reply Option and MUST NOT change any existing key record for the address.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
