document: rfc-1442
kind: protocol-element
summary: The AUGMENTS clause is an alternative to the INDEX clause for conceptual row extensions. A row using AUGMENTS inherits the INDEX of the base conceptual row, and creation of a base row implies creation of all its augmentations.
