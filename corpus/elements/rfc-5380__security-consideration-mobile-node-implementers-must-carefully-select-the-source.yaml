document: rfc-5380
kind: security-consideration
summary: Mobile node implementers must carefully select the source address of HoTI and CoTI messages for the return routability procedure. The HoTI source address SHOULD be the mobile node's home address unless the RCoA is used for route optimisation; the packet is double-encapsulated with the RCoA in the inner header source and the LCoA in the outer header source.
section: "12.2"
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
