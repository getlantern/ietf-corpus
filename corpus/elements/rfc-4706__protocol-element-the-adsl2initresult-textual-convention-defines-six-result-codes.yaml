document: rfc-4706
kind: protocol-element
summary: 'The Adsl2InitResult textual convention defines six result codes for a full initialization attempt: noFail(0), configError(1), configNotFeasible(2), commFail(3), noPeerAtu(4), and otherCause(5), as defined in ITU-T G.997.1 §7.5.1.3.'
section: 2.3.2
extracted_by: claude-sonnet-4-6
