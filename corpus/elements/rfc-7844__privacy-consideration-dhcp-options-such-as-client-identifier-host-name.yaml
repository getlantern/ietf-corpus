document: rfc-7844
kind: privacy-consideration
summary: DHCP options such as Client Identifier, Host Name, Client FQDN, and vendor class options carry unique or quasi-unique identifiers that enable device tracking even when link-layer addresses are randomized. The anonymity profiles minimize disclosure of these identifiers.
