document: rfc-5484
kind: wire-format
summary: 'Full time-code: 64 bits formatted exactly per SMPTE 12M sections 7 and 8, without the 16-bit syncword. Bit positions carry units/tens of frames (0–9, 8–9), seconds (16–26), minutes (32–42), hours (48–57), eight binary groups, drop frame flag (bit 10), color frame flag (bit 11), polarity correction (bit 27), and BGF flags (bits 43, 58, 59).'
