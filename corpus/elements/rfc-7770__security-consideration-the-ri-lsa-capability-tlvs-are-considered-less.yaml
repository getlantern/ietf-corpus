document: rfc-7770
kind: security-consideration
summary: The RI LSA capability TLVs are considered less critical than the topology information advertised by base OSPF. Security considerations for the generic mechanism depend on future application and should be described as additional capabilities are proposed. Base OSPF security applies from RFC 2328 and RFC 5340.
section: "4"
topics:
    - routing
    - security
