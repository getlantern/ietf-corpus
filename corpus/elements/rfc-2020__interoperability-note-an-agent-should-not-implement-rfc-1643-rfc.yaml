document: rfc-2020
kind: interoperability-note
summary: An agent should not implement RFC 1643, RFC 1650, or RFC 1748 for IEEE 802.12 interfaces, because those MIBs instrument the ethernet or token ring media access protocols, which 802.12 does not use. IEEE 802.12 uses its own Demand Priority Access Method (DPAM).
section: "3.4"
topics:
