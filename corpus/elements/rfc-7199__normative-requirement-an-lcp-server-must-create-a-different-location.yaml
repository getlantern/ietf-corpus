document: rfc-7199
kind: normative-requirement
summary: An LCP server MUST create a different location URI and policy URI for every request, unless the requests can be reliably identified as being from the same client, to handle middlebox scenarios where multiple clients appear as one.
section: "7.3"
rfc2119_level: MUST
topics:
    - security
    - privacy
