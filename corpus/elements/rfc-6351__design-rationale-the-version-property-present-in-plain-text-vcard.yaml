document: rfc-6351
kind: design-rationale
summary: The VERSION property present in plain-text vCard is intentionally absent in xCard. Its versioning role is played by the XML namespace URI (urn:ietf:params:xml:ns:vcard-4.0), which includes the version number; future vCard revisions will use a different namespace.
section: "5.1"
