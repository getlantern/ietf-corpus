document: rfc-8601
kind: normative-requirement
summary: The uniqueness of the authserv-id MUST be guaranteed by the ADMD that generates it and MUST pertain to that ADMD. MUAs or downstream filters SHOULD use this identifier to decide whether to use or ignore the data in an Authentication-Results header field.
section: "2.5"
rfc2119_level: MUST
topics:
    - email
    - security
