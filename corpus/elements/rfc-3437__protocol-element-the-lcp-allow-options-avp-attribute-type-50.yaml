document: rfc-3437
kind: protocol-element
summary: The LCP Allow Options AVP (Attribute Type 50) carries a PPP LCP Configure-Ack information field from the LAC to the LNS, listing the LCP options the LAC will permit the LNS to negotiate. Absence of an option implies the LAC cannot perform it at the link layer and would Configure-Reject it.
section: "2.2"
topics:
