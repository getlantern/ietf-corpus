document: rfc-4122
kind: interoperability-note
summary: For lexical equivalence, each UUID field is treated as an unsigned integer; two UUIDs are equal if and only if all corresponding fields are equal. On many systems equality can be tested by byte-order canonicalization followed by comparison as 128-bit unsigned integers.
section: "3"
