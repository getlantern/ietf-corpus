document: rfc-8917
kind: security-consideration
summary: While valid reasons exist to proceed with a LoST mapping query despite DNSSEC failures during emergency call routing, these concerns generally do not apply to a LoST validation query made in advance; therefore DNSSEC protection is more uniformly applicable to the validation path.
section: "5"
topics:
