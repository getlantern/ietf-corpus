document: rfc-9404
kind: security-consideration
summary: 'JSON parsers are not consistent in handling non-UTF-8 data. Because JMAP requires all JSON to be UTF-8, servers MUST return null for data:asText and set isEncodingProblem: true rather than attempting to return non-UTF-8 octets directly in a JSON string.'
section: "5"
rfc2119_level: MUST
topics:
    - security
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
