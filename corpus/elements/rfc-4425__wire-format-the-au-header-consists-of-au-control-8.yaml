document: rfc-4425
kind: wire-format
summary: 'The AU header consists of: AU Control (8 bits), RA Count (8 bits), and three optional fields: AUP Len (16 bits, payload size in bytes), PTS Delta (32 bits, 2''s complement presentation time offset from RTP timestamp), and DTS Delta (32 bits, 2''s complement decode-time offset from presentation time). All fields MUST be in network byte order.'
section: "5.2"
