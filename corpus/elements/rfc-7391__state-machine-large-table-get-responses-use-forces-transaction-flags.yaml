document: rfc-7391
kind: state-machine
summary: 'Large table GET responses use ForCES transaction flags to signal multi-part delivery: the FE sends SOT (Start of Transaction) with the first data chunk, MOT (Middle of Transaction) for intermediate chunks, and EOT (End of Transaction) with an empty RESULT-TLV SUCCESS for the final message. All messages share the same correlator.'
