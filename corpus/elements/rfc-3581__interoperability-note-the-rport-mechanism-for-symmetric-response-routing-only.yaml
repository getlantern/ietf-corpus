document: rfc-3581
kind: interoperability-note
summary: The 'rport' mechanism for symmetric response routing only applies to UDP (unreliable unicast transport); when SIP is used over TLS, this specification does not provide response routing functions and merely provides the client with source port information as seen by the server.
section: "7"
topics:
