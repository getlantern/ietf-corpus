document: rfc-5568
kind: wire-format
summary: 'Fast Binding Acknowledgment (FBack): Mobility Header Type 9, identical format to MIPv6 BAck. Fields: Status (8-bit, <128 accepted / >=128 rejected), ''K'' flag, Reserved, Sequence# (16-bit), Lifetime (16-bit). Mobility Options MUST contain BADF option; MUST contain alternate CoA if Status is 1.'
