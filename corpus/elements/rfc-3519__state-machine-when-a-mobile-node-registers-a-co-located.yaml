document: rfc-3519
kind: state-machine
summary: When a mobile node registers a co-located address through an FA (the 'R' flag case), the tunnel enters a 'half bound' state after the Registration Reply. The HA waits for the first keepalive from the MN to determine the correct NAT port; only after receiving the keepalive does the HA transition to sending forward-tunnelled traffic.
section: "4.6"
topics:
    - nat
    - mobility
    - udp
