document: rfc-9944
kind: normative-requirement
summary: If rootCA is not present in certificateInfo, a set of trust anchors MUST be configured out of band. If the server returns neither certificateInfo nor a clientToken, then external authentication such as OAuth 2.0 MUST be pre-arranged.
section: 6.3.1
rfc2119_level: MUST
topics:
