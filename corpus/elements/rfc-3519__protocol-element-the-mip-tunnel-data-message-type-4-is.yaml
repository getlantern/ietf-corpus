document: rfc-3519
kind: protocol-element
summary: The MIP Tunnel Data Message (Type 4) is a 4-octet header prepended inside the UDP payload to differentiate tunnelled data from MIP signalling messages. It contains a Next Header field (using IP Protocol field values, e.g., 4=IP-in-IP, 47=GRE, 55=Minimal) and a Reserved field.
section: "3.3"
