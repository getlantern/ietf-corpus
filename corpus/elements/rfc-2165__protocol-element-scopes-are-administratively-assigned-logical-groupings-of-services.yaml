document: rfc-2165
kind: protocol-element
summary: Scopes are administratively assigned logical groupings of services. Scoped DAs only accept and respond to requests matching their scope; unscoped DAs accept all registrations and respond to all requests, making them a catch-all at the cost of scaling.
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
