document: rfc-1247
kind: normative-requirement
summary: A packet is always forwarded to the network that is the best (longest or most specific) match for the packet's destination IP address. Subnet masks must be assigned so that the best match for any IP destination is unambiguous.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
