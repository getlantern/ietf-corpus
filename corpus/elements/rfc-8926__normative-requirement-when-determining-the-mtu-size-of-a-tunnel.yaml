document: rfc-8926
kind: normative-requirement
summary: When determining the MTU size of a tunnel link, the maximum length of options MUST be assumed since options may vary on a per-packet basis. Path MTU Discovery (RFC 1191, RFC 8201) is RECOMMENDED to prevent or minimize fragmentation.
section: 4.4.1
rfc2119_level: MUST
topics:
    - routing
    - ip
