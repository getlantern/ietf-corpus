document: rfc-1519
kind: design-rationale
summary: 'Both the new addressing plan and updated classless inter-domain routing protocols are jointly required for supernetting to reduce routing table growth. Deploying either without the other is insufficient: deploying only the addressing plan will temporarily accelerate routing table growth before protocol changes arrive.'
