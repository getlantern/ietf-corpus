document: rfc-8946
kind: normative-requirement
summary: An authentication service MUST NOT add a "div" PASSporT to an INVITE that contains no existing Identity header field, and MUST NOT remove the original Identity header field value before forwarding after adding a "div" PASSporT.
section: "4.1"
rfc2119_level: MUST NOT
topics:
