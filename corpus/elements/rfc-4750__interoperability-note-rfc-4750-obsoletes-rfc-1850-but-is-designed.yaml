document: rfc-4750
kind: interoperability-note
summary: RFC 4750 obsoletes RFC 1850 but is designed to be backwards compatible. Changes include new objects for NSSA, Opaque LSA, graceful restart, stub router, reference bandwidth, RFC1583 compatibility, and area LSA counting. The ospfAuthType per-area object is deprecated in favor of per-interface ospfIfAuthType. See Appendix B for the full change list.
section: Appendix B
topics:
    - routing
    - snmp
