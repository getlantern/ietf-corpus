document: rfc-2669
kind: protocol-element
summary: docsDevFilterPolicyTable provides a level of indirection mapping a policy group ID to one or more policy actions (e.g., TOS rewrite via docsDevFilterTosTable or vendor-specific IPSEC/queue actions). All rows with the same docsDevFilterPolicyId are applied in index order. Policy ID 0 is reserved for packets matching no IP filter.
section: 3.3.3
