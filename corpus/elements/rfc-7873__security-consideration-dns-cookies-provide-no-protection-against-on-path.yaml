document: rfc-7873
kind: security-consideration
summary: DNS Cookies provide no protection against on-path adversaries who can observe plaintext DNS traffic, such as on-path routers, bridges, or devices on a shared link. The mechanism protects only against off-path attackers who cannot observe request/response messages.
section: "9"
topics:
    - dns
    - security
