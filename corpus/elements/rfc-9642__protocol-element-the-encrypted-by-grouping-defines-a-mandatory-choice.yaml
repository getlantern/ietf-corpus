kind: protocol-element
summary: The 'encrypted-by-grouping' defines a mandatory choice between referencing a central symmetric key ('symmetric-key-ref') or a central asymmetric key ('asymmetric-key-ref') as the encrypting key. Both cases are guarded by 'central-keystore-supported' and the respective key-type feature.
