document: rfc-4006
kind: design-rationale
summary: The credit pool concept (G-S-U-Pool-Reference AVP) was introduced to avoid credit fragmentation when multiple concurrent services draw from the same account. Instead of separate small reservations per service, a shared pool with per-service multipliers allows efficient aggregation, reduces server load, and also mitigates the over-reservation problem caused by tariff-time changes.
section: 5.1.2
topics:
