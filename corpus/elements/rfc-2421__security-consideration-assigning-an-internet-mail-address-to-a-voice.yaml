document: rfc-2421
kind: security-consideration
summary: Assigning an Internet mail address to a voice mailbox exposes it to unsolicited messages. Voice mail users have higher privacy expectations than typical email users and may regard unsolicited mail as a security breach.
section: 10.2.2
topics:
    - email
    - security
    - privacy
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
