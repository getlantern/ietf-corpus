document: rfc-4122
kind: protocol-element
summary: The variant field occupies the most significant bits of octet 8 and determines the layout of all other UUID bits. The variant defined in this document is the two-bit pattern '10' (Msb0=1, Msb1=0); other values are reserved for NCS backward compatibility, Microsoft backward compatibility, or future use.
section: 4.1.1
