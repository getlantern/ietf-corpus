document: rfc-2115
kind: state-machine
summary: 'frDlcmiStatus represents the Frame Relay interface state as determined by DLCMI performance: running(1) when initialization is complete, fault(2) when the error threshold is exceeded, and initializing(3) at system startup. If no DLCMI is running, the interface stays in the running state indefinitely.'
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
