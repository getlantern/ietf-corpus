document: rfc-8050
kind: protocol-element
summary: The RIB_GENERIC_ADDPATH subtype encapsulates raw and additional-path-enabled AFI/SAFI/NLRI in the record body and raw BGP attributes in RIB Entries, identical to RFC 6396 Section 4.3.3. RIB Entries are not redefined for this subtype.
