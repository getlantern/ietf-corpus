document: rfc-6763
kind: normative-requirement
summary: If an implementation receives a TXT record containing the same key more than once, it MUST silently ignore all occurrences after the first. Implementations MUST also silently ignore unknown keys in a service TXT record.
section: "6.3"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
