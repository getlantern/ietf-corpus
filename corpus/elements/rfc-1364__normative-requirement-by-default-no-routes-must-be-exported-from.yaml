document: rfc-1364
kind: normative-requirement
summary: By default, no routes must be exported from OSPF into BGP. A single mechanism must permit all OSPF inter-area and intra-area routes to be exported; OSPF external routes of type 1 and type 2 must never be exported into BGP unless explicitly configured.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
