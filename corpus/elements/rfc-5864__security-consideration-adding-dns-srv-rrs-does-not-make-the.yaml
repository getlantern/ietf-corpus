document: rfc-5864
kind: security-consideration
summary: Adding DNS SRV RRs does not make the existing AFS vulnerability more severe compared to AFSDB RRs — it only opens another equivalent point of attack. The underlying vulnerability is inherent in the AFS protocol and can be exploited through VLDB query forgery independent of DNS.
section: "7"
topics:
    - dns
    - security
