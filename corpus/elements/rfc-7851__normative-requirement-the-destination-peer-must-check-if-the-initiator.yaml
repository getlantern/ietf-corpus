document: rfc-7851
kind: normative-requirement
summary: The destination peer MUST check if the initiator node is authorized to request specific diagnostic information types. If the initiator is not authorized, the peer MUST return error code 2 (Error_Forbidden). Access to each diagnostic kind MUST NOT be allowed unless compliant with the authorization rules in Section 7.
section: "6.3"
rfc2119_level: MUST
topics:
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
