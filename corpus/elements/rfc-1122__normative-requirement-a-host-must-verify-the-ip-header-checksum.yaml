document: rfc-1122
kind: normative-requirement
summary: A host MUST verify the IP header checksum on every received datagram and silently discard datagrams with a bad checksum. A datagram with a version number other than 4 MUST be silently discarded.
section: 3.2.1.2
rfc2119_level: MUST
topics:
    - ip
