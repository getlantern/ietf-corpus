document: rfc-793
kind: wire-format
summary: 'The Maximum Segment Size option (Kind=2, Length=4) carries a 16-bit value communicating the sender''s maximum receive segment size. TCP options are variable-length, must be a multiple of 8 bits, and use a two-format scheme: single-octet (kind only) or multi-octet (kind, length, data).'
section: "3.1"
