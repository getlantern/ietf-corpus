document: rfc-2043
kind: protocol-element
summary: 'The SNA Control Protocol (SNACP) is responsible for configuring, enabling, and disabling SNA on both ends of a PPP point-to-point link. SNACP uses the same packet exchange mechanism as LCP. There are actually two SNA NCPs: one for SNA over LLC 802.2 and one for SNA without LLC 802.2, negotiated separately and independently.'
