document: rfc-2164
kind: protocol-element
summary: 'X.400-to-RFC-822 longest-match lookup: (1) derive a directory name from the OR Address down to the lowest OU; (2) look it up in the X.400-to-RFC-822 subtree — a failed lookup indicates the longest match, which is then looked up; (3) check for associatedDomain or associatedInternetGateway. The mapping is always achievable in two lookups.'
section: "3"
topics:
