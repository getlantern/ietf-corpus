document: rfc-7402
kind: protocol-element
summary: 'ESP SA rekeying uses three UPDATE messages: I'' sends UPDATE with ESP_INFO and optional DIFFIE_HELLMAN; R'' replies with UPDATE containing ESP_INFO, ACK, and optional DIFFIE_HELLMAN; I'' sends final UPDATE with ACK. Both sides create new SA pairs during rekeying.'
section: 3.3.2
topics:
