document: rfc-9287
kind: security-consideration
summary: Greasing the QUIC Bit introduces no new security considerations for endpoints or cooperating entities, but makes identifying QUIC traffic more difficult without endpoint cooperation. This works counter to the security goals of network operators who rely on traffic classification to identify threats.
section: "4"
topics:
    - quic
    - security
    - privacy
