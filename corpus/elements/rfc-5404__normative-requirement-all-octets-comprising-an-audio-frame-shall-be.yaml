document: rfc-5404
kind: normative-requirement
summary: All octets comprising an audio frame SHALL be appended to the payload as a unit, with multi-channel frame-blocks concatenated in the channel order specified in Section 4.1 of RFC 3551, oldest frame-block first within each ToC group.
section: "5.5"
rfc2119_level: SHALL
