document: rfc-2634
kind: normative-requirement
summary: If any SignerInfo in a SignedData includes an eSSSecurityLabel, then all SignerInfos in that SignedData MUST include an eSSSecurityLabel and the value of each MUST be identical. Non-identical labels MUST cause the receiving agent to warn the user.
section: 3.1.1
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
