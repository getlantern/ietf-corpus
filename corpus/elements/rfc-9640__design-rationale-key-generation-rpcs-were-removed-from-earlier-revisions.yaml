document: rfc-9640
kind: design-rationale
summary: Key generation RPCs were removed from earlier revisions of this document due to an inability to reach consensus on how to generically identify the key algorithm to use. As a result, this module only supports keys configured via an external client; protocol-specific key generation is delegated to separate modules (e.g., RFC 9644, RFC 9645).
section: "3.2"
topics:
    - crypto
    - yang
    - netconf
