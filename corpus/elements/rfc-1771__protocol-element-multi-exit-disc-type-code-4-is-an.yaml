document: rfc-1771
kind: protocol-element
summary: MULTI_EXIT_DISC (Type Code 4) is an optional non-transitive 4-octet unsigned metric for discriminating among multiple exit/entry points to the same neighboring AS. Lower metric is preferred. It may be propagated to internal BGP speakers within the same AS but is never propagated to neighboring ASes.
section: 5.1.4
topics:
    - bgp
    - routing
