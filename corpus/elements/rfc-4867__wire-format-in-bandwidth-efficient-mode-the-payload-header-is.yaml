document: rfc-4867
kind: wire-format
summary: In bandwidth-efficient mode, the payload header is a single 4-bit CMR (Codec Mode Request) field packed into the most significant bits of the first octet, shared with the first ToC entry bits. The entire payload is octet-aligned by appending 0–7 zero padding bits at the end.
