document: rfc-3878
kind: protocol-element
summary: arcStorageType (StorageType) with default nonVolatile controls persistence of ARC table rows. Rows with value 'permanent' must allow write-access to arcState at minimum. No row can be created with 'readOnly'; an attempt to set 'readOnly' must return 'inconsistentValue'.
