document: rfc-6402
kind: protocol-element
summary: The Response Body control (id-cmc-responseBody, OID id-cmc 37) enables an RA to inform an EE that there is an embedded response message that must be processed. Its ASN.1 type is BodyPartPath pointing to a cmsSequence item containing a PKIResponse; it may only appear in the control sequence of a PKIResponse.
section: "2.6"
topics:
