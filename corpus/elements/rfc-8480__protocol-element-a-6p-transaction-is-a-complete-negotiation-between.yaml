document: rfc-8480
kind: protocol-element
summary: A 6P Transaction is a complete negotiation between two neighbor nodes to add, delete, or relocate TSCH cells. It begins when a node wishes to modify cells and ends when the operation succeeds on both nodes or fails. Each transaction is triggered by a Scheduling Function (SF) and involves either two or three message exchanges.
section: "3.1"
