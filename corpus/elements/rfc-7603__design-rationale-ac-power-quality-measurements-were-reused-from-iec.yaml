summary: AC Power Quality measurements were reused from IEC 61850-7-4, and Accuracy Classes for power/energy measurement were adapted from ANSI C12.20 and IEC 62053-21/62053-22, rather than defining new measurement semantics, to align EMAN with established utility standards.
