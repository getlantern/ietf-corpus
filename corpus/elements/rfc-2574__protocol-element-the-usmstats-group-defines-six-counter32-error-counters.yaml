document: rfc-2574
kind: protocol-element
summary: 'The usmStats group defines six Counter32 error counters: usmStatsUnsupportedSecLevels, usmStatsNotInTimeWindows, usmStatsUnknownUserNames, usmStatsUnknownEngineIDs, usmStatsWrongDigests, and usmStatsDecryptionErrors. Each is incremented and its OID/value returned in error indications to allow generation of Report PDUs.'
