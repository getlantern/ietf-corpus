document: rfc-2688
kind: design-rationale
summary: For Controlled Load, there are no error terms and per-hop delay bounds are not communicated to routers. A router should not introduce delay greater than b/r due to fragment transmission, though meeting this may be difficult for flows with very small bucket depth b.
