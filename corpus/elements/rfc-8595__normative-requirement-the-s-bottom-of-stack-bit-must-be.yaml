document: rfc-8595
kind: normative-requirement
summary: The S (Bottom of Stack) bit MUST be clear in the SFC Context Label stack entry. In the SF Label stack entry, it MUST be clear except when the label is at the bottom of the stack, when it MUST be set.
section: "5"
rfc2119_level: MUST
