document: rfc-1595
kind: normative-requirement
summary: A SONET device must support at least n=4 completed 15-minute intervals of performance data; the default is 32 intervals and the maximum is 96 (covering up to 24 hours). sonetMediumValidIntervals reports how many valid intervals are currently stored.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
