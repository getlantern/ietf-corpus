document: rfc-9090
kind: protocol-element
summary: Tag number 112 is structurally like tag 110 but is understood to be relative to '1.3.6.1.4.1' (IANA Private Enterprise Number OID). The semantics of the result are that of an absolute OID, saving five bytes for OIDs under the enterprise arc.
