document: rfc-3581
kind: normative-requirement
summary: When a server receives a request with an 'rport' parameter having no value in the topmost Via header field, it MUST set the value of the parameter to the source port of the request, independent of the transport protocol.
section: "4"
rfc2119_level: MUST
