document: rfc-3471
kind: wire-format
summary: 'The Protection Information object is a 32-bit field: bit 31 (S) indicates secondary LSP, bits 6-30 are reserved (MUST be zero on transmission, MUST be ignored on receipt, SHOULD pass through unmodified), and bits 0-5 are Link Flags indicating desired link protection type (0x01=Extra Traffic, 0x02=Unprotected, 0x04=Shared, 0x08=Dedicated 1:1, 0x10=Dedicated 1+1, 0x20=Enhanced).'
section: "7.1"
topics:
    - mpls
    - routing
