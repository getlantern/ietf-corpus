document: rfc-9248
kind: interoperability-note
summary: Real-time text is carried using RFC 4103 (RTP payload for T.140) over SIP rather than via the WebRTC data channel (RFC 8865). This diverges from the WebRTC norm; gateways bridging browser-based WebRTC clients to RUE must transcode between RFC 8865 data-channel text and RFC 4103 RTP text.
section: "6.2"
topics:
    - realtime
    - rtp
