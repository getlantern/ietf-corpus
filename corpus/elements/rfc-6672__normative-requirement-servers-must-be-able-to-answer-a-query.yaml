document: rfc-6672
kind: normative-requirement
summary: Servers MUST be able to answer a query for a synthesized CNAME. Resolvers MUST be able to handle a synthesized CNAME TTL of zero or a value equal to the TTL of the corresponding DNAME record.
section: "3.1"
rfc2119_level: MUST
topics:
