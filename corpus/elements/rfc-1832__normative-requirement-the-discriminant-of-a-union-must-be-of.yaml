document: rfc-1832
kind: normative-requirement
summary: The discriminant of a union must be of a type that evaluates to an integer (int, unsigned int, bool, or an enumerated/typedefed equivalent); case values must be legal values of the discriminant and may not be specified more than once within a union scope.
section: "5.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
