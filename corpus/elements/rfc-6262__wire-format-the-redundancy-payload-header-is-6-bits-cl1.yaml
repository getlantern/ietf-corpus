summary: 'The Redundancy Payload Header is 6 bits: CL1 (3 bits) and CL2 (3 bits), specifying sensitivity classes available for preceding and pre-preceding packets respectively. CL values 0 (NONE) and 7 (reserved) indicate absent or invalid redundancy.'
