document: rfc-9277
kind: design-rationale
summary: The specification was motivated by the disarray in ASN.1-based systems where PEM-encoded files all use the '.pem' extension, confounding public keys, private keys, certificate requests, and S/MIME content. CBOR Protocols should not suffer the same ambiguity.
