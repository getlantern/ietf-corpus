document: rfc-3565
kind: normative-requirement
summary: Compliant software MUST meet the requirements for constructing an encrypted-data content type stated in CMS Section 8. The EncryptedData encryptedContentInfo contentEncryptionAlgorithm field MUST specify a symmetric encryption algorithm, and implementations MUST support AES.
section: "3"
rfc2119_level: MUST
