document: rfc-7989
kind: design-rationale
summary: A specific version 5 UUID namespace (a58587da-c93d-11e2-ae90-f4ea67801e29) is defined so that stateless intermediaries can deterministically reproduce the same UUID for an endpoint given the Call-ID and tag, enabling consistent session identification without requiring state storage.
