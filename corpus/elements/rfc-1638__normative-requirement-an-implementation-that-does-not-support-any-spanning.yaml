document: rfc-1638
kind: normative-requirement
summary: An implementation that does not support any spanning tree protocol MUST silently discard any received IEEE 802.1D BPDU packets, and MUST either silently discard or respond to other received BPDU packets with an LCP Protocol-Reject packet.
section: 4.1.4
rfc2119_level: MUST
topics:
    - routing
