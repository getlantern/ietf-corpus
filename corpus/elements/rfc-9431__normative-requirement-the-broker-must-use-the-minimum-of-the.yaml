document: rfc-9431
kind: normative-requirement
summary: The Broker MUST use the minimum of the token expiry interval and the message expiry interval when deciding how long to retain a retained message, to prevent indefinite publication by clients that never update their tokens.
section: "5"
rfc2119_level: MUST
