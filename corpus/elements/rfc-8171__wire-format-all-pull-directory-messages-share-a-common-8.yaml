document: rfc-8171
kind: wire-format
summary: 'All Pull Directory messages share a common 8-byte header: 4-bit Ver, 4-bit Type, 4-bit Flags, 4-bit Count, 8-bit Err, 8-bit SubErr, and 32-bit Sequence Number, followed by a variable-length Type Specific Payload. Version 0 is defined by this document.'
