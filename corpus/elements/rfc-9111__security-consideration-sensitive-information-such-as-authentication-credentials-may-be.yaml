document: rfc-9111
kind: security-consideration
summary: Sensitive information such as authentication credentials may be inadvertently cached due to misconfigured or misunderstood cache directives. The Set-Cookie header field does not inherently inhibit caching; servers must emit explicit Cache-Control directives to prevent caching of responses containing cookies.
section: "7.3"
topics:
    - http
    - security
    - privacy
