document: rfc-9810
kind: design-rationale
summary: The indirect POP method (encrypting the issued certificate for the end entity and verifying decryption in the confirmation message) is preferred over the direct challenge-response method because it requires no extra messages; the {request, response, confirmation} triple suffices for both encryption and KEM keys.
section: 4.3.2
topics:
