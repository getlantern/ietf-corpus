kind: registry
summary: The 'NSH MD Class' registry (16-bit values) allocates 0x0000-0x01FF via IETF Review, 0x0200-0xFFF5 via Expert Review, 0xFFF6-0xFFFE for Experimental use, and 0xFFFF as Reserved. IANA Base NSH MD Class is 0x0000.
