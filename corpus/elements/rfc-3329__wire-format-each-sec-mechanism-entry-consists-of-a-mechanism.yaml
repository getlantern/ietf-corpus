document: rfc-3329
kind: wire-format
summary: 'Each sec-mechanism entry consists of a mechanism-name token followed by optional SEMI-delimited parameters: preference (q=qvalue, 0 to 1 with up to 3 decimal places), digest-algorithm (d-alg), digest-qop (d-qop), and digest-verify (d-ver, 32 lowercase hex digits in double quotes). All security mechanisms MUST have different q values.'
section: "2.2"
topics:
    - sip
    - security
