document: rfc-9094
kind: design-rationale
summary: The WSON topology model is structured as a YANG augmentation of the generic TE topology module (ietf-te-topology, RFC 8795) rather than as a standalone model. This allows WSON-specific attributes to reuse the common TE topology framework including connectivity matrices, tunnel termination points, and label restriction structures without duplicating them.
section: "1"
topics:
