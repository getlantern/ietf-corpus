document: rfc-3890
kind: design-rationale
summary: TIAS uses bits per second (bps) rather than kilobits per second (kbps) as defined in RFC 2327, to allow for better resolution. This is consistent with the RR and RS bandwidth modifiers in RFC 3556, and has no implications on the parser.
section: 6.2.2
topics:
    - realtime
    - rtp
