document: rfc-3591
kind: protocol-element
summary: OptIfDEGM (2..10) is the threshold count of consecutive bad PM Seconds required to declare a Degraded Signal defect (dDEG). OptIfDEGThr (1..100) is the percentage threshold of errored blocks in a one-second period that declares that second 'bad'.
