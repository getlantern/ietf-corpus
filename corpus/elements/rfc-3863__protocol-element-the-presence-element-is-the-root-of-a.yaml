document: rfc-3863
kind: protocol-element
summary: The <presence> element is the root of a PIDF document, associated with namespace 'urn:ietf:params:xml:ns:pidf'. It contains zero or more <tuple> elements, followed by zero or more <note> elements, followed by optional extension elements, and MUST have an 'entity' attribute carrying the 'pres' URL of the presentity.
