document: rfc-8782
kind: registry
summary: 'RFC 8782 establishes the ''DOTS Signal Channel Protocol'' registry with five subregistries: CBOR Key Values, Status Codes, Conflict Status Codes, Conflict Cause Codes, and Attack Status Codes. It also registers UDP/TCP port 4646, the ''/.well-known/dots'' URI, media type ''application/dots+cbor'', a CoAP Content-Format, and a CBOR tag.'
