document: rfc-5487
kind: protocol-element
summary: 'Four PSK CBC cipher suites with stronger MACs are defined: TLS_PSK_WITH_AES_128_CBC_SHA256 (0x00,0xAE), TLS_PSK_WITH_AES_256_CBC_SHA384 (0x00,0xAF), TLS_PSK_WITH_NULL_SHA256 (0x00,0xB0), and TLS_PSK_WITH_NULL_SHA384 (0x00,0xB1). These replace the HMAC-SHA1 MAC from RFC 4279/4785 with HMAC-SHA256 or HMAC-SHA384.'
section: "3.1"
