document: rfc-9360
kind: normative-requirement
summary: If a certificate retrieved via 'x5u' does not chain to an existing trust anchor, that certificate MUST NOT be trusted unless the URI provides integrity protection and server authentication and the server is configured as trusted for new trust anchors, or out-of-band confirmation can be received.
section: "2"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
    - cbor
