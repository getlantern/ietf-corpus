document: rfc-8048
kind: design-rationale
summary: This document uses direct protocol-to-protocol mapping (SIP/SIMPLE to XMPP and vice versa) rather than mapping both to the abstract semantics of RFC 3860, because the direct approach is how existing interworking systems are actually implemented. The abstract mapping approach described in RFC 3860 was apparently never implemented.
section: "1"
topics:
