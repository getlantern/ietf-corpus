document: rfc-5245
kind: security-consideration
summary: The Voice Hammer attack occurs when a malicious ICE agent directs media floods toward a victim by listing the victim's address as a candidate. ICE mitigates this by requiring a successful STUN check (with MAC) before media flows, ensuring the remote address has consented to receive traffic.
section: 18.5.1
topics:
    - security
    - nat
