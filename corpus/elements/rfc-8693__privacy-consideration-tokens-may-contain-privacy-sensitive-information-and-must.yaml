document: rfc-8693
kind: privacy-consideration
summary: Tokens may contain privacy-sensitive information and MUST only be transmitted over encrypted channels such as TLS. When disclosure of certain information to the client is undesirable, the token MUST be encrypted to its intended recipient. Deployments SHOULD minimize the data included in issued tokens, potentially using anonymous or pseudonymous identifiers.
section: "6"
rfc2119_level: MUST
topics:
    - oauth
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
