document: rfc-2019
kind: normative-requirement
summary: If a node N1 receives a valid Router Advertisement, Neighbor Advertisement, or Neighbor Solicitation from N2 in an FDDI frame with non-zero LLC priority, N1 may send unicast IPv6 packets to N2 up to the default FDDI MTU (4352 octets), overriding any smaller configured or advertised MTU.
section: Interaction with Bridges
rfc2119_level: MAY
topics:
    - ip
