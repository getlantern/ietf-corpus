document: rfc-2393
kind: security-consideration
summary: 'When IPComp is used without IPSec, it potentially reduces Internet security similar to IP encapsulation: border routers cannot easily filter by header fields because the original Protocol field and transport-layer header fields (e.g., port numbers) are neither in their normal positions nor in their original values after compression.'
