document: rfc-9553
kind: normative-requirement
summary: In a Name object, the components property MUST be set if the full property is not set, and the component list MUST have at least one entry with a kind other than 'separator'. If isOrdered is true, implementations MUST NOT insert two consecutive separator components.
section: 2.2.1.1
rfc2119_level: MUST
topics:
    - json
