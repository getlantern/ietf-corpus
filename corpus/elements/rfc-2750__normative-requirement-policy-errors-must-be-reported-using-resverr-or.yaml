document: rfc-2750
kind: normative-requirement
summary: Policy errors must be reported using ResvErr or PathErr with a policy failure error code in ERROR_SPEC. The error message must include a POLICY_DATA object whose policy element carries P-Type-specific error details.
section: "4.3"
rfc2119_level: MUST
