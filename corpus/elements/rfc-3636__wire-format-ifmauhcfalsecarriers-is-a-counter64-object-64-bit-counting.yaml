document: rfc-3636
kind: wire-format
summary: ifMauHCFalseCarriers is a Counter64 object (64-bit) counting false carrier events during IDLE on 100BASE-X and 1000BASE-X links. It is the high-capacity replacement for ifMauFalseCarriers (Counter32) which can roll over very quickly (minimum ~7.4 hours for 100BASE-X).
