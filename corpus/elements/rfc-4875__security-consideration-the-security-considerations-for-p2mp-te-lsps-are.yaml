document: rfc-4875
kind: security-consideration
summary: The security considerations for P2MP TE LSPs are identical to those in RFC 3209 and RFC 3473. No new security vulnerabilities beyond existing RSVP-TE threats are introduced; the RSVP INTEGRITY object mechanism applies equally to P2MP Path, Resv, and error messages.
