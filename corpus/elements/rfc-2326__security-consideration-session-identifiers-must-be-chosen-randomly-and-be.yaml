document: rfc-2326
kind: security-consideration
summary: Session identifiers must be chosen randomly and be at least 8 octets to prevent session hijacking by guessing. RTSP reuses HTTP authentication mechanisms (Basic and Digest) for access control, and may also employ transport or network layer security.
section: "16"
