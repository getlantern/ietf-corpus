document: rfc-6295
kind: normative-requirement
summary: For mpeg4-generic streams, exactly one RTP MIDI Access Unit MUST be mapped to one RTP packet. The mpeg4-generic options for placing multiple AUs in a packet, fragmenting AUs, and interleaving AUs MUST NOT be used. The AU Header and Auxiliary sections MUST be empty.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
