document: rfc-8899
kind: normative-requirement
summary: In IPv4, a probe packet MUST be sent with the Don't Fragment (DF) bit set in the IP header and without network layer endpoint fragmentation. In IPv6, a probe packet is always sent without source fragmentation.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - udp
    - sctp
