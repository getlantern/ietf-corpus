document: rfc-1034
kind: normative-requirement
summary: All name servers must implement non-recursive (iterative) query mode; recursive service is optional and may be restricted to specific clients. A server should never perform recursive service unless the RD bit is set in the query.
section: 4.3.1
rfc2119_level: MUST
topics:
    - dns
