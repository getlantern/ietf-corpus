document: rfc-8638
kind: wire-format
summary: The IPv4-embedded IPv6 multicast address format places the /96 mPrefix64 in bits 0-95 and the 32-bit IPv4 group address in bits 96-127. The construction of mPrefix64 for SSM follows Section 5 of RFC 8114.
section: "5.2"
