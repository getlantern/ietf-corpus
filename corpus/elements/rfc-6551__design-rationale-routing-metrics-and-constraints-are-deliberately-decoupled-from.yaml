document: rfc-6551
kind: design-rationale
summary: Routing metrics and constraints are deliberately decoupled from the Objective Function so that a generic OF can be combined with any subset of metrics and constraints. This separation allows new metrics to be introduced by future documents without requiring changes to existing Objective Functions.
section: "1"
