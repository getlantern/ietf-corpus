document: rfc-9552
kind: wire-format
summary: 'The Node Flag Bits TLV (code 1024, length 1 octet) carries a bitmask of node attributes: O (Overload), A (Attached), E (External/OSPF), B (ABR/OSPF), R (Router bit/OSPFv3), V (V6 bit/OSPFv3). Undefined bits MUST be set to 0 and MUST be ignored on receipt.'
section: 5.3.1.1
topics:
