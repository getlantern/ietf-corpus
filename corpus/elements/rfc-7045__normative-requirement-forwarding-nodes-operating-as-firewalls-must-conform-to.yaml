document: rfc-7045
kind: normative-requirement
summary: Forwarding nodes operating as firewalls MUST conform to the requirements in Section 2 in order to respect the IPv6 extension header architecture. Packets containing standard extension headers are only to be discarded as a result of an intentionally configured policy.
section: "3"
rfc2119_level: MUST
