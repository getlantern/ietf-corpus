document: rfc-3971
kind: normative-requirement
summary: If both the CGA option and RSA Signature option are present in a message, the public key in the CGA Parameters field MUST be the same key referenced by the Key Hash field in the RSA Signature option; packets received with two different keys MUST be silently discarded.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - ip
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
