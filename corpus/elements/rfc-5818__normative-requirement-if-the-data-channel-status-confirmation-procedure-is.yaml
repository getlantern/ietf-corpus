document: rfc-5818
kind: normative-requirement
summary: If the data channel status confirmation procedure is supported but the node is unable to begin the procedure, a ConfirmDataChannelStatusNack containing ERROR_CODE 'Unwilling to Confirm' MUST be sent. The originator MAY schedule retransmission after a configured time; a default of 10 minutes is suggested.
section: 5.1.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
