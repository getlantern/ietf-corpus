document: rfc-3972
kind: normative-requirement
summary: The initial modifier value SHOULD be chosen randomly so that addresses generated from the same public key are unlinkable, enhancing privacy. Implementations without strong random numbers MAY use a pseudo-random generator initialized with current time of day.
section: "4"
rfc2119_level: SHOULD
