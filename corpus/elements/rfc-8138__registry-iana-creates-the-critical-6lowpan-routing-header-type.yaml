document: rfc-8138
kind: registry
summary: 'IANA creates the ''Critical 6LoWPAN Routing Header Type'' registry with 256 values (0–255), assigned via RFC Required. Initial assignments: Types 0–4 for SRH-6LoRH (compressed source routing at increasing address sizes from 1 to 16 bytes), and Type 5 for RPI-6LoRH (compressed RPL Packet Information).'
section: "10.2"
