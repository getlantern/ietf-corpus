document: rfc-9833
kind: protocol-element
summary: BGP peer group groupings ('bgp-peer-group-without-name' and 'bgp-peer-group-with-name') carry local-as, peer-as (inet:as-number), address-family (identityref supporting dual-stack), and role (bgp-role identityref per RFC 9234). The 'with-name' variant adds a name string leaf.
section: "4.3"
