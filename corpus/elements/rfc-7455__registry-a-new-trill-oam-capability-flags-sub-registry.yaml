kind: registry
summary: 'A new TRILL OAM Capability Flags sub-registry is established under TRILL-VER sub-TLV. Two flags are defined: O (bit 2, OAM capable) and B (bit 3, backwards-compatible OAM), located after the existing A (Affinity) and F (FGL-safe) flags in the Capability and Header Flags field.'
