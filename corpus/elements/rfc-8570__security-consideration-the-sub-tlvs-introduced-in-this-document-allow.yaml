document: rfc-8570
kind: security-consideration
summary: The sub-TLVs introduced in this document allow advertisement of sensitive link-state information (bandwidth, delay) that operators may not wish to disclose. Implementations should follow the stability guidelines in Section 7 to mitigate instability risk from advertising these sub-TLVs.
