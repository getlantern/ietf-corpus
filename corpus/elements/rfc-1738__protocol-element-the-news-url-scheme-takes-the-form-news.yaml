document: rfc-1738
kind: protocol-element
summary: The news URL scheme takes the form `news:<newsgroup-name>` or `news:<message-id>`. A message-id is distinguished by the presence of '@'. News URLs are location-independent and do not by themselves contain enough information to locate a single resource on a specific server.
section: "3.6"
topics:
