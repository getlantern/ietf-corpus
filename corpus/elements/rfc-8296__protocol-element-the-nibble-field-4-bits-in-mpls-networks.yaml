document: rfc-8296
kind: protocol-element
summary: The Nibble field (4 bits) in MPLS networks MUST be set to binary 0101 to prevent MPLS ECMP logic from confusing the remainder of the BIER header with an IP or pseudowire header. In non-MPLS networks it SHOULD be set to 0000 but MUST be ignored on reception.
section: 2.1.2
topics:
    - mpls
    - multicast
