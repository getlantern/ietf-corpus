document: rfc-1662
kind: normative-requirement
summary: Address-and-Control-Field-Compression MUST NOT be negotiated when other (non-standard) Address or Control field values are in use. On transmission, compressed Address and Control fields are simply omitted.
section: "3.2"
rfc2119_level: MUST NOT
