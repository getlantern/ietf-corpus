document: rfc-4314
kind: design-rationale
summary: The 'd' right was split into 'e' (EXPUNGE), 't' (\Deleted flag), and possibly 'x' (DELETE mailbox) to resolve ambiguity in RFC 2086 where some implementations used 'c'/'d' differently. Virtual rights 'd' and 'c' are retained for backward compatibility with deployed RFC 2086 clients.
section: 2.1.1
topics:
    - email
