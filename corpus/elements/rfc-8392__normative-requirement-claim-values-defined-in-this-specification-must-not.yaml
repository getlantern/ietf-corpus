document: rfc-8392
kind: normative-requirement
summary: Claim values defined in this specification MUST NOT be prefixed with any CBOR tag (e.g., tag 1 for epoch-based date/time MUST be omitted from exp, nbf, and iat values) since the representation is already specified by the claim definition.
section: "5"
rfc2119_level: MUST NOT
