document: rfc-5961
kind: normative-requirement
summary: Upon receipt of a valid RST returned in response to a challenge ACK sent after an in-window SYN, the local TCP endpoint MUST terminate its connection and then rely on SYN retransmission from the remote end to re-establish.
section: "4.2"
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
