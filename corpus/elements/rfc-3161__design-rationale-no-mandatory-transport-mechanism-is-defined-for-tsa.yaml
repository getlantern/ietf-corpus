document: rfc-3161
kind: design-rationale
summary: No mandatory transport mechanism is defined for TSA messages; email, file-based, TCP socket, and HTTP transports are all specified as optional. This allows the TSP to be used across heterogeneous deployment environments without mandating infrastructure.
