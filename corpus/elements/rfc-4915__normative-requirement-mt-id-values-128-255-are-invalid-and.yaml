document: rfc-4915
kind: normative-requirement
summary: MT-ID values 128-255 are invalid and SHOULD be ignored. Only MT-IDs in the 0 to 127 range are valid because AS-External-LSAs use the high-order bit in the MT-ID field (E-bit) for the external metric-type.
section: "3.7"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
