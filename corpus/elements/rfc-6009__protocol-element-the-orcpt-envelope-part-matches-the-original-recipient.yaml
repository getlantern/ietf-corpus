document: rfc-6009
kind: protocol-element
summary: The 'orcpt' envelope-part matches the original recipient value from the SMTP RCPT TO ORCPT parameter with xtext encoding removed. It always contains an address type indicator prefix (e.g., 'rfc822;') in addition to the address.
