document: rfc-9244
kind: protocol-element
summary: The Telemetry Identifier ('tmid') is a DOTS-client-generated uint32 that uniquely identifies pre-or-ongoing-mitigation telemetry data. A higher 'tmid' value overrides lower-valued entries from the same DOTS client.
