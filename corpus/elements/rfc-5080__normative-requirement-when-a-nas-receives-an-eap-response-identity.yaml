document: rfc-5080
kind: normative-requirement
summary: When a NAS receives an EAP-Response/Identity with a zero-length Type-Data field, it is RECOMMENDED to either omit the User-Name attribute in the Access-Request or include Calling-Station-Id in User-Name along with a Calling-Station-Id attribute. A zero-length EAP identity MUST NOT be construed as a request for privacy or anonymous NAI.
section: "2.9"
rfc2119_level: RECOMMENDED
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
