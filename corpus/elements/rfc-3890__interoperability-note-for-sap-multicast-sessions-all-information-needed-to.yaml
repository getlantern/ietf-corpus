document: rfc-3890
kind: interoperability-note
summary: 'For SAP multicast sessions, all information needed to compute transport-dependent bit-rate is present in the SDP: the ''c='' line gives the address family, and the ''m='' line gives the transport layer (e.g., RTP/UDP). TIAS and maxprate integrate with SAP without protocol changes.'
section: "7.3"
topics:
