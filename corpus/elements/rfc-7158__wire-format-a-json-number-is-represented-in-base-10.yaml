document: rfc-7158
kind: wire-format
summary: A JSON number is represented in base 10 as '[ minus ] int [ frac ] [ exp ]'. Leading zeros are not allowed; Infinity and NaN are not permitted. The fraction part is a decimal point followed by one or more digits; the exponent part begins with 'e' or 'E' optionally followed by a sign.
