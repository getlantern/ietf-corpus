document: rfc-5497
kind: design-rationale
summary: Hop-count-dependent time values are provided because some MANET protocols send messages with limited scope using different hop limits; nodes farther from the originator need longer validity times because they receive updates less frequently. A single TLV can express this hop-count gradient compactly.
section: "1.1"
