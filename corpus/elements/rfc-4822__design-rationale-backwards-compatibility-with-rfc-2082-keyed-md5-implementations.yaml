document: rfc-4822
kind: design-rationale
summary: Backwards compatibility with RFC 2082 Keyed-MD5 implementations was required, precluding significant protocol changes. The algorithm-independent design of the original specification allowed SHA algorithms to be added without breaking existing deployments.
