document: rfc-2280
kind: design-rationale
summary: RPSL is a replacement for RIPE-181 (RFC-1786), which could not express certain routing policies. Through operational use of RIPE-181, it became apparent that a more generalized language was needed; RPSL addresses those limitations while remaining extensible so new protocols and features can be introduced at any time.
section: "1"
topics:
