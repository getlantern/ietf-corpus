document: rfc-5990
kind: security-consideration
summary: The security of the algorithm depends on the strength of the random number generator, which SHOULD have a comparable security level to the overall scheme. A weak RNG can undermine the security guarantee of RSA-KEM even if all other components are strong.
section: "3"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
