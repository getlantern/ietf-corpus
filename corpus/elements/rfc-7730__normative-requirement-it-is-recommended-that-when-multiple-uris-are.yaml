document: rfc-7730
kind: normative-requirement
summary: It is RECOMMENDED that when multiple URIs are present in a TAL, the domain name parts of each URI resolve to distinct IP addresses used by a diverse set of repository publication points, and these IP addresses be included in distinct ROAs signed by different CAs.
section: "2.2"
rfc2119_level: RECOMMENDED
