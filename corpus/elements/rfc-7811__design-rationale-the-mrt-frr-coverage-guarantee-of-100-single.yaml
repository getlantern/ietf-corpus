document: rfc-7811
kind: design-rationale
summary: The MRT-FRR coverage guarantee of 100% single-failure recovery for 2-connected networks does not depend on link metrics, because the GADAG structure is based on graph topology alone. This decouples operator traffic-engineering via metrics from the fast-reroute coverage.
