document: rfc-7813
kind: protocol-element
summary: 'Bandwidth assignment precedence ordering is determined by: (1) PCP parameter (higher wins), (2) Importance parameter within PCP (lower numerical value wins), (3) Timestamp sub-TLV if present (earlier wins). If unresolvable, the PCE with the numerically lowest LSP ID is granted precedence.'
section: "6.4"
topics:
