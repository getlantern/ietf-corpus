kind: normative-requirement
summary: The 'selection' and 'reference' ABNF productions defined in Section 5 MUST be used in <include>, <exclude>, <changed>, <added>, and <removed> elements. When evaluating XPath location steps, if no prefix is present, the namespace URI is null per XPath 1.0 semantics.
