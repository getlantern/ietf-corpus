document: rfc-5545
kind: protocol-element
summary: The FREEBUSY component property (VFREEBUSY) defines one or more free or busy time intervals. The FBTYPE parameter qualifies each interval as FREE, BUSY, BUSY-UNAVAILABLE, or BUSY-TENTATIVE. FREEBUSY property values MUST be specified as UTC time and sorted in ascending order.
section: 3.8.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
