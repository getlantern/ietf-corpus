document: rfc-8951
kind: normative-requirement
summary: For Simple Enroll and Re-enroll error responses where content-type is not set, the response data MUST be a plaintext human-readable error message; servers MAY additionally use the 'text/plain' content-type (RFC 2046) for such errors.
section: "5.1"
rfc2119_level: MUST
topics:
