document: rfc-5938
kind: protocol-element
summary: The Individual Session Control mode is identified by bit position 4 (value 16) in the 32-bit TWAMP Modes field. The Control-Client MUST also set one mode bit to indicate the chosen security mode (bits 0, 1, 2, or 3), and MAY combine bit 4 with other feature bits.
section: "3.1"
