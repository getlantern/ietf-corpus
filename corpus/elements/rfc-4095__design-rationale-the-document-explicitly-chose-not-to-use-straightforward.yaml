document: rfc-4095
kind: design-rationale
summary: The document explicitly chose not to use Straightforward-NAPTR (S-NAPTR) because S-NAPTR does not permit the 'U' flag for terminal lookups and does not support the regular expression field. Since the goal was to find a URI (not just a domain name), S-NAPTR was unsuitable.
section: "2"
topics:
