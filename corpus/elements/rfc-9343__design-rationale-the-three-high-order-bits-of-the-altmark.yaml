document: rfc-9343
kind: design-rationale
summary: The three high-order bits of the AltMark Option Type are set to 000 (skip if unrecognized, data does not change en route) to minimize throughput impact on nodes that do not support the Option, ensuring measurement-unaware nodes simply ignore it without disrupting packet flow.
