document: rfc-6526
kind: normative-requirement
summary: The Collecting Process MUST detect if the Exporting Process fails to meet the per-SCTP-stream specification. Upon detecting any of the six listed violations, the Collecting Process MUST log an error message and disable this extension for the SCTP association.
section: 4.5.3
rfc2119_level: MUST
topics:
    - sctp
