document: rfc-4320
kind: normative-requirement
summary: A transaction-stateful SIP proxy MUST NOT send any response to a non-INVITE request unless it has a matching server transaction that is not in the Terminated state, thereby preventing forwarding of late non-INVITE responses.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
