document: rfc-6630
kind: normative-requirement
summary: If the 'L' flag is set in EAP-Initiate/Re-auth, both pMSK Lifetime and pRK Lifetime attributes MUST be present in the EAP-Finish/Re-auth response. The rIK SHOULD share the same lifetime as the pMSK.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
