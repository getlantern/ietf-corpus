document: rfc-3472
kind: normative-requirement
summary: In optical transport networks, a mechanism MUST exist to detect a signaling communication failure in the control plane, and a recovery procedure SHALL guarantee connection integrity at both ends of the signaling channel without impacting existing optical connections.
