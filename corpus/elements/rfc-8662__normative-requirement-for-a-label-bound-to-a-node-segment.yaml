document: rfc-8662
kind: normative-requirement
summary: For a label bound to a node segment, if an implementation cannot find the minimum ERLD along the segment path or does not support that computation, it SHOULD instead use the ERLD of the tail-end node, mimicking RFC 6790 behavior where the ingress considers only the egress of the LSP.
section: 7.2.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
