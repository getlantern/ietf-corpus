document: rfc-7783
kind: normative-requirement
summary: It is RECOMMENDED that timer T_j (used by existing member RBridges when a rejoining RBridge appears) be less than T_i (used by the rejoining RBridge itself), with a reasonable default of T_j = 1/2 of T_i, to reduce packet duplication which is more serious than dropped packets.
section: 5.6.1
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
