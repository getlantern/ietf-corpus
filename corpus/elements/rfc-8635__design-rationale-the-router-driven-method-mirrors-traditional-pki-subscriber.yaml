document: rfc-8635
kind: design-rationale
summary: The router-driven method mirrors traditional PKI subscriber practices where the private key never leaves trusted storage (e.g., an HSM), providing proof-of-possession to the CA. However, for non-human entities requiring hot-swap continuity, this model does not always work, motivating the operator-driven method.
