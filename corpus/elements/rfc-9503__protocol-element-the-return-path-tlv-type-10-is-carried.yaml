document: rfc-9503
kind: protocol-element
summary: The Return Path TLV (Type=10) is carried in a Session-Sender test packet to request the Session-Reflector to transmit the reply test packet on a specific return path. It contains one or more Sub-TLVs encoding the Return Path Control Code, Return Address, or Return Path Segment List.
