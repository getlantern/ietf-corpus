document: rfc-7352
kind: normative-requirement
summary: 'When a unique ID is extracted from a message header field (not via '':uniqueid''), implementations MUST: unfold the header line per RFC 5322 Section 2.2.3, convert the value to Unicode/UTF-8 if possible, and trim leading and trailing whitespace.'
section: "3.1"
rfc2119_level: MUST
topics:
    - email
