document: rfc-1771
kind: protocol-element
summary: LOCAL_PREF (Type Code 5) is a well-known discretionary 4-octet attribute conveying intra-AS route preference; higher value is preferred. It must be included in all internal UPDATE messages and must not be sent to external BGP peers; if received from an external peer it shall be ignored.
section: 5.1.5
topics:
    - bgp
    - routing
