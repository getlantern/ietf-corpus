document: rfc-8888
kind: design-rationale
summary: Standard RTCP SR/RR packets were intended to support congestion control but in practice provide insufficient granularity—only aggregated jitter, fractional loss, and cumulative loss—whereas effective algorithms require per-packet reception timing, loss, and ECN marks.
