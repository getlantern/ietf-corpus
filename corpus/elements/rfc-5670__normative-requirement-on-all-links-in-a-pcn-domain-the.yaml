document: rfc-5670
kind: normative-requirement
summary: On all links in a PCN-domain, the dropping function MAY meter all metered-packets and drop them if the rate exceeds the allowed rate. If PCN-packets are dropped, excess-traffic-marked PCN-packets SHOULD be preferentially dropped.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
