document: rfc-5450
kind: wire-format
summary: The IJ RTCP packet has a standard RTCP header (V=2, P, RC, PT=195, length) followed by RC repetitions of a 32-bit inter-arrival jitter field. The jitter formula is D(i,j) = (Rj - (Sj+Oj)) - (Ri - (Si+Oi)), replacing the RFC 3550 formula.
section: "4"
topics:
