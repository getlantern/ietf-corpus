document: rfc-9661
kind: interoperability-note
summary: Servers implementing VacationResponse (RFC 8621 Section 8) as a Sieve script MUST allow it to be fetched and activated/deactivated via SieveScript/get and /set, but MUST NOT allow it to be destroyed or have its content updated — such requests MUST be rejected with a 'forbidden' SetError.
