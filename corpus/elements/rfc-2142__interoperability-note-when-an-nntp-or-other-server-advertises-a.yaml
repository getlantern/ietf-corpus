document: rfc-2142
kind: interoperability-note
summary: When an NNTP (or other) server advertises a domain name different from its host name (e.g., DATA.RAMONA.VIX.COM advertising VIX.COM in Path headers), mail must be deliverable to the well-known mailbox at BOTH the advertised domain and the actual host domain, even if delivered to different final destinations.
section: "1"
topics:
    - email
    - dns
