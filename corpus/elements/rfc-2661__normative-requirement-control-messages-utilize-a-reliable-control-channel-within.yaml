document: rfc-2661
kind: normative-requirement
summary: Control messages utilize a reliable Control Channel within L2TP to guarantee delivery. Data messages are not retransmitted when packet loss occurs. The control channel uses a sliding window with sequence numbers and ZLB acknowledgment packets.
section: "3.0"
rfc2119_level: MUST
topics:
    - vpn
