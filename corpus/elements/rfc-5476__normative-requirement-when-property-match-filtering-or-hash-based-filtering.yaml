document: rfc-5476
kind: normative-requirement
summary: When Property Match Filtering or Hash-based Filtering is based on encrypted fields, the Selector MUST recognize that the fields are not available and MUST NOT select those packets; encrypted packets MUST still be counted in the packetsObserved Information Element.
section: 6.5.2.5
rfc2119_level: MUST
