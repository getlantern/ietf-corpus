document: rfc-3731
kind: normative-requirement
summary: Domain and host name syntax MUST conform to RFC952 as updated by RFC1123. The trailing dot required when names are stored in a DNS zone is implicit and MUST NOT be provided when exchanging host and domain names.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
    - registry
