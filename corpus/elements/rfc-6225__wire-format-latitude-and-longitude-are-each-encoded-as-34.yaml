document: rfc-6225
kind: wire-format
summary: Latitude and Longitude are each encoded as 34-bit, two's complement, fixed-point values with 9 integer bits and 25 fractional bits. Positive latitudes are north of the equator; positive longitudes are east of the Prime Meridian; values are rounded to the nearest 34-bit binary representation.
