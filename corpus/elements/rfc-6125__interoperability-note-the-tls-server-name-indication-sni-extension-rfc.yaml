document: rfc-6125
kind: interoperability-note
summary: The TLS Server Name Indication (SNI) extension (RFC 4366) allows a client to indicate the desired DNS domain name during the TLS handshake, enabling the server to return the appropriate single-domain certificate. Before SNI, the workaround was to embed all domain names into a single certificate with multiple DNS-IDs, SRV-IDs, or URI-IDs.
section: "7.4"
topics:
    - tls
    - pkix
    - security
    - dns
