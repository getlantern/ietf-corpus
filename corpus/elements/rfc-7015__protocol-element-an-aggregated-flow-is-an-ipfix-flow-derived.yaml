document: rfc-7015
kind: protocol-element
summary: An Aggregated Flow is an IPFIX Flow derived from zero or more Original Flows within a defined Aggregation Interval. Once exported, an Aggregated Flow is treated as a standard IPFIX Flow per RFC 7011 and requires no protocol changes for export or storage.
