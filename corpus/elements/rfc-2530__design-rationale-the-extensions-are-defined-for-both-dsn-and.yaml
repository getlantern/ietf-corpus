document: rfc-2530
kind: design-rationale
summary: 'The extensions are defined for both DSN and MDN to cover different deployment scenarios: DSNs may not be universally available, while MDNs expose disposition timing. Supporting both mechanisms allows senders to obtain media feature capability information regardless of which notification type the recipient supports.'
