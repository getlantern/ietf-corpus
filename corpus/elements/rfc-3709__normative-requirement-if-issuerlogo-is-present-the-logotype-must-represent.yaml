document: rfc-3709
kind: normative-requirement
summary: If issuerLogo is present, the logotype MUST represent the issuer's organization and MUST be consistent with, and require the presence of, an organization name in the issuer field. If subjectLogo is present, the logotype MUST represent the subject's organization.
section: "4.1"
rfc2119_level: MUST
