document: rfc-2837
kind: design-rationale
summary: The module-to-port mapping is recommended but explicitly optional. A vendor may place all ports in a single module or use divisions that do not correspond to physical boundaries, accommodating diverse hardware architectures such as multi-card chassis where card slots are sparsely populated.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
