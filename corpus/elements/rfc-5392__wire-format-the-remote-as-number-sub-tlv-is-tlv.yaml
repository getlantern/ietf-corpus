document: rfc-5392
kind: wire-format
summary: The Remote AS Number sub-TLV is TLV type 21 and is 4 octets in length, carrying the AS number of the neighboring AS. When only 2 octets are used for the AS number, the high-order 2 octets MUST be set to zero.
section: 3.3.1
topics:
    - routing
    - mpls
