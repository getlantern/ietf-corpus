document: rfc-9705
kind: normative-requirement
summary: In parallel with creating NP-bypass or LP-bypass tunnels, the PLR MUST initiate a Node-ID-based Hello session to the NNHOP or NHOP node respectively to detect MP node failure and determine RI-RSVP capability. If the MP has not set the I-bit in the CAPABILITY object in Hello messages, the PLR MUST execute backward compatibility procedures.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
