document: rfc-8863
kind: interoperability-note
summary: RFC 8838 Trickle ICE already addresses a related problem by waiting for an end-of-candidates indication before declaring failure. However, this is insufficient on its own because peer-reflexive candidates may still be discovered after the end-of-candidates indication is received, so the PAC timer is still required.
section: "5"
topics:
