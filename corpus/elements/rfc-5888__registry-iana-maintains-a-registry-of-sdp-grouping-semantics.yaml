document: rfc-5888
kind: registry
summary: IANA maintains a registry of SDP grouping semantics. Values are registered following the Standards Action policy. Current entries include LS (RFC 5888), FID (RFC 5888), SRF (RFC 3524), ANAT (RFC 4091), FEC (RFC 4756), and DDP (RFC 5583). Each entry requires a brief description, a token (SHOULD be ≤4 characters), and a reference to a standards track RFC.
