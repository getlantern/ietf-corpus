document: rfc-8031
kind: design-rationale
summary: The shared secret from X25519 or X448 is used directly as g^ir in IKEv2 without additional processing, because the X25519/X448 functions as specified in RFC 7748 already produce output suitable for use as a Diffie-Hellman shared secret.
section: "2"
topics:
