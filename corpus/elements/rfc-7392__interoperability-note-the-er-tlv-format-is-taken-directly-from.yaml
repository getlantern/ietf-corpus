document: rfc-7392
kind: interoperability-note
summary: The ER-TLV format is taken directly from Section 4.1 of RFC 3212 (Constraint-Based LSP Setup using LDP), and the ER-Hop TLV format from Section 4.2 of RFC 3212. IPv4 Prefix and IPv6 Prefix ER-Hop semantics also remain as defined in RFC 3212 Sections 4.7.1 and 4.7.2 respectively.
