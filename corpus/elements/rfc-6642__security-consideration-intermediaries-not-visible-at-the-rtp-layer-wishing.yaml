document: rfc-6642
kind: security-consideration
summary: Intermediaries not visible at the RTP layer wishing to send TPLR on behalf of a media source must spoof the media source's SSRC, which is difficult when SRTP is in use. If the intermediary is visible at the RTP layer and is part of the security context, this is not an issue.
section: "7"
topics:
    - rtp
    - realtime
    - security
    - crypto
