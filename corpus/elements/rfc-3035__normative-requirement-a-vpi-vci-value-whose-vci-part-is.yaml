document: rfc-3035
kind: normative-requirement
summary: A VPI/VCI value whose VCI part is in the range 0-32 inclusive MUST NOT be used as the encoding of a label. The default VPI/VCI for the non-MPLS connection is VPI 0, VCI 32 on direct connections.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - mpls
