document: rfc-6353
kind: state-machine
summary: 'Server session acceptance: receive client certificate → perform path validation or fingerprint lookup in snmpTlstmCertToTSNTable → derive tmSecurityName → increment snmpTlstmSessionAccepts. Failure in any verification step increments snmpTlstmSessionInvalidClientCertificates and snmpTlstmSessionOpenErrors, and the session MUST be rejected.'
section: 5.3.2
topics:
