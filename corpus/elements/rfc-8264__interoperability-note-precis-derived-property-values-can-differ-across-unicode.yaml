document: rfc-8264
kind: interoperability-note
summary: PRECIS derived property values can differ across Unicode versions because code point properties can change. The registry maintains separate tables per Unicode version starting from 6.3, and the BackwardCompatible (G) list can be adjusted to preserve stability. Applications must specify which Unicode version they use to ensure consistent behavior.
section: "13.4"
topics:
    - security
