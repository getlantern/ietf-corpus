document: rfc-2617
kind: design-rationale
summary: The recommended nonce construction is base64(timestamp H(timestamp ":" ETag ":" private-key)), enabling the server to validate freshness and bind the nonce to a specific resource version. Including the client IP was considered but rejected because it breaks proxy farms and IP spoofing is not difficult.
section: 3.2.1
topics:
    - http
    - security
