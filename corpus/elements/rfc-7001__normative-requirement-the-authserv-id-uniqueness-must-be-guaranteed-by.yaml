document: rfc-7001
kind: normative-requirement
summary: The authserv-id uniqueness MUST be guaranteed by the ADMD that generates it and MUST pertain to that ADMD. MUAs or downstream filters SHOULD use this identifier to determine whether to trust the header field's contents.
