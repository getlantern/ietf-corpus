document: rfc-3813
kind: normative-requirement
summary: The agent MUST ensure that the StorageType of an mplsXCEntry and its associated in-segment and out-segment entries remain consistent and are restored consistently upon system restart. StorageType SHOULD be set to permanent(4) if the entry was created by static LSP configuration.
section: "5.7"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
