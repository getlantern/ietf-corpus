document: rfc-5096
kind: wire-format
summary: 'The Experimental Mobility Header message follows the standard Mobility Header format with fields: Payload Proto (8-bit), Header Len (8-bit), MH Type (8-bit, value 11), Reserved (8-bit), Checksum (16-bit), and variable-length Message Data. If no data is present, two bytes of padding are required; Header Len is set to 0 (excluding first 8 octets from length calculation).'
