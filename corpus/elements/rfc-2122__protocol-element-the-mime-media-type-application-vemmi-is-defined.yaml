document: rfc-2122
kind: protocol-element
summary: The MIME media type application/vemmi is defined for transport of VEMMI objects outside a continuous session (e.g., via HTTP or email). An optional 'version' parameter carries a numeric integer encoding the VEMMI version as defined in ETS 300 709.
section: "9"
