document: rfc-7759
kind: security-consideration
summary: An attacker could overload a network element by requesting high-frequency liveliness monitoring of a large number of LSPs targeting a single node. Implementations MUST be made cognizant of available OAM resources and MAY refuse new OAM configurations that would overload a node; policies for fair OAM resource distribution among monitored LSPs are recommended.
section: "5"
rfc2119_level: MAY
topics:
    - mpls
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
