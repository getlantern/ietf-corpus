document: rfc-9059
kind: security-consideration
summary: Security considerations from RFC 5440, RFC 8231, and RFC 8281 apply. Malicious PCEP speakers could exploit the two new Association Types (Single-Sided and Double-Sided Bidirectional LSP Association) as described in RFC 8697. Securing the PCEP session using TLS (RFC 8253) is RECOMMENDED.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - tls
