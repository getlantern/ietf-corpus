document: rfc-3841
kind: protocol-element
summary: 'Contact predicates are constructed from feature parameters in registered Contact header fields. URIs with no feature parameters are treated as immune to caller preference processing: they are temporarily removed, preference processing is applied to the remainder, and then added back with Qa=1.0.'
section: 7.2.3
topics:
