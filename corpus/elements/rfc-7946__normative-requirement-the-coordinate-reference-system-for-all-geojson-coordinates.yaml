document: rfc-7946
kind: normative-requirement
summary: The coordinate reference system for all GeoJSON coordinates is WGS 84 (longitude and latitude in decimal degrees). An optional third-position element SHALL be height in meters above or below the WGS 84 reference ellipsoid.
section: "4"
rfc2119_level: SHALL
