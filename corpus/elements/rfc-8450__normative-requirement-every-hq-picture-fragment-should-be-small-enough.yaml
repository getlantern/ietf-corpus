document: rfc-8450
kind: normative-requirement
summary: Every HQ Picture Fragment SHOULD be small enough that the RTP packet carrying it fits within the network MTU. Fragments that are too large can generally be split into smaller Fragments unless an individual slice exceeds the MTU.
section: "4.4"
rfc2119_level: SHOULD
topics:
