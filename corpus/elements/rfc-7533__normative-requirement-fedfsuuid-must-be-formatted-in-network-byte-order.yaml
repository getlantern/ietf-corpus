document: rfc-7533
kind: normative-requirement
summary: FedFsUuid MUST be formatted in network byte order. FedFsPathName MUST NOT contain any zero-length components. Component names for NFSv4 paths MUST be prepared using the NFSv4 internationalization rules (RFC 7530 Section 12) before encoding.
section: "4"
rfc2119_level: MUST
