document: rfc-4141
kind: normative-requirement
summary: If the server supports CONNEG and knows the capabilities of the target device or system, it MUST provide that information through CONNEG. The capability listing MUST conform to the specifications in [SYN].
section: "5.2"
rfc2119_level: MUST
