document: rfc-2557
kind: protocol-element
summary: Content-Location is a MIME content header that labels a body part with a URI, enabling URI references in a text/html body part to resolve to subsidiary resources in other body parts of the same multipart/related structure. Its value may be an absolute or relative URI.
section: "4.2"
topics:
