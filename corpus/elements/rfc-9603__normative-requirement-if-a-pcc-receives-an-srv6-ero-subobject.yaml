document: rfc-9603
kind: normative-requirement
summary: If a PCC receives an SRv6-ERO subobject where both the S and F bits are set to 1 (SID and NAI both absent), it MUST consider the entire ERO invalid and send a PCErr with Error-Type=10 and Error-Value=42.
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
