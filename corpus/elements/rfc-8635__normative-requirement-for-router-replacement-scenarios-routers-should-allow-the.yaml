document: rfc-8635
kind: normative-requirement
summary: For router replacement scenarios, routers SHOULD allow the private BGPsec key to be inserted via a protected channel (e.g., SSH, NETCONF, SNMP). The router MAY allow the private key to be exported after key generation, but this SHOULD be paired with functionality that sets the key into a permanent non-exportable state.
section: "10.4"
rfc2119_level: SHOULD
topics:
    - bgp
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
