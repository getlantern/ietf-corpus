document: rfc-9259
kind: interoperability-note
summary: If the penultimate segment of a segment list is a PSP SID, telemetry data from the ultimate segment cannot be requested, because the SRH (and thus the O-flag) is removed at the penultimate node before the ultimate segment processes the packet.
section: 2.1.1
topics:
    - routing
    - ip
