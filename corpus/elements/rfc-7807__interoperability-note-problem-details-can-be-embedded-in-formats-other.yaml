document: rfc-7807
kind: interoperability-note
summary: Problem details can be embedded in formats other than JSON and XML (e.g., HTML) either by encapsulating a JSON or XML serialization or by translating the problem detail model into the target format's conventions. No specific recommendation is made; the appropriate method depends on format and application.
