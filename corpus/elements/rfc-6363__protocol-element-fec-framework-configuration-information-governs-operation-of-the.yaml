document: rfc-6363
kind: protocol-element
summary: FEC Framework Configuration Information governs operation of the FEC Framework and MUST be available to both sender and receiver. It includes identification of source and repair flows, an integer flow identifier unique per FEC repair flow instance, the FEC Encoding ID, the length of the Explicit Source FEC Payload ID, and zero or more FEC-Scheme-Specific Information (FSSI) elements.
section: "5.5"
topics:
