document: rfc-9390
kind: normative-requirement
summary: If a Diameter client sends a session initiation request with Session-Group-Info AVPs but the server response contains no Session-Group-Info AVP, the client MUST proceed as if the request was processed without group assignments and MUST NOT retry group assignment for this session.
section: 4.2.1
rfc2119_level: MUST
topics:
    - diameter
