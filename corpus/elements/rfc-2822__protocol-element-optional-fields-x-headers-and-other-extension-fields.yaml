document: rfc-2822
kind: protocol-element
summary: Optional fields (X-headers and other extension fields) MUST conform to `field-name ":" unstructured CRLF`. The field name is composed of printable US-ASCII characters excluding SP and colon, and MUST NOT duplicate any field name defined in this standard.
section: 3.6.8
