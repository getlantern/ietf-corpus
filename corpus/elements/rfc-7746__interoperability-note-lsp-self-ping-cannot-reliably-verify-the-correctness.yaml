document: rfc-7746
kind: interoperability-note
summary: LSP Self-ping cannot reliably verify the correctness of downstream forwarding state. If a downstream LSR installs state that terminates the LSP at the wrong node, or if a downstream LSR forwards a packet without an MPLS label, LSP Self-ping will not detect the error.
section: "2"
topics:
    - mpls
