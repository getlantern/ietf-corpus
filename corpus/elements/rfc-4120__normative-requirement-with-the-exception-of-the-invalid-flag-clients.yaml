document: rfc-4120
kind: normative-requirement
summary: With the exception of the INVALID flag, clients MUST ignore ticket flags that are not recognized. KDCs MUST ignore KDC options that are not recognized. Clients MUST confirm that the ticket returned by the KDC meets their needs.
section: "2"
rfc2119_level: MUST
topics:
    - security
