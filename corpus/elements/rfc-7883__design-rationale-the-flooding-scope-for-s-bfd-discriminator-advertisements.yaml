document: rfc-7883
kind: design-rationale
summary: 'The flooding scope for S-BFD Discriminator advertisements is determined by the intended use: if S-BFD usage will be exclusively within a Level-1 area, area scope is appropriate; if it will span different Level-1 areas, domain scope is appropriate.'
