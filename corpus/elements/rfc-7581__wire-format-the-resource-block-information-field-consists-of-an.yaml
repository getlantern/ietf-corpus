document: rfc-7581
kind: wire-format
summary: The Resource Block Information Field consists of an RB Set Field, three I/O/B shared-fiber flags, and zero or more Optional Subfields in TLV format (2-byte Type, 2-byte Length of value, value padded to 4-byte alignment). The length of the enclosing object determines overall field length.
