document: rfc-9530
kind: registry
summary: 'RFC 9530 creates the ''Hash Algorithms for HTTP Digest Fields'' registry with initial entries: sha-512 (Active), sha-256 (Active), md5 (Deprecated), sha/SHA-1 (Deprecated), unixsum (Deprecated), unixcksum (Deprecated), adler/ADLER32 (Deprecated), crc32c (Deprecated). Registration uses Specification Required policy. Each entry carries an Algorithm Key, Status (Active/Provisional/Deprecated), Description, and Reference(s).'
section: "7.2"
topics:
    - http
    - registry
    - crypto
