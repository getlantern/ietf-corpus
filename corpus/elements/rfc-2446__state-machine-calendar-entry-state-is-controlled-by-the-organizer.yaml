document: rfc-2446
kind: state-machine
summary: Calendar entry state is controlled by the Organizer via the STATUS property (no default; values include TENTATIVE, CONFIRMED, CANCELLED). Attendee-specific state is carried in the 'partstat' parameter of the ATTENDEE property; initial value is NEEDS-ACTION, and Attendees update it (ACCEPTED, DECLINED, TENTATIVE, DELEGATED, etc.) via REPLY messages.
section: 2.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
