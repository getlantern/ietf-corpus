document: rfc-9011
kind: protocol-element
summary: Uplink fragmentation uses ACK-on-Error mode; downlink fragmentation uses ACK-Always mode for unicast and No-ACK for multicast. A LoRaWAN device cannot support simultaneous interleaved fragmented datagrams in the same direction.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
