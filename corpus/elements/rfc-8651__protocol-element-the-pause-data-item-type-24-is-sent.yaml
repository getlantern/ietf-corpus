document: rfc-8651
kind: protocol-element
summary: The Pause Data Item (Type 24) is sent by a modem to instruct a router to suppress (pause) traffic. It can apply device-wide (via Session Update Message) or per-destination (via Destination Update Message), and identifies traffic by Queue Index, with special value 255 indicating all traffic.
section: "3.2"
topics:
    - routing
    - qos
    - congestion
