document: rfc-2608
kind: design-rationale
summary: 'The Directory Agent is designed as a voluntary cache/scalability layer rather than a required component: SLP functions without any DA using multicast convergence, but DAs reduce multicast traffic in larger networks. DAs are optional to deploy but MUST support all message types if present.'
