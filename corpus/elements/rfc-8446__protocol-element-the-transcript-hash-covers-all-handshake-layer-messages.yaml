document: rfc-8446
kind: protocol-element
summary: The transcript hash covers all Handshake-layer messages from ClientHello onward. When a HelloRetryRequest occurs, a synthetic message_hash message (HandshakeType 254) encoding Hash(ClientHello1) replaces the original ClientHello in the transcript, preventing the transcript from growing unboundedly.
section: 4.4.1
topics:
