kind: protocol-element
summary: A new IPsec Security Association attribute 'Extended (64-bit) Sequence Number' is defined with attribute type value 11 and type Basic (B), for use in IKE Phase II negotiation. The attribute class value 1 indicates use of 64-bit sequence numbers; value 0 is RESERVED.
