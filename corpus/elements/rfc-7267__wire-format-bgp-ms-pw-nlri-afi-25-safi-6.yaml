document: rfc-7267
kind: wire-format
summary: 'BGP MS-PW NLRI (AFI=25, SAFI=6): 1-octet Length (prefix length in bits), 8-octet Route Distinguisher, 4-octet Global ID, 4-octet Prefix, 4-octet AC ID. Lengths 128–159 bits are invalid; minimum is 96 bits (except the 0-length default route); maximum is 160 bits.'
