document: rfc-8779
kind: normative-requirement
summary: If a PCE honored the requested routing granularity, it MUST indicate the selected routing granularity in the RP object in the response. Otherwise, the PCE MUST use the reserved RG value to leave ERO checking to the PCC.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
