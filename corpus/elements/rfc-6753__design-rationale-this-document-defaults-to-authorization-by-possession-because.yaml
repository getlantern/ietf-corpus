document: rfc-6753
kind: design-rationale
summary: This document defaults to Authorization by Possession because no authentication mechanism is specified, making identity-based access control unavailable without future extensions. Selective disclosure via distinct URIs per recipient can substitute for identity-based authorization.
section: "4.3"
