document: rfc-4064
kind: design-rationale
summary: Without a reserved experimental message type, implementers would have to select type values from the IANA-assignment range, risking collisions with other experimental or standardized messages. Reserving dedicated experimental values (per BCP 82, RFC 3692) avoids this.
section: "1"
topics:
