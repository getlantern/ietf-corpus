document: rfc-5845
kind: security-consideration
summary: The GRE Key option in PBU/PBA messages reveals the group affiliation of a mobile node identified by its NAI or IP address, potentially enabling an attacker to target flows belonging to a specific group. Confidentiality protection on PBU/PBA messages or on all tunneled data packets is recommended to prevent this.
section: "9"
topics:
    - security
    - routing
    - ip
