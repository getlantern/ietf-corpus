document: rfc-9581
kind: normative-requirement
summary: Implementations MUST ignore key/value pairs with negative integer or text string keys they do not understand (elective keys). Implementations MUST signal an error when encountering key/value pairs with unsigned integer keys they do not understand (critical or base time keys).
section: "3"
rfc2119_level: MUST
topics:
    - cbor
