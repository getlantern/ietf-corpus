document: rfc-9432
kind: normative-requirement
summary: Catalog consumers MUST NOT apply catalog zone processing to zones without the version property, zones with more than one version RR, zones with an unexpected value, or zones declaring a schema version not implemented by the consumer (e.g., version "1").
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - dns
