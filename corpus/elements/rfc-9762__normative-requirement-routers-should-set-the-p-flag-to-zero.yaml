document: rfc-9762
kind: normative-requirement
summary: Routers SHOULD set the P flag to zero by default unless explicitly configured by the administrator, and MUST allow the P flag to be configured separately from the A flag. Enabling or disabling the P flag MUST NOT trigger automatic changes in the A flag value.
section: "6"
rfc2119_level: MUST
topics:
