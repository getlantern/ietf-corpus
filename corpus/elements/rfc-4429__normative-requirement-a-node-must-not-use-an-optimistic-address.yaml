document: rfc-4429
kind: normative-requirement
summary: A node MUST NOT use an Optimistic Address as the source address of a Neighbor Solicitation. This prevents the SLLAO included in NSes from disrupting neighbors' Neighbor Cache entries for an address that may legitimately belong to another node.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
