document: rfc-4206
kind: protocol-element
summary: SRLG information for an FA advertisement is the union of SRLGs of the underlying TE links making up the FA-LSP path, carried in the SRLG TLV in IS-IS or the SRLG sub-TLV of the TE Link TLV in OSPF. This information may change over time as the underlying path changes.
section: 3.1.10
topics:
