document: rfc-8013
kind: normative-requirement
summary: During ingress processing, if an unknown metadata ID is encountered or if the metaID is not in the allowed filter list, the implementation MUST ignore it, increment the packet error statistic, and continue processing other metadata.
section: 6.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
