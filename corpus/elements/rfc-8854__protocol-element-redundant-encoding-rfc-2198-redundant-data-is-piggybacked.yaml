document: rfc-8854
kind: protocol-element
summary: 'Redundant encoding (RFC 2198): redundant data is piggybacked on an existing primary encoding in a single packet. Can be an exact copy or lower-quality representation of prior payload; efficient when data fits within MTU but cannot recover RTP marker bit, CSRC, or header extensions.'
