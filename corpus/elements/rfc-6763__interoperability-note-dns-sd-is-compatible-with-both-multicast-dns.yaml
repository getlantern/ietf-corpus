document: rfc-6763
kind: interoperability-note
summary: DNS-SD is compatible with both Multicast DNS (RFC 6762) and conventional Unicast DNS infrastructure. When used with mDNS, zero-configuration operation is possible; when used with unicast DNS, DNS Update keys are typically required for service registration. The '_tcp' and '_udp' subdomain labels may be delegated to separate DNS server hardware from the main organizational DNS.
section: "1"
topics:
