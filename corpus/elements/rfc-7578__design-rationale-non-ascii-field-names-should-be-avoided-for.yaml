document: rfc-7578
kind: design-rationale
summary: Non-ASCII field names SHOULD be avoided for broadest interoperability, since field names are generally not visible to users and need not match the labels shown on screen. If non-ASCII is unavoidable, UTF-8 SHOULD be used uniformly.
section: 5.1.1
topics:
    - http
