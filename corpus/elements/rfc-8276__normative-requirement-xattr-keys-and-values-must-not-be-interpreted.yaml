document: rfc-8276
kind: normative-requirement
summary: Xattr keys and values MUST NOT be interpreted by NFS clients or servers; they are treated as opaque application data. Interpretation would lead to non-interoperable implementations.
section: "5"
rfc2119_level: MUST NOT
