document: rfc-8527
kind: normative-requirement
summary: The <datastore> path component in the resource path {+restconf}/ds/<datastore> is encoded as an identityref per RFC 7951 JSON encoding rules; the namespace-qualified form MUST be used and the identity MUST be derived from the 'datastore' identity in the 'ietf-datastores' YANG module.
section: "3.1"
rfc2119_level: MUST
topics:
    - netconf
    - yang
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
