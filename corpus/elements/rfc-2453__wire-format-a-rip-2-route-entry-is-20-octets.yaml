document: rfc-2453
kind: wire-format
summary: 'A RIP-2 Route Entry is 20 octets: a 2-octet AFI, a 2-octet Route Tag, a 4-octet IP address, a 4-octet Subnet Mask, a 4-octet Next Hop address, and a 4-octet metric. Version must be set to 2 when any of the new fields carry information.'
