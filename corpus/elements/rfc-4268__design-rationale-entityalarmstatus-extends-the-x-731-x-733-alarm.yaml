document: rfc-4268
kind: design-rationale
summary: EntityAlarmStatus extends the X.731/X.733 alarm severity model by adding 'warning' and 'indeterminate' bits to provide a more complete mapping to the Alarm MIB (RFC 3877). These two values are explicitly noted as not defined in X.733.
