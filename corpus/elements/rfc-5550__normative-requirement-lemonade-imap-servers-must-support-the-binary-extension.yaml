document: rfc-5550
kind: normative-requirement
summary: Lemonade IMAP servers MUST support the BINARY extension (moving MIME decoding to the server) and MUST always accept binary-encoded MIME messages in APPEND commands for any folder. CONVERT MUST also be supported to allow clients to request media type conversions and image scaling.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
