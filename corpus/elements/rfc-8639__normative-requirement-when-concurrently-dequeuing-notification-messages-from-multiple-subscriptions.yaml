document: rfc-8639
kind: normative-requirement
summary: When concurrently dequeuing notification messages from multiple subscriptions to a receiver, the publisher MUST allocate bandwidth proportional to the 'weighting' assigned to each subscription. Publisher support is optional and advertised via the 'qos' feature.
section: "2.3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - qos
