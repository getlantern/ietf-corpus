document: rfc-7332
kind: protocol-element
summary: The Max-Breadth SIP header field, introduced by RFC 5393, mitigates parallel forking amplification floods. B2BUAs must propagate it across the UAS-to-UAC boundary and apply the same generation and limiting rules as proxies.
