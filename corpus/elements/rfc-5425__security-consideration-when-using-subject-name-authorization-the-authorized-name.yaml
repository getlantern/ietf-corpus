document: rfc-5425
kind: security-consideration
summary: When using subject name authorization, the authorized name SHOULD be locally configured and SHOULD NOT be obtained via DNS lookup, as DNS lookup introduces additional security vulnerabilities into the certificate validation chain.
section: "6.2"
