document: rfc-4730
kind: normative-requirement
summary: 'KPML User Interfaces MUST follow the deterministic pattern-match algorithm: the longest matching regular expression wins. If multiple expressions match at the same length, the User Interface MUST choose the first expression listed in the KPML document (document order).'
section: "3.3"
rfc2119_level: MUST
topics:
