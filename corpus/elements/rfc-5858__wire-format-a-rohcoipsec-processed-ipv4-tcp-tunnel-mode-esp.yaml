document: rfc-5858
kind: wire-format
summary: 'A ROHCoIPsec-processed IPv4/TCP tunnel-mode ESP packet has the structure: new IP header | ESP header | compressed header | data | ROHC ICV | ESP Trailer | ESP ICV. The ROHC ICV field is appended after the compressed payload and is not included in its own ICV calculation.'
