document: rfc-5942
kind: design-rationale
summary: IPv6 on-link determination is separate from address assignment, unlike IPv4 where a netmask assigned with an address implicitly designates an on-link prefix. In IPv6, a host can have addresses without any related on-link prefixes, and on-link prefixes need not be related to any assigned addresses.
section: "1"
topics:
