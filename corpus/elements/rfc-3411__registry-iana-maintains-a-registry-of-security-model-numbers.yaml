document: rfc-3411
kind: registry
summary: IANA maintains a registry of Security Model numbers for use in SNMP. The values 0 (reserved), 1 (SNMPv1), 2 (SNMPv2c), and 3 (USM) are assigned. Values 1–255 are standards-track; 256–65535 are enterprise-specific.
section: "6.1"
