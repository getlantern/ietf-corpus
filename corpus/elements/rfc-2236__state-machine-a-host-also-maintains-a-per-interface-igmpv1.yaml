document: rfc-2236
kind: state-machine
summary: 'A host also maintains a per-interface IGMPv1 router presence state: ''No IGMPv1 Router Present'' (initial) and ''IGMPv1 Router Present''. The IGMPv1 Router Present state is entered when a query with Max Response Time = 0 is received, and times out after [Version 1 Router Present Timeout] (400 seconds).'
