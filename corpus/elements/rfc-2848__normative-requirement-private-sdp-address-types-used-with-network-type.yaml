document: rfc-2848
kind: normative-requirement
summary: Private SDP address types used with network type TN MUST begin with 'X-' and SHOULD contain a domain name after the X- prefix (e.g., 'X-mytype.mydomain.com'). New address types SHOULD only be used for formats that cannot be expressed as local-phone-numbers within address type RFC2543.
section: 3.4.1
rfc2119_level: MUST
topics:
    - realtime
    - sip
