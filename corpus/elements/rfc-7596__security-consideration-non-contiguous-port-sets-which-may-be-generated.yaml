document: rfc-7596
kind: security-consideration
summary: Non-contiguous port sets (which may be generated pseudorandomly per RFC 6431) improve port number randomness compared to contiguous port sets, provided the attacker is outside the lw4o6 domain and does not know the port-set generation algorithm. Contiguous port sets do not reduce the guessing threat.
section: "9"
topics:
    - security
    - nat
