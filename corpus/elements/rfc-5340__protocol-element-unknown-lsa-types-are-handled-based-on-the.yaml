document: rfc-5340
kind: protocol-element
summary: 'Unknown LSA types are handled based on the U-bit in the LS type field: if U=0, the LSA is treated as having link-local flooding scope; if U=1, the LSA is stored and flooded as if the type were understood. The IPv4 behavior of discarding unknown types is explicitly not supported because it causes problems when the Designated Router supports fewer capabilities than other routers on the link.'
section: "2.9"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
