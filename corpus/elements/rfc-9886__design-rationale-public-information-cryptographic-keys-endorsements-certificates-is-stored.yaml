document: rfc-9886
kind: design-rationale
summary: Public information (cryptographic keys, endorsements, certificates) is stored in authoritative DNS servers rather than a proprietary registry to satisfy REG-1 from RFC 9153. This leverages existing DNS infrastructure for scalable, globally accessible lookup of DET metadata.
