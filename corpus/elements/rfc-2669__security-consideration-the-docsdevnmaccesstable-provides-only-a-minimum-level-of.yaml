document: rfc-2669
kind: security-consideration
summary: The docsDevNmAccessTable provides only a minimum level of SNMP access security for SNMPv1/v2c agents; it relies on IP address matching and community strings. SNMPv3 agents should use the User Security Model and view-based access control instead and need not implement this table.
section: "7"
topics:
