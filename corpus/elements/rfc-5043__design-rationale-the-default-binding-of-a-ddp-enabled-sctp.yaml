document: rfc-5043
kind: design-rationale
summary: The default binding of a DDP-enabled SCTP endpoint SHOULD NOT cover more than a single IP address, because distributing a single DDP stream across multiple input devices creates complex cache coherency challenges for RNIC implementations.
