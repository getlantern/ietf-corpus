document: rfc-7344
kind: normative-requirement
summary: The Parental Agent SHOULD use a DNSSEC validator to obtain a validated CDS/CDNSKEY RRset from the Child zone. An exception (NOT RECOMMENDED) is if the Parent performs additional validation to confirm the key is correct.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
