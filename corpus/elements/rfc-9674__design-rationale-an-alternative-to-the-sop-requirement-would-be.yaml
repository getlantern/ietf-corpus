document: rfc-9674
kind: design-rationale
summary: An alternative to the SOP requirement would be for a future version of RRDP to use relative URIs instead of absolute URIs, which would inherently prevent cross-origin references. The SOP approach was chosen as an update to the existing RFC 8182 rather than requiring a new RRDP version.
section: "1"
topics:
    - routing
    - security
