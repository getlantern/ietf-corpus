document: rfc-1323
kind: normative-requirement
summary: The timestamp clock must be monotone non-decreasing; the sender's clock must guarantee that each new timestamp value equals or exceeds the previous one. Implementations may achieve this via hardware clock, counter interrupt, or an offset-adjusted software clock.
section: 4.2.2
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
