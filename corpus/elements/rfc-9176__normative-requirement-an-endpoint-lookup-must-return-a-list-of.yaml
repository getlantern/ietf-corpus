document: rfc-9176
kind: normative-requirement
summary: An endpoint lookup MUST return a list of endpoints, and a resource lookup MUST return a list of links to resources. The RD MUST support matching with multiple search criteria, all of which must match for a link to be returned.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
