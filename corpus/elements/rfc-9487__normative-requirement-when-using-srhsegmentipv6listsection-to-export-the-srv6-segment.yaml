document: rfc-9487
kind: normative-requirement
summary: When using srhSegmentIPv6ListSection to export the SRv6 Segment List as a raw octetArray, the data collection MUST be able to decode the IPv6 addresses according to the SR specifications (RFC 8754), since no IPFIX structuring is applied by the exporter.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
