document: rfc-8383
kind: wire-format
summary: The Bit Map of FGLs TLV (Type 5) begins with a 3-byte 24-bit Start.FGL value, followed by a bit map where each bit corresponds to a consecutive FGL starting at N. FGLs do not wrap around; bits beyond 0xFFFFFF are ignored.
section: 2.2.5
