document: rfc-8168
kind: interoperability-note
summary: RFC 3633 was ambiguous about whether clients are permitted to include a prefix-length hint in Renew/Rebind messages and what servers should do in response. RFC 8168 clarifies that clients SHOULD include hints in Renew/Rebind and defines server behavior for each case.
section: "3.4"
topics:
    - ip
    - v6ops
