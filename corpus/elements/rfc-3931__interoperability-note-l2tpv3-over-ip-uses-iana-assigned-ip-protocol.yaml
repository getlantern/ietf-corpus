document: rfc-3931
kind: interoperability-note
summary: L2TPv3 over IP uses IANA-assigned IP protocol number 115. When operating over IP directly, the IPsec filtering selectors from RFC 3193 based on UDP ports are replaced by source and destination IP addresses plus protocol type 115.
section: 4.1.1
topics:
    - vpn
    - ip
    - ipsec
