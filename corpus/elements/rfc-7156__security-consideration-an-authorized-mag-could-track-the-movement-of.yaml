document: rfc-7156
kind: security-consideration
summary: An authorized MAG could track the movement of participating mobile nodes at the level of the MAG to which they are anchored. If such a MAG were compromised or under control of a bad actor, this could represent a privacy breach; monitoring for excessive queries from MAGs is recommended as a mitigation.
section: "6"
topics:
    - security
    - privacy
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
