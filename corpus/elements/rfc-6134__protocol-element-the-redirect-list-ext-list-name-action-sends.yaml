document: rfc-6134
kind: protocol-element
summary: The "redirect :list <ext-list-name>" action sends the message to the set of email addresses in the externally stored list named by ext-list-name, enabling personal distribution lists. The list must either resolve to enumerable email addresses or the list handler must take care of redirection.
section: "2.3"
topics:
    - email
