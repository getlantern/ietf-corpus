document: rfc-9242
kind: protocol-element
summary: IKE_INTERMEDIATE exchanges are authenticated in IKE_AUTH via an IntAuth chunk appended to the signed/MACed octets. IntAuth = IntAuth_iN | IntAuth_rN | IKE_AUTH_MID, where IntAuth_[i/r]N is the cumulative PRF chain over all IKE_INTERMEDIATE messages from initiator and responder respectively.
section: 3.3.2
topics:
    - ipsec
    - crypto
    - security
