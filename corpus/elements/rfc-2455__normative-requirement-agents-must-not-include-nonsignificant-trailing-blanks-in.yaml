document: rfc-2455
kind: normative-requirement
summary: Agents MUST NOT include nonsignificant trailing blanks in SNA name values returned by MIB objects. The sole exception is the all-blank mode name, which is returned as exactly 8 blank characters.
section: "3"
rfc2119_level: MUST NOT
