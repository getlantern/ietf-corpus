document: rfc-3986
kind: wire-format
summary: IPv4 addresses in URIs must use strictly dotted-decimal notation (dec-octet "." dec-octet "." dec-octet "." dec-octet), where each octet is 0–255. Other dotted forms such as octal or hex are not permitted by the grammar.
section: 3.2.2
