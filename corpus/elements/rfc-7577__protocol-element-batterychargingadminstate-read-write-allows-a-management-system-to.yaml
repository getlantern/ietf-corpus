document: rfc-7577
kind: protocol-element
summary: 'batteryChargingAdminState (read-write) allows a management system to request a charging state: notSet(1) lets the controller operate autonomously, charge(2) requests charging to full, doNotCharge(3) requests noCharging(4), and discharge(4) requests discharging(5). The operational result is reflected in the read-only batteryChargingOperState; the controller may override the request if operational conditions require it.'
section: "4"
topics:
