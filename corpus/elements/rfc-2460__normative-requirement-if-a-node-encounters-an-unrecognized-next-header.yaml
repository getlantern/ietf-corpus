document: rfc-2460
kind: normative-requirement
summary: If a node encounters an unrecognized Next Header value while processing headers, it should discard the packet and send an ICMP Parameter Problem message with Code 1 ('unrecognized Next Header type encountered') pointing to the unrecognized value.
section: "4"
rfc2119_level: SHOULD
topics:
    - ip
