document: rfc-1194
kind: normative-requirement
summary: Allowable names in the {U} field MUST include 'user names' or 'login names' as defined by the system. If a name is ambiguous, the system administrator SHOULD be allowed to choose whether all possible derivations are returned.
section: 2.5.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
