summary: 'Token bucket metering defines three states triggered by traffic rate relative to the QoSPolicyTokenBucketTrfcProf: conforming (rate within normal burst), exceeding (above normal burst, within excess burst), and violating (above excess burst). Each state maps to a distinct outcome action via QoSPolicyConformAction, QoSPolicyExceedAction, and QoSPolicyViolateAction associations on QoSPolicyPoliceAction.'
