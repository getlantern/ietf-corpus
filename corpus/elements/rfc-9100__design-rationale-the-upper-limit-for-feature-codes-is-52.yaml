document: rfc-9100
kind: design-rationale
summary: The upper limit for feature codes is 52 (codes 4–52 available, 48 remaining after reserved codes) because practical JSON limits safe integer representation to 2^53−1 per RFC 7493. Approximately two feature codes per year or fewer should be allocated to sustain this scheme for several decades.
section: "2.1"
topics:
