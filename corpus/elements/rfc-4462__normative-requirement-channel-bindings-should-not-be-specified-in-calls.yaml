document: rfc-4462
kind: normative-requirement
summary: Channel bindings SHOULD NOT be specified in calls during GSS-API context establishment. No standard channel binding data is defined by this document, and use of network addresses as channel bindings may break SSH in the environments where it is most useful.
section: "7.2"
rfc2119_level: SHOULD NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
