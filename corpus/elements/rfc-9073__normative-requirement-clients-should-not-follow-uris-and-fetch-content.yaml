document: rfc-9073
kind: normative-requirement
summary: Clients SHOULD NOT follow URIs and fetch content automatically; they should only do so at the explicit request of the user, due to risks including IP/location exposure and potential denial-of-service amplification.
section: "9.1"
rfc2119_level: SHOULD NOT
topics:
    - security
    - privacy
