document: rfc-7117
kind: normative-requirement
summary: For a given inter-AS tree and a given AS, there MUST be only one ASBR within that AS that accepts traffic flowing on the tree, and MUST be only one ASBR in that AS that sends traffic on that tree to any particular adjacent AS.
section: 7.2.2
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
