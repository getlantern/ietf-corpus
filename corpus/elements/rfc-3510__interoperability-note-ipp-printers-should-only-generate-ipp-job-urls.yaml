document: rfc-3510
kind: interoperability-note
summary: IPP Printers SHOULD only generate IPP Job URLs (e.g., in the 'job-uri' attribute in a 'Print-Job' response) by appending exactly one path component to the corresponding IPP Printer URL, for interoperability. The transform from an IPP Job URL to the corresponding IPP Printer URL is otherwise unspecified.
section: 4.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
