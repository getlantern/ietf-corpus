document: rfc-8681
kind: normative-requirement
summary: The ESI of source symbols MUST start at 0 for the first source symbol and MUST be managed sequentially, wrapping to 0 after reaching the maximum value (2^32 - 1 for FEC schemes 9 and 10).
section: "3.4"
