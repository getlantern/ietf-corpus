document: rfc-7838
kind: normative-requirement
summary: If a client supporting this specification becomes aware of an alternative service, the client SHOULD use that alternative service for all requests to the associated origin as soon as it is available, provided the alternative service information is fresh and the security properties are desirable compared to the existing connection.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - http
