document: rfc-7401
kind: wire-format
summary: 'HIP parameters use a TLV format: Type (2 bytes, where bit 0 of the type indicates criticality), Length (2 bytes, value field length in bytes), and Value (variable, padded to an 8-byte boundary). Parameter Type values enforce an ordering constraint — parameters MUST be in ascending order by type value within a packet.'
section: 5.2.1
topics:
    - ip
