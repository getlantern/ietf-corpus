document: rfc-5374
kind: interoperability-note
summary: GKM protocols (e.g., GDOI, GSAKMP) and IKEv2 can share access to a common GSPD/SAD concurrently. GKM SPI allocation is independent of IKEv2 SPI allocation because Group SAs are qualified by a multicast destination IP address; however, the GPAD requires explicit coordination between the two protocols.
section: 4.4.1
topics:
    - ipsec
    - multicast
