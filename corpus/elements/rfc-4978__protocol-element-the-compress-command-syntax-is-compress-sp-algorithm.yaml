document: rfc-4978
kind: protocol-element
summary: 'The COMPRESS command syntax is: ''COMPRESS'' SP algorithm, where algorithm is ''DEFLATE''. The capability is advertised as ''COMPRESS=DEFLATE''. The resp-text-code COMPRESSIONACTIVE is used when compression is already active via another layer.'
