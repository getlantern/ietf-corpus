document: rfc-7545
kind: normative-requirement
summary: PAWS MUST use HTTPS (HTTP over TLS, RFC 2818) as its transport. The database URI MUST use the 'https' scheme. HTTPS provides both confidentiality for geolocation data and integrity protection against modification of spectrum availability responses.
section: "7"
rfc2119_level: MUST
topics:
