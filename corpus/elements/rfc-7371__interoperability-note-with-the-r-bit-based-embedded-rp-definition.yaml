document: rfc-7371
kind: interoperability-note
summary: With the R-bit-based Embedded-RP definition, both ff70::/12 and fff0::/12 are valid Embedded-RP prefixes (whenever the R-bit is 1), superseding the RFC 3956 restriction that only ff70::/12 applies. The old guidance that implementations SHOULD NOT treat fff0::/12 as Embedded-RP is removed.
section: 4.2.2
topics:
    - ip
    - multicast
