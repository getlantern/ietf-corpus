document: rfc-7798
kind: interoperability-note
summary: This payload format is designed to be consistent with RFC 6184 (H.264 RTP) and RFC 6190 (scalable H.264 RTP), using the same three basic packet structures (single NAL unit, aggregation, fragmentation). HEVC-specific extensions are the 2-byte NAL unit header format and the new PACI/TSCI mechanism for temporal scalability control.
