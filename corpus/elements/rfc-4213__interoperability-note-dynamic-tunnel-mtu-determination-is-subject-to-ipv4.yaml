document: rfc-4213
kind: interoperability-note
summary: 'Dynamic tunnel MTU determination is subject to IPv4 path MTU blackholes when ICMPv4 ''packet too big'' messages are dropped by firewalls or not generated by routers. When this occurs, at least two packet drops happen before MTU discovery converges: one for the encapsulator to learn the tunnel IPv4 MTU, and another for the IPv6 source to learn the reduced IPv6 MTU.'
section: 3.2.2
topics:
    - ip
    - v6ops
