document: rfc-7741
kind: normative-requirement
summary: The Y (layer sync) bit MUST be set to 0 if the current frame depends on any frame other than the base layer (TID=0) frame with the matching TL0PICIDX. It SHOULD be set to 1 only when the frame depends solely on that base layer frame.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
