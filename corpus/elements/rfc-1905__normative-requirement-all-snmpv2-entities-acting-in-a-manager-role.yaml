document: rfc-1905
kind: normative-requirement
summary: All SNMPv2 entities acting in a manager role MUST be able to generate GetRequest-PDU, GetNextRequest-PDU, GetBulkRequest-PDU, SetRequest-PDU, InformRequest-PDU, and Response-PDU, and MUST be able to receive Response-PDU, SNMPv2-Trap-PDU, and InformRequest-PDU.
section: "4.2"
rfc2119_level: MUST
