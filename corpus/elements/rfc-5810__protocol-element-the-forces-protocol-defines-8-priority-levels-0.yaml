document: rfc-5810
kind: protocol-element
summary: The ForCES protocol defines 8 priority levels (0–7) encoded in the 3-bit Pri field of the Flags. Higher values indicate greater importance. TMLs that support fewer than 8 hardware priority levels MUST map the 8 protocol levels across the available TML levels.
section: "6.1"
topics:
    - routing
