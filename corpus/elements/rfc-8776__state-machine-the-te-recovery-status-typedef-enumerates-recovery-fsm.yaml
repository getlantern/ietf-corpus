document: rfc-8776
kind: state-machine
summary: 'The ''te-recovery-status'' typedef enumerates recovery FSM states: normal, recovery-started, recovery-succeeded, recovery-failed, reversion-started, reversion-succeeded, reversion-failed, recovery-unavailable (lockout or protection span failure), recovery-admin (operator-commanded switch), and wait-to-restore (WTR timer active), per RFC 4427 and RFC 6378.'
