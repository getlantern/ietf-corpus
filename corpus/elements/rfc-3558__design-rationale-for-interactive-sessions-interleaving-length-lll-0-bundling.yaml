document: rfc-3558
kind: design-rationale
summary: For interactive sessions, interleaving length LLL=0 (bundling) or Header-Free format is RECOMMENDED to minimize end-to-end delay. For non-interactive use, LLL of 4 or 5 is RECOMMENDED as a balance between packet-loss robustness and latency.
section: "9.1"
topics:
