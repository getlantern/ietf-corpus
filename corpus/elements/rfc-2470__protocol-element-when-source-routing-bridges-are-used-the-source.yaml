document: rfc-2470
kind: protocol-element
summary: When source routing bridges are used, the source route to a destination can be extracted from the RIF field of received Neighbor Advertisement messages. The RIF can be reversed for return traffic by toggling the D bit and setting Bcast to indicate a Specifically Routed Frame.
section: "6"
