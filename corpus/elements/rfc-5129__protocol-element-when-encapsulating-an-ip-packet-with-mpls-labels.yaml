document: rfc-5129
kind: protocol-element
summary: When encapsulating an IP packet with MPLS labels, the Not-CM state is set in the EXP field if the IP ECN status is Not-ECT, ECT(0), or ECT(1). The CM state is set if the IP ECN status is CE. If multiple labels are pushed simultaneously, the same EXP value is placed in all label stack entries.
section: "4.1"
topics:
    - mpls
    - ecn
    - congestion
