document: rfc-1294
kind: protocol-element
summary: A SNAP header consists of a 3-octet Organizationally Unique Identifier (OUI) followed by a 2-octet Protocol Identifier (PID). OUI 0x00-00-00 specifies that the following PID is an EtherType. NLPID value 0x80 indicates a SNAP header follows.
