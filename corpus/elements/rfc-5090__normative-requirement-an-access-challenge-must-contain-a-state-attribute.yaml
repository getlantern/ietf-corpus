document: rfc-5090
kind: normative-requirement
summary: An Access-Challenge MUST contain a State attribute, which is copied to the subsequent Access-Request. A server receiving an Access-Request with a State attribute MUST respond with Access-Accept or Access-Reject and MUST NOT respond with another Access-Challenge.
section: "5"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
