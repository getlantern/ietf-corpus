document: rfc-5844
kind: normative-requirement
summary: When the Binding Cache entry lookup uses an IPv4 home address as the search key (when no non-zero Home Network Prefix option is present), the LMA MUST apply the same lookup rules from RFC 5213 Section 5.4.1.1, substituting the IPv4 home address for the IPv6 prefix set and assuming exactly one IPv4 address rather than a set of prefixes.
section: 3.1.2.7
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
