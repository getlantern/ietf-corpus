document: rfc-6481
kind: design-rationale
summary: File names for CRLs, manifests, and certificates are recommended (non-normative) to be derived from the CA's public key using a modified Base64 encoding of the 160-bit public key hash, making them stable across reissuance events and unique per key pair.
