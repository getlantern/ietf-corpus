document: rfc-6960
kind: security-consideration
summary: Unsigned error responses expose OCSP to denial-of-service attacks where an attacker injects false error messages. Additionally, producing cryptographic signatures on every query is computationally expensive, exacerbating flood-of-queries DoS. Algorithm agility extensions slightly increase the DoS surface by allowing clients to request unsupported algorithms.
section: "5"
topics:
    - pkix
    - security
