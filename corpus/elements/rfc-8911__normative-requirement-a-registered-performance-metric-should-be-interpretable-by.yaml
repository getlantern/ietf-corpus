document: rfc-8911
kind: normative-requirement
summary: A Registered Performance Metric SHOULD be interpretable by users, implementable by designers, deployable by operators, accurate across vendors, operationally useful with significant industry interest or deployment, and sufficiently tightly defined so that Runtime Parameter variations do not change the fundamental nature of the measurement.
section: "5"
rfc2119_level: SHOULD
topics:
    - registry
    - measurement
