document: rfc-8608
kind: normative-requirement
summary: Reserved algorithm IDs 0x00 and 0xFF MUST NOT be used in a Signature_Block; if encountered, the router MUST treat the BGPsec UPDATE message as malformed per RFC 4271.
section: "2.1"
rfc2119_level: MUST NOT
