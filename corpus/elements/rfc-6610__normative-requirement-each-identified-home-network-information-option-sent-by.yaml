document: rfc-6610
kind: normative-requirement
summary: Each Identified Home Network Information option sent by a relay agent must contain a Home Network ID FQDN option identical to the one sent by the client, so the client can identify which network each response pertains to.
section: "4.2"
rfc2119_level: MUST
topics:
