document: rfc-3623
kind: design-rationale
summary: 'DoNotAge is prohibited in grace-LSAs because the LS age field serves a dual purpose: it both tracks normal LSA aging and acts as an elapsed-time counter used to determine whether the grace period has expired. Using DoNotAge would break this timing mechanism.'
section: A
topics:
    - routing
