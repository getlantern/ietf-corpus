document: rfc-7339
kind: normative-requirement
summary: Overload control parameter values generated by a server algorithm at time t and t+1 MUST carry an increasing "oc-seq" value. If the sequence counter overflows, it MUST be reset to the current timestamp or an appropriate base value.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
