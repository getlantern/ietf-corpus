document: rfc-1490
kind: design-rationale
summary: Frame Relay fragmentation has no reassembly timer because the Frame Relay service is required to deliver frames in order; if a fragment is corrupted or missing during reassembly, the entire message is dropped and retransmission is the responsibility of the upper layer protocol.
section: "6"
