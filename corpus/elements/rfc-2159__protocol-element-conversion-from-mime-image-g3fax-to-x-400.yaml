document: rfc-2159
kind: protocol-element
summary: 'Conversion from MIME image/g3fax to X.400: (1) body is split into bitstrings at each occurrence of six consecutive EOL markers, with trailing EOLs NOT removed (per X.400 Implementor Guide recommendation that each page end with six EOLs); (2) each bitstring becomes an ASN.1 BITSTRING with reversed bit order within bytes; (3) the SEQUENCE of BITSTRINGs forms the ASN.1 body.'
section: "3"
