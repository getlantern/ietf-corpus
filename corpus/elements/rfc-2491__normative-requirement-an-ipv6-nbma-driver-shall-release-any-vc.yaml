document: rfc-2491
kind: normative-requirement
summary: An IPv6/NBMA driver SHALL release any VC that has been idle for 20 minutes. This limit MAY be reduced by configuration or companion document. VCs associated with purged or STALE Neighbor/Destination cache entries SHOULD be released.
section: "4.6"
rfc2119_level: SHALL
topics:
