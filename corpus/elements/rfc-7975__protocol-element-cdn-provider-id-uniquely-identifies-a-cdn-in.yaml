document: rfc-7975
kind: protocol-element
summary: CDN Provider ID uniquely identifies a CDN in the cdn-path; its format is 'AS' followed by the CDN's AS number, a colon, and a numeric qualifier ensuring uniqueness when one AS runs multiple CDNs (e.g., 'AS64496:0').
