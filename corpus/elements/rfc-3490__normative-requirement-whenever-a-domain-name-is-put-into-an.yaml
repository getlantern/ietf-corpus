document: rfc-3490
kind: normative-requirement
summary: Whenever a domain name is put into an IDN-unaware domain name slot, it MUST contain only ASCII characters. An internationalized domain name can be converted by applying ToASCII to each label and changing all label separators to U+002E.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
