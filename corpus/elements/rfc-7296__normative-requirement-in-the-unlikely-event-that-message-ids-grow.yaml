document: rfc-7296
kind: normative-requirement
summary: In the unlikely event that Message IDs grow too large to fit in 32 bits, the IKE SA MUST be closed or rekeyed. Message IDs are reset to zero in the new IKE SA after rekeying.
section: "2.2"
rfc2119_level: MUST
topics:
