document: rfc-8296
kind: protocol-element
summary: BIER-MPLS labels are locally significant downstream-assigned MPLS labels, each binding to a specific <SD, SI, BSL> triple. A BFR advertises one label per SI per BSL per SD, potentially as a contiguous label range, via IGP or BGP extensions.
section: 2.1.1.1
