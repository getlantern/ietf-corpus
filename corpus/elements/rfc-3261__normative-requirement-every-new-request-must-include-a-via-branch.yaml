document: rfc-3261
kind: normative-requirement
summary: Every new request MUST include a Via branch parameter that is unique across space and time. To distinguish RFC 3261 transactions from RFC 2543 ones, the branch value MUST begin with the magic cookie 'z9hG4bK'. This enables reliable transaction matching by all elements.
section: 8.1.1.7
rfc2119_level: MUST
topics:
    - sip
