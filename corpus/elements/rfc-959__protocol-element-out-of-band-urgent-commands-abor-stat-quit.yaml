document: rfc-959
kind: protocol-element
summary: Out-of-band urgent commands (ABOR, STAT, QUIT) during data transfer are delivered by the user system inserting the Telnet IP signal, then the Telnet Synch signal, then the FTP command into the control stream. After receiving IP, the server-PI scans the Telnet stream for exactly one FTP command.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
