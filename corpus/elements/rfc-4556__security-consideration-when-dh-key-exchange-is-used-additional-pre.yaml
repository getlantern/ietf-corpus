document: rfc-4556
kind: security-consideration
summary: When DH key exchange is used, additional pre-authentication data beyond PA_PK_AS_REQ is not bound to the AS-REQ; attackers can drop or add such data without detection by either client or KDC. Designers of additional pre-authentication mechanisms must account for this.
section: "4"
topics:
    - security
