document: rfc-9441
kind: interoperability-note
summary: The SCHC Compound ACK is backwards compatible with the SCHC ACK format in RFC 8724; the standard ACK is a special case reporting only one window. If a sender does not support SCHC Compound ACK (evidenced by only retransmitting tiles from the first reported window despite multi-window reports), the receiver can fall back to sending SCHC Compound ACKs with only one window.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
