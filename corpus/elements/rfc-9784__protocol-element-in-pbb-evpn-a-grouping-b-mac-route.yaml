document: rfc-9784
kind: protocol-element
summary: In PBB-EVPN, a Grouping B-MAC route represents all vESes associated with a physical port, with the port color encoded directly into the route. A PE MAY also color individual vES B-MAC routes with the associated port's EVPN Router's MAC Extended Community to enable port-level grouping.
section: 4.2.2
topics:
