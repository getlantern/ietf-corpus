document: rfc-3370
kind: normative-requirement
summary: When a key agreement algorithm is used, a key-encryption algorithm MUST be provided for each content-encryption algorithm. For RC2 key agreement, 128 bits MUST be generated as input to the key expansion process.
section: "4.1"
rfc2119_level: MUST
topics:
