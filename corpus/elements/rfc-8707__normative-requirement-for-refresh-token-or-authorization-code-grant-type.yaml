document: rfc-8707
kind: normative-requirement
summary: For refresh_token or authorization_code grant type requests, the authorization server policy may limit acceptable resources to those originally granted or a subset thereof. When a subset is requested, the issued access token is scoped to that subset while any refresh token returned is bound to the full original grant.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
