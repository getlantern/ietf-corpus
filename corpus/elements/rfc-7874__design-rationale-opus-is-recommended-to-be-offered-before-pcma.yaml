document: rfc-7874
kind: design-rationale
summary: Opus is RECOMMENDED to be offered before PCMA/PCMU for endpoints supporting sampling rates above 8 kHz because Opus provides higher quality, includes its own comfort noise mechanism, and natively supports wideband and fullband audio — making G.711 fallback unnecessary when both sides support Opus.
