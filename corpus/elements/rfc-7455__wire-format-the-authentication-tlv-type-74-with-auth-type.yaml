document: rfc-7455
kind: wire-format
summary: 'The Authentication TLV (Type 74) with Auth Type 3 contains: Auth Type (1 octet = 3), Key ID (2 octets), and Authentication Data (variable). Coverage extends from the start of the TRILL Header to the end of the OAM Message Channel; TRILL Header Alert bit, Reserved bit, and Hop Count are treated as zero during computation.'
