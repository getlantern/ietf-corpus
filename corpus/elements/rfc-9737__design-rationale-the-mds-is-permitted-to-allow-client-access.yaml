document: rfc-9737
kind: design-rationale
summary: The MDS is permitted to allow client access during resilvering via a proxy server inserted into the layout, which copies a good mirror instance to a new instance while handling in-flight I/O. This avoids locking out clients for the entire resilvering duration while still maintaining mirror consistency.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
