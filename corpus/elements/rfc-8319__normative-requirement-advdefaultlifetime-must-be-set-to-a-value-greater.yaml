document: rfc-8319
kind: normative-requirement
summary: AdvDefaultLifetime MUST be set to a value greater than or equal to the selected MaxRtrAdvInterval. If it is smaller, the router lifetime is guaranteed to expire before the next Router Advertisement can be sent, causing an outage.
section: "3"
rfc2119_level: MUST
topics:
    - ip
