document: rfc-6806
kind: normative-requirement
summary: A client MUST reject a response for which it sent PA-REQ-ENC-PA-REP if the ENC-PA-REP ticket flag is set and the PA-REQ-ENC-PA-REP padata item is absent or the checksum is not successfully verified.
section: "11"
rfc2119_level: MUST
