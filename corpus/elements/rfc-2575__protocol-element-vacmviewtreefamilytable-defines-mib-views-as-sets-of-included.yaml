document: rfc-2575
kind: protocol-element
summary: vacmViewTreeFamilyTable defines MIB views as sets of included and excluded view subtree families. Each entry is indexed by (vacmViewTreeFamilyViewName, vacmViewTreeFamilySubtree) and carries a vacmViewTreeFamilyMask and vacmViewTreeFamilyType (included/excluded). When multiple entries match an OID, the entry with the most sub-identifiers in its subtree takes precedence; ties are broken lexicographically by vacmViewTreeFamilyType.
