document: rfc-7851
kind: protocol-element
summary: The PathTrack method is a new RELOAD request (message code 0x27 for request, 0x28 for response) that allows a node to iteratively collect diagnostic information from each hop along the routing path to a destination. Each step returns the next-hop peer and optional diagnostic data.
section: 4.3.1
topics:
