document: rfc-9552
kind: interoperability-note
summary: The BGP-LS Identifier sub-TLV (code 513, 4-octet opaque value) introduced by RFC 7752 is deprecated by this document. Implementations SHOULD still support advertising it for backward compatibility with RFC 7752 implementations; the RECOMMENDED default value is 0.
section: 5.2.1.4
topics:
