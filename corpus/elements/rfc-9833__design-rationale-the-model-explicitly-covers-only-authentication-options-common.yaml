document: rfc-9833
kind: design-rationale
summary: The model explicitly covers only authentication options common to OSPFv2 (RFC 4577) and OSPFv3 (RFC 6565) and deliberately omits RFC 4552 (IPsec for OSPFv3). This avoids version-specific divergence in what is intended as a shared base module.
section: "4.3"
