document: rfc-9050
kind: security-consideration
summary: A malicious PCC creates an attack surface by requiring the PCE to maintain a CCI/label replica for each PCC. It is RECOMMENDED that PCE implementations impose a per-PCC limit on CCI resources; RFC 8231 provides a notification mechanism when such a threshold is reached.
section: "8.2"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
