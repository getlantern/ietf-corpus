document: rfc-5350
kind: registry
summary: 'This document creates a new IANA registry for IPv4 Router Alert Option Values. The two-octet Value field is managed by IANA with initial allocations: 0 (Router shall examine packet), 1-32 (Aggregated Reservation Nesting Levels), 33-65502 (available for IANA assignment), 65503-65534 (experimental use), 65535 (reserved).'
section: "3.1"
