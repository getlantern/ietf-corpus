document: rfc-4124
kind: normative-requirement
summary: DS-TE LSRs MUST allow configuration of a TE-Class mapping whereby the Class-Type and preemption level are configured for each of up to 8 TE-Classes, and two TE-Classes MUST NOT be identical (i.e., have both the same Class-Type and same preemption priority).
section: 4.2.1
rfc2119_level: MUST
topics:
