document: rfc-8383
kind: protocol-element
summary: 'The address flush operation in the extensible case applies to the cross product of three derived sets: nicknames, Data Labels, and MAC addresses. A {Data Label, MAC address, nickname} triple is flushed if and only if each component matches an element in its respective derived set, where {ALL} is a special value matching all elements.'
section: "2.2"
topics:
    - routing
