document: rfc-8412
kind: normative-requirement
summary: EID Epoch values MUST be generated to minimize the chance of reuse even when the SWIMA-PC reverts to an earlier state; sequential EID Epochs are discouraged. Within an Epoch, EIDs MUST be assigned sequentially, and two change events MUST NOT be assigned the same EID within the same Epoch.
section: 3.7.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
