document: rfc-8317
kind: normative-requirement
summary: A PE MUST indicate to other PEs what kind of sites (Root or Leaf) its MAC addresses are associated with by advertising a Leaf-Indication flag via the E-Tree extended community along with each MAC/IP Advertisement route learned from a Leaf site. Absence of this flag indicates a Root site.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
