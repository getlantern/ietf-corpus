document: rfc-3551
kind: normative-requirement
summary: RTP data SHOULD be carried on an even UDP port number, and the corresponding RTCP packets SHOULD be carried on the next higher (odd) port number. Port numbers 5004 and 5005 are registered as the default pair for this profile.
section: "8"
rfc2119_level: SHOULD
