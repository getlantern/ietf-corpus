document: rfc-5651
kind: protocol-element
summary: The Transport Session Identifier (TSI) field is 0, 16, 32, or 48 bits long (32*S + 16*H bits). It uniquely identifies a session among all sessions from a particular sender; if the TSI value appears multiple times in a packet, all occurrences MUST be identical.
section: "5.1"
topics:
    - multicast
