document: rfc-9776
kind: security-consideration
summary: IGMP provides no authentication or authorization, making it susceptible to local network attacks. A malicious host can send forged Membership Queries to manipulate the querier election, force other hosts to suppress responses, or increase leave latency by sending forged Queries with large Max Response Times.
section: "9.1"
topics:
    - security
    - multicast
