document: rfc-9231
kind: normative-requirement
summary: 'New entries to the IANA XML Security URIs registry require Specification Required (RFC 8126). The designated expert must assess: (1) sufficient documentation for interoperability and XML syntax, and (2) sufficient importance as shown by inclusion in an approved W3C Note/Proposed Recommendation/Recommendation or approved RFC.'
section: "5.2"
rfc2119_level: REQUIRED
