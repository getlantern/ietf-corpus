document: rfc-6275
kind: normative-requirement
summary: Bindings established with correspondent nodes using keys derived from the return routability procedure MUST NOT exceed MAX_RR_BINDING_LIFETIME seconds. Additionally, when using an Alternate Care-of Address option, the Care-of Test MUST have been performed for that alternate address, and the nonce indices and MAC MUST be based on that test.
section: 5.2.6
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
