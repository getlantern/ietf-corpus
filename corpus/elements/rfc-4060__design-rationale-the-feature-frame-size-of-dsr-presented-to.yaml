document: rfc-4060
kind: design-rationale
summary: The feature frame size of DSR presented to RTP packetization is not dependent on the number of speech samples in each 10 ms frame; rather, it is fixed by the codec's output vector format. This decouples RTP packetization from the underlying sampling rate.
