document: rfc-2207
kind: security-consideration
summary: The vDstPort mechanism exposes additional flow metadata in RSVP control messages that could aid traffic analysis attacks by an adversary monitoring both data packets and RSVP signaling. Protection against such attacks is outside the scope of this mechanism; link-layer confidentiality such as encryption is one possible mitigation.
section: "6"
topics:
    - security
    - ipsec
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
