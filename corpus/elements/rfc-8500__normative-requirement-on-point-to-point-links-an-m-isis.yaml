document: rfc-8500
kind: normative-requirement
summary: On point-to-point links, an M-ISIS router MUST send only a single Reverse Metric TLV in IIH PDUs. When received, it MUST add the Metric value to the Default Metric for all topologies in all Extended IS Reachability TLVs.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
