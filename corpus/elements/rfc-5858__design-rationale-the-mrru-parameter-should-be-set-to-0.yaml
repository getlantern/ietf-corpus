document: rfc-5858
kind: design-rationale
summary: The MRRU parameter SHOULD be set to 0 (disabling ROHC segmentation) because in-order delivery of ROHC packets cannot be guaranteed over IPsec, and allowing segment headers on the channel would risk unrecoverable reassembly failures.
section: "3.1"
topics:
    - ipsec
    - vpn
