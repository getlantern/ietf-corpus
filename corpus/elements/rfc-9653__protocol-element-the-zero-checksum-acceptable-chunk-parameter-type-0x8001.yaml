document: rfc-9653
kind: protocol-element
summary: The Zero Checksum Acceptable Chunk Parameter (Type=0x8001, Length=8) carries a 32-bit Error Detection Method Identifier (EDMID) indicating the alternate error detection method the sender is willing to use for received packets. It MAY appear in INIT and INIT ACK chunks only, and MUST NOT appear more than once in any chunk.
section: "4"
