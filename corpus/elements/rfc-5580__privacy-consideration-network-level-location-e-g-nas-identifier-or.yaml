document: rfc-5580
kind: privacy-consideration
summary: Network-level location (e.g., NAS identifier or access network) already reveals approximate user location; this document describes mechanisms to convey more precise location. The RADIUS client MUST NOT disclose location information absent an out-of-band agreement or an explicit server request.
section: "7.2"
topics:
    - radius
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
