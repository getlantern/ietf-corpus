document: rfc-9348
kind: design-rationale
summary: The current YANG module is scoped to the simple fixed-size, fixed-rate operating mode of IP-TFS (as defined in RFC 9347), but the structure is explicitly designed for future augmentation to support other IP-TFS operational schemes. The choice node for tunnel-rate and the extensible packet-size container both accommodate this.
section: "2"
topics:
