document: rfc-9575
kind: normative-requirement
summary: DRIP transmitters are REQUIRED to fit Authentication Data / Signature data within the first 9 pages (Page Numbers 0 through 8), and the Length field MUST NOT exceed 201 octets. This constraint ensures consistent formatting across both Legacy and Extended Transports.
section: 3.2.4.2
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
