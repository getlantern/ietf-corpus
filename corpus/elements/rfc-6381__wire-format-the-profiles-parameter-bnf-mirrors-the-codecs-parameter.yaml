summary: 'The ''profiles'' parameter BNF mirrors the ''codecs'' parameter: pro-simple := ''profiles'' ''='' unencodedv; pro-fancy := ''profiles*'' ''='' encodedv, reusing the same unencodedv and encodedv productions defined for ''codecs''. The namespace is determined by the MIME type.'
