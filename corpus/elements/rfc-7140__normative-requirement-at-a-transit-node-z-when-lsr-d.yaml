document: rfc-7140
kind: normative-requirement
summary: At a transit node Z, when LSR D (sender of HSMP-D Label Mapping) equals LSR U (upstream LSR for <X,Y>), updating the label forwarding table with that mapping MUST NOT be done. Similarly, if D equals the installed upstream LSR, the Label Mapping MUST be retained and MUST NOT update the forwarding table.
section: 3.4.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
