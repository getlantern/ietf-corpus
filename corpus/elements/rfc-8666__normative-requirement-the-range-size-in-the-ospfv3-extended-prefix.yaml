summary: The Range Size in the OSPFv3 Extended Prefix Range TLV MUST NOT exceed the number of prefixes satisfiable by the given Prefix Length, excluding IPv4 multicast (224.0.0.0/3) for AF=IPv4 and non-IPv6-unicast addresses for AF=IPv6.
