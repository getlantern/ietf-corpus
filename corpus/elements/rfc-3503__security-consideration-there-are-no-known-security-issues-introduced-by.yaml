document: rfc-3503
kind: security-consideration
summary: 'There are no known security issues introduced by this extension beyond those already present in RFC 2298 (MDN) and RFC 3501 (IMAP4). Section 4.3 modifies ACL checking requirements: servers implementing the IMAP ACL extension must preserve $MDNSent on COPY regardless of client ''w'' rights, while still enforcing standard ACL rights for COPY itself.'
section: "6"
topics:
