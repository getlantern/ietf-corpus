document: rfc-9677
kind: normative-requirement
summary: The uCDN MAY decide to provide less than the maximum supported delegated credentials to the dCDN. The dCDN MAY use one single delegated credential deployed on multiple endpoints, or deploy a different delegated credential for each endpoint.
section: "3.2"
rfc2119_level: MAY
