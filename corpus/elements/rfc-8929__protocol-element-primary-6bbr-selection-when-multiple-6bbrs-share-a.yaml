document: rfc-8929
kind: protocol-element
summary: 'Primary 6BBR selection: when multiple 6BBRs share a registration for the same address (same ROVR, same TID), the primary is the one with the highest EUI-64 address treated as an unsigned 64-bit integer. Only the primary 6BBR sends unsolicited NAs over the backbone; a given 6BBR may be primary for one address and secondary for another.'
section: "3.5"
topics:
    - ip
