document: rfc-8139
kind: normative-requirement
summary: When a TRILL switch detects a change in the common spanning tree root bridge on a port, it MUST set its root bridge change inhibition timer to a value defaulting to 30 seconds, configurable down to 0 seconds. This inhibition is safe to reduce to the bridged LAN settling time (e.g., 7 seconds for RSTP).
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
