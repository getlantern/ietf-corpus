document: rfc-3843
kind: protocol-element
summary: 'The IP-ID compression logic for compressed headers (non-IR/IR-DYN): if RND=0 and SID=0, IP-ID is compressed using Offset IP-ID encoding with p=0 and default-slope=0; if RND=0 and SID=1, IP-ID is constant and omitted, reconstructed from context; if RND=1, IP-ID is sent uncompressed as additional octets after the compressed header.'
section: "3.3"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
