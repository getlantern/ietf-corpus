document: rfc-4502
kind: normative-requirement
summary: When protocolDirHostConfig changes from supportedOn(3) to supportedOff(2), the probe shall delete all related entries in the nlHostTable and alHostTable. Similarly, changes in protocolDirMatrixConfig shall trigger deletion of related matrix table entries.
