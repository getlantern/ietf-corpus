document: rfc-5949
kind: wire-format
summary: The LMAA Option (type 41) has length 18 (IPv6) or 6 (IPv4), an 8-bit Option-Code (1 = IPv6 LMAA, 2 = IPv4-LMAA), an 8-bit Reserved field, and the LMA address. It conveys the address of the LMA currently serving the mobile node from PMAG to NMAG.
section: 6.2.2
topics:
