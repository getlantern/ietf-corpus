document: rfc-9767
kind: normative-requirement
summary: The AS MUST separate AS-specific access tokens (continuation, token management, resource server management) from other access tokens used at RSs, using flags, special internal access rights, or other means. The AS MUST NOT return an active value of true for AS-specific access tokens to the RS.
section: 2.1.14
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
