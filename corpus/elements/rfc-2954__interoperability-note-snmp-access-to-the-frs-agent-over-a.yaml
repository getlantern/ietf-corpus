document: rfc-2954
kind: interoperability-note
summary: SNMP access to the FRS agent over a frame relay PVC is achieved using SNMP over UDP over IP encapsulated in Frame Relay per STD 55 (RFC 2427) and ITU X.36 Annex D. Alternate access mechanisms are possible.
