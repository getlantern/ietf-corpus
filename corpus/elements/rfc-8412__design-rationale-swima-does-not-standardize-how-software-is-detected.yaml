document: rfc-8412
kind: design-rationale
summary: SWIMA does not standardize how software is detected or which sources populate the Software Inventory Evidence Collection, instead defining only the transport interface. This allows SWIMA to accommodate heterogeneous sources (SWID tags, package managers, discovery tools) without mandating a specific discovery mechanism, at the cost of potentially reporting the same software multiple times from different sources.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
