document: rfc-2578
kind: normative-requirement
summary: All descriptors within an information module shall be unique, mnemonic, and shall not exceed 64 characters. The set of descriptors across all standard information modules shall also be unique. Descriptors must begin with a lower-case letter.
section: "3.1"
rfc2119_level: REQUIRED
