document: rfc-6522
kind: normative-requirement
summary: Where a description of the error is desired in several languages or media, a multipart/alternative construct MAY be used in the first body part. This body part MAY also be used to send detailed information that cannot be easily formatted into the second body part.
section: "3"
rfc2119_level: MAY
