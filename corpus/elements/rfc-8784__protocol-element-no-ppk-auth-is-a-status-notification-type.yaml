document: rfc-8784
kind: protocol-element
summary: NO_PPK_AUTH is a status notification (type 16437) included by the initiator when PPK use is optional; its Notification Data field contains authentication data computed using SK_pi' (the pre-PPK value), enabling fallback authentication if the responder lacks the PPK_ID.
