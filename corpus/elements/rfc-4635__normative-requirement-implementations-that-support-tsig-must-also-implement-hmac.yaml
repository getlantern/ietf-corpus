document: rfc-4635
kind: normative-requirement
summary: Implementations that support TSIG MUST also implement HMAC SHA1 and HMAC SHA256. The HMAC-MD5.SIG-ALG.REG.INT algorithm remains mandatory, while gss-tsig, hmac-sha224, hmac-sha384, and hmac-sha512 are optional.
section: "2"
rfc2119_level: MUST
topics:
    - dns
    - crypto
    - security
