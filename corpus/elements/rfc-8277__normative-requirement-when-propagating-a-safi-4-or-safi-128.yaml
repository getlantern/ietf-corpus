document: rfc-8277
kind: normative-requirement
summary: When propagating a SAFI-4 or SAFI-128 route with a changed Next Hop field, the Label field(s) MUST contain the label(s) bound to the prefix at the new next hop. The number and values of labels may change in any combination allowed by local policy.
section: 3.2.2
rfc2119_level: MUST
topics:
