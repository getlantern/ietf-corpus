document: rfc-3971
kind: security-consideration
summary: SEND counters replay attacks using Timestamp options (checked against a per-peer Delta/drift window) for unsolicited messages, and Nonce options (must echo the solicitation's nonce) for solicitation-advertisement pairs. Both mechanisms are mandatory for a message to be considered secured.
section: 9.2.5
topics:
    - security
    - ip
