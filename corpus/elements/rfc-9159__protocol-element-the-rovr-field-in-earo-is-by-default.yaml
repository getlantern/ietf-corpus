document: rfc-9159
kind: protocol-element
summary: The ROVR field in EARO is by default filled with the 48-bit Bluetooth device address converted to 64-bit Modified EUI-64 format. Optionally, a cryptographic ID per RFC 8928 MAY be placed in the ROVR field instead.
