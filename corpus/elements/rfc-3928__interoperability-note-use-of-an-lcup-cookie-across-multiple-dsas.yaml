document: rfc-3928
kind: interoperability-note
summary: Use of an LCUP cookie across multiple DSAs in a replicated environment is not defined by LCUP. Clients MAY submit a cookie from one DSA to another; the receiving server determines whether it recognizes the cookie and returns an appropriate result code if not.
section: "4.8"
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
