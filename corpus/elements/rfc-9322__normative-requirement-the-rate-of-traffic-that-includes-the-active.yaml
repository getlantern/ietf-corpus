document: rfc-9322
kind: normative-requirement
summary: The rate of traffic that includes the Active flag SHOULD NOT exceed 1/N of the interface capacity on any IOAM node's interfaces, with N>100 RECOMMENDED, to avoid overloading the network or the IOAM node processing active measurement packets.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - measurement
