document: rfc-6737
kind: normative-requirement
summary: If an upstream agent receives a CUR/CUA message for which no peers are available to handle the corresponding application (e.g., peers are too busy or down), the 'E' bit MUST be set in the answer with Result-Code set to DIAMETER_UNABLE_TO_DELIVER.
section: "4"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
