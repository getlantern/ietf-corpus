document: rfc-8693
kind: protocol-element
summary: The 'act' (actor) claim is a JSON object within a JWT that expresses delegation, identifying the acting party to whom authority has been delegated. Delegation chains are expressed by nesting 'act' claims; the outermost represents the current actor, with deeper nesting representing prior actors.
section: "4.1"
topics:
