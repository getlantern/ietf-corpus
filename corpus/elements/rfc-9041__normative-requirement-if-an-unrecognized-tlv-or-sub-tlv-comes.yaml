document: rfc-9041
kind: normative-requirement
summary: If an unrecognized TLV or sub-TLV comes from the upper Experimental Use range (64508-64511) or the upper FCFS range (64512-65535), the receiver may silently drop it, step over it, or send an error message; no mandatory response is required.
