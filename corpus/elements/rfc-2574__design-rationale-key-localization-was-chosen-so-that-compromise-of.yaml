document: rfc-2574
kind: design-rationale
summary: Key localization was chosen so that compromise of one engine's secrets does not expose credentials at other engines. A single global key would mean compromising any one managed device yields authentication capability for all devices that share the user's password.
section: "2.6"
topics:
