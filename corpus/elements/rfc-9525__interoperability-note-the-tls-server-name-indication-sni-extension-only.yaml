document: rfc-9525
kind: interoperability-note
summary: The TLS Server Name Indication (SNI) extension only conveys domain names. Therefore, a client with an IP-ID reference identity cannot present any information about its reference identity when connecting to a server; servers wishing to present an IP-ID must do so when a connection is made without SNI.
section: "7.4"
topics:
    - tls
    - ip
