document: rfc-7035
kind: protocol-element
summary: The relative coordinate system uses a Cartesian CRS with the reference location as origin. The x-axis points East, the y-axis points North, and the optional z-axis points Up, all in meters. Dynamic location elements (orientation, speed, heading) in the reference can rotate and translate the coordinate system.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
