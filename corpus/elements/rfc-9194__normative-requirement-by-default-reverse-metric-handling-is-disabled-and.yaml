document: rfc-9194
kind: normative-requirement
summary: By default, reverse metric handling is disabled and must be explicitly enabled via the enable-receive configuration leaf; without this, a router ignores reverse metric announcements from neighbors.
section: "2.2"
rfc2119_level: MUST
