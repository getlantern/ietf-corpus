document: rfc-8124
kind: normative-requirement
summary: In offerless INVITE scenarios, the server MUST send an offer with 'setup:passive' and MUST include an 'a=websocket-uri' attribute whose value MUST be either a ws-URI or wss-URI, depending on whether plain or secure WebSocket is used.
section: "4.6"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
