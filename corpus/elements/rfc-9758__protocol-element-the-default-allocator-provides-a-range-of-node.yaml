document: rfc-9758
kind: protocol-element
summary: The Default Allocator provides a range of Node Numbers reserved for Private Use (1–0x3FFF per the registry). ipn URIs using these numbers are not guaranteed unique beyond a single administrative domain, functionally analogous to RFC 1918 private IPv4 addresses.
section: 3.4.3
topics:
    - privacy
