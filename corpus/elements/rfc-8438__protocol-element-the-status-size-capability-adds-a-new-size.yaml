document: rfc-8438
kind: protocol-element
summary: The STATUS=SIZE capability adds a new 'SIZE' status data item to the IMAP STATUS command and response. SIZE indicates the total storage size of all messages in the target mailbox in octets, enabling retrieval with a single STATUS command.
