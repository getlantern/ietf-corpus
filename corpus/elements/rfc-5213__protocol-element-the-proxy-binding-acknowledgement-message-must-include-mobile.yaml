document: rfc-5213
kind: protocol-element
summary: The Proxy Binding Acknowledgement message MUST include Mobile Node Identifier, at least one Home Network Prefix, Handoff Indicator, and Access Technology Type options. Timestamp, Link-layer Identifier, and Link-local Address options MUST be present if and only if they were present in the corresponding PBU.
section: 5.3.6
topics:
    - mobility
