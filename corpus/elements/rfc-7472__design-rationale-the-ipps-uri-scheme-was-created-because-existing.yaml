document: rfc-7472
kind: design-rationale
summary: 'The ''ipps'' URI scheme was created because existing implementations of HTTP upgrade (RFC 2817) were flawed: some only shifted to secure IPP for selected operations on the same TCP connection (inherently dangerous), and printer-mandated upgrades could expose client data if the Expect header was not used.'
section: "1.2"
topics:
    - tls
    - http
    - security
