document: rfc-1122
kind: normative-requirement
summary: The packet receive interface between IP and the link layer MUST include a flag indicating whether the incoming packet was addressed to a link-layer broadcast address. The packet send interface MUST include the 5-bit TOS field. The link layer MUST NOT report Destination Unreachable solely because there is no ARP cache entry.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
