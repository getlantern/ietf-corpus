document: rfc-6447
kind: interoperability-note
summary: This specification extends RFC 4661 (XML-based event notification filtering) and uses the SIP presence event package (RFC 3856) as its transport. Location information is conveyed in PIDF-LO format (RFC 4119), and the <enterOrExit> region shapes rely on RFC 5491 geometry definitions (circle and polygon).
section: "1"
topics:
    - sip
    - realtime
