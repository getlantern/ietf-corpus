document: rfc-9244
kind: wire-format
summary: All DOTS telemetry payloads are CBOR-encoded (RFC 8949) with Content-Format 'application/dots+cbor'. Section 12 provides the full YANG/JSON-to-CBOR key mapping table; numeric CBOR keys replace YANG leaf names. DOTS agents MUST use these CBOR keys, not the YANG string names, on the wire.
section: "12"
topics:
    - cbor
    - yang
    - security
