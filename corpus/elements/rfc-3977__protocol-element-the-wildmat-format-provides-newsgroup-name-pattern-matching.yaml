document: rfc-3977
kind: protocol-element
summary: The WILDMAT format provides newsgroup name pattern matching. A wildmat is a comma-separated list of patterns where '!' negates a pattern; the rightmost matching pattern determines the result. '*' matches zero or more characters; '?' matches exactly one character. Backslash and bracket syntax are excluded.
section: "4"
