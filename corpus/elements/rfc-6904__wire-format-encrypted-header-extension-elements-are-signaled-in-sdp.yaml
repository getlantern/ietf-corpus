document: rfc-6904
kind: wire-format
summary: 'Encrypted header extension elements are signaled in SDP using the extmap attribute with URI ''urn:ietf:params:rtp-hdrext:encrypt'' followed by the URI of the element being encrypted and any extension attributes. The ABNF grammar extends that of RFC 5285: extmap =/ mapentry SP enc-extensionname SP extensionname [SP extensionattributes].'
section: "4"
topics:
