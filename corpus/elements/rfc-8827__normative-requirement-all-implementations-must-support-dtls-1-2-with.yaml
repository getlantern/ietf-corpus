document: rfc-8827
kind: normative-requirement
summary: All implementations MUST support DTLS 1.2 with the TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256 cipher suite and the P-256 curve. The DTLS-SRTP protection profile SRTP_AES128_CM_HMAC_SHA1_80 MUST be supported. Implementations MUST favor cipher suites supporting Forward Secrecy and SHOULD favor AEAD over non-AEAD cipher suites.
section: "6.5"
rfc2119_level: MUST
topics:
    - webrtc
    - security
    - crypto
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
