document: rfc-2082
kind: protocol-element
summary: The Authentication Data Length is an unsigned 8-bit field specifying the length in octets of the trailing Authentication Data field. This field enables algorithm substitution (e.g., Keyed SHA instead of Keyed MD5) by signaling the digest output size.
section: "3.1"
topics:
