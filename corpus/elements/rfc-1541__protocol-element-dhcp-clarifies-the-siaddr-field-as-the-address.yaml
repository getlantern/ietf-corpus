document: rfc-1541
kind: protocol-element
summary: DHCP clarifies the 'siaddr' field as the address of the next bootstrap server, distinct from the 'server identifier' option which always contains the responding DHCP server's own address. A server may return its own address in 'siaddr' if it supplies the next bootstrap service.
section: "2"
topics:
