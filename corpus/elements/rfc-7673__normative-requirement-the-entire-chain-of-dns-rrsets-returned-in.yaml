document: rfc-7673
kind: normative-requirement
summary: The entire chain of DNS RRsets returned in response to an SRV query MUST be 'secure' according to DNSSEC validation (RFC 4033/4035), including any CNAME/DNAME aliases in the chain, for this specification to apply.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - security
    - tls
