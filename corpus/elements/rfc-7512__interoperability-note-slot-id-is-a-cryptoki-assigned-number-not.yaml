document: rfc-7512
kind: interoperability-note
summary: 'Slot ID is a Cryptoki-assigned number not guaranteed to be stable across PKCS #11 module initializations. It MAY be used to increase identification precision for libraries and modules that provide stable slot identifiers; in other scenarios, using slot IDs is likely to cause usability issues.'
section: "2.3"
topics:
