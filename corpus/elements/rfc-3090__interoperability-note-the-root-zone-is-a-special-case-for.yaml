document: rfc-3090
kind: interoperability-note
summary: 'The root zone is a special case for global security: it is considered globally secured if it conforms to locally secured rules AND meets the mandatory-to-implement algorithm requirement (rule 2.1.a), since it has no parent zone to provide a conforming signature.'
section: "2.1"
topics:
