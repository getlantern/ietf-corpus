document: rfc-3207
kind: state-machine
summary: Upon TLS handshake completion, the SMTP protocol is reset to the initial state (equivalent to after the server issues a 220 service ready greeting). The server MUST discard pre-TLS client knowledge (e.g., EHLO argument) and the client MUST discard pre-TLS server knowledge (e.g., service extension list).
section: "4.2"
topics:
    - email
    - tls
