document: rfc-3911
kind: design-rationale
summary: 'An explicit Join header is needed rather than addressing an INVITE to a conference URI because: the conference may not yet exist, the joining party may not know if the target dialog is part of a conference, and the joining party may not know the conference URI. This allows joining ordinary two-party calls.'
section: "1"
topics:
