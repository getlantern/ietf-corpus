document: rfc-2734
kind: normative-requirement
summary: All link fragments of all partially reassembled IP datagrams SHALL be discarded by recipients upon a Serial Bus reset; senders SHALL also discard not-yet-transmitted link fragments of partially transmitted datagrams.
