document: rfc-2733
kind: design-rationale
summary: The format does not mandate a particular parity code, allowing senders to use any linearly independent combinations of media packets (simple parity, interleaved parity, schemes without original media transmission, multi-packet burst recovery), trading overhead, delay, and recoverability.
