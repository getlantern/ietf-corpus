document: rfc-5120
kind: interoperability-note
summary: 'If MT #0 is the only MT on an interface, it is optional to advertise it in the MT TLV in IIH packets. Not including the TLV implies MT ID #0 capability only, ensuring backward compatibility with non-MT IS-IS routers.'
section: "2"
topics:
