document: rfc-5192
kind: protocol-element
summary: The PAA DHCPv6 option (OPTION_PANA_AGENT, code 40) carries a list of 128-bit binary IPv6 addresses indicating PANA Authentication Agents available to the PANA client. The option-length field MUST be a multiple of sixteen octets. PAAs are listed in order of preference.
section: "5"
