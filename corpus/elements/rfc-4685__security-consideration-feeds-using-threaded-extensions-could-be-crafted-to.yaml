document: rfc-4685
kind: security-consideration
summary: Feeds using threaded extensions could be crafted to cause consumers to initiate excessive or unending sequences of network requests, resulting in denial of service to the consumer, target server, or intervening networks. Consumers should require user intervention after a threshold or apply hard/heuristic request limits.
section: "7"
topics:
