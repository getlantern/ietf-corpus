document: rfc-1903
kind: design-rationale
summary: 'RowStatus provides two creation modes: createAndGo (atomic single-PDU creation and activation) and createAndWait (negotiated multi-PDU creation). The createAndWait mechanism exists to accommodate management stations that need multiple interactions to supply all required column values before making the row active.'
