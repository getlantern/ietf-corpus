document: rfc-7184
kind: wire-format
summary: The Olsrv2MetricValueCompressedFormTC textual convention encodes OLSRv2 link metrics as a 12-bit compressed value with an 8-bit mantissa (a) and 4-bit exponent (b), representing the value (257+a)*2^b - 256. Valid metric values range from 1 to 16776960 (MAXIMUM_METRIC); the special value 0 is reserved for UNKNOWN_METRIC.
