document: rfc-3629
kind: normative-requirement
summary: It is RECOMMENDED to avoid stripping an initial U+FEFF interpreted as a BOM signature without a good reason, to ignore it instead of stripping it when appropriate (e.g., for display), and to strip it only when truly necessary, because stripping may affect external processes such as digital signatures or character counts.
section: "6"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
