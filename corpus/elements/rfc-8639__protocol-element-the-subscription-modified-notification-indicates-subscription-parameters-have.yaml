document: rfc-8639
kind: protocol-element
summary: The 'subscription-modified' notification indicates subscription parameters have changed. It is sent immediately after the last event records under the old parameters. It MUST also be sent when the contents of a filter referenced by 'stream-filter-ref' change, for any active receivers of a configured or dynamic subscription.
section: 2.7.2
topics:
    - yang
    - netconf
