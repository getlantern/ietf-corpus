document: rfc-3545
kind: security-consideration
summary: No authentication is performed on CONTEXT_STATE control packets. An attacker with link access could inject false CONTEXT_STATE packets, reducing compression efficiency and potentially causing congestion, though an attacker with such access could disrupt traffic in many other ways.
section: "4"
topics:
