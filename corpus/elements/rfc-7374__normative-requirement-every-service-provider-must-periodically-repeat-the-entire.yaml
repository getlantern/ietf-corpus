document: rfc-7374
kind: normative-requirement
summary: Every service provider MUST periodically repeat the entire registration process to refresh its RedirServiceProvider Resource Record. Records that expire MUST be dropped from the dictionary. A default lifetime of 10 minutes is RECOMMENDED.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
