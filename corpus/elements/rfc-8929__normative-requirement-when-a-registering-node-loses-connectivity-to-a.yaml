document: rfc-8929
kind: normative-requirement
summary: When a Registering Node loses connectivity to a 6BBR and retries registration to available 6BBR(s), it MUST increment the TID to force migration of state to the new 6BBR and trigger reselection of the primary 6BBR if the lost node was the primary.
section: "3.5"
rfc2119_level: MUST
topics:
    - ip
