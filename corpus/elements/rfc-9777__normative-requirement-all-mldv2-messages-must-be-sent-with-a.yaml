document: rfc-9777
kind: normative-requirement
summary: All MLDv2 messages MUST be sent with a link-local IPv6 Source Address, an IPv6 Hop Limit of 1, and an IPv6 Router Alert option in a Hop-by-Hop Options header. MLDv2 messages are ICMPv6 (Next Header = 58).
section: "5"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
