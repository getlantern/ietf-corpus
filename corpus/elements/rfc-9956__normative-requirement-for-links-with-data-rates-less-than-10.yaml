document: rfc-9956
kind: normative-requirement
summary: For links with data rates less than 10% of typical path rates, it is RECOMMENDED that the NQB PHB be disabled and that traffic marked with the NQB DSCP be carried using the Default PHB (without being re-marked to DSCP 0), since NQB sender rate assumptions may not hold.
section: "6.6"
rfc2119_level: RECOMMENDED
topics:
    - diffserv
    - qos
