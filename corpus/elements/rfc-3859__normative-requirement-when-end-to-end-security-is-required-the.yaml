document: rfc-3859
kind: normative-requirement
summary: When end-to-end security is required, the notify operation MUST use PIDF, and MUST secure the PIDF MIME body with S/MIME using encryption (CMS EnvelopeData) and/or S/MIME signatures (CMS SignedData).
