document: rfc-3948
kind: design-rationale
summary: The same UDP port numbers (4500) are shared for both IKE and UDP-encapsulated ESP traffic to improve scaling (one NAT mapping), simplify configuration (one firewall port), and ease implementation, rather than using separate ports for each protocol.
