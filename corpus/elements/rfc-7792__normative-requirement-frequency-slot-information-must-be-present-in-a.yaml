document: rfc-7792
kind: normative-requirement
summary: Frequency slot information MUST be present in a Resv message to indicate, hop by hop, the central frequency of the allocated resource. Combined with the slot width, the central frequency identifies the resources reserved for the LSP.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
