document: rfc-7191
kind: normative-requirement
summary: Key package receipts MUST be encapsulated in a CMS SignedData content type. They MAY be encrypted using EncryptedData, EnvelopedData, or AuthEnvelopedData. When both signed and encrypted, the receipt MUST be signed prior to being encrypted.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
    - security
