document: rfc-5252
kind: normative-requirement
summary: The L1VPN LSA MUST include a single L1VPN Info TLV and MAY include a single TE Link TLV as per RFC 3630 and RFC 4203. If more than one L1VPN Info TLVs and/or TE Link TLVs are found in the LSA, the subsequent TLVs SHOULD be ignored by the receiving PEs.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
