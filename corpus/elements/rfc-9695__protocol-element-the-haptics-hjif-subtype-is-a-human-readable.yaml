document: rfc-9695
kind: protocol-element
summary: 'The ''haptics/hjif'' subtype is a human-readable haptic effect coding based on JSON format (ISO/IEC 23090-31). Effects may target specific body parts and reference a device description for hardware adaptation. Encoding: 8bit (UTF-8) or binary (UTF-16/UTF-32). File extension: .hjif.'
section: 4.3.2
