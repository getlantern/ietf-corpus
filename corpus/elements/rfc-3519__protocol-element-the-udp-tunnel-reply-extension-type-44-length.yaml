document: rfc-3519
kind: protocol-element
summary: The UDP Tunnel Reply Extension (Type 44, Length 6) is a non-skippable extension returned in Registration Replies to indicate whether the HA accepts MIP UDP tunnelling. It contains a Reply Code (0–63 = assent, 64–255 = decline), an F (Forced) flag, and a Keepalive Interval field specifying the NAT keepalive interval the MN should use.
section: "3.2"
topics:
