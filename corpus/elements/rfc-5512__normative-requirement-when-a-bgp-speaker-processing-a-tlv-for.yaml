document: rfc-5512
kind: normative-requirement
summary: When a BGP speaker processing a TLV for encapsulation encounters unknown sub-TLVs, it MUST ignore and skip them. However, if the TLV itself is understood, the entire TLV MUST NOT be ignored just because it contains an unknown sub-TLV.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
