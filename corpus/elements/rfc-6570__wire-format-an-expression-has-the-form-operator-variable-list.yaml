document: rfc-6570
kind: wire-format
summary: 'An expression has the form "{" [ operator ] variable-list "}". Operators are: op-level2 = "+" / "#"; op-level3 = "." / "/" / ";" / "?" / "&"; op-reserve = "=" / "," / "!" / "@" / "|". Absence of an operator means simple string expansion.'
section: "2.2"
topics:
