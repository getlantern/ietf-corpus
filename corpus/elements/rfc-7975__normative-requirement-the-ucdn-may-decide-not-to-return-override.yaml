document: rfc-7975
kind: normative-requirement
summary: The uCDN MAY decide not to return, override, or alter any HTTP headers defined by sc-(<headername>) keys before sending the HTTP response to the UA, because dCDN-supplied cache headers (e.g., sc-(cache-control)) could cause the UA to bypass the uCDN in future requests.
section: 4.5.2
rfc2119_level: MAY
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
