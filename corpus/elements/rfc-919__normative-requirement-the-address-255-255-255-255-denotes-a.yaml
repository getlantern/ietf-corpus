document: rfc-919
kind: normative-requirement
summary: The address 255.255.255.255 denotes a local hardware network broadcast and must not be forwarded by gateways. It may be used by hosts that do not yet know their own network number (e.g., to query a server for it).
section: "7"
rfc2119_level: MUST NOT
topics:
