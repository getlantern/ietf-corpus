document: rfc-8183
kind: normative-requirement
summary: If the <child_request/> (or <publisher_request/>) message included a 'tag' attribute, the responder MUST include an identical 'tag' attribute in the response; if the request did not include a tag attribute, the response MUST NOT include a tag attribute.
section: 5.2.2
rfc2119_level: MUST
topics:
    - pkix
