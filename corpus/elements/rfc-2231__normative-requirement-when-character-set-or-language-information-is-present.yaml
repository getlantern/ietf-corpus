document: rfc-2231
kind: normative-requirement
summary: When character set or language information is present in an extended parameter value, the single-quote delimiters MUST be present even when one or both of the charset or language fields is left blank. This ensures parsers can reliably locate the value portion.
section: "4"
rfc2119_level: MUST
