document: rfc-6925
kind: design-rationale
summary: In industrial (factory-floor) Ethernet networks, client location is more useful than client identity. Combining a relay-unique port/slot value with a network-element-unique Relay-ID allows DHCP servers to use connection-based identifiers without manual address configuration.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
