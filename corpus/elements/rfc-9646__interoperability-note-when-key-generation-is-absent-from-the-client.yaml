document: rfc-9646
kind: interoperability-note
summary: When 'key-generation' is absent from the client's 'csr-support', the ZTP-server MAY request a CSR using the asymmetric key associated with the device's existing identity certificate (e.g., an IDevID from IEEE 802.1AR), rather than requesting new key generation.
section: "3.2"
