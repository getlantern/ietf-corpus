document: rfc-7552
kind: normative-requirement
summary: LDP Link Hello packets over IPv6 MUST have their IPv6 Hop Limit set to 255 and MUST be checked for the same upon receipt before any LDP-specific processing, implementing built-in GTSM per RFC 5082 to protect against off-link attacks.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
