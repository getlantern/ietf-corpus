document: rfc-6970
kind: interoperability-note
summary: Upon receipt of an unsolicited PCP ANNOUNCE, the IGD-PCP IWF re-installs its mappings using MAP requests with PREFER_FAILURE. If the PCP server cannot create the requested mappings (CANNOT_PROVIDE_EXTERNAL), the IWF has no means of notifying internal IGD Control Points of changes to external IP address or port numbers.
section: "5.10"
topics:
    - nat
