document: rfc-5557
kind: security-consideration
summary: When global reoptimization is applied to an active network it could be extremely disruptive. It is critical that the operator issuing commands has sufficient authority and is authenticated, and that computation requests are subject to appropriate policy. The RFC 5440 PCEP session security mechanisms SHOULD be used to secure GCO requests and responses.
section: "7"
topics:
    - security
    - routing
