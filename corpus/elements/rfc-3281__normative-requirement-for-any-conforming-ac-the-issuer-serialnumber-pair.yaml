document: rfc-3281
kind: normative-requirement
summary: For any conforming AC, the issuer/serialNumber pair MUST be unique. The serialNumber MUST be a positive integer (sign bit zero in DER). AC users MUST handle serialNumbers longer than 4 octets; conformant ACs MUST NOT contain serialNumbers longer than 20 octets.
section: 4.2.5
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
