document: rfc-1626
kind: normative-requirement
summary: The default IP MTU for use with ATM AAL5 shall be 9180 octets. All compliant implementations must support at least this default IP MTU value.
section: Default Value for IP MTU over ATM AAL5
rfc2119_level: MUST
topics:
    - ip
