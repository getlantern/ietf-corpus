document: rfc-9250
kind: normative-requirement
summary: By default, clients SHOULD be configured to prioritize privacy and start new sessions if connectivity changes, rather than using QUIC connection migration features. Connection migration trades privacy for latency since it allows servers to track client location via successive IP addresses.
section: 5.5.4
rfc2119_level: SHOULD
topics:
    - dns
    - quic
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
