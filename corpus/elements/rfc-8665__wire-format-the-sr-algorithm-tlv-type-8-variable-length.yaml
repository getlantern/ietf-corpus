document: rfc-8665
kind: wire-format
summary: The SR-Algorithm TLV (Type 8, variable length) is a top-level Router Information Opaque LSA TLV advertising one or more single-octet algorithm identifiers (0 = SPF, 1 = Strict SPF). Absence of this TLV means the node is not SR-capable.
