document: rfc-4512
kind: normative-requirement
summary: Clients MUST NOT display or attempt to decode a value as ASN.1 if the value's syntax is not known. Clients MUST NOT assume the LDAP-specific string encoding is restricted to a UTF-8 encoded string of Unicode characters unless such restriction is explicitly stated.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - ldap
