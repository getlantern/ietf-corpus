document: rfc-5688
kind: design-rationale
summary: The existing 'application' top-level media feature tag in RFC 3840 provides insufficient granularity because application streams for different applications are wildly different, unlike audio/video where common codecs exist. A new tag indicating specific application subtypes is needed for useful call routing.
section: "1"
topics:
    - sip
    - realtime
