document: rfc-9104
kind: interoperability-note
summary: The EAG TLV is not a replacement for the existing Administrative Group (color) TLV 1088; as specified in RFC 7308, both values can coexist in a BGP-LS advertisement. The behavior of BGP-LS consumers receiving both TLVs is out of scope for this document.
section: "1"
topics:
