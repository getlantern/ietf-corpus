document: rfc-3814
kind: protocol-element
summary: 'mplsFTNMask is a BITS object with six named bits: sourceAddr(0), destAddr(1), sourcePort(2), destPort(3), protocol(4), and dscp(5). A bit set to zero means the corresponding field MUST be ignored for matching purposes, allowing any combination of the six criteria to be active.'
