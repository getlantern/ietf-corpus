document: rfc-6422
kind: security-consideration
summary: A malicious node acting as a relay agent on the untrusted side of a network boundary can supply an RSOO containing RSOO-enabled options that override the same options provided by a trusted relay agent on the network side. Network administrators in such environments are advised to configure trusted relay agents to drop Relay-Forward messages containing the RSOO.
section: "7"
topics:
    - security
