document: rfc-4359
kind: normative-requirement
summary: When used with a group key management system, the RSA public key SHOULD be sent as part of the key download policy. If the group has multiple senders, the public key of each sender SHOULD be sent.
section: "5"
rfc2119_level: SHOULD
