document: rfc-7001
kind: normative-requirement
summary: MUAs and downstream filters MUST ignore any result reported using an unregistered 'result' value or unregistered 'ptype', and MUST ignore results for any 'method' they do not specifically support. Consumers SHOULD NOT interpret the header field unless specifically configured to do so by the user or administrator.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
