document: rfc-4034
kind: normative-requirement
summary: 'DNSKEY flags bits 0-6 and 8-14 are reserved: they MUST have value 0 upon creation and MUST be ignored upon receipt. A DNSKEY RR with the SEP bit set but the Zone Key flag not set MUST NOT be used to verify RRSIGs.'
section: 2.1.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
