document: rfc-8929
kind: normative-requirement
summary: When operating as a Bridging Proxy, the 6BBR MUST use the Registering Node's Layer 2 address in the SLLAO of NS/RS messages and the TLLAO of NA messages advertising Registered Addresses. If a destination is seen as on-link, the 6BBR MUST either answer NS(Lookup) directly or reinject it on the backbone as unicast or multicast.
section: "8"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
