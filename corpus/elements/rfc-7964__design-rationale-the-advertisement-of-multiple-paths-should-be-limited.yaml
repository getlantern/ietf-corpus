document: rfc-7964
kind: design-rationale
summary: The advertisement of multiple paths should be limited to prefixes affected by MED-induced route oscillation, since carrying additional paths impacts memory usage and routing convergence. Configuration workarounds should also be considered before deploying the multi-path advertisement mechanism.
