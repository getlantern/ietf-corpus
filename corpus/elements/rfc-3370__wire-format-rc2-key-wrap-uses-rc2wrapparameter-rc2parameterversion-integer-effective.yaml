document: rfc-3370
kind: wire-format
summary: RC2 key wrap uses RC2wrapParameter ::= RC2ParameterVersion (INTEGER). Effective-key-bits 40, 64, and 128 map to RC2ParameterVersion values 160, 120, and 58 respectively. The value 160 must be encoded as two octets (00 A0) because the single-octet encoding (A0) is negative in BER.
section: 4.3.2
topics:
    - crypto
