document: rfc-5083
kind: security-consideration
summary: Recipients accepting unsolicited CMS-encrypted messages become more vulnerable to spam and phishing because plaintext-analysis mitigation strategies cannot access the content. Software should provide mechanisms such as whitelisting to handle unwanted encrypted traffic.
