document: rfc-8949
kind: protocol-element
summary: Tag 55799 (self-described CBOR) serializes to the three-byte magic sequence 0xd9d9f7, chosen because it is not a valid start of any Unicode encoding and does not conflict with common file format signatures. It imparts no additional semantics to the enclosed item.
