document: rfc-1629
kind: design-rationale
summary: Address transition must be gradual rather than instantaneous. IS-IS explicitly supports multiple simultaneous area addresses per area so a routing domain can operate with both old and new addresses valid concurrently during a transition period, enabling graceful migration, area merges, and area splits without disrupting routing.
section: "5.7"
topics:
    - routing
