document: rfc-7668
kind: normative-requirement
summary: For non-link-local addresses, 6LNs SHOULD NOT embed the Bluetooth device address in the IID by default; alternatives such as CGAs, privacy extensions, HBAs, DHCPv6, or semantically opaque addresses SHOULD be used instead.
