document: rfc-5151
kind: interoperability-note
summary: 'The document is backward compatible: transit non-border LSRs that receive a Path message without the ''Contiguous LSP'' bit or the LSP_Attributes object pass it unmodified per RFC 2205 rules. Back-level ingress LSRs can still initiate inter-domain LSPs since the default behavior is to allow all modes.'
section: "7"
topics:
