document: rfc-3863
kind: design-rationale
summary: Tuples are preferred over multiple PIDF instances for segmenting presence information (e.g., from distinct devices or applications) because they keep all presence data for a presentity in a single document, aiding correlation via the 'id' attribute across successive notifications.
