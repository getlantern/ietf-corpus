document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords or personal data should not be included in a URI, as URIs are often displayed, bookmarked, logged, or transmitted in the clear. The deprecated userinfo "user:password" format in particular exposes credentials in every context where the URI appears.
section: "7.5"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
