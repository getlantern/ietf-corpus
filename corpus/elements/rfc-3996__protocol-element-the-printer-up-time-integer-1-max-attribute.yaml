document: rfc-3996
kind: protocol-element
summary: The 'printer-up-time' (integer(1:MAX)) attribute MUST be returned in every Get-Notifications response, reflecting the Printer's up-time at the moment the response is sent, allowing the Notification Recipient to determine when each Event Notification occurred relative to the response time.
section: 5.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
