document: rfc-9914
kind: protocol-element
summary: The Projected DAO Acknowledgment (P-DAO-ACK) is used to confirm that a P-Route has been successfully installed or to signal failure. The Root waits for acknowledgment from the egress node before sending upstream P-DAOs for the same Track segment, ensuring ordered installation.
section: 4.1.2
topics:
