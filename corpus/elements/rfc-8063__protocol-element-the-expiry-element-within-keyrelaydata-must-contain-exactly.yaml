document: rfc-8063
kind: protocol-element
summary: 'The <expiry> element within <keyRelayData> MUST contain exactly one child: either <absolute> (a specific expiry dateTime) or <relative> (a duration). A past absolute date or a zero duration period MUST be interpreted as a revocation of a previously sent key relay object.'
section: 2.1.1
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
