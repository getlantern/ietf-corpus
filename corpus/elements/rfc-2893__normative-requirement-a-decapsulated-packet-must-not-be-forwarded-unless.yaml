document: rfc-2893
kind: normative-requirement
summary: A decapsulated packet MUST NOT be forwarded unless the node has been explicitly configured to accept encapsulated packets from the given IPv4 source address. This restriction prevents tunneling from being used as a mechanism to circumvent ingress filtering.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
