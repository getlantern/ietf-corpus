kind: protocol-element
summary: 'SPD rules for OSPFv3-secured interfaces consist of five entries: rule 1 (bypass) for disabled interfaces; rules 2-3 covering fe80::/10 source for link-local unicast/multicast traffic (outbound protect and inbound ESP/AH decrypt); rules 4-5 covering /128 src/dst pairs for virtual links installed after endpoint address discovery.'
