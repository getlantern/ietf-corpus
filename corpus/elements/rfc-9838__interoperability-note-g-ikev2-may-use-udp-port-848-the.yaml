document: rfc-9838
kind: interoperability-note
summary: G-IKEv2 MAY use UDP port 848, the same port used by GDOI (RFC 6407), because they serve similar functions. The IKE Major Version field (2 for G-IKEv2 vs. 1 for GDOI) distinguishes the two protocols. The GM and GCKS behavior MUST NOT depend on which port was used to create the initial IKE SA.
section: 2.1.1
topics:
    - ipsec
    - security
