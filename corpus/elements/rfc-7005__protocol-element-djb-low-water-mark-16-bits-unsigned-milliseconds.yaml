document: rfc-7005
kind: protocol-element
summary: DJB low-water mark (16 bits, unsigned, milliseconds) is the lowest value of the nominal delay that occurred during the reporting interval. It MUST be provided for adaptive buffers; for fixed buffers its value MUST be set equal to DJB maximum.
section: "4.2"
