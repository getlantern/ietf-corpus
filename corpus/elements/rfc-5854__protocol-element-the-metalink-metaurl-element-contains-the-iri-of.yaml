document: rfc-5854
kind: protocol-element
summary: The 'metalink:metaurl' element contains the IRI of a metadata file (e.g., a BitTorrent .torrent file or another Metalink Document). It MUST have a 'mediatype' attribute; for BitTorrent the value 'torrent' is REQUIRED. It MAY have 'priority' and 'name' attributes.
section: 4.2.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
