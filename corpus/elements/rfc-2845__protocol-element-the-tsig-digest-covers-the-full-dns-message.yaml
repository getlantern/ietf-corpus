document: rfc-2845
kind: protocol-element
summary: 'The TSIG digest covers: the full DNS message (before TSIG is appended), TSIG Variables (key name, class, TTL, algorithm name, time signed, fudge, error, other len, other data), and for responses also the Request MAC. Components are fed into the hash as a continuous octet stream with no interfield padding.'
