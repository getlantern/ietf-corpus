document: rfc-9114
kind: protocol-element
summary: HTTP/3 error codes are defined for use when resetting streams or closing connections. Key codes include H3_NO_ERROR (0x0100), H3_GENERAL_PROTOCOL_ERROR (0x0101), H3_FRAME_UNEXPECTED (0x0105), H3_ID_ERROR (0x0108), H3_SETTINGS_ERROR (0x0109), H3_REQUEST_REJECTED (0x010b), H3_REQUEST_CANCELLED (0x010c), and H3_MESSAGE_ERROR (0x010e).
section: "8.1"
topics:
