document: rfc-1573
kind: design-rationale
summary: ifSpecific was deprecated because the only unambiguous definition — pointing to the most general MIB OID for the media-specific MIB — is redundant with ifType and provides no additional information. Ambiguous prior usage (MIB OID vs. table OID vs. row OID) caused interoperability problems.
section: 3.2.14
topics:
    - snmp
