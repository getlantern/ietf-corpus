document: rfc-1341
kind: wire-format
summary: Quoted-Printable encoding represents non-printable octets as '=' followed by two uppercase hexadecimal digits (e.g., '=0C' for form feed). Octets 33–60 and 62–126 MAY be represented as their literal ASCII characters. Lines MUST NOT exceed 76 characters; a trailing '=' on a line indicates a soft (non-significant) line break.
section: "5.1"
topics:
