document: rfc-8895
kind: security-consideration
summary: An ALTO client may become overloaded or unstable if an update stream server sends updates too frequently or in excessively large messages. Clients should implement rate-limiting or load-shedding to protect against update overloading.
section: "10.2"
topics:
    - security
    - http
