document: rfc-1490
kind: wire-format
summary: 'The SNAP header is five octets: a three-octet Organizationally Unique Identifier (OUI) followed by a two-octet Protocol Identifier (PID). OUI 0x00-00-00 indicates the PID is an Ethertype; OUI 0x00-80-C2 is reserved for IEEE 802.1 bridging PIDs.'
