document: rfc-5547
kind: wire-format
summary: The 'hash' selector is encoded as 'hash:<algorithm>:<value>' where the value is the SHA-1 hash expressed as two-hex-digit bytes separated by colons (e.g., '72:24:5F:...'). Only 'sha-1' is currently supported; the algorithm token references the IANA Hash Function Textual Names registry.
section: "6"
topics:
