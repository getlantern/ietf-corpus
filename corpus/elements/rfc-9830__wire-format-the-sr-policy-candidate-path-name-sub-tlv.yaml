document: rfc-9830
kind: wire-format
summary: The SR Policy Candidate Path Name sub-TLV (Type 129) and SR Policy Name sub-TLV (Type 130) each use a 2-octet Length field and carry a variable-length symbolic name without a NULL terminator. Names are RECOMMENDED to be limited to 255 bytes.
