document: rfc-2463
kind: normative-requirement
summary: Every IPv6 node MUST implement an ICMPv6 Echo responder that receives Echo Requests and sends corresponding Echo Replies. Echo Reply data MUST be returned entirely and unmodified.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
