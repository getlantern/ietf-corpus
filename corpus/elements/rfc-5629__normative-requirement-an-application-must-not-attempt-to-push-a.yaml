document: rfc-5629
kind: normative-requirement
summary: An application MUST NOT attempt to push a user interface component to a user agent until it has determined that the user agent has the necessary capabilities and a dialog has been created. For INVITE-initiated dialogs on the UAC side, pushing must wait until an ACK or PRACK confirming a dialog-creating response has been seen.
section: 8.1.2
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
