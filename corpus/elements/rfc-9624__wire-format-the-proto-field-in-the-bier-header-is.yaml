summary: 'The Proto field in the BIER header is set to: 2 for EVPN-MPLS payload; 7 for VXLAN without IP/UDP header; 8 for NVGRE without IP header; 9 for GENEVE without IP/UDP header; 4 for IPv4 header (VXLAN/NVGRE/GENEVE PHP case); 6 for IPv6 header (PHP case).'
