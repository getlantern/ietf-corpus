document: rfc-3281
kind: interoperability-note
summary: X.509 (2000) defines targetInformation as 'SEQUENCE OF Targets'. Conforming AC issuers MUST produce only one Targets element, but AC users MUST accept a SEQUENCE OF Targets and treat multiple Targets elements as if all Target elements were collapsed into a single Targets element.
section: 4.3.2
topics:
    - pkix
