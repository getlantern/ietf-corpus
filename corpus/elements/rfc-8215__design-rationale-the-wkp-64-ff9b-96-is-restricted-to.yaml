document: rfc-8215
kind: design-rationale
summary: The WKP 64:ff9b::/96 is restricted to RFC 6052 algorithms and forbids use with private IPv4 addresses (RFC 1918). Operators using newer mechanisms (RFC 6146, RFC 7915) or multiple simultaneous translation mechanisms cannot legitimately reuse the WKP, motivating the need for a separate local-use prefix.
section: "3"
topics:
