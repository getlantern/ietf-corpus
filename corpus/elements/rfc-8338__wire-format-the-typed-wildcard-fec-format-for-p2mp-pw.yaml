document: rfc-8338
kind: wire-format
summary: The Typed Wildcard FEC format for P2MP PW FEC Elements reuses the RFC 6667 format (Typed Wcard=0x5, Type, Len=3, R bit, PW Type) and adds a 1-octet PMSI Tunnel Type field; this extends the Type field to include 0x82 (P2MP PW Upstream) and 0x84 (P2P PW Downstream).
section: "3.3"
