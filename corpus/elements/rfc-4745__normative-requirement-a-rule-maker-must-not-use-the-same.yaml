document: rfc-4745
kind: normative-requirement
summary: A Rule Maker MUST NOT use the same identifier for two rules that are available to the PS at the same time for a given PT. If multiple RMs modify the same rule set, each rule must receive a unique identifier, e.g., by retrieving the existing rule set and choosing a non-conflicting ID.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
