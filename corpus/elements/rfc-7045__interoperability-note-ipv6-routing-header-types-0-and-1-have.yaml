document: rfc-7045
kind: interoperability-note
summary: IPv6 Routing Header Types 0 and 1 have been deprecated (Type 0 by RFC 5095). However, this does not mean the IPv6 Routing Header can be unconditionally dropped by forwarding nodes; only deprecated types are affected.
