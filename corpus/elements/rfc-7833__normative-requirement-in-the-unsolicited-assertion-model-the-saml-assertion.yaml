document: rfc-7833
kind: normative-requirement
summary: In the unsolicited assertion model, the SAML-Assertion attribute MUST be included in a RADIUS Access-Accept message and MUST contain a single SAML Assertion; RADIUS servers MUST NOT include both SAML-Protocol and SAML-Assertion in the same RADIUS message.
section: "4.2"
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
