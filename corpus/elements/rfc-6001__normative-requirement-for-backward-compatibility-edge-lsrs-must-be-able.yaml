document: rfc-6001
kind: normative-requirement
summary: For backward compatibility, edge LSRs MUST be able to process Call Attributes (Section 5.1) if edge-to-edge association is selected, and both edge and intermediate LSRs MUST support processing of the LSP ATTRIBUTE object (Section 5.2) if the Soft FA method is used.
