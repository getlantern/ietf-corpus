document: rfc-1883
kind: wire-format
summary: The Jumbo Payload option (type 194, alignment requirement 4n+2, Opt Data Len=4) carries a 32-bit Jumbo Payload Length encoding the packet length (excluding the IPv6 header) for payloads exceeding 65,535 octets; the IPv6 Payload Length field must be set to zero when this option is present.
section: "4.3"
topics:
