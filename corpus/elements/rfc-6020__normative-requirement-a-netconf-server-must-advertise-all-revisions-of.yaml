document: rfc-6020
kind: normative-requirement
summary: A NETCONF server MUST advertise all revisions of all modules it implements in the <hello> message. Module namespaces are encoded as the base URI, and the module name is encoded as the 'module' parameter.
section: 5.6.4.1
rfc2119_level: MUST
topics:
    - yang
    - netconf
