document: rfc-3676
kind: protocol-element
summary: Space-stuffing prepends a single SP to any generated line that begins with '>', 'From ', or SP, to prevent misinterpretation. On reception, if the first character is a space, it is logically deleted after the quote-mark test and before the flowed-line test.
section: "4.4"
topics:
    - email
