document: rfc-5433
kind: registry
summary: 'The ''EAP-GPSK Failure Codes'' registry is initialized with: 0x00000000 (Reserved), 0x00000001 (PSK Not Found), 0x00000002 (Authentication Failure), and 0x00000003 (Authorization Failure). The field is 32 bits; all other values require IANA registration.'
