document: rfc-2470
kind: protocol-element
summary: All IPv6 packets with multicast destination addresses are transmitted to Token Ring functional addresses. All-Nodes and solicited-node addresses map to 03-00-80-00-00-00; All-Routers addresses map to 03-00-40-00-00-00; other multicast addresses map to one of eight functional addresses based on the three least-significant bits of the IPv6 multicast address.
section: "7"
topics:
