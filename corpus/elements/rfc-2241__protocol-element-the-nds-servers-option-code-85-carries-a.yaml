document: rfc-2241
kind: protocol-element
summary: The NDS Servers Option (code 85) carries a list of one or more NDS server IPv4 addresses. The minimum length is 4 octets and the length MUST be a multiple of 4. Servers SHOULD be listed in order of preference.
