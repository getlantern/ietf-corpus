document: rfc-5048
kind: normative-requirement
summary: Outstanding R2Ts within a task MUST be fulfilled by the initiator in the order in which they were received on a connection. No R2T ordering relationship across tasks is implied.
section: "3.2"
rfc2119_level: MUST
