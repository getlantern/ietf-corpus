document: rfc-3921
kind: protocol-element
summary: Communication blocking is implemented via privacy lists (jabber:iq:privacy namespace), supporting active and default lists. Lists can block inbound/outbound messages, presence notifications, IQ stanzas, or all communication based on JID, roster group, subscription type, or a catch-all rule.
section: "10"
topics:
    - privacy
    - security
