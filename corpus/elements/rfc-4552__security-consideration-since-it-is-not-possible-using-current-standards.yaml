document: rfc-4552
kind: security-consideration
summary: Since it is not possible using current standards to provide complete replay protection while using manual keying, the proposed solution does not protect against replay attacks. Replay of OSPF packets can disrupt adjacencies causing DoS, trigger continuous database exchange causing CPU overload, and create micro-loops.
section: "13"
topics:
