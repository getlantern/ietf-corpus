document: rfc-2710
kind: interoperability-note
summary: If a received MLD message is longer than 24 octets, that indicates additional fields perhaps belonging to a future backwards-compatible version of MLD. This version's implementations MUST NOT send messages longer than 24 octets and MUST ignore bytes beyond the first 24.
section: "3.7"
topics:
    - multicast
    - ip
