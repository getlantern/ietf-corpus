document: rfc-2573
kind: protocol-element
summary: 'The snmpTargetParamsTable stores SNMP message parameters for management targets: snmpTargetParamsMPModel (message processing model), snmpTargetParamsSecurityModel, snmpTargetParamsSecurityName, and snmpTargetParamsSecurityLevel. Security-sensitive fields (MPModel, SecurityModel, SecurityName, SecurityLevel) may not be modified while the row is active.'
