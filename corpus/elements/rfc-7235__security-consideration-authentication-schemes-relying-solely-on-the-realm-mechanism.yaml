document: rfc-7235
kind: security-consideration
summary: Authentication schemes relying solely on the realm mechanism expose credentials to all resources on an origin server, allowing one resource to harvest credentials meant for another. Mitigations include restricting direct access to Authorization header content and separating protection spaces by using different host names or port numbers per party.
section: "6.3"
topics:
    - http
    - security
