document: rfc-8810
kind: design-rationale
summary: 'The ''Private Use'' designation for codes 128-255 was found to be useless and actively confusing to implementors. Splitting it into FCFS, Experimental Use, and Reserved ranges clarifies intent: FCFS enables orderly allocation, Experimental Use signals that code points should not be used long-term or in shipping products, and Reserved preserves the maximum value for potential future number-space extension.'
section: "2"
topics:
