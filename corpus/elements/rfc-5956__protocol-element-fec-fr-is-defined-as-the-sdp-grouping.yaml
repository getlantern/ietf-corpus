document: rfc-5956
kind: protocol-element
summary: '''FEC-FR'' is defined as the SDP grouping semantics token used with ''a=group'' to associate source and repair flows in the FEC Framework. Each ''a=group:FEC-FR'' line defines one FEC group; multiple repair flows in the same group are additive.'
