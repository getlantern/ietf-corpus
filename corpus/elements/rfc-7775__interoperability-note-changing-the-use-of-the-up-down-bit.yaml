document: rfc-7775
kind: interoperability-note
summary: Changing the use of the up/down bit in TLVs 236 and 237 (to correct RFC 5308) may introduce interoperability issues with existing implementations. Implementors may wish to support transition mechanisms from the RFC 5308 behavior to the behavior described in this document.
