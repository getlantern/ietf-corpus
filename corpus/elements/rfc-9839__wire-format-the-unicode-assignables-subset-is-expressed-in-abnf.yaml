document: rfc-9839
kind: wire-format
summary: The 'Unicode Assignables' subset is expressed in ABNF spanning all 17 planes, excluding surrogates, all legacy controls (C0 except useful controls, C1, and DEL), and all noncharacters (U+FDD0–U+FDEF plus last two per plane). It is the most restrictive of the three subsets and the one newly introduced by this document.
