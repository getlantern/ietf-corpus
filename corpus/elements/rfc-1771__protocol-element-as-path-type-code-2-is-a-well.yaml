document: rfc-1771
kind: protocol-element
summary: AS_PATH (Type Code 2) is a well-known mandatory attribute identifying all ASes the route has traversed. When advertising externally, a speaker prepends its own AS number; when advertising internally, AS_PATH is not modified. An originator sends its own AS in the AS_PATH to external peers and an empty AS_PATH to internal peers.
section: 5.1.2
topics:
    - bgp
    - routing
