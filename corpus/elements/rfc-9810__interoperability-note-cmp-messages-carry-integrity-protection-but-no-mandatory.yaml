document: rfc-9810
kind: interoperability-note
summary: CMP messages carry integrity protection but no mandatory confidentiality; unencrypted CMP traffic may expose confidential technical or business-critical metadata. Implementers should consider adding TLS (RFC 8446), DTLS (RFC 9147), or IPsec for transport-level confidentiality.
section: 3.1.3
topics:
    - pkix
    - privacy
    - security
