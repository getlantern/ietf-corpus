document: rfc-8124
kind: protocol-element
summary: 'The ''websocket-uri'' SDP media-level attribute carries a ws-URI or wss-URI (as defined in RFC 6455 Section 3) indicating the WebSocket connection endpoint. It can appear in any media section of an SDP. Example: a=websocket-uri:wss://example.com/chat.'
section: "3.2"
topics:
    - websocket
    - realtime
    - sip
