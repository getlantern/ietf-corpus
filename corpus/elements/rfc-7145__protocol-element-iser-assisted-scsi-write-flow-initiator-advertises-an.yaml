document: rfc-7145
kind: protocol-element
summary: 'iSER-assisted SCSI Write flow: initiator advertises an STag in the SCSI Command PDU for solicited data; target uses one or more RDMA Reads to pull write data from the initiator''s advertised buffer; unsolicited data may be sent via Send Messages. The target drives all solicited data transfer.'
section: "1.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
