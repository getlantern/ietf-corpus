document: rfc-8114
kind: normative-requirement
summary: When multiple mPrefix64s are available with distinct scopes, the mB4 MUST select the IPv4-embedded IPv6 multicast prefix whose scope matches the IPv4 multicast address scope and does not exceed it. If no matching prefix is found and scope preservation is required, IPv6 multicast address mapping SHOULD fail.
section: "6.5"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
