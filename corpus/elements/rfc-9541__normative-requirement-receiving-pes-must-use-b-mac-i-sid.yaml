document: rfc-9541
kind: normative-requirement
summary: Receiving PEs MUST use B-MAC/I-SID routes only for C-MAC flush procedures and MUST NOT use them to add or withdraw any B-MAC entry in the MAC-VRFs; only B-MAC/0 routes may add or withdraw B-MACs.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
