document: rfc-4237
kind: protocol-element
summary: The vPIMSupportedAudioMediaTypes attribute is a multi-value attribute indicating the MIME audio subtypes that can be received at the address in vPIMRfc822Mailbox. Non-standard types must be prefixed with 'X-' or 'x-', and the audio32kadpcm value must be listed if this attribute is present.
section: "2.5"
