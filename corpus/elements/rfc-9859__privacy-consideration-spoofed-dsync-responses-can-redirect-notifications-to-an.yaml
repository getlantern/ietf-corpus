document: rfc-9859
kind: privacy-consideration
summary: Spoofed DSYNC responses can redirect notifications to an illegitimate party, who may then learn notification contents (e.g., child zone name and publication time) in real time. Senders concerned about this privacy risk MAY choose to ignore unsigned DSYNC records.
section: "5"
topics:
    - dns
    - privacy
    - security
