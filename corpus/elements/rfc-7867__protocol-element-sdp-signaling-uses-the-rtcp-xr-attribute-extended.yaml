document: rfc-7867
kind: protocol-element
summary: SDP signaling uses the 'rtcp-xr' attribute extended with xr-format value 'vlc' (via xr-vlc-block = "vlc") to signal use of the Video Loss Concealment Report Block. Offer/Answer usage follows RFC 3611 Section 5.2 for unilateral parameters.
section: "5.1"
