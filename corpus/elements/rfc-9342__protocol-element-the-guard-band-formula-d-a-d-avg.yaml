document: rfc-9342
kind: protocol-element
summary: The guard band formula d = A + D_avg + 3*D_stddev (where A is clock accuracy, D_avg is average network delay, D_stddev is standard deviation of delay) applies to each measurement point on the multipoint path. The available counting interval L - 2d must be > 0 for the method to function correctly.
section: "8"
topics:
