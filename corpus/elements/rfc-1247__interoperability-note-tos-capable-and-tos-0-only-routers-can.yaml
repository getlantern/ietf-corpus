document: rfc-1247
kind: interoperability-note
summary: TOS-capable and TOS-0-only routers can coexist in the same AS. TOS-capable routers will attempt to avoid TOS-0-only routers when computing non-zero TOS paths. The T-bit in the OSPF options field advertises TOS capability.
section: "4.5"
topics:
    - routing
