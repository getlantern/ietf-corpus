kind: protocol-element
summary: The 'cps' attribute parameter in the SDP 'fmtp' attribute inside a 'dcsa' attribute indicates the maximum character transmission rate the endpoint can receive, expressed as a mean value in characters per second over any 10-second interval. The default value is 30 if not specified.
