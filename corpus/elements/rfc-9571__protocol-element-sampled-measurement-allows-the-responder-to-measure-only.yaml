document: rfc-9571
kind: protocol-element
summary: Sampled Measurement allows the responder to measure only the packet at the start of a marked delay batch rather than every packet; the measurement interval is defined by the interval between two readout packets rather than the duration of a marked batch. This approach avoids ECMP effects and may be used if supported by the responder and configured by the operator.
section: "8"
topics:
    - mpls
    - measurement
