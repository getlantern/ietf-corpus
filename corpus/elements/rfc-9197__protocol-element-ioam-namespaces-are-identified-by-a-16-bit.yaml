document: rfc-9197
kind: protocol-element
summary: IOAM-Namespaces are identified by a 16-bit Namespace-ID, split into an operator-assigned range (0x0001–0x7FFF) and an IANA-assigned range (0x8000–0xFFFF). The Namespace-ID field MUST be included in all IOAM-Option-Types.
section: "4.3"
rfc2119_level: MUST
topics:
    - measurement
    - registry
