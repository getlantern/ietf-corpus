document: rfc-8838
kind: normative-requirement
summary: When candidates are trickled, the using protocol MUST deliver each candidate (and any end-of-candidates indication) to the receiving Trickle ICE implementation exactly once and in the same order it was conveyed. Any retransmissions provided by the using protocol MUST be hidden from the ICE implementation.
section: "9"
rfc2119_level: MUST
topics:
    - webrtc
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
