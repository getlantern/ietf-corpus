document: rfc-8050
kind: protocol-element
summary: 'Five new TABLE_DUMP_V2 subtypes are defined: RIB_IPV4_UNICAST_ADDPATH (8), RIB_IPV4_MULTICAST_ADDPATH (9), RIB_IPV6_UNICAST_ADDPATH (10), RIB_IPV6_MULTICAST_ADDPATH (11), and RIB_GENERIC_ADDPATH (12). The four AFI/SAFI-specific subtypes redefine the RIB Entries field to include a Path Identifier; the generic subtype does not.'
