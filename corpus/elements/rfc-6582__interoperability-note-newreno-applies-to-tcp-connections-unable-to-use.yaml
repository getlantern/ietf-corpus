document: rfc-6582
kind: interoperability-note
summary: NewReno applies to TCP connections unable to use the SACK option, either because SACK is not locally supported or the TCP peer did not indicate willingness to use it. When SACK is available, it provides superior information for retransmission decisions during fast recovery.
section: "1"
topics:
    - tcp
    - congestion
