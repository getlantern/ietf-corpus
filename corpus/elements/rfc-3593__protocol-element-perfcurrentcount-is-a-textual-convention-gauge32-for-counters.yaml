document: rfc-3593
kind: protocol-element
summary: PerfCurrentCount is a Textual Convention (Gauge32) for counters in the current 15-minute measurement interval. The counter starts at zero, increments as events occur, and is stored into the first history interval at interval end, then reset to zero.
