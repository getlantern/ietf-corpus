document: rfc-7357
kind: normative-requirement
summary: The Inner.MacSA (Origin RBridge MAC Address) MUST be a campus-unique MAC address owned by the originating RBridge, and each ESADI RBridge MUST use the same Inner.MacSA for all ESADI packets it originates.
