document: rfc-9322
kind: normative-requirement
summary: An IOAM trace option with the Loopback flag set MUST have the value '1' in the most significant bit of IOAM-Trace-Type and '0' in all remaining bits, ensuring that each transit node adds only the Hop_Lim and node_id data field.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
