document: rfc-4380
kind: normative-requirement
summary: 'Nodes SHOULD use Teredo only as a last resort: they SHOULD prefer direct IPv6 connectivity, then 6to4 co-located with the NAT, then a configured tunnel service, then 6to4 with a global IPv4 address, before falling back to Teredo.'
section: 3.2.1
rfc2119_level: SHOULD
topics:
