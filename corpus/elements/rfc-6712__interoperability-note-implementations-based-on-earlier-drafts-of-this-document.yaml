document: rfc-6712
kind: interoperability-note
summary: Implementations based on earlier drafts of this document may use the unregistered MIME type 'application/pkixcmp-poll'. Implementors should be aware that different HTTP transfer approaches for CMP may exist due to the decade-long development history of this specification.
