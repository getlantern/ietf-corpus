document: rfc-1043
kind: normative-requirement
summary: When the DET option is negotiated, the conflicting TELNET options Echo, Suppress Go-Ahead, and Binary should be refused or explicitly terminated. Suppress Go-Ahead is the default state of DODIIS connections at establishment.
section: "5"
rfc2119_level: SHOULD
