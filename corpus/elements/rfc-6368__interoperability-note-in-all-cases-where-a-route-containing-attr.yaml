document: rfc-6368
kind: interoperability-note
summary: In all cases where a route containing ATTR_SET is imported, attributes present on the VPN route other than NEXT_HOP are ignored for both VRF route selection and CE advertisement; the ATTR_SET contents override VPN route attributes on vrf-import.
