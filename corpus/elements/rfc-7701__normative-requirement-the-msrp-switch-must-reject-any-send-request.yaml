document: rfc-7701
kind: normative-requirement
summary: The MSRP switch MUST reject any SEND request containing multiple To header fields in the Message/CPIM wrapper with a 403 response. The switch MUST NOT modify the content received in the SEND request, though it MAY re-chunk outbound copies.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
