document: rfc-2765
kind: interoperability-note
summary: IPv4 multicast addresses cannot be mapped to IPv6 multicast addresses; for example, ::ffff:224.1.2.3 is an IPv4-mapped address with a class D value but is not an IPv6 multicast address. This limitation makes SIIT inapplicable to multicast traffic.
section: "1.1"
topics:
    - ip
    - v6ops
    - multicast
