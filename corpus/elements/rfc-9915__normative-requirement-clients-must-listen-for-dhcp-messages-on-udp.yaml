document: rfc-9915
kind: normative-requirement
summary: Clients MUST listen for DHCP messages on UDP port 546; servers and relay agents MUST listen on UDP port 547. Clients MUST send to destination port 547; servers MUST send Relay-reply messages to port 547 and client messages to port 546.
section: "7.2"
rfc2119_level: MUST
