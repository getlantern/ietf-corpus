document: rfc-8662
kind: interoperability-note
summary: ELC propagation across signaling domain boundaries (e.g., from LDP to SPRING via a Mapping Server) is required for ingress nodes to safely insert ELI/EL over stitched LSPs. The proposed solution only works if the SPRING router advertising the Binding SID is also performing the data-plane LSP stitching.
section: "6"
topics:
