document: rfc-6284
kind: protocol-element
summary: 'A new RTCP control packet type TOKEN (PT=210) is introduced with five-bit sub-message type (SMT) field to distinguish four message types: Port Mapping Request (SMT=1), Port Mapping Response (SMT=2), Token Verification Request (SMT=3), and Token Verification Failure (SMT=4). All fields are carried in network byte order.'
