document: rfc-2428
kind: normative-requirement
summary: When returning a 522 error, the response text MUST indicate which network protocols are supported, with the supported protocol list as comma-separated address family numbers enclosed in parentheses. The textual message before the '(' MUST NOT include the characters '(' or ')'.
section: "2"
rfc2119_level: MUST
