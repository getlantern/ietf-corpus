document: rfc-2068
kind: design-rationale
summary: The Host header was made mandatory in HTTP/1.1 (rather than optional as in HTTP/1.0) to enable virtual hosting—multiple websites sharing a single IP address. Without it, the server cannot determine which virtual host the client is requesting when serving multiple domains.
section: 19.5.1
topics:
    - http
