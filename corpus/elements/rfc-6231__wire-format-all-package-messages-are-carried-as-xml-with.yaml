document: rfc-6231
kind: wire-format
summary: All package messages are carried as XML with the MIME media type 'application/msc-ivr+xml'. The root element is always <mscivr version='1.0' xmlns='urn:ietf:params:xml:ns:msc-ivr'>. Request bodies are sent in CONTROL messages; response and audit-response bodies in REPORT messages or 200 responses; event notifications in CONTROL messages from the MS.
