document: rfc-5865
kind: interoperability-note
summary: Within an ISP and on inter-ISP links with uniform internal paths at hundreds of megabits per second or faster, all admitted real-time traffic is expected to be carried in the Real-Time Traffic (RTP) class from RFC 5127, rather than using separate VOICE-ADMIT DSCP handling.
section: "1"
topics:
