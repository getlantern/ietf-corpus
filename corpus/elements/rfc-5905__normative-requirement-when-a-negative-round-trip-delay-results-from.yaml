document: rfc-5905
kind: normative-requirement
summary: When a negative round-trip delay results from a large initial frequency offset combined with a short polling interval, the value of delta MUST be clamped to not less than s.rho (the system precision in seconds) to prevent misleading subsequent computations.
section: "8"
rfc2119_level: SHOULD
topics:
    - ntp
