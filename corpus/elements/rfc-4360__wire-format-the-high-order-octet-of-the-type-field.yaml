summary: 'The high-order octet of the Type Field encodes two control bits: bit I (IANA authority, 0=First Come First Serve, 1=Standard/Early IANA/Experimental) and bit T (transitive, 0=transitive across ASes, 1=non-transitive). The remaining 6 bits indicate community structure.'
