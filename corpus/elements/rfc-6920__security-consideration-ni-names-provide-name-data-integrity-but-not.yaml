document: rfc-6920
kind: security-consideration
summary: 'ni names provide name-data integrity but not confidentiality: no secret information is required to generate or verify a name, so the hash only proves integrity of the referenced object. The proof of integrity of the name is only as strong as the integrity of the source from which the name was obtained.'
section: "10"
topics:
