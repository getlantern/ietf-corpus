document: rfc-3812
kind: protocol-element
summary: mplsTunnelHopTable specifies the configured strict or loose hops for a signaled MPLS tunnel, indexed by hop-list, path-option, and hop. mplsTunnelHopEntryPathComp selects between dynamic (CSPF-computed, source and destination only) and explicit (full path specified) computation modes.
