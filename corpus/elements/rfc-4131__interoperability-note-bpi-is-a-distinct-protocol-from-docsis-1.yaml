document: rfc-4131
kind: interoperability-note
summary: BPI+ is a distinct protocol from DOCSIS 1.0 BPI, not merely an enhancement; the BPI+ MIB objects (this document) are separate from the BPI MIB (RFC 3083). DOCSIS 1.1 and 2.0 systems implement both protocols to maintain backward compatibility with DOCSIS 1.0 systems.
