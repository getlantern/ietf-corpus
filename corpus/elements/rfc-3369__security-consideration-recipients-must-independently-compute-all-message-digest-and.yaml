document: rfc-3369
kind: security-consideration
summary: Recipients must independently compute all message digest and MAC values and must not rely on originator-supplied values. The signing-time attribute is not verified for correctness; acceptance of a purported signing time is at the recipient's discretion, though timestamp authorities may be implicitly trusted.
section: "14"
topics:
    - crypto
    - security
