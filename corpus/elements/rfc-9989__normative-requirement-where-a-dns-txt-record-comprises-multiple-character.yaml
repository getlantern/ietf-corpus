document: rfc-9989
kind: normative-requirement
summary: Where a DNS TXT record comprises multiple character-string objects, the module performing DMARC evaluation MUST concatenate these strings by joining them in order and parsing the result as a single string.
section: "4.5"
rfc2119_level: MUST
