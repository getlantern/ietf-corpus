document: rfc-3024
kind: design-rationale
summary: The Mobile IP Working Group considered unauthenticated-state mechanisms to further reduce reverse-tunnel hijacking but rejected them because they would introduce denial-of-service vulnerabilities. The consensus was that only weak (non-cryptographic) protection was achievable, making the trade-off unacceptable.
section: "6.1"
topics:
    - mobility
    - security
