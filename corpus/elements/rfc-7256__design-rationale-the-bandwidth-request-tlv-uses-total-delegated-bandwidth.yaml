document: rfc-7256
kind: design-rationale
summary: The Bandwidth-Request TLV uses total delegated bandwidth values rather than incremental deltas so that both the AN and NAS can more easily keep their respective views of the current delegated bandwidth synchronized, avoiding accumulated rounding or ordering errors.
