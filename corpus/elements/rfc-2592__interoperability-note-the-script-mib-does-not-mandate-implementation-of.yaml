document: rfc-2592
kind: interoperability-note
summary: The Script MIB does not mandate implementation of any specific URL scheme in smScriptSource. An attempt to load a script using an unsupported URL scheme causes smScriptOperStatus to report 'unknownProtocol'. Implementations may choose to only support pull (URL-based) or only push (smCodeTable), or neither.
section: "6"
topics:
