document: rfc-5652
kind: normative-requirement
summary: The recipient MUST NOT rely on any message digest values computed by the originator. If signedAttributes are present, the content message digest MUST be independently recalculated by the recipient and MUST match the messageDigest attribute for the signature to be valid.
section: "5.6"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
