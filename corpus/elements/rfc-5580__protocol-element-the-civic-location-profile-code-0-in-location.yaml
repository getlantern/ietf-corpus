document: rfc-5580
kind: protocol-element
summary: The Civic Location Profile (Code=0 in Location-Information) uses the encoding from RFC 4776 Section 3.1, omitting the first 3 octets (DHCP option code, length, and 'what' element). The Geospatial Location Profile (Code=1) uses the LCI format from RFC 3825 Section 2, starting at the third octet.
section: 4.3.1
topics:
