document: rfc-4401
kind: normative-requirement
summary: Mechanisms MUST be able to consume all prf_in input data that is 2^14 or fewer octets. If a mechanism cannot consume as much input data as provided, GSS_Pseudo_random() MUST return GSS_S_FAILURE.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - crypto
