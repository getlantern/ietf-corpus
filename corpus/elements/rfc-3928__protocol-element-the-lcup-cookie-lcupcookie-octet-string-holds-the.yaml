document: rfc-3928
kind: protocol-element
summary: The LCUP Cookie (LCUPCookie ::= OCTET STRING) holds the state of the client's data relative to the server. Each cookie format is identified by an LCUPScheme (LDAPOID); the scheme OID MUST be unique for a given cookie format. The cookie value may be opaque or have a well-known format depending on the scheme.
section: "3.3"
topics:
    - ldap
