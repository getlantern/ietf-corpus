document: rfc-6155
kind: privacy-consideration
summary: When a Target uses HELD identity extensions to obtain its own location, HELD can no longer be classified as an LCP and return routability is insufficient as the sole anti-spoofing mechanism. Specific anti-spoofing measures MUST be defined for each alternative identifier; this document defines such a measure only for NAI in WiMAX networks.
section: "4.1"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
