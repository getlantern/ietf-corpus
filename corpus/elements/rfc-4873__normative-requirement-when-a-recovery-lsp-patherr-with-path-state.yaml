document: rfc-4873
kind: normative-requirement
summary: When a recovery LSP PathErr with Path_State_Removed set is received and the R-bit of the protected LSP's PROTECTION object is not set (0), the outgoing PathErr SHOULD be sent with Path_State_Removed cleared (0). When the R-bit is set (1), the outgoing PathErr MUST be sent with Path_State_Removed set (1).
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
