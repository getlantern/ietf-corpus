document: rfc-5533
kind: protocol-element
summary: Shim6 is a layer 3 multihoming shim for IPv6 that operates below transport protocols. It maintains per-ULID-pair context state and transparently remaps IPv6 address fields between ULIDs (used by upper layers) and locators (used for routing), with no impact on ULP checksums or connection identification.
section: "1.6"
topics:
    - ip
    - v6ops
    - security
