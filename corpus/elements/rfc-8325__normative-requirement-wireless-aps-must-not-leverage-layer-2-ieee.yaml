document: rfc-8325
kind: normative-requirement
summary: Wireless APs MUST NOT leverage Layer 2 IEEE 802.11 UP markings set by wireless hosts and subsequently perform a UP-to-DSCP mapping in the upstream direction, as IEEE 802.11 does not intend UP to influence wired IP QoS treatment.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - diffserv
    - qos
