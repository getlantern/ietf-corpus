document: rfc-3090
kind: interoperability-note
summary: Overlapping islands of security are possible as islands grow, and are expected to result from configuration problems. Implementers are advised to ensure their code handles overlaps without failure, even though overlaps introduce no new conceptual or protocol complexity.
section: 1.2.1
topics:
    - dns
    - security
