document: rfc-8366
kind: normative-requirement
summary: If the 'expires-on' field exists in a voucher, pledges MUST ensure that the expires-on time has not yet passed. The 'expires-on' value MUST NOT exceed the expiration date of any listed 'pinned-domain-cert' certificate.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
    - pkix
