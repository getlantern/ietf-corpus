kind: wire-format
summary: 'DUID-UUID (type 4) is encoded as: 2-octet type field (0x0004) followed by a 16-octet (128-bit) UUID. The total length is fixed at 18 octets. Example: 0004 9f03b182705747e38a1e422910078642.'
