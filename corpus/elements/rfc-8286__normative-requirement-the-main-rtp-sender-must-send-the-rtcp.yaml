document: rfc-8286
kind: normative-requirement
summary: The main RTP sender MUST send the RTCP splicing notification message regardless of whether timestamps are included in the RTP header extension, providing robustness against middleboxes that strip RTP header extensions.
section: "3.2"
rfc2119_level: MUST
topics:
