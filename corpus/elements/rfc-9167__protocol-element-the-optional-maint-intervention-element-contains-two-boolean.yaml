document: rfc-9167
kind: protocol-element
summary: 'The optional <maint:intervention> element contains two boolean child elements: <maint:connection> (indicates if clients need a reconnect) and <maint:implementation> (indicates if clients need a code change). These are flags; detailed descriptions should be in <maint:description> or <maint:detail>.'
section: "3.3"
