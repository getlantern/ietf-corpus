document: rfc-5425
kind: security-consideration
summary: The syslog TLS transport uses no application-layer acknowledgments. If the TLS session or TCP connection breaks, the transport sender cannot determine which messages were successfully delivered to the syslog application.
section: "6.3"
topics:
    - syslog
    - tls
    - security
