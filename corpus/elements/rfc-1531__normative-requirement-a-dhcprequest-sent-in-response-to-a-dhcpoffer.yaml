document: rfc-1531
kind: normative-requirement
summary: A DHCPREQUEST sent in response to a DHCPOFFER MUST include the 'server identifier' option to indicate the selected server; however, a DHCPREQUEST sent during lease renewal (RENEWING or REBINDING states) MUST NOT include a 'server identifier'.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
