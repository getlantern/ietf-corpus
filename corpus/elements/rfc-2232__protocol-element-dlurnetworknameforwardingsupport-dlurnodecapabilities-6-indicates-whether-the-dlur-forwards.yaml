summary: dlurNetworkNameForwardingSupport (dlurNodeCapabilities 6) indicates whether the DLUR forwards Network Name control vectors on ACTPUs and ACTLUs to DLUR-served PUs and their LUs. This corresponds to byte 9, bit 3 of CV51.
