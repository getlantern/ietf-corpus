document: rfc-9784
kind: protocol-element
summary: Physical ports (ENNIs) are 'colored' to group associated vESes using the EVPN Router's MAC Extended Community (RFC 9135), with the port MAC address as the default color. For EVPN this community is advertised with Ethernet A-D per ES routes; for PBB-EVPN it is advertised with B-MAC routes.
section: "4.2"
topics:
    - mpls
    - routing
