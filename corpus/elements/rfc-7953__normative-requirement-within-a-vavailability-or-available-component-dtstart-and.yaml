document: rfc-7953
kind: normative-requirement
summary: Within a VAVAILABILITY or AVAILABLE component, DTSTART and DTEND MUST be DATE-TIME values expressed as either UTC or local time with a timezone reference (TZID). DATE-only values are not permitted.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
