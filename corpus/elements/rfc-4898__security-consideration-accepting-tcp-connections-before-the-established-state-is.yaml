document: rfc-4898
kind: security-consideration
summary: Accepting TCP connections before the ESTABLISHED state is explicitly noted as dangerous because it creates an easy opportunity for denial-of-service attacks using forged source IP addresses; SYN-flood defenses defer full resource allocation until liveness criteria are met.
