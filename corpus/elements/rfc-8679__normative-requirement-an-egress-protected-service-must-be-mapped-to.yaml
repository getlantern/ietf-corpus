document: rfc-8679
kind: normative-requirement
summary: An egress-protected service MUST be mapped to an egress-protected tunnel by its ingress router based on the common protected egress {E, P}, and a service associated with a protected egress {E, Pi} MUST be carried by a tunnel associated with the same protected egress.
section: "5.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
