document: rfc-9662
kind: normative-requirement
summary: Implementations of RFC 5425 (TLS syslog) MUST support TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 and TLS_RSA_WITH_AES_128_CBC_SHA as mandatory-to-implement cipher suites; implementations SHOULD offer TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 but MAY offer TLS_RSA_WITH_AES_128_CBC_SHA.
section: "4"
rfc2119_level: REQUIRED
