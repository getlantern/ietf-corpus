document: rfc-9559
kind: protocol-element
summary: 'Three timestamp scales are defined: Matroska Ticks (nanoseconds, used for CodecDelay, SeekPreRoll, DiscardPadding), Segment Ticks (nanoseconds × TimestampScale, used in Cluster Timestamp and Block offsets), and Track Ticks (Segment Ticks × TrackTimestampScale, used in BlockDuration and ReferenceBlock).'
section: "11.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
