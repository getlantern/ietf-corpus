document: rfc-4055
kind: normative-requirement
summary: When the public key is identified by id-RSASSA-PSS and parameters are present, all RSASSA-PSS-params fields in the signature algorithm identifier MUST match those in the key algorithm identifier, except saltLength; the saltLength in the signature parameters MUST be greater than or equal to that in the key parameters.
section: "3.3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
