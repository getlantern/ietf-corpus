document: rfc-7582
kind: design-rationale
summary: The Unpartitioned Method cannot support the 'Partitioned Set of PEs' technique for C-BIDIR because receiving PEs cannot identify which PE transmitted a packet from the bidirectional tunnel; duplicate detection must instead use RFC 6513 Sections 9.1.2 or 9.1.3 techniques.
