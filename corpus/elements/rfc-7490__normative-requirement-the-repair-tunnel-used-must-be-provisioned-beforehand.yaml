document: rfc-7490
kind: normative-requirement
summary: The repair tunnel used MUST be provisioned beforehand in anticipation of failure so that traffic can be immediately redirected when a failure is detected. Since tunnel location is dynamically determined, tunnels must be established automatically.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
