document: rfc-3477
kind: normative-requirement
summary: If an LSR originates an LSP advertised as an unnumbered Forwarding Adjacency, the LSR MUST allocate an identifier to that Forwarding Adjacency, and the Path message for that LSP MUST contain the LSP_TUNNEL_INTERFACE_ID object with the head end's Router ID and the allocated Interface ID.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
