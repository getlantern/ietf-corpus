document: rfc-4328
kind: design-rationale
summary: Ordered label lists (rather than bitmaps or ranges) are used for ODUj multiplexing, virtual concatenation, and multiplication because the logical order of components in the multiplex may differ from physical tributary slot order, and explicit ordering is needed for correct signal reconstruction.
