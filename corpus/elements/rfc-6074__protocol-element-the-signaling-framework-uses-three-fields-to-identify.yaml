document: rfc-6074
kind: protocol-element
summary: 'The signaling framework uses three fields to identify pseudowire endpoints: Attachment Group Identifier (AGI), Source Attachment Individual Identifier (SAII), and Target Attachment Individual Identifier (TAII). The SAI is the concatenation of AGI and SAII; the TAI is the concatenation of AGI and TAII. The AGI functions as a VPN-ID shared by all PWs in a given L2VPN instance.'
section: "2.1"
topics:
