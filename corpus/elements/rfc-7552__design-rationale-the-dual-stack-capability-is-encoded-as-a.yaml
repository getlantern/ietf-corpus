document: rfc-7552
kind: design-rationale
summary: The Dual-Stack capability is encoded as a new TLV rather than a flag bit in the Hello message because a flag bit would appear in all Single-stack IPv6 LDP networks and persist indefinitely. The TLV approach limits overhead to deployments that actually use Dual-stack LDP.
section: 6.1.1
topics:
