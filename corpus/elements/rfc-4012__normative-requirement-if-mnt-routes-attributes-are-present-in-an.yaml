document: rfc-4012
kind: normative-requirement
summary: If mnt-routes attributes are present in an object, the mnt-by or mnt-lower attributes are not considered for authorization. mnt-lower is used only for inet6num objects that are less specific than the route6 object being added, and only in the absence of mnt-routes.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
