document: rfc-8225
kind: design-rationale
summary: PASSporT is intentionally decoupled from any specific signaling protocol (e.g., SIP) so that identity assertion can be implemented flexibly across different application protocols and multi-hop interconnection scenarios. Protocol-specific usage guidance is delegated to separate documents such as RFC 8224.
section: "1"
topics:
