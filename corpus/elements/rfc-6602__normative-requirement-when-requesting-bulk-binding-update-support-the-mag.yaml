document: rfc-6602
kind: normative-requirement
summary: When requesting bulk binding update support, the MAG MUST set the (B) flag to 1 and MUST include the Mobile Node Group Identifier option in the PBU. The option's sub-type MUST be set to 1 (Bulk Binding Update Group).
section: 5.1.2
rfc2119_level: MUST
topics:
