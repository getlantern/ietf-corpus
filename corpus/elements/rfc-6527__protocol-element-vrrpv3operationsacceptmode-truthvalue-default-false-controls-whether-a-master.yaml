document: rfc-6527
kind: protocol-element
summary: vrrpv3OperationsAcceptMode (TruthValue, default false) controls whether a master router in IPv6 mode accepts packets addressed to the address owner's IPv6 address when it is not the owner. This object is not relevant for VRRP over IPv4 and SHOULD be set to false(2) in that case.
