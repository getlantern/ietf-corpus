document: rfc-7521
kind: protocol-element
summary: When using assertions as authorization grants, the request MUST include 'grant_type' (REQUIRED, an absolute URI identifying the assertion format) and 'assertion' (REQUIRED, the assertion value). The 'scope' parameter is OPTIONAL but must not exceed the originally granted scope.
section: "4.1"
topics:
    - oauth
    - jose
extracted_by: claude-sonnet-4-6
