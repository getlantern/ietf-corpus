document: rfc-9801
kind: security-consideration
summary: The PSN (MPLS or SRv6) is assumed to be trusted and secure. Spoofed packets injected into the PSN can disrupt PLE service; this MUST be prevented by following best practices for PSN isolation as described in RFC 4381, RFC 5920, RFC 8402, and RFC 9252.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - mpls
