document: rfc-3556
kind: protocol-element
summary: 'Two new SDP bandwidth modifiers are defined: ''RS'' specifies the RTCP bandwidth allocated to active data senders, and ''RR'' specifies the RTCP bandwidth allocated to other participants (receivers) in an RTP session. Both use the syntax b=RS:<bandwidth-value> and b=RR:<bandwidth-value>.'
section: "2"
topics:
