document: rfc-3412
kind: security-consideration
summary: The msgID values used in SNMP entity communication MUST be chosen to avoid replay attacks. They need not be unpredictable, but must not repeat across outstanding requests. Applications must obey securityLevel and call upon Access Control Model services when sending data across the network.
section: "10"
topics:
    - snmp
    - security
