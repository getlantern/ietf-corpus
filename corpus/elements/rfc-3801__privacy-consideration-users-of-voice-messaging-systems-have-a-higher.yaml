document: rfc-3801
kind: privacy-consideration
summary: Users of voice messaging systems have a higher expectation of message privacy than standard Internet mail provides. This expectation SHOULD be preserved as much as possible; the specification does not preclude use of Internet object or channel security protocols (encryption, authentication, non-repudiation) to supplement VPIM messages.
section: 9.2.3
topics:
    - email
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
