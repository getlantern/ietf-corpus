document: rfc-822
kind: privacy-consideration
summary: The BCC mechanism provides a limited form of recipient privacy by omitting BCC addresses from message copies sent to To and CC recipients. However, the headers (including From, Subject) remain in cleartext and visible to all recipients and intermediate relays.
section: 4.5.3
topics:
    - email
    - privacy
