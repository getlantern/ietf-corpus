document: rfc-6680
kind: security-consideration
summary: When the underlying security mechanism does not provide a permanent unique identity (e.g., anonymous Kerberos), GSS-API naming extensions may be used to supply a permanent unique identity attribute — globally unique, namespace-unique, or a 'directed' identifier unique per acceptor identity — using constructs such as SAML persistent NameID.
section: "9"
topics:
    - security
    - privacy
