document: rfc-8838
kind: normative-requirement
summary: If a newly formed candidate pair has a local candidate whose type is server-reflexive, the agent MUST replace the local candidate with its base before completing redundancy tests (applies both when pairing newly gathered local candidates and when receiving trickled remote candidates).
section: "10"
rfc2119_level: MUST
topics:
