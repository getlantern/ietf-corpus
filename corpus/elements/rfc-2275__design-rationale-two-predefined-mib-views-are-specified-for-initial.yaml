document: rfc-2275
kind: design-rationale
summary: 'Two predefined MIB views are specified for initial installation: the ''<internet>'' view (subtree 1.3.6.1) for authenticated access, and the ''<restricted>'' view limited to system/snmp/engine/MPD/USM statistics subtrees for semi-secure unauthenticated access. This tiered default prevents unauthenticated principals from reading sensitive configuration objects.'
section: A.1
topics:
    - snmp
    - security
