document: rfc-5454
kind: security-consideration
summary: Security devices must account for IPv6 packets encapsulated over IPv4 either directly to the mobile node's CoA or via double encapsulation (first to IPv4 HoA, then to CoA). Interactions with IPsec are covered in RFC 5265 and RFC 5266.
section: "4"
topics:
    - ip
    - mobility
    - security
    - ipsec
