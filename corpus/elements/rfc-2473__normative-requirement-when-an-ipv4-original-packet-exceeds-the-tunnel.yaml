document: rfc-2473
kind: normative-requirement
summary: When an IPv4 original packet exceeds the tunnel MTU and the DF bit is SET, the entry-point node must discard the packet and return an ICMP Destination Unreachable / Packet Too Big message. If the DF bit is CLEAR, the entry-point encapsulates and then fragments the resulting tunnel packet.
section: "7.2"
rfc2119_level: MUST
topics:
    - ip
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
