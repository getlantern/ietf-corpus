summary: The IID-TLV (Type 7, Length 2–254) carries a 2-octet IID field (0–65535) followed by zero or more 2-octet Supported ITID fields. It is included in all IS-IS PDUs (IIH, LSP, SNP) associated with a non-zero instance.
