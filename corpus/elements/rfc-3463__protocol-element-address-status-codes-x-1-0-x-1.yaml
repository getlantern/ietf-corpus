document: rfc-3463
kind: protocol-element
summary: Address status codes X.1.0–X.1.8 cover conditions such as bad destination mailbox address (X.1.1), bad destination system address (X.1.2), address syntax errors (X.1.3), ambiguous address (X.1.4), valid address (X.1.5), moved mailbox with no forwarding (X.1.6), and bad sender address or system (X.1.7, X.1.8).
