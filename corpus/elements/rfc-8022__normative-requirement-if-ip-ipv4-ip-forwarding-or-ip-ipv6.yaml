document: rfc-8022
kind: normative-requirement
summary: If 'ip:ipv4/ip:forwarding' or 'ip:ipv6/ip:forwarding' is set to false for a network-layer interface, the forwarding of datagrams through that interface MUST be disabled, though the interface MAY still participate in routing protocol functions.
section: "6.2"
rfc2119_level: MUST
topics:
    - yang
    - routing
    - ip
