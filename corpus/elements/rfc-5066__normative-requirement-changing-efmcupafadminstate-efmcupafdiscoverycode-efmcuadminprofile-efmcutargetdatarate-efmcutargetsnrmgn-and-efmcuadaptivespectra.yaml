document: rfc-5066
kind: normative-requirement
summary: 'Changing efmCuPAFAdminState, efmCuPAFDiscoveryCode, efmCuAdminProfile, efmCuTargetDataRate, efmCuTargetSnrMgn, and efmCuAdaptiveSpectra MUST be performed when the link is Down; attempts to change these objects when the link is Up or Initializing MUST be rejected (SNMP error: inconsistentValue).'
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
