document: rfc-2873
kind: design-rationale
summary: IPv6 traffic class octet has no defined precedence or security parameter bits — only DSCP semantics per RFC 2474 — so there is no conflict between TCP and DiffServ on IPv6. The problem described in this memo is IPv4-specific.
section: "1"
topics:
