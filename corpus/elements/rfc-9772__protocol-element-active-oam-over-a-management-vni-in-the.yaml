document: rfc-9772
kind: protocol-element
summary: Active OAM over a Management VNI in the Geneve network uses IP encapsulation. The Protocol Type field of the Geneve header MUST be set to 0x0800 (IPv4) or 0x86DD (IPv6). Protocols such as BFD and STAMP use UDP transport, and the destination UDP port number in the inner UDP header identifies the OAM protocol.
section: "2.3"
topics:
    - measurement
