document: rfc-2879
kind: protocol-element
summary: The 'JBIG-stripe-size' tag (Integer) indicates the number of scan lines in each JBIG stripe except the last. Legal Internet fax constraints are JBIG-stripe-size=128 (fixed stripe) or JBIG-stripe-size>=0 (no restriction, meaning the whole page is one stripe).
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
