document: rfc-5239
kind: normative-requirement
summary: Each user within a conferencing system MUST be allocated a unique conference user identifier. The conference user identifier is REQUIRED in conference control protocol requests to uniquely identify the requesting user for policy enforcement.
section: "6.3"
rfc2119_level: MUST
topics:
    - realtime
    - security
