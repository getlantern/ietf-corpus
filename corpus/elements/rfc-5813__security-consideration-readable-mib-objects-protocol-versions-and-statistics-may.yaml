document: rfc-5813
kind: security-consideration
summary: Readable MIB objects (protocol versions and statistics) may be sensitive in some environments; access to GET and NOTIFY operations should be controlled and values should potentially be encrypted when transmitted via SNMP. SNMPv3 cryptographic mechanisms are the recommended mitigation.
section: "8"
topics:
    - snmp
    - security
