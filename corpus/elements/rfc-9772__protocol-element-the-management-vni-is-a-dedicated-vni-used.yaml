document: rfc-9772
kind: protocol-element
summary: The Management VNI is a dedicated VNI used as a Geneve control channel carrying only OAM control and management data between tunnel endpoints, with no tenant traffic. The default Management VNI value is 1, though a configured VNI MAY be used.
