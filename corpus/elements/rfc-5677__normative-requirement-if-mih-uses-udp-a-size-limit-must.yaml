document: rfc-5677
kind: normative-requirement
summary: 'If MIH uses UDP, a size limit MUST be set on MIH messages based on the path MTU to destination (or minimum MTU: 576 bytes for IPv4, 1280 bytes for IPv6) to avoid IP fragmentation.'
section: "6.1"
rfc2119_level: MUST
