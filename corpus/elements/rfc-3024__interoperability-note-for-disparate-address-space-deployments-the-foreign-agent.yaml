document: rfc-3024
kind: interoperability-note
summary: 'For disparate address space deployments, the foreign agent demultiplexes forward-tunneled packets using a three-tuple: the mobile node''s home address (inner destination), the home agent''s address (outer source), and the care-of address (outer destination). This disambiguates mobile nodes with conflicting private addresses.'
section: A.2
