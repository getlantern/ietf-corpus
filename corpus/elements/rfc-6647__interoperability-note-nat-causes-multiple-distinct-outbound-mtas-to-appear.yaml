document: rfc-6647
kind: interoperability-note
summary: NAT causes multiple distinct outbound MTAs to appear to originate from a single shared IP address. This can cause greylisting to be applied only to the first connection from that address, exempting later MTAs connecting for the first time from greylisting protection.
section: "4.1"
topics:
    - email
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
