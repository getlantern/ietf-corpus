document: rfc-5124
kind: normative-requirement
summary: If a media description in an offer uses SAVPF and the answerer does not support SAVPF, the media session MUST be rejected. Conversely, if the answerer wants SAVPF but the offer does not use it, the answerer MUST also reject the session and MAY provide a counter-offer.
section: 3.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
