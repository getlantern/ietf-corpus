document: rfc-4582
kind: normative-requirement
summary: If an unrecognized attribute with the M (Mandatory) bit set is received, the message MUST be rejected; unrecognized attributes with M=0 are ignored and the message is processed normally.
section: "5.2"
rfc2119_level: MUST
topics:
