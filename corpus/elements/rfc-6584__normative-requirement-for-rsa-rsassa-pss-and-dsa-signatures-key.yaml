document: rfc-6584
kind: normative-requirement
summary: For RSA, RSASSA-PSS, and DSA signatures, key sizes strictly less than 1024 bits SHOULD NOT be used; sizes between 1024 and 2048 bits inclusive SHOULD be used; sizes above 2048 bits MAY be used.
section: "1.2"
rfc2119_level: SHOULD NOT
