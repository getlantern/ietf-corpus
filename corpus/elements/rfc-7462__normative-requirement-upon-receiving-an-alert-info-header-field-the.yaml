document: rfc-7462
kind: normative-requirement
summary: Upon receiving an Alert-Info header field, the UA's processing MUST conform to the priority rules in Section 11. The UA MUST produce a rendering based on URIs it can understand; unless the message is immediately rejected, it SHOULD provide some alert unless instructed otherwise.
section: "13"
rfc2119_level: MUST
topics:
    - sip
    - realtime
