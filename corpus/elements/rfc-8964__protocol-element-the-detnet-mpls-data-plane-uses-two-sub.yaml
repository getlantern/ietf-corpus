document: rfc-8964
kind: protocol-element
summary: 'The DetNet MPLS data plane uses two sub-layers: a service sub-layer (d-CW plus S-Label) at the bottom of the stack and a forwarding sub-layer (zero or more F-Labels) above it, with data-link and physical layers below. This decomposition maps directly onto the DetNet architecture defined in RFC 8655.'
section: "3.1"
topics:
    - mpls
    - routing
