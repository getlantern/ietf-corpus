document: rfc-6364
kind: normative-requirement
summary: The integer identifier for each source flow definition MUST be unique among all source flows protected by the same FEC repair flow. Any FSSI other than that solely required by the sender MUST be communicated via the FSSI container (not SS-FSSI).
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
