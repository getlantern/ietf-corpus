document: rfc-7925
kind: normative-requirement
summary: An initial DTLS retransmission timer value of 9 seconds with exponential back-off up to no less than 60 seconds is RECOMMENDED. This is chosen to absorb large latency variance from constrained endpoints or network characteristics such as GSM-SMS, while minimizing spurious retransmissions.
section: "11"
rfc2119_level: RECOMMENDED
topics:
    - tls
    - udp
