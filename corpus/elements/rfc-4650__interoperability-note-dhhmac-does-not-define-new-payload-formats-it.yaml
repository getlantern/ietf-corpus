document: rfc-4650
kind: interoperability-note
summary: DHHMAC does not define new payload formats; it reuses existing MIKEY payloads from RFC 3830 (HDR, KEMAC, DH data, Timestamp, ID, SP, RAND, Error, General Extension) with specific restrictions defined in section 4. Only next payload types from Table 4.1.b are permitted; other RFC 3830 next payload values SHALL NOT be applied.
section: "4"
topics:
