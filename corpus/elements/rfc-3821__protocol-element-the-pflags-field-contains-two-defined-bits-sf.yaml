document: rfc-3821
kind: protocol-element
summary: 'The pFlags field contains two defined bits: SF (bit 7) indicates whether the FCIP Frame is an FSF (SF=1) or an encapsulated FC Frame (SF=0), and Ch (bit 0) indicates whether an echoed FSF was intentionally altered by the recipient (Ch=1). The -pFlags field SHALL contain the ones complement of pFlags.'
section: 5.6.1
topics:
