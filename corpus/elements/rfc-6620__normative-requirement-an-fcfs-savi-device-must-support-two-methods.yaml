document: rfc-6620
kind: normative-requirement
summary: 'An FCFS SAVI device MUST support two methods for populating the Prefix List: manual configuration and learning on-link prefixes from Router Advertisement messages received on Trusted Ports. It MUST also send a Router Solicitation on boot using the unspecified source address.'
section: 3.2.1
rfc2119_level: MUST
topics:
