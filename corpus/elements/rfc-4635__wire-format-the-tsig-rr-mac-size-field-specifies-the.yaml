document: rfc-4635
kind: wire-format
summary: The TSIG RR 'MAC size' field specifies the length in octets of the MAC field. Truncation is signaled by a MAC size less than the full HMAC output length. The minimum allowable MAC size is the larger of 10 octets and half the hash function output length.
section: "3.1"
topics:
