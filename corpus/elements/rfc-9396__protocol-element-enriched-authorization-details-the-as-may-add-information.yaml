document: rfc-9396
kind: protocol-element
summary: 'Enriched authorization details: the AS MAY add information to authorization details objects in the token response beyond what the client originally requested (e.g., specific account identifiers or record locations selected by the user during consent). Whether enrichment is allowed is part of the definition of each authorization details type.'
