document: rfc-3996
kind: protocol-element
summary: The 'successful-ok-events-complete' status code (0x0007) indicates that the Get-Notifications response is the last response for a Subscription object. It is returned when the Subscription Object is canceled, deleted, lease expires, or the 'job-completed' event occurs for a Per-Job Subscription.
section: "10.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
