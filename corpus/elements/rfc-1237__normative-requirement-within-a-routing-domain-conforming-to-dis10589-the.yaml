document: rfc-1237
kind: normative-requirement
summary: Within a routing domain conforming to DIS10589, the lower-order octets of the NSAP should be structured as ID and SEL fields. End systems with non-conforming addresses may require additional manual configuration and be subject to inferior routing performance.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
