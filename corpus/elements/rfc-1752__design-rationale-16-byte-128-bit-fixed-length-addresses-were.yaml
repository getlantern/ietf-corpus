document: rfc-1752
kind: design-rationale
summary: 16-byte (128-bit) fixed-length addresses were chosen as the best compromise over 8-byte (64-bit), 20-byte OSI NSAP, and variable-length alternatives. The majority view was that 64-bit addresses were insufficient for the hierarchy needed in the future Internet, while 128 bits supports 10^9 networks even with inherent allocation inefficiency.
section: "10.2"
topics:
