document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST be a good network citizen with TCP-compatible congestion control as defined in RFC 2914. iSCSI implementations MUST NOT use multiple connections as a means to avoid transport-layer congestion control.
section: "9.3"
rfc2119_level: MUST
topics:
