document: rfc-9827
kind: design-rationale
summary: IKEv2 currently lacks a mechanism to negotiate the case where both peers agree replay protection is not needed, or to signal that replay protection is not achievable (e.g., multicast SAs with multiple unsynchronized senders). Extending Transform Type 5 is the chosen vehicle to address these gaps via future Transform IDs.
section: "2"
topics:
