document: rfc-5763
kind: protocol-element
summary: 'The setup attribute (a=setup) in SDP determines DTLS client/server roles: the offerer uses actpass, leaving the choice to the answerer. The active side sends the ClientHello; the passive side waits. Separate setup attributes may be used for each media stream.'
