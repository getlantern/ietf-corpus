document: rfc-9917
kind: wire-format
summary: The OSPF Flexible Algorithm Exclude Reverse Admin Group (FAERAG) Sub-TLV has a 2-octet Type field (value 10), a 2-octet Length field (variable, must be a multiple of 4 octets), and a variable-length Extended Admin Group field as defined in RFC 7308. It is a sub-TLV of the OSPF FAD TLV.
