document: rfc-9472
kind: design-rationale
summary: The model specifies only how to locate and retrieve SBOM and vulnerability objects, not their format. This keeps the discovery mechanism neutral and allows format choices (SPDX, CycloneDX, CSAF, CVRF) to be made by bodies such as the Linux Foundation, OASIS, and ISO.
