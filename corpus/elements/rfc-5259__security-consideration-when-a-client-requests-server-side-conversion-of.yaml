document: rfc-5259
kind: security-consideration
summary: When a client requests server-side conversion of a signed body part (e.g., inside multipart/signed), there is no way for the client to verify that the converted content is authentic. A client not trusting the server should download, verify, and convert locally.
section: "13"
topics:
