document: rfc-2580
kind: protocol-element
summary: The AGENT-CAPABILITIES macro conveys the precise set of capabilities present in an agent with respect to one or more MIB modules. Its value is an OBJECT IDENTIFIER that names the sysORID value for which the capabilities statement is valid, enabling management stations to optimize their behavior.
