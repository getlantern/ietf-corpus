document: rfc-8281
kind: normative-requirement
summary: The PCC MUST delegate PCE-initiated LSPs to the PCE upon instantiation (delegation bit=1 in PCRpt). The PCC MUST NOT revoke the delegation for a PCE-initiated LSP on an active PCEP session; all PCRpt messages MUST have the delegation bit set to 1.
section: "6"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
