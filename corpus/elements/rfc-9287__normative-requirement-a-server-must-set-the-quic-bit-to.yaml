document: rfc-9287
kind: normative-requirement
summary: A server MUST set the QUIC Bit to 0 only after processing transport parameters from a client, and MUST NOT remember that a client negotiated the extension in a previous connection and set the QUIC Bit to 0 based on that cached information.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - quic
