document: rfc-8349
kind: design-rationale
summary: The 'valid-lifetime' and 'preferred-lifetime' RA prefix parameters are specified as constant configured values rather than decrementing counters. Decrementing behavior would be reset on configuration reload, no implementation is known to use it, and RFC 4861 explicitly permits constant values.
section: "5.4"
topics:
    - yang
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
