document: rfc-6361
kind: protocol-element
summary: The TNP packet header includes V (2 bits), R (2 bits), M (1 bit), Op-Length (5 bits), Hop Count (8 bits), Egress (RB2) Nickname (16 bits), and Ingress (RB1) Nickname (16 bits), followed by the Inner Destination MAC. Both user data and ESADI packets use this format.
