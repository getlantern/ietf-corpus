document: rfc-3645
kind: normative-requirement
summary: When the client intends to stop using the established security context, it SHOULD delete the context by calling GSS_Delete_sec_context AND SHOULD delete the context on the DNS server by using a TKEY RR with Mode field set to 5 (key deletion).
section: 3.2.1
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
