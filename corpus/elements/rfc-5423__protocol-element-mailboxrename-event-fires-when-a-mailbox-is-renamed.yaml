document: rfc-5423
kind: protocol-element
summary: MailboxRename event fires when a mailbox is renamed. Special IMAP semantics apply for INBOX (child mailboxes are excluded from the rename); implicit child renames and ancestor creations do not generate separate events. Parameters include old and new mailbox identifiers.
section: "4.4"
topics:
    - email
