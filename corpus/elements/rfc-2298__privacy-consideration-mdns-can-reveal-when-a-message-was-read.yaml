document: rfc-2298
kind: privacy-consideration
summary: MDNs can reveal when a message was read, expose mailing list subscribers (if Disposition-Notification-To is passed unmodified to list members), disclose internal hostnames or network topology via returned message headers, and reveal plaintext content of an encrypted message if the original is included in part 3. UAs should allow omission of optional fields and support 'denied' dispositions.
section: "6.2"
topics:
    - email
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
