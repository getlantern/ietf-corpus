summary: 'IANA maintains the ''BGP Tunnel Encapsulation Attribute Sub-TLVs'' registry under the ''Border Gateway Protocol (BGP) Tunnel Encapsulation'' grouping. Types 1–63 use Standards Action; 64–125 First Come First Served; 126–127 Experimental; 128–191 Standards Action; 192–252 First Come First Served; 253–254 Experimental. New entries added: 6 (Tunnel Egress Endpoint), 7 (DS Field), 8 (UDP Destination Port), 9 (Embedded Label Handling), 10 (MPLS Label Stack), 11 (Prefix-SID).'
