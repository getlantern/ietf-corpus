document: rfc-8437
kind: security-consideration
summary: The original IMAP state machine was designed to allow server implementations in which each IMAP authentication identity matches an OS identity and administrative privilege is revoked after authentication. UNAUTHENTICATE is incompatible with that model and is appropriate for performance-sensitive deployments but may not be suitable for the most security-sensitive environments.
