document: rfc-3927
kind: normative-requirement
summary: Implementations of IPv4 Link-Local address autoconfiguration MUST expect address conflicts and MUST be prepared to handle them gracefully by automatically selecting a new address. This requirement applies during the entire period a host uses a 169.254/16 address, not just during initial configuration.
section: "1.5"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
