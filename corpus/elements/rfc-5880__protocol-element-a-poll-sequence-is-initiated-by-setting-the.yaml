document: rfc-5880
kind: protocol-element
summary: A Poll Sequence is initiated by setting the Poll (P) bit in outgoing BFD Control packets; the remote system MUST immediately reply with the Final (F) bit set, independent of its periodic schedule. The Poll Sequence terminates upon receipt of a packet with the Final bit set. A packet MUST NOT have both P and F set simultaneously.
section: "6.5"
topics:
    - routing
