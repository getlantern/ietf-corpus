document: rfc-8668
kind: normative-requirement
summary: When the P-Flag is set in the Parent L3 Neighbor Descriptor flags field, one and only one of the parallel-adjacency identification sub-TLVs (IPv4 Interface Address sub-TLV 6, IPv6 Interface Address sub-TLV 12, or Link Local/Remote Identifiers sub-TLV 4) MUST be present and MUST immediately follow the flags field.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
