document: rfc-5132
kind: protocol-element
summary: ipMcastSsmRangeTable holds the configured ranges of multicast group addresses to which Source-Specific Multicast semantics (RFC 3569) should be applied. Entries are indexed by address type, address, and prefix length, and are managed via RowStatus.
