document: rfc-9762
kind: normative-requirement
summary: If the delegated prefix is too long to be used for SLAAC, the client MUST ignore it. If it is shorter than required, the client SHOULD accept it and allocate one or more longer prefixes suitable for SLAAC.
section: "7.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
