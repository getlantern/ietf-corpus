summary: The fault detection procedures in RFC 6425 are applicable to all P2MP MPLS protocols, and this document explicitly extends their applicability to SR P2MP Policies. All considerations and limitations in RFC 6425 Section 6 apply to SR P2MP Policy ping as defined here.
