document: rfc-5844
kind: normative-requirement
summary: For selective de-registration of only the IPv4 home address, the Proxy Binding Update with lifetime=0 MUST include exactly one IPv4 Home Address Request option for the address being de-registered and MUST NOT include any Home Network Prefix options; the Binding Cache entry MUST NOT be deleted, only the IPv4 state removed.
section: 3.1.2.5
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
