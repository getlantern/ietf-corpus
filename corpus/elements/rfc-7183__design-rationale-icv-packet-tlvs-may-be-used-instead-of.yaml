document: rfc-7183
kind: design-rationale
summary: ICV Packet TLVs MAY be used instead of or in addition to message-level protection. For OLSRv2, packet protection has different properties than message protection; when packets contain multiple messages, packet protection has lower overhead in space and computation time.
section: "4"
topics:
