document: rfc-3922
kind: normative-requirement
summary: To map the XMPP 'from' attribute of a message stanza to the CPIM 'From' header, the gateway MUST remove the resource identifier and MUST append the 'im:' URI scheme; it MAY include a CPIM 'Formal-name' for the sender.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
