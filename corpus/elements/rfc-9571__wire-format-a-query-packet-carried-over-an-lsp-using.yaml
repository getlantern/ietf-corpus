document: rfc-9571
kind: wire-format
summary: 'A Query packet carried over an LSP using an SFL has the label stack: LSP Label / SFL / GAL / ACH (Type=0x000A for Direct Loss Measurement) / Measurement Message. The label stack is identical to that of the user data service packets being instrumented, plus the GAL to distinguish OAM from data.'
