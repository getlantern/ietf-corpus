document: rfc-2347
kind: normative-requirement
summary: If the transfer was initiated with a Read Request and the client accepts the OACK, the client sends an ACK with data block number set to 0 to confirm the negotiated values. If initiated with a Write Request, the client begins the transfer with the first DATA packet using the negotiated values.
section: Negotiation Protocol
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
