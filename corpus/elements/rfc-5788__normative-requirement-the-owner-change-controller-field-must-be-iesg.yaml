document: rfc-5788
kind: normative-requirement
summary: The Owner/Change controller field MUST be 'IESG' for any 'common use' keyword registration specified in an IETF Review document. When the controller is not a Standardization Organization, the registration MUST clarify whether it is controlled by a company or individual.
section: "3"
rfc2119_level: MUST
topics:
