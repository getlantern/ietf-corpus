document: rfc-2439
kind: normative-requirement
summary: Penalties for instability should only be applied when a route is removed or replaced, not when a route is added. Consistent application of this constraint results in a stable secondary path being preferred over a damped unstable primary path.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
