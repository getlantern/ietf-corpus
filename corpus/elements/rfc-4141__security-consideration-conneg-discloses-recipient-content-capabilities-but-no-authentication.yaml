document: rfc-4141
kind: security-consideration
summary: CONNEG discloses recipient content capabilities, but no authentication mechanism for the requestor or respondent is specified. The disclosed information is intended to be safe for public distribution; the disclosing server or client is responsible for determining whether additional security measures are required.
