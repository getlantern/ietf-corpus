document: rfc-8613
kind: security-consideration
summary: OSCORE provides end-to-end protection of CoAP messages across intermediary nodes such as CoAP-to-HTTP proxies, which previously required DTLS/TLS termination at the proxy. Proxies that terminate transport-layer security can eavesdrop on, manipulate, inject, delete, or reorder messages; OSCORE prevents this by protecting the application layer.
section: "12.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
