document: rfc-2878
kind: protocol-element
summary: The Line-Identification Configuration Option (Type 2, Length 4) carries a 12-bit LAN Segment Number and 4-bit Bridge Number for use when the PPP link is treated as an independent LAN segment in source routing. Both bridges MUST agree on the LAN segment number; disagreement prevents BCP from entering the Opened state.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
