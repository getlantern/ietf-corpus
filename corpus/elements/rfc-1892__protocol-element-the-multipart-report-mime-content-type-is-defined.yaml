document: rfc-1892
kind: protocol-element
summary: The Multipart/Report MIME content-type is defined with MIME type 'multipart', subtype 'report', required parameters 'boundary' and 'report-type', no optional parameters, and 7-bit encoding. The report-type parameter identifies the type of report and equals the MIME content sub-type of the second body part.
