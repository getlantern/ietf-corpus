document: rfc-7515
kind: protocol-element
summary: The 'alg' (Algorithm) Header Parameter identifies the cryptographic algorithm used to secure the JWS. Its value is a case-sensitive ASCII StringOrURI. This Header Parameter MUST be present and MUST be understood and processed by implementations.
