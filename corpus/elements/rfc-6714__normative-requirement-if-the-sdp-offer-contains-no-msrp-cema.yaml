document: rfc-6714
kind: normative-requirement
summary: If the SDP offer contains no 'msrp-cema' attribute and the c/m-line address does not match the 'path' attribute MSRP URI, the answerer MUST either reject the MSRP connection (zero port) or reject the SIP request with 488 Not Acceptable Here.
section: "4.3"
rfc2119_level: MUST
topics:
