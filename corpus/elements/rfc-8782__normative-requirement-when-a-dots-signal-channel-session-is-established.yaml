document: rfc-8782
kind: normative-requirement
summary: When a DOTS signal channel session is established via TLS but DTLS failed, the DOTS client periodically probes to discover whether DTLS becomes available. Such probing SHOULD NOT occur more than every 24 hours and MUST NOT occur more than every 5 minutes.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
