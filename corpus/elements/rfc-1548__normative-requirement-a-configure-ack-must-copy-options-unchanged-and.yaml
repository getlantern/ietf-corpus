document: rfc-1548
kind: normative-requirement
summary: A Configure-Ack MUST copy Options unchanged and in order from the Configure-Request. On reception, the Identifier and Options in a Configure-Ack MUST exactly match the last transmitted Configure-Request; invalid packets are silently discarded.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
