document: rfc-4932
kind: normative-requirement
summary: At least one <host:add>, <host:rem>, or <host:chg> element MUST be provided in an <update> command if the command is not being extended. All of these elements MAY be omitted if an <update> extension is present.
section: 3.2.5
rfc2119_level: MUST
topics:
    - registry
