document: rfc-5577
kind: normative-requirement
summary: The bit rate MUST remain constant for a particular payload type value. An application MAY switch bit rates and clock rates from packet to packet by defining different payload type values and switching between them.
section: "3.2"
rfc2119_level: MUST
topics:
