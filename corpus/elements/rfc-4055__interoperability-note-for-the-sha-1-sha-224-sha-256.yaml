document: rfc-4055
kind: interoperability-note
summary: For the SHA-1, SHA-224, SHA-256, SHA-384, and SHA-512 AlgorithmIdentifiers, implementations MUST accept both a NULL parameters field and an absent parameters field as legal and equivalent encodings. This dual-acceptance is required because the OPTIONAL nature of the parameters was lost and then recovered in the ASN.1 syntax history, causing divergent implementations.
section: "2.1"
topics:
    - pkix
    - crypto
