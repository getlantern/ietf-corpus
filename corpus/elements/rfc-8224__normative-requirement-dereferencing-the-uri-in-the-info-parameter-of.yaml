document: rfc-8224
kind: normative-requirement
summary: Dereferencing the URI in the 'info' parameter of the Identity header field MUST be supported by all verification service implementations as the baseline means of credential acquisition. Verifiers SHOULD discover credentials this way unless they have an implementation-specific alternative.
section: "7.2"
rfc2119_level: MUST
topics:
