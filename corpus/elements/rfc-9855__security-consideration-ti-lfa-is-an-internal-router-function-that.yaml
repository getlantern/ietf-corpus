document: rfc-9855
kind: security-consideration
summary: TI-LFA is an internal router function that steers traffic to the post-convergence path as quickly as possible upon local failure, minimizing disruption and providing a modest security enhancement. It does not protect external destinations or resources outside the IGP area.
