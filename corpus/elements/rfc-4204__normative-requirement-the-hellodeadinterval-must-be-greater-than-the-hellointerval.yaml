document: rfc-4204
kind: normative-requirement
summary: The HelloDeadInterval MUST be greater than the HelloInterval and SHOULD be at least 3 times the HelloInterval value. If the fast keep-alive mechanism is not used, both parameters MUST be set to zero.
section: 3.2.1
rfc2119_level: MUST
topics:
    - routing
