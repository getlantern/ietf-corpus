document: rfc-8221
kind: design-rationale
summary: ENCR_AES_GCM_16 was promoted from SHOULD+ to MUST because it has been widely implemented for ESP due to increased performance and key longevity compared to ENCR_AES_CBC, and to favor authenticated encryption (AEAD) algorithms broadly.
