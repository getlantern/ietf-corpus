document: rfc-9753
kind: design-rationale
summary: The P and I flags already existed in the PCEP common object header (RFC 5440) for path computation requests but were disallowed in stateful PCEP. Rather than define new flags, this document reuses the existing P and I flags under a new capability negotiation (R flag), keeping the semantics consistent while extending applicability to stateful messages.
section: "1"
topics:
