document: rfc-4734
kind: security-consideration
summary: Section 5 addresses security considerations for modem, fax, and text telephony events in the telephone-event RTP payload. The general security framework from RFC 4733 applies; implementations should be aware that unauthorized injection of modem/fax events could disrupt ongoing data sessions or trigger unintended mode transitions.
section: "5"
topics:
    - security
    - rtp
    - realtime
