document: rfc-8302
kind: normative-requirement
summary: When complete Push Directory information is used by all RBridges in a Data Label, a gratuitous ARP or unsolicited Neighbor Advertisement SHOULD be discarded rather than ingressed and flooded, to prevent forged announcements from corrupting the directory-based view.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - routing
    - security
