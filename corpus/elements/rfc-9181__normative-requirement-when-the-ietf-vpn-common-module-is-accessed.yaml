document: rfc-9181
kind: normative-requirement
summary: When the 'ietf-vpn-common' module is accessed via NETCONF, the mandatory-to-implement secure transport is SSH (RFC 6242). When accessed via RESTCONF, the mandatory-to-implement secure transport is TLS (RFC 8446).
