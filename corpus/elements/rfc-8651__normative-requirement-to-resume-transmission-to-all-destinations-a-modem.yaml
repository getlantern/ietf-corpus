document: rfc-8651
kind: normative-requirement
summary: To resume transmission to all destinations, a modem MUST send the Restart Data Item in a Session Update Message; to resume for a particular destination, it MUST use a Destination Update Message. A router receiving Restart SHOULD resume transmission of the identified traffic.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
