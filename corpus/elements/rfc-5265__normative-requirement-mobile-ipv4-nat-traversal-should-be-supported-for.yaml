document: rfc-5265
kind: normative-requirement
summary: Mobile IPv4 NAT traversal SHOULD be supported for both x-MIP and i-MIP layers; IPsec NAT traversal (RFC 3947, RFC 3948) SHOULD be supported for the VPN layer. NAT traversal for the inner MIPv4 layer may be necessary even without an explicit NAT if the VPN implementation NATes tunnel inner addresses.
section: "2.5"
rfc2119_level: SHOULD
topics:
    - nat
    - mobility
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
