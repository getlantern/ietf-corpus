kind: registry
summary: IANA updated the SCTP 'Chunk Flags' registry for the DATA chunk to register the I bit at value 0x08, following the chunk flag registration procedure of RFC 6096. Existing entries (E=0x01, B=0x02, U=0x04) are retained; values 0x10–0x80 remain unassigned.
