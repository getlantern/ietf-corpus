document: rfc-4974
kind: normative-requirement
summary: 'Call collision resolution uses a numeric address comparison: if a node''s source address is numerically greater than the remote source address, it MUST discard the received conflicting Call setup and wait for a response to its own. If numerically smaller, it MUST discard its own setup state and respond to the received Call setup request.'
section: "6.5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
