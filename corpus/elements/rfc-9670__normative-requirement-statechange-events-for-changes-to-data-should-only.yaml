document: rfc-9670
kind: normative-requirement
summary: StateChange events for changes to data SHOULD only be sent for data the user has subscribed to and MUST NOT be sent for any Account where the user is not subscribed to any records, except where that Account belongs to the user.
section: "1.4"
rfc2119_level: MUST NOT
