document: rfc-7001
kind: protocol-element
summary: The Authentication-Results header field is a structured trace header field added by MTAs to report the results of message authentication checks (e.g., DKIM, SPF, iprev, SMTP AUTH). It contains an authserv-id identifying the ADMD that performed the checks, followed by one or more method=result statements with optional supporting property data.
section: "2.1"
topics:
