document: rfc-8393
kind: protocol-element
summary: Per-SFP metadata-only packets are sent by setting the correct SPI in the NSH and setting the SI to the correct value for the SFP hop where metadata is introduced, enabling metadata installation at points of consumption without accompanying data packets.
