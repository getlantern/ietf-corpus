document: rfc-9174
kind: security-consideration
summary: 'BP Node Impersonation threat: when using DTN-ignorant CAs that cannot issue certificates binding a node ID, the peer''s node ID in SESS_INIT cannot be cryptographically verified. This allows any peer holding a valid network-level certificate to claim an arbitrary node ID. DTN-aware CA certificates providing NODE-ID validation are the preferred mitigation.'
section: "7.9"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
