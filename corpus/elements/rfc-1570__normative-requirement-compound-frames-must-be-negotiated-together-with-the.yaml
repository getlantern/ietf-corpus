document: rfc-1570
kind: normative-requirement
summary: Compound-Frames MUST be negotiated together with the Self-Describing-Padding option. Additionally, if FCS-Alternatives has been negotiated, self-describing padding MUST always be added to compound frames.
section: "2.4"
rfc2119_level: MUST
