document: rfc-7234
kind: protocol-element
summary: The Expires header field carries an HTTP-date timestamp after which the response is considered stale. A recipient MUST interpret invalid date formats (including '0') as representing a time in the past. If Cache-Control max-age or s-maxage is present, the Expires field MUST be ignored.
section: "5.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
