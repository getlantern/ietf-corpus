document: rfc-6470
kind: protocol-element
summary: The 'netconf-confirmed-commit' notification includes a conditional 'timeout' leaf (uint32, seconds) present only when confirm-event is 'start' or 'extend', indicating the approximate seconds until a 'timeout' event may occur. The common-session-parms are included for all events except 'timeout'.
