document: rfc-8150
kind: protocol-element
summary: The mplsLpsMeConfigTable associates Maintenance Entities with protection domains, using the same index triple (mplsOamIdMegIndex, mplsOamIdMeIndex, mplsOamIdMeMpIndex) as mplsOamIdMeTable. Each entry specifies mplsLpsMeConfigDomain (which protection domain) and mplsLpsMeConfigPath (working or protection).
