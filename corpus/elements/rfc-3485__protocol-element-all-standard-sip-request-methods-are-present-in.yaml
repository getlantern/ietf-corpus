document: rfc-3485
kind: protocol-element
summary: 'All standard SIP request methods are present in the dictionary as priority-1 or priority-2 entries, each with two forms: the method name alone and the method name followed by a space. Methods included: INVITE, ACK, BYE, REGISTER, SUBSCRIBE, NOTIFY, PRACK, UPDATE (priority 1–2); OPTIONS, CANCEL, REFER, INFO, MESSAGE (priority 3–4).'
section: Appendix A
