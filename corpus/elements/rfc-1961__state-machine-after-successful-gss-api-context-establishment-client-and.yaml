document: rfc-1961
kind: state-machine
summary: After successful GSS-API context establishment, client and server exchange protection-level subnegotiation messages (mtyp=0x02). If client rejects server's level, client closes connection; otherwise both sides proceed to per-message GSS-API encapsulation for all subsequent traffic.
