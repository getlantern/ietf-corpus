document: rfc-6846
kind: protocol-element
summary: 'ROHC-TCP defines four IPv4 IP-ID compression behaviors: sequential network byte order (NBO), sequential byte-swapped, random (RND), and constant zero. A control field tracks which behavior is active and determines the set of packet formats and irregular chain contents for each IP header.'
