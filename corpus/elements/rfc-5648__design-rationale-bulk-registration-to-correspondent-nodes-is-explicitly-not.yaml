document: rfc-5648
kind: design-rationale
summary: Bulk registration to correspondent nodes is explicitly not supported because the return routability mechanism in RFC 3775 cannot be easily extended to verify multiple care-of addresses stored in a single Binding Update, which would require per-CoA Care-of Keygen tokens.
