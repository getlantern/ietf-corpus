document: rfc-5603
kind: design-rationale
summary: The three-layer MIB architecture (service-specific / generic PW / PSN-specific) is designed to sufficiently isolate PW services from the underlying PSN, while providing a standard means to connect any supported service to any supported PSN. This allows the Ethernet PW MIB to be agnostic to the PSN type.
