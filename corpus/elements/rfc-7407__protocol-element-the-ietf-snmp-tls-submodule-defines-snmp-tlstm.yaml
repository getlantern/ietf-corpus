document: rfc-7407
kind: protocol-element
summary: The ietf-snmp-tls submodule defines /snmp/tlstm/cert-to-name (id uint32, fingerprint tls-fingerprint, map-type identityref, conditional name string) and augments /snmp/target and /snmp/engine/listen with 'tls' and 'dtls' transport cases carrying ip, port, client-fingerprint, server-fingerprint, and server-identity fields. It is gated by the 'tlstm' feature.
