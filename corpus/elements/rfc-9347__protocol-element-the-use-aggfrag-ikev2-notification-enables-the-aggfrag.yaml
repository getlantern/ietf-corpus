document: rfc-9347
kind: protocol-element
summary: The USE_AGGFRAG IKEv2 notification enables the AGGFRAG_PAYLOAD payload on a Child SA pair, using a method similar to USE_TRANSPORT_MODE negotiation. The initiator includes it in an SA payload; if accepted, both sides include it in the response.
section: "5.1"
topics:
