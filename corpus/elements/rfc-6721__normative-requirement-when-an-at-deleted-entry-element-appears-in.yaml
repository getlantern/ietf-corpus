document: rfc-6721
kind: normative-requirement
summary: When an at:deleted-entry element appears in a Feed document other than its source feed, or when used in a Deleted Entry Document that has a source feed, it MUST contain an atom:source element to preserve source provenance during aggregation.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
