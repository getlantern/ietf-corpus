document: rfc-6560
kind: security-consideration
summary: A large client-supplied iteration count can cause a denial-of-service attack against the KDC by forcing expensive key derivation. The KDC MUST reject authentication requests where the iteration count exceeds a locally configured maximum value.
section: "6.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
