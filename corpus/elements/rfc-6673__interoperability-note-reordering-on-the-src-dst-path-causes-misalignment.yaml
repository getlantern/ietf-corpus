document: rfc-6673
kind: interoperability-note
summary: Reordering on the Src->Dst path causes misalignment of sequence numbers at Dst relative to the sender, complicating one-way inference from round-trip measurements; RFC 4737 reordering metrics and their implications were not available when RFC 2680 and RFC 2681 were published.
