document: rfc-7176
kind: registry
summary: A new TRILL Neighbor TLV NEIGHBOR RECORD Flags sub-registry is created under TRILL Parameters with Standards Action policy. Bit 0 (Fail) indicates failed MTU test and bit 1 (OOMF) indicates the IS is offering the Overload Originated Multi-destination Frame service; bits 2–7 are unassigned.
