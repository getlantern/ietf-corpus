document: rfc-3876
kind: normative-requirement
summary: If the control is marked critical and the server does not support it or it is applied to an operation other than Search, the server MUST return an unavailableCriticalExtension error. If not critical in those same conditions, the server MUST ignore the control.
section: "2"
rfc2119_level: MUST
topics:
    - ldap
