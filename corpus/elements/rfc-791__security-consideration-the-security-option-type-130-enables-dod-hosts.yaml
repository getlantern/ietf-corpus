document: rfc-791
kind: security-consideration
summary: The Security option (Type=130) enables DoD hosts to attach classification levels (Unclassified through Top Secret), compartmentation codes, and handling restriction markings to datagrams. Networks handling classified traffic are responsible for controlling access to and use of high-precedence and security designations.
section: "3.1"
