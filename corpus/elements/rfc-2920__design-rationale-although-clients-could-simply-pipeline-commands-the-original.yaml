document: rfc-2920
kind: design-rationale
summary: Although clients could simply pipeline commands, the original RFC 821 did not explicitly require servers to support pipelining, resulting in a non-trivial number of deployed servers that cannot handle it. The extension mechanism allows clients to pipeline only against servers that have declared capability, avoiding interoperability failures.
