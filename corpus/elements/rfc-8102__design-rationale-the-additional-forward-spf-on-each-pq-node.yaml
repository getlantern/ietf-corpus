document: rfc-8102
kind: design-rationale
summary: The additional forward SPF on each PQ-node also collects complete path attributes for the second R-LFA path segment (PQ-node to destination), enabling the alternate-selection policy from RFC 7916 Section 6.2.4 to evaluate both path segments rather than only the S-to-PQ-node segment.
section: "3.2"
topics:
