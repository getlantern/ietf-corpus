document: rfc-5546
kind: protocol-element
summary: The REQUEST-STATUS property carries transaction/request status information in REPLY messages. Its value is a hierarchical numeric code (e.g., 2.0 = success, 3.x = client error, 4.x = scheduling error, 5.x = server error) optionally followed by a human-readable description and data.
