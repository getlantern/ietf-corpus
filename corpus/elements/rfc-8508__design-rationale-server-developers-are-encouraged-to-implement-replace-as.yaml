document: rfc-8508
kind: design-rationale
summary: Server developers are encouraged to implement REPLACE as an atomic operation to simplify error handling, minimize operational concerns, and reduce potential security problems. For systems where atomicity is not possible, communication with the requesting client must ensure no confusion of message store state.
