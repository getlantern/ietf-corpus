document: rfc-3284
kind: protocol-element
summary: The default code table defines s_near=4 and s_same=3, giving 9 COPY address modes. It provides 256 instruction entries including single RUN (index 0), 18 single ADD entries, single COPY entries for all 9 modes, and combined ADD+COPY and COPY+ADD pairs for common small-size patterns (indices 163-255).
