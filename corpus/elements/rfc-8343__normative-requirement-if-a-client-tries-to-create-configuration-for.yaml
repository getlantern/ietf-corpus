document: rfc-8343
kind: normative-requirement
summary: If a client tries to create configuration for a system-controlled interface not present in the operational state and the implementation does not support pre-provisioning, a NETCONF server MUST reply with an rpc-error with the error-tag 'invalid-value'.
section: "5"
rfc2119_level: MUST
topics:
    - yang
    - netconf
