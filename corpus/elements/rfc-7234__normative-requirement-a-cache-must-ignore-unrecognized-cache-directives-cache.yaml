document: rfc-7234
kind: normative-requirement
summary: A cache MUST ignore unrecognized cache directives. Cache-Control extensions are designed as modifiers to existing directives, with the old directive supplied alongside the new one, so that caches that do not understand the extension fall back to the behavior of the old directive.
section: 5.2.3
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
