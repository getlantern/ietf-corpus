document: rfc-7357
kind: normative-requirement
summary: 'When MAC address confidences are tied between duplicates from multiple RBridges, the ingress RBridge MUST adopt one of two strategies: (1) pseudorandomly select one egress for all traffic to that MAC/label, or (2) use ECMP at the flow level if it can tolerate the resulting address flip-flopping.'
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
