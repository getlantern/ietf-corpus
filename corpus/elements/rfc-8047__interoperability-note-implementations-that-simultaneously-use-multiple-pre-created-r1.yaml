document: rfc-8047
kind: interoperability-note
summary: Implementations that simultaneously use multiple pre-created R1 packets indexed by Initiator IP addresses may inadvertently fail the puzzle solution of I2 packets when R1 includes a LOCATOR_SET, because the I1 and I2 may arrive from different source addresses. The Responder's puzzle indexing mechanism must be flexible enough to accommodate this case.
section: 4.2.8
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
