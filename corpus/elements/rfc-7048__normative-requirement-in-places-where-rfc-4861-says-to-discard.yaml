document: rfc-7048
kind: normative-requirement
summary: In places where RFC 4861 says to discard/delete the NCE after N probes (Sections 7.3 and 7.3.3, and Appendix C), an implementation MUST instead transition to the UNREACHABLE state, except that NCEs created by a Redirect MAY be deleted rather than transitioned.
