summary: 'The IPFIX-MIB module (OID mib-2 193) defines two MIB modules: IPFIX-MIB for monitoring IPFIX Exporters and Collectors, and IPFIX-SELECTOR-MIB for standardized filtering and sampling selector functions. The IPFIX-MIB consists of seven main tables plus augmenting statistical tables.'
