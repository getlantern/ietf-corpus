document: rfc-1565
kind: interoperability-note
summary: The MIB supports both TCP/IP and OSI network service applications within the same framework. Protocol identification, remote application naming, and directory linkage all carry OSI-specific encodings (Application Context OIDs, Distinguished Names, X.400 MTA syntax) alongside IP-based conventions.
