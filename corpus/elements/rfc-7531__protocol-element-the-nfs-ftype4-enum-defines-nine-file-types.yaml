summary: 'The nfs_ftype4 enum defines nine file types: NF4REG (1), NF4DIR (2), NF4BLK (3), NF4CHR (4), NF4LNK (5), NF4SOCK (6), NF4FIFO (7), NF4ATTRDIR (8), and NF4NAMEDATTR (9). NF4ATTRDIR and NF4NAMEDATTR are NFSv4-specific additions supporting named attributes.'
