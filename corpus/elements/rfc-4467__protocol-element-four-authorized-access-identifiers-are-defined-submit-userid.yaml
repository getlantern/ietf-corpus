document: rfc-4467
kind: protocol-element
summary: 'Four authorized access identifiers are defined: ''submit+<userid>'' (limited to message submission entities acting on behalf of that userid), ''user+<userid>'' (limited to sessions logged in as that specific userid), ''authuser'' (any authenticated IMAP session), and ''anonymous'' (any IMAP session including anonymous).'
section: "3"
topics:
