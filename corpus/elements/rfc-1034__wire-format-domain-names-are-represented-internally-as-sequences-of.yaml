document: rfc-1034
kind: wire-format
summary: Domain names are represented internally as sequences of labels, where each label is a one-octet length field followed by that many octets of data. A zero-length octet terminates the sequence. The total number of octets representing a domain name (sum of all label octets and length octets) is limited to 255.
section: "3.1"
