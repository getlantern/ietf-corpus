document: rfc-6156
kind: design-rationale
summary: The packet translation behaviors are designed so that a TURN server can be implemented as a user-land application without special OS privileges, consistent with the principle stated in RFC 5766 Section 2.6. Both preferred and alternate translation behaviors follow this constraint.
