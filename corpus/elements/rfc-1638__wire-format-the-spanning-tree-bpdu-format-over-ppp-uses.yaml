document: rfc-1638
kind: wire-format
summary: The Spanning Tree BPDU format over PPP uses PPP Protocol field set to the spanning tree protocol identifier (e.g., 0x0201 for IEEE 802.1D/G, 0x0203 for IBM Source Route Bridge), followed by BPDU data and Frame FCS; no MAC or 802.2 LLC header is present.
