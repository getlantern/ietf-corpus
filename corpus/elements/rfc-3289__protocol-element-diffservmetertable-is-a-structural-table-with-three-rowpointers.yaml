document: rfc-3289
kind: protocol-element
summary: 'diffServMeterTable is a structural table with three RowPointers: ''succeedNext'' for conforming traffic, ''failNext'' for non-conforming traffic, and ''specific'' pointing to the meter parameters. Multiple meter entries chained via failNext implement multi-rate meters such as trTCM.'
section: 3.3.1
topics:
