document: rfc-7950
kind: wire-format
summary: YANG data nodes are XML-encoded using the module's declared namespace URI. Top-level nodes appear as child elements of NETCONF <config> or <data> elements in any order. Augmented nodes carry the augmenting module's namespace rather than the augmented module's namespace.
