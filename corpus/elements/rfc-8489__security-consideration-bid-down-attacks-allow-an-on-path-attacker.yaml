document: rfc-8489
kind: security-consideration
summary: Bid-down attacks allow an on-path attacker to remove PASSWORD-ALGORITHMS or Username anonymity capability indicators, forcing the client and server to use weaker security. The nonce cookie mechanism is designed to detect such stripping, but requires both client and server to implement RFC 8489.
section: 16.1.3
topics:
    - nat
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
