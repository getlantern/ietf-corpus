document: rfc-4315
kind: wire-format
summary: A uid-set is defined as (uniqueid / uid-range) *("," uid-set), and a uid-range is two uniqueid values separated by ":" representing all values between them inclusive; e.g., 2:4 and 4:2 are equivalent.
