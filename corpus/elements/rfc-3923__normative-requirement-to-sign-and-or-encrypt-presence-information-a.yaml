document: rfc-3923
kind: normative-requirement
summary: To sign and/or encrypt presence information, a sending agent MUST generate an application/pidf+xml object, sign and/or encrypt it, and provide the result in an <e2e/> child of a <presence/> stanza that MUST include a 'to' attribute (directed presence only).
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
