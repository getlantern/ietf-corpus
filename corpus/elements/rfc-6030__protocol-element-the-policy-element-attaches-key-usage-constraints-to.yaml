document: rfc-6030
kind: protocol-element
summary: The <Policy> element attaches key usage constraints to a <Key>, including <StartDate>/<ExpiryDate> for validity period, <NumberOfTransactions> for maximum use count, <KeyUsage> (OTP, CR, Encrypt, Integrity, Verify, Unlock, Decrypt, KeyWrap, Unwrap, Derive, Generate), and <PINPolicy> for PIN enforcement parameters.
section: "5"
