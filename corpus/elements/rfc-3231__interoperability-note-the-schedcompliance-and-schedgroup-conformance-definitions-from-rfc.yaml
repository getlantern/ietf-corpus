document: rfc-3231
kind: interoperability-note
summary: The schedCompliance and schedGroup conformance definitions from RFC 2591 are deprecated by RFC 3231 and replaced by schedCompliance2 and schedGroup2, which add the mandatory schedTriggers object. Implementations conforming only to the deprecated schedGroup omit schedTriggers.
