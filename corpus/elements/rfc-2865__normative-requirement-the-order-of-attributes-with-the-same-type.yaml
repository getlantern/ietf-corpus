document: rfc-2865
kind: normative-requirement
summary: The order of Attributes with the same Type MUST be preserved by proxies. A RADIUS server or client MUST NOT have dependencies on the ordering of attributes of different types, and MUST NOT require attributes of the same type to be contiguous.
section: "5"
rfc2119_level: MUST
topics:
    - radius
