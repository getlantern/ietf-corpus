document: rfc-9651
kind: normative-requirement
summary: When parsing HTTP fields, implementations MUST have behavior indistinguishable from following the specified step-by-step algorithms. For serialization, implementations MAY vary from the specified algorithms so long as the output is correctly handled by the specified parsing algorithm.
section: "1.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
