document: rfc-4872
kind: wire-format
summary: The PRIMARY_PATH_ROUTE object (Class-Num=38, C-Type=1) carries a variable-length list of subobjects encoding resources used by the associated primary working LSP. Subobject length MUST always be a multiple of 4 and at least 4. Defined sub-types are IPv4 Address (1), IPv6 Address (2), Label (3), and Unnumbered Interface (4).
section: "15.1"
topics:
    - mpls
    - routing
