document: rfc-8760
kind: normative-requirement
summary: A UAS MUST be able to properly handle a 'qop' parameter received in an Authorization/Proxy-Authorization header field, and a UAC MUST be able to properly handle a 'qop' parameter received in WWW-Authenticate and Proxy-Authenticate header fields.
