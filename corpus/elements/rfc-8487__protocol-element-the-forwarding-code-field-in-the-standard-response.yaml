document: rfc-8487
kind: protocol-element
summary: 'The Forwarding Code field in the Standard Response Block carries per-hop status: values 0x00–0x0D indicate informational or redirect conditions (e.g., NO_ERROR, WRONG_IF, NO_ROUTE, REACHED_RP, INFO_HIDDEN), while values 0x80–0xFF (high bit set) indicate transitory or auto-recovered fatal errors (e.g., FATAL_ERROR 0x80, NO_SPACE 0x81, ADMIN_PROHIB 0x83).'
section: 3.2.4
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
