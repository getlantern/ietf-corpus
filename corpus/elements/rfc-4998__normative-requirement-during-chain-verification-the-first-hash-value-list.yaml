document: rfc-4998
kind: normative-requirement
summary: During chain verification, the first hash value list of each ArchiveTimeStamp MUST contain the hash value of the previous timestamp's content, each Archive Timestamp MUST be valid relative to the time of the following Archive Timestamp, and the chain's hash algorithm MUST be secure at the time of the first Archive Timestamp of the following chain.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
