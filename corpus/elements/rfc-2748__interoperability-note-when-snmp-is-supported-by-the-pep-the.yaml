document: rfc-2748
kind: interoperability-note
summary: When SNMP is supported by the PEP, the ifindex values in the IN-Int and OUT-Int objects MUST correspond to the same integer values used for the interface in the SNMP MIB-II interface index table, enabling consistent interface identification across management protocols.
section: 2.2.3
topics:
