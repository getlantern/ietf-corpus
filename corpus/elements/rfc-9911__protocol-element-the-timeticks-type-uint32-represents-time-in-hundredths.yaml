document: rfc-9911
kind: protocol-element
summary: The timeticks type (uint32) represents time in hundredths of a second between two epochs modulo 2^32. The timestamp type (derived from timeticks) records the timeticks value at which a specific occurrence happened; it resets to zero when the associated timeticks instance wraps.
