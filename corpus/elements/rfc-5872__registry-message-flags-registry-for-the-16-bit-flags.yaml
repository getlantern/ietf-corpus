document: rfc-5872
kind: registry
summary: Message Flags registry for the 16-bit Flags field in the PANA message header is updated to allow allocation of remaining free bits via Standards Action or IESG Approval. Previously only Standards Action was permitted. Bits 0–5 are already assigned by RFC 5191.
section: "2.2"
topics:
