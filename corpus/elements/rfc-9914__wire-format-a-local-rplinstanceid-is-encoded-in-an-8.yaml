document: rfc-9914
kind: wire-format
summary: A Local RPLInstanceID is encoded in an 8-bit field where bit 0 (most significant) is set to 1, bit 1 is set to 0 for TrackIDs, and the remaining 6 bits carry the Local Instance ID (0–63). The resulting integer value falls in the range 128–191. The tuple (DODAGID, TrackID) forms a globally unique Track identifier.
section: 3.4.2
topics:
