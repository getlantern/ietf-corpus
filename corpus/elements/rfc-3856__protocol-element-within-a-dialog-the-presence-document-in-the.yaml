document: rfc-3856
kind: protocol-element
summary: Within a dialog, the presence document in the NOTIFY request with the highest CSeq header field value is the current one. When no document is present in that NOTIFY, the presence document from the NOTIFY with the next highest CSeq is used.
section: "6.8"
