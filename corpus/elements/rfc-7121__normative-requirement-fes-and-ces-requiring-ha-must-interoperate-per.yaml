document: rfc-7121
kind: normative-requirement
summary: FEs and CEs requiring HA MUST interoperate per the definition in RFC 5810 cold standby setup. This default setup MUST be implemented by CEs and FEs requiring HA; the Fr (CE-CE) plane is out of scope and, if available, is proprietary.
section: "2"
rfc2119_level: MUST
