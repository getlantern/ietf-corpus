document: rfc-5547
kind: design-rationale
summary: 'The ''file-range'' attribute is intentionally distinct from the MSRP Byte-Range header: ''file-range'' describes which portion of the file the application reads and passes to MSRP, while MSRP Byte-Range describes the portion of the resulting MSRP message carried in a single chunk. MSRP always counts from octet 1 of its message.'
section: "6"
topics:
    - realtime
