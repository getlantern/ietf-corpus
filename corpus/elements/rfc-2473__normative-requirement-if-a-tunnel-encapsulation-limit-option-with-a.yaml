document: rfc-2473
kind: normative-requirement
summary: If a Tunnel Encapsulation Limit option with a non-zero value is found in a packet entering a tunnel, the entry-point must include a new TEL option in the encapsulating headers with a limit value one less than the found value.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ip
    - vpn
