document: rfc-8780
kind: design-rationale
summary: Wavelength assignment is expressed in terms of labels and label sets (per RFC 7579/RFC 6205) rather than frequency-specific encoding, because a wavelength is a type of GMPLS label. This alignment with generic GMPLS label mechanisms allows reuse of existing label constraint encoding across the PCEP framework.
section: "1"
topics:
    - routing
    - mpls
