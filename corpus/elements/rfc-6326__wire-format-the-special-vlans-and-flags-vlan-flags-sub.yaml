document: rfc-6326
kind: wire-format
summary: The Special VLANs and Flags (VLAN-Flags) sub-TLV (MT-PORT-CAP sub-TLV type 1, length 8) is carried in every TRILL IIH PDU and contains a 2-byte Port ID, a 2-byte Sender Nickname, a 2-byte field with flags AF/AC/VM/BY and 12-bit Outer.VLAN, and a 2-byte field with flag TR and 12-bit Desig.VLAN.
section: 2.2.1
topics:
    - routing
