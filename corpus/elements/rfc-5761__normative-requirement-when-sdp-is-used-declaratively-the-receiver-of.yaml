document: rfc-5761
kind: normative-requirement
summary: When SDP is used declaratively, the receiver of an 'a=rtcp-mux' attribute MUST be prepared to receive RTCP packets on the RTP port, and any resource reservation must include the RTCP bandwidth.
section: 5.1.1
rfc2119_level: MUST
topics:
