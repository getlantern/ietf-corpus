document: rfc-7231
kind: normative-requirement
summary: An origin server that allows PUT on a given target resource MUST send a 400 (Bad Request) response to a PUT request containing a Content-Range header field, since the payload is likely partial content mistakenly PUT as a full representation.
section: 4.3.4
rfc2119_level: MUST
topics:
    - http
