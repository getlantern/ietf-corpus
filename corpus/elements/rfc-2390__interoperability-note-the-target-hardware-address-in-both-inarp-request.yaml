document: rfc-2390
kind: interoperability-note
summary: The target hardware address in both InARP request and response over Frame Relay will be invalid. This should not cause problems since InARP does not rely on these fields; an implementation may zero-fill or ignore the target hardware address field entirely.
section: "7.2"
topics:
    - ip
