document: rfc-2019
kind: normative-requirement
summary: A node implementing FDDI adjacency detection must set a non-zero LLC priority in all Neighbor Advertisement, Neighbor Solicitation, and (if applicable) Router Advertisement frames on that FDDI interface. If detection is disabled, the priority field must be zero.
section: Interaction with Bridges
rfc2119_level: MUST
topics:
    - ip
