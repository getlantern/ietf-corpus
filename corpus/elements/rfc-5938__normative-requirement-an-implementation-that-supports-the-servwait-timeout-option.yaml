document: rfc-5938
kind: normative-requirement
summary: An implementation that supports the SERVWAIT timeout option SHOULD also implement the REFWAIT timeout option, and REFWAIT SHOULD be enforced when any test session is in progress (started and not stopped).
section: "3.6"
rfc2119_level: SHOULD
topics:
