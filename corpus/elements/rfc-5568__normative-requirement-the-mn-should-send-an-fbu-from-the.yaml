document: rfc-5568
kind: normative-requirement
summary: The MN SHOULD send an FBU from the PAR's link whenever anticipation of handover is feasible. When reverse-tunneling packets to PAR, PAR MUST forward the inner packet to its destination to prevent ingress filtering drops.
section: "3.1"
rfc2119_level: MUST
