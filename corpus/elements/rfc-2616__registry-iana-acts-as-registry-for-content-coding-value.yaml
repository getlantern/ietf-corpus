document: rfc-2616
kind: registry
summary: 'IANA acts as registry for content-coding value tokens. Initially registered: ''gzip'' (RFC 1952 LZ77+CRC32), ''compress'' (LZW), ''deflate'' (RFC 1950 zlib + RFC 1951 deflate), and ''identity'' (no transformation). New tokens SHOULD be publicly specified to enable independent implementation.'
