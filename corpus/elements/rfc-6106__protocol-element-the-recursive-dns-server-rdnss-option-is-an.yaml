document: rfc-6106
kind: protocol-element
summary: The Recursive DNS Server (RDNSS) option is an IPv6 Neighbor Discovery option that carries one or more IPv6 addresses of recursive DNS servers, all sharing a single Lifetime value. Multiple RDNSS options may be used to convey addresses with different Lifetimes.
section: "5.1"
topics:
