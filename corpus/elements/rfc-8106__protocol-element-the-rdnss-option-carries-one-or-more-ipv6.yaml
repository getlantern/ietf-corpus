document: rfc-8106
kind: protocol-element
summary: 'The RDNSS option carries one or more IPv6 addresses of Recursive DNS Servers. Fields: Type (8-bit, value 25), Length (8-bit, in units of 8 octets, minimum 3), Reserved (16-bit), Lifetime (32-bit, in seconds), and one or more 128-bit IPv6 RDNSS addresses. Number of addresses = (Length - 1) / 2.'
section: "5.1"
topics:
    - dns
    - ip
