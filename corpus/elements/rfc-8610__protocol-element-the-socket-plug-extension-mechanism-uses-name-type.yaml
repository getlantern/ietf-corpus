document: rfc-8610
kind: protocol-element
summary: The Socket/Plug extension mechanism uses '$name' (type socket) and '$$name' (group socket) as named extension points that begin as empty choices. Plugs added via '/=' or '//=' augment these points; tools must not raise an error if a socket has no plugs.
