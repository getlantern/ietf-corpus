document: rfc-3347
kind: security-consideration
summary: Data origin authentication is critical since IP networks are vulnerable to source spoofing, where a malicious third party pretends to send packets from the initiator's IP address. Authentication requirements SHOULD be met using standard Internet protocols such as IPsec or TLS.
section: "7.2"
topics:
    - security
    - crypto
    - tls
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
