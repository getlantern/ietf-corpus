document: rfc-5591
kind: normative-requirement
summary: For an outgoing SNMPv3 message to be secured using the Transport Security Model, the application MUST specify a securityModel parameter value of transportSecurityModel(4) in the sendPdu Abstract Service Interface (ASI).
section: 2.3.1
rfc2119_level: MUST
topics:
