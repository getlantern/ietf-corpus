document: rfc-9177
kind: normative-requirement
summary: When using the Q-Block1 option, the client MUST include a Request-Tag option (RFC 9175) with the same value for all payloads of a given body, and MUST ensure the Request-Tag is unique for every distinct body transmitted.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
