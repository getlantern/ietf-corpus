document: rfc-9009
kind: interoperability-note
summary: NPDAO (RFC 6550) and DCO can coexist in the same network and even in the same node. If non-DCO-capable 6LRs are in the DCO's path, route invalidation may fail or be partial. As a fallback, a node may send an NPDAO if it does not receive a DCO targeting itself within a deployment-specific time limit.
section: 4.6.2
topics:
    - routing
