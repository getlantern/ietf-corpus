document: rfc-9068
kind: security-consideration
summary: Authorization servers MUST use a distinct identifier as the 'aud' claim value to uniquely identify access tokens issued for distinct resources, preventing cross-JWT confusion. Authorization servers should also prevent clients from controlling the 'sub' claim in ways that could impersonate high-privilege principals.
section: "5"
topics:
    - oauth
    - jose
    - security
