document: rfc-6290
kind: wire-format
summary: 'The QCD token notification payload contains: Protocol ID (1 octet, MUST be 1), SPI Size (1 octet, MUST be 0), QCD Token Notify Message Type (2 octets, MUST be 16419), and TOKEN_SECRET_DATA (variable, 16–128 octets). The outer IKEv2 generic notification header fields (Next Payload, Critical bit, RESERVED, Payload Length) precede these fields.'
section: "4.1"
topics:
