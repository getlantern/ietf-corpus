document: rfc-6818
kind: normative-requirement
summary: Conforming CAs MUST NOT encode the explicitText field of the user notice policy qualifier as IA5String. This reverses the previous RFC 5280 allowance of IA5String and brings the rule in line with existing practice.
section: "3"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
