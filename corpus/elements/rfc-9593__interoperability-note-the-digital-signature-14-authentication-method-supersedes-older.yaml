document: rfc-9593
kind: interoperability-note
summary: The 'Digital Signature' (14) authentication method supersedes older signature methods (RSA, DSS, ECDSA variants 1, 3, 9, 10, 11). When announcing support for digital signatures, the multi-octet format with AlgorithmIdentifier is used rather than the 3-octet format applicable to the legacy methods.
section: 3.2.2
topics:
    - ipsec
    - crypto
    - pkix
