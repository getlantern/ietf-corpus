document: rfc-3202
kind: design-rationale
summary: 'Four reference points are required to fully characterize bidirectional PVC performance: transmit and receive reference points at each end. A single device may aggregate both directions only if it has access to remote-device information; otherwise two devices must be monitored. Six valid two-device and single-device reference point combination models are defined.'
