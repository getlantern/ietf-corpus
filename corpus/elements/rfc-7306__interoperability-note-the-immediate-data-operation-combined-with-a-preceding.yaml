document: rfc-7306
kind: interoperability-note
summary: The Immediate Data operation combined with a preceding RDMA Write produces the equivalent of the RDMA Write with Immediate Data operation found in InfiniBand, allowing applications such as RSockets to use the same code path over both iWARP and InfiniBand.
section: "6"
