document: rfc-6381
kind: normative-requirement
summary: When the RFC 2231 encoded form ('codecs*') is used, the percent sign, asterisk, and single quote characters have special meaning and MUST themselves be percent encoded. The language element SHOULD be omitted and the character set SHOULD also be omitted.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
