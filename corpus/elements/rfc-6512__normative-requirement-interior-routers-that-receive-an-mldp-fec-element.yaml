document: rfc-6512
kind: normative-requirement
summary: Interior routers that receive an mLDP FEC element with a Recursive or VPN-Recursive Opaque Value MUST NOT interpret the opaque value at all; they treat the FEC as if it were simply an LSP rooted at the intermediate PE node.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
