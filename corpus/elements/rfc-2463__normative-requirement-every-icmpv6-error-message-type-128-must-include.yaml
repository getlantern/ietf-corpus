document: rfc-2463
kind: normative-requirement
summary: Every ICMPv6 error message (Type < 128) MUST include as much of the IPv6 offending packet as will fit without the resulting error message packet exceeding the minimum IPv6 MTU.
section: "2.4"
rfc2119_level: MUST
