document: rfc-8231
kind: state-machine
summary: 'LSP Operational status is encoded in the 3-bit O field of the LSP object: 0=DOWN (not active), 1=UP (signaled), 2=ACTIVE (up and carrying traffic), 3=GOING-DOWN (being torn down), 4=GOING-UP (being signaled). Values 5-7 are reserved.'
