document: rfc-4960
kind: protocol-element
summary: The INIT ACK (Type=2) State Cookie parameter (Type=7) is mandatory and variable-length; it MUST contain all state and parameters needed to recreate the association plus a MAC. The Unrecognized Parameter (Type=8) echoes unknown INIT parameters back to the initiator.
