document: rfc-5348
kind: normative-requirement
summary: If a lost packet is retransmitted, the retransmission MUST be given a new sequence number (the latest in the transmission sequence), not the original sequence number. Transport protocols requiring original sequence numbers must separately distinguish delayed from retransmitted packets.
section: "5.1"
rfc2119_level: REQUIRED
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
