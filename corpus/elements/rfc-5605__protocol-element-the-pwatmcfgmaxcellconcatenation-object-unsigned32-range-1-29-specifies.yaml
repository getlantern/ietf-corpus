document: rfc-5605
kind: protocol-element
summary: The pwAtmCfgMaxCellConcatenation object (Unsigned32, range 1..29) specifies the maximum number of ATM cells that can be concatenated into one PW packet toward the PSN. In non-LDP environments this MAY be changed at any time (though traffic may be interrupted); with LDP signaling it may only be changed when the PW is not active.
