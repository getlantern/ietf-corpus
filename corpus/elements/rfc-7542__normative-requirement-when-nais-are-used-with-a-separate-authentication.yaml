document: rfc-7542
kind: normative-requirement
summary: When NAIs are used with a separate authentication method that secures the username, NAIs MAY be provided in abbreviated form by omitting the username. Omitting the username is RECOMMENDED over using a fixed username such as 'anonymous', as a fixed username is ambiguous about whether the NAI refers to a single user.
section: "2.4"
rfc2119_level: RECOMMENDED
topics:
    - radius
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
