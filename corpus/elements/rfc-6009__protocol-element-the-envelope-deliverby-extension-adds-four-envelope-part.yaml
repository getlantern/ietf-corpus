document: rfc-6009
kind: protocol-element
summary: 'The ''envelope-deliverby'' extension adds four envelope-part strings: ''bytimeabsolute'' (BY parameter converted to restricted ISO 8601 format), ''bytimerelative'' (raw BY integer value), ''bymode'' (''notify'' or ''return''), and ''bytrace'' (''trace'' or empty string), plus an optional '':zone'' argument for time zone shifting of bytimeabsolute.'
