document: rfc-5775
kind: normative-requirement
summary: For baseline secure ALC, the sender IPsec SPD entry MUST be configured to process outbound packets to the destination address and UDP port of the applicable ALC session. The ALC receiver(s) MUST be configured with the SA and SPD entry to properly process IPsec-secured packets from the sender.
section: 5.1.2
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
