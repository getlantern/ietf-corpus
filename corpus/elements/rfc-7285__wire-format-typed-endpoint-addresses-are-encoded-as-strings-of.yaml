document: rfc-7285
kind: wire-format
summary: Typed endpoint addresses are encoded as strings of the form 'type:value' (e.g., 'ipv4:192.0.2.1', 'ipv6:2001:db8::1'). Endpoint prefixes use CIDR notation (e.g., 'ipv4:192.0.2.0/24'). An EndpointAddrGroup is a JSON object mapping address-type strings to arrays of typed endpoint address strings.
section: "10.4"
topics:
