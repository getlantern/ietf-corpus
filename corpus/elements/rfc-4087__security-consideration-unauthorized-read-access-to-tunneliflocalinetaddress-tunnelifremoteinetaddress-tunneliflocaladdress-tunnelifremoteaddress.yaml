document: rfc-4087
kind: security-consideration
summary: Unauthorized read access to tunnelIfLocalInetAddress, tunnelIfRemoteInetAddress, tunnelIfLocalAddress, tunnelIfRemoteAddress, or any object in the tunnelConfigTable or tunnelInetConfigTable would reveal tunnel topology information. GET and NOTIFY access to these objects should be controlled and the values should possibly be encrypted in transit.
section: "6"
topics:
