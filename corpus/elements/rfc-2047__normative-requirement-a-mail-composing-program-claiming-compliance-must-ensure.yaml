document: rfc-2047
kind: normative-requirement
summary: A mail composing program claiming compliance MUST ensure that any string within '*text' or '*ctext' that begins with '=?' and ends with '?=' is a valid encoded-word. Any 'word' within a 'phrase' matching this pattern must also be a valid encoded-word.
section: "7"
rfc2119_level: MUST
