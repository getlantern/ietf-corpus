document: rfc-5910
kind: security-consideration
summary: If a key is compromised, the client can use an 'urgent' update to quickly remove the compromised credentials. For complete removal of a secure delegation, the domain can be set to 'clientHold' or 'serverHold' status after removing the DNSSEC credentials via urgent update.
section: "9"
