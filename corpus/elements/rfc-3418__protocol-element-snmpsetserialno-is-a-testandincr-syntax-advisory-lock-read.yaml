document: rfc-3418
kind: protocol-element
summary: snmpSetSerialNo is a TestAndIncr-syntax advisory lock (read-write) used to allow cooperating command generator applications to coordinate their use of the SNMP set operation; it provides coarse-grain coordination, and finer-grain coordination may use additional similar objects within individual MIB groups.
