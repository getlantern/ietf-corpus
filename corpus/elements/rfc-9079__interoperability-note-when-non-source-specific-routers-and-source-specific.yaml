document: rfc-9079
kind: interoperability-note
summary: 'When non-source-specific routers and source-specific routers are mixed, route starvation may occur: non-source-specific routers discard source-specific routes, starving themselves of routes to destinations only announced by source-specific routers. A connected source-specific backbone with a non-source-specific default route can avoid this.'
section: "6.1"
topics:
    - routing
