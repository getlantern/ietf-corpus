document: rfc-8533
kind: protocol-element
summary: The `path-discovery` RPC operation (gated by `cl-oam:path-discovery` feature) sends a Traceroute-like probe and returns a keyed `response-list` plus the `path-discovery-data` grouping from RFC 8532. The single hop-specific input parameter is `max-ttl` (default 255).
