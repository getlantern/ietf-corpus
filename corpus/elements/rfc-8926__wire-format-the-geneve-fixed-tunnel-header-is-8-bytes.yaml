document: rfc-8926
kind: wire-format
summary: 'The Geneve fixed tunnel header is 8 bytes: Ver (2 bits, current=0), Opt Len (6 bits, in 4-byte multiples, yielding a total header of 8–260 bytes), O flag (1 bit, control packet), C flag (1 bit, critical options present), Rsvd (6 bits, must be zero), Protocol Type (16 bits, Ethertype convention), VNI (24 bits), and Reserved (8 bits).'
