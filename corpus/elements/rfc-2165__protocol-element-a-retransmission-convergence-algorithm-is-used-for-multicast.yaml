document: rfc-2165
kind: protocol-element
summary: 'A retransmission/convergence algorithm is used for multicast discovery: the UA resends each request with a previous-responders list, and agents on the list do not reply. The cycle repeats until no new responses arrive, signaling enumeration is complete.'
section: "3.1"
