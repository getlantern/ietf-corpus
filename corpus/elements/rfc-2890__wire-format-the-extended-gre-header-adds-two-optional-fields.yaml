document: rfc-2890
kind: wire-format
summary: 'The extended GRE header adds two optional fields: a 4-octet Key field (present when bit 2 is set) and a 4-octet Sequence Number field (present when bit 3 is set), appended after the optional Checksum/Reserved1 fields. Bit positions are chosen to be compatible with RFC 1701.'
