document: rfc-2496
kind: normative-requirement
summary: The DS3 interface is unavailable from the onset of 10 contiguous PSESs (P-bit Severely Errored Seconds). While unavailable, only the UAS counter is incremented; all other counters are frozen. The interface becomes available at the onset of 10 contiguous seconds with no PSESs.
section: 2.4.2
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
