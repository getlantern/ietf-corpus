document: rfc-1406
kind: protocol-element
summary: 'dsx1LineCoding is a read-write INTEGER specifying zero code suppression: dsx1JBZS(1) forces pulse in bit 8 of each channel limiting data to 1.344 Mbps, dsx1B8ZS(2) replaces 8 zero bits with bipolar violations pattern, dsx1HDB3(3) for E1, dsx1ZBTSI(4) Zero Byte Time Slot Interchange for ANSI Clear Channels, dsx1AMI(5) no suppression (higher layer must ensure pulse density), other(6).'
section: 4.1.1
