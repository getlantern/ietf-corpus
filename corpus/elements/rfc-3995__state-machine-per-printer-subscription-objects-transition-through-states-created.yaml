document: rfc-3995
kind: state-machine
summary: 'Per-Printer Subscription Objects transition through states: Created (lease starts, sequence-number=0) → Active (events delivered, sequence-number incremented) → Expired (lease time reached, Printer deletes object) or Cancelled (Cancel-Subscription operation). Lease can be extended via Renew-Subscription before expiration. Per-Job Subscription Objects are tied to the Job lifecycle and have no lease.'
section: 5.4.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
