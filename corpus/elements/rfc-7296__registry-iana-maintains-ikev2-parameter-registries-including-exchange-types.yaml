summary: 'IANA maintains IKEv2 parameter registries including: Exchange Types, IKE Payload Types, Transform Types (Encryption, PRF, Integrity, DH Group, ESN), Transform IDs per type, Notify Message Types, ID Types, Certificate Encoding Types, and Configuration Attribute Types. RFC 7296 updates all references from RFC 5996.'
