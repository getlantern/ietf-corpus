document: rfc-9374
kind: privacy-consideration
summary: The MAC address of the wireless interface used for Broadcast Remote ID must remain stable for at least one UA operation, since Bluetooth 4 observers use it to link the Basic ID Message to other Remote ID messages. Changing DET and MAC per operation is insufficient to defeat UA tracking without also changing GCS MAC, IP addresses, and encryption wrapper identifiers.
section: "9.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
