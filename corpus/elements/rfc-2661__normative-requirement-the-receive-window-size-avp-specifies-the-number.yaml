document: rfc-2661
kind: normative-requirement
summary: The Receive Window Size AVP specifies the number of outstanding control messages the peer may send before awaiting acknowledgment. If absent, the peer MUST assume a window size of 4 for its transmit window.
section: 4.4.3
rfc2119_level: MUST
