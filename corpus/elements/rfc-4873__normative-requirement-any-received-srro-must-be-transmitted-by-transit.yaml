document: rfc-4873
kind: normative-requirement
summary: Any received SRRO MUST be transmitted by transit nodes without modification in the corresponding outgoing Path or Resv message. When Resv messages are merged, the merged Resv SHOULD contain all SRROs received in downstream Resv messages.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
