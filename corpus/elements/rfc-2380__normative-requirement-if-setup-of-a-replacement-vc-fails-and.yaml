document: rfc-2380
kind: normative-requirement
summary: If setup of a replacement VC fails and the new reservation is greater than the old, the reservation request MUST be answered with an error. If the new reservation is less than the old, the request MUST be treated as if the modification was successful.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
    - qos
