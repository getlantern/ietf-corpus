document: rfc-8638
kind: normative-requirement
summary: Source fragmentation after encapsulation and reassembly of encapsulated packets MUST be supported by AFBRs. Path MTU Discovery (PMTUD) SHOULD be enabled, and ICMPv6 packets MUST NOT be filtered in the I-IP network.
section: "7.3"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - v6ops
