document: rfc-2473
kind: protocol-element
summary: The tunnel IPv6 header is a standard IPv6 header with Version=6; Traffic Class set to original packet value or pre-configured value; Flow Label defaulting to zero; Payload Length = original packet length plus extension header lengths; Hop Limit set to configured tunnel value; Source = entry-point node address; Destination = exit-point node address.
