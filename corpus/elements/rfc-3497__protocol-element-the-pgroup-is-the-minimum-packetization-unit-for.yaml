document: rfc-3497
kind: protocol-element
summary: The pgroup is the minimum packetization unit for digital active line content, defined as the smallest number of octets that is both octet-aligned and preserves ALF (application-level framing) integrity for a given color subsampling. For 4:2:2 sampling the pgroup is 5 octets; for 4:2:0 and 4:4:4 it is 15 octets; a pgroup of 1 allows splitting at any octet boundary.
section: "4"
