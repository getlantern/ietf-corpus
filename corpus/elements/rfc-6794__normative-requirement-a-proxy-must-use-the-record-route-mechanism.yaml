document: rfc-6794
kind: normative-requirement
summary: A proxy MUST use the Record-Route mechanism if its associated policy server has policies that apply to mid-dialog requests, to remain on the signaling path and resubmit policy server URIs to UAs for subsequent offer/answer exchanges.
section: 4.4.2
rfc2119_level: MUST
