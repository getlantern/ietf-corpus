document: rfc-2596
kind: normative-requirement
summary: If the server does not support storing language codes and receives a Modify operation with an AttributeDescription containing a language code, it MUST treat it as an unrecognized attribute and MUST fail the request with an appropriate result code.
section: "3.7"
rfc2119_level: MUST
topics:
    - ldap
