document: rfc-9341
kind: protocol-element
summary: Double-Marking delay methodology uses a first marking bit to create alternate blocks (for loss and mean-delay) and a second marking bit to select specific packets within each block for per-packet delay measurement. This overcomes out-of-order sensitivity and enables delay distribution statistics (percentiles, variance, median).
section: 3.2.2
topics:
    - measurement
