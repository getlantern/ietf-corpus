document: rfc-821
kind: normative-requirement
summary: If a server-SMTP has accepted the task of relaying mail and later finds delivery impossible, it must construct an 'undeliverable mail' notification message and send it to the originator indicated by the reverse-path.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
