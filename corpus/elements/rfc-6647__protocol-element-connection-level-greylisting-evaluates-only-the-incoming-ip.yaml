document: rfc-6647
kind: protocol-element
summary: Connection-level greylisting evaluates only the incoming IP address and/or host name. If the source is not in the database or has not reached a required minimum age, the server returns either a 421 reply closing the connection, or a 4yz reply to all further commands in the session.
section: "2.1"
topics:
