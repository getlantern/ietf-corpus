summary: Generic aggregate reservations reuse the RSVP-AGGREGATE-IP4 and RSVP-AGGREGATE-IP6 FILTER_SPEC, SENDER_TEMPLATE objects defined in RFC 3175. The present document only specifies the new SESSION and SESSION-OF-INTEREST objects; RFC 3175 procedures apply unless explicitly overridden.
