document: rfc-6450
kind: protocol-element
summary: The Init / Server Response negotiation allows a client to request a multicast group address from a server before beginning Echo Request/Reply measurements. The client sends an Init with Multicast Prefix options; the server responds with a Multicast Group option and SHOULD include a Session ID.
section: "3.4"
topics:
    - multicast
