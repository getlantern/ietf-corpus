document: rfc-4341
kind: security-consideration
summary: An attacker could impair CCID 2 connection performance by dropping packets or forging duplicate acknowledgements or acknowledgements for new data, as in TCP. The document states no new security considerations are introduced beyond those already discussed for TCP (RFC 2581) and DCCP (RFC 4340).
