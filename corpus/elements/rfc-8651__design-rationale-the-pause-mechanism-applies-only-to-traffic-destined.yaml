document: rfc-8651
kind: design-rationale
summary: The pause mechanism applies only to traffic destined for transmission on the modem's attached data channel, not to DLEP control messages themselves, and only covers the single router-to-modem subnetwork. This scoping prevents deadlocks where a paused control plane could not send the Restart signal.
section: "1"
topics:
    - routing
    - qos
