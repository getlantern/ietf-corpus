document: rfc-9354
kind: interoperability-note
summary: 'A PLC node distinguishes IPv6 PDUs from non-IPv6 PDUs using the equivalent of an Ethertype: RFC 7973 defines Ethertype ''A0ED'' for LoWPAN encapsulation (carried in the IE field for IEEE 1901.2/G.9903), while IEEE 1901.1 uses MSDU type value 49 for IP packets.'
