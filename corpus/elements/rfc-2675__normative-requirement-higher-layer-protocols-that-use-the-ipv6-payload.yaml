document: rfc-2675
kind: normative-requirement
summary: Higher-layer protocols that use the IPv6 Payload Length field to compute the Upper-Layer Packet Length in the checksum pseudo-header must instead use the Jumbo Payload Length field for packets carrying the Jumbo Payload option.
