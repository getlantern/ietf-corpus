document: rfc-7895
kind: normative-requirement
summary: For YANG 1.1 modules, there MUST be at most one module entry with conformance-type 'implement' for a particular module name, since YANG 1.1 requires at most one revision of a module is implemented. For YANG 1 modules, there SHOULD NOT be more than one such entry.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
