document: rfc-5608
kind: normative-requirement
summary: The same three RADIUS attributes (Service-Type=Framed-Management, Framed-Management-Protocol=SNMP, Management-Transport-Protection=Integrity-Confidentiality-Protection) MUST be present in an Access-Accept message to provision SNMP authPriv over a secure transport.
section: "2.3"
rfc2119_level: MUST
