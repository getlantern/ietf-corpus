document: rfc-4244
kind: protocol-element
summary: A new priv-value 'history' is added to the SIP Privacy header. It can be applied to the entire request or to a specific hi-targeted-to-uri to indicate that the associated History-Info entry (or all entries) should not be forwarded beyond the current domain.
section: "3.3"
topics:
