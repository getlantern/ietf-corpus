document: rfc-5477
kind: registry
summary: The selectorAlgorithm registry is maintained by IANA as an extension of the IPFIX Information Elements registry. Initial values (IDs 1–8) are defined in Section 8.2.1. New assignments require Expert Review per RFC 5226; each new method MUST receive a unique ID and MUST have its configuration parameters clearly specified along with an Options Template reporting method.
section: "10.2"
rfc2119_level: MUST
