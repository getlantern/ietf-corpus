document: rfc-4001
kind: design-rationale
summary: InetAddressIPv6 was split into InetAddressIPv6 and InetAddressIPv6z (and InetAddressIPv4z added) to enable non-global IPv4 address support, align with transport address textual conventions, simplify compliance statements where zone index support is not required, and simplify implementations for host systems that never report zone indices.
