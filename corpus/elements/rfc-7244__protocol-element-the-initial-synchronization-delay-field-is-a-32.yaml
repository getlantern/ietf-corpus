document: rfc-7244
kind: protocol-element
summary: The Initial Synchronization Delay field is a 32-bit value representing the average delay from the beginning of the multimedia session to the time when RTCP packets are received on all component RTP sessions, calculated from received RTCP SR packets or RTP header extensions containing in-band NTP-format timestamp mappings per RFC 6051.
section: "3.2"
topics:
    - rtp
    - realtime
    - measurement
