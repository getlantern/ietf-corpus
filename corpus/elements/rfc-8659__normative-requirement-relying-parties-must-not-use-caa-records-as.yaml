document: rfc-8659
kind: normative-requirement
summary: Relying Parties MUST NOT use CAA records as part of certificate validation. CAA records describe only current grants of authority; a previously issued certificate may have been conformant with CAA records at the time of issuance.
section: "1"
rfc2119_level: MUST NOT
topics:
    - dns
    - pkix
    - security
