document: rfc-8888
kind: security-consideration
summary: An off-path attacker that can spoof RTCP Congestion Control Feedback Packets can similarly force incorrect sending rates. The attack is difficult because the attacker must guess the SSRC, sequence number, and destination transport address; SRTP authentication (RFC 3711) mitigates this.
section: "10"
topics:
