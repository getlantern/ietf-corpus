document: rfc-6721
kind: security-consideration
summary: Atom Processors must be aware of spoofing attacks where an attacker publishes at:deleted-entry elements using atom:id values from other feeds, tricking consumers into treating valid entries as removed. Processors should ignore at:deleted-entry elements referencing entries not previously seen in the containing feed and should verify feed origin.
section: "7"
topics:
    - security
