document: rfc-8472
kind: protocol-element
summary: 'The server includes the ''token_binding'' extension in ServerHello only if: (1) it supports the offered version or a lower one, (2) it finds acceptable key parameters in the client''s list, and (3) it is also negotiating the extended master secret (RFC 7627) and renegotiation indication (RFC 5746) extensions when TLS 1.2 or older is used.'
section: "3"
