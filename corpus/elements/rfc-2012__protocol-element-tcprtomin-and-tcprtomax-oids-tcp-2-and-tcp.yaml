document: rfc-2012
kind: protocol-element
summary: tcpRtoMin and tcpRtoMax (OIDs tcp 2 and tcp 3) are read-only Integer32 objects in milliseconds giving the minimum and maximum retransmission timeout values permitted by the TCP implementation; for the rsre algorithm they correspond to LBOUND and UBOUND from RFC 793.
