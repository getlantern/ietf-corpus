document: rfc-4872
kind: protocol-element
summary: The ASSOCIATION object links working and protecting LSPs. When carried on the working LSP, the Association ID identifies the protecting LSP_ID; when carried on the protecting LSP, it identifies the protected LSP_ID. For full rerouting LSPs, the Association ID MUST be set to the LSP ID of the signaled LSP itself.
section: "4.3"
topics:
    - mpls
    - routing
