document: rfc-7615
kind: design-rationale
summary: This specification generalizes Authentication-Info and Proxy-Authentication-Info from their original definition in RFC 2617 (Digest-only) so they can be used by any HTTP authentication scheme that needs to return information after credentials are accepted.
