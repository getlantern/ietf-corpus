document: rfc-9836
kind: protocol-element
summary: The L2SM augmentation at the site-network-accesses level adds a leaf-list 'ac-svc-ref' to bind a site to multiple Layer 2 ACs created using ACaaS. The per-access augmentation (if-feature ac-glue) adds a single 'ac-svc-ref' leaf to bind one site-network-access to one Layer 2 AC.
section: "6"
topics:
