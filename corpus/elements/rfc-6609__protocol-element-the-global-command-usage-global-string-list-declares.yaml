document: rfc-6609
kind: protocol-element
summary: 'The ''global'' command (usage: ''global <string-list>'') declares one or more variable names to be stored in the shared global variable space. Each name must be a constant string conforming to the variable-name syntax of RFC 5229 Section 3; match variables and namespace prefixes are not allowed.'
section: 3.4.1
topics:
    - email
