kind: protocol-element
summary: rptrAddrTrackPackage (snmpDot3RptrMgt.3) provides objects for tracking MAC addresses of DTEs attached to repeater ports and for network topology mapping. This functionality is based on technology patented by Hewlett-Packard Company; HP has granted rights to this technology to MIB implementors.
