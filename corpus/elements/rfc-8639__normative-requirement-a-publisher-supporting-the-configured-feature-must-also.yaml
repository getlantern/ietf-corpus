document: rfc-8639
kind: normative-requirement
summary: A publisher supporting the 'configured' feature MUST also support at least one YANG data model that augments transport connectivity parameters on '/subscriptions/subscription/receivers/receiver'. Transport-specific parameters cannot be defined in the base module and must arrive via transport-specific augmentations.
section: 2.5.7
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
