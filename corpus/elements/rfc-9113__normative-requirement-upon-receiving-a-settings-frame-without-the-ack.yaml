document: rfc-9113
kind: normative-requirement
summary: Upon receiving a SETTINGS frame without the ACK flag, the recipient MUST apply settings as soon as possible and MUST immediately emit a SETTINGS frame with the ACK flag set. SETTINGS frames are acknowledged in the order they are received.
section: 6.5.3
rfc2119_level: MUST
topics:
    - http
