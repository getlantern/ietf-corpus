document: rfc-4474
kind: design-rationale
summary: The scope is intentionally limited to SIP requests; providing identity assurance for SIP responses is described as more complicated and deferred to future work. The mechanism is designed to be opportunistically deployable without requiring changes to SIP UA behavior.
