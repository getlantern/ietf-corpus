document: rfc-9086
kind: security-consideration
summary: BGP-EPE enables engineering of traffic leaving an administrative domain, so BGP peering information collected via BGP-LS must be limited to specific consumers in a secure manner. Segment Routing operates within a trusted domain (RFC 8402), and its security considerations also apply to BGP Peering Segments.
section: "8"
topics:
    - bgp
    - routing
    - security
