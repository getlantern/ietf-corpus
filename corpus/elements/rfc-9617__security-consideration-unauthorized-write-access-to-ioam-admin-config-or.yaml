document: rfc-9617
kind: security-consideration
summary: Unauthorized write access to /ioam/admin-config or /ioam/profiles/profile can disrupt IOAM functions, cause misbehaving profiles, and impact performance monitoring, data analytics, and network services for affected flows. These nodes are considered sensitive and require strict access control.
