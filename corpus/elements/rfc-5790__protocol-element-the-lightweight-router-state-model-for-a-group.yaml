document: rfc-5790
kind: protocol-element
summary: 'The lightweight router state model for a group is (multicast address, group timer, source records), with no filter-mode field. The group timer represents a (*,G) join: when positive, all members in the group are assumed active; when zero, the router checks source timers to determine per-source forwarding.'
section: "3.2"
topics:
    - multicast
    - routing
