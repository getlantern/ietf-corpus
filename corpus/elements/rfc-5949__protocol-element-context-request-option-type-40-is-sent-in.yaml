document: rfc-5949
kind: protocol-element
summary: Context Request Option (type 40) is sent in the HI message to request specific context information from the PMAG. The default requested context is the Home Network Prefix option; if link-layer addressing is used, the MN Link-layer Identifier option MUST also be requested.
section: 6.2.1
topics:
