document: rfc-3986
kind: design-rationale
summary: 'URI identification is explicitly separated from resource interaction: a URI provides identification only, and access to the resource is neither guaranteed nor implied by the presence of a URI. Operations on the identified resource are defined by the protocols and data formats that use URIs, not by this specification.'
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
