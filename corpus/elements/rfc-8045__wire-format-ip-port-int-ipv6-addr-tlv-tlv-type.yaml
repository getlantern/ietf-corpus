document: rfc-8045
kind: wire-format
summary: IP-Port-Int-IPv6-Addr TLV (TLV-Type 5, Length 18 octets) carries IPFIX IE 27 (sourceIPv6Address) as a 128-bit IPv6 address — the internal address before NAT64. It MUST be present in IP-Port-Forwarding-Map (241.7.5) when the internal realm is IPv6.
section: 3.2.5
topics:
    - radius
    - nat
    - ip
