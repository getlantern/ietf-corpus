document: rfc-8531
kind: protocol-element
summary: The 'session' list within a MEP, keyed by 'session-cookie' (uint32), represents a monitoring session to/from a remote MEP. It contains 'destination-mep' (mep-id), 'destination-mep-address' (mep-address choice), and 'cos-id'. Multiple sessions to the same remote MEP are distinguished by the session-cookie.
section: "4.3"
