document: rfc-7826
kind: security-consideration
summary: Session identifiers do not provide security against session hijacking unless kept confidential by client, server, and trusted proxies. A 128-bit cryptographically random session ID is recommended, but confidentiality of the identifier is the primary defense.
section: "4.3"
topics:
    - security
    - realtime
