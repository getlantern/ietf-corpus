document: rfc-7784
kind: design-rationale
summary: TRILL OAM does not support the CFM Link Trace Message (LTM) or Link Trace Reply (LTR). Instead, Path Trace Message/Reply (PTM/PTR) for unicast and Multi-destination Tree Verification Message/Reply (MTVM/MTVR) for multicast are substituted, with CFM statistics for LTM/LTR defaulting per IEEE8021-CFM-MIB.
section: "6.2"
topics:
