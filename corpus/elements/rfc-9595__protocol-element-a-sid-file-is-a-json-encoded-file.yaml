document: rfc-9595
kind: protocol-element
summary: 'A ''.sid'' file is a JSON-encoded file (per RFC 7951 rules) defined by the ''ietf-sid-file'' YANG module. It contains: module-name (mandatory), module-revision, sid-file-version, sid-file-status (unpublished/published), dependency-revision list, assignment-range list (entry-point + size), and item list mapping namespace+identifier to SID values.'
