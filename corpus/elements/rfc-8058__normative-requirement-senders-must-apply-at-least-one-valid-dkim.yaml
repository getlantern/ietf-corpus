document: rfc-8058
kind: normative-requirement
summary: Senders MUST apply at least one valid DKIM signature to the message; if the message lacks the required DKIM signature, the mail receiver SHOULD NOT offer a one-click unsubscribe for that message.
section: "4"
rfc2119_level: MUST
topics:
