document: rfc-8175
kind: protocol-element
summary: The Link Characteristics Request Message (type 14, router→modem) requests that the modem alter link characteristics (Current Data Rate and/or Latency) for a specific destination. The modem responds with a Link Characteristics Response (type 15) containing a complete set of all declared metric Data Items reflecting the state after processing.
