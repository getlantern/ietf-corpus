document: rfc-7968
kind: wire-format
summary: The Tree and Groups APPsub-TLV (type 15) contains a 2-byte Type, 2-byte Length (2 plus length of Group Sub-Sub-TLVs), a 2-byte Tree Nickname, and zero or more Group Sub-Sub-TLVs structured as sub-TLVs of the GADDR TLV from RFC 7176, each specifying a multicast group and a VLAN or FGL.
section: 3.2.5
topics:
    - routing
