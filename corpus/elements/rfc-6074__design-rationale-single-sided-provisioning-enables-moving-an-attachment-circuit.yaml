document: rfc-6074
kind: design-rationale
summary: Single-sided provisioning enables moving an Attachment Circuit from one PE to another without reconfiguring the remote endpoint. However, it imposes a greater burden on the discovery mechanism because each AC name must be advertised individually, with no aggregation possible.
