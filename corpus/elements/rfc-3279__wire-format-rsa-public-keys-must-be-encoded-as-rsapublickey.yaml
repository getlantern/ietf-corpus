document: rfc-3279
kind: wire-format
summary: RSA public keys MUST be encoded as RSAPublicKey ::= SEQUENCE { modulus INTEGER, publicExponent INTEGER }; the DER-encoded value is placed in the BIT STRING subjectPublicKey field. The rsaEncryption OID parameters field MUST have ASN.1 type NULL.
section: 2.3.1
topics:
