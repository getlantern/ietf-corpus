document: rfc-2484
kind: protocol-element
summary: The Internationalization Configuration Option (Type 28) allows PPP peers to negotiate the character set and language for human-readable messages. It carries a 4-octet MIBenum identifying the charset and a variable-length Language-Tag ASCII string.
