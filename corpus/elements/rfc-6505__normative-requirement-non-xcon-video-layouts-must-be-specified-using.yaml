document: rfc-6505
kind: normative-requirement
summary: Non-XCON video layouts MUST be specified using an element from a namespace other than the msc-mixer namespace. Similarly, other video-switching policies MUST be specified using an element from a foreign namespace.
section: 4.2.1.4.2.1
rfc2119_level: MUST
