document: rfc-4202
kind: interoperability-note
summary: An interface on an OXC with internal DWDM that handles multiple wavelengths individually is classified as LSC (not FSC), because individual lambdas can be identified and switched. Multiple ISCDs are advertised when the internal DWDM supports discrete bandwidths at different data rates.
section: "3.9"
topics:
