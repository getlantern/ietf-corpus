document: rfc-1253
kind: protocol-element
summary: ospfIfMetricTable (ospf 8) is a separate adjunct table to ospfIfTable providing per-TOS metrics indexed by interface and TOSType. The default TOS-0 metric is computed as 10^8/ifSpeed. A value of 0xFFFF (65535) means 'no route via this TOS'.
section: "5.8"
topics:
    - snmp
    - routing
