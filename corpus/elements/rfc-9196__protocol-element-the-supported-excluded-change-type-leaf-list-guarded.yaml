document: rfc-9196
kind: protocol-element
summary: The supported-excluded-change-type leaf-list (guarded by yp:on-change) indicates which change types can be excluded in YANG-Push subscriptions. Special enum values 'none' (no change types can be excluded) and 'all' (any combination can be excluded) supplement the yp:change-type union. Default is 'none'.
section: "5.2"
topics:
