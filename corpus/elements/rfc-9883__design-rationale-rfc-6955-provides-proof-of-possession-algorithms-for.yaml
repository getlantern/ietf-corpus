document: rfc-9883
kind: design-rationale
summary: RFC 6955 provides proof-of-possession algorithms for Diffie-Hellman private keys but is not suitable for use with PKCS#10 and does not support key encapsulation mechanism (KEM) algorithms such as ML-KEM. This attribute is designed to fill that gap, working with both PKCS#10 and CRMF and supporting modern post-quantum KEM algorithms.
section: "1"
topics:
    - pkix
    - crypto
