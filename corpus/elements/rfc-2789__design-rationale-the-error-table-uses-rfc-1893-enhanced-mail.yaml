document: rfc-2789
kind: design-rationale
summary: The error table uses RFC 1893 Enhanced Mail System Status Codes as an index rather than protocol-specific codes, enabling both SMTP error responses and X.400 reason/diagnostic codes to be mapped into a single extensible namespace that describes most mail system errors generically.
