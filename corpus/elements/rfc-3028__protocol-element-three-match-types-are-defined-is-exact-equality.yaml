document: rfc-3028
kind: protocol-element
summary: 'Three match types are defined: '':is'' (exact equality), '':contains'' (substring), and '':matches'' (glob-style wildcard with ''*'' matching zero-or-more characters and ''?'' matching one character). Commands default to '':is'' when no match type argument is supplied.'
