document: rfc-8346
kind: security-consideration
summary: In NMDA-compliant servers, L3 Unicast topology data is typically ephemeral and system-controlled, residing only in <operational> as read-only data, which reduces vulnerability. However, the model does in principle allow configurable topology information.
