document: rfc-5216
kind: security-consideration
summary: The EAP-TLS security proof (He et al.) relies on the assumption that private key pairs used by the EAP peer and server are not shared with other parties or applications. A backend authentication server supporting EAP-TLS SHOULD NOT use the same certificate for HTTPS.
section: "5.1"
topics:
    - tls
    - security
    - pkix
