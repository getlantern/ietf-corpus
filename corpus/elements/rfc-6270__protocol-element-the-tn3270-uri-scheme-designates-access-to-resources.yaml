document: rfc-6270
kind: protocol-element
summary: The 'tn3270' URI scheme designates access to resources available via Telnet 3270 mode (TN3270) and Telnet 3270 Enhanced mode (TN3270E). The URI takes the form tn3270://<userinfo>@<host>:<port>/ where userinfo and port are optional.
section: "2.1"
topics:
