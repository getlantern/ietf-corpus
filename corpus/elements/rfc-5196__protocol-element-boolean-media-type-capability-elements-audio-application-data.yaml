document: rfc-5196
kind: protocol-element
summary: Boolean media-type capability elements <audio>, <application>, <data>, <control>, <video>, <text>, and <message> each indicate whether the service supports the corresponding streaming media type as defined in RFC 3840 (or RFC 4569 for message). A value of 'true' indicates support; 'false' indicates no support.
section: 3.2.2
topics:
