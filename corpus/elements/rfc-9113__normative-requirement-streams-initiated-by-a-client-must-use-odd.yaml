document: rfc-9113
kind: normative-requirement
summary: Streams initiated by a client MUST use odd-numbered stream identifiers; those initiated by the server MUST use even-numbered stream identifiers. Stream identifier 0x00 is reserved for connection-level control messages. Stream identifiers cannot be reused.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
