document: rfc-4108
kind: design-rationale
summary: CRLs are excluded from firmware packages by the signer because packages may be pre-signed and stored in repositories, making timely CRL inclusion impractical. A third party MAY insert CRLs before delivery since they are not covered by the signature.
section: 2.1.2
topics:
    - pkix
    - security
