document: rfc-9917
kind: protocol-element
summary: The OSPF Flexible Algorithm Exclude Reverse Admin Group Sub-TLV (Type 10), Include-Any Reverse Admin Group Sub-TLV (Type 11), and Include-All Reverse Admin Group Sub-TLV (Type 12) are sub-TLVs of the OSPF FAD TLV with formats identical to the OSPF FAERAG Sub-TLV; each enforces the corresponding reverse-direction Admin Group constraint during path computation.
