document: rfc-9810
kind: normative-requirement
summary: When a CA key update link certificate 'new with new' is created, its notBefore MUST precede the notAfter of 'old with old'; the 'new with old' certificate MUST share the same notBefore as 'new with new' and expire no later than when all end entities possess the new key.
section: 4.4.1
rfc2119_level: MUST
topics:
    - pkix
