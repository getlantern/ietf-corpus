document: rfc-2214
kind: design-rationale
summary: The Slack term allows intermediate network elements to lower resource allocations for flows whose required end-to-end delay exceeds the fluid-model minimum. An RCSD scheduler can increase its local delay bound by s ≤ S (setting Sout = Sin - s), and a WFQ scheduler can reduce its rate reservation from Rin to Rout using equivalent transformation rules.
