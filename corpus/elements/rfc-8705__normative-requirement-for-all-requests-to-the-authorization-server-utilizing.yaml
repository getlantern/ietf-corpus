document: rfc-8705
kind: normative-requirement
summary: For all requests to the authorization server utilizing mutual-TLS client authentication, the client MUST include the 'client_id' parameter so the authorization server can identify the client independently from the certificate content.
section: "2"
rfc2119_level: MUST
