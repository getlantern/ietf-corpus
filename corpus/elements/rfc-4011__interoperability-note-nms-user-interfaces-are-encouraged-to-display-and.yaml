document: rfc-4011
kind: interoperability-note
summary: NMS user interfaces are encouraged to display and accept MIB object names using descriptor values (e.g., 'ifType.7'), but MUST translate those descriptors to dotted-decimal format before sending them in MIB objects to policy agents, since policy agents may have no MIB compiler or MIB file available.
section: 8.1.3.1
topics:
    - snmp
