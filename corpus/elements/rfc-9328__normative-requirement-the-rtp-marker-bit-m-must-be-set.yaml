document: rfc-9328
kind: normative-requirement
summary: The RTP Marker bit (M) MUST be set for the last packet in transmission order among each set of packets containing NAL units of one access unit, consistent with the standard use of M in video formats for efficient playout buffer handling.
section: "4.1"
rfc2119_level: MUST
topics:
