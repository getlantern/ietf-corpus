document: rfc-8196
kind: design-rationale
summary: On resource-constrained devices (e.g., home routers) where only a MAC address is available, the MAC is used as System ID and a pseudorandom number derived from an alternative seed (e.g., a program variable's memory address) is used as the Router-Fingerprint. This reduces uniqueness guarantees but is considered sufficient for small home network deployments.
section: 3.4.5
topics:
    - routing
