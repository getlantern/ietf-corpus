document: rfc-5229
kind: security-consideration
summary: Sieve filtering should not be relied on as a security measure against hostile mail; it is designed for simple, mostly static tests and is unsuitable as a spam or virus checker where adversaries actively vary mail format to evade rules.
section: "7"
topics:
