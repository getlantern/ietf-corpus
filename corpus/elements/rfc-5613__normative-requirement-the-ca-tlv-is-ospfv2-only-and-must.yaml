document: rfc-5613
kind: normative-requirement
summary: The CA-TLV is OSPFv2-only and MUST NOT be added to any OSPFv3 packet. If found on reception in an OSPFv3 context, this TLV MUST be ignored.
section: "2.5"
rfc2119_level: MUST NOT
topics:
