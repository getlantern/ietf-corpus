document: rfc-7239
kind: interoperability-note
summary: The "Via" header field (RFC 7230 Section 5.7.1) has a similar purpose but only discloses information about the proxy itself, not the client. Because Via is already widely deployed and its format cannot be changed, "Forwarded" was defined separately. Information from the two headers cannot be correlated since some proxies update one but not the other.
section: "7.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
