document: rfc-2745
kind: security-consideration
summary: RSVP Diagnostics can disclose sensitive RSVP state information—including flowspecs, timer values, and reservation-merge topology—to unauthorized third parties. The risk is considered lower than SNMP because diagnostic messages cannot modify RSVP state.
