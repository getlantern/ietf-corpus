document: rfc-9390
kind: design-rationale
summary: Diameter nodes in large deployments can support over a million concurrent sessions. Rather than sending thousands of individual command exchanges to apply the same operation to each session, this specification enables bulk operations on session groups using a single or few command exchanges, dramatically reducing signaling overhead.
section: "1"
topics:
    - diameter
