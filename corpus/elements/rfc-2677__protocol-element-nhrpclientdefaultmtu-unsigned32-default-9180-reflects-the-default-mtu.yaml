summary: nhrpClientDefaultMtu (Unsigned32, default 9180) reflects the default MTU for the LIS/LAG, initialized to 9180 per RFC 2225 Classical IP over ATM. nhrpCacheNegotiatedMtu (Integer32, 0..65535) reflects the actual MTU negotiated or registered for a specific cache entry.
