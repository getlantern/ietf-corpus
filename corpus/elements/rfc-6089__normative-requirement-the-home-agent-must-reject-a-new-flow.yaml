document: rfc-6089
kind: normative-requirement
summary: The home agent MUST reject a new flow binding request if the flow identification option lacks a traffic selector sub-option or if the TS Format is unsupported, and MUST also reject it if the binding reference sub-option is absent or references BIDs not in the binding cache.
section: 5.3.2.1
rfc2119_level: MUST
topics:
    - ip
    - mobility
