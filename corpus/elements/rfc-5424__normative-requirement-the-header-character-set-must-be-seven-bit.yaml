document: rfc-5424
kind: normative-requirement
summary: The HEADER character set MUST be seven-bit ASCII in an eight-bit field. HOSTNAME field SHOULD contain an FQDN; if an IPv4 address is used it MUST be in dotted decimal notation; if IPv6, a valid textual representation per RFC 4291 Section 2.2 MUST be used.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
