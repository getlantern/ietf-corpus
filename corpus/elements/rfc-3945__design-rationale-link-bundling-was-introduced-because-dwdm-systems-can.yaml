document: rfc-3945
kind: design-rationale
summary: Link bundling was introduced because DWDM systems can place hundreds of parallel wavelengths between adjacent nodes, making it impractical to assign an IP address to each end of each link and maintain a separate routing adjacency and link-state advertisement per wavelength.
