document: rfc-3080
kind: normative-requirement
summary: To avoid channel number conflicts, BEEP peers in the initiating role MUST use only odd positive integers for channel numbers; peers in the listening role MUST use only even positive integers.
section: 2.3.1.2
rfc2119_level: MUST
