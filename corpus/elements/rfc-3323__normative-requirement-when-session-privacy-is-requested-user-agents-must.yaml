document: rfc-3323
kind: normative-requirement
summary: When session privacy is requested, user agents MUST NOT encrypt SDP bodies in messages, because the privacy service acting as a B2BUA needs to access and modify the SDP to anonymize session traffic.
section: "4.2"
rfc2119_level: MUST NOT
topics:
