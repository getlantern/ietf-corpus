document: rfc-6470
kind: security-consideration
summary: The netconf-config-change notification reveals that system configuration has changed, which specific nodes were altered, whether the server or a named user caused the change (with username, session-id, source-host), which datastore was affected, and the specific edit operations performed—information that could help an attacker identify newly introduced vulnerabilities.
section: "4"
topics:
    - netconf
    - security
