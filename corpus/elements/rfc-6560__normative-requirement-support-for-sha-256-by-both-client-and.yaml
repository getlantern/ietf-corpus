document: rfc-6560
kind: normative-requirement
summary: Support for SHA-256 by both client and KDC is REQUIRED when hashed OTP values are used. The client MUST select the first algorithm from the supportedHashAlg list in the PA-OTP-CHALLENGE that it supports.
section: "4.1"
rfc2119_level: REQUIRED
topics:
