document: rfc-1289
kind: design-rationale
summary: All enumerated INTEGER values in this MIB are incremented by one relative to their standard DECnet Phase IV (NICE protocol) numeric codes. This offset is required to maintain compliance with RFC 1155, which reserves zero as a valid integer but DECnet uses zero-based enumerations.
section: "4"
