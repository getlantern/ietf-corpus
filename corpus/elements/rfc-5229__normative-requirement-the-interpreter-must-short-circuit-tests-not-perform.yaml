document: rfc-5229
kind: normative-requirement
summary: The interpreter MUST short-circuit tests (not perform more tests than necessary) and MUST evaluate in left-to-right order. If a test has two or more list arguments, iteration order over them is implementation-defined.
section: "3.2"
rfc2119_level: MUST
topics:
