summary: 'IANA created the ''Email Authentication Property Types'' sub-registry within the existing ''Email Authentication Parameters'' registry. New entries are subject to Expert Review (RFC 5226) and must supply: the ptype token (fitting the ABNF Keyword), a brief description of what information the ptype covers, and an optional (but recommended) reference to the defining document.'
