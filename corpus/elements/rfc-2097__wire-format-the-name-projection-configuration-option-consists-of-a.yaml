document: rfc-2097
kind: wire-format
summary: The Name-Projection Configuration Option consists of a 1-octet Type (value 1), 1-octet Length (2 + number_of_names * 17), zero or more 16-octet NetBIOS-Name fields, and a 1-octet Added field per name indicating name type or return code. At most 14 names can be encoded per option due to the 1-octet length field constraint.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
