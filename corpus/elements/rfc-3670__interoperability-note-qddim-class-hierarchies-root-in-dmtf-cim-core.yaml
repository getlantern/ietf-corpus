document: rfc-3670
kind: interoperability-note
summary: QDDIM class hierarchies root in DMTF CIM Core classes (ManagedElement, ManagedSystemElement, LogicalElement, Service) and are compatible with the Directory Enabled Networks (DEN) effort. FilterEntryBase, IPHeaderFilter, 8021Filter, and FilterList are defined in PCIME rather than in this document to allow reuse across other services such as security.
