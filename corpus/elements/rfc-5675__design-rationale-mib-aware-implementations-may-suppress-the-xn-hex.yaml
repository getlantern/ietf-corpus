document: rfc-5675
kind: design-rationale
summary: MIB-aware implementations may suppress the 'xN=' hex parameter and include only the 'aN=' alternate textual representation for OCTET STRING objects with a DISPLAY-HINT of the form 'Ma' or 'Mt', saving space for textual objects while remaining unambiguously decodable by receivers.
section: "3.2"
topics:
