document: rfc-1286
kind: interoperability-note
summary: Port numbers have no mandatory relationship to interface numbers. In the simple case a port number equals the corresponding interface number, but multiple ports may map to the same interface (e.g., X.25 virtual circuits). Port numbers are in range 1..dot1dBaseNumPorts.
section: 4.2.2
topics:
