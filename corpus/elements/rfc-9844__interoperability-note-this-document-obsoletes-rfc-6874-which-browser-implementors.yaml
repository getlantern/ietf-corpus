document: rfc-9844
kind: interoperability-note
summary: This document obsoletes RFC 6874, which browser implementors determined was impracticable to support. Obsoleting RFC 6874 reverts its change to the URI syntax defined by RFC 3986, so RFC 3986 is no longer updated by RFC 6874.
