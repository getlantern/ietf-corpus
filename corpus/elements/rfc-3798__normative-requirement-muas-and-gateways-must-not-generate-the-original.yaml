document: rfc-3798
kind: normative-requirement
summary: MUAs and gateways MUST NOT generate the Original-Recipient field of an MDN unless the mail protocols provide the address originally specified by the sender at submission time; ordinary SMTP does not make that guarantee.
section: "5"
rfc2119_level: MUST NOT
topics:
    - email
