document: rfc-3020
kind: protocol-element
summary: mfrBundleLinkTable provides configuration and monitoring for MFR bundle links, indexed by ifIndex. It tracks per-link state (MfrBundleLinkState), round-trip delay, control frame counters, timer expiration events, loopback detection events, unexpected sequence frames, and bundle name mismatch events.
