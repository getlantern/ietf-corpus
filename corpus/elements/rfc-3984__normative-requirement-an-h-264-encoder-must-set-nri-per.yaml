document: rfc-3984
kind: normative-requirement
summary: An H.264 encoder MUST set NRI per the H.264 specification (subclause 7.4.1) for nal_unit_type 1-12, and SHOULD set NRI=11 for sequence parameter sets (type 7), picture parameter sets (type 8), and IDR coded slice NAL units (type 5).
