document: rfc-7060
kind: protocol-element
summary: Targeted mLDP extends the notion of 'upstream LSR' to include (1) the BGP next hop on D's path to R where a Targeted LDP session exists between U and D, and (2) the remote endpoint of an RSVP-TE P2P tunnel on D's next-hop interface where Targeted LDP exists between U and D.
section: "2.1"
topics:
