document: rfc-9792
kind: protocol-element
summary: The Prefix Extended Flags sub-TLV is a variable-length sub-TLV used to advertise additional attributes associated with OSPF prefixes. For OSPFv2, Type=11; for OSPFv3, Type=37. The advertisement and processing of existing fixed-size prefix flags remain unchanged.
