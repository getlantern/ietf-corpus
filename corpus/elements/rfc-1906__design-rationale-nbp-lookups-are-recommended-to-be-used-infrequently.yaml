document: rfc-1906
kind: design-rationale
summary: NBP lookups are recommended to be used infrequently to populate a name-to-DDP-address cache, rather than being performed for every SNMP transaction, because lookups generate significant network traffic, consume CPU resources, and are sensitive to zone table inconsistencies that would not prevent direct AppleTalk communications.
section: "5.3"
topics:
    - snmp
