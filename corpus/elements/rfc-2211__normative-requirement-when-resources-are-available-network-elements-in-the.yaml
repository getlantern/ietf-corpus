document: rfc-2211
kind: normative-requirement
summary: When resources are available, network elements in the interior of the network SHOULD be prepared to accommodate packet bursts somewhat larger than the actual TSpec, because traffic distortion from queueing points may cause legitimate bursts to arrive slightly out of spec.
section: "7"
rfc2119_level: SHOULD
