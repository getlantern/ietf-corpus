document: rfc-5652
kind: normative-requirement
summary: Implementations MUST support key transport (ktri), key agreement (kari), and previously distributed symmetric key-encryption keys (kekri). All implementations MUST gracefully handle unimplemented RecipientInfo alternatives, unimplemented versions, and unknown ori alternatives.
section: "6.2"
rfc2119_level: MUST
topics:
