document: rfc-2287
kind: protocol-element
summary: The sysApplInstallElmtTable describes individual executable and non-executable files composing each installed application package. It is indexed by sysApplInstallPkgIndex and sysApplInstallElmtIndex and includes columns for name, type (unknown/nonexecutable/operatingSystem/deviceDriver/application), path, installed and current file sizes (high/low pairs), role, and modification date.
