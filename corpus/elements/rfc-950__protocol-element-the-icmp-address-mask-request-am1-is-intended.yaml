document: rfc-950
kind: protocol-element
summary: The ICMP Address Mask Request (AM1) is intended to be broadcast by a booting host to discover the subnet mask. A gateway or host acting in lieu of a gateway responds with an Address Mask Reply (AM2) containing the 32-bit mask.
