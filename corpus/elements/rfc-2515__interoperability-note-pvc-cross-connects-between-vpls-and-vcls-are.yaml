document: rfc-2515
kind: interoperability-note
summary: PVC cross-connects between VPLs and VCLs are managed via atmVpCrossConnectTable and atmVcCrossConnectTable in this MIB. SVC and Soft PVC cross-connects are managed via atmSvcVpCrossConnectTable and atmSvcVcCrossConnectTable in the ATM2-MIB (separate memo); entries with the same cross-connect index must never exist simultaneously in both.
