document: rfc-4622
kind: design-rationale
summary: Port numbers are prohibited in XMPP IRIs/URIs because XMPP port discovery uses DNS SRV records as specified in XMPP-CORE, which reduces the attack surface for malicious construction of XMPP IRIs/URIs.
