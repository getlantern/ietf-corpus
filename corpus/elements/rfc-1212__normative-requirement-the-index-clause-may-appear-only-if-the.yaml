document: rfc-1212
kind: normative-requirement
summary: The INDEX clause may appear only if the object type corresponds to a conceptual row. If the MIB module contains no other textual description of how instance identification is derived for columnar objects, the INDEX clause must be present.
section: 4.1.6
rfc2119_level: MUST
