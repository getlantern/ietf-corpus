document: rfc-8001
kind: design-rationale
summary: The document notes that knowledge of SRLG information across multiple LSPs does not allow a CE device to derive the provider network topology, though an entity controlling multiple CEs could infer some topology information. PE devices are therefore allowed to control the communication of SRLGs outside the provider network.
section: "1.1"
topics:
