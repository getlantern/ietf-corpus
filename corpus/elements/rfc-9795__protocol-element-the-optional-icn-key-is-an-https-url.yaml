kind: protocol-element
summary: The optional "icn" key is an HTTPS URL referencing an image resource (icon) pictorially representing the call originator, corresponding to a SIP Call-Info header with purpose=icon. It serves as a base or default image; jCard usage is preferred when richer image-type guidance is needed.
