document: rfc-2333
kind: security-consideration
summary: SCSP, as a database synchronization protocol used alongside NHRP, is subject to peer spoofing and denial-of-service attacks. SCSP provides authentication mechanisms; details are in RFC 2334, Section B.3.1.
