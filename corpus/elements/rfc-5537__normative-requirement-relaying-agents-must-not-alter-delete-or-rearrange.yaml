document: rfc-5537
kind: normative-requirement
summary: Relaying agents MUST NOT alter, delete, or rearrange any part of an article except for the Path and Xref header fields, and MUST NOT modify the body. If an article is not acceptable as-is, it MUST be rejected rather than modified.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
