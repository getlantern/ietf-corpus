summary: 'LDP IPv4 Prefix sub-TLV (sub-Type 1, Length 5): 4-octet IPv4 prefix in network byte order plus 1-octet prefix length in bits; trailing bits SHOULD be set to zero if prefix is shorter than 32 bits. LDP IPv6 Prefix (sub-Type 2, Length 17): same pattern with 16-octet IPv6 prefix.'
