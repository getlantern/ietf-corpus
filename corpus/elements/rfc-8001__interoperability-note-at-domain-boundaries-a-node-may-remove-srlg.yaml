document: rfc-8001
kind: interoperability-note
summary: At domain boundaries, a node MAY remove SRLG information from RROs and MAY add a summary or mapped values. However, this SHOULD NOT be done unless explicitly mandated by local policy, preserving maximum SRLG visibility by default.
