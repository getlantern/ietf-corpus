document: rfc-4364
kind: design-rationale
summary: The peer model (CE peers only with its attached PE; CE routers at different sites never peer with each other) is chosen over an overlay model so that customers have no backbone or virtual backbone to administer. Site-to-site routing follows optimal IGP paths rather than an artificial tunnel topology.
section: "1.2"
