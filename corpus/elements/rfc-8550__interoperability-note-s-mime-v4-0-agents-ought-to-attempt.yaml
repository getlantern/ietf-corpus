document: rfc-8550
kind: interoperability-note
summary: S/MIME v4.0 agents ought to attempt maximum interoperability with agents for prior versions (v2, v3, v3.1, v3.2). Historic algorithms (RSA/DSA with SHA-1, RSA with MD5) SHOULD NOT be used for new artifacts but may be needed to process historic S/MIME messages or files.
section: "1.3"
topics:
    - email
    - pkix
    - crypto
