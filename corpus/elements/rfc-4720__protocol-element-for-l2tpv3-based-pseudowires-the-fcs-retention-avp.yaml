document: rfc-4720
kind: protocol-element
summary: For L2TPv3-based pseudowires, the FCS Retention AVP has Attribute Type 92. Its presence in an ICRQ or ICRP message indicates that the LCCE requests its peer retain FCS for the L2TP session being established.
