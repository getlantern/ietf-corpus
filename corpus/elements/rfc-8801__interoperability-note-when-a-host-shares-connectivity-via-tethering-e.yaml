document: rfc-8801
kind: interoperability-note
summary: When a host shares connectivity via tethering (e.g., cellular to Wi-Fi), it SHOULD propagate the upstream PvD Option downstream with the same PvD ID FQDN, H-flag, Delay, Sequence Number, and with the L-flag set if IPv4 connectivity is also being shared. All options from the upstream PvD Option that are included in the downstream RA SHOULD be placed inside the downstream PvD Option.
section: 3.4.3
topics:
    - ip
