document: rfc-8428
kind: privacy-consideration
summary: Long-term stable unique identifiers in SenML names (e.g., device URNs, 1-wire addresses, UUIDs) can be used to track devices and, by extension, their owners or users over time. Implementers should consider whether their naming scheme exposes persistent identifiers and mitigate accordingly.
section: "14"
topics:
    - privacy
