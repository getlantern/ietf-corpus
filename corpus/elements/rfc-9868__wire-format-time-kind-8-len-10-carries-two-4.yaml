kind: wire-format
summary: 'TIME (Kind=8, Len=10) carries two 4-byte unsigned timestamp fields: TSval (sender''s local monotonic time) and TSecr (echo reply). Zero is reserved to indicate ''not set''; TIME values MUST NOT use zero as a valid time value.'
