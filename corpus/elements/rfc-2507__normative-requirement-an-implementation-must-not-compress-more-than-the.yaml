document: rfc-2507
kind: normative-requirement
summary: An implementation MUST NOT compress more than the initial MAX_HEADER octets of a header and MUST NOT partially compress a subheader. The compressed portion is the longest initial sequence of complete subheaders whose total size does not exceed MAX_HEADER.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - ip
