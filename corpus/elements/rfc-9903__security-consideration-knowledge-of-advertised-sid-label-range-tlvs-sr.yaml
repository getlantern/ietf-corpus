document: rfc-9903
kind: security-consideration
summary: Knowledge of advertised SID/Label Range TLVs, SR Local Block TLVs, and SRMS Preference TLVs can facilitate DoS attacks against the advertising node's SR and SRMS functionality. NACM (RFC 8341) should be used to restrict read access to these subtrees.
