document: rfc-8538
kind: protocol-element
summary: The Graceful Restart Capability Restart Flags field is extended with a second bit, the Graceful Notification ('N') bit (bit position 1). A BGP speaker sets this bit to indicate support for Graceful Restart procedures when a NOTIFICATION message is received or Hold Time expires.
