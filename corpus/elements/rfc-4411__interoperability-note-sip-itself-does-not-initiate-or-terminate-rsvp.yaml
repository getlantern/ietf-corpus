document: rfc-4411
kind: interoperability-note
summary: SIP itself does not initiate or terminate RSVP or NSIS reservation signaling; that is handled by a separate API within each UA, so both the reservation-layer error and a SIP BYE carrying the Preemption Reason header are needed to fully synchronize all SIP elements.
