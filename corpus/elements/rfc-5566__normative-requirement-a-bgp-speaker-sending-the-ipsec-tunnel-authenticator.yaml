document: rfc-5566
kind: normative-requirement
summary: A BGP speaker sending the IPsec Tunnel Authenticator sub-TLV with authenticator type 1 MUST be configured with a private/public key pair whose public key hash appears in the sub-TLV, and MUST either generate a self-signed certificate or be configured with a certificate for that public key.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - ipsec
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
