document: rfc-6370
kind: design-rationale
summary: The Global_ID was adopted from RFC 5003's globally unique AII definition rather than defining a new identifier, because the AII Global_ID already serves to uniquely identify operators by their ASN and provides global uniqueness guarantees needed for cross-operator MPLS-TP deployments.
