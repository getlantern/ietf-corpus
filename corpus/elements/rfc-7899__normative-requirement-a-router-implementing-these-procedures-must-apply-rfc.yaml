document: rfc-7899
kind: normative-requirement
summary: A router implementing these procedures MUST apply RFC 7761 PIM procedures unchanged for downstream interface traffic forwarding, update the figure-of-merit following the exponential decay algorithm, increase the figure-of-merit by the increment-factor, and update the damping state accordingly on reception of updated multicast membership or routing information that changes the PIM downstream state machine.
section: "5.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
