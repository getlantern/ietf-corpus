document: rfc-4526
kind: design-rationale
summary: Absolute True and False filters were eliminated from LDAPv3 because the LDAPv2 string representation could not represent empty 'and'/'or' filter sets, even though LDAPv2 binary protocol placed no such restriction. This document restores them to enable direct DAP-to-LDAP gateway mapping.
