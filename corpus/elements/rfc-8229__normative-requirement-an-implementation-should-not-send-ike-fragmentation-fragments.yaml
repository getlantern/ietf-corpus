document: rfc-8229
kind: normative-requirement
summary: An implementation SHOULD NOT send IKE fragmentation fragments when going over a TCP connection, although it MUST support receiving fragments. If both MOBIKE and IKE fragmentation are supported, IKE fragmentation SHOULD be negotiated in case the session switches to UDP.
section: "9"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - vpn
