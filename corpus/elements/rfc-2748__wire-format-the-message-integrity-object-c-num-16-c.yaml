document: rfc-2748
kind: wire-format
summary: The Message Integrity Object (C-Num=16, C-Type=1) contains a 32-bit Key ID, a 32-bit Sequence Number, and a variable-length Keyed Message Digest. The digest is computed over the entire COPS message including the Integrity object header, Key ID, and Sequence Number, but excluding the digest field itself.
section: 2.2.16
topics:
