document: rfc-2652
kind: interoperability-note
summary: Since CIP MIME objects can be sent over multiple transport protocols, body termination is specified by the transfer protocol rather than the MIME object itself. New protocols are encouraged to use SMTP-style (RFC 821) body termination.
section: "2.0"
topics:
    - email
