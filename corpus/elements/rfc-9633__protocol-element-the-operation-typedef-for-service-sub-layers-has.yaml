document: rfc-9633
kind: protocol-element
summary: 'The ''operation'' typedef for service sub-layers has four values: ''initiation'' (encapsulation of d-CW and S-Label), ''termination'' (decapsulation), ''relay'' (label swap), and ''non-detnet'' (no service sub-layer operation). A single service sub-layer may combine operation types.'
