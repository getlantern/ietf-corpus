document: rfc-2232
kind: security-consideration
summary: The DLUR MIB contains no read-write objects and no read-only objects that expose passwords or user data. Enterprises treating network topology and performance data as sensitive corporate assets may wish to restrict SNMP access to MIB objects via SNMP security mechanisms.
