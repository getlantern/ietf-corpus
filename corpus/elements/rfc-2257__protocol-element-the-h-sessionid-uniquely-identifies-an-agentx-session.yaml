document: rfc-2257
kind: protocol-element
summary: The h.sessionID uniquely identifies an AgentX session. It has no defined value in the subagent's agentx-Open-PDU; the master assigns a unique value in the corresponding agentx-Response-PDU. Thereafter, the same sessionID appears in every PDU exchanged over that session. In multi-transport master agents, sessionIDs should be globally unique.
section: "6.1"
topics:
    - snmp
