document: rfc-3323
kind: normative-requirement
summary: When a privacy service performs a function corresponding to a privacy level, it SHOULD remove that priv-value from the Privacy header. When the last priv-value (not counting 'critical') is removed, the entire Privacy header MUST be removed from the message.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
