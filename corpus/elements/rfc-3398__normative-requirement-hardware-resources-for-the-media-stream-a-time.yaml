document: rfc-3398
kind: normative-requirement
summary: Hardware resources for the media stream (a time slot in an E1/T1 and an RTP/UDP port) MUST be reserved in the gateway when the INVITE is received, since an IAM cannot be sent before resource reservation—especially TCIC selection—takes place.
section: 7.2.1
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
