document: rfc-4951
kind: security-consideration
summary: If the Suggested Control Sequence AVP is not used during failover, sequence numbers reset to zero, making the receive window predictable and increasing susceptibility to control message injection. As a mitigation, endpoints may be configured with an allowlist of permitted recovery endpoint addresses.
section: "8"
topics:
    - security
