document: rfc-7434
kind: normative-requirement
summary: ISDN interworking gateways MUST support UAC and UAS requirements, MUST support only the 'isdn-uui' package on interworked dialogs, and MUST NOT treat omission of the 'uui' option tag in a received INVITE as an indication that UUI interworking is not to be performed.
section: "10"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - voip
