document: rfc-8143
kind: normative-requirement
summary: DNS domain names in NNTP server certificates MAY contain the wildcard character '*' as the complete leftmost label within the identifier, and if a match fails the client MUST follow RFC 6125 Section 6.6 on certificate pinning and fallback.
