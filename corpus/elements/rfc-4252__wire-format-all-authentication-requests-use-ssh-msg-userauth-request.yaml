document: rfc-4252
kind: wire-format
summary: All authentication requests use SSH_MSG_USERAUTH_REQUEST (byte), followed by user name (string, UTF-8), service name (string, US-ASCII), method name (string, US-ASCII), and method-specific fields. The user name and service name MAY change between attempts.
