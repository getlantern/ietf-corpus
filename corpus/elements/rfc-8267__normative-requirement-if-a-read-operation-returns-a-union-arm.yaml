document: rfc-8267
kind: normative-requirement
summary: If a READ operation returns a union arm without a DDP-eligible result and the NFS version 4 client provided a matching non-empty Write chunk, an NFS version 4 server MUST return an empty Write chunk in that Write list position.
section: 6.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
