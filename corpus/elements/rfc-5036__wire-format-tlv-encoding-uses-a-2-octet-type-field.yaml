document: rfc-5036
kind: wire-format
summary: TLV encoding uses a 2-octet type field with U-bit (unknown TLV handling), F-bit (forward unknown TLV), and 14-bit Type, followed by a 2-octet Length field and variable-length Value. TLVs may be nested; no alignment requirement.
