document: rfc-6347
kind: normative-requirement
summary: Retransmission timer values SHOULD start at 1 second (not the RFC 6298 default of 3 seconds) and SHOULD double at each retransmission up to a maximum of no less than 60 seconds. The timer SHOULD be retained until a lossless transmission occurs.
section: 4.2.4.1
rfc2119_level: SHOULD
topics:
    - tls
    - congestion
