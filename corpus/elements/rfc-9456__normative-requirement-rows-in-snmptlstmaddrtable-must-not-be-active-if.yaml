document: rfc-9456
kind: normative-requirement
summary: Rows in snmpTlstmAddrTable MUST NOT be active if the snmpTlstmAddrServerFingerprint column is blank and snmpTlstmAddrServerIdentity is set to '*', since this would insecurely accept any presented certificate.
