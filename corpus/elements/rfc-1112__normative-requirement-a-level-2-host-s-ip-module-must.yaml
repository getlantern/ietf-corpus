document: rfc-1112
kind: normative-requirement
summary: A Level 2 host's IP module MUST maintain a list of host group memberships per network interface. On the first join and last leave for a group on an interface, the local network module MUST be notified to update its multicast reception filter.
section: "7.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
