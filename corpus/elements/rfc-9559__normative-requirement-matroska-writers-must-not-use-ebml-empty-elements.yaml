document: rfc-9559
kind: normative-requirement
summary: Matroska Writers MUST NOT use EBML Empty Elements if the element has a default value that is not 0 for integers/dates or 0x0p+0 for floats, because legacy parsers assumed 0 regardless of the declared default.
