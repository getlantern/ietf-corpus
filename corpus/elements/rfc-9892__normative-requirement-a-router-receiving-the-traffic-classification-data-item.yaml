document: rfc-9892
kind: normative-requirement
summary: A router receiving the Traffic Classification Data Item MUST locate associated traffic classification information for the TID. If none exists, the router MUST initialize a new information set; if found, MUST replace it. In both cases, MUST update any associated data plane state.
section: "2.1"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
