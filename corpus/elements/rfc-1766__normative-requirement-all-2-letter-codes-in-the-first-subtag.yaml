document: rfc-1766
kind: normative-requirement
summary: All 2-letter codes in the first subtag are interpreted as ISO 3166 alpha-2 country codes denoting the area in which the language is used. Subtag codes of 3 to 8 letters may be registered with IANA by anyone who feels a need, per the rules in section 5.
section: "2"
rfc2119_level: MAY
