document: rfc-6506
kind: security-consideration
summary: The authentication mechanism confirms a packet was issued by a router with access to the Authentication Key, but does not authenticate the specific originator. Deployments SHOULD use sufficiently long and random keys; Authentication Keys SHOULD incorporate at least 128 pseudo-random bits. Management systems SHOULD support hexadecimal key input.
section: "6"
rfc2119_level: SHOULD
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
