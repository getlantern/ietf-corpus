document: rfc-9777
kind: state-machine
summary: Router filter mode for a multicast address transitions between INCLUDE(A) and EXCLUDE(X,Y). The router enters EXCLUDE when any listener reports EXCLUDE mode; the Filter Timer tracks this state. When the Filter Timer expires (no EXCLUDE mode listeners remain), the router transitions back to INCLUDE, moving the Requested List to the Include List and deleting the Exclude List.
section: 7.2.1
topics:
    - multicast
    - routing
