document: rfc-4712
kind: wire-format
summary: The APP part header consists of a 32-bit SMI Enterprise Code (non-zero for vendor extensions), a 16-bit Report Type, and a 16-bit Length field (in 32-bit words minus one). Application-dependent data follows and must be padded to a multiple of 32 bits.
