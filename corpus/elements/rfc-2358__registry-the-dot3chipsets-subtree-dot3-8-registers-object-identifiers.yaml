summary: The dot3ChipSets subtree (dot3 8) registers OBJECT IDENTIFIERs for Ethernet MAC chipsets from AMD, Intel, SEEQ, National Semiconductor, Fujitsu, Digital Semiconductor, Texas Instruments, Toshiba, Lucent, Galileo, Jato, and XaQTI. For chipsets not listed, assignment is required in vendor enterprise trees; future management may be delegated to IANA.
