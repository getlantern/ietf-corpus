document: rfc-2111
kind: protocol-element
summary: 'The ''mid:'' URL scheme identifies an email message by its Message-ID, and optionally a specific body part within that message by appending a content-id: ''mid:'' message-id [ ''/'' content-id ]. A ''mid'' URL with only a message-id refers to the entire message.'
