document: rfc-3415
kind: wire-format
summary: 'The vacmViewTreeFamilyMask is an OCTET STRING of SIZE 0..16. Each bit corresponds to a sub-identifier of vacmViewTreeFamilySubtree: a ''1'' bit requires an exact match; a ''0'' bit is a wildcard (any sub-identifier value matches). If the mask is shorter than the subtree OID, it is implicitly extended with 1''s; a zero-length mask results in all-1''s (no wildcarding).'
section: "4"
