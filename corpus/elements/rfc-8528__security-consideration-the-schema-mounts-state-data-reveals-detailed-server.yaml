document: rfc-8528
kind: security-consideration
summary: The '/schema-mounts' state data reveals detailed server implementation information — including mounted module names, revisions, features, and deviations — that could help an attacker identify server capabilities or known bugs in specific module versions, facilitating targeted denial-of-service attacks. Read access to this container should be controlled via NACM.
section: "11"
topics:
