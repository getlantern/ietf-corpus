document: rfc-9514
kind: wire-format
summary: The SRv6 End.X SID TLV (Type 1106, variable length) encodes a 2-octet Endpoint Behavior, 1-octet Flags, 1-octet Algorithm, 1-octet Weight, 1-octet Reserved, and a 16-octet SRv6 SID (128-bit), followed by optional sub-TLVs. It advertises IGP adjacency SIDs or BGP EPE Peer Adjacency SIDs.
section: "4.1"
topics:
    - routing
    - bgp
    - ip
