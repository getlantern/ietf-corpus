document: rfc-9395
kind: interoperability-note
summary: Some IKEv1 implementations support Labeled IPsec (negotiating an additional Security Context selector to the SPD), but this was never standardized in IKEv1. IKEv1 systems requiring Labeled IPsec should migrate to IKEv2 systems supporting Labeled IPsec.
section: "4.2"
topics:
    - ipsec
    - security
