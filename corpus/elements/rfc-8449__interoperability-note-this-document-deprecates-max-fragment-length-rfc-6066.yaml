document: rfc-8449
kind: interoperability-note
summary: This document deprecates `max_fragment_length` (RFC 6066) and changes its TLS ExtensionType registry entry to not recommended. Clients that depend on small record sizes MAY continue to advertise `max_fragment_length` for backward compatibility.
