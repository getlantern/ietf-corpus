document: rfc-9601
kind: normative-requirement
summary: The operator of an L2TP LCCE that does not support the ECN extension MUST follow the configuration requirements in Section 4 of RFC 9601 to ensure it clears the outer IP ECN field to 0b00 when the outer PSN header is IP (v4 or v6).
section: 6.1.1.1
rfc2119_level: MUST
topics:
    - ecn
    - ip
