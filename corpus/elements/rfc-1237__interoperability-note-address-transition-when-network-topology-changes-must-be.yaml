document: rfc-1237
kind: interoperability-note
summary: Address transition when network topology changes must be gradual rather than instantaneous. During the transition period both old and new addresses must remain accepted by end systems and both must result in correct packet delivery. DIS10589's support for multiple area addresses per area is specifically designed to enable this.
section: "5.7"
topics:
    - routing
