document: rfc-4043
kind: interoperability-note
summary: The certification of different CAs with the same DN by different CAs has negative consequences throughout the PKI, notably rendering the IssuerAndSerialNumber structure in RFC 3852 section 10.2.4 ambiguous, which further complicates permanent identifier matching.
