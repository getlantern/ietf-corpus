document: rfc-2667
kind: protocol-element
summary: tunnelConfigID is an Integer32 (1..2147483647) used to distinguish multiple tunnels with the same endpoints and encapsulation method. For protocols allowing only one tunnel per endpoint pair (e.g., GRE, IP-in-IP), this value is 1; for protocols like L2F allowing parallel tunnels, the manager chooses a unique ID.
