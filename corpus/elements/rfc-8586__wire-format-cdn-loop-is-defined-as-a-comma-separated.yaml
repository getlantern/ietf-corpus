document: rfc-8586
kind: wire-format
summary: 'CDN-Loop is defined as a comma-separated list of cdn-info values: `CDN-Loop = #cdn-info`, `cdn-info = cdn-id *( OWS ";" OWS parameter )`, `cdn-id = ( uri-host [ ":" port ] ) / pseudonym`, `pseudonym = token`. The pseudonym token syntax excludes whitespace, DQUOTE, and the characters `(),/:;<=>?@[]{}` per RFC 7230 Section 3.2.6.'
section: "2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
