document: rfc-8679
kind: protocol-element
summary: A 'protected egress' {E, P} is a virtual node consisting of an ordered pair of egress router E and protector P. It serves as the virtual destination of an egress-protected tunnel and the virtual location of service instances; one egress router may form multiple protected egresses with different protectors.
section: "5.4"
topics:
    - mpls
    - routing
