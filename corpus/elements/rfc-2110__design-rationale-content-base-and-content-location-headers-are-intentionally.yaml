document: rfc-2110
kind: design-rationale
summary: Content-Base and Content-Location headers are intentionally scoped to only the heading in which they appear and its content, not to enclosed multipart parts. This avoids ambiguity when multiple nested body parts each define different base URIs.
section: "4.1"
