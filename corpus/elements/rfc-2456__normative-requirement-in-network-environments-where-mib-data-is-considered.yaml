document: rfc-2456
kind: normative-requirement
summary: In network environments where MIB data is considered sensitive, authentication of received SNMP requests and controlled access to management information SHOULD be employed. The USM authentication protocol (RFC 2274) and VACM access control (RFC 2275) are referenced for this purpose.
section: "5"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
