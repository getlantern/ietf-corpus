document: rfc-8132
kind: normative-requirement
summary: When a conflicting-state error occurs, the server SHOULD generate a payload that includes enough information for a user to recognize the source of the conflict. The server MAY return the actual resource state to provide the client the means to create a new consistent state.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - realtime
