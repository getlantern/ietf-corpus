document: rfc-4419
kind: normative-requirement
summary: Either side MUST NOT send or accept e or f values that are not in the range [1, p-1]. If this condition is violated, the key exchange fails. This prevents confinement attacks.
section: "3"
rfc2119_level: MUST NOT
