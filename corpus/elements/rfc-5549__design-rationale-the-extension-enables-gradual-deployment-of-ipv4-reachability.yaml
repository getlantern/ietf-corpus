document: rfc-5549
kind: design-rationale
summary: The extension enables gradual deployment of IPv4 reachability advertisement via an IPv6 Next Hop without requiring a flag day or risking traffic black-holing. A new BGP Capability allows peers to dynamically discover support before using the new encoding.
