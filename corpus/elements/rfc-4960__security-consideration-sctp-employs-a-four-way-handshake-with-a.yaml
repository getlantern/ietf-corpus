document: rfc-4960
kind: security-consideration
summary: SCTP employs a four-way handshake with a MAC-protected State Cookie to prevent flooding/SYN-style attacks. The responder allocates no state until a valid COOKIE ECHO is returned, and the cookie contains all information needed to reconstruct association state.
section: 11.2.4.1
topics:
    - sctp
    - security
    - crypto
