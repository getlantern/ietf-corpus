document: rfc-7401
kind: state-machine
summary: 'HIP defines eight states: UNASSOCIATED (start), I1-SENT (BEX initiating), I2-SENT (waiting for R2 as initiator), R2-SENT (waiting for confirming data as responder), ESTABLISHED (association active), CLOSING (teardown initiated, UAL timeout), CLOSED (association closed), and E-FAILED (BEX failed after retries). Transitions are triggered by packet events, timeouts (I1_RETRIES_MAX, I2_RETRIES_MAX, UAL, UAL+MSL), and data-send requests.'
section: "4.4"
