document: rfc-9842
kind: protocol-element
summary: The 'Available-Dictionary' request header is a Structured Field Byte Sequence containing the SHA-256 hash of a single available dictionary. The client MUST only send a single 'Available-Dictionary' header with a single hash value for the best available match.
section: "2.2"
