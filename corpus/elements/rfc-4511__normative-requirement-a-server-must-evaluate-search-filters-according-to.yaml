document: rfc-4511
kind: normative-requirement
summary: 'A server MUST evaluate search filters according to the three-valued logic of X.511 Clause 7.8.1: a filter evaluates to TRUE, FALSE, or Undefined. Only entries for which the filter evaluates to TRUE are returned in the Search result; entries matching FALSE or Undefined are ignored.'
section: 4.5.1.7
rfc2119_level: MUST
topics:
    - ldap
