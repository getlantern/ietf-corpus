document: rfc-9303
kind: normative-requirement
summary: The HMAC function AUTH-HMAC-SHA-256-128 MUST be supported in all LISP-SEC implementations. Deployments SHOULD use AUTH-HMAC-SHA-256-128, except when communicating with older implementations that only support AUTH-HMAC-SHA-1-96.
