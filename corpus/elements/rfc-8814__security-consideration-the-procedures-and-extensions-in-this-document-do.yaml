document: rfc-8814
kind: security-consideration
summary: The procedures and extensions in this document do not affect the BGP security model. IGP instances originating MSD TLVs are assumed to support all required security as described in RFC 8476 and RFC 8491 to prevent security issues when propagating the TLVs into BGP-LS.
