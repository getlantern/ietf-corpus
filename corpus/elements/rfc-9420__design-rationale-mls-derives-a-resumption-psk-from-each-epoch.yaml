document: rfc-9420
kind: design-rationale
summary: MLS derives a resumption PSK from each epoch to allow entropy from one epoch to be injected into a future epoch, enabling group reinitialization and subgroup branching. This cryptographically proves that members of the new group were also members during the epoch from which the PSK was extracted.
