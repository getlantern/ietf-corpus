document: rfc-5918
kind: security-consideration
summary: No security considerations beyond those of RFC 5036 (base LDP) and RFC 5920 (MPLS/GMPLS security framework) apply. The Typed Wildcard FEC may reduce security exposure relative to the untyped Wildcard FEC, since a single message can only request/withdraw/release all bindings of a specific type (e.g., a specific AFI) rather than all bindings of all types.
section: "9"
topics:
    - mpls
    - security
