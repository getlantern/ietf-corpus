document: rfc-9429
kind: privacy-consideration
summary: The 'relay' ICE candidate policy allows applications to prevent user location leakage by exposing only relay candidates to the remote peer, obfuscating location to a metro or global level depending on relay server deployment. Applications may switch from 'relay' to 'all' mid-session after the user accepts a call by triggering an ICE restart.
section: 3.5.3
topics:
    - webrtc
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
