document: rfc-7549
kind: normative-requirement
summary: When a SIP request contains multiple Route header fields with 'iotl' parameters, the 'iotl' parameter associated with the topmost Route header field SIP URI (or the closest to topmost if the topmost lacks 'iotl') identifies the type of traffic leg.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
