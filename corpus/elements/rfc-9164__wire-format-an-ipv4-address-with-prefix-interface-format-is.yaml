document: rfc-9164
kind: wire-format
summary: An IPv4 address-with-prefix (Interface Format) is encoded as tag 52 wrapping a two-element array with the full 4-byte address first, followed by the network prefix length; the Prefix Format and Interface Format are distinguished solely by whether the first array element is an integer (prefix) or a byte string (interface address).
section: "3.3"
topics:
