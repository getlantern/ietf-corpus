document: rfc-4261
kind: state-machine
summary: 'PDP-initiated TLS negotiation: PEP sends Client-Open (Client-Type=0, no Integrity-TLS); PDP replies with Client-Accept (Client-Type=0, Integrity-TLS); PEP initiates TLS handshake. After receiving Client-Accept with Integrity-TLS, the PEP MUST NOT send any messages until the TLS handshake is complete.'
section: "5.2"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
