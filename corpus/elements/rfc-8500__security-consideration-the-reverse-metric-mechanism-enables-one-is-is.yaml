document: rfc-8500
kind: security-consideration
summary: The Reverse Metric mechanism enables one IS-IS router to manipulate the Default Metric and optionally Traffic Engineering parameters of adjacent IS-IS neighbors. Operators are highly recommended to configure IS-IS PDU authentication (per RFC 5304/RFC 5310) to mitigate use of the Reverse Metric TLV as a potential attack vector.
section: "4"
topics:
    - security
    - routing
