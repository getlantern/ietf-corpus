document: rfc-6532
kind: security-consideration
summary: Because UTF-8 multi-byte sequences make addresses and header values longer, MDA processes that parse, store, or handle email addresses or local parts must take extra care not to overflow buffers, truncate addresses, exceed storage allotments, or use partial lengths when comparing addresses.
section: "4"
topics:
