document: rfc-6388
kind: normative-requirement
summary: A packet received from a downstream node on an MP2MP LSP MUST never be forwarded back out to that same node. This is enforced in the forwarding state by omitting the swap on the interface toward the originating downstream node.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
