document: rfc-4178
kind: design-rationale
summary: RFC 4178 intentionally breaks compatibility with correct RFC 2478 implementations because the working group valued interoperability with widely-deployed Microsoft Windows SPNEGO implementations. A critical encoding flaw in RFC 2478's mechanism list description also made RFC 2478 implementations unlikely to interoperate with each other anyway.
section: Appendix C
topics:
    - security
