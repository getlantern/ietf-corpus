document: rfc-821
kind: normative-requirement
summary: 'When a receiver-SMTP accepts a message for relaying or final delivery it must insert a time-stamp line (Received:) at the beginning of the mail data. On final delivery it must also insert a Return-Path: line preserving the reverse-path from the MAIL command.'
section: 4.1.1
rfc2119_level: MUST
topics:
    - email
