document: rfc-8724
kind: normative-requirement
summary: The DTag field MUST carry the same value for all SCHC F/R messages belonging to the same fragmented SCHC Packet, and MUST carry different values for messages belonging to different SCHC Packets that are simultaneously in transit under the same RuleID.
section: 8.2.4
rfc2119_level: MUST
