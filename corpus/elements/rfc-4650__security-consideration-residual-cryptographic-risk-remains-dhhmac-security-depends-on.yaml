document: rfc-4650
kind: security-consideration
summary: 'Residual cryptographic risk remains: DHHMAC security depends on the DH discrete logarithm assumption, SHA1 collision resistance, and HMAC security, none of which have been mathematically proven. SHA1 collision attacks have been reported (RFC 4270), though no attacks against HMAC-SHA1 were known at publication. Elliptic Curve DH variants (RFC referenced as work in progress) offer better future-proofing.'
