document: rfc-6917
kind: state-machine
summary: 'The <media-server-status> element (MUST be present in each <mrbnotification>) defines three Media Server states: ''active'' (available for service), ''deactivated'' (withdrawn from service, no new requests until active again), and ''unavailable'' (processing existing requests but not accepting new ones until active again).'
section: 5.1.5.7
topics:
