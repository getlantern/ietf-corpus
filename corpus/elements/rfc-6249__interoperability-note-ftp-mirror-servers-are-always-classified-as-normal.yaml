document: rfc-6249
kind: interoperability-note
summary: FTP mirror servers are always classified as 'normal' mirrors because they do not emit ETags or support Instance Digests in HTTP. Early file mismatch detection is therefore not available when downloading from FTP mirrors.
section: "3.3"
topics:
    - http
