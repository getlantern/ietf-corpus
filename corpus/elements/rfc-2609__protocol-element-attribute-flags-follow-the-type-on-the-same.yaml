document: rfc-2609
kind: protocol-element
summary: 'Attribute flags follow the type on the same line and may appear in any order: ''o''/''O'' (optional; absence means required), ''m''/''M'' (multi-valued unordered set; deletions of individual values not supported), ''l''/''L'' (literal; not to be translated), ''x''/''X'' (clients SHOULD include this attribute in service requests to differentiate the service).'
section: 3.2.6.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
