document: rfc-3032
kind: design-rationale
summary: 'The Router Alert Label (value 1) is designed to be analogous to the IP Router Alert Option: it causes a packet to be examined by the local LSR rather than being forwarded purely based on the label. It cannot appear at the bottom of the stack because the bottom label must be associated with a specific network layer protocol.'
section: "2.1"
topics:
    - mpls
