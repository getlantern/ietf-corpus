document: rfc-3983
kind: interoperability-note
summary: Each registry type is defined by a separate BEEP profile, so each MAY define its own message pattern; however, all must remain within the allowable scope of BEEP (RFC 3080) and must also support the default one-to-one pattern for <lookupEntity> queries.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
