document: rfc-7829
kind: normative-requirement
summary: The HB.Interval MUST be ignored for PF-state destinations; instead HEARTBEAT chunks are sent once per RTO. If the Path Heartbeat function is disabled for a destination, HEARTBEATs MUST NOT be sent to it even in PF state.
section: "3.2"
rfc2119_level: MUST
topics:
    - sctp
    - multipath
