document: rfc-3376
kind: normative-requirement
summary: Implementations responding to a General Query are RECOMMENDED to spread Report transmissions over (0, Max Resp Time) rather than using a single interface timer. Implementations MUST NOT send a Report immediately on reception of a General Query to avoid ack-implosion.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
