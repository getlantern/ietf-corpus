document: rfc-4352
kind: protocol-element
summary: 'The format supports two modes: basic mode, where all frames within a payload are consecutive in time, and interleaved mode, where frames may be non-consecutive. The L flag in the payload header selects between 4-bit (L=0) and 8-bit (L=1) displacement fields in interleaved mode. The ISF must remain constant within a single packet.'
