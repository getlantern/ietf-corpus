document: rfc-8384
kind: normative-requirement
summary: All Flags bits in the Smart-Parameters APPsub-TLV MUST be sent as zero and ignored on receipt. If no Smart-Parameters APPsub-TLV appears in a Smart-Hello, that Smart-Hello is ignored.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
