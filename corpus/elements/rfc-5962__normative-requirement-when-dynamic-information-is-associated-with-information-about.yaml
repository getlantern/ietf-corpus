document: rfc-5962
kind: normative-requirement
summary: When dynamic information is associated with information about the instantaneous position of the presentity, the <Dynamic> element MUST be included in the same <location-info> element as the corresponding geodetic or civic location information.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
