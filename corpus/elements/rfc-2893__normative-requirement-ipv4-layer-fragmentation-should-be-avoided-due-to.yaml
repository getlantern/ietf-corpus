document: rfc-2893
kind: normative-requirement
summary: IPv4 layer fragmentation SHOULD be avoided due to the performance penalty of a loss unit smaller than the retransmission unit. When not applying IPv4 Path MTU Discovery across the tunnel, the Don't Fragment bit MUST NOT be set in the encapsulating IPv4 header.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
