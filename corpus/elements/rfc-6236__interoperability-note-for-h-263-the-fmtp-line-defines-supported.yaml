document: rfc-6236
kind: interoperability-note
summary: For H.263, the fmtp line defines supported image sizes and maximum framerates that the answerer cannot modify. The CUSTOM profile may be used for image size negotiation, but asymmetry requires two unidirectional media descriptions with sendonly/recvonly.
