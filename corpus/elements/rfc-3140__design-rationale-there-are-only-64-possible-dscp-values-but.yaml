document: rfc-3140
kind: design-rationale
summary: There are only 64 possible DSCP values but no limit on the number of PHBs, and network operators may choose local DSCP-to-PHB mappings that differ from standardized recommendations. A dedicated 16-bit identifier space is therefore needed to unambiguously name PHBs in cross-domain signaling messages (e.g., bandwidth broker communication, MPLS diffserv support).
section: "1"
topics:
