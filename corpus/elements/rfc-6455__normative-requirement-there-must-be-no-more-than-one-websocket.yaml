document: rfc-6455
kind: normative-requirement
summary: There MUST be no more than one WebSocket connection in a CONNECTING state to the same remote host (IP address) and port at any time; the client MUST serialize simultaneous connection attempts to prevent denial-of-service conditions.
section: "4.1"
rfc2119_level: MUST
topics:
    - websocket
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
