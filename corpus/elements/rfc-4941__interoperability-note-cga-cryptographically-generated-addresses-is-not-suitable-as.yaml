document: rfc-4941
kind: interoperability-note
summary: CGA (Cryptographically Generated Addresses) is not suitable as an alternative for privacy addresses because CGA binds the interface identifier to a public key (enabling node identification via the key) and is computationally intensive, discouraging frequent regeneration.
section: 3.2.3
topics:
