kind: protocol-element
summary: Key material for the resumed IKE SA is derived as SKEYSEED = prf(SK_d_old, "Resumption" | Ni | Nr), where SK_d_old is retrieved from the ticket and the literal string 'Resumption' is exactly 10 ASCII characters with no NULL terminator.
