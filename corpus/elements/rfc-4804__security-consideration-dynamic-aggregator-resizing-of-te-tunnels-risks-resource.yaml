document: rfc-4804
kind: security-consideration
summary: Dynamic Aggregator resizing of TE tunnels risks resource hogging in the core (preventing other tunnels from being established) and excessive signaling churn; these risks can be mitigated via configuration limits on maximum tunnel size and resizing frequency, and through TE preemption.
