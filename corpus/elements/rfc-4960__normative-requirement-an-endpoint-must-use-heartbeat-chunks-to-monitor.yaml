document: rfc-4960
kind: normative-requirement
summary: An endpoint MUST use heartbeat chunks to monitor the reachability of peer transport addresses. A path is declared failed when the error count exceeds Path.Max.Retrans; the endpoint fails when all paths fail or the overall error count exceeds Association.Max.Retrans.
section: "8.2"
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
