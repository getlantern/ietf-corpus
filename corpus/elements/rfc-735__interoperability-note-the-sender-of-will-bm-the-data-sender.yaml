document: rfc-735
kind: interoperability-note
summary: The sender of WILL BM (the data sender) has exclusive control over macro definitions; the receiver (sender of DO BM) has no control over definition or use except for the ability to refuse particular definitions via REFUSE or PLEASE CANCEL.
