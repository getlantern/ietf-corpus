document: rfc-8062
kind: normative-requirement
summary: Unless anonymous PKINIT is used, a client requiring anonymous communication MUST verify that the returned ticket has the anonymous ticket flag set, because KDCs that do not understand the anonymous option silently return a normal ticket.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
