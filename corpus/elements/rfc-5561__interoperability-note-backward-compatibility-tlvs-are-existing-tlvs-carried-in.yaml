document: rfc-5561
kind: interoperability-note
summary: Backward Compatibility TLVs are existing TLVs carried in Initialization messages by prior LDP extensions (e.g., the FT Session TLV from RFC 3479). Their presence is semantically equivalent to a Capability Parameter TLV with S-bit=1, allowing existing ad hoc capability signaling to coexist with this mechanism.
section: "3.1"
topics:
    - mpls
    - routing
