document: rfc-1928
kind: design-rationale
summary: SOCKS Version 5 is conceptually a 'shim-layer' between the application layer and the transport layer. It does not provide network-layer gateway services such as forwarding of ICMP messages. This positioning allows transparent firewall traversal without modifying transport-layer behavior.
section: "1"
topics:
    - security
    - privacy
