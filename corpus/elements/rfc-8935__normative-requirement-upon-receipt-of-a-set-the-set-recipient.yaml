document: rfc-8935
kind: normative-requirement
summary: Upon receipt of a SET, the SET Recipient SHALL validate that the SET is parsable, authentic (issued by the stated issuer and properly signed), that the recipient is an intended audience, that the issuer is trusted, and that the transmitter is authorized to send that SET.
section: "2"
rfc2119_level: REQUIRED
topics:
