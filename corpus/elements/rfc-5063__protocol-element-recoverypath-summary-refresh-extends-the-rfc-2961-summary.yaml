document: rfc-5063
kind: protocol-element
summary: RecoveryPath Summary Refresh extends the RFC 2961 Summary Refresh mechanism to allow selective transmission of RecoveryPath messages. The restarting node sets both R-bit and S-bit in the Capability object; the downstream neighbor then sends Srefresh messages identifying previously received Path state (rather than previously transmitted state) via MESSAGE_ID LIST objects with the RecoveryPath Flag set.
section: "5"
topics:
