document: rfc-7179
kind: normative-requirement
summary: Any RBridge receiving a frame with a critical hop-by-hop extension that it does not implement MUST discard the frame, because it is unsafe to process the frame without understanding such a critical extension.
section: "2"
rfc2119_level: MUST
topics:
