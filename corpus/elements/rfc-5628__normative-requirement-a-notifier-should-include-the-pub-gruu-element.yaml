document: rfc-5628
kind: normative-requirement
summary: A notifier SHOULD include the <pub-gruu> element when a contact has an instance ID and a public GRUU is associated with the AOR/instance ID combination. When present, <pub-gruu> MUST be positioned as a child of the <contact> element.
section: "5"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
