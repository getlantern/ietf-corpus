document: rfc-2646
kind: interoperability-note
summary: The line wrap and quoting specifications of Format=Flowed may not be suitable for right-to-left charsets such as Arabic and Hebrew. Format=Fixed combined with Quoted-Printable encoding may be more suitable for those cases.
