document: rfc-4474
kind: normative-requirement
summary: The Identity-Info header's absoluteURI MUST dereference to the authentication service's certificate. All implementations MUST support HTTP and HTTPS URIs; such URIs MUST follow RFC 2585 conventions and return 'application/pkix-cert'. Identity and Identity-Info MUST NOT appear in CANCEL.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
