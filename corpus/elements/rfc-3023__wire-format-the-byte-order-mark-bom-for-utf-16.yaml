document: rfc-3023
kind: wire-format
summary: The Byte Order Mark (BOM) for UTF-16 XML MIME entities is the hexadecimal octet sequence 0xFE 0xFF (big-endian) or 0xFF 0xFE (little-endian). ASCII-compatible XML entities often begin with 0x3C 0x3F 0x78 0x6D 0x6C ('<?xml'). The BOM is an encoding signature and is not part of markup or character data.
section: "4"
