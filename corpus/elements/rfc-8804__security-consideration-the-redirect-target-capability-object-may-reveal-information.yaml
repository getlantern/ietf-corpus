document: rfc-8804
kind: security-consideration
summary: The Redirect Target capability object may reveal information about the internal structure of the dCDN network, and the Fallback Target object may reveal internal uCDN structure. Implementations of the FCI and MI MUST use strong authentication and encryption and strictly follow securing directions in RFC 8006 Section 8.3.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
