document: rfc-7468
kind: interoperability-note
summary: Extant parsers diverge considerably on whitespace handling. Most ignore blanks at ends of lines; blanks at the beginnings of lines or in the middle of base64-encoded data are far less compatible. The laxest parsers are not line-oriented at all and accept any mixture of whitespace outside encapsulation boundaries.
