document: rfc-8003
kind: normative-requirement
summary: When a registrar requires authentication, it MUST first check if the requester's Host Identity is in the allowed list; if not, it MUST check for a CERT parameter and MUST reject requests lacking credentials with Failure Type 0.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - pkix
