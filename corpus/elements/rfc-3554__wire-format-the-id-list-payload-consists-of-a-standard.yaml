kind: wire-format
summary: The ID_LIST payload consists of a standard IKE payload header (Next Payload, RESERVED, Payload Length, ID Type, Protocol ID, Port) followed by a sequence of complete Identification Payload structures, each with their own header. Nested ID_LIST payloads are not permitted.
