document: rfc-8630
kind: normative-requirement
summary: When a TAL contains multiple TA URIs, an RP MAY use a locally defined preference rule to select the URI. If the preferred URI fails or the retrieved certificate's public key does not match the TAL, the RP SHOULD retrieve from the next URI per local ranking.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
