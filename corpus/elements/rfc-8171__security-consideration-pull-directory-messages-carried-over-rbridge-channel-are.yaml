document: rfc-8171
kind: security-consideration
summary: Pull Directory messages carried over RBridge Channel are subject to authentication and integrity protection mechanisms available at the RBridge Channel layer. Directory servers should authenticate clients, and clients should authenticate servers, to prevent injection of false directory data that could redirect traffic or enable address spoofing.
section: "6.3"
topics:
    - security
    - routing
