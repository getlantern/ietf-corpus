document: rfc-1654
kind: wire-format
summary: 'Every BGP message begins with a fixed 19-octet header: a 16-octet Marker (all-ones when no authentication or when type is OPEN), a 2-octet unsigned Length (19–4096), and a 1-octet Type (1=OPEN, 2=UPDATE, 3=NOTIFICATION, 4=KEEPALIVE).'
section: "4.1"
