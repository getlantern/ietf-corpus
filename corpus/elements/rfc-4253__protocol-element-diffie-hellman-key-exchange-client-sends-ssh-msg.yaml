document: rfc-4253
kind: protocol-element
summary: 'Diffie-Hellman key exchange: client sends SSH_MSG_KEXDH_INIT with mpint e; server responds with SSH_MSG_KEXDH_REPLY containing string K_S (host key/certificates), mpint f, and string signature of H. Values of e or f not in range [1, p-1] MUST NOT be sent or accepted.'
