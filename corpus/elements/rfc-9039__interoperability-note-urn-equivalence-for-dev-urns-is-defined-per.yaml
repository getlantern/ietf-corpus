document: rfc-9039
kind: interoperability-note
summary: 'URN-equivalence for DEV URNs is defined per RFC 8141 Section 3.1: two URNs are URN-equivalent if their assigned-name portions are octet-by-octet equal after case normalization of only the URI scheme (''urn'') and namespace identifier (''dev''); the remainder is compared case-sensitively. Two DEV URNs may refer to the same entity without being URN-equivalent (e.g., same MAC address in different case).'
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
