kind: protocol-element
summary: 'Five TN3270E functions may be negotiated: BIND-IMAGE (0x00), DATA-STREAM-CTL (0x01), RESPONSES (0x02), SCS-CTL-CODES (0x03), and SYSREQ (0x04). All functions not present in the agreed-upon list are considered unsupported for the session.'
