document: rfc-2225
kind: normative-requirement
summary: If an ATMARP client receives an ATMARP message with an operation code it does not support, it MUST gracefully discard the message and continue normal operation; it is NOT REQUIRED to return any message to the sender.
section: 8.7.2
rfc2119_level: MUST
topics:
    - ip
