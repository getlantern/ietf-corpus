document: rfc-2211
kind: security-consideration
summary: A denial-of-service attack is possible by maliciously reconfiguring the admission control algorithm to overallocate bandwidth or other forwarding resources, starving non-controlled-load flows. This is considered no more vulnerable than other router misconfigurations and can be protected by existing reconfiguration access controls.
section: "13"
