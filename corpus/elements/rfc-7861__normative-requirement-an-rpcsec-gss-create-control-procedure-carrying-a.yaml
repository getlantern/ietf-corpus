document: rfc-7861
kind: normative-requirement
summary: An RPCSEC_GSS_CREATE control procedure carrying a multi-principal authentication payload MUST use rpc_gss_svc_privacy to prevent an attacker from intercepting the message, reassigning the context handle, and stealing the user's identity.
section: 2.7.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
