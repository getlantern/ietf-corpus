document: rfc-8011
kind: protocol-element
summary: The Printer object encapsulates functions of physical Output Devices along with spooling, scheduling, and multi-device management, implementing the server side of IPP/1.1. Printer attributes are grouped as 'job-template' (supported capabilities and defaults) and 'printer-description' (identification, state, and location). A Printer can represent one or more physical devices, a logical print device, or non-marking services such as a fax gateway.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
