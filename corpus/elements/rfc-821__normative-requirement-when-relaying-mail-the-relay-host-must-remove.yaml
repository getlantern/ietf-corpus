document: rfc-821
kind: normative-requirement
summary: When relaying mail, the relay host must remove itself from the beginning of the forward-path and insert itself at the beginning of the reverse-path, using its name as known in the environment it is sending into.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
