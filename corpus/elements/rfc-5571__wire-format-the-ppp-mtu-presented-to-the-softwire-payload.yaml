document: rfc-5571
kind: wire-format
summary: The PPP MTU presented to the Softwire Payload Header SHOULD be the link MTU minus the combined sizes of the IP, UDP, L2TPv2, and PPP headers. On a 1500-byte IPv4 link this is typically 1460 bytes; when IPsec ESP is also present, the MTU SHOULD be further reduced.
section: 5.2.1
topics:
    - vpn
    - v6ops
    - ip
