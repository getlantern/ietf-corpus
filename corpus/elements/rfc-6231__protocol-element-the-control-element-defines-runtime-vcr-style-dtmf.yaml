document: rfc-6231
kind: protocol-element
summary: The <control> element defines runtime (VCR-style) DTMF controls for prompt playback, with attributes including ffkey (fast-forward), rwkey (rewind), volupkey, voldnkey, pausekey, resumekey, and skipinterval. Results are reported in <controlinfo> with <controlmatch> child elements.
section: 4.3.1.2
topics:
    - realtime
    - voip
