document: rfc-7208
kind: wire-format
summary: Directives have the form [qualifier]mechanism, where qualifier is one of '+' (pass), '-' (fail), '~' (softfail), '?' (neutral) and defaults to '+'. Modifiers use 'name=value' syntax. Mechanism and modifier names are case-insensitive.
