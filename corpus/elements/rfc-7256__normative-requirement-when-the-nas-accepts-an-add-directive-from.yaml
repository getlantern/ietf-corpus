document: rfc-7256
kind: normative-requirement
summary: When the NAS accepts an Add directive from a Multicast Admission Control message, it MUST respond with a Multicast Replication Control message with Result=Nack (0x1) containing the accepted directive; for Delete or Delete All directives processed correctly, the NAS MUST NOT generate any ANCP response.
section: 4.4.2
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
