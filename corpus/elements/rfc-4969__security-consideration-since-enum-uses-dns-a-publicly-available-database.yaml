document: rfc-4969
kind: security-consideration
summary: Since ENUM uses DNS — a publicly available database — any information contained in records provisioned in ENUM domains must be considered public. Even after revoking the DNS entry and removing the referred resource, copies of the information could still be available.
section: "5.1"
topics:
    - security
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
