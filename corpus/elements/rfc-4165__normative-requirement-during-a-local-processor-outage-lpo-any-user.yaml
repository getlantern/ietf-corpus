document: rfc-4165
kind: normative-requirement
summary: During a local processor outage (LPO), any User Data messages received from the peer MUST NOT be acknowledged and MUST be buffered. M2PA SHOULD continue transmitting messages from MTP3 and acknowledging messages received and accepted by MTP3 before the LPO began.
section: 4.1.4
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
