document: rfc-8010
kind: wire-format
summary: 'A member-attribute within a collection is encoded as: value-tag 0x4a (memberAttrName), name-length 0x0000, value-length (w bytes), value containing the member attribute name, followed by member-value-tag, name-length 0x0000, member-value-length, and member-value.'
