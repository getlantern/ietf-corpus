document: rfc-5762
kind: normative-requirement
summary: If there is overlap between RTCP report packets and DCCP acknowledgements (e.g., RTCP Loss RLE and DCCP Ack Vector), an application SHOULD use either RTCP feedback or DCCP acknowledgements but not both, to avoid wasting network capacity.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
