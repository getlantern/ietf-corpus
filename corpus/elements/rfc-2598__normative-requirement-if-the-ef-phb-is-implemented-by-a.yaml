document: rfc-2598
kind: normative-requirement
summary: If the EF PHB is implemented by a mechanism that allows unlimited preemption of other traffic (e.g., a priority queue), the implementation MUST include some means to limit the damage EF traffic could inflict on other traffic (e.g., a token bucket rate limiter). Traffic exceeding this limit MUST be discarded.
section: "2"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
