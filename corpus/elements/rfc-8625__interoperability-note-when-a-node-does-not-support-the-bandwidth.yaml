document: rfc-8625
kind: interoperability-note
summary: When a node does not support the Bandwidth Availability TLV, it should send a PathErr message with error code 'Unknown Attributes TLV' per RFC 5420. An LSP could still be set up if sufficient bandwidth exists, though the availability level of reserved bandwidth will be unknown.
section: "3.2"
topics:
    - routing
    - mpls
