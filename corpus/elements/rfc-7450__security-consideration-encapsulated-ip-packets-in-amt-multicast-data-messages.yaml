document: rfc-7450
kind: security-consideration
summary: Encapsulated IP packets in AMT Multicast Data messages may carry spoofed source addresses or other malicious content. Gateways and the networks they connect to must treat such encapsulated packets with the same caution applied to packets received from untrusted external networks.
section: "6.3"
topics:
    - security
    - multicast
