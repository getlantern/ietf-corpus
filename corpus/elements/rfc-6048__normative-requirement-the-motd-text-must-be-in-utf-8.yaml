document: rfc-6048
kind: normative-requirement
summary: The MOTD text MUST be in UTF-8. LIST MOTD MUST NOT accept an argument; a 501 response MUST be returned if an argument is given. A client MUST NOT cache any motd obtained before a privacy extension took effect.
section: 2.5.2
rfc2119_level: MUST
topics:
    - privacy
