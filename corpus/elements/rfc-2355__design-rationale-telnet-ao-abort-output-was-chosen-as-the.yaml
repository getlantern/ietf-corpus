document: rfc-2355
kind: design-rationale
summary: Telnet AO (Abort Output) was chosen as the SYSREQ mechanism because, like the real SNA SYSREQ key, it signals that the host application should stop sending output to the terminal while the user's process continues to execute.
section: 10.5.2
