document: rfc-7460
kind: design-rationale
summary: The sign convention for eoPower (positive = consuming, negative = producing) was chosen to handle Energy Objects such as solar panels, batteries discharging, or UPS units that supply power back to the network. A single signed integer eliminates the need for a separate direction flag.
