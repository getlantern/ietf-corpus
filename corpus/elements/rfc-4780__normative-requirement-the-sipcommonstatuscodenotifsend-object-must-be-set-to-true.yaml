document: rfc-4780
kind: normative-requirement
summary: The sipCommonStatusCodeNotifSend object MUST be set to 'true' for the emit mode specified in sipCommonStatusCodeNotifEmitMode to have any effect; it is RECOMMENDED that the desired emit mode be established before enabling notifications to avoid unintended behavior.
