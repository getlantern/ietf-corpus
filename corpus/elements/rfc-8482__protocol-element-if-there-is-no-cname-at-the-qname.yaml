document: rfc-8482
kind: protocol-element
summary: If there is no CNAME at the QNAME owner name, the response to an ANY query MAY contain a synthesized HINFO resource record. The CPU field of the HINFO RDATA SHOULD be set to "RFC8482" and the OS field SHOULD be set to the null string to minimize response size.
section: "4.2"
topics:
