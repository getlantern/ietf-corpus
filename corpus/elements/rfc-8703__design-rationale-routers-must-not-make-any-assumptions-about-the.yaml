document: rfc-8703
kind: design-rationale
summary: Routers must not make any assumptions about the meaning of Link Identifiers or how they are generated; the method for generating Link Identifiers is a modem implementation matter and out of scope. This keeps the identifier opaque and avoids coupling the router to modem-internal addressing schemes.
section: "2.1"
topics:
    - routing
