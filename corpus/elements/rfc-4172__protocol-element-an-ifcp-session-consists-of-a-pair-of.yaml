document: rfc-4172
kind: protocol-element
summary: An iFCP session consists of a pair of N_PORTs joined by a single TCP/IP connection. It is identified by the N_PORT network addresses of both endpoints (N_PORT ID plus iFCP Portal IP address and TCP port). TCP connections may be pre-established in an Unbound state and allocated to a session via a CBIND message.
section: 5.2.1
topics:
    - ip
    - tcp
