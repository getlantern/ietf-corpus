document: rfc-3371
kind: protocol-element
summary: l2tpTunnelConfigControlRWS (default 4, range 1..65535) defines the control channel receive window size — the maximum number of packets the tunnel peer can send without waiting for acknowledgement. Cannot be modified when the tunnel is connecting or connected.
