document: rfc-2251
kind: normative-requirement
summary: The entire list of modifications in a ModifyRequest MUST be performed in order as a single atomic operation. While individual modifications may transiently violate schema, the resulting entry after all modifications MUST conform to directory schema. If the connection fails, success or failure is indeterminate.
section: "4.6"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
