document: rfc-8527
kind: security-consideration
summary: The lowest RESTCONF layer is HTTPS, and the mandatory-to-implement secure transport is TLS (RFC 8446). RESTCONF uses NACM (RFC 8341) to restrict access for particular users to a preconfigured subset of available protocol operations and content. Security constraints from RFC 8040 Section 12 apply to the new datastore resources.
section: "5"
topics:
