document: rfc-2749
kind: design-rationale
summary: The Resource-Allocation context is decoupled from any specific RSVP message because in multicast sessions it represents the merge of multiple incoming reservations; therefore its ClientSI carries merged FLOWSPEC and FILTERSPEC rather than copying a single message's objects.
