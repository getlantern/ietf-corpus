document: rfc-2440
kind: design-rationale
summary: The four PGP certification types (0x10 generic, 0x11 persona, 0x12 casual, 0x13 positive) are intentionally vague. Because PGP places final validity authority on the receiver, one authority's casual certification may be more rigorous than another's positive certification; the classifications enable fine-grained trust claims without dictating interpretation.
section: 5.2.1
topics:
    - security
    - crypto
