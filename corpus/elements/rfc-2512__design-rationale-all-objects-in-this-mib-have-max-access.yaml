document: rfc-2512
kind: design-rationale
summary: All objects in this MIB have MAX-ACCESS of not-accessible because they are not intended to be read or written via SNMP directly; instead they define the syntax and semantics of data fields representable within a (subtree, list) accounting tuple as specified by RFC 2513.
section: "3"
topics:
