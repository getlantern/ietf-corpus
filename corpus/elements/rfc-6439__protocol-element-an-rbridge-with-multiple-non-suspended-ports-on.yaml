document: rfc-6439
kind: protocol-element
summary: An RBridge with multiple non-suspended ports on a link that is the Appointed Forwarder for VLAN-x may load-share ingress/egress of VLAN-x native frames across those ports, provided no frame egressed on one port can be ingressed on another (which would create a loop). For multiple VLANs, partitioning VLANs among ports is a straightforward approach.
section: "5"
topics:
    - routing
