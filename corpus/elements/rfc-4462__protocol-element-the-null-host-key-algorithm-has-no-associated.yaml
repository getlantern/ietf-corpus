document: rfc-4462
kind: protocol-element
summary: The 'null' host key algorithm has no associated key material and provides neither signature nor encryption. It is used when the host does not have or does not wish to use a public key, for example in Kerberos-only deployments. Any implementation supporting at least one Section 2 key exchange method MUST also support 'null'.
section: "5"
topics:
