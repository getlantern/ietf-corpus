document: rfc-7225
kind: protocol-element
summary: When the PCP server returns multiple PREFIX64 options without IPv4 prefix lists, the first option conveys the prefix/suffix for local IPv6 address synthesis; additional options convey other Pref64::/n values that allow the host to identify and potentially avoid NAT64 in the network.
