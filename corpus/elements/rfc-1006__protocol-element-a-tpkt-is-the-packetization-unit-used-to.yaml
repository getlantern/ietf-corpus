document: rfc-1006
kind: protocol-element
summary: A TPKT is the packetization unit used to delimit TPDUs over TCP's byte stream. Each TPKT contains a fixed 4-octet header followed by one TPDU; TPKT length is variable. Transport class 0 does not multiplex multiple TPDUs per NSDU, so one TPKT carries exactly one TPDU.
