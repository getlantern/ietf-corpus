document: rfc-4090
kind: design-rationale
summary: Two different fast-reroute methods (one-to-one and facility backup) were independently deployed in operational networks before this document. Vendors experienced compatibility problems interoperating between them. This document rationalizes RSVP signaling for both so any implementation can recognize all fast reroute requests and respond clearly, rather than converging on a single approach given irresolvable topology-dependent tradeoffs.
section: "1.1"
topics:
    - mpls
    - routing
