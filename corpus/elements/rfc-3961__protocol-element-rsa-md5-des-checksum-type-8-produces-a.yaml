document: rfc-3961
kind: protocol-element
summary: 'rsa-md5-des (checksum type 8) produces a 24-octet keyed checksum: get_mic = des-cbc(key XOR 0xF0F0F0F0F0F0F0F0, conf | rsa-md5(conf | msg), ivec=0), where conf is an 8-octet confounder. Associated cryptosystems are des-cbc-md5, des-cbc-md4, and des-cbc-crc.'
section: 6.2.4
topics:
    - crypto
