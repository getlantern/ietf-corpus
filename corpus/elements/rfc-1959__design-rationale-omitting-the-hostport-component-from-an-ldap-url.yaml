document: rfc-1959
kind: design-rationale
summary: Omitting the `<hostport>` component from an LDAP URL is intentionally supported so that URLs referencing X.500 namespace entries can be resolved by any available X.500-capable LDAP server, enabling location-independent references to directory entries.
