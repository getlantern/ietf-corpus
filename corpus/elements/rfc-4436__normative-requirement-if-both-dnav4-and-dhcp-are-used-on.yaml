document: rfc-4436
kind: normative-requirement
summary: If both DNAv4 and DHCP are used on the same link and reachability test completes first but DHCP later returns a different result, the implementation SHOULD abandon the reachability test results and use the DHCP result instead, unless the confirmed address was manually assigned.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
