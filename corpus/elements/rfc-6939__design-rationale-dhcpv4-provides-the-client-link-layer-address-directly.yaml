document: rfc-6939
kind: design-rationale
summary: DHCPv4 provides the client link-layer address directly in the message header (htype/chaddr fields), but DHCPv6 only mandates a DUID with no simple mechanism to extract a link-layer address. This gap complicates correlation of DHCPv4 and DHCPv6 bindings for the same dual-stack client in service provider deployments.
section: "3"
topics:
