document: rfc-5065
kind: design-rationale
summary: The AS Confederation Identifier hides internal topology from the public Internet — Member-AS numbers are visible only within the confederation, while the single Confederation Identifier is the externally advertised AS number. This allows internal restructuring without affecting external BGP policy or routing.
section: "1.2"
topics:
    - bgp
    - routing
    - privacy
