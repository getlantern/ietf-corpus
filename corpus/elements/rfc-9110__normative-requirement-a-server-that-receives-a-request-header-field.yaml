document: rfc-9110
kind: normative-requirement
summary: A server that receives a request header field line, field value, or set of fields larger than it wishes to process MUST respond with an appropriate 4xx (Client Error) status code; ignoring such fields would increase vulnerability to request smuggling attacks.
section: "5.4"
rfc2119_level: MUST
topics:
    - http
    - security
