document: rfc-4895
kind: normative-requirement
summary: The chunk types for INIT, INIT-ACK, SHUTDOWN-COMPLETE, and AUTH MUST NOT be listed in the CHUNKS parameter. If a CHUNKS parameter is received containing these types, they MUST be ignored.
section: "3.2"
rfc2119_level: MUST NOT
topics:
