document: rfc-5681
kind: normative-requirement
summary: Out-of-order data segments SHOULD be acknowledged immediately. A receiver SHOULD send an immediate duplicate ACK on a gap, and an immediate ACK when an incoming segment fills all or part of a gap, to accelerate loss recovery.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
