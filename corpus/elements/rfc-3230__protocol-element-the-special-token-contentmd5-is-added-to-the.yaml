document: rfc-3230
kind: protocol-element
summary: The special token 'contentMD5' is added to the digest-algorithm registry to enable negotiation of the legacy Content-MD5 header via Want-Digest. A non-zero qvalue requests Content-MD5; a zero qvalue signals that the sender will ignore Content-MD5.
section: "5"
topics:
