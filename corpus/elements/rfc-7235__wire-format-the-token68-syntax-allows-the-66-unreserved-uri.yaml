summary: 'The token68 syntax allows the 66 unreserved URI characters plus a few others, enabling base64, base64url, base32, or base16 encodings with or without padding but excluding whitespace. ABNF: token68 = 1*( ALPHA / DIGIT / "-" / "." / "_" / "~" / "+" / "/" ) *"=".'
