document: rfc-6093
kind: normative-requirement
summary: RFC 1122 section 4.2.2.4 requires that a TCP MUST support a sequence of urgent data of any length, since the urgent mechanism is simply a pointer into the data stream with no inherent length constraint.
section: "2.3"
rfc2119_level: MUST
topics:
