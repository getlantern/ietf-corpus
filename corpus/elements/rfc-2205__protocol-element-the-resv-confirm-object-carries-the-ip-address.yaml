document: rfc-2205
kind: protocol-element
summary: The RESV_CONFIRM object carries the IP address of a receiver requesting confirmation. When a node finds that the incoming Resv request is equal to or smaller than the reservation in place, it does not forward the Resv further and sends a ResvConf message back to the receiver. Receipt of ResvConf is a high-probability but not guaranteed indication of end-to-end reservation.
section: "2.6"
topics:
    - qos
    - realtime
