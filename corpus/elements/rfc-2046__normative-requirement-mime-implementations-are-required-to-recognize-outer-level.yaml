document: rfc-2046
kind: normative-requirement
summary: MIME implementations are required to recognize outer-level boundary markers at ANY level of inner nesting when handling nested messages and multiparts. It is not sufficient to check only for the next expected marker or terminating condition.
section: 5.1.2
rfc2119_level: MUST
topics:
    - email
