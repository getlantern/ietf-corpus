document: rfc-3720
kind: protocol-element
summary: 'The Session ID (SSID) is the tuple (ISID, TSIH): ISID is a 48-bit initiator-assigned identifier specifying the initiator''s end of the session; TSIH is a 16-bit target-assigned handle generated at session establishment, with value 0 reserved to signal a new session request.'
