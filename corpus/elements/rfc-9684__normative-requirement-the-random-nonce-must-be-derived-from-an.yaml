document: rfc-9684
kind: normative-requirement
summary: The random nonce MUST be derived from an entropy source external to the Attester. A nonce sent into a TPM will typically be 160 or 256 binary digits long; shorter values are padded with leading zeros and longer values are trimmed to the most significant bits.
section: 2.1.1.3
rfc2119_level: MUST
topics:
    - yang
    - security
    - crypto
