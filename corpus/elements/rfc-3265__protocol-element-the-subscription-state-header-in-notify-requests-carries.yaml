summary: 'The ''Subscription-State'' header in NOTIFY requests carries values ''active'', ''pending'', or ''terminated'', plus optional ''expires'', ''reason'', and ''retry-after'' parameters. Reason values include: deactivated, probation, rejected, timeout, giveup, noresource.'
