document: rfc-4972
kind: design-rationale
summary: A full mesh of TE LSPs between N LSRs requires O(N^2) configurations, and adding a new LSR requires 2*N additional TE LSP configurations. This combinatorial complexity motivates IGP-based automatic discovery of TE mesh-group membership rather than manual configuration.
section: "1"
topics:
