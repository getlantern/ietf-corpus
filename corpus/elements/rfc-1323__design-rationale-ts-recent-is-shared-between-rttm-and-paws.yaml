document: rfc-1323
kind: design-rationale
summary: TS.Recent is shared between RTTM and PAWS rather than maintained as two separate values. This simplification became possible after fixing the timestamp-echo rules (Section 3.4) to correctly handle delayed ACKs and out-of-order/retransmitted segments.
section: "4.2"
