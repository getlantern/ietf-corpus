document: rfc-7035
kind: registry
summary: 'This document creates the ''Geopriv Identifiers'' registry under the URN prefix ''urn:ietf:params:geopriv:'' with IETF Review policy, and registers two initial URNs: ''urn:ietf:params:geopriv:relative:2d'' and ''urn:ietf:params:geopriv:relative:3d'' for the two- and three-dimensional relative CRS identifiers used in GML srsName attributes.'
