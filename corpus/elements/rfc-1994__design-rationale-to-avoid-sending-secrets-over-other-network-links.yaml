document: rfc-1994
kind: design-rationale
summary: To avoid sending secrets over other network links, it is recommended that challenge and response values be examined at a central server rather than at each network access server. If the secret must be forwarded to such a server, it SHOULD be sent in reversibly encrypted form.
section: "2.2"
topics:
    - security
    - crypto
