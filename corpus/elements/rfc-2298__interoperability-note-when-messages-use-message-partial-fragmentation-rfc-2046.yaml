document: rfc-2298
kind: interoperability-note
summary: When messages use message/partial fragmentation (RFC 2046), the Disposition-Notification-To, Disposition-Notification-Options, and Original-Recipient headers SHOULD be placed in the inner/enclosed message, not in individual fragment headers. RFC 2046 Section 5.2.2.1 is amended to append these three headers to the reassembled message.
section: "2.4"
topics:
    - email
