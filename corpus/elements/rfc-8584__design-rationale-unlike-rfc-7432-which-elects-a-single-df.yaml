document: rfc-8584
kind: design-rationale
summary: Unlike RFC 7432, which elects a single DF per <ES, EVI>, this document elects a DF per <ES, BD>. For VLAN-aware Bundle services this means multiple DFs per EVI (one per BD/VLAN), enabling finer-grained load balancing and allowing the AC-DF capability to prune candidates at the individual VLAN level.
section: "1.2"
topics:
    - routing
