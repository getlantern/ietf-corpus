document: rfc-1508
kind: security-consideration
summary: Channel binding mismatch (GSS_BAD_BINDINGS) indicates a security-relevant event, preventing context establishment. Verification of chan_binding information provided by the remote peer protects against various active attacks by binding context establishment to channel-specific characteristics that an attacker cannot spoof.
section: 1.1.6
topics:
    - security
