document: rfc-8664
kind: protocol-element
summary: A new METRIC object type T=11 (Maximum SID Depth) allows a PCC to request the PCE to minimize the SID depth of a computed path. If the B-bit is set, the PCE MUST NOT return a path whose SID depth exceeds the metric value.
section: "4.5"
topics:
    - routing
    - mpls
