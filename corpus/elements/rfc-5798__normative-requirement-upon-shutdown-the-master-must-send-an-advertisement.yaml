document: rfc-5798
kind: normative-requirement
summary: Upon shutdown, the Master MUST send an ADVERTISEMENT with Priority=0 before transitioning to Initialize, allowing Backup routers to quickly assume Master role without waiting for the Master_Down_Timer to expire.
section: 6.4.3
rfc2119_level: MUST
topics:
    - routing
