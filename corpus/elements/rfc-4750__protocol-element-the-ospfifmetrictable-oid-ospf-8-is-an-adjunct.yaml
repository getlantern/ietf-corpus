document: rfc-4750
kind: protocol-element
summary: The ospfIfMetricTable (OID ospf 8) is an adjunct to ospfIfTable that stores per-interface, per-TOS metrics separately to simplify multi-TOS management. The default TOS-0 metric is calculated as referenceBandwidth / ifSpeed, where the default reference bandwidth is 10^8 bits/second (100 Mbps).
section: "3"
topics:
