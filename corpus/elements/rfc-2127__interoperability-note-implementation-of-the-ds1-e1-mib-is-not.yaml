document: rfc-2127
kind: interoperability-note
summary: Implementation of the DS1/E1 MIB is not required but is recommended for entities supporting Primary Rate interfaces; implementation of the DS0 MIB is optional; DS0Bundle MIB may be required only if hyperchannels are used with DS0Bundle-based multiplexing.
