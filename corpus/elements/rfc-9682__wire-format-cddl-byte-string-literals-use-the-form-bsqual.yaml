document: rfc-9682
kind: wire-format
summary: CDDL byte string literals use the form [bsqual] %x27 *BCHAR %x27 (single-quoted, optionally preceded by 'h' or 'b64'). The updated BCHAR rule explicitly includes \' and excludes U+007F–U+009F and surrogates. Qualified (h/b64) content is processed semantically after syntactic BCHAR parsing.
section: 2.1.2
topics:
    - cbor
