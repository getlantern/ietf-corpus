document: rfc-1191
kind: normative-requirement
summary: When a router cannot forward a datagram because it exceeds the next-hop MTU and DF is set, the router MUST include that next-hop MTU in the low-order 16 bits of the ICMP header field; the high-order 16 bits MUST be set to zero.
section: "4"
rfc2119_level: MUST
topics:
    - ip
