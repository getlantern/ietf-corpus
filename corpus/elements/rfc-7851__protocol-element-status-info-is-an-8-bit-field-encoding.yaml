document: rfc-7851
kind: protocol-element
summary: STATUS_INFO is an 8-bit field encoding congestion status in the rightmost 4 bits, with 16 levels (0x00 = zero load, 0x0f = congestion). Other bits MUST be cleared to 0. This can be used for congestion-aware routing to avoid forwarding to overloaded peers.
section: "5.3"
topics:
