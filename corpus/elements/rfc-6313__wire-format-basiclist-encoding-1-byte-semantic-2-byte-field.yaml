document: rfc-6313
kind: wire-format
summary: 'basicList encoding: 1-byte Semantic, 2-byte Field ID (MSB is Enterprise bit), 2-byte Element Length (0xFFFF for variable-length elements), optional 4-byte Enterprise Number (present when Enterprise bit is 1), followed by basicList Content. The Element Length field is part of the header and present even for zero-element lists.'
section: 4.5.1
topics:
