document: rfc-6334
kind: security-consideration
summary: DHCPv6-derived configuration is susceptible to man-in-the-middle attacks; there is no basis for trusting the access level represented by a DS-Lite softwire connection obtained via DHCPv6. DS-Lite MUST NOT be used to bypass security mechanisms such as IP firewalls.
section: "6"
topics:
    - security
    - v6ops
