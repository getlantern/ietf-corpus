document: rfc-7265
kind: wire-format
summary: iCalendar DATE-TIME values are encoded in jCal as JSON strings using the ISO 8601 extended complete representation format YYYY-MM-DDTHH:MM:SS[zone]. Reduced accuracy variations MUST NOT be used; leap second and time zone offset restrictions from RFC 5545 still apply.
section: 3.6.5
topics:
