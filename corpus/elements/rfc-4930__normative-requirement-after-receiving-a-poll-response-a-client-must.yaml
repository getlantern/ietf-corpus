document: rfc-4930
kind: normative-requirement
summary: After receiving a <poll> response, a client MUST acknowledge each response using op='ack' and the message ID to dequeue the message and make subsequent messages available. The server MUST dequeue the message and decrement the queue counter after acknowledgement.
section: 2.9.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
