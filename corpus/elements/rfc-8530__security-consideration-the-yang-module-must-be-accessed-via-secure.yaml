document: rfc-8530
kind: security-consideration
summary: 'The YANG module MUST be accessed via secure transports: NETCONF over SSH (RFC 6242) or RESTCONF over HTTPS/TLS (RFC 8446); access control is provided by NACM (RFC 8341). The ''managed'' leaf is particularly sensitive in multi-party environments where the LNE operator may not wish to share LNE information with the host device operator.'
section: "4"
topics:
    - security
    - yang
    - netconf
    - tls
