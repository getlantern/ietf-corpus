document: rfc-3443
kind: normative-requirement
summary: Decrementing iTTL by a value larger than 1 SHOULD only be used to compensate for network nodes incapable of decrementing TTL values. Implementers MUST ensure the TTL value does not become negative during decrements.
section: "3.7"
rfc2119_level: SHOULD
topics:
    - mpls
