document: rfc-2821
kind: normative-requirement
summary: A server MUST NOT return 250 in response to VRFY or EXPN unless it has actually verified the address; returning 250 for syntax-valid-only addresses is prohibited. VRFY and EXPN MUST return only valid domain addresses usable in SMTP RCPT commands, and MUST NOT return source routes.
section: 3.5.2
rfc2119_level: MUST NOT
topics:
    - email
