document: rfc-8994
kind: protocol-element
summary: ACP addresses are IPv6 ULA addresses within a /48 prefix derived by hashing the routing-subdomain (formed from acp-node-name). The base addressing sub-scheme allocates a 64-bit Node-ID in the low 64 bits; alternative sub-schemes (ACP-Zone, ACP-Manual, ACP-Vlong-8/16) vary the zone and extension field layouts within the same /48.
section: "6.11"
topics:
    - ip
    - zeroconf
