document: rfc-5689
kind: protocol-element
summary: A new precondition DAV:valid-resourcetype (namespace DAV:) is defined for extended MKCOL. It applies when the server does not support the specified resourcetype value for the collection, typically returned with HTTP 403 Forbidden.
