document: rfc-4271
kind: wire-format
summary: 'Each path attribute is encoded as: Attribute Flags (1 octet), Attribute Type Code (1 octet), Length (1 octet, or 2 octets when the Extended Length bit is set), and Value. Bits 0–3 of the Flags octet carry Optional, Transitive, Partial, and Extended-Length flags; bits 4–7 MUST be zero on send and ignored on receive.'
section: "4.3"
topics:
    - bgp
    - routing
