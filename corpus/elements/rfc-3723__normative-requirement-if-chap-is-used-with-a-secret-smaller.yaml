document: rfc-3723
kind: normative-requirement
summary: If CHAP is used with a secret smaller than 96 bits, IPsec encryption MUST be used to protect the connection and a compliant implementation MUST NOT continue with the iSCSI login unless it can verify that IPsec encryption is being used.
section: 2.4.1
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
