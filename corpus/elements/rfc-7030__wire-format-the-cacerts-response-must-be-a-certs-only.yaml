document: rfc-7030
kind: wire-format
summary: The /cacerts response MUST be a certs-only CMC Simple PKI Response (RFC 5272) using Content-Type application/pkcs7-mime with Content-Transfer-Encoding base64. It MUST include the current root CA certificate and all intermediate CA certificates needed to build a chain to the root.
