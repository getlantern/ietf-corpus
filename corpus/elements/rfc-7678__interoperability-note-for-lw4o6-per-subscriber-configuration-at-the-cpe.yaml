document: rfc-7678
kind: interoperability-note
summary: For lw4o6, per-subscriber configuration at the CPE (IPv4 address, port set, tunnel source address) must be synchronized with corresponding configuration at the border router. The border router requires the same public IPv4 address and port set parameters bound to the full /128 tunnel source IPv6 address.
section: "2.2"
topics:
    - v6ops
