document: rfc-8446
kind: normative-requirement
summary: 'CertificateVerify signature input is: 64 space bytes, context string (''TLS 1.3, client CertificateVerify'' or server variant), a 0x00 separator, and the current transcript hash. The signing algorithm MUST be one advertised in ''signature_algorithms'' and appropriate for the certificate''s key.'
section: 4.4.3
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - pkix
