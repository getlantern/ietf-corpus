document: rfc-6396
kind: protocol-element
summary: BGP4MP_MESSAGE_LOCAL and BGP4MP_MESSAGE_AS4_LOCAL subtypes indicate locally generated BGP messages rather than remotely received ones. The Local fields refer to the collector that generated the message, and the Peer fields refer to the recipient.
