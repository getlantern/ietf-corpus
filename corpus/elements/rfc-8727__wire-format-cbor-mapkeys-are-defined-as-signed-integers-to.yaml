document: rfc-8727
kind: wire-format
summary: 'CBOR mapkeys are defined as signed integers to minimize CBOR encoding size: top-level IODEF-Document fields use negative integers (e.g., ''iodef-version'' = -24, ''iodef-Incident'' = -19), while Incident and class-level fields use non-negative integers (e.g., ''iodef-IncidentID'' = 2, ''iodef-Contact'' = 14, ''iodef-Indicator'' = 16).'
section: "5"
topics:
