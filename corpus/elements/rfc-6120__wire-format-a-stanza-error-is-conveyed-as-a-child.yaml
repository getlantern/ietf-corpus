document: rfc-6120
kind: wire-format
summary: A stanza error is conveyed as a child <error/> element carrying a required 'type' attribute (auth, cancel, continue, modify, or wait) and a defined-condition child element in the 'urn:ietf:params:xml:ns:xmpp-stanzas' namespace, optionally followed by a human-readable <text/> element and application-specific conditions in other namespaces.
section: 8.3.2
