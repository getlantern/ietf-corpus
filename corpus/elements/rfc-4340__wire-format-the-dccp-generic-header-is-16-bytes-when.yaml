summary: 'The DCCP generic header is 16 bytes when X=1 (48-bit Sequence Number) and 12 bytes when X=0 (24-bit Sequence Number). Fields: Source Port (16 bits), Dest Port (16 bits), Data Offset (8 bits), CCVal (4 bits), CsCov (4 bits), Checksum (16 bits), Res (3 bits), Type (4 bits), X (1 bit), Sequence Number (48 or 24 bits).'
