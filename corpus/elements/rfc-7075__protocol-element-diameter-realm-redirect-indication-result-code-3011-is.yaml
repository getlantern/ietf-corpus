document: rfc-7075
kind: protocol-element
summary: DIAMETER_REALM_REDIRECT_INDICATION (result code 3011) is a Protocol Error code indicating that the request within an application supporting realm-based redirection could not be satisfied locally, and the initiator SHOULD direct the request to a peer within a realm identified in the response. When set, the Redirect-Realm AVP MUST be present.
section: "3.4"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
