document: rfc-9714
kind: security-consideration
summary: 'The FL MUST NOT be signaled or distributed outside the administrative domain. Domain boundary nodes MUST deploy policies (e.g., ACL) to filter FL-bearing packets: at the sending edge, filter outbound packets carrying FLI; at the receiving edge, drop inbound packets carrying FLI from other domains.'
section: "8"
rfc2119_level: MUST NOT
