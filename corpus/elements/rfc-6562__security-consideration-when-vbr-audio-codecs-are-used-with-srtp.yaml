document: rfc-6562
kind: security-consideration
summary: When VBR audio codecs are used with SRTP, the variation in compressed packet sizes leaks information about the speech signal content. Research shows that known phrases in encrypted VBR Speex calls can be recognized with high accuracy, and approximate transcripts can be derived without breaking encryption.
section: "1"
topics:
    - security
    - rtp
    - privacy
