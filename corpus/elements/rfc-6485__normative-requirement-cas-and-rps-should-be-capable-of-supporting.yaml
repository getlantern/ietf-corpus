document: rfc-6485
kind: normative-requirement
summary: CAs and RPs SHOULD be capable of supporting a transition to accommodate phased introduction of additional encryption algorithms and key specifications, as well as orderly deprecation of previously specified ones. CAs and RPs SHOULD be capable of supporting multiple RPKI algorithm and key profiles simultaneously.
section: "5"
rfc2119_level: SHOULD
