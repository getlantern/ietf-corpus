document: rfc-8780
kind: wire-format
summary: The Wavelength Constraint field is encoded as a Label Set Field per RFC 7579 Section 2.6, with the base label as a 32-bit LSC label per RFC 6205. It includes Action (4 bits), Num Labels (12 bits), Length (16 bits), Grid/C.S./Identifier/n fields, and optional additional fields. The Identifier field MUST always be 0.
section: 4.3.2
