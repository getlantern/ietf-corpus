document: rfc-5042
kind: normative-requirement
summary: All Non-Privileged ULP interactions with the RNIC Engine that could affect other ULPs MUST be done using the Privileged Resource Manager as a proxy. All ULP resource allocation requests for scarce resources MUST also be done using a Privileged Resource Manager.
section: "3"
rfc2119_level: MUST
