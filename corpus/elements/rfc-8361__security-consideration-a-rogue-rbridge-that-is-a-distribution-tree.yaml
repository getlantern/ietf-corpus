document: rfc-8361
kind: security-consideration
summary: A rogue RBridge that is a distribution tree root can attract BUM traffic by advertising an R-nickname, but this does not substantially increase risk beyond existing threats such as advertising low-cost adjacencies or claiming highest-priority tree root status. Protection against untrusted RBridges is provided by IS-IS authentication (RFC 5310) and administrative controls on authentication key distribution.
section: "12"
topics:
    - security
    - routing
