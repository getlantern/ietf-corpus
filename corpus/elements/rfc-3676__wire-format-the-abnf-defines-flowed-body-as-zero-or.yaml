document: rfc-3676
kind: wire-format
summary: The ABNF defines flowed-body as zero or more paragraphs, fixed lines, and signature separators. A paragraph is '1*flowed-line fixed-line'. A flowed-line ends with 'flow = SP' before CRLF; stuffing is a leading SP added on generation and deleted on reception. The quote-mark is '>'.
section: "6"
