document: rfc-9541
kind: protocol-element
summary: The B-MAC/0 route is an EVPN MAC/IP Advertisement route with a B-MAC in the MAC address field and Ethernet Tag ID set to zero, used as in RFC 7623 to add or withdraw B-MAC entries in the MAC-VRFs. It is distinct from the B-MAC/I-SID route introduced by this document.
