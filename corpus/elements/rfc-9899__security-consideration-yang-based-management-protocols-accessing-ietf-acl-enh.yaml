document: rfc-9899
kind: security-consideration
summary: YANG-based management protocols accessing 'ietf-acl-enh' must use a secure transport layer (SSH, TLS, or QUIC) and mutual authentication. Payload-based pattern matching is deterministic for unencrypted traffic but its effectiveness against encrypted traffic depends on the presence of an unvarying pattern.
section: "5"
topics:
    - yang
    - security
    - tls
    - netconf
