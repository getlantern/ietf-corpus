document: rfc-8347
kind: protocol-element
summary: The 'track' container allows a VRRP instance to monitor interfaces and network prefixes. When a tracked interface goes down, the VRRP router's priority decrements by 'priority-decrement' (uint8, range 1..254, default 10); it increments by the same amount when the interface recovers.
section: "4"
