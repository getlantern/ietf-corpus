document: rfc-4516
kind: security-consideration
summary: Following an LDAP URL may cause unexpected results such as retrieval of large amounts of data or initiation of a long-lived search. The security implications of resolving an LDAP URL are the same as those of resolving an LDAP search query.
section: "5"
topics:
