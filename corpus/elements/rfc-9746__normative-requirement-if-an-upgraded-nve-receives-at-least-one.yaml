document: rfc-9746
kind: normative-requirement
summary: If an upgraded NVE receives at least one A-D per ES route for an ES with an SHT value of 00, it MUST revert its operational SHT to the default split-horizon method (per Table 1), irrespective of its administrative SHT.
section: "2.4"
rfc2119_level: MUST
topics:
