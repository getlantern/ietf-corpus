document: rfc-3267
kind: wire-format
summary: 'Octet-aligned mode payload header: 4-bit CMR followed by 4 reserved R bits (MUST be zero, MUST be ignored on receipt). If interleaving is signalled, an additional 8-bit interleaving header follows with 4-bit ILL (interleaving length = ILL+1 frame-blocks) and 4-bit ILP (interleaving index, 0 to ILL).'
section: 4.4.1
topics:
