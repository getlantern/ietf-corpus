document: rfc-2078
kind: protocol-element
summary: GSS_Wrap() and GSS_Unwrap() provide per-message integrity and optional confidentiality with encapsulation. GSS_Wrap() signs, optionally encrypts, and encapsulates the message; GSS_Unwrap() decapsulates, decrypts if needed, and validates integrity. A conf_req_flag input selects confidentiality.
section: 2.3.3
topics:
