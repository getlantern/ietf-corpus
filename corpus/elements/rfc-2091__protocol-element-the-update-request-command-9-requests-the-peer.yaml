document: rfc-2091
kind: protocol-element
summary: The Update Request (Command 9) requests the peer to send all appropriate entries in its routing database. It is retransmitted every 5 seconds until an Update Response with the Flush flag set is received. It is sent at power-on and whenever the circuit manager signals a transition from circuit-down to circuit-up.
section: "4.1"
topics:
    - routing
