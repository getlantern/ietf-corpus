document: rfc-5969
kind: normative-requirement
summary: The 6rd BR and CE MUST validate that the embedded IPv4 source address of the encapsulated IPv6 packet matches the IPv4 source address of the encapsulating packet per the configured 6rd domain parameters. If they do not match, the packet MUST be dropped.
section: "9.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
