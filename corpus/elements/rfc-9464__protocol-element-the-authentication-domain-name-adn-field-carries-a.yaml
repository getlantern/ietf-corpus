document: rfc-9464
kind: protocol-element
summary: The Authentication Domain Name (ADN) field carries a fully qualified domain name of the encrypted DNS resolver in DNS presentation format using an IDNA A-label. The name MUST NOT contain any terminators (e.g., NULL, CR).
