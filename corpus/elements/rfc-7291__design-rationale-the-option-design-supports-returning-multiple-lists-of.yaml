document: rfc-7291
kind: design-rationale
summary: The option design supports returning multiple lists of PCP server IP addresses to allow clients to determine whether to contact all PCP servers (e.g., multi-homing or distinct services) or use one address from a list (e.g., redundancy). A single option instance's address list implies one logical server; multiple instances imply distinct servers.
section: "1"
topics:
    - pcp
    - ip
