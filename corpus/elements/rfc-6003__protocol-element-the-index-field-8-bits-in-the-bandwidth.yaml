document: rfc-6003
kind: protocol-element
summary: The Index field (8 bits) in the Bandwidth Profile TLV references bandwidth allocated for a given traffic class. Its value MUST correspond to at least one Class-Type value in the CLASSTYPE or EXTENDED_CLASSTYPE object; by default it MUST be set to 0.
section: "4.1"
topics:
    - mpls
    - routing
