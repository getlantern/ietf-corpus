document: rfc-3986
kind: protocol-element
summary: Unreserved characters (ALPHA / DIGIT / "-" / "." / "_" / "~") may appear unencoded in any URI component. URIs differing only in percent-encoding vs. literal form of an unreserved character are equivalent and identify the same resource.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
