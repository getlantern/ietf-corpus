document: rfc-3986
kind: protocol-element
summary: Unreserved characters (ALPHA / DIGIT / "-" / "." / "_" / "~") may appear unencoded in any URI component. URIs differing only in whether an unreserved character is percent-encoded identify the same resource and are equivalent.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
