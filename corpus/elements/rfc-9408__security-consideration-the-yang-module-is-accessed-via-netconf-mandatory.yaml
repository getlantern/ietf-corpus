document: rfc-9408
kind: security-consideration
summary: 'The YANG module is accessed via NETCONF (mandatory-to-implement secure transport: SSH per RFC 6242) or RESTCONF (mandatory-to-implement secure transport: TLS 1.3 per RFC 8446). The Network Configuration Access Control Model (NACM, RFC 8341) provides per-user access control for operations and content.'
