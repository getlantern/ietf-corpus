document: rfc-5152
kind: normative-requirement
summary: For a contiguous TE LSP, unless disallowed by policy, the boundary LSR processing the ERO SHOULD perform ERO expansion — computing the constrained path to the next loose hop and inserting the computed hops as strict nodes in the ERO. If no satisfying path exists, an RSVP PathErr SHOULD be sent.
section: "4"
rfc2119_level: SHOULD
topics:
    - realtime
    - routing
    - mpls
