document: rfc-8926
kind: normative-requirement
summary: When Geneve is encapsulated in IPv4, the UDP checksum SHOULD be generated per RFC 768 and RFC 1122 to protect the Geneve header, options, and payload from corruption. When encapsulated in IPv6, the UDP checksum MUST be generated by default; non-zero checksums received MUST be validated and packets with incorrect checksums MUST be dropped.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
