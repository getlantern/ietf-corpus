document: rfc-8946
kind: interoperability-note
summary: This document updates RFC 8224 to permit carrying Identity header fields in SIP 300-class (redirect) responses. Originating user agents receiving a 3xx MAY copy those Identity header fields into new requests; use is OPTIONAL.
