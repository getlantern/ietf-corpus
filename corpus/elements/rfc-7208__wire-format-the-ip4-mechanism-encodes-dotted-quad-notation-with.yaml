document: rfc-7208
kind: wire-format
summary: The ip4 mechanism encodes dotted-quad notation with optional CIDR prefix /0–32 (default /32); the ip6 mechanism encodes RFC 4291 colon notation with optional prefix /0–128 (default /128). Omitting IP address octets instead of using CIDR notation is not permitted.
