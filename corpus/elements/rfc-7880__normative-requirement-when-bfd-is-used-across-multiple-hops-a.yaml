document: rfc-7880
kind: normative-requirement
summary: When BFD is used across multiple hops, a congestion control mechanism MUST be implemented, and when congestion is detected the BFD implementation MUST reduce the amount of traffic it generates. Operators must correctly provision S-BFD packet transmission rates.
section: "8.2"
rfc2119_level: MUST
topics:
    - realtime
    - congestion
