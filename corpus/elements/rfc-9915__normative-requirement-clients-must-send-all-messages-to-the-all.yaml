document: rfc-9915
kind: normative-requirement
summary: Clients MUST send all messages to the All_DHCP_Relay_Agents_and_Servers multicast address (ff02::1:2); servers SHOULD NOT accept unicast traffic from clients. The Server Unicast option and UseMulticast status code are obsoleted by this document.
