document: rfc-8797
kind: security-consideration
summary: The integrity and source authenticity of CM Private Data are ensured by the exclusive use of Reliable Connected (RC) queue pairs. Any attempt to interfere with or hijack data on an RC connection causes the RDMA provider to terminate the connection.
