document: rfc-6772
kind: protocol-element
summary: 'The civic location condition profile (token: ''civic-condition'') uses a <civicAddress> element (RFC 5139) within <location>. All child elements of the <location> are combined with logical AND; each child element is compared by octet-by-octet string comparison to the Target''s civic location. The condition evaluates to FALSE if the Target has no civic address.'
section: "4.2"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
