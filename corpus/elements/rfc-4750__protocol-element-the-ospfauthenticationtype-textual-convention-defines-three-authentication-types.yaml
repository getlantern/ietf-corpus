document: rfc-4750
kind: protocol-element
summary: 'The OspfAuthenticationType textual convention defines three authentication types: none (0), simplePassword (1), and md5 (2). Values above 2 are reserved for specification by IANA. This type is used in both ospfIfAuthType (per-interface) and the deprecated ospfAuthType (per-area).'
