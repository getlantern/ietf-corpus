document: rfc-7940
kind: protocol-element
summary: Parameterized context rules use the 'anchor' element as a placeholder for the triggering code point, combined with 'look-behind' and 'look-ahead' elements to specify the surrounding context. This enables position-sensitive variant or eligibility conditions.
