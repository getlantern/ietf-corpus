document: rfc-6388
kind: normative-requirement
summary: A transit node receiving a P2MP Label Mapping from LSR T MUST NOT use that mapping to update the label forwarding table as long as LSR T equals the upstream LSR U. If LSR T equals the installed upstream LSR, the Label Mapping MUST be retained but MUST NOT update the label forwarding table.
section: 2.4.1.4
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
