document: rfc-1697
kind: protocol-element
summary: rdbmsDbParamTable (rdbmsObjects 3) stores per-database configuration parameters, indexed by { rdbmsDbIndex, rdbmsDbParamName, rdbmsDbParamSubIndex }. Multi-valued parameters are represented as multiple rows; single-valued parameters use subindex 1. Zero is not a valid subindex.
