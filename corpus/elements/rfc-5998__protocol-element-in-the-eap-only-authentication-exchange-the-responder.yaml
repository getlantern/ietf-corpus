document: rfc-5998
kind: protocol-element
summary: In the EAP-only authentication exchange, the responder omits both the public-key-based AUTH payload and CERT payloads from message 4 (first IKE_AUTH response), sending only IDr and the initial EAP Request. AUTH payloads from both sides appear only after EAP Success.
