document: rfc-4567
kind: design-rationale
summary: RTSP does not use the SDP offer/answer model, so a new RTSP KeyMgmt header was introduced to allow the client to send back a key management response, since SDP alone cannot carry the bidirectional exchange required by key management protocols.
