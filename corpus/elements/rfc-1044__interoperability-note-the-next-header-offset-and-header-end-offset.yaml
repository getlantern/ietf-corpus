document: rfc-1044
kind: interoperability-note
summary: The Next Header Offset and Header End Offset fields (bytes 14–15) in the 32-bit header support optional loose source routing by listing additional 32-bit TO addresses. However, IP implementations are explicitly not required to implement this HYPERchannel source routing capability; when unused both fields are set to 16 (decimal).
section: NEXT HEADER OFFSET AND HEADER END OFFSET
topics:
    - ip
