document: rfc-1827
kind: design-rationale
summary: The ESP format uses 'transforms' to specify encryption and authentication algorithms along with the Opaque Transform Data format, rather than baking a fixed algorithm into the header. This design supports new transforms and cryptographic algorithms in the future without changing the core ESP format.
