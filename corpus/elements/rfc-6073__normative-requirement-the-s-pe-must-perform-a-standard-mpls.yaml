document: rfc-6073
kind: normative-requirement
summary: The S-PE MUST perform a standard MPLS label swap on the PW label, decrementing the TTL per RFC 3032. When the TTL reaches 0, the packet is sent to the control plane; this mechanism enables per-S-PE VCCV targeting.
section: "9.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
