document: rfc-7139
kind: normative-requirement
summary: For hitless ODUflex(GFP) bandwidth adjustment, the Shared Explicit (SE) style MUST be used when creating a resizable ODUflex connection (Signal Type = 21). If SE style is not used when performing bandwidth adjustment, an error with 'Conflicting reservation style' MUST be generated.
section: "7"
rfc2119_level: MUST
