document: rfc-9767
kind: normative-requirement
summary: The AS MUST validate the access token value and determine if the token is active, taking all provided request parameters into account. If the AS is unable to process part of the request (e.g., an unrecognized access field), the AS MUST NOT indicate the token as active.
section: "3.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
