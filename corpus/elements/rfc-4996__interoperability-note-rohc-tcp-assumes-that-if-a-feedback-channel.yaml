document: rfc-4996
kind: interoperability-note
summary: ROHC-TCP assumes that if a feedback channel is used at least once for a specific context, it will be used for the entire duration of compression for that context. If the feedback channel disappears after being established, compression should be restarted.
section: 4.2.2
topics:
    - tcp
