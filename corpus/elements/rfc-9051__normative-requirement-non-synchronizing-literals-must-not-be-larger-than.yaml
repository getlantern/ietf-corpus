document: rfc-9051
kind: normative-requirement
summary: Non-synchronizing literals MUST NOT be larger than 4096 octets; any literal larger than 4096 bytes MUST be sent as a synchronizing literal. This restriction applies only to client-to-server transmission.
section: "4.3"
rfc2119_level: MUST NOT
topics:
