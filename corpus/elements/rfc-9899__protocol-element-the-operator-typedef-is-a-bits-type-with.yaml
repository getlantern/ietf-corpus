kind: protocol-element
summary: 'The ''operator'' typedef is a bits type with three bits: ''not'' (position 0, logical negation), ''match'' (position 1, bitwise ''(data & value) == value''), and ''any'' (position 2, ''(data & value) != 0''). The ''any'' and ''match'' bits must not be set simultaneously.'
