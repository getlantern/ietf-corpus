document: rfc-8610
kind: design-rationale
summary: CDDL uses a single universal composition primitive — the _group_ — instead of separate constructs for vectors, records, tables, and structs. Groups are neutral with respect to whether they will be placed in an array or a map context, which avoids redundancy and provides one conceptual model for all composition styles.
