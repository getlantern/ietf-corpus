document: rfc-7701
kind: normative-requirement
summary: An MSRP switch using fast-forward (distributing chunks before full message receipt) MUST temporarily store the Message-ID and recipient list of the initial chunk, and MUST forward subsequent chunks only to those same recipients.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
