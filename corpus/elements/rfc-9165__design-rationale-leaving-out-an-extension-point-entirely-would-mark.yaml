document: rfc-9165
kind: design-rationale
summary: Leaving out an extension point entirely would mark instances using extensions as invalid; leaving it in without .feature marking would render mistakes (e.g., 'organisation' vs 'organization') invisible. The .feature operator threads between these two failure modes.
