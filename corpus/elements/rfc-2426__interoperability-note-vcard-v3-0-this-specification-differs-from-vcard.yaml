document: rfc-2426
kind: interoperability-note
summary: 'vCard v3.0 (this specification) differs from vCard v2.1 in multiple incompatible ways: QUOTED-PRINTABLE encoding is eliminated in favor of B encoding only; CRLF in text values uses \n backslash escaping; COMMA and SEMICOLON in text values must be backslash-escaped; the CHARSET type parameter is eliminated; the TYPE= prefix on parameter values is now required.'
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
