document: rfc-6285
kind: registry
summary: 'IANA RAMS Response Code Space Registry: governs numeric response codes in RAMS-I messages. Initial codes include 200 (success), 510 (collective reject—cannot serve any stream), 511 (preamble-only response), and 5xx codes for per-stream reject reasons (504, 505, 506 for non-transient failures). Codes are categorized by scope (collective vs. per-stream) and transience.'
section: "11.6"
