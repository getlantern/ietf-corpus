document: rfc-6673
kind: protocol-element
summary: 'Type-P-Round-trip-Loss is the singleton metric: a binary value (0 or 1) where 0 indicates the packet completed the round-trip from Src to Dst and back before TstampSrc + Tmax, and 1 indicates the reflected packet was not received within that window.'
