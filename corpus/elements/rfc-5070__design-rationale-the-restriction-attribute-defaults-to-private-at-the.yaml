document: rfc-5070
kind: design-rationale
summary: The 'restriction' attribute defaults to 'private' at the Incident class level and is logically inherited by all child classes. Child classes may override the parent's disclosure policy—either more restrictively or more permissively—allowing granular per-class access control within a single document.
section: "3.2"
topics:
