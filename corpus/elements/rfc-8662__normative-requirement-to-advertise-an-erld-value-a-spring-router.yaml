document: rfc-8662
kind: normative-requirement
summary: To advertise an ERLD value, a SPRING router MUST be entropy label capable and apply RFC 6790 data-plane procedures, MUST be able to read an ELI/EL within its ERLD depth, and MUST take into account an EL within the first ERLD labels in its load-balancing function.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
