document: rfc-2380
kind: normative-requirement
summary: For MARS-based networks, administrators MUST configure mesh mode distribution for multicast groups used in RSVP sessions. For LANE1.0 networks, the break bit MUST always be set since the only distribution option is via the Broadcast and Unknown Server.
section: "3.3"
rfc2119_level: MUST
