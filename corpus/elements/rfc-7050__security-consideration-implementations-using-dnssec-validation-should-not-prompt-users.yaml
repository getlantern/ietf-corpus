document: rfc-7050
kind: security-consideration
summary: Implementations using DNSSEC validation SHOULD NOT prompt users to add unknown domains to their trusted domain list, as users tend to accept such prompts without consideration. It is better to fail the discovery procedure when no trusted domain match is found.
section: "7"
