document: rfc-5775
kind: normative-requirement
summary: A receiver is REQUIRED to obtain the FEC Object Transmission Information for each object for which data packets are received from the session, including the FEC Encoding ID, FEC Instance ID (if applicable), and the transfer length of the object in bytes.
section: "2.3"
rfc2119_level: REQUIRED
topics:
    - multicast
    - realtime
