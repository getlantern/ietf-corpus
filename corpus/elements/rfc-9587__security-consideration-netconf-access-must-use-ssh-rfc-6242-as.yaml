document: rfc-9587
kind: security-consideration
summary: NETCONF access must use SSH (RFC 6242) as the mandatory-to-implement secure transport; RESTCONF must use HTTPS with TLS (RFC 8446). NACM (RFC 8341) provides access control for NETCONF/RESTCONF operations and content.
