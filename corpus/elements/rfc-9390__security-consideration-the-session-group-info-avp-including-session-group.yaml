document: rfc-9390
kind: security-consideration
summary: The Session-Group-Info AVP (including Session-Group-Control-Vector and Session-Group-Id) must be treated as security-sensitive in the same manner as the Session-Id AVP. The absence of end-to-end security in Diameter means any intermediate agent can modify group-related information; trust in non-adjacent nodes cannot be assured without end-to-end security mechanisms.
section: "10"
topics:
    - diameter
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
