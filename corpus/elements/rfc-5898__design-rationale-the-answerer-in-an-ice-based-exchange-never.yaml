document: rfc-5898
kind: design-rationale
summary: The answerer in an ICE-based exchange never needs to request confirmation of a connectivity precondition from the offerer because the answerer can determine precondition status locally via ICE checks. Confirmation requests are only needed for lite ICE implementations that lack full bidirectional verification capability.
section: "4.2"
topics:
    - sip
    - realtime
    - nat
