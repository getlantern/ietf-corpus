document: rfc-5910
kind: design-rationale
summary: RFC 4310 (secDNS-1.0) was obsoleted primarily because its removal of DS data based on the non-unique <secDNS:keyTag> element was unsafe. The replacement requires clients to specify all four DS data elements that are guaranteed to be unique, preventing accidental or ambiguous deletions.
section: "1"
topics:
    - dns
    - security
