document: rfc-7400
kind: protocol-element
summary: Decompression variables 'sa' and 'na' are initialized to zero at the start of decompressing each header or payload within an L2 packet (fragment). The 101nssss instruction accumulates extended offset/length for subsequent backreferences, and the 11nnnkkk instruction resets both to zero after use.
