document: rfc-2429
kind: interoperability-note
summary: This format supersedes RFC 2190 for new implementations and can also be used with the 1996 version of H.263. RFC 2190 continues to be used by existing implementations and may be required for backward compatibility. Implementations using new H.263+ features shall use this format.
