document: rfc-3596
kind: normative-requirement
summary: All existing query types that perform type A additional section processing (NS, SRV, MX) must be redefined to perform both type A and type AAAA additional section processing. Name servers must add relevant IPv4 and IPv6 addresses to the additional section when processing these queries.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
