document: rfc-8966
kind: normative-requirement
summary: Parsing a TLV MUST update the parser state (router-id, next-hop, default prefix) even if the TLV is otherwise ignored due to an unknown mandatory sub-TLV or any other reason, ensuring that parser state remains identical across all implementations.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
