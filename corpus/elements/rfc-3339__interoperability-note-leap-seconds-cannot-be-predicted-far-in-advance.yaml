document: rfc-3339
kind: interoperability-note
summary: Leap seconds cannot be predicted far in advance; applications must not generate timestamps for inserted leap seconds before they are announced by the IERS. The leap second value of time-second=60 is only valid at the end of June or December (primary) or March or September (secondary).
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
