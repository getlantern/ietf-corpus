document: rfc-5150
kind: security-consideration
summary: LSP stitching allows the IP destination address of Path and PathTear messages to be the IP address of a next-hop node rather than the RSVP session destination address. This makes IPsec AH (previously ruled out in RFC 2747 for RSVP) now applicable, and standard IPsec procedures can be used to secure message exchanges.
section: "6"
topics:
    - security
    - mpls
    - ipsec
