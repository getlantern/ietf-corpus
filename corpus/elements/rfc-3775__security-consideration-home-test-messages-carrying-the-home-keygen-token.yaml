document: rfc-3775
kind: security-consideration
summary: Home Test messages (carrying the home keygen token) are tunneled from the home agent to the mobile node; to prevent passive inspection, they SHOULD be encrypted with IPsec ESP in tunnel mode between home agent and mobile node. This limits exposure of the keygen token to active on-path attackers.
section: 5.2.5
topics:
    - security
    - ipsec
    - ip
    - mobility
