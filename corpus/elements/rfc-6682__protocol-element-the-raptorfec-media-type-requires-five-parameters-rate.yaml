document: rfc-6682
kind: protocol-element
summary: 'The ''raptorfec'' media type requires five parameters: ''rate'' (RTP clock rate in Hz), ''raptor-scheme-id'' (FEC Scheme ID from RFC 6681), ''Kmax'' (Maximum Source Block Length), ''T'' (encoding symbol size in bytes), and ''repair-window'' (maximum time spanning source and repair packets, in microseconds). The optional ''P'' parameter specifies Payload ID Format, defaulting to ''A''.'
section: 6.1.1
topics:
    - rtp
    - realtime
    - registry
