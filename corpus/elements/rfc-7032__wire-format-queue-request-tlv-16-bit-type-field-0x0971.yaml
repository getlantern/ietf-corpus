document: rfc-7032
kind: wire-format
summary: 'Queue Request TLV: 16-bit Type field=0x0971, 16-bit Length field=0x0000 (zero-length value). U-bit=1 causes unknown-TLV receivers to silently ignore the TLV and process the rest of the message; F-bit=0 prevents forwarding of the unrecognized TLV. Carried as an Optional Parameter in the LDP Label Request message.'
