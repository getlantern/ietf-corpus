document: rfc-6876
kind: normative-requirement
summary: The NEA Server MUST always send an empty SASL Mechanisms TLV (with no mechanisms listed) as the last message of the PT-TLS Negotiation phase to signal transition to Data Transport. The NEA Client MUST NOT transition to the Data Transport phase until it receives this empty SASL Mechanisms TLV.
section: 3.8.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
