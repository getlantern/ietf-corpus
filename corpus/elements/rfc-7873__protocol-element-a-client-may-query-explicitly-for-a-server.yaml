document: rfc-7873
kind: protocol-element
summary: A client may query explicitly for a Server Cookie by sending a QUERY with an empty Question Section (QDCOUNT=0) and an OPT RR containing a COOKIE option. The server responds with an empty Answer Section and a COOKIE option containing the Client Cookie and a valid Server Cookie; RCODE is NOERROR if the submitted Server Cookie was valid, BADCOOKIE if it was invalid.
section: "5.4"
topics:
    - dns
