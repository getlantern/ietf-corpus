document: rfc-9248
kind: normative-requirement
summary: The 'instanceId' parameter provided to the RUE Configuration service MUST be the same value each time that instance (same implementation on same device) queries the interface. If cached configuration values are used, they MUST be cryptographically protected against unauthorized disclosure.
section: "9.2"
rfc2119_level: MUST
topics:
    - security
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
