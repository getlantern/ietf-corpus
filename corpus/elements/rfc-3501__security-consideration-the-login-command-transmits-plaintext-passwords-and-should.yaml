document: rfc-3501
kind: security-consideration
summary: The LOGIN command transmits plaintext passwords and SHOULD NOT be used over insecure networks. A server MUST implement a configuration that advertises LOGINDISABLED and disallows LOGIN unless STARTTLS or equivalent session protection is active. Client implementations MUST NOT send LOGIN if LOGINDISABLED is advertised.
section: 6.2.3
topics:
    - email
    - security
