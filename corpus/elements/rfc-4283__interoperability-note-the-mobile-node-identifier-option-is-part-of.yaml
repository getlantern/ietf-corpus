document: rfc-4283
kind: interoperability-note
summary: The Mobile Node Identifier option is part of a solution enabling dynamic home address allocation in MIPv6. This complements RFC 3775, which uses only IPv6 home addresses for identification, by allowing AAA infrastructure, HLR/AuC, or application-specific identifiers to be used instead.
section: "1"
topics:
    - ip
    - mobility
