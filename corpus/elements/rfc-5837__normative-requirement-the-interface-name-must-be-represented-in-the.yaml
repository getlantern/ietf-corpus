document: rfc-5837
kind: normative-requirement
summary: The interface name MUST be represented in the UTF-8 charset using the Default Language. It SHOULD be the full MIB-II ifName (or first 63 octets if longer), but MAY be another human-meaningful name.
section: "4.3"
rfc2119_level: MUST
