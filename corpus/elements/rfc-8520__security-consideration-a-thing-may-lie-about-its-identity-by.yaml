document: rfc-8520
kind: security-consideration
summary: A Thing may lie about its identity by emitting a forged MUD URL via DHCP or LLDP, gaining unauthorized network access; implementations SHOULD be configurable to disallow additive access for devices presenting MUD URLs not emitted in a secure (certificate-bound) fashion, and MUST NOT mix devices with the same MUD URL derived from both strong and weak authentication.
section: "16"
topics:
    - security
    - pkix
