document: rfc-7273
kind: protocol-element
summary: The direct-referenced media clock (`a=mediaclk:direct[=offset] [rate=N/D]`) derives RTP timestamps directly from the timestamp reference clock. An optional 32-bit offset gives the RTP timestamp at the reference epoch; a rate modifier (e.g., `rate=1000/1001`) accommodates NTSC pull-down sample rates.
section: "5.2"
topics:
    - rtp
    - realtime
