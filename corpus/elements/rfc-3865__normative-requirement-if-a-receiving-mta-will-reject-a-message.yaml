document: rfc-3865
kind: normative-requirement
summary: If a receiving MTA will reject a message based on solicitation class keywords, it SHOULD declare those keywords either in the initial EHLO exchange or on a per-recipient basis. It SHOULD NOT deliver a message whose 'Solicitation:' header matches a keyword declared during EHLO or per-recipient.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
