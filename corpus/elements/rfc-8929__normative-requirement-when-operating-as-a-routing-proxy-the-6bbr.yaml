document: rfc-8929
kind: normative-requirement
summary: When operating as a Routing Proxy, the 6BBR MUST use its own Layer 2 address on its backbone interface in the SLLAO of RS messages and the TLLAO of NA messages advertising Registered Addresses. A MLSN prefix MUST NOT be advertised as on-link in RAs sent toward the LLN in Routing Proxy mode.
section: "7"
rfc2119_level: MUST
topics:
    - ip
