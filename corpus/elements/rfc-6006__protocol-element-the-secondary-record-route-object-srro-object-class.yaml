document: rfc-6006
kind: protocol-element
summary: The Secondary Record Route Object (SRRO, Object-Class 30, Object-Type 1) records the explicit route of an S2L sub-LSP, using the same class as the SRRO defined in RFC 4873. SERO and SRRO are used for reoptimization reporting.
