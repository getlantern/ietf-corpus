document: rfc-9926
kind: normative-requirement
summary: When P-Field is 3 and the EARO is included in an NS message, the Prefix Length field MUST contain a value in the inclusive range of 16 to 120. When included in an NA message, the field MUST carry a status value regardless of the P-Field setting.
section: "7.2"
rfc2119_level: MUST
topics:
    - ip
