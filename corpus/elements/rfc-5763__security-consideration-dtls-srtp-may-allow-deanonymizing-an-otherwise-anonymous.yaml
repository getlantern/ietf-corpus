document: rfc-5763
kind: security-consideration
summary: DTLS-SRTP may allow deanonymizing an otherwise anonymous call if the same self-signed certificate is reused across calls, allowing call correlation. A new certificate per call prevents this correlation but sacrifices continuity of authentication.
section: "6.1"
topics:
    - privacy
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
