document: rfc-2478
kind: protocol-element
summary: SPNEGO is a pseudo-security mechanism identified by OID iso.org.dod.internet.security.mechanism.snego (1.3.6.1.5.5.2). It enables GSS-API peers to determine in-band whether they share common security mechanisms and, if so, to invoke normal context establishment for a selected mechanism.
