document: rfc-9130
kind: normative-requirement
summary: If an implementation supports per-level configuration for a parameter not modeled with per-level containers (such as overload bit), it MUST augment the current model by adding both level-1 and level-2 containers and MUST reuse existing configuration groupings.
section: "2.3"
rfc2119_level: MUST
topics:
