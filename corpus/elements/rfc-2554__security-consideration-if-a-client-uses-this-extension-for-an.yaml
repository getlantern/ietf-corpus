document: rfc-2554
kind: security-consideration
summary: If a client uses this extension for an encrypted tunnel, it must be configured to never send mail to the server when the connection is not mutually authenticated and encrypted, to prevent an attacker from hijacking the connection and stealing mail by suppressing or failing AUTH.
section: "9"
topics:
