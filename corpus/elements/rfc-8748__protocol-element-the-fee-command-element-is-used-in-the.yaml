document: rfc-8748
kind: protocol-element
summary: The <fee:command> element is used in the EPP <check> command to query fees for a specific command type. Its required 'name' attribute specifies the command (create, delete, renew, update, transfer, restore, or custom), with optional 'phase' and 'subphase' attributes for launch phases and an optional 'customName' attribute when name is 'custom'.
section: "3.1"
topics:
