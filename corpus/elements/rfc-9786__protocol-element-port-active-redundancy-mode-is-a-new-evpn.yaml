document: rfc-9786
kind: protocol-element
summary: Port-Active redundancy mode is a new EVPN multihoming mode where only one of the multihomed interfaces is in forwarding state at any time, with all services on the active interface operating in active mode and all services on the standby interface operating in standby mode. DF election operates per [ES] granularity rather than per [ES, Ethernet Tag].
section: "2"
topics:
