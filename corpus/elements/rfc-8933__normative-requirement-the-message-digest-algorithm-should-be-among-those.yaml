document: rfc-8933
kind: normative-requirement
summary: The message digest algorithm SHOULD be among those listed in the digestAlgorithms field of the associated SignedData. Implementations MAY fail to validate signatures that use a digest algorithm not included in the SignedData digestAlgorithms set.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
