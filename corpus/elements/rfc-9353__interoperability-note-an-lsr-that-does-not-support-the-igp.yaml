document: rfc-9353
kind: interoperability-note
summary: An LSR that does not support the IGP PCE capability bits or the KEY-ID and KEY-CHAIN-NAME sub-TLVs defined in this document silently ignores them. The IGP extensions introduce no new interoperability issues.
