document: rfc-3454
kind: normative-requirement
summary: The list of unassigned code points in Unicode 3.2 given in Appendix A MUST be used by implementations. If there are discrepancies between Appendix A and the Unicode 3.2 specification, Appendix A always takes precedence.
section: "1.2"
rfc2119_level: MUST
