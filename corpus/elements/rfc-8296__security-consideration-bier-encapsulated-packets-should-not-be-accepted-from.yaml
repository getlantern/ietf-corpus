document: rfc-8296
kind: security-consideration
summary: BIER-encapsulated packets should not be accepted from untrusted interfaces or tunnels. When packets must be accepted from systems not controlled by the operator (e.g., VMs in a data center), the encapsulation provides no mechanism to verify that the source is legitimate, that the BFIR-id is authentic, or that the BitString is authorized.
section: "6"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
