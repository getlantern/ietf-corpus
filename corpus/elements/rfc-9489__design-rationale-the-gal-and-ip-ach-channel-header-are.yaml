document: rfc-9489
kind: design-rationale
summary: The GAL and IP ACH Channel header are used at the egress PE to distinguish OAM ping packets from data packets, allowing the PE to determine whether the incoming packet is an IPv4 or IPv6 OAM packet without inspecting payload contents.
