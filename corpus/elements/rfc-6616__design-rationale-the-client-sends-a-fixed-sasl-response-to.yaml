document: rfc-6616
kind: design-rationale
summary: The client sends a fixed '=' SASL response to indicate that authentication flow has shifted to the browser for OpenID processing. The alternative — signaling from the browser back to the SASL client — raises substantial inter-process communication complexity, making externalization to the browser preferable.
section: "2.2"
topics:
    - security
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
