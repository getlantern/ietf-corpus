document: rfc-3813
kind: normative-requirement
summary: Agents not allowing managers to create entries in mplsInSegmentTable or mplsOutSegmentTable MUST set the corresponding IndexNext object (mplsInSegmentIndexNext, mplsOutSegmentIndexNext) to the string containing the single octet 0x00, which is the sentinel value indicating no new entries can be created.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
