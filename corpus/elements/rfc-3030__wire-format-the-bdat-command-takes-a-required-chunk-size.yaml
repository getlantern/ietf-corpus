summary: 'The BDAT command takes a required chunk-size (octet count) and an optional LAST marker. Syntax: `bdat-cmd ::= "BDAT" SP chunk-size [ SP end-marker ] CR LF` where `chunk-size ::= 1*DIGIT` and `end-marker ::= "LAST"`.'
