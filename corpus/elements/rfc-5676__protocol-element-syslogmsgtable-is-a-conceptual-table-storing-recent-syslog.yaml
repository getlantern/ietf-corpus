document: rfc-5676
kind: protocol-element
summary: syslogMsgTable is a conceptual table storing recent SYSLOG messages, indexed by syslogMsgIndex (Unsigned32, 1..4294967295). Each entry contains facility, severity, version, timestamp, hostname, app-name, procid, msgid, SD parameter count, and message body.
