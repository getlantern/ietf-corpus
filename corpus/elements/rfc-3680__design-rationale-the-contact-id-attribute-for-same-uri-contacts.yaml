document: rfc-3680
kind: design-rationale
summary: The contact "id" attribute for same-URI contacts SHOULD (not MUST) be stable across notifications because SIP URI equality is non-transitive, making it impossible for a hash function to strictly satisfy a MUST-level requirement.
