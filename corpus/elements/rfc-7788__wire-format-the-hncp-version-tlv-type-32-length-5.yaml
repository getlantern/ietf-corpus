document: rfc-7788
kind: wire-format
summary: The HNCP-Version TLV (type 32, length >= 5) contains a 16-bit Reserved field, and four 4-bit capability fields M (mDNS proxy priority), P (DHCPv6-PD priority), H (stateful DHCPv6 priority), and L (DHCPv4 priority), each 0–7 for active use (values 8–15 reserved), followed by a variable-length UTF-8 User-Agent string.
section: "10.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
