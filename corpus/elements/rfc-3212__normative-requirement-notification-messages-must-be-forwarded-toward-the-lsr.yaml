document: rfc-3212
kind: normative-requirement
summary: Notification Messages MUST be forwarded toward the LSR originating the Label Request at each hop whenever procedures specify sending a Notification in response to a Label Request Message. All new CR-LDP status codes require the F bit to be set.
section: "3.4"
rfc2119_level: MUST
