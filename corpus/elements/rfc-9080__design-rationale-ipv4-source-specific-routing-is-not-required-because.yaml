document: rfc-9080
kind: design-rationale
summary: IPv4 source-specific routing is not required because HNCP elects a single NAT gateway and publishes a single nonspecific IPv4 default route (RFC 7788, Section 6.5), making per-source IPv4 routing architecturally unnecessary for Homenet.
