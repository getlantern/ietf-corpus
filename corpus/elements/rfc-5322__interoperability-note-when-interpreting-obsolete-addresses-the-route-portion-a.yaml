document: rfc-5322
kind: interoperability-note
summary: When interpreting obsolete addresses, the route portion (a comma-separated '@'-prefixed domain list before the addr-spec inside angle brackets) SHOULD be ignored. This route syntax was used in earlier specifications but is no longer relevant to mail delivery.
section: "4.4"
