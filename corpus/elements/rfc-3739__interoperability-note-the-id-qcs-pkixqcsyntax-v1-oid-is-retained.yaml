document: rfc-3739
kind: interoperability-note
summary: The id-qcs-pkixQCSyntax-v1 OID is retained for backwards compatibility to identify certificates issued under the obsoleted RFC 3039 (Version 1). New certificates conforming to this profile (RFC 3739, Version 2) MUST use id-qcs-pkixQCSyntax-v2 and MUST NOT include the v1 statement.
section: 3.2.6.1
topics:
    - pkix
