document: rfc-5905
kind: protocol-element
summary: 'The on-wire protocol exchanges four timestamps: t1 (client departure), t2 (server arrival), t3 (server departure), t4 (client arrival). Clock offset theta = [(T2-T1)+(T3-T4)]/2 and round-trip delay delta = (T4-T1)-(T3-T2). The protocol is inherently resistant to lost or duplicate packets and requires no reliable delivery.'
section: "8"
topics:
