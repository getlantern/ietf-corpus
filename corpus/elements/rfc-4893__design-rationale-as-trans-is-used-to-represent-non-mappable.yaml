document: rfc-4893
kind: design-rationale
summary: AS_TRANS is used to represent non-mappable 4-octet AS numbers in 2-octet AS_PATH encodings rather than collapsing or dropping path entries, which preserves path length and enables reconstruction of the full 4-octet path from AS4_PATH once the route reaches a NEW speaker.
section: 4.2.2
