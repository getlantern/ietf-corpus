document: rfc-3284
kind: protocol-element
summary: Target and source windows are conceptually concatenated into a superstring U = S[0..s-1]T[0..t-1]. COPY instruction addresses are positions within U; the address of T[k] is s+k. This unified address space allows COPY instructions to reference either source or target data.
section: "3"
