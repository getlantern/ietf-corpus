document: rfc-4717
kind: wire-format
summary: ATM N-to-one cell encapsulation carries each ATM cell as a 4-byte header (VPI, VCI, PTI, CLP — without HEC) plus 48-byte payload (52 bytes per cell); multiple cells may be concatenated and the cell count is inferred from the frame length.
