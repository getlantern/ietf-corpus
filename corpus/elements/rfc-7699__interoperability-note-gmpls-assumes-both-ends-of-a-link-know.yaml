document: rfc-7699
kind: interoperability-note
summary: GMPLS assumes both ends of a link know which label types are supported. A legacy node receiving an unknown flexi-grid label will attempt to process it as a known label type, potentially yielding a poor outcome; thus, flexi-grid labels must not be used with legacy nodes that do not support them.
section: "5.1"
topics:
    - routing
    - mpls
