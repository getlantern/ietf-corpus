document: rfc-7383
kind: normative-requirement
summary: If reassembling has already started and a new fragment arrives with a higher Total Fragments value, the receiver MUST discard all previously stored fragments and restart reassembly with just the newly received fragment.
section: "2.6"
rfc2119_level: MUST
topics:
    - ipsec
