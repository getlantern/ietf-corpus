document: rfc-9329
kind: protocol-element
summary: IKEv2 Cookie requests provide less value with TCP encapsulation because the TCP handshake already verifies the Initiator's IP address. The Responder SHOULD NOT send a Cookie request without an accompanied Puzzle, and MUST NOT include the Initiator's TCP port in the Cookie calculation since the Cookie may be returned on a different port.
section: "6.3"
topics:
    - ipsec
    - vpn
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
