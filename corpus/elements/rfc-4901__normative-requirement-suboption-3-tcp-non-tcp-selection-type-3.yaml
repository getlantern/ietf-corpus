document: rfc-4901
kind: normative-requirement
summary: Suboption 3 (TCP/non-TCP selection, Type 3, Length 3) MUST be included for IPHC PWs (0x001C) and MUST NOT be included for other PW types. Parameter value 1 sets TCP_SPACE contexts to 0; value 2 sets NON_TCP_SPACE contexts to 0. If included multiple times with both values, compression is disabled for all packets.
section: 4.2.4
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
