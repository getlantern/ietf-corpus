document: rfc-5251
kind: normative-requirement
summary: 'If the CPI is an IPv4 address (or tuple containing an IPv4 address), then the VPN-PPI MUST be an IPv4 address (or tuple) as well, since VPN-PPIs are created from the customer address space. The same constraint applies for IPv6: an IPv6 CPI requires an IPv6 VPN-PPI.'
section: "3.3"
rfc2119_level: MUST
topics:
    - vpn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
