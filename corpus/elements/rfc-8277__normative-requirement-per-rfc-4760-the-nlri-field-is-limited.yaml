document: rfc-8277
kind: normative-requirement
summary: Per RFC 4760, the NLRI field is limited to 255 bits total (not octets), including prefix bits. In a SAFI-128 UPDATE, a VPN-IPv6 host route prefix can be up to 192 bits, severely limiting the number of labels that can be encoded.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
