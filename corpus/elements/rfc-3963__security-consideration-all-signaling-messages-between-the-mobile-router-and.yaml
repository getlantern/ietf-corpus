document: rfc-3963
kind: security-consideration
summary: All signaling messages between the Mobile Router and the Home Agent MUST be authenticated by IPsec, using the mechanisms described in RFC 3776 (HA-MN IPsec specification). The NEMO signaling extensions inherit these requirements without modification.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - mobility
    - ipsec
