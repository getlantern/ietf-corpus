document: rfc-4462
kind: normative-requirement
summary: Mechanisms conforming to this document MUST NOT use SPNEGO as the underlying GSS-API mechanism. SPNEGO is both unnecessary (SSH performs its own method negotiation) and potentially harmful because it can result in use of a weaker method than desired.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
