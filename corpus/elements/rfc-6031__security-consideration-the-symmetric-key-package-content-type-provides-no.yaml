document: rfc-6031
kind: security-consideration
summary: The symmetric key package content type provides no inherent protection; implementers MUST combine it with a CMS protecting content type (e.g., signed, authenticated, or encrypted via RFC 5652) or an equivalent security protocol such as DSKPP (RFC 6063) to protect the key material in transit.
section: "5"
topics:
    - crypto
    - security
