document: rfc-9483
kind: normative-requirement
summary: The proof-of-possession MUST be provided by signing the certReq containing the certTemplate. When using POPOSigningKey, the poposkInput field MUST NOT be used. The signature algorithm MUST be consistent with the publicKey algorithm field of the certTemplate.
section: 4.1.1
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
