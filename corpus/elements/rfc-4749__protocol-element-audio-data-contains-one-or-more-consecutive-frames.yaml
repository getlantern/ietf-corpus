document: rfc-4749
kind: protocol-element
summary: Audio data contains one or more consecutive frames at the same bit rate, packed oldest-first. The number of frames is inferred by dividing the audio data size by the per-frame size given by the FT table; any remainder bytes MUST be ignored.
section: "5.4"
