document: rfc-2366
kind: design-rationale
summary: The MARS MIB is designed for use in conjunction with ATM-MIB (RFC 1695), MIB-II (RFC 1213), and optionally IF-MIB (RFC 1573) rather than being self-contained; this avoids duplicating ATM interface and IP address management objects already standardized in those MIBs.
