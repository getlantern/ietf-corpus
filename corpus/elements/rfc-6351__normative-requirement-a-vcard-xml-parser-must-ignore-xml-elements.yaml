document: rfc-6351
kind: normative-requirement
summary: A vCard XML parser MUST ignore XML elements and attributes for which it does not recognize the expanded name, and MUST also follow the normal behavior of ignoring XML processing instructions whose target is not recognized.
section: "5.1"
rfc2119_level: MUST
