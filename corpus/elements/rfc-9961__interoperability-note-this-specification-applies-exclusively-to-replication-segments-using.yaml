document: rfc-9961
kind: interoperability-note
summary: This specification applies exclusively to Replication Segments using MPLS encapsulation (Replication-SIDs) and does not cover SRv6. The mechanisms build upon RFC 6425 for P2MP MPLS OAM and reuse the same destination UDP port as RFC 8029.
