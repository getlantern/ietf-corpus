document: rfc-4960
kind: registry
summary: This document establishes an IANA registry for SCTP Payload Protocol Identifiers (32-bit values in the DATA chunk Payload Protocol Identifier field). The value 0 indicates no application identifier; all other values require IANA assignment for use by upper-layer protocols.
section: "14.4"
topics:
