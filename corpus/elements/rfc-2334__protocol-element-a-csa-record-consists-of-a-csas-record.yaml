document: rfc-2334
kind: protocol-element
summary: A CSA Record consists of a CSAS Record header followed by a client/server protocol-specific part. If a CSA Record exceeds the link-layer PDU size, it MUST be fragmented across multiple CSU Request messages using a method defined in the protocol-specific document.
section: B.2.2.1
