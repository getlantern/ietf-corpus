document: rfc-2045
kind: interoperability-note
summary: 'When checking MIME-Version values, any RFC 822 comment strings present must be ignored. For example, ''MIME-Version: 1.(produced by MetaSend Vx.x)0'' is equivalent to ''MIME-Version: 1.0''.'
