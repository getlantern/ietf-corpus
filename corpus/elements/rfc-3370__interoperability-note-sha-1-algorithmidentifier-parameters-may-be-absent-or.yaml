document: rfc-3370
kind: interoperability-note
summary: SHA-1 AlgorithmIdentifier parameters may be absent or encoded as NULL because when the 1988 ASN.1 syntax was translated to 1997 syntax, the OPTIONAL qualifier was lost and later recovered via a defect report, by which time many implementations had already encoded parameters as mandatory NULL.
section: "2.1"
topics:
