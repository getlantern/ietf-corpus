document: rfc-5465
kind: protocol-element
summary: The MailboxName event is sent when a mailbox is created, deleted, or renamed (including granting/revoking the 'l' right in ACL-enabled servers). The server sends an unsolicited LIST response for each affected mailbox name; renamed mailboxes get an extended LIST response with the OLDNAME extended data item.
section: "5.4"
topics:
    - email
