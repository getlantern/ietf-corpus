document: rfc-8315
kind: normative-requirement
summary: Once an article is injected, the Cancel-Lock header field MUST NOT be altered; in particular, relaying agents beyond the injecting agent MUST NOT alter it. The same constraint applies to the Cancel-Key header field.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
