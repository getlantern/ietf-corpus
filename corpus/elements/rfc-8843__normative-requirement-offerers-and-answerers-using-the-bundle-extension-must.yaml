document: rfc-8843
kind: normative-requirement
summary: Offerers and answerers using the BUNDLE extension MUST support the MID mechanism (Section 15) for inserting the identification-tag into RTP and RTCP packets so that any RTP stream can always be associated with the correct 'm=' section.
