document: rfc-4004
kind: normative-requirement
summary: The AAAH MUST always copy the MIP-Originating-Foreign-AAA AVP from the AMR to the HAR. If the MIP-Home-Agent-Host AVP is present in the AMR, the AAAH MUST copy it into the HAR.
