document: rfc-9143
kind: normative-requirement
summary: Offerers and answerers using the BUNDLE extension MUST support the MID mechanism (Section 15), inserting the identification-tag associated with an 'm=' section into RTP header extensions and RTCP SDES packets to enable correct association of RTP streams with 'm=' sections.
section: "9.2"
rfc2119_level: MUST
topics:
