document: rfc-6572
kind: design-rationale
summary: 'Three deployment models are supported: (1) both MAG and LMA in the home network, (2) both in the visited network with VAAA acting as proxy to HAAA, and (3) MAG in the visited network while LMA is in the home network with direct HAAA access. This drives the parallel ''Home'' and ''Visited'' attribute pairs throughout the specification.'
