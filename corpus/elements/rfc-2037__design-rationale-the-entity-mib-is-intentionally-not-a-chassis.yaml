document: rfc-2037
kind: design-rationale
summary: The Entity MIB is intentionally not a 'Chassis MIB replacement.' A previous IETF working group failed to reach consensus on a Chassis MIB, likely due to overly broad scope. This MIB limits itself to representing logical/physical entity relationships rather than full chassis management.
section: "3.4"
topics:
