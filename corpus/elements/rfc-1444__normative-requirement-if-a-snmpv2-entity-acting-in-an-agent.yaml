document: rfc-1444
kind: normative-requirement
summary: If a SNMPv2 entity acting in an agent role claims compliance to a MIB module, it must implement each and every object within each conformance group listed in the MANDATORY-GROUPS clause. Returning noSuchObject for any object in a mandatory group means the entity is not a conformant implementation.
section: 4.4.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
