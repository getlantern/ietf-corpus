document: rfc-9247
kind: wire-format
summary: The S-BFD Discriminators TLV has a 2-octet Type field (value 1032), a 2-octet Length field, and one or more 4-octet Discriminator fields. The Length MUST be a minimum of 4 octets, incrementing by 4 for each additional discriminator.
