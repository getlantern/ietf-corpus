document: rfc-1122
kind: state-machine
summary: 'TCP defines eleven states: CLOSED, LISTEN, SYN-SENT, SYN-RECEIVED, ESTABLISHED, FIN-WAIT-1, FIN-WAIT-2, CLOSE-WAIT, CLOSING, LAST-ACK, and TIME-WAIT. RFC-1122 requires that TIME-WAIT last at least 2*MSL (MSL recommended as 2 minutes), and that simultaneous open and simultaneous close both be supported.'
section: 4.2.2.8
topics:
    - tcp
