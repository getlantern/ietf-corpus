document: rfc-1730
kind: protocol-element
summary: The UID command variant interprets message sets as unique identifiers rather than sequence numbers for FETCH, COPY, STORE, and SEARCH. UIDs are strictly ascending, persist across sessions, and are never reused within a mailbox incarnation. UIDVALIDITY is sent at selection to detect invalidation.
section: 6.4.9
topics:
    - email
