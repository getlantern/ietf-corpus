document: rfc-6439
kind: normative-requirement
summary: An RBridge with unexpired inhibition timers is still REQUIRED to indicate in every TRILL Hello it sends on VLAN-x whether or not it is Appointed Forwarder for VLAN-x on that port. Inhibition has no effect on the receipt or forwarding of TRILL Data frames.
section: "4"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
