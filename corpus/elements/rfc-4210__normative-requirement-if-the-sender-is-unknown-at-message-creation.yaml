document: rfc-4210
kind: normative-requirement
summary: If the sender is unknown at message creation time (e.g., in an initial request where the EE does not yet know its DN), the sender field MUST contain a NULL value (zero-length SEQUENCE OF RDNs) and senderKID MUST hold a reference value identifying the shared secret for message verification.
section: 5.1.1
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
