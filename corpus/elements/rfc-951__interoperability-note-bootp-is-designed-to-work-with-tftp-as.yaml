document: rfc-951
kind: interoperability-note
summary: BOOTP is designed to work with TFTP as the primary second-phase file transfer protocol, but may also work with SFTP or FTP. The 'file' field in the bootreply contains the fully qualified path name to be used in a TFTP 'read request'.
