document: rfc-6178
kind: design-rationale
summary: Prior to this document, no formal standard governed MPLS encapsulation of IPv4 packets with header options belonging to a prefix-based FEC, resulting in inconsistent ingress LER behaviors. Unencapsulated IPv4 option packets forwarded into an MPLS core risk packet loss (downstream LSRs may lack IPv4 routing info) and expose LSRs to IPv4 security attacks.
section: "2"
topics:
    - mpls
    - ip
    - security
