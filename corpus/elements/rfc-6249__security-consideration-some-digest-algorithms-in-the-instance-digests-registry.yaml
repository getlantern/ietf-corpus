document: rfc-6249
kind: security-consideration
summary: Some digest algorithms in the Instance Digests registry (particularly the MD family) are cryptographically weak and vulnerable to collisions, allowing an attacker to substitute a malicious file with a matching weak hash. SHA-256 or stronger algorithms MUST be used.
section: "9.3"
topics:
    - security
    - crypto
