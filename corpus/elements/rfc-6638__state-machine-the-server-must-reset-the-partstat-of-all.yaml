document: rfc-6638
kind: state-machine
summary: The server MUST reset the PARTSTAT of all non-Organizer ATTENDEEs to NEEDS-ACTION whenever a reschedule occurs. A reschedule is triggered by any change to DTSTART, DTEND, DURATION, or DUE; by RRULE or RDATE changes that add new instances or shift existing ones; or by EXDATE removal that reinstates instances.
section: 3.2.8
topics:
