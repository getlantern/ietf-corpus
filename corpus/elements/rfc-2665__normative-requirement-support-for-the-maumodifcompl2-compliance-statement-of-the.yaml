document: rfc-2665
kind: normative-requirement
summary: Support for the mauModIfCompl2 compliance statement of the MAU-MIB is REQUIRED for Ethernet-like interfaces, to allow applications to determine the current MAU type, control auto-negotiation, and control duplex mode. Without it there is no standard way to determine media type or control duplex.
section: "3.3"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
