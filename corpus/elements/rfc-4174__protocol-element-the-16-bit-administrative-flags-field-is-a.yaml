document: rfc-4174
kind: protocol-element
summary: 'The 16-bit Administrative Flags Field is a bitmap with four bits: bit 15 (Enabled), bit 14 (Heartbeat), bit 13 (Management SCNs), bit 12 (Default Discovery Domain). If the Enabled bit is zero, the remaining contents MUST be ignored, meaning iSNS administrative settings are obtained by other means.'
section: "2.3"
topics:
