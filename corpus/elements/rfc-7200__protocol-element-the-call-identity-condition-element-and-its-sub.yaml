document: rfc-7200
kind: protocol-element
summary: 'The <call-identity> condition element and its sub-element <sip> identify requests to filter by SIP header fields: <from>, <to>, <request-uri>, and <p-asserted-identity>. Multiple <sip> sub-elements are OR-combined; multiple header-field sub-elements within <sip> are AND-combined.'
section: 5.3.1
topics:
    - sip
    - realtime
