document: rfc-4551
kind: protocol-element
summary: 'The MODIFIED response code is included in the tagged OK (or NO) response to a STORE command when one or more messages failed the UNCHANGEDSINCE test. It carries the set of message sequence numbers or UIDs that were not updated: `OK [MODIFIED <set>]`.'
section: "3.2"
topics:
