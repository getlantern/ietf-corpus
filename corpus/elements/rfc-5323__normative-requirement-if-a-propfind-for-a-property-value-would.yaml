document: rfc-5323
kind: normative-requirement
summary: If a PROPFIND for a property value would yield a non-2xx response, that property is considered NULL. NULL values are 'less than' all other values in comparisons. Empty strings (zero length) are not NULL and are 'less than' strings of non-zero length.
section: 5.5.3
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
