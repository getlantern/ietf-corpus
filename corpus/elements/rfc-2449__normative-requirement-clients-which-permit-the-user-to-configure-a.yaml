document: rfc-2449
kind: normative-requirement
summary: Clients which permit the user to configure a mail check interval SHOULD use the LOGIN-DELAY capability to determine the minimum permissible interval. Servers which advertise LOGIN-DELAY SHOULD enforce it.
section: "6.5"
rfc2119_level: SHOULD
topics:
    - email
