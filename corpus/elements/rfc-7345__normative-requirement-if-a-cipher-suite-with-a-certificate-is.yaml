document: rfc-7345
kind: normative-requirement
summary: If a cipher suite with a certificate is selected during the DTLS handshake, the received certificate MUST match the fingerprint in the SDP 'fingerprint' attribute; if it does not match, the endpoint MUST immediately tear down the media session.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
