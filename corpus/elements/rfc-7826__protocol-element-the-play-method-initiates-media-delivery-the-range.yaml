document: rfc-7826
kind: protocol-element
summary: The PLAY method initiates media delivery; the Range header specifies where delivery starts and optionally ends. The PLAY response contains RTP-Info synchronization data. A PLAY request received while already in Play state updates the current delivery parameters.
