summary: 'The rpkiRtrCacheServerPreference object (Unsigned32, default 4294967295) expresses the router''s relative preference for a cache server: lower value means more preferred. If no ordering is configured or the configured value exceeds Unsigned32 max, the maximum value is returned.'
