document: rfc-7246
kind: design-rationale
summary: This document is primarily aimed at use cases where VRFs are used to support multicast applications other than multicast VPN. When PIM trees map one-to-one to multipoint LSPs (without aggregation), encoding PIM source/group addresses into the mLDP FEC (in-band signaling) is beneficial for troubleshooting purposes.
section: "1"
topics:
