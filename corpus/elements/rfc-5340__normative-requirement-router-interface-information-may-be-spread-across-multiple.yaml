document: rfc-5340
kind: normative-requirement
summary: Router interface information MAY be spread across multiple router-LSAs for a given area. Receivers MUST concatenate all router-LSAs originated by a given router when running the SPF calculation. Multiple router-LSAs from the same router are distinguished by their Link State ID fields.
section: "2.8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
