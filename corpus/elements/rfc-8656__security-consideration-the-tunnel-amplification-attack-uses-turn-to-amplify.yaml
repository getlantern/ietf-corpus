document: rfc-8656
kind: security-consideration
summary: The Tunnel Amplification Attack uses TURN to amplify traffic by sending encapsulated packets through the relay, where the inner packet contains a spoofed source address. The permission system partially mitigates this by requiring prior installation of a permission for each peer IP before the server relays traffic from that peer.
section: "21.4"
topics:
    - security
    - nat
