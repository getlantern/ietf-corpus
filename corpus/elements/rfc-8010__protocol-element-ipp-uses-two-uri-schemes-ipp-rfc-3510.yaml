summary: 'IPP uses two URI schemes: ''ipp'' (RFC 3510) mapping to HTTP on port 631, and ''ipps'' (RFC 7472) mapping to HTTPS on port 631. Clients and Printers MUST support ipp-URI values in job-uri, job-printer-uri, printer-uri-supported, and related operation attributes.'
