document: rfc-7428
kind: normative-requirement
summary: If DHCPv6-based addressing is used, the DHCPv6 client MUST use a DUID of type DUID-UUID (RFC 6355), with the UUID generated as a 47-bit random number-based UUID per RFC 4122 Section 4.5, and stored persistently.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
