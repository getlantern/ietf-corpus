document: rfc-8861
kind: normative-requirement
summary: 'In SDP Offer/Answer: an offerer that supports RTCP Reporting Groups MUST include ''a=rtcp-rgrp'' in the initial offer. If the SDP answer contains ''a=rtcp-rgrp'' but the offer did not, the offerer MUST reject the call.'
section: "3.6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
