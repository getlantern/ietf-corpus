document: rfc-3801
kind: interoperability-note
summary: Some deployed implementations based on a common interpretation of the original VPIMv2 specification reject (rather than discard) messages with prohibited content within Multipart/Voice-Message, returning an NDN. Senders MUST NOT place prohibited content inside the Multipart/Voice-Message to maintain interoperability with these systems.
section: "4.4"
topics:
    - email
