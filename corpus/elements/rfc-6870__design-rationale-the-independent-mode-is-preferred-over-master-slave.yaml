document: rfc-6870
kind: design-rationale
summary: The independent mode is preferred over master/slave mode for applications requiring PE node protection, because master/slave mode has no mechanism to detect misconfiguration and does not specify backup master procedures. Independent mode handles PE node failures more robustly.
section: "5.2"
topics:
    - mpls
