kind: wire-format
summary: 'The Congestion-Treatment AVP wire format (AVP Code 629, Grouped) contains a required Treatment-Action field and optional QoS-Profile-Template and QoS-Parameters fields, plus extensible AVPs: `Congestion-Treatment ::= < AVP Header: 629 > { Treatment-Action } [ QoS-Profile-Template ] [ QoS-Parameters ] * [ AVP ]`.'
