document: rfc-3825
kind: wire-format
summary: Altitude is a 30-bit field whose interpretation depends on the 4-bit AT (Altitude Type) field. AltRes is a 6-bit resolution subfield preceding Altitude. AT=1 encodes meters; AT=2 encodes floors; both use 2s-complement fixed-point with 22-bit integer and 8-bit fraction.
