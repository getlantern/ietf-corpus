document: rfc-9553
kind: normative-requirement
summary: The EmailAddress 'address' property MUST be an addr-spec as defined in RFC 5322 Section 3.4.1. The pref value MUST be in the range 1–100, with 1 being most preferred; absent pref MUST be interpreted as least preferred.
section: 2.3.1
rfc2119_level: MUST
topics:
