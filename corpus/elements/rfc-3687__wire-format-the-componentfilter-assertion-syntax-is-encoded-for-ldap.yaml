document: rfc-3687
kind: wire-format
summary: 'The ComponentFilter assertion syntax is encoded for LDAP using GSER (Generic String Encoding Rules). The document provides an equivalent ABNF for implementors: a ComponentFilter is one of filter-item ("item:" + ComponentAssertion), and-filter ("and:" + SequenceOfComponentFilter), or-filter ("or:"), or not-filter ("not:"). ComponentAssertion fields use labels "component", "useDefaultValues", "rule", and "value".'
section: "5"
