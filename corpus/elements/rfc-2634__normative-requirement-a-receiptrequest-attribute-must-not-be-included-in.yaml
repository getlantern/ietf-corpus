document: rfc-2634
kind: normative-requirement
summary: A ReceiptRequest attribute MUST NOT be included in the attributes of a SignerInfo in a SignedData object that encapsulates a Receipt content — the receiving agent MUST NOT request a signed receipt for a signed receipt.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - email
    - security
