document: rfc-4327
kind: protocol-element
summary: lmpControlChannelTable configures LMP control channels. Key fields include lmpCcId (non-zero 32-bit local CC identifier), lmpCcIsIf (whether the CC is modeled as an ifEntry), lmpCcSetupRole (active or passive), lmpCcAuthentication, and negotiated/configured HelloInterval and HelloDeadInterval values.
section: "6.2"
topics:
