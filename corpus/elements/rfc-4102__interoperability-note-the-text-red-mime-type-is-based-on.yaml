document: rfc-4102
kind: interoperability-note
summary: The text/red MIME type is based on RFC 2198 (RTP Payload for Redundant Audio Data), which is also the published specification for this MIME type. The format defined in RFC 2198 for audio redundancy is equally suitable for text redundancy.
