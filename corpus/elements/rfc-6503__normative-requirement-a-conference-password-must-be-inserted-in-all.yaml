document: rfc-6503
kind: normative-requirement
summary: A <conference-password> MUST be inserted in all CCMP requests whose target conference object is password-protected. If required but absent, the server MUST return a response-code of '423'.
section: "5.1"
rfc2119_level: MUST
topics:
