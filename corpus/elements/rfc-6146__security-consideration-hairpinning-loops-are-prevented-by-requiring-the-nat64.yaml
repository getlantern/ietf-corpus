document: rfc-6146
kind: security-consideration
summary: Hairpinning loops are prevented by requiring the NAT64 to silently discard any incoming IPv6 packet whose source address contains Pref64::/n. Without this rule, a crafted packet could loop indefinitely inside the NAT64 or trigger traffic amplification.
section: "5.4"
topics:
    - nat
    - security
    - v6ops
