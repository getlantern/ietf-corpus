document: rfc-8899
kind: protocol-element
summary: 'DPLPMTUD defines four constants: MAX_PROBES (default 3, maximum consecutive probe attempts), MIN_PLPMTU (smallest attempted PLPMTU, at least yielding 1280-byte IPv6 or 68-byte IPv4 packets), MAX_PLPMTU (constrained by local interface MTU and EMTU_R), and BASE_PLPMTU (expected working size for most paths, RECOMMENDED > 1200 bytes).'
section: 5.1.2
topics:
    - ip
    - udp
    - sctp
    - quic
