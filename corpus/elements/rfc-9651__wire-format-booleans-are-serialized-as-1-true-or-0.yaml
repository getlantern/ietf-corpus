document: rfc-9651
kind: wire-format
summary: Booleans are serialized as '?1' (true) or '?0' (false). In Dictionary values and Parameters, Boolean true is indicated by omitting the value entirely (key only); parsers must still correctly handle an explicit true value ('?1') in these positions.
section: 3.3.6
topics:
