document: rfc-6407
kind: normative-requirement
summary: The GROUPKEY-PUSH ISAKMP header Flags field MUST have the Encryption bit set and all other bits MUST be zero; Message ID MUST be set to zero. Exchange Type value 33 identifies the GROUPKEY-PUSH message.
section: "4.2"
rfc2119_level: MUST
topics:
