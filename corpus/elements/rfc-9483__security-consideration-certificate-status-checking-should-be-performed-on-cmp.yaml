document: rfc-9483
kind: security-consideration
summary: Certificate status checking SHOULD be performed on CMP protection certificates. If the response contains the caPubs field to transfer new trust anchor information, certificate status checking is REQUIRED. Path validation per RFC 5280 MUST be followed for signature-based CMP message protection.
section: "3.5"
topics:
    - security
    - pkix
