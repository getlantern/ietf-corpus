document: rfc-6826
kind: design-rationale
summary: For PIM-SM in ASM mode to work with in-band signaling, active sources must be discovered by some means other than a shared tree across the MPLS domain (e.g., MSDP or BGP Source Active auto-discovery routes); this document does not specify source discovery and therefore does not fully specify ASM support.
section: "2.2"
topics:
    - mpls
    - multicast
    - routing
