document: rfc-5250
kind: wire-format
summary: 'The OSPF Options field is an 8-bit field present in Hello packets, Database Description packets, and all LSAs. The O-bit indicates the router''s willingness to receive and forward Opaque LSAs. The full layout is: DN | O | DC | EA | N/P | MC | E | MT.'
