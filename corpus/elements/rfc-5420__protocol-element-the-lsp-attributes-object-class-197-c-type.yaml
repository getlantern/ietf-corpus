document: rfc-5420
kind: protocol-element
summary: The LSP_ATTRIBUTES object (class 197, C-Type 1) uses a C-Num of the form 11bbbbbb, so LSRs that do not recognize it pass it on transparently without examining or modifying it. It may appear on Path messages to signal optional LSP attributes and on Resv messages to report operational state.
section: "4"
topics:
