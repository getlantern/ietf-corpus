document: rfc-9611
kind: design-rationale
summary: 'Aggregate IPsec throughput can scale dramatically with per-resource Child SAs: the document cites an example of throughput increasing from 5 Gbps on 1 CPU to 40–60 Gbps on 25–30 CPUs, whereas a single AES-GCM-encrypted 10 Gbps link is typically reduced to 2–5 Gbps without this mechanism.'
