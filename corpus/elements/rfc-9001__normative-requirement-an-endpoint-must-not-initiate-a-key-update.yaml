document: rfc-9001
kind: normative-requirement
summary: An endpoint MUST NOT initiate a key update prior to confirming the handshake, and MUST NOT initiate a subsequent key update unless it has received an acknowledgment for a packet sent with keys from the current key phase.
section: "6.1"
rfc2119_level: MUST NOT
