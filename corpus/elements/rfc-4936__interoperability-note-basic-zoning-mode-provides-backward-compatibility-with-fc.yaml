document: rfc-4936
kind: interoperability-note
summary: Basic Zoning mode provides backward compatibility with FC-GS-4 and earlier Fibre Channel Generic Services specifications. If any switch in a Fabric does not support Enhanced mode, only the Basic request set may be used across the entire Fabric.
