document: rfc-3327
kind: design-rationale
summary: Path differs from Record-Route in that Path applies to REGISTER requests and 200-class responses to REGISTER, whereas Record-Route cannot be defined for REGISTER due to backward compatibility constraints. Additionally, a Record-Route vector applies only to requests within the dialog that established it, while a Path vector applies to all future dialogs routed through the home proxy.
section: "4"
topics:
    - sip
    - realtime
