document: rfc-8600
kind: interoperability-note
summary: While XMPP-Grid uses XEP-0060 for publish-subscribe (one-to-many), implementations needing end-to-end encryption must fall back to the basic XMPP instant-messaging pattern (RFC 6121) with a suitable E2E extension, since XEP-0060 has no standardized E2E encryption support.
section: 8.3.7
topics:
    - realtime
    - security
