document: rfc-2907
kind: security-consideration
summary: Falsified Multicast Scope Nesting State information would cause clients to make incorrect decisions about scope ordering, leading them to use larger scopes than necessary. This effectively flattens the scope hierarchy and nullifies its benefits for scaling, but does not prevent protocols from functioning. The same security concerns applicable to MADCAP generally also apply to this option.
section: "7"
topics:
    - security
    - multicast
