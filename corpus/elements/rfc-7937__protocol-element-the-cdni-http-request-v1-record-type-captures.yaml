document: rfc-7937
kind: protocol-element
summary: 'The cdni_http_request_v1 record type captures HTTP content delivery events. Mandatory fields are: date, time, time-taken, c-groupid, cs-method, u-uri, protocol, sc-status, sc-total-bytes. Optional fields include s-ip, s-hostname, s-port, cs-uri, sc-entity-bytes, cs(*), sc(*), s-cached, s-ccid, and s-sid.'
section: 3.4.1
topics:
