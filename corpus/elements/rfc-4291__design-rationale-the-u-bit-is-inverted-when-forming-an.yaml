document: rfc-4291
kind: design-rationale
summary: The 'u' bit is inverted when forming an interface identifier so that manually configured non-global identifiers take the simple form 0:0:0:1, 0:0:0:2, etc., rather than the less convenient 0200:0:0:1, 0200:0:0:2 that would result without inversion.
section: 2.5.1
