document: rfc-7714
kind: protocol-element
summary: In an encrypted SRTCP packet (Encryption flag = 1), the RTCP common header fields, SSRC, Encryption flag, and SRTCP index are Associated Data; all RTCP payload data is Plaintext; the optional MKI and authentication tag are Raw Data. The AEAD ciphertext is exactly the length of the plaintext plus 16 octets for the tag.
section: "9.2"
topics:
    - rtp
    - realtime
    - crypto
