document: rfc-3592
kind: normative-requirement
summary: If sonetSESthresholdSet is not implemented, the SES threshold interpretation from RFC 1595 (Appendix B) SHALL apply for backward compatibility. If a manager changes the value of sonetSESthresholdSet, all SES statistics collected prior to the change must be invalidated.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - snmp
