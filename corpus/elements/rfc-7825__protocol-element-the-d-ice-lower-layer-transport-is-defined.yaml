document: rfc-7825
kind: protocol-element
summary: The D-ICE lower-layer transport is defined for use in RTSP transport specifications. It requires datagram-clean transport that can be demultiplexed from STUN messages, supports UDP-based candidates (mandatory) and TCP-based candidates (optional), and enables ICE to select among candidates before transporting datagrams.
section: "4.1"
topics:
    - nat
    - realtime
    - rtp
