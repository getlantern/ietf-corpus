document: rfc-2573
kind: interoperability-note
summary: When a proxy forwarder translates between SNMP versions that support different PDU versions, it may need to perform PDU translation; a method for performing such translation is described in [COEX]. For Internal-Class PDUs (e.g., Report PDUs), if the original incoming SNMP version does not support Report PDUs, forwarding of the Internal-Class PDU is halted.
section: 3.5.1.3
topics:
    - snmp
