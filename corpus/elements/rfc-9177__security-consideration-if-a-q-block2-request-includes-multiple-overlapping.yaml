document: rfc-9177
kind: security-consideration
summary: If a Q-Block2 request includes multiple overlapping options (e.g., M bit set and unset for the same block), the server MUST only send back one instance of that block to prevent amplification attacks.
section: "4.4"
topics:
    - security
