document: rfc-9262
kind: design-rationale
summary: When the required number of BPs exceeds a single BitStringLength, multiple SIs and/or subdomains are used, consistent with non-TE BIER practice. SIs extend capacity within a subdomain; separate subdomains serve different service instances requiring distinct replication scopes or path-steering policies.
section: 5.3.1
topics:
    - routing
