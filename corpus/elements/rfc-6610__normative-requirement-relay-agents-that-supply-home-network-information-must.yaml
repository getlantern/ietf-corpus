document: rfc-6610
kind: normative-requirement
summary: Relay agents that supply home network information MUST encapsulate those options in a Relay-Supplied Options option per RFC 6422. Identified Home Network Information options included by relay agents MUST correspond to Home Network ID FQDNs in the client request.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
