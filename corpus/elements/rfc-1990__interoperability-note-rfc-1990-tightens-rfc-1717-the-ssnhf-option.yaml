document: rfc-1990
kind: interoperability-note
summary: 'RFC 1990 tightens RFC 1717: the SSNHF option alone no longer signals multilink intent (MRRU is required), the initial sequence number is defined as 0, there is no default MRRU value, Config-Nak of the EID is prohibited, and all links in a bundle must use the same sequence number format. Systems obeying these restrictions are fully interoperable with conforming RFC 1717 implementations.'
section: "11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
