document: rfc-4745
kind: wire-format
summary: The Common Policy Markup Language is an XML format under namespace 'urn:ietf:params:xml:ns:common-policy'. A <ruleset> contains zero or more <rule> elements each with a required xs:ID 'id' attribute and optional <conditions>, <actions>, and <transformations> children. Condition types include <identity>, <sphere> (string 'value' attribute), and <validity> (<from>/<until> xs:dateTime pairs). Identity types use xs:anyURI for the 'id' attribute.
section: "13"
topics:
    - privacy
