document: rfc-2806
kind: security-consideration
summary: The local entity SHOULD NOT place a call without the user's knowledge due to risks including unexpected call costs (long-distance, premium-rate, non-terminating post-dial), wrong numbers inserted maliciously in web pages or email, tying up the phone line, opening a back-door data connection, and revealing the user's (possibly unlisted) phone number via caller-ID.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
