document: rfc-4292
kind: design-rationale
summary: RFC 4292 replaces the IPv4-only ipCidrRouteTable (RFC 2096) with inetCidrRouteTable, using the InetAddress textual convention to achieve a single IP version-independent forwarding MIB covering both IPv4 and IPv6. The logical structure of ipCidrRouteTable was intentionally retained to allow easy upgrade of existing IPv4 implementations.
section: "7"
topics:
