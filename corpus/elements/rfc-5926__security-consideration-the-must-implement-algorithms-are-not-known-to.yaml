document: rfc-5926
kind: security-consideration
summary: The MUST-implement algorithms are not known to be broken at time of publication, but future weaknesses may be discovered; implementors should check for updated versions of this document before implementing. The SHA-1 vulnerabilities driving migration to SHA-256 for digital signatures do not immediately compromise SHA-1 in HMAC mode for this application.
