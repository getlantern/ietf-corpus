document: rfc-8223
kind: normative-requirement
summary: The TAC is advertised on tLDP sessions only. If the tLDP session changes to a link session, an LSR SHOULD withdraw the TAC with the S-bit set to 0. Similarly, if a link session changes to tLDP, an LSR SHOULD advertise the TAC via the Capability message.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
