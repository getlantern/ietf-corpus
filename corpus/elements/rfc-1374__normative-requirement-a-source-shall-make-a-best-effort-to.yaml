document: rfc-1374
kind: normative-requirement
summary: A Source shall make a best effort to ensure connection durations do not exceed 68 HIPPI bursts; a Source shall not make consecutive connection requests without Camp-on to the same Destination while requests are being rejected, to prevent circumventing fair-share switch arbitration.
section: Rules For Connections
rfc2119_level: MUST
topics:
    - ip
