document: rfc-4359
kind: wire-format
summary: For ESP, the Integrity Check Value (ICV) is equal in size to the RSA modulus. If the modulus is not a multiple of 8 bits, the ICV MUST be prepended with 1–7 zero bits to make it a multiple of 8 bits; no implicit ESP ICV Padding is required.
section: "2"
topics:
