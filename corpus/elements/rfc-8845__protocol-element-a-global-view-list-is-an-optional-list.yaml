document: rfc-8845
kind: protocol-element
summary: A Global View List is an optional list of Global Views in an Advertisement. Each Global View is a set of references to CSVs (of the same Media type) across Scenes, representing a Provider suggestion for one coherent set of Captures. The Provider MUST be capable of encoding and sending all Captures within any given Global View simultaneously.
section: "7.4"
topics:
    - realtime
    - webrtc
