document: rfc-1548
kind: normative-requirement
summary: Any non-LCP packets received during the Link Establishment phase MUST be silently discarded. Similarly, any NCP or network-layer packets received during the Authentication phase MUST be silently discarded.
section: "3.4"
rfc2119_level: MUST
