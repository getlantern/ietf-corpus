document: rfc-6333
kind: normative-requirement
summary: The AFTR MUST perform fragmentation and reassembly if the underlying link MTU cannot accommodate the encapsulation overhead. Fragmentation MUST happen after IPv6 encapsulation; reassembly MUST happen before IPv6 header decapsulation, per RFC 2473 Section 7.2.
section: "6.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
