document: rfc-3323
kind: interoperability-note
summary: Some legacy SIP clients might consider it an error condition if the URI value in the From header is altered between a request and its response, even though current SIP dialog matching uses only the tags rather than whole header field values. Privacy services performing user-level privacy SHOULD act as a B2BUA to account for this.
section: "5.3"
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
