document: rfc-6784
kind: protocol-element
summary: 'RFC 6784 defines four new DHCPv6 options for Kerberos configuration: Kerberos Principal Name Option (75), Kerberos Realm Name Option (76), Kerberos Default Realm Name Option (77), and Kerberos KDC Option (78). These allow DHCPv6 to distribute Kerberos realm names and KDC addresses without requiring DNS.'
section: "3"
