document: rfc-1331
kind: protocol-element
summary: The Magic-Number Configuration Option (Type=5, 6 octets total) provides a method to detect looped-back links. Each end selects a random Magic-Number; if the received Magic-Number matches the transmitted value, the link may be looped back. By default Magic-Number is zero and MUST be ignored on reception.
section: "7.6"
topics:
    - tcp
    - ip
    - security
