document: rfc-2390
kind: normative-requirement
summary: A multi-addressed host receiving an InARP request must choose one address with which to respond, selecting the protocol address corresponding to the same network/subnet as the requesting station. If no appropriate address exists for the request, it should not respond.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
