document: rfc-7056
kind: protocol-element
summary: 'Each SAML attribute in an assertion SHOULD also be a GSS name attribute, named with three space-separated parts: ''urn:ietf:params:gss:federated-saml-attribute'', the NameFormat URI, and the SAML attribute Name. Spaces within URIs are encoded as ''%20'' and do not separate name parts.'
section: "6.2"
topics:
    - security
