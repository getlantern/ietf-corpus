document: rfc-3202
kind: normative-requirement
summary: If frsldPvcCtrlDelayType is roundTrip, the manager SHOULD divide the value of DelayAvg (frsldPvcSmplDelayAvg) by two to obtain the frame transfer delay. If frsldPvcCtrlDelayType is oneWay, the value SHOULD be used as-is.
section: 3.6.8
rfc2119_level: SHOULD
topics:
