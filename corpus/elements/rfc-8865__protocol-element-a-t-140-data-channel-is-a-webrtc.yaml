summary: A T.140 data channel is a WebRTC data channel with subprotocol identifier 't140', using reliable and in-order transmission, negotiated via the SDP offer/answer mechanism. These channel properties replace the redundancy and loss-detection mechanisms required by RTP-based T.140 transport.
