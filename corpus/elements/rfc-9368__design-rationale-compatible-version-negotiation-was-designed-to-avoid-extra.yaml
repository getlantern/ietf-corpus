document: rfc-9368
kind: design-rationale
summary: Compatible version negotiation was designed to avoid extra round trips by reusing the client's first flight when the client's Chosen Version and the server's preferred version share a compatible first flight format. This is especially valuable for incremental version upgrades that are broadly similar to their predecessors.
