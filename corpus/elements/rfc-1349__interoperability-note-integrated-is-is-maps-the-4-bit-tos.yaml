document: rfc-1349
kind: interoperability-note
summary: 'Integrated IS-IS maps the 4-bit TOS field to its four metrics: TOS 0000 uses default metric, 1000 uses delay metric, 0100 uses default metric, 0010 uses reliability metric, 0001 uses cost metric, and all other values use the default metric. The MBZ bit (bit 7) is ignored by IS-IS.'
section: A.4
