document: rfc-8861
kind: normative-requirement
summary: If there are more reporting sources than can fit in a single RTCP RGRS packet, group members MUST send the reporting source SSRCs in round-robin fashion across consecutive RTCP RGRS packets so that all reporting source SSRCs are included over several reporting intervals.
section: 3.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
