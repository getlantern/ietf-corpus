document: rfc-6086
kind: normative-requirement
summary: A UA MUST NOT send an INFO request outside an invite dialog usage, and MUST NOT send an INFO request for an Info Package inside an invite dialog usage if the remote UA has not indicated willingness to receive that Info Package within that dialog.
section: 4.2.1
rfc2119_level: MUST NOT
