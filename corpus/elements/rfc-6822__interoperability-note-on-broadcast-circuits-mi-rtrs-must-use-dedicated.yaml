document: rfc-6822
kind: interoperability-note
summary: On broadcast circuits, MI-RTRs MUST use dedicated multicast MAC addresses — AllL1MI-ISs (01-00-5E-90-00-02) and AllL2MI-ISs (01-00-5E-90-00-03) — for all non-zero IID PDUs, so legacy routers do not process them and cause disruption.
section: 2.6.1
topics:
    - routing
