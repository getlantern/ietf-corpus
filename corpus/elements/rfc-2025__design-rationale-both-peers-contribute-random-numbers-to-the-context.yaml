document: rfc-2025
kind: design-rationale
summary: Both peers contribute random numbers to the context-id to assure each of freshness and preclude replay attacks where a token from an old context is injected into a new one. SPKM-2 unilateral auth cannot provide this assurance to the target.
section: "6.3"
topics:
    - security
