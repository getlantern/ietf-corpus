document: rfc-2744
kind: protocol-element
summary: Interprocess tokens are caller-opaque octet strings produced by gss_export_sec_context() in one process for consumption by gss_import_sec_context() in another. After a successful export the original context is made inaccessible and all context handles referring to it become invalid; gss_import_sec_context() creates a functionally identical replacement context.
section: "3.8"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
