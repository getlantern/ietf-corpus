document: rfc-5282
kind: normative-requirement
summary: Padding MAY contain any value chosen by the sender, and the recipient MUST accept any amount of Padding up to 255 octets. There are no alignment requirements on the Padding field length.
section: "3"
rfc2119_level: MUST
