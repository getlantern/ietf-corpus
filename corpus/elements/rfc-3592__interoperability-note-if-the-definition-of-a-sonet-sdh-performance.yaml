document: rfc-3592
kind: interoperability-note
summary: If the definition of a SONET/SDH performance monitoring term in this document conflicts with the definition in ANSI T1.231, implementers SHOULD follow the definition in this document. SDH Performance Monitoring term definitions are similar but not identical to SONET and are found in ITU-T G.783.
section: "3.5"
