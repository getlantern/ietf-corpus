document: rfc-1253
kind: protocol-element
summary: 'ospfNbrTable (ospf 10) is indexed by ospfNbrIpAddr and ospfNbrAddressLessIndex, and includes ospfNbrOptions (bit mask: bit 0 = accepts external LSAs, bit 1 = supports non-zero TOS metrics), ospfNbrPriority, ospfNbrState, ospfNbrEvents (state change counter), ospfNbrLSRetransQLen (retransmission queue depth), and ospfNBMANbrStatus (Validation) for NBMA neighbor management.'
section: "5.10"
