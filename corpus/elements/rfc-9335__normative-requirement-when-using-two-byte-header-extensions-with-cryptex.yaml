document: rfc-9335
kind: normative-requirement
summary: When using two-byte header extensions with Cryptex, the extension identifier with value 256 MUST NOT be negotiated, as its value would normally occupy the 'appbits' of the 'defined by profile' field, which are unavailable with the Cryptex values.
