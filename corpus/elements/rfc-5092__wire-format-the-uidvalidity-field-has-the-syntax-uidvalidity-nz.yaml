summary: The uidvalidity field has the syntax ';UIDVALIDITY=' nz-number. The iuid field has the syntax '/' ';UID=' nz-number. The partial-range field has the syntax number ['.' nz-number], where the first number is the byte offset and the second is the fragment length.
