document: rfc-7603
kind: design-rationale
summary: EMAN addresses IP-enabled networks through SNMP MIBs, deliberately not targeting ZigBee-style low-power mesh networks. ZigBee provides inexpensive self-organizing mesh solutions for embedded sensing and home automation where SNMP would be inappropriate.
section: 4.1.8
topics:
