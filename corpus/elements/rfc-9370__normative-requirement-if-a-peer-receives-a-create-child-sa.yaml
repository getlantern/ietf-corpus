document: rfc-9370
kind: normative-requirement
summary: If a peer receives a CREATE_CHILD_SA request to rekey an SA that is already being rekeyed (i.e., IKE_FOLLOWUP_KE exchanges are in progress), a TEMPORARY_FAILURE notification MUST be sent in response.
section: 2.2.4
rfc2119_level: MUST
