document: rfc-1349
kind: normative-requirement
summary: The originator of a datagram MUST set the MBZ bit (bit 7 of the TOS octet) to zero unless participating in an Internet protocol experiment that uses that bit. Routers and recipients ignore the value of this field.
section: "3"
rfc2119_level: MUST
topics:
    - ip
