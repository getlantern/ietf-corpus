document: rfc-5898
kind: design-rationale
summary: The connectivity precondition delays alerting the called party until media stream connectivity has been verified end-to-end. This addresses the real-world failure mode where SDP offer-answer negotiation succeeds but actual media cannot flow due to NATs or firewalls in the media path.
section: "1"
topics:
