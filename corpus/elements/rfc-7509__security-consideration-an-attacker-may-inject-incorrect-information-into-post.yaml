document: rfc-7509
kind: security-consideration
summary: An attacker may inject incorrect information into Post-Repair Loss Count reports, degrading the performance of loss-repair mechanisms. Implementations should apply encryption and authentication (e.g., SRTP/SAVPF per RFC 3711 and RFC 5124) where security is a concern.
section: "5"
topics:
    - security
    - rtp
