document: rfc-4896
kind: interoperability-note
summary: SigComp Extended shared-mode (RFC 3321 Section 5.2) state items mapped to a compartment must have minimum retention priority (65535) and persist only until deleted by new non-minimum-priority state or STATE-FREE. Endpoint-initiated acknowledgments (RFC 3321 Section 5.1.2) allow an endpoint to advertise a created state's hash back to the requester, confirming creation and availability for at least its normally defined lifetime.
section: 10.3.3
topics:
    - realtime
