document: rfc-2461
kind: security-consideration
summary: Without the use of IPsec Authentication Headers, ND is vulnerable to attacks by on-link nodes, including rogue Router Advertisements, Neighbor Cache poisoning, and spoofed Neighbor Solicitations/Advertisements. The Hop Limit=255 mechanism provides protection only against off-link attackers; it cannot protect against malicious nodes on the same link.
section: "11"
topics:
