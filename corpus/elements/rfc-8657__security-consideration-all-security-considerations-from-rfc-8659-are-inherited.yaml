document: rfc-8657
kind: security-consideration
summary: All security considerations from RFC 8659 are inherited. This specification only constrains CAs that implement it; any other CA's capacity to issue certificates for the domain is completely unchanged, and domains remain vulnerable to CAs that do not honor CAA records.
section: "5.1"
