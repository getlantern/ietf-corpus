document: rfc-9246
kind: registry
summary: IANA created the 'CDNI URI Signing Verification Code' subregistry under 'CDNI Parameters' with Specification Required policy. Initial values span 000 (no verification), 200 (verified), 400–411 (rejected for specific claim failures including signature, issuer, subject, audience, expiry, nbf, cdnistt/cdniets pairing, jti, version, critical extension, client IP, and URI container), and 500 (malformed URI).
