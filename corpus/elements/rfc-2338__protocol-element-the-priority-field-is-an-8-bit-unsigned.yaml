document: rfc-2338
kind: protocol-element
summary: The Priority field is an 8-bit unsigned integer where higher values indicate higher priority. Priority 255 is reserved for the IP address owner, priority 0 signals the Master is releasing responsibility, and values 1–254 are used by backup routers (default 100).
