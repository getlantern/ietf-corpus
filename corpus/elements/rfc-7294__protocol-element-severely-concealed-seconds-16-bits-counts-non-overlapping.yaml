document: rfc-7294
kind: protocol-element
summary: Severely Concealed Seconds (16 bits) counts non-overlapping one-second periods where cumulative frame loss or discard exceeds the SCS Threshold. The SCS Threshold (8 bits, format 0:8) represents the percentage (0–99.6%) of packets lost/discarded per second; a default of 5% (0x0D) is suggested.
section: "4.2"
topics:
