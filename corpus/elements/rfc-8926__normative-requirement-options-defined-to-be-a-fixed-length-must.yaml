document: rfc-8926
kind: normative-requirement
summary: Options defined to be a fixed length MUST NOT be redefined to a different length, because implementations may ignore the Length field and parse by well-known size; changing the length would corrupt parsing of all subsequent options. A new Type value must be allocated instead.
section: 3.5.1
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
