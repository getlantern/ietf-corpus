document: rfc-7874
kind: normative-requirement
summary: DTMF events generated by a WebRTC endpoint MUST have a duration between 40 ms and 8000 ms (recommended default 100 ms), and the gap between events MUST be no less than 30 ms (recommended default 70 ms).
