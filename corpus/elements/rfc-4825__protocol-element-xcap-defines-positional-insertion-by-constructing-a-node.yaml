document: rfc-4825
kind: protocol-element
summary: XCAP defines positional insertion by constructing a node selector of the form 'parent/*[position][@attr=value]'. The attribute predicate ensures the selector is a no-match against the current document (triggering creation), while it would match the new element after insertion. Positional deletion without a unique attribute predicate is allowed only when the target element is the last among its siblings.
section: "7.4"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
