kind: wire-format
summary: 'The PN-LAALP-Membership APPsub-TLV (type=2) carries a list of LAALP RECORDs, each containing: OE flag (1 bit), RESV (7 bits), Size (1 byte), Reusing Pseudo-Nickname (2 bytes), and variable-length LAALP ID. Distributed in E-L1FS FS-LSPs as a sub-TLV of TRILL GENINFO TLV.'
