document: rfc-3816
kind: protocol-element
summary: 'RFC 3816 defines three MIB modules: ROHC-MIB (mib-2 112) for objects shared by all profiles, ROHC-UNCOMPRESSED-MIB (mib-2 113) for profile 0x0000, and ROHC-RTP-MIB (mib-2 114) for profiles 0x0001 (RTP), 0x0002 (UDP), 0x0003 (ESP), and 0x0005 (LLA). This modular structure allows future ROHC profiles to be supported by adding new profile-specific modules.'
