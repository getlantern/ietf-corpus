document: rfc-9580
kind: protocol-element
summary: 'The Symmetrically Encrypted and Integrity Protected Data packet (Type ID 18, SEIPD) has two versions: v1 uses CFB mode with SHA-1 Modification Detection Code; v2 uses AEAD (EAX, OCB, or GCM). v2 SEIPD is paired exclusively with v6 PKESK/SKESK packets and provides authenticated encryption.'
section: "5.13"
topics:
