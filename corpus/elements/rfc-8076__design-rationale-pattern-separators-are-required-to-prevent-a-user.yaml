document: rfc-8076
kind: design-rationale
summary: Pattern separators are required to prevent a user with a shorter name from blocking resources for a longer-named peer; for example, a '*$USER' pattern would allow user EVE to define a resource named 'STEVE', preempting that name for user STEVE.
section: "5.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
