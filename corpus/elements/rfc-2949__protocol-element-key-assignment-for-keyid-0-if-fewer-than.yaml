document: rfc-2949
kind: protocol-element
summary: 'Key assignment for keyid 0: if fewer than 32 (10) bytes of key data are available, the first 16 (5) bytes are used in both directions; if 32 (10) or more bytes are available, the first 16 (5) bytes encrypt client-to-server and the second 16 (5) bytes encrypt server-to-client.'
