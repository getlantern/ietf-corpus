document: rfc-6620
kind: normative-requirement
summary: In TENTATIVE state, if a Neighbor Advertisement for the address is received on a Trusted Port, the binding is cleared and state returns to NO_BIND; stored data packets are discarded. This prevents a racing host from hijacking the address.
section: 3.2.3
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
