document: rfc-8049
kind: protocol-element
summary: Extranet VPN access is configured via the 'extranet-vpns' container on the accessing VPN only; no configuration is required on the target VPN. However, as a side effect, all sites in the target VPN gain access to all sites in the accessing VPN. The 'site-role' leaf specifies the accessing sites' role in the target VPN's service topology.
section: 6.2.4
topics:
    - yang
    - vpn
    - routing
