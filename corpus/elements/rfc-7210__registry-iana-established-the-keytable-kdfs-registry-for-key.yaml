document: rfc-7210
kind: registry
summary: 'IANA established the ''KeyTable KDFs'' registry for key derivation function identifiers. Assignments are on a First Come First Served basis. Initial entries are: ''none'' (no KDF), ''AES-128-CMAC'' (RFC 4493), and ''HMAC-SHA-1'' (RFC 2104), based on algorithms defined for TCP-AO.'
