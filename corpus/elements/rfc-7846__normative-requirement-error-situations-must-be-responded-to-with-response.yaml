document: rfc-7846
kind: normative-requirement
summary: 'Error situations MUST be responded to with response_type set to 0x01 and the appropriate error_code: 01 (Bad Request) for malformed messages, 02 (Unsupported Version Number) for unknown versions, 03 (Forbidden Action) for disallowed state transitions, 04 (Internal Server Error) for unexpected conditions (SHOULD), 05 (Service Unavailable) for overload (SHOULD), and 06 (Authentication Required) when authentication is needed (SHOULD).'
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
