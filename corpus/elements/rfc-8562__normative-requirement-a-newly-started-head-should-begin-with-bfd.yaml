document: rfc-8562
kind: normative-requirement
summary: A newly started head SHOULD begin with bfd.SessionState set to Down and SHOULD remain in this state for (bfd.DesiredMinTxInterval * bfd.DetectMult) to ensure all MultipointTail sessions are reset before service is brought up.
section: "5.9"
rfc2119_level: SHOULD
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
