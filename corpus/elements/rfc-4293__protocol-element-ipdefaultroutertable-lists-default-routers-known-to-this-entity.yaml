document: rfc-4293
kind: protocol-element
summary: ipDefaultRouterTable lists default routers known to this entity, intended for end nodes that learn router information via DHCP or IPv6 router advertisements. It is required for all IP entities; more detailed routing information is in routing-specific MIBs.
