document: rfc-6727
kind: design-rationale
summary: Time-based and count-based sampling share structurally identical MIB subtrees (interval and space parameters) but use different data types — Unsigned32 in packets vs. Unsigned32 in microseconds — because their semantics differ despite apparent structural similarity.
