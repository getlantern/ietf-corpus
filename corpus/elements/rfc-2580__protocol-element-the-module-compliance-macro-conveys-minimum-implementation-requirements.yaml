document: rfc-2580
kind: protocol-element
summary: The MODULE-COMPLIANCE macro conveys minimum implementation requirements for one or more MIB modules. It must contain a STATUS clause, DESCRIPTION clause, and at least one MODULE clause. Its value is an OBJECT IDENTIFIER that can be authoritatively used when referencing the compliance statement.
