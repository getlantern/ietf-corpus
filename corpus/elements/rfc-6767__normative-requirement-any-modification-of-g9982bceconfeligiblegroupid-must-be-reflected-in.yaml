kind: normative-requirement
summary: Any modification of g9982BceConfEligibleGroupID MUST be reflected in the ifCapStackTable and its inverse ifInvCapStackTable. Attempts to change this object MUST be rejected if the BCE is already aggregated with other BCEs (more than one BCE connected to the same GBS).
