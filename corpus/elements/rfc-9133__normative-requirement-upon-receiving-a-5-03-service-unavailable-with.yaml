document: rfc-9133
kind: normative-requirement
summary: Upon receiving a 5.03 (Service Unavailable) with a diagnostic payload indicating a failed ACL update on an initial or scope-adjusted mitigation request, the DOTS client MUST immediately resend the request with all original parameters but without the ACL attributes. After Max-Age expires, the client retries with a new 'mid' including the ACL attributes.
section: 3.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
