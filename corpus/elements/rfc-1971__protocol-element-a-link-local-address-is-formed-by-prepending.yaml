document: rfc-1971
kind: protocol-element
summary: A link-local address is formed by prepending the well-known link-local prefix FE80::0 to the interface token. The interface token replaces the right-most N zero bits of the prefix; if the token exceeds 118 bits, autoconfiguration fails. Link-local addresses have infinite preferred and valid lifetimes.
section: "5.3"
topics:
