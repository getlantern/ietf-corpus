document: rfc-9936
kind: normative-requirement
summary: Implementations MUST protect the ML-KEM private key, key-encryption key, content-encryption key, message-authentication key, and content-authenticated-encryption key. All keys except the private key are ephemeral and MUST be wiped after use.
section: "4"
rfc2119_level: MUST
topics:
