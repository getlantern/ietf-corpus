document: rfc-8770
kind: normative-requirement
summary: When the H-bit is set, non-local IPv4 prefixes (e.g., redistributed from other protocols) SHOULD NOT be advertised in AS-external-LSAs. If they are advertised, the Type 2 metric MUST be set to LSInfinity to repel traffic.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
