document: rfc-9323
kind: design-rationale
summary: RSC allows a single signer to attest multiple digital objects, in contrast to RTA (Resource Tagged Attestation) which allows multiple signers to attest a single object. The single-signer profile is considered a simplification for both implementers and operators.
