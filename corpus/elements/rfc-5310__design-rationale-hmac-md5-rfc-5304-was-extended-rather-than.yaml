document: rfc-5310
kind: design-rationale
summary: HMAC-MD5 (RFC 5304) was extended rather than replaced because, while no open attacks exist at writing time, concerns about MD5's long-term strength motivated a generic cryptographic authentication framework capable of supporting any future hash algorithm.
