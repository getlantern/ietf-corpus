document: rfc-2038
kind: interoperability-note
summary: A distinct RTP payload type is assigned to MPEG1/MPEG2 Video and MPEG1/MPEG2 Audio respectively. No further indication of MPEG1 vs MPEG2 needs to be carried in the RTP or MPEG-specific headers, as this distinction is available in the ES headers themselves (e.g., sequence_extension() presence for video).
section: "3"
topics:
