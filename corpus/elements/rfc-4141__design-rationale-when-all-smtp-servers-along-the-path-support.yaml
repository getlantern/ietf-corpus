document: rfc-4141
kind: design-rationale
summary: When all SMTP servers along the path support CONPERM but none offer CONNEG, the message is delivered in original form to the recipient. This is acceptable — the recipient then receives the original content together with an explicit list of conversions the originator deems acceptable.
section: "3.1"
topics:
    - email
