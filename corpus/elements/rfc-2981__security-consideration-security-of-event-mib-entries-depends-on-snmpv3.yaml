document: rfc-2981
kind: security-consideration
summary: Security of Event MIB entries depends on SNMPv3 access control for the entire MIB or for subsets based on entry owner names (mteOwner). For multi-user tables, the initial index serves as an 'owner index' that can be mapped to a VACM securityName or groupName.
section: "6"
topics:
