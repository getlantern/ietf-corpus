document: rfc-7916
kind: protocol-element
summary: A connected alternate is an IGP neighbor of the PLR, reachable via a direct IGP adjacency. A remote alternate is not directly adjacent to the PLR and is reached via a tunnel (IP, GRE, LDP, RSVP-TE, L2TP, Segment Routing, etc.). Both types are candidates in the LFA selection process.
section: "2"
topics:
