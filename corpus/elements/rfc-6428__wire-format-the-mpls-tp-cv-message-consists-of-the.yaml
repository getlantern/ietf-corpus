document: rfc-6428
kind: wire-format
summary: The MPLS-TP CV message consists of the G-ACh header (with BFD CV code point 0x0023), followed by a BFD control packet, followed by a Source MEP-ID TLV. The Source MEP-ID TLV is a 2-octet Type, 2-octet Length, and variable-length Value field. The BFD control packet length field does not include the Source MEP-ID TLV length.
section: "3.5"
topics:
    - mpls
