document: rfc-7881
kind: normative-requirement
summary: 'In S-BFD Control packets sent by the SBFDReflector: the Destination IP MUST be copied from the received Source IP; the Source IP MUST be a local IP visible to the initiator and SHOULD be copied from the received Destination IP (except for loopback ranges); the TTL/Hop Limit MUST be 255; and the UDP destination/source ports MUST be swapped from the received packet.'
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
