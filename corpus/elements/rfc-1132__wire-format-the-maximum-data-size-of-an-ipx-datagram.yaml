document: rfc-1132
kind: wire-format
summary: The maximum data size of an IPX datagram is 546 bytes. With the combined 802.2 LLC and SNAP headers consuming 8 bytes, the effective Maximum Transmission Unit (MTU) for 802.2-over-IPX is 538 bytes.
