document: rfc-6501
kind: security-consideration
summary: The combination of <user-admission-policy>, <join-handling>, <allowed-users-list>, and <deny-users-list> provides a layered access control framework. The 'closedAuthenticated' policy provides the strongest guarantee; 'anonymous' offers no access control. Implementors must map authentication mechanisms from the underlying signaling protocol to the chosen policy.
section: "8"
topics:
