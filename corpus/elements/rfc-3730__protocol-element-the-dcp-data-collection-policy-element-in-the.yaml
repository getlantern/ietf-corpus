document: rfc-3730
kind: protocol-element
summary: 'The <dcp> (data collection policy) element in the greeting discloses the server''s privacy practices. It contains an <access> element (one of: all/none/null/personal/personalAndOther/other), one or more <statement> elements each with required <purpose>, <recipient>, and <retention> children, and an optional <expiry> element (absolute or relative).'
section: "2.4"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
