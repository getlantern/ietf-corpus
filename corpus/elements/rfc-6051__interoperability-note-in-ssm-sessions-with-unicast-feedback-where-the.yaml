document: rfc-6051
kind: interoperability-note
summary: In SSM sessions with unicast feedback where the feedback target and media source are not co-located, a feedback target receiving an RTCP-SR-REQ should forward the request to the media source; however, the forwarding mechanism is not defined by this specification.
