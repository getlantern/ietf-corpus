document: rfc-6682
kind: interoperability-note
summary: Each combination of Kmax and T parameters produces different FEC data and is not compatible with any other combination. A sender MAY offer multiple Kmax/T combinations; the receiver SHOULD choose the offer with the largest product of Kmax and T that it supports.
