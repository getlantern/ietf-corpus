document: rfc-6060
kind: design-rationale
summary: Shared forwarding preserves the connectionless Ethernet capability of reusing destination forwarding entries for multiple sources sharing a common destination within a VLAN. It reduces forwarding table entries without changing actual paths and is invoked as a local policy decision based on label allocation.
