document: rfc-1933
kind: protocol-element
summary: IPv4 ICMP 'packet too big' errors received by the encapsulating node are processed via IPv4 Path MTU Discovery (RFC 1191), and the resulting path MTU is used to determine whether to generate an IPv6 ICMP 'packet too big'. Other ICMP errors may be translated to IPv6 ICMP errors if the 'packet in error' field contains enough of the original IPv6 header.
section: 4.1.3
topics:
    - ip
    - v6ops
