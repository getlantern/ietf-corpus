document: rfc-2747
kind: normative-requirement
summary: The Challenge Cookie in an Integrity Challenge message MUST be unique and based on a local secret to prevent guessing. The recommended construction is an MD5 hash of a local secret and a timestamp.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
