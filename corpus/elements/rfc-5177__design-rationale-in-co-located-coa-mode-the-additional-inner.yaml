document: rfc-5177
kind: design-rationale
summary: In co-located CoA mode, the additional inner tunnel between the Mobile Router's Home Address and the Home Agent is not strictly essential, since the Mobile Router directly receives encapsulated packets. However, in Foreign Agent CoA mode, this inner tunnel is required so the Foreign Agent can direct decapsulated packets to the correct visiting Mobile Router.
section: "1.2"
topics:
    - mobility
    - ip
