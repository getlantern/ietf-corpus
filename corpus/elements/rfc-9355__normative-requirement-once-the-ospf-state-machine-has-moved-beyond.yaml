document: rfc-9355
kind: normative-requirement
summary: Once the OSPF state machine has moved beyond Init state, any change in the B-bit advertised in subsequent Hello packets MUST NOT result in any trigger in either the OSPF adjacency or the BFD session management.
section: "4"
rfc2119_level: MUST NOT
