document: rfc-9475
kind: normative-requirement
summary: Authentication services MUST NOT include "msgi" elements in PASSporT types other than "msg". The "msgi" claim is OPTIONAL in "msg" PASSporTs, as integrity for messages may be provided by some other service.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - security
    - jose
