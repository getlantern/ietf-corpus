document: rfc-2743
kind: interoperability-note
summary: 'Appendix B documents compatibility with GSS-V1: GSS-V2 adds GSS_Add_cred, GSS_Inquire_cred_by_mech, GSS_Export/Import_sec_context, GSS_Wrap_size_limit, GSS_Inquire_context, GSS_Export_name, GSS_Duplicate_name, GSS_Canonicalize_name, and GSS_Inquire_mechs_for_name calls. The prot_ready_state, trans_state, and anon_state context attributes are also new. GSS-V1 callers remain unaffected by these additions.'
section: Appendix B
topics:
    - security
