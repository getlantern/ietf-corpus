kind: protocol-element
summary: 'Base URI precedence (highest to lowest): (1) base URI embedded in content, (2) base URI of the encapsulating entity, (3) URI used to retrieve the representation, (4) application-defined default. A base URI must conform to the absolute-URI syntax rule.'
