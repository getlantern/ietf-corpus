document: rfc-3894
kind: normative-requirement
summary: If the optional ":copy" keyword is specified with "fileinto" or "redirect", the tagged command does not cancel the implicit "keep". Instead, it merely files or redirects a copy in addition to whatever else is happening to the message.
section: "3"
rfc2119_level: MUST
topics:
    - email
