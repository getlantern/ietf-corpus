document: rfc-3545
kind: design-rationale
summary: ROHC (RFC 3095) was considered as an alternative but also assumes no misordering of compressed packets between compressor and decompressor. Enhanced CRTP is preferred for environments where CRTP is already implemented, or where implementation simplicity outweighs ROHC's performance advantages.
