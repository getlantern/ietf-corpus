document: rfc-1654
kind: protocol-element
summary: 'The BGP Routing Information Base (RIB) comprises three parts: Adj-RIBs-In (unprocessed routes from peers), Loc-RIB (routes selected by local Decision Process), and Adj-RIBs-Out (routes selected for advertisement to peers). Implementations are not required to maintain three separate copies.'
section: "3.2"
