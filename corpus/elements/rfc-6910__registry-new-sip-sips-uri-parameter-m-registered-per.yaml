summary: 'New SIP/SIPS URI parameter ''m'' registered per RFC 3969, used in INVITE to mark a CC call and in SUBSCRIBE to indicate CC subscription mode. Predefined values: ''BS'' (busy subscriber), ''NR'' (no reply), ''NL'' (not logged in).'
