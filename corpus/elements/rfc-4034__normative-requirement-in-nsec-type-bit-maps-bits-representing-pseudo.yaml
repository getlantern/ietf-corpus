document: rfc-4034
kind: normative-requirement
summary: In NSEC Type Bit Maps, bits representing pseudo-types MUST be clear. Blocks with no types present MUST NOT be included, and trailing zero octets in a bitmap MUST be omitted.
section: 4.1.2
rfc2119_level: MUST
