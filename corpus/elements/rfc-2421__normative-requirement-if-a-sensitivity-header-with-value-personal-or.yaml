document: rfc-2421
kind: normative-requirement
summary: If a Sensitivity header with value 'Personal' or 'Private' is present, a compliant system MUST prohibit the recipient from forwarding the message to any other user. If the receiving system cannot assure privacy, a negative DSN MUST be sent to the originator.
section: 4.2.13
rfc2119_level: MUST
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
