document: rfc-7797
kind: interoperability-note
summary: An unencoded JWS JSON Serialization payload must consist of the octets of the UTF-8 encoding of Unicode code points representable in a JSON string, after performing JSON string escape processing per RFC 7159 Section 8.3. For example, the JSON strings "$.02" and "\u0024.02" represent equivalent payloads.
section: "5.3"
topics:
    - jose
    - json
