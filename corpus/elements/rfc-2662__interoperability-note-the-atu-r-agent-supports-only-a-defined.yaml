document: rfc-2662
kind: interoperability-note
summary: 'The ATU-R agent supports only a defined subset of the full MIB: it does not support adslLineConfProfileTable, and does not support adslAtucPerfLols/Lprs counters or their 15-minute and 1-day variants. ATU-R agents do support all adslAtur* tables and alarm profile tables except adslAtucThresh15MinLols/Lprs.'
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
