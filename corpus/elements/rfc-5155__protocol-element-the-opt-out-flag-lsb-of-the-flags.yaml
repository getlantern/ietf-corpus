document: rfc-5155
kind: protocol-element
summary: The Opt-Out flag (LSB of the Flags field) allows an NSEC3 RR to cover zero or more insecure delegations without requiring individual NSEC3 RRs for each unsigned delegation. An Opt-Out NSEC3 RR neither asserts nor denies the existence of insecure delegations within its span, enabling efficient signing of large delegation-centric zones.
section: "6"
topics:
