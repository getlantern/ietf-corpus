document: rfc-6370
kind: protocol-element
summary: A MIP_ID for a per-interface MIP model is the IF_ID of the cross-connected interfaces. For a per-node MIP model, the MIP_ID is formed using Node_ID and IF_Num of 0, which is why IF_Num 0 is reserved and cannot identify an MPLS-TP interface.
section: "7.3"
topics:
    - routing
