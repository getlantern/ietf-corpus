document: rfc-6125
kind: normative-requirement
summary: If a match is found, the client MUST use the matched reference identifier as the validated identity of the application service. If no match is found and no pinned certificate exists, the client MUST proceed to the fallback behavior described in Section 6.6.4.
section: 6.6.1
rfc2119_level: MUST
