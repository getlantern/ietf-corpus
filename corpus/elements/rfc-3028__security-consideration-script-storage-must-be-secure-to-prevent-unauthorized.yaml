document: rfc-3028
kind: security-consideration
summary: Script storage must be secure to prevent unauthorized modification (e.g., a user leaving a public terminal logged in). Implementations must sanity-check scripts to prevent mailbomb creation via repeated redirect or reject, and SHOULD implement action count limits. Implementations SHOULD take measures to prevent redirect loops.
section: "10"
topics:
    - email
    - security
