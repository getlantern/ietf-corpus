document: rfc-8747
kind: security-consideration
summary: Proof-of-possession keys are only valuable if kept secret. Appropriate means must be used to ensure unintended parties do not learn private or symmetric key values. Proof-of-possession signatures made with keys not meeting the application's trust criteria MUST NOT be relied upon.
section: "4"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
    - cbor
