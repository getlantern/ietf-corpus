document: rfc-5798
kind: interoperability-note
summary: VRRPv3 and VRRPv2 interoperation is optional and intended only for upgrade transition scenarios. Mixing versions should not be a permanent deployment. VRRPv2 Masters advertise intervals in seconds while VRRPv3 uses centiseconds, requiring conversion. Sub-second VRRPv3 rates may overwhelm VRRPv2 Backup routers.
section: "8.4"
topics:
    - routing
