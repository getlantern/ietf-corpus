document: rfc-6530
kind: normative-requirement
summary: Special attention MUST be paid to Unicode normalization for mailbox names containing non-ASCII characters, because Unicode strings may be normalized by processes independent of what the mail protocol specifies, analogously to quoting/dequoting in traditional addresses.
section: "10.1"
rfc2119_level: MUST
topics:
