document: rfc-7939
kind: design-rationale
summary: This document (RFC 7939) was necessitated by RFC 7466, which optimized NHDP by tracking the N2_lost state for 2-hop neighbors. The MIB was updated to add nhdpIib2HopSetN2Lost, nhdpIfPerfCounterDiscontinuityTime, and the 'notconsidered' value in nhdp2HopNbrState to reflect this new per-2-hop-neighbor link quality tracking.
section: "1.1"
topics:
    - routing
