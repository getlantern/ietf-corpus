document: rfc-7402
kind: normative-requirement
summary: Anti-replay protection MUST be used in an ESP SA established with HIP, and a 64-bit sequence number MUST be used. Each host MUST rekey before its sequence number reaches 2^64.
section: 3.3.6
rfc2119_level: MUST
topics:
    - ipsec
    - security
