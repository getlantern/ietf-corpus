document: rfc-8733
kind: wire-format
summary: The Adjustment-Threshold-Percentage Sub-TLV (Type=5, Length=8) encodes a 7-bit Percentage field (1–100; default 5%) and a 4-octet IEEE 754 Minimum-Threshold bandwidth in bytes per second. Both the percentage and the absolute Minimum-Threshold must be crossed before an adjustment is made.
section: 5.2.3.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
