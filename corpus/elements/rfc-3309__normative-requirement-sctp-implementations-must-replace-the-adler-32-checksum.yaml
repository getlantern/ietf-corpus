document: rfc-3309
kind: normative-requirement
summary: SCTP implementations MUST replace the Adler-32 checksum with CRC-32c. All references to Adler-32 in RFC 2960 MUST be treated as references to CRC-32c. There is no graceful transition mechanism; implementations are expected to immediately switch.
section: "2"
rfc2119_level: MUST
topics:
    - sctp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
