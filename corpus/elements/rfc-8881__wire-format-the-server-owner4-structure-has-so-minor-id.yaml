document: rfc-8881
kind: wire-format
summary: The server_owner4 structure has so_minor_id (uint64_t) and so_major_id (opaque variable-length string). Equal so_major_id indicates the same server; equal so_major_id and so_minor_id additionally indicates that sessions may be shared across connections.
section: "2.5"
