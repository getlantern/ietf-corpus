document: rfc-2058
kind: normative-requirement
summary: Upon receipt of an Access-Request from a valid client, the RADIUS server MUST transmit an appropriate reply. A request from a client for which the server does not have a shared secret MUST be silently discarded.
section: "2"
rfc2119_level: MUST
topics:
