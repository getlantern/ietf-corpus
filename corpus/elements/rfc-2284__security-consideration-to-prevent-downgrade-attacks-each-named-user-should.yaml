document: rfc-2284
kind: security-consideration
summary: To prevent downgrade attacks, each named user SHOULD be authenticated by exactly one method. Allowing multiple methods makes the user vulnerable to negotiation of the least secure option (e.g., PAP instead of EAP). If a user needs different methods under different circumstances, distinct identities SHOULD be employed.
section: Security Considerations
rfc2119_level: SHOULD
topics:
    - security
