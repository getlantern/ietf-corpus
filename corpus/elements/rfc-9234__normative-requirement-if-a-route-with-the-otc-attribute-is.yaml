document: rfc-9234
kind: normative-requirement
summary: If a route with the OTC Attribute is received from a Customer or RS-Client, it MUST be considered ineligible (route leak detected). If received from a Peer with an OTC value not equal to the Peer's AS number, it also MUST be considered ineligible.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
