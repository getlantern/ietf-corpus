document: rfc-7659
kind: protocol-element
summary: natv2AddressMapTable is indexed by NAT instance, internal realm (SnmpAdminString), internal address type (InetAddressType), internal address (InetAddress), and a conceptual row index. For DS-Lite, the index uses the IPv6 outer header address; the inner IPv4 address in 192.0.0.0/29 is captured in natv2AddressMapInternalMappedAddress.
section: 3.3.8
topics:
    - nat
    - snmp
