document: rfc-6048
kind: protocol-element
summary: LIST MOTD returns a free-format UTF-8 multi-line message of the day from the server administrator, intended for notifications such as downtime warnings. The server may return different content depending on session state (authenticated vs. unauthenticated, reader vs. transit mode).
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
