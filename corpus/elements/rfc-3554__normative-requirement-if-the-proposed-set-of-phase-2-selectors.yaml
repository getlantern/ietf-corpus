document: rfc-3554
kind: normative-requirement
summary: If the proposed set of Phase 2 Selectors is inaccurate from the Responder's perspective, the Responder may initiate a new Quick Mode exchange with roles reversed. The new Initiator MUST copy SA and Selectors from the old Quick Mode and modify Selectors to match reality. All SCTP-supporting IKE implementations MUST support this.
section: "3"
rfc2119_level: MUST
topics:
    - sctp
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
