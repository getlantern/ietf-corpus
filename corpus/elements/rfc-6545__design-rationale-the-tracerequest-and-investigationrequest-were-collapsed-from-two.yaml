document: rfc-6545
kind: design-rationale
summary: The TraceRequest and InvestigationRequest were collapsed from two separate message types (as in RFC 6045) into a single Request message with a MsgType attribute, because the two message descriptions were identical except for MsgType. This simplification reduces implementation complexity while preserving functional distinction.
section: "1.1"
topics:
    - security
