document: rfc-1035
kind: design-rationale
summary: IPv4 addresses in IN-ADDR.ARPA are written in reversed-octet order so that DNS zones can be delegated to match exactly one network of address space (e.g., 10.IN-ADDR.ARPA covers all of net 10). The awkward reversal is intentional to align zone boundaries with network boundaries.
section: "3.5"
topics:
    - dns
    - ip
