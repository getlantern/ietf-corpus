document: rfc-3798
kind: interoperability-note
summary: For message/partial fragmented messages, the Disposition-Notification-To, Disposition-Notification-Options, and Original-Recipient headers SHOULD be placed in the inner/enclosed message, not in the fragment headers. RFC 2046 section 5.2.2.1 is amended to append these headers to the reassembled message.
section: "2.4"
topics:
    - email
