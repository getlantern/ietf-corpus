kind: normative-requirement
summary: 'The client''s opening handshake MUST be a valid HTTP/1.1 GET request containing Host, Upgrade: websocket, Connection: Upgrade, Sec-WebSocket-Key (base64-encoded 16-byte nonce), and Sec-WebSocket-Version: 13 header fields.'
