document: rfc-8537
kind: normative-requirement
summary: If the bypass tunnel cannot be used as described in RFC 8271 Section 4.5.3, the upstream PLR SHOULD send a Notify message with Error Code 44 and Sub-code 'Bypass Assignment Cannot Be Used' (value 0) to the downstream PLR.
section: "4.1"
rfc2119_level: SHOULD
topics:
