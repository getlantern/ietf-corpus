document: rfc-3420
kind: security-consideration
summary: A message/sipfrag part may contain sensitive information or information used to affect processing decisions at the receiver. Protection can be improved using S/MIME mechanisms described in Section 23 of RFC 3261, with the limitations described in Section 26 of that document.
