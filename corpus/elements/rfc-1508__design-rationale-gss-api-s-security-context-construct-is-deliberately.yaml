document: rfc-1508
kind: design-rationale
summary: GSS-API's security context construct is deliberately independent of communications protocol associations, allowing a single implementation to be used by multiple protocol modules. No correlation between security context and protocol association is mandated, enabling use across both connection-oriented and connectionless environments.
section: 1.1.3
topics:
    - security
