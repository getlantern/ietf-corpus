document: rfc-8450
kind: protocol-element
summary: A VC-2 Stream consists of one or more independently decodable Sequences, each composed of 13-octet Parse Info Headers followed by variable-length Data Units. The HQ profile restricts Parse Codes to Sequence Headers (0x00), End of Sequence (0x10), Auxiliary Data (0x20), Padding Data (0x30), and HQ Picture Fragment (0xEC).
