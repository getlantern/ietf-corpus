document: rfc-4149
kind: protocol-element
summary: sspmSinkTable configures the measurement sink. For round-trip tests the sink is on the same probe as the source; for one-way tests it is on a separate probe. Attributes include expected packet rate, expected first sequence number, last sequence number received, and a counter of out-of-sequence packets.
section: "6.3"
topics:
    - snmp
    - measurement
