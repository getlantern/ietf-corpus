document: rfc-3834
kind: design-rationale
summary: The Return-Path address is the only message header field that can be expected, as a matter of protocol, to be suitable for automatic responses not anticipated by the sender. The From and Reply-To fields are used in too many context-dependent ways for reliable automatic use.
section: "4"
topics:
