document: rfc-2933
kind: protocol-element
summary: igmpCacheVersion1HostTimer (TimeTicks, read-only) is the time remaining before the local router assumes no IGMPv1 members exist on the subnet. Reset upon any IGMPv1 Membership Report; while non-zero, the router ignores IGMPv2 Leave messages for this group.
