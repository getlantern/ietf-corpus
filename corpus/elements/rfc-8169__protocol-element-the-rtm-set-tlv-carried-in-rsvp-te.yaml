document: rfc-8169
kind: protocol-element
summary: The RTM_SET TLV, carried in RSVP-TE LSP_ATTRIBUTES (type 5 in Attributes TLV Space), contains an ordered egress-to-ingress stack of RTM-capable node address sub-TLVs. The I bit signals that some RTM-capable nodes along the LSP could not be included in the TTL hop computation.
section: 4.4.1
topics:
    - routing
