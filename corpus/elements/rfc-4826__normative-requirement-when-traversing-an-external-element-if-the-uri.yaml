document: rfc-4826
kind: normative-requirement
summary: When traversing an <external> element, if the URI is already on the traversed list (indicating a circular reference), the server MUST cease traversal and SHOULD reject the SUBSCRIBE with a 502 (Bad Gateway).
section: "4.5"
rfc2119_level: MUST
topics:
