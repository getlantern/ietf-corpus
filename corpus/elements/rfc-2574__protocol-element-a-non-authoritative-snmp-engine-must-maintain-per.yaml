document: rfc-2574
kind: protocol-element
summary: 'A non-authoritative SNMP engine must maintain per-authoritative-engine state: local notions of snmpEngineBoots, snmpEngineTime, and latestReceivedEngineTime (keyed by snmpEngineID). Time synchronization occurs automatically in message-receive processing (Section 3.2 step 7b) when authentic messages advance the local notion of the remote engine''s time.'
section: "2.3"
topics:
    - snmp
    - security
