document: rfc-4286
kind: normative-requirement
summary: All MRD messages MUST be sent with an IPv4 TTL or IPv6 Hop Limit of 1 and MUST contain the Router Alert Option. Any data beyond the fixed message format MUST be ignored.
section: "2"
rfc2119_level: MUST
