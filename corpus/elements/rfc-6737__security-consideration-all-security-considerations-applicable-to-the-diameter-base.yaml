document: rfc-6737
kind: security-consideration
summary: All security considerations applicable to the Diameter base protocol (RFC 6733) apply equally to this specification. Additionally, modification of the security mechanism in use is prohibited over an existing connection; any change to the security method requires the connection to be restarted.
section: "5"
topics:
