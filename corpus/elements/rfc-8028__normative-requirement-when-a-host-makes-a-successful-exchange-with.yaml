document: rfc-8028
kind: normative-requirement
summary: When a host makes a successful exchange with a remote destination using a particular address pair, and has previously received a PIO matching the source address, the host SHOULD include the prefix in its history regardless of the L and A flag settings in the PIO.
section: "3.5"
rfc2119_level: SHOULD
topics:
