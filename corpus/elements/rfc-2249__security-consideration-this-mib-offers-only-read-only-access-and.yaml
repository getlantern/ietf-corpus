document: rfc-2249
kind: security-consideration
summary: This MIB offers only read-only access and therefore cannot be used to actively attack a system. However, the information it exposes about application existence, type, and configuration could indicate vulnerabilities, and traffic pattern data could be used to analyze network usage.
