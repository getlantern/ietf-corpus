document: rfc-9808
kind: normative-requirement
summary: The 'maximum-soft' value MUST be less than the value of 'maximum-hard'. If not specified, maximum-soft is equal to maximum-hard. The uCDN SHOULD reduce traffic upon reaching the soft limit before hitting the hard limit.
section: 2.2.1
rfc2119_level: MUST
