document: rfc-6790
kind: protocol-element
summary: An Entropy Label (EL) is an MPLS label that is not used for forwarding, is not signaled, and whose sole purpose is to add entropy to the label stack to improve load balancing. It is generated by the ingress LSR based on a load-balancing hash of the incoming packet's application-layer fields.
section: "3"
topics:
