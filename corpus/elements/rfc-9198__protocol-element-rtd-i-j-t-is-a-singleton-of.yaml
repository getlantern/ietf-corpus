document: rfc-9198
kind: protocol-element
summary: RTD(i,j,T) is a singleton of the RFC 2681 Round-Trip Delay between Src and Hop h(i,j) at time T; RTL(i,j,T) is a singleton of the RFC 6673 Round-Trip Loss between Src and Hop h(i,j) at time T. Both are optional attributes of a Hop specification.
