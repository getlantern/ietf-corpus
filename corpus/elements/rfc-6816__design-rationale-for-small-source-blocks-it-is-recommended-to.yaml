document: rfc-6816
kind: design-rationale
summary: For small source blocks, it is recommended to use N1 >= 7 to compensate for the reduced erasure recovery capability of LDPC codes at small block sizes; with very small blocks (a few tens of symbols), Reed-Solomon or 2D parity check codes may be more appropriate than LDPC-Staircase.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
