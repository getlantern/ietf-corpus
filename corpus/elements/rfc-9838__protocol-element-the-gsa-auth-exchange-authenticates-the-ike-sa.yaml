document: rfc-9838
kind: protocol-element
summary: The GSA_AUTH exchange authenticates the IKE_SA_INIT and registers the GM with the GCKS. The GM sends IDi, optional CERT/CERTREQ/IDr, AUTH, IDg (group to join), optional SAg (supported transforms), and optional GROUP_SENDER notify. The GCKS responds with IDr, optional CERT, AUTH, GSA (group policy), and KD (keying material), or returns INVALID_GROUP_ID, AUTHORIZATION_FAILED, or REGISTRATION_FAILED on error.
section: 2.3.1
topics:
    - ipsec
    - security
    - crypto
