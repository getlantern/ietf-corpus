document: rfc-8928
kind: design-rationale
summary: AP-ND separates the IID from cryptographic material, unlike SEND/CGA which derive the IID from the public key. This allows 6LoWPAN address compression (which requires L2-derived IIDs) to remain functional while still providing cryptographic proof of ownership via the ROVR/Crypto-ID.
