document: rfc-5953
kind: security-consideration
summary: Implementations MUST use TLS version 1.0 or higher (section 9.2.1 references RFC 5246 TLS 1.2 as the specification). The NULL integrity and encryption algorithms MUST NOT be used; cipher suites providing both authentication and privacy are recommended to satisfy all security level requests.
section: 9.2.1
topics:
    - snmp
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
