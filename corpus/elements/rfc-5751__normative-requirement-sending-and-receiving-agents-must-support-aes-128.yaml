document: rfc-5751
kind: normative-requirement
summary: Sending and receiving agents MUST support AES-128 CBC for content encryption. AES-192 and AES-256 CBC are SHOULD+. Triple-DES (DES EDE3 CBC) is SHOULD-, demoted from earlier mandatory status.
