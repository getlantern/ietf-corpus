document: rfc-4292
kind: interoperability-note
summary: The ipCidrRouteTable and all its objects (ipCidrRouteNumber, ipCidrRouteDest, ipCidrRouteMask, ipCidrRouteTos, etc.) are deprecated in RFC 4292 in favor of the version-independent inetCidrRouteTable. The older ipForwardTable and related objects are marked obsolete.
section: "4.1"
topics:
    - routing
    - ip
    - snmp
