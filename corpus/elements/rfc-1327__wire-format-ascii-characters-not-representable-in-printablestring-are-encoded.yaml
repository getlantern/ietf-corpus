document: rfc-1327
kind: wire-format
summary: 'ASCII characters not representable in PrintableString are encoded via ps-encoded using named escape sequences: ''(a)'' for @, ''(p)'' for %, ''(b)'' for !, ''(q)'' for ", ''(u)'' for _, ''(l)'' for (, ''(r)'' for ), or ''('' 3DIGIT '')'' for any ASCII character by decimal value (0–127). Escape sequences are interpreted case-insensitively but generated in lower case.'
section: "3.4"
topics:
