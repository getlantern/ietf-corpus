document: rfc-1655
kind: normative-requirement
summary: 'A conformant BGP-4 implementation is required to support all of the following options when injecting BGP-4 received routing information into BGP-3: inject default only (0.0.0.0), allow controlled deaggregation of specific routes, or allow export of only non-aggregated NLRI.'
section: "8.2"
rfc2119_level: REQUIRED
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
