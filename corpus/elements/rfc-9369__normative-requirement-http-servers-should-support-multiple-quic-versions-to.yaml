document: rfc-9369
kind: normative-requirement
summary: HTTP servers SHOULD support multiple QUIC versions to reduce the probability of incompatibility and the cost associated with version negotiation or TCP fallback, since Alt-Svc does not currently distinguish between QUIC versions.
section: "4"
rfc2119_level: SHOULD
topics:
