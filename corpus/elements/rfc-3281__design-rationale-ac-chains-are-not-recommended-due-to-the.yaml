document: rfc-3281
kind: design-rationale
summary: AC chains are NOT RECOMMENDED due to the complexity of their administration and processing, and because Internet use of ACs is limited. Conformant implementations are only required to process a single AC at a time; delegation via chaining is left to future specifications.
section: "1.1"
topics:
    - pkix
    - security
