document: rfc-3080
kind: protocol-element
summary: The 'start' element is sent on channel zero to create a new channel. It carries a 'number' attribute (channel id), an optional 'serverName' attribute, and one or more 'profile' elements each with a 'uri', optional 'encoding', and an optional initialization message up to 4K octets. The server replies with the selected profile element or an error.
section: 2.3.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
