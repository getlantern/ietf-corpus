document: rfc-4545
kind: normative-requirement
summary: The value of ipsAuthCredAuthMethod MUST NOT be changed while its row is 'active'. Similarly, ipsAuthIdentAddrType MUST NOT be changed while the address row is 'active', because it determines the format of the start and end address fields.
