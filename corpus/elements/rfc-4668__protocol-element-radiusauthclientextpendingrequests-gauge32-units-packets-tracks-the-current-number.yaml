document: rfc-4668
kind: protocol-element
summary: radiusAuthClientExtPendingRequests (Gauge32, UNITS packets) tracks the current number of Access-Request packets destined for a given server that have not yet timed out or received a response. It is incremented on each Access-Request sent and decremented on receipt of Access-Accept, Access-Reject, Access-Challenge, timeout, or retransmission.
section: "7"
topics:
