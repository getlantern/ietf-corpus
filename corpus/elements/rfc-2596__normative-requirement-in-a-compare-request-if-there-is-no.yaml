document: rfc-2596
kind: normative-requirement
summary: In a compare request, if there is no attribute in the entry with the same subtype and language code as specified, the noSuchAttributeType error MUST be returned. Clients SHOULD NOT use language code options in compare request AttributeDescriptions.
section: "3.4"
rfc2119_level: SHOULD NOT
