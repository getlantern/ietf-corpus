document: rfc-9103
kind: normative-requirement
summary: The entire transfer group (all primaries and secondaries for a set of zones) MUST have a consistent policy of using XoT. Both AXFRs and IXFRs for a zone MUST all use XoT; any member not using XoT is a weak link for attackers to exploit.
section: "11"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
