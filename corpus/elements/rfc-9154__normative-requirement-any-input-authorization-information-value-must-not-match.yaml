document: rfc-9154
kind: normative-requirement
summary: Any input authorization information value MUST NOT match an unset (NULL) authorization information value; an empty input MUST NOT match any set value; and a non-empty input MUST be hashed and matched against the stored hashed value.
section: "4.4"
rfc2119_level: MUST NOT
topics:
