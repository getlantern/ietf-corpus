document: rfc-6311
kind: normative-requirement
summary: M2 (the peer's reply counter) MUST be at least the higher of the received M1 and one more than the highest sender value previously received from the cluster. P2 MUST be the higher of received P1 and one more than the highest sender value used by the peer.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
