document: rfc-2334
kind: protocol-element
summary: The Family ID field in Hello messages groups multiple PID/SGID pairs under a single HFSM, creating a one-to-many mapping between one HFSM and the CAFSMs for each protocol instance. This substantially reduces Hello maintenance traffic when multiple protocol instances share a physical link.
section: B.2.5
