document: rfc-2078
kind: protocol-element
summary: The prot_ready_state Boolean, new in GSS-V2, is returned by GSS_Init_sec_context(), GSS_Accept_sec_context(), and GSS_Inquire_context(). When TRUE, per-message protection via GSS_Wrap/Unwrap/GetMIC/VerifyMIC is available even before GSS_S_COMPLETE is returned, allowing message protection during context establishment.
section: 1.2.7
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
