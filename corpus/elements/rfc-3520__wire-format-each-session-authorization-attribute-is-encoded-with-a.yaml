document: rfc-3520
kind: wire-format
summary: Each session authorization attribute is encoded with a 16-bit Length, an 8-bit X-Type, an 8-bit SubType, and a variable-length Value field. The attribute MUST be a multiple of 4 octets; padding bytes MUST be zero.
