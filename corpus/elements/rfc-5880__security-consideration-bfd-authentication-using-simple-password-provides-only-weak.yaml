document: rfc-5880
kind: security-consideration
summary: BFD authentication using Simple Password provides only weak protection and is subject to eavesdropping. Keyed MD5 is strongly discouraged due to known vulnerabilities. Implementations MUST support Keyed SHA1 / Meticulous Keyed SHA1. Without Meticulous keying, sequence numbers increment only occasionally, leaving larger windows for replay attacks; Meticulous variants increment on every packet for stronger protection.
section: "9"
topics:
    - security
    - crypto
