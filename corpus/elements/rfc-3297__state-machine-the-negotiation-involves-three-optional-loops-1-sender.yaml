document: rfc-3297
kind: state-machine
summary: 'The negotiation involves three optional loops: (1) sender receives acknowledgement that negotiable content was received; (2) receiver receives confirmation its alternative request was received; (3) sender receives confirmation that received data was processed. If the initial data is acceptable, only loop (3) fires. The receiver''s state must track that an alternative was requested and not yet resolved.'
section: "2.2"
topics:
    - email
