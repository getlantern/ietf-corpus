document: rfc-7692
kind: protocol-element
summary: 'The ''permessage-deflate'' extension compresses WebSocket message payloads using the DEFLATE algorithm (RFC 1951) with byte boundary alignment from RFC 1979. It defines four extension parameters: server_no_context_takeover, client_no_context_takeover, server_max_window_bits, and client_max_window_bits.'
