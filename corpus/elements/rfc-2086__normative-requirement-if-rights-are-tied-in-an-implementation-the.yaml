document: rfc-2086
kind: normative-requirement
summary: 'If rights are tied in an implementation, the implementation must be conservative in granting rights in response to SETACL commands: unless all rights in a tied set are specified, none of that set should be included in the ACL entry for that identifier.'
section: "3"
rfc2119_level: MUST
topics:
    - security
