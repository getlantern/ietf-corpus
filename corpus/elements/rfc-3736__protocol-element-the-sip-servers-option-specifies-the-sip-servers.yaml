document: rfc-3736
kind: protocol-element
summary: The SIP Servers option specifies the SIP servers the client uses to obtain a list of domain names or IPv6 addresses that can be mapped to one or more SIP outbound proxy servers (RFC 3319). This is a standard configuration option for stateless DHCP.
