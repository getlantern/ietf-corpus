document: rfc-9810
kind: protocol-element
summary: The Key Generation Authority (KGA) is an optional PKI management entity that generates key pairs on behalf of end entities and therefore knows both the public and private key. Its authorization is indicated by the id-kp-cmKGA EKU or by the CA certificate itself.
section: 3.1.1.4
