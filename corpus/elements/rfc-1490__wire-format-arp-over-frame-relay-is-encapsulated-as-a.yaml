summary: ARP over Frame Relay is encapsulated as a SNAP frame with OUI 0x00-00-00 and PID 0x0806 (ARP Ethertype). The hardware type field ar$hrd is assigned value 15 (0x000F) for Frame Relay; ar$hln is 2, 3, or 4 bytes matching the Q.922 address length.
