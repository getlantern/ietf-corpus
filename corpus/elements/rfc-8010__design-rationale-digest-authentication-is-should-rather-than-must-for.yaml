document: rfc-8010
kind: design-rationale
summary: Digest Authentication is SHOULD rather than MUST for IPP conformance because low-end devices with limited ROM space may not need client authentication. Forcing such devices to support security would not make business sense and would increase cost without proportional benefit.
section: 8.1.1
topics:
