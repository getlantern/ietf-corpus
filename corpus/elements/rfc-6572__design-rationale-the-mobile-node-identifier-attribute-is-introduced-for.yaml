document: rfc-6572
kind: design-rationale
summary: The Mobile-Node-Identifier attribute is introduced for deployments where the authentication identity and the PMIPv6 PBU/PBA mobility identity are decoupled, or when identity hiding is in effect during network access authentication, or when the HAAA assigns periodically changing identities to the MN.
