document: rfc-2746
kind: normative-requirement
summary: The RSVP daemon must be able to learn, via the RSVP/Routing interface, which local interfaces are IP-in-IP tunnels with RSVP-over-tunnel capability; this information may be obtained by querying the network layer directly or via an extended routing protocol interface.
section: "9"
rfc2119_level: MUST
topics:
    - qos
    - routing
