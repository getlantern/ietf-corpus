document: rfc-4207
kind: protocol-element
summary: The TraceMonitorNack message (Message Type 23) acknowledges a TraceMonitor message and indicates the TRACE object was not processed correctly. It carries ERROR_CODE; error codes include 0x01 (Unsupported Trace Type) and 0x02 (Invalid Trace Message).
