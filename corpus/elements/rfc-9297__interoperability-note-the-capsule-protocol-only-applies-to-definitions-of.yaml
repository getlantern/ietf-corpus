document: rfc-9297
kind: interoperability-note
summary: The Capsule Protocol only applies to definitions of new HTTP upgrade tokens; in HTTP/2 and HTTP/3, it can only be used with the CONNECT method, which changes the frame usage requirements per Section 8.5 of HTTP/2 and Section 4.4 of HTTP/3.
section: "3.2"
