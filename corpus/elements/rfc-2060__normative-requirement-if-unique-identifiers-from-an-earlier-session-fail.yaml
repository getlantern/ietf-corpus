document: rfc-2060
kind: normative-requirement
summary: If unique identifiers from an earlier session fail to persist to a new session, the UIDVALIDITY value MUST be greater than the one used in the earlier session. UIDs MUST be strictly ascending in the mailbox at all times.
section: 2.3.1.1
rfc2119_level: MUST
topics:
    - email
