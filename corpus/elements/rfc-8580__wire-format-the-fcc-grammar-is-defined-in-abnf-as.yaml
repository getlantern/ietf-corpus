document: rfc-8580
kind: wire-format
summary: 'The FCC grammar is defined in ABNF as: FCC = ":fcc" string *FCC-OPTS, where FCC-OPTS = CREATE / IMAP-FLAGS / SPECIAL-USE; each option MUST NOT appear more than once. Tagged arguments in FCC may appear in any order.'
