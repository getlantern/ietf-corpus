document: rfc-3680
kind: state-machine
summary: 'The address-of-record registration state machine has three states: init (no contacts registered), active (at least one contact bound), and terminated (last contact removed). The transition from terminated back to init MUST NOT ever be reported to a subscriber in a NOTIFY.'
section: 4.7.1
topics:
    - sip
    - realtime
