summary: TAMP defines IANA-registered media types for each of its eleven message types under the application/ tree (e.g., application/tamp-status-query, application/tamp-update, application/tamp-apex-update, etc.) and registers OIDs under the id-tamp arc ({id-tamp 1} through {id-tamp 11}) as CMS content type identifiers.
