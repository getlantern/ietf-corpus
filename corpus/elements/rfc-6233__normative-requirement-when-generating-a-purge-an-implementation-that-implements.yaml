document: rfc-6233
kind: normative-requirement
summary: When generating a purge, an implementation that implements authentication MUST first remove any TLVs not listed in the registry as acceptable in purges, then MUST add the POI TLV, then MAY add other registry-permitted TLVs, and finally adds authentication.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - security
