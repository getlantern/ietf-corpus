document: rfc-3440
kind: protocol-element
summary: The AdslTransmissionModeType textual convention is a BITS string encoding 13 ADSL transmission modes (bits 0–12), distinguishing Full-Rate modes (ANSI T1.413, ETSI, G.992.1 variants) from G.Lite modes (G.992.2 variants). Multiple bits may be set simultaneously to indicate capability or configuration.
