document: rfc-4287
kind: security-consideration
summary: Text constructs and atom:content may deliver HTML and XHTML containing unsafe elements (IMG, SCRIPT, EMBED, OBJECT, FRAME, FRAMESET, IFRAME, META, LINK). Implementations must carefully sanitize or sandbox such content, as it can directly contain or reference executable content.
section: "8.1"
topics:
    - security
