document: rfc-9601
kind: security-consideration
summary: The security considerations of RFC 6040 and RFC 9599 apply equally to the extended scope defined in this specification. No additional security considerations beyond those documents are identified; the primary safety concern addressed is preventing non-ECN tunnel egresses from silently discarding ECN markings and thus breaking ECN-based congestion control feedback loops.
section: "8"
topics:
    - ecn
    - security
    - congestion
