document: rfc-7074
kind: normative-requirement
summary: A different Switching Type value SHOULD be used for each data-plane technology, even when those technologies share the same type of multiplexing or switching. For example, SDH and OTN should use two different Switching Types despite both being TDM technologies.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
