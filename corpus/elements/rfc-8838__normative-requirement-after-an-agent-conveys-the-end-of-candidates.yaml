document: rfc-8838
kind: normative-requirement
summary: After an agent conveys the end-of-candidates indication, it MUST NOT trickle any new candidates within that ICE session. Additionally, an agent MUST NOT trickle any new candidates within an ICE session after nomination of a candidate pair.
section: "13"
rfc2119_level: MUST NOT
topics:
