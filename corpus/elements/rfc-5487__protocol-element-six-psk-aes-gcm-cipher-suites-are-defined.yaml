document: rfc-5487
kind: protocol-element
summary: 'Six PSK AES-GCM cipher suites are defined for TLS 1.2+: TLS_PSK_WITH_AES_128_GCM_SHA256 (0x00,0xA8), TLS_PSK_WITH_AES_256_GCM_SHA384 (0x00,0xA9), TLS_DHE_PSK_WITH_AES_128_GCM_SHA256 (0x00,0xAA), TLS_DHE_PSK_WITH_AES_256_GCM_SHA384 (0x00,0xAB), TLS_RSA_PSK_WITH_AES_128_GCM_SHA256 (0x00,0xAC), and TLS_RSA_PSK_WITH_AES_256_GCM_SHA384 (0x00,0xAD). These use AEAD_AES_128_GCM and AEAD_AES_256_GCM as defined in RFC 5116.'
