document: rfc-7159
kind: interoperability-note
summary: The ABNF allows member names and string values to contain bit sequences that cannot encode valid Unicode characters (e.g., a single unpaired UTF-16 surrogate `\uDEAD`). Software receiving such values may behave unpredictably, including returning wrong string lengths or fatal exceptions.
section: "8.2"
topics:
    - json
