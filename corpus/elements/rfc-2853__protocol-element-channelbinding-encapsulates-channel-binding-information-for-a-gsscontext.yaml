document: rfc-2853
kind: protocol-element
summary: ChannelBinding encapsulates channel binding information for a GSSContext, consisting of an optional initiator InetAddress, optional acceptor InetAddress, and an optional application-data byte array. It must be set before the first call to init or accept. InetAddress is the only address type supported in the Java platform binding.
section: "5.8"
topics:
    - security
