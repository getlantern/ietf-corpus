summary: 'A JSON text is defined by the grammar `JSON-text = ws value ws`. The six structural characters are: begin-array `[` (%x5B), end-array `]` (%x5D), begin-object `{` (%x7B), end-object `}` (%x7D), name-separator `:` (%x3A), and value-separator `,` (%x2C), each optionally surrounded by insignificant whitespace (space, tab, LF, CR).'
