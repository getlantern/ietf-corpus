document: rfc-9625
kind: protocol-element
summary: Five cases govern how a receiving PE associates an incoming route with a BD. Case 4 covers routes carrying only the SBD-RT (route belongs to SBD regardless of Tag ID). Case 5 covers routes carrying both an ordinary BD-RT and the SBD-RT (route belongs to the ordinary BD, not the SBD).
section: "2.2"
