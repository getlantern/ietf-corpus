document: rfc-9825
kind: normative-requirement
summary: If the Administrative Tag Sub-TLV Length is 0 or not a multiple of 4 octets, the sub-TLV MUST be ignored, and the reception SHOULD be logged for further analysis (subject to rate-limiting).
section: "2"
rfc2119_level: MUST
