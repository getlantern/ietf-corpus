document: rfc-5438
kind: normative-requirement
summary: If the IM is encrypted, the IM Recipient or intermediary MUST encrypt the IMDN body. If the IM Recipient has a certificate, it MUST sign the IMDN. The same level of security applied to an IM MUST be applied to its IMDNs.
section: "14"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - realtime
