document: rfc-9660
kind: normative-requirement
summary: The ZONEVERSION option is not transitive. A name server MUST NOT blindly copy the ZONEVERSION option from a received query into a subsequent outbound query, and MUST NOT send a ZONEVERSION option back to a client that did not request it.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - dns
