document: rfc-2747
kind: protocol-element
summary: 'The integrity handshake uses two new RSVP message types: ''Integrity Challenge'' (type 11) containing a CHALLENGE object (Class=64, C-Type=1) with a 48-bit Key Identifier and a 64-bit Challenge Cookie, and ''Integrity Response'' (type 12) echoing the CHALLENGE object inside an integrity-signed message.'
section: "4.3"
topics:
    - security
