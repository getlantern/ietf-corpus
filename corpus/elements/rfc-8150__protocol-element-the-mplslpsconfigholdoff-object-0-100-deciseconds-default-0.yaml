document: rfc-8150
kind: protocol-element
summary: The mplsLpsConfigHoldOff object (0–100 deciseconds, default 0, in 100 ms intervals) delays declaration of SF/SD requests to the protection switching logic after defect detection. It applies only to defects on the active path; defects on the standby path do not start the hold-off timer.
section: "8"
topics:
