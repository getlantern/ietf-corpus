document: rfc-6864
kind: design-rationale
summary: Strict enforcement of IPv4 ID uniqueness within the MDL would limit aggregate throughput between two endpoints to 6.4 Mbps at typical 1500-byte MTUs, far below common link speeds. Because high-speed devices already violate this uniqueness in practice, the specification is updated to reflect reality rather than mandate an unenforceable constraint.
section: "3.2"
topics:
    - ip
