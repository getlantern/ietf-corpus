document: rfc-2563
kind: interoperability-note
summary: DHCPOFFERs with 'yiaddr' of 0x00000000 are only sent by servers that support Auto-Configure and only in response to DISCOVERs that contain the option, so legacy clients never receive them and are unaffected.
section: "2.2"
topics:
