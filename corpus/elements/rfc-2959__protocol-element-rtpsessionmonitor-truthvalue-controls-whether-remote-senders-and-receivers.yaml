document: rfc-2959
kind: protocol-element
summary: rtpSessionMonitor (TruthValue) controls whether remote senders and receivers are tracked via RTCP. RTP Monitors must initialize it to true(1); RTP Hosts should initialize it to false(2); host-monitor systems that receive RTCP from remote participants must set it to true(1).
