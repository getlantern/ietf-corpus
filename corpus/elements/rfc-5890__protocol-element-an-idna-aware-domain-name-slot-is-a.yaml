document: rfc-5890
kind: protocol-element
summary: An IDNA-aware domain name slot is a domain name slot explicitly designated—either statically in a protocol specification or dynamically through negotiation—for carrying an internationalized domain name. Domain name slots whose specifications predate IDNA are not IDNA-aware.
section: 2.3.2.6
topics:
    - dns
