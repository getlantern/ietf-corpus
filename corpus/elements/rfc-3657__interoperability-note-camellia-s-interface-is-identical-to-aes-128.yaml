document: rfc-3657
kind: interoperability-note
summary: Camellia's interface is identical to AES (128-bit block size, 128/192/256-bit key sizes), enabling direct reuse of the AES key wrap algorithm from RFC 3394 and alignment with RFC 3565 (AES in CMS) conventions.
