document: rfc-8685
kind: protocol-element
summary: To obtain only a domain sequence (not a full end-to-end path), a child PCE sets the S bit (Domain Sequence bit) in the H-PCE-FLAG TLV of the RP object. The parent PCE then returns the domain sequence in the ERO of a PCRep message, or a NO-PATH object on failure.
section: "4.2"
topics:
    - routing
    - mpls
