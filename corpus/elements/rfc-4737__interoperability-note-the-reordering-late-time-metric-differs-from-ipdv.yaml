document: rfc-4737
kind: interoperability-note
summary: The Reordering Late Time metric differs from IPDV (RFC 3393), which gives delay variation for a packet with respect to its predecessor in source sequence. When earlier packets are lost, IPDV is undefined for adjacent pairs, whereas LateTime may still be computable and is the only way to evaluate usefulness of a late packet.
section: 4.3.4
topics:
    - measurement
