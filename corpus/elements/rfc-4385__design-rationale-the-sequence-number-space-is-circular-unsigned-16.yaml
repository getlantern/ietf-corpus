document: rfc-4385
kind: design-rationale
summary: The sequence number space is circular unsigned 16-bit excluding zero. Zero is reserved to signal that sequencing is disabled (or not determinable), allowing a receiver to distinguish between a legitimately zero-sequenced packet and one where sequencing is inactive without additional out-of-band signaling.
