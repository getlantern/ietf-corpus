document: rfc-4006
kind: normative-requirement
summary: The Service-Context-Id AVP MUST be included at the command level of a Credit-Control-Request to identify the service-specific document applicable to the request. The specific service or rating group is uniquely identified by the combination of Service-Context-Id and Service-Identifier or Rating-Group.
section: 4.1.2
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
