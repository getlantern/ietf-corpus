document: rfc-1209
kind: design-rationale
summary: Each LIS operates independently over the same SMDS network, requiring hosts in different LISs to communicate via an intermediate router even when a direct SMDS path exists. This simplifies address resolution and routing propagation at the cost of suboptimal paths.
section: Logical IP Subnetwork Configuration
topics:
    - ip
