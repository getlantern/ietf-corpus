document: rfc-9031
kind: design-rationale
summary: The pledge communicates with the JRC at the application layer only (via JP proxy), rather than at the network layer, so that it can join without knowing the JRC's IPv6 address. The pledge learns the JRC's global address only from the Join Response, after which it can act as a JP itself.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
