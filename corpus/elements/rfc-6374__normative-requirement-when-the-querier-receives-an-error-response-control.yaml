document: rfc-6374
kind: normative-requirement
summary: When the querier receives an Error response (Control Code ≥ 0x10) or an invalid response, the LM/DM operation MUST be terminated and the user notified. Counter values from any non-success response MUST NOT be used for loss measurement.
section: 4.2.5
rfc2119_level: MUST
topics:
