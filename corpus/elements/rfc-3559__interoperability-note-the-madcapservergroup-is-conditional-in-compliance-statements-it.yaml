document: rfc-3559
kind: interoperability-note
summary: 'The madcapServerGroup is conditional in compliance statements: it is mandatory only for servers that implement the MADCAP client-server protocol. Similarly, madcapClientGroup is mandatory only for clients implementing MADCAP. This allows implementations of other allocation protocols to conform to the MIB without supporting MADCAP objects.'
section: "4"
topics:
    - multicast
