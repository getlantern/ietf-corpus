document: rfc-8108
kind: normative-requirement
summary: After sending an aggregated compound RTCP packet, the endpoint MUST update tp, tn, and T_rr_last for each included SSRC using a calculated average effective transmission time (tt_avg) derived from each SSRC's hypothetical transmission time had it not been aggregated.
section: 5.3.2
rfc2119_level: MUST
topics:
