summary: Security considerations from RFC 3370, RFC 3560, RFC 4056, RFC 4231, RFC 5083, RFC 5084, RFC 5649, RFC 5652, RFC 5754, and RFC 5958 all apply. NIST SP800-57 provides comparable bits of security for various algorithms and key sizes, and defines time frames during which certain security levels are appropriate.
