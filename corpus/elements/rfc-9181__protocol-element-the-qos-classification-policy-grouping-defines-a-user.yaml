document: rfc-9181
kind: protocol-element
summary: The 'qos-classification-policy' grouping defines a user-ordered list of QoS rules, each matching either by flow (IPv4/IPv6 L3 header fields or TCP/UDP L4 header fields reusing RFC 8519 packet-fields groupings) or by application identity (customer-application identityref). Each rule maps to a target-class-id string for internal CoS identification.
