document: rfc-6625
kind: normative-requirement
summary: When PIM is used as PE-PE control protocol and a PE needs to receive a (C-S,C-G) flow that matches a (C-*,C-*) S-PMSI A-D route per Section 3.2, the PE MUST join the P-tunnel specified in the PMSI Tunnel Attribute of that route.
section: "4.4"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
