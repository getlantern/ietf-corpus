document: rfc-3161
kind: wire-format
summary: TimeStampResp is an ASN.1 SEQUENCE of PKIStatusInfo and optional TimeStampToken. A TimeStampToken MUST be present when status is 0 (granted) or 1 (grantedWithMods), and MUST NOT be present for any other status value.
section: 2.4.2
topics:
