document: rfc-1894
kind: wire-format
summary: 'Status code is encoded as three numeric subfields separated by periods: status-code = DIGIT "." 1*3DIGIT "." 1*3DIGIT. Whitespace and comments are NOT allowed within a status-code, though a parenthesized comment MAY follow the last subfield.'
