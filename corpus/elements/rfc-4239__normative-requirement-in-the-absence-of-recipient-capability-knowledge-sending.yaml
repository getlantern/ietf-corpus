document: rfc-4239
kind: normative-requirement
summary: In the absence of recipient capability knowledge, sending implementations MUST use raw G.711 mu-law (MIME type audio/basic, SHOULD use filename ending in '.au'). A VPIM v2 interoperable implementation MUST also support G.726 (audio/32kadpcm).
section: "7"
rfc2119_level: MUST
