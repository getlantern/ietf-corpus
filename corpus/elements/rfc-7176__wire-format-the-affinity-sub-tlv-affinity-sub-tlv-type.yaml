document: rfc-7176
kind: wire-format
summary: The Affinity sub-TLV (AFFINITY, sub-TLV type 17) carries Affinity Records each with a 2-byte Nickname, 1-byte Affinity Flags (reserved, sent as zero), 1-byte Number of trees, and 2*N bytes of tree numbers. It requests that all ISs connect the named IS as a child of the originating IS for the listed distribution trees.
section: 2.3.10
topics:
    - routing
    - multicast
