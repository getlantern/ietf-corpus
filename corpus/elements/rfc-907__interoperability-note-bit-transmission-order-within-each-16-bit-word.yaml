document: rfc-907
kind: interoperability-note
summary: 'Bit transmission order within each 16-bit word differs by link-level protocol: HDLC and ARPANET VDH transmit bit 0 (LSB) first through bit 15 (MSB); ARPANET 1822 local and distant host interfaces transmit in the reverse order (bit 15 first). HAP word ordering (word 0 to word N) is the same for all link types.'
section: "2"
