document: rfc-5428
kind: normative-requirement
summary: When an event is associated with multiple event classes, the MTA MUST give precedence to the event class with the lowest index value. Management stations SHOULD NOT associate an event with multiple event classes.
section: "6"
rfc2119_level: MUST
