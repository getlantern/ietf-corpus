document: rfc-1449
kind: interoperability-note
summary: When NBP machinery is broken (e.g., FwdReq or BrRq failures at routers), a dedicated AppleTalk management entity may implement the router portion of NBP directly—sending NBP FwdReq and directed LkUp multicast datagrams—to recover name resolution for agents whose last known network address is known.
section: 5.3.4
topics:
    - snmp
