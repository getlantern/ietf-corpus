document: rfc-9198
kind: normative-requirement
summary: 'For UDP flow maintenance: in IPv4, Src, Dst, port-Src, port-Dst, and Diffserv should be the same, and the UDP checksum SHOULD change to keep the IP checksum of the ICMP Time Exceeded reply constant; in IPv6, Flow Label and Source/Destination addresses SHOULD be the same.'
section: "4.1"
rfc2119_level: SHOULD
topics:
    - measurement
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
