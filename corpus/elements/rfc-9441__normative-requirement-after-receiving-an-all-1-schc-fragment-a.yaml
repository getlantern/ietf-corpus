document: rfc-9441
kind: normative-requirement
summary: After receiving an All-1 SCHC Fragment, a receiver MUST check the integrity of the reassembled SCHC Packet at least every time it prepares to send a SCHC Compound ACK for the last window. Upon expiration of the Inactivity Timer, the receiver MUST send a SCHC Receiver-Abort.
section: 3.2.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
