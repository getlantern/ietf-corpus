document: rfc-2589
kind: design-rationale
summary: Dynamic information changes very frequently and disk-based databases used for static directory services are likely inappropriate. The spec recommends storing dynamic entries in memory sufficient to avoid paging, though this is not a hard requirement.
section: "7.1"
topics:
    - ldap
