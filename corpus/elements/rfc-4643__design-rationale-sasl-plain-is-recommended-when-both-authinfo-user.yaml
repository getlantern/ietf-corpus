document: rfc-4643
kind: design-rationale
summary: SASL PLAIN is recommended when both AUTHINFO USER/PASS and AUTHINFO SASL are implemented because DIGEST-MD5 is insufficient for some environments (e.g., where the server needs to pass plaintext passwords to an external authentication service), and PLAIN eliminates white-space limitations of AUTHINFO USER/PASS.
section: 2.4.2
topics:
    - security
