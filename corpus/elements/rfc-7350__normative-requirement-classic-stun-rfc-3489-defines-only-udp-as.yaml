document: rfc-7350
kind: normative-requirement
summary: Classic STUN (RFC 3489) defines only UDP as a transport, and DTLS MUST NOT be used with it. Any STUN request or indication without the magic cookie over DTLS MUST always result in an error.
section: "3"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
