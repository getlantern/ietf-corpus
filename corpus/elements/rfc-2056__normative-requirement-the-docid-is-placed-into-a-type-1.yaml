document: rfc-2056
kind: normative-requirement
summary: The docid is placed into a type-1 query as the single term in general format (tag 45), using the Bib-1 attribute set with a Use attribute value of docid and a structure attribute of URx. The docid string is server-defined and completely opaque to the client.
section: "4"
rfc2119_level: MUST
