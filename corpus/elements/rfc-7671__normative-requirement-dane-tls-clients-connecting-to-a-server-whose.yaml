document: rfc-7671
kind: normative-requirement
summary: DANE TLS clients connecting to a server whose domain name is a CNAME alias SHOULD follow the CNAME hop-by-hop to its ultimate target. If DNSSEC validation is secure at each step, the final target name SHOULD be the preferred base domain for TLSA lookups.
section: "7"
rfc2119_level: SHOULD
topics:
    - dns
    - tls
    - security
