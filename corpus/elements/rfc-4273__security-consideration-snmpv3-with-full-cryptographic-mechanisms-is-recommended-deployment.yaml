document: rfc-4273
kind: security-consideration
summary: SNMPv3 with full cryptographic mechanisms is RECOMMENDED; deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. BGP peer local and remote IP addresses are sensitive for ISPs and should have controlled read access and encrypted transport.
