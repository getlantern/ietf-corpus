document: rfc-2575
kind: security-consideration
summary: The objects in SNMP-VIEW-BASED-ACM-MIB control access to all MIB data accessible via the SNMP engine and are sensitive in many environments. Both read and write access to these objects must be closely controlled using appropriately configured access control models.
section: "7.4"
topics:
