document: rfc-6780
kind: design-rationale
summary: The 16-bit Association ID field in the original ASSOCIATION object limits an association source to at most 65536 distinct associations, which is insufficient for centralized entities managing large numbers of associations or for MPLS-TP LSP identification requiring operator-unique global identifiers (ASN-based Global_ID).
section: "4"
topics:
