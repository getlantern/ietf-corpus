document: rfc-3297
kind: design-rationale
summary: The mechanism avoids 'administrative non-messages' by requiring the sender to always include meaningful data in the initial message. A sender must not assume a receiver understands the capability exchange protocol, so must start with processable content regardless.
section: "2.3"
topics:
