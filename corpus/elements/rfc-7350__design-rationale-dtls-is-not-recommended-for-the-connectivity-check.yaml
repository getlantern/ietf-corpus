document: rfc-7350
kind: design-rationale
summary: DTLS is not recommended for the Connectivity Check usage because adding DTLS on top would delay and impair the ICE process. MESSAGE-INTEGRITY already protects STUN responses against injection attacks without requiring the overhead of DTLS.
section: "4.2"
