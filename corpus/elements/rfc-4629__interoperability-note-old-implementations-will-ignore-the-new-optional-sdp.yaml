document: rfc-4629
kind: interoperability-note
summary: Old implementations will ignore the new optional SDP parameters added in this document. New implementations receiving H263-1998 or H263-2000 payload types with no parameters should behave as if the other side can accept H.263 at QCIF resolution at no more than approximately 14.985 frames per second.
section: "9.1"
topics:
