document: rfc-8348
kind: security-consideration
summary: 'The YANG modules are accessed via NETCONF (mandatory secure transport: SSH per RFC 6242) or RESTCONF (mandatory secure transport: TLS per RFC 5246). The NETCONF Access Control Model (RFC 8341) must be used to restrict access to authorized users.'
