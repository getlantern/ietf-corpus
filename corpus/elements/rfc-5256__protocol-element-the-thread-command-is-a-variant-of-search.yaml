document: rfc-5256
kind: protocol-element
summary: The THREAD command is a variant of SEARCH with threading semantics. Its arguments are a threading algorithm name, a mandatory charset, and one or more searching criteria. It returns matching messages in an untagged THREAD response organized as a parenthesized nested list reflecting parent/child relationships.
