document: rfc-6731
kind: security-consideration
summary: Trustworthiness of an interface is implementation- and deployment-dependent; authenticated encrypted VPN or trusted home/cellular links may be considered trusted, while unauthenticated connections to unknown visited networks are typically untrusted. Implementations may require explicit user or administrator configuration to assign trust.
section: "8.2"
topics:
    - dns
    - security
