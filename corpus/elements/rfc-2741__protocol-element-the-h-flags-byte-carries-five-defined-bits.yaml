document: rfc-2741
kind: protocol-element
summary: 'The h.flags byte carries five defined bits: INSTANCE_REGISTRATION (0), NEW_INDEX (1), ANY_INDEX (2), NON_DEFAULT_CONTEXT (3), NETWORK_BYTE_ORDER (4). The NETWORK_BYTE_ORDER bit governs byte ordering for all multi-byte integers in the entire packet including the remaining header fields.'
section: "6.1"
