document: rfc-9176
kind: design-rationale
summary: Simple registration (POST to /.well-known/rd with empty body, RD fetches /.well-known/core) exists because many constrained devices cannot implement the full link-upload registration. The RD fetches links directly from the device rather than requiring the device to push them.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
