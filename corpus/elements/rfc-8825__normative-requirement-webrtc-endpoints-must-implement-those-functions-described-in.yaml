document: rfc-8825
kind: normative-requirement
summary: WebRTC endpoints MUST implement those functions described in RFC 8829 that relate to the network layer (e.g., BUNDLE [RFC8843], rtcp-mux [RFC5761], and Trickle ICE [RFC8838]), but these endpoints do not need to support the API functionality described in RFC 8829.
section: "7"
rfc2119_level: MUST
topics:
