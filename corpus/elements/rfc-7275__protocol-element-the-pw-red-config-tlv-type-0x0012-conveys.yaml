document: rfc-7275
kind: protocol-element
summary: 'The PW-RED Config TLV (Type=0x0012) conveys pseudowire redundancy configuration including: ROID (8 octets), PW Priority (2 octets; lower value is higher priority; ties broken by numerically lower PE IP address), and Flags encoding operational mode (Independent, Independent with Request Switchover, Master, Slave) and synchronization completion.'
section: 7.1.3
