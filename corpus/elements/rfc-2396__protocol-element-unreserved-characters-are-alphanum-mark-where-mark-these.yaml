document: rfc-2396
kind: protocol-element
summary: Unreserved characters are alphanum | mark, where mark = '-' | '_' | '.' | '!' | '~' | '*' | '\'' | '(' | ')'. These characters can be escaped without changing URI semantics, but escaping should be avoided unless required by context.
section: "2.3"
