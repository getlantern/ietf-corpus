document: rfc-9762
kind: normative-requirement
summary: For source address selection (RFC 6724), if the host creates addresses from a delegated prefix, it SHOULD treat those addresses as if assigned to the interface on which the prefix was received, placing them in the candidate set and associating them with the outgoing interface for Rule 5.
section: "7.5"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
