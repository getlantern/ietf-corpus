document: rfc-8591
kind: security-consideration
summary: The secure notification use case (e.g., 2FA codes, financial alerts) is vulnerable to phishing, eavesdropping, and impersonation. End-to-end protection alone is insufficient unless recipients are trained to reject unsigned messages that appear to be from trusted senders.
