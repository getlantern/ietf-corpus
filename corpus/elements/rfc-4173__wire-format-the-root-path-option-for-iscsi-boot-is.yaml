summary: 'The Root Path option for iSCSI boot is a UTF-8 string with the format: ''iscsi:<servername>:<protocol>:<port>:<LUN>:<targetname>''. The fields servername, port, protocol, and LUN are OPTIONAL and may be left blank; targetname is mandatory.'
