document: rfc-5360
kind: protocol-element
summary: 'A permission document contains: the identity of the sender, the identity of the original recipient (target URI), the identity of the final recipient (recipient URI), URIs to grant permission, and URIs to deny permission. The recipient URI MUST NOT be wildcarded, though sender identity fields may use wildcards.'
section: "5.4"
topics:
    - sip
    - security
