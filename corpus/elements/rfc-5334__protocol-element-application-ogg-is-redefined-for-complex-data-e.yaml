document: rfc-5334
kind: protocol-element
summary: application/ogg is redefined for complex data (e.g., multitrack visual, audio, textual, and other time-continuously sampled data) not clearly video or audio. It uses file extension .ogx and Macintosh type code OggX. Data served under this type MUST contain an Ogg Skeleton logical bitstream.
section: "10.1"
topics:
    - registry
