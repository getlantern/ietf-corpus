document: rfc-4204
kind: design-rationale
summary: LMP was designed to explicitly separate the fate of control channels from data links. In GMPLS, control channels may be physically diverse from data links (separate fiber, Ethernet, IP tunnel), so the health of one does not correlate to the other, necessitating dedicated mechanisms for data link management and fault localization.
section: "1"
topics:
    - routing
