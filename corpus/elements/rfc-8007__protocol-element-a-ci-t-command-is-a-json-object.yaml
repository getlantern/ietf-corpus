document: rfc-8007
kind: protocol-element
summary: A CI/T Command is a JSON object with exactly one of 'trigger' (a Trigger Specification) or 'cancel' (array of Trigger Status Resource URLs), plus a mandatory 'cdn-path' array of CDN PIDs. The media type is 'application/cdni; ptype=ci-trigger-command'.
