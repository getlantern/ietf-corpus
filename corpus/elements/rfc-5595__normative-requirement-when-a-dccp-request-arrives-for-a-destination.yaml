document: rfc-5595
kind: normative-requirement
summary: When a DCCP-Request arrives for a destination port not bound to any server, the host MUST reject the connection by issuing a DCCP-Reset with Reset Code 'Connection Refused'. A host MAY also use Reset Code 'Too Busy'.
section: 3.3.1
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
