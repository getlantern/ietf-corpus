document: rfc-5261
kind: protocol-element
summary: The <remove> element has a required 'sel' attribute and an optional 'ws' attribute with values 'before', 'after', or 'both'. The 'ws' attribute removes immediate sibling white space text nodes and is only permitted when removing element, comment, or processing instruction nodes (not text, attribute, or namespace nodes).
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
