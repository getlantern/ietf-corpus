document: rfc-7796
kind: protocol-element
summary: A Tree VSI (T-VSI) is a single VSI with E-Tree support that connects to a bridge module via a dual-VLAN virtual interface, carrying both root VLAN and leaf VLAN traffic on the same T-VSI. This enables a single VPLS instance and one set of PWs per E-Tree service, sharing a single FIB with shared VLAN learning.
section: "4.2"
topics:
    - mpls
    - routing
