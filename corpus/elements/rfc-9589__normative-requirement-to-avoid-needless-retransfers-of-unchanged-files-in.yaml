document: rfc-9589
kind: normative-requirement
summary: To avoid needless retransfers of unchanged files in consecutive rsync synchronizations, Repository Operators SHOULD ensure that the last modification timestamp of a file remains unchanged when the content of the file is unchanged.
section: "2"
rfc2119_level: SHOULD
topics:
