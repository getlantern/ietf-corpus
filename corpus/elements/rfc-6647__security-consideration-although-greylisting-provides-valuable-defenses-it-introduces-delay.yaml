document: rfc-6647
kind: security-consideration
summary: Although greylisting provides valuable defenses, it introduces delay that can be harmful for time-sensitive financial, transactional, or security-related email. Exempting specific sources from greylisting grants them elevated access privilege that malefactors could seek to exploit by spoofing or compromising those sources.
section: "8.1"
topics:
    - email
    - security
