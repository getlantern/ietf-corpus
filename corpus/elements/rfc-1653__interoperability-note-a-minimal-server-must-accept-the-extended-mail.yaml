document: rfc-1653
kind: interoperability-note
summary: A minimal server must accept the extended MAIL command and return 552 if the declared size exceeds its fixed limit, but need not detect temporary resource limitations. If the SIZE keyword is returned with no parameter, the server must check resource availability before issuing a 250 response to an extended MAIL command with a SIZE specification.
section: "6"
topics:
