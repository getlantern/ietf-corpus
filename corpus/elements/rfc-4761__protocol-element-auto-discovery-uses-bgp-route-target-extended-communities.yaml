document: rfc-4761
kind: protocol-element
summary: Auto-discovery uses BGP Route Target extended communities (RFC 4360) to identify VPLS membership. A PE announces membership in VPLS V by annotating its NLRIs with Route Target RT, and withdraws all such NLRIs to leave the VPLS.
section: 3.1.2
topics:
    - bgp
    - mpls
