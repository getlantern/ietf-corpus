document: rfc-1903
kind: normative-requirement
summary: If the value of a StorageType object is permanent(4) or readOnly(5), it cannot be modified. Conversely, if the value is other(1), volatile(2), or nonVolatile(3), it cannot be modified to become permanent(4) or readOnly(5). Every usage of StorageType must specify which columnar objects a permanent row must minimally allow to be writable.
section: "2"
rfc2119_level: REQUIRED
topics:
    - snmp
