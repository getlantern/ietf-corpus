document: rfc-3831
kind: normative-requirement
summary: For IPv6, Exchanges MUST NOT transfer Sequence Initiative because they are used in unidirectional mode; the Sequence Initiative bit in F_CTL MUST be set to 0. Each Nx_Port MUST have a dedicated Exchange for sending and receiving data to/from each peer.
section: "11"
rfc2119_level: MUST
topics:
    - ip
