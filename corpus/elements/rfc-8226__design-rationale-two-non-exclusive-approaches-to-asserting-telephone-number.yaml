document: rfc-8226
kind: design-rationale
summary: 'Two non-exclusive approaches to asserting telephone number authority in certificates are defined: using the certificate subject (domain name or SPC) with an external data set to correlate numbers, and embedding the TN Authorization List extension directly in the certificate. Either approach is compatible with the STIR over-the-wire format in RFC 8224.'
section: "3"
topics:
