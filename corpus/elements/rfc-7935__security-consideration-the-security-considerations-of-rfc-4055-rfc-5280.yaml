document: rfc-7935
kind: security-consideration
summary: The Security Considerations of RFC 4055, RFC 5280, and RFC 6487 apply to certificates and CRLs; those of RFC 2986, RFC 4211, and RFC 6487 apply to certification requests; and those of RFC 5754 apply to CMS signed objects. No new security threats are introduced by this specification.
