document: rfc-9673
kind: normative-requirement
summary: A Source creating packets with a Hop-by-Hop Options header SHOULD use a method that is robust to network nodes selectively processing only some options. Sources are motivated to order Hop-by-Hop options in decreasing order of importance for path processing.
section: "5.2"
rfc2119_level: SHOULD
