document: rfc-9248
kind: normative-requirement
summary: The RUE MUST register with a SIP registrar per RFC 3261 and RFC 5626. The Request-URI for REGISTER MUST contain the 'provider-domain' from configuration; To and From URIs MUST be identical. The DNS entry MUST contain NAPTR records per RFC 3263, and one MUST specify TLS as preferred transport. RFC 8760 MUST be supported and SHA-512 digest algorithms MUST be supported.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
