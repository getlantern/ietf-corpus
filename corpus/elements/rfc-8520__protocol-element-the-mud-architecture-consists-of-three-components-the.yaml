document: rfc-8520
kind: protocol-element
summary: 'The MUD architecture consists of three components: the Thing emitting a MUD URL, the MUD manager that fetches and processes the MUD file, and the MUD file server (a web server run by or on behalf of the manufacturer). The MUD manager translates policy abstractions to device-specific network configuration and updates network elements.'
section: "1.8"
topics:
    - yang
    - routing
