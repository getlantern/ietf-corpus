document: rfc-2273
kind: design-rationale
summary: The term 'proxy' is deliberately narrowed in this document to mean only transparent forwarding of SNMP requests and notifications irrespective of the managed object types contained within them, as distinct from MIB aggregation or non-SNMP protocol translation. This avoids the historical confusion caused by the term covering multiple unrelated scenarios.
section: "1.5"
topics:
    - snmp
