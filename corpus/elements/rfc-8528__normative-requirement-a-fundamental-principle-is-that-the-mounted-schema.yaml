document: rfc-8528
kind: normative-requirement
summary: 'A fundamental principle is that the mounted schema operates within a ''mount jail'': all paths (leafrefs, instance-identifiers, XPath expressions, augment targets) within the mounted schema are interpreted with the mount point as the root node, and cannot refer to nodes outside the mount jail.'
section: "4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
