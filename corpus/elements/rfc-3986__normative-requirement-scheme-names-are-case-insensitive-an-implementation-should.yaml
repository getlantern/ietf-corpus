document: rfc-3986
kind: normative-requirement
summary: Scheme names are case-insensitive; an implementation SHOULD accept uppercase letters as equivalent to lowercase (e.g., "HTTP" as well as "http") for robustness but SHOULD produce only lowercase scheme names for consistency.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
