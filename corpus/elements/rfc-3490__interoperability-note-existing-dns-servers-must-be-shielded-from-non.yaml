document: rfc-3490
kind: interoperability-note
summary: Existing DNS servers must be shielded from non-ASCII IDN forms. All channels through which names enter a DNS server (master files, DNS update messages) predate IDNA and are IDN-unaware; requirement 2 ensures names are already in ASCII by the time they enter the server database.
section: "7"
topics:
