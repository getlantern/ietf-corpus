document: rfc-6946
kind: interoperability-note
summary: As of October 2012, most popular operating systems (FreeBSD 8.2+, Linux 3.0, OpenBSD-current, Solaris 11, Windows XP/Vista/7) generate atomic fragments in response to ICMPv6 PTB with MTU < 1280, but only Linux 3.0, NetBSD-current, OpenBSD-current, and Solaris 11 implement the isolated-processing specification from this document. FreeBSD and Windows implementations remain vulnerable.
section: A
topics:
