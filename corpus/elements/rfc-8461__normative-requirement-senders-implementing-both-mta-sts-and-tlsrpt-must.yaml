document: rfc-8461
kind: normative-requirement
summary: Senders implementing both MTA-STS and TLSRPT MUST NOT allow MTA-STS Policy validation to override a failing DANE validation. MTA-STS is designed not to interfere with DANE deployments when the two overlap.
section: "2"
rfc2119_level: MUST NOT
