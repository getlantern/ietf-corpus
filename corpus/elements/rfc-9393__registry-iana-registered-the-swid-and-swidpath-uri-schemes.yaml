document: rfc-9393
kind: registry
summary: IANA registered the 'swid' and 'swidpath' URI schemes (Section 6.6). The 'swid:' scheme is used in link href values to reference another SWID or CoSWID tag by tag-id; 'swidpath:' references a tag via an XPath query for compatibility with SWID.
