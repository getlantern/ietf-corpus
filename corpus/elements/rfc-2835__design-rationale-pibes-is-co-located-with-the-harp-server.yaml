document: rfc-2835
kind: design-rationale
summary: PIBES is co-located with the HARP server because this memo does not define a protocol for exchanging the valid HARP table between separate entities. A broadcast emulation server inherently limits broadcast bandwidth to (total_bandwidth)/(n+1) for n ports; this is adequate for RIP, OSPF, and NIS but cannot support high-bandwidth broadcast.
section: "7.4"
