document: rfc-3744
kind: interoperability-note
summary: DAV:acl-restrictions lets clients discover server ACL constraints before submitting an ACL request, avoiding predictable rejection. Servers may still return additional implementation-specific errors (e.g., DAV:ace-conflict) that DAV:acl-restrictions cannot fully capture.
section: "6"
topics:
    - security
