document: rfc-6096
kind: registry
summary: RFC 6096 establishes a per-chunk-type IANA registry for SCTP chunk flags, one registry table per chunk type. Initial registries are created for all chunk types defined in RFC 3758, RFC 4820, RFC 4960, RFC 4895, and RFC 5061.
