document: rfc-7614
kind: design-rationale
summary: RFC 3515's implicit subscription on REFER conflates subscription creation with request handling, making it impossible to negotiate SUBSCRIBE extensions (duration, Event header parameters) and complicating avoidance of SIP dialog reuse. This document removes the implicit subscription to resolve these problems.
section: "1"
topics:
    - sip
    - realtime
