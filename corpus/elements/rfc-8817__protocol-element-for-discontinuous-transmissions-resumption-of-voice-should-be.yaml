document: rfc-8817
kind: protocol-element
summary: For discontinuous transmissions, resumption of voice SHOULD be indicated by setting the RTP marker bit (M) to 1. SSRC sequence number gaps indicate lost packets for PLC, while abrupt RTP packet loss indicates intended silence. A MELPe comfort noise frame MAY be sent before ceasing transmission.
section: "5"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
