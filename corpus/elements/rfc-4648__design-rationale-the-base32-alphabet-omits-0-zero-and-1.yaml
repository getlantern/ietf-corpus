document: rfc-4648
kind: design-rationale
summary: The base32 alphabet omits '0' (zero) and '1' (one) to reduce human transcription errors, since '0'/'O' and '1'/'l'/'I' are easily confused. A lenient decoder may map '0' to 'O' and '1' to 'I' or 'L', but MUST NOT do so by default.
section: "3.4"
