document: rfc-9301
kind: design-rationale
summary: Map-Resolvers are specified to operate only in non-caching mode. While caching could improve performance, the document notes that cache management issues (staleness, consistency) would need to be resolved before caching could be reliable and practical; caching functionality is explicitly out of scope.
section: "4"
topics:
    - routing
