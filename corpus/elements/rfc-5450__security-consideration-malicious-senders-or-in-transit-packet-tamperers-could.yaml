document: rfc-5450
kind: security-consideration
summary: Malicious senders or in-transit packet tamperers could inject implausible offset values that confuse receivers or produce misleading jitter reports that in turn mislead the sender. Both sender and receiver should guard against denial-of-service or other problems arising from such manipulation.
section: "6"
topics:
