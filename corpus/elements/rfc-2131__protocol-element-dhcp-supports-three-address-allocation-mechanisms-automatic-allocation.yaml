document: rfc-2131
kind: protocol-element
summary: 'DHCP supports three address allocation mechanisms: automatic allocation (permanent assignment), dynamic allocation (time-limited lease allowing address reuse), and manual allocation (administrator-assigned address conveyed via DHCP). Dynamic allocation is the only mechanism enabling automatic reuse of addresses no longer needed.'
