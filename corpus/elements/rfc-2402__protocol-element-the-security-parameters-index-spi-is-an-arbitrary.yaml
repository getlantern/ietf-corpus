document: rfc-2402
kind: protocol-element
summary: The Security Parameters Index (SPI) is an arbitrary 32-bit value that, combined with the destination IP address and security protocol (AH), uniquely identifies the Security Association for a datagram. SPI values 1–255 are reserved by IANA; SPI 0 is reserved for local implementation-specific use.
section: "2.4"
topics:
