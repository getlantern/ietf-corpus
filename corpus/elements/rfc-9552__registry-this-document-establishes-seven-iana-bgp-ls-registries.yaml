document: rfc-9552
kind: registry
summary: 'This document establishes seven IANA BGP-LS registries: NLRI Types (Node=1, Link=2, IPv4 Prefix=3, IPv6 Prefix=4), Protocol-IDs (IS-IS L1/L2, OSPFv2/v3, Direct, Static), Well-Known Instance-IDs, Node Flags, MPLS Protocol Mask, IGP Prefix Flags, and BGP-LS TLVs (covering all TLV code points defined in the document).'
