document: rfc-5121
kind: normative-requirement
summary: The MaxRtrAdvInterval MUST be no less than 4 seconds and no greater than 21600 seconds. The default value for MaxRtrAdvInterval is 10800 seconds, overriding RFC 4861's recommendation.
