document: rfc-2734
kind: interoperability-note
summary: IPv4 over 1394 as specified may not operate correctly across IEEE P1394.1 Serial Bus bridges because node IDs are variable per enumerated bus and no standard cross-bridge ID mapping exists at the time of publication.
