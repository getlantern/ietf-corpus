document: rfc-9241
kind: security-consideration
summary: The uCDN (ALTO Client) MUST be authenticated to the dCDN (ALTO Server), and the dCDN MUST support HTTP Digest Authentication (RFC 7616) and MAY also support TLS mutual authentication (RFC 8446), as required by RFC 8008's integrity and authentication mandate for FCI implementations.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - tls
    - http
