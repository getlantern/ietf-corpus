document: rfc-8676
kind: security-consideration
summary: Read access to the binding table (/br-instances/binding/bind-instance/binding-table) and algorithm configuration (/br-instances/algorithm/algo-instance/) must be controlled, as these data nodes can be misused to track host activity. NACM (RFC 8341) is the recommended access control mechanism.
section: "9"
topics:
