document: rfc-5733
kind: normative-requirement
summary: When a server defers completion of a transform command for offline review, the server MUST return a 1001 response code, MUST manage the object status to reflect the pending action (e.g., pendingCreate), and MUST notify all involved clients via a service message when the action is completed.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
