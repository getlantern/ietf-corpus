document: rfc-6690
kind: protocol-element
summary: Query filtering on '/.well-known/core' follows the URI Template '/.well-known/core{?search*}'. The search variable is a name/value pair where value is either a Complete Value String (exact match) or a Prefix Value String ending in '*' (prefix match).
