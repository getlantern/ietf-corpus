document: rfc-3949
kind: protocol-element
summary: 'Page-quality fields for Profile F: BadFaxLines (tag 326, count of bad scanlines), CleanFaxData (tag 327, 0=none/1=regenerated/2=unregenerated), ConsecutiveBadFaxLines (tag 328, maximum consecutive bad lines). MUST NOT be written when no page-quality information is available or data is error-corrected.'
