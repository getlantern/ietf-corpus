document: rfc-7761
kind: normative-requirement
summary: If a router needs to send a Join/Prune or Assert message on an interface on which it has not yet sent a Hello message with the currently configured IP address, it MUST immediately send the relevant Hello message without waiting for the Hello Timer to expire, followed by the Join/Prune or Assert message.
section: 4.3.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
