document: rfc-6796
kind: protocol-element
summary: The <media-intermediaries> element defines an ordered chain of media intermediaries a UA must traverse for its media streams. A <media-intermediaries> element MUST contain one or more intermediary elements (e.g., <fixed-intermediary> or <turn-intermediary>) and SHOULD only contain intermediaries of the same type.
section: "4.4"
topics:
