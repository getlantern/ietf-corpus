document: rfc-5296
kind: protocol-element
summary: The keyName-NAI identifies the rIK used to protect an ERP message. The username part contains the EMSKname (64-bit value encoded as 128 hex octets), and the realm identifies the ER server domain. The realm is the home domain when using the home ER server, or the local domain name when using a local ER server.
section: "2"
topics:
