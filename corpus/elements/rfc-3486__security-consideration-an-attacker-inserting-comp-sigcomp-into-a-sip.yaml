document: rfc-3486
kind: security-consideration
summary: An attacker inserting comp=sigcomp into a SIP message could cause a SIP entity to send compressed messages to another entity that does not support SigComp. Appropriate integrity mechanisms should be used to prevent this attack.
section: "10"
topics:
    - sip
    - security
