document: rfc-2289
kind: normative-requirement
summary: All conforming implementations of both server and generators MUST support MD5. They SHOULD support SHA and MAY also support MD4. The generator and server must use the same algorithm to interoperate.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
