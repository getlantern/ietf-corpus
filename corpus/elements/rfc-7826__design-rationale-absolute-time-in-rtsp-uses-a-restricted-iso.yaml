document: rfc-7826
kind: design-rationale
summary: Absolute time in RTSP uses a restricted ISO 8601 format (YYYYMMDDThhmmssZ) rather than RFC 3339. This choice is historic — RTSP 2.0 retains the format from RTSP 1.0 to preserve continuity even though RFC 3339's motivations for choosing a subset of ISO 8601 also apply.
section: 4.4.3
topics:
    - realtime
