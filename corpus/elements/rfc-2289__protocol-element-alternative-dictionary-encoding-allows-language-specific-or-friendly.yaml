document: rfc-2289
kind: protocol-element
summary: 'Alternative dictionary encoding allows language-specific or friendly words where each word W at position N obeys: hash(W) % 2048 == N. The server decodes without needing the specific alternate dictionary, making acceptance of one alternate dictionary imply acceptance of all.'
