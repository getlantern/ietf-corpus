kind: protocol-element
summary: The 'farv1_openidcConfiguration' data structure is returned in RDAP 'help' query responses and describes the server's OpenID Connect capabilities, including boolean flags for sessionClientSupported, tokenClientSupported, dntSupported, providerDiscoverySupported, issuerIdentifierSupported, and implicitTokenRefreshSupported, plus an optional list of supported OPs.
