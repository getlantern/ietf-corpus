document: rfc-9815
kind: interoperability-note
summary: AS_PATH and AS4_PATH attributes are preserved and used for loop detection even though BGP-LS-SPF replaces the standard Decision Process. Attributes such as ORIGIN, MULTI_EXIT_DISC, LOCAL_PREF, and the MP_REACH_NLRI Next-Hop are ignored during SPF computation.
