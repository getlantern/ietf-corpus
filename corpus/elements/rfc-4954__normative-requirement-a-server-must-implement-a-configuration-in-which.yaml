document: rfc-4954
kind: normative-requirement
summary: A server MUST implement a configuration in which plaintext password mechanisms are not permitted unless STARTTLS or an equivalent protection against password snooping has been negotiated. Server sites SHOULD NOT permit plaintext password mechanisms without such protection.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
    - tls
