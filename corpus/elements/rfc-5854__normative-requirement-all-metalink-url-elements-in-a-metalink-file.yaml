document: rfc-5854
kind: normative-requirement
summary: All metalink:url elements in a metalink:file SHOULD lead to identical files as alternative download locations. Metalink:metaurl elements SHOULD provide metadata to retrieve the same file via another mechanism such as a P2P network.
section: 4.1.2
rfc2119_level: SHOULD
