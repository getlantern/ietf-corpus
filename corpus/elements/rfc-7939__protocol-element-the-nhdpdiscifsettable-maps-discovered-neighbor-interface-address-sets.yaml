document: rfc-7939
kind: protocol-element
summary: The nhdpDiscIfSetTable maps discovered neighbor interface address sets to locally assigned NeighborIfIndex and NeighborRouterIndex values. Each entry (INDEX { nhdpDiscIfSetIndex }) records address type, InetAddress (4 or 16 bytes), and prefix length for one address of the neighbor interface.
