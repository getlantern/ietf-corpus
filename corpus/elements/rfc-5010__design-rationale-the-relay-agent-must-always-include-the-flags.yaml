document: rfc-5010
kind: design-rationale
summary: The relay agent MUST always include the Flags Suboption in every relay-agent-information-option so the DHCP server can distinguish a relay agent that supports this suboption (and received a unicast packet) from one that does not support the suboption at all. Without this, absence of the suboption would be ambiguous.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
