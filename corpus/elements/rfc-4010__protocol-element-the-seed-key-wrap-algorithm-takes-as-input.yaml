document: rfc-4010
kind: protocol-element
summary: The SEED key wrap algorithm takes as input a KEK K and n 64-bit plaintext key data blocks {P[1]..P[n]}, and produces (n+1) 64-bit ciphertext blocks {C[0]..C[n]}, performing s=6n encryption steps using SEED in a Feistel-style integrity-preserving wrap.
section: "3.2"
topics:
