document: rfc-822
kind: design-rationale
summary: Extension-fields are explicitly prohibited from using names beginning with 'X-', reserving that prefix exclusively for user-defined fields. This ensures users have a protected namespace that will never be preempted by formally published extensions.
section: 4.7.4
