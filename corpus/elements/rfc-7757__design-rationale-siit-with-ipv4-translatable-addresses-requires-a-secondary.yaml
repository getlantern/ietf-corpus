document: rfc-7757
kind: design-rationale
summary: SIIT with IPv4-translatable addresses requires a secondary address 'stack' that creates routing complexity, operational complexity, and restricted address formats incompatible with EUI-64-based autoconfiguration. EAMs remove the constraint that IPv6 nodes communicating via SIIT must use IPv4-translatable addresses.
section: "2"
topics:
