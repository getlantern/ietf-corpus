document: rfc-9857
kind: design-rationale
summary: The SR Binding SID TLV (Type 1201) was deprecated for SRv6 use because it cannot carry SRv6 Endpoint behavior or SID structure information; the dedicated SRv6 Binding SID TLV (Type 1212) with sub-TLV support was introduced instead to handle these SRv6-specific attributes.
