document: rfc-4760
kind: design-rationale
summary: MP_REACH_NLRI and MP_UNREACH_NLRI are defined as optional non-transitive attributes to provide backward compatibility, so that BGP speakers not supporting multiprotocol extensions will silently ignore these attributes rather than propagating or rejecting them.
