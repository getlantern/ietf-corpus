document: rfc-5063
kind: security-consideration
summary: If an RSVP agent restarts due to external attack, neighboring agents incur additional processing overhead for RecoveryPath handling, potentially impairing their other control plane functions. This impact can be minimized by advertising a large enough Recovery Time, spreading RecoveryPath message transmission across the recovery interval.
section: "6"
topics:
    - security
    - routing
