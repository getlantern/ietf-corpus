document: rfc-8976
kind: interoperability-note
summary: ZONEMD is OPTIONAL to implement by both publishers and consumers of zone data. A verifier receiving a zone with multiple ZONEMD RRs MAY ignore a record whose Scheme or Hash Algorithm violates local policy; a match on any one supported tuple is sufficient for successful verification.
section: 1, 4
topics:
    - dns
