document: rfc-8635
kind: normative-requirement
summary: All key pairs MUST be generated from a good source of non-deterministic random input per RFC 4086. Mistakes in key-pair generation are for all practical purposes catastrophic because PKIs rely on the pairing of a difficult-to-generate public-private key pair with a signer.
section: "11"
rfc2119_level: MUST
topics:
    - bgp
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
