kind: wire-format
summary: A Framing Header encapsulates RELOAD messages at each overlay link hop, supporting per-hop reliability, congestion control, and flow control. It has meaning only in the context of a single link and is used with both DTLS/UDP and TLS/TCP overlay link protocols.
