document: rfc-8834
kind: interoperability-note
summary: A significant number of legacy RTP implementations, especially VoIP-only systems, do not support all required RTCP features and in some cases do not support RTCP at all. Implementers must consider graceful degradation requirements when interoperating with such legacy systems.
section: "4.1"
topics:
