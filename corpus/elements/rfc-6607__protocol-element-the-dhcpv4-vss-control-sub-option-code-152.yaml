document: rfc-6607
kind: protocol-element
summary: The DHCPv4 VSS-Control sub-option (code 152) is a zero-length sub-option carried in the Relay Agent Information option. In a request it signals that a VSS sub-option is present; in a reply its presence indicates the DHCPv4 server did not understand or act on the VSS sub-option.
section: "3.3"
topics:
