document: rfc-9302
kind: normative-requirement
summary: If an ETR receives LISP-encapsulated packets with the V-bit set but the authoritative mapping in its EID-to-RLOC Database has the Null Map-Version, those packets MUST be silently dropped.
section: "6.1"
rfc2119_level: MUST
topics:
