document: rfc-6134
kind: security-consideration
summary: Protocols and APIs used to retrieve or verify external list membership MUST provide an appropriate level of confidentiality and authentication, at least equivalent to those used to retrieve Sieve scripts. The appropriate level depends on context (open Internet vs. closed LAN) and whether the list is private or public.
section: "3"
topics:
    - email
    - security
    - crypto
