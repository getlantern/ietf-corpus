document: rfc-5420
kind: security-consideration
summary: LSP attribute signaling in the new objects may expose functional preferences or administrative details about an LSP to anyone with unauthorized access to the signaling messages. This confidentiality concern is not introduced by this document and can only be satisfactorily addressed by encrypting signaling message content.
section: "12"
topics:
