document: rfc-8250
kind: security-consideration
summary: PDM timing data passes in the clear and can be used to fingerprint end hosts (e.g., inferring device speed from delta patterns) or potentially to infer the type of application in use by correlating server processing time with payload length. Encryption algorithms may wish to obfuscate server time in addition to packet length.
section: "4.2"
topics:
    - ip
    - security
    - privacy
    - measurement
