document: rfc-6313
kind: normative-requirement
summary: Templates that are no longer used SHOULD be deleted via a Template Withdrawal Message. A deleted Template MUST NOT be used in subTemplateList or subTemplateMultiList, and a Template ID MUST be deleted before it can be reused.
section: "6"
rfc2119_level: MUST
topics:
