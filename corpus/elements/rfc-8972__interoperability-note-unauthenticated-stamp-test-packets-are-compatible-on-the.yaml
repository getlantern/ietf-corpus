document: rfc-8972
kind: interoperability-note
summary: Unauthenticated STAMP test packets are compatible on the wire with unauthenticated TWAMP-Test (RFC 5357) packets. A Session-Reflector that does not support STAMP extensions will copy TLVs into the reflected packet without processing them, as defined in RFC 8762 Section 4.3.
