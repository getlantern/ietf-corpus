document: rfc-5192
kind: protocol-element
summary: The PAA DHCPv4 option (OPTION_PANA_AGENT, code 136) carries a list of 32-bit binary IPv4 addresses indicating PANA Authentication Agents available to the PANA client. The option-length field MUST be a multiple of four octets. PAAs are listed in order of preference.
