document: rfc-1191
kind: normative-requirement
summary: A host MUST NOT increase its estimate of the Path MTU in response to a Datagram Too Big message, as the message might be stale, forged as a denial-of-service attack, or the result of multiple paths to the destination.
section: "3"
rfc2119_level: MUST NOT
