document: rfc-3454
kind: interoperability-note
summary: When two protocols using different profiles of stringprep interoperate, there may be conflict about which characters are allowed in the final string. Protocol developers are strongly encouraged to re-use existing registered profiles rather than creating new ones.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
