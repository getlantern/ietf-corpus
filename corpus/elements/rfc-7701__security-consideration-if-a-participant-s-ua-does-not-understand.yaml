document: rfc-7701
kind: security-consideration
summary: If a participant's UA does not understand the 'isfocus' feature tag or the Message/CPIM procedures, it may unknowingly send messages that are forwarded to all chat room participants or as unintended private messages. The MSRP switch SHOULD send a notification message to non-chat-room-aware UAs informing them they are in a multi-party chat.
section: "11"
topics:
    - security
    - sip
    - realtime
