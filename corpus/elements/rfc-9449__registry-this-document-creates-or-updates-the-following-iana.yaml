summary: 'This document creates or updates the following IANA registries: OAuth Access Token Types (DPoP), OAuth Extensions Errors (invalid_dpop_proof, use_dpop_nonce), OAuth Parameters (dpop_jkt), HTTP Authentication Schemes (DPoP), Media Types (application/dpop+jwt), JWT Confirmation Methods (jkt), JWT Claims (htm, htu, ath; nonce updated), HTTP Field Names (DPoP, DPoP-Nonce), OAuth Authorization Server Metadata (dpop_signing_alg_values_supported), and OAuth Dynamic Client Registration Metadata (dpop_bound_access_tokens).'
