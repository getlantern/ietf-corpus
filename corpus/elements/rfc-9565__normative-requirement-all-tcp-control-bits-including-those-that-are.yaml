document: rfc-9565
kind: normative-requirement
summary: All TCP control bits, including those that are currently unassigned, MUST be exported as observed in the TCP headers of the packets of a Flow. This stronger requirement replaces the weaker language in RFC 7125.
section: "3"
rfc2119_level: MUST
