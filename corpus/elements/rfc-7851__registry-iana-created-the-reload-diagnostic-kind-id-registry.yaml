document: rfc-7851
kind: registry
summary: IANA created the 'RELOAD Diagnostic Kind ID' registry under RELOAD, containing 16-bit integers for diagnostic extension data kinds. Codes 0x0001-0x0010 correspond to the base diagnostics, 0xf000-0xfffe are reserved for local/overlay-specific use without IANA registration, and new entries require Standards Action.
section: "9.2"
topics:
