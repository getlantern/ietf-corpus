document: rfc-6810
kind: wire-format
summary: 'End of Data PDU (Type 7): 12-byte message containing Protocol Version (8-bit), PDU Type (8-bit), Session ID (16-bit), Length (32-bit, value 12), and Serial Number (32-bit). The Session ID MUST be the same as that of the corresponding Cache Response that began the sequence.'
section: "5.8"
