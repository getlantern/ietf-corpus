document: rfc-3301
kind: design-rationale
summary: The Service Name AVP (inspired by ATM Forum Auto-PVC procedures) was introduced to allow PVC binding via a textual name when no NSAP address is available (Called Number all zeros), accommodating deployments where PVCs are identified administratively rather than by address.
