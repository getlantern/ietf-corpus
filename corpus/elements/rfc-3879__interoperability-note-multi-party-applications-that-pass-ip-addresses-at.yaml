document: rfc-3879
kind: interoperability-note
summary: Multi-party applications that pass IP addresses at the application layer cannot safely use site-local addresses because they have no way of knowing where those addresses will eventually be forwarded, potentially causing connections to wrong nodes or unexpected failures.
section: "2.2"
topics:
