document: rfc-9175
kind: security-consideration
summary: A random unique Echo option value SHOULD contain at least 64 pseudorandom bits unpredictable to any party other than the server, providing security equivalent to a 64-bit MAC. Guessable Echo values (based on small random numbers or counters) are only permissible in the narrow set of cases described in Section 2.5.2 where the client is the sole authority.
section: "5"
topics:
    - security
    - crypto
