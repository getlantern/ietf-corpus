document: rfc-9796
kind: security-consideration
summary: Revealing information such as name, location, and affiliation in RCD entails privacy risks. Transport-level security can protect Call-Info and jCard data from eavesdroppers. RCD information should generally be considered public as this specification defines no confidentiality mechanism beyond SIP signaling itself.
section: "13"
topics:
    - sip
    - security
    - privacy
