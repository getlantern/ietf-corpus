document: rfc-7510
kind: normative-requirement
summary: Where MPLS-in-UDP carries congestion-controlled IP traffic, the tunnels MAY be used within a single network or across cooperating networks. Where MPLS traffic is not congestion controlled, tunnels MUST only be used within a single operator's carefully provisioned network or among closely cooperating operators.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
