document: rfc-3546
kind: security-consideration
summary: If a client requires OCSP validation of server certificates, it SHOULD either contact the OCSP server directly or abort the handshake when the server pretends not to support the status_request extension, since a compromised server would likely suppress the extension.
section: "6.6"
topics:
    - tls
    - pkix
    - security
