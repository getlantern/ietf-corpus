document: rfc-6505
kind: design-rationale
summary: Personalized video mixes, floor control protocol support, video overlays, and text insertion are explicitly out of scope. These can be addressed by extensions (foreign namespace elements/attributes) or separate Control Packages that build on this one, keeping the base package focused on core mixing.
