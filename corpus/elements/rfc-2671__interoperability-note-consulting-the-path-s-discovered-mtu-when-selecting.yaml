document: rfc-2671
kind: interoperability-note
summary: Consulting the path's discovered MTU when selecting the advertised UDP payload size is advised for both requestors and responders. Choosing a size too large may result in an ICMP message from an intermediate gateway or a silent drop of the response.
section: 4.5.2
topics:
