summary: Processing Segments Left and the original datagram's IPv6 Hop Limit in the tunneled case is designed so that ICMPv6 Time Exceeded errors behave as they would on traditional IPv6 networks that forward datagrams without tunneling, preserving expected network diagnostic behavior.
