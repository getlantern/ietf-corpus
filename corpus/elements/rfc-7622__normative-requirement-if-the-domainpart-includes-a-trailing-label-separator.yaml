document: rfc-7622
kind: normative-requirement
summary: If the domainpart includes a trailing label separator (dot) as defined in RFC 1034, this character MUST be stripped from the domainpart before the JID is used for routing, comparison, or constructing an XMPP URI/IRI, and MUST be stripped before any other canonicalization steps.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
