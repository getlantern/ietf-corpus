document: rfc-8987
kind: design-rationale
summary: Delegating relays have been observed dropping Solicit messages when a new client appears on a port that already has an active PD lease, requiring a Release or lease timeout before forwarding resumes; requirement G-1 directly addresses this to support device replacement scenarios.
