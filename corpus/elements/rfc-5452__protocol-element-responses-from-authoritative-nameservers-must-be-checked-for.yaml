document: rfc-5452
kind: protocol-element
summary: 'Responses from authoritative nameservers must be checked for in-domain validity: data should only be accepted if the originating server is authoritative for the QNAME or a parent of the QNAME. One approach is to only accept data that is part of the domain for which the query was intended.'
section: "6"
topics:
    - dns
    - security
