document: rfc-8315
kind: registry
summary: 'This document establishes the "Netnews Cancel-Lock Hash Algorithms" registry at IANA (under netnews-parameters), with a First Come First Served registration policy. Initial entries are: md5 (OBSOLETE), sha1 (LIMITED USE, backward compatibility), sha224 (LIMITED USE), sha256 (COMMON, mandatory), sha384 (LIMITED USE), sha512 (COMMON, optional). Algorithm registrations MUST NOT be deleted; obsolete ones are marked OBSOLETE.'
section: "8.3"
topics:
    - registry
    - security
    - crypto
