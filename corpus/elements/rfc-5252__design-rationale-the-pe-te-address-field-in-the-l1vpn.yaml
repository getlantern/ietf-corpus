document: rfc-5252
kind: design-rationale
summary: The PE TE Address field in the L1VPN Info TLV must match a valid PE TE Router ID or numbered TE Link ID so that CEs attached to this PE can be resolved in the Traffic Engineering Database (TED), enabling computation of TE paths toward the CEs across the provider domain.
section: "3.1"
topics:
    - routing
    - vpn
