document: rfc-7616
kind: normative-requirement
summary: Sending both username and username* in the same Authorization header field MUST be treated as an error. The username* parameter (RFC 5987 extended notation) is used only when userhash is false and the username contains characters not allowed in a quoted-string.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
