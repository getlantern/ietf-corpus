summary: 'The IPv6 fixed header is 40 octets: Version (4-bit, value 6), Prio (4-bit priority), Flow Label (24-bit), Payload Length (16-bit unsigned, length of payload excluding IPv6 header; zero if Jumbo Payload option is used), Next Header (8-bit), Hop Limit (8-bit unsigned), Source Address (128-bit), and Destination Address (128-bit).'
