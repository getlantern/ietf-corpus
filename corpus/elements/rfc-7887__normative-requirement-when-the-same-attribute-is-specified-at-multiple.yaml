document: rfc-7887
kind: normative-requirement
summary: When the same attribute is specified at multiple levels, the most specific level overrides other instances. The complete attribute set is formed before processing, so even an invalid value at the most specific level overrides valid values at higher levels.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
