document: rfc-8691
kind: privacy-consideration
summary: Embedding a MAC address in an IPv6 Interface Identifier exposes company ID information encoded in OUI bits; attackers can capture Router Advertisements and correlate source addresses with physical observations (e.g., car color) to build persistent profiles of vehicles.
section: 5.1.1
topics:
    - privacy
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
