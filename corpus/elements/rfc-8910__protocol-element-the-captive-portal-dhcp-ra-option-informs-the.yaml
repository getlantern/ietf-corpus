document: rfc-8910
kind: protocol-element
summary: The Captive-Portal DHCP/RA option informs the client that it may be behind a captive portal and provides the URI to access the Captive Portal API as defined by RFC 8908. It is defined for DHCPv4 (option 114), DHCPv6 (option 103), and IPv6 RA (type 37).
section: "2"
