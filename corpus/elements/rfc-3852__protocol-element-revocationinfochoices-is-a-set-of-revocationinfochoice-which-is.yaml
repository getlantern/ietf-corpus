document: rfc-3852
kind: protocol-element
summary: RevocationInfoChoices is a SET OF RevocationInfoChoice, which is a CHOICE between a CertificateList (CRL) and OtherRevocationInfoFormat (OID plus ANY value). This extension mechanism allows OCSP responses and other revocation formats to be carried in CMS structures without modifying the CMS specification.
section: 10.2.1
topics:
