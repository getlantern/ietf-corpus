summary: 'The (E) bit at position 10 indicates a Local PSN-facing PW egress Transmit Fault: a fault has occurred in the transmit direction between the local endpoint and the remote L2TP endpoint. Such a fault does not necessarily trigger an L2TP control connection timeout.'
