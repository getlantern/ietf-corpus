document: rfc-7856
kind: interoperability-note
summary: For IPv4-over-IPv6 tunnels, ifInUcastPkts counts IPv6 packets delivered to the virtual interface for decapsulation; ifOutUcastPkts counts IPv6 packets generated by encapsulation, with post-fragmentation counting when fragmentation occurs.
