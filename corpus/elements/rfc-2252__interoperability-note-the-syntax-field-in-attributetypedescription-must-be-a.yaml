document: rfc-2252
kind: interoperability-note
summary: The syntax field in AttributeTypeDescription must be a string representation of an OID for the LDAP string syntax definition, plus an optional maximum length indicator in curly braces (e.g., '1.3.6.4.1.1466.0{64}'). The bound is a suggestion to implementations and is not part of the syntax name itself.
section: 4.3.2
topics:
    - ldap
