summary: 'EnhancedJWTClaimConstraints is an ASN.1 SEQUENCE with three optional context-tagged components: mustInclude [0] JWTClaimNames, permittedValues [1] JWTClaimValuesList, and mustExclude [2] JWTClaimNames. At least one component MUST be present (enforced by WITH COMPONENTS constraint). JWTClaimName is encoded as IA5String; permitted values are UTF8String.'
