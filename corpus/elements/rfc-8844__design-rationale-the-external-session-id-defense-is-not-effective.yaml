document: rfc-8844
kind: design-rationale
summary: The 'external_session_id' defense is not effective if an attacker can rewrite 'tls-id' values in signaling; only the 'external_id_hash' mechanism can defend against an attacker that compromises session integrity. The two extensions address different threat models and are intended to be used together.
section: "4.3"
