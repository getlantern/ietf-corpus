document: rfc-860
kind: design-rationale
summary: The option exists so that a user or process can be assured that previously transmitted data has been completely processed, printed, discarded, or otherwise disposed of. Even if the option request is refused with WON'T, the requester is at least assured that the refuser has received (if not processed) all previous data.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
