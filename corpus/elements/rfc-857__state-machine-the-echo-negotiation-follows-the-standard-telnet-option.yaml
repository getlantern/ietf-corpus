document: rfc-857
kind: state-machine
summary: 'The echo negotiation follows the standard TELNET option negotiation state machine: a party sends WILL ECHO or DO ECHO to request echo mode; if accepted the connection enters echo mode; either party may revert by sending DON''T ECHO or WON''T ECHO which the other must confirm. Each direction of the connection is negotiated independently.'
section: "5"
