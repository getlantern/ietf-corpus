document: rfc-6536
kind: normative-requirement
summary: If a datastore is accessed directly or as a side effect of a protocol operation, the server MUST intercept the access operation and verify the user is authorized to perform the requested CRUDX operation on the specified data node as defined in the data node access validation procedure.
section: 3.4.4
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
