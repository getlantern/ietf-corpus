document: rfc-5340
kind: normative-requirement
summary: Link-local addresses MUST NOT be advertised in inter-area-prefix-LSAs, AS-external-LSAs, NSSA-LSAs, or intra-area-prefix-LSAs. Link-local addresses only appear in link-LSAs.
section: "2.5"
rfc2119_level: MUST NOT
