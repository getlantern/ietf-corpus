document: rfc-5322
kind: protocol-element
summary: 'The group address construct allows a named group of zero or more mailboxes: a display-name, followed by a colon, a comma-separated mailbox-list (possibly empty), and a semicolon. This can also be used to indicate a named recipient set without revealing individual mailbox addresses.'
section: "3.4"
topics:
    - email
