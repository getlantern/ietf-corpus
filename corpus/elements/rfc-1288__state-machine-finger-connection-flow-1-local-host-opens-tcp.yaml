document: rfc-1288
kind: state-machine
summary: 'Finger connection flow: (1) local host opens TCP connection to port 79 on remote host; (2) RUIP processes the one-line query; (3) RUIP returns answer then initiates TCP close; (4) local host receives answer and close signal, then closes its end. The RUIP initiates close, not the client.'
section: "2.1"
