document: rfc-3229
kind: wire-format
summary: An instance-manipulation value is encoded as "token [imparams]", where imparams is a semicolon-delimited parameter whose name (imparam-name) must not be "q"; the A-IM header extends this with an optional ";q=qvalue" quality preference.
