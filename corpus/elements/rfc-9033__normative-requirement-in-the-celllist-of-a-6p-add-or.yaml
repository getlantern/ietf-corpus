document: rfc-9033
kind: normative-requirement
summary: In the CellList of a 6P ADD or RELOCATE command, each cell MUST have a unique slotOffset, the node MUST NOT already have a scheduled cell at that slotOffset, and the slotOffset MUST NOT equal the minimal cell's slotOffset (0). The CellList is RECOMMENDED to contain five or more cells.
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
