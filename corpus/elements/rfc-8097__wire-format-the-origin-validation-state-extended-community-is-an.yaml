document: rfc-8097
kind: wire-format
summary: The origin validation state extended community is an 8-octet opaque extended community. The first octet is 0x43 (non-transitive type), the second is 0x00 (sub-type assigned by IANA), octets 3-7 are Reserved (MUST be zero), and the last octet is an unsigned integer encoding the validation state (0=valid, 1=not found, 2=invalid).
section: "2"
