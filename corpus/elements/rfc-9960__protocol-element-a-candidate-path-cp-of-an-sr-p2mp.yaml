document: rfc-9960
kind: protocol-element
summary: A Candidate Path (CP) of an SR P2MP Policy is uniquely identified by the tuple <Protocol-Origin, Originator, Discriminator> as specified in RFC 9256. The active CP is selected by the Root node using tiebreaking rules from Section 2.9 of RFC 9256.
