document: rfc-2082
kind: wire-format
summary: 'The RIP-2 authentication header when using Keyed Message Digest (type 3) reuses the 16-byte authentication password field to encode: a 16-bit packet offset to the digest, an 8-bit Key ID, an 8-bit Authentication Data Length, and a 32-bit non-decreasing sequence number, followed by two reserved zero 32-bit words.'
section: "3.1"
topics:
    - routing
    - crypto
    - security
