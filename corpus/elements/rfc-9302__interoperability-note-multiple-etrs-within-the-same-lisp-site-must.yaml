document: rfc-9302
kind: interoperability-note
summary: Multiple ETRs within the same LISP site must advertise identical mappings including the same Map-Version number; inconsistent version numbers across ETRs cause additional control traffic, instabilities, and traffic disruptions. No new synchronization mechanism is defined; consistent configuration is assumed.
section: "9"
topics:
    - routing
