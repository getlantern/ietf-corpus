document: rfc-9685
kind: normative-requirement
summary: The RPL router that merges multiple anycast or multicast advertisements MUST use and advertise the longest remaining lifetime across all origins. When the lifetime expires, it sends a no-path DAO using the same ROVR value.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
