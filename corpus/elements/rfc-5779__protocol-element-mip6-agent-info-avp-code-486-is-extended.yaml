document: rfc-5779
kind: protocol-element
summary: MIP6-Agent-Info (AVP Code 486) is extended with the new PMIP6-IPv4-Home-Address sub-AVP to carry IPv4-MN-HoA alongside LMA addressing information and MN-HNP. If MIP-Home-Agent-Address is set to all zeroes (0::0), the receiver MUST ignore that sub-AVP.
section: "5.1"
topics:
    - diameter
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
