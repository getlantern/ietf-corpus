document: rfc-2252
kind: wire-format
summary: Directory String (OID 1.3.6.1.4.1.1466.115.121.1.15) is encoded in the UTF-8 form of ISO 10646. PrintableString is encoded as-is; TeletexString is transliterated to UniversalString then UTF-8; UniversalString and BMPString are encoded directly in UTF-8. The form is not indicated in protocol unless carried in binary.
