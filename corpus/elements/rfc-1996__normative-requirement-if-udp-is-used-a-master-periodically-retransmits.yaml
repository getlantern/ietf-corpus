document: rfc-1996
kind: normative-requirement
summary: If UDP is used, a master periodically retransmits NOTIFY requests until a timeout occurs, an ICMP port-unreachable is received, or a matching NOTIFY response is received. The response must match on query ID, QNAME, IP source address, and UDP source port.
section: "3.6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
