document: rfc-9848
kind: interoperability-note
summary: HTTP clients implementing both HTTP Alt-Svc and HTTPS records can use them together, provided connection attempts are "consistent" with both parameter sets. A connection using ECH is considered consistent with an Alt-Svc field value that does not mention ECH, as no ECH parameter is defined for Alt-Svc.
section: "6"
topics:
