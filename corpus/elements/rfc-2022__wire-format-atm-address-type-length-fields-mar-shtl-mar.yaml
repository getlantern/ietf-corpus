document: rfc-2022
kind: wire-format
summary: 'ATM address type/length fields (mar$shtl, mar$sstl, mar$thtl, mar$tstl) are 8-bit fields coded as: bit 7 reserved (must be 0), bit 6 indicates address format (0 = ATM Forum NSAP, 1 = native E.164), bits 0–5 give the address length in octets. A zero length means the address is null and no space is allocated in the message.'
section: 5.1.2
topics:
    - multicast
