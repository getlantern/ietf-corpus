document: rfc-2821
kind: protocol-element
summary: RSET command aborts the current mail transaction; stored sender, recipients, and mail data MUST be discarded and all buffers cleared. The server MUST reply 250 OK. SMTP servers MUST NOT close the connection upon receiving RSET.
section: 4.1.1.5
topics:
    - email
