document: rfc-5102
kind: design-rationale
summary: For Information Elements derived from packet header fields where values may change packet-to-packet within a Flow, the model defines that their value is determined by the first packet observed for the Flow unless the IE description specifies otherwise. This allows header-derived IEs to be written once at flow start rather than updated per packet.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
