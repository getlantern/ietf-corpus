document: rfc-7232
kind: normative-requirement
summary: An origin server MUST NOT perform the requested method if If-None-Match evaluates to false; instead it MUST respond with 304 (Not Modified) if the request method is GET or HEAD, or 412 (Precondition Failed) for all other request methods.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
