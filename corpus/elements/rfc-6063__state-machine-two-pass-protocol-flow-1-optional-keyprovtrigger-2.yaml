document: rfc-6063
kind: state-machine
summary: 'Two-pass protocol flow: (1) optional KeyProvTrigger; (2) KeyProvClientHello carrying SAL, AD, R_C, and Key Protection Method List (KPML); (3) KeyProvServerFinished with K_PROV encrypted under the chosen key protection method. Server selects a key protection method from KPML and delivers K_PROV from which client derives K_TOKEN and K_MAC.'
section: "5.2"
topics:
