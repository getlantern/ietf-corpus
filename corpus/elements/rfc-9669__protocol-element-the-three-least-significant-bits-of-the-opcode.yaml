document: rfc-9669
kind: protocol-element
summary: 'The three least significant bits of the ''opcode'' field encode the instruction class: LD (0x0), LDX (0x1), ST (0x2), STX (0x3), ALU (0x4), JMP (0x5), JMP32 (0x6), ALU64 (0x7). ALU/JMP32 operate on 32-bit operands; ALU64/JMP on 64-bit.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
