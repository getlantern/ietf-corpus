document: rfc-3023
kind: normative-requirement
summary: If an application/xml entity is received with the charset parameter omitted, conforming XML processors MUST follow the requirements in section 4.3.3 of the XML specification to determine the charset. MIME processors that are not XML processors SHOULD NOT assume a default charset.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
