document: rfc-9326
kind: design-rationale
summary: The Checksum Complement IOAM-Data-Field bit in IOAM-Trace-Type SHOULD be zero for DEX because the Checksum Complement is intended for in-flight packet modifications and is not relevant for direct exporting where data is not written back into the forwarded packet.
section: "3.2"
topics:
    - measurement
