document: rfc-2954
kind: normative-requirement
summary: This MIB will NOT be implemented on user equipment (e.g., DTE); such devices use the Frame Relay DTE MIB (RFC 2115). Concentrators MAY use the Frame Relay Service MIB instead of the DTE MIB.
