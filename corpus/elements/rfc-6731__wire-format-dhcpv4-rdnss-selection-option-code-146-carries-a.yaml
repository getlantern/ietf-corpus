document: rfc-6731
kind: wire-format
summary: DHCPv4 RDNSS Selection option (code 146) carries a 1-byte code, 1-byte length, 1-byte Reserved+prf, a 4-byte primary RDNSS IPv4 address, a 4-byte secondary RDNSS IPv4 address (0.0.0.0 if absent), and a variable-length 'Domains and networks' field encoded per RFC 3315 Section 8.
section: "4.3"
