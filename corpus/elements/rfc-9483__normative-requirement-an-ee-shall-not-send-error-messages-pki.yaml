document: rfc-9483
kind: normative-requirement
summary: An EE SHALL NOT send error messages. PKI management entities SHALL NOT send error messages in the upstream direction. On other downstream error conditions the PKI management entity MUST report them as an error message downstream.
section: 3.6.1
rfc2119_level: MUST NOT
topics:
    - pkix
