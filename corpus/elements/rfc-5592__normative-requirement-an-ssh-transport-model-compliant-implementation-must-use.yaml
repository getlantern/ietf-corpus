document: rfc-5592
kind: normative-requirement
summary: An SSH Transport-Model-compliant implementation MUST use an SSH connection that provides authentication, data integrity, and encryption meeting the highest level of SNMP security (authPriv). Outgoing messages specified with noAuthNoPriv or authNoPriv are actually sent with authPriv-level protection.
section: 3.1.2
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
