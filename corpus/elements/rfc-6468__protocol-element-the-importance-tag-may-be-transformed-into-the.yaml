kind: protocol-element
summary: 'The '':importance'' tag MAY be transformed into the SIP ''Priority'' header field: importance ''1'' maps to ''urgent'', ''2'' to ''normal'', and ''3'' to ''non-urgent''. There is no mapping to the SIP value ''emergency''.'
