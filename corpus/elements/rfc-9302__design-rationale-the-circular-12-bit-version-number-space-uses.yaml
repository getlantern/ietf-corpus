document: rfc-9302
kind: design-rationale
summary: The circular 12-bit version number space uses serial number arithmetic (RFC 1982) so that exactly half the space (2048 values) is considered newer and the other half older than the current version. This enables unambiguous comparison and triggers the correct actions (discard vs. Map-Request) for stale and future versions.
