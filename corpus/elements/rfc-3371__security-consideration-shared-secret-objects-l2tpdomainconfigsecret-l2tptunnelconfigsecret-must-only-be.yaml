document: rfc-3371
kind: security-consideration
summary: Shared secret objects (l2tpDomainConfigSecret, l2tpTunnelConfigSecret) must only be accessible via SNMP messages with both authentication and privacy enabled, and agents must return an empty string to read requests to prevent key disclosure over the network.
section: "5.0"
topics:
    - snmp
    - vpn
    - security
    - crypto
