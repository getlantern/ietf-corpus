document: rfc-1757
kind: normative-requirement
summary: If a remote monitoring device implements a group, it must implement all objects in that group. All RMON groups are individually optional, but every implementation must also implement the system and interfaces groups of MIB-II.
section: "2.3"
rfc2119_level: MUST
topics:
    - snmp
