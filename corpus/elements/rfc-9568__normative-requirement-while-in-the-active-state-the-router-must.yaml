document: rfc-9568
kind: normative-requirement
summary: While in the Active state, the router MUST respond to ARP requests (IPv4) or ND Neighbor Solicitation messages with Router Flag set (IPv6), MUST forward packets with the Virtual Router MAC address as destination, and MUST accept packets addressed to Virtual Router IPvX addresses if it is the address owner or Accept_Mode is True.
section: 6.4.3
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
