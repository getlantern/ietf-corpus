document: rfc-8655
kind: protocol-element
summary: 'DetNet defines three node roles: DetNet edge node (source/destination at service sub-layer, analogous to LER/PE), DetNet relay node (interconnects different forwarding sub-layer paths, participates in service sub-layer), and DetNet transit node (operates at forwarding sub-layer only, e.g., MPLS LSR). Edge nodes may proxy service for DetNet-unaware end systems.'
section: 4.2.2
topics:
    - routing
    - mpls
