document: rfc-2834
kind: normative-requirement
summary: HARP table aging MUST be supported. A HARP client MUST invalidate table entries after 15 minutes. A HARP server MUST delete table entries after 20 minutes. The client MUST revalidate an aged entry prior to transmitting any non-address-resolution traffic to that port.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
