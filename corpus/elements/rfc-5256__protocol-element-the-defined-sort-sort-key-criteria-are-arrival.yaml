summary: 'The defined SORT sort-key criteria are: ARRIVAL (internal date), CC (first cc address mailbox), DATE (sent date), FROM (first From address mailbox), SIZE (message size in octets), SUBJECT (base subject text), and TO (first To address mailbox). REVERSE followed by another criterion reverses that criterion''s ordering.'
