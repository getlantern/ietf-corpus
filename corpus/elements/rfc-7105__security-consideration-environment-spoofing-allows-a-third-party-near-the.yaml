document: rfc-7105
kind: security-consideration
summary: Environment spoofing allows a third party near the Device to alter the measured physical environment (e.g., GNSS signal spoofing, radio signal amplification) so the Device unwittingly provides falsified measurement data, potentially causing the LIS to generate incorrect location information attributed to the LIS itself.
section: 7.1.6
topics:
    - security
