document: rfc-2674
kind: interoperability-note
summary: In devices supporting multiple Filtering Databases, dot1dTpFdbTable must report MAC addresses learned on each port regardless of which FDB they were learned in. If an address appears in multiple databases on a single port, it is reported only once.
section: 3.4.3.3
topics:
    - snmp
