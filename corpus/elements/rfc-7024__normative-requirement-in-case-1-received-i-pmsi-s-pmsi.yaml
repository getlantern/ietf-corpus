document: rfc-7024
kind: normative-requirement
summary: In Case 1 (received I-PMSI/S-PMSI A-D route carries the receiving V-hub's RT-VH), the V-hub MUST NOT forward traffic received on that P-tunnel to any other V-hubs or V-spokes, including its own associated V-spokes, preventing multicast duplication.
section: 7.8.1
rfc2119_level: MUST NOT
topics:
    - mpls
    - bgp
    - vpn
    - multicast
