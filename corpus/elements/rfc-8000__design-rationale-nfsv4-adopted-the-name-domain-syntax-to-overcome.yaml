document: rfc-8000
kind: design-rationale
summary: NFSv4 adopted the name@domain syntax to overcome the limitation of UNIX-centric numeric UIDs/GIDs (from NFSv3), which are not unique across deployments. The name@domain syntax provides Internet scaling by allowing translation between the external string form and local numeric identifiers, enabling multi-domain namespaces.
section: "1"
topics:
    - security
