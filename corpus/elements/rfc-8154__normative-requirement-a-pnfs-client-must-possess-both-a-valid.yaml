document: rfc-8154
kind: normative-requirement
summary: A pNFS client MUST possess both a valid open stateid and a valid layout stateid before issuing any SCSI I/O operation. I/O using anonymous or write-bypass stateids MUST NOT be done using the pNFS SCSI layout type.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
