document: rfc-6125
kind: normative-requirement
summary: The client MUST match the DNS domain name portion of a reference identifier using case-insensitive ASCII comparison per RFC 4343. For internationalized domain names, U-labels MUST be converted to A-labels before comparison, and A-labels MUST be compared as case-insensitive ASCII.
section: 6.4.1
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
