document: rfc-3156
kind: protocol-element
summary: 'The multipart/encrypted MIME body MUST consist of exactly two body parts: the first with content type "application/pgp-encrypted" containing a "Version: 1" control field, and the second with content type "application/octet-stream" containing the actual encrypted data.'
