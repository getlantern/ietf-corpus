document: rfc-8003
kind: security-consideration
summary: The registration extension relies entirely on HIP base exchange security (digital signatures, HMAC) and does not modify those properties. The only new threat is the creation of soft, time-limited registration state at the registrar, which registrars can cancel at any time to mitigate resource exhaustion.
section: "6"
topics:
