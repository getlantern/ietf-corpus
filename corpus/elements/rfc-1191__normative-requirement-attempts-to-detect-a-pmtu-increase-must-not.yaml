document: rfc-1191
kind: normative-requirement
summary: Attempts to detect a PMTU increase MUST NOT be done less than 5 minutes after a Datagram Too Big message has been received for the given destination, or less than 1 minute after a previous successful increase. Recommended timers are 10 minutes and 2 minutes respectively.
section: "3"
rfc2119_level: MUST NOT
