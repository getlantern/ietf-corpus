document: rfc-5287
kind: normative-requirement
summary: 'The R (RTP Header Usage) bit in TDM Options controls RTP header use: if cleared, Length MUST be 4; if set, Length MUST be 8 or 12. If a peer endpoint cannot meet the RTP requirement, the Label Mapping message MUST be rejected with the appropriate status code.'
section: "3.8"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
