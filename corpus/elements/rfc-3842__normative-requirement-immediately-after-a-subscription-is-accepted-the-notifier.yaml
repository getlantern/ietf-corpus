document: rfc-3842
kind: normative-requirement
summary: Immediately after a subscription is accepted, the Notifier MUST send a NOTIFY with the current message summary information for state resynchronization. This initial synchronization NOTIFY MUST NOT include optional RFC 2822 style message headers.
section: "3.8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
