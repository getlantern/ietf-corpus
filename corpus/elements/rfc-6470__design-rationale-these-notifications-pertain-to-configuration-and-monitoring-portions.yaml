document: rfc-6470
kind: design-rationale
summary: These notifications pertain to configuration and monitoring portions of the managed system, not the entire system. The scope is deliberately limited to events directly related to NETCONF protocol operation and management sessions, keeping the module focused and avoiding overlap with broader system event frameworks.
