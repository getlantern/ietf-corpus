document: rfc-6994
kind: normative-requirement
summary: Once a TCP option codepoint is assigned to a protocol, that protocol SHOULD NOT continue to use an ExID as part of that assigned codepoint, since the ExID would represent unnecessary overhead.
section: "5"
rfc2119_level: SHOULD NOT
