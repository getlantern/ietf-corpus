document: rfc-8841
kind: wire-format
summary: 'An ''m='' line using UDP/DTLS/SCTP or TCP/DTLS/SCTP takes the form: media=''application'', port=UDP or TCP port number, proto=''UDP/DTLS/SCTP'' or ''TCP/DTLS/SCTP'', fmt=a token identifying the association-usage (e.g., ''webrtc-datachannel''). Exactly one fmt value is permitted per such m= line.'
section: 4.4.2
topics:
    - sctp
    - webrtc
    - realtime
