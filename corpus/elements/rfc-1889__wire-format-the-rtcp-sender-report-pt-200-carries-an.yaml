document: rfc-1889
kind: wire-format
summary: 'The RTCP Sender Report (PT=200) carries an 8-octet header, a 20-octet sender info section (64-bit NTP wallclock timestamp, 32-bit RTP timestamp, 32-bit packet count, 32-bit octet count), and zero or more 24-octet reception report blocks each containing: fraction lost (8 bits), cumulative packets lost (24 bits), extended highest sequence number received (32 bits), interarrival jitter (32 bits), last SR timestamp LSR (32 bits), and delay since last SR DLSR (32 bits).'
section: 6.3.1
topics:
    - rtp
    - realtime
    - measurement
