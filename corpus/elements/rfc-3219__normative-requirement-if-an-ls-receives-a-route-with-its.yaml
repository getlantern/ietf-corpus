document: rfc-3219
kind: normative-requirement
summary: If an LS receives a route with its own ITAD number already present in the AdvertisementPath, the route MUST be discarded. This is the primary loop-prevention mechanism in TRIP.
section: 5.4.3
rfc2119_level: MUST
