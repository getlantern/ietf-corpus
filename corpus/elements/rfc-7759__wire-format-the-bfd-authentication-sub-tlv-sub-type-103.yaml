document: rfc-7759
kind: wire-format
summary: The BFD Authentication Sub-TLV (sub-type 103, Length 4) encodes an 8-bit Auth Type (same values as RFC 5880 Section 4.1), an 8-bit Auth Key ID, and 16 reserved bits set to zero. Simple Password SHOULD NOT be used if other authentication types are available.
section: 2.2.4
rfc2119_level: SHOULD NOT
