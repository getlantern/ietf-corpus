document: rfc-9862
kind: normative-requirement
summary: Candidate Paths within an SR Policy MUST NOT change their SR Policy Candidate Path Identifiers for the lifetime of the PCEP session, and two or more Candidate Paths within an SR Policy MUST NOT carry the same Candidate Path Identifiers. Violations trigger PCErr Error-Type=26, Error-value=21.
section: "4.2"
rfc2119_level: MUST NOT
topics:
