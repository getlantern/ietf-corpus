document: rfc-8512
kind: normative-requirement
summary: The NAT function SHOULD be able to assign port sets to optimize logging volume (REQ-14 of RFC 6888). The port-allocation-type leaf selects between single-port and port-range-allocation, and port-set-size specifies the number of ports per assignment.
section: "2.6"
rfc2119_level: SHOULD
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
