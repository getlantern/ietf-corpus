document: rfc-1661
kind: security-consideration
summary: PPP provides no inherent data confidentiality or integrity protection for user data. Authentication via PAP or CHAP is optional and negotiated during the Authentication phase; when authentication fails, the link SHOULD be terminated to prevent attack by repetition and denial of service to other users.
section: SECURITY CONSIDERATIONS
topics:
    - security
