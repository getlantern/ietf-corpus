document: rfc-6245
kind: normative-requirement
summary: When local policy allows the FA to override the 'G' bit and the MN has not requested GRE tunneling and is not using a co-located care-of address, the FA MUST include the GRE Key Extension in the RRQ forwarded to the HA. The presence of this extension takes precedence over the 'G' bit setting.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
