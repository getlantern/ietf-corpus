document: rfc-4352
kind: security-consideration
summary: The payload format has no built-in security mechanisms. RTP packets using this format are subject to general RTP security considerations; external mechanisms such as SRTP (RFC 3711) MAY be used for confidentiality, authentication, and integrity.
