document: rfc-7372
kind: protocol-element
summary: Status code X.7.22 indicates that a message contains passing DKIM signatures but none match the author address(es) in the From header field (no valid author-matched DKIM signature). This is a special case of X.7.21; associated basic status code is 550.
section: "3.1"
topics:
