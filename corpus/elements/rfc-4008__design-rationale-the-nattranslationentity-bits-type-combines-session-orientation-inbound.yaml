document: rfc-4008
kind: design-rationale
summary: The NatTranslationEntity BITS type combines session orientation (inbound/outbound) and endpoint role (source/destination) into a single object. This design choice captures the essential characteristic of an address map entry—determining which end-point of which direction of session is subject to translation—in a compact, composable bitmask that supports TwiceNAT (both source and destination translation) without separate objects.
