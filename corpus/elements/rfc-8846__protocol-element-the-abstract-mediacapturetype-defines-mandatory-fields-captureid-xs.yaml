document: rfc-8846
kind: protocol-element
summary: The abstract mediaCaptureType defines mandatory fields captureID (xs:ID), mediaType (xs:string), captureSceneIDREF (xs:IDREF), and a mutually exclusive choice between <spatialInformation> and <nonSpatiallyDefinable>. A second mutual exclusion separates MCC-specific fields (synchronizationID, content, policy, maxCaptures, allowSubsetChoice) from the <individual> boolean fixed to true.
section: "11"
