document: rfc-9258
kind: privacy-consideration
summary: ImportedIdentity.context is transmitted in cleartext on the wire as part of the PSK identity. Unless protected by a mechanism such as TLS Encrypted ClientHello, applications SHOULD NOT place sensitive information in this field.
section: "9"
rfc2119_level: SHOULD NOT
topics:
