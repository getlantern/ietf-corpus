document: rfc-8089
kind: protocol-element
summary: UNC filespace selector strings can be translated to file URIs by mapping hostname to the authority component and sharename+objectnames to the path, yielding URIs of the form "file://host.example.com/Share/path/to/file". Alternatively, UNC strings can be encoded entirely in the path, yielding forms like "file:////host.example.com/path/to/file".
section: E.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
