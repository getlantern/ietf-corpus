document: rfc-9772
kind: design-rationale
summary: A source-only IPv6 address from the Dummy IPv6 Prefix (100:0:0:1::/64) is used as the destination in the inner IP header to generate an exception and a reply message to the request, ensuring OAM packets are not forwarded beyond the receiving NVE.
