summary: 'Two reserved PARAMETERS bits are defined: bit 0 ''countsFragments'' indicates the probe correctly counts higher-layer protocols even when the encapsulating protocol fragments them; bit 1 ''tracksSessions'' indicates the probe correctly attributes packets for protocols that remap to dynamic ports (e.g., TFTP).'
