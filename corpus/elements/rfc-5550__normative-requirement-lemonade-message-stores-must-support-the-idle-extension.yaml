document: rfc-5550
kind: normative-requirement
summary: Lemonade Message Stores MUST support the IDLE extension, and IDLE responses MUST be sent in a timely manner when changes occur. Stores also MUST support NOTIFY to allow clients to request specific event types (message delivery, mailbox renames) for both the selected folder and others.
section: 5.4.1
rfc2119_level: MUST
topics:
    - email
