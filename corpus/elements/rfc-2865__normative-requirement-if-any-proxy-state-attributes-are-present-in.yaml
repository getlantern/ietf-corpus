document: rfc-2865
kind: normative-requirement
summary: If any Proxy-State attributes are present in an Access-Request, they MUST be copied unmodified and in order into the response packet. A forwarding server MUST treat Proxy-State attributes as opaque data and MUST NOT modify any Proxy-State attributes, nor change the order of attributes of the same type.
section: "2"
rfc2119_level: MUST
topics:
    - radius
    - security
