document: rfc-5302
kind: normative-requirement
summary: The up/down bit MUST NOT be set in L2 LSPs under the current two-level hierarchy. However, implementations are RECOMMENDED to ignore the up/down bit in L2 LSPs to allow simpler migration if IS-IS is ever extended with more than two levels of hierarchy.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
