document: rfc-2634
kind: normative-requirement
summary: Attributes contentReference, equivalentLabel, eSSSecurityLabel, and mlExpansionHistory MUST be carried in SignedAttributes or AuthAttributes and MUST NOT appear in UnsignedAttributes, UnauthAttributes, or UnprotectedAttributes. msgSigDigest, receiptRequest, and signingCertificate MUST be in SignedAttributes only.
section: 1.3.4
rfc2119_level: MUST
