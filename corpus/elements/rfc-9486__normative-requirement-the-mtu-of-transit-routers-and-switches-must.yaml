document: rfc-9486
kind: normative-requirement
summary: The MTU of transit routers and switches must be configured so that IOAM data addition does not trigger ICMP Packet Too Big errors. The PMTU tolerance range must be identified, and IOAM encapsulation operations must not exceed it.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
