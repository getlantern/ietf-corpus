kind: protocol-element
summary: 'TLS version identification in ClientHello: TLS 1.2 uses ''legacy_version'' 0x0303; TLS 1.3 uses ''legacy_version'' 0x0303 plus a ''supported_versions'' extension containing 0x0304. DTLS 1.2 uses 0xfefd; DTLS 1.3 uses 0xfefd plus ''supported_versions'' extension with 0x0304.'
