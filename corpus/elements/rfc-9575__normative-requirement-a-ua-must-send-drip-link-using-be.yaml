document: rfc-9575
kind: normative-requirement
summary: 'A UA MUST: send DRIP Link using BE: Apex, RAA at least once per 5 minutes; send DRIP Link using BE: RAA, HDA at least once per 5 minutes; send DRIP Link using BE: HDA, UA at least once per minute; and send any non-DRIP-Link DRIP Authentication Format with dynamically signed unique, unpredictable data at least once per 5 seconds.'
section: "6.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
