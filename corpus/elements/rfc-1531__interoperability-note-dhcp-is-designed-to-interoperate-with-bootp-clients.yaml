document: rfc-1531
kind: interoperability-note
summary: 'DHCP is designed to interoperate with BOOTP clients and relay agents: from a client''s perspective DHCP is an extension of BOOTP, existing BOOTP clients can interact with DHCP servers without modification, and DHCP must interoperate with BOOTP relay agent behavior as specified in RFC 951.'
