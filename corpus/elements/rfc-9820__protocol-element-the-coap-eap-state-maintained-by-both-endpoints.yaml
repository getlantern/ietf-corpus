document: rfc-9820
kind: protocol-element
summary: 'The CoAP-EAP state maintained by both endpoints includes: a reference to the EAP state machine instance, the resource URI for the next negotiation step, the exported MSK, and a reference to the OSCORE context. The EAP authenticator MAY delete the state via an OSCORE-protected DELETE command referencing the last resource.'
section: "3.4"
topics:
