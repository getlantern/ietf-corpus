document: rfc-5324
kind: security-consideration
summary: The T11-FC-SP-SA-MIB contains read-write objects governing SA negotiation proposals (acceptable transforms and DH groups) and notification rate-control parameters. Unauthorized weakening of acceptable transform sets could cause entities to negotiate weaker SAs; the document recommends SNMPv3 with authentication and privacy for all five FC-SP MIB modules.
section: "8.6"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
