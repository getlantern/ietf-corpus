document: rfc-8689
kind: normative-requirement
summary: Upon receipt of the REQUIRETLS MAIL FROM option, an SMTP server MUST tag that message as needing REQUIRETLS handling. If a REQUIRETLS MAIL FROM parameter is specified, the TLS-Required header field MUST be ignored (but MAY be included in onward relay).
section: "4.1"
rfc2119_level: MUST
topics:
    - email
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
