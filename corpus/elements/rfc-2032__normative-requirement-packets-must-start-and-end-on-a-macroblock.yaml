document: rfc-2032
kind: normative-requirement
summary: Packets must start and end on a macroblock (MB) boundary; a MB cannot be split across multiple packets. Multiple MBs may be carried in a single packet when they fit within the maximum packet size, and this practice is recommended to reduce packet send rate and overhead.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
