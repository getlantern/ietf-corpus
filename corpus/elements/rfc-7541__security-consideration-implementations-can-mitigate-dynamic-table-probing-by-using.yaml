document: rfc-7541
kind: security-consideration
summary: Implementations can mitigate dynamic table probing by using never-indexed literals for sensitive header fields such as Cookie or Authorization, and may heuristically stop indexing a field that receives a large number of different values, limiting an attacker's ability to confirm guesses.
section: 7.1.2
topics:
    - http
    - security
