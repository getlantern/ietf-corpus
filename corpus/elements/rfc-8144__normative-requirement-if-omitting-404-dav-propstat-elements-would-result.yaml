document: rfc-8144
kind: normative-requirement
summary: If omitting 404 DAV:propstat elements would result in a DAV:response containing zero DAV:propstat elements, the server MUST substitute either a DAV:propstat with empty DAV:prop and 200 OK status, or a DAV:status element of value 200 OK.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
