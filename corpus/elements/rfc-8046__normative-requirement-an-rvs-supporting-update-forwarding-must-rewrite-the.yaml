document: rfc-8046
kind: normative-requirement
summary: An RVS supporting UPDATE forwarding MUST rewrite the UPDATE's IP source and destination addresses, recompute the IP checksum, and include FROM and RVS_HMAC parameters, mirroring how it handles I1 packets per RFC 8004.
section: 3.2.3
rfc2119_level: MUST
topics:
