document: rfc-3275
kind: normative-requirement
summary: XML signature applications MUST be able to parse URI syntax. Dereferencing a URI in the HTTP scheme MUST comply with the HTTP Status Code Definitions (302, 305, and 307 redirects MUST be followed to obtain the entity-body of a 200 response).
section: 4.3.3.1
rfc2119_level: MUST
topics:
    - security
    - http
