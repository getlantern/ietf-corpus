document: rfc-8538
kind: design-rationale
summary: When a BGP session is reset under this extension, both speakers operate as 'Receiving Speakers' per RFC 4724, retaining each other's routes to avoid reachability flapping while the session recovers. This applies symmetrically to both the sender and receiver of the NOTIFICATION.
section: "1"
topics:
    - bgp
    - routing
