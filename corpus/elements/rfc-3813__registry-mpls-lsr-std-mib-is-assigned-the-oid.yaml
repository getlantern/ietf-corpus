summary: MPLS-LSR-STD-MIB is assigned the OID { mplsStdMIB 2 } under the MPLS Standards MIB arc. The module defines the mplsLsrNotifications, mplsLsrObjects, and mplsLsrConformance subtrees. IANA has assigned this OID as part of the mplsStdMIB managed by the IANA per RFC 3811.
