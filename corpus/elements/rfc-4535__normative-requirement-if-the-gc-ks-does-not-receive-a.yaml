document: rfc-4535
kind: normative-requirement
summary: If the GC/KS does not receive a valid KeyDL-A/F message within its locally configured timeout, it MUST evict the GM from the group in the next policy-defined Rekey Event. The GC/KS MAY optionally send a Lack_of_Ack message in Verbose Mode.
section: 5.2.1.4
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
