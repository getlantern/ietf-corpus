document: rfc-7323
kind: wire-format
summary: The TCP Window Scale option (WSopt) has Kind=3, Length=3 bytes, and a single 'shift.cnt' byte encoding the logarithmic scale exponent (0–14) for the receive window. The maximum permissible shift count is 14, allowing windows up to 2^30 bytes (1 GiB).
section: "2.2"
topics:
