document: rfc-8831
kind: normative-requirement
summary: Senders MUST NOT put more than one application message into an SCTP user message; unless deprecated PPID-based fragmentation is used, each SCTP user message MUST contain exactly one application message.
section: "6.6"
rfc2119_level: MUST NOT
topics:
