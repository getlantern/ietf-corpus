document: rfc-3025
kind: design-rationale
summary: The CVSE uses a 2-octet Length field while the NVSE uses a 1-octet Length field. This distinction supports the CVSE's critical nature requiring more potential data, while keeping the NVSE format compact for non-critical optional extensions.
