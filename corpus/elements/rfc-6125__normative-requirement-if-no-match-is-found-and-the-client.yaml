document: rfc-6125
kind: normative-requirement
summary: If no match is found and the client is an interactive client, it SHOULD inform the user of the identity mismatch and automatically terminate the communication with a bad certificate error. If automated, it SHOULD terminate with a bad certificate error and log appropriately; it MAY allow disabling this behavior via configuration but MUST enable it by default.
section: 6.6.4
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
