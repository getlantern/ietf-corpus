document: rfc-3224
kind: interoperability-note
summary: Vendor extensions preclude interoperation with compliant but non-extended implementations, creating a real danger of incompatibility if different implementations support different feature sets. The Vendor Opaque Extension ensures that compliant non-extended agents can safely ignore unknown vendor extensions without protocol failure.
section: "1.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
