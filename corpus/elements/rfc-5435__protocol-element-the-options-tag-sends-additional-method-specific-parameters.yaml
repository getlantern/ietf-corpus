document: rfc-5435
kind: protocol-element
summary: 'The :options tag sends additional method-specific parameters as a list of "<optionname>=<value>" strings. The optionname ABNF is: l-d = ALPHA / DIGIT; l-d-p = l-d / "." / "-" / "_"; optionname = l-d *l-d-p.'
section: "3.5"
topics:
