document: rfc-8083
kind: design-rationale
summary: The simplified TCP throughput equation is recommended over the full Padhye equation because measurement data shows the accuracy reduction is small and it is much simpler to calculate; the full equation MAY be used where its extra sensitivity to loss is desired (e.g., LTE networks).
