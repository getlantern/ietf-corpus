document: rfc-7678
kind: protocol-element
summary: The IP-Prefix-Length AVP (code 632) is of type Unsigned32 and provides the length of an IPv4 or IPv6 prefix; valid values are 0–32 for IPv4 and 0–128 for IPv6. It is only meaningful when associated with an IP-Address AVP inside a Grouped AVP.
section: "3.1"
