document: rfc-7012
kind: protocol-element
summary: 'IPFIX defines five data type semantics: ''quantity'' (default for all numerics), ''totalCounter'' (wrapping counter that counts independently of export), ''deltaCounter'' (wrapping counter reset to 0 on each export), ''identifier'' (only equality operations are meaningful), and ''flags'' (bit fields; logical operations only).'
section: "3.2"
topics:
