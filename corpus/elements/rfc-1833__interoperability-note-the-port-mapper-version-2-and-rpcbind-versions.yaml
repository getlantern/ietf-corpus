document: rfc-1833
kind: interoperability-note
summary: 'The Port Mapper (version 2) and RPCBIND (versions 3 and 4) all share the same RPC program number (100000) and port (111), but differ in address representation: Port Mapper uses raw TCP/UDP port numbers while RPCBIND uses transport-independent universal address strings.'
