document: rfc-1532
kind: normative-requirement
summary: A relay agent MUST silently discard any received UDP message whose UDP destination port number is BOOTPC (68); there is no need for relay agents to process client-bound BOOTPC messages.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
