document: rfc-3023
kind: design-rationale
summary: application/xml and application/foo+xml SHOULD be treated as completely independent media types. The '+xml' suffix carries no extra semantics for MIME processors unaware of XML, so there is no implied inheritance or compatibility relationship between them.
section: A.13
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
