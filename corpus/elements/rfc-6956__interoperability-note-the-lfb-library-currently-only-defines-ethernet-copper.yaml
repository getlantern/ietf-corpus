document: rfc-6956
kind: interoperability-note
summary: The LFB library currently only defines Ethernet copper media processing (EtherPHYCop). Processing for other physical media types such as Packet over SONET (POS) or ATM, as well as fiber Ethernet media, is explicitly deferred to future versions of this document or separate documents.
section: "5.1"
topics:
    - routing
