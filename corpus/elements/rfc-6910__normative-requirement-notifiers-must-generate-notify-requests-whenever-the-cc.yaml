document: rfc-6910
kind: normative-requirement
summary: Notifiers MUST generate NOTIFY requests whenever the CC request's state changes to 'queued' or 'ready'. The NOTIFY SHOULD include a cc-URI providing a globally routable URI for the CC recall INVITE and suspend/resume PUBLISH requests.
section: "9.8"
rfc2119_level: MUST
topics:
    - sip
