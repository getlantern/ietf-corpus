document: rfc-5021
kind: normative-requirement
summary: If a KDC receives a request for a set of extensions that it supports, it MUST respond by sending a 4-octet zero value (0x00000000). The KDC MAY directly send additional data after the zero value without waiting for the client to respond.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
    - security
