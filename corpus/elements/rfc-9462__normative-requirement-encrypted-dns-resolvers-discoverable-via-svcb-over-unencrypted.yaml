document: rfc-9462
kind: normative-requirement
summary: Encrypted DNS Resolvers discoverable via SVCB over unencrypted DNS MUST NOT provide differentiated behavior based solely on SVCB metadata (e.g., HTTP path or alternate port), which an attacker could modify to select a different service tier.
section: "7"
rfc2119_level: MUST NOT
