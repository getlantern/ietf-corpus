document: rfc-9061
kind: protocol-element
summary: The IKE case architecture places IKEv2 and IPsec (PAD, SPD) in the NSF. The I2NSF Controller provisions the NSF with IKEv2 configuration, PAD entries (credentials), and SPD entries via the NSF-Facing Interface; thereafter the NSF autonomously establishes IPsec SAs via IKEv2 negotiation without further controller involvement.
section: "3.1"
topics:
