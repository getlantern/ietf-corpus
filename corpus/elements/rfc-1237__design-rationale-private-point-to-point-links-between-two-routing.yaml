document: rfc-1237
kind: design-rationale
summary: Private point-to-point links between two routing domains may be ignored for NSAP allocation purposes because their routing information is not propagated throughout the internet. A domain with one public TRD attachment plus multiple private links is treated as single-homed for NSAP allocation.
section: "5.5"
topics:
    - routing
