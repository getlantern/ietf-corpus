document: rfc-1869
kind: interoperability-note
summary: An RFC 821 server that does not support SMTP extensions will return code 500 to EHLO. The client may then issue HELO or QUIT and proceed per RFC 821. The server should remain in the same state after this response.
section: "4.6"
topics:
