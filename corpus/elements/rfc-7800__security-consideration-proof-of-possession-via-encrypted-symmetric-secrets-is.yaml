document: rfc-7800
kind: security-consideration
summary: Proof of possession via encrypted symmetric secrets is subject to replay attacks. This can be mitigated by using signed nonces or challenges (with a distinct nonce per interaction) or by deriving sub-keys specific to each PoP demonstration instance.
