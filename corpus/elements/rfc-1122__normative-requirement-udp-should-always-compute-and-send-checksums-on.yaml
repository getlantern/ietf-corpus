document: rfc-1122
kind: normative-requirement
summary: UDP SHOULD always compute and send checksums on transmitted datagrams; a received datagram containing a non-zero checksum field that fails validation MUST be discarded silently. An application MAY optionally disable checksum generation for special cases.
section: 4.1.3.4
rfc2119_level: SHOULD
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
