document: rfc-7734
kind: normative-requirement
summary: A PBB PE is required to accept SPBM-encoded multicast destination addresses as if they were PBB-encoded (i.e., using the Backbone Service Instance Group address), treating them as multicast frames with the I-SID encoded in the lower 24 bits.
section: "4.7"
rfc2119_level: REQUIRED
topics:
    - multicast
    - routing
