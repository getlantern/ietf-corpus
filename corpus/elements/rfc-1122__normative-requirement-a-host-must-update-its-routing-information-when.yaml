document: rfc-1122
kind: normative-requirement
summary: A host MUST update its routing information when it receives a valid ICMP Redirect from the current first-hop gateway. Redirects from hosts that are not the current gateway SHOULD be silently discarded. A host MUST NOT originate an ICMP Redirect message.
section: 3.2.2.2
rfc2119_level: MUST
topics:
    - ip
    - routing
    - security
