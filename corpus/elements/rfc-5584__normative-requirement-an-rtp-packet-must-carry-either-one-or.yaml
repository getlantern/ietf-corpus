document: rfc-5584
kind: normative-requirement
summary: An RTP packet MUST carry either one or more complete ATRAC frames or a single fragment of one ATRAC frame. If a single ATRAC frame will not fit in a path-MTU-sized packet, it MUST be fragmented.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
