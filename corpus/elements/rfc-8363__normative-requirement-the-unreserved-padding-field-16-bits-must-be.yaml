document: rfc-8363
kind: normative-requirement
summary: The Unreserved Padding field (16 bits) MUST be included when k (number of priority levels) is odd, and MUST be omitted when k is even, to ensure 32-bit alignment of the Max Slot Width fields.
section: 4.1.1
rfc2119_level: MUST
