document: rfc-8029
kind: protocol-element
summary: The Target FEC Stack TLV (type 1) is a list of sub-TLVs identifying the FEC stack under test, with one sub-TLV per label stack level. Defined sub-types include LDP IPv4/IPv6 prefix (1,2), RSVP IPv4/IPv6 LSP (3,4), VPN IPv4/IPv6 prefix (6,7), L2 VPN endpoint (8), FEC 128/129 Pseudowire IPv4 and IPv6 variants (10,11,24,25), BGP labeled IPv4/IPv6 prefix (12,13), Generic IPv4/IPv6 prefix (14,15), and Nil FEC (16).
