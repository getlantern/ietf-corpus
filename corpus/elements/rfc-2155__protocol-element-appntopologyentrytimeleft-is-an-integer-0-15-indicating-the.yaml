document: rfc-2155
kind: protocol-element
summary: AppnTopologyEntryTimeLeft is an INTEGER (0–15) indicating the number of days before an entry is deleted from the topology database. A value of 0 means the entry is being deleted or will be marked for deletion at the next garbage collection cycle.
section: "4"
