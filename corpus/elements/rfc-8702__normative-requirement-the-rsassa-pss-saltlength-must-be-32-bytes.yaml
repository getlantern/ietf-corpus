document: rfc-8702
kind: normative-requirement
summary: The RSASSA-PSS saltLength MUST be 32 bytes for id-RSASSA-PSS-SHAKE128 or 64 bytes for id-RSASSA-PSS-SHAKE256. The trailerField MUST be 1 (hexadecimal value 0xBC).
section: 3.2.1
rfc2119_level: MUST
