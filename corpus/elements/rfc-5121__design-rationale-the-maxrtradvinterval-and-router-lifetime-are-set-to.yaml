document: rfc-5121
kind: design-rationale
summary: The MaxRtrAdvInterval and router lifetime are set to very large values (default 10800 seconds) in 802.16 to avoid waking mobile stations that are in idle mode, in which the radio link is torn down and paging is required to deliver packets. Frequent RAs would waste air interface resources.
section: "8.3"
topics:
