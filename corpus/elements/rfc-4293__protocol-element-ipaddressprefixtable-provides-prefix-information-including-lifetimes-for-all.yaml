document: rfc-4293
kind: protocol-element
summary: ipAddressPrefixTable provides prefix information (including lifetimes) for all addresses, allowing other tables such as ipAddressTable to reference prefixes by pointer and avoid duplication. This table is required for IPv6 entities.
