document: rfc-1065
kind: protocol-element
summary: The OBJECT-TYPE ASN.1 macro formalizes object type definitions with SYNTAX (ObjectSyntax), ACCESS, and STATUS clauses, and a VALUE NOTATION binding to an ObjectName (OBJECT IDENTIFIER). This macro enables tool-based processing of MIB definitions.
