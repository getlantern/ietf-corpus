document: rfc-2680
kind: protocol-element
summary: Type-P-One-way-Packet-Loss is 0 when Src sent the first bit of a Type-P packet at wire-time T and Dst received it; it is 1 when Dst did not receive the packet. It is 0 exactly when Type-P-One-way-Delay is finite, and 1 exactly when Type-P-One-way-Delay is undefined.
section: "2.4"
topics:
    - measurement
