document: rfc-1771
kind: protocol-element
summary: ATOMIC_AGGREGATE (Type Code 6) is a well-known discretionary zero-length attribute signaling that a less-specific route was selected over a more-specific one. A receiver must not remove this attribute when forwarding and must not de-aggregate the NLRI.
section: 5.1.6
topics:
    - bgp
    - routing
