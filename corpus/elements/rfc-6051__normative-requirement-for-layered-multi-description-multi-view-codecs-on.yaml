document: rfc-6051
kind: normative-requirement
summary: For layered/multi-description/multi-view codecs on separate RTP flows, the sender SHOULD periodically and synchronously insert NTP header extensions into all component flows at exactly the same sampling instant. It is RECOMMENDED that insertion occur at least once per random access point.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
