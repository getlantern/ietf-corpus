document: rfc-4878
kind: protocol-element
summary: The dot3OamLoopbackTable controls and reports the loopback state for each interface that supports loopback (loopbackSupport bit set in dot3OamFunctionsSupported). It contains dot3OamLoopbackStatus (read-write, with writable values initiatingLoopback and terminatingLoopback) and dot3OamLoopbackIgnoreRx.
