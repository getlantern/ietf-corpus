document: rfc-7460
kind: protocol-element
summary: 'Three eoEnergyParametersIntervalMode types define how energy intervals are collected: period(1) — non-overlapping sequential intervals (S_{n+1} = S_n + L); sliding(2) — overlapping windows where the inter-window offset is set by eoEnergyParametersIntervalWindow; total(3) — a single continuous measurement since last reset, where eoEnergyParametersIntervalNumber must be 1 and eoEnergyParametersIntervalLength is ignored. Multiple modes MAY be configured simultaneously per Energy Object.'
section: "5.6"
