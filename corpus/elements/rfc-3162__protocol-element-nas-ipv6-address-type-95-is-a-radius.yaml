document: rfc-3162
kind: protocol-element
summary: NAS-IPv6-Address (Type 95) is a RADIUS attribute indicating the identifying IPv6 address of the NAS requesting user authentication. It is only used in Access-Request packets and has a fixed length of 18 octets (2 octets header + 16 octets address).
section: "2.1"
topics:
