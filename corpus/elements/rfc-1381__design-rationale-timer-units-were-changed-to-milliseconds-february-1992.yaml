document: rfc-1381
kind: design-rationale
summary: Timer units were changed to milliseconds (February 1992) to align with ISO 8885 Table 3, which specifies timer values in milliseconds. The T4 idle timer uses the sentinel value 2147483647 (PositiveInteger maximum) to indicate 'no idle timer kept' rather than introducing a separate boolean.
