document: rfc-8660
kind: protocol-element
summary: The PUSH operation prepends one or more MPLS labels to an incoming packet before sending it out a physical or virtual interface (e.g., UDP tunnel, L2TPv3) toward a next hop. TTL and Traffic Class fields of each label stack entry must be set per local policy; this document does not specify those rules.
section: 2.7.1
topics:
    - mpls
    - routing
