document: rfc-6793
kind: interoperability-note
summary: Peering between a NEW BGP speaker and an OLD BGP speaker is possible only if the NEW BGP speaker has a two-octet AS number. When no globally unique two-octet AS number is available, AS_TRANS MUST be used, even if multiple Autonomous Systems would share it.
section: 4.2.1
topics:
    - bgp
    - routing
