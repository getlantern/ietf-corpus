document: rfc-6607
kind: interoperability-note
summary: A relay agent submitting a DHCP Leasequery request for an address on a non-default VPN SHOULD include the respective DHCPv4 or DHCPv6 VSS option (not a sub-option) in the Leasequery packet, since the relay agent in that context is acting as a direct DHCP client rather than as a relay.
section: "5.2"
topics:
    - dns
