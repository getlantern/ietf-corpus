document: rfc-8334
kind: normative-requirement
summary: The <launch:phase> element MUST be included by the client to define the target launch phase. The server SHOULD validate the phase and MAY validate the sub-phase, returning EPP error 2306 on mismatch.
section: "2.3"
rfc2119_level: MUST
topics:
    - registry
