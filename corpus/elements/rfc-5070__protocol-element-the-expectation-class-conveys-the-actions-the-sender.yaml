document: rfc-5070
kind: protocol-element
summary: The Expectation class conveys the actions the sender requests of the recipient, scoped to the containing EventData. The 'action' attribute enumerates request types including contact-source-site, block-host, block-network, rate-limit-host, investigate, remediate-other, status-triage, and status-new-info.
