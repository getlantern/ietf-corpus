document: rfc-7474
kind: security-consideration
summary: Using a single cryptographic sequence number leaves a router vulnerable to replay attacks on point-to-point unnumbered links sharing the same IP source address. In environments where an attacker can tap such links, different manual keys SHOULD be configured on each unnumbered interface.
section: "8"
topics:
    - routing
    - security
