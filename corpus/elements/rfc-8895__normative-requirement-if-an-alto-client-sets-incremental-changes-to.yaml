document: rfc-8895
kind: normative-requirement
summary: If an ALTO client sets 'incremental-changes' to true, it MUST support all incremental methods listed in the server's capabilities for that resource. If the server sends full replacement when 'incremental-changes' is false, it MAY wait and batch multiple changes into one replacement.
section: "6.5"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
