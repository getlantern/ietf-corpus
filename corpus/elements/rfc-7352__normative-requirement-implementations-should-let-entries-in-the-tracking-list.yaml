document: rfc-7352
kind: normative-requirement
summary: Implementations SHOULD let entries in the tracking list expire after a short period of time. If the ':seconds' argument is omitted, an appropriate default value MUST be used; a default of around 7 days is usually appropriate. Sites SHOULD impose a maximum limit on expiration time.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
