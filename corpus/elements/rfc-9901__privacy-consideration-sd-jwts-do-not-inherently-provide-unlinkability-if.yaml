document: rfc-9901
kind: privacy-consideration
summary: 'SD-JWTs do not inherently provide unlinkability: if the same SD-JWT is presented to multiple Verifiers, or if Verifiers collude, the Issuer-signed JWT can serve as a correlation handle. Unlinkability requires issuing separate SD-JWTs per presentation or applying per-presentation blinding techniques outside the scope of this specification.'
section: "10.1"
topics:
    - jose
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
