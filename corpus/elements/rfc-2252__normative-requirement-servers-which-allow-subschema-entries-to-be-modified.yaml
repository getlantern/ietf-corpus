document: rfc-2252
kind: normative-requirement
summary: Servers which allow subschema entries to be modified by clients MUST support integerFirstComponentMatch (2.5.13.29) and objectIdentifierFirstComponentMatch (2.5.13.30), as these are the equality matching rules for several subschema attributes. The assertion syntax of these rules differs from the value syntax of the attributes they serve.
section: "8.4"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
