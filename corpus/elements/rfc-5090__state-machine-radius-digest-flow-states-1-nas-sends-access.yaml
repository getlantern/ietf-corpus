document: rfc-5090
kind: state-machine
summary: 'RADIUS Digest flow states: (1) NAS sends Access-Request without Digest-Nonce to obtain nonce; (2) Server responds with Access-Challenge containing Digest-Nonce; (3) NAS sends Access-Request with full Digest credentials; (4) Server responds with Access-Accept (success), Access-Challenge with Digest-Stale=''true'' (stale nonce), or Access-Reject (failure).'
section: "1.3"
topics:
    - radius
    - sip
    - http
