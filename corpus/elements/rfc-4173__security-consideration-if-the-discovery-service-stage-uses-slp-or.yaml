document: rfc-4173
kind: security-consideration
summary: If the Discovery Service stage uses SLP or iSNS, the iSCSI boot client SHOULD provide IPsec support (OPTIONAL to use). When SLP or iSNS distribute security policy or configuration, at minimum per-packet data origin authentication, integrity, and replay protection SHOULD be used.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
