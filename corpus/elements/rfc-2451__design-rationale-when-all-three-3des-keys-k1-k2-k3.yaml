document: rfc-2451
kind: design-rationale
summary: When all three 3DES keys k1, k2, k3 are identical, DES-EDE3-CBC is equivalent to DES-CBC. This property allows 3DES hardware to operate in DES mode without modification, which is why the EDE (encrypt-decrypt-encrypt) structure was chosen.
section: "2.6"
