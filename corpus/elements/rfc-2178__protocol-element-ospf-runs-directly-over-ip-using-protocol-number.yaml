document: rfc-2178
kind: protocol-element
summary: OSPF runs directly over IP using protocol number 89. It does not provide explicit fragmentation/reassembly; IP fragmentation is used when necessary, though it should be avoided. Routing packets should be sent with IP TOS=0 and IP Precedence set to Internetwork Control.
section: "4.3"
topics:
    - routing
    - ip
