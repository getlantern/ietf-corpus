document: rfc-9780
kind: normative-requirement
summary: The periodic BFD Control packet transmission by the active tail MUST be jittered by up to 25% within one-second intervals (i.e., the interval MUST be reduced by a random value of 0–25%) to reduce the possibility of congestion on the ingress LSR's control plane.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - congestion
