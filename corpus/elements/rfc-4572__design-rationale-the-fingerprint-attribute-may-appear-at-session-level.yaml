document: rfc-4572
kind: design-rationale
summary: The fingerprint attribute may appear at session level or media level. A session-level fingerprint applies to all TLS sessions for which no media-level fingerprint is defined, allowing a single fingerprint to cover multiple media streams without repetition.
section: "5"
topics:
