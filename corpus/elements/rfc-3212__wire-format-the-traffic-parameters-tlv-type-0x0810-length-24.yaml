document: rfc-3212
kind: wire-format
summary: 'The Traffic Parameters TLV (type 0x0810, length=24) encodes: 8-bit Flags (negotiable flags F1-F6 per parameter), 8-bit Frequency, 8-bit Reserved, 8-bit Weight, and five 32-bit IEEE single-precision floats: PDR, PBS, CDR, CBS, EBS. Rates are in bytes/second; burst sizes in bytes.'
section: "4.3"
