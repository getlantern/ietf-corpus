document: rfc-6929
kind: normative-requirement
summary: Proxy servers SHOULD forward unknown or undictionary attributes verbatim, with no modifications. Refusing to forward attributes not in a local dictionary is NOT RECOMMENDED. Implementations MUST be able to process non-contiguous Long Extended Type fragments.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - radius
