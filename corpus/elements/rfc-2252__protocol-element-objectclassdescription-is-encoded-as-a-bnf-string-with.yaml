document: rfc-2252
kind: protocol-element
summary: ObjectClassDescription is encoded as a BNF string with a numeric OID, optional NAME, DESC, OBSOLETE, SUP (superior classes), type keyword (ABSTRACT/STRUCTURAL/AUXILIARY, default structural), and MUST/MAY attribute lists. Servers SHOULD implement all object classes in section 7 except extensibleObject, and MUST publish additional classes in the subschema.
section: "4.4"
topics:
