document: rfc-4483
kind: normative-requirement
summary: If the hash parameter is included and the target URI involves certificate-based security, the UAS MUST ignore certificate validation results and instead verify that the hash of the received content matches the hash in the content-indirection parameter.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
    - pkix
