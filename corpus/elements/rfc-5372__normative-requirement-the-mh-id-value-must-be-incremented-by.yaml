document: rfc-5372
kind: normative-requirement
summary: The mh_id value MUST be incremented by 1 every time a new main header is transmitted. Once the mh_id value becomes greater than 7, it SHOULD roll over to 1.
section: "2.1"
rfc2119_level: MUST
