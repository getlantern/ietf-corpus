document: rfc-2592
kind: normative-requirement
summary: The mapping of smScriptOwner and smScriptName to non-volatile storage MUST ensure that scripts created by different owners with the same script name do not map to the same name in non-volatile storage. One way to achieve this is to use both the script owner and the script name to derive the internal storage name.
section: "4.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
