document: rfc-6491
kind: design-rationale
summary: SHOULD rather than MUST is used for AS 0 ROA issuance for reserved and unallocated resources because IANA must not be placed in a situation where normal internal operations (e.g., registry transitions) cause its behavior to contradict IETF standards by being unable to temporarily remove or withhold an object.
