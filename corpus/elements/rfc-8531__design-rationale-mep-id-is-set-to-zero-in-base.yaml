document: rfc-8531
kind: design-rationale
summary: MEP-ID is set to zero in Base Mode because automatic derivation from the IP address is infeasible (the MEP-ID field is much smaller). Zero was chosen as a reserved, automatically assigned value that requires no user intervention, enabling the zero-touch experience.
section: "6.2"
