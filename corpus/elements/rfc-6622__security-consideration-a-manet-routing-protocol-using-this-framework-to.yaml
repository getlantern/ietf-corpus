document: rfc-6622
kind: security-consideration
summary: A MANET routing protocol using this framework to reject messages without a valid ICV SHOULD indicate the security assumption that a valid ICV implies message validity, identify the security issues counteracted (e.g., link or identity spoofing), and identify issues not counteracted (e.g., compromised keys).
