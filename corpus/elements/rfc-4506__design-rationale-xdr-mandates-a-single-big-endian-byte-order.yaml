document: rfc-4506
kind: design-rationale
summary: XDR mandates a single big-endian byte order rather than supporting both orderings, because supporting two orders would require a higher-level protocol to signal which is in use; as a data representation standard (not a protocol) XDR cannot provide that negotiation.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
