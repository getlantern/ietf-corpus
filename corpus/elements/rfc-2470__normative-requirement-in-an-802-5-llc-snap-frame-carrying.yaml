document: rfc-2470
kind: normative-requirement
summary: In an 802.5 LLC/SNAP frame carrying IPv6, DSAP and SSAP shall always contain 0xAA, CTL shall always contain 0x03, OUI shall always contain 0x000000, and EtherType shall always contain 0x86DD.
section: "3"
rfc2119_level: REQUIRED
