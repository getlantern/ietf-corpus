document: rfc-8082
kind: normative-requirement
summary: When sending a FIR command for a layered bitstream, the sender MUST target the RTP stream that carries the base layer by setting the SSRC field in the FCI to the SSRC of the forward RTP stream carrying the base layer.
section: "4"
rfc2119_level: MUST
topics:
