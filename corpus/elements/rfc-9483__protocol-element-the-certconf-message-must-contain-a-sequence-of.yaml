document: rfc-9483
kind: protocol-element
summary: The certConf message MUST contain a sequence of one CertStatus with certHash (computed using the hash algorithm of the certificate signature or as indicated by hashAlg), certReqId (MUST be 0), and optional statusInfo. The hashAlg field requires pvno cmp2021(3) and its use is NOT RECOMMENDED if the algorithm can be identified by other means.
section: 4.1.1
topics:
    - pkix
