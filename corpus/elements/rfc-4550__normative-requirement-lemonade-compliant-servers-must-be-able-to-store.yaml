document: rfc-4550
kind: normative-requirement
summary: Lemonade-compliant servers MUST be able to store the $Forwarded IMAP keyword, MUST preserve it on COPY operations, and MUST support SEARCH KEYWORD $Forwarded. Once set, the $Forwarded flag SHOULD NOT be cleared.
section: "2.8"
rfc2119_level: MUST
