document: rfc-3892
kind: normative-requirement
summary: The token SHOULD NOT contain the Call-ID header field from the REFER request (not useful to refer target and may be an information leak), and SHOULD NOT contain the From header field since identity is represented in the Referred-By header.
section: "4"
rfc2119_level: SHOULD NOT
topics:
