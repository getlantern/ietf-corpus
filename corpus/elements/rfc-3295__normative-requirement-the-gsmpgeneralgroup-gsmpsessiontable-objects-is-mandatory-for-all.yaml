document: rfc-3295
kind: normative-requirement
summary: The gsmpGeneralGroup (gsmpSessionTable objects) is MANDATORY for all GSMP implementations; gsmpControllerGroup is mandatory for Switch Controllers, gsmpSwitchGroup for Switches, gsmpAtmEncapGroup if ATM is used, and gsmpTcpIpEncapGroup if TCP/IP is used.
section: "4"
rfc2119_level: REQUIRED
