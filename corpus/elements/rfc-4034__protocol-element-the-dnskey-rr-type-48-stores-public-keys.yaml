document: rfc-4034
kind: protocol-element
summary: The DNSKEY RR (type 48) stores public keys used in DNSSEC. Its RDATA consists of a 2-octet Flags field, a 1-octet Protocol field (always 3), a 1-octet Algorithm field, and a variable-length Public Key field.
