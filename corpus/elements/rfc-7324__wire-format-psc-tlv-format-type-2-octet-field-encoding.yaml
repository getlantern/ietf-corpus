document: rfc-7324
kind: wire-format
summary: 'PSC TLV format: Type (2-octet field encoding a type value from the IANA MPLS PSC TLV Registry), Length (2-octet field encoding the length in octets of the Value field, MUST be a multiple of 4), and Value (variable-length payload, also MUST be a multiple of 4 octets, may include explicit padding). The total length of a single TLV is the Value field length plus 4.'
section: "2.1"
topics:
    - mpls
