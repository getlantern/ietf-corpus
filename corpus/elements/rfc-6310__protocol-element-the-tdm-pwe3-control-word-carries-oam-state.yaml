document: rfc-6310
kind: protocol-element
summary: 'The TDM PWE3 control word carries OAM state via three fields: the L bit (AC forward defect indication — upstream PE signals NS network defects to downstream PE), the R bit (PW reverse defect indication — PE signals PSN failures to remote PE), and the M field (modifies the meaning of receive defects for structure-aware PEs). Reception of packets with R bit set causes PE entry into the PW transmit defect state.'
section: "9"
topics:
