document: rfc-2233
kind: protocol-element
summary: ifLinkUpDownTrapEnable (enabled/disabled) controls per-sub-layer generation of linkUp/linkDown traps. The default behavior is to generate traps only for the lowest sub-layer of each interface stack to limit trap proliferation from cascading state changes.
section: 3.1.9
topics:
    - snmp
