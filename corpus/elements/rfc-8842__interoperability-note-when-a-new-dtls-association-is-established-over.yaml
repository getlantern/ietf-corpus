document: rfc-8842
kind: interoperability-note
summary: When a new DTLS association is established over an unordered transport using ICE, at least one endpoint MUST allocate a completely new set of ICE candidates not recently used for any other DTLS association. An answerer cannot unilaterally initiate a new DTLS association without an ICE restart initiated by the offerer.
section: "6"
topics:
    - realtime
    - nat
