document: rfc-6630
kind: security-consideration
summary: 'Mutual authentication is inherited from ERP: the peer and server authenticate via ERP, the peer and SAP authenticate via ERP, and the CAP is authenticated and trusted by the SAP. Keying material confidentiality is maintained because peer and server derive keys independently using shared parameters without disclosing them.'
