document: rfc-5424
kind: protocol-element
summary: STRUCTURED-DATA provides a well-defined, parseable data format for meta-information or application-specific data. Each SD-ELEMENT consists of an SD-ID and zero or more SD-PARAM name-value pairs enclosed in brackets. STRUCTURED-DATA MUST be NILVALUE when no elements are present.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
