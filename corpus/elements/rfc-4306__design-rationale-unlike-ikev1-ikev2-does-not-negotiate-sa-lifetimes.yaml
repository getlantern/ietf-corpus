document: rfc-4306
kind: design-rationale
summary: Unlike IKEv1, IKEv2 does not negotiate SA lifetimes between peers. Each endpoint independently enforces its own lifetime policy and initiates rekeying as needed. This eliminates a class of lifetime-negotiation attacks and simplifies the protocol; the endpoint with the shorter lifetime will always be the rekeying initiator.
section: "2.8"
topics:
    - ipsec
    - security
