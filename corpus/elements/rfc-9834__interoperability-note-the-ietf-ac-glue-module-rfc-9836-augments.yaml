document: rfc-9834
kind: interoperability-note
summary: The 'ietf-ac-glue' module (RFC 9836) augments both the L2SM and L3SM to bind LxVPN services to ACs, referencing AC identifiers from 'ietf-ac-svc' and AC network references from 'ietf-ac-ntw'. The 'ietf-ac-ntw' module (RFC 9835) exposes the node-specific attachment interface details that the service model hides.
section: "3"
