document: rfc-5611
kind: normative-requirement
summary: TDM pseudowires use their own Control Word, so the L2-Specific Sublayer AVP MUST either be omitted or set to 0. Similarly, TDM PWs use their own sequencing, so the Data Sequencing AVP MUST either be omitted or set to 0.
section: "2.4"
rfc2119_level: MUST
topics:
    - mpls
