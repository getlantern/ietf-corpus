document: rfc-3320
kind: wire-format
summary: 'UDVM operands use four variable-length encodings: literal (#, 1–3 bytes for 0–65535), reference ($ always yields a 2-byte memory value), multitype (% with 10 bytecode patterns covering direct values, memory addresses, and powers of 2), and address (@ decoded as multitype plus instruction-relative offset).'
section: "8.5"
