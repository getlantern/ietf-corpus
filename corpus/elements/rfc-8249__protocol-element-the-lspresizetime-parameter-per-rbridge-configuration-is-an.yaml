document: rfc-8249
kind: protocol-element
summary: The LSPresizeTime parameter (per-RBridge configuration) is an integer in the range 0–65535 seconds, defaulting to 300. It controls the dampening timer that prevents premature upward resizing of Sz after a resize event is detected.
