document: rfc-3095
kind: wire-format
summary: ROHC feedback packets use a 2-bit type field indicating ACK (00), STATIC-NACK (10), or NACK (11). Optional feedback options are type-length-value encoded and include CRC, REJECT, SN-NOT-VALID, SN, CLOCK (decompressor clock resolution), JITTER, and LOSS.
section: 5.7.6
topics:
