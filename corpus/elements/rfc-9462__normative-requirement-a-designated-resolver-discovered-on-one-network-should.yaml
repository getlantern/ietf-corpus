document: rfc-9462
kind: normative-requirement
summary: A Designated Resolver discovered on one network SHOULD NOT be reused on another network using the same Unencrypted DNS Resolver IP address without repeating the discovery process, because the same IP address may map to different servers on different networks.
section: 4.1.1
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
