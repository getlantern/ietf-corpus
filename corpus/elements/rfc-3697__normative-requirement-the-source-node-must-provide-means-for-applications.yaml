document: rfc-3697
kind: normative-requirement
summary: The source node MUST provide means for applications and transport protocols to specify the Flow Label values to be used with their flows, subject to appropriate privileges. The source node SHOULD be able to select unused Flow Label values for flows not requesting a specific value.
section: "3"
rfc2119_level: MUST
topics:
    - ip
