document: rfc-9793
kind: normative-requirement
summary: Label ranges within all BIER MPLS Encapsulation sub-TLVs advertised by the same BFR MUST NOT overlap. If an overlap is detected, all BIER MPLS Encapsulation sub-TLVs advertised by the BFR MUST be ignored.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
