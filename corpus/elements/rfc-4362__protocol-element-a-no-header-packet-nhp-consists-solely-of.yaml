document: rfc-4362
kind: protocol-element
summary: A No-Header Packet (NHP) consists solely of the original packet's payload with no compressed header. It may be used when all header fields are unchanged or follow the established change pattern, and is only valid for CID=0 and only in U/O-mode (not R-mode).
section: 4.1.1
topics:
