document: rfc-6172
kind: protocol-element
summary: 'iFCP operates in two modes with respect to Fibre Channel N_PORT fabric addresses (24-bit N_PORT_IDs): address transparent mode, which preserves fabric addresses as a pass-through, and address translation mode, which changes source (S_ID) and destination (D_ID) N_PORT fabric addresses at the FC/Internet boundary, analogous to NAT.'
