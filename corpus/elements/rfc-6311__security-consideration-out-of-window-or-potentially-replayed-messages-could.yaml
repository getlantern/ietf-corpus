document: rfc-6311
kind: security-consideration
summary: Out-of-window or potentially replayed messages could be used to trigger counter synchronization exchanges as a denial-of-service vector. This is mitigated by the rule that a peer MUST NOT initiate counter synchronization for a given IKE SA more than once per failover event.
section: "11"
topics:
    - ipsec
    - security
