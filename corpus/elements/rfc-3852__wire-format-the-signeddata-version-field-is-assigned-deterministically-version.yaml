kind: wire-format
summary: 'The SignedData version field is assigned deterministically: version 5 if other-typed certificates or CRLs are present; version 4 if v2 attribute certificates are present; version 3 if v1 attribute certificates, v3 SignerInfo structures, or a non-id-data eContentType are present; otherwise version 1.'
