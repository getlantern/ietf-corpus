kind: registry
summary: 'The KEY RR algorithm number registry assigns: 0 (reserved), 1 (RSA/MD5, recommended), 2 (Diffie-Hellman, optional, key only), 3 (DSA, MANDATORY), 4 (reserved for elliptic curve), 252 (indirect keys), 253 (private, domain name), 254 (private, OID), 255 (reserved). Values 5–251 are available for IANA assignment.'
