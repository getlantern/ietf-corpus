document: rfc-8520
kind: protocol-element
summary: 'The MUD file is a YANG-based JSON document (RFC 7951 serialization) containing two root objects: a ''mud'' container with file metadata and access policy references, and an ''acls'' container from RFC 8519. The mud container includes mud-version, mud-url, last-update, cache-validity, is-supported, systeminfo, and optional mfg-name, model-name, firmware-rev, software-rev, documentation, extensions, from-device-policy, and to-device-policy.'
section: "2"
topics:
