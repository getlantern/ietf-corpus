document: rfc-2652
kind: security-consideration
summary: CIP indexes can leak proprietary or sensitive data if not carefully constructed. The risk of reverse-engineering a database from its exported index must be kept to a level consistent with the data's value; security must be a prime consideration when developing any new index object type.
section: "4.1"
topics:
    - security
    - privacy
