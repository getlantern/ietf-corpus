document: rfc-2930
kind: registry
summary: RFC 2930 registers RR type 249 for TKEY, TKEY Mode values 1-5 (server assignment, DH exchange, GSS-API, resolver assignment, key deletion), and extended RCODE error values 19 (BADMODE), 20 (BADNAME), and 21 (BADALG). Mode 0 and 65535 are reserved; modes 1-255 and 65280-65534 require IETF Standards Action.
