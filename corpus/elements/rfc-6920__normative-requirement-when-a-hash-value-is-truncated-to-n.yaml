document: rfc-6920
kind: normative-requirement
summary: When a hash value is truncated to N bits, the leftmost N bits (most significant bits in network byte order) from the binary representation of the hash MUST be used. The name MUST indicate the truncation via the algorithm string (e.g., 'sha-256-32' for 32-bit truncation of sha-256).
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
