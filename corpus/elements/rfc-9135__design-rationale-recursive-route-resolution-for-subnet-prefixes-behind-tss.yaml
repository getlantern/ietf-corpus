document: rfc-9135
kind: design-rationale
summary: Recursive route resolution for subnet prefixes behind TSs means that when a TS moves, only its MAC/IP Advertisement route needs updating; subnet prefix advertisements do not need to be re-advertised because the resolution automatically updates forwarding to the new NVE.
section: "9.2"
