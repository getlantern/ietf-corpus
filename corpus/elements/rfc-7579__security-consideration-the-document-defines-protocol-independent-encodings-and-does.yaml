document: rfc-7579
kind: security-consideration
summary: The document defines protocol-independent encodings and does not itself introduce security issues. However, protocol-specific documents that embed these encodings must address risks of inspection, interception, modification, or spoofing of connectivity and label constraint information. A general GMPLS security framework is provided in RFC 5920.
section: "3"
topics:
    - security
    - routing
    - mpls
