document: rfc-4681
kind: state-machine
summary: After the client and server exchange hello messages including user_mapping extensions, the client MAY send a SupplementalData message with UserMappingDataList before the Certificate message. If the server does not echo the extension, the client proceeds normally without sending the UserMappingDataList.
