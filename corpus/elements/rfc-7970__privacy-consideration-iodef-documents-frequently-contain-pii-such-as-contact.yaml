document: rfc-7970
kind: privacy-consideration
summary: IODEF documents frequently contain PII such as contact names, email addresses, IP addresses, and hostnames. Senders must evaluate the sensitivity of personal data included in reports and apply appropriate restriction attribute values to limit downstream disclosure.
