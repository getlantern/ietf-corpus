document: rfc-5229
kind: interoperability-note
summary: The "relational" extension [RFC 5231] adds a ":count" match type to the "string" test. For counting purposes, the count of a single string is 0 if it is empty or 1 otherwise; the count of a string list is the sum of the counts of its members.
