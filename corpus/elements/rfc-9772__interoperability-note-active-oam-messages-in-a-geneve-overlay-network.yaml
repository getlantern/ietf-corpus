document: rfc-9772
kind: interoperability-note
summary: Active OAM messages in a Geneve overlay network are exchanged between two Geneve tunnel endpoints (NVEs). Testing end-to-end between tenants is explicitly out of scope. The document applies only to NVE-to-NVE OAM within the Geneve overlay.
