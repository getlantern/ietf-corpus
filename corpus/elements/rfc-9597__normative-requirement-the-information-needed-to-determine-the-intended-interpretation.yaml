document: rfc-9597
kind: normative-requirement
summary: The information needed to determine the intended interpretation of the CWT Claims header parameter MAY come from other header parameters; use of the 'typ' header parameter (RFC 9596) is RECOMMENDED as the way to convey this information at an appropriate integrity protection level.
