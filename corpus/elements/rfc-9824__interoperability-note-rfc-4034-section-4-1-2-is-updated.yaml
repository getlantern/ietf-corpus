document: rfc-9824
kind: interoperability-note
summary: 'RFC 4034 Section 4.1.2 is updated to add an exception to the rule that pseudo-type bits MUST be clear in NSEC Type Bit Maps: the NXNAME pseudo-type (RFC 9824) is allowed to appear in responses to nonexistent names. No known resolver previously enforced this restriction, so deployment has been unaffected.'
section: "7.1"
topics:
    - dns
