document: rfc-5793
kind: normative-requirement
summary: 'PB-TNC Vendor ID 0xffffff is reserved: senders MUST NOT use it and receivers MUST respond with a fatal Invalid Parameter error in a CLOSE batch. PB-TNC Message Type 0xffffffff is similarly reserved with the same send/receive constraints.'
section: "4.2"
rfc2119_level: MUST NOT
topics:
