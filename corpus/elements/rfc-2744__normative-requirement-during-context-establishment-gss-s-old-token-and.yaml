document: rfc-2744
kind: normative-requirement
summary: During context establishment, GSS_S_OLD_TOKEN and GSS_S_DUPLICATE_TOKEN are fatal errors; GSS-API mechanisms must always return them paired with a routine error of GSS_S_FAILURE.
