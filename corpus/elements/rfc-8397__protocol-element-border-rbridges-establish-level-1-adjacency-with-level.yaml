document: rfc-8397
kind: protocol-element
summary: Border RBridges establish Level 1 adjacency with Level 1 RBridges per RFC 7177 and RFC 6325, and Level 2 adjacency using Level 2 Hello PDUs (LAN) or configured level flags (point-to-point). Level 1 and Level 2 adjacency state machines are independent.
