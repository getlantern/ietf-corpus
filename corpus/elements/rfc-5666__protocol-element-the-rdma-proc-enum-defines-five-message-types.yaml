document: rfc-5666
kind: protocol-element
summary: 'The rdma_proc enum defines five message types: RDMA_MSG=0 (normal RPC with inline body), RDMA_NOMSG=1 (body transferred separately via RDMA Read), RDMA_MSGP=2 (padded RPC message), RDMA_DONE=3 (client signals reply chunk read completion), RDMA_ERROR=4 (encoding error signaling).'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
