document: rfc-8853
kind: normative-requirement
summary: Simulcast RTP streams MUST be related at the RTP level through RtpStreamId (RFC 8852). Implementers MUST support the RTCP SDES item method and SHOULD support the RTP header extension method to signal RtpStreamId on the RTP level.
section: "5.5"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
