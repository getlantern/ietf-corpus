document: rfc-9911
kind: protocol-element
summary: RFC 9911 introduces the email-address type (string with pattern '.+@.+') representing internationalized email addresses per RFC 5322 extended by RFC 6532. The domain part supports both A-labels and U-labels; canonical format uses lowercase and U-labels.
