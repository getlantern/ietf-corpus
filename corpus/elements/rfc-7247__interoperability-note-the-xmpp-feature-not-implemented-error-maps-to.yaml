document: rfc-7247
kind: interoperability-note
summary: The XMPP <feature-not-implemented/> error maps to SIP 405 when the error relates to a full JID (specific device/resource) and to SIP 501 when it relates to a bare JID (user-level). Similarly, <forbidden/>, <item-not-found/>, <not-acceptable/>, and <recipient-unavailable/> map to 4xx for full JID and 6xx for bare JID.
section: "7.1"
topics:
