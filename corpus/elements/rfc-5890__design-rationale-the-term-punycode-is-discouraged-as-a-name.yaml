document: rfc-5890
kind: design-rationale
summary: The term 'Punycode' is discouraged as a name or adjective for labels. Calling a label a 'Punycode string' conflates the encoding algorithm with the label form and leaves ambiguity about whether the ACE prefix is included; the terms A-label and U-label are more precise.
section: 2.3.4
topics:
