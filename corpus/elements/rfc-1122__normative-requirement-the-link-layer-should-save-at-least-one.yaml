document: rfc-1122
kind: normative-requirement
summary: The link layer SHOULD save at least one (the latest) packet destined to each unresolved IP address and transmit it once ARP resolution completes; discarding such packets causes the first packet of every new exchange to be lost.
section: 2.3.2.2
rfc2119_level: SHOULD
topics:
    - ip
