document: rfc-8783
kind: design-rationale
summary: New DOTS-specific ACL/ACE structures are defined rather than augmenting the existing 'ietf-access-control-list' (RFC 8519), because that model did not support per-client retrieval or deletion of filtering entries, both of which are required for DOTS operation.
