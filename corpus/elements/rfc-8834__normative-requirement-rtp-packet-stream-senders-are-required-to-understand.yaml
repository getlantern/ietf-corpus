document: rfc-8834
kind: normative-requirement
summary: RTP packet stream senders are REQUIRED to understand the generic NACK message (RFC 4585 Section 6.2.1). Receivers are REQUIRED to implement support for RTP retransmission packets (RFC 4588) sent using SSRC multiplexing.
