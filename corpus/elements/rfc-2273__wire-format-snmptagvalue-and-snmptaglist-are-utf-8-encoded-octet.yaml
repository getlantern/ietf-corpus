document: rfc-2273
kind: wire-format
summary: SnmpTagValue and SnmpTagList are UTF-8 encoded OCTET STRING types (SIZE 0..255). A tag value may not contain delimiter characters (ASCII space 0x20, TAB 0x09, CR 0x0D, LF 0x0B) and may not be zero-length. A tag list separates tag values with single delimiter characters; no leading, trailing, or adjacent delimiters are allowed.
section: 4.1.1
topics:
