document: rfc-5942
kind: interoperability-note
summary: 'RFC 5942 updates RFC 4861 by deprecating the two bullets from the ''on-link'' definition in Section 2.1 of RFC 4861: (1) a Neighbor Advertisement is received for the address, and (2) any Neighbor Discovery message is received from the address. Neither constitutes valid evidence that an address is on-link.'
section: "6"
topics:
