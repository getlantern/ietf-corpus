document: rfc-9622
kind: protocol-element
summary: The multipath Selection Property (Section 6.2.14) takes values Disabled, Active, or Passive. Active negotiates multipath use if the transport supports it; Passive supports multipath if the remote requests it; Disabled prevents using multiple paths in parallel but does not prevent selecting a multipath-capable protocol. The multipathPolicy Connection Property (Section 8.1.7) separately controls the policy for using multiple paths.
section: 6.2.14
topics:
    - multipath
