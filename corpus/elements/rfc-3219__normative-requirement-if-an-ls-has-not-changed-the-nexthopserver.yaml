document: rfc-3219
kind: normative-requirement
summary: If an LS has not changed the NextHopServer attribute when propagating a route, it MUST NOT change the RoutedPath attribute. When it does change the NextHopServer and advertises to another ITAD, it MUST prepend its own ITAD to the RoutedPath.
section: 5.5.5
rfc2119_level: MUST NOT
topics:
    - routing
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
