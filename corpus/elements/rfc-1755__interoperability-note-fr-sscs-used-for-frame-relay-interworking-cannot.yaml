document: rfc-1755
kind: interoperability-note
summary: FR-SSCS (used for Frame Relay interworking) cannot be negotiated as an alternative to LLC encapsulation or VC-multiplexing; RFC 1490 over FR-SSCS is mutually exclusive with null-SSCS encapsulations. This creates interoperability restrictions between FR-SSCS and non-FR-SSCS ATM endsystems even when both carry IP.
section: Appendix D, Section 1
topics:
    - ip
