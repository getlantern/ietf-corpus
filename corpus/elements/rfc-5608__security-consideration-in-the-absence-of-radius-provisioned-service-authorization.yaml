document: rfc-5608
kind: security-consideration
summary: In the absence of RADIUS-provisioned service authorization, network management access may be granted to users who are properly authenticated but not authorized for SNMP management. In many RADIUS deployments, the backend database holds credentials for many user classes, only a small subset of which should have management access.
section: "2"
topics:
    - radius
    - snmp
    - security
