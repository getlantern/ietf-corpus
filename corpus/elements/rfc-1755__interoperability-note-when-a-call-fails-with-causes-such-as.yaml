document: rfc-1755
kind: interoperability-note
summary: 'When a call fails with causes such as #1 (unallocated number), #3 (no route), #17 (user busy), #27 (destination out of order), or #38 (network out of order), the situation SHOULD be treated as Network or Host Unreachable per RFC 1122. Retryable failures such as #37 (user cell rate unavailable), #49 (QoS unavailable), or #73 (unsupported traffic parameter combination) MAY prompt a retry with modified IEs.'
section: "8"
topics:
