document: rfc-3734
kind: security-consideration
summary: EPP provides only simple client authentication with identifiers and plain text passwords; a passive attack is sufficient to recover credentials, so TLS MUST be used to protect all EPP sessions over TCP and mutual TLS certificate authentication is required.
section: "8"
topics:
    - security
    - tls
    - crypto
