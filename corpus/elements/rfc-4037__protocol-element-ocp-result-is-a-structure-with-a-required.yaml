document: rfc-4037
kind: protocol-element
summary: 'OCP result is a structure with a required numeric status code and an optional informational reason string. Defined codes: 200 (OK), 206 (partial — premature dataflow termination), and 400 (failure — recipient must destroy all associated state). Unknown codes MUST be treated as 400.'
section: "10.10"
