document: rfc-895
kind: interoperability-note
summary: Unix 4.2bsd uses a non-standard Internet broadcast address with a host part of all zeroes rather than all ones, and either always or never uses trailers per interface depending on a boot-time option; both behaviors are expected to change in future releases.
section: Trailer Formats
