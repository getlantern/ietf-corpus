summary: Histogram bins of 1 ms were chosen for PDV composition under an implicit accuracy requirement that errors of a few milliseconds are acceptable when assessing a composed distribution quantile; very tight distributions with ranges on the order of a few milliseconds are not accurately represented at this resolution.
