document: rfc-5189
kind: interoperability-note
summary: MIDCOM semantics defines handling for IPv4, IPv6, TCP, and UDP only. Handling of other transport protocols such as SCTP is explicitly not defined in the semantics but may be supported by concrete protocol specifications that implement a superset of this semantics.
section: 2.3.6
topics:
