document: rfc-5293
kind: interoperability-note
summary: editheader does not directly affect S/MIME or OpenPGP signatures because those schemes include a separate copy of header fields inside the signed body part; however, software comparing inner (signed) and outer (editheader-modified) headers may behave differently.
