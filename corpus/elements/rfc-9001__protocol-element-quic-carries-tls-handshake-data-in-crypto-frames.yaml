document: rfc-9001
kind: protocol-element
summary: QUIC carries TLS handshake data in CRYPTO frames, each consisting of a contiguous block of handshake data identified by an offset and length. CRYPTO frames are carried at three of the four encryption levels (Initial, Handshake, and 1-RTT), omitting 0-RTT.
