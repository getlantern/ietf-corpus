document: rfc-6926
kind: wire-format
summary: 'The dhcp-state option (code 156) is a 1-octet field encoding eight possible address states: AVAILABLE (1), ACTIVE (2), EXPIRED (3), RELEASED (4), ABANDONED (5), RESET (6), REMOTE (7), TRANSITIONING (8). A server MUST implement at least AVAILABLE and ACTIVE.'
section: 6.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
