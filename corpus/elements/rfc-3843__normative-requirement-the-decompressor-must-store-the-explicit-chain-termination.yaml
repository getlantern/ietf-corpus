document: rfc-3843
kind: normative-requirement
summary: The decompressor must store the explicit chain termination indication (MSB of IP version field set to 1) in the context for correct decompression of subsequent headers, and must restore the IP version field to its original value in decompressed headers.
section: "3.1"
rfc2119_level: MUST
topics:
