document: rfc-5936
kind: normative-requirement
summary: An AXFR server MUST be able to handle multiple AXFR sessions on a single TCP connection, as well as other query/response transactions over the same connection. Restricting a TCP connection to a single AXFR session is incorrect.
section: 4.1.2
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
