document: rfc-8052
kind: security-consideration
summary: GDOI inherits security properties from RFC 6407 including authentication of participants, confidentiality of key management messages, source authentication, and defenses against man-in-middle, connection-hijacking, replay, reflection, and DoS attacks. It assumes the network may be under complete attacker control.
