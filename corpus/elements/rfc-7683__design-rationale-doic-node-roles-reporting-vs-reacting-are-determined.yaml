document: rfc-7683
kind: design-rationale
summary: DOIC node roles (reporting vs. reacting) are determined by message direction—request senders act as reacting nodes, answer senders act as reporting nodes—rather than by Diameter client/server roles. This allows agents and servers to simultaneously act as both roles and supports bidirectional Diameter applications.
