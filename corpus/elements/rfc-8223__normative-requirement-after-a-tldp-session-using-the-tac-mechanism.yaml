document: rfc-8223
kind: normative-requirement
summary: After a tLDP session using the TAC mechanism is established, both LSRs MUST distribute FEC label bindings for the negotiated applications only. An LSR operating in downstream on-demand mode MUST request FEC label bindings for the negotiated applications only.
section: "2.2"
rfc2119_level: MUST
