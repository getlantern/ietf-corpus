kind: design-rationale
summary: dsmonHostCtlTable supports IPv4/IPv6 prefix aggregation (configurable rightmost-bits masking) to dramatically reduce the number of host entries the agent must maintain, lowering CPU, memory, and polling overhead, though only one mask per address type is supported per collection.
