document: rfc-7844
kind: privacy-consideration
summary: Operating system fingerprinting via DHCP option sets, option ordering, and option values can reveal device type, vendor, and OS version, potentially identifying the device or revealing that the anonymity profile is in use. Clients should randomize option ordering and limit the options sent.
section: "2.4"
topics:
    - privacy
    - dns
