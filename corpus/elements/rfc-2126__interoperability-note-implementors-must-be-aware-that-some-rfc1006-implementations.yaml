document: rfc-2126
kind: interoperability-note
summary: Implementors must be aware that some RFC1006 implementations cannot perform class negotiation; a Class 2 Connect Request with no alternative class could be accepted with a Class 0 Connect Confirm, at which point the initiator should reject the CC as specified in ISO 8073.
