summary: The NHRP Device Capabilities extension has Type=0x0009, Length=0x0008, compulsory bit C=0, and two 32-bit capability fields (Source Capabilities and Target Capabilities), each with a single V-bit (LSB) indicating VPN-awareness (0=non-VPN-aware, 1=VPN-aware).
