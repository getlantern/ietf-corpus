document: rfc-3490
kind: protocol-element
summary: The ACE prefix is 'xn--' (or any capitalization thereof), two alphanumeric ASCII characters followed by two hyphen-minuses. ToASCII and ToUnicode MUST recognize it in a case-insensitive manner. Excluded historical prefixes include 'bl--', 'bq--', 'dq--', 'lq--', 'mq--', 'ra--', 'wq--', and 'zq--'.
section: "5"
topics:
