document: rfc-4837
kind: wire-format
summary: The LLID field is a 2-byte value (15-bit link ID plus one broadcast bit) embedded in the Ethernet preamble, marking destination port downstream and source port upstream. The broadcast LLID has value 0xffff, limiting virtual links per PON to 32768.
section: 2.2.5
extracted_by: claude-sonnet-4-6
