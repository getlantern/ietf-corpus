document: rfc-3046
kind: normative-requirement
summary: A relay agent adding a Relay Agent Information field SHALL add it as the last option (before 'End Option' 255, if present) in the DHCP options field of any recognized BOOTP or DHCP packet forwarded from client to server.
section: "2.1"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
