summary: 'New RFC 6881 requirement ED-52b: Endpoints that receive routing information with defaultRoute=''true'' MUST perform a LoST findService request if they have a location value. If LoST provides a route it MUST be used; otherwise the HELD default routing SHOULD be used.'
