document: rfc-4860
kind: security-consideration
summary: Compromising a single generic aggregate reservation can cause all aggregated E2E flows to operate unreserved, amplifying the impact of a denial-of-service compared to compromising a single E2E reservation. RSVP Authentication is recommended to mitigate this.
