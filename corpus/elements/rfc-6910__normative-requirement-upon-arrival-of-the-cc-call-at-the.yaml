document: rfc-6910
kind: normative-requirement
summary: Upon arrival of the CC call at the callee, the recall timer MUST be stopped. If the CC call succeeds, the callee's monitor MUST terminate the relevant subscription per RFC 6665 and MUST remove any associated presence event state used for suspend/resume.
section: "7.4"
rfc2119_level: MUST
topics:
    - sip
