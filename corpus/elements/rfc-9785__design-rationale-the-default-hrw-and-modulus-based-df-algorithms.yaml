document: rfc-9785
kind: design-rationale
summary: The default HRW and modulus-based DF algorithms are automated and IP-address-dependent, making them unsuitable for scenarios requiring deterministic, operator-controlled DF assignment. Preference-based algorithms allow operators to set explicit ordering without reconfiguring all PEs.
section: "1.1"
topics:
