document: rfc-9244
kind: normative-requirement
summary: The 'tsid' identifier MUST increase monotonically whenever new configuration parameters need to be conveyed; the rollover procedure from RFC 9132 Section 4.4.1 for 'mid' MUST be followed for 'tsid' rollover. DOTS servers MUST NOT reset 'tsid' because a session failed with a DOTS client.
section: 7.1.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
