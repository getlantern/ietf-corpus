document: rfc-3984
kind: protocol-element
summary: 'The payload format defines three packet structures identified by the first byte (NAL unit type): Single NAL Unit Packet (types 1-23), Aggregation Packets (STAP-A=24, STAP-B=25, MTAP16=26, MTAP24=27), and Fragmentation Units (FU-A=28, FU-B=29). Types 0 and 30-31 are undefined; receivers MUST ignore them.'
section: "5.2"
topics:
