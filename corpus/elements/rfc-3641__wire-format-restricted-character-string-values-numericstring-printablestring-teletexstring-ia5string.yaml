document: rfc-3641
kind: wire-format
summary: 'Restricted character string values (NumericString, PrintableString, TeletexString, IA5String, BMPString, UniversalString, UTF8String, etc.) are encoded as a UTF-8 string between double quotes. Embedded double quotes are escaped by repeating them. The ABNF rule is: StringValue = dquote *SafeUTF8Character dquote.'
section: "3.2"
topics:
