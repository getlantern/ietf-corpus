document: rfc-7652
kind: security-consideration
summary: The chosen EAP method must (1) be resilient to attacks in an insecure network, (2) provide user-identity confidentiality and protection against dictionary attacks, and (3) support session-key establishment. To limit DoS exposure, PCP devices SHOULD generate as little state as possible during the initial PA message exchanges.
section: "8"
topics:
