document: rfc-8159
kind: protocol-element
summary: The Session ID field (32 bits) is included for RFC 3931 compatibility. For static 1:1 mapping, it SHOULD be ignored upon receipt at endpoints supporting one-stage resolution, and it is RECOMMENDED to be set to all ones (0xFFFFFFFF). The Session ID of zero MUST NOT be used as it is reserved for L2TP control messages. The Session ID is unidirectional.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - vpn
