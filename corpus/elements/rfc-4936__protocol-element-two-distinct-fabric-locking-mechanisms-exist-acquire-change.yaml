document: rfc-4936
kind: protocol-element
summary: 'Two distinct Fabric-locking mechanisms exist: Acquire Change Authorization (ACA), used for server sessions (e.g., Enhanced Zoning), and Enhanced Acquire Change Authorization (EACA), which identifies the locking application via an Application_ID. Both are represented in the t11FLockTable.'
