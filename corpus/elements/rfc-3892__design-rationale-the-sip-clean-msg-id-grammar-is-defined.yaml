document: rfc-3892
kind: design-rationale
summary: The sip-clean-msg-id grammar is defined as the intersection of SIP gen-value and RFC 2822 msg-id expansions, with double-quotes replaced by angle brackets to derive the MIME Content-ID. This ensures the cid parameter is valid both as a SIP header parameter and as a MIME Content-ID reference.
