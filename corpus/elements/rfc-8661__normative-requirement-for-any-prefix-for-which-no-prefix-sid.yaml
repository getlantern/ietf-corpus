document: rfc-8661
kind: normative-requirement
summary: For any prefix for which no Prefix-SID Advertisement was received, an MCC applies SRMS mapping advertisements with the highest preference value. If an incoming label collision occurs as specified in RFC 8660, the steps in RFC 8660 MUST be applied to resolve the collision.
section: 3.2.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
