document: rfc-6073
kind: normative-requirement
summary: 'Interface parameters MUST be passed unchanged across the S-PE, with specific exceptions: the description string (0x03) MAY be modified or removed; the VCCV parameter (0x0C) CC Type bit 1 MUST be reset to 0, and CV/CC type bits MUST be reset to reflect S-PE capabilities.'
section: 7.4.2
rfc2119_level: MUST
