document: rfc-5627
kind: normative-requirement
summary: If the REGISTER request's Supported header includes 'gruu' and the registrar has at least one temporary GRUU for the instance, the registrar MUST add a 'temp-gruu' Contact header parameter with the most recently created temporary GRUU; similarly it MUST add 'pub-gruu' if a public GRUU is assigned.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
