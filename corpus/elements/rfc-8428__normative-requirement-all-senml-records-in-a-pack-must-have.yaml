document: rfc-8428
kind: normative-requirement
summary: All SenML Records in a Pack MUST have the same version number. Systems reading a SenML object MUST check the Base Version field; if the version number is larger than what the system understands, the system MUST NOT use that object.
section: "4.4"
rfc2119_level: MUST
topics:
