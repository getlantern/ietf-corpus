document: rfc-8081
kind: security-consideration
summary: Font data structures are extremely flexible and extensible (especially SFNT-based formats), making it easy to hide arbitrary binary data inside a font file. There is significant risk that this flexibility may be exploited to conceal malicious binary content disguised as font data components.
section: "3"
topics:
