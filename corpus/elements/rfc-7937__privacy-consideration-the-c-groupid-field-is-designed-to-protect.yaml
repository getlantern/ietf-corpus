document: rfc-7937
kind: privacy-consideration
summary: The c-groupid field is designed to protect end-user privacy by grouping clients into aggregates (e.g., by geolocation or AS number). Single-client aggregates are NOT RECOMMENDED because they are equivalent in identification power to a raw IP address and may constitute personally identifiable information under applicable law.
section: "7.3"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
