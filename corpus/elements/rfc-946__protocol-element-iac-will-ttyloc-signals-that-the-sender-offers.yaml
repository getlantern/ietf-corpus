document: rfc-946
kind: protocol-element
summary: IAC WILL TTYLOC signals that the sender offers to send TTYLOC information. IAC WON'T TTYLOC signals refusal to send. IAC DO TTYLOC requests receipt of the information. IAC DON'T TTYLOC signals refusal to receive.
section: "2"
