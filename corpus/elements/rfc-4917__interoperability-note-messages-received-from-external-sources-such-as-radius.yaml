document: rfc-4917
kind: interoperability-note
summary: Messages received from external sources such as RADIUS servers may arrive in non-UTF-8 encodings. The Home Agent is responsible for converting such messages to UTF-8 before including them in the extension, ensuring consistent encoding for the Mobile Node.
