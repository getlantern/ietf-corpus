document: rfc-4103
kind: normative-requirement
summary: The RTP timestamp for text/t140 MUST use a clock frequency of 1000 Hz. Sequential packets MUST NOT use the same timestamp. Because packets do not represent constant duration, the timestamp cannot be used to directly infer packet loss.
section: "3.5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
