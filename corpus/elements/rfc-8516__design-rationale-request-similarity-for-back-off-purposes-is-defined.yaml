document: rfc-8516
kind: design-rationale
summary: Request similarity for back-off purposes is defined as same method and Request-URI, but application logic may treat a sequence of requests with different URIs as similar if they form a series. Similarity is intentionally context-dependent and left to application logic.
section: "1"
topics:
    - congestion
