document: rfc-1284
kind: protocol-element
summary: dot3StatsAlignmentErrors (dot3StatsEntry 2) counts received frames that are not an integral number of octets in length and do not pass the FCS check. Frames with multiple error conditions are counted exclusively per the error status presented to the LLC, per IEEE 802.3 conventions.
section: "5.2"
