document: rfc-1390
kind: wire-format
summary: 'IP and ARP frames on FDDI are encapsulated in 802.2 LLC/SNAP headers totaling 8 octets: DSAP=170, SSAP=170, Control=3 (UI), 24-bit Organization Code=0, and a 16-bit EtherType (IP=2048, ARP=2054). This sits atop the FDDI MAC and physical layers.'
