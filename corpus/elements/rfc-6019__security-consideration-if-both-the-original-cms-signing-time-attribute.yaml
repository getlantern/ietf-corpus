document: rfc-6019
kind: security-consideration
summary: If both the original CMS signing-time attribute and the binary-signing-time attribute are present in signedAttrs or authAttrs, they MUST provide the same date and time. Only one of these attributes SHOULD be present.
section: "4"
rfc2119_level: MUST
