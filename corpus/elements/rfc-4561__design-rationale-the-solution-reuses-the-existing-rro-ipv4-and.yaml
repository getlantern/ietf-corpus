document: rfc-4561
kind: design-rationale
summary: The solution reuses the existing RRO IPv4 and IPv6 sub-object formats from RFC 3209 rather than defining new sub-object types, adding only a new flag bit (0x20). This minimizes protocol changes while solving the inter-domain MP identification problem.
