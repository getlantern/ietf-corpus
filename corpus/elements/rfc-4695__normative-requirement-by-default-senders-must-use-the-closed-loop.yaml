document: rfc-4695
kind: normative-requirement
summary: By default, senders MUST use the closed-loop sending policy for the recovery journal. A receiver MUST detect each RTP sequence number break; on packet loss, it MUST repair all indefinite artifacts. On out-of-order packets, the receiver MUST NOT take actions that introduce indefinite artifacts.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
