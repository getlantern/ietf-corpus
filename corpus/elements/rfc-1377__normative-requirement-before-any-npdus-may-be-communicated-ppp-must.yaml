document: rfc-1377
kind: normative-requirement
summary: Before any NPDUs may be communicated, PPP must reach the Network-Layer Protocol phase and the OSINLCP must reach the Opened state. Exactly one OSI NPDU is encapsulated in the Information field of a PPP frame where the Protocol field indicates hex 0023.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
