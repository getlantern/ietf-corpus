document: rfc-3820
kind: normative-requirement
summary: If the Proxy Issuer certificate has a KeyUsage extension, the Digital Signature bit MUST be asserted. This applies both to the issuer's certificate (Section 3.1) and during path validation when processing intermediate proxy certificates (Section 4.1.4).
section: "3.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
