summary: 'This document assigns two new DNS RR types in the IANA ''DOMAIN NAME SYSTEM PARAMETERS'' registry: NSEC3 = type 50 (Section 3) and NSEC3PARAM = type 51 (Section 4). It also registers DNSKEY algorithm aliases DSA-NSEC3-SHA1 (6) and RSASHA1-NSEC3-SHA1 (7).'
