document: rfc-4712
kind: interoperability-note
summary: Under the SNMP transport, the RCN (Record Count Number) supports a maximum of 16 sub-sessions (0–15); this limitation is explicitly imposed for compatibility with other transport protocols, constraining the SNMP mapping relative to the TCP PDU's 256-record maximum.
section: 2.3.1
