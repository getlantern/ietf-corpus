document: rfc-4430
kind: protocol-element
summary: 'KINK defines six message types: CREATE (1), DELETE (2), REPLY (3), GETTGT (4), ACK (5), and STATUS (6). Values 7–127 are reserved to IANA; 128–255 are for private use. All KINK exchanges follow a command/response pattern with an optional ACK.'
