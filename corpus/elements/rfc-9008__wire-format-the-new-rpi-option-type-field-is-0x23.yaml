document: rfc-9008
kind: wire-format
summary: 'The new RPI Option Type field is 0x23 (binary: act=00, chg=1, rest=00011). The previous value was 0x63 (act=01, chg=1, rest=00011). Both values occupy the single Option Type octet of the IPv6 Hop-by-Hop Options header RPL Option.'
