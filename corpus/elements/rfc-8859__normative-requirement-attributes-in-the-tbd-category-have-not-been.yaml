summary: Attributes in the TBD category have not been analyzed under the multiplexing framework and SHOULD NOT be multiplexed. Once specifications defining multiplexing/demultiplexing procedures for those protocols (e.g., MSRP, BFCP) become available, their category assignments may be revisited.
