document: rfc-7870
kind: interoperability-note
summary: The DS-Lite MIB requires an implementation of the IP Tunnel MIB (RFC 4087). Since DS-Lite tunnels are point-to-multipoint, tunnelIfEncapsMethod must be set to dsLite(17) and tunnelIfRemoteInetAddress must be set to '::' (not a specific remote address).
section: "5"
topics:
