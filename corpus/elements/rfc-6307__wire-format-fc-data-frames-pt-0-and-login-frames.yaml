summary: 'FC data frames (PT=0) and login frames (PT=1) are encapsulated as: FC PW Control Word | FC Encapsulation Header | 1-octet SOF Code | 3-octet Reserved | FC Frame payload | 4-octet CRC | 1-octet EOF Code | 3-octet Reserved. Maximum encapsulated FC frame size is 2164 octets.'
