document: rfc-5247
kind: protocol-element
summary: Multiple Peer-Ids may be exported by a single EAP method (e.g., from multiple certificate identities or from inner and outer tunnel exchanges). Where a key-deriving EAP method does not provide a Peer-Id, the EAP server cannot authenticate the peer identity; where a method does not generate keys, the Peer-Id MUST be the null string.
section: "2.4"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
