document: rfc-5305
kind: normative-requirement
summary: The up/down bit SHALL be set to 0 when a prefix is first injected into IS-IS, and MUST be set to 1 when a prefix is advertised from a higher level to a lower level (e.g., level 2 to level 1). Prefixes with the up/down bit set to 1 may only be advertised down the hierarchy.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
