summary: Documents defining new SDP protocol identifiers that layer additional protocols over TCP (e.g., TLS over TCP) are recommended to use the string 'TCP/' as a prefix (e.g., 'TCP/TLS'), and to reuse the 'setup' and 'connection' attributes where applicable.
