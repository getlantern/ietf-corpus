document: rfc-4656
kind: security-consideration
summary: Third-party DoS attacks are mitigated by the challenge-response authentication mechanism, which requires proof of a shared secret before the server allocates resources for test sessions. Servers SHOULD enforce connection timeouts (approximately 30 minutes) to bound memory use from incomplete control-message exchanges.
section: "6.2"
topics:
    - security
    - measurement
