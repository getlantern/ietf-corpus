document: rfc-3821
kind: security-consideration
summary: FCIP Entities MUST implement IPsec ESP for authentication and confidentiality, and IKE as the key management protocol. The TCP checksum, FCIP ones-complement checks, and FC CRC do not protect against malicious alteration because all can be recomputed by an adversary with IP-level access.
section: "9"
topics:
    - security
    - ipsec
    - tcp
