document: rfc-5786
kind: interoperability-note
summary: Current OSPF TE implementations (prior to this document) can only populate their Traffic Engineering Database with the router ID and local addresses of TE-enabled links; loopback and non-TE interface addresses are not distributed, preventing CSPF computation of MPLS TE LSPs to those addresses. This document extends RFC 3630 to close that gap.
section: "1.1"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
