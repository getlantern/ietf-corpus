document: rfc-4268
kind: protocol-element
summary: entStateLastChanged records the DateAndTime of the last change to any of entStateAdmin, entStateOper, entStateUsage, entStateAlarm, or entStateStandby. If no change since local system initialization, it holds the initialization time; if no change since entity insertion, it holds the insertion time.
