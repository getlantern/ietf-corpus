document: rfc-9636
kind: design-rationale
summary: Transition times SHOULD be at least -2^59 because this is the greatest negated power of 2 that predates the Big Bang, and avoiding earlier timestamps works around known TZif reader bugs relating to outlandishly negative timestamps.
