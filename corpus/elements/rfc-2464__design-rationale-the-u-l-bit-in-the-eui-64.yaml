document: rfc-2464
kind: design-rationale
summary: The U/L bit in the EUI-64-derived Interface Identifier is complemented so that a globally unique IPv6 Interface Identifier is signified by a 1, whereas IEEE 802 universally administered addresses use 0. This inversion aligns IPv6 semantics with the expectation that most auto-configured identifiers are globally unique.
section: "4"
topics:
