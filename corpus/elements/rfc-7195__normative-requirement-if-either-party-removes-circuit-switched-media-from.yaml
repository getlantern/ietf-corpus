document: rfc-7195
kind: normative-requirement
summary: If either party removes circuit-switched media from the session (port set to zero), it MUST terminate the circuit-switched bearer. To reestablish, a party MUST first remove the media, then use a new offer/answer with 'connection' set to 'new'.
section: 5.6.4
rfc2119_level: MUST
topics:
    - realtime
    - voip
