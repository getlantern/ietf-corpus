document: rfc-4439
kind: normative-requirement
summary: Fibre Channel requires that all switches in an operational Fabric be configured with the same Fabric name (t11FamFabricName) and that each Fabric have a unique name. Violation results in unspecified behavior for switches and associated management functions.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
