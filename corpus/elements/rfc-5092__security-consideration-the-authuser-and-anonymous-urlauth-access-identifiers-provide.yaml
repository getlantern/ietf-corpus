document: rfc-5092
kind: security-consideration
summary: The 'authuser' and 'anonymous' URLAUTH access identifiers provide weaker protection than 'user+' or 'submit+'. The 'authuser' identifier should be limited to content that may be disclosed to any authorized user; 'anonymous' should be used with extreme caution and only for content that may be disclosed to anyone.
section: "10.1"
topics:
    - email
    - security
