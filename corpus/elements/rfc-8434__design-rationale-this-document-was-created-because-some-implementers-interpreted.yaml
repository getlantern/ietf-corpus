document: rfc-8434
kind: design-rationale
summary: This document was created because some implementers interpreted Sections 12 and 13 of RFC 5661 as applying only to the file layout type, causing confusion about metadata server and data server responsibilities for new layout types. The absence of a separate Standards Track document for the file layout type (unlike block and object layouts) created the ambiguity.
section: "1"
topics:
    - process
