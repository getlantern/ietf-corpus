document: rfc-7937
kind: normative-requirement
summary: The c-groupid aggregation SHOULD be chosen so that each aggregate contains more than one client. When a single-client aggregate is used (e.g., for performance-based penalty analysis), the client identifier SHOULD be algorithmically generated in a way that is NOT linkable to the global addressing context, SHOULD vary over time, and its use as personally identifiable information is NOT RECOMMENDED.
section: 3.4.1
rfc2119_level: SHOULD
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
