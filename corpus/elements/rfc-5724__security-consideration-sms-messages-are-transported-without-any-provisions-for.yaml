document: rfc-5724
kind: security-consideration
summary: SMS messages are transported without any provisions for privacy or integrity. Unlike email, no framework exists for layering security features on top of the basic SMS infrastructure, so users should be aware of these inherent security problems.
section: "4"
topics:
    - security
