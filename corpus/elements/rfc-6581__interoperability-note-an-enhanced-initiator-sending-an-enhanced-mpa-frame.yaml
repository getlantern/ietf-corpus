document: rfc-6581
kind: interoperability-note
summary: An enhanced initiator sending an enhanced MPA frame to an unenhanced responder will receive a TCP connection close, because the unenhanced responder treats the frame as improperly formatted per RFC 5044. The initiator MAY then retry using unenhanced MPA if the application permits it.
section: "10"
topics:
    - realtime
