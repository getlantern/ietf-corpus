document: rfc-3543
kind: normative-requirement
summary: The Revocation Support Extension MUST be attached to a registration request or reply by any entity that wants to receive revocation messages. A non-co-located mobile node MUST NOT include a Revocation Support Extension in its registration.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
