document: rfc-9664
kind: normative-requirement
summary: Upon receiving a valid Refresh Request, the server MUST send an acknowledgment (Lease Update Response) containing the new lease duration. The server MUST NOT increment the zone serial number if the Refresh Request does not change zone contents.
section: "5.3"
rfc2119_level: MUST
topics:
    - dns
