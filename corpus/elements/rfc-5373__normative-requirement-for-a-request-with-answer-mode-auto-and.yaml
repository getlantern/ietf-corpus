document: rfc-5373
kind: normative-requirement
summary: 'For a request with Answer-Mode: Auto and the ''require'' parameter, the UAS MUST NOT allow manual answer; if it chooses not to accept automatically for any reason, it MUST reject the request, SHOULD use 403 Forbidden, and MAY include reason phrase ''automatic answer forbidden''.'
section: 4.5.1
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
