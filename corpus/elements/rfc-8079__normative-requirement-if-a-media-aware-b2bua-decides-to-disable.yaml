document: rfc-8079
kind: normative-requirement
summary: If a media-aware B2BUA decides to disable Reduced-Size RTCP on all sides (suggested when not all parties support it), it MUST NOT advertise support for Reduced-Size RTCP on either side, removing the 'rtcp-rsize' SDP attribute.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
