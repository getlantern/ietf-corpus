document: rfc-1752
kind: normative-requirement
summary: The Payload Length field value of 0 indicates that the actual packet length exceeds 64K bytes and the true length MUST be found in a Hop-by-Hop option, enabling 'jumbogram' payloads larger than 65535 octets.
