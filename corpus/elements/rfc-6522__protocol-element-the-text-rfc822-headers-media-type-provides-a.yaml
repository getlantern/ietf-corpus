kind: protocol-element
summary: 'The text/rfc822-headers media type provides a mechanism to label and return only the RFC 5322 header of a failed message. Required parameters: none. Optional parameters: none. Encoding: 7-bit is sufficient for normal mail headers; quoted-printable MAY be used if headers require encoding.'
