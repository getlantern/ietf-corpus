document: rfc-4522
kind: normative-requirement
summary: When all user attributes are requested (empty list or '*'), attributes of a syntax with the binary transfer requirement SHALL be returned in the binary form. Attributes without a binary transfer requirement and with a defined LDAP-specific encoding SHOULD NOT be returned in the binary form.
section: "6"
rfc2119_level: SHALL
topics:
