document: rfc-6994
kind: registry
summary: IANA created the 'TCP Experimental Option Experiment Identifiers (TCP ExIDs)' registry. It records 16-bit and 32-bit ExIDs with a reference for each entry. Registration is FCFS based on the first two bytes of the ExID. IANA records known duplicate uses to assist debugging.
