document: rfc-9240
kind: normative-requirement
summary: 'A filtered property map MUST return an appropriate ALTO error if the request is invalid: E_MISSING_FIELD if ''entities'' is absent; E_INVALID_FIELD_VALUE if an entity identifier''s domain is not in the resource capabilities or the identifier is not valid for that domain; E_INVALID_FIELD_VALUE if a property name is not in the capabilities. The ''value'' field of the error SHOULD indicate the offending value.'
section: "8.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
