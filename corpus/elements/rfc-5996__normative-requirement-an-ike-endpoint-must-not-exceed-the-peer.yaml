document: rfc-5996
kind: normative-requirement
summary: An IKE endpoint MUST NOT exceed the peer's stated window size for transmitted requests. It MUST retain each outstanding request until the response arrives, and MUST retain a copy of prior responses equal to its declared window size to support retransmission. Retransmission times MUST increase exponentially.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
