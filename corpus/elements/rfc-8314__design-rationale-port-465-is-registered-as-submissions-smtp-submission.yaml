document: rfc-8314
kind: design-rationale
summary: Port 465 is registered as 'submissions' (SMTP Submission over Implicit TLS) to align with widespread existing practice rather than assigning a new port. Registering a new port would create interoperability problems since a large number of clients and providers already use port 465 for this purpose.
section: "7.3"
topics:
    - email
    - tls
    - registry
