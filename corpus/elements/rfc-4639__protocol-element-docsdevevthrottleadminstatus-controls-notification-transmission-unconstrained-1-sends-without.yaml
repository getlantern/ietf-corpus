document: rfc-4639
kind: protocol-element
summary: 'docsDevEvThrottleAdminStatus controls notification transmission: unconstrained(1) sends without limit, maintainBelowThreshold(2) suppresses notifications above the rate threshold, stopAtThreshold(3) ceases transmission at threshold until reactivated by management, inhibited(4) suppresses all traps and syslog messages.'
