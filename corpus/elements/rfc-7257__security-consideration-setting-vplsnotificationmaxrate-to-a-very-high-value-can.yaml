document: rfc-7257
kind: security-consideration
summary: Setting vplsNotificationMaxRate to a very high value can cause a notification storm that may disrupt network service. Readable MIB objects may expose sensitive topology information and should be protected with access controls and encryption even for GET and NOTIFY operations.
section: "7"
