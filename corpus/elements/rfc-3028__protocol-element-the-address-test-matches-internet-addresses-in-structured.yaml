document: rfc-3028
kind: protocol-element
summary: The 'address' test matches Internet addresses in structured headers. Implementations MUST restrict it to headers containing addresses, but MUST include at minimum From, To, Cc, Bcc, Sender, Resent-From, and Resent-To.
section: "5.1"
topics:
