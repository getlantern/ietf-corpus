document: rfc-2622
kind: protocol-element
summary: AS-path regular expressions in RPSL filters are POSIX-compliant regular expressions over the alphabet of AS numbers, enclosed in '<' and '>'. In addition to standard operators (*, +, ?, {m,n}), RPSL defines homogeneous variants (~*, ~+, ~{m,n}) that require all occurrences to match the same AS number.
section: "5.4"
topics:
    - routing
    - bgp
