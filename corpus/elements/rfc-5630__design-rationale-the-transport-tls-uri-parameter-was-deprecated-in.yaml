document: rfc-5630
kind: design-rationale
summary: The transport=tls URI parameter was deprecated in RFC 3261 Section 26.2.2 because it only applies to a single hop, conflicting with SIPS's hop-by-hop security model. It remains in the ABNF solely for backward-compatible parsing.
section: 3.1.4
topics:
