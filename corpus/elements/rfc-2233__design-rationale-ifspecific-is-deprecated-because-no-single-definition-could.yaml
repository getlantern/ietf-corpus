document: rfc-2233
kind: design-rationale
summary: 'ifSpecific is deprecated because no single definition could be made both explicit and universally applicable: implementations varied between pointing to the MIB module OID, a table/entry OID, or an instance OID. The only unambiguous definition reduces ifSpecific to redundancy with ifType.'
section: 3.1.16
