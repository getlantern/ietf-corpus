document: rfc-8255
kind: normative-requirement
summary: If a From field is present inside a language message part, its value MUST include the same email address as the top-level From header, though the display name MAY be a localized version. On address mismatch, the top-level From value SHOULD be shown to the recipient.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
