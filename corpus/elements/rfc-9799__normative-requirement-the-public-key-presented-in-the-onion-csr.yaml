document: rfc-9799
kind: normative-requirement
summary: The public key presented in the onion-csr-01 CSR MUST be the public key corresponding to the '.onion' Special-Use Domain Name being validated, and MUST NOT be the same public key presented in the CSR to finalize the order. CAs MUST NOT validate the CSR subject's contents.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
