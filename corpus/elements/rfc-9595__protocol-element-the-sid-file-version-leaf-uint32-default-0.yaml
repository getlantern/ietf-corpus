document: rfc-9595
kind: protocol-element
summary: The 'sid-file-version' leaf (uint32, default 0) distinguishes updates to a '.sid' file for a given YANG module revision, such as updates from new processing or errata. Version numbering starts at 0 for each new YANG module revision and increases monotonically.
