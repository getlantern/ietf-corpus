document: rfc-1252
kind: protocol-element
summary: The ospfIfMetricTable (OID ospf 8) stores TOS-specific metrics for non-virtual interfaces, indexed by ospfIfMetricIpAddress, ospfIfMetricAddressLessIf, and ospfIfMetricTOS. The default TOS 0 metric is computed as 10^8 / ifSpeed; the value 0xFFFF means 'no route via this TOS'.
section: "5.8"
topics:
    - snmp
    - routing
