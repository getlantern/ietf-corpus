document: rfc-2789
kind: interoperability-note
summary: mtaGroupName for Internet MTAs should be the domain name; for OSI MTAs it should be the RFC 2253 string-encoded Distinguished Name; for X.400(1984) MTAs lacking a DN, the RFC 2156 'mta in globalid' syntax used in X400-Received fields may be used.
