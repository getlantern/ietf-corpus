document: rfc-1042
kind: normative-requirement
summary: When an IEEE 802 frame must be padded to meet minimum size requirements, padding octets of zero are appended. This padding is not part of the IP datagram and must not be included in the IP header total length field.
section: Frame Format and MAC Level Issues
rfc2119_level: SHOULD
topics:
    - ip
