document: rfc-3498
kind: protocol-element
summary: 'A mode mismatch (apsStatusCurrent bit ''modeMismatch'') occurs when there is a conflict between the local mode and received K2 information: K2 bit 5 (architecture) and K2 bits 6–8 (uni/bidirectional mode). This check applies to modes other than 1+1 unidirectional.'
