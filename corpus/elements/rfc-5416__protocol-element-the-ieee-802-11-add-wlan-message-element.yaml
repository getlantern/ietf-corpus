document: rfc-5416
kind: protocol-element
summary: 'The IEEE 802.11 Add WLAN message element (type 1024) defines a WLAN on the WTP and carries: Radio ID, WLAN ID (1–16), 16-bit Capability field, Key Index, Key Status (0=per-station RSN, 1=static WEP, 2=begin GTK rekey, 3=GTK rekey complete), Key Length, Group Key (WEP broadcast key, or 128-bit CCMP GTK, or 256-bit TKIP GTK), 48-bit Group TSC, QoS, Auth Type, MAC Mode (Local/Split), Tunnel Mode (Local Bridge/802.3/802.11), Suppress SSID, and SSID.'
section: "6.1"
topics:
    - security
    - crypto
