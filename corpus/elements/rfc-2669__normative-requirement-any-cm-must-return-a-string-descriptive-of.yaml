document: rfc-2669
kind: normative-requirement
summary: Any CM MUST return a string descriptive of the current software load in docsDevSwCurrentVers. For a CMTS, this object SHOULD contain a human-readable vendor-specific designation of chassis or control-processor software, or an empty string if neither applies.
