document: rfc-8012
kind: normative-requirement
summary: An IP-based load balancer that does not push ELI/EL MUST set {L=0, E=0} in DS Flags, MUST reply with Type {0} if it receives Type {9}, and MUST reply using Type {10} (omitting Label and Associated Label sections) if it receives Type {10}.
section: "8.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
