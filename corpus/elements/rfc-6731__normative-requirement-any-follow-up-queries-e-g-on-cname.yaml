document: rfc-6731
kind: normative-requirement
summary: Any follow-up queries (e.g., on CNAME or DNAME) MUST continue to use the same interface or RDNSS as the original query, irrespective of the RDNSS selection settings on any other interface, to prevent referral failures.
section: "4.7"
rfc2119_level: MUST
topics:
