document: rfc-1827
kind: protocol-element
summary: 'The Authentication Header (AH) may be combined with ESP in two ways: AH outside ESP authenticates the entire datagram including encrypted portions; or AH inside Tunnel-mode ESP authenticates only the encrypted inner datagram. The placement of AH unambiguously identifies what is being authenticated.'
section: "4.3"
topics:
    - ipsec
    - vpn
    - security
