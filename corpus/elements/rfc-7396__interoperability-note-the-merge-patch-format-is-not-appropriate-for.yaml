document: rfc-7396
kind: interoperability-note
summary: The merge patch format is not appropriate for all JSON syntaxes. It cannot express setting a member to the JSON null value, nor can it patch arrays partially; alternative patch formats (such as JSON Patch, RFC 6902) should be used in those cases.
section: "1"
topics:
