document: rfc-6519
kind: normative-requirement
summary: Upon the B4 receiving an AFTR tunnel name different from the currently used one (via Reconfigure), the B4 MUST terminate the current DS-Lite tunnel and MUST establish a new one with the specified AFTR.
section: "4.1"
rfc2119_level: MUST
