document: rfc-7597
kind: normative-requirement
summary: 'The BR MUST be configured with the BR and CE with the same MAP elements for a given domain: Basic Mapping Rule (and optional FMRs including Rule IPv6 prefix, Rule IPv4 prefix, EA-bit length) and hub-and-spoke vs. mesh mode. The CE additionally MUST be configured with the IPv6 address(es) of the MAP BR.'
section: "7"
rfc2119_level: MUST
topics:
