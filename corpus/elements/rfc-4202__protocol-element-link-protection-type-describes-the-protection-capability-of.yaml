document: rfc-4202
kind: protocol-element
summary: 'Link Protection Type describes the protection capability of a TE link using six values in ascending order of protection: Extra Traffic, Unprotected, Shared, Dedicated 1:1, Dedicated 1+1, and Enhanced (e.g., 4-fiber BLSR/MS-SPRING). If a Link State Advertisement does not carry this field, the Link Protection Type is considered unknown.'
section: "2.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
