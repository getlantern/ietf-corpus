document: rfc-6733
kind: protocol-element
summary: 'The Command Flags byte carries four defined bits: R (set = Request, cleared = Answer), P (set = message MAY be proxied/relayed/redirected; cleared = MUST be processed locally), E (set = protocol error in message; MUST NOT be set in requests), and T (set = potentially retransmitted after link failover for duplicate detection). Remaining four bits are reserved, MUST be zero, and MUST be ignored by the receiver.'
section: "3"
