document: rfc-9483
kind: security-consideration
summary: The entropy of shared secret information is crucial for the level of protection when using MAC-based protection. The shared secret MUST be established out of band (e.g., by a service technician during initial local configuration). Further guidance is in CMP Updates (RFC 9480).
section: 4.1.5
topics:
    - security
    - crypto
    - pkix
