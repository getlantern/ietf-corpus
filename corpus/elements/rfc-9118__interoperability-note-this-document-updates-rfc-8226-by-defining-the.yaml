document: rfc-9118
kind: interoperability-note
summary: This document updates RFC 8226 by defining the EnhancedJWTClaimConstraints extension as a superset of the original JWTClaimConstraints extension. The two extensions are mutually exclusive within a single certificate; implementers must choose one based on whether mustExclude semantics are required.
