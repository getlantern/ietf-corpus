document: rfc-4344
kind: normative-requirement
summary: SSH implementations SHOULD rekey at least once every 2**32 outgoing packets. After a key exchange, an SSH implementation SHOULD NOT send more than 2**32 packets before rekeying again.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
