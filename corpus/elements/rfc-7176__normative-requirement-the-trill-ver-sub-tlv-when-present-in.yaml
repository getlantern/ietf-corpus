document: rfc-7176
kind: normative-requirement
summary: The TRILL-VER sub-TLV, when present in a Router Capability TLV, MUST occur in LSP number zero for the originating IS; occurrences in other fragments are ignored. If multiple instances are in LSP zero, the minimum supported version and intersection of capabilities are used.
section: 2.3.1
rfc2119_level: MUST
topics:
    - routing
