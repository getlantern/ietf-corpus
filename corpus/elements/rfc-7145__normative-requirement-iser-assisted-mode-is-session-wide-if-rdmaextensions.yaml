document: rfc-7145
kind: normative-requirement
summary: 'iSER-assisted mode is session-wide: if RDMAExtensions=''Yes'' was negotiated on the leading connection, all subsequent connections of the same session MUST enable iSER-assisted mode without re-exchanging the RDMAExtensions key.'
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
