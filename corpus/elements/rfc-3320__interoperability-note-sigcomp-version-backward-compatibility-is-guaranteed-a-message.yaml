document: rfc-3320
kind: interoperability-note
summary: 'SigComp version backward compatibility is guaranteed: a message that decompresses successfully on Version 0x01 will continue to decompress on upgraded versions. Upgraded versions may add UDVM instructions without affecting v0x01-compatible messages. Reserved UDVM memory addresses (10–31) may be assigned in future versions.'
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
