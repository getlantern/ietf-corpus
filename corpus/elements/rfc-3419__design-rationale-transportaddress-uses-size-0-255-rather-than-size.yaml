document: rfc-3419
kind: design-rationale
summary: TransportAddress uses SIZE (0..255) rather than SIZE (1..255) as in TAddress, to allow representation of unknown transport addresses. The sub-type TransportAddress (SIZE (1..255)) is intentionally identical to TAddress for backward compatibility.
section: 3.1.1
