document: rfc-9574
kind: interoperability-note
summary: 'RNVEs (non-AR NVEs) ignore the new PMSI Tunnel Attribute flags and the Assisted Replication Tunnel type (0x0A) because they are unaware of the new definitions. They also ignore Leaf A-D routes due to the IP-address-specific Route Target. This provides backward compatibility: a BD may contain both AR-capable and non-AR NVEs simultaneously.'
section: "5.3"
topics:
    - mpls
    - routing
