document: rfc-4575
kind: security-consideration
summary: A focus MUST support participant privacy requests. For any participant requesting privacy, no identity information SHOULD be revealed in included URIs; the .invalid TLD and anonymous URI generation per RFC 3323 MUST be applied.
section: "8.2"
topics:
