document: rfc-7011
kind: protocol-element
summary: The Options Template Record extends the Template concept with Scope Fields that provide context for the reported Data Records. The Scope Field Count specifies that the first N Field Specifiers are scope fields. At a minimum, Collecting Processes SHOULD support observationDomainId, exportingProcessId, meteringProcessId, templateId, lineCardId, exporterIPv4Address, exporterIPv6Address, and ingressInterface as scope.
section: 3.4.2
topics:
    - measurement
