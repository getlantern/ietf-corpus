document: rfc-3281
kind: protocol-element
summary: The AC Targeting extension (id-ce-targetInformation, { id-ce 55 }) restricts AC use to named servers/services via a SEQUENCE OF Targets containing targetName or targetGroup GeneralNames. An honest AC verifier not among the named targets MUST reject the AC; the extension MUST be critical.
section: 4.3.2
topics:
    - pkix
    - security
