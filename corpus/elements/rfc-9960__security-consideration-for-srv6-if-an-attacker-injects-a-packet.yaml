document: rfc-9960
kind: security-consideration
summary: For SRv6, if an attacker injects a packet into a multipoint service with the source address of a node and with an extension header using an unknown option type marked as mandatory, a large number of ICMPv6 Parameter Problem messages can cause a denial-of-service attack on the source node.
section: "7"
topics:
