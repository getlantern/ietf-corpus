document: rfc-7530
kind: protocol-element
summary: The COMPOUND procedure is the primary RPC procedure in NFSv4 (alongside NULL). Operations within a COMPOUND request are evaluated in order; once any operation returns a failing result, evaluation stops and all results to that point are returned. This allows combining LOOKUP, OPEN, and READ into a single RPC without prior server contact.
section: "14.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
