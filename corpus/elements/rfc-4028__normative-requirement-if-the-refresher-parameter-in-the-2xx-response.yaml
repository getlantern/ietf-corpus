document: rfc-4028
kind: normative-requirement
summary: 'If the refresher parameter in the 2xx response is ''uac'', the UAS MUST place a Require header field with value ''timer'' into the response. If the refresher is ''uas'' and the UAC indicated support, the UAS SHOULD include Require: timer.'
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
