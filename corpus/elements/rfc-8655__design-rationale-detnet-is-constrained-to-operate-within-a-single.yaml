document: rfc-8655
kind: design-rationale
summary: DetNet is constrained to operate within a single administrative domain (or a closed group of administrative domains such as campus networks and private WANs) and is explicitly not intended for large groups of domains such as the Internet. This constraint simplifies security and resource-allocation assumptions.
section: "1"
topics:
