document: rfc-2581
kind: state-machine
summary: TCP uses slow start when cwnd < ssthresh and congestion avoidance when cwnd > ssthresh; when equal, either algorithm may be used. Slow start increments cwnd by at most SMSS per ACK; congestion avoidance increments by approximately 1 full-sized segment per RTT.
section: "3.1"
topics:
    - tcp
    - congestion
