document: rfc-3057
kind: security-consideration
summary: Section 6 identifies threats to IUA deployments including unauthorized message injection, masquerade attacks on the SG-MGC association, and denial of service. SCTP's built-in resistance to flooding and masquerade attacks is cited as a mitigation, and use of IPsec or TLS is recommended to protect confidentiality of signaling traffic over IP.
section: "6"
topics:
