document: rfc-8679
kind: protocol-element
summary: A 'context label' is a non-reserved MPLS label assigned by a protector P to a context ID. In the data plane it represents the context ID and indicates E's dedicated label space and IP address space on P; the bypass tunnel is always a UHP tunnel whose incoming label on P is the context label.
section: "5.7"
topics:
