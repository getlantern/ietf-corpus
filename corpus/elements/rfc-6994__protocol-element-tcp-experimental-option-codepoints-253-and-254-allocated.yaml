document: rfc-6994
kind: protocol-element
summary: TCP experimental option codepoints 253 and 254 (allocated by RFC 4727) are extended with an Experiment Identifier (ExID) field placed immediately after the Kind and Length bytes. The ExID is either 16 or 32 bits and differentiates concurrent experiments sharing the same codepoint.
