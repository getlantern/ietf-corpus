document: rfc-5059
kind: normative-requirement
summary: The RP-Holdtime field in a BSM MUST be larger than BS_Period and SHOULD be larger than 2.5 times BS_Period to allow for Bootstrap message loss. The exception is a holdtime of zero, used to immediately withdraw mappings.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
