document: rfc-9347
kind: wire-format
summary: 'The congestion-control AGGFRAG_PAYLOAD payload uses a 24-octet header: Sub-Type (1 octet, value 1), 6-bit Reserved, P flag (PLMTUD probe in progress), E flag (CE ECN used), BlockOffset (16-bit), LossEventRate (32-bit), RTT (22-bit, microseconds), Echo Delay (21-bit), Transmit Delay (21-bit), TVal (32-bit opaque), and TEcho (32-bit opaque), followed by DataBlocks.'
section: 6.1.2
topics:
    - ipsec
    - vpn
    - congestion
