document: rfc-4175
kind: interoperability-note
summary: RFC 3497 (SMPTE 292M RTP payload) defines a circuit emulation at a fixed 1.485 Gbps targeting broadcast equipment interoperability; this format instead provides flexible native packetization at variable data rates transporting only active pixels, and is not interoperable with RFC 3497 equipment.
