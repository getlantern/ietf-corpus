document: rfc-8561
kind: design-rationale
summary: The interface protection data nodes are broken out from the Microwave Radio Link module into a separate, generic YANG module (ietf-interface-protection) so that the protection functionality can be reused by other interface types beyond microwave. This separation avoids coupling a general mechanism to a domain-specific module.
section: "1"
topics:
