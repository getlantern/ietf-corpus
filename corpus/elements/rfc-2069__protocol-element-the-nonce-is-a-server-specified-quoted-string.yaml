document: rfc-2069
kind: protocol-element
summary: The nonce is a server-specified quoted-string, recommended to be base64 or hexadecimal data. The recommended construction is H(client-IP ":" timestamp ":" private-key), binding the nonce to the requesting IP and a validity window without requiring server state between transactions.
