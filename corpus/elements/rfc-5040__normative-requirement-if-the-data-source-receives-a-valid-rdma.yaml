document: rfc-5040
kind: normative-requirement
summary: If the Data Source receives a valid RDMA Read Request, it MUST respond with a valid RDMA Read Response. If the RDMA Read Message Size field is zero, the Data Source MUST NOT validate the STag and Tagged Offset, and MUST respond with a zero-length RDMA Read Response Message.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
