document: rfc-7024
kind: protocol-element
summary: Each V-hub is provisioned with a unique per-VPN export Route Target called RT-VH, in addition to the shared RT-VPN carried on all VPN-IP routes. RT-VH is attached to VPN-IP default routes and I-PMSI/S-PMSI/SA A-D routes to restrict their import to only the V-spokes associated with that V-hub.
section: "3"
