document: rfc-8551
kind: normative-requirement
summary: When no recipient capabilities or S/MIME version are known, the sending agent SHOULD use AES-256 GCM as the default content encryption algorithm; if not using AES-256 GCM in that case, it SHOULD fall back to AES-128 CBC.
section: 2.7.1.2
rfc2119_level: SHOULD
topics:
