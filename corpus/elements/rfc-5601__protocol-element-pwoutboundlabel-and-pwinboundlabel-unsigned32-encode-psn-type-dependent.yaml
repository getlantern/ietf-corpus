document: rfc-5601
kind: protocol-element
summary: 'pwOutboundLabel and pwInboundLabel (Unsigned32) encode PSN-type-dependent identifiers: the 20-bit PW label for MPLS/MPLS-over-IP/GRE, the 32-bit Session ID for L2TP, and the UDP port number for IP PSN. A value of 0xFFFFFFFF indicates the label is not yet known (signaling in progress).'
