document: rfc-6156
kind: protocol-element
summary: 'For IPv4-to-IPv6 translations, the relay translates Traffic Class, Flow Label (preferred: set to 0), Hop Limit, and Fragmentation per RFC 6145. Extension headers are stripped except for the Fragment Header. The DONT-FRAGMENT attribute MUST be ignored.'
