document: rfc-3611
kind: protocol-element
summary: The thinning parameter T (4 bits) restricts Loss RLE and related blocks to report only packets whose sequence numbers are multiples of 2^T (T=0 means every packet; T=15 means one in 32,768), limiting block size at the cost of coverage granularity.
section: "4.1"
topics:
