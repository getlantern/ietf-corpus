document: rfc-8527
kind: protocol-element
summary: 'Support for the ''with-defaults'' query parameter on the operational state datastore is OPTIONAL and identified by capability URI urn:ietf:params:restconf:capability:with-operational-defaults:1.0. Its semantics differ from non-operational datastores: values returned are ''in use'' values regardless of YANG schema defaults.'
section: 3.2.1
topics:
