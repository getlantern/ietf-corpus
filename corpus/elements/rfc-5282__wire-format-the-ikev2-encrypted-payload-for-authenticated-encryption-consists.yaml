document: rfc-5282
kind: wire-format
summary: 'The IKEv2 Encrypted Payload for authenticated encryption consists of: Next Payload (1 octet), C bit + RESERVED (1 octet), Payload Length (2 octets), followed by an Initialization Vector field (length specified by the algorithm) and a Ciphertext field that incorporates the integrity check. No separate ICV field is present.'
