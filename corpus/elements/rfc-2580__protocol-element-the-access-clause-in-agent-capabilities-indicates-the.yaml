document: rfc-2580
kind: protocol-element
summary: The ACCESS clause in AGENT-CAPABILITIES indicates the agent provides less than the maximal access level. The value 'not-implemented' indicates the agent does not implement the object or notification at all, equivalent in ordering to 'not-accessible'.
