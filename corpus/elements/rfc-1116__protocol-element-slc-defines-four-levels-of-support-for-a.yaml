document: rfc-1116
kind: protocol-element
summary: 'SLC defines four levels of support for a special character function. SLC_NOSUPPORT (0): function not supported. SLC_CANTCHANGE (1): supported but value is fixed. SLC_VALUE (2): supported with a settable character value. SLC_DEFAULT (3): use the system default on the other side.'
