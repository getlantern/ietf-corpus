document: rfc-8661
kind: normative-requirement
summary: An SR node having LDP neighbors MUST create LDP bindings for each Prefix-SID learned in the SR domain by treating SR-learned labels as if they were learned through an LDP neighbor, and must stitch the incoming LDP label to the outgoing SR label for each FEC.
section: 3.1.1
rfc2119_level: MUST
topics:
