document: rfc-3744
kind: normative-requirement
summary: Each element in DAV:current-user-privilege-set MUST identify a non-abstract privilege from the resource's DAV:supported-privilege-set. Abstract privileges MUST NOT appear in the current-user-privilege-set.
section: "5.4"
rfc2119_level: MUST
