document: rfc-7001
kind: protocol-element
summary: SMTP AUTH (method 'auth') result values are none (not attempted), pass (successfully authenticated), fail (authentication attempted but unsuccessful), temperror, and permerror. Agents SHOULD treat 'fail' and 'temperror' as equivalent for the purpose of message authentication decisions.
section: 2.6.4
topics:
    - email
    - security
