document: rfc-2435
kind: design-rationale
summary: The Fragment Offset field is included in the RTP/JPEG header (in addition to RTP sequence numbers) to enable efficient single-copy reassembly in the presence of misordered packets, and to detect a complete frame even if the previous frame's last packet (with the marker bit) was dropped.
section: "4.3"
topics:
