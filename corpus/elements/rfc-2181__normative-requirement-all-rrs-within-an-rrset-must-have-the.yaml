document: rfc-2181
kind: normative-requirement
summary: All RRs within an RRSet must have the same TTL value. The use of differing TTLs in an RRSet is deprecated. In no case may a server send an RRSet with TTLs not all equal.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
