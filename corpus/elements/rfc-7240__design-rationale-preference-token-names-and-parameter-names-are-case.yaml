document: rfc-7240
kind: design-rationale
summary: Preference token names and parameter names are case-insensitive, while values are case-sensitive. Empty or zero-length values on preference tokens and parameters are equivalent to no value being specified, so `foo; bar`, `foo; bar=""`, and `foo=""; bar` are all equivalent.
section: "2"
topics:
