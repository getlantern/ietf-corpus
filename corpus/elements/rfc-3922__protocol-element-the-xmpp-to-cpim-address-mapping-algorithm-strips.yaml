document: rfc-3922
kind: protocol-element
summary: 'The XMPP-to-CPIM address mapping algorithm strips the resource identifier, optionally applies Nodeprep/STRINGPREP canonicalization, translates special characters (#26;→&, #27;→'', #2f;→/), percent-encodes remaining non-safe bytes, and prepends ''im:'' (for messages) or ''pres:'' (for presence) as the URI scheme.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
