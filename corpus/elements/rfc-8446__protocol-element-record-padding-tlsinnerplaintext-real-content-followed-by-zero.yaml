document: rfc-8446
kind: protocol-element
summary: 'Record padding: TLSInnerPlaintext = real content followed by zero or more zero bytes, followed by the actual ContentType byte. The AEAD covers all of this, hiding the true content type and allowing padding to obscure record lengths against traffic analysis.'
section: "5.4"
topics:
