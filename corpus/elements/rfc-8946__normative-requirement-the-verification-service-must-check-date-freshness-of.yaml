document: rfc-8946
kind: normative-requirement
summary: The verification service MUST check date freshness of the outermost "div" PASSporT per RFC 8224 Section 6.2 Step 4, and MUST inspect and validate the signatures on every PASSporT object in the chain from the outermost "div" PASSporT to the innermost PASSporT.
section: "4.2"
rfc2119_level: MUST
topics:
