document: rfc-5122
kind: normative-requirement
summary: When data is routed to an XMPP entity on an XMPP network (e.g., in 'to' or 'from' attributes of XML stanzas), the entity MUST be addressed as <[node@]domain[/resource]> without any prepended URI scheme.
section: "2.1"
rfc2119_level: MUST
topics:
    - realtime
