document: rfc-9056
kind: normative-requirement
summary: A DetNet relay node acting as ingress T-PE that sends a DetNet IP flow over a DetNet MPLS network MUST map the DetNet IP flow (as identified per RFC 8939) into a single MPLS DetNet flow and MUST process it in accordance with the procedures defined in RFC 8964.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
