document: rfc-1697
kind: normative-requirement
summary: rdbmsDbParamSubIndex and rdbmsSrvParamSubIndex values of zero are not permitted. Single-valued parameters use subindex 1; multi-valued parameters (e.g., members of a DBA group) must use multiple rows with distinct positive subindex values.
section: "4"
rfc2119_level: MUST NOT
