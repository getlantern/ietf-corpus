document: rfc-3859
kind: design-rationale
summary: The subscription-identifier (SubscriptID) is potentially long-lived, so its values should be intrinsically globally unique over time — not merely unique among operations sent to or from a particular WATCHER and PRESENTITY pair. This prevents collisions across the lifetime of a presence service.
section: "3.4"
topics:
    - realtime
    - sip
