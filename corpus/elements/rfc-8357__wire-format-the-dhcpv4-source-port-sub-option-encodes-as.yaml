document: rfc-8357
kind: wire-format
summary: 'The DHCPv4 Source Port Sub-option encodes as two 8-bit fields: SubOpt Code = 19 (1 octet) and Len = 0 (1 octet), with no value payload. Its presence in the Relay Agent Information option signals use of a non-standard relay source port.'
