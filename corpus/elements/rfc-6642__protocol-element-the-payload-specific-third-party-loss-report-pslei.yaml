document: rfc-6642
kind: protocol-element
summary: The Payload-Specific Third-Party Loss Report (PSLEI) is identified by PT=PSFB and FMT=8, used to suppress FIR and PLI feedback messages. The 'SSRC of media source' field is not used and SHALL be set to 0; the relevant media source SSRCs are in FCI entries.
