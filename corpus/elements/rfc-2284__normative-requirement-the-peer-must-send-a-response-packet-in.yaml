document: rfc-2284
kind: normative-requirement
summary: The peer MUST send a Response packet in reply to a Request. Responses MUST only be sent in reply to a received Request and MUST never be retransmitted on a timer. The Identifier field of the Response MUST match that of the Request.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
