document: rfc-9555
kind: normative-requirement
summary: If the JSContact Name object's full property is set, implementations MUST use its value for the vCard FN property. If full is absent, implementations SHOULD derive it from components and MUST set the DERIVED parameter on FN. If full cannot be derived, FN MUST be set to the empty value.
section: "3.1"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
