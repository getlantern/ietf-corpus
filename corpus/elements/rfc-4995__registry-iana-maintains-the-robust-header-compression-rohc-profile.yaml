document: rfc-4995
kind: registry
summary: IANA maintains the 'RObust Header Compression (ROHC) Profile Identifiers' registry. New assignments require Specification Required; LSBs 0-127 are reserved for IETF standards-track, 128-254 for other specifications, 255 reserved for future extensibility. Allocated identifiers include 0x0000 (uncompressed, RFC 4995) through 0x0008 (UDP-Lite, RFC 4019).
