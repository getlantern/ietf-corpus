document: rfc-9260
kind: design-rationale
summary: 'SCTP provides multiple independent streams within a single association to avoid head-of-line blocking: while one stream waits for the next in-sequence message, delivery from other streams proceeds unimpeded. This was a primary motivation over TCP for PSTN signaling transport.'
section: "1.1"
topics:
    - sctp
