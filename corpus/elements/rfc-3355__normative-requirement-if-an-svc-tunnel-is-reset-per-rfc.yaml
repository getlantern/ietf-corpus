document: rfc-3355
kind: normative-requirement
summary: If an SVC tunnel is reset per RFC 2661 section 4.1, both ends MUST clear the SVC; any user sessions on the tunnel will be terminated. Either end MAY attempt to re-establish the tunnel upon receipt of a new client request.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
