document: rfc-7181
kind: interoperability-note
summary: Different routers within the same MANET MAY use different MPR selection algorithms without loss of interoperability, provided each algorithm satisfies the required coverage property (all symmetric 2-hop neighbors reachable through selected MPRs with appropriate path metrics).
section: "4.1"
topics:
