document: rfc-9733
kind: security-consideration
summary: Even when the registrar delegates RA functions to a backend system, it must still participate in the decision to accept or decline a pledge joining the domain. A pledge must not be able to circumvent the registrar to obtain an LDevID certificate. Acceptable mechanisms include implicit consent, out-of-band signaling, in-channel consent messages, or the registrar co-signing the enrollment request.
section: "7"
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
