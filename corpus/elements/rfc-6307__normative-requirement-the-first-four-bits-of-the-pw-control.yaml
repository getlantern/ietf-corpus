document: rfc-6307
kind: normative-requirement
summary: The first four bits of the PW Control Word MUST be set to 0 by the ingress PE to indicate PW data. Packets with PT field values other than 0, 1, 2, or 6 are not valid and MUST be discarded by the receiving FC PW PE.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
