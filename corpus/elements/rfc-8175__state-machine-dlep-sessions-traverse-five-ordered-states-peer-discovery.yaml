document: rfc-8175
kind: state-machine
summary: 'DLEP sessions traverse five ordered states: Peer Discovery → Session Initialization → In-Session → Session Termination → Session Reset. Modems MUST support Peer Discovery; routers using preconfigured TCP addresses start at Session Initialization. Unexpected TCP termination while not in Session Reset MUST immediately force a transition to Session Reset.'
section: "7"
topics:
    - routing
