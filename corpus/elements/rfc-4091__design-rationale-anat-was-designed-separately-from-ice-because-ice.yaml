document: rfc-4091
kind: design-rationale
summary: ANAT was designed separately from ICE because ICE only allows a single primary address when the peer does not support ICE, which would relegate certain address types (e.g., IPv6) to only be a secondary alternate. ANAT avoids this asymmetry.
section: "1.1"
topics:
