document: rfc-5605
kind: normative-requirement
summary: In transparent cell transport mode, the value of pwAtmClpQosMapping MUST be false(2). In other cases, the object can be changed at any time. This prevents CLP bits from being mapped to PSN QoS fields when cell transparency is required.
section: "9"
rfc2119_level: MUST
