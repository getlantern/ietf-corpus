document: rfc-6333
kind: design-rationale
summary: DS-Lite decouples IPv6 deployment in the service provider access network from IPv6 deployment in the global Internet and customer applications. Customers receive only IPv6 from the ISP, while IPv4 service is transparently provided through the tunnel and AFTR, allowing incremental IPv6 rollout without waiting for end-to-end IPv6 readiness.
