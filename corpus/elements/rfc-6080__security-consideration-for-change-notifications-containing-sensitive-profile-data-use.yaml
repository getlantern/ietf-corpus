document: rfc-6080
kind: security-consideration
summary: For change notifications containing sensitive profile data, use of the SIP Identity header per RFC 4474 is RECOMMENDED. If the NOTIFY contact URI is not SIPS, the PDS MUST use content indirection for sensitive data; the PDS MUST also use content indirection when the enrollment was unauthenticated.
section: 5.2.3
topics:
    - sip
    - security
