document: rfc-9090
kind: normative-requirement
summary: A byte string tagged with 111, 110, or 112 MUST be syntactically valid contents for a BER representation of an object identifier, conforming to X.690 Clauses 8.19 or 8.20 as applicable. A tag with content not conforming to the applicable regular expression is invalid.
section: "2.1"
rfc2119_level: MUST
topics:
    - cbor
