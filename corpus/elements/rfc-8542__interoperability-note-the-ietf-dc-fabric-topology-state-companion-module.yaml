document: rfc-8542
kind: interoperability-note
summary: The ietf-dc-fabric-topology-state companion module (Appendix A) is provided for non-NMDA-compliant implementations; it mirrors ietf-dc-fabric-topology but augments ietf-network-state and contains only read-only state data. It SHOULD NOT be supported by implementations that support NMDA (RFC 8342).
section: A
rfc2119_level: SHOULD NOT
topics:
