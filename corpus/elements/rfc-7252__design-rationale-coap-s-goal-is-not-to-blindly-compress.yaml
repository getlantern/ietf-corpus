document: rfc-7252
kind: design-rationale
summary: CoAP's goal is not to blindly compress HTTP but to realize a subset of REST optimized for M2M and constrained environments, adding features absent from HTTP such as built-in multicast support, asynchronous exchanges, and very low overhead. Mapping to and from HTTP is straightforward but CoAP method semantics are 'almost, but not entirely unlike' those of HTTP and must be read independently.
section: "1"
topics:
