document: rfc-4513
kind: interoperability-note
summary: The wildcard '*' character is permitted in subjectAltName dNSName values only as the left-most DNS label. For example, *.example.com matches a.example.com but not example.com or a.b.example.com.
section: 3.1.3.1
topics:
    - ldap
    - tls
    - pkix
    - dns
