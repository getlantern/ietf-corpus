document: rfc-9849
kind: normative-requirement
summary: Client-facing servers SHOULD allocate distinct config_id values for each ECHConfig in their known set, using rejection sampling (randomly selecting until no collision with known values), to avoid performance penalties from trial decryption when multiple configs are active.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tls
    - security
