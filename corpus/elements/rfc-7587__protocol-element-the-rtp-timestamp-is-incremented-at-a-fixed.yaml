document: rfc-7587
kind: protocol-element
summary: The RTP timestamp is incremented at a fixed 48000 Hz clock rate for all Opus modes and all sampling rates. The unit is samples per single (mono) channel, corresponding to the first encoded sample in the frame. For non-48000 Hz content, the sampling rate must be adjusted to 48000 Hz for timestamp purposes.
section: "4.1"
topics:
    - rtp
    - realtime
