document: rfc-4661
kind: protocol-element
summary: The <changed> element identifies an XML element or attribute whose value must change from the previous notification document to activate the trigger. It supports optional 'from', 'to', and 'by' attributes to constrain the nature of the change; 'by' applies only to numeric values and specifies a required delta.
section: 3.6.1
topics:
