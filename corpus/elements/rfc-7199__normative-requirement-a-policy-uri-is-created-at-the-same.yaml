document: rfc-7199
kind: normative-requirement
summary: A policy URI is created at the same time as the location URI it controls; the URI of the policy resource MUST be different from the location URI, and a policy URI MUST NOT be provided to an entity not authorized to view or set policy.
section: "3.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
