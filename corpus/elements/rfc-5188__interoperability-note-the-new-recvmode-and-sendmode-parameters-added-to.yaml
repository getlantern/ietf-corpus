document: rfc-5188
kind: interoperability-note
summary: 'The new ''recvmode'' and ''sendmode'' parameters added to audio/EVRCB and audio/EVRCB0 are backward-compatible: legacy RFC 4788 implementations will not send them and will ignore them if received, enabling interoperability between RFC 4788 and RFC 5188 implementations.'
