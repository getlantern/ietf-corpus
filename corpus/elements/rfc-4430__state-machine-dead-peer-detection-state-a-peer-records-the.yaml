document: rfc-4430
kind: state-machine
summary: 'Dead peer detection state: a peer records the epoch of each principal with valid SAs. On receipt of any KINK message, if the principal''s epoch differs from the recorded value, the peer MUST invalidate all SAs for that principal. STATUS messages are used to elicit a cryptographically secured response carrying the current epoch.'
section: "3.7"
topics:
    - ipsec
    - security
