document: rfc-5429
kind: protocol-element
summary: The 'reject' action cancels the implicit keep and refuses delivery, typically via an MDN sent back to the envelope sender. Unlike 'ereject', it prioritizes preserving the exact refusal reason text; protocol-level SMTP/LMTP refusal is only permitted under specific conditions (ASCII-only reason, single recipient, or LMTP).
section: "2.2"
