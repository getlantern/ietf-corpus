document: rfc-4860
kind: design-rationale
summary: PHB-ID (RFC 3140) is used instead of DSCP in the SESSION object to explicitly indicate whether resources belong to a single PHB or a set of PHBs, and to facilitate reservations that span multiple Diffserv domains using different DSCP values for the same PHB.
