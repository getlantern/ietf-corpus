document: rfc-4566
kind: wire-format
summary: Each SDP line has the form `<type>=<value>` where `<type>` MUST be exactly one case-significant character and whitespace MUST NOT appear on either side of the `=` sign. Lines are terminated by CRLF, though parsers SHOULD also accept a single newline.
