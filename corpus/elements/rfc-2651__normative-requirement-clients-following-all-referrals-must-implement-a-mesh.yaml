document: rfc-2651
kind: normative-requirement
summary: Clients following all referrals must implement a mesh traversal algorithm (as documented for Whois++ in RFC 1914) to detect and avoid referral loops, which could otherwise waste server and client resources infinitely.
section: "4.3"
rfc2119_level: MUST
