document: rfc-6464
kind: protocol-element
summary: The SDP extension URI for declaring this header extension is 'urn:ietf:params:rtp-hdrext:ssrc-audio-level'. It has a single extension attribute 'vad' taking values 'vad=on' or 'vad=off', controlling whether the V bit is in use. The default when vad is not specified is 'vad=on'.
