document: rfc-1548
kind: normative-requirement
summary: A Configure-Reject MUST include only unrecognizable or non-negotiable options from the Configure-Request, with options not reordered or modified. On reception, the options in a Configure-Reject MUST be a proper subset of those in the last transmitted Configure-Request.
section: "5.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
