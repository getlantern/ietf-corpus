document: rfc-8639
kind: protocol-element
summary: The 'subscription-suspended' notification indicates the publisher has suspended delivery due to capacity constraints; 'reason' is either 'insufficient-resources' (cannot produce the stream) or 'unsupportable-volume' (bandwidth to receiver exceeded a threshold). It also signals possible loss of events; no further notifications are sent until resumption or termination.
section: 2.7.4
topics:
    - yang
    - netconf
