document: rfc-2529
kind: normative-requirement
summary: During transition, when a router handles both native LAN and 6over4 on the same physical interface, the prefix-length for link-local addresses MUST be 128 (not 64) so that the two address types can be distinguished.
section: "7"
rfc2119_level: MUST
