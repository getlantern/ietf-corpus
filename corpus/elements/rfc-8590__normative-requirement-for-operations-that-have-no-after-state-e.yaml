document: rfc-8590
kind: normative-requirement
summary: For operations that have no 'after' state (e.g., 'delete' with op='purge', 'autoPurge'), the server MUST use the 'before' state poll message, including the object's state prior to the operation.
section: "2.2"
rfc2119_level: MUST
