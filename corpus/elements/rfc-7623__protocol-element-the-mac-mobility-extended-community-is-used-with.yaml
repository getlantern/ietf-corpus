document: rfc-7623
kind: protocol-element
summary: The MAC Mobility Extended Community is used with B-MAC Advertisement routes. When attached to a B-MAC route, it signals that all C-MAC addresses associated with that B-MAC across all corresponding I-SIDs must be flushed on receiving PEs.
section: "5.7"
