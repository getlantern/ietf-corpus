document: rfc-7680
kind: security-consideration
summary: Collecting measurements or using measurement results for reconnaissance to assist subsequent system attacks is common; access to measurement results and control of measurement systems must be guarded against. RFC 7594 (LMAP Framework) Section 7 provides system requirements to avoid measurement system compromise.
section: "5"
topics:
    - measurement
    - security
    - ip
