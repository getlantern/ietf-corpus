document: rfc-5698
kind: registry
summary: 'This document creates the IANA registry ''Data Structure for the Security Suitability of Cryptographic Algorithms (DSSC)'' with two sub-registries: ''Parameter Definitions'' (policy: RFC Required) and ''Cryptographic Algorithms'' (policy: First Come First Served). Initial parameter entries are ''moduluslength'' (RSA), ''plength'' (DSA), and ''qlength'' (DSA).'
section: "8"
