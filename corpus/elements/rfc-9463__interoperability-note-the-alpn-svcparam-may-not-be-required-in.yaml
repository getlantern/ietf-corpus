document: rfc-9463
kind: interoperability-note
summary: The 'alpn' SvcParam may not be required in contexts where DNS runs over a variant of CoAP with OSCORE encryption, since OSCORE provides a different protocol-disambiguation mechanism. In such contexts, implementations MAY omit the 'alpn' SvcParam.
section: "4.1"
topics:
    - dns
