document: rfc-7180
kind: protocol-element
summary: 'Two mechanisms extend RFC 6439 VLAN inhibition timer setting for Hello reduction: (1) an RBridge may include a self-appointment Appointed Forwarders sub-TLV in any TRILL Hello to update peer inhibition timers for listed VLAN ranges; (2) an RBridge may use the new VLANs Appointed sub-TLV to list VLANs for which it is Appointed Forwarder, causing receivers to update inhibition timers. Support is indicated by Bit 0 of PORT-TRILL-VER.'
section: "10.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
