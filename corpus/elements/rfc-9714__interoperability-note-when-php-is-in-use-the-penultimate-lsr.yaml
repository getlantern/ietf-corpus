document: rfc-9714
kind: interoperability-note
summary: When PHP is in use, the penultimate LSR pops the forwarding label and therefore MUST also pop the accompanying XL, FLI, and FL per Section 4. If this is not supported, the egress LSR is excluded from measurement. PHP should be disabled unless the penultimate LSR is confirmed to support this specification.
section: 3.1.1
topics:
    - mpls
    - measurement
