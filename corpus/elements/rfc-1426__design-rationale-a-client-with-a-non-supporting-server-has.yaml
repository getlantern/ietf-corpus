document: rfc-1426
kind: design-rationale
summary: 'A client with a non-supporting server has two options: implement a gateway transformation to valid 7-bit MIME (losslessly, using MIME encodings), or treat the situation as a permanent error and handle it via normal delivery failure mechanisms. The RFC deliberately leaves the specific transformation unspecified while constraining its properties.'
section: "4"
topics:
