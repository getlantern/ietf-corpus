document: rfc-8990
kind: wire-format
summary: 'Objective flags are a CBOR uint bitfield: F_DISC=bit 0 (valid for discovery), F_NEG=bit 1 (valid for negotiation), F_SYNCH=bit 2 (valid for synchronization), F_NEG_DRY=bit 3 (dry-run negotiation). Bits are independent and may be combined; mixing negotiation and dry-run modes in a single session is not allowed.'
section: 2.10.2
topics:
