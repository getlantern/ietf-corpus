document: rfc-2206
kind: protocol-element
summary: rsvpSenderOutInterfaceTable (rsvpObjects 3) lists outgoing interfaces used by each PATH message, indexed by (rsvpSessionNumber, rsvpSenderNumber, ifIndex). Each entry contains only rsvpSenderOutInterfaceStatus (RowStatus, read-only), supporting multicast path state with multiple egress interfaces.
