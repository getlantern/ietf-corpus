document: rfc-8529
kind: design-rationale
summary: NI types are expected to differ primarily in the configuration information needed at the device/core level (e.g., route targets for L3VPN) rather than in the schema mounted within an NI, which is why a small set of shared, well-known mount points suffices and proliferation of type-specific mount points is discouraged.
section: 3.1.1
topics:
    - yang
    - netconf
    - routing
    - vpn
