document: rfc-2608
kind: protocol-element
summary: 'Service attributes are encoded as ABNF attr-list strings with typed values: Integer ([-]1*DIGIT in range -2147483648..2147483647), String, Boolean (''true''/''false''), and Opaque (binary prefixed with ''\FF''). Stored values must be consistently typed; mixed-type lists return INVALID_REGISTRATION.'
