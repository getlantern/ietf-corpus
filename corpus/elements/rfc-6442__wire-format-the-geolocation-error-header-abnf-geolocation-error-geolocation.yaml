document: rfc-6442
kind: wire-format
summary: 'The Geolocation-Error header ABNF: ''Geolocation-Error = "Geolocation-Error" HCOLON locationErrorValue''; locationErrorValue is a 1–3-digit error code with an optional ''code'' parameter carrying a quoted human-readable string. Only one locationErrorValue is permitted per response.'
