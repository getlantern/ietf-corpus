document: rfc-4985
kind: interoperability-note
summary: 'DNS name restrictions for SRVName follow subdomain matching: any DNS name formed by adding subdomains to the left-hand side of the constrained name satisfies the DNS part of the constraint (e.g., www.host.example.com satisfies host.example.com, but 1host.example.com does not).'
section: "4"
topics:
