document: rfc-3006
kind: interoperability-note
summary: When an unknown TSpec parameter is silently ignored, the node should behave as if the parameter is absent but must leave the unknown parameter intact in the forwarded object. RFC 2210 specifies parseable TSpec formats but does not mandate behavior on unknown parameters, so some implementations may reject messages containing the compressibility hint.
section: "5"
topics:
