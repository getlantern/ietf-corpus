document: rfc-3961
kind: wire-format
summary: 'Simplified-profile ciphertext is: C1 | H1[1..h], where C1 = E(Ke, conf | plaintext | pad, oldstate.ivec) and H1 = HMAC(Ki, conf | plaintext | pad). The confounder ''conf'' is a random string of length c; padding brings confounder plus plaintext to a multiple of message block size m.'
