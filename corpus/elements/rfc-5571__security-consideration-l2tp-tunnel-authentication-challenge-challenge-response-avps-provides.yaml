document: rfc-5571
kind: security-consideration
summary: L2TP Tunnel Authentication (Challenge/Challenge Response AVPs) provides authentication at tunnel setup and may limit DoS attacks by authenticating before L2TP and PPP resources are allocated. PPP CHAP provides per-user authentication. L2TPv2 can be secured with IPsec ESP for privacy, integrity, and replay protection.
