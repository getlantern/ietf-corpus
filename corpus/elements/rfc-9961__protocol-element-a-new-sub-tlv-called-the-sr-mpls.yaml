document: rfc-9961
kind: protocol-element
summary: A new sub-TLV called the SR MPLS P2MP Policy Tree Instance sub-TLV (Sub-Type 41, variable length) is introduced to uniquely identify a specific PTI within a specific CP of an SR P2MP Policy in echo request messages. It is assigned from the 'Sub-TLVs for TLV Types 1, 16, and 21' registry under the Target FEC Stack (Type 1) entry.
section: 3.2.1
topics:
