document: rfc-3055
kind: design-rationale
summary: No SNMP traps are defined in this MIB; instead, thresholding on counters is delegated to the Remote Monitoring (RMON) MIB standard mechanism. Example events include repeated authentication failures and nuisance calls from the same user.
