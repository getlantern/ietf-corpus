document: rfc-5674
kind: normative-requirement
summary: If the 'alarm' SD-ID is included, the 'resourceURI' SD-PARAM SHOULD be included. Its value MUST conform to the URI definition in RFC 3986; for SNMP resources, the syntax in RFC 4088 MUST be used.
section: "3.6"
rfc2119_level: SHOULD
