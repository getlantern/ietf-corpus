document: rfc-2210
kind: interoperability-note
summary: When a PATH message ADSPEC without a particular service fragment (Guaranteed or Controlled-Load) encounters a node implementing that service, the service module leaves the ADSPEC unchanged; the complete absence of a fragment is a signal from the sender that the service should not be used by receivers.
section: 3.3.3
topics:
    - qos
