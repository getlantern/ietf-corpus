document: rfc-2744
kind: normative-requirement
summary: GSS-API implementations must impose a local access-control policy on callers of gss_acquire_cred() and gss_add_cred() to prevent unauthorized callers from acquiring credentials to which they are not entitled.
section: "5.2"
rfc2119_level: MUST
