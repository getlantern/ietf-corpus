document: rfc-5731
kind: protocol-element
summary: Name servers are specified within a <domain:ns> element containing either one or more <domain:hostObj> elements (referencing known host objects by fully qualified name) or one or more <domain:hostAttr> elements (containing <domain:hostName> and optional <domain:hostAddr> with ip attribute 'v4' or 'v6', defaulting to 'v4').
section: "1.1"
