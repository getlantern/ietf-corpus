document: rfc-8012
kind: interoperability-note
summary: RFC 4379, RFC 6424, and this document support only IP-based load balancers (case 1) and label-based load balancers that include only the first (top-most) entropy label (case 2a1). Cases involving multiple entropy labels, top-N/bottom-N label subsets that exclude the entropy label, or label-and-IP combined load balancers are out of scope.
section: "9"
topics:
