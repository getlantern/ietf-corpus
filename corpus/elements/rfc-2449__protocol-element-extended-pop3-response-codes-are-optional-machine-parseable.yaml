document: rfc-2449
kind: protocol-element
summary: Extended POP3 response codes are optional machine-parseable codes enclosed in square brackets at the beginning of the human-readable text of +OK or -ERR responses. Response codes are hierarchical with '/' separating levels; clients MUST ignore unknown hierarchical detail.
