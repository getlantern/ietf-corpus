document: rfc-3418
kind: protocol-element
summary: sysServices encodes the set of OSI layers at which the entity offers services as an integer 0..127, computed as the sum of 2^(L-1) for each layer L (1=physical, 2=datalink, 3=internet, 4=end-to-end, 7=application) the entity performs transactions for.
