document: rfc-4592
kind: design-rationale
summary: 'A wildcard ''blocks itself'': ''*.example.'' does not match names below ''*.example.'' because those subdomains exist. To cover names under ''*.example.'', a further wildcard ''*.*.example.'' is required. This is a common misconception clarified by the existence rules.'
section: 2.2.1
topics:
    - dns
