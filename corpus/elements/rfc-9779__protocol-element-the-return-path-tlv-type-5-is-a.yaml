document: rfc-9779
kind: protocol-element
summary: The Return Path TLV (Type 5) is a new Mandatory TLV defined in the 'MPLS Loss/Delay Measurement TLV Object' registry. It is carried in query messages to instruct the responder to send the response message on a specified return path, avoiding the need for the responder to maintain per-session return path state.
section: "6.1"
topics:
    - mpls
    - routing
