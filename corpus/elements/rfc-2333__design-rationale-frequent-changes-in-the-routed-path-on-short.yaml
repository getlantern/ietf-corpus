document: rfc-2333
kind: design-rationale
summary: Frequent changes in the routed path on short time scales (seconds) negatively affect NHRP operation. In router-router scenarios, route instability can create persistent routing loops; in host-router or router-host scenarios, it causes repeated creation of short-lived short-cut paths, resulting in inefficiency.
section: "6"
topics:
