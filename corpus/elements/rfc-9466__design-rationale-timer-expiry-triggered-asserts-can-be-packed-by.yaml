document: rfc-9466
kind: design-rationale
summary: Timer expiry-triggered asserts can be packed by rounding the Assert Timer to a coarse granularity (e.g., 100 msec), causing multiple (S,G) and (*,G) timers to expire simultaneously and enabling easy packing without changes to the Assert state machinery.
section: 3.3.1.2
topics:
    - multicast
    - routing
