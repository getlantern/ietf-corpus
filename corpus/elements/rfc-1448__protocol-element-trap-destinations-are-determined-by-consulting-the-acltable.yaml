summary: 'Trap destinations are determined by consulting the aclTable: entries where aclSubject refers to the SNMPv2 entity, aclPrivileges allows SNMPv2-Trap-PDU, and aclResources refers to a context whose MIB view contains the notification''s name. The snmpTrapNumbers instance for each target is incremented and used as the request-id.'
