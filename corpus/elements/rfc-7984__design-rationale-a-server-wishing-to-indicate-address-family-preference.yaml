document: rfc-7984
kind: design-rationale
summary: 'A server wishing to indicate address family preference can use DNS SRV priority: publishing host names that resolve only in IPv6 at the lowest (preferred) SRV priority and host names that resolve in both address families at the next priority, allowing high-latency IPv4-tunnel servers to prefer IPv6 contact.'
section: "3.2"
topics:
