document: rfc-6870
kind: wire-format
summary: The Preferential Forwarding status bit (bit 0x00000020) and Request Switchover status bit (bit 0x00000040) are carried in the PW Status TLV defined in RFC 4447. Active state is signaled by clearing the Preferential Forwarding bit; standby state is signaled by setting it.
