document: rfc-7182
kind: normative-requirement
summary: ICV TLVs that carry what is declared to be the same information MUST NOT be included in the same packet, message, or address association; multiple ICV TLVs with the same type extension are permitted only when they represent different ICV calculations.
section: "13.5"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
