document: rfc-4051
kind: security-consideration
summary: Use of MD5 as a DigestMethod and in RSA-MD5 SignatureMethod is NOT RECOMMENDED due to computer speed increases and cryptographic advances. The concerned cryptographic advances do not affect the security of HMAC-MD5, but there is little reason not to use one of the SHA series of algorithms.
section: "5"
topics:
