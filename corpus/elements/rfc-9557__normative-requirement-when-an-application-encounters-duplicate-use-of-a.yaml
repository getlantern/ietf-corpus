document: rfc-9557
kind: normative-requirement
summary: When an application encounters duplicate use of a suffix key in elective suffixes and does not perform additional processing, it MUST choose the first suffix with that key and treat subsequent duplicates as absent.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
