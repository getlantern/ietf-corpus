document: rfc-6951
kind: normative-requirement
summary: If a received ICMP or ICMPv6 packet cannot be related to a specific SCTP association or the verification tag cannot be verified, it MUST be discarded silently. The SCTP stack MUST NOT rely on receiving ICMP or ICMPv6 messages.
section: "5.5"
rfc2119_level: MUST NOT
topics:
    - sctp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
