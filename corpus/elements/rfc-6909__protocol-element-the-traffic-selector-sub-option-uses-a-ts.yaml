document: rfc-6909
kind: protocol-element
summary: The Traffic Selector sub-option uses a TS Format field to identify the flow specification format. TS Format value 1 (IPv4 binary traffic selector per RFC 6088 Section 3.1) is mandatory for this specification; TS Format value 2 (IPv6 binary traffic selector) is not used.
section: "3.1"
