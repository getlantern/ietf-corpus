document: rfc-9725
kind: design-rationale
summary: The WHIP endpoint SHALL gather all ICE candidates before responding to the client and return them in the SDP answer; the server cannot trickle ICE candidates after the answer. This asymmetry simplifies the protocol by eliminating server-to-client PATCH signaling.
section: 4.3.2
topics:
    - webrtc
    - realtime
