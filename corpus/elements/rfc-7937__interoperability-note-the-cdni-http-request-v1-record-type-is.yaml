document: rfc-7937
kind: interoperability-note
summary: The cdni_http_request_v1 record type is defined for HTTP/1.0, HTTP/1.1, and HTTPS delivery, and is expected to apply to HTTP/2 given HTTP/2's preservation of HTTP/1.1 semantics. Additional HTTP/2-specific fields (stream ID, priority, flow control) and HTTPS/TLS-specific fields are outside scope and deferred to a future record-type version.
section: 3.4.1
topics:
    - http
