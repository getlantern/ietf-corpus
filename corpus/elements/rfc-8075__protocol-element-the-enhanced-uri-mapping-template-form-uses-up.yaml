document: rfc-8075
kind: protocol-element
summary: The enhanced URI mapping template form uses up to five template variables—s (scheme), hp (host:port), p (path), q (query), qq (optional query)—where q and qq MUST be used in mutual exclusion. At most one instance of each variable is allowed in a template definition.
section: 5.4.2
