document: rfc-8538
kind: normative-requirement
summary: An implementation MUST support a (configurable) stale timer that imposes an upper bound on route retention time. A suggested default is 180 seconds. An implementation MAY allow disabling the timer but MUST NOT do so by default.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
