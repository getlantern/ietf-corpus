document: rfc-5436
kind: normative-requirement
summary: Implementations SHOULD NOT trigger notifications for messages containing 'Auto-Submitted:' header fields with any value other than 'No', to prevent generating notifications in response to other automated messages.
section: "2.7"
rfc2119_level: SHOULD NOT
