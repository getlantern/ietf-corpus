document: rfc-5660
kind: design-rationale
summary: 'Two models of connection latching are defined: a normative ULP-to-key-manager interface model and an informative local packet-tagging model. The normative model was chosen because it accommodates hardware ESP/AH offload NICs that do not support packet tagging, while the packet-tagging model more naturally supports connectionless datagram transports.'
