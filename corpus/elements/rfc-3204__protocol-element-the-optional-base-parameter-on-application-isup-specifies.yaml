document: rfc-3204
kind: protocol-element
summary: The optional 'base' parameter on application/ISUP specifies a fallback baseline specification (e.g., 'itu-t88', 'itu-t92+', 'ansi88', 'ansi00', 'etsi121', 'etsi356', 'gr317', 'ttc87', 'ttc93+') so that a receiver that does not recognize the 'version' string can still attempt to process the encapsulated ISUP. The 'base' values also indicate whether the ITU-T 1992 forward compatibility mechanism is supported.
section: "3.1"
topics:
    - sip
    - realtime
