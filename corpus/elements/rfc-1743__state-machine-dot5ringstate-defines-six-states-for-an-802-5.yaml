kind: state-machine
summary: 'dot5RingState defines six states for an 802.5 interface with respect to ring membership: opened(1), closed(2), opening(3), closing(4), openFailure(5), and ringFailure(6). Transitions are triggered by dot5Commands (open/close) and ring events such as lobe faults or beaconing failures.'
