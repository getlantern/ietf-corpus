document: rfc-9115
kind: protocol-element
summary: 'The CSR template is a JSON document using three field markers: a literal string (mandatory, IdO-specified value), ''**'' (mandatory, client-defined value), and ''*'' (optional, client decides). The ''keyTypes'' property constrains SubjectPublicKeyInfo but is not copied into the CSR.'
