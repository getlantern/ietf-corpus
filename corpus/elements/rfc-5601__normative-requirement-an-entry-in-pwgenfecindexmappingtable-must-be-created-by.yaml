document: rfc-5601
kind: normative-requirement
summary: An entry in pwGenFecIndexMappingTable MUST be created by the agent for every PW created in pwTable for which pwOwner equals genFecSignaling. The table is indexed by AGI type/value, local AII type/value, and remote AII type/value.
section: "12"
rfc2119_level: MUST
