document: rfc-7324
kind: normative-requirement
summary: An implementation SHOULD alert the operator to an irreconcilable capability mismatch (PT or R) and SHOULD allow traffic to be sent on the Working LSP as long as there is no failure (e.g., NR state) regardless of any mismatch.
section: "4.3"
rfc2119_level: SHOULD
