document: rfc-8281
kind: state-machine
summary: 'Orphaned PCE-initiated LSP recovery: when the State Timeout Interval timer is running for a PCE-initiated orphan, a PCE may send a PCInitiate with just SRP and LSP objects carrying the orphan''s PLSP-ID to reclaim delegation. The PCC MUST redelegate the LSP to that PCE and stop the timer.'
