document: rfc-1651
kind: normative-requirement
summary: A client SMTP MUST NOT cache any information returned by a successful EHLO response; it must reissue EHLO at the start of each session if information about extended facilities is needed.
section: "4.2"
rfc2119_level: MUST NOT
