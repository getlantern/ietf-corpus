document: rfc-5561
kind: interoperability-note
summary: An RFC 5036-compliant peer is treated as having IPv4 label distribution enabled by default. LDP implementations supporting capability advertisement MUST assume that peers also have IPv4 label distribution enabled until explicitly disabled, ensuring compatibility with legacy RFC 5036 peers.
section: "10"
rfc2119_level: MUST
topics:
