document: rfc-7940
kind: design-rationale
summary: The relation between variant 'type' attribute values and resulting label dispositions is made fully explicit via 'action' elements, rather than relying on built-in algorithms. This allows generalized resolution policies beyond the default 'most restrictive disposition wins' behavior.
section: "7.2"
