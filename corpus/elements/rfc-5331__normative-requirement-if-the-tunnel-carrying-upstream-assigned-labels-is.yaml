document: rfc-5331
kind: normative-requirement
summary: If the tunnel carrying upstream-assigned labels is an MPLS tunnel, penultimate-hop-popping (PHP) MUST be disabled for the tunnel, so that the downstream LSR can determine the tunnel on which the packet was received.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
