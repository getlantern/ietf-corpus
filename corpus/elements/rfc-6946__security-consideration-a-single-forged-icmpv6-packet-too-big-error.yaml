document: rfc-6946
kind: security-consideration
summary: A single forged ICMPv6 Packet Too Big error message updates the Destination Cache to prepend a Fragment Header on all subsequent packets to that destination, potentially affecting multiple concurrent communication instances such as TCP connections to the same IPv6 address.
