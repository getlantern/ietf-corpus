summary: hprRtpLocTcid and hprRtpRemTcid are both OCTET STRING of fixed SIZE 8, carrying the local and remote Transport Connection Identifiers for an RTP connection. Values can be cross-referenced against appnIsInRtpTcid or appnIsRtpTcid in the APPN MIB.
