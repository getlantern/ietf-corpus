document: rfc-7265
kind: wire-format
summary: iCalendar RECUR values are encoded as jCal JSON objects with lowercase rule-part keys. The 'freq' and 'wkst' values are strings with case preserved; 'until' is a date or date-time string; 'count' and 'interval' are JSON numbers; numeric rule parts with multiple values use JSON number arrays.
