document: rfc-2003
kind: interoperability-note
summary: ICMP only requires IP routers to return 8 octets (64 bits) of the datagram beyond the IP header when reporting errors, which is insufficient to include a copy of the encapsulated (inner) IP header; therefore it is not always possible for the encapsulator to relay ICMP messages from within the tunnel to the original sender.
section: "5"
topics:
    - ip
