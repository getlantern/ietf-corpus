document: rfc-8896
kind: normative-requirement
summary: The 'calendared' boolean array in a request MUST contain exactly N boolean values (N = number of requested cost types); otherwise the Server returns an error. The field MUST NOT be included if no 'calendar-attributes' member is specified for the information resource.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
    - json
