document: rfc-1088
kind: protocol-element
summary: The Maximum Transmission Unit (MTU) for IP over NetBIOS is 512 bytes, which equals the maximum data size of a NetBIOS datagram. IP fragmentation and reassembly are therefore required for larger datagrams.
section: Maximum Transmission Unit
