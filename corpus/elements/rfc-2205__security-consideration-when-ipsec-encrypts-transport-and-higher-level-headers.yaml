document: rfc-2205
kind: security-consideration
summary: When IPsec encrypts transport and higher-level headers in the data stream, RSVP's generalized port numbers cannot be used to define a session or sender. The extension in [RFC 2207] resolves this by using the IPsec Security Parameter Index (SPI) in place of generalized ports.
section: "2.8"
topics:
    - security
    - ipsec
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
