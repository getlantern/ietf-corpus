document: rfc-5324
kind: protocol-element
summary: 'FC-SP defines six types of Policy Objects: Policy Summary Object (list of pointers with cryptographic hashes to other active objects), Switch Membership List, Node Membership List, IP Management List (which IP hosts may manage the Fabric), per-Switch Connectivity Objects, and extensible Attribute Objects. When FC-SP is active, each Fabric has exactly one of each list object and zero or more connectivity/attribute objects.'
section: 3.4.5
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
