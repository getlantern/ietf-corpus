document: rfc-6106
kind: design-rationale
summary: The DNSSL option was added to RFC 5006's RDNSS-only specification to achieve parity with DHCPv6 DNS options (RFC 3646) and to ensure hosts can determine the appropriate DNS search domains without requiring DHCPv6.
