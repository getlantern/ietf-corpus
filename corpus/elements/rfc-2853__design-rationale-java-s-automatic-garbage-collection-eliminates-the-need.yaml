document: rfc-2853
kind: design-rationale
summary: 'Java''s automatic garbage collection eliminates the need for several explicit GSS-API management routines present in the C bindings: gss_release_name, gss_release_oid_set, gss_create_empty_oid_set, gss_add_oid_set_member, and gss_duplicate_name are all absent from the Java API.'
section: "4.7"
