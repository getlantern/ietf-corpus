document: rfc-9796
kind: normative-requirement
summary: For images such as "photo" and "logo" properties, the default image formats SHOULD be PNG or JPEG as these support 24-bit RGB images. SVG Tiny 1.2 SHOULD also be supported as an additional default format for vector images.
section: "10.2"
rfc2119_level: SHOULD
