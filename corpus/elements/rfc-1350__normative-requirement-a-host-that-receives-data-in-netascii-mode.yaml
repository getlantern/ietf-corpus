document: rfc-1350
kind: normative-requirement
summary: A host that receives data in netascii mode must translate the data to its own local format. Octet mode transfers raw 8-bit bytes, and a file sent in octet mode and returned must be identical to the original.
section: "5"
rfc2119_level: MUST
