document: rfc-2238
kind: protocol-element
summary: hprAnrType (hprAnrRoutingEntry 2) is a read-only INTEGER indicating whether an ANR label identifies a local NCE (nce(1)) or an outbound TG (tg(2)). When nce(1), the hprAnrOutTgDest and hprAnrOutTgNum objects carry no meaning.
