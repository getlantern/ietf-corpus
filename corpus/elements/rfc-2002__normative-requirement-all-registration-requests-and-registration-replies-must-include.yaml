document: rfc-2002
kind: normative-requirement
summary: All Registration Requests and Registration Replies MUST include exactly one Mobile-Home Authentication Extension, which MUST be the last non-foreign-agent-specific extension. This protects against remote redirection attacks caused by uncontrolled propagation of ICMP Redirects.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - security
