document: rfc-9647
kind: security-consideration
summary: Read access to config-false 'babel' nodes can disclose the network topology, and the routes used by a device may enable subsequent attacks on traffic. Access to these nodes must be controlled via NACM (RFC 8341) through NETCONF or RESTCONF with mandatory secure transport (SSH, TLS, or QUIC).
section: "4"
topics:
    - yang
    - security
    - routing
