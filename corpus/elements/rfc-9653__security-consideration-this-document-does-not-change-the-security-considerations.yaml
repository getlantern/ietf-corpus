document: rfc-9653
kind: security-consideration
summary: This document does not change the security considerations in RFC 9260. Using an alternate error detection method that meets the two requirements in Section 3 provides an equal or better level of data integrity than CRC32c, and the middlebox constraint prevents permanent path failures from devices expecting correct checksums.
section: "9"
topics:
    - sctp
    - security
