document: rfc-3191
kind: normative-requirement
summary: When a GSTN service requires multiple subaddresses for the same pstn-mbox, the use of multiple pstn-email elements is REQUIRED. The UA MUST generate multiple pstn-mbox elements when submitting to the MTA.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - email
