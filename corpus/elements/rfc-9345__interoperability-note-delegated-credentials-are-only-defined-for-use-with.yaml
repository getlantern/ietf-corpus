document: rfc-9345
kind: interoperability-note
summary: Delegated credentials are only defined for use with (D)TLS 1.3 or later; their use in prior versions is not allowed. Implementations negotiating TLS < 1.3 MUST ignore the delegated_credential extension.
section: "3"
topics:
