document: rfc-8399
kind: design-rationale
summary: The ability to specify name constraints for a particular mailbox was removed because this capability was not used in practice, and removing it allows name constraints to apply uniformly to email addresses in both rfc822Name and SmtpUTF8Mailbox within otherName.
