document: rfc-3107
kind: protocol-element
summary: 'The Label field carries one or more labels corresponding to a label stack. Each label is 3 octets: the high-order 20 bits contain the label value, and the low-order bit is the Bottom of Stack indicator as defined in RFC 3032 (MPLS Label Stack Encoding).'
