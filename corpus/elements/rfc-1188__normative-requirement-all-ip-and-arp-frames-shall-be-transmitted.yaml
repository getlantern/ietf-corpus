document: rfc-1188
kind: normative-requirement
summary: All IP and ARP frames shall be transmitted as Asynchronous LLC frames using Unrestricted tokens. The Priority value is a matter of local convention, but implementations should make it a tunable parameter.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
