document: rfc-7695
kind: normative-requirement
summary: BACKOFF_MAX_DELAY MUST be greater than or equal to ADOPT_MAX_DELAY. The three parameters ADOPT_MAX_DELAY, BACKOFF_MAX_DELAY, and RANDOM_SET_SIZE MAY differ from Node to Node; the algorithm ensures correctness and convergence for any chosen values.
