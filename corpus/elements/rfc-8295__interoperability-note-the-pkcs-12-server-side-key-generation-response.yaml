document: rfc-8295
kind: interoperability-note
summary: 'The PKCS #12 server-side key generation response (HTTP 200, application/pkcs12 with private key and certificate in the same PFX) differs from RFC 7030 Section 4.4.2, which returns them separately. The DecryptKeyIdentifier (enveloping) specified in RFC 7030 is not supported for PKCS #12.'
section: 8.3.2
topics:
    - pkix
    - interoperability
