document: rfc-8853
kind: protocol-element
summary: The '~' prefix on a rid-id in the 'a=simulcast' attribute indicates that the corresponding simulcast stream is initially paused. An initially paused 'send'-direction stream is treated as an unsolicited locally paused stream; a 'recv'-direction initially paused stream SHOULD cause the remote RTP sender to put its stream in a locally paused state.
section: "5.2"
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
