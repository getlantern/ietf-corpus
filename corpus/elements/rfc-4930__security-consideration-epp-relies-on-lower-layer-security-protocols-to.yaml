document: rfc-4930
kind: security-consideration
summary: EPP relies on lower-layer security protocols to protect client-server exchanges. The PLAIN SASL-like authentication (clID and password in <login>) provides only basic security; additional identification and authorization schemes MUST be provided at other protocol layers for more robust security. A server operator MAY limit failed login attempts.
section: "7"
topics:
    - security
