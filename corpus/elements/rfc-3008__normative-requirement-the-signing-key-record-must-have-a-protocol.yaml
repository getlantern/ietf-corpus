document: rfc-3008
kind: normative-requirement
summary: The signing KEY record MUST have a protocol value of 3 (DNSSEC) or 255 (ALL). A DNSSEC resolver MUST NOT trust any signature generated by a key not specified for use with DNSSEC.
section: "3.4"
rfc2119_level: MUST
topics:
    - dns
    - security
