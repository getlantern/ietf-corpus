document: rfc-9437
kind: protocol-element
summary: Subscription state stored at the Map-Server comprises the EID-Prefix, xTR-ID, set of ITR-RLOCs, and nonce. A single-nonce-per-xTR-ID mode is supported when a single Map-Server is deployed, but MUST be enabled consistently at both the Map-Server and all xTRs.
