document: rfc-8556
kind: normative-requirement
summary: When two x-PMSI A-D routes from the same BFIR do not carry the same set of RTs, do not have the same AFI, originate from different VRFs (for extranet), differ on the Extranet Separation community, or (with segmented P-tunnels) have non-identical NLRIs, their respective PTAs MUST contain different MPLS label values.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
