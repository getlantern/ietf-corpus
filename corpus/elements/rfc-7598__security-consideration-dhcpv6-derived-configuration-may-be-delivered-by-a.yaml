document: rfc-7598
kind: security-consideration
summary: DHCPv6-derived configuration may be delivered by a man-in-the-middle attacker, so there is no basis for trusting access over MAP or Lightweight 4over6 softwires. Softwires MUST NOT bypass IP firewalls or other security mechanisms.
