document: rfc-6098
kind: normative-requirement
summary: GNMs and GNAMs MUST use the same IP source/destination addresses and UDP source/destination ports as the previous Registration Request or Reply exchanged with the peer. This ensures NAT traversal compatibility and that the same security association applies.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - nat
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
