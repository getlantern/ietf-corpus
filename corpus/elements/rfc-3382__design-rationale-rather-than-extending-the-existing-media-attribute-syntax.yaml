document: rfc-3382
kind: design-rationale
summary: Rather than extending the existing 'media' attribute syntax to include 'collection', a new attribute ('media-col') MUST be added to preserve interoperability. Existing clients that do not support the collection syntax could not understand default or supported media values that use the collection value if the existing 'media' attribute were extended.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
