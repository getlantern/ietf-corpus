document: rfc-9183
kind: normative-requirement
summary: All area border RBridges for an L1 area MUST agree on the same pseudorandom algorithm for ingress nickname selection. The destination MAC address SHOULD be excluded from algorithm input to prevent source MAC flip-flopping at the egress RBridge.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
