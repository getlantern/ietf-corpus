document: rfc-5550
kind: normative-requirement
summary: Lemonade Submission Servers MUST support BURL (with URLAUTH/imap), 8BITMIME, BINARYMIME, CHUNKING, PIPELINING, DSN, ENHANCEDSTATUSCODES, SIZE, and STARTTLS SMTP extensions. These are the baseline extensions required for all Lemonade-compliant submission servers.
section: "3.1"
rfc2119_level: MUST
topics:
