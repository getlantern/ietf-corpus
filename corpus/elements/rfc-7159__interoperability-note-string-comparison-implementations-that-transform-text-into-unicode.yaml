document: rfc-7159
kind: interoperability-note
summary: String comparison implementations that transform text into Unicode code unit sequences and compare numerically are interoperable; implementations comparing strings with escaped characters unconverted may incorrectly find that 'a\\b' and 'a\u005Cb' are not equal.
section: "8.3"
