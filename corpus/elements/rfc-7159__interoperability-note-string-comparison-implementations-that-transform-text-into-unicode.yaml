document: rfc-7159
kind: interoperability-note
summary: String comparison implementations that transform text into Unicode code unit sequences and compare numerically code-unit by code-unit are interoperable. Implementations comparing escaped characters unconverted may incorrectly find '"a\\b"' and '"a\u005Cb"' unequal.
section: "8.3"
topics:
