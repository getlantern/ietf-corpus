document: rfc-6811
kind: design-rationale
summary: Validation state is explicitly defined as a local property of the route and MUST NOT by default exclude routes from the Adj-RIB-In or the decision process. This design acknowledges that operators need flexibility to apply local policy rather than having the protocol automatically reject routes.
section: "2"
topics:
