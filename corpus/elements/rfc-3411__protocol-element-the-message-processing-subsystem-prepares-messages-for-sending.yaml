document: rfc-3411
kind: protocol-element
summary: The Message Processing Subsystem prepares messages for sending and extracts data from received messages. It may contain multiple Message Processing Models (e.g., SNMPv1, SNMPv2c, SNMPv3) concurrently, each defining a specific SNMP message format identified by a version field.
