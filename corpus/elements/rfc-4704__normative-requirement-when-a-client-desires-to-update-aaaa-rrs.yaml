document: rfc-4704
kind: normative-requirement
summary: When a client desires to update AAAA RRs itself, the S, O, and N bits in the Flags field MUST be 0. Once configuration is complete, the client MAY originate an update for the AAAA RRs unless the server has set the S bit to 1.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
