document: rfc-7183
kind: security-consideration
summary: 'Replay attacks are partly countered by timestamp validation: an attacker can only replay messages within the configured time window (MAX_HELLO_TIMESTAMP_DIFF or MAX_TC_TIMESTAMP_DIFF). If no synchronized clocks are available, replay attacks cannot be countered by this mechanism; an alternative TIMESTAMP TLV with monotonic sequence numbers may provide partial mitigation but requires storing observed sequence numbers.'
section: 8.1.3
topics:
    - security
    - routing
