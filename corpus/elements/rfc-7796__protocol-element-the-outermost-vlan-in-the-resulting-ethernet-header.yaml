document: rfc-7796
kind: protocol-element
summary: 'The outermost VLAN in the resulting Ethernet header is used to indicate the E-Tree attribute of a frame: a Root VLAN ID marks frames originating from root ACs, and a Leaf VLAN ID marks frames from leaf ACs. These VLANs may be C-VLAN, S-VLAN, or B-VLAN depending on the bridge type in use.'
section: "4.2"
topics:
    - mpls
    - routing
