document: rfc-6991
kind: protocol-element
summary: The phys-address type represents media or physical layer addresses as colon-separated pairs of hex digits (e.g., 01:23:45:67:89:ab), canonically in lowercase, equivalent to SMIv2 PhysAddress. The mac-address type is a constrained variant requiring exactly six octets for IEEE 802 MAC addresses.
