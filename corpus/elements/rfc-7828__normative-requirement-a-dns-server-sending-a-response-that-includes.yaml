document: rfc-7828
kind: normative-requirement
summary: A DNS server sending a response that includes the edns-tcp-keepalive option MUST specify the TIMEOUT value currently associated with the TCP session; this value may change according to local resource constraints.
section: 3.3.2
rfc2119_level: MUST
topics:
