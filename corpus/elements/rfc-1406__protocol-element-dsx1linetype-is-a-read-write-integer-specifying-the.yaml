summary: 'dsx1LineType is a read-write INTEGER specifying the DS1/E1 variant: other(1), dsx1ESF(2) Extended SuperFrame, dsx1D4(3) AT&T D4, dsx1E1(4) G.704 Table 4a, dsx1E1-CRC(5) G.704 Table 4b, dsx1E1-MF(6) G.704 Table 4a with TS16 multiframing, dsx1E1-CRC-MF(7) G.704 Table 4b with TS16 multiframing. The type governs error statistics interpretation.'
