document: rfc-4335
kind: interoperability-note
summary: When SSH sessions cascade (e.g., a Telnet session from an SSH shell, or an SSH client from a Telnet connection), BREAK signals SHOULD be propagated through the entire chain to maintain consistent terminal behavior.
