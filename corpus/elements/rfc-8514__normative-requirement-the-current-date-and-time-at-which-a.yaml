document: rfc-8514
kind: normative-requirement
summary: The current date and time at which a message is delivered to a mailbox MUST be used to set the save date attribute, irrespective of the delivery command (APPEND, COPY, or MOVE) or the message's origin.
section: "3"
rfc2119_level: MUST
