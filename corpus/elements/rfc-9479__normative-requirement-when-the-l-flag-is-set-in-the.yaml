document: rfc-9479
kind: normative-requirement
summary: When the L-flag is set in the Application-Specific SRLG TLV, SRLG values MUST NOT be included; any SRLG values advertised MUST be ignored, and the corresponding legacy TLV's SRLG values MUST be used by the specified applications.
section: "4.3"
rfc2119_level: MUST
