document: rfc-2192
kind: protocol-element
summary: 'The IMAP URL scheme defines four forms: a server reference (`imap://<iserver>/`), a mailbox list (`imap://<iserver>/<enc_list_mailbox>;TYPE=<list_type>`), a message list or search result (`imap://<iserver>/<enc_mailbox>[uidvalidity][?<enc_search>]`), and a specific message or part (`imap://<iserver>/<enc_mailbox>[uidvalidity]<iuid>[isection]`).'
section: "2"
topics:
