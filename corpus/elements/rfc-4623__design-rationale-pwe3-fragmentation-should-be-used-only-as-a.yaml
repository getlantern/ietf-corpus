document: rfc-4623
kind: design-rationale
summary: PWE3 fragmentation should be used only as a last resort after MTU-management methods (path MTU discovery, CE-PE MTU configuration) fail, because fragmentation and reassembly in core network devices require significantly greater resources than forwarding a single packet.
section: "1"
