document: rfc-3816
kind: design-rationale
summary: Context rows persist in rohcContextTable after expiry or termination for a configurable storage time (rohcContextStorageTime), allowing management systems to query historical statistics. However, CID space constraints may force premature row deletion when a CID is reused.
