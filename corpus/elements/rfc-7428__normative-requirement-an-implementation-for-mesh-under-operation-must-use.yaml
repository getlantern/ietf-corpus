document: rfc-7428
kind: normative-requirement
summary: An implementation for mesh-under operation MUST use RFC 6775 mechanisms for managing IPv6 prefixes and CID context information. RFC 6775 DAD MUST NOT be used in mesh-under, since the G.9959 inclusion process guarantees NodeID uniqueness.
section: 4.4.2
rfc2119_level: MUST
topics:
