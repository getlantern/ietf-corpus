document: rfc-3772
kind: security-consideration
summary: When using PPP encryption without Multilink PPP, VSP packets are sent in the clear. Implementations that require encryption as part of a security mechanism should consider per-link encryption or forgoing VSP in favor of VSNP.
section: "8"
topics:
    - security
