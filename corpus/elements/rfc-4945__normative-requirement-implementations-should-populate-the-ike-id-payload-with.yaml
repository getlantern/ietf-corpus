document: rfc-4945
kind: normative-requirement
summary: Implementations SHOULD populate the IKE ID payload with identity information contained within the end-entity certificate, enabling recipients to use ID as a lookup key to find the peer certificate. The only exception is when ID contains the peer source address (a single address, not a subnet or range).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
