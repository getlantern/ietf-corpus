document: rfc-5685
kind: protocol-element
summary: REDIRECT is an IKEv2 Notify payload (type 16407) sent by the responder in an IKE_SA_INIT response or an INFORMATIONAL message to redirect the initiator to a new VPN gateway. It contains a GW Identity Type field (1=IPv4, 2=IPv6, 3=FQDN), a GW Identity Len field, the New Responder GW Identity, and optionally Nonce Data (only present in IKE_SA_INIT responses).
section: "9.2"
topics:
    - ipsec
    - vpn
    - security
