document: rfc-4466
kind: normative-requirement
summary: Any parameter or modifier not defined by extensions that the server supports MUST be rejected with a BAD response. This applies to SELECT, EXAMINE, CREATE, RENAME, FETCH, STORE, and SEARCH extensions.
section: "2.1"
rfc2119_level: MUST
