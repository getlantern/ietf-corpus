document: rfc-8630
kind: design-rationale
summary: The TAL format was chosen over the TrustAnchorInfo structure (RFC 5914) because RPKI implementors adopted it prior to the PKIX TA work, and the community prefers its simplicity as an ASCII-encoded format over the binary ASN.1 encoding of TrustAnchorInfo.
