document: rfc-8595
kind: security-consideration
summary: The MPLS forwarding plane has no built-in security mechanisms and provides no cryptographic integrity protection on MPLS headers. The design relies on the MPLS network being a closed network where insertion, modification, or inspection of packets by outside parties is not possible.
section: "15"
topics:
    - mpls
    - security
