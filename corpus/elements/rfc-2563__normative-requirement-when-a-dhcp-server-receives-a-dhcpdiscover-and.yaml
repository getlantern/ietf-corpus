document: rfc-2563
kind: normative-requirement
summary: When a DHCP server receives a DHCPDISCOVER and has no address to offer, if the DHCPDISCOVER does not contain the Auto-Configure option, the server MUST NOT answer it.
section: "2.3"
rfc2119_level: MUST NOT
