document: rfc-9530
kind: normative-requirement
summary: A recipient MAY ignore any or all digests. Application-specific behavior or local policy MAY set additional constraints on validation. It is not a protocol error if Want-Content-Digest or Want-Repr-Digest preferences are ignored.
section: "2"
rfc2119_level: MAY
topics:
