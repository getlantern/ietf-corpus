document: rfc-3417
kind: design-rationale
summary: NBP lookups should be used infrequently and results cached; SNMP entities supporting command generators should maintain the cache between reboots to minimize network traffic, reduce CPU load, and enable troubleshooting when basic name-to-address translation is broken.
section: "5.3"
topics:
    - snmp
