document: rfc-1253
kind: protocol-element
summary: ospfIfTable (ospf 7) describes OSPF interfaces indexed by ospfIfIpAddress and ospfAddressLessIf (0 for addressed interfaces, ifIndex for addressless). Key fields include ospfIfType (broadcast=1, nbma=2, pointToPoint=3), ospfIfRtrPriority (0..255, 0 means ineligible for DR), ospfIfTransitDelay (default 1s), ospfIfRetransInterval (default 5s), ospfIfHelloInterval (default 10s), ospfIfRtrDeadInterval (default 40s), ospfIfPollInterval (default 120s), and ospfIfAuthKey.
section: "5.7"
topics:
    - snmp
    - routing
