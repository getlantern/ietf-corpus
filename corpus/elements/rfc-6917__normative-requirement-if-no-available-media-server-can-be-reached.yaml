document: rfc-6917
kind: normative-requirement
summary: If no available Media Server can be reached or all Control Channel negotiations fail, the MRB MUST reply with SIP 503 including a non-zero Retry-After header. The Application Server MUST NOT attempt a new session until the Retry-After period has passed.
section: 5.2.2.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
