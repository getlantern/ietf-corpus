document: rfc-6714
kind: protocol-element
summary: Address information matching compares the SDP c/m-line (IP from c-line, port from m-line) against the authority part of the MSRP URI from 'path'. FQDNs are resolved via DNS; IPv6 addresses are normalized per RFC 5952 before comparison. Multiple DNS results each require comparison to find at least one match.
section: "4.4"
topics:
    - realtime
    - sip
    - dns
