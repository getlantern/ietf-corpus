document: rfc-8986
kind: normative-requirement
summary: When processing the End SID and IPv6 Hop Limit is <= 1, the node MUST send an ICMP Time Exceeded message (Code 0) to the Source Address, interrupt packet processing, and discard the packet.
section: "4.1"
rfc2119_level: MUST
topics:
