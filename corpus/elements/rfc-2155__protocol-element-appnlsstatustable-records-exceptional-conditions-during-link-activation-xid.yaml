document: rfc-2155
kind: protocol-element
summary: appnLsStatusTable records exceptional conditions during link activation, XID exchange, and termination. Each entry captures a timestamp, four sense-data fields (general, end-of-connection, local XID rejection, remote XID rejection), and the specific XID byte (0–65535) and bit (0–7) that caused an XID error. No entries are created for normal activations.
section: 3.1.1
topics:
