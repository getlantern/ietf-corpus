document: rfc-9555
kind: protocol-element
summary: JSPROP is a new vCard TEXT property that represents an arbitrary JSContact property in vCard. Its value is the JSON-encoded value of the JSContact property; it requires the JSPTR parameter and may appear multiple times. Together, all JSPROP properties in a vCard form a PatchObject applied after other conversions.
section: 3.2.1
topics:
    - json
