document: rfc-5627
kind: normative-requirement
summary: A registrar MUST be able to determine the instance ID and AOR when presented with a GRUU. GRUUs associated with different AORs or different instance IDs MUST be different based on URI equality comparison. A GRUU MUST NOT be equivalent to any AOR in the domain except the one associated with it.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
