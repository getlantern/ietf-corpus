summary: The 'ct' field's CoAP Content-Format number is similar to the 'ct' attribute defined in Section 7.2.1 of RFC 7252 for CoRE Link Format (RFC 6690), representing an unsigned integer in the range 0–65535. All registered numbers are listed in the 'CoAP Content-Formats' registry.
