document: rfc-4088
kind: normative-requirement
summary: The '+' and '.*' suffixes MUST NOT be used when an SNMP object URI is used to specify MIB object instances to be written (Set operation); any attempt to do so is an error that MUST NOT generate any SNMP Set operations.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - snmp
