document: rfc-9684
kind: normative-requirement
summary: Any selection of PCRs MUST verify that the set of PCRs requested are a subset of the set of PCRs exposed in the device's rats-support-structures. This applies to both TPM 1.2 and TPM 2.0 PCR selection groupings.
section: 2.1.1.3
rfc2119_level: MUST
topics:
