document: rfc-3448
kind: normative-requirement
summary: The sender MUST initialize X to 1 packet/second and set the nofeedback timer to expire after 2 seconds. The initial value of tld (time last doubled during slow-start) is set to -1; initial values of R and t_RTO are undefined until first feedback is received.
section: "4.2"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
