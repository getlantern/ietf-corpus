document: rfc-4398
kind: normative-requirement
summary: The indirect types (IPKIX, ISPKI, IPGP, IACPKIX) MUST be used when the certificate content is too large to fit in the CERT RR, and MAY be used at the implementer's discretion. They SHOULD NOT be used where the DNS message is 512 octets or smaller and could fit in a UDP packet.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
