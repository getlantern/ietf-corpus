document: rfc-4131
kind: interoperability-note
summary: When a CM is operating in BPI mode (not BPI+), the CMTS must map SAIDs and SIDs (Service IDs) to one contiguous space; for BPI-mode CMs, docsBpi2CmtsAuthCmReset's invalidateTeks action applies to all unicast TEKs rather than the primary SAID's TEKs.
