summary: 'Section 7.2 defines the IUA Protocol Extensions registry: Message Class values 9–127 are reserved by IETF; 128–255 are reserved for IETF-defined extensions. Parameter Tag value 65535 is reserved for IETF-defined extensions; all other unassigned values require IETF action.'
