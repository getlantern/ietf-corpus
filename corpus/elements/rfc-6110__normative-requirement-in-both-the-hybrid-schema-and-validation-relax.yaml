document: rfc-6110
kind: normative-requirement
summary: In both the hybrid schema and validation RELAX NG schemas, the root <rng:grammar> MUST have @xmlns:xxx attributes declaring prefixes of all namespaces used in the data model (prefixes SHOULD match those in the YANG 'prefix' statements), and each embedded <rng:grammar> MUST declare its module's namespace using the @ns attribute.
section: "8.4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
