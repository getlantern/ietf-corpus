document: rfc-7307
kind: interoperability-note
summary: Existing MIB modules for MPLS LSR (RFC 3813) and MPLS LDP managed objects (RFC 3815) do not provide the necessary information to support MT extensions, as the absence of MT-ID as an index means there is no way to disambiguate different topology instances.
