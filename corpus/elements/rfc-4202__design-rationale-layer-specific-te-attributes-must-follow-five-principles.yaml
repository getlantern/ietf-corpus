document: rfc-4202
kind: design-rationale
summary: 'Layer-specific TE attributes must follow five principles: separation of attributes per layer, support for inter-layer relationships (e.g., ''4 client links of type X can be supported by this server layer link''), support for inheritable attributes (e.g., protection), layer extensibility for future layers, and explicit attribute scope. The present document captures only single-layer general attributes; inter-layer relationships are deferred to a future document.'
section: "1.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
