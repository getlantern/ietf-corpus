document: rfc-8528
kind: protocol-element
summary: 'The mounted schema is determined at run time: every instance of a mount point that exists in the operational state MUST contain a copy of YANG library data (either RFC 7895 or RFC 8525 format) that defines the mounted schema. Clients retrieve this data from the instance tree.'
