summary: In the mesh solution, BGP is used to exchange softwire encapsulation sets and routing information among AFBRs. TCP-MD5 (RFC 2385) is the baseline BGP authentication mechanism; IPsec ESP may additionally be used for confidentiality and integrity of BGP sessions.
