document: rfc-5545
kind: protocol-element
summary: The ATTENDEE property conveys the calendar address of a participant in a group-scheduled calendar component. It supports parameters including CN, CUTYPE, DELEGATED-FROM, DELEGATED-TO, DIR, LANGUAGE, MEMBER, PARTSTAT, ROLE, RSVP, SENT-BY. The value MUST be a CAL-ADDRESS (URI, typically mailto:).
section: 3.8.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
