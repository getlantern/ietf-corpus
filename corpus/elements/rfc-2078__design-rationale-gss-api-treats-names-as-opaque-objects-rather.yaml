document: rfc-2078
kind: design-rationale
summary: GSS-API treats names as opaque objects rather than prescribing naming structures, specifically to support the range of underlying mechanisms that authenticate different name forms. Name manipulation primitives (GSS_Compare_name, GSS_Display_name, GSS_Import_name) are included in the API for portability across naming environments.
section: 1.1.5
topics:
    - security
