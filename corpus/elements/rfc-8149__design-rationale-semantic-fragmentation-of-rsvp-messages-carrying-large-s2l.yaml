document: rfc-8149
kind: design-rationale
summary: Semantic fragmentation of RSVP messages carrying large S2L sub-LSP descriptor lists results in out-of-order fragment arrival with no way for the receiver to determine beginning and end of the list. The fragment identifier (S2L_SUB_LSP_FRAG) was introduced specifically to allow unambiguous reassembly without requiring in-order delivery.
section: "3.3"
topics:
    - routing
    - mpls
