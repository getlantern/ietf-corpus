document: rfc-5331
kind: design-rationale
summary: Upstream-assigned labels are motivated primarily by MPLS multicast, where an upstream LSR adjacent to multiple downstream LSRs via a multi-access medium or tunnel can distribute a single upstream-assigned label to all downstream LSRs and transmit one copy of an MPLS packet, rather than requiring per-receiver label stacks.
section: "9"
topics:
    - mpls
    - multicast
    - routing
