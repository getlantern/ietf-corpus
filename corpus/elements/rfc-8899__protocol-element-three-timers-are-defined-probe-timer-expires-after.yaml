document: rfc-8899
kind: protocol-element
summary: 'Three timers are defined: PROBE_TIMER (expires after max ACK wait time, >= 1s, SHOULD be > 15s); PMTU_RAISE_TIMER (600 seconds, after which DPLPMTUD re-enters Search Phase); and CONFIRMATION_TIMER (used only with unacknowledged PLs in SEARCH_COMPLETE state to periodically confirm the PLPMTU).'
section: 5.1.1
