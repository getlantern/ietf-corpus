document: rfc-4551
kind: normative-requirement
summary: If a message appears multiple times in a STORE message set, the server MUST NOT fail the conditional STORE for a subsequent occurrence if the operation already completed successfully for an earlier occurrence of the same message.
section: "3.2"
rfc2119_level: MUST NOT
