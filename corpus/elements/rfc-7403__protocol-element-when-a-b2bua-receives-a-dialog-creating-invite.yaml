document: rfc-7403
kind: protocol-element
summary: When a B2BUA receives a dialog-creating INVITE with Max-Forwards of 0 and RFC 6849 media-loopback SDP, and its policy permits, it answers the INVITE as if it were the intended destination, establishing a media-loopback session per RFC 6849.
section: "3.2"
topics:
    - sip
    - realtime
