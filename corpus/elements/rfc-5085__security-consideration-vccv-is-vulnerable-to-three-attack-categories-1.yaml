document: rfc-5085
kind: security-consideration
summary: 'VCCV is vulnerable to three attack categories: (1) control-plane attacks on VCCV capability signaling, (2) data-plane attacks including packet injection/interception to generate false positives/negatives and flooding attacks causing DoS, and (3) vulnerabilities inherited from carried protocols (LSP Ping, ICMP). Mitigations include VCCV message throttling, IPsec for data-plane protection, and L2TPv3 Cookie field for spoofing prevention.'
