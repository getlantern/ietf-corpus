document: rfc-8550
kind: normative-requirement
summary: 'Sending and receiving agents MUST NOT use PKCS #6 extended certificates. Receiving agents MUST be able to parse and process a message containing PKCS #6 extended certificates, although ignoring those certificates is expected behavior. Sending agents MUST NOT send version 1 ACs.'
section: 2.2.1
rfc2119_level: MUST NOT
topics:
