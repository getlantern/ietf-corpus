document: rfc-3840
kind: protocol-element
summary: Feature parameters are encoded in the Contact header field. Base tags (sip.audio, sip.video, sip.methods, etc.) appear with the leading 'sip.' stripped and no '+' prefix. Non-base tags MUST have a leading '+' and retain any 'sip.' prefix. Boolean TRUE values result in a parameter with no value; disjunctions and negations are encoded as quoted strings.
section: "5"
topics:
    - sip
    - realtime
