document: rfc-9733
kind: protocol-element
summary: 'BRSKI-AE introduces a generalized well-known URI scheme: ''/.well-known/<enrollment-protocol>/<request>'', replacing the EST-specific ''/.well-known/est/<request>'' from BRSKI. CMP endpoints include ''/.well-known/cmp/initialization'', ''/.well-known/cmp/getcacerts'', and ''/.well-known/cmp/getcertreqtemplate''.'
section: "4.3"
