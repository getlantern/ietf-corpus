document: rfc-4861
kind: interoperability-note
summary: On Non-Broadcast Multi-Access (NBMA) links, address resolution and the multicast-dependent delivery of Router Solicitations and Advertisements are not specified by this document; alternative mechanisms must be defined per link type. Redirect, NUD, and next-hop determination SHOULD be implemented as described herein.
