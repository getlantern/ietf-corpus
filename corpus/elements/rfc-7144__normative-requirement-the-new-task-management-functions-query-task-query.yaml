document: rfc-7144
kind: normative-requirement
summary: The new task management functions (QUERY TASK, QUERY TASK SET, I_T NEXUS RESET, QUERY ASYNCHRONOUS EVENT) MUST NOT be sent unless iSCSIProtocolLevel=2 has been negotiated; any initiator sending them MUST also support all new task management function responses.
section: "6.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
