document: rfc-5425
kind: security-consideration
summary: The primary threats addressed by this specification are masquerade, message modification, and disclosure. TLS counters these through mutual authentication, integrity checking, and confidentiality. A secondary threat is message stream modification (deletion, replay, reordering), which is partially mitigated by TCP but not fully by TLS alone.
