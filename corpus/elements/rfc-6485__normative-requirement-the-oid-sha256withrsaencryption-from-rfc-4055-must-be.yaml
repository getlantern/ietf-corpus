document: rfc-6485
kind: normative-requirement
summary: The OID sha256withRSAEncryption from RFC 4055 MUST be used when generating or verifying digital signatures in the RPKI. It appears in the certificate signature and signatureAlgorithm fields, the CRL signatureAlgorithm field, each CMS SignerInfo signatureAlgorithm field, and certification request signature fields.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
