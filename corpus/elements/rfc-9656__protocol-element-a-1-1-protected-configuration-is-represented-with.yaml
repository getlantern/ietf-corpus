document: rfc-9656
kind: protocol-element
summary: A 1+1 protected configuration is represented with num-bonded-carriers=1 and num-protecting-carriers=1, meaning one active carrier is protected by one standby carrier. Both carrier termination points are still listed as bundled-links in the radio link.
