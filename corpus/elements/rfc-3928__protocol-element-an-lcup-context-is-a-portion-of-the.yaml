document: rfc-3928
kind: protocol-element
summary: An LCUP Context is a portion of the DIT enabled for LCUP. A server may support one or more LCUP Contexts, each potentially using a different cookie scheme. An LCUP search will not cross an LCUP Context boundary; instead it returns a SearchResultReference so the client can issue a separate search for the new context.
section: "3.4"
topics:
    - ldap
