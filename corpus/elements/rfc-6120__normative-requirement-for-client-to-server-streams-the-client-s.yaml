document: rfc-6120
kind: normative-requirement
summary: For client-to-server streams, the client's bare JID MUST be the SASL authorization identity and the resourcepart MUST be negotiated during resource binding; a client MUST NOT guess its JID but MUST treat the JID returned by the server during resource binding as authoritative.
section: 4.3.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
