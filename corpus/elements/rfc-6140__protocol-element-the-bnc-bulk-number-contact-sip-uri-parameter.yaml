document: rfc-6140
kind: protocol-element
summary: The 'bnc' (bulk number contact) SIP URI parameter is placed on a Contact URI in a REGISTER request to indicate that the contact represents multiple phone-number-associated registrations rather than a single contact. A URI with a 'bnc' parameter MUST NOT contain a user portion (no '@' symbol).
section: "5.1"
topics:
    - sip
    - realtime
