document: rfc-8703
kind: wire-format
summary: The Link Identifier Length Data Item (Type 26) has a fixed 2-octet payload containing the Link Identifier Length field that specifies the length in octets of Link Identifiers used by the modem for the session. It is sent only in the Session Initialization Response Message.
