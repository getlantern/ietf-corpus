document: rfc-6016
kind: normative-requirement
summary: For PathError, PathTear, ResvError, ResvTear, and ResvConf messages sent within the VPN, the SESSION/SENDER_TEMPLATE/FILTER_SPEC objects MUST be converted between IPv4 and VPN-IPv4 form, the appropriate RSVP_HOP type MUST be used, messages MUST be MPLS or IP encapsulated based on the received RSVP_HOP type, and messages MUST be addressed directly to the appropriate PE without using the Router Alert Option.
section: "3.6"
rfc2119_level: MUST
topics:
    - qos
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
