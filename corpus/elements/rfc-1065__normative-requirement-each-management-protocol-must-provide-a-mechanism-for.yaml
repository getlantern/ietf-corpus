document: rfc-1065
kind: normative-requirement
summary: Each management protocol must provide a mechanism for accessing simple (non-aggregate) object types and must specify whether aggregate object access is supported and which instances are returned when a type/instance pairing matches multiple instances.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
