document: rfc-8727
kind: protocol-element
summary: 'The IODEF abstract data types from RFC 7970 are mapped to native JSON types: INTEGER to JSON integer, REAL to JSON number, CHARACTER/STRING to JSON string, ML_STRING to a special object (Section 2.2.2), ENUM to ordered string values, DATETIME/TIMEZONE/PORTLIST to JSON string, and SOFTWARE/STRUCTUREDINFO/EXTENSION to JSON objects.'
section: "2.1"
topics:
