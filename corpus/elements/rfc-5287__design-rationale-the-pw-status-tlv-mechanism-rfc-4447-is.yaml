document: rfc-5287
kind: design-rationale
summary: The PW Status TLV mechanism (RFC 4447) is deliberately avoided for operational TDM PWs because status is already carried in-band in the TDM PW control word (L, M, and R fields), and using both mechanisms simultaneously would create contention between control-plane and data-plane status indications.
