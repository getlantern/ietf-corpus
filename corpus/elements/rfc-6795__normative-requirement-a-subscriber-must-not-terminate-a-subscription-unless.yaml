document: rfc-6795
kind: normative-requirement
summary: A subscriber MUST NOT terminate a subscription unless it is terminating the associated session or discovers the notifier has been removed from the list of relevant policy servers. A notifier MAY terminate a subscription, for example after sending a final policy denial.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - sip
