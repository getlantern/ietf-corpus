document: rfc-6015
kind: protocol-element
summary: The 1-D interleaved parity FEC code arranges source packets in a D×L matrix and XORs packets in each column (L apart in sequence number) to produce L repair packets. Each repair packet can recover exactly one missing source packet from its column; protection against bursty losses improves as L increases.
section: "1"
topics:
