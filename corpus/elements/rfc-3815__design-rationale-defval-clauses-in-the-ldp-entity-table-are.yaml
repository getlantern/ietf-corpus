document: rfc-3815
kind: design-rationale
summary: DEFVAL clauses in the LDP Entity Table are not specified in the LDP Specification (RFC 3036) but are widely used by existing LDP MIB implementations and have been adopted in this module. They may be overridden at row creation or via subsequent SET requests.
