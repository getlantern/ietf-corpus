document: rfc-9168
kind: design-rationale
summary: Flow Specification TLV type values 0–255 are partitioned to mirror the BGP Flow Spec Component Types registry (RFC 8955/8956), using the BGP encoding but without the BGP type octet since PCEP uses 2-octet type fields. This enables direct reuse of BGP flow component definitions without re-specification.
section: "7"
topics:
