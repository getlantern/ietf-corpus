document: rfc-8071
kind: normative-requirement
summary: If certificate path validation is used, the client MUST ensure the presented certificate has a valid chain of trust to a preconfigured issuer certificate, and that the certificate encodes an identifier (per RFC 6125) that the client was aware of before the connection attempt.
section: "3.1"
rfc2119_level: MUST
topics:
