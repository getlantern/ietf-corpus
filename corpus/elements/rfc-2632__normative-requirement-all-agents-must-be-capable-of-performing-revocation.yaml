document: rfc-2632
kind: normative-requirement
summary: All agents MUST be capable of performing revocation checks using CRLs as specified in [KEYM], and MUST perform revocation status checking in accordance with [KEYM]. Receiving agents MUST recognize CRLs in received S/MIME messages.
section: "2.1"
rfc2119_level: MUST
