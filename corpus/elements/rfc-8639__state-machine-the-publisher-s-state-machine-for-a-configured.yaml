document: rfc-8639
kind: state-machine
summary: 'The publisher''s state machine for a configured subscription has three states: ''valid'', ''invalid'', and ''concluded''. Creation or modification triggers evaluation; if supportable the subscription enters ''valid'' and becomes operational; unsupportable conditions yield ''invalid'' with a subscription-terminated notification; reaching stop-time transitions to ''concluded'' with a subscription-completed notification.'
section: 2.5.1
topics:
    - yang
    - netconf
