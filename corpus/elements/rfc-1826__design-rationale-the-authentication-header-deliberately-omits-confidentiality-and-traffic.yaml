document: rfc-1826
kind: design-rationale
summary: The Authentication Header deliberately omits confidentiality and traffic analysis protection so that it remains a separable, composable component. Users requiring confidentiality are directed to the IP Encapsulating Security Payload (ESP, RFC 1827).
section: "1"
topics:
