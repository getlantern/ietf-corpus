document: rfc-3319
kind: security-consideration
summary: If an adversary modifies a DHCP server response or inserts its own, a SIP user agent could be directed to a rogue SIP server that intercepts call requests or denies service. A modified DHCP answer could also omit TLS-based SIP server names, facilitating interception. Security considerations from RFC 3315, RFC 3261, and RFC 3263 apply.
section: "6"
topics:
    - sip
    - security
