document: rfc-8778
kind: security-consideration
summary: When generating an LMS key pair, an implementation MUST generate each key pair independently of all other key pairs in the HSS tree, and MUST ensure that an LM-OTS private key is used to generate a signature only one time.
section: "4"
rfc2119_level: MUST
