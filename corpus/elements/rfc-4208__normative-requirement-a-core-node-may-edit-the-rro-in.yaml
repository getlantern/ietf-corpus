document: rfc-4208
kind: normative-requirement
summary: A core-node MAY edit the RRO in a Resv message such that it includes only the subobjects from the egress core-node through the egress edge-node, allowing the ingress node to learn the selected link and labels at the far end of the connection without exposing core topology.
