document: rfc-6361
kind: protocol-element
summary: 'Three PPP protocol numbers are reserved for TRILL over PPP: 005d (TRILL Network Protocol, TNP), 405d (TRILL Link State Protocol, TLSP), and 805d (TRILL Network Control Protocol, TNCP). These allow TRILL encapsulation headers and link-state messages to be distinguished from each other and from other PPP traffic.'
