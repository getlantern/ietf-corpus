document: rfc-2848
kind: wire-format
summary: 'PINT URLs use the SIP URL user portion to encode service type: ''R2C'' (Request-to-Call), ''R2F'' (Request-to-Fax), ''R2HC'' (Request-to-Hear-Content). A new URL parameter ''tsp'' (telephone service provider) identifies the telephone network provider. Example: ''sip:R2F@pint.pintservice.com;tsp=telco.com''.'
section: 3.5.5.1
topics:
    - realtime
    - sip
