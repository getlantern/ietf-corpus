document: rfc-1766
kind: protocol-element
summary: 'The Content-Language header field is defined for RFC-822-like headers (e.g., MIME body parts, Web documents). Its EBNF is: Language-Header = "Content-Language" ":" 1#Language-Tag, allowing a comma-separated list of one or more language tags with optional whitespace and parenthesized comments.'
