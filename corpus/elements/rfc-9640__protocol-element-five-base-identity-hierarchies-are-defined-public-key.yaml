document: rfc-9640
kind: protocol-element
summary: 'Five base identity hierarchies are defined: ''public-key-format'' (with derived ssh-public-key-format and subject-public-key-info-format), ''private-key-format'' (rsa-private-key-format, ec-private-key-format, one-asymmetric-key-format), ''symmetric-key-format'' (octet-string-key-format, one-symmetric-key-format), ''encrypted-value-format'' (symmetrically- and asymmetrically-encrypted-value-format), and ''csr-format'' (p10-csr-format). Base identities are abstract; additional derived identities MAY be defined by future efforts.'
section: 2.1.2
topics:
    - yang
    - crypto
    - pkix
