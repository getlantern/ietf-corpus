document: rfc-6038
kind: normative-requirement
summary: In Unauthenticated mode with both Reflect Octets and truncation, Padding Length SHALL be >= 27 + Length of padding to reflect octets. In Authenticated/Encrypted modes, Padding Length SHALL be >= 56 + Length of padding to reflect octets.
section: "4.2"
rfc2119_level: MUST
topics:
