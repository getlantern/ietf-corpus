document: rfc-9252
kind: wire-format
summary: 'The SRv6 Service TLV is encoded as: TLV Type (1 octet), TLV Length (2 octets), RESERVED (1 octet, MUST be 0), followed by variable-length SRv6 Service Sub-TLVs. Type 5 is the SRv6 L3 Service TLV; Type 6 is the SRv6 L2 Service TLV.'
