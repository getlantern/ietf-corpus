document: rfc-2890
kind: protocol-element
summary: If a newly arrived packet would cause the per-flow buffer to exceed MAX_PERFLOW_BUFFER packets, the packet at the head of the buffer is immediately decapsulated regardless of its sequence number, the last-decapsulated sequence number is set accordingly, and the new packet may then be placed in the buffer.
section: "2.2"
topics:
