document: rfc-2632
kind: normative-requirement
summary: For DH key exchange certificates, if keyAgreement is set and the key is used to decrypt data, the agent MUST only use the key if encipherOnly is 0; if used to encrypt data, it MUST only use the key if decipherOnly is 0.
section: 4.4.2.1
rfc2119_level: MUST
topics:
