document: rfc-9645
kind: security-consideration
summary: All writable sensitive data nodes in the TLS client and server groupings (client-identity, server-authentication, hello-params, keepalives, server-identity, client-authentication) carry 'nacm:default-deny-write' to restrict unauthorized modifications via the NETCONF Access Control Model (RFC 8341).
