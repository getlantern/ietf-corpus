document: rfc-8042
kind: protocol-element
summary: A Traffic Engineering Network-to-Router Metric Sub-TLV (type 35) is defined, identical in format to the TE Metric Sub-TLV from RFC 3630 Section 2.5.5 except for the type value. It MUST only appear in Type 2 Link TLVs of TE LSAs and MUST appear at most once per Link TLV.
section: "3.3"
rfc2119_level: MUST
topics:
