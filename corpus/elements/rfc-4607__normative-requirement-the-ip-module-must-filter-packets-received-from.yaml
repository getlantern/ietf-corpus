document: rfc-4607
kind: normative-requirement
summary: The IP module MUST filter packets received from the link layer before delivering them to the socket layer, because on shared-medium networks (e.g., Ethernet) all packets to destination G are delivered to any host subscribed to any channel (S,G) regardless of S.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
