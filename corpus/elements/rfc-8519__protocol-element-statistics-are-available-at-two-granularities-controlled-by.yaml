summary: 'Statistics are available at two granularities controlled by features: ''acl-aggregate-stats'' exposes per-ACE matched-packets and matched-octets (yang:counter64, config false) aggregated across all interfaces; ''interface-stats'' exposes per-ACE, per-interface counters under the attachment-points/interface tree.'
