document: rfc-6728
kind: normative-requirement
summary: A Cache MUST NOT aggregate packets observed at different Observation Domains into the same Flow. When a Cache is configured to receive packets from multiple Observation Domains, it must maintain distinct Flow Records per Observation Domain.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - measurement
