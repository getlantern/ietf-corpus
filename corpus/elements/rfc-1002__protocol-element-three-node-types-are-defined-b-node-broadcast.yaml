document: rfc-1002
kind: protocol-element
summary: 'Three node types are defined: B-node (broadcast node—uses IP broadcast for name resolution, no NBNS required), P-node (point-to-point—uses NBNS unicast only, no broadcast), and M-node (mixed—uses broadcast first, falls back to NBNS). The NBNS (NetBIOS Name Server) and NBDD (NetBIOS Datagram Distribution server) are also defined.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
