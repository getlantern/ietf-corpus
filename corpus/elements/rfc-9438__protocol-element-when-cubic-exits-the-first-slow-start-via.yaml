document: rfc-9438
kind: protocol-element
summary: When CUBIC exits the first slow start via HyStart++ without packet loss, W_max is undefined; CUBIC sets cwnd_prior = cwnd, switches to congestion avoidance, and uses W_cubic(t) with K=0 and W_max set to the congestion window at the start of congestion avoidance.
section: "4.10"
topics:
    - congestion
    - tcp
