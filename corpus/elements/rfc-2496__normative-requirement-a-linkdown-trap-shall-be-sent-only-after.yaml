document: rfc-2496
kind: normative-requirement
summary: A linkDown trap shall be sent only after the agent has determined for certain that the unavailable state has been entered, but the timestamp on the trap will be that of the first UAS (i.e., 10 seconds earlier). A linkUp trap shall be handled similarly.
section: 2.4.2
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
