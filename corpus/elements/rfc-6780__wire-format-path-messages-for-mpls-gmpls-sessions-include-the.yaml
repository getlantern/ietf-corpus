document: rfc-6780
kind: wire-format
summary: Path messages for MPLS/GMPLS sessions include the ASSOCIATION object(s) after SESSION_ATTRIBUTE and before POLICY_DATA; for non-LSP sessions, ASSOCIATION appears after TIME_VALUES and before POLICY_DATA. Relative ordering of ASSOCIATION objects of the same type SHOULD be preserved by transit nodes.
section: 3.1.1
topics:
    - mpls
    - routing
