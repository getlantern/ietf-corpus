document: rfc-5177
kind: protocol-element
summary: The Mobile Network Request Extension (Sub-Type 0) is a TLV-encoded extension included in Registration Requests by the Mobile Router in explicit mode. It carries Type (148), Length (6), Sub-Type (0), Prefix Length (8-bit), and Prefix (32-bit IPv4 address) fields to identify a Mobile Network Prefix.
