document: rfc-2446
kind: normative-requirement
summary: The SEQUENCE property value MUST be incremented each time the Organizer uses the ADD or CANCEL methods. It MUST NOT be incremented when using REPLY, REFRESH, COUNTER, DECLINECOUNTER, or when sending a delegation REQUEST.
section: 2.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
