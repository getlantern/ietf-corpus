document: rfc-7947
kind: protocol-element
summary: Path hiding occurs when a route server applies per-client policy to filter the calculated best path from reaching a particular client, while an alternate policy-compliant path exists but is never selected because the BGP Decision Process runs only once for all clients.
section: 2.3.1
topics:
    - bgp
    - routing
