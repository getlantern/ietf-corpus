document: rfc-8995
kind: protocol-element
summary: 'BRSKI defines two HTTP REST channels: BRSKI-EST (between pledge and registrar) using the existing EST URI tree plus new paths under ''/.well-known/brski'', and BRSKI-MASA (between registrar and MASA) using ''https://'' authority ''/.well-known/brski''. New BRSKI operations use JSON (RFC 8259) with base64-encoded binary values; existing EST operations retain CMS message formats.'
