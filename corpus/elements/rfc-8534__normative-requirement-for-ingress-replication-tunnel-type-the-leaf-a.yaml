document: rfc-8534
kind: normative-requirement
summary: For Ingress Replication tunnel type, the Leaf A-D route's PTA MAY specify Ingress Replication with a non-zero MPLS label (used by ingress PE for that specific flow), or MAY specify zero label or 'no tunnel information present', in which case the label from the match-for-reception Leaf A-D route is used.
section: "5.2"
rfc2119_level: MAY
topics:
    - multicast
    - mpls
    - routing
