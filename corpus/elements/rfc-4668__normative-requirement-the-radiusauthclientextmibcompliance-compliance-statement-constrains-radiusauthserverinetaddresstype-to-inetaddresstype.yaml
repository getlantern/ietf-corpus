document: rfc-4668
kind: normative-requirement
summary: The radiusAuthClientExtMIBCompliance compliance statement constrains radiusAuthServerInetAddressType to InetAddressType { ipv4(1), ipv6(2) } and radiusAuthServerInetAddress to InetAddress SIZE(4|16); implementations are only required to support IPv4 and globally unique IPv6 addresses.
section: "7"
rfc2119_level: REQUIRED
topics:
