document: rfc-5910
kind: protocol-element
summary: The <secDNS:update> element contains optional <secDNS:rem>, <secDNS:add>, and <secDNS:chg> child elements for modifying DNSSEC data on a domain delegation. It also carries an optional 'urgent' boolean attribute (default false) allowing clients to request high-priority processing of the update. At least one of rem, add, or chg MUST be provided.
section: 5.2.5
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
