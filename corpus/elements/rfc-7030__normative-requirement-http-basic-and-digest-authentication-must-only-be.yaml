document: rfc-7030
kind: normative-requirement
summary: HTTP Basic and Digest authentication MUST only be performed over TLS 1.1 or later. NULL and anon cipher suites MUST NOT be used because they do not provide confidentiality or support mutual authentication.
section: 3.2.3
rfc2119_level: MUST
