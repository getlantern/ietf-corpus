document: rfc-4429
kind: normative-requirement
summary: A host MAY configure a new address as Optimistic. A host that does not know the SLLAO of its router SHOULD NOT configure a new address as Optimistic. A router SHOULD NOT configure an Optimistic Address.
section: "3.3"
rfc2119_level: MAY
topics:
