summary: A BGPsec Assertion is a JSON object that MUST contain an 'asn' member (number), an 'SKI' member (Base64 without trailing '=' of the Subject Key Identifier), and a 'routerPublicKey' member (Base64 without trailing '=' of the full ASN.1 DER-encoded subjectPublicKeyInfo).
