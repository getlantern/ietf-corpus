document: rfc-7022
kind: security-consideration
summary: Implementations MUST NOT rely on the uniqueness of RTCP CNAMEs for any essential security services. Any participant can choose any RTCP CNAME and can thus impersonate another participant; SRTP keeps unauthorized entities out of a session but does not prevent impersonation by authorized entities.
section: "6.1"
topics:
    - rtp
    - realtime
    - security
