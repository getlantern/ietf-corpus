document: rfc-4233
kind: interoperability-note
summary: 'When an SG receives an ASPAC with an unsupported Traffic Mode Type for a particular Interface Identifier, it MUST respond with an Error Message (Cause: Unsupported Traffic Handling Mode). Text-formatted Interface Identifiers trigger an ''Unsupported Interface Identifier Type'' error if the SG only supports integer format, requiring the ASP to resend with integer format.'
section: 3.3.2.5
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
