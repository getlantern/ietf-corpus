summary: 'The RTP header (12 bytes, RFC 3550 format) immediately follows the PLE control word: V=2 (2 bits), P (1 bit, must be 0), X (1 bit, must be 0), CC (4 bits, must be 0), M (1 bit, must be 0), PT (7 bits, dynamic), 16-bit sequence number, 32-bit timestamp, and 32-bit SSRC.'
