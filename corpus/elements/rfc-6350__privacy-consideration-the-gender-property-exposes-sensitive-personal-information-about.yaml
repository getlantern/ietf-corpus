document: rfc-6350
kind: privacy-consideration
summary: The GENDER property exposes sensitive personal information about biological sex and gender identity. The SOURCE property may reveal the URI of a directory service holding additional personal data. Implementations should apply appropriate access controls and consider whether to include such properties when sharing vCards.
section: "9"
topics:
    - privacy
