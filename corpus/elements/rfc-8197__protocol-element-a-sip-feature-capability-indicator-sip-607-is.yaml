document: rfc-8197
kind: protocol-element
summary: A SIP feature-capability indicator 'sip.607' is defined, allowing a registrar to advertise in a REGISTER response that the corresponding proxy supports the 607 response code. This enables UAs to conditionally expose user-interface elements such as a 'spam' button.
