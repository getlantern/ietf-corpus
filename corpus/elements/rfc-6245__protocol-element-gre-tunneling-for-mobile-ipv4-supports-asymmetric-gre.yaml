document: rfc-6245
kind: protocol-element
summary: 'GRE tunneling for Mobile IPv4 supports asymmetric GRE keying: the FA assigns a GRE key for traffic it sends (used by the HA in encapsulating GRE headers for reverse tunneling), and the HA assigns its own GRE key (used by the FA in encapsulating GRE headers). Keys are exchanged during the Mobile IP registration procedure.'
