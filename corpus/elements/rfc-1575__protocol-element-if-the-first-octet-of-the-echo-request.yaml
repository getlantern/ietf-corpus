document: rfc-1575
kind: protocol-element
summary: If the first octet of the echo-request data field is binary 10000001, an echo-response header is contained in the echo-request packet. This embedded header allows a router to formulate a standard echo-response packet including lifetime, segment length, and checksum fields.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
