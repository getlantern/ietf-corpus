document: rfc-6119
kind: normative-requirement
summary: The IPv6 TE Router ID TLV MUST NOT be included more than once in an LSP, and an implementation receiving it MUST NOT treat the router ID as a /128 reachable prefix in SPF calculation to avoid forwarding loops.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
