document: rfc-6141
kind: normative-requirement
summary: A UAS that accepts a target refresh within a re-INVITE and never receives an ACK after sending a final response SHOULD NOT terminate the dialog if a new re-INVITE with a higher CSeq sequence number has been received.
section: "5.4"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
