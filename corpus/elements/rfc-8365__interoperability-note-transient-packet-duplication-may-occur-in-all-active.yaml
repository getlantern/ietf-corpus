document: rfc-8365
kind: interoperability-note
summary: Transient packet duplication may occur in All-Active multihomed scenarios when unknown unicast flooding and ingress replication are both enabled and traffic arrives before the ingress PE learns the MAC via BGP. To avoid this, VXLAN-GPE encapsulation should be used with the BUM Traffic Bit set.
section: 8.3.3
topics:
    - routing
    - multicast
