document: rfc-6284
kind: normative-requirement
summary: 'Implementations MUST encode into the Token at minimum: the client''s IP address as seen by the server (32/128 bits for IPv4/IPv6), the client-provided nonce (64 bits), and the absolute expiration time as an NTP timestamp (64 bits) to protect against replay attacks.'
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - security
    - crypto
    - realtime
