document: rfc-5259
kind: protocol-element
summary: The BODYPARTSTRUCTURE CONVERT data item returns the MIME structure of the converted body part (following RFC 3501 BODYSTRUCTURE syntax), reflecting the state after conversion. It MUST match the BINARY data returned for the same conversion in the same IMAP session.
