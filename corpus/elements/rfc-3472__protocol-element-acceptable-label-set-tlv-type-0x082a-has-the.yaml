document: rfc-3472
kind: protocol-element
summary: Acceptable Label Set TLV (type 0x082a) has the same format as the Label Set TLV and is carried in NOTIFICATION messages to convey the set of labels acceptable to the generating node following a label error. Its inclusion is optional; when included, the NOTIFICATION SHOULD carry a 'Routing problem/Unacceptable label value' indication.
section: "4"
topics:
    - routing
