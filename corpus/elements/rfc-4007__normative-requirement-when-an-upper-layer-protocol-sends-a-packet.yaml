document: rfc-4007
kind: normative-requirement
summary: When an upper-layer protocol sends a packet to a non-global destination address and the node is attached to more than one zone of that scope, it must have a means of identifying the intended zone to the IPv6 layer. The upper-layer requires the ability to specify a zone index when sending to a non-global, non-loopback destination address.
section: "7"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
