document: rfc-8380
kind: design-rationale
summary: 'Non-RBridge TRILL encapsulation avoids the nickname exhaustion problem: all TRILL-ENs attached to one RBridge can share one TRILL nickname, allowing large data centers with hundreds of thousands of virtual switches to operate without exhausting the TRILL nickname space or overwhelming IS-IS.'
section: "5.1"
topics:
