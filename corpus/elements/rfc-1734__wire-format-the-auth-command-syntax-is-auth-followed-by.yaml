summary: 'The AUTH command syntax is: "AUTH" followed by one or more spaces or tabs, then the auth_type (one or more ATOM_CHARs), optionally followed by base64 data lines, and terminated by CRLF. The continue_req server challenge is "+" SPACE base64 CRLF.'
