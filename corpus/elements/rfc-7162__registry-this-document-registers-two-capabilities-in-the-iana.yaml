summary: 'This document registers two capabilities in the IANA IMAP4 Capabilities Registry: ''CONDSTORE'' for the Conditional STORE extension providing mod-sequence tracking and protected flag updates, and ''QRESYNC'' for the Quick Mailbox Resynchronization extension that builds on CONDSTORE to support single-round-trip full resynchronization.'
