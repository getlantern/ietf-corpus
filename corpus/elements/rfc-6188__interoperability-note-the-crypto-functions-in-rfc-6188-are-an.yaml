document: rfc-6188
kind: interoperability-note
summary: The crypto functions in RFC 6188 are an addition to, not a replacement for, the crypto functions defined in RFC 3711 (SRTP). The Suite B profile requires AES-256, but the crypto suites here use HMAC-SHA1 which is not part of Suite B.
section: "1"
