document: rfc-8762
kind: protocol-element
summary: 'By default STAMP uses symmetrical packets: the Session-Reflector returns a packet equal in size to the packet it received. The MBZ padding in the Session-Sender packet is sized to equalize the base sender and reflector packet sizes.'
section: "4.2"
