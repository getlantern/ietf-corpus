document: rfc-3030
kind: normative-requirement
summary: If a MIME message contains a 'Binary' content-transfer-encoding and the BODY parameter does not indicate BINARYMIME, the message MUST be accepted and SHOULD be returned to the sender with an appropriate DSN.
