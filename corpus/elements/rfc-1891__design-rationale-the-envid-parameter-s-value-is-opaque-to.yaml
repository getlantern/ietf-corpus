document: rfc-1891
kind: design-rationale
summary: The ENVID parameter's value is opaque to the mail system and meaningful only to the sender or their user agent. This design allows the sender to use any identifier scheme (e.g., including transaction IDs or timestamps) without requiring the mail infrastructure to interpret it.
section: "5.4"
topics:
    - email
