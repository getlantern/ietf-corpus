document: rfc-5269
kind: normative-requirement
summary: The AR MUST set the AT field to the MN's preferred algorithm if supported; otherwise the AR MUST select an algorithm of equivalent or stronger strength. The AR MUST include the SEND nonce from the RtSolPr in the PrRtAdv for anti-replay protection.
section: "3.2"
rfc2119_level: MUST
