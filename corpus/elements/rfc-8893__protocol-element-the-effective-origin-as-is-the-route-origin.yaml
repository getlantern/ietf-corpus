document: rfc-8893
kind: protocol-element
summary: The 'effective origin AS' is the Route Origin Autonomous System Number of the UPDATE to be sent to neighboring BGP speakers, as determined by configuration and outbound policy — which may differ from the origin AS in the RIB due to private AS removal, confederation handling, AS migration, or other AS_PATH modifications.
