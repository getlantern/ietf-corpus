document: rfc-8685
kind: protocol-element
summary: A new Domain Diverse O-bit (bit 18) is added to the SVEC object Flags field. When set, computed paths must not share any transit domains; other diversity bits (L, N, S) remain applicable within shared ingress/egress domains.
section: "3.6"
