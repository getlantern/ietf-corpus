document: rfc-8973
kind: normative-requirement
summary: The DHCPv6 client MUST silently discard multicast and host loopback addresses (per RFC 6890) conveyed in OPTION_V6_DOTS_ADDRESS. If more than one instance of OPTION_V6_DOTS_RI or OPTION_V6_DOTS_ADDRESS is received, only the first instance MUST be used.
section: 5.1.3
rfc2119_level: MUST
topics:
    - ip
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
