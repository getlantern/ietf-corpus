document: rfc-7530
kind: normative-requirement
summary: Where an NFSv4 implementation supports operation over IP, the transport layer MUST be an IETF standardized transport protocol that avoids network congestion. Specifically, an NFSv4 implementation MUST support operation over TCP; client and server SHOULD use persistent TCP connections.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
