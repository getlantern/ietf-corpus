summary: SNMPv2-Trap-PDU variable-bindings MUST include as the first variable sysUpTime.0 and as the second variable snmpTrapOID.0 (the notification's administratively assigned name). Additional variables from the NOTIFICATION-TYPE OBJECTS clause follow, with optional additional variables at agent discretion.
