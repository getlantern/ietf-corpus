document: rfc-8790
kind: normative-requirement
summary: Implementations MUST reject and generate an error for Patch Packs with invalid Records. If a Patch Pack is rejected, the state of the Target Pack is not changed — either all or none of the Patch Records are applied (atomic semantics).
section: "3.2"
rfc2119_level: MUST
topics:
