document: rfc-8775
kind: security-consideration
summary: An attacker may send a single high-rate flow or multiple flows designed to hash to the same GDR, overloading that router and undermining the intended load balancing. If a GDR is subverted, it can be made to stop forwarding all traffic assigned to it.
section: "8"
topics:
    - security
    - multicast
