document: rfc-7179
kind: protocol-element
summary: 'Two RBridge Channel Alert extended header flags are defined: the Critical Channel Alert flag (bit 7) and the Non-critical Channel Alert flag (bit 8). Their presence signals that the frame is an RBridge Channel message [RFC7178] requiring per-hop processing. If the Critical flag is set and the RBridge does not implement the RBridge Channel feature or the specific protocol, the frame is discarded.'
section: "3.1"
topics:
    - routing
