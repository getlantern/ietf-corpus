document: rfc-8581
kind: normative-requirement
summary: For Peer Overload Reports, the preferred abatement treatment is diversion; the reacting node SHOULD attempt to divert requests identified as needing abatement to other peers. If insufficient capacity exists, the reacting node MUST throttle necessary requests.
section: 6.2.5
rfc2119_level: SHOULD
topics:
    - diameter
