document: rfc-2210
kind: design-rationale
summary: The ADSPEC uses variable-length, service-numbered fragments so that new QoS services can be deployed without immediately updating existing code; unknown fragments are skipped using the SVC_LENGTH field, with only the break bit set to indicate the service was not processed at that hop.
section: "3.3"
