document: rfc-8708
kind: protocol-element
summary: When signed attributes are absent the HSS/LMS signature is computed over the content directly; when signed attributes are present a hash is computed over the content, a message-digest attribute is built, and the signature covers the DER-encoded SignedAttributes (which MUST include content-type and message-digest attributes).
section: "5"
topics:
