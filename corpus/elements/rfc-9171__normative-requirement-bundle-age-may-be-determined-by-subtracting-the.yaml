document: rfc-9171
kind: normative-requirement
summary: Bundle age MAY be determined by subtracting the creation timestamp from current time only if the timestamp is non-zero and the local clock is known accurate; otherwise bundle age MUST be obtained from the Bundle Age extension block. When a bundle expires, the BPA MUST delete it citing 'Lifetime expired' or 'Traffic pared'.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
