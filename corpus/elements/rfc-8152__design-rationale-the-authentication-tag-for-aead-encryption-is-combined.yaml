document: rfc-8152
kind: design-rationale
summary: The authentication tag for AEAD encryption is combined with the ciphertext in COSE (rather than as a separate field as in some JOSE structures). This simplifies processing and reflects the fact that AEAD algorithms inherently output a combined ciphertext+tag.
section: "1.1"
