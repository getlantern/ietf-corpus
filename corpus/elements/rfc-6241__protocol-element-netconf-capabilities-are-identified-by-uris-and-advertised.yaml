document: rfc-6241
kind: protocol-element
summary: NETCONF capabilities are identified by URIs and advertised in the session-opening <hello> exchange. Capabilities may define new protocol operations, new parameters to existing operations, and new content constraints, and may declare dependencies on other capabilities.
section: "1.3"
