document: rfc-1247
kind: normative-requirement
summary: OSPF runs directly over IP using IP protocol number 89. OSPF does not provide explicit fragmentation/reassembly support; when fragmentation is necessary, IP fragmentation/reassembly is used, though it should be avoided whenever possible.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
