document: rfc-4359
kind: design-rationale
summary: 'Key lifetime recommendations depend on modulus size: 768-bit moduli should not be used beyond 1 week, and 1024-bit moduli should not be used beyond 1 year, based on contemporary estimates of attacker cryptanalysis cost (processing, memory, and cryptographic analysis methods).'
