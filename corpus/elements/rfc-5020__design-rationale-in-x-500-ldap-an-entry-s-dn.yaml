document: rfc-5020
kind: design-rationale
summary: In X.500/LDAP, an entry's DN is not itself an attribute of the entry, making it impossible to perform attribute value assertions against it. The 'entryDN' attribute was introduced specifically to enable search filters (including componentFilterMatch) to match against DN components.
section: "1"
topics:
    - ldap
