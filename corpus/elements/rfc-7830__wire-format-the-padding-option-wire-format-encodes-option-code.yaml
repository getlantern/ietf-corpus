document: rfc-7830
kind: wire-format
summary: The Padding option wire format encodes OPTION-CODE as a 16-bit field (value 12), OPTION-LENGTH as a 16-bit field indicating the number of padding octets, followed by that many PADDING octets. The minimum PADDING length is 0.
