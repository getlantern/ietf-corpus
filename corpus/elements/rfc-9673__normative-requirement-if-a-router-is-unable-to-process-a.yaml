document: rfc-9673
kind: normative-requirement
summary: If a router is unable to process a specific Hop-by-Hop option, it SHOULD behave as specified for an unrecognized Option Type with action bits set to '00' and SHOULD skip remaining options using the 'Hdr Ext Len' field.
