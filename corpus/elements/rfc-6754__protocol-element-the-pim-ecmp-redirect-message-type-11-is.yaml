document: rfc-6754
kind: protocol-element
summary: The PIM ECMP Redirect message (Type=11) is sent by an upstream router to instruct downstream routers to redirect PIM Joins to a new RPF neighbor via a different ECMP interface. It carries Group Address, Source Address, Neighbor Address, Interface ID, Preference, and Metric fields.
section: 5.5.2
topics:
    - multicast
    - routing
