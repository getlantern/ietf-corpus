document: rfc-7473
kind: normative-requirement
summary: An operator MUST NOT disable Prefix-LSP state on any Targeted LDP (tLDP) session established for reasons related to remote Loop-Free Alternate (LFA) Fast Re-Route (FRR). In a remote network that is LFA FRR enabled, it is RECOMMENDED not to disable Prefix-LSP state on a tLDP session even if the current session type is PW-only or ICCP-only.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
