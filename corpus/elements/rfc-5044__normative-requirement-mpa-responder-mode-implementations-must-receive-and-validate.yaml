document: rfc-5044
kind: normative-requirement
summary: MPA Responder mode implementations MUST receive and validate at least one FPDU before sending any FPDUs or Markers, ensuring the Initiator has time to enter Full Operation before an FPDU arrives and avoiding race conditions.
section: 7.1.2
rfc2119_level: MUST
