summary: 'The CDDL control operator ''.oid'' is like ''.sdnvseq'' but includes the X*40+Y translation for the first two arcs of absolute OIDs. Example: ''bytes .oid [2, 5, 4, 6]'' specifies the country attribute type OID.'
