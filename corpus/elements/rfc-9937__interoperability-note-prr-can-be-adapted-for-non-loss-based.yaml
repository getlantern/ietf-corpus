document: rfc-9937
kind: interoperability-note
summary: PRR can be adapted for non-loss-based congestion control (e.g., ECN per RFC 3168) by using parts of the RFC 6675 loss recovery state machine to invoke PRR ACK processing for exactly one round trip. However, interactions with AQM and ECN approaches should be assessed per RFC 9743 guidance.
section: "4"
topics:
