document: rfc-3101
kind: normative-requirement
summary: NSSA border routers MUST originate a default LSA (0.0.0.0/0) into all directly attached NSSAs to support intra-AS and inter-AS routing. The default is advertised as either a Type-3 or Type-7 LSA depending on the ImportSummaries configuration.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
