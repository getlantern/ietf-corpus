document: rfc-2576
kind: security-consideration
summary: SNMPv1 and SNMPv2c provide no security mechanisms (no authentication or encryption). The SNMP-COMMUNITY-MIB enables view-based access control (VACM) to limit SNMPv1/v2c access; administrators MUST employ this and restrict community-based access to read-only where possible to mitigate risk from unauthenticated operations.
section: "8"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
