document: rfc-5424
kind: wire-format
summary: STRUCTURED-DATA is either NILVALUE or one or more SD-ELEMENTs of the form '[' SD-ID *(SP SD-PARAM) ']', where SD-PARAM = PARAM-NAME '=' %d34 PARAM-VALUE %d34. SD-ELEMENTs are concatenated with no separator between them.
section: "6.3"
