document: rfc-9254
kind: interoperability-note
summary: The anyxml node serializes arbitrary CBOR content, and its value MAY contain items tagged with the CBOR tags listed in Section 9.3. Those tags SHALL be supported. The 'xml' in the name is a misnomer inherited from YANG-XML and does not imply XML content.
section: "4.6"
topics:
    - yang
    - cbor
