document: rfc-9555
kind: normative-requirement
summary: When the JSCOMPS parameter is set on N or ADR, the order in the JSContact components property MUST adhere to the order of the JSCOMPS parameter value, and the isOrdered property MUST be set to 'true'. When JSCOMPS is absent, isOrdered MUST be 'false' and defaultSeparator MUST NOT be set.
section: 2.5.5
rfc2119_level: MUST
topics:
    - json
