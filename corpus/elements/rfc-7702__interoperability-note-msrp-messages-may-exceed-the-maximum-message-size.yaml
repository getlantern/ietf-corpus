document: rfc-7702
kind: interoperability-note
summary: MSRP messages may exceed the maximum message size allowed by an XMPP service on the far end of an MSRP-to-XMPP gateway. RFC 7573 discusses this size mismatch issue for one-to-one sessions; the same concern applies to groupchat.
