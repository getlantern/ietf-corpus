document: rfc-8896
kind: wire-format
summary: The 'calendared' request field is a JSONBoolean array of exactly N elements (where N equals the number of requested cost metrics). Each boolean indicates whether the corresponding cost type should be returned as a Calendar array. When absent, it is assumed to be all-false.
