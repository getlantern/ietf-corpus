document: rfc-9262
kind: design-rationale
summary: The ECMP() seed parameter allows the BIER-TE controller to assign different seeds to consecutive ECMP hops, preventing hash polarization where all traffic is forced down a single path through a multi-tier topology. Nodes on parallel (non-sequential) branches may safely share the same seed.
section: 5.1.7
topics:
