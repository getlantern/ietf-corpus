document: rfc-6074
kind: interoperability-note
summary: A non-distributed PE (performing both U-PE and N-PE functions) can interoperate with distributed VPLS N-PE/U-PE pairs by advertising exactly one local U-PE per VPLS in the discovery procedure. If all PEs in a VPLS advertise one local U-PE, the resulting signaling is identical to standard non-distributed VPLS (Section 3.2.3).
section: 3.5.3
topics:
    - mpls
    - vpn
