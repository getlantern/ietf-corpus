document: rfc-4505
kind: security-consideration
summary: Servers are encouraged to reduce priority or limit resource usage for anonymous users to prevent denial-of-service attacks via expensive operations (e.g., IMAP SEARCH BODY). Limits on number of anonymous users can themselves enable DoS and should be used with caution.
section: "5"
topics:
    - security
