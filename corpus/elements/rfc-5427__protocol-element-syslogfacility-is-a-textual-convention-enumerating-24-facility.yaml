summary: 'SyslogFacility is a TEXTUAL-CONVENTION enumerating 24 facility codes (0–23): kern(0), user(1), mail(2), daemon(3), auth(4), syslog(5), lpr(6), news(7), uucp(8), cron(9), authpriv(10), ftp(11), ntp(12), audit(13), console(14), cron2(15), local0–local7(16–23). It provides a normative label-to-numeric mapping for use in SNMP management interfaces.'
