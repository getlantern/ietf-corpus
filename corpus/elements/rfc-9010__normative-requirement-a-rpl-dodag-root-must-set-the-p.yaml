document: rfc-9010
kind: normative-requirement
summary: A RPL DODAG root MUST set the P flag to 1 in the DODAG Configuration option of DIO messages to signal that it proxies the EDAR/EDAC exchange and supports the updated RPL Target option.
section: 9.2.3
