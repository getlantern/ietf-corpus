document: rfc-9815
kind: normative-requirement
summary: It is RECOMMENDED that RFC 8654 Extended Message Support be implemented to accommodate large BGP-LS Attributes. A BGP speaker MUST NOT advertise a single BGP-LS-SPF NLRI that would cause an UPDATE message to exceed the maximum BGP message size.
section: 5.1.2
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
