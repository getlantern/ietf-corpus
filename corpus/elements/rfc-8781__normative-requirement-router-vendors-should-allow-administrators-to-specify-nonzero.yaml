document: rfc-8781
kind: normative-requirement
summary: Router vendors SHOULD allow administrators to specify nonzero lifetime values not divisible by 8, and the router SHOULD round such values up to the nearest multiple of 8 before encoding; if the value is less than 8 seconds, the Scaled Lifetime SHOULD be set to 1.
section: "4.1"
rfc2119_level: SHOULD
topics:
