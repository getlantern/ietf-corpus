document: rfc-4340
kind: normative-requirement
summary: Reserved bitfields in DCCP packet headers MUST be set to zero by senders and MUST be ignored by receivers. DCCP processors MUST NOT reset a connection simply because a Reserved field has a non-zero value, per RFC 3360.
section: "3.1"
rfc2119_level: MUST
topics:
    - udp
    - congestion
