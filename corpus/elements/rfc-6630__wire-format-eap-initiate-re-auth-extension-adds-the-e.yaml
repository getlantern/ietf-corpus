document: rfc-6630
kind: wire-format
summary: EAP-Initiate/Re-auth extension adds the 'E' flag (bit 4 of the flags byte, value 0x10), a 16-bit SEQ field for replay protection, and TLVs including keyName-NAI (Type 1), CAP-Identifier (Type 11), Sequence number (Type 7). A Cryptosuite byte and variable-length Authentication Tag trail the TLVs.
section: "5.2"
topics:
