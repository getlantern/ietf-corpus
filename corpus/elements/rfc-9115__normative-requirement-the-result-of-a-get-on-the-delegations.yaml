document: rfc-9115
kind: normative-requirement
summary: 'The result of a GET on the delegations URL MUST be a JSON object whose ''delegations'' field is an array of URLs, each identifying a delegation configuration. The server MAY return an incomplete list with a ''Link: next'' header.'
section: 2.3.1.2
rfc2119_level: MUST
topics:
