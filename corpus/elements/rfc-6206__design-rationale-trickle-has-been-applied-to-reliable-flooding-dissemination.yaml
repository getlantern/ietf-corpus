summary: Trickle has been applied to reliable flooding/dissemination (version-number-based consistency), routing control traffic (RPL, CTP), multicast propagation, and network configuration maintenance. The algorithm's flexibility stems from allowing protocols to define 'consistency' and 'inconsistency' on a case-by-case basis.
