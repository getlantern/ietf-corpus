document: rfc-2387
kind: protocol-element
summary: The 'type' parameter is required and specifies the MIME media type of the root body part, allowing a user agent to determine the content-type without examining the enclosed body part. If the type parameter value differs from the root body part's content-type, UA behavior is undefined.
section: "3.1"
topics:
    - email
