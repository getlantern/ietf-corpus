document: rfc-8336
kind: normative-requirement
summary: When any of the first four flags (0x1, 0x2, 0x4, or 0x8) are set on an ORIGIN frame, the frame MUST be ignored by conforming clients unless the flag's semantics are understood, as these flags are reserved for backwards-incompatible changes.
section: "2.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
