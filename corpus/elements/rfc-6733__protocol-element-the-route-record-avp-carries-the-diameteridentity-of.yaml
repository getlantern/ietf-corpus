document: rfc-6733
kind: protocol-element
summary: The Route-Record AVP carries the DiameterIdentity of a relay or proxy that forwarded a request. Relay and proxy agents MUST append a Route-Record AVP containing the identity of the peer from which the request was received to all forwarded requests, enabling the home server to perform path authorization checks and detect routing loops via the Route-Record list.
section: 6.7.1
topics:
    - diameter
    - routing
extracted_by: claude-sonnet-4-6
