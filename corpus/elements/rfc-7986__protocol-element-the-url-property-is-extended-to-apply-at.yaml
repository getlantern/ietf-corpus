document: rfc-7986
kind: protocol-element
summary: The URL property is extended to apply at the VCALENDAR object level, conveying a location where a more dynamic rendition of the calendar information can be found. It differs from SOURCE in that URL is an alternative representation, not the origin location.
section: "5.5"
