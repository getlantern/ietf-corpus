document: rfc-5691
kind: normative-requirement
summary: In MPS-hbr mode, the parameters sizeLength (fixed value 13), indexLength (fixed value 3), and indexDeltaLength (fixed value 3) MUST be present with those fixed values. maxDisplacement MUST be present when interleaving. The fixed AU duration MUST be signaled by constantDuration.
section: 4.2.2
rfc2119_level: MUST
