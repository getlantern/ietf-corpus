document: rfc-8666
kind: wire-format
summary: The LAN Adj-SID sub-TLV (Type 6) extends the Adj-SID format by adding a 4-octet Neighbor ID (Router ID) field identifying the specific neighbor for which the LAN adjacency SID is advertised. Length is 11 or 12 octets depending on the V-Flag.
section: "7.2"
