document: rfc-7838
kind: wire-format
summary: 'The Alt-Svc header field uses the ABNF: Alt-Svc = clear / 1#alt-value; alt-value = alternative *( OWS ";" OWS parameter ); alternative = protocol-id "=" alt-authority; alt-authority = quoted-string containing [ uri-host ] ":" port. ALPN protocol names with non-token octets MUST be percent-encoded using uppercase hex digits.'
