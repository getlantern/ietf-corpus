document: rfc-9769
kind: interoperability-note
summary: An NTPv4 implementation supporting interleaved client/server and broadcast modes fully interoperates with NTPv4 implementations that do not support those modes; interleaved responses are rejected as bogus by non-supporting clients, which then proceed in basic mode.
section: "1"
topics:
    - ntp
