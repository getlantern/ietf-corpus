document: rfc-2045
kind: normative-requirement
summary: It is EXPRESSLY FORBIDDEN to use any Content-Transfer-Encoding other than '7bit', '8bit', or 'binary' with any composite media type (currently 'multipart' and 'message'). All desired encodings must be applied at the innermost body level.
section: "6.4"
rfc2119_level: MUST NOT
