document: rfc-4661
kind: security-consideration
summary: Filter documents carried in SIP messages significantly affect server behavior, so SIP messages containing filters MUST be authenticated and authorized. Authentication SHOULD use SIP Digest Authentication; authorization is based on permissions granted by the notifier to the watcher.
section: "8"
topics:
    - security
    - sip
