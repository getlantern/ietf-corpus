document: rfc-5371
kind: design-rationale
summary: The mh_id (Main Header Identification) field exists to support JPEG 2000 main header recovery as described in RFC 5372; implementations following only this specification SHOULD set it to 0 and receivers SHOULD ignore it, preserving forward compatibility.
