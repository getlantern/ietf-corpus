document: rfc-9014
kind: protocol-element
summary: 'In EVPN-MPLS interconnect, each GW MAC-VRF maintains two independent flooding lists: an EVPN-Overlay flooding list (bindings to remote NVEs or multicast tunnels) and an EVPN-MPLS flooding list (MP2P or LSM tunnels to remote PEs). Each constitutes a separate split-horizon group (DC or WAN).'
section: 4.4.2
topics:
    - routing
    - bgp
    - mpls
