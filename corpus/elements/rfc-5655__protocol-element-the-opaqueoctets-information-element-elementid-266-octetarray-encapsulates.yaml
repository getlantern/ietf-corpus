document: rfc-5655
kind: protocol-element
summary: The opaqueOctets Information Element (ElementId 266, octetArray) encapsulates arbitrary non-IPFIX data inline within an IPFIX File to allow non-IPFIX data processors to embed a data stream. Collecting Processes and File Writers MUST NOT interpret its contents, distinguishing it from paddingOctets (which must be 0x00).
section: 8.2.17
topics:
