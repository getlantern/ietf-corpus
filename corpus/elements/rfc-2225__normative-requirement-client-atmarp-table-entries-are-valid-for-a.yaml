document: rfc-2225
kind: normative-requirement
summary: Client ATMARP table entries are valid for a maximum of 15 minutes. When an entry ages, the client MUST invalidate it; if there is an open VC, the client MUST revalidate the entry prior to transmitting any non-address-resolution traffic on that VC.
section: 8.5.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
