document: rfc-5223
kind: protocol-element
summary: 'The DHCPv4 option OPTION_V4_LOST (code 137) carries a DNS FQDN to be used by a LoST client to locate a LoST server. The option format is: 1-byte code (137), 1-byte length (n), followed by n octets of RFC 1035-encoded domain name labels.'
