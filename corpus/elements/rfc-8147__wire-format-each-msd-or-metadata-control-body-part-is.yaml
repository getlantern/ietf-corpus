document: rfc-8147
kind: wire-format
summary: Each MSD or metadata/control body part is identified by a Content-ID header field. The enclosing SIP message references it via a Call-Info header field containing a CID URL and a 'purpose' parameter whose value matches an entry in the Emergency Call Data Types registry (e.g., 'EmergencyCallData.eCall.MSD').
