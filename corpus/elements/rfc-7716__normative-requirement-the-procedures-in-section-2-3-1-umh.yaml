document: rfc-7716
kind: normative-requirement
summary: The procedures in Section 2.3.1 (UMH-eligible routes of SAFI 1, 2, or 4 carrying VRF Route Import EC and/or Source AS EC) MUST be implemented. The procedures in Sections 2.3.2 and 2.3.3 are OPTIONAL to implement, with the caveat that relying on OPTIONAL procedures may cause interoperability problems.
section: "2.3"
rfc2119_level: MUST
