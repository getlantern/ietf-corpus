document: rfc-6675
kind: protocol-element
summary: A 'duplicate acknowledgment' is defined as a segment arriving with a SACK block identifying previously unacknowledged and un-SACKed octets between HighACK and HighData. Unlike RFC 5681, an ACK carrying new SACK data counts as a duplicate ACK even if it advances the cumulative acknowledgment point or carries new data.
section: "2"
