document: rfc-1531
kind: normative-requirement
summary: A client that cannot receive unicast IP datagrams before protocol software is configured SHOULD set the BROADCAST flag to 1 in DHCPDISCOVER and DHCPREQUEST messages; a client that can receive unicast before configuration SHOULD clear it to 0.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ip
