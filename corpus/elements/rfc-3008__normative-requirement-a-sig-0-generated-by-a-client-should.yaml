document: rfc-3008
kind: normative-requirement
summary: A SIG(0) generated by a client SHOULD have name type user or host. A SIG(0) generated by a nameserver SHOULD have name type host, as a nameserver is associated with a host and its SIG(0) use is not associated with a particular zone.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - security
