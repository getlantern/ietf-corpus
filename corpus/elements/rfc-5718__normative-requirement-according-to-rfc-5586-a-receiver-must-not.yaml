document: rfc-5718
kind: normative-requirement
summary: According to RFC 5586, a receiver MUST NOT forward a GAL packet based on the GAL label as is normally the case for MPLS packets; if the GAL appears at the bottom of the label stack, it MUST be processed locally.
section: "2"
rfc2119_level: MUST NOT
topics:
    - mpls
