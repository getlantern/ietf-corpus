document: rfc-2596
kind: design-rationale
summary: Language codes have no effect on character set encoding; the UTF-8 representation of UniversalString (ISO 10646) is always used for DirectoryString syntax values. The language tag is purely metadata about the natural language, not about the encoding.
section: "3.1"
