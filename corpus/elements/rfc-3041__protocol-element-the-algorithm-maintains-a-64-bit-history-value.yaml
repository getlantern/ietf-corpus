document: rfc-3041
kind: protocol-element
summary: The algorithm maintains a 64-bit 'history value' in stable storage. On first boot, it is initialized from a random source. After each randomized interface identifier generation, the rightmost 64 bits of the MD5 digest are saved as the new history value for the next iteration.
section: 3.2.1
topics:
    - ip
    - privacy
