document: rfc-9375
kind: design-rationale
summary: The 'service' container in 'network-types' uses YANG presence semantics so that a single YANG module can monitor both underlay networks and overlay VPN services as separate entries in the network list. Absence of the container indicates network PM; presence indicates VPN service PM.
section: "4.2"
