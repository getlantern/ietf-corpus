document: rfc-8250
kind: interoperability-note
summary: IPv6 transition technologies (e.g., IPv6-to-IPv4 translation) that do not recognize or support the IPv6 Destination Options extension header may drop packets containing PDM rather than translating them. Some middleboxes may also drop packets when the PDM header pushes Layer 4 information beyond the depth of their filtering logic.
section: "1.3"
topics:
    - ip
    - v6ops
