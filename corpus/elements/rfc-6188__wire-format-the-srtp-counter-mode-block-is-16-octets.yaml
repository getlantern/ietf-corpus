document: rfc-6188
kind: wire-format
summary: 'The SRTP counter mode block is 16 octets: 4 zero octets, a 4-octet SSRC field, a packet index field, and a block counter b_c. This counter block is XORed with the 112-bit salt (padded with two zero octets) before AES encryption to produce keystream blocks.'
