document: rfc-3007
kind: design-rationale
summary: Authentication of an update request is fully separated from authentication of the DNS data. Once data is present in DNS, only DNSSEC zone keys and their signatures are used; host/user key signatures are never used for data validation.
section: "1.4"
topics:
    - dns
    - security
    - crypto
