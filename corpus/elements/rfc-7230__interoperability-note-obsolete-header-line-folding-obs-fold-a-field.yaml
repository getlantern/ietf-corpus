document: rfc-7230
kind: interoperability-note
summary: Obsolete header line folding (obs-fold, a field-value preceded by CRLF + whitespace) is deprecated except within message/http media type. Servers MUST reject or unfold obs-fold in requests; proxies/gateways MUST discard and replace or unfold; user agents MUST unfold.
section: 3.2.4
topics:
    - http
