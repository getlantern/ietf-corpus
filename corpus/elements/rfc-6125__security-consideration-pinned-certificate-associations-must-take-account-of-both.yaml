document: rfc-6125
kind: security-consideration
summary: Pinned certificate associations MUST take account of both the certificate presented and the context in which it was accepted, including the chain of certificates to the trust anchor, the source domain, application service type, derived domain, port number, and other relevant information. Pinning should be exposed only to advanced users with extreme caution.
section: "7.1"
topics:
    - tls
    - pkix
    - security
