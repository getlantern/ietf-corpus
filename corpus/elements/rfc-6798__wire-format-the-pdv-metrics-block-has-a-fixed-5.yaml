summary: 'The PDV Metrics Block has a fixed 5-word (160-bit) structure: BT=15 (8 bits), Interval flag I (2 bits), pdvtyp (4 bits), Rsv (2 bits), block length=4 (16 bits), SSRC of source (32 bits), Pos PDV Threshold/Peak (16 bits), Pos PDV Percentile (16 bits), Neg PDV Threshold/Peak (16 bits), Neg PDV Percentile (16 bits), Mean PDV (16 bits), Reserved (16 bits).'
