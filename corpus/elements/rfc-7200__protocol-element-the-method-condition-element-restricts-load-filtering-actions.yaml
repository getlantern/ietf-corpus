document: rfc-7200
kind: protocol-element
summary: The <method> condition element restricts load-filtering actions to a specific SIP method (INVITE, MESSAGE, REGISTER, SUBSCRIBE, OPTIONS, or PUBLISH). When omitted, filtering applies to all applicable initial requests.
