document: rfc-8281
kind: protocol-element
summary: The I (LSP-INSTANTIATION-CAPABILITY) flag is a new 1-bit flag added to the STATEFUL-PCE-CAPABILITY TLV. When set by a PCC it indicates permission for PCE-initiated LSPs; when set by a PCE it indicates support. Both PCC and PCE must set this flag to enable PCE-initiated LSP instantiation.
section: "4.1"
topics:
    - routing
    - mpls
