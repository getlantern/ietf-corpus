document: rfc-3309
kind: design-rationale
summary: The reflected bit ordering for CRC-32c in SCTP (LSB of each byte maps to most significant polynomial coefficient) matches on-the-wire bit order for Ethernet and other serial media. This is the reverse of traditional Internet bit ordering but allows the same CRC hardware used for Ethernet to be reused.
section: "2.1"
topics:
    - sctp
