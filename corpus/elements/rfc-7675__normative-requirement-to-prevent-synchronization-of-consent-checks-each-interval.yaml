document: rfc-7675
kind: normative-requirement
summary: To prevent synchronization of consent checks, each interval MUST be randomized from between 0.8 and 1.2 times the basic period. Implementations MUST NOT set the period between checks to less than 4 seconds.
section: "5.1"
rfc2119_level: MUST
topics:
    - webrtc
    - security
