document: rfc-9031
kind: normative-requirement
summary: OSCORE errors during the join process MUST be silently dropped with no error response signaled. The pledge MUST silently discard any response not protected with OSCORE, including CoAP error codes, to prevent an attacker from sending bogus errors that force sequential network exhaustion.
section: 7.3.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
