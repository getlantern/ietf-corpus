document: rfc-4425
kind: security-consideration
summary: VC-1 streams can require up to 135 Mbps bandwidth for HDTV, creating a denial-of-service risk if transmitted on many Internet paths. Users of this payload format MUST comply with the congestion control requirements in section 8.
