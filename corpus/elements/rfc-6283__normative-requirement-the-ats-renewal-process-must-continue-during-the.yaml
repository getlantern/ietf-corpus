document: rfc-6283
kind: normative-requirement
summary: The ATS renewal process MUST continue during the desired archiving period of the archive data objects. A series of successive Archive Time-Stamps is collected in Archive Time-Stamp Chains, and a series of chains in an Archive Time-Stamp Sequence.
section: "2.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
