document: rfc-8227
kind: normative-requirement
summary: With short-wrapping, protection switching can only be performed once from the working ring tunnel to the protection ring tunnel. A node MUST NOT switch traffic already carried on the protection ring tunnel back to the working ring tunnel, avoiding temporary traffic loops at the egress node.
section: 4.3.2.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
