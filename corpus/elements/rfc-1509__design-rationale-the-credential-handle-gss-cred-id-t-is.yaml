document: rfc-1509
kind: design-rationale
summary: The credential handle (gss_cred_id_t) is an opaque value that intentionally contains no security-relevant information and requires no special protection by the application. GSSAPI never exposes actual credential data to applications; the handle merely identifies internal GSSAPI state, and a given handle value may refer to different credentials when presented by different callers.
section: 2.1.6
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
