document: rfc-4901
kind: normative-requirement
summary: HC scheme parameters MAY be manually configured, but manual configuration MUST be done in both directions. If HC scheme parameters are signaled, the Interface Parameters Sub-TLV MUST be used on any unidirectional legs carrying HC traffic; for legs carrying only compression feedback, these Sub-TLV components MUST NOT be used.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
