document: rfc-6604
kind: security-consideration
summary: The AA header flag bit is not protected by DNSSEC. To secure it, secure communications between the querying resolver and the DNS server are needed, such as DNS transaction security via TSIG (RFC 2845) or SIG(0) (RFC 2931).
section: "4"
topics:
