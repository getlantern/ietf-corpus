document: rfc-4695
kind: normative-requirement
summary: For mpeg4-generic RTP MIDI streams, exactly one RTP MIDI AU MUST be mapped to one mpeg4-generic RTP packet; options for multiple AUs per packet, fragmentation, and interleaving MUST NOT be used. The mpeg4-generic streamtype parameter MUST be 5 and mode MUST be 'rtp-midi'.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
