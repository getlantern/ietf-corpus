document: rfc-7504
kind: protocol-element
summary: Reply code 556 indicates that an intermediate SMTP system (typically a relay) has determined, without attempting a connection, that a forward-pointing address resolves to a host that does not accept mail. It is returned in response to commands such as RCPT that contain forward-pointing addresses.
section: "4"
