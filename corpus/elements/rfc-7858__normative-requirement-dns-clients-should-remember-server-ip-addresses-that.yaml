document: rfc-7858
kind: normative-requirement
summary: DNS clients SHOULD remember server IP addresses that do not support DNS over TLS, including timeouts, connection refusals, and TLS handshake failures, and not request DNS over TLS from them for a reasonable period (such as one hour).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
