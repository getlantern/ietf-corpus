document: rfc-7240
kind: protocol-element
summary: 'The "return=minimal" preference requests that the server return only a minimal response to a successful request, typically using 204 (No Content) or a 200 with zero-length entity. The determination of what constitutes minimal is at the server''s discretion. ABNF: `return = "return" BWS "=" BWS ("representation" / "minimal")`.'
section: "4.2"
topics:
    - http
