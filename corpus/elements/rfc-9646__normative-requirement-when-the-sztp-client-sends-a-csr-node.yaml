document: rfc-9646
kind: normative-requirement
summary: When the SZTP-client sends a CSR node, the SZTP-server SHOULD respond with SZTP onboarding information containing a signed certificate. The SZTP-server MAY alternatively respond with another HTTP error containing another 'csr-request', in which case the SZTP-client MUST delete any key generated for the previously generated CSR.
section: "2.3"
rfc2119_level: MUST
topics:
    - netconf
    - pkix
    - yang
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
