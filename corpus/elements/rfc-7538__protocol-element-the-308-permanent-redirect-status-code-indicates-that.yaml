document: rfc-7538
kind: protocol-element
summary: The 308 (Permanent Redirect) status code indicates that the target resource has been assigned a new permanent URI and any future references to this resource ought to use one of the enclosed URIs. It is the permanent variant of 307, filling the gap in the redirect matrix by not allowing the request method to change from POST to GET.
section: "3"
topics:
