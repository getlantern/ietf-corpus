document: rfc-9103
kind: protocol-element
summary: The 'transfer group' is the entire set of servers involved in XFR for a particular set of zones (all primaries and secondaries). Consistent XoT policy across the entire transfer group is required for confidentiality; a single non-XoT member is a weak link.
section: "11"
