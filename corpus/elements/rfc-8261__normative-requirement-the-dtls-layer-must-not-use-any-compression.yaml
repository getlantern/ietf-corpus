document: rfc-8261
kind: normative-requirement
summary: The DTLS layer MUST NOT use any compression algorithm. Because SCTP performs segmentation and reassembly based on the path MTU, DTLS compression would interfere with SCTP's operation.
section: "5"
rfc2119_level: MUST NOT
topics:
