document: rfc-3977
kind: state-machine
summary: A mode-switching server starts in transit mode (advertises MODE-READER, not READER) and transitions to reading mode after a successful MODE READER command (advertises READER, not MODE-READER; MAY drop IHAVE). The MODE READER command MUST NOT be issued more than once or after any security or privacy commands.
section: 3.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
