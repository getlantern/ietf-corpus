document: rfc-9183
kind: normative-requirement
summary: All Level 2 RBridges MUST support E-L2FS (RFC 7356, RFC 7780). Area border RBridges MUST support both E-L1FS and E-L2FS. RBridges supporting only single-level TRILL (RFC 6325) do not support L2 adjacencies.
section: "7"
rfc2119_level: MUST
topics:
    - routing
