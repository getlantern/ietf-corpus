document: rfc-8193
kind: security-consideration
summary: 'The ma-config-controller-timeout field implements a fail-safe: when the controller-timeout interval elapses without a successful Controller contact, a controller-lost Event is raised that can trigger suspension of Instruction Schedules, preventing stale instructions from executing indefinitely.'
section: 4.2.1
topics:
