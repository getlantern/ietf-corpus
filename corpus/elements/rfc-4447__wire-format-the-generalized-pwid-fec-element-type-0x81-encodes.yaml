document: rfc-4447
kind: wire-format
summary: The Generalized PWid FEC Element (type 0x81) encodes a C-bit, 15-bit PW type, PW info length, and variable-length AGI, SAII, and TAII fields each preceded by a type byte and length byte. If PW info length is 0, it references all PWs using the specified grouping ID with no AGI/SAII/TAII present.
section: 5.3.2
topics:
