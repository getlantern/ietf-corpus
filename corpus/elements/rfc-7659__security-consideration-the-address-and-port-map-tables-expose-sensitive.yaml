document: rfc-7659
kind: security-consideration
summary: The address and port map tables expose sensitive subscriber session data including internal network addresses, protocols, and port numbers. This information can be used to track individual subscriber activity or identify targets for attacks. Access to these read-only tables must be strictly controlled.
