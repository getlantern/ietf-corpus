document: rfc-5956
kind: interoperability-note
summary: When a node receiving an offer with 'FEC-FR' semantics does not understand line grouping or the FEC grouping semantics, it responds either by ignoring the grouping attribute or refusing the request; the offerer must handle both cases per Section 4.5.
section: "4.5"
topics:
