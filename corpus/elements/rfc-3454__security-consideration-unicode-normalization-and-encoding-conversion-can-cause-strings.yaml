document: rfc-3454
kind: security-consideration
summary: Unicode normalization and encoding conversion can cause strings to grow or shrink. Programs using fixed-size buffers or making assumptions about buffer bounds are likely to fail insecurely when processing Unicode normalization or encoding conversions.
section: "9.2"
topics:
    - security
