summary: 'The AltMark Option data fields are 4 bytes (Opt Data Len = 4): bits 0–19 are the FlowMonID (20-bit unsigned integer), bit 20 is the L (Loss) flag, bit 21 is the D (Delay) flag, and bits 22–31 are Reserved (MUST be set to zero on transmission, ignored on receipt).'
