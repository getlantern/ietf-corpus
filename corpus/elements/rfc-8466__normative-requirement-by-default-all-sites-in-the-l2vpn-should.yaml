document: rfc-8466
kind: normative-requirement
summary: By default, all sites in the L2VPN SHOULD be permitted to access the cloud or the Internet. Restrictions SHOULD be applied only when explicitly required, using permit-site or deny-site leaf-lists in the cloud-access container.
