document: rfc-5306
kind: design-rationale
summary: Timer T3 is initialized to 65535 seconds and then set to the minimum of received RA IIH holding times, rather than a fixed short value, to allow the restarting router to complete synchronization within the neighbors' adjacency holding windows without prematurely setting the overload bit.
section: "3.1"
topics:
    - routing
