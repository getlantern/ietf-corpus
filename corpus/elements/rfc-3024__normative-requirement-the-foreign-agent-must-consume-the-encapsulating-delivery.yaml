document: rfc-3024
kind: normative-requirement
summary: The foreign agent MUST consume the Encapsulating Delivery Style Extension — it must not relay it to the home agent or include it in replies to the mobile node. If it does not support the requested delivery style, it MUST respond with code 79.
section: "3.3"
rfc2119_level: MUST
topics:
    - mobility
