document: rfc-8168
kind: design-rationale
summary: The general recommendation is for clients to always include a standalone IAPREFIX option with just the prefix-length hint (in addition to any specific IAPREFIX options) in all Solicit, Request, Renew, and Rebind messages. This ensures the server consistently receives the client's length preference regardless of message type.
section: "3.6"
