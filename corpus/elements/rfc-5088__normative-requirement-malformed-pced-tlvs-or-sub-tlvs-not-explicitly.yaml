document: rfc-5088
kind: normative-requirement
summary: Malformed PCED TLVs or sub-TLVs not explicitly described in this document MUST cause the LSA to be treated as malformed according to normal OSPF procedures. Any unrecognized sub-TLV MUST be silently ignored.
section: "4"
rfc2119_level: MUST
