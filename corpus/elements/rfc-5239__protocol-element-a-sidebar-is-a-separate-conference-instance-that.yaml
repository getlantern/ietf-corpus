document: rfc-5239
kind: protocol-element
summary: A sidebar is a separate conference instance that exists only within the context of a parent conference instance. It is implicitly linked (non-independent) to the parent conference object, contains a subset of parent members, and cannot exist if the parent conference is terminated. No members from outside the parent conference instance may join a sidebar.
section: "9.4"
topics:
    - realtime
