document: rfc-7941
kind: design-rationale
summary: Including SDES CNAME in an RTP header extension complements RFC 6051 (Rapid Synchronisation of RTP Flows), which carries SR clock information but assumes CNAME binding is already known. Combining both extensions enables rapid synchronization in all cases, including when CNAME is not pre-established via signaling.
section: "3"
topics:
