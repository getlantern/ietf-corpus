document: rfc-3323
kind: design-rationale
summary: The 'user' privacy level is typically set only by intermediaries to communicate that user-level privacy functions must be provided by the network because the user agent is unable to provide them itself (e.g., legacy clients). User agents MAY set it for REGISTER requests but SHOULD NOT set it for other requests.
section: "4.2"
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
