document: rfc-5263
kind: protocol-element
summary: The Accept header in the watcher's SUBSCRIBE request is used to negotiate content type. Including 'application/pidf-diff+xml' (alongside 'application/pidf+xml') signals willingness to receive partial notifications; the optional 'q' parameter expresses relative preference.
