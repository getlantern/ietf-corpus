document: rfc-6790
kind: normative-requirement
summary: An ingress LSR MUST NOT include an entropy label for a given tunnel unless the egress LSR has explicitly indicated via signaling that it can process entropy labels for that tunnel. Signaling and EL usage are completely independent per direction.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - mpls
