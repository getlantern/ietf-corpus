document: rfc-2257
kind: protocol-element
summary: The context mechanism allows AgentX operations to reference non-default SNMP contexts. When NON_DEFAULT_CONTEXT is set in h.flags, an Octet String context field immediately follows the AgentX header. Applicable to Register, Unregister, Get, GetNext, GetBulk, TestSet, Notify, Ping, IndexAllocate, IndexDeallocate, AddAgentCaps, and RemoveAgentCaps PDUs.
section: 6.1.1
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
