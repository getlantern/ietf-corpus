document: rfc-8960
kind: protocol-element
summary: 'The ''mpls-operations-type'' enumeration defines five MPLS forwarding operation types: impose-and-forward, pop-and-forward, pop-impose-and-forward, swap-and-forward, and pop-and-lookup. These represent the full set of label stack operations an LSR may perform.'
