document: rfc-1452
kind: protocol-element
summary: 'When a proxy agent receives a SNMPv1 Trap-PDU, it maps it into a SNMPv2-Trap-PDU by prepending two new variable bindings: sysUpTime.0 (from the timestamp field) and snmpTrapOID.0 (derived from the generic-trap and enterprise fields), then appending snmpTrapEnterpriseOID.0.'
section: 3.1.2
