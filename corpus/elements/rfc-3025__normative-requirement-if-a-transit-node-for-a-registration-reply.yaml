document: rfc-3025
kind: normative-requirement
summary: If a transit node for a registration reply receives a recognized CVSE with an unknown/unsupported vendor ID or Vendor-CVSE-Type, a registration reject MUST be sent with the appropriate error code. For example, an FA receiving an unknown CVSE in a reply from the HA must send a registration reject to the MN.
section: "2.3"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
