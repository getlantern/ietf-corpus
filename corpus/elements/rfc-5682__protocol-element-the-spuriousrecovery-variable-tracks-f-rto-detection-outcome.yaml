document: rfc-5682
kind: protocol-element
summary: 'The ''SpuriousRecovery'' variable tracks F-RTO detection outcome: SPUR_TO indicates a spurious retransmission timeout was detected; FALSE indicates the timeout is not declared spurious and conventional RTO recovery should continue. This variable can serve as input to a corresponding response algorithm.'
