document: rfc-9479
kind: design-rationale
summary: Existing link attribute advertisements do not support application-specific values for a given attribute on a link, nor do they indicate which applications are using a given advertised value. When RSVP-TE and SR Policy coexist, a link advertised for SR Policy could be incorrectly interpreted by an RSVP-TE head-end as RSVP-TE-enabled, causing path setup failures.
section: "1"
topics:
    - routing
    - mpls
    - vpn
