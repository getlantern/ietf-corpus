document: rfc-7434
kind: design-rationale
summary: SIP-T encapsulation of ISUP/QSIG as a MIME body is rejected for true ISDN interworking because it would require implementing the full ISUP syntax to extract a single data element. The native SIP User-to-User header field is preferred as it avoids that dependency.
