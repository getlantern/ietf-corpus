document: rfc-8856
kind: protocol-element
summary: 'The SDP ''floorctrl'' media-level attribute determines floor control roles. Its ABNF is: floor-control = role *(SP role); role = ''c-only'' / ''s-only'' / ''c-s''. An offerer MAY include multiple roles; an answerer MUST include only one: ''c-only'' or ''s-only''.'
section: "5.1"
topics:
    - realtime
    - webrtc
