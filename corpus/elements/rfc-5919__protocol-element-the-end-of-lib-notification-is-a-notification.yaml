summary: The End-of-LIB Notification is a Notification message carrying the End-of-LIB Status Code (0x0000002F) and a FEC TLV with a Typed Wildcard FEC Element, sent by an LDP speaker to signal that it has completed initial label advertisements for a given FEC type following session establishment.
