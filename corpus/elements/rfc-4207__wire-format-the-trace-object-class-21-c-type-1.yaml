document: rfc-4207
kind: wire-format
summary: The TRACE object (Class 21, C-Type 1) contains a 16-bit Trace Type, a 16-bit Trace Length, and a variable-length Trace Message field. Defined Trace Type values are 1–6 covering SONET/SDH J0, J1, and J2 bytes. The Trace Message MUST be padded with zeros to a 32-bit boundary; Trace Length does not include padding zeros.
section: 4.1.1.1
topics:
    - routing
