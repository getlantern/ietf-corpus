document: rfc-2046
kind: design-rationale
summary: In 'multipart/alternative', the plainest format is placed first (not last) to maximize friendliness when viewed by non-MIME-conformant readers, even though this imposes a burden on conformant MIME viewers. Interoperability with older mail readers was deemed more important.
section: 5.1.4
topics:
