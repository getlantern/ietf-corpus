document: rfc-8264
kind: normative-requirement
summary: A string MUST NOT contain any characters whose validity is context-dependent (CONTEXTJ or CONTEXTO) unless validity is positively confirmed by a contextual rule. If the code point is missing a rule, or if the rule result is negative or inconclusive, the string is invalid.
section: "8"
rfc2119_level: MUST NOT
topics:
    - security
