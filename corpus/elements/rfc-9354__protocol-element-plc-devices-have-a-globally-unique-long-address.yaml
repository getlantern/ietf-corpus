document: rfc-9354
kind: protocol-element
summary: PLC devices have a globally unique long address of 48 bits (IEEE 1901.1) or 64 bits (IEEE 1901.2, ITU-T G.9903) and a short address of 12 bits (IEEE 1901.1) or 16 bits (IEEE 1901.2, ITU-T G.9903). Devices join using the long address and communicate using the short address after joining.
section: "3.2"
topics:
