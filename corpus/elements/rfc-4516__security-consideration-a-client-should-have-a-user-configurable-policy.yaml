document: rfc-4516
kind: security-consideration
summary: A client SHOULD have a user-configurable policy controlling which servers it will establish LDAP sessions with and which security mechanisms to use, and SHOULD NOT establish sessions inconsistent with this policy. Clients processing URLs automatically face heightened risk due to the variety of servers encountered.
section: "5"
topics:
    - ldap
    - security
