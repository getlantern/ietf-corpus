document: rfc-3080
kind: normative-requirement
summary: Before accepting a close request, a BEEP peer MUST finish sending queued MSG messages, await complete replies to outstanding MSG messages, and finish sending complete replies to outstanding received MSG messages. The peer MUST also be prepared to process MSG messages received on the channel until a positive close reply is received.
section: 2.3.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
