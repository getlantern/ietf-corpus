kind: protocol-element
summary: 'The ''base-cfg-parms'' grouping defines the core BFD configuration parameters: ''local-multiplier'' (uint8, default 3), and either ''desired-min-tx-interval'' + ''required-min-rx-interval'' (both uint32 in microseconds, default 1000000) or a single ''min-interval'' leaf (feature ''single-minimum-interval''). This grouping is reused by all path-specific modules.'
