document: rfc-6933
kind: normative-requirement
summary: 'An agent should limit entLPMappingTable entries to meaningful, non-redundant information: only the most appropriate physical component closest to the root of a containment tree should be mapped, avoiding redundant port-level mappings when a module-level mapping already covers them.'
