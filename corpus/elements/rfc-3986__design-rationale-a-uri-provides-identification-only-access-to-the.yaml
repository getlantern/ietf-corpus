document: rfc-3986
kind: design-rationale
summary: A URI provides identification only; access to the resource is neither guaranteed nor implied. Operations on a URI are defined by the protocol or data format in which the URI appears, not by this specification. This separates naming from interaction semantics.
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
