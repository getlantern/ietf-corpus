document: rfc-3986
kind: design-rationale
summary: A URI provides identification only; access to the resource is neither guaranteed nor implied. Operations associated with a URI reference are defined by the protocol element or data format in which it appears, not by this specification. This separates identification from interaction.
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
