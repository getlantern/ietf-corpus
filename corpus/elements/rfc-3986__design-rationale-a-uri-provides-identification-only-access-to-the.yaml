document: rfc-3986
kind: design-rationale
summary: A URI provides identification only; access to the resource is neither guaranteed nor implied. Operations on a URI are defined by the protocol or data format in which it appears, not by the URI specification itself. URI schemes named after protocols do not imply that access will use that protocol.
section: 1.2.2
topics:
    - http
