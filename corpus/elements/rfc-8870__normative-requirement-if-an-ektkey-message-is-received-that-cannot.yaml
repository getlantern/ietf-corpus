document: rfc-8870
kind: normative-requirement
summary: If an EKTKey message is received that cannot be processed, the recipient MUST respond with an appropriate DTLS alert. If the server did not include supported_ekt_ciphers in its EncryptedExtensions, EKTKey messages MUST NOT be sent.
section: 5.2.2
rfc2119_level: MUST
topics:
