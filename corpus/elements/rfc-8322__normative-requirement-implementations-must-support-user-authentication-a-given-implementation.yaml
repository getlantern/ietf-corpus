document: rfc-8322
kind: normative-requirement
summary: Implementations MUST support user authentication. A given implementation MAY allow authentication to be disabled on a Feed-by-Feed or workspace-by-workspace basis. Service implementers SHOULD support appropriate authorization checking for all resource accesses including individual Entries, Feeds, and Service Documents.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
