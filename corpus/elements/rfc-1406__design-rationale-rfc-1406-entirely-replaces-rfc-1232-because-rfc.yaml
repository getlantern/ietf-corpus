document: rfc-1406
kind: design-rationale
summary: 'RFC 1406 entirely replaces RFC 1232 because RFC 1232 contains a fundamental error: many objects are encoded as Counters that must be encoded as INTEGERs or Gauges. The magnitude of the required change is sufficient that virtually every object changed, so the MIB documented in RFC 1232 should not be implemented.'
section: "2.2"
topics:
