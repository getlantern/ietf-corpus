document: rfc-1323
kind: interoperability-note
summary: The Window field in a SYN or SYN,ACK segment is never scaled, regardless of whether WSopt is negotiated. Window scaling applies exclusively to non-SYN segments, so the initial window advertisement is always interpreted at face value.
section: "2.2"
topics:
    - tcp
