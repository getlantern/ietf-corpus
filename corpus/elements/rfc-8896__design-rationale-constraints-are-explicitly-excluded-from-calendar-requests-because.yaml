document: rfc-8896
kind: design-rationale
summary: Constraints are explicitly excluded from Calendar requests because (1) clients have diverse preferences about how many constraint violations are acceptable across a time-array, making a universal constraint model impractical, and (2) evaluating constraints over an entire Calendar array would impose substantial processing overhead on the Server before it can return a response.
section: "3.3"
topics:
    - http
