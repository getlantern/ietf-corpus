document: rfc-7638
kind: interoperability-note
summary: When multiple parties need to reproduce and compare JWK Thumbprint calculations, they must agree on and use the same hash function; in the common case where only the key producer computes the thumbprint (e.g., as a 'kid'), consumers treat it as an opaque value.
section: "3.4"
topics:
