document: rfc-9660
kind: interoperability-note
summary: Unlike most EDNS(0) option values in a response, ZONEVERSION values are dependent on the queried name (the LABELCOUNT references labels of QNAME). This makes implementation more complex in name servers where EDNS(0) options are handled independently of query name processing.
section: A
topics:
    - dns
