document: rfc-2453
kind: protocol-element
summary: 'The Next Hop field (4 octets) specifies the immediate next-hop IP address for packets toward the destination. A value of 0.0.0.0 means route via the advertisement originator. The field is advisory: if not directly reachable, it must be treated as 0.0.0.0. Its purpose is to eliminate unnecessary extra hops when RIP is not running on all routers in a network.'
section: "4.4"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
