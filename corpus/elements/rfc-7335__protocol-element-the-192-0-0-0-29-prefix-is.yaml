summary: The 192.0.0.0/29 prefix is designated as the IPv4 Service Continuity Prefix, reserved for any system that requires IPv4 addresses for backward compatibility with IPv4 communications in an IPv6-only network but does not emit IPv4 packets 'on the wire'.
