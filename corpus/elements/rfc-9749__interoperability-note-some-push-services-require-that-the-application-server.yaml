document: rfc-9749
kind: interoperability-note
summary: Some push services require that the application server authenticate all push messages using VAPID. For these services, the client (user agent) needs the VAPID public key to pass to the push service when retrieving a new endpoint. This specification enables JMAP servers to advertise that key.
section: "1"
topics:
    - http
    - crypto
