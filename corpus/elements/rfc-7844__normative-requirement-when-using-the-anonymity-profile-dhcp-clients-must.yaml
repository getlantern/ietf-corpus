document: rfc-7844
kind: normative-requirement
summary: When using the anonymity profile, DHCP clients MUST use client identifiers based solely on the link-layer address that will be used in the underlying connection, contradicting RFC 4361's recommendation against MAC-based identifiers.
section: "3.5"
rfc2119_level: MUST
topics:
    - privacy
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
