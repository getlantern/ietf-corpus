document: rfc-9213
kind: normative-requirement
summary: Implementations MUST NOT generate directive values that violate inferred type constraints. In particular, string values whose first character is not alphabetic or '*' MUST be generated as Strings to avoid being misinterpreted as other types.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - http
