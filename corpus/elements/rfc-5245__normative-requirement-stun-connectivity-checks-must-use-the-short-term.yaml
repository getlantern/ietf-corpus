document: rfc-5245
kind: normative-requirement
summary: STUN connectivity checks MUST use the short-term credential mechanism with credentials exchanged via ice-ufrag and ice-pwd SDP attributes. The username for a check is formed by concatenating the remote agent's ufrag, a colon, and the local agent's ufrag.
section: 7.1.2.3
rfc2119_level: MUST
topics:
    - nat
    - security
    - crypto
