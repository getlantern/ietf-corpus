document: rfc-5733
kind: normative-requirement
summary: '''pendingDelete'' MUST NOT be combined with ''clientDeleteProhibited'' or ''serverDeleteProhibited''; ''pendingTransfer'' MUST NOT be combined with ''clientTransferProhibited'' or ''serverTransferProhibited''; ''pendingUpdate'' MUST NOT be combined with ''clientUpdateProhibited'' or ''serverUpdateProhibited''. The four pending status values MUST NOT be combined with each other.'
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
