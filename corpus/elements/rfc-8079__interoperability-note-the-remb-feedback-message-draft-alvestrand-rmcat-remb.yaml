document: rfc-8079
kind: interoperability-note
summary: The REMB feedback message (draft-alvestrand-rmcat-remb) had been widely deployed but not standardized at publication time. A media-aware B2BUA that changes the SSRC of the media sender must also update the SSRC values in REMB packets, or the REMB bandwidth estimation mechanism will not function correctly across the B2BUA.
section: "3.2"
topics:
    - rtp
    - realtime
    - congestion
