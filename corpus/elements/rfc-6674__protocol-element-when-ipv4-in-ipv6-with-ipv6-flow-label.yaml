document: rfc-6674
kind: protocol-element
summary: When IPv4-in-IPv6 with IPv6 Flow Label is used, the SWID is the outer IPv6 source address and the 20-bit Flow Label serves as the CID, enabling overlapping IPv4 addresses among access devices. The 20-bit width is shorter than the recommended 32-bit CID, requiring scaling consideration for large deployments.
section: "6"
topics:
