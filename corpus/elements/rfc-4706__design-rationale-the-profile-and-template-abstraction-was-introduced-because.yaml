document: rfc-4706
kind: design-rationale
summary: The profile-and-template abstraction was introduced because managed nodes may handle hundreds or thousands of XTU lines; provisioning every parameter individually would be burdensome, and most lines share identical configurations — templates (one line profile + up to four channel profiles) allow a single configuration to be shared across many lines.
section: "2.8"
topics:
