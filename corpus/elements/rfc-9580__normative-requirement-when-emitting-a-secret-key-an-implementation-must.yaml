document: rfc-9580
kind: normative-requirement
summary: When emitting a secret key, an implementation MUST only produce data from S2K usage rows marked 'Generate? Yes'. Rows for LegacyCFB and MalleableCFB are read-only for backward compatibility, MUST NOT be generated, and MUST be rejected in version 6 keys.
section: 3.7.2.1
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
