document: rfc-4466
kind: design-rationale
summary: 'SELECT/EXAMINE optional parameters may operate in two modes: a global state change affecting the whole session, or a per-mailbox state change lasting only for the selected state duration. A subsequent SELECT/EXAMINE without the parameter cancels its per-mailbox effect.'
section: "2.1"
topics:
    - email
