document: rfc-7459
kind: protocol-element
summary: The probability Pi that a Target lies within a region of interest is Pi = Co * Ao / Au, where Ao is the area of overlap between the uncertainty region and the region of interest and Au is the area of the uncertainty region. This assumes a rectangular PDF; confidence should be scaled to 95% before applying.
section: "5.5"
