document: rfc-8445
kind: protocol-element
summary: 'Candidate pair priority is computed as: pair priority = 2^32*MIN(G,D) + 2*MAX(G,D) + (G>D?1:0), where G is the controlling agent''s candidate priority and D is the controlled agent''s. Checklists are sorted in decreasing order of pair priority.'
section: 6.1.2.3
