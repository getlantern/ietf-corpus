document: rfc-4352
kind: security-consideration
summary: To authenticate the sender an external mechanism MUST be used, and it is RECOMMENDED that the mechanism protect both the complete RTP header and payload. Data tampering by a man-in-the-middle could replace audio content or produce erroneous depacketization that degrades quality.
section: "6.2"
topics:
    - rtp
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
