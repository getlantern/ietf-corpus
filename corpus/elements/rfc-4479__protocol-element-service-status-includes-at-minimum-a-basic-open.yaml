document: rfc-4479
kind: protocol-element
summary: 'Service status includes at minimum a basic open/closed indicator: ''closed'' means communications will likely fail or not reach the intended party; ''open'' means communications will likely succeed and reach the desired target. Additional status elements may convey finer-grained availability details.'
