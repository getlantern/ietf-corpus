document: rfc-8930
kind: interoperability-note
summary: Fragment forwarding reduces the benefit of 6LoWPAN header compression (RFC 6282) at intermediate hops because intermediate nodes forward compressed fragments without decompressing and recompressing; in exchange, memory usage is distributed along the path.
