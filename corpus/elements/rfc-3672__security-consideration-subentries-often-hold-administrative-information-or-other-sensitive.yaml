document: rfc-3672
kind: security-consideration
summary: Subentries often hold administrative information or other sensitive information and should be protected from unauthorized access and disclosure as described in RFC 2829 (LDAP authentication) and RFC 2830 (LDAP TLS). General LDAP security considerations from RFC 3377 also apply.
