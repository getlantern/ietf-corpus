document: rfc-2275
kind: design-rationale
summary: MIB views are defined as families of view subtrees (name + bitmask) rather than explicit lists of OIDs because many access-control scenarios (e.g., all columns of a conceptual row) would otherwise require an impractically large number of individual subtree entries. The family abstraction aggregates these into one structure.
section: "2.4"
