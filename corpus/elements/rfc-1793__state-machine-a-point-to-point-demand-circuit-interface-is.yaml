document: rfc-1793
kind: state-machine
summary: A point-to-point demand circuit interface is in state 'Point-to-point' if its neighbor is in state '1-Way' or greater; otherwise it is 'Down'. Hellos are sent at PollInterval when in 'Down' state. After successful Hello suppression negotiation and neighbor reaching 'Full', Hellos cease. An LLDown event forces both interface and neighbor back to 'Down'.
section: "3.1"
topics:
    - routing
