document: rfc-4719
kind: interoperability-note
summary: For Ethernet 802.1Q VLAN transport, the ingress LCCE MAY consider the 802.1p user priority field for traffic classification, and the egress LCCE MAY consider the DS field of the encapsulating IP header when rewriting the VLAN user priority field.
