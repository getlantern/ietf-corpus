document: rfc-5663
kind: protocol-element
summary: 'The pnfs_block_extent_state4 enum defines four extent states: PNFS_BLOCK_READ_WRITE_DATA (valid, readable and writable), PNFS_BLOCK_READ_DATA (valid, read-only; write requests prohibited), PNFS_BLOCK_INVALID_DATA (allocated but uninitialized, reads as zero, writes convert to READ_WRITE_DATA), and PNFS_BLOCK_NONE_DATA (hole with no physical storage, reads as zero, never returned for writable layouts).'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
