document: rfc-5092
kind: security-consideration
summary: 'Clients resolving IMAP URLs that require authentication must meet at least one of five criteria: the URL comes from a trusted/validated source; explicit site policy permits the connection; the user confirms supplying credentials to that domain; a mechanism validates the server before sending credentials (e.g., TLS with a site certificate, DIGEST-MD5); or a mechanism that reveals nothing reusable is used (e.g., ANONYMOUS, GSSAPI).'
section: "3.2"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
