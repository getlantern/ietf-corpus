document: rfc-9291
kind: protocol-element
summary: Each 'vpn-service' is identified by a locally significant 'vpn-id' and declares VPN type (vpls, vpws, vpws-evpn, pbb-evpn, mpls-evpn, vxlan-evpn), service topology (hub-spoke, any-to-any, custom), signaling type, underlay transport preference, BGP auto-discovery flag, and administrative/operational status with timestamps. A 'parent-service-id' correlates the network service to its originating service order.
section: "7.3"
topics:
    - yang
    - vpn
    - bgp
