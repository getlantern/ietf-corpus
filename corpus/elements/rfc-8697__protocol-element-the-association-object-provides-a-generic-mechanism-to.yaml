document: rfc-8697
kind: protocol-element
summary: The ASSOCIATION object provides a generic mechanism to create groupings of LSPs in PCEP. Association groups can be used to define relationships between sets of LSPs or between a set of LSPs and a set of attributes (configuration parameters or behaviors), applicable to both stateful and stateless PCE.
section: "3.1"
