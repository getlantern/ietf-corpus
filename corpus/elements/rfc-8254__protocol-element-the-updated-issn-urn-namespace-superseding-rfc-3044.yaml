document: rfc-8254
kind: protocol-element
summary: The updated ISSN URN namespace (superseding RFC 3044) incorporates the linking ISSN (ISSN-L), introduced in ISO 3297:2007, which designates a single ISSN for all media of a serial publication regardless of how many media forms exist, whereas traditional ISSN applies to a single medium only.
section: "2.2"
topics:
