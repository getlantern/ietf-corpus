document: rfc-8471
kind: protocol-element
summary: The Token Binding protocol consists of one client-to-server message proving possession of one or more client-generated asymmetric private keys. The message is sent with application protocol data over TLS and is only sent when Token Binding negotiation has succeeded. Long-lived Token Binding IDs span multiple TLS sessions and connections.
section: "2"
