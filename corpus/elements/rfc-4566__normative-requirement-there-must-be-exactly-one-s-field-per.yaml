document: rfc-4566
kind: normative-requirement
summary: There MUST be exactly one `s=` field per session description and it MUST NOT be empty. If a session has no meaningful name, the value SHOULD be a single space (`s= `).
section: "5.3"
rfc2119_level: MUST
