document: rfc-7462
kind: security-consideration
summary: Authorization for providing alert indications SHALL NOT assume any limitation on potential recipients without obtaining specific information about the SIP transaction. A proxy SHOULD remove indications from untrusted sources that may be deceptive or that contain information to be suppressed for privacy reasons.
section: "16"
topics:
