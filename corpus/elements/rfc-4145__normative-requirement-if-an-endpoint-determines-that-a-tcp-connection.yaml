document: rfc-4145
kind: normative-requirement
summary: If an endpoint determines that a TCP connection for an 'm' line has been closed and should be reestablished, it SHOULD perform a new offer/answer exchange with a connection value of 'new' for that 'm' line.
section: "6.2"
rfc2119_level: SHOULD
