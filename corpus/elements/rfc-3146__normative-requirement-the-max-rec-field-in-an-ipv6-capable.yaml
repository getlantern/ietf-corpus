document: rfc-3146
kind: normative-requirement
summary: The max_rec field in an IPv6-capable node's bus information block MUST be at least 8, indicating the ability to accept block write requests and asynchronous stream packets with data payload of 512 octets; the same ability MUST apply to read requests.
section: "3"
rfc2119_level: MUST
topics:
    - ip
