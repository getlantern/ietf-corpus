document: rfc-1323
kind: protocol-element
summary: 'RTTM (Round Trip Time Measurement) uses TSopt: the sender stamps each segment with TSval, the receiver reflects it in TSecr, and the sender computes RTT as my.TSclock - SEG.TSecr. This enables per-ACK RTT sampling at negligible cost, solving the aliasing problem on large windows.'
section: "3.3"
topics:
    - tcp
    - congestion
