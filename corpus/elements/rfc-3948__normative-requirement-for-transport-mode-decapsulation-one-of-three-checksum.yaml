document: rfc-3948
kind: normative-requirement
summary: 'For transport mode decapsulation, one of three checksum correction procedures MUST be applied: incrementally recompute the TCP/UDP checksum using NAT-OA addresses from IKE, fully recompute the checksum, or zero the UDP checksum (with TCP checksum bypass allowed only if the packet is integrity-protected).'
section: 3.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - nat
    - vpn
    - tcp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
