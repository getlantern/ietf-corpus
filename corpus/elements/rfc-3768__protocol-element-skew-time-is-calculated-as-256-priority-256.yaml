document: rfc-3768
kind: protocol-element
summary: Skew_Time is calculated as (256 − Priority) / 256 seconds; Master_Down_Interval is (3 × Advertisement_Interval) + Skew_Time. These derived timers ensure higher-priority backups assume Master faster than lower-priority ones.
section: "6.1"
