document: rfc-8807
kind: wire-format
summary: The <loginSec:pw> and <loginSec:newPW> fields use the "pwType" XML Schema simple type, a token with a minimum length of 6 characters and no maximum length in the schema (maximum is up to server policy). Whitespace normalization removes leading/trailing whitespace and collapses internal whitespace to a single space (#x20).
section: "4.1"
