document: rfc-3291
kind: normative-requirement
summary: When a generic Internet address is used as a table index, both InetAddressType and InetAddress objects MUST be used, and InetAddressType MUST be listed before InetAddress in the INDEX clause. The IMPLIED keyword MUST NOT be used for an InetAddress object in an INDEX clause.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
