document: rfc-3986
kind: protocol-element
summary: Reserved characters are divided into gen-delims (":", "/", "?", "#", "[", "]", "@") and sub-delims ("!", "$", "&", "'", "(", ")", "*", "+", ",", ";", "="). Reserved characters that conflict with their delimiter role in a component must be percent-encoded.
