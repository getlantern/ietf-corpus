document: rfc-9118
kind: normative-requirement
summary: Claims listed in permittedValues MUST exactly match one of the listed values if the claim is present in the PASSporT. A PASSporT lacking a permittedValues-listed claim is not thereby invalid unless the claim also appears in mustInclude.
