document: rfc-3945
kind: normative-requirement
summary: LMP does not specify the signaling transport mechanism, but requires that messages transported over a control channel be IP encoded. A 32-bit non-zero integer Control Channel Identifier (CCId) is assigned to each direction of a control channel.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
