document: rfc-2634
kind: normative-requirement
summary: Before processing an eSSSecurityLabel signedAttribute, the receiving agent MUST verify the signature of the covering SignerInfo. A recipient MUST NOT process an eSSSecurityLabel that has not been verified.
section: 3.1.2
rfc2119_level: MUST
topics:
    - email
    - security
