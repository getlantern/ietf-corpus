document: rfc-5949
kind: normative-requirement
summary: For predictive fast handover to work effectively, the mobile node MUST be capable of reporting lower-layer information to the access network at a short enough interval, and the access network MUST be capable of sending the Handover indication to the PMAG at an appropriate timing.
section: "4.1"
rfc2119_level: REQUIRED
topics:
