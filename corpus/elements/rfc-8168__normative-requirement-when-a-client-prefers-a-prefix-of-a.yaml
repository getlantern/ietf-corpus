document: rfc-8168
kind: normative-requirement
summary: When a client prefers a prefix of a specific length, it MUST send a Solicit message using the same IAID in the IA_PD, include the preferred prefix-length value in the IAPREFIX 'prefix-length' field, and set the 'IPv6 prefix' field to zero.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
