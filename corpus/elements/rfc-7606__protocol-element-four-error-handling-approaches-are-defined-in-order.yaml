document: rfc-7606
kind: protocol-element
summary: 'Four error-handling approaches are defined in order of decreasing severity: (1) session reset — send NOTIFICATION and terminate session; (2) AFI/SAFI disable — ignore all subsequent routes for the affected AFI/SAFI; (3) treat-as-withdraw — treat all routes in the UPDATE as withdrawn; (4) attribute discard — discard only the malformed attribute and continue processing. Attribute discard MUST NOT be used if the attribute affects route selection or installation.'
section: "2"
topics:
