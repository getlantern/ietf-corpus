document: rfc-5882
kind: normative-requirement
summary: A system SHOULD NOT indicate a connectivity failure to a client if either the local or remote session state transitions to AdminDown, so long as the client has independent means of liveness detection. If the client has no independent means, the system SHOULD indicate a connectivity failure and assume the semantics of Down state.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
