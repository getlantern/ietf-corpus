summary: 'Proxy Router Advertisement (PrRtAdv): an ICMPv6 message (Type 154, Subtype 3) sent by the PAR in response to RtSolPr or unsolicited for network-initiated handover. Code values 0–5 indicate whether neighbor AP info, DHCP usage, or lack of fast handover support apply.'
