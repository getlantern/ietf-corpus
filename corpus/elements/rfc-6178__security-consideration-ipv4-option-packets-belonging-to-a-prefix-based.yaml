document: rfc-6178
kind: security-consideration
summary: IPv4 option packets belonging to a prefix-based FEC that bypass MPLS encapsulation at an ingress LER allow attackers to DoS downstream LSRs by saturating their software exception forwarding paths, adversely affecting control and management protocols and LSR availability.
