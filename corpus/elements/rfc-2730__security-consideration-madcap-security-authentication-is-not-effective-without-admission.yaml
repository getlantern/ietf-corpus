document: rfc-2730
kind: security-consideration
summary: MADCAP security (authentication) is not effective without admission control in the multicast routing infrastructure. Without such control, authenticated allocation does not prevent unauthorized use of multicast addresses. Authentication is a prerequisite for policy enforcement such as limiting addresses per client.
section: "4"
topics:
    - multicast
    - security
