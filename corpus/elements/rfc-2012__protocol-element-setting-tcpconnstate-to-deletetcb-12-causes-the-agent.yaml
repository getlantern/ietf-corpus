document: rfc-2012
kind: protocol-element
summary: Setting tcpConnState to deleteTCB(12) causes the agent to delete the TCP Control Block (TCB) of that connection, resulting in immediate termination; as an implementation-specific option the agent may send a RST segment to the remote endpoint.
