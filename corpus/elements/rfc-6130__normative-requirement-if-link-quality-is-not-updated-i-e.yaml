document: rfc-6130
kind: normative-requirement
summary: If link quality is not updated (i.e., a static deployment), L_quality MUST be set to indicate an always-usable quality link (>= HYST_ACCEPT). Modification of link quality is OPTIONAL.
section: "4.4"
rfc2119_level: MUST
