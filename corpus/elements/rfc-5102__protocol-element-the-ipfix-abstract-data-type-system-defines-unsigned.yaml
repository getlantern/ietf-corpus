document: rfc-5102
kind: protocol-element
summary: The IPFIX abstract data type system defines unsigned integers (unsigned8/16/32/64), signed integers (signed8/16/32/64), IEEE 754 floating point (float32/float64), boolean, macAddress (6 octets), octetArray, Unicode string, four datetime resolutions (dateTimeSeconds/Milliseconds/Microseconds/Nanoseconds), ipv4Address, and ipv6Address. All datetime types are UTC-based with leap seconds excluded.
section: "3.1"
