document: rfc-6116
kind: normative-requirement
summary: If the literal '+' character appears in the ERE sub-field of an ENUM NAPTR, it MUST be escaped as '\+'. The Regexp delimiter character, if it appears in the static text of the Repl sub-field, MUST also be escaped.
section: "5.1"
rfc2119_level: MUST
topics:
