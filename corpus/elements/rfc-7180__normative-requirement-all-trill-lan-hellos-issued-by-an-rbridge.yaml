document: rfc-7180
kind: normative-requirement
summary: All TRILL LAN Hellos issued by an RBridge on a particular port MUST have the same PORT-TRILL-VER sub-TLV (if included) in addition to the same source MAC address, priority, desired Designated VLAN, and Port ID, regardless of the VLAN in which the Hello is sent.
section: "9"
rfc2119_level: MUST
topics:
    - routing
