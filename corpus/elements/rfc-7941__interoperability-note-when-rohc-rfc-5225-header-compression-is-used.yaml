document: rfc-7941
kind: interoperability-note
summary: When ROHC (RFC 5225) header compression is used with RTP, the header extension data itself is not compressed, but the extension indicator (X) bit in the RTP header is compressed and classified as rarely changing. Frequent use of header extensions may degrade header compression efficiency.
section: 4.2.7
topics:
    - rtp
    - realtime
