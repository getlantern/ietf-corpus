document: rfc-6275
kind: protocol-element
summary: The Home Address destination option carries a mobile node's home address in packets sent from its care-of address, making the care-of address transparent to upper layers. Its use is restricted to cases where the correspondent node already has a Binding Cache entry for the given home address, preventing address-spoofing attacks.
section: "6.3"
topics:
    - ip
    - security
