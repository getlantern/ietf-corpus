document: rfc-3297
kind: privacy-consideration
summary: MDN usage is entirely voluntary due to privacy considerations for end-users. Content negotiation, which depends on MDN, must therefore build on a voluntary, high-latency closed-loop model and cannot mandate MDN responses from all receivers.
section: "2.2"
topics:
    - email
    - privacy
