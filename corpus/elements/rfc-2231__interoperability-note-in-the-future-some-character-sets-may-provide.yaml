document: rfc-2231
kind: interoperability-note
summary: In the future, some character sets may provide facilities for inline language labeling, which would be inherently more flexible than the mechanisms defined here (allowing language switching mid-string). If and when such facilities are developed, they SHOULD be used in preference to the language labeling specified in this document.
section: "8"
rfc2119_level: SHOULD
topics:
    - email
