document: rfc-8853
kind: normative-requirement
summary: When listing multiple directions on a single 'a=simulcast' line, each direction ('send' or 'recv') MUST NOT occur more than once on the same line. A single rid-id MUST NOT occur more than once per 'a=simulcast' line.
section: "5.2"
rfc2119_level: MUST NOT
