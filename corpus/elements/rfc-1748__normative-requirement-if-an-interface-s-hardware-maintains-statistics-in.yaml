document: rfc-1748
kind: normative-requirement
summary: If an interface's hardware maintains statistics in 16-bit counters, the agent MUST read the hardware counters frequently enough to prevent loss of significance in order to maintain the required 32-bit Counter32 values in software.
section: "4"
rfc2119_level: MUST
