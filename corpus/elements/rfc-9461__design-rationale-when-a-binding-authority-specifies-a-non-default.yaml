document: rfc-9461
kind: design-rationale
summary: When a binding authority specifies a non-default port, Port Prefix Naming encodes the port in an additional label prefix (e.g., _9953._dns.dns1.example.com). This allows two DNS services on the same host but different ports to independently advertise different SVCB configurations without conflict.
section: "3.1"
topics:
    - dns
