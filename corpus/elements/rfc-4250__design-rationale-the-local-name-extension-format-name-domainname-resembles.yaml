document: rfc-4250
kind: design-rationale
summary: The local name extension format 'name@domainname' resembles RFC 822 (STD 11) email addresses, but the RFC notes this is purely coincidental and has no relationship to email addressing. The '@' convention was chosen solely as a scoping mechanism for vendor-private namespace delegation.
section: 4.6.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
