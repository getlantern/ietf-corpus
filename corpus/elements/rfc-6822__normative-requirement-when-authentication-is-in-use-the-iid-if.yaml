document: rfc-6822
kind: normative-requirement
summary: When authentication is in use, the IID (if present) is first used to select the applicable authentication configuration; the authentication check is then performed as normal. ITID-specific authentication MAY be used in SNPs and LSPs when multiple ITIDs are supported.
section: "2.3"
rfc2119_level: MAY
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
