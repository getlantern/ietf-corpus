document: rfc-7522
kind: normative-requirement
summary: The <Subject> element MUST contain at least one <SubjectConfirmation> with Method 'urn:oasis:names:tc:SAML:2.0:cm:bearer'. When present, <SubjectConfirmationData> MUST have a Recipient attribute matching the token endpoint URL and a NotOnOrAfter attribute.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - security
