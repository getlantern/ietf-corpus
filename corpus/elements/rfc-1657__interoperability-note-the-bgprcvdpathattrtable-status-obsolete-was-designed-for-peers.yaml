document: rfc-1657
kind: interoperability-note
summary: The bgpRcvdPathAttrTable (STATUS obsolete) was designed for peers running BGP version 3 or lower and is superseded by bgp4PathAttrTable for BGP-4 peers. Implementations should use bgp4PathAttrTable for all BGP-4 peer path attribute information.
