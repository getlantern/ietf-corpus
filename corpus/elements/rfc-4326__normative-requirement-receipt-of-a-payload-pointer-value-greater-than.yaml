document: rfc-4326
kind: normative-requirement
summary: Receipt of a Payload Pointer value greater than 181 is illegal and MUST cause reassembly to be aborted, with the Receiver entering the Idle State. This event SHOULD be recorded as a payload pointer error.
section: "7"
rfc2119_level: MUST
topics:
    - ip
