document: rfc-4008
kind: security-consideration
summary: The natSessionTable and bind tables expose detailed information about active NAT sessions including private and public IP addresses and ports. Read access to these objects by unauthorized parties constitutes a privacy risk, revealing the internal network topology and active communication endpoints behind the NAT device.
section: "7"
topics:
    - nat
    - security
    - privacy
