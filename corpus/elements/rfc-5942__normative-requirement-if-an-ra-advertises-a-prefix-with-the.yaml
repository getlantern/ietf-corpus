document: rfc-5942
kind: normative-requirement
summary: If an RA advertises a prefix with the L-bit set and the Valid Lifetime later expires, the host MUST consider addresses of that prefix to be off-link and MUST update its Prefix List accordingly, as specified in RFC 4861 Section 6.3.4.
section: "4"
rfc2119_level: MUST
topics:
