document: rfc-8911
kind: normative-requirement
summary: The Identifier of each Registered Performance Metric MUST be unique. IANA SHOULD assign the lowest available Identifier to new entries; Identifier 0 is Reserved, and values 64512–65535 are reserved for private or experimental use where overlapping use may occur.
section: 7.1.1
rfc2119_level: MUST
topics:
