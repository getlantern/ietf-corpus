document: rfc-6240
kind: normative-requirement
summary: All read-create objects in pwCepCfgEntry MUST NOT be changed while pwCepCfgRowStatus is active(1). The agent MUST NOT allow pwCepCfgRowStatus to be changed from active(1) while the entry is referenced by at least one active PW.
