document: rfc-9584
kind: normative-requirement
summary: NAL-unit-like structures with NAL unit type values 56 through 62 inclusive (AP and FU type identifiers and reserved values) MUST NOT be passed to the decoder. Only NAL units with type values 0 through 55 may be passed.
