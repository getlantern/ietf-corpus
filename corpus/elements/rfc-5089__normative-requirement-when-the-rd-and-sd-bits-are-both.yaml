document: rfc-5089
kind: normative-requirement
summary: When the Rd and Sd bits are both set in PATH-SCOPE, the PCED sub-TLV MUST NOT contain a NEIG-PCE-DOMAIN sub-TLV, since setting these bits already implies the PCE can reach any neighbor area or AS.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - routing
