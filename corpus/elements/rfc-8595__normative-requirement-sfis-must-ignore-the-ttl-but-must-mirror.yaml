document: rfc-8595
kind: normative-requirement
summary: SFIs MUST ignore the TTL but MUST mirror it back to the SFF unmodified along with the SI. Each component of the SFC system MUST NOT increase the SI TTL value; otherwise, loops may go undetected.
section: "6"
rfc2119_level: MUST NOT
