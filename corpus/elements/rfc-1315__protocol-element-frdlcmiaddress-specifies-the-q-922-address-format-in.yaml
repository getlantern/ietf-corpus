document: rfc-1315
kind: protocol-element
summary: 'frDlcmiAddress specifies the Q.922 address format in use: q921(1) with 13-bit DLCI, q922March90(2) with 11-bit DLCI, q922November90(3) with 10-bit DLCI, or q922(4) for the final standard. This determines how DLCIs are encoded on the interface.'
section: "4.1"
