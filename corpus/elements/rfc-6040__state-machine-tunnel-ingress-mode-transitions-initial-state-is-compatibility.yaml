document: rfc-6040
kind: state-machine
summary: 'Tunnel ingress mode transitions: initial state is compatibility mode during dynamic endpoint discovery; transitions to normal mode when egress signals compliance with RFC 6040, RFC 4301, or RFC 3168 full functionality; reverts to and stays in compatibility mode if egress denies compliance or returns an error. IPsec (RFC 4301) ingresses are permanently in normal mode by construction.'
section: "4.3"
topics:
    - ecn
    - ip
    - ipsec
