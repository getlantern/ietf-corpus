document: rfc-1549
kind: normative-requirement
summary: PPP links MUST be full-duplex, but MAY be either dedicated or circuit-switched. The link may be asynchronous (start/stop), bit-synchronous, or octet-synchronous.
section: "1"
rfc2119_level: MUST
