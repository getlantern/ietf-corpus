document: rfc-1902
kind: normative-requirement
summary: Every OBJECT-TYPE must include a MAX-ACCESS clause. For objects with SYNTAX Counter32 or Counter64, MAX-ACCESS must be either 'read-only' or 'accessible-for-notify'. A DEFVAL clause must not be present for Counter32 or Counter64 objects.
section: 7.1.6
rfc2119_level: MUST
topics:
