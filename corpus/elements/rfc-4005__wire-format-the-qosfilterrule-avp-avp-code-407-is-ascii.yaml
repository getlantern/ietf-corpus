document: rfc-4005
kind: wire-format
summary: The QoSFilterRule AVP (AVP Code 407) is ASCII-encoded with format 'action dir proto from src to dst [options]'; action is 'tag' (DSCP marking) or 'meter' (Assured Forwarding rate limiting). Unmatched packets are treated as best effort; an access device unable to apply a rule SHOULD NOT terminate the session.
section: "6.9"
topics:
