document: rfc-5946
kind: normative-requirement
summary: When a downstream Resv message reaches the Receiver Proxy, it MUST internally convert its state from a proxied reservation to regular midpoint RSVP behavior, and from then on MUST behave as a regular RSVP router for that reservation.
section: "4.1"
rfc2119_level: MUST
topics:
