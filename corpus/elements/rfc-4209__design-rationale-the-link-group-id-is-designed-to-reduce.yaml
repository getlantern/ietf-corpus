document: rfc-4209
kind: design-rationale
summary: The Link Group ID is designed to reduce control traffic during failures affecting many data links. A single ChannelStatus message with a LINK GROUP CHANNEL_STATUS object can cover an entire group rather than requiring individual messages per data link.
section: 2.3.1
topics:
    - mpls
    - routing
