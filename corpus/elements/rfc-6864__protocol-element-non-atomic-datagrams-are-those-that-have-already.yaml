document: rfc-6864
kind: protocol-element
summary: Non-atomic datagrams are those that have already been fragmented or for which fragmentation remains possible, identified by (DF==0)||(MF==1)||(frag_offset>0). The IPv4 ID field MUST be unique within one MDL per source/destination/protocol tuple for non-atomic datagrams.
