document: rfc-8844
kind: design-rationale
summary: The existing SDP 'tls-id' attribute is reused as the unique session identifier for the external_session_id extension because it is already required to be unique per offer/answer, meaning no two offers or answers from the same client share the same value, without requiring a new identifier mechanism.
