document: rfc-7074
kind: normative-requirement
summary: PSC-2 (value 2), PSC-3 (value 3), and PSC-4 (value 4) Switching Types are deprecated and SHOULD be treated as unsupported types. In the case of signaling, they should be processed according to Section 2.1.1 of RFC 3473.
