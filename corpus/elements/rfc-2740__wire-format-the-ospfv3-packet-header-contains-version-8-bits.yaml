kind: wire-format
summary: 'The OSPFv3 packet header contains: Version (8 bits, value 3), Type (8 bits), Packet Length (16 bits), Router ID (32 bits), Area ID (32 bits), Checksum (16-bit IPv6 one''s complement over the packet plus IPv6 pseudo-header), Instance ID (8 bits), and a reserved byte. It is encapsulated directly in IPv6 with Next Header value 89.'
