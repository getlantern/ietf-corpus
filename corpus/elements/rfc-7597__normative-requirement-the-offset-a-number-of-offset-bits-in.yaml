document: rfc-7597
kind: normative-requirement
summary: The offset 'a' (number of offset bits in the port-mapping algorithm) MUST be the same for every MAP CE sharing the same IPv4 address. Similarly, the PSID length 'k' MUST be the same for every MAP CE sharing the same address, to guarantee non-overlapping port sets.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
