document: rfc-9483
kind: normative-requirement
summary: The extraCerts field MUST be present for signature-based protection and contain the CMP protection certificate plus its chain in the first request and response of an operation. The first certificate MUST be the CMP protection certificate. Self-signed certificates MUST NOT be trusted based on inclusion in extraCerts.
section: "3.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
