document: rfc-6051
kind: wire-format
summary: Variant B (56-bit NTP RTP header extension, ID-B, L=6) carries NTP Seconds bits 8–31 (24 bits) and the full 32-bit NTP Fraction, omitting the upper 8 bits of Seconds. The missing upper byte must be derived from RTCP SR packets. No padding is required.
section: "3.3"
topics:
    - rtp
    - realtime
    - ntp
