document: rfc-4701
kind: wire-format
summary: 'The DHCID digest is computed as SHA-256(identifier || FQDN), where the FQDN is in canonical DNS wire format per RFC 4034 Section 6.2. The full RDATA is: identifier-type (2 octets) || digest-type (1 octet) || digest (32 octets for SHA-256).'
section: "3.5"
topics:
