document: rfc-4535
kind: protocol-element
summary: The Rekey Event message distributes a new GTPK and optionally a new Policy Token to group members via multicast. In distributed operation, S-GC/KSes receive rekey from the primary GC/KS and relay it to their sub-groups using LKH-wrapped key arrays, realizing forward and backward secrecy.
section: 5.3.1.1
topics:
    - security
    - crypto
    - multicast
