document: rfc-3555
kind: design-rationale
summary: The MIME namespace, originally designed for asynchronous Internet mail (RFC 2048), was reused for RTP payload type identification because it already provided a well-known media type registry, avoiding the need for a parallel RTP-specific naming scheme.
