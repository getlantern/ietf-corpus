document: rfc-4119
kind: interoperability-note
summary: PIDF-LO can be carried in any protocol capable of carrying XML or MIME. The registered MIME type is 'application/pidf+xml', enabling transport over SMTP, HTTP, SIP, or any other MIME-capable protocol without modification to those protocols.
