document: rfc-6185
kind: normative-requirement
summary: 'The packetization-mode parameter controls which packetization mode is used: value 0 or absent means single NAL mode MUST be used; value 1 means non-interleaved mode MUST be used; value 2 means interleaved mode MUST be used. The value MUST be an integer in the range 0 to 2.'
section: "6.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
