document: rfc-5934
kind: normative-requirement
summary: The SignedData version field MUST be set to 3, and the signerInfos collection MUST contain exactly one SignerInfo. The subjectKeyIdentifier alternative is always used in the SignerInfo.sid field to identify the signer public key directly.
section: "2.2"
rfc2119_level: MUST
topics:
