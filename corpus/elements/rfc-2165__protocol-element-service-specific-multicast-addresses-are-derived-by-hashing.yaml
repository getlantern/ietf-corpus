document: rfc-2165
kind: protocol-element
summary: Service-Specific Multicast Addresses are derived by hashing the ASCII-encoded Service Type string using a modified Torek hash (h = h*33 + byte, masked to 0x3FF), yielding a 0-1023 offset added to an IANA-assigned base range of 1024 contiguous multicast addresses.
section: 3.6.2
topics:
