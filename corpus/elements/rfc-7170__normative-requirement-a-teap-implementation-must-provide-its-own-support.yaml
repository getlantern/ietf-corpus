document: rfc-7170
kind: normative-requirement
summary: A TEAP implementation MUST provide its own support for fragmentation and reassembly of TLS messages. A TEAP server implementing TLS conversation restart capability SHOULD impose a limit on the number of restarts to protect against denial-of-service attacks.
section: "3.7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
