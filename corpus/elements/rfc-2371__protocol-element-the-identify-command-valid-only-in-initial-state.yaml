document: rfc-2371
kind: protocol-element
summary: The IDENTIFY command (valid only in Initial state) carries the lowest and highest supported protocol versions, the primary transaction manager address (or "-" if not supplied), and the secondary transaction manager address. If no primary address is supplied, the secondary will respond with ABORTED or READONLY to any subsequent PREPARE commands.
