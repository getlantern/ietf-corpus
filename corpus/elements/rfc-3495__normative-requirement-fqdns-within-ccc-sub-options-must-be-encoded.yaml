document: rfc-3495
kind: normative-requirement
summary: FQDNs within CCC sub-options MUST be encoded per RFC 1035 section 3.1, including a terminating zero octet. DNS name compression as described in RFC 1035 section 4.1.4 MUST NOT be applied.
