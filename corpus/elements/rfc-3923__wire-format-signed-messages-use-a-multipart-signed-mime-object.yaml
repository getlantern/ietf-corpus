summary: 'Signed messages use a multipart/signed MIME object with two parts: one Content-Type of Message/CPIM (or application/pidf+xml) and one Content-Type of application/pkcs7-signature. The entire object is wrapped in an XML CDATA section inside <e2e/>.'
