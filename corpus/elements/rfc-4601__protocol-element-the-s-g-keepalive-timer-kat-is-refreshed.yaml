document: rfc-4601
kind: protocol-element
summary: The (S,G) Keepalive Timer (KAT) is refreshed by data forwarded using (S,G) state, keeping (S,G) state alive in the absence of explicit Joins. It enables the RP's 'turnaround rules' where (S,G) joins stop register encapsulation and (S,G) prunes subsequently prevent unnecessary traffic from reaching the RP.
section: 4.1.4
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
