document: rfc-6106
kind: wire-format
summary: The DNSSL option consists of a 1-octet Type (value 31), a 1-octet Length in units of 8 octets (minimum 2), a 2-octet Reserved field, a 32-bit Lifetime, and one or more domain names encoded per RFC 1035 Section 3.1. The domain names field MUST be padded with zeros to a multiple of 8 octets and MUST NOT use DNS compression.
section: "5.2"
topics:
    - dns
    - ip
    - v6ops
