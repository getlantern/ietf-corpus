document: rfc-3733
kind: normative-requirement
summary: When postalInfo type='int' is provided, element content MUST be represented in a subset of UTF-8 representable in 7-bit US-ASCII. When type='loc' is provided, content MAY be unrestricted UTF-8.
section: 3.2.1
rfc2119_level: MUST
