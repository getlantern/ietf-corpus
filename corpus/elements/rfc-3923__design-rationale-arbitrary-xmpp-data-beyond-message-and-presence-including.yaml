document: rfc-3923
kind: design-rationale
summary: Arbitrary XMPP data beyond message and presence (including <iq/> stanzas and extended XML child elements) is secured by encapsulating it in the application/xmpp+xml MIME type, since [MSGFMT] allows encapsulating any MIME type, enabling end-to-end security for the full range of XMPP stanza types.
section: "5"
topics:
    - security
