document: rfc-4993
kind: security-consideration
summary: IRIS-LWZ provides no in-band authentication or confidentiality and is intended only for public data. Applications needing security must use out-of-band mechanisms (e.g., IPsec) or switch to IRIS-XPC. Attackers can alter IRIS-LWZ messages, enabling denial of service or delivery of false information.
section: "8"
topics:
    - security
