document: rfc-6363
kind: design-rationale
summary: FSSI is split into a Sender-Side FSSI (SS-FSSI) container and a general FSSI container. This separation allows receivers or third-party entities to control FEC encoding operations at the sender without receiving information that is only relevant to the sender.
section: "5.5"
topics:
    - realtime
