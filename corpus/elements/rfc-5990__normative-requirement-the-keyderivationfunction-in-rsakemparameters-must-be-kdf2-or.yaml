document: rfc-5990
kind: normative-requirement
summary: The keyDerivationFunction in RsaKemParameters MUST be KDF2 or KDF3 for alignment with ANS X9.44, though other KDFs MAY be used with CMS. The dem field MUST be an X9-approved symmetric key-wrapping scheme for ANS X9.44 alignment, though other wrapping schemes MAY be used with CMS.
section: B.1
rfc2119_level: MUST
topics:
    - crypto
