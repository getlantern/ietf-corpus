document: rfc-8968
kind: normative-requirement
summary: If a node receives a new DTLS connection from a neighbour to whom it already has a connection, the node MUST NOT discard the older connection until it has completed the handshake of the new one and validated the identity of the peer.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
