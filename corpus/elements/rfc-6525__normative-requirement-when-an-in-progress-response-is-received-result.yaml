document: rfc-6525
kind: normative-requirement
summary: When an 'In progress' response is received (Result=6), the Re-configuration Timer MUST be restarted; however, if the timer expires in this state, the RE-CONFIG chunk MUST be retransmitted but the error counters MUST NOT be incremented.
section: 5.2.7
rfc2119_level: MUST
topics:
    - sctp
