document: rfc-6551
kind: design-rationale
summary: Dynamic routing metrics are essential in LLNs because link and node characteristics change frequently, but uncontrolled updates cause routing oscillations. Implementations should use multi-threshold algorithms, low-pass filtering, and hysteresis rather than fine-grained updates to avoid spurious routing changes and excessive power consumption from unnecessary route recomputation.
section: "5"
topics:
    - routing
