document: rfc-8560
kind: normative-requirement
summary: B-MAC addresses learned over PBB-VPLS PWs MUST be injected into the bridge table of the associated MAC-VRF on the PBB-EVPN PE and MUST NOT be advertised in the control plane to remote PBB-EVPN PEs, since every PBB-EVPN PE can learn them directly over its own PW to each PBB-VPLS PE.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
