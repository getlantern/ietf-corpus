document: rfc-6637
kind: security-consideration
summary: SHA-1 MUST NOT be used with ECDSA or the KDF in the ECDH method. None of the ECC methods are allowed with deprecated V3 keys. Private keys MUST be protected using only iterated and salted S2K (RFC 4880 Section 3.7.1.3).
section: "13"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
