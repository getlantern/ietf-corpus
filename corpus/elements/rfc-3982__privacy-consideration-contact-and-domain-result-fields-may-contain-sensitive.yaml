document: rfc-3982
kind: privacy-consideration
summary: Contact and domain result fields may contain sensitive personal data (postal address, phone, email). The privacy label type attributes ('private', 'denied', 'doNotRedistribute', 'specialAccess') provide a structured mechanism for servers to communicate data withholding policies to clients based on access level, including marking data that must never be published or that must not be redistributed.
section: 3.2.1
topics:
    - privacy
    - registry
    - dns
