document: rfc-8658
kind: security-consideration
summary: This document targets deployments where a trusted relationship is in place between the RADIUS client and server. The existing RADIUS security vulnerabilities discussed in RFC 2607 and RFC 2869 apply; there is an inherent requirement to trust the counterparty.
