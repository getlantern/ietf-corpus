document: rfc-1964
kind: protocol-element
summary: Initiating credentials consist of a TGT plus session key stored in a credentials cache. Accepting credentials are service keys in a key table. When initiating credentials for a service principal are absent from the cache but a service key is available, the mechanism should use the service key to obtain a TGT from the KDC.
section: "3"
topics:
    - security
    - crypto
