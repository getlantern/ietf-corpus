document: rfc-6374
kind: normative-requirement
summary: Protocol and application designers MUST account for the synchronization conditions that LM counters must reflect data-plane state at the exact moment of LM message transmission or reception; this applies equally to direct and inferred LM. The implementation's behavior in this respect MUST be made clear to the user.
section: 2.9.8
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
