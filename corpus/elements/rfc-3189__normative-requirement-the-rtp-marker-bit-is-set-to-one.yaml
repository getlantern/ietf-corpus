document: rfc-3189
kind: normative-requirement
summary: The RTP marker bit is set to one on the last packet of a video frame and zero otherwise. However, detection of a frame change MUST NOT rely on the marker bit (which may be lost); detection MUST be based on a difference in the RTP timestamp.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
