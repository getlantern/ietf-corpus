document: rfc-6074
kind: normative-requirement
summary: 'For BGP-based VPLS auto-discovery, the VPLS-id Extended Community MUST be transitive. Two subtypes are defined: a Two-octet AS Specific Extended Community and an IPv4 Address Specific Extended Community, ensuring globally collision-free VPLS identifier allocation.'
section: 3.2.2.1
rfc2119_level: MUST
topics:
    - mpls
    - vpn
    - bgp
