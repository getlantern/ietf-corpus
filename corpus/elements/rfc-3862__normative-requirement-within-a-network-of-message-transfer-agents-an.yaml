document: rfc-3862
kind: normative-requirement
summary: Within a network of message transfer agents, an intermediate gateway MUST NOT change the Message/CPIM content in any way — headers cannot be changed or reordered, transfer encoding cannot be changed. A transfer agent wishing to modify content must create a new Message/CPIM message with the original as its content.
section: "6"
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
