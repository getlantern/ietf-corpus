document: rfc-1542
kind: normative-requirement
summary: Hosts or routers supporting a BOOTP relay agent MUST accept BOOTREQUEST messages with IP source address 0.0.0.0 for local delivery to the relay agent, bypassing normal Martian address filtering. BOOTREQUEST messages from legal IP source addresses MUST also be accepted.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
