document: rfc-7477
kind: protocol-element
summary: 'The Flags field is 16 bits and currently defines two flags: bit 0 (''immediate'', value 0x0001) signals the parental agent to process the CSYNC record without out-of-band approval, and bit 1 (''soaminimum'', value 0x0002) requires the queried zone''s SOA serial to be greater than or equal to the value in the SOA Serial field.'
section: 2.1.1.2
topics:
    - dns
