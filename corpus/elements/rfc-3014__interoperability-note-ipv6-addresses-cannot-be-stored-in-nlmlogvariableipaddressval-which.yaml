document: rfc-3014
kind: interoperability-note
summary: IPv6 addresses cannot be stored in nlmLogVariableIpAddressVal (which uses the IpAddress type, an IPv4 format); IPv6 addresses represented as TAddress or InetAddress use OCTET STRING and are stored in nlmLogVariableOctetStringVal instead.
section: "3"
