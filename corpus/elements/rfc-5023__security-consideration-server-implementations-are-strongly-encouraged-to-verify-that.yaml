document: rfc-5023
kind: security-consideration
summary: Server implementations are strongly encouraged to verify that client-supplied content is safe before accepting, processing, or publishing it to guard against code injection and cross-site scripting. For HTML, a whitelist of acceptable content is more effective than a blacklist.
section: "15.7"
