document: rfc-9603
kind: protocol-element
summary: The Endpoint Behavior field in the SRv6-ERO/SRv6-RRO subobject is a 16-bit value representing the behavior associated with the SRv6 SID per RFC 8986. If behavior is unknown, value 0xFFFF is used. The field is optional but recommended for maintainability and diagnostics.
section: 4.3.1
topics:
    - routing
    - ip
