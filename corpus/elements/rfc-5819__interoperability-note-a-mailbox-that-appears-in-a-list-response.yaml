document: rfc-5819
kind: interoperability-note
summary: A mailbox that appears in a LIST response solely because it has matching children (e.g., via RECURSIVEMATCH) but does not itself match the selection criteria does not receive a STATUS reply, as illustrated in the second example where "foo" gets a LIST response with CHILDINFO but no STATUS response.
