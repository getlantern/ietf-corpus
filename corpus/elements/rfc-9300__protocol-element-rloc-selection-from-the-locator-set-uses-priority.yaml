document: rfc-9300
kind: protocol-element
summary: RLOC selection from the Locator-Set uses Priority (lowest wins; 255 means never use) and Weight (relative load-share among equal-Priority RLOCs). A suggested hashing algorithm uses the inner-header 5-tuple (src/dst addr, src/dst port, protocol) to select among equal-Priority Locators and to compute the outer UDP source port.
section: "9"
topics:
