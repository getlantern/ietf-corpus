document: rfc-2910
kind: normative-requirement
summary: Each HTTP operation MUST use the POST method where the request-URI is the object target, and the Content-Type of the message-body in each request and response MUST be 'application/ipp'. A printer implementation MUST support HTTP over IANA Well Known Port 631.
section: "4"
rfc2119_level: MUST
topics:
    - http
