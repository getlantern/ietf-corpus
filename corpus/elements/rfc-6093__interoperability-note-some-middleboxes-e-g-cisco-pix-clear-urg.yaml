document: rfc-6093
kind: interoperability-note
summary: Some middleboxes (e.g., Cisco PIX) clear URG flags and zero out the Urgent Pointer to counter NIDS evasion techniques. This transforms urgent data into in-line data for OOB-mode implementations, and means urgent indications cannot be relied upon in the current Internet.
section: "3.4"
topics:
    - tcp
    - security
