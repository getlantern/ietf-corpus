document: rfc-1971
kind: protocol-element
summary: ManagedFlag and OtherConfigFlag are per-interface host variables copied from the M and O bits of the most recently received Router Advertisement. ManagedFlag controls whether addresses are obtained via stateful autoconfiguration; OtherConfigFlag controls whether other configuration parameters are obtained statefully. Both start FALSE.
section: "5.2"
topics:
    - ip
    - v6ops
