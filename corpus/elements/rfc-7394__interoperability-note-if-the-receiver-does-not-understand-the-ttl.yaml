document: rfc-7394
kind: interoperability-note
summary: If the receiver does not understand the TTL TLV, it will simply ignore the TLV, consistent with the handling of all optional TLVs in LSP-Ping. In that case, any determination of the reply TTL is beyond the scope of this document.
