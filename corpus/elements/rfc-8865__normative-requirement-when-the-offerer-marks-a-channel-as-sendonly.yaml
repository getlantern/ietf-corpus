document: rfc-8865
kind: normative-requirement
summary: When the offerer marks a channel as sendonly, the answerer MUST mark it recvonly or inactive. When the offerer marks it recvonly, the answerer MUST mark it sendonly or inactive. When the offerer marks it inactive, the answerer MUST also mark it inactive.
section: 4.2.3.2
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
