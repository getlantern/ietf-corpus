document: rfc-5584
kind: protocol-element
summary: The redundancy mechanism allows time-shifted copies of earlier ATRAC frames to be included in current packets. The receiver can deduce the redundancy level from successive packet timestamps and frame counts, allowing recovery of frames lost due to packet loss.
section: 5.3.2.1
topics:
    - rtp
    - realtime
