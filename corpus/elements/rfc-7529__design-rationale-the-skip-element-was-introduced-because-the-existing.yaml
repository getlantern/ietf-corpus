document: rfc-7529
kind: design-rationale
summary: The SKIP element was introduced because the existing iCalendar behavior of silently ignoring invalid recurrence dates (e.g., a birthday on Feb 29 appearing only in leap years) is often surprising to users. Common human conventions for resolving such dates differ by calendar system and event type, necessitating an explicit user-controlled policy.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
