document: rfc-5725
kind: normative-requirement
summary: Methods that can partially recover missing data SHOULD NOT be evaluated based on Post-repair Loss RLE reports, as such reports consider partially repaired packets as unrepaired and may underestimate the effectiveness of partial repair methods.
section: "1"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
