document: rfc-7291
kind: normative-requirement
summary: DHCP servers MUST NOT combine the IP addresses of multiple PCP servers and return them as if they belong to a single PCP server, and MUST NOT separate the addresses of a single PCP server and return them as if they belong to distinct PCP servers.
section: "5"
rfc2119_level: MUST NOT
topics:
    - pcp
    - ip
