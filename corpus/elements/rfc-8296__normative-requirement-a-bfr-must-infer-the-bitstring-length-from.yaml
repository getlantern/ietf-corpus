document: rfc-8296
kind: normative-requirement
summary: A BFR MUST infer the BitString length from the BIFT-id and MUST NOT infer it from the BSL field value. The BSL field is present only to enable offline tools such as LAN analyzers to parse the header.
section: 2.1.2
rfc2119_level: MUST
topics:
