document: rfc-8861
kind: security-consideration
summary: 'The RGRS packet fields are vulnerable to modification: the SC or P fields cause invalid packet classification, modification of the PT field causes misinterpretation, modifying the ''SSRC of packet sender'' field could enable resource exhaustion attacks by creating phantom Reporting Group associations.'
