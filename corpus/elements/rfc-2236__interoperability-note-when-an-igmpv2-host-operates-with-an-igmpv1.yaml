document: rfc-2236
kind: interoperability-note
summary: When an IGMPv2 host operates with an IGMPv1 querier router, a Max Response Time of 0 in queries MUST be interpreted as 100 (10 seconds). A per-interface state variable MUST track whether the querier is IGMPv1 or IGMPv2 based on whether an IGMPv1 query was heard in the last [Version 1 Router Present Timeout] seconds.
section: "4"
topics:
    - multicast
