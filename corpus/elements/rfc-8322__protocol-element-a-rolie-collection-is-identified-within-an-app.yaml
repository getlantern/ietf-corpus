document: rfc-8322
kind: protocol-element
summary: A ROLIE Collection is identified within an app:collection by an app:categories element containing exactly one atom:category with scheme='urn:ietf:params:rolie:category:information-type'. A non-ROLIE Collection lacks this category, enabling mixed hosting of ROLIE and non-ROLIE collections in the same AtomPub instance.
section: 5.1.2
topics:
    - http
    - security
