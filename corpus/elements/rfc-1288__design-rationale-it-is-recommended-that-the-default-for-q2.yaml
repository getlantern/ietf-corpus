document: rfc-1288
kind: design-rationale
summary: It is RECOMMENDED that the default for {Q2} processing be to refuse, because cases warranting forwarding are far outweighed by cases for refusing. A machine at a security perimeter that enables {Q2} provides a path through that perimeter, making the default-deny posture critical for gateway machines.
section: 3.2.1
topics:
    - security
