document: rfc-2393
kind: normative-requirement
summary: If the total size of a compressed ULP payload and IPComp header is not smaller than the original ULP payload, the IP datagram MUST be sent in the original non-compressed form without adding an IPComp header.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
