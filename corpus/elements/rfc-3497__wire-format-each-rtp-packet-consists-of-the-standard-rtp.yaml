summary: 'Each RTP packet consists of the standard RTP header followed by a 4-octet payload header and SMPTE 292M payload data. The payload header contains: sequence# high bits (16 bits), F flag (1 bit), V flag (1 bit), Z reserved (2 bits), and line number (11 bits).'
