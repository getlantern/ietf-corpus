document: rfc-5672
kind: design-rationale
summary: The DKIM specification does not require the SDID or AUID to match identifiers in other message header fields (e.g., From:); such linkage is an assessor policy issue. The real-world efficacy of bindings between SDID/AUID and other identities is not well established, and reliance on such bindings should be strictly limited.
section: "12"
