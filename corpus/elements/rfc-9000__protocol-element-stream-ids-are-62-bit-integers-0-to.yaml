document: rfc-9000
kind: protocol-element
summary: Stream IDs are 62-bit integers (0 to 2^62-1) encoded as variable-length integers. The least significant bit identifies the initiator (0=client, 1=server); the second least significant bit distinguishes bidirectional (0) from unidirectional (1) streams, yielding four stream types.
