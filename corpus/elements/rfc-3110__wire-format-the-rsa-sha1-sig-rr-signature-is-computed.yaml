kind: wire-format
summary: 'The RSA/SHA1 SIG RR signature is computed as: hash = SHA1(data); signature = (01 | FF* | 00 | prefix | hash) ** e (mod n), where prefix is the ASN.1 BER SHA1 algorithm designator hex 30 21 30 09 06 05 2B 0E 03 02 1A 05 00 04 14.'
