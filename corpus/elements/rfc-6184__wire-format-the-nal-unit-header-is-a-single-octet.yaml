document: rfc-6184
kind: wire-format
summary: 'The NAL unit header is a single octet with three fields: F (forbidden_zero_bit, 1 bit), NRI (nal_ref_idc, 2 bits), and Type (nal_unit_type, 5 bits). This octet co-serves as the RTP payload header for all payload structures defined in this memo.'
