document: rfc-792
kind: normative-requirement
summary: If a gateway or host processing a datagram finds a header parameter problem that prevents completing processing, it must discard the datagram. It may notify the source via the Parameter Problem message, but only if the error caused the datagram to be discarded.
section: Parameter Problem Message
rfc2119_level: MUST
topics:
    - ip
