document: rfc-8262
kind: design-rationale
summary: Existing specifications such as RFC 5368 contained examples showing a SIP Content-ID header field referencing a complete message-body without normative language permitting it; many implementors acted on these examples anyway. This document retroactively legalizes and standardizes that de facto behavior.
section: "1.3"
topics:
    - sip
    - realtime
