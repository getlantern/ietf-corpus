document: rfc-6424
kind: security-consideration
summary: The Nil FEC can be used to hide the details of a new outer LSP while still allowing the trace to progress without false negatives; all transit nodes of the hidden tunnel perform minimal validations on received MPLS echo requests. The remote peer address type MUST be set to Unspecified when using Nil FEC for hiding.
section: "5"
topics:
    - mpls
    - security
