document: rfc-6426
kind: security-consideration
summary: Deployments of on-demand CV for transport paths across MPLS administrative boundaries present a risk of unsolicited or spoofed OAM messages. It is RECOMMENDED that Source Identifier TLVs be included in on-demand CV messages in such scenarios, allowing implementations to filter OAM messages from unexpected or unknown sources.
section: "6"
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
