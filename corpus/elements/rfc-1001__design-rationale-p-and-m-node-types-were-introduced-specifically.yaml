document: rfc-1001
kind: design-rationale
summary: P and M node types were introduced specifically to minimize broadcast activity, motivated by the need for internet operation across IP routers (which do not forward broadcasts) and to reduce the burden on non-participating hosts that must otherwise receive and discard every NetBIOS broadcast.
