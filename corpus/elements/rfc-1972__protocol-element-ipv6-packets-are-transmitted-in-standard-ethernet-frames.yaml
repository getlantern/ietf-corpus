document: rfc-1972
kind: protocol-element
summary: IPv6 packets are transmitted in standard Ethernet frames with Ethernet type code 86DD hexadecimal. The data field contains the IPv6 header followed immediately by the payload, and possibly padding octets to meet the minimum Ethernet frame size.
section: Frame Format
