document: rfc-1782
kind: normative-requirement
summary: If the transfer was initiated with a Read Request, the client sends ACK with data block number 0 to confirm the values in the server's OACK. If the client rejects the OACK, it sends ERROR code 8 to terminate the transfer.
section: Negotiation Protocol
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
