document: rfc-8077
kind: normative-requirement
summary: When a PW is first set up, the PEs MUST attempt to negotiate usage of the PW Status TLV by including it in the initial Label Mapping message. If the remote PE does not include it in its Label Mapping response, both PEs revert to the label withdraw method.
section: 6.3.3
rfc2119_level: MUST
topics:
    - mpls
