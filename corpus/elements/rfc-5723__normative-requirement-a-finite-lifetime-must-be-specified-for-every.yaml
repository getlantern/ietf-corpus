document: rfc-5723
kind: normative-requirement
summary: A finite lifetime MUST be specified for every ticket. The ticket lifetime SHOULD be the minimum of the IKE SA lifetime and re-authentication time per RFC 4478. The key protecting the ticket MUST have a lifetime significantly longer than the IKE SA lifetime.
section: "6.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
