document: rfc-5438
kind: normative-requirement
summary: An intermediary MUST remove any information about final recipients of a list if list membership is not disclosed, by removing the <recipient-uri> and/or <original-recipient-uri> elements from the IMDN body before forwarding.
section: "8"
rfc2119_level: MUST
topics:
