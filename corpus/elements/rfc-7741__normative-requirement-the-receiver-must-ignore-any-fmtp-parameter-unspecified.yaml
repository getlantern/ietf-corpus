document: rfc-7741
kind: normative-requirement
summary: The receiver MUST ignore any fmtp parameter unspecified in this memo. If the implementation is willing to receive media, both max-fr and max-fs parameters MUST be provided and MUST NOT be used for any purpose other than signaling receiver capabilities.
section: "6.2"
rfc2119_level: MUST
