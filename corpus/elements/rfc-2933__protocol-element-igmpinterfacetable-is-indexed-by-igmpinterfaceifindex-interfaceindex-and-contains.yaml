document: rfc-2933
kind: protocol-element
summary: igmpInterfaceTable is indexed by igmpInterfaceIfIndex (InterfaceIndex) and contains 15 columnar objects covering query intervals, version, querier address, timers, counters, proxy configuration, robustness, and last-member query interval. Rows are created/destroyed via igmpInterfaceStatus (RowStatus) to enable/disable IGMP on an interface.
section: "4"
topics:
