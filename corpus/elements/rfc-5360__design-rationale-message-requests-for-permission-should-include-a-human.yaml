document: rfc-5360
kind: design-rationale
summary: MESSAGE requests for permission SHOULD include a human-readable body part alongside the XML permission document, so that legacy user agents that do not understand permission documents can still display the request and allow the user to manually click a grant/deny URI.
section: "4.2"
topics:
    - sip
