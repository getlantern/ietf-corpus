document: rfc-7239
kind: normative-requirement
summary: Unless static assignment is necessary, obfuscated identifiers SHOULD be randomly generated for each request. If they must persist across requests, they SHOULD NOT persist longer than client IP addresses.
section: "6.3"
rfc2119_level: SHOULD
topics:
