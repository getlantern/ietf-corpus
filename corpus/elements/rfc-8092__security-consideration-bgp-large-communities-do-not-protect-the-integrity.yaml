document: rfc-8092
kind: security-consideration
summary: BGP Large Communities do not protect the integrity of community values; a BGP speaker can alter Large Community Attribute values in a BGP Update Message. Protecting the integrity of transitive handling falls within the broader scope of securing BGP and is not specifically addressed by this document.
section: "7"
topics:
