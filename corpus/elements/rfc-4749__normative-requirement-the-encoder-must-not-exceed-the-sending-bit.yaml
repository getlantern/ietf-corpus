document: rfc-4749
kind: normative-requirement
summary: The encoder MUST NOT exceed the sending bit rate indicated by the received MBS field. The MBS received is valid until a new MBS is received; a newly received value overrides the previous one.
section: "5.2"
rfc2119_level: MUST NOT
