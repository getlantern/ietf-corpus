summary: 'Link Descriptor TLVs uniquely identify a unidirectional ''half-link'' among parallel links between a node pair. Defined TLVs include: Link Local/Remote Identifiers (258), IPv4 interface address (259), IPv4 neighbor address (260), IPv6 interface address (261), IPv6 neighbor address (262), and Multi-Topology Identifier (263).'
