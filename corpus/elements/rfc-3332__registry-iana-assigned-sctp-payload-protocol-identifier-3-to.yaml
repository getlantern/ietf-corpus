document: rfc-3332
kind: registry
summary: IANA assigned SCTP Payload Protocol Identifier 3 to M3UA (Section 7.1) and registered port number 2905 for M3UA over both SCTP and TCP (Section 7.2). IANA also maintains a registry for M3UA Protocol Extensions covering Message Classes, Message Types per class, and Parameter Tags; values 0x0214–0xffff for Parameter Tags are reserved by the IETF.
