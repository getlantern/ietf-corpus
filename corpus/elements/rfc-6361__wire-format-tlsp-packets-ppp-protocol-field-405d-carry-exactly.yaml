document: rfc-6361
kind: wire-format
summary: TLSP packets (PPP Protocol field 405d) carry exactly one IS-IS Payload (RFC 6325 Section 4.2.3) in the PPP Information field. Point-to-point IS-IS links use only an arbitrary circuit ID and do not use MAC addresses for identification.
