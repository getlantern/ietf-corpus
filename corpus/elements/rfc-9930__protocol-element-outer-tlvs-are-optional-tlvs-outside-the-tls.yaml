document: rfc-9930
kind: protocol-element
summary: Outer TLVs are optional TLVs outside the TLS tunnel, permitted only in the first two TEAP messages (first server-to-peer and first peer-to-server). Inner TLVs are sent exclusively within the TLS tunnel during Phase 2; no Outer TLVs are used in Phase 2.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
