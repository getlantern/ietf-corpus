document: rfc-5949
kind: wire-format
summary: The MN LLA-IID Option (type 42) has a fixed length of 10 octets and carries the 64-bit Interface Identifier used for the mobile node's IPv6 link-local address in the previous access network, enabling the NMAG to preserve the same identifier after handover.
