document: rfc-2272
kind: normative-requirement
summary: When no application has registered for a received contextEngineID/pduType combination, the snmpUnknownPDUHandlers counter is incremented and a Response message containing the snmpUnknownPDUHandlers OID/value pair is sent back to the originator.
section: 4.2.2.1
rfc2119_level: MUST
topics:
