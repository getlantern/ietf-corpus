document: rfc-7513
kind: security-consideration
summary: Each binding anchor MUST have a binding entry limit enforced. Without this limit, a malicious or malfunctioning node could create an unbounded number of binding entries, exhausting the BST and denying service to other clients on the SAVI device.
section: "11.5"
topics:
    - security
    - ip
