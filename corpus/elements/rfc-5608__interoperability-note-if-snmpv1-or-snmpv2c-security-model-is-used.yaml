document: rfc-5608
kind: interoperability-note
summary: If SNMPv1 or SNMPv2c security model is used, securityName comes from the community name per RFC 3584. If USM is selected, securityName is determined using USM. These behaviors may not be expected when using an SNMP secure Transport Model with RADIUS.
