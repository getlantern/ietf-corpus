document: rfc-8590
kind: protocol-element
summary: The <changePoll:who> element identifies who executed the operation for audit purposes. It is a free-form string (1–255 characters of normalizedString) representing an identifier, name, or role; its value scheme is up to server policy and is not intended to drive client-side logic.
section: "2.3"
extracted_by: claude-sonnet-4-6
