document: rfc-2025
kind: normative-requirement
summary: The key-src-bind field in SPKM-REQ MUST be present for SPKM-2 unilateral authentication when the K-ALG in use does not bind the source name to the symmetric key. It holds MD5(src || context_key).
section: 3.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
