document: rfc-4430
kind: security-consideration
summary: Sending unauthenticated errors must be handled carefully to avoid acting as an amplifier in denial-of-service attacks. Implementations SHOULD take precautions when acting on unauthenticated KINK errors or Kerberos error messages. Clock skew error responses SHOULD be cryptographically protected when a service key is available.
section: "10"
topics:
    - ipsec
    - security
