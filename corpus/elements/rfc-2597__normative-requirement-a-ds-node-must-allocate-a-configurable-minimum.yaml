document: rfc-2597
kind: normative-requirement
summary: A DS node MUST allocate a configurable, minimum amount of forwarding resources (buffer space and bandwidth) to each implemented AF class. Each class SHOULD be serviced in a manner to achieve the configured service rate over both small and large time scales.
section: "2"
rfc2119_level: MUST
