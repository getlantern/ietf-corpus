document: rfc-7496
kind: design-rationale
summary: The Priority Policy is intended for use cases such as IPFIX (RFC 7011), where template records are sent reliably while flow records of varying importance (billing, security, monitoring) are sent with differentiated priorities, avoiding send buffer exhaustion by lower-value records.
section: "3.2"
topics:
