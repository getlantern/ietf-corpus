document: rfc-2507
kind: normative-requirement
summary: Header compression SHOULD NOT be used for IPv4 without strong link-level checksums. Damaged frames discarded by the link layer can corrupt context state, leading to persistent incorrect decompression for an entire TCP sending window.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - security
