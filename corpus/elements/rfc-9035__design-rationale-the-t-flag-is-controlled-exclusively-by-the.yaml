document: rfc-9035
kind: design-rationale
summary: The 'T' flag is controlled exclusively by the DODAG Root and propagated unmodified to all nodes via DIO messages, because the DODAG Configuration option design in RFC 6550 already prohibits non-root nodes from modifying it, making the Root the natural and safe control point for network-wide compression activation.
section: "3"
topics:
