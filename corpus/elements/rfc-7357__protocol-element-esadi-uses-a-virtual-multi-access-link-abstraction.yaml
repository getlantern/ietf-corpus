document: rfc-7357
kind: protocol-element
summary: ESADI uses a virtual multi-access link abstraction where all ESADI RBridges for a Data Label appear directly connected. TRILL forwards ESADI packets as ordinary TRILL Data packets; RBridges not implementing or not participating in ESADI for that Data Label transparently tunnel such packets without decapsulating them.
section: "2.1"
topics:
    - routing
