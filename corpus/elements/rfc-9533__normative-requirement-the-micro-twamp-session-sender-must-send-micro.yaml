document: rfc-9533
kind: normative-requirement
summary: The micro TWAMP Session-Sender MUST send micro Session-Sender test packets over the member link associated with the session. When sending, the Sender Micro-session ID MUST carry the sender member link identifier; if the reflector link identifier is known, the Reflector Micro-session ID MUST be set, otherwise it MUST be zero.
section: 4.2.2
rfc2119_level: MUST
topics:
    - measurement
