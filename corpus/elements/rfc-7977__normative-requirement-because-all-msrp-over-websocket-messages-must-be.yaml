document: rfc-7977
kind: normative-requirement
summary: Because all MSRP-over-WebSocket messages MUST be routed via an MSRP WebSocket Server, the MSRP WebSocket Client MUST specify "TCP/TLS/MSRP" protocols in the SDP m-line rather than a new WebSocket-specific SDP transport protocol.
section: 5.2.2
rfc2119_level: MUST
topics:
    - websocket
    - realtime
