document: rfc-2625
kind: interoperability-note
summary: A public loop device MUST NOT use the OPN(fr) signal primitive directly for ARP broadcast; it must send the broadcast sequence to the FL_Port at AL_PA=0x00, which propagates the broadcast through the fabric. This differs from the private loop procedure.
section: "4.6"
topics:
    - ip
