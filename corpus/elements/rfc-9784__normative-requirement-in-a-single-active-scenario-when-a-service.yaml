document: rfc-9784
kind: normative-requirement
summary: In a Single-Active scenario, when a service moves to a newly elected DF PE, that PE MUST trigger a MAC address flush notification towards the associated vES if the multihoming device is a bridge or the multihoming network is an Ethernet bridged network.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
