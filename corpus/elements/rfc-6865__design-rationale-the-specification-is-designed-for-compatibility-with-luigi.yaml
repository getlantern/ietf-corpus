document: rfc-6865
kind: design-rationale
summary: The specification is designed for compatibility with Luigi Rizzo's widely-deployed Reed-Solomon codec, which is already used by many applications for packet-based erasure recovery. The goal was to specify a simple RS scheme compatible with that codec within the FECFRAME context.
section: "1"
