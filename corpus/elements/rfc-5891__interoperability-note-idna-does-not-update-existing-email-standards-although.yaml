document: rfc-5891
kind: interoperability-note
summary: 'IDNA does not update existing email standards: although an email local part may be stored in a domain-name-like format in DNS (e.g., SOA RNAME), IDNA does not enable non-ASCII characters in those local parts, which remain ASCII-only per email standards.'
section: 3.2.2
topics:
    - dns
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
