document: rfc-9355
kind: normative-requirement
summary: When both graceful restart and OSPF BFD strict-mode are deployed together, it is RECOMMENDED that GR timers are set to provide sufficient time to allow for normal BFD session establishment delays, since adjacency formation is delayed until BFD session establishment.
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
    - routing
