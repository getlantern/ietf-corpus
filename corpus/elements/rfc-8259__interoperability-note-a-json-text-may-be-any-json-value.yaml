document: rfc-8259
kind: interoperability-note
summary: A JSON text may be any JSON value, not just an object or array. Implementations that generate only objects or arrays will be accepted by all conforming parsers, maintaining backward compatibility with earlier specifications that restricted the top-level form.
section: "2"
