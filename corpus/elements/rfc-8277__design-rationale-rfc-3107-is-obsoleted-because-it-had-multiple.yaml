document: rfc-8277
kind: design-rationale
summary: 'RFC 3107 is obsoleted because it had multiple interoperability problems: undefined semantics for binding a sequence of labels to a prefix, unclear withdrawal procedures, an unimplemented ''Advertising Multiple Routes to a Destination'' feature, silent treatment of concurrent SAFI-1 and SAFI-4 UPDATEs, and no mention of VPN-IPv4/VPN-IPv6 address families.'
section: "1"
topics:
