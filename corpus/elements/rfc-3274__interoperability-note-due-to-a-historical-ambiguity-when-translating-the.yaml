document: rfc-3274
kind: interoperability-note
summary: Due to a historical ambiguity when translating the 1988 AlgorithmIdentifier syntax to 1997 syntax, some implementations encode ZLIB null parameters as an ASN.1 NULL element while others omit them entirely. Implementations must be prepared to accept both encodings.
section: "2.1"
topics:
    - security
