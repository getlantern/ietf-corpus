document: rfc-2067
kind: protocol-element
summary: Camp-on (I-field bit 24) requests the HIPPI-SC switch to queue the connection rather than reject it when the Destination is busy. With Camp-on, rejection indicates an error; without Camp-on, rejection is ambiguous between a busy Destination and an error condition.
section: "6"
