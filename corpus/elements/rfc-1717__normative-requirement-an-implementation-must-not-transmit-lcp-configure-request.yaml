document: rfc-1717
kind: normative-requirement
summary: An implementation MUST NOT transmit LCP Configure-Request, -Reject, -Ack, -Nak, Terminate-Request, or -Ack packets via the multilink procedure; a receiver of such packets via multilink MUST silently discard them.
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
