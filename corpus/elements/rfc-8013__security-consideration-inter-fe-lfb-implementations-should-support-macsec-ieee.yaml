document: rfc-8013
kind: security-consideration
summary: Inter-FE LFB implementations SHOULD support MACsec (IEEE 802.1AE) to provide message authentication and optional confidentiality for frames exchanged between FEs within the same administrative Ethernet LAN. MACsec can be configured manually via shared keys or automatically via MACsec Key Agreement (MKA) over IEEE 802.1x EAP.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
