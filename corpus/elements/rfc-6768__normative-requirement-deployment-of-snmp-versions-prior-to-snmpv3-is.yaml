document: rfc-6768
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Instead, SNMPv3 with cryptographic security is RECOMMENDED. Implementations SHOULD provide the security features described by the SNMPv3 framework.
section: "7"
rfc2119_level: NOT RECOMMENDED
topics:
