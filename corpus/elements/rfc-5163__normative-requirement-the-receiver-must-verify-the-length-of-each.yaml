document: rfc-5163
kind: normative-requirement
summary: The Receiver MUST verify the Length of each PDU in a PDU-Concat SNDU and MUST ensure that the sum of all PDU lengths equals the Length in the SNDU base header. A Receiver SHOULD discard the whole SNDU on size inconsistency. A Receiver MUST NOT forward a partial PDU whose indicated length exceeds the remaining unprocessed bytes.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
