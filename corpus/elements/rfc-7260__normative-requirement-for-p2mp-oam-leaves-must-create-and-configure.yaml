document: rfc-7260
kind: normative-requirement
summary: For P2MP OAM, leaves MUST create and configure OAM sink functions per the Path message parameters; there is no per-leaf parameter negotiation. If a leaf cannot accept the OAM parameters, it MUST use the RRO Attributes sub-object to notify the root.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
