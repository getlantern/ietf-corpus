document: rfc-1284
kind: interoperability-note
summary: dot3StatsOutOfRangeLengthFields (dot3StatsEntry 15) counts frames where the length field exceeds the maximum allowed LLC data size. This counter is NOT incremented in implementations that observe Ethernet encapsulation conventions, where the IEEE 802.3 length field is interpreted as the Ethernet Type field.
section: "5.2"
topics:
    - snmp
