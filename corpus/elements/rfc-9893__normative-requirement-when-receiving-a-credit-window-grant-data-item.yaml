document: rfc-9893
kind: normative-requirement
summary: When receiving a Credit Window Grant Data Item, the router MUST identify the credit window indicated by the FID and MUST increase the credit window size by the value in the Additional Credits field. If overflow results, the credit window is set to its maximum.
section: 2.3.3
rfc2119_level: MUST
topics:
    - qos
    - congestion
