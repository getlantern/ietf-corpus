document: rfc-6075
kind: wire-format
summary: The ABNF defines 'vendor-name' as a 'vendor-token' optionally followed by dot-separated 'name-component' segments. The 'iana-vendor-tag' production restricts registrations to 1*(ALPHA / DIGIT / SP / "-"), while 'possible-vendor-tag' allows arbitrary UTF-8 multi-byte sequences (UTF8-2, UTF8-3, UTF8-4) and most ASCII except '.', '/', '%', and '*'.
section: "3.2"
topics:
    - registry
