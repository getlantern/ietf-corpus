document: rfc-3145
kind: normative-requirement
summary: For LCP errors (Disconnect Codes 5–12), the Control Protocol Number MUST be set to C021 hexadecimal (LCP). These codes cover FSM timeout, no LCP packets received, magic number error, echo request timeout, and MP bundle negotiation failures.
section: "3.2"
rfc2119_level: MUST
