document: rfc-3185
kind: normative-requirement
summary: In PBKDF2-based key derivation, the salt MUST use the 'specified' element of the CHOICE (an explicit OCTET STRING), and the prf field MUST be omitted so that the default algid-hmacWithSHA1 is used.
