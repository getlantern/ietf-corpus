document: rfc-3547
kind: wire-format
summary: The Sequence Number Payload (SEQ) contains a 4-octet monotonically increasing counter initialized to zero by the GCKS; the first GROUPKEY-PUSH has sequence number 1, and receivers MUST maintain a sliding window per RFC 2406 Section 3.4.3.
section: "5.6"
