document: rfc-9853
kind: privacy-consideration
summary: DTLS 1.2 does not support CID refresh during session lifetime, so deployments in multihoming environments SHOULD refuse CIDs with DTLS 1.2 and upgrade to DTLS 1.3 when CID correlation privacy is a concern.
