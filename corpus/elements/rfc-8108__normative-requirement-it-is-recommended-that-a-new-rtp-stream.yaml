document: rfc-8108
kind: normative-requirement
summary: It is RECOMMENDED that a new RTP stream reuse the endpoint's existing SSRC if the endpoint had previously been receive-only, since creating a new SSRC unnecessarily increases the participant count, leading to longer RTCP intervals.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
