document: rfc-5661
kind: normative-requirement
summary: To establish a client ID, the client MUST perform an EXCHANGE_ID operation followed by CREATE_SESSION using the returned eir_clientid. This sequence also immediately releases locking state from any previous incarnation of the same client.
section: "2.4"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
