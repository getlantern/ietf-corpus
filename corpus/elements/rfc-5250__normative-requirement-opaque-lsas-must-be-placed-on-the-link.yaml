document: rfc-5250
kind: normative-requirement
summary: Opaque LSAs MUST be placed on the link-state retransmission lists of opaque-capable neighbors and MUST NOT be placed on the retransmission lists of non-opaque-capable neighbors. When sending Link State Update packets as multicasts, a non-opaque-capable neighbor may inadvertently receive Opaque LSAs but will discard them.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
