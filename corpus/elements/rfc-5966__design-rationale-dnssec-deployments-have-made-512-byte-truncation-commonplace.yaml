document: rfc-5966
kind: design-rationale
summary: DNSSEC deployments have made 512-byte truncation commonplace; for example, NXDOMAIN responses from NSEC3-signed zones are almost invariably larger than 512 bytes. This is the primary technical driver for mandating TCP support.
section: "3"
topics:
