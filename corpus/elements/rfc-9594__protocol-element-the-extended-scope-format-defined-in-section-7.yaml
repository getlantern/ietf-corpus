document: rfc-9594
kind: protocol-element
summary: The extended scope format defined in Section 7 wraps the actual scope with an explicit semantic tag, enabling a KDC that implements multiple application profiles (with different scope semantics) or additional services to correctly parse the access token's scope claim. The AS SHOULD use this format when aware that the RS needs to disambiguate scope semantics.
section: "7"
topics:
    - security
    - oauth
    - cbor
