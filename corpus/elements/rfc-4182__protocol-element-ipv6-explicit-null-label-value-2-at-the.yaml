document: rfc-4182
kind: protocol-element
summary: IPv6 Explicit NULL (label value 2) at the top of the label stack signals that the stack must be popped. If other labels remain, the packet is forwarded based on the label that rises to the top; if the stack is now empty, the packet is forwarded as IPv6.
