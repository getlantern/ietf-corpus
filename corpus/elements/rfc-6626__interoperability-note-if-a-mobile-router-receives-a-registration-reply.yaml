document: rfc-6626
kind: interoperability-note
summary: If a Mobile Router receives a registration reply with a network acknowledgement extension Code set to 1 ('invalid prefix') in response to a zero-Prefix request, this may be used as a hint that the home agent does not support dynamic prefix allocation.
