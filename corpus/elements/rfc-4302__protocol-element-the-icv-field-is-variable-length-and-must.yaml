document: rfc-4302
kind: protocol-element
summary: The ICV field is variable-length and must be an integral multiple of 32 bits (IPv4 or IPv6). It may include explicit padding to satisfy IPv4 (32-bit) or IPv6 (64-bit) alignment requirements. The integrity algorithm specification MUST define the ICV length and comparison rules.
section: "2.6"
topics:
    - ipsec
    - security
    - crypto
