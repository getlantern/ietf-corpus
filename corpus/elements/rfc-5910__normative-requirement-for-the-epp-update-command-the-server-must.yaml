document: rfc-5910
kind: normative-requirement
summary: For the EPP <update> command, the server MUST process <secDNS:rem> elements prior to <secDNS:add> elements. At least one <secDNS:add>, <secDNS:rem>, or <secDNS:chg> element MUST be provided in the <secDNS:update> element.
section: 5.2.5
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
