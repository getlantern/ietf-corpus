document: rfc-9031
kind: protocol-element
summary: 'The Short_Identifier object is a CBOR array containing: identifier (required byte string, exactly 2 bytes for IEEE 802.15.4 TSCH) and lease_time (optional uint in hours). The pledge MUST stop using the identifier after lease expiry and SHOULD initiate a new join exchange.'
