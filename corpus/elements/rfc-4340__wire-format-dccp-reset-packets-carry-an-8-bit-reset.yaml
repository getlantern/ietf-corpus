document: rfc-4340
kind: wire-format
summary: DCCP-Reset packets carry an 8-bit Reset Code, three 8-bit Data fields (Data 1–3 whose meaning depends on the code), and an optional UTF-8 Error Text in the application data area. Reset Code 1 = Closed (normal); codes 12–127 are reserved; codes 128–255 are CCID-specific.
section: "5.6"
