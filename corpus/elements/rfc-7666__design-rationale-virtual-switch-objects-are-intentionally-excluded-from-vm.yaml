document: rfc-7666
kind: design-rationale
summary: Virtual switch objects are intentionally excluded from VM-MIB because virtual NICs are the lowest-level network abstraction allocated to a VM. IEEE 802.1 bridge MIBs (IEEE8021-BRIDGE-MIB, IEEE8021-Q-BRIDGE-MIB) cover virtual switch management instead.
