document: rfc-6420
kind: security-consideration
summary: The security of the PIM MT-ID Join Attribute is only as strong as the security of the PIM packet carrying it; no independent authentication is provided. Malicious alteration of the PIM MT-ID Hello Option or the MT-ID value in a packet could cause PIM resiliency goals to be violated, so the security considerations of RFC 4601 and RFC 5384 apply.
section: "7"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
