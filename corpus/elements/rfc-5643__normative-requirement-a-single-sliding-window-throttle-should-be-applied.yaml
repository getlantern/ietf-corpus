document: rfc-5643
kind: normative-requirement
summary: A single sliding-window throttle should be applied to all OSPFv3 notification types except ospfv3LsdbOverflow and ospfv3LsdbApproachingOverflow, which should not be throttled. Recommended values are 7 notifications within a 10-second window.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
