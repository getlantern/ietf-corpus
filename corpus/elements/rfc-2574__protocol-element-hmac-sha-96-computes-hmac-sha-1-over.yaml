document: rfc-2574
kind: protocol-element
summary: HMAC-SHA-96 computes HMAC-SHA-1 over the entire message with msgAuthenticationParameters zeroed (replaced by 12 zero octets), then truncates the 160-bit digest to the leftmost 96 bits (12 octets) as the authentication parameter. The authKey is exactly 20 octets.
section: 7.1.1
