document: rfc-5115
kind: protocol-element
summary: The ResourcePriority TRIP attribute (Type Code 12) associates one or more SIP Resource-Priority NameSpace tokens with a gateway, advertising which prioritized telephony services (e.g., GETS, GTPS) are reachable through that gateway. It is set to Not Well-Known and Independent Transitive.
