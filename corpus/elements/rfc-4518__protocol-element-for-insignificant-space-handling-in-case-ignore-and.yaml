document: rfc-4518
kind: protocol-element
summary: 'For insignificant space handling in case ignore and exact string matching, a space is defined as SPACE (U+0020) followed by no combining marks. For attribute or non-substring assertion values: if no non-space characters, output is exactly two SPACEs; otherwise the string starts and ends with exactly one SPACE and any inner sequence of spaces is replaced with exactly two SPACEs.'
section: 2.6.1
topics:
    - ldap
