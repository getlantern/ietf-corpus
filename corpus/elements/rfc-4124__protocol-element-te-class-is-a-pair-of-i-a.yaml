document: rfc-4124
kind: protocol-element
summary: TE-Class is a pair of (i) a Class-Type and (ii) a preemption priority allowed for that Class-Type. An LSP transporting a Traffic Trunk from that Class-Type can use that preemption priority as the setup priority, the holding priority, or both.
section: "3"
