document: rfc-2404
kind: security-consideration
summary: For a 64-byte block hash such as HMAC-SHA-1-96, a birthday attack would require successfully processing 2**80 blocks, which is infeasible unless the underlying hash had collisions after processing only 2**30 blocks.
