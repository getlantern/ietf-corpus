document: rfc-6391
kind: normative-requirement
summary: At the egress PE, if a flow LSE is present it MUST be checked to determine whether it carries a reserved label. If it is a reserved label the packet is processed according to that label's rules; otherwise the flow LSE is discarded without further processing.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
