document: rfc-7083
kind: security-consideration
summary: A malicious DHCPv6 server could set SOL_MAX_RT and INF_MAX_RT to unreasonably high values, causing undue delays in a client completing its DHCPv6 transaction when no other valid response is received. If a valid server also responds, large override values have no effect.
section: "10"
topics:
