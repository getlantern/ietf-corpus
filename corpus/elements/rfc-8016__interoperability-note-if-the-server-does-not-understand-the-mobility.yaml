document: rfc-8016
kind: interoperability-note
summary: If the server does not understand the MOBILITY-TICKET attribute (per RFC 5389 comprehension-optional rules), it ignores the attribute and processes the Allocate request normally without providing a ticket, allowing backward compatibility with non-mobility-aware TURN servers.
section: 3.1.2
topics:
    - nat
