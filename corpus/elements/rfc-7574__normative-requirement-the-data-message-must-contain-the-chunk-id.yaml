document: rfc-7574
kind: normative-requirement
summary: The DATA message MUST contain the chunk ID of the chunk and the chunk itself. Because PPSPP currently uses LEDBAT (RFC 6817) for congestion control, the current system time MUST be included in every DATA message.
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
    - congestion
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
