document: rfc-3075
kind: normative-requirement
summary: If the data object is an octet stream and the next Transform requires a node-set, the application MUST attempt to parse the octets. If the data object is a node-set and the next Transform requires octets, the application MUST convert using the REQUIRED Canonical XML algorithm.
section: 4.3.3.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
