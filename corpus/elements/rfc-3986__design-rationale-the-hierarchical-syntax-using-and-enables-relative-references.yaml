document: rfc-3986
kind: design-rationale
summary: The hierarchical syntax using "/", "?", and "#" enables relative references, allowing document trees to be portable across schemes and server locations. New URI scheme designers should use generic hierarchical syntax unless there are compelling reasons to forbid relative referencing within that scheme.
section: 1.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
