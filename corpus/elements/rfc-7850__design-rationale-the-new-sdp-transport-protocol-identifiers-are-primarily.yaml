document: rfc-7850
kind: design-rationale
summary: The new SDP transport protocol identifiers are primarily intended for use by the SDP offer/answer model (RFC3264) to negotiate and establish RTP-based media over TCP. The existing protocol identifier set lacked entries for the combination of TCP transport with the various RTP security and feedback profiles, motivating these registrations.
section: "1"
topics:
