document: rfc-4702
kind: design-rationale
summary: The RCODE1 and RCODE2 fields are retained despite being deprecated because the option is already in wide use. They were originally defined to convey DNS update response codes but became inadequate after EDNS0 extended RCODE to 12 bits.
section: "2.2"
