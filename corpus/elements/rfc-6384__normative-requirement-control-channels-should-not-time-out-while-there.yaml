document: rfc-6384
kind: normative-requirement
summary: Control channels SHOULD NOT time out while there is an active data channel. A timeout of at least 30 seconds is RECOMMENDED for data channel mappings created by the FTP ALG that are waiting for initial packets.
section: "12"
rfc2119_level: RECOMMENDED
