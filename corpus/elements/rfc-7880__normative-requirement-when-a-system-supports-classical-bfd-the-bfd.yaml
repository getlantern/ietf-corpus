document: rfc-7880
kind: normative-requirement
summary: When a system supports classical BFD, the BFD Discriminator pool SHOULD be shared by SBFDInitiator sessions and classical BFD sessions. The S-BFD Discriminator pool for SBFDReflector sessions SHOULD be a separate pool to avoid collisions with derived discriminator values.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - realtime
