document: rfc-5905
kind: security-consideration
summary: The symmetric key MD5 authentication scheme carried over from NTPv3 provides data origin authentication but does not prevent all forms of timing attack. The Autokey public key authentication scheme new to NTPv4 provides stronger security and is described separately in RFC 5906.
section: "15"
topics:
    - ntp
    - security
    - crypto
