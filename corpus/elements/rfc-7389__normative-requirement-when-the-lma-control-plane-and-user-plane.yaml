document: rfc-7389
kind: normative-requirement
summary: When the LMA control-plane and user-plane functions are on separate IP nodes, the user-plane anchor requirements from RFC 5213 Section 5.6.2 and RFC 5844 Section 3.1.3 MUST be met by the node hosting the LMA user-plane function; that node must be a topological anchor point for the mobile node's IP address/prefixes.
section: "1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
