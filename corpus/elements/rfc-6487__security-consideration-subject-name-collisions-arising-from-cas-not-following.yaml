document: rfc-6487
kind: security-consideration
summary: Subject name collisions arising from CAs not following entropy guidelines for name generation, combined with an RP using a non-conformant path construction implementation, may cause an RP to conclude that a valid certificate has been revoked. A resource certificate PKI cannot resolve ambiguity when two or more valid certificates encompass the same resource.
section: "10"
topics:
    - pkix
    - security
