document: rfc-9198
kind: protocol-element
summary: A Cooperating Node responds to direct queries for its Node identity as part of a previously established interrogation protocol (such as IOAM per RFC 9197). Cooperating Nodes SHOULD provide arrival/departure interface identification, arrival timestamp, and relevant link information.
