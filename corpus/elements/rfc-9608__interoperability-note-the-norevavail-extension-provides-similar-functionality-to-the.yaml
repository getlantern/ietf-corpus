document: rfc-9608
kind: interoperability-note
summary: The noRevAvail extension provides similar functionality to the ocsp-nocheck extension (RFC 6960), but ocsp-nocheck is appropriate only for OCSP responder certificates while noRevAvail is appropriate for any end-entity certificate. The noRevAvail extension could be included alongside ocsp-nocheck in OCSP responder certificates but should not be considered a substitute.
section: "1"
topics:
