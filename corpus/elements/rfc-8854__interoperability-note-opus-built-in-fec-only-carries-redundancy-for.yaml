document: rfc-8854
kind: interoperability-note
summary: Opus built-in FEC only carries redundancy for the immediately preceding audio frame; on wireless networks with multiple consecutive losses, multi-packet protection via redundant encoding with reduced-bitrate Opus SHOULD be used instead.
section: "3.3"
