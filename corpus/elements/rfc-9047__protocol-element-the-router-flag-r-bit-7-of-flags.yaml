document: rfc-9047
kind: protocol-element
summary: The Router flag (R, bit 7 of Flags) indicates whether the IPv6->MAC pair advertised belongs to an IPv6 router (R=1) or a host (R=0). This flag is used by the receiving PE to set the Router flag in Neighbor Advertisement messages for the associated IPv6 address.
section: "2"
