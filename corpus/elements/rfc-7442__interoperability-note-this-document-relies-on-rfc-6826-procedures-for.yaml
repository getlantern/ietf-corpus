document: rfc-7442
kind: interoperability-note
summary: This document relies on RFC 6826 procedures for source (S,G) trees over mLDP. The Mechanism 2 in-band signaling for shared (*,G) trees follows the same procedures as RFC 6826 source trees, but uses Transit Shared Tree TLVs carrying (RP, G) instead of Transit Source TLVs carrying (S, G).
