document: rfc-9436
kind: wire-format
summary: 'The PIM common header is a 32-bit structure with four fields: PIM Ver (4 bits), Type (4 bits), Flag Bits (8 bits, formerly Reserved), and Checksum (16 bits). This document renames the Reserved field to ''Flag Bits field'' and defines its per-message-type usage.'
