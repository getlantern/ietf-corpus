document: rfc-5552
kind: protocol-element
summary: 'The SIP Request-URI for VoiceXML media services MUST use the fixed user part ''dialog''. Seven URI parameters are defined: voicexml (URI of initial VoiceXML document), maxage, maxstale, method (get/post), postbody, ccxml (JSON value), and aai (JSON value). Parameters in re-INVITEs are ignored.'
section: "2.1"
topics:
    - sip
    - voip
    - realtime
