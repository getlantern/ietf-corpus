document: rfc-8767
kind: normative-requirement
summary: When returning a response containing stale records, a recursive resolver MUST set the TTL of each expired record in the message to a value greater than 0, with a RECOMMENDED value of 30 seconds.
section: "4"
rfc2119_level: MUST
topics:
