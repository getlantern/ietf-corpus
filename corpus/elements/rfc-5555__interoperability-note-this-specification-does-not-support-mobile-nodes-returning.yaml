document: rfc-5555
kind: interoperability-note
summary: This specification does not support mobile nodes returning home while using IPv4; IPv4 support is defined only for mobile nodes located in a visited network. Movement detection in IPv4-only networks SHOULD use RFC 4436 (DNAv4) since IPv6-specific Neighbor Discovery triggers are unavailable.
section: 4.4.4
topics:
    - mobility
    - ip
    - v6ops
