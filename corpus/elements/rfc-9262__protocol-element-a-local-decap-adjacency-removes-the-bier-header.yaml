document: rfc-9262
kind: protocol-element
summary: A local_decap() adjacency removes the BIER header and passes the payload to the next-protocol handler (IP, IPv6, Ethernet, etc.) within the BFR, making the BFR act as a BFER for matching packets. An optional VRF parameter scopes the payload delivery.
section: 4.2.4
topics:
    - routing
