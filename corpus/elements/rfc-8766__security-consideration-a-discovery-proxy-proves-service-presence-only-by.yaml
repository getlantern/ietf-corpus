document: rfc-8766
kind: security-consideration
summary: A Discovery Proxy proves service presence only by the ability to answer link-local multicast queries on a link, providing no strong authentication. If stronger security is required, authenticated secure DNS Update (RFC 2136, RFC 3007) should be used instead.
section: "9.1"
topics:
    - security
    - dns
    - zeroconf
