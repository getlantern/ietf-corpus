document: rfc-5225
kind: registry
summary: 'This document registers six ROHCv2 profile identifiers with IANA under the ROHC Profile Identifiers registry: 0x0101 (RTP/UDP/IP), 0x0102 (UDP/IP), 0x0103 (ESP/IP), 0x0104 (IP), 0x0107 (RTP/UDP-Lite/IP), and 0x0108 (UDP-Lite/IP). These supersede the corresponding RFC 3095, RFC 3843, and RFC 4019 profile definitions.'
