document: rfc-2327
kind: normative-requirement
summary: All applications MUST be able to cope with receiving both FQDN and dotted-decimal IP address formats in connection fields. For unicast streams through a NAT, use of FQDN rather than a unicast IP address is RECOMMENDED. The slash notation for multiple addresses is illegal for IP unicast addresses.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
    - ip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
