document: rfc-3920
kind: protocol-element
summary: 'Seven SASL error conditions are defined: <aborted/>, <incorrect-encoding/>, <invalid-authzid/>, <invalid-mechanism/>, <mechanism-too-weak/>, <not-authorized/>, and <temporary-auth-failure/>, all qualified by ''urn:ietf:params:xml:ns:xmpp-sasl''. On abort or failure the server SHOULD allow at least 2 retries before terminating the TCP connection.'
section: "6.4"
topics:
    - security
