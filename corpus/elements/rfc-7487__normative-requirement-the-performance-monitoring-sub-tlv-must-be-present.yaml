document: rfc-7487
kind: normative-requirement
summary: The Performance Monitoring Sub-TLV MUST be present in the MPLS OAM Configuration Sub-TLV whenever any of the PM/Loss, PM/Delay, or PM/Throughput flags are set; failure to include the correct sub-TLVs MUST result in an 'OAM Problem/Configuration Error'.
section: "3.4"
rfc2119_level: MUST
topics:
