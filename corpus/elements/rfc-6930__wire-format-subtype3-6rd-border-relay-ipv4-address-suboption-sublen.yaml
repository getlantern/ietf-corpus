document: rfc-6930
kind: wire-format
summary: SubType3 (6rd Border Relay IPv4 address suboption, SubLen=6 per instance) carries one or more 4-octet IPv4 addresses of 6rd Border Relays; the maximum RADIUS attribute length of 255 octets limits this to 37 IPv4 addresses. Multiple SubType3 sub-attributes are RECOMMENDED to be placed together.
section: "4.1"
topics:
