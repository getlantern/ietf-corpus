document: rfc-5546
kind: protocol-element
summary: 'Scheduling state has two dimensions: the overall iCalendar object state controlled by the Organizer via the STATUS property, and per-Attendee state tracked by the PARTSTAT parameter on each ATTENDEE property. When an Organizer issues the initial object, Attendees are set to NEEDS-ACTION; each Attendee modifies PARTSTAT (e.g., ACCEPTED, DECLINED, TENTATIVE, DELEGATED) via a REPLY.'
section: 2.1.1
topics:
    - email
