document: rfc-2728
kind: wire-format
summary: The schema field occupies 1 byte at the start of every framed packet; if the most significant bit is '1', the schema field extends to 2 bytes, providing 32768 additional schema values. Schema 0x00 (UDP/IP with optional header compression) is the only schema defined by this document.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
