document: rfc-7771
kind: protocol-element
summary: The redundant MS-PW protection model provides N:1 protection against S-PE failure for the path between T-PE1 and T-PE2 using multiple MS-PWs switched at different S-PEs (S-PE1, S-PE2, S-PE3). Only one MS-PW is active at a time; the others serve as protection paths.
section: "2"
topics:
