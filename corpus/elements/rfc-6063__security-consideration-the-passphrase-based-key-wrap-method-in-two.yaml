document: rfc-6063
kind: security-consideration
summary: The Passphrase-Based Key Wrap method in two-pass DSKPP SHOULD only be used when the device has a built-in keypad for direct passphrase entry, to preserve the property that K_TOKEN is exposed only to the server and the cryptographic module and not to any intermediate party.
section: 10.6.5
topics:
    - security
    - crypto
