document: rfc-5913
kind: normative-requirement
summary: A trust anchor, CA PKC, or AA PKC MUST include either zero or one instance of the Authority Clearance Constraints certificate extension. The sequence MUST NOT include more than one entry with the same policyId; if duplicates exist, the certification path is rejected.
section: "3"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
