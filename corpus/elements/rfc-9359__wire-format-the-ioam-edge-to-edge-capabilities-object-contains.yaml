document: rfc-9359
kind: wire-format
summary: 'The IOAM Edge-to-Edge Capabilities Object contains: 16-bit Namespace-ID, 16-bit IOAM-E2E-Type, 2-bit TSF (TimeStamp Format: 0b00=PTP truncated, 0b01=NTP 64-bit, 0b10=POSIX-based, 0b11=reserved), and 30-bit Reserved. Its presence indicates E2E function is enabled at the IOAM decapsulating node.'
