document: rfc-4759
kind: protocol-element
summary: The "enumdi" parameter is defined for the "tel" URI to indicate that an ENUM query has already been performed on the E.164 number. Its presence asserts that a previous VoIP network element has already queried ENUM in e164.arpa for that number.
