document: rfc-9768
kind: protocol-element
summary: The Accurate ECN (ACE) field is a 3-bit field formed by overloading the AE (bit 7), CWR (bit 8), and ECE (bit 9) flags in the TCP header once AccECN is negotiated. On non-SYN packets it carries the 3 LSBs of the CE packet counter r.cep from the Data Receiver.
section: 3.2.2
topics:
