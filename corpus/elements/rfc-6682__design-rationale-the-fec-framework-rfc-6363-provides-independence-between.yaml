document: rfc-6682
kind: design-rationale
summary: The FEC Framework (RFC 6363) provides independence between application protocols and FEC codes via FEC Schemes. This allows the Raptor RTP payload format to work with any of the six FEC Schemes defined in RFC 6681 without modification.
