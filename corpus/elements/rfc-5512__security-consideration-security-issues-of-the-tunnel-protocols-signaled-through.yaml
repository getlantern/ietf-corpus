document: rfc-5512
kind: security-consideration
summary: Security issues of the tunnel protocols signaled through Encapsulation SAFI are inherited from those protocols. If a third party can modify encapsulation headers, tunnel type selection, or tunnel-to-payload-type mappings, user data packets may be misrouted, misdelivered, or dropped.
