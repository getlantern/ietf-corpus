document: rfc-4915
kind: protocol-element
summary: The DefaultExclusionCapability is a new configurable parameter in the Area Data Structure. When enabled, all routers in the area must have this capability before a link can be excluded from the default topology. It is disabled by default when an area data structure is created.
section: "4.2"
topics:
    - routing
