document: rfc-8048
kind: protocol-element
summary: 'For SIP-to-XMPP presence authorization, the SIP-to-XMPP gateway translates a SIP SUBSCRIBE into an XMPP <presence/> stanza of type ''subscribe''. If the XMPP user approves, the gateway sends a SIP NOTIFY with Subscription-State: active; if rejected, the gateway sends a NOTIFY with Subscription-State: terminated;reason=rejected.'
section: 5.3.1
topics:
    - sip
    - realtime
