document: rfc-3965
kind: protocol-element
summary: An offramp gateway connects from Internet mail to T.4/GSTN facsimile. An onramp connects from T.4/GSTN facsimile to Internet mail. Onramp behavior is out of scope; only offramp addressing, confirmation, and failure notification are specified.
