document: rfc-2328
kind: protocol-element
summary: The Designated Router (DR) is elected on each broadcast and NBMA network with at least two attached routers. The DR generates a Network-LSA for the network and reduces the number of required adjacencies, cutting routing traffic and link-state database size.
section: "7.3"
