document: rfc-6047
kind: normative-requirement
summary: The relevant Organizer or Attendee address MUST be ascertained by opening the 'text/calendar' MIME body part and examining the ATTENDEE and ORGANIZER properties; it cannot be reliably inferred from RFC 5322 Sender or Reply-To header fields.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
