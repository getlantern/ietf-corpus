document: rfc-5357
kind: normative-requirement
summary: The Server MAY discontinue any established control connection when no packet has been received within SERVWAIT seconds. The default value of SERVWAIT SHALL be 900 seconds and MAY be configurable. The Server SHALL suspend monitoring after receiving Start-Sessions and SHALL resume after Stop-Sessions.
section: "3.1"
rfc2119_level: SHALL
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
