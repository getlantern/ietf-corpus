document: rfc-8006
kind: protocol-element
summary: The Auth object is an extensible wrapper for authentication/authorization methods, carrying auth-type (CDNI Payload Type) and auth-value (typed object). No auth methods are defined in this document; they are specified separately (e.g., URI Signing).
