document: rfc-8450
kind: design-rationale
summary: Expected data rates for VC-2 RTP sessions are likely in the gigabits-per-second range. On a correctly provisioned closed network this is manageable, but there is always risk of data leaking onto the open internet, making congestion control compliance especially important.
