document: rfc-1158
kind: interoperability-note
summary: MIB-II is entirely upward-compatible with MIB-I (RFC 1156). Deprecated objects—atTable and the entire Address Translation group—carry mandatory status and must still be supported by MIB-II agents; they will likely be excluded from MIB-III. Management stations must be prepared to receive rows for entries marked invalid or not currently in use.
section: "3.1"
topics:
