document: rfc-6407
kind: protocol-element
summary: 'The GROUPKEY-PUSH is a single-message rekey datagram initiated by the GCKS (typically via IP multicast): HDR*, SEQ, [D,] SA, KD, SIG. Payloads after the HDR are encrypted with the current KEK; the SIG payload authenticates the unencrypted content before encryption.'
section: "4"
topics:
