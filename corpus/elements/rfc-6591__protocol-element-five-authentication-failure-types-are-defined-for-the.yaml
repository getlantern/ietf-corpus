summary: 'Five authentication failure types are defined for the Auth-Failure field: ''adsp'' (ADSP signing practice violation), ''bodyhash'' (body hash mismatch), ''revoked'' (DKIM key revoked), ''signature'' (DKIM signature verification failure), and ''spf'' (SPF result of none/fail/softfail/temperror/permerror).'
