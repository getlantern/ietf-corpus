document: rfc-1771
kind: normative-requirement
summary: If NEXT_HOP is semantically incorrect on an external link (not on a common subnet with the local speaker, or equals the receiving speaker's own address), the error SHOULD be logged and the route silently ignored; no NOTIFICATION message should be sent.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
