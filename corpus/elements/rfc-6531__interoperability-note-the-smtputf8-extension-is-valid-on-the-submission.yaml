document: rfc-6531
kind: interoperability-note
summary: The SMTPUTF8 extension is valid on the submission port (RFC 6409) and may also be used with LMTP (RFC 2033). When used, the WITH clause in trace fields MUST use the appropriate UTF8SMTP/UTF8LMTP protocol type values.
section: "3.1"
