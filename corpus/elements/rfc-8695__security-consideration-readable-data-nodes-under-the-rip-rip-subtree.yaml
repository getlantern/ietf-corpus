document: rfc-8695
kind: security-consideration
summary: Readable data nodes under the rip:rip subtree are also sensitive; unauthorized read access can disclose the operational state of RIP on the device. The 'clear-rip-route' RPC is additionally sensitive as unauthorized invocation can disrupt routing on the local device and the network.
section: "6"
topics:
