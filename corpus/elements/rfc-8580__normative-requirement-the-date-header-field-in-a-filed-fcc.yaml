document: rfc-8580
kind: normative-requirement
summary: The Date header field in a filed FCC message is REQUIRED and SHOULD be set to the date and time when the message was generated. The From header field is also REQUIRED and SHOULD be set to the email address of the owner of the Sieve script.
section: "4"
rfc2119_level: REQUIRED
topics:
    - email
