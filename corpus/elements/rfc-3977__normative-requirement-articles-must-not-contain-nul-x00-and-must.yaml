document: rfc-3977
kind: normative-requirement
summary: Articles MUST NOT contain NUL (%x00) and MUST NOT contain bare LF or CR outside CRLF pairs. Each article MUST have a unique message-id. Two articles offered by a server MUST NOT share the same message-id.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
