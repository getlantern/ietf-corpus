document: rfc-5046
kind: protocol-element
summary: The RDMAExtensions key (Section 6.3) is a session-wide, leading-only boolean key negotiated during LoginOperationalNegotiation with a default of No and AND result function. Both initiator and target must offer it in the first permissible Login PDU of the leading connection's LoginOperationalNegotiation stage.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
