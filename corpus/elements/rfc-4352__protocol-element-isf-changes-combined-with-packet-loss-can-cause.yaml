document: rfc-4352
kind: protocol-element
summary: ISF changes combined with packet loss can cause concealment with the wrong frame length, leading to frame boundary misalignment. Section 4.5.1 specifies an algorithm to recover timestamps of lost frames by enumerating plausible ISF transition points using TFI modular arithmetic, falling back to codec reset if more than one ISF change occurred during the loss.
section: 4.5.1
topics:
    - rtp
    - realtime
