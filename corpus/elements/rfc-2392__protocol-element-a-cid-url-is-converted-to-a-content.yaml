document: rfc-2392
kind: protocol-element
summary: 'A ''cid'' URL is converted to a Content-ID message header by removing the ''cid:'' prefix, decoding %hh-encoded characters to their US-ASCII equivalents, and enclosing the result in angle brackets. For example, ''cid:foo4%25foo1@bar.net'' corresponds to Content-ID: <foo4%25foo1@bar.net>.'
section: "2"
topics:
