document: rfc-1697
kind: state-machine
summary: 'rdbmsRelState defines five states for a server''s access to a database: other(1), active(2) — server is actively using the DB, available(3) — server could use it if needed, restricted(4) — administratively limited availability, unavailable(5) — DB not accessible through this server. The rdbmsStateChange trap fires when the state transitions to a less accessible value.'
section: "4"
extracted_by: claude-sonnet-4-6
