document: rfc-4069
kind: protocol-element
summary: 'The VDSL-LINE-EXT-SCM-MIB defines the vdslSCMGroup containing two tables: vdslLineSCMConfProfileBandTable (transmit band configuration profiles) and vdslLineSCMPhysBandTable (current physical band parameters). This MIB is an optional extension to VDSL-LINE-MIB (RFC 3728) covering line code specific PMD layer objects for SCM VDSL lines.'
section: "2.3"
