document: rfc-5363
kind: normative-requirement
summary: URI-list services MUST NOT perform any request explosion for an unauthorized user. URI-list services MUST authenticate users and check whether they are authorized to request the service before performing any request fan-out.
section: "5.2"
rfc2119_level: MUST NOT
