document: rfc-9779
kind: normative-requirement
summary: The querier MUST only insert one Return Path TLV in a query message. The responder that supports this TLV MUST process only the first Return Path TLV, send the response on the specified return path, and MUST NOT add a Return Path TLV in the response message.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
