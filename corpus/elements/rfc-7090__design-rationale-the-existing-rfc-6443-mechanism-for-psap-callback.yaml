document: rfc-7090
kind: design-rationale
summary: The existing RFC 6443 mechanism for PSAP callback detection—comparing the PSAP domain from the outbound call to the domain of an incoming callback—fails in scenarios like routing asymmetry, multi-stage routing, call forwarding, and network-based URN resolution, motivating the new explicit 'psap-callback' header value.
section: "1"
topics:
