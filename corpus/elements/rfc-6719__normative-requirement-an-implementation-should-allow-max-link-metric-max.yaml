document: rfc-6719
kind: normative-requirement
summary: An implementation SHOULD allow MAX_LINK_METRIC, MAX_PATH_COST, PARENT_SWITCH_THRESHOLD, PARENT_SET_SIZE, and ALLOW_FLOATING_ROOT to be configured at installation time, and MAY allow dynamic runtime configuration. Unless configured otherwise, SHOULD use the default parameters from Section 5.
