document: rfc-821
kind: wire-format
summary: The end-of-mail-data indicator is the sequence <CRLF>.<CRLF> — a line containing only a period. SMTP replies consist of a three-digit code, a space, one line of text, and <CRLF>; multiline replies use a hyphen after the code on all but the last line.
section: 4.5.2
topics:
