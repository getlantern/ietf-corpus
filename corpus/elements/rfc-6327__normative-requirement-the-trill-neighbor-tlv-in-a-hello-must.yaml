document: rfc-6327
kind: normative-requirement
summary: The TRILL Neighbor TLV in a Hello MUST show neighbor information as sensed for the VLAN on which the Hello is sent; implementations maintaining per-VLAN state only for the Designated VLAN send the TLV only in Hellos on that VLAN.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
