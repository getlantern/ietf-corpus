document: rfc-5998
kind: interoperability-note
summary: Channel binding support varies among the approved EAP methods. EAP-AKA, EAP-AKA', EAP-GPSK, EAP-EKE, EAP-PAX, and EAP-POTP support channel binding and are preferred in deployments requiring protection against gateway impersonation; EAP-SIM, EAP-pwd, EAP-SAKE, EAP-SRP, EAP-TLS, EAP-FAST, and EAP-TTLS do not.
section: "4"
topics:
