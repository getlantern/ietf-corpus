document: rfc-9479
kind: wire-format
summary: 'The Application Identifier Bit Mask encoding is: SABM Length+Flag (1 octet, bit 7 = L-flag, bits 0-6 = SABM length in octets 0-8), UDABM Length+Flag (1 octet, bit 7 = reserved, bits 0-6 = UDABM length 0-8), SABM (variable, omitted if length 0), UDABM (variable, omitted if length 0). SABM/UDABM are each limited to 8 octets.'
section: "4.1"
topics:
    - routing
