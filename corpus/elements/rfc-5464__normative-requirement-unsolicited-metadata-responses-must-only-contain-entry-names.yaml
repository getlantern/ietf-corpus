document: rfc-5464
kind: normative-requirement
summary: Unsolicited METADATA responses MUST only contain entry names, not values. When a client receives an unsolicited METADATA response and wants current values, it must explicitly issue a GETMETADATA command to retrieve them.
section: 4.4.2
rfc2119_level: MUST
topics:
    - email
