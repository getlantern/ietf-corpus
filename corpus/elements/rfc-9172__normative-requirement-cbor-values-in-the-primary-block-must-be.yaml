document: rfc-9172
kind: normative-requirement
summary: CBOR values in the primary block MUST be canonicalized using Deterministically Encoded CBOR (RFC 8949). For non-primary blocks, only the block-type-specific data field MAY be provided to a cipher suite for encryption; other block fields MUST NOT be encrypted.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
