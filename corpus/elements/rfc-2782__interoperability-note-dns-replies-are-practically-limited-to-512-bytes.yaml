document: rfc-2782
kind: interoperability-note
summary: DNS replies are practically limited to 512 bytes until all resolvers support larger responses. Administrators are strongly advised to keep SRV replies below 512 bytes; rough overhead is 30 bytes base + 20 bytes per SRV RR + target name lengths + NS and A record overhead.
section: Domain administrator advice
topics:
    - dns
