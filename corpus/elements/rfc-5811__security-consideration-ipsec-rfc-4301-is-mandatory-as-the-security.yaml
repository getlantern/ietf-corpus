document: rfc-5811
kind: security-consideration
summary: IPsec (RFC 4301) is mandatory as the security mechanism for the SCTP TML. A ForCES FE or CE MUST support IKE with certificates for endpoint authentication, ESP in Transport Mode, HMAC-SHA1-96 for integrity, AES-CBC-128 for confidentiality, and replay protection.
section: "7.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - sctp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
