document: rfc-9711
kind: design-rationale
summary: EAT is defined as a framework with a profile mechanism rather than a fixed token, because no single set of claims can accommodate all use cases. Profiles explicitly narrow CBOR/JSON encoding options, cryptographic algorithms, required claims, and freshness mechanisms to guarantee interoperability for a specific use case.
