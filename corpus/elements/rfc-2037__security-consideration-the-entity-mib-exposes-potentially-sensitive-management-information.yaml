document: rfc-2037
kind: security-consideration
summary: The Entity MIB exposes potentially sensitive management information about logical and physical entities. A network administrator should employ instance-level access control, configuring community strings such that sensitive instances (e.g., entLogicalCommunity, entLogicalEntries, entPhysicalEntries, and mapping table entries) are excluded from particular MIB views.
section: "8"
topics:
    - snmp
    - security
