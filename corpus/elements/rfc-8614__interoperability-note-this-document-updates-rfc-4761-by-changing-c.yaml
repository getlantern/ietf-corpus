document: rfc-8614
kind: interoperability-note
summary: This document updates RFC 4761 by changing C-bit mismatch behavior (PW now comes up without CW instead of failing) and S-bit mismatch behavior (PW SHOULD NOT come up, replacing the implicit fail). Implementations upgrading from RFC 4761 must account for both behavioral changes.
section: "3"
topics:
