document: rfc-6641
kind: design-rationale
summary: Multicast DNS (mDNS) is explicitly not used for domain root discovery. While mDNS could locate a local domain root, it cannot discover any other organization's root, making its value insufficient to justify specifying its use.
section: "4.4"
topics:
    - dns
