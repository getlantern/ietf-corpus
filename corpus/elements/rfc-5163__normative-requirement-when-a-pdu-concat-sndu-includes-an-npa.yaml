document: rfc-5163
kind: normative-requirement
summary: When a PDU-Concat SNDU includes an NPA destination address (D=0), the Receiver MUST associate the same NPA address with all PDUs in the SNDU payload and MUST forward that address with each PDU if required by the forwarding interface.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
