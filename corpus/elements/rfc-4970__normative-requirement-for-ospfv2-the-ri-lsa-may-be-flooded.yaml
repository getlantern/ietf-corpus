document: rfc-4970
kind: normative-requirement
summary: For OSPFv2, the RI LSA MAY be flooded as type 9 (link-scoped), type 10 (area-scoped), or type 11 (AS-scoped) opaque LSA. The choice of flooding scope is a matter of local policy; the originating router MAY advertise multiple RI LSAs as long as their flooding scopes differ.
section: "2.5"
rfc2119_level: MAY
topics:
    - routing
