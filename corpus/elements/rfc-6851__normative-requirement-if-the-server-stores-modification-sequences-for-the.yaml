document: rfc-6851
kind: normative-requirement
summary: If the server stores modification sequences for the selected mailbox and at least one message was permanently moved, the server MUST increment the per-mailbox mod-sequence, remember the incremented mod-sequence and corresponding UID for each moved message, and send the updated HIGHESTMODSEQ response code in the tagged or untagged OK response.
section: "4.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
