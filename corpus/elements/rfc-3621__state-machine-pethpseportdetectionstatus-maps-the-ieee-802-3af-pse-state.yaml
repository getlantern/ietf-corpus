kind: state-machine
summary: 'pethPsePortDetectionStatus maps the IEEE 802.3af PSE state machine to six MIB enumeration values: disabled(1) = DISABLED state; searching(2) = all other transient states; deliveringPower(3) = POWER_ON for duration > tlim_max; fault(4) = TEST_ERROR; test(5) = TEST_MODE; otherFault(6) = IDLE due to error_conditions.'
