summary: 'The abstract class Policy is the root of the policy class hierarchy, providing CommonName (CN), PolicyKeywords (multi-valued), Caption, and Description properties. It defines standard keyword values: UNKNOWN, CONFIGURATION, USAGE, SECURITY, SERVICE, MOTIVATIONAL, INSTALLATION, EVENT, and POLICY.'
