document: rfc-5332
kind: normative-requirement
summary: If an LSR sets vwxyz to a label value and the label stack has two or more labels, vwxyz MUST by default be set to the value of the second label (the label immediately following the topmost entry). The LSR MAY be configured to use a different label.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
