document: rfc-4510
kind: design-rationale
summary: LDAP is defined in terms of X.500 as an X.500 access mechanism, but only X.500(93) is incorporated; later revisions of X.500 do not automatically apply to this technical specification. This pins the specification to a stable baseline without obligating implementors to track evolving ITU-T revisions.
section: "2"
topics:
