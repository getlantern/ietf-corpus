document: rfc-2261
kind: protocol-element
summary: The Security Subsystem provides authentication and privacy services and may contain multiple Security Models concurrently. A Security Model defines the threats it protects against, the goals of its services, and the security protocols used. A Security Protocol defines the mechanisms, procedures, and MIB data used to provide a specific security service.
section: 3.1.1.4
topics:
