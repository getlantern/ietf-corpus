document: rfc-5182
kind: normative-requirement
summary: When SAVE is combined with both MIN and MAX (and no other result options), "$" contains one or two messages as returned in the MIN/MAX return items. When COUNT or ALL is also present, "$" always contains all found messages.
section: "2.4"
rfc2119_level: MUST
topics:
