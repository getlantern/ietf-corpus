document: rfc-7844
kind: design-rationale
summary: The anonymity profiles deliberately avoid including any option that would explicitly identify a client as 'using the anonymity option'. Declaring a preference for privacy is analogous to 'walking around with a Guy Fawkes mask' — it makes the client stand out and could trigger additional surveillance.
section: "2.5"
topics:
    - privacy
    - censorship
