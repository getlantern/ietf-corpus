document: rfc-2733
kind: protocol-element
summary: 'The SDP fmtp line for FEC as a separate stream has the format: ''a=fmtp:<number> <port> <network type> <address type> <connection address>'', where the connection address syntax mirrors SDP ''c'' lines. For RTSP non-aggregate control, the format is ''a=fmtp:<number> <control URL>''.'
section: "11.1"
topics:
    - rtp
    - realtime
