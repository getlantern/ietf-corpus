document: rfc-6545
kind: protocol-element
summary: The IncidentSource class, used only in Result messages, contains a BOOLEAN SourceFound element and zero or more Node elements identifying source host(s) or network(s). If Node is used, the Address element MUST contain the IP address of the identified system.
section: "5.3"
