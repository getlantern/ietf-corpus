document: rfc-3920
kind: normative-requirement
summary: The stream 'id' attribute MUST be unique within the receiving application and MUST be both unpredictable and nonrepeating, because it is security-critical — relied upon by server dialback and used as a session key.
section: "4.4"
rfc2119_level: MUST
topics:
    - security
