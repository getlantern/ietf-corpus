document: rfc-7545
kind: protocol-element
summary: DEV_VALID_REQ/DEV_VALID_RESP allow a Master Device to validate one or more Slave Devices against the Database without performing a full spectrum query. The request carries a required list of DeviceDescriptors; the response returns a DeviceValidity entry per device with isValid (boolean) and an optional reason string.
section: "4.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
