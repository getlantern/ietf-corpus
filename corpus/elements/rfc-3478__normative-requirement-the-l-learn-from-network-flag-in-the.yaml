document: rfc-3478
kind: normative-requirement
summary: The L (Learn from Network) flag in the FT Session TLV MUST be set to 1 to indicate that the LDP Graceful Restart procedures defined in this document are in use. All other FT flags are set to 0 by the sender and ignored on receipt.
section: "2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
