document: rfc-3118
kind: protocol-element
summary: The Replay Detection Method (RDM) field specifies the type of replay protection. RDM value 0x00 requires a monotonically increasing counter (e.g., an NTP-format timestamp) in the 64-bit Replay Detection field, and this method MUST be supported by all protocols.
section: "2"
topics:
