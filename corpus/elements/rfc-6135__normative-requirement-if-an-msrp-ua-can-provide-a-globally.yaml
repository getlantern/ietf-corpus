document: rfc-6135
kind: normative-requirement
summary: If an MSRP UA can provide a globally reachable IP address, the UA MUST use the a=setup 'actpass' attribute value in SDP offers, to allow the remote UA to answer with 'active' if behind a NAT and to maintain compatibility with non-COMEDIA UAs that act as passive endpoints.
section: 4.2.2
rfc2119_level: MUST
topics:
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
