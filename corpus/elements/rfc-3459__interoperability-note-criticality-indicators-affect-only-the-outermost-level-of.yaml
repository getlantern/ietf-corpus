document: rfc-3459
kind: interoperability-note
summary: Criticality indicators affect only the outermost level of the message (or the outermost level of the selected multipart/alternative). Receiving systems MUST ignore criticality indicators in embedded body parts (e.g., inside a message/rfc822 enclosure) to prevent forwarded messages from triggering undesired reporting.
section: "12.3"
topics:
    - email
