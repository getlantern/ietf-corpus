document: rfc-9779
kind: wire-format
summary: For loss measurement using PSID, the query message label stack carries SR-MPLS SL labels (Label(1)..Label(n)), then the PSID label, then GAL (value 13, S=1), then the ACH. Different PSID values can be used per Candidate-Path or per SL for granular loss accounting.
