document: rfc-2633
kind: normative-requirement
summary: Before sending a message, the sending agent MUST decide whether weak encryption is acceptable. If weak encryption is unacceptable, the sending agent MUST NOT use a weak algorithm such as RC2/40.
section: 2.7.1
rfc2119_level: MUST NOT
