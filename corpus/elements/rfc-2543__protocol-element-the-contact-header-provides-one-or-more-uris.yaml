document: rfc-2543
kind: protocol-element
summary: 'The Contact header provides one or more URIs at which the sender of the message can be reached directly. In REGISTER requests it binds an address-of-record to contact URIs with optional q (preference) and expires (lifetime) parameters. A wildcard ''*'' contact with Expires: 0 cancels all registrations.'
section: "6.13"
topics:
