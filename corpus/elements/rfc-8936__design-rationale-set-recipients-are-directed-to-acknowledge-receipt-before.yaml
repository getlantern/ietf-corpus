document: rfc-8936
kind: design-rationale
summary: SET Recipients are directed to acknowledge receipt before taking local actions based on SETs to avoid unnecessary acknowledgement delays. This ensures the transmitter can promptly mark SETs as received rather than waiting for downstream processing to complete.
section: "2.4"
