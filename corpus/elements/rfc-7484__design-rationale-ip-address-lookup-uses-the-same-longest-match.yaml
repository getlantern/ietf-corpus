document: rfc-7484
kind: design-rationale
summary: IP address lookup uses the same longest-match algorithm as routing (binary string comparison up to prefix length) because this naturally handles hierarchical delegation where covering prefixes point to one RDAP server while more specific sub-prefixes are served by another.
