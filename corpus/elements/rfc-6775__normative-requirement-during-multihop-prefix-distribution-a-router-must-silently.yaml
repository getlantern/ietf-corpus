document: rfc-6775
kind: normative-requirement
summary: During multihop prefix distribution, a router MUST silently ignore any received RA that does not contain an ABRO. If the ABRO version number is less than the stored version for that 6LBR, the RA information MUST be silently ignored.
section: 8.1.3
rfc2119_level: MUST
topics:
    - ip
    - v6ops
