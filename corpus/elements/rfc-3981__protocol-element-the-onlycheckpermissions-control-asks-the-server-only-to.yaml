document: rfc-3981
kind: protocol-element
summary: 'The <onlyCheckPermissions> control asks the server only to check whether adequate permissions are available to execute queries. The server MUST respond with a <standardReaction> element containing one of: <controlAccepted>, <controlDenied>, <controlDisabled>, or <controlUnrecognized>.'
section: 4.3.8
