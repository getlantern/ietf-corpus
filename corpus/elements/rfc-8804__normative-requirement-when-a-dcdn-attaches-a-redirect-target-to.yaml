document: rfc-8804
kind: normative-requirement
summary: When a dCDN attaches a redirect target to specific uCDN hosts, it MUST advertise those hosts within the Redirect Target capability object as 'redirecting-hosts'. The uCDN may only redirect to that dCDN address if the User Agent request was to one of those hosts.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
