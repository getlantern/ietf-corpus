document: rfc-1748
kind: interoperability-note
summary: 'When used with the pre-RFC 1573 interfaces group, the relationship between an 802.5 interface and an RFC 1213 interface is one-to-one: the ifIndex value for an 802.5 interface directly identifies corresponding instances in this MIB. This MIB applies only to interfaces with ifType value iso88025-tokenRing(9).'
