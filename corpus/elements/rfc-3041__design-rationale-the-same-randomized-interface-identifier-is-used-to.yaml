document: rfc-3041
kind: design-rationale
summary: The same randomized interface identifier is used to generate temporary addresses across all global prefixes (one address per prefix) rather than a unique identifier per prefix. This reduces the number of solicited-node multicast groups a host must join, avoiding the need to put the interface into promiscuous mode.
section: "3"
topics:
