document: rfc-2933
kind: protocol-element
summary: igmpCacheSelf (TruthValue, default true) indicates whether the local system is a member of the multicast group on the interface. igmpCacheExpiryTime is zero when the entry exists only because igmpCacheSelf is true; if the router left the group the entry would age out immediately.
section: "4"
topics:
    - multicast
    - snmp
