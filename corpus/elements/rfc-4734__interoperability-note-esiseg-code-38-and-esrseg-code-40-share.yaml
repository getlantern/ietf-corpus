document: rfc-4734
kind: interoperability-note
summary: ESiSeg (code 38) and ESrSeg (code 40) share event codes with V.21 channel-1 '1' bit and channel-2 '1' bit respectively; implementations must use context (whether a V.8 bis signal is expected) to determine the correct interpretation of these shared codepoints.
