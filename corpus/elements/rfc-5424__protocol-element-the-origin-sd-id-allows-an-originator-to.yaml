document: rfc-5424
kind: protocol-element
summary: 'The ''origin'' SD-ID allows an originator to provide additional identification: ''ip'' (textual IP address, repeatable for multihomed hosts), ''enterpriseId'' (IANA SMI private enterprise number), ''software'' (max 48 chars), and ''swVersion'' (max 32 chars).'
