document: rfc-9240
kind: protocol-element
summary: The 'ipv4' and 'ipv6' entity domain types are resource-agnostic. IPv4 entity identifiers follow RFC 3986 address syntax and RFC 4632 prefix notation; an individual address and its /32 prefix are aliases. IPv6 identifiers follow RFC 5952 and RFC 4291 prefix notation; an address and its /128 prefix are aliases.
section: "6.1"
