document: rfc-6495
kind: design-rationale
summary: Per RFC 6494 and RFC 6487, the Subject field in SEND certificates is declared meaningless and subjectAltName is not allowed, making the SKI extension (mandatory and non-critical) the only viable cross-CA identifier for Trust Anchors.
