document: rfc-8966
kind: wire-format
summary: 'Address Encoding (AE) values: AE 0 is the wildcard (0 octets); AE 1 is an IPv4 address (up to 4 octets, compression allowed); AE 2 is an IPv6 address (up to 16 octets, compression allowed); AE 3 is a link-local IPv6 address (8 octets, fe80::/64 implied, no compression). Prefixes are stored in the minimum number of octets needed to hold the significant bits.'
section: 4.1.4
topics:
    - routing
    - ip
