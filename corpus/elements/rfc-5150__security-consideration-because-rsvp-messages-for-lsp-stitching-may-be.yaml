document: rfc-5150
kind: security-consideration
summary: Because RSVP messages for LSP stitching may be sent/received on control interfaces different from the data interfaces, security associations MUST be bound to communicating neighbors themselves (identified by IP address) rather than to interfaces. Per RFC 2747, 'sending interface' should be replaced with 'receiver's IP address' for security association selection.
section: "6"
topics:
    - security
    - mpls
