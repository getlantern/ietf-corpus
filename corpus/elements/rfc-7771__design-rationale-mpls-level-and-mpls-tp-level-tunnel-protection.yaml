document: rfc-7771
kind: design-rationale
summary: MPLS-level and MPLS-TP-level tunnel protection covers individual PW segment tunnel failures but cannot protect against the failure of an S-PE node itself along the path of a static MS-PW. This gap motivates end-to-end protection via redundant MS-PWs.
section: "1"
topics:
    - mpls
    - routing
