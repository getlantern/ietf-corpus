document: rfc-8688
kind: normative-requirement
summary: If an intermediary issues a 608 code and there are no indicators the calling party will use the contents of the Call-Info header field for malicious purposes, the intermediary MUST include a Call-Info header field in the response.
section: "3.1"
rfc2119_level: MUST
topics:
    - sip
