document: rfc-7339
kind: design-rationale
summary: The Via header parameter mechanism was chosen over a SIP event package because it is lightweight (no extra messages), automatically reaches all active upstream neighbors without explicit subscription management, and naturally provides hop-by-hop semantics without requiring end-to-end support.
