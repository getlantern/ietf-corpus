document: rfc-9164
kind: protocol-element
summary: The zone identifier, an optional third element in the Interface Format array, represents a link-local or multicast scope per RFC 4007. It may be an unsigned integer (interface index) or a text string (interface name), and is strictly local to the node. The prefix length field may be replaced with CBOR null (0xF6) when only an address with zone identifier is needed.
section: 3.1.3
topics:
    - cbor
    - ip
