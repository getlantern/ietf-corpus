document: rfc-4861
kind: protocol-element
summary: Router Solicitation (ICMPv6 Type 133) is sent by hosts to prompt routers to generate Router Advertisements immediately. The source address is either an assigned interface address or the unspecified address if none is assigned; the destination is typically the all-routers multicast address (FF02::2).
section: "4.1"
topics:
    - ip
    - routing
