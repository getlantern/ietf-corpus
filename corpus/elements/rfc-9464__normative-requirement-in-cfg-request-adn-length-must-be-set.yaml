document: rfc-9464
kind: normative-requirement
summary: In CFG_REQUEST, ADN Length MUST be set to 0 in the ENCDNS_DIGEST_INFO attribute, and Num Hash Algs MUST be set to '(Length - 2)/2'. In CFG_REPLY or CFG_SET, Num Hash Algs MUST be set to 1.
section: "3.2"
rfc2119_level: MUST
topics:
