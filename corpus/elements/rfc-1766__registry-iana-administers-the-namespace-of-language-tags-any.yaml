document: rfc-1766
kind: registry
summary: IANA administers the namespace of language tags. Any new language tag must start with an existing tag and extend it. Proposed registrations require submission of a registration form (including requester name, email, tag, English name, native name, and published language reference), a 2-week review on ietf-types@uninett.no, and approval by the IETF Applications Area Director-appointed reviewer before forwarding to IANA. Decisions may be appealed to the IESG.
