document: rfc-6155
kind: design-rationale
summary: Subjective network views arise because NAT and private address spaces mean the same IP address string can refer to different physical devices depending on the network context of the requestor versus the LIS. A LIS must either reconcile these views or reject requests it cannot correctly interpret.
section: 2.1.1
topics:
    - nat
    - ip
    - realtime
