document: rfc-3744
kind: protocol-element
summary: DAV:current-user-privilege-set is a protected property containing the exact set of non-abstract privileges granted by the server to the currently authenticated user, including all privileges expanded from aggregate privileges. Clients use this to adapt their UI without issuing speculative requests.
section: "5.4"
topics:
    - security
