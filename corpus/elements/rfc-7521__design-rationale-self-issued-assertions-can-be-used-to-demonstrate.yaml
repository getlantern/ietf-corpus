document: rfc-7521
kind: design-rationale
summary: Self-issued assertions can be used to demonstrate knowledge of a secret (such as a client secret) without transmitting the secret directly. In this case, only a bare minimum of information (issuance and usage conditions) is typically included because additional client-supplied content provides limited value to the relying party.
section: "3"
topics:
