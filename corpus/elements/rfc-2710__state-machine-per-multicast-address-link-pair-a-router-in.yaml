document: rfc-2710
kind: state-machine
summary: 'Per (multicast address, link) pair, a router (in Querier state) moves through: No Listeners Present, Listeners Present, and Checking Listeners. A Report received triggers entry into Listeners Present; a Done triggers Checking Listeners with retransmit of Multicast-Address-Specific Queries; no response before timer expires triggers return to No Listeners Present.'
