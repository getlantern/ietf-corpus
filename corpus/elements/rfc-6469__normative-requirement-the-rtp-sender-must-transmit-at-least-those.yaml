document: rfc-6469
kind: normative-requirement
summary: The RTP sender MUST transmit at least those VAUX DIF blocks and/or audio DIF blocks with AAUX information bytes that include 'source' and 'source control' packs containing indispensable information for decoding (video signal type, frame rate, aspect ratio, etc.).
section: "2.3"
rfc2119_level: MUST
topics:
