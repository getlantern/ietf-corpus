document: rfc-4234
kind: protocol-element
summary: Value range alternatives are expressed compactly as %c##-## using a dash to indicate a range (e.g., %x30-39 for decimal digits 0–9). Concatenated numeric values and numeric value ranges cannot appear in the same string.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
