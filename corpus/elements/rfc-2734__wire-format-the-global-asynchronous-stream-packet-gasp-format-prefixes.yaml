document: rfc-2734
kind: wire-format
summary: The Global Asynchronous Stream Packet (GASP) format prefixes asynchronous stream packets with source_ID (16 bits, sender's node ID), specifier_ID (24 bits, SHALL be 0x00 005E — IANA's OUI), and version (SHALL be 1), consuming two quadlets before the encapsulated data payload.
section: "4.1"
topics:
