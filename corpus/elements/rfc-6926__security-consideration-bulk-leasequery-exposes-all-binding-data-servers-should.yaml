document: rfc-6926
kind: security-consideration
summary: Bulk Leasequery exposes all binding data; servers SHOULD restrict access to authorized requestors and a technique MUST exist in any deployment to prevent ordinary DHCPv4 clients from receiving Bulk Leasequery responses. Unauthorized connections SHOULD be closed immediately.
section: "9"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
