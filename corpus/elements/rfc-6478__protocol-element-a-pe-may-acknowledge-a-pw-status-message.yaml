document: rfc-6478
kind: protocol-element
summary: A PE MAY acknowledge a PW status message by sending a reply with the same format and status code as the received message but with the A bit set. The receiver MAY use the refresh timer field in the acknowledgment to request a new refresh interval from the originator.
section: 5.3.1
topics:
    - mpls
