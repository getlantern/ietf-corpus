document: rfc-5079
kind: security-consideration
summary: Sending a 433 response reveals information about the called party — specifically that they do not accept anonymous calls. If this information is sensitive, a UAS SHOULD reject the request with a 403 (Forbidden) instead.
section: "7"
rfc2119_level: SHOULD
