document: rfc-2590
kind: normative-requirement
summary: The use of the Override 'O' bit in ND advertisement messages containing DLCI or Frame Relay Address format link-layer addresses SHOULD be consistent with [ND] specifications. Implementations should override a cached address format only with the same type of address format.
