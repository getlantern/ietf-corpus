document: rfc-9760
kind: interoperability-note
summary: Enterprise Profile clocks will interoperate with the IEEE 1588 Default Profile (Annex I.3) only when that profile uses the End-to-End delay mechanism over IPv4 or IPv6 and sends management messages as unicast when directed at a specific clock. The Enterprise Profile will NOT interoperate with the Default Profile variant in Annex I.4, which requires Peer-to-Peer delay measurement.
section: "14"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
