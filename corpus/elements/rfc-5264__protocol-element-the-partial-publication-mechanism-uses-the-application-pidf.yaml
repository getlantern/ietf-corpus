document: rfc-5264
kind: protocol-element
summary: 'The partial publication mechanism uses the ''application/pidf-diff+xml'' content type (RFC 5262) with two root elements: <pidf-full> for full-state publications and <pidf-diff> for state-delta publications. The initial publication always carries full state via <pidf-full>; modifying publications may use either.'
section: "3.2"
topics:
    - sip
    - realtime
