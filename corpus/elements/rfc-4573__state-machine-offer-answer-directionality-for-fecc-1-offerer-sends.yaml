document: rfc-4573
kind: state-machine
summary: 'Offer/Answer directionality for FECC: (1) Offerer sends ''sendonly'' → answerer replies ''recvonly'' if FECC is supported, else rejects. (2) Offerer sends ''sendrecv'' → answerer replies ''sendrecv'' if its camera is controllable or capability negotiation is intended; ''sendonly'' if its camera is not remotely controllable; or rejects if FECC is unsupported.'
section: "5.1"
topics:
    - realtime
    - rtp
