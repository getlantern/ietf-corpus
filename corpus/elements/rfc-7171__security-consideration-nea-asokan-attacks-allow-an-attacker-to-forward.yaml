document: rfc-7171
kind: security-consideration
summary: NEA Asokan attacks allow an attacker to forward PA-TNC messages from a healthy machine through an unhealthy one, enabling the unhealthy machine to gain network access. This attack is primarily relevant when an External Measurement Agent (EMA) is in use; countermeasures use tls-unique channel bindings.
section: 4.2.5
topics:
    - tls
    - security
