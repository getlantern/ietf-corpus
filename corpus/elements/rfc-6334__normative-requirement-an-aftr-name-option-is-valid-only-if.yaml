document: rfc-6334
kind: normative-requirement
summary: 'An AFTR-Name option is valid only if: (1) option-len > 3; (2) option-len does not exceed remaining packet octets; (3) individual label lengths do not exceed option-len; (4) the FQDN format conforms to RFC 3315 Section 8; (5) no compression tags are present; and (6) at least one label of nonzero length exists.'
section: "3"
rfc2119_level: MUST
topics:
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
