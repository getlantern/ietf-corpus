document: rfc-9168
kind: design-rationale
summary: In PCEP, no action is encoded with a Flow Specification because the only applicable action is to forward matching traffic onto the associated LSP or SR path. This differs from BGP Flow Specifications, which carry explicit actions; the PCEP action is implicit from the association with a path.
section: "1"
topics:
