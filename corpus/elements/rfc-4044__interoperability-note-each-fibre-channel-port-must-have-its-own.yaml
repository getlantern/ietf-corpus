document: rfc-4044
kind: interoperability-note
summary: Each Fibre Channel port MUST have its own row in the IF-MIB's ifTable. The value of ifType for a Fibre Channel interface is 56. ifRcvAddressTable does not apply to FC interfaces, and no sublayers are defined, so FC interfaces are not stacked in ifStackTable.
section: "5.1"
topics:
    - snmp
