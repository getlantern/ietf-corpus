document: rfc-6575
kind: normative-requirement
summary: 'A PE performing ARP Mediation for IPv4 MUST: discover the local CE IP address, terminate (not forward) ARP/Inverse ARP requests locally, distribute the IP address to the remote PE via PW control signaling, notify the local CE of the remote CE IP, and respond to ARP/Inverse ARP using the remote CE IP and local PE hardware address.'
section: "2"
rfc2119_level: MUST
topics:
    - vpn
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
