document: rfc-7784
kind: normative-requirement
summary: Rows in trillOamMepTable and trillOamMepDbTable are automatically added or deleted based on row creation and destruction in the parent IEEE8021-CFM-MIB tables (dot1agCfmMepTable and dot1agCfmMepDbTable respectively); implementations have no independent control over row lifecycle.
section: 5.3.2.1
rfc2119_level: MUST
topics:
