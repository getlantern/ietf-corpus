document: rfc-6641
kind: design-rationale
summary: The approach mirrors prior global file namespace systems (AFS and DCE/DFS), providing a uniform cross-organizational namespace. NFSv4's fs_locations referral mechanism enables the cross-server namespace while DNS SRV provides the well-known entry point.
