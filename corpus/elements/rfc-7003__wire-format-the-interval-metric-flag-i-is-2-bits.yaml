document: rfc-7003
kind: wire-format
summary: 'The Interval Metric flag (I) is 2 bits: I=10 means Interval Duration, I=11 means Cumulative Duration, I=01 means Sampled Value, and I=00 is reserved. Burst/gap discard metrics can only be measured over definite intervals; sampled values are not valid for this block.'
section: "3.2"
