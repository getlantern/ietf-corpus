document: rfc-9541
kind: interoperability-note
summary: Non-supporting PEs (those not implementing this specification) will ignore received B-MAC/I-SID routes because the routes use no new BGP attributes or values. These PEs continue to follow RFC 7623 C-MAC flush procedures using B-MAC/0 routes, ensuring backward compatibility.
