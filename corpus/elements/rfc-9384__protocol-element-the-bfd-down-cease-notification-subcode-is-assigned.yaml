document: rfc-9384
kind: protocol-element
summary: The 'BFD Down' Cease NOTIFICATION subcode is assigned value 10 in the 'BGP Cease NOTIFICATION message subcodes' registry. It is sent to indicate that a BGP connection is being terminated because the associated BFD session transitioned to the Down state.
