document: rfc-3118
kind: normative-requirement
summary: In the Appendix A key management scheme, the master key MK MUST NOT be stored by any clients. Clients SHOULD only be given their individual derived key K. If MK is compromised, a new MK SHOULD be chosen and all clients re-keyed.
section: A
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
