document: rfc-6098
kind: protocol-element
summary: The Generic Notification Message (GNM, Type 22) is a new Mobile IPv4 message that allows HA, FA, and MN to send asynchronous notifications outside the Registration Request/Reply cycle. It carries a Message Direction (MD) field, an 'A' bit for acknowledgement requirement, Home Address, Home Agent Address, Care-of Address, a 64-bit Identification field, and optional extensions.
section: "4.1"
topics:
    - mobility
    - ip
