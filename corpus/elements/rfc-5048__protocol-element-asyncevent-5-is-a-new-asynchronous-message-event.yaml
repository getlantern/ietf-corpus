document: rfc-5048
kind: protocol-element
summary: AsyncEvent=5 is a new Asynchronous Message event code meaning all active tasks for the LU identified by the LUN field in the Async Message PDU are being terminated. It MUST NOT be used unless TaskReporting=FastAbort is negotiated on the session.
section: "8.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
