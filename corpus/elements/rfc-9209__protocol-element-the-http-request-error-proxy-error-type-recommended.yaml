document: rfc-9209
kind: protocol-element
summary: The 'http_request_error' proxy error type (recommended HTTP 4xx) indicates the intermediary is generating a client error response on the origin's behalf. Extra parameters include 'status-code' (Integer) and 'status-phrase' (String). It is exclusively generated by intermediaries and helps distinguish proxy-generated 4xx responses from origin-generated ones.
section: 2.3.16
topics:
    - http
