document: rfc-7524
kind: normative-requirement
summary: If segments of multiple MVPN or VPLS S-PMSI service LSPs are carried over a given intra-area P2MP LSP, each segment MUST carry a distinct upstream-assigned label even if all service LSPs belong to the same MVPN/VPLS. The ABR maintains an LFIB state for each such S-PMSI traversing it.
section: 7.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
