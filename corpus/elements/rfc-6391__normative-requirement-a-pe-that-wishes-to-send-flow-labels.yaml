document: rfc-6391
kind: normative-requirement
summary: A PE that wishes to send flow labels MUST include an FL Sub-TLV with T=1 in its label mapping message. A PE willing to receive flow labels MUST include an FL Sub-TLV with R=1. A PE that sends T=1 and receives R=1 MUST include a flow label; under all other FL Sub-TLV combinations it MUST NOT.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
