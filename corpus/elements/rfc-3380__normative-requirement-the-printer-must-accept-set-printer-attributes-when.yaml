document: rfc-3380
kind: normative-requirement
summary: The Printer MUST accept Set-Printer-Attributes when 'printer-state' is 'idle' or 'stopped', and SHOULD accept it when the value is 'processing'. The operation MUST be accepted regardless of 'printer-state-reasons' or 'printer-is-accepting-jobs' values unless explicitly stated otherwise.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
