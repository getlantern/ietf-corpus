document: rfc-8994
kind: normative-requirement
summary: ACP secure channels MUST be established using either IPsec (with IKEv2) or DTLS; both MUST authenticate the peer via the ACP domain membership check using ACP certificates. The channel type is negotiated per adjacency, and the ACP secure channel profiles define which combinations of protocol and encapsulation are mandatory vs. optional.
section: "6.8"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
