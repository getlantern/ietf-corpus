document: rfc-9965
kind: interoperability-note
summary: EAP-NOOB server implementations are RECOMMENDED to accept both 'noob@eap-noob.arpa' (deprecated) and '@noob.eap.arpa' (new) as synonyms. EAP-NOOB peers should prefer '@noob.eap.arpa' first and fall back to 'noob@eap-noob.arpa' if it does not succeed.
section: "4.3"
topics:
    - security
