summary: 'The nexthop-base type supports eleven subtypes: special (discard, discard-with-error, receive, cos-value), egress-interface, IPv4 address, IPv6 address, egress-interface+IPv4, egress-interface+IPv6, egress-interface+MAC, tunnel-encapsulation, tunnel-decapsulation, logical-tunnel, rib-name (chained lookup), and nexthop-ref (indirection reference).'
