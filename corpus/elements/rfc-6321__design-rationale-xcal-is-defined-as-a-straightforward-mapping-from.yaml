document: rfc-6321
kind: design-rationale
summary: xCal is defined as a straightforward mapping from iCalendar to XML such that round-tripping (iCalendar → xCal → iCalendar) preserves all semantic meaning. All components, properties, and property parameters are guaranteed to be preserved, with the exception of those that have default values. This design allows xCal data to always be converted back to valid iCalendar.
