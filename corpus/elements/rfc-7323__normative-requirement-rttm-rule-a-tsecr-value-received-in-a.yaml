document: rfc-7323
kind: normative-requirement
summary: 'RTTM Rule: A TSecr value received in a segment MAY be used to update the averaged RTT measurement only if the segment advances the left edge of the send window (i.e., SND.UNA is increased), to prevent inflation from gaps in one-way data flows.'
section: "4.1"
rfc2119_level: MAY
topics:
    - tcp
