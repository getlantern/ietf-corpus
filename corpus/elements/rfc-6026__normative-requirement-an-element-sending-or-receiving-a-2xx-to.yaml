document: rfc-6026
kind: normative-requirement
summary: An element sending or receiving a 2xx to an INVITE transaction MUST NOT destroy any matching INVITE transaction state, as this state is necessary for correct processing of retransmissions of the request and subsequent 2xx and ACK messages.
section: "6"
rfc2119_level: MUST NOT
topics:
