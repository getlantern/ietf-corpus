document: rfc-8866
kind: wire-format
summary: The 'c=' connection line uses '<nettype> <addrtype> <connection-address>'. For IPv4 multicast with layered encoding, the notation '<base multicast address>/<ttl>/<number of addresses>' allocates contiguously numbered multicast groups. Multiple 'c=' lines MUST NOT be used at session level.
section: "5.7"
topics:
    - realtime
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
