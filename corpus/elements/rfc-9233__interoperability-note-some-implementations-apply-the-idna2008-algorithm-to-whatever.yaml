document: rfc-9233
kind: interoperability-note
summary: Some implementations apply the IDNA2008 algorithm to whatever Unicode version is present in their operating system or libraries, independently of the IANA database. This can cause divergence between what labels are accepted and what the IANA tables reflect.
section: "2.3"
