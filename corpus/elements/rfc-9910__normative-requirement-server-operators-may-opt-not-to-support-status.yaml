document: rfc-9910
kind: normative-requirement
summary: Server operators MAY opt not to support 'status' filtering for 'rdap-down' and 'rdap-bottom' relations, or for non-'active' status values for 'rdap-up' and 'rdap-top' relations. In those cases, the server MUST respond with HTTP 501 (Not Implemented).
section: "3.3"
rfc2119_level: MAY
topics:
    - routing
