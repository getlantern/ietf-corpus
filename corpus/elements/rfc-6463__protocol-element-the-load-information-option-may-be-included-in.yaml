document: rfc-6463
kind: protocol-element
summary: The Load Information option may be included in any PBA to report the LMA's Priority, Sessions in Use, Maximum Sessions, Used Capacity, and Maximum Capacity, enabling a MAG or proxy-MAG to maintain an internal priority ordering of candidate LMAs for load-balancing decisions.
section: "4.3"
topics:
