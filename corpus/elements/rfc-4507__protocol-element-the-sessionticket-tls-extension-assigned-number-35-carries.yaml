document: rfc-4507
kind: protocol-element
summary: The SessionTicket TLS extension (assigned number 35) carries an opaque ticket in the ClientHello and ServerHello. The client includes any existing ticket or a zero-length ticket; the server includes a zero-length extension to signal intent to issue a new ticket via NewSessionTicket.
section: "3.2"
topics:
    - tls
    - crypto
