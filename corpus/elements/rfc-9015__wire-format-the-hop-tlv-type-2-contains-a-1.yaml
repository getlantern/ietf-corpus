document: rfc-9015
kind: wire-format
summary: The Hop TLV (Type=2) contains a 1-octet Service Index (the NSH SI value for this hop) followed by one or more Sub-TLVs in the Hop Details field. At least one Hop TLV MUST be present in an SFP attribute; its absence renders the attribute malformed.
section: 3.2.1.2
topics:
