document: rfc-4035
kind: protocol-element
summary: The DS resource record type appears only on the parent zone's side of a zone cut. When a security-aware name server is authoritative only for the child zone and receives a DS query it cannot answer, it MUST return an authoritative 'no data' response showing the DS RRset does not exist in the child zone's apex.
section: 3.1.4.1
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
