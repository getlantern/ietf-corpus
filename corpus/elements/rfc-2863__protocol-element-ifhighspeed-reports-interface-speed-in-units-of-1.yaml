document: rfc-2863
kind: protocol-element
summary: ifHighSpeed reports interface speed in units of 1,000,000 bits/second (±500,000 bps granularity), providing speed reporting for interfaces faster than the approximately 2.2 Gbps maximum representable by the Gauge32 ifSpeed object. ifHighSpeed is mandatory when ifSpeed reports its maximum value of 4,294,967,295.
section: 3.1.7
topics:
