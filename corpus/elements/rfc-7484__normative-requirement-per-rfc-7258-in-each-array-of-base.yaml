document: rfc-7484
kind: normative-requirement
summary: Per RFC 7258, in each array of base RDAP URLs the secure transport versions SHOULD be preferred and tried first. If both HTTPS and HTTP URLs are present, the bootstrap client SHOULD try HTTPS first.
section: "3"
rfc2119_level: SHOULD
topics:
