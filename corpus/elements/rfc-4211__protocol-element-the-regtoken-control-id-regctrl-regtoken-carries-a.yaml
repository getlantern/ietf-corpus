document: rfc-4211
kind: protocol-element
summary: The regToken control (id-regCtrl-regToken) carries a one-time shared secret (encoded as UTF8String) used by the CA to verify the subject's identity prior to initial certificate issuance. It is intended only for PKI initialization, not for subsequent requests.
