document: rfc-6763
kind: protocol-element
summary: Service Type Enumeration uses a special PTR query for '_services._dns-sd._udp.<Domain>' to enumerate all advertised service types in a domain. Each PTR response record contains a two-label '<service>.<domain>' name usable for subsequent Service Instance Enumeration queries.
