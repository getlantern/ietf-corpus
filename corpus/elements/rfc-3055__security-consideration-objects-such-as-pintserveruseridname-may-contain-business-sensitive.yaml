document: rfc-3055
kind: security-consideration
summary: Objects such as pintServerUserIdName may contain business-sensitive customer identification data. GET access should be controlled and SNMP values should be encrypted in transit; SNMPv1 alone provides no such protection even over a secured network.
section: "7"
topics:
