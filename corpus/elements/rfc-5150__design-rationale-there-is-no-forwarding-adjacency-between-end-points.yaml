document: rfc-5150
kind: design-rationale
summary: There is no forwarding adjacency between end points of an S-LSP TE link, unlike H-LSP TE links. Consequently, any label exchanged between S-LSP end points for the e2e LSP has no significance in the data plane and must not be processed by the recipients.
section: "4"
topics:
