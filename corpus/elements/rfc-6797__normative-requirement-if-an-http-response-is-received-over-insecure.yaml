document: rfc-6797
kind: normative-requirement
summary: If an HTTP response is received over insecure transport, the UA MUST ignore any present STS header field(s). Additionally, the UA MUST ignore any STS header fields not conforming to the grammar in Section 6.1.
section: "8.1"
rfc2119_level: MUST
topics:
    - http
    - security
