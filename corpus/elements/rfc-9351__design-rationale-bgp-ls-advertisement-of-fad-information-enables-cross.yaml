document: rfc-9351
kind: design-rationale
summary: BGP-LS advertisement of FAD information enables cross-domain SR Policy path construction by allowing a controller to learn the mapping of Flexible Algorithm numbers to their definitions across IGP areas/domains, and then select algorithm-specific SIDs (Prefix-SIDs for SR-MPLS or End SIDs for SRv6) at ABRs/ASBRs.
section: "1"
topics:
