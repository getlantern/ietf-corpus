document: rfc-8267
kind: normative-requirement
summary: NFS version 4 clients SHOULD reserve one RPC-over-RDMA credit for periodic server or connection health assessment, to drive an RPC request on an otherwise idle connection and detect unresponsive servers.
section: 6.7.2
rfc2119_level: SHOULD
