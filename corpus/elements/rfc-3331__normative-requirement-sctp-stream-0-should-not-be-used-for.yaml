document: rfc-3331
kind: normative-requirement
summary: SCTP Stream 0 SHOULD NOT be used for MAUP messages; Stream 0 SHOULD only be used for ASP Management (ASPM) messages. Separate SCTP streams are recommended per SS7 link or per SLS to minimize transmission and buffering delay.
