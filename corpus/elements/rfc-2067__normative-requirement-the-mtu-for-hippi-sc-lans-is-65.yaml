document: rfc-2067
kind: normative-requirement
summary: The MTU for HIPPI-SC LANs is 65,280 bytes (the IP packet size including IP header, excluding lower-layer overhead). This is a fixed value required so that Destination buffer sizes can be determined.
section: "5.5"
rfc2119_level: MUST
