document: rfc-4439
kind: wire-format
summary: t11FamAssignedAreaIdList and t11FamAreaAssignedPortIdList are both OCTET STRING (SIZE 0..256) fields where each octet encodes one Area_ID or Port_ID respectively in an ascending-order array. For example, Area_IDs 23, 45, 56, 235 are encoded as the 4-byte string x'172d38eb'.
section: "6.2"
