document: rfc-7602
kind: protocol-element
summary: The ESN TLV is defined exclusively for IIH PDUs and SNPs (both CSNP and PSNP); its use in LSPs is explicitly prohibited. The TLV is optional unless 'verify' mode is enabled on a link.
