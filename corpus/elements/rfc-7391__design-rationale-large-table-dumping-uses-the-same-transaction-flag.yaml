document: rfc-7391
kind: design-rationale
summary: Large table dumping uses the same transaction flag mechanism (SOT/MOT/EOT) already present in RFC 5810 for atomic CE-to-FE transactions, applied symmetrically for FE-to-CE GET responses. This reuse avoids introducing new signaling primitives.
