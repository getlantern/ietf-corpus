document: rfc-2138
kind: protocol-element
summary: The Request Authenticator in an Access-Request is a 16-octet random value used as input to the password-hiding algorithm and to compute the Response Authenticator. The Response Authenticator in replies is MD5(Code+ID+Length+RequestAuth+Attributes+Secret).
section: "3"
topics:
    - security
    - crypto
