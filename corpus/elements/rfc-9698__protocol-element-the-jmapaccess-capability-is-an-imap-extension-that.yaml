document: rfc-9698
kind: protocol-element
summary: 'The JMAPACCESS capability is an IMAP extension that allows a server to declare that its mailstore is also accessible via JMAP, with complete object ID equivalence: if a mailbox or message has a particular object ID in IMAP or JMAP, the same object is accessible via the other protocol with the same ID.'
section: "3"
topics:
    - email
