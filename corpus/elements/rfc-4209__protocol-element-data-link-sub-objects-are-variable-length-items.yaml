document: rfc-4209
kind: protocol-element
summary: Data Link sub-objects are variable-length items within the DATA_LINK object of LinkSummary messages. Each has an 8-bit Type, 8-bit Length (minimum 4, multiple of 4), and variable contents describing link characteristics for CSPF path selection.
