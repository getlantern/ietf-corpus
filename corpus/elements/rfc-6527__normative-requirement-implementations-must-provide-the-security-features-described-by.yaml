document: rfc-6527
kind: normative-requirement
summary: Implementations MUST provide the security features described by the SNMPv3 framework, including full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm. Implementations MAY also support the Transport Security Model (TSM) combined with SSH or TLS/DTLS.
section: "11"
rfc2119_level: MUST
topics:
    - snmp
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
