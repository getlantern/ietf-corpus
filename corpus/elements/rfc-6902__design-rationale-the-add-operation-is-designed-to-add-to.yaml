document: rfc-6902
kind: design-rationale
summary: The "add" operation is designed to add to existing objects and arrays, so its target location will often not exist. The spec overrides the JSON Pointer error-handling algorithm to allow this, but the parent object or array must itself exist.
section: "4.1"
topics:
    - json
