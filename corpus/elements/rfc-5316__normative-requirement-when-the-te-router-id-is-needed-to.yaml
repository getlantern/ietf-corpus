document: rfc-5316
kind: normative-requirement
summary: When the TE Router ID is needed to reach all routers within an entire ISIS routing domain, the IS-IS Router Capability TLV MUST be included in the ASBR's LSP, with the appropriate IPv4 or IPv6 TE Router ID sub-TLV.
section: 3.3.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
