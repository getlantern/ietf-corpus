document: rfc-5807
kind: interoperability-note
summary: The prf+ function used in PEMK derivation is defined in IKEv2 (RFC 4306), and the specific PRF algorithm is negotiated via the PRF-Algorithm AVP in PANA-Auth-Request, tying PEMK computation to the PANA session's negotiated cryptographic algorithm.
