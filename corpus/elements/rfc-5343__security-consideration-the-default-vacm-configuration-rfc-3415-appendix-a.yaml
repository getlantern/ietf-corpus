document: rfc-5343
kind: security-consideration
summary: The default VACM configuration (RFC 3415 Appendix A) and USM discovery (RFC 3414) both expose snmpEngineID at noAuthNoPriv security level. In highly secure environments, the discovery mechanism defined here combined with TSM can avoid cleartext exchange.
