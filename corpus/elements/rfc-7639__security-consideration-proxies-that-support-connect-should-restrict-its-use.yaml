document: rfc-7639
kind: security-consideration
summary: Proxies that support CONNECT SHOULD restrict its use to a limited set of known ports or a configurable whitelist of safe request targets, due to significant risks in establishing tunnels to arbitrary servers, particularly to well-known or reserved TCP ports.
section: "4"
rfc2119_level: SHOULD
topics:
    - http
    - security
