document: rfc-5946
kind: normative-requirement
summary: Upon receiving a downstream error notification, the RSVP Receiver Proxy MUST generate a Notify message with upstream notification to the corresponding sender if Indirect Notification is used, and SHOULD do so if Direct Notification is used (since the failure node may not support Notify).
section: "3.2"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
