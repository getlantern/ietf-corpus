document: rfc-2518
kind: protocol-element
summary: LOCK and UNLOCK are new HTTP methods for acquiring and releasing write locks. A successful LOCK returns the lock token in the lockdiscovery property in the response body. Locks may be exclusive or shared and may apply with Depth 0 or infinity on collections.
section: "8.10"
topics:
