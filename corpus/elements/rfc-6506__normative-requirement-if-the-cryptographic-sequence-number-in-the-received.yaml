document: rfc-6506
kind: normative-requirement
summary: If the cryptographic sequence number in the received Authentication Trailer is less than or equal to the last sequence number successfully received from the neighbor, the OSPFv3 packet MUST be dropped and an error event SHOULD be logged.
section: "4.6"
rfc2119_level: MUST
topics:
    - routing
    - security
