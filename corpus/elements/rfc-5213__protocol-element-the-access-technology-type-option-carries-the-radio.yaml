document: rfc-5213
kind: protocol-element
summary: The Access Technology Type option carries the radio/link access technology by which the mobile node is currently attached (e.g., virtual, 3GPP GERAN, 3GPP UTRAN, 3GPP E-UTRAN, 3GPP2, WiMAX, nomadic). This option is mandatory in both PBU and PBA.
section: "8.5"
