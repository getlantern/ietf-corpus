document: rfc-9635
kind: design-rationale
summary: GNAP is explicitly not an extension of OAuth 2.0 and is not intended to be directly compatible with it. GNAP addresses use cases that OAuth 2.0 cannot easily handle (such as key-bound tokens by default, rich delegation negotiation, and multi-party authorization), while allowing GNAP and OAuth 2.0 to coexist in parallel deployments with defined mapping paths.
section: "1"
topics:
    - oauth
    - security
