document: rfc-6794
kind: normative-requirement
summary: When a proxy includes multiple alternative URIs for the same policy, it MUST include an 'alt-uri' parameter on all of them with the same domain/FQDN value, and MUST include a SIP or SIPS URI even if other URI schemes are also provided.
section: 4.4.2
rfc2119_level: MUST
topics:
    - sip
