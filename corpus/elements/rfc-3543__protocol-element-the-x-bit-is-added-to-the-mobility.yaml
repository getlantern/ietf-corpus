document: rfc-3543
kind: protocol-element
summary: The 'X' bit is added to the Mobility Agent Advertisement Extension to indicate an agent's support for Registration Revocation. A foreign agent setting this bit advertises support for revocation messages on that link, allowing mobile nodes to select foreign agents with revocation support.
section: "3.1"
topics:
    - mobility
    - security
