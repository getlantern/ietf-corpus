document: rfc-4213
kind: security-consideration
summary: If the residual source-spoofing threats of configured tunneling are considered significant, a scheme with authentication such as IPsec (RFC 2401, preferred) or GRE with a pre-configured key (RFC 2890) should be used instead. Shorter tunnels are preferable to longer ones to limit exposure.
section: "5"
topics:
