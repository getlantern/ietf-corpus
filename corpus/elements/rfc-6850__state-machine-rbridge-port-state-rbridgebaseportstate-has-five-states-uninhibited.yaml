document: rfc-6850
kind: state-machine
summary: 'RBridge port state (rbridgeBasePortState) has five states: uninhibited(1), portInhibited(2), vlanInhibited(3), disabled(4), broken(5). portInhibited/vlanInhibited are triggered by spanning tree root changes or conflicting forwarder information; disabled by operator; broken by detected malfunction.'
