document: rfc-8249
kind: design-rationale
summary: The originatingL1LSPBufferSize from IS-IS unreachable RBridges is still meaningful and used when determining Sz, even though link-state information for IS-IS unreachable RBridges is otherwise ignored. This updates RFC 7780.
