document: rfc-9069
kind: protocol-element
summary: 'A new BMP peer type is defined: Peer Type 3 (Loc-RIB Instance Peer), indicating the peer represents the router Loc-RIB, which may have a route distinguisher (RD). This supplements the existing Local Instance Peer type (for non-RD peers with instance identifiers) defined in RFC 7854.'
section: "4.1"
topics:
