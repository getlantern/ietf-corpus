document: rfc-5969
kind: normative-requirement
summary: A BR using an anycast source address MUST set the IPv4 Don't Fragment flag to prevent incorrect reassembly when multiple BRs send fragmented packets with possibly identical fragment IDs to the same CE.
section: "9.1"
rfc2119_level: MUST
