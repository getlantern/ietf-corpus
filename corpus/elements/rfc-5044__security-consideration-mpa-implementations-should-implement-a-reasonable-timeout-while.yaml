document: rfc-5044
kind: security-consideration
summary: MPA implementations SHOULD implement a reasonable timeout while waiting for startup frames to prevent certain denial-of-service attacks. ULPs SHOULD also implement timeouts while waiting for FPDUs and application-level messages.
section: 7.1.2
rfc2119_level: SHOULD
topics:
    - security
    - tcp
