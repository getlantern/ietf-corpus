document: rfc-3921
kind: protocol-element
summary: The <thread/> element carries an opaque, non-human-readable conversation identifier. It MUST be unique to the conversation thread within the stream, MUST remain consistent throughout the conversation, and a stanza MUST NOT contain more than one <thread/> element; its value MUST be treated as opaque with only exact comparisons permitted.
section: 2.1.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
