document: rfc-5692
kind: normative-requirement
summary: Hosts transmitting IPv4 over Ethernet packets over IEEE 802.16 MUST follow the operations specified in RFC 894. ARP (RFC 826) MUST be used for finding the destination Ethernet MAC address.
section: 6.2.1
rfc2119_level: MUST
