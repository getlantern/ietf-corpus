document: rfc-8663
kind: protocol-element
summary: When a received SR-MPLS packet has a top label indicating an Adjacency SID and the adjacent node cannot perform MPLS forwarding, the top label is replaced by an IP tunnel toward that adjacent node and forwarded over the link indicated by the Adjacency SID.
section: 3.2.3
topics:
    - mpls
    - routing
