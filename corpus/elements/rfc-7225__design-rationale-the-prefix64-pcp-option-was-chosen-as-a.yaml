document: rfc-7225
kind: design-rationale
summary: The PREFIX64 PCP option was chosen as a deterministic alternative to RFC 7050 (DNS-based discovery) because it solves all issues identified in RFC 7051, including stale prefix avoidance, multiple prefix discovery, DNSSEC compatibility, non-null suffix discovery, destination-based prefix discovery, and per-NAT64 prefix association.
