document: rfc-1850
kind: design-rationale
summary: For conceptual row creation, management stations should include as many read-write columnar objects as possible in a Set-Request; agents should accept a minimum (only objects for which no default can be intuited), following the Internet Robustness Principle of being liberal in what you accept and conservative in what you send.
