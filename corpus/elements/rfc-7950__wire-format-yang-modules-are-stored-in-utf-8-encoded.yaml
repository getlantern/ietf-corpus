document: rfc-7950
kind: wire-format
summary: YANG modules are stored in UTF-8 encoded files. Legal characters are Unicode/ISO 10646 characters including tab, CR, and LF, but excluding other C0 control characters, surrogate blocks, and noncharacters. Noncharacters are also illegal in the 'string' built-in type at runtime.
