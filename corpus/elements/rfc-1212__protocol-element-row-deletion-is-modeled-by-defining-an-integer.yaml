document: rfc-1212
kind: protocol-element
summary: Row deletion is modeled by defining an integer-valued columnar object per conceptual row; a management station writes the value 'invalid' (conventionally 2) to invalidate the row. Whether the agent physically removes the entry from the table is implementation-specific.
