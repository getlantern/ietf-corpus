document: rfc-9636
kind: normative-requirement
summary: Each correction after the first MUST differ from the previous by exactly +1 (positive leap second) or -1 (negative leap second), except in version 4 files where the last two records MAY share the same correction value, with the last record's occurrence denoting the leap-second table expiration time.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
