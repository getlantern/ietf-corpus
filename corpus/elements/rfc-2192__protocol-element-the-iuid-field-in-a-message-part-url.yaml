document: rfc-2192
kind: protocol-element
summary: The `<iuid>` field in a message part URL refers to an IMAP4 message UID and SHOULD be used as the set argument to the 'UID FETCH' command. The optional `[isection]` field maps to a MIME body section specifier used in 'UID FETCH <uid> BODY.PEEK[<section>]'.
section: "7"
topics:
    - email
