document: rfc-8641
kind: protocol-element
summary: 'Two notification types carry update records: push-update delivers a complete filtered snapshot of the datastore (used for periodic updates, initial on-change sync, and optional resync) and push-change-update delivers the set of changes since the last notification (used for ongoing on-change updates).'
