document: rfc-3515
kind: normative-requirement
summary: For the second and subsequent REFER requests a UA receives in a given dialog, it MUST include an id parameter in the Event header field of each NOTIFY containing the CSeq sequence number of the associated REFER. A SUBSCRIBE sent to refresh or terminate this subscription MUST also contain this id parameter.
section: 2.4.6
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
