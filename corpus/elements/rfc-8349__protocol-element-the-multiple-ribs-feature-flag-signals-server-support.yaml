document: rfc-8349
kind: protocol-element
summary: The 'multiple-ribs' feature flag signals server support for user-defined RIBs beyond system-controlled defaults, enabling policy routing with multiple RIBs per address family. Servers not advertising this feature SHOULD provide exactly one system-controlled RIB per address family.
section: "7"
