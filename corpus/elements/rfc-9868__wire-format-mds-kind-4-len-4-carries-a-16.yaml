document: rfc-9868
kind: wire-format
summary: MDS (Kind=4, Len=4) carries a 16-bit hint of the largest receivable UDP packet or fragment without IP fragmentation. MRDS (Kind=5, Len=5) carries a 16-bit maximum reassembled datagram size and an 8-bit maximum fragment count (MRDS segs). Both are based on the receiver's EMTU_R.
section: "11.5"
