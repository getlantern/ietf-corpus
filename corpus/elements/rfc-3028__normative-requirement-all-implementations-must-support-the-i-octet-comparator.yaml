document: rfc-3028
kind: normative-requirement
summary: All implementations MUST support the 'i;octet' comparator (byte-by-byte comparison) and the 'i;ascii-casemap' comparator (case-insensitive ASCII comparison). The default comparator when none is specified is 'i;ascii-casemap'.
section: 2.7.3
rfc2119_level: MUST
