document: rfc-8782
kind: protocol-element
summary: The 'conflict-information' structure includes 'conflict-status' (1=inactive, 2=active, 3=all inactive), 'conflict-cause' (1=overlapping targets, 2=accept-list conflict, 3=cuid collision), 'conflict-scope', and 'retry-timer' indicating when the DOTS client may reissue the request.
