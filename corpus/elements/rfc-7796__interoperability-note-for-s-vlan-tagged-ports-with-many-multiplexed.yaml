document: rfc-7796
kind: interoperability-note
summary: For S-VLAN tagged ports with many multiplexed customer VLANs, the PBB VPLS PE model (IEEE 802.1ah bridge with root/leaf B-VLAN or dual I-SID tagging) MAY be used, providing both VLAN scalability and MAC address scalability without further changes to PW processing.
