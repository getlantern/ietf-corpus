document: rfc-7829
kind: security-consideration
summary: SCTP-PF lowers the bar for attackers to force a path change, because they need to negatively influence connectivity for a shorter period than required by RFC 4960. However, this does not significantly change the effort needed to keep SCTP away from the primary path long-term, since standard switchback resumes on the primary at the next successful HEARTBEAT.
section: "8"
topics:
    - sctp
    - security
