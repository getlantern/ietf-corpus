document: rfc-5689
kind: normative-requirement
summary: The response to an extended MKCOL request MUST be an XML document containing a single DAV:mkcol-response element, which MUST contain DAV:propstat elements with the status of each property when the request fails due to a property-setting failure. The server MAY return a response body on success.
section: "3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
