document: rfc-7441
kind: normative-requirement
summary: When an mLDP FEC Element is encoded in the NLRI of a BGP Update with SAFI MCAST-VPN, the address family of the Root Node Address (as indicated in the FEC Element) MUST correspond to the address family in the AFI field of that BGP Update.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
