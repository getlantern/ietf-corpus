document: rfc-8556
kind: normative-requirement
summary: A BFIR SHOULD NOT set the LIR-pF flag unless it knows that all BFERs in the BIER domain (or at least all BFERs to which it needs to transmit) support this flag. Support for LIR-pF is OPTIONAL.
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
