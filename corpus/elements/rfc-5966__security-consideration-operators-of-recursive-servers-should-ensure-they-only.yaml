document: rfc-5966
kind: security-consideration
summary: Operators of recursive servers should ensure they only accept TCP (and UDP) connections from expected clients and not from unknown sources, to prevent reflector attacks (RFC 5358) over UDP and connection-exhaustion attacks over TCP.
