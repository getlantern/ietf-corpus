document: rfc-7389
kind: normative-requirement
summary: When the MAG includes the option in a PBU using IPv4 transport, the address field MUST be either zero-length or a 4-octet ALL_ZERO value; for IPv6 transport it MUST be either zero-length or a 16-octet ALL_ZERO value.
section: "4"
rfc2119_level: MUST
topics:
