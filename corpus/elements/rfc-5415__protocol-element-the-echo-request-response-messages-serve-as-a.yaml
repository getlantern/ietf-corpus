document: rfc-5415
kind: protocol-element
summary: The Echo Request/Response messages serve as a control-channel keep-alive. The WTP sends Echo Requests based on the EchoInterval timer; if the retransmit count reaches MaxRetransmit without a response, the WTP tears down the DTLS session and re-enters discovery to find a new AC.
section: "7"
