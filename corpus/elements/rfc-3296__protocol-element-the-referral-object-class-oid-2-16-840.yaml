document: rfc-3296
kind: protocol-element
summary: The 'referral' object class (OID 2.16.840.1.113730.3.2.6) is a STRUCTURAL object class with a mandatory 'ref' attribute, used to represent a named subordinate reference (knowledge DSE) in an LDAP directory. It is analogous to X.500 subordinate knowledge (subr) DSEs.
