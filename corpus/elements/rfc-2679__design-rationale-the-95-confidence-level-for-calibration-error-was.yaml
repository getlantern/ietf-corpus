document: rfc-2679
kind: design-rationale
summary: The 95% confidence level for calibration error was chosen because some confidence level is needed to remove outliers, a specific level must be named so independent implementations can be compared, and 95% was loose enough to exclude outliers even in prototype user-level implementations.
