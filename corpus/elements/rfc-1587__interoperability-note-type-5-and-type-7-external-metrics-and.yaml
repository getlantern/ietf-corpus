document: rfc-1587
kind: interoperability-note
summary: Type-5 and type-7 external metrics and path types are directly comparable. The same comparison rules used for type-5 routes (type-1 vs. type-2 metric comparison, forwarding address lookup) apply when comparing type-7 routes against each other or against type-5 routes.
