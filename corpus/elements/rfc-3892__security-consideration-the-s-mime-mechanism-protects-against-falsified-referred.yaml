document: rfc-3892
kind: security-consideration
summary: The S/MIME mechanism protects against falsified referred-by information injection, replay of stale assertions (timestamp covered by signature), and use in unrelated requests (Refer-To header covered by signature). However, it cannot prevent the referee from deleting all referred-by information, which transforms the request into an ordinary SIP request.
section: "6"
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
