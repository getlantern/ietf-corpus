document: rfc-8987
kind: protocol-element
summary: A 'delegating relay' is defined as an intermediate device that forwards DHCPv6 messages containing IA_PD and IAPREFIX options between client and server, does not implement a DHCPv6 server function, and is responsible for routing traffic for the delegated prefixes. This is distinct from the RFC 8415 'delegating router' term.
section: "2.1"
topics:
    - ip
    - v6ops
