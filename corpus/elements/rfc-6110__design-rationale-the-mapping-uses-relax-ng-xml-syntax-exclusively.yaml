document: rfc-6110
kind: design-rationale
summary: The mapping uses RELAX NG XML syntax exclusively rather than the compact syntax. Although compact syntax is preferred for human readability in publications, it is significantly harder to generate programmatically (no library support) and makes foreign-namespace annotations far less readable due to requiring four distinct syntactic constructs instead of a uniform XML element/attribute form.
section: "4.1"
topics:
