document: rfc-7472
kind: protocol-element
summary: 'The ''ipps'' URI scheme is defined for secure IPP print services. Its ABNF syntax is: ipps-uri = "ipps:" "//" host [ ":" port ] [ absolute-path [ "?" query ]]. The userinfo component from RFC 3986 is explicitly excluded.'
