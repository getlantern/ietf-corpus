document: rfc-2925
kind: interoperability-note
summary: A traceroute operation can theoretically run for up to 42 hours and 30 minutes (traceRouteCtlTimeOut × traceRouteCtlProbesPerHop × traceRouteCtlMaxTtl at maximum values). The traceRouteCtlMaxFailures object (default 5) is provided to terminate operations early on repeated consecutive timeouts.
