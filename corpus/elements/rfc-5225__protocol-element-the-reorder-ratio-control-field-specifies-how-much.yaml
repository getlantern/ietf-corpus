document: rfc-5225
kind: protocol-element
summary: The reorder_ratio control field specifies how much reordering is accommodated by the LSB encoding of the MSN, allowing the compressor to adjust the distribution of the interpretation interval between negative (reordering) and positive (loss) deltas on links with varying reordering characteristics.
section: 6.3.2
