document: rfc-8264
kind: design-rationale
summary: PRECIS separates 'preparation' (limited preprocessing for constrained devices), 'enforcement' (full rule application by authoritative servers), and 'comparison' (octet-for-octet matching of output strings). Servers are responsible for enforcement because clients may lack capacity and cannot be trusted for security-sensitive contexts such as authentication.
section: "3"
topics:
    - security
