document: rfc-7965
kind: design-rationale
summary: The extension uses active/passive PE roles (from RFC 6073) to resolve collisions when both PEs simultaneously initiate PSN Binding to the same PW over different tunnels. Node ID comparison (unsigned integer) deterministically selects which PE's binding request wins.
