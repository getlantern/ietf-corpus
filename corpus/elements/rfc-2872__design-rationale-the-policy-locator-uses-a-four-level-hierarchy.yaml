document: rfc-2872
kind: design-rationale
summary: The policy locator uses a four-level hierarchy (vendor GUID, application name, version, sub-application) so that network administrators can write policies that range from coarse application-class control down to fine-grained sub-operation control without requiring a central registry of specific values.
