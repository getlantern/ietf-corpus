document: rfc-8148
kind: wire-format
summary: A VEDS or metadata/control body part is identified by its MIME type in the Content-Type header, assigned a unique identifier in Content-ID, and referenced by a Call-Info header field at the top level of the SIP message with a CID URL and a 'purpose' parameter (e.g., 'EmergencyCallData.VEDS' or 'EmergencyCallData.Control').
