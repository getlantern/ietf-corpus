document: rfc-6080
kind: protocol-element
summary: The 'effective-by' parameter in NOTIFY specifies the maximum number of seconds before the UA MUST make the new profile effective. A value of 0 requires immediate application despite possible service interruptions; if absent, the device SHOULD apply the profile at the earliest opportunity without disrupting services.
section: 6.2.3
topics:
    - sip
