document: rfc-9224
kind: design-rationale
summary: The WEIRDS Working Group debated in-DNS lookup and other discovery mechanisms before settling on IANA-hosted JSON registries. IANA registries were chosen because IANA already maintains the underlying allocation data, and the method is simple for clients to implement without DNS dependencies.
section: "1"
