document: rfc-1626
kind: normative-requirement
summary: If the calling endpoint receives a CONNECT message without the AAL Parameters IE, but its SETUP message included that IE with CPCS-SDU Size fields, it shall clear the call with cause 'AAL Parameters cannot be supported'.
section: Switched Virtual Circuits
