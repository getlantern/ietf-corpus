document: rfc-3207
kind: interoperability-note
summary: STARTTLS is a valid ESMTP extension when used on the Submission port (RFC 2476). Because the submission port is by definition not a publicly referenced SMTP server, STARTTLS can require authentication and security for that service.
section: "4.3"
