document: rfc-4776
kind: normative-requirement
summary: Since DHCPv4 and DHCPv6 do not support querying for a specific script or language, the DHCP server SHOULD provide all common renderings to the client and MUST provide at least the rendering in the language and script appropriate to the indicated location.
section: "1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
