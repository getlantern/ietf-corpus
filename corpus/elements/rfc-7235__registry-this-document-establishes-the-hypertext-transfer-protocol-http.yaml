document: rfc-7235
kind: registry
summary: This document establishes the "Hypertext Transfer Protocol (HTTP) Authentication Scheme Registry" defining the namespace for authentication schemes in challenges and credentials. New values require IETF Review. Registrations must include Authentication Scheme Name, pointer to specification text, and optional notes.
