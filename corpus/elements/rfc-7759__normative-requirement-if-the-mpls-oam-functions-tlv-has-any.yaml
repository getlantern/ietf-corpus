document: rfc-7759
kind: normative-requirement
summary: If the MPLS OAM Functions TLV has any of the L, D, or T flags set, the Performance Monitoring sub-TLV MUST be present. Failure to include the correct sub-TLVs MUST result in an 'OAM Problem/PM Configuration Error' return code.
section: 2.2.6
rfc2119_level: MUST
