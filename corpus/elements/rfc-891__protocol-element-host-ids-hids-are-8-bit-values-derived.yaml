document: rfc-891
kind: protocol-element
summary: Host IDs (HIDs) are 8-bit values derived from a specified octet of the Internet address (typically the fourth octet for class-B/C nets, the third for class-A) by subtracting ADDRESS-OFFSET. This one-to-one mapping between Internet addresses and HIDs enables indexed Host Table lookup without additional address resolution.
section: 3.1.1
topics:
    - ip
    - routing
