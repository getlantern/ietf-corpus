document: rfc-7666
kind: protocol-element
summary: The vmTable is the core table listing all virtual machines known to the hypervisor, indexed by vmIndex. Each entry (VmEntry) contains vmIndex, vmName, vmUUID, vmOSType, vmAdminState, vmOperState, vmAutoStart, vmPersistent, vmCurCpuNumber, vmMinCpuNumber, vmMaxCpuNumber, vmMemUnit, vmCurMem, vmMinMem, vmMaxMem, vmUpTime, and vmCpuTime.
