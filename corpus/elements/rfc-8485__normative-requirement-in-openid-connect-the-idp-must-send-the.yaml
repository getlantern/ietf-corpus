document: rfc-8485
kind: normative-requirement
summary: In OpenID Connect, the IdP MUST send the vector as a string in the 'vot' claim in the ID token. The trustmark URL MUST be sent in the 'vtm' claim. Both are placed inside the signed (and optionally encrypted) ID token, ensuring cryptographic binding.
section: "3.2"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
