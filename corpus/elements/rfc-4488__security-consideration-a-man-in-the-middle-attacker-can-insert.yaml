document: rfc-4488
kind: security-consideration
summary: 'A man-in-the-middle attacker can insert ''Refer-Sub: false'' to suppress NOTIFY messages without the REFER-Issuer noticing, or remove it to cause the REFER-Recipient to generate unwanted notifications. Integrity protection such as S/MIME is recommended to mitigate these attacks.'
section: "8"
topics:
