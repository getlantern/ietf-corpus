document: rfc-5053
kind: protocol-element
summary: ESI values 0 to K-1 identify source symbols in sequential order; ESI values K and above identify repair symbols. A packet must consist entirely of source symbols or entirely of repair symbols; G consecutive symbols starting from ESI X are carried in one packet.
section: 5.3.2
