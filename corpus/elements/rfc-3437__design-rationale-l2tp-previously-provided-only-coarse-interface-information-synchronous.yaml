document: rfc-3437
kind: design-rationale
summary: L2TP previously provided only coarse interface information (synchronous/asynchronous, digital/analog) to the LNS, which was insufficient for robust PPP LCP negotiation. This document introduces richer AVPs so the LNS can negotiate LCP options appropriately without direct access to the physical media.
