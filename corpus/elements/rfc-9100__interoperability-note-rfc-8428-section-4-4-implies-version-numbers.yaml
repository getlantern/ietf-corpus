document: rfc-9100
kind: interoperability-note
summary: RFC 8428 Section 4.4 implies version numbers are totally ordered (understanding v=n implies understanding all k<n), which is no longer true. Packs using any feature beyond the reserved 4 bits produce version numbers greater than 10, which RFC 8428 implementations will correctly reject as unknown versions rather than accept with false interoperability.
section: "2.2"
topics:
