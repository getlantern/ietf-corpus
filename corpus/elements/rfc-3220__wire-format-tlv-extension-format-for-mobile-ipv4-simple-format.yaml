document: rfc-3220
kind: wire-format
summary: 'TLV extension format for Mobile IPv4 (simple format): Type (1 byte), Length (1 byte, not including Type/Length), Data (variable). Extensions with Type 0-127 that are unrecognized cause the entire message to be silently discarded; Types 128-255 that are unrecognized are skipped and the rest of the message is still processed.'
section: "1.9"
