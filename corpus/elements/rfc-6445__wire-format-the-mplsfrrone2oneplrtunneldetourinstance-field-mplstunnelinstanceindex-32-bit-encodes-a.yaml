summary: 'The mplsFrrOne2OnePlrTunnelDetourInstance field (MplsTunnelInstanceIndex, 32-bit) encodes a combined key: lower 16 bits hold the protected tunnel instance, upper 16 bits hold the detour instance. A value where upper 16 bits are zero indicates the tunnel head.'
