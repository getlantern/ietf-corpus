document: rfc-3659
kind: normative-requirement
summary: Implementations MUST NOT add precision to time-vals where that precision does not exist in the underlying value being transmitted. The '.' separator MUST NOT appear unless at least one following digit also appears.
section: "2.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
