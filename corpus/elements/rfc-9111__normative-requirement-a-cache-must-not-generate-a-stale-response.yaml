document: rfc-9111
kind: normative-requirement
summary: A cache MUST NOT generate a stale response if prohibited by an explicit in-protocol directive (no-cache, must-revalidate, s-maxage, or proxy-revalidate). A cache MUST NOT generate a stale response unless it is disconnected or the client or origin server explicitly permits it.
section: 4.2.4
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
