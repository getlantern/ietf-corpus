document: rfc-9492
kind: normative-requirement
summary: In cases where multiple applications use a given link and one is RSVP-TE, attributes for applications other than RSVP-TE MUST be advertised using application-specific advertisements. Legacy advertisements are used for RSVP-TE, resulting in duplicate advertisements for shared attributes.
section: 12.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
