document: rfc-2740
kind: protocol-element
summary: 'The Link-LSA (LS type 0x0008, link-local scope) serves three purposes: (1) distributes the originating router''s link-local address to all other routers on the link for next-hop calculation; (2) informs other routers of IPv6 prefixes to associate with the link; and (3) allows the router to assert Options bits in the Network-LSA for the link.'
section: 3.4.3.6
topics:
    - routing
    - ip
