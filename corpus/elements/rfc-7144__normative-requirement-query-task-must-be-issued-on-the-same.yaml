document: rfc-7144
kind: normative-requirement
summary: QUERY TASK MUST be issued on the same connection to which the queried task is allegiant, if that connection is still active; if the connection is being logged out, a QUERY TASK may be issued on another connection, establishing new allegiance for the command.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
