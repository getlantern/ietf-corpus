document: rfc-4141
kind: normative-requirement
summary: If a CONPERM client's next-hop SMTP server does not support CONPERM or CONNEG, the client MUST terminate the session without sending the message and MUST return a DSN to the originator with status code 5.6.3 (Conversion required but not supported).
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
