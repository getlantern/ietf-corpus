document: rfc-9557
kind: normative-requirement
summary: A suffix tag marked critical (critical-flag '!') requires that the recipient MUST NOT act on the IXDTF string unless it can process the tag as specified. The application MUST reject the data or perform explicit error handling, such as prompting the user to resolve the inconsistency.
section: "3.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
