document: rfc-9525
kind: normative-requirement
summary: For SRV-ID identifiers, the application service name MUST be matched in a case-insensitive manner. For URI-ID identifiers, the scheme name portion MUST be matched in a case-insensitive manner. The application service type portion is only combined with the DNS domain name portion from the same identifier.
section: "6.5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
