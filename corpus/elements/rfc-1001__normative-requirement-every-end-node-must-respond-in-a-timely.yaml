document: rfc-1001
kind: normative-requirement
summary: Every end-node must respond in a timely fashion to NAME QUERY REQUEST challenges and NODE STATUS REQUEST packets from any node or NBNS. Failure to respond permits the NBNS to consider the end-node to have released all its registered names.
section: 15.1.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
