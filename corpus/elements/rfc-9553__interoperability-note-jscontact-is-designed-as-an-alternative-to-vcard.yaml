document: rfc-9553
kind: interoperability-note
summary: JSContact is designed as an alternative to vCard (RFC 6350), jCard (RFC 7095), and xCard (RFC 6351). RFC 9554 defines new vCard properties for JSContact-specific data, and RFC 9555 defines bidirectional conversion; however, conversion need not fully preserve semantic meaning.
section: "1.1"
topics:
