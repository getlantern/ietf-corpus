document: rfc-2492
kind: normative-requirement
summary: Where the ATM NIC has access to EUI-64 values, the IPv6/ATM interface SHOULD use one to create a unique interface token by inverting the Global/Local identifier bit. The only modification allowed to the octet string from the NIC is inversion of that bit.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
