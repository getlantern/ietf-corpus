document: rfc-5603
kind: protocol-element
summary: 'The PW-ENET-STD-MIB module is organized in a three-layer MIB framework: a service-specific layer (this module), a generic PW layer (PW-STD-MIB, RFC 5601), and a PSN-specific layer. Each layer is connected by common indexes, isolating Ethernet PW service management from the underlying PSN type.'
