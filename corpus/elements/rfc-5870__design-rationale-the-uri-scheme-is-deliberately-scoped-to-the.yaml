document: rfc-5870
kind: design-rationale
summary: 'The URI scheme is deliberately scoped to the simplest, most common case: a single point in a well-known CRS. More complex geometries (polygons, civic addresses) are explicitly out of scope, prioritizing compactness and broad applicability over expressiveness.'
