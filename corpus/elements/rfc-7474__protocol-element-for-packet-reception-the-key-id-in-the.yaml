document: rfc-7474
kind: protocol-element
summary: For packet reception, the Key ID in the OSPFv2 header is used directly to locate the corresponding key. Because OSPFv2 keys are symmetric, LocalKeyName and PeerKeyName are identical. The Direction field must be 'in' or 'both', and the receiving interface must be associated with the key.
section: "4.3"
topics:
    - routing
    - security
