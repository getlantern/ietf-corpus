document: rfc-8302
kind: normative-requirement
summary: An Address Probe ARP query (sender's protocol address is zero, per RFC 5227) or a Neighbor Solicitation for DAD with an unspecified source address (RFC 4862) SHOULD be handled the same as a generic ARP/ND request.
