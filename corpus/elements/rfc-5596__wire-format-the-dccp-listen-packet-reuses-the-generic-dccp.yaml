document: rfc-5596
kind: wire-format
summary: 'The DCCP-Listen packet reuses the generic DCCP header: 16-bit Source Port, 16-bit Dest Port, 8-bit Data Offset, 4-bit CCVal, 4-bit CsCov, 16-bit Checksum, 3-bit Res, 4-bit Type (value 10), 1-bit X (must be 1), 8-bit Reserved, 48-bit Sequence Number (ignored), and 32-bit Service Code. Data Offset MUST be ≥5 (20 bytes); CCVal and CsCov MUST be zero.'
section: 2.2.1
topics:
    - nat
    - congestion
