document: rfc-9018
kind: privacy-consideration
summary: To prevent client tracking when the client IP changes, a new Client Cookie MUST be created on IP address change, and a client MUST NOT send a previously sent Client Cookie to a server that has not been observed to support DNS Cookies. Tracking of the public IP of a NAT device is explicitly out of scope.
section: "8.1"
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
