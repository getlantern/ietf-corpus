document: rfc-2457
kind: protocol-element
summary: 'The ebnDirConfig group exposes three read-only scalars: ebnSearchCacheTime (minutes to retain multi-subnet search results), ebnMaxSearchCache (maximum cached entries), and ebnDefaultSubnetVisitCount (default maximum subnetworks a LOCATE may traverse). A value of 0 for the first two indicates no implementation-defined limit.'
section: 3.1.3
topics:
