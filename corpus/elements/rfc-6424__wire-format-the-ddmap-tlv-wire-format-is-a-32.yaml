document: rfc-6424
kind: wire-format
summary: 'The DDMAP TLV wire format is a 32-bit-aligned structure: 16-bit MTU, 8-bit Address Type, 8-bit DS Flags, variable-length Downstream Address (4 or 16 octets), variable-length Downstream Interface Address (4 or 16 octets), 8-bit Return Code, 8-bit Return Subcode, 16-bit Sub-tlv Length, followed by sub-TLVs.'
section: "3.3"
topics:
    - mpls
