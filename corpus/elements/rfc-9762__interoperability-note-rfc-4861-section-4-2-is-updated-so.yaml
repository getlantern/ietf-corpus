document: rfc-9762
kind: interoperability-note
summary: 'RFC 4861 Section 4.2 is updated so that the note about no DHCPv6 information being available now reads: ''If the M, O, or P (RFC 9762) flags are not set, this indicates that no information is available via DHCPv6.'' The P flag is thus added as a third DHCPv6-signaling indicator.'
section: "9.1"
topics:
