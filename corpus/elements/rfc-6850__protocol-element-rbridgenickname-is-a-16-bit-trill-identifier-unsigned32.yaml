document: rfc-6850
kind: protocol-element
summary: RbridgeNickname is a 16-bit TRILL identifier (Unsigned32 0..65471) that abbreviates a RBridge's 48-bit IS-IS System ID. Value 0 means unspecified; 0xFFC0–0xFFFE are reserved for future allocation; 0xFFFF is permanently reserved.
