document: rfc-8911
kind: normative-requirement
summary: Requests to add Registered Performance Metrics SHALL be submitted to IANA and forwarded to Performance Metrics Experts under the Specification Required policy. If registration criteria in Section 5 have not been met, the proposed Registry Entry MUST be removed from the submitting RFC's text until criteria are satisfied.
section: "8.1"
rfc2119_level: MUST
