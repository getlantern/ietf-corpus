document: rfc-4252
kind: wire-format
summary: Password authentication sends SSH_MSG_USERAUTH_REQUEST with 'password', boolean FALSE, and plaintext password (string, UTF-8). Password change request sends boolean TRUE with both old and new passwords (both UTF-8 strings). Server may respond with SSH_MSG_USERAUTH_PASSWD_CHANGEREQ (60) if the password has expired.
section: "8"
topics:
    - security
