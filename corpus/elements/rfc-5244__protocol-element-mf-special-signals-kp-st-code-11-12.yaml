summary: 'MF special signals (KP, ST, Code 11/12) shared between SS No. 5 and R1/MF are assigned event codes 123–127: code 123 = MF Code 11/KP3P/ST3P, 124 = MF KP/KP1, 125 = MF KP2/KP2P/ST2P, 126 = MF ST, 127 = MF Code 12/KP''/STP. All are tone-type with volume.'
