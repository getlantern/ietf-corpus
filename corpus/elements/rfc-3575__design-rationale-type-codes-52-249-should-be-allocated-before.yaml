document: rfc-3575
kind: design-rationale
summary: Type Codes 52-249 should be allocated before using 14-20, 35-39, and 46-49, preserving the latter ranges as a secondary pool. This ordering policy helps avoid fragmentation of the scarce Packet Type Code space.
