document: rfc-7460
kind: design-rationale
summary: The eoMeterCapabilitiesTable was designed to allow NMS applications to discover which monitoring tables are available without a trial-and-error polling process. Because Energy Objects vary widely in instrumentation (some support only power metering, others add energy and power attributes), a capability advertisement object is necessary to avoid wasted SNMP queries.
section: 5.1.1
topics:
    - snmp
