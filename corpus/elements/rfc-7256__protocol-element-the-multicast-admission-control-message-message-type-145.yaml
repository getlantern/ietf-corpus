document: rfc-7256
kind: protocol-element
summary: The Multicast Admission Control message (Message Type 145) is sent by the AN to the NAS to request admission of a grey-listed multicast flow or to notify the NAS of a leave; it carries a single Target TLV and a single Command TLV that may optionally embed Request-Source-IP, Request-Source-MAC, or Request-Source-Device-Id TLVs.
section: "4.4"
topics:
    - multicast
