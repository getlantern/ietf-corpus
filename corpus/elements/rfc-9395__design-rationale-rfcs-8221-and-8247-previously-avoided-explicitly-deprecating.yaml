document: rfc-9395
kind: design-rationale
summary: RFCs 8221 and 8247 previously avoided explicitly deprecating aged, unused algorithms by leaving them in a 'MAY be used' state through omission. RFC 9395 explicitly deprecates these algorithms because they are no longer advised, even though no known attacks exist against them, to eliminate ambiguity and reduce downgrade attack surface.
section: "1"
topics:
    - ipsec
    - crypto
    - security
