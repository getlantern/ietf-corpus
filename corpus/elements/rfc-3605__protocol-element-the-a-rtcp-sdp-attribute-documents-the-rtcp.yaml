document: rfc-3605
kind: protocol-element
summary: The 'a=rtcp' SDP attribute documents the RTCP port (and optionally address) for a media stream when that port is not the next higher (odd) port number following the RTP port in the media line. The attribute name is the ASCII string 'rtcp' (lowercase) and follows the general 'a=<attribute>:<value>' SDP syntax.
section: "2.1"
topics:
    - rtp
    - realtime
    - nat
