document: rfc-9110
kind: protocol-element
summary: Safe methods (GET, HEAD, OPTIONS, TRACE) are those whose semantics are read-only; the client does not request or expect any state change on the origin server. Idempotent methods (safe methods plus PUT and DELETE) produce the same result when applied multiple identical times.
section: "9.2"
topics:
    - http
