document: rfc-8106
kind: wire-format
summary: DNSSL option domain names MUST be encoded as described in RFC 1035 Section 3.1 (label sequence ending in zero octet) and MUST NOT use the compressed form from RFC 1035 Section 4.1.4. The field MUST be padded to a multiple of 8 octets with zeros.
section: "5.2"
topics:
