summary: 'The adslLineTable (indexed by ifIndex, ifType=adsl(94)) contains per-line common attributes: adslLineCoding (AdslLineCodingType), adslLineType (noChannel/fastOnly/interleavedOnly/fastOrInterleaved/fastAndInterleaved), adslLineSpecific (OID pointer to vendor MIB for shelf/slot/port), adslLineConfProfile, and adslLineAlarmConfProfile.'
