document: rfc-3560
kind: interoperability-note
summary: 'PKCS #1 Version 1.5 and PKCS #1 Version 2.1 require the same RSA public key information, so a certified RSA public key may be used with either RSA key transport technique. The choice of OID in the certificate signals which technique the key owner intends.'
