document: rfc-8827
kind: normative-requirement
summary: The identity provided from the IdP to the RP browser MUST be a string in the form '<user>@<domain>'. If the 'domain' portion equals the IdP proxy domain, the assertion is valid (authoritative). If not, the PeerConnection MUST reject the assertion unless the IdP domain is explicitly trusted as a third-party IdP and local policy permits it.
section: "8.1"
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
