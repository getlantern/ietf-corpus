document: rfc-8345
kind: security-consideration
summary: A malicious client with write access to configured (overlay) topologies can add or remove networks, nodes, links, and termination points. This can result in service disruption, suboptimal routing, or increased resource consumption in the underlay. System-controlled topologies are automatically protected from such misconfiguration by the server.
section: "8"
topics:
