document: rfc-7285
kind: wire-format
summary: 'An IRDResourceEntry is a JSON object with fields: ''uri'' (string, resolved per RFC 3986), ''media-type'' (string), optional ''accepts'' (string), optional ''capabilities'' (JSON object), and optional ''uses'' (array of ResourceID strings). A URI MUST support GET if ''accepts'' is absent, and MUST support POST if ''accepts'' is non-empty.'
section: 9.2.2
topics:
    - http
    - json
