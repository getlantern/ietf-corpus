document: rfc-5724
kind: normative-requirement
summary: SMS clients composing messages SHOULD use the standard concatenation method based on the header in the TP-User Data field. Proprietary concatenation methods SHOULD NOT be used except in closed systems where recipient capabilities are always known.
section: 1.2.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
