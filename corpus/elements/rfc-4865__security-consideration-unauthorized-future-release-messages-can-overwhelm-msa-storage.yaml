document: rfc-4865
kind: security-consideration
summary: Unauthorized future-release messages can overwhelm MSA storage; existing submission protocol authorization mechanisms are expected to defend against this. Additionally, authorized future-release without per-user quotas poses the same risk, so MSAs SHOULD impose per-user storage quotas.
section: "6"
topics:
