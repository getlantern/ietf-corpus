document: rfc-3821
kind: normative-requirement
summary: If an FCIP_DE loses synchronization with the FC Frame stream, it SHALL either close the TCP Connection and notify the FC Entity, or attempt resynchronization by scanning for a valid FCIP Frame header and discarding bytes until one is found.
section: 5.6.2.3
rfc2119_level: REQUIRED
topics:
    - tcp
