document: rfc-8800
kind: protocol-element
summary: The P (Shortest Path) flag in DISJOINTNESS-CONFIGURATION TLV indicates that the LSP SHOULD be computed first without considering diversity constraints; other LSPs with P=0 are then computed taking into account disjointness from the already-placed P=1 LSPs. This creates a one-sided dependency relationship.
section: "5.2"
topics:
    - routing
    - mpls
