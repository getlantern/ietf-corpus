document: rfc-8166
kind: normative-requirement
summary: Senders MUST NOT send RDMA_DONE messages; receivers MUST silently discard them. RDMA_DONE was associated with the Read-Read transfer model, which was never implemented.
section: 4.6.2
rfc2119_level: MUST NOT
