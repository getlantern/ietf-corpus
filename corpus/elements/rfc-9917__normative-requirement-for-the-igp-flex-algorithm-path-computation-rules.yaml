document: rfc-9917
kind: normative-requirement
summary: For the 'IGP Flex-Algorithm Path Computation Rules' registry, the relative ordering of existing rules MUST NOT be altered, rules MUST NOT be deleted, and merging or repeating of rules MUST NOT be done; a new constraint rule MAY be inserted at any position without breaking backward compatibility because unsupporting nodes will not participate in algorithms specifying unknown constraints.
section: 12.3.1
rfc2119_level: MUST NOT
topics:
    - routing
    - registry
