document: rfc-8286
kind: normative-requirement
summary: It is RECOMMENDED that the main sender insert the RTP header extension into a number of RTP packets (not all) prior to the splicing-in point, to reduce the overhead on RTP header compression.
section: "3.1"
rfc2119_level: RECOMMENDED
