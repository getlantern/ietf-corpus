document: rfc-5264
kind: normative-requirement
summary: If the initial PUBLISH request returns a 415 (Unsupported Media Type), the PUA MUST follow normal procedures for handling a 400-class response per RFC 3261 Section 8.1.3.5, and SHOULD retry the publication using the default 'application/pidf+xml' content type.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
