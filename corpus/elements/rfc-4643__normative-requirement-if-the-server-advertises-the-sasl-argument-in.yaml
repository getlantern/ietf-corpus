document: rfc-4643
kind: normative-requirement
summary: If the server advertises the SASL argument in the AUTHINFO capability, it MUST also advertise the SASL capability in response to the CAPABILITIES command, followed by a whitespace-separated list of available SASL mechanism names.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
