document: rfc-1349
kind: interoperability-note
summary: ICMP Destination Unreachable codes 11 (network unreachable for TOS) and 12 (host unreachable for TOS) were defined in RFC-1122 but omitted from RFC-792; this memo updates RFC-792 to include them. Hosts receiving these codes should treat them as routing transients rather than proof of unreachability.
section: A.1
topics:
    - ip
    - qos
