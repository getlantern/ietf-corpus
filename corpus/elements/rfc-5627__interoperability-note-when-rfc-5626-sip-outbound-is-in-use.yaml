document: rfc-5627
kind: interoperability-note
summary: When RFC 5626 (SIP outbound) is in use for multiple flows for redundancy, temporary GRUUs remain valid as long as at least one flow is registered, and if a REGISTER refresh for a reg-id changes the Call-ID, all temporary GRUUs for the entire UA instance (not just one flow) are invalidated.
section: "4.1"
topics:
    - sip
