document: rfc-6086
kind: normative-requirement
summary: A UA MUST NOT include an Info-Package header field in a legacy INFO request (one not associated with any registered Info Package). The INFO request MUST NOT contain a Recv-Info header field.
section: 4.2.1
rfc2119_level: MUST NOT
