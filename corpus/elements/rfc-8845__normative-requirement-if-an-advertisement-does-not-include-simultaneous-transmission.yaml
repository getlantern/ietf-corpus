document: rfc-8845
kind: normative-requirement
summary: If an Advertisement does not include Simultaneous Transmission Sets, the Provider MUST be able to simultaneously provide all Captures from any one CSV of each Media type from each Capture Scene, and from any particular Global View if a Global View list is present.
