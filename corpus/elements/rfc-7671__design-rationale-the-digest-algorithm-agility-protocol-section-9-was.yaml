document: rfc-7671
kind: design-rationale
summary: The digest algorithm agility protocol (Section 9) was defined because RFC 6698 specifies multiple digest algorithms but provides no protocol for clients and TLSA publishers to negotiate the strongest shared algorithm, leaving clients exposed to deprecated weak algorithms published for backward compatibility.
