document: rfc-5709
kind: design-rationale
summary: This specification retains the basic RFC 2328 mechanism rather than migrating to IPsec, due to backwards compatibility requirements and operator preference. If all routers supported IPsec, tunnels could replace this mechanism but would relegate topology to point-to-point adjacencies over the IPsec mesh.
section: "4"
topics:
    - routing
    - security
    - ipsec
