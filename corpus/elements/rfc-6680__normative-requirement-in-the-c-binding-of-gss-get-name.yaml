document: rfc-6680
kind: normative-requirement
summary: In the C-binding of GSS_Get_name_attribute(), the 'more' parameter MUST be initialized to -1 on the first call. The authenticated and complete flags MUST NOT change between multiple calls iterating over values for the same attribute.
section: 7.5.1
rfc2119_level: MUST
topics:
    - security
