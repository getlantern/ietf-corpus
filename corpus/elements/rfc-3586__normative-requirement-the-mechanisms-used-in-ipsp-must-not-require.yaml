document: rfc-3586
kind: normative-requirement
summary: The mechanisms used in IPSP must not require any protocol modifications in any of the IPsec standards (ESP, AH, IKE). The mechanisms must be independent of the SA-negotiation protocol, but may assume certain functionality from such a protocol.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
