summary: 'IANA created an "HNCP TLV Types" registry under DNCP (range 32–511, registration procedure: RFC Required) with initial entries: 32 HNCP-Version through 43 Prefix-Policy, 44–511 Unassigned, 768–1023 Reserved for Private Use. IANA also registered UDP ports 8231 (hncp-udp-port) and 8232 (hncp-dtls-port), and IPv6 multicast address FF02:0:0:0:0:0:0:11 (All-Homenet-Nodes).'
