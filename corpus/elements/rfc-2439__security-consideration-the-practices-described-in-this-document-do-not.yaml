document: rfc-2439
kind: security-consideration
summary: The practices described in this document do not further weaken BGP security. Denial of service is possible in an already insecure routing environment; route flap damping contributes to the persistence of such attacks but does not impact the methods of prevention or source determination.
section: Security Considerations
topics:
