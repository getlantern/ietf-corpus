document: rfc-8277
kind: protocol-element
summary: SAFI 4 (Labeled Unicast) is used with AFI 1 (IPv4) or AFI 2 (IPv6) to carry label bindings for IP address prefixes. SAFI 128 (Labeled VPN) is used with AFI 1 or 2 for VPN-IPv4 and VPN-IPv6 prefixes (RFC 4364, RFC 4659). Use of SAFI 4 or 128 with other AFIs is outside the scope of this document.
section: "2"
topics:
