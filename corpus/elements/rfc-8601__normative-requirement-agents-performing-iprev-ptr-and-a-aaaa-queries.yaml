document: rfc-8601
kind: normative-requirement
summary: Agents performing iprev PTR and A/AAAA queries MUST limit the number of names evaluated to avoid unduly taxing DNS infrastructure; the limit MAY be administrator-configurable. SPF's limit of 10 is cited as an example.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - dns
    - security
