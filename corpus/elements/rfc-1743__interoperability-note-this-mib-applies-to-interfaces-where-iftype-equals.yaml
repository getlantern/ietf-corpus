document: rfc-1743
kind: interoperability-note
summary: This MIB applies to interfaces where ifType equals iso88025-tokenRing(9). The 802.5 module does not preclude sub-layers above or below the 802.5 interface, but such layering is not typical. 802.5 does not support virtual circuits.
