document: rfc-4462
kind: normative-requirement
summary: Implementations of mechanisms conforming to this document MUST NOT use the results of insecure DNS queries to construct the GSS-API targ_name. If a client system is unable to securely determine the targ_name, it SHOULD NOT use this mechanism.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
