document: rfc-8008
kind: normative-requirement
summary: CDNs MUST advertise support for optional CDNI Logging fields within the context of a specific record-type. Advertising support for mandatory-to-enforce GenericMetadata types MUST be provided; advertising non-mandatory-to-enforce GenericMetadata types SHOULD be provided.
section: "4"
rfc2119_level: MUST
