document: rfc-2212
kind: wire-format
summary: 'For r, b, p, and R represented as IEEE floating-point: the sign bit MUST be zero. Exponents less than 127 (representing values < 1.0) are prohibited; exponents greater than 162 are discouraged except for infinity. Infinity is represented with exponent all-ones (255) and sign/mantissa all-zeroes.'
section: Invocation Information
