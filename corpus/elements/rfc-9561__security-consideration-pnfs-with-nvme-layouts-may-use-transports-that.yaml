document: rfc-9561
kind: security-consideration
summary: pNFS with NVMe layouts may use transports that provide no additional security (e.g., NVMe over PCIe). Physical and/or logical security measures such as air gaps and isolated VLANs may substitute for protocol-level security when appropriate for the sensitivity of the data involved.
section: "3"
topics:
    - security
