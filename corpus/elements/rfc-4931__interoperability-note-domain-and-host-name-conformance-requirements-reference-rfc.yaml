document: rfc-4931
kind: interoperability-note
summary: Domain and host name conformance requirements reference RFC 952 and RFC 1123. At the time of writing, RFC 3490 (IDNA) describes a mechanism for representing non-ASCII labels as ASCII; these requirements may change as internationalized domain name standards evolve.
