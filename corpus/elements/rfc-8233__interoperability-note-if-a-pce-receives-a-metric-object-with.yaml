document: rfc-8233
kind: interoperability-note
summary: If a PCE receives a METRIC object with a new type defined in this document, the P bit is clear, and the PCE does not understand or support that type, it SHOULD simply ignore the METRIC object per RFC 5440 processing rules, ensuring backward compatibility with legacy PCEs.
