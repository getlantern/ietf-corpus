document: rfc-6757
kind: protocol-element
summary: The Geo-Location sub-option (ANI Type=2, ANI Length=6) carries the geographic coordinates of the access network as an ellipsoid point using WGS84. Latitude and Longitude are each 24-bit two's complement fixed-point values with 9 whole bits, covering ±90° and ±180° respectively.
