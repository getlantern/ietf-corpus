document: rfc-1284
kind: protocol-element
summary: dot3TxEnabled (dot3Entry 5) is a read-write INTEGER representing the transmitEnabled layer management state variable per IEEE 802.3 [9]. Its value is false(2) whenever dot3MacSubLayerStatus is disabled(2); any transmissions in progress are completed before transmission is inhibited.
section: "5.1"
