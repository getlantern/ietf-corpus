document: rfc-8168
kind: normative-requirement
summary: 'During Renew/Rebind, if the client prefers a different prefix length than the one currently delegated, it SHOULD send the Renew/Rebind with the same IA_PD containing two IAPREFIX options: one with the currently delegated prefix and one with the prefix-length hint.'
section: "3.4"
rfc2119_level: SHOULD
topics:
