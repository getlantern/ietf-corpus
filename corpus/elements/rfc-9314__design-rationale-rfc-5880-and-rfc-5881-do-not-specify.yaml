document: rfc-9314
kind: design-rationale
summary: RFC 5880 and RFC 5881 do not specify whether the Echo function operates continuously or on-demand, so the mechanism to start and stop the Echo function is declared implementation-specific and expected to be done by augmentation — either via configuration (for continuous operation) or via RPC (for on-demand). An example augmentation is shown in Appendix A.
section: 2.1.2
topics:
    - yang
