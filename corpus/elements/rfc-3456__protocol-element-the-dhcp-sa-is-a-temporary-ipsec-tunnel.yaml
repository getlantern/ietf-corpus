document: rfc-3456
kind: protocol-element
summary: The DHCP SA is a temporary IPsec tunnel mode SA established in IKE quick mode to protect initial DHCPv4 traffic. Its filters allow UDP port 67 (server) and UDP port 68 (client) traffic in each direction, working for both new DHCPDISCOVER and renewal DHCPREQUEST messages.
section: "4.1"
topics:
