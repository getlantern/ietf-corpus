document: rfc-8158
kind: design-rationale
summary: Historic natEvent values 1 and 2 (generic NAT translation create/delete) were replaced with more specific per-event-type values because they do not specify whether the event is NAT44 or NAT64 and require additional context to qualify the event. The Behave working group decided on explicit definitions for each unique event.
section: "4.3"
topics:
