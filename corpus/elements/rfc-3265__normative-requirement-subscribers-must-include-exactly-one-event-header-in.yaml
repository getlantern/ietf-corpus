document: rfc-3265
kind: normative-requirement
summary: Subscribers MUST include exactly one 'Event' header in SUBSCRIBE requests, indicating the event package or class of events being subscribed. The event token MUST be registered with IANA.
section: 3.1.2
rfc2119_level: MUST
