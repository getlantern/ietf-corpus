document: rfc-2907
kind: normative-requirement
summary: The Count field in the Multicast Scope Nesting State option MUST be identical to the Count field in the preceding Multicast Scope List option. If they differ, the scope nesting state information MUST BE ignored.
section: "5"
rfc2119_level: MUST
