summary: 'A new IANA registry ''Extensible Authentication Protocol (EAP) Channel Binding Parameters'' is created with two sub-registries: ''EAP Channel-Binding Codes'' (values 0–255, Standards Action required, 0 reserved, initial values 1–3 defined) and ''EAP Channel-Binding Namespaces'' (values 0–255, IETF Review required, 0 reserved, initial values 1 and 255 defined).'
