document: rfc-1533
kind: protocol-element
summary: Server Identifier option (code 54, 4 octets) carries the IP address of the DHCP server. Included in DHCPOFFER to allow the client to distinguish between lease offers; included by the client in DHCPREQUEST to indicate which offer is being accepted.
section: "9.5"
