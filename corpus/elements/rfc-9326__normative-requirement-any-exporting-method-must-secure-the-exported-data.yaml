document: rfc-9326
kind: normative-requirement
summary: Any exporting method MUST secure the exported data from the IOAM node to the receiving entity to protect confidentiality and guarantee integrity. An IOAM node performing DEX exporting MUST send exported data to a pre-configured trusted receiving entity within the same IOAM-Domain.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - measurement
