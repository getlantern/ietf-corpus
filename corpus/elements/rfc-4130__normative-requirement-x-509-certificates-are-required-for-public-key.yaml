document: rfc-4130
kind: normative-requirement
summary: X.509 certificates are REQUIRED for public key handling. It is RECOMMENDED that trading partners self-certify each other if no agreed-upon certification authority is used; a CA is OPTIONAL and certificates may be self-signed.
