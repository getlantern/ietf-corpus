document: rfc-9960
kind: normative-requirement
summary: For SR-MPLS, it is RECOMMENDED to assign a Replication-SID from the SRLB since Replication segments are local to each node. It is NOT RECOMMENDED to allocate from the SRGB since this block is globally significant and may be depleted if many PTIs are instantiated.
section: "5.4"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
