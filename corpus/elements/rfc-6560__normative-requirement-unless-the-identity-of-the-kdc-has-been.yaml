document: rfc-6560
kind: normative-requirement
summary: Unless the identity of the KDC has been verified, anonymous PKINIT SHALL NOT be used with OTP algorithms that require the OTP value to be sent to the KDC (i.e., where must-encrypt-nonce is not set).
section: "6.1"
rfc2119_level: SHALL NOT
topics:
