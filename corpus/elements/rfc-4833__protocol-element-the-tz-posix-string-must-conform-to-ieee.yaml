document: rfc-4833
kind: protocol-element
summary: 'The TZ POSIX String must conform to IEEE 1003.1 Section 8.3, except it MUST NOT begin with a colon (":"). The string is not null-terminated. Example: EST5EDT4,M3.2.0/02:00,M11.1.0/02:00.'
