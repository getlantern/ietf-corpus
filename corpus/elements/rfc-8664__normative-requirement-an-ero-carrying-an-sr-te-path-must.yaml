document: rfc-8664
kind: normative-requirement
summary: An ERO carrying an SR-TE path MUST carry only SR-ERO subobjects. At least one of SID or NAI MUST be present in each SR-ERO subobject. The S and F bits MUST NOT both be set to 1.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
