document: rfc-2646
kind: normative-requirement
summary: Quoted-Printable encoding SHOULD NOT be used with Format=Flowed unless absolutely necessary (e.g., non-US-ASCII over strictly 7-bit transport). A message SHOULD NOT be QP-encoded solely to protect trailing spaces, unless the body is cryptographically signed or encrypted.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
