document: rfc-2561
kind: wire-format
summary: SnaResourceName is an OCTET STRING (SIZE 0..17) encoding a fully-qualified SNA resource name as NetId.ResName, where each component is 1–8 uppercase ASCII letters or digits with a letter as the first character. The '#', '@', '$' characters SHOULD be accepted for backward compatibility.
section: "4.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
