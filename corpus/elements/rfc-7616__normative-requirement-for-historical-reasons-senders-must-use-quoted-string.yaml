document: rfc-7616
kind: normative-requirement
summary: For historical reasons, senders MUST use quoted-string syntax for realm, domain, nonce, opaque, qop (in WWW-Authenticate), and MUST NOT use quoted-string syntax for stale and algorithm. In Authorization, MUST use quoted-string for username, realm, nonce, uri, response, cnonce, opaque; MUST NOT for algorithm, qop, nc.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
