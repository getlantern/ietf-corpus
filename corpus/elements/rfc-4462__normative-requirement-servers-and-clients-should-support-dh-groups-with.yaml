document: rfc-4462
kind: normative-requirement
summary: Servers and clients SHOULD support DH groups with modulus length k bits where 1024 <= k <= 8192 for group exchange. The recommended values for min and max are 1024 and 8192 respectively.
section: "2.2"
rfc2119_level: SHOULD
