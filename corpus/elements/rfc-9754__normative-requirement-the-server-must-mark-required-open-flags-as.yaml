document: rfc-9754
kind: normative-requirement
summary: The server MUST mark REQUIRED OPEN flags as being supported in the fattr4_open_arguments attribute. OPTIONAL flags may only become REQUIRED when the NFSv4 minor version is incremented.
section: "3"
rfc2119_level: MUST
