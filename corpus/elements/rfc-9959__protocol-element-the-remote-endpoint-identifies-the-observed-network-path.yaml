document: rfc-9959
kind: protocol-element
summary: The Remote Endpoint identifies the observed network path and consists of an identifier for the sending interface (e.g., globally assigned address/prefix) and an identifier for the destination (e.g., unicast or anycast IP address). It may also include a DSCP value. Saved CC parameters are only reused when the Remote Endpoint has not changed.
section: "2.2"
topics:
