document: rfc-5583
kind: interoperability-note
summary: A node that does not understand DDP grouping SHOULD respond to an offer containing DDP grouping either by ignoring the grouping attribute or by refusing the request (e.g., SIP 488/606). If the original offerer still wishes to communicate after a refusal caused by DDP, it SHOULD retry with a single media stream representing one Operation Point.
section: "6.1"
topics:
    - realtime
    - sip
    - rtp
