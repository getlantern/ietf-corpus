document: rfc-3472
kind: wire-format
summary: 'Admin Status TLV (type 0x082b) carries an R (Reflect) bit, Reserved bits, and three status flags: T (testing), A (administratively down), and D (delete). It is optionally carried in REQUEST, MAPPING, and Notification messages to convey or request changes to LSP administrative state.'
