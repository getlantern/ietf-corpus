document: rfc-7473
kind: interoperability-note
summary: Dynamic changes to application state advertisement after session initialization require both peers to support LDP 'Dynamic Announcement Capability' (RFC 5561). If either peer lacks this support, the only alternative is to force-reset the LDP session so that the new SAC capability can be advertised in the following Initialization message.
section: "5"
topics:
    - routing
    - mpls
