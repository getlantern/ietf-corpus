document: rfc-4998
kind: security-consideration
summary: Retrospective algorithm compromise can simultaneously invalidate many TSAs using the same algorithm. To counter this, it is recommended to maintain at least two redundant Evidence Records using different hash algorithms and different TSAs with different signature algorithms, preferably managed centrally by an LTA.
section: "7"
topics:
    - crypto
    - security
