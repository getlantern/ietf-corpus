document: rfc-6796
kind: protocol-element
summary: 'The <local-ports> element defines a policy for UA local port range expressed as ''start-end'' (inclusive, 1–65535). Default is ''1-65535''. Merging: permitted ranges are set-intersected; if the result is empty the merged value MUST be an allowed value with start port greater than end port.'
section: "5.7"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
