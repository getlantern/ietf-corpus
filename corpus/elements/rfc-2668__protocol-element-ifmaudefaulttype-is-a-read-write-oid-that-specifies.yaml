document: rfc-2668
kind: protocol-element
summary: ifMauDefaultType is a read-write OID that specifies the administratively configured MAU type. When auto-negotiation is disabled, it determines the operational type; when auto-negotiation transitions from enabled to disabled, the MAU must revert to this type.
