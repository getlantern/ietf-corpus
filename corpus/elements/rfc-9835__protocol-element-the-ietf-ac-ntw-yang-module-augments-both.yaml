document: rfc-9835
kind: protocol-element
summary: The 'ietf-ac-ntw' YANG module augments both the 'ietf-network' model (RFC 8345) and the Service Attachment Point (SAP) model (RFC 9408) to provision attachment circuits on Provider Edges. ACs are managed under network nodes, with each AC uniquely identified by a name within the scope of a node (not a network).
