document: rfc-4970
kind: security-consideration
summary: The Router Informational Capabilities TLV is less security-critical than topology information advertised by base OSPF. Security considerations for the generic RI LSA mechanism depend on future applications and should be addressed in documents defining additional capabilities. Base OSPF security is covered by RFC 2328 and RFC 2740.
section: "4"
topics:
    - routing
    - security
