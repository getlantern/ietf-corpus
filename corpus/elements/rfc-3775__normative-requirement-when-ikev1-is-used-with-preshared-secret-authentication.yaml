document: rfc-3775
kind: normative-requirement
summary: When IKEv1 is used with preshared secret authentication between the mobile node and home agent, aggressive mode MUST be used. The ID_IPV6_ADDR Identity Payload MUST NOT be used in IKEv1 phase 1.
section: "5.1"
rfc2119_level: MUST
topics:
