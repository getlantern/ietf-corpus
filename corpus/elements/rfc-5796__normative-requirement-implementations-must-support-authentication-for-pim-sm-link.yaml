document: rfc-5796
kind: normative-requirement
summary: Implementations MUST support authentication for PIM-SM link-local messages, MUST support HMAC-SHA1, MUST support ESP, and MAY support AH. ESP in transport mode provides authentication only to the PIM-SM protocol packets excluding the IP header; AH also covers selected IP header fields.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
    - routing
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
