document: rfc-1514
kind: design-rationale
summary: The ProductID textual convention uses OIDs so all products from one manufacturer are registered under a manufacturer-specific subtree, and all versions of a product under a product-specific subtree, enabling a management station to determine manufacturer and model even for unknown ProductIDs.
