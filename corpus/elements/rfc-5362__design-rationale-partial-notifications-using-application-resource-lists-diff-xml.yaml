document: rfc-5362
kind: design-rationale
summary: Partial notifications using 'application/resource-lists-diff+xml' were introduced because generating full resource-list notifications for small state changes is inefficient in bandwidth-constrained environments. The diff format reports only what has changed since the last notification.
