document: rfc-8834
kind: normative-requirement
summary: WebRTC endpoints are REQUIRED to support both session multiplexing (separate RTP sessions per media type over different transport-layer flows) and SSRC multiplexing (all RTP packet streams in a single RTP session on a single transport-layer flow, per RFC 8860).
section: "4.4"
rfc2119_level: REQUIRED
topics:
    - webrtc
    - rtp
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
