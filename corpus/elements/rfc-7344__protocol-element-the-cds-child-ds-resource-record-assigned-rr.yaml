document: rfc-7344
kind: protocol-element
summary: The CDS (Child DS) resource record, assigned RR type 59, has wire and presentation format identical to the DS record (RFC 4034). It is published in the Child zone to convey to the Parent the desired contents of the zone's DS RRset. No special processing is performed by authoritative servers or resolvers.
section: "3.1"
topics:
    - dns
    - security
    - pkix
