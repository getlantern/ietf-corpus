document: rfc-9514
kind: interoperability-note
summary: The SRv6 Capabilities TLV defined in this document is intentionally not extensible (unlike the IS-IS/OSPFv3 counterparts which allow sub-TLVs). Any future extensions are expected to be introduced as new top-level TLVs in the BGP-LS Attribute rather than sub-TLVs within the SRv6 Capabilities TLV.
section: "3.1"
topics:
    - routing
    - bgp
    - ip
