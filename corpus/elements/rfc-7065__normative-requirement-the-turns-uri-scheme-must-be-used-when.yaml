document: rfc-7065
kind: normative-requirement
summary: The "turns" URI scheme MUST be used when TURN is run over TLS-over-TCP (or, in the future, DTLS-over-UDP). The "turn" scheme MUST be used otherwise. The <secure> flag is set to false for "turn" and true for "turns" when passed to the RFC 5928 algorithm.
section: "3.2"
rfc2119_level: MUST
topics:
    - nat
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
