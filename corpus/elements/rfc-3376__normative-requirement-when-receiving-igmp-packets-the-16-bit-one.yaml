document: rfc-3376
kind: normative-requirement
summary: When receiving IGMP packets, the 16-bit one's complement checksum of the entire IP payload MUST be verified before processing a packet. The Checksum field is set to zero when computing the checksum.
section: 4.1.2
rfc2119_level: MUST
topics:
    - multicast
