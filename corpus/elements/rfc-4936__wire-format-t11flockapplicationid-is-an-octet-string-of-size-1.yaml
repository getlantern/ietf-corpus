document: rfc-4936
kind: wire-format
summary: t11FLockApplicationID is an OCTET STRING of SIZE(1) that identifies the application holding a Fabric lock. The reserved value 0xFF (255 decimal) is used to represent locks established via ACA (which have no native Application_ID), allowing uniform identification of all lock types.
