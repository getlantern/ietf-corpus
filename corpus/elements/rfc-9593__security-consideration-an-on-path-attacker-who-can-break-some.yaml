document: rfc-9593
kind: security-consideration
summary: An on-path attacker who can break some announced authentication methods online may remove all stronger method announcements, coercing peers to use a weaker method and potentially enabling a person-in-the-middle attack. Implementations should consider this threat when configuring allowed authentication methods.
section: "6"
topics:
    - ipsec
    - security
    - crypto
