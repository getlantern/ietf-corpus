document: rfc-9125
kind: security-consideration
summary: The gateway auto-discovery mechanism exposes the full set of gateways to a site across the backbone and into remote sites, enabling more comprehensive attacks. An attacker knowing all gateways could mount a coordinated Denial-of-Service attack against all gateways simultaneously, negating the resiliency benefit of multiple gateways.
section: "8"
topics:
