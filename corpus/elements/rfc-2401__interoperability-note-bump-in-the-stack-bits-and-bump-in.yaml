document: rfc-2401
kind: interoperability-note
summary: Bump-in-the-stack (BITS) and bump-in-the-wire (BITW) implementation approaches allow IPsec deployment without access to the native IP stack source code; BITW devices are typically IP-addressable and must operate as a security gateway when supporting a router or firewall.
section: "3.3"
topics:
