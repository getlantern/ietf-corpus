document: rfc-5296
kind: normative-requirement
summary: If an authenticator supports ERP and receives an EAP-Initiate/Re-auth message after having sent an EAP-Request/Identity message, it MUST proceed with the ERP exchange. It MUST NOT close the connection if an ERP exchange is in progress or has already succeeded in establishing an rMSK.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
