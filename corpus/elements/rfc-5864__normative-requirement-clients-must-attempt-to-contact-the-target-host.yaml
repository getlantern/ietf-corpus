document: rfc-5864
kind: normative-requirement
summary: Clients MUST attempt to contact the target host with the lowest-numbered priority they can reach. AFS clients using a ranked algorithm MUST assign sufficiently distinct ranks to targets with different priorities such that higher-numbered priority targets are only contacted if all lower-numbered priority targets are inaccessible.
section: "4"
rfc2119_level: MUST
topics:
    - dns
