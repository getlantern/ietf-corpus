document: rfc-1772
kind: normative-requirement
summary: BGP implementations should allow an AS to control announcements of BGP-learned routes to adjacent AS's with at least per-address-prefix granularity and per-originating-or-adjacent-AS granularity. When a newly selected route cannot be announced to a peer that received the previous route, the system must explicitly withdraw the previous route.
section: "7"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
