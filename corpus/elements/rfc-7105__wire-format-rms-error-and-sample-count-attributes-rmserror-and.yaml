document: rfc-7105
kind: wire-format
summary: RMS error and sample count attributes ('rmsError' and 'samples') are defined for numeric measurement values. 'rmsError' is expressed in the same units as the measurement; if omitted, 'samples' can be assumed large enough that rmsError equals standard deviation. A fixed MAY be provided where measurement error is technique-dependent rather than circumstance-dependent.
section: "4.2"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
