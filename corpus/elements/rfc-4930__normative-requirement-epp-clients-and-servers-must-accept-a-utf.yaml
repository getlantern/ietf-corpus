document: rfc-4930
kind: normative-requirement
summary: EPP clients and servers MUST accept a UTF-8 BOM if present, though emitting a UTF-8 BOM is NOT RECOMMENDED. UTF-8 is the RECOMMENDED character encoding for EPP per RFC 2277.
section: "2"
rfc2119_level: RECOMMENDED
