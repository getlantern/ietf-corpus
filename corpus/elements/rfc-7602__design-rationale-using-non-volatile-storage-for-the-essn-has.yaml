document: rfc-7602
kind: design-rationale
summary: 'Using non-volatile storage for the ESSN has a known drawback: if non-volatile storage is lost (hardware repair or upgrade), keys MUST be changed to prevent replay attacks, because the boot count continuity is broken.'
