document: rfc-1490
kind: protocol-element
summary: 'Frame Relay stations may optionally negotiate data link layer parameters via the Q.922 Appendix III XID exchange: maximum frame size N201 (default 260 octets), retransmission timer T200 (default 1.5 s), and maximum outstanding I-frames K (3/7/32/40 depending on link speed). A window size K of zero signals unwillingness to support acknowledged mode.'
