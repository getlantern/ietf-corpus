document: rfc-1575
kind: normative-requirement
summary: The maximum length of the echo-request packet SHALL equal the maximum length of the echo-response packet minus the maximum length of the echo-response packet header, ensuring the entire echo-request packet fits within the data field of the echo-response packet.
section: "5.4"
rfc2119_level: REQUIRED
