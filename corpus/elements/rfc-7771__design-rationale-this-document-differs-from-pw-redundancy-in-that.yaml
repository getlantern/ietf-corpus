document: rfc-7771
kind: design-rationale
summary: This document differs from [PW-REDUNDANCY] in that it provides end-to-end resiliency for static MS-PWs, whereas [PW-REDUNDANCY] provides resiliency at intermediate S-PEs and covers both dynamically signaled and static MS-PWs. The two approaches address distinct but complementary failure scenarios.
