document: rfc-8580
kind: normative-requirement
summary: The body of the filed FCC message is REQUIRED and must be composed of one or more MIME parts containing the generated message and related metadata. Content-Type header field(s) MUST be set to appropriate MIME types; if any MIME parts include 8-bit or binary data, Content-Transfer-Encoding MUST be set accordingly.
section: "4"
rfc2119_level: REQUIRED
topics:
