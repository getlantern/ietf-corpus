document: rfc-6020
kind: protocol-element
summary: 'YANG defines four fundamental data node types: leaf (single value, no children), leaf-list (sequence of uniquely identifiable values), container (child nodes only, no value), and list (multiple instances identified by one or more key leafs). These map directly to XML elements in NETCONF messages.'
