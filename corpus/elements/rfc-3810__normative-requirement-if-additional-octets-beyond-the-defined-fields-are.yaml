document: rfc-3810
kind: normative-requirement
summary: If additional octets beyond the defined fields are present in a received Query or Report, implementations MUST include those octets in checksum verification but MUST otherwise ignore them. When sending, implementations MUST NOT include additional octets beyond the defined fields.
section: 5.1.12
rfc2119_level: MUST
topics:
    - multicast
    - ip
