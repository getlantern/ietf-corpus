document: rfc-3958
kind: interoperability-note
summary: 'Domain administrators are advised to keep S-NAPTR trees shallow and narrow: fewer branches (fewer NAPTR/SRV records per level) and shallower depth (avoid using NAPTR to rename services within a zone) to limit the cost of tree retrace on failure.'
section: "3.2"
topics:
    - dns
