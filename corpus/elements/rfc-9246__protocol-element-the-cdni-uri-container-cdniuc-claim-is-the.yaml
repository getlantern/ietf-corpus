document: rfc-9246
kind: protocol-element
summary: 'The CDNI URI Container (cdniuc) claim is the sole mandatory claim; it holds the URI representation before a URI Signing Package is added. It takes one of two forms: ''hash:'' (a URL Segment hash per RFC 6920) or ''regex:'' (a POSIX Extended Regular Expression).'
section: 2.1.11
