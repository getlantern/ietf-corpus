document: rfc-3339
kind: normative-requirement
summary: Systems configured with local time that are unaware of the corresponding UTC offset and depend on time synchronization with other Internet systems MUST use a mechanism that ensures correct synchronization with UTC, such as NTP.
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
