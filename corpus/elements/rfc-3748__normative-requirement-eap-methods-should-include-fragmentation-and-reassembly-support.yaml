document: rfc-3748
kind: normative-requirement
summary: EAP methods SHOULD include fragmentation and reassembly support if their payloads can exceed the minimum EAP MTU of 1020 octets. EAP itself does not support path MTU discovery, and the basic method types (Identity, Notification, Nak, MD5-Challenge, OTP, GTC, Expanded Nak) do not provide fragmentation.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
