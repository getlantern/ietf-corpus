document: rfc-1964
kind: protocol-element
summary: 'QOP integrity values for GSS_GetMIC()/GSS_Wrap(): GSS_KRB5_INTEG_C_QOP_MD5=1 (MD2.5), GSS_KRB5_INTEG_C_QOP_DES_MD5=2 (DES MAC of MD5), GSS_KRB5_INTEG_C_QOP_DES_MAC=3. Confidentiality: GSS_KRB5_CONF_C_QOP_DES=0 (DES). Non-overlapping bit positions allow combined integrity and confidentiality selection via inclusive-OR.'
