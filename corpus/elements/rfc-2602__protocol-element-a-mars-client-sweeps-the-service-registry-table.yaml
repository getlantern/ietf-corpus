document: rfc-2602
kind: protocol-element
summary: A MARS client sweeps the service registry table via ILMI using SNMP GetNext, beginning with {Port=0, ServiceID=atmfSrvcRegMARS, Index=0} while holding port number and serviceID constant. Port 0 indicates the interface over which the management request was received.
