document: rfc-9459
kind: normative-requirement
summary: Implementations MUST use fresh keys with AES-CTR. Using static keys with AES-CTR is inappropriate because extraordinary measures would be needed to prevent IV reuse across power cycles.
section: "4"
rfc2119_level: MUST
