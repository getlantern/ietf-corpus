document: rfc-4119
kind: normative-requirement
summary: Each 'geopriv' element MUST contain exactly one 'location-info' element (minOccurs=1, maxOccurs=1). Furthermore, all PIDF documents containing a 'geopriv' element MUST include one or more XML import directives indicating the schemas used for geographic location formats.
section: 2.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
