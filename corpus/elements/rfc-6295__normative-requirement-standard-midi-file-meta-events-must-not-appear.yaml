document: rfc-6295
kind: normative-requirement
summary: Standard MIDI File meta-events MUST NOT appear in the MIDI list. Unpaired 0xF7 octets MUST NOT appear in the MIDI list, as they would interfere with SysEx segmentation coding. By default, undefined MIDI system commands (0xF4, 0xF5, 0xF9, 0xFD) MUST NOT appear in a MIDI Command field.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
