document: rfc-3454
kind: protocol-element
summary: 'Code points are categorized as: AO (allowed in output), MN (eliminated by mapping or normalization), D (disallowed by prohibition step), and U (unassigned). Stored strings MUST only contain AO code points; queries treat U code points as if they were AO.'
section: "7.1"
