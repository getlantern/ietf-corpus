document: rfc-8956
kind: wire-format
summary: Each IPv6 Flow Specification component begins with a 1-octet Type field followed by variable-length parameters. For prefix components (Types 1 and 2), the parameters are length (1 octet), offset (1 octet), pattern (variable), and padding (variable). For operator-value components, parameters are {numeric_op, value} or {bitmask_op, bitmask} pairs.
section: "3"
