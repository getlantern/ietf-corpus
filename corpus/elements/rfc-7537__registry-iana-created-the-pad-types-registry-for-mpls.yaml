summary: 'IANA created the ''Pad Types'' registry for MPLS LSP Ping. Values 0-250 and 255 require Standards Action; 251-254 are Experimental Use. Initial assignments: 0 (Reserved), 1 (Drop Pad TLV from reply), 2 (Copy Pad TLV to reply), both from RFC 4379.'
