document: rfc-5996
kind: normative-requirement
summary: An endpoint MUST NOT conclude peer failure based on ICMP messages or unprotected IKE Notify messages. Failure MUST only be concluded after repeated unanswered retransmissions or upon receiving a cryptographically protected INITIAL_CONTACT notification on a different IKE SA to the same authenticated identity.
section: "2.4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
