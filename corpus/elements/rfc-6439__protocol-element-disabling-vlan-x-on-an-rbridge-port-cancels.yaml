document: rfc-6439
kind: protocol-element
summary: Disabling VLAN-x on an RBridge port cancels its Appointed Forwarder status for VLAN-x unless VLAN-x is enabled on another port of the same RBridge on the same link. Configuring a port as trunk or point-to-point revokes any AF status that depends on that port. Re-enabling VLANs or removing trunk configuration does not by itself make the RBridge an Appointed Forwarder.
section: "2.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
