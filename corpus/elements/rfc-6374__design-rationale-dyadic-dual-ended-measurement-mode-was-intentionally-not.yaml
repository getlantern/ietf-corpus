document: rfc-6374
kind: design-rationale
summary: 'Dyadic (dual-ended) measurement mode was intentionally not specified: while it halves the message count for both endpoints, the quantity of LM traffic is expected to be low (especially with 64-bit counters), and the gain does not justify the loss of independent measurement control per node and the added operational complexity.'
