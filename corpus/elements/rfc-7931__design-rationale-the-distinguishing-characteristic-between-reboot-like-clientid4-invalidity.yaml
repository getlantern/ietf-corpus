document: rfc-7931
kind: design-rationale
summary: The distinguishing characteristic between reboot-like clientid4 invalidity and migration-related invalidity is that in reboot-like cases both the clientid4 and all associated stateids cease to exist, while in migration-related cases only the clientid4 ceases to exist on the source server and the stateids are still valid on the destination. Clients must use this distinction to select the appropriate recovery procedure.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
