document: rfc-5533
kind: protocol-element
summary: The upper-layer identifier (ULID) is the IPv6 address selected by default address selection during initial contact with a peer. It is used for pseudo-header checksum computation and connection identification; it is always one member of the host's locator set and requires no separate name space.
section: "1.3"
