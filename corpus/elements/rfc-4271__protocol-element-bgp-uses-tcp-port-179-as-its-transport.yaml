document: rfc-4271
kind: protocol-element
summary: BGP uses TCP (port 179) as its transport, relying on TCP for fragmentation, retransmission, acknowledgement, and sequencing. BGP assumes TCP supports graceful close so all outstanding data is delivered before the connection closes.
