document: rfc-4972
kind: normative-requirement
summary: If either the IPv4 or IPv6 TE-MESH-GROUP TLV/sub-TLV occurs more than once within the Router Information LSA or IS-IS Router Capability TLV, only the first instance is processed; subsequent instances SHOULD be silently ignored.
section: "5"
rfc2119_level: SHOULD
topics:
