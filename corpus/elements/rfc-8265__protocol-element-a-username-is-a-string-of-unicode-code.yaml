document: rfc-8265
kind: protocol-element
summary: A username is a string of Unicode code points structured as an ordered sequence of 'userparts', where each userpart contains only code points allowed by the PRECIS IdentifierClass. A username can be a single userpart or a space-separated sequence of userparts, expressed in a standard Unicode Encoding Form such as UTF-8.
section: "3.1"
topics:
    - security
    - privacy
