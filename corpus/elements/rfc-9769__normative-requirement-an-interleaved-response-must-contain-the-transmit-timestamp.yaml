document: rfc-9769
kind: normative-requirement
summary: An interleaved response MUST contain the transmit timestamp of the previous response whose receive timestamp matches the origin timestamp of the current request. The saved receive timestamp MUST NOT be reused to detect a subsequent interleaved request.
section: "2"
rfc2119_level: MUST
topics:
    - ntp
