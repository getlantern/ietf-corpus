document: rfc-1201
kind: design-rationale
summary: An optimum IP packet size of 504 octets is recommended to avoid ARCNET datalink fragmentation overhead. Implementations may signal this preference via the TCP MSS option (464-octet segments) or an MTU discovery mechanism announcing a 504-octet IP MTU.
section: "7"
