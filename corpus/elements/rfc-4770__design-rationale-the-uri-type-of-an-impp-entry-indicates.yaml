document: rfc-4770
kind: design-rationale
summary: The URI type of an IMPP entry indicates which protocol may be used (e.g., 'sip' for SIP/SIMPLE, 'xmpp' for XMPP, 'im' or 'pres' for CPIM/CPP gateway), but this document intentionally does not define the URI types themselves, leaving that to the respective protocol specifications.
