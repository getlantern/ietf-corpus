document: rfc-9256
kind: normative-requirement
summary: A segment list of an explicit candidate path MUST be declared invalid when it is empty, its weight is 0, it mixes SR-MPLS and SRv6 segment types, the headend cannot perform path resolution for the first SID, cannot resolve any non-first SID of type C–K, or verification fails for any SID requested to be verified.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
