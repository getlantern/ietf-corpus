document: rfc-6378
kind: state-machine
summary: 'The PSC Control logic maintains six protection domain states: Normal, Unavailable, Protecting failure, Protecting administrative, Wait-to-Restore, and Do-not-Revert. Transitions are triggered by local inputs (OAM, operator commands, WTR timer) or remote PSC messages from the far-end LER, with priority rules governing which input drives the state change.'
