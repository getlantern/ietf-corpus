document: rfc-3910
kind: normative-requirement
summary: Both 'spirits-INDPs' and 'spirits-user-prof' packages MUST NOT use URIs to retrieve state. Implementations MUST use a congestion-controlled transport if the request size is within 200 bytes of path MTU or exceeds 1300 bytes when path MTU is unknown.
section: 5.3.14
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - congestion
