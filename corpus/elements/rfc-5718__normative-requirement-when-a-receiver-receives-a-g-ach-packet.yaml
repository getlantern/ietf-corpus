document: rfc-5718
kind: normative-requirement
summary: When a receiver receives a G-ACh packet with Channel Type set to MCC or SCC and the PID value is unknown, the receiver SHALL silently discard the received packet, MAY increment a discard counter, and MAY log an event.
section: "2"
rfc2119_level: SHOULD
