document: rfc-9578
kind: normative-requirement
summary: Issuers SHOULD ensure truncated forms (least-significant byte) of new VOPRF key IDs do not collide with other truncated key IDs in rotation; collisions cause the Issuer to use the wrong private key, producing invalid tokens.
