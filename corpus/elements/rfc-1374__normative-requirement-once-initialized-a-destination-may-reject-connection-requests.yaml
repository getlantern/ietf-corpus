document: rfc-1374
kind: normative-requirement
summary: Once initialized, a Destination may reject connection requests only if the I-field was received with incorrect parity or contains invalid contents (e.g. unsupported W bit, locally administered bit set); transient conditions such as temporary buffer shortages must never cause rejected connections.
section: Rules For Connections
rfc2119_level: MUST NOT
topics:
    - ip
