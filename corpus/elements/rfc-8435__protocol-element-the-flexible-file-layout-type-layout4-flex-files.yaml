document: rfc-8435
kind: protocol-element
summary: The flexible file layout type (LAYOUT4_FLEX_FILES, value 4) is defined as a pNFS layout that allows clients to access storage devices via NFSv3, NFSv4.0, NFSv4.1, or NFSv4.2 protocols. The layout separates metadata (on the MDS) from data (on storage devices) and supports client-side mirroring.
section: "1"
