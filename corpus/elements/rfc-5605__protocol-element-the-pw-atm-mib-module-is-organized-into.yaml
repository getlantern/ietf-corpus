document: rfc-5605
kind: protocol-element
summary: 'The PW-ATM-MIB module is organized into four categories of tables: (1) a generic ATM PW configuration table (pwAtmCfgTable), (2) outbound tables for 1:1 and N:1/transparent modes, (3) inbound tables for 1:1 and N:1/transparent modes, and (4) three performance tables covering current 15-minute, historical 15-minute, and one-day intervals.'
