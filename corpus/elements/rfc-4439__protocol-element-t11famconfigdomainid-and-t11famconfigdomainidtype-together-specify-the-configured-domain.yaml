document: rfc-4439
kind: protocol-element
summary: t11FamConfigDomainId and t11FamConfigDomainIdType together specify the configured Domain_ID as type preferred (0–239, any Domain_ID acceptable as fallback), insistent (1–239, no other Domain_ID acceptable), or static (1–239, no Principal Switch, direct assignment). Failure to obtain an insistent or static Domain_ID causes E_Port isolation and a t11FamDomainIdNotAssigned notification.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
