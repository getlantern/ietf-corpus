document: rfc-4945
kind: protocol-element
summary: 'The id-kp-ipsecIKE ExtendedKeyUsage keyPurposeID (OID: { id-kp 17 }) is defined to limit certificate use to IKE. If a certificate is intended for both IKE and other EKU-requiring applications, it MUST contain id-kp-ipsecIKE or anyExtendedKeyUsage. The three legacy IPsec EKU OIDs (id-kp-ipsecEndSystem, id-kp-ipsecTunnel, id-kp-ipsecUser) are explicitly deprecated.'
section: 5.1.3.12
topics:
    - ipsec
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
