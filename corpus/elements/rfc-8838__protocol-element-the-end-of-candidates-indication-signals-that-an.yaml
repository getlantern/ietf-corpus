document: rfc-8838
kind: protocol-element
summary: The end-of-candidates indication signals that an agent has completed (or timed out) candidate gathering for a specific ICE session. It MUST specify the generation (Username Fragment and Password combination) to correlate the indication with a particular ICE session, and may be conveyed as part of the initial ICE description, alongside the last candidate, or as a standalone notification.
section: "13"
