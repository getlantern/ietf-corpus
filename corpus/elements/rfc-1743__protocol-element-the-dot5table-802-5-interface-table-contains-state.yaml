document: rfc-1743
kind: protocol-element
summary: The dot5Table (802.5 Interface Table) contains state and parameter information specific to 802.5 interfaces, with one entry per interface. Mandatory for all systems having 802.5 interfaces, in addition to the ifTable. Fields include dot5Commands, dot5RingStatus, dot5RingState, dot5RingOpenStatus, dot5RingSpeed, dot5UpStream, dot5ActMonParticipate, dot5Functional, and dot5LastBeaconSent.
