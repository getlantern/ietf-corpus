document: rfc-9066
kind: normative-requirement
summary: The 'source-prefix' parameter is mandatory when a Call Home DOTS client signals attack traffic information. The 'target-prefix' attribute MUST be included in the mitigation request. The Call Home DOTS client MUST validate that attacker prefixes are within the scope of the Call Home DOTS server domain. The prefix list MUST NOT include broadcast, loopback, or multicast addresses.
section: 5.3.1
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
