document: rfc-9603
kind: wire-format
summary: The SRv6-PCE-CAPABILITY sub-TLV (Type=27) is a variable-length sub-TLV carried inside the PATH-SETUP-TYPE-CAPABILITY TLV. Its value field contains a 2-octet Reserved field, a 2-octet Flags field (bit 14 is the N flag), and optional (MSD-Type, MSD-Value) pairs, each 1 octet each, padded to 4-octet alignment.
section: 4.1.1
topics:
    - routing
