document: rfc-2653
kind: wire-format
summary: CIP requests over TCP are formatted as MIME messages with Mime-Version and Content-Type headers using CRLF line endings. The ABNF defines Cip-Req as Req-Hdrs CRLF Req-Body, where Body is Data CRLF '.' CRLF with dot-stuffing applied.
