document: rfc-5401
kind: normative-requirement
summary: The receiver MUST maintain a history of data content received from the sender to determine its current repair needs. When FEC is employed, this history corresponds to a record of pending or partially-received coding blocks.
section: 3.2.1
rfc2119_level: MUST
topics:
    - multicast
