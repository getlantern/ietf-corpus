document: rfc-9758
kind: normative-requirement
summary: The Allocator Identifier MUST be the sole mechanism used to identify the Allocator in an ipn URI. A given Allocator Identifier MUST only be associated with a single Allocator, though an Allocator may hold multiple identifiers. Identifiers are unsigned integers in the range 0 to 2^(32-1).
section: "3.2"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
