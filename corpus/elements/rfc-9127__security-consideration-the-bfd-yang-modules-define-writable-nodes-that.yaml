document: rfc-9127
kind: security-consideration
summary: The BFD YANG modules define writable nodes that, if accessed by an unauthorized user, could disrupt BFD sessions and consequently affect network convergence for routing protocols and other BFD clients. Access to these nodes should be controlled using NETCONF access control (NACM, RFC 8341).
section: "4"
topics:
    - yang
    - netconf
    - security
