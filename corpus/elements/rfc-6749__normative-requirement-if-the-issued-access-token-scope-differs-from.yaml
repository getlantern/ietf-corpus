document: rfc-6749
kind: normative-requirement
summary: If the issued access token scope differs from the requested scope, the authorization server MUST include the 'scope' response parameter. If the client omits scope, the authorization server MUST either use a pre-defined default or fail the request.
section: "3.3"
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
