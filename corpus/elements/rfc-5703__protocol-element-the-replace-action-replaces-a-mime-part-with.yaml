document: rfc-5703
kind: protocol-element
summary: The 'replace' action replaces a MIME part with supplied text. When inside 'foreverypart', it replaces the current MIME part; when outside, it replaces the entire message. Optional ':subject' and ':from' parameters apply only when replacing the entire message.
