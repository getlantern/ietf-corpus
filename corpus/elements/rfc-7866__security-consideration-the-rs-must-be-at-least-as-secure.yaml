document: rfc-7866
kind: security-consideration
summary: The RS MUST be at least as secure as the CS. The SRC and SRS MUST support TLS 1.2 for SIP signaling, and SRTP SHOULD be used for recorded media. Downgrading from SIPS/SRTP to plain SIP/RTP in the RS is not permitted unless equivalent compensating controls are in place.
section: "12"
topics:
