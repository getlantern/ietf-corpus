document: rfc-3825
kind: wire-format
summary: 'The Datum field is 8 bits (1 byte) and specifies the map datum for the coordinates. Three values are defined: 1=WGS 84 (3D), 2=NAD83 with NAVD88 vertical datum (land use), 3=NAD83 with MLLW vertical datum (water use).'
