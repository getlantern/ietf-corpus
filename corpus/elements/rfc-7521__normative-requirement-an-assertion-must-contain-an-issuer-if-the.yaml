document: rfc-7521
kind: normative-requirement
summary: An assertion MUST contain an Issuer. If the assertion is self-issued, the Issuer MUST be the value of the client's 'client_id'. Compliant applications MUST compare Issuer values using Simple String Comparison per RFC 3986 Section 6.2.1.
section: "5.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
