document: rfc-5793
kind: normative-requirement
summary: 'PT MUST support mutual authentication of the Posture Transport Client and Server, confidentiality and integrity protection for PB-TNC batches, and replay attack protection. Additional PT requirements: connection-oriented with confirmed initiation/close (PT-6), binary data transport (PT-7), flow and congestion control (PT-8), and documented capability limitations for PB (PT-9).'
section: "3.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
