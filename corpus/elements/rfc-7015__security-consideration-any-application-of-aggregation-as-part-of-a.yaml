document: rfc-7015
kind: security-consideration
summary: Any application of aggregation as part of a data protection or anonymization scheme must address all issues raised in RFC 6235, specifically Sections 4 (Anonymization of IP Flow Data), 7.2 (IPFIX-Specific Anonymization Guidelines), and 9 (Security Considerations), as aggregation alone does not guarantee adequate anonymization.
section: "3"
topics:
    - security
    - privacy
    - measurement
