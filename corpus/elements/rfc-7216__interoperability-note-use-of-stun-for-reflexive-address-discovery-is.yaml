document: rfc-7216
kind: interoperability-note
summary: Use of STUN for reflexive address discovery is inherently brittle in the presence of multiple NATs or overlapping private address realms, because the DNS server used must be able to see the same address realm as the IP address in question. If address realms use overlapping address space, the DNS server may provide information not useful to the Device.
section: "7"
topics:
    - dns
    - nat
