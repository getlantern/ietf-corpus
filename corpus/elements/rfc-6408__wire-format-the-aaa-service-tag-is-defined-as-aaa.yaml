document: rfc-6408
kind: wire-format
summary: The aaa-service tag is defined as 'aaa+ap' followed by an appln-id of 1–10 decimal digits (no leading zeros), encoding a 32-bit unsigned Diameter Application Identifier. The aaa-protocol tag is 'diameter.' followed by 'tcp', 'sctp', or 'tls.tcp'. The combined NAPTR service field must not exceed 256 octets including a one-octet length field.
section: "3"
topics:
