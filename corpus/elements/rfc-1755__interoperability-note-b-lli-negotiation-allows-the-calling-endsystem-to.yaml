document: rfc-1755
kind: interoperability-note
summary: 'B-LLI negotiation allows the calling endsystem to include up to three B-LLI IE instances in descending preference order in the SETUP message. The called endsystem MUST select the first supported encapsulation; if none are supported it SHALL clear with cause #88 (incompatible destination); if no B-LLI IE is present in SETUP, the call SHALL be cleared with cause #21.'
section: Appendix D, Section 4
topics:
    - ip
