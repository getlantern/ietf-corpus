document: rfc-4234
kind: interoperability-note
summary: The ABNF self-description syntax in Section 4 requires relatively strict formatting of rules; a ruleset included in a specification may need preprocessing to be interpretable by an ABNF parser. The syntax also relies on the core rules defined in Appendix B.
