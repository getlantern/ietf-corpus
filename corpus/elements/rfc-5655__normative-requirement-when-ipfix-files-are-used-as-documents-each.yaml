document: rfc-5655
kind: normative-requirement
summary: When IPFIX Files are used as documents, each File MUST be readable as a single Transport Session, self-contained aside from any detached signature, and making no reference to metadata stored in separate Files, to ensure interoperability.
section: 7.3.4
rfc2119_level: MUST
