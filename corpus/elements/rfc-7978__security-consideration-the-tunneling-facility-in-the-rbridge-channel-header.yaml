document: rfc-7978
kind: security-consideration
summary: The tunneling facility in the RBridge Channel Header Extension increases risk by making it easier for unexpected messages to appear in unexpected places within a TRILL campus, either through accidents or adversarial action. Strict local acceptance policies limiting payload types and requiring appropriate security are essential mitigations.
