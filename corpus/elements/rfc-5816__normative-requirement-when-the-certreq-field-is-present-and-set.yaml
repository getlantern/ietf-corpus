document: rfc-5816
kind: normative-requirement
summary: When the certReq field is present and set to true, the TSA's public key certificate referenced by ESSCertID inside a SigningCertificate attribute or by ESSCertIDv2 inside a SigningCertificateV2 attribute in the response MUST be provided by the TSA in the certificates field from the SignedData structure.
section: "2.1"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
