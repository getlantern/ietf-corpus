document: rfc-9175
kind: privacy-consideration
summary: Like HTTP cookies, Echo option values could be abused as tracking identifiers across requests, especially preemptive values. Servers MUST NOT use the Echo option to correlate requests for purposes other than freshness and reachability. Clients MAY discard all preemptive Echo option values to limit tracking exposure.
section: "6"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
