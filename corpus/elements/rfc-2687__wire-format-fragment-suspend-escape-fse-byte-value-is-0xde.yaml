document: rfc-2687
kind: wire-format
summary: Fragment Suspend Escape (FSE) byte value is 0xDE. Within the HDLC frame data part, each FSE marks the end of a suspended fragment (E=0). A final FSE immediately before the FCS bytes indicates the last fragment is suspended with no final fragment in the frame.
