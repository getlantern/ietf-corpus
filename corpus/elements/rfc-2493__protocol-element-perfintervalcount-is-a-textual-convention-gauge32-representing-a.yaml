document: rfc-2493
kind: protocol-element
summary: PerfIntervalCount is a Textual Convention (Gauge32) representing a counter for performance measurements in a previous 15-minute interval. At the end of each interval, IntervalCount(n) is discarded, values shift (IntervalCount(i) = IntervalCount(i-1)), and IntervalCount(1) receives the CurrentCount value.
section: "6"
