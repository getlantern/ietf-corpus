document: rfc-9155
kind: design-rationale
summary: SHA-1 with HMAC as used in TLS record protection is explicitly not deprecated by this document; the deprecation applies only to digital signatures. The HMAC construction provides a distinct security profile from bare SHA-1 hashing used for signing.
section: "1"
topics:
    - tls
    - crypto
    - security
