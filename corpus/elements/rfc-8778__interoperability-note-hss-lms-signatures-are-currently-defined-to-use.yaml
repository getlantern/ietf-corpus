document: rfc-8778
kind: interoperability-note
summary: HSS/LMS signatures are currently defined to use exclusively SHA-256, and the signature algorithm has small public keys and low computational cost but produces quite large signatures (the COSE_Sign1 example is 2552 bytes). The private key size trades off against signing computation time.
