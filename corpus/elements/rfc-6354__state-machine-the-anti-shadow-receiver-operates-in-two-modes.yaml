document: rfc-6354
kind: state-machine
summary: 'The anti-shadow receiver operates in two modes: ''normal mode'' (when new data is being received, primary data goes directly to the decoder and AS data is buffered) and ''AS mode'' (when in a shadow, play-out continues from the anti-shadow buffer). The trigger to switch to AS mode is loss of new incoming data; the trigger to return to normal mode is resumption of new data arrival.'
section: A.2
topics:
    - rtp
    - realtime
