document: rfc-6388
kind: normative-requirement
summary: All leaf nodes participating in an MP2MP LSP MUST join all available root nodes for a given opaque value. A sending leaf MUST only forward a packet on one MP2MP LSP at a given point in time.
section: "7.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
