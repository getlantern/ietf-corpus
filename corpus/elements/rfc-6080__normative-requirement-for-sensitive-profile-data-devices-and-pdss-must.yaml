document: rfc-6080
kind: normative-requirement
summary: 'For sensitive profile data, devices and PDSs MUST support digest authentication over TLS per RFC 3261. In the absence of TLS, the device MUST NOT respond to any authentication challenges. Mutual authentication is required: the device challenges the PDS, which responds with the Authorization header.'
section: 5.2.1
rfc2119_level: MUST
topics:
    - sip
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
