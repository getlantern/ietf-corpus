document: rfc-2137
kind: protocol-element
summary: A dynamic secure zone is identified by containing one or more KEY RRs with a non-zero signatory field that can authorize dynamic updates, and whose zone KEY RR signatory field indicates that updates are implemented. The zone KEY RR signatory field MUST be zero if dynamic update is not supported, and MUST be non-zero if it is.
section: "2"
topics:
