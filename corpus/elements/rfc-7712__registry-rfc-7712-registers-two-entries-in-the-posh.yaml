document: rfc-7712
kind: registry
summary: 'RFC 7712 registers two entries in the ''POSH Service Names'' registry (established by RFC 7711 for use with well-known URIs per RFC 5785): ''xmpp-client'', enabling clients to verify server identity for C2S streams; and ''xmpp-server'', enabling servers to verify peer server identity for S2S streams.'
