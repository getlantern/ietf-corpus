summary: 'RADIUS defines four access-control packet codes: Access-Request (1), Access-Accept (2), Access-Reject (3), and Access-Challenge (11). Codes 4/5 (Accounting) are defined in a companion document; codes 12/13 are experimental; code 255 is reserved. Invalid code values cause silent discard.'
