document: rfc-3510
kind: protocol-element
summary: 'The IPP URL scheme syntax in ABNF is: ipp-URL = ''ipp:'' ''//'' host [ '':'' port ] [ abs_path [ ''?'' query ]]. If the port is empty or not given, port 631 is assumed. If ''abs_path'' is not present, it MUST be given as ''/'' when used as a Request-URI.'
section: "4.5"
