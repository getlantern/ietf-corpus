document: rfc-2046
kind: normative-requirement
summary: MIME implementations must at a minimum treat any unrecognized subtypes of 'application' as being equivalent to 'application/octet-stream'. Similarly, unrecognized subtypes of 'image', 'audio', and 'video' should at a minimum be treated as 'application/octet-stream'.
section: 4.5.3
rfc2119_level: MUST
topics:
    - email
