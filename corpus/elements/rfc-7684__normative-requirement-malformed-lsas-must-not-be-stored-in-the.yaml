document: rfc-7684
kind: normative-requirement
summary: Malformed LSAs MUST NOT be stored in the Link State Database (LSDB), acknowledged, or reflooded. A malformed LSA is one where a TLV or sub-TLV overruns the enclosing LSA/TLV boundary, or where remaining unparsed data is smaller than a TLV header.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
