document: rfc-9695
kind: protocol-element
summary: The 'haptics' top-level media type indicates content that requires a haptics subsystem (low-level haptics APIs and hardware actuators) to render. It does not specify the underlying data format; subtypes name the specific haptic formats.
section: "4.1"
