document: rfc-2327
kind: wire-format
summary: The bandwidth field 'b=<modifier>:<bandwidth-value>' expresses bandwidth in kilobits per second. Standard modifiers are CT (Conference Total, summed across all sites and media) and AS (Application-Specific Maximum, for a single media at a single site). Experimental modifiers use 'X-' prefix; parsers ignore unknown modifiers.
