document: rfc-9041
kind: protocol-element
summary: 'The TLV and sub-TLV code point space is divided into four registration-procedure blocks per half: Standards Action, RFC Required, Experimental Use (4 code points each, reserved/not to be assigned), and First Come First Served. This structure applies uniformly to the TLVs registry and all updated sub-TLV subregistries.'
section: "3.2"
topics:
