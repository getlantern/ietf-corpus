document: rfc-4724
kind: normative-requirement
summary: A BGP speaker MUST NOT include more than one instance of the Graceful Restart Capability in its capability advertisement. If more than one instance is carried, the receiver MUST ignore all but the last instance.
section: "3"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
