document: rfc-9290
kind: design-rationale
summary: Unlike RFC 7807, Concise Problem Details have no explicit 'problem type' field. Instead, the category of a problem is conveyed by the 'problem shape' — the combination of entries present in the data item. This avoids the overhead of a type URI in constrained environments.
section: "2"
