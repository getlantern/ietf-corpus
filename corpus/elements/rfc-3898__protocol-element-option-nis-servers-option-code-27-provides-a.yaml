document: rfc-3898
kind: protocol-element
summary: OPTION_NIS_SERVERS (option code 27) provides a list of one or more IPv6 addresses of NIS servers available to the client. The option-len field must be a multiple of 16 octets, with each NIS server address encoded as a 128-bit IPv6 address.
section: "3"
topics:
    - dns
    - registry
