document: rfc-2002
kind: security-consideration
summary: Key management for establishing mobility security associations is not defined by this protocol. Implementers must use secure out-of-band means to distribute keys. The protocol notes that datagrams forwarded through the tunnel are not encrypted by default, leaving privacy dependent on other mechanisms such as IPsec.
section: "5.3"
topics:
    - ip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
