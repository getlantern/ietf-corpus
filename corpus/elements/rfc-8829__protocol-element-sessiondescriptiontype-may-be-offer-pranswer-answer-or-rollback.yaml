document: rfc-8829
kind: protocol-element
summary: SessionDescriptionType may be 'offer', 'pranswer', 'answer', or 'rollback'. A final 'answer' MUST result in freeing unused resources. A 'pranswer' MUST NOT result in freeing allocated resources. A 'rollback' type with empty contents rolls the state machine back to the previous stable state.
section: 4.1.10
topics:
