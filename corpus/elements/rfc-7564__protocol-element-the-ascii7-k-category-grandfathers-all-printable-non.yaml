document: rfc-7564
kind: protocol-element
summary: The ASCII7 (K) category grandfathers all printable non-space 7-bit ASCII code points (U+0021–U+007E) as PVALID, exempting them from other rules on the assumption that disallowing them would be counter-productive given their ubiquity.
