document: rfc-4660
kind: security-consideration
summary: A filtered document at a subscriber may project false reality. For example, a subscriber notified only when status changes to 'open' (not back to 'closed') may believe the resource is 'open' indefinitely. Subscribers must understand what they asked for and be prepared to be out of sync with real resource state.
section: "8"
topics:
    - sip
    - security
    - realtime
