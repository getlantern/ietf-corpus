document: rfc-6772
kind: protocol-element
summary: The <provide-location> element controls the granularity of returned location information (obfuscation). It may contain a <provide-civic> child (civic-transformation profile) or a <provide-geo> child (geodetic-transformation profile). If it has no child elements, full civic and geodetic location is disclosed without granularity reduction and the 'profile' attribute MUST NOT be included.
section: "6.5"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
