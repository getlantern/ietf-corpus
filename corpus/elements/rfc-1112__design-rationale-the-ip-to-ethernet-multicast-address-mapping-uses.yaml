document: rfc-1112
kind: design-rationale
summary: The IP-to-Ethernet multicast address mapping uses only the low-order 23 bits of the 28-bit Class D address. This deliberate collision space was accepted as a tradeoff to allow a simple, stateless mapping rather than requiring a protocol to allocate Ethernet multicast addresses.
section: "6.4"
topics:
