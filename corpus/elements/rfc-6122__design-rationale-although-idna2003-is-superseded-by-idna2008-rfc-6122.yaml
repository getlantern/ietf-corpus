document: rfc-6122
kind: design-rationale
summary: Although IDNA2003 is superseded by IDNA2008, RFC 6122 normatively references IDNA2003 because that was the technology available when RFC 3920 was published in 2004. XMPP implementations are encouraged to begin migrating to IDNA2008 since the successor specification will use it.
section: "1.1"
topics:
    - dns
