kind: protocol-element
summary: pppIpRemoteToLocalCompressionProtocol indicates the IP compression protocol the remote PPP-IP entity uses when sending to the local entity; values are none(1) or vj-tcp(2). Only meaningful when pppIpOperStatus is opened.
