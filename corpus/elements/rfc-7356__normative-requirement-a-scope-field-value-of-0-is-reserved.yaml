document: rfc-7356
kind: normative-requirement
summary: A Scope field value of 0 is reserved and MUST NOT be used. Received FS-LSPs with scope 0 MUST be ignored and MUST NOT be flooded; received FS-CSNPs and FS-PSNPs with scope 0 MUST be ignored.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
