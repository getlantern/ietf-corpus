summary: 'The ''Next Protocol'' field occupies the lower 8 bits of the first 32-bit word when P=1. Defined values: 0x00 Reserved, 0x01 IPv4, 0x02 IPv6, 0x03 Ethernet, 0x04 NSH (RFC 8300), 0x05-0x7D Unassigned, 0x7E-0x7F Experimentation, 0x80-0xFD Unassigned shim headers, 0xFE-0xFF Experimentation shim headers.'
