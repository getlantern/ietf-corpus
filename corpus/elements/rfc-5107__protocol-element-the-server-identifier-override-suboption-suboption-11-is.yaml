document: rfc-5107
kind: protocol-element
summary: The Server Identifier Override Suboption (suboption 11) is a new suboption of the DHCP Relay Agent Information option that allows a relay agent to specify the value the DHCP server should place into the Server Identifier option in its reply, causing RENEW DHCPREQUESTs to be directed to the relay rather than the server.
section: "4"
topics:
    - realtime
