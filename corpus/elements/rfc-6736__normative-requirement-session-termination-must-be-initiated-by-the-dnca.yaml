document: rfc-6736
kind: normative-requirement
summary: Session termination MUST be initiated by the DNCA Diameter peer within the NAT controller via an STR message. Upon termination, all NAT-bindings belonging to the session MUST be removed and session state MUST be cleaned up by the NAT device.
section: "4.4"
rfc2119_level: MUST
topics:
    - nat
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
