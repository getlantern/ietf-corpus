document: rfc-8509
kind: protocol-element
summary: 'Two special DNS labels trigger sentinel processing in validating resolvers: ''root-key-sentinel-is-ta-<key-tag>'' asks whether the key tag identifies a currently trusted root KSK, and ''root-key-sentinel-not-ta-<key-tag>'' asks whether it does not. These labels must appear as the leftmost label of the query name.'
section: "2"
topics:
