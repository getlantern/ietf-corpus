document: rfc-2127
kind: design-rationale
summary: For hyperchannel calls, two multiplexing schemes are permitted (DS0Bundle MIB or multiple ifStackTable entries with the same HigherLayer value); the choice is left to the implementor because the ISDN MIB itself treats a hyperchannel as a single call in isdnSignalingStatsTable regardless of B channel count.
