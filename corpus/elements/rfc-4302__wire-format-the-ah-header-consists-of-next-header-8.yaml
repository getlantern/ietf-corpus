document: rfc-4302
kind: wire-format
summary: 'The AH header consists of: Next Header (8-bit), Payload Length (8-bit, in 32-bit words minus 2), Reserved (16-bit, must be zero), Security Parameters Index (32-bit), Sequence Number (32-bit), and variable-length Integrity Check Value (ICV). The protocol number for AH is 51.'
