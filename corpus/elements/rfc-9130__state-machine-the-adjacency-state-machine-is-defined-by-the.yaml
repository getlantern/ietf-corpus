summary: 'The adjacency state machine is defined by the ''adj-state-type'' enumeration with four states: ''up'' (adjacency established), ''down'' (not established), ''init'' (being established), and ''failed'' (adjacency failed). Transitions are reported via the ''adjacency-state-change'' notification.'
