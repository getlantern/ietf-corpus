document: rfc-5060
kind: protocol-element
summary: The pimInterfaceTable is indexed by both ifIndex and InetVersion, providing one row per IP version per PIM-enabled interface. This dual-index design allows a single physical interface to run PIM for IPv4 and IPv6 simultaneously as logically separate instances.
section: "5"
