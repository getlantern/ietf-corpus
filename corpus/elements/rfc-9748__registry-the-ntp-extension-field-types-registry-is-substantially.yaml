document: rfc-9748
kind: registry
summary: 'The ''NTP Extension Field Types'' registry is substantially revised: registration procedure changed to Specification Required, a range of 0xF000–0xFFFF reserved for Private or Experimental Use, many nibble-swapped Autokey values marked ''Reserved for historic reasons'', and the full corrected table of ~70 entries (including NTS fields from RFC 8915) is specified.'
