document: rfc-6810
kind: normative-requirement
summary: Client routers using TLS transport MUST present client-side certificates to authenticate themselves to the cache. The cache MUST check the IP address of the TLS connection against iPAddress identities in the client certificate's subjectAltName extension.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
