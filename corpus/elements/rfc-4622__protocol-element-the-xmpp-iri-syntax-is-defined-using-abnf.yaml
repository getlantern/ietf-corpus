kind: protocol-element
summary: 'The XMPP IRI syntax is defined using ABNF as: xmppiri = "xmpp" ":" ihierxmpp ["?" iquerycomp] ["#" ifragment], where ihierxmpp supports both authority-path and path-only forms. The path encodes the XMPP address as [inodeid "@"] ihost ["/" iresid].'
