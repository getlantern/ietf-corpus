document: rfc-8532
kind: protocol-element
summary: 'The ''ietf-connectionless-oam'' YANG module (namespace: urn:ietf:params:xml:ns:yang:ietf-connectionless-oam) is the primary base model for connectionless OAM. It augments the ''/networks/network/node'' path from ''ietf-network'' (RFC 8345) with the ''test-point-locations'' grouping, and provides configuration and state data only (no RPCs; RPCs are in RFC 8533).'
