document: rfc-8804
kind: protocol-element
summary: The Redirect Target capability object (FCI.RedirectTarget) is advertised by the dCDN via the Footprint & Capabilities Advertisement interface to indicate the target address the uCDN should use when redirecting clients to the dCDN. It contains optional 'redirecting-hosts', 'dns-target', and 'http-target' properties.
section: "2.3"
topics:
