summary: 'dsx1LineStatus is a read-only INTEGER (1..8191) bitmap representing the sum of active alarm and loopback flags: dsx1NoAlarm(1), dsx1RcvFarEndLOF(2), dsx1XmtFarEndLOF(4), dsx1RcvAIS(8), dsx1XmtAIS(16), dsx1LossOfFrame(32), dsx1LossOfSignal(64), dsx1LoopbackState(128), dsx1T16AIS(256), dsx1RcvFarEndLOMF(512), dsx1XmtFarEndLOMF(1024), dsx1RcvTestCode(2048), dsx1OtherFailure(4096). Multiple conditions can be active simultaneously.'
