document: rfc-4303
kind: protocol-element
summary: The Security Parameters Index (SPI) is a mandatory 32-bit field used by the receiver to identify the SA to which an incoming packet belongs. SPI value 0 is reserved for local implementation use and MUST NOT be sent on the wire; values 1–255 are reserved by IANA for future use.
section: "2.1"
topics:
