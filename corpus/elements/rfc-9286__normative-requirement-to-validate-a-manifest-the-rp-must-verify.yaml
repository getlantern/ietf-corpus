document: rfc-9286
kind: normative-requirement
summary: 'To validate a manifest, the RP MUST verify: (1) eContentType is id-ct-rpkiManifest, (2) rpkiManifest version is 0, and (3) thisUpdate precedes nextUpdate. An invalid manifest MUST be discarded and treated as if no manifest were present.'
section: "4.4"
rfc2119_level: MUST
topics:
