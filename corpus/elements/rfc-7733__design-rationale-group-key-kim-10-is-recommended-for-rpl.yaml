document: rfc-7733
kind: design-rationale
summary: Group key (KIM=10) is recommended for RPL message security rather than pairwise keys because the relatively confined perimeter of a home or building network makes a group key sufficient, while encryption (LVL>0) is unlikely to be necessary given the non-confidential nature of RPL message payloads.
section: 4.1.8.2.3
topics:
    - security
    - crypto
    - routing
