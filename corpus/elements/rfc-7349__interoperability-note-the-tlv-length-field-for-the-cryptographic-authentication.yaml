document: rfc-7349
kind: interoperability-note
summary: 'The TLV Length field for the Cryptographic Authentication TLV is set based on the algorithm: 24 for HMAC-SHA-1, 36 for HMAC-SHA-256, 52 for HMAC-SHA-384, and 68 for HMAC-SHA-512 (covering the SA ID, 64-bit sequence number, and authentication data fields).'
