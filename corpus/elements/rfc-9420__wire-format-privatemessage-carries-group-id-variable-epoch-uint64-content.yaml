summary: PrivateMessage carries group_id (variable), epoch (uint64), content_type, authenticated_data (variable), encrypted_sender_data (variable), and ciphertext (variable). Both ciphertext and encrypted_sender_data are AEAD-protected using keys derived from the secret tree and sender_data_secret respectively.
