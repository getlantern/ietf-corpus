document: rfc-8012
kind: protocol-element
summary: Two new DS Flags, L (Label-based load balance indicator, bit 4) and E (ELI/EL push indicator, bit 5), are added to the DDMAP TLV. These four combinations ({L=0,E=0}, {L=0,E=1}, {L=1,E=0}, {L=1,E=1}) allow a responder LSR to signal its load-balancing technique and ELI/EL push behavior to the initiating LSR.
section: "5"
topics:
