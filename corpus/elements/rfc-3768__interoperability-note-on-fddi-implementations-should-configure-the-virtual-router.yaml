document: rfc-3768
kind: interoperability-note
summary: On FDDI, implementations SHOULD configure the virtual router MAC by adding a unicast MAC filter rather than changing the hardware MAC address. Changing the hardware address would cause a Master to strip other Masters' ADVERTISEMENT frames from the ring during convergence, causing convergence failure.
section: "9.1"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
