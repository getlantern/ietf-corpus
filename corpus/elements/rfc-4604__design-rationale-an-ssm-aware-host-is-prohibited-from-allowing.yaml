document: rfc-4604
kind: design-rationale
summary: An SSM-aware host is prohibited from allowing older-version report suppression for SSM addresses because suppression would allow an attacker to send a spoofed older-version report and deny SSM service to all other hosts on the link.
section: 2.2.1
topics:
    - multicast
    - security
