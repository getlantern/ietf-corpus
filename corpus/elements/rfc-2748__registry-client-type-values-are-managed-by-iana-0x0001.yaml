document: rfc-2748
kind: registry
summary: 'Client-type values are managed by IANA: 0x0001–0x3FFF require Specification Required registration and a COPS extension document; 0x4000–0x7FFF are Private Use (not tracked); 0x8000–0xFFFF are First Come First Served (tracked for uniqueness). New C-Num/C-Type values and changes to R-Types, Reason-Codes, Error-Codes, and Decision Flags require IETF Consensus.'
