document: rfc-7782
kind: wire-format
summary: 'The AA-LAALP-GROUP-MAC APPsub-TLV (type 253) encodes: 2-byte Type, 2-byte Length (= k+8+6*n), 1-byte LAALP ID Size (k), k-byte LAALP ID, and a MAC-Reachability sub-TLV (7+6*n bytes, where n is the number of MAC addresses). Type and Length of the inner TLV are unsigned 16-bit integers per RFC 7356.'
section: 4.1.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
