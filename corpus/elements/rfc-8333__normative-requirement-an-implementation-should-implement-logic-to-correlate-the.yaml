document: rfc-8333
kind: normative-requirement
summary: An implementation SHOULD implement logic to correlate the protocol messages (LSP/LSA) received during the SPF scheduling period in order to determine the topology changes that occurred, since multiple messages may describe the same change and a single message may describe multiple changes.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - routing
