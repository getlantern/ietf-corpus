document: rfc-9622
kind: design-rationale
summary: Default Selection Property values are chosen to represent a configuration implementable over TCP, so that applications using defaults behave predictably across Transport Services Systems. Using consistent defaults benefits portability, even when TCP is not available on a given system.
section: "6.2"
topics:
