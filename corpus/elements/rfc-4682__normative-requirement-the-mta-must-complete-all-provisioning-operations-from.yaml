document: rfc-4682
kind: normative-requirement
summary: The MTA MUST complete all provisioning operations from DHCP ACK receipt through configuration file download (steps MTA5–MTA23) within the pktcMtaDevProvisioningTimer interval (0–30 minutes, default 10). If the object is set to 0, the MTA MUST ignore the provisioning timer condition.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
    - diameter
