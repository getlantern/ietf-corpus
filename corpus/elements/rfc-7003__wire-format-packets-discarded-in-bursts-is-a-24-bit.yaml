document: rfc-7003
kind: wire-format
summary: Packets Discarded in Bursts is a 24-bit unsigned field reporting total packets discarded during discard bursts. If the measured value exceeds 0xFFFFFD, 0xFFFFFE MUST be reported (over-range); if unavailable, 0xFFFFFF MUST be reported.
section: "3.2"
topics:
    - rtp
    - realtime
