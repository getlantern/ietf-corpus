document: rfc-8286
kind: normative-requirement
summary: If confidentiality of splicing time information is required, the header extension MUST be protected (e.g., using header extension encryption per RFC 6904). Additionally, the splicer MUST have mechanisms to authenticate the substitutive stream source to prevent insertion of invalid content.
section: "7"
rfc2119_level: MUST
topics:
