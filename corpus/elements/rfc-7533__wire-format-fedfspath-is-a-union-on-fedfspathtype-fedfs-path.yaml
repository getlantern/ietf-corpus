summary: 'FedFsPath is a union on FedFsPathType: FEDFS_PATH_SYS (0) is an implementation-dependent administrative pathname; FEDFS_PATH_NFS (1) is a pathname in the NFSv4 server''s single-server namespace. FedFsPathName is a variable-length array of UTF-8 FedFsPathComponent strings; the path ''/'' MUST be encoded as a zero-element array.'
