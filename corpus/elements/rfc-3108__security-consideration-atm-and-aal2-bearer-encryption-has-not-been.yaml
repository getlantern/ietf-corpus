document: rfc-3108
kind: security-consideration
summary: ATM and AAL2 bearer encryption has not been conventionalized at the time of publication; neither has the authentication or encryption of ATM or AAL2 bearer signaling. The SDP encryption key line (k=) can indicate an encryption key and retrieval method, but its use for ATM bearers is not standardized.
section: "8.1"
topics:
    - security
