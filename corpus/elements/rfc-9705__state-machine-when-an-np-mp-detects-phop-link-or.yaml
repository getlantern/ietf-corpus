document: rfc-9705
kind: state-machine
summary: 'When an NP-MP detects PHOP link or node failure, or receives a Conditional PathTear, it MUST retain PSB and RSB states until: the remote Node-ID adjacency with the PPHOP PLR goes down, a normal or Remote PathTear is received for its PSB, or a ResvTear is received for its RSB.'
section: 4.3.3
topics:
    - mpls
    - routing
