document: rfc-2920
kind: protocol-element
summary: Commands RSET, MAIL FROM, SEND FROM, SOML FROM, SAML FROM, and RCPT TO may appear anywhere in a pipelined command group. Commands EHLO, DATA, VRFY, EXPN, TURN, QUIT, and NOOP may only appear as the last command in a group because their outcome changes state the client must handle.
section: "3.1"
topics:
    - email
