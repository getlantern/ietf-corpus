document: rfc-1968
kind: normative-requirement
summary: Upon reception of a Reset-Request, the transmitting encrypter is reset to an initial state and an ECP packet MUST be transmitted with Code 15 (Reset-Ack), the Identifier copied from the Reset-Request, and any desired data.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
