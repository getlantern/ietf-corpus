document: rfc-8754
kind: design-rationale
summary: 'The TLV highest-order bit (bit 0) encodes mutability en route: 0 means TLV data does not change en route, 1 means it may change. This design allows the SRH source to build headers with predictable immutability guarantees without requiring per-TLV-type processing rules at every node.'
section: "2.1"
topics:
