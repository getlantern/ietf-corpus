document: rfc-7937
kind: privacy-consideration
summary: Logging HTTP request/response header fields (especially cookies and authorization tokens) centralizes long-lived credentials in CDNI Logging Files, creating significant risk. Implementations SHOULD restrict logged headers to a configured allowlist and SHOULD NOT support wildcard selection of header fields.
section: 3.4.1
topics:
    - privacy
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
