document: rfc-9616
kind: normative-requirement
summary: 'Implementations SHOULD use the bounded piecewise-linear cost mapping: flat at nominal hop cost C below rtt-min, linear increase between rtt-min and rtt-max, flat at C + max-rtt-penalty above rtt-max. RECOMMENDED defaults: rtt-min=10ms, rtt-max=120ms, max-rtt-penalty=150.'
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
