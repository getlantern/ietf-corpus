summary: 'A SearchRange consists of two Object Identifiers: a starting OID whose ''include'' field (boolean) indicates whether the range start is inclusive, and a non-inclusive end OID whose ''include'' field is always 0. Used in Get, GetNext, and GetBulk PDUs to bound subagent response scope.'
