document: rfc-9034
kind: protocol-element
summary: BinaryPt (6 bits) is a 2's complement signed integer in the range [-32, 31] that positions the binary point within the DT value. A positive BinaryPt increases the integer-part bits (extending range); a negative BinaryPt increases the fractional-part bits (improving sub-second precision). If zero, bits are split evenly between integer and fractional parts.
