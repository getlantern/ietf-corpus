document: rfc-9930
kind: normative-requirement
summary: The TLS version offered by the peer and server MUST be TLS version 1.2 or later. TEAP implementations MUST support TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 and TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256 cipher suites, and MUST implement recommended cipher suites per RFC 9325 (TLS 1.2) and RFC 8446 (TLS 1.3).
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
