document: rfc-9300
kind: normative-requirement
summary: An RLOC assigned a Priority of 255 in an EID-to-RLOC mapping MUST NOT be used for forwarding. When multiple RLOCs share the same best Priority, the Weight field governs load-balancing.
section: "9"
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
