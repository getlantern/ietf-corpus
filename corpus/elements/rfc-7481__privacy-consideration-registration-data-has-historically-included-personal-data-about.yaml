document: rfc-7481
kind: privacy-consideration
summary: Registration data has historically included personal data about registrants made public via WHOIS, creating privacy risks. RDAP provides authentication and tiered access mechanisms that can restrict personal data to specifically privileged clients, and status values ('private', 'redacted', 'obscured', 'proxy') to indicate restricted data.
section: "4"
topics:
