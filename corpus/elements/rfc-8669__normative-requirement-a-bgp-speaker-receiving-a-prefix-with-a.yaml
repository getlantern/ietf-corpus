document: rfc-8669
kind: normative-requirement
summary: A BGP speaker receiving a prefix with a BGP Prefix-SID attribute and a label NLRI field of Implicit NULL from a neighbor MUST adhere to standard behavior and program its MPLS data plane to pop the top label when forwarding traffic to the prefix.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - routing
