document: rfc-6243
kind: normative-requirement
summary: If the 'default' attribute is present in <edit-config>, the effective operation for the target data node MUST be 'create', 'merge', or 'replace'. Otherwise, the server MUST return an <rpc-error> with an 'invalid-value' error-tag.
section: 4.5.2
rfc2119_level: MUST
topics:
    - netconf
    - yang
