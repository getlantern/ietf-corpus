document: rfc-4860
kind: normative-requirement
summary: When a RESV message contains an RSVP-AGGREGATE FILTER_SPEC, the session MUST be defined using either the RSVP-AGGREGATE or GENERIC-AGGREGATE SESSION object. Failure to meet this MUST be treated as a message formatting error.
section: "3.1"
rfc2119_level: MUST
topics:
