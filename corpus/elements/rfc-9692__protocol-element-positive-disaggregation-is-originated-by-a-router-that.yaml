document: rfc-9692
kind: protocol-element
summary: Positive disaggregation is originated by a router that can still reach an impacted prefix and is not transitive; it causes receivers to install a more-specific route toward the advertising node. Negative disaggregation is transitive, propagated south when all possible routes are advertised as negative exceptions, effectively punching a hole in the aggregated default route to exclude unreachable next hops.
section: "6.5"
topics:
    - routing
