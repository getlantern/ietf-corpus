document: rfc-2853
kind: interoperability-note
summary: There is no guarantee that calling toString() on a GSSName will produce the same string form as the original imported string name, nor that namespace identifiers survive unchanged through the internal name form. For example, a mechanism may store an X.500 name internally when presented with a DNS name.
section: "4.13"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
