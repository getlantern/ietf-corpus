document: rfc-4207
kind: design-rationale
summary: The J0/J1/J2 trace correlation transport mechanisms support a separation of transport and control plane identifiers. Rather than transmitting the Test Message in-band over the data link, the Test Message is sent over the control channel and correlated for consistency with the received overhead byte pattern. This allows Interface_Ids used in GMPLS signaling to be decoupled from the physical trace identifiers.
section: "3.1"
topics:
    - routing
    - mpls
