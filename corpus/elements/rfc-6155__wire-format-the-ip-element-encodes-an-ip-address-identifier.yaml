document: rfc-6155
kind: wire-format
summary: 'The ''ip'' element encodes an IP address identifier: a required ''v'' attribute carries a single hexadecimal digit indicating IP version (4 or 6), and the text content uses the textual format from RFC 3986 (IPv4address or IPv6address). IPv6 addresses SHOULD follow RFC 5952 formatting conventions.'
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ip
    - realtime
