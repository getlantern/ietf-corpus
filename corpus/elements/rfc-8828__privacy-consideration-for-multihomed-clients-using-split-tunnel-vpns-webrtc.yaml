document: rfc-8828
kind: privacy-consideration
summary: For multihomed clients using split-tunnel VPNs, WebRTC ICE can discover not only the public address for the VPN but also the ISP public address over which the VPN is running, defeating anonymity goals. This is considered the most significant privacy concern.
section: "3"
topics:
    - webrtc
    - privacy
    - vpn
    - nat
