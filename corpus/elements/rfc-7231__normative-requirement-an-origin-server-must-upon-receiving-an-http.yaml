document: rfc-7231
kind: normative-requirement
summary: An origin server MUST, upon receiving an HTTP/1.1 request with a 100-continue expectation, either send an immediate final status code or an immediate 100 (Continue) response; the server MUST NOT wait for the message body before sending the 100 (Continue) response.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
