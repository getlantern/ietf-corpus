document: rfc-8577
kind: protocol-element
summary: RRO Label Sub-object Flag 0x02 (TE Link Label) indicates the recorded label is a TE link label. Flag 0x04 (Delegation Label) indicates the recorded label is a delegation label. These flags MUST be used only when TE link label use is requested or mandated for the LSP.
