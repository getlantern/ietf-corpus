document: rfc-9534
kind: normative-requirement
summary: When receiving a reflected test packet, the micro Session-Sender MUST use the Sender Micro-session ID to validate whether the packet is from the expected member link, and MUST use the Reflector Micro-session ID to validate the Reflector's behavior; validation failure in either case MUST result in the packet being discarded.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
