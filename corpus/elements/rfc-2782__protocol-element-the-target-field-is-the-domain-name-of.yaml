document: rfc-2782
kind: protocol-element
summary: The Target field is the domain name of the target host; it MUST NOT be a CNAME alias and MUST have one or more address records. A Target of "." (root domain) signals that the service is definitively not available at this domain. Name compression MUST NOT be used for this field.
section: The format of the SRV RR
topics:
    - dns
