document: rfc-4368
kind: interoperability-note
summary: When LDP is used to distribute labels for LC-ATM interfaces, label configuration information may also be available in MPLS-LDP-ATM-STD-MIB (RFC 3815); for LC-FR interfaces, in MPLS-LDP-FRAME-RELAY-STD-MIB (RFC 3815). These MIBs complement the interface configuration tables defined here.
