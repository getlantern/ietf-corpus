document: rfc-7210
kind: protocol-element
summary: The PeerKeyName field is the name of the key used by the local system in an outgoing message. For unicast, PeerKeyName on the local system matches LocalKeyName on the peer. For group keys, this field is typically an empty string since sending and receiving key names must be the same.
section: "2"
topics:
