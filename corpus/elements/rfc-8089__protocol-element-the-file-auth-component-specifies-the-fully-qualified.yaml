document: rfc-8089
kind: protocol-element
summary: The file-auth component specifies the fully qualified domain name of the system on which the file is accessible, or the special string "localhost" meaning "the machine from which the URI is being interpreted." An auth-path with no file-auth is equivalent to using "localhost".
section: "2"
