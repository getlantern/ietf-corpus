document: rfc-3463
kind: protocol-element
summary: Mailbox status codes X.2.0–X.2.4 cover conditions including mailbox disabled (X.2.1), mailbox full exceeding quota (X.2.2, should be used as persistent transient failure), per-mailbox message length limit exceeded (X.2.3, permanent failure), and mailing list expansion problem (X.2.4).
section: "3.3"
