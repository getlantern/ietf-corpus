document: rfc-3566
kind: security-consideration
summary: The security of AES-XCBC-MAC-96 is based on the strength of AES. Security also depends on the correctness of the implementation, the security of the key management mechanism, and the strength of the secret key. Test vectors are provided to assist in verifying implementation correctness.
