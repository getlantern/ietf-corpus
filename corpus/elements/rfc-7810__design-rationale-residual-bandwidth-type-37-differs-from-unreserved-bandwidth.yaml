document: rfc-7810
kind: design-rationale
summary: 'Residual bandwidth (Type 37) differs from unreserved bandwidth (RFC 5305): residual bandwidth subtracts RSVP-TE tunnel reservations from maximum link capacity and provides an aggregated remainder across priorities, making it suitable for Weighted ECMP, whereas unreserved bandwidth is per-priority and suited for call admission control.'
section: "4.5"
topics:
