document: rfc-2022
kind: interoperability-note
summary: The unique LLC/SNAP codepoint for MARS (PID 0x00-03 from the IANA OUI) differs from ATMARP, allowing MARS and ARP Server functionality to be implemented within a common entity sharing a single client-server VC if the implementor chooses. MARS clients use the source address fields to identify their own messages returned by the MARS.
section: "4.2"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
