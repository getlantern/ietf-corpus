summary: 'The F bit in Smart-MAC APPsub-TLV indicates FGL support: if set, the 24-bit VLAN/FGL field carries a Fine-Grained Label; otherwise only the lower 12 bits are used as a VLAN ID and upper 12 bits are ignored.'
