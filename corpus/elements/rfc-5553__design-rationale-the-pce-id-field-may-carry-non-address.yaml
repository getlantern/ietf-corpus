document: rfc-5553
kind: design-rationale
summary: The PCE-ID field MAY carry non-address values (e.g., Router ID) that have no meaning outside the domain, rather than a globally routable address. This design increases security and confidentiality by making the PCE-ID opaque to entities outside the domain that contains the CPS head end.
section: "3"
topics:
