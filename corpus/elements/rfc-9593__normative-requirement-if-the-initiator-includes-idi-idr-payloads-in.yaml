document: rfc-9593
kind: normative-requirement
summary: If the initiator includes IDi/IDr payloads in an IKE_INTERMEDIATE request to help the responder select appropriate authentication methods, those payloads MUST be identical to the IDi/IDr payloads sent later in the IKE_AUTH request.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
