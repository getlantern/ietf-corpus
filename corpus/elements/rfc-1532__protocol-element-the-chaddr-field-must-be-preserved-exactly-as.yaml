document: rfc-1532
kind: protocol-element
summary: The 'chaddr' field MUST be preserved exactly as supplied by the BOOTP client, using the bit ordering native to the client's link-layer network as defined by ARP. A relay agent MUST NOT reverse the bit ordering when bridging between networks that use different orderings.
section: "2.3"
topics:
    - ip
