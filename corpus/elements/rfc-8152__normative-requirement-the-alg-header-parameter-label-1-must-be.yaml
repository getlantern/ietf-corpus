document: rfc-8152
kind: normative-requirement
summary: The 'alg' header parameter (label 1) MUST be authenticated where the ability to do so exists, either by placing it in the protected header bucket or via externally supplied data. This prevents algorithm substitution attacks against COSE messages.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
