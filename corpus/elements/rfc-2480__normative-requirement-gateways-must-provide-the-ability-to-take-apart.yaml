document: rfc-2480
kind: normative-requirement
summary: Gateways MUST provide the ability to take apart multipart/signed objects, exposing the content and ruining the signature. When this approach is selected, gateways SHOULD NOT remove the signature but SHOULD keep it intact and add a note that it will probably be invalid for checking message contents.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
