document: rfc-2214
kind: protocol-element
summary: intSrvGuaranteedIfSlack is an INTEGER (0 to 0x0FFFFFFF) representing the slack Si that a network element uses to reduce resource reservations for a flow. It is computed as S = Dreq - (b/r + Ctot/r + Dtot) when the required end-to-end delay exceeds the maximum fluid flow delay.
section: "3.1"
topics:
