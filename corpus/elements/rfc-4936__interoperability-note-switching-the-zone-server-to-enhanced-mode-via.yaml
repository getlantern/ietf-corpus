document: rfc-4936
kind: interoperability-note
summary: Switching the Zone Server to Enhanced mode (via t11ZsServerOperationMode) requires all devices in the Fabric to be capable of Enhanced mode; if any device is not, the request fails and t11ZsServerChangeModeResult reflects the failure. FC-GS-5 makes no provision for switching back from Enhanced to Basic mode.
section: "7"
topics:
