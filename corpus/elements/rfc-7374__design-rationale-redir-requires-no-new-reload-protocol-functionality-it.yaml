document: rfc-7374
kind: design-rationale
summary: ReDiR requires no new RELOAD protocol functionality; it operates entirely by storing and fetching data via existing RELOAD Store and Fetch requests. This design choice keeps the mechanism simple and reusable across any RELOAD overlay without protocol changes.
section: "3"
