document: rfc-4251
kind: design-rationale
summary: Algorithm and method names use DNS-based local namespaces (name@domainname) to allow organizations to define experimental or classified extensions without central registration conflicts. This balances the need for extensibility against the risk of method-identifier collisions that would hinder interoperability.
section: "4.2"
topics:
    - registry
    - security
