document: rfc-1730
kind: normative-requirement
summary: Implementations MUST encode binary data (any string with NUL characters) into a textual form such as BASE64 before transmitting. Unencoded binary strings are not permitted in IMAP4 protocol exchanges.
section: 4.3.1
rfc2119_level: MUST
