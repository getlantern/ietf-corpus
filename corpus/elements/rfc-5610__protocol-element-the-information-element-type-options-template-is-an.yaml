document: rfc-5610
kind: protocol-element
summary: The Information Element Type Options Template is an IPFIX Options Template that encodes IE type records inline within an IPFIX Message stream. It uses informationElementId and privateEnterpriseNumber as scope fields, and includes informationElementDataType, informationElementSemantics, informationElementUnits, informationElementRangeBegin/End, informationElementName, and informationElementDescription as non-scope fields.
section: "3.9"
