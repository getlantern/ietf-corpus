document: rfc-9639
kind: protocol-element
summary: The WAVEFORMATEXTENSIBLE_CHANNEL_MASK Vorbis comment field overrides default channel assignments using 18-bit flag positions (front left through top rear right). A value of 0x0 indicates channels do not correlate with speaker positions. Files using this field are not part of the streamable subset.
section: 8.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
