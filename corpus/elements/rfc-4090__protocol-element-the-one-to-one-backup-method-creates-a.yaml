document: rfc-4090
kind: protocol-element
summary: The one-to-one backup method creates a separate detour LSP for each protected LSP at each PLR. A detour intersects the original LSP downstream of the potential failure and traffic is switched onto it in tens of milliseconds when a failure is detected.
section: "3.1"
topics:
    - mpls
    - routing
