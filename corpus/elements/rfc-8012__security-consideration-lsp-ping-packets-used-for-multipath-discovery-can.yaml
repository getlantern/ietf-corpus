document: rfc-8012
kind: security-consideration
summary: LSP ping packets used for multipath discovery can be leveraged for network reconnaissance, since sourcing or inspecting these packets reveals ECMP path topology. The extended EL-based mechanism requires additional processing on both initiator and responder nodes to compute and exchange multipath data including associated ELs.
section: "10"
topics:
    - security
    - mpls
