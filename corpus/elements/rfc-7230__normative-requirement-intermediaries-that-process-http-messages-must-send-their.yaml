document: rfc-7230
kind: normative-requirement
summary: Intermediaries that process HTTP messages MUST send their own HTTP-version in forwarded messages rather than blindly forwarding the received version, to ensure downstream recipients use accurate capability information.
section: "2.6"
rfc2119_level: MUST
