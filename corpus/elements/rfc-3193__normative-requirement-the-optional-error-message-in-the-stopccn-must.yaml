document: rfc-3193
kind: normative-requirement
summary: The optional error message in the StopCCN MUST be present and MUST contain only the ASCII encoded IP address the Responder desires to use. The IP address is encoded in dotted decimal format for IPv4 or RFC 2373 format for IPv6.
section: "4"
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
