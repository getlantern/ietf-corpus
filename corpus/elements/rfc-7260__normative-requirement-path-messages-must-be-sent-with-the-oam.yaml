document: rfc-7260
kind: normative-requirement
summary: Path messages MUST be sent with the 'OAM Alarms Enabled' Admin_Status flag cleared during OAM establishment to achieve alarm suppression while OAM entities are being configured. OAM alarms MUST be suppressed at the sink until the LSP is fully established.
section: "3.1"
rfc2119_level: MUST
topics:
