document: rfc-1985
kind: normative-requirement
summary: Since queue processing may take an indeterminate amount of time, the ETRN command should return immediately with a response to the client; there is no requirement that the outbound connection must occur or that it must occur within a given time frame.
section: "5.1"
rfc2119_level: SHOULD
topics:
