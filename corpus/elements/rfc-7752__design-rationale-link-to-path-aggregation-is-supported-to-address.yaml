document: rfc-7752
kind: design-rationale
summary: Link-to-path aggregation is supported to address scaling and privacy concerns with distributing full inter-domain topology. An ASBR may advertise an 'aggregate link' representing the properties of a multi-hop path rather than exposing individual links; the decision is an operator policy choice.
