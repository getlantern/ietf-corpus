document: rfc-4122
kind: protocol-element
summary: 'The UUID string representation is defined by ABNF as: time-low "-" time-mid "-" time-high-and-version "-" clock-seq-and-reserved clock-seq-low "-" node, yielding 32 hex digits in 8-4-4-4-12 grouping (e.g., urn:uuid:f81d4fae-7dec-11d0-a765-00a0c91e6bf6). Hex digits a–f are output as lowercase and are case-insensitive on input.'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
