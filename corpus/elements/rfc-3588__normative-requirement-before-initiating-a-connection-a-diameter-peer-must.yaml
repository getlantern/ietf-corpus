document: rfc-3588
kind: normative-requirement
summary: Before initiating a connection, a Diameter peer MUST check that its peer is authorized to act in its role. The home server MUST inspect Route-Record AVPs to verify that the route traversed by a request is acceptable; unauthorized paths MUST be rejected with DIAMETER_AUTHORIZATION_REJECTED.
section: "2.10"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
