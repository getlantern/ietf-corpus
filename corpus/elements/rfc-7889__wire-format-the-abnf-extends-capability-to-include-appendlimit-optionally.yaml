document: rfc-7889
kind: wire-format
summary: The ABNF extends 'capability' to include 'APPENDLIMIT' optionally followed by '=' and a number. 'status-att' gains 'APPENDLIMIT', and 'status-att-val' gains 'APPENDLIMIT SP (number / nil)' where number is the maximum size in octets.
