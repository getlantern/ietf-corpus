document: rfc-1220
kind: wire-format
summary: '802.3 LAN traffic is carried under PPP Protocol 0x0031. The bridging header consists of a 1-byte Flags field (bits: FCS-present, LAN-ID-present, Zero-compression, reserved, and 4-bit pad count), a 1-byte MAC Type, an optional 4-byte LAN ID, followed by the full MAC frame (Destination MAC, Source MAC, Length/Type, LLC data) and optional LAN FCS.'
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
