document: rfc-6076
kind: normative-requirement
summary: SDD for session disconnects ending in failure MUST NOT be combined in the same result with successful disconnects. Sessions ending with Timer F expiration (no response to BYE) SHOULD be excluded from the SDD metric calculation.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - realtime
    - voip
    - measurement
