document: rfc-3501
kind: protocol-element
summary: UIDVALIDITY is a 32-bit value sent in a UIDVALIDITY response code at mailbox selection time. If UIDs from an earlier session fail to persist in the current session, UIDVALIDITY MUST be greater than the value used in the earlier session, so clients can detect UID reuse.
section: 2.3.1.1
topics:
    - email
