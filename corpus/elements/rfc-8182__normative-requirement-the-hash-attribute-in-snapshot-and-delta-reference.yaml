document: rfc-8182
kind: normative-requirement
summary: The hash attribute in snapshot and delta reference elements MUST be the hexadecimal encoding of the SHA-256 hash of the referenced file, and the Relying Party MUST verify this hash upon retrieval, rejecting the file on mismatch.
section: 3.5.1.3
rfc2119_level: MUST
topics:
    - routing
    - crypto
