document: rfc-7415
kind: protocol-element
summary: The 'oc' Via header field parameter is used by clients to indicate support for overload control and by servers to indicate the maximum rate in messages per second for the rate-based algorithm. For rate-based control, the 'oc' value represents an upper bound on traffic the client may send to the server.
section: "3.2"
topics:
    - sip
    - realtime
