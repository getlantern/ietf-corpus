kind: registry
summary: The TLS ExtensionType Values registry policy was changed from IETF Review to Specification Required for values 0-254, with values 255 (first byte) reserved for Private Use. A 'Recommended' column was added, and a 'TLS 1.3' column listing which messages each extension may appear in was also added.
