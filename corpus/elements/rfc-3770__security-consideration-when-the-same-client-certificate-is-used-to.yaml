document: rfc-3770
kind: security-consideration
summary: When the same client certificate is used to authenticate to multiple WLANs, the list of SSIDs in that certificate is exposed to servers and eavesdroppers on each WLAN. Whenever SSID disclosure is a concern, different client certificates ought to be used for each WLAN.
section: "5"
topics:
    - pkix
    - security
    - privacy
