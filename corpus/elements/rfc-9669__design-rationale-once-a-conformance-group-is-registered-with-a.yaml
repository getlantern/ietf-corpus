document: rfc-9669
kind: design-rationale
summary: Once a conformance group is registered with a fixed instruction set, no further instructions can be added to it; instead, a new conformance group must be created that includes the original (via the 'includes' column) and adds the new instructions. This immutability of conformance groups ensures that conformance claims remain stable and unambiguous over time.
section: "7.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
