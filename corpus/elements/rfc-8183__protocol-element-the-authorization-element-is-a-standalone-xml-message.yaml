document: rfc-8183
kind: protocol-element
summary: The <authorization/> element is a standalone XML message signed with CMS (eContentType id-ct-xml from RFC 6492). It carries an 'authorized_sia_base' rsync:// URI and the BPKI trust anchor of the authorized entity as Base64 text. It is embedded as the Base64 content of <referral/> elements.
section: "5.3"
