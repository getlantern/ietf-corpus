document: rfc-3880
kind: protocol-element
summary: The 'proxy' node forwards the call to the current location set. It has outputs for 'busy', 'noanswer', 'redirection', 'failure', and 'default'. The 'ordering' parameter controls parallel (default), sequential, or first-only dispatch. After proxy completes, used locations are cleared from the set.
section: "6.1"
