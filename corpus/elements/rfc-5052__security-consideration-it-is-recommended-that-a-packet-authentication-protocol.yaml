document: rfc-5052
kind: security-consideration
summary: It is RECOMMENDED that a packet authentication protocol such as TESLA (RFC 4082) be used to detect and discard corrupted packets upon arrival. Furthermore, Reverse Path Forwarding checks are RECOMMENDED in all routers/switches along the sender-to-receiver path to limit bad agents from injecting corrupted packets into the multicast data path.
section: "11"
topics:
    - security
    - multicast
