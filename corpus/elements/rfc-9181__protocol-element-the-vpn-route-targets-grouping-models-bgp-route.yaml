document: rfc-9181
kind: protocol-element
summary: The 'vpn-route-targets' grouping models BGP Route Target import/export rules as a list of vpn-target entries (keyed by uint8 id), each containing a list of route-target values and a mandatory route-target-type leaf. A 'vpn-policies' container holds import-policy and export-policy string references. Applicable to both L3VPN (RFC 4364) and L2VPN (RFC 4664).
section: "3"
topics:
