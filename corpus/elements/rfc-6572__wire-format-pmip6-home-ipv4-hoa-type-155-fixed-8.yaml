summary: 'PMIP6-Home-IPv4-HoA (Type 155): fixed 8 octets — Type (1) + Length (1, = 8) + Reserved (10 bits) + Prefix-Len (6 bits) + Home IPv4 HoA (32 bits). When the HoA is all zeroes (delegation), Prefix-Len MUST be set to 32.'
