document: rfc-3369
kind: design-rationale
summary: The recipientInfos field in EnvelopedData is placed before encryptedContentInfo so that an EnvelopedData value may be processed in a single pass by a recipient who can identify and decrypt the content-encryption key before encountering the encrypted content.
section: "6.1"
topics:
    - crypto
