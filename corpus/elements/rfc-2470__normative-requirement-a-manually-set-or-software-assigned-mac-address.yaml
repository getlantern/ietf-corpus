document: rfc-2470
kind: normative-requirement
summary: A manually set or software-assigned MAC address should not be used to derive the Interface Identifier. If such a MAC address must be used, its global uniqueness property should be reflected in the U/L bit value.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
