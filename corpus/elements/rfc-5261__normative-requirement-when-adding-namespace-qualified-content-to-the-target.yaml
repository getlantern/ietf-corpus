document: rfc-5261
kind: normative-requirement
summary: When adding namespace-qualified content to the target document, the agent MUST ensure the target document contains the same namespace declaration (same URI, prefix MAY differ). The namespace prefix in the patched document is resolved by priority rules based on the evaluation context node's in-scope prefixes.
section: 4.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
