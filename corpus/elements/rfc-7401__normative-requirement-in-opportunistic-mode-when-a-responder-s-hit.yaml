document: rfc-7401
kind: normative-requirement
summary: In opportunistic mode, when a Responder's HIT Suite is not supported, the Initiator MUST treat R1 packets with unsupported Responder HITs as potentially forged and MUST NOT use any parameters from the unverified R1 besides the HIT_SUITE_LIST.
section: 4.1.8
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
    - ip
