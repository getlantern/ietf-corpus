document: rfc-7151
kind: normative-requirement
summary: A server-PI that receives a USER command without a prior HOST command SHOULD NOT reject the USER command, since clients conforming to earlier FTP specifications do not send HOST commands.
section: "3.3"
rfc2119_level: SHOULD NOT
