document: rfc-7510
kind: normative-requirement
summary: MPLS-in-UDP MUST only be deployed within a single network (single operator) or networks of a closely cooperating adjacent set of operators where traffic is managed to avoid congestion, rather than over the Internet where congestion control is required.
section: "1.3"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - congestion
