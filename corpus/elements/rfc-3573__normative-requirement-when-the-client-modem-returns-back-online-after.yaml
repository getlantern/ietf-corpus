document: rfc-3573
kind: normative-requirement
summary: When the client modem returns back online after having gone on-hold, the LAC SHOULD send a MDMST control message with H=0. The LAC MUST send this message if it previously sent a MDMST with H=1.
section: "2.4"
rfc2119_level: MUST
topics:
    - realtime
