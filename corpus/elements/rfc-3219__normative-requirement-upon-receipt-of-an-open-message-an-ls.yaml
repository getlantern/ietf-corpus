document: rfc-3219
kind: normative-requirement
summary: Upon receipt of an OPEN message, an LS MUST calculate the Hold Timer as the minimum of its configured Hold Time and the received Hold Time. The Hold Time MUST be either zero or at least 3 seconds.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - voip
