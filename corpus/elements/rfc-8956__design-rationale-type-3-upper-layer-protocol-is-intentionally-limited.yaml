document: rfc-8956
kind: design-rationale
summary: Type 3 (Upper-Layer Protocol) is intentionally limited to matching only the first upper-layer IP protocol value, even though IPv6 allows more than one Next Header field. This design choice avoids ambiguity and complexity in matching across extension header chains.
section: "3.3"
topics:
