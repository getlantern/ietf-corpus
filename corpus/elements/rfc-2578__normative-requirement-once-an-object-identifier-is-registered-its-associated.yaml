document: rfc-2578
kind: normative-requirement
summary: Once an OBJECT IDENTIFIER is registered, its associated semantics are not allowed to change and the OID cannot be used for any other registration. Obsolete definitions must not be removed from MIB modules since their OIDs must never be re-assigned.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - snmp
    - registry
