document: rfc-1755
kind: interoperability-note
summary: 'UNI 3.1 and UNI 3.0 are incompatible. Key differences: UNI 3.0 lacks the ''ATM Endsystem Address'' type (NSAP type=001 must be used in subaddress IEs); cause codes differ (#93 vs #78 for AAL parameter not supported; #51 vs #37 for user cell rate unavailable); and the QoS coding standard field should be ''11'' in UNI 3.0 rather than ''00''.'
section: Appendix B
topics:
