document: rfc-6388
kind: wire-format
summary: 'The P2MP FEC Element (type 0x06) encodes: 1-octet type, 2-octet Address Family, 1-octet Address Length, variable-length Root Node Address, 2-octet Opaque Length, and variable-length Opaque Value. The combination of (Root Node Address type, Root Node Address, Opaque Value) uniquely identifies a P2MP LSP.'
section: "2.2"
