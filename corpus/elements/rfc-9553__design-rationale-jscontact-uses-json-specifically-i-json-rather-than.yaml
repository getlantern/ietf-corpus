document: rfc-9553
kind: design-rationale
summary: JSContact uses JSON (specifically I-JSON) rather than XML or a vCard syntax because JSON's widespread adoption lowers the barrier to adoption, and production-ready JSON implementations eliminate a whole category of parser-related interoperability issues.
