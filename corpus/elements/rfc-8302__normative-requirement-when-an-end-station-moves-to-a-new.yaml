document: rfc-8302
kind: normative-requirement
summary: When an end station moves to a new edge RBridge (MAC/VM mobility), the old ARP/ND cache entry on the previous RBridge SHOULD be replaced, and all other edge RBridges with end-station service enabled for that Data Label should update the entry to show reachability from the new RBridge.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
