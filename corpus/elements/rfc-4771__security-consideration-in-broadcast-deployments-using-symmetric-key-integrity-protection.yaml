document: rfc-4771
kind: security-consideration
summary: In broadcast deployments using symmetric-key integrity protection, gaining access to the integrity key (e.g., by purchasing a subscription and extracting the key from a terminal) may be as easy as gaining transmit capability, undermining the group integrity model.
