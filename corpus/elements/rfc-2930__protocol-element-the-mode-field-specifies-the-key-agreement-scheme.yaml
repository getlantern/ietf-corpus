document: rfc-2930
kind: protocol-element
summary: 'The Mode field specifies the key agreement scheme. Defined values are: 0 (reserved), 1 (server assignment), 2 (Diffie-Hellman exchange), 3 (GSS-API negotiation), 4 (resolver assignment), 5 (key deletion), 6-65534 (available), 65535 (reserved). Servers and resolvers MUST implement DH exchange (mode 2) and key deletion (mode 5); all others are OPTIONAL.'
section: "2.5"
topics:
