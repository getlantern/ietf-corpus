summary: 'This document defines OIDs under the id-aca arc ({ id-pkix 10 }) for standard AC attribute types: id-aca-authenticationInfo (1), id-aca-accessIdentity (2), id-aca-chargingIdentity (3), id-aca-group (4), and id-aca-encAttrs (6). It also defines AC extension OIDs id-pe-ac-auditIdentity ({ id-pe 4 }), id-pe-aaControls ({ id-pe 6 }), id-pe-ac-proxying ({ id-pe 10 }), and id-ce-targetInformation ({ id-ce 55 }). No new IANA action is required; OIDs are from arcs delegated to the PKIX working group.'
