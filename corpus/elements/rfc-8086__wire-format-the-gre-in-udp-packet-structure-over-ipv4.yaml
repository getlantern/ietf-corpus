summary: 'The GRE-in-UDP packet structure over IPv4 consists of: IPv4 header (Protocol=17/UDP), UDP header (Source Port=entropy value, Dest Port=4754/4755, Length, Checksum), then GRE header (C/K/S flags, Reserved0, Ver, Protocol Type, optional Checksum, Key, and Sequence Number fields).'
