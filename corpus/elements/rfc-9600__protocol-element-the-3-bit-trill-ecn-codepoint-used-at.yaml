summary: 'The 3-bit TRILL ECN codepoint used at egress is derived by combining the 2-bit TRILL-ECN field and the 1-bit CCE field per Table 2: if either NCCE or CCE is set, the 3-bit codepoint is CE; otherwise it matches the TRILL-ECN value.'
