document: rfc-9884
kind: design-rationale
summary: Six distinct sub-TLVs are required because a PSID can have three different scopes of identification—all segment lists in an SR Policy, all segment lists in a Candidate Path, or a specific segment list—and each scope requires a different set of identifying fields, necessitating separate sub-TLV types for IPv4 and IPv6.
section: "3"
topics:
