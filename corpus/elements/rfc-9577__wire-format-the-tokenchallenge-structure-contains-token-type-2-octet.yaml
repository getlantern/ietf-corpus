document: rfc-9577
kind: wire-format
summary: 'The TokenChallenge structure contains: token_type (2-octet uint16 in network byte order), issuer_name (ASCII string, length-prefixed with 2-octet uint16), redemption_context (0 or 32 bytes, prefixed with 1-octet length), and origin_info (ASCII string, length-prefixed with 2-octet uint16). Future token types MAY extend this structure.'
