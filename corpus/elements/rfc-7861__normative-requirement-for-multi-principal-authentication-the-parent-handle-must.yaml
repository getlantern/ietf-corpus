document: rfc-7861
kind: normative-requirement
summary: For multi-principal authentication, the parent handle MUST correspond to a GSS-API security context authenticating the RPC client host, and the inner context handle MUST authenticate the user; the reverse MUST NOT be used.
section: 2.7.1.1
rfc2119_level: MUST NOT
