document: rfc-5775
kind: interoperability-note
summary: When using Any-Source Multicast (ASM), the congestion control building block may be adversely affected by delays due to Rendezvous Points (RPs) and MSDP, and by packet loss during switchover from (*,G) to (S,G) joins. To ameliorate these concerns, it is recommended to ensure the RP is as close to the sender as possible; Source-Specific Multicast (SSM) does not share these issues.
section: "1.3"
topics:
    - multicast
    - congestion
