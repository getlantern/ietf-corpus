document: rfc-2215
kind: protocol-element
summary: 'Characterization parameter composition follows a 6-step algorithm: service-specific parameters are composed using the specified service''s local value; general parameters arriving as service-specific values are composed with either the local service-specific or global value; global arriving values are composed with all service-specific local values (generating new service-specific results) and also with the global local value.'
