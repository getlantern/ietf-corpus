document: rfc-4607
kind: protocol-element
summary: 'Source-Specific Multicast (SSM) is identified by the (S,G) pair: a unicast source address S combined with an SSM destination address G. A datagram is delivered only to sockets that have specifically requested reception of datagrams from source S to address G.'
