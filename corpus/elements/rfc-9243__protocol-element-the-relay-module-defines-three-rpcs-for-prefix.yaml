document: rfc-9243
kind: protocol-element
summary: 'The relay module defines three RPCs for prefix delegation lease management (all guarded by prefix-delegation feature): clear-prefix-entry (removes a single delegated prefix lease), clear-client-prefixes (removes all leases for a client DUID), and clear-interface-prefixes (removes all leases for a relay interface).'
section: "3.2"
