document: rfc-895
kind: interoperability-note
summary: Some versions of Unix 4.2bsd use a trailer encapsulation method for better performance with the VAX virtual memory architecture. No host is required to implement it, and datagrams in trailer format must not be sent unless the sender has positive knowledge that the recipient can interpret them.
section: Trailer Formats
topics:
    - ip
