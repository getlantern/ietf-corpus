document: rfc-9470
kind: design-rationale
summary: The terms 'authentication level' and 'step up' are explicitly described as metaphors. There is no absolute, interoperable hierarchy of authentication methods; the 'level' concept emerges solely from the resource server's acceptance threshold, not from any standardized ranking.
