document: rfc-5986
kind: design-rationale
summary: The domain name input to U-NAPTR (not the output URI's domain) is used for LIS authentication. This design means DNS query results need no integrity protection, simplifying the security model at the cost of requiring matching domain names in the DHCP option and resulting URI.
section: "5"
topics:
    - security
    - dns
