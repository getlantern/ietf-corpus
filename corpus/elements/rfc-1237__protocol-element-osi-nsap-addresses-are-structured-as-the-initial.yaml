document: rfc-1237
kind: protocol-element
summary: OSI NSAP addresses are structured as the Initial Domain Part (IDP) and Domain Specific Part (DSP). DIS10589 further subdivides the DSP into High Order DSP (HO-DSP), System Identifier (ID), and NSAP Selector (SEL). The combination of [IDP, HO-DSP] constitutes the area address.
section: "3.2"
topics:
    - routing
