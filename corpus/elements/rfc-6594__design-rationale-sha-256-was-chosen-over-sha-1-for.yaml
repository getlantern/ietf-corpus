document: rfc-6594
kind: design-rationale
summary: SHA-256 was chosen over SHA-1 for SSHFP fingerprints because SHA-1 attacks (such as Wang et al.'s 2^63 SHA-1 differential path) erode confidence in SHA-1, making SHA-256 the better choice regardless of whether those specific attacks affect SSHFP.
