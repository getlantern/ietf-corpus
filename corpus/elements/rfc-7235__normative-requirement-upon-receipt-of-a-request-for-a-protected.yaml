document: rfc-7235
kind: normative-requirement
summary: Upon receipt of a request for a protected resource that omits credentials, contains invalid credentials, or partial credentials, an origin server SHOULD send a 401 (Unauthorized) response containing a WWW-Authenticate header field with at least one applicable challenge.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - http
    - security
