document: rfc-9525
kind: protocol-element
summary: URI-ID is a subjectAltName entry of type uniformResourceIdentifier as defined in PKIX. It is direct and restricted to a specific application service type. The DNS domain name portion is the 'reg-name' part of the 'host' component and the application service type portion is the URI scheme.
section: "1.5"
topics:
    - tls
    - pkix
