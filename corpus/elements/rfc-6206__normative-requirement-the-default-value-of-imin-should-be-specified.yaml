document: rfc-6206
kind: normative-requirement
summary: The default value of Imin SHOULD be specified in terms of the worst-case latency of a link-layer transmission (e.g., 'four times the worst-case link-layer latency') rather than as an absolute time value, to accommodate varying link-layer properties.
section: "5"
rfc2119_level: SHOULD
topics:
    - realtime
