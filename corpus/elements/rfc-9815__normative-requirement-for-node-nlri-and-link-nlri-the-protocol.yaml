document: rfc-9815
kind: normative-requirement
summary: For Node NLRI and Link NLRI, the Protocol-ID field MUST be set to the direct protocol (4); an NLRI with any other Protocol-ID is considered malformed. For Prefix NLRI, the Protocol-ID MUST reflect the origin of the prefix.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
