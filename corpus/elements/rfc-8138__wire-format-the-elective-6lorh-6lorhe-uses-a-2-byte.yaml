document: rfc-8138
kind: wire-format
summary: 'The Elective 6LoRH (6LoRHE) uses a 2-byte base header: bits 10 1 followed by a 5-bit Length field (bytes of payload excluding the base 2 bytes) and an 8-bit Type field. A node may ignore and skip a 6LoRHE whose Type is unrecognized, forwarding it unchanged.'
section: "4.1"
