document: rfc-4426
kind: normative-requirement
summary: For dedicated 1:1 span protection, a Switchover Request message MUST be used to signal the switchover request; this can be done using LMP. GMPLS-based mechanisms MAY not be necessary when the underlying transport technology provides such a mechanism.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
