document: rfc-9963
kind: interoperability-note
summary: TPM specifications prior to 2.0 did not define RSASSA-PSS support; TPM 2.0 devices are only reliable for TLS 1.3-compatible PSS (salt length matching digest length) when they conform to FIPS 186-4, making a large installed base of TPMs incompatible with TLS 1.3 client certificate authentication.
section: "1"
topics:
    - tls
    - crypto
