document: rfc-2671
kind: protocol-element
summary: Label type bit pattern '01' now indicates an EDNS Extended Label Type; the specific extended type is in the low 6 bits of the first label octet. Extended label type value '111111' (0x3F) is reserved for future expansion of the extended label type code space.
section: "3.1"
topics:
