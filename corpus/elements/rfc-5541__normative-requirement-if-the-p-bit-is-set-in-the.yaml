document: rfc-5541
kind: normative-requirement
summary: If the P bit is set in the OF object, the PCE MUST use the specified objective function during path computation. If the P bit is clear, the PCE SHOULD apply the function if supported but MAY choose a different objective function per local policy.
section: 3.1.1
rfc2119_level: MUST
topics:
    - routing
