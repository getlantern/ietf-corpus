document: rfc-9686
kind: design-rationale
summary: 'The ADDR-REG-INFORM message is sent from the address being registered rather than the link-local address for ''fate sharing'': if Layer 2 security prevents a client from spoofing another client''s MAC address, it also cannot spoof the source IP of the registration message, preventing impersonation attacks.'
section: "4.2"
topics:
    - ip
    - v6ops
    - security
