document: rfc-8688
kind: protocol-element
summary: The sip.608 feature-capability indicator is inserted in the Feature-Caps header field of an INVITE request to signal that the inserting entity will be responsible for conveying information from a 608 SIP response (specifically the Call-Info referenced content) to the caller, including legacy devices.
section: "3.4"
topics:
