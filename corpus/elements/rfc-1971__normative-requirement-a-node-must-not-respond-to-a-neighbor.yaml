document: rfc-1971
kind: normative-requirement
summary: A node MUST NOT respond to a Neighbor Solicitation for a tentative address. If a Neighbor Solicitation for a tentative address is received before one has been sent, or if more solicitations are received than expected given loopback semantics, the tentative address is a duplicate.
section: 5.4.3
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
