document: rfc-8560
kind: protocol-element
summary: 'The BUM replication list maintained per VPN instance on an EVPN PE is the union of two sub-lists: sub-list A (MP2P service tunnels to remote EVPN PEs, derived from EVPN IMET route exchange) and sub-list B (PWs to all remote VPLS PEs in the same VPLS instance).'
