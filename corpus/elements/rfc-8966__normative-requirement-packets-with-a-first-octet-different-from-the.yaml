document: rfc-8966
kind: normative-requirement
summary: Packets with a first octet different from the magic value 42 (decimal) MUST be silently ignored. Packets with a second octet (Version) different from 2 MUST be silently ignored. This provides basic version and protocol filtering without sending any error response.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
