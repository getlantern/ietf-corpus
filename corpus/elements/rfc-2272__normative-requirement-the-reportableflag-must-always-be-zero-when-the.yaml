document: rfc-2272
kind: normative-requirement
summary: The reportableFlag MUST always be zero when the message contains a Report PDU, a response-type PDU, or an unacknowledged notification-type PDU (e.g. SNMPv2-Trap). It MUST always be one for request-type PDUs and acknowledged notification-type PDUs (e.g. Inform).
section: "6.4"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
