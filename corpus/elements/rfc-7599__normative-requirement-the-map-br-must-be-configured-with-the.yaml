document: rfc-7599
kind: normative-requirement
summary: The MAP BR MUST be configured with the same MAP elements as the MAP CEs operating within the same domain. The BR IPv6 prefix MAY be shared across a given MAP domain for load balancing; since MAP is stateless, any BR may handle forwarding at any time.
section: "7.2"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
