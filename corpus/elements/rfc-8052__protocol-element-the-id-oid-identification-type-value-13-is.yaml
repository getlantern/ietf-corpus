document: rfc-8052
kind: protocol-element
summary: The ID_OID identification type (value 13) is defined for GDOI ID payloads to specify an ASN.1 Object Identifier encoded using DER. It consists of an OID Length (1 octet), OID (variable), OID-Specific Payload Length (2 octets), and OID-Specific Payload (variable).
section: "2.1"
topics:
