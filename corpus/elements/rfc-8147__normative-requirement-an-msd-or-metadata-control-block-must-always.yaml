document: rfc-8147
kind: normative-requirement
summary: An MSD or metadata/control block MUST always be enclosed in a multipart body part, even if it would otherwise be the only body part in the SIP message. The SIP message MUST also include a Call-Info header field with a CID URL and 'purpose' parameter identifying the data type.
section: "6"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
