document: rfc-4005
kind: normative-requirement
summary: If accounting is active, the application MUST send an Accounting message with Accounting-Record-Type of START_RECORD for a new session; if a session fails to start, EVENT_RECORD MUST be sent with the reason for failure.
section: "2.1"
rfc2119_level: MUST
topics:
