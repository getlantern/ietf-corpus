document: rfc-6505
kind: protocol-element
summary: The <video-switch> element configures how participant video streams are assigned to layout regions. It supports <vas/> (Voice-Activated Switching — loudest speaker gets largest region) and <controller/> (AS-driven, using floor control) policies, with 'interval' and 'activespeakermix' attributes.
section: 4.2.1.4.3
topics:
    - realtime
