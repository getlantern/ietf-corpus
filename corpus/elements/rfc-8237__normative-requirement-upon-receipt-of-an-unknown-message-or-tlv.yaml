document: rfc-8237
kind: normative-requirement
summary: Upon receipt of an unknown message or TLV with U-Bit=0, a notification with code 'Unknown TLV (U-Bit=0)' MUST be sent and the keepalive session MUST be terminated by entering STARTUP state. If U-Bit=1, the unknown content MUST be acknowledged and silently ignored.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
