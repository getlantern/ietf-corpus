document: rfc-7184
kind: normative-requirement
summary: When OLSRv2 uses the 8-bit exponent-mantissa compressed time form, MIB time values (stored as integer milliseconds) MUST be translated into the exponent-mantissa form using the algorithm in RFC 5497 Section 5 (finding the next larger time value) before use in protocol messages.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - snmp
