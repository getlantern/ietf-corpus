document: rfc-9906
kind: interoperability-note
summary: Zone operators using ECC-GOST-based algorithms should switch to supported algorithms. DNS registries should prohibit clients from uploading and publishing ECC-GOST-based DS records to ensure DNSSEC validation remains functional.
