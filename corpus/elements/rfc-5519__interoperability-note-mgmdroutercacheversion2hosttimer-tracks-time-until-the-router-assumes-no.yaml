document: rfc-5519
kind: interoperability-note
summary: mgmdRouterCacheVersion2HostTimer tracks time until the router assumes no MGMDv2 members remain; applies to both IGMP and MLD hosts. Assuming no MGMDv1 hosts are detected, the router does not suppress MGMDv2 Leave messages when this timer is running.
section: "5"
topics:
