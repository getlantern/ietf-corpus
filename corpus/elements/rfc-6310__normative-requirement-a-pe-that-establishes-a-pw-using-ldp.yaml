document: rfc-6310
kind: normative-requirement
summary: A PE that establishes a PW using LDP and has negotiated use of the LDP status TLV per RFC 4447 Section 5.4.3 MUST use the PW status TLV mechanism for AC and PW status and defect notification. Such a PE MAY additionally use VCCV-BFD CV types 0x04 and 0x10 for fault detection only.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
