document: rfc-3253
kind: protocol-element
summary: DAV:checked-out (protected) appears on a checked-out resource and identifies the version that was in DAV:checked-in at checkout time. It is removed when the resource is checked in. Defined as <!ELEMENT checked-out (href)>.
