document: rfc-4760
kind: normative-requirement
summary: 'An UPDATE message SHOULD NOT include the same address prefix (of the same <AFI, SAFI>) in more than one of: WITHDRAWN ROUTES, Network Reachability Information, MP_REACH_NLRI, or MP_UNREACH_NLRI fields; processing of such a message is undefined.'
section: "3"
rfc2119_level: SHOULD NOT
topics:
