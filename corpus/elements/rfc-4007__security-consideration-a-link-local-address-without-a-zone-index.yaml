document: rfc-4007
kind: security-consideration
summary: A link-local address without a zone index cannot be used in certain security contexts. Specifically, a link-local address cannot be used in a traffic selector of an IPsec security association established by IKE when the IKE messages are carried over global addresses. A link-local address without a zone index also cannot be used in access control lists.
section: "12"
topics:
