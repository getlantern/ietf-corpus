document: rfc-3153
kind: normative-requirement
summary: A transmitter may not send a multiplexed frame unless the peer has negotiated PPPMuxCP to offer reception of multiplexed frames. Support is negotiated independently in each direction; successful negotiation does not obligate a peer to transmit multiplexed frames.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
