document: rfc-8732
kind: normative-requirement
summary: If any GSS_Init_sec_context() or GSS_Accept_sec_context() returns a major_status other than GSS_S_COMPLETE or GSS_S_CONTINUE_NEEDED, or any other GSS-API call returns other than GSS_S_COMPLETE, the key exchange MUST fail.
section: "5.1"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
