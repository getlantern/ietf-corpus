document: rfc-2271
kind: interoperability-note
summary: The high bit of the first SnmpEngineID octet distinguishes legacy AgentIDs (as defined in RFC 1910, bit=0, 12-octet fixed format) from new-architecture engine IDs (bit=1, variable-length format). This allows SNMPv3 entities to coexist with pre-SNMPv3 implementations without collisions in the engineID space.
section: "5"
topics:
