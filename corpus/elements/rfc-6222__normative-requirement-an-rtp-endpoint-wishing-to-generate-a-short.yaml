document: rfc-6222
kind: normative-requirement
summary: An RTP endpoint wishing to generate a short-term persistent RTCP CNAME MUST either use the numeric representation of the layer-2 MAC address of the initiating interface, or generate an identifier via the Section 5 procedure; the least significant 48 bits are formatted as colon-separated hex (e.g., '00:23:32:af:9b:aa'), yielding a 17-octet string.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
