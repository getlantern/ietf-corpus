document: rfc-5953
kind: normative-requirement
summary: TLS renegotiation with different certificates MUST NOT be done. Implementations MUST either disable renegotiation completely (RECOMMENDED) or present the same certificate during renegotiation and verify the peer also presented the same certificate.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - snmp
    - tls
    - security
    - pkix
extracted_by: claude-sonnet-4-6
