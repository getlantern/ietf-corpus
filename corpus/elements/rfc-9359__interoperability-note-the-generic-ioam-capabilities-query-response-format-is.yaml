document: rfc-9359
kind: interoperability-note
summary: The generic IOAM Capabilities Query/Response format is data-plane-independent and is intended for use with IPv6 (including SRv6), MPLS (including SR-MPLS), Service Function Chain (SFC), and BIER. Per-data-plane instantiation RFCs are expected to be developed jointly by the relevant working group and the IETF IPPM Working Group.
