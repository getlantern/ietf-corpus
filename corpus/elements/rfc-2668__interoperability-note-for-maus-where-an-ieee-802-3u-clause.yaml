document: rfc-2668
kind: interoperability-note
summary: For MAUs where an IEEE 802.3u clause 22 MII is present, a logic one in the MII remote fault bit maps to remoteFault(5) and a logic zero in the link status bit maps to notAvailable(4); notAvailable(4) takes precedence over remoteFault(5) when both conditions apply.
section: "4"
