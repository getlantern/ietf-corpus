document: rfc-3895
kind: normative-requirement
summary: A linkDown trap SHALL be sent only after the agent has determined for certain that the unavailable state has been entered, but the timestamp on the trap SHALL be that of the first UAS (10 seconds earlier). A linkUp trap is handled similarly.
section: 2.4.3
rfc2119_level: MUST
topics:
    - snmp
