document: rfc-8186
kind: normative-requirement
summary: As a result of the Z field semantics change, the Sender Error Estimate (TWAMP) or Send Error Estimate (OWAMP) and Receive Error Estimate SHOULD NOT be ignored and MUST be used when calculating delay and delay-variation metrics based on collected timestamps.
section: "2.3"
rfc2119_level: MUST
topics:
    - measurement
