document: rfc-4034
kind: normative-requirement
summary: An RRSIG and NSEC MUST exist for the same name as a CNAME resource record in a signed zone. This is a change from RFC 1034, which stated that CNAME is the only type allowed at a name.
section: "3"
rfc2119_level: MUST
topics:
    - dns
