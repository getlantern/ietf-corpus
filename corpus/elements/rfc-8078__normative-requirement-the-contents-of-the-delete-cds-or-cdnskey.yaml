document: rfc-8078
kind: normative-requirement
summary: The contents of the delete CDS or CDNSKEY RRset MUST contain one RR and only contain the exact fields 'CDS 0 0 0 0' or 'CDNSKEY 0 3 0 0'; no other notation is permitted.
