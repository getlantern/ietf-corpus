document: rfc-3606
kind: protocol-element
summary: The ATM2-MIB (atm2MIB) module is a supplement to the ATM-MIB defined in RFC 2515, assigned OID atmMIBObjects 14. It defines 21 tables covering SVC/PVC cross-connects, signalling statistics, address mapping, cell statistics, ILMI, and trap support for ATM switches, services, and hosts.
