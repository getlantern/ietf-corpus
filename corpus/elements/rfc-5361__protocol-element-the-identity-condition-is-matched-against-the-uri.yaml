document: rfc-5361
kind: protocol-element
summary: The identity condition is matched against the URI of the sender of the request used as input for a translation. Acceptable authentication mechanisms are SIP Digest, Asserted Identity (P-Asserted-ID from trusted element), and Cryptographically Verified Identity (RFC 4474 Identity header).
section: 3.1.2
