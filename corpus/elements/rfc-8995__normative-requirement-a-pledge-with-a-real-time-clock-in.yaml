document: rfc-8995
kind: normative-requirement
summary: A pledge with a real-time clock in which it has confidence MUST check time fields in all certificates and signatures it processes, including registrar certificate notBefore/notAfter, voucher created-on/expires-on, and CMS signingTime. A pledge without a reliable clock MAY ignore all timestamps.
section: 2.6.1
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
