document: rfc-5865
kind: design-rationale
summary: At access network speeds (below 10 Mbps), RFC 4594 recommends separating video and voice into separate queues because large video datagrams introduce disruptive jitter to small voice datagrams (40–200 bytes). At optical speeds, RFC 5127 recommends a common queue because the jitter is nominal.
