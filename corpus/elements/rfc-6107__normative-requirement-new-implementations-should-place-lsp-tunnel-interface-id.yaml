document: rfc-6107
kind: normative-requirement
summary: New implementations SHOULD place LSP_TUNNEL_INTERFACE_ID objects in Path messages immediately after the SENDER_TSPEC object and in Resv messages immediately after the FILTER_SPEC object. All implementations SHOULD handle received messages with objects in any order.
section: "3.5"
rfc2119_level: SHOULD
topics:
