document: rfc-8780
kind: interoperability-note
summary: The Link Identifier Type field reuses the 'TE_LINK Object Class type name space (Value 11)' registry originally created for the Link Management Protocol (LMP, RFC 4204). An IANA note was added to that registry to reflect this additional usage, ensuring consistent type assignment across LMP and PCEP WSON contexts.
section: 4.3.1
topics:
