document: rfc-3986
kind: protocol-element
summary: The path component is defined by five mutually exclusive ABNF rules (path-abempty, path-absolute, path-noscheme, path-rootless, path-empty) to disambiguate URI reference contexts. Dot-segments "." and ".." indicate relative hierarchy and are removed during resolution.
