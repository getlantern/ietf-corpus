document: rfc-1812
kind: normative-requirement
summary: Routers MUST NOT loose-source-route or strict-source-route a datagram unless they implement all requirements for doing so, including not forwarding source-routed datagrams to broadcast addresses and generating appropriate ICMP errors when a source-route cannot be satisfied.
section: 5.3.13.4
rfc2119_level: MUST NOT
topics:
    - ip
    - security
