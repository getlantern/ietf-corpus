document: rfc-4577
kind: normative-requirement
summary: The Sham Link Endpoint Address MUST be configurable, MUST be distributed by BGP as a VPN-IPv4 route with a 32-bit prefix, and MUST NOT be advertised by OSPF. It MUST NOT be used as the endpoint address of an OSPF Virtual Link.
section: 4.2.7.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
