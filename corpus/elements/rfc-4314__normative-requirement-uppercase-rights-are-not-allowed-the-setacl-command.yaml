document: rfc-4314
kind: normative-requirement
summary: Uppercase rights are not allowed; the SETACL command MUST return a BAD response if uppercase rights are specified. An unrecognized right MUST cause the command to return the BAD response; the server MUST NOT silently ignore unrecognized rights.
section: "3.1"
rfc2119_level: MUST NOT
