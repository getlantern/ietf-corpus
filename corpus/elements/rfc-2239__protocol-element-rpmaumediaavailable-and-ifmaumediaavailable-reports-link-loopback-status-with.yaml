document: rfc-2239
kind: protocol-element
summary: 'rpMauMediaAvailable (and ifMauMediaAvailable) reports link/loopback status with values: other(1), unknown(2), available(3), notAvailable(4), remoteFault(5), invalidSignal(6), remoteJabber(7), remoteLinkLoss(8), remoteTest(9). For 100BASE-T4/TX/FX these map to states in IEEE 802.3u link integrity state diagrams.'
