document: rfc-3986
kind: protocol-element
summary: Fragment identifier semantics are defined by the media type of the retrieved representation, are independent of the URI scheme, and cannot be redefined by scheme specifications. The fragment is separated from the URI before server-side dereferencing and resolved solely by the user agent.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
