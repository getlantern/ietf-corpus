document: rfc-5323
kind: design-rationale
summary: ANSI standard three-valued logic (as in SQL) is used when evaluating the search condition to handle properties that have no value (NULL) or undefined expressions. A property not defined on a resource is NULL; NULL values are 'less than' all other values in comparisons. This aligns with widely-practiced SQL semantics.
section: 5.5.1
topics:
    - http
