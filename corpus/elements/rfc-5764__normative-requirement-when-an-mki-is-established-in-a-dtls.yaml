document: rfc-5764
kind: normative-requirement
summary: When an MKI is established in a DTLS-SRTP session, it MUST apply uniformly to all SSRCs within that session. This differs from RFC 3711, which permits different SSRCs within the same session to use MKIs differently.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
