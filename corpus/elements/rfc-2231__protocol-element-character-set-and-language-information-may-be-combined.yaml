document: rfc-2231
kind: protocol-element
summary: Character set and language information may be combined with the parameter continuation mechanism. When combined, charset and language information appear only at the beginning of the parameter value (first segment), continuations do not support multiple character sets or languages within a single value, and a continued value may mix encoded and unencoded segments.
section: "4.1"
topics:
    - email
