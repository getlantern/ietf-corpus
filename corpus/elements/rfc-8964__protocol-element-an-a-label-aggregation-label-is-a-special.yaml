document: rfc-8964
kind: protocol-element
summary: An A-Label (aggregation label) is a special case of S-Label used to aggregate multiple DetNet flows into a single new DetNet flow. Both the A-Label and the inner S-Label have their MPLS S-bit set, and what follows the A-Label is always a d-CW followed by an MPLS label stack.
section: 4.4.2
topics:
    - mpls
