document: rfc-4201
kind: normative-requirement
summary: All component links in a bundle MUST have the same Link Type (point-to-point or multi-access), the same Traffic Engineering metric, and the same set of resource classes at each end, and must begin and end on the same pair of LSRs.
section: "2.1"
rfc2119_level: MUST
topics:
