document: rfc-8333
kind: design-rationale
summary: The mechanism does not protect link-up events; when a link goes back up, the operator must use other procedures (e.g., perform the action outside business hours or use incremental metric changes as in RFC 5715) to avoid transient forwarding loops during reconvergence.
section: "8"
topics:
    - routing
