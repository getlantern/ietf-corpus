document: rfc-8007
kind: security-consideration
summary: The CI/T interface has no specific DoS protection mechanism; endpoints can be protected via TLS, firewalling, or VPNs outside the protocol. The dCDN should consider rate-limiting acceptance/processing of CI/T Commands or batch processing to avoid overload from malicious or faulty uCDNs.
section: "8.2"
topics:
    - security
