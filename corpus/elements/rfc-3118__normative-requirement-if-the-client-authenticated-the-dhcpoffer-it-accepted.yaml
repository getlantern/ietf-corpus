document: rfc-3118
kind: normative-requirement
summary: If the client authenticated the DHCPOFFER it accepted, the client MUST validate the DHCPACK. If the DHCPACK fails validation, the client MUST revert to INIT state. The client MUST discard the DHCPACK and MAY log the failure.
section: 5.5.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
