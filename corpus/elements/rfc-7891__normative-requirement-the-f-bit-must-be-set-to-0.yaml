document: rfc-7891
kind: normative-requirement
summary: The F bit MUST be set to 0 in all Explicit RPF Vectors to ensure that upstream routers which do not support the TLV will discard it rather than forwarding it, preventing loops that could result from unsupported routers being listed as hops in the explicit path.
section: "10"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
