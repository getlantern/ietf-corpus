document: rfc-5998
kind: security-consideration
summary: The IKEv2 SA is not authenticated by running an EAP conversation alone; the crucial step is the AUTH payload derived from the EAP-generated key. EAP methods that do not establish such a key are therefore prohibited with this extension.
section: "6.1"
topics:
    - ipsec
    - vpn
    - security
    - crypto
