document: rfc-4341
kind: interoperability-note
summary: CCID 2 implementations should NOT track TCP congestion control evolution directly but wait for explicit CCID 2 updates, since TCP's mechanisms are specified for TCP's retransmission-based reliability model and may not translate directly to DCCP's unreliable datagram context.
section: "3.1"
topics:
    - congestion
    - tcp
    - udp
