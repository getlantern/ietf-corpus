summary: 'The JSContact Types Registry tracks all JSContact object type names (e.g., Card, Name, Address, EmailAddress, Phone) with fields: type name, version introduced, version obsoleted, and reference. The JSContact Version Registry tracks version strings such as ''1.0''.'
