document: rfc-8840
kind: normative-requirement
summary: An agent MUST include all currently known and used local candidates in every INFO request, repeating previously sent candidates in the same order. Newly gathered candidates MUST be added at the end of that list.
section: "4.4"
rfc2119_level: MUST
