document: rfc-8491
kind: design-rationale
summary: MSD advertisements are defined as extensible type-value pairs (MSD-Type + MSD-Value) to accommodate future MSD types beyond Base MPLS Imposition, such as entropy labels, SIDs imposed via recirculation, or SIDs associated with other data planes like IPv6.
