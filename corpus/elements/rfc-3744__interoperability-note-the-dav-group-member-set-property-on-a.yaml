document: rfc-3744
kind: interoperability-note
summary: The DAV:group-member-set property on a group principal MUST reference principals by their DAV:principal-URL values, not arbitrary alternate URLs. Clients populating ACEs from group listings must resolve principal-URL first.
section: "4.3"
topics:
