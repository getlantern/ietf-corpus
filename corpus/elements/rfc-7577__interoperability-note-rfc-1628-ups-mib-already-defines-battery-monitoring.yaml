document: rfc-7577
kind: interoperability-note
summary: RFC 1628 (UPS MIB) already defines battery monitoring objects for Uninterruptible Power Supply systems, but those objects are limited and UPS-specific. The Battery MIB is designed to supplement — not replace — the UPS MIB, providing broader and more detailed battery status applicable to general networked devices.
section: "1"
topics:
