document: rfc-7817
kind: design-rationale
summary: DNSSEC-protected SRV lookups are acknowledged as an alternative authorization mechanism for delegated hosting, but are not mandated because the solution depends on ubiquitous DNSSEC deployment and DNSSEC-aware APIs, which were not sufficiently available at the time of writing.
