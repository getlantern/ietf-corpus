document: rfc-3327
kind: protocol-element
summary: The home proxy, upon receiving a request targeted to a registered AOR, copies the stored path vector from the registrar database into the Route header field of the outgoing request as a preloaded route, inserting the stored path vector ahead of any existing Route header field values.
