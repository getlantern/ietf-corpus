document: rfc-6652
kind: protocol-element
summary: The 'ra=' SPF record modifier specifies a local-part reporting address to which ARF failure reports SHOULD be sent when mail claiming to be from the domain fails SPF evaluation, particularly via unauthorized routing. The verifier constructs the full address by appending '@' and the SPF-compliant domain.
section: "3"
topics:
