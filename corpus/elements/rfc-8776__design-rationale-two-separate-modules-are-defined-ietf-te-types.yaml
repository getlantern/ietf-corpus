document: rfc-8776
kind: design-rationale
summary: Two separate modules are defined — 'ietf-te-types' (generic) and 'ietf-te-packet-types' (packet-specific) — so that non-packet TE technologies such as GMPLS optical can import only the generic module without pulling in Diffserv-TE or packet bandwidth constraint dependencies.
