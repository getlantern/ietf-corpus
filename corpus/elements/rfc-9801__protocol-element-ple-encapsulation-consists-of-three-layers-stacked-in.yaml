document: rfc-9801
kind: protocol-element
summary: 'PLE encapsulation consists of three layers stacked in order: PSN and VPWS demultiplexing headers (MPLS or SRv6), a PLE header (control word plus RTP header), and the bit-stream payload. The IWF is the functional block that encapsulates bit-streams into PLE packets and reverses the process.'
