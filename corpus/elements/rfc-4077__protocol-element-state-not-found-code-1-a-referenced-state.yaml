document: rfc-4077
kind: protocol-element
summary: 'STATE_NOT_FOUND (code 1): A referenced state cannot be found; the Error Details field contains the state identifier (6-20 bytes). This is the most operationally significant error code, typically causing the NACK recipient to stop referencing the indicated state in future messages.'
section: "3.2"
