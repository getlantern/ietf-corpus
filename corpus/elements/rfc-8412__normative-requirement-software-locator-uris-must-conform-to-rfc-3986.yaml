document: rfc-8412
kind: normative-requirement
summary: Software Locator URIs MUST conform to RFC 3986. When expressing filesystem locations, the URI scheme MUST be 'file' and the URI MUST conform to RFC 8089, including percent-encoding of whitespace and special characters. If a location cannot be determined, the SWIMA-PC MUST provide a zero-length Software Locator.
section: 3.4.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
