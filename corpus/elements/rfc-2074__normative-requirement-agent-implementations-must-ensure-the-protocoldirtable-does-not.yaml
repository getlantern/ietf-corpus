document: rfc-2074
kind: normative-requirement
summary: Agent implementations must ensure the protocolDirTable does not contain any instances of the protocolDirDescr object which differ only in case of one or more letters when they are intended to represent different protocols. NMS applications may treat protocol names as case-insensitive strings.
section: 4.2.1
rfc2119_level: MUST
topics:
    - snmp
