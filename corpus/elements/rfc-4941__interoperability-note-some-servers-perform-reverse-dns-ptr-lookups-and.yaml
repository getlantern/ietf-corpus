document: rfc-4941
kind: interoperability-note
summary: Some servers perform reverse DNS (PTR) lookups and may refuse connections from clients whose temporary addresses are not registered in DNS. Nodes may register temporary addresses in DNS under random names as a workaround, though inverse-DNS-based authentication has little validity.
section: "4"
