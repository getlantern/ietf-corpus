document: rfc-1333
kind: protocol-element
summary: 'Five logical processes are defined at each end of the link: Link-Manager (transmits/receives LQRs and enforces policy), Mux (prioritizes outbound packet stream), Tx (maintains outbound counters and fills PeerOut... fields), Rx (maintains inbound counters and fills SaveIn... fields), and Demux (demultiplexes inbound packets). Process ordering is load-bearing for correct counting.'
section: "2.4"
topics:
