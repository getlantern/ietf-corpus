document: rfc-4610
kind: protocol-element
summary: When an RP receives a PIM Register message from a DR (i.e., from an address not in the Anycast-RP list), it decapsulates the packet, forwards it down its shared-tree, and sends a copy of the Register to every other RP in the Anycast-RP set using its own unicast IP address as the source.
section: "3"
topics:
    - multicast
    - routing
