document: rfc-8856
kind: interoperability-note
summary: The first SDP example in RFC 4583 Section 9 erroneously used 'm-stream' instead of the correct 'mstrm' in the 'floorid' attribute. It is RECOMMENDED to support parsing 'm-stream' as equivalent to 'mstrm' when receiving, since some implementations use it.
section: "5.4"
topics:
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
