document: rfc-7303
kind: security-consideration
summary: XML, like plain text, can contain escape sequences that adversely change display processor environments—locking keyboards, altering display parameters to obscure content, or programming terminal keys to perform illicit actions. Display processors SHOULD filter such material or reset settings after display operations.
section: "10"
topics:
