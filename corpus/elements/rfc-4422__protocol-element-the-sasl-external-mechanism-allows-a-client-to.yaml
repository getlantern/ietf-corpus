document: rfc-4422
kind: protocol-element
summary: The SASL EXTERNAL mechanism allows a client to request that the server use externally established credentials (e.g., via TLS or IPsec) for authentication. It does not provide a security layer and carries an optional UTF-8 encoded authorization identity string as its sole client message.
section: A.1
topics:
    - security
    - tls
