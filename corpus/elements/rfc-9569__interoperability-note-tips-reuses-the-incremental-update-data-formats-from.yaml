document: rfc-9569
kind: interoperability-note
summary: TIPS reuses the incremental update data formats from RFC 8895 (JSON merge patch and JSON patch), enabling compatibility with existing ALTO incremental update implementations. An example IRD shows ALTO base protocol, ALTO/SSE, and ALTO TIPS coexisting on the same server.
