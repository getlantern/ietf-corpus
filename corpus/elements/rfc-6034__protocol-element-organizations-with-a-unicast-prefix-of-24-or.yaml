document: rfc-6034
kind: protocol-element
summary: Organizations with a unicast prefix of /24 or shorter may derive a multicast prefix by appending their unicast prefix to the common 234/8. Any remaining bits may be assigned by whatever mechanism the organization chooses.
section: "3"
