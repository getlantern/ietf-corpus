document: rfc-3831
kind: normative-requirement
summary: All best-effort IPv6 multicast packets MUST be mapped to FC Sequences addressed to the broadcast N_Port_ID 0xFF-FF-FF, with the Destination N_Port_Name in the FC Network_Header set to 0x10-00-FF-FF-FF-FF-FF-FF.
