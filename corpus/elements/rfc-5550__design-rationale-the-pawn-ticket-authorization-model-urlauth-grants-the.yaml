document: rfc-5550
kind: design-rationale
summary: The 'pawn-ticket' authorization model (URLAUTH) grants the Submission Server access only to the specific message part authorized by the client. The ticket can be revoked and carries an expiry time, so the Submission Server cannot access any IMAP data beyond what the client explicitly delegates.
section: "8.5"
topics:
    - email
    - security
