document: rfc-9097
kind: normative-requirement
summary: The bit rate of the physical interface of the measurement devices MUST be higher than the smallest link on the path being measured (the bottleneck link). This applies to both Singleton and Maximum Capacity metrics.
section: "5.3"
rfc2119_level: MUST
topics:
    - measurement
