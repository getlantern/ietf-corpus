summary: The updated offer after ICE completion is required not because the agents themselves need new information — they already agreed on candidates — but because off-path components (ALGs, SBCs, QoS tools, diagnostic monitors) rely on the SDP 'c='/'m=' lines to reflect where media is actually flowing.
