document: rfc-9580
kind: wire-format
summary: 'The Argon2 S2K specifier (type 0x04) is 20 octets: 1 octet type ID, 16 octets of salt, 1 octet number of passes t, 1 octet degree of parallelism p, and 1 octet encoded_m where memory size m = 2^(encoded_m) KiB. Argon2id variant with version 0x13 is always used.'
section: 3.7.1.4
topics:
