document: rfc-1587
kind: protocol-element
summary: The N-bit is a new option bit in the OSPF options field that identifies a router's NSSA capability. It is used only in Hello packets and ensures all members of an NSSA agree on the area's configuration. If the N-bit is set, the E-bit must be cleared.
section: "3.1"
topics:
    - routing
