document: rfc-2745
kind: protocol-element
summary: 'The Next-Hop RSVP_HOP object in a DREQ carries the LIH of the interface through which the DREQ should be received at the upstream node, updated hop-by-hop. It serves the same role as in RESV messages: distinguishing logical interfaces and handling routing asymmetries and non-RSVP clouds.'
