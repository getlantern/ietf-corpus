document: rfc-3597
kind: normative-requirement
summary: Future specifications for new RR types containing domain names within their RDATA MUST NOT allow name compression for those names, and SHOULD explicitly state that embedded domain names MUST NOT be compressed.
section: "4"
rfc2119_level: MUST NOT
