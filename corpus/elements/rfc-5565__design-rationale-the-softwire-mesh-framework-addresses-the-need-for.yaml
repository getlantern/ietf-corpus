document: rfc-5565
kind: design-rationale
summary: The Softwire Mesh Framework addresses the need for single-protocol transit networks to carry traffic of the opposite protocol. An IPv4-only core must provide IPv6 transit and vice versa, achieved by tunneling E-IP packets across the I-IP core using softwires between Address Family Border Routers (AFBRs).
section: "1"
topics:
