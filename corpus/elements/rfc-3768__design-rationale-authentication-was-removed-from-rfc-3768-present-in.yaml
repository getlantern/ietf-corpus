document: rfc-3768
kind: design-rationale
summary: 'Authentication was removed from RFC 3768 (present in RFC 2338) because operational experience showed the defined methods (plain-text and IPSEC-based) did not prevent the most disruptive attack: a hostile router behaving as Master. The VRRP fields for authentication are retained as reserved to preserve wire-level backwards compatibility with RFC 2338.'
section: "13"
topics:
