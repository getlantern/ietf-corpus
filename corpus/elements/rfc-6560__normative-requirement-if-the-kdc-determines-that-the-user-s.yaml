document: rfc-6560
kind: normative-requirement
summary: If the KDC determines that the user's PIN has expired, it SHOULD respond with KRB-ERROR of type KDC_ERR_PIN_EXPIRED (96) and MAY include a PA-OTP-PIN-CHANGE in the armored-data of the PA-FX-FAST-REPLY.
section: "2.3"
rfc2119_level: SHOULD
topics:
