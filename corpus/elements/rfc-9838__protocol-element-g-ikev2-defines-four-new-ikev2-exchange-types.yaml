document: rfc-9838
kind: protocol-element
summary: 'G-IKEv2 defines four new IKEv2 exchange types: GSA_AUTH (initial registration combining authentication and key distribution), GSA_REGISTRATION (subsequent registration over an existing IKE SA), GSA_REKEY (one-way multicast pseudo-exchange for group rekeying), and GSA_INBAND_REKEY (unicast rekey over the existing registration IKE SA). Four new payloads are introduced: IDg, SAg, GSA, and KD.'
section: "1"
