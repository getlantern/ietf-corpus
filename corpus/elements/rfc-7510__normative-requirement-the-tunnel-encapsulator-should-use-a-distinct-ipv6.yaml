document: rfc-7510
kind: normative-requirement
summary: The tunnel encapsulator SHOULD use a distinct IPv6 source address for each MPLS-in-UDP tunnel that uses UDP zero-checksum mode, to strengthen the decapsulator's source-address check; the same source address SHOULD NOT be reused across multiple destination addresses.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
