summary: On a Point-to-Point circuit, whenever ISIS_NEIGHBOR_USEABLE is FALSE, the Three-Way adjacency state MUST be set to DOWN in the Point-to-Point Three-Way Adjacency TLV (RFC 5303) in all transmitted IIHs.
