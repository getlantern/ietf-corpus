document: rfc-6580
kind: interoperability-note
summary: All five RDDP registries use a Standards Action allocation policy, meaning only IESG-approved Standards-Track RFCs may add new code points. This prevents unofficial or vendor-specific extensions from fragmenting the protocol's code point space.
