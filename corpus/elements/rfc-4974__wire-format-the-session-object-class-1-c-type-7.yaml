document: rfc-4974
kind: wire-format
summary: The SESSION object (Class=1, C-Type=7 for IPv4, C-Type=8 for IPv6) is extended with a 16-bit Call_ID field placed immediately before the existing 16-bit Tunnel ID. The field was previously reserved (required to be zero on transmission, ignored on receipt), ensuring backward compatibility.
section: 5.2.3
topics:
    - mpls
