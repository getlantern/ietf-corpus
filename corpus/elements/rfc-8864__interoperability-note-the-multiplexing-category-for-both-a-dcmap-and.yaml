document: rfc-8864
kind: interoperability-note
summary: The multiplexing category for both 'a=dcmap:' and 'a=dcsa:' attributes is SPECIAL. No multiplexing rules are specified for UDP/DTLS/SCTP and TCP/DTLS/SCTP proto values, as multiple SCTP associations over a single DTLS association are outside the scope of RFC 8841.
section: 5.1.9
topics:
    - webrtc
    - realtime
