document: rfc-5185
kind: normative-requirement
summary: A link-LSA SHOULD NOT be advertised for a multi-area adjacency in OSPFv3. The neighbor's IPv6 link-local address can instead be learned from the IPv6 header of Hello packets received over the multi-area adjacency.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - routing
