document: rfc-6584
kind: design-rationale
summary: 'ECC provides significantly smaller key and signature sizes for equivalent security: a 160-bit ECC key is comparable to 1024-bit RSA, and a 224-bit ECC key to 2048-bit RSA. However, RSA puts more load on the signer and less on verifiers, while ECC distributes load more evenly; with many verifiers RSA consumes more total CPU.'
section: "1"
topics:
