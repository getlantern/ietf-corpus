document: rfc-1139
kind: design-rationale
summary: 'Code-path divergence is a central design concern: the echo path through a system must be identical or very close to the path used by normal data. An echo mechanism that succeeds or fails independently of the normal data path would not provide a useful diagnostic tool.'
section: "1"
topics:
