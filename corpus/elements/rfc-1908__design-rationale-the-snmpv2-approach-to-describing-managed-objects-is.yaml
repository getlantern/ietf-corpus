document: rfc-1908
kind: design-rationale
summary: The SNMPv2 approach to describing managed objects is described as nearly a proper superset of SNMPv1, largely codifying existing practice based on extensive operational experience. This design choice means most SNMPv1 MIBs require only mechanical conversion rather than semantic redesign.
