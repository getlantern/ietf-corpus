document: rfc-9399
kind: normative-requirement
summary: All direct addressing URIs SHOULD use the HTTPS, HTTP, or DATA scheme. The 'data' URI scheme MUST NOT be used with indirect addressing. Clients MUST support retrieval via HTTP (RFC 9110) and HTTP with TLS (RFC 8446).
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - pkix
    - http
    - tls
