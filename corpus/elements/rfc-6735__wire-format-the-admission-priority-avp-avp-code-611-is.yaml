document: rfc-6735
kind: wire-format
summary: The Admission-Priority AVP (AVP Code 611) is of type Unsigned8; higher values represent higher priority. It encodes the admission-priority parameter defined in Section 5.1 of RFC 6401 and is used to increase the probability of session establishment for selected RSVP flows.
