document: rfc-3395
kind: protocol-element
summary: The protocolDirHostConfig and protocolDirMatrixConfig objects for application verbs MUST be set according to each verb's monitoring capabilities. The agent MAY mirror the parent application's configuration values and MAY transition from 'supportedOn(2)' to 'supportedOff(3)' when the parent does so.
