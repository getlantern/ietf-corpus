document: rfc-9622
kind: protocol-element
summary: A Preconnection object represents a potential Connection and holds Local Endpoints, Remote Endpoints, TransportProperties, and SecurityParameters. It is a passive data structure used as a template to create Connections via Initiate, Listen, or Rendezvous; changes to a Preconnection after Connection creation have no effect on the Connection.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
