document: rfc-8383
kind: security-consideration
summary: The Address Flush RBridge Channel Protocol provides no built-in security. It is RECOMMENDED that all RBridges implementing Address Flush be configured to ignore such messages unless secured with an RBridge Channel Header Extension (RFC 7978) meeting local security policy.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - security
