document: rfc-9165
kind: security-consideration
summary: The security considerations of RFC 8610 apply. The use of formal description techniques such as ABNF can not only simplify but sometimes also complicate a specification, potentially leading to security problems in implementations and the specification itself. ABNF should be judiciously applied and overly complex constructions avoided.
section: "6"
topics:
    - security
    - cbor
