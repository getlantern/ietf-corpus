document: rfc-5848
kind: protocol-element
summary: The digital Signature (SIGN) in both Signature Blocks and Certificate Blocks is calculated over the entire formatted message before the SIGN parameter is added. For OpenPGP DSA, the signature contains DSA values r and s as concatenated multiprecision integers, base64 encoded.
