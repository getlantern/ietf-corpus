document: rfc-3995
kind: normative-requirement
summary: A Printer MUST return one Subscription Attributes Group in the response for each Subscription Template Attributes Group in the request, in the same order, regardless of whether the Subscription Object was successfully created. Each Subscription Attributes Group MUST include 'notify-subscription-id' if created, 'notify-lease-duration' if a Per-Printer object was created, and all unsupported attributes.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
