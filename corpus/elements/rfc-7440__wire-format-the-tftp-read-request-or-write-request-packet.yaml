document: rfc-7440
kind: wire-format
summary: 'The TFTP Read Request or Write Request packet is extended with two new NULL-terminated ASCII fields appended after the mode field: the literal string ''windowsize'' (case insensitive) and the #blocks value as a base-10 ASCII string. All fields except the 2-byte ''opc'' field MUST be ASCII strings followed by a single-byte NULL character.'
