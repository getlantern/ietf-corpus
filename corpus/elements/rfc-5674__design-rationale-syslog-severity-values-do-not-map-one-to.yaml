document: rfc-5674
kind: design-rationale
summary: Syslog severity values do not map one-to-one to ITU perceived severities, so a STRUCTURED-DATA element is defined to carry the unmodified ITU perceived severity alongside the approximate syslog SEVERITY mapping.
