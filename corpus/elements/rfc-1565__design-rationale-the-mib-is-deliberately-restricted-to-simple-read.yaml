document: rfc-1565
kind: design-rationale
summary: The MIB is deliberately restricted to simple read-only access. Write capabilities, queue management, request probing, and forced-action capabilities were excluded because they would require strict security checking, mandate complex implementation-specific designs, and be contentious and difficult to implement.
section: "3.2"
topics:
    - snmp
    - security
