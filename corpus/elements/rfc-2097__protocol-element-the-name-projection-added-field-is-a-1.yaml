document: rfc-2097
kind: protocol-element
summary: 'The Name-Projection Added field is a 1-octet dual-role field: in Configure-Request it indicates name type (01 = Unique Name, 02 = Group Name); in Configure-Nak it carries the NetBIOS return code (e.g., 00 = success, 0D = duplicate, 0E = table full, 16 = name in use on remote NetBIOS, 19 = name conflict).'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
