document: rfc-2347
kind: interoperability-note
summary: If a server does not support option negotiation, it will likely ignore appended options and return a DATA packet (for RRQ) or ACK packet (for WRQ), establishing normal TFTP data transfer without options. A client may retry a failed request without options to handle servers that treat extra data in the request as an error.
section: Negotiation Protocol
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
