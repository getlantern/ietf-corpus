document: rfc-2257
kind: interoperability-note
summary: AgentX PDUs are not BER-encoded (unlike SNMP PDUs), but transmitted as a contiguous byte stream organized for 32-bit natural alignment from the PDU start, permitting direct integer access. This is a fundamental wire-format difference from all SNMP PDU encodings.
