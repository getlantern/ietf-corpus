document: rfc-2035
kind: interoperability-note
summary: RTP/JPEG restricts the predefined type codes to sequential DCT mode, single-scan, interleaved images to maximize interoperability with hardware codecs, which typically cannot decode non-interleaved scans even though baseline JPEG permits them.
