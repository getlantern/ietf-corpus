document: rfc-3518
kind: normative-requirement
summary: A system MUST NOT transmit a MAC Type numbered higher than 4 unless it has received from its peer a MAC-Support Configuration Option indicating that the peer is willing to receive frames of that MAC Type.
section: "4.2"
rfc2119_level: MUST NOT
