document: rfc-4444
kind: design-rationale
summary: The ResettingTimer behavior specifies that when a timer object is changed mid-interval, the next expiration occurs at the new interval after the original start time (or immediately, whichever is later), preserving interval semantics without abrupt resets. This applies to isisSysMaxLSPGenInt, isisSysWaitTime, hello timers, and SNP intervals.
section: "4"
topics:
