document: rfc-7112
kind: security-consideration
summary: A firewall that performs stateless deep packet inspection (examining application payload content) may still be unable to correctly process fragmented packets even when the IPv6 Header Chain is fully contained in the First Fragment, because the payload may still be split across fragments.
