document: rfc-7003
kind: wire-format
summary: Total Packets Expected in Bursts is a 24-bit unsigned field reporting the sum of received and lost packets during discard bursts. If the measured value exceeds 0xFFFFFD, 0xFFFFFE MUST be reported; if unavailable, 0xFFFFFF MUST be reported.
section: "3.2"
topics:
    - rtp
    - realtime
