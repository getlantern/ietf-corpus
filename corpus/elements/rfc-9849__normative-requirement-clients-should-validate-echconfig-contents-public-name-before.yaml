document: rfc-9849
kind: normative-requirement
summary: Clients SHOULD validate ECHConfig.contents.public_name before use and SHOULD ignore any ECHConfig whose public_name is not a valid dot-separated sequence of LDH labels or whose final label would be interpreted as an IPv4 literal (all-digit label or 0x/0X prefix).
section: 6.1.7
rfc2119_level: SHOULD
topics:
    - tls
    - security
    - dns
