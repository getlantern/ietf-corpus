summary: 'The changes introduced are backward-compatible: transaction behavior will be no less correct, and possibly more correct, when only one peer in a transaction implements these changes. Deploying RFC 6026 implementations alongside RFC 3261 implementations adds no additional security concerns beyond those noted.'
