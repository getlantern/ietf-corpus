document: rfc-8177
kind: protocol-element
summary: Operational state fields 'send-lifetime-active' and 'accept-lifetime-active' (both read-only boolean, config false) indicate whether a key's send or accept lifetime is currently active. The 'last-modified-timestamp' (yang:date-and-time, config false) records the most recent key-chain update.
