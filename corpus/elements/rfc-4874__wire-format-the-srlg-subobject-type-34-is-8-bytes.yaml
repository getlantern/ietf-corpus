document: rfc-4874
kind: wire-format
summary: 'The SRLG subobject (Type 34) is 8 bytes: 1-bit L flag, 7-bit Type (34), 1-byte Length (always 8), 4-byte SRLG Id, and 2 bytes Reserved. For use in XRO/EXRS the L bit SHOULD be set to zero and ignored; it identifies a 32-bit SRLG whose resources must be excluded.'
section: "2.1"
topics:
    - mpls
    - routing
