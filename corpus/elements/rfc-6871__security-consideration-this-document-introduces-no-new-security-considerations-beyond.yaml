document: rfc-6871
kind: security-consideration
summary: This document introduces no new security considerations beyond those in RFC 5939 and RFC 4566, except that implementations MUST take care that keying material appearing in latent configurations is not a real value used for actual media exchange, since it is visible in the SDP but the session it protects has not yet been established.
section: "6"
topics:
    - security
    - crypto
    - realtime
