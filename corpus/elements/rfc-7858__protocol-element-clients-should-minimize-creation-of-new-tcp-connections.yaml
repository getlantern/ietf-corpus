document: rfc-7858
kind: protocol-element
summary: Clients SHOULD minimize creation of new TCP connections by reusing a single TCP connection to the recursive resolver or by using a local DNS request aggregator (forwarder) that maintains a single DNS-over-TLS connection on behalf of multiple clients.
