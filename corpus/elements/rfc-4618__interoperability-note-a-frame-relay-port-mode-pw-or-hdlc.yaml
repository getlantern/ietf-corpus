document: rfc-4618
kind: interoperability-note
summary: A Frame Relay Port mode PW or HDLC PW does not process any frame relay status messages or alarms (Q.922, Q.933); HDLC flags are processed locally in the PE connected to the attachment circuit rather than transported across the PW.
