document: rfc-9128
kind: protocol-element
summary: The ietf-pim-sm module augments per-AF data with an 'sm' container containing ASM sub-tree (anycast-rp sets keyed by anycast-address+rp-address, and spt-switch/infinity with optional policy) and SSM sub-tree (range-policy). Interfaces can be set passive via an 'sm' presence container.
