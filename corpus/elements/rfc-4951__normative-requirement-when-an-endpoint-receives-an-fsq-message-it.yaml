document: rfc-4951
kind: normative-requirement
summary: When an endpoint receives an FSQ message, it MUST include an FSS AVP in the FSR for each FSS AVP in the FSQ. When responding, if an FSS AVP is invalid (session non-existing or paired with a different remote Session ID), the Session ID field in the FSR FSS AVP MUST be set to zero.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
