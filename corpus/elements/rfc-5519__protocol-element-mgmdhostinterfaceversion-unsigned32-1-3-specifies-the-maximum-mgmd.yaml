document: rfc-5519
kind: protocol-element
summary: 'mgmdHostInterfaceVersion (Unsigned32 1..3) specifies the maximum MGMD version a host can run on an interface: 1 = IGMPv1 only, 2 = IGMPv2/MLDv1, 3 = IGMPv3/MLDv2. The default value is 3.'
