document: rfc-4489
kind: design-rationale
summary: In mobile environments, the lifetime of IID-based link-scoped multicast addresses is linked to the period during which the IID is known to be unique, creating a potential conflict when a new node joins a merged network using the same IID as an existing powered node; this document acknowledges but does not resolve that issue.
section: "5"
topics:
