kind: protocol-element
summary: The RTCP Splicing Notification Message (SNM) is a new RTCP packet type (PT=213) consisting of a fixed header with SSRC, followed by a 64-bit IN NTP timestamp and a 64-bit OUT NTP timestamp indicating the start and end of the splicing interval.
