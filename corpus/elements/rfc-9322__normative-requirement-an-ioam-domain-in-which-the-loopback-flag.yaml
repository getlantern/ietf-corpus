document: rfc-9322
kind: normative-requirement
summary: An IOAM-Domain in which the Loopback flag is used MUST be configured such that a return path from each IOAM transit and decapsulating node is expected. If no return path exists or the encapsulating node's identity is not available in the encapsulation header, configuration MUST NOT enable the Loopback flag.
section: 4.1.1
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
