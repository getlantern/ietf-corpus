document: rfc-6391
kind: normative-requirement
summary: The flow label allocated to a flow MUST NOT be an MPLS reserved label and SHOULD remain constant for the life of the flow. The method used to generate flow labels SHOULD introduce a high degree of entropy to maximise ECMP distribution.
section: "3"
rfc2119_level: SHOULD
topics:
    - mpls
