document: rfc-6020
kind: security-consideration
summary: YANG data models can expose sensitive configuration and state data via NETCONF. Implementations should leverage existing device access control mechanisms to protect or expose elements of the data model. YANG itself does not define security mechanisms but targets smooth integration with native management infrastructure.
section: "15"
topics:
    - yang
    - netconf
    - security
