document: rfc-4901
kind: normative-requirement
summary: An LDP session MUST be set up between PW endpoints using the extended discovery mechanism. PW label bindings are distributed using LDP downstream unsolicited mode. Any acceptable method of MPLS label distribution MAY be used for distributing the MPLS tunnel label (LDP, RSVP-TE, or configuration).
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
