document: rfc-8533
kind: design-rationale
summary: The retrieval methods module is intentionally separated from the generic connectionless OAM data model (RFC 8532) to allow retrieval procedures to evolve independently and faster than the underlying data model. New procedures can be defined to retrieve the same RFC 8532 data without modifying it.
