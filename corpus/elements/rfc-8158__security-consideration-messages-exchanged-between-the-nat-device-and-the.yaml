document: rfc-8158
kind: security-consideration
summary: Messages exchanged between the NAT device and the Collector MUST be protected to provide confidentiality, integrity, and authenticity. TLS or DTLS MUST be used; log events SHOULD NOT be sent in cleartext, as cleartext enables attackers to read and spoof log events.
section: "7"
rfc2119_level: MUST
topics:
    - nat
    - security
    - tls
