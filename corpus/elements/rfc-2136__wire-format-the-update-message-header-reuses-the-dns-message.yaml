document: rfc-2136
kind: wire-format
summary: The UPDATE message header reuses the DNS message header format but repurposes the four count fields as ZOCOUNT, PRCOUNT, UPCOUNT, and ADCOUNT. Only the QR flag bit is used; the Z field is reserved and must be zero.
section: "2.2"
