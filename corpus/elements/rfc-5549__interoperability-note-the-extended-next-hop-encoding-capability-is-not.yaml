document: rfc-5549
kind: interoperability-note
summary: The Extended Next Hop Encoding capability is not intended for use with AFI/SAFIs that already support both IPv4 and IPv6 next hops (e.g., <1/132>) or for which a different-address-family next hop solution already exists (e.g., <2/1> with IPv4 NH per RFC4798).
