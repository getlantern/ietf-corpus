document: rfc-2402
kind: design-rationale
summary: 'The IPv6 Routing Header (Type 0) is treated as mutable but predictable: although it rearranges address fields during transit, the final state at the receiver is known to the sender. The sender must reorder the Routing Header fields to their expected received form before ICV computation.'
section: A2
topics:
