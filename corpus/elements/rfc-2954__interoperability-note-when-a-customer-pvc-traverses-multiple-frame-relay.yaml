document: rfc-2954
kind: interoperability-note
summary: When a customer PVC traverses multiple frame relay networks, the customer NMS must poll a separate FRS agent within each network to retrieve an end-to-end view of service. This MIB manages only a single frame relay service offering from one provider.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
