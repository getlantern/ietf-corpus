document: rfc-4429
kind: normative-requirement
summary: A node MUST reply to a Neighbor Solicitation for an Optimistic Address sent from a unicast address, but the Neighbor Advertisement reply MUST have the Override flag cleared (O=0) to prevent overriding the NC entry of the legitimate owner of the address in the case of a collision.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
