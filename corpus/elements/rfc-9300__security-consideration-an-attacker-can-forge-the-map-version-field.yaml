document: rfc-9300
kind: security-consideration
summary: An attacker can forge the Map-Version field in LISP-encapsulated headers to trigger excessive control plane signaling (Map-Requests) between xTRs, potentially overloading them. Locator-Status-Bits, Echo-Nonce, and Map-Versioning MUST NOT be used over the public Internet.
section: "16"
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
