document: rfc-8879
kind: interoperability-note
summary: A significant number of middleboxes intercept and validate Certificate messages in TLS handshakes. CompressedCertificate messages may cause such middleboxes to drop connections. Certificate compression is therefore restricted to TLS 1.3 and higher, where the Certificate message is encrypted and cannot be intercepted.
section: "6"
topics:
    - tls
