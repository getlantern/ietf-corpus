document: rfc-5890
kind: protocol-element
summary: Reserved LDH (R-LDH) labels, also called 'tagged domain names', are LDH labels that contain '--' in the third and fourth character positions. Only the subset beginning with the prefix 'xn--' (XN-labels) may be used in IDNA-aware applications; other R-LDH labels are reserved for future use.
section: 2.3.1
topics:
