document: rfc-7504
kind: design-rationale
summary: Reply code 556 was created specifically for relay scenarios where a receiving SMTP system can determine from an out-of-band source (such as the DNS null MX record defined in RFC 7505) that a target domain accepts no mail, without needing to attempt a connection to that target host.
