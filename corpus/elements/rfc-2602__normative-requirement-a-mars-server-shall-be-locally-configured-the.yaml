document: rfc-2602
kind: normative-requirement
summary: A MARS server shall be locally configured. The MARS server may retrieve the MARS service registry data to validate the results, and if an incorrect row is retrieved the error may be flagged in a locally significant way.
section: "5"
rfc2119_level: REQUIRED
