document: rfc-9541
kind: interoperability-note
summary: The B-MAC/I-SID route is accepted and reflected by any Route Reflector compliant with RFC 7432 because it introduces no new BGP attributes; only PEs supporting this specification will act on the received B-MAC/I-SID update.
