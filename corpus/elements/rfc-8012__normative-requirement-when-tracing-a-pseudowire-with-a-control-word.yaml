document: rfc-8012
kind: normative-requirement
summary: When tracing a pseudowire with a control word in use, the N flag in the DDMAP MUST be set. When a control word is not in use, the returned DDMAPs may not be accurate.
section: "3"
rfc2119_level: MUST
topics:
