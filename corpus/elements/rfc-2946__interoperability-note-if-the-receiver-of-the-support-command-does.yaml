document: rfc-2946
kind: interoperability-note
summary: If the receiver of the SUPPORT command does not support any listed encryption types, it should send 'IAC SB ENCRYPT IS NULL IAC SE' to indicate no common types, and may also send IAC WONT ENCRYPT to disable the option.
