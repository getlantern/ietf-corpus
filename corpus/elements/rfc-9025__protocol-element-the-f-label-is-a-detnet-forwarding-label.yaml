document: rfc-9025
kind: protocol-element
summary: The F-Label is a DetNet 'forwarding' label that identifies the LSP used to forward a DetNet flow across an MPLS PSN, e.g., a hop-by-hop label used between label-switching routers. This document allows F-Labels to be partly or entirely replaced by UDP and IP headers.
section: "2.2"
topics:
    - mpls
