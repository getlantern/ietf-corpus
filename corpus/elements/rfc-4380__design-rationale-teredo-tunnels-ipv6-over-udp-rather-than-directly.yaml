document: rfc-4380
kind: design-rationale
summary: Teredo tunnels IPv6 over UDP rather than directly over IPv4 or over TCP because UDP is one of only two protocols guaranteed to cross the majority of NAT devices, and UDP avoids the severe QoS degradation from TCP-over-TCP encapsulation.
