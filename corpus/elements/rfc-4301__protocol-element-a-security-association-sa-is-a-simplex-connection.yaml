document: rfc-4301
kind: protocol-element
summary: A Security Association (SA) is a simplex connection providing security services via AH or ESP (not both). Bidirectional communication requires a pair of SAs. An SA is identified by an SPI, optionally combined with destination address and/or source address for lookup purposes.
section: "4.1"
topics:
    - ipsec
    - security
