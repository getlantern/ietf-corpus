document: rfc-3709
kind: normative-requirement
summary: All URIs MUST use either the HTTP scheme or the FTP scheme. At least one URI in each sequence MUST use the HTTP scheme. Clients MUST support retrieval of referenced LogotypeData with HTTP/1.1.
