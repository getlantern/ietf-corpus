document: rfc-8300
kind: design-rationale
summary: NSH version 01b is reserved and MUST NOT be used because widespread hardware implementations use the first nibble after an MPLS label stack for ECMP decision processing, requiring this value to be avoided to prevent misinterpretation by existing hardware.
section: "2.2"
topics:
    - mpls
    - security
