document: rfc-8514
kind: interoperability-note
summary: The SAVEDATESUPPORTED search key is the mechanism for clients to detect per-mailbox save date support at search time. Mailboxes whose underlying storage does not support save date will silently fall back to internal date for date-range search keys, which clients must account for when interpreting results.
section: "4.3"
topics:
    - email
