document: rfc-5587
kind: security-consideration
summary: The ability to programmatically inquire about specific mechanism properties should improve security by reducing hardcoding of mechanism OIDs and allowing applications to select mechanisms based on verified security properties. The semantics of each mechanism attribute may include a security component.
section: "6"
