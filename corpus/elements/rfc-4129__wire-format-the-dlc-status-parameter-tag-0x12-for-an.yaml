document: rfc-4129
kind: wire-format
summary: 'The DLC Status parameter (Tag 0x12) for an E1 interface is a 128-bit field encoding the status of up to 60 DLCs using 2 bits per DLC, with D0 and D16 marked Not Applicable (timeslots reserved for framing and signaling). Four status values are defined: 00=Out Of Service, 01=Reset Attempted, 10=Reset Completed, 11=Information Transfer.'
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
