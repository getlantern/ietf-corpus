document: rfc-4220
kind: design-rationale
summary: The TE link abstraction is introduced to aggregate link properties for use by OSPF, GMPLS, and LMP, reducing the volume of routing information exchanged in the network and thereby improving routing scalability. The bundled link extends this abstraction to group multiple TE links under a single management entity.
section: "2"
topics:
