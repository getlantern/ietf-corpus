document: rfc-2419
kind: normative-requirement
summary: Plain text not a multiple of 8 octets MUST be padded with sequential octets 1, 2, 3...7 to reach a multiple of 8. This Self-Describing-Padding scheme MUST be applied to ALL plain text packets, regardless of protocol type.
section: "6.1"
rfc2119_level: MUST
topics:
    - vpn
    - crypto
