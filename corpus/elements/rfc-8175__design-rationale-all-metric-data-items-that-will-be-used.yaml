document: rfc-8175
kind: design-rationale
summary: All metric Data Items that will be used during a session must be declared with default values in the Session Initialization Response. This 'declare-at-initialization' design ensures the router immediately knows the modem's full metric capability, and prevents runtime introduction of unanticipated metric types that could complicate routing decisions.
section: "6"
topics:
    - routing
