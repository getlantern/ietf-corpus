document: rfc-9864
kind: interoperability-note
summary: JOSE ES256 is already fully specified (specifies P-256 curve and SHA-256), while the corresponding COSE ES256 (-7) is polymorphic (only specifies SHA-256, not the curve) and is now deprecated by this specification. Implementers must distinguish between JOSE and COSE registrations for identically-named algorithms.
section: "2.1"
topics:
    - jose
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
