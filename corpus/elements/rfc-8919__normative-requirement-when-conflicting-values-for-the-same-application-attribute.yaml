document: rfc-8919
kind: normative-requirement
summary: When conflicting values for the same application/attribute/link are advertised in multiple ASLA sub-TLVs, the first advertisement received in the lowest-numbered LSP SHOULD be used and subsequent conflicting advertisements SHOULD be ignored.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
