document: rfc-6690
kind: interoperability-note
summary: 'The CoRE Link Format is equivalent to the RFC 5988 link format and reuses its serialization. To convert an HTTP Link Header field to this format: remove the ''Link:'' header, remove linear whitespace, convert to UTF-8, and decode percent-encodings.'
