document: rfc-7780
kind: normative-requirement
summary: An overloaded RBridge receiving a multi-destination TRILL Data packet MUST NOT apply an RPFC and MUST NOT forward the packet except as an egressed native frame where it is Appointed Forwarder; it is confined to leaf-node behavior in the distribution tree.
section: 2.3.2
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
