document: rfc-2748
kind: protocol-element
summary: The COPS common header is a fixed 8-octet structure containing a 4-bit Version field (current version 1), 4-bit Flags field (including the Solicited Message Flag bit 0x1), 8-bit Op Code (1–10), 16-bit Client-type, and 32-bit Message Length. Messages MUST be aligned on 4-octet intervals.
section: "2.1"
topics:
    - qos
    - security
