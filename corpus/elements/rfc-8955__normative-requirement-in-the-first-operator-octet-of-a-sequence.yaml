document: rfc-8955
kind: normative-requirement
summary: In the first operator octet of a sequence, the AND bit (a) MUST be encoded as unset and MUST be treated as always unset on decoding. The reserved zero bit MUST be set to 0 on NLRI encoding and MUST be ignored during decoding.
section: 4.2.1.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
