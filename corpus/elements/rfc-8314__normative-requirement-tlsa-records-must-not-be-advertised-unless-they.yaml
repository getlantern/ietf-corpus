document: rfc-8314
kind: normative-requirement
summary: TLSA records MUST NOT be advertised unless they are signed using DNSSEC. MSPs SHOULD advertise TLSA records to provide an additional trust anchor for public keys used in TLS server certificates.
section: 4.5.4
rfc2119_level: MUST NOT
