document: rfc-6482
kind: protocol-element
summary: The maxLength field, when present, specifies the maximum prefix length the AS is authorized to advertise. When absent, the AS is only authorized to advertise the exact prefix in the ROA. For example, prefix 203.0.113/24 with maxLength 26 authorizes any more-specific up to /26.
section: "3.3"
topics:
