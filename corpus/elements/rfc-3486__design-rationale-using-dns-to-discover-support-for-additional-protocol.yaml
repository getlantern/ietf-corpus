document: rfc-3486
kind: design-rationale
summary: Using DNS to discover support for additional protocol layers (security, compression) does not scale. A server supporting TCP+SCTP transports, TLS, and SigComp would require 8 DNS entries. An application-layer mechanism is therefore needed to signal compression support.
section: "1"
topics:
