document: rfc-4511
kind: protocol-element
summary: The Notice of Disconnection is an unsolicited notification with responseName OID 1.3.6.1.4.1.1466.20036 and messageID zero, sent by the server before terminating the LDAP session on its own initiative. It assists clients in distinguishing exceptional server conditions from transient network failures.
