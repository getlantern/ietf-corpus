document: rfc-3347
kind: normative-requirement
summary: Authenticated login MUST be resilient against attacks since many IP networks are vulnerable to packet inspection. iSCSI MUST also support data origin authentication of its communications; its use MAY be optional.
section: "7.2"
rfc2119_level: MUST
topics:
