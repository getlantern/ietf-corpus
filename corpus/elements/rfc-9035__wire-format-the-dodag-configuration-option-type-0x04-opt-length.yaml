document: rfc-9035
kind: wire-format
summary: The DODAG Configuration option (Type=0x04, Opt Length=14) is extended with the 'T' flag at bit position 2 of the reserved flags field (counting from bit 0 as most significant). Legacy implementations set this bit to 0 per RFC 6550 Sections 20.14 and 6.7.6.
