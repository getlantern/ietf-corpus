document: rfc-2019
kind: wire-format
summary: DSAP and SSAP fields shall both contain AA hex indicating SNAP encapsulation; CTL shall be 03 hex (Unnumbered Information); OUI shall be 000000 hex; Ethertype shall be 86DD hex for IPv6.
