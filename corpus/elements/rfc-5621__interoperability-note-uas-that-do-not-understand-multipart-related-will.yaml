document: rfc-5621
kind: interoperability-note
summary: UAs that do not understand 'multipart/related' will treat it as 'multipart/mixed', processing body parts independently by disposition type rather than as a compound object. Authors of SIP extensions using 'multipart/related' must account for this fallback behavior.
section: "7.3"
topics:
    - sip
    - realtime
