document: rfc-9756
kind: normative-requirement
summary: An experiment wishing to return experimental error codes SHOULD use one of the experimental Error-Type values (252-255). The experiment should agree among all participating parties on which Error-Type and which Error-values to use within that Error-Type.
section: "3.1"
rfc2119_level: SHOULD
