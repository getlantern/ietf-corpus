document: rfc-1247
kind: normative-requirement
summary: All OSPF protocol exchanges are authenticated. A single authentication scheme is configured per area, enabling different areas to use different authentication strictness. Only trusted routers can participate in the AS's routing.
section: "1.1"
rfc2119_level: MUST
topics:
    - routing
    - security
