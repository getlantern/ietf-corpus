document: rfc-9198
kind: protocol-element
summary: 'A Route Ensemble is the combination of all Routes traversed by different flows from Src to Dst during measurement interval T0 to Tf, aggregating all m distinct Member Routes. Formally: Route Ensemble = {{h(1,1),...,h(N1,1)=Dst}, ..., {h(1,m),...,h(Nm,m)=Dst}} where i <= Nj <= Nmax.'
