document: rfc-4816
kind: normative-requirement
summary: When the pseudowire is set up using the PWE3 control protocol, the ingress PE MUST NOT exceed the 'Maximum Number of concatenated ATM cells' value received in the Label Mapping message, and MUST NOT use cell concatenation if this parameter is omitted by the egress PE.
section: "2"
rfc2119_level: MUST NOT
