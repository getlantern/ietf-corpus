document: rfc-8671
kind: normative-requirement
summary: For pre-policy Adj-RIB-Out, all mandatory attributes (such as next hop) that are unknown at pre-policy phase completion MUST be either zero or have an empty length. The BMP receiver will treat such attributes as self-originated.
section: "5.2"
rfc2119_level: MUST
