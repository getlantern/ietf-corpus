document: rfc-2857
kind: security-consideration
summary: RIPEMD-160 was not originally developed as a keyed hash algorithm, whereas HMAC was designed for that purpose from the onset. Truncation of the resulting hash provides additional security, and specifications using HMAC are strongly encouraged to perform this truncation.
section: "5"
topics:
    - ipsec
    - crypto
    - security
