document: rfc-7256
kind: privacy-consideration
summary: Transmitting Request-Source-IP or Request-Source-MAC addresses beyond the AN introduces privacy risks for subscriber devices. It is RECOMMENDED that the AN map the device identifier to a local opaque value known only to the AN and AAA and transmit it via the Request-Source-Device-Id TLV instead.
section: 4.4.1
topics:
    - privacy
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
