document: rfc-9250
kind: registry
summary: IANA created the 'DNS-over-QUIC Error Codes' registry on the DNS Parameters page, governing a 62-bit space. Values 0x00–0x3f require Standards Action or IESG Approval; values above 0x3f use Specification Required for permanent or Expert Review for provisional registrations. Provisional registrations include a date field and may be reclaimed.
section: "8.4"
