document: rfc-8311
kind: normative-requirement
summary: 'RFC 6679 (ECN for RTP) is updated: random ECT values MUST NOT be used in RTP because they may expose RTP to differences in network treatment of ECT(1) versus ECT(0) traffic, and ECT(0) MUST be used unless otherwise specified in an Experimental RFC in the IETF document stream.'
section: "5"
rfc2119_level: MUST NOT
topics:
    - ecn
    - rtp
    - congestion
