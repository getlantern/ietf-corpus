document: rfc-3852
kind: protocol-element
summary: SignerInfo is an ASN.1 SEQUENCE containing version, SignerIdentifier (issuerAndSerialNumber or subjectKeyIdentifier CHOICE), digestAlgorithm, optional signedAttrs, signatureAlgorithm, signature OCTET STRING, and optional unsignedAttrs. It captures all per-signer information for a single digital signature.
