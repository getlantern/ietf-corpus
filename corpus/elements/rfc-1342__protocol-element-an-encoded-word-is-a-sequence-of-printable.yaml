document: rfc-1342
kind: protocol-element
summary: An 'encoded-word' is a sequence of printable ASCII characters beginning with '=?', ending with '?=', containing exactly four '?' characters including delimiters. It encodes non-ASCII text in message headers by specifying a charset, an encoding method ('B' or 'Q'), and the encoded text.
