document: rfc-2814
kind: security-consideration
summary: Access to enhanced quality-of-service must be controlled and authenticated. SBM security issues are identical to those of RSVP and Integrated Services; RFC 2747 MD5 cryptographic authentication should protect RSVP message integrity including all SBM-specific objects.
