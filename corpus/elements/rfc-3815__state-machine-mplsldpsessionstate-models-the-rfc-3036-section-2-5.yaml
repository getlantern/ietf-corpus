summary: 'mplsLdpSessionState models the RFC 3036 Section 2.5.4 Initialization State Machine with five states: nonexistent(1), initialized(2), openrec(3), opensent(4), and operational(5). Session rows appear in the table during initialization (state 2) and are removed when the session is torn down.'
