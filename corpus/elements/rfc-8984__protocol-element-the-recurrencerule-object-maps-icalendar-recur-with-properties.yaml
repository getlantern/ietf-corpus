summary: 'The RecurrenceRule object maps iCalendar RECUR with properties including frequency (mandatory), interval, rscale (calendar system, default ''gregorian''), skip (for invalid dates: ''omit''/''backward''/''forward''), firstDayOfWeek, and byX filter arrays (byDay, byMonthDay, byMonth, byYearDay, byWeekNo, byHour, byMinute, bySecond, bySetPosition), plus count or until for bounds.'
