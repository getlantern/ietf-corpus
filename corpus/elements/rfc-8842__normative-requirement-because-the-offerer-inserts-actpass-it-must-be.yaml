document: rfc-8842
kind: normative-requirement
summary: Because the offerer inserts 'actpass', it MUST be prepared to receive a DTLS ClientHello from the answerer before the SDP answer arrives. Any data received on the DTLS association before the fingerprint is verified MUST be treated as coming from an unverified source.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
