document: rfc-4145
kind: normative-requirement
summary: An endpoint that is supposed to initiate a new TCP connection SHOULD do so as soon as it is able, even before it intends to send media, to allow media to flow from the remote endpoint if needed.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - realtime
