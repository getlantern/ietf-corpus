kind: wire-format
summary: BasicOCSPResponse is a SEQUENCE containing tbsResponseData (ResponseData), signatureAlgorithm (AlgorithmIdentifier), signature (BIT STRING computed over hash of DER-encoded ResponseData), and optional certs. ResponseData includes version, responderID (byName or byKey SHA-1 hash), producedAt, SEQUENCE OF SingleResponse, and optional responseExtensions.
