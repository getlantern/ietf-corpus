document: rfc-9018
kind: security-consideration
summary: DNS Cookies provide no protection against on-path adversaries who can observe plaintext DNS traffic. An on-path attacker observing a Server Cookie can use it for denial-of-service amplification, forgery, or cache-poisoning attacks against the observed client for the full lifetime of that Server Cookie.
section: "8"
topics:
    - dns
    - security
