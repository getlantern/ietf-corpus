document: rfc-4254
kind: normative-requirement
summary: Replies to SSH_MSG_GLOBAL_REQUEST messages MUST be sent in the same order as the corresponding requests. For channel requests, replies relating to the same channel MUST also be in order; replies for distinct channels MAY be out-of-order.
section: "4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
