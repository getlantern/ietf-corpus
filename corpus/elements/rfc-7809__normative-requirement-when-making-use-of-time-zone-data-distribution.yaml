document: rfc-7809
kind: normative-requirement
summary: When making use of time zone data distribution services advertised by a CalDAV server, clients MUST follow all requirements of the time zone data distribution service protocol (RFC7808), taking care to refresh time zone data in a timely fashion.
section: 3.1.2
rfc2119_level: MUST
