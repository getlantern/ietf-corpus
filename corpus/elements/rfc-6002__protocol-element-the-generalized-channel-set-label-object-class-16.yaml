document: rfc-6002
kind: protocol-element
summary: The Generalized Channel_Set LABEL object (Class 16, C-Type 4) communicates one or more labels that can all be used equivalently in the data path of a single LSP. It is based on the LABEL_SET object from RFC 3473 but represents the full set in a single object rather than requiring multiple objects.
section: "3.2"
topics:
    - mpls
    - routing
