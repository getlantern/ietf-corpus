summary: 'STAR capability is advertised via a new ''auto-renewal'' object in the ACME directory ''meta'' field, containing: min-lifetime (required, integer seconds), max-duration (required, integer seconds), and allow-certificate-get (optional, boolean). This object MUST be present if the server supports STAR.'
