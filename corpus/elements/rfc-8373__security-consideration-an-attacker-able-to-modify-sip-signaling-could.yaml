document: rfc-8373
kind: security-consideration
summary: An attacker able to modify SIP signaling could alter 'hlang-send' or 'hlang-recv' values to prevent call completion. Use of TLS or IPsec is recommended to protect against such threats; RFC 6881 mandates TLS or IPsec for emergency calls.
section: "7"
topics:
    - security
    - realtime
    - sip
