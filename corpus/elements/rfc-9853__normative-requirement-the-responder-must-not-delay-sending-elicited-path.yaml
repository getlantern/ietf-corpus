document: rfc-9853
kind: normative-requirement
summary: The responder MUST NOT delay sending elicited path_response or path_drop messages, MUST send exactly one per valid path_challenge, and MUST send it to the address from which the corresponding path_challenge was received. The initiator MUST silently discard any invalid path_response or path_drop.
section: "5.4"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
