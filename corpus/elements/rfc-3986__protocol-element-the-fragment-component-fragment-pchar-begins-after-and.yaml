document: rfc-3986
kind: protocol-element
summary: The fragment component (fragment = *( pchar / "/" / "?")) begins after "#" and extends to end of URI. Fragment semantics are defined by the media type of the retrieved representation, not by the URI scheme; fragment identifier semantics cannot be redefined by schemes.
section: "3.5"
extracted_by: claude-sonnet-4-6
