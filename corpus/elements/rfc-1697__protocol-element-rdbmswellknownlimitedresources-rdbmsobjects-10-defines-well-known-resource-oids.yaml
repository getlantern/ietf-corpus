document: rfc-1697
kind: protocol-element
summary: rdbmsWellKnownLimitedResources (rdbmsObjects 10) defines well-known resource OIDs for use as rdbmsDbLimitedResourceID or rdbmsSrvLimitedResourceID values. The only defined entry is rdbmsLogSpace (subobject 1), representing storage allocated for redo and undo logs.
