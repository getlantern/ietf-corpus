document: rfc-5546
kind: security-consideration
summary: 'Unauthorized replacement of the Organizer: an Attendee could forge a REQUEST with an incremented SEQUENCE and a changed ORGANIZER property to usurp control of an event. Implementations should verify the identity of the sender before accepting a change to the Organizer role.'
section: 6.1.3
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
