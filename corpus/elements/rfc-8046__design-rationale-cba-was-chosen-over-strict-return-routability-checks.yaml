document: rfc-8046
kind: design-rationale
summary: CBA was chosen over strict return-routability checks because it allows ongoing data transfer to proceed with minimal interruption while address verification completes. Rather than eliminating malicious redirection entirely, CBA prevents amplification, making redirection-based flooding no more effective than direct flooding that the attacker could perform anyway.
section: 3.3.2
topics:
    - security
    - ip
    - mobility
