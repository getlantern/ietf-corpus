document: rfc-3291
kind: interoperability-note
summary: Because InetAddressIPv6 represents both global and (when no zone index is needed) non-global IPv6 addresses, MIB designers using InetAddressType/InetAddress pairs do not need to define additional objects to support non-global addresses on nodes connecting multiple zones — they use InetAddressIPv6z (ipv6z(4)) for that case.
section: "4.2"
topics:
    - snmp
    - ip
