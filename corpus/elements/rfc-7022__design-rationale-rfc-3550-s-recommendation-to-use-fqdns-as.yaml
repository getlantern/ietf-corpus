document: rfc-7022
kind: design-rationale
summary: RFC 3550's recommendation to use FQDNs as RTCP CNAMEs is no longer adequate because FQDNs are no longer necessarily unique across endpoints in large service provider networks. Similarly, IPv4 addresses fail because private addresses (RFC 1918) and NAT sharing mean multiple hosts may have the same address.
section: "3"
topics:
