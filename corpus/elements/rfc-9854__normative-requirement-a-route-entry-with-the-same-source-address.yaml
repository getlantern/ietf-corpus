document: rfc-9854
kind: normative-requirement
summary: A route entry with the same source address, destination address, and RPLInstanceID but a stale Sequence Number (incoming SeqNo is less than the stored SeqNo) MUST be deleted, ensuring only the freshest route information is retained.
section: 6.2.3
rfc2119_level: MUST
topics:
    - routing
