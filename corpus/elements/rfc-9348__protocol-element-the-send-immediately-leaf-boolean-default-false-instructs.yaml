document: rfc-9348
kind: protocol-element
summary: The send-immediately leaf (boolean, default false) instructs the receiver to deliver inner packets as soon as they are available without waiting for lost or misordered outer packets. This reduces inner-packet latency at the cost of potentially amplified out-of-order delivery when aggregation and reordering interact.
section: "3.2"
topics:
    - ipsec
    - yang
    - realtime
