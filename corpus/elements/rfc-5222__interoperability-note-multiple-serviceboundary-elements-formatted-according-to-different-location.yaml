document: rfc-5222
kind: interoperability-note
summary: Multiple <serviceBoundary> elements formatted according to different location profiles within a single <findServiceResponse> are alternative representations of the same area, not additive geometries. However, multiple location elements within a single <serviceBoundary> element are additive, allowing non-contiguous service regions.
section: "5.5"
topics:
    - realtime
