document: rfc-7968
kind: design-rationale
summary: The second-highest-priority tree root is recommended to be pre-configured with the same tree-VLAN correspondence as the highest-priority tree root (for trees other than the highest-priority tree itself), so that multicast forwarding table changes are minimized upon highest-priority root failure.
