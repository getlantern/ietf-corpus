document: rfc-4425
kind: normative-requirement
summary: Each Access Unit MUST start with the AU header defined in section 5.2, and the AU payload MUST contain data belonging to exactly one VC-1 frame. Data from different VC-1 frames will always be in different AUs.
section: "4.1"
rfc2119_level: MUST
