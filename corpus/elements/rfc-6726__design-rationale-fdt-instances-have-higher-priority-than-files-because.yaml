document: rfc-6726
kind: design-rationale
summary: FDT Instances have higher priority than files because a receiver needs a file's FDT entry before it can recover the file. It is RECOMMENDED that FDT Instances be sent before and during file transmission, and that FEC protection be applied to multi-packet FDT Instances to handle packet loss.
section: "3.3"
topics:
    - multicast
