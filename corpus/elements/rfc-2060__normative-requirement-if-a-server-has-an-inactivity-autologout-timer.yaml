document: rfc-2060
kind: normative-requirement
summary: If a server has an inactivity autologout timer, that timer MUST be of at least 30 minutes' duration. Receipt of ANY command from the client SHOULD suffice to reset the timer.
section: "5.4"
rfc2119_level: MUST
topics:
    - email
    - security
