document: rfc-5677
kind: normative-requirement
summary: When UDP is used and RTT is not known, the sender SHOULD NOT send more than one UDP message every 3 seconds, providing a rate-limiting effect similar to TCP's built-in controls.
section: "6.2"
rfc2119_level: SHOULD NOT
topics:
    - mobility
    - udp
