document: rfc-9536
kind: normative-requirement
summary: Servers MUST return an HTTP 501 (Not Implemented) response to inform clients of unsupported reverse searches. Servers MAY restrict how predicates are used by returning a 400 (Bad Request) response when a problematic request is received.
