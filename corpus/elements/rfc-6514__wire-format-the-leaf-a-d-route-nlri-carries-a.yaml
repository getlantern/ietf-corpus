document: rfc-6514
kind: wire-format
summary: The Leaf A-D Route NLRI carries a variable-length Route Key field (set to the full MCAST-VPN NLRI of the triggering Inter-AS I-PMSI or S-PMSI A-D route) followed by the Originating Router's IP Address. It is originated only when the triggering route's PMSI Tunnel attribute has the Leaf Information Required (L) bit set to 1.
section: "4.4"
topics:
