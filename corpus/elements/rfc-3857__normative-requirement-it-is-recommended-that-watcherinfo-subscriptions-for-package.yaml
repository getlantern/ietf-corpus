document: rfc-3857
kind: normative-requirement
summary: It is RECOMMENDED that watcherinfo subscriptions for package foo for user A be allowed from user B only if B is an authorized subscriber to A within package foo, and that such notifications contain only the state of B's own subscription.
section: "4.6"
rfc2119_level: RECOMMENDED
