document: rfc-4639
kind: interoperability-note
summary: The compliance statements in this MIB version require support only for IPv4 addresses because DOCSIS 1.0, 1.1, and 2.0 are not IPv6 capable. Future DOCSIS 3.0 is expected to require IPv6, necessitating new compliance statements rather than changes to existing MIB objects.
section: 3.1.3
topics:
    - snmp
    - ip
    - v6ops
