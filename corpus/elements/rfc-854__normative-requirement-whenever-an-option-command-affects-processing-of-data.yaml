document: rfc-854
kind: normative-requirement
summary: Whenever an option command affects processing of data being sent from party A to party B, the command MUST be inserted in the data stream at the point where the effect is desired, not sent out-of-band.
section: GENERAL CONSIDERATIONS
rfc2119_level: MUST
