document: rfc-1271
kind: normative-requirement
summary: During a set operation on alarmVariable, if the supplied variable name is not available in the selected MIB view, a badValue error must be returned. If the variable subsequently becomes unavailable, the probe must change the alarmEntry status to invalid(4).
section: "6"
rfc2119_level: MUST
topics:
    - snmp
