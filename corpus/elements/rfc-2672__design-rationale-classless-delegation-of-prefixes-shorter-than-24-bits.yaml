document: rfc-2672
kind: design-rationale
summary: Classless delegation of prefixes shorter than 24 bits in in-addr.arpa (RFC 2317) can be extended using DNAME records, allowing a /22 prefix to be delegated with four DNAME entries mapping each /24 subdomain into the delegated zone.
