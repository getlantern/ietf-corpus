document: rfc-6720
kind: wire-format
summary: The Common Hello Parameter TLV (type 0x0400) is extended with a G (GTSM) flag in a previously reserved bit position. The 32-bit TLV value field carries Hold Time (16 bits), followed by T, R, G flags, and reserved bits. G=1 signals GTSM capability; G=0 or absent signals no GTSM support.
section: "2.1"
topics:
    - mpls
    - security
