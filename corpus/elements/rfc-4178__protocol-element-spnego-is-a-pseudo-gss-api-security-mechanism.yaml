document: rfc-4178
kind: protocol-element
summary: SPNEGO is a pseudo GSS-API security mechanism (OID 1.3.6.1.5.5.2) that allows peers to negotiate a common security mechanism in-band. The initiator proposes an ordered list of mechanisms; the acceptor selects one or rejects all. Subsequent mechanism-specific context tokens are then carried within the negotiation messages.
section: "1"
topics:
    - security
