document: rfc-5596
kind: protocol-element
summary: The DCCP-Listen packet is a new DCCP packet type (Type=10) that a fully specified server sends to a known client to punch a hole through middleboxes. It carries Source Port, Destination Port, Sequence Number, and Service Code fields in the standard generic header format, but sequence numbers have no meaning in this context.
section: 2.2.1
topics:
    - nat
    - congestion
    - udp
    - realtime
