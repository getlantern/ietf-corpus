document: rfc-3810
kind: normative-requirement
summary: Version 2 Multicast Listener Reports MUST be sent to the all-MLDv2-capable-routers address FF02::16. Routers MUST silently discard Reports not sent with a valid link-local source address, preventing unidentified nodes from influencing MLDv2 router state.
section: 5.2.14
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - security
