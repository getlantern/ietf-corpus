document: rfc-3201
kind: design-rationale
summary: The CiFlowDirection index allows a single physical circuit to have separate virtual interfaces for transmit-only and receive-only traffic, enabling directional monitoring via RMON-II without protocol modifications. Unidirectional interfaces SHOULD include a warning in ifDescr.
