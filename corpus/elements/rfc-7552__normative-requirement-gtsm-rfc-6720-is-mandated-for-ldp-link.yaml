document: rfc-7552
kind: normative-requirement
summary: GTSM (RFC 6720) is mandated for LDP Link Hello packets over IPv6, with IPv6 Hop Limit set to 255. GTSM is also recommended for LDPoIPv6 TCP transport connections. This applies only to single-hop LDP peering sessions; multi-hop sessions must statically or dynamically disable GTSM.
section: "9"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - security
    - v6ops
