document: rfc-950
kind: normative-requirement
summary: The all-zeros and all-ones values in the subnet field must not be assigned to actual (physical) subnets, preserving the special meaning of zero ('this network') and all-ones ('all hosts') consistent with IP addressing conventions.
section: "2.1"
rfc2119_level: MUST NOT
topics:
