document: rfc-8227
kind: normative-requirement
summary: All nodes on the same ring MUST use the same protection mechanism (wrapping, short-wrapping, or steering). If the RPS protocol on any node detects an RPS message with a protection-switching mode that was not provisioned, a protocol failure is reported and the protection mechanism is not activated.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
