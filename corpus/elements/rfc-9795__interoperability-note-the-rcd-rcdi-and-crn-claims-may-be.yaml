document: rfc-9795
kind: interoperability-note
summary: The "rcd", "rcdi", and "crn" claims MAY be added directly as additional claims to PASSporTs using other extensions (e.g., SHAKEN/RFC 8588), avoiding the need for multiple Identity header fields. A verifier that understands only the other extension will still validate the signature over the RCD claims but is permitted to ignore them.
section: "13"
topics:
