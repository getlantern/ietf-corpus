document: rfc-9625
kind: normative-requirement
summary: Link-local IP multicast traffic (IPv4 224/24 and IPv6 FF02/16) MUST always be carried on the BUM tunnels and ONLY on the BUM tunnels. Such traffic is excluded from the definition of 'IP multicast packet' for all other OISM procedures.
section: "2.6"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
