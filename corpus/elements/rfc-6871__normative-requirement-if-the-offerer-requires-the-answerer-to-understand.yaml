document: rfc-6871
kind: normative-requirement
summary: If the offerer requires the answerer to understand the media capability extensions, the offerer MUST include a 'creq' attribute containing the value 'med-v0'. If required only for specific media descriptions, the 'med-v0' value MUST be provided only in 'creq' attributes within those media descriptions.
section: 3.4.1
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
