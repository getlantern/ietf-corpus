document: rfc-8551
kind: normative-requirement
summary: Sending and receiving agents MUST support SHA-256 and MUST support SHA-512 as digest algorithms for digesting the message body. The digest algorithm used SHOULD be of similar or greater strength than the signature algorithm.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
