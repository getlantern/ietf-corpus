document: rfc-6531
kind: normative-requirement
summary: Servers offering the SMTPUTF8 extension MUST provide support for, and announce, the 8BITMIME extension (RFC 6152). SMTPUTF8-aware clients MUST use BODY=8BITMIME when sending internationalized messages.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
