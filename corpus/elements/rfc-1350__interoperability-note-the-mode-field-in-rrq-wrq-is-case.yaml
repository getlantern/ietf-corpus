document: rfc-1350
kind: interoperability-note
summary: The mode field in RRQ/WRQ is case-insensitive; any combination of upper and lower case (e.g., 'NETASCII', 'NetAscii') is acceptable. Sender and recipient are not required to operate in the same mode.
