document: rfc-8008
kind: design-rationale
summary: Highly dynamic capability data (real-time delivery performance metrics, CDN resource load, QoS) is explicitly out of scope for the CDNI FCI. The FCI targets information that does not change highly dynamically and is necessary for basic delegation decisions such as supported delivery protocol.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
