document: rfc-8705
kind: interoperability-note
summary: The resource server does not need to validate the trust chain of the client's certificate in any method defined in this document, because proof-of-possession is decoupled from the client authentication method used at the authorization server; the resource server configures TLS to not verify CA signing.
