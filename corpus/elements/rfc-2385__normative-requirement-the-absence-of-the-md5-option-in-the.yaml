document: rfc-2385
kind: normative-requirement
summary: The absence of the MD5 option in the SYN,ACK segment MUST NOT cause the sender to disable its sending of signatures. Sending of signatures must be under complete control of the application, not contingent on remote host understanding the option.
section: "2.0"
rfc2119_level: MUST NOT
topics:
    - tcp
    - bgp
    - security
