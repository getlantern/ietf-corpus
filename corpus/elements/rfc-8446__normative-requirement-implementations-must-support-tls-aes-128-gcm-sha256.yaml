document: rfc-8446
kind: normative-requirement
summary: Implementations MUST support TLS_AES_128_GCM_SHA256 and SHOULD support TLS_AES_256_GCM_SHA384 and TLS_CHACHA20_POLY1305_SHA256. All TLS 1.3 cipher suites pair an AEAD algorithm with an HKDF hash function; non-AEAD cipher suites from TLS 1.2 are not permitted.
section: "9.1"
rfc2119_level: MUST
topics:
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
