document: rfc-3539
kind: security-consideration
summary: Where TLS (RFC 2246) is used for AAA security, the protocol is vulnerable to spoofed TCP reset packets and other transport-layer DoS attacks such as SYN flooding. SCTP offers improved DoS resilience compared to TCP and can mitigate this to some extent.
