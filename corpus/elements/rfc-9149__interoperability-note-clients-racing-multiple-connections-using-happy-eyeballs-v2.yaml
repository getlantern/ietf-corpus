document: rfc-9149
kind: interoperability-note
summary: Clients racing multiple connections using Happy Eyeballs V2 should set resumption_count equal to the number of parallel connection attempts to avoid running out of tickets; sending a resumption_count less than the number of parallel attempts may result in zero tickets.
section: "3"
topics:
