document: rfc-7848
kind: security-consideration
summary: A party using Signed Mark objects must verify that the digital signature is valid based on local policy. A PKI (or equivalent) must be implemented for the signatures to have any useful semantics; for gTLDs, the policy is defined in the ICANN TMCH Rights Protection Mechanism Requirements.
section: "5"
topics:
