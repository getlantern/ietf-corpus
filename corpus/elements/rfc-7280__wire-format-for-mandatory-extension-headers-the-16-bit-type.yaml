document: rfc-7280
kind: wire-format
summary: For Mandatory Extension Headers, the 16-bit Type field is formed by setting the most significant 8 bits to zero and the lower 8 bits to the registry value (0-255). For Optional Extension Headers, the 16-bit Type field combines bits 8-15 from the registry value with the actual H-LEN (bits 5-7), yielding 16-bit values in the range 0-1535 decimal.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
