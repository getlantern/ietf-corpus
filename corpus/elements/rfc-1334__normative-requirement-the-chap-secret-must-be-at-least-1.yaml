document: rfc-1334
kind: normative-requirement
summary: The CHAP secret MUST be at least 1 octet in length and SHOULD be at least as large and unguessable as a well-chosen password; preferably at least 16 octets (the MD5 hash length) to resist exhaustive search attacks.
section: "3"
rfc2119_level: MUST
topics:
