document: rfc-5061
kind: wire-format
summary: The Delete IP Address parameter (type 0xC002) contains a 32-bit ASCONF-Request Correlation ID and a variable-length IPv4 or IPv6 Address Parameter TLV. If the address is 0.0.0.0 or ::0, all peer addresses except the packet source address MUST be deleted.
section: 4.2.2
topics:
