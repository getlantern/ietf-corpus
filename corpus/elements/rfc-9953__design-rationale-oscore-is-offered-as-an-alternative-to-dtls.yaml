document: rfc-9953
kind: design-rationale
summary: OSCORE is offered as an alternative to DTLS/TLS to avoid the resource overhead of session-layer security on constrained IoT devices. OSCORE provides object-level security directly over CoAP without requiring a separate security handshake at the transport layer.
section: "1"
topics:
