document: rfc-8981
kind: interoperability-note
summary: Some servers perform inverse-DNS (PTR) validation before accepting connections, and may refuse clients whose temporary addresses are not registered in DNS. Wide deployment of temporary addresses could challenge this practice, which the document notes has little validity.
