document: rfc-4631
kind: design-rationale
summary: Setting ifAdminStatus to 'testing' on a TE link's ifEntry is the trigger mechanism for initiating LMP link verification on that TE link, reusing the standard IF-MIB testing state rather than introducing a separate LMP-specific trigger object, maintaining consistency with the Interfaces Group model.
