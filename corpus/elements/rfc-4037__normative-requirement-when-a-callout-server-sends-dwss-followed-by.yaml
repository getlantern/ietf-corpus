document: rfc-4037
kind: normative-requirement
summary: When a callout server sends DWSS followed by DWSR to get out of the loop, the OPES processor MUST NOT send AME 206 before sending DSS. Adapted dataflow termination must be authorized by the processor before original dataflow termination is permitted.
section: "8.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
