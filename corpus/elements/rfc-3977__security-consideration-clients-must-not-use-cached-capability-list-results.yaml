document: rfc-3977
kind: security-consideration
summary: Clients MUST NOT use cached capability list results when making security, privacy, or authentication decisions. A stale cache could indicate that a security extension is unavailable when it is, or vice versa, leading to data sent over an unintended connection type.
section: "12.6"
topics:
    - security
