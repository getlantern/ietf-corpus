document: rfc-7455
kind: interoperability-note
summary: Intermediate RBridges that do not support the 'A' flag (OAM incapable) follow RFC 6325 Section 3.3 and forward OAM frames with the 'A' flag unaltered, enabling end-to-end OAM connectivity even in mixed-capability TRILL networks.
section: 3.2.1
