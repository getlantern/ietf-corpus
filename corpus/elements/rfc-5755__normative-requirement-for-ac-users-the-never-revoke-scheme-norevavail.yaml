document: rfc-5755
kind: normative-requirement
summary: For AC users, the 'never revoke' scheme (noRevAvail extension) MUST be supported and the 'pointer in AC' scheme SHOULD be supported. If only the 'never revoke' scheme is supported, ACs without noRevAvail MUST be rejected.
section: "6"
rfc2119_level: MUST
topics:
