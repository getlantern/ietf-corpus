document: rfc-6363
kind: wire-format
summary: The Generic Explicit Source FEC Payload ID is exactly two octets in length and encodes an unsigned packet sequence number in network-byte order. Source packets within a given source block MUST have consecutive sequence numbers, with wrap-around from 65535 to 0.
section: 5.3.1
topics:
