document: rfc-8834
kind: privacy-consideration
summary: Long-term persistent RTCP CNAMEs can be used to track a user or device across different services. WebRTC endpoints MUST generate a new short-term persistent CNAME per RTCPeerConnection (RFC 7022), and different CNAMEs MUST be used for different RTCPeerConnection instances unless same-origin context explicitly enables reuse.
section: "4.9"
topics:
    - webrtc
    - rtp
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
