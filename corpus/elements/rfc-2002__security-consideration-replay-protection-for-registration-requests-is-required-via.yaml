document: rfc-2002
kind: security-consideration
summary: Replay protection for Registration Requests is required via the 64-bit Identification field using either timestamp-based (Section 5.6.1) or nonce-based (Section 5.6.2) methods. Timestamps require time synchronization; nonces require the home agent to initiate a challenge-response exchange.
section: "5.6"
topics:
