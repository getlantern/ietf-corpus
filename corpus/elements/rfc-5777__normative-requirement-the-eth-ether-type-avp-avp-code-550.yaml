document: rfc-5777
kind: normative-requirement
summary: The ETH-Ether-Type AVP (AVP Code 550) MAY be present for DIX or SNAP-at-802.2 frames, but the ETH-SAP AVP MUST NOT also be present in the same ETH-Proto-Type AVP; ETH-Ether-Type and ETH-SAP are mutually exclusive.
section: 4.1.8.16
rfc2119_level: MUST NOT
