document: rfc-6680
kind: normative-requirement
summary: A mechanism MUST always prefix raw name attributes it passes through with a prefix that reflects the context of the attribute, in order to prevent ambiguities that could arise if a mechanism blindly passes through an attribute name it does not understand.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
