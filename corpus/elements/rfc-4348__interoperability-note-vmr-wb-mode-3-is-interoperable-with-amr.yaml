document: rfc-4348
kind: interoperability-note
summary: VMR-WB mode 3 is interoperable with AMR-WB (RFC 3267) at 6.60, 8.85, and 12.65 kbps (FT=0, 1, 2). The octet-aligned VMR-WB payload format in interoperable mode is identical to that of AMR-WB, enabling Transcoder-Free (TrFO) interconnection between CDMA2000 and GSM/WCDMA networks.
section: "3"
topics:
