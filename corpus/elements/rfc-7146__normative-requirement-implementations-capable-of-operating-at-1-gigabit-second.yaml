document: rfc-7146
kind: normative-requirement
summary: Implementations capable of operating at 1 gigabit/second or higher MUST implement extended (64-bit) sequence numbers for ESPv2 and ESPv3 (if supported), and SHOULD use extended sequence numbers for all block storage protocol traffic, to avoid frequent SA rekeying from 32-bit sequence number exhaustion.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
