document: rfc-5466
kind: normative-requirement
summary: Use of the FILTER search key implies CHARSET UTF-8. If the SEARCH/UID SEARCH command includes an explicit CHARSET other than UTF-8 or US-ASCII, the server MUST return a tagged BAD response containing the BADCHARSET response code.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
