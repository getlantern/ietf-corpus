document: rfc-9833
kind: security-consideration
summary: Modules reusing the authentication groupings ('bgp-authentication', 'ospf-authentication', 'isis-authentication', 'rip-authentication') inherit the security considerations of RFC 8177 (YANG Key Chain model). ASCII-only key representation limits key entropy compared to hexadecimal encoding.
