document: rfc-7529
kind: normative-requirement
summary: When SKIP=FORWARD is set, a date with an invalid month is changed to the next valid month and an invalid day-of-month to the next valid day. If adjusting the month produces an invalid day, skip behavior is reapplied per day-of-month rules.
section: "4.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
