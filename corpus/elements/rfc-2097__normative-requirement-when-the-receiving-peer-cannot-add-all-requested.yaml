document: rfc-2097
kind: normative-requirement
summary: When the receiving peer cannot add all requested NetBIOS names, it MUST Configure-Nak with the complete list of names requested, setting the Added field to zero for successfully added names and a non-zero return code for names that could not be added.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
