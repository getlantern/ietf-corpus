document: rfc-8518
kind: design-rationale
summary: MAX_METRIC is sometimes set on a link in one direction for TE purposes while primary traffic uses the link in the forward direction. Strictly excluding the link from LFA consideration per RFC 5286 can leave no viable alternate; this document permits its use as an LFA since the primary path already relies on it.
section: "5.1"
topics:
    - routing
