document: rfc-8089
kind: interoperability-note
summary: A file URI can be dependably dereferenced or translated to a local file path only if it is local—meaning it has no file-auth, or the file-auth is "localhost", or a fully qualified domain name resolving to the local machine. Operations on non-local file URIs are neither defined nor forbidden by this specification.
section: "3"
