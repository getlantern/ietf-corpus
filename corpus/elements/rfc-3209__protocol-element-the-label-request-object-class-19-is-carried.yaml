document: rfc-3209
kind: protocol-element
summary: 'The LABEL_REQUEST object (class 19) is carried in Path messages to request downstream label binding and identify the L3 protocol (L3PID as Ethertype) to be carried over the LSP. Three C-Types: Type 1 (no label range), Type 2 (ATM VPI/VCI range with M-bit for merge capability), Type 3 (Frame Relay DLCI range with DLI length indicator).'
section: "4.2"
topics:
