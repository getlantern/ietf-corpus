document: rfc-4535
kind: normative-requirement
summary: Nonces MUST be present in GSAKMP messages unless synchronization time is available to the system. The Nonce_I value generated in the RTJ MUST be saved for potential later use in freshness verification of subsequent messages.
section: 5.2.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
