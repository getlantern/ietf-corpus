document: rfc-7071
kind: registry
summary: 'IANA has created the "Reputation Applications" registry for symbolic names of reputation applications used with application/reputon+json. Registrations require: symbolic name (MIME token syntax), short description, defining document, status (current/deprecated/historic), subject syntax, assertions with 0.0/1.0 anchor meanings, optional query parameters, and optional response set extension keys. Policy is IETF Review or Specification Required.'
section: "7.2"
topics:
