document: rfc-6520
kind: normative-requirement
summary: There MUST NOT be more than one HeartbeatRequest message in flight at a time. A message is considered in flight until the corresponding HeartbeatResponse is received or the retransmit timer expires.
section: "3"
rfc2119_level: MUST NOT
topics:
