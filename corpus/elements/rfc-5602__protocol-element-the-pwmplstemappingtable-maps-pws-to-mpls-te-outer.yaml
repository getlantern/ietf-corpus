document: rfc-5602
kind: protocol-element
summary: The pwMplsTeMappingTable maps PWs to MPLS-TE outer tunnel head-ends, indexed by tunnel index, tunnel instance, peer LSR ID, local LSR ID, and PW index. It allows quick retrieval of PWs configured on a specific MPLS-TE tunnel and reports the active LSP instance.
