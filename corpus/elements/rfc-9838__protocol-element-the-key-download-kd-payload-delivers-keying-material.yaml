document: rfc-9838
kind: protocol-element
summary: 'The Key Download (KD) payload delivers keying material from the GCKS to GMs. It contains key bags: Group Key Bags carry keys common to all GMs, and Member Key Bags carry per-GM keys (e.g., individual LKH node keys). All keys are transmitted in encrypted (wrapped) form using a Key Wrap Key (KWK), with a 32-bit Key ID and 32-bit KWK ID in each wrapped key structure.'
section: "4.5"
