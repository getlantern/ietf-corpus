document: rfc-8863
kind: design-rationale
summary: The 39.5-second recommended PAC timer value is chosen to roughly coincide with the maximum possible duration of ICE connectivity checks from the remote peer, which, if successful, could create peer-reflexive candidates. Because the local agent does not know the remote side's candidate pair count or pacing interval, this is an educated guess.
