document: rfc-2287
kind: normative-requirement
summary: The value of sysApplInstallPkgIndex must remain constant at least from one re-initialization of the network management entity to the next re-initialization, and a value must not be reused until the next agent entity restart if the installed application entry is deleted.
section: "6"
rfc2119_level: MUST
topics:
    - snmp
