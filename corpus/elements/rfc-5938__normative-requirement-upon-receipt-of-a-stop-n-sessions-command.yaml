document: rfc-5938
kind: normative-requirement
summary: Upon receipt of a Stop-N-Sessions command referencing a specific SID, the Session-Reflector MUST ignore TWAMP-Test packets in that session that arrive within the Timeout window, and MUST NOT generate a test packet to the Session-Sender for those ignored packets.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - measurement
