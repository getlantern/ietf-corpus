document: rfc-9390
kind: wire-format
summary: 'The Session-Group-Control-Vector AVP (AVP Code 672) is of type Unsigned32 and encodes a 32-bit flag field. Two flags are defined: SESSION_GROUP_ALLOCATION_ACTION (0x00000001), indicating assign (set) or remove (cleared), and SESSION_GROUP_STATUS (0x00000010), indicating group active (set) or deleted (cleared).'
section: "7.2"
