document: rfc-8106
kind: interoperability-note
summary: When DNS information is available from both RA options and DHCPv6, both sources should be maintained. The DNS options from different sources should be stored with DHCP-sourced entries first (taking precedence), but all sources should be kept.
section: 5.3.1
topics:
