document: rfc-4208
kind: normative-requirement
summary: A core-node next to an edge-node receiving a PathErr with Path_State_Removed from its downstream neighbor MUST NOT retain Path state and send a ResvTear further upstream, because that would imply Path state further downstream had also been retained.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - mpls
