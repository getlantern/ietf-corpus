document: rfc-7577
kind: security-consideration
summary: Even read-only access to battery status objects may expose corporate trade secrets, including the number and types of installed batteries, their firmware versions, remaining capacity, and expected replacement schedules. SNMPv3 authentication and privacy (encryption) SHOULD be used to protect GET and NOTIFY access.
section: "5"
topics:
    - security
    - snmp
