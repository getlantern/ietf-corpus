document: rfc-7770
kind: design-rationale
summary: OSPFv2 options field bits are fully allocated, so additional optional capabilities cannot be advertised there. The RI LSA mechanism using Opaque LSAs (OSPFv2) and a new LSA type (OSPFv3) was introduced to extend capability advertisement without modifying existing options fields.
section: "1"
topics:
    - routing
