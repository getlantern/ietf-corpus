document: rfc-3347
kind: normative-requirement
summary: The iSCSI protocol MUST operate over a single TCP connection to accommodate lower-cost implementations. Connection binding (multiple TCP connections appearing as one SCSI transport) SHOULD be supported but MUST be optional to implement.
section: "3.4"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
