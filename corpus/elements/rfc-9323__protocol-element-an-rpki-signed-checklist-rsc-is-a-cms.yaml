document: rfc-9323
kind: protocol-element
summary: An RPKI Signed Checklist (RSC) is a CMS-protected content type that contains one or more checksums of arbitrary digital objects signed with a specific set of Internet Number Resources. When validated, an RSC confirms that the respective Internet resource holder produced it. RSCs are intended to facilitate inter-domain use cases such as BYOIP on-boarding and AS interconnection.
section: "1"
topics:
