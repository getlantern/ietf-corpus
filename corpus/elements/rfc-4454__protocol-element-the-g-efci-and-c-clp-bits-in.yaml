document: rfc-4454
kind: protocol-element
summary: The G (EFCI) and C (CLP) bits in the ATM-Specific Sublayer convey the EFCI and CLP quality bits across the ATMPW. The ingress LCCE SHOULD set each to 1 if the corresponding ATM cell bit is set; the egress LCCE SHOULD propagate them to all outgoing cells.
section: "4.1"
topics:
    - routing
    - qos
