document: rfc-4738
kind: protocol-element
summary: 'The PKE payload in R_MESSAGE carries the envelope key encrypted with the Initiator''s public key: PKE = E(PKi, env_key). The envelope key MAY be cached and reused as a PSK for re-keying, as suggested in RFC 3830.'
