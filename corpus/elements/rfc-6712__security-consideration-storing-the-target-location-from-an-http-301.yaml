document: rfc-6712
kind: security-consideration
summary: Storing the target location from an HTTP '301 Moved Permanently' response could be exploited by a man-in-the-middle attacker to permanently redirect clients away from the correct server, effectively a permanent denial-of-service. Clients should only follow redirects after careful security consideration.
section: "5"
topics:
