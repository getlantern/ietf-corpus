document: rfc-2662
kind: protocol-element
summary: 'The ADSL LINE MIB defines two modules: ADSL-TC-MIB (OID transmission.94.2) providing textual conventions, and ADSL-LINE-MIB (OID transmission.94) providing all managed objects. Both are SMIv2-compliant and rooted under the IANA-assigned transmission.94 arc.'
