document: rfc-2302
kind: design-rationale
summary: There is no default value for the application parameter; its absence indicates the image is Baseline TIFF or that identifying the application is unnecessary. The parameter is intended to assist recipient dispatch to a suitable rendering package, not to convey capability levels.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
