document: rfc-1372
kind: normative-requirement
summary: It is permissible for either side to turn off the option by sending WONT or DONT; once this happens, no more subnegotiations may be sent unless the option is re-enabled by a new DO/WILL exchange.
section: "5"
rfc2119_level: MAY
