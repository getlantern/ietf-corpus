document: rfc-4719
kind: design-rationale
summary: The Ethernet PW is homogeneous with respect to packet encapsulation — both ends must be either untagged or tagged. Heterogeneous services can be provided via NSP functionality at the ingress/egress LCCE, which is outside the PW scope.
