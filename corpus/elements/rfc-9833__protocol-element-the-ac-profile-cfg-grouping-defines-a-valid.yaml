summary: 'The ''ac-profile-cfg'' grouping defines a ''valid-provider-identifiers'' container listing provider-scoped profile references: encryption-profile-identifier, qos-profile-identifier, failure-detection-profile-identifier, forwarding-profile-identifier, and routing-profile-identifier. A nacm:default-deny-write statement restricts write access.'
