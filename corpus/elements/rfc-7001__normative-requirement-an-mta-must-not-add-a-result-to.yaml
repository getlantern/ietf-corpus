document: rfc-7001
kind: normative-requirement
summary: An MTA MUST NOT add a result to an existing Authentication-Results header field; each MTA performing authentication must add its own new header field instance. Each method and result referenced MUST be declared in the IANA registry or qualify as an extension method/result per Sections 2.6.6–2.6.7.
section: "4"
rfc2119_level: MUST NOT
topics:
    - email
