document: rfc-9103
kind: normative-requirement
summary: It is RECOMMENDED that for each protocol used on top of TCP in a given client/server interaction there SHOULD be no more than one connection for regular queries and one for zone transfers. This updates RFC 7766's guidance and extends it beyond TCP to all transports.
section: "6.4"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - tcp
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
