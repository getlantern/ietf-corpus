document: rfc-6611
kind: design-rationale
summary: The NAS and DHCP relay are required to be either co-located or connected via an interface to transfer AAA-provided home agent information into the DHCP Relay-Supplied Options. Co-location is not required when HA assignment in the home MSP is not needed by the deployment, in which case RFC 6610 alone suffices.
section: "3"
topics:
