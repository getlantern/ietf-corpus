document: rfc-8412
kind: security-consideration
summary: 'Software inventory data is highly sensitive: it reveals what software is installed, enabling adversaries to identify vulnerable software or attack vectors. Implementors MUST ensure that appropriate NEA transport mechanisms providing confidentiality (e.g., PT-TLS per RFC 6876 or PT-EAP per RFC 7171) are employed, as SWIMA itself provides no confidentiality.'
section: "8.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
