document: rfc-8075
kind: normative-requirement
summary: Unless explicitly configured to allow pass-through of unknown content-formats, the HC Proxy SHOULD NOT forward requests carrying a Content-Type or Accept header with 'application/coap-payload', and SHOULD return an appropriate client error instead.
section: "6.2"
rfc2119_level: SHOULD NOT
