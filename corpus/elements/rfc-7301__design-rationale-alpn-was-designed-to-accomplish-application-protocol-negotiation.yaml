document: rfc-7301
kind: design-rationale
summary: ALPN was designed to accomplish application-protocol negotiation without adding network round-trips between client and server, and was originally requested by the HTTPbis WG to support HTTP/2 negotiation over TLS, while remaining general enough for arbitrary application-layer protocols.
