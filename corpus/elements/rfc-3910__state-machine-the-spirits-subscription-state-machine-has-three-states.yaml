document: rfc-3910
kind: state-machine
summary: 'The SPIRITS subscription state machine has three states: ''pending'' (subscription accepted but DP not yet armed, triggered when arming takes >200ms), ''active'' (DP successfully armed in PSTN), and ''terminated'' (DP fired, reason=''fired'', or subscription expired). States are communicated via the Subscription-State header in NOTIFY requests.'
section: 5.3.8
topics:
    - sip
    - realtime
