document: rfc-4896
kind: normative-requirement
summary: STATE-CREATE and CRC obey byte copying rules as per RFC 3320 Section 8.4 (amending the original list which omitted STATE-CREATE). When reading the partial state identifier for STATE-FREE within END-MESSAGE execution, byte copying rules also apply. Byte copying rules do NOT apply when reading feedback items.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
