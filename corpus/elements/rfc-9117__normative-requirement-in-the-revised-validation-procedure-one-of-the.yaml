document: rfc-9117
kind: normative-requirement
summary: 'In the revised validation procedure, one of the following MUST hold true: (b.1) the originator of the Flow Specification matches the originator of the best-match unicast route for the destination prefix embedded in the Flow Specification, or (b.2) the AS_PATH attribute of the Flow Specification is empty or contains only an AS_CONFED_SEQUENCE segment.'
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
