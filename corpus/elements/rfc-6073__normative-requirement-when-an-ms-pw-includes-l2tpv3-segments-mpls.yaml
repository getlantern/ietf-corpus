document: rfc-6073
kind: normative-requirement
summary: When an MS-PW includes L2TPv3 segments, MPLS PW OAM MUST be terminated at the S-PE connecting the L2TPv3 and MPLS segments. The S-PE MUST NOT forward VCCV parameters (PWid FEC TLV interface parameter) across the L2TPv3/MPLS boundary.
section: "9.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
