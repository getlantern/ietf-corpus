document: rfc-2332
kind: normative-requirement
summary: NHSs MUST NOT respond to authoritative NHRP Resolution Requests with cached (non-authoritative) information. Only information obtained through NHRP Registration or synchronization with an NHS that obtained it through Registration qualifies as authoritative.
section: "2.2"
rfc2119_level: MUST NOT
