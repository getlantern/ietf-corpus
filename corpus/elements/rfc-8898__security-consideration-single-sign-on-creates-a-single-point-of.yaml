document: rfc-8898
kind: security-consideration
summary: Single Sign-On creates a single point of compromise with much broader impact than per-service credentials. An attacker who compromises the SSO account can access all linked services. Mitigations include long passphrases, multi-factor authentication, and using native platform browsers (RFC 8252).
section: "5"
topics:
    - sip
    - oauth
    - security
