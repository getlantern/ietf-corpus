document: rfc-3834
kind: normative-requirement
summary: Personal Responders MUST allow the From field of a Personal Response to be set by the recipient on whose behalf the responder is acting, to protect privacy (e.g., not exposing login names or server hostnames).
section: 3.1.1
rfc2119_level: MUST
topics:
    - email
    - privacy
