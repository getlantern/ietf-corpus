document: rfc-6710
kind: protocol-element
summary: 'The MIXER Priority Assignment Policy (the default policy) maps three MT-PRIORITY values to MIXER priorities: -4=non-urgent, 0=normal, 4=urgent. This is the policy assumed when no policy name is advertised in the MT-PRIORITY EHLO response.'
