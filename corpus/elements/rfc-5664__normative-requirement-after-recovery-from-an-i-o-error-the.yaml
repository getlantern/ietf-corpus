document: rfc-5664
kind: normative-requirement
summary: After recovery from an I/O error, the metadata server MUST complete recovery before handing out any new layouts to the affected byte ranges; it SHOULD recall all outstanding layouts to gain exclusive write access during recovery.
section: "7"
rfc2119_level: MUST
