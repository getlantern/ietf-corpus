document: rfc-5886
kind: normative-requirement
summary: 'The I (Incomplete) bit: if a PCE supports a PCMonReq message and it does not trigger a policy violation but the PCE cannot provide requested metrics, the PCE MUST set the I bit. Once set, the I bit MUST NOT be changed by a receiving PCE.'
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
