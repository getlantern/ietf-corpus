document: rfc-9908
kind: normative-requirement
summary: The 'subjectPKInfo' field of CertificationRequestInfoTemplate MUST be absent if the server places no requirements on the key; if requirements exist, it MUST be present and its 'algorithm' field specifies the required key type.
section: "3.4"
rfc2119_level: MUST
