document: rfc-4208
kind: normative-requirement
summary: If no NOTIFY_REQUEST object is present in Path or Resv from an edge-node, the adjacent core-node may include one set to its own address; in either case the core-node SHOULD NOT send Notify messages directly to the edge-node.
section: "5"
rfc2119_level: SHOULD NOT
