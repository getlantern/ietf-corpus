document: rfc-2181
kind: normative-requirement
summary: Implementations must treat TTL values received with the most significant bit set as if the entire value received was zero. Implementations may place an upper bound on any received TTL value and treat larger values as that upper bound.
section: "8"
rfc2119_level: MUST
topics:
    - dns
