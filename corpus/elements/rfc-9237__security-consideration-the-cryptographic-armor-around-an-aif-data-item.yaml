document: rfc-9237
kind: security-consideration
summary: The cryptographic armor around an AIF data item must (1) unambiguously identify the subject to which authorizations apply, and (2) provide context information to derive the full identity of the object (e.g., scheme and authority for constructing full URIs from URI-local-part values).
