document: rfc-9929
kind: interoperability-note
summary: For OSPFv3 prefixes advertised via legacy Inter-Area-Prefix-LSA, AS-External-LSA, and NSSA-LSA, UPA is signaled using their corresponding extended LSAs. This requires support of OSPFv3 Extended LSAs in sparse mode as specified in Section 6.2 of RFC 8362.
