document: rfc-2665
kind: protocol-element
summary: dot3CollTable provides a collision histogram indexed by (ifIndex, dot3CollCount), where dot3CollCount ranges 1–16 and dot3CollFrequencies counts MAC frames that experienced exactly that many collisions. This group is optional and does not increment in full-duplex mode.
