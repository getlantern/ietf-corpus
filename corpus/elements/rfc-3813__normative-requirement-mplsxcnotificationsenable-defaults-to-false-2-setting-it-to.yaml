document: rfc-3813
kind: normative-requirement
summary: mplsXCNotificationsEnable defaults to false(2); setting it to true(1) enables emission of mplsXCUp and mplsXCDown notifications. For contiguous ranges of cross-connects transitioning to the same state simultaneously, the device SHOULD issue a single notification per contiguous index range to minimize notification volume.
section: "10"
rfc2119_level: SHOULD
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
