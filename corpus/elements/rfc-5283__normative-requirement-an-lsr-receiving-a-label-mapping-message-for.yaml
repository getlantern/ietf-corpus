document: rfc-5283
kind: normative-requirement
summary: An LSR receiving a Label Mapping message for FEC1 SHOULD use the label for MPLS forwarding if its routing table contains an entry that matches FEC1 (longest match) and the advertising LSR is a next hop to reach FEC1.
section: "5"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
