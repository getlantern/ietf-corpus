document: rfc-8150
kind: design-rationale
summary: SNMP SET is no longer recommended for configuring MPLS networks (per RFC 3812), but certain objects are specified with MAX-ACCESS read-write or read-create to maintain consistency with the base tables in RFC 3812 and RFC 7697 that this MIB is designed to work alongside.
