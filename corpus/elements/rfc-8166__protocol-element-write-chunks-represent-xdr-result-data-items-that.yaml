document: rfc-8166
kind: protocol-element
summary: Write chunks represent XDR result data items that the Responder pushes to the Requester using RDMA Write operations. Each Write chunk is a counted array of plain segments provisioned by the Requester in the RPC Call message; the Responder fills them in segment-array order and returns updated segment lengths in the RPC Reply message.
section: 3.4.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
