document: rfc-6088
kind: wire-format
summary: 'The IPv4 binary traffic selector is a variable-length sub-option containing a 2-bit flags word (A–N) indicating which fields are present, followed by optional fields: 32-bit source/destination address ranges, 32-bit IPsec SPI range, 16-bit source/destination port ranges, 8-bit DS range, and 8-bit protocol range. Alignment is 4n if address or SPI fields are present, 2n for port fields, and n for DS or protocol fields.'
section: "3.1"
topics:
    - ip
    - ipsec
    - mobility
