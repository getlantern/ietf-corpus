document: rfc-1653
kind: security-consideration
summary: The SIZE parameter and extended MAIL command make it somewhat quicker and easier to mount a service denial attack by allowing an attacker to probe server resource limits efficiently. However, unless implementations are very weak, no new vulnerability is created that did not already exist with standard SMTP.
