document: rfc-9231
kind: security-consideration
summary: ARCFOUR (RC4-compatible) stream cipher is identified at xmldsig-more#arcfour but RC4 has been found to have weaknesses and its use is prohibited in several IETF protocols including TLS (RFC 7465). This document does not remove the identifier but notes the security concern.
section: 2.6.1
topics:
    - crypto
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
