document: rfc-9084
kind: security-consideration
summary: The security considerations of RFC 7684 (OSPFv2 Extended Prefix LSA) and RFC 8362 (OSPFv3 LSA Extensibility) apply. A rogue node capable of injecting prefix advertisements may use these extensions to advertise bogus prefix source information, but the new sub-TLVs do not affect OSPF route computation itself.
section: "4"
topics:
    - routing
    - security
