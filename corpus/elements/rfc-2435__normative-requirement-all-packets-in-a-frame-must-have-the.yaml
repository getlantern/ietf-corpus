document: rfc-2435
kind: normative-requirement
summary: All packets in a frame MUST have the same RTP timestamp, the RTP marker bit MUST be set on the last packet, and packet fragments MUST NOT overlap one another.
section: "4.3"
rfc2119_level: MUST
