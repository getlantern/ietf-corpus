summary: 'The Queue Parameters Data Item encodes: a 16-bit Data Item Type (23), a variable Length, an 8-bit Num Queues count, a 4-bit Scale (0=Bytes, 1=KB, 2=MB, 3=GB), a 20-bit Reserved field (MUST be zero), followed by variable-length Queue Parameter Sub-Data Items.'
