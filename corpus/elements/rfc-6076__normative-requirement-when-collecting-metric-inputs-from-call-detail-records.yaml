document: rfc-6076
kind: normative-requirement
summary: When collecting metric inputs from call detail records or raw signaling, time synchronization MUST be considered between applicable elements. When these metrics are used in a test environment, the environment MUST be accurately documented for replication of output values.
section: "5.5"
rfc2119_level: MUST
topics:
    - realtime
    - measurement
