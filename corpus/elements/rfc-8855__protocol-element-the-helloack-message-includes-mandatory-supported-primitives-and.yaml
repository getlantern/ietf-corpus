document: rfc-8855
kind: protocol-element
summary: The HelloAck message includes mandatory SUPPORTED-PRIMITIVES and SUPPORTED-ATTRIBUTES attributes, advertising server capabilities. Over unreliable transport, the Hello/HelloAck exchange also serves as the mandatory session initiation handshake before any other messages can be sent.
section: 5.3.12
topics:
