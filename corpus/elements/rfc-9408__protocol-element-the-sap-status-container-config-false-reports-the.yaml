document: rfc-9408
kind: protocol-element
summary: The 'sap-status' container (config false) reports the SAP's operational state independent of any service, using the 'oper-status-timestamp' grouping from RFC 9181. The 'service-status' container holds a writable 'admin-status' sub-container and a read-only 'oper-status' sub-container, each carrying a status identityref and 'last-change' (yang:date-and-time) leaf.
section: "5"
topics:
