document: rfc-5042
kind: protocol-element
summary: Partial Mutual Trust is a defined collection of RDMAP/DDP Streams whose endpoints agree not to perform malicious attacks against each other; any Stream outside the collection is treated as untrusted. ULPs have explicit control over collection membership.
