document: rfc-9489
kind: normative-requirement
summary: When a per-ES EVPN A-D route for a multihomed ES is advertised with different RD values, the RD value used in the EVPN Ethernet A-D sub-TLV MUST be the RD value received for the EVI in the per-ES EVPN A-D route.
section: 4.3.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
