document: rfc-5670
kind: normative-requirement
summary: A PCN-node MUST implement an excess-traffic-meter. A PCN-packet SHOULD NOT be metered by it if already excess-traffic-marked on arrival or if the PCN-node drops the packet; otherwise the PCN-packet MUST be metered.
section: "2.4"
rfc2119_level: MUST
topics:
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
