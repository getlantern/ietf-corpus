document: rfc-5147
kind: security-consideration
summary: Countermeasures against fragment-based content spoofing include displaying included content within clearly visible boundaries and limiting inclusion to material from the same security realm or from realms giving explicit permission. Implementers should also consult the security considerations in RFC 3986 and RFC 3987.
section: "7"
topics:
