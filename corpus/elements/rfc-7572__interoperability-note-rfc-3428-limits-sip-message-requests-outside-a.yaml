document: rfc-7572
kind: interoperability-note
summary: RFC 3428 limits SIP MESSAGE requests outside a media session to 1300 bytes, while RFC 6120 allows XMPP stanzas up to at least 10,000 bytes. This mismatch requires gateways to enforce the 1300-byte limit when translating XMPP messages to SIP.
section: "6"
topics:
    - sip
    - realtime
