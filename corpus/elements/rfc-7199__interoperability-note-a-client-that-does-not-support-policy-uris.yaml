document: rfc-7199
kind: interoperability-note
summary: A client that does not support policy URIs can continue to use the location URI as it would without a policy URI; the initial policy is identical to the default, so non-implementing clients are not broken by the presence of policy URI support on the server.
section: "3.2"
topics:
    - realtime
