document: rfc-2591
kind: normative-requirement
summary: Implementations MUST guarantee that periodic action invocations will not occur before at least schedInterval seconds have passed since the previous invocation. The scheduler must ignore all periodic schedules with schedInterval equal to 0.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
