document: rfc-2047
kind: wire-format
summary: 'An ''encoded-word'' has the syntax: ''=?'' charset ''?'' encoding ''?'' encoded-text ''?=''. The charset and encoding are case-independent tokens; encoded-text is 1 or more printable ASCII characters excluding ''?'' and SPACE. White space MUST NOT appear between components.'
