document: rfc-2797
kind: normative-requirement
summary: 'CMC provides a shared-secret identity proof using HMAC-SHA1: the client computes HMAC-SHA1 over the reqSequence field using SHA1(token) as the shared secret and encodes the 160-bit result as the identityProof attribute. If verification fails and a response is returned, the failInfo attribute MUST have a value of badIdentity.'
section: "5.2"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
