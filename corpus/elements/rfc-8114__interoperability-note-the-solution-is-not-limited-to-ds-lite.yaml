document: rfc-8114
kind: interoperability-note
summary: The solution is not limited to DS-Lite and can be applied in other deployment contexts such as Lightweight 4over6 (RFC 7596) and MAP-E (RFC 7597). The same mPrefix64, uPrefix64, and address-building algorithm must be consistently configured on all mAFTR nodes for load balancing scenarios.
