document: rfc-5844
kind: security-consideration
summary: When DHCP messages are relayed across administrative boundaries, operators MUST ensure those messages are secured. DHCP messages may be tunneled to the LMA if needed, or the MAG can relay directly if the PMIPv6 domain network is considered secure.
section: 3.4.2
topics:
    - mobility
    - ip
