document: rfc-3597
kind: protocol-element
summary: An 'RR of unknown type' is an RR whose RDATA format is not known to the DNS implementation, and whose type is not an assigned QTYPE or Meta-TYPE per RFC 2929 section 3.1, nor within the range reserved for those. For class-specific RDATA formats, an RR is unknown when the combination of type and class is not known.
section: "2"
topics:
