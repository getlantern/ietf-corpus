document: rfc-1938
kind: protocol-element
summary: The six-word encoding uses a 2048-word dictionary at 11 bits per word to represent the 64-bit OTP. Two extra checksum bits complete the 66-bit encoding. The standard dictionary is originally from RFC 1760 and reproduced in Appendix C.
section: "6.0"
