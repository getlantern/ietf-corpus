document: rfc-9956
kind: interoperability-note
summary: The NQB DSCP and PHB are defined to operate independently of L4S (RFC 9330), but NQB traffic is intended to be compatible with L4S such that NQB-marked traffic and L4S traffic can share the low-latency queue in an L4S DualQ node. Applications complying with both NQB sender requirements and Prague L4S requirements may mark packets with both NQB DSCP and ECT(1).
section: "3.3"
topics:
    - diffserv
    - qos
    - ecn
    - congestion
