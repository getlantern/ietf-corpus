document: rfc-3831
kind: normative-requirement
summary: 'To encapsulate IPv6 over Fibre Channel, specific FC Header code points MUST be used: R_CTL=0x04, TYPE=0x05, CS_CTL/Prio=0x0, and DF_CTL=0x20 for the first frame (0x60 if ESP_Header used) and 0x00 for subsequent frames.'
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
