document: rfc-4754
kind: protocol-element
summary: 'The ECDSA signature components r and s are defined as: r equals the x-coordinate of the ephemeral public key g^k reduced modulo q; s equals (h + r*w)*kinv reduced modulo q, where h is the message hash, w is the static private key, and kinv is the modular inverse of the ephemeral private key k.'
