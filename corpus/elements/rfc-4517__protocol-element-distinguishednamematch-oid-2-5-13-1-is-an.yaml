kind: protocol-element
summary: distinguishedNameMatch (OID 2.5.13.1) is an equality matching rule that evaluates TRUE if and only if the attribute and assertion DNs have the same number of RDNs and corresponding RDNs have equal AVAs (order of AVAs within an RDN is not significant).
