document: rfc-9481
kind: interoperability-note
summary: Older CMP implementations conforming to the algorithm profile from Appendix D.2 of RFC 4210 may still be in use. Weakened algorithms should be disabled, and if critical systems cannot be immediately updated, a migration plan should be adopted as soon as possible.
