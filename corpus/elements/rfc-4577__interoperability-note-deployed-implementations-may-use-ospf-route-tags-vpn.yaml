document: rfc-4577
kind: interoperability-note
summary: Deployed implementations may use OSPF Route Tags (VPN Route Tag) instead of the DN bit for loop prevention in type 5 LSAs. To maintain backward compatibility, all conforming implementations MUST by default support both mechanisms; the VPN Route Tag may be disabled by configuration when no longer needed.
section: 4.2.5.1
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
