document: rfc-9136
kind: design-rationale
summary: RT-5 uses the Overlay Index plus recursive resolution rather than direct next-hop encoding to achieve fast convergence. The indirection means that when the object (e.g., floating IP owner or ESI active TS) changes, only the resolution of the Overlay Index changes, not the prefix routes themselves.
section: "3.2"
topics:
    - routing
    - bgp
