document: rfc-8169
kind: normative-requirement
summary: RTM SHOULD NOT be used if it cannot be guaranteed that the RRO contains complete information; policy-based RRO pruning at provider boundaries or RRO size constraints break the TTL computation that underpins the hop-by-hop RTM delivery mechanism.
section: 4.4.1
rfc2119_level: SHOULD NOT
topics:
    - routing
