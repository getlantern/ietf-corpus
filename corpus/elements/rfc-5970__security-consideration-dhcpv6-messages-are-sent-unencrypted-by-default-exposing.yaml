document: rfc-5970
kind: security-consideration
summary: DHCPv6 messages are sent unencrypted by default, exposing boot file URLs—which may contain credentials—over the network. It is strongly RECOMMENDED not to include sensitive information such as usernames or passwords in boot file URLs in untrusted networks.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - realtime
