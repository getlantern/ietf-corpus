document: rfc-9856
kind: registry
summary: IANA allocated bit 5 in the 'EVPN ESI Label Extended Community Flags' registry (introduced by RFC 9746) as the 'ESI-DCB' flag. When set, this flag indicates that the ESI label in the ESI Label Extended Community is a DCB (Domain-wide Common Block) label.
