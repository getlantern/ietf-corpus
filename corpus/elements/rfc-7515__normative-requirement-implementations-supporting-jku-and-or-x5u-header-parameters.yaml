document: rfc-7515
kind: normative-requirement
summary: Implementations supporting 'jku' and/or 'x5u' Header Parameters MUST support TLS. Confidentiality protection MUST be applied using TLS with a ciphersuite providing confidentiality and integrity. The TLS server identity MUST be verified per RFC 6125 Section 6.
section: "8"
rfc2119_level: MUST
topics:
    - jose
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
