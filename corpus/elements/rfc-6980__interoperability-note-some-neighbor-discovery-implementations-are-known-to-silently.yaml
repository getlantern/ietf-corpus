document: rfc-6980
kind: interoperability-note
summary: Some Neighbor Discovery implementations are known to silently ignore Router Advertisement messages that employ fragmentation. Operators detecting silently dropped ND traffic should check whether the sending device supports preventing ND fragmentation; resolution may require a software upgrade.
section: "6"
topics:
    - ip
