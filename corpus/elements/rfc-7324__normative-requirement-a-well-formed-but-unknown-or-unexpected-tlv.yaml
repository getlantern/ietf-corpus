document: rfc-7324
kind: normative-requirement
summary: A well-formed but unknown or unexpected TLV value MUST be ignored, and the rest of the PSC message processed as if the ignored TLV did not exist. An implementation detecting a malformed TLV SHOULD alert the operator.
section: 2.2.2
rfc2119_level: MUST
topics:
    - mpls
