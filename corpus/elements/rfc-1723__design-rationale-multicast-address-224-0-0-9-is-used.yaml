document: rfc-1723
kind: design-rationale
summary: Multicast address 224.0.0.9 is used for RIP-2 periodic broadcasts to avoid unnecessary processing load on hosts that are not RIP-2 speakers. IGMP is not required because RIP-2 messages are inter-router and not forwarded.
section: "3.5"
topics:
