document: rfc-8964
kind: normative-requirement
summary: 'Three Sequence Number field lengths MUST be supported: 0 bits (no sequencing), 16 bits, and 28 bits. The length MUST be provisioned on a per-DetNet-service basis via the Controller Plane. When length is zero, the Sequence Number field MUST be set to zero on all packets.'
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
