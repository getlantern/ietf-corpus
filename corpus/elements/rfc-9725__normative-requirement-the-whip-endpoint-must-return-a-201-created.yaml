document: rfc-9725
kind: normative-requirement
summary: The WHIP endpoint MUST return a '201 Created' response with content type 'application/sdp', the SDP answer as the body, and a Location header field pointing to the newly created WHIP session URL. The SDP answer MUST be generated per JSEP initial answer rules.
section: "4.2"
rfc2119_level: MUST
topics:
    - webrtc
    - http
    - realtime
