document: rfc-6066
kind: normative-requirement
summary: Once a maximum fragment length other than 2^14 has been successfully negotiated, the client and server MUST immediately begin fragmenting all messages (including handshake messages) to ensure no fragment larger than the negotiated length is sent. The negotiated length applies for the duration of the session including resumptions.
section: "4"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
