document: rfc-8753
kind: design-rationale
summary: Reviews are limited to major Unicode versions (NN.0) rather than all versions because Unicode has moved to a regular one-year release cycle. Reviewing minor updates (e.g., 12.1, which added a single new code point) would overload IETF internationalization resources and generate IANA tables for trivial changes.
