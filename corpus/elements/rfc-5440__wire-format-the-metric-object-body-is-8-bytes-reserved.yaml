document: rfc-5440
kind: wire-format
summary: 'The METRIC object body is 8 bytes: Reserved (16 bits), Flags (8 bits, B=bound and C=compute-and-return), T/type (8 bits, 1=IGP metric, 2=TE metric, 3=hop count), and metric-value (32-bit IEEE 754 float). Multiple METRIC objects per request are allowed; at most one instance per metric type per B flag value.'
section: "7.8"
topics:
    - routing
    - mpls
    - qos
