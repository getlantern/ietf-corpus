document: rfc-9300
kind: protocol-element
summary: Instance IDs are 24-bit values carried in the LISP header (I-bit=1) to support virtualization, overlapping address spaces, and multi-tenant segmentation. The ETR uses the Instance ID as a table identifier for the inner destination EID lookup. The Instance ID SHOULD NOT be used with overlapping IPv6 EID addresses.
section: "8"
topics:
