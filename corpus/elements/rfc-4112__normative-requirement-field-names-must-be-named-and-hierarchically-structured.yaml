document: rfc-4112
kind: normative-requirement
summary: Field names MUST be named and hierarchically structured as closely to the structure and naming in Section 2.1 as is practical given the syntax and transaction protocol in use. This constraint applies to on-the-wire names, not to human-visible labeling.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
