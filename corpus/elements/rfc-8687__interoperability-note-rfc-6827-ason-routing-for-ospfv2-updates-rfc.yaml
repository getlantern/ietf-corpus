document: rfc-8687
kind: interoperability-note
summary: RFC 6827 (ASON routing for OSPFv2) updates RFC 5786 by defining use of the Local TE Router ID sub-TLV; if this sub-TLV is present in the Node Attribute TLV, the RFC 6827 procedures apply regardless of whether any X-AF information is also advertised.
