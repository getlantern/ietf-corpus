document: rfc-9753
kind: normative-requirement
summary: For delegated LSPs, when a PCE updates and marks objects with new P flag expectations, the PCC MUST acknowledge this by sending a PCRpt message with the P flag set as per the PCE expectation. If the PCC cannot accept the update, it MUST react per the processing rules of unacceptable update in RFC 8231 Section 5.8.3.
section: 3.2.1.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
