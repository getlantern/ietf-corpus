document: rfc-4577
kind: normative-requirement
summary: All implementations MUST by default support the VPN Route Tag procedures for backward compatibility with deployed implementations that do not set the DN bit in type 5 LSAs. The VPN Route Tag value MUST be configurable and distinct from any OSPF Route Tag used within the OSPF domain.
section: 4.2.5.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
