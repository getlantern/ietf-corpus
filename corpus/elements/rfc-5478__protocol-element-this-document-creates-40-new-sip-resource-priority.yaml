summary: 'This document creates 40 new SIP Resource-Priority namespaces in four families: dsn-000000 through dsn-000009, drsn-000000 through drsn-000009, rts-000000 through rts-000009, and crts-000000 through crts-000009. Each namespace is wholly independent and uses preemption as its intended algorithm.'
