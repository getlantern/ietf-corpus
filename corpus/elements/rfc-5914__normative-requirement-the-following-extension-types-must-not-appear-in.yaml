document: rfc-5914
kind: normative-requirement
summary: 'The following extension types MUST NOT appear in the TrustAnchorInfo exts field and are ignored if they do: id-ce-certificatePolicies, id-ce-policyConstraints, id-ce-inhibitAnyPolicy, and id-ce-nameConstraints. These are represented in the CertPathControls structure instead.'
section: "2.6"
rfc2119_level: MUST NOT
topics:
