document: rfc-9780
kind: design-rationale
summary: G-ACh non-IP encapsulation is preferred in some environments because IP/UDP adds overhead, and IP/UDP validation failures may be caused by factors unrelated to the MPLS label stack or BFD, reducing the accuracy of failure correlation.
