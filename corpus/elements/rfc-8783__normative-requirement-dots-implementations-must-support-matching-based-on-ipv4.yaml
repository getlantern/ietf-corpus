document: rfc-8783
kind: normative-requirement
summary: 'DOTS implementations MUST support matching based on IPv4 and IPv6 headers, transport headers (TCP, UDP, ICMP), and any combination thereof. Mandatory fields per ACL type are: IPv4/IPv6 (length, protocol, destination/source prefix, fragment); TCP (flags-bitmask, source/destination port range); UDP (length, source/destination port range); ICMP (type, code).'
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
