document: rfc-3995
kind: normative-requirement
summary: When a client does not supply 'notify-lease-duration' for a Per-Printer Subscription, the Printer MUST use its 'notify-lease-duration-default' value. If the client supplies an unsupported value, the Printer MUST substitute a supported value that SHOULD be as close as possible to the requested value; the Printer MUST NOT assign value 0 (infinite) unless the client requests it.
section: 5.3.8
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
