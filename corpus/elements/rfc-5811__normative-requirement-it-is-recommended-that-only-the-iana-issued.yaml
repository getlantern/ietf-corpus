document: rfc-5811
kind: normative-requirement
summary: It is RECOMMENDED that only the IANA-issued SCTP protocol number (132) be used as a selector in the IPsec SPD for ForCES, requiring only a single SPD and SAD entry. Per-port selectors using all three TML ports are an alternative but require more SPD entries.
section: 7.1.1
rfc2119_level: RECOMMENDED
topics:
    - ipsec
    - security
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
