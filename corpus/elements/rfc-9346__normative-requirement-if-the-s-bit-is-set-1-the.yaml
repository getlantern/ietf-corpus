document: rfc-9346
kind: normative-requirement
summary: If the S bit is set(1), the Inter-AS Reachability Information TLV MUST be flooded across the entire routing domain. If the S bit is not set(0), the TLV MUST NOT be leaked between levels. This bit MUST NOT be altered during TLV leaking.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
