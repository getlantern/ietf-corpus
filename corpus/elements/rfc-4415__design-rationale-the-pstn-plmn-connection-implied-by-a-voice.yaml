document: rfc-4415
kind: design-rationale
summary: 'The PSTN/PLMN connection implied by a voice:tel NAPTR may be indirect: an end-user device may use SIP or H.323 to a remote gateway that terminates to the PSTN, converting ''tel:'' URIs to a protocol-native form. This acknowledges that not all callers have direct PSTN access.'
section: "3"
topics:
    - voip
    - sip
    - realtime
