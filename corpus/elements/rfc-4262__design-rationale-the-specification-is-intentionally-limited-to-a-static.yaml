document: rfc-4262
kind: design-rationale
summary: The specification is intentionally limited to a 'static' approach where asserted cryptographic capabilities remain unchanged until the certificate expires or is revoked. Dynamic approaches allowing retrieval of certified dynamically updateable capabilities are explicitly out of scope.
