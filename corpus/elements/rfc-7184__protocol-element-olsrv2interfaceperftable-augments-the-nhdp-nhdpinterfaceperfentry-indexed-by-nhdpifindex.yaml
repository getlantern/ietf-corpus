document: rfc-7184
kind: protocol-element
summary: olsrv2InterfacePerfTable augments the NHDP nhdpInterfacePerfEntry (indexed by nhdpIfIndex) to expose per-interface OLSRv2 performance counters. Frequent routing set or MPR set recalculations can signal topology instability and are surfaced here for monitoring by frameworks such as REPORT-MIB.
section: "5.3"
topics:
    - routing
    - snmp
    - measurement
