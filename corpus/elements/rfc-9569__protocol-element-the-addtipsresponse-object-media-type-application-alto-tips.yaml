document: rfc-9569
kind: protocol-element
summary: The AddTIPSResponse object (media type 'application/alto-tips+json') is returned on a successful TIPS view open request. It contains 'tips-view-uri' (URI to the TIPS view root) and 'tips-view-summary', which includes the UpdatesGraphSummary with start-seq, end-seq, and a start-edge-rec (recommended first edge as seq-i and seq-j).
section: "6.2"
topics:
