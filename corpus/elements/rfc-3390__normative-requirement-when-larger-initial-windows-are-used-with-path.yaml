document: rfc-3390
kind: normative-requirement
summary: When larger initial windows are used with Path MTU Discovery and the MSS is found to be too large, cwnd SHOULD be reduced by the ratio of the old segment size to the new segment size to prevent large bursts of smaller segments.
section: "2"
rfc2119_level: SHOULD
topics:
