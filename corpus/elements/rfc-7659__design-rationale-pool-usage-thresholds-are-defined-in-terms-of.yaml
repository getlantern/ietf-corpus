document: rfc-7659
kind: design-rationale
summary: Pool usage thresholds are defined in terms of percentage of available port utilization, but the document notes that at configuration time these percentages can be precomputed into absolute port map entry counts, so runtime threshold comparisons require no arithmetic — only a comparison against the current counter value.
