document: rfc-2222
kind: wire-format
summary: When a security layer is in effect, each cipher-text buffer is transferred over the connection prepended with a four-octet field in network byte order representing the length of the following buffer. The cipher-text buffer length must not exceed the maximum size negotiated by the other side.
section: "3"
topics:
    - security
