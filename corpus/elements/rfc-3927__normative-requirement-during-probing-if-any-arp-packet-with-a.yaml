document: rfc-3927
kind: normative-requirement
summary: During probing, if any ARP packet with a 'sender IP address' matching the probed address is received, the host MUST treat that address as in use and select a new pseudo-random address. Additionally, if an ARP Probe targeting the same address with a different hardware address is received, the host MUST also select a new address.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
