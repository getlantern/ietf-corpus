document: rfc-7356
kind: design-rationale
summary: RFC 5311 provides a backwards-compatible solution to the 256-LSP-per-IS limit but requires alias system IDs and imposes restrictions on Extended LSP content. FS-LSPs provide a less constrained alternative, explicitly accepting non-interoperability with legacy routers as a trade-off.
section: "1"
topics:
    - routing
