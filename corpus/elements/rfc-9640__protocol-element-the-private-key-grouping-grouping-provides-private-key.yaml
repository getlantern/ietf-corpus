document: rfc-9640
kind: protocol-element
summary: 'The ''private-key-grouping'' grouping provides ''private-key-format'' identityref and a three-way choice: ''cleartext-private-key'' (binary), ''hidden-private-key'' (type empty), or ''encrypted-private-key'' (uses encrypted-value-grouping). All nodes carry NACM ''default-deny-write''; cleartext-private-key additionally has ''default-deny-all''.'
section: 2.1.4.5
