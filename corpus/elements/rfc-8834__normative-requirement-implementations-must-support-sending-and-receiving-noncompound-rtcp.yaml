document: rfc-8834
kind: normative-requirement
summary: Implementations MUST support sending and receiving noncompound RTCP feedback packets (RFC 5506), and this usage MUST be negotiated using the signaling channel. For backwards compatibility, compound RTCP feedback packets must also be supported if the remote endpoint does not agree to noncompound RTCP.
section: "4.6"
rfc2119_level: MUST
topics:
    - webrtc
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
