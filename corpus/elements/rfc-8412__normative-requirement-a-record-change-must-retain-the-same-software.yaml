document: rfc-8412
kind: normative-requirement
summary: A record change MUST retain the same Software Identifier. Any action that changes the software product version MUST NOT be reflected by a record alteration but MUST result in deletion of the old record and creation of a new record.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
