document: rfc-6422
kind: registry
summary: IANA created a new registry titled 'Options Permitted in the Relay-Supplied Options Option' listing DHCPv6 option codes that may appear in the RSOO. Options may only be added after IETF Review, with careful security analysis of allowing relay agents to supply values for each candidate option.
