document: rfc-7374
kind: protocol-element
summary: 'The RedirServiceProvider Resource Record stores a service provider''s routing information and its position in the ReDiR tree. Fields include: type (RedirServiceProviderExtType, 1 byte), destination_list (variable, up to 2^16-1 bytes), namespace (opaque UTF-8, up to 2^16-1 bytes), level (uint16), node (uint16), length (uint16), and an optional extension.'
section: "4.1"
topics:
