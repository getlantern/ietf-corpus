document: rfc-6526
kind: design-rationale
summary: Exporting Templates and their Data Records in the same ordered SCTP stream ensures Templates always arrive before their associated Data Records, removing the Collecting Process's need to buffer Data Sets while waiting for a Template Record and reducing the risk of Data Record discard.
section: 3.3.2
topics:
    - sctp
