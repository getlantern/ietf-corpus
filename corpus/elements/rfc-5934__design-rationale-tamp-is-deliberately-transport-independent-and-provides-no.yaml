document: rfc-5934
kind: design-rationale
summary: TAMP is deliberately transport-independent and provides no confidentiality. If confidentiality is needed, the communications channel must provide it. This separates concerns and allows TAMP to work both over real-time networks (e.g., HTTP) and via offline/store-and-forward delivery to devices like GPS receivers.
section: "1"
topics:
    - security
