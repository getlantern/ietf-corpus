document: rfc-2580
kind: normative-requirement
summary: The MIN-ACCESS clause must not specify a greater level of access than is specified in the correspondent OBJECT-TYPE macro. An implementation is compliant if its access level is greater than or equal to the MIN-ACCESS and less than or equal to the MAX-ACCESS.
section: 5.4.3.3
rfc2119_level: MUST NOT
topics:
    - snmp
