document: rfc-9800
kind: normative-requirement
summary: To ensure any valid Argument value is accepted, an SR segment endpoint node instantiating a NEXT-CSID or REPLACE-CSID flavor SID should install a FIB entry matching only the Locator and Function parts of the SID (prefix length LBL+LNL+FL).
section: "5.3"
rfc2119_level: SHOULD
