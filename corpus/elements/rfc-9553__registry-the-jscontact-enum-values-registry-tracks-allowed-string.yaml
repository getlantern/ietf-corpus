document: rfc-9553
kind: registry
summary: The JSContact Enum Values Registry tracks allowed string values for properties that restrict values to an enumerated list (e.g., kind, NameComponent kind, AddressComponent kind, Phone features). Implementations MUST only set IANA-registered or vendor-specific values for such properties.
