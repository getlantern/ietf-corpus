document: rfc-6816
kind: protocol-element
summary: 'ADU Information (ADUI) is the source symbol unit, formed by prepending three bytes to each ADU: F[i] (1-byte Flow ID, supporting up to 256 flows), L[i] (2-byte ADU length in network byte order), followed by the ADU itself and zero-padding Pad[i] to reach exactly E bytes.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
