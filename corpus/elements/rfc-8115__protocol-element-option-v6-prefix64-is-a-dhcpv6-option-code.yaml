document: rfc-8115
kind: protocol-element
summary: OPTION_V6_PREFIX64 is a DHCPv6 option (code 113) that conveys IPv6 prefixes used to synthesize IPv4-embedded IPv6 addresses for multicast and unicast in IPv4-IPv6 transition scenarios. It carries ASM_mPrefix64, SSM_mPrefix64, and uPrefix64 fields.
section: "3"
topics:
