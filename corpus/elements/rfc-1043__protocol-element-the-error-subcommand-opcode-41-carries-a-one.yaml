summary: The ERROR subcommand (opcode 41) carries a one-byte subcommand code identifying the failing command and a one-byte error code. Thirteen error codes are defined, including facility not negotiated, cursor out of bounds, illegal parameter, field overlap detected, and unsupported attribute combination.
