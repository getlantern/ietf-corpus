document: rfc-3017
kind: protocol-element
summary: The support element groups customer support contact information using a required 'id' attribute and an optional 'language' attribute (NMTOKENS). It must contain at least one supportTelephoneNumber or supportMailtoURL element; multiple language values allow specifying multilingual support centers.
section: "5.4"
