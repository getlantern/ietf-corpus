document: rfc-7678
kind: normative-requirement
summary: The 64-Multicast-Attributes AVP MUST include at least one of ASM-mPrefix64 or SSM-mPrefix64, and MAY include both. When SSM-mPrefix64 is present, the Delegated-IPv6-Prefix AVP MUST also be present.
section: "3.3"
rfc2119_level: MUST
topics:
