document: rfc-5079
kind: design-rationale
summary: The closest existing response code, 403 (Forbidden), does not convey a specific reason for rejection and cannot be interpreted programmatically or by callers speaking different languages. A machine-readable indication enables programmatic handling, UI prompts, and conversion to PSTN error codes in gateways.
section: "1"
topics:
