document: rfc-3497
kind: interoperability-note
summary: Compressed HDTV is a subset of MPEG-2 and is fully handled by RFC 2250; this payload format addresses only uncompressed HDTV. Implementors supporting both compressed and uncompressed HDTV must use different payload types.
section: "1"
topics:
