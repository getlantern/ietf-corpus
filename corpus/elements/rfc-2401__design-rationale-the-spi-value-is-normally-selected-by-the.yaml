document: rfc-2401
kind: design-rationale
summary: The SPI value is normally selected by the destination (receiver) system rather than the sender. This design ensures that manually configured SAs cannot conflict with automatically configured SAs, and that SAs from multiple sources cannot conflict with each other at the same destination.
section: "4.7"
topics:
    - ipsec
    - security
