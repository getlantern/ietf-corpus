document: rfc-9261
kind: security-consideration
summary: 'Authenticators are independent and unidirectional: there is no explicit state change inside TLS when an authenticator is created or validated. This makes it difficult to formally prove that a server is jointly authoritative over multiple identities rather than individually authoritative over each.'
section: "9"
topics:
    - tls
    - security
