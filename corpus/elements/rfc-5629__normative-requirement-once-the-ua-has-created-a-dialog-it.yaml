document: rfc-5629
kind: normative-requirement
summary: Once the UA has created a dialog, it MUST be prepared to receive a SUBSCRIBE or REFER request against its GRUU. If such a request arrives prior to the establishment of a dialog, the UA MUST reject it.
section: "9.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
