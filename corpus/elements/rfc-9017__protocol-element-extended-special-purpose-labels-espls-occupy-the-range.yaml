document: rfc-9017
kind: protocol-element
summary: Extended Special-Purpose Labels (eSPLs) occupy the range 0–1048575 of the Extended SPL space. Values 0–15 are reserved and never allocated; 16–239 are available for allocation; 240–255 are for experimental use; 256–1048575 are currently unavailable without a new Standards Track RFC.
