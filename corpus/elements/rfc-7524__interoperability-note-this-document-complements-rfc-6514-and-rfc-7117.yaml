document: rfc-7524
kind: interoperability-note
summary: 'This document complements RFC 6514 and RFC 7117 for inter-AS segmented P2MP service LSPs. An inter-AS deployment can nest the two: inter-AS segmented P2MP LSPs (per RFC6514/RFC7117) where each intra-AS segment is itself constructed using inter-area segmented P2MP LSPs as specified in this document.'
section: "1"
topics:
