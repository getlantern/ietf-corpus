document: rfc-7246
kind: design-rationale
summary: RFC 6826 procedures assume routers doing PIM/mLDP conversion have routes to the source or RPA in their global routing tables, making them inapplicable when the connecting interfaces belong to a VRF. This document extends RFC 6826 to handle the VRF context by encoding the Route Distinguisher into the opaque value.
section: "1"
topics:
    - mpls
    - multicast
