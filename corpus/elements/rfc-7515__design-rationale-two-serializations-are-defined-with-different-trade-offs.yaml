document: rfc-7515
kind: design-rationale
summary: 'Two serializations are defined with different trade-offs: the JWS Compact Serialization is compact and URL-safe for space-constrained environments (e.g., HTTP Authorization headers, URI query parameters), while the JWS JSON Serialization enables multiple signatures over the same payload at the cost of compactness and URL-safety.'
