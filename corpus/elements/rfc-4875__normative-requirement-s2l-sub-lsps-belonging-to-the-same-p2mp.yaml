document: rfc-4875
kind: normative-requirement
summary: S2L sub-LSPs belonging to the same P2MP LSP SHOULD share labels where they share hops; if they share labels they MUST share resources. If the reservation style is FF, sub-LSPs from different P2MP LSPs MUST NOT share resources or labels. If SE, they SHOULD share resources but MUST NOT share labels in packet environments.
section: "6.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
