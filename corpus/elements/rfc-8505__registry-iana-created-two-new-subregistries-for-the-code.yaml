document: rfc-8505
kind: registry
summary: IANA created two new subregistries for the Code Suffix of ICMP Types 157 (DAR) and 158 (DAC). Code Suffix 0 = original RFC 6775 message; suffixes 1–4 indicate EDAR/EDAC with 64-, 128-, 192-, or 256-bit ROVR fields respectively; 5–15 unassigned.
