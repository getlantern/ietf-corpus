document: rfc-8587
kind: protocol-element
summary: NFS version 4.0 may use stream connections (RPC per RFC 5531) or RDMA-capable connections (RPC-over-RDMA per RFC 8166). The fs_locations attribute provides no information to support connection type selection, so clients must use trial-and-error to determine which types are supported.
section: 5.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
