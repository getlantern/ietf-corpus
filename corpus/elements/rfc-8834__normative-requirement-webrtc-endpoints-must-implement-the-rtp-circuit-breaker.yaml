document: rfc-8834
kind: normative-requirement
summary: WebRTC endpoints MUST implement the RTP circuit breaker algorithm described in RFC 8083 to recognize and react to extreme network congestion. Endpoints MUST also implement congestion control to adapt to changes in network capacity; the circuit breaker is not a substitute for congestion control.
section: "7.1"
rfc2119_level: MUST
topics:
    - webrtc
    - rtp
    - congestion
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
