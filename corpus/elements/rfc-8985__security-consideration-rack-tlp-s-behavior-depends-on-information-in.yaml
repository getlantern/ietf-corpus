document: rfc-8985
kind: security-consideration
summary: RACK-TLP's behavior depends on information in SACK options and therefore has security considerations similar to those in RFC 6675 Section 5. Attackers that can forge or manipulate SACK options may influence RACK's loss inferences.
section: "10"
topics:
