document: rfc-4207
kind: protocol-element
summary: J1-trace (0x0040) correlates SONET/SDH STS SPE/HOVC path trace via the J1 path overhead byte. Like J0-trace, the Test Message is sent over the control channel and correlated to the received J1 pattern using the TRACE object.
section: "3.1"
