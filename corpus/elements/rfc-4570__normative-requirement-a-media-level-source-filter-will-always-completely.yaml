document: rfc-4570
kind: normative-requirement
summary: A media-level source-filter will always completely override a session-level source-filter. The location of the 'source-filter' attribute (session vs. media level) determines whether it applies to the entire session or only to a specific medium.
section: "3.1"
rfc2119_level: MUST
topics:
    - realtime
