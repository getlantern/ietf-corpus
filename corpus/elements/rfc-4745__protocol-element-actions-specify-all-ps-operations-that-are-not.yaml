document: rfc-4745
kind: protocol-element
summary: Actions specify all PS operations that are not data transformations; they are defined by application-specific extensions and constitute the permit-side of a rule. Transformations specify PS-side operations that modify data items before returning them to the WR, such as reducing location precision. There is no deny functionality.
section: "8"
topics:
    - privacy
