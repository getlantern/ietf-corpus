document: rfc-3801
kind: protocol-element
summary: 'VPIM addresses may take four forms: (1) bare mailbox number, (2) mailbox number+extension, (3) +E.164 international number, and (4) +E.164 number+extension. The ''+'' prefix denotes a public telephone number per E.164; digit-only separators such as ''-'' may be ignored during parsing.'
section: 4.1.1
topics:
