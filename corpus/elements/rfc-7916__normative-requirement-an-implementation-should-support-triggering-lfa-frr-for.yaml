document: rfc-7916
kind: normative-requirement
summary: An implementation SHOULD support triggering LFA FRR for a given link when a manual shutdown is done on a component that currently supports FRR activation (e.g., BFD session, physical interface). An implementation MAY support timer-controlled FRR activation for a specific interface or prefix without impacting the control plane.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
