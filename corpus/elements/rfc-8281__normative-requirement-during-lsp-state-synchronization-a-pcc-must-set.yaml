document: rfc-8281
kind: normative-requirement
summary: During LSP State Synchronization, a PCC MUST set the Create flag in the LSP object for PCE-initiated LSPs and MAY include the SPEAKER-ENTITY-ID TLV. After synchronization, the PCE SHOULD send a PCInitiate to reconcile any missing or unwanted LSPs.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - mpls
