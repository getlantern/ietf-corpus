document: rfc-8791
kind: protocol-element
summary: The 'augment-structure' extension statement allows augmentation of YANG data structures defined with 'structure' from external modules. Its mandatory 'path' argument is an absolute-schema-nodeid where the first node identifies the target structure and subsequent nodes identify the node within that structure.
