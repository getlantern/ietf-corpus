document: rfc-3293
kind: design-rationale
summary: The Sender Instance and Receiver Instance fields are included in the Ethernet encapsulation (beyond what is in the adjacency protocol message) specifically to offer additional protection against the introduction of corrupt state, a consideration not needed in TCP where the connection provides ordering guarantees.
