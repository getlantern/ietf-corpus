document: rfc-1757
kind: design-rationale
summary: 'A hysteresis mechanism limits alarm event generation: after a rising event fires, no further rising events occur until the value drops below alarmFallingThreshold; symmetrically for falling events. This prevents event floods when a monitored value oscillates near a threshold.'
section: 2.3.4
