document: rfc-8896
kind: design-rationale
summary: The 'repeated' attribute allows a Server to signal that the same Calendar values are valid across N consecutive iterations starting from 'calendar-start-time', enabling Clients to schedule future requests rather than re-querying unnecessarily, thereby reducing workload for both parties.
section: "3.2"
