document: rfc-4011
kind: interoperability-note
summary: Entries in the pmElementTypeRegTable that differ only in the last subidentifier (the column selector) are effectively duplicates and should be treated as such. Adding an extra or missing sub-identifier when registering an element type will cause all elements to be discovered zero or many times, with malformed element addresses.
section: 4.3.1
topics:
    - snmp
