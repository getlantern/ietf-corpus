document: rfc-2741
kind: wire-format
summary: 'The AgentX PDU header is a fixed 20-octet structure: h.version (1 byte), h.type (1 byte), h.flags (1 byte), reserved (1 byte), h.sessionID (4 bytes), h.transactionID (4 bytes), h.packetID (4 bytes), h.payload_length (4 bytes). All multi-byte fields are encoded per the NETWORK_BYTE_ORDER flag in h.flags.'
section: "6.1"
