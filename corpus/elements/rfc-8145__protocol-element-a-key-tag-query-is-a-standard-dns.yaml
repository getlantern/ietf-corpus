document: rfc-8145
kind: protocol-element
summary: A Key Tag query is a standard DNS query of type NULL and class IN. The QNAME begins with '_ta-' followed by a sorted, hyphen-separated list of zero-padded four-digit hexadecimal Key Tag values, appended with the trust anchor zone name (e.g., '_ta-4444.' for root zone Key Tag 17476 decimal).
section: "5.1"
topics:
