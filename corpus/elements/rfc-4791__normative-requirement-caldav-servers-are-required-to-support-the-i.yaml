document: rfc-4791
kind: normative-requirement
summary: CalDAV servers are REQUIRED to support the "i;ascii-casemap" and "i;octet" collations for text matching in reports. Servers MUST advertise supported collations via the CALDAV:supported-collation-set property, and clients MUST only use advertised collations.
section: "7.5"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
