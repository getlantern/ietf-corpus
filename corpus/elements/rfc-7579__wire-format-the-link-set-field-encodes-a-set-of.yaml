document: rfc-7579
kind: wire-format
summary: The Link Set Field encodes a set of links via an 8-bit Action (0=Inclusive List, 1=Inclusive Range), a 2-bit Dir (0=bidirectional, 1=input, 2=output), a 6-bit Format (0=link local ID, 1=IPv4, 2=IPv6), a 16-bit Length, and a sequence of Link Identifiers whose size depends on Format. All identifiers in the same list must be of the same type.
section: "2.3"
topics:
    - routing
    - mpls
