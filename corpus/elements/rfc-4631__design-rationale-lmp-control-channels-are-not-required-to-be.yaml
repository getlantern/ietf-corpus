document: rfc-4631
kind: design-rationale
summary: LMP control channels are not required to be modeled as SNMP interfaces (lmpCcIsIf may be false(2)), allowing implementations where control channels exist as purely logical connections between adjacent nodes without corresponding ifTable entries. This reduces management overhead when interface modeling provides no benefit.
section: "8"
topics:
    - routing
    - mpls
