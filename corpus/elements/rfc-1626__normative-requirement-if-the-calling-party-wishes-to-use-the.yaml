document: rfc-1626
kind: normative-requirement
summary: If the calling party wishes to use the default MTU, it shall still include the 'AAL Parameters' IE with default Maximum CPCS-SDU Size values in the SETUP message; if a non-default value is desired, it shall include the desired value instead.
section: Switched Virtual Circuits
rfc2119_level: MUST
