document: rfc-8040
kind: protocol-element
summary: The 'errors' YANG data template models error information returned as message-body in server responses. The 'ietf-restconf' module defines the 'yang-errors' template with an 'errors' container; each error includes error-type, error-tag, optional error-path (XPath), and error-message fields.
section: "7.1"
topics:
