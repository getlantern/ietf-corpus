document: rfc-6520
kind: normative-requirement
summary: Whenever a HeartbeatRequest message is received, it SHOULD be answered with a corresponding HeartbeatResponse message. HeartbeatRequest messages SHOULD NOT be sent during handshakes, and a receiving peer SHOULD discard them silently if they arrive during a handshake.
section: "3"
rfc2119_level: SHOULD
