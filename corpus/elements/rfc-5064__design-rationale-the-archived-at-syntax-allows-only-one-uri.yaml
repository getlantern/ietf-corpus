document: rfc-5064
kind: design-rationale
summary: The Archived-At syntax allows only one URI per header field, unlike RFC 2369 which permits multiple URIs. Comments are also not allowed. Multiple archive locations require multiple separate Archived-At header fields. This keeps the syntax simple.
section: "2.1"
topics:
    - email
