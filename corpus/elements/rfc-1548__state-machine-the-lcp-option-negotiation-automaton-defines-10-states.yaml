document: rfc-1548
kind: state-machine
summary: 'The LCP option negotiation automaton defines 10 states: Initial, Starting, Closed, Stopped, Closing, Stopping, Req-Sent, Ack-Rcvd, Ack-Sent, and Opened. Transitions are driven by events including Up/Down/Open/Close, timeouts (TO+/TO-), and received packets (RCR+/RCR-/RCA/RCN/RTR/RTA/RUC/RXJ+/RXJ-/RXR). The Opened state is entered only after a Configure-Ack has been both sent and received.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
