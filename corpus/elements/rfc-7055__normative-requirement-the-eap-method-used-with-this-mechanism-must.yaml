document: rfc-7055
kind: normative-requirement
summary: The EAP method used with this mechanism MUST support dictionary-attack resistance, key derivation, mutual authentication, and channel binding. Integrity, confidentiality, sequencing, and replay detection MUST be indicated in GSS_Init/Accept_sec_context outputs regardless of which services are requested.
section: "5.8"
rfc2119_level: MUST
topics:
