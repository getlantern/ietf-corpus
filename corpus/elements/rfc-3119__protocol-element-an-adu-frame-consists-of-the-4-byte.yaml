document: rfc-3119
kind: protocol-element
summary: 'An ADU frame consists of: the 4-byte MPEG header (with optional replacement of the high-order 11 bits by an Interleaving Sequence Number), the optional 2-byte CRC field, the side info structure, and the complete encoded audio data for the ADU spanning from main_data_begin of this frame to the start of the next frame''s back-pointer.'
