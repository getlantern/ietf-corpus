document: rfc-7357
kind: protocol-element
summary: 'An RBridge withdrawing from ESADI for Data Label X must: (1) clear the ESADI Participation bit in the appropriate Interested VLANs or Interested Labels sub-TLV, and (2) send a final ESADI-LSP nulling out its ESADI information. If the RBridge becomes unreachable, ESADI protocol timeouts handle cleanup.'
section: "5.2"
topics:
    - routing
