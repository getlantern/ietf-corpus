summary: 'P2MP PCEP-ERROR types: Error-Type 16 covers P2MP capability errors (value 1: insufficient memory; value 2: incapable of P2MP); Error-Type 17 covers END-POINTS errors (values 1-4: missing leaf type 2/3/4 or inconsistent END-POINTS); Error-Type 18 covers fragmentation errors (value 1: fragmented request failure); Error-Type 5, value 7: P2MP computation policy violation.'
