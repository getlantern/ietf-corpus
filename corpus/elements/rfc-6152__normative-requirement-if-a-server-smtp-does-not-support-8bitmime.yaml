document: rfc-6152
kind: normative-requirement
summary: If a server SMTP does not support 8BITMIME (no 250 to EHLO or keyword absent), then the client SMTP must not, under any circumstances, attempt to transfer content containing octets outside the US-ASCII range (hex 00-7F).
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
