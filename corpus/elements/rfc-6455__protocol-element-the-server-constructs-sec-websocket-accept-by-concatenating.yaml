document: rfc-6455
kind: protocol-element
summary: The server constructs Sec-WebSocket-Accept by concatenating the Sec-WebSocket-Key string value with the fixed GUID '258EAFA5-E914-47DA-95CA-C5AB0DC85B11', computing the SHA-1 hash (20 bytes), and base64-encoding the result. This proves the server received the WebSocket-specific handshake.
