document: rfc-8829
kind: security-consideration
summary: Applications can restrict ICE candidates to relay-only using the 'relay' policy to prevent remote peers from learning the local endpoint's IP address and thereby inferring its location. This privacy benefit comes at the cost of increased TURN server operational usage.
section: 3.5.3
topics:
    - webrtc
    - realtime
    - privacy
