document: rfc-5571
kind: interoperability-note
summary: 'When LCP ECHO is used in combination with L2TPv2 HELLO keepalives, LCP ECHO messages SHOULD have a re-emission timer lower than the L2TPv2 HELLO interval (default 60s). Suggested LCP ECHO defaults: 30s interval, 10s minimum, capped at the lesser of the HELLO interval and 60s.'
section: 5.1.2
topics:
    - vpn
    - nat
