document: rfc-9756
kind: protocol-element
summary: PCEP Error-Type codepoints 252-255 are reserved for Experimental Use. All Error-values (0-255) within these Error-Types are also reserved for Experimental Use. This enables protocol experiments to return experiment-specific error messages without colliding with existing or future allocations.
