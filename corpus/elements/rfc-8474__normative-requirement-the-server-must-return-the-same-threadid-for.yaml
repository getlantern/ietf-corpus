document: rfc-8474
kind: normative-requirement
summary: The server MUST return the same THREADID for all messages with the same EMAILID, SHOULD return the same THREADID for related messages across different mailboxes, and MUST NOT change the THREADID of a message once reported.
section: "5.2"
rfc2119_level: MUST
topics:
