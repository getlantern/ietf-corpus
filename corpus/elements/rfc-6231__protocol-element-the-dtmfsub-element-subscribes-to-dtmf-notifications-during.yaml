document: rfc-6231
kind: protocol-element
summary: The <dtmfsub> element subscribes to DTMF notifications during dialog execution. The 'matchmode' attribute (default 'all') controls whether all key presses, only collect-matched input, or only control-matched input are reported via <dtmfnotify> events bearing dtmf and timestamp attributes.
section: 4.2.2.1.1
topics:
