document: rfc-9249
kind: protocol-element
summary: The /ntp/associations/association list (config false) is keyed by {address, local-mode, isconfigured}, uniquely identifying dynamic and configured associations. It exposes per-association timing fields (offset, delay, dispersion, originate-time T1, receive-time T2, transmit-time T3, input-time T4), plus reach (8-bit shift register), unreach counter, and per-peer ntp-statistics.
