document: rfc-2538
kind: protocol-element
summary: For PGP CERT RRs, if the User ID includes an RFC 822 email address (e.g., 'Leslie Example <Leslie@host.example>'), the CERT should be stored under the standard email-to-domain-name translation (e.g., leslie.host.example).
