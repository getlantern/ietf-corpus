document: rfc-4918
kind: wire-format
summary: 'The multistatus XML element (DAV: namespace) wraps 207 Multi-Status responses. Each response child contains an href element (resource URL), zero or more propstat elements (each with a prop and status), and an optional responsedescription. All href values within one Multi-Status MUST use the same format (absolute URI or absolute path).'
section: "13"
