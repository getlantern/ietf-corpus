document: rfc-5451
kind: security-consideration
summary: The 'iprev' method has limited value as an authentication mechanism. In some regions forward/reverse DNS consistency is rarely observed, making the test unreliable. Implementors and consumers of iprev results are encouraged to consult RFC considerations on reverse DNS mapping before relying on this method.
section: "7.11"
topics:
    - email
    - dns
    - security
