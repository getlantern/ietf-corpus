document: rfc-8754
kind: protocol-element
summary: The SR source node sets the IPv6 DA to the first segment (active segment), sets Segments Left to n-1, and encodes the SR Policy in reverse order in the Segment List. If the SR Policy has a single segment and no TLVs or flags are needed, the SRH MAY be omitted.
section: "4.1"
topics:
