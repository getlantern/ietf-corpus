document: rfc-2817
kind: normative-requirement
summary: 'If the server is prepared to initiate the TLS handshake, it MUST send an intermediate ''101 Switching Protocols'' response and MUST include an Upgrade response header specifying the ordered bottom-up protocol stack it is switching to (e.g., ''Upgrade: TLS/1.0, HTTP/1.1'').'
section: "3.3"
rfc2119_level: MUST
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
