document: rfc-9197
kind: security-consideration
summary: IOAM data can be misused for covert channels between network nodes, and IOAM options enable network reconnaissance (path topology, queue states, buffer occupancy). If IOAM data leaks beyond the IOAM-Domain boundary it can expose this information to external attackers.
section: "9"
topics:
