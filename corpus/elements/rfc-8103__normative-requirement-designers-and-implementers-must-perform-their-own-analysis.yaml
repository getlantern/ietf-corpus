document: rfc-8103
kind: normative-requirement
summary: Designers and implementers MUST perform their own analysis if key management techniques beyond the four defined ones (Key Transport, Key Agreement, Symmetric KEK, Passwords) are used, since their properties with respect to fresh key generation are unknown.
section: "2"
rfc2119_level: MUST
topics:
