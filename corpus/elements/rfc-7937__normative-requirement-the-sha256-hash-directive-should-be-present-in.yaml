document: rfc-7937
kind: normative-requirement
summary: The SHA256-hash directive SHOULD be present in every CDNI Logging File; when present, it MUST be the last line and MUST be computed over all preceding content using SHA-256. If the uCDN adds an established-origin directive, it MUST recompute the SHA256-hash.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
