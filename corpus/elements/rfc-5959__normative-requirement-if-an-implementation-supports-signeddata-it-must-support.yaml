document: rfc-5959
kind: normative-requirement
summary: If an implementation supports SignedData, it MUST support RSA as a signature scheme and SHOULD support RSASSA-PSS and DSA. SHA-256 MUST be supported and SHA-1 SHOULD be supported as hash functions.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
