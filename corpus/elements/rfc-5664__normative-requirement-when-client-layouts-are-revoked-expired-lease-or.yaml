document: rfc-5664
kind: normative-requirement
summary: When client layouts are revoked (expired lease or recalled layouts not returned within a lease period), the metadata server MUST fence off the revoked clients from the respective objects by invalidating their OSD capabilities to avoid data corruption.
section: "12"
rfc2119_level: MUST
topics:
    - security
