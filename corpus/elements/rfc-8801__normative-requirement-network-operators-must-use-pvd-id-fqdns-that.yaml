document: rfc-8801
kind: normative-requirement
summary: Network operators MUST use PvD ID FQDNs that they own or manage to avoid naming conflicts. The same PvD ID MAY be reused across access networks that provide identical services; otherwise the PvD ID MUST differ per RFC 7556 Section 2.4.
section: "3"
rfc2119_level: MUST
topics:
    - ip
