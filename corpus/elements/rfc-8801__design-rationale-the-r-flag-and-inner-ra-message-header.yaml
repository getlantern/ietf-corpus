document: rfc-8801
kind: design-rationale
summary: The R-flag and inner RA message header mechanism allows operators to send two distinct sets of RA configuration—one visible to all hosts and one visible only to PvD-aware hosts—within a single RA transmission, avoiding the need for separate RA sources when differentiation is desired.
