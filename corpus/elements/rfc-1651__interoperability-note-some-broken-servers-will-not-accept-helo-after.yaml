document: rfc-1651
kind: interoperability-note
summary: Some broken servers will not accept HELO after EHLO has been rejected. A workaround is to send RSET after the EHLO failure before issuing HELO; clients should ignore a 503 response to the RSET in this context.
section: "4.7"
