document: rfc-2051
kind: protocol-element
summary: The appcLuPairAdminTable is indexed by (appcLuPairAdminLocLuName, appcLuPairAdminParLuName). The reserved value '*ALL' for the local LU name indicates the partner LU definition applies to all local LUs. The table captures session limit, session-level security type (required/accepted/notAllowed), access security acceptance level, an InstancePointer to the associated link, and parallel session support.
section: 3.1.2
topics:
