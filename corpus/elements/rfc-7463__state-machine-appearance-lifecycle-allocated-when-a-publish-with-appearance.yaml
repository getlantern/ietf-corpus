document: rfc-7463
kind: state-machine
summary: 'Appearance lifecycle: allocated when a PUBLISH with appearance number is received or an incoming INVITE arrives; held through early and confirmed dialog states; released when the last associated dialog (including joined or replaced ones) terminates. During the early state, the Appearance Agent controls PUBLISH rate via Expires; after confirmation, publication expiry has no effect on allocation.'
section: "5.4"
topics:
