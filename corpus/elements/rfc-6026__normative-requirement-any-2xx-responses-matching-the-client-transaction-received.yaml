document: rfc-6026
kind: normative-requirement
summary: Any 2xx responses matching the client transaction received while in the 'Accepted' state MUST be passed up to the TU. When Timer M fires in 'Accepted', the client transaction MUST move to 'Terminated' and be destroyed immediately.
section: "7.2"
rfc2119_level: MUST
topics:
