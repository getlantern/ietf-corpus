document: rfc-7740
kind: design-rationale
summary: Label sharing between P-tunnels is explicitly permitted (e.g., a single label shared by a (C-*,C-*-BIDIR) and a (C-*,C-G-BIDIR) S-PMSI A-D route from the same PE), though other specifications such as MVPN-EXTRANET may impose additional constraints on how sharing is done.
section: "2.1"
topics:
