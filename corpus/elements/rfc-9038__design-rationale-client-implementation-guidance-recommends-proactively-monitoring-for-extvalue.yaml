document: rfc-9038
kind: design-rationale
summary: Client implementation guidance recommends proactively monitoring for <extValue> in successful responses, recording unsupported namespaces from <reason> elements, and storing unhandled data from <value> elements for later processing, rather than discarding them, so the client can add support for those namespaces going forward.
section: "7.1"
