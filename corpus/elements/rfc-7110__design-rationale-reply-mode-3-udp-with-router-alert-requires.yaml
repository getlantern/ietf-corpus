document: rfc-7110
kind: design-rationale
summary: Reply Mode 3 (UDP with Router Alert) requires all intermediate nodes to support Router Alert and understand MPLS echo reply forwarding, which is impractical in deployed networks with legacy IP-only routers. The 'Reply via Specified Path' mode avoids this by allowing operators to explicitly specify a reliable MPLS return path instead of relying on IP forwarding.
section: "3.2"
topics:
    - mpls
