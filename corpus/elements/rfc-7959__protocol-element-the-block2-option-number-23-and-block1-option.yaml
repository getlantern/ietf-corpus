document: rfc-7959
kind: protocol-element
summary: The Block2 option (number 23) and Block1 option (number 27) are Critical, Unsafe, variable-length (0–3 byte) unsigned integer CoAP options. Block1 pertains to the request payload; Block2 pertains to the response payload. Both may appear in both request and response messages.
section: "2.1"
