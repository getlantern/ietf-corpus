document: rfc-8150
kind: interoperability-note
summary: The mplsLpsMeConfigTable extends mplsOamIdMeTable (RFC 7697) via sparse augmentation, sharing the same index triple. Each time an entry is created in mplsOamIdMeTable for an LER supporting MPLS-TP linear protection, a row is automatically created in mplsLpsMeConfigTable.
