document: rfc-9745
kind: interoperability-note
summary: For historical reasons, the Sunset HTTP header field uses a different date format from the Deprecation header field. Deprecation uses the RFC 9651 structured date (Unix timestamp prefixed with `@`), while Sunset uses HTTP-date format.
section: "4"
topics:
