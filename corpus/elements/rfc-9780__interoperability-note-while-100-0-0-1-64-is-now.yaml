document: rfc-9780
kind: interoperability-note
summary: While 100:0:0:1::/64 is now recommended for the IPv6 destination in IP/UDP encapsulation of multipoint BFD, existing implementations may still use an address from the ::ffff:127.0.0.1/128 block; this document acknowledges that for backward compatibility.
