document: rfc-9183
kind: interoperability-note
summary: An RBridge supporting single nickname MUST be able to simultaneously support single nickname for some of its L1 areas and unique nickname for others, since overlapping sets of RBridges can serve as border RBridges for different L1 areas with different capability mixes.
section: "8"
topics:
    - routing
