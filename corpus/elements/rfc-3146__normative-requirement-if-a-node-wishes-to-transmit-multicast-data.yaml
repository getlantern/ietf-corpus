document: rfc-3146
kind: normative-requirement
summary: If a node wishes to transmit multicast data on other than the default broadcast channel, it MUST first confirm via MCAP whether a channel number for the group address has been already allocated. MCAP implementation is optional for send-only nodes.
section: "9"
rfc2119_level: MUST
topics:
