document: rfc-4802
kind: wire-format
summary: Explicit forward and reverse labels in gmplsTunnelHopTable, gmplsTunnelARHopTable, and gmplsTunnelCHopTable are encoded as Unsigned32 (32-bit integer) when the companion RowPointer is zeroDotZero. For labels exceeding 32 bits or with complex sub-field structure, the RowPointer references a row in the gmplsLabelTable of GMPLS-LABEL-STD-MIB.
