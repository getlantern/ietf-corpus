kind: protocol-element
summary: 'Seven fully-specified COSE ECDSA algorithm identifiers are defined: ESP256 (-9, P-256/SHA-256, Recommended), ESP384 (-51, P-384/SHA-384, Recommended), ESP512 (-52, P-521/SHA-512, Recommended), ESB256 (-265, BrainpoolP256r1/SHA-256), ESB320 (-266, BrainpoolP320r1/SHA-384), ESB384 (-267, BrainpoolP384r1/SHA-384), and ESB512 (-268, BrainpoolP512r1/SHA-512). These replace the polymorphic COSE ES256/ES384/ES512 registrations.'
