document: rfc-5574
kind: normative-requirement
summary: Speex frames MUST NOT be fragmented across multiple RTP packets. The total number of Speex frames SHOULD be kept less than the path MTU to prevent fragmentation.
section: "3.3"
rfc2119_level: MUST NOT
