document: rfc-6705
kind: protocol-element
summary: The LRA 'U' (unsolicited) flag, when set to 1, indicates that the LRA message is sent without a preceding LRI. The receiving MAG must wait for a regular LRI to confirm any new Lifetime value indicated in an unsolicited LRA.
section: "10.2"
