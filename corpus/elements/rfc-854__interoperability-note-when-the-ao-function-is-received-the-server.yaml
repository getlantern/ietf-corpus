document: rfc-854
kind: interoperability-note
summary: When the AO function is received, the server SHOULD return a TELNET Synch to the user to clear any buffers external to the server (in the network and the user's local host) that may hold pending output data.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: SHOULD
