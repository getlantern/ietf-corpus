summary: 'A FEC scheme specification MUST include: the FEC Encoding ID value registered with IANA; the type, semantics, and encoding format of the Repair FEC Payload ID; names/types/encodings for all FSSI elements; and a full specification of the FEC code that uniquely defines encoding symbol values given source block and valid parameters.'
