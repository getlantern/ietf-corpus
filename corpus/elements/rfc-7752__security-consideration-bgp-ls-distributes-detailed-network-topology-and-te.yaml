document: rfc-7752
kind: security-consideration
summary: BGP-LS distributes detailed network topology and TE information to external consumers, creating a risk of topology exposure. A BGP speaker MUST apply configurable policy to control what information is distributed, allowing operators to distribute real physical topology, an abstracted virtual topology, or a mix, and to rate-limit updates to consumers.
section: "8"
topics:
    - bgp
    - routing
    - security
