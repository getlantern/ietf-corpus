summary: GSM-HR codec produces 20 ms frames at 8000 Hz (160 samples per frame). Each speech frame compresses to 112 bits (5.6 kbit/s). SID frames are transmitted at the end of a talkspurt and periodically during pauses to support comfort noise generation.
