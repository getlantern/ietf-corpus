document: rfc-7532
kind: normative-requirement
summary: The Delete FSN operation MUST return an error if the FSN entry has child FSL entries, preventing orphaned FSL entries. This requirement is met by compliant LDAP implementations because RFC 4511 Section 4.8 defines the LDAP delete operation to only remove leaf entries.
section: 5.1.2
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
