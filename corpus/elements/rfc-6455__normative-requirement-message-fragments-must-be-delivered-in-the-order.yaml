document: rfc-6455
kind: normative-requirement
summary: Message fragments MUST be delivered in the order sent, and fragments of one message MUST NOT be interleaved with fragments of another message unless an extension explicitly permits it. Clients and servers MUST support receiving both fragmented and unfragmented messages.
section: "5.4"
rfc2119_level: MUST
topics:
    - websocket
