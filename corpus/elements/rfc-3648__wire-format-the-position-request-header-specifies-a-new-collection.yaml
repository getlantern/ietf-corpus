document: rfc-3648
kind: wire-format
summary: 'The Position request header specifies a new collection member''s location in an ordered collection''s ordering. Its BNF is: `Position = "Position" ":" ("first" | "last" | (("before" | "after") segment))`. The segment is interpreted relative to the collection being modified.'
section: "6.1"
topics:
    - http
