document: rfc-9865
kind: normative-requirement
summary: The cursor value MUST be empty or omitted for the first request of a cursor-paginated query. Cursor values may only contain characters from the unreserved character set defined in RFC 3986 Section 2.3.
section: "2"
rfc2119_level: MUST
