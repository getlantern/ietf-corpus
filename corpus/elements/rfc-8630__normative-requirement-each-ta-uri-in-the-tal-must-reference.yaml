document: rfc-8630
kind: normative-requirement
summary: Each TA URI in the TAL MUST reference a single object and MUST NOT reference a directory or collection. The referenced object MUST be a self-signed CA certificate conforming to the RPKI certificate profile (RFC 6487).
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
