document: rfc-9927
kind: protocol-element
summary: The P-field is a 2-bit Registered Address Type Indicator (RATInd) at bits 2–3 of the EARO flags field (defined by RFC 9685). It indicates whether the registered address is unicast, multicast, anycast, or derived from a registered unicast prefix.
