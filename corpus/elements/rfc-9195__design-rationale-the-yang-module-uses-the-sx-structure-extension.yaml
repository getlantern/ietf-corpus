document: rfc-9195
kind: design-rationale
summary: The YANG module uses the 'sx:structure' extension (RFC 8791) rather than a container or list, because instance data sets are not managed objects on a running server but standalone documents; the security considerations template for YANG models (RFC 8407 Section 3.7.1) is therefore deliberately not followed.
