document: rfc-7968
kind: normative-requirement
summary: If End.FGL is less than Start.FGL in a Tree-FGL RECORD, the record MUST be ignored. If Length of the TREE-FGLs APPsub-TLV is not a multiple of 8, the APPsub-TLV is corrupt and MUST be ignored.
section: 3.2.3
rfc2119_level: MUST
topics:
    - routing
