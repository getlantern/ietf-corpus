kind: protocol-element
summary: Each audio frame starts with the 15-bit sync code 0b111111111111100, followed by a blocking strategy bit (0=fixed, 1=variable block size), 4 block-size bits, 4 sample-rate bits, 4 channel bits, 3 bit-depth bits, 1 reserved bit, a coded number, optional uncommon block size, optional uncommon sample rate, and an 8-bit CRC.
