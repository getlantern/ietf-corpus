document: rfc-4382
kind: protocol-element
summary: The MplsL3VpnName textual convention defines a VRF identifier as an OCTET STRING of SIZE(0..31). It SHOULD be unique throughout the MPLS domain and MAY be set to the VPN ID as defined in RFC 2685.
