document: rfc-3480
kind: protocol-element
summary: When an LSR receives a REQUEST message with an IF_ID TLV containing an IF_INDEX TLV, it finds the link by matching the tuple <Router ID, local identifier> against <IP Address, Interface ID> in the IF_INDEX TLV; the match identifies the link for label allocation.
section: "4.1"
topics:
    - mpls
    - routing
