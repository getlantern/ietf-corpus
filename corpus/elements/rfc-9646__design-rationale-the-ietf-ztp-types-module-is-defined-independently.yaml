document: rfc-9646
kind: design-rationale
summary: The 'ietf-ztp-types' module is defined independently of 'ietf-sztp-csr' so that its three groupings can be reused by bootstrapping protocols other than SZTP. This separation allows future ZTP protocols to leverage the same CSR negotiation model without depending on the SZTP-specific augmentation module.
section: "3"
topics:
