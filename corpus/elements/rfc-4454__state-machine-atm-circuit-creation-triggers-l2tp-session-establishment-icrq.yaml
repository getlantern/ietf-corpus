document: rfc-4454
kind: state-machine
summary: ATM circuit creation triggers L2TP session establishment (ICRQ → ICRP → ICCN three-way handshake). An LCCE MAY initiate immediately on circuit creation or wait until the circuit is ACTIVE. Circuit unprovisioning triggers session teardown via CDN; status changes trigger SLI messages.
section: "3.1"
topics:
    - routing
