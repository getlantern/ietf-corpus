document: rfc-3983
kind: protocol-element
summary: 'The default BEEP message pattern for IRIS is a one-to-one request/response exchange: the client sends an IRIS XML instance in a BEEP ''MSG'' message, the server responds with an IRIS XML instance in an ''RPY'' message, and faults are conveyed in ''ERR'' messages.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
