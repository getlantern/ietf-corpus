document: rfc-7178
kind: registry
summary: IANA created the RBridge Channel Protocols sub-registry in the TRILL Parameter Registry. Protocol 0x000 and 0xFFF are reserved; 0x001 is RBridge Channel Error; 0x002-0x0FF require Standards Action; 0x100-0xFF7 require RFC Required or IESG Approval; 0xFF8-0xFFE are Private Use.
section: "7.1"
topics:
