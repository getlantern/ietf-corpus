document: rfc-9190
kind: normative-requirement
summary: Key derivation MUST use the full length values specified (128 bytes for Key_Material, 64 bytes for Method-Id). Unlike TLS 1.2, TLS 1.3 does not permit truncating TLS-Exporter output by requesting less data; the full output must be requested.
section: "2.3"
rfc2119_level: MUST
topics:
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
