document: rfc-3436
kind: protocol-element
summary: Each TLS connection is established over exactly one bi-directional SCTP stream, and the TLS handshake protocol is run independently on each such stream. The number of TLS connections per association is thus bounded by the number of bi-directional streams.
section: "5"
topics:
    - tls
    - sctp
