document: rfc-9540
kind: privacy-consideration
summary: When clients fetch a gateway's key configuration directly, they expose their IP address to the gateway. Clients trying to hide their IP or location, or at risk of key targeting attacks, should fetch the configuration via a proxy or other IP-hiding mechanism.
section: "7"
topics:
    - privacy
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
