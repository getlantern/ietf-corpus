document: rfc-9097
kind: protocol-element
summary: Congestion is inferred when sequence number anomalies AND/OR delay range above the upper threshold occur for three consecutive feedback intervals (slowAdjThresh=3). On first congestion confirmation, the rate drops by 30 table steps (Rx-30) to compensate for the fast initial ramp-up; subsequent decrements are Rx-1.
section: "8.1"
topics:
    - measurement
    - congestion
