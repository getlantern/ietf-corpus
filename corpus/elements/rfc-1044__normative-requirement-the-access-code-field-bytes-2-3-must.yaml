document: rfc-1044
kind: normative-requirement
summary: The Access Code field (bytes 2–3) MUST contain 0x0000 in all IP encapsulations, as this field is reserved for future 32-bit addressing extensions. The Burst Mode and Exception bits in Message Flags MUST NOT be used with IP.
section: BASIC (16-BIT) MESSAGE ENCAPSULATION / ACCESS CODE
rfc2119_level: MUST NOT
topics:
    - ip
