document: rfc-5763
kind: protocol-element
summary: The fingerprint attribute (a=fingerprint) carried in SDP over SIP cryptographically binds the DTLS key exchange on the media path to the signaling plane. Each side computes the fingerprint from its certificate and includes it in the offer/answer; the peer verifies it against the certificate received in the DTLS handshake.
