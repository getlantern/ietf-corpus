document: rfc-8572
kind: normative-requirement
summary: Devices MUST have a configurable variable to enable/disable SZTP bootstrapping, and it MUST be enabled by default so bootstrapping runs on first power-on. Using a presence-based configuration node is NOT RECOMMENDED because it cannot be removed by a merge operation.
section: "5.1"
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
