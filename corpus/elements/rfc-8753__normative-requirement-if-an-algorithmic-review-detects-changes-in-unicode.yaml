document: rfc-8753
kind: normative-requirement
summary: If an algorithmic review detects changes in Unicode after version 12.0 that would break compatibility with prior IDNA derived properties, or that would preserve IDNA compatibility at the cost of departing from current Unicode specifications, those changes must be captured in documents published as Standards Track RFCs.
section: "4"
rfc2119_level: MUST
topics:
