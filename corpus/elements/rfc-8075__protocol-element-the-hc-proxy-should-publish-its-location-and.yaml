document: rfc-8075
kind: protocol-element
summary: The HC Proxy SHOULD publish its location and URI mapping template using the CoRE Link Format (RFC 6690) resource type 'core.hc', discoverable via '/.well-known/core?rt=core.hc'. On the CoAP side, links must include an explicit anchor parameter with the HTTP origin; on the HTTP side, the anchor may be omitted if it equals the HTTP origin.
section: "5.5"
topics:
    - http
