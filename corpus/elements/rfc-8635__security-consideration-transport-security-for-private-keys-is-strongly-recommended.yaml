document: rfc-8635
kind: security-consideration
summary: Transport security for private keys is strongly RECOMMENDED, with transport security strength SHOULD be at least as good as the BGPsec key strength. Transmitting a private key in the clear or with a known-broken algorithm undermines the entire PKI trust model and enables impersonation of the BGPsec signer.
section: "11"
rfc2119_level: RECOMMENDED
topics:
    - bgp
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
