document: rfc-9052
kind: registry
summary: This document establishes the 'COSE Key Common Parameters' IANA registry defining map labels for COSE_Key objects (kty=1, kid=2, alg=3, key_ops=4, Base IV=5). Key-type-specific parameters are in the separate 'COSE Key Type Parameters' registry defined by RFC 9053.
section: "11.2"
