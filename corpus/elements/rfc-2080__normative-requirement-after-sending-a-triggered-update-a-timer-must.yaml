document: rfc-2080
kind: normative-requirement
summary: After sending a triggered update, a timer MUST be set to a random interval between 1 and 5 seconds; additional changes during this interval are coalesced into a single update when the timer expires. Sending complete routing tables in triggered updates is strongly discouraged.
section: 2.5.1
rfc2119_level: MUST
topics:
    - routing
