document: rfc-5655
kind: protocol-element
summary: The messageMD5Checksum Information Element (ElementId 262, octetArray, 16 bytes) carries the MD5 digest of the containing IPFIX Message computed with this field set to all zeros. It is explicitly intended as a simple error-detection checksum; collision resistance and algorithm agility are not required.
section: 8.2.10
topics:
