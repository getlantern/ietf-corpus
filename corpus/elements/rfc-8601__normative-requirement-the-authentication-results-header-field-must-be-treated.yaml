document: rfc-8601
kind: normative-requirement
summary: The Authentication-Results header field MUST be treated as a trace header field as defined in RFC 5321, and hence MUST NOT be reordered and MUST be prepended to the message so that the chain of authentication handling is visible.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
