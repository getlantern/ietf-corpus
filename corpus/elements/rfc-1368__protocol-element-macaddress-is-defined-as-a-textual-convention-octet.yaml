document: rfc-1368
kind: protocol-element
summary: MacAddress is defined as a textual convention OCTET STRING (SIZE (6)), encoding a 6-octet MAC address in canonical (least-significant-bit-first) order as defined by IEEE 802.1a. This convention has no effect on encoding.
