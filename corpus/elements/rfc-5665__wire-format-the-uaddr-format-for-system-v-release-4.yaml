document: rfc-5665
kind: wire-format
summary: The uaddr format for System V Release 4 loopback transports (ticlts, ticots, ticotsord) is any non-zero length array of octets; it is opaque rather than US-ASCII text, which is an exception to the general XDR string constraint specified in RFC 1833.
section: 5.2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
