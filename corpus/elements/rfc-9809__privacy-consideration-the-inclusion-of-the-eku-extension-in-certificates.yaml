document: rfc-9809
kind: privacy-consideration
summary: The inclusion of the EKU extension in certificates may reveal the purpose of the certificate to observers; in TLS 1.2 certificates are exchanged in the clear, and even with encrypted transports (TLS 1.3), Certificate Transparency logs could allow an attacker to identify the certificate purpose and infer private information about the certificate subject.
section: "7"
topics:
    - privacy
    - pkix
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
