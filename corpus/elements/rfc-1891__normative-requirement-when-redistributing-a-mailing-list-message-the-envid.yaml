document: rfc-1891
kind: normative-requirement
summary: When redistributing a mailing list message, the ENVID, NOTIFY, RET, and ORCPT parameters MUST NOT be derived from those of the original message. The envelope return address MUST be rewritten to the list maintainer and MUST forward unrecognized DSNs to the human responsible.
section: 6.2.7.1
rfc2119_level: MUST NOT
topics:
    - email
