document: rfc-6012
kind: security-consideration
summary: DTLS renegotiation may be vulnerable to attacks described in RFC 5746. It is RECOMMENDED that renegotiation be disabled for syslog over DTLS; if allowed, RFC 5746 must be followed and certificate identities must not change across renegotiation.
section: "9.1"
topics:
    - tls
    - security
    - syslog
