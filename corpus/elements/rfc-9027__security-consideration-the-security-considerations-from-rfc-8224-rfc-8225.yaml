document: rfc-9027
kind: security-consideration
summary: The security considerations from RFC 8224, RFC 8225, and RFC 8443 are fully applicable to this specification. Compromise of SIP 'Resource-Priority' or 'Priority' header fields could lead to misuse of network resources during congestion scenarios and improper handling of PSAP callbacks.
section: "8"
topics:
    - security
    - sip
