document: rfc-3226
kind: design-rationale
summary: TCP is considered expensive for DNS because a connection requires 5 packets for setup and teardown (at least 3 round trips in addition to the original UDP query), placing significant overhead and delay on servers handling thousands of queries per second.
section: "1"
topics:
    - dns
