summary: The softwire modules only provide configuration relevant to softwires; full CE provisioning also requires separate YANG modules for IPv6 routing (RFC 8349), IPv4 routing (RFC 8349), stateful NAT44/NAPT (RFC 8512), and stateless NAT46 (RFC 8512), which are not duplicated here.
