document: rfc-8306
kind: protocol-element
summary: SERO (Secondary Explicit Route Object, Object-Class 29, Object-Type 1) encodes the explicit route of an individual S2L sub-LSP using the same format as the ERO. SRRO (Secondary Record Route Object, Object-Class 30, Object-Type 1) records the actual route of an S2L sub-LSP and is used when reporting an existing P2MP LSP for reoptimization.
section: "3.2"
topics:
    - mpls
    - routing
