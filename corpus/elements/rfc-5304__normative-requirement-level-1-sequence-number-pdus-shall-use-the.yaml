summary: Level 1 Sequence Number PDUs SHALL use the Area Authentication string (as in Level 1 LSPs), and Level 2 Sequence Number PDUs SHALL use the domain authentication string (as in Level 2 LSPs). IS-IS Hello PDUs SHALL use the Link Level Authentication String.
