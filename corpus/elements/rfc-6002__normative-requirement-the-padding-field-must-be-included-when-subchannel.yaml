document: rfc-6002
kind: normative-requirement
summary: The Padding field MUST be included when Subchannel fields in a Channel_Set Subobject result in the subobject not being 32-bit aligned. When present, Padding MUST have a length that results in 32-bit alignment, MUST be set to zero on transmission, and MUST be ignored on receipt. Transit nodes SHOULD pass these bits through unmodified.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
