summary: 'For types 4/5, the X and Y tile offset of the first MCU in a restart interval is: tile_offset = RCOUNT * restart_interval * 2; x_offset = tile_offset % frame_width_in_tiles; y_offset = tile_offset / frame_width_in_tiles.'
