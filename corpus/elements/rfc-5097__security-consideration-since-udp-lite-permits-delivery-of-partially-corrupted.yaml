document: rfc-5097
kind: security-consideration
summary: Since UDP-Lite permits delivery of partially corrupted data, the MIB counters (particularly InBadChecksum and InErrors) can be used to infer end-to-end path characteristics and application type, representing an information-disclosure risk.
