document: rfc-6619
kind: interoperability-note
summary: Existing tunnels (e.g., in cellular network gateways already present for mobility management) are a common special case of point-to-point links; per-interface NAT is particularly attractive in such environments because no additional tunneling mechanisms, negotiation, or host changes are required.
