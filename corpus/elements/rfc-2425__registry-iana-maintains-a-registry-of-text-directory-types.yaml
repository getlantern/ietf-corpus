document: rfc-2425
kind: registry
summary: 'IANA maintains a registry of text/directory types. New types require the same template-and-review process: post to ietf-mime-direct@imc.org, two-week comment period, and Profile Reviewer approval. Type definitions are never deleted; obsolete types are marked OBSOLETE.'
