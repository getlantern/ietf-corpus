document: rfc-7158
kind: normative-requirement
summary: Implementations MUST NOT add a byte order mark (BOM) to the beginning of a JSON text. Implementations that parse JSON texts MAY ignore a BOM rather than treating it as an error.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - json
