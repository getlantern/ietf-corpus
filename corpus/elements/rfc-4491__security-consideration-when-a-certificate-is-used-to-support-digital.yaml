document: rfc-4491
kind: security-consideration
summary: When a certificate is used to support digital signatures as an analogue to manual signatures under Russian Federal Electronic Digital Signature Law, the certificate MUST contain a critical keyUsage extension, and keyUsage MUST NOT include keyEncipherment or keyAgreement.
section: "3"
rfc2119_level: MUST
topics:
