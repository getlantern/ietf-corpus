kind: state-machine
summary: 'The example decoder performs four phases: (1) systematic Gaussian elimination on submatrix V using row-selection based on minimum degree and graph-component size; (2) Gaussian elimination on U_lower to obtain I_u; (3) precomputation of U'' (all 2^8-1 non-zero row combinations per group of 8 I_u rows); (4) zeroing U_upper using U''. Failure occurs if V empties before i+u=L or U_lower has rank < u.'
