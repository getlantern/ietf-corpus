document: rfc-6345
kind: state-machine
summary: When a PRY message is received by the PAA, a new PANA session attribute 'IP address and UDP port number of the PRE' is populated. A session is classified as a relayed PANA session when this attribute has a non-null value; subsequent PAA-originated messages for that session are sent to the PRE rather than directly to the PaC.
