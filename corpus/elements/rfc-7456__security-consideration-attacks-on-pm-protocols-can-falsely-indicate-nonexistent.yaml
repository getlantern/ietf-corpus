document: rfc-7456
kind: security-consideration
summary: Attacks on PM protocols can falsely indicate nonexistent performance issues, prevent detection of real ones (DoS), or allow network reconnaissance via passive eavesdropping of PM messages. Synthetic PM messages can themselves be used as a DoS vector against RBridges.
