document: rfc-4087
kind: wire-format
summary: tunnelInetConfigEntry is indexed by (tunnelInetConfigAddressType, tunnelInetConfigLocalAddress, tunnelInetConfigRemoteAddress, tunnelInetConfigEncapsMethod, tunnelInetConfigID). If the combined octet length of local and remote addresses exceeds 110, the resulting OIDs exceed the 128 sub-identifier limit and cannot be accessed via SNMPv1, SNMPv2c, or SNMPv3.
section: "4"
