document: rfc-5730
kind: protocol-element
summary: An EPP response contains one or more <result> elements (each with a 'code' attribute and <msg> child, plus optional <value> and <extValue> elements), an optional <msgQ> element for queued messages, optional <resData> with object-specific data, optional <extension>, and a <trID> element combining <clTRID> and <svTRID>.
section: "2.6"
