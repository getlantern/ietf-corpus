document: rfc-2950
kind: protocol-element
summary: CFB64_IV_BAD is sent only in the case of a protocol violation where the received IV was not the correct length (8 bytes). Only the DO ENCRYPT side may send CFB64_IV_OK or CFB64_IV_BAD.
