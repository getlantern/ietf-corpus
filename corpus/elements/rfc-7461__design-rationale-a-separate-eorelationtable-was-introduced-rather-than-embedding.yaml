document: rfc-7461
kind: design-rationale
summary: A separate eoRelationTable was introduced rather than embedding relationship data in eoTable to allow each Energy Object to have multiple relationships with different peer objects, and to permit IANA to extend the IANAEnergyRelationship textual convention in IANA-ENERGY-RELATION-MIB without modifying the primary MIB module.
