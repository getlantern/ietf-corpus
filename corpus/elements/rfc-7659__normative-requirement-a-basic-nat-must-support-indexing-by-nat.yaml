document: rfc-7659
kind: normative-requirement
summary: A basic NAT MUST support indexing by NAT instance even if it limits itself to one instance. A NAT supporting address pools MUST support more than two realms. A basic NAT is not required to implement the subscriber table, address pool table, or pool address range table.
section: "3.4"
rfc2119_level: MUST
topics:
    - nat
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
