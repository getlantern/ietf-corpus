document: rfc-7271
kind: normative-requirement
summary: Under SD conditions, a node SHALL duplicate user data traffic and feed it to both working and protection paths. Duplication SHALL continue as long as any SD condition exists in the protected domain; in revertive operation it continues through the WTR state and stops on WTR exit, while in non-revertive operation it stops immediately when SD clears.
section: "7.3"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
