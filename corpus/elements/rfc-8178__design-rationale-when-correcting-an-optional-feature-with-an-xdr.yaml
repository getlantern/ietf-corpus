document: rfc-8178
kind: design-rationale
summary: 'When correcting an OPTIONAL feature with an XDR change, the corrected and uncorrected versions are treated as two independent OPTIONAL features. This allows older unfixed clients/servers, newer fixed clients/servers, and dual-capable implementations to interoperate: each party can determine which version of the feature is supported by the other party and use that version.'
section: "9.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
