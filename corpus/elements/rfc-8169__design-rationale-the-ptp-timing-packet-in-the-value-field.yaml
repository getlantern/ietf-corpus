document: rfc-8169
kind: design-rationale
summary: The PTP timing packet in the Value field may be authenticated or encrypted and is carried unchanged through the LSP; only the Scratch Pad field (outside the protected payload) is updated by intermediate RTM-capable nodes. This allows end-to-end message integrity protection to coexist with MPLS-layer residence time measurement.
section: "3.2"
topics:
    - ntp
    - security
