document: rfc-2640
kind: normative-requirement
summary: The server's default language MUST be understandable by an English-speaking person (per RFC 2277 §4.5); this specification RECOMMENDS English encoded in ASCII as the server default. Once a language is negotiated, server-PI MUST return messages encoded in UTF-8 in that language.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
