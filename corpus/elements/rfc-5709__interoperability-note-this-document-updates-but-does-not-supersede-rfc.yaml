summary: This document updates but does not supersede RFC 2328's Cryptographic Authentication mechanism (Authentication Type 2). The overall authentication process in RFC 2328 Appendix D remains unchanged; only the cryptographic details (SHA instead of MD5, HMAC instead of Keyed-Hash) are updated.
