document: rfc-3813
kind: state-machine
summary: 'mplsXCAdminStatus (desired state: up, down, testing) and mplsXCOperStatus (actual state: up, down, testing, unknown, dormant, notPresent, lowerLayerDown) model the administrative and operational state of each cross-connect entry. The mplsXCUp and mplsXCDown notifications are generated on transitions to up(1) or down(2) respectively.'
