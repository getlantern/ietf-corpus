document: rfc-8955
kind: normative-requirement
summary: BGP implementations MUST enforce that the AS_PATH of a route received via eBGP contains the neighboring AS in the left-most position. This rule is made mandatory here for security reasons.
section: "6"
rfc2119_level: MUST
topics:
