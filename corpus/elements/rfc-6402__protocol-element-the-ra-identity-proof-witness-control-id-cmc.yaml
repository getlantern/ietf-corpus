document: rfc-6402
kind: protocol-element
summary: The RA Identity Proof Witness control (id-cmc-raIdentityWitness, OID id-cmc 35) allows an RA to signal to subsequent control processors that all identity proof requirements have been met. Its ASN.1 type is BodyPartPath, and it may only appear in the control sequence of a PKIData object, not a PKIResponse.
section: "2.5"
topics:
    - pkix
    - security
