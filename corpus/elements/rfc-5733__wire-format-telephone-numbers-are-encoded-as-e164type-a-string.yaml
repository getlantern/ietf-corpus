document: rfc-5733
kind: wire-format
summary: 'Telephone numbers are encoded as e164Type: a string matching the pattern ''(\+[0-9]{1,3}\.[0-9]{1,14})?'' with a maximum length of 17 characters, plus an optional ''x'' attribute for extension information. The number MUST begin with ''+'' followed by the ITU-T E.164 country code, a dot, then digits.'
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
