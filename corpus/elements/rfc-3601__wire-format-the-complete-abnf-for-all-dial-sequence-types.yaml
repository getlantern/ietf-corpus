document: rfc-3601
kind: wire-format
summary: 'The complete ABNF for all dial-sequence types is: phone-string = 1*(DTMF/pause/tonewait/written-sep); DTMF = (DIGIT/"#"/"*"/"A"/"B"/"C"/"D"); written-sep = ("-"/"."); pause = "p"; tonewait = "w"; global-phone = "+" 1*(DIGIT/written-sep); local-phone = [exit-code] dial-number | exit-code [dial-number]; subaddr-string = phone-string; post-dial = phone-string.'
section: "9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
