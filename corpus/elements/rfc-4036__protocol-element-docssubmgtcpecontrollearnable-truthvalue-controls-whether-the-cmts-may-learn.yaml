summary: 'docsSubMgtCpeControlLearnable (TruthValue) controls whether the CMTS may learn CPE IP addresses from upstream traffic and add them to docsSubMgtCpeIpTable. Learning is limited to docsSubMgtCpeControlMaxCpeIp minus provisioned entries. Defaults to docsSubMgtCpeLearnableDefault (default: true).'
