document: rfc-8202
kind: protocol-element
summary: 'The Instance Identifier TLV (IID-TLV, Type 7) carries a 16-bit Instance Identifier (IID) and zero or more 16-bit Instance-specific Topology Identifiers (ITIDs). It is included in all IS-IS PDUs (IIHs, LSPs, SNPs) originated by MI-RTRs for non-zero instances. A PDU without an IID-TLV belongs to the standard instance (IID #0).'
section: "3.1"
topics:
    - routing
