document: rfc-8198
kind: protocol-element
summary: NSEC resource records provide authenticated denial of existence by specifying names that appear alphabetically before and after the queried-for name in a DNSSEC-signed zone. A validating resolver can use a cached NSEC record to answer NXDOMAIN for any query name falling within its covered range.
section: "4"
topics:
    - dns
    - security
