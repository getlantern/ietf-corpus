document: rfc-3703
kind: normative-requirement
summary: Implementations that use an LDAP directory as their policy repository and want to implement policy information according to RFC 3060 SHALL use the LDAP schema defined in this document, or a schema that subclasses from the schema defined in this document.
section: "1"
rfc2119_level: REQUIRED
