document: rfc-3963
kind: wire-format
summary: 'The Mobile Network Prefix Option has alignment requirement 8n+4. It consists of: Type (1 octet, value 6), Length (1 octet, value 18), Reserved (1 octet), Prefix Length (1 octet), and Mobile Network Prefix (16 octets, the IPv6 prefix). Multiple options may appear in a single Binding Update for multiple prefixes.'
section: "4.3"
topics:
    - mobility
    - ip
