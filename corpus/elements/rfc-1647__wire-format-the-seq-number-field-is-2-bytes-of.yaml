document: rfc-1647
kind: wire-format
summary: The SEQ-NUMBER field is 2 bytes of binary data, used only when the RESPONSES function is agreed to. It contains a sequence number in the range 0–32767 that correlates response messages to the data messages they acknowledge; it wraps back to zero after reaching 32767.
section: 8.1.4
extracted_by: claude-sonnet-4-6
