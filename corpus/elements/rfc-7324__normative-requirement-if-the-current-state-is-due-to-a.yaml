document: rfc-7324
kind: normative-requirement
summary: If the current state is due to a local or remote Manual Switch, a local Signal Fail indication on the protection path SHALL cause the LER to enter local Unavailable state and begin transmission of an SF(0,0) message. This corrects RFC 6378 which could leave a node incorrectly sending NR(0,1) despite a protection LSP failure.
section: "3"
rfc2119_level: REQUIRED
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
