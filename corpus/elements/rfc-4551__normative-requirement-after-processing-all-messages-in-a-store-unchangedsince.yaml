document: rfc-4551
kind: normative-requirement
summary: After processing all messages in a STORE UNCHANGEDSINCE command, if any messages failed the UNCHANGEDSINCE test, the server MUST return a MODIFIED response code in the tagged response listing those message numbers (or UIDs for UID STORE).
section: "3.2"
rfc2119_level: MUST
topics:
    - email
