document: rfc-7172
kind: normative-requirement
summary: For mixed-campus safety, all FGL-safe switches MUST do Step (A) or (B) for any port with a VL RBridge neighbor, and MUST do Step (C) — use only distribution trees rooted at FGL TRILL switch nicknames for FGL traffic. If using Step (A) with low-speed links (~100 Mbps or less), link costs MUST be adjusted so no adjacency between FGL-safe switches exceeds cost 200,000.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
