document: rfc-4712
kind: wire-format
summary: 'The NTP Timestamp field is 64 bits: a full-resolution unsigned fixed-point number with the integer part (seconds) in the most significant 32 bits and the fractional part in the least significant 32 bits. A Data Source lacking NTP SHOULD set the corresponding RPPF bit to 0.'
section: 2.1.2
topics:
