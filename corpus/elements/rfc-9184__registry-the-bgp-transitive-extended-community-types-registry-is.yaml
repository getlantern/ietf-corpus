document: rfc-9184
kind: registry
summary: The 'BGP Transitive Extended Community Types' registry is updated so that type values 0x80-0x82 are renamed to 'Generic Transitive Extended Community', 'Generic Transitive Extended Community Part 2', and 'Generic Transitive Extended Community Part 3' respectively, with RFC 9184 added as reference. Registration procedures for 0x80-0x82 are changed from 'Experimental Use' to 'First Come First Served'; 0x83-0x8F remain reserved for Experimental Use.
section: "2.1"
