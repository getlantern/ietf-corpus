document: rfc-6146
kind: security-consideration
summary: 'NAT64 breaks end-to-end security: it modifies IP headers, preventing transparent use of IPsec AH and making IPsec ESP between IPv6 and IPv4 endpoints infeasible without additional mechanisms. Applications requiring end-to-end security must use application-layer security.'
section: "5.1"
topics:
    - nat
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
