document: rfc-2634
kind: normative-requirement
summary: The ASN.1 DER encoded Receipt content MUST be directly encoded within the signedData encapContentInfo eContent OCTET STRING. The id-ct-receipt OID MUST be in eContentType. The Data content type MUST NOT be used, and Receipt MUST NOT be encapsulated in a MIME header before encoding.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
