document: rfc-5749
kind: protocol-element
summary: The Key Request Token (KRT) is a tuple (PID, KT, KL) sent by the KRS in a KDE-Request. PID identifies the EAP peer, KT specifies the type of root key requested (DSRK, USRK, or DSUSRK), and KL is the key label as defined in RFC 5295.
