document: rfc-1697
kind: design-rationale
summary: Computing rdbmsDbInfoSizeAllocated and rdbmsDbInfoSizeUsed may be expensive; agents are explicitly permitted to cache these values to improve performance. This is noted in non-normative comments within the MIB module itself.
