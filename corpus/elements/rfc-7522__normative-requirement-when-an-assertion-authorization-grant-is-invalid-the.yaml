document: rfc-7522
kind: normative-requirement
summary: When an Assertion authorization grant is invalid, the error response MUST use the 'invalid_grant' error code. When a client authentication Assertion is invalid, the error response MUST use the 'invalid_client' error code.
section: "3.1"
rfc2119_level: MUST
topics:
