document: rfc-9926
kind: wire-format
summary: The EDAC (Extended Duplicate Address Confirmation) response to a prefix EDAR echoes the same 15-byte Prefix field and 1-byte r/Prefix-Length field, with a separate 8-bit Status field replacing the P-field/Reserved header word. The ROVR and other fields are carried identically to the corresponding EDAR.
section: "7.3"
