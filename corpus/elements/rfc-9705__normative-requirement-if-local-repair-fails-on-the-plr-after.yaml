document: rfc-9705
kind: normative-requirement
summary: If local repair fails on the PLR after a failure, the PLR MUST send a Remote PathTear to the MP to clean up LSP state from the PLR to the egress. The TTL in the Remote PathTear message MUST be set to 255.
section: 4.5, 4.5.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
