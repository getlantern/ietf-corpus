document: rfc-5063
kind: interoperability-note
summary: 'The Capability object uses Class-Number 134 (form 10bbbbbb), so nodes that do not support it will silently discard it and revert to RFC 3473 recovery procedures. This ensures backward compatibility: neither a non-supporting restarting node nor a non-supporting downstream neighbor will send or expect RecoveryPath messages.'
section: "4.6"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
