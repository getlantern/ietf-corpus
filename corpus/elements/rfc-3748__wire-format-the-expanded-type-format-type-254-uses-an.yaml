document: rfc-3748
kind: wire-format
summary: 'The Expanded Type format (Type=254) uses an 8-octet structure: 1-octet Type=254, 3-octet Vendor-Id, and 4-octet Vendor-Type. Vendor-Id of 0 denotes IETF types. This format supports both Expanded method requests and Expanded Nak responses.'
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
