document: rfc-5926
kind: interoperability-note
summary: Two TCP-AO systems cannot interoperate unless they are configured to use the same MAC algorithm and KDF. This document standardizes the minimum required algorithms (HMAC-SHA-1-96 and AES-128-CMAC-96) to ensure a common baseline.
section: "1"
topics:
