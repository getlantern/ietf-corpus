document: rfc-3945
kind: interoperability-note
summary: Of the twelve GMPLS signaling building blocks, only blocks 1 (Generalized Label Request), 2 (Generalized Label), and 10 (technology-specific traffic parameters) are mandatory. Blocks 6 (bi-directional LSP) and 9 (explicit label control) should typically be implemented; the remaining blocks are optional and technology-dependent.
