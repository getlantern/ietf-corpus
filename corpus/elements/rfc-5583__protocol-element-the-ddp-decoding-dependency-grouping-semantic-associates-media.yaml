document: rfc-5583
kind: protocol-element
summary: The 'DDP' (Decoding Dependency) grouping semantic associates media streams, identified by their 'mid' attribute, into a group where all streams share the same type of decoding dependency. Each media stream in a DDP group must be composed of an integer number of Media Partitions and must contain at least one Operation Point.
section: 5.2.1
topics:
    - realtime
    - rtp
