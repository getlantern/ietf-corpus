document: rfc-6065
kind: design-rationale
summary: The memo addresses the use case where organizational roles (VACM groups) change infrequently, but user-to-role assignments change frequently. Delegating the user-to-group mapping to RADIUS avoids re-provisioning managed devices as users are added, deleted, or reassigned.
section: "4.1"
