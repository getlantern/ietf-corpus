document: rfc-1850
kind: security-consideration
summary: Several MIB objects have read-write or read-create access and may be sensitive in some environments; implementations should control even GET access and consider encrypting values over the network. In the absence of a standard SNMP security architecture, read-write objects may be implemented as read-only with an alternative interface for modification.
section: "8"
topics:
    - security
    - snmp
