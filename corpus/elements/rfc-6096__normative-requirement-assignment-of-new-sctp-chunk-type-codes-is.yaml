document: rfc-6096
kind: normative-requirement
summary: 'Assignment of new SCTP chunk type codes is done through an IETF Review action. Documentation of a new chunk MUST contain: a long and short name, a detailed structural description conforming to RFC 4960 Section 3.2, a detailed definition of each field including chunk flags, and a detailed procedural description of the chunk''s use.'
section: "3.1"
rfc2119_level: MUST
topics:
    - sctp
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
