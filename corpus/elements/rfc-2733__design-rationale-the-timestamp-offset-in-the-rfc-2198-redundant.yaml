document: rfc-2733
kind: design-rationale
summary: The timestamp offset in the RFC 2198 redundant encodings header for FEC SHOULD be set to zero because FEC timestamps are already set to the transmission instant of the FEC packet and do not represent a fixed offset from the primary encoding timestamp.
section: "10"
rfc2119_level: SHOULD
topics:
