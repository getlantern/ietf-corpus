document: rfc-3140
kind: interoperability-note
summary: Case 1 PHBIDs constructed from Class Selector Codepoints enable consistent operation with networks using IP Precedence (RFC 1812), since Class Selector Codepoints correspond to IP Precedence values; different networks will map these differently so recipients must apply their own local policy.
