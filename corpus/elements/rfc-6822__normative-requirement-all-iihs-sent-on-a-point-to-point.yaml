document: rfc-6822
kind: normative-requirement
summary: 'All IIHs sent on a point-to-point circuit by an MI-RTR MUST include an IID-TLV, including those for IID #0. Once a neighbor is determined to not support MI-IS-IS (IIH received with no IID-TLV), an MI-RTR MUST NOT send PDUs for instances other than IID #0.'
section: 2.6.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
