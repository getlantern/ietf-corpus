document: rfc-3903
kind: normative-requirement
summary: For integrity and confidentiality protection, ESCs MUST implement TLS, MUST support both mutual and one-way authentication, and MUST support the SIPS URI scheme. EPAs SHOULD be capable of initiating TLS and SHOULD support SIPS.
section: "14.4"
rfc2119_level: MUST
topics:
