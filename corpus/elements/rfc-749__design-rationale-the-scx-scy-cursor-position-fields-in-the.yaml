document: rfc-749
kind: design-rationale
summary: The SCx/SCy cursor position fields in the type-2 block exist to support ITS operating system hosts, which pass TDCODEs directly into the local output system without the user TELNET program interpreting them. SCx/SCy lets the server assert the post-execution 'main program level' screen position without requiring TDCODE interpretation on the user side.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
