document: rfc-4783
kind: wire-format
summary: The SEVERITY TLV (Type 513, Length 8) contains a 20-bit Reserved field, a 4-bit Impact field (0=Unspecified, 1=Non-Service Affecting, 2=Service Affecting), and an 8-bit Severity field (0=Cleared, 1=Indeterminate, 2=Critical, 3=Major, 4=Minor, 5=Warning).
