document: rfc-5150
kind: normative-requirement
summary: The switching capability of an S-LSP TE link MUST be equal to the switching type of the underlying S-LSP, since an S-LSP TE link provides a data link to other LSPs in the same layer and no hierarchy is possible.
section: "4"
rfc2119_level: MUST
topics:
