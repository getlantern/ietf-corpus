document: rfc-4682
kind: protocol-element
summary: pktcMtaDevRealmTable (up to 64 entries, indexed by pktcMtaDevRealmIndex) stores Kerberos realm parameters per realm, including realm name, PKINIT grace period (15–600 min), TGS grace period (1–600 min), organization name, and exponential back-off timers for unsolicited key management. Rows MUST NOT persist across MTA reboots.
