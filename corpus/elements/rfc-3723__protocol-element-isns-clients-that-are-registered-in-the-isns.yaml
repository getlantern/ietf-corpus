document: rfc-3723
kind: protocol-element
summary: iSNS clients that are registered in the iSNS database MUST maintain at least one Phase 1 and one Phase 2 IPsec security association with the iSNS server. All iSNS protocol messages between clients and server are protected by a Phase 2 SA. The iSNS authentication block (identical in format to the SLP authentication block) MAY be used for broadcast/multicast messages.
section: 2.6.3
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
