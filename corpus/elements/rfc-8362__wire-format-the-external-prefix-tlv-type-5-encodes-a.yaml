document: rfc-8362
kind: wire-format
summary: The External-Prefix TLV (type 5) encodes a single OSPFv3 external prefix with an E-bit, 3-octet Metric, 1-octet PrefixLength, 1-octet PrefixOptions, and variable-length Address Prefix, followed by optional sub-TLVs. The IPv6/IPv4 Forwarding Address and External Route Tag are moved to sub-TLVs (types 1, 2, 3); the unused Referenced LS Type and Referenced Link State ID from the original AS-External-LSA are omitted entirely.
section: "3.6"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
