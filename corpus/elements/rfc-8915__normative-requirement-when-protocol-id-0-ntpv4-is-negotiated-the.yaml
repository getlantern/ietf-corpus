document: rfc-8915
kind: normative-requirement
summary: When Protocol ID 0 (NTPv4) is negotiated, the server MUST send at least one New Cookie for NTPv4 record (type 5) and SHOULD send eight of them. Clients MUST NOT attempt to interpret the opaque cookie body.
section: 4.1.6
rfc2119_level: SHOULD
topics:
    - ntp
