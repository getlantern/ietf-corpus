document: rfc-9094
kind: protocol-element
summary: The 'ietf-wson-topology' YANG module (namespace 'urn:ietf:params:xml:ns:yang:ietf-wson-topology', prefix 'wsont', YANG version 1.1) is a technology-specific augmentation of ietf-te-topology (RFC 8795) for WSON routing and wavelength assignment. It imports ietf-network and ietf-network-topology (RFC 8345), ietf-te-topology (RFC 8795), and ietf-layer0-types (RFC 9093).
