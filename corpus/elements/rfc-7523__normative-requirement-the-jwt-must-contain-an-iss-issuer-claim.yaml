document: rfc-7523
kind: normative-requirement
summary: The JWT MUST contain an 'iss' (issuer) claim with a unique identifier for the issuing entity. Compliant applications MUST compare issuer values using the Simple String Comparison method defined in RFC 3986 Section 6.2.1, absent an application profile specifying otherwise.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - json
