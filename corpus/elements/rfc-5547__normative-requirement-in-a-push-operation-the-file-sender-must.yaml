document: rfc-5547
kind: normative-requirement
summary: In a push operation, the file sender MUST add a 'file-selector' with at least one of 'type', 'size', or 'hash' selectors, a 'file-transfer-id' with a new globally unique value, and a 'sendonly' attribute to the SDP offer.
section: 8.2.1
rfc2119_level: MUST
topics:
