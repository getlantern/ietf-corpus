document: rfc-9520
kind: interoperability-note
summary: This document updates RFC 2308 to require (rather than permit) negative caching for all DNS resolution failure conditions, updates RFC 4035 to require (rather than allow) caching of DNSSEC validation failures, and updates RFC 4697 to expand the anti-requerying prohibition from NS queries at the parent zone to all query types and all ancestor zones.
section: "1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
