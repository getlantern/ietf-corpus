document: rfc-4585
kind: normative-requirement
summary: In the offer/answer model, the answerer MUST remove 'rtcp-fb' attributes it does not understand or support and MUST NOT add or alter feedback parameters. Both offerer and answerer MUST use only the feedback mechanisms negotiated in this exchange.
section: "4.2"
rfc2119_level: MUST
topics:
