document: rfc-4391
kind: wire-format
summary: 'The MGID (Multicast Global Identifier) for IPoIB is 128 bits: 8-bit prefix (0xFF), 4-bit flags (0001), 4-bit scope, 16-bit IPoIB signature, 16-bit P_Key, and 80-bit group ID. IPv4 multicast group IDs use only the lower 28 bits; IPv6 uses the full lower 80 bits.'
section: "4"
topics:
