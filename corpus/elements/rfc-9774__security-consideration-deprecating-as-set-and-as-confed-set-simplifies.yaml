document: rfc-9774
kind: security-consideration
summary: Deprecating AS_SET and AS_CONFED_SET simplifies BGP and reduces the attack surface; removing related code from implementations is beneficial. New BGP security technologies such as RPKI, BGPsec, and ASPA benefit greatly when AS_SETs are not used.
section: "7"
topics:
