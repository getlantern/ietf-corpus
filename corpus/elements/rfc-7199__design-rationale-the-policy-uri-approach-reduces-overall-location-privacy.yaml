document: rfc-7199
kind: design-rationale
summary: 'The policy URI approach reduces overall location privacy risk compared to bare location URIs: the shared secret (policy URI) can stay on the client device and be used to set access controls, whereas without policy URIs, location URIs must be conveyed externally and are subject to server-set defaults.'
section: "7.4"
topics:
    - privacy
    - security
