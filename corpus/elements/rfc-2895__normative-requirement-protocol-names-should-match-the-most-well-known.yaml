document: rfc-2895
kind: normative-requirement
summary: Protocol names SHOULD match the most well-known name or acronym for the indicated protocol. When a well-known name contains characters not allowed in protocol names, they MUST be changed to a dash character ('-').
section: 3.2.4
rfc2119_level: MUST
