document: rfc-9374
kind: normative-requirement
summary: A HI and its DET SHOULD NOT be transferable between UAs or between replacement electronics. The private key for the HI SHOULD be held in a cryptographically secure component to preserve the binding between the UA and its identifier.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - security
    - crypto
