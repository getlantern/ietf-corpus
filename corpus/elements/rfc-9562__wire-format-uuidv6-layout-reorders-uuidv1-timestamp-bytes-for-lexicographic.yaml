document: rfc-9562
kind: wire-format
summary: 'UUIDv6 layout reorders UUIDv1 timestamp bytes for lexicographic sortability: time_high (32-bit most significant timestamp bits, bits 0-31), time_mid (16-bit, bits 32-47), ver=0b0110 (4-bit, bits 48-51), time_low (12-bit least significant timestamp bits, bits 52-63), var=0b10 (2-bit, bits 64-65), clock_seq (14-bit, bits 66-79), node (48-bit, bits 80-127).'
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
