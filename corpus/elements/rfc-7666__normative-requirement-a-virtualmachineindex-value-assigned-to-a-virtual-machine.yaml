document: rfc-7666
kind: normative-requirement
summary: A VirtualMachineIndex value assigned to a virtual machine MUST remain constant at least from one re-initialization of the hypervisor to the next re-initialization. The same stability requirement applies to VirtualMachineCpuIndex, VirtualMachineStorageIndex, and VirtualMachineNetworkIndex.
section: "6.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
