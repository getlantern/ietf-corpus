document: rfc-7743
kind: interoperability-note
summary: 'Traceroute output must be modified: if a Relay Node Address Stack TLV is present, the displayed hop address MUST be the Source Address of Replying Router field from the TLV (the original responder), not the source IP address of the packet carrying the Echo Reply (which may be a relay node).'
section: "4.7"
topics:
    - mpls
