document: rfc-9370
kind: protocol-element
summary: 'Seven new Transform Types are defined for negotiating additional key exchanges: ADDKE1 (type 6) through ADDKE7 (type 12). They share the same Transform ID registry as Transform Type 4 and are used in the SA payload of IKE_SA_INIT or CREATE_CHILD_SA to negotiate key exchanges to be performed in subsequent IKE_INTERMEDIATE or IKE_FOLLOWUP_KE exchanges.'
section: 2.2.1
topics:
