kind: protocol-element
summary: vCardParams (String[String|String[]], optional) is a new JSContact property on any JSContact object that holds vCard parameters for which no IANA-registered JSContact counterpart exists, encoded as a JSON object of parameter name-to-value mappings per RFC 7095 Section 3.3.
