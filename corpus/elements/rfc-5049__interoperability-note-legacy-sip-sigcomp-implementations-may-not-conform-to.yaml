document: rfc-5049
kind: interoperability-note
summary: Legacy SIP/SigComp implementations may not conform to RFC 5049, exhibiting smaller DMS than mandated, lack of NACK support, or different compartment mapping. The rules in this document were designed to maximize interoperability with such legacy deployments.
