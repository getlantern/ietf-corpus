document: rfc-9660
kind: normative-requirement
summary: A name server that understands ZONEVERSION, receives a query with it, is authoritative for one or more enclosing zones of the original QNAME, and chooses to honor the request responds with a ZONEVERSION option in the response OPT RR. Otherwise, the server MUST NOT include a ZONEVERSION option.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
