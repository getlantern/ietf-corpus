document: rfc-4761
kind: state-machine
summary: 'PW Setup on receipt of a VPLS NLRI: (1) check if the receiving PE''s VE ID W is in the advertiser''s remote VE set; (2) if yes, compute demultiplexor label as LB+W-VBO and set up PW to advertiser; (3) check if advertiser''s VE ID V is covered by any previously announced remote VE set; (4) if not, make a new BGP announcement; (5) set up expected ingress label for traffic from advertiser.'
section: 3.2.3
topics:
