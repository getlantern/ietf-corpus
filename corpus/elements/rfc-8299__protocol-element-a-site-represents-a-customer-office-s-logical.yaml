document: rfc-8299
kind: protocol-element
summary: A `site` represents a customer office's logical connection to one or more VPNs. Each site contains a unique `site-id`, `locations`, `devices` (optional CE equipment requests), `management` type (customer-managed, co-managed, provider-managed), `vpn-policies`, `security`, `service`, `routing-protocols`, and one or more `site-network-access` entries defining individual IP logical connections.
section: "6.3"
topics:
