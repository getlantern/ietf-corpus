summary: 'IANA created the ''Geneve Option Class'' registry (16-bit values) under the NVO3 heading. Ranges: 0x0000–0x00FF (IETF Review), 0x0100–0xFEFF (First Come First Served), 0xFF00–0xFFFF (Experimental Use). Each organization owning a class may independently allocate Type values within it.'
