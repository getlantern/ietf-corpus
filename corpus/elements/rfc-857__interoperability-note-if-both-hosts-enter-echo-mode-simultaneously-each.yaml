document: rfc-857
kind: interoperability-note
summary: If both hosts enter echo mode simultaneously — each echoing characters sent by the other — any character transmitted will be echoed back and forth indefinitely. Implementations must ensure that if one side is echoing, the other side does not also enable echoing.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
