document: rfc-9854
kind: normative-requirement
summary: A router MUST discard an RREQ-DIO if the integer part of the advertised Rank equals or exceeds the RankLimit field value, and MUST NOT join an RREQ-Instance if its own computed Rank would equal or exceed RankLimit. A value of 0 in RankLimit means no limit.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
