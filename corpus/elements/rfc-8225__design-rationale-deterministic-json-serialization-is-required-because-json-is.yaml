document: rfc-8225
kind: design-rationale
summary: Deterministic JSON serialization is required because JSON is inherently non-deterministic (arbitrary key ordering and whitespace). PASSporT adopts rules based on JWK Thumbprint (RFC 7638, Section 3 Step 1) to ensure digital signature verification works consistently across implementations.
