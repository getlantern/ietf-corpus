document: rfc-7441
kind: protocol-element
summary: An mLDP FEC Element (as defined in RFC 6388) contains a FEC Type, a Root Node Address, an Opaque Value, and an address family field identifying the address family of the Root Node Address. The FEC Type distinguishes P2MP LSPs from MP2MP LSPs.
