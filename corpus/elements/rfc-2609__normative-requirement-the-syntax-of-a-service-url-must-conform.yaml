document: rfc-2609
kind: normative-requirement
summary: 'The syntax of a service: URL MUST conform to an ''absolute URI'' as defined by RFC 2396. Service type names are case-folded to lower case; ''http'' and ''HTTP'' designate the same service type.'
section: "2.1"
rfc2119_level: MUST
