document: rfc-7530
kind: protocol-element
summary: Client IDs are 64-bit shorthand references to a client-supplied verifier and opaque ID string. They are negotiated via SETCLIENTID/SETCLIENTID_CONFIRM and serve as the basis for all state (opens, locks, delegations) held by a client on the server.
section: 9.1.1
