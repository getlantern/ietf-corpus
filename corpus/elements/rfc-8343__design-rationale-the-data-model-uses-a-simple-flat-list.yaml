document: rfc-8343
kind: design-rationale
summary: The data model uses a simple flat list of interfaces rather than a hierarchical structure, to facilitate mapping to existing proprietary native data models and to make interface references as simple as possible (a single leafref). Interface layering is expressed through read-only 'higher-layer-if' and 'lower-layer-if' leaf-lists rather than a generic configurable hierarchy.
