document: rfc-1655
kind: normative-requirement
summary: BGP implementations should allow an AS to control announcements of BGP-learned routes to adjacent AS's with at least per-network and per-AS granularity. When a new selected route cannot be announced to a particular peer, the local system must explicitly withdraw the previously announced route.
section: "7"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
