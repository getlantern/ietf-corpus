document: rfc-2806
kind: interoperability-note
summary: The phone number notation is taken from RFC 2303 and RFC 2304 (PSTN/FAX address formats for Internet mail), but the separator '/' used in hierarchical URLs is replaced by ';' to avoid conflicts with RFC 2396 URL syntax. The scheme has also been synchronized with RFC 2543 (SIP).
section: "1.1"
topics:
    - sip
