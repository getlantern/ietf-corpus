document: rfc-6590
kind: security-consideration
summary: Digest collisions can cause a report receiver to incorrectly conclude that two pieces of redacted information were originally identical when they were not. This can lead to a denial-of-service effect where unjustified corrective action is taken against an innocent party. Such cases are considered sufficiently unlikely to be of little practical concern.
section: "5.2"
topics:
    - email
    - security
