document: rfc-4567
kind: security-consideration
summary: The security level of the authenticated protocol identifier list is only as strong as the weakest protocol included. An attacker can also 'peel off' all key management attributes, making bidding-down prevention ineffective; local policy must decide whether to abort the session if no security attribute is present in the response.
section: "8"
topics:
