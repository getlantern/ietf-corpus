document: rfc-7672
kind: normative-requirement
summary: If at any stage of CNAME expansion an 'insecure' CNAME record is encountered, then it and all subsequent results (including the final result) MUST be considered 'insecure', regardless of whether earlier CNAME records were 'secure'.
section: 2.1.3
rfc2119_level: MUST
topics:
    - dns
    - email
    - security
