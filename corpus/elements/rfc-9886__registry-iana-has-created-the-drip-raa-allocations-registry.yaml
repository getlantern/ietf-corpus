document: rfc-9886
kind: registry
summary: 'IANA has created the DRIP RAA Allocations registry under the ''Drone Remote ID Protocol'' registry group. It is a 14-bit value space: 0-3 reserved, 4-3999 for ISO 3166-1 countries (IESG Approval), 4000-8191 reserved, 8192-15359 unassigned (First Come First Served), 15360-16383 private use.'
