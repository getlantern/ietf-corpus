kind: wire-format
summary: The ESI Label Extended Community (Type=0x06, Sub-Type=0x01) contains a 1-octet Flags field, 1 octet Reserved, 1 octet Reserved, and a 3-octet ESI Label. The Flags octet encodes the Multihoming Redundancy Mode (bits 0-1) and Split-Horizon Type (bits 6-7).
