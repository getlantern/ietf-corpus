document: rfc-8089
kind: interoperability-note
summary: Some usages have copied Windows file paths with backslash separators directly into file URI path components, producing URIs with unencoded backslashes forbidden by RFC 1738 and RFC 3986. Such URIs may be updated by replacing all backslashes with forward slashes if it can be determined with reasonable certainty they are path separators.
section: E.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
