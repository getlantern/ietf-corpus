document: rfc-2157
kind: normative-requirement
summary: 'In HARPOON encapsulation, all implementations MUST place the MIME-Version: header first in the IA5 body part. Headers placed by MIXER into other parts of the message MUST NOT be placed in the MIME body part.'
section: 3.1.3
rfc2119_level: MUST
