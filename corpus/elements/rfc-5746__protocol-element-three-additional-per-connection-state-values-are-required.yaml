summary: 'Three additional per-connection state values are required: a `secure_renegotiation` boolean flag, `client_verify_data` (the verify_data from the client''s most recent Finished message, 12 bytes for TLS, 36 bytes for SSLv3), and `server_verify_data` (the verify_data from the server''s most recent Finished message).'
