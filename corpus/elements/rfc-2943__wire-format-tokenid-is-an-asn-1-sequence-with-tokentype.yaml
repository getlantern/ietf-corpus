document: rfc-2943
kind: wire-format
summary: 'TokenId is an ASN.1 SEQUENCE with tokenType (INTEGER) and protoVerNo (INTEGER, always 0x0001). TokenType distinguishes message type and authentication mode: MessageBA unilateral=0x0001, mutual=0x0011; MessageAB unilateral=0x0002, mutual=0x0012; MessageBA2 mutual=0x0013.'
