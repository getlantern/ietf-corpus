document: rfc-5595
kind: protocol-element
summary: A DCCP Service Code is a 4-byte (32-bit) value included in DCCP-Request and DCCP-Response packets that identifies the application-level service to which a client wishes to connect. It is carried only in those two packet types (and potentially new packet types), adding no overhead to the data flow.
