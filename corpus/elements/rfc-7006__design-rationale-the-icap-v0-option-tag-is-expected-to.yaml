document: rfc-7006
kind: design-rationale
summary: The 'icap-v0' option tag is expected to typically appear in 'csup' rather than 'creq' because in most cases ignoring the icap attribute still allows a configuration to be chosen based on numbering; mandatory support ('creq') is only needed in scenarios like multilingual offerings where uninformed selection would be harmful.
