document: rfc-9926
kind: normative-requirement
summary: When a 6LN uses an NS or NA message for a prefix registration, it MUST indicate the prefix length in the EARO (in the field that is used for Status in an NA response). This allows the receiver to distinguish a prefix registration from an address registration.
section: "4"
rfc2119_level: MUST
topics:
    - ip
