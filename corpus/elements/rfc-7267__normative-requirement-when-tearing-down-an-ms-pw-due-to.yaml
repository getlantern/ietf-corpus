document: rfc-7267
kind: normative-requirement
summary: When tearing down an MS-PW due to AII reachability change, the unsolicited Label Release messages accompanying the Label Withdraw MUST carry status code 'AII Unreachable'. The teardown procedure at an S-PE triggered by reachability change is OPTIONAL.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
