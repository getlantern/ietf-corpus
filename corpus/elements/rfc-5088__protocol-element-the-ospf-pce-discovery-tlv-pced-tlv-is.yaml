document: rfc-5088
kind: protocol-element
summary: 'The OSPF PCE Discovery TLV (PCED TLV) is carried within the OSPF Router Information LSA and contains a non-ordered set of sub-TLVs. It is assigned type value 6 and uses the same TLV format as Traffic Engineering Extensions to OSPF (RFC 3630): 2-octet type, 2-octet length, variable value, padded to 4-octet alignment.'
