document: rfc-1981
kind: normative-requirement
summary: After receiving a Packet Too Big message, a node MUST attempt to avoid eliciting more such messages and MUST reduce the size of the packets it is sending along the path. The node MUST force the Path MTU Discovery process to end rather than continue sending oversized packets.
section: "4"
rfc2119_level: MUST
topics:
    - ip
