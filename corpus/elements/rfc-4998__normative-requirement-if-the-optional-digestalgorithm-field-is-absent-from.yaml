document: rfc-4998
kind: normative-requirement
summary: If the optional digestAlgorithm field is absent from an ArchiveTimeStamp, the digest algorithm of the embedded timestamp MUST be used for the reduced hash tree. For RFC 3161 timestamps this means the hashAlgorithm of the messageImprint field of TSTInfo.
section: "4.1"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
