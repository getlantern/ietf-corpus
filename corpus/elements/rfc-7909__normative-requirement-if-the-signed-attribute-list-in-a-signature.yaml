document: rfc-7909
kind: normative-requirement
summary: If the signed attribute list in a signature does not include the mandatory minimum set for the object type, the verifier MUST reject the signature and treat the object as a regular, unsigned RPSL object.
section: "2.2"
rfc2119_level: MUST
topics:
