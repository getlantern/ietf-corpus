document: rfc-4997
kind: protocol-element
summary: The uncompressed_value(len, val) encoding method encodes fields whose uncompressed value is known or calculable via an expression. ULENGTH is bound to 'len', UVALUE to 'val', and CLENGTH to 0, so no compressed bits are transmitted; the decompressor reconstructs the field from the known parameters.
section: 4.11.1
extracted_by: claude-sonnet-4-6
