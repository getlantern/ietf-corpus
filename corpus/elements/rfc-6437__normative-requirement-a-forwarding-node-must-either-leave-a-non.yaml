document: rfc-6437
kind: normative-requirement
summary: A forwarding node MUST either leave a non-zero flow label value unchanged or change it only for compelling operational security reasons (covert channel risk). Arbitrary en-route modification is prohibited.
section: "2"
rfc2119_level: MUST
