document: rfc-9323
kind: normative-requirement
summary: The Certification Authority (CA) MUST only sign one RSC with each EE certificate and MUST generate a new key pair for each new RSC. This type of EE certificate is termed a 'one-time-use' EE certificate per RFC 6487 Section 3.
section: "2.1"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
