document: rfc-8551
kind: protocol-element
summary: The SMIMEEncryptionKeyPreference (SMIMEEncryptionKeyPreference attribute, a SignedAttribute) allows a signer to unambiguously identify which of their certificates holds the preferred encryption key, supporting clients that use separate signing and encryption keys. Receiving agents SHOULD store and respect this preference when the signature is valid.
section: 2.5.3
topics:
    - email
    - security
    - pkix
