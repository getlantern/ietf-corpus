document: rfc-1833
kind: normative-requirement
summary: RPCBPROC_SET refuses to establish a mapping if one already exists for the ordered set (r_prog, r_vers, r_netid). Neither r_netid nor r_addr can be NULL, and r_netid should be a valid network identifier on the registering machine.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
    - ip
