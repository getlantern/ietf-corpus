document: rfc-9639
kind: normative-requirement
summary: The blocking strategy bit in frame headers MUST NOT change during the audio stream. Each frame MUST start on a byte boundary and begin with the 15-bit sync code 0b111111111111100.
section: "9.1"
rfc2119_level: MUST NOT
