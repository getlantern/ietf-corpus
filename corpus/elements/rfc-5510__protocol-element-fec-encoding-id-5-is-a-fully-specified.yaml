summary: 'FEC Encoding ID 5 is a Fully-Specified FEC Scheme for the special case of Reed-Solomon codes over GF(2^^8) with no encoding symbol group (G=1). Its FEC Payload ID is a fixed 32-bit field: 24-bit Source Block Number and 8-bit Encoding Symbol ID.'
