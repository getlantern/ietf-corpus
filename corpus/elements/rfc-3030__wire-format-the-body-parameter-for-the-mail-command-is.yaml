summary: 'The BODY parameter for the MAIL command is extended with a new value. Revised ABNF: `body-value ::= "7BIT" / "8BITMIME" / "BINARYMIME"`. The BINARYMIME keyword and value add up to 16 characters to the MAIL FROM command line.'
