document: rfc-3953
kind: security-consideration
summary: All DNS records, including ENUM records, must be considered publicly available to all inquirers. Information in an ENUM record set is open to the public, raising privacy concerns about exposure of presence URIs that may reveal the full name or employer of a target.
section: "6"
topics:
    - security
    - privacy
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
