document: rfc-3175
kind: interoperability-note
summary: In inter-domain scenarios, E2E sessions belonging to the same aggregate may enter or leave the aggregation region at different aggregator/deaggregator interfaces due to policy-based routing. The specification recommends summing each such E2E into its appropriate aggregate even if this causes over-reservation.
section: 1.4.7
topics:
    - ip
    - qos
