document: rfc-9291
kind: interoperability-note
summary: For LAG interfaces, implementations (typically network controllers) should ensure consistency of shared parameters such as LACP system-id across all involved PE nodes, since the L2NM supplies the same parameters to multiple nodes. The L2NM inherits the 'member-link-list' structure from the L2SM including IEEE 802.3ah OAM support per link.
section: 7.6.1
topics:
    - yang
    - vpn
    - netconf
