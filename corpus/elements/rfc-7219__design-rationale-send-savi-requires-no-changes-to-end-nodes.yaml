document: rfc-7219
kind: design-rationale
summary: SEND SAVI requires no changes to end nodes because verification relies entirely on existing SEND messages (DAD_NSOL, DAD_NADV, NUD_NSOL, NUD_NADV). It defines no new protocols or messages, enabling incremental deployment without host or router modifications.
