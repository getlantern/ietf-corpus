document: rfc-6426
kind: normative-requirement
summary: On receipt of the echo response for reverse-path CV, the requesting node MUST perform interface and label-stack validation, and if the Reverse-path Target FEC Stack TLV is present, MUST perform FEC validation. If any validation fails, the echo response MUST be dropped.
section: 3.4.3
rfc2119_level: MUST
topics:
    - mpls
