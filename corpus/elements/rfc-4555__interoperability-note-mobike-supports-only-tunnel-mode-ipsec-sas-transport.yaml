document: rfc-4555
kind: interoperability-note
summary: MOBIKE supports only tunnel-mode IPsec SAs; transport-mode SAs and SCTP-based scenarios are explicitly out of scope. Load balancing (using multiple address pairs simultaneously) is also not supported; only one pair of addresses is active for a given SA at any time.
section: "1.2"
topics:
    - ipsec
    - vpn
