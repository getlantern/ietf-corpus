document: rfc-2275
kind: design-rationale
summary: For securityLevel noAuthNoPriv, all groups are effectively equivalent since authentication of the securityName cannot be assumed. The access table selection algorithm notes this limitation explicitly to alert operators that noAuthNoPriv entries provide weak access guarantees regardless of groupName.
