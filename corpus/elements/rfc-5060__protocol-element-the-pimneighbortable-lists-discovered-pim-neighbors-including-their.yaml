summary: The pimNeighborTable lists discovered PIM neighbors, including their Generation ID, DR Priority, LAN Prune Delay parameters (Propagation_Delay, Override_Interval, T-bit), BIDIR-PIM capability, and State Refresh capability. It is indexed by interface, address type, and neighbor address.
