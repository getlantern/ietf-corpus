document: rfc-1374
kind: wire-format
summary: 'The I-Field (32 bits) in logical address mode contains: Locally Administered (bit 31), Reserved (bits 30–29), Double_Wide (bit 28), Direction (bit 27), Path Selection (bits 26–25), Camp-on (bit 24), Source Address (bits 23–12, unused in logical mode), and Destination Address (bits 11–0) holding the 12-bit Switch Address.'
section: I-Field format
