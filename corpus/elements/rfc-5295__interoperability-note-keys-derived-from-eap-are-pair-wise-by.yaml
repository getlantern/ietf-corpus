document: rfc-5295
kind: interoperability-note
summary: Keys derived from EAP are pair-wise by nature and are not directly suitable for multicast or group usages. They may be used in protocols that distribute group keys, but definition of such group key distribution protocols is outside the scope of this document.
section: "1.1"
topics:
