document: rfc-4761
kind: protocol-element
summary: Label blocks are the signaling primitive for VPLS pseudowire setup. A label block defined by <LB, VBO, VBS> represents labels {LB+VBO, LB+VBO+1, ..., LB+VBO+VBS-1}; each receiving PE computes its unique demultiplexor label by adding its VE ID to the label base.
section: 3.2.1
topics:
