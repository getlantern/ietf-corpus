document: rfc-3546
kind: interoperability-note
summary: When a session is resumed, the server MUST ignore extensions in the client hello and send a server hello with no extensions; the extension functionality negotiated during the original session initiation is applied to the resumed session unchanged.
section: "2.3"
topics:
    - tls
