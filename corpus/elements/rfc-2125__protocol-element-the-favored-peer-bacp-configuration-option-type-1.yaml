document: rfc-2125
kind: protocol-element
summary: The Favored-Peer BACP Configuration Option (type 1) negotiates a 4-octet magic number used to determine which peer is favored when a race condition occurs; the peer transmitting the lower Magic-Number value wins.
section: "4.1"
