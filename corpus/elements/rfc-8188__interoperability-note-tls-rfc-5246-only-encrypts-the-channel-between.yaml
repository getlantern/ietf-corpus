document: rfc-8188
kind: interoperability-note
summary: TLS (RFC 5246) only encrypts the channel between client and server and does not satisfy use cases requiring payload encryption at rest or when replicated across servers. This content coding is complementary to, not a replacement for, transport security.
section: "1"
topics:
