document: rfc-2954
kind: interoperability-note
summary: Version 2 of this MIB updates syntax for DisplayString-typed objects from RFC 1604 to use the SnmpAdminString textual convention to support a greater variety of international character sets. The working group acknowledges this change is not strictly supported by SMIv2.
section: "2.6"
topics:
