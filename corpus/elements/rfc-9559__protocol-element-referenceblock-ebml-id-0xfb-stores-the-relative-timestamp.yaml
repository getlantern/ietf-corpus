document: rfc-9559
kind: protocol-element
summary: ReferenceBlock (EBML ID 0xFB) stores the relative timestamp in Track Ticks of a Block that the current Block depends on for decoding. Multiple ReferenceBlock elements per BlockGroup are permitted for complex inter-frame dependencies. A value of 0 signals unknown dependencies.
section: 5.1.3.5.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
