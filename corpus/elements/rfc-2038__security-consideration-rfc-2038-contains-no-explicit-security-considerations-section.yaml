document: rfc-2038
kind: security-consideration
summary: RFC 2038 contains no explicit Security Considerations section, which was common for 1996-era Standards Track RFCs. The format carries no authentication or integrity protection; implementations should rely on underlying transport-layer or application-layer security mechanisms when integrity or authenticity of MPEG streams is required.
section: "1"
topics:
    - rtp
    - realtime
    - security
