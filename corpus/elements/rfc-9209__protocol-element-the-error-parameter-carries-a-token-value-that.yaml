document: rfc-9209
kind: protocol-element
summary: 'The ''error'' parameter carries a Token value that is a proxy error type, indicating the intermediary encountered an issue obtaining the response. Error types with ''Response only generated by intermediaries: true'' can only appear in responses synthesized by the proxy; ''false'' types may accompany partial origin responses (e.g., appended as a trailer when a forward connection abruptly closes).'
section: 2.1.1
topics:
    - http
extracted_by: claude-sonnet-4-6
