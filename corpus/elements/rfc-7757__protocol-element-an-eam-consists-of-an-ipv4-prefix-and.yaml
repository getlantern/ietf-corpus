document: rfc-7757
kind: protocol-element
summary: An EAM consists of an IPv4 prefix and an IPv6 prefix. If the prefix length is omitted, it defaults to /32 for IPv4 and /128 for IPv6. The IPv4 prefix MUST have an identical or smaller number of suffix bits than its corresponding IPv6 prefix.
section: "3.2"
topics:
