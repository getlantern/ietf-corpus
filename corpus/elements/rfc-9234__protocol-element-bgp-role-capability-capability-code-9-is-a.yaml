document: rfc-9234
kind: protocol-element
summary: BGP Role Capability (Capability Code 9) is a new BGP capability advertised in OPEN messages. It has a Length of 1 octet and a Value field encoding the speaker's role (0=Provider, 1=RS, 2=RS-Client, 3=Customer, 4=Peer, 5-255=Unassigned).
