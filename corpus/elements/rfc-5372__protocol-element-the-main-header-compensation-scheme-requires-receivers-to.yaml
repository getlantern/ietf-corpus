document: rfc-5372
kind: protocol-element
summary: The main header compensation scheme requires receivers to save the last completely received JPEG 2000 main header along with its mh_id and RTP sequence number. If the current frame's mh_id matches the saved value and the header is lost, the saved header may be used for decoding.
section: "4.2"
topics:
