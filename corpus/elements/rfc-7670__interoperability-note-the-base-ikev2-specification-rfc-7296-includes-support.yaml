document: rfc-7670
kind: interoperability-note
summary: The base IKEv2 specification (RFC 7296) includes support for RSA and DSA signatures, but RFC 7427 extended IKEv2 to allow signature methods over any key type. Raw public key users should ensure they negotiate the RFC 7427 Digital Signature method for compatibility with non-RSA/DSA key types.
section: "1"
topics:
