document: rfc-5990
kind: interoperability-note
summary: ANS X9.44 originally specified id-ac-generic-hybrid to identify the RSA-KEM Key Transport Algorithm, whereas this document uses id-rsa-kem. These OIDs are not interchangeable. Legacy implementations wishing to interoperate with ANS X9.44 should consult that specification for details on id-ac-generic-hybrid.
section: "1"
topics:
