document: rfc-3287
kind: normative-requirement
summary: The dsmonAggControlTable, dsmonAggProfileTable, and dsmonAggGroupTable MUST NOT be modified while dsmonAggControlLocked is 'true'. When locked, data collection is active; when unlocked ('false'), all DSMON data table entries are deleted and collection is suspended.
section: "4"
rfc2119_level: MUST NOT
topics:
    - snmp
    - diffserv
