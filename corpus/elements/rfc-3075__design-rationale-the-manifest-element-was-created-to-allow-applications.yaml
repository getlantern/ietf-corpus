document: rfc-3075
kind: design-rationale
summary: The Manifest element was created to allow applications to control which references are validated and what action to take on failure. This addresses use cases where partial validity is meaningful (e.g., some references may fail without invalidating the whole signature) and where multiple signatures share a single large reference list.
section: "2.3"
topics:
    - security
    - crypto
