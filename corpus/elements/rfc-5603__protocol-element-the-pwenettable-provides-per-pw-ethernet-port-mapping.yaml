document: rfc-5603
kind: protocol-element
summary: The pwEnetTable provides per-PW Ethernet port mapping and VLAN configuration. It is indexed by pwIndex (from PW-STD-MIB) and pwEnetPwInstance, allowing multiple VLANs or mappings to exist on the same PW. An entry is automatically created by the agent for every pwTable row with pwType 'ethernet' or 'ethernetTagged'.
