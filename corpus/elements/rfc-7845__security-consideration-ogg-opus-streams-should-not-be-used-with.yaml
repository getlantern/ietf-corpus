document: rfc-7845
kind: security-consideration
summary: Ogg Opus streams SHOULD NOT be used with insecure ciphers or cipher modes vulnerable to known-plaintext attacks, as the Ogg page capture pattern, magic signature fields, and codec data all contain easily predictable values.
