document: rfc-5557
kind: protocol-element
summary: 'The Global Objective Function (GOF) for GCO is specified using the existing OF object (RFC 5541). Three function codes apply to GCO: code 4 (Minimize aggregate Bandwidth Consumption, MBC), code 5 (Minimize load of the Most Loaded Link, MLL), and code 6 (Minimize Cumulative Cost of a set of paths, MCC).'
section: "5.1"
topics:
