document: rfc-8549
kind: design-rationale
summary: BGP community granularity fills a gap between per-IP-address (too fine) and per-ASN (too coarse) traffic analysis, enabling operators to measure and engineer traffic at the level of customer groups, service types, or geographical regions as defined by their BGP community plans.
section: "1"
topics:
    - bgp
    - measurement
