document: rfc-7118
kind: normative-requirement
summary: A SIP element acting as a SIP WebSocket Client is not mandated to implement UDP and TCP, relaxing the RFC 3261 requirement, because some environments do not enable SIP elements to use UDP and TCP as transport protocols.
section: "5.4"
rfc2119_level: MAY
topics:
