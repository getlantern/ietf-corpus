document: rfc-9639
kind: normative-requirement
summary: 'To qualify as a FLAC streamable subset stream: sample rate and bit depth MUST be self-contained in each frame header (not referencing streaminfo); block size MUST NOT exceed 16384 samples (4608 for audio ≤48 kHz); LPC predictor order MUST NOT exceed 12 for audio ≤48 kHz; Rice partition order MUST NOT exceed 8; and channel ordering MUST use only the predefined layouts in Section 9.1.3.'
section: "7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
