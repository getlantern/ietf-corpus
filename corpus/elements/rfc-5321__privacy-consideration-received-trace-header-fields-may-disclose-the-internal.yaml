document: rfc-5321
kind: privacy-consideration
summary: 'Received: trace header fields may disclose the internal topology of a network, the geographic location of users, or details of mail system software. Sites with confidentiality requirements should consider the information disclosed in these fields when configuring their mail infrastructure.'
section: "7.6"
topics:
