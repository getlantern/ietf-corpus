document: rfc-1587
kind: normative-requirement
summary: Two OSPF routers will not form an adjacency unless they agree on the state of the N-bit. The Hello packet processing function must verify that both the N-bit and E-bit in the received Hello match the configured values on the receiving interface.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
