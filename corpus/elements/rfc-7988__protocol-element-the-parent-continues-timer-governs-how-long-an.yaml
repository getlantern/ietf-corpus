document: rfc-7988
kind: protocol-element
summary: The 'parent-continues' timer governs how long an old UMH continues transmitting to a child after the child's Leaf A-D route is withdrawn or its RT changes to identify a new UMH. It SHOULD default to 60 seconds and SHOULD be configurable.
section: "10"
topics:
