kind: protocol-element
summary: rpMauTable is a table of descriptive and status information about MAUs attached to repeater ports, indexed by rpMauGroupIndex, rpMauPortIndex, and rpMauIndex (INTEGER 1..9). Each entry contains type, status, media availability, media availability state exit count, jabber state, and jabber state enter count.
