document: rfc-8577
kind: design-rationale
summary: The shared MPLS forwarding plane couples RSVP-TE control-plane features (bandwidth admission, priorities, preemption, auto-bandwidth, fast reroute) with the simplicity of Segment Routing's MPLS forwarding plane. TE link labels behave identically to SR adjacency segments — pop and forward — eliminating the need to program per-LSP forwarding state at transit hops.
