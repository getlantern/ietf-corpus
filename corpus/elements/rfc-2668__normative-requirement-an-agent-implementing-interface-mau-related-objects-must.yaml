document: rfc-2668
kind: normative-requirement
summary: An agent implementing interface-MAU related objects MUST also implement the relevant groups of the Interface MIB (RFC 2233). The value of ifMauIfIndex must equal the ifIndex used to instantiate the interface to which the MAU is connected.
section: 3.4.1
rfc2119_level: MUST
