document: rfc-6186
kind: normative-requirement
summary: MUAs SHOULD cache the successfully used service details (hostname, port, user identity) and reuse them on subsequent connections. If a subsequent connection or authentication fails, MUAs SHOULD re-try the SRV lookup to refresh cached data.
section: "4"
rfc2119_level: SHOULD
topics:
