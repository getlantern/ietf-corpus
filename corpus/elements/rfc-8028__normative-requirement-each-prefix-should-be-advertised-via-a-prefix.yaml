document: rfc-8028
kind: normative-requirement
summary: Each prefix SHOULD be advertised via a Prefix Information Option (PIO) by one of the attached routers, even if addresses are being assigned using DHCPv6. A router that advertises a prefix indicates that it is able to appropriately route packets with source addresses within that prefix, regardless of the L and A flag settings.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
