document: rfc-1748
kind: protocol-element
summary: dot5ActMonParticipate is a read-write INTEGER (true(1)/false(2)) controlling whether the interface participates in active monitor selection. Changes do not take effect until the next Active Monitor election and possibly not until the interface is next opened. Write access is not required for conformance.
