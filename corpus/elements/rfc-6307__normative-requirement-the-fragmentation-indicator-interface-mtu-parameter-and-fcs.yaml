document: rfc-6307
kind: normative-requirement
summary: The Fragmentation Indicator, Interface MTU Parameter, and FCS Retention Indicator parameters MUST be omitted from the Interface Parameter Sub-TLV for FC pseudowires, as fragmentation is unused, all FC interfaces have the same MTU, and FC CRC treatment differs from RFC 4720.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
