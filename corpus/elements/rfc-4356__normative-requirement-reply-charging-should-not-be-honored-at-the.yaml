document: rfc-4356
kind: normative-requirement
summary: Reply charging SHOULD NOT be honored at the MM3 interface because misapplied reply charging may cause incorrect billing and security issues have not been properly addressed. Messages containing a reply-charging usage request SHOULD be rejected.
section: 2.1.3.2
rfc2119_level: SHOULD NOT
topics:
