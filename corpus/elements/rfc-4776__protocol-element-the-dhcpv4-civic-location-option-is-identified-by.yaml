document: rfc-4776
kind: protocol-element
summary: The DHCPv4 civic location option is identified by option code 99 (GEOCONF_CIVIC). Its format includes a one-octet option code, one-octet length N (minimum 3), a one-octet 'what' field, a two-octet ISO 3166 country code, and zero or more civic address elements.
section: "3.1"
