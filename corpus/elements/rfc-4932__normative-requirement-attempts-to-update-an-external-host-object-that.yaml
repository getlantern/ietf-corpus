document: rfc-4932
kind: normative-requirement
summary: Attempts to update an external host object that has associations with objects sponsored by a different client MUST fail with EPP error code 2305. The workaround is to create a new external host with the new name and update the other objects.
section: 3.2.5
rfc2119_level: MUST
topics:
    - registry
