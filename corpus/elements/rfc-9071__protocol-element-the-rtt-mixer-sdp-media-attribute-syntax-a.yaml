document: rfc-9071
kind: protocol-element
summary: 'The ''rtt-mixer'' SDP media attribute (syntax: ''a=rtt-mixer'') is used at the media level in the ''text'' media section to negotiate and confirm mutual support for the RTP-mixer-based multiparty real-time text method. It takes no value.'
