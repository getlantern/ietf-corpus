document: rfc-5427
kind: interoperability-note
summary: Facility labels are often semantically meaningless because it is impractical to enumerate all possible facilities; many daemons have no explicitly assigned facility code. For improved accuracy, applications should include an APP-NAME structured data element (per RFC 5424) to clarify the originating entity.
section: "3"
topics:
