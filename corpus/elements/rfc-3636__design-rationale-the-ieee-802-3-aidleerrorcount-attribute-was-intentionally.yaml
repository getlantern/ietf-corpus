document: rfc-3636
kind: design-rationale
summary: The IEEE 802.3 aIdleErrorCount attribute was intentionally excluded from this MIB because it is only useful for 100BASE-T2, which is not widely implemented. Similarly, auto-negotiation selector ability objects (aAutoNegLocalSelectorAbility etc.) were excluded because they are only needed for isoethernet (802.9a) support.
section: "3.6"
topics:
