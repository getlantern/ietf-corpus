document: rfc-7438
kind: normative-requirement
summary: An Egress LSR MUST NOT use wildcard encodings when setting up a particular multipoint LSP unless it is known a priori that the Ingress LSR supports the procedures of this document. How this is determined is outside the scope of this document.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
