document: rfc-9559
kind: normative-requirement
summary: In a Hard-Linked Segment, either PrevUUID or NextUUID MUST be present in Info. PrevUUID and NextUUID MUST NOT equal the Segment's own SegmentUUID. The SegmentFamily element MUST be shared by all Segments of a Linked Segment.
section: 5.1.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
