document: rfc-1886
kind: protocol-element
summary: The IP6.INT special domain supports reverse lookups of IPv6 addresses. An IPv6 address is encoded as a sequence of nibbles in reverse order separated by dots with the suffix '.IP6.INT', where each nibble is represented as a hexadecimal digit.
