document: rfc-6242
kind: interoperability-note
summary: The end-of-message framing mechanism is used only for backward compatibility with implementations that do not advertise a base protocol version supporting chunked encoding (i.e., only :base:1.0). When both peers support :base:1.1, chunked framing is used instead.
section: "4.3"
topics:
