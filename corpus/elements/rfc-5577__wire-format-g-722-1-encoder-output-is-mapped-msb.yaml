document: rfc-5577
kind: wire-format
summary: G.722.1 encoder output is mapped MSB-first into RTP octets. At 24 kbit/s, each frame produces 480 bits (60 octets); at 32 kbit/s, 640 bits (80 octets); at 48 kbit/s, 960 bits (120 octets). All three standard rates are inherently octet-aligned.
section: "3.2"
