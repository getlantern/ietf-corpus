document: rfc-5464
kind: protocol-element
summary: Each annotation entry has a hierarchical slash-separated name. The first component MUST be either '/private' (per-user, not visible to others) or '/shared' (shared among authorized users with appropriate access). Vendor-specific entries use /shared/vendor/<vendor-token> or /private/vendor/<vendor-token> prefixes.
section: "3.2"
topics:
