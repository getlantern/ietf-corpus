document: rfc-7188
kind: normative-requirement
summary: An implementation of RFC 6130 that receives a LOCAL_IF, LINK_STATUS, or OTHER_NEIGHB TLV with any TLV Value other than the values defined in RFC 6130 MUST ignore that TLV Value, as well as any corresponding attribute association to the address.
section: 4.3.1
rfc2119_level: MUST
topics:
    - routing
