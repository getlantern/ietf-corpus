document: rfc-5790
kind: normative-requirement
summary: An LW-IGMPv3 host should implement either the IPv4 Basic MSF API or the Protocol-Independent Basic MSF API. An LW-MLDv2 host should implement the Protocol-Independent Basic MSF API. The Advanced MSF APIs (IPv4 Advanced and Protocol-Independent Advanced) are optional.
section: "7.2"
rfc2119_level: OPTIONAL
topics:
    - multicast
    - routing
