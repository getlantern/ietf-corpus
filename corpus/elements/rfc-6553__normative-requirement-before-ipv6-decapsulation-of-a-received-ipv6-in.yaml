document: rfc-6553
kind: normative-requirement
summary: Before IPv6 decapsulation of a received IPv6-in-IPv6 packet, the RPL router MUST process the RPL Option if one exists. After decapsulation, if the router must forward the original packet to another RPL router, it MUST re-encapsulate the packet using IPv6-in-IPv6 tunneling with the RPL Option.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
