document: rfc-5011
kind: security-consideration
summary: Recovery from key compromise is possible as long as at least one valid trust-anchor key remains uncompromised. Zone owners should determine their acceptable number of valid trust anchors and be prepared to implement recovery procedures upon detecting a compromise.
section: "8.2"
topics:
    - dns
    - security
