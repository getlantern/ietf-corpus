document: rfc-2344
kind: interoperability-note
summary: The 'T' bit is placed in a formerly reserved bit of the Registration Request. Foreign and home agents that do not support reverse tunneling and receive a request with the 'T' bit set will return a registration denial; mobile nodes may retry with the 'T' bit cleared. Agents not understanding the T bit in agent advertisements simply ignore it per the base Mobile IP specification.
section: "3.2"
topics:
    - mobility
    - ip
