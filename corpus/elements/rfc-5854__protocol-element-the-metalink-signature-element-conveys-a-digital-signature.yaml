document: rfc-5854
kind: protocol-element
summary: The 'metalink:signature' element conveys a digital signature (e.g., OpenPGP) for a file described in a Metalink Document. It MUST have a 'mediatype' attribute indicating the MIME type of the signature. Support for processing this element in Metalink Processors is OPTIONAL.
section: 4.2.13
topics:
    - security
    - crypto
