document: rfc-8671
kind: protocol-element
summary: When O flag is 1, the Timestamp field in the per-peer header represents the time when the encapsulated routes were advertised (or installed in the Adj-RIB-Out), in seconds and microseconds since the Unix epoch. A value of zero means the time is unavailable.
