document: rfc-3195
kind: normative-requirement
summary: If provisioned for message authentication or replay protection or integrity, implementations SHOULD use SASL mechanism DIGEST-MD5. If provisioned to protect against unauthorized observation, implementations SHOULD use the TLS profile with cipher TLS_RSA_WITH_3DES_EDE_CBC_SHA.
section: "5.1"
rfc2119_level: SHOULD
topics:
