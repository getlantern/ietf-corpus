document: rfc-9234
kind: normative-requirement
summary: The OTC Attribute is considered malformed if its length value is not 4. An UPDATE message with a malformed OTC Attribute SHALL be handled using the 'treat-as-withdraw' approach per RFC 7606.
section: "5"
rfc2119_level: REQUIRED
