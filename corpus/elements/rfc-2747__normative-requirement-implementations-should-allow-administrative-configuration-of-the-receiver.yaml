document: rfc-2747
kind: normative-requirement
summary: Implementations SHOULD allow administrative configuration of the receiver's tolerance to out-of-order message delivery via a reordering window. A received sequence number is valid if it is greater than the maximum seen, or if it lies within the reordering window and has not previously been recorded.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
