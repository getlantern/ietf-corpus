document: rfc-8322
kind: normative-requirement
summary: When rolie:format appears, it MUST provide a 'ns' attribute identifying the data model of the resource referenced by atom:content. The URI used for the ns attribute MUST be absolute, though it need not be resolvable.
section: 6.2.3
rfc2119_level: MUST
