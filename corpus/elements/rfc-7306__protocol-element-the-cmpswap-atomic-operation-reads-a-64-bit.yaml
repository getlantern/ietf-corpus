document: rfc-7306
kind: protocol-element
summary: The CmpSwap Atomic Operation reads a 64-bit value at a 64-bit-aligned ULP Buffer address, ANDs it with a Compare Mask and compares the result to (Compare Data AND Compare Mask). If equal, masked bits are replaced with Swap Data using Swap Mask; otherwise memory is unchanged. The original value is always returned to the Requester.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
