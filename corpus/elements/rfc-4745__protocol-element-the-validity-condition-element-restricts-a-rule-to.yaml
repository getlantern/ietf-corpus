document: rfc-4745
kind: protocol-element
summary: The <validity> condition element restricts a rule to specific time windows expressed as one or more <from>/<until> pairs in XML dateTime format. The condition is TRUE if the current time falls within at least one from/until pair (logical OR across pairs). The PS does not remove expired rules; the rule maker must clean them up.
section: "7.4"
topics:
    - privacy
