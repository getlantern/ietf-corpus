document: rfc-1342
kind: protocol-element
summary: Encoded-words may replace 'text' tokens in Subject or Comments header fields, extension message header fields, user-defined header fields, or RFC 1341 body part header fields whose body contains only 'text'. They may also appear within comments or as replacements for 'word' in a 'phrase'.
section: Use of encoded-words in message headers
topics:
    - email
