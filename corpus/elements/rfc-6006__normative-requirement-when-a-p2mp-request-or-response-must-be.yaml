document: rfc-6006
kind: normative-requirement
summary: When a P2MP request or response must be fragmented across multiple messages, each message except the last MUST have the F-bit set in the RP object. All fragments of a single request/response MUST use the same request ID.
section: "3.13"
rfc2119_level: MUST
topics:
    - mpls
    - routing
