document: rfc-7865
kind: security-consideration
summary: Most recording metadata (participant identities, session timing, communication relationships) is private data. Mutual authentication between SRC and SRS and protection of metadata content must follow RFC 7866 procedures. Metadata in storage must be provided a level of security comparable to that of the recording session itself.
section: "10"
topics:
    - sip
    - security
    - privacy
