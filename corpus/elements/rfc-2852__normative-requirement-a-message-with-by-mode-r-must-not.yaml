document: rfc-2852
kind: normative-requirement
summary: A message with by-mode 'R' MUST NOT be relayed to a SMTP server that does not support the Deliver By extension, and the receiving server MUST NOT have a fixed minimum by-time greater than the remaining delivery window.
section: 4.1.4.1
rfc2119_level: MUST NOT
topics:
    - email
