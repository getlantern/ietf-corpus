document: rfc-3331
kind: registry
summary: IANA assigned SCTP Payload Protocol Identifier value for M2UA (Section 8.1). M2UA-specific parameter tags occupy the range 0x0300-0x03FF (768-784 defined), while common adaptation layer parameters occupy 0x00-0xFF. IETF reserves message class values 11-127; values 128-255 are reserved for IETF-defined extensions.
section: "8.1"
topics:
