document: rfc-5565
kind: design-rationale
summary: The framework terminologically distinguishes I-IP (Internal IP, the transit core protocol) from E-IP (External IP, the client-side protocol). E-IP is IPv4 if and only if I-IP is IPv6, and vice versa, so the two are always complementary.
