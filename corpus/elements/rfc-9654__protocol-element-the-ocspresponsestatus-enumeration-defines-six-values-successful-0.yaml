document: rfc-9654
kind: protocol-element
summary: 'The OCSPResponseStatus enumeration defines six values: successful (0), malformedRequest (1), internalError (2), tryLater (3), sigRequired (5), and unauthorized (6); value 4 is not used. A malformedRequest status MUST be returned when the Nonce length is 0 or greater than 128 octets.'
section: A.1
