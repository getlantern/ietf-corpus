document: rfc-5837
kind: normative-requirement
summary: An ICMP message containing more than one Interface Information Object with the same role, or a duplicate information element within a given role, is considered illegal and MUST be silently discarded on receipt.
section: "4.5"
rfc2119_level: MUST
topics:
