document: rfc-6904
kind: normative-requirement
summary: In a negotiated session, senders MUST NOT send, and answerers MUST NOT negotiate, both encrypted and unencrypted forms of the same header extension element simultaneously. Answerers that understand header extension encryption SHOULD choose the encrypted form and mark the unencrypted form inactive.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
