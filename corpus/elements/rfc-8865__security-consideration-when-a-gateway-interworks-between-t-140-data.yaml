document: rfc-8865
kind: security-consideration
summary: When a gateway interworks between T.140 data channels and RTP-based transport, the T.140 data cannot be encrypted end-to-end between the data channel endpoint and the RTP endpoint, because the gateway requires access to plaintext T.140 data to insert missing text markers and perform other actions.
