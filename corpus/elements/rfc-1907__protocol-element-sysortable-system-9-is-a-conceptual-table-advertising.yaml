document: rfc-1907
kind: protocol-element
summary: sysORTable (system 9) is a conceptual table advertising the MIB module capabilities of the local SNMPv2 agent. Each row (SysOREntry) contains sysORIndex, sysORID (capability OID), sysORDescr (text), and sysORUpTime (TimeStamp of row instantiation). Entities with dynamically-configurable MIB support will have a dynamically-varying number of rows.
section: "2.1"
topics:
