document: rfc-5629
kind: design-rationale
summary: The framework focuses on stimulus signaling rather than functional signaling because stimulus interfaces allow new applications to be built without requiring modifications to user devices or new standards, at the cost of being slower and less user-friendly than functional counterparts. The web is cited as the canonical example of a stimulus interface.
section: "4.1"
topics:
