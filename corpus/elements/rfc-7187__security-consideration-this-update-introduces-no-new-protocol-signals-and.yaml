document: rfc-7187
kind: security-consideration
summary: This update introduces no new protocol signals and does not change processing of any received protocol signals. Eliminating unneeded routers from routing MPR sets also eliminates corresponding TC message information that was unused anyway, so no additional security considerations arise beyond those in RFC 7181.
