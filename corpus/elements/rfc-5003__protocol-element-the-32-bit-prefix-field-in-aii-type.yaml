document: rfc-5003
kind: protocol-element
summary: The 32-bit Prefix field in AII Type 2 is assigned by the provider or can be automatically derived from the PE's /32 IPv4 loopback address. It does not need to have any association with the IPv4 address space used in the provider's IGP or BGP.
section: "3.2"
