document: rfc-4344
kind: security-consideration
summary: Even if the symmetric portion of SSH is implemented exactly as described, applications may still be vulnerable to non-protocol-based attacks (e.g., storing cryptographic keys in cleartext). Proofs of security cover only the symmetric cryptographic portion, not the full application.
section: "6"
topics:
