document: rfc-1516
kind: protocol-element
summary: rptrReset (rptrRptrInfo 4) is a read-write INTEGER {noReset(1), reset(2)}. Setting it to reset(2) triggers a transition to the START state per IEEE 802.3 Fig 9-2, executes a disruptive self-test, and causes an rptrHealth trap; management counters and portAdminStatus are not affected by the reset.
section: "3.2"
topics:
    - snmp
