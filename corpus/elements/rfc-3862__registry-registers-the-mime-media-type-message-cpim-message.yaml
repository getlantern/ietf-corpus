document: rfc-3862
kind: registry
summary: Registers the MIME media type Message/CPIM (message/cpim) with IANA per RFC 2048. The type has no required or optional parameters, is intended for 8-bit clean environments, and uses 'urn:ietf:params:cpim-headers:' as its default namespace URI.
