document: rfc-3077
kind: security-consideration
summary: The tunneling mechanism introduces risk of ARP and IP spoofing because nodes may not be authorized to tunnel packets. This should be countered by authenticating all tunnels, either via the delivery IP protocol (e.g., AH per RFC 2402) or an authentication protocol integrated with the tunneling mechanism.
section: "11"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
