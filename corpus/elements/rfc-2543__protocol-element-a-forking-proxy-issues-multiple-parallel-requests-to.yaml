document: rfc-2543
kind: protocol-element
summary: A forking proxy issues multiple parallel requests to possible user locations upon receiving an INVITE. If one branch returns 2xx or 6xx, the proxy MAY send CANCEL to cancel remaining pending branches. The proxy collects all responses and forwards the best final response to the caller.
section: "12.4"
topics:
    - sip
    - realtime
