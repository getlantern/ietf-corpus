document: rfc-8957
kind: design-rationale
summary: A Synonymous Flow Label (SFL) is defined as a label that causes exactly the same forwarding behavior at the egress LER as the label it replaces, but also triggers one or more additional agreed actions such as packet counting, IPFIX capture, or deep packet inspection. This allows per-flow operations without changing the packet-forwarding system.
section: "3"
topics:
