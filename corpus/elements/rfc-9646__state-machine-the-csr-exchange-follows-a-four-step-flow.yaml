document: rfc-9646
kind: state-machine
summary: 'The CSR exchange follows a four-step flow: (1) SZTP-client sends ''csr-support'' in first RPC; (2) SZTP-server responds with HTTP 400 containing ''csr-request'' structure; (3) SZTP-client sends one of ''p10-csr'', ''cmc-csr'', or ''cmp-csr'' in a second RPC; (4) SZTP-server responds with onboarding information containing the signed identity certificate.'
section: "2.1"
