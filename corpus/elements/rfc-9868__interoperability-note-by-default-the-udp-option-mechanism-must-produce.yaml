document: rfc-9868
kind: interoperability-note
summary: 'By default, the UDP option mechanism must produce identical behavior to that experienced by a legacy receiver: all packets (except fragments) are delivered to the application even when OCS, APC, or authentication fails. Option-aware endpoints change behavior only when explicitly configured by the application or upper-layer protocol.'
section: "6"
topics:
    - udp
extracted_by: claude-sonnet-4-6
