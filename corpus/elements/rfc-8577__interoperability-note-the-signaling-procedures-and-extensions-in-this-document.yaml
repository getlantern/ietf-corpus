document: rfc-8577
kind: interoperability-note
summary: The signaling procedures and extensions in this document do not apply to Point to Multipoint (P2MP) RSVP-TE tunnels. Use of Segment Routed bypass tunnels for facility protection is left for further study; only regular bypass tunnels are addressed for link protection.
