document: rfc-7172
kind: normative-requirement
summary: All TRILL switches MUST check the Ethertype immediately after the Inner.MacSA and, if it is a value they do not know how to handle, either discard the frame or make no decisions based on any data after that Ethertype.
section: "9"
rfc2119_level: MUST
topics:
    - routing
    - security
