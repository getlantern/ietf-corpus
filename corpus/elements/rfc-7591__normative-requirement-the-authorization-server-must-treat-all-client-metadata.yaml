document: rfc-7591
kind: normative-requirement
summary: The authorization server MUST treat all client metadata as self-asserted unless the metadata is contained within a trusted software statement. The server MUST take appropriate steps to mitigate impersonation risks.
section: "5"
rfc2119_level: MUST
topics:
