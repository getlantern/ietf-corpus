document: rfc-9830
kind: design-rationale
summary: The Segment List, SR Policy Candidate Path Name, and SR Policy Name sub-TLVs are assigned code points ≥128 to trigger the 2-octet Length field encoding defined in RFC 9012, because these sub-TLVs may exceed 255 bytes in length due to large numbers of segments or long symbolic names.
section: 2.4.4
topics:
