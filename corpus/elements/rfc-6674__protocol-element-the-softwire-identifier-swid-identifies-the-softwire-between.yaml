document: rfc-6674
kind: protocol-element
summary: The Softwire Identifier (SWID) identifies the softwire between the access gateway and AFTR. The SWID does not need to be globally unique; different SWIDs may identify the same softwire at each end. Its form depends on tunneling technology (e.g., GRE tunnel endpoints or a VPN-ID).
section: "3"
