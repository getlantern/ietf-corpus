document: rfc-9886
kind: security-consideration
summary: Registry-registrar interactions SHOULD follow best common practices for security including DNSSEC operation per BCP 237. A DNSSEC Practice Statement SHOULD be developed and published. Registry SHOULD provide RDAP or equivalent lookup service for public information about registered DETs.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - registry
