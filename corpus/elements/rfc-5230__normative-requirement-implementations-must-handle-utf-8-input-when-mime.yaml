document: rfc-5230
kind: normative-requirement
summary: Implementations MUST handle UTF-8 input. When :mime is used, 8-bit text in MIME headers is not allowed, and implementations SHOULD reject vacation :mime actions that contain 8-bit header material.
section: "5"
rfc2119_level: MUST
topics:
