document: rfc-5059
kind: security-consideration
summary: Implementations SHOULD allow restriction of which IP addresses and group ranges the BSR accepts C-RP-Advertisement messages from, via access lists. This limits the ability of rogue routers to inject unauthorized Candidate-RP entries into the RP-Set.
section: 6.4.1
rfc2119_level: SHOULD
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
