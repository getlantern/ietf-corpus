document: rfc-7655
kind: normative-requirement
summary: In SDP offer/answer negotiation, if the offerer specifies a 'channels' value greater than one and the answerer cannot support it, the answer MUST contain the 'channels' parameter set to the highest value it can support.
section: "5.3"
rfc2119_level: MUST
topics:
