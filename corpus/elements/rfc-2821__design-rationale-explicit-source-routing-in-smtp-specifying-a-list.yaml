document: rfc-2821
kind: design-rationale
summary: Explicit source routing in SMTP (specifying a list of relay hosts in the RCPT TO path) has been deprecated because MX records in DNS make it unnecessary and its historical use caused many problems with interpretation and reliability. Servers SHOULD ignore or strip source route information.
section: "3.7"
topics:
    - email
    - dns
