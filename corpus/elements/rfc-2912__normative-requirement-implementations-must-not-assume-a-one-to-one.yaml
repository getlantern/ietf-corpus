document: rfc-2912
kind: normative-requirement
summary: Implementations must not assume a one-to-one relationship between 'Content-features' headers and contained body parts; headers may appear in different order than body parts, a single header may refer to more than one body part, and several headers may refer to the same body part.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - email
