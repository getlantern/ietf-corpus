document: rfc-8658
kind: wire-format
summary: Softwire46-Rule uses TLV-Type 4 for Basic Mapping Rule (BMR) or TLV-Type 5 for Forwarding Mapping Rule (FMR). It contains sub-attributes Rule-IPv6-Prefix (TLV-Type 10, ipv6prefix), Rule-IPv4-Prefix (TLV-Type 11, ipv4prefix), and EA-Length (TLV-Type 12, 6-octet integer with EA-len in 32 bits).
