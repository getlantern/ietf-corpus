document: rfc-8598
kind: normative-requirement
summary: For each accepted INTERNAL_DNS_DOMAIN in CFG_REPLY, the client MUST use the provided internal DNS servers as the only resolvers for those domains and their subdomains, and MUST NOT attempt to resolve them using external DNS servers.
section: "5"
rfc2119_level: MUST
