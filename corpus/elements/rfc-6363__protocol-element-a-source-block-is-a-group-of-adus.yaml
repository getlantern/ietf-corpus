document: rfc-6363
kind: protocol-element
summary: A Source Block is a group of ADUs that are to be FEC protected as a single block. The FEC Framework handles source flows as a sequence of source blocks, each consisting of an ordered set of ADUs, possibly from multiple source flows, along with each ADU's associated source flow description and length.
