document: rfc-8896
kind: security-consideration
summary: To prevent MITM interception of ALTO Calendars, the ALTO Server SHOULD authenticate Clients and MUST support the 'https' URI scheme. ALTO Clients and Servers SHOULD support both TLS 1.3 (RFC 8446) and TLS 1.2 (RFC 5246) and MAY support newer versions.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - tls
    - http
