document: rfc-9493
kind: design-rationale
summary: The "aliases" format exists for use when a variety of identifiers have been shared with the interpreting party and it is unknown which they will recognize or support. It intentionally allows multiple instances of the same Identifier Format (e.g., two email addresses) but SHOULD NOT contain exact duplicates.
section: 3.2.8
topics:
    - security
