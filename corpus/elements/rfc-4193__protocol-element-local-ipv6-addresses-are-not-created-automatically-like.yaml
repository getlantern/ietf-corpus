document: rfc-4193
kind: protocol-element
summary: Local IPv6 addresses are not created automatically like link-local addresses. They must be explicitly configured via IPv6 stateless address autoconfiguration (SLAAC), DHCPv6, or manual assignment. Routers must advertise Local IPv6 /64 prefixes in Router Advertisements to enable autoconfiguration.
section: "4.6"
topics:
