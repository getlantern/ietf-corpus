document: rfc-6311
kind: protocol-element
summary: The SA Counter Synchronization exchange is an IKEv2 Informational exchange initiated by the newly active cluster member after failover. It carries IKEV2_MESSAGE_ID_SYNC and/or IPSEC_REPLAY_COUNTER_SYNC notifications to re-align IKE Message ID counters and IPsec replay counters with the peer.
section: "5"
topics:
