document: rfc-4807
kind: protocol-element
summary: 'spdTimeFilterTable enables time-based policy activation. Each row logically ANDs five conditions: spdTimeFiltPeriod (date range), spdTimeFiltMonthOfYearMask (12-bit BITS), spdTimeFiltDayOfMonthMask (64-bit octet string), spdTimeFiltDayOfWeekMask (7-bit BITS), and spdTimeFiltTimeOfDayMask (SpdTimePeriod).'
