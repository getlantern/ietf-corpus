document: rfc-2680
kind: design-rationale
summary: The loss threshold ('reasonable period of time') is intentionally vague, defined as a value Th so large that any value in [Th-delta, Th+delta] is an equivalent threshold, where delta encompasses all clock synchronization error. A specific non-huge timeout can be approximated by measuring one-way delay and computing the fraction exceeding that value.
section: "2.6"
topics:
    - measurement
