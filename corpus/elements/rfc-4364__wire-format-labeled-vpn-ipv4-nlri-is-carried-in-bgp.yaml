document: rfc-4364
kind: wire-format
summary: Labeled VPN-IPv4 NLRI is carried in BGP Multiprotocol Extensions with AFI=1 and SAFI=128; the prefix is an 8-byte RD followed by an IPv4 prefix, encoded per the MPLS labeled routes specification. Two BGP speakers must advertise capability code 1 (multiprotocol BGP) with AFI=1/SAFI=128 before exchanging this NLRI.
section: 4.3.4
topics:
