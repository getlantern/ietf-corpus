document: rfc-6437
kind: protocol-element
summary: An example 20-bit hash function for stateless flow label generation is provided in Appendix A, based on von Neumann's algorithm. It operates on the 5-tuple by splitting addresses into 64-bit halves, summing components, applying von Neumann bit-pair extraction, adding port numbers, and shifting. It does not include a predictability-prevention step.
section: A
