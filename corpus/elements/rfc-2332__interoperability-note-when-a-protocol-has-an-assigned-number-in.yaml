document: rfc-2332
kind: interoperability-note
summary: When a protocol has an assigned number in the ar$pro.type space (excluding 0x0080), the short form MUST be used on transmit rather than SNAP encoding. If both Ethertype and NLPID codings exist, the Ethertype coding MUST be used, consistent with RFC 1483. For IP, ar$pro.type=0x0800 is the required encoding.
section: "5.1"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
