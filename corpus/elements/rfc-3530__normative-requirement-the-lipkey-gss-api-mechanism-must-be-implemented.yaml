document: rfc-3530
kind: normative-requirement
summary: The LIPKEY GSS-API mechanism MUST be implemented with OID 1.3.6.1.5.5.9 providing lipkey, lipkey-i, and lipkey-p triples. SPKM-3 MUST also be implemented with OID 1.3.6.1.5.5.1.3 providing spkm3, spkm3i, and spkm3p triples.
