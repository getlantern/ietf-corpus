document: rfc-2916
kind: security-consideration
summary: 'Malicious redirection is a fundamental danger: a malicious entry in a resolver''s database can cause clients to resolve an E.164 number to a wrong URI, potentially retrieving fraudulent or damaging content. Denial of service is also possible by removing the URI to which the E.164 maps.'
section: 3.1.2
topics:
