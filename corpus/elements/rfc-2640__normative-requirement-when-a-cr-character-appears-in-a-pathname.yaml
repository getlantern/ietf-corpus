document: rfc-2640
kind: normative-requirement
summary: When a CR character appears in a pathname it MUST be padded with a NUL character before sending; on receipt the NUL following CR MUST be stripped. This follows the Telnet protocol convention for CR handling.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
