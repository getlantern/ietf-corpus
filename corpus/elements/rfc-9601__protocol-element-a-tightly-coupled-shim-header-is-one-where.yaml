document: rfc-9601
kind: protocol-element
summary: A 'tightly coupled shim header' is one where the shim and outer IP header are always added or removed together as part of the same procedure. Because a shim is not sufficient for packet forwarding on its own, it is generally feasible for implementations handling tightly coupled shims to also propagate the ECN field between inner and outer IP headers.
section: "3.1"
topics:
    - ecn
    - ip
