document: rfc-4788
kind: protocol-element
summary: 'EVRC-B compresses 20ms of 8000Hz 16-bit speech into one of four frame sizes: Rate 1 (171 bits), Rate 1/2 (80 bits), Rate 1/4 (40 bits), or Rate 1/8 (16 bits), plus two zero-bit frame types (null and erasure). The use of 1/4-rate frames distinguishes EVRC-B from EVRC and provides lower average data rates.'
section: "1.1"
topics:
    - realtime
    - rtp
    - voip
