document: rfc-7263
kind: normative-requirement
summary: If the destination peer receives a retransmit with SRR preference on a message it is currently trying to respond to using DRR, the responding peer SHOULD abort the DRR response and use SRR instead.
section: 5.4.1
rfc2119_level: SHOULD
topics:
    - routing
