document: rfc-7902
kind: normative-requirement
summary: A BGP speaker MUST NOT attach more than one 'Additional PMSI Tunnel Attribute Flags' Extended Community to a given BGP UPDATE. If one is already present, no additional such Extended Communities may be attached.
section: "2"
rfc2119_level: MUST NOT
topics:
