document: rfc-3464
kind: interoperability-note
summary: When gatewaying from a foreign system to DSN format, the gateway must attempt to supply Reporting-MTA, Final-Recipient, Action, and Status fields by translating foreign notification elements. The gateway name MUST appear in the DSN-Gateway field, and the original foreign diagnostic code should be preserved in Diagnostic-Code.
section: Appendix B
topics:
    - email
