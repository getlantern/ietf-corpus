document: rfc-7420
kind: protocol-element
summary: The pcePcepEntityAddr and pcePcepEntityAddrType objects specify the local IP address of the PCEP entity. When acting as a PCE server, the entity listens on this address; when acting as a PCC, it binds outgoing TCP connections to this address. An entity can simultaneously act as both PCC and PCE server on the same address.
section: "4.1"
topics:
