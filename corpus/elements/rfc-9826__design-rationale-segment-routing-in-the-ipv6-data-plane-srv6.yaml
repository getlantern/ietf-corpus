summary: Segment Routing in the IPv6 data plane (SRv6) is explicitly out of scope for this document; a separate YANG module (YANG-PCEP-SRv6) is referenced for PCEP-SRv6 management. This keeps the base module focused on MPLS-based SR (RFC 8664).
