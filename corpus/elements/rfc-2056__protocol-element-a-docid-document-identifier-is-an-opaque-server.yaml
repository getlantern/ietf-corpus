document: rfc-2056
kind: protocol-element
summary: A docid (document identifier) is an opaque, server-defined identifier used to effect a known-item search that identifies a single, known database record. It is carried in the URL path after '?' and encoded as a uchar (unreserved or percent-escaped characters).
