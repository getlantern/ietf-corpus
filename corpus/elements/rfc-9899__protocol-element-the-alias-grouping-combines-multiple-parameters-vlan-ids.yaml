kind: protocol-element
summary: The 'alias' grouping combines multiple parameters—VLAN IDs, IP prefixes, port ranges, protocol numbers, FQDNs, and URIs—into a single named object. Aliases are referenced from ACE match criteria via the 'alias-name' leaf-list using the alias-ref typedef.
