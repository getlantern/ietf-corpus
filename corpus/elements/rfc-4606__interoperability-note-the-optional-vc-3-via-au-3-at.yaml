document: rfc-4606
kind: interoperability-note
summary: The optional VC-3 via AU-3 at the end signal type (value 20) addresses LSR implementations that can only demultiplex a VC-3 received in the AU-3 branch, not the TU-3/TUG-3 branch. The penultimate LSR uses this signal type to switch an incoming VC-3 from any branch to the AU-3 branch on the outgoing interface toward the destination.
section: Appendix 1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
