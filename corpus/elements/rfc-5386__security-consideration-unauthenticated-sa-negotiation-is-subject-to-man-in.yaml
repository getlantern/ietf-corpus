document: rfc-5386
kind: security-consideration
summary: Unauthenticated SA negotiation is subject to man-in-the-middle (MITM) attacks. BTNS should be used with care; in environments lacking security infrastructure it may be better than transmitting in the clear, but MITM protection is not inherent.
section: "4"
topics:
