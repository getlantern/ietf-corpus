document: rfc-2446
kind: protocol-element
summary: 'iTIP defines eight scheduling methods: PUBLISH (unsolicited posting), REQUEST (interactive scheduling), REPLY (attendee response), ADD (add instances), CANCEL (cancel instances), REFRESH (request latest version), COUNTER (propose alternate), and DECLINECOUNTER (reject counter). Organizers may send PUBLISH, REQUEST, ADD, CANCEL, and DECLINECOUNTER; Attendees may send REPLY, REFRESH, and COUNTER (plus REQUEST when delegating).'
section: "1.3"
topics:
    - realtime
