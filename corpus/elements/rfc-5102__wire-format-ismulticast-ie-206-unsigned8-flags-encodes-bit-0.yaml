summary: 'isMulticast (IE 206, unsigned8, flags) encodes: Bit 0 = IPv4 multicast (destination in 224.0.0.0–239.255.255.255), Bits 1–2 reserved, Bit 3 = IPv6 T flag, Bits 4–7 = IPv6 multicast scope; all bits zero for unicast destinations.'
