document: rfc-5190
kind: normative-requirement
summary: SNMP Command Responders implementing the MIDCOM-MIB SHOULD use the authPriv security level for all users accessing MIDCOM-MIB managed objects. Given that controlling firewalls and NATs is highly sensitive, this provides both authentication and encryption for MIDCOM traffic.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
