document: rfc-3731
kind: normative-requirement
summary: A domain object SHOULD NOT be deleted if subordinate host objects are associated with it. A server SHOULD notify clients of existing object relationships by sending a 2305 error response when a <delete> fails due to such relationships.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
