document: rfc-4798
kind: interoperability-note
summary: Configuration and operations of the 6PE approach are similar to BGP/MPLS IPv4 VPN (RFC 4364) and IPv6 VPN (RFC 4659) services since all use MP-BGP to distribute non-IPv4 reachability over an IPv4 MPLS core, but 6PE is simpler as it does not involve VRF tables.
