document: rfc-5365
kind: normative-requirement
summary: If the MESSAGE URI-list service includes a URI list in an outgoing MESSAGE request, it MUST include a Content-Disposition header field set to 'recipient-list-history' with a 'handling' parameter set to 'optional'.
