document: rfc-9740
kind: wire-format
summary: In ipv6ExtensionHeadersFull, Destination Options (protocol 60) maps to bit 0 (LSB), Hop-by-Hop Options to bit 1, No Next Header to bit 2, and Routing header to bit 5. Because the most common extension headers occupy the low-order bits, typical Flows can be encoded in one or two octets after dropping leading zeros.
section: "6.1"
topics:
