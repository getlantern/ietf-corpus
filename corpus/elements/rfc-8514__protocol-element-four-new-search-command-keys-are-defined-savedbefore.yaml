document: rfc-8514
kind: protocol-element
summary: 'Four new SEARCH command keys are defined: SAVEDBEFORE <date> (save date earlier than specified date), SAVEDON <date> (save date within specified date), SAVEDSINCE <date> (save date on or after specified date), and SAVEDATESUPPORTED (matches all messages when storage supports save date; matches none when not supported).'
section: "4.3"
topics:
