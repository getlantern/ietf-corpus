document: rfc-4055
kind: protocol-element
summary: RSAES-OAEP-params is encoded as SEQUENCE { hashFunc [0] DEFAULT sha1Identifier, maskGenFunc [1] DEFAULT mgf1SHA1Identifier, pSourceFunc [2] DEFAULT pSpecifiedEmptyIdentifier } with explicit tags. The pSourceFunc identifies the encoding parameters P; implementations MUST represent P using id-pSpecified with an OCTET STRING value.
section: "4.1"
