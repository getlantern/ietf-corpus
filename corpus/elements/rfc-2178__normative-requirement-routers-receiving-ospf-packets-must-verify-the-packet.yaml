document: rfc-2178
kind: normative-requirement
summary: Routers receiving OSPF packets must verify the packet's Area ID matches a configured area interface (or a virtual link endpoint) and that the packet's Router ID does not equal the receiving router's own Router ID; packets failing these checks MUST be discarded.
section: "8.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
