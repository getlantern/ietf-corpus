document: rfc-2287
kind: protocol-element
summary: The sysApplElmtRunTable contains one entry for EVERY process currently running on the host—not just those belonging to identified applications—indexed by sysApplElmtRunInstallPkg, sysApplElmtRunInvocID, and sysApplElmtRunIndex. Resource columns include CPU (TimeTicks, centi-seconds), memory (Gauge32, Kbytes), open file count (Gauge32, excluding sockets), full path, parameters, and user name.
