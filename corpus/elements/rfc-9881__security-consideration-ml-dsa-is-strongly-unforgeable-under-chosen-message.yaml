document: rfc-9881
kind: security-consideration
summary: ML-DSA is strongly unforgeable under chosen message attacks (SUF-CMA), assuming an attacker has access to signatures for no more than 2^64 chosen messages. Security strength levels map to NIST PQC categories 2, 3, and 5 (equivalent to AES-128, AES-192, and AES-256 key search resistance).
