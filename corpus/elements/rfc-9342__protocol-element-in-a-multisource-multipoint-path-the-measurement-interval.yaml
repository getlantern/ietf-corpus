document: rfc-9342
kind: protocol-element
summary: In a multisource multipoint path, the measurement interval is defined by the marking node most aligned with the start of measurement (earliest clock). Egress nodes receive alternately marked packets in random order from different ingress nodes, which must not affect the measurement result.
section: "8"
topics:
