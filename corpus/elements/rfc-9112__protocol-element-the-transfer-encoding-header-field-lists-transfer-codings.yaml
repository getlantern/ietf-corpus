document: rfc-9112
kind: protocol-element
summary: The Transfer-Encoding header field lists transfer codings applied to the content to form the message body (e.g., "gzip, chunked"). It is a property of the message, not the representation, and overrides Content-Length when both are present.
section: "6.1"
topics:
