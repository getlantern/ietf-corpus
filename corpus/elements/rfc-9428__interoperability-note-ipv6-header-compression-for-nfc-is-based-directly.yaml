document: rfc-9428
kind: interoperability-note
summary: IPv6 header compression for NFC is based directly on RFC 6282, which was originally defined for IEEE 802.15.4 networks. RFC 6282 does not define header compression for TCP; TCP can still be carried over IPv6/NFC but without header compression optimization.
section: "4.1"
topics:
