document: rfc-6275
kind: security-consideration
summary: The home agent MUST check that a given home address is associated with the correct security association to prevent a mobile node from sending a Binding Update on behalf of another mobile node sharing the same home agent. The security policy database entries must unequivocally identify a single SA per home address/home agent pair.
section: "5.1"
topics:
    - ipsec
    - security
    - ip
