document: rfc-8422
kind: protocol-element
summary: RFC 8422 defines 18 ECC cipher suites across ECDHE_ECDSA, ECDHE_RSA, and ECDH_anon families, with identifiers in the 0xC0xx range. Recommended cipher suites for server implementations are TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256, TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA, TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256, and TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA.
