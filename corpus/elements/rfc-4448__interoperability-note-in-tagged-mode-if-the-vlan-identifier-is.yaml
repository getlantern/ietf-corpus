document: rfc-4448
kind: interoperability-note
summary: In tagged mode, if the VLAN identifier is modified by the egress PE, the Ethernet spanning tree protocol might fail to work properly. If this is significant, the VLAN identifier MUST be selected to match on the attachment circuits at both ends of the PW.
section: "4.1"
topics:
    - mpls
