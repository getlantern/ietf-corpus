document: rfc-3860
kind: security-consideration
summary: 'The introduction of CPIM gateways creates new risks: end-to-end confidentiality and integrity between IM user agents that communicate through a CPIM gateway can only be guaranteed if both sides support a common IM message format (MSGFMT) secured with S/MIME.'
