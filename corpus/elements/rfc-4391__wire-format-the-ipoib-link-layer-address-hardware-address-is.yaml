document: rfc-4391
kind: wire-format
summary: 'The IPoIB link-layer address (hardware address) is 20 octets: 8 reserved bits (MUST be zero on send), 24-bit Queue Pair Number (QPN), and 128-bit GID. Used in both IPv4 ARP hardware address fields and IPv6 source/target link-layer address options.'
section: 9.1.1
