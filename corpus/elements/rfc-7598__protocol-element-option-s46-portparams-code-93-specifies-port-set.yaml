document: rfc-7598
kind: protocol-element
summary: 'OPTION_S46_PORTPARAMS (code 93) specifies port set information via three fields: 1-octet offset (a-bits, 0–15), 1-octet PSID-len (k-bits), and 2-octet PSID (left-aligned, right-padded). The address-sharing ratio is 2^k.'
