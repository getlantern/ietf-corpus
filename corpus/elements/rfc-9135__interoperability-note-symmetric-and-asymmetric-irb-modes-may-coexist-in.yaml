document: rfc-9135
kind: interoperability-note
summary: Symmetric and asymmetric IRB modes may coexist in the same network. The egress PE signals its desired forwarding mode via the presence of a non-zero Label2 field and an IP-VRF Route Target in the MAC/IP Advertisement route; absence of both indicates asymmetric mode.
section: "4.2"
topics:
    - routing
    - mpls
