document: rfc-9714
kind: protocol-element
summary: 'The TC field of the Flow-ID Label (FL) is repurposed for color-marking: L-bit for packet loss coloring (1=color 1, 0=color 0), D-bit for delay/jitter measurement coloring, and T-bit to distinguish edge-to-edge (T=1) from hop-by-hop (T=0) measurement.'
