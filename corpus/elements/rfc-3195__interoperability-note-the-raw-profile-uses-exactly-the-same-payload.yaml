document: rfc-3195
kind: interoperability-note
summary: The RAW profile uses exactly the same payload format as UDP-based syslog (RFC 3164), enabling legacy syslog processing to be applied without modification. Delivery is reliable because BEEP provides in-order reliable delivery, unlike the UDP transport.
section: "3.1"
topics:
