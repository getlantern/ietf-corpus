document: rfc-3473
kind: normative-requirement
summary: When an intersected Label Set is empty at a node, the Path MUST be terminated and a PathErr with 'Routing problem/Label Set' MUST be generated. The label propagated upstream in a Resv message MUST fall within the Label Set.
section: 2.6.1
rfc2119_level: MUST
topics:
