document: rfc-1583
kind: normative-requirement
summary: The backbone must be contiguous. If the backbone becomes partitioned, the system administrator must restore connectivity by configuring virtual links between backbone routers that share a common non-backbone area.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
