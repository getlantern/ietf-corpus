document: rfc-9639
kind: normative-requirement
summary: All samples encoded to and decoded from the FLAC format MUST be in a signed representation. Unsigned audio must be converted (typically by subtracting half the unsigned range) before encoding.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
