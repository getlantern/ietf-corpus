document: rfc-6572
kind: normative-requirement
summary: On the LMA-to-HAAA interface, the Service-Type attribute MUST be set to value 17 (Authorize Only). A failed PBU authorization MUST cause the LMA to send a PBA with an appropriate error Status Value back to the MAG.
section: "6.1"
rfc2119_level: MUST
topics:
