document: rfc-8852
kind: design-rationale
summary: Existing identifiers (CNAMEs, MSID, payload types) lack the proper ordinality to refer to an individual RTP stream — they can appear in more than one stream simultaneously — and payload type space is inadequate for complex simulcast/layered scenarios, motivating the new RtpStreamId.
