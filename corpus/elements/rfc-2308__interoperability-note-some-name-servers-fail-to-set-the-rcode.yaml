document: rfc-2308
kind: interoperability-note
summary: Some name servers fail to set the RCODE to NXDOMAIN when CNAMEs are present in the answer section. If a definitive NXDOMAIN or NODATA answer is required, the resolver must re-query using the final QNAME.
section: 2.2.1
topics:
