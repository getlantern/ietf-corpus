document: rfc-5295
kind: normative-requirement
summary: It MUST be computationally infeasible to compute the EMSK from any root key derived from it. Any root key MUST be cryptographically separate from any other root key derived from the same EMSK or DSRK.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
