document: rfc-7247
kind: normative-requirement
summary: The mapping of SIP response codes to XMPP error conditions SHOULD follow the table in Section 7.2; for unlisted codes a gateway SHOULD map 3xx to <redirect/>, 4xx to <bad-request/>, 5xx to <internal-server-error/>, and 6xx to <recipient-unavailable/>.
section: "7.2"
rfc2119_level: SHOULD
