document: rfc-5063
kind: normative-requirement
summary: At the end of the Recovery Period, any state installed from RecoveryPath messages that is not resynchronized SHOULD be discarded. Path messages carrying a Recovery_Label that remain unresynchronized MUST be treated as received during the Recovery Period and processed per RFC 3473.
section: 4.5.2.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
