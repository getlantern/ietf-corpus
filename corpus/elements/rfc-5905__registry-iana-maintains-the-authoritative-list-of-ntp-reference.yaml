document: rfc-5905
kind: registry
summary: IANA maintains the authoritative list of NTP Reference Identifiers (four-character ASCII strings identifying stratum-1 reference clock sources, e.g., GPS, PPS, GOES, WWV). ASCII strings beginning with 'X' are reserved for unregistered experimentation. IANA also maintains the NTP kiss code registry (stratum-0 Reference ID values used in KoD packets).
