document: rfc-2261
kind: security-consideration
summary: Security Models within this architecture need not protect against Denial of Service or Traffic Analysis. DoS attacks are often indistinguishable from network failures that any viable management protocol must handle. Traffic patterns in SNMP management are typically predictable, offering no significant advantage to protecting against traffic analysis.
section: "1.4"
topics:
    - snmp
    - security
