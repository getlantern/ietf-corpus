document: rfc-3815
kind: design-rationale
summary: Two separate notifications (mplsLdpSessionUp and mplsLdpSessionDown) were defined rather than a single combined notification because some NMS applications can more easily match a SessionDown event to a prior SessionUp than parse a varbind list in a unified SessionChange notification.
