document: rfc-6788
kind: normative-requirement
summary: When sending a tunneled RA in response to a tunneled RS with an LIO, the Edge Router MUST include a Prefix Information option in the RA containing the prefix that corresponds to the received LIO, and MUST echo back the same LIO value in the outer header.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
