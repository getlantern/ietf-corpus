document: rfc-3728
kind: design-rationale
summary: Profiles are used to simplify provisioning of large numbers of VDSL lines (potentially hundreds or thousands). Most lines share identical configuration; a single profile change propagates to all associated lines simultaneously, avoiding per-line reconfiguration.
