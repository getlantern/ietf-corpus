document: rfc-8638
kind: normative-requirement
summary: When a downstream AFBR wishes to propagate an (S,G,rpt) message upstream, it SHOULD encapsulate the message and send it as a unicast packet to the corresponding upstream AFBR (RP'), since the I-IP core does not process (S,G,rpt) messages.
section: "6.4"
rfc2119_level: SHOULD
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
