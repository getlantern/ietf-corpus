document: rfc-5441
kind: interoperability-note
summary: For inter-AS TE LSP path computation, the BRPC procedure requires knowledge of TE attributes of inter-AS TE links. ASBRs may flood TE information for inter-ASBR links via IGP extensions (RFC 5316 for IS-IS, RFC 5392 for OSPF) even without IGP adjacency over those links.
section: "7"
topics:
    - routing
    - mpls
