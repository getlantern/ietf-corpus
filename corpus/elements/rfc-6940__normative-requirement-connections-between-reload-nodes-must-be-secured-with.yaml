document: rfc-6940
kind: normative-requirement
summary: Connections between RELOAD nodes MUST be secured with TLS or DTLS at the overlay link layer. Each node uses its certificate for peer authentication, forming TLS or DTLS associations with mutual client authentication.
section: "1.3"
rfc2119_level: MUST
topics:
    - tls
    - security
