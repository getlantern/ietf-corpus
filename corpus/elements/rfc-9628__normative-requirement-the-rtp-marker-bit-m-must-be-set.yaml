document: rfc-9628
kind: normative-requirement
summary: The RTP Marker bit (M) MUST be set to one for the final packet of the highest spatial-layer frame (the final packet of the picture); otherwise it is zero. If a stream is rewritten to remove higher spatial layers, M MUST be set to one for the target spatial-layer frame.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
