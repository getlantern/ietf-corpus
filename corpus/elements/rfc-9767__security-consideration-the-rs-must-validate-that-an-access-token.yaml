document: rfc-9767
kind: security-consideration
summary: The RS must validate that an access token is intended for this RS (audience restriction), is presented with the appropriate bound key, identifies an authorized subject, and was issued by a trusted AS. Validating key proofing alone is insufficient; an attacker with a compromised key could otherwise make arbitrary calls.
section: "6.2"
topics:
    - security
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
