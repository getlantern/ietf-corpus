document: rfc-6236
kind: protocol-element
summary: 'The xyrange parameter supports three forms: a bracketed range with optional step ''[lower:step:upper]'', a bracketed list of discrete values ''[v1,v2,...]'', or a single value. The step defaults to 1 if omitted. The rightmost xyvalue MUST be higher than the leftmost.'
section: 3.1.1
topics:
    - realtime
