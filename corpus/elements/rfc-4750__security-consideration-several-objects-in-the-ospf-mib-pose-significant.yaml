document: rfc-4750
kind: security-consideration
summary: Several objects in the OSPF MIB pose significant security risks. In particular, ospfIfAuthType and ospfIfAuthKey can be used to engage in significant attacks against an OSPF router by altering authentication configuration. The use of SNMPv3 with authentication and privacy is strongly recommended for management access.
section: "6"
topics:
    - routing
    - snmp
    - security
