document: rfc-1194
kind: protocol-element
summary: A user information file (commonly called a 'plan' file) is a user-modifiable text file, typically in the user's home directory, whose contents are included in the {U}{C} response. The system administrator SHOULD be able to specifically turn this feature on and off.
section: 2.5.2
extracted_by: claude-sonnet-4-6
