document: rfc-5247
kind: normative-requirement
summary: New lower-layer specifications MUST describe key caching behavior. Unless explicitly specified by the lower layer, the EAP peer, server, and authenticator MUST assume that peers and authenticators do not cache keying material.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
