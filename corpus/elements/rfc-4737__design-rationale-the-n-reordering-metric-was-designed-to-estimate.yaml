document: rfc-4737
kind: design-rationale
summary: The n-reordering metric was designed to estimate whether reordering might cause the TCP DUP-ACK threshold to be exceeded and trigger Fast Retransmit. n=3 corresponds to the default DUP-ACK threshold in RFC 2581 (NewReno TCP), SCTP (RFC 2960), and DCCP with CC-ID 2 (RFC 4341).
section: "5.4"
