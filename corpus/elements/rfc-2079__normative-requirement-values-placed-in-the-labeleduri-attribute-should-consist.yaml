document: rfc-2079
kind: normative-requirement
summary: Values placed in the labeledURI attribute should consist of a URI optionally followed by one or more space characters and a label. At the present time, the URI portion must comply with the URL specification (RFC 1738).
section: Discussion of the labeledURI Attribute Type
rfc2119_level: SHOULD
topics:
    - ldap
