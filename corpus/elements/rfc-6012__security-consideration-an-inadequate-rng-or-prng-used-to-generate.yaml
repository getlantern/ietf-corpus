document: rfc-6012
kind: security-consideration
summary: An inadequate RNG or PRNG used to generate key pairs can result in little or no security. RFC 4086 guidance on random number generation MUST be followed when generating transport sender and receiver key pairs.
section: "9.3"
topics:
    - crypto
    - security
