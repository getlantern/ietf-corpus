document: rfc-9442
kind: normative-requirement
summary: For the Uplink ACK-on-Error fragmentation mode, a Downlink opportunity MUST be indicated by the last fragment of every window, signalled by FCN = All-0 or FCN = All-1. Intermediate SCHC Fragments with FCNs different from All-0 or All-1 MUST NOT use the Downlink request flag to request a SCHC ACK.
section: 3.3.1
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
