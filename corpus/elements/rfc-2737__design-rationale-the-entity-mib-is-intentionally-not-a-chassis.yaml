document: rfc-2737
kind: design-rationale
summary: The Entity MIB is intentionally not a 'Chassis MIB replacement.' An earlier IETF working group attempted a Chassis MIB but reached no consensus, possibly due to overly broad scope. The Entity MIB restricts itself to representing manageable physical and logical components without covering all chassis management functions.
section: "2.5"
topics:
