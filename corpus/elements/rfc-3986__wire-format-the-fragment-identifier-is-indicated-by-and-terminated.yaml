document: rfc-3986
kind: wire-format
summary: 'The fragment identifier is indicated by "#" and terminated by end of URI. ABNF: fragment = *( pchar / "/" / "?" ). Fragment semantics are defined by the media type of the primary resource, not by the URI scheme.'
