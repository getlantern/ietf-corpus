document: rfc-5814
kind: design-rationale
summary: The bidirectional LSP setup delay metric does not account for the ResvConf confirmation message used in three-way signaling because both directions are ready for data transfer when the Resv message is received by the initiating node, making the confirmation superfluous for measuring setup completion.
