document: rfc-7694
kind: normative-requirement
summary: Servers that fail a request due to an unsupported content coding ought to respond with a 415 status and ought to include an 'Accept-Encoding' header field in that response, allowing clients to distinguish content coding problems from media type problems.
section: "3"
rfc2119_level: SHOULD
topics:
    - http
