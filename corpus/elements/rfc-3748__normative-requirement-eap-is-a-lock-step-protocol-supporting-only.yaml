document: rfc-3748
kind: normative-requirement
summary: EAP is a lock-step protocol supporting only a single packet in flight. Other than the initial Request, a new Request MUST NOT be sent prior to receiving a valid Response. After a suitable number of retransmissions, the authenticator SHOULD end the EAP conversation.
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
