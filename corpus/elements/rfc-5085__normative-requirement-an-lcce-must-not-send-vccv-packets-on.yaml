document: rfc-5085
kind: normative-requirement
summary: An LCCE MUST NOT send VCCV packets on an L2TPv3 session unless it has received VCCV capability via the VCCV Capability AVP. If VCCV packets are received without capability exchange, they MUST be discarded.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
