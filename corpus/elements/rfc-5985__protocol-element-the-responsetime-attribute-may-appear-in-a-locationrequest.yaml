document: rfc-5985
kind: protocol-element
summary: The 'responseTime' attribute MAY appear in a locationRequest. Its value is either a non-negative integer in milliseconds or one of the tokens 'emergencyRouting' or 'emergencyDispatch', indicating urgency of the request.
section: "6.1"
