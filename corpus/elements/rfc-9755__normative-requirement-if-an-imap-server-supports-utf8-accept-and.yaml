document: rfc-9755
kind: normative-requirement
summary: If an IMAP server supports UTF8=ACCEPT and the client has not issued 'ENABLE UTF8=ACCEPT', the server MUST reject with a 'NO' response any APPEND command that includes 8-bit characters in message header fields.
section: "4"
rfc2119_level: MUST
topics:
