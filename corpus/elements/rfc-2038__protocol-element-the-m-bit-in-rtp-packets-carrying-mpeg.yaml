document: rfc-2038
kind: protocol-element
summary: The M bit in RTP packets carrying MPEG System/Transport/Program Streams is set to 1 whenever the timestamp is discontinuous (e.g., when a sender switches data sources), allowing receivers and any intervening RTP mixers or translators to ignore the timestamp discontinuity in their clock phase detectors.
section: "2.1"
topics:
    - rtp
    - realtime
