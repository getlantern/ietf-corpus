document: rfc-3733
kind: interoperability-note
summary: XML is case sensitive; all XML specifications and examples in this document MUST be interpreted in the character case presented to develop a conforming implementation. UTF-8 encoding is RECOMMENDED in environments where parser encoding support incompatibility exists.
