document: rfc-3947
kind: normative-requirement
summary: If a NAT is present between hosts, UDP-Encapsulation SHOULD be used; if no NAT is present, UDP-Encapsulation SHOULD NOT be used to avoid wasting bandwidth. The initiator SHOULD NOT propose both normal tunnel/transport and UDP-Encapsulated modes simultaneously.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
    - nat
