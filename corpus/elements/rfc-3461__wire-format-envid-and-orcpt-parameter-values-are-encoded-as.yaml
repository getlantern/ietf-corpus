document: rfc-3461
kind: wire-format
summary: 'ENVID and ORCPT parameter values are encoded as ''xtext'': printable ASCII characters ''!'' (33) through ''~'' (126) except ''+'' and ''='' may appear as-is; all other octets must be encoded as ''+XX'' where XX is two uppercase hexadecimal digits. This allows transmission of values outside the normal esmtp-value character range.'
section: "4"
