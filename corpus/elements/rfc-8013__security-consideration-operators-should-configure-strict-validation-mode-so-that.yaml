document: rfc-8013
kind: security-consideration
summary: Operators SHOULD configure strict validation mode so that all non-protected, invalid, or non-verifiable Ethernet frames MUST be dropped. If an FE is compromised, an entity on that FE can fake or modify inter-FE frames, causing adverse outcomes.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
