document: rfc-8412
kind: protocol-element
summary: 'Event Identifier (EID) and EID Epoch: each a 4-byte unsigned integer. The SWIMA-PC assigns EIDs sequentially within an Epoch to each observed inventory change event. EID value 0 is reserved: in a SWIMA Request it signals an inventory request; in a SWIMA Response it indicates the pre-event baseline state.'
section: 3.7.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
