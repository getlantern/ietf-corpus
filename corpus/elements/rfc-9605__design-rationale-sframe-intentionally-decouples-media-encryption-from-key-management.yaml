document: rfc-9605
kind: design-rationale
summary: SFrame intentionally decouples media encryption from key management (Section 3, Goal 2). Key provisioning, rotation schedules, and KID assignment strategies are left entirely to the application, allowing SFrame to be used with sender-key schemes, MLS, or any future E2E key management system without changes to the SFrame specification.
section: "3"
topics:
    - realtime
    - security
    - crypto
