document: rfc-5173
kind: normative-requirement
summary: Implementations MUST support the "quoted-printable", "base64", "7bit", "8bit", and "binary" content transfer encodings for :content processing. Implementations MUST be capable of converting to UTF-8 the US-ASCII, ISO-8859-1, and the US-ASCII subset of ISO-8859-* character sets.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
