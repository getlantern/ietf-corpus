document: rfc-4033
kind: security-consideration
summary: 'DNSSEC does not protect against denial of service attacks and introduces new cryptographic DoS vectors: attackers can tamper with RRSIG RRs or construct complex signature chains to exhaust resolver resources, or flood a dynamic-update name server with updates to force excessive re-signing.'
