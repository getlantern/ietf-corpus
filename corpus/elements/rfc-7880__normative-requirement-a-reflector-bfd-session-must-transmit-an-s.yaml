document: rfc-7880
kind: normative-requirement
summary: A Reflector BFD session MUST transmit an S-BFD Control packet in response to each received S-BFD Control packet that contains a valid locally allocated S-BFD Discriminator in the Your Discriminator field, unless prohibited by local policy (administrative, security, or rate-limiter).
section: "5"
rfc2119_level: MUST
topics:
    - realtime
