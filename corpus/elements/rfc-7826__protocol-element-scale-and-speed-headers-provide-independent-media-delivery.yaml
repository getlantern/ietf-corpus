document: rfc-7826
kind: protocol-element
summary: Scale and Speed headers provide independent media delivery manipulations. Scale (Section 18.46) adjusts the ratio of content time to playback time (fast-forward, slow-motion, reverse). Speed (Section 18.50) adjusts the ratio of playback time delivered per wallclock time, expressed as a range to allow bandwidth-adaptive delivery.
section: "18.46"
topics:
    - realtime
