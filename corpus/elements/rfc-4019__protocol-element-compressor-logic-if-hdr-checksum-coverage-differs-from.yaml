document: rfc-4019
kind: protocol-element
summary: 'Compressor logic: if hdr(Checksum Coverage) differs from both context(Checksum Coverage) and packet length when CFP=0, or differs from packet length when CFP=0 and CFI is nonzero, the field cannot be compressed and must be sent via a CCE packet or the context must be reinitialized with an IR packet.'
