document: rfc-4553
kind: normative-requirement
summary: SAToP PWs SHOULD be carried across traffic-engineered PSNs providing bandwidth reservation and admission control or forwarding prioritization. SAToP IP packets SHOULD NOT use the DSCP value reserved for the Default Per-Hop Behavior (PHB). If running over best-effort PSN, SAToP SHOULD monitor packet loss and shut down bi-directionally upon detecting severe congestion.
section: "8"
rfc2119_level: SHOULD
topics:
    - realtime
    - diffserv
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
