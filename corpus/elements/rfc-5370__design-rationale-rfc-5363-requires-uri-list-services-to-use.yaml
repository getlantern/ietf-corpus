document: rfc-5370
kind: design-rationale
summary: 'RFC 5363 requires URI-list services to use opt-in lists (e.g., RFC 5360), but transcoders using this model are explicitly exempt: they produce no amplification (only one outgoing INVITE per incoming INVITE), the callee URI is supplied by the caller (not an opaque translation), and the caller''s identity is present in the outgoing INVITE.'
section: "5"
topics:
