document: rfc-4202
kind: protocol-element
summary: 'PSC (Packet-Switch Capable) interfaces (PSC-1 through PSC-4) carry additional ISCD fields: Maximum LSP Bandwidth per priority level, Minimum LSP Bandwidth, and Interface MTU. Maximum LSP Bandwidth is the smaller of the unreserved bandwidth at a given priority and a locally configured Maximum LSP Size, and replaces the static Maximum Link Bandwidth from prior MPLS TE extensions.'
section: 2.4.2
topics:
    - routing
