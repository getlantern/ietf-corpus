document: rfc-3495
kind: normative-requirement
summary: Sub-option 3's type octet MUST be set to 1 to indicate an IPv4 address and MUST be set to 0 to indicate an FQDN. The length MUST be 5 for IPv4 addresses.
section: "5.2"
rfc2119_level: MUST
