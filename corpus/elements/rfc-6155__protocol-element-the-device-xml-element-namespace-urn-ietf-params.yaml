document: rfc-6155
kind: protocol-element
summary: The 'device' XML element (namespace urn:ietf:params:xml:ns:geopriv:held:id) is the container for Device identity information in a HELD locationRequest. A LIS that supports this extension echoes the 'device' element in a successful response to indicate which identifiers were used for location determination; absence of the echo means the source IP address was used.
section: "2.2"
topics:
    - realtime
    - http
