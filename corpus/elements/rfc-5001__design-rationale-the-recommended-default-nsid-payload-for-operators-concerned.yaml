document: rfc-5001
kind: design-rationale
summary: The recommended default NSID payload for operators concerned about disclosing unicast addresses is the raw binary representation of a probabilistically unique random number. Operators unconcerned about disclosure may use the raw binary of a unicast address, but only via explicit configuration.
section: "3.1"
topics:
    - dns
    - privacy
