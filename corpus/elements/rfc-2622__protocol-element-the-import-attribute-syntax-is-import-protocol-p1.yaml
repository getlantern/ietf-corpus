document: rfc-2622
kind: protocol-element
summary: 'The import attribute syntax is: ''import: [protocol <p1>] [into <p2>] from <peering-1> [action <action-1>] ... accept <filter>''. Actions execute left-to-right while importing; pref is the inverse of BGP local-pref (65535 - pref); lower pref integers indicate higher preference.'
section: "6.1"
topics:
