document: rfc-1388
kind: design-rationale
summary: Authentication is implemented by consuming an entire route-entry slot (16 bytes) rather than fitting into the 2-byte header field, because any reasonable authentication scheme requires more than two bytes. This limits authenticated packets to a maximum of 24 route entries.
section: "3.1"
topics:
    - routing
    - security
    - crypto
