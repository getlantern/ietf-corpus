document: rfc-8302
kind: normative-requirement
summary: 'If the ingress RBridge receives a generic ARP/ND/SEND request and does not know the target''s IP address, it MUST take one of: (b.1) flood per RFC 6325, (b.2) pull from a directory server and reply, or (b.3) drop the message if the directory authoritatively indicates the address is nonexistent.'
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
