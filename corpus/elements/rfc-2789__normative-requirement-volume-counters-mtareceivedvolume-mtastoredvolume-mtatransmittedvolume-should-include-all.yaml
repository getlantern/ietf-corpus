document: rfc-2789
kind: normative-requirement
summary: Volume counters (mtaReceivedVolume, mtaStoredVolume, mtaTransmittedVolume) SHOULD include all transferred/stored data logically above the mail transport protocol level; e.g., SMTP MTAs count header+body kilo-octets, X.400 MTAs count P2 data kilo-octets.
section: "4"
rfc2119_level: SHOULD
topics:
