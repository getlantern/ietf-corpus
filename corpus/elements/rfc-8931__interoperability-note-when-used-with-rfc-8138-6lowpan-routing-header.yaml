document: rfc-8931
kind: interoperability-note
summary: When used with RFC 8138 (6LoWPAN Routing Header), consumed hops in a Source Routing Header reduce the first fragment's size en route. Intermediate nodes must adjust Datagram_Size and Fragment_Offset accordingly (Section 4.4), making this specification the required companion to RFC 8138 for fragment forwarding in route-over meshes.
section: "3"
topics:
