document: rfc-6530
kind: normative-requirement
summary: In the interest of interoperability, charsets other than UTF-8 are prohibited in mail addresses and message headers transmitted over the Internet. There is no practical way to identify multiple charsets properly without introducing great complexity.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - email
