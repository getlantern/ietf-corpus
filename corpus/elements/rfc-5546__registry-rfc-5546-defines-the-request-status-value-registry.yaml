document: rfc-5546
kind: registry
summary: 'RFC 5546 defines the REQUEST-STATUS Value Registry for numeric status codes returned in scheduling responses. The registry is structured with hierarchical codes: 1.x (preliminary), 2.x (success), 3.x (client error), 4.x (scheduling error), 5.x (server error). New values require IETF Review.'
section: "7.3"
