document: rfc-5131
kind: design-rationale
summary: A new LangTag TEXTUAL-CONVENTION was created rather than modifying the existing LanguageTag TC from RFC 2932 because it is not possible to apply changes in syntax and length to an existing textual convention. The new TC has a more comprehensive and current syntax description, is short enough to use as an index object without subtyping, and is provided in a dedicated MIB module to simplify module dependencies.
section: "1"
