document: rfc-6353
kind: wire-format
summary: SnmpTLSAddress is an OCTET STRING (SIZE 1..255) encoding an IPv4 address in dotted-decimal:port format, an IPv6 address in [RFC 5952 colon-separated]:port format within square brackets, or a US-ASCII hostname:port. Internationalized hostnames are A-labels per RFC 5890.
