document: rfc-6806
kind: security-consideration
summary: An attacker cannot mount a downgrade attack against the negotiation facility because KDC support is indicated by a ticket flag (enc-pa-rep). However, an attacker can strip the client's indication of support, which the client will detect but the KDC will not learn about.
section: "13"
