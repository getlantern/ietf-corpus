document: rfc-7653
kind: normative-requirement
summary: Every Active Leasequery request MUST be made on a single TCP connection where there is no other request active at the time; parallel Active and Bulk Leasequeries MUST use different TCP connections.
section: "9.4"
rfc2119_level: MUST
topics:
