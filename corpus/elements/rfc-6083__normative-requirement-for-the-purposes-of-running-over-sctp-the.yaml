document: rfc-6083
kind: normative-requirement
summary: For the purposes of running over SCTP, the DTLS path MTU MUST be considered to be 2^14 bytes. This allows DTLS to send maximum-sized messages and offloads fragmentation to SCTP.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - sctp
