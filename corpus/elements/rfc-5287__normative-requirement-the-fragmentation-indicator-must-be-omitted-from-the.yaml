document: rfc-5287
kind: normative-requirement
summary: The Fragmentation Indicator MUST be omitted from the FEC of all TDM PWs except trunk-specific NxDS0 services with CAS using CESoPSN encapsulation, for which it MUST be present if the payload size differs from Nx(frames per trunk multiframe).
section: "3.7"
rfc2119_level: MUST
topics:
