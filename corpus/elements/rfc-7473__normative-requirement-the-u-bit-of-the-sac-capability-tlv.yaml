document: rfc-7473
kind: normative-requirement
summary: The U-bit of the SAC Capability TLV MUST be set to 1 so that a receiver silently ignores the TLV if unknown. The F-bit MUST be set to 0. The S-bit MUST be set to 1 in both Initialization and Capability messages because once advertised this capability cannot be withdrawn.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
