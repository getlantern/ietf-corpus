document: rfc-4164
kind: normative-requirement
summary: The decompressor SHOULD send an ACK when it successfully validates the context as a result of the decompression of one or more IR-CR packets, enabling the compressor to transition to a higher compression state.
section: 3.4.2
rfc2119_level: SHOULD
