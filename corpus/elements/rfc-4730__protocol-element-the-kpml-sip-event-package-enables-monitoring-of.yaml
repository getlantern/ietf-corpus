document: rfc-4730
kind: protocol-element
summary: The 'kpml' SIP Event Package enables monitoring of DTMF key presses using SUBSCRIBE/NOTIFY methods. Applications send application/kpml-request+xml bodies in SUBSCRIBE to specify digit patterns; the User Interface sends application/kpml-response+xml bodies in NOTIFY when digits are collected, timed out, or an error occurs.
section: "2"
topics:
