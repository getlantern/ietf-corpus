document: rfc-7171
kind: normative-requirement
summary: PT-EAP MUST be used inside a TLS-based EAP tunnel method that provides strong cryptographic authentication (possibly server only), message integrity, and confidentiality services. PT-EAP does not itself provide these protections.
section: "2"
rfc2119_level: MUST
topics:
    - tls
    - security
