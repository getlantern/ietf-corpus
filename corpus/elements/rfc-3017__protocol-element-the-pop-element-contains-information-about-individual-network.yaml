document: rfc-3017
kind: protocol-element
summary: The pop element contains information about individual network Points of Presence (POPs). Required child elements are address, media, and the entryVersion attribute; optional elements include minBitsPerSecond, maxBitsPerSecond, popProperty, tunnelProto, dialScript, pricingInformation, location, popSetup, popSupport, and popProvider.
