document: rfc-4607
kind: design-rationale
summary: SSM eliminates the need for shared trees and Rendezvous Points (as used in PIM-SM for ASM), because the sender identity is always known. The router mechanisms for SSM are largely a subset of those used for ASM, reducing protocol complexity.
section: "1"
topics:
    - multicast
    - routing
