document: rfc-5763
kind: security-consideration
summary: When SIPS is used without SIP Identity, security is limited to a chain-of-trust model requiring all proxies to be trusted. If any proxy is compromised, fingerprint integrity is lost and a MITM attack becomes possible.
section: "8.2"
topics:
    - security
    - sip
    - tls
