document: rfc-4930
kind: normative-requirement
summary: A client identifier and initial password MUST be created on the server before a client can log in, and MUST be delivered to the client using an out-of-band method that protects them from inadvertent disclosure.
section: 2.9.1.1
rfc2119_level: MUST
topics:
    - security
