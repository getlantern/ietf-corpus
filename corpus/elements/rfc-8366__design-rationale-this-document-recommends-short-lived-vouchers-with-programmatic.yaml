document: rfc-8366
kind: design-rationale
summary: This document recommends short-lived vouchers with programmatic renewal (reflected in 'last-renewal-date') instead of long-lived vouchers with revocation, because renewal requires only one artifact and one code path, eliminating the risk of pledges skipping revocation checks (e.g., when OCSP is unreachable).
section: "6.1"
topics:
    - pkix
    - security
