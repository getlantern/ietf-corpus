document: rfc-9758
kind: protocol-element
summary: The Default Allocator reserves Node Number 4294967295 (0xFFFFFFFF) for LocalNode ipn URIs, which identify services on the local node rather than any specific remote node. The shorthand '!' MAY be used in text representation instead of the full decimal value.
