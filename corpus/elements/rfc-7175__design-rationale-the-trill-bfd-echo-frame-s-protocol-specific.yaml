document: rfc-7175
kind: design-rationale
summary: The TRILL BFD Echo frame's protocol-specific data area is entirely opaque and left to the originating RBridge's discretion. It is suggested to include System IDs, neighbor System ID, a session identifier, sequence count, and a MAC to allow the originator to authenticate the returned frame and confirm which neighbor echoed it.
section: "4"
topics:
    - routing
    - security
