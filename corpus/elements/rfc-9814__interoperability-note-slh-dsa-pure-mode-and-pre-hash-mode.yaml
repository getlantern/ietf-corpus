document: rfc-9814
kind: interoperability-note
summary: SLH-DSA pure mode and pre-hash mode always yield different signature values, even when signing the same content. Because this document exclusively specifies pure mode, implementations MUST NOT generate or accept pre-hash mode signatures under the OIDs defined here.
section: "1"
topics:
    - crypto
    - security
