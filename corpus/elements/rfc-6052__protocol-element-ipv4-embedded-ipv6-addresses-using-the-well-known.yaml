document: rfc-6052
kind: protocol-element
summary: IPv4-embedded IPv6 addresses using the Well-Known Prefix or a /96 Network-Specific Prefix may be represented in dotted decimal notation per RFC 4291 Section 2.2, e.g., 64:ff9b::192.0.2.33. Other prefix lengths require standard hex notation.
section: "2.4"
