document: rfc-9480
kind: normative-requirement
summary: In a CertResponse to a p10cr message, the certReqId MUST be set to -1 because p10cr contains exactly one CertificationRequestInfo with no certReqId field. This fixes Errata IDs 3949 and 4078.
section: "2.9"
rfc2119_level: MUST
topics:
    - pkix
    - security
