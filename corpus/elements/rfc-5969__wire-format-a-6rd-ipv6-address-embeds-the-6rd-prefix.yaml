summary: A 6rd IPv6 address embeds the 6rd prefix (n bits), a consecutive portion of the CE IPv4 address (o bits), a subnet ID (m bits), and an interface ID (128-n-o-m bits). The 6rd delegated prefix spans the first n+o bits.
