document: rfc-8896
kind: design-rationale
summary: Cost Calendars are applicable to all cost modes—not just 'numerical'—because string values (e.g., 'high', 'low', 'open') and boolean values can also be time-varying. The 'ordinal' mode is also compatible if its values change over time.
