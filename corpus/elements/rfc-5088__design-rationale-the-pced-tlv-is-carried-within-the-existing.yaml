document: rfc-5088
kind: design-rationale
summary: The PCED TLV is carried within the existing OSPF Router Information LSA (RFC 4970) rather than defining a new LSA type. This leverages the generic capability advertisement mechanism already defined for OSPF, reusing its flooding scope controls and procedures.
