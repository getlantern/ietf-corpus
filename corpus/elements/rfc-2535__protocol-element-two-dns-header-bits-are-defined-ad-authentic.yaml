document: rfc-2535
kind: protocol-element
summary: 'Two DNS header bits are defined: AD (Authentic Data, bit 10) indicates in a response that all answer and authority RRs have been authenticated by the server; CD (Checking Disabled, bit 11) indicates in a query that Pending (non-authenticated) data is acceptable to the requesting resolver.'
section: "6.1"
topics:
