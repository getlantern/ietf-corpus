document: rfc-6048
kind: normative-requirement
summary: LIST MODERATORS MUST NOT accept an argument; a 501 response code MUST be returned if an argument is specified. LIST MODERATORS MUST return 503 if the server does not maintain the information.
section: 2.4.2
rfc2119_level: MUST
