document: rfc-6784
kind: security-consideration
summary: DHCPv6 messages can be modified in transit; an adversary may redirect a client to a malicious KDC (a DoS attack). However, a malicious KDC cannot complete the exchange because it does not know the shared key, and the client can detect the mismatch using the shared key.
section: "6"
topics:
    - security
