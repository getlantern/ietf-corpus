document: rfc-2138
kind: security-consideration
summary: The Request Authenticator SHOULD be unpredictable and globally and temporally unique over the lifetime of the shared secret; reuse with the same secret allows an attacker to replay a previously intercepted response or trick a server into responding to a predicted future request and impersonate it.
section: "3"
topics:
    - security
    - crypto
