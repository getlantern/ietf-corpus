document: rfc-5122
kind: design-rationale
summary: Port numbers are prohibited in XMPP IRIs/URIs because XMPP server ports are intended to be discovered via DNS SRV records as specified in XMPP-CORE, making explicit port specification unnecessary and potentially enabling malicious redirection.
section: "5.2"
topics:
    - realtime
    - security
    - dns
