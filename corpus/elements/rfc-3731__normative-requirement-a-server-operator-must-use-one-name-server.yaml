document: rfc-3731
kind: normative-requirement
summary: A server operator MUST use one name server specification form (either host objects or host attributes) consistently. A server that announces support for host objects in an EPP greeting MUST NOT allow domain attributes to describe a name server host machine.
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
