document: rfc-9828
kind: protocol-element
summary: Each RTP packet is either a Main Packet (carrying the JPEG 2000 codestream Extended Header plus optional body data) or a Body Packet (carrying only codestream body data). A Main Packet includes a Main Packet Payload Header; a Body Packet includes a Body Packet Payload Header. Both header types share the MH, TP, PTSTAMP, and ESEQ fields.
section: "5.1"
topics:
    - rtp
    - realtime
