kind: protocol-element
summary: STUN server discovery uses DNS SRV records (RFC 2782) with service name 'stun', protocol 'udp' for Binding Requests or 'tcp' for Shared Secret Requests; if no SRV records are found, an A record lookup is performed against the configured domain name.
