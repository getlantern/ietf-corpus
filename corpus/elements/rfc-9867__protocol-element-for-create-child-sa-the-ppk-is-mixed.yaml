document: rfc-9867
kind: protocol-element
summary: For CREATE_CHILD_SA, the PPK is mixed with the current SK_d to produce SK_d' = prf+(PPK, SK_d). This SK_d' replaces SK_d in all child SA key derivation formulas (RFC 7296 Sections 2.17/2.18 and RFC 9370 Section 2.2.4). The IKE SA's own SK_d is not modified.
section: 3.2.1
topics:
    - ipsec
    - vpn
    - crypto
