document: rfc-7701
kind: normative-requirement
summary: If the MSRP switch receives a SEND request without a Message/CPIM wrapper, it MUST reject the request with a 415 response. If the From header URI is not valid for the sender, it MUST reject with 403.
section: "6.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
