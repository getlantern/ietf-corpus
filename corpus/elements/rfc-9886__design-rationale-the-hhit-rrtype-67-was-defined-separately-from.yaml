document: rfc-9886
kind: design-rationale
summary: The HHIT RRType (67) was defined separately from the existing HIP RRType because the HIP RRType lacks mandatory inclusion of a Canonical Registration Certificate. The certificate provides a registrar-signed confirmation of registration and contains URIs pointing to private information resources.
section: "5.1"
topics:
