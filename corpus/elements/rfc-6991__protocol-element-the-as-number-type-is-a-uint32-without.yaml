document: rfc-6991
kind: protocol-element
summary: The as-number type is a uint32 without range restriction, representing BGP Autonomous System numbers. It uses uint32 (not uint16) to accommodate the 32-bit AS number space introduced by RFC 6793, equivalent to SMIv2 InetAutonomousSystemNumber.
