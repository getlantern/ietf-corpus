document: rfc-1318
kind: design-rationale
summary: The Parallel-printer-like MIB is designed as a physical-layer MIB intended to be stacked beneath higher-level MIBs such as the Character MIB or PPP MIB, mirroring the way the RS-232-like MIB functions, so that physical and logical management concerns are separated.
