document: rfc-8911
kind: normative-requirement
summary: Changes to Registered Performance Metrics may only be made in an interoperable way; changes that cannot maintain interoperability with unchanged implementations MUST result in creation of a new Registered Performance Metric with a new Name (replacing the RFCXXXXsecY portion) and possibly deprecation of the earlier metric.
section: "8.2"
rfc2119_level: MUST
topics:
    - registry
    - measurement
