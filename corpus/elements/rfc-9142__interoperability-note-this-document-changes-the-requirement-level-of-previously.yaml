document: rfc-9142
kind: interoperability-note
summary: 'This document changes the requirement level of previously MTI methods: diffie-hellman-group1-sha1 and diffie-hellman-group14-sha1 both move from MUST to SHOULD NOT and MAY respectively. Implementations relying on these as guaranteed-present methods must be updated.'
