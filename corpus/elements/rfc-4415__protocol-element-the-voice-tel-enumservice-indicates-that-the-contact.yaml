document: rfc-4415
kind: protocol-element
summary: The voice:tel Enumservice indicates that the contact in the generated URI can be used to initiate interactive voice (audio) communication involving bidirectional media streams. The subtype 'tel' implies use of the 'tel:' URI scheme and a dialer subsystem connecting to PSTN or PLMN.
section: "3"
