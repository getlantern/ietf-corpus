document: rfc-9584
kind: normative-requirement
summary: When sprop-sps and/or sprop-pps are conveyed via the RFC 5576 'fmtp' source attribute, the receiver MUST associate those parameter sets with the specific source and MUST use them only to decode NAL units from that same source. SSRC collision detection and resolution MUST be performed per RFC 5576.
section: 7.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
