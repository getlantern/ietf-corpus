summary: The media type 'video/vc2' is defined with required parameters 'rate' (RTP clock rate, SHOULD be 90000) and 'profile' (must be 'HQ'). Optional parameters include 'version' (must be '3' for HQ Fragment streams) and 'level' (any integer).
