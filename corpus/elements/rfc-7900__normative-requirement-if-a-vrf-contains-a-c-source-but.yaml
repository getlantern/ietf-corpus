document: rfc-7900
kind: normative-requirement
summary: If a VRF contains a C-source but no C-RP for the extranet C-group, it MUST import a unicast route matching the C-RP. Conversely, if a VRF contains a C-RP but no C-source, it MUST import a unicast route matching the DR for that C-source.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
