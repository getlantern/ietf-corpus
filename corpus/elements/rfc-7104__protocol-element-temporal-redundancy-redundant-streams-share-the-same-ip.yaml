summary: 'Temporal redundancy: redundant streams share the same IP source and destination addresses (same SSM session), with the duplicate transmitted after a delay (e.g., 50 ms) indicated by the ''duplication-delay'' attribute. Both streams are SSRC-multiplexed and grouped with ''a=ssrc-group:DUP''.'
