document: rfc-6731
kind: design-rationale
summary: Network-interface-specific IP addresses (including NAT64 synthetic AAAA records from RFC 6147 and RFC 6418 scenarios) may only be reachable on the interface over which the name was resolved, making interface-aware RDNSS selection a prerequisite for correct destination reachability rather than a mere optimization.
section: "2.2"
topics:
    - dns
    - nat
    - v6ops
