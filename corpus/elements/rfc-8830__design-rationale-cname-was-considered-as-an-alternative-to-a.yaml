document: rfc-8830
kind: design-rationale
summary: CNAME was considered as an alternative to a new attribute but was rejected because CNAME identifies a synchronization context, and the desired mapping between tracks and MediaStreams does not align with synchronization contexts — tracks from the same SSRC context might be in different MediaStreams, or vice versa.
