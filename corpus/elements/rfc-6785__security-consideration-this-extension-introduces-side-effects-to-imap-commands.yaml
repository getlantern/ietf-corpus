document: rfc-6785
kind: security-consideration
summary: This extension introduces side effects to IMAP commands that users may not anticipate. For example, a 'redirect' action in a global script could cause a user's appended draft message to be sent off-site when the user simply marks it for deletion. Script authors, especially those creating global scripts, must be careful about such unintended consequences.
section: "6"
topics:
    - email
    - security
