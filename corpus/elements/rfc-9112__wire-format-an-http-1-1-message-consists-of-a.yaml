document: rfc-9112
kind: wire-format
summary: 'An HTTP/1.1 message consists of a start-line followed by CRLF, zero or more field-line CRLF pairs, an empty line (CRLF), and an optional message-body. The grammar is: HTTP-message = start-line CRLF *( field-line CRLF ) CRLF [ message-body ].'
section: "2.1"
topics:
