document: rfc-4877
kind: normative-requirement
summary: The mobile node and home agent MUST create security associations based on the home address so that SAs survive changes in care-of address; when using IKEv2, the home address should be carried as the initiator IP address in the TSi payload during CREATE_CHILD_SA exchange.
section: "4.4"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - vpn
