document: rfc-2806
kind: normative-requirement
summary: Any telephone number MUST contain at least one phonedigit or dtmf-digit; subscriber numbers consisting only of pause characters are not valid. Implementations MUST NOT assume a maximum, minimum, or fixed length for telephone numbers.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
