document: rfc-4398
kind: protocol-element
summary: The PKIX type certificate section begins with a one-octet unsigned OID length followed by an X.500 OID indicating the nature of the remainder. Defined OIDs include id-at-userCertificate (0x03 55 04 24), id-at-cACertificate (0x03 55 04 25), id-at-authorityRevocationList (0x03 55 04 26), and id-at-certificateRevocationList (0x03 55 04 27).
section: "2.3"
topics:
    - dns
    - pkix
