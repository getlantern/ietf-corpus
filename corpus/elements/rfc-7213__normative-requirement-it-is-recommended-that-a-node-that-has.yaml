document: rfc-7213
kind: normative-requirement
summary: It is RECOMMENDED that a node that has been reconfigured, rebooted, or reconnected send a GAP Ethernet Interface Parameters message and issue a GAP Request for its peers' Ethernet Interface Parameters at the earliest opportunity, to expedite link initialization.
