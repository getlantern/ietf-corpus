document: rfc-4011
kind: protocol-element
summary: 'The defer() and fail() policy library functions affect execution flow beyond their own script: fail() sets return value to zero and may set the ''defer'' attribute so that a lower-precedence policy in the same precedence group may run on that element, independent of the current script''s return value.'
section: 8.2.11
topics:
