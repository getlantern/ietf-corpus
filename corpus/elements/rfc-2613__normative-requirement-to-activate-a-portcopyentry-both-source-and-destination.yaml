document: rfc-2613
kind: normative-requirement
summary: To activate a portCopyEntry, both source and destination interfaces MUST be present as ifEntries with ifAdminStatus and ifOperStatus equal to up(1). If either value changes after entry activation, portCopyStatus MUST transition to notReady(3).
section: "5"
rfc2119_level: MUST
