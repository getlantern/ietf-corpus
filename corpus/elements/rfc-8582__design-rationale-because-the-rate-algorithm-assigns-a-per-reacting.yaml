document: rfc-8582
kind: design-rationale
summary: Because the rate algorithm assigns a per-reacting-node maximum rate, the reporting node must maintain per-reacting-node state (current allocation). When new reacting nodes join or existing ones fail, the reporting node must recalculate and redistribute the maximum rate across the new set of reacting nodes.
section: "1"
