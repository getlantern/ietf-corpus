document: rfc-3814
kind: protocol-element
summary: mplsFTNTableLastChanged and mplsFTNMapTableLastChanged are TimeStamp scalars indicating when an entry was last added, deleted, or modified in their respective tables. Applications performing table traversals should monitor these objects to detect concurrent modifications and ensure retrieved data validity.
