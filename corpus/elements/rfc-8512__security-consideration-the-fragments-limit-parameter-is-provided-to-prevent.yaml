document: rfc-8512
kind: security-consideration
summary: The fragments-limit parameter is provided to prevent DoS attacks caused by out-of-order IP fragments that exhaust NAT reassembly buffer resources; operators must configure an appropriate bound to limit fragment state maintained per translator.
