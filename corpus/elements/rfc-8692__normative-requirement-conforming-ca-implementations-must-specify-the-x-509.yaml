document: rfc-8692
kind: normative-requirement
summary: Conforming CA implementations MUST specify the X.509 public key algorithm explicitly by using the OIDs specified in Section 3 when encoding ECDSA with SHAKE public keys in certificates and CRLs. Conforming client implementations that process ECDSA with SHAKE public keys MUST recognize the corresponding OIDs.
section: "4.2"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
