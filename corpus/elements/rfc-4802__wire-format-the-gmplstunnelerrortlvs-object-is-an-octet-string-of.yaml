document: rfc-4802
kind: wire-format
summary: The gmplsTunnelErrorTLVs object is an OCTET STRING of SIZE(0..65535) carrying the sequence of interface identifier TLVs reported with a signaling error, as defined in RFC 3473 section 8.2. A zero value in the first octet indicates no TLVs are present.
