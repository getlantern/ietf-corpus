document: rfc-3775
kind: normative-requirement
summary: Home and care-of addresses MUST be unicast routable addresses (global or site-local scope, not link-local). Site-local addresses SHOULD NOT be used due to ambiguity risks when home and visited networks share the same address space.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - mobility
