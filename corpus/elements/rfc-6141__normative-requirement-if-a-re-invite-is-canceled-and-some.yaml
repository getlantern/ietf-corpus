document: rfc-6141
kind: normative-requirement
summary: If a re-INVITE is CANCELed and some of its requested changes had already been executed, the UAS returns a 2xx response per the Section 3.3 rules, rather than the 487 (Request Terminated) response that RFC 3261 specifies at the SHOULD level for CANCELed INVITEs.
section: "3.8"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
