document: rfc-8072
kind: security-consideration
summary: A RESTCONF server SHOULD apply only the fully validated configuration to the underlying system to prevent disruption from incremental edit processing. For example, an edit list that deletes and recreates an interface could cause disruption if applied incrementally.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - yang
    - netconf
