document: rfc-3231
kind: security-consideration
summary: Scheduled SNMP set operations must use the security credentials (securityModel, securityName, securityLevel) that were present when the scheduling entry was created; an implementation must record and maintain these credentials for each entry and apply isAccessAllowed before every invocation.
section: "6"
topics:
