summary: 'The NRI (nal_ref_idc) field in the NAL unit octet indicates relative transport priority for MANEs: value 11 (binary) is highest, 10 and 01 are intermediate, and 00 is lowest (non-reference content that can be discarded without harming reference picture integrity).'
