document: rfc-1883
kind: normative-requirement
summary: IPv6 nodes must accept and attempt to process extension headers in any order and occurring any number of times in the same packet, except for the Hop-by-Hop Options header which is restricted to appear immediately after an IPv6 header only.
section: "4.1"
rfc2119_level: MUST
topics:
