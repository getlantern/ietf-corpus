document: rfc-9930
kind: registry
summary: IANA maintains the TEAP Error TLV Error Codes registry (Section 7.2), the TLS Exporter Labels registry (Section 7.3), EMSK Parameters (Section 7.4), and an update to the EAP registry (Section 7.5). Error codes 1–999 are informative, 1000–1999 are warnings, and 2000–2999 are fatal.
