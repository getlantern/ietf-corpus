document: rfc-4543
kind: wire-format
summary: The Initialization Vector (IV) in ENCR_NULL_AUTH_AES_GMAC is placed at the outset of the ESP Payload field and MUST be eight octets long. For a given key, the IV MUST NOT repeat.
