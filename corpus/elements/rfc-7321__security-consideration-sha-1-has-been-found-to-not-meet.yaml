document: rfc-7321
kind: security-consideration
summary: SHA-1 has been found to not meet its collision resistance goal; however, HMAC-SHA-1 does not rely on collision resistance and is believed to remain secure. MD5's collision resistance is broken, making its use in digital signatures highly discouraged, though HMAC-MD5 has no known practical vulnerability.
section: "4.3"
topics:
