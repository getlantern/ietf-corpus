document: rfc-5555
kind: design-rationale
summary: Dynamic IPv4 home address allocation is signaled by the mobile node placing 0.0.0.0 in the IPv4 Home Address Option; the home agent allocates an address and returns it in the IPv4 Address Acknowledgement Option. The binding lifetime is bound to the minimum of the IPv6 binding lifetime and the IPv4 address lease time.
section: "2.5"
topics:
