document: rfc-2347
kind: security-consideration
summary: The basic TFTP protocol has no security mechanism, which is why it has no rename, delete, or file overwrite capabilities. This option extension document does not add any security to TFTP, nor does it introduce additional security risks beyond those already present in TFTP.
section: Security Considerations
topics:
