summary: 'The mplsLdpSessionTable augments mplsLdpPeerTable and contains negotiated, read-only session parameters: state, role (active/passive/unknown), negotiated protocol version, keepalive hold time remaining, negotiated keepalive time (minimum of both proposals), negotiated max PDU length, and a discontinuity timestamp that changes when a session is replaced by a new one.'
