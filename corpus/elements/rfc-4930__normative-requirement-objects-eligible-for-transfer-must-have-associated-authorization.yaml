document: rfc-4930
kind: normative-requirement
summary: Objects eligible for transfer MUST have associated authorization information that MUST be provided to complete a <transfer> command. Authorization types are object-specific; passwords or public key cryptography are typical.
section: 2.9.3.4
rfc2119_level: MUST
topics:
    - security
