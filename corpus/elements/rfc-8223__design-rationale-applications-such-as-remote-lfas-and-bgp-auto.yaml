document: rfc-8223
kind: design-rationale
summary: Applications such as remote LFAs and BGP auto-discovered pseudowires automatically initiate asymmetric Extended Discovery to any LSR without explicit configuration on the remote LSR. The TAC mechanism was introduced because the responding LSR otherwise has no information about the targeted application to control session acceptance or apply per-application limits.
section: "1"
topics:
