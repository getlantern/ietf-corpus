document: rfc-9855
kind: design-rationale
summary: TI-LFA uses the expected post-convergence path for FRR backup to align with network capacity planning assumptions (traffic redistributed post-failure), reducing the need for operator-configured local policies. This is a non-obvious choice because the post-convergence path may differ from the actual failure scenario.
section: "1"
topics:
