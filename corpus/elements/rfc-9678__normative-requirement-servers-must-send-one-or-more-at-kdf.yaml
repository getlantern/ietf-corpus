document: rfc-9678
kind: normative-requirement
summary: Servers MUST send one or more AT_KDF_FS attributes in the EAP-Request/AKA'-Challenge message, ordered by preference with the most preferred first. Only the most preferred function has a corresponding AT_PUB_ECDHE attribute.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
