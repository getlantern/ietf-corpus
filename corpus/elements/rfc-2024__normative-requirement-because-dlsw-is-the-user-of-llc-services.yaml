document: rfc-2024
kind: normative-requirement
summary: Because DLSw is the user of LLC services, administrative actions such as disconnecting a hung circuit should be performed via dlswCircuitState in the DLSw MIB rather than directly via the LLC MIB (e.g., setting llcCcAdminStatus). The DLSw MIB is the preferred management point.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
