document: rfc-6005
kind: normative-requirement
summary: When the UNI-N is unable to obtain an egress address from the Endpoint ID TLV, it MUST issue an error response Notify message; the Error code and value SHOULD be 'Routing Problem/Unknown Endpoint' (Error code 24, Error value 35).
section: 2.2.1
rfc2119_level: MUST
