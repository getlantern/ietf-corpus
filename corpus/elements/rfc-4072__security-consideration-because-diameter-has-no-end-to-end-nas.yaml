document: rfc-4072
kind: security-consideration
summary: Because Diameter has no end-to-end (NAS-to-home-server) security, any proxy agent processing a DEA can read the EAP-Master-Session-Key. The specification strongly recommends avoiding Diameter agents that cannot be trusted to keep session keys secret.
section: "8.4"
topics:
    - diameter
    - security
    - crypto
