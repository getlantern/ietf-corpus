document: rfc-8610
kind: protocol-element
summary: 'Occurrence indicators precede a group entry: ''?'' (zero or one), ''*'' (zero or more), ''+'' (one or more), or ''n*m'' (between n and m). Without an indicator the entry occurs exactly once. CDDL does not prescribe whether arrays or maps use CBOR definite-length or indefinite-length encoding.'
section: "3.2"
topics:
