document: rfc-7001
kind: security-consideration
summary: Intentionally malformed Authentication-Results header fields (e.g., extraordinarily large values) may be used to discover or exploit weaknesses in header parsing code. Implementers must robustly validate all such header fields received from MTAs.
section: "7.8"
topics:
