document: rfc-7313
kind: registry
summary: 'IANA created the ''BGP Route Refresh Subcodes'' registry under BGP Parameters. Values 0–127 require Standards Action; values 128–254 are First Come First Served. Initial values: 0 = Route-Refresh (RFC 2918/5291), 1 = BoRR (RFC 7313), 2 = EoRR (RFC 7313), 255 = Reserved.'
