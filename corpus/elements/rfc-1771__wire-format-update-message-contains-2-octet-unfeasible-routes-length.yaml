document: rfc-1771
kind: wire-format
summary: 'UPDATE message contains: 2-octet Unfeasible Routes Length, variable Withdrawn Routes (each <1-octet prefix-length, variable prefix>), 2-octet Total Path Attribute Length, variable Path Attributes, and variable NLRI (also <length, prefix> tuples). Minimum length 23 octets. NLRI length is derived: UpdateLen − 23 − TotalPathAttrLen − UnfeasibleRoutesLen.'
section: "4.3"
