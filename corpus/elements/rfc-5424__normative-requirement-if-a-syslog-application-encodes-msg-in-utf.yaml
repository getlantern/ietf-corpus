document: rfc-5424
kind: normative-requirement
summary: If a syslog application encodes MSG in UTF-8, the string MUST start with the Unicode BOM (%xEF.BB.BF). The application MUST encode in the 'shortest form' and MUST NOT interpret messages in the 'non-shortest form'.
section: "6.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
