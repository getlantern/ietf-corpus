document: rfc-8365
kind: wire-format
summary: 'The auto-derived RT for VXLAN/NVGRE uses a 6-byte field: a 2-octet Global Administrator sub-field (AS number) and a 4-octet Local Administrator sub-field encoding a 1-bit auto-derivation flag (A), a 3-bit Type field identifying the VNI space (0=VID, 1=VXLAN, 2=NVGRE, 3=I-SID, 4=EVI, 5=dual-VID), a 4-bit Domain-ID, and a 3-octet Service ID (VNI/VSID).'
section: 5.1.2.1
topics:
    - routing
    - bgp
