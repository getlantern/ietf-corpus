document: rfc-9470
kind: normative-requirement
summary: This document MUST NOT be used to position OAuth as an authentication protocol. The specification treats authentication details as handled by a separate layer (e.g., OpenID Connect) and only uses authentication event information as salient context for authorization decisions.
section: "9"
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
