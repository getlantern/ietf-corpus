document: rfc-8076
kind: normative-requirement
summary: When using a dictionary data model for a Shared Resource, the dictionary key MUST be the Node-ID of the certificate used to sign the stored data, binding data access to the unique ID holder and preventing write concurrency.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
