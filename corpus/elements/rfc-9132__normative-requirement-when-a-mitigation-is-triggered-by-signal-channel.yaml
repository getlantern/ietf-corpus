document: rfc-9132
kind: normative-requirement
summary: When a mitigation is triggered by signal channel loss, the DOTS server MUST NOT treat signal channel recovery as a trigger to stop the mitigation; only an explicit DELETE, lifetime expiry, or successful scrubbing stops it.
section: 4.4.4
rfc2119_level: MUST NOT
topics:
    - security
