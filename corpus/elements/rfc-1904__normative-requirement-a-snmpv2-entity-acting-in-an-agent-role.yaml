document: rfc-1904
kind: normative-requirement
summary: A SNMPv2 entity acting in an agent role must never return a value for objects it does not implement; it must always return the appropriate exception or error (e.g., noSuchObject). Returning a fabricated value for an unimplemented object is prohibited.
section: "3"
rfc2119_level: MUST NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
