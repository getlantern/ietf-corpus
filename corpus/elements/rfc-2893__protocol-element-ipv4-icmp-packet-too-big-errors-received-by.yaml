document: rfc-2893
kind: protocol-element
summary: IPv4 ICMP 'packet too big' errors received by the encapsulating node are processed per IPv4 Path MTU Discovery; the resulting path MTU is recorded and used by the IPv6 layer. Other ICMP error types MAY be used to generate IPv6 ICMP errors back to the originating IPv6 node if sufficient encapsulated header data is present.
section: "3.4"
topics:
    - ip
    - v6ops
