summary: 'SLPv2 for IPv6 uses three multicast group-id assignments: FF0X::116 (SVRLOC) for Service Type and Attribute Requests, FF0X::123 (SVRLOC-DA) for DA discovery, and FF0X::1:1000–FF0X::1:13FF (Service Location range) for all other multicast Service Requests.'
