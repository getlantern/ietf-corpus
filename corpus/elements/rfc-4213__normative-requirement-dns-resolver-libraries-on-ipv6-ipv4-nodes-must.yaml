document: rfc-4213
kind: normative-requirement
summary: DNS resolver libraries on IPv6/IPv4 nodes MUST be capable of handling both AAAA and A records. If an application has not specified a preference, or has requested both, the resolver library MUST NOT filter out any records.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
