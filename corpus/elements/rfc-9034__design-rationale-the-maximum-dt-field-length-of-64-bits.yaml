document: rfc-9034
kind: design-rationale
summary: The maximum DT field length of 64 bits (DTL=15) is sufficient to represent the full NTP 64-bit timestamp format, giving a maximum epoch of roughly 136 years at 2^-32 second resolution when TU=seconds, which is more than adequate for deadline-time purposes in LLN deployments.
