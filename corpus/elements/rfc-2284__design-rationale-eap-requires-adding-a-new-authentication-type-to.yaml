document: rfc-2284
kind: design-rationale
summary: EAP requires adding a new authentication type to LCP, meaning existing PPP implementations must be modified to use it. This strays from the previous PPP model of negotiating a specific authentication mechanism during LCP, which was a recognized disadvantage accepted in exchange for extensibility.
section: "2"
topics:
    - security
