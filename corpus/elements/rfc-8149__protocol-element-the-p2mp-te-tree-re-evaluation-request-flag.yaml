document: rfc-8149
kind: protocol-element
summary: The 'P2MP-TE Tree Re-evaluation Request' flag is defined as bit number 14 in the Attribute Flags TLV of the LSP_ATTRIBUTES object. It is set by the ingress node in a Path message to trigger tree re-evaluation at midpoint LSRs that expand loose next hops.
section: "5.1"
topics:
