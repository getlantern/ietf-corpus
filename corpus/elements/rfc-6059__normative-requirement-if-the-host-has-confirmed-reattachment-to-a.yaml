document: rfc-6059
kind: normative-requirement
summary: If the host has confirmed reattachment to a previously visited link via NS/NA, it SHOULD NOT perform Duplicate Address Detection on addresses confirmed as operable. If NS probing fails or RS probing returns different prefixes than those in the SDAT, the host MUST begin fresh address configuration as indicated by the received RA.
section: "5.8"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
