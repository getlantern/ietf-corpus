document: rfc-8194
kind: protocol-element
summary: The /lmap/suppressions subtree allows a Controller to define Suppression objects that temporarily disable Schedules or Actions whose suppression-tags match a glob-pattern. The stop-running boolean controls whether already-running Schedules/Actions are terminated when Suppression activates.
section: "4.2"
