document: rfc-5044
kind: wire-format
summary: The Marker format is a 4-octet field consisting of a 16-bit RESERVED field (must be zero on transmit) and a 16-bit FPDUPTR (FPDU Pointer) unsigned integer. FPDUPTR indicates the number of octets in the TCP stream from the start of the preceding ULPDU Length field to the first octet of the Marker; its two least-significant bits MUST always be treated as zero.
section: "4.2"
topics:
    - tcp
