document: rfc-4998
kind: wire-format
summary: For Hash-Tree Renewal, each renewed leaf hash is h(i)' = H(h(i) || ha(i)), where h(i) = H(data object) under new algorithm H and ha(i) = H(DER-encoded ArchiveTimeStampSequence of all previous chains for that data object). ArchiveTimeStampChains must be DER-encoded (including sequence and length tags) for this computation.
section: "5.2"
