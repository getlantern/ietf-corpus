document: rfc-9343
kind: design-rationale
summary: 'FlowMonID is defined as 20 bits as a good compromise: it provides a low collision rate acceptable for most deployments and can be disambiguated by combining it with source and destination addresses. Reusing the IPv6 Flow Label was rejected because it may change en route and alters application forwarding intent.'
section: "5.3"
topics:
