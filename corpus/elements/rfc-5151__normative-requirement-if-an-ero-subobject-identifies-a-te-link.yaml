document: rfc-5151
kind: normative-requirement
summary: If an ERO subobject identifies a TE link formed by the advertisement of an H-LSP or LSP segment, contiguous signaling MUST NOT be used; the domain border node MUST use either nesting or stitching according to LSP capabilities, Path message parameters, and local policy.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
