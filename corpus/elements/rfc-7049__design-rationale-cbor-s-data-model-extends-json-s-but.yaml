document: rfc-7049
kind: design-rationale
summary: CBOR's data model extends JSON's but is a separate encoding rather than an extension of RFC 4627 grammar, deliberately avoiding backwards incompatibility with deployed JSON documents. The design adds binary byte strings and tags to JSON's core types.
section: "1"
