document: rfc-2332
kind: protocol-element
summary: 'The NHRP Resolution Reply (type code 2) CIE Code field carries NAK codes: 4 (Administratively Prohibited), 5 (Insufficient Resources), 12 (No binding exists), 13 (Binding exists but uniqueness bit not set). A zero code indicates a positively acknowledged reply; a NAK reply MUST NOT contain any other CIE.'
