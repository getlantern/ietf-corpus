document: rfc-4387
kind: security-consideration
summary: 'HTTP caching proxies may return out-of-date certificates or CRLs if misconfigured. Clients and servers should use ''Cache-Control: no-cache'' (or ''Pragma: no-cache'' for HTTP 1.0) to prevent stale responses.'
