document: rfc-5447
kind: normative-requirement
summary: If both the MIP-Home-Agent-Address and MIP-Home-Agent-Host AVPs are present in the MIP6-Agent-Info, the MIP-Home-Agent-Address SHOULD have precedence over the MIP-Home-Agent-Host because it points to a specific home agent whereas MIP-Home-Agent-Host may identify a group.
section: 4.2.1
rfc2119_level: SHOULD
topics:
    - diameter
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
