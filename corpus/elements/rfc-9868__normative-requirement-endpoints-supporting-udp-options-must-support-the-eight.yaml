document: rfc-9868
kind: normative-requirement
summary: 'Endpoints supporting UDP Options MUST support the eight ''must-support'' options: EOL (Kind=0), NOP (Kind=1), APC (Kind=2), FRAG (Kind=3), MDS (Kind=4), MRDS (Kind=5), REQ (Kind=6), and RES (Kind=7). This includes both recognizing and being able to generate each option when configured to do so. New options are not eligible for must-support designation.'
section: "10"
rfc2119_level: MUST
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
