document: rfc-9665
kind: normative-requirement
summary: An SRP Update MUST contain exactly one Host Description Instruction, MUST include an EDNS(0) Update Lease option, and the LEASE time MUST be less than or equal to KEY-LEASE. Any DNS Update message containing prerequisites or unrecognized add/delete records is not an SRP Update.
section: 3.3.2
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
