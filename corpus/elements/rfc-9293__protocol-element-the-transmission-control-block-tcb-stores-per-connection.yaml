document: rfc-9293
kind: protocol-element
summary: 'The Transmission Control Block (TCB) stores per-connection state including local/remote IP addresses and ports, send/receive buffer pointers, and key sequence variables: SND.UNA (oldest unacknowledged), SND.NXT (next to send), SND.WND (send window), RCV.NXT (next expected), RCV.WND (receive window), ISS, and IRS.'
