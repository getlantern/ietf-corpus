document: rfc-5129
kind: normative-requirement
summary: An operator MUST NOT enable ECN unless all egress routers in the domain are ECN-capable, because legacy egress routers cannot correctly perform the per-domain ECT checking required by this specification.
section: "8.2"
rfc2119_level: MUST NOT
topics:
