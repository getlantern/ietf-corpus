document: rfc-1406
kind: protocol-element
summary: 'dsx1LoopbackConfig is a read-write INTEGER with four states: dsx1NoLoop(1) used when loopback is not active or not supported, dsx1PayloadLoop(2) loops received signal after framing function, dsx1LineLoop(3) loops received signal with minimum device penetration, dsx1OtherLoop(4) for vendor-specific loopbacks. Agents must return badValue for unsupported loopback states.'
section: 4.1.1
topics:
    - snmp
