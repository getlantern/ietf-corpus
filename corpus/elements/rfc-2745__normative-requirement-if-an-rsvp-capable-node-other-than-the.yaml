document: rfc-2745
kind: normative-requirement
summary: If an RSVP-capable node other than the LAST-HOP receives a DREQ containing no DIAG_RESPONSE objects and a zero Fragment Offset, it should forward the DREQ toward the LAST-HOP without processing, because such nodes are downstream of LAST-HOP where no state should be collected.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
