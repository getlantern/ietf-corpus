document: rfc-5080
kind: normative-requirement
summary: Access-Request packets containing Service-Type = Authorize Only (17) MUST contain a State attribute. Any other Access-Request that performs authorization checks MUST also contain a State attribute. For an authorization-check Access-Request that does not contain a State attribute, the server MUST respond with an Access-Reject.
section: 2.1.1
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
