document: rfc-9608
kind: security-consideration
summary: The absence of revocation information limits relying parties' ability to detect compromise of end-entity keying material, malicious certificates, or CAs that are not following CP/CPS policies. Relying parties need confidence in CA reliability, performance monitoring, and incident response capabilities.
