document: rfc-2453
kind: normative-requirement
summary: A received Response MUST be ignored if it did not arrive from UDP port 520. The source IPv4 address MUST be on a directly-connected network. Datagrams originating from the router's own address MUST be discarded to prevent processing self-broadcast output as new routing input.
section: 3.9.2
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
