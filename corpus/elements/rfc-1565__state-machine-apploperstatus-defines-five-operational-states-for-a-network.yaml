document: rfc-1565
kind: state-machine
summary: 'applOperStatus defines five operational states for a network service application: up(1) — available; down(2) — not available; halted(3) — operational but not accepting requests; congested(4) — operational but no additional inbound associations can be accommodated; restarting(5) — temporarily unavailable but coming back.'
