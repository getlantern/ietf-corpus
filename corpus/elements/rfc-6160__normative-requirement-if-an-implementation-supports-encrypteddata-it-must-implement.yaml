document: rfc-6160
kind: normative-requirement
summary: If an implementation supports EncryptedData, it MUST implement AES-128 Key Wrap with Padding and SHOULD implement AES-256 Key Wrap with Padding. Only the content-encryption algorithm is specified since EncryptedData requires keys be managed by other means.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
