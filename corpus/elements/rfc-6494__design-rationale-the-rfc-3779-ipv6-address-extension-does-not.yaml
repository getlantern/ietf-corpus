document: rfc-6494
kind: design-rationale
summary: The RFC 3779 IPv6 address extension does not specify the function for which a certificate was issued, making it impossible to determine the certificate's purpose. EKU values were introduced to allow issuance of certificates for specific SEND roles (router, proxy, address owner).
section: "1"
topics:
