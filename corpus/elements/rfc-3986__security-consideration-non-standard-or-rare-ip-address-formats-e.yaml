document: rfc-3986
kind: security-consideration
summary: Non-standard or rare IP address formats (e.g., octal, hex, mixed dotted notation) may be interpreted by some platforms but are not allowed by this grammar. An attacker can use such forms to bypass access controls or mislead users; only standard dotted-decimal IPv4 and bracket-enclosed IPv6 are valid.
section: "7.4"
topics:
    - http
    - security
    - ip
