document: rfc-7712
kind: protocol-element
summary: 'Piggybacking assertion: a server hosting multiple domains (e.g., b.example and c.example) asserts an additional domain identity on an existing stream by sending <db:result from=''c.example'' to=''a.example''> over the existing connection, avoiding the need to open a new TCP connection per domain pair.'
section: 4.4.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
