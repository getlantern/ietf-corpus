document: rfc-7181
kind: design-rationale
summary: OLSRv2 replaces OLSRv1's hop-count metric with general additive directional link metrics so that routes can optimize quality of service. The specification intentionally does not define how metric values are measured — that is left to external processes — and uses type extensions to allow multiple metric types to be defined without modifying the protocol.
section: "4.5"
topics:
    - routing
