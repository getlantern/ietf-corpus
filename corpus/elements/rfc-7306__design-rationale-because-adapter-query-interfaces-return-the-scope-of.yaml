document: rfc-7306
kind: design-rationale
summary: Because adapter query interfaces return the scope of atomicity guarantees rather than individual Atomic Operation support, an RNIC that supports any Atomic Operation must support all Atomic Operations defined in this specification. This avoids per-operation probing by applications.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
