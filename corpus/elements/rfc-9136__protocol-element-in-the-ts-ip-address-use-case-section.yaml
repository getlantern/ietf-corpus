document: rfc-9136
kind: protocol-element
summary: In the TS IP Address use case (Section 4.1), the NVE advertises RT-5 with GW IP = the VA's IP address as the Overlay Index, along with an RT-2 for the VA's MAC/IP. The DGW resolves SN prefixes via ARP to the VA's tunnel information, enabling fast convergence when the VA moves.
section: "4.1"
topics:
