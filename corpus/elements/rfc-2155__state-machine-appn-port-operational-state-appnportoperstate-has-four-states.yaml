document: rfc-2155
kind: state-machine
summary: 'APPN port operational state (appnPortOperState) has four states: inactive(1), pendactive(2), active(3), pendinact(4). Transitions are triggered by management SET commands on appnPortCommand: activate(2), deactivate(1), or recycle(3); GET returns ready(4) until the first SET is processed.'
