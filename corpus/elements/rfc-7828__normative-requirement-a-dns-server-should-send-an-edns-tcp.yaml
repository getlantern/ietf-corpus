document: rfc-7828
kind: normative-requirement
summary: A DNS server SHOULD send an edns-tcp-keepalive option with a TIMEOUT of 0 if local resources are too low to service more TCP keepalive sessions or if it wants clients to close currently open connections.
section: 3.3.2
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
