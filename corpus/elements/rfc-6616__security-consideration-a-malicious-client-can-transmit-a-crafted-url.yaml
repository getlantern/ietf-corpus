document: rfc-6616
kind: security-consideration
summary: A malicious client can transmit a crafted URL in the initial SASL response to cause the RP to perform port scans, contact unauthorized hosts, or invoke non-HTTP protocols. Mitigations include authorized URI base lists, no automatic retries on failure, logging, and query rate limiting.
section: "6.2"
topics:
    - security
    - oauth
