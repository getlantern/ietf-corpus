document: rfc-4508
kind: protocol-element
summary: 'Multiple feature tags (e.g., actor, automata, audio) can be combined in the Refer-To header alongside URI parameters. When URI parameters like transport are present, the URI must be enclosed in angle brackets. Example: Refer-To: <sip:alice-vm@example.com;transport=tcp>;actor="msg-taker";automata;audio'
section: "4.3"
topics:
    - sip
