document: rfc-5015
kind: normative-requirement
summary: When receiving a Join(*,G) or Prune(*,G), a router MUST first check whether the RP address in the message matches RPA(G). If it does not match, the Join or Prune MUST be silently dropped.
section: 3.4.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
