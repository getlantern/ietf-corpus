document: rfc-4837
kind: interoperability-note
summary: When the EFM OAM MIB (RFC4878) is co-implemented, each OAM instance is indexed by the LLID virtual link's ifIndex. This is non-obvious because OAM is defined for point-to-point links, but EPON's P2PE abstraction makes each virtual link appear as a distinct point-to-point interface.
section: "4.3"
