document: rfc-5621
kind: normative-requirement
summary: UAs MUST only include forward references in the SIP messages they generate. An element in a SIP message can reference a body part only if the body part appears after the element in the message.
section: "9.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
