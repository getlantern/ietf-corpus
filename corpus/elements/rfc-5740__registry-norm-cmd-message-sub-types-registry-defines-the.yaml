document: rfc-5740
kind: registry
summary: 'NORM_CMD Message Sub-Types registry defines the 8-bit ''sub-type'' field values: FLUSH=1, EOT=2, SQUELCH=3, CC=4, REPAIR_ADV=5, ACK_REQ=6, APPLICATION=7. Values 0 and 8–127 are unassigned; values 128–255 are reserved for private/experimental use. New assignments require IETF Consensus.'
section: 8.1.3
topics:
