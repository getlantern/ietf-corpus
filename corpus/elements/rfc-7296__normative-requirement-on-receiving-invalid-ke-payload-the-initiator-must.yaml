document: rfc-7296
kind: normative-requirement
summary: On receiving INVALID_KE_PAYLOAD, the initiator MUST retry IKE_SA_INIT with the indicated Diffie-Hellman group and MUST re-propose its full set of acceptable cryptographic suites; omitting suites is prohibited because the rejection was unauthenticated and could be forged.
section: "1.2"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
