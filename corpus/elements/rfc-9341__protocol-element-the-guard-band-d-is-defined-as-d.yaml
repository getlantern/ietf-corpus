document: rfc-9341
kind: protocol-element
summary: The guard band d is defined as d = A + D_avg + 3*D_stddev, where A is the clock accuracy bound, D_avg is the average network delay, and D_stddev is its standard deviation. The available counting interval is L - 2d, which must be positive.
