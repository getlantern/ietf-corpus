document: rfc-5545
kind: interoperability-note
summary: 'RFC 5545 obsoletes RFC 2445. Key changes include: deprecation of THISANDPRIOR range parameter, clarification of VTIMEZONE component requirements, new restrictions on UNTIL/DTSTART type matching, and updated IANA registration procedures. Implementations must be prepared to receive objects conforming to RFC 2445.'
section: Appendix A
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
