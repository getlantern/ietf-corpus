document: rfc-9132
kind: protocol-element
summary: The 'lifetime' parameter is mandatory in mitigation PUT requests. The recommended value is 3600 seconds. A lifetime of 0 is invalid; a lifetime of -1 requests indefinite mitigation (which the server MAY refuse). The server MUST always return the actual granted lifetime in its response.
section: 4.4.1.1
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
