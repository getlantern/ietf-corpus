document: rfc-7984
kind: design-rationale
summary: The major ordering of destination addresses is determined by SRV priority and weight (per RFC 2782), while the minor ordering among addresses from a single SRV target is determined by RFC 6724. Addresses from different SRV targets are never interleaved, even when SRV records share the same priority.
