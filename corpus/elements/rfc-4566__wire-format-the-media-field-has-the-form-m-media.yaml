document: rfc-4566
kind: wire-format
summary: The media field has the form `m=<media> <port> <proto> <fmt> ...`. For hierarchically encoded streams, a port count may be given as `<port>/<number of ports>`. RTP sessions use even ports for data and the next odd port for RTCP.
section: "5.14"
topics:
