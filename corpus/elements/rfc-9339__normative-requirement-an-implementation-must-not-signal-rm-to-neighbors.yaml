document: rfc-9339
kind: normative-requirement
summary: An implementation MUST NOT signal RM to neighbors by default and MUST provide a configuration option to enable RM signaling on specific links. An implementation MUST NOT accept RM from its neighbors by default.
section: "7"
rfc2119_level: MUST NOT
topics:
