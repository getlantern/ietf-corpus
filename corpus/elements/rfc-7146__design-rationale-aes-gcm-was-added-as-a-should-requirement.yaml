document: rfc-7146
kind: design-rationale
summary: AES GCM was added as a SHOULD requirement (conditional on IKEv2 support) because it is now the encryption transform most amenable to hardware implementation at high data rates, providing both encryption and integrity in a single mechanism. AES GCM is not compatible with IKEv1's key exchange protocol.
section: "2.2"
topics:
