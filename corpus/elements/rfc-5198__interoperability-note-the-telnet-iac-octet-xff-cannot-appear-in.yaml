document: rfc-5198
kind: interoperability-note
summary: The Telnet IAC octet (%xFF) cannot appear in valid UTF-8, so it poses no ambiguity; however, other Telnet command-introducer octets may be valid UTF-8 subsequences, requiring caution in Telnet-over-Net-Unicode implementations.
section: B
