document: rfc-9601
kind: normative-requirement
summary: An AMT gateway that does not support RFC 6040 MUST NOT set the E flag of its Request Message to 1. An AMT gateway that supports RFC 6040 ECN propagation MUST set the E flag of its Relay Discovery Message to 1.
section: 6.1.4.2
rfc2119_level: MUST NOT
topics:
    - ecn
    - ip
    - multicast
