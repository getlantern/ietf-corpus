document: rfc-8028
kind: design-rationale
summary: Without a routing protocol among multihomed routers, there is no mechanism for deterministic inter-router forwarding to avoid BCP 38 filters. Even if routing existed, it would produce an indirect path. Therefore, the host itself must select the appropriate first-hop router.
section: "2.1"
topics:
