document: rfc-5810
kind: normative-requirement
summary: If all participating FEs respond with success to the EOT COMMIT within the expected time, the CE MUST issue a TRCOMP operation to all participating FEs. An FE MUST NOT respond to a TRCOMP.
section: 4.3.1.2.2
rfc2119_level: MUST
topics:
    - routing
