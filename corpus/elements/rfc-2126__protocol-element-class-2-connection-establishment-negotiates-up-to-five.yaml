document: rfc-2126
kind: protocol-element
summary: 'Class 2 connection establishment negotiates up to five options via bits of the Additional Option parameter: Transport Expedited Data Service (bit 1), Reverse Connection procedure (bit 4), Expedited Data Acknowledgement (bit 6), and Non-blocking Expedited Data (bit 7). Explicit Flow Control MUST NOT be negotiated.'
section: 4.2.1
