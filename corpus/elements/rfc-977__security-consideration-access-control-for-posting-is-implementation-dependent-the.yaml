document: rfc-977
kind: security-consideration
summary: 'Access control for posting is implementation-dependent: the server signals posting permission via the initial greeting (200 vs 201) and may return 502 (access restriction or permission denied) for restricted operations. The determination of which clients and hosts may post is not specified by NNTP and is left to installation policy.'
section: 3.10.1
topics:
    - security
    - tcp
