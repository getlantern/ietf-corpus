document: rfc-4669
kind: interoperability-note
summary: The radiusAuthServMIBExtCompliance constrains radiusAuthClientInetAddressType to ipv4(1) or ipv6(2) only, and radiusAuthClientInetAddress to SIZE (4|16), meaning implementations need only support IPv4 and globally unique IPv6 addresses.
