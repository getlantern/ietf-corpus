document: rfc-8920
kind: normative-requirement
summary: Maximum link bandwidth is an application-independent attribute and MUST NOT be advertised in the ASLA sub-TLV; it MAY be advertised as a direct sub-TLV of the Extended Link TLV (OSPFv2 type 23) or Router-Link TLV (OSPFv3 type 23).
section: "7"
rfc2119_level: MUST NOT
topics:
    - routing
