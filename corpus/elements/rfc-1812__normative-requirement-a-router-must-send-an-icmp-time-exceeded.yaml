document: rfc-1812
kind: normative-requirement
summary: A router MUST send an ICMP Time Exceeded (code 0, TTL exceeded in transit) when it discards a datagram because the TTL field has reached zero, unless the datagram was an IP multicast.
section: 5.2.7.3
rfc2119_level: MUST
topics:
    - ip
