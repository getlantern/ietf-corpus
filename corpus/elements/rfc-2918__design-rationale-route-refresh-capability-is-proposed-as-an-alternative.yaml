document: rfc-2918
kind: design-rationale
summary: Route Refresh Capability is proposed as an alternative to 'soft-reconfiguration', which requires storing an unmodified copy of all routes from each peer at all times even though policies rarely change. The new mechanism avoids the additional memory and CPU cost of maintaining these stored routes.
section: "1"
