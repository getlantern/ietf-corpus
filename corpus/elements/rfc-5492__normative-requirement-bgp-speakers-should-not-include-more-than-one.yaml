document: rfc-5492
kind: normative-requirement
summary: BGP speakers SHOULD NOT include more than one instance of a capability with the same Capability Code, Capability Length, and Capability Value in an OPEN message, but MUST be prepared to accept such duplicates since they do not change the meaning of the announced capability.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
