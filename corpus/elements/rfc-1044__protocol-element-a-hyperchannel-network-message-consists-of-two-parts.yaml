document: rfc-1044
kind: protocol-element
summary: 'A HYPERchannel network message consists of two parts: a Message Proper of 10–64 bytes (first 10 bytes used for delivery control, remainder available for higher-level protocols) and an optional Associated Data block of effectively unlimited length on HYPERchannel A trunks, or up to 4K bytes on HYPERchannel B or local A400 adapters.'
section: BASIC HYPERCHANNEL NETWORK MESSAGES
