summary: 'The RADIUS Attributes suboption (suboption code 7) carries RFC 2865-encoded RADIUS attributes. Its format is: 1-octet SubOpt code (7), 1-octet Len (N), followed by N octets of RADIUS attributes o1...oN encoded per RFC 2865 rules.'
