document: rfc-2730
kind: normative-requirement
summary: A REQUEST message completing a DISCOVER transaction MUST be multicast to the same MADCAP Server Multicast Address used for DISCOVER and MUST include the Server Identifier of the selected server and the same Lease Identifier used in the DISCOVER. A standalone REQUEST MUST be unicast to the chosen server.
section: 2.2.4
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
