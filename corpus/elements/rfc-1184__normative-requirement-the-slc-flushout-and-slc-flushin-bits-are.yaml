document: rfc-1184
kind: normative-requirement
summary: The SLC_FLUSHOUT and SLC_FLUSHIN bits are advisory only but SHOULD be honored. The standard method for SLC_FLUSHIN is the Telnet Synch signal (IAC DM sent as TCP urgent data); SLC_FLUSHOUT is handled via the TIMING-MARK option. When both are sent, IAC DM precedes IAC DO TIMING-MARK.
section: "5.8"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
