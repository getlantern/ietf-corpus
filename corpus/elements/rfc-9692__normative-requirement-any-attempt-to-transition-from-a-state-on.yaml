document: rfc-9692
kind: normative-requirement
summary: Any attempt to transition from a state on reception of an event where no FSM action is specified MUST be considered an unrecoverable error; the protocol MUST reset all adjacencies, discard all state, and flush all flooding queues.
section: "6"
rfc2119_level: MUST
topics:
