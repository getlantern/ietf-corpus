document: rfc-3851
kind: wire-format
summary: For the RC2 SMIMECapability, capabilityID MUST be rc2-cbc and the parameters field MUST contain an INTEGER representing the effective key length in bits (e.g., 128 for 128-bit RC2), NOT the RC2 parameter version value (e.g., not 58).
section: 2.5.2.1
topics:
