document: rfc-9421
kind: interoperability-note
summary: The @request-target derived component maps directly to the HTTP/1.1 request-line target but is more difficult to construct reliably in HTTP/2 and HTTP/3. Its use is NOT RECOMMENDED when versions other than HTTP/1.1 might be in use.
section: 2.2.5
topics:
