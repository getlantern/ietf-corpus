document: rfc-4762
kind: design-rationale
summary: Unlike BGP VPNs (RFC 4364), VPLS reachability is not advertised via a control plane but is instead obtained by standard learning bridge functions in the data plane, avoiding the need for address resolution servers or other external servers.
