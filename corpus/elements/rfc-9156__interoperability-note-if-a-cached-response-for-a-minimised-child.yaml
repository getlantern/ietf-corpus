document: rfc-9156
kind: interoperability-note
summary: If a cached response for a minimised CHILD query is NXDOMAIN and the resolver supports RFC 8020, the NXDOMAIN can be used to answer the original query and stop. If RFC 8020 is not supported, resolution continues from step 3.
section: "3"
topics:
