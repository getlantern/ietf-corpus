document: rfc-1722
kind: security-consideration
summary: The authentication mechanism in RIP-2 prevents remote parties from injecting bogus routing information, but only as long as they cannot sniff the network to obtain the password. The 16-octet constraint on the authentication field limits the strength of authentication that can be carried; stronger authentication types are allowed by the specification but constrained by this space.
section: "3.3"
topics:
    - routing
    - security
