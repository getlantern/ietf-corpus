document: rfc-5510
kind: normative-requirement
summary: There MUST be exactly one FEC Payload ID per source or repair packet. In an Encoding Symbol Group (multiple symbols per packet), the FEC Payload ID refers to the first symbol; subsequent ESIs are derived by incrementing sequentially.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
