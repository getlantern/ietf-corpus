document: rfc-3644
kind: protocol-element
summary: QoSPolicyRSVPSimpleAction has the qpRSVPActionType property with values REPLACE (COPS Replace Decision, controlling RSVP message content), STATELESS (COPS Stateless Decision, controlling admission parameters), or REPLACEANDSTATELESS (both). It is associated with QoSPolicyRSVPVariable instances via QoSPolicyRSVPVariableInRSVPSimplePolicyAction.
