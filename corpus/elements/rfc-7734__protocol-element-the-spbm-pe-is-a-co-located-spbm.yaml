summary: The SPBM-PE is a co-located SPBM-to-EVPN interworking function and EVPN PE. It acts both as an EVPN BGP speaker and as an ISIS-SPB edge node, mapping ISIS-SPB information elements into EVPN NLRIs and vice versa.
