document: rfc-6674
kind: design-rationale
summary: GI-DS-Lite supports M:N relationships between access gateways and AFTRs rather than requiring a 1:1 pairing. AFTRs can be dedicated to specific device groups, gateway groups, or geographic regions, and may optionally be co-located with an access gateway.
