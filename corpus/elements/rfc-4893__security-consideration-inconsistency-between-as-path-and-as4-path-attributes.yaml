document: rfc-4893
kind: security-consideration
summary: Inconsistency between AS_PATH and AS4_PATH attributes can cause loss of AS path information and potential routing loops, particularly when OLD BGP speakers aggregate routes that carry AS4_PATH with 4-octet AS numbers. This inconsistency could be exploited by an attacker to manipulate routing.
section: "8"
topics:
    - bgp
    - routing
    - security
