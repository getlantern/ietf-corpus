document: rfc-7024
kind: normative-requirement
summary: Within a given VPN, a V-spoke MUST import all VPN-IP default routes that have been originated by the V-hubs associated with that V-spoke, ensuring the V-spoke has a path to all other VPN sites via its V-hub(s).
section: "3"
rfc2119_level: MUST
topics:
