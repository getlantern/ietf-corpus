document: rfc-8300
kind: privacy-consideration
summary: NSH metadata may carry privacy-sensitive information. Operators should use indirect identification (obfuscation) for sensitive metadata such as personally identifying information. The NSH itself does not provide privacy functions and relies on the transport encapsulation/overlay for confidentiality.
section: 8.2.2
topics:
    - privacy
    - security
