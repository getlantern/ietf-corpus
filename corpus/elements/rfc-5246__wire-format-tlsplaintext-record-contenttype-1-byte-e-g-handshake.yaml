summary: 'TLSPlaintext record: ContentType (1 byte, e.g. handshake=22, application_data=23), ProtocolVersion (major=3, minor=3 for TLS 1.2, 2 bytes), length (uint16, MUST NOT exceed 2^14), and opaque fragment. TLS version {3,3} reflects the historical SSL numbering.'
