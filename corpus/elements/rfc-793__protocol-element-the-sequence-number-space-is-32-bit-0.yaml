document: rfc-793
kind: protocol-element
summary: The sequence number space is 32-bit (0 to 2^32 - 1) with all arithmetic performed modulo 2^32. SYN and FIN control flags each implicitly consume one sequence number so they can be retransmitted and acknowledged. An ACK of sequence number X confirms receipt of all octets up to but not including X.
section: "3.3"
topics:
