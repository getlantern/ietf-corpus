document: rfc-9218
kind: interoperability-note
summary: When a CDN front end demultiplexes HTTP/2 or HTTP/3 connections to HTTP/1.x backends, backend servers MAY use Priority header fields for request scheduling but SHOULD only do so where the priority information can be scoped to individual end clients via authentication or session linkage.
section: "13.2"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
