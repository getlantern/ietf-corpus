document: rfc-7861
kind: security-consideration
summary: Client-side assertions carried by RPCSEC_GSSv3 must be evaluated by the server in the context of whether the client and/or user are authenticated, whether multi-principal authentication was used, the client's trust level, permitted assertion ranges, and server-side policy. The security semantics of assertions are application protocol-specific.
section: "4"
topics:
    - security
    - crypto
