document: rfc-7989
kind: normative-requirement
summary: When an intermediary originates a request without a triggering received message and has no knowledge of both endpoint UUIDs, the Session-ID header value SHOULD NOT be included at all, since a header with two nil UUIDs has no practical value.
section: "7"
rfc2119_level: SHOULD NOT
topics:
