document: rfc-6012
kind: normative-requirement
summary: If DCCP is available, syslog over DTLS over DCCP is RECOMMENDED in preference to syslog over DTLS over UDP. Implementations of syslog over DTLS over DCCP MUST support CCID 3 and SHOULD support CCID 2.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - syslog
    - congestion
