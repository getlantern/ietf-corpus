document: rfc-9647
kind: protocol-element
summary: The 'mac-key-set' list (keyed by name) contains a 'keys' sub-list with mandatory fields use-send, use-verify, value (binary, nacm:default-deny-all), and algorithm (identityref from mac-algorithms). The 'default-apply' boolean controls whether the key set is automatically applied to new interfaces.
