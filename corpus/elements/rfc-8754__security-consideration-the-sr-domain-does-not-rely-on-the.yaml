document: rfc-8754
kind: security-consideration
summary: The SR domain does not rely on the Authentication Header (AH) to secure the SRH because the SR domain is a trusted domain where the SR source is trusted to add an SRH and segments are advertised via a secure control plane. Use of SRH with AH is not defined in this document.
section: "7.5"
topics:
    - ip
    - routing
    - security
