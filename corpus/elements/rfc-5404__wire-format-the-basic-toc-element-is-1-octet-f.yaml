document: rfc-5404
kind: wire-format
summary: 'The basic ToC element is 1 octet: F (1 bit) indicates whether another ToC entry follows, L (5 bits) encodes the frame length using a non-linear mapping to byte counts (L=0 means NO_DATA, L=8..22 maps to 80+10*(L-8) bytes, L=23..27 maps to 240+20*(L-23) bytes), and R (2 bits) reserved.'
section: 5.2.1
