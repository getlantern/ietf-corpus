document: rfc-1573
kind: state-machine
summary: 'ifOperStatus has five states: up(1), down(2), testing(3), unknown(4), dormant(5). When ifAdminStatus transitions to up, ifOperStatus moves to up if ready, dormant if waiting for external events, or remains down on fault. The dormant state is new in this revision for on-demand interfaces.'
