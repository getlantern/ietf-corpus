document: rfc-5731
kind: normative-requirement
summary: EPP actions (such as transfers) that do not preserve the superordinate domain / subordinate host relationship MUST be explicitly disallowed. An internal host used across domains MUST be treated under rules governing subordinate hosts within the same repository.
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
