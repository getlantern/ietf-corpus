document: rfc-4618
kind: normative-requirement
summary: PPP/HDLC PWs cannot behave in a TCP-friendly manner and in the presence of services that reduce transmission rate will consume more than their fair share; they SHOULD be halted. PEs SHOULD monitor for congestion and when significant congestion is detected, the PW SHOULD be administratively disabled.
section: "7"
rfc2119_level: SHOULD
topics:
    - mpls
    - congestion
