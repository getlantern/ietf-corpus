document: rfc-5080
kind: normative-requirement
summary: Where an EAP-Message attribute is included in an Access-Challenge or Access-Accept, RADIUS servers SHOULD also include a State attribute. Access-Requests that are part of an ongoing Access-Request/Access-Challenge authentication process SHOULD contain a State attribute.
section: 2.1.1
rfc2119_level: SHOULD
topics:
    - radius
    - security
