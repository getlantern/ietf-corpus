document: rfc-3111
kind: security-consideration
summary: UAs and DAs MAY ignore all unauthenticated SLP messages when a valid IPSec association exists. SAs and DAs MUST be able to use IP Authentication and IP Encapsulating Security Payload for SLP messages whenever an appropriate IPSec Security Association exists.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - v6ops
