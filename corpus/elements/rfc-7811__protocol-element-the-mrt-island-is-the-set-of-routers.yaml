document: rfc-7811
kind: protocol-element
summary: The MRT Island is the set of routers reachable from the computing router via links that are in the same area/level, not IGP-excluded, not MRT-ineligible, and whose remote nodes support the given MRT profile. It is identified by breadth-first search from the computing router.
section: "5.2"
topics:
    - routing
