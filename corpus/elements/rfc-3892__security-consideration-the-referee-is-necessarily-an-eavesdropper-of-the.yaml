document: rfc-3892
kind: security-consideration
summary: The referee is necessarily an eavesdropper of the Referred-By information and is positioned to launch man-in-the-middle attacks. Unlike proxies managed by service providers, a referee endpoint's behavior is entirely under a single user's control, making malicious behavior more feasible.
section: "6"
topics:
    - sip
    - security
