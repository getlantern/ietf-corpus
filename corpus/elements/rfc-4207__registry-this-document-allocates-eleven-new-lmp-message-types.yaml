document: rfc-4207
kind: registry
summary: 'This document allocates eleven new LMP Message Types (21–31): TraceMonitor, TraceMonitorAck, TraceMonitorNack, TraceMismatch, TraceMismatchAck, TraceReq, TraceReport, TraceReqNack, InsertTrace, InsertTraceAck, InsertTraceNack. It also allocates two new LMP Object Classes: TRACE (Class 21, C-Type 1) and TRACE_REQ (Class 22, C-Type 1), and a new ERROR_CODE C-Type 3 (TRACE_ERROR).'
