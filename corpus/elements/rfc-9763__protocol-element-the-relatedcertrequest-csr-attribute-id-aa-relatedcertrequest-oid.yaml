document: rfc-9763
kind: protocol-element
summary: The relatedCertRequest CSR attribute (id-aa-relatedCertRequest, OID arc id-aa 60) allows an RA to attest that the owner of the public key in a CSR also owns the public key in a previously issued end-entity certificate. It is of type RequesterCertificate and is identified by id-aa-relatedCertRequest.
section: "3.1"
topics:
