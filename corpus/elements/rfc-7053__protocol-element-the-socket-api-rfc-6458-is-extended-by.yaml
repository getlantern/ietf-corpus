summary: The socket API (RFC 6458) is extended by defining the SCTP_SACK_IMMEDIATELY flag, which can be set in snd_flags of struct sctp_sndinfo (for sctp_sendv/sendmsg), sinfo_flags of struct sctp_sndrcvinfo (for sctp_send/sctp_sendx), or the flags parameter of sctp_sendmsg().
