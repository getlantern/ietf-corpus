document: rfc-2688
kind: normative-requirement
summary: Admission control for Guaranteed Service over links using bit stuffing SHOULD multiply the RSpec rate of all flows by 1.2 to account for up to 20% overhead from bit stuffing when determining whether a new flow can be admitted.
