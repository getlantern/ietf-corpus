document: rfc-7112
kind: normative-requirement
summary: A host that receives a First Fragment that does not contain the entire IPv6 Header Chain SHOULD discard the packet and SHOULD send an ICMPv6 error message to the source address of the offending packet, subject to RFC 4443 rules for ICMPv6 errors.
section: "5"
rfc2119_level: SHOULD
topics:
