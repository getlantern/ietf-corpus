document: rfc-2671
kind: interoperability-note
summary: Responders that do not understand EDNS extensions are expected to reply with RCODE NOTIMPL, FORMERR, or SERVFAIL. Requestors must therefore probe EDNS support and retry with no extensions on such responses. Cached capability information should be reproved periodically.
section: "5.3"
topics:
    - dns
