document: rfc-4122
kind: normative-requirement
summary: When a randomly generated node ID is used (no IEEE 802 address available), the multicast bit (LSB of the first octet of the node field) must be set to one so that such addresses can never conflict with real IEEE 802 MAC addresses from network cards.
section: "4.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
