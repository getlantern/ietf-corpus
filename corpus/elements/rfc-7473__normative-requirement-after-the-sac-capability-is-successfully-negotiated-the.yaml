document: rfc-7473
kind: normative-requirement
summary: After the SAC capability is successfully negotiated, the receiving LSR MUST NOT advertise any state related to the disabled applications towards the capability-sending LSR until and unless those application states are explicitly re-enabled via a capability update.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
