document: rfc-2163
kind: security-consideration
summary: An attacker who delivers incorrect PX records can cause forged originator addresses, misdirected mail to unauthorized recipients, or forced routing through compromised gateways. Attack vectors include compromising a DNS server, sending counterfeit responses to DNS queries, or returning incorrect additional section data in response to unrelated queries.
section: "10"
topics:
