document: rfc-7003
kind: interoperability-note
summary: This block depends on RFC 7002 (Discard Count Metrics Block) for total packet discard counts and on the Measurement Information Block (RFC 6776) for measurement period context. The block is only applicable to RTP applications with de-jitter buffers that do not use stream repair mechanisms such as FEC (RFC 5109) or retransmission (RFC 4588).
section: "1.1"
topics:
    - rtp
    - realtime
