document: rfc-3288
kind: wire-format
summary: SOAP envelopes with attachments may be sent as the root part of a 'multipart/related' content, with subordinate parts referenced via 'Content-ID:' or 'Content-Location:' headers per the SOAP Messages with Attachments specification. The 'start' parameter and 'Content-ID:' on the root part are strongly recommended.
section: "3"
