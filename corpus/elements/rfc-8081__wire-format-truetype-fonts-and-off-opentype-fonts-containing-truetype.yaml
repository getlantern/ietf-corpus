document: rfc-8081
kind: wire-format
summary: TrueType fonts and OFF/OpenType fonts containing TrueType outlines use 0x00010000 as the 'sfnt' version number (4-byte magic number). OFF/OpenType fonts containing CFF data use the 4-byte ASCII tag 'OTTO' (0x4F54544F) as the 'sfnt' version number.
