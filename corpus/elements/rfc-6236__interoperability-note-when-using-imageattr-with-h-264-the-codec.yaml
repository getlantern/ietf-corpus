document: rfc-6236
kind: interoperability-note
summary: When using 'imageattr' with H.264, the codec's sprop-parameter-sets in the fmtp line describes the image size for the stream and cannot be changed by the answer; potential conflicts between imageattr negotiation and sprop-parameter-sets must be resolved, possibly requiring a second offer/answer round.
section: 3.2.7.2
topics:
    - realtime
