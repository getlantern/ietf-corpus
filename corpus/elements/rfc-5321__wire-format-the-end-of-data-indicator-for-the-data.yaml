document: rfc-5321
kind: wire-format
summary: The end-of-data indicator for the DATA command is a line containing only a single period ('.'). To prevent the user's text from prematurely triggering this, any line beginning with a period must be prefixed with an additional period by the sender (dot-stuffing), which the receiver removes.
section: 4.5.2
topics:
    - email
extracted_by: claude-sonnet-4-6
