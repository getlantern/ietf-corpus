document: rfc-9665
kind: normative-requirement
summary: 'When an SRP requester must send multiple SRP Updates, it SHOULD combine them into a single message. If they cannot fit, subsequent updates MUST be sent sequentially: the requester MUST NOT send a new update until the previous one is acknowledged.'
section: 3.2.3.3
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
