document: rfc-7671
kind: normative-requirement
summary: Simultaneous support for all four TLSA certificate usages (PKIX-TA(0), PKIX-EE(1), DANE-TA(2), DANE-EE(3)) is NOT RECOMMENDED, as an attacker who can compromise DNSSEC integrity can replace PKIX records with DANE records, making PKIX usages offer only illusory security.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - tls
    - dns
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
