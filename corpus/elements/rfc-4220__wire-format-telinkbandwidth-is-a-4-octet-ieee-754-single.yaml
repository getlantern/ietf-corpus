document: rfc-4220
kind: wire-format
summary: TeLinkBandwidth is a 4-octet IEEE 754 single-precision floating-point value representing link bandwidth in bits per second. The floating-point format is used not for fractional precision but to allow representation of large bandwidth values that exceed the range of 32-bit integers.
