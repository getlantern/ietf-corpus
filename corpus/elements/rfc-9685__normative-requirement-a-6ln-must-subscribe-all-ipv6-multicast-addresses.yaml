document: rfc-9685
kind: normative-requirement
summary: A 6LN MUST subscribe all IPv6 multicast addresses it listens to using NS(EARO) with the P-Field set to 1, with the sole exception of ff02::1 (all-nodes link-scope multicast address), which is implicitly registered by all nodes.
section: "7.3"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
