document: rfc-4193
kind: normative-requirement
summary: Site border routers and firewalls should be configured to not forward packets with Local IPv6 source or destination addresses outside of the site unless explicitly configured with routing information about specific /48 or longer prefixes. The default behavior should install a 'reject' route for these prefixes.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
