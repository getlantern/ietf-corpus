document: rfc-4553
kind: normative-requirement
summary: The SAToP header MUST contain the SAToP Control Word (4 bytes) and MAY also contain a fixed RTP header. If the RTP header is included, it MUST immediately follow the control word except for UDP multiplexing, where it MUST precede it.
section: "4.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
