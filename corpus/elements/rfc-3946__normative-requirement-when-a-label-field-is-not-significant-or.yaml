document: rfc-3946
kind: normative-requirement
summary: When a label field is not significant or ignored in a particular context, it MUST be set to zero when transmitted and MUST be ignored when received. This applies to, for example, S and U fields for STS-1/STM-0 signals, and K for non-VC-4 signals.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
