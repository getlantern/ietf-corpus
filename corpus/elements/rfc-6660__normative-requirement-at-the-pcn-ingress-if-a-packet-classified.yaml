document: rfc-6660
kind: normative-requirement
summary: At the PCN-ingress, if a packet classified as a PCN-packet arrives with the ECN field set to a value other than Not-ECT (i.e., it is ECN-capable), it MUST pass through one of four preparatory steps before PCN-policing and PCN-colouring; the RECOMMENDED policy is encapsulation using an RFC 6040 IP-in-IP tunnel.
section: "5.1"
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
