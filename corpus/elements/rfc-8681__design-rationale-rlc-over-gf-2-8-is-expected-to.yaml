document: rfc-8681
kind: design-rationale
summary: RLC over GF(2^8) is expected to be the primary choice due to superior loss protection. RLC over GF(2) is an alternative for large encoding windows where throughput is critical, since its operations reduce to XOR, enabling much higher encoding/decoding speeds, but at significantly reduced loss protection.
section: "8.1"
