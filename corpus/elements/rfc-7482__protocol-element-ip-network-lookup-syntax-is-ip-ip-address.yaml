document: rfc-7482
kind: protocol-element
summary: IP network lookup syntax is 'ip/<IP address>' or 'ip/<CIDR prefix>/<CIDR length>', supporting both IPv4 dotted-decimal and IPv6 (RFC 5952) formats. The query targets the most-specific IP network that completely encompasses the given address or CIDR block.
section: 3.1.1
topics:
    - ip
    - routing
    - http
