document: rfc-4997
kind: protocol-element
summary: The INITIAL section specifies context-only bindings applied when a field's context is undefined, allowing context-dependent methods such as static and lsb to be used from the very first packet of a flow. Initial bindings must not themselves depend on the context.
section: 4.12.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
