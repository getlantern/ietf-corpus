document: rfc-2289
kind: protocol-element
summary: A sequence of one-time passwords is produced by applying a secure hash function N times to (seed || pass-phrase). Each successive authentication uses N-1 iterations, so an eavesdropper cannot derive the next password without inverting the hash.
section: "6"
topics:
