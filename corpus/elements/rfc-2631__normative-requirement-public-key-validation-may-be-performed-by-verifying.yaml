document: rfc-2631
kind: normative-requirement
summary: Public key validation MAY be performed by verifying that y lies within [2, p-1] and that y^q mod p == 1. This prevents small subgroup attacks on the sender's key pair.
section: 2.1.5
rfc2119_level: MAY
topics:
    - crypto
    - security
