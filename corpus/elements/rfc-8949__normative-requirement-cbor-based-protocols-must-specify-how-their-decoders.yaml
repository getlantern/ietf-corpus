document: rfc-8949
kind: normative-requirement
summary: CBOR-based protocols MUST specify how their decoders handle invalid and unexpected data, and MUST NOT be designed to make use of invalid items. Encoders for CBOR-based protocols MUST produce only valid items.
section: "5"
rfc2119_level: MUST
topics:
    - cbor
