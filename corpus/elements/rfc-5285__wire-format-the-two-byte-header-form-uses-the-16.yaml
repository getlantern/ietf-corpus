document: rfc-5285
kind: wire-format
summary: The two-byte header form uses the 16-bit profile-defined field value 0x1000 | appbits, where appbits is a 4-bit application-dependent field treated as local identifier 256. Each extension element has an 8-bit ID (range 1–255) and an 8-bit length field encoding the exact data length in bytes (0 means no data).
