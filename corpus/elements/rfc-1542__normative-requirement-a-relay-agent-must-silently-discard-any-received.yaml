document: rfc-1542
kind: normative-requirement
summary: A relay agent MUST silently discard any received UDP messages whose UDP destination port is BOOTPC (68). Only messages to BOOTPS (67) are considered for relay agent processing.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
