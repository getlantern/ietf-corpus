document: rfc-8999
kind: interoperability-note
summary: 'Appendix A lists common incorrect assumptions about QUIC derived from knowledge of version 1 that are NOT version-independent invariants, including: use of TLS, long headers only during handshake, client-speaks-first, the 0x40 bit always set, connection IDs changing infrequently, and the version field being the same in both directions.'
