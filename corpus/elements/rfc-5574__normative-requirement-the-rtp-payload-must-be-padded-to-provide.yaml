document: rfc-5574
kind: normative-requirement
summary: The RTP payload MUST be padded to provide an integer number of octets. Padding bits are LSB-aligned in network octet order and consist of a 0 followed by all ones (until end of octet), and are only required for the last frame.
section: "3.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
