summary: 'The compact form of PASSporT omits the header and payload, consisting of two periods followed by the BASE64URL-encoded JWS Signature: ".." || BASE64URL(JWS Signature). The receiving party must reconstruct the header and claims from signaling protocol context to verify the signature.'
