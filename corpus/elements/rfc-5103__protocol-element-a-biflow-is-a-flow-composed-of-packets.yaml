document: rfc-5103
kind: protocol-element
summary: A Biflow is a Flow composed of packets sent in both directions between two endpoints, composed from two Uniflows where Non-directional Key Field values are identical across both Uniflows and Directional Key Field values are mirror-reversed. A Biflow record contains the Flow Key once plus both forward and Reverse Information Elements for each non-key field.
