document: rfc-8614
kind: normative-requirement
summary: The set of leaves on the two P2MP LSPs rooted at a given PE MUST NOT contain any PEs that advertised an S-bit value different from what the root PE itself is advertising; such PEs are excluded from both LSPs.
section: "4"
rfc2119_level: MUST NOT
topics:
