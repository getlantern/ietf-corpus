kind: normative-requirement
summary: The default ICE candidate policy MUST be 'all'. The default ICE candidate pool size MUST be zero (pre-gathering only occurs on application request). The bundle and RTCP-multiplexing policies MUST NOT be changed after construction of the PeerConnection.
