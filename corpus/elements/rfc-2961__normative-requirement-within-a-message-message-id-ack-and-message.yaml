document: rfc-2961
kind: normative-requirement
summary: Within a message, MESSAGE_ID_ACK and MESSAGE_ID_NACK objects MUST immediately follow the INTEGRITY object (or the message header if no INTEGRITY object is present). The MESSAGE_ID object MUST follow any ACK/NACK objects. Only one MESSAGE_ID object MAY appear per message or sub-message.
section: "4.1"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
