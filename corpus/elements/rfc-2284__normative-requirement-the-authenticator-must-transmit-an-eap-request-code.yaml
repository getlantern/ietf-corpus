document: rfc-2284
kind: normative-requirement
summary: The authenticator MUST transmit an EAP Request (Code=1) and MUST continue sending additional Requests until a valid Response is received or an optional retry counter expires. Retransmitted Requests MUST use the same Identifier value to distinguish them from new Requests.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
