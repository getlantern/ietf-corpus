summary: 'Three SNMP notification types are defined: dsliteTunnelNumAlarm (tunnel count exceeds dsliteAFTRAlarmConnectNumber), dsliteAFTRUserSessionNumAlarm (user sessions exceed dsliteAFTRAlarmSessionNumber), and dsliteAFTRPortUsageOfSpecificIpAlarm (NAT port usage of a specific IP exceeds dsliteAFTRAlarmPortNumber).'
