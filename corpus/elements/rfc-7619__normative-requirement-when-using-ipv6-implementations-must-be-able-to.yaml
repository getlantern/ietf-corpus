document: rfc-7619
kind: normative-requirement
summary: When using IPv6, implementations MUST be able to assign a full /64 address block to the peer as described in RFC 5739, even if it is not authenticated, since forcing unauthenticated peers to single host-to-host IPsec SAs is not always possible with IPv6.
section: "2.5"
rfc2119_level: MUST
topics:
    - ipsec
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
