document: rfc-8591
kind: normative-requirement
summary: When sending an S/MIME-formatted MSRP message, the sender MUST include the Byte-Range header field for every chunk including the first, and the Byte-Range header field MUST include the total message length.
section: "8.2"
rfc2119_level: MUST
