document: rfc-2817
kind: protocol-element
summary: 'The CONNECT method requests that a proxy establish a TCP tunnel on the client''s behalf. The Request-URI MUST be an ''authority'' (host:port), not a full URL. For example: ''CONNECT server.example.com:443 HTTP/1.1''. Proxy authentication (e.g., Proxy-Authorization) may be used with CONNECT.'
section: "5.2"
topics:
    - http
    - tls
