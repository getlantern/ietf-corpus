document: rfc-3456
kind: design-rationale
summary: The htype field is set to 31 (IPsec tunnel mode virtual interface) to allow the DHCP server to differentiate VPN from non-VPN requests, enabling address pool management where the remote host can be assigned an address from the appropriate corporate address pool.
