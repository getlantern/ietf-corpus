document: rfc-8295
kind: protocol-element
summary: The /symmetrickeys path component (HTTP GET) distributes CMS-encapsulated symmetric key packages (RFC 6031) to clients. The /symmetrickeys/return path component (HTTP POST) allows clients to return key package receipts or errors (RFC 7191). Success responses from the server on /return are HTTP 204 with no content.
