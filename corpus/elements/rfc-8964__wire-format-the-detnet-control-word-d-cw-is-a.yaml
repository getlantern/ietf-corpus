document: rfc-8964
kind: wire-format
summary: 'The DetNet Control Word (d-CW) is a 32-bit field: bits 0–3 MUST be set to zero (per RFC 4385), and bits 4–31 carry an unsigned circular Sequence Number. The d-CW conforms to the Generic PW MPLS Control Word (PWMCW) defined in RFC 4385.'
section: 4.2.1
topics:
    - mpls
