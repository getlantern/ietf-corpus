document: rfc-5415
kind: interoperability-note
summary: CAPWAP is wireless-technology-independent; binding-specific functionality is provided through separate binding documents (e.g., RFC 5416 for IEEE 802.11). The WTP Radio Information message element advertises binding-specific capabilities in Discovery, Primary Discovery, and Join messages, ensuring WTP/AC interoperability across different technology types and binding versions.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
