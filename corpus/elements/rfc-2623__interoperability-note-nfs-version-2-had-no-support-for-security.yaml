document: rfc-2623
kind: interoperability-note
summary: NFS Version 2 had no support for security flavor negotiation; clients had to guess or rely on prior knowledge such as automounter directory service entries. MOUNT Version 3 added flavor negotiation via the MNT procedure response.
section: "2.7"
topics:
    - security
