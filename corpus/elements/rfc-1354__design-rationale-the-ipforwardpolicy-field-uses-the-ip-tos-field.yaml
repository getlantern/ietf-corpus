document: rfc-1354
kind: design-rationale
summary: The ipForwardPolicy field uses the IP TOS field encoding defined by Router Requirements rather than Host Requirements because the two documents disagree on TOS field width. The mapping leaves room to widen the TOS field without impact to deployed systems.
section: "4.1"
topics:
