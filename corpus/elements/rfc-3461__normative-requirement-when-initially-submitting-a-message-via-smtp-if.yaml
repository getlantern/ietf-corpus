document: rfc-3461
kind: normative-requirement
summary: When initially submitting a message via SMTP, if the ORCPT parameter is used it MUST contain the same address as the RCPT TO address (encoded as xtext). When a mailing list redistributes a message, the ORCPT parameter MUST match the new RCPT TO address for each recipient.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
