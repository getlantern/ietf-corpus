document: rfc-5818
kind: normative-requirement
summary: When a node receives a ConfirmDataChannelStatus message and the data channel status confirmation procedure is not supported but the message is recognized, a ConfirmDataChannelStatusNack containing ERROR_CODE 'Channel Status Confirmation Procedure not supported' MUST be sent.
section: 5.1.3
rfc2119_level: MUST
topics:
    - routing
