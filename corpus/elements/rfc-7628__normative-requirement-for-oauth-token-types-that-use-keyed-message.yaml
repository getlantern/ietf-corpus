document: rfc-7628
kind: normative-requirement
summary: For OAuth token types that use keyed message digests (such as OAuth 1.0a), the client MUST send host and port key/value pairs, and the server MUST fail authorization requests requiring keyed message digests that are not accompanied by host and port values.
section: "3.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
