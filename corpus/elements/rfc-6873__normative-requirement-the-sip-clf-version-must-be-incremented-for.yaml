document: rfc-6873
kind: normative-requirement
summary: The SIP CLF Version MUST be incremented for any new SIP CLF specification that changes any part of the SIP CLF record format, including addition or removal of fields or a change in syntax or semantics. Version values are registered via the Standards Action method.
