document: rfc-2738
kind: errata
summary: 'In RFC 2533 section 5.8.2, the rule ''(LE f a) (GE f b) --> FALSE, a!=b'' is incomplete. The corrected rule reads: ''(LE f a) (GE f b) --> (LE f a), a=b; FALSE, otherwise''. This fix is non-normative (affects the feature set matching reduction algorithm).'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
