document: rfc-3267
kind: wire-format
summary: 'Storage format speech frame: one-octet header (P|FT|Q|P|P) followed by speech bits in the same bit order as bandwidth-efficient RTP mode, with the last octet zero-padded to achieve octet alignment. Frame-blocks are stored consecutively in time with channels in ascending order.'
