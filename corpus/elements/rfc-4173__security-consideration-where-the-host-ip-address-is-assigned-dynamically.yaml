document: rfc-4173
kind: security-consideration
summary: Where the host IP address is assigned dynamically, IKE main mode SHOULD NOT be used, as explained in RFC 3720 and RFC 3723. The iSCSI boot session is vulnerable as any iSCSI session regardless of how prior stage parameters were obtained.
section: "8"
rfc2119_level: SHOULD NOT
