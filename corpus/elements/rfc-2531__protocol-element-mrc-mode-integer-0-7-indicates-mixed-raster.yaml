document: rfc-2531
kind: protocol-element
summary: 'MRC-mode (Integer 0..7) indicates Mixed Raster Content availability and mode per ITU T.44: 0 means MRC is unavailable; 1-7 indicate the available MRC mode number. An MRC document is a collection of multiple images each described by a separate feature collection; multi-level coders are used for odd-numbered layers and bi-level coders for even-numbered mask layers.'
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
