document: rfc-2815
kind: design-rationale
summary: Network Control traffic is placed at user_priority 7 to protect routing updates and network management. However, because this competes with QoS application traffic, SBMs performing admission control must include an estimate of Network Control bandwidth in their calculations.
section: "3.3"
topics:
