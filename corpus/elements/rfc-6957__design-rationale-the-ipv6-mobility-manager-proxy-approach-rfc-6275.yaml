document: rfc-6957
kind: design-rationale
summary: The IPv6 Mobility Manager proxy approach (RFC 6275) was rejected for DSL/Fiber access networks because it multicasts NA messages on the home link, which violates operator requirements for security and scalability that demand NA messages be received only by the NS sender.
