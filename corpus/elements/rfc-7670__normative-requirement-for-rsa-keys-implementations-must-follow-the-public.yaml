document: rfc-7670
kind: normative-requirement
summary: For RSA keys, implementations MUST follow the public-key processing rules of RFC 4055 Section 1.2 even when SubjectPublicKeyInfo is sent as Certificate Data rather than within a full certificate. RSASSA-PSS and RSASSA-PSS-params inside the SubjectPublicKeyInfo MUST be sent when applicable.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
    - crypto
