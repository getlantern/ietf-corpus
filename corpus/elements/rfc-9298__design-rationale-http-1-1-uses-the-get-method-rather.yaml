document: rfc-9298
kind: design-rationale
summary: HTTP/1.1 uses the GET method rather than CONNECT in order to mimic the design of the WebSocket Protocol. This allows the protocol to fit naturally into HTTP/1.1 upgrade semantics.
section: "3.2"
topics:
