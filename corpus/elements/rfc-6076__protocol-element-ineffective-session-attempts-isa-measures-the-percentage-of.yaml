document: rfc-6076
kind: protocol-element
summary: 'Ineffective Session Attempts (ISA) measures the percentage of session setup requests that receive failure responses indicating overload or internal errors: 408, 500, 503, or 504. Formula: ISA% = (# of ISAs / Total # of Session Requests) x 100.'
