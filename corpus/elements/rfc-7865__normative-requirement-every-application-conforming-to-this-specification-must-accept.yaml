document: rfc-7865
kind: normative-requirement
summary: Every application conforming to this specification MUST accept the UTF-8 character encoding to ensure minimal interoperability. If the MIME charset parameter differs from the XML encoding declaration, the charset parameter takes precedence.
section: "5.1"
rfc2119_level: MUST
