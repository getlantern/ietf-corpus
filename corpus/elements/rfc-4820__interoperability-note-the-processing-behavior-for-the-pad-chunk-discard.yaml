document: rfc-4820
kind: interoperability-note
summary: The processing behavior for the PAD chunk (discard and continue) is identical to the required behavior for any unknown chunk with the same highest-order two bits (10) in the chunk type, ensuring interoperability with SCTP implementations that predate RFC 4820.
