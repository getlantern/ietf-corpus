document: rfc-3193
kind: state-machine
summary: 'L2TP/IPsec tunnel establishment follows: (1) IKE Phase 1+2 to protect initial SCCRQ; (2) if responder changes IP, StopCCN triggers new IKE Phase 1+2 to the new address; (3) SCCRQ sent; (4) if responder changes port, new IKE Phase 2 initiated before SCCRP; (5) SCCRP and SCCCN complete tunnel establishment.'
section: "4.2"
topics:
    - vpn
    - ipsec
