document: rfc-1444
kind: design-rationale
summary: The binding of AGENT-CAPABILITIES to sysObjectID may not always suffice to define all MIB objects an agent can provide access to, particularly where the agent dynamically learns of supported objects. In these cases, the snmpORID column of snmpORTable should be used in addition to sysObjectID.
section: "5"
topics:
