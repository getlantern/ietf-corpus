document: rfc-7743
kind: wire-format
summary: 'Each relay node address entry in the stack contains: Address Type (1 octet, 0=Null/1=IPv4/2=IPv6), K flag bit and Reserved (1 octet), Reserved (2 octets, MUST be zero), and the Relayed Address (0, 4, or 16 octets). Entry sizes are 4 bytes (Null), 8 bytes (IPv4), or 20 bytes (IPv6).'
section: "3.2"
