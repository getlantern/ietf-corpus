document: rfc-2261
kind: interoperability-note
summary: The high bit of the snmpEngineID first octet distinguishes pre-SNMPv3 engineID formats (bit=0, uses former enterprise methods, 12-octet fixed length) from the new SNMPv3 architecture format (bit=1, variable-length with structured format indicator in the fifth octet). This allows existing uses of engineID (also known as AgentID per RFC 1910) to co-exist with SNMPv3.
section: "5"
topics:
    - snmp
