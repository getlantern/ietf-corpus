document: rfc-6295
kind: protocol-element
summary: 'SysEx commands may be encoded verbatim or segmented into first/middle/last/cancel sublists, distinguished by specific head and tail status octets (first: 0xF0…0xF0; middle: 0xF7…0xF0; last: 0xF7…0xF7; cancel: 0xF7…0xF4). Segmentation allows per-octet timing and spanning large SysEx commands across multiple packets.'
section: "3.2"
topics:
    - rtp
    - realtime
