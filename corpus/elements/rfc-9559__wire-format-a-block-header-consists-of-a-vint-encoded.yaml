summary: 'A Block header consists of a VINT-encoded TrackNumber, a signed 16-bit Timestamp relative to the Cluster Timestamp, and a Flags byte encoding Gap (1 bit), Lacing mode (2 bits: 00=none, 01=Xiph, 11=EBML, 10=fixed-size), and reserved bits.'
