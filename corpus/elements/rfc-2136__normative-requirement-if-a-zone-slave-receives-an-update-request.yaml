document: rfc-2136
kind: normative-requirement
summary: If a zone slave receives an UPDATE request, it must forward the request toward the primary master, allocating a new ID for the forwarded message. If the original requestor used TCP, the forwarder must use TCP for forwarding.
section: "6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
