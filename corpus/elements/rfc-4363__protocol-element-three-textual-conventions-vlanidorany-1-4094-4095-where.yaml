document: rfc-4363
kind: protocol-element
summary: Three textual conventions—VlanIdOrAny (1..4094 | 4095, where 4095 means any VLAN), VlanIdOrNone (0..4094, where 0 means no VLAN), and VlanIdOrAnyOrNone—are defined to unify VLAN-ID representation across MIB modules. Objects using these TCs must clarify the meaning of the special values in their DESCRIPTION clause.
section: "3.3"
topics:
