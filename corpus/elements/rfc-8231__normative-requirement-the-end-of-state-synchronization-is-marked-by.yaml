document: rfc-8231
kind: normative-requirement
summary: The end of State Synchronization is marked by a PCRpt with the SYNC flag set to 0 for an LSP object with PLSP-ID equal to the reserved value 0. The PCRpt MUST include an empty ERO as its intended path.
section: "5.6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
