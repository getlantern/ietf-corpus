document: rfc-6437
kind: design-rationale
summary: Flow label values should approximate a discrete uniform distribution to exhibit both high variability (useful for load distribution hashing) and unguessability (resistant to adversarial prediction). No precise mathematical requirements are imposed on the distribution method.
