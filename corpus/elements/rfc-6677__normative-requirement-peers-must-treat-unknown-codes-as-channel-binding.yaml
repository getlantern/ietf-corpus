document: rfc-6677
kind: normative-requirement
summary: Peers MUST treat unknown codes as channel-binding failure. Peers MUST ignore differences between attribute values sent in channel-binding data and those in the response. Peers and servers MUST ignore attributes in fields with an unknown NSID. Peers MUST ignore attributes in a response not present in the channel-binding data.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
