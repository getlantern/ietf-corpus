document: rfc-8509
kind: protocol-element
summary: 'For a single resolver, three queries classify resolver behavior: is-ta query, not-ta query, and a query with a bogus (unvalidatable) DNSSEC signature. Results identify five resolver types: Vnew (supports sentinel, has new key), Vold (supports sentinel, lacks new key), Vind (validates but no sentinel), nonV (non-validating), and other (indeterminate, e.g., resolver farms with inconsistent behavior).'
