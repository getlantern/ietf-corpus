document: rfc-5089
kind: security-consideration
summary: IS-IS provides no encryption mechanism for protecting the privacy of LSPs and, in particular, the privacy of PCE discovery information. Operators should be aware that PCED sub-TLV contents (PCE addresses, capabilities, domain scope) are transmitted in the clear.
section: "8"
topics:
    - security
    - privacy
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
