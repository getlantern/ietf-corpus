document: rfc-9820
kind: security-consideration
summary: Channel binding for CoAP-EAP requires sending the EAP lower-layer identifier (value 10, assigned by IANA) in the EAP Lower-Layer Attribute when RADIUS is used, per RFC 6677. This prevents cross-protocol binding attacks between CoAP-EAP and other EAP lower layers.
section: "8.5"
topics:
    - security
    - radius
