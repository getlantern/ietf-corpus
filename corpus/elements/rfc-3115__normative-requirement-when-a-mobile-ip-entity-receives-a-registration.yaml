document: rfc-3115
kind: normative-requirement
summary: When a Mobile IP entity receives a registration request (or other request/update) containing a recognized CVSE with an unknown or unsupported Vendor-ID or Vendor-CVSE-Type, it MUST send a registration reject with the appropriate error code.
section: "2.3"
rfc2119_level: MUST
topics:
