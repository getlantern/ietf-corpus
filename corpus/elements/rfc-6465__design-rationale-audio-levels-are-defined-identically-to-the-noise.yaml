document: rfc-6465
kind: design-rationale
summary: Audio levels are defined identically to the noise level byte in the RTP Payload Comfort Noise specification (RFC 3389), reusing a well-established encoding. The level is measured as a root mean square of all samples in the measured range with no long-term averaging or smoothing.
section: "4"
topics:
