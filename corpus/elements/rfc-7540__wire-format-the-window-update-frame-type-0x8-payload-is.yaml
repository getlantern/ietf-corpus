document: rfc-7540
kind: wire-format
summary: 'The WINDOW_UPDATE frame (type=0x8) payload is a reserved 1-bit field plus an unsigned 31-bit Window Size Increment (valid range: 1 to 2^31-1 octets). A value of 0 MUST be treated as a stream error (stream-level) or connection error (connection-level) of type PROTOCOL_ERROR.'
section: "6.9"
