document: rfc-2358
kind: normative-requirement
summary: ifSpeed and ifHighSpeed MUST NOT indicate a doubled value when operating in full-duplex mode; they MUST indicate the correct line speed regardless of duplex mode. Duplex mode is indicated by ifMauType in the MAU MIB.
section: 3.2.7
rfc2119_level: MUST
