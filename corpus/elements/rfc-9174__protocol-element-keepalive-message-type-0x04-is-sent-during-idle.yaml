document: rfc-9174
kind: protocol-element
summary: KEEPALIVE (message type 0x04) is sent during idle sessions at the negotiated Session Keepalive interval to signal entity liveness when no data is being transferred. A negotiated Session Keepalive of zero disables KEEPALIVE messages entirely.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
