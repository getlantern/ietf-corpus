document: rfc-8928
kind: security-consideration
summary: ROVR (Crypto-ID) collisions are possible but rare; a 64-bit Crypto-ID yields a 0.01% collision probability for 66 million nodes. To avoid an honest node accidentally claiming another's address, nodes SHOULD NOT derive their registered address from the ROVR.
section: "7.5"
topics:
    - security
    - ip
