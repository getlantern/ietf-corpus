document: rfc-9546
kind: design-rationale
summary: The Sequence Number field in d-ACH is only 8 bits (range 0–255) because the rate of DetNet active OAM packets is significantly lower than that of DetNet app-flow packets; therefore, wrapping around within the circular sequence space is not a practical concern.
