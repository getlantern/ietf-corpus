document: rfc-7296
kind: normative-requirement
summary: The initiator is responsible for retransmission; the responder MUST never retransmit a response unless it receives a retransmission of the request. A retransmission MUST be bitwise identical to the original request from the IKE header onward. Retransmission times MUST increase exponentially to avoid network flooding.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
