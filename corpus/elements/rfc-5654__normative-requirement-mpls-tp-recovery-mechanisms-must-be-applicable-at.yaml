document: rfc-5654
kind: normative-requirement
summary: 'MPLS-TP recovery mechanisms MUST be applicable at various levels: link, transport path, segment, concatenated segment, and end-to-end. Recovery MUST also operate in synergy with recovery mechanisms in client or server transport networks to avoid inter-layer race conditions.'
section: "2.5"
rfc2119_level: MUST
topics:
    - mpls
