document: rfc-4470
kind: design-rationale
summary: 'The epsilon functions described in Section 4 are imperfect: they do not account for DNS name label count limits or total name length limits. The technique remains valid despite imperfect functions because generated NSECs must be checked against existing names regardless, and substitution is used when needed.'
section: "4"
