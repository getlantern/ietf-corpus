document: rfc-2392
kind: wire-format
summary: The url-addr-spec is an RFC 822 addr-spec with URL encoding applied. Characters not allowed within a URL, including '/' (reserved within 'mid'), must be hex-encoded using the %hh escape mechanism. Angle brackets used in message headers are stripped when forming the URL.
