document: rfc-2396
kind: design-rationale
summary: The slash '/' was treated as part of the path component (not as a separator between authority and path) because it proved impossible to accurately distinguish '<foo:/bar>' from '<foo:bar>' under the prior RFC 1738/1808 model where the slash was carried as a prefix.
section: G.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
