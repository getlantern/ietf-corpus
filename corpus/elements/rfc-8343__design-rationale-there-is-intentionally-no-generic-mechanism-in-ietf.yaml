document: rfc-8343
kind: design-rationale
summary: There is intentionally no generic mechanism in 'ietf-interfaces' for configuring interface layering. Interface-type-specific models are expected to define their own layering data nodes using 'interface-ref' types, allowing type-appropriate constraints (e.g., a bonding slave must be of type 'ethernetCsmacd').
section: "3.3"
topics:
    - yang
    - netconf
