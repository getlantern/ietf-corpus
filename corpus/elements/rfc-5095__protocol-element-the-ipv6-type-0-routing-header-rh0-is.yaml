document: rfc-5095
kind: protocol-element
summary: The IPv6 Type 0 Routing Header (RH0) is extension header type 43, subtype 0, as defined in RFC 2460. It can contain multiple intermediate node addresses, and the same address may appear more than once, enabling the amplification attack.
