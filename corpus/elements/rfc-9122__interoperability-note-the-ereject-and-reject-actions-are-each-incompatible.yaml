document: rfc-9122
kind: interoperability-note
summary: The `ereject` and `reject` actions are each incompatible with the `vacation` action; they are also typically not permitted alongside delivery actions (`keep`, `fileinto`, `redirect`). Neither can be used with IMAP events in Sieve (RFC 6785).
section: "2.2"
