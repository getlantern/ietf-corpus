document: rfc-3845
kind: wire-format
summary: 'The NSEC RDATA consists of two variable-length fields: the Next Domain Name (encoded as a domain name) followed by the List of Type Bit Map(s). The Type Bit Map field uses 256 window blocks, each encoded as a 1-octet window number, a 1-octet bitmap length (1–32), and up to 32 octets of bitmap.'
section: "2.1"
topics:
