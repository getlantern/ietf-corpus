document: rfc-9705
kind: normative-requirement
summary: Each node along an LSP supporting these extensions MUST include its router ID in the Node-ID sub-object of the RRO in the Resv message. If the PLR in a different IGP area has not included a Node-ID sub-object, the router MUST execute backward compatibility procedures rather than MP procedures.
section: 4.2.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
