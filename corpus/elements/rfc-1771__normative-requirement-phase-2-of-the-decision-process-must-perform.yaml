document: rfc-1771
kind: normative-requirement
summary: Phase 2 of the Decision Process MUST perform an IGP lookup to resolve the NEXT_HOP attribute address to an immediate next hop, and MUST install that immediate next hop in the Loc-RIB. If the IGP path to NEXT_HOP changes, route selection should be recalculated.
section: 9.1.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
