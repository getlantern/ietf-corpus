document: rfc-6098
kind: protocol-element
summary: 'The MD (Message Direction) field encodes the sender-receiver pair: 0 = HA to MN, 1 = HA to FA, 2 = MN to HA, 3 = MN to FA, 4 = FA to MN, 5 = FA to HA. The MD value determines which authentication extension is required and controls relay behavior at the FA.'
section: "4.1"
topics:
