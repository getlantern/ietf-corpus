document: rfc-2688
kind: normative-requirement
summary: Admission control and link scheduling algorithms used with POTS modems MUST be prepared to compensate for variability in link rate and delay. Implementations MUST be able to gracefully handle the pathological case where link rate drops below currently reserved capacity.
section: A
rfc2119_level: MUST
topics:
    - qos
    - realtime
