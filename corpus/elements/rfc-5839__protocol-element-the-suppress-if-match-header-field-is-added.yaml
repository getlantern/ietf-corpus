document: rfc-5839
kind: protocol-element
summary: The Suppress-If-Match header field is added to SUBSCRIBE requests to condition the resulting notifications. It carries an entity-tag value (or wildcard '*') and instructs the notifier to suppress the NOTIFY body or the entire NOTIFY request if the condition is true.
section: "7.2"
topics:
    - sip
    - realtime
