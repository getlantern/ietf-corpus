document: rfc-8147
kind: protocol-element
summary: 'The metadata/control block is an XML structure (application/EmergencyCallData.Control+xml) used for PSAP-IVS signaling during an eCall. It contains three top-level elements: <ack> (acknowledgment), <capabilities> (IVS capability advertisement), and <request> (PSAP action requests).'
section: "9.1"
