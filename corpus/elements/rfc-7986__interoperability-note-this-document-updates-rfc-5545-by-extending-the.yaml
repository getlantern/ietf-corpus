document: rfc-7986
kind: interoperability-note
summary: This document updates RFC 5545 by extending the applicability of DESCRIPTION, UID, LAST-MODIFIED, URL, and CATEGORIES to the VCALENDAR object level. Implementations not aware of RFC 7986 will ignore these properties at the VCALENDAR level, which is safe due to iCalendar's extensibility rules.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
