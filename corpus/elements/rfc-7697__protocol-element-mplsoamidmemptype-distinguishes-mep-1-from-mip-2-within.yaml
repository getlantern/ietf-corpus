document: rfc-7697
kind: protocol-element
summary: 'mplsOamIdMeMpType distinguishes MEP(1) from MIP(2) within the ME: mep(1) applies only at ingress or egress nodes, while mip(2) applies at intermediate nodes and possibly egress nodes. mplsOamIdMeMepDirection (up/down/notApplicable) is configured only when the MP type is MEP.'
