document: rfc-3034
kind: protocol-element
summary: An ingress FR-LSR pushes the MPLS label stack and sets TTL from the network layer TTL. For unicast, MPLS TTL SHOULD be decremented by the number of hops of the Frame Relay (non-TTL) segment; for multicast, TTL SHOULD be decremented by 1. The top label is passed to the Frame Relay data link driver as the output DLCI.
section: "5.5"
topics:
    - mpls
