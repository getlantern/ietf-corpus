document: rfc-5042
kind: design-rationale
summary: STag values should be allocated randomly and reused as infrequently as possible so that a Remote Peer cannot predict the next STag number. Monotonically increasing or fixed STag allocation strategies enable both intentional attacks and accidental off-by-one reuse.
section: 6.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
