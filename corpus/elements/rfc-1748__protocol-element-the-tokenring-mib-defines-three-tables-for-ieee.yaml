document: rfc-1748
kind: protocol-element
summary: 'The TOKENRING-MIB defines three tables for IEEE 802.5 management: the 802.5 Interface Table (dot5Table) for state and parameters, the 802.5 Statistics Table (dot5StatsTable) for error counters, and the 802.5 Timer Table (dot5TimerTable, now obsolete). Each 802.5 interface has one entry in the Interface and Statistics tables.'
