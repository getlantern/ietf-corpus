document: rfc-6647
kind: interoperability-note
summary: Some SMTP clients treat 4yz temporary failure replies as 5yz permanent failures and return messages as undeliverable, or do not retry at all in violation of RFC 5321. Greylisting will cause outright delivery failure for such clients on the first attempt.
section: "4.2"
topics:
    - email
