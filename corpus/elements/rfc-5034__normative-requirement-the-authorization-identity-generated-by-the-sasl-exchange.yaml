document: rfc-5034
kind: normative-requirement
summary: The authorization identity generated by the SASL exchange SHOULD use the SASLprep profile of StringPrep to prepare names for matching. If preparation of the authorization identity fails or results in an empty string (unless transmitted as empty), the server MUST fail the authentication.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
    - security
