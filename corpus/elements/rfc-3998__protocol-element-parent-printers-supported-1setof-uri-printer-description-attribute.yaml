document: rfc-3998
kind: protocol-element
summary: '''parent-printers-supported'' (1setOf uri) Printer Description attribute is REQUIRED if an implementation supports Subordinate Printers and contains the URI(s) of the Non-Leaf Printer(s) for which this Printer is the immediate Subordinate. Each Subordinate Printer MUST support this attribute.'
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
