document: rfc-2097
kind: wire-format
summary: 'The IEEE-MAC-Address-Required boolean option has Type (1 octet, value 4) and Length (1 octet, value 2) with no data field. When negotiated, each NBF datagram is prefixed with a 12-octet IEEE MAC header: 6-octet Destination MAC Address followed by 6-octet Source MAC Address in non-canonical (MSB-first) form.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
