document: rfc-7538
kind: interoperability-note
summary: Many existing HTML-based user agents will emulate a refresh when encountering an HTML <meta http-equiv='refresh'> directive. Servers can include such a directive in the 308 response body as a fallback for clients that do not recognize the 308 status code.
section: "4"
topics:
