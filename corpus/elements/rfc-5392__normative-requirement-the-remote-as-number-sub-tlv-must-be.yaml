document: rfc-5392
kind: normative-requirement
summary: The Remote AS Number sub-TLV MUST be included in the Link TLV of both the Inter-AS-TE-v2 LSA and Inter-AS-TE-v3 LSA. At least one of the IPv4 or IPv6 Remote ASBR ID sub-TLVs SHOULD be included.
section: 3.2.1
rfc2119_level: MUST
topics:
