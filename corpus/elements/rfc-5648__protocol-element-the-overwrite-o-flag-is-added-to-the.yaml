document: rfc-5648
kind: protocol-element
summary: The Overwrite (O) flag is added to the Binding Update message. When set, all existing binding cache entries for the mobile node are replaced by entries registered in this Binding Update. It is only meaningful when a Binding Identifier mobility option is present.
section: "4.2"
topics:
    - mobility
    - ip
