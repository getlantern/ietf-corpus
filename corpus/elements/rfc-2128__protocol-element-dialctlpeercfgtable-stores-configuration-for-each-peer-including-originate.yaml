document: rfc-2128
kind: protocol-element
summary: dialCtlPeerCfgTable stores configuration for each peer including originate/answer addresses, subaddress, closed user group, speed, information type, permissions, inactivity timer, min/max call duration, carrier delay, retry counts, and trap enable. A new row requires dialCtlPeerCfgOriginateAddress to be set before becoming active.
section: "3.1"
