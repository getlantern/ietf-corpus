document: rfc-9351
kind: protocol-element
summary: The Flexible Algorithm Prefix Metric TLV (FAPM TLV, Type 1044) is a new optional BGP-LS Attribute TLV associated with the Prefix NLRI. It carries the Flex Algo number, Flags (OSPF only), a Reserved field, and a 4-octet Metric. A Prefix NLRI may include one or more FAPM TLVs for different algorithms.
section: "4"
topics:
