document: rfc-4505
kind: design-rationale
summary: Plain-text password mechanisms using 'anonymous' as username are not permitted in new IETF protocols, necessitating a SASL-based anonymous mechanism. The ANONYMOUS mechanism provides anonymous login without requiring identity disclosure within the SASL framework.
section: "1"
topics:
