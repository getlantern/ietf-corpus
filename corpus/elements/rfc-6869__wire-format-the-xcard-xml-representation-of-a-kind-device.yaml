summary: The xCard (XML) representation of a KIND:device vCard uses the element <kind><text>device</text></kind> within the vcard namespace (urn:ietf:params:xml:ns:vcard-4.0), and may include extension elements from custom namespaces for device-specific attributes like serial number, MAC address, and software version.
