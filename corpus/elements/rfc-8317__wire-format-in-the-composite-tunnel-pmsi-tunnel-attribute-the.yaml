document: rfc-8317
kind: wire-format
summary: In the composite tunnel PMSI Tunnel attribute, the Tunnel Type field has its high-order bit set as the 'composite tunnel' bit; the low-order 7 bits retain the existing tunnel type encoding. The Tunnel Identifier field begins with a 3-octet MPLS label for Ingress Replication, followed by the actual P2MP tunnel identifier.
section: "6.2"
topics:
