document: rfc-2446
kind: protocol-element
summary: 'iTIP defines two calendar user roles: ''Organizer'' (the CU who initiates scheduling and retains full control over the master calendar entry) and ''Attendee'' (the CU invited to participate). Attendees do not make direct changes to the master entry; they may only suggest changes via COUNTER.'
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
