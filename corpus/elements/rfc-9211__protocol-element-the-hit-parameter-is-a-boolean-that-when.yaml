document: rfc-9211
kind: protocol-element
summary: The `hit` parameter is a Boolean that, when true, indicates the request was satisfied from cache without being forwarded. A stale response used without going forward (e.g., because the origin is unavailable) can be considered a hit. `hit` and `fwd` are mutually exclusive.
section: "2.1"
topics:
