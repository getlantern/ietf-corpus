document: rfc-6855
kind: normative-requirement
summary: Implementations that choose to perform message downgrading for legacy clients SHOULD use one of the standardized algorithms provided in RFC 6857 (Post-Delivery Message Downgrading) or RFC 6858 (Simplified POP and IMAP Downgrading).
