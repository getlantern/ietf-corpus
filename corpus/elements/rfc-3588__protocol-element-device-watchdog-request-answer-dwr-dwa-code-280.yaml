document: rfc-3588
kind: protocol-element
summary: Device-Watchdog-Request/Answer (DWR/DWA, Code 280) are used for transport failure detection between peers. The transport failure algorithm uses watchdog messages to detect failures when no traffic is flowing, triggering failover and failback procedures as defined in the Diameter Transport Profile.
section: "5.5"
topics:
    - security
