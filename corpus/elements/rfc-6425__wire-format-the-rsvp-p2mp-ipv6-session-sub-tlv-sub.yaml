summary: 'The RSVP P2MP IPv6 Session sub-TLV (Sub-Type 18, Length 56) carries: P2MP ID (32 bits), MUST Be Zero / Tunnel ID (32 bits), Extended Tunnel ID (128 bits), IPv6 Tunnel Sender Address (128 bits), MUST Be Zero / LSP ID (32 bits). Fields are taken from RFC 4875 IPv6 SESSION and SENDER_TEMPLATE objects.'
