document: rfc-2192
kind: normative-requirement
summary: A program interpreting IMAP URLs MAY cache open connections for re-use. If the URL contains a user name, only connections authenticated as that user may be re-used. If there is no user name or authentication mechanism, only an anonymous connection may be re-used.
section: "3"
rfc2119_level: MAY
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
