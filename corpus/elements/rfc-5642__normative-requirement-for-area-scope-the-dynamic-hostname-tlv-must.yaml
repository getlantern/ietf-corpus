document: rfc-5642
kind: normative-requirement
summary: For area scope, the Dynamic Hostname TLV MUST be carried within an OSPFv2 Type 10 RI LSA or an OSPFv3 RI LSA with the S1 bit set and S2 bit clear. For AS scope, it MUST be carried within an OSPFv2 Type 11 RI LSA or OSPFv3 RI LSA with S1 clear and S2 set.
section: 3.1.1
rfc2119_level: MUST
topics:
    - routing
