document: rfc-1595
kind: state-machine
summary: 'Line AIS state machine: L-AIS defect is detected as a ''111'' pattern in bits 6–8 of K2 byte for five consecutive frames, and terminated when that pattern is absent for five consecutive frames. Line AIS failure is declared when the defect persists 20.5±0.5 s and cleared when absent for 10±0.5 s.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
