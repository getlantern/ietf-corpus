document: rfc-5908
kind: registry
summary: IANA is required to maintain a new number space for NTP time source suboptions in the BOOTP-DHCP Parameters Registry, with initial suboptions NTP_SUBOPTION_SRV_ADDR (1), NTP_SUBOPTION_MC_ADDR (2), and NTP_SUBOPTION_SRV_FQDN (3). Future suboptions require IETF Consensus per RFC 5226.
