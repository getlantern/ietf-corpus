document: rfc-9946
kind: normative-requirement
summary: Congestion MUST be indicated if Status Feedback PDUs show either sequence number anomalies were detected OR the delay range exceeded the upper delay variation threshold. Recommended thresholds are 10 for sequence number gaps, 30 ms lower, and 90 ms upper delay variation.
section: "5.1"
rfc2119_level: MUST
topics:
    - measurement
    - congestion
