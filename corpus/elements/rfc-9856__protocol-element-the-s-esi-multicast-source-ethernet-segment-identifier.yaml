document: rfc-9856
kind: protocol-element
summary: The S-ESI (Multicast Source Ethernet Segment Identifier) is the ESI associated with a redundant G-source. Single-homed G-sources require a dedicated ESI on the upstream PE; multi-homed G-sources use their all-active multi-homing ES as the S-ESI.
section: "1.1"
topics:
    - routing
    - multicast
