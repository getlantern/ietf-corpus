document: rfc-8005
kind: design-rationale
summary: The Rendezvous Server field may include the owner name itself, or be absent; both are semantically equivalent. This handles both the mobile host case (A/AAAA RRs point to the RVS) and the stationary host case (host acts as its own RVS).
section: "4.1"
