document: rfc-3380
kind: interoperability-note
summary: The 'printer-xri-supported' (1setOf collection) attribute can be encoded as a single text string for use in directory schemas (e.g., SLPv2 or LDAPv3) that require single text string values, by using suitable delimiting characters to separate member attributes and collection values.
