document: rfc-7572
kind: normative-requirement
summary: If the SIP-to-XMPP gateway has information about the GRUU of the particular SIP endpoint, it MUST map the sender's address to a full JID (localpart@domainpart/resourcepart) in the 'from' attribute of the XMPP stanza, including the GRUU as the resourcepart.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
