document: rfc-6155
kind: normative-requirement
summary: Requests containing Device identity MUST NOT be authorized under the LCP policy (i.e., policy that permits Devices to acquire their own location) unless specific measures are taken to prevent spoofing of the provided Device identity. The LIS MUST treat requests containing identifiers other than a verified NAI as third-party requests.
section: "1.1"
rfc2119_level: MUST NOT
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
