summary: 'This document defines three MIB modules registered under snmpModules: SNMP-TARGET-MIB (snmpModules 12), SNMP-NOTIFY-MIB (snmpModules 13), and SNMP-PROXY-MIB (snmpModules 14). These modules provide standardized objects for management target configuration, notification configuration/filtering, and proxy forwarding configuration respectively.'
