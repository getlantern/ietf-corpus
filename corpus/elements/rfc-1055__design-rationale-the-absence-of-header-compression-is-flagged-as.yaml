document: rfc-1055
kind: design-rationale
summary: The absence of header compression is flagged as a significant deficiency for dial-up use. At 2400 bps, TCP/IP streams have highly redundant headers across successive packets; a simple incremental-header compression scheme (later addressed by CSLIP/RFC 1144) would substantially increase effective throughput.
section: DEFICIENCIES
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
