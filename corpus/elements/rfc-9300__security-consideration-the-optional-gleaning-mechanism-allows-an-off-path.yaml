document: rfc-9300
kind: security-consideration
summary: The optional gleaning mechanism allows an off-path attacker to spoof the source EID to divert traffic to a victim's spoofed EID, or spoof the source RLOC to mount a DoS attack by redirecting traffic to an overloaded victim RLOC. Gleaning MUST NOT be used over the public Internet.
section: "16"
topics:
    - security
    - ip
