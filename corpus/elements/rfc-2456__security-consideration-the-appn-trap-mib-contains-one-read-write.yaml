document: rfc-2456
kind: security-consideration
summary: The APPN TRAP MIB contains one read-write object, appnTrapControl, which controls notification generation; unauthorized modification could suppress or flood SNMP notifications. The read-only objects do not expose passwords or user data, but network configuration, usage, and performance data may be considered sensitive corporate assets warranting restricted SNMP access.
section: "5"
topics:
    - snmp
    - security
