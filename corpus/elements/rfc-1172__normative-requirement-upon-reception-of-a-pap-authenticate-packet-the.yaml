document: rfc-1172
kind: normative-requirement
summary: Upon reception of a PAP Authenticate packet, the authenticating implementation MUST transmit some type of Authenticate reply (Ack or Nak). The Identifier field in Authenticate-Ack and Authenticate-Nak MUST be copied from the Identifier field of the triggering Authenticate.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
