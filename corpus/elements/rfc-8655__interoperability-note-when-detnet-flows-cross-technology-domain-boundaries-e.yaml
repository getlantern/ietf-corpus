document: rfc-8655
kind: interoperability-note
summary: When DetNet flows cross technology domain boundaries (e.g., IP-to-Ethernet or MPLS-to-Ethernet), a domain-specific Flow-ID must be pushed so that lower-layer nodes can perform per-flow queuing and shaping without deep packet inspection. The means for encoding sequence number information must similarly be mapped or exported when the flow identification method changes.
section: "4.7"
topics:
    - routing
    - mpls
    - ip
