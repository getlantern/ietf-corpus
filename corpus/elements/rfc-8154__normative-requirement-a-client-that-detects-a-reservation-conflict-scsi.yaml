document: rfc-8154
kind: normative-requirement
summary: A client that detects a RESERVATION CONFLICT SCSI status MUST commit all layouts using the storage device through the MDS, return all outstanding layouts for the device, forget the device ID, and unregister the reservation key.
section: 2.4.10.5
rfc2119_level: MUST
topics:
    - security
