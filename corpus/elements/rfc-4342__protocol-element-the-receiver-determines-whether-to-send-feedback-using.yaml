document: rfc-4342
kind: protocol-element
summary: 'The receiver determines whether to send feedback using the window counter: it tracks last_counter (greatest CCVal seen since last feedback). When a data packet arrives with CCVal >= last_counter + 4, a new feedback packet is sent. This replaces the TFRC feedback timer in most cases.'
section: "10.3"
topics:
    - congestion
