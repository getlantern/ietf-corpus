document: rfc-3854
kind: protocol-element
summary: CMS-X.400 messages use SignedData and EnvelopedData content types encapsulated in a ContentInfo SEQUENCE. The X.400 content is placed in the eContent field with its ASN.1 OID in the eContentType field, without MIME wrapping.
