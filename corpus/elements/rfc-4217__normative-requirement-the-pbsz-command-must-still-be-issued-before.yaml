document: rfc-4217
kind: normative-requirement
summary: The PBSZ command MUST still be issued before PROT, but MUST have a parameter of '0' to indicate that no buffering is taking place and the data connection should not be encapsulated, as FTP-TLS operates as a streaming protection mechanism.
section: "9"
rfc2119_level: MUST
topics:
