document: rfc-8015
kind: protocol-element
summary: The Independent Burst/Gap Discard Metrics Block is an RTCP XR block (BT=35) that reports burst/gap discard metrics independently of burst/gap loss metrics. It contains fields for SSRC, Threshold, Sum of Burst Durations, Packets Discarded in Bursts, Number of Bursts, Total Packets Expected in Bursts, and Discard Count. Block Length is fixed at 5 (32-bit words minus one).
