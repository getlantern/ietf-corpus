document: rfc-2453
kind: normative-requirement
summary: For a whole-table Request, split horizon processing MUST be applied before sending the Response. For a specific-entry Request, split horizon processing MUST NOT be applied; entries are returned exactly as they appear in the routing table.
section: 3.9.1
rfc2119_level: MUST
topics:
    - routing
