document: rfc-8227
kind: interoperability-note
summary: In dual-node interconnected rings, the direction of working ring tunnels on both rings SHOULD be the same for any given service LSP. This ensures that in normal state traffic passes only one interconnection node and does not traverse the inter-node link, and that switchover is triggered only when the active interconnection node fails.
section: 4.4.2
topics:
    - mpls
    - routing
