document: rfc-9597
kind: design-rationale
summary: 'This specification corrects an omission relative to JWT/JOSE: RFC 7519 Section 5.3 defined a mechanism for including JWT claims as JOSE header parameters (e.g., to make issuer visible in encrypted JWTs), but no equivalent was standardized for CWT/COSE until this document.'
section: "1"
topics:
