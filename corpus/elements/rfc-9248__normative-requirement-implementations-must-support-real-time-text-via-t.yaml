document: rfc-9248
kind: normative-requirement
summary: Implementations MUST support real-time text via T.140 media per RFC 4102/4103, with one original and two redundant generations at a 300 ms transmission interval. Implementations MUST support RFC 9071 (RTP-Mixer Formatting of Multiparty Real-Time Text), especially for emergency calls.
section: "6.2"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
