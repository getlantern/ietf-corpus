document: rfc-3175
kind: protocol-element
summary: RSVP-E2E-IGNORE is a new IP protocol number (134) used to carry E2E RSVP Path, PathTear, and ResvConf messages through an aggregation region. Interior routers forward these as normal IP datagrams without storing state; deaggregators restore the protocol number to RSVP (46) on exterior egress.
section: "3.1"
topics:
