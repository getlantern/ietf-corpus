summary: 'pktcMtaDevProvState is a read-only integer object tracking the live provisioning state machine: operational(1), waitingForSnmpSetInfo(2), waitingForTftpAddrResponse(3), waitingForConfigFile(4). States 2 and 3 are only reported when the MTA SNMP enrollment mechanism is used.'
