document: rfc-8796
kind: normative-requirement
summary: The received B-SFRR-Ready Extended Association ID contents in the RSVP Resv message MUST match the latest B-SFRR-Ready Extended ASSOCIATION object and Association ID contents that the PLR had sent in the RSVP Path message (except MESSAGE_ID) to constitute a valid acknowledgment.
section: 3.3.1
rfc2119_level: MUST
topics:
