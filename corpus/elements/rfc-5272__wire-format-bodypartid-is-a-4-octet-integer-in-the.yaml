document: rfc-5272
kind: wire-format
summary: BodyPartID is a 4-octet INTEGER in the range 0..4294967295 (bodyIdMax). Value 0 is reserved as reference to the current PKIData object. BodyPartIDs MUST be unique within a single PKIData or PKIResponse but may be duplicated across nesting layers.
