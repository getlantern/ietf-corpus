document: rfc-7208
kind: normative-requirement
summary: The Received-SPF header field MUST appear above all other Received-SPF fields in the message. SPF verifiers MUST ensure it contains no invalid characters, is not excessively long, and contains no malicious data provided by the sender.
section: "9.1"
rfc2119_level: MUST
topics:
