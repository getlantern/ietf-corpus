document: rfc-2157
kind: normative-requirement
summary: 'The registration of an X.400/MIME equivalence MUST supply: the MIME type name (preregistered), X.400 body part, OIDs and ASN.1 syntax if BP15 or FTBP is used, conversion algorithms, and expected effect of ''Conversion prohibited'' / ''Conversion with loss prohibited''; the description must permit independent implementation.'
section: "5.1"
rfc2119_level: MUST
topics:
    - email
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
