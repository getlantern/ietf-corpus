document: rfc-3544
kind: protocol-element
summary: Enhanced RTP-Compression Suboption (Type=2, Length=2) enables RFC 3545 compliant compression, including COMPRESSED_UDP with additional flags and the C flag with FULL_HEADER to indicate HDRCKSUM usage. Sub-option 2 is negotiated instead of, not in addition to, sub-option 1.
section: "2.3"
