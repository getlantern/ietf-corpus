document: rfc-7268
kind: wire-format
summary: Mobility-Domain-Id (Type 177) has a fixed Length of 6 (Type + Length + 4-octet Value). The Value is a 32-bit unsigned integer where the two most significant octets MUST be set to zero; the two least significant octets carry the IEEE 802.11 Mobility Domain Identifier (MDID).
section: "2.5"
topics:
