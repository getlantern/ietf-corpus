document: rfc-4576
kind: design-rationale
summary: The DN bit is placed in the LSA Options field because a distinct tag value could be used in AS-external LSAs but is not available for summary LSAs. Since PEs must function as OSPF area 0 routers and may receive summary LSAs from other PEs, a mechanism applicable to both summary and AS-external LSAs is required.
section: "3"
topics:
