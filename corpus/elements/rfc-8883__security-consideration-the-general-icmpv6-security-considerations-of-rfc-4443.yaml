document: rfc-8883
kind: security-consideration
summary: The general ICMPv6 security considerations of RFC 4443 are applicable. Hosts receiving these errors SHOULD validate that the packet in the ICMP data matches the upper-layer process or connection that generated the original packet before acting on the error.
section: "6"
rfc2119_level: SHOULD
