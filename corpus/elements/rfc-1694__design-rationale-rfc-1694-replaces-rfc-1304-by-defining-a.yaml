document: rfc-1694
kind: design-rationale
summary: RFC 1694 replaces RFC 1304 by defining a MIB module compliant with the SNMPv2 SMI while remaining semantically identical to the RFC 1304 definitions. Many SIP Level 3 objects were deprecated and moved to the MIB-II ifTable because the improved interpretation of the Interfaces Group (RFC 1573) allows them to be represented there without semantic changes; only object identifiers and descriptors changed.
section: "3"
topics:
