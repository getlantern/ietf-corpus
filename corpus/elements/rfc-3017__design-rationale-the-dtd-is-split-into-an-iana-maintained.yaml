document: rfc-3017
kind: design-rationale
summary: The DTD is split into an IANA-maintained extensible part (parameter entity declarations for enumerated attribute lists and information element groupings) and a fixed part (content/structure declarations). This separation allows IANA to extend enumerated values and add elements without altering the fixed structural specification.
