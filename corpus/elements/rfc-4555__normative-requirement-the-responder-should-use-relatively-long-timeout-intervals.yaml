document: rfc-4555
kind: normative-requirement
summary: The responder SHOULD use relatively long timeout intervals when retransmitting IKEv2 requests or deciding whether to initiate Dead Peer Detection; it is suggested that responders continue retransmitting for at least five minutes before giving up.
section: "3.11"
rfc2119_level: SHOULD
topics:
