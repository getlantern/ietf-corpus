document: rfc-6096
kind: design-rationale
summary: RFC 4960 defined a procedure for new chunk types but provided no mechanism to register new chunk flags for existing chunk types. Several protocol extensions under discussion required exactly this capability, motivating RFC 6096 to fill that gap without otherwise changing SCTP.
section: "1"
topics:
    - sctp
    - registry
