document: rfc-1349
kind: protocol-element
summary: 'The TOS field is redefined as a 4-bit enumerated integer (not a set of independent bits): 1000=minimize delay, 0100=maximize throughput, 0010=maximize reliability, 0001=minimize monetary cost, 0000=normal/default service. Computing the logical OR of two TOS values is no longer meaningful.'
