document: rfc-4426
kind: normative-requirement
summary: Signaling MUST be able to provide authentication, integrity, and protection against replay attacks. Privacy and confidentiality are not required; only authentication is required to ensure signaling messages originate from the correct source and have not been modified in transit.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - mpls
