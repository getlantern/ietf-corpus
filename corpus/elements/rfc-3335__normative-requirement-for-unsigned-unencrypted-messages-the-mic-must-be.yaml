document: rfc-3335
kind: normative-requirement
summary: For unsigned, unencrypted messages, the MIC MUST be calculated over message contents prior to Content-Transfer-Encoding and without MIME or RFC 822 headers, since these are sometimes altered or reordered by MTAs.
section: 5.2.1
rfc2119_level: MUST
topics:
