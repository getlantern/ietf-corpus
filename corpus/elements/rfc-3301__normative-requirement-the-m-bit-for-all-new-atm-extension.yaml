document: rfc-3301
kind: normative-requirement
summary: The M-bit for all new ATM extension AVPs (Rx Minimum BPS, Rx Maximum BPS, Service Category, Service Name, Calling Sub-Address, VPI/VCI Identifier) MUST be set to 0; the B Bearer bit in a non-compliant LNS will cause tunnel establishment failure with Result Code 2, Error Code 3.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
