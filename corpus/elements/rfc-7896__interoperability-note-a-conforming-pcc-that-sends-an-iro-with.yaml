document: rfc-7896
kind: interoperability-note
summary: A conforming PCC that sends an IRO with strict hops (L bit unset) to a non-conforming PCE may receive an incorrect path, because the non-conforming PCE interprets all subobjects as loose hops regardless of the L bit.
section: "3"
topics:
