document: rfc-3265
kind: registry
summary: This document establishes the IANA SIP Event Types registry for event packages and event template-packages. Normal event packages are allocated First Come First Served; template-packages require IETF Consensus. Registrations must include the token, type (package or template), contact, and/or published specification. Tokens MUST NOT contain '.'.
