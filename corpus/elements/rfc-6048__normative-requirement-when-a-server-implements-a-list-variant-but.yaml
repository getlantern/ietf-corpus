document: rfc-6048
kind: normative-requirement
summary: When a server implements a LIST variant but does not maintain the corresponding information (e.g., the configuration file does not exist), it MUST return a 503 response code. An empty 215 response indicates the information is maintained but voluntarily empty.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
