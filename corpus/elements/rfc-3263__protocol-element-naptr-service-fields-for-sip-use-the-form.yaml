document: rfc-3263
kind: protocol-element
summary: NAPTR service fields for SIP use the form 'SIP+D2X' and 'SIPS+D2X', where D2U maps to UDP, D2T to TCP, and D2S to SCTP. These records map a domain to the SRV record for a specific transport protocol.
