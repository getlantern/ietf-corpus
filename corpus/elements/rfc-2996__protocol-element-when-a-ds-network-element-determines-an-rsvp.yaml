document: rfc-2996
kind: protocol-element
summary: When a DS network element determines an RSVP request is admissible, it adds a DCLASS object containing one or more DSCPs corresponding to the appropriate behavior aggregate to the RESV message, which is then forwarded upstream toward the RSVP sender. If the request is not admissible, a RESV error message is sent toward the receiver with no DCLASS object required.
section: "1.1"
topics:
    - qos
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
