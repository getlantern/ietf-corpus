document: rfc-4601
kind: state-machine
summary: The upstream (S,G,rpt) triggered-message state machine has states RPTNotJoined(G), NotPruned(S,G,rpt), and Pruned(S,G,rpt), with an Override Timer (OT) controlling when Prune(S,G,rpt) override messages are sent in response to upstream peers' Join/Prune messages on multi-access LANs.
