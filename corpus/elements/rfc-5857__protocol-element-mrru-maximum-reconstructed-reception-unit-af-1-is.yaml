document: rfc-5857
kind: protocol-element
summary: MRRU (Maximum Reconstructed Reception Unit, AF=1) is an optional 2-octet attribute specifying the largest unit (in octets) the decompressor can reassemble from ROHC segments, including CRC and ROHC ICV. If MRRU is 0 or absent, segment headers MUST NOT be transmitted.
section: 3.1.2
topics:
    - ipsec
    - vpn
