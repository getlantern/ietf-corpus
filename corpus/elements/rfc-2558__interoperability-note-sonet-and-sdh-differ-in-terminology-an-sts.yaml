document: rfc-2558
kind: interoperability-note
summary: 'SONET and SDH differ in terminology: an STS (SONET) is called an STM (SDH); an SPE and VT are collectively a Virtual Container (VC) in SDH. SONET performance monitoring terminology is defined in ANSI T1.231; equivalent SDH terms are in CCITT G.783. If this document''s definitions conflict with T1.231, implementers must follow this document.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
