document: rfc-8663
kind: normative-requirement
summary: When encapsulating an SR-MPLS packet in an IP tunnel capable of encoding entropy (such as MPLS-over-UDP), the entropy field (UDP source port) MAY be filled with a value generated by the encapsulator to uniquely identify a flow.
section: 3.2.3
rfc2119_level: MAY
topics:
