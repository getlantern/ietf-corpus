document: rfc-6147
kind: protocol-element
summary: DNS64 is a logical function that synthesizes AAAA resource records from A records. It creates synthetic AAAA RRs whose RDATA contains an IPv6 representation of the IPv4 address, algorithmically derived using a configured prefix (Pref64::/n). DNS64 may be implemented in a stub resolver, recursive resolver, or authoritative name server.
section: "2"
topics:
