summary: 'IEEE 802.16 provides two convergence sublayer options for Ethernet: the Ethernet-specific part of the packet CS, which classifies packets by Ethernet header fields and assigns them to service flows, and the Generic Packet Convergence Sublayer (GPCS), which relies on higher-layer functionality for packet-to-service-flow assignment.'
