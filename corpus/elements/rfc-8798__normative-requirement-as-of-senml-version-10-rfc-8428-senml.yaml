document: rfc-8798
kind: normative-requirement
summary: As of SenML version 10 (RFC 8428), SenML packs are limited to using primary units in 'u' fields. The use of primary units enables direct comparison of measurements from different sources and simplifies implementations that trigger on the presence of a quantity in a certain unit.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
