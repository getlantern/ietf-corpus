document: rfc-4108
kind: normative-requirement
summary: The bootstrap loader MUST reject a firmware package load if it contains a dependency on a firmware package that is not already loaded, and MUST also reject if the load would leave any existing firmware package's dependencies unsatisfied.
section: "1.3"
rfc2119_level: MUST
