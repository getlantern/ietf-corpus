document: rfc-9305
kind: registry
summary: IANA created the 'LISP-GPE Next Protocol' registry of 8-bit values. Initial entries include Reserved (0x00), IPv4 (0x01), IPv6 (0x02), Ethernet (0x03), NSH (0x04), experimentation ranges (0x7E-0x7F, 0xFE-0xFF), and unassigned shim header range (0x80-0xFD). New values require Specification Required policy.
section: "6.1"
topics:
    - registry
    - ip
