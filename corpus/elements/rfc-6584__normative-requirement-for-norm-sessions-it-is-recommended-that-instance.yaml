document: rfc-6584
kind: normative-requirement
summary: For NORM sessions, it is RECOMMENDED that instance_id be changed for each NORM instance when a host participates in multiple sessions. When Group-keyed MAC is used, it is RECOMMENDED that the shared group key be changed across sessions.
section: 7.2.2
rfc2119_level: RECOMMENDED
topics:
