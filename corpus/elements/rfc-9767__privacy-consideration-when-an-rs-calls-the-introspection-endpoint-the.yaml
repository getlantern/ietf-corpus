document: rfc-9767
kind: privacy-consideration
summary: When an RS calls the introspection endpoint, the AS learns which tokens are being used at which RSs, enabling the AS to infer end-user behavior patterns that it would not otherwise observe. This is an inherent disclosure in the introspection model.
section: "7.2"
topics:
    - privacy
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
