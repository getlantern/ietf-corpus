document: rfc-8011
kind: normative-requirement
summary: When an IPP object receives a request to perform an operation it does not support, it MUST return the 'server-error-operation-not-supported' status-code. Before using an OPTIONAL operation, a Client SHOULD first query the Printer's 'operations-supported' attribute via the REQUIRED Get-Printer-Attributes operation.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
