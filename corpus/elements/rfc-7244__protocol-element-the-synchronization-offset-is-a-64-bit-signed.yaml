document: rfc-7244
kind: protocol-element
summary: The Synchronization Offset is a 64-bit signed NTP-format timestamp computed as D(i,j) = (Rj - Ri) - (Sj - Si), where S denotes NTP send timestamps and R denotes NTP arrival timestamps. A positive value means the reporting stream leads the reference stream; negative means it lags; zero identifies the reference stream itself.
section: "4.2"
