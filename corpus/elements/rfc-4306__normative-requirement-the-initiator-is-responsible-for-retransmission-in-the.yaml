document: rfc-4306
kind: normative-requirement
summary: The initiator is responsible for retransmission in the event of a timeout; the responder MUST never retransmit a response unless it receives a retransmission of the corresponding request. The initiator MUST remember each request until it receives the corresponding response; the responder MUST remember each response until it receives a request with a sufficiently larger sequence number.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
