document: rfc-2301
kind: normative-requirement
summary: 'Profile S imposes a strict file ordering: IFDs SHALL appear in page order; each IFD SHALL precede the image data it references; image data SHALL appear in page order; and each page SHALL be contained in a single strip. XResolution and YResolution long values SHALL be placed immediately after their IFD and before that page''s image data.'
section: "3.5"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
