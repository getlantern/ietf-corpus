document: rfc-1233
kind: protocol-element
summary: Coding Violation (CV) for DS3 is a P-bit Parity Error event. For C-Bit Parity applications it also includes CP-Bit parity violations; for SYNTRAN applications it also includes received CRC-9 code mismatches. Bipolar Violations (BPV) for B3ZS-coded signals are violations not part of a zero-substitution code.
section: "4.3"
