document: rfc-3551
kind: interoperability-note
summary: Some implementations of G726 payload formats packed samples into octets starting with the most significant bit rather than the least significant bit as specified. To resolve this, AAL2-G726-16/24/32/40 payload formats with MSB packing will be specified separately; static payload type 2 (G726-32) is deprecated.
section: 4.5.4
topics:
