document: rfc-4291
kind: normative-requirement
summary: Multicast addresses must not be used as source addresses in IPv6 packets or appear in any Routing header. Routers must not forward multicast packets beyond the scope indicated by the scop field in the destination address.
section: "2.7"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
