document: rfc-4253
kind: protocol-element
summary: The defined compression methods are 'none' (REQUIRED, no compression) and 'zlib' (OPTIONAL, ZLIB/LZ77 compression per RFC 1950/1951). The zlib compression context is initialized after each key exchange and passed between packets with a partial flush at each packet boundary.
section: "6.2"
topics:
