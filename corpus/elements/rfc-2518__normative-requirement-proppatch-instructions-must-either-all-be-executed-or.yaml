document: rfc-2518
kind: normative-requirement
summary: PROPPATCH instructions MUST either all be executed or none executed (atomic). If any error occurs during processing, all executed instructions MUST be undone and a proper error result returned. Instructions MUST be processed in the order received.
section: "8.2"
rfc2119_level: MUST
