document: rfc-7163
kind: normative-requirement
summary: The designated expert for 'sos' sub-service URN registrations should only approve services that are used for emergency purposes, are offered in at least one country, do not duplicate an existing 'sos' service URN, and whose service description and URN are defined as broadly as possible to encourage reuse.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - registry
    - security
