document: rfc-9616
kind: design-rationale
summary: The protocol is explicitly applicable only where symmetric delay is a good predictor of link quality. It is inapplicable in networks that need to distinguish between very low-latency links (all below rtt-min are treated equally) or in networks with high node mobility, where the slow-reacting hysteresis causes prolonged suboptimal routing.
section: "1.1"
topics:
