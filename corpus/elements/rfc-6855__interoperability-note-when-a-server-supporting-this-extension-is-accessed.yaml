document: rfc-6855
kind: interoperability-note
summary: When a server supporting this extension is accessed by a legacy client that does not enable UTF-8 capability, the server may hide problematic messages, create surrogate messages, or provide notifications. Surrogate messages cannot serve as actual substitutes and may break digital signatures and UIDVALIDITY assumptions.
section: "7"
topics:
