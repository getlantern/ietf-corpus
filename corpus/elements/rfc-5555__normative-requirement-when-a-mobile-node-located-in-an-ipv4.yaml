document: rfc-5555
kind: normative-requirement
summary: When a mobile node located in an IPv4-only network sends a Mobile Prefix Solicitation, it MUST use its IPv6 home address in the source address field of the IPv6 packet (in addition to the home address option), because it has no IPv6 address assigned by the local network.
section: "2.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
