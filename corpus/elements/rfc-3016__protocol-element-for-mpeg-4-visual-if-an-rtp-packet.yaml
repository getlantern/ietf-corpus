document: rfc-3016
kind: protocol-element
summary: For MPEG-4 Visual, if an RTP packet contains only visual_object_sequence_end_code, the timestamp of the immediately preceding VOP in coding order is used; if it contains only configuration information or GoVOP fields, the timestamp of the next VOP is used.
