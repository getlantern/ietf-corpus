document: rfc-6336
kind: design-rationale
summary: RFC 5245 defined ICE options for extensibility but omitted an IANA registry. This document creates the missing registry, triggered by a new ICE option being developed for ECN for RTP, which required a registration mechanism to ensure non-conflicting identifiers.
section: "1"
topics:
