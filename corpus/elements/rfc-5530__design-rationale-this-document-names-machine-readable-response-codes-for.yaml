document: rfc-5530
kind: design-rationale
summary: This document names machine-readable response codes for IMAP errors that were previously described only in human-readable English text. The goal is better interoperation and error reporting, allowing clients to distinguish error categories (e.g., server-side temporary failure vs. bad password) without attempting to parse free-form text.
