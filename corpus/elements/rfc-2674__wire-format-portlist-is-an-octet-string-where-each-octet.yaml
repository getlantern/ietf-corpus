kind: wire-format
summary: 'PortList is an OCTET STRING where each octet encodes eight ports: the first octet covers ports 1–8, the second ports 9–16, etc. Within each octet the most significant bit represents the lowest-numbered port; a bit value of ''1'' means the port is included in the set.'
