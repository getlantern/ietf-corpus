document: rfc-3284
kind: normative-requirement
summary: In the instructions array, if the first delta instruction of a code entry is not NOOP and its table size is zero, then size1 MUST be present as the next integer; otherwise size1 MUST be omitted. The same rule applies to size2 for the second instruction.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
