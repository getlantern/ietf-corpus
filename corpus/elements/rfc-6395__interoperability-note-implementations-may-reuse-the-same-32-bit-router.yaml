document: rfc-6395
kind: interoperability-note
summary: Implementations MAY reuse the same 32-bit router identifier used by BGP (RFC 4271) or OSPFv2 (RFC 2328) as the PIM Router Identifier, provided stability and uniqueness requirements of the PIM protocols using it are met.
