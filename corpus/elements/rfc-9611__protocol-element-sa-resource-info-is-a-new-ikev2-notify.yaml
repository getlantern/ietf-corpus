document: rfc-9611
kind: protocol-element
summary: SA_RESOURCE_INFO is a new IKEv2 Notify Message Status Type (value 16444) that signals the initiator's intent to negotiate a logical group of Child SAs bound to specific resources (e.g., CPUs) sharing the same Traffic Selectors. A responder willing to support this also echoes the notify, optionally with a non-zero Notification Data identifying its own resource.
section: "3"
topics:
