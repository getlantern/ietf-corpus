document: rfc-3630
kind: protocol-element
summary: The Administrative Group sub-TLV (type 9, 4 octets) is a bitmask where each bit represents an administrative group (also called Resource Class or Color). Bit 0 (LSB) is group 0, bit 31 (MSB) is group 31. A link may belong to multiple groups.
section: 2.5.9
topics:
