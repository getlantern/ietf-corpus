document: rfc-4619
kind: normative-requirement
summary: Frame relay PWs that consume more than their fair share in the presence of services that reduce transmission rate SHOULD be halted. Whenever possible, frame relay PWs should run over traffic-engineered PSNs providing bandwidth allocation and admission control.
section: "9"
rfc2119_level: SHOULD
topics:
    - mpls
    - congestion
    - qos
