document: rfc-6363
kind: normative-requirement
summary: FEC source packets MUST contain information (the Source FEC Payload ID) that identifies the source block and the position of the ADU within the source block. This MAY be encoded into an Explicit Source FEC Payload ID field appended to the source packet, or MAY be derived from other packet fields as defined by the FEC scheme.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
