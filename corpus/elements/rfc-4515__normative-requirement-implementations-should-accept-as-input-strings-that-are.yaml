document: rfc-4515
kind: normative-requirement
summary: Implementations SHOULD accept as input strings that are not valid UTF-8 strings. This is necessary because RFC 2254 did not clearly define the term 'string representation' and did not specify that the string representation must be UTF-8-encoded Unicode characters.
section: "3"
rfc2119_level: SHOULD
topics:
    - ldap
    - security
