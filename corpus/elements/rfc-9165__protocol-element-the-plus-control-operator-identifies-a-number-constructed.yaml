document: rfc-9165
kind: protocol-element
summary: The .plus control operator identifies a number constructed by adding the numeric values of the target and the controller. If target and controller are of mixed numeric types (float and integer), the sum is converted to the type of the target; converting from float to integer selects the floor.
section: "2.1"
