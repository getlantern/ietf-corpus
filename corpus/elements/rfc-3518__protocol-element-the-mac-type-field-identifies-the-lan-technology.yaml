document: rfc-3518
kind: protocol-element
summary: 'The MAC Type field identifies the LAN technology and address bit ordering: values 1-4 cover IEEE 802.3/Ethernet (canonical), 802.4 (canonical), 802.5 (non-canonical), and FDDI (non-canonical); values 11 and 12 cover 802.5 and FDDI with canonical addresses for backward compatibility.'
section: "4.2"
