document: rfc-6955
kind: interoperability-note
summary: The OID id-dhPop-static-sha1-hmac-sha1 has the same value as id-dh-sig-hmac-sha1 (id-pkix id-alg 6.3) defined in the predecessor RFC 2875; similarly id-alg-dhPop-sha1 equals id-alg-dh-pop (6.4). New names were assigned for consistency while preserving backward compatibility.
section: "4.1"
topics:
