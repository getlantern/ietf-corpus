document: rfc-3776
kind: normative-requirement
summary: If anti-replay protection is required, dynamic keying MUST be used, since IPsec can only provide anti-replay protection when dynamic keying is employed; the combination of dynamic keying, IPsec anti-replay, and Mobile IPv6 sequence numbers is needed to prevent replay and reordering attacks.
section: "4.4"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
