document: rfc-5374
kind: protocol-element
summary: A Group Security Association (GSA) is a collection of one or more IPsec SAs plus one or more GKM SAs required for a Group Member to receive key updates. It represents the working policy for a group and may include concurrent SAs to support re-key rollover continuity.
section: "4.2"
topics:
    - ipsec
    - multicast
