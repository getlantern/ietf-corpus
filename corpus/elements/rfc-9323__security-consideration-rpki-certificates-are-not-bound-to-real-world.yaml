document: rfc-9323
kind: security-consideration
summary: RPKI certificates are not bound to real-world identities (per RFC 9255). RPs can only associate real-world entities to Internet Number Resources by additionally consulting an exogenous authority. RSCs communicate assertions signed with Internet Number Resources but do not convey the identity of the resource holder.
section: "8"
topics:
    - security
    - pkix
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
