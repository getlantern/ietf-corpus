document: rfc-6270
kind: wire-format
summary: 'The normative ABNF syntax for ''tn3270'' URIs is: tn3270-uri = "tn3270:" "//" authority ["/"], where <authority> is defined in RFC 3986. The userinfo and port components are optional.'
