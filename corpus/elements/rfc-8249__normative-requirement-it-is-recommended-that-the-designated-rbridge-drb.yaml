document: rfc-8249
kind: normative-requirement
summary: It is RECOMMENDED that the Designated RBridge (DRB) take responsibility for MTU testing, and multicast MTU-probes SHOULD be used instead of unicast when multiple RBridges on the link are desired to respond with MTU-ack.
section: "3"
rfc2119_level: RECOMMENDED
