document: rfc-7925
kind: normative-requirement
summary: It MUST be ensured that a different key pair is provisioned for each device and installed in as secure a manner as possible. Generating public/private keys on the IoT device itself is preferable to generating them externally.
section: "4.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
