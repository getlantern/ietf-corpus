document: rfc-5779
kind: protocol-element
summary: Mobile-Node-Identifier AVP (AVP Code 506) is of type UTF8String and carries the MN-Identifier in NAI format. The MAG MUST use the received MN-Identifier if it has no other means to obtain it, but MUST silently discard it if it already has a valid mobile node identifier.
section: "5.6"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
