summary: 'Two RTCP mechanisms serve different roles: the AVPF feedback packet (Section 5.1) provides low-latency but less reliable per-event notification of ECN-CE marks, while the XR Summary Report (Section 5.2) provides reliable cumulative reporting using independent counters unaffected by RTCP packet loss.'
