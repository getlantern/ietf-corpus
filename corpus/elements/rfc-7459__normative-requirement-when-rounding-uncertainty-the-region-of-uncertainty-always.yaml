document: rfc-7459
kind: normative-requirement
summary: When rounding uncertainty, the region of uncertainty always increases (errors rounded up) and confidence is always rounded down, per NIST guidelines. Manipulation of uncertainty is therefore non-reversible.
section: "5"
rfc2119_level: MUST
