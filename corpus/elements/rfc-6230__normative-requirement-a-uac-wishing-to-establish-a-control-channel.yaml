document: rfc-6230
kind: normative-requirement
summary: A UAC wishing to establish a Control Channel MUST construct and transmit a new SIP INVITE request. The SDP payload MUST contain only a single Control Channel definition using MIME type application/cfw, and the Connection Data 'c=' line MUST use nettype 'IN' and addrtype 'IP4' or 'IP6'.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
