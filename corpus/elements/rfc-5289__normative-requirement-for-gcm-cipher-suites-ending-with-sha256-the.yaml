document: rfc-5289
kind: normative-requirement
summary: For GCM cipher suites ending with _SHA256, the PRF SHALL be the TLS PRF with SHA-256; for those ending with _SHA384, the PRF SHALL use SHA-384. GCM is used as described in RFC 5288.
section: "3.2"
rfc2119_level: REQUIRED
topics:
