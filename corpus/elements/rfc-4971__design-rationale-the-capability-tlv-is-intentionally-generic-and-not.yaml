document: rfc-4971
kind: design-rationale
summary: The CAPABILITY TLV is intentionally generic and not limited to MPLS Traffic Engineering; it provides a reusable mechanism for routers to announce capabilities within an IS-IS level or the entire routing domain, with sub-TLV definitions left to application-specific documents.
