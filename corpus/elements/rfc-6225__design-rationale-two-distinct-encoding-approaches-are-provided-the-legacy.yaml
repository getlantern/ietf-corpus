document: rfc-6225
kind: design-rationale
summary: 'Two distinct encoding approaches are provided: the legacy DHCPv4 GeoConf Option 123 (from RFC 3825) uses resolution fields indicating valid bit counts, while the new DHCPv4 GeoLoc Option 144 and DHCPv6 GeoLoc Option 63 use logarithmically-encoded uncertainty distances that map directly to PIDF-LO without unbounded uncertainty increase.'
