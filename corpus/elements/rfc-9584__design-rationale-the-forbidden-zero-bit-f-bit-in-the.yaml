document: rfc-9584
kind: design-rationale
summary: 'The forbidden_zero_bit (F bit) in the NAL unit header, originally required to be zero in EVC for MPEG-2 transport start-code avoidance, is repurposed in this RTP payload format: a value of 1 signals a syntax violation, such as a reassembled NAL unit whose final fragment was lost, allowing downstream components to identify and discard corrupt units.'
section: 1.1.4
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
