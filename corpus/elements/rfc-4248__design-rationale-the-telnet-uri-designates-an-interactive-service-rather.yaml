document: rfc-4248
kind: design-rationale
summary: 'The telnet URI designates an interactive service rather than a data object. Because remote interactive services vary widely in how they allow remote logins, the <user> and <password> supplied in the URI are advisory only: clients merely advise the user of the suggested username and password.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
