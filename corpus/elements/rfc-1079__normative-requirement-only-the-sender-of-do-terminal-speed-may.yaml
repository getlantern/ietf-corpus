document: rfc-1079
kind: normative-requirement
summary: Only the sender of DO TERMINAL-SPEED may send SEND requests (IAC SB TERMINAL-SPEED SEND IAC SE), and only the sender of WILL TERMINAL-SPEED may transmit actual speed information (IAC SB TERMINAL-SPEED IS ... IAC SE).
section: "4"
rfc2119_level: MUST
