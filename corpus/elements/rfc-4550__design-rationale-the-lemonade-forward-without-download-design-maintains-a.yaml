document: rfc-4550
kind: design-rationale
summary: The Lemonade 'forward without download' design maintains a single submission protocol (SMTP/SUBMIT), avoiding parallel divergent submission mechanisms. This also allows SMTP SUBMIT extensions to be reused without adding them to IMAP, and the approach remains compatible with future retrieval protocols beyond IMAP.
section: "2.1"
