document: rfc-3038
kind: design-rationale
summary: VCID notification procedures are categorized as inband (messages forwarded over the VC to which they refer) or outband (messages forwarded over a different connection). The choice of procedure depends on the VC type (transparent point-to-point, VP, PVC, or SVC) and the signaling capabilities available.
