kind: protocol-element
summary: srhSegmentIPv6 (ElementID 494) is a 128-bit ipv6Address IPFIX IE representing one SRv6 segment from the SRH Segment List. It is a generic field intended for use in IPFIX Options Templates or Structured Data contexts, not standalone per-flow records.
