document: rfc-5956
kind: security-consideration
summary: There is a weak threat that FEC grouping in SDP can be modified to indicate FEC relationships that do not exist, potentially causing FEC to fail to protect or mishandle media payload streams. The receiver SHOULD perform an integrity check on SDP and only trust SDP from trusted sources.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
