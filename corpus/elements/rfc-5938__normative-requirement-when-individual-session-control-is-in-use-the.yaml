document: rfc-5938
kind: normative-requirement
summary: When Individual Session Control is in use, the Server SHALL suspend SERVWAIT timer monitoring after receiving any Start-N-Sessions command. SERVWAIT monitoring SHALL resume after Stop-N-Sessions is received for all corresponding SIDs (with no sessions in progress), or when REFWAIT expires on all test sessions.
section: "3.6"
rfc2119_level: SHOULD
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
