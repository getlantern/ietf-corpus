document: rfc-6806
kind: protocol-element
summary: In server referrals, when the canonicalize flag is set and the principal is not found locally, the KDC MAY return a cross-realm TGT (referral TGT) to the next hop on the trust path. The server name of the returned ticket will differ from the server name in the request.
section: "8"
topics:
    - security
    - routing
