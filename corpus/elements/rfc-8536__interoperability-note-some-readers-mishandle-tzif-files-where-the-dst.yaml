document: rfc-8536
kind: interoperability-note
summary: Some readers mishandle TZif files where the DST UT offset is less than the standard UT offset (e.g., Ireland's IST/GMT pattern). A workaround is to swap the standard and DST designations, which preserves UT offsets and abbreviations at the cost of mislabeling which period is DST.
section: A
topics:
    - measurement
