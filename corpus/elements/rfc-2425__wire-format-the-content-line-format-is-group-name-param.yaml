document: rfc-2425
kind: wire-format
summary: 'The content line format is: [group "."] name *(";", param) ":" value CRLF. The ''group'' is alphanumeric, ''name'' is an IANA token or x-name, and ''param'' is param-name "=" param-value *(, param-value). Type names and parameter names are case insensitive.'
section: 5.8.2
topics:
    - email
