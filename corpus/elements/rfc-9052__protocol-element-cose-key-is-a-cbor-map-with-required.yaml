document: rfc-9052
kind: protocol-element
summary: 'COSE_Key is a CBOR map with required field kty (label 1, identifies key family) and optional fields: kid (label 2, bstr), alg (label 3, restricts usage to one algorithm), key_ops (label 4, array of permitted operations from ten defined values), and Base IV (label 5, bstr). COSE_KeySet is a CBOR array of one or more COSE_Key objects.'
