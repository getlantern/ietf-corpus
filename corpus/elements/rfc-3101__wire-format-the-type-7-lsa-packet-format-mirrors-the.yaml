document: rfc-3101
kind: wire-format
summary: 'The Type-7 LSA packet format mirrors the Type-5 AS-external-LSA format: a standard link-state header with LS type=7, followed by Network Mask (32 bits), per-TOS metric fields with E-bit (1 bit) and TOS/metric, a Forwarding Address (32 bits), and an External Route Tag (32 bits). The Options field in the header carries the N/P bit.'
section: Appendix C
topics:
    - routing
