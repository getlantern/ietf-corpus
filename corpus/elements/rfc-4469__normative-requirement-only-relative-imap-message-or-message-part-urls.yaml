document: rfc-4469
kind: normative-requirement
summary: Only relative IMAP message or message part URLs (those having no scheme or <iserver>) are used in the extended APPEND command. Absolute IMAP URLs or URLs referring to resources outside the current authenticated session are outside the scope of this document; a conforming server returns NO to such requests.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
