document: rfc-4737
kind: security-consideration
summary: Passive measurement may require temporarily storing user payloads for length analysis; suitable precautions MUST be taken to keep this information safe and confidential. In most cases, a hashing function will produce a value suitable for payload comparisons without retaining the payload itself.
section: "8.2"
rfc2119_level: MUST
topics:
    - security
    - privacy
    - measurement
