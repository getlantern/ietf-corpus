document: rfc-4532
kind: design-rationale
summary: This operation is intended to replace RFC 3829 Authorization Identity Controls because Bind request/response controls are not protected by the security layers established by the Bind operation that includes them. An extended operation sent after a Bind is protected by those security layers.
section: "1"
topics:
