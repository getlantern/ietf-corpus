document: rfc-9024
kind: normative-requirement
summary: When a PE receives a packet from the service proxy function, it MUST handle the packet as defined in RFC 8964. When a PE receives an MPLS packet from a remote PE and the top label is a DetNet S-Label advertised by this node, the PE MUST forward the packet according to the configured DetNet service and forwarding sub-layer rules.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
