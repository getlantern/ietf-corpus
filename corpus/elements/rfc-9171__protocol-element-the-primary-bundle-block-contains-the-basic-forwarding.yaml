document: rfc-9171
kind: protocol-element
summary: 'The primary bundle block contains the basic forwarding information and SHALL be represented as a CBOR array of 8, 9, 10, or 11 elements depending on whether a CRC is present and whether the bundle is a fragment. Its fields in order are: Version, Bundle Processing Control Flags, CRC Type, Destination EID, Source Node ID, Report-to EID, Creation Timestamp, Lifetime, and optionally Fragment Offset, Total ADU Length, and CRC.'
section: 4.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
