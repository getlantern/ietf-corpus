document: rfc-1982
kind: design-rationale
summary: RFC 1034 and RFC 1035 referenced 'sequence space arithmetic' from TCP (IEN-74), but IEN-74's definition was inadequate for DNS because it provided no general comparison operator. This document supplies the missing definition rather than relying on the TCP precedent.
