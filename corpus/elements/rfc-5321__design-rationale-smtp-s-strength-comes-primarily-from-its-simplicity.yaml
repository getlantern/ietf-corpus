document: rfc-5321
kind: design-rationale
summary: SMTP's strength comes primarily from its simplicity. Experience with many protocols has shown that protocols with few options tend toward ubiquity, whereas protocols with many options tend toward obscurity. Each extension must be carefully scrutinized with respect to implementation, deployment, and interoperability costs.
section: 2.2.1
