document: rfc-3898
kind: security-consideration
summary: A rogue DHCPv6 server may assign invalid NIS parameters via these options, causing clients to be unable to use NIS service or to send queries to an attacker-controlled NIS/NIS+ server, enabling spoofing of NIS/NIS+ names. Invalid domain name options can also redirect searches through attacker-controlled domains.
section: "8"
topics:
