document: rfc-7623
kind: protocol-element
summary: Multi-destination frames are PBB-encapsulated with the site B-MAC as source and a multicast B-MAC destination selected per I-SID as defined in IEEE 802.1Q PBB. The MPLS forwarder then uses either ingress replication over MP2P/P2P LSPs or P2MP/MP2MP tunnel LSPs.
section: 6.4.2
topics:
    - mpls
    - routing
    - multicast
