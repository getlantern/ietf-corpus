document: rfc-3023
kind: design-rationale
summary: The '+xml' suffix was chosen over alternatives such as a new subtree, a new top-level type, content sniffing, or MIME parameters because it works within existing MIME registration trees, requires no changes to sending agents, and allows both opaque and generic XML processing to coexist. The '+' character was selected because it semantically conveys that a type is simultaneously both the specific format and XML.
section: A
