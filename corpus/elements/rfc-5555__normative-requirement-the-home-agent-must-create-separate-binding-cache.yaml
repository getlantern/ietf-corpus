document: rfc-5555
kind: normative-requirement
summary: The home agent MUST create separate binding cache entries for each of the mobile node's home addresses (IPv4 and IPv6), and all entries MUST point to the mobile node's care-of address included in the binding update.
section: 2.3.2.1
rfc2119_level: MUST
