document: rfc-3284
kind: wire-format
summary: 'Each Window section begins with a Win_Indicator byte: bit 0 (VCD_SOURCE) indicates the source window came from the source file; bit 1 (VCD_TARGET) indicates the source window came from an earlier part of the target file. If either bit is set, two integers follow giving source segment length and position.'
section: "4.2"
extracted_by: claude-sonnet-4-6
