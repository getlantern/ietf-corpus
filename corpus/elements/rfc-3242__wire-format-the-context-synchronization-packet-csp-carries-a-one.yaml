document: rfc-3242
kind: wire-format
summary: The Context Synchronization Packet (CSP) carries a one-octet packet type identifier (0xFA = 11111010) followed by a ROHC header without padding as defined in RFC 3095 section 5.7. It maintains the updating properties of the encapsulated ROHC header.
