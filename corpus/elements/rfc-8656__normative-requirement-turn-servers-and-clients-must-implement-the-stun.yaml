document: rfc-8656
kind: normative-requirement
summary: TURN servers and clients MUST implement the STUN long-term credential mechanism defined in RFC 8489. If the server requires authentication, Allocate requests MUST be authenticated via the long-term credential mechanism or the STUN Third-Party Authorization extension (RFC 7635).
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - security
