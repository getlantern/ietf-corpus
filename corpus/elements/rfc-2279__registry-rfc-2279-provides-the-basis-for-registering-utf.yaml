document: rfc-2279
kind: registry
summary: RFC 2279 provides the basis for registering 'UTF-8' as a MIME charset parameter value per the IANA Charset Registration Procedures (BCP 19, RFC 2278). The label applies to text containing characters from ISO/IEC 10646 including all amendments through at least Amendment 5, encoded in UTF-8.
