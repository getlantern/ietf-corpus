document: rfc-8632
kind: normative-requirement
summary: The entry with the latest timestamp in the status-change list MUST correspond to the 'is-cleared', 'perceived-severity', and 'alarm-text' leaves of the alarm. The /alarm-list/alarm/last-changed MUST be set to the same value as the time of the state change.
section: "6"
rfc2119_level: MUST
