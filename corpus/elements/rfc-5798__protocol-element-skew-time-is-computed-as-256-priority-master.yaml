document: rfc-5798
kind: protocol-element
summary: Skew_Time is computed as ((256 − priority) × Master_Adver_Interval) / 256 centiseconds. Master_Down_Interval is (3 × Master_Adver_Interval) + Skew_Time, ensuring higher-priority Backups time out sooner and win elections.
section: "6.1"
topics:
    - routing
