document: rfc-8866
kind: security-consideration
summary: Intermediary modification of SDP (e.g., by middleboxes opening NAT pinholes or firewall rules) is NOT RECOMMENDED unless the intermediary can verify the authenticity and authority of the session description. Use of ICE (RFC 8445) may avoid the need for such modifications.
section: "7"
topics:
    - realtime
    - security
    - nat
