document: rfc-5452
kind: protocol-element
summary: 'DNS data is to be accepted by a resolver if and only if: (1) the question section of the reply is equivalent to that of an outstanding query, (2) the ID field matches, (3) the response comes from the same network address to which the question was sent, and (4) the response arrives on the same address and port from which the question was sent. The first response matching all four conditions is accepted.'
section: "3"
topics:
    - dns
    - security
