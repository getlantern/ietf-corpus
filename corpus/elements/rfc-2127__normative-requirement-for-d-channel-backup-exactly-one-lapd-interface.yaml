document: rfc-2127
kind: normative-requirement
summary: For D channel backup, exactly one LAPD interface must be designated primary via isdnLapdPrimaryChannel; inactive backup LAPD interfaces must have ifOperStatus of dormant(5). The controlling signaling entry is layered over all attached LAPD interfaces via ifStackTable.
section: 3.4.3
rfc2119_level: MUST
topics:
    - snmp
