document: rfc-4755
kind: protocol-element
summary: IPoIB-CM extends the IPoIB link-layer address format from '<1 octet reserved>:QP:GID' to '<Flags>:QPN:GID', where the Flags octet indicates connected modes supported (RC in bit 0, UC in bit 1).
