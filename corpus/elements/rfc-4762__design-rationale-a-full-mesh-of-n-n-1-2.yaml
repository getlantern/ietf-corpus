document: rfc-4762
kind: design-rationale
summary: A full mesh of n*(n-1)/2 PWs creates packet replication overhead that limits large-scale deployment. Hierarchical VPLS (H-VPLS) using hub-and-spoke PWs reduces both signaling overhead and replication requirements by aggregating access devices through bridging-capable MTU-s nodes.
section: "10"
topics:
