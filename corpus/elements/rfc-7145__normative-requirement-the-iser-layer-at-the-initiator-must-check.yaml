document: rfc-7145
kind: normative-requirement
summary: The iSER layer at the initiator MUST check that STag invalidation has occurred when Send with Invalidate is the expected invalidation mechanism, and MUST explicitly invalidate the STag if it has not yet been invalidated (e.g., because a plain Send was used instead). Bidirectional commands and abnormal task completions require explicit invalidation.
section: 1.5.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
