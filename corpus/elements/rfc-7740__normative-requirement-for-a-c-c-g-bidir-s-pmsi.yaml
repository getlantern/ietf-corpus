document: rfc-7740
kind: normative-requirement
summary: For a (C-*,C-G-BIDIR) S-PMSI A-D route received from PEy's Upstream PE, if PEy itself also advertises the route, PEy maintains a (C-*,C-G-BIDIR) forwarding state with IR provider tunnel leaves being the originators of the S-PMSI A-D route and all relevant Leaf A-D routes (those whose Route Key matches the MCAST-VPN NLRI of the Upstream PE's S-PMSI).
section: "2.2"
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
