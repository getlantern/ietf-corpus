document: rfc-2381
kind: normative-requirement
summary: For multipoint VCs where branch characteristics differ, egress routers MUST correct Adspec parameters (APB, MPL, Path MTU, C_ATM, D_ATM) in PATH messages as they exit the ATM network. This correction is REQUIRED for APB, MPL, Path MTU, and ATM-specific GS Adspec parameters.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
    - multicast
