document: rfc-9369
kind: normative-requirement
summary: Clients MUST NOT use a session ticket or NEW_TOKEN token from a QUIC version 1 connection to initiate a QUIC version 2 connection, and vice versa. Tokens from compatible version negotiation are attributed to the negotiated version.
section: "5"
rfc2119_level: MUST NOT
topics:
    - quic
    - tls
