document: rfc-5245
kind: normative-requirement
summary: Media MUST be sent using the selected candidate pair once ICE nominates it. Before ICE completes, a full implementation MAY send media on any valid candidate pair; after completing, it MUST use only the selected pair.
section: "11.1"
rfc2119_level: MUST
topics:
