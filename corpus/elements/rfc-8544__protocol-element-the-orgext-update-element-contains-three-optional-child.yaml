document: rfc-8544
kind: protocol-element
summary: 'The <orgext:update> element contains three optional child elements: <orgext:add> (adds nonexistent organization roles), <orgext:rem> (removes organization roles), and <orgext:chg> (changes existing organization role identifiers). At least one MUST be present.'
section: 4.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
