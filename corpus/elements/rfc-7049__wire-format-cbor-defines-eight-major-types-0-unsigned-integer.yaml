summary: 'CBOR defines eight major types: 0 (unsigned integer), 1 (negative integer), 2 (byte string), 3 (UTF-8 text string), 4 (array), 5 (map), 6 (tag), and 7 (floating-point/simple/break). The major type occupies the top 3 bits of the initial byte.'
