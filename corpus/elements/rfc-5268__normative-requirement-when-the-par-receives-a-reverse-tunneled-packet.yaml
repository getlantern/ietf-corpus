document: rfc-5268
kind: normative-requirement
summary: When the PAR receives a reverse-tunneled packet, it MUST forward the inner packet to its destination (the MN's correspondent). The reverse tunnel ensures PCoA-sourced packets are not dropped by ingress filtering at the PAR.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - vpn
