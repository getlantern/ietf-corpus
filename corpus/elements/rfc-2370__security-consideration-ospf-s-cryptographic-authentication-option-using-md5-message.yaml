document: rfc-2370
kind: security-consideration
summary: OSPF's Cryptographic authentication option (using MD5 message digests with a shared secret key) provides protection against passive and active attacks on Opaque LSAs. However, it does not provide confidentiality or protection against traffic analysis.
section: "6.0"
topics:
