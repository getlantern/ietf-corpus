document: rfc-5746
kind: normative-requirement
summary: On an initial handshake, the client MUST include either an empty `renegotiation_info` extension or the TLS_EMPTY_RENEGOTIATION_INFO_SCSV in the ClientHello. Including both is NOT RECOMMENDED.
section: "3.4"
rfc2119_level: MUST
topics:
