document: rfc-9575
kind: registry
summary: IANA created the 'DRIP Frame Types' registry within the 'Drone Remote ID Protocol' registry group. Values 0x01–0x9F use Expert Review, 0xA0–0xEF use First Come First Served, and 0xF0–0xFF are reserved for Experimental Use. Registration requests are reviewed at drip-reg-review@ietf.org within a three-week period.
