document: rfc-5189
kind: security-consideration
summary: The MIDCOM protocol must provide authentication of both agent and middlebox, message integrity, and confidentiality. Confidentiality of control messages is optional. The protocol must be capable of operating across untrusted domains and must include mechanisms to mitigate replay attacks.
section: "5.3"
topics:
