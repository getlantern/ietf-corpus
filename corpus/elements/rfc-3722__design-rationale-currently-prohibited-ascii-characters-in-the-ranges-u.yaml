document: rfc-3722
kind: design-rationale
summary: Currently-prohibited ASCII characters in the ranges U+0000–U+002C, U+002F, U+003B–U+0040, U+005B–U+0060, and U+007B–U+007F are reserved for future use in protocol elements such as URIs, which is why they are excluded from iSCSI names.
section: "6.2"
