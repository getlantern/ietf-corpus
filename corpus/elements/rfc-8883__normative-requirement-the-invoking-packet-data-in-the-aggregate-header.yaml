document: rfc-8883
kind: normative-requirement
summary: The invoking packet data in the aggregate header limit error MUST be zero padded to the nearest 64-bit boundary per RFC 4884. If the original invoking packet did not contain 128 octets, the invoking packet data MUST be zero padded to 128 octets.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
