document: rfc-7573
kind: interoperability-note
summary: The MSRP gateway at an XMPP service must be configured with the same or smaller maximum MSRP message size as the XMPP service's maximum stanza size, enabling proper SDP 'max-size' attribute advertisement and correct handling of oversized messages.
