document: rfc-8733
kind: design-rationale
summary: The document scopes bandwidth calculation to the PCC (head-end LSR) rather than the PCE. Sending raw traffic measurements to the PCE was considered but deemed out of scope. This keeps computation close to the measurement point and is analogous to the passive stateful PCE's request/reply model, adapted to report/update semantics.
