document: rfc-1483
kind: interoperability-note
summary: When the Frame Relay Service Specific Convergence Sublayer (FR-SSCS, per I.36x.1) is used above the AAL5 CPCS, routed and bridged PDUs MUST use the NLPID multiplexing method of RFC 1294, not the LLC or VC-based encapsulations defined in this memo.
section: "1"
