document: rfc-3028
kind: design-rationale
summary: Extensions must be declared with 'require' before use, and a script that requires an unknown capability MUST NOT execute at all. This design, informed by experience with LISP and Tcl, ensures predictable behavior rather than partial execution with missing features.
section: 2.10.5
