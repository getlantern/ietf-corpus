document: rfc-1398
kind: protocol-element
summary: dot3StatsInternalMacReceiveErrors counts frames for which reception fails due to an internal MAC sublayer receive error, excluding frames already counted by dot3StatsFrameTooLongs, dot3StatsAlignmentErrors, or dot3StatsFCSErrors. The precise meaning is implementation-specific.
