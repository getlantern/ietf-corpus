document: rfc-9882
kind: normative-requirement
summary: Verifiers MAY reject a signature if the signer's choice of digest algorithm does not meet the security requirements of the chosen ML-DSA parameter set. A suitable digest algorithm must offer λ bits of security against second-preimage and collision attacks and produce at least 2×λ bits of output.
section: "3.3"
rfc2119_level: MAY
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
