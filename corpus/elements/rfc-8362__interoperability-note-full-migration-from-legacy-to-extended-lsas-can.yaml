document: rfc-8362
kind: interoperability-note
summary: Full migration from Legacy to Extended LSAs can be performed non-disruptively by running separate OSPFv3 instances—initially assigning the Extended-LSA instance a lower preference (higher administrative distance) than the Legacy instance, then reversing preference once the RIB is verified.
