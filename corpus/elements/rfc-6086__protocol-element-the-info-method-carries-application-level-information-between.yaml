document: rfc-6086
kind: protocol-element
summary: The INFO method carries application-level information between SIP UAs within an existing invite dialog usage. INFO does not update dialog or session characteristics; it allows applications using the SIP session to exchange information. An INFO request is always part of, and shares the fate of, the invite dialog usage and cannot be sent outside it.
section: "4.1"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
