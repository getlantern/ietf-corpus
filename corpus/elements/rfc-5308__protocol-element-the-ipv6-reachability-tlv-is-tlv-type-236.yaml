document: rfc-5308
kind: protocol-element
summary: The IPv6 Reachability TLV is TLV type 236 (0xEC). It carries a routing prefix, 4-octet metric, up/down bit (U), external bit (X), sub-TLV present bit (S), prefix length, and packed prefix octets. Sub-TLVs follow the standard TLV format if the S bit is set.
