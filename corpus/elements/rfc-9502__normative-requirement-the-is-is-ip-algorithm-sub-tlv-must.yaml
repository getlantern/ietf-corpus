document: rfc-9502
kind: normative-requirement
summary: The IS-IS IP Algorithm Sub-TLV MUST be propagated throughout the level and MUST NOT be advertised across level boundaries; the S bit in the enclosing Router Capability TLV MUST NOT be set. It MUST NOT be advertised more than once at a given level; if multiple copies are received from the same originator, a router MUST select the first in the lowest-numbered LSP and ignore subsequent instances.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
