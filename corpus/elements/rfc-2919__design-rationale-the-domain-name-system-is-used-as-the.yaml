document: rfc-2919
kind: design-rationale
summary: 'The domain name system is used as the basis for the list identifier namespace to leverage existing authority structures: domain name ownership inherently defines who has the right to create identifiers in a namespace, and separates the list identifier from any particular delivery host or mechanism.'
