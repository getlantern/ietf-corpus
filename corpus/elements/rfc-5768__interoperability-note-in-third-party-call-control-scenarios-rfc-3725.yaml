document: rfc-5768
kind: interoperability-note
summary: In third-party call control scenarios (RFC 3725), the caller may be a controller whose ICE support is independent of the answering UA's ICE support, so the media feature tag in the Contact header may not accurately reflect the actual media endpoint's capabilities.
