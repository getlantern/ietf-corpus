document: rfc-7453
kind: protocol-element
summary: mplsTunnelExtNodeIpMapTable is a read-only table automatically populated when entries are created in mplsTunnelExtNodeConfigTable. It is indexed by Global_ID::Node_ID and returns the assigned local identifier, enabling OAM operations to look up tunnel entries from IP-compatible endpoint identifiers.
