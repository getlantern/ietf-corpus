document: rfc-4622
kind: normative-requirement
summary: To convert an XMPP IRI to a URI, an application MUST adhere to the mapping procedure specified in Section 3.1 of RFC 3987 (IRI). To convert an XMPP URI to an IRI, the application MUST follow Section 3.2 of RFC 3987.
section: 2.7.1
rfc2119_level: MUST
