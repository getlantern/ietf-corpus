document: rfc-8143
kind: security-consideration
summary: Given the pervasiveness of eavesdropping (RFC 7258), even an encrypted but unauthenticated connection (e.g., anonymous Diffie-Hellman or self-signed certificates) is preferable to an unencrypted connection, consistent with opportunistic security principles (RFC 7435).
