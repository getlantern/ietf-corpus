document: rfc-9080
kind: design-rationale
summary: 'Dynamic wireless link-quality probing is required because ''hop-count routing is worst-path routing'' in wireless networks: without quality metrics, the routing protocol minimizes hop count and prefers long lossy links over shorter reliable ones.'
