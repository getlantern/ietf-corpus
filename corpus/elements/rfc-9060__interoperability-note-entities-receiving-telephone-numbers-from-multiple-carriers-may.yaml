document: rfc-9060
kind: interoperability-note
summary: Entities receiving telephone numbers from multiple carriers may need to maintain a 'STIR keyring' of delegate certificates from different providers and different CAs, selecting the appropriate certificate per call. Cross-certification via AIA or a bridge CA could simplify this but would require further specification.
section: "8.2"
topics:
