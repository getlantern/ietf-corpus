document: rfc-9540
kind: security-consideration
summary: For oblivious DoH servers, unique "dohpath" values can be used to target or identify specific clients (analogous to key targeting). Clients SHOULD either restrict dohpath to a known value or apply a consistency check on discovered dohpath values.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - privacy
