document: rfc-5441
kind: state-machine
summary: 'BRPC proceeds in three stages: (1) PCReq forwarded domain-by-domain from PCC to PCE(n) in destination domain; (2) PCE(n) computes VSPT(n) and returns it upstream; (3) each PCE(i) from n-1 to 1 extends the VSPT using its own TED, with PCE(1) computing and returning the final end-to-end path to the PCC.'
