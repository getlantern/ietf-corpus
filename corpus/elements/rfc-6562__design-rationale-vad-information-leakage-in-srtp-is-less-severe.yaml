document: rfc-6562
kind: design-rationale
summary: VAD information leakage in SRTP is less severe than full VBR leakage because VAD produces only two possible rates (active speech vs. silence/comfort noise), whereas VBR exposes a continuous range of packet sizes correlated with fine-grained speech characteristics.
