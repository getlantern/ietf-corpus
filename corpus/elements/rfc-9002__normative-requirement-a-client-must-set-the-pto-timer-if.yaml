document: rfc-9002
kind: normative-requirement
summary: A client MUST set the PTO timer if it has not received an acknowledgment for any Handshake packets and the handshake is not confirmed, even with no packets in flight, to unblock the server constrained by its anti-amplification limit. On PTO fire it MUST send a Handshake packet if it has Handshake keys, otherwise an Initial packet padded to at least 1200 bytes.
section: 6.2.2.1
rfc2119_level: MUST
topics:
    - quic
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
