document: rfc-7045
kind: normative-requirement
summary: If a forwarding node discards a packet containing a standard IPv6 extension header, it MUST be the result of a configurable policy and not just the result of a failure to recognise such a header. The discard policy for each standard extension header type MUST be individually configurable.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
