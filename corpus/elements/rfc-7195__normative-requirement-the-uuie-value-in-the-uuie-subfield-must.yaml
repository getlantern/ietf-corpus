document: rfc-7195
kind: normative-requirement
summary: The UUIE value in the 'uuie' subfield MUST start with the Protocol Discriminator octet followed by User Information octets, MUST be base-16 encoded, and MUST be considered invalid if it has an odd number of hexadecimal digits.
section: 5.2.3.3
rfc2119_level: MUST
topics:
