document: rfc-4826
kind: design-rationale
summary: The XCAP server does not verify referential integrity for <entry-ref> and <external> references (i.e., it does not check that the referenced <entry> or <list> actually exists), because cross-server references make guaranteed referential integrity impractical without substantial added complexity.
section: 3.4.5
topics:
    - sip
