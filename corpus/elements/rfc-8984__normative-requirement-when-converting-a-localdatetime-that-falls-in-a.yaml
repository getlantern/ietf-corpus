document: rfc-8984
kind: normative-requirement
summary: When converting a LocalDateTime that falls in a time zone discontinuity (e.g., a DST overlap where a wall-clock time occurs twice), the UTC offset before the transition MUST be used for conversion to UTC.
section: 1.4.5
rfc2119_level: MUST
