document: rfc-2797
kind: normative-requirement
summary: If CMCStatusInfo on a certificate request returns confirmRequired, the client MUST return a Confirm Certificate Acceptance (CMCCertId, id-cmc 24) prior to any usage of the certificate. Servers MUST return a full enrollment response for a confirm certificate acceptance control.
section: "5.14"
rfc2119_level: MUST
topics:
