document: rfc-9686
kind: normative-requirement
summary: The ADDR-REG-INFORM message MUST be sent from the address being registered (not the link-local address), MUST NOT contain a Server Identifier option, and MUST contain exactly one IA Address option whose valid-lifetime and preferred-lifetime match the current lifetimes of the address.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
