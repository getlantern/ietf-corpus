document: rfc-9796
kind: design-rationale
summary: jCard was chosen for RCD because it is an extensible method of providing information about a person or business, has been defined in RFC 9795 and adopted by PASSporT (RFC 8225) due to its use of JSON Web Tokens. This made jCard a natural fit for the STIR RCD framework.
