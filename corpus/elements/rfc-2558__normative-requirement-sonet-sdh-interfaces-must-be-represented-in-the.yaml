document: rfc-2558
kind: normative-requirement
summary: SONET/SDH interfaces must be represented in the ifTable using ifType values sonet(39) for the combined Medium/Section/Line layer, sonetPath(50) for Path interfaces, and sonetVT(51) for VT/VC interfaces. The ifStackTable must be used to maintain the exact configuration and multiplexing relationships between layers.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
