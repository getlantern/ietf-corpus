document: rfc-9197
kind: security-consideration
summary: 'IOAM can be used to mount or amplify DoS attacks: an attacker can inject IOAM headers to consume node resources or cause packets to exceed MTU (triggering fragmentation or drops). Timestamp integrity depends on the security of the underlying time synchronization protocol.'
