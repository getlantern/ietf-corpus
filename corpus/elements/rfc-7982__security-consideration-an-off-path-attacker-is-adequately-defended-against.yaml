document: rfc-7982
kind: security-consideration
summary: An off-path attacker is adequately defended against by the STUN requirement that the 96-bit transaction ID be uniformly and randomly chosen from 0..2^96-1 with cryptographic strength. An attacker could also corrupt, remove, or delay ICE requests/responses to discourage use of a particular path.
