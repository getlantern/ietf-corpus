document: rfc-3461
kind: protocol-element
summary: The ORCPT parameter on RCPT conveys the original recipient address as 'addr-type;xtext', preserving the sender-specified address through relaying and gatewaying. The entire ORCPT parameter MAY be up to 500 characters in length.
section: "4.2"
