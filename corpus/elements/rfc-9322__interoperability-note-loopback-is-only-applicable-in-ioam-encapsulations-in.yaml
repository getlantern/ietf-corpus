document: rfc-9322
kind: interoperability-note
summary: Loopback is only applicable in IOAM encapsulations in which the identity of the encapsulating node is available in the encapsulation header. If IOAM is used over an encapsulation that does not include the encapsulating node's address, the transit or decapsulating node must not loop back a copy.
section: "4.2"
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
