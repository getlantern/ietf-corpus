document: rfc-4884
kind: registry
summary: IANA has established a registry of ICMP Extension Object classes and class sub-types. Class-Num values 0xF7–0xFF are reserved for private use. Object class values are assignable on a first-come-first-served basis. Sub-type value assignment policy is defined per class.
