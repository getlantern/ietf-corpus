document: rfc-2960
kind: wire-format
summary: 'Optional and variable-length parameters within control chunks use a TLV format: Parameter Type (16 bits), Parameter Length (16 bits, includes header), and variable-length Parameter Value. Parameters MUST be padded to a multiple of 4 bytes; padding is not counted in the length field.'
section: 3.2.1
