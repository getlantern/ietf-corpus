document: rfc-7181
kind: normative-requirement
summary: Each router's WILL_FLOODING and WILL_ROUTING MUST each be in the range WILL_NEVER (0) to WILL_ALWAYS (15). It MUST be ensured by administrative or other means that too many routers do not have either willingness equal to WILL_NEVER.
section: 5.4.8
rfc2119_level: MUST
topics:
    - routing
