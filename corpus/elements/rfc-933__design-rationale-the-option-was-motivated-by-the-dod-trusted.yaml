document: rfc-933
kind: design-rationale
summary: The option was motivated by the DoD Trusted Computer System Evaluation Criteria (Section 3.1.1.3.2.3), which requires security level labels on all human-readable output for certain military systems. Embedding banners per screen in application data was the prior approach, but was inefficient.
