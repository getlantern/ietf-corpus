document: rfc-3966
kind: protocol-element
summary: The 'phone-context' parameter labels a local number's scope either via a global number prefix (e.g., '+33') or a domain name (e.g., 'houston.example.com'). A global number context consists of the initial digits of a valid global number assigned exclusively to one organization.
section: 5.1.5
topics:
