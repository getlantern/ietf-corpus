document: rfc-5487
kind: protocol-element
summary: 'Four DHE_PSK CBC cipher suites with stronger MACs are defined: TLS_DHE_PSK_WITH_AES_128_CBC_SHA256 (0x00,0xB2), TLS_DHE_PSK_WITH_AES_256_CBC_SHA384 (0x00,0xB3), TLS_DHE_PSK_WITH_NULL_SHA256 (0x00,0xB4), and TLS_DHE_PSK_WITH_NULL_SHA384 (0x00,0xB5). These mirror RFC 4279 DHE_PSK suites but use SHA-256 or SHA-384 for HMAC and PRF.'
section: "3.2"
topics:
