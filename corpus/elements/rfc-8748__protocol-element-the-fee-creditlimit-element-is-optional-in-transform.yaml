document: rfc-8748
kind: protocol-element
summary: The <fee:creditLimit> element is OPTIONAL in transform responses and indicates the maximum credit available to a client. If a server supports this element, it MUST be included in all transform command responses. A server MAY reject transactions when the absolute value of <fee:balance> equals or exceeds <fee:creditLimit>.
section: "3.6"
topics:
    - registry
