document: rfc-8681
kind: protocol-element
summary: 'The TinyMT32 PRNG is used to generate coding coefficients, initialized with the Repair_Key as a 32-bit seed. Two mapping functions are defined: tinymt32_rand16() returns the lower 4 bits (value in [0..15]) and tinymt32_rand256() returns the lower 8 bits (value in [0..255]) of the 32-bit PRNG output.'
section: "3.5"
topics:
