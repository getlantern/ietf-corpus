document: rfc-4755
kind: protocol-element
summary: 'The IPoIB Service-ID is a 64-bit value with the format: 0x01 | Type (0x00) | Reserved (zeros) | UD QPN. The Type field MUST be 0, Reserved MUST be zeros, and QPN MUST be the UD QP exchanged during address resolution.'
