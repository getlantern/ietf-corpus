document: rfc-7105
kind: design-rationale
summary: 'A Device in a unique observer position (the only entity at the exact space-time point being located) makes its measurements both invaluable and unverifiable: no other entity can independently confirm the same observation. This fundamental asymmetry limits the effectiveness of measurement validation and motivates the location validation approach as a complementary mitigation.'
section: 7.2.1.2
topics:
    - security
    - privacy
