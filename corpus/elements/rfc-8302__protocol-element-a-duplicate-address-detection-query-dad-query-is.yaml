document: rfc-8302
kind: protocol-element
summary: A Duplicate Address Detection query (DAD-query) is a unicast ARP/ND message sent by an RBridge to the former owner of an IP address when a mapping conflict is detected. For ARP, the sender IP is 0.0.0.0 (or a configurable DAD-Query source IP); for ND, the source is an IPv6 Link Local Address. The source MAC is the querying RBridge's MAC.
section: "7"
topics:
