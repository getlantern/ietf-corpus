document: rfc-4590
kind: normative-requirement
summary: The RADIUS server MUST check the integrity of nonces that embed a time-stamp. If the RADIUS server issued a Digest-Opaque along with the nonce, the Access-Request MUST contain a matching Digest-Opaque attribute.
section: 2.2.1
rfc2119_level: MUST
topics:
    - radius
    - security
