document: rfc-2743
kind: protocol-element
summary: prot_ready_state is a Boolean (new in GSS-V2) returned by GSS_Init_sec_context, GSS_Accept_sec_context, and GSS_Inquire_context. When TRUE (possibly before GSS_S_COMPLETE), per-message protection via GSS_Wrap/GSS_Unwrap/GSS_GetMIC/GSS_VerifyMIC is available. Mutual authentication is not guaranteed until GSS_S_COMPLETE is returned.
section: 1.2.7
topics:
    - security
    - crypto
