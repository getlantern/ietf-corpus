document: rfc-7183
kind: normative-requirement
summary: MAX_HELLO_TIMESTAMP_DIFF and MAX_TC_TIMESTAMP_DIFF MUST be at least as great as the maximum expected age of a message (time between sending and receipt by all intended destinations), and SHOULD be as large as required but not significantly larger.
section: "5"
rfc2119_level: MUST
topics:
