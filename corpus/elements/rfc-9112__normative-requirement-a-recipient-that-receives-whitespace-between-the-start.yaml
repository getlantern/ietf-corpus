document: rfc-9112
kind: normative-requirement
summary: A recipient that receives whitespace between the start-line and the first header field MUST either reject the message as invalid or consume each whitespace-preceded line without further processing, to prevent misinterpretation enabling request smuggling or response splitting.
section: "2.2"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
