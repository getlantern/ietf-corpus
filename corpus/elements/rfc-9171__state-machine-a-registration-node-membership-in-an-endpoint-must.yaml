document: rfc-9171
kind: state-machine
summary: 'A registration (node membership in an endpoint) MUST be in one of two states at any time: Active or Passive. In the Active state, deliverable bundles are delivered automatically per scheduling policy. In the Passive state, the delivery failure action fires: either defer delivery until polled/activated, or abandon delivery of the bundle.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
