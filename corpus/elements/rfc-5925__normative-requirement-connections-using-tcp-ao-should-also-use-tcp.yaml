document: rfc-5925
kind: normative-requirement
summary: Connections using TCP-AO SHOULD also use TCP keepalives to ensure that connections whose keys are lost (e.g., after a reboot) are terminated after a finite time. BGP connections SHOULD require support for graceful restart when using TCP-AO.
section: "7.7"
rfc2119_level: SHOULD
topics:
    - tcp
    - security
    - bgp
