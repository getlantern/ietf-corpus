document: rfc-7977
kind: design-rationale
summary: All MSRP-over-WebSocket messages must be routed via an MSRP WebSocket Server because WebSocket clients are architecturally incapable of accepting inbound connections from other WebSocket clients or servers, making direct client-to-client MSRP communication impossible without a relay.
section: "5.1"
topics:
    - websocket
    - realtime
