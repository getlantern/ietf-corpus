document: rfc-7838
kind: normative-requirement
summary: Changes to host, port, and protocol when using an alternative service MUST NOT be propagated to the application using HTTP; from the application's standpoint, the URI being accessed and all information derived from it (scheme, host, and port) are the same as before.
section: "2"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
