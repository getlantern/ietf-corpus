document: rfc-3418
kind: security-consideration
summary: SNMPv1 by itself is not a secure environment; even on a network secured with IPsec, there is no control over which hosts on that network may GET or SET objects. Implementors are recommended to use the SNMPv3 User-based Security Model (RFC 3414) and View-based Access Control Model (RFC 3415).
section: "5"
topics:
    - snmp
    - security
