document: rfc-2796
kind: normative-requirement
summary: Care should be taken to ensure that none of the BGP path attributes (ORIGINATOR_ID, CLUSTER_LIST) can be modified through configuration when exchanging internal routing information between RRs and Clients and Non-Clients, as modification could result in routing loops.
section: "8"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
