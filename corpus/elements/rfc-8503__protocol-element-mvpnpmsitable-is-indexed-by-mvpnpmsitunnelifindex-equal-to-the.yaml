document: rfc-8503
kind: protocol-element
summary: 'mvpnPmsiTable is indexed by mvpnPmsiTunnelIfIndex (equal to the ifIndex of the PMSI in ifTable) and stores PMSI attributes common to both I-PMSI and S-PMSI: Route Distinguisher, tunnel type (L2L3VpnMcastProviderTunnelType), pointer to the P-tunnel, PIM group address (for PIM-based tunnels), and encapsulation type (GRE, IP-in-IP, or MPLS).'
section: "3.2"
topics:
