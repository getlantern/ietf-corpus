document: rfc-5139
kind: normative-requirement
summary: It is RECOMMENDED that each 'civicAddress' element use one language only, or a consistent combination of languages. Where a civic location is represented in multiple languages, multiple 'civicAddress' elements SHOULD be included in the PIDF-LO document.
section: "3.5"
rfc2119_level: RECOMMENDED
