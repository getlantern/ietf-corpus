document: rfc-6469
kind: normative-requirement
summary: The marker bit (M) MUST be set to one on the last packet of a video frame and MUST be zero on all other packets. However, detection of a frame change MUST NOT rely on the marker bit; it MUST be based on a difference in the RTP timestamp.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
