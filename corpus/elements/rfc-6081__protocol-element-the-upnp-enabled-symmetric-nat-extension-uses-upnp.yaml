document: rfc-6081
kind: protocol-element
summary: The UPnP-Enabled Symmetric NAT Extension uses UPnP AddPortMapping to reserve an external port before qualification, embedding it in the Teredo IPv6 address so any peer can reach the client regardless of symmetric NAT behavior. It depends on the Symmetric NAT Support Extension.
section: "3.2"
