document: rfc-6551
kind: normative-requirement
summary: Reserved bits in the Routing Metric/Constraint Flag field MUST be set to zero on transmission and MUST be ignored on receipt. The O flag MUST be set to zero when C=0; the R flag MUST be cleared when C=1; the A field MUST be set to 0 and MUST be ignored on receipt when the R bit is set or the C flag is set.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
