document: rfc-6520
kind: design-rationale
summary: The Heartbeat Extension was introduced because the only DTLS mechanism to detect peer liveness was a costly renegotiation, especially with unidirectional traffic. For TLS over TCP there was no standard keep-alive below the application layer. The extension provides a lightweight alternative without triggering renegotiation.
section: "1.1"
topics:
    - tls
