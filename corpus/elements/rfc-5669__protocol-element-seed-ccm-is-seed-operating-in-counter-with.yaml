document: rfc-5669
kind: protocol-element
summary: 'SEED-CCM is SEED operating in Counter with CBC-MAC (CCM) mode. For SEED-CCM in SRTP, authentication is performed on the plaintext rather than the ciphertext: the sender performs Step 7 (authentication) before Step 5 (encryption), and the receiver verifies after decryption.'
section: "2.2"
topics:
