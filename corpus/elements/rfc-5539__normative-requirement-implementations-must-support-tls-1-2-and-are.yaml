document: rfc-5539
kind: normative-requirement
summary: Implementations MUST support TLS 1.2 and are REQUIRED to support the mandatory cipher suite TLS_RSA_WITH_AES_128_CBC_SHA. The server MUST support certificate-based client authentication.
