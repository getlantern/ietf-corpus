document: rfc-5621
kind: design-rationale
summary: Unknown 'multipart' subtypes are treated as 'multipart/mixed' by default. This fallback behavior means SIP extensions using novel multipart subtypes must use option-tags or other mechanisms to ensure recipients can process them correctly.
section: "4.2"
topics:
