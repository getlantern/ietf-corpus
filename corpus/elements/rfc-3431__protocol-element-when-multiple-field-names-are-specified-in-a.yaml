document: rfc-3431
kind: protocol-element
summary: When multiple field names are specified in a COUNT test, the counts for all specified fields are added together to obtain the number for comparison. For example, specifying ["to", "cc"] compares the total combined count; separate counts require separate comparisons.
section: "4.2"
