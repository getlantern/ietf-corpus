document: rfc-6750
kind: protocol-element
summary: 'The WWW-Authenticate header for Bearer supports auth-param attributes: "realm" (optional, MUST NOT appear more than once), "scope" (space-delimited case-sensitive scope values, OPTIONAL), "error", "error_description", and "error_uri" (each MUST NOT appear more than once).'
section: "3"
topics:
