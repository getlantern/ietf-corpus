document: rfc-4194
kind: normative-requirement
summary: The SHA-1 checksum digest MUST be calculated on the actual binary data represented by the Block, NOT on its ASCII/hexadecimal representation. This ensures integrity verification applies to the decoded content.
section: "3"
rfc2119_level: MUST
topics:
    - security
