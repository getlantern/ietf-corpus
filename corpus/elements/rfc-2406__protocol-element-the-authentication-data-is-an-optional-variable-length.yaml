document: rfc-2406
kind: protocol-element
summary: The Authentication Data is an optional variable-length field containing an Integrity Check Value (ICV) computed over the ESP packet minus the Authentication Data field. It is present only if the authentication service has been selected for the SA; the authentication algorithm specification MUST specify the ICV length, comparison rules, and processing steps.
section: "2.7"
topics:
    - ipsec
    - security
    - crypto
