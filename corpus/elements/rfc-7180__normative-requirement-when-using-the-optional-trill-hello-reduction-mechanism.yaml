document: rfc-7180
kind: normative-requirement
summary: When using the optional TRILL Hello reduction mechanism, an RBridge MUST always attempt to send Hellos in the Designated VLAN. It may be unsafe to send Hellos on fewer VLANs unless all adjacencies on the link support the Hello reduction capability mechanisms.
section: "10.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
