document: rfc-4210
kind: protocol-element
summary: NestedMessageContent (defined as PKIMessages, a SEQUENCE OF PKIMessage) allows an RA to wrap one or more EE messages in a single new PKI message with its own protection layer, enabling the RA to add field values or extensions and to batch multiple EE requests to the CA.
section: 5.1.3.4
topics:
    - pkix
    - security
