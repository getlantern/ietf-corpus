document: rfc-6223
kind: interoperability-note
summary: If an INVITE is used for keep-alive negotiation, at least one provisional or final response containing a "keep" parameter with a value constitutes confirmation that the downstream entity is willing to receive keep-alives. Multiple responses to the same INVITE must carry identical parameter values.
section: "4.3"
topics:
    - sip
    - nat
