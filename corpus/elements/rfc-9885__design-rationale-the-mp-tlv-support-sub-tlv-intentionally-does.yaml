document: rfc-9885
kind: design-rationale
summary: The MP-TLV Support sub-TLV intentionally does not provide syntax to specify MP-TLV support on a per-codepoint basis. It is presumed that support applies to all relevant codepoints; per-codepoint detail is better provided via YANG-based Protocol Implementation Conformance Statement (PICS).
section: "7"
topics:
    - routing
