document: rfc-8974
kind: normative-requirement
summary: The Extended-Token-Length Option value MUST NOT be less than 8 or greater than 65804. If a value less than 8 is received, the option MUST be ignored; if greater than 65804, the option value MUST be treated as 65804.
section: 2.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
