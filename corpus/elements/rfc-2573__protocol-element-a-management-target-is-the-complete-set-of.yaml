document: rfc-2573
kind: protocol-element
summary: A Management Target is the complete set of information describing where and how to send a message, consisting of destination information (transport domain and transport address, i.e., a transport endpoint) and SNMP parameters (message processing model, security model, security level, and security name). The SNMP-TARGET-MIB provides two tables for these two kinds of information with a many-to-many relationship between them.
section: "2"
