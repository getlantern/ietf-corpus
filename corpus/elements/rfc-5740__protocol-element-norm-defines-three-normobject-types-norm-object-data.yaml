document: rfc-5740
kind: protocol-element
summary: 'NORM defines three NormObject types: NORM_OBJECT_DATA (static memory content), NORM_OBJECT_FILE (file storage), and NORM_OBJECT_STREAM (non-finite, ongoing stream). DATA and FILE are identical in transport; the type distinction is a hint to receivers about storage allocation.'
section: "1.2"
