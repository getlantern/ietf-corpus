document: rfc-5755
kind: security-consideration
summary: If an AC issuer's private key is compromised, all ACs it issued MUST be revoked. AC issuers are advised to use tamper-resistant cryptographic modules and management procedures such as separation of duties to prevent compromise, and to maintain secure backups of signing keys.
section: "8"
topics:
