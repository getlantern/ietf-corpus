document: rfc-3588
kind: protocol-element
summary: 'The Realm Routing Table entries contain: Realm Name (primary lookup key), Application Identifier (secondary key), Local Action (LOCAL/RELAY/PROXY/REDIRECT), Server Identifier(s), and Static/Dynamic flag with expiration time. Agents MUST support at least one of LOCAL, RELAY, PROXY, or REDIRECT action types.'
section: "2.7"
topics:
