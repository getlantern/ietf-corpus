document: rfc-8205
kind: protocol-element
summary: The pCount field in a Secure_Path Segment specifies the number of repetitions of the AS number that the signature covers, enabling AS prepending semantics without multiple signatures. Route servers may set pCount=0 to participate in BGPsec without inflating AS path length.
section: "3.1"
topics:
    - bgp
    - routing
    - security
