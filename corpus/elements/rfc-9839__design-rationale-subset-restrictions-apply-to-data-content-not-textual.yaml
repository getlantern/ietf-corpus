kind: design-rationale
summary: 'Subset restrictions apply to data content, not textual representation: escaping techniques such as JSON \uXXXX sequences cannot be used to circumvent restrictions on field values. A JSON text may be syntactically conforming even when the data it encodes contains prohibited code points.'
