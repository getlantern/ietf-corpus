document: rfc-4035
kind: normative-requirement
summary: A signed zone MUST include DNSKEY, RRSIG, NSEC, and optionally DS resource records according to the rules in Section 2. A zone that does not include these records according to those rules is an unsigned zone.
section: "2"
rfc2119_level: MUST
topics:
    - dns
    - security
