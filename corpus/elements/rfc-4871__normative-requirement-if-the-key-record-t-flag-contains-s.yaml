document: rfc-4871
kind: normative-requirement
summary: If the key record t= flag contains 's', the domain of the i= signing identity MUST be exactly equal to the d= domain (subdomain signing is prohibited). Key records not intended for subdomain use SHOULD specify this flag.
section: "3.8"
rfc2119_level: MUST
topics:
    - email
