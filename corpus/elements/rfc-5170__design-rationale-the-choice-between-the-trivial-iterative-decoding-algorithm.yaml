document: rfc-5170
kind: design-rationale
summary: The choice between the trivial iterative decoding algorithm and Gaussian elimination (or a hybrid) is left to the codec developer because interoperability does not depend on the decoding algorithm. Gaussian elimination recovers from more erasures but requires more CPU; the trivial algorithm is faster but less powerful.
section: "6.4"
