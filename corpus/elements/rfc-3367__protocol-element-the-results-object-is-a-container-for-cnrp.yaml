document: rfc-3367
kind: protocol-element
summary: The Results object is a container for CNRP results including ResourceDescriptors, Status messages, Referrals, and Schema. Results from a single CNRP service are ordered by decreasing relevance; aggregated results from multiple services cannot be globally ordered.
section: 4.2.2
