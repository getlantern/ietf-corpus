document: rfc-6295
kind: normative-requirement
summary: By default, senders MUST use the closed-loop sending policy when creating recovery journals. If the session description overrides this default via the j_update parameter, senders MUST use the specified policy (anchor or open-loop).
section: "4"
rfc2119_level: MUST
topics:
