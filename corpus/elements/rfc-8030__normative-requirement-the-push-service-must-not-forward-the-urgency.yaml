document: rfc-8030
kind: normative-requirement
summary: The push service MUST NOT forward the Urgency header field to the user agent. The push service MUST NOT deliver push messages with lower urgency than the value indicated by the user agent in its monitoring request.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - http
