document: rfc-7880
kind: normative-requirement
summary: S-BFD Control packets transmitted by the SBFDReflector MUST set Required Min RX Interval to the minimum interval in microseconds that the reflector can handle, allowing it to throttle the rate at which SBFDInitiators send packets.
section: 7.2.3
rfc2119_level: MUST
topics:
