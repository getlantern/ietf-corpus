document: rfc-9685
kind: normative-requirement
summary: The TID MUST be incremented each time a 'Registration Refresh Request' NA(EARO) is reissued. The receiver 6LN MUST process one and only one of a series of such messages with comparable and increasing TID values (absolute difference less than SEQUENCE_WINDOW).
section: "7.3"
rfc2119_level: MUST
topics:
    - ip
