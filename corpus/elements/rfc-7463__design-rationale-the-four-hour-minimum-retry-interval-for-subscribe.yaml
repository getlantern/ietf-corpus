document: rfc-7463
kind: design-rationale
summary: The four-hour minimum retry interval for SUBSCRIBE after failure was chosen to limit discovery probes to six per day per UA. A shorter interval was rejected to reduce failure traffic, while keeping the interval short enough for timely discovery of a newly activated Appearance Agent.
section: "5.3"
topics:
