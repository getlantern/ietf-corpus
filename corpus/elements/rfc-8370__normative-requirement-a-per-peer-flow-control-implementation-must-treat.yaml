document: rfc-8370
kind: normative-requirement
summary: A Per-Peer Flow Control implementation MUST treat lack of ACKs from a peer as an indication of that peer's RSVP-TE control-plane congestion, and MUST throttle RSVP-TE messages to the affected peer on a per-peer basis.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - congestion
