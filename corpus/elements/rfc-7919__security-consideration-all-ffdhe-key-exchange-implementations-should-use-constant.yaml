document: rfc-7919
kind: security-consideration
summary: All FFDHE key exchange implementations should use constant-time modular-exponentiation to prevent timing attacks, especially when DHE secret keys are reused ('semi-static' keying) or shared across multiple machines in a load-balancer scenario.
