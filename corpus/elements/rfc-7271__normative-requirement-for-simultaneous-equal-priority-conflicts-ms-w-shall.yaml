document: rfc-7271
kind: normative-requirement
summary: For simultaneous equal-priority conflicts, MS-W SHALL have higher priority than MS-P at both nodes. For simultaneous SD on both paths, the SD on the standby path (from which the selector does not select traffic) SHALL have higher priority than SD on the active path, preventing unnecessary switching.
section: "7.4"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
