document: rfc-2227
kind: protocol-element
summary: The 'timeout=NNN' response directive sets a metering timeout of NNN minutes after response origination; if the proxy has a non-zero hit count when it expires, it MUST send a report. Timeouts should be accurate to plus or minus one minute. This directive implies 'do-report'.
section: "5.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
