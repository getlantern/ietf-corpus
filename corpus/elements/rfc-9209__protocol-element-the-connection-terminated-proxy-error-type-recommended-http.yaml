document: rfc-9209
kind: protocol-element
summary: The 'connection_terminated' proxy error type (recommended HTTP 502) indicates the connection to the next hop was closed before a complete response was received. Its 'Response Only Generated by Intermediaries' flag is false, meaning it can appear on partially forwarded origin responses (e.g., as a trailer).
section: 2.3.8
topics:
    - http
