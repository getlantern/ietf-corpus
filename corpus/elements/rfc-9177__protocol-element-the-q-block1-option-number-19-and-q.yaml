document: rfc-9177
kind: protocol-element
summary: The Q-Block1 option (number 19) and Q-Block2 option (number 31) are CoAP block-wise transfer options designed for Non-confirmable (NON) messages. Q-Block1 pertains to request payloads; Q-Block2 pertains to response payloads. Both are Critical and UnSafe; Q-Block2 is also Repeatable.
section: "4.1"
