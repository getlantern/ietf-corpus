document: rfc-3124
kind: normative-requirement
summary: All applications MUST call cm_open(stream_info) before using any other CM API function. A returned cm_streamid of -1 indicates failure; that stream cannot use the CM.
section: "3.1"
rfc2119_level: MUST
topics:
    - congestion
