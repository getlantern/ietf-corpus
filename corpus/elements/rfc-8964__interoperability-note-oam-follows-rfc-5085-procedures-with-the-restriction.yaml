document: rfc-8964
kind: interoperability-note
summary: OAM follows RFC 5085 procedures with the restriction that only VCCV type 1 is supported. When the first nibble of the d-CW is 0x0, the payload is normal user data; when 0x1, the payload is OAM with the type indicated by the d-CW Channel Type field.
section: "4.3"
topics:
