document: rfc-2003
kind: normative-requirement
summary: The encapsulator SHOULD normally perform Path MTU Discovery by sending all datagrams into the tunnel with the 'Don't Fragment' bit set in the outer IP header; alternatively it MAY be configured not to set DF when the original sender did not set it.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - ip
