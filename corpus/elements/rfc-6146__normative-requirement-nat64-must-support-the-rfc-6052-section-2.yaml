document: rfc-6146
kind: normative-requirement
summary: NAT64 MUST support the RFC 6052 Section 2.3 algorithm for generating IPv6 representations of IPv4 addresses. This SHOULD be the default algorithm, and the Well-Known Prefix 64:ff9b::/96 SHOULD be used when no Pref64::/n is configured.
section: 3.5.4
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - ip
