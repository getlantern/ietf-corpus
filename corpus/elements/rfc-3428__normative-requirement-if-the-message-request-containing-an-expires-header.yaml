document: rfc-3428
kind: normative-requirement
summary: If the MESSAGE request containing an Expires header field also contains a Date header field, the UAS SHOULD interpret the Expires value as delta time from the Date field; otherwise from the time the UAS received the request.
section: "7"
rfc2119_level: SHOULD
topics:
