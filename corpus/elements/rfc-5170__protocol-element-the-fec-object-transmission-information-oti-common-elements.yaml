document: rfc-5170
kind: protocol-element
summary: The FEC Object Transmission Information (OTI) common elements are Transfer-Length (L), Encoding-Symbol-Length (E), Maximum-Source-Block-Length (B), and Max-Number-of-Encoding-Symbols (max_n). The maximum transfer length is 2^12 * B * E bytes, with an upper bound of approximately 128 TB.
section: 4.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
