document: rfc-4997
kind: protocol-element
summary: The UNCOMPRESSED section of an encoding method specifies the order of fields in the uncompressed header. The sum of all ULENGTH values in the list must equal THIS.ULENGTH, and every field's ULENGTH must be unambiguously defined across all sections for an unambiguous bit-to-field mapping.
section: 4.12.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
