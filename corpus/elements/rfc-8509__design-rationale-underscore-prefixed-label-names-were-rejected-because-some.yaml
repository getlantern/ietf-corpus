document: rfc-8509
kind: design-rationale
summary: Underscore-prefixed label names were rejected because some browsers and operating systems refuse to fetch them (they are not valid hostnames per RFC 7719). The chosen 'root-key-sentinel-is-ta-' and 'root-key-sentinel-not-ta-' prefixes passed IETF evaluation for label collision, zone operator impact, and desired resolver behavior.
