document: rfc-1407
kind: protocol-element
summary: 'dsx3SendCode (read-write) indicates the code being sent on the interface: NoCode, LineCode (request line loopback), PayloadCode (request payload loopback of all DS1/E1s), ResetCode (deactivate loopback), DS1LoopCode (loopback a specific DS1/E1), or TestPattern. These options are optional for E3 interfaces.'
section: 4.1.1
topics:
