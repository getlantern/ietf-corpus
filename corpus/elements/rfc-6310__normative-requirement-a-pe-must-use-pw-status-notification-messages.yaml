document: rfc-6310
kind: normative-requirement
summary: A PE MUST use PW status notification messages to report all defects affecting the PW service, including defects detected by PSN fault detection mechanisms, VCCV-Ping or VCCV-BFD (CV types 0x04/0x10), PE internal forwarding failures between AC and PW, and AC or L2 network defects as governed by the applicable OAM mode.
section: 6.1.1
rfc2119_level: MUST
topics:
    - mpls
