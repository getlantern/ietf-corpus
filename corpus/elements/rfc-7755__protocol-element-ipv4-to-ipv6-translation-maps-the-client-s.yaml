document: rfc-7755
kind: protocol-element
summary: IPv4-to-IPv6 translation maps the client's IPv4 source address into the translation prefix (e.g., 203.0.113.50 becomes 2001:db8:46::203.0.113.50) and replaces the IPv4 destination Service Address with the corresponding IPv6 Service Address via EAM lookup. IPv6-to-IPv4 translation is the reverse operation.
section: "3.1"
topics:
    - ip
    - v6ops
    - nat
