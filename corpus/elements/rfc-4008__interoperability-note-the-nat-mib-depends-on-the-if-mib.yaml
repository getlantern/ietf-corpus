document: rfc-4008
kind: interoperability-note
summary: The NAT MIB depends on the IF-MIB (RFC 2863) for interface indexing via ifIndex; natInterfaceTable is indexed by ifIndex. Counter discontinuity detection reuses ifCounterDiscontinuityTime from the IF-MIB for all Counter64 objects in interface, address map, bind, and session tables.
section: "4.10"
