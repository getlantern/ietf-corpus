document: rfc-7487
kind: normative-requirement
summary: When the Integrity (I) flag is set and no BFD Authentication Sub-TLV is included, authentication MUST use Keyed SHA1 with an empty pre-shared key (all 0s). If the egress LSR does not support BFD Authentication, it MUST generate 'OAM Problem/BFD Authentication unsupported'.
section: "3.3"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
