document: rfc-9665
kind: normative-requirement
summary: The flags field in the KEY RR used for SIG(0) in SRP Updates MUST be set to all zeroes by SRP requesters. SRP registrars MUST accept and store the flags field as received, without checking or modifying it.
section: 3.3.3
rfc2119_level: MUST
topics:
    - dns
    - security
