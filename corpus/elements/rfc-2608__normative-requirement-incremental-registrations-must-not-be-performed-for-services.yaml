document: rfc-2608
kind: normative-requirement
summary: Incremental registrations MUST NOT be performed for services registered with Authentication Blocks; these must be registered with ALL attributes and the FRESH flag set. DAs receiving such messages return AUTHENTICATION_FAILED.
section: "9.3"
rfc2119_level: MUST NOT
topics:
