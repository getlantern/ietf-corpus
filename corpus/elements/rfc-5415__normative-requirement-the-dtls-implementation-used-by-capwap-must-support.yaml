document: rfc-5415
kind: normative-requirement
summary: The DTLS implementation used by CAPWAP MUST support TLS Session Resumption, which is typically used to establish the DTLS data channel. The WTP MUST provide an interface that allows session resumption across different port numbers, since the data channel uses ports distinct from the control channel.
section: 2.4.1
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
