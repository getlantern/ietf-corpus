document: rfc-3801
kind: normative-requirement
summary: A VPIM-compliant implementation MUST be able to send and receive DSNs conforming to RFC 3462 (Multipart/Report) and RFC 3464 (Message/Delivery-Status). A non-delivery DSN MUST be sent whenever any form of non-delivery occurs unless the Return-Path is null.
section: "4.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
