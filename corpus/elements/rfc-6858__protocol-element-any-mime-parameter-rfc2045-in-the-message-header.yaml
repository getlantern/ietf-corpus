document: rfc-6858
kind: protocol-element
summary: 'Any MIME parameter (RFC2045) in the message header or a body part header that cannot be presented to the client exactly as it appears in the incoming message is silently excised. For example, ''Content-Disposition: attachment; filename=FOO'' becomes ''Content-Disposition: attachment''.'
section: "2.2"
