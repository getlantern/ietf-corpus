document: rfc-5429
kind: protocol-element
summary: The 'ereject' action cancels the implicit keep and refuses message delivery, with a UTF-8 reason string. It always favors protocol-level (SMTP/LMTP 5XX) rejection over sending a DSN, falling back to a DSN only if protocol-level rejection is unavailable.
section: "2.1"
topics:
    - email
