document: rfc-6156
kind: normative-requirement
summary: Clients MUST NOT include a REQUESTED-ADDRESS-FAMILY attribute in an Allocate request that also contains a RESERVATION-TOKEN attribute. If a server receives a request with both, it replies with a 400 (Bad Request) error.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - nat
    - ip
