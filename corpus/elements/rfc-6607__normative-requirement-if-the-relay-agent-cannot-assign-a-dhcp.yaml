document: rfc-6607
kind: normative-requirement
summary: If the relay agent cannot assign a DHCP client to the VPN specified by the DHCP server in a VSS sub-option or option (VPN assignment by server approach), it MUST drop the packet and not forward it to the DHCP client.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
