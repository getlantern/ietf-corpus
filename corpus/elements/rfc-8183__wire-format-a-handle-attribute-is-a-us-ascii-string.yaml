document: rfc-8183
kind: wire-format
summary: A 'handle' attribute is a US-ASCII string of letters, digits, '/', '-', and '_', with a maximum length of 255 characters. Handles are protocol elements with no mandated semantic structure, and the restricted character set avoids the complexity of internationalized text rules.
