document: rfc-5056
kind: design-rationale
summary: The main goal of channel binding is to delegate cryptographic session protection to lower network layers (e.g., IPsec with hardware acceleration), reducing double-protection overhead, enabling zero-copy RDDP offloading, and reducing the number of live per-user cryptographic contexts that applications such as NFSv4 must maintain.
section: "1"
topics:
    - security
    - crypto
    - ipsec
