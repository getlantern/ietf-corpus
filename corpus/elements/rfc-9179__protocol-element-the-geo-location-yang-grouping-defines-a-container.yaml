document: rfc-9179
kind: protocol-element
summary: The 'geo-location' YANG grouping defines a container for specifying a location on or around an astronomical object. It includes sub-containers for 'reference-frame', a choice of 'location' (ellipsoid or Cartesian), 'velocity', and leaf nodes for 'timestamp' and 'valid-until'.
