document: rfc-3896
kind: design-rationale
summary: The dsx3IfIndex object was deprecated in favor of using ifStackTable to represent the proxy relationship between pairs of DS3 interfaces (e.g., router-side and CSU network-side). The ifStackTable approach is consistent with its standard use for sub-layer associations, where entire DS3 frames are exchanged between interface pairs.
section: 2.2.1
topics:
    - snmp
