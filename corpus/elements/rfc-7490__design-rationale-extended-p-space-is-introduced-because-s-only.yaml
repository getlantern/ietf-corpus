document: rfc-7490
kind: design-rationale
summary: Extended P-space is introduced because S only uses a repair path after detecting failure of S-E, so the initial hop need not follow normal forwarding. By also including the P-spaces of S's neighbors, S can reach candidate PQ nodes that are unreachable via S's own P-space, substantially increasing repair coverage.
section: 5.2.1.2
topics:
    - routing
