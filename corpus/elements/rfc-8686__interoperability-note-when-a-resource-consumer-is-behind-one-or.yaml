document: rfc-8686
kind: interoperability-note
summary: When a resource consumer is behind one or more NATs, the discovery procedure will use the public IP of the outermost NAT as the lookup parameter. Using a private RFC 1918 address as the parameter requires correct DNS split-horizon and DNSSEC trust anchors to yield usable results.
section: 5.1.3
topics:
    - nat
    - dns
