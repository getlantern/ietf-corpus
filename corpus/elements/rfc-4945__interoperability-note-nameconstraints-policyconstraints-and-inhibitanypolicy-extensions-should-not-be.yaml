document: rfc-4945
kind: interoperability-note
summary: NameConstraints, PolicyConstraints, and InhibitAnyPolicy extensions SHOULD NOT be generated in certificates intended for IKE, because many IKE implementations do not support them and PKIX mandates they be marked critical when present, causing non-supporting implementations to reject the certificate.
section: 5.1.3.10
topics:
    - ipsec
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
