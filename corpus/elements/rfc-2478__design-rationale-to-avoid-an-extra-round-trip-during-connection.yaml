document: rfc-2478
kind: design-rationale
summary: To avoid an extra round trip during connection setup, the initiator may embed its preferred mechanism's initial security token in the NegTokenInit mechToken field. If the target selects the same preferred mechanism, no additional round trips are incurred by the negotiation protocol itself.
section: "1"
topics:
