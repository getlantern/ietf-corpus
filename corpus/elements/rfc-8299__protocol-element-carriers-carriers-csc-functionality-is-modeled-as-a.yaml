document: rfc-8299
kind: protocol-element
summary: Carriers' Carriers (CsC) functionality is modeled as a feature-gated boolean `carrierscarrier` leaf under the VPN service, and a `carrierscarrier` container under the site service specifying the `signalling-type` (BGP or LDP). This enables a carrier customer to use the provider's MPLS network as a transit backbone.
