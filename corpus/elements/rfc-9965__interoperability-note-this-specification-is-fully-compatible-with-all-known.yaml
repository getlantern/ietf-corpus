document: rfc-9965
kind: interoperability-note
summary: This specification is fully compatible with all known EAP implementations. When presented with a peer wishing to use an EPI, existing non-compliant implementations will return EAP Failure and will not otherwise misbehave, making the mechanism fail-safe.
