document: rfc-8106
kind: state-machine
summary: 'RDNSS entry lifecycle: NEW entry is registered when address first received (Step d); EXISTING entry has its Expiration-time updated on re-receipt with non-zero Lifetime (Step c); entry is DELETED immediately when Lifetime=0 is received (Step b) or when current time exceeds Expiration-time (expiry handling).'
section: "6.2"
