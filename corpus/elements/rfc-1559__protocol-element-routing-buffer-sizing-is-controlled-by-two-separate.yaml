document: rfc-1559
kind: protocol-element
summary: 'Routing buffer sizing is controlled by two separate parameters: phivRouteBuffSize (maximum Routing-layer forwarding message size) and phivRouteSegBuffSize (maximum end-to-end segment size). Both include an extra 6 bytes for Phase III compatibility; SegBuffSize must be less than or equal to BuffSize.'
