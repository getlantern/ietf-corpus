document: rfc-2428
kind: protocol-element
summary: 'The EPRT command replaces PORT for extended address data connections. Its format is: EPRT<space><d><net-prt><d><net-addr><d><tcp-port><d>, where <d> is a delimiter character and <net-prt> is an IANA address family number.'
