document: rfc-7829
kind: design-rationale
summary: Reducing PMR also forces a reduction in Association.Max.Retrans (AMR) to avoid dormant state, which decreases overall association fault tolerance by increasing association termination during minor congestion. The PF state avoids this coupling by introducing an intermediate threshold that does not affect AMR.
