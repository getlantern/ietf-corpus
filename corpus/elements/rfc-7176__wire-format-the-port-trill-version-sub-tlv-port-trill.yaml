document: rfc-7176
kind: wire-format
summary: 'The Port TRILL Version sub-TLV (PORT-TRILL-VER, MT-Port-Cap-TLV sub-TLV type 7) is 5 bytes: 1-byte Max-version and a 32-bit Capabilities and Header Flags Supported vector. Bits 3–13 indicate supported hop-by-hop extended flags (RFC 7179); bits 0–2 and 14–31 are reserved for optional capabilities.'
section: 2.2.4
topics:
    - routing
