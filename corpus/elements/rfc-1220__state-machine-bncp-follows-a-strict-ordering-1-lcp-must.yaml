document: rfc-1220
kind: state-machine
summary: 'BNCP follows a strict ordering: (1) LCP must complete and reach network-layer Protocol Configuration Negotiation phase, (2) BNCP exchanges configuration options and opens the connection, (3) only then may LAN bridged traffic flow. An implementation must be prepared to wait for Link Quality testing to finish before timing out on Configure-Ack.'
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
