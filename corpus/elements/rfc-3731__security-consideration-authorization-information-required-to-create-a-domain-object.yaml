document: rfc-3731
kind: security-consideration
summary: Authorization information (required to create a domain object and used in query and transfer operations) MUST be stored and exchanged using high-grade encryption. Failure to protect authorization information can result in unauthorized transfer operations and unauthorized information release.
section: "7"
rfc2119_level: MUST
topics:
