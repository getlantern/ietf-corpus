document: rfc-5537
kind: normative-requirement
summary: If the Newsgroups header field contains a moderated group and the proto-article lacks an Approved header field, the injecting agent MUST either forward the proto-article to the moderator (per Section 3.5.1) or reject it. This forwarding is performed before adding Injection-Info and Injection-Date headers.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
