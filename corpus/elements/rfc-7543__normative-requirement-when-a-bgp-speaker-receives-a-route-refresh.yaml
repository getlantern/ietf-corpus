document: rfc-7543
kind: normative-requirement
summary: When a BGP speaker receives a ROUTE-REFRESH message containing a CP-ORF that violates any encoding rule in Section 2, the BGP speaker MUST ignore the entire ROUTE-REFRESH message. It SHOULD also log the event, but MAY apply logging thresholds.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
