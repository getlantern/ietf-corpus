document: rfc-1827
kind: normative-requirement
summary: In systems claiming to provide multilevel security (e.g., B1 or Compartmented Mode Workstation), additional appropriate mandatory access controls MUST be applied based on the security level of the receiving process and the security level associated with the Security Association after successful Tunnel-mode decryption.
section: "4.1"
rfc2119_level: MUST
topics:
