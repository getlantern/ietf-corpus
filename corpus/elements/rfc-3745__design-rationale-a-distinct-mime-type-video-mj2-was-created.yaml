document: rfc-3745
kind: design-rationale
summary: A distinct MIME type (video/mj2) was created for Motion JPEG 2000 rather than reusing an existing type because MJ2 is a restricted usage of the ISO Base Media File Format shared with MPEG-4/MP4, and a new type is needed to identify this restriction unambiguously.
section: "1"
