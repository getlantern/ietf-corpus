document: rfc-8182
kind: normative-requirement
summary: The Update Notification File SHOULD NOT be cached for longer than 1 minute; setting Cache-Control to an interval longer than 1 hour is NOT RECOMMENDED. An exception is that serving a stale notification is better than serving none at all.
section: 3.5.1.2
rfc2119_level: SHOULD NOT
topics:
    - routing
    - http
