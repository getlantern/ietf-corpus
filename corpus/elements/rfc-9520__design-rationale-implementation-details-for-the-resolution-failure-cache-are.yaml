document: rfc-9520
kind: design-rationale
summary: 'Implementation details for the resolution failure cache are intentionally unspecified: different failure conditions may be cached differently (e.g., DNSSEC failures keyed on name/class/type, unresponsive servers keyed only on IP address). Developers should document their choices so operators know expected behavior.'
section: "3.2"
topics:
    - dns
