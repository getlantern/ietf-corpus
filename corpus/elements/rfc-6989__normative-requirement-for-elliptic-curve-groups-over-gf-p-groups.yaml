document: rfc-6989
kind: normative-requirement
summary: For elliptic curve groups over GF(p) (groups 19, 20, 21, 25–30), a receiving peer MUST check that the peer's public value is valid — specifically that the x and y parameters satisfy the curve equation y^2 = x^3 + ax + b mod p.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
