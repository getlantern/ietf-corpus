document: rfc-9090
kind: security-consideration
summary: The BER encodings in X.690 Clauses 8.19 and 8.20 MUST be followed precisely. Failure to validate the requirements from Section 2.1 may allow an attacker to subvert a checking process by submitting alternative representations that are decoded differently by a protected decoder.
