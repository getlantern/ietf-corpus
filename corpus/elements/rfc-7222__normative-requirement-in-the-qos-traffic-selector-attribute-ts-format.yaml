document: rfc-7222
kind: normative-requirement
summary: In the QoS Traffic Selector attribute, TS Format value (0) is reserved and MUST NOT be used. Value (1) selects the IPv4 Binary Traffic Selector (RFC 6088 Section 3.1); value (2) selects the IPv6 Binary Traffic Selector (RFC 6088 Section 3.2).
section: 4.2.10
rfc2119_level: MUST NOT
topics:
    - qos
    - ip
