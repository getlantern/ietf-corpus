document: rfc-8930
kind: normative-requirement
summary: Upon receiving a first fragment, a forwarding node that does fragment forwarding MUST attempt to create a state and forward the fragment as an atomic operation; if the first fragment cannot be forwarded, the state MUST be removed.
section: "5"
rfc2119_level: MUST
topics:
