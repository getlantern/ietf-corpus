document: rfc-4213
kind: protocol-element
summary: Dual IP layer (dual stack) provides complete implementations of both IPv4 and IPv6 in a single host or router. IPv6/IPv4 nodes may operate with IPv4 only, IPv6 only, or both stacks enabled, and MAY provide a configuration switch to disable either stack.
