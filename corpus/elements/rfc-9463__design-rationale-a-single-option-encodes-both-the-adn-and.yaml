document: rfc-9463
kind: design-rationale
summary: A single option encodes both the ADN and IP addresses rather than using separate options. Using separate options would require a correlation mechanism to associate IP addresses with ADNs when multiple ADNs are present, adding unnecessary complexity.
section: 3.1.4
topics:
    - dns
