document: rfc-2678
kind: design-rationale
summary: Type-P-Interval-Bidirectional-Connectivity is insufficient for 'generally useful' connectivity because it only requires that each direction has connectivity at some point in the interval, not that a packet sent in one direction can elicit a reply within the same interval. This deficiency motivates the more complex Type-P1-P2-Interval-Temporal-Connectivity metric.
section: "5.5"
topics:
    - measurement
