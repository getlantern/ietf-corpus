document: rfc-8506
kind: normative-requirement
summary: Re-authorization of a credit pool is triggered when C1*M1 + C2*M2 + ... + Cn*Mn >= S, where Cx is used resources for service x and Mx is the corresponding multiplier; this formula governs pooled-quota exhaustion across multiple services.
section: 5.1.2
rfc2119_level: MUST
