document: rfc-8185
kind: normative-requirement
summary: If it is determined on one dual-homing PE that switchover is needed, that PE MUST set the S bit in the Dual-Node Switching TLV and send it to the other dual-homing PE immediately using three consecutive DHC messages.
section: "4.2"
rfc2119_level: MUST
topics:
