document: rfc-3398
kind: normative-requirement
summary: The relevant values of SIP header fields MUST overwrite (through translation) the parameter values that would otherwise be set from encapsulated ISUP. SIP network updates to critical session context parameters take precedence over encapsulated ISUP in ISUP-SIP-ISUP bridging cases.
section: 7.2.1.1
rfc2119_level: MUST
topics:
