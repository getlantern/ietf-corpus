document: rfc-2491
kind: normative-requirement
summary: When shortcut discovery is not supported by a router, the router SHALL construct a Redirect identifying itself as the best shortcut and return it to the soliciting host. If supported, the router SHALL use NHRP, then construct and transmit a Redirect from the NHRP Reply; if a NHRP NAK is received, the router SHALL similarly redirect to itself.
section: 3.2.2
rfc2119_level: SHALL
topics:
    - ip
    - v6ops
