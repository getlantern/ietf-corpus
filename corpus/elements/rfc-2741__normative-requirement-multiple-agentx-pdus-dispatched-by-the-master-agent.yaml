document: rfc-2741
kind: normative-requirement
summary: Multiple AgentX PDUs dispatched by the master agent in response to a single SNMP request on the same session must carry the same h.transactionID; PDUs from distinct SNMP requests on the same session must have distinct transaction IDs (within the 32-bit field).
section: "6.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
