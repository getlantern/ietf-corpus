document: rfc-7846
kind: normative-requirement
summary: The peer ID MUST be unique. It can take the form of a UUID (RFC 4122) and can be bound to a network address. The peer ID and any required security certificates are obtained from an offline enrollment server.
section: 1.2.2
rfc2119_level: MUST
topics:
