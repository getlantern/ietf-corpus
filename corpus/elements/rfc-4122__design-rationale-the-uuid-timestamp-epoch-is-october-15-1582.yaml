document: rfc-4122
kind: design-rationale
summary: The UUID timestamp epoch is October 15, 1582 (the date of Gregorian calendar reform), inherited from the OSF DCE specification. The 60-bit timestamp will roll over around A.D. 3400, depending on the algorithm used.
section: 4.1.4
