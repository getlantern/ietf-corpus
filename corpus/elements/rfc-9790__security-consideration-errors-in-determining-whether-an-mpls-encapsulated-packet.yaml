document: rfc-9790
kind: security-consideration
summary: Errors in determining whether an MPLS-encapsulated packet is IP have primarily caused unbalanced multipathing, but carry the potential for more severe security problems. Creating the PFN registry and deprecating the heuristic payload-identification approach aims to reduce or eliminate these errors. General MPLS label stack security considerations are addressed in RFC 3032.
section: "4"
topics:
    - mpls
    - security
