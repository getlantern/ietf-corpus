document: rfc-8935
kind: interoperability-note
summary: Push-based delivery (this specification) is one of two SET delivery methods; poll-based delivery is defined in RFC 8936. Push is applicable when the transmitter can make outbound HTTP requests and the recipient can host a TLS-enabled endpoint accessible to the transmitter.
section: "1"
topics:
