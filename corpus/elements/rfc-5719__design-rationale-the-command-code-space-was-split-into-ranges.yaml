document: rfc-5719
kind: design-rationale
summary: The command code space was split into ranges with different allocation policies to align the extensibility rules for Diameter commands with those for Diameter application identifiers, allowing other SDOs to define new commands without requiring IETF consensus while still avoiding overloading of existing commands.
