document: rfc-4607
kind: normative-requirement
summary: An incoming datagram destined to an SSM address MUST be delivered by the IP module to all sockets that have subscribed with matching source address, destination address, and arriving interface, and MUST NOT be delivered to other sockets.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
