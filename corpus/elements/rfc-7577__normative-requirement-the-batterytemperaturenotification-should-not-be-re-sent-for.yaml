document: rfc-7577
kind: normative-requirement
summary: The batteryTemperatureNotification SHOULD NOT be re-sent for the same battery or cell within a 10-minute interval to limit notification rate when temperature alternates near a threshold. An exception applies immediately after reinitialization of the battery monitoring system.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - snmp
