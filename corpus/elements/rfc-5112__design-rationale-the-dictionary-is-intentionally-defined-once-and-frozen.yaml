document: rfc-5112
kind: design-rationale
summary: The dictionary is intentionally defined once and frozen forever, never intended to evolve as presence evolves. This design choice avoids the problems of updating, upgrading, and negotiating which dictionary version is supported at the remote end when multiple versions coexist.
