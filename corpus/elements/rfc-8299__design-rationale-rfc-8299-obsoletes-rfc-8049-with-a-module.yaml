document: rfc-8299
kind: design-rationale
summary: RFC 8299 obsoletes RFC 8049 with a module of the same name (`ietf-l3vpn-svc`) that is not backward compatible. Retaining the module name is justified under RFC 7950 Section 11 because RFC 8049's module was unimplementable due to broken XPATH expressions in `must` statements, making an interoperability conflict between the two versions impossible in practice.
section: 1.4.2
topics:
    - yang
    - vpn
