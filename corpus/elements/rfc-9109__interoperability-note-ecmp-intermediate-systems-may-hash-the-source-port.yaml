document: rfc-9109
kind: interoperability-note
summary: ECMP intermediate systems may hash the source port to select the outgoing link. Changing the source port per-request can cause NTP exchanges to traverse different paths with different delay asymmetry, potentially introducing stable clock offsets between clients synchronized to the same server.
section: "3.2"
topics:
    - ntp
    - udp
    - measurement
