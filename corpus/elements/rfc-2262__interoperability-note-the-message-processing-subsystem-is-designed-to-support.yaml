document: rfc-2262
kind: interoperability-note
summary: The Message Processing Subsystem is designed to support multiple concurrent version-specific MP models. SNMPv1 (RFC 1157) and SNMPv2c (RFC 1901) message formats are identified as future models; the architecture does not restrict the number or types of models that can coexist.
section: "2.2"
topics:
