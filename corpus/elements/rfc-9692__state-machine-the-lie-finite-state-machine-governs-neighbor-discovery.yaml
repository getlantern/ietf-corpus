document: rfc-9692
kind: state-machine
summary: 'The LIE Finite State Machine governs neighbor discovery with three states: _OneWay_ (initial), _TwoWay_ (remote LIE seen), and _ThreeWay_ (mutual reflection confirmed including security information). TIE exchange begins only after reaching _ThreeWay_; ZTP information is exchanged in any state.'
section: 6.2.1
