document: rfc-5282
kind: normative-requirement
summary: When any AES GCM or AES CCM identifier is used, the Key Length attribute MUST be specified with a value of 128, 192, or 256. Use of 192-bit keys is NOT RECOMMENDED; if a key larger than 128 bits is appropriate, a 256-bit AES key SHOULD be used.
section: "7.3"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
