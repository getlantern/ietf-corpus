document: rfc-7688
kind: normative-requirement
summary: If new sub-TLVs or their encodings are malformed, a proper implementation SHOULD log the problem and MUST stop sending the LSA containing malformed TLVs or sub-TLVs. Errors SHOULD be logged for the local operator, and implementations MUST provide a configurable rate limit on such logs.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
