document: rfc-2003
kind: normative-requirement
summary: When relaying an ICMP Datagram Too Big message to the original sender, the MTU value conveyed SHOULD be the tunnel MTU minus the size of the encapsulating IP header, to avoid fragmentation of the original datagram by the encapsulator.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - ip
