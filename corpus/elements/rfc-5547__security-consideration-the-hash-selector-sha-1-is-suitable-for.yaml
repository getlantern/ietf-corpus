document: rfc-5547
kind: security-consideration
summary: The 'hash' selector (SHA-1) is suitable for file identification and post-transfer integrity verification, but should not be relied upon to protect file integrity against active attackers; endpoints requiring integrity protection should use a separate mechanism such as S/MIME.
section: "6"
topics:
