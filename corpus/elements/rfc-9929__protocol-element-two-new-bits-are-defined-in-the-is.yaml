summary: 'Two new bits are defined in the IS-IS IPv4/IPv6 Extended Reachability Attribute Flags (RFC 7794): U-Flag (bit 5) indicates the prefix is unreachable; UP-Flag (bit 6) indicates the prefix is unreachable due to a planned event such as planned maintenance.'
