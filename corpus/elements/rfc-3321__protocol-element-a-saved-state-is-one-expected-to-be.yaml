document: rfc-3321
kind: protocol-element
summary: A saved state is one expected to be used for compression/decompression of later messages. An acked state is a saved state for which the compressor has received an explicit acknowledgement confirming the state exists at the remote decompressor; a compressor must only use acked states to avoid decompression failure.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
