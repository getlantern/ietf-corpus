document: rfc-7975
kind: normative-requirement
summary: An implementation of the CDNI Redirection interface MUST support TLS transport per RFC 2818 and RFC 7230. In environments requiring protection, mutually authenticated TLS MUST be used by both dCDN (server) and uCDN (client), following RFC 7525 guidance.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
