document: rfc-3101
kind: normative-requirement
summary: Translated Type-5 LSAs MUST copy the non-zero forwarding address from the Type-7 LSA. Only Type-5 LSAs resulting from aggregation of multiple Type-7 LSAs via address ranges may have a forwarding address of 0.0.0.0.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
