document: rfc-5392
kind: design-rationale
summary: Two separate LSA types (Inter-AS-TE-v2 and Inter-AS-TE-v3) are defined for OSPFv2 and OSPFv3 respectively, rather than reusing existing intra-AS TE LSAs, so that inter-AS TE link advertisements can be easily identified and distinguished from intra-AS TE information.
