document: rfc-3972
kind: protocol-element
summary: 'A CGA satisfies two conditions: Hash1 (64-bit) must equal the interface identifier (ignoring bits 0–2, 6–7), and the 16*Sec leftmost bits of Hash2 (112-bit) must be zero. These conditions are expressed via Mask1=0x1cffffffffffffff and Sec-dependent Mask2 values.'
