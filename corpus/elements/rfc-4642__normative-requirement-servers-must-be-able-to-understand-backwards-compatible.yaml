document: rfc-4642
kind: normative-requirement
summary: Servers MUST be able to understand backwards-compatible TLS Client Hello messages (where client_version is TLS 1.0 or later). The TLS SNI extension 'server_name' SHOULD be implemented by all clients and by any server implementing STARTTLS known by multiple names.
section: 2.2.2
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
