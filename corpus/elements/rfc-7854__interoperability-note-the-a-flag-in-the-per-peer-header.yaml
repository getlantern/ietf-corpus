document: rfc-7854
kind: interoperability-note
summary: The A flag in the Per-Peer Header indicates whether AS_PATH is encoded in legacy 2-byte format (A=1) or 4-byte format (A=0, per RFC 6793). A BMP speaker MAY propagate AS_PATH as received or reformat to 4-byte; if reformatting, AS4_PATH or AS4_AGGREGATOR attributes SHOULD NOT be included in the BMP UPDATE message.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
