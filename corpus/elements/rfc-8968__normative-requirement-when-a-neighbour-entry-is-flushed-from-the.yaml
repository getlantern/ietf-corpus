document: rfc-8968
kind: normative-requirement
summary: When a neighbour entry is flushed from the neighbour table, its associated DTLS state SHOULD be discarded. The node SHOULD send a DTLS close_notify alert to the neighbour if it believes the link is still viable.
section: "2.5"
rfc2119_level: SHOULD
topics:
    - routing
    - security
