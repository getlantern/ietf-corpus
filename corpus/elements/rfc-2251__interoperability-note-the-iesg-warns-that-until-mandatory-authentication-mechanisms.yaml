document: rfc-2251
kind: interoperability-note
summary: The IESG warns that until mandatory authentication mechanisms are standardized, LDAPv3 clients and servers using update functionality are UNLIKELY TO INTEROPERATE, or MAY INTEROPERATE ONLY IF AUTHENTICATION IS REDUCED TO AN UNACCEPTABLY WEAK LEVEL. Implementors are discouraged from deploying update-capable LDAPv3 implementations until a Proposed Standard for mandatory authentication is published.
section: "1"
topics:
    - ldap
    - security
