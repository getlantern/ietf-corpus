document: rfc-8282
kind: normative-requirement
summary: When the I flag is set, the M flag is clear, and the T flag is clear, triggered signaling is not allowed; virtual TE links that have not been pre-signaled MUST NOT be used in path computation, and loose hops spanning the lower-layer network MUST NOT be specified.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
