document: rfc-2681
kind: security-consideration
summary: Measurements can be harmed by attackers injecting artificial measurement traffic that is accepted as legitimate, artificially lowering reported loss rates. Authentication techniques such as digital signatures MAY be used to guard against injected traffic attacks.
