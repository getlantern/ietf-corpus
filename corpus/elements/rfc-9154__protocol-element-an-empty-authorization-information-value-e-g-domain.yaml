document: rfc-9154
kind: protocol-element
summary: An empty authorization information value (e.g., <domain:pw/>) represents the 'unset' state and is stored as a NULL (undefined) value in the registry database. A non-empty value represents the 'set' state and is stored as a cryptographic hash.
section: "4.4"
