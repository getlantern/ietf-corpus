document: rfc-5453
kind: protocol-element
summary: IPv6 unicast address interface identifiers (for addresses not starting with binary 000) are required to be 64 bits long and constructed in Modified EUI-64 format per RFC4291. This document applies only to IIDs formed in that modified EUI-64 format.
section: "1.1"
topics:
    - ip
    - v6ops
