document: rfc-9085
kind: protocol-element
summary: The LAN Adjacency SID TLV (Type 1100) allows a node to advertise adjacency SIDs to all neighbors on a LAN within a single BGP-LS Link NLRI instance, avoiding the need to originate a separate Link NLRI for each per-neighbor adjacency. The Neighbor ID field is 6 octets for IS-IS (System ID) and 4 octets for OSPF (Router-ID).
section: 2.2.2
topics:
    - routing
    - bgp
    - mpls
