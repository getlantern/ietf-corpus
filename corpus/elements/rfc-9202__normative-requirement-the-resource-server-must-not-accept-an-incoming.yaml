document: rfc-9202
kind: normative-requirement
summary: 'The resource server MUST NOT accept an incoming CoAP request as authorized unless: the message was received on a secure channel established per this document, the authorization information is valid, the request is destined for the resource server, the resource URI is covered, and the request method is authorized.'
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
    - oauth
