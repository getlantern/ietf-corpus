document: rfc-1638
kind: normative-requirement
summary: If an implementation supports a MAC Type that is the higher-numbered format of a given MAC Type, it MUST also support the lower-numbered format; e.g., supporting FDDI with canonical addresses requires also supporting FDDI with non-canonical addresses.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
