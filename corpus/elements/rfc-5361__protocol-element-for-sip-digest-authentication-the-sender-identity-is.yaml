document: rfc-5361
kind: protocol-element
summary: For SIP Digest authentication, the sender identity is the SIP Address of Record (AOR) for the authenticated user. For P-Asserted-ID, the identity is the SIP URI in that header; if multiple values exist (sip URI and tel URI), each is used for comparisons.
