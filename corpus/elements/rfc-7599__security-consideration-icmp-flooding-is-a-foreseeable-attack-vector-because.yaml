document: rfc-7599
kind: security-consideration
summary: ICMP flooding is a foreseeable attack vector because BR and CE nodes must process and translate ICMP and ICMPv6 messages. Mitigation requires policing the rate of ICMP messages and the rate at which MAP nodes process them, combined with identification and blocking of attack sources.
