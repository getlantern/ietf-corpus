document: rfc-2730
kind: normative-requirement
summary: ACK responding to a REQUEST MUST include Lease Time, Multicast Scope, and List of Address Ranges options. ACK responding to a RELEASE MUST include only Server Identifier and Lease Identifier. NAK MUST include an Error option with an error code and MUST NOT be retransmitted.
section: 2.2.5
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
