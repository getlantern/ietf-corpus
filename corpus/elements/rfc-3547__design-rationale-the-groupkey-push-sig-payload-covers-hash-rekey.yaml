kind: design-rationale
summary: The GROUPKEY-PUSH SIG payload covers hash("rekey" | message) and the POP payload covers hash("pop" | Ni | Nr) with distinct prefixes to prevent cross-protocol signature reuse between GROUPKEY-PUSH authentication and GROUPKEY-PULL membership authorization.
