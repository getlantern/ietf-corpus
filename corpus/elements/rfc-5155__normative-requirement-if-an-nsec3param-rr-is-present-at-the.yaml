document: rfc-5155
kind: normative-requirement
summary: If an NSEC3PARAM RR is present at the zone apex with a Flags field value of zero, then the zone MUST contain a complete set of NSEC3 RRs using the same hash algorithm, iterations, and salt at every hashed owner name in the zone.
section: "4"
rfc2119_level: MUST
topics:
    - dns
