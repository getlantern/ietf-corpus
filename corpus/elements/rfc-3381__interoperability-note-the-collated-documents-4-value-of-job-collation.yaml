document: rfc-3381
kind: interoperability-note
summary: The 'collated-documents(4)' value of job-collation-type corresponds to the IPP/1.1 'separate-documents-collated-copies' keyword of the 'multiple-document-handling' attribute, and 'uncollated-documents(5)' corresponds to 'separate-documents-uncollated-copies', enabling mapping between the two attribute spaces.
