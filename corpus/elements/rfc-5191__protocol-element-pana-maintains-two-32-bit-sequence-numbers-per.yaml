document: rfc-5191
kind: protocol-element
summary: 'PANA maintains two 32-bit sequence numbers per peer: one for outgoing requests and one for expected incoming requests. Numbers are monotonically incremented by 1 per new request and wrap to zero after 2^32-1. Initial sequence numbers are randomly chosen; the PCI message always carries sequence number 0.'
section: "5.2"
topics:
    - security
