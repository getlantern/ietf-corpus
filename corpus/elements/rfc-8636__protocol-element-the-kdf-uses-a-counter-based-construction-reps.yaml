summary: 'The KDF uses a counter-based construction: reps = ceiling(L/H_outputBits), iterating Hashi = H(counter || Z || OtherInfo) with a 32-bit big-endian counter, then concatenating hash outputs and truncating to L bits, with the result fed into random-to-key() per RFC 3961.'
