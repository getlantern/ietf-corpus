document: rfc-1442
kind: normative-requirement
summary: The MAX-ACCESS clause for objects with a SYNTAX of Counter32 or Counter64 is always 'read-only'. Similarly, no DEFVAL clause is allowed for Counter32 or Counter64 objects because counters have no defined initial value.
section: 7.1.6
rfc2119_level: MUST
topics:
