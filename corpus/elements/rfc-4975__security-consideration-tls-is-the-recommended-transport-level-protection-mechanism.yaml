document: rfc-4975
kind: security-consideration
summary: TLS is the recommended transport-level protection mechanism for MSRP. 'msrps' URIs ensure the next hop is TLS-protected but make no assertion about other hops; each hop's URI must be independently verified for the desired security properties.
section: "14.2"
