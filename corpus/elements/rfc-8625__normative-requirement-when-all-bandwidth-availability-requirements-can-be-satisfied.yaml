document: rfc-8625
kind: normative-requirement
summary: When all <bandwidth, availability> requirements can be satisfied, the node SHOULD reserve bandwidth resources from each remaining sub-bandwidth portion on its local link to set up the LSP. Optionally, higher availability bandwidth may be allocated to a lower availability request.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
