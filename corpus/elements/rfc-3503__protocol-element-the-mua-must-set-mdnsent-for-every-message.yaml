document: rfc-3503
kind: protocol-element
summary: The MUA MUST set $MDNSent for every message that required an automatic MDN to be sent, whether or not the MDN was actually sent. Automatic MDNs cover disposition types 'dispatched', 'processed', 'deleted', 'denied', or 'failed' with 'automatic-action' and 'MDN-sent-automatically' modes, for messages lacking $MDNSent or \Draft.
section: "3"
topics:
