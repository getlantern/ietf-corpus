document: rfc-8866
kind: wire-format
summary: Each SDP line has the form '<type>=<value>' where type is exactly one case-significant character. Lines are terminated by CRLF (0x0d0a); parsers SHOULD also accept lines terminated with a single newline. Whitespace is not used on either side of '='.
