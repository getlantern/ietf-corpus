document: rfc-9231
kind: protocol-element
summary: 'DigestMethod algorithms defined include MD5 (128-bit, 16-octet, URI: xmldsig-more#md5), SHA-224 (224-bit, 28-octet), SHA-384 (384-bit, 48-octet), Whirlpool (512-bit, 64-octet), and SHA-3 variants (224/256/384/512-bit). DigestValue content SHALL be base64 encoding of the digest.'
