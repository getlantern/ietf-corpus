document: rfc-9231
kind: security-consideration
summary: XMSS and XMSSMT are stateful signature schemes requiring careful state management to maintain their security strength; their security is believed to depend only on the security of underlying hash functions and is expected to resist large-scale quantum computers. See NIST SP 800-208 for intended usage and state management requirements.
section: 2.2.6
topics:
    - crypto
    - security
