document: rfc-7780
kind: errata
summary: 'RFC 6325 Section 4.6 did not allow for unicast MTU-probe and MTU-ack PDUs (Err3003). Section 4.6.2 Item 1 is corrected: TRILL switches MUST handle frames with Outer.MacDA equal to either All-IS-IS-RBridges or the unicast MAC address of the receiving RBridge port.'
section: 5.1.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
