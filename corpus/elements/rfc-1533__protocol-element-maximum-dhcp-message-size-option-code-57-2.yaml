document: rfc-1533
kind: protocol-element
summary: Maximum DHCP Message Size option (code 57, 2 octets, unsigned 16-bit integer) specifies the maximum DHCP message length the client is willing to accept. Minimum legal value is 576 octets. Should not be used in DHCPDECLINE messages.
