document: rfc-4120
kind: normative-requirement
summary: When the AS server includes pre-authentication data in a KRB-ERROR or AS-REP, it MUST use PA-ETYPE-INFO2 (not PA-ETYPE-INFO) if the client's AS-REQ lists at least one 'newer' encryption type; otherwise it MUST send both PA-ETYPE-INFO2 and PA-ETYPE-INFO.
section: 3.1.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
