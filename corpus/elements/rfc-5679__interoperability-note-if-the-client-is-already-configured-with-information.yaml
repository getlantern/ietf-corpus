document: rfc-5679
kind: interoperability-note
summary: If the client is already configured with information about which transport protocol is used for a mobility service in a particular domain, it can bypass NAPTR lookup and directly perform an SRV query for that specific transport (e.g., _MIHIS._tcp.example.com).
