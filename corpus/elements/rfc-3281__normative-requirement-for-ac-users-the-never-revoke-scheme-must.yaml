document: rfc-3281
kind: normative-requirement
summary: For AC users, the 'never revoke' scheme MUST be supported and the 'pointer in AC' scheme SHOULD be supported. If only 'never revoke' is supported, all ACs lacking a noRevAvail extension MUST be rejected. An AC MUST NOT contain both noRevAvail and a revocation pointer.
section: "6"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
