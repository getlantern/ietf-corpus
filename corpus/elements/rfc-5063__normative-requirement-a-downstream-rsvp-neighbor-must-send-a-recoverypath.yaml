document: rfc-5063
kind: normative-requirement
summary: A downstream RSVP neighbor MUST send a RecoveryPath message for each LSP associated with the restarting node for which it has sent a Resv message, after detecting restart capability per Section 4.4. If the restarting node's R-bit is absent or cleared, the neighbor SHOULD NOT send RecoveryPath messages.
section: 4.5.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
