document: rfc-9922
kind: security-consideration
summary: YANG-based management protocols accessing the ietf-schedule module (NETCONF, RESTCONF) must use a secure transport layer (SSH, TLS, QUIC) and mutual authentication. NACM (RFC 8341) provides access control to restrict users to preconfigured subsets of operations.
