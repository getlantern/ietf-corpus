document: rfc-8667
kind: security-consideration
summary: IS-IS SR extensions program the MPLS data plane, and the same attacks applicable to the IP/IPv6 control plane can be carried out on the MPLS control plane, potentially resulting in misrouted traffic that may be harder to detect and isolate than IP misrouting. Existing IS-IS cryptographic authentication mechanisms (RFC 5304 and RFC 5310) apply to these extensions.
section: "5"
topics:
    - security
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
