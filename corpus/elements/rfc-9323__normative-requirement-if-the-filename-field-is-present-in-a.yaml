document: rfc-9323
kind: normative-requirement
summary: If the fileName field is present in a FileNameAndHash element, it MUST contain only POSIX Portable Filename Character Set characters and MUST be unique with respect to other FileNameAndHash elements that also have a fileName. If the fileName is omitted, the hash field MUST be unique among elements that also omit the fileName.
section: 4.4.1
rfc2119_level: MUST
topics:
    - pkix
