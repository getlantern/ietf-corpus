document: rfc-9404
kind: normative-requirement
summary: If a blobId DataSourceObject's range cannot be fully satisfied (begins or extends past the end of the blob), the DataSourceObject is invalid and MUST result in a notCreated response. Servers MUST add a createdIds entry for each successful Blob/upload so the blobId is available via back-reference in subsequent method calls.
section: "4.1"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
