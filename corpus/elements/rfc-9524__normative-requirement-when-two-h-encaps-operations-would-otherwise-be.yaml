document: rfc-9524
kind: normative-requirement
summary: When two H.Encaps operations would otherwise be needed on a root node — one for the service (MVPN/EVPN) and one for replication steering to a downstream node — they SHOULD be combined for optimization to avoid extra IPv6 encapsulation.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
    - multicast
