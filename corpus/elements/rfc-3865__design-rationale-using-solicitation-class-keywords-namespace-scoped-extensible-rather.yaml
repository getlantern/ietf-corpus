document: rfc-3865
kind: design-rationale
summary: Using solicitation class keywords (namespace-scoped, extensible) rather than a simple boolean was chosen so that the mail infrastructure remains a neutral mechanism, allowing different policy definitions (governmental, ISP, developer) to co-exist without the protocol mandating a single definition of 'solicitation'.
section: 2.2.1
topics:
