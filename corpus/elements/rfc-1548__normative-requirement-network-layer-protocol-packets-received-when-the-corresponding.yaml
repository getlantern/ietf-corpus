document: rfc-1548
kind: normative-requirement
summary: Network-layer protocol packets received when the corresponding NCP is not in the Opened state MUST be silently discarded. While LCP is Opened, any unsupported protocol MUST be returned in a Protocol-Reject.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
