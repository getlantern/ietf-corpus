document: rfc-7564
kind: normative-requirement
summary: Profile authors who consider defining a new directionality rule are strongly discouraged from doing so; they SHOULD instead use the Bidi Rule (RFC 5893) for IdentifierClass-based profiles or follow the Unicode bidirectional algorithm (UAX9) for FreeformClass-based profiles.
section: 5.2.5
rfc2119_level: SHOULD
