document: rfc-5103
kind: protocol-element
summary: Reverse Information Elements are defined by assigning Private Enterprise Number (PEN) 29305 as the 'IPFIX Reverse Information Element Private Enterprise'. Each Information Element number within this PEN space is the reverse counterpart of the corresponding IANA-assigned public IE number. To generate a Reverse IE, set the enterprise bit and define the IE within PEN 29305.
section: "6.1"
topics:
