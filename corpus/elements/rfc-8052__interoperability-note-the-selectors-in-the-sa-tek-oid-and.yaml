document: rfc-8052
kind: interoperability-note
summary: The selectors in the SA TEK (OID and OID-Specific payload) may not match what the GM requested in the ID payload; the KS may return multiple TEKs with different traffic selectors, and GROUPKEY-PUSH messages do not include an ID payload, so TEK definitions must include traffic selectors.
section: 2.2.1
topics:
    - ipsec
    - security
