document: rfc-7057
kind: normative-requirement
summary: In cases where EAP is used for application authentication, support for EAP channel bindings is REQUIRED on the EAP peer and EAP server to validate that the host is authorized to provide the services requested. The application MUST define channel binding attributes sufficient to validate that the service is correctly represented to the peer.
section: "3"
rfc2119_level: REQUIRED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
