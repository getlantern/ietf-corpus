document: rfc-5651
kind: protocol-element
summary: The Congestion Control Information (CCI) field is 32, 64, 96, or 128 bits in length as determined by the C flag (C=0 means 32 bits, C=3 means 128 bits). It is an opaque field used to carry congestion control information such as layer numbers, logical channel numbers, and sequence numbers.
