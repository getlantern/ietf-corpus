document: rfc-9359
kind: wire-format
summary: 'The IOAM Incremental Tracing Capabilities Object has the same wire format as the Pre-allocated Tracing object: 24-bit IOAM-Trace-Type, 7-bit Reserved, 1-bit W flag, 16-bit Namespace-ID, 16-bit Ingress_MTU, and 16- or 32-bit Ingress_if_id. Its presence indicates incremental (rather than pre-allocated) tracing is enabled.'
section: 3.2.2
topics:
    - measurement
