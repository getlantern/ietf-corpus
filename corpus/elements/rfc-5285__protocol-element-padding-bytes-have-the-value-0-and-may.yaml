document: rfc-5285
kind: protocol-element
summary: Padding bytes have the value 0 and may be placed between extension elements or after the last element to pad to a 32-bit boundary. A padding byte does not supply an element ID or length; when encountered, the parser skips it and continues to the next byte.
section: "4.1"
topics:
