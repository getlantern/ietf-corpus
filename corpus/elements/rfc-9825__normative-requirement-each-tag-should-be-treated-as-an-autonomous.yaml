document: rfc-9825
kind: normative-requirement
summary: Each tag SHOULD be treated as an autonomous identifier; the ordering of tags SHOULD NOT change their meaning. When propagating multiple tags between areas, the order of tags MUST be preserved for consistent view across implementations supporting fewer tags.
section: "4"
rfc2119_level: MUST
topics:
