document: rfc-9776
kind: normative-requirement
summary: When a received Query or Report contains additional octets beyond the defined fields, implementations MUST include those octets in checksum verification but MUST otherwise ignore them. When sending, implementations MUST NOT include additional octets beyond the defined fields.
section: 4.1.10
rfc2119_level: MUST
topics:
    - multicast
