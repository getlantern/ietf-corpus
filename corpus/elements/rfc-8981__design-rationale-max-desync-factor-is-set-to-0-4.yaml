document: rfc-8981
kind: design-rationale
summary: MAX_DESYNC_FACTOR is set to 0.4 * TEMP_PREFERRED_LIFETIME because this produces statistically different address lifetimes while capping the number of concurrent temporary addresses at approximately three when default parameter values are used, limiting stress on network elements.
section: "3.8"
topics:
