document: rfc-2183
kind: interoperability-note
summary: If a Content-Disposition header is used on a multipart body part, it applies to the multipart as a whole, not the individual subparts. Subpart dispositions should not be consulted until the multipart itself is presented.
section: "2.9"
topics:
