document: rfc-9460
kind: normative-requirement
summary: Clients and recursive resolvers MUST impose a limit on the total number of SVCB AliasMode records they will follow per resolution request. This limit MUST NOT be zero; implementations MUST be able to follow at least one AliasMode record.
section: 2.4.2
rfc2119_level: MUST
topics:
    - dns
