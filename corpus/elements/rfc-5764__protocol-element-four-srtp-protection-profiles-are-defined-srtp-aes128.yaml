document: rfc-5764
kind: protocol-element
summary: 'Four SRTP protection profiles are defined: SRTP_AES128_CM_HMAC_SHA1_80 (0x0001), SRTP_AES128_CM_HMAC_SHA1_32 (0x0002), SRTP_NULL_HMAC_SHA1_80 (0x0005), and SRTP_NULL_HMAC_SHA1_32 (0x0006). All profiles use a 112-bit salt, HMAC-SHA1 authentication, and a maximum lifetime of 2^31 packets; the NULL profiles omit encryption.'
section: 4.1.2
topics:
