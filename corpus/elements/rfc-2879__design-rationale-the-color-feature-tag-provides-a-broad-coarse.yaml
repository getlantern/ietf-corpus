document: rfc-2879
kind: design-rationale
summary: The 'color' feature tag provides a broad, coarse indication of color capability (Binary/Limited/Mapped/Grey/Full) to allow selection among a small number of available data resources, with more detailed tags used only when finer qualification is needed.
section: "3.5"
