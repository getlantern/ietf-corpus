document: rfc-3191
kind: security-consideration
summary: Clients SHOULD ensure that mail routing is based only on authoritative DNS answers. Once DNS Security mechanisms (DNSSEC, RFC 2065) are more widely deployed, clients SHOULD employ them to verify authenticity and integrity of mail routing records.
section: "6"
rfc2119_level: SHOULD
topics:
    - email
    - dns
    - security
