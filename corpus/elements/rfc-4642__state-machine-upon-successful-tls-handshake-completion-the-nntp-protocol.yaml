document: rfc-4642
kind: state-machine
summary: Upon successful TLS handshake completion, the NNTP protocol resets to the state immediately after the initial greeting response (except MODE READER effects are preserved). The server MUST discard client knowledge not obtained from TLS negotiation; the client SHOULD discard and MUST NOT rely on server knowledge not from TLS negotiation.
section: 2.2.2
topics:
    - tls
