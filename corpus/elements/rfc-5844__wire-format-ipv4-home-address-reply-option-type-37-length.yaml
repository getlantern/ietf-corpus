document: rfc-5844
kind: wire-format
summary: 'IPv4 Home Address Reply option (Type=37, Length=6): carries an 8-bit Status field (0–127 success, 128–255 failure), a 6-bit Pref-len, 2-bit Reserved, and a 4-byte IPv4 home address. Defined status codes include 0 (Success), 128 (Failure unspecified), 129 (Administratively prohibited), 130 (Incorrect address), 131 (Invalid address), 132 (Dynamic assignment not available).'
section: 3.3.2
topics:
    - mobility
    - ip
