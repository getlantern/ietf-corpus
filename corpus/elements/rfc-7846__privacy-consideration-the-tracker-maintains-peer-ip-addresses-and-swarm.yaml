document: rfc-7846
kind: privacy-consideration
summary: The tracker maintains peer IP addresses and swarm membership, creating privacy exposure. Peers' participation in content swarms is visible to the tracker. The spec notes that the pro-incentive parameters (upload statistics) reported via STAT_REPORT must be trustworthy to prevent free-riding but acknowledges the privacy trade-off of reporting such data.
section: "6.5"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
