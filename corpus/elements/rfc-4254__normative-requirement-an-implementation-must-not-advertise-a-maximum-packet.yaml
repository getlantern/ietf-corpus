document: rfc-4254
kind: normative-requirement
summary: An implementation MUST NOT advertise a maximum packet size that would result in transport packets larger than its transport layer is willing to receive, and MUST NOT generate data packets larger than its transport layer is willing to send.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - security
