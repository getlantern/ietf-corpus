document: rfc-8861
kind: normative-requirement
summary: An RTP mixer or translator that forwards RTCP SR or RR packets from Reporting Group members MUST forward the corresponding RTCP RGRS packets. If it rewrites SSRC values, it MUST make corresponding changes to both RGRP SDES items and RGRS packets.
section: 3.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
