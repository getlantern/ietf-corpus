document: rfc-9535
kind: security-consideration
summary: Security mechanisms that use JSONPath for access-control decisions must carefully validate both the queries they accept and the JSON values they process, since JSONPath's permissive error handling (empty result instead of error) may mask unexpected data structures.
section: "4.3"
topics:
    - security
    - json
