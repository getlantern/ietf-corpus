document: rfc-9370
kind: interoperability-note
summary: 'Backward compatibility is preserved: if no ADDKE Transform Types appear in the SA payload, the proposal indicates standard IKEv2 per RFC 7296, and peers that do not support this extension will simply ignore the new transform types as unknown. The IKE SA resumption mechanism (RFC 5723) is compatible with IKE SAs created using this specification.'
section: 2.2.1
topics:
    - ipsec
    - crypto
