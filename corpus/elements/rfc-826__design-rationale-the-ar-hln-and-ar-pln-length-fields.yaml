document: rfc-826
kind: design-rationale
summary: The ar$hln and ar$pln length fields are theoretically redundant (derivable from ar$hrd and ar$pro), but are included to enable optional consistency checking and to allow network monitors to parse protocol addresses without prior knowledge of the specific protocol.
section: Why is it done this way??
