document: rfc-3280
kind: normative-requirement
summary: Conforming CAs MUST support key identifiers (sections 4.2.1.1 and 4.2.1.2), basic constraints, key usage, and certificate policies extensions. The keyIdentifier field of the authorityKeyIdentifier extension MUST be included in all certificates generated by conforming CAs to facilitate certification path construction.
section: 4.2.1.1
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
