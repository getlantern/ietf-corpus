document: rfc-3894
kind: security-consideration
summary: The ":copy" extension makes it easier to eavesdrop on a user's message stream without the user noticing, since an attacker with write access to Sieve scripts no longer needs to parse a script to modify it. Write access to Sieve scripts must be protected as strongly as read/write access to e-mail, for example by using secure directory protocols such as correctly parameterized LDAP over TLS.
section: "4"
topics:
    - email
    - security
    - privacy
    - ldap
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
