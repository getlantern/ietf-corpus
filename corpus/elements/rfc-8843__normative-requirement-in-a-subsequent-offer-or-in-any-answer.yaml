document: rfc-8843
kind: normative-requirement
summary: In a subsequent offer, or in any answer, IDENTICAL and TRANSPORT multiplexing category SDP attributes (BUNDLE attributes) MUST be included only in the tagged 'm=' section and MUST NOT be included in any other bundled 'm=' section; these attributes then apply to every bundled 'm=' section within the BUNDLE group.
section: 7.1.3
rfc2119_level: MUST
