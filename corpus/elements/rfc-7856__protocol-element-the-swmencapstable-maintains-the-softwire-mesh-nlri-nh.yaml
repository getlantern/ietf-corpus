document: rfc-7856
kind: protocol-element
summary: The swmEncapsTable maintains the softwire mesh NLRI-NH mapping between External-IP (E-IP) destination prefixes and Internal-IP (I-IP) encapsulation destination addresses. It is indexed by ifIndex, swmEncapsEIPDstType, swmEncapsEIPDst, and swmEncapsEIPPrefixLength, and the number of entries reflects the number of active softwire mesh tunnels on the AFBR.
section: "4.2"
