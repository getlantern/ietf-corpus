document: rfc-1284
kind: protocol-element
summary: dot3StatsInternalMacTransmitErrors (dot3StatsEntry 10) counts transmission failures due to internal MAC sublayer errors not already counted by dot3StatsLateCollisions, dot3StatsExcessiveCollisions, dot3StatsCarrierSenseErrors, or dot3StatsExcessiveDeferrals. Its precise meaning is implementation-specific.
