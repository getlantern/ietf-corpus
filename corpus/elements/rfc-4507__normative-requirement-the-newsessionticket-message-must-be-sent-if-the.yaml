document: rfc-4507
kind: normative-requirement
summary: The NewSessionTicket message MUST be sent if the server included a SessionTicket extension in the ServerHello, and MUST NOT be sent otherwise. In a full handshake, the server MUST verify the client's Finished before sending the ticket.
section: "3.3"
rfc2119_level: MUST
topics:
    - tls
