document: rfc-5459
kind: protocol-element
summary: FT value 14 is assigned to the SID (Silence Insertion Descriptor) frame type to allow transporting a SID without any accompanying audio frames. The actual SID size (2, 3, or 6 octets) is inferred from the remaining payload size after the 1-octet header.
