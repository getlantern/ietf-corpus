document: rfc-7462
kind: protocol-element
summary: The 'alert' URN namespace uses a hierarchical Namespace Specific String of the form urn:alert:<alert-category>:<alert-indication>, where <alert-indication> is composed of one or more colon-separated <alert-ind-part>s. The ABNF constrains components to Non-Reserved LDH labels per RFC 5890.
section: "7"
