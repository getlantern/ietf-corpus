document: rfc-2251
kind: design-rationale
summary: The extensibleMatch filter and the Controls/ExtendedOperation mechanisms were added in LDAPv3 to allow the protocol to be extended without version number changes. Each non-extension protocol change requires a new version number; the extension mechanisms are specifically designed to avoid this.
section: "4"
topics:
