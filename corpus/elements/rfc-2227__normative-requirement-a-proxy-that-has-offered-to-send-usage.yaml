document: rfc-2227
kind: normative-requirement
summary: 'A proxy that has offered to send usage reports MUST send a usage report when: (1) it forwards a conditional GET/HEAD on behalf of a client, (2) the max-uses limit forces a conditional GET, (3) a metering timeout expires with a non-zero hit-count, or (4) it is about to remove a cache entry with a non-zero hit-count.'
section: "3.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
