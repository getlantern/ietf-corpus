document: rfc-2765
kind: protocol-element
summary: 'ICMPv6-to-ICMPv4 type translation: Echo Request/Reply (128/129) maps to 0/8; Destination Unreachable (1) maps to Type 3 with code translation; Packet Too Big (2) maps to Destination Unreachable code 4 with MTU adjustment; Time Exceeded (3) maps to Type 11; Parameter Problem code 1 maps to protocol unreachable (3/2). Single-hop messages (MLD, Neighbor Discovery types 130–137) are silently dropped.'
