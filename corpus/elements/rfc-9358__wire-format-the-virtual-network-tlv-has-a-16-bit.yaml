summary: The VIRTUAL-NETWORK-TLV has a 16-bit Type field (value 65), a 16-bit Length field (MUST be > 0, value portion in octets, TLV zero-padded to 4-octet alignment), and a variable-length Virtual Network Identifier carrying a symbolic name for the VN.
