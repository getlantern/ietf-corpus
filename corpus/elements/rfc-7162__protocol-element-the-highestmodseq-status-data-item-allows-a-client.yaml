document: rfc-7162
kind: protocol-element
summary: The HIGHESTMODSEQ STATUS data item allows a client to check the highest mod-sequence of a mailbox without selecting it. If the mailbox does not support persistent mod-sequence storage, the server MUST return 0 for this item.
section: 3.1.7
rfc2119_level: MUST
topics:
    - email
