document: rfc-5460
kind: normative-requirement
summary: A relay SHOULD be able to generate a DUID for use in the Relay-ID option and store it in stable storage. A relay SHOULD also allow the DUID value to be configurable to preserve relay-to-binding associations when a relay agent is replaced.
section: 5.4.1
rfc2119_level: SHOULD
topics:
    - dns
