document: rfc-3473
kind: protocol-element
summary: Bidirectional LSP setup is indicated by the presence of an Upstream_Label object (Class-Num 35, same format as generalized label) in the Path message. The upstream label is immediately usable for data traffic at the terminator, enabling simultaneous bidirectional data flow after Path/Resv exchange.
