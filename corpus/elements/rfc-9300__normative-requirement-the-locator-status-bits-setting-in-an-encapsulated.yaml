document: rfc-9300
kind: normative-requirement
summary: The Locator-Status-Bits setting in an encapsulated packet MUST reflect the mapping for the EID-Prefix that the inner-header source EID address matches via longest-prefix match. When a site has multiple EID-Prefixes with different Locator-Sets, each packet's LSBs are tied to the per-source-EID mapping.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
