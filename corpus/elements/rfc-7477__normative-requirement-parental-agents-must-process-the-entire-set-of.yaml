document: rfc-7477
kind: normative-requirement
summary: Parental agents MUST process the entire set of child data indicated by the Type Bit Map field, or else MUST NOT make any changes to parental records at all. Errors due to unsupported Type Bit Map bits SHALL result in no change to the parent zone's delegation information.
section: "2"
rfc2119_level: MUST
topics:
    - dns
