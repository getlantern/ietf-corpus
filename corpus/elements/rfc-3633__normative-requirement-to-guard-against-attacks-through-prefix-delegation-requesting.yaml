document: rfc-3633
kind: normative-requirement
summary: To guard against attacks through prefix delegation, requesting routers and delegating routers SHOULD use DHCP authentication as described in section 21 of RFC 3315. Alternatively, IPsec may be used for authentication of DHCPv6 messages where routers have assigned IPv6 addresses.
section: "15"
rfc2119_level: SHOULD
topics:
    - security
    - ip
    - v6ops
