document: rfc-1748
kind: wire-format
summary: All MAC addresses in this MIB use the MacAddress textual convention in IEEE 802.1a 'canonical' order (least-significant-bit first), even though 802.5 transmits MAC addresses most-significant-bit first. ifPhysAddress is a 6-octet string with the Group Bit as the low-order bit (0x01) of the first octet. 16-bit addresses are represented by padding the upper 4 octets with zeros.
section: "3.1"
topics:
