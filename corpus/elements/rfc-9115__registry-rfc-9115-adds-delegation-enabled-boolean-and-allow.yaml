document: rfc-9115
kind: registry
summary: RFC 9115 adds 'delegation-enabled' (boolean) and 'allow-certificate-get' (boolean) to the 'ACME Directory Metadata Fields' registry; adds 'allow-certificate-get' (boolean) and 'delegation' (string) to the 'ACME Order Object Fields' registry; adds 'delegations' (string) to the 'ACME Account Object Fields' registry; adds error type 'unknownDelegation' to 'ACME Error Types'; and establishes the new 'STAR Delegation CSR Template Extensions' registry.
section: "6"
topics:
