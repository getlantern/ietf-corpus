document: rfc-7791
kind: design-rationale
summary: 'Cloning is designed to complement MOBIKE (RFC 4555): after cloning an IKE SA, each new SA can be migrated to a different interface using MOBIKE. This avoids adding new protocol machinery and leverages the widely-deployed MOBIKE extension.'
