document: rfc-3492
kind: protocol-element
summary: 'Basic code point segregation: all basic code points from the extended string are copied literally to the beginning of the basic string in their original order, followed by a delimiter if and only if the count of basic code points is nonzero. The decoder locates the end of the literal portion by scanning for the last delimiter.'
section: "3.1"
