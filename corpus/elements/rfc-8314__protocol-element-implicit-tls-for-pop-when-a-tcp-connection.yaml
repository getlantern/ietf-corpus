document: rfc-8314
kind: protocol-element
summary: 'Implicit TLS for POP: when a TCP connection is established for ''pop3s'' (default port 995), a TLS handshake begins immediately. After the server sends an +OK greeting, both parties MUST enter the AUTHORIZATION state, even if a client certificate was supplied.'
section: "3.1"
