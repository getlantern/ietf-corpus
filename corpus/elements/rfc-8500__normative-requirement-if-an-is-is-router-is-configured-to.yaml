document: rfc-8500
kind: normative-requirement
summary: If an IS-IS router is configured to originate a Traffic Engineering Default Metric sub-TLV for a link but receives a Reverse Metric TLV without a TE Default Metric sub-TLV, the router MUST NOT change the value of its TE Default Metric sub-TLV for that link.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
