document: rfc-3275
kind: security-consideration
summary: Applications should select appropriate algorithm identifiers, key lengths, and certificates for their security requirements. The specification defines mandatory (DSA-SHA1, SHA-1, Canonical XML) and optional algorithms, but algorithm strength and key management are application responsibilities.
