document: rfc-3961
kind: normative-requirement
summary: The cipher state must be non-empty and must influence encryption so that messages are decrypted in the same order they were encrypted when cipher state is chained. The cipher state may not be reused across multiple encryption or decryption operations; each operation produces a new cipher state.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
