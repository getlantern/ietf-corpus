document: rfc-9873
kind: normative-requirement
summary: The EPP <update> command MUST contain a child <addlEmail:addlEmail> element for the client to set or unset an alternate email address. If the alternate email address cannot be applied to the object, the server MUST return EPP error result code 2201.
section: 5.2.5
rfc2119_level: MUST
topics:
    - email
    - registry
