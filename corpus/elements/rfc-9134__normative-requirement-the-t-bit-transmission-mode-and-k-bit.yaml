document: rfc-9134
kind: normative-requirement
summary: The T bit (Transmission mode) and K bit (packetization mode) SHALL have identical values for all packets of the RTP stream. If T=0 (out-of-order allowed), slice packetization mode SHALL be used and K SHALL be set to 1, because only slice packetization mode supports out-of-order transmission.
section: "4.3"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
