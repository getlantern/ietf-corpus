document: rfc-6295
kind: interoperability-note
summary: In mpeg4-generic sendrecv sessions, each party's session description MUST use identical values for all mpeg4-generic parameters (streamtype, mode, profile-level-id, and config). This constraint ensures all parties instantiate an identically configured MPEG 4 Audio Object Type for MIDI-to-audio rendering.
section: "6.2"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
