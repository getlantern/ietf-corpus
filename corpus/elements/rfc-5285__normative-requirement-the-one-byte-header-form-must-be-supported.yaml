document: rfc-5285
kind: normative-requirement
summary: The one-byte header form MUST be supported by all receivers. A stream MUST contain only one-byte or two-byte headers; they MUST NOT be mixed within a stream. Transmitters SHOULD NOT use the two-byte form when all extensions are small enough for the one-byte header form.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
