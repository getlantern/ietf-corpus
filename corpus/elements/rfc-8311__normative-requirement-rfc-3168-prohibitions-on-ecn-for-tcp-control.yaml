document: rfc-8311
kind: normative-requirement
summary: RFC 3168 prohibitions on ECN for TCP control packets (SYN, SYN-ACK, pure ACKs, window probes) and retransmitted packets are updated to allow such use provided the changes are documented in an Experimental RFC in the IETF document stream, with 'unless otherwise specified by an Experimental RFC in the IETF document stream' appended to each prohibiting sentence.
section: "4.3"
rfc2119_level: MUST NOT
topics:
