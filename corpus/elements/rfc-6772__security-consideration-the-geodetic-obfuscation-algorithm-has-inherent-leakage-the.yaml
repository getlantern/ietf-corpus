document: rfc-6772
kind: security-consideration
summary: 'The geodetic obfuscation algorithm has inherent leakage: the maximum statistical leakage ensures A1/A > 0.13 (= 1/(5*1.5)), meaning for a provided location of size 1000 km², the Target''s location may be recoverable within ~130 km². Combination with public geographic information (roads, lakes, buildings) can yield even more precise recovery.'
section: "13.3"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
