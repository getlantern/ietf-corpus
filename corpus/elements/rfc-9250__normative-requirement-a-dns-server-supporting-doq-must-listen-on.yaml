document: rfc-9250
kind: normative-requirement
summary: A DNS server supporting DoQ MUST listen on UDP port 853 by default. A DoQ client MUST connect to UDP port 853 by default. DoQ connections MUST NOT use UDP port 53 to avoid confusion with classic DNS over UDP.
section: 4.1.1
rfc2119_level: MUST
topics:
    - dns
    - quic
