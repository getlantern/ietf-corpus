document: rfc-9678
kind: wire-format
summary: AT_KDF_FS (type=153) is a fixed-length attribute carrying a 2-byte enumerated FS Key Derivation Function value. The Length field MUST be set to 1 (indicating 4 bytes total). Its namespace is distinct from the AT_KDF attribute defined in RFC 9048.
section: "6.2"
topics:
    - security
    - crypto
