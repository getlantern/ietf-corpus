document: rfc-7049
kind: protocol-element
summary: 'Arrays (major type 4) and maps (major type 5) with additional information 31 are indefinite-length: items follow without a count and are terminated by the ''break'' stop code (0xFF). A ''break'' only closes the immediately enclosing indefinite-length item; nested indefinite items require matching ''break'' codes.'
section: 2.2.1
topics:
