document: rfc-4570
kind: protocol-element
summary: The <address-types> subfield identifies the address family ('IP4' or 'IP6'). The wildcard value '*' may be used when <dest-address> is an FQDN, allowing the filter to apply to whichever address type is returned by DNS lookup.
