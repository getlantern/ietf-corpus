document: rfc-5648
kind: interoperability-note
summary: For IKEv2/IPsec interaction, if the mobile node needs to change the care-of address used for the IKE SA, it sends a BU with the 'K' bit set. If 'K' is unsupported, the mobile node MUST re-establish the IKEv2 SA with the new care-of address, resulting in new IPsec SAs.
section: "9.1"
rfc2119_level: MUST
topics:
    - mobility
    - ipsec
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
