document: rfc-5864
kind: design-rationale
summary: New AFS cells SHOULD use names that follow the structure of the DNS, as DNS SRV RRs can only locate AFS services for cells whose naming matches the DNS hierarchy. This also helps avoid naming conflicts between separate AFS cells.
section: "4"
topics:
    - dns
