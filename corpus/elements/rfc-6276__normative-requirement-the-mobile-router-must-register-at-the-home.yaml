document: rfc-6276
kind: normative-requirement
summary: The mobile router MUST register at the home agent (by sending a Binding Update) before initiating a DHCPv6 message exchange for prefix delegation. The mobile router MUST use implicit BU signaling, since the mobile router may not have yet requested any prefixes.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
