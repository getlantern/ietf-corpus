document: rfc-6581
kind: normative-requirement
summary: An all-ones IRD or ORD value (0x3FFF) signals that automatic negotiation is not desired and is left to the ULP. The responder MUST respond to an initiator ORD or IRD value of 0x3FFF by leaving the corresponding local endpoint value unchanged and echoing 0x3FFF in the reply.
section: "9.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
