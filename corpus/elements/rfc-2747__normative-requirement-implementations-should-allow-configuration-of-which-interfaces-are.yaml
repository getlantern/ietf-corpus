document: rfc-2747
kind: normative-requirement
summary: Implementations SHOULD allow configuration of which interfaces are secured for sending, receiving, or both. Messages sent on a secured sending interface MUST include an INTEGRITY object; messages received on a secured receiving interface that lack an INTEGRITY object MUST be discarded.
section: "4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
