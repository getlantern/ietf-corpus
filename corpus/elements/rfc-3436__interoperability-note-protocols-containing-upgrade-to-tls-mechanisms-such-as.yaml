document: rfc-3436
kind: interoperability-note
summary: Protocols containing upgrade-to-TLS mechanisms, such as HTTP upgrade (RFC 2817) and SMTP over TLS (RFC 3207), are an explicit exception to the rule against mixing TLS and SCTP-based data on the same bi-directional stream.
