document: rfc-3175
kind: interoperability-note
summary: For IPv6, Router Alert option values 3–35 are reserved by this specification for aggregation nesting levels 0–31. The IPv6 Router Alert turns the parameter into an option sub-type, so algorithmic use differs from IPv4, requiring IANA-assigned distinct values rather than a single option with a variable field.
section: 1.4.9
topics:
