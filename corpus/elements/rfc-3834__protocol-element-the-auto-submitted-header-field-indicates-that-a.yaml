document: rfc-3834
kind: protocol-element
summary: The Auto-Submitted header field indicates that a message was originated by an automatic process rather than a human. Its defined keyword values are 'no', 'auto-generated', and 'auto-replied', with optional parameters and extension keywords also permitted.
