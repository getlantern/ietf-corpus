document: rfc-7917
kind: security-consideration
summary: Node administrative tags can be used to indicate geographical location or other sensitive information, and this information can be leaked to an IGP snooper, similar to link administrative tags. Advertisement of tag values across administrative domains risks misinterpretation and undesirable side effects.
section: "6"
topics:
    - routing
    - security
