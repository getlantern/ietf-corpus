document: rfc-6116
kind: design-rationale
summary: The 'E2U' token is required in NAPTR Services fields to distinguish ENUM rules from other DDDS applications that may also use NAPTR records, preventing collisions between applications sharing the same DNS zone.
section: 3.4.3
