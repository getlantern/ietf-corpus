document: rfc-3920
kind: wire-format
summary: A <stream:error> element MUST contain one defined error condition child qualified by 'urn:ietf:params:xml:ns:xmpp-streams', MAY contain a <text/> child with human-readable detail (with xml:lang), and MAY contain an application-specific condition element in a custom namespace.
section: 4.7.2
extracted_by: claude-sonnet-4-6
