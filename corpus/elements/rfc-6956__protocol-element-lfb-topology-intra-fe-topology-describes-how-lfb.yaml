document: rfc-6956
kind: protocol-element
summary: LFB Topology (intra-FE topology) describes how LFB instances are logically interconnected along the data path within one FE. A CE connects LFBs by establishing connections between an output port of one LFB instance and an input port of another. LFB ports include singleton ports (named single ports) and group ports (named collections of port instances indexed by name and index).
section: "2.2"
topics:
    - routing
