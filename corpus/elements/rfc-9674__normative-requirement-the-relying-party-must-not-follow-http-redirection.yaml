document: rfc-9674
kind: normative-requirement
summary: The Relying Party MUST NOT follow HTTP Redirection that results from attempts to download Update Notification, Delta, and Snapshot files if the target origin differs from the origin of the Update Notification File. If this verification fails, the RRDP session MUST be rejected.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
    - routing
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
