document: rfc-7577
kind: protocol-element
summary: batteryCellIdentifier (SnmpAdminString, read-only) optionally identifies the specific cell or set of cells within a battery that triggered a notification. Its value is set each time a low, critical, temperature, or aging notification is generated; an empty string indicates the entire battery is addressed.
