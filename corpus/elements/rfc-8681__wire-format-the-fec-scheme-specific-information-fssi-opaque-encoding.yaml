document: rfc-8681
kind: wire-format
summary: 'The FEC Scheme-Specific Information (FSSI) opaque encoding is 3 octets in network byte order: a 16-bit Encoding Symbol Length (E) followed by an 8-bit Window Size Ratio Parameter (WSR). In SDP, these are expressed as ''fssi=E:<value>,WSR:<value>''.'
section: 4.1.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
