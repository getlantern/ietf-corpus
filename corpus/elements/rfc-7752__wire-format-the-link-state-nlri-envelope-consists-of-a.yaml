document: rfc-7752
kind: wire-format
summary: 'The Link-State NLRI envelope consists of a 16-bit NLRI Type and a 16-bit Total NLRI Length, followed by variable-length Link-State NLRI content. The VPN variant prepends an 8-octet Route Distinguisher before the NLRI content. NLRI Types are: 1=Node, 2=Link, 3=IPv4 Topology Prefix, 4=IPv6 Topology Prefix.'
section: "3.2"
