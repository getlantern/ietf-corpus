document: rfc-7216
kind: normative-requirement
summary: Any DNS server internal to a NAT SHOULD also include NAPTR records for the private address range so that clients within the private address range can discover a LIS based on their IP address prior to any address translation.
section: "4.8"
rfc2119_level: SHOULD
topics:
    - dns
    - nat
