document: rfc-4517
kind: normative-requirement
summary: Servers SHOULD recognize all the syntaxes listed in this document but are not required to otherwise support them, and MAY recognize or support other syntaxes. The definition of additional arbitrary syntaxes is discouraged since it will hinder interoperability; client and server implementations typically cannot dynamically recognize new syntaxes.
section: "3"
rfc2119_level: SHOULD
