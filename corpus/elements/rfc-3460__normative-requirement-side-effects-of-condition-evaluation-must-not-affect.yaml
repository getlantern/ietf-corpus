document: rfc-3460
kind: normative-requirement
summary: Side effects of condition evaluation MUST NOT affect the result of evaluating other conditions in the same evaluation pass. For AllMatching and nested rules, side effects of action enforcement MUST NOT be included in condition evaluation on the same pass.
section: 5.5.2
rfc2119_level: MUST NOT
