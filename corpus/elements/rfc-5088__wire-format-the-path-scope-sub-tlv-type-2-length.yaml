document: rfc-5088
kind: wire-format
summary: The PATH-SCOPE sub-TLV (type=2, length=4) contains a 2-octet flags field with bits L, R, Rd, S, Sd, Y indicating supported path scopes (intra-area, inter-area, inter-area default, inter-AS, inter-AS default, inter-layer), plus four 3-bit preference fields (PrefL, PrefR, PrefS, PrefY) for load balancing.
section: "4.2"
