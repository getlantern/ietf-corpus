document: rfc-9101
kind: normative-requirement
summary: The 'request_uri' MUST have appropriate entropy so the URI is not guessable if publicly retrievable. It is RECOMMENDED that the 'request_uri' be removed after a reasonable timeout unless access control measures are taken.
