document: rfc-4550
kind: security-consideration
summary: When using BURL-based message submission, the URLAUTH token must be protected from interception to prevent replay attacks that could disclose message content to an attacker. Lemonade clients SHOULD use TLS-protected IMAP and mail submission channels when using BURL.
section: "8.2"
rfc2119_level: SHOULD
topics:
    - email
    - security
    - tls
