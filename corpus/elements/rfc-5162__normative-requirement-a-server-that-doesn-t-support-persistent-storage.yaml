document: rfc-5162
kind: normative-requirement
summary: A server that doesn't support persistent storage of mod-sequences for the mailbox MUST send the OK untagged response including the NOMODSEQ response code and MUST ignore the remaining QRESYNC parameters, behaving as if no dynamic message data changed.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
