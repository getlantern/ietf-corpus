document: rfc-3464
kind: design-rationale
summary: DSNs carry both a transport-independent status code (Status field) and a transport-specific diagnostic code (Diagnostic-Code field) because translating a foreign error code to a status code may lose precision. The Diagnostic-Code is provided for trouble tickets and tunneling scenarios.
section: 2.3.6
topics:
    - email
